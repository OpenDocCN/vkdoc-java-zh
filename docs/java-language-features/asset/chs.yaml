  \ (文件)\nC:\\Windows (目录)\n...\n清单 7-6.\n使用 FileFilter 过滤文件\n```\n\n装饰器模式\n\n假设您需要为一家销售酒精饮料的酒吧设计类。可用的饮料有朗姆酒、伏特加和威士忌。它还销售两种饮料调味品：蜂蜜和香料。您必须为一个\
  \ Java 应用程序设计类，以便当客户点饮料时，应用程序能让用户打印一张包含饮料名称和价格的收据。\n\n在类中需要维护哪些内容来计算饮料的价格并获取其名称？您需要分别维护饮料所有配料的名称和价格。当需要打印收据时，您将连接所有配料的名称并累加所有配料的价格。为此应用程序设计类的一种方法是拥有一个包含两个实例变量的\
  \ `Drink` 类：`name` 和 `price`。每种饮料都有一个类；该类将继承自 `Drink` 类。一些可能的类如下：\n\n*   `Drink`\n\
  \n*   `Rum`\n\n*   `Vodka`\n\n*   `Whiskey`\n\n*   `RumWithHoney`\n\n*   `RumWithSpices`\n\
  \n*   `VodkaWithHoney`\n\n*   `VodkaWithSpices`\n\n*   `WhiskeyWithHoney`\n\n* \
  \  `WhiskeyWithSpices`\n\n*   `WhiskeyWithHoneyAndSpices`\n\n请注意，我们已经列出了 11 个类，而且这个列表还不完整。考虑点一份加了两份蜂蜜的威士忌。您可以看到涉及的类数量非常庞大。如果您再添加一些饮料和调味品，类的数量将急剧增加。使用这种类设计，您将面临维护代码的问题。如果蜂蜜的价格发生变化，您将需要重新审视每个包含蜂蜜的类并更改其价格。这种设计将导致类爆炸。幸运的是，有一种设计模式可以处理此类问题。它被称为装饰器模式。\n\
  通常，为了使用装饰器模式，类会按照图 7-1 所示的方式进行组织。\n\n![A323070_2_En_7_Fig1_HTML.jpg](img/A323070_2_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1.\n\n基于装饰器模式的通用类图\n\n装饰器模式要求您有一个公共的抽象超类，从中派生出您的具体组件类和一个抽象装饰器类。将这个公共超类命名为\
  \ `Component`。您可以使用接口来代替抽象类。具体组件（在类图中显示为 `ConcreteComponentA` 和 `ConcreteComponentB`）继承自\
  \ `Component` 类。`Decorator` 类是抽象装饰器类，它继承自 `Component` 类。具体装饰器（在类图中显示为 `ConcreteDecoratorA`\
  \ 和 `ConcreteDecoratorB`）继承自 `Decorator` 类。`Decorator` 类保持对其超类 `Component` 的引用。具体组件的引用作为参数在其构造函数中传递给具体装饰器，如下所示：\n\
  \n```\nConcreteComponentA ca = new ConcreteComponentA();\nConcreteDecoratorA cd\
  \ = new ConcreteDecoratorA(ca);\n```\n\n当在具体装饰器上调用方法时，它会执行一些操作，并调用其封装的组件上的方法。装饰器可以决定在调用组件上的方法之前和/或之后执行其操作。通过这种方式，装饰器扩展了组件的功能。这种模式被称为装饰器模式，因为装饰器类为其封装的组件添加功能（或装饰）。出于同样的原因，它也被称为包装器模式：它封装（包装）了它所装饰的组件。\n\
  \n装饰器具有与具体组件相同的接口，因为它们都继承自公共超类 `Component`。因此，您可以在任何需要 `Component` 对象的地方使用 `Decorator`\
  \ 对象。有时，装饰器通过添加组件中不存在的新方法来添加功能，如类图中所示：`newMethodB()`、`newMethodC()` 和 `newMethodD()`。\n\
  \n现在，让我们将关于装饰器模式通用类图的讨论应用到为您的饮料应用程序建模的类中。类图如图 7-2 所示。\n\n![A323070_2_En_7_Fig2_HTML.jpg](img/A323070_2_En_7_Fig2_HTML.jpg)\n\
  \n图 7-2.\n\n基于装饰器模式的饮料应用程序类图\n\n在饮料应用程序中，`Rum`、`Vodka` 和 `Whiskey` 是具体组件（主要饮料）。`Honey`\
  \ 和 `Spices` 是两个装饰器，用于装饰（或改变风味）主要饮料。\n\n`Drink` 类，如清单 7-7 所示，充当主要饮料和装饰器的抽象公共祖先类。`Drink`\
  \ 类中的 `name` 和 `price` 实例变量保存饮料的名称和价格；该类还包含这些实例变量的 getter 方法。这些方法定义了主要饮料以及调味品的公共接口。\n\
  \n\n\n```\n// Drink.java\npackage com.jdojo.io;\npublic abstract class Drink {\n\
  protected String name;\nprotected double price;\npublic String getName() {\nreturn\
  \ name;\n}\npublic double getPrice() {\nreturn price;\n}\n}\n清单 7-7.\n一个抽象的 Drink\
  \ 类，用于建模装饰器模式中的抽象组件\n```\n\n清单 7-8 包含了继承自 `Drink` 类的 `Rum` 类的代码。它在构造函数中设置了 `name`\
  \ 和 `price`。清单 7-9 和清单 7-10 分别列出了 `Vodka` 类和 `Whiskey` 类。这三个类类似。\n\n```\n// Rum.java\n\
  package com.jdojo.io;\npublic class Rum extends Drink {\npublic Rum() {\nthis.name\
  \ = \"Rum\";\nthis.price = 0.9;\n}\n}\n清单 7-8.\n一个 Rum 类\n```\n\n```\n// Vodka.java\n\
  package com.jdojo.io;\npublic class Vodka extends Drink {\npublic Vodka() {\nthis.name\
  \ = \"Vodka\";\nthis.price = 1.2;\n}\n}\n清单 7-9.\n一个 Vodka 类\n```\n\n```\n// Whiskey.java\n\
  package com.jdojo.io;\npublic class Whiskey extends Drink {\npublic Whiskey() {\n\
  this.name = \"Whisky\";\nthis.price = 1.5;\n}\n}\n清单 7-10.\n一个 Whiskey 类\n```\n\n\
  清单 7-11 中展示的 `DrinkDecorator` 是一个抽象装饰器类，它继承自 `Drink` 类。具体的装饰器 `Honey` 和 `Spices`\
  \ 继承自 `DrinkDecorator` 类。它有一个名为 `drink` 的实例变量，类型为 `Drink`。这个实例变量代表装饰器将要装饰的 `Drink`\
  \ 对象。它重写了 `getName()` 和 `getPrice()` 方法以供装饰器使用。在其 `getName()` 方法中，它获取正在装饰的饮料的名称，并将自己的名称附加到其后。这就是我所说的装饰器为组件添加功能的意思。`getPrice()`\
  \ 方法的工作方式相同。它获取所装饰饮料的价格，并将自己的价格加到其上。\n\n```\n// DrinkDecorator.java\npackage com.jdojo.io;\n\
  public abstract class DrinkDecorator extends Drink {\nprotected Drink drink;\n@Override\n\
  public String getName() {\n// 在其装饰的饮料名称后附加自己的名称\nreturn drink.getName() + \", \"\
  \ + this.name;\n}\n@Override\npublic double getPrice() {\n// 将其价格添加到所装饰饮料的价格上\n\
  return drink.getPrice() + this.price;\n}\npublic Drink getDrink() {\nreturn drink;\n\
  }\n}\n清单 7-11.\n一个抽象的 DrinkDecorator 类\n```\n\n清单 7-12 列出了一个具体的装饰器 `Honey` 类，它继承自\
  \ `DrinkDecorator` 类。其构造函数接受一个 `Drink` 对象作为参数。它要求在你创建 `Honey` 类的对象之前，必须有一个 `Drink`\
  \ 对象。在其构造函数中，它设置了自己的名称、价格以及将要操作的饮料。它将使用其父类 `DrinkDecorator` 的 `getName()` 和 `getPrice()`\
  \ 方法。\n\n```\n// Honey.java\npackage com.jdojo.io;\npublic class Honey extends DrinkDecorator{\n\
  public Honey(Drink drink) {\nthis.drink = drink;\nthis.name = \"Honey\";\nthis.price\
  \ = 0.25;\n}\n}\n清单 7-12.\n一个 Honey 类，一个具体的装饰器\n```\n\n清单 7-13 列出了另一个具体的装饰器 `Spices`\
  \ 类，其实现方式与 `Honey` 类相同。\n\n```\n// Spices.java\npackage com.jdojo.io;\npublic class\
  \ Spices extends DrinkDecorator {\npublic Spices(Drink drink) {\nthis.drink = drink;\n\
  this.name = \"Spices\";\nthis.price = 0.10;\n}\n}\n清单 7-13.\n一个 Spices 类，一个具体的装饰器\n\
  ```\n\n现在是时候看看饮料应用程序的实际运行了。让我们点一杯加蜂蜜的威士忌。你将如何构造对象来点一杯加蜂蜜的威士忌？很简单。你总是从创建具体组件开始。具体的装饰器被添加到具体组件上。威士忌是你的具体组件，蜂蜜是你的具体装饰器。你总是使用你在这个系列中创建的最后一个组件对象。通常，你创建的最后一个组件是某个具体的装饰器，除非你只处理一个具体组件。\n\
  \n```\n// 创建一个 Whiskey 对象\nWhiskey w = new Whiskey();\n// 向 Whiskey 添加 Honey。将对象\
  \ w 传递给 Honey 的构造函数\nHoney h = new Honey(w);\n// 从现在开始，我们将使用我们创建的最后一个组件\n// 即 h（一个\
