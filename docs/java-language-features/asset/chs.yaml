  从文件读取对象\n```\n\nExternalizable 对象序列化\n\n在前面的章节中，我向你展示了如何序列化和反序列化 `Serializable`\
  \ 对象。在本节中，我将向你展示如何序列化和反序列化 `Externalizable` 对象。我修改了 `Person` 类以实现 `Externalizable`\
