  测试饮料应用\n```\n\n你需要考虑装饰器模式的其他方面：\n\n*   抽象的 `Component` 类（示例中的 `Drink` 类）可以用接口替代。请注意，你在\
  \ `Drink` 类中包含了两个实例变量。如果你想用接口替换 `Drink` 类，则必须将这两个实例变量下移到类层次结构中。\n\n*   你可以在抽象装饰器和具体装饰器中添加任意数量的新方法，以扩展其组件的功能。\n\
  \n*   使用装饰器模式，最终会得到大量的小类，这可能会让你的应用难以学习。然而，一旦你理解了类的层次结构，就很容易定制和使用它们。\n\n*   装饰器模式的目标是通过为具体组件和具体装饰器提供一个共同的超类来实现的。这使得具体装饰器可以被视为一个组件，从而允许将一个装饰器包裹在另一个装饰器内部。在构建类层次结构时，你可以引入更多类或移除一些类。例如，你可以在\
  \ `Drink` 类与 `Rum`、`Vodka` 和 `Whiskey` 类之间引入一个名为 `MainDrink` 的类。\n\n*   具体装饰器不必继承自抽象装饰器类。有时你可能希望让具体装饰器直接继承自抽象的\
  \ `Component` 类。例如，`ObjectInputStream` 类继承自 `java.io` 包中的 `InputStream` 类，而不是 `FilterInputStream`\
  \ 类。详情请参见图 7-5。具体装饰器的主要要求是：它应将抽象组件作为其直接或非直接超类，并且其构造函数应接受一个抽象组件类型的参数。\n\n输入/输出流\n\
  \n“流”这个词的字面意思是“某物的不间断流动”。在 Java I/O 中，流意味着数据的不间断流动（或顺序流动）。流中的数据可以是字节、字符、对象等。\n\n\
  河流是水流，水以不间断的顺序从源头流向目的地。类似地，在 Java I/O 中，数据从称为数据源的源头流向称为数据汇的目的地。数据从数据源被读取到 Java 程序。Java\
  \ 程序将数据写入数据汇。连接数据源和 Java 程序的流称为输入流。连接 Java 程序和数据汇的流称为输出流。在自然流（如河流）中，源头和目的地通过持续的水流连接。然而，在\
  \ Java I/O 中，Java 程序位于输入流和输出流之间。数据从数据源通过输入流流向 Java 程序。数据从 Java 程序通过输出流流向数据汇。换句话说，Java\
  \ 程序从输入流读取数据，并将数据写入输出流。图 7-4 描述了数据从输入流到 Java 程序以及从 Java 程序到输出流的流动。\n\n![A323070_2_En_7_Fig4_HTML.gif](img/A323070_2_En_7_Fig4_HTML.gif)\n\
  \n图 7-4.\n在 Java 程序中使用输入/输出流的数据流动\n\n要将数据从数据源读入 Java 程序，你需要执行以下步骤：\n\n*   确定数据源。它可以是文件、字符串、数组、网络连接等。\n\
  *   使用数据源构造一个输入流。\n*   从输入流读取数据。通常，你会在循环中读取数据，直到从输入流中读取完所有数据。输入流的方法会返回一个特殊值来表示输入流的结束。\n\
  *   关闭输入流。请注意，构造输入流本身就会打开它以供读取。没有显式的步骤来打开输入流。但是，当你完成从输入流读取数据后，必须关闭它。从 Java 7 开始，你可以使用\
  \ `try-with-resources` 块，它会自动关闭输入流。\n\n要将数据从 Java 程序写入数据汇，你需要执行以下步骤：\n\n1.  确定数据汇。即确定数据将被写入的目的地。它可以是文件、字符串、数组、网络连接等。\n\
  2.  使用数据汇构造一个输出流。\n3.  将数据写入输出流。\n4.  关闭输出流。请注意，构造输出流本身就会打开它以供写入。没有显式的步骤来打开输出流。但是，当你完成向输出流写入数据后，必须关闭它。从\
  \ Java 7 开始，你可以使用 `try-with-resources` 块，它会自动关闭输出流。\n\nJava 中的输入/输出流类基于装饰器模式。到目前为止，你知道基于装饰器模式的类设计会产生许多小类。Java\
  \ I/O 也是如此。Java I/O 涉及许多类。一次性学习每个类并非易事。然而，通过将它们与装饰器模式中的类安排进行比较，可以使学习这些类变得容易。稍后我会将\
  \ Java I/O 类与装饰器模式进行比较。在接下来的两节中，你将通过简单的程序看到输入/输出流的实际应用，这些程序将从文件读取数据并将数据写入文件。\n\n\
  使用输入流从文件读取\n\n在本节中，我将向你展示如何从文件读取数据。数据将显示在标准输出上。你有一个名为 `luci1.txt` 的文件，其中包含威廉·华兹华斯（1770-1850）的诗歌《露西》的第一节。诗歌的一节如下：\n\
  \n```\n我曾有过奇异的激情：\n我敢说出来，\n但只在情人的耳边，\n那曾经发生在我身上的事。\n```\n\n你可以用这段文本创建一个 `luci1.txt`\
  \ 文件，并将其保存在当前工作目录中。从文件读取需要以下步骤：\n\n\n1.  确定数据源，在本例中即 `luci1.txt` 文件的路径。\n\n2.  使用该文件创建一个输入流。\n\
  \n3.  使用输入流从文件中读取数据。\n\n4.  关闭输入流。\n\n确定数据源\n\n你的数据源可以是一个简单的文件名字符串，也可以是一个代表文件路径名的\
  \ `File` 对象。我们假设 `luci1.txt` 文件位于当前工作目录下。\n\n```\n// 数据源\nString srcFile = \"luci1.txt\"\
  ;\n```\n\n创建输入流\n\n要从文件中读取数据，你需要创建一个 `FileInputStream` 类的对象，该对象将代表输入流：\n\n```\n\
  // 创建一个文件输入流\nFileInputStream fin = new FileInputStream(srcFile);\n```\n\n当输入流的数据源是文件时，Java\
  \ 要求你在构造文件输入流时确保该文件存在。如果文件不存在，`FileInputStream` 类的构造方法会抛出一个 `FileNotFoundException`。要处理此异常，你需要将代码放在一个\
  \ `try-catch` 块中，如下所示：\n\n```\ntry {\n// 创建一个文件输入流\nFileInputStream fin = new FileInputStream(srcFile);\n\
  } catch (FileNotFoundException e){\n// 错误处理代码写在这里\n}\n```\n\n读取数据\n\n`FileInputStream`\
  \ 类有一个重载的 `read()` 方法，用于从文件中读取数据。你可以使用该方法的多个版本一次读取一个字节或多个字节。使用 `read()` 方法时要小心。它的返回类型是\
  \ `int`，尽管它返回的是一个 `byte` 值。如果到达文件末尾，它会返回 -1，表示没有更多字节可读。你需要将返回的 `int` 值转换为 `byte`，以获取从文件中读取的\
  \ `byte`。你可以在循环中一次读取一个 `byte`，如下所示：\n\n```\nint data;\nbyte byteData;\n// 读取第一个字节\n\
  data = fin.read();\nwhile (data != -1) {\n// 在控制台显示读取的数据。注意从 int 到 byte 的强制转换\n\
  byteData = (byte) data;\n// 将字节数据转换为 char 以便显示\nSystem.out.print((char) byteData);\n\
  // 尝试读取下一个字节\ndata = fin.read();\n}\n```\n\n你可以将之前的文件读取逻辑重写为紧凑形式，如下所示：\n\n```\n\
  byte byteData;\nwhile ((byteData = (byte) fin.read()) != -1){\nSystem.out.print((char)\
  \ byteData);\n}\n```\n\n在后续示例中，我将使用这种紧凑形式从输入流中读取数据。你需要将从输入流读取数据的代码放在一个 `try`-`catch`\
  \ 块中，因为它可能会抛出 `IOException`。\n\n关闭输入流\n\n最后，你需要使用输入流的 `close()` 方法来关闭它：\n\n```\n\
  // 关闭输入流\nfin.close();\n```\n\n`close()` 方法可能会抛出 `IOException`，因此你需要将此调用封装在一个 `try-catch`\
  \ 块中。\n\n```\ntry {\n// 关闭输入流\nfin.close();\n} catch (IOException e) {\ne.printStackTrace();\n\
  }\n```\n\n通常，你会在 `try` 块中构造一个输入流，并在 `finally` 块中关闭它，以确保在使用完毕后它总是被关闭。\n\n所有输入/输出流都是可自动关闭的。你可以使用\
  \ `try-with-resources` 来创建它们的实例，这样无论是否抛出异常，它们都会自动关闭，从而无需显式调用它们的 `close()` 方法。以下代码片段展示了如何使用\
  \ `try-with-resources` 创建一个文件输入流：\n\n```\nString srcFile = \"luci1.txt\";\ntry (FileInputStream\
  \ fin = new FileInputStream(srcFile)) {\n// 在此处使用 fin 从文件读取数据\n} catch (FileNotFoundException\
  \ e) {\n// 在此处处理异常\n}\n```\n\n一个工具类\n\n你经常会需要执行一些操作，例如关闭输入/输出流，以及在找不到文件时在标准输出上打印消息等。清单\
  \ 7-15 包含了一个 `FileUtil` 类的代码，你将在示例程序中使用它。\n\n```\n// FileUtil.java\npackage com.jdojo.io;\n\
  import java.io.Closeable;\nimport java.io.IOException;\npublic class FileUtil {\n\
  // 打印文件的位置详情\npublic static void printFileNotFoundMsg(String fileName) {\nString\
  \ workingDir = System.getProperty(\"user.dir\");\nSystem.out.println(\"在 '\" + workingDir\
  \ + \"' 目录中找不到文件 '\"\n+ fileName + \"'\");\n}\n// 关闭一个 Closeable 资源，例如输入/输出流\npublic\
  \ static void close(Closeable resource) {\nif (resource != null) {\ntry {\nresource.close();\n\
  } catch (IOException e) {\ne.printStackTrace();\n}\n}\n}\n}\n清单 7-15.\n一个包含处理 I/O\
  \ 类的便捷方法的工具类\n```\n\n完成示例\n\n清单 7-16 演示了读取文件 `luci1.txt` 所涉及的步骤。如果你收到指示文件不存在的错误消息，它还会打印期望文件所在的目录。你可以使用源文件的绝对路径代替相对路径，只需将语句\n\
  \n```\nString srcFile = \"luci1.txt\";\n```\n\n替换为绝对路径，例如 Windows 上的 `c:\\smith\\\
  luci1.txt` 或 UNIX 上的 `/users/smith/luci1.txt`。请注意，在构造包含反斜杠的字符串时，必须使用 `c:\\\\smith\\\
  \\luci1.txt`（使用两个反斜杠来转义一个反斜杠）。\n\n```\nString srcFile = \"luci1.txt 文件的绝对路径\";\n\
  ```\n\n通过简单地使用 `luci1.txt` 作为数据源文件路径，程序期望在运行程序时该文件存在于你的当前工作目录中。\n\n```\n// SimpleFileReading.java\n\
  package com.jdojo.io;\nimport java.io.FileInputStream;\nimport java.io.FileNotFoundException;\n\
  import java.io.IOException;\npublic class SimpleFileReading {\npublic static void\
  \ main(String[] args) {\nString dataSourceFile = \"luci1.txt\";\ntry (FileInputStream\
  \ fin = new FileInputStream(dataSourceFile)) {\nbyte byteData;\nwhile ((byteData\
  \ = (byte) fin.read()) != -1) {\nSystem.out.print((char) byteData);\n}\n} catch\
  \ (FileNotFoundException e) {\nFileUtil.printFileNotFoundMsg(dataSourceFile);\n\
  } catch (IOException e) {\ne.printStackTrace();\n}\n}\n}\n我曾有过奇异的激情：\n我敢说出来，\n但只对情人的耳朵，\n\
  那曾经发生在我身上的事。\n清单 7-16.\n从文件输入流中一次读取一个字节\n```\n\n使用输出流将数据写入文件\n\n在本节中，我将向你展示如何将威廉·华兹华斯的诗歌《露西》中的一节写入一个名为\
  \ `luci2.txt` 的文件。该节内容如下：\n\n```\n当她，我所爱的，每天看起来\n都像六月的玫瑰般清新，\n我向她的小屋弯下我的路，\n在一个傍晚的月光下。\n\
  ```\n\n将数据写入文件需要以下步骤：\n\n1.  确定数据接收端，即数据将被写入的文件。\n\n2.  使用该文件创建一个输出流。\n\n3.  使用输出流将数据写入文件。\n\
  \n4.  刷新输出流。\n\n5.  关闭输出流。\n\n确定数据接收端\n\n你的数据接收端可以是一个简单的文件路径字符串，也可以是一个代表文件路径名的 `File`\
  \ 对象。我们假设 `luci2.txt` 文件位于当前工作目录下。\n\n```\n// 数据接收端\nString destFile = \"luci2.txt\"\
  ;\n```\n\n创建输出流\n\n要写入文件，你需要创建一个 `FileOutputStream` 类的对象，该对象将代表输出流。\n\n```\n// 创建一个文件输出流\n\
  FileOutputStream fos = new FileOutputStream(destFile);\n```\n\n当输出流的数据接收端是文件时，如果文件不存在，Java\
  \ 会尝试创建该文件。如果你使用的文件名是一个目录名，或者由于任何原因无法打开该文件，Java 可能会抛出一个 `FileNotFoundException`。你必须准备好通过将代码放在一个\
  \ `try-catch` 块中来处理此异常，如下所示：\n\n```\ntry {\nFileOutputStream fos = new FileOutputStream(srcFile);\n\
  } catch (FileNotFoundException e){\n// 错误处理代码写在这里\n}\n```\n\n\n\n如果在创建 `FileOutputStream`\
  \ 时文件包含数据，这些数据将被清除。若希望保留现有数据并将新数据追加到文件中，则需要使用 `FileOutputStream` 类的另一个构造方法，该方法接受一个\
  \ `boolean` 标志，用于指示是否将新数据追加到文件。\n\n```\n// 要向文件追加数据，请在第二个参数中传入 true\nFileOutputStream\
  \ fos = new FileOutputStream(destFile, true);\n```\n\n写入数据\n\n使用输出流向文件写入数据。`FileOutputStream`\
  \ 类有一个重载的 `write()` 方法，用于向文件写入数据。你可以使用该方法的多个版本一次写入一个字节或多个字节。你需要将写入数据到输出流的代码放在 `try-catch`\
  \ 块中，因为如果数据无法写入文件，它可能会抛出 `IOException`。\n\n通常，你使用 `FileOutputStream` 写入二进制数据。如果你想将诸如“`Hello`”这样的字符串写入输出流，需要将字符串转换为字节。`String`\
  \ 类有一个 `getBytes()` 方法，该方法返回表示该字符串的字节数组。你可以按如下方式将字符串写入 `FileOutputStream`：\n\n```\n\
  String text = \"Hello\";\nbyte[] textBytes = text.getBytes();\nfos.write(textBytes);\n\
  ```\n\n你想将四行文本写入 `luci2.txt`。前三行文本的每一行之后都需要插入一个新行。不同平台的新行表示方式不同。你可以通过读取 `line.separator`\
  \ 系统变量来获取程序运行平台的新行，如下所示：\n\n```\n// 获取当前平台的新行分隔符\nString lineSeparator = System.getProperty(\"\
  line.separator\");\n```\n\n请注意，行分隔符不一定是一个字符。要将行分隔符写入文件输出流，你需要将其转换为字节数组，然后将该字节数组写入文件，如下所示：\n\
  \n```\nfos.write(lineSeparator.getBytes());\n```\n\n刷新输出流\n\n你需要使用 `flush()` 方法刷新输出流：\n\
  \n```\n// 刷新输出流\nfos.flush();\n```\n\n刷新输出流表示，如果任何已写入的字节被缓冲，它们可能会被写入数据接收端。例如，如果数据接收端是一个文件，你将字节写入\
  \ `FileOutputStream`，这是文件的一种抽象。输出流将字节传递给操作系统，由操作系统负责将它们写入文件。对于文件输出流，如果你调用 `flush()`\
  \ 方法，输出流会将字节传递给操作系统进行写入。操作系统何时将字节写入文件由其自行决定。如果输出流的实现缓冲了写入的字节，那么当缓冲区满或你通过调用其 `close()`\
  \ 方法关闭输出流时，它会自动刷新这些字节。\n\n关闭输出流\n\n关闭输出流类似于关闭输入流。你需要使用其 `close()` 方法关闭输出流。\n\n```\n\
  // 关闭输出流\nfos.close();\n```\n\n`close()` 方法可能会抛出 `IOException`。如果你希望输出流自动关闭，可以使用\
  \ `try-with-resources` 语句创建输出流。\n\n完成示例\n\n清单 7-17 演示了向名为 `luci2.txt` 的文件写入数据所涉及的步骤。如果该文件在当前目录中不存在，程序将创建它。如果存在，它将被覆盖。运行程序时，输出中显示的文件路径可能不同。\n\
  \n```\n// SimpleFileWriting.java\npackage com.jdojo.io;\nimport java.io.File;\n\
  import java.io.FileNotFoundException;\nimport java.io.FileOutputStream;\nimport\
  \ java.io.IOException;\npublic class SimpleFileWriting {\npublic static void main(String[]\
  \ args) {\nString destFile = \"luci2.txt\";\n// 获取当前平台的行分隔符\nString lineSeparator\
  \ = System.getProperty(\"line.separator\");\nString line1 = \"When she I loved look'd\
  \ every day\";\nString line2 = \"Fresh as a rose in June,\";\nString line3 = \"\
  I to her cottage bent my way,\";\nString line4 = \"Beneath an evening moon.\";\n\
  try (FileOutputStream fos = new FileOutputStream(destFile)) {\n// 将所有四行文本作为字节写入输出流\n\
  fos.write(line1.getBytes());\nfos.write(lineSeparator.getBytes());\nfos.write(line2.getBytes());\n\
  fos.write(lineSeparator.getBytes());\nfos.write(line3.getBytes());\nfos.write(lineSeparator.getBytes());\n\
  fos.write(line4.getBytes());\n// 将写入的字节刷新到文件\nfos.flush();\n// 显示输出文件路径\nSystem.out.println(\"\
  文本已写入 \"\n+ (new File(destFile)).getAbsolutePath());\n} catch (FileNotFoundException\
  \ e1) {\nFileUtil.printFileNotFoundMsg(destFile);\n} catch (IOException e2) {\n\
  e2.printStackTrace();\n}\n}\n}\n文本已写入 C:\\Java9LanguageFeatures\\luci2.txt\n清单 7-17.\n\
  向文件输出流写入字节\n```\n\n输入流与装饰器模式\n\n图 7-5 展示了包含一些常用输入流类的类图。你可以参考 `java.io` 包的 API 文档获取输入流类的完整列表。类图中的注释将输入流类与装饰器模式中的类进行了比较。请注意，输入流的类图与你的饮料应用程序的类图相似，后者也是基于装饰器模式。表\
  \ 7-1 比较了装饰器模式、饮料应用程序和输入流中的类。\n\n表 7-1.\n\n装饰器模式、饮料应用程序和输入流中的类设计比较\n\n装饰器模式\n |\n\
