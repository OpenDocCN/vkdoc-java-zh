  ```\n\n异步文件 I/O\n\nNIO.2 支持异步文件 I/O。在同步文件 I/O 中，请求 I/O 操作的线程会一直等待，直到 I/O 操作完成。而在异步文件\
  \ I/O 中，Java 应用程序向系统请求一个 I/O 操作，该操作由系统异步执行。当系统执行文件 I/O 操作时，应用程序可以继续执行其他工作。当系统完成文件\
  \ I/O 后，它会通知应用程序其请求已完成。\n\n与同步文件 I/O 模型相比，异步文件 I/O 模型具有更好的可扩展性。异步文件 I/O 的请求以及向应用程序发送完成通知，是由专门为此目的创建的线程池来执行的。异步文件\
  \ I/O API 提供了选项，允许你使用默认线程池或自定义线程池。它通过使用预定义的专用线程池来处理所有异步文件 I/O 操作，而不是为每个 I/O 操作创建新线程，从而提供了更强的可扩展性。\n\
  \n`java.nio.channels.AsynchronousFileChannel` 类的实例代表一个异步文件通道，用于异步读取、写入以及对文件执行其他操作。可以在一个异步文件通道上同时执行多个\
  \ I/O 操作。异步文件通道不维护读或写操作开始的当前位置。你需要在每次请求时为每个读和写操作提供位置。\n\n`AsynchronousFileChannel`\
  \ 类的静态 `open()` 方法用于获取 `AsynchronousFileChannel` 类的实例。该方法已被重载。其中一个版本使用默认线程池来处理 I/O\
  \ 操作和完成通知。另一个版本允许你指定一个 `ExecutorService`，异步任务将被提交给该服务以处理 I/O 操作和完成通知。以下代码片段获取了一个用于写入文件的\
  \ `AsynchronousFileChannel`。如果文件不存在，则会创建该文件。\n\n```\n// 获取 Path 对象\nPath path =\
  \ Paths.get(\"rainbow.txt\");\n// 获取用于 WRITE 操作的异步文件通道。如果文件不存在，则创建它\nAsynchronousFileChannel\
  \ afc = AsynchronousFileChannel.open(path, WRITE, CREATE);\n```\n\n`AsynchronousFileChannel`\
  \ 提供了两种处理异步文件 I/O 操作结果的方式。\n\n*   使用 `java.util.concurrent.Future` 对象。\n*   使用 `java.nio.channels.CompletionHandler`\
  \ 对象。\n\n`AsynchronousFileChannel` 类中支持异步文件 I/O 操作的每个方法都有两个版本。其中一个版本返回一个 `Future`\
  \ 对象，你可以使用它来处理所请求的异步操作的结果。`Future` 对象的 `get()` 方法返回写入文件通道的字节数。以下代码片段使用了 `write()`\
  \ 方法中返回 `Future` 对象的版本：\n\n```\n// 将待写入的数据放入 ByteBuffer\nByteBuffer dataBuffer =\
  \ /* 获取一个填充了数据的字节缓冲区 */;\n// 执行异步写入操作\nlong startPosition = 0;\nFuture result =\
  \ afc.write(dataBuffer, startPosition);\n```\n\n一旦你获得了一个 `Future` 对象，就可以使用轮询方法或阻塞等待方法来处理异步文件\
  \ I/O 的结果。以下代码片段展示了轮询方法，它不断调用 `Future` 对象的 `isDone()` 方法来检查 I/O 操作是否完成：\n\n```\n\
  while (!result.isDone()) {\n// 异步文件 I/O 尚未完成。继续处理其他事务\n}\n// 异步文件 I/O 已完成。获取结果\n\
  int writtenNumberOfBytes = result.get();\n```\n\n提示\n\n请注意，调用 `Future.get()` 方法会阻塞，直到结果可用。而调用\
  \ `Future.isDone()` 方法是非阻塞的。\n\n`AsynchronousFileChannel` 类中支持异步文件 I/O 的方法的另一个版本允许你传递一个\
  \ `CompletionHandler` 对象，当所请求的异步 I/O 操作完成或失败时，会调用该对象的方法。`CompletionHandler` 接口有两个方法：`completed()`\
  \ 和 `failed()`。当所请求的 I/O 操作成功完成时，会调用 `completed()` 方法。当所请求的 I/O 操作失败时，会调用 `failed()`\
  \ 方法。该 API 允许你向 `completed()` 和 `failed()` 方法传递任何类型的对象。这样的对象称为附件。你可能希望向这些方法传递一个附件，例如\
  \ `ByteBuffer` 或通道的引用等，以便你可以在这些方法内部执行额外的操作，例如从 `ByteBuffer` 中读取数据。如果你没有有用的东西作为附件传递给这些方法，则传递\
  \ `null`。假设你打算使用以下 `Attachment` 类的对象作为完成处理器的附件：\n\n```\n// 用作附件\npublic class Attachment\
  \ {\npublic Path path;\npublic ByteBuffer buffer;\npublic AsynchronousFileChannel\
  \ asyncChannel;\n}\n```\n\n现在你可以按如下方式声明你的完成处理器类：\n\n```\n// 用于处理异步 I/O 操作完成的类\n\
  public class MyHandler implements CompletionHandler {\n@Override\npublic void completed(Integer\
  \ result, Attachment attach) {\n// 处理 I/O 操作完成\n}\n@Override\npublic void failed(Throwable\
  \ e, Attachment attach) {\n// 处理 I/O 操作失败\n}\n}\n```\n\n\n\n你可以使用 `MyHandler` 类的对象来处理异步文件\
  \ I/O 操作的完成。以下代码片段使用 `MyHandler` 实例作为异步写入操作的完成处理器。根据 I/O 操作的结果，将调用 `MyHandler` 实例的\
  \ `completed()` 或 `failed()` 方法。\n\n```\n// 获取一个完成处理器\nMyHandler handler = new MyHandler();\n\
  // 获取要写入 ByteBuffer 的数据\nByteBuffer dataBuffer = /* 获取数据缓冲区 */;\n// 准备附件\nAttachment\
  \ attach = new Attachment();\nattach.asyncChannel = afc;\nattach.buffer = dataBuffer;\n\
  attach.path = path;\n// 执行异步写入操作\nafc.write(dataBuffer, 0, attach, handler);\n```\n\
  \n提示\n\n在异步文件操作中用于读取或写入的 `ByteBuffer`，在异步文件 I/O 请求发起后至请求完成前，应用程序不应再使用该缓冲区。否则，将产生不可预测的结果。你可以通过\
  \ `AsynchronousFileChannel` 的 `close()` 方法关闭它。当调用其 `close()` 方法时，所有待处理的操作将以 `java.nio.channels.AsynchronousCloseException`\
  \ 完成。\n\n清单 10-22 演示了如何使用 `CompletionHandler` 对象处理异步写入文件的结果。在提交对文件的异步写入请求后，主线程休眠五秒钟，以给异步操作留出完成时间。在实际应用中，提交异步文件\
