  一个线程将生产数据，另一个线程将消费数据。\n请注意，两个线程之间的同步由阻塞的读写操作负责处理。\n\n清单 7-21 演示了\n如何使用管道 I/O。`main()`\
  \ 方法创建并连接\n一个管道输入流和一个管道输出流。管道输出流\n被传递给 `produceData()` 方法，\n生成从 1 到 50 的数字。线程在生成一个数字后休眠半秒钟。`consumeData()`\
  \ 方法\n从管道输入流读取数据。我使用了一种快速而粗糙的方式来处理异常，以保持代码更简洁和可读。数据在两个独立的线程中生产和读取。\n\n```\n// PipedStreamTest.java\n\
  package com.jdojo.io;\nimport java.io.PipedInputStream;\nimport java.io.PipedOutputStream;\n\
  public class PipedStreamTest {\npublic static void main(String[] args) throws Exception\
  \ {\n// 创建并连接管道输入和输出流\nPipedInputStream pis = new PipedInputStream();\nPipedOutputStream\
  \ pos = new PipedOutputStream();\npos.connect(pis);\n// 创建并启动两个线程，一个用于生产数据（写入数据），\n\
  // 一个用于消费数据（读取数据）\nRunnable producer = () -> produceData(pos);\nRunnable consumer\
  \ = () -> consumeData(pis);\nnew Thread(producer).start();\nnew Thread(consumer).start();\n\
  }\npublic static void produceData(PipedOutputStream pos) {\ntry {\nfor (int i =\
  \ 1; i <= 50; i++) {\npos.write((byte) i);\npos.flush();\nSystem.out.println(\"\
  写入: \" + i);\nThread.sleep(500);\n}\npos.close();\n} catch (Exception e) {\ne.printStackTrace();\n\
  }\n}\npublic static void consumeData(PipedInputStream pis) {\ntry {\nint num = -1;\n\
  while ((num = pis.read()) != -1) {\nSystem.out.println(\"读取: \" + num);\n}\npis.close();\n\
  } catch (Exception e) {\ne.printStackTrace();\n}\n}\n}\n写入 : 1\n读取: 1\n...\n写入:\
