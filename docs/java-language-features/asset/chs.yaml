  \n提示\n\n当模块系统在已解析模块的模块声明中遇到 `uses` 语句时，它会扫描模块路径，查找所有包含 `provides` 语句的模块，这些语句为 `uses`\
  \ 语句中指定的服务接口提供了实现。从这个意义上说，模块中的 `uses` 语句表示对其他模块的间接可选依赖关系，系统会自动为你解析这些依赖。因此，要使用某个服务提供者，只需将该服务提供者模块放入模块路径即可；`ServiceLoader`\
  \ 类会发现并加载它。\n\n接下来，我们运行相同的命令，但将 `jdojo.prime.faster` 模块也添加到模块路径中，如下所示：\n\n```\n\
