- "# 2. 内部类\n\n在本章中，你将学习：\n\n*   什么是内部类\n*   如何声明内部类\n*   如何声明成员内部类、局部内部类和匿名内部类\n\
  *   如何创建内部类的对象\n\n本章中的所有示例程序都是 `jdojo.innerclasses` 模块的成员，如清单 2-1 所示。\n\n```\n//\
  \ module-info.java\nmodule jdojo.innerclasses {\nexports com.jdojo.innerclasses;\n\
  }\n清单 2-1.\njdojo.innerclasses 模块的声明\n```\n\n\n\n## 什么是内部类？\n\n你已经接触过作为包成员的类。作为包成员的类被称为顶层类。例如，清单\
  \ 2-2 展示了一个名为 `TopLevel` 的顶层类。\n\n```\n// TopLevel.java\npackage com.jdojo.innerclasses;\n\
  public class TopLevel {\nprivate int value = 101;\npublic int getValue() {\nreturn\
  \ value;\n}\npublic void setValue (int value) {\nthis.value = value;\n}\n}\n清单 2-2.\n\
  顶层类示例\n```\n\n`TopLevel` 类是 `com.jdojo.innerclasses` 包的一个成员。该类有三个成员：\n\n*   一个实例变量：`value`\n\
  *   两个方法：`getValue()` 和 `setValue()`\n\n类也可以声明在另一个类内部。这种类型的类称为内部类。如果声明在另一个类内部的类被显式或隐式地声明为静态，则称为嵌套类，而非内部类。包含内部类的类称为封闭类或外部类。考虑以下\
  \ `Outer` 和 `Inner` 类的声明：\n\n```\n// Outer.java\npackage com.jdojo.innerclasses;\n\
  public class Outer {\npublic class Inner {\n// Inner 类的成员写在这里\n}\n// Outer 类的其他成员写在这里\n\
  }\n```\n\n`Outer` 类是一个顶层类。它是 `com.jdojo.innerclasses` 包的一个成员。`Inner` 类是一个内部类。它是\
  \ `Outer` 类的一个成员。`Outer` 类是 `Inner` 类的封闭类（或外部类）。一个内部类可以是另一个内部类的封闭类。内部类的嵌套层级没有限制。\n\
  \n内部类的实例只能存在于其封闭类的实例中。也就是说，在创建内部类的实例之前，你必须先拥有一个封闭类的实例。这在强制实现“一个对象不能脱离另一个对象而存在”的规则时非常有用。例如，必须先有计算机，才能有处理器；必须先有组织，才能有该组织的总裁。在这种情况下，`Processor`\
  \ 和 `President` 可以定义为内部类，而 `Computer` 和 `Organization` 则分别是它们的封闭类。内部类可以完全访问其封闭类的所有成员，包括私有成员。\n\
  \nJava 1.0 不支持内部类。它们是在 Java 1.1 中引入的，且未对 JVM 处理类文件的方式进行任何更改。那么，如何在不影响 JVM 的情况下添加像内部类这样的新结构呢？内部类完全是在编译器的帮助下实现的。编译器会为编译单元中的每个内部类生成一个单独的类文件。内部类的类文件与顶层类的类文件格式相同。因此，JVM\
  \ 对内部类和顶层类的类文件一视同仁。然而，编译器需要做大量的幕后工作来实现内部类。我将在本章后面讨论编译器为实现内部类所做的一些工作。\n\n你可能会问，是否可以在\
  \ Java 中不使用内部类就能实现内部类所提供的所有功能？在某种程度上，答案是肯定的。即使不能完全实现，你也可以在不使用内部类的情况下实现内部类提供的大部分功能。编译器会为内部类生成额外的代码。与其使用内部类结构并让编译器为你生成额外的代码，不如自己编写相同的代码。这个想法听起来很简单。然而，谁愿意重新发明轮子呢？\n\
  \n## 使用内部类的优势\n\n以下是使用内部类的一些优势。本章后续部分将通过示例解释内部类的所有优势。\n\n*   它们允许你将类定义在将要使用它们的其他类附近。例如，计算机会使用处理器，因此将\
  \ `Processor` 类定义为 `Computer` 类的内部类会更好。\n*   它们提供了额外的命名空间来管理类结构。例如，在引入内部类之前，一个类只能是包的一个成员。随着内部类的引入，可以包含内部类的顶层类提供了额外的命名空间。\n\
  *   某些设计模式使用内部类更容易实现。例如，适配器模式、枚举模式和状态模式都可以使用内部类轻松实现。\n*   使用内部类实现回调机制既优雅又方便。Java\
  \ 8 中的 Lambda 表达式为在 Java 中实现回调提供了一种更好、更简洁的方式。我将在第 5 章讨论 Lambda 表达式。\n*   它有助于在 Java\
  \ 中实现闭包。\n*   你可以使用内部类实现类的一种多重继承风格。内部类可以继承另一个类。因此，内部类既可以访问其封闭类的成员，也可以访问其超类的成员。请注意，访问两个或多个类的成员是多重继承的目标之一，这可以通过内部类实现。然而，仅仅能够访问两个类的成员并不是真正意义上的多重继承。\n\
  \n## 内部类的类型\n\n你可以在类内部任何可以编写 Java 语句的位置定义内部类。内部类有三种类型。内部类的类型取决于其声明的位置和声明方式。\n\n\
  *   成员内部类\n*   局部内部类\n*   匿名内部类\n\n### 成员内部类\n\n成员内部类的声明方式与类的成员字段或成员方法相同。它可以声明为\
  \ `public`、`private`、`protected` 或包级私有。成员内部类的实例只能存在于其封闭类的实例中。考虑清单 2-3 中所示的成员内部类示例。\n\
  \n```\n// Car.java\npackage com.jdojo.innerclasses;\npublic class Car {\n// Car\
  \ 类的成员变量\nprivate final int year;\n// 名为 Tire 的成员内部类\npublic class Tire {\n// Tire\
  \ 类的成员变量\nprivate final double radius;\n// Tire 类的构造器\npublic Tire(double radius)\
  \ {\nthis.radius = radius;\n}\n// Tire 类的成员方法\npublic double getRadius() {\nreturn\
  \ radius;\n}\n} // 成员内部类声明结束\n// Car 类的构造器\npublic Car(int year) {\nthis.year =\
  \ year;\n}\n// Car 类的成员方法\npublic int getYear() {\nreturn year;\n}\n}\n清单 2-3.\n\
  Tire 是 Car 类的成员内部类\n```\n\n在清单 2-3 中，`Car` 是一个顶层类，`Tire` 是 `Car` 类的一个成员内部类。`Car`\
  \ 类的完全限定名是 `com.jdojo.innerclasses.Car`。`Tire` 类的完全限定名是 `com.jdojo.innerclasses.Car.Tire`。`Tire`\
  \ 内部类被声明为 public。也就是说，它的名字可以在 `Car` 类外部使用。例如，你可以在 `Car` 类外部声明一个 `Car.Tire` 类型的变量，如下所示：\n\
  \n```\nCar.Tire t;\n```\n\n`Tire` 类的构造器也被声明为 public。这意味着你可以在 `Car` 类外部创建 `Tire`\
  \ 类的对象。由于 `Tire` 是 `Car` 类的成员内部类，因此在创建 `Tire` 类的对象之前，你必须先拥有一个 `Car` 类的对象。`new` 操作符用于创建成员内部类对象的方式有所不同。本章的“创建内部类对象”部分将解释如何创建内部成员类的对象。\n\
  \n\n\n### 局部内部类\n\n局部内部类是在一个代码块内部声明的。其作用域仅限于声明它的代码块。由于它的作用域始终局限于其所在的封闭块，因此其声明不能使用任何访问修饰符，例如\
  \ `public`、`private` 或 `protected`。通常，局部内部类是在方法内部定义的。然而，它也可以在静态初始化器、非静态初始化器和构造器中定义。当你只需要在某个代码块内部使用该类时，就可以使用局部内部类。清单\
  \ 2-4 展示了一个局部内部类的示例。\n\n```\n// TitleList.java\npackage com.jdojo.innerclasses;\n\
  import java.util.ArrayList;\nimport java.util.Iterator;\npublic class TitleList\
  \ {\nprivate ArrayList titleList = new ArrayList();\npublic void addTitle (String\
  \ title) {\ntitleList.add(title);\n}\npublic void removeTitle(String title) {\n\
  titleList.remove(title);\n}\npublic Iterator titleIterator() {\n// 一个局部内部类 - TitleIterator\n\
  class TitleIterator implements Iterator {\nint count = 0;\n@Override\npublic boolean\
  \ hasNext() {\nreturn (count < titleList.size());\n}\n@Override\npublic String next()\
  \ {\nreturn titleList.get(count++);\n}\n} // 局部内部类 TitleIterator 在此结束\n// 创建局部内部类的对象并返回引用\n\
  TitleIterator titleIterator = new TitleIterator();\nreturn titleIterator;\n}\n}\n\
  清单 2-4.\n局部内部类示例\n```\n\n一个 `TitleList` 对象可以持有一个书籍标题列表。`addTitle()` 方法向列表中添加一个标题。`removeTitle()`\
  \ 方法从列表中移除一个标题。`titleIterator()` 方法为标题列表返回一个迭代器。`titleIterator()` 方法定义了一个名为 `TitleIterator`\
  \ 的局部内部类，该类实现了 `Iterator` 接口。请注意，`TitleIterator` 类使用了其外部类的私有实例变量 `titleList`。最后，`titleIterator()`\
  \ 方法创建了一个 `TitleIterator` 类的对象，并返回该对象的引用。清单 2-5 展示了如何使用 `TitleList` 类的 `titleIterator()`\
  \ 方法。\n\n```\n// TitleListTest.java\npackage com.jdojo.innerclasses;\nimport java.util.Iterator;\n\
  public class TitleListTest {\npublic static void main(String[] args) {\nTitleList\
  \ tl = new TitleList();\n// 添加三个标题\ntl.addTitle(\"Java 9 Revealed\");\ntl.addTitle(\"\
  Beginning Java 9\");\ntl.addTitle(\"Learn JavaFX 9\");\n// 获取迭代器\nIterator iterator\
  \ = tl.titleIterator();\n// 使用迭代器打印所有标题\nwhile (iterator.hasNext()) {\nSystem.out.println(iterator.next());\n\
  }\n}\n}\nJava 9 Revealed\nBeginning Java 9\nLearn JavaFX 9\n清单 2-5.\n使用局部内部类\n```\n\
  \n局部内部类的作用域仅限于其封闭块，这一事实对如何声明局部内部类有一些影响。考虑以下类声明：\n\n```\npackage com.jdojo.innerclasses;\n\
  public class SomeTopLevelClass {\npublic void someMethod() {\nclass SomeLocalInnerClass\
  \ {\n// SomeLocalInnerClass 的代码写在这里\n}\n// SomeLocalInnerClass 只能在这里使用\n}\n}\n```\n\
  \n`SomeTopLevelClass` 是一个顶层类。`SomeTopLevelClass` 的 `someMethod()` 方法声明了 `SomeLocalInnerClass`\
  \ 局部内部类。请注意，局部内部类的名称 `SomeLocalInnerClass` 只能在 `someMethod()` 方法内部使用。这意味着 `SomeLocalInnerClass`\
  \ 的对象只能在 `someMethod()` 方法内部创建和使用。这限制了局部内部类只能在其封闭块内部使用——在你的例子中就是 `someMethod()`\
  \ 方法。在这一点上，局部内部类似乎不是很有用。然而，清单 2-5 演示了局部内部类 `TitleIterator` 的代码可以从另一个类 `TitleListTest`\
  \ 中调用。这是可能的，因为局部内部类 `TitleIterator` 实现了 `Iterator` 接口。\n\n要在其封闭块之外使用局部内部类，局部内部类必须满足以下条件之一或全部：\n\
  \n*   实现一个公共接口\n*   继承自另一个公共类并重写其父类的某些方法\n\n接口或另一个类的名称必须在定义局部内部类的封闭块之外可用。清单 2-4\
  \ 和清单 2-5 说明了第一种情况，即局部内部类实现了一个接口。清单 2-6 和清单 2-7 说明了第二种情况，即局部内部类继承自另一个公共类。清单 2-8\
  \ 提供了一个测试类来测试局部内部类。这个示例很简单。然而，它说明了如何通过从另一个类继承来使用局部内部类的概念。请注意，当你运行清单 2-8 中的程序时，可能会得到不同的输出。\n\
  \n```\n// RandomInteger.java\npackage com.jdojo.innerclasses;\nimport java.util.Random;\n\
  public class RandomInteger {\nprotected Random rand = new Random();\npublic int\
  \ getValue() {\nreturn rand.nextInt();\n}\n}\n清单 2-6.\n声明一个顶层类，用作局部类的父类\n```\n\n\
  ```\n// RandomLocal.java\npackage com.jdojo.innerclasses;\npublic class RandomLocal\
  \ {\npublic RandomInteger getRandomInteger() {\n// 一个继承自 RandomInteger 类的局部内部类\n\
  class RandomIntegerLocal extends RandomInteger {\n@Override\npublic int getValue()\
  \ {\n// 获取两个随机整数并返回平均值，忽略小数部分\nlong n1 = rand.nextInt();\nlong n2 = rand.nextInt();\n\
  int value = (int) ((n1 + n2)/2);\nreturn value;\n}\n}\nreturn new RandomIntegerLocal();\n\
  } // getRandomInteger() 方法结束\n}\n清单 2-7.\n一个继承自另一个类的局部内部类\n```\n\n```\n// LocalInnerTest.java\n\
  package com.jdojo.innerclasses;\npublic class LocalInnerTest {\npublic static void\
  \ main(String[] args) {\n// 使用 RandomInteger 类生成随机整数\nRandomInteger rTop = new RandomInteger();\n\
  System.out.println(\"使用顶层类生成的随机整数:\");\nSystem.out.println(rTop.getValue());\nSystem.out.println(rTop.getValue());\n\
  System.out.println(rTop.getValue());\n// 使用 RandomIntegerLocal 类生成随机整数\nRandomLocal\
  \ local = new RandomLocal();\nRandomInteger rLocal = local.getRandomInteger();\n\
  System.out.println(\"\\n 使用局部内部类生成的随机整数:\");\nSystem.out.println(rLocal.getValue());\n\
  System.out.println(rLocal.getValue());\nSystem.out.println(rLocal.getValue());\n\
  }\n}\n使用顶层类生成的随机整数:\n\n使用局部内部类生成的随机整数:\n\n清单 2-8.\n测试局部内部类\n```\n\n`RandomInteger`\
  \ 类包含一个 `getValue()` 方法。`RandomInteger` 类的唯一目的是通过此方法获取一个随机整数。`RandomLocal` 类是另一个类，它有一个\
  \ `getRandomInteger()` 方法，该方法声明了一个名为 `RandomIntegerLocal` 的局部内部类，该类继承自 `RandomInteger`\
  \ 类。`RandomIntegerLocal` 类重写了其父类的 `getValue()` 方法。重写后的 `getValue()` 方法生成两个随机整数。它返回这两个整数的平均值。`LocalInnerTest`\
  \ 类说明了这两个类的使用。名称 `RandomIntegerLocal` 在其声明所在的方法之外是不可用的，因为它是一个局部内部类。有两点值得注意。\n\n\n\
  \n*   `RandomLocal` 类的 `getRandomInteger()` 方法声明其返回一个 `RandomInteger` 类的对象，而非 `RandomIntegerLocal`\
  \ 类的对象。在方法内部，允许返回 `RandomIntegerLocal` 类的对象，因为 `RandomIntegerLocal` 局部内部类继承自 `RandomInteger`\
  \ 类。\n*   在 `LocalInnerTest` 类中，你声明了一个 `RandomInteger` 类型的 `rLocal` 引用变量。\n\n```\n\
  \    // 使用 RandomIntegerLocal 类生成随机整数\n    RandomLocal local = new RandomLocal();\n\
  \    RandomInteger rLocal = local.getRandomInteger();\n    ```\n\n然而，在运行时，`rLocal`\
  \ 将接收到一个 `RandomIntegerLocal` 类的引用。由于 `getValue()` 方法在局部内部类中被重写，`rLocal` 对象将以不同的方式生成随机整数。\n\
  \n### 匿名内部类\n\n匿名内部类与局部内部类相同，但有一个区别：它没有名称。由于没有名称，它不能有构造方法。回想一下，构造方法名称与类名相同。你可能会想，如果匿名类没有构造方法，如何创建它的对象。匿名类是一次性类。你可以在定义匿名类的同时创建它的对象。你不能创建匿名类的多个对象。由于匿名类的声明和其对象的创建是交织在一起的，匿名类总是作为表达式的一部分使用\
  \ `new` 运算符创建。创建匿名类及其对象的一般语法如下：\n\n```\nnew  () {\n// 匿名类的主体写在这里\n}\n```\n\n`new`\
  \ 运算符用于创建匿名类的实例。它后面跟着一个现有的接口名或现有的类名。请注意，接口名或类名不是新创建的匿名类的名称。相反，它是一个现有的接口/类名称。如果使用接口名，则匿名类实现该接口。如果使用类名，则匿名类继承自该类。\n\
  \n`<argument-list>` 仅在 `new` 运算符后面跟着类名时使用。如果 `new` 运算符后面跟着接口名，则它留空。如果存在 `<argument-list>`，它包含要调用的现有类构造方法的实际参数列表。匿名类的主体照常写在花括号内。为简单起见，前面的语法可以分解为两种：第一种语法用于匿名类实现接口时，第二种语法用于匿名类继承类时。\n\
  \n```\nnew Interface() {\n// 匿名类的主体写在这里\n}\n```\n\n以及\n\n```\nnew Superclass() {\n\
  // 匿名类的主体写在这里\n}\n```\n\n匿名类非常强大。然而，其语法不易阅读，且有些违反直觉。为了更好的可读性，匿名类的主体应该简短。让我们从一个简单的匿名类示例开始。你将使你的匿名类继承自\
  \ `Object` 类，如下所示：\n\n```\nnew Object() {\n// 匿名类的主体写在这里\n}\n```\n\n这是你在 Java 中可以拥有的最简单的匿名类。它被创建，然后悄无声息地匿名消亡！\n\
  \n现在，你想在创建匿名类对象时打印一条消息。匿名类没有构造方法。你应该把打印消息的代码放在哪里？回想一下，类的所有实例初始化器在创建该类的对象时都会被调用。因此，在你的情况下，你可以使用实例初始化器来打印消息。以下代码片段展示了带有实例初始化器的匿名类：\n\
  \n```\nnew Object() {\n// 一个实例初始化器\n{\nSystem.out.println (\"来自匿名类的问候。\");\n}\n\
  }\n```\n\n清单 2-9 包含一个简单匿名类的完整代码，它在标准输出上打印一条消息。\n\n```\n// HelloAnonymous.java\n\
  package com.jdojo.innerclasses;\npublic class HelloAnonymous {\npublic static void\
  \ main(String[] args) {\nnew Object() {\n// 一个实例初始化器\n{\nSystem.out.println (\"\
  来自匿名类的问候。\");\n}\n}; // 需要分号来结束语句\n}\n}\n来自匿名类的问候。\n清单 2-9.\n一个匿名类示例\n```\n\n由于匿名内部类与没有类名的局部类相同，你也可以通过将局部内部类替换为匿名内部类来实现清单\
  \ 2-4 和清单 2-5 中的示例。清单 2-10 重写了 `TitleList` 类的代码以使用匿名类。你会注意到清单 2-4 和清单 2-10 中 `titleIterator()`\
  \ 方法内部的语法差异。使用匿名类时，为了更好的可读性，正确缩进代码非常重要。你可以通过在清单 2-5 中将 `TitleList` 替换为 `TitleListWithInnerClass`\
  \ 来测试 `TitleListWithInnerClass`，你将得到相同的输出。\n\n```\n// TitleListWithInnerClass.java\n\
  package com.jdojo.innerclasses;\nimport java.util.ArrayList;\nimport java.util.Iterator;\n\
  public class TitleListWithInnerClass {\nprivate final ArrayList titleList = new\
  \ ArrayList();\npublic void addTitle(String title) {\ntitleList.add(title);\n}\n\
  public void removeTitle(String title) {\ntitleList.remove(title);\n}\npublic Iterator\
  \ titleIterator() {\n// 一个匿名类\nIterator iterator  = new Iterator() {\nint count\
  \ = 0;\n@Override\npublic boolean hasNext() {\nreturn (count < titleList.size());\n\
  }\n@Override\npublic String next() {\nreturn titleList.get(count++);\n}\n}; // 匿名内部类在此结束\n\
  return iterator;\n}\n}\n清单 2-10.\n使用匿名类将 TitleList 类重写为 TitleListWithInnerClass\n\
  ```\n\n`TitleListWithInnerClass` 的 `titleIterator()` 方法有两个语句。第一个语句创建一个匿名类的对象并将该对象的引用存储在\
  \ `iterator` 变量中。第二个语句返回存储在 `iterator` 变量中的对象引用。在这种情况下，你可以将这两个语句合并为一个语句。清单 2-7 中所示的\
  \ `getRandomInteger()` 方法可以使用匿名类重写如下：\n\n```\npublic RandomInteger getRandomInteger()\
  \ {\n// 继承自 RandomInteger 类的匿名内部类\nreturn new RandomInteger() {\npublic int getValue()\
  \ {\n// 获取两个随机整数并返回忽略小数部分的平均值\nlong n1 = rand.nextInt();\nlong n2 = rand.nextInt();\n\
  int value = (int)((n1 + n2)/2);\nreturn value;\n}\n};\n}\n```\n\n\n\n## 静态成员类不是内部类\n\
  \n在另一个类体内定义的成员类可以声明为静态的。以下代码片段声明了一个顶级类 `A` 和一个静态成员类 `B`：\n\n```\npackage com.jdojo.innerclasses;\n\
  public class A {\n// 一个静态成员类\npublic static class B {\n// 类 B 的主体在此处\n}\n}\n```\n\
  \n静态成员类不是内部类。它被视为一个顶级类，也被称为嵌套顶级类。由于它是顶级类，你无需创建其外部类的实例即可创建它的对象。类 `A` 的实例和类 `B` 的实例可以独立存在，因为两者都是顶级类。静态成员类可以声明为\
  \ `public`、`protected`、包级私有或 `private`，以限制其在外部类之外的可访问性。\n\n如果静态成员类不过是另一个顶级类，那它有什么用呢？使用静态成员类有两个优点：\n\
  \n*   静态成员类可以访问其外部类的静态成员，包括私有静态成员。在你的示例中，如果类 `A` 有任何静态成员，这些静态成员可以在类 `B` 内部被访问。然而，类\
  \ `B` 不能访问类 `A` 的任何实例成员，因为类 `B` 的实例可以在没有类 `A` 实例的情况下存在。\n*   包通过提供命名空间充当顶级类的容器。在一个命名空间内，所有实体必须具有唯一名称。拥有静态成员类的顶级类提供了额外的命名空间层。静态成员类是其外部顶级类的直接成员，而不是声明它的包的成员。在你的示例中，类\
  \ `A` 是包 `com.jdojo.innerclasses` 的成员，而类 `B` 是类 `A` 的成员。类 `A` 的完全限定名是 `com.jdojo.innerclasses.A`。类\
  \ `B` 的完全限定名是 `com.jdojo.innerclasses.A.B`。这样，顶级类可用于将定义为其静态成员类的相关类分组在一起。\n\n静态成员类的对象的创建方式与使用\
  \ `new` 运算符创建顶级类对象的方式相同。要创建类 `B` 的对象，你可以这样写：\n\n```\nA.B bReference = new A.B();\n\
  ```\n\n由于类 `B` 的简单名称在类 `A` 内部的作用域内，你可以在类 `A` 内部使用其简单名称来创建其对象，如下所示：\n\n```\n// 此语句出现在类\
  \ A 的代码中\nB bReference2 = new B();\n```\n\n你也可以通过导入 `com.jdojo.innerclasses.A.B`\
  \ 类，在类 `A` 外部使用简单名称 `B`。然而，在类 `A` 外部使用简单名称 `B` 并不直观。这会给读者一种印象，即类 `B` 是一个顶级类，而不是嵌套顶级类。为了更好的可读性，你应该在类\
  \ `A` 外部使用 `A.B` 来表示类 `B`。清单 2-11 声明了两个静态成员类 `Monitor` 和 `Keyboard`，它们的外部类是 `ComputerAccessory`。清单\
  \ 2-12 展示了如何创建这些静态成员类的对象。\n\n```\n// ComputerAccessory.java\npackage com.jdojo.innerclasses;\n\
  public class ComputerAccessory {\n// 一个静态成员类 - Monitor\npublic static class Monitor\
  \ {\nprivate final int size;\npublic Monitor(int size) {\nthis.size = size;\n}\n\
  public String toString() {\nreturn \"Monitor - Size:\" + this.size + \" inch\";\n\
  }\n}\n// 一个静态成员类 - Keyboard\npublic static class Keyboard {\nprivate final int keys;\n\
  public Keyboard(int keys) {\nthis.keys = keys;\n}\npublic String toString() {\n\
  return \"Keyboard - Keys:\" + this.keys;\n}\n}\n}\n清单 2-11.\n声明静态成员类的示例\n```\n\n\
  ```\n// ComputerAccessoryTest.java\npackage com.jdojo.innerclasses;\npublic class\
  \ ComputerAccessoryTest {\npublic static void main(String[] args) {\n// 创建两个显示器\n\
  ComputerAccessory.Monitor m17 = new ComputerAccessory.Monitor(17);\nComputerAccessory.Monitor\
  \ m19 = new ComputerAccessory.Monitor(19);\n// 创建两个键盘\nComputerAccessory.Keyboard\
  \ k122 = new ComputerAccessory.Keyboard(122);\nComputerAccessory.Keyboard k142 =\
  \ new ComputerAccessory.Keyboard(142);\nSystem.out.println(m17);\nSystem.out.println(m19);\n\
  System.out.println(k122);\nSystem.out.println(k142);\n}\n}\nMonitor - Size:17 inch\n\
  Monitor - Size:19 inch\nKeyboard - Keys:122\nKeyboard - Keys:142\n清单 2-12.\n使用静态成员类的示例\n\
  ```\n\n\n\n## 创建内部类的对象\n\n创建局部内部类、匿名类和静态成员类的对象是直接了当的。局部内部类的对象是在声明该类的块内部使用 `new`\
  \ 运算符创建的。匿名类的对象在声明该类的同时被创建。静态成员类是另一种顶层类。创建静态成员类对象的方式与创建顶层类对象的方式相同。\n\n请注意，要拥有成员内部类、局部内部类和匿名类的对象，你必须拥有一个外围类的对象。在之前的局部内部类和匿名内部类的示例中，你将这些类放在了实例方法内部。你拥有一个外围类的实例，并在该实例上调用了那些实例方法。因此，那些局部内部类和匿名内部类的实例拥有它们被调用时所依赖的外围类实例。例如，在清单\
  \ 2-5 中，首先创建了一个 `TitleList` 类的实例，并将其引用存储在 `t1` 中，如下所示：\n\n```\nTitleList tl = new\
  \ TitleList();\n```\n\n为了获取 `t1` 的迭代器，你调用了 `titleIterator()` 方法：\n\n```\nIterator\
  \ iterator = tl.titleIterator();\n```\n\n方法调用 `t1.titleIterator()` 在 `titleIterator()`\
  \ 方法内部创建了一个 `TitleIterator` 局部内部类的实例，如下所示：\n\n```\nTitleIterator titleIterator =\
  \ new TitleIterator();\n```\n\n这里，`titleIterator` 是局部内部类的一个实例，它存在于 `t1` 内部，而 `t1`\
  \ 是其外围类的一个实例。这种关系适用于所有内部类，如图 2-1 所示。\n\n![A323070_2_En_2_Fig1_HTML.gif](img/A323070_2_En_2_Fig1_HTML.gif)\n\
  \n图 2-1.\n\n内部类实例与其外围类实例之间的关系 注意\n\n在某些情况下，局部内部类或匿名内部类的存在并不需要外围类的实例。当局部内部类或匿名内部类在静态上下文中定义时，例如在静态方法或静态初始化器中，就会发生这种情况。我将在本章后面讨论这些情况。\n\
  \n成员内部类的实例始终存在于其外围类的实例内部。`new` 运算符用于创建成员内部类的实例，但其语法略有不同。创建成员内部类实例的通用语法如下：\n\n```\n\
  outerClassReference.new MemberInnerClassConstructor()\n```\n\n这里，`outerClassReference`\
  \ 是外围类的引用，后跟一个点，再后跟 `new` 运算符。成员内部类的构造函数调用跟在 `new` 运算符之后。让我们重新审视成员内部类的第一个示例，如下所示：\n\
  \n```\npackage com.jdojo.innerclasses;\npublic class Outer {\npublic class Inner\
  \ {\n}\n}\n```\n\n要创建 `Inner` 成员内部类的实例，你必须首先创建其外围类 `Outer` 的一个实例：\n\n```\nOuter\
  \ out = new Outer();\n```\n\n现在，你需要在 `out` 引用变量上使用 `new` 运算符来创建 `Inner` 类的对象。\n\n\
  ```\nout.new Inner();\n```\n\n要将 `Inner` 成员内部类实例的引用存储在一个引用变量中，你可以编写以下语句：\n\n```\n\
  Outer.Inner in = out.new Inner();\n```\n\n在 `new` 运算符之后，你总是使用构造函数名称，该名称与成员内部类的简单类名相同。由于\
  \ `new` 运算符已经用外围实例引用进行了限定（如 `out.new`），Java 编译器会自动推断出外围类的完全限定名。在创建内部类实例时，用其外部类名限定内部类构造函数会导致编译时错误。以下语句将导致编译时错误：\n\
  \n```\nOuter.Inner in = out.new Outer.Inner(); // 编译时错误\n```\n\n考虑以下具有多层嵌套内部类的类声明：\n\
  \n```\npackage com.jdojo.innerclasses;\npublic class OuterA {\npublic class InnerA\
  \ {\npublic class InnerAA {\npublic class InnerAAA {\n}\n}\n}\n}\n```\n\n要创建 `InnerAAA`\
  \ 的实例，你必须拥有一个 `InnerAA` 的实例。要创建 `InnerAA` 的实例，你必须拥有一个 `InnerA` 的实例。要创建 `InnerA`\
  \ 的实例，你必须拥有一个 `OuterA` 的实例。因此，要创建 `InnerAAA` 的实例，你必须从创建 `OuterA` 的实例开始。重要的一点是，要创建成员内部类的实例，你必须拥有其直接外围类的实例。以下代码片段说明了如何创建\
  \ `InnerAAA` 的实例：\n\n```\nOuterA outa = new OuterA();\nOuterA.InnerA ina = outa.new\
  \ InnerA();\nOuterA.InnerA.InnerAA inaa = ina.new InnerAA();\nOuterA.InnerA.InnerAA.InnerAAA\
  \ inaaa = inaa.new InnerAAA();\n```\n\n清单 2-13 使用了清单 2-3 中名为 `Car.Tire` 的成员内部类，以说明创建成员内部类实例所需的步骤。\n\
  \n```\n// CarTest.java\npackage com.jdojo.innerclasses;\npublic class CarTest {\n\
  public static void main(String[] args) {\n// 创建一个年份为 2018 的 Car 实例\nCar c = new\
  \ Car(2018);\n// 为该车创建一个半径为 9.0 英寸的 Tire\nCar.Tire t = c.new Tire(9.0);\nSystem.out.println(\"\
  车的年份: \" + c.getYear());\nSystem.out.println(\"车的轮胎半径: \" + t.getRadius());\n}\n\
  }\n车的年份: 2018\n车的轮胎半径: 9.0\n清单 2-13.\n创建成员内部类的对象\n```\n\n\n\n## 访问外部类成员\n\n内部类可以访问其外部类的所有实例成员、实例字段和实例方法。清单\
  \ 2-14 声明了一个名为 `Outer` 的类和一个名为 `Inner` 的成员内部类。\n\n```\n// Outer.java\npackage com.jdojo.innerclasses;\n\
  public class Outer {\nprivate int value = 1116;\n// Inner 类从这里开始\npublic class Inner\
  \ {\npublic void printValue() {\nSystem.out.println(\"Inner: value = \" + value);\n\
  }\n} // Inner 类在这里结束\n// Outer 类的一个实例方法\npublic void printValue() {\nSystem.out.println(\"\
  Outer: value = \" + value);\n}\n// Outer 类的另一个实例方法\npublic void setValue(int newValue)\
  \ {\nthis.value = newValue;\n}\n}\n清单 2-14.\n从内部类访问外部类的实例成员\n```\n\n`Outer` 类有一个名为\
  \ `value` 的 `private` 实例变量，初始化为 1116。它还定义了两个实例方法：`printValue()` 和 `setValue()`。`Inner`\
  \ 类也定义了一个名为 `printValue()` 的实例方法，该方法打印其外部类 `Outer` 的 `value` 实例变量的值。\n\n清单 2-15\
  \ 创建了一个 `Inner` 类的实例并调用其 `printValue()` 方法。输出显示，内部类实例可以访问其外部实例 `out` 的实例变量 `value`。\n\
  \n```\n// OuterTest.java\npackage com.jdojo.innerclasses;\npublic class OuterTest\
  \ {\npublic static void main(String[] args) {\nOuter out = new Outer();\nOuter.Inner\
  \ in = out.new Inner();\n// 打印值\nout.printValue();\nin.printValue();\n// 设置新值\n\
  out.setValue(828);\n// 打印值\nout.printValue();\nin.printValue();\n}\n}\nOuter: value\
  \ = 1116\nInner: value = 1116\nOuter: value = 828\nInner: value = 828\n清单 2-15.\n\
  测试访问其外部类实例成员的内部类\n```\n\n让我们通过向内部类添加一个名为 `value` 的实例变量来让事情变得稍微复杂一些。我们将这两个类命名为 `Outer2`\
  \ 和 `Inner2`，如清单 2-16 所示。请注意，`Outer2` 和 `Inner2` 类的实例变量名称相同，都是 `value`。\n\n```\n\
  // Outer2.java\npackage com.jdojo.innerclasses;\npublic class Outer2 {\n// Outer2\
  \ 类的一个实例变量\nprivate int value = 1116;\n// Inner2 类从这里开始\npublic class Inner2 {\n\
  // Inner2 类的一个实例变量\nprivate int value = 1720;\npublic void printValue() {\nSystem.out.println(\"\
  Inner2: value = \" + value);\n}\n} // Inner2 类在这里结束\n// Outer2 类的一个实例方法\npublic\
  \ void printValue() {\nSystem.out.println(\"Outer2: value = \" + value);\n}\n//\
  \ Outer2 类的另一个实例方法\npublic void setValue(int newValue) {\nthis.value = newValue;\n\
  }\n}\n清单 2-16.\n成员内部类与其外部类具有相同的实例变量名\n```\n\n如果你运行清单 2-17 中所示的 `Outer2Test` 类，其输出与你在清单\
  \ 2-15 中运行 `OuterTest` 类时的输出不同。\n\n```\n// Outer2Test.java\npackage com.jdojo.innerclasses;\n\
  public class Outer2Test {\npublic static void main(String[] args) {\nOuter2 out\
  \ = new Outer2();\nOuter2.Inner2 in = out.new Inner2();\n// 打印值\nout.printValue();\n\
  in.printValue();\n// 设置新值\nout.setValue(828);\n// 打印值\nout.printValue();\nin.printValue();\n\
  }\n}\nOuter2: value = 1116\nInner2: value = 1720\nOuter2: value = 828\nInner2: value\
  \ = 1720\n清单 2-17.\n测试访问其外部类实例成员的内部类\n```\n\n请注意，输出发生了变化。第一次打印值时，`Outer2` 类的实例打印\
  \ 1116，而 `Inner2` 类的实例打印 1720。在使用 `out.setValue(828)` 设置新值后，`Outer2` 类的实例打印新值 828，而\
  \ `Inner2` 类的实例仍然打印 1720。为什么输出会不同？\n\n要完全理解这个输出，你需要理解当前实例和关键字 `this` 的概念。到目前为止，你了解到关键字\
  \ `this` 指的是类的当前实例。例如，在 `Outer2` 类的 `setValue()` 实例方法内部，`this.value` 指的是 `Outer`\
  \ 类当前实例的 `value` 字段。\n\n你需要根据类的实例来修正关键字 `this` 的含义。关键字 `this` 指的是当前实例，这个含义在你只处理顶级类的实例时是足够的。在处理仅包含顶级类的情况下，当一段代码被执行时，上下文中只有一个当前实例。在这种情况下，你可以使用关键字\
  \ `this` 来限定实例成员名称，以引用该类的实例成员。你也可以使用类名来限定关键字 `this`，以引用上下文中的类实例。例如，在 `Outer2` 类的\
  \ `setValue()` 方法内部，除了写 `this.value`，你还可以写 `Outer2.this.value`。如果在非静态上下文中，类内部使用的变量名是实例变量名，则关键字\
  \ `this` 的使用是隐式的。也就是说，在非静态上下文中，类内部使用变量的简单名称会引用该类的实例变量，除非该变量隐藏了其超类中同名的实例变量。单独使用关键字\
  \ `this` 以及使用类名限定它的用法在清单 2-18 中进行了说明。清单 2-19 中的程序测试了关键字 `this` 概念的使用。\n\n```\n//\
  \ QualifiedThis.java\npackage com.jdojo.innerclasses;\npublic class QualifiedThis\
  \ {\n// 实例变量 - value\nprivate int value = 828;\npublic void printValue() {\n// 使用实例变量的简单名称打印值\n\
  System.out.println(\"value = \" + value);\n// 使用关键字 this 打印值\nSystem.out.println(\"\
  this.value = \" + this.value);\n// 使用类名限定的关键字 this 打印值\nSystem.out.println(\"QualifiedThis.this.value\
  \ = \" + QualifiedThis.this.value);\n}\npublic void printHiddenValue() {\n// 声明一个名为\
  \ value 的局部变量，它隐藏了 value 实例变量\nint value = 131;\n// 使用简单名称打印值，它引用局部变量 - 131\nSystem.out.println(\"\
  value = \" + value);\n// 使用关键字 this 打印值，它引用值为 828 的实例变量 value\nSystem.out.println(\"\
  this.value = \" + this.value);\n// 使用类名限定的关键字 this 打印值，它引用值为 828 的实例变量 value\nSystem.out.println(\"\
  QualifiedThis.this.value = \" + QualifiedThis.this.value);\n}\n}\n清单 2-18.\n使用类名限定的关键字\
  \ this\n```\n\n```\n// QualifiedThisTest.java\npackage com.jdojo.innerclasses;\n\
  public class QualifiedThisTest {\npublic static void main(String[] args) {\nQualifiedThis\
  \ qt = new QualifiedThis();\nSystem.out.println(\"printValue():\");\nqt.printValue();\n\
  System.out.println(\"\\nprintHiddenValue():\");\nqt.printHiddenValue();\n}\n}\n\
  printValue():\nvalue = 828\nthis.value = 828\nQualifiedThis.this.value = 828\nprintHiddenValue():\n\
  value = 131\nthis.value = 828\nQualifiedThis.this.value = 828\n清单 2-19.\n测试使用类名限定的关键字\
  \ this\n```\n\n如果实例变量的名称未被隐藏，你可以通过以下三种方式之一来引用它：\n\n\n\n*   使用简单名称，例如 `value`\n*\
  \   使用带关键字 `this` 限定的简单名称，例如 `this.value`\n*   使用带类名和关键字 `this` 限定的简单名称，例如 `QualifiedThis.this.value`\n\
  \n如果实例变量名被隐藏，则必须使用关键字 `this` 或类名以及关键字 `this` 来限定其名称。内部类中的代码总是在多个当前实例的上下文中执行。当前实例的数量取决于内部类的嵌套层级。考虑以下类声明：\n\
  \n```\npublic class TopLevelOuter {\nprivate int v1 = 100;\n// 此处，只有 v1 在作用域内\n\
  public class InnerLevelOne {\nprivate int v2 = 200;\n// 此处，只有 v1 和 v2 在作用域内\npublic\
  \ class InnerLevelTwo {\nprivate int v3 = 300;\n// 此处，只有 v1、v2 和 v3 在作用域内\npublic\
  \ class InnerLevelThree {\nprivate int v4 = 400;\n// 此处，v1、v2、v3 和 v4 都在作用域内\n}\n\
  }\n}\n}\n```\n\n当执行 `InnerLevelThree` 类的代码时，存在四个当前实例：一个属于 `InnerLevelThree` 类，另外三个分别属于它的三个外层类。当执行\
  \ `InnerLevelTwo` 类的代码时，存在三个当前实例：一个属于 `InnerLevelTwo` 类，另外两个分别属于它的两个外层类。当执行 `InnerLevelOne`\
  \ 类的代码时，存在两个当前实例：一个属于 `InnerLevelOne` 类，另一个属于它的外层类。当执行 `TopLevelOuter` 类的代码时，只有一个当前实例，因为它是一个顶层类。当执行内部类的代码时，所有当前实例的所有实例成员、实例变量和方法都在作用域内，除非被局部变量声明隐藏。\n\
  \n前面的示例通过注释指出了哪些实例变量在内部类的作用域内。当实例成员在内部类中被隐藏时，你始终可以通过使用带类名限定的关键字 `this` 来引用被隐藏的成员。清单\
  \ 2-20 是清单 2-16 的修改版本。它演示了如何使用带关键字 `this` 的类名来引用内部类外层类的实例成员。清单 2-21 包含用于测试 `ModifiedOuter2`\
  \ 类的代码。\n\n```\n// ModifiedOuter2.java\npackage com.jdojo.innerclasses;\npublic\
  \ class ModifiedOuter2 {\n// ModifiedOuter2 类的实例变量\nprivate int value = 1116;\n\
  // Inner 类从这里开始\npublic class Inner {\n// Inner 类的实例变量\nprivate int value = 1720;\n\
  public void printValue() {\nSystem.out.println(\"\\nInner - printValue()...\");\n\
  System.out.println(\"Inner: value = \" + value);\nSystem.out.println(\"Outer: value\
  \ = \" + ModifiedOuter2.this.value);\n}\n} // Inner 类在这里结束\n// ModifiedOuter2 类的实例方法\n\
  public void printValue() {\nSystem.out.println(\"\\nOuter - printValue()...\");\n\
  System.out.println(\"Outer: value = \" + value);\n}\n// ModifiedOuter2 类的另一个实例方法\n\
  public void setValue(int newValue) {\nSystem.out.println(\"\\nSetting Outer's value\
  \ to \" + newValue);\nthis.value = newValue;\n}\n}\n清单 2-20.\n使用带类名限定的关键字 this\n\
  ```\n\n```\n// ModifiedOuter2Test.java\npackage com.jdojo.innerclasses;\npublic\
  \ class ModifiedOuter2Test {\npublic static void main(String[] args) {\nModifiedOuter2\
  \ out = new ModifiedOuter2();\nModifiedOuter2.Inner in = out.new Inner();\n// 打印值\n\
  out.printValue();\nin.printValue();\n// 设置新值\nout.setValue(828);\n// 打印值\nout.printValue();\n\
  in.printValue();\n}\n}\nOuter - printValue()...\nOuter: value = 1116\nInner - printValue()...\n\
  Inner: value = 1720\nOuter: value = 1116\nSetting Outer's value to 828\nOuter -\
  \ printValue()...\nOuter: value = 828\nInner - printValue()...\nInner: value = 1720\n\
  Outer: value = 828\n清单 2-21.\n测试 ModifiedOuter2 类\n```\n\n注意\n\nJava 限制你不能将内部类命名为与其外层类相同的名称。这是为了让内部类能够使用带关键字\
  \ `this` 的外层类名来访问其外层类中被隐藏的成员。\n\n## 访问局部变量的限制\n\n局部内部类是在一个块内声明的——通常是在类的方法内部。局部内部类可以访问其外层类的实例变量以及作用域内的局部变量。内部类的实例存在于其外层类的实例内部。因此，在局部内部类中访问外层类的实例变量没有问题，因为它们在局部内部类实例的整个生命周期内都存在。然而，方法中的局部变量仅在该方法执行期间存在。当方法执行结束时，所有局部变量都变得不可访问。Java\
  \ 会复制局部内部类中使用的局部变量，并将该副本与内部类对象一起存储。但是，为了确保在方法调用结束后，在局部内部类代码中访问这些局部变量时其值能够被重现，Java\
  \ 施加了一个限制：局部变量必须是**实际不可变的**。实际不可变的变量是指在初始化后其值不会改变的变量。使变量成为实际不可变的一种方法是将其声明为 `final`。另一种方法是在初始化后不改变其值。因此，如果局部变量或方法参数在局部内部类中使用，则它必须是实际不可变的。此限制也适用于在方法内部声明的匿名内部类。\n\
  \n提示\n\n在 Java 8 之前，如果局部变量在局部内部类或匿名类中被访问，则必须将其声明为 `final`。Java 8 更改了这一规则：局部变量不必声明为\
  \ `final`，但应该是实际不可变的。\n\n清单 2-22 中的程序演示了在局部内部类中访问局部变量的规则。`main()` 方法声明了两个名为 `x`\
  \ 和 `y` 的局部变量。这两个变量都是实际不可变的。变量 `x` 在初始化后从未改变，变量 `y` 无法改变，因为它被声明为 `final`。\n\n```\n\
  // AccessingLocalVariables.java\npackage com.jdojo.innerclasses;\npublic class AccessingLocalVariables\
  \ {\npublic static void main(String... args) {\nint x = 100;\nfinal int y = 200;\n\
  class LocalInner {\nvoid print() {\n// 访问局部变量 x 没问题，因为它是实际不可变的。\nSystem.out.println(\"\
  x = \" + x);\n// 局部变量 y 是实际不可变的，因为它已被声明为 final。\nSystem.out.println(\"y = \" + y);\n\
  }\n}\n/* 取消下面语句的注释将使变量 x 不再是实际不可变的变量，\n并且 LocalInner 类将无法编译。\n*/\n// x = 100;\n\
  LocalInner li = new LocalInner();\nli.print();\n}\n}\nx = 100\ny = 200\n清单 2-22.\n\
  在局部类内部访问局部变量\n```\n\n\n\n## 内部类与继承\n\n内部类可以继承自另一个内部类、顶层类或其外部类。例如，在以下代码片段中，内部类 `C`\
  \ 继承自内部类 `B`；内部类 `D` 继承自其外部顶层类 `A`；内部类 `F` 继承自内部类 `A.B`：\n\n```\npublic class A\
  \ {\npublic class B {\n}\npublic class C extends B {\n}\npublic class D extends\
  \ A {\n}\n}\npublic class E extends A {\npublic class F extends B {\n}\n}\n```\n\
  \n当你想从一个内部类继承一个顶层类时，情况会变得更加棘手：\n\n```\npublic class G extends A.B {\n// 此代码无法编译\n\
  }\n```\n\n在讨论这段代码为何无法编译之前，请回想一下，在创建内部类的实例之前，你必须先拥有其外部类的一个实例。在这种情况下，如果你想创建类 `G` 的实例（使用\
  \ `new G()`），你也必须（间接地）创建 `A.B` 的一个实例，因为 `A.B` 是其父类。这里，`A.B` 是一个内部类。因此，为了创建内部类 `A.B`\
  \ 的实例，你必须拥有其外部类 `A` 的一个实例。所以，在创建类 `G` 的实例之前，你必须先创建类 `A` 的一个实例。你还必须让类 `G` 能够访问到类\
  \ `A` 的实例，以便在创建其子类 `G` 的实例时，该实例能作为 `A.B` 实例的外部实例。Java 编译器强制执行此规则。在这种情况下，你必须为类 `G`\
  \ 声明一个构造函数，该构造函数接受一个类 `A` 的实例，并在该实例上调用父类的构造函数。之前的类 `G` 声明必须修改为如下形式：\n\n```\npublic\
  \ class G extends A.B {\npublic G(A a) {\na.super(); // 必须是第一条语句\n}\n}\n```\n\n\
  要创建类 `G` 的实例，你应该遵循两个步骤：\n\n```\n// 首先创建类 A 的一个实例\nA a = new A();\n// 将类 A 的实例传递给\
  \ G 的构造函数\nG g = new G(a);\n```\n\n你可以将这两个语句合并为一个：\n\n```\nG g = new G(new A());\n\
  ```\n\n请注意，在 `G` 的构造函数内部，你添加了一条语句：`a.super()`。编译器要求这必须是第一条语句。在编译时，编译器会将 `a.super()`\
  \ 修改为 `super(a)`。这里，`super(a)` 意味着调用其父类（即类 `B`）的构造函数，并传递类 `A` 的引用。换句话说，通过这种编码规则，Java\
  \ 编译器确保在创建类 `B` 的实例时，其构造函数能够获得其外部类 `A` 的引用。\n\n让我们将示例中类 `E` 的声明修改如下：\n\n```\n//\
  \ 以下代码无法编译\npublic class E {\npublic class F extends A.B {\n}\n}\n```\n\n这段代码将无法编译。要创建内部类\
  \ `F` 的实例，你需要一个 `A.B` 的实例，而这又需要一个类 `A` 的实例。在之前的情况下，`E` 继承自 `A`。因此，可以保证在创建 `E` 的实例时，类\
  \ `A` 的一个实例是存在的。只有当拥有其祖先 `A.B` 的外部类 `A` 的实例时，才能创建 `F` 的实例。当 `E` 继承自 `A` 时，可以保证在创建\
  \ `E` 的实例时，你总是拥有类 `A` 的一个实例。要使这段代码工作，你需要应用与类 `G` 相同的逻辑。你需要为类 `F` 声明一个构造函数，该构造函数接受一个类\
  \ `A` 的实例作为参数，如下所示：\n\n```\n// 以下代码可以编译\npublic class E {\npublic class F extends\
  \ A.B {\npublic F(A a) {\na.super(); // 必须是第一条语句\n}\n}\n}\n```\n\n## 内部类中不能有静态成员\n\
  \nJava 中的关键字 `static` 使一个构造成为顶层构造。因此，你不能为内部类声明任何静态成员（字段、方法或初始化器）。以下代码将无法编译，因为内部类\
  \ `B` 声明了一个静态字段 `DAYS_IN_A_WEEK`：\n\n```\npublic class A {\npublic class B {\n//\
  \ 不能有以下声明\npublic static int DAYS_IN_A_WEEK = 7; // 编译时错误\n}\n}\n```\n\n然而，允许在内部类中拥有作为编译时常量的静态字段。\n\
  \n```\npublic class A {\npublic class B {\n// 可以拥有编译时的静态常量字段\npublic final static\
  \ int DAYS_IN_A_WEEK = 7; // 正确\n// 不能有以下声明，因为它不是编译时常量，即使它是 final 的\npublic final\
  \ static String str = new String(\"Hello\");\n}\n}\n```\n\n提示\n\n成员接口和成员枚举是隐式静态的，因此，它们不能在内部类内部声明。\n\
  \n## 内部类生成的类文件\n\n每个内部类都会被编译成一个独立的类文件。生成的类文件名称遵循命名约定。成员内部类和嵌套类的类文件名格式如下：\n\n```\n\
  <外部类名>$<内部类名>.class\n```\n\n局部内部类的类文件名格式如下：\n\n```\n<外部类名>$<编号>$<局部内部类名>.class\n\
  ```\n\n匿名类的类文件名格式如下：\n\n```\n<外部类名>$<编号>.class\n```\n\n类文件名中的 `<编号>` 是一个从 1 开始顺序生成的数字，用于避免任何名称冲突。当你编译清单\
  \ 2-23 中的源代码时，会生成以下九个类文件，一个用于顶层类，八个用于内部类：\n\n*   `InnerClassFile.class`\n*   `InnerClassFile$MemberInnerClass.class`\n\
  *   `InnerClassFile$NestedClass.class`\n*   `InnerClassFile$1$LocalInnerClass.class`\n\
  *   `InnerClassFile$1$LocalInnerClass$LocalInnerClass2.class`\n*   `InnerClassFile$1$AnotherLocalInnerClass.class`\n\
  *   `InnerClassFile$1.class`\n*   `InnerClassFile$2$AnotherLocalInnerClass.class`\n\
  *   `InnerClassFile$1$TestLocalClass.class`\n\n```\n// InnerClassFile.java\npackage\
  \ com.jdojo.innerclasses;\npublic class InnerClassFile {\npublic class MemberInnerClass\
  \ {\n}\npublic static class NestedClass {\n}\npublic void testMethod1() {\n// 一个局部类\n\
  class LocalInnerClass {\n// 一个局部类\nclass LocalInnerClass2 {\n}\n}\n// 一个局部类\nclass\
  \ AnotherLocalInnerClass {\n}\n// 匿名内部类\nnew Object() {\n};\n}\npublic void testMethod2()\
  \ {\n// 一个局部类。其名称与 testMethod1() 方法中的局部类相同\nclass AnotherLocalInnerClass {\n}\n\
  // 另一个局部类\nclass TestLocalClass {\n}\n}\n}\n清单 2-23.\n一个用于生成内部类文件名的示例\n```\n\n\n\
  \n## 内部类与编译器的魔法\n\n内部类是借助编译器实现的。编译器通过修改你的代码并添加新代码，在幕后完成了内部类所提供的所有功能。以下是一个最简单的内部类示例：\n\
  \n```\npublic class Outer {\npublic class Inner {\n}\n}\n```\n\n当 `Outer` 类被编译时，会生成两个类文件：`Outer.class`\
  \ 和 `Outer$Inner.class`。如果你反编译这两个类文件，会得到如下输出。你可以使用任何可用的类文件反编译器。互联网上可以免费获取一些 Java\
  \ 类文件反编译器。你也可以使用 JDK 自带的 `javap` 工具来反编译类文件。`javap` 工具位于你机器上的 `JAVA_HOME\\bin` 文件夹中，其中\
  \ `JAVA_HOME` 是 JDK 的安装目录。\n\n```\n// 从 Outer.class 文件反编译的代码\npublic class Outer\
  \ {\npublic Outer() {\n}\n}\n// 从 Outer$Inner.class 文件反编译的代码\npublic class Outer$Inner\
  \ {\nfinal Outer this$0;\npublic Outer$Inner(Outer outer) {\nthis$0 = outer;\nsuper();\n\
  }\n}\n```\n\n在反编译的代码中可以观察到以下几点：\n\n*   像往常一样，编译器为 `Outer` 类提供了一个默认构造函数，因为你在源代码中没有提供。\n\
  *   `Inner` 类的定义已从 `Outer` 类的主体中完全移除。因此，`Inner` 类在其编译后的形式中成为了一个独立的类。根据本章前面讨论的规则，其类名被更改为\
  \ `Outer$Inner`。仅通过查看 `Outer$Inner` 类的定义，没有人能注意到 `Outer$Inner` 是一个内部类。\n*   在 `Inner`\
  \ 类定义中（反编译代码中的 `Outer$Inner` 类），编译器添加了一个名为 `this$0` 的实例变量，其类型是其外部类类型 `Outer`（参见反编译代码中的声明\
  \ `\"final Outer this$0;\"`）。\n\n由于你没有为 `Inner` 类包含任何构造函数，你可能期望编译器会添加一个默认构造函数。然而，情况并非如此。对于内部类，如果你没有提供构造函数，编译器会包含一个带有一个参数的构造函数。参数类型与其外部类相同。如果你为内部类包含了一个构造函数，编译器会为你包含的所有构造函数添加一个参数。该参数被添加到构造函数参数列表的开头。参数类型与外部类类型相同。考虑以下\
  \ `Inner` 类的声明：\n\n```\npublic class Outer {\npublic class Inner {\npublic Inner(int\
  \ a) {\n}\n}\n}\n```\n\n现在编译器会向其构造函数添加一个额外的参数，如下所示：\n\n```\npublic class Outer$Inner\
  \ {\nfinal Outer this$0;\npublic Outer$Inner(Outer outer, int i) {\nthis$0 = outer;\n\
  super();\n}\n}\n```\n\n编译后的 `Inner` 类的构造函数体如下：\n\n```\nthis$0 = outer;\nsuper();\n\
  ```\n\n第一条语句将构造函数的参数（即对其外部类实例的引用）赋值给实例变量。第二条语句调用 `Inner` 类的父类（此处为 `Object` 类）的默认构造函数。回想一下，如果在类的构造函数中调用了父类的构造函数，它必须是构造函数中的第一条语句。然而，对于合成的内部类，它却是第二条语句，如上所示。你能想到为什么对祖先构造函数的调用被放在第二条语句而不是第一条语句吗？\n\
  \n让我们向外部类添加一个实例变量，并在内部类中访问该实例变量。为了保持示例简单，我们在 `Inner` 类中添加了一个新的 `getValue()` 方法来访问\
  \ `Outer` 类中名为 `dummy` 的实例变量。修改后的代码如下：\n\n```\npublic class Outer {\nint dummy =\
  \ 101;\npublic class Inner {\npublic int getValue() {\n// 访问 Outer 类的 dummy 字段\n\
  int x = dummy + 200;\nreturn x;\n}\n}\n}\n```\n\n`Outer.class` 和 `Outer$Inner.class`\
  \ 文件的反编译代码如下：\n\n```\n// 从 Outer.class 文件反编译的代码\npublic class Outer {\nint dummy\
  \ = 0;\npublic Outer() {\ndummy = 101;\n}\n}\n// 从 Outer$Inner.class 文件反编译的代码\n\
  public class Outer$Inner {\nfinal Outer this$0;\npublic Outer$Inner(Outer outer)\
  \ {\nthis$0 = outer;\nsuper();\n}\npublic int getValue() {\nint x = this$0.dummy\
  \ + 200;\nreturn x;\n}\n}\n```\n\n注意在 `Inner` 类的 `getValue()` 方法中使用了 `this$0.dummy`\
  \ 来访问 `Outer` 类的实例变量。`Outer` 类中的 `dummy` 实例变量具有包级访问权限。由于内部类始终与其外部类属于同一个包，这种从外部引用\
  \ `Outer` 类实例变量的方法可以正常工作。但是，如果实例变量 `dummy` 被声明为 `private`，`Outer$Inner` 类代码就不能像上一个示例那样直接引用它。编译器使用另一种方式来从内部类访问外部类的私有实例变量。以下是修改后的代码以及\
  \ `Outer` 和 `Inner` 类对应的反编译代码：\n\n```\n// 修改后的 Outer 类代码，将 dummy 声明为私有实例变量\npublic\
  \ class Outer {\nprivate int dummy = 101; // 将 dummy 声明为 private\npublic class Inner\
  \ {\npublic int getValue() {\nint x = dummy + 200; // 访问 Outer 的 dummy 字段\nreturn\
  \ x;\n}\n}\n}\n// 从 Outer.class 文件反编译的代码\npublic class Outer {\nprivate int dummy\
  \ = 0;\npublic Outer() {\ndummy = 101;\n}\n// 编译器添加的用于访问 dummy 私有字段的方法\nstatic int\
  \ access$000(Outer outer) {\nreturn outer.dummy;\n}\n}\n// 从 Outer$Inner.class 文件反编译的代码\n\
  public class Outer$Inner {\nfinal Outer this$0;\npublic Outer$Inner(Outer outer)\
  \ {\nthis$0 = outer;\nsuper();\n}\npublic int getValue() {\nint x = Outer.access$000(this$0)\
  \ + 200;\nreturn x;\n}\n}\n```\n\n注意，编译器向 `Outer` 类添加了一个新的静态方法，声明如下：\n\n```\nstatic\
  \ int access$000(Outer outer)\n```\n\n对于在内部类中访问的每个私有实例变量，编译器都会向外部类添加一个新方法。`access$000()`\
  \ 方法被称为合成方法，因为它是由编译器合成的。编译器为每个合成方法设置一个标志，以防止从源代码直接访问这些方法。另一个值得注意的区别是，在 `Inner` 类的\
  \ `getValue()` 方法内部，编译器使用了合成方法 `Outer.access$000(this$0)` 来访问 `Outer` 类的 `dummy`\
  \ 实例变量。\n\n编译器为了实现内部类做了很多事情。要了解更多关于内部类实现细节的信息，你可以编写内部类；编译代码以生成类文件；然后反编译生成的类文件，查看编译器所做的工作。\n\
  \n\n\n## 闭包与回调\n\n在函数式编程中，高阶函数是一种可被视为数据对象的匿名函数。也就是说，它可以存储在变量中，并在不同上下文之间传递。它可能会在并非定义它的上下文中被调用。请注意，高阶函数是匿名函数，因此调用上下文无需知道其名称。闭包是与其定义环境打包在一起的高阶函数。闭包携带了其定义时作用域内的变量，即使它在不同于定义时的上下文中被调用，也能访问这些变量。\n\
  \n在面向对象编程中，函数被称为方法，并且它始终是类的一部分。Java 中的匿名类允许将方法封装在一个对象中，该对象可以像高阶函数一样被处理。该对象可以存储在变量中，并在不同方法之间传递。在匿名类中定义的方法可以在不同于其定义时的上下文中被调用。然而，高阶函数与匿名类中定义的方法之间有一个重要区别：高阶函数是匿名的，而匿名类中的方法是有名称的。匿名类方法的调用者必须知道该方法名。匿名类携带其环境。匿名类可以使用其定义所在方法内部的局部变量和参数。但是，Java\
  \ 施加了一个限制：如果在匿名类内部访问局部变量和方法参数，这些变量和参数必须是**有效最终（effectively final）** 的。\n\n回调机制可以使用匿名类和接口来实现。在最简单的形式中，你注册一个实现了某个接口的对象。稍后会在该注册对象上调用（回调）一个特定的方法。让我们定义一个名为\
  \ `Callable` 的接口，其中包含一个名为 `call()` 的方法，如清单 2-24 所示。\n\n```\n// Callable.java\npackage\
  \ com.jdojo.innerclasses;\npublic interface Callable {\nvoid call();\n}\n清单 2-24.\n\
  用于实现回调机制的 Callable 接口\n```\n\n清单 2-25 中的 `CallbackTest` 类说明了回调机制的实现细节。`main()` 方法使用匿名内部类创建了三个\
  \ `Callable` 对象，并注册它们以便稍后调用。`register()` 方法注册一个 `Callable` 对象，并将该对象的引用存储在一个 `ArrayList`\
  \ 中，以便稍后可以执行这些对象的 `call()` 方法。`callback()` 方法通过调用所有已注册对象的 `call()` 方法来回调它们。\n\n\
  ```\n// CallbackTest.java\npackage com.jdojo.innerclasses;\nimport java.util.ArrayList;\n\
  public class CallbackTest {\n// 用于保存所有已注册的 Callable 对象\nprivate final ArrayList\
  \ callableList = new ArrayList();\npublic static void main(String[] args) {\nCallbackTest\
  \ cbt = new CallbackTest();\n// 创建三个 Callable 对象并注册它们\ncbt.register(new Callable()\
  \ {\n@Override\npublic void call() {\nSystem.out.println(\"Called #1\");\n}\n});\n\
  cbt.register(new Callable() {\n@Override\npublic void call() {\nSystem.out.println(\"\
  Called #2\");\n}\n});\ncbt.register(new Callable() {\n@Override\npublic void call()\
  \ {\nSystem.out.println(\"Called #3\");\n}\n});\n// 回调所有已注册的 Callable 对象\ncbt.callback();\n\
  }\nprivate void callback() {\n// 回调所有已注册的 Callable 对象\nfor (Callable c: callableList)\
  \ {\nc.call();\n}\n}\npublic void register(Callable c) {\nthis.callableList.add(c);\n\
  }\n}\nCalled #1\nCalled #2\nCalled #3\n清单 2-25.\n使用匿名类实现回调机制\n```\n\n本节描述的回调机制在\
  \ Java 中广泛用于使用 Swing 和 JavaFX 开发的 GUI 应用程序。\n\n注意\n\nJava 8 引入了 lambda 表达式，使得使用回调更加简洁。我将在第\
  \ 5 章讨论 lambda 表达式。\n\n## 在静态上下文中定义内部类\n\n你也可以在静态上下文中定义内部类，例如在静态方法或静态初始化器中。在静态上下文中不存在外部类的当前实例，因此这样的内部类无法访问外部类的实例字段。但是，所有静态字段成员对此类内部类都是可访问的。\n\
  \n```\npublic class Outer {\nstatic int k = 1001;\nint m = 9008;\npublic static\
  \ void staticMethod() {\n// 类 Inner 定义在静态上下文中\nclass Inner {\nint j = k; // 正确。引用静态字段\
  \ k\nint n = m; // 错误。引用非静态字段 m\n}\n}\n}\n```\n\n\n\n## 总结\n\n在另一个类内部声明的类称为内部类。声明内部类的类被称为外部类。内部类可以直接访问其外部类的所有成员。内部类的实例仅存在于外部类的实例中，除非它们在静态上下文中声明，例如在静态方法内部。\n\
  \n内部类有三种类型：成员内部类、局部内部类和匿名内部类。内部类在非静态上下文中声明。成员内部类在类内部声明的方式与声明类的成员字段或成员方法相同。它可以声明为`public`、`private`、`protected`或包级私有。局部内部类在代码块内部声明。其作用域仅限于声明它的代码块。匿名内部类与局部内部类类似，但有一个区别：它没有名称。匿名类是一次性类；它被声明的同时，该类的对象也被创建。\n\
  \n在另一个类内部作为静态成员声明的类简称为嵌套类。嵌套类可以访问外部类的静态成员。\n\n在内部类内部，关键字`this`引用的是内部类的当前实例。要引用外部类的当前实例，需要使用外部类的类名来限定关键字`this`。\n\
  \n你不能为内部类声明静态成员。这意味着接口和枚举不能声明为内部类的成员。\n\n问题与练习\n\n1.  什么是内部类？区分成员内部类、局部内部类和匿名内部类。\n\
  2.  如下声明的内部类`B`的完全限定名是什么？\n\n```\n    // A.java\n    package com.jdojo.innerclasses.exercises;\n\
  \    public class A {\n    public class B {\n    }\n    }\n    ```\n\n3.  考虑以下顶级类`Cup`和成员内部类`Handle`的声明：\n\
  \n```\n    // Cup.java\n    package com.jdojo.innerclasses.exercises;\n    public\
  \ class Cup {\n    public class Handle {\n    public Handle() {\n    System.out.println(\"\
  Created a handle for the cup\");\n    }\n    }\n    public Cup() {\n    System.out.println(\"\
  Created a cup\");\n    }\n    }\n    ```\n\n完成以下`CupTest`类的`main()`方法中的代码，该方法将创建一个`Cup.Handle`内部类的实例：\n\
  \n```\n    // CupTest.java\n    package com.jdojo.innerclasses.exercises;\n    public\
  \ class CupTest {\n    public static void main(String[] args) {\n    // 创建一个 Cup\n\
  \    Cup c = new Cup();\n    // 创建一个 Handle\n    Cup.Handle h = /* 在此处编写你的代码 */\
  \ ;\n    }\n    }\n    ```\n\n4.  运行以下`Outer`类时，输出是什么？\n\n```\n    // Outer.java\n\
  \    package com.jdojo.innerclasses.exercises;\n    public class Outer {\n    private\
  \ final int value = 19680112;\n    public class Inner {\n    private final int value\
  \ = 19690919;\n    public void print() {\n    System.out.println(\"Inner: value\
  \ = \" + value);\n    System.out.println(\"Inner: this.value = \" + this.value);\n\
  \    System.out.println(\"Inner: Inner.this.value = \" +\n    Inner.this.value);\n\
  \    System.out.println(\"Inner: Outer.this.value = \" +\n    Outer.this.value);\n\
  \    }\n    }\n    public void print() {\n    System.out.println(\"Outer: value\
  \ = \" + value);\n    System.out.println(\"Outer: this.value = \" + this.value);\n\
  \    System.out.println(\"Outer: Outer.this.value = \" +\n    Outer.this.value);\n\
  \    }\n    public static void main(String[] args) {\n    Outer out = new Outer();\n\
  \    Inner in = out.new Inner();\n    out.print();\n    in.print();\n    }\n   \
  \ }\n    ```\n\n5.  以下`AnonymousTest`类的声明无法编译。请描述原因以及修复该错误可能采取的步骤。\n\n```\n    //\
  \ AnonymousTest.java\n    package com.jdojo.innerclasses.exercises;\n    public\
  \ class AnonymousTest {\n    public static void main(String[] args) {\n    int x\
  \ = 100;\n    Object obj = new Object() {\n    {\n    System.out.println(\"Inside.\
  \ x = \" + x);\n    }\n    };\n    x = 300;\n    System.out.println(\"Outside. x\
  \ = \" + x);\n    }\n    }\n    ```\n\n6.  考虑以下顶级类`A`和成员内部类`B`的声明：\n\n```\n    //\
  \ A.java\n    package com.jdojo.innerclasses.exercises;\n    public class A {\n\
