- "# 3. 反射\n\n在本章中，你将学习：\n\n*   什么是反射\n*   什么是类加载器以及内置的类加载器\n*   如何使用反射在运行时获取类、构造函数、方法等信息\n\
  *   如何使用反射访问对象和类的字段\n*   如何使用反射创建类的对象\n*   如何使用反射调用类的方法\n*   如何使用反射创建数组\n\n本章中的大多数示例程序都是`jdojo.reflection`模块的成员，如清单\
  \ 3-1 所示。我在本章中使用了更多模块，稍后会展示。\n\n```\n// module-info.java\nmodule jdojo.reflection\
  \ {\nexports com.jdojo.reflection;\n}\n清单 3-1.\njdojo.reflection 模块的声明\n```\n\n\n\
  \n## 什么是反射？\n\n反射是程序在执行过程中，能够“以数据形式”查询和修改自身状态的能力。程序查询或获取自身信息的能力称为**自省**。程序修改其执行状态、修改自身解释或含义，或在执行过程中为程序添加新行为的能力称为**互操作**。反射进一步分为两类：\n\
  \n*   结构反射\n*   行为反射\n\n程序查询其数据和代码实现的能力称为**结构自省**，而修改或创建新数据结构与代码的能力称为**结构互操作**。\n\
  \n程序获取其运行时环境信息的能力称为**行为自省**，而修改运行时环境的能力称为**行为互操作**。\n\n为程序提供查询或修改自身状态的能力，需要一种将执行状态编码为数据的机制。换句话说，程序应能够将其执行状态表示为数据元素（如\
  \ Java 等面向对象语言中的对象），以便进行查询和修改。将执行状态编码为数据的过程称为**具体化**。如果一种编程语言为程序提供了反射能力，则称该语言为反射式语言。\n\
  \n## Java 中的反射\n\nJava 对反射的支持主要限于自省。它仅以非常有限的形式支持互操作。Java 提供的自省功能允许你在运行时获取对象的类信息。Java\
  \ 还允许你在运行时获取类的字段、方法、修饰符以及超类的信息。\n\nJava 提供的互操作功能允许你创建名称在运行时才确定的类的实例，调用此类实例的方法，并获取/设置其字段。然而，Java\
  \ 不允许你在运行时更改数据结构。例如，你不能在运行时为对象添加新字段或新方法。对象的所有字段始终在编译时确定。行为互操作的示例包括在运行时更改方法执行方式，或为类添加新方法。Java\
  \ 不提供任何这些互操作功能。也就是说，你不能在运行时更改类的方法代码以改变其执行行为，也不能在运行时为类添加新方法。\n\nJava 通过在运行时为类及其方法、构造函数、字段等提供对象表示来实现具体化。在大多数情况下，Java\
  \ 不支持泛型类型的具体化。Java 5 增加了对泛型类型的支持。有关泛型类型的更多详细信息，请参阅第 4 章。程序可以操作具体化后的对象，以获取运行时执行的相关信息。例如，你一直在使用\
  \ `java.lang.Class` 类的对象来获取对象的类信息。`Class` 对象是对象类字节码的具体化。当你想要收集对象所属类的信息时，无需关心实例化该对象的类的字节码。相反，Java\
  \ 将字节码具体化为 `Class` 类的对象。\n\nJava 中的反射功能通过反射 API 提供。大多数反射 API 类和接口位于 `java.lang.reflect`\
  \ 包中。`Class` 类是 Java 反射的核心，位于 `java.lang` 包中。表 3-1 列出了一些反射中常用的类。\n\n表 3-1. 反射中常用的类\n\
  \n| 类名 | 描述 |\n| --- | --- |\n| `Class` | 此类的对象表示由 JVM 中的类加载器加载的单个类。 |\n| `Field`\
  \ | 此类的对象表示类或接口的单个字段。此对象表示的字段可以是静态字段或实例字段。 |\n| `Constructor` | 此类的对象表示类的单个构造函数。\
  \ |\n| `Method` | 此类的对象表示类或接口的方法。此对象表示的方法可以是类方法或实例方法。 |\n| `Modifier` | 此类包含用于解码类及其成员访问修饰符的静态方法。\
  \ |\n| `Parameter` | 此类的对象表示方法的参数。 |\n| `Array` | 此类提供用于在运行时创建数组的静态方法。 |\n\n使用 Java\
  \ 中的反射功能，你可以执行以下操作：\n\n*   如果你有对象引用，可以确定该对象的类名。\n*   如果你有类名，可以了解其完整描述，例如包名、访问修饰符等。\n\
  *   如果你有类名，可以确定该类中定义的方法、它们的返回类型、访问修饰符、参数类型、参数名称等。对参数名称的支持是在 Java 8 中添加的。\n*   如果你有类名，可以确定该类的所有字段描述。\n\
  *   如果你有类名，可以确定该类中定义的所有构造函数。\n*   如果你有类名，可以使用其某个构造函数创建该类的对象。\n*   如果你有对象引用，只需知道方法名称和方法参数类型，即可调用其方法。\n\
  *   你可以在运行时获取或设置对象的状态。\n*   你可以在运行时动态创建某种类型的数组并操作其元素。\n\n## 加载类\n\n`Class<T>` 类是\
  \ Java 反射的核心。`Class<T>` 类是一个泛型类。它接受一个类型参数，该参数是 `Class` 对象所表示的类的类型。例如，`Class<String>`\
  \ 表示 `String` 类的类对象。`Class<?>` 表示一个类类型未知的类。\n\n`Class` 类让你能够在运行时发现关于一个类的所有信息。`Class`\
  \ 类的对象在运行时表示程序中的一个类。当你在程序中创建对象时，Java 会加载该类的字节码，并创建一个 `Class` 类的对象来表示该字节码。Java 使用该\
  \ `Class` 对象来创建该类的任何对象。无论你在程序中创建某个类的多少个对象，对于 JVM 中某个类加载器从一个模块加载的每个类，Java 只会创建一个\
  \ `Class` 对象。来自某个模块的每个类也只会被特定的类加载器加载一次。在 JVM 中，一个类由其全限定名、类加载器和模块唯一标识。如果两个不同的类加载器加载了同一个类，则这两个被加载的类被视为两个不同的类，它们的对象彼此不兼容。\n\
  \n你可以通过以下方式之一获取某个类的 `Class` 对象的引用：\n\n*   使用类字面常量\n*   使用 `Object` 类的 `getClass()`\
  \ 方法\n*   使用 `Class` 类的 `forName()` 静态方法\n\n\n\n### 使用类字面量\n\n类字面量是指类名或接口名后跟一个点号和单词“class”。例如，如果你有一个类\
  \ `Test`，它的类字面量就是 `Test.class`，你可以这样写：\n\n```\nClass testClass = Test.class;\n```\n\
  \n请注意，类字面量总是与类名一起使用，而不是与对象引用一起使用。以下获取类引用的语句是无效的：\n\n```\nTest t = new Test();\n\
  Class testClass = t.class; // 编译时错误。必须使用 Test.class\n```\n\n你还可以使用类字面量为基本数据类型和关键字\
  \ `void` 获取类对象，例如 `boolean.class`、`byte.class`、`char.class`、`short.class`、`int.class`、`long.class`、`float.class`、`double.class`\
  \ 和 `void.class`。这些基本数据类型的每个包装类都有一个名为 `TYPE` 的静态字段，该字段持有其所表示的基本数据类型的类对象的引用。因此，`int.class`\
  \ 和 `Integer.TYPE` 引用的是同一个类对象，表达式 `int.class == Integer.TYPE` 的计算结果为 `true`。表 3-2\
  \ 展示了所有基本数据类型和 `void` 关键字的类字面量。\n\n表 3-2.\n\n基本数据类型和 void 关键字的类字面量\n\n| 数据类型 | 基本类型类字面量\
  \ | 包装类静态字段 |\n| --- | --- | --- |\n| `boolean` | `boolean.class` | `Boolean.TYPE`\
  \ |\n| `byte` | `byte.class` | `Byte.TYPE` |\n| `char` | `char.class` | `Character.TYPE`\
  \ |\n| `short` | `short.class` | `Short.TYPE` |\n| `int` | `int.class` | `Integer.TYPE`\
  \ |\n| `long` | `long.class` | `Long.TYPE` |\n| `float` | `float.class` | `Float.TYPE`\
  \ |\n| `double` | `double.class` | `Double.TYPE` |\n| `void` | `void.class` | `Void.TYPE`\
  \ |\n\n### 使用 Object::getClass() 方法\n\n`Object` 类包含一个 `getClass()` 方法，该方法返回对象所属类的\
  \ `Class` 对象的引用。由于 Java 中的每个类都显式或隐式地继承自 `Object` 类，因此该方法在 Java 的每个类中都可用。该方法被声明为\
  \ final，因此没有子类可以重写它。例如，如果你有一个指向 `Test` 类对象的引用 `testRef`，你可以按如下方式获取 `Test` 类的 `Class`\
  \ 对象的引用：\n\n```\nTest testRef = new Test();\nClass testClass = testRef.getClass();\n\
  ```\n\n### 使用 Class::forName() 方法\n\n`Class` 类有一个 `forName()` 静态方法，该方法加载一个类并返回其\
  \ `Class` 对象的引用。它是一个重载方法。其声明如下：\n\n*   `Class<?> forName(String className) throws\
  \ ClassNotFoundException`\n*   `Class<?> forName(String className, boolean initialize,\
  \ ClassLoader loader) throws ClassNotFoundException`\n*   `Class<?> forName(Module\
  \ module, String className)`\n\n`forName(String className)` 方法接受要加载的类的完全限定名。它加载该类，对其进行初始化，并返回其\
  \ `Class` 对象的引用。如果该类已加载，它仅返回该类的 `Class` 对象的引用。\n\n`forName(String className, boolean\
  \ initialize, ClassLoader loader)` 方法允许你选择在加载类时是否对其进行初始化，以及由哪个类加载器来加载该类。如果无法加载该类，前两个版本的方法会抛出\
  \ `ClassNotFoundException`。\n\n`forName(Module module, String className)` 方法在指定的\
  \ `module` 中加载具有指定 `className` 的类，但不会初始化已加载的类。如果未找到该类，该方法返回 `null`。此方法是在 JDK9 中添加到\
  \ `Class` 类的。\n\n要加载名为 `pkg1.Test` 的类，你可以这样写：\n\n```\nClass testClass = Class.forName(\"\
  pkg1.Test\");\n```\n\n使用 `forName()` 方法获取 `Class` 对象引用时，你无需在运行时之前知道类的名称。`forName(String\
  \ className)` 方法会初始化该类（如果尚未初始化），而使用类字面量则不会初始化该类。当类被初始化时，其所有静态初始化器都会被执行，所有静态字段都会被初始化。清单\
  \ 3-2 列出了一个仅包含一个静态初始化器的 `Bulb` 类，该初始化器会在控制台打印一条消息。清单 3-3 使用了多种方法来加载和初始化 `Bulb` 类。\n\
  \n```\n// Bulb.java\npackage com.jdojo.reflection;\npublic class Bulb {\nstatic\
  \ {\n// 当此类被加载和初始化时，此代码将执行\nSystem.out.println(\"正在加载类 Bulb...\");\n}\n}\n清单 3-2.\n\
  用于演示类初始化的 Bulb 类\n```\n\n```\n// BulbTest.java\npackage com.jdojo.reflection;\n\
  public class BulbTest {\npublic static void main(String[] args) {\n/* 每次只取消注释以下语句之一。\n\
  观察输出，了解 Bulb 类被加载和初始化方式的差异。\n*/\nBulbTest.createObject();\n// BulbTest.forNameVersion1();\n\
  // BulbTest.forNameVersion2();\n// BulbTest.forNameVersion3();\n// BulbTest.classLiteral();\n\
  }\npublic static void classLiteral() {\n// 将加载该类，但不会初始化它。\nClass c = Bulb.class;\n\
  }\npublic static void forNameVersion1() {\ntry {\nString className = \"com.jdojo.reflection.Bulb\"\
  ;\n// 将加载并初始化该类\nClass c = Class.forName(className);\n} catch (ClassNotFoundException\
  \ e) {\nSystem.out.println(e.getMessage());\n}\n}\npublic static void forNameVersion2()\
  \ {\ntry {\nString className = \"com.jdojo.reflection.Bulb\";\nboolean initialize\
  \ = false;\n// 获取当前类的类加载器\nClassLoader cLoader = BulbTest.class.getClassLoader();\n\
  // 将加载该类，但不会初始化它，因为我们已将\n// initialize 变量设置为 false\nClass c = Class.forName(className,\
  \ initialize, cLoader);\n} catch (ClassNotFoundException e) {\nSystem.out.println(e.getMessage());\n\
  }\n}\npublic static void forNameVersion3() {\nString className = \"com.jdojo.reflection.Bulb\"\
  ;\n// 获取当前类的模块引用\nModule m = BulbTest.class.getModule();\n// 将加载该类，但不会初始化它\nClass\
  \ c = Class.forName(m, className);\nif(c == null) {\nSystem.out.println(\"Bulb 类未被加载。\"\
  );\n} else {\nSystem.out.println(\"Bulb 类已被加载。\");\n}\n}\npublic static void createObject()\
  \ {\n// 将加载并初始化 Bulb 类\nnew Bulb();\n}\n}\n清单 3-3.\n测试类的加载与初始化\n```\n\n```\n正在加载类\
  \ Bulb...\n```\n\n## 类加载器\n\n在运行时，每个类型都由一个类加载器加载，该类加载器由 `java.lang.ClassLoader`\
  \ 类的一个实例表示。你可以通过使用 `Class` 类的 `getClassLoader()` 方法获取某个类型的类加载器的引用。以下代码片段展示了如何获取\
  \ `Bulb` 类的类加载器：\n\n```\nClass cls = Bulb.class;\nClassLoader loader = cls.getClassLoader();\n\
  ```\n\n类加载器在 JDK9 中发生了一些变化。然而，类加载和类加载器的代码行为在 JDK9 中保持不变。以下部分描述了 JDK8 和 JDK9 中的类加载器。\n\
  \n\n\n### JDK8 中的类加载器\n\n在 JDK9 之前，运行时使用三个类加载器来加载类，如图 3-1 所示。箭头的方向表示委派方向。这些类加载器从不同的位置加载不同类型的类。你可以添加更多的类加载器，这些类加载器将是\
  \ `ClassLoader` 类的子类。使用自定义类加载器，你可以从自定义位置加载类、对用户代码进行分区以及卸载类。对于简单的应用程序，内置的类加载器就足够了。\n\
  \n![A323070_2_En_3_Fig1_HTML.gif](img/A323070_2_En_3_Fig1_HTML.gif)\n\n图 3-1.\n\n\
  9 版本之前 JDK 中的类加载器层次结构\n\n类加载器以层次结构方式工作——启动类加载器位于层次结构的顶部。一个类加载器将加载类的请求委派给其上级。例如，如果请求应用程序类加载器加载一个类，它会将该请求委派给扩展类加载器，而扩展类加载器又会将该请求委派给启动类加载器。如果启动类加载器无法加载该类，则扩展类加载器会尝试加载它。如果扩展类加载器无法加载该类，则应用程序类加载器会尝试加载它。如果应用程序类加载器也无法加载，则会抛出\
  \ `ClassNotFoundException`。\n\n启动类加载器是扩展类加载器的父加载器。扩展类加载器是应用程序类加载器的父加载器。启动类加载器没有父加载器。默认情况下，应用程序类加载器将成为你创建的任何额外类加载器的父加载器。\n\
  \n提示\n\n你可以通过使用 `ClassLoader` 类的 `getParent()` 方法来获取类加载器父加载器的引用。\n\n启动类加载器加载构成 Java\
  \ 平台的启动类，包括 `JAVA_HOME\\lib\\rt.jar` 和其他几个运行时 JAR 中的类。它完全在虚拟机中实现。你可以使用 `-Xbootclasspath/p`\
  \ 和 `-Xbootclasspath/a` 命令行选项来前置和追加额外的启动目录。你可以使用 `-Xbootclasspath` 选项指定一个启动类路径，该路径将替换默认的启动类路径。在运行时，`sun.boot.class.path`\
  \ 系统属性包含启动类路径的只读值。启动类加载器由 `null` 表示。也就是说，你无法获取其引用。例如，`Object` 类由启动类加载器加载，表达式 `Object.class.getClassLoader()`\
  \ 返回 `null`。\n\n扩展类加载器用于加载通过扩展机制可用的类，这些类位于由 `java.ext.dirs` 系统属性指定的目录中的 JAR 文件中。要获取扩展类加载器的引用，你需要获取应用程序类加载器的引用（见下一段），并在该引用上使用\
  \ `getParent()` 方法。\n\n应用程序类加载器从应用程序类路径加载类，该路径由 `CLASSPATH` 环境变量或命令行选项 `-cp` 或 `-classpath`\
  \ 指定。应用程序类加载器也称为系统类加载器，这种叫法有些用词不当，会让人误以为它加载系统类。你可以使用 `ClassLoader` 类的名为 `getSystemClassLoader()`\
  \ 的静态方法来获取应用程序类加载器的引用。\n\n### JDK9 中的类加载器\n\n为了向后兼容，JDK9 保留了三级层次结构的类加载器架构。但是，它们从模块系统加载类的方式有一些变化。图\
  \ 3-2 展示了 JDK9 的类加载器层次结构。\n\n![A323070_2_En_3_Fig2_HTML.gif](img/A323070_2_En_3_Fig2_HTML.gif)\n\
  \n图 3-2.\n\nJDK9 中的类加载器层次结构\n\n请注意，在 JDK9 中，应用程序类加载器可以委派给平台类加载器以及启动类加载器；平台类加载器可以委派给应用程序类加载器。\n\
  \n在 JDK9 中，启动类加载器在库代码和虚拟机中实现。为了向后兼容，它在程序中仍然由 `null` 表示。例如，`Object.class.getClassLoader()`\
  \ 仍然返回 `null`。并非所有 Java SE 平台和 JDK 模块都由启动类加载器加载。举几个例子，由启动类加载器加载的模块有 `java.base`、`java.logging`、`java.prefs`\
  \ 和 `java.desktop`。其他 Java SE 平台和 JDK 模块由接下来要描述的平台类加载器和应用程序类加载器加载。用于指定启动类路径的选项 `-Xbootclasspath`\
  \ 和 `-Xbootclasspath/p`，以及系统属性 `sun.boot.class.path`，在 JDK9 中不再受支持。`-Xbootclasspath/a`\
  \ 选项仍然受支持，其值存储在系统属性 `jdk.boot.class.path.append` 中。\n\nJDK9 不再支持扩展机制。但是，它保留了扩展类加载器，并赋予其一个新名称：平台类加载器。`ClassLoader`\
  \ 类包含一个名为 `getPlatformClassLoader()` 的新静态方法，该方法返回平台类加载器的引用。表 3-3 列出了由平台类加载器加载的模块。\n\
  \n表 3-3.\n\nJDK9 中由平台类加载器加载的 JDK 模块\n\n| `java.activation` | `java.transaction`\
  \ | `jdk.deploy` |\n| --- | --- | --- |\n| `java.compiler` | `java.xml.bind` | `jdk.dynalink`\
  \ |\n| `java.corba` | `java.xml.crypto` | `jdk.localedata` |\n| `java.scripting`\
  \ | `java.xml.ws` | `jdk.naming.dns` |\n| `java.se` | `java.xml.ws.annotation` |\
  \ `jdk.scripting.nashorn` |\n| `java.se.ee` | `jdk.accessibility` | `jdk.security.auth`\
  \ |\n| `java.security.jgss` | `jdk.charsets` | `jdk.security.jgss` |\n| `java.smartcardio`\
  \ | `jdk.crypto.cryptoki` | `jdk.zipfs` |\n| `java.sql` | `jdk.crypto.ec` |   |\n\
  | `java.sql.rowset` | `jdk.crypto.mscapi` |   |\n\n平台类加载器还有另一个用途。由启动类加载器加载的类默认被授予所有权限。但是，有几个类并不需要所有权限。这些类在\
  \ JDK9 中已被降权，并由平台类加载器加载。\n\n应用程序类加载器加载在模块路径上找到的应用程序模块，以及表 3-4 中列出的一些提供工具或导出工具 API\
  \ 的 JDK 模块。在 JDK9 中，你仍然可以使用 `ClassLoader` 类的名为 `getSystemClassLoader()` 的静态方法来获取应用程序类加载器的引用。\n\
  \n表 3-4.\n\nJDK9 中由应用程序类加载器加载的 JDK 模块\n\n| `jdk.attach` | `jdk.internal.le` | `jdk.jdi`\
  \ |\n| --- | --- | --- |\n| `jdk.compiler` | `jdk.internal.opt` | `jdk.jdwp.agent`\
  \ |\n| `jdk.editpad` | `jdk.jartool` | `jdk.jlink` |\n| `jdk.internal.ed` | `jdk.javadoc`\
  \ | `jdk.jshell` |\n| `jdk.internal.jvmstat` | `jdk.jdeps` | `jdk.jstatd` |\n\n\
  提示\n\n在 JDK9 之前，扩展类加载器和应用程序类加载器是 `java.net.URLClassLoader` 类的实例。在 JDK9 中，平台类加载器（即先前的扩展类加载器）和应用程序类加载器是内部\
  \ JDK 类的实例。如果你的代码依赖于 `URLClassLoader` 类特有的方法，你的代码在 JDK9 中可能会出错。\n\n\n\n表 3-3 和表\
  \ 3-4 中未列出的 JDK 模块由启动类加载器加载。清单 3-4 展示了如何打印模块名称及其类加载器名称。输出结果部分显示，具体内容取决于运行时解析的模块。若要打印所有\
  \ JDK 模块及其类加载器，应在运行此类之前，在模块声明中添加`\"requires java.se.ee\"`。我将在第 15 章讨论模块层。\n\n```\n\
  // ModulesByClassLoader.java\npackage com.jdojo.reflection;\npublic class ModulesByClassLoader\
  \ {\npublic static void main(String[] args) {\n// 获取启动层\nModuleLayer layer = ModuleLayer.boot();\n\
  // 打印启动层中所有模块的名称及其类加载器名称\nfor (Module m : layer.modules()) {\nClassLoader loader\
  \ = m.getClassLoader();\nString moduleName = m.getName();\nString loaderName = loader\
  \ == null ? \"bootstrap\" : loader.getName();\nSystem.out.printf(\"%s: %s%n\", loaderName,\
  \ moduleName);\n}\n}\n}\n清单 3-4.\n按类加载器列出已加载模块的名称\n```\n\n```\nplatform: java.xml.ws\n\
  app: jdk.compiler\nplatform: java.transaction\nplatform: jdk.naming.dns\nbootstrap:\
  \ java.datatransfer\nbootstrap: jdk.jfr\napp: jdk.jlink\n...\n```\n\nJDK9 中的类加载机制略有变化。三个内置类加载器协同工作以加载类。当应用类加载器需要加载一个类时，它会搜索所有类加载器定义的模块。如果某个合适的模块定义在这些类加载器之一中，则该类加载器会加载这个类，这意味着应用类加载器现在可以委托给启动类加载器和平台类加载器。如果在这些类加载器定义的命名模块中未找到类，应用类加载器会委托给其父加载器（即平台类加载器）。如果类仍未加载，应用类加载器会搜索类路径。如果在类路径上找到该类，则将其作为自身未命名模块的成员加载。如果在类路径上未找到该类，则会抛出`ClassNotFoundException`。\n\
  \n当平台类加载器需要加载一个类时，它会搜索所有类加载器定义的模块。如果某个合适的模块定义在这些类加载器之一中，则该类加载器会加载这个类，这意味着平台类加载器可以委托给启动类加载器以及应用类加载器。如果在这些类加载器定义的命名模块中未找到类，平台类加载器会委托给其父加载器（即启动类加载器）。\n\
  \n当启动类加载器需要加载一个类时，它会搜索自身的命名模块列表。如果未找到类，它会搜索通过命令行选项`-Xbootclasspath/a`指定的文件和目录列表。如果在启动类路径上找到类，则将其作为自身未命名模块的成员加载。如果仍未找到类，则会抛出`ClassNotFoundException`。\n\
  \n## 反射类\n\n本节演示了 Java 反射的功能，使您能够获取类的描述信息，例如其包名、访问修饰符等。您将使用清单 3-5 中列出的`Person`类来演示反射特性。这是一个简单的类，包含两个实例字段、两个构造方法和一些方法。它实现了两个接口。\n\
  \n```\n// Person.java\npackage com.jdojo.reflection;\nimport java.io.Serializable;\n\
  public class Person implements Cloneable, Serializable {\nprivate int id = -1;\n\
  private String name = \"Unknown\";\npublic Person() {\n}\npublic Person(int id,\
  \ String name) {\nthis.id = id;\nthis.name = name;\n}\npublic int getId() {\nreturn\
  \ id;\n}\npublic String getName() {\nreturn name;\n}\npublic void setName(String\
  \ name) {\nthis.name = name;\n}\n@Override\npublic Person clone() {\ntry {\nreturn\
  \ (Person) super.clone();\n} catch (CloneNotSupportedException e) {\nthrow new RuntimeException(e.getMessage());\n\
  }\n}\n@Override\npublic String toString() {\nreturn \"Person: id=\" + this.id +\
  \ \", name=\" + this.name;\n}\n}\n清单 3-5.\n用于演示反射的 Person 类\n```\n\n清单 3-6 演示了如何获取类的描述信息。它列出了类的访问修饰符、类名、其超类名称以及该类实现的所有接口。\n\
  \n\n\n```\n// ClassReflection.java\npackage com.jdojo.reflection;\nimport java.lang.reflect.Modifier;\n\
  import java.lang.reflect.TypeVariable;\npublic class ClassReflection {\npublic static\
  \ void main(String[] args) {\n// 打印 Person 类的声明\nString clsDecl = getClassDescription(Person.class);\n\
  System.out.println(clsDecl);\n// 打印 Class 类的声明\nclsDecl = getClassDescription(Class.class);\n\
  System.out.println(clsDecl);\n// 打印 Runnable 接口的声明\nclsDecl = getClassDescription(Runnable.class);\n\
  System.out.println(clsDecl);\n// 打印表示 int 数据类型的类的声明\nclsDecl = getClassDescription(int.class);\n\
  System.out.println(clsDecl);\n}\npublic static String getClassDescription(Class\
  \ cls) {\nStringBuilder classDesc = new StringBuilder();\n// 准备修饰符和构造关键字（class,\
  \ enum, interface 等）\nint modifierBits = 0;\nString keyword = \"\";\n// 添加关键字 @interface,\
  \ interface 或 class\nif (cls.isPrimitive()) {\n// 我们不想添加任何内容\n} else if (cls.isInterface())\
  \ {\nmodifierBits = cls.getModifiers() & Modifier.interfaceModifiers();\n// 注解是一种接口\n\
  if (cls.isAnnotation()) {\nkeyword = \"@interface\";\n} else {\nkeyword = \"interface\"\
  ;\n}\n} else if (cls.isEnum()) {\nmodifierBits = cls.getModifiers() & Modifier.classModifiers();\n\
  keyword = \"enum\";\n} else {\nmodifierBits = cls.getModifiers() & Modifier.classModifiers();\n\
  keyword = \"class\";\n}\n// 将修饰符转换为其字符串表示形式\nString modifiers = Modifier.toString(modifierBits);\n\
  // 追加修饰符\nclassDesc.append(modifiers);\n// 追加构造关键字\nclassDesc.append(\" \");\nclassDesc.append(keyword);\n\
  // 追加简单名称\nString simpleName = cls.getSimpleName();\nclassDesc.append(\" \");\n\
  classDesc.append(simpleName);\n// 追加泛型参数\nString genericParms = getGenericTypeParams(cls);\n\
  classDesc.append(genericParms);\n// 追加父类\nClass superClass = cls.getSuperclass();\n\
  if (superClass != null) {\nString superClassSimpleName = superClass.getSimpleName();\n\
  classDesc.append(\" extends \");\nclassDesc.append(superClassSimpleName);\n}\n//\
  \ 追加接口\nString interfaces = ClassReflection.getClassInterfaces(cls);\nif (interfaces\
  \ != null) {\nclassDesc.append(\" implements \");\nclassDesc.append(interfaces);\n\
  }\nreturn classDesc.toString().trim();\n}\npublic static String getClassInterfaces(Class\
  \ cls) {\n// 获取该类实现的接口列表，以逗号分隔\nClass[] interfaces = cls.getInterfaces();\nif (interfaces.length\
  \ == 0) {\nreturn null;\n}\nString[] names = new String[interfaces.length];\nfor\
  \ (int i = 0; i < interfaces.length; i++) {\nnames[i] = interfaces[i].getSimpleName();\n\
  }\nreturn String.join(\", \", names);\n}\npublic static String getGenericTypeParams(Class\
  \ cls) {\nStringBuilder sb = new StringBuilder();\nTypeVariable[] typeParms = cls.getTypeParameters();\n\
  if (typeParms.length == 0) {\nreturn \"\";\n}\nString[] paramNames = new String[typeParms.length];\n\
  for (int i = 0; i < typeParms.length; i++) {\nparamNames[i] = typeParms[i].getName();\n\
  }\nsb.append(\"<\");\nsb.append(String.join(\",\", paramNames));\nsb.append('>');\n\
  return sb.toString();\n}\n}\n清单 3-6.\n反射一个类\n```\n\n```\npublic class Person extends\
  \ Object implements Cloneable, Serializable\npublic final class Class extends Object\
  \ implements Serializable, GenericDeclaration, Type, AnnotatedElement\npublic abstract\
  \ interface Runnable\nint\n```\n\n`Class` 类的 `getName()` 方法返回类的完全限定名。要获取类的简单名称，请使用\
  \ `Class` 类的 `getSimpleName()` 方法，如下所示：\n\n```\nString simpleName = c.getSimpleName();\n\
  ```\n\n类的修饰符是类声明中出现在关键字 `class` 之前的那些关键字。在以下示例中，`public` 和 `abstract` 是 `MyClass`\
  \ 类的修饰符：\n\n```\npublic abstract class MyClass {\n// 代码写在这里\n}\n```\n\n`Class` 类的\
  \ `getModifiers()` 方法返回该类的所有修饰符。请注意，`getModifiers()` 方法返回一个整数。要获取修饰符的文本形式，你需要调用\
  \ `Modifier` 类的 `toString(int modifiers)` 静态方法，并将修饰符值以整数形式传入。假设 `cls` 是一个 `Class`\
  \ 对象的引用，你可以按如下方式获取该类的修饰符：\n\n```\n// 你需要将 getModifiers() 方法的返回值与\n// Modifiers 类的\
  \ xxxModifiers() 方法返回的适当值进行按位与运算\nint mod = cls.getModifiers() & Modifier.classModifiers();\n\
  String modStr = Modifier.toString(mod);\n```\n\n获取一个类的父类名称很简单。使用 `Class` 类的 `getSuperclass()`\
  \ 方法来获取父类的引用。请注意，在 Java 中，除了 `Object` 类之外，每个类都有一个父类。如果在 `Object` 类上调用 `getSuperclass()`\
  \ 方法，它将返回 `null`。\n\n```\nClass superClass = cls.getSuperclass();\nif (superClass\
  \ != null) {\nString superClassName = superClass.getSimpleName();\n}\n```\n\n提示\n\
  \n当 `Class` 类的 `getSuperclass()` 方法表示 `Object` 类、表示接口的类（例如 `List.class`）以及表示基本类型的类（例如\
  \ `int.class`、`void.class` 等）时，它会返回 `null`。\n\n要获取一个类实现的所有接口的名称，你可以使用 `Class` 类的\
  \ `getInterfaces()` 方法。它返回一个 `Class` 对象数组。数组中的每个元素代表该类实现的一个接口。\n\n```\n// 获取 cls\
