  \ `FileFilter` 的一个实例表示。它包含一个 `accept()` 方法，该方法将正在列出的 `File` 作为参数，如果该 `File` 应该被列出，则返回\
  \ `true`。返回 `false` 则不会列出该文件。以下代码片段创建了一个文件过滤器，用于过滤扩展名为 `.SYS` 的文件：\n\n```\n// 创建一个文件过滤器以排除任何\
