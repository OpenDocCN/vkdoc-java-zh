  \ 2\n\n*   如何使用文件系统和文件存储\n\n*   如何使用 `Path` 表示平台相关的抽象路径名\n\n*   如何对 `Path` 对象执行不同的文件操作\n\
  \n*   如何遍历文件树\n\n*   如何管理文件属性\n\n*   如何监视目录的更改\n\n*   如何执行异步文件 I/O 操作\n\n本章中的所有示例程序都是\
  \ `jdojo.nio2` 模块的成员，如清单 10-1 所示。JDK9 模块系统不鼓励在模块名称末尾包含数字。然而，`jdojo.nio2`（注意名称末尾的\
  \ `2`）是我能赋予此模块的最佳名称，因为它包含新输入/输出 2 主题的示例。\n\n```\n// module-info.java\nmodule jdojo.nio2\
  \ {\nexports com.jdojo.nio2;\n}\n清单 10-1.\njdojo.nio2 模块的声明\n```\n\n什么是新输入/输出 2？\n\
  \nJava 7 引入了新输入/输出 2 (NIO.2) API，它提供了一种新的 I/O API。它提供了原始文件 I/O API 中缺少的许多功能。NIO.2\
  \ 提供的功能对于高效使用文件系统至关重要。它向 Java 类库添加了三个包：`java.nio.file`、`java.nio.file.attribute`\
  \ 和 `java.nio.file.spi`。以下是 NIO.2 的一些新功能：\n\n*   它允许你以统一的方式处理所有文件系统。NIO.2 提供的文件系统支持是可扩展的。你可以使用文件系统的默认实现，也可以选择实现自己的文件系统。\n\
  \n*   它支持所有文件系统上的基本文件操作（复制、移动和删除）。它支持原子文件移动操作。它具有改进的异常处理支持。\n\n*   它支持符号链接。在适用的情况下，对符号链接的操作会重定向到目标文件。\n\
  \n*   NIO.2 最重要的新增功能之一是支持访问文件系统和文件的属性。\n\n*   它允许你创建监视服务来监视目录上的任何事件，例如添加新文件或子目录、删除文件等。当目录上发生此类事件时，你的程序会通过监视服务收到通知。\n\
  \n*   它添加了一个 API，允许你遍历文件树。你可以在遍历文件树时对节点执行文件操作。\n\n*   它支持网络套接字和文件上的异步 I/O。\n\n*\
  \   它支持使用 `DatagramChannel` 进行多播。\n\n使用文件系统\n\n在 Java 程序中，`FileSystem` 类的对象表示文件系统。`FileSystem`\
  \ 对象用于执行两项任务：\n\n*   充当 Java 程序和文件系统之间的接口。\n\n*   充当工厂，用于创建多种类型的文件系统相关对象和服务。\n\n\
  `FileSystem` 对象是平台相关的。你不直接创建 `FileSystem` 类的对象。要获取平台的默认 `FileSystem` 对象，需要使用 `FileSystems`\
  \ 类的 `getDefault()` 静态方法，如下所示：\n\n```\n// 创建平台特定的默认文件系统对象\nFileSystem fs = FileSystems.getDefault();\n\
  ```\n\n通常，文件系统由一个或多个文件存储组成。文件存储为文件提供存储空间。`FileSystem` 类的 `getFileStores()` 方法返回一个\
  \ `Iterable<FileStore>`，你可以使用它来遍历文件系统的所有文件存储。\n\n文件系统在不同平台上的表示方式可能不同。一个平台可能将文件系统表示为具有一个顶级根目录的单一文件层次结构，而另一个平台可能将其表示为具有多个顶级目录的多个文件层次结构。`FileSystem`\
  \ 类的 `getRootDirectories()` 方法返回一个 `Iterable<Path>`，可用于遍历文件系统中所有顶级目录的路径。我将在下一节详细讨论\
  \ `Path` 类。\n\n你可以使用 `FileSystem` 对象的 `isReadOnly()` 方法来测试它是否只允许对文件存储进行只读访问。在后续章节中，你将使用\
  \ `FileSystem` 类来创建文件系统相关的对象和服务。\n\n\n\n清单 10-2 演示了如何使用 `FileSystem` 对象。它使用了平台的默认文件系统。输出结果显示了在\
  \ Windows 上运行程序时的文件系统信息；当你运行该程序时，可能会得到不同的输出。\n\n```\n// FileSystemTest.java\npackage\
  \ com.jdojo.nio2;\nimport java.nio.file.FileStore;\nimport java.nio.file.FileSystem;\n\
  import java.nio.file.FileSystems;\nimport java.nio.file.Path;\nimport java.io.IOException;\n\
  public class FileSystemTest {\npublic static void main(String[] args) {\n// 获取默认文件系统的引用\n\
  FileSystem fs = FileSystems.getDefault();\nSystem.out.println(\"只读文件系统: \" + fs.isReadOnly());\n\
  System.out.println(\"文件名分隔符: \" + fs.getSeparator());\nSystem.out.println(\"\\n\
  \ 可用的文件存储区如下\");\nfor (FileStore store : fs.getFileStores()) {\nprintDetails(store);\n\
  }\nSystem.out.println(\"\\n 可用的根目录如下\");\nfor (Path root : fs.getRootDirectories())\
  \ {\nSystem.out.println(root);\n}\n}\npublic static void printDetails(FileStore\
  \ store) {\ntry {\nString desc = store.toString();\nString type = store.type();\n\
  long totalSpace = store.getTotalSpace();\nlong unallocatedSpace = store.getUnallocatedSpace();\n\
  long availableSpace = store.getUsableSpace();\nSystem.out.println(desc + \", 总计:\
  \ \" + totalSpace\n+ \", 未分配: \" + unallocatedSpace\n+ \", 可用: \" + availableSpace);\n\
  } catch (IOException e) {\ne.printStackTrace();\n}\n}\n}\n清单 10-2.\n检索文件系统的信息\n\
  ```\n\n```\n只读文件系统: false\n文件名分隔符: \\\n可用的文件存储区如下\nOS (C:), 总计: 985563918336, 未分配:\
  \ 828183392256, 可用: 828183392256\n可用的根目录如下\nC:\\\nE:\\\n```\n\n处理路径\n\n通常，文件系统以层级结构存储对象（文件、目录、符号链接等）。文件系统使用一个或多个根节点作为层级结构的根。文件系统中的对象都有一个路径，通常以字符串表示，例如\
  \ Windows 上的 `C:\\home\\test.txt`，以及类 UNIX 操作系统上的 `/home/test.txt`。路径字符串可能包含多个组件，这些组件由称为分隔符或定界符的特殊字符分隔。例如，路径\
  \ `C:\\home\\test.txt` 包含三个组件：`C:\\` 作为根，`home` 作为目录，`test.txt` 作为文件名。反斜杠是 Windows\
  \ 上的路径分隔符。类 UNIX 操作系统使用正斜杠（`/`）作为路径分隔符。请注意，路径表示是平台相关的。\n\n路径可以是绝对路径或相对路径。如果路径以根节点开头，则为绝对路径。相对路径不以根节点开头。定位文件系统中由绝对路径引用的对象无需额外信息。定位文件系统中由相对路径引用的对象需要额外信息。例如，在\
  \ Windows 上，路径 `C:\\home\\test.txt` 是绝对路径，因为它以根节点 `C:\\` 开头，而路径 `luci1.txt` 是相对路径。要定位\
  \ `luci1.txt` 文件，你需要更多信息，例如它所在目录的路径。\n\n`Path` 对象是文件系统中对象（如文件、目录和符号链接）路径的程序化表示。文件系统路径是平台相关的，因此\
  \ `Path` 对象也是平台相关的。\n\n`Path` 是 `java.nio.file` 包中的一个接口。当你使用 `Path` 对象时，很可能还需要使用它的两个伴生类：`Paths`\
  \ 和 `Files`。在 Java 程序中创建表示某个路径的 `Path` 对象时，该路径在文件系统中不必真实存在。\n\n提示\n\n作为开发者，在使用 NIO.2\
  \ API 时，大部分时间你都会使用 `Path` 对象。Path API 满足了开发者大部分与文件 I/O 相关的需求。它被设计为能与旧的 `java.io.File`\
  \ API 协同工作。你可以通过 `File` 类的 `toPath()` 方法从 `File` 对象获取 `Path` 对象。你也可以通过 `Path` 对象的\
  \ `toFile()` 方法从 `Path` 对象获取 `File` 对象。\n\n你可以对 `Path` 对象执行两种操作：\n\n*   路径相关操作\n\
  \n*   文件 I/O 操作\n\n`Path` 接口中的方法允许你执行以下路径相关操作：\n\n*   访问路径的组件，例如文件名、根名称等。\n\n* \
  \  比较和测试路径。例如，检查路径是否以 `.txt` 结尾，比较两个路径是否相同，检查路径是绝对路径还是相对路径等。\n\n*   组合和解析路径。\n\n\
  `Path` 接口不包含任何执行文件 I/O 操作的方法。你需要使用 `Files` 类对 `Path` 对象执行文件 I/O 操作。`Files` 类由所有静态方法组成。我稍后会介绍\
  \ `Files` 类的使用。首先，我将详细介绍 `Path` 接口的使用。\n\n创建 Path 对象\n\n`FileSystem` 类的 `getPath()`\
  \ 方法充当创建 `Path` 对象的工厂方法。以下代码片段为 Windows 上的文件路径 `C:\\poems\\luci1.txt` 创建了一个 `Path`\
  \ 对象：\n\n```\nPath p1 = FileSystems.getDefault().getPath(\"C:\\\\poems\\\\luci1.txt\"\
  );\n```\n\n在构造 `Path` 对象时，你可以将路径的各个组件分别传递给 `getPath()` 方法。Java 会负责使用适当的平台相关文件名分隔符。以下语句在\
  \ Windows 上创建了一个表示路径 `C:\\poems\\luci1.txt` 的 `Path` 对象：\n\n```\nPath p2 = FileSystems.getDefault().getPath(\"\
  C:\", \"poems\", \"luci1.txt\");\n```\n\nPath API 包含一个名为 `Paths` 的工具类，其唯一职责是从路径字符串或\
  \ `URI` 的组件创建 `Path` 对象。`Paths` 类包含以下两个静态方法：\n\n*   `Path get(String first, String...\
  \ more)`\n\n*   `Path get(URI uri)`\n\n`Paths` 类中的这两个方法都在内部将调用委托给默认的 `FileSystem`。以下代码片段创建了表示相同路径\
  \ `C:\\poems\\luci1.txt` 的 `Path` 对象：\n\n```\nPath p3 = Paths.get(\"C:\\\\poems\\\
  \\luci1.txt\");\nPath p4 = Paths.get(\"C:\", \"poems\", \"luci1.txt\");\n```\n\n\
  提示\n\n你可以从空路径创建 `Path` 对象，例如 `Paths.get(\"\")`。具有空路径的 `Path` 对象引用文件系统的默认目录。默认目录与当前工作目录相同。\n\
  \n访问路径的组件\n\n文件系统中的路径由一个或多个组件组成。`Path` 接口的方法允许你访问这些组件。\n\n`getNameCount()` 方法返回\
  \ `Path` 中除根之外的组件数量。例如，路径 `C:\\poems\\luci1.txt` 包含三个组件：名为 `C:` 的根，以及名为 `poems`\
  \ 和 `luci1.txt` 的两个组件。在这种情况下，`getNameCount()` 方法返回 2。`getName(int index)` 方法返回指定\
  \ `index` 处的组件名称。最靠近根的组件索引为 0。离根最远的组件索引为 `count - 1`。在路径 `C:\\poems\\luci1.txt`\
  \ 中，`poems` 组件的索引为 0，`luci1.txt` 组件的索引为 1。\n\n`getParent()` 方法返回路径的父路径。如果路径没有父路径，则返回\
  \ `null`。路径的父路径是移除了离根最远的组件后的路径本身。例如，路径 `C:\\poems\\luci.txt` 的父路径是 `C:\\poems`。相对路径\
  \ `test.txt` 没有父路径。\n\n`getRoot()` 方法返回路径的根。如果路径没有根，则返回 `null`。例如，Windows 上的路径 `C:\\\
  poems\\luci1.txt` 以 `C:\\` 作为其根。\n\n\n\n`getFileName()` 方法\n返回路径所表示的文件名。如果路径没有文件名，则\n\
  返回 `null`。\n文件名是距离根目录最远的组件。例如，在\n路径 `C:\\poems\\luci1.txt`\n中，`luci1.txt`\n就是文件名。\n\
  \n你可以使用 `isAbsolute()` 方法\n检查路径是否表示绝对路径。\n\n提示\n\n要获取路径各组件的信息，该路径不必实际存在于文件系统中。`Path`\
  \ API 会利用路径字符串中提供的信息，为你提供关于路径组件的所有这些信息。\n\n清单 10-3 演示了\n如何访问 `Path` 对象的组件。本例中使用的路径之一是\
  \ Windows 路径。如果你不是在 Windows 上运行该程序，请将 `main()` 方法中的路径修改为\n你平台上有效的路径。运行程序时，你可能会得到不同的输出。\n\
  \n```\n// PathComponentsTest.java\npackage com.jdojo.nio2;\nimport java.nio.file.Path;\n\
  import java.nio.file.Paths;\npublic class PathComponentsTest {\npublic static void\
  \ main(String[] args) {\nPath p1 = Paths.get(\"C:\\\\poems\\\\luci1.txt\");\nprintDetails(p1);\n\
  System.out.println(\"----------------------\");\nPath p2 = Paths.get(\"luci1.txt\"\
  );\nprintDetails(p2);\n}\npublic static void printDetails(Path p) {\nSystem.out.println(\"\
  Details for path: \" + p);\nint count = p.getNameCount();\nSystem.out.println(\"\
  Name count: \" + count);\nfor (int i = 0; i < count; i++) {\nPath name = p.getName(i);\n\
  System.out.println(\"Name at index \" + i + \" is \" + name);\n}\nPath parent =\
  \ p.getParent();\nPath root = p.getRoot();\nPath fileName = p.getFileName();\nSystem.out.println(\"\
  Parent: \" + parent + \", Root: \" + root\n+ \", File Name: \" + fileName);\nSystem.out.println(\"\
  Absolute Path: \" + p.isAbsolute());\n}\n}\n清单 10-3.\n演示如何访问路径的组件\n```\n\n```\n\
  Details for path: C:\\poems\\luci1.txt\nName count: 2\nName at index 0 is poems\n\
  Name at index 1 is luci1.txt\nParent: C:\\poems, Root: C:\\, File Name: luci1.txt\n\
  Absolute Path: true\n\nDetails for path: luci1.txt\nName count: 1\nName at index\
  \ 0 is luci1.txt\nParent: null, Root: null, File Name: luci1.txt\nAbsolute Path:\
  \ false\n```\n\n比较路径\n\n你可以基于两个 `Path` 对象的文本表示来比较它们是否相等。`equals()` 方法\n通过比较两个 `Path`\
  \ 对象的字符串形式来测试它们是否相等。相等性测试是否区分大小写取决于文件系统。例如，在 Windows 上，路径的相等性比较不区分大小写。以下代码片段展示了如何在\
  \ Windows 上比较路径：\n\n```\nPath p1 = Paths.get(\"C:\\\\poems\\\\luci1.txt\");\nPath\
  \ p2 = Paths.get(\"C:\\\\POEMS\\\\LUCI1.TXT\");\nPath p3 = Paths.get(\"C:\\\\poems\\\
  \\..\\\\poems\\\\luci1.txt\");\nboolean b1 = p1.equals(p2); // 在 Windows 上返回 true\n\
  boolean b2 = p1.equals(p3); // 在 Windows 上返回 false\n```\n\n在此代码片段中，`p1.equals(p3)`\
  \ 返回\n`false`，尽管\n`p1` 和\n`p3` 指向同一个文件；这是因为 `equals()` 方法\n在比较两个路径时仅基于文本，而不解析实际的文件引用。\n\
  \n提示\n\n`Path.equals()` 方法\n不会测试 `Path` 在文件系统中是否存在。\n\n`Path`\n接口实现了 `java.lang.Comparable`\n\
  接口。你可以使用其 `compareTo()` 方法\n在文本上将其与另一个 `Path` 对象\n进行比较。`compareTo()` 方法\n返回一个 `int`\n\
  值，当两个路径相等时，该值为 0；当该路径小于指定路径时，该值小于 0；当该路径大于指定路径时，该值大于 0。该方法在按文本顺序对多个路径进行排序时非常有用。使用\
  \ `compareTo()` 方法比较路径时，不会访问文件系统。此方法用于比较两个路径的排序规则是平台相关的。以下代码片段展示了在 Windows 上使用 `compareTo()`\
  \ 方法的示例：\n\n```\nPath p1 = Paths.get(\"C:\\\\poems\\\\luci1.txt\");\nPath p2 = Paths.get(\"\
  C:\\\\POEMS\\\\Luci1.txt\");\nPath p3 = Paths.get(\"C:\\\\poems\\\\..\\\\poems\\\
  \\luci1.txt\");\nint v1 = p1.compareTo(p2); // 将 0 赋值给 v1\nint v2 = p1.compareTo(p3);\
  \ // 将 30 赋值给 v2\n```\n\n你可以使用 `endsWith()` 和 `startsWith()` 方法\n分别测试路径是否以给定路径结尾和开头。需要注意的是，这些方法并非分别测试路径是否以某段文本结尾和开头。它们分别测试路径是否以另一个路径的组件结尾和开头。以下代码片段展示了在\
  \ Windows 上使用这些方法的一些示例：\n\n```\nPath p1 = Paths.get(\"C:\\\\poems\\\\luci1.txt\"\
  );\nPath p2 = Paths.get(\"luci1.txt\");\nPath p3 = Paths.get(\"poems\\\\luci1.txt\"\
  );\nPath p4 = Paths.get(\".txt\");\n// 使用 endsWith()\nboolean b1 = p1.endsWith(p2);\
  \ // 将 true 赋值给 b1\nboolean b2 = p1.endsWith(p3); // 将 true 赋值给 b2\nboolean b3 =\
  \ p1.endsWith(p4); // 将 false 赋值给 b3\n// 使用 startsWith()\nPath p5 = Paths.get(\"\
  C:\\\\\");\nPath p6 = Paths.get(\"C:\\\\poems\");\nPath p7 = Paths.get(\"C:\\\\\
  poem\");\nboolean b4 = p1.startsWith(p5); // 将 true 赋值给 b4\nboolean b5 = p1.startsWith(p6);\
  \ // 将 true 赋值给 b5\nboolean b6 = p1.startsWith(p7); // 将 false 赋值给 b6\n```\n\n`endsWith()`\n\
  方法比较的是路径的组件，而非文本。例如，路径 `C:\\poems\\luci1.txt`\n以 `luci1.txt`、`poems\\luci1.txt`\
  \ 和\n`C:\\poems\\luci1.txt` 结尾。\n`startsWith()` 方法\n也使用相同的逻辑，只是顺序相反。\n\n你可以使用 `Files`\
  \ 类的 `isSameFile(Path p1, Path p2)` 方法 来检查两个\n路径是否指向同一个文件。如果 `p1.equals(p2)` 返回\n\
  `true`，则此\n方法返回 `true`，而无需\n验证路径在文件系统中是否存在。否则，它会向文件系统查询，检查两个路径是否定位到同一个文件。文件系统的实现可能需要此方法来访问或打开这两个文件。当发生\
  \ I/O 错误时，`isSameFile()` 方法\n会抛出 `IOException`。清单 10-4 演示了\n`isSameFile()` 方法的工作原理。\n\
  \n```\n// SameFileTest.java\npackage com.jdojo.nio2;\nimport java.io.IOException;\n\
  import java.nio.file.Files;\nimport java.nio.file.Path;\nimport java.nio.file.Paths;\n\
  public class SameFileTest {\npublic static void main(String[] args) {\n// 假设 C:\\\
  poems\\luci1.txt 文件存在\nPath p1 = Paths.get(\"C:\\\\poems\\\\luci1.txt\");\nPath\
  \ p2 = Paths.get(\"C:\\\\poems\\\\..\\\\poems\\\\luci1.txt\");\n// 假设 C:\\abc.txt\
  \ 文件不存在\nPath p3 = Paths.get(\"C:\\\\abc.txt\");\nPath p4 = Paths.get(\"C:\\\\abc.txt\"\
  );\ntry {\nboolean isSame = Files.isSameFile(p1, p2);\nSystem.out.println(\"p1 和\
  \ p2 相同: \" + isSame);\nisSame = Files.isSameFile(p3, p4);\nSystem.out.println(\"\
  p3 和 p4 相同: \" + isSame);\n} catch (IOException e) {\ne.printStackTrace();\n}\n\
  }\n}\n清单 10-4.\n检查两个路径是否定位到同一个文件\n```\n\n```\np1 和 p2 相同: true\np3 和 p4 相同: true\n\
  ```\n\n假设由 `C:\\poems\\luci1.txt`\n路径表示的文件存在。由于路径 `p1` 和 `p2` 使用 `equals()` 方法比较不相等，因此\n\
  `isSameFile()`\n方法会在文件系统中查找这两个路径是否存在。它返回\n`true`，\n因为 `p1` 和\n`p2` 在文件系统中会解析到同一个文件。假设由\n\
  `C:\\abc.txt` 路径\n表示的文件不存在。`isSameFile(p3, p4)`\n方法调用返回 `true`，因为两个路径在文本上相等。输出取决于这些文件的存在与否。如果程序在相同位置找不到文件，可能会打印错误的堆栈跟踪。修改程序中的文件路径来尝试这些方法。如果你在非\
  \ Windows 平台上运行该程序，则必须修改文件路径以符合你平台上使用的路径语法。\n\n规范化、解析和相对化路径\n\n\n\n在文件系统中，通常使用一个点（`.`）和两个点（`..`）分别表示当前目录和父目录。有时，文件名和目录名之间也允许出现多个连续的分隔符。`Path`\
  \ 接口的 `normalize()` 方法会移除这些多余的字符，然后返回一个 `Path` 对象。此方法不会访问文件系统。如果原始路径包含符号链接，那么规范化后的路径有时可能无法定位到与原始路径相同的文件。以下代码片段展示了在\
  \ Windows 上规范化路径的一些示例。如果你在其他平台上运行此代码，请修改路径以符合你的平台。\n\n```\nPath p1 = Paths.get(\"\
  C:\\\\poems\\\\..\\\\\\\\poems\\\\luci1.txt\");\nPath p1n = p1.normalize();\nSystem.out.println(p1\
  \ + \" normalized to \" + p1n);\nPath p2 = Paths.get(\"C:\\\\poems\\\\luci1.txt\"\
  );\nPath p2n = p2.normalize();\nSystem.out.println(p2 + \" normalized to \" + p2n);\n\
  Path p3 = Paths.get(\"a\\\\..\\\\.\\\\test.txt\");\nPath p3n = p3.normalize();\n\
  System.out.println(p3 + \" normalized to \" + p3n);\n```\n\n```\nC:\\poems\\..\\\
  poems\\luci1.txt normalized to C:\\poems\\luci1.txt\nC:\\poems\\luci1.txt normalized\
  \ to C:\\poems\\luci1.txt\na\\..\\.\\test.txt normalized to test.txt\n```\n\n你可以使用\
  \ `Path` 接口的 `resolve(Path p)` 方法来合并两个路径。如果指定的路径是绝对路径，则返回该指定路径。如果指定的路径是空路径，则返回当前路径。在其他情况下，它只是简单地将两个路径合并并返回结果，因此返回的路径以指定的路径结尾。调用此方法的路径被假定为一个目录。以下代码片段展示了在\
  \ Windows 上解析路径的一些示例。如果你在其他平台上运行此代码，请修改路径以符合你的平台。\n\n```\nPath p1 = Paths.get(\"\
  C:\\\\poems\");\nPath p2 = Paths.get(\"luci1.txt\");\nSystem.out.println(p1.resolve(p2));\n\
  Path p3 = Paths.get(\"C:\\\\test.txt\");\nSystem.out.println(p1.resolve(p3));\n\
  Path p4 = Paths.get(\"\");\nSystem.out.println(p1.resolve(p4));\nPath p5 = Paths.get(\"\
  poems\\\\Luci\");\nPath p6 = Paths.get(\"luci4.txt\");\nSystem.out.println(p5.resolve(p6));\n\
  ```\n\n```\nC:\\poems\\luci1.txt\nC:\\test.txt\nC:\\poems\npoems\\Luci\\luci4.txt\n\
  ```\n\n相对化（Relativizing）是指针对一个给定路径，获取其相对于另一个路径的相对路径的过程。`Path` 接口的 `relativize(Path\
  \ p)` 方法负责完成此工作。从此方法返回的相对路径，当针对其被相对化的那个路径进行解析时，会返回原始的给定路径。如果其中一个路径包含根元素，则无法获得相对路径。如果两个路径都包含根元素，则能否获得相对路径取决于平台。以下代码片段展示了获取相对路径的一些示例。当两个路径之间没有共同的子路径时，会假定这两个路径定位的是同级对象。例如，在获取\
  \ `Doug` 相对于 `Bobby` 的相对路径时，会假定 `Doug` 和 `Bobby` 是同级。输出结果是在 Windows 上运行程序时显示的。在其他平台上，你可能会得到略有不同的输出。\n\
  \n```\nPath p1 = Paths.get(\"poems\");\nPath p2 = Paths.get(\"poems\", \"recent\"\
  , \"Luci\");\nSystem.out.println(p1.relativize(p2));\nSystem.out.println(p2.relativize(p1));\n\
  Path p3 = Paths.get(\"Doug\");\nPath p4 = Paths.get(\"Bobby\");\nSystem.out.println(p3.relativize(p4));\n\
  System.out.println(p4.relativize(p3));\n```\n\n```\nrecent\\Luci\n..\\..\n..\\Bobby\n\
  ..\\Doug\n```\n\n符号链接\n\n**符号链接** 是一种特殊类型的文件，它包含对另一个文件或目录的引用。符号链接也称为 symlink 或软链接。符号链接所引用的文件称为该符号链接的目标文件。一些支持符号链接的操作系统包括类\
  \ UNIX 操作系统（Linux、Mac OS X 等）、Windows 10 等。\n\n对符号链接的操作对应用程序是透明的。当对符号链接执行操作时，操作系统会对链接的目标执行该操作。例如，对符号链接执行读/写操作，实际上是对其目标执行读/写操作。但是，删除、移动和重命名操作是直接在链接上执行的，而不是在其目标上。有时，符号链接中可能存在循环引用，即符号链接的目标指回原始链接。\n\
  \nNIO.2 API 完全支持符号链接。它内置了检测符号链接中循环引用的安全措施。你可以使用 `java.nio.file.Files` 类来处理符号链接。你可以使用它的\
  \ `isSymbolicLink(Path p)` 方法来检查指定路径所表示的文件是否为符号链接。`Files` 类的 `createSymbolicLink()`\
  \ 方法用于创建符号链接。\n\n提示\n\n`Files` 类中的 `createSymbolicLink()` 方法是一个可选操作，可能并非在所有平台上都受支持。\n\
  \n以下代码片段展示了如何在 Windows 上为文件创建符号链接。我在使用 Windows 时，需要管理员权限才能创建符号链接。如果你没有此权限，将会收到一个异常，并附带一条指示此问题的适当错误消息。\n\
  \n```\nPath existingFilePath = Paths.get(\"C:\\\\poems\\\\luci1.txt\");\nPath symLinkPath\
  \ = Paths.get(\"C:\\\\luci1_link.txt\");\ntry {\nFiles.createSymbolicLink(symLinkPath,\
  \ existingFilePath);\n} catch (IOException e) {\ne.printStackTrace();\n}\n```\n\n\
  NIO.2 API 默认会跟踪符号链接。在某些情况下，你可以指定是否要跟踪符号链接。不跟踪符号链接的选项通过使用枚举常量 `LinkOption.NOFOLLOW_LINKS`\
  \ 来表示。`LinkOption` 枚举位于 `java.nio.file` 包中。支持此选项的方法允许你传递一个 `LinkOption` 类型的参数。\n\
  \n提示\n\nNIO.2 API 也支持常规链接（也称为硬链接）。你可以使用 `Files` 类的 `createLink(Path newLink, Path\
  \ existingPath)` 方法来创建硬链接。\n\n路径的不同形式\n\n你可以获取路径的不同类型的表示形式。假设你创建了一个 `Path` 对象，如下所示：\n\
  \n```\n// 创建一个 Path 对象来表示相对路径\nPath p1 = Paths.get(\"test.txt\");\n```\n\n这里，`p1`\
  \ 表示一个相对路径。你可以使用它的 `toAbsolutePath()` 方法获取 `p1` 所表示的绝对路径，如下所示：\n\n```\n// 获取 p1\
  \ 所表示的绝对路径\nPath p1AbsPath = p1.toAbsolutePath();\n```\n\n现在，`p1AbsPath` 是 `p1`\
  \ 的绝对路径。例如，在 Windows 上，`p1AbsPath` 可能看起来像 `C:\\testapp\\test.txt`。如果路径不是绝对路径，`toAbsolutePath()`\
  \ 方法会使用平台相关的默认目录来解析该路径，从而为你提供绝对路径。如果路径是绝对路径，`toAbsolutePath()` 方法会返回相同的路径。\n\n你可以使用\
  \ `toRealPath()` 方法来获取现有文件的真实路径。它返回一个现有文件的规范路径。如果该路径表示一个符号链接，则返回目标文件的真实路径。你可以向此方法传递一个链接选项，指示你是否不想跟踪符号链接到其目标。如果路径所表示的文件不存在，`toRealPath()`\
  \ 会抛出 `IOException`。以下代码片段演示了如何从 `Path` 对象获取真实路径：\n\n\n\n```\nimport java.io.IOException;\n\
  import java.nio.file.LinkOption;\nimport java.nio.file.Path;\nimport java.nio.file.Paths;\n\
  ...\ntry {\nPath p2 = Paths.get(\"test2.txt\");\n// 如果 p2 是符号链接，则跟踪该链接\nPath p2RealPath\
  \ = p2.toRealPath();\nSystem.out.println(\"p2RealPath:\" + p2RealPath);\n} catch\
  \ (IOException e) {\ne.printStackTrace();\n}\ntry {\nPath p3 = Paths.get(\"test3.txt\"\
  );\n// 不跟踪 p3 的链接（如果它是符号链接）\nPath p3RealPath = p3.toRealPath(LinkOption.NOFOLLOW_LINKS);\n\
  System.out.println(\"p3RealPath:\" + p3RealPath);\n} catch (IOException e) {\ne.printStackTrace();\n\
  }\n```\n\n你可以使用 `Path` 对象的 `toUri()` 方法来获取其 URI 表示形式。路径的 URI 表示形式高度依赖于平台。通常，路径的\
  \ URI 形式可以在浏览器中用于打开该路径所指示的文件。以下代码片段展示了如何获取路径的 URI 形式。该输出是在 Windows 上生成的，你可能会得到不同的输出。\n\
  \n```\nPath p2 = Paths.get(\"test2.txt\");\njava.net.URI p2UriPath = p2.toUri();\n\
  System.out.println(\"绝对路径: \" + p2.toAbsolutePath());\nSystem.out.println(\"URI\
  \ 路径: \" + p2UriPath);\n```\n\n```\n绝对路径: C:\\java_code\\testapp\\test2.txt\nURI\
  \ 路径: file:///C:/java_code/testapp/test2.txt\n```\n\n**对路径执行文件操作**\n\n`java.nio.file.Files`\
  \ 类包含所有静态方法，让你能够对 `Path` 对象执行大部分文件操作。\n\n**创建新文件**\n\n`Files` 类提供了多种方法来创建常规文件、目录、符号链接以及临时文件/目录。这些方法在文件创建过程中发生\
  \ I/O 错误时会抛出 `IOException`；例如，如果你尝试创建一个已存在的文件，它们会抛出 `java.nio.file.FileAlreadyExistsException`。大多数方法接受一个\
  \ `FileAttribute` 类型的可变参数，允许你指定文件属性。我稍后会讨论文件属性。\n\n你可以使用 `createFile()` 方法来创建一个新的常规文件。新创建的文件是空的。如果文件已存在，或者父目录不存在，文件创建会失败。清单\
  \ 10-5 展示了如何创建一个新文件。它尝试在你的默认目录中创建一个 `text.txt` 文件。程序会打印文件创建状态的详细信息。\n\n```\n// CreateFileTest.java\n\
  package com.jdojo.nio2;\nimport java.io.IOException;\nimport java.nio.file.FileAlreadyExistsException;\n\
  import java.nio.file.Files;\nimport java.nio.file.NoSuchFileException;\nimport java.nio.file.Path;\n\
  import java.nio.file.Paths;\npublic class CreateFileTest {\npublic static void main(String[]\
  \ args) {\nPath p1 = Paths.get(\"test.txt\");\ntry {\nFiles.createFile(p1);\nSystem.out.format(\"\
  文件已创建: %s%n\", p1.toRealPath());\n} catch (FileAlreadyExistsException e) {\nSystem.out.format(\"\
  文件 %s 已存在.%n\",\np1.normalize());\n} catch (NoSuchFileException e) {\nSystem.out.format(\"\
  目录 %s 不存在.%n\",\np1.normalize().getParent());\n} catch (IOException e) {\ne.printStackTrace();\n\
  }\n}\n}\n清单 10-5. 创建新文件\n```\n\n`createDirectory()` 和 `createDirectories()` 方法用于创建新目录。如果新目录的父目录不存在，`createDirectory()`\
  \ 方法会失败。`createDirectories()` 方法会创建不存在的父目录。你可以分别使用 `createTempDirectory()` 和 `createTempFile()`\
  \ 方法来创建临时目录和临时文件。\n\n以下代码片段展示了如何创建临时文件和目录。该输出是在 Windows 10 上运行程序时生成的。临时目录/文件的名称生成方式取决于具体实现。系统会尝试使用为临时文件/目录提供的前缀和后缀。你需要根据你的平台更改路径，并且可能会得到不同的输出。\n\
  \n```\ntry {\nString dirPrefix = \"KDir\";\nPath tDir = Files.createTempDirectory(dirPrefix);\n\
  System.out.println(\"临时目录: \" + tDir);\nString fPrefix = \"KF_\";\nString fSuffix\
  \ = \".txt\";\nPath tFile1 = Files.createTempFile(fPrefix, fSuffix);\nSystem.out.println(\"\
  临时文件 1: \" + tFile1);\n} catch (IOException e) {\ne.printStackTrace();\n}\n```\n\
  \n```\n临时目录: C:\\Users\\ksharan\\KDir15281773985593265118\n临时文件 1: C:\\Users\\ksharan\\\
  KF_18251942286323641819.txt\n```\n\n临时文件/目录不会自动删除。你可能希望使用 `java.io.File` 类的 `deleteOnExit()`\
  \ 方法在 JVM 退出时删除该文件。\n\n```\nPath tempFile = Files.createTempFile(\"myTempFile\"\
  , \".txt\");\n// 当 JVM 退出时删除该文件\ntempFile.toFile().deleteOnExit();\n```\n\n**删除文件**\n\
  \n`Files` 类包含以下两种方法来删除文件、目录和符号链接：\n\n*   `void delete(Path path) throws IOException`\n\
  \n*   `boolean deleteIfExists(Path path) throws IOException`\n\n如果删除失败，`delete()`\
  \ 方法会抛出 `IOException`。例如，如果被删除的文件不存在，它会抛出 `NoSuchFileException`；如果被删除的目录不为空，它会抛出\
  \ `DirectoryNotEmptyException`。\n\n如果被删除的文件不存在，`deleteIfExists()` 方法不会抛出 `NoSuchFileException`。如果它删除了文件，则返回\
  \ `true`，否则返回 `false`。如果被删除的目录不为空，它会抛出 `DirectoryNotEmptyException`。\n\n以下代码片段展示了如何删除文件并处理异常：\n\
  \n```\n// 在 Windows 上创建一个 Path 对象\nPath p = Paths.get(\"C:\\\\poems\\\\luci1.txt\"\
  );\ntry {\n// 删除文件\nFiles.delete(p);\nSystem.out.println(p + \" 已成功删除.\");\n} catch\
  \ (NoSuchFileException e) {\nSystem.out.println(p + \" 不存在.\");\n} catch (DirectoryNotEmptyException\
  \ e) {\nSystem.out.println(\"目录 \" + p + \" 不为空.\");\n} catch (IOException e) {\n\
  e.printStackTrace();\n}\n```\n\n**检查文件是否存在**\n\n`Files` 类提供了以下两种方法来检查文件的存在与不存在：\n\
  \n*   `boolean exists(Path path, LinkOption... options)`\n\n*   `boolean notExists(Path\
  \ path, LinkOption... options)`\n\n这两个方法并非互斥。如果无法确定文件是否存在，两个方法都返回 `false`。如果你需要在文件存在时执行操作，请在逻辑中使用\
  \ `exists()` 方法。如果你需要在文件不存在时执行操作，请使用 `notExists()` 方法。\n\n**复制和移动文件**\n\n`Files`\
  \ 类提供了以下三个版本的 `copy()` 方法，用于将文件的内容和属性复制到另一个文件：\n\n*   `long copy(InputStream in,\
  \ Path target, CopyOption... options)`\n\n*   `long copy(Path source, OutputStream\
  \ out)`\n\n*   `Path copy(Path source, Path target, CopyOption... options)`\n\n\
  如果指定的 `source` 文件是符号链接，则复制的是符号链接的目标，而不是符号链接本身。如果指定的 `source` 文件是目录，则会在目标位置创建一个空目录，而不复制该目录的内容。如果指定的\
  \ `source` 和 `target` 文件相同，则 `copy()` 方法不执行任何操作。\n\n你可以为 `copy()` 方法指定以下一个或多个复制选项：\n\
  \n*   `StandardCopyOption.REPLACE_EXISTING`\n\n*   `StandardCopyOption.COPY_ATTRIBUTES`\n\
  \n*   `LinkOption.NOFOLLOW_LINKS`\n\n如果目标文件已存在，`copy()` 方法会抛出 `FileAlreadyExistsException`。你可以指定\
  \ `REPLACE_EXISTING` 选项来替换现有的目标文件。如果目标文件是一个非空目录，指定 `REPLACE_EXISTING` 选项会抛出 `DirectoryNotEmptyException`。如果目标文件是符号链接且存在，通过指定\
  \ `REPLACE_EXISTING` 选项，替换的是符号链接本身，而不是符号链接的目标。\n\n\n\n`COPY_ATTRIBUTES`\n选项可将源文件的属性复制到目标文件。所复制的文件属性高度依赖于平台和文件系统。至少，如果源文件和目标文件存储均支持，源文件的最后修改时间属性会被复制到目标文件。\n\
  \n如果使用了 `NOFOLLOW_LINKS` 选项，`copy()` 方法会复制符号链接本身，而非符号链接指向的目标。\n\n清单 10-6 演示了如何使用\
  \ `copy()` 方法复制文件。它处理了复制操作失败时可能出现的异常。在运行程序前，你需要修改源文件和目标文件的路径。\n\n```\n// CopyTest.java\n\
  package com.jdojo.nio2;\nimport java.nio.file.Path;\nimport java.nio.file.Paths;\n\
  import java.nio.file.Files;\nimport java.io.IOException;\nimport java.nio.file.FileAlreadyExistsException;\n\
  import java.nio.file.DirectoryNotEmptyException;\nimport static java.nio.file.StandardCopyOption.REPLACE_EXISTING;\n\
  import static java.nio.file.StandardCopyOption.COPY_ATTRIBUTES;\npublic class CopyTest\
  \ {\npublic static void main(String[] args) {\n// 在运行程序前，请修改源文件和目标文件的路径\nPath source\
  \ = Paths.get(\"C:\\\\poems\\\\luci1.txt\");\nPath target = Paths.get(\"C:\\\\poems\\\
  \\luci1_backup.txt\");\ntry {\nPath p = Files.copy(source, target, REPLACE_EXISTING,\
  \ COPY_ATTRIBUTES);\nSystem.out.println(source + \" 已复制到 \" + p);\n} catch (FileAlreadyExistsException\
  \ e) {\nSystem.out.println(target + \" 已存在。\");\n} catch (DirectoryNotEmptyException\
  \ e) {\nSystem.out.println(target + \" 不为空。\");\n} catch (IOException e) {\ne.printStackTrace();\n\
  }\n}\n}\n清单 10-6. 使用 Files.copy() 方法复制文件、目录和符号链接\n```\n\n`Files` 类的 `move(Path source,\
  \ Path target, CopyOption... options)` 方法允许你移动或重命名文件。如果指定的目标文件已存在，`move` 操作会失败。你可以指定\
  \ `REPLACE_EXISTING` 选项来替换已存在的目标文件。如果要移动的文件是符号链接，它会移动符号链接本身，而非符号链接指向的目标。`move()`\
  \ 方法只能用于移动空目录。如果目录非空，则会抛出 `DirectoryNotEmptyException`。\n\n除了 `REPLACE_EXISTING\
  \ CopyOption`，你还可以使用 `ATOMIC_MOVE` 作为另一个 `CopyOption`。如果使用了 `ATOMIC_MOVE` 选项，但文件无法以原子方式移动，则会抛出\
  \ `AtomicMoveNotSupportedException`。如果指定了 `ATOMIC_MOVE` 选项，所有其他选项都会被忽略。以下代码片段展示了如何通过处理可能的异常来移动文件：\n\
  \n```\nimport java.io.IOException;\nimport java.nio.file.AtomicMoveNotSupportedException;\n\
  import java.nio.file.DirectoryNotEmptyException;\nimport java.nio.file.FileAlreadyExistsException;\n\
  import java.nio.file.Files;\nimport java.nio.file.NoSuchFileException;\nimport java.nio.file.Path;\n\
  import java.nio.file.Paths;\nimport static java.nio.file.StandardCopyOption.ATOMIC_MOVE;\n\
  ...\n// 使用平台支持的语法创建源路径和目标路径\nPath source = Paths.get(\"C:\\\\poems\\\\luci1.txt\"\
  );\nPath target = Paths.get(\"C:\\\\poems\\\\dir2\\\\luci1.txt\");\ntry {\n// 尝试以原子方式将源文件移动到目标位置\n\
  Path p = Files.move(source, target, ATOMIC_MOVE);\nSystem.out.println(source + \"\
  \ 已移动到 \" + p);\n} catch (NoSuchFileException e) {\nSystem.out.println(\"源文件/目标文件不存在。\"\
  );\n} catch (FileAlreadyExistsException e) {\nSystem.out.println(target + \" 已存在。移动失败。\"\
  );\n} catch (DirectoryNotEmptyException e) {\nSystem.out.println(target + \" 不为空。移动失败。\"\
  );\n} catch (AtomicMoveNotSupportedException e){\nSystem.out.println(\"不支持原子移动。移动失败。\"\
  );\n} catch (IOException e) {\ne.printStackTrace();\n}\n```\n\n常用文件属性\n\n`Files`\
  \ 类包含许多方法，允许你访问文件的常用属性。例如，你可以使用 `Files.isHidden(Path p)` 方法来测试指定 `Path` 所表示的文件是否隐藏。`Files`\
  \ 类中的以下方法允许你访问文件的各种常用属性。有关管理高级文件属性的内容，请参阅本章的“管理文件属性”部分。\n\n*   `long size(Path)`\n\
  \n*   `boolean isHidden(Path path)`\n\n*   `boolean isRegularFile(Path path, LinkOption...\
  \ options)`\n\n*   `boolean isDirectory(Path, LinkOption... options)`\n\n*   `boolean\
  \ isSymbolicLink(Path path)`\n\n*   `FileTime getLastModifiedTime(Path path, LinkOption...\
  \ options)`\n\n探测文件的内容类型\n\n你可以使用 `Files.probeContentType(Path path)` 方法来探测文件的内容类型。该方法以多用途互联网邮件扩展（MIME）内容类型值的字符串形式返回内容类型。如果无法确定文件的内容类型，则返回\
  \ `null`。\n\n清单 10-7 展示了如何探测文件的内容类型。运行此程序时，你可能会得到不同的输出。程序使用了文件路径 `C:\\poems\\luci1.txt`。请将此路径修改为你想要了解内容类型的文件路径。\n\
  \n```\n// ProbeFileContent.java\npackage com.jdojo.nio2;\nimport java.nio.file.Files;\n\
  import java.nio.file.Path;\nimport java.nio.file.Paths;\nimport java.io.IOException;\n\
  public class ProbeFileContent {\npublic static void main(String[] args) {\nPath\
  \ p = Paths.get(\"C:\\\\poems\\\\luci1.txt\");\ntry {\nString contentType = Files.probeContentType(p);\n\
  System.out.format(\"文件 %s 的内容类型是 %s%n\", p, contentType);\n} catch (IOException\
  \ e) {\ne.printStackTrace();\n}\n}\n}\n清单 10-7. 探测文件的内容类型\n```\n\n```\n文件 C:\\poems\\\
  luci1.txt 的内容类型是 text/plain\n```\n\n读取文件内容\n\nNIO.2 API 支持以下三种方式读取文件内容：\n\n*   以字节或文本行的形式读取\n\
  \n*   使用 `java.io` API 中的 `InputStream` 和 `BufferedReader`\n\n*   使用 `SeekableByteChannel`\
  \ 对象的通道 API\n\n`Files` 类包含以下方法，用于以字节和文本行的形式读取文件内容：\n\n*   `byte[] readAllBytes(Path\
  \ path)`\n\n*   `List<String> readAllLines(Path path)`\n\n*   `List<String> readAllLines(Path,\
  \ Charset cs)`\n\n这三个方法都可能抛出 `IOException`。`readAllBytes()` 方法从文件中读取所有字节。`readAllLines()`\
  \ 方法将文件的全部内容作为文本行读取。`readAllLines()` 方法使用回车符、换行符以及回车符后跟换行符作为行终止符。返回的行不包含行终止符。该方法的版本如果只接受源文件的\
  \ `Path` 作为参数，则假定文件内容采用 UTF-8 字符集。\n\n提示\n\n`Files` 类中的 `readAllBytes()` 和 `readAllLines()`\
  \ 方法旨在读取小文件的内容。这两个方法负责在读取前后自动打开/关闭文件。\n\n`Files` 类提供了从 `Path` 对象获取 `InputStream`\
  \ 和 `BufferedReader` 对象的方法。`newInputStream(Path path, OpenOption... options)` 方法为指定的\
  \ `path` 返回一个 `InputStream`。`newBufferedReader(Path path)` 和 `newBufferedReader(Path\
  \ path, Charset cs)` 方法返回一个 `BufferedReader`；前者假定文件内容采用 UTF-8 字符集，而后者允许你指定字符集。有关如何使用\
  \ `InputStream` 和 `BufferedReader` 读取文件内容的更多详细信息，请参阅第 7 章。\n\n\n\n`Files` 类提供了通过其\
  \ `newByteChannel(Path path, OpenOption... options)` 方法从 `Path` 获取 `SeekableByteChannel`\
  \ 对象的方法。`SeekableByteChannel` 对象使用通道 API 提供对文件的随机访问。它可以用于读取和写入文件。你可以将 `SeekableByteChannel`\
  \ 转换为 `FileChannel`，以使用通道 API 的高级特性，例如锁定文件区域以及将文件区域直接映射到内存中。它维护一个当前位置，你可以从该位置开始读取或写入。有关如何使用通道从文件读取数据的更多详细信息，请参阅第\
  \ 9 章。我将在本章后面讨论一个使用 `SeekableByteChannel` 读取/写入文件内容的示例。\n\n`Files` 类中许多处理文件读取和写入的方法都接受一个可选的\
  \ `OpenOption` 类型参数。此选项允许你配置正在打开的文件。表 10-1 列出了 `OpenOption` 类型的值及其描述。`OpenOption`\
  \ 是 `java.nio.file` 包中的一个接口。`java.nio.file` 包中的 `StandardOpenOption` 枚举实现了 `OpenOption`\
  \ 接口。因此，`StandardOpenOption` 中的每个枚举常量都代表 `OpenOption` 类型的一个值。\n\n表 10-1.\n\nStandardOpenOption\
  \ 枚举中作为枚举常量的 OpenOption 类型值列表\n\n| StandardOpenOption 常量 | 描述 |\n| --- | --- |\n\
  | `APPEND` | 如果文件是为写入而打开的，则将写入的数据追加到现有文件。 |\n| `CREATE` | 如果文件不存在，则创建一个新文件。 |\n\
  | `CREATE_NEW` | 如果文件不存在，则创建一个新文件。如果文件已存在，则操作失败。 |\n| `DELETE_ON_CLOSE` | 当流关闭时删除文件。与临时文件一起使用时很有用。\
  \ |\n| `DSYNC` | 保持文件内容与底层存储同步。 |\n| `READ` | 以读取权限打开文件。 |\n| `SPARSE` | 如果与 `CREATE_NEW`\
  \ 选项一起使用，则向文件系统提示新文件应为稀疏文件。如果文件系统不支持稀疏文件，则忽略此选项。 |\n| `SYNC` | 保持文件的内容和元数据与底层存储同步。\
  \ |\n| `TRUNCATE_EXISTING` | 如果为写入访问打开文件，则将现有文件的长度截断为零。 |\n| `WRITE` | 为写入访问打开文件。\
  \ |\n\n以下代码片段获取默认目录中 `luci2.txt` 文件的 `SeekableByteChannel` 对象。它以 `READ` 和 `WRITE`\
  \ 权限打开该文件。它使用了 `CREATE` 选项，因此如果文件不存在，则会创建该文件。\n\n```\nimport java.nio.file.Path;\n\
  import java.nio.file.Paths;\nimport java.nio.file.Files;\nimport java.nio.channels.SeekableByteChannel;\n\
  import static java.nio.file.StandardOpenOption.READ;\nimport static java.nio.file.StandardOpenOption.WRITE;\n\
  import static java.nio.file.StandardOpenOption.CREATE;\n...\nPath src = Paths.get(\"\
  luci2.txt\");\nSeekableByteChannel sbc = Files.newByteChannel(src, READ, WRITE,\
  \ CREATE);\n```\n\n清单 10-8 演示了如何读取和显示默认目录中 `luci1.txt` 文件的内容。如果文件不存在，程序会显示一条错误消息。\n\
  \n```\n// ReadAllLines.java\npackage com.jdojo.nio2;\nimport java.nio.file.Files;\n\
  import java.nio.file.Path;\nimport java.nio.file.Paths;\nimport java.util.List;\n\
  import java.nio.charset.Charset;\nimport java.io.IOException;\nimport java.nio.file.NoSuchFileException;\n\
  public class ReadAllLines {\npublic static void main(String[] args) {\nCharset cs\
  \ = Charset.forName(\"US-ASCII\");\nPath source = Paths.get(\"luci1.txt\");\ntry\
  \ {\n// 一次性读取所有行\nList lines = Files.readAllLines(source, cs);\n// 打印每一行\nfor (String\
  \ line : lines) {\nSystem.out.println(line);\n}\n} catch (NoSuchFileException e)\
  \ {\nSystem.out.println(source.toAbsolutePath() + \" 不存在。\");\n} catch (IOException\
  \ e) {\ne.printStackTrace();\n}\n}\n}\n清单 10-8.\n使用 Files.readAllLines() 方法读取文件内容\n\
  ```\n\n写入文件\n\nNIO.2 API 支持以下三种方式写入文件：\n\n*   一次性将字节数组或文本行集合写入文件。\n*   使用 `java.io`\
  \ API 通过 `OutputStream` 和 `BufferedWriter` 写入文件。\n*   使用通道 API 通过 `SeekableByteChannel`\
  \ 对象写入文件。\n\n你可以使用 `Files` 类的以下 `write()` 方法一次性将内容写入文件：\n\n*   `Path write(Path\
  \ path, byte[] bytes, OpenOption... options)`\n*   `Path write(Path path, Iterable<?\
  \ extends CharSequence> lines, OpenOption... options)`\n*   `Path write(Path path,\
  \ Iterable<? extends CharSequence> lines, Charset cs, OpenOption... options)`\n\n\
  这些方法旨在将较小的内容写入文件。建议你使用其他方法（稍后讨论）将较大的内容写入文件。\n\n`write()` 方法会打开文件，将传入的内容写入文件，然后关闭它。如果未提供打开选项，它将使用\
  \ `CREATE`、`TRUNCATE_EXISTING` 和 `WRITE` 选项打开文件。如果你正在将文本行写入文件，它会在每行文本后写入一个平台相关的行分隔符。如果写入文本行时未指定字符集，则假定使用\
  \ UTF-8 字符集。\n\n清单 10-9 演示了如何使用 `write()` 方法将文本行写入文件。该程序将几行文本写入默认目录中名为 `twinkle.txt`\
  \ 的文件。它会打印文件的路径。运行此程序时，你可能会得到不同的输出。\n\n```\n// WriteLinesTest.java\npackage com.jdojo.nio2;\n\
  import java.io.IOException;\nimport java.nio.charset.Charset;\nimport java.nio.file.Files;\n\
  import java.nio.file.Path;\nimport java.nio.file.Paths;\nimport java.util.ArrayList;\n\
