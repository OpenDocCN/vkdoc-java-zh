  Long.value = 1969\nLong.value = 1968\n```\n\n摘要\n\nJDK9 的主要目标之一是将类型和资源封装在模块中，并且只导出那些公共类型旨在被其他模块访问的包。有时，您可能需要打破模块指定的封装，以便进行白盒测试或使用不受支持的\
  \ JDK 内部 API 或库。这可以通过在编译时和运行时使用非标准命令行选项来实现。提供这些选项的另一个原因是为了向后兼容。\n\nJDK9 提供了两个命令行选项，`--add-exports`\
  \ 和 `--add-opens`，它们允许您打破模块声明中定义的封装。`--add-exports` 选项允许您在编译时和运行时将一个模块中未导出的包导出给其他模块。`--add-opens`\
  \ 选项允许您在运行时将一个模块中未开放的包开放给其他模块进行深度反射。这些选项的值形式为 `<源模块>/<包>=<目标模块列表>`，其中 `<源模块>` 是将\
  \ `<包>` 导出或开放给 `<目标模块列表>` 的模块，`<目标模块列表>` 是一个以逗号分隔的目标模块名称列表。您可以使用 `ALL-UNNAMED` 作为目标模块列表的特殊值，表示将这些包导出或开放给所有未命名模块。\n\
  \n有两个名为 `Add-Exports` 和 `Add-Opens` 的新属性，可以在可执行 JAR 的清单文件的主节中使用。使用这些属性的效果与使用同名的命令行选项相同，不同之处在于这些属性将指定的包导出或开放给所有未命名模块。这些属性的值是一个以空格分隔的、由斜杠分隔的模块名/包名对列表。例如，在可执行\
  \ JAR 的清单文件主节中添加 `Add-Opens: java.base/java.lang` 条目，将会把 `java.base` 模块中的 `java.lang`\
  \ 包开放给所有未命名模块。\n\n在测试和调试期间，有时需要让一个模块读取另一个模块，而第一个模块在其声明中没有使用 `requires` 语句来读取第二个模块。这可以通过使用\
  \ `--add-reads` 命令行选项来实现，其值以 `<源模块>=<目标模块列表>` 的形式指定。`<源模块>` 是其定义被更新以读取 `<目标模块列表>`\
  \ 中指定模块列表的模块，`<目标模块列表>` 是一个以逗号分隔的目标模块名称列表。目标模块列表的特殊值 `ALL-UNNAMED` 会使源模块读取所有未命名模块。\n\
  \n默认情况下，JDK9 允许类路径上的代码对 JDK 内部进行非法的反射访问。这是为了向后兼容而允许的。也就是说，在 JDK8 上运行的对 JDK 内部进行非法反射访问的应用程序，将继续在\
  \ JDK9 的类路径上运行。首次使用此类非法反射访问时，会在标准错误输出上打印一条警告。您可以为 `java` 命令使用 `--illegal-access`\
  \ 选项，以打印所有此类访问的警告和堆栈跟踪。该选项接受以下四个参数之一：`permit`、`deny`、`warn` 和 `debug`。默认值为 `permit`。在未来的版本中，此默认行为将更改为拒绝此类非法访问，并且您需要显式使用\
  \ `--illegal-access=permit` 来允许此类访问。此外，在未来的版本中，`--illegal-access` 选项本身将被停止使用。\n\n\
