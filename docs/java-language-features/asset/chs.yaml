  Consumer1 took: Producer1-2\nConsumer1 is trying to take an element. Remaining capacity:\
  \ 5\n...\n```\n\n\n\n我不讨论 `PriorityBlockingQueue` 的示例。你可以使用 `PriorityBlockingQueue`\
  \ 实现类来创建清单 12-23 中的阻塞队列，同样的示例也能正常工作。请注意，`PriorityBlockingQueue` 是一个无界队列。你可能还想使用不同类型的元素（而非字符串），这样可以更好地模拟元素的优先级。关于简单非阻塞优先级队列的示例，请参考清单\
  \ 12-17。\n\n延迟队列\n\n让我们来看一个 `DelayQueue` 的示例。`DelayQueue` 是 `BlockingQueue` 接口的实现类之一。它允许你实现一个队列，其中的元素必须在队列中停留一定的时间（称为延迟）。`DelayQueue`\
  \ 如何知道元素需要在队列中停留多长时间？它使用一个名为 `Delayed` 的接口来了解元素必须在队列中停留的时间。该接口位于 `java.util.concurrent`\
  \ 包中。其声明如下：\n\n```\npublic interface Delayed extends Comparable {\nlong getDelay(TimeUnit\
  \ timeUnit);\n}\n```\n\n它扩展了 `Comparable` 接口，该接口的 `compareTo()` 方法接受一个 `Delayed`\
  \ 对象。`DelayQueue` 会调用每个元素的 `getDelay()` 方法来了解该元素在被取出之前必须在队列中保留多长时间。`DelayQueue`\
  \ 会向此方法传递一个 `TimeUnit`。你的任务是将元素的延迟时间转换为传入的 `TimeUnit` 并返回该值。例如，如果你希望将元素在队列中保留 10\
  \ 秒，你的 `getDelay(TimeUnit timeUnit)` 方法将按如下方式实现：\n\n```\npublic class DelayClass\
  \ implement Delayed {\npublic long getDelay(TimeUnit timeUnit){\nlong delay = timeUnit.convert(10,\
  \ TimeUnit.SECONDS);\nreturn delay;\n}\n}\n```\n\n只要 `getDelay()` 方法返回的延迟为正数，该元素就会一直留在\
  \ `DelayQueue` 中。当 `getDelay()` 方法返回零或负数时，该元素就该离开队列了。然而，当元素准备好离开时，必须有人将其从队列中取出。通常，你会调用\
  \ `take()` 方法从队列中取出元素。可能有许多元素已经准备好（其延迟时间已过）离开队列。在这些已过期的元素中，哪一个会被放在队列头部？队列通过调用元素的\
  \ `compareTo()` 方法来确定。该方法决定了相对于其他已过期元素，某个已过期元素被移出队列的优先级。通常，你会决定最近过期的元素最先被移出。不过，由你来决定哪个已过期元素下一个准备好被移出。你也可以做出相反的决定，例如最早过期的元素应该最先被移出。\n\
  \n清单 12-24 包含了 `DelayedJob` 类的代码，该类实现了 `Delayed` 接口。其构造函数接受一个作业名称和作业的计划时间作为参数。计划时间可以是过去、现在或未来。它被指定为一个数字，表示指定时间与\
  \ UTC 时间 1970 年 1 月 1 日午夜之间经过的毫秒数。其 `getDelay()` 方法返回此作业的延迟时间。其 `compareTo()` 方法使用了\
  \ `getDelay()` 方法，以便最早过期的元素最先被移出。其 `toString()` 方法仅打印作业名称和计划时间。\n\n```\n// DelayedJob.java\n\
  package com.jdojo.collections;\nimport java.time.Instant;\nimport java.util.concurrent.Delayed;\n\
  import java.util.concurrent.TimeUnit;\nimport static java.util.concurrent.TimeUnit.MILLISECONDS;\n\
  import static java.time.temporal.ChronoUnit.MILLIS;\npublic class DelayedJob implements\
  \ Delayed {\nprivate final Instant scheduledTime;\nString jobName;\npublic DelayedJob(String\
  \ jobName, Instant scheduledTime) {\nthis.scheduledTime = scheduledTime;\nthis.jobName\
  \ = jobName;\n}\n@Override\npublic long getDelay(TimeUnit unit) {\n// 正延迟表示应留在队列中。零或负延迟\n\
  // 表示已准备好从队列中移除。\nlong delay = MILLIS.between(Instant.now(), scheduledTime);\n//\
  \ 将毫秒延迟转换为指定单位\nlong returnValue = unit.convert(delay, MILLISECONDS);\nreturn returnValue;\n\
  }\n@Override\npublic int compareTo(Delayed job) {\nlong currentJobDelay = this.getDelay(MILLISECONDS);\n\
  long jobDelay = job.getDelay(MILLISECONDS);\nint diff = 0;\nif (currentJobDelay\
  \ > jobDelay) {\ndiff = 1;\n} else if (currentJobDelay < jobDelay) {\ndiff = -1;\n\
  }\nreturn diff;\n}\n@Override\npublic String toString() {\nString str = \"(\" +\
  \ this.jobName + \", \" + \"计划时间: \"\n+ this.scheduledTime + \")\";\nreturn str;\n\
  }\n}\n清单 12-24.\n实现 Delayed 接口的 DelayedJob 类\n```\n\n清单 12-25 中的程序展示了如何将 `DelayedJob`\
  \ 对象作为 `DelayQueue` 中的元素使用。它向队列中添加了三个作业（“打印数据”、“填充数据”和“平衡数据”），这些作业分别计划在当前时间之后 9\
  \ 秒、3 秒和 6 秒运行。请注意这些作业添加到队列中的顺序。我并没有将最先运行的作业作为第一个元素添加。`DelayQueue` 的工作是根据其 `getDelay()`\
  \ 方法返回的延迟时间来排列队列中的元素。当你运行此程序时，会有大约 3 秒的延迟，因为没有元素过期，队列上的 `take()` 方法将被阻塞。当元素开始过期时，你会看到它们被\
  \ `while` 循环中的 `take()` 方法逐个移除。运行程序时，你可能会得到不同的输出。\n\n```\n// DelayQueueTest.java\n\
  package com.jdojo.collections;\nimport java.time.Instant;\nimport java.util.concurrent.BlockingQueue;\n\
  import java.util.concurrent.DelayQueue;\npublic class DelayQueueTest {\npublic static\
  \ void main(String[] args) throws InterruptedException {\nBlockingQueue queue =\
  \ new DelayQueue();\nInstant now = Instant.now();\n// 创建三个延迟作业并将它们添加到队列中\n// 作业应按以下顺序运行\n\
  // 1. 填充数据（3 秒后）\n// 2. 平衡数据（6 秒后）\n// 3. 打印数据（9 秒后）\nqueue.put(new DelayedJob(\"\
  打印数据\", now.plusSeconds(9)));\nqueue.put(new DelayedJob(\"填充数据\", now.plusSeconds(3)));\n\
  queue.put(new DelayedJob(\"平衡数据\", now.plusSeconds(6)));\nwhile (queue.size() >\
  \ 0) {\nSystem.out.println(\"等待从队列中取出作业...\");\nDelayedJob job = queue.take();\n\
  System.out.println(\"取出作业: \" + job);\n}\nSystem.out.println(\"所有作业运行完毕。\");\n}\n\
  }\n清单 12-25.\n使用 DelayQueue 并以 DelayedJob 实例作为其元素\n```\n\n```\n等待从队列中取出作业...\n取出作业:\
  \ (填充数据, 计划时间: 2017-11-13T03:36:23.197963600Z)\n等待从队列中取出作业...\n取出作业: (平衡数据, 计划时间:\
  \ 2017-11-13T03:36:26.197963600Z)\n等待从队列中取出作业...\n取出作业: (打印数据, 计划时间: 2017-11-13T03:36:29.197963600Z)\n\
  所有作业运行完毕。\n```\n\n传输队列\n\n\n\n传输队列扩展了阻塞队列的功能。`TransferQueue<E>` 接口的实例代表一个传输队列。在\
  \ `TransferQueue` 中，生产者会等待将元素移交给消费者。这在消息传递应用中是一个有用的特性，生产者可以确保其消息已被消费者消费。生产者使用 `TransferQueue<E>`\
  \ 的 `transfer(E element)` 方法将元素移交给消费者。当生产者调用此方法时，它会一直等待，直到消费者取走其元素。如果 `TransferQueue`\
  \ 中已有一些元素，那么这些元素必须全部被消费后，`transfer()` 方法添加的元素才能被消费。`tryTransfer()` 方法提供了该方法的非阻塞版本和超时版本，如果消费者已经在等待或已等待指定时间，则允许生产者立即移交元素。\n\
  \n`TransferQueue` 还有另外两个方法用于获取关于等待消费者的更多信息。`getWaitingConsumerCount()` 方法返回等待消费者的数量。`hasWaitingConsumer()`\
  \ 方法在有等待消费者时返回 `true`，否则返回 `false`。\n\n`LinkedTransferQueue<E>` 是 `TransferQueue<E>`\
  \ 接口的一个实现类。它提供了一个无界的 `TransferQueue`，基于 `FIFO`（先进先出）原则。\n\n清单 12-26 包含了一个 `TQProducer`\
  \ 类的代码，其实例代表 `TransferQueue` 的生产者。生产者会随机休眠 1 到 5 秒。它生成一个整数。如果该整数是偶数，则将其放入队列。如果该整数是奇数，则尝试使用\
  \ `transfer()` 方法将其移交给消费者。请注意，如果 `TransferQueue` 中已有一些元素，消费者会先消费这些元素，然后才会消费生产者尝试使用\
  \ `transfer()` 方法移交的元素。\n\n```\n// TQProducer.java\npackage com.jdojo.collections;\n\
  import java.util.Random;\nimport java.util.concurrent.TransferQueue;\nimport java.util.concurrent.atomic.AtomicInteger;\n\
  public class TQProducer extends Thread {\nprivate final String name;\nprivate final\
  \ TransferQueue tQueue;\nprivate final AtomicInteger sequence;\nprivate Random rand\
  \ = new Random();\npublic TQProducer(String name, TransferQueue tQueue, AtomicInteger\
  \ sequence) {\nthis.name = name;\nthis.tQueue = tQueue;\nthis.sequence = sequence;\n\
  }\n@Override\npublic void run() {\nwhile (true) {\ntry {\n// 随机休眠 1 到 5 秒\nint sleepTime\
  \ = rand.nextInt(5) + 1;\nThread.sleep(sleepTime * 1000);\n// 生成一个序列号\nint nextNum\
  \ = this.sequence.incrementAndGet();\n// 偶数入队，奇数移交给消费者\nif (nextNum % 2 == 0) {\n\
  System.out.printf(\"%s: 入队: %d%n\", name, nextNum);\ntQueue.put(nextNum); // 入队\n\
  } else {\nSystem.out.printf(\"%s: 移交: %d%n\", name, nextNum);\nSystem.out.printf(\"\
  %s: 是否有等待的消费者: %b%n\",\nname, tQueue.hasWaitingConsumer());\ntQueue.transfer(nextNum);\
  \ // 移交\n}\n} catch (InterruptedException e) {\ne.printStackTrace();\n}\n}\n}\n\
  }\n清单 12-26.\n表示 TransferQueue 生产者的 TQProducer 类\n```\n\n清单 12-27 包含了一个消费者的代码，该消费者从\
  \ `TransferQueue` 中消费元素。它会随机休眠 1 到 5 秒，然后从 `TransferQueue` 中消费一个元素。\n\n```\n// TQConsumer.java\n\
  package com.jdojo.collections;\nimport java.util.Random;\nimport java.util.concurrent.TransferQueue;\n\
  public class TQConsumer extends Thread {\nprivate final String name;\nprivate final\
  \ TransferQueue tQueue;\nprivate final Random rand = new Random();\npublic TQConsumer(String\
  \ name, TransferQueue tQueue) {\nthis.name = name;\nthis.tQueue = tQueue;\n}\n@Override\n\
  public void run() {\nwhile (true) {\ntry {\n// 随机休眠 1 到 5 秒\nint sleepTime = rand.nextInt(5)\
  \ + 1;\nThread.sleep(sleepTime * 1000);\nint item = tQueue.take();\nSystem.out.printf(\"\
  %s 移除了: %d%n\", name, item);\n} catch (InterruptedException e) {\ne.printStackTrace();\n\
  }\n}\n}\n}\n清单 12-27.\n表示 TransferQueue 消费者的 TQConsumer 类\n```\n\n清单 12-28 包含了一个测试\
  \ `TransferQueue` 的代码。运行程序时，你可能会得到不同的输出。\n\n```\n// TQProducerConsumerTest.java\n\
