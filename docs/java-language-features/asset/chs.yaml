  \n### 对 JDK 模块的深度反射\n\n在 JDK 9 之前，允许对所有类型的成员（包括 JDK 内部类型和你的类型）进行深度反射。JDK 9 的主要目标之一是强封装，你不应该能够使用深度反射访问对象中相当不可访问的成员。然而，对\
  \ JDK 类型强制实施强封装会破坏许多现有应用程序，或者要求它们在迁移到 JDK 9 之前进行修改。这意味着这些应用程序要么缓慢迁移到 JDK 9，要么根本不会迁移到\
  \ JDK 9。Java 设计者尽力保持新 JDK 的向后兼容性。为了实现向后兼容，JDK 9 允许从未命名模块中的代码对 JDK 内部类型的成员进行深度反射。在首次进行此类非法访问时，运行时会发出警告。此类对\
  \ JDK 内部类型的非法访问将在未来版本中被禁止。这意味着，在 JDK 8 中对 JDK 类型使用深度反射的应用程序，如果部署在类路径上，则可以在 JDK 9\
  \ 中继续运行。回想一下，从类路径加载的所有类型都是未命名模块的一部分。如果此类应用程序在 JDK 9 中被模块化，则需要修复其中使用非法反射访问 JDK 内部类型的代码。有关此主题的更多信息，请参阅第\
  \ 16 章。\n\n让我们通过一个示例来说明这一点。`java.lang.Long` 类是不可变的。它包含一个名为 `value` 的私有字段，用于保存此对象表示的\
  \ `long` 值。清单 3-24 展示了如何使用深度反射访问和修改 `Long` 类的私有 `value` 字段，这是静态使用 `Long` 类无法做到的。\n\
  \n```\n// IllegalAccess1.java\npackage com.jdojo.reflection;\nimport java.lang.reflect.Field;\n\
  public class IllegalAccessJDKType {\npublic static void main(String[] args) throws\
  \ Exception {\n// 创建一个 Long 对象\nLong num = 1969L;\nSystem.out.println(\"#1: num\
  \ = \" + num);\n// 获取 Long 类的类引用\nString className = \"java.lang.Long\";\nClass\
  \ cls = Class.forName(className);\n// 获取 value 字段的引用\nField valueField = cls.getDeclaredField(\"\
  value\");\n// 在访问之前尝试使 value 字段可访问\nboolean accessEnabled = valueField.trySetAccessible();\n\
  if (accessEnabled) {\n// 获取并打印在本方法开头创建的 num 对象的 Long.value 私有字段的当前值\nLong value\
  \ = (Long) valueField.get(num);\nSystem.out.println(\"#2: num = \" + value);\n//\
  \ 修改 Long.value 字段的值\nvalueField.set(num, 1968L);\nvalue = (Long) valueField.get(num);\n\
  System.out.println(\"#3: num = \" + value);\n} else {\nSystem.out.println(\"Long.value\
  \ 字段不可访问。\");\n}\n}\n}\n清单 3-24.\n使用深度反射访问和修改 java.lang.Long 类的私有 value 字段\n```\n\
  \n在 `main()` 方法的开头，你创建了一个名为 `num` 的 `Long` 对象，并将其值设置为 `1969L`。\n\n```\nLong num\
  \ = 1969L;\nSystem.out.println(\"#1: num = \" + num);\n```\n\n随后，你获取了 `Long` 类的\
  \ `Class` 对象引用，并获取了私有 `value` 字段的引用，然后尝试使其可访问。如果你能够使该字段可访问，你将读取其当前值，该值应为 `1969L`。现在你将其值更改为\
  \ `1968L`，并在程序中再次读取它。\n\n`IllegalAccessJDKType` 类是 `jdojo.reflection` 模块的成员。让我们使用以下命令运行它：\n\
  \n```\nC:\\Java9LanguageFeatures>java --module-path build\\modules\\jdojo.reflection\n\
  --module jdojo.reflection/com.jdojo.reflection.IllegalAccessJDKType\n```\n\n```\n\
  #1: num = 1969\nLong.value 字段不可访问。\n```\n\n你无法使 `Long` 类的私有 `value` 字段可访问，因为 `IllegalAccessJDKType`\
  \ 类是一个命名模块的一部分，并且不允许命名模块中的代码非法访问 JDK 内部类型的成员。以下命令从类路径重新运行该类，你得到了期望的输出。请注意，即使你访问了私有字段三次，也只会出现一次性警告。\n\
  \n```\nC:\\Java9LanguageFeatures>java --class-path build\\modules\\jdojo.reflection\
  \ com.jdojo.reflection.IllegalAccessJDKType\n```\n\n```\n#1: num = 1969\n警告：发生了一次非法反射访问操作\n\
  警告：com.jdojo.reflection.IllegalAccessJDKType（文件：/C:/Java9LanguageFeatures/build/modules/jdojo.reflection/）对字段\
  \ java.lang.Long.value 进行了非法反射访问\n警告：请考虑向 com.jdojo.reflection.IllegalAccessJDKType\
  \ 的维护者报告此问题\n警告：使用 --illegal-access=warn 以启用对进一步非法反射访问操作的警告\n警告：所有非法访问操作将在未来版本中被禁止\n\
  #2: num = 1969\n#3: num = 1968\n```\n\n\n\n## 关于数组的反射\n\nJava 提供了特殊的 API 来处理数组。`Class`\
  \ 类允许你通过其 `isArray()` 方法判断一个 `Class` 引用是否代表一个数组。你还可以使用反射来创建数组，以及读取和修改其元素的值。`java.lang.reflect.Array`\
  \ 类用于动态创建数组并操作其元素。如前所述，你不能使用常规的反射过程来获取数组的 `length` 字段。不过，`Array` 类提供了 `getLength()`\
  \ 方法来获取数组的长度值。请注意，`Array` 类中的所有方法都是静态的，并且大多数方法的第一个参数都是它们所操作的数组对象的引用。\n\n要创建数组，请使用\
  \ `Array` 类的 `newInstance()` 静态方法。该方法被重载，有两个版本。\n\n*   `Object newInstance(Class<?>\
  \ componentType, int arrayLength)`\n*   `Object newInstance(Class<?> componentType,\
  \ int... dimensions)`\n\n该方法的一个版本创建指定组件类型和数组长度的数组。另一个版本创建指定组件类型和维度的数组。请注意，`newInstance()`\
  \ 方法的返回类型是 `Object`。你需要使用适当的强制类型转换将其转换为实际的数组类型。\n\n如果你想创建一个长度为 5 的 `int` 数组，可以这样写：\n\
  \n```\nint[] ids = (int[]) Array.newInstance(int.class, 5);\n```\n\n这条语句与以下语句效果相同：\n\
  \n```\nint[] ids = new int[5];\n```\n\n如果你想创建一个维度为 `5x8` 的 `int` 数组，可以这样写：\n\n```\n\
  int[][] matrix = (int[][]) Array.newInstance(int.class, 5, 8);\n```\n\n清单 3-25 演示了如何动态创建数组并操作其元素。\n\
  \n```\n// ArrayReflection.java\npackage com.jdojo.reflection;\nimport java.lang.reflect.Array;\n\
  public class ArrayReflection {\npublic static void main(String[] args) {\ntry {\n\
  // 创建长度为 2 的 int 数组\nObject arrayObject = Array.newInstance(int.class, 2);\n// 打印数组元素的值。默认值为零\n\
  int n1 = Array.getInt(arrayObject, 0);\nint n2 = Array.getInt(arrayObject, 1);\n\
  System.out.println(\"n1 = \" + n1 + \", n2 = \" + n2);\n// 为两个元素设置值\nArray.set(arrayObject,\
  \ 0, 101);\nArray.set(arrayObject, 1, 102);\n// 再次打印数组元素的值\nn1 = Array.getInt(arrayObject,\
  \ 0);\nn2 = Array.getInt(arrayObject, 1);\nSystem.out.println(\"n1 = \" + n1 + \"\
  , n2 = \" + n2);\n} catch (NegativeArraySizeException | IllegalArgumentException\n\
  | ArrayIndexOutOfBoundsException e) {\nSystem.out.println(e.getMessage());\n}\n\
  }\n}\n清单 3-25.\n关于数组的反射\n```\n\n```\nn1 = 0, n2 = 0\nn1 = 101, n2 = 102\n```\n\n\
  Java 不支持真正的多维数组。相反，它支持数组的数组。`Class` 类包含一个名为 `getComponentType()` 的方法，该方法返回数组元素类型的\
  \ `Class` 对象。清单 3-26 演示了如何获取数组的维度。\n\n```\n// ArrayDimension.java\npackage com.jdojo.reflection;\n\
  public class ArrayDimension {\npublic static void main(String[] args) {\nint[][][]\
  \ intArray = new int[6][3][4];\nSystem.out.println(\"int[][][] 的维度是 \" + getArrayDimension(intArray));\n\
  }\npublic static int getArrayDimension(Object array) {\nint dimension = 0;\nClass\
  \ c = array.getClass();\n// 检查该对象是否真的是一个数组\nif (!c.isArray()) {\nthrow new IllegalArgumentException(\"\
  对象不是一个数组。\");\n}\nwhile (c.isArray()) {\ndimension++;\nc = c.getComponentType();\n\
  }\nreturn dimension;\n}\n}\n清单 3-26.\n获取数组的维度\n```\n\n```\nint[][][] 的维度是 3\n```\n\
  \n## 扩展数组\n\n创建数组后，你无法更改其长度。你可以在运行时创建一个更大尺寸的数组，并将旧数组的元素复制到新数组中。诸如 `ArrayList` 之类的\
  \ Java 集合类应用了这种技术，让你可以向集合中添加元素而无需担心其长度。你可以结合使用 `Class` 类的 `getComponentType()` 方法和\
  \ `Array` 类的 `newInstance()` 方法来创建给定类型的新数组。你可以使用 `System` 类的 `arraycopy()` 静态方法将旧数组元素复制到新数组中。清单\
  \ 3-27 演示了如何使用反射创建特定类型的数组。为清晰起见，省略了所有运行时检查。\n\n```\n// ExpandingArray.java\npackage\
  \ com.jdojo.reflection;\nimport java.lang.reflect.Array;\nimport java.util.Arrays;\n\
  public class ExpandingArray {\npublic static void main(String[] args) {\n// 创建一个长度为\
  \ 2 的数组\nint[] ids = {101, 102};\nSystem.out.println(\"旧数组长度: \" + ids.length);\n\
  System.out.println(\"旧数组元素: \" + Arrays.toString(ids));\n// 将数组扩展 1\nids = (int[])\
  \ expandBy(ids, 1);\n// 将第三个元素设置为 103\nids[2] = 103; // 这是新添加的元素\nSystem.out.println(\"\
  新数组长度: \" + ids.length);\nSystem.out.println(\"新数组元素: \" + Arrays.toString(ids));\n\
  }\npublic static Object expandBy(Object oldArray, int increment) {\n// 使用反射获取旧数组的长度\n\
  int oldLength = Array.getLength(oldArray);\nint newLength = oldLength + increment;\n\
  // 获取旧数组的类\nClass cls = oldArray.getClass();\n// 创建一个新长度的新数组\nObject newArray =\
  \ Array.newInstance(cls.getComponentType(), newLength);\n// 将旧数组元素复制到新数组\nSystem.arraycopy(oldArray,\
  \ 0, newArray, 0, oldLength);\nreturn newArray;\n}\n}\n清单 3-27.\n使用反射扩展数组\n```\n\
  \n```\n旧数组长度: 2\n旧数组元素: [101, 102]\n新数组长度: 3\n新数组元素: [101, 102, 103]\n```\n\n##\
  \ 谁应该使用反射？\n\n如果你曾使用任何集成开发环境（IDE）通过拖放功能开发 GUI 应用程序，那么你已经使用过以某种形式应用反射的应用程序。所有允许你在设计时设置控件（例如按钮）属性的\
  \ GUI 工具都使用反射来获取该控件的属性列表。其他工具，如类浏览器和调试器，也使用反射。作为一名应用程序程序员，除非你正在开发使用反射 API 提供的动态特性的高级应用程序，否则你不会经常使用反射。需要注意的是，过度使用反射会降低应用程序的性能。\n\
  \n\n\n## 摘要\n\n反射是程序在执行过程中“以数据形式”查询和修改自身状态的能力。Java 将类的字节码表示为 `Class` 类的对象，以方便反射。类的字段、构造器和方法可以分别作为\
  \ `Field`、`Constructor` 和 `Method` 类的对象进行访问。使用 `Field` 对象，你可以访问和修改字段的值。使用 `Method`\
  \ 对象，你可以调用该方法。使用 `Constructor` 对象，你可以调用类的给定构造器。使用 `Array` 类，你还可以通过反射创建指定类型和维度的数组，并操作数组的元素。\n\
  \nJava 一直允许通过反射访问相当难以访问的成员，例如类外部的私有字段。这被称为**深度反射**。在访问不可访问的成员之前，你需要在该成员上调用 `setAccessible(true)`，该成员可以是\
  \ `Field`、`Method` 或 `Constructor`。如果无法启用可访问性，`setAccessible()` 方法会抛出一个运行时异常。JDK\
  \ 9 为此目的添加了一个 `trySetAccessible()` 方法，该方法不会抛出运行时异常。相反，如果可访问性被启用，它返回 `true`，否则返回\
  \ `false`。\n\n在 JDK 9 中，默认禁止跨模块进行深度反射。如果一个模块希望允许对给定包中的类型进行深度反射，该模块必须将该包至少开放给将要使用深度反射的模块。你可以使用模块声明中的\
  \ `opens` 语句来开放一个包。你可以将一个模块声明为 `open` 模块，这将开放该模块中的所有包以进行深度反射。如果命名模块 `M` 使用反射访问另一个模块\
  \ `N` 中的类型，则模块 `M` 隐式读取模块 `N`。未命名模块中的所有包都开放用于深度反射。\n\nJDK 9 允许类路径上的代码对 JDK 内部类型进行深度反射。JDK\
  \ 9 会在首次非法访问 JDK 内部类型的成员时发出警告。对 JDK 内部类型的非法反射访问将在未来的版本中被移除。\n\n问题与练习\n\n1.  什么是反射？\n\
  2.  说出两个包含反射相关类和接口的 Java 包。\n3.  `Class` 类的实例代表什么？\n4.  列出三种获取 `Class` 类实例引用的方法。\n\
  5.  何时使用 `Class` 类的 `forName()` 方法来获取 `Class` 类的实例？\n6.  说出三个内置的类加载器。如何获取这些类加载器的引用？\n\
  7.  如果你获得了 `Class` 类的引用，如何知道该引用是否代表一个接口？\n8.  `Field`、`Constructor` 和 `Method` 类的实例代表什么？\n\
  9.  使用 `Class` 类的 `getFields()` 和 `getDeclaredFields()` 方法有什么区别？\n10. 你需要使用 `AccessibleObject`\
  \ 类的 `setAccessible(true)` 或 `trySetAccessible()` 方法来使 `Field`、`Constructor` 和 `Method`\
  \ 对象可访问，即使它们是不可访问的（例如，它们被声明为 private）。这两种方法有什么区别？\n11. 假设你有两个名为 `R` 和 `S` 的模块。模块\
  \ `R` 包含一个公共类 `p.Test`，该类有一个公共方法 `m()`。模块 `S` 中的代码需要使用类 `p.Test` 来声明变量并创建其对象。模块\
  \ `S` 还需要使用反射来访问模块 `R` 中 `p.Test` 类的公共方法 `m()`。在声明模块 `R` 时，你至少需要做什么，以便模块 `S` 可以执行这些任务？\n\
  12. 什么是模块中的开放包？什么是开放模块？\n13. 导出和开放模块的包有什么区别？给出一个需要同时导出和开放模块中同一个包的例子。\n14. 考虑一个名为\
  \ `jdojo.reflection.exercise.model` 的模块以及该模块中 `MagicNumber` 类的声明如下：\n\n```\n   \
  \ // module-info.java\n    module jdojo.reflection.exercises.model {\n    /* 在此处添加你的模块语句\
  \ */\n    }\n    // MagicNumber.java\n    package com.jdojo.reflection.exercises.model;\n\
  \    public class MagicNumber {\n    private int number;\n    public int getNumber()\
  \ {\n    return number;\n    }\n    public void setNumber(int number) {\n    this.number\
  \ = number;\n    }\n    }\n    ```\n\n修改模块声明，以便其他模块中的代码可以对 `MagicNumber` 类的对象执行深度反射。在一个名为\
  \ `jdojo.reflection.exercises` 的模块中创建一个名为 `MagicNumberTest` 的类。`MagicNumberTest`\
  \ 类中的代码应使用反射来创建 `MagicNumber` 类的对象，直接设置其私有 `number` 字段，并使用 `getNumber()` 方法读取 `number`\
  \ 字段的当前值。\n15. 在 Java 9 中，你能访问 JDK 类的私有成员吗？如果你的答案是肯定的，请描述此类访问的规则和限制。\n16. 假设有两个模块\
  \ `P` 和 `Q`。模块 `P` 是一个开放模块。模块 `Q` 希望对模块 `P` 中的类型执行深度反射。模块 `Q` 是否需要在其模块声明中读取模块 `P`？\n\
  17. 假设有两个模块 `M` 和 `N`。模块 `M` 没有向任何模块开放其任何包，但它向所有其他模块导出了 `com.jdojo.m`。模块 `N` 能否使用反射来访问模块\
  \ `M` 的 `com.jdojo.m` 包中可公开访问的成员？\n\n"
- "# 4. 泛型\n\n在本章中，你将学习：\n\n*   什么是泛型\n*   如何定义泛型类型、方法和构造器\n*   如何为类型参数定义边界\n*   如何使用通配符作为实际类型参数\n\
  *   编译器如何为泛型类型的使用推断实际类型参数\n*   泛型及其在数组创建中的限制\n*   泛型的不正确使用如何可能导致堆污染\n\n本章中的所有示例程序都是\
  \ `jdojo.generics` 模块的成员，如清单 4-1 中所声明。\n\n```\n// module-info.java\nmodule jdojo.generics\
  \ {\nexports com.jdojo.generics;\n}\n清单 4-1.\njdojo.generics 模块的声明\n```\n\n\n\n\
  ## 什么是泛型？\n\n泛型让你能够编写真正的多态代码，这些代码可以适用于任何类型。关于多态和编写多态代码的更多信息，请参考本系列《Beginning Java\
  \ 9》第一卷的第 1 章。\n\n在我定义什么是泛型以及它们能为你做什么之前，先讨论一个简单的例子。假设你想创建一个新类，其唯一职责是存储对任何类型的引用，这里的“任何类型”指的是任何引用类型。我们将这个类命名为\
  \ `ObjectWrapper`，如代码清单 4-2 所示。\n\n```\n// ObjectWrapper.java\npackage com.jdojo.generics;\n\
  public class ObjectWrapper {\nprivate Object ref;\npublic ObjectWrapper(Object ref)\
  \ {\nthis.ref = ref;\n}\npublic Object get() {\nreturn ref;\n}\npublic void set(Object\
  \ ref) {\nthis.ref = ref;\n}\n}\n代码清单 4-2.\n一个用于存储任何类型引用的包装类\n```\n\n作为一名 Java 开发者，你会同意，当你不知道要处理的对象类型时，就会编写这种代码。`ObjectWrapper`\
  \ 类可以存储 Java 中任何类型的引用，例如 `String`、`Integer`、`Person` 等。如何使用 `ObjectWrapper` 类？以下是将其用于\
  \ `String` 类型的一种方式：\n\n```\nObjectWrapper stringWrapper = new ObjectWrapper(\"Hello\"\
  );\nstringWrapper.set(\"Another string\");\nString myString = (String) stringWrapper.get();\n\
  ```\n\n这段代码片段存在一个问题。尽管你知道在 `stringWrapper` 对象中存储了（并且想要存储）一个 `String`，但你不得不在 `(String)\
  \ stringWrapper.get()` 中将 `get()` 方法的返回值强制转换为 `String` 类型。考虑编写以下代码片段：\n\n```\nObjectWrapper\
  \ stringWrapper = new ObjectWrapper(\"Hello\");\nstringWrapper.set(new Integer(101));\n\
  String myString =(String) stringWrapper.get();\n```\n\n这段代码片段可以正常编译。然而，第三条语句在运行时抛出了\
  \ `ClassCastException`，因为你在第二条语句中存储了一个 `Integer`，并试图在第三条语句中将 `Integer` 强制转换为 `String`。首先，它允许你在\
  \ `stringWrapper` 中存储一个 `Integer`。其次，它没有对第三条语句中的代码报错，因为它不知道你只想在 `stringWrapper`\
  \ 中使用 `String` 的意图。\n\nJava 在帮助开发者编写类型安全程序方面已经取得了一些进展。如果 `ObjectWrapper` 类允许你指定只想将这个类用于特定类型，比如这次用\
  \ `String`，下次用 `Integer`，那岂不是很好？你的愿望可以通过 Java 中的泛型来实现。泛型允许你为类型（类或接口）指定一个类型参数。这样的类型被称为泛型类型（更具体地说是泛型类或泛型接口）。当你声明泛型类型的变量并创建泛型类型的对象时，可以指定类型参数的值。你已经见过为方法指定参数。这次，我要讨论的是为类型（如类或接口）指定参数。\n\
  \n提示\n\n在其声明中带有类型参数的类型称为泛型类型。\n\n让我们重写 `ObjectWrapper` 类，使用泛型并将新类简单地命名为 `Wrapper`。泛型类型的形式参数在其声明中指定。参数名称是有效的\
  \ Java 标识符，并写在参数化类型名称后的尖括号（< >）中。我们将使用 `T` 作为 `Wrapper` 类的类型参数名称：\n\n```\npublic\
  \ class Wrapper {\n}\n```\n\n有一个不成文的约定：类型参数名称是一个字符，并且使用 `T` 表示该参数是一个类型，`E` 表示该参数是一个元素，`K`\
  \ 表示该参数是一个键，`N` 表示该参数是一个数字，`V` 表示该参数是一个值。在前面的例子中，你可以为类型参数使用任何名称，例如：\n\n```\npublic\
  \ class Wrapper {\n}\npublic class Wrapper {\n}\n```\n\n多个类型参数用逗号分隔。以下 `MyClass`\
  \ 的声明包含四个类型参数，分别命名为 `T`、`U`、`V` 和 `W`：\n\n```\npublic class MyClass {\n}\n```\n\n\
  你将在类代码中的实例变量声明、构造函数、`get()` 方法和 `set()` 方法中使用名为 `T` 的类型参数。目前，`T` 对你来说意味着任何类型，这个类型将在你使用这个类时才知道。代码清单\
  \ 4-3 包含了 `Wrapper` 类的完整代码。\n\n```\n// Wrapper.java\npackage com.jdojo.generics;\n\
  public class Wrapper {\nprivate T ref;\npublic Wrapper(T ref) {\nthis.ref = ref;\n\
  }\npublic T get() {\nreturn ref;\n}\npublic void set(T ref) {\nthis.ref = ref;\n\
  }\n}\n代码清单 4-3.\n使用类型参数定义泛型类\n```\n\n你对在代码清单 4-3 中使用 `T` 感到困惑吗？在这里，`T` 表示任何类类型或接口类型。它可以是\
  \ `String`、`Object`、`com.jdojo.generics.Person` 等。如果你在这个程序中用 `Object` 替换所有 `T`，并从类名中移除\
  \ `<T>`，那么它就是你之前为 `ObjectWrapper` 类编写的相同代码。\n\n如何使用 `Wrapper` 类？由于它的类名不仅仅是 `Wrapper`，而是\
  \ `Wrapper<T>`，你可以（但不是必须）为 `T` 指定值。要在 `Wrapper` 对象中存储一个 `String` 引用，你可以这样创建它：\n\n\
  ```\nWrapper greetingWrapper = new Wrapper(\"Hello\");\n```\n\n如何使用 `Wrapper` 类的\
  \ `set()` 和 `get()` 方法？由于你已经为类 `Wrapper<T>` 指定了类型参数为 `String`，那么 `set()` 和 `get()`\
  \ 方法将只适用于 `String` 类型。这是因为你在 `set()` 方法中使用了 `T` 作为参数类型，在 `get()` 方法声明中使用了 `T` 作为返回类型。想象一下，将类定义中的\
  \ `T` 替换为 `String`，你应该就能毫无问题地理解以下代码：\n\n```\ngreetingWrapper.set(\"Hi\");      \
  \         // 传递 String 没问题\nString greeting = greetingWrapper.get(); // 无需强制转换\n\
  ```\n\n这次，你不需要强制转换 `get()` 方法的返回值。编译器知道 `greetingWrapper` 被声明为 `Wrapper<String>`\
  \ 类型，因此它的 `get()` 方法返回一个 `String`。让我们尝试在 `greetingWrapper` 中存储一个 `Integer` 对象。\n\
  \n```\n// 编译时错误。你只能使用 greetingWrapper 来存储 String。\ngreetingWrapper.set(new Integer(101));\n\
  ```\n\n该语句将生成以下编译时错误：\n\n```\nerror: 不兼容的类型: Integer 无法转换为 String\ngreetingWrapper.set(new\
  \ Integer(101));\n```\n\n你不能将 `Integer` 传递给 `set()` 方法。编译器会生成一个错误。如果你想使用 `Wrapper`\
  \ 类来存储 `Integer`，你的代码将如下所示：\n\n```\nWrapper idWrapper = new Wrapper(new Integer(101));\n\
  idWrapper.set(new Integer(897)); // 传递 Integer 没问题\nInteger id = idWrapper.get();\n\
  // 编译时错误。你只能将 idWrapper 用于 Integer。\nidWrapper.set(\"hello\");\n```\n\n假设存在一个包含两个参数构造函数的\
  \ `Person` 类，你可以像这样在 `Wrapper` 中存储一个 `Person` 对象：\n\n```\nWrapper personWrapper\
  \ = new Wrapper(new Person(1, \"Chris\"));\npersonWrapper.set(new Person(2, \"Laynie\"\
  ));\nPerson laynie = personWrapper.get();\n```\n\n\n\n类型声明中指定的参数称为**形式类型参数**；例如，在\
  \ `Wrapper<T>` 类声明中，`T` 就是一个形式类型参数。当你用实际类型替换形式类型参数时（例如，在 `Wrapper<String>` 中，你用\
  \ `String` 替换了形式类型参数 `T`），这被称为**参数化类型**。Java 中接受一个或多个类型参数的引用类型称为**泛型类型**。泛型类型主要在编译器中实现。JVM\
  \ 对泛型类型一无所知。所有实际类型参数在编译时都会通过一个称为**擦除**的过程被擦除。编译时类型安全是你在代码中使用参数化泛型类型而无需使用强制转换时获得的好处。\n\
  \n多态是指编写适用于一种类型，同时也适用于许多其他类型的代码。在《Beginning Java 9》系列的第一卷中，你学习了如何使用继承和接口编写多态代码。Java\
  \ 中的继承提供了**包含多态**，即你基于基类型编写代码，该代码也适用于该基类型的所有子类型。在这种情况下，你被迫让所有其他类型都归属于单一的继承层次结构。也就是说，多态代码适用的所有类型都必须继承自单一的基类型。Java\
  \ 中的接口解除了这一限制，允许你基于接口编写代码。该代码适用于所有实现了该接口的类型。这一次，代码适用的所有类型不必归属于同一个类型层次结构。不过，你仍然有一个限制：所有这些类型都必须实现同一个接口。Java\
  \ 中的泛型让你离编写“真正”的多态代码更近了一步。使用泛型编写的代码适用于任何类型。Java 中的泛型对于你能在代码中对泛型类型执行的操作确实有一些限制。向你展示你能用\
  \ Java 泛型做什么，并详细解释这些限制，是本章讨论的主题。\n\n## 超类型-子类型关系\n\n我们来玩个把戏。以下代码创建了 `Wrapper<T>`\
  \ 类的两个参数化实例，一个用于 `String` 类型，一个用于 `Object` 类型：\n\n```\nWrapper stringWrapper = new\
  \ Wrapper(\"Hello\");\nstringWrapper.set(\"a string\");\nWrapper objectWrapper =\
  \ new Wrapper(new Object());\nobjectWrapper.set(new Object());\n// 在 objectWrapper\
  \ 中使用 String 对象\nobjectWrapper.set(\"a string\"); // 可以\n```\n\n将 `String` 对象存储在\
  \ `objectWrapper` 中是没问题的。毕竟，如果你打算在 `objectWrapper` 中存储一个 `Object`，那么 `String` 也是一个\
  \ `Object`。以下赋值是否允许？\n\n```\nobjectWrapper = stringWrapper;\n```\n\n不，这个赋值是不允许的。也就是说，`Wrapper<String>`\
  \ 不能赋值给 `Wrapper<Object>`。要理解为什么不允许这个赋值，让我们暂时假设它是允许的，并且你可以编写如下代码：\n\n```\n// 现在\
  \ objectWrapper 指向 stringWrapper\nobjectWrapper = stringWrapper;\n// 我们可以通过 objectWrapper\
  \ 在 stringWrapper 中存储一个 Object\nobjectWrapper.set(new Object());\n// 以下语句将抛出运行时\
  \ ClassCastException\nString s = stringWrapper.get();\n```\n\n你看到允许像 `objectWrapper\
  \ = stringWrapper` 这样的赋值的危险性了吗？如果允许这种赋值，编译器无法确保 `stringWrapper` 只存储 `String` 类型的引用。\n\
  \n请记住，`String` 是一个 `Object`，因为 `String` 是 `Object` 的子类。然而，`Wrapper<String>` 并不是一个\
  \ `Wrapper<Object>`。常规的超类型/子类型规则不适用于参数化类型。如果你不理解这个规则，也不必担心要记住它。如果你尝试进行此类赋值，编译器会告诉你不能这样做。\n\
  \n## 原始类型\n\nJava 中泛型类型的实现是向后兼容的。如果一个现有的非泛型类被重写以利用泛型，那么使用该类的非泛型版本的现有代码应该能继续工作。代码可以通过省略对泛型类型参数的引用来使用泛型类的非泛型版本（尽管不推荐这样做）。泛型类型的非泛型版本称为**原始类型**。不鼓励使用原始类型。如果你在代码中使用原始类型，编译器会生成未经检查的警告，如下代码片段所示：\n\
  \n```\n// 将 Wrapper 泛型类型用作原始类型 Wrapper\nWrapper rawType = new Wrapper(\"Hello\"\
  ); // 一个未经检查的警告\n// 将 Wrapper 泛型类型用作参数化类型 Wrapper\nWrapper genericType = new Wrapper(\"\
  Hello\");\n// 将原始类型赋值给参数化类型\ngenericType = rawType; // 一个未经检查的警告\n// 将参数化类型赋值给原始类型\n\
  rawType = genericType;\n```\n\n当这段代码片段被编译时，编译器会生成以下警告：\n\n```\nwarning: [unchecked]\
  \ unchecked call to Wrapper(T) as a member of the raw type Wrapper\nWrapper rawType\
  \ = new Wrapper(\"Hello\"); // 一个未经检查的警告\n^\nwhere T is a type-variable:\nT extends\
  \ Object declared in class Wrapper\nwarning: [unchecked] unchecked conversion\n\
  genericType = rawType; // 一个未经检查的警告\n^\nrequired: Wrapper\nfound:    Wrapper\n2\
  \ warnings\n```\n\n\n\n## 无界通配符\n\n我们先从一个例子开始。它将帮助你理解在泛型类型中使用通配符的必要性及其用法。让我们为 `Wrapper`\
  \ 类构建一个工具类，并将其命名为 `WrapperUtil`。向该类添加一个名为 `printDetails()` 的静态工具方法，该方法将接收一个 `Wrapper<T>`\
  \ 类的对象。你应该如何定义这个方法的参数？以下是第一次尝试：\n\n```\npublic class WrapperUtil {\npublic static\
  \ void printDetails(Wrapper wrapper){\n// 更多代码写在这里\n}\n}\n```\n\n由于你的 `printDetails()`\
  \ 方法旨在打印任意类型的 `Wrapper<T>` 的详细信息，因此 `Object` 作为类型参数似乎更合适。让我们使用你新的 `printDetails()`\
  \ 方法，如下所示：\n\n```\nWrapper objectWrapper = new Wrapper(new Object());\nWrapperUtil.printDetails(objectWrapper);\
  \ // 正确\nWrapper stringWrapper = new Wrapper(\"Hello\");\nWrapperUtil.printDetails(stringWrapper);\
  \ // 编译时错误\n```\n\n编译时错误如下：\n\n```\nerror: method printDetails in class WrapperUtil\
  \ cannot be applied to given types;\nWrapperUtil.printDetails(stringWrapper); //\
  \ A compile-time error\n^\nrequired: Wrapper\nfound: Wrapper\nreason: argument mismatch;\
  \ Wrapper cannot be converted to Wrapper\n1 error\n```\n\n你可以使用 `Wrapper<Object>`\
  \ 类型调用 `printDetails()` 方法，但不能使用 `Wrapper<String>` 类型，因为它们之间不能赋值兼容，这与你的直觉相悖。要完全理解这一点，你需要了解泛型中的通配符类型。通配符类型用问号表示，如\
  \ `<?>`。对于泛型类型而言，通配符类型就像原始类型的 `Object` 类型。你可以将已知类型的泛型赋值给通配符类型的泛型。示例代码如下：\n\n```\n\
  // String 类型的 Wrapper\nWrapper stringWrapper = new Wrapper(\"Hi\");\n// 你可以将 Wrapper\
  \ 赋值给 Wrapper 类型\nWrapper wildCardWrapper = stringWrapper;\n```\n\n通配符泛型类型（例如 `<?>`）中的问号表示未知类型。当你使用通配符（表示未知）作为参数类型声明参数化类型时，意味着它不知道自己的类型。\n\
  \n```\n// wildCardWrapper 具有未知类型\nWrapper wildCardWrapper;\n// 最好将其命名为 unknownWrapper\n\
  Wrapper unknownWrapper;\n```\n\n你能创建一个未知类型的 `Wrapper<T>` 对象吗？假设约翰为你做了一些食物。他把食物装进一个包裹里，然后交给你。你把包裹交给唐娜。唐娜问包裹里是什么。你的回答是你不知道。约翰能像你一样回答吗？不能。他必须知道自己做了什么，因为他是烹饪食物的人。即使你不知道包裹里是什么，你拿着它并交给唐娜也没有问题。如果唐娜让你从包裹里拿出蔬菜，你会怎么回答？你会说不知道包裹里是否有蔬菜。\n\
  \n以下是使用通配符（未知）泛型类型的规则。由于它不知道自己的类型，因此你不能用它来创建其未知类型的对象。以下代码是非法的：\n\n```\n// 不能与 new\
  \ 运算符一起使用。这是编译时错误。\nnew Wrapper(\"\");\n```\n\n```\nerror: unexpected type\nnew\
  \ Wrapper(\"\");\n^\nrequired: class or interface without bounds\nfound:    ?\n\
  1 error\n```\n\n就像你拿着一个未知食物类型的包裹（约翰在烹饪时知道食物的类型）一样，通配符泛型类型可以引用一个已知的泛型类型对象，如下所示：\n\
  \n```\nWrapper unknownWrapper = new Wrapper(\"Hello\");\n```\n\n关于通配符泛型类型引用可以对对象执行哪些操作，有一系列复杂的规则。然而，有一条简单的经验法则需要记住。使用泛型的目的是实现编译时类型安全。只要编译器确信该操作在运行时不会产生任何意外结果，它就允许对通配符泛型类型引用执行该操作。\n\
  \n让我们将这条经验法则应用于你的 `unknownWrapper` 引用变量。`unknownWrapper` 变量可以确定的一件事是，它引用了一个已知类型的\
  \ `Wrapper<T>` 类的对象。然而，它不知道那个已知类型是什么。你能使用下面的 `get()` 方法吗？以下语句会产生编译时错误：\n\n```\n\
  String str = unknownWrapper.get(); // 编译时错误\n```\n\n```\nerror: incompatible types:\
  \ CAP#1 cannot be converted to String\nString str = unknownWrapper.get(); // A compile\
  \ -time error\n^\nwhere CAP#1 is a fresh type-variable:\nCAP#1 extends Object from\
  \ capture of ?\n1 error\n```\n\n编译器知道 `Wrapper<T>` 类的 `get()` 方法返回一个类型为 `T` 的对象。然而，对于\
  \ `unknownWrapper` 变量，类型 `T` 是未知的。因此，编译器无法确保方法调用 `unknownWrapper.get()` 会返回一个 `String`，并且将其赋值给\
  \ `str` 变量在运行时是安全的。你所要做的就是说服编译器，该赋值在运行时不会抛出 `ClassCastException`。下面这行代码能编译吗？\n\n\
  ```\nObject obj = unknownWrapper.get(); // 正确\n```\n\n这段代码可以编译，因为编译器确信这条语句在运行时不会抛出\
  \ `ClassCastException`。它知道 `get()` 方法返回一个类型的对象，而该类型对于 `unknownWrapper` 变量来说是未知的。无论\
  \ `get()` 方法返回什么类型的对象，它始终与 `Object` 类型赋值兼容。毕竟，Java 中的所有引用类型都是 `Object` 类型的子类型。下面这段代码能编译吗？\n\
  \n```\nunknownWrapper.set(\"Hello\");        // 编译时错误\nunknownWrapper.set(new Integer());\
  \  // 编译时错误\nunknownWrapper.set(new Object());   // 编译时错误\nunknownWrapper.set(null);\
  \           // 正确\n```\n\n你对这段代码中的错误感到惊讶吗？你会发现它并不像看起来那么令人惊讶。`set(T a)` 方法接受泛型类型参数。这个类型\
  \ `T` 对于 `unknownWrapper` 来说是未知的，因此编译器无法确保未知类型是 `String` 类型、`Integer` 类型还是 `Object`\
  \ 类型。这就是前三个对 `set()` 的调用被编译器拒绝的原因。为什么对 `set()` 方法的第四次调用是正确的？`null` 与 Java 中的任何引用类型都是赋值兼容的。编译器认为，无论\
  \ `unknownWrapper` 引用变量所指向对象的 `set(T a)` 方法中的类型 `T` 是什么，使用 `null` 总是安全的。以下是你的 `printDetails()`\
  \ 方法的代码。如果你向此方法传递一个 `null Wrapper` 对象，它将抛出 `NullPointerException`。\n\n```\npublic\
  \ class WrapperUtil {\npublic static void printDetails(Wrapper wrapper) {\n// 可以将\
  \ get() 的返回值赋值给 Object\nObject value = wrapper.get();\nString className = null;\n\
  if (value != null) {\nclassName = value.getClass().getName();\n}\nSystem.out.println(\"\
  Class: \" + className);\nSystem.out.println(\"Value: \" + value);\n}\n}\n```\n\n\
  提示\n\n仅使用问号作为参数类型（`<?>`）被称为无界通配符。它对其可以引用的类型没有任何限制。你也可以为通配符设置上界或下界。我将在接下来的两节中讨论有界通配符。\n\
  \n\n\n## 上界通配符\n\n假设你想在 `WrapperUtil` 类中添加一个方法。该方法应接受两个包装在 `Wrapper` 对象中的数字，并返回它们的和。这些包装对象可以是\
  \ `Integer`、`Long`、`Byte`、`Short`、`Double` 或 `Float` 类型。你首先尝试编写 `sum()` 方法，如下所示：\n\
  \n```\npublic static double sum(Wrapper n1, Wrapper n2) {\n//代码写在这里\n}\n```\n\n\
  这个方法签名存在一些明显的问题。参数 `n1` 和 `n2` 可以是 `Wrapper<T>` 类的任何参数化类型。例如，以下调用对于 `sum()` 方法来说是有效的：\n\
  \n```\n// 尝试将一个 Integer 和一个 String 相加\nsum(new Wrapper(new Integer(125)), new Wrapper(\"\
  Hello\"));\n```\n\n计算一个 `Integer` 和一个 `String` 的和是没有意义的。然而，代码会编译通过，根据 `sum()` 方法的实现，你可能会准备好应对一些运行时异常。你必须阻止这类代码通过编译。它应该只接受类型为\
  \ `Number` 或其子类的两个 `Wrapper` 对象，而不是任何类型。因此，你知道 `Wrapper` 对象应具有的实际参数类型的上界。这个上界就是\
  \ `Number` 类型。如果你传递任何其他类型，只要是 `Number` 类型的子类，也是可以的。然而，任何不是 `Number` 类型或其子类类型的东西都应在编译时被拒绝。通配符的上界表示如下：\n\
  \n```\n\n这里，`T` 是一个类型。`<? extends T>` 表示任何属于 `T` 类型或其子类型的东西都是可接受的。使用 `Number` 作为上界，你可以将方法定义为：\n\
  \n```\npublic static double sum(Wrapper<? extends Number> n1, Wrapper<? extends\
  \ Number> n2) {\nNumber num1 = n1.get();\nNumber num2 = n2.get();\ndouble sum =\
  \ num1.doubleValue() + num2.doubleValue();\nreturn sum;\n}\n```\n\n方法内部的以下代码片段可以正常编译：\n\
  \n```\nNumber num1 = n1.get();\nNumber num2 = n2.get();\n```\n\n无论你为 `n1` 和 `n2`\
  \ 传递什么，它们始终可以与 `Number` 进行赋值兼容，因为编译器会确保传递给 `sum()` 方法的参数遵循其声明中 `<? extends Number>`\
  \ 所指定的规则。尝试计算 `Integer` 和 `String` 的和将被编译器拒绝。考虑以下代码片段：\n\n```\nWrapper<Integer>\
  \ intWrapper = new Wrapper<Integer>(new Integer(10));\nWrapper<? extends Number>\
  \ numberWrapper = intWrapper; // 可以\nnumberWrapper.set(new Integer(1220)); // 编译时错误\n\
  numberWrapper.set(new Double(12.20)); // 编译时错误\n```\n\n你能找出这段代码的问题吗？`numberWrapper`\
  \ 的类型是 `<? extends Number>`，这意味着它可以引用（或者说与）任何 `Number` 类的子类型进行赋值兼容。由于 `Integer`\
  \ 是 `Number` 的子类，因此允许将 `intWrapper` 赋值给 `numberWrapper`。当你尝试在 `numberWrapper` 上使用\
  \ `set()` 方法时，编译器开始报错，因为它无法在编译时确定 `numberWrapper` 是 `Integer` 还是 `Double` 类型（它们都是\
  \ `Number` 的子类型）。在使用泛型时，要小心这类编译时错误。表面上，这看起来可能很明显，你会认为代码应该能正常编译和运行。除非编译器确保操作是类型安全的，否则它不会允许你继续。毕竟，编译时和运行时的类型安全是泛型的主要目标！\n\
  \n## 下界通配符\n\n指定下界通配符与指定上界通配符相反。使用下界通配符的语法是 `<? super T>`，意思是“任何是 `T` 的超类型的东西”。让我们向\
  \ `WrapperUtil` 类添加另一个方法。你将这个新方法命名为 `copy()`，它将值从一个源包装器对象复制到一个目标包装器对象。这是第一次尝试。`<T>`\
  \ 是 `copy()` 方法的形式类型参数。它指定 `source` 和 `dest` 参数必须是同一类型。我将在下一节详细解释泛型方法。\n\n```\n\
  public class WrapperUtil {\n    public static <T> void copy(Wrapper<T> source, Wrapper<T>\
  \ dest) {\n        T value = source.get();\n        dest.set(value);\n    }\n}\n\
  ```\n\n使用你的 `copy()` 方法将 `Wrapper<String>` 的内容复制到 `Wrapper<Object>` 是行不通的。\n\n```\n\
  Wrapper<Object> objectWrapper = new Wrapper<Object>(new Object());\nWrapper<String>\
  \ stringWrapper = new Wrapper<String>(\"Hello\");\nWrapperUtil.copy(stringWrapper,\
  \ objectWrapper); // 编译时错误\n```\n\n这段代码会产生编译时错误，因为 `copy()` 方法要求 `source` 和 `dest`\
  \ 参数是同一类型。然而，出于所有实际目的，`String` 始终是一个 `Object`。在这里，你需要使用下界通配符，如下所示：\n\n```\npublic\
  \ class WrapperUtil {\n    // copy() 方法的新定义\n    public static <T> void copy(Wrapper<?\
  \ extends T> source, Wrapper<T> dest) {\n        T value = source.get();\n     \
  \   dest.set(value);\n    }\n}\n```\n\n现在你是在说，`copy()` 方法的 `dest` 参数可以是 `T`（与 `source`\
  \ 相同），也可以是它的任何超类型。你可以使用 `copy()` 方法将 `Wrapper<String>` 的内容复制到 `Wrapper<Object>`，如下所示：\n\
  \n```\nWrapper<Object> objectWrapper = new Wrapper<Object>(new Object());\nWrapper<String>\
  \ stringWrapper = new Wrapper<String>(\"Hello\");\nWrapperUtil.copy(stringWrapper,\
  \ objectWrapper); // 使用新的 copy() 方法可以\n```\n\n由于 `Object` 是 `String` 的超类型，新的 `copy()`\
  \ 方法将起作用。但是，你不能用它来将内容从 `Object` 类型的包装器复制到 `String` 类型的包装器，因为“一个 `Object` 是一个 `String`”并不总是成立。清单\
  \ 4-4 展示了 `WrapperUtil` 类的完整代码。\n\n```\n// WrapperUtil.java\npackage com.jdojo.generics;\n\
  public class WrapperUtil {\n    public static void printDetails(Wrapper<?> wrapper)\
  \ {\n        // 可以将 get() 的返回值赋给 Object\n        Object value = wrapper.get();\n\
  \        String className = null;\n        if (value != null) {\n            className\
  \ = value.getClass().getName();\n        }\n        System.out.println(\"类: \" +\
  \ className);\n        System.out.println(\"值: \" + value);\n    }\n    public static\
  \ double sum(Wrapper<? extends Number> n1, Wrapper<? extends Number> n2) {\n   \
  \     Number num1 = n1.get();\n        Number num2 = n2.get();\n        double sum\
  \ = num1.doubleValue() + num2.doubleValue();\n        return sum;\n    }\n    public\
  \ static <T> void copy(Wrapper<? extends T> source, Wrapper<T> dest) {\n       \
  \ T value = source.get();\n        dest.set(value);\n    }\n}\n清单 4-4.\n一个与 Wrapper\
  \ 对象配合使用的 WrapperUtil 工具类\n```\n\n清单 4-5 向你展示了如何使用 `Wrapper` 和 `WrapperUtil` 类。\n\
  \n```\n// WrapperUtilTest.java\npackage com.jdojo.generics;\npublic class WrapperUtilTest\
  \ {\n    public static void main(String[] args) {\n        Wrapper<Integer> n1 =\
  \ new Wrapper<Integer>(10);\n        Wrapper<Double> n2 = new Wrapper<Double>(15.75);\n\
  \        // 打印详细信息\n        WrapperUtil.printDetails(n1);\n        WrapperUtil.printDetails(n2);\n\
  \        // 将两个 WrapperUtil 中的数值相加\n        double sum = WrapperUtil.sum(n1, n2);\n\
  \        System.out.println(\"和: \" + sum);\n        // 将一个 Wrapper 的值复制到另一个 Wrapper\n\
  \        Wrapper<Integer> holder = new Wrapper<Integer>(45);\n        System.out.println(\"\
  原始 holder: \" + holder.get());\n        WrapperUtil.copy(n2, holder);\n        System.out.println(\"\
  复制后 holder: \" + holder.get());\n    }\n}\n清单 4-5.\n使用 WrapperUtil 类\n```\n\n```\n\
  类: java.lang.Integer\n值: 10\n类: java.lang.Double\n值: 15.75\n和: 25.75\n原始 holder:\
  \ 45\n复制后 holder: 15.75\n```\n\n## 泛型方法和构造器\n\n\n\n你可以在方法声明中定义类型参数。这些参数需在方法返回类型之前的尖括号中指定。包含泛型方法声明的类型不必是泛型类型，因此你可以在非泛型类型中定义泛型方法。一个类型及其方法也可以定义不同的类型参数。\n\
  \n提示\n\n为泛型类型定义的类型参数在该类型的静态方法中不可用。因此，如果静态方法需要是泛型的，它必须定义自己的类型参数。如果某个方法需要是泛型的，只需将该方法定义为泛型，而无需将整个类型定义为泛型。\n\
  \n以下代码片段定义了一个泛型类型 `Test`，其类型参数命名为 `T`。它还定义了一个泛型实例方法 `m1()`，该方法定义了自己的泛型类型参数 `V`。该方法还使用了由其类定义的类型参数\
  \ `T`。请注意 `m1()` 方法返回类型 void 之前的 `<V>` 用法。它为该方法定义了一个名为 `V` 的新泛型类型。\n\n```\npublic\
  \ class Test {\npublic  void m1(Wrapper a, Wrapper b, T c) {\n// 执行某些操作\n}\n}\n\
  ```\n\n你能想到为 `m1()` 方法定义并使用泛型类型参数 `V` 的含义吗？观察它在定义方法的第一个和第二个参数时作为 `Wrapper<V>` 的用法。这强制第一个和第二个参数必须是同一类型。第三个参数必须是类型\
  \ `T`，即类实例化的类型。\n\n当你想要调用方法时，如何为方法指定泛型类型？通常，在调用方法时无需指定实际类型参数。编译器会根据你传递给方法的值自动推断出来。然而，如果你需要为方法的形式类型参数传递实际类型参数，则必须在方法调用的点号和方法名之间用尖括号（`<\
  \ >`）指定，如下所示：\n\n```\nTest t = new Test();\nWrapper iw1 = new Wrapper(new Integer(201));\n\
  Wrapper iw2 = new Wrapper(new Integer(202));\n// 指定 Integer 为 m1() 类型参数的实际类型\nt.m1(iw1,\
  \ iw2, \"hello\");\n// 让编译器根据 iw1 和 iw2 的类型推断实际类型参数\nt.m1(iw1, iw2, \"hello\");\
  \ // 正确\n```\n\n清单 4-4 演示了如何声明一个泛型静态方法。你不能在静态方法内部引用包含类的类型参数。静态方法只能引用它自己声明的类型参数。\n\
  \n以下是来自 `WrapperUtil` 类的 `copy()` 静态方法的副本。它定义了一个类型参数 `T`，用于约束参数 `source` 和 `dest`\
  \ 的类型。\n\n```\npublic static  void copy(Wrapper source, Wrapper dest) {\nT value\
  \ = source.get();\ndest.set(value);\n}\n```\n\n无论方法是静态还是非静态，编译器都会推断出方法的实际类型参数。然而，如果你想为静态方法调用指定实际类型参数，可以按如下方式操作：\n\
  \n```\nWrapperUtil.copy(iw1, iw2);\n```\n\n你也可以像为方法定义类型参数一样，为构造函数定义类型参数。以下代码片段为\
  \ `Test` 类的构造函数定义了一个类型参数 `U`。它施加了一个约束：构造函数的类型参数 `U` 必须与其类类型参数 `T` 的实际类型相同或是其子类型。\n\
  \n```\npublic class Test {\npublic  Test(U k) {\n// 执行某些操作\n}\n}\n```\n\n编译器会通过检查传递给构造函数的参数来推断传递给构造函数的实际类型参数。如果你想为构造函数指定实际类型参数值，可以在\
  \ `new` 运算符和构造函数名之间的尖括号中指定，如下代码片段所示：\n\n```\n// 为构造函数指定实际类型参数为 Double\nTest t1 =\
  \ new Test(new Double(12.89));\n// 让编译器推断我们使用 Integer 作为构造函数的实际类型参数\nTest t2 = new\
  \ Test(new Integer(123));\n```\n\n泛型对象创建中的类型推断\n\n在许多情况下，当你创建泛型类型的对象时，编译器可以推断对象创建表达式中类型参数的值。请注意，对象创建表达式中的类型推断支持仅限于类型显而易见的情况。考虑以下语句：\n\
  \n```\nList list = new ArrayList();\n```\n\n通过将 `list` 声明为 `List<String>`，很明显你想要创建一个类型参数为\
  \ `<String>` 的 `ArrayList`。在这种情况下，你可以指定空的尖括号 `<>`（称为菱形运算符或简称菱形）作为 `ArrayList` 的类型参数。你可以将这条语句重写如下：\n\
  \n```\nList list = new ArrayList();\n```\n\n请注意，如果在对象创建表达式中没有为泛型类型指定类型参数，则该类型是原始类型，编译器会生成未经检查的警告。例如，以下语句在编译时会产生未经检查的警告：\n\
  \n```\n// 将 ArrayList 用作原始类型，而非泛型类型\nList list = new ArrayList(); // 生成未经检查的警告\n\
  ```\n\n```\n警告：[unchecked] 未经检查的转换\nList list = new ArrayList(); // 生成未经检查的警告\n\
  ^\n需要： List\n找到： ArrayList\n1 个警告\n```\n\n有时编译器无法正确推断对象创建表达式中类型的参数类型。在这些情况下，你需要指定参数类型，而不是使用菱形运算符（`<>`）。否则，编译器会推断出错误的类型，从而导致错误。\n\
  \n当在对象创建表达式中使用菱形运算符时，编译器会使用一个四步过程来推断参数化类型的参数类型。让我们考虑一个典型的对象创建表达式：\n\n1.  首先，它尝试从构造函数参数的静态类型推断类型参数。请注意，构造函数参数可能为空，例如\
  \ `new ArrayList<>()`。如果在此步骤中推断出类型参数，则过程继续到下一步。\n\n2.  它使用赋值运算符的左侧来推断类型。在前面的语句中，如果构造函数参数为空，它将推断\
  \ `T2` 作为类型。请注意，对象创建表达式可能不是赋值语句的一部分。在这种情况下，它将使用下一步。\n\n3.  如果对象创建表达式用作方法调用的实际参数，编译器会通过查看被调用方法的形式参数类型来尝试推断类型。\n\
  \n4.  如果所有其他方法都失败，并且无法通过这些步骤推断类型，则它将推断 `Object` 作为类型参数。\n\n```\nT1 var = new T3(constructor-arguments);\n\
  ```\n\n让我们讨论几个涉及类型推断过程中所有步骤的示例。创建两个列表，`list1` 为 `List<String>` 类型，`list2` 为 `List<Integer>`\
  \ 类型：\n\n```\nimport java.util.Arrays;\nimport java.util.List;\n// 更多代码在此处...\n\
  List list1 = Arrays.asList(\"A\", \"B\");\nList list2 = Arrays.asList(9, 19, 1969);\n\
  ```\n\n考虑以下使用菱形运算符的语句：\n\n```\nList list3 = new ArrayList(list1); // 推断类型为 String\n\
  ```\n\n编译器使用构造函数参数 `list1` 来推断类型。`list1` 的静态类型是 `List<String>`，因此编译器推断出类型 `String`。前面的语句编译正常。编译器在推断过程中没有使用赋值运算符的左侧\
  \ `List<String> list3`。你可能不相信这个论点。考虑以下语句来证明这一点：\n\n```\nList list4 = new ArrayList(list2);\
  \ // 编译时错误\n```\n\n```\n需要： List\n找到： ArrayList\n1 个错误\n```\n\n\n\n现在你相信了吗？构造器参数是\
  \ `list2`，其静态类型为 `List<Integer>`。编译器推断出类型为 `Integer`，并将 `ArrayList<>` 替换为 `ArrayList<Integer>`。`list4`\
  \ 的类型是 `List<String>`，它与 `ArrayList<Integer>` 不兼容赋值，因此导致了编译时错误。\n\n考虑以下语句：\n\n```\n\
  List list5 = new ArrayList(); // 推断类型为 String\n```\n\n这次没有构造器参数。编译器使用第二步，查看赋值运算符左侧来推断类型。在左侧，它找到了\
  \ `List<String>`，并正确推断出类型为 `String`。考虑一个声明如下的 `process()` 方法：\n\n```\npublic static\
  \ void process(List list) {\n// 代码写在这里\n}\n```\n\n以下语句调用了 `process()` 方法，推断的类型参数是\
  \ `String`：\n\n```\n// 推断类型为 String\nprocess(new ArrayList());\n```\n\n编译器查看 `process()`\
  \ 方法的形参类型，找到 `List<String>`，并推断出类型为 `String`。\n\n提示\n\n使用菱形运算符可以节省一些输入。当类型推断显而易见时，可以使用它。然而，为了可读性，在复杂的对象创建表达式中，最好指定类型，而不是使用菱形运算符。始终选择可读性而非简洁性。\n\
  \nJDK9 在匿名类中增加了对菱形运算符的支持，前提是推断的类型是可表示的。如果推断的类型是不可表示的，即使在 JDK9 中，也不能在匿名类中使用菱形运算符。Java\
  \ 编译器会使用无法在 Java 程序中编写的类型。可以在 Java 程序中编写的类型称为**可表示类型**。编译器知道但无法在 Java 程序中编写的类型称为**不可表示类型**。例如，`String`\
  \ 是一种可表示类型，因为你可以在程序中使用它来表示一种类型；然而，`Serializable & CharSequence` 不是一种可表示类型，尽管它对编译器来说是一种有效类型。它是一种交集类型，表示同时实现了\
  \ `Serializable` 和 `CharSequence` 这两个接口的类型。交集类型允许在泛型类型定义中使用，但不能使用这种交集类型声明变量：\n\n\
  ```\n// 不允许在 Java 代码中使用。不能声明交集类型的变量。\nSerializable & CharSequence var;\n// 允许在 Java\
  \ 代码中使用\nclass Magic {\n// 更多代码写在这里\n}\n```\n\nJava 在 `java.util.concurrent` 包中包含一个泛型接口\
  \ `Callable<V>`。它声明如下：\n\n```\npublic interface Callable {\nV call() throws Exception;\n\
  }\n```\n\n在 JDK9 中，编译器将在以下代码片段中将匿名类的类型参数推断为 `Integer`。在 JDK9 之前，你必须编写 `\"new Callable<Integer>()\"\
  `。\n\n```\n// 在 JDK8 中是编译时错误，但在 JDK9 中允许。\nCallable c = new Callable() {\n@Override\n\
  public Integer call() {\nreturn 100;\n}\n};\n```\n\n无泛型异常类\n\n异常在运行时抛出。如果你在 `catch`\
  \ 子句中使用泛型异常类，编译器无法确保运行时异常的类型安全，因为擦除过程会在编译期间擦除任何类型参数的提及。这就是尝试定义一个直接或间接继承自 `java.lang.Throwable`\
  \ 的泛型类会导致编译时错误的原因。\n\n无泛型匿名类\n\n匿名类是一次性类。你需要一个类名来指定实际的类型参数。匿名类没有名称。因此，你不能拥有泛型匿名类。但是，你可以在匿名类内部拥有泛型方法。你的匿名类可以继承泛型类。匿名类可以实现泛型接口。任何类，除了异常类型、枚举和匿名内部类，都可以拥有类型参数。\n\
  \n泛型与数组\n\n让我们看看名为 `GenericArrayTest` 的类的以下代码：\n\n```\npublic class GenericArrayTest\
  \ {\nprivate T[] elements;\npublic GenericArrayTest(int howMany) {\nelements = new\
  \ T[howMany]; // 编译时错误\n}\n// 更多代码写在这里\n}\n```\n\n`GenericArrayTest` 类声明了一个类型参数\
  \ `T`。在构造器中，它尝试创建一个泛型类型的数组。你无法编译上述代码。编译器会抱怨以下语句：\n\n```\nelements = new T[howMany];\
  \ // 编译时错误\n```\n\n回想一下，当泛型类或使用它的代码被编译时，所有对泛型类型参数的引用都会从代码中擦除。数组在创建时需要知道其类型，以便在存储元素时在运行时执行检查，确保元素与数组类型兼容。如果你使用类型参数创建数组，数组的类型信息在运行时将不可用。这就是不允许该语句的原因。\n\
  \n你不能创建泛型类型的数组，因为编译器无法确保对数组元素赋值的类型安全。你不能编写以下代码：\n\n```\nWrapper[] gsArray = null;\n\
  // 不能创建泛型类型的数组\ngsArray = new Wrapper[10]; // 编译时错误\n```\n\n允许创建无界通配符泛型类型的数组，如下所示：\n\
  \n```\nWrapper[] anotherArray = new Wrapper[10]; // 可以\n```\n\n假设你想使用泛型类型的数组。你可以通过使用\
  \ `java.lang.reflect.Array` 类的 `newInstance()` 方法来实现，如下所示。由于数组创建语句中使用了强制转换，你必须在编译时处理未经检查的警告。以下代码片段显示，当你试图将\
  \ `Object` 偷偷放入 `Wrapper<String>` 数组时，你仍然可以绕过编译时的类型安全检查。然而，这是使用泛型时必须承受的后果，因为泛型在运行时不会携带其类型信息。Java\
  \ 泛型就像你想象的那样肤浅。\n\n```\nWrapper[] a = (Wrapper[]) Array.newInstance(Wrapper.class,\
  \ 10);\nObject[] objArray = (Object[]) a;\nobjArray[0] = new Object();  // 将抛出 java.lang.ArrayStoreException\n\
  a[0] = new Wrapper(\"Hello\"); // 可以。由编译器检查\n```\n\n泛型对象的运行时类类型\n\n参数化类型的对象的类类型是什么？考虑清单\
  \ 4-6 中的程序。\n\n```\n// GenericsRuntimeClassTest .java\npackage com.jdojo.generics;\n\
  public class GenericsRuntimeClassTest {\npublic static void main(String[] args)\
  \ {\nWrapper a = new Wrapper(\"Hello\");\nWrapper b = new Wrapper(new Integer(123));\n\
  Class aClass = a.getClass();\nClass bClass = b.getClass();\nSystem.out.println(\"\
  a 的类: \" + aClass.getName());\nSystem.out.println(\"b 的类: \" + bClass.getName());\n\
  System.out.println(\"aClass == bClass: \" + (aClass == bClass));\n}\n}\n清单 4-6.\n\
  参数化类型的所有对象在运行时共享同一个类\n```\n\n```\na 的类: com.jdojo.generics.Wrapper\nb 的类: com.jdojo.generics.Wrapper\n\
  aClass == bClass: true\n```\n\n该程序创建了 `Wrapper<String>` 和 `Wrapper<Integer>` 的对象。它打印了两个对象的类名，并且它们是相同的。输出显示，同一泛型类型的所有参数化对象在运行时共享同一个类对象。如前所述，你提供给泛型类型的类型信息在编译期间会从代码中移除。编译器将\
  \ `Wrapper<String> a;` 语句更改为 `Wrapper a;`。对于 JVM 来说，一切照旧（就像泛型之前一样）！\n\n堆污染\n\n\n\
  \n在运行时表示类型称为**具现化**。能够在运行时表示的类型称为**可具现化类型**。不能在运行时完全表示的类型称为**不可具现化类型**。大多数泛型类型都是不可具现化的，因为泛型是通过擦除实现的，擦除会在编译时移除类型的参数信息。例如，当你编写\
  \ `Wrapper<String>` 时，编译器会移除类型参数 `<String>`，运行时看到的只有 `Wrapper`，而不是 `Wrapper<String>`。\n\
  \n**堆污染** 是指参数化类型的变量引用了不属于同一参数化类型的对象时发生的情况。如果编译器检测到可能的堆污染，它会发出一个未经检查的警告。如果你的程序在编译时没有任何未经检查的警告，则不会发生堆污染。考虑以下代码片段：\n\
  \n```\nWrapper nWrapper = new Wrapper(101);    // #1\n// 编译时出现未经检查的警告，运行时出现堆污染\n\
  Wrapper sWrapper = nWrapper; // #2\nString str = sWrapper.get();         // #3 -\
  \ ClassCastException\n```\n\n第一个语句（标记为 #1）编译正常。第二个语句（标记为 #2）会生成一个未经检查的警告，因为编译器无法确定\
  \ `nWrapper` 是否为 `Wrapper<String>` 类型。由于参数类型信息在编译时被擦除，运行时无法检测到这种类型不匹配。第二个语句中的堆污染使得在第三个语句（标记为\
  \ #3）运行时可能抛出 `ClassCastException`。如果不允许第二个语句，第三个语句就不会导致 `ClassCastException`。\n\n\
  堆污染也可能由于未经检查的强制转换操作而发生。考虑以下代码片段：\n\n```\nWrapper nW = new Wrapper(1L); // #1\n//\
  \ 编译以下语句 #2 时，会发生未经检查的强制转换并出现未经检查的警告。\n// 执行该语句时，会发生堆污染。\nWrapper sw = (Wrapper)\
  \ nW; // #2\nshort s = sw.get();                      // #3 - ClassCastException\n\
  ```\n\n标记为 #2 的语句使用了未经检查的强制转换。编译器会发出一个未经检查的警告。在运行时，它会导致堆污染。因此，标记为 #3 的语句会在运行时生成\
  \ `ClassCastException`。\n\n可变参数方法 和 堆污染警告\n\nJava 通过将可变参数转换为数组来实现可变参数方法的可变参数。如果可变参数方法使用了泛型类型的可变参数，Java\
  \ 无法保证类型安全。不可具现化的泛型类型可变参数可能导致堆污染。\n\n考虑以下声明了一个带有参数化类型参数的 `process()` 方法的代码片段。方法体中的注释指出了堆污染和其他类型的问题。\n\
  \n```\npublic static void process(Wrapper...nums) {\nObject[] obj = nums;      \
  \         // 堆污染\nobj[0] = new Wrapper(\"Hello\");   // 数组损坏\nLong lv = nums[0].get();\
  \           // ClassCastException\n// 其他代码\n}\n```\n\n提示\n\n你需要使用 `javac` 编译器的 `-Xlint:unchecked,varargs`\
  \ 选项来查看未经检查的警告和可变参数警告。\n\n当编译 `process()` 方法时，编译器会从其参数化类型参数中移除类型信息 `<Long>`，并将其签名更改为\
  \ `process(Wrapper[] nums)`。当你编译 `process()` 方法的声明时，会得到以下未经检查的警告：\n\n```\nwarning:\
  \ [unchecked] Possible heap pollution from parameterized vararg type Wrapper\npublic\
  \ static void process(Wrapper...nums) {\n^\n1 warning\n```\n\n考虑以下调用 `process()`\
  \ 方法的代码片段：\n\n```\nWrapper v1 = new Wrapper(10L);\nWrapper v2 = new Wrapper(11L);\n\
  process(v1, v2); // 一个未经检查的警告\n```\n\n当编译这段代码片段时，它会生成以下编译器未经检查的警告：\n\n```\nwarning:\
  \ [unchecked] unchecked generic array creation for varargs parameter of type Wrapper[]\n\
  process(v1, v2);\n^\n1 warning\n```\n\n警告既会在方法声明处生成，也会在方法调用的位置生成。如果你创建了这样的方法，你有责任确保方法体内不会发生堆污染。\n\
  \n如果你创建了一个带有不可具现化类型参数的可变参数方法，你可以通过使用 `@SafeVarargs` 注解来抑制方法声明处和方法调用处的未经检查的警告。通过使用\
  \ `@SafeVarargs`，你断言你的带有不可具现化类型参数的可变参数方法是安全可用的。以下代码片段在 `process()` 方法上使用了 `@SafeVarargs`\
  \ 注解：\n\n```\n@SafeVarargs\npublic static void process(Wrapper...nums) {\nObject[]\
  \ obj = nums;                   // 堆污染\nobj[0] = new Wrapper(\"Hello\"); // 数组损坏\n\
  Long lv = nums[0].get();               // ClassCastException\n// 其他代码\n}\n```\n\n\
  当你编译这个 `process()` 方法的声明时，你不会得到未经检查的警告。但是，你会得到以下可变参数警告，因为编译器看到当可变参数 `nums` 被赋值给\
  \ `Object` 数组 `obj` 时，可能发生堆污染：\n\n```\nwarning: [varargs] Varargs method could cause\
  \ heap pollution from non-reifiable varargs parameter nums\nObject[] obj = nums;\
  \ // 堆污染\n^\n1 warning\n```\n\n你可以通过使用 `@SuppressWarnings` 注解来抑制带有不可具现化类型参数的可变参数方法的未经检查的警告和可变参数警告，如下所示：\n\
  \n```\n@SuppressWarnings({\"unchecked\", \"varargs\"})\npublic static void process(Wrapper...nums)\
  \ {\n// 代码\n}\n```\n\n请注意，当你对可变参数方法使用 `@SuppressWarnings` 注解时，它只抑制方法声明处的警告，而不会抑制调用该方法的位置处的警告。\n\
  \n总结\n\n泛型是 Java 语言特性，允许你声明使用类型参数的类（类和接口）。类型参数在使用泛型类型时指定。与具体类型参数一起使用的类型称为参数化类型。当使用泛型类型而未指定其类型参数时，称为原始类型。例如，如果\
  \ `Wrapper<T>` 是一个泛型类，那么 `Wrapper<String>` 就是一个以 `String` 为实际类型参数的参数化类型，而 `Wrapper`\
  \ 是原始类型。类型参数也可以为构造器和方法指定。泛型允许你在 Java 中编写真正的多态代码——使用适用于所有类型的类型参数的代码。\n\n默认情况下，类型参数是无界的，这意味着你可以为类型参数指定任何类型。例如，如果一个类声明了类型参数\
  \ `<T>`，你可以指定 Java 中可用的任何类型，例如 `<String>`、`<Object>`、`<Person>`、`<Employee>`、`<Integer>`\
  \ 等，作为 `T` 的实际类型。类型声明中的类型参数也可以指定为具有上界或下界。声明 `Wrapper<U extends Person>` 是为类型参数 `U`\
  \ 指定上界的示例，它指定 `U` 可以是 `Person` 类型或 `Person` 的子类型。声明 `Wrapper<? super Person>` 是指定下界的示例；它指定类型参数是\
  \ `Person` 类型或 `Person` 的超类型。\n\nJava 还允许你指定通配符，即问号，作为实际类型参数。通配符作为实际参数意味着实际类型参数未知；例如，`Wrapper<?>`\
  \ 意味着泛型类型 `Wrapper<T>` 的类型参数 `T` 是未知的。\n\n编译器会尝试根据使用表达式的上下文来推断使用泛型的表达式的类型。如果编译器无法推断类型，则会生成编译时错误，你需要显式指定类型。\n\
  \n\n\n参数化类型不存在超类型-子类型关系。例如，`Wrapper<Long>` 不是 `Wrapper<Number>` 的子类型。\n\n泛型类型参数会被编译器通过一个称为类型擦除的过程擦除。因此，泛型类型参数在运行时不可用。例如，`Wrapper<Long>`\
  \ 和 `Wrapper<String>` 的运行时类型是相同的，都是 `Wrapper`。\n\n练习\n\n1.  什么是泛型（或泛型类型）、参数化类型和原始类型？请给出一个泛型类型及其参数化类型的示例。\n\
  \n2.  `Number` 类是 `Long` 类的超类。以下代码片段无法编译。请解释原因。\n\n```\n    List list1= new ArrayList();\n\
  \    List list2= new ArrayList();\n    list1 = list2;  // 编译时错误\n    ```\n\n3. \
  \ 运行以下 `ClassNamePrinter` 类时，写出输出结果。在编译器编译期间擦除类型参数 `T` 后，重写此类的 `print()` 方法的代码。\n\
  \n```\n    // ClassNamePrinter.java\n    package com.jdojo.generics.exercises;\n\
  \    public class ClassNamePrinter {\n    public static void main(String[] args)\
  \ {\n    ClassNamePrinter.print(10);\n    ClassNamePrinter.print(10L);\n    ClassNamePrinter.print(10.2);\n\
  \    }\n    public static  void print(T obj) {\n    String className = obj.getClass().getSimpleName();\n\
  \    System.out.println(className);\n    }\n    }\n    ```\n\n4.  什么是无界通配符？为什么以下代码片段无法编译？\n\
  \n```\n    List list = new ArrayList();\n    list.add(\"Hello\"); // 编译时错误\n   \
  \ ```\n\n5.  考虑以下 `Util` 类的不完整声明：\n\n```\n    // Util.java\n    package com.jdojo.generics.exercises;\n\
  \    import java.lang.reflect.Array;\n    import java.util.ArrayList;\n    import\
  \ java.util.Arrays;\n    import java.util.List;\n    public class Util {\n    public\
  \ static void main(String[] args) {\n    Integer[] n1 = {1, 2};\n    Integer[] n2\
  \ = {3, 4};\n    Integer[] m = merge(n1, n2);\n    System.out.println(Arrays.toString(m));\n\
  \    String[] s1 = {\"one\", \"two\"};\n    String[] s2 = {\"three\", \"four\"};\n\
  \    String[] t = merge(s1, s2);\n    System.out.println(Arrays.toString(t));\n\
  \    List list = new ArrayList();\n    add(list, 10, 20, 30L, 40.5F, 50.9);\n  \
  \  System.out.println(list);\n    }\n    public static  T[] merge(T[] a, T[] b)\
  \ {\n    }\n    public static /* 在此处添加类型参数 */ void add(List list, U... elems) {\n\
  \    /* 在此处添加将 elems 添加到 list 的代码 */\n    }\n    }\n    ```\n\n完成 `merge()` 方法的主体，使其能够连接作为参数传入的两个数组，并返回连接后的数组。\n\
  \n通过指定其类型参数并在其主体中添加代码来完成 `add()` 方法。该方法的第一个参数是一个参数化的 `List<T>`，第二个参数是类型 `T` 或其子类型的可变参数。也就是说，第二个参数类型是其对象可以添加到\
  \ `List<T>` 中的任何类型。\n\n运行 `Util` 类应产生以下输出：\n\n```\n    [1, 2, 3, 4]\n    [one, two,\
  \ three, four]\n    [10, 20, 30, 40.5, 50.9]\n    ```\n\n6.  创建一个泛型 `Stack<E>` 类。它的对象表示一个可以存储其类型参数\
  \ `E` 的元素的栈。以下是该类的模板。你需要为其所有方法提供实现。编写测试代码来测试所有方法。方法名是栈的标准方法名。任何对栈的非法访问都应抛出运行时异常。\n\
  \n```\n    // Stack.java\n    package com.jdojo.generics.exercises;\n    import\
  \ java.util.LinkedList;\n    import java.util.List;\n    public class Stack {\n\
  \    // 使用 LinkedList 而不是 ArrayList\n    private final List stack = new LinkedList();\n\
  \    public void push(E e) {}\n    public E pop() { }\n    public E peek() { }\n\
  \    public boolean isEmpty() { }\n    public int size() { }\n    }\n    ```\n\n\
  7.  什么是堆污染？当编译器检测到可能发生堆污染时，会生成哪些类型的警告？如何在编译期间打印此类警告？如何抑制此类警告？\n\n8.  描述以下 `Test`\
  \ 类声明无法编译的原因。\n\n```\n    public class Test {\n    public  void test(T t) {\n  \
  \  // 更多代码在此处\n    }\n    public  void test(U u) {\n    // 更多代码在此处\n    }\n    }\n\
  \    ```\n\n5. Lambda 表达式\n\n在本章中，你将学习：\n\n*   什么是 lambda 表达式\n\n*   为什么我们需要 lambda\
  \ 表达式\n\n*   定义 lambda 表达式的语法\n\n*   lambda 表达式的目标类型\n\n*   常用的内置函数式接口\n\n*   方法和构造器引用\n\
  \n*   lambda 表达式的词法作用域\n\n本章中的所有示例程序都是 `jdojo.lambda` 模块的成员，如清单 5-1 中所声明。\n\n```\n\
  // module-info.java\nmodule jdojo.lambda {\nexports com.jdojo.lambda;\n}\n清单 5-1.\n\
  jdojo.lambda 模块的声明\n```\n\n什么是 Lambda 表达式？\n\nLambda 表达式是一段未命名的代码块（或未命名的函数），带有一组形式参数和一个主体。有时\
  \ lambda 表达式简称为 lambda。Lambda 表达式的主体可以是一个块语句或一个表达式。箭头（`->`）用于分隔参数列表和主体。术语“lambda”起源于\
  \ Lambda 演算，它使用希腊字母 lambda (λ) 来表示函数抽象。以下是 Java 中 lambda 表达式的一些示例：\n\n```\n// 接受一个\
  \ int 参数并返回该参数值加 1\n(int x) -> x + 1\n// 接受两个 int 参数并返回它们的和\n(int x, int y) -> x\
  \ + y\n// 接受两个 int 参数并返回两者中的最大值\n(int x, int y) -> { int max = x > y ? x : y;\n\
  return max;\n}\n// 不接受参数并返回 void\n() -> { }\n// 不接受参数并返回字符串 \"OK\"\n() -> \"OK\"\
  \n// 接受一个 String 参数并将其打印到标准输出\n(String msg) -> { System.out.println(msg); }\n//\
  \ 接受一个参数并将其打印到标准输出\nmsg -> System.out.println(msg)\n// 接受一个 String 参数并返回其长度\n(String\
  \ str) -> str.length()\n```\n\n此时，你可能无法完全理解 lambda 表达式的语法。我稍后会详细介绍语法。现在，只需感受一下它，记住\
  \ lambda 表达式的语法类似于声明方法的语法。\n\n提示\n\nLambda 表达式不是一个方法，尽管它的声明看起来像一个方法。顾名思义，lambda\
  \ 表达式是一个表示函数式接口实例的表达式。\n\nJava 中的每个表达式都有一个类型，lambda 表达式也是如此。Lambda 表达式的类型是一个函数式接口类型。当调用函数式接口的抽象方法时，会执行\
  \ lambda 表达式的主体。考虑接受一个 `String` 参数并返回其长度的 lambda 表达式：\n\n```\n(String str) -> str.length()\n\
  ```\n\n这个 lambda 表达式的类型是什么？答案是，我们不知道。仅看这个 lambda 表达式，你只能说它接受一个 `String` 参数并返回一个\
  \ `int`，即 `String` 参数的长度。它的类型可以是任何具有接受 `String` 作为参数并返回 `int` 的抽象方法的函数式接口类型。以下是此类函数式接口的一个示例：\n\
  \n```\n@FunctionalInterface\ninterface StringToIntMapper {\nint map(String str);\n\
  }\n```\n\n当 lambda 表达式出现在赋值语句中时，它表示 `StringToIntMapper` 函数式接口的一个实例，如下所示：\n\n```\n\
  StringToIntMapper mapper = (String str) -> str.length();\n```\n\n\n\n在此语句中，编译器发现赋值运算符右侧是一个\
  \ lambda 表达式。为了推断其类型，它会查看赋值运算符左侧，该侧期望一个 `StringToIntMapper` 接口的实例；它会验证该 lambda 表达式是否符合\
  \ `StringToIntMapper` 接口中 `map()` 方法的声明；最后，它会推断出该 lambda 表达式的类型是 `StringToIntMapper`\
  \ 接口类型。当你在 `mapper` 变量上调用 `map()` 方法并传入一个 `String` 时，lambda 表达式的主体将被执行，如下面的代码片段所示：\n\
  \n```\nStringToIntMapper mapper = (String str) -> str.length();\nString name = \"\
  Kristy\";\nint mappedValue = mapper.map(name);\nSystem.out.println(\"name=\" + name\
  \ + \", mapped value=\" + mappedValue);\nname=Kristy, mapped value=6\n```\n\n到目前为止，你还没有看到任何在\
  \ Java 中不使用 lambda 表达式就无法做到的事情。下面的代码片段使用匿名类实现了与上一个示例中 lambda 表达式相同的结果：\n\n```\n\
  StringToIntMapper mapper = new StringToIntMapper() {\n@Override\npublic int map(String\
  \ str) {\nreturn str.length();\n}\n};\nString name = \"Kristy\";\nint mappedValue\
  \ = mapper.map(name);\nSystem.out.println(\"name=\" + name + \", mapped value=\"\
  \ + mappedValue);\nname=Kristy, mapped value=6\n```\n\n此时，lambda 表达式似乎只是编写匿名类的一种简洁方式，从语法层面来看确实如此。但两者在语义上存在一些细微的差异。我将在后续更详细的讨论中探讨这些差异。\n\
  \n提示\n\nJava 是一种强类型语言，这意味着编译器必须知道 Java 程序中所有表达式的类型。lambda 表达式本身没有类型，因此不能作为独立表达式使用。lambda\
  \ 表达式的类型总是由编译器根据其使用的上下文来推断。\n\n为什么需要 Lambda 表达式？\n\nJava 从一开始就支持面向对象编程。在面向对象编程中，程序逻辑基于可变对象。类的*方法*包含逻辑。方法在对象上被调用，这通常会修改对象的状态。在面向对象编程中，方法调用的顺序很重要，因为每次方法调用都可能修改对象的状态，从而产生副作用。由于程序状态依赖于代码执行的顺序，因此对程序逻辑进行静态分析很困难。使用可变对象进行编程也给并发编程带来了挑战，因为程序的多个部分可能同时尝试修改同一个对象的状态。\n\
  \n近年来，随着计算机处理能力的提升，需要处理的数据量也在增长。如今，处理 TB 级别的数据已很常见，这需要并行编程。现在，计算机通常配备多核处理器，使用户能够更快地运行软件程序；同时，这也给程序员带来了挑战，即需要编写更多的并行程序，以充分利用处理器中所有可用的核心。Java\
  \ 从一开始就支持并发编程。它在 Java 7 中通过 fork/join 框架增加了对并行编程的支持，但该框架使用起来并不容易。\n\n函数式编程基于 Lambda\
  \ 演算，其存在时间远早于面向对象编程。它基于函数的概念，函数是一段接受值（称为参数）的代码块，执行该代码块以计算结果。函数代表一种功能或操作。函数不会修改数据（包括其输入），因此不会产生副作用；正因如此，在函数式编程中，函数的执行顺序并不重要。在函数式编程中，高阶函数是一种可以像数据对象一样被处理的匿名函数。也就是说，它可以存储在变量中，并在不同上下文之间传递。它可能在一个并非其定义所在的上下文中被调用。请注意，高阶函数是匿名函数，因此调用上下文无需知道其名称。闭包是一个与其定义环境打包在一起的高阶函数。闭包携带了其定义时作用域内的变量，并且即使它在与这些变量定义时不同的上下文中被调用，它也能访问这些变量。\n\
  \n近年来，函数式编程因其在并发、并行和事件驱动编程中的适用性而变得流行。现代编程语言如 C#、Groovy、Python 和 Scala 都支持函数式编程。Java\
  \ 不想落后，因此引入了 lambda 表达式来支持函数式编程，这可以与其已经很流行的面向对象特性相结合，以开发健壮、并行的程序。Java 采用的 lambda\
  \ 表达式语法与其他编程语言（如 C# 和 Scala）中使用的语法非常相似。\n\n在面向对象编程中，函数被称为方法，并且它总是类的一部分。如果你想在 Java\
  \ 中传递功能，你需要创建一个类，向该类添加一个方法来表示该功能，创建该类的一个对象，然后传递该对象。Java 中的 lambda 表达式类似于函数式编程中的高阶函数，它是一段未命名的代码块，代表一种可以像数据一样传递的功能。lambda\
  \ 表达式可以捕获其定义作用域内的变量，并且稍后可以在未定义该捕获变量的上下文中访问这些变量。这个特性让你能够使用 lambda 表达式在 Java 中实现闭包。\n\
  \nJava 8 引入了表示函数式接口实例的 lambda 表达式。在 Java 8 之前，你可以使用匿名类完成所有可以用 lambda 表达式完成的事情。函数式接口对\
  \ Java 8 来说并不新鲜；它们从一开始就存在。\n\n那么，为什么以及在哪里需要 lambda 表达式呢？匿名类使用繁琐的语法。lambda 表达式使用非常简洁的语法来实现相同的结果。lambda\
  \ 表达式并不能完全替代匿名类。在某些情况下，你仍然需要使用匿名类。为了体会 lambda 表达式的简洁性，请比较上一节中创建 `StringToIntMapper`\
  \ 接口实例的两个语句；一个使用匿名类，需要六行代码，另一个使用 lambda 表达式，只需要一行代码：\n\n```\n// 使用匿名类\nStringToIntMapper\
  \ mapper = new StringToIntMapper() {\n@Override\npublic int map(String str) {\n\
  return str.length();\n}\n};\n// 使用 lambda 表达式\nStringToIntMapper mapper = (String\
  \ str) -> str.length();\n```\n\nLambda 表达式的语法\n\nlambda 表达式描述了一个匿名函数。使用 lambda 表达式的一般语法与声明方法非常相似。其通用语法是\n\
  \n```\n() -> {  }\n```\n\n\n\nLambda 表达式由参数列表和主体组成，两者之间用箭头（`->`）分隔。参数列表的声明方式与方法参数列表相同。与方法一样，参数列表也括在圆括号中。Lambda\
  \ 表达式的主体是一个用花括号括起来的代码块。与方法的主体类似，Lambda 表达式的主体可以声明局部变量；使用包括 `break`、`continue` 和\
  \ `return` 在内的语句；抛出异常等。与方法不同，Lambda 表达式没有以下四个部分：\n\n*   Lambda 表达式没有名称。\n*   Lambda\
  \ 表达式没有返回类型。其返回类型由编译器根据其使用上下文及其主体推断得出。\n*   Lambda 表达式没有 `throws` 子句。其异常声明由编译器根据其使用上下文及其主体推断得出。\n\
  *   Lambda 表达式不能声明类型参数。也就是说，Lambda 表达式不能是泛型的。\n\n表 5-1 包含了一些 Lambda 表达式及其等效方法的示例。我为这些方法赋予了合适的名称，因为在\
  \ Java 中方法不能没有名称。编译器会推断 Lambda 表达式的返回类型。\n\n表 5-1.\n\nLambda 表达式及其等效方法示例\n\nLambda\
  \ 表达式\n |\n  等效方法\n |\n\n| --- | --- | --- | --- | --- |\n\n`(int x, int y) -> {`\n\
  \n`return x + y;`\n\n`}`\n |\n  `int sum(int x, int y) {`\n\n`return x + y;`\n\n\
  `}`\n |\n\n`(Object x) -> {`\n\n`return x;`\n\n`}`\n |\n  `Object identity(Object\
  \ x)  {`\n\n`return x;`\n\n`}`\n |\n\n`(int x, int y) -> {`\n\n`if (x > y) {`\n\n\
  `return x;`\n\n`} else {`\n\n`return y;`\n\n`}`\n\n`}`\n |\n  `int getMax(int x,\
  \ int y) {`\n\n`if (x > y) {`\n\n`return x;`\n\n`} else {`\n\n`return y;`\n\n`}`\n\
  \n`}`\n |\n\n`(String msg) -> {`\n\n`System.out.println(msg);`\n\n`}`\n |\n  `void\
  \ print(String msg) {`\n\n`System.out.println(msg);`\n\n`}`\n |\n\n`() -> {`\n\n\
  `System.out.println(LocalDate.now());`\n\n`}`\n |\n  `void printCurrentDate() {`\n\
  \n`System.out.println(LocalDate.now());`\n\n`}`\n |\n\n`() -> {`\n\n`// 此处无代码`\n\
  \n`}`  \n |\n  `void doNothing() {`\n\n`// 此处无代码`\n\n`}`\n |\n\nLambda 表达式的目标之一是保持其语法简洁，并让编译器推断细节。以下各节将讨论声明\
  \ Lambda 表达式的简写语法。\n\n省略参数类型\n\n你可以省略参数的声明类型。编译器会根据使用 Lambda 表达式的上下文推断参数的类型。\n\n\
  ```\n// 声明了参数类型\n(int x, int y) -> { return x + y; }\n// 省略了参数类型\n(x, y) -> { return\
  \ x + y; }\n```\n\n如果你省略了参数的类型，则必须为所有参数都省略，或者都不省略。你不能只为部分参数省略类型。以下 Lambda 表达式将无法编译，因为它声明了一个参数的类型，却省略了另一个参数的类型：\n\
  \n```\n// 编译时错误\n(int x, y) -> { return x + y; }\n```\n\n提示\n\n不声明其参数类型的 Lambda\
  \ 表达式称为隐式 Lambda 表达式或隐式类型 Lambda 表达式。声明其参数类型的 Lambda 表达式称为显式 Lambda 表达式或显式类型 Lambda\
  \ 表达式。\n\n声明单个参数\n\n有时 Lambda 表达式只接受一个参数。对于单参数 Lambda 表达式，你可以像处理多参数 Lambda 表达式一样省略参数类型。如果在单参数\
  \ Lambda 表达式中省略了参数类型，你还可以省略圆括号。以下是声明单参数 Lambda 表达式的三种方式：\n\n```\n// 声明了参数类型\n(String\
  \ msg) -> { System.out.println(msg); }\n// 省略了参数类型\n(msg) -> { System.out.println(msg);\
  \ }\n// 省略了参数类型和圆括号\nmsg -> { System.out.println(msg); }\n```\n\n只有当单个参数也省略了其类型时，才能省略圆括号。以下\
  \ Lambda 表达式将无法编译：\n\n```\n// 省略了圆括号，但未省略参数类型，这是不允许的。\nString msg -> { System.out.println(msg);\
  \ }\n```\n\n声明无参数\n\n如果 Lambda 表达式不接受任何参数，你需要使用空的圆括号。\n\n```\n// 不接受参数\n() -> {\
  \ System.out.println(\"Hello\"); }\n```\n\n当 Lambda 表达式不接受参数时，不允许省略圆括号。以下声明将无法编译：\n\
  \n```\n-> { System.out.println(\"Hello\"); }\n```\n\n带修饰符的参数\n\n你可以在显式 Lambda 表达式的参数声明中使用诸如\
  \ `final` 之类的修饰符。以下两个 Lambda 表达式是有效的：\n\n```\n(final int x, final int y) -> { return\
  \ x + y; }\n(int x, final int y) -> { return x + y; }\n```\n\n以下 Lambda 表达式将无法编译，因为它在参数声明中使用了\
  \ `final` 修饰符，但省略了参数类型：\n\n```\n(final x, final y) -> { return x + y; }\n```\n\n\
  声明 Lambda 表达式的主体\n\nLambda 表达式的主体可以是一个块语句或单个表达式。块语句用花括号括起来；单个表达式则不用花括号括起来。\n\nLambda\
  \ 表达式主体的执行方式与方法主体相同。`return` 语句或主体的结束会将控制权返回给 Lambda 表达式的调用者。\n\n当使用表达式作为主体时，该表达式会被求值并返回给调用者。如果表达式求值结果为\
  \ `void`，则不会向调用者返回任何内容。以下两个 Lambda 表达式是相同的；一个使用了块语句，另一个使用了表达式：\n\n```\n// 使用块语句。接受两个\
  \ int 参数并返回它们的和。\n(int x, int y) -> { return x + y; }\n// 使用表达式。接受两个 int 参数并返回它们的和。\n\
  (int x, int y) -> x + y\n```\n\n以下两个 Lambda 表达式是相同的；一个使用块语句作为主体，另一个使用求值结果为 `void`\
  \ 的表达式：\n\n```\n// 使用块语句\n(String msg) -> { System.out.println(msg); }\n// 使用表达式\n\
  (String msg) -> System.out.println(msg)\n```\n\n目标类型\n\n每个 Lambda 表达式都有一个类型，即函数式接口类型。换句话说，Lambda\
  \ 表达式代表了一个函数式接口的实例。考虑以下 Lambda 表达式：\n\n```\n(x, y) -> x + y\n```\n\n这个 Lambda 表达式的类型是什么？换句话说，这个\
  \ Lambda 表达式代表哪个函数式接口的实例？目前我们不知道这个 Lambda 表达式的类型。我们能确定的只是它接受两个名为 `x` 和 `y` 的参数。我们无法判断其返回类型，因为表达式\
  \ `x + y` 的结果取决于 `x` 和 `y` 的类型，可能求值为数字（`int`、`long`、`float` 或 `double`）或 `String`。这是一个隐式\
  \ Lambda 表达式，因此编译器必须根据使用该表达式的上下文来推断两个参数的类型。根据使用上下文的不同，这个 Lambda 表达式可能属于不同的函数式接口类型。\n\
  \nJava 中有两种类型的表达式：\n\n*   独立表达式\n*   多态表达式\n\n独立表达式是指其类型可以在不获知其使用上下文的情况下确定的表达式。以下是独立表达式的示例：\n\
  \n```\n// 表达式的类型是 String\nnew String(\"Hello\")\n// 表达式的类型是 String（字符串字面量也是一个表达式）\n\
  \"Hello\"\n// 表达式的类型是 ArrayList\nnew ArrayList()\n```\n\n\n\n一个多态表达式（poly expression）是指在不同上下文中具有不同类型的表达式。编译器会确定其类型。允许使用多态表达式的上下文被称为多态上下文（poly\
  \ contexts）。Java 中的所有 lambda 表达式都是多态表达式。你必须在其上下文中使用它才能知道其类型。多态表达式在 Java 8 和 lambda\
  \ 表达式出现之前就已存在。例如，表达式 `new ArrayList<>()` 就是一个多态表达式。除非你提供其使用上下文，否则无法判断其类型。该表达式在以下两个上下文中被使用，并代表了两种不同的类型：\n\
  \n```\n// new ArrayList() 的类型是 ArrayList\nArrayList idList = new ArrayList();\n\
  // new ArrayList() 的类型是 ArrayList\nArrayList nameList = new ArrayList();\n```\n\n\
  编译器会推断 lambda 表达式的类型。使用 lambda 表达式的上下文期望一个类型，这个类型被称为**目标类型**。从上下文中推断 lambda 表达式类型的过程被称为**目标类型推断**。考虑以下赋值语句的伪代码，其中类型为\
  \ `T` 的变量被赋值为一个 lambda 表达式：\n\n```\nT t = ;\n```\n\n在此上下文中，lambda 表达式的目标类型是 `T`。编译器使用以下规则来确定\
  \ `<LambdaExpression>` 是否与其目标类型 `T` 赋值兼容：\n\n*   `T` 必须是一个函数式接口类型。\n*   lambda 表达式具有与\
  \ `T` 的抽象方法相同数量和类型的参数。对于隐式 lambda 表达式，编译器将从 `T` 的抽象方法中推断参数的类型。\n*   lambda 表达式主体返回值的类型必须与\
  \ `T` 的抽象方法的返回类型赋值兼容。\n*   如果 lambda 表达式主体抛出任何受检异常，这些异常必须与 `T` 的抽象方法声明的 `throws`\
  \ 子句兼容。如果目标类型的方法不包含 `throws` 子句，则在 lambda 表达式主体中抛出受检异常会导致编译时错误。\n\n让我们看几个目标类型推断的示例。考虑两个函数式接口\
  \ `Adder` 和 `Joiner`，如清单 5-2 和清单 5-3 所示。\n\n```\n// Adder.java\npackage com.jdojo.lambda;\n\
  @FunctionalInterface\npublic interface Adder {\ndouble add(double n1, double n2);\n\
  }\n清单 5-2. 名为 Adder 的函数式接口\n```\n\n```\n// Joiner.java\npackage com.jdojo.lambda;\n\
  @FunctionalInterface\npublic interface Joiner {\nString join(String s1, String s2);\n\
  }\n清单 5-3. 名为 Joiner 的函数式接口\n```\n\n`Adder` 接口的 `add()` 方法用于将两个数字相加。`Joiner` 接口的\
  \ `join()` 方法用于连接两个字符串。这两个接口仅用于演示目的；然而，它们能很好地展示 lambda 表达式的目标类型推断。考虑以下赋值语句：\n\n\
  ```\nAdder adder = (x, y) -> x + y;\n```\n\n`adder` 变量的类型是 `Adder`。lambda 表达式被赋值给变量\
  \ `adder`，因此 lambda 表达式的目标类型是 `Adder`。编译器验证 `Adder` 是一个函数式接口。该 lambda 表达式是一个隐式 lambda\
  \ 表达式。编译器发现 `Adder` 接口包含一个 `double add(double, double)` 抽象方法。它推断出参数 `x` 和 `y` 的类型分别为\
  \ `double` 和 `double`。此时，编译器将该语句视为如下形式：\n\n```\nAdder adder = (double x, double\
  \ y) -> x + y;\n```\n\n现在编译器验证 lambda 表达式返回的值与 `add()` 方法的返回类型的兼容性。`add()` 方法的返回类型是\
  \ `double`。lambda 表达式返回 `x + y`，由于编译器已知 `x` 和 `y` 的类型是 `double`，因此结果类型为 `double`。该\
  \ lambda 表达式没有抛出任何受检异常。因此，编译器无需对此进行验证。至此，编译器推断出该 lambda 表达式的类型是 `Adder`。\n\n对以下赋值语句应用目标类型推断规则：\n\
  \n```\nJoiner joiner = (x, y) -> x + y;\n```\n\n这次，编译器推断出 lambda 表达式的类型是 `Joiner`。你是否看到了一个多态表达式的例子，其中相同的\
  \ lambda 表达式 `(x, y) -> x + y` 在一个上下文中是 `Adder` 类型，而在另一个上下文中是 `Joiner` 类型？\n\n清单\
  \ 5-4 展示了如何在程序中使用这些 lambda 表达式。请注意，在使用 lambda 表达式创建函数式接口的实例后，一切照旧。也就是说，在创建了函数式接口的实例后，你可以像在\
  \ Java 8 之前那样使用该实例。lambda 表达式不会改变使用函数式接口实例来调用其方法的方式。\n\n```\n// TargetTypeTest.java\n\
  package com.jdojo.lambda;\npublic class TargetTypeTest {\npublic static void main(String[]\
  \ args)  {\n// 使用 lambda 表达式创建一个 Adder\nAdder adder = (x, y) -> x + y;\n// 使用 lambda\
  \ 表达式创建一个 Joiner\nJoiner joiner = (x, y) -> x + y;\n// 将两个 double 相加\ndouble sum1\
  \ = adder.add(10.34, 89.11);\n// 将两个 int 相加\ndouble sum2 = adder.add(10, 89);\n\
  // 连接两个字符串\nString str = joiner.join(\"Hello\", \" lambda\");\nSystem.out.println(\"\
  sum1 = \" + sum1);\nSystem.out.println(\"sum2 = \" + sum2);\nSystem.out.println(\"\
  str = \" + str);\n}\n}\nsum1 = 99.45\nsum2 = 99.0\nstr = Hello lambda\n清单 5-4. 使用\
  \ Lambda 表达式的示例\n```\n\n现在我将讨论方法调用上下文中的目标类型推断。你可以将 lambda 表达式作为参数传递给方法。考虑清单 5-5\
  \ 中所示的 `LambdaUtil` 类的代码。\n\n```\n// LambdaUtil.java\npackage com.jdojo.lambda;\n\
  public class LambdaUtil {\npublic void testAdder(Adder adder) {\ndouble x = 190.90;\n\
  double y = 8.50;\ndouble sum = adder.add(x, y);\nSystem.out.print(\"Using an Adder:\"\
  );\nSystem.out.println(x + \" + \" + y + \" = \" + sum);\n}\npublic void testJoiner(Joiner\
  \ joiner) {\nString s1 = \"Hello\";\nString s2 = \"World\";\nString s3 = joiner.join(s1,s2);\n\
  System.out.print(\"Using a Joiner:\");\nSystem.out.println(\"\\\"\" + s1 + \"\\\"\
  \ + \\\"\" + s2 + \"\\\" = \\\"\" + s3 + \"\\\"\");\n}\n}\n清单 5-5. 一个将函数式接口作为方法参数的\
  \ LambdaUtil 类\n```\n\n`LambdaUtil` 类包含两个方法：`testAdder()` 和 `testJoiner()`。一个方法接受\
  \ `Adder` 作为参数，另一个接受 `Joiner` 作为参数。两个方法都有简单的实现。考虑以下代码片段：\n\n```\nLambdaUtil util\
  \ = new LambdaUtil();\nutil.testAdder((x, y) -> x + y);\n```\n\n第一条语句创建了一个 `LambdaUtil`\
  \ 类的对象。第二条语句在该对象上调用 `testAdder()` 方法，并传递一个 lambda 表达式 `(x, y) -> x + y`。编译器必须推断该\
  \ lambda 表达式的类型。lambda 表达式的目标类型是 `Adder`，因为 `testAdder(Adder adder)` 的参数类型是 `Adder`。其余的目标类型推断过程与你之前看到的赋值语句相同。最后，编译器推断出该\
  \ lambda 表达式的类型是 `Adder`。\n\n清单 5-6 中的程序创建了一个 `LambdaUtil` 类的对象，并调用了 `testAdder()`\
  \ 和 `testJoiner()` 方法。\n\n\n\n```\n// LambdaUtilTest.java\npackage com.jdojo.lambda;\n\
  public class LambdaUtilTest {\npublic static void main(String[] args)  {\nLambdaUtil\
  \ util = new LambdaUtil();\n// 调用 testAdder() 方法\nutil.testAdder((x, y) -> x + y);\n\
  // 调用 testJoiner() 方法\nutil.testJoiner((x, y) -> x + y);\n// 调用 testJoiner() 方法。Joiner\
  \ 会在两个字符串之间添加一个空格\nutil.testJoiner((x, y) -> x + \" \" + y);\n// 调用 testJoiner()\
  \ 方法。Joiner 会将字符串反转，并将反转后的字符串\n// 以逗号分隔，按逆序连接\nutil.testJoiner((x, y) -> {\nStringBuilder\
  \ sbx = new StringBuilder(x);\nStringBuilder sby = new StringBuilder(y);\nsby.reverse().append(\"\
  ,\").append(sbx.reverse());\nreturn sby.toString();\n});\n}\n}\n使用加法器：190.9 + 8.5\
  \ = 199.4\n使用连接器：\"Hello\" + \"World\" = \"HelloWorld\"\n使用连接器：\"Hello\" + \"World\"\
  \ = \"Hello World\"\n使用连接器：\"Hello\" + \"World\" = \"dlroW,olleH\"\n清单 5-6.\n使用\
  \ Lambda 表达式作为方法参数\n```\n\n请注意 `LambdaUtilTest` 类的输出。\n`testJoiner()` 方法\n被调用了三次，每次打印出连接两个字符串\
  \ `\"Hello\"` 和 `\"World\"` 的不同\n结果。这是可能的，因为向该方法传递了不同的 lambda 表达式。\n至此，可以说你已经将\n\
  `testJoiner()` 方法的行为参数化了。也就是说，`testJoiner()` 方法\n的行为取决于其参数。通过参数改变方法的行为被称为**行为参数化**。\n\
  这也被称为将代码作为数据传递，因为你将封装在 lambda 表达式中的代码（逻辑、\n功能或行为）像数据一样传递给方法。\n\n编译器并不总能推断出 lambda\
  \ 表达式的类型。在某些上下文中，编译器无法推断\nlambda 表达式的类型；这些上下文不允许使用 lambda 表达式。某些上下文可能允许使用\nlambda\
  \ 表达式，但其使用本身对编译器来说可能是不明确的；一种情况是\n将 lambda 表达式传递给重载方法。\n\n考虑清单 5-7 中所示的\n`LambdaUtil2`\
  \ 类的代码。该类的代码与\n清单 5-5 中的 `LambdaUtil` 类相同，只是\n该类将两个方法的名称改为相同的 `test()`，使其成为一个重载方法。\n\
  \n```\n// LambdaUtil2.java\npackage com.jdojo.lambda;\npublic class LambdaUtil2\
  \ {\npublic void test(Adder adder) {\ndouble x = 190.90;\ndouble y = 8.50;\ndouble\
  \ sum = adder.add(x, y);\nSystem.out.print(\"使用加法器:\");\nSystem.out.println(x +\
  \ \" + \" + y + \" = \" + sum);\n}\npublic void test(Joiner joiner) {\nString s1\
  \ = \"Hello\";\nString s2 = \"World\";\nString s3 = joiner.join(s1,s2);\nSystem.out.print(\"\
  使用连接器:\");\nSystem.out.println(\"\\\"\" + s1 + \"\\\" + \\\"\" + s2 + \"\\\" = \\\
  \"\" + s3 + \"\\\"\");\n}\n}\n清单 5-7.\n一个在方法参数中使用函数式接口的 LambdaUtil2 类\n```\n\n考虑以下代码片段：\n\
  \n```\nLambdaUtil2 util = new LambdaUtil2();\nutil.test((x, y) -> x + y); // 编译时错误\n\
  ```\n\n第二条语句会导致以下编译时错误：\n\n```\n对 test 的引用不明确。LambdaUtil2 中的方法 test(Adder) 和 LambdaUtil2\
  \ 中的方法 test(Joiner) 都匹配。\n```\n\n对 `test()` 方法的调用失败，因为 lambda 表达式是隐式的，并且它匹配\n`test()`\
  \ 方法的两个版本。编译器不知道使用哪个方法：`test(Adder adder)` 还是\n`test(Joiner joiner)`。在这种情况下，你需要通过提供更多信息来帮助编译器。\n\
  以下是帮助编译器解决歧义的一些方法：\n\n*   如果 lambda 表达式是隐式的，通过指定参数的类型使其显式化。\n*   使用强制类型转换。\n*  \
  \ 不要直接将 lambda 表达式用作方法参数。首先，将其赋值给所需类型的变量，然后将该变量传递给方法。\n\n让我们讨论解决编译时错误的所有三种方法。以下代码片段将\
  \ lambda 表达式改为显式\nlambda 表达式：\n\n```\nLambdaUtil2 util = new LambdaUtil2();\nutil.test((double\
  \ x, double y) -> x + y); // 正确。将调用 test(Adder adder)\n```\n\n在 lambda 表达式中指定参数类型解决了问题。编译器有两个候选方法：`test(Adder\
  \ adder)` 和\n`test(Joiner joiner)`。有了 `(double x, double y)` 参数信息，只有 `test(Adder\
  \ adder)` 方法匹配。\n\n以下代码片段使用强制类型转换将 lambda 表达式转换为 `Adder` 类型：\n\n```\nLambdaUtil2\
  \ util = new LambdaUtil2();\nutil.test((Adder)(x, y) -> x + y); // 正确。将调用 test(Adder\
  \ adder)\n```\n\n使用强制类型转换告诉编译器 lambda 表达式的类型是 `Adder`，因此，帮助它选择 `test(Adder adder)`\
  \ 方法。\n\n考虑以下将方法调用分解为两条语句的代码片段：\n\n```\nLambdaUtil2 util = new LambdaUtil2();\n\
  Adder adder = (x, y) -> x + y;\nutil.test(adder); // 正确。将调用 test(Adder adder)\n\
  ```\n\nlambda 表达式被赋值给一个 `Adder` 类型的变量，然后将该变量传递给 `test()` 方法。同样，这有助于编译器根据 `adder`\
  \ 变量的编译时类型选择 `test(Adder adder)` 方法。\n\n清单 5-8 中的程序与清单 5-6 中所示的程序类似，只是它使用了 `LambdaUtil2`\
  \ 类。它使用显式 lambda 表达式和强制类型转换来解决 lambda 表达式的歧义匹配。\n\n```\n// LambdaUtil2Test.java\n\
  package com.jdojo.lambda;\npublic class LambdaUtil2Test {\npublic static void main(String[]\
  \ args) {\nLambdaUtil2 util = new LambdaUtil2();\n// 调用 testAdder() 方法\nutil.test((double\
  \ x, double y) -> x + y);\n// 调用 testJoiner() 方法\nutil.test((String x, String y)\
  \ -> x + y);\n// 调用 testJoiner() 方法。Joiner 会在两个字符串之间添加一个空格\nutil.test((Joiner) (x,\
  \ y) -> x + \" \" + y);\n// 调用 testJoiner() 方法。Joiner 会将字符串反转，并将反转后的字符串\n// 以逗号分隔，按逆序连接\n\
  util.test((Joiner) (x, y) -> {\nStringBuilder sbx = new StringBuilder(x);\nStringBuilder\
  \ sby = new StringBuilder(y);\nsby.reverse().append(\",\").append(sbx.reverse());\n\
  return sby.toString();\n});\n}\n}\n使用加法器：190.9 + 8.5 = 199.4\n使用连接器：\"Hello\" +\
  \ \"World\" = \"HelloWorld\"\n使用连接器：\"Hello\" + \"World\" = \"Hello World\"\n使用连接器：\"\
  Hello\" + \"World\" = \"dlroW,olleH\"\n清单 5-8.\n在目标类型推断期间解决歧义\n```\n\nLambda 表达式只能在以下上下文中使用：\n\
  \n*   **赋值上下文**：lambda 表达式可以出现在赋值语句中赋值运算符的右侧。例如\n\n```\n    ReferenceType variable1\
  \ = LambdaExpression;\n    ```\n\n*   **方法调用上下文**：lambda 表达式可以作为方法或构造函数调用的参数出现。例如\n\
  \n```\n    util.testJoiner(LambdaExpression);\n    ```\n\n*   **返回上下文**：lambda 表达式可以出现在方法内部的\
  \ `return` 语句中，其目标类型是该方法声明的返回类型。例如\n\n```\n    return LambdaExpression;\n    ```\n\
  \n*   **强制类型转换上下文**：如果 lambda 表达式前面有强制类型转换，则可以使用它。强制类型转换中指定的类型是其目标类型。例如\n\n```\n\
  \    (Joiner) LambdaExpression;\n    ```\n\n函数式接口\n\n函数式接口就是只有一个抽象方法的接口。接口中以下类型的方法不计入定义函数式接口：\n\
  \n*   默认方法\n*   static 方法\n*   从 `Object` 类继承的公共方法\n\n\n\n请注意，一个接口可能包含多个抽象方法，但如果除了一个方法之外，其余方法都是对\
  \ `Object` 类中方法的重声明，那么它仍然可以是一个函数式接口。\n考虑 `java.util` 包中 `Comparator` 接口的声明，如下所示：\n\
  \n```\npackage java.util;\n@FunctionalInterface\npublic interface Comparator {\n\
  // 接口中声明的抽象方法\nint compare(T o1, T o2);\n// 对 Object 类中 equals() 方法的重声明\nboolean\
  \ equals(Object obj);\n// 此处省略了更多静态方法和默认方法\n}\n```\n\n`Comparator` 接口包含两个抽象方法：`compare()`\
  \ 和 `equals()`。`Comparator` 接口中的 `equals()` 方法是对 `Object` 类中 `equals()` 方法的重声明，因此它不计入函数式接口要求的“仅有一个抽象方法”之列。`Comparator`\
  \ 接口还包含几个此处未展示的默认方法和静态方法。\n\nLambda 表达式用于表示函数式编程中使用的匿名函数。函数式接口通过其唯一的抽象方法来表示一种功能/操作。这种共性正是\
  \ lambda 表达式的目标类型始终是函数式接口的原因。\n\n**使用 @FunctionalInterface 注解**\n\n函数式接口的声明可以选择性地使用\
  \ `java.lang` 包中的 `@FunctionalInterface` 注解进行标注。到目前为止，本章中声明的所有函数式接口（例如 `Adder` 和\
  \ `Joiner`）都已使用 `@FunctionalInterface` 注解。此注解的存在告诉编译器确保所声明的类型是一个函数式接口。如果 `@FunctionalInterface`\
  \ 注解用于非函数式接口或其他类型（如类），则会发生编译时错误。如果你没有在具有一个抽象方法的接口上使用 `@FunctionalInterface` 注解，该接口仍然是一个函数式接口，并且可以作为\
  \ lambda 表达式的目标类型。使用此注解可以为你提供来自编译器的额外保证。该注解的存在还可以保护你免于无意中将函数式接口更改为非函数式接口，因为编译器会捕获此类错误。\n\
  \n以下 `Operations` 接口的声明将无法编译，因为该接口声明使用了 `@FunctionalInterface` 注解，但它不是一个函数式接口（定义了两个抽象方法）：\n\
  \n```\n@FunctionalInterface\npublic interface Operations {\ndouble add(double n1,\
  \ double n2);\ndouble subtract(double n1, double n2);\n}\n```\n\n要编译 `Operations`\
  \ 接口，要么删除两个抽象方法中的一个，要么删除 `@FunctionalInterface` 注解。以下 `Test` 类的声明将无法编译，因为 `@FunctionalInterface`\
  \ 不能用于函数式接口以外的类型：\n\n```\n@FunctionalInterface\npublic class Test {\n// 代码写在这里\n\
  }\n```\n\n**泛型函数式接口**\n\n函数式接口可以具有类型参数。也就是说，函数式接口可以是泛型的。泛型函数式参数的一个例子是带有一个类型参数 `T`\
  \ 的 `Comparator` 接口。\n\n```\n@FunctionalInterface\npublic interface Comparator {\n\
  int compare(T o1, T o2);\n}\n```\n\n函数式接口可以有一个泛型抽象方法。也就是说，抽象方法可以声明类型参数。以下是一个名为 `Processor`\
  \ 的非泛型函数式接口的示例，其抽象方法 `process()` 是泛型的：\n\n```\n@FunctionalInterface\npublic interface\
  \ Processor {\nvoid process(T[] list);\n}\n```\n\nLambda 表达式不能声明类型参数，因此，它不能将抽象方法为泛型的接口作为目标类型。例如，你不能使用\
  \ lambda 表达式来表示 `Processor` 接口。在这种情况下，你需要使用方法引用（我将在下一节讨论）或匿名类。\n\n让我们看一个简短的泛型函数式接口示例，并使用\
  \ lambda 表达式实例化它。清单 5-9 展示了一个名为 `Mapper` 的函数式接口的代码。\n\n```\n// Mapper.java\npackage\
  \ com.jdojo.lambda;\n@FunctionalInterface\npublic interface Mapper {\n// 一个抽象方法\n\
  int map(T source);\n// 一个泛型静态方法\npublic static  int[] mapToInt(U[] list, Mapper\
  \ mapper) {\nint[] mappedValues = new int[list.length];\nfor (int i = 0; i < list.length;\
  \ i++) {\n// 将对象映射为 int\nmappedValues[i] = mapper.map(list[i]);\n}\nreturn mappedValues;\n\
  }\n}\n清单 5-9.\n一个 Mapper 函数式接口\n```\n\n`Mapper` 是一个带有类型参数 `T` 的泛型函数式接口。它的抽象方法 `map()`\
  \ 接受一个类型为 `T` 的对象作为参数，并返回一个 `int`。`mapToInt()` 方法是一个泛型静态方法，它接受一个类型为 `U` 的数组和一个类型为\
  \ `U` 本身或 `U` 的超类型的 `Mapper`。该方法返回一个 `int` 数组，其元素包含作为数组传入的对应元素的映射值。\n\n清单 5-10 中的程序展示了如何使用\
  \ lambda 表达式来实例化 `Mapper<T>` 接口。该程序将一个 `String` 数组和一个 `Integer` 数组映射为 `int` 数组。\n\
  \n```\n// MapperTest.java\npackage com.jdojo.lambda;\npublic class MapperTest {\n\
  public static void main(String[] args) {\n// 根据名字长度映射\nSystem.out.println(\"将名字映射到其长度：\"\
  );\nString[] names = {\"David\", \"Li\", \"Doug\"};\nint[] lengthMapping = Mapper.mapToInt(names,\
  \ (String name) -> name.length());\nprintMapping(names, lengthMapping);\nSystem.out.println(\"\
  \\n 将整数映射到其平方：\");\nInteger[] numbers = {7, 3, 67};\nint[] countMapping = Mapper.mapToInt(numbers,\
  \ (Integer n) -> n * n);\nprintMapping(numbers, countMapping);\n}\npublic static\
  \ void printMapping(Object[] from, int[] to) {\nfor (int i = 0; i < from.length;\
  \ i++) {\nSystem.out.println(from[i] + \" 映射到 \" + to[i]);\n}\n}\n}\n将名字映射到其长度：\n\
  David 映射到 5\nLi 映射到 2\nDoug 映射到 4\n将整数映射到其平方：\n7 映射到 49\n3 映射到 9\n67 映射到 4489\n\
  清单 5-10.\n使用 Mapper 函数式接口\n```\n\n**交集类型与 Lambda 表达式**\n\nJava 8 引入了一种称为交集类型的新类型，它是多种类型的交集（或子类型）。交集类型可以作为强制转换中的目标类型出现。两个类型之间使用与号（`&`），例如\
  \ `(Type1 & Type2 & Type3)`，它表示一个 `Type1`、`Type2` 和 `Type3` 交集的新类型。考虑一个名为 `Sensitive`\
  \ 的标记接口，如清单 5-11 所示。\n\n```\n// Sensitive.java\npackage com.jdojo.lambda;\npublic\
  \ interface Sensitive {\n// 这是一个标记接口。因此，没有方法存在。\n}\n清单 5-11.\n一个名为 Sensitive 的标记接口\n\
  ```\n\n假设你有一个 lambda 表达式赋值给 `Sensitive` 类型的变量。\n\n```\nSensitive sen = (x, y) ->\
  \ x + y; // 编译时错误\n```\n\n此语句无法编译。Lambda 表达式的目标类型必须是函数式接口；`Sensitive` 不是一个函数式接口。然而，你应该能够进行这样的赋值，因为标记接口不包含任何方法。在这种情况下，你需要使用带有交集类型的强制转换，该交集类型会创建一个新的合成类型，该类型是所有类型的子类型。以下语句将编译通过：\n\
  \n```\nSensitive sen = (Sensitive & Adder) (x, y) -> x + y; // 正确\n```\n\n\n\n交集类型\
  \ `Sensitive & Adder` 仍然是一个函数式接口，因此该 lambda 表达式的目标类型是一个包含 `Adder` 接口中一个方法的函数式接口。\n\
  \n在 Java 中，你可以将对象转换为字节流，并在之后恢复该对象。这被称为序列化。一个类必须实现 `java.io.Serializable` 标记接口，其对象才能被序列化。如果你希望\
  \ lambda 表达式可被序列化，则需要使用带有交集类型的强制类型转换。以下语句将一个 lambda 表达式赋值给 `Serializable` 接口的变量：\n\
  \n```\nSerializable ser = (Serializable & Adder) (x, y) -> x + y;\n```\n\n提示\n\n\
  我将在第 7 章中介绍 `Serializable` 接口和对象的序列化。\n\n常用函数式接口\n\nJava 8 在 `java.util.function`\
  \ 包中新增了许多常用的函数式接口。它们列于表 5-2 中。\n\n表 5-2. java.util.function 包中声明的函数式接口\n\n| 接口名称\
  \ | 方法 | 描述 |\n| --- | --- | --- |\n| `Function<T,R>` | `R apply(T t)` | 表示一个接受类型\
  \ `T` 参数并返回类型 `R` 结果的函数。 |\n| `BiFunction<T,U,R>` | `R apply(T t, U u)` | 表示一个接受类型\
  \ `T` 和 `U` 两个参数并返回类型 `R` 结果的函数。 |\n| `Predicate<T>` | `boolean test(T t)` | 在数学中，谓词是一个布尔值函数，它接受一个参数并返回\
  \ `true` 或 `false`。该函数表示一个对指定参数返回 `true` 或 `false` 的条件。 |\n| `BiPredicate<T,U>`\
  \ | `boolean test(T t, U u)` | 表示一个带有两个参数的谓词。 |\n| `Consumer<T>` | `void accept(T\
  \ t)` | 表示一个接受参数、对其进行操作以产生某些副作用，并且不返回结果的操作。 |\n| `BiConsumer<T,U>` | `void accept(T\
  \ t, U u)` | 表示一个接受两个参数、对其进行操作以产生某些副作用，并且不返回结果的操作。 |\n| `Supplier<T>` | `T get()`\
  \ | 表示一个返回值的供应商。 |\n| `UnaryOperator<T>` | `T apply(T t)` | 继承自 `Function<T,T>`。表示一个接受参数并返回相同类型结果的函数。\
  \ |\n| `BinaryOperator<T>` | `T apply(T t1, T t2)` | 继承自 `BiFunction<T,T,T>`。表示一个接受两个相同类型参数并返回相同类型结果的函数。\
  \ |\n\n表中仅展示了函数式接口的泛型版本。这些接口存在多个特化版本。它们针对常用的原始数据类型进行了特化；例如，`IntConsumer` 是 `Consumer<T>`\
  \ 的一个特化版本。表中的某些接口包含便捷的默认方法和静态方法。该表仅列出了抽象方法，未列出默认方法和静态方法。\n\n使用 Function<T,R> 接口\n\
  \n`Function<T,R>` 接口有六个特化版本：\n\n*   `IntFunction<R>`\n*   `LongFunction<R>`\n* \
  \  `DoubleFunction<R>`\n*   `ToIntFunction<T>`\n*   `ToLongFunction<T>`\n*   `ToDoubleFunction<T>`\n\
  \n`IntFunction<R>`、`LongFunction<R>` 和 `DoubleFunction<R>` 分别接受一个 `int`、`long` 和\
  \ `double` 作为参数，并返回类型 `R` 的值。`ToIntFunction<T>`、`ToLongFunction<T>` 和 `ToDoubleFunction<T>`\
  \ 接受一个类型 `T` 的参数，并分别返回一个 `int`、`long` 和 `double`。对于表中列出的其他类型的泛型函数，也存在类似的专用函数。\n\n\
  提示\n\n你的 `com.jdojo.lambda.Mapper<T>` 接口与 `java.util.function` 包中的 `ToIntFunction<T>`\
  \ 表示相同的函数类型。你创建 `Mapper<T>` 接口是为了学习如何创建和使用泛型函数式接口。从现在开始，在创建自己的函数式接口之前，先查看内置的函数式接口；如果它们满足你的需求，就直接使用它们。\n\
  \n以下代码片段展示了如何使用 `Function<T, R>` 函数类型的四种变体，用同一个 lambda 表达式来表示一个接受 `int` 并返回其平方的函数：\n\
  \n```\n// 接受一个 int 并返回其平方\nFunction square1 = x -> x * x;\nIntFunction square2 =\
  \ x -> x * x;\nToIntFunction square3 = x -> x * x;\nUnaryOperator square4 = x ->\
  \ x * x;\nSystem.out.println(square1.apply(5));\nSystem.out.println(square2.apply(5));\n\
  System.out.println(square3.applyAsInt(5));\nSystem.out.println(square4.apply(5));\n\
  ```\n\n`Function` 接口包含以下默认方法和静态方法：\n\n*   `default <V> Function<T,V> andThen(Function<?\
  \ super R,? extends V> after)`\n*   `default <V> Function<V,R> compose(Function<?\
  \ super V,? extends T> before)`\n*   `static <T> Function<T,T> identity()`\n\n`andThen()`\
  \ 方法返回一个组合的 `Function`，它先将此函数应用于参数，然后将指定的 `after` 函数应用于结果。`compose()` 函数返回一个组合函数，它先将指定的\
  \ `before` 函数应用于参数，然后将此函数应用于结果。`identity()` 方法返回一个始终返回其参数的函数。\n\n以下代码片段演示了如何使用 `Function`\
  \ 接口的默认方法和静态方法来组合新函数：\n\n```\n// 创建两个函数\nFunction square = x -> x * x;\nFunction\
  \ addOne = x -> x + 1;\n// 从这两个函数组合出新函数\nFunction squareAddOne = square.andThen(addOne);\n\
  Function addOneSquare = square.compose(addOne);\n// 获取一个恒等函数\nFunction identity\
  \ = Function.identity();\n// 测试这些函数\nlong num = 5L;\nSystem.out.println(\"数字: \"\
  \ + num);\nSystem.out.println(\"先平方再加一: \" + squareAddOne.apply(num));\nSystem.out.println(\"\
  先加一再平方: \" + addOneSquare.apply(num));\nSystem.out.println(\"恒等: \" + identity.apply(num));\n\
  数字: 5\n先平方再加一: 26\n先加一再平方: 36\n恒等: 5\n```\n\n你不必局限于组合一个仅由两个按特定顺序执行的函数构成的函数。一个函数可以由任意多个函数组合而成。你可以通过链式调用\
  \ lambda 表达式，在一个表达式中创建一个组合函数。请注意，当你链式调用 lambda 表达式时，可能需要向编译器提供提示以解决可能出现的目标类型歧义。以下是一个通过链式调用三个函数来组合函数的示例。这里提供了强制类型转换来帮助编译器。如果没有强制类型转换，编译器将无法推断目标类型。\n\
  \n```\n// 对输入平方，结果加一，再对结果平方\nFunction chainedFunction = ((Function)(x -> x * x))\n\
  .andThen(x -> x + 1)\n.andThen(x -> x * x);\nSystem.out.println(chainedFunction.apply(3L));\n\
  ```\n\n使用 Predicate<T> 接口\n\n谓词表示一个对于给定输入为真或假的条件。`Predicate` 接口包含以下默认方法和静态方法，允许你使用逻辑\
  \ `NOT`、`AND` 和 `OR` 基于其他谓词来组合谓词。\n\n*   `default Predicate<T> negate()`\n*   `default\
  \ Predicate<T> and(Predicate<? super T> other)`\n*   `default Predicate<T> or(Predicate<?\
  \ super T> other)`\n*   `static <T> Predicate<T> isEqual(Object targetRef)`\n\n\n\
  \n`negate()` 方法返回一个 `Predicate`，它是原始谓词的逻辑否定。`and()` 方法返回此谓词与指定谓词的短路逻辑 `AND` 谓词。`or()`\
  \ 方法返回此谓词与指定谓词的短路逻辑 `OR` 谓词。`isEqual()` 方法返回一个谓词，该谓词根据 `Objects.equals(Object o1,\
  \ Object o2)` 测试指定的 `targetRef` 是否等于谓词的指定参数；如果两个输入均为 `null`，则此谓词计算结果为 true。你可以链式调用这些方法来创建复杂的谓词。以下代码片段展示了创建和使用谓词的一些示例：\n\
  \n```\n// 创建一些谓词\nPredicate greaterThanTen = x -> x > 10;\nPredicate divisibleByThree\
  \ = x -> x % 3 == 0;\nPredicate divisibleByFive = x -> x % 5 == 0;\nPredicate equalToTen\
  \ = Predicate.isEqual(null);\n// 使用 NOT、AND 和 OR 在其他谓词上创建谓词\nPredicate lessThanOrEqualToTen\
  \ = greaterThanTen.negate();\nPredicate divisibleByThreeAndFive = divisibleByThree.and(divisibleByFive);\n\
  Predicate divisibleByThreeOrFive = divisibleByThree.or(divisibleByFive);\n// 测试谓词\n\
  int num = 10;\nSystem.out.println(\"Number: \" + num);\nSystem.out.println(\"greaterThanTen:\
  \ \" + greaterThanTen.test(num));\nSystem.out.println(\"divisibleByThree: \" + divisibleByThree.test(num));\n\
  System.out.println(\"divisibleByFive: \" + divisibleByFive.test(num));\nSystem.out.println(\"\
  lessThanOrEqualToTen: \" + lessThanOrEqualToTen.test(num));\nSystem.out.println(\"\
  divisibleByThreeAndFive: \" + divisibleByThreeAndFive.test(num));\nSystem.out.println(\"\
  divisibleByThreeOrFive: \" + divisibleByThreeOrFive.test(num));\nSystem.out.println(\"\
  equalsToTen: \" + equalToTen.test(num));\nNumber: 10\ngreaterThanTen: false\ndivisibleByThree:\
  \ false\ndivisibleByFive: true\nlessThanOrEqualToTen: true\ndivisibleByThreeAndFive:\
  \ false\ndivisibleByThreeOrFive: true\nequalsToTen: false\n```\n\n使用函数式接口\n\n函数式接口被两类用户用于两种场景：\n\
  \n*   库设计者用于设计 API\n\n*   库用户用于使用 API\n\n函数式接口被库设计者用于设计 API。它们用于在方法声明中声明参数类型和返回类型。它们的使用方式与非函数式接口相同。函数式接口自\
  \ Java 诞生之初就已存在，Java 8 并未改变它们在 API 设计中的使用方式。\n\n在 Java 8 中，库用户将函数式接口用作 lambda 表达式的目标类型。也就是说，当\
  \ API 中的某个方法接受一个函数式接口作为参数时，API 的用户应使用 lambda 表达式来传递该参数。使用 lambda 表达式的好处是使代码更简洁、更易读。\n\
  \n在本节中，我将向你展示如何使用函数式接口设计 API，以及如何使用 lambda 表达式来使用这些 API。函数式接口在 Java 库的 Collections\
  \ 和 Streams API 设计中得到了大量使用，我将在第 12 章和第 13 章中介绍这些内容。\n\n在后续示例中，我将使用一个枚举和两个类。`Gender`\
  \ 枚举（如清单 5-12 所示）包含两个常量，用于表示一个人的性别。`Person` 类（如清单 5-13 所示）表示一个人；除了其他方法外，它还包含一个返回人员列表的\
  \ `getPersons()` 方法。\n\n```\n// Gender.java\npackage com.jdojo.lambda;\npublic enum\
  \ Gender {\nMALE, FEMALE\n}\n清单 5-12.\nGender 枚举\n```\n\n```\n// Person.java\npackage\
  \ com.jdojo.lambda;\nimport java.time.LocalDate;\nimport java.util.ArrayList;\n\
  import java.util.List;\nimport static com.jdojo.lambda.Gender.MALE;\nimport static\
  \ com.jdojo.lambda.Gender.FEMALE;\npublic class Person {\nprivate String firstName;\n\
  private String lastName;\nprivate LocalDate dob;\nprivate Gender gender;\npublic\
  \ Person(String firstName, String lastName, LocalDate dob, Gender gender) {\nthis.firstName\
  \ = firstName;\nthis.lastName = lastName;\nthis.dob = dob;\nthis.gender = gender;\n\
  }\npublic String getFirstName() {\nreturn firstName;\n}\npublic void setFirstName(String\
  \ firstName) {\nthis.firstName = firstName;\n}\npublic String getLastName() {\n\
  return lastName;\n}\npublic void setLastName(String lastName) {\nthis.lastName =\
  \ lastName;\n}\npublic LocalDate getDob() {\nreturn dob;\n}\npublic void setDob(LocalDate\
  \ dob) {\nthis.dob = dob;\n}\npublic Gender getGender() {\nreturn gender;\n}\npublic\
  \ void setGender(Gender gender) {\nthis.gender = gender;\n}\n@Override\npublic String\
  \ toString() {\nreturn firstName + \" \" + lastName + \", \" + gender + \", \" +\
  \ dob;\n}\n// 一个便捷方法\npublic static List getPersons() {\nArrayList list = new ArrayList();\n\
  list.add(new Person(\"John\", \"Jacobs\", LocalDate.of(1975, 1, 20), MALE));\nlist.add(new\
  \ Person(\"Wally\", \"Inman\", LocalDate.of(1965, 9, 12), MALE));\nlist.add(new\
  \ Person(\"Donna\", \"Jacobs\", LocalDate.of(1970, 9, 12), FEMALE));\nreturn list;\n\
  }\n}\n清单 5-13.\nPerson 类\n```\n\n清单 5-14 中的 `FunctionUtil` 类是一个工具类。它的方法对 `List`\
  \ 应用一个函数。`List` 是一个由 `ArrayList` 类实现的接口。`forEach()` 方法对列表中的每个项目应用一个操作，通常会产生副作用；该操作由\
  \ `Consumer` 表示。`filter()` 方法根据指定的 `Predicate` 过滤列表。`map()` 方法使用 `Function` 将列表中的每个项目映射为一个值。作为库设计者，你将使用函数式接口来设计这些方法。请注意，`FunctionUtil`\
  \ 类中没有提及 lambda 表达式。即使在 Java 8 之前，你也可以用同样的方式设计这个类。\n\n```\n// FunctionUtil.java\n\
  package com.jdojo.lambda;\nimport java.util.ArrayList;\nimport java.util.List;\n\
  import java.util.function.Consumer;\nimport java.util.function.Function;\nimport\
  \ java.util.function.Predicate;\npublic class FunctionUtil {\n// 对列表中的每个项目应用一个操作\n\
  public static  void forEach(List list, Consumer action) {\nfor (T item : list) {\n\
  action.accept(item);\n}\n}\n// 对列表应用过滤器并返回过滤后的列表项目\npublic static  List filter(List\
  \ list, Predicate predicate) {\nList filteredList = new ArrayList();\nfor (T item\
  \ : list) {\nif (predicate.test(item)) {\nfilteredList.add(item);\n}\n}\nreturn\
  \ filteredList;\n}\n// 将列表中的每个项目映射为一个值\npublic static  List map(List list, Function\
  \ mapper) {\nList mappedList = new ArrayList();\nfor (T item : list) {\nmappedList.add(mapper.apply(item));\n\
  }\nreturn mappedList;\n}\n}\n清单 5-14.\nFunctionUtil 类\n```\n\n现在，你将作为库用户使用 `FunctionUtil`\
  \ 类，并将函数式接口用作 lambda 表达式的目标类型。清单 5-15 展示了如何使用 `FunctionUtil` 类。\n\n\n\n```\n// FunctionUtilTest.java\n\
  package com.jdojo.lambda;\nimport static com.jdojo.lambda.Gender.MALE;\nimport java.util.List;\n\
  public class FunctionUtilTest {\npublic static void main(String[] args) {\nList\
  \ list = Person.getPersons();\n// 使用 forEach() 方法打印列表中的每个人\nSystem.out.println(\"\
  原始人员列表：\");\nFunctionUtil.forEach(list, p -> System.out.println(p));\n// 仅筛选男性\n\
  List maleList = FunctionUtil.filter(list, p -> p.getGender() == MALE);\nSystem.out.println(\"\
  \\n 仅男性：\");\nFunctionUtil.forEach(maleList, p -> System.out.println(p));\n// 将每个人映射到其出生年份\n\
  List dobYearList = FunctionUtil.map(list, p -> p.getDob().getYear());\nSystem.out.println(\"\
  \\n 人员映射到出生年份：\");\nFunctionUtil.forEach(dobYearList, year -> System.out.println(year));\n\
  // 对列表中的每个人执行操作。为每位男性的出生日期增加一年\nFunctionUtil.forEach(maleList, p -> p.setDob(p.getDob().plusYears(1)));\n\
  System.out.println(\"\\n 出生日期增加一年后的男性：\");\nFunctionUtil.forEach(maleList, p ->\
  \ System.out.println(p));\n}\n}\n原始人员列表：\nJohn Jacobs, MALE, 1975-01-20\nWally Inman,\
  \ MALE, 1965-09-12\nDonna Jacobs, FEMALE, 1970-09-12\n仅男性：\nJohn Jacobs, MALE, 1975-01-20\n\
  Wally Inman, MALE, 1965-09-12\n人员映射到出生年份：\n\n出生日期增加一年后的男性：\nJohn Jacobs, MALE, 1976-01-20\n\
  Wally Inman, MALE, 1966-09-12\n清单 5-15.\n将函数式接口用作库用户的 Lambda 表达式目标类型\n\n程序获取一个人员列表，对列表应用筛选以仅获取男性列表，将人员映射到其出生年份，并为每位男性的出生日期增加一年。它使用\
  \ lambda 表达式执行这些操作中的每一个。请注意代码的简洁性；它仅用一行代码执行每个操作。最值得注意的是 `forEach()` 方法的使用。此方法接受一个\
  \ `Consumer` 函数。然后每个项目被传递给此函数。该函数可以对项目执行任何操作。您传递了一个 `Consumer`，它将项目打印到标准输出，如下所示：\n\
  \n```\nFunctionUtil.forEach(list, p -> System.out.println(p));\n```\n\n通常，`Consumer`\
  \ 对其接收的项目应用操作以产生副作用。在这种情况下，它只是打印项目，不产生任何副作用。\n\n方法引用\n\nLambda 表达式表示一个匿名函数，该函数被视为函数式接口的实例。方法引用是使用现有方法创建\
  \ lambda 表达式的一种简写方式。使用方法引用可以使您的 lambda 表达式更具可读性和简洁性；它还允许您将现有方法用作 lambda 表达式。如果 lambda\
  \ 表达式包含一个使用方法调用的表达式主体，则可以使用方法引用代替该 lambda 表达式。\n\n提示\n\n方法引用不是 Java 中的新类型。它不像其他一些编程语言中使用的函数指针。它只是使用现有方法编写\
  \ lambda 表达式的简写。它只能在使用 lambda 表达式的地方使用。\n\n在我解释方法引用的语法之前，让我们考虑一个示例。考虑以下代码片段：\n\n\
  ```\nimport java.util.function.ToIntFunction;\n...\nToIntFunction lengthFunction\
  \ = str -> str.length();\nString name = \"Ellen\";\nint len = lengthFunction.applyAsInt(name);\n\
  System.out.println(\"Name = \" + name + \", length = \" + len);\nName = Ellen, length\
  \ = 5\n```\n\n该代码使用 lambda 表达式定义一个匿名函数，该函数接受一个 `String` 作为参数并返回其长度。lambda 表达式的主体仅包含一个方法调用，即\
  \ `String` 类的 `length()` 方法。您可以使用对 `String` 类的 `length()` 方法的方法引用来重写 lambda 表达式，如下所示：\n\
  \n```\nimport java.util.function.ToIntFunction;\n...\nToIntFunction lengthFunction\
  \ = String::length;\nString name = \"Ellen\";\nint len = lengthFunction.applyAsInt(name);\n\
  System.out.println(\"Name = \" + name + \", length = \" + len);\nName = Ellen, length\
  \ = 5\n```\n\n方法引用的通用语法是\n\n```\n::\n```\n\n`<限定符>` 取决于方法引用的类型。两个连续的冒号充当分隔符。`<方法名>`\
  \ 是方法的名称。例如，在方法引用 `String::length` 中，`String` 是限定符，`length` 是方法名。\n\n提示\n\n方法引用在声明时不会调用该方法。该方法稍后在其目标类型的方法被调用时才会被调用。\n\
  \n方法引用的语法只允许指定方法名。您不能指定方法的参数类型和返回类型。回想一下，方法引用是 lambda 表达式的简写。目标类型（始终是函数式接口）决定了方法的详细信息。如果方法是重载方法，编译器将根据上下文选择最具体的方法。请参见表\
  \ 5-3。\n\n表 5-3.\n\n方法引用的类型\n\n语法\n |  描述\n |\n\n| --- | --- | --- | --- | --- |\n\
  \n`类型名::静态方法`\n |  对类、接口或枚举的静态方法的方法引用\n |\n\n`对象引用::实例方法`\n |  对指定对象的实例方法的方法引用\n\
  \ |\n\n`类名::实例方法`\n |  对指定类的任意对象的实例方法的方法引用\n |\n\n`类型名.super::实例方法`\n |  对特定对象的超类型的实例方法的方法引用\n\
  \ |\n\n`类名::new`\n |  对指定类的构造函数的构造函数引用\n |\n\n`数组类型名::new`\n |  对指定数组类型的构造函数的数组构造函数引用\n\
  \ |\n\n一开始使用方法引用可能会有点令人困惑。主要的困惑点在于将实际方法中的参数数量和类型映射到方法引用的过程。为了帮助理解语法，我在所有示例中都使用了方法引用及其等效的\
  \ lambda 表达式。\n\n静态方法引用\n\n静态方法引用使用类型的静态方法作为 lambda 表达式。该类型可以是类、接口或枚举。考虑 `Integer`\
  \ 类的以下静态方法：\n\n```\nstatic String toBinaryString(int i)\n```\n\n`toBinaryString()`\
  \ 方法表示一个函数，该函数接受一个 `int` 作为参数并返回一个 `String`。您可以像这样在 lambda 表达式中使用它：\n\n```\n// 使用\
  \ lambda 表达式\nFunction func1 = x -> Integer.toBinaryString(x);\nSystem.out.println(func1.apply(17));\n\
  \n```\n\n编译器通过使用目标类型 `Function<Integer,String>` 推断出 `x` 的类型为 `Integer`，lambda 表达式的返回类型为\
  \ `String`。您可以使用静态方法引用重写此语句，如下所示：\n\n```\n// 使用方法引用\nFunction func2 = Integer::toBinaryString;\n\
  System.out.println(func2.apply(17));\n\n```\n\n编译器在赋值运算符的右侧找到对 `Integer` 类的 `toBinaryString()`\
  \ 方法的静态方法引用。`toBinaryString()` 方法接受一个 `int` 作为参数并返回一个 `String`。方法引用的目标类型是一个接受 `Integer`\
  \ 作为参数并返回 `String` 的函数。编译器验证了在将目标类型的 `Integer` 参数类型拆箱为 `int` 后，方法引用和目标类型是赋值兼容的。\n\
  \n考虑 `Integer` 类中的另一个静态方法 `sum()`：\n\n```\nstatic int sum(int a, int b)\n```\n\n\
  方法引用将是 `Integer::sum`。让我们像在前面的示例中使用 `toBinaryString()` 方法一样使用它。\n\n\n```  \nFunction\
  \ func2 = Integer::sum; // 编译时错误  \nError: incompatible types: invalid method reference\
  \  \nFunction func2 = Integer::sum;  \nmethod sum in class Integer cannot be applied\
  \ to given types  \nrequired: int,int  \nfound: Integer  \nreason: actual and formal\
  \ argument lists differ in length  \n```  \n\n错误信息表明，方法引用 `Integer::sum` 与目标类型 `Function<Integer,Integer>`\
  \ 不兼容。  \n`sum(int, int)` 方法接受两个 `int` 参数，而目标类型只接受一个 `Integer` 参数。  \n参数数量不匹配导致了编译时错误。\
  \  \n\n要修复此错误，方法引用 `Integer::sum` 的目标类型应为一个函数式接口，其抽象方法接受两个 `int` 参数并返回一个 `int`。\
  \  \n使用 `BiFunction<Integer,Integer,Integer>` 作为目标类型即可。以下代码片段展示了如何使用方法引用 `Integer::sum`\
  \ 以及等价的 lambda 表达式：  \n\n```  \n// 使用 lambda 表达式  \nBiFunction func1 = (x, y) ->\
  \ Integer.sum(x, y);  \nSystem.out.println(func1.apply(17, 15));  \n// 使用方法引用  \n\
  BiFunction func2 = Integer::sum;  \nSystem.out.println(func2.apply(17, 15));  \n\
  ```  \n\n让我们尝试使用 `Integer` 类中重载的静态方法 `valueOf()` 的方法引用。  \n该方法有三个版本：  \n\n*   `static\
  \ Integer valueOf(int i)`  \n*   `static Integer valueOf(String s)`  \n*   `static\
  \ Integer valueOf(String s, int radix)`  \n\n以下代码片段展示了不同的目标类型如何使用 `Integer.valueOf()`\
  \ 静态方法的三个不同版本。读者可以尝试使用 lambda 表达式编写以下代码片段作为练习：  \n\n```  \n// 使用 Integer.valueOf(int)\
  \  \nFunction func1 = Integer::valueOf;  \n// 使用 Integer.valueOf(String)  \nFunction\
  \ func2 = Integer::valueOf;  \n// 使用 Integer.valueOf(String, int)  \nBiFunction\
  \ func3 = Integer::valueOf;  \nSystem.out.println(func1.apply(17));  \nSystem.out.println(func2.apply(\"\
  17\"));  \nSystem.out.println(func3.apply(\"10001\", 2));  \n```  \n\n以下是此类中的最后一个示例。清单\
  \ 5-13 中所示的 `Person` 类包含一个声明如下的 `getPersons()` 静态方法：  \n\n```  \nstatic List getPersons()\
  \  \n```  \n\n该方法不接受参数并返回一个 `List<Person>`。`Supplier<T>` 表示一个不接受参数并返回类型 `T` 结果的函数。\
  \  \n以下代码片段将方法引用 `Person::getPersons` 用作 `Supplier<List<Person>>`：  \n\n```  \n\
  Supplier> supplier = Person::getPersons;  \nList personList = supplier.get();  \n\
  FunctionUtil.forEach(personList, p -> System.out.println(p));  \nJohn Jacobs, MALE,\
  \ 1975-01-20  \nWally Inman, MALE, 1965-09-12  \nDonna Jacobs, FEMALE, 1970-09-12\
  \  \n```  \n\n## 实例方法引用  \n\n实例方法在对象的引用上被调用。调用实例方法的对象引用被称为方法调用的接收者。方法调用的接收者可以是一个对象引用，也可以是一个求值为对象引用的表达式。以下代码片段展示了\
  \ `String` 类的 `length()` 实例方法的接收者：  \n\n```  \nString name = \"Kannan\";  \n// name\
  \ 是 length() 方法的接收者  \nint len1 = name.length();  \n// \"Hello\" 是 length() 方法的接收者\
  \  \nint len2 = \"Hello\".length();  \n// (new String(\"Kannan\")) 是 length() 方法的接收者\
  \  \nint len3 = (new String(\"Kannan\")).length();  \n```  \n\n在实例方法的方法引用中，你可以显式指定方法调用的接收者，也可以在方法被调用时隐式提供。前者称为**绑定接收者**，后者称为**非绑定接收者**。\
  \  \n实例方法引用的语法支持两种变体：  \n\n*   `objectRef::instanceMethod`  \n*   `ClassName::instanceMethod`\
  \  \n\n### 绑定接收者  \n\n对于绑定接收者，使用 `objectRef::instanceMethod` 语法。考虑以下代码片段：  \n\n\
  ```  \nSupplier supplier = () -> \"Ellen\".length();  \nSystem.out.println(supplier.get());\
  \  \n```  \n\n该语句使用了一个 lambda 表达式，表示一个不接受参数并返回 `int` 的函数。表达式的主体使用名为 `\"Ellen\"`\
  \ 的 `String` 对象来调用 `String` 类的 `length()` 实例方法。你可以使用实例方法引用重写此语句，将 `\"Ellen\"` 对象作为绑定接收者，并使用\
  \ `Supplier<Integer>` 作为目标类型，如下所示：  \n\n```  \nSupplier supplier = \"Ellen\"::length;\
  \  \nSystem.out.println(supplier.get());  \n```  \n\n考虑以下表示 `Consumer<String>` 的代码片段，它接受一个\
  \ `String` 参数并返回 `void`：  \n\n```  \nConsumer consumer = str -> System.out.println(str);\
  \  \nconsumer.accept(\"Hello\");  \nHello  \n```  \n\n此 lambda 表达式在 `System.out`\
  \ 对象上调用了 `println()` 方法。这可以使用方法引用重写，将 `System.out` 作为绑定接收者，如下所示：  \n\n```  \nConsumer\
  \ consumer = System.out::println;  \nconsumer.accept(\"Hello\");  \nHello  \n```\
  \  \n\n当使用方法引用 `System.out::println` 时，编译器会查看其目标类型，即 `Consumer<String>`。它表示一个接受\
  \ `String` 参数并返回 `void` 的函数类型。编译器在 `System.out` 对象的 `PrintStream` 类中找到了一个 `println(String)`\
  \ 方法，并将该方法用于方法引用。  \n\n作为此类中的最后一个示例，你将使用方法引用 `System.out::println` 来打印人员列表，如下所示：\
  \  \n\n```  \nList list = Person.getPersons();  \nFunctionUtil.forEach(list, System.out::println);\
  \  \nJohn Jacobs, MALE, 1975-01-20  \nWally Inman, MALE, 1965-09-12  \nDonna Jacobs,\
  \ FEMALE, 1970-09-12  \n```  \n\n### 非绑定接收者  \n\n对于非绑定接收者，使用 `ClassName::instanceMethod`\
  \ 语法。考虑以下语句，其中 lambda 表达式接受一个 `Person` 参数并返回一个 `String`：  \n\n```  \nFunction fNameFunc\
  \ = (Person p) -> p.getFirstName();  \n```  \n\n该语句可以使用实例方法引用重写，如下所示：  \n\n``` \
  \ \nFunction fNameFunc = Person::getFirstName;  \n```  \n\n起初，这可能会让人困惑，原因有二：  \n\
  \n*   其语法与静态方法的方法引用语法相同。  \n*   它引发了一个问题：哪个对象是实例方法调用的接收者？  \n\n第一个困惑可以通过查看方法名称并检查它是静态方法还是实例方法来消除。如果方法是实例方法，则方法引用表示一个实例方法引用。\
  \  \n\n第二个困惑可以通过牢记一条规则来消除：目标类型所表示函数的第一个参数是方法调用的接收者。考虑一个使用非绑定接收者的实例方法引用 `String::length`。接收者作为第一个参数提供给\
  \ `apply()` 方法，如下所示：  \n\n```  \nFunction strLengthFunc = String::length;  \nString\
  \ name =\"Ellen\";  \n// name 是 String::length 的接收者  \nint len = strLengthFunc.apply(name);\
  \  \nSystem.out.println(\"name = \" + name + \", length = \" + len);  \nname = Ellen,\
  \ length = 5  \n```  \n\n`String` 类的实例方法 `concat()` 具有以下声明：  \n\n```  \nString concat(String\
  \ str)  \n```  \n\n方法引用 `String::concat` 表示一个实例方法引用，其目标类型的函数接受两个 `String` 参数并返回一个\
  \ `String`。第一个参数将是 `concat()` 方法的接收者，第二个参数将传递给 `concat()` 方法。以下代码片段展示了一个示例：\n\n\n\
  ```\nString greeting = \"Hello\";\nString name = \" Laynie\";\n// 使用 lambda 表达式\n\
  BiFunction func1 = (s1, s2) -> s1.concat(s2);\nSystem.out.println(func1.apply(greeting,\
  \ name));\n// 使用未绑定接收器上的实例方法引用\nBiFunction func2 = String::concat;\nSystem.out.println(func2.apply(greeting,\
  \ name));\nHello Laynie\nHello Laynie\n```\n\n作为本类别中的最后一个示例，你将使用方法引用\n`Person::getFirstName`\n\
  ，这是一个未绑定接收器上的实例方法引用，如下所示：\n\n```\nList personList = Person.getPersons();\n// 将每个\
  \ Person 对象映射为其名字\nList firstNameList = FunctionUtil.map(personList, Person::getFirstName);\n\
  // 打印名字列表\nFunctionUtil.forEach(firstNameList, System.out::println);\nJohn\nWally\n\
  Donna\n```\n\n超类型实例\n方法引用\n\n关键字 `super` 用作\n限定符，用于调用类或接口中被重写的方法。\n该关键字仅在实例上下文中可用。使用以下\n\
  语法构造一个方法引用，该引用指向超类型中的实例方法\n以及当前实例上调用的方法：\n\n```\nTypeName.super::instanceMethod\n\
  ```\n\n考虑清单 5-16 和清单\n5-17 中的 `Priced` 接口和\n`Item` 类。`Priced` 接口\n包含一个返回 1.0 的默认方法。`Item`\
  \ 类实现了\n`Priced`\n接口。它重写了 `Object`\n类的 `toString()` 方法\n和 `Priced` 接口的 `getPrice()`\
  \ 方法\n。我为 `Item` 类添加了三个构造函数，\n它们会在标准输出上显示一条消息。我将在下一节的示例中使用它们。\n\n```\n// Priced.java\n\
  package com.jdojo.lambda;\npublic interface Priced {\ndefault double getPrice()\
  \ {\nreturn 1.0;\n}\n}\n清单 5-16.\n包含默认方法 getPrice() 的 Priced 接口\n```\n\n```\n//\
  \ Item.java\npackage com.jdojo.lambda;\nimport java.util.function.Supplier;\npublic\
  \ class Item implements Priced {\nprivate String name = \"Unknown\";\nprivate double\
  \ price = 0.0;\npublic Item() {\nSystem.out.println(\"构造函数 Item() 被调用。\");\n}\n\
  public Item(String name) {\nthis.name = name;\nSystem.out.println(\"构造函数 Item(String)\
  \ 被调用。\");\n}\npublic Item(String name, double price) {\nthis.name = name;\nthis.price\
  \ = price;\nSystem.out.println(\"构造函数 Item(String, double) 被调用。\");\n}\npublic String\
  \ getName() {\nreturn name;\n}\npublic void setName(String name) {\nthis.name =\
  \ name;\n}\npublic void setPrice(double price) {\nthis.price = price;\n}\n@Override\n\
  public double getPrice() {\nreturn price;\n}\n@Override\npublic String toString()\
  \ {\nreturn \"name = \" + getName() + \", price = \" + getPrice();\n}\npublic void\
  \ test() {\n// 使用 Item.toString() 方法\nSupplier s1 = this::toString;\n// 使用 Object.toString()\
  \ 方法\nSupplier s2 = Item.super::toString;\n// 使用 Item.getPrice() 方法\nSupplier s3\
  \ = this::getPrice;\n// 使用 Priced.getPrice() 方法\nSupplier s4 = Priced.super::getPrice;\n\
  // 使用所有方法引用并打印结果\nSystem.out.println(\"this::toString: \" + s1.get());\nSystem.out.println(\"\
  Item.super::toString: \" + s2.get());\nSystem.out.println(\"this::getPrice: \" +\
  \ s3.get());\nSystem.out.println(\"Priced.super::getPrice: \" + s4.get());\n}\n\
  }\n清单 5-17.\n实现 Priced 接口的 Item 类\n```\n\n`Item`\n类中的 `test()` 方法\n使用了四个带有绑定接收器的方法引用。接收器是\n\
  调用 `test()` 方法的 `Item` 对象\n。\n\n*   方法引用 `this::toString` 指向\n    `Item` 类的 `toString()`\
  \ 方法。\n\n*   方法引用 `Item.super::toString`\n    指向 `Object`\n    类的 `toString()` 方法，该类是\
  \ `Item` 类的超类。\n\n*   方法引用 `this::getPrice` 指向\n    `Item` 类的 `getPrice()` 方法。\n\
  \n*   方法引用 `Priced.super::getPrice`\n    指向 `Priced`\n    接口的 `getPrice()` 方法，该接口是\
  \ `Item` 类的超接口。\n\n清单 5-18 中的程序创建了一个\n`Item` 类的对象并调用了其\n`test()`\n方法。输出显示了四个方法引用所使用的具体方法。\n\
  \n```\n// ItemTest.java\npackage com.jdojo.lambda;\npublic class ItemTest {\npublic\
  \ static void main(String[] args) {\nItem apple = new Item(\"Apple\", 0.75);\napple.test();\n\
  }\n}\n构造函数 Item(String, double) 被调用。\nthis::toString: name = Apple, price = 0.75\n\
  Item.super::toString: com.jdojo.lambda.Item@24d46ca6\nthis::getPrice: 0.75\nPriced.super::getPrice:\
  \ 1.0\n清单 5-18.\n测试 Item 类\n```\n\n构造函数引用\n\n有时 lambda 表达式的主体可能只是一个对象创建\n表达式。考虑以下两条语句，它们使用\
  \ `String` 对象\n创建表达式作为 lambda 表达式的主体：\n\n```\nSupplier func1 = () -> new String();\n\
  Function func2 = str -> new String(str);\n```\n\n你可以用构造函数引用替换这些 lambda 表达式来重写这些语句，如下所示：\n\
  \n```\nSupplier func1 = String::new;\nFunction func2 = String::new;\n```\n\n使用构造函数的语法如下：\n\
  \n*   `ClassName::new`\n\n*   `ArrayTypeName::new`\n\n`ClassName::new`\n中的 `ClassName`\n\
  是可实例化的类的名称；它不能是抽象类的名称。关键字 `new` 指的是该类的\n构造函数。一个类可能有多个构造函数。该\n语法不提供引用特定构造函数的方法。编译器会根据上下文选择特定的构造函数。它\n\
  会查看目标类型以及目标类型抽象方法中的参数数量。会选择参数数量与\n目标类型抽象方法中参数数量匹配的构造函数。\n考虑以下代码片段，它在 lambda\n表达式中使用了清单\
  \ 5-17 中所示的\n`Item` 类的三个构造函数：\n\n```\nSupplier func1 = () -> new Item();\nFunction\
  \ func2 = name -> new Item(name);\nBiFunction func3 = (name, price) -> new Item(name,\
  \ price);\nSystem.out.println(func1.get());\nSystem.out.println(func2.apply(\"Apple\"\
  ));\nSystem.out.println(func3.apply(\"Apple\", 0.75));\n构造函数 Item() 被调用。\nname =\
  \ Unknown, price = 0.0\n构造函数 Item(String) 被调用。\nname = Apple, price = 0.0\n构造函数\
  \ Item(String, double) 被调用。\nname = Apple, price = 0.75\n```\n\n以下代码片段 用\n构造函数引用\
  \ `Item::new` 替换了 lambda 表达式。输出\n显示了与之前相同的构造函数。\n\n```\nSupplier func1 = Item::new;\n\
  Function func2 = Item::new;\nBiFunction func3 = Item::new;\nSystem.out.println(func1.get());\n\
  System.out.println(func2.apply(\"Apple\"));\nSystem.out.println(func3.apply(\"Apple\"\
  , 0.75));\n构造函数 Item() 被调用。\nname = Unknown, price = 0.0\n构造函数 Item(String) 被调用。\n\
  name = Apple, price = 0.0\n构造函数 Item(String, double) 被调用。\nname = Apple, price =\
  \ 0.75\n```\n\n当执行语句\n\n```\nSupplier func1 = Item::new;\n```\n\n时，编译器发现目标类型 `Supplier<Item>`\n\
  不接受参数。因此，它使用了 `Item`\n类的无参构造函数。\n\n当执行语句\n\n```\nFunction func2 = Item::new;\n```\n\
  \n时，编译器发现目标类型 `Function<String,Item>`\n接受一个 `String`\n参数。因此，它使用了 `Item` 类中接受一个\n\
  `String`\n参数的构造函数。\n\n当执行语句\n\n```\nBiFunction func3 = Item::new;\n```\n\n时，编译器\
  \ 发现\n目标类型 `BiFunction<String,Double,Item>`\n 接受两个\n参数：一个 `String` 和一个 `Double`。因此，它\n\
  使用了 `Item` 类中接受一个\n`String` 和一个\n`double`\n参数的构造函数。\n\n\n\n以下语句会产生编译时错误，因为编译器在 `Item`\
  \ 类中找不到接受 `Double` 类型参数的构造器：\n\n```\nFunction func4 = Item::new; // 编译时错误\n```\n\
  \nJava 中的数组没有构造器。使用数组的构造器引用有特殊的语法。数组构造器被视为接受一个 `int` 类型的参数，该参数表示数组的大小。以下代码片段展示了\
  \ `int` 数组的 lambda 表达式及其等价的构造器引用：\n\n```\n// 使用 lambda 表达式\nIntFunction arrayCreator1\
  \ = size -> new int[size];\nint[] empIds1 = arrayCreator1.apply(5); // 创建一个包含五个元素的\
  \ int 数组\n// 使用数组构造器引用\nIntFunction arrayCreator2 = int[]::new;\nint[] empIds2 =\
  \ arrayCreator2.apply(5); // 创建一个包含五个元素的 int 数组\n```\n\n你也可以使用 `Function<Integer,R>`\
  \ 类型来使用数组构造器引用，其中 `R` 是数组类型。\n\n```\n// 使用数组构造器引用\nFunction arrayCreator3 = int[]::new;\n\
  int[] empIds3 = arrayCreator3.apply(5); // 创建一个包含五个元素的 int 数组\n```\n\n数组构造器引用的语法支持创建多维数组。但是，你只能指定第一个维度的长度。以下语句创建了一个二维\
  \ `int` 数组，其第一个维度长度为 5：\n\n```\n// 使用数组构造器引用\nIntFunction TwoDimArrayCreator = int[][]::new;\n\
  int[][] matrix = TwoDimArrayCreator.apply(5); // 创建一个 int[5][] 数组\n```\n\n你可能会想使用\
  \ `BiFunction<Integer,Integer,int[][]>` 来为二维数组使用构造器引用，以便为两个维度都提供长度。但是，这种语法不受支持。数组构造器应该只接受一个参数——第一个维度的长度。以下语句会产生编译时错误：\n\
  \n```\nBiFunction arrayCreator = int[][]::new;\n```\n\n泛型方法引用\n\n通常，当方法引用指向一个泛型方法时，编译器会推断出泛型类型参数的实际类型。考虑\
  \ `java.util.Arrays` 类中的以下泛型方法：\n\n```\nstatic <T> List<T> asList(T... a)\n```\n\
  \n`asList()` 方法接受一个类型为 `T` 的可变参数，并返回一个 `List<T>`。你可以使用 `Arrays::asList` 作为方法引用。方法引用的语法允许你在两个连续冒号之后立即指定该方法实际的类型参数。例如，如果你向\
  \ `asList()` 方法传递 `String` 对象，其方法引用可以写成 `Arrays::<String>asList`。\n\n提示\n\n方法引用的语法也支持为泛型类型指定实际的类型参数。实际的类型参数在两个连续冒号之前指定。例如，构造器引用\
  \ `ArrayList<Long>::new` 为泛型 `ArrayList<T>` 类指定了 `Long` 作为实际的类型参数。\n\n以下代码片段包含一个为泛型方法\
  \ `Arrays.asList()` 指定实际类型参数的示例。在这段代码中，`Arrays::asList` 的效果相同，因为编译器会通过检查目标类型来推断\
  \ `asList()` 方法的类型参数为 `String`。\n\n```\nimport java.util.Arrays;\nimport java.util.List;\n\
  import java.util.function.Function;\n...\nFunction<String[], List<String>> asList\
  \ = Arrays::asList;\nString[] namesArray = {\"Jim\", \"Ken\", \"Li\"};\nList<String>\
  \ namesList = asList.apply(namesArray);\nfor(String name : namesList) {\n    System.out.println(name);\n\
  }\nJim\nKen\nLi\n```\n\n词法作用域\n\n作用域是 Java 程序的一部分，在该部分内，名称可以在不使用限定符的情况下使用。类和方法定义了它们自己的作用域。作用域可以嵌套。例如，方法作用域并非独立存在，因为方法总是其他结构（例如类）的一部分；内部类出现在另一个类的作用域内；局部类和匿名类出现在方法的作用域内。\n\
  \n尽管 lambda 表达式看起来像方法声明，但它并不定义自己的作用域。它存在于其封闭作用域中。这被称为 lambda 表达式的**词法作用域**。例如，当\
  \ lambda 表达式在方法内部使用时，该 lambda 表达式存在于该方法的作用域中。\n\n关键字 `this` 和 `super` 的含义在 lambda\
  \ 表达式及其封闭方法内部是相同的。请注意，这与这些关键字在局部和匿名内部类中的含义不同，在局部和匿名内部类中，关键字 `this` 指的是局部或匿名内部类本身的当前实例，而不是其封闭类。\n\
  \n清单 5-19 包含一个名为 `Printer` 的函数式接口的代码，你将使用它在本节的示例中打印消息。\n\n```\n// Printer.java\n\
  package com.jdojo.lambda;\n@FunctionalInterface\npublic interface Printer {\n  \
  \  void print(String msg);\n}\n清单 5-19. Printer 函数式接口\n```\n\n清单 5-20 中的程序创建了 `Printer`\
  \ 接口的两个实例：一个在 `getLambdaPrinter()` 方法中使用 lambda 表达式，另一个在 `getAnonymousPrinter()`\
  \ 方法中使用匿名内部类。两个实例都在 `print()` 方法内部使用了关键字 `this`。两个方法都打印了关键字 `this` 所引用的类名。输出显示，关键字\
  \ `this` 在 `getLambdaPrinter()` 方法和 lambda 表达式内部具有相同的含义。然而，关键字 `this` 在 `getAnonymousPrinter()`\
  \ 方法和匿名类内部具有不同的含义。\n\n```\n// ScopeTest.java\npackage com.jdojo.lambda;\npublic\
  \ class ScopeTest {\n    public static void main(String[] args) {\n        ScopeTest\
  \ test = new ScopeTest();\n        Printer lambdaPrinter = test.getLambdaPrinter();\n\
  \        lambdaPrinter.print(\"Lambda Expressions\");\n        Printer anonymousPrinter\
  \ = test.getAnonymousPrinter();\n        anonymousPrinter.print(\"Anonymous Class\"\
  );\n    }\n    public Printer getLambdaPrinter() {\n        System.out.println(\"\
  getLambdaPrinter(): \" + this.getClass());\n        // 使用 lambda 表达式\n        Printer\
  \ printer = msg -> {\n            // 这里，this 指的是 ScopeTest 类的当前对象\n            System.out.println(msg\
  \ + \": \" + this.getClass());\n        };\n        return printer;\n    }\n   \
  \ public Printer getAnonymousPrinter() {\n        System.out.println(\"getAnonymousPrinter():\
  \ \" + this.getClass());\n        // 使用匿名类\n        Printer printer = new Printer()\
  \ {\n            @Override\n            public void print(String msg) {\n      \
  \          // 这里，this 指的是匿名类的当前对象\n                System.out.println(msg + \":\
  \ \" + this.getClass());\n            }\n        };\n        return printer;\n \
  \   }\n}\ngetLambdaPrinter(): class com.jdojo.lambda.ScopeTest\nLambda Expressions:\
  \ class com.jdojo.lambda.ScopeTest\ngetAnonymousPrinter(): class com.jdojo.lambda.ScopeTest\n\
  Anonymous Class: class com.jdojo.lambda.ScopeTest$1\n清单 5-20. 测试 Lambda 表达式和匿名类的作用域\n\
  ```\n\nlambda 表达式的词法作用域意味着在 lambda 表达式中声明的变量（包括其参数）存在于封闭作用域中。一个作用域内的简单名称必须是唯一的。这意味着\
  \ lambda 表达式不能重新定义在封闭作用域中已经存在的同名变量。\n\n以下在 `main()` 方法内部的 lambda 表达式代码会产生编译时错误，因为其参数名\
  \ `msg` 已经在 `main()` 方法的作用域中定义了：\n\n\n\n```\npublic class Test {\npublic static\
  \ void main(String[] args) {\nString msg = \"Hello\";\n// 编译时错误。msg 变量已定义，\n// 而\
  \ lambda 参数试图重新定义它。\nPrinter printer = msg -> System.out.println(msg);\n}\n}\n```\n\
  \n以下代码会产生编译时错误，原因相同：局部变量 `msg` 在 lambda 表达式体内处于作用域内，而 lambda 表达式试图声明一个同名局部变量 `msg`：\n\
  \n```\npublic class Test {\npublic static void main(String[] args) {\nString msg\
  \ = \"Hello\";\nPrinter printer = msg1 -> {\nString msg = \"Hi\"; // 编译时错误\nSystem.out.println(msg1);\n\
  };\n}\n}\n```\n\n变量捕获\n\n与局部内部类和匿名内部类一样，lambda 表达式可以访问**有效 final** 的局部变量。局部变量在以下两种情况下被视为有效\
  \ final：\n\n*   它被声明为 final。\n*   它未被声明为 final，但只初始化一次。\n\n在以下代码片段中，`msg` 变量是有效\
  \ final 的，因为它已被声明为 final。lambda 表达式在其体内访问该变量。\n\n```\npublic Printer test() {\n\
  final String msg = \"Hello\"; // msg 是有效 final 的\nPrinter printer = msg1 -> System.out.println(msg\
  \ + \" \" + msg1);\nreturn printer;\n}\n```\n\n在以下代码片段中，`msg` 变量是有效 final 的，因为它只初始化了一次。lambda\
  \ 表达式在其体内访问该变量。\n\n```\npublic Printer test() {\nString msg = \"Hello\"; // msg\
  \ 是有效 final 的\nPrinter printer = msg1 -> System.out.println(msg + \" \" + msg1);\n\
  return printer;\n}\n```\n\n以下代码片段是上一个示例的细微变体。`msg` 变量是有效 final 的，因为它只被初始化了一次。\n\n\
  ```\npublic Printer test() {\nString msg;\nmsg = \"Hello\"; // msg 是有效 final 的\n\
  Printer printer = msg1 -> System.out.println(msg + \" \" + msg1);\nreturn printer;\n\
  }\n```\n\n在以下代码片段中，`msg` 变量不是有效 final 的，因为它被赋值了两次。lambda 表达式访问了 `msg` 变量，这会产生编译时错误。\n\
  \n```\npublic Printer test() {\n// msg 不是有效 final 的，因为它随后被修改了\nString msg = \"Hello\"\
  ;\n// 编译时错误\nPrinter printer = msg1 -> System.out.println(msg + \" \" + msg1);\n\
  msg = \"Hi\"; // msg 被修改，使其变为非有效 final\nreturn printer;\n}\n```\n\n以下代码片段会产生编译时错误，因为\
  \ lambda 表达式访问的 `msg` 变量在其使用之后才进行词法声明。在 Java 中，不允许在方法作用域内前向引用变量名。请注意，`msg` 变量是有效\
  \ final 的。\n\n```\npublic Printer test() {\n// 编译时错误。msg 变量尚未声明。\nPrinter printer\
  \ = msg1 -> System.out.println(msg + \" \" + msg1);\nString msg = \"Hello\";  //\
  \ msg 是有效 final 的\nreturn printer;\n}\n```\n\n你能猜出为什么以下代码片段会产生编译时错误吗？\n\n```\npublic\
  \ Printer test() {\nString msg = \"Hello\";\nPrinter printer = msg1 ->  {\nmsg =\
  \ \"Hi \" + msg1; // 编译时错误。试图修改 msg。\nSystem.out.println(msg);\n};\nreturn printer;\n\
  }\n```\n\nlambda 表达式访问了局部变量 `msg`。在 lambda 表达式内部访问的任何局部变量都必须是有效 final 的。该 lambda\
  \ 表达式试图在其体内修改 `msg` 变量，这导致了编译时错误。\n\n提示\n\nlambda 表达式可以访问类的实例变量和类变量，无论它们是否为有效 final。如果实例变量和类变量不是\
  \ final 的，则可以在 lambda 表达式体内修改它们。lambda 表达式会保留其体内使用的局部变量的副本。如果局部变量是引用变量，则保留的是引用的副本，而不是对象的副本。\n\
  \n清单 5-21 中的程序演示了如何在 lambda 表达式内部访问局部变量和实例变量。\n\n```\n// VariableCapture.java\n\
  package com.jdojo.lambda;\npublic class VariableCapture {\nprivate int counter =\
  \ 0;\npublic static void main(String[] args) {\nVariableCapture vc1 = new VariableCapture();\n\
  VariableCapture vc2 = new VariableCapture();\n// 创建 lambda\nPrinter p1 = vc1.createLambda(1);\n\
  Printer p2 = vc2.createLambda(100);\n// 执行 lambda 体\np1.print(\"Lambda #1\");\n\
  p2.print(\"Lambda #2\");\np1.print(\"Lambda #1\");\np2.print(\"Lambda #2\");\np1.print(\"\
  Lambda #1\");\np2.print(\"Lambda #2\");\n}\npublic Printer createLambda(int incrementBy)\
  \ {\nPrinter printer = msg -> {\n// 访问实例变量和局部变量\ncounter += incrementBy;\nSystem.out.println(msg\
  \ + \": counter = \" + counter);\n};\nreturn printer;\n}\n}\nLambda #1: counter\
  \ = 1\nLambda #2: counter = 100\nLambda #1: counter = 2\nLambda #2: counter = 200\n\
  Lambda #1: counter = 3\nLambda #2: counter = 300\n清单 5-21.\n在 Lambda 表达式内部访问局部变量和实例变量\n\
  ```\n\n`createLambda()` 方法使用 lambda 表达式创建 `Printer` 函数式接口的一个实例。该 lambda 表达式使用了方法的参数\
  \ `incrementBy`。在体内，它递增实例变量 `counter` 并打印其值。`main()` 方法创建了两个 `VariableCapture` 类的实例，并分别以\
  \ 1 和 100 作为 `incrementBy` 值调用这些实例上的 `createLambda()` 方法。两个实例的 `Printer` 对象的 `print()`\
  \ 方法都被调用了三次。输出显示，lambda 表达式捕获了 `incrementBy` 值，并在每次调用时递增 `counter` 实例变量。\n\n跳转与退出\n\
  \n`break`、`continue`、`return` 和 `throw` 等语句允许出现在 lambda 表达式体内。这些语句表示方法内的跳转和方法退出。在\
  \ lambda 表达式内部，它们表示 lambda 表达式体内的跳转和 lambda 表达式体的退出。它们表示 lambda 表达式中的局部跳转和退出。lambda\
  \ 表达式中不允许非局部跳转和退出。清单 5-22 中的程序演示了 `break` 和 `continue` 语句在 lambda 表达式体内的有效使用。\n\n\
  ```\n// LambdaJumps.java\npackage com.jdojo.lambda;\nimport java.util.function.Consumer;\n\
  public class LambdaJumps {\npublic static void main(String[] args) {\nConsumer printer\
  \ = ids -> {\nint printedCount = 0;\nfor (int id : ids) {\nif (id % 2 != 0) {\n\
  continue;\n}\nSystem.out.println(id);\nprintedCount++;\n// 打印 3 个 id 后跳出循环\nif (printedCount\
  \ == 3) {\nbreak;\n}\n}\n};\n// 打印一个包含 8 个整数的数组\nprinter.accept(new int[]{1, 2,\
  \ 3, 4, 5, 6, 7, 8});\n}\n}\n\n清单 5-22.\n在 Lambda 表达式体内使用 Break 和 Continue 语句\n\
  ```\n\n在以下代码片段中，`break` 语句位于 `for` 循环语句内部，同时也位于 lambda 语句体内。如果允许此 `break` 语句，它将跳出\
  \ lambda 表达式体。这就是该代码产生编译时错误的原因。\n\n```\npublic void test() {\nfor(int i = 0; i <\
  \ 10; i++) {\nConsumer evenIdPrinter = id -> {\nif (id < 0) {\n// 编译时错误。试图跳出 lambda\
  \ 体\nbreak;\n}\n};\n}\n}\n```\n\n递归 Lambda 表达式\n\n有时函数可能会从其自身内部调用自身。这样的函数称为**递归函数**。lambda\
  \ 表达式表示一个函数。然而，lambda 表达式不支持递归调用。如果你需要递归函数，则需要使用方法引用或匿名内部类。\n\n\n\n清单 5-23 中的程序展示了在需要递归\
  \ lambda 表达式时如何使用方法引用。它定义了一个名为 `factorial()` 的递归方法，用于计算整数的阶乘。在 `main()` 方法中，它使用方法引用\
  \ `RecursiveTest::factorial` 来代替 lambda 表达式。\n\n```\n// RecursiveTest.java\npackage\
  \ com.jdojo.lambda;\nimport java.util.function.IntFunction;\npublic class RecursiveTest\
  \ {\npublic static void main(String[] args) {\nIntFunction factorialCalc = RecursiveTest::factorial;\n\
  int n = 5;\nlong fact = factorialCalc.apply(n);\nSystem.out.println(\"Factorial\
  \ of \" + n + \" is \" + fact);\n}\npublic static long factorial(int n) {\nif (n\
  \ < 0) {\nString msg = \"Number must not be negative.\";\nthrow new IllegalArgumentException(msg);\n\
  }\nif (n == 0) {\nreturn 1;\n} else {\nreturn n * factorial(n - 1);\n}\n}\n}\nfactorial\
  \ of 5 is 120\n清单 5-23. 在需要递归 Lambda 表达式时使用方法引用\n```\n\n你也可以使用匿名内部类实现相同的结果，如下所示：\n\
  \n```\nIntFunction factorialCalc = new IntFunction() {\n@Override\npublic Long apply(int\
  \ n) {\nif (n < 0) {\nString msg = \"Number must not be negative.\";\nthrow new\
  \ IllegalArgumentException(msg);\n}\nif (n == 0) {\nreturn 1L;\n} else {\nreturn\
  \ n * this.apply(n - 1);\n}\n}\n};\n```\n\n比较对象\n\n`Comparator` 接口是一个函数式接口，其声明如下：\n\
  \n```\npackage java.util;\n@FunctionalInterface\npublic interface Comparator {\n\
  int compare(T o1, T o2);\n/* 其他方法未显示。 */\n}\n```\n\n`Comparator<T>` 接口包含许多默认方法和静态方法，这些方法可以与\
  \ lambda 表达式一起使用来创建其实例。值得查阅该接口的 API 文档。在本节中，我将讨论 `Comparator` 接口的以下两个方法：\n\n*  \
  \ `static <T,U extends Comparable<? super U>> Comparator<T> comparing(Function<?\
  \ super T,? extends U> keyExtractor)`\n\n*   `default <U extends Comparable<? super\
  \ U>> Comparator<T> thenComparing(Function<? super T,? extends U> keyExtractor)`\n\
  \n`comparing()` 方法接受一个 `Function` 并返回一个 `Comparator`。该 `Function` 应返回一个用于比较两个对象的\
  \ `Comparable`。你可以创建一个 `Comparator` 对象来根据 `Person` 对象的名字进行比较，如下所示：\n\n```\nComparator\
  \ firstNameComp = Comparator.comparing(Person::getFirstName);\n```\n\n`thenComparing()`\
  \ 方法是一个默认方法。如果两个对象基于主排序顺序相同，则使用它来指定次要比较。以下语句创建了一个 `Comparator<Person>`，它根据 `Person`\
  \ 对象的姓氏、名字和出生日期进行排序：\n\n```\nComparator lastFirstDobComp =\nComparator.comparing(Person::getLastName)\n\
  .thenComparing(Person::getFirstName)\n.thenComparing(Person::getDob);\n```\n\n清单\
  \ 5-24 中的程序展示了如何使用方法引用来创建 `Comparator` 对象以对 `Person` 对象进行排序。它使用了 `List` 接口的 `sort()`\
  \ 默认方法来对人员列表进行排序。`sort()` 方法接受一个 `Comparator` 作为参数。多亏了 lambda 表达式和接口中的默认方法，让排序任务变得如此简单！\n\
  \n```\n// ComparingObjects.java\npackage com.jdojo.lambda;\nimport java.util.Comparator;\n\
  import java.util.List;\npublic class ComparingObjects {\npublic static void main(String[]\
  \ args) {\nList persons = Person.getPersons();\n// 按名字排序\npersons.sort(Comparator.comparing(Person::getFirstName));\n\
  // 打印排序后的列表\nSystem.out.println(\"Sorted by the first name:\");\nFunctionUtil.forEach(persons,\
  \ System.out::println);\n// 按姓氏、名字，然后出生日期排序\npersons.sort(Comparator.comparing(Person::getLastName)\n\
  .thenComparing(Person::getFirstName)\n.thenComparing(Person::getDob));\n// 打印排序后的列表\n\
  System.out.println(\"\\nSorted by the last name, first name, and dob:\");\nFunctionUtil.forEach(persons,\
  \ System.out::println);\n}\n}\nSorted by the first name:\nDonna Jacobs, FEMALE,\
  \ 1970-09-12\nJohn Jacobs, MALE, 1975-01-20\nWally Inman, MALE, 1965-09-12\nSorted\
  \ by the last name, first name, and dob:\nWally Inman, MALE, 1965-09-12\nDonna Jacobs,\
  \ FEMALE, 1970-09-12\nJohn Jacobs, MALE, 1975-01-20\n清单 5-24. 对 Person 对象列表进行排序\n\
  ```\n\n小结\n\nLambda 表达式是一个未命名的代码块（或未命名的函数），包含一组形式参数和一个主体。与匿名内部类相比，lambda 表达式提供了一种简洁的方式来创建函数式接口的实例。就\
  \ Java 编程的表达力和流畅性而言，lambda 表达式和接口中的默认方法为 Java 编程语言注入了新的活力。Java 集合库从 lambda 表达式中获益最多。\n\
  \n定义 lambda 表达式的语法类似于声明方法。Lambda 表达式可以有一个形式参数列表和一个主体。Lambda 表达式会被求值为一个函数式接口的实例。当表达式被求值时，lambda\
  \ 表达式的主体不会被执行。当调用函数式接口的方法时，lambda 表达式的主体才会被执行。\n\nLambda 表达式的设计目标之一是保持简洁和可读性。Lambda\
  \ 表达式语法支持常见用例的简写形式。方法引用是用于指定使用现有方法的 lambda 表达式的简写形式。\n\n多态表达式是其类型取决于其使用上下文的表达式。Lambda\
  \ 表达式始终是多态表达式。Lambda 表达式不能单独使用。其类型由编译器根据上下文推断。Lambda 表达式可用于赋值、方法调用、返回和类型转换中。\n\n\
  当 lambda 表达式出现在方法内部时，它遵循词法作用域。也就是说，lambda 表达式不定义自己的作用域；相反，它存在于方法的作用域内。Lambda 表达式可以使用方法的有效最终局部变量。Lambda\
  \ 表达式可以使用诸如 `break`、`continue`、`return` 和 `throw` 之类的语句。`break` 和 `continue` 语句指定\
  \ lambda 表达式主体内的局部跳转。尝试跳出 lambda 表达式的主体将导致编译时错误。`return` 和 `throw` 语句会退出 lambda\
  \ 表达式的主体。\n\n问题与练习\n\n1.  什么是 lambda 表达式？它们与函数式接口有何关系？\n\n2.  Lambda 表达式与匿名类有何不同？你是否总能将\
