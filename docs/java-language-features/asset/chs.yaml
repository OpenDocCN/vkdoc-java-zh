  \n在本章中，您将学习：\n\n*   什么是流\n\n*   什么是响应式流倡议及其规范\n\n*   JDK 中的响应式流 API 以及如何使用它\n\n\
  *   如何使用 JDK9 中用于响应式流的 Java API 创建发布者、订阅者和处理器\n\n本章中的所有示例程序都在 `jdojo.reactive.stream`\
  \ 模块中，如清单 17-1 所示。\n\n```\n// module-info.java\nmodule jdojo.reactive.stream {\n\
  \    exports com.jdojo.reactive.stream;\n}\n清单 17-1. jdojo.reactive.stream 模块的声明\n\
  ```\n\n什么是流？\n\n流 是由生产者生成并由一个或多个消费者消费的一系列项目。这种生产者-消费者模型也称为源/汇模型或发布者-订阅者模型。在本章中，我将其称为发布者-订阅者模型。我互换使用术语元素、项目、数据项和数据，来表示由发布者发布并由订阅者接收的一条信息。\n\
  \n有几种流处理机制，其中拉模型和推模型最为常见。在推模型中，发布者将项目推送给订阅者。在拉模型中，订阅者从发布者拉取项目。当发布者和订阅者以相同的速率工作时，这些模型效果很好，这是一种理想情况。我们考虑几种它们不以相同速率工作的情况，这些情况下涉及的问题以及可能的解决方案。\n\
  \n当发布者比订阅者快时，订阅者必须有一个无界缓冲区来存储快速传入的项目，否则它必须丢弃无法处理的项目。另一种解决方案是使用一种称为 背压 的策略，其中订阅者告诉发布者放慢速度并保留项目，直到订阅者准备好处理更多项目。使用背压可以确保较快的发布者不会压垮较慢的订阅者。如果发布者持续为较慢的订阅者生成和存储元素，使用背压可能需要发布者拥有一个无界缓冲区。发布者可以实现一个有界缓冲区来存储有限数量的元素，并且如果其缓冲区已满，可以选择丢弃它们。还可以使用另一种策略，即发布者重试向订阅者发布项目，这些项目在发布时可能无法被订阅者接受。\n\
  \n\n\n当订阅者向发布者请求数据项但数据项不可用时，订阅者会如何处理？在同步请求中，订阅者必须等待，甚至可能无限期等待，直到数据项可用。如果发布者同步地向订阅者发送数据项，而订阅者同步地处理这些数据项，那么发布者必须阻塞，直到数据处理完成。解决方案是在两端采用异步处理：订阅者在向发布者请求数据项后，可以继续处理其他任务。当更多数据项准备就绪时，发布者会异步地将它们发送给订阅者。\n\
  \n什么是响应式流？\n\n响应式流始于 2013 年，是一项旨在为带有**非阻塞背压**的异步流处理提供标准的倡议。它旨在解决处理数据流的问题——即如何将数据流从发布者传递给订阅者，而无需发布者阻塞，也无需订阅者拥有无界缓冲区或丢弃数据。\n\
  \n响应式流模型非常简单——订阅者向发布者异步请求 `N` 个数据项。发布者异步地向订阅者发送 `N` 个或更少的数据项。\n\n提示\n\n响应式流在拉取模型和推送模型这两种流处理机制之间动态切换。当订阅者处理速度较慢时，它使用拉取模型；当订阅者处理速度较快时，它使用推送模型。\n\
  \n2015 年，针对响应式流的规范及 Java API 正式发布。有关响应式流的更多信息，请参考网页 [`http://www.reactive-streams.org/`](http://www.reactive-streams.org/)。响应式流的\
  \ Java API 仅包含四个接口：\n\n*   `Publisher<T>`\n*   `Subscriber<T>`\n*   `Subscription`\n\
  *   `Processor<T,R>`\n\n发布者是潜在无限数量有序数据项的**生产者**。它根据从当前订阅者收到的需求，向其发布（或发送）数据项。\n\n\
  订阅者**订阅**发布者以接收数据项。发布者向订阅者发送一个订阅令牌。订阅者使用该订阅令牌向发布者请求 `N` 个数据项。当数据项准备就绪时，发布者向订阅者发送\
  \ `N` 个或更少的数据项。订阅者可以请求更多数据项。发布者可能拥有来自同一订阅者的多个待处理数据项请求。\n\n订阅表示订阅者对发布者的**订阅令牌**。当订阅请求成功时，发布者将此令牌传递给订阅者。订阅者使用该订阅与发布者进行交互，例如请求更多数据项或取消订阅。\n\
  \n图 17-1 展示了发布者与订阅者之间典型的交互序列。图中未显示订阅令牌，也未显示错误和取消事件。\n\n![A323070_2_En_17_Fig1_HTML.gif](img/A323070_2_En_17_Fig1_HTML.gif)\n\
  \n图 17-1. 发布者与订阅者之间典型的交互序列\n\n处理器代表一个**处理阶段**，它同时充当订阅者和发布者。`Processor` 接口同时扩展了 `Publisher`\
  \ 和 `Subscriber` 接口。它用于在发布者-订阅者管道中转换数据项。`Processor<T,R>` 订阅类型为 `T` 的数据元素，接收并转换数据为类型\
  \ `R`，然后发布转换后的数据。图 17-2 展示了处理器在发布者-订阅者管道中作为转换器的作用。你可以在管道中使用多个处理器。\n\n![A323070_2_En_17_Fig2_HTML.gif](img/A323070_2_En_17_Fig2_HTML.gif)\n\
  \n图 17-2. 在发布者-订阅者管道中使用处理器作为转换器\n\n由响应式流倡议提供的响应式流 Java API 如清单 17-2 所示。请注意，所有方法的返回类型都是\
  \ `void`。这是因为这些方法要么表示异步请求，要么表示异步事件通知。我将在下一节解释此 API 如何被纳入 JDK 9 以及如何使用它。\n\n```\n\
  public interface Publisher {\npublic void subscribe(Subscriber s);\n}\npublic interface\
  \ Subscriber {\npublic void onSubscribe(Subscription s);\npublic void onNext(T t);\n\
  public void onError(Throwable t);\npublic void onComplete();\n}\npublic interface\
  \ Subscription {\npublic void request(long n);\npublic void cancel();\n}\npublic\
  \ interface Processor extends Subscriber, Publisher {\n}\n清单 17-2. 响应式流 Java API\n\
  ```\n\n响应式流的 Java API 看起来非常简单易懂。然而，实现起来并不简单。发布者与订阅者之间所有交互的异步特性以及背压的处理，使得实现变得复杂。作为应用程序开发者，你会发现实现这些接口很复杂。库应该提供实现以支持广泛的用例。JDK\
  \ 9 提供了一个简单的 `Publisher` 接口实现，你可以将其用于简单用例，或进行扩展以满足自身需求。RxJava ([`https://github.com/ReactiveX/RxJava`](https://github.com/ReactiveX/RxJava))\
  \ 是响应式流的 Java 实现之一。\n\nJDK 9 中的响应式流 API\n\nJDK 9 在 `java.util.concurrent` 包中提供了一个符合响应式流规范的\
  \ API，该包位于 `java.base` 模块中。该 API 包含两个类：\n\n*   `Flow`\n*   `SubmissionPublisher<T>`\n\
  \n`Flow` 类是 final 的。它封装了响应式流 Java API 和一个静态方法。响应式流 Java API 指定的四个接口作为嵌套静态接口包含在 `Flow`\
  \ 类中：\n\n*   `Flow.Processor<T,R>`\n*   `Flow.Publisher<T>`\n*   `Flow.Subscriber<T>`\n\
  *   `Flow.Subscription`\n\n这四个接口包含与清单 17-2 中相同的方法。`Flow` 类包含一个名为 `defaultBufferSize()`\
  \ 的静态方法，该方法返回发布者和订阅者使用的缓冲区默认大小。目前，它返回 256。\n\n`SubmissionPublisher<T>` 类是 `Flow.Publisher<T>`\
  \ 接口的实现类。该类实现了 `AutoCloseable` 接口，因此你可以使用 `try-with-resources` 块来管理其实例。JDK 9 没有为\
  \ `Flow.Subscriber<T>` 接口提供实现类；你需要自己实现它。不过，`SubmissionPublisher<T>` 类包含一个 `consume(Consumer<?\
  \ super T> consumer)` 方法，你可以使用它来处理此发布者发布的所有数据项。我将在后面通过示例更详细地解释它。\n\n发布者-订阅者交互\n\n\
  在你开始使用 JDK API 之前，理解使用响应式流的典型发布者-订阅者会话中发生的事件序列非常重要。我列出了每个事件中使用的方法。一个发布者可以有零个或多个订阅者。为了便于讨论，我仅使用一个订阅者。\n\
  \n*   你创建一个发布者和一个订阅者，它们分别是 `Flow.Publisher` 和 `Flow.Subscriber` 接口的实例。\n*   订阅者通过调用发布者的\
  \ `subscribe()` 方法尝试订阅发布者。如果订阅成功，发布者会异步调用订阅者的 `onSubscribe()` 方法，并传递一个 `Flow.Subscription`。如果订阅尝试失败，则会调用订阅者的\
  \ `onError()` 方法并传递一个 `IllegalStateException`，发布者-订阅者交互结束。\n\n\n\n*   订阅者通过调用 `Subscription`\
  \ 的 `request(N)` 方法向发布者请求 `N` 个数据项。订阅者可以多次向发布者请求更多数据项，无需等待之前的请求被满足。\n\n*   发布者会调用订阅者的\
  \ `onNext(T item)` 方法，调用次数不超过订阅者在其所有先前请求中请求的数据项总数——每次调用都会向订阅者发送一个数据项。如果发布者没有更多数据项可发送给订阅者，发布者会调用订阅者的\
  \ `onComplete()` 方法来通知数据流结束，从而终止发布者-订阅者交互。如果订阅者请求了 `Long.MAX_VALUE` 个元素，这实际上是一个无界请求，数据流也就变成了推送流。\n\
  \n*   如果发布者在任何时候遇到错误，它会调用订阅者的 `onError()` 方法。\n\n*   订阅者可以通过调用其 `Flow.Subscription`\
  \ 的 `cancel()` 方法来取消订阅。一旦订阅被取消，发布者-订阅者交互即告结束。但是，如果在请求取消之前存在待处理的请求，订阅者在取消订阅后仍有可能收到数据项。\n\
  \n总结上述关于终止条件的步骤，一旦订阅者的 `onComplete()` 或 `onError()` 方法被调用，订阅者将不再从发布者处接收任何通知。\n\n\
  在调用发布者的 `subscribe()` 方法之后，假设订阅者没有取消其订阅，则保证在订阅者上会按以下顺序调用方法：\n\n```\nonSubscribe\
  \ onNext* (onError | onComplete)?\n```\n\n这里，`*` 和 `?` 符号被用作正则表达式中的关键字——`*` 表示零次或多次出现，`?`\
  \ 表示零次或一次出现。\n\n对订阅者的第一个方法调用是 `onSubscribe()` 方法，这是一个成功订阅发布者的通知。订阅者的 `onNext()`\
  \ 方法可能被调用零次或多次，每次调用都表示发布了一个数据项。`onComplete()` 和 `onError()` 方法中的一个可能被调用零次或一次，以指示终止状态；只要订阅者没有取消其订阅，这两个方法中的一个就会被调用。\n\
  \n**创建发布者**\n\n创建发布者取决于 `Flow.Publisher<T>` 接口的实现类。我将介绍如何使用实现了该接口的 `SubmissionPublisher<T>`\
  \ 类。该类包含以下构造方法：\n\n*   `SubmissionPublisher()`\n\n*   `SubmissionPublisher(Executor\
  \ executor, int maxBufferCapacity)`\n\n*   `SubmissionPublisher(Executor executor,\
  \ int maxBufferCapacity, BiConsumer<? super Flow.Subscriber<? super T>,? super Throwable>\
  \ handler)`\n\n`SubmissionPublisher` 使用提供的 `Executor` 来向其订阅者传递数据项。如果使用多个线程来生成待发布的数据项，并且可以估算订阅者的数量，则应使用具有固定线程池的\
  \ `Executor`，该线程池可通过 `Executors` 类的 `newFixedThreadPool(int nThread)` 静态方法获得。否则，使用默认的\
  \ `Executor`，该执行器通过 `ForkJoinPool` 类的 `commonPool()` 方法获得。\n\n`SubmissionPublisher`\
  \ 类为每个订阅者使用一个独立的缓冲区。缓冲区大小由构造方法中的 `maxBufferCapacity` 参数指定。默认缓冲区大小是 `Flow` 类的 `defaultBufferSize()`\
  \ 静态方法返回的值，即 256。如果发布的数据项数量超过了某个订阅者的缓冲区大小，多余的元素将被丢弃。你可以使用 `SubmissionPublisher`\
  \ 类的 `getMaxBufferCapacity()` 方法获取每个订阅者的当前缓冲区大小。\n\n当订阅者的方法抛出异常时，其订阅将被取消。当订阅者的 `onNext()`\
  \ 方法抛出异常时，在其订阅被取消之前，会调用构造方法中指定的 `handler`。默认情况下，`handler` 为 `null`。\n\n以下代码片段创建了一个\
  \ `SubmissionPublisher`，它发布类型为 `Long` 的数据项，所有属性均设置为默认值：\n\n```\n// 创建一个可以发布 Long\
  \ 类型值的发布者\nSubmissionPublisher pub = new SubmissionPublisher();\n```\n\n`SubmissionPublisher`\
  \ 类实现了 `AutoCloseable` 接口。调用其 `close()` 方法会对其当前订阅者调用 `onComplete()` 方法。在调用 `close()`\
  \ 方法后尝试发布元素会抛出 `IllegalStateException`。\n\n**发布数据项**\n\n`SubmissionPublisher<T>`\
  \ 类包含以下用于发布元素的方法：\n\n*   `int offer(T item, long timeout, TimeUnit unit, BiPredicate<Flow.Subscriber<?\
  \ super T>,? super T> onDrop)`\n\n*   `int offer(T item, BiPredicate<Flow.Subscriber\
  \ <? super T>,? super T> onDrop)`\n\n*   `int submit(T item)`\n\n`submit()` 方法会阻塞，直到当前订阅者有可用资源来发布该数据项。考虑一个场景，每个订阅者的缓冲区容量为\
  \ 10。一个订阅者向发布者订阅但未请求任何数据项。发布者发布了 10 个数据项并将其缓冲给所有订阅者。尝试使用 `submit()` 方法发布另一个数据项将会阻塞，因为在发布者端，该订阅者的缓冲区已满。\n\
  \n`offer()` 方法是非阻塞的。该方法的第一个版本允许你指定一个超时时间，超时后数据项将被丢弃。你可以指定一个丢弃处理器，它是一个 `BiPredicate`。在为一个订阅者丢弃数据项之前，会调用丢弃处理器的\
  \ `test()` 方法。如果 `test()` 方法返回 `true`，则会再重试一次该数据项。如果 `test()` 方法返回 `false`，则丢弃该数据项且不再重试。`offer()`\
  \ 方法返回的负整数表示向订阅者发送数据项失败的尝试次数；正整数表示所有当前订阅者中已提交但尚未消费的数据项的最大数量的估计值。\n\n你应该使用哪种方法来发布数据项：`submit()`\
  \ 还是 `offer()`？这取决于你的需求。如果每个发布的数据项都必须发送给所有订阅者，`submit()` 方法是选择。如果你想等待特定时间并带重试地发布数据项，`offer()`\
  \ 方法是选择。\n\n**快速示例**\n\n让我们看一个使用 `SubmissionPublisher` 作为发布者的快速示例。`SubmissionPublisher`\
  \ 可以使用其 `submit(T item)` 方法发布一个元素。以下代码片段生成并发布了五个整数（1, 2, 3, 4, 5），假设 `pub` 是一个指向\
  \ `SubmissionPublisher` 对象的引用：\n\n```\n// 生成并发布 5 个整数\nLongStream.range(1L, 6L)\n\
  .forEach(pub::submit);\n```\n\n你需要一个订阅者来消费发布者发布的数据项。`SubmissionPublisher` 类包含一个\
  \ `consume(Consumer<? super T> consumer)` 方法，该方法允许你添加一个订阅者，该订阅者希望处理所有已发布的数据项，并且对其他通知（如错误通知和完成通知）不感兴趣。该方法返回一个\
  \ `CompletableFuture<Void>`，当发布者调用订阅者的 `onComplete()` 方法时，该 Future 完成。以下代码片段向发布者添加了一个\
  \ `Consumer`（该 Consumer 在内部被添加为订阅者）：\n\n```\n// 添加一个打印已发布数据项的订阅者\nCompletableFuture\
  \ subTask = pub.consume(System.out::println);\n```\n\n清单 17-3 包含了 `NumberPrinter`\
  \ 类的代码，该类展示了如何使用 `SubmissionPublisher` 类发布整数。示例代码的详细解释位于 `NumberPrinter` 类的输出之后。\n\
  \n\n\n```\n// NumberPrinter.java\npackage com.jdojo.reactive.stream;\nimport java.util.concurrent.CompletableFuture;\n\
  import java.util.concurrent.ExecutionException;\nimport java.util.concurrent.SubmissionPublisher;\n\
  import java.util.stream.LongStream;\npublic class NumberPrinter {\npublic static\
  \ void main(String[] args) {\nCompletableFuture subTask = null;\n// 创建一个发布者\nSubmissionPublisher\
  \ pub = new SubmissionPublisher();\n// 当 try 块退出时，发布者将被关闭\ntry (pub) {\n// 打印每个订阅者使用的缓冲区大小\n\
  System.out.println(\"订阅者缓冲区大小: \" + pub.getMaxBufferCapacity());\n// 向发布者添加一个订阅者。\n\
  // 该订阅者会打印已发布的元素\nsubTask = pub.consume(System.out::println);\n// 生成并发布五个整数\nLongStream.range(1L,\
  \ 6L)\n.forEach(pub::submit);\n}\nif (subTask != null) {\ntry {\n// 等待直到订阅者完成\n\
  subTask.get();\n} catch (InterruptedException | ExecutionException e) {\ne.printStackTrace();\n\
  }\n}\n}\n}\n清单 17-3.\n一个发布者-订阅者示例，其中发布并打印了五个整数\n```\n\n```\n订阅者缓冲区大小: 256\n\n```\n\
  \n`main()` 方法声明了一个名为 `subTask` 的变量，用于存储订阅者任务的引用。`subTask.get()` 方法会阻塞，直到订阅者完成。\n\
  \n```\nCompletableFuture subTask = null;\n```\n\n创建了一个用于发布 `Long` 类型项目的发布者，并在 `try-with-resources`\
  \ 块中使用：\n\n```\nSubmissionPublisher pub = new SubmissionPublisher();\ntry (pub)\
  \ {\n//...\n}\n```\n\n该发布者是 `SubmissionPublisher<Long>` 类的一个实例。当 `try-with-resources`\
  \ 块退出时，发布者会自动关闭。\n\n程序会打印将要订阅该发布者的每个订阅者的缓冲区大小。\n\n```\n// 打印每个订阅者使用的缓冲区大小\nSystem.out.println(\"\
  订阅者缓冲区大小: \" + pub.getMaxBufferCapacity());\n```\n\n使用 `consume()` 方法向发布者添加一个订阅者。请注意，该方法允许您指定一个\
  \ `Consumer`，它会在内部被转换为一个 `Subscriber`。对于每个已发布的项目，都会向该订阅者发送信号。该订阅者只是打印它接收到的项目。\n\n\
  ```\n// 向发布者添加一个订阅者。\n// 该订阅者会打印已发布的元素\nsubTask = pub.consume(System.out::println);\n\
  ```\n\n现在是发布整数的时候了。程序生成五个整数（1 到 5），并使用发布者的 `submit()` 方法发布它们。\n\n```\n// 生成并发布五个整数\n\
  LongStream.range(1L, 6L)\n.forEach(pub::submit);\n```\n\n已发布的整数会异步地向订阅者发送信号。当 `try-with-resources`\
  \ 块退出时，发布者会被关闭。为了让程序持续运行直到订阅者完成对所有已发布项目的处理，您必须调用 `subTask.get()`。如果您不调用此方法，可能无法在输出中看到这五个整数。\n\
  \n创建订阅者\n\n要拥有一个订阅者，您需要创建一个实现 `Flow.Subscriber<T>` 接口的类。如何实现该接口的方法取决于您的需求。在本节中，您将创建一个名为\
  \ `SimpleSubscriber` 的类，它实现了 `Flow.Subscriber<Long>` 接口。清单 17-4 包含了此类的代码。\n\n```\n\
  // SimpleSubscriber.java\npackage com.jdojo.reactive.stream;\nimport java.util.concurrent.Flow;\n\
  public class SimpleSubscriber implements Flow.Subscriber {\nprivate Flow.Subscription\
  \ subscription;\n// 订阅者名称\nprivate String name = \"未知\";\n// 此订阅者要处理的最大项目数\nprivate\
  \ final long maxCount;\n// 跟踪已处理的项目数量\nprivate long counter;\npublic SimpleSubscriber(String\
  \ name, long maxCount) {\nthis.name = name;\nthis.maxCount = maxCount = maxCount)\
  \ {\nSystem.out.printf(\"正在取消 %s。已处理项目数: %d.%n\", name, counter);\n// 取消订阅\nsubscription.cancel();\n\
  }\n}\n@Override\npublic void onError(Throwable t) {\nSystem.out.printf(\"%s 中发生错误:\
  \ %s.%n\", name, t.getMessage());\n}\n@Override\npublic void onComplete() {\nSystem.out.printf(\"\
  %s 已完成.%n\", name);\n}\n}\n清单 17-4.\n一个实现 Flow.Subscriber 接口的 SimpleSubscriber 类\n\
  ```\n\n`SimpleSubscriber` 类的实例代表一个订阅者，它将拥有一个名称和它想要处理的最大项目数（`maxCount`）。您需要将其名称和\
  \ `maxCount` 传递给它的构造函数。如果 `maxCount` 小于 1，则在构造函数中将其设置为 1。\n\n在 `onSubscribe()` 方法中，它将发布者传递的订阅存储在其名为\
  \ `subscription` 的实例变量中。它会打印一条关于该订阅的消息，并一次性请求它可以处理的所有项目。此订阅者实际上使用了推送模型，因为在此请求之后，不会再向发布者发送请求以获取更多项目。发布者将向此订阅者推送\
  \ `maxCount` 个或更少的项目。\n\n在 `onNext()` 方法中，它将 `counter` 实例变量增加 1。`counter` 实例变量跟踪此订阅者已接收到的项目数量。该方法会打印一条详细说明接收到的项目的消息。如果它已经接收到了它可以处理的最后一个项目，则会取消订阅。取消订阅后，它将不再从发布者那里接收任何项目。\n\
  \n在 `onError()` 和 `onComplete()` 方法中，它会打印一条关于其状态的消息。\n\n以下代码片段创建了一个名为 `S1` 的 `SimpleSubscriber`，它可以处理最多\
  \ 10 个项目。\n\n```\nSimpleSubscriber sub1 = new SimpleSubscriber(\"S1\", 10);\n```\n\
  \n现在是时候看看 `SimpleSubscriber` 的实际运行了。清单 17-5 包含了一个完整的程序。它会定期发布项目。发布一个项目后，它会等待 1 到\
  \ 3 秒。等待时间是随机的。详细说明将在该程序的输出之后给出。该程序使用异步处理，可能会导致不同的输出。\n\n\n\n```\n// PeriodicPublisher.java\n\
  package com.jdojo.reactive.stream;\nimport java.util.Random;\nimport java.util.concurrent.Flow.Subscriber;\n\
  import java.util.concurrent.SubmissionPublisher;\nimport java.util.concurrent.TimeUnit;\n\
  public class PeriodicPublisher {\nfinal static int MAX_SLEEP_DURATION = 3;\n// 用于生成休眠时间\n\
  final static Random sleepTimeGenerator = new Random();\npublic static void main(String[]\
  \ args) {\nSubmissionPublisher pub = new SubmissionPublisher();\n// 创建四个订阅者\nSimpleSubscriber\
  \ sub1 = new SimpleSubscriber(\"S1\", 2);\nSimpleSubscriber sub2 = new SimpleSubscriber(\"\
  S2\", 5);\nSimpleSubscriber sub3 = new SimpleSubscriber(\"S3\", 6);\nSimpleSubscriber\
  \ sub4 = new SimpleSubscriber(\"S4\", 10);\n// 将三个订阅者订阅到发布者\npub.subscribe(sub1);\n\
  pub.subscribe(sub2);\npub.subscribe(sub3);\n// 2 秒后订阅第四个订阅者\nsubscribe(pub, sub4,\
  \ 2);\n// 开始发布项目\nThread pubThread = publish(pub, 5);\ntry {\n// 等待发布者完成\npubThread.join();\n\
  } catch (InterruptedException e) {\ne.printStackTrace();\n}\n}\npublic static Thread\
  \ publish(SubmissionPublisher pub, long count) {\nThread t = new Thread(() -> {\n\
  for (long i = 1; i <= count; i++) {\npub.submit(i);\nSystem.out.println(\"Published\
  \ \" + i + \". Sleeping for \" + sleep() + \" sec.\");\n}\npub.close();\n});\nt.start();\n\
  return t;\n}\npublic static int sleep() {\nint sleepTime = sleepTimeGenerator.nextInt(MAX_SLEEP_DURATION)\
  \ + 1;\ntry {\nTimeUnit.SECONDS.sleep(sleepTime);\n} catch (InterruptedException\
  \ e) {\ne.printStackTrace();\n}\nreturn sleepTime;\n}\npublic static void subscribe(SubmissionPublisher<Long>\
  \ pub, Subscriber<Long> sub,\nlong delaySeconds) {\nnew Thread(() -> {\ntry {\n\
  TimeUnit.SECONDS.sleep(delaySeconds);\npub.subscribe(sub);\n} catch (InterruptedException\
  \ e) {\ne.printStackTrace();\n}\n}).start();\n}\n}\n清单 17-5.\n一个发布者-订阅者示例，其中发布者定期发布项目，`SimpleSubscriber`\
  \ 的实例订阅这些项目\n```\n\n```\nS1 已订阅，最大计数为 2。\n已发布 1。休眠 2 秒。\nS3 已订阅，最大计数为 6。\nS2 已订阅，最大计数为\
  \ 5。\nS3 收到 1。\nS1 收到 1。\nS2 收到 1。\nS4 已订阅，最大计数为 10。\n已发布 2。休眠 2 秒。\nS3 收到 2。\n\
  S1 收到 2。\nS2 收到 2。\n正在取消 S1。已处理项目数：2。\nS4 收到 2。\n已发布 3。休眠 2 秒。\nS4 收到 3。\nS3 收到\
  \ 3。\nS2 收到 3。\n已发布 4。休眠 3 秒。\nS4 收到 4。\nS2 收到 4。\nS3 收到 4。\n已发布 5。休眠 1 秒。\nS4 收到\
  \ 5。\nS3 收到 5。\nS2 收到 5。\n正在取消 S2。已处理项目数：5。\nS3 已完成。\nS4 已完成。\n```\n\n`PeriodicPublisher`\
  \ 类使用了两个静态变量。`MAX_SLEEP_DURATION` 静态变量存储了发布者在发布下一个项目之前应等待的最大秒数，其值设置为 3。`sleepTimeGenerator`\
  \ 静态变量存储了一个 `Random` 对象的引用，该对象在 `sleep()` 方法中用于生成下一次等待的随机时长。`main()` 方法执行了以下操作：\n\
  \n*   它创建了一个发布者，该发布者是 `SubmissionPublisher<Long>` 类的一个实例。\n*   它创建了四个名为 `S1`、`S2`、`S3`\
  \ 和 `S4` 的订阅者。每个订阅者可以处理不同数量的项目。\n*   三个订阅者被立即订阅。\n*   名为 `S4` 的订阅者在至少延迟两秒后，在一个单独的线程中进行订阅。`PeriodicPublisher`\
  \ 类的 `subscribe()` 方法负责处理这种延迟订阅。请注意输出中，`S4` 是在项目 1 已经发布之后才订阅的，因此它不会收到该项目。\n*   它调用了\
  \ `publish()` 方法，该方法启动一个新线程来发布五个项目，启动线程并返回线程引用。\n*   `main()` 方法调用了发布项目的线程的 `join()`\
  \ 方法，这样程序在所有项目发布完毕之前不会终止。\n*   `publish()` 方法负责发布这五个项目。它在最后关闭了发布者。它调用了 `sleep()`\
  \ 方法，该方法使当前线程休眠一段随机时长，时长在 1 秒到 `MAX_SLEEP_DURATION` 秒之间。\n*   请注意输出中，一些订阅者取消了他们的订阅，因为他们已经从发布者那里收到了指定数量的项目。\n\
  \n\n\n请注意，该程序保证所有项目在终止前都会被发布，但并不保证所有订阅者都能收到这些项目。在输出中，您看到订阅者收到了所有已发布的项目。这是因为发布者在发布最后一个项目后至少等待了一秒钟，这在这个小程序中给了订阅者足够的时间来接收和处理最后一个项目。\n\
  \n该程序并未演示实际的反压效果，因为所有订阅者都通过一次性请求项目使用了推送模型。您可以修改 `SimpleSubscriber` 类作为练习，以观察实际的反压效果：\n\
  \n*   在 `onSubscribe()` 方法中使用 `subscription.request(1)` 方法请求一个项目。\n\n*   在 `onNext()`\
  \ 方法中，延迟一段时间后再请求更多项目。该延迟应使订阅者以发布者发布项目的较慢速率工作。\n\n*   您需要发布超过 256 个项目（这是发布者为每个订阅者使用的默认缓冲区大小），或者使用\
  \ `SubmissionPublisher` 类的另一个构造函数来使用更小的缓冲区大小。这将迫使发布者发布的项目数量超过订阅者能够处理的数量。\n\n*  \
  \ 使用丢弃处理器来订阅订阅者，这样当发布者遇到反压时您就能看到。\n\n*   使用 `SubmissionPublisher` 类的 `offer()` 方法来发布项目，这样当订阅者无法处理更多项目时，发布者就不会无限期等待。\n\
  \n使用处理器\n\n处理器同时是一个订阅者和一个发布者。要使用处理器，您需要一个实现 `Flow.Processor<T,R>` 接口的类，其中 `T` 是订阅的项目类型，`R`\
  \ 是发布的项目类型。在本节中，我将创建一个简单的处理器，它基于 `Predicate<T>` 过滤项目。该处理器订阅一个发布六个整数（1、2、3、4、5 和\
  \ 6）的发布者。一个订阅者订阅该处理器。处理器从其发布者处接收项目，如果这些项目通过了 `Predicate<T>` 指定的标准，则重新发布相同的项目。清单\
  \ 17-6 包含了 `FilterProcessor<T>` 类的代码，其实例充当处理器。\n\n```\n// FilterProcessor.java\n\
  package com.jdojo.reactive.stream;\nimport java.util.concurrent.Flow;\nimport java.util.concurrent.Flow.Processor;\n\
  import java.util.concurrent.SubmissionPublisher;\nimport java.util.function.Predicate;\n\
  public class FilterProcessor extends SubmissionPublisher implements Processor {\n\
  private final Predicate filter;\npublic FilterProcessor(Predicate filter) {\nthis.filter\
  \ = filter;\n}\n@Override\npublic void onSubscribe(Flow.Subscription subscription)\
  \ {\n// 请求无限数量的项目\nsubscription.request(Long.MAX_VALUE);\n}\n@Override\npublic void\
  \ onNext(T item) {\n// 如果项目通过过滤器则发布它。否则，无需任何操作。\nSystem.out.println(\"Filter received:\
  \ \" + item);\nif (filter.test(item)) {\nthis.submit(item);\n}\n}\n@Override\npublic\
  \ void onError(Throwable t) {\n// 将 onError 消息异步传递给所有订阅者\nthis.getExecutor().execute(()\
  \ -> this.getSubscribers()\n.forEach(s -> s.onError(t)));\n}\n@Override\npublic\
  \ void onComplete() {\nSystem.out.println(\"Filter is complete.\");\n// 关闭此发布者，以便其所有订阅者将收到\
  \ onComplete 消息\nthis.close();\n}\n}\n清单 17-6.\n一个在重新发布前基于谓词过滤项目的处理器\n```\n\n`FilterProcessor<T>`\
  \ 类继承自 `SubmissionPublisher<T>` 类并实现了 `Flow.Processor<T,T>` 接口。处理器必须同时是发布者和订阅者。我让该类继承自\
  \ `SubmissionPublisher<T>` 类，这样我就不必编写代码使其作为发布者工作。该类实现了 `Processor<T,T>` 接口的所有方法，因此它将接收和发布相同类型的项目。\n\
  \n构造函数接受一个 `Predicate<? super T>` 并将其存储在名为 `filter` 的实例变量中，该变量将在 `onNext()` 方法中用于过滤项目。\n\
  \n`onNext()` 方法应用过滤器。如果过滤器返回 `true`，它会将项目重新发布给其订阅者。该类从其超类 `SubmissionPublisher`\
  \ 继承了用于重新发布项目的 `submit()` 方法。\n\n`onError()` 方法异步地将错误重新发布给其订阅者。它使用 `SubmissionPublisher`\
  \ 类的 `getExecutor()` 和 `getSubscribers()` 方法，这两个方法分别返回 `Executor` 和当前订阅者的列表。`Executor`\
  \ 用于异步地向当前订阅者发布消息。\n\n`onComplete()` 方法关闭处理器的发布者部分，这将向所有订阅者发送一条 `onComplete` 消息。\n\
  \n让我们看看这个处理器的实际运行情况。清单 17-7 包含了 `ProcessorTest` 类的代码。由于此程序涉及多个异步步骤，您可能会得到不同的输出。程序输出的详细说明紧随其后。\n\
  \n```\n// ProcessorTest.java\npackage com.jdojo.reactive.stream;\nimport java.util.concurrent.CompletableFuture;\n\
  import java.util.concurrent.SubmissionPublisher;\nimport java.util.concurrent.TimeUnit;\n\
  import java.util.stream.LongStream;\npublic class ProcessorTest {\npublic static\
  \ void main(String[] args) {\nCompletableFuture subTask = null;\n// 当 try 块退出时，发布者被关闭\n\
  try (SubmissionPublisher pub = new SubmissionPublisher()) {\n// 创建一个订阅者\nSimpleSubscriber\
  \ sub = new SimpleSubscriber(\"S1\", 10);\n// 创建一个处理器\nFilterProcessor filter =\
  \ new FilterProcessor(n -> n % 2 == 0);\n// 将过滤器订阅到发布者，并将订阅者订阅到过滤器\npub.subscribe(filter);\n\
  filter.subscribe(sub);\n// 生成并发布 6 个整数\nLongStream.range(1L, 7L)\n.forEach(pub::submit);\n\
  }\ntry {\n// 休眠两秒钟，让订阅者完成所有项目的处理\nTimeUnit.SECONDS.sleep(2);\n} catch (InterruptedException\
  \ e) {\ne.printStackTrace();\n}\n}\n}\n清单 17-7.\n在发布者-订阅者链中使用处理器\n```\n\n```\nS1\
  \ subscribed with max count 10.\nFilter received: 1\nFilter received: 2\nFilter\
  \ received: 3\nS1 received 2.\nFilter received: 4\nS1 received 4.\nFilter received:\
  \ 5\nFilter received: 6\nFilter is complete.\nS1 received 6.\nS1 is complete.\n\
  ```\n\n`ProcessorTest` 类的 `main()` 方法创建了一个发布者，它将发布六个整数：1、2、3、4、5 和 6。该方法执行了多项操作：\n\
  \n*   它创建了一个发布者，并在 `try-with-resources` 块中使用它，这样当 `try` 块退出时，它会被自动关闭。\n\n*   它创建了一个订阅者，该订阅者是\
  \ `SimpleSubscriber` 类的一个实例。订阅者名为 `S1`，最多可以处理 10 个项目。\n\n*   它创建了一个处理器，该处理器是 `FilterProcessor<Long>`\
  \ 类的一个实例。传入了一个 `Predicate<Long>`，它让处理器重新发布偶数并丢弃奇数。\n\n*   处理器被订阅到发布者，而简单订阅者被订阅到处理器。这完成了发布者-订阅者管道：发布者\
  \ -> 过滤器 -> 订阅者。\n\n*   在第一个 `try` 块的末尾，代码生成从 1 到 6 的整数，并使用发布者发布它们。\n\n*   在 `main()`\
  \ 方法的末尾，程序等待两秒钟，以确保过滤器和订阅者有机会处理它们的事件。如果您移除此逻辑，程序可能不会打印任何内容。您必须包含此逻辑，因为所有事件都是异步处理的。当第一个\
  \ `try` 块退出时，发布者将完成向过滤器发送所有通知。然而，过滤器和订阅者需要一些时间来接收和处理这些通知。\n\n摘要\n\n\n\n流（Stream）是由生产者生成并由一个或多个消费者消费的元素序列。这种生产者-消费者模型也被称为源/汇模型或发布者-订阅者模型。\n\
  \n存在多种流处理机制，其中拉模型和推模型最为常见。在推模型中，发布者将数据流推送给订阅者。在拉模型中，订阅者从发布者拉取数据。当两端处理速度不一致时，这些模型会出现问题。解决方案是提供一种能够自适应发布者和订阅者双方速度的流。一种称为背压（backpressure）的策略被采用，即订阅者通知发布者自己能够处理多少数据项，而发布者仅向订阅者发送不超过该数量的数据项。\n\
  \n响应式流（Reactive Streams）始于 2013 年，是一项旨在为具有非阻塞背压的异步流处理提供标准的倡议。它旨在解决处理元素流时遇到的问题——如何在不要求发布者阻塞，也不要求订阅者拥有无界缓冲区或丢弃数据的情况下，将元素流从发布者传递给订阅者。响应式流模型在拉模型和推模型这两种流处理机制之间动态切换。当订阅者速度较慢时使用拉模型，当订阅者速度较快时使用推模型。\n\
  \n2015 年，用于处理响应式流的规范及 Java API 发布。用于响应式流的 Java API 包含四个接口：`Publisher<T>`、`Subscriber<T>`、`Subscription`\
  \ 和 `Processor<T,R>`。\n\n发布者根据从订阅者收到的需求，向其订阅者发布数据项。订阅者订阅发布者以接收数据项。发布者向订阅者发送一个订阅令牌。订阅者使用该订阅令牌向发布者请求\
  \ `N` 个数据项。当数据项准备就绪时，发布者向订阅者发送 `N` 个或更少的数据项。订阅者可以请求更多数据项。\n\nJDK9 在 `java.util.concurrent`\
  \ 包中提供了一个符合响应式流规范的 API，该包位于 `java.base` 模块中。该 API 包含两个类：`Flow` 和 `SubmissionPublisher<T>`。\n\
  \n`Flow` 类封装了响应式流 Java API。响应式流 Java API 指定的四个接口作为嵌套静态接口包含在 `Flow` 类中：`Flow.Processor<T,R>`、`Flow.Publisher<T>`、`Flow.Subscriber<T>`\
  \ 和 `Flow.Subscription`。\n\n练习题\n\n1.  什么是响应式流？响应式流中的拉模型和推模型是什么？\n\n2.  描述响应式流的四个组成部分——发布者、订阅者、订阅和处理器。\n\
  \n3.  列出响应式流 API 四个接口的完全限定名。\n\n4.  以下陈述正确还是错误？\n\n    响应式流 API 支持数据流的异步处理。\n\n\
  5.  当订阅者与发布者的订阅成功时，会调用订阅者的哪个方法？\n\n6.  当订阅者与发布者的订阅失败时，会调用订阅者的哪个方法？\n\n7.  订阅者如何向发布者请求\
  \ 200 个数据项？\n\n8.  当订阅者从其发布者接收到一个数据项时，会调用订阅者的哪个方法？\n\n9.  订阅者如何取消与发布者的订阅？订阅者取消订阅后，是否可能从其发布者接收更多数据项？\n\
  \n10. `java.util.concurrent.Flow.Publisher<T>` 接口的实现类的完全限定名是什么？\n\n18. 栈遍历\n\n在本章中，你将学习：\n\
  \n*   什么是栈和栈帧\n\n*   在 JDK9 之前如何遍历线程的栈\n\n*   在 JDK9 中如何使用栈遍历 API 遍历线程的栈\n\n*  \
  \ 如何在 JDK9 中了解方法的调用者所属的类\n\n本章中的所有示例程序都是 `jdojo.stackwalker` 模块的成员，如清单 18-1 所示。\n\
  \n```\n// module-info.java\nmodule jdojo.stackwalker {\n    exports com.jdojo.stackwalker;\n\
  }\n清单 18-1.\njdojo.stackwalker 模块的声明\n```\n\n什么是栈？\n\nJVM 中的每个线程都有一个私有的 JVM 栈，该栈在线程创建时同时创建。栈是一种后进先出（LIFO）数据结构。栈存储帧。每次调用方法时，都会创建一个新帧并将其推送到栈顶。当方法调用完成时，该帧被销毁（从栈中弹出）。栈上的每个帧都包含自己的局部变量数组、自己的操作数栈、返回值以及对当前方法所在类的运行时常量池的引用。JVM\
  \ 的特定实现可能会扩展帧以存储更多信息。\n\nJVM 栈上的一个帧表示给定线程中的一次 Java 方法调用。在给定线程中，任何时刻只有一个帧是活动的。这个活动的帧被称为当前帧，其方法被称为当前方法。定义当前方法的类被称为当前类。当当前帧的方法调用另一个方法时，该帧不再是当前帧——一个新帧被推送到栈上，正在执行的方法成为当前方法，新帧成为当前帧。当方法返回时，旧帧再次成为当前帧。有关\
  \ JVM 栈和帧的更多详细信息，请参阅 Java 虚拟机规范，网址为 [`https://docs.oracle.com/javase/specs/jvms/se9/html/index.html`](https://docs.oracle.com/javase/specs/jvms/se9/html/index.html)。\n\
  \n提示\n\n如果 JVM 支持本地方法，线程还包含一个本地方法栈，其中包含每次本地方法调用的本地方法帧。\n\n图 18-1 显示了两个线程及其 JVM 栈。第一个线程的\
  \ JVM 栈包含四个帧，第二个线程的栈包含三个帧。帧 4 是线程 1 中的活动帧，帧 3 是线程 2 中的活动帧。\n\n![A323070_2_En_18_Fig1_HTML.gif](img/A323070_2_En_18_Fig1_HTML.gif)\n\
  \n图 18-1.\n\nJVM 中线程及其私有 JVM 栈的排列\n\n什么是栈遍历？\n\n栈遍历（或栈遍历）是遍历线程的栈帧并检查帧内容的过程。从 Java\
  \ 1.4 开始，你可以获取线程栈的快照，并获取每个帧的详细信息，例如发生方法调用的类名和方法名、源文件名、源文件中的行号等。用于栈遍历的类和接口是栈遍历 API\
  \ 的一部分。\n\nJDK8 中的栈遍历\n\n在 JDK9 之前，可以使用 `java.lang` 包中的以下类遍历线程栈中的所有帧：\n\n*   `Throwable`\n\
  \n*   `Thread`\n\n*   `StackTraceElement`\n\n`StackTraceElement` 类的实例表示一个栈帧。`Throwable`\
  \ 类的 `getStackTrace()` 方法返回一个 `StackTraceElement[]`，其中包含当前线程栈的帧。`Thread` 类的 `getStackTrace()`\
  \ 方法返回一个 `StackTraceElement[]`，其中包含该线程栈的帧。数组的第一个元素是栈顶帧，代表序列中的最后一次方法调用。某些 JVM 实现可能会省略返回数组中的一些帧。`StackTraceElement`\
  \ 类包含以下方法，这些方法返回帧所表示的方法调用的详细信息：\n\n*   `String getClassLoaderName()`\n\n*   `String\
  \ getClassName()`\n\n*   `String getFileName()`\n\n*   `int getLineNumber()`\n\n\
  *   `String getMethodName()`\n\n*   `String getModuleName()`\n\n*   `String getModuleVersion()`\n\
  \n*   `boolean isNativeMethod()`\n\n提示\n\n\n\n`getModuleName()`、\n`getModuleVersion()`\
  \ 和\n`getClassLoaderName()` 方法在 JDK9 中被添加到了此类中。\n\n`StackTraceElement` 类中的大多数方法都具有直观的名称，例如，`getMethodName()`\
  \ 方法返回此栈帧所表示的方法调用的名称。`getFileName()` 方法返回包含方法调用代码的源文件名，而 `getLineNumber()` 返回源文件中方法调用代码的行号。\n\
  \n以下代码片段展示了如何使用 `Throwable` 和 `Thread` 类检查当前线程的堆栈：\n\n```\n// 使用 Throwable 类\nStackTraceElement[]\
  \ frames = new Throwable().getStackTrace();\n// 使用 Thread 类\nStackTraceElement[]\
  \ frames = Thread.currentThread()\n.getStackTrace();\n// 在此处处理栈帧...\n```\n\n清单 18-2\
  \ 包含一个名为 `LegacyStackWalk` 的类的代码。输出结果是在 JDK8 中运行该类时生成的。\n\n```\n// LegacyStackWalk.java\n\
  package com.jdojo.stackwalker;\nimport java.lang.reflect.InvocationTargetException;\n\
  public class LegacyStackWalk {\npublic static void main(String[] args) {\nm1();\n\
  }\npublic static void m1() {\nm2();\n}\npublic static void m2() {\n// 直接调用 m3()\n\
  System.out.println(\"\\n 不使用反射: \");\nm3();\n// 使用反射调用 m3()\ntry {\nSystem.out.println(\"\
  \\n 使用反射: \");\nLegacyStackWalk.class\n.getMethod(\"m3\")\n.invoke(null);\n} catch\
  \ (NoSuchMethodException\n| InvocationTargetException\n| IllegalAccessException\n\
  | SecurityException e) {\ne.printStackTrace();\n}\n}\npublic static void m3() {\n\
  // 打印调用栈详情\nStackTraceElement[] frames = Thread.currentThread()\n.getStackTrace();\n\
  for (StackTraceElement frame : frames) {\nSystem.out.println(frame.toString());\n\
  }\n}\n}\n不使用反射:\njava.lang.Thread.getStackTrace(Thread.java:1552)\ncom.jdojo.stackwalker.LegacyStackWalk.m3(LegacyStackWalk.java:37)\n\
