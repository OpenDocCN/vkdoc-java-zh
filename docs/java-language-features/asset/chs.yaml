  \n注意\n\nJava 8 在 `Class` 类中添加了一个名为 `toGenericString()` 的方法，该方法返回一个描述该类的字符串。该字符串包含该类的修饰符和类型参数。调用\
  \ `Person.class.toGenericString()` 将返回 `public class com.jdojo.reflection.Person`。\n\
  \n\n\n## 反射字段\n\n类的字段由 `java.lang.reflect.Field` 类的对象表示。`Class` 类中的以下四个方法可用于获取类的字段信息：\n\
  \n*   `Field[] getFields()`\n*   `Field[] getDeclaredFields()`\n*   `Field getField(String\
  \ name)`\n*   `Field getDeclaredField(String name)`\n\n`getFields()` 方法返回类或接口的所有可访问公共字段。可访问公共字段包括在类中声明或从其超类继承的公共字段。`getDeclaredFields()`\
  \ 方法返回类声明中出现的所有字段。它不包括继承的字段。另外两个方法 `getField()` 和 `getDeclaredField()` 用于在你知道字段名称时获取\
  \ `Field` 对象。让我们考虑以下类 `A` 和 `B` 以及接口 `IConstants` 的声明：\n\n```\ninterface IConstants\
  \ {\nint DAYS_IN_WEEK = 7;\n}\nclass A implements IConstants {\nprivate int aPrivate;\n\
  public int aPublic;\nprotected int aProtected;\n}\nclass B extends A {\nprivate\
  \ int bPrivate;\npublic int bPublic;\nprotected int bProtected;\n}\n```\n\n如果 `bClass`\
  \ 是类 `B` 的 `Class` 对象的引用，则表达式 `bClass.getFields()` 将返回以下三个可访问且为 `public` 的字段：\n\n\
  *   `public int B.bPublic`\n*   `public int A.aPublic`\n*   `public static final\
  \ int IConstants.DAYS_IN_WEEK`\n\n`bClass.getDeclaredFields()` 方法将返回在类 `B` 中声明的三个字段：\n\
  \n*   `private int B.bPrivate`\n*   `public int B.bPublic`\n*   `protected int B.bProtected`\n\
  \n要获取一个类及其超类的所有字段，你必须使用 `getSuperclass()` 方法获取超类的引用，并组合使用这些方法。清单 3-7 演示了如何获取类的字段信息。请注意，当你在\
  \ `Person` 类的 `Class` 对象上调用 `getFields()` 方法时，你不会得到任何东西，因为 `Person` 类不包含任何 `public`\
  \ 字段。\n\n```\n// FieldReflection.java\npackage com.jdojo.reflection;\nimport java.lang.reflect.Field;\n\
  import java.lang.reflect.Modifier;\nimport java.util.ArrayList;\npublic class FieldReflection\
  \ {\npublic static void main(String[] args) {\nClass cls = Person.class;\n// 打印声明的字段\n\
  ArrayList fieldsDescription = getDeclaredFieldsList(cls);\nSystem.out.println(\"\
  Declared Fields for \" + cls.getName());\nfor (String desc : fieldsDescription)\
  \ {\nSystem.out.println(desc);\n}\n// 获取可访问的公共字段\nfieldsDescription = getFieldsList(cls);\n\
  System.out.println(\"\\nAccessible Fields for \" + cls.getName());\nfor (String\
  \ desc : fieldsDescription) {\nSystem.out.println(desc);\n}\n}\npublic static ArrayList\
  \ getFieldsList(Class c) {\nField[] fields = c.getFields();\nArrayList fieldsList\
  \ = getFieldsDescription(fields);\nreturn fieldsList;\n}\npublic static ArrayList\
  \ getDeclaredFieldsList(Class c) {\nField[] fields = c.getDeclaredFields();\nArrayList\
  \ fieldsList = getFieldsDescription(fields);\nreturn fieldsList;\n}\npublic static\
  \ ArrayList getFieldsDescription(Field[] fields) {\nArrayList fieldList = new ArrayList();\n\
  for (Field f : fields) {\n// 获取字段的修饰符\nint mod = f.getModifiers() & Modifier.fieldModifiers();\n\
  String modifiers = Modifier.toString(mod);\n// 获取字段类型的简单名称\nClass type = f.getType();\n\
  String typeName = type.getSimpleName();\n// 获取字段的名称\nString fieldName = f.getName();\n\
  fieldList.add(modifiers + \" \" + typeName + \" \" + fieldName);\n}\nreturn fieldList;\n\
  }\n}\n清单 3-7.\n反射类的字段\n```\n\n```\nDeclared Fields for com.jdojo.reflection.Person\n\
  private int id\nprivate String name\nAccessible Fields for com.jdojo.reflection.Person\n\
  ```\n\n提示\n\n你不能使用此技术来描述数组对象的 `length` 字段。每个数组类型都有一个对应的类。当你尝试使用 `getFields()` 方法获取数组类的字段时，你会得到一个长度为零的\
  \ `Field` 对象数组。数组长度不是数组类定义的一部分。相反，它作为数组对象的一部分存储在对象头中。有关数组 `length` 字段的更多信息，请参阅第\
  \ 11 章。\n\n## 反射可执行对象\n\n`Method` 类的实例表示一个方法。`Constructor` 类的实例表示一个构造器。在结构上，方法和构造器有一些共同点。两者都使用修饰符、参数和\
  \ `throws` 子句。两者都可以被执行。Java 8 重构了这些类，使它们继承自一个共同的抽象超类 `Executable`。用于检索两者共有信息的方法已被添加/移动到\
  \ `Executable` 类中。\n\n`Executable` 中的参数由 `Parameter` 类的对象表示，该类是在 Java 8 中添加的。`Executable`\
  \ 类中的 `getParameters()` 方法返回一个 `Executable` 的所有参数 `Parameter[]`。默认情况下，形式参数名称不会存储在类文件中以保持文件大小较小。除非保留了实际参数名称，否则\
  \ `Parameter` 类的 `getName()` 方法会返回合成的参数名称，如 `arg0`、`arg1` 等。如果要在类文件中保留实际参数名称，则需要使用\
  \ `javac` 编译器的 `-parameters` 选项编译源代码。\n\n`Executable` 类的 `getExceptionTypes()` 方法返回一个\
  \ `Class` 对象数组，该数组描述了 `Executable` 抛出的异常。如果 `throws` 子句中未列出任何异常，则返回一个长度为零的数组。\n\n\
  `Executable` 类的 `getModifiers()` 方法将修饰符作为 `int` 返回。\n\n`Executable` 类的 `getTypeParameters()`\
  \ 方法返回一个 `TypeVariable` 数组，该数组表示泛型方法/构造器的类型参数。本章中的示例不包括方法/构造器中的泛型类型变量声明。\n\n清单 3-8\
  \ 包含一个工具类，该类由静态方法组成，用于获取 `Executable` 的信息，例如修饰符、参数和异常列表。在后续章节中讨论方法和构造器时，我将使用此类。\n\
  \n```\n// ExecutableUtil.java\npackage com.jdojo.reflection;\nimport java.lang.reflect.Constructor;\n\
  import java.lang.reflect.Executable;\nimport java.lang.reflect.Method;\nimport java.lang.reflect.Modifier;\n\
  import java.lang.reflect.Parameter;\nimport java.util.ArrayList;\npublic class ExecutableUtil\
  \ {\npublic static ArrayList getParameters(Executable exec) {\nParameter[] parms\
  \ = exec.getParameters();\nArrayList parmList = new ArrayList();\nfor (int i = 0;\
  \ i  getExceptionList(Executable exec) {\nArrayList exceptionList = new ArrayList();\n\
  for (Class c : exec.getExceptionTypes()) {\nexceptionList.add(c.getSimpleName());\n\
  }\nreturn exceptionList;\n}\npublic static String getThrowsClause(Executable exec)\
  \ {\nArrayList exceptionList = getExceptionList(exec);\nString exceptions = ExecutableUtil.arrayListToString(exceptionList,\
  \ \",\");\nString throwsClause = \"\";\nif (exceptionList.size() > 0) {\nthrowsClause\
  \ = \"throws \" + exceptions;\n}\nreturn throwsClause;\n}\npublic static String\
  \ getModifiers(Executable exec) {\n// 获取类的修饰符\nint mod = exec.getModifiers();\n\
  if (exec instanceof Method) {\nmod = mod & Modifier.methodModifiers();\n} else if\
  \ (exec instanceof Constructor) {\nmod = mod & Modifier.constructorModifiers();\n\
  }\nreturn Modifier.toString(mod);\n}\npublic static String arrayListToString(ArrayList\
  \ list, String saparator) {\nString[] tempArray = new String[list.size()];\ntempArray\
  \ = list.toArray(tempArray);\nString str = String.join(saparator, tempArray);\n\
  return str;\n}\n}\n清单 3-8.\n用于获取可执行对象信息的工具类\n```\n\n\n\n### 反思方法\n\n`Class` 类中的以下四种方法可用于获取类的方法信息：\n\
  \n*   `Method[] getMethods()`\n*   `Method[] getDeclaredMethods()`\n*   `Method\
  \ getMethod(String name, Class... parameterTypes)`\n*   `Method getDeclaredMethod(String\
  \ name, Class... parameterTypes)`\n\n`getMethods()` 方法返回该类所有可访问的公共方法。可访问的公共方法包括在该类中声明的或从超类继承的任何公共方法。`getDeclaredMethods()`\
  \ 方法仅返回在该类中声明的所有方法。它不会返回任何从超类继承的方法。另外两个方法 `getMethod()` 和 `getDeclaredMethod()`\
  \ 用于在你知道方法名称及其参数类型时获取 `Method` 对象。\n\n`Method` 类的 `getReturnType()` 方法返回 `Class`\
  \ 对象，该对象包含有关方法返回类型的信息。\n\n清单 3-9 演示了如何获取类的方法信息。你可以取消注释 `main()` 方法中的代码，以打印 `Person`\
  \ 类中的所有方法——包括在 `Person` 类中声明的和从 `Object` 类继承的。\n\n```\n// MethodReflection.java\n\
  package com.jdojo.reflection;\nimport java.lang.reflect.Method;\nimport java.util.ArrayList;\n\
  public class MethodReflection {\npublic static void main(String[] args) {\nClass\
  \ cls = Person.class;\n// 获取声明的方法\nArrayList methodsDescription = getDeclaredMethodsList(cls);\n\
  System.out.println(\"Declared Methods for \" + cls.getName());\nfor (String desc\
  \ : methodsDescription) {\nSystem.out.println(desc);\n}\n/* 取消注释以下代码以打印 Person 类中的所有方法\n\
  // 获取可访问的公共方法\nmethodsDescription = getMethodsList(c);\nSystem.out.println(\"\\\
  nMethods for \" + c.getName());\nfor (String desc : methodsDescription) {\nSystem.out.println(desc);\n\
  }\n*/\n}\npublic static ArrayList getMethodsList(Class c) {\nMethod[] methods =\
  \ c.getMethods();\nArrayList methodsList = getMethodsDescription(methods);\nreturn\
  \ methodsList;\n}\npublic static ArrayList getDeclaredMethodsList(Class c) {\nMethod[]\
  \ methods = c.getDeclaredMethods();\nArrayList methodsList = getMethodsDescription(methods);\n\
  return methodsList;\n}\npublic static ArrayList getMethodsDescription(Method[] methods)\
  \ {\nArrayList methodList = new ArrayList();\nfor (Method m : methods) {\nString\
  \ modifiers = ExecutableUtil.getModifiers(m);\n// 获取方法返回类型\nClass returnType = m.getReturnType();\n\
  String returnTypeName = returnType.getSimpleName();\n// 获取方法名称\nString methodName\
  \ = m.getName();\n// 获取方法的参数\nArrayList paramsList = ExecutableUtil.getParameters(m);\n\
  String params = ExecutableUtil.arrayListToString(paramsList, \",\");\n// 获取方法抛出的异常\n\
  String throwsClause = ExecutableUtil.getThrowsClause(m);\nmethodList.add(modifiers\
  \ + \" \" + returnTypeName + \" \"\n+ methodName + \"(\" + params + \") \" + throwsClause);\n\
  }\nreturn methodList;\n}\n}\n清单 3-9.\n反思类的方法\n```\n\n```\nDeclared Methods for com.jdojo.reflection.Person\n\
  public String toString()\npublic Object clone()\npublic String getName()\npublic\
  \ int getId()\npublic void setName(String arg0)\n```\n\n### 反思构造器\n\n获取类的构造器信息与获取类的方法信息类似。`Class`\
  \ 类中的以下四种方法用于获取由 `Class` 对象表示的构造器的信息：\n\n*   `Constructor[] getConstructors()`\n\
  *   `Constructor[] getDeclaredConstructors()`\n*   `Constructor<T> getConstructor(Class...\
  \ parameterTypes)`\n*   `Constructor<T> getDeclaredConstructor(Class... parameterTypes)`\n\
  \n`getConstructors()` 方法返回所有公共构造器。`getDeclaredConstructors()` 方法返回所有声明的构造器。另外两个方法\
  \ `getConstructor()` 和 `getDeclaredConstructor()` 用于在你知道构造器的参数类型时获取 `Constructor`\
  \ 对象。清单 3-10 演示了如何获取由 `Class` 对象表示的构造器的信息。\n\n```\n// ConstructorReflection.java\n\
  package com.jdojo.reflection;\nimport java.lang.reflect.Constructor;\nimport java.util.ArrayList;\n\
  public class ConstructorReflection {\npublic static void main(String[] args) {\n\
  Class cls = Person.class;\n// 获取声明的构造器\nSystem.out.println(\"Constructors for \"\
  \ + cls.getName());\nConstructor[] constructors = cls.getConstructors();\nArrayList\
  \ constructDescList = getConstructorsDescription(constructors);\nfor (String desc\
  \ : constructDescList) {\nSystem.out.println(desc);\n}\n}\npublic static ArrayList\
  \ getConstructorsDescription(Constructor[] constructors) {\nArrayList constructorList\
  \ = new ArrayList();\nfor (Constructor constructor : constructors) {\nString modifiers\
  \ = ExecutableUtil.getModifiers(constructor);\n// 获取构造器名称\nString constructorName\
  \ = constructor.getName();\n// 获取构造器的参数\nArrayList paramsList\n= ExecutableUtil.getParameters(constructor);\n\
  String params = ExecutableUtil.arrayListToString(paramsList, \",\");\n// 获取构造器抛出的异常\n\
  String throwsClause = ExecutableUtil.getThrowsClause(constructor);\nconstructorList.add(modifiers\
  \ + \" \" + constructorName\n+ \"(\" + params + \") \" + throwsClause);\n}\nreturn\
  \ constructorList;\n}\n}\n清单 3-10.\n反思类的构造器\n```\n\n```\nConstructors for com.jdojo.reflection.Person\n\
  public com.jdojo.reflection.Person()\npublic com.jdojo.reflection.Person(int arg0,String\
  \ arg1)\n```\n\n\n\n## 创建对象\n\nJava 允许你使用反射来创建类的对象。类名无需在编译时确定，直到运行时才需要知道。你可以通过反射调用类的某个构造方法来创建对象。你还可以访问对象字段的值、设置字段的值以及调用对象的方法。如果你在编译时已知类名并且可以访问该类代码，请不要使用反射来创建其对象；而应在代码中使用\
  \ `new` 运算符来创建该类的对象。通常，框架和库会使用反射来创建对象。\n\n你可以使用反射创建类的对象。在创建对象之前，需要获取构造方法的引用。上一节展示了如何获取类的特定构造方法的引用。使用\
  \ `Constructor` 类的 `newInstance()` 方法来创建对象。你可以将构造方法的实际参数传递给 `newInstance()` 方法，该方法声明如下：\n\
  \n```\npublic T newInstance(Object... initargs) throws InstantiationException, IllegalAccessException,\
  \ IllegalArgumentException, InvocationTargetException\n```\n\n这里，`initargs` 是构造方法的实际参数。对于无参构造方法，你不会传递任何参数。\n\
  \n提示\n\n`Class` 类的 `newInstance()` 方法使用类的无参构造方法创建该类的新对象。该方法自 JDK9 起已被弃用，因为它不能正确传播无参构造方法抛出的异常。请使用\
  \ `Constructor` 类的 `newInstance()` 方法，通过无参构造方法以及所有其他构造方法来创建类的对象。\n\n以下代码片段获取了 `Person`\
  \ 类的无参构造方法的引用并调用了它。为简洁起见，我省略了异常处理：\n\n```\nClass cls = Person.class;\n// 获取 Person()\
  \ 构造方法的引用\nConstructor noArgsCons = cls.getConstructor();\nPerson p = noArgsCons.newInstance();\n\
  ```\n\n清单 3-11 包含了完整代码，演示如何使用 `Person` 类的 `Person(int, String)` 构造方法通过反射创建一个 `Person`\
  \ 对象。请注意，`Constructor<T>` 类是一个泛型类型。其类型参数是声明该构造方法的类类型，例如，`Constructor<Person>` 类型表示\
  \ `Person` 类的一个构造方法。\n\n```\n// InvokeConstructorTest.java\npackage com.jdojo.reflection;\n\
  import java.lang.reflect.Constructor;\nimport java.lang.reflect.InvocationTargetException;\n\
  public class InvokeConstructorTest {\npublic static void main(String[] args) {\n\
  Class personClass = Person.class;\ntry {\n// 获取构造方法 \"Person(int, String)\"\nConstructor\
  \ cons = personClass.getConstructor(int.class, String.class);\n// 使用 id 和 name 的值调用构造方法\n\
  Person chris = cons.newInstance(1994, \"Chris\");\nSystem.out.println(chris);\n\
  } catch (NoSuchMethodException | SecurityException\n| InstantiationException | IllegalAccessException\n\
  | IllegalArgumentException | InvocationTargetException e) {\nSystem.out.println(e.getMessage());\n\
  }\n}\n}\n清单 3-11.\n使用特定构造方法创建新对象\n```\n\n```\nPerson: id=1994, name=Chris\n```\n\
  \n## 调用方法\n\n你可以使用反射调用对象的方法。你需要获取要调用的方法的引用。假设你想调用 `Person` 类的 `setName()` 方法。你可以按如下方式获取\
  \ `setName()` 方法的引用：\n\n```\nClass personClass = Person.class;\nMethod setName =\
  \ personClass.getMethod(\"setName\", String.class);\n```\n\n要调用此方法，请在方法的引用上调用 `invoke()`\
  \ 方法，该方法声明如下：\n\n```\npublic Object invoke(Object obj, Object... args) throws IllegalAccessException,\
  \ lllegalArgumentException, InvocationTargetException\n```\n\n`invoke()` 方法的第一个参数是你想要调用该方法的对象。如果\
  \ `Method` 对象表示一个静态方法，则第一个参数会被忽略，或者可以为 `null`。第二个参数是一个可变参数，你可以在其中按照方法声明中声明的顺序传递所有实际参数。\n\
  \n由于 `Person` 类的 `setName()` 方法接受一个 `String` 参数，你需要将一个 `String` 对象作为第二个参数传递给 `invoke()`\
  \ 方法。清单 3-12 演示了如何使用反射在 `Person` 对象上调用方法。\n\n```\n// InvokeMethodTest.java\npackage\
  \ com.jdojo.reflection;\nimport java.lang.reflect.InvocationTargetException;\nimport\
  \ java.lang.reflect.Method;\npublic class InvokeMethodTest {\npublic static void\
  \ main(String[] args) {\nClass personClass = Person.class;\ntry {\n// 创建 Person\
  \ 类的对象\nPerson p = personClass.newInstance();\n// 打印 Person 对象的详细信息\nSystem.out.println(p);\n\
  // 获取 setName() 方法的引用\nMethod setName = personClass.getMethod(\"setName\", String.class);\n\
  // 在 p 上调用 setName() 方法，并传递 \"Ann\" 作为实际参数\nsetName.invoke(p, \"Ann\");\n// 打印 Person\
  \ 对象的详细信息\nSystem.out.println(p);\n} catch (InstantiationException | IllegalAccessException\n\
  | NoSuchMethodException | SecurityException\n| IllegalArgumentException | InvocationTargetException\
  \ e) {\nSystem.out.println(e.getMessage());\n}\n}\n}\n清单 3-12.\n使用反射在对象引用上调用方法\n\
  ```\n\n```\nPerson: id=-1, name=Unknown\nPerson: id=-1, name=Ann\n```\n\n\n\n##\
  \ 访问字段\n\n你可以使用反射来读取或设置对象字段的值。首先，需要获取要操作的字段的引用。要读取字段的值，需要在字段上调用 `getXxx()` 方法，其中\
  \ `Xxx` 是字段的数据类型。例如，要读取一个 `boolean` 字段的值，可以调用 `getBoolean()` 方法；要读取一个 `int` 字段，则调用\
  \ `getInt()` 方法。要设置字段的值，需要调用相应的 `setXxx()` 方法。以下是 `getInt()` 和 `setInt()` 方法的声明，其中第一个参数\
  \ `obj` 是正在被读取或写入字段的对象引用：\n\n*   `int getInt(Object obj) throws IllegalArgumentException,\
  \ IllegalAccessException`\n*   `void setInt(Object obj, int newValue) throws IllegalArgumentException,\
  \ IllegalAccessException`\n\n提示\n\n静态字段和实例字段的访问方式相同。对于静态字段，`get()` 和 `set()` 方法的第一个参数是类/接口的引用。\n\
  \n请注意，你只能访问那些被声明为可访问的字段，例如公共字段。在 `Person` 类中，所有字段都被声明为私有。因此，你不能使用常规的 Java 编程语言规则来访问这些字段。要访问通常不可访问的字段（例如，如果它被声明为\
  \ `private`），请参考本章后面的“深度反射”部分。你将使用清单 3-13 中列出的 `PublicPerson` 类来学习访问字段的技术。\n\n```\n\
  // PublicPerson.java\npackage com.jdojo.reflection;\npublic class PublicPerson {\n\
  private int id = -1;\npublic String name = \"Unknown\";\npublic PublicPerson() {\n\
  }\n@Override\npublic String toString() {\nreturn \"Person: id=\" + this.id + \"\
  , name=\" + this.name;\n}\n}\n清单 3-13.\n一个具有公共名称字段的 PublicPerson 类\n```\n\n清单 3-14\
  \ 演示了如何获取对象字段的引用以及如何读取和设置其值。\n\n```\n// FieldAccessTest.java\npackage com.jdojo.reflection;\n\
  import java.lang.reflect.Field;\npublic class FieldAccessTest {\npublic static void\
  \ main(String[] args) {\nClass ppClass = PublicPerson.class;\ntry {\n// 创建一个 PublicPerson\
  \ 类的对象\nPublicPerson p = ppClass.newInstance();\n// 获取 name 字段的引用\nField name =\
  \ ppClass.getField(\"name\");\n// 获取并打印 name 字段的当前值\nString nameValue = (String)\
  \ name.get(p);\nSystem.out.println(\"Current name is \" + nameValue);\n// 将 name\
  \ 的值设置为 Ann\nname.set(p, \"Ann\");\n// 获取并打印 name 字段的新值\nnameValue = (String) name.get(p);\n\
  System.out.println(\"New name is \" + nameValue);\n} catch (InstantiationException\
  \ | IllegalAccessException\n| NoSuchFieldException | SecurityException\n| IllegalArgumentException\
  \ e) {\nSystem.out.println(e.getMessage());\n}\n}\n}\n清单 3-14.\n使用反射访问字段\n```\n\n\
  ```\nCurrent name is Unknown\nNew name is Ann\n```\n\n## 深度反射\n\n使用反射可以完成两件事：\n\n\
  *   描述一个实体\n*   访问实体的成员\n\n描述一个实体意味着了解该实体的详细信息。例如，描述一个类意味着知道它的名称、修饰符、包、模块、字段、方法和构造器。访问实体的成员意味着读写字段以及调用方法和构造器。描述实体不会带来任何访问控制问题。如果你有权访问一个类文件，就应该能够了解该类文件所代表的实体的详细信息。然而，访问实体的成员受到\
  \ Java 语言访问控制的约束。例如，如果你将一个类的字段声明为私有，则该字段只能在该类内部访问。类外部的代码不应该能够访问该类的私有字段。然而，这只说对了一半。当你静态访问成员时，会应用\
  \ Java 语言访问控制规则。当你使用反射访问成员时，可以抑制这些访问控制规则。以下代码片段访问了 `Person` 类的私有 `name` 字段。这段代码只能在\
  \ `Person` 类内部编译：\n\n```\nPerson john = new Person();\nString name = john.name;\
  \ // 静态访问私有字段 name\n```\n\nJava 一直允许使用反射在类外部访问那些相当不可访问的成员，例如类的私有字段。这被称为**深度反射**。对不可访问成员的反射访问使得在\
  \ Java 中拥有许多优秀的框架成为可能，例如 Hibernate 和 Spring。这些框架大部分工作都是通过深度反射完成的。你可以使用深度反射在 `Person`\
  \ 类外部访问 `Person` 类的私有 `name` 字段。\n\n到目前为止，在本章中，我保持了示例的简单性，并避免违反 Java 语言访问控制。我只访问了公共字段、方法和构造器；被访问的成员和访问代码位于同一个模块中。在\
  \ JDK9 之前，访问不可访问的成员很容易。你所要做的就是在访问不可访问的 `Field`、`Method` 和 `Constructor` 对象之前，调用它们的\
  \ `setAccessible(true)` 方法。JDK9 中引入的模块系统使得深度反射变得稍微复杂一些。在本节及其子节中，我将带你了解 JDK9 中深度反射的规则和示例。\n\
  \n提示\n\n如果存在安全管理器，执行深度反射的代码必须具有 `ReflectPermission(\"suppressAccessChecks\")` 权限。\n\
  \n要执行深度反射，你需要使用 `Class` 对象的 `getDeclaredXxx()` 方法获取所需字段、方法和构造器的引用，其中 `Xxx` 可以是 `Field`、`Method`\
  \ 或 `Constructor`……请注意，使用 `getXxx()` 方法获取不可访问字段、方法或构造器的引用会抛出 `IllegalAccessException`。`Field`、`Method`\
  \ 和 `Constructor` 类都以 `AccessibleObject` 类作为其超类。`AccessibleObject` 类包含以下方法，让你能够处理\
  \ `accessible` 标志：\n\n*   `void setAccessible(boolean flag)`\n*   `static void setAccessible(AccessibleObject[]\
  \ array,  boolean flag)`\n*   `boolean trySetAccessible()`\n*   `boolean canAccess(Object\
  \ obj)`\n\n`setAccessible(boolean flag)` 方法将成员（`Field`、`Method` 和 `Constructor`）的\
  \ `accessible` 标志设置为 `true` 或 `false`。如果你试图访问一个不可访问的成员，需要在访问该成员之前，在该成员对象上调用 `setAccessible(true)`。如果无法设置\
  \ `accessible` 标志，该方法会抛出 `InaccessibleObjectException`。静态方法 `setAccessible(AccessibleObject[]\
  \ array,  boolean flag)` 是一个便捷方法，用于设置指定数组中所有 `AccessibleObject` 的 accessible 标志。\n\
  \nJDK9 添加了 `trySetAccessible()` 方法，该方法尝试在其调用的对象上将 `accessible` 标志设置为 `true`。如果 `accessible`\
  \ 标志被成功设置为 `true`，则返回 `true`，否则返回 `false`。将此方法与 `setAccessible(true)` 方法进行比较。此方法在失败时不会抛出运行时异常，而\
  \ `setAccessible(true)` 会。\n\nJDK9 添加了 `canAccess(Object obj)` 方法，如果调用者能够访问指定 `obj`\
  \ 对象的成员，则返回 `true`。否则，返回 `false`。如果成员是静态成员或构造器，则 `obj` 必须为 `null`。\n\n我将在接下来的章节中讨论在模块内、跨模块、在未命名模块中以及访问\
  \ JDK 模块中那些相当不可访问的成员。\n\n\n\n### 模块内的深度反射\n\n我们先从一个例子开始。假设你想访问 `Person` 对象的私有 `name`\
  \ 字段。首先，你获取 `name` 字段在 `Field` 对象中的引用，并尝试读取其当前值。清单 3-15 包含了 `IllegalAccess1` 类的代码。\n\
  \n```\n// IllegalAccess1.java\npackage com.jdojo.reflection;\nimport java.lang.reflect.Constructor;\n\
  import java.lang.reflect.Field;\npublic class IllegalAccess1 {\npublic static void\
  \ main(String[] args) throws Exception {\n// 获取 Person 类的类引用\nString className =\
  \ \"com.jdojo.reflection.Person\";\nClass cls = Class.forName(className);\n// 创建一个\
  \ Person 对象\nConstructor cons = cls.getConstructor();\nObject person = cons.newInstance();\n\
  // 获取 name 字段的引用\nField nameField = cls.getDeclaredField(\"name\");\n// 尝试通过读取其值来访问\
  \ name 字段\nString name = (String) nameField.get(person);\n// 分别打印 person 对象及其 name\n\
  System.out.println(person);\nSystem.out.println(\"name=\" + name);\n}\n}\n清单 3-15.\n\
  访问 Person 类的私有 name 字段\n```\n\n```\nException in thread \"main\" java.lang.IllegalAccessException:\
  \ class com.jdojo.reflection.IllegalAccess1 (in module jdojo.reflection) cannot\
  \ access a member of class com.jdojo.reflection.Person (in module jdojo.reflection)\
  \ with modifiers \"private\"\nat java.base/jdk.internal.reflect.Reflection.newIllegalAccessException(Reflection.java:361)\n\
  at java.base/java.lang.reflect.AccessibleObject.checkAccess(AccessibleObject.java:589)\n\
  at java.base/java.lang.reflect.Field.checkAccess(Field.java:1075)\nat java.base/java.lang.reflect.Field.get(Field.java:416)\n\
  at jdojo.reflection/com.jdojo.reflection.IllegalAccess1.main(IllegalAccess1.java:21)\n\
  ```\n\n在清单 3-15 中，我将 `Exception` 类添加到了 `main()` 方法的 `throws` 子句中，以保持方法内部逻辑的简洁。在本节的所有示例中，我都会这样做，以便你能专注于非法访问规则，而不是异常处理。`IllegalAccess1`\
  \ 类和 `Person` 类位于同一个 `jdojo.reflection` 模块中。你能够成功创建 `Person` 对象，是因为你使用了 `Person`\
  \ 类的公共无参构造器。`Person` 类中的 `name` 字段被声明为私有，因此从另一个类访问它失败了。修复这个错误很简单——你可以使用 `setAccessible(true)`\
  \ 或 `trySetAccessible()` 方法将 `Field` 对象的 accessible 标志设置为 `true`。清单 3-16 包含了完整的代码。\n\
  \n```\n// IllegalAccess1.java\npackage com.jdojo.reflection;\nimport java.lang.reflect.Constructor;\n\
  import java.lang.reflect.Field;\npublic class IllegalAccess2 {\npublic static void\
  \ main(String[] args) throws Exception {\n// 获取 Person 类的类引用\nString className =\
  \ \"com.jdojo.reflection.Person\";\nClass cls = Class.forName(className);\n// 创建一个\
  \ Person 对象\nConstructor cons = cls.getConstructor();\nObject person = cons.newInstance();\n\
  // 获取 name 字段的引用\nField nameField = cls.getDeclaredField(\"name\");\n// 在访问之前尝试使\
  \ name 字段可访问\nboolean accessEnabled = nameField.trySetAccessible();\nif (accessEnabled)\
  \ {\n// 尝试通过读取其值来访问 name 字段\nString name = (String) nameField.get(person);\n// 分别打印\
  \ person 对象及其 name\nSystem.out.println(person);\nSystem.out.println(\"name=\" +\
  \ name);\n} else {\nSystem.out.println(\"Person.name 字段不可访问。\");\n}\n}\n}\n清单 3-16.\n\
  在使 Person 类的私有 name 字段可访问后访问它\n```\n\n```\nPerson: id=-1, name=Unknown\nname=Unknown\n\
  ```\n\n到目前为止，一切看起来都正常。你可能会想，如果你无法访问一个类的私有成员，你总是可以使用反射来访问它们。然而，这并不总是正确的。对类中原本不可访问成员的访问是通过\
  \ Java 安全管理器来处理的。默认情况下，当你在自己的计算机上运行应用程序时，你的应用程序并没有安装安全管理器。应用程序缺少安全管理器，使得你在将 accessible\
  \ 标志设置为 `true` 后（就像你在上一个示例中所做的那样），可以访问同一模块中一个类的所有字段、方法和构造器。但是，如果你的应用程序安装了安全管理器，你是否能访问一个不可访问的类成员，则取决于你的应用程序被授予了访问此类成员的权限。你可以通过以下代码片段来检查你的应用程序是否安装了安全管理器：\n\
  \n```\nSecurityManager smgr = System.getSecurityManager();\nif (smgr == null) {\n\
  System.out.println(\"安全管理器未安装。\");\n}\n```\n\n你可以在运行 Java 应用程序时，在命令行中传递 `-Djava.security.manager`\
  \ 选项来安装一个默认的安全管理器。安全管理器使用 Java 安全策略文件来强制执行该策略文件中指定的规则。Java 安全策略文件通过 `-Djava.security.policy`\
  \ 命令行选项来指定。如果你想在启用了 Java 安全管理器的情况下运行 `IllegalAccess2` 类，并且 Java 策略文件存储在 `C:\\Java9LanguageFetaures\\\
  conf\\myjava.policy` 文件中，你可以使用以下命令：\n\n```\nC:\\Java9LanguageFeatures>java -Djava.security.manager\n\
  -Djava.security.policy=conf\\myjava.policy --module-path build\\modules\\jdojo.reflection\n\
  --module jdojo.reflection/com.jdojo.reflection.IllegalAccess2\n```\n\n```\nException\
  \ in thread \"main\" java.security.AccessControlException: access denied (\"java.lang.reflect.ReflectPermission\"\
  \ \"suppressAccessChecks\")\nat java.base/java.security.AccessControlContext.checkPermission(AccessControlContext.java:472)\n\
  at java.base/java.security.AccessController.checkPermission(AccessController.java:895)\n\
  at java.base/java.lang.SecurityManager.checkPermission(SecurityManager.java:558)\n\
  at java.base/java.lang.reflect.AccessibleObject.checkPermission(AccessibleObject.java:85)\n\
  at java.base/java.lang.reflect.AccessibleObject.trySetAccessible(AccessibleObject.java:245)\n\
  at jdojo.reflection/com.jdojo.reflection.IllegalAccess2.main(IllegalAccess2.java:26)\n\
  ```\n\n运行此命令时，`myjava.policy` 文件是空的，这意味着应用程序没有权限来抑制 Java 语言访问控制。\n\n如果你希望允许你的程序使用反射访问一个类的不可访问字段，`myjava.policy`\
  \ 文件的内容应如清单 3-17 所示。\n\n```\ngrant {\n// 授予所有程序访问不可访问成员的权限\npermission java.lang.reflect.ReflectPermission\
  \ \"suppressAccessChecks\";\n};\n清单 3-17.\nconf\\myjava.policy 文件的内容\n```\n\n让我们在启用了安全管理器和清单\
  \ 3-17 所示的 Java 策略的情况下，重新运行 `IllegalAccess2` 类：\n\n```\nC:\\Java9LanguageFeatures>java\
  \ -Djava.security.manager\n-Djava.security.policy=conf\\myjava.policy\n--module-path\
  \ build\\modules\\jdojo.reflection\n--module jdojo.reflection/com.jdojo.reflection.IllegalAccess2\n\
  ```\n\n```\nPerson: id=-1, name=Unknown\nname=Unknown\n```\n\n这一次，当你授予了适当的安全权限后，你成功访问了\
  \ `Person` 类的私有 `name` 字段。关于访问不可访问成员的规则才刚刚开始。你已经了解了在同一个模块内，当进行非法访问的代码和被非法访问的代码位于同一模块时，深度反射的规则。下一节将描述跨模块的非法访问行为。\n\
  \n\n\n### 跨模块深度反射\n\n让我们创建一个名为 `jdojo.reflection.model` 的新模块，如清单 3-18 所示，并在其中创建一个名为\
  \ `Phone` 的简单类，如清单 3-19 所示。该模块声明中不包含任何模块语句。`Phone` 类包含一个 `number` 实例变量、两个构造方法，以及\
  \ `number` 实例变量的 getter 和 setter 方法。`toString()` 方法返回电话号码。\n\n```\n// module-info.java\n\
  module jdojo.reflection.model {\n// 目前没有模块语句\n}\n清单 3-18.\njdojo.reflection.model\
  \ 模块的声明\n```\n\n```\n// Phone.java\npackage com.jdojo.reflection.model;\npublic\
  \ class Phone {\nprivate String number = \"9999999999\";\npublic Phone() {\n}\n\
  public Phone(String number) {\nthis.number = number;\n}\npublic String getNumber()\
  \ {\nreturn number;\n}\npublic void setNumber(String number) {\nthis.number = number;\n\
  }\n@Override\npublic String toString() {\nreturn this.number;\n}\n}\n清单 3-19.\n\
  Phone 类\n```\n\n让我们在 `jdojo.reflection` 模块中创建一个名为 `IllegalAccess3` 的类。该类将尝试在 `jdojo.reflection.model`\
  \ 模块中创建 `Phone` 类的对象，并读取该对象的私有字段 `number`。清单 3-20 中的 `IllegalAccess3` 类包含了完整的代码。它与\
  \ `IllegalAccess2` 类非常相似。唯一的区别在于，你正在跨模块边界访问 `Phone` 类及其私有实例变量。\n\n```\n// IllegalAccess1.java\n\
  package com.jdojo.reflection;\nimport java.lang.reflect.Constructor;\nimport java.lang.reflect.Field;\n\
  public class IllegalAccess3 {\npublic static void main(String[] args) throws Exception\
  \ {\n// 获取 Phone 类的类引用\nString className = \"com.jdojo.reflection.model.Phone\"\
  ;\nClass cls = Class.forName(className);\n// 创建一个 Phone 对象\nConstructor cons = cls.getConstructor();\n\
  Object phone = cons.newInstance();\n// 获取 number 字段的引用\nField numberField = cls.getDeclaredField(\"\
  number\");\n// 尝试在访问前使 number 字段可访问\nboolean accessEnabled = numberField.trySetAccessible();\n\
  if (accessEnabled) {\n// 尝试通过读取其值来访问 number 字段\nString number = (String) numberField.get(phone);\n\
  // 打印电话号码\nSystem.out.println(\"number=\" + number);\n} else {\nSystem.out.println(\"\
  Phone.number 字段不可访问。\");\n}\n}\n}\n清单 3-20.\n访问 Phone 类的私有 number 字段\n```\n\n让我们使用以下命令运行\
  \ `IllegalAccess3` 类：\n\n```\nC:\\Java9LanguageFeatures>java\n--module-path build\\\
  modules\\jdojo.reflection;build\\modules\\jdojo.reflection.model\n--module jdojo.reflection/com.jdojo.reflection.IllegalAccess3\n\
  ```\n\n```\nException in thread \"main\" java.lang.ClassNotFoundException: com.jdojo.reflection.model.Phone\n\
  at java.base/jdk.internal.loader.BuiltinClassLoader.loadClass(BuiltinClassLoader.java:582)\n\
  at java.base/jdk.internal.loader.ClassLoaders$AppClassLoader.loadClass(ClassLoaders.java:185)\n\
  at java.base/java.lang.ClassLoader.loadClass(ClassLoader.java:496)\nat java.base/java.lang.Class.forName0(Native\
