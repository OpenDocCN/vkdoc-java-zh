  \n我在前面的章节中详细讨论了如何使用基于字节的输入/输出类。你会发现读取器/写入器类别中的类与输入/输出类别中的类相似。它们也基于装饰器模式。\n\n在读取器类层次结构中，`BufferedReader`（一个具体的装饰器）直接继承自\
