  \n处理任务执行中的未捕获异常\n\n当任务执行过程中发生未捕获异常时会发生什么？执行器框架会很好地为你处理此类未捕获异常的发生。如果你使用`Executor`的`execute()`方法执行一个`Runnable`任务，任何未捕获的运行时异常都会终止任务执行，并且异常堆栈跟踪会打印在控制台上，如清单\
  \ 6-55 的输出所示。\n\n```\n// BadRunnableTask.java\npackage com.jdojo.threads;\nimport\
  \ java.util.concurrent.ExecutorService;\nimport java.util.concurrent.Executors;\n\
  public class BadRunnableTask {\npublic static void main(String[] args) {\nRunnable\
  \ badTask = () -> {\nthrow new RuntimeException(\"The task threw an exception...\"\
  );\n};\nExecutorService exec = Executors.newSingleThreadExecutor();\nexec.execute(badTask);\n\
  exec.shutdown();\n}\n}\nException in thread \"pool-1-thread-1\" java.lang.RuntimeException:\
  \ The task threw an exception...\nat jdojo.threads/com.jdojo.threads.BadRunnableTask.lambda$main$0(BadRunnableTask.java:10)\n\
  at java.base/java.util.concurrent.ThreadPoolExecutor.runWorker(ThreadPoolExecutor.java:1167)\n\
  at java.base/java.util.concurrent.ThreadPoolExecutor$Worker.run(ThreadPoolExecutor.java:641)\n\
  at java.base/java.lang.Thread.run(Thread.java:844)\n清单 6-55.\n从执行器的 execute() 方法打印运行时堆栈跟踪\n\
  ```\n\n如果你使用`ExecutorService`的`submit()`方法提交任务，执行器框架会处理异常，并在你使用`get()`方法获取任务执行结果时向你指示该异常。`Future`实例的`get()`方法会抛出`ExecutionException`，并将实际异常包装为其原因。清单\
  \ 6-56 说明了此类示例。即使你提交的是`Runnable`任务，也可以使用`Future`实例的`get()`方法。任务成功执行后，`get()`方法将返回`null`。如果在任务执行期间抛出了未捕获异常，则会抛出`ExecutionException`。\n\
  \n\n\n```\n// BadCallableTask.java\npackage com.jdojo.threads;\nimport java.util.concurrent.ExecutorService;\n\
  import java.util.concurrent.Executors;\nimport java.util.concurrent.Callable;\n\
  import java.util.concurrent.Future;\nimport java.util.concurrent.ExecutionException;\n\
  public class BadCallableTask {\npublic static void main(String[] args) {\nCallable\
  \ badTask = () -> {\nthrow new RuntimeException(\"任务抛出了一个异常...\");\n};\n// 创建一个执行器服务\n\
  ExecutorService exec = Executors.newSingleThreadExecutor();\n// 提交一个任务\nFuture submittedTask\
  \ = exec.submit(badTask);\ntry {\n// get 方法应抛出 ExecutionException\nObject result\
  \ = submittedTask.get();\n} catch (ExecutionException e) {\nSystem.out.println(\"\
  发生了执行异常: \"\n+ e.getMessage());\nSystem.out.println(\"执行异常的原因为: \"\n+ e.getCause().getMessage());\n\
  } catch (InterruptedException e) {\ne.printStackTrace();\n}\nexec.shutdown();\n\
  }\n}\n执行异常已发生: java.lang.RuntimeException: 任务抛出了一个异常...\n执行异常的原因为: 任务抛出了一个异常...\n\
  清单 6-56.\nFuture 的 get() 方法抛出 ExecutionException，将任务执行中抛出的实际异常包装为其原因\n```\n\n执行器的完成服务\n\
  \n在前面的章节中，我解释了如何使用 `Future` 对象获取任务执行的结果。要获取已提交任务的结果，你必须保留执行器返回的 `Future` 对象的引用，如清单\
  \ 6-52 所示。然而，如果你有多个任务已提交给执行器，并且希望在有结果可用时立即获知，则需要使用执行器的完成服务。它由 `CompletionService<V>`\
  \ 接口的一个实例表示。该接口结合了一个执行器和一个阻塞队列，用于保存已完成任务的引用。`ExecutorCompletionService<V>` 类是 `CompletionService<V>`\
  \ 接口的一个具体实现。以下是使用步骤：\n\n1.  创建一个执行器对象。\n\n```\n    ExecutorService exec = Executors.newScheduledThreadPool(3);\n\
  \    ```\n\n2.  创建一个 `ExecutorCompletionService` 类的对象，并将上一步创建的执行器传递给其构造函数。\n\n```\n\
  \    ExecutorCompletionService CompletionService = new ExecutorCompletionService(exec);\n\
  \    ```\n\n执行器完成服务在内部使用一个阻塞队列来保存已完成的任务。你也可以使用自己的阻塞队列来保存已完成的任务。\n\n3.  完成服务的 `take()`\
  \ 方法返回一个已完成任务的引用。如果没有已完成的任务，它会阻塞。如果你不想等待（当没有已完成任务时），可以使用 `poll()` 方法，如果队列中没有已完成的任务，该方法会返回\
  \ `null`。这两个方法在找到已完成任务时都会将其从队列中移除。\n\n清单 6-57、清单 6-58 和清单 6-59 说明了完成服务的用法。`TaskResult`\
  \ 类的一个实例代表一个任务的结果。之所以需要一个像 `TaskResult` 这样的自定义对象来表示任务的结果，是因为完成服务只告诉你某个任务已完成，你可以获取其结果，但它不会告诉你哪个任务完成了。为了识别已完成的任务，你需要在任务结果中标识该任务。你的\
  \ `SleepingTask` 通过在其 `call()` 方法中嵌入任务 ID 和任务的总休眠时间，返回一个 `TaskResult`。\n\n```\n\
  // TaskResult.java\npackage com.jdojo.threads;\npublic class TaskResult {\nprivate\
  \ final int taskId;\nprivate final int result;\npublic TaskResult(int taskId, int\
  \ result) {\nthis.taskId = taskId;\nthis.result = result;\n}\npublic int getTaskId()\
  \ {\nreturn taskId;\n}\npublic int getResult() {\nreturn result;\n}\n@Override\n\
  public String toString() {\nreturn \"任务名称: 任务 #\" + taskId + \", 任务结果:\" + result\
  \ + \" 秒\";\n}\n}\n清单 6-57.\n一个表示任务结果的类\n```\n\n```\n// SleepingTask.java\npackage\
  \ com.jdojo.threads;\nimport java.util.Random;\nimport java.util.concurrent.Callable;\n\
  public class SleepingTask implements Callable {\nprivate int taskId;\nprivate int\
  \ loopCounter;\nprivate Random random = new Random();\npublic SleepingTask(int taskId,\
  \ int loopCounter) {\nthis.taskId = taskId;\nthis.loopCounter = loopCounter;\n}\n\
  @Override\npublic TaskResult call() throws InterruptedException {\nint totalSleepTime\
  \ = 0;\nfor (int i = 1; i <= loopCounter; i++) {\ntry {\nint sleepTime = random.nextInt(10)\
  \ + 1;\nSystem.out.println(\"任务 #\" + this.taskId + \" - 迭代 #\" + i\n+ \" 将休眠 \"\
