  Lo\nKen\nEllen\n```\n\nNavigable Set（可导航集合）\n\n可导航集合是一种特殊的有序集合，它允许你以多种方式操作其子集。`NavigableSet<E>`\
  \ 接口的实例代表一个可导航集合。`NavigableSet` 接口继承自 `SortedSet` 接口，并定义了一些额外的方法来扩展 `SortedSet`\
  \ 提供的功能。它通过以下方式扩展了 `SortedSet`：\n\n*   它允许你以逆序遍历集合。逆序是指与 `SortedSet` 正常排序顺序相反的顺序。它的\
  \ `descendingSet()` 方法返回一个 `NavigableSet`，这是同一个 `NavigableSet` 的逆序视图。如果你修改了原始的 `NavigableSet`\
  \ 或 `descendingSet()` 方法返回的集合，修改会同时反映在两个集合中。\n\n*   它为 `SortedSet` 中的三个方法 `headSet()`、`tailSet()`\
  \ 和 `subSet()` 增加了另一个版本，这些版本接受一个 `boolean` 标志，用于决定是否包含子集边界开始或结束处的元素。\n\n`NavigableSet`\
  \ 接口提供了四个方法——`lower()`、`floor()`、`higher()` 和 `ceiling()`——用于根据搜索条件查找元素。`lower()`\
  \ 方法返回 `NavigableSet` 中小于指定元素的最大元素。`floor()` 方法与 `lower()` 类似，返回 `NavigableSet`\
  \ 中小于或等于指定元素的最大元素。`higher()` 方法返回 `NavigableSet` 中大于指定元素的最小元素。`ceiling()` 方法与 `higher()`\
  \ 类似，返回 `NavigableSet` 中大于或等于指定元素的最小元素。\n\n它还提供了两个方法 `pollFirst()` 和 `pollLast()`，分别用于检索并移除\
  \ `NavigableSet` 的第一个和最后一个元素。如果 `NavigableSet` 为空，它们返回 `null`。\n\n`TreeSet<E>` 类是\
  \ `NavigableSet<E>` 接口的实现类之一。由于 `NavigableSet` 同时也是 `SortedSet`，而 `SortedSet` 也是\
  \ `Set`，因此你可以将 `TreeSet` 的对象用作集合、有序集合和可导航集合。如果你不需要集合中元素的排序，最好使用 `HashSet` 而不是 `TreeSet`。\n\
  \n清单 12-12 演示了如何使用可导航集合。它使用整数作为 `NavigableSet` 的元素，因为当执行 `higher()` 和 `lower()`\
  \ 等方法时，数字似乎更直观。输出展示了 `NavigableSet` 如何对其元素执行所有操作。\n\n\n\n```\n// NavigableSetTest.java\n\
  package com.jdojo.collections;\nimport java.util.TreeSet;\nimport java.util.NavigableSet;\n\
  public class NavigableSetTest {\npublic static void main(String[] args) {\n// 创建一个可导航集合，并添加一些整数\n\
  NavigableSet ns = new TreeSet();\nns.add(1);\nns.add(2);\nns.add(3);\nns.add(4);\n\
  ns.add(5);\n// 获取可导航集合的逆序视图\nNavigableSet reverseNs = ns.descendingSet();\n// 打印正常视图和逆序视图\n\
  System.out.println(\"集合的正常视图: \" + ns);\nSystem.out.println(\"集合的逆序视图: \" + reverseNs);\n\
  // 获取并打印可导航集合的子集\nSystem.out.println(\"\\n 获取集合的子集\");\nNavigableSet threeOrMore\
  \ = ns.tailSet(3, true);\nSystem.out.println(\"大于等于 3 的元素: \" + threeOrMore);\n\
  // 在可导航集合中搜索\nSystem.out.println(\"\\n 在集合中搜索\");\nSystem.out.println(\"lower(3):\
  \ \" + ns.lower(3));\nSystem.out.println(\"floor(3): \" + ns.floor(3));\nSystem.out.println(\"\
  higher(3): \" + ns.higher(3));\nSystem.out.println(\"ceiling(3): \" + ns.ceiling(3));\n\
  // 从可导航集合中轮询元素\nSystem.out.println(\"\\n 从集合中轮询元素\");\n// 逐个轮询元素并查看集合\nSystem.out.println(\"\
  pollFirst(): \" + ns.pollFirst());\nSystem.out.println(\"可导航集合: \" + ns);\nSystem.out.println(\"\
  pollLast(): \" + ns.pollLast());\nSystem.out.println(\"可导航集合: \" + ns);\nSystem.out.println(\"\
  pollFirst(): \" + ns.pollFirst());\nSystem.out.println(\"可导航集合: \" + ns);\nSystem.out.println(\"\
  pollFirst(): \" + ns.pollFirst());\nSystem.out.println(\"可导航集合: \" + ns);\nSystem.out.println(\"\
  pollFirst(): \" + ns.pollFirst());\nSystem.out.println(\"可导航集合: \" + ns);\n// 由于集合为空，轮询将返回\
  \ null\nSystem.out.println(\"pollFirst(): \" + ns.pollFirst());\nSystem.out.println(\"\
  pollLast(): \" + ns.pollLast());\n}\n}\n清单 12-12.\n使用 NavigableSet 获取集合的子集\n```\n\
  \n```\n集合的正常视图: [1, 2, 3, 4, 5]\n集合的逆序视图: [5, 4, 3, 2, 1]\n获取集合的子集\n大于等于 3 的元素:\
  \ [3, 4, 5]\n在集合中搜索\nlower(3): 2\nfloor(3): 3\nhigher(3): 4\nceiling(3): 3\n从集合中轮询元素\n\
  pollFirst(): 1\n可导航集合: [2, 3, 4, 5]\npollLast(): 5\n可导航集合: [2, 3, 4]\npollFirst():\
  \ 2\n可导航集合: [3, 4]\npollFirst(): 3\n可导航集合: [4]\npollFirst(): 4\n可导航集合: []\npollFirst():\
  \ null\npollLast(): null\n```\n\n处理列表\n\n**列表** 是一个有序的对象集合。有时列表也被称为**序列**。`List<E>`\
  \ 接口的实例在集合框架中代表一个列表。列表可以包含重复元素。你也可以在列表中存储多个 `null` 值。\n\n`List` 接口继承自 `Collection`\
  \ 接口。它添加了使用索引访问 `List` 元素的方法。它还允许你将元素添加到 `List` 的末尾，或添加到由整数**索引**标识的任意位置。`List`\
  \ 中元素的索引是从零开始的。也就是说，`List` 的第一个元素索引为 0，第二个元素索引为 1，依此类推。图 12-3 展示了一个包含四个元素及其索引的 `List`。\n\
  \n![A323070_2_En_12_Fig3_HTML.gif](img/A323070_2_En_12_Fig3_HTML.gif)\n\n图 12-3.\n\
  \n包含四个元素的列表的**示意图**\n\n与通用集合相比，`List` 提供了以下额外功能：\n\n*   它提供使用**索引**对其元素的访问。你可以使用其\
  \ `add(int index, E element)`、`addAll(int index, Collection<? extends E> c)`、`get(int\
  \ index)`、`remove(int index)` 和 `set(int index, E element)` 方法，通过索引来添加、获取、移除和替换元素。\n\
  \n*   你可以使用 `indexOf(Object o)` 或 `lastIndexOf(Object o)` 方法搜索元素在 `List` 中的位置。`indexOf()`\
  \ 方法从 `List` 的开头搜索指定对象，并返回该对象首次出现的索引。`lastIndexOf()` 方法从列表末尾开始执行相同操作。如果 `List` 不包含指定对象，则两个方法都返回\
  \ -1。\n\n*   它提供了一个名为 `subList(int fromIndex, int toIndex)` 的方法，该方法返回原始列表的一个子列表，范围从索引\
  \ `fromIndex`（包含）到索引 `toIndex`（不包含）。该子列表是原始列表的另一个视图。\n\n*   它为其元素提供了一个专门的迭代器，该迭代器是\
  \ `ListIterator<E>` 接口的实例。此迭代器允许你同时沿两个方向（向前和向后）遍历其元素。你可以使用 `listIterator()` 方法获取\
  \ `List` 的 `ListIterator`。请注意，从 `Collection` 接口的 `iterator()` 方法返回的 `Iterator` 仅返回一个前向迭代器。\n\
  \n以下是 `List` 接口的众多实现类中的两个：\n\n*   `ArrayList<E>`\n\n*   `LinkedList<E>`\n\n`ArrayList`\
  \ 由数组支持。`LinkedList` 由链表支持。如果你频繁访问（获取和设置）列表元素，`ArrayList` 性能更好。在 `ArrayList` 中访问元素更快，因为元素的索引就是支持数组的索引，而从数组中访问元素总是很快的。从由\
  \ `ArrayList` 支持的列表中添加或移除元素（除非在末尾操作）性能较慢，因为 `ArrayList` 必须在内部执行数组复制以保持元素顺序。与 `ArrayList`\
  \ 相比，`LinkedList` 在列表中间添加和移除元素时性能更好。然而，它在访问列表元素时较慢，除非是在列表头部。\n\n你可以按如下方式创建列表并向其中添加一些元素：\n\
  \n```\n// 创建一个字符串列表\nList nameList = new ArrayList();\nnameList.add(\"John\"); \
  \   // 在索引 0 处添加 John\nnameList.add(\"Richard\"); // 在索引 1 处添加 Richard\n```\n\n\
  `List` 接口的 `add(E element)` 方法将元素追加到 `List` 的末尾。`List` 的 `remove(Object o)` 方法从列表开头移除该元素的首次出现。\n\
  \n你还可以使用位置索引向 `List` 添加元素。请注意，用于访问任何元素的索引必须在 0 和 `size` 之间，其中 `size` 是 `List` 的大小。你可以使用\
  \ `add(int index, E element)` 方法将指定的 `element` 插入到指定的 `index` 处。例如，`nameList.add(1,\
  \ \"Sara\")` 将在索引 1 处插入 `\"Sara\"`，即 `List` 中的第二个元素。当你使用索引向 `List` 添加元素时，指定索引处的元素以及指定索引右侧的元素会向右移动，并且它们的索引增加\
  \ 1。假设你有一个如图 12-3 所示的 `List`，并执行以下代码：\n\n```\n// 在索引 1 处添加一个元素\nnameList.add(1,\
  \ \"Sara\");\n```\n\n现在 `List` 将如图 12-4 所示。\n\n![A323070_2_En_12_Fig4_HTML.gif](img/A323070_2_En_12_Fig4_HTML.gif)\n\
  \n图 12-4.\n\n在列表的索引 1 处添加新元素后得到的列表\n\n提示\n\n\n\n`List` 不允许通过使用 `add(int index, E\
  \ element)` 方法在任意索引处插入元素。如果 `List` 为空，你只能使用 0 作为索引来添加第一个元素。如果 `List` 中有五个元素，则必须使用\
  \ 0 到 5 之间的索引来向 `List` 添加新元素。索引 0 到 4 会在现有元素之间插入一个元素。索引 5 会将元素追加到 `List` 的末尾。这意味着\
  \ `List` 必须按顺序增长。你不能拥有稀疏的 `List`，例如一个包含第一个元素和第十个元素，而第二个到第九个元素为空的 `List`。这就是 `List`\
  \ 也被称为序列的原因。\n\nJava 9 在 `List` 接口中添加了一个名为 `of()` 的静态工厂方法。该方法已被重载。它可以接受零个到任意数量的元素。`of()`\
  \ 方法的其中一个版本接受一个可变参数。它会创建一个 `List`，添加所有指定的元素，并返回该 `List` 的引用。以下语句使用 `List` 接口的静态\
  \ `of()` 方法来创建一个 `List` 并用三个元素初始化它：\n\n```\n// 创建一个包含三个名称的不可变 List\nList names =\
  \ List.of(\"John\", \"Donna\", \"Ken\");\n```\n\n以下语句创建一个不可变的空 `List`：\n\n```\n\
  // 创建一个包含三个名称的不可变 List\nList emptyNames = List.of();\n```\n\n提示\n\n`List` 接口的静态\
  \ `of()` 方法会创建一个不可变的 `List`。尝试修改该 `List` 会抛出 `UnsupportedOperationException`。与 `add()`\
  \ 方法不同，如果你向 `List` 添加一个 `null` 元素，`of()` 方法会抛出 `NullPointerException`。`of()` 方法的实现经过了高度优化，是创建包含已知元素的不可变\
  \ `List` 的首选方式。\n\n清单 12-13 演示了如何使用 `List`。它展示了如何使用索引添加、移除和遍历其元素。\n\n```\n// ListTest.java\n\
  package com.jdojo.collections;\nimport java.util.List;\nimport java.util.ArrayList;\n\
  public class ListTest {\npublic static void main(String[] args) {\n// 创建一个 List\
  \ 并添加几个元素\nList list = new ArrayList();\nlist.add(\"John\");\nlist.add(\"Richard\"\
  );\nlist.add(\"Donna\");\nlist.add(\"Ken\");\nSystem.out.println(\"List: \" + list);\n\
  int count = list.size();\nSystem.out.println(\"Size of List: \" + count);\n// 使用索引打印每个元素\n\
  for(int i = 0; i  subList = list.subList(1, 3);\nSystem.out.println(\"Sub List 1(inclusive)\
  \ to 3(exclusive): \" + subList);\n// 从列表中移除 \"Donna\"\nlist.remove(\"Donna\");\
  \ // 等同于 list.remove(2);\nSystem.out.println(\"List after removing Donna: \" + list);\n\
  // 使用静态工厂方法 of() 创建一个 List\nList names = List.of(\"Li\", \"Xi\", \"Bo\", \"Da\"\
  , \"Fa\", \"Bo\");\nSystem.out.println(\"List using List.of() method: \" + names);\n\
  }\n}\n清单 12-13.\n使用 ArrayList 作为其实现来使用 List\n```\n\n```\nList: [John, Richard, Donna,\
  \ Ken]\nSize of List: 4\nlist[0] = John\nlist[1] = Richard\nlist[2] = Donna\nlist[3]\
  \ = Ken\nSub List 1(inclusive) to 3(exclusive): [Richard, Donna]\nList after removing\
  \ Donna: [John, Richard, Ken]\nList using List.of() method: [Li, Xi, Bo, Da, Fa,\
  \ Bo]\n```\n\n`List` 允许你使用由 `ListIterator` 接口实例表示的特化迭代器来遍历其元素。`ListIterator` 接口继承自\
  \ `Iterator` 接口；它添加了几个额外的方法，使你能够从当前位置向后访问列表中的元素。你可以为列表的所有元素或子列表获取一个列表迭代器，如下所示：\n\
  \n```\nList list = new ArrayList();\n// 在此处填充列表...\n// 获取一个完整的列表迭代器\nListIterator\
  \ fullIterator = list.listIterator();\n// 获取一个列表迭代器，它将从索引 5 开始向前迭代。\n// 如果你选择这样做，也可以迭代到小于\
  \ 5 的索引。\nListIterator partialIterator = list.listIterator(5);\n```\n\n`ListIterator`\
  \ 的 `hasPrevious()` 方法在列表迭代器中当前位置之前存在元素时返回 `true`。要获取前一个元素，请使用其 `previous()` 方法。你可以观察到\
  \ `hasPrevious()` 和 `previous()` 方法执行相同的工作，但方向与 `hasNext()` 和 `next()` 方法相反。你还可以使用其\
  \ `nextIndex()` 和 `previousIndex()` 方法获取当前位置的下一个和上一个元素的索引。`ListIterator` 接口还包含在当前位置插入、替换和移除元素的方法。\n\
  \n提示\n\n`ListIterator` 允许你在 `List` 中向前或向后查看。如果你先使用其 `next()` 方法，然后使用 `previous()`\
  \ 方法，迭代器会回到相同的位置。调用 `next()` 方法会使其向前移动一个索引，而调用 `previous()` 方法会使其向后移动一个索引。\n\n清单\
  \ 12-14 演示了如何使用 `ListIterator`。它首先向前方向，然后向后方向遍历 `List` 的元素。你不需要为了向后方向遍历而重新创建 `ListIterator`。\n\
  \n```\n// ListIteratorTest.java\npackage com.jdojo.collections;\nimport java.util.List;\n\
  import java.util.ListIterator;\npublic class ListIteratorTest {\npublic static void\
  \ main(String[] args) {\nList list = List.of(\"John\", \"Richard\", \"Donna\", \"\
  Ken\");\nSystem.out.println(\"List: \" + list);\n// 获取列表迭代器\nListIterator iterator\
  \ = list.listIterator();\nSystem.out.println();\nSystem.out.println(\"List Iterator\
  \ in the forward direction:\");\nwhile (iterator.hasNext()) {\nint index = iterator.nextIndex();\n\
  String element = iterator.next();\nSystem.out.printf(\"list[%d] = %s%n\", index,\
  \ element);\n}\nSystem.out.println(\"\\nList Iterator in the backward direction:\"\
  );\n// 重用迭代器以从末尾迭代到开头\nwhile (iterator.hasPrevious()) {\nint index = iterator.previousIndex();\n\
  String element = iterator.previous();\nSystem.out.printf(\"list[%d] = %s%n\", index,\
  \ element);\n}\n}\n}\n清单 12-14.\n在列表中向前和向后方向遍历元素\n```\n\n```\nList: [John, Richard,\
  \ Donna, Ken]\nList Iterator in the forward direction:\nlist[0] = John\nlist[1]\
  \ = Richard\nlist[2] = Donna\nlist[3] = Ken\nList Iterator in the backward direction:\n\
  list[3] = Ken\nlist[2] = Donna\nlist[1] = Richard\nlist[0] = John\n```\n\n使用队列\n\
  \n队列是一种基于现实世界队列概念的集合。队列是一个对象集合，对这些对象一次一个地应用某种处理。队列有两个端，称为头部和尾部。在简单队列中，对象被添加到尾部并从头部移除；最先添加的对象将最先被移除。然而，队列可以根据其允许插入和移除元素的方式进行分类。在本节中，我将讨论以下类型的队列：\n\
  \n*   **简单队列** 允许在尾部插入，从头部移除。\n\n*   **优先级队列** 为队列中的每个元素关联一个优先级，并允许从队列中移除具有最高优先级的元素。\n\
  \n*   **延迟队列** 为队列中的每个元素关联一个延迟，并且仅当元素的延迟到期后才允许移除该元素。\n\n*   **双端队列** 允许从头部和尾部插入和移除其元素。\n\
  \n*   **阻塞队列** 在其满时阻塞向其中添加元素的线程，在其空时阻塞从中移除元素的线程。\n\n*   **传输队列** 是一种特殊类型的阻塞队列，其中对象在两个线程（生产者和消费者）之间进行交接。\n\
  \n*   **阻塞双端队列** 是双端队列和阻塞队列的组合。\n\n简单队列\n\n\n\n简单队列通过 `Queue<E>` 接口的实例来表示。通常，你将一组对象保存在队列中，以便对它们逐一进行某种处理。例如，邮局柜台前的顾客队伍就是队列的一个实例。你可以根据多种标准对队列进行分类。\n\
  \n一个队列能容纳多少个元素？有时队列中的元素数量是无限的（至少在理论上是这样），有时则具有预定义的容量。当队列长度无限时，称为**无界队列**。当队列长度预定义时，称为**有界队列**。队列的边界定义了当元素被添加到一个已满的有界队列时的行为。尝试向已满队列添加元素可能会抛出异常；可能会静默失败；可能会无限期（或在预定义时间段内）等待队列腾出空间容纳新元素，等等。具体行为取决于队列的类型。\n\
  \n队列中的下一个元素是哪个？队列始终有一个元素的入口点和一个出口点。出口点称为队列的**头部**，入口点称为**尾部**。头部和尾部可能相同。如果队列的头部和尾部相同，则称为后进先出（`LIFO`）队列。`LIFO`\
  \ 队列也称为栈。队列的头部和尾部可能不同。如果队列遵循先进入队列的元素先离开队列的规则（先到先服务规则），则称为先进先出（`FIFO`）队列。你是否曾有机会在队列中长时间站立，而轮到你时，另一个比你晚到的人却基于优先级在你之前被服务？Java\
  \ 也有这种队列，称为优先级队列。在优先级队列中，你使用 `Comparator` 定义优先级，或在元素类中实现 `Comparable` 接口，队列中下一个要取出的元素根据队列中元素的优先级决定。\n\
  \n提示\n\n通常，`null` 元素在 `Queue` 中没有意义。毕竟，使用队列的目的是对其元素应用某些处理逻辑，或使用元素执行某些逻辑。无论哪种情况，`null`\
  \ 值都没有意义。是否允许 `null` 值由 `Queue` 接口的实现决定。不建议在队列中使用 `null` 元素。如果在队列中使用 `null` 元素，你将无法区分从其方法返回的表示特殊情况的\
  \ `null` 值和元素的 `null` 值。\n\n队列允许你执行三个基本操作：\n\n*   向尾部添加一个元素\n*   从头部移除一个元素\n*  \
  \ 查看头部元素\n\n`Queue` 接口为这三个操作中的每一个都定义了两个方法。如果操作无法执行，一个方法会抛出异常；另一个方法则返回一个值（`false`\
  \ 或 `null`）来表示失败。用于执行特定操作的方法取决于你的需求。`Queue` 接口添加了六个方法以提供 `FIFO` 队列的功能。它们列在表 12-1\
  \ 中。\n\n表 12-1. Queue<E> 接口声明的其他方法\n\n| 类别 | 方法 | 描述 |\n| --- | --- | --- |\n| 向队列添加元素\
  \ | `boolean add(E e)` | 如果可能，向队列添加一个元素并返回 `true`。否则，抛出 `IllegalStateException`。\
  \ |\n| | `boolean offer(E e)` | 向队列添加一个元素，如果无法添加则不抛出异常。失败时返回 `false`，成功时返回 `true`。这是在**有界队列**中添加元素的首选方式。\
  \ |\n| 从队列移除元素 | `E remove()` | 检索并移除队列的头部。如果队列为空，则抛出异常。 |\n| | `E poll()` | 执行与\
  \ `remove()` 方法相同的工作。但是，如果队列为空，则返回 `null` 而不是抛出异常。 |\n| 查看队列头部 | `E element()` |\
  \ 检索队列的头部但不将其从队列中移除。如果队列为空，则抛出异常。 |\n| | `E peek()` | 执行与 `element()` 方法相同的工作。但是，如果队列为空，则返回\
  \ `null` 而不是抛出异常。 |\n\n`LinkedList<E>` 和 `PriorityQueue<E>` 是 `Queue<E>` 接口的两个实现类。请注意，`LinkedList`\
  \ 类也是 `List` 接口的实现类。`LinkedList` 类是一个多用途的集合实现类。本章中我还会多次提到它的名字。\n\n清单 12-15 演示了如何使用\
  \ `LinkedList` 作为 `FIFO` 队列。实际上，代表 `FIFO` 队列的是 `Queue` 接口。`LinkedList` 类的实例可以用作\
  \ `FIFO` 队列或 `LIFO` 队列。\n\n```\n// QueueTest.java\npackage com.jdojo.collections;\n\
  import java.util.Queue;\nimport java.util.LinkedList;\nimport java.util.NoSuchElementException;\n\
  public class QueueTest {\npublic static void main(String[] args) {\nQueue queue\
  \ = new LinkedList();\nqueue.add(\"John\");\n// offer() 的工作方式与 add() 相同\nqueue.offer(\"\
  Richard\");\nqueue.offer(\"Donna\");\nqueue.offer(\"Ken\");\nSystem.out.println(\"\
  Queue: \" + queue);\n// 让我们移除元素直到队列为空\nwhile (queue.peek() != null) {\nSystem.out.println(\"\
  Head Element: \" + queue.peek());\nqueue.remove();\nSystem.out.println(\"Removed\
  \ one element from Queue\");\nSystem.out.println(\"Queue: \" + queue);\n}\n// 现在队列为空。尝试调用\
  \ peek()、\n// element()、poll() 和 remove() 方法\nSystem.out.println(\"queue.isEmpty():\
  \ \" + queue.isEmpty());\nSystem.out.println(\"queue.peek(): \" + queue.peek());\n\
  System.out.println(\"queue.poll(): \" + queue.poll());\ntry {\nString str = queue.element();\n\
  System.out.println(\"queue.element(): \" + str);\n} catch (NoSuchElementException\
  \ e) {\nSystem.out.println(\"queue.element(): Queue is empty.\");\n}\ntry {\nString\
  \ str = queue.remove();\nSystem.out.println(\"queue.remove(): \" + str);\n} catch\
  \ (NoSuchElementException e) {\nSystem.out.println(\"queue.remove(): Queue is empty.\"\
  );\n}\n}\n}\n清单 12-15. 使用 LinkedList 作为实现类来使用 FIFO 队列\n```\n\n```\nQueue: [John,\
  \ Richard, Donna, Ken]\nHead Element: John\nRemoved one element from Queue\nQueue:\
  \ [Richard, Donna, Ken]\nHead Element: Richard\nRemoved one element from Queue\n\
  Queue: [Donna, Ken]\nHead Element: Donna\nRemoved one element from Queue\nQueue:\
  \ [Ken]\nHead Element: Ken\nRemoved one element from Queue\nQueue: []\nqueue.isEmpty():\
  \ true\nqueue.peek(): null\nqueue.poll(): null\nqueue.element(): Queue is empty.\n\
  queue.remove(): Queue is empty.\n```\n\n如何创建一个 `LIFO` 队列？`Stack<E>` 类的实例代表一个 `LIFO`\
  \ 队列。`Stack` 类的设计并不恰当。它继承自 `java.util.Vector` 类。你可以使用 `LinkedList` 类轻松地自行实现一个 `LIFO`\
  \ 队列。我将在下一节讨论 `Deque` 集合接口，你将看到如何将其用作 `LIFO` 队列。你还将开发自己的 `LIFO` 队列。\n\n优先级队列\n\n\
  \n\n优先队列是一种每个元素都关联了优先级的队列。优先级最高的元素会最先从队列中移除。Java 提供了 `PriorityQueue<E>` 作为无界优先队列的实现类。你可以使用队列元素的自然顺序作为其优先级。在这种情况下，队列元素必须实现\
  \ `Comparable` 接口。你也可以提供一个 `Comparator`，它将决定元素的优先级顺序。当你向优先队列添加新元素时，它会根据其优先级被放置在队列中的相应位置。队列中如何决定优先级由你来实现。\n\
  \n让我们开发一个基于元素自然顺序的优先队列。我们将扩展你的 `Person` 类，使其实现 `Comparable` 接口。你将把这个新类命名为 `ComparablePerson`。`ComparablePerson`\
  \ 的优先级将根据两个标准来决定：`id` 和 `name`。如果 `id` 越大，其优先级越低。如果两个人的 `id` 相同，则将根据名字的字母顺序来决定优先级。清单\
  \ 12-16 包含了 `ComparablePerson` 类的代码。\n\n```\n// ComparablePerson.java\npackage com.jdojo.collections;\n\
  public class ComparablePerson extends Person implements Comparable {\npublic ComparablePerson(int\
  \ id, String name) {\nsuper(id, name);\n}\n@Override\npublic int compareTo(ComparablePerson\
  \ cp) {\nint cpId = cp.getId();\nString cpName = cp.getName();\nif (this.getId()\
  \  cpId) {\nreturn 1;\n}\nif (this.getId() == cpId) {\nreturn this.getName().compareTo(cpName);\n\
  }\n// 不应执行到这里\nreturn 0;\n}\n}\n清单 12-16.\n一个 ComparablePerson 类\n```\n\n清单 12-17\
  \ 演示了如何使用优先队列。\n\n```\n// PriorityQueueTest.java\npackage com.jdojo.collections;\n\
  import java.util.Queue;\nimport java.util.PriorityQueue;\npublic class PriorityQueueTest\
  \ {\npublic static void main(String[] args) {\nQueue pq = new PriorityQueue();\n\
  pq.add(new ComparablePerson(1, \"John\"));\npq.add(new ComparablePerson(4, \"Ken\"\
  ));\npq.add(new ComparablePerson(2, \"Richard\"));\npq.add(new ComparablePerson(3,\
  \ \"Donna\"));\npq.add(new ComparablePerson(4, \"Adam\"));\nSystem.out.println(\"\
  优先队列: \" + pq);\nwhile (pq.peek() != null) {\nSystem.out.println(\"头部元素: \" + pq.peek());\n\
  pq.remove();\nSystem.out.println(\"从队列中移除一个元素\");\nSystem.out.println(\"优先队列: \"\
  \ + pq);\n}\n}\n}\n清单 12-17.\n使用优先队列\n```\n\n```\n优先队列: [(1, John), (3, Donna),\
  \ (2, Richard), (4, Ken), (4, Adam)]\n头部元素: (1, John)\n从队列中移除一个元素\n优先队列: [(2, Richard),\
  \ (3, Donna), (4, Adam), (4, Ken)]\n头部元素: (2, Richard)\n从队列中移除一个元素\n优先队列: [(3, Donna),\
  \ (4, Ken), (4, Adam)]\n头部元素: (3, Donna)\n从队列中移除一个元素\n优先队列: [(4, Adam), (4, Ken)]\n\
  头部元素: (4, Adam)\n从队列中移除一个元素\n优先队列: [(4, Ken)]\n头部元素: (4, Ken)\n从队列中移除一个元素\n优先队列:\
  \ []\n```\n\n在输出中你会注意到一个重要现象。当你打印队列时，其元素并非按你预期的方式排序。你可能会期望下一次调用 `peek()` 方法返回的元素位于队列头部。请注意，队列从不用于遍历其元素。相反，它用于从中移除一个元素，处理该元素，然后再移除另一个元素。`PriorityQueue`\
  \ 类不保证在使用迭代器时元素的任何顺序。它的 `toString()` 方法使用其迭代器来提供元素的字符串表示。这就是为什么当我们打印优先队列时，其元素并未按优先级排序。然而，当我们使用\
  \ `peek()` 或 `remove()` 方法时，会基于元素的优先级正确地查看或移除元素。在前面的例子中，使用 `id` 和 `name` 来对元素进行排序。因此，具有最小\
  \ `id` 和 `name`（按字母顺序）的元素拥有最高优先级。\n\n在优先队列中使用 `Comparator` 很容易。你需要在创建 `PriorityQueue`\
  \ 类的对象时指定你的 `Comparator`。清单 12-18 演示了如何使用 `Comparator` 为 `ComparablePerson` 列表创建一个优先队列。它使用\
  \ `ComparablePerson` 名字的字母顺序作为判断其优先级的标准。名字在字母顺序中排在前面的那个人拥有更高的优先级。\n\n```\n// PriorityQueueComparatorTest.java\n\
  package com.jdojo.collections;\nimport java.util.Queue;\nimport java.util.PriorityQueue;\n\
  import java.util.Comparator;\npublic class PriorityQueueComparatorTest {\npublic\
  \ static void main(String[] args) {\nComparator nameComparator\n= Comparator.comparing(ComparablePerson::getName);\n\
  // 创建一个带有 Comparator 的优先队列\nQueue pq = new PriorityQueue(nameComparator);\npq.add(new\
  \ ComparablePerson(1, \"John\"));\npq.add(new ComparablePerson(4, \"Ken\"));\npq.add(new\
  \ ComparablePerson(2, \"Richard\"));\npq.add(new ComparablePerson(3, \"Donna\"));\n\
  pq.add(new ComparablePerson(4, \"Adam\"));\nSystem.out.println(\"优先队列: \" + pq);\n\
  while (pq.peek() != null) {\nSystem.out.println(\"头部元素: \" + pq.peek());\npq.remove();\n\
  System.out.println(\"从队列中移除一个元素\");\nSystem.out.println(\"优先队列: \" + pq);\n}\n}\n\
  }\n清单 12-18.\n在优先队列中使用 Comparator 对象\n```\n\n```\n优先队列: [(4, Adam), (3, Donna),\
  \ (2, Richard), (4, Ken), (1, John)]\n头部元素: (4, Adam)\n从队列中移除一个元素\n优先队列: [(3, Donna),\
  \ (1, John), (2, Richard), (4, Ken)]\n头部元素: (3, Donna)\n从队列中移除一个元素\n优先队列: [(1, John),\
  \ (4, Ken), (2, Richard)]\n头部元素: (1, John)\n从队列中移除一个元素\n优先队列: [(4, Ken), (2, Richard)]\n\
  头部元素: (4, Ken)\n从队列中移除一个元素\n优先队列: [(2, Richard)]\n头部元素: (2, Richard)\n从队列中移除一个元素\n\
  优先队列: []\n```\n\n双端队列\n\n双端队列（deque）是队列的一种扩展版本，允许从两端（头部和尾部）插入和移除元素。`Deque<E>` 接口的实例代表一个双端队列。名称\
  \ `Deque` 并不意味着 `Queue` 的反义词。相反，它表示“双端队列”。它的发音是“deck”，而不是“de queue”。\n\n\n\n`Deque<E>`接口扩展了`Queue<E>`接口。它声明了额外的方法，以便在队列的头部和尾部执行所有操作。它可以被用作`FIFO`队列或`LIFO`队列。你已经知道什么是`Queue`以及如何使用它。`Deque`只是队列的另一种变体，用于表示不同类型的队列，而不仅仅是`FIFO`队列。在本节中，你只需要学习`Deque`接口提供的新方法。表\
  \ 12-2 列出了`Deque`接口中声明的新方法，这些方法便于在`Deque`的任一端（头部或尾部）进行插入、移除和查看操作。在方法名中，first 表示头部，last\
  \ 表示尾部。\n\n表 12-2.\n\nDeque 接口中用于两端插入、移除和查看操作的新方法\n\n| 类别 | 方法 | 描述 |\n| --- | ---\
  \ | --- |\n| 向`Deque`添加元素 | `void addFirst(E)`<br>`void addLast(E)`<br>`boolean\
  \ offerFirst(E)`<br>`boolean offerLast(E)` | `addXxx()`方法在头部或尾部添加一个元素，如果无法添加（例如在已满的有界`Deque`中），则会抛出异常。<br><br>`offerXxx()`方法与`addXxx()`方法的工作方式相同。但是，它们在失败时不会抛出异常。相反，如果无法将指定元素添加到`Deque`，它们会返回`false`。\
  \ |\n| 从`Deque`移除元素 | `E removeFirst()`<br>`E removeLast()`<br>`E pollFirst()`<br>`E\
  \ pollLast()` | `removeXxx()`方法从`Deque`的头部或尾部检索并移除元素。如果`Deque`为空，它们会抛出异常。<br><br>`pollXxx()`方法执行与`removeXxx()`方法相同的工作。但是，如果`Deque`为空，它们会返回`null`。\
  \ |\n| 查看`Deque`两端的元素 | `E getFirst()`<br>`E getLast()`<br>`E peekFirst()`<br>`E\
  \ peekLast()` | `getXxx()`方法检索但不移除`Deque`头部或尾部的元素。如果`Deque`为空，它们会抛出异常。<br><br>`peekXxx()`方法执行与`getXxx()`方法相同的工作。但是，如果`Deque`为空，它们会返回`null`而不是抛出异常。\
  \ |\n\n由于`Deque`继承自`Queue`，因此`Deque`也可以像`FIFO`队列一样工作。表 12-3 比较了`Queue`接口中的方法及其在`Deque`接口中的等效方法。\n\
  \n表 12-3.\n\nQueue 和 Deque 接口的方法比较\n\n| Queue 中的方法 | Deque 中的等效方法 |\n| --- | ---\
  \ |\n| `add(e)` | `addLast(e)` |\n| `offer(e)` | `offerLast(e)` |\n| `remove()`\
  \ | `removeFirst()` |\n| `poll()` | `pollFirst()` |\n| `element()` | `getFirst()`\
  \ |\n| `peek()` | `peekFirst()` |\n\n因为在`FIFO`队列中，你总是在尾部（或 Last）添加元素，所以`Queue`接口中的`add()`方法执行的操作与`Deque`接口中的`addLast()`方法相同。\n\
  \n你也可以使用`Deque`作为栈（`LIFO`队列），使用诸如`push()`、`pop()`和`peek()`等熟悉的方法。`push()`方法将一个元素压入（或添加）到栈顶，这与使用`addFirst()`方法相同。`pop()`方法从栈顶弹出（或移除）元素，这与调用`removeFirst()`方法相同。`peek()`方法检索但不移除栈顶的元素；如果栈为空，则返回`null`。调用`peek()`方法与调用`peekFirst()`方法相同。一个栈需要四个方法来执行其操作：`isEmpty()`、`push()`、`pop()`和`peek()`。表\
  \ 12-4 列出了`Deque`接口中专门用于栈的方法及其替代版本。\n\n表 12-4.\n\nDeque 中专门用于栈的方法\n\n| Deque 中栈专用方法\
  \ | Deque 中的等效替代方法 |\n| --- | --- |\n| `isEmpty()` | 继承自`Collection`接口 |\n| `push(E\
  \ e)` | `addFirst(E e)` |\n| `pop()` | `removeFirst()` |\n| `peek()` | `peekFirst()`\
  \ |\n\n回顾到目前为止在`Deque`接口中看到的方法，可以说它是一个庞大的接口。如果程序员不将其方法分解为不同的类别来学习，很容易感到困惑。`Deque`接口包含的方法可分为以下四类：\n\
  \n*   允许你在`Deque`的头部和尾部插入、移除和查看元素的方法，如表 12-2 所列。所有这些方法足以让你将`Deque`用作任何你想要的队列。然而，它还提供了一些名称不同的方法来完成相同的事情。\n\
  \n*   允许你将`Deque`用作`FIFO`队列（或简称为`Queue`）的方法。它们列在表 12-3 中。\n\n*   允许你使用与栈一起使用的熟悉方法名称的方法。请注意，这些方法除了插入、移除和查看之外，并没有执行任何新操作。它们只是名称不同。它们列在表\
  \ 12-4 中。\n\n*   一些实用方法，可帮助你在特定情况下使用`Deque`。例如，它的`descendingIterator()`方法返回一个`Iterator`，允许你按相反顺序（从尾部到头部）遍历其元素。它还添加了两个方法，分别称为`removeFirstOccurrence(Object\
  \ o)`和`removeLastOccurrence(Object o)`，允许你分别移除`Deque`中某个对象的第一次出现（从头部向尾部查找）和最后一次出现（从尾部向头部查找）。现在你可以放松了——`Deque`中没有更多的新方法需要学习了。\n\
  \n`ArrayDeque<E>`和`LinkedList<E>`类是`Deque`接口的两个实现类。`ArrayDeque`类由数组支持，而`LinkedList`类由链表支持。如果你将`Deque`用作`LIFO`队列（或栈），则应使用`ArrayDeque`作为`Deque`的实现。如果你将`Deque`用作`FIFO`队列（或简称为`Queue`），则`LinkedList`实现性能更好。\n\
  \n清单 12-19 演示了如何将`Deque`用作`FIFO`队列。如果你将此程序与清单 12-15 中的程序进行比较，在此程序中，你只是使用了`Deque`特有的方法来执行与使用`Queue`接口方法相同的事情。假设一个方法接受一个`Queue`类型的参数。如果你将一个`Deque`传递给该方法，那么在该方法内部，你的`Deque`将被用作`FIFO`队列。\n\
  \n\n\n```\n// DequeAsQueue.java\npackage com.jdojo.collections;\nimport java.util.Deque;\n\
