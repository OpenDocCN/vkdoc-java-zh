  \ 文件的内容\n```\n\n```\n\n# 概率服务提供者实现接口名\ncom.jdojo.prime.probable.ProbablePrimeChecker\n\
  清单 14-14.\ncom.jdojo.prime.probable 模块的模块化 JAR 包中 META-INF/services/com.jdojo.prime.PrimeChecker\
  \ 文件的内容\n```\n\n重新编译并重新打包通用和快速素数检查器服务提供者的模块化 JAR 包。运行以下命令：\n\n```\nC:\\Java9LanguageFeatures>java\
  \ --class-path lib\\jdojo.prime.jar;lib\\jdojo.prime.client.jar;lib\\jdojo.prime.faster.jar;lib\\\
  jdojo.prime.probable.jar com.jdojo.prime.client.Main\nUsing default service provider:\n\
  3 is a prime.\n4 is not a prime.\n121 is not a prime.\n977 is a prime.\nException\
  \ in thread \"main\" java.util.ServiceConfigurationError: com.jdojo.prime.PrimeChecker:\
  \ com.jdojo.prime.faster.FasterPrimeChecker Unable to get public no-arg constructor\n\
  ...\nCaused by: java.lang.NoSuchMethodException: com.jdojo.prime.faster.FasterPrimeChecker.()\n\
  ...\n```\n\n此处显示了部分输出。输出表明，当 `ServiceLoader` 类尝试实例化快速素数服务提供者时发生了运行时异常。当尝试实例化概率素数服务提供者时，也会出现同样的错误。在\
  \ `META-INF/services` 目录中添加服务信息是实现服务的传统方式。为了向后兼容，服务实现必须是一个具有公共无参构造函数的类。回想一下，你只为\
  \ `GenericPrimeChecker` 类提供了提供者构造函数。因此，默认的素数检查器服务提供者可以工作，而另外两个在传统模式下无法工作。你可以为 `FasterPrimeChecker`\
  \ 类添加一个提供者构造函数使其工作。但是，无法为接口添加提供者构造函数，因此 `ProbablePrimeChecker` 在类路径模式下将无法工作。你必须从显式模块中加载它才能使其工作。\n\
  \n总结\n\n应用程序（或库）提供的特定功能称为服务。提供服务实现的应用程序和库称为服务提供者。使用这些服务提供者提供的服务的应用程序称为服务消费者或客户端。\n\
  \n在 Java 中，服务由一组接口和类定义。服务包含一个接口或抽象类，它定义了服务提供的功能，被称为服务提供者接口、服务接口或服务类型。服务接口的特定实现称为服务提供者。一个服务接口可以有多个服务提供者。在\
  \ JDK9 中，服务提供者可以是一个类或一个接口。在 JDK9 之前，服务提供者必须是一个类。\n\nJDK 包含一个 `java.util.ServiceLoader<S>`\
  \ 类，其唯一目的是在运行时为指定的服务接口发现并加载类型为 `S` 的服务提供者。如果包含服务提供者的 JAR 包（模块化或非模块化）被放置在类路径上，`ServiceLoader`\
  \ 类会使用 `META-INF/services` 目录来查找服务提供者。此目录中的文件名应与服务接口的完全限定名相同。该文件包含服务提供者实现类的完全限定名——每行一个类名。文件可以使用\
  \ `#` 字符作为单行注释的开始。`ServiceLoader` 类会扫描类路径上的所有 `META-INF/services` 目录以发现服务提供者。\n\n\
  \n\n在 JDK9 中，服务提供者发现机制已发生变更。使用 `ServiceLoader` 类来发现和加载服务提供者的模块，需要使用 `uses` 语句指定服务接口。`uses`\
  \ 语句中指定的服务接口可以声明在当前模块中，也可以声明在当前模块可访问的任何模块中。你可以使用 `ServiceLoader` 类的 `iterator()`\
  \ 方法来遍历所有服务提供者。`stream()` 方法则提供一个元素流，这些元素是 `ServiceLoader.Provider` 接口的实例。你可以利用该流，根据提供者的类名来筛选和选择特定类型的提供者，而无需实例化所有提供者。\n\
  \n包含服务提供者的模块需要使用 `provides` 语句指定服务接口及其实现类。该实现类必须声明在当前模块中。\n\n问题与练习\n\n1.  Java 中的服务、服务接口和服务提供者分别是什么？\n\
  \n2.  编写一个名为 `M` 的模块的声明，该模块加载一个服务接口的服务提供者，该服务接口的完整限定名为 `p.S`。\n\n3.  编写一个名为 `N`\
  \ 的模块的声明，该模块提供服务接口 `p.S` 的实现。服务实现类的完整限定名为 `q.C`。\n\n4.  一个模块可以使用 `ServiceLoader`\
  \ 类加载多少种类型的服务？\n\n5.  一个模块可以提供某个服务类型的多少个服务实现？\n\n6.  何时使用 `java.util.ServiceLoader<S>`\
  \ 类？\n\n7.  何时使用嵌套的 `java.util.ServiceLoader.Provider<S>` 接口？\n\n8.  你可以使用 `ServiceLoader`\
  \ 类的 `iterator()` 方法或 `stream()` 方法来发现和加载特定类型的服务提供者。当你需要根据服务提供者实现类或接口的名称来选择服务提供者时，哪种方法性能更优？\n\
  \n9.  什么是提供者构造方法和提供者方法？如果两者都可用，在从模块化 JAR 加载服务时，会使用哪一个？\n\n10. 在 JDK9 中，定义一个打包在模块化\
  \ JAR 中、且放置在类路径上时也应能正常工作的服务，你需要采取哪些步骤？\n\n15. 模块 API\n\n在本章中，你将学习：\n\n*   什么是模块\
  \ API\n\n*   如何在程序中表示模块和模块描述符\n\n*   如何在程序中读取模块描述符\n\n*   如何表示模块的版本\n\n*   如何使用\
  \ `Module` 和 `ModuleDescriptor` 类读取模块的属性\n\n*   如何在运行时使用 `Module` 类更新模块的定义\n\n*\
  \   如何访问模块中的资源\n\n*   如何创建可用于模块的注解，以及如何读取模块上使用的注解\n\n*   什么是模块层和配置\n\n*   如何创建自定义模块层并将模块加载到其中\n\
  \n什么是模块 API？\n\n模块 API 由类和接口组成，使你能够以编程方式访问模块。使用该 API，你可以通过编程方式：\n\n*   读取、修改和构建模块描述符\n\
  \n*   加载模块\n\n*   读取模块的内容\n\n*   搜索已加载的模块\n\n*   创建新的模块层\n\n模块 API 规模较小，包含约 15 个类和接口，分布在两个包中：\n\
  \n*   `java.lang`\n\n*   `java.lang.module`\n\n`Module`、`ModuleLayer` 和 `LayerInstantiationException`\
  \ 类位于 `java.lang` 包中，其余类位于 `java.lang.module` 包中。表 15-1 列出了模块 API 中的类及其简要说明。该列表未排序。我将\
  \ `Module` 和 `ModuleDescriptor` 列在前面，因为应用程序开发者最常使用它们。其他所有类通常由容器和库使用。该列表不包含模块 API\
  \ 中的异常类。我将在后续章节中详细讨论这些类。\n\n\n\n表 15-1.\n\n模块 API 中常用的类及其描述\n\n类\n |\n 描述\n |\n\n\
  | --- | --- | --- | --- | --- |\n\n`Module`\n |\n  表示一个运行时模块。\n |\n\n`ModuleDescriptor`\n\
  \ |\n  表示一个不可变的模块描述符。\n |\n\n`ModuleDescriptor.Builder`\n |\n  一个嵌套的构建器类，用于以编程方式构建模块描述符。\n\
  \ |\n\n`ModuleDescriptor.Exports`\n |\n  一个嵌套类，表示模块声明中的`exports`语句。\n |\n\n`ModuleDescriptor.Opens`\n\
  \ |\n  一个嵌套类，表示模块声明中的`opens`语句。\n |\n\n`ModuleDescriptor.Provides`\n |\n  一个嵌套类，表示模块声明中的`provides`语句。\n\
  \ |\n\n`ModuleDescriptor.Requires`\n |\n  一个嵌套类，表示模块声明中的`requires`语句。\n |\n\n`ModuleDescriptor.Version`\n\
  \ |\n  一个嵌套类，表示模块的版本字符串。它包含一个`parse(String v)`工厂方法，可从版本字符串返回其实例。\n |\n\n`ModuleDescriptor.Modifier`\n\
  \ |\n  一个枚举，其常量表示模块声明中使用的修饰符，例如开放模块的`OPEN`。\n |\n\n`ModuleDescriptor.Exports.Modifier`\n\
  \ |\n  一个枚举，其常量表示模块声明中`exports`语句使用的修饰符。\n |\n\n`ModuleDescriptor.Opens.Modifier`\n\
  \ |\n  一个枚举，其常量表示模块声明中`opens`语句使用的修饰符。\n |\n\n`ModuleDescriptor.Requires.Modifier`\n\
  \ |\n  一个枚举，其常量表示模块声明中`requires`语句使用的修饰符。\n |\n\n`ModuleReference`\n |\n  对模块内容的引用。它包含模块的描述符及其位置。\n\
  \ |\n\n`ResolvedModule`\n |\n  表示模块图中已解析的模块。包含模块的名称、其依赖项以及对其内容的引用。可用于遍历模块图中某个模块的所有传递依赖项。\n\
  \ |\n\n`ModuleFinder`\n |\n  用于在指定路径或系统模块中查找模块的接口。找到的模块以`ModuleReference`实例的形式返回。它包含用于获取其实例的工厂方法。\n\
  \ |\n\n`ModuleReader` \n |\n  用于读取模块内容的接口。你可以从`ModuleReference`获取`ModuleReader`。\n\
  \ |\n\n`Configuration`\n |\n  表示已解析模块的模块图。\n |\n\n`ModuleLayer`\n |\n  包含一个模块图（一个`Configuration`）以及图中模块与类加载器之间的映射。\n\
  \ |\n\n`ModuleLayer.Controller`\n |\n  一个嵌套类，用于控制`ModuleLayer`中的模块。`ModuleLayer`类中的方法返回此类的实例。\n\
  \ |\n\n表示模块\n\n`Module`类的实例表示一个运行时模块。加载到 JVM 中的每个类型都属于某个模块。JDK9 向`Class<T>`类添加了一个名为`getModule()`的方法，该方法返回该类型所属模块的引用。以下代码片段展示了如何获取名为`BasicInfo`的类的模块：\n\
  \n```\n// 获取 BasicInfo 类的 Class 对象\nClass cls = BasicInfo.class;\n// 获取模块引用\nModule\
  \ module = cls.getModule();\n```\n\n模块可以是有名称的或无名称的。`Module`类的`isNamed()`方法对于有名称的模块返回`true`，对于无名称的模块返回`false`。\n\
  \n每个类加载器都包含一个无名称模块，其中包含该类加载器从类路径加载的所有类型。如果类加载器从模块路径加载类型，则这些类型属于有名称的模块。`Class`类的`getModule()`方法可能返回有名称或无名称的模块。JDK9\
  \ 向`ClassLoader`类添加了一个名为`getUnnamedModule()`的方法，该方法返回该类加载器的无名称模块。在以下代码片段中，假设`BasicInfo`类是从类路径加载的，那么`m1`和`m2`引用的是同一个`Module`：\n\
  \n```\nClass cls = BasicInfo.class;\nModule m1 = cls.getClassLoader().getUnnamedModule();\n\
  Module m2 = cls.getModule();\n```\n\n\n\n`Module`类的`getName()`方法返回模块的名称。对于未命名模块，它返回`null`。\n\
  \n```\n// 获取模块名称\nString moduleName = module.getName();\n```\n\n`Module`类中的`getPackages()`方法返回一个包含模块中所有包的`Set<String>`。`getClassLoader()`方法返回该模块的类加载器。\n\
  \n`getLayer()`方法返回包含该模块的`ModuleLayer`；如果模块不在任何层中，则返回`null`。模块层仅包含命名模块。因此，对于未命名模块，此方法始终返回`null`。\n\
  \n描述模块\n\n`ModuleDescriptor`类的实例表示一个模块定义，该定义由模块声明创建——通常来自`module-info.class`文件。也可以使用`ModuleDescriptor.Builder`类动态创建模块描述符。模块声明可以通过命令行选项（如`--add-reads`、`--add-exports`和`--add-opens`）以及`Module`类中的方法（如`addReads()`、`addOpens()`和`addExports()`）进行增强。`ModuleDescriptor`表示在模块声明时添加的模块描述符，而不是增强后的模块描述符。`Module`类的`getDescriptor()`方法返回一个`ModuleDescriptor`：\n\
  \n```\nClass cls = BasicInfo.class;\nModule module = cls.getModule();\n// 获取模块描述符\n\
  ModuleDescriptor desc = module.getDescriptor();\n```\n\n提示\n\n`ModuleDescriptor`是不可变的。未命名模块没有模块描述符。对于未命名模块，`Module`类的`getDescriptor()`方法返回`null`。\n\
  \n你也可以通过使用`ModuleDescriptor`类的某个静态`read()`方法，从`module-info.class`文件中读取模块声明的二进制形式来创建`ModuleDescriptor`对象。以下代码片段从当前目录读取`module-info.class`文件。为清晰起见，省略了异常处理：\n\
  \n```\nString moduleInfoPath = \"module-info.class\";\nModuleDescriptor desc = ModuleDescriptor.read(new\
  \ FileInputStream(moduleInfoPath));\n```\n\n表示模块语句\n\n`ModuleDescriptor`类包含以下静态嵌套类，其实例表示模块声明中同名的语句：\n\
  \n*   `ModuleDescriptor.Exports`\n\n*   `ModuleDescriptor.Opens`\n\n*   `ModuleDescriptor.Provides`\n\
  \n*   `ModuleDescriptor.Requires`\n\n请注意，没有用于表示`uses`语句的`ModuleDescriptor.Uses`类。这是因为`uses`语句表示一个服务接口名称，该名称可以用`String`表示。\n\
  \n表示 exports 语句\n\n`ModuleDescriptor.Exports`类的实例表示模块声明中的`exports`语句。该类中的以下方法返回`exports`语句的组成部分：\n\
  \n*   `boolean isQualified()`\n\n*   `Set<ModuleDescriptor.Exports.Modifier> modifiers()`\n\
  \n*   `String source()`\n\n*   `Set<String> targets()`\n\n`isQualified()`方法对于限定导出返回`true`，对于非限定导出返回`false`。`source()`方法返回导出包的名称。对于限定导出，`targets()`方法返回包被导出到的模块名称的不可变集合；对于非限定导出，它返回一个空集合。`modifiers()`方法返回`exports`语句的修饰符集合，这些修饰符是嵌套枚举`ModuleDescriptor.Exports.Modifier`的常量。它包含以下两个常量：\n\
  \n*   `MANDATED`：该导出在源模块声明中被隐式声明。\n\n*   `SYNTHETIC`：该导出在模块声明的源文件中未被显式或隐式声明。\n\n\
  表示 opens 语句\n\n`ModuleDescriptor.Opens`类的实例表示模块声明中的`opens`语句。该类中的以下方法返回`opens`语句的组成部分：\n\
  \n*   `boolean isQualified()`\n\n*   `Set<ModuleDescriptor.Opens.Modifier> modifiers()`\n\
  \n*   `String source()`\n\n*   `Set<String> targets()`\n\n`isQualified()`方法对于限定`opens`返回`true`，对于非限定`opens`返回`false`。`source()`方法返回开放包的名称。对于限定`opens`，`targets()`方法返回包被开放到的模块名称的不可变集合；对于非限定`opens`，它返回一个空集合。`modifiers()`方法返回`opens`语句的修饰符集合，这些修饰符是嵌套枚举`ModuleDescriptor.Opens.Modifier`的常量，它包含以下两个常量：\n\
  \n*   `MANDATED`：该`opens`在模块声明的源文件中被隐式声明。\n\n*   `SYNTHETIC`：该`opens`在模块声明的源文件中未被显式或隐式声明。\n\
  \n表示 provides 语句\n\n`ModuleDescriptor.Provides`类的实例表示模块声明中针对特定服务类型的一个或多个`provides`语句。以下两个`provides`语句为同一服务类型`X.Y`指定了两个实现类：\n\
  \n```\nprovides X.Y with A.B;\nprovides X.Y with Y.Z;\n```\n\n`ModuleDescriptor.Provides`类的一个实例将表示这两个语句。该类中的以下方法返回`provides`语句的组成部分：\n\
  \n*   `List<String> providers()`\n\n*   `String service()`\n\n`providers()`方法返回提供者类或提供者工厂的完全限定类名列表。在前面的示例中，返回的列表将包含`A.B`和`Y.Z`。`service()`方法返回服务类型的完全限定名称。在前面的示例中，它将返回`X.Y`。\n\
  \n表示 requires 语句\n\n`ModuleDescriptor.Requires`类的实例表示模块声明中的`requires`语句。该类中的以下方法返回`requires`语句的组成部分：\n\
  \n*   `Optional<ModuleDescriptor.Version> compiledVersion()`\n\n*   `Optional<String>\
  \ rawCompiledVersion()`\n\n*   `String name()`\n\n*   `Set<ModuleDescriptor.Requires.Modifier>\
  \ modifiers()`\n\n假设一个名为`M`的模块包含以下`requires`语句并被编译：\n\n```\nmodule M {\nrequires\
  \ N;\n}\n```\n\n如果在编译时`N`的模块版本可用，则该版本会记录在`M`的模块描述符中。`compiledVersion()`方法以`Optional`形式返回记录的`N`的版本。如果`N`没有可用版本，则该方法返回一个空的`Optional`。`requires`语句中指定的模块的模块版本仅出于信息目的记录在模块描述符中。模块系统在任何阶段都不会使用它。但是，工具和框架可以将其用于诊断目的。例如，工具可能会验证所有使用`requires`语句指定为依赖项的模块，其版本必须等于或高于编译时记录的版本。\n\
  \n继续前面的示例，`rawCompiledVersion()`方法以`Optional<String>`形式返回模块`N`的版本。在大多数情况下，`compiledVersion()`和`rawCompiledVersion()`这两个方法将返回相同的模块版本，但格式不同：一个在`Optional<ModuleDescriptor.Version>`对象中，另一个在`Optional<String>`对象中。你可能有一个模块版本无效的模块。这样的模块可能是在\
  \ Java 模块系统之外创建和编译的。你可以将此类具有无效模块版本的模块作为 Java 模块加载。在这种情况下，`compiledVersion()`方法返回一个空的`Optional<ModuleDescriptor.Version>`，因为该模块版本无法解析为有效的\
  \ Java 模块版本；而`rawCompiledVersion()`返回一个包含该无效模块版本的`Optional<String>`。\n\n提示\n\n\n\
  \n`ModuleDescriptor.Requires` 类的 `rawCompiledVersion()` 方法可能返回所需模块的一个无法解析的版本。\n\n\
  `name()` 方法返回 `requires` 语句中指定的模块名称。`modifiers()` 方法返回 `requires` 语句的修饰符集合，这些修饰符是嵌套枚举\
  \ `ModuleDescriptor.Requires.Modifier` 的常量，包含以下常量：\n\n*   `MANDATED`：该依赖关系在模块声明的源代码中被隐式声明。\n\
  *   `STATIC`：该依赖关系在编译时是必需的，在运行时是可选的。\n*   `SYNTHETIC`：该依赖关系在模块声明的源代码中既未显式声明也未隐式声明。\n\
  *   `TRANSITIVE`：该依赖关系会导致任何依赖于当前模块的模块，都隐式声明依赖于此 `requires` 语句所指定的模块。\n\n表示模块版本\n\
  \n`ModuleDescriptor.Version` 类的实例表示模块的版本。它包含一个名为 `parse(String version)` 的静态工厂方法，该方法返回一个实例，表示来自指定版本字符串的版本。回想一下，你不需要在模块声明中指定模块的版本。当你将模块代码打包到模块化\
  \ JAR 中时，通常会使用 `jar` 工具来添加模块版本。`javac` 编译器也允许你在编译模块时指定模块版本。模块版本字符串包含三个组成部分：\n\n\
  *   一个必需的版本号\n*   一个可选的预发布版本\n*   一个可选的构建版本\n\n模块版本的形式如下：\n\n```\nvNumToken+ ('-'\
  \ preToken+)? ('+' buildToken+)?\n```\n\n每个组成部分都是一个 token 序列；每个 token 要么是一个非负整数，要么是一个字符串。Token\
  \ 由标点字符 `.`、`-` 或 `+` 分隔，或者由数字序列过渡到既非数字也非标点字符的字符序列（反之亦然）来分隔。版本字符串必须以数字开头。版本号是由 `.`\
  \ 字符分隔的 token 序列，以第一个 `-` 或 `+` 字符终止。预发布版本是由 `.` 或 `-` 字符分隔的 token 序列，以第一个 `+` 字符终止。构建版本是由\
  \ `.`、`-` 或 `+` 字符分隔的 token 序列。\n\n`ModuleDescriptor` 类的 `version()` 方法返回一个 `Optional<ModuleDescriptor.Version>`。\n\
  \n模块的其他属性\n\n在打包模块化 JAR 时，可以在 `module-info.class` 文件中设置其他模块属性，例如主类名称、操作系统名称等。`ModuleDescriptor`\
  \ 类包含一个用于获取每个此类属性的方法。`ModuleDescriptor` 类中以下方法值得关注：\n\n*   `Set<ModuleDescriptor.Exports>\
  \ exports()`\n*   `boolean isAutomatic()`\n*   `boolean isOpen()`\n*   `Optional<String>\
  \ mainClass()`\n*   `String name()`\n*   `Set<ModuleDescriptor.Opens> opens()`\n\
  *   `Set<String> packages()`\n*   `Set<ModuleDescriptor.Provides> provides()`\n\
  *   `Optional<String> rawVersion()`\n*   `Set<ModuleDescriptor.Requires> requires()`\n\
  *   `String toNameAndVersion()`\n*   `Set<String> uses()`\n\n这些方法名称直观易懂，可以理解其用途。我将介绍两个需要稍加解释的方法：`packages()`\
  \ 和 `provides()`。\n\n`ModuleDescriptor` 类包含一个名为 `packages()` 的方法，而 `Module` 类包含一个名为\
  \ `getPackages()` 的方法。两者都返回一组包名。为什么会有两个用途相同的方法？实际上，它们服务于不同的目的。在 `ModuleDescriptor`\
  \ 中，该方法返回模块声明中定义的包集合，无论它们是否被导出。回想一下，你无法为未命名模块获取 `ModuleDescriptor`，在这种情况下，你可以使用\
  \ `Module` 类中的 `getPackages()` 方法获取未命名模块中的包名。另一个区别是，`ModuleDescriptor` 报告的包名是静态的；而\
  \ `Module` 报告的包名是动态的，它报告在调用 `getPackages()` 方法时模块中已加载的包。`Module` 报告运行时当前加载到其中的所有包。\n\
  \n`provides()` 方法返回一个 `Set<ModuleDescriptor.Provides>`。考虑模块声明中的以下 `provides` 语句：\n\
  \n```\nprovides A.B with X.Y1;\nprovides A.B with X.Y2;\nprovides P.Q with S.T1;\n\
  ```\n\n在这种情况下，该集合将包含两个元素——一个用于服务类型 `A.B`，另一个用于服务类型 `P.Q`。一个元素的 `service()` 和 `providers()`\
  \ 方法将分别返回 `A.B` 以及包含 `X.Y1` 和 `X.Y2` 的列表。另一个元素的这些方法将返回 `P.Q` 以及包含 `S.T1` 的单个元素列表。\n\
  \n了解模块基本信息\n\n在本节中，我将向你展示一个示例，说明如何在运行时读取模块的基本信息。清单 15-1 包含一个名为 `com.jdojo.module.api`\
  \ 的模块的模块声明。它读取三个模块并导出一个包。其中两个被读取的模块 `com.jdojo.prime` 和 `com.jdojo.intro` 来自前面的章节。你需要将这两个模块添加到模块路径中，以便编译它们并在\
  \ `com.jdojo.module.api` 模块中运行代码。`java.sql` 模块是一个 JDK 模块。\n\n```\n// module-info.java\n\
  module jdojo.module.api {\n    requires jdojo.prime;\n    requires jdojo.intro;\n\
  \    requires java.sql;\n    exports com.jdojo.module.api;\n}\n清单 15-1. 名为 jdojo.module.api\
  \ 的模块的声明\n```\n\n清单 15-2 包含一个名为 `ModuleBasicInfo` 的类的代码，该类使用 `Module` 和 `ModuleDescriptor`\
  \ 类打印三个模块的模块详细信息。\n\n\n\n```\n// ModuleBasicInfo.java\npackage com.jdojo.module.api;\n\
  import com.jdojo.prime.PrimeChecker;\nimport java.lang.module.ModuleDescriptor;\n\
  import java.lang.module.ModuleDescriptor.Exports;\nimport java.lang.module.ModuleDescriptor.Provides;\n\
  import java.lang.module.ModuleDescriptor.Requires;\nimport java.sql.Driver;\nimport\
  \ java.util.Set;\npublic class ModuleBasicInfo {\npublic static void main(String[]\
  \ args) {\n// 获取当前类的模块\nClass cls = ModuleBasicInfo.class;\nModule module = cls.getModule();\n\
  // 打印模块信息\nprintInfo(module);\nSystem.out.println(\"------------------\");\n// 打印模块信息\n\
  printInfo(PrimeChecker.class.getModule());\nSystem.out.println(\"------------------\"\
  );\n// 打印模块信息\nprintInfo(Driver.class.getModule());\n}\npublic static void printInfo(Module\
  \ m) {\nString moduleName = m.getName();\nboolean isNamed = m.isNamed();\n// 打印模块类型和名称\n\
  System.out.printf(\"模块名称: %s%n\", moduleName);\nSystem.out.printf(\"命名模块: %b%n\"\
  , isNamed);\n// 获取模块描述符\nModuleDescriptor desc = m.getDescriptor();\n// 对于未命名模块，desc\
  \ 将为 null\nif (desc == null) {\nSet currentPackages = m.getPackages();\nSystem.out.printf(\"\
  包: %s%n\", currentPackages);\nreturn ;\n}\nSet requires = desc.requires();\nSet\
  \ exports = desc.exports();\nSet uses = desc.uses();\nSet provides = desc.provides();\n\
  Set packages = desc.packages();\nSystem.out.printf(\"依赖: %s%n\", requires);\nSystem.out.printf(\"\
  导出: %s%n\", exports);\nSystem.out.printf(\"使用: %s%n\", uses);\nSystem.out.printf(\"\
  提供: %s%n\", provides);\nSystem.out.printf(\"包: %s%n\", packages);\n}\n}\n清单 15-2.\n\
  ModuleBasicInfo 类\n```\n\n现在，让我们在模块模式和传统模式下运行 `ModuleBasicInfo` 类。以下命令使用模块模式：\n\n\
  ```\nc:\\Java9LanguageFeatures>java --module-path dist --module jdojo.module.api/com.jdojo.module.api.ModuleBasicInfo\n\
  ```\n\n```\n模块名称: jdojo.module.api\n命名模块: true\n依赖: [java.sql (@9), jdojo.prime,\
  \ jdojo.intro, mandated java.base (@9)]\n导出: []\n使用: []\n提供: []\n包: [com.jdojo.module.api]\n\
  \n模块名称: jdojo.prime\n命名模块: true\n依赖: [mandated java.base (@9)]\n导出: [com.jdojo.prime]\n\
  使用: [com.jdojo.prime.PrimeChecker]\n提供: [com.jdojo.prime.PrimeChecker with [com.jdojo.prime.impl.GenericPrimeChecker]]\n\
  包: [com.jdojo.prime, com.jdojo.prime.impl]\n\n模块名称: java.sql\n命名模块: true\n依赖: [transitive\
  \ java.xml, mandated java.base, transitive java.logging]\n导出: [javax.transaction.xa,\
  \ javax.sql, java.sql]\n使用: [java.sql.Driver]\n提供: []\n包: [java.sql, javax.transaction.xa,\
  \ javax.sql]\n```\n\n现在，让我们通过使用类路径在传统模式下运行 `ModuleBasicInfo` 类，如下所示：\n\n```\nc:\\\
  Java9LanguageFeatures>java -cp dist\\jdojo.module.api.jar;dist\\jdojo.module.api.jar;dist\\\
  jdojo.prime.jar com.jdojo.module.api.ModuleBasicInfo\n```\n\n```\n模块名称: null\n命名模块:\
  \ false\n包: [com.jdojo.module.api]\n\n模块名称: null\n命名模块: false\n包: [com.jdojo.module.api,\
  \ com.jdojo.prime]\n\n模块名称: java.sql\n命名模块: true\n依赖: [transitive java.xml, transitive\
  \ java.logging, mandated java.base]\n导出: [java.sql, javax.transaction.xa, javax.sql]\n\
  使用: [java.sql.Driver]\n提供: []\n包: [javax.transaction.xa, javax.sql, java.sql]\n\
  ```\n\n第二次运行时，`ModuleBasicInfo` 和 `PrimeChecker` 类被加载到应用程序类加载器的未命名模块中，这体现在两个模块的\
  \ `isNamed()` 方法都返回 `false`。请注意 `Module` 类的 `getPackages()` 方法的动态特性。第一次调用时，它只返回一个包名——`com.jdojo.module.api`。第二次调用时，它返回两个包名——`com.jdojo.module.api`\
  \ 和 `com.jdojo.prime`。这是因为当来自新包的类型被加载到未命名模块时，这些包会被添加到该模块中。`java.sql` 模块的输出在两种情况下保持不变，因为无论\
  \ `java` 启动器以何种模式运行，平台类型总是被加载到同一个模块中。\n\n查询模块\n\n您可能对模块执行的典型查询包括：\n\n*   模块 `M`\
  \ 能否读取另一个模块 `N`？\n*   模块能否使用特定类型的服务？\n*   模块是否将特定包导出给所有或部分模块？\n*   模块是否向所有或部分模块开放特定包？\n\
  *   此模块是命名模块还是未命名模块？\n*   这是自动模块吗？\n*   这是开放模块吗？\n\n您可以使用命令行选项以及通过 Module API 以编程方式增强模块描述符。您可以将所有关于模块属性的查询分为两类：一类是加载模块后结果可能改变的查询，另一类是加载模块后结果不变的查询。`Module`\
  \ 类包含用于第一类查询的方法，而 `ModuleDescriptor` 类包含用于第二类查询的方法。`Module` 类为第一类查询提供了以下方法：\n\n\
  *   `boolean canRead(Module other)`\n*   `boolean canUse(Class<?> service)`\n* \
  \  `boolean isExported(String packageName)`\n*   `boolean isExported(String packageName,\
  \ Module other)`\n*   `boolean isOpen(String packageName)`\n*   `boolean isOpen(String\
  \ packageName, Module other)`\n*   `boolean isNamed()`\n\n方法名称直观地说明了它们的功能。`isNamed()`\
  \ 方法对命名模块返回 `true`，对未命名模块返回 `false`。模块的类型（命名或未命名）在加载后不会改变。此方法在 `Module` 类中提供，因为您无法为未命名模块获取\
  \ `ModuleDescriptor`。\n\n`ModuleDescriptor` 包含三个方法，用于告知模块的类型以及模块描述符的生成方式。`isOpen()`\
  \ 方法在模块是开放模块时返回 `true`，否则返回 `false`。`isAutomatic()` 方法对自动模块返回 `true`，否则返回 `false`。\n\
  \n清单 15-3 包含一个名为 `QueryModule` 的类的代码，该类是 `jdojo.module.api` 模块的成员。它向您展示了如何查询模块。\n\
  \n\n\n```\n// QueryModule.java\npackage com.jdojo.module.api;\nimport java.sql.Driver;\n\
  public class QueryModule {\npublic static void main(String[] args) throws Exception\
  \ {\nClass cls = QueryModule.class;\nModule m = cls.getModule();\n// 检查此模块是否可以读取\
  \ java.sql 模块\nModule javaSqlModule = Driver.class.getModule();\nboolean canReadJavaSql\
  \ = m.canRead(javaSqlModule);\n// 检查此模块是否向所有模块导出 com.jdojo.module.api 包\nboolean\
  \ exportsModuleApiPkg = m.isExported(\"com.jdojo.module.api\");\n// 检查此模块是否向 java.sql\
  \ 模块导出 com.jdojo.module.api 包\nboolean exportsModuleApiPkgToJavaSql\n= m.isExported(\"\
  com.jdojo.module.api\", javaSqlModule);\n// 检查此模块是否向 java.sql 模块开放 com.jdojo.module.api\
  \ 包\nboolean openModuleApiPkgToJavaSql = m.isOpen(\"com.jdojo.module.api\", javaSqlModule);\n\
  // 打印模块类型和名称\nSystem.out.printf(\"命名模块: %b%n\", m.isNamed());\nSystem.out.printf(\"\
  模块名称: %s%n\", m.getName());\nSystem.out.printf(\"能否读取 java.sql? %b%n\", canReadJavaSql);\n\
  System.out.printf(\"是否导出 com.jdojo.module.api? %b%n\", exportsModuleApiPkg);\nSystem.out.printf(\"\
  是否向 java.sql 导出 com.jdojo.module.api? %b%n\",\nexportsModuleApiPkgToJavaSql);\n\
  System.out.printf(\"是否向 java.sql 开放 com.jdojo.module.api? %b%n\",\nopenModuleApiPkgToJavaSql);\n\
  }\n}\n清单 15-3.\n一个演示如何在运行时查询模块的 QueryModule 类\n```\n\n```\n命名模块: true\n模块名称: jdojo.module.api\n\
  能否读取 java.sql? true\n是否导出 com.jdojo.module.api? true\n是否向 java.sql 导出 com.jdojo.module.api?\
  \ true\n是否向 java.sql 开放 com.jdojo.module.api? false\n```\n\n更新模块\n\n在下一章中，我将向你展示如何使用\
  \ `--add-exports`、`--add-opens` 和 `--add-reads` 命令行选项来添加导出、开放和读取。在本节中，我将向你展示如何以编程方式实现相同的效果。`Module`\
  \ 类包含以下方法，允许你在运行时修改模块声明：\n\n*   `Module addExports(String packageName, Module other)`\n\
  \n*   `Module addOpens(String packageName, Module other)`\n\n*   `Module addReads(Module\
  \ other)`\n\n*   `Module addUses(Class<?> serviceType)`\n\n使用命令行选项和这些方法之一来修改模块声明之间存在显著差异。使用命令行选项，你可以修改任何模块的声明。然而，这些方法是对调用者敏感的。调用这些方法的代码必须位于其声明正在被修改的模块中——除了调用\
  \ `addOpens()` 方法的情况。也就是说，如果你无法访问某个模块的源代码，就不能使用这些方法来修改该模块的声明。这些方法通常旨在供框架使用，框架可以适应运行时需求以与其他模块交互。\n\
  \n当处理一个命名模块，且调用者不被允许调用这些方法时，这些方法会抛出 `IllegalCallerException`。\n\n`addExports()`\
  \ 方法更新模块，将指定的包导出到指定的模块。如果指定的包已经导出或开放给指定的模块，或者该方法是在未命名模块或开放模块上调用的，则调用此方法无效。如果指定的包为\
  \ `null` 或不存在于该模块中，则会抛出 `IllegalArgumentException`。调用此方法的效果与向模块声明中添加限定导出相同：\n\n\
  ```\nexports <包名> to <模块名>;\n```\n\n`addOpens()` 方法的工作方式与 `addExports()` 方法相同，不同之处在于它更新模块以将指定的包开放给指定的模块。它类似于在模块中添加以下语句：\n\
  \n```\nopens <包名> to <模块名>;\n```\n\n`addOpens()` 方法在谁可以调用此方法这一规则上做出了例外。其他方法必须从同一模块的代码中调用。然而，一个模块的\
  \ `addOpens()` 方法可以从另一个模块的代码中调用。假设模块 `M` 使用以下声明将包 `P` 开放给模块 `N`：\n\n```\nmodule\
  \ M {\nopens P to N;\n}\n```\n\n在这种情况下，允许模块 `N` 调用模块 `M` 上的 `addOpens(\"P\", S)`\
  \ 方法，这允许模块 `N` 将包 `P` 开放给模块 `S`。当模块的作者可能将一个模块的包开放给一个已知的抽象框架模块，而该框架在运行时发现并使用另一个实现模块时，就会发生这种情况。这两个动态已知的模块可能都需要对正在声明的模块进行深度反射访问。在这种情况下，模块的作者只需要知道抽象框架的模块名称，并将包开放给它。在运行时，抽象框架的模块可以将同一个包开放给动态发现的实现模块。可以将\
  \ JPA 视为一个定义 `java.persistence` 模块的抽象框架，并在运行时发现其他 JPA 实现，如 Hibernate 和 EclipseLink。在这种情况下，模块的作者只能将包开放给\
  \ `java.persistence` 模块，而该模块可以在运行时将同一个包开放给 Hibernate 或 EclipseLink 模块。\n\n`addReads()`\
  \ 方法从此模块向指定模块添加一条可读性边。如果指定的模块是自身（因为每个模块都可以读取自身），或者该方法是在未命名模块上调用的（因为未命名模块可以读取所有其他模块），则此方法无效。调用此方法等同于在模块声明中添加一条\
  \ `requires` 语句：\n\n```\nrequires <模块名>;\n```\n\n`addUses()` 方法更新模块以添加服务依赖，这样它就可以使用\
  \ `ServiceLoader` 类来加载指定服务类型的服务。当在未命名模块或自动模块上调用时，它无效。其效果等同于在模块声明中添加以下 `uses` 语句：\n\
  \n```\nuses <服务类型>;\n```\n\n清单 15-4 包含一个 `UpdateModule` 类的代码。它位于 `jdojo.module.api`\
  \ 模块中，如清单 15-1 所示。请注意，模块声明中不包含 `uses` 语句。该类包含一个 `findFirstService()` 方法，该方法接受一个服务类型作为参数。它检查模块是否可以加载该服务类型。回想一下，模块必须包含一个带有指定服务类型的\
  \ `uses` 语句，才能使用 `ServiceLoader` 类加载该服务类型。该方法使用 `Module` 类的 `addUses()` 方法，在缺少 `uses`\
  \ 语句时为该服务类型添加一条。最后，该方法加载并返回第一个加载的服务提供者。\n\n```\n// UpdateModule.java\npackage com.jdojo.module.api;\n\
  import java.util.ServiceLoader;\npublic class UpdateModule {\npublic static <T>\
  \ T findFirstService(Class<T> service) {\n// 在加载服务提供者之前，检查此模块是否可以使用（或加载）\n// 该服务。如果不能，则更新模块以使用该服务。\n\
  Module m = UpdateModule.class.getModule();\nif (!m.canUse(service)) {\nm.addUses(service);\n\
  }\nreturn ServiceLoader.load(service)\n.findFirst()\n.orElseThrow(\n() -> new RuntimeException(\"\
  未找到服务类型的服务提供者: \"\n+ service.getName()));\n}\n}\n清单 15-4.\n一个演示如何在运行时向模块声明添加 uses\
  \ 语句的 UpdateModule 类\n```\n\n现在我们将测试 `UpdateModule` 类的 `findFirstService()` 方法。清单\
  \ 15-5 包含一个名为 `jdojo.module.api.test` 的模块的声明。\n\n```\n// module-info.java\nmodule\
  \ jdojo.module.api.test {\nrequires jdojo.prime;\nrequires jdojo.module.api;\n}\n\
  清单 15-5.\n名为 jdojo.module.api.test 的模块的声明\n```\n\n\n\n`jdojo.module.api.test` 模块声明了对\
  \ `jdojo.prime` 模块的依赖，因此它可以\n使用 `PrimeChecker` 服务类型接口。它还声明了对 `jdojo.module.api`\
  \ 模块的依赖，\n以便使用 `UpdateModule` 类来加载服务。你需要在 NetBeans 中将这两个模块添加到\n`com.jdojo.module.api.test`\
  \ 模块的模块路径中。清单 15-6 包含了\n`com.jdojo.module.api.test` 模块中 `Main` 类的代码。\n\n```\n//\
  \ Main.java\npackage com.jdojo.module.api.test;\nimport com.jdojo.module.api.UpdateModule;\n\
  import com.jdojo.prime.PrimeChecker;\npublic class Main {\npublic static void main(String[]\
  \ args) {\nlong[] numbers = {3, 10};\ntry {\n// 获取 com.jdojo.prime.PrimeChecker\
  \ 服务类型的服务提供者\nPrimeChecker pc = UpdateModule.findFirstService(PrimeChecker.class);\n\
  // 检查几个数字是否为质数\nfor (long n : numbers) {\nboolean isPrime = pc.isPrime(n);\nSystem.out.printf(\"\
  %d is a prime: %b%n\", n, isPrime);\n}\n} catch (RuntimeException e) {\nSystem.out.println(e.getMessage());\n\
  }\n}\n}\n清单 15-6.\ncom.jdojo.module.api.test 模块中的 Main 方法\n```\n\n尝试按如下方式运行 `Main`\
  \ 类。确保将 `jdojo.intro` 模块添加到\n模块路径中，因为 `jdojo.module.api.test` 模块读取了 `jdojo.module.api`\
  \ 模块，\n而后者又读取了 `jdojo.intro` 模块。\n\n```\nc:\\Java9LanguageFeatures>java --module-path\
  \ dist\\jdojo.prime.jar;dist\\jdojo.intro.jar;dist\\jdojo.module.api.jar;dist\\\
  jdojo.module.api.test.jar --module jdojo.module.api.test/com.jdojo.module.api.test.Main\n\
  ```\n\n```\n3 is a prime: true\n10 is a prime: false\n```\n\n访问模块资源\n\n资源由应用程序使用的数据组成，例如图像、音频、视频、文本文件等。访问资源是每个\
  \ Java 开发人员都要执行的一项重要任务。Java 提供了以位置无关方式访问资源的 API。通常，类文件和资源被打包在同一个 JAR 中。随着 JDK9 中模块系统的引入，访问资源的规则发生了变化。在接下来的几节中，我将解释\
  \ JDK9 及 JDK9 之前访问资源的 API。\n\nJDK9 之前访问资源\n\n在本节中，我将解释 JDK9 之前是如何访问资源的。如果你已经知道如何在\
  \ JDK9 之前访问资源，可以跳到下一节，该节描述了如何在 JDK9 中访问资源。\n\n在 Java 代码中，资源由资源名称标识，资源名称是由斜杠 (`/`)\
  \ 分隔的字符串序列。对于存储在 JAR 中的资源，资源名称就是存储在 JAR 中的文件的路径。例如，在 JDK9 之前，存储在名为 `rt.jar` 的文件中的\
  \ `java.lang` 包中的 `Object.class` 文件就是一个资源，其资源名称为 `java/lang/Object.class`。\n\n在\
  \ JDK9 之前，你可以使用以下两个类中的方法来访问资源：\n\n*   `java.lang.Class`\n\n*   `java.lang.ClassLoader`\n\
  \n资源由 `ClassLoader` 定位。`Class` 类中的资源查找方法会委托给它的 `ClassLoader`。因此，一旦你理解了 `ClassLoader`\
  \ 使用的资源加载过程，使用 `Class` 类的方法就不会有问题。这两个类中都有以下两个实例方法：\n\n*   `URL getResource(String\
  \ name)`\n\n*   `InputStream getResourceAsStream(String name)`\n\n这两个方法以相同的方式查找资源。它们的区别仅在于返回类型。第一个方法返回一个\
  \ `URL`，而第二个方法返回一个 `InputStream`。第二个方法等效于调用第一个方法，然后对返回的 `URL` 对象调用 `openStream()`。\n\
  \n提示\n\n如果未找到指定的资源，所有资源查找方法都返回 `null`。\n\n`ClassLoader` 类包含另外三个用于查找资源的静态方法：\n\n\
  *   `static URL getSystemResource(String name)`\n\n*   `static InputStream getSystemResourceAsStream(String\
  \ name)`\n\n*   `static Enumeration<URL> getSystemResources(String name)`\n\n这些方法使用系统类加载器（也称为应用程序类加载器）来查找资源。第一个方法返回找到的第一个资源的\
  \ `URL`。第二个方法返回找到的第一个资源的 `InputStream`。第三个方法返回一个 `Enumeration`，其中包含所有找到的具有指定资源名称的资源的\
  \ URL。\n\n要查找资源，你可以从两种类型的方法中进行选择——`getSystemResource*` 和 `getResource*`。在我解释使用哪种方法之前，理解你可以访问两种类型的资源非常重要：\n\
  \n*   系统资源\n\n*   非系统资源\n\n你必须理解它们之间的区别，才能理解资源查找机制。系统资源是在类路径上找到的资源——引导类路径、扩展目录中的\
  \ JAR 以及应用程序类路径。非系统资源可能存储在类路径以外的位置，例如特定目录、网络或数据库中。`getSystemResource()` 方法使用应用程序类加载器查找资源，该加载器委托给其父加载器（扩展类加载器），而扩展类加载器又委托给其父加载器（引导类加载器）。如果你的应用程序是独立应用程序，并且仅使用三个内置的\
  \ JDK 类加载器，那么使用名为 `getSystemResource*` 的静态方法就可以了。这些方法将找到类路径上的所有资源，包括运行时映像中的资源，例如\
  \ `rt.jar` 文件中的资源。如果你的应用程序是在浏览器中运行的 applet，或者是在应用服务器或 Web 服务器中运行的企业应用程序，则应使用名为 `getResource*`\
  \ 的实例方法，这些方法允许你使用特定的类加载器查找资源。如果你在 `Class` 对象上调用 `getResource*` 方法，则会使用当前类加载器（即加载该\
  \ `Class` 对象的类加载器）来查找资源。\n\n传递给 `ClassLoader` 类中所有方法的资源名称都是绝对路径，并且不以斜杠 (`/`) 开头。例如，在调用\
  \ `ClassLoader` 的 `getSystemResource()` 方法时，你会使用 `java/lang/Object.class` 作为资源名称。\n\
  \n`Class` 类中的资源查找方法允许你指定绝对资源名称和相对资源名称。绝对资源名称以斜杠开头，而相对资源名称则不以斜杠开头。当使用绝对名称时，`Class`\
  \ 类中的方法会移除开头的斜杠，并委托给加载该 `Class` 对象的类加载器来查找资源。以下调用\n\n```\nTest.class.getResource(\"\
  /resources/test.config\");\n```\n\n会被转换为\n\n```\nTest.class.getClassLoader()\n.getResource(\"\
  resources/test.config\");\n```\n\n当使用相对名称时，`Class` 类中的方法会在委托给加载该 `Class` 对象的类加载器查找资源之前，在包名前加上包名，并将包名中的点替换为斜杠，然后再添加一个斜杠。假设\
  \ `Test` 类位于 `com.jdojo.test` 包中，以下调用\n\n```\nTest.class.getResource(\"resources/test.config\"\
  );\n```\n\n会被转换为\n\n```\nTest.class.getClassLoader()\n.getResource(\"com/jdojo/test/resources/test.config\"\
  );\n```\n\n让我们看一个 JDK9 之前查找资源的示例。我使用 JDK8 运行该示例。你可以在本书的可下载源代码中找到其源代码以及一个 NetBeans\
  \ 项目。该 NetBeans 项目名为 `jdojo.resource.preJDK9`。如果你创建自己的项目，请确保将项目的 Java 平台和源代码更改为\
  \ JDK8。类和资源的安排如下：\n\n*   `wordtonumber.properties`\n\n*   `com/jdojo/resource/prejdk9/ResourceTest.class`\n\
  \n*   `com/jdojo/resource/prejdk9/resources/numbertoword.properties`\n\n\n\n项目包含两个资源文件：根目录下的\
  \ `wordtonumber.properties` 和 `com/jdojo/resource/prejdk9/resources` 目录下的 `numbertoword.properties`。这些属性文件的内容如清单\
  \ 15-7 和清单 15-8 所示。\n\n```\nOne=1\nTwo=2\nThree=3\nFour=4\nFive=5\n清单 15-7.\nwordtonumber.properties\
  \ 文件的内容\n```\n\n```\n1=One\n2=Two\n3=Three\n4=Four\n5=Five\n清单 15-8.\nnumbertoword.properties\
  \ 文件的内容\n```\n\n清单 15-9 包含一个完整的程序，演示了如何使用不同的类及其方法来查找资源。该程序表明，你可以将应用程序中的类文件用作资源，并且可以使用与其他类型资源相同的查找方法来定位它们。你可能会得到不同的输出，这取决于你机器上资源的位置以及\
  \ JDK9 的版本。\n\n```\n// ResourceTest.java\npackage com.jdojo.resource.prejdk9;\n\
  import java.io.IOException;\nimport java.net.URL;\nimport java.util.Properties;\n\
  public class ResourceTest {\npublic static void main(String[] args) {\nSystem.out.println(\"\
  使用系统类加载器查找资源：\");\nfindSystemResource(\"java/lang/Object.class\");\nfindSystemResource(\"\
  com/jdojo/resource/prejdk9/ResourceTest.class\");\nfindSystemResource(\"com/jdojo/prime/PrimeChecker.class\"\
  );\nfindSystemResource(\"sun/print/resources/duplex.png\");\nSystem.out.println(\"\
  \\n 使用 Class 类查找资源：\");\n// 相对资源名称 - 不会找到 Object.class\nfindClassResource(\"java/lang/Object.class\"\
  );\n// 绝对资源名称 - 会找到 Object.class\nfindClassResource(\"/java/lang/Object.class\"\
  );\n// 相对资源名称 - 会找到该类\nfindClassResource(\"ResourceTest.class\");\n// 加载 wordtonumber.properties\
  \ 文件\nloadProperties(\"/wordtonumber.properties\");\n// 不会找到该属性文件，因为我们使用了绝对资源名称\n\
  loadProperties(\"/resources/numbertoword.properties\");\n// 会找到该属性文件\nloadProperties(\"\
  resources/numbertoword.properties\");\n}\npublic static void findSystemResource(String\
  \ resource) {\nURL url = ClassLoader.getSystemResource(resource);\nSystem.out.println(url);\n\
  }\npublic static URL findClassResource(String resource) {\nURL url = ResourceTest.class.getResource(resource);\n\
  System.out.println(url);\nreturn url ;\n}\npublic static Properties loadProperties(String\
  \ resource) {\nProperties p1 = new Properties();\nURL url = ResourceTest.class.getResource(resource);\n\
  if (url == null) {\nSystem.out.println(\"未找到属性文件：\" + resource);\nreturn p1;\n}\n\
  try {\np1.load(url.openStream());\nSystem.out.println(\"已从 \" + resource + \" 加载属性文件\"\
  );\nSystem.out.println(p1);\n} catch (IOException e) {\nSystem.out.println(e.getMessage());\n\
  }\nreturn p1;\n}\n}\n清单 15-9.\n演示如何在 Pre-JDK9 代码中查找资源的测试类\n```\n\n```\n使用系统类加载器查找资源：\n\
  jar:file:/C:/java8/jre/lib/rt.jar!/java/lang/Object.class\nfile:/C:/jdojo.resource.preJDK9/build/classes/com/jdojo/resource/prejdk9/ResourceTest.class\n\
  null\njar:file:/C:/java8/jre/lib/resources.jar!/sun/print/resources/duplex.png\n\
  使用 Class 类查找资源：\nnull\njar:file:/C:/java8/jre/lib/rt.jar!/java/lang/Object.class\n\
  file:/C:/jdojo.resource.preJDK9/build/classes/com/jdojo/resource/prejdk9/ResourceTest.class\n\
  已从 /wordtonumber.properties 加载属性文件\n{One=1, Three=3, Four=4, Five=5, Two=2}\n未找到属性文件：/resources/numbertoword.properties\n\
  已从 resources/numbertoword.properties 加载属性文件\n{5=Five, 4=Four, 3=Three, 2=Two, 1=One}\n\
  ```\n\n在 JDK9 中访问资源\n\n在 JDK9 之前，你可以从类路径上的任何 JAR 文件中访问资源。在 JDK9 中，类和资源被封装在模块中。最初，JDK9\
  \ 的设计者强制实施了模块封装规则，即模块中的资源必须对该模块私有，因此它们只能被该模块内的代码访问。虽然这条规则在理论上看起来不错，但它给那些跨模块共享资源以及从其他模块加载类文件作为资源的框架带来了问题。最终达成了一种折衷方案，允许对模块中的资源进行有限访问，同时仍然强制实施模块的封装性。JDK9\
  \ 在三个类中包含了资源查找方法：\n\n*   `java.lang.Class`\n\n*   `java.lang.ClassLoader`\n\n* \
  \  `java.lang.Module`\n\n`Class` 和 `ClassLoader` 类在 JDK9 中没有新增任何方法。`Module` 类包含一个\
  \ `getResourceAsStream(String name)` 方法，如果找到资源，则返回一个 `InputStream`；否则返回 `null`。\n\
  \n资源命名语法\n\n资源使用由斜杠分隔的字符串序列来命名，例如 `com/jdojo/states.png`、`/com/jdojo/words.png`\
  \ 和 `logo.png`。如果资源名称以斜杠开头，则被视为绝对资源名称。包名根据资源名称使用以下规则计算得出：\n\n*   如果资源名称以斜杠开头，则移除开头的斜杠。例如，对于名为\
  \ `/com/jdojo/words.png` 的资源，此步骤得到 `com/jdojo/words.png`。\n\n*   从资源名称中移除从最后一个斜杠开始的所有字符。在此示例中，`com/jdojo/words.png`\
  \ 得到 `com/jdojo`。\n\n*   将名称中所有剩余的斜杠替换为句点（`.`）。因此，`com/jdojo` 被转换为 `com.jdojo`。得到的字符串即为包名。\n\
  \n在某些情况下，使用这些步骤会导致未命名包或无效的包名。请记住，包名（如果存在）必须由有效的 Java 标识符组成。如果没有包名，则称为未命名包。考虑将 `META-INF/resource/logo.png`\
  \ 作为资源名称。应用上述规则，其包名将被计算为 `META-INF.resources`，这不是一个有效的包名，但它是一个有效的资源路径。\n\n查找资源的规则\n\
  \n由于向后兼容性以及模块系统所承诺的字符串封装，JDK9 中查找资源的新规则较为复杂，并基于以下几个因素：\n\n*   包含资源的模块类型：具名模块、开放模块、未命名模块或自动模块。\n\
  \n*   访问资源的模块：是同一个模块还是不同的模块？\n\n*   被访问资源的包名：是有效的还是无效的 Java 包？是未命名包吗？\n\n*   包含资源的包的封装性：包含资源的包是已导出、已开放还是对访问资源的模块进行了封装？\n\
  \n*   被访问资源的文件扩展名：资源是 `.class` 文件还是其他类型的文件？\n\n*   用于访问资源的类的方法：是 `Class`、`ClassLoader`\
  \ 还是 `Module`？\n\n以下规则适用于包含在**具名模块**中的资源：\n\n*   如果资源名称以 `.class` 结尾，则任何模块中的代码都可以访问该资源。也就是说，任何模块都可以访问任何具名模块中的类文件。\n\
  \n*   如果根据资源名称计算出的包名不是有效的 Java 包名（例如 `META-INF.resources`），则任何模块中的代码都可以访问该资源。\n\n\
  *   如果根据资源名称计算出的包名是未命名包（例如对于 `words.png` 这样的资源名称），则任何模块中的代码都可以访问该资源。\n\n\n\n*  \
  \ 如果包含资源的包对访问该资源的模块开放，则该模块中的代码可以访问该资源。一个包可以对某个模块开放，原因可能是定义该包的模块是一个开放模块，或者该模块向所有其他模块开放了该包，又或者该模块使用带限定符的\
  \ `opens` 语句仅向特定模块开放了该包。如果某个包未通过以上任何方式开放，则该包中的资源无法被该模块外部的代码访问。\n\n*   此规则是上一条规则的衍生。未命名模块、自动模块或开放模块中的每个包都是开放的，因此这些模块中的所有资源都可以被所有其他模块中的代码访问。\n\
  \n提示\n\n命名模块中的包必须被开放（而非导出）才能访问其资源。导出模块的包允许其他模块访问该包中的公共类型（而非资源）。\n\n`Module`、`Class`\
  \ 和 `ClassLoader` 类中的各种资源查找方法在访问命名模块中的资源时行为有所不同：\n\n*   你可以使用 `Module` 类的 `getResourceAsStream()`\
  \ 方法来访问模块中的资源。此方法对调用者敏感。如果调用者模块不同，此方法将应用之前描述的所有资源可访问性规则。\n\n*   在命名模块中定义的类的 `Class`\
  \ 对象中的 `getResource*()` 方法仅在该命名模块中定位资源。也就是说，你不能使用这些方法来定位命名模块外部的资源。\n\n*   `ClassLoader`\
  \ 类中的 `getResource*()` 方法根据前面描述的规则列表在命名模块中定位资源。这些方法对调用者不敏感。类加载器在尝试自行定位资源之前，会先将资源搜索委托给其父加载器。这些方法有两个例外：1)\
  \ 它们仅定位无条件开放包中的资源。如果某个包使用带限定符的 `opens` 语句对特定模块开放，这些方法将不会定位这些包中的资源。2) 它们会搜索在类加载器中定义的模块。\n\
  \n`Class` 对象将仅在其所属的模块中查找资源。它还支持以斜杠开头的绝对资源名称和不以斜杠开头的相对资源名称。以下是使用 `Class` 对象的一些示例：\n\
  \n```\n// 将找到该资源\nURL url1 = Test.class.getResource(\"Test.class\");\n// 不会找到该资源，因为\
  \ Test 和 Object 类位于不同的模块中\nURL url2 = Test.class.getResource(\"/java/lang/Object.class\"\
  );\n// 将找到该资源，因为 Object 和 Class 类位于同一模块 java.base 中\nURL url3 = Object.class.getResource(\"\
  /java/lang/Class.class\");\n// 不会找到该资源，因为 Object 类位于 java.base 模块中，\n// 而 Driver\
  \ 类位于 java.sql 模块中\nURL url4 = Object.class.getResource(\"/java/sql/Driver.class\"\
  );\n```\n\n使用 `Module` 类定位资源需要你拥有该模块的引用。如果你可以访问该模块中的某个类，则在该 `Class` 对象上使用 `getModule()`\
  \ 方法即可获得该模块的引用。这是获取模块引用的最简单方法。有时，你只有模块名称的字符串，但没有该模块中某个类的引用。你可以通过模块名称找到模块引用。模块被组织成层，这些层由\
  \ `java.lang` 包中的 `ModuleLayer` 类的实例表示。JVM 至少包含一个称为引导层的层。引导层中的模块映射到内置的类加载器——引导类加载器、平台类加载器和应用程序类加载器。你可以使用\
  \ `ModuleLayer` 类的 `boot()` 静态方法获取引导层的引用：\n\n```\n// 获取引导层\nModuleLayer bootLayer\
  \ = ModuleLayer.boot();\n```\n\n一旦获得引导层的引用，你就可以使用其 `findModule(String moduleName)`\
  \ 方法来获取模块的引用：\n\n```\n// 在引导层中查找名为 com.jdojo.resource 的模块\nOptional m = bootLayer.findModule(\"\
  jdojo.resource\");\n// 如果找到了该模块，则在该模块中查找资源\nif (m.isPresent()) {\nModule testModule\
  \ = m.get();\nString resource = \"com/jdojo/resource/opened/opened.properties\"\
  ;\nInputStream input = module.getResourceAsStream(resource);\nif (input != null)\
  \ {\nSystem.out.println(resource + \" found.\");\n} else {\nSystem.out.println(resource\
  \ + \" not found.\");\n}\n} else {\nSystem.out.println(\"Module jdojo.resource does\
  \ not exist\");\n}\n```\n\n让我们看看资源查找规则的实际应用。你将把资源打包到一个名为 `jdojo.resource` 的模块中，其声明如清单\
  \ 15-10 所示。\n\n```\n// module-info.java\nmodule jdojo.resource {\nexports com.jdojo.exported;\n\
  opens com.jdojo.opened;\n}\n清单 15-10.\n名为 jdojo.resource 的模块的模块声明\n```\n\n该模块导出了\
  \ `com.jdojo.exported` 包，并开放了 `com.jdojo.opened` 包。以下是 `com.jdojo.resource` 模块中所有文件的列表：\n\
  \n*   `module-info.class`\n\n*   `unnamed.properties`\n\n*   `META-INF\\invalid_pkg.properties`\n\
  \n*   `com\\jdojo\\encapsulated\\encapsulated.properties`\n\n*   `com\\jdojo\\encapsulated\\\
  EncapsulatedTest.class`\n\n*   `com\\jdojo\\exported\\AppResource.class`\n\n*  \
  \ `com\\jdojo\\exported\\exported.properties`\n\n*   `com\\jdojo\\opened\\opened.properties`\n\
  \n*   `com\\jdojo\\opened\\OpenedTest.class`\n\n共有四个类文件。在此示例中，只有 `module-info.class`\
  \ 文件是重要的。其他类文件定义了一个同名的类，但没有任何细节。所有扩展名为 `.properties` 的文件都是资源文件，其内容在此示例中并不重要。本书附带的源代码包含这些文件的内容。为节省篇幅，此处不展示这些文件的内容。\n\
  \n`unnamed.properties` 文件位于未命名包中，因此任何其他模块中的代码都可以定位它。`invalid_pkg.properties` 文件位于\
