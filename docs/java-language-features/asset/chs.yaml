  \n11. 你使用 `Thread` 类的哪个方法来检查线程是已终止还是存活？\n\n12. 描述线程的以下六种状态：`New`、`Runnable`、`Blocked`、`Waiting`、`Timed-waiting`\
  \ 和 `Terminated`。`Thread` 类中的哪个方法返回线程的状态？\n\n13. 在线程终止后，你能通过调用其 `start()` 方法来重新启动它吗？\n\
  \n14. 什么是线程饥饿？\n\n15. 什么是守护线程？当 JVM 检测到应用程序中只运行着守护线程时会发生什么？主线程和垃圾回收线程是守护线程吗？\n\n\
  16. 如何中断一个线程？调用 `Thread` 类的实例方法 `isInterrupted()` 和静态方法 `interrupted()` 有什么区别？当一个被阻塞的线程被中断时会发生什么？\n\
  \n17. 什么是线程组？线程的默认线程组是什么？如何获取线程组中活动线程的估计数量？\n\n18. 描述 volatile 变量在 Java 程序中的用途。\n\
  \n19. 使用 `AtomicLong` 变量与使用带有同步 getter 和 setter 的 `long` 变量有什么区别？\n\n20. 什么是信号量、屏障、相位器、闭锁和交换器？说出\
  \ Java 中代表这些同步器实例的类名。\n\n21. 什么是执行器框架？`Executor` 接口的实例和 `ExecutorService` 接口的实例有什么区别？你使用哪个类来获取一个预配置的\
  \ `Executor` 实例？\n\n22. 如果你想向 `Executor` 提交一个能返回结果的任务，该任务需要是哪个接口的实例：`Runnable` 还是\
  \ `Callable<T>`？\n\n23. `Future<T>` 接口的实例代表什么？\n\n24. 使用 `shutdown()` 和 `shutdownNow()`\
  \ 方法关闭执行器有什么区别？\n\n25. 什么是 Fork/Join 框架？\n\n26. 描述 `ThreadLocal<T>` 类的用途。\n\n27.\
  \ 你使用哪个 JVM 选项来设置 Java 线程的栈大小？\n\n28. 创建一个继承自 `Thread` 类的类。当该类的实例作为线程运行时，它应该打印类似\
  \ `1<name> 2<name>, …N<name>` 的文本，其中 `<name>` 是你指定的线程名称，`N` 是要打印的从 1 开始的整数上限。例如，如果你用\
  \ 100 和 “A” 创建了该类的一个实例，它应该打印 1A 2A 3A…100A。创建你的类的三个线程并同时运行它们。\n\n\n\n29.  创建一个名为\
  \ `BankAccount` 的类。该类的实例代表一个银行账户。它应包含三个方法：`deposit()`、`withdraw()` 和 `balance()`。它们分别用于存款、取款和返回账户余额。其实例变量\
  \ `balance` 应存储账户余额，并初始化为 100。账户余额不得低于 100。请勿在此类中使用任何线程同步结构或关键字。创建一个 `BankAccount`\
  \ 类的实例。将此实例传递给四个线程——两个线程应存钱，两个线程应取钱。存款和取款金额应在 1 到 10 之间随机选择。启动另一个线程，即监控线程，该线程持续调用\
  \ `balance()` 方法来检查余额是否低于 100。当余额低于 100 时，它应打印一条消息并退出应用程序。\n\n30.  创建 `BankAccount`\
  \ 类的另一个副本，并将其命名为 `Account`。使用线程同步来保护对 `Account` 类中 `balance` 实例变量的访问，使其值永远不会低于 100。运行与上一个练习相同数量的线程，持续五分钟。这次，监控线程不应打印任何消息。五分钟后，所有线程应被中断，并且您的线程应通过完成任务来响应中断。这样，您的应用程序应在五分钟后正常退出。\n\
  \n7.  输入/输出\n\n在本章中，您将学习：\n\n*   什么是输入/输出\n\n*   如何使用 `File` 对象来表示文件系统中文件或目录的抽象路径名\n\
  \n*   装饰器模式\n\n*   基于字节和基于字符的输入/输出流\n\n*   从文件读取数据以及将数据写入文件\n\n*   向输入/输出流读写基本类型和引用类型数据\n\
  \n*   对象序列化和反序列化\n\n*   如何开发自定义的输入/输出流类\n\n*   使用 `Console` 和 `Scanner` 类与控制台交互\n\
  \n*   使用 `StringTokenizer` 和 `StreamTokenizer` 类根据分隔符将文本分割成标记\n\n本章中的所有示例程序都是 `jdojo.io`\
  \ 模块的成员，如清单 7-1 中所声明。\n\n```\n// module-info.java\nmodule jdojo.io {\n    exports\
  \ com.jdojo.io;\n}\n清单 7-1. jdojo.io 模块的声明\n```\n\n什么是输入/输出？\n\n输入/输出（I/O）涉及从源读取数据和向目标写入数据。数据从输入源（或简称为输入）读取，并写入到输出目标（或简称为输出）。例如，您的键盘作为标准输入，允许您将使用键盘输入的数据读入程序。从第一个\
  \ Java 程序开始，您就一直在使用 `System.out.println()` 方法在标准输出上打印文本，而您可能并未意识到自己一直在执行 I/O 操作。\n\
  \n通常，您使用 I/O 读取存储在文件中的数据，或将数据写入文件。然而，您的输入和输出并不仅限于文件。您可以从 `String` 对象读取数据，并将其写入另一个\
  \ `String` 对象。在这种情况下，输入是一个 `String` 对象；输出也是一个 `String` 对象。您可以从文件读取数据并将其写入 `String`\
  \ 对象，这将使用文件作为输入，`String` 对象作为输出。输入和输出有许多可能的组合。输入和输出不必始终一起使用。您可以在程序中仅使用输入，例如将文件内容读入\
  \ Java 程序。您也可以在程序中仅使用输出，例如将计算结果写入文件。\n\n`java.io` 和 `java.nio`（`nio` 代表新 I/O）包包含处理\
  \ I/O 的 Java 类。`java.io` 包中有数量庞大的类来执行 I/O 操作。这使得学习 Java I/O 变得有些复杂。类数量增加到难以管理程度的情况称为类爆炸，而\
  \ `java.io` 包就是一个很好的例子。难怪市面上有些书只讨论 Java I/O。这些书逐一描述了所有 Java I/O 类。本章从不同的角度审视 Java\
  \ I/O。首先，您将了解用于设计 Java I/O 类的设计模式。一旦理解了设计模式，就很容易理解如何使用这些类来执行 I/O 操作。毕竟，I/O 无非就是读写数据，理解起来不应该那么困难！在开始研究\
  \ I/O 类的设计模式之前，您将在下一节学习如何处理文件。\n\n处理文件\n\n您如何引用计算机中的文件？您通过其路径名来引用它。文件的路径名是一系列字符，通过它您可以在文件系统中唯一地标识该文件。路径名由文件名及其在文件系统中的唯一位置组成。例如，在\
  \ Windows 平台上，`C:\\users\\dummy.txt` 是名为 `dummy.txt` 的文件的路径名，该文件位于名为 `users` 的目录中，而该目录又位于\
  \ `C:` 驱动器的根目录中。在 UNIX 平台上，`/users/dummy` 是名为 `dummy` 的文件的路径名，该文件位于名为 `users` 的目录中，而该目录又位于根目录中。\n\
  \n路径名可以是绝对路径名，也可以是相对路径名。绝对路径名指向文件系统中相同的位置，与当前工作目录无关。例如，在 Windows 平台上，`C:\\users\\\
  dummy.txt` 是一个绝对路径名。\n\n相对路径名是相对于工作目录来解析的。假设 `dummy.txt` 是您的路径名。如果工作目录是 `C:\\`，则此路径名指向\
  \ `C:\\dummy.txt`。如果工作目录是 `C:\\users`，则它指向 `C:\\users\\dummy.txt`。请注意，如果您为文件指定了相对路径名，则根据当前工作目录的不同，它指向不同的文件。以根目录开头的路径名是绝对路径名。正斜杠（`/`）是\
  \ UNIX 平台上的根目录，而驱动器号后跟反斜杠（例如 `A:\\` 或 `C:\\`）定义了 Windows 平台的根目录。\n\n提示\n\n路径名语法是平台相关的。使用平台相关语法表示路径名的程序可能无法在其他平台上正常运行。在本章中，大多数情况下我使用术语“文件”来指代文件或目录。\n\
  \n创建 File 对象\n\n`File` 类的对象是以平台无关的方式对文件或目录的路径名的抽象表示。使用 `File` 类的以下构造函数，您可以从路径名、父路径名和子路径名以及\
  \ URI 创建 `File` 对象：\n\n*   `File(String pathname)`\n\n*   `File(File parent, String\
  \ child)`\n\n*   `File(String parent, String child)`\n\n*   `File(URI uri)`\n\n\
  如果您有一个名为“`dummy.txt`”的文件路径名，您可以像这样创建一个 `File` 对象：\n\n```\nFile dummyFile = new File(\"\
  dummy.txt\");\n```\n\n请注意，使用此语句创建 `File` 对象时，名为 `dummy.txt` 的文件不必存在。`dummyFile`\
  \ 对象表示一个抽象路径名，它可能指向也可能不指向文件系统中的真实文件。\n\n`File` 类包含多个用于处理文件和目录的方法。使用 `File` 对象，您可以创建新文件、删除现有文件、重命名文件、更改文件权限等。您将在后续章节中看到所有这些对文件的操作。\n\
  \n提示\n\n\n\n`File` 类包含两个方法：`isFile()` 和 `isDirectory()`。使用这些方法可以判断一个 `File` 对象代表的是文件还是目录。\n\
  \n了解当前工作目录\n\n当前工作目录的概念与操作系统相关，而与 Java 编程语言或 Java I/O 无关。当进程启动时，它会使用当前工作目录来解析文件的相对路径。当你运行\
  \ Java 程序时，JVM 作为一个进程运行，因此它拥有一个当前工作目录。JVM 的当前工作目录值取决于你如何运行 `java` 命令。你可以通过读取 `user.dir`\
  \ 系统属性来获取 JVM 的当前工作目录，如下所示：\n\n```\nString workingDir = System.getProperty(\"user.dir\"\
  );\n```\n\n此时，你可能会想在正在运行的 Java 程序中使用 `System.setProperty()` 方法来更改 JVM 的当前工作目录。以下代码片段不会产生任何错误，但也不会更改当前工作目录：\n\
  \n```\nSystem.setProperty(\"user.dir\", \"C:\\\\kishori\");\n```\n\n在 Java 程序中尝试设置当前工作目录后，`System.getProperty(\"\
  user.dir\")` 会返回新值。然而，JVM 在解析相对文件路径时，会继续使用 JVM 启动时设置的当前工作目录，而不是通过 `System.setProperty()`\
  \ 方法更改的那个。\n\n提示\n\nJava 设计者认为允许在正在运行的 Java 程序中途更改 JVM 的当前工作目录过于复杂。例如，如果允许这样做，同一个相对路径名在同一运行中的\
  \ JVM 中，在不同时间会解析为不同的绝对路径，从而导致程序行为不一致。\n\n你也可以将 JVM 的当前工作目录指定为 `user.dir` 属性值，作为\
  \ JVM 选项。要在 Windows 上将 `C:\\test` 指定为 `user.dir` 系统属性值，可以像这样运行程序：\n\n```\njava –Duser.dir=C:\\\
  test \n```\n\n检查文件是否存在\n\n你可以使用 `File` 类的 `exists()` 方法来检查 `File` 对象的抽象路径名是否存在：\n\
  \n```\n// 创建一个 File 对象\nFile dummyFile = new File(\"dummy.txt\");\n// 检查文件是否存在\n\
  boolean fileExists = dummyFile.exists();\nif (fileExists) {\nSystem.out.println(\"\
  dummy.txt 文件存在。\");\n} else {\nSystem.out.println(\"dummy.txt 文件不存在。\");\n}\n```\n\
  \n我使用了 `dummy.txt` 作为文件名，这是该文件的相对路径。`exists()` 方法会在文件系统的哪个位置查找该文件是否存在？可能没有同名文件，也可能有多个同名文件。当使用相对文件路径时，JVM\
  \ 会将当前工作目录添加到文件路径前，并使用生成的绝对路径执行所有与文件相关的实际操作。请注意，绝对路径的构建方式与平台相关。例如，如果 Windows 上的当前工作目录是\
  \ `C:\\ksharan`，文件名将被解析为 `C:\\ksharan\\dummy.txt`；如果 UNIX 上的当前工作目录是 `/users/ksharan`，文件名将被解析为\
  \ `/users/ksharan/dummy.txt`。\n\n你想走哪条路径？\n\n除了相对路径，文件还有绝对路径和规范路径。绝对路径在文件系统中唯一标识一个文件。规范路径是在文件系统中唯一标识该文件的最简单路径。两者之间的唯一区别在于规范路径的形式最简单。例如，在\
  \ Windows 上，如果你有一个路径名 `dummy.txt`，其绝对路径名是 `C:\\users\\dummy.txt`，那么路径名 `C:\\users\\\
  sharan\\..\\dummy.txt` 也代表同一个文件的绝对路径名。路径名中的两个连续点表示文件层级中的上一级。在这两个绝对路径中，第二个不是最简单的。`dummy.txt`\
  \ 的规范路径是最简单的绝对路径，即 `C:\\users\\dummy.txt`。\n\n`File` 类中的 `getAbsolutePath()` 和 `getCanonicalPath()`\
  \ 方法分别返回绝对路径和规范路径。请注意，在 Java 程序中，你需要在字符串字面量中使用双反斜杠来表示一个反斜杠；例如，路径 `C:\\users\\sharan`\
  \ 需要写成字符串 `\"C:\\\\users\\\\sharan\"`。\n\n提示\n\n`File` 类的 `getAbsoluteFile()` 和\
  \ `getCanonicalFile()` 方法分别以 `File` 对象的形式返回绝对路径和规范路径，而 `getAbsolutePath()` 和 `getCanonicalPath()`\
  \ 方法则以 `String` 形式返回相同的路径。\n\n不同平台使用不同的名称分隔符来分隔路径名的各个部分。例如，Windows 使用反斜杠（`\\`）作为名称分隔符，而类\
  \ UNIX 操作系统则使用斜杠（`/`）。`File` 类定义了两个常量：`File.separator` 和 `File.separatorChar`，分别以\
  \ `String` 和 `char` 形式表示平台相关的名称分隔符。例如，在 Windows 上，`File.separator` 的值是 `\"\\\\\"\
  `，`File.separatorChar` 的值是 `'\\\\'`；在 UNIX 上，它们的值分别是 `\"/\"` 和 `'/'`。在程序中使用这些常量的好处是，Java\
  \ 会根据程序运行的操作系统，在文件路径名中使用适当的文件分隔符。\n\n清单 7-2 演示了如何获取文件的绝对路径和规范路径。运行程序时，你可能会得到不同的输出。本章的所有示例均在\
  \ Windows 上运行，除非另有说明，否则输出将显示 Windows 路径名。\n\n```\n// FilePath.java\npackage com.jdojo.io;\n\
  import java.io.File;\nimport java.io.IOException;\npublic class FilePath {\npublic\
  \ static void main(String[] args) {\nString workingDir = System.getProperty(\"user.dir\"\
  );\nSystem.out.println(\"工作目录: \" + workingDir);\nSystem.out.println(\"----------------------\"\
  );\nString pathname = \"dummy.txt\";\nprintFilePath(pathname);\nSystem.out.println(\"\
  ----------------------\");\npathname = \"..\" + File.separator + \"notes.txt\";\n\
  printFilePath(pathname);\n}\npublic static void printFilePath(String pathname) {\n\
  File f = new File(pathname);\nSystem.out.println(\"文件名: \" + f.getName());\nSystem.out.println(\"\
  文件存在: \" + f.exists());\nSystem.out.println(\"绝对路径: \" + f.getAbsolutePath());\n\
  try {\nSystem.out.println(\"规范路径: \" + f.getCanonicalPath());\n} catch (IOException\
  \ e) {\ne.printStackTrace();\n}\n}\n}\n工作目录: C:\\Java9LanguageFeatures\n\n文件名: dummy.txt\n\
  文件存在: false\n绝对路径: C:\\Java9LanguageFeatures\\dummy.txt\n规范路径: C:\\Java9LanguageFeatures\\\
  dummy.txt\n\n文件名: notes.txt\n文件存在: false\n绝对路径: C:\\Java9LanguageFeatures\\..\\\
  notes.txt\n规范路径: C:\\notes.txt\n清单 7-2.\n获取文件的绝对路径和规范路径\n```\n\n\n\n在 Java 中处理 I/O\
  \ 时，你需要应对两个“魔鬼”。如果你不指定绝对路径名，你的绝对路径将由 Java 运行时和操作系统决定。如果你指定了绝对路径名，你的代码可能无法在不同的操作系统上运行。处理这种情况的一种方法是使用配置文件，在其中为不同的操作系统指定不同的文件路径名，并在启动时将配置文件路径传递给程序。\n\
  \n文件的规范路径是系统相关的，调用 `getCanonicalPath()` 可能会抛出 `IOException`。你必须将此方法调用放在 `try-catch`\
  \ 块中，或者从调用此方法的方法中抛出 `IOException`。当请求的 I/O 操作失败时，某些 I/O 方法调用会抛出 `IOException`。\n\
  \n创建、删除和重命名文件\n\n你可以使用 `File` 类的 `createNewFile()` 方法创建一个新文件：\n\n```\n// 创建一个 File\
  \ 对象来表示抽象路径名\nFile dummyFile = new File(\"dummy.txt\");\n// 在文件系统中创建该文件\nboolean\
  \ fileCreated = dummyFile.createNewFile();\n```\n\n如果指定名称的文件尚不存在，`createNewFile()`\
  \ 方法会创建一个新的空文件。如果文件创建成功，它返回 `true`；否则返回 `false`。如果发生 I/O 错误，该方法会抛出 `IOException`。\n\
  \n你也可以使用 `File` 类的以下 `createTempFile()` 静态方法，在默认临时文件目录或你选择的目录中创建临时文件：\n\n*   `File\
  \ createTempFile(String prefix, String suffix) throws IOException`\n\n*   `File\
  \ createTempFile(String prefix, String suffix, File directory) throws IOException`\n\
  \n该方法接受一个前缀（长度至少为三个字符）和一个后缀来生成临时文件名。以下代码片段展示了使用这两个版本方法的示例：\n\n```\n// 在默认临时目录中创建一个临时文件\n\
  File tempFile1 = File.createTempFile(\"kkk\", \".txt\");\n// 在现有的 C:\\kishori\\\
  temp 目录中创建一个临时文件\nFile tempDir = new File(\"C:\\\\kishori\\\\temp\");\nFile tempFile2\
  \ = File.createTempFile(\"kkk\", \".txt\", tempDir);\n```\n\n你可以使用 `mkdir()` 或 `mkdirs()`\
  \ 方法创建新目录。`mkdir()` 方法仅在路径名中指定的父目录已存在时才会创建目录。例如，如果你想在 Windows 的 `C:` 驱动器的 `users`\
  \ 目录中创建一个名为 `home` 的新目录，你可以像这样构造表示此路径名的 `File` 对象：\n\n```\nFile newDir = new File(\"\
  C:\\\\users\\\\home\");\n```\n\n现在，只有当 `C:\\users` 目录已存在时，`newDir.mkdir()` 方法才会创建\
  \ `home` 目录。然而，如果 `C:` 驱动器中不存在 `users` 目录，`newDir.mkdirs()` 方法会创建它，从而在 `C:\\users`\
  \ 目录下创建 `home` 目录。\n\n删除文件很简单。你需要使用 `File` 类的 `delete()` 方法来删除文件/目录。目录在删除前必须为空。如果文件/目录被成功删除，该方法返回\
  \ `true`；否则返回 `false`。你还可以使用 `deleteOnExit()` 方法将文件的删除延迟到 JVM 终止时。如果你在程序中创建了临时文件并希望在程序退出时删除它们，这会很有用。\n\
  \n```\nFile dummyFile = new File(\"dummy.txt\");\n// 立即删除 dummy.txt 文件\ndummyFile.delete();\n\
  // 在 JVM 终止时删除 dummy.txt 文件\ndummyFile.deleteOnExit();\n```\n\n提示\n\n对 `deleteOnExit()`\
  \ 方法的调用是最终的。也就是说，一旦你调用了此方法，就无法改变主意并告诉 JVM 在终止时不要删除此文件。即使你已经请求 JVM 在退出时删除同一文件，你仍然可以使用\
  \ `delete()` 方法立即删除它。\n\n\n\n要重命名文件，你可以使用 `renameTo()` 方法，该方法接受一个 `File` 对象来表示新文件：\n\
  \n```\n// 将 old-dummy.txt 重命名为 new_dummy.txt\nFile oldFile = new File(\"old_dummy.txt\"\
  );\nFile newFile = new File(\"new_dummy.txt\");\nboolean fileRenamed = oldFile.renameTo(newFile);\n\
  if (fileRenamed) {\nSystem.out.println(oldFile + \" 已重命名为 \" + newFile);\n} else\
  \ {\nSystem.out.println(\"将 \" + oldFile + \" 重命名为 \" + newFile + \" 失败。\");\n}\n\
  ```\n\n`renameTo()` 方法在文件重命名成功时返回 `true`；否则返回 `false`。建议你检查此方法的返回值以确保重命名成功，因为此方法的行为非常依赖于系统。\n\
  \n提示\n\n`File` 对象是不可变的。一旦创建，它始终表示传递给其构造函数的同一个路径名。当你重命名文件时，旧的 `File` 对象仍然表示原始的路径名。需要记住的一个重要点是，`File`\
  \ 对象表示的是一个路径名，而不是文件系统中的实际文件。\n\n清单 7-3 演示了本节中描述的一些方法的使用。你可能会得到不同的输出；此处显示的是在 Windows\
  \ 上运行程序时的输出。当你第二次运行该程序时，可能会得到不同的输出，因为如果文件在第一次运行时已经存在，则可能无法重命名。\n\n```\n// FileCreateDeleteRename.java\n\
  package com.jdojo.io;\nimport java.io.File;\nimport java.io.IOException;\npublic\
  \ class FileCreateDeleteRename {\npublic static void main(String[] args) {\ntry\
  \ {\nFile newFile = new File(\"my_new_file.txt\");\nSystem.out.println(\"创建新文件前：\"\
  );\nprintFileDetails(newFile);\n// 创建一个新文件\nboolean fileCreated = newFile.createNewFile();\n\
  if (!fileCreated) {\nSystem.out.println(newFile + \" 无法被创建。\");\n}\nSystem.out.println(\"\
  创建新文件后：\");\nprintFileDetails(newFile);\n// 删除新文件\nnewFile.delete();\nSystem.out.println(\"\
  删除新文件后：\");\nprintFileDetails(newFile);\n// 让我们重新创建文件\nnewFile.createNewFile();\n\
  System.out.println(\"重新创建新文件后：\");\nprintFileDetails(newFile);\n// 让 JVM 在退出时删除此文件\n\
  newFile.deleteOnExit();\nSystem.out.println(\"使用 deleteOnExit() 方法后：\");\nprintFileDetails(newFile);\n\
  // 创建一个新文件并重命名它\nFile firstFile = new File(\"my_first_file.txt\");\nFile secondFile\
  \ = new File(\"my_second_file.txt\");\nfileCreated = firstFile.createNewFile();\n\
  if (fileCreated || firstFile.exists()) {\nSystem.out.println(\"重命名文件前：\");\nprintFileDetails(firstFile);\n\
  printFileDetails(secondFile);\nboolean renamedFlag = firstFile.renameTo(secondFile);\n\
  if (!renamedFlag) {\nSystem.out.println(\"无法重命名 \" + firstFile);\n}\nSystem.out.println(\"\
  重命名文件后：\");\nprintFileDetails(firstFile);\nprintFileDetails(secondFile);\n}\n} catch\
  \ (IOException e) {\ne.printStackTrace();\n}\n}\npublic static void printFileDetails\
