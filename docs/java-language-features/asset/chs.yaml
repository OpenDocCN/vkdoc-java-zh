  \n图 14-3.\n\ncom.jdojo.prime.client 模块的模块图\n\n注意\n\n客户端模块并不知晓服务提供者模块，也无需直接读取它们。服务的职责是发现所有服务提供者，并将其实例提供给客户端。在本例中，`jdojo.prime`\
  \ 模块定义了 `com.jdojo.prime.PrimeChecker` 接口，该接口既是服务接口，也充当服务本身。\n\n清单 14-11 包含了使用 `PrimeChecker`\
  \ 服务的客户端代码。\n\n```\n// Main.java\npackage com.jdojo.prime.client;\nimport com.jdojo.prime.PrimeChecker;\n\
