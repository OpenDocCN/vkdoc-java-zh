  \ 任务结果:15 秒\n...\n已完成一个任务 - 任务名称: 任务 #4, 任务结果:15 秒\n已完成一个任务 - 任务名称: 任务 #5, 任务结果:18\
  \ 秒\n清单 6-59.\n一个测试完成服务的类\n```\n\nFork/Join 框架\n\nFork/Join 框架是执行器服务的一种实现，其重点是高效解决那些可能利用分治算法，并借助机器上的多个处理器或多个核心的问题。该框架有助于解决涉及并行性的问题。通常，Fork/Join\
  \ 框架适用于以下情况：\n\n*   一个任务可以分解为多个可以并行执行的子任务。\n\n*   当子任务完成后，可以将部分结果合并以得到最终结果。\n\n\n\
  \nfork/join 框架会创建一个线程池来执行子任务。当一个线程正在等待某个子任务完成时，该框架会利用这个线程去执行其他线程的待处理子任务。这种空闲线程执行其他线程任务的技术被称为**工作窃取**。该框架使用工作窃取算法来提升性能。`java.util.concurrent`\
  \ 包中的以下四个类是学习 fork/join 框架的核心：\n\n*   `ForkJoinPool`\n\n*   `ForkJoinTask<V>`\n\n\
  *   `RecursiveAction`\n\n*   `RecursiveTask<V>`\n\n`ForkJoinPool` 类的实例代表一个线程池。`ForkJoinTask`\
  \ 类的实例代表一个任务。`ForkJoinTask` 类是一个 `abstract` 类。它有两个具体的子类：`RecursiveAction` 和 `RecursiveTask`。Java\
  \ 8 为 `ForkJoinTask` 类增加了一个名为 `CountedCompleter<T>` 的抽象子类。该框架支持两种类型的任务：\n\n*   不产生结果的任务和产生结果的任务。`RecursiveAction`\
  \ 类的实例代表一个不产生结果的任务。\n\n*   `RecursiveTask` 类的实例代表一个产生结果的任务。\n\n`CountedCompleter`\
  \ 任务可能产生结果，也可能不产生结果。`RecursiveAction` 和 `RecursiveTask` 这两个类都提供了一个抽象的 `compute()`\
  \ 方法。你的类（其对象代表一个 fork/join 任务）应该继承自这些类之一，并为 `compute()` 方法提供实现。通常，`compute()` 方法内部的逻辑编写方式类似于以下内容：\n\
  \n```\nif (任务很小) {\n    直接解决任务。\n} else {\n    将任务拆分为子任务。\n    异步启动子任务（fork 阶段）。\n\
  \    等待子任务完成（join 阶段）。\n    合并所有子任务的结果。\n}\n```\n\n`ForkJoinTask` 类的以下两个方法在任务执行期间提供了两个重要特性：\n\
  \n*   `fork()` 方法从一个任务中启动一个新的子任务以进行异步执行。\n\n*   `join()` 方法让一个任务等待另一个任务完成。\n\n使用\
  \ Fork/Join 框架的步骤\n\n使用 fork/join 框架涉及以下五个步骤。\n\n步骤 1：声明一个类来表示任务\n\n创建一个继承自 `RecursiveAction`\
  \ 或 `RecursiveTask` 类的类。此类的实例代表你想要执行的任务。如果任务产生结果，你需要继承 `RecursiveTask` 类。否则，你将继承\
  \ `RecursiveAction` 类。`RecursiveTask` 是一个泛型类。它接受一个类型参数，该参数是你的任务结果的类型。一个返回 `Long`\
  \ 类型结果的 `MyTask` 类可以声明如下：\n\n```\npublic class MyTask extends RecursiveTask {\n\
  \    // 你的任务代码写在这里\n}\n```\n\n步骤 2：实现 compute() 方法\n\n执行任务的逻辑放在你类的 `compute()` 方法内部。`compute()`\
  \ 方法的返回类型与你的任务返回的结果类型相同。`MyTask` 类的 `compute()` 方法声明如下所示：\n\n```\npublic class MyTask\
  \ extends RecursiveTask {\n    public Long compute() {\n        // 任务的逻辑写在这里\n \
  \   }\n}\n```\n\n步骤 3：创建 Fork/Join 线程池\n\n你可以使用 `ForkJoinPool` 类创建一个工作线程池来执行你的任务。此类的默认构造函数会创建一个线程池，其并行度与机器上可用的处理器数量相同。\n\
  \n```\nForkJoinPool pool = new ForkJoinPool();\n```\n\n其他构造函数允许你指定池的并行度和其他属性。\n\n\
  步骤 4：创建 Fork/Join 任务\n\n你需要创建你的任务的一个实例。\n\n```\nMyTask task = MyTask();\n```\n\n\
  步骤 5：将任务提交到 Fork/Join 池执行\n\n你需要调用 `ForkJoinPool` 类的 `invoke()` 方法，并将你的任务作为参数传递。如果你的任务返回结果，`invoke()`\
  \ 方法将返回该任务的结果。以下语句将执行你的任务：\n\n```\nlong result = pool.invoke(task);\n```\n\n一个 Fork/Join\
  \ 示例\n\n让我们考虑一个使用 fork/join 框架的简单示例。你的任务将生成一些随机整数并计算它们的总和。清单 6-60 显示了任务的完整代码。\n\n\
  ```\n// RandomIntSum.java\npackage com.jdojo.threads;\nimport java.util.ArrayList;\n\
  import java.util.List;\nimport java.util.Random;\nimport java.util.concurrent.RecursiveTask;\n\
  public class RandomIntSum extends RecursiveTask {\n    private static final Random\
  \ randGenerator = new Random();\n    private final int count;\n    public RandomIntSum(int\
  \ count) {\n        this.count = count;\n    }\n    @Override\n    protected Long\
  \ compute() {\n        long result = 0;\n        if (this.count == 1) {\n      \
  \      result = this.getRandomInteger();\n        } else {\n            List> forks\
  \ = new ArrayList();\n            for (int i = 0; i < this.count; i++) {\n     \
  \           RandomIntSum subTask = new RandomIntSum(1);\n                subTask.fork();\n\
  \                forks.add(subTask);\n            }\n            for (RecursiveTask\
  \ subTask : forks) {\n                result = result + subTask.join();\n      \
  \      }\n        }\n        return result ;\n    }\n    public int getRandomInteger()\
  \ {\n        // 生成 1 到 100 之间的下一个随机整数\n        int n = randGenerator.nextInt(100)\
  \ + 1;\n        System.out.println(\"生成一个随机整数: \" + n);\n        return n;\n   \
  \ }\n}\n清单 6-60.\n一个用于计算几个随机整数之和的 ForkJoinTask 类\n```\n\n`RandomIntSum` 类继承自 `RecursiveTask<Long>`\
  \ 类，因为它产生 `Long` 类型的结果。结果是所有随机整数的总和。它声明了一个用于生成随机数的 `randGenerator` 实例变量。`count`\
  \ 实例变量存储你想要使用的随机数的数量。`count` 实例变量的值在构造函数中设置。\n\n`getRandomInteger()` 方法生成一个介于 1\
  \ 和 100 之间的随机整数，将该整数值打印到标准输出，并返回该随机整数。\n\n`compute()` 方法包含执行任务的主要逻辑。如果要使用的随机数的数量为一，则计算结果并将其返回给调用者。如果随机数的数量大于一，则启动与随机数数量相同的子任务。请注意，如果你使用十个随机数，它将启动十个子任务，因为每个随机数都可以独立计算。最后，你需要合并所有子任务的结果。因此，你需要保留子任务的引用以备后用。你使用了一个\
  \ `List` 来存储所有子任务的引用。请注意使用 `fork()` 方法来启动子任务。以下代码片段执行此逻辑：\n\n```\nList> forks =\
  \ new ArrayList();\nfor(int i = 0; i < this.count; i++) {\n    RandomIntSum subTask\
  \ = new RandomIntSum(1);\n    subTask.fork(); // 启动子任务\n    // 保留子任务引用以便最后合并结果\n\
  \    forks.add(subTask);\n}\n```\n\n一旦所有子任务启动，你需要等待所有子任务完成，并合并所有随机整数以获得总和。以下代码片段执行此逻辑。请注意\
  \ `join()` 方法的使用，它会使当前任务等待子任务完成。\n\n```\nfor(RecursiveTask subTask : forks) {\n\
  \    result = result + subTask.join();\n}\n```\n\n最后，`compute()` 方法返回结果，即所有随机整数的总和。清单\
  \ 6-61 包含了执行一个任务（即 `RandomIntSum` 类的实例）的代码。你可能会得到不同的输出。\n\n\n\n```\n// ForkJoinTest.java\n\
  package com.jdojo.threads;\nimport java.util.concurrent.ForkJoinPool;\npublic class\
  \ ForkJoinTest {\npublic static void main(String[] args) {\n// 创建一个 ForkJoinPool\
  \ 来运行任务\nForkJoinPool pool = new ForkJoinPool();\n// 创建任务实例\nRandomIntSum task =\
  \ new RandomIntSum(3);\n// 运行任务\nlong sum = pool.invoke(task);\nSystem.out.println(\"\
  总和是 \" + sum);\n}\n}\n生成的随机整数：26\n生成的随机整数：5\n生成的随机整数：68\n总和是 99\n清单 6-61.\n使用 Fork/Join\
  \ 池执行 Fork/Join 任务\n```\n\n这是一个使用 fork/join 框架的非常简单的示例。建议你进一步探索 fork/join 框架的类，以了解更多关于该框架的知识。在你的任务的\
  \ `compute()` 方法内部，你可以编写复杂的逻辑来将任务拆分为子任务。与本例不同，你可能事先不知道需要启动多少个子任务。你可能会启动一个子任务，而该子任务又可能启动另一个子任务，以此类推。\n\
  \n线程局部变量\n\n线程局部变量提供了一种为每个线程维护变量独立值的方式。`java.lang` 包中的 `ThreadLocal<T>` 类提供了线程局部变量的实现。它有五个方法：\n\
  \n*   `T get()`\n\n*   `protected T initialValue()`\n\n*   `void remove()`\n\n*\
  \   `void set(T value)`\n\n*   `static <S> ThreadLocal<S> withInitial(Supplier<?\
  \ extends S> supplier)`\n\n`get()` 和 `set()` 方法分别用于获取和设置线程局部变量的值。`initialValue()`\
  \ 方法用于设置变量的初始值，它具有 `protected` 访问权限。要使用它，你需要继承 `ThreadLocal` 类并重写此方法。你可以通过 `remove()`\
  \ 方法移除该值。`withInitial()` 方法允许你创建一个带有初始值的 `ThreadLocal`。\n\n让我们创建一个 `CallTracker`\
  \ 类，如清单 6-62 所示，用于跟踪线程调用其 `call()` 方法的次数。\n\n```\n// CallTracker.java\npackage com.jdojo.threads;\n\
  public class CallTracker {\n// threadLocal 变量用于存储所有线程的计数器\nprivate static final\
  \ ThreadLocal threadLocal = new ThreadLocal();\npublic static void call() {\nInteger\
  \ counterObject = threadLocal.get();\n// 将计数器初始化为 1\nint counter = 1;\nif (counterObject\
  \ != null) {\ncounter = counterObject + 1;\n}\n// 设置新的计数器\nthreadLocal.set(counter);\n\
  // 打印当前线程调用此方法的次数\nString threadName = Thread.currentThread().getName();\nSystem.out.println(\"\
  线程 \" + threadName + \" 的调用计数器 = \" + counter);\n}\n}\n清单 6-62.\n一个使用 ThreadLocal\
  \ 对象跟踪其方法调用次数的类\n```\n\n`ThreadLocal` 类的 `get()` 方法基于线程工作。它返回由执行 `get()` 方法的同一线程通过\
  \ `set()` 方法设置的值。如果某个线程第一次调用 `get()` 方法，它将返回 `null`。如果调用线程是第一次调用，程序会将其调用计数器设置为 1。否则，调用计数器加\
  \ 1。然后将新的计数器设置回 `threadLocal` 对象中。最后，`call()` 方法打印一条消息，说明当前线程调用此方法的次数。\n\n清单 6-63\
  \ 在三个线程中使用了 `CallTracker` 类。每个线程以 1 到 5 之间的随机次数调用此方法。你可以在输出中观察到，每个线程的调用计数器是分别维护的。你可能会得到不同的输出。\n\
  \n```\n// CallTrackerTest.java\npackage com.jdojo.threads;\nimport java.util.Random;\n\
  public class CallTrackerTest {\npublic static void main(String[] args) {\n// 启动三个线程来调用\
  \ CallTracker.call() 方法\nnew Thread(CallTrackerTest::run).start();\nnew Thread(CallTrackerTest::run).start();\n\
  new Thread(CallTrackerTest::run).start();\n}\npublic static void run() {\nRandom\
  \ random = new Random();\n// 生成一个 1 到 5 之间的随机数\nint counter = random.nextInt(5)\
  \ + 1;\n// 打印线程名称及其生成的随机数\nSystem.out.println(Thread.currentThread().getName()\n\
  + \" 生成的计数器: \" + counter);\nfor (int i = 0; i < counter; i++) {\nCallTracker.call();\n\
  }\n}\n}\nThread-0 生成的计数器: 4\nThread-1 生成的计数器: 2\nThread-2 生成的计数器: 3\n线程 Thread-0\
  \ 的调用计数器 = 1\n线程 Thread-2 的调用计数器 = 1\n线程 Thread-1 的调用计数器 = 1\n线程 Thread-2 的调用计数器\
  \ = 2\n线程 Thread-0 的调用计数器 = 2\n线程 Thread-2 的调用计数器 = 3\n线程 Thread-1 的调用计数器 = 2\n\
  线程 Thread-0 的调用计数器 = 3\n线程 Thread-0 的调用计数器 = 4\n清单 6-63.\nCallTracker 类的测试类\n```\n\
  \n`initialValue()` 方法为每个线程设置线程局部变量的初始值。如果你设置了初始值，那么在调用 `set()` 方法之前调用 `get()` 方法将返回该初始值。这是一个\
  \ `protected` 方法。你必须在子类中重写它。你可以通过使用匿名类将调用计数器的初始值设置为 1000，如下所示：\n\n```\n// 创建一个 ThreadLocal\
  \ 的匿名子类，并重写其 initialValue()\n// 方法，返回 1000 作为初始值\nprivate static ThreadLocal threadLocal\
  \ = new ThreadLocal() {\n@Override\npublic Integer initialValue() {\nreturn 1000;\n\
  }\n};\n```\n\n仅仅为了获得一个带有初始值的 `ThreadLocal` 实例而去继承 `ThreadLocal` 类有些大材小用。最终，类设计者（在\
  \ Java 8 中）意识到了这一点，并在 `ThreadLocal` 类中提供了一个名为 `withInitial()` 的工厂方法，该方法可以指定初始值。该方法声明如下：\n\
  \n```\npublic static  ThreadLocal withInitial(Supplier supplier)\n```\n\n指定的 `supplier`\
  \ 为 `ThreadLocal` 提供初始值。`supplier` 的 `get()` 方法用于获取初始值。你可以重写此逻辑，并用 lambda 表达式替换匿名类，如下所示：\n\
  \n```\n// 创建一个初始值为 1000 的 ThreadLocal\nThreadLocal threadLocal = ThreadLocal.withInitial(()\
  \ -> 1000);\n```\n\n由于 `Supplier` 作为初始值的提供者，你可以延迟生成初始值，并基于某些逻辑生成。以下语句创建了一个 `ThreadLocal`，其初始值为获取初始值时当前时间的秒数：\n\
  \n```\n// 返回当前时间的秒数作为初始值\nThreadLocal threadLocal = ThreadLocal.withInitial(() ->\
  \ LocalTime.now().getSecond());\n```\n\n你可以使用 `remove()` 方法来重置线程的线程局部变量值。调用 `remove()`\
  \ 方法后，第一次调用 `get()` 方法时，会像第一次调用一样返回初始值。\n\n线程局部变量的典型用途是存储线程的用户 ID、事务 ID 或事务上下文。线程在开始时设置这些值，该线程执行期间的任何代码都可以使用这些值。有时，一个线程可能会启动子线程，这些子线程可能需要使用父线程中为线程局部变量设置的值。你可以通过使用\
  \ `InheritableThreadLocal<T>` 类的对象来实现这一点，该类继承自 `ThreadLocal` 类。子线程从其父线程继承初始值。但是，子线程可以使用\
  \ `set()` 方法设置自己的值。\n\n设置线程的栈大小\n\n\n\nJVM 中的每个线程都分配有自己的栈。线程在执行期间使用其栈来存储所有局部变量。局部变量用于构造函数、方法或代码块（静态或非静态）。每个线程的栈大小将限制程序中可以拥有的线程数量。局部变量在其作用域内于栈上分配内存。一旦它们超出作用域，它们所使用的内存就会被回收。如果你的程序使用了过多线程，优化线程的栈大小至关重要。如果栈大小过大，程序中能拥有的线程数量就会减少。线程数量将受到\
  \ JVM 可用内存的限制。如果栈大小过小，无法存储某一时刻使用的所有局部变量，你可能会遇到 `StackOverflowError`。\n要为每个线程设置栈大小，你可以使用一个非标准的\
  \ JVM 选项，名为 `–Xss<size>`，其中 `<size>` 是线程栈的大小。要将栈大小设置为 512 KB，你可以使用如下命令：\n\n```\n\
  java –Xss512k \n```\n\n总结\n\n线程是程序中的一个执行单元。`Thread` 类的实例代表 Java 程序中的一个线程。线程在 `Thread`\
  \ 类或其子类的 `run()` 方法中开始执行。要在线程中执行你的代码，你需要继承 `Thread` 类并重写其 `run()` 方法；你也可以使用 `Runnable`\
  \ 接口的实例作为线程的目标。从 Java 8 开始，你可以使用任何不接受参数且返回 `void` 的方法的方法引用作为线程的目标。线程通过 `Thread`\
  \ 类的 `start()` 方法进行调度。\n\n有两种类型的线程：守护线程和非守护线程。非守护线程也称为用户线程。当 JVM 中运行的线程全部是守护线程时，JVM\
  \ 会退出。\n\nJava 中的每个线程都有一个优先级，它是一个介于 1 到 10 之间的整数，1 表示最低优先级，10 表示最高优先级。线程的优先级是一个提示，操作系统可以忽略它，用于指示该线程获取\
  \ CPU 时间的重要性。\n\n在多线程程序中，如果由多个线程并发执行，可能会对程序结果产生不良影响的代码段称为临界区。你可以使用 `synchronized`\
  \ 关键字在 Java 程序中标记临界区。方法也可以声明为同步的。任何线程在同一时间只能执行一个对象的同步实例方法。任何线程在同一时间只能执行一个类的同步类方法。\n\
  \nJava 程序中的线程会经历一组决定其生命周期的状态。线程可以处于以下任何一种状态：新建、可运行、阻塞、等待、定时等待或终止。这些状态由 `Thread.State`\
  \ 枚举的常量表示。使用 `Thread` 类的 `getState()` 方法来获取线程的当前状态。\n\n线程可以被中断、停止、挂起和恢复。一个已停止的线程或一个已执行完毕的线程无法重新启动。\n\
  \n原子变量、显式锁、同步器、执行器框架以及 fork/join 框架作为类库提供给 Java 开发者，以协助开发并发应用程序。原子变量是指可以在不使用显式同步的情况下进行原子更新的变量。显式锁具有允许你获取锁并在锁不可用时退出的特性。执行器框架有助于调度任务。fork/join\
  \ 框架构建在执行器框架之上，用于协助处理可以分解为子任务并最终合并其结果的任务。\n\n线程局部变量通过 `ThreadLocal<T>` 类实现。它们基于线程存储值。它们适用于那些线程局部且其他线程不可见的值。\n\
