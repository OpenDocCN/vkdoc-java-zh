  \ 的文件的创建时间，将该文件的创建时间修改为比原时间早五小时，并打印新的创建时间。\n\n15. 如何知道文件的 MIME 类型？\n\n16. 如何判断一个\
  \ `Path` 表示的是目录、常规文件还是符号链接？\n\n17. 哪种文件属性视图在所有平台上都保证可用？\n\n18. 使用 NIO.2 API 中的监视服务，你可以监视哪些类型的文件系统对象？\n\
  \n19. 简要解释以下类和接口的用途：`Watchable`、`WatchService`、`WatchKey`、`WatchEvent<T>`、`WatchEvent.Kind<T>`\
  \ 和 `StandardWatchEventKinds`。\n\n20. `AsynchronousFileChannel` 类的用途是什么？\n\n11.\
  \ 垃圾回收\n\n在本章中，你将学习：\n\n*   什么是垃圾回收\n\n*   垃圾回收在 Java 中是如何实现的\n\n*   如何向 JVM 传递提示以运行垃圾回收器\n\
  \n*   如何实现终结器\n\n*   基于对象的可达性和终结状态的不同状态\n\n*   强引用和弱引用的区别\n\n*   如何使用弱引用实现内存敏感的缓存\n\
  \n*   如何使用 `PhantomReference` 和 `ReferenceQueue` 类为对象实现清理任务\n\n*   如何使用 JDK9 中新的\
  \ `Cleaner` 类为虚可达对象执行清理工作\n\n本章中的所有示例程序都是 `jdojo.gc` 模块的成员，如清单 11-1 所示。\n\n```\n\
  // module-info.java\nmodule jdojo.gc {\n    exports com.jdojo.gc;\n}\n清单 11-1. jdojo.gc\
  \ 模块的声明\n```\n\n什么是垃圾回收？\n\n在编程语言中，内存管理是开发快速、高效且无错误应用程序的核心。内存管理涉及两个活动：\n\n*   内存分配\n\
  \n*   内存回收\n\n当程序需要内存时，会从内存池中分配内存。当程序使用完内存后，内存会被归还给内存池，以便将来程序的其他部分可以重用。将内存归还给内存池的过程称为内存回收或内存循环利用。内存分配和回收可以显式或隐式地完成。\n\
  \n在显式内存分配中，程序员决定需要多少内存。程序员向程序运行时环境（称为内存分配器或简称分配器）请求该数量的内存。分配器分配所请求的内存，并将其标记为正在使用，这样就不会再次分配同一内存块。这里，我们假设向分配器请求新内存块的请求总能得到满足。这只有在拥有无限内存的情况下才可能发生。然而，任何计算机都不是这样。有些计算机可能有兆字节的内存，有些可能有千兆字节。但是，计算机上的可用内存总是有限的。如果我们运行一个程序，它总是从内存池中分配内存块，却从不将内存归还给内存池，我们很快就会耗尽内存，程序也会停止运行。\n\
  \n在显式内存回收中，程序员决定何时将内存归还给内存池。当分配器收到新的内存分配请求时，它可以自由地分配已归还的内存。显式内存回收常常导致程序中出现微妙的错误。它也使模块间的接口设计变得复杂。假设一个应用程序中有两个模块，分别命名为\
  \ `m1` 和 `m2`。模块 `m1` 分配了一块内存，对该内存的引用是 `r1`。模块 `m1` 调用模块 `m2`，并传递引用 `r1`。模块 `m2`\
  \ 存储了引用 `r1` 以备将来使用。哪个模块应该负责回收 `r1` 所引用的内存？根据两个模块之间的程序流程，可能存在不同的情况。假设模块 `m1` 在调用模块\
  \ `m2` 后立即回收了内存。在这种情况下，你可能会遇到两个问题：\n\n*   在程序执行的某个时刻，模块 `m2` 尝试使用引用 `r1` 访问内存。由于模块\
  \ `m1` 已经回收了 `r1` 所引用的内存，同一内存可能已被分配器重新分配，并且该内存位置可能存储了完全不同的数据。在这种情况下，`r1` 被称为悬空引用，因为它引用了一个已经被回收的内存位置。如果尝试使用悬空引用读取数据，结果将是不可预测的。在\
  \ Java 中不能有悬空引用。\n\n*   模块 `m1` 可能在回收了 `r1` 所引用的内存后，仍尝试使用引用 `r1`。这也会导致使用悬空引用的问题。\n\
  \n如果模块 `m2` 回收了 `r1` 所引用的内存，如果任何一个模块（`m1` 或 `m2`）尝试使用引用 `r1`，你最终也会遇到同样的悬空引用问题。如果两个模块都不回收内存，并且再也不使用引用\
  \ `r1`，会发生什么？内存将永远不会归还给内存池，也永远不会被重用。这种情况被称为内存泄漏，因为分配器不知道这个内存块没有被归还给它，即使程序再也不使用它。如果内存泄漏经常发生，程序最终将耗尽内存并停止运行。如果你的程序运行时间很短，并且只有少量内存泄漏，你可能在多年甚至程序的整个生命周期内都不会注意到这个错误！\n\
  \n在允许显式内存管理的编程语言中，程序员在程序的内存管理方面花费了大量精力。在另一种与内存相关的问题中，程序员可能会静态地分配大量内存，以便在程序的整个生命周期中使用它。静态内存分配并不总是成功的，因为静态内存有上限。内存管理决策中最困难的部分是决定何时回收内存，以避免悬空引用和内存泄漏。\n\
  \n\n\n在隐式内存分配中，程序员向运行时系统指示其希望分配内存以存储特定类型的数据。运行时系统会计算存储所请求数据类型所需的内存，并将其分配给正在运行的程序。在隐式/自动内存回收中，程序员无需担心内存回收问题。运行时系统会自动回收所有程序不再使用的内存块。这种自动回收未使用内存的过程被称为**垃圾回收**。执行垃圾回收的程序称为**垃圾回收器**，或简称为回收器。垃圾回收器可以作为语言运行时系统的一部分实现，也可以作为附加库实现。\n\
  \nJava 中的内存分配\n\n在 Java 中，程序员处理的是对象。对象所需的内存总是在堆上分配。内存通过 `new` 运算符隐式分配。假设你有一个名为 `Employee`\
  \ 的类。你创建了一个 `Employee` 类的对象。\n\n```\nEmployee emp = new Employee();\n```\n\n根据 `Employee`\
  \ 类的定义，Java 运行时计算出需要多少内存，在堆上分配所需的内存，并将对该内存块的引用存储在 `emp` 引用变量中。请注意，当你想要创建一个 `Employee`\
  \ 对象时，你不需要指定需要多少内存。上述语句中的 `new Employee()` 部分向 Java 表明你想要创建一个 `Employee` 类的对象。Java\
  \ 会查询 `Employee` 类的定义，以计算表示一个 `Employee` 对象所需的内存。\n\n内存中的每个 Java 对象都有两个区域：头部区域和数据区域。头部区域存储供\
  \ Java 运行时使用的簿记信息，例如指向对象类的指针、对象的垃圾回收状态、对象的锁定信息、如果对象是数组则存储数组长度等。数据区域用于存储对象所有实例变量的值。对于特定的\
  \ JVM 实现，头部区域的布局是固定的，而数据区域的布局则取决于对象类型。Java Hotspot 虚拟机为对象头使用两个机器字（在 32 位架构中，一个字是\
  \ 4 字节）。如果对象是数组，则其头部使用三个机器字。头部中额外的一个字用于存储数组长度的值。然而，大多数 JVM 为对象头使用三个机器字。图 11-1 描绘了\
  \ Java Hotspot VM 的对象布局。\n\n![A323070_2_En_11_Fig1_HTML.gif](img/A323070_2_En_11_Fig1_HTML.gif)\n\
  \n图 11-1.\n\nJava Hotspot VM 中对象的布局\n\nJava Hotspot VM 使用可变长度的对象头来节省堆内存。由于大多数 Java\
  \ 对象都很小，对于非数组对象，每个对象节省一个机器字可以显著节省堆空间。Java Hotspot VM 的对象头包含以下信息：\n\n*   `classptr`：这是对象布局中的第一个机器字。它包含一个指向对象类信息的指针。类信息包括对象的方法表、对象的大小，以及一个指向\
  \ `Class` 结构的指针，该结构包含关于对象所属类的信息等。\n\n*   `hash + age + lock`：这是对象头中的第二个机器字。它包含对象的哈希码、年龄信息和锁字段。年龄信息用于分代垃圾回收器回收对象内存的过程。分代垃圾回收器是一种特殊类型的垃圾回收器，它在回收对象内存的算法中使用了对象的年龄。\n\
  \n*   `arraylength`：这是对象头中的第三个机器字。仅当对象是数组时才包含此字段。它包含数组的长度。在这种情况下，对象的数据区域包含数组元素。\n\
  \n注意\n\n在 Java 中，所有对象都在堆上创建。Java 使用 `new` 运算符在堆上为对象分配内存。数组的长度不是其类定义的一部分。它是在运行时定义的。它存储在对象头中。当你对数组对象进行内省时，你不会在数组的类定义中找到\
  \ `length` 实例变量。\n\nJava 不提供任何直接计算对象大小的方法。无论如何，你不应该编写依赖于对象大小的 Java 程序。基本类型（例如 `int`、`long`、`double`\
  \ 等）的大小在所有 JVM 实现中都是固定的。对象的布局和大小取决于 JVM 实现。因此，任何依赖于对象大小的代码可能在一个平台上工作，而在其他平台上则不行。\n\
  \nJava 中的垃圾回收\n\n垃圾回收器是 Java 平台的一部分。它在一个低优先级线程的后台运行。它会自动回收对象。然而，在回收对象之前，它会确保正在运行的程序在其当前状态下永远不会再使用这些对象。这样，它确保了程序不会出现任何悬空引用。未来无法被正在运行的程序使用的对象称为**死亡对象**或垃圾。未来可以被正在运行的程序使用的对象称为**存活对象**。\n\
  \n有许多算法可以确定一个对象是存活还是死亡。其中一种最简单但效率不高的算法基于引用计数，该算法存储指向某个对象的引用计数。当一个对象的引用被赋值给一个引用变量时，引用计数增加\
  \ 1。当一个引用变量不再引用某个对象时，引用计数减少 1。当某个对象的引用计数为零时，它就变成了垃圾（或死亡）。这种算法在更新对象的引用计数方面有很大的开销。另一种类型的算法，称为**追踪算法**，基于根集的概念。根集包括以下内容：\n\
  \n*   每个线程的 Java 栈中的引用变量\n*   已加载类中定义的静态引用变量\n*   使用 Java 本地接口 (JNI) 注册的引用变量\n\n\
  基于追踪算法的垃圾回收器从根集开始遍历引用。可以从根集中的引用变量到达（或访问）的对象称为**可达对象**。可达对象被认为是存活的。从根集可达的对象可能引用其他对象。这些对象也被认为是可达的。因此，所有可以从根集引用变量直接或间接到达的对象都被认为是存活的。其他对象被认为是死亡的，因此有资格进行垃圾回收。\n\
  \n\n\n一个对象可能管理堆内存以外的其他资源。这些资源可能包括网络连接、文件句柄、由原生代码显式管理的内存等。例如，一个对象可能在创建时打开一个文件。根据操作系统的不同，可同时打开的文件句柄数量可能存在上限。当对象被垃圾回收时，你可能希望关闭这些文件句柄。垃圾回收器会给即将消亡的对象一个执行清理工作的机会。它通过在回收即将消亡对象的内存之前执行一段预定义的代码来实现这一点。在对象被垃圾回收器回收之前执行清理工作的过程被称为**终结化**。由垃圾回收器调用以执行终结化的代码块被称为**终结器**。在\
  \ Java 中，你可以在类中定义一个名为 `finalize()` 的实例方法，它充当该类对象的终结器。Java 垃圾回收器在回收对象占用的内存之前，会调用该对象的\
  \ `finalize()` 方法。\n\n调用垃圾回收器\n\n程序员几乎无法控制垃圾回收的运行时机。JVM 在内存不足时会执行垃圾回收。JVM 在抛出 `java.lang.OutOfMemoryError`\
  \ 错误之前，会尽力释放所有不可达对象的内存。`java.lang.Runtime` 类的 `gc()` 方法可用于向 JVM 传递一个提示，表明它可以运行垃圾回收。对\
  \ `gc()` 方法的调用仅仅是对 JVM 的一个提示。JVM 可以忽略该调用。建议运行垃圾回收的调用方式如下所示：\n\n```\n// 获取运行时实例并调用垃圾回收\n\
  Runtime.getRuntime().gc();\n```\n\n`System` 类包含一个便捷方法 `gc()`，其效果等同于执行上述语句。你也可以使用以下语句来运行垃圾回收器：\n\
  \n```\n// 调用垃圾回收\nSystem.gc();\n```\n\n清单 11-2 中的程序演示了 `System.gc()` 方法的使用。该程序在\
  \ `createObjects()` 方法中创建了 2000 个 `Object` 类的对象。新对象的引用未被存储。你无法再次引用这些对象，因此它们成为了垃圾。当你调用\
  \ `System.gc()` 方法时，你是在建议 JVM 尝试回收这些对象使用的内存。垃圾回收器释放的内存在输出部分显示。请注意，当你运行此程序时，很可能会得到不同的输出。`Runtime`\
  \ 类的 `freeMemory()` 方法返回 JVM 中的空闲内存量。\n\n```\n// InvokeGC.java\npackage com.jdojo.gc;\n\
  public class InvokeGC {\npublic static void main(String[] args) {\nlong m1, m2,\
  \ m3;\n// 获取运行时实例\nRuntime rt = Runtime.getRuntime();\nfor (int i = 0; i < 3; i++)\
  \ {\n// 获取空闲内存\nm1 = rt.freeMemory();\n// 创建一些对象\ncreateObjects(2000);\n// 获取空闲内存\n\
  m2 = rt.freeMemory();\n// 调用垃圾回收\nSystem.gc();\n// 获取空闲内存\nm3 = rt.freeMemory();\n\
  System.out.println(\"m1 = \" + m1 + \", m2 = \" + m2 + \", m3 = \"\n+ m3 + \"\\\
  nMemory freed by gc() = \" + (m3 - m2));\nSystem.out.println(\"-------------------------\"\
  );\n}\n}\npublic static void createObjects(int count) {\nfor (int i = 0; i < count;\
  \ i++) {\n// 不存储新对象的引用，因此它们立即符合垃圾回收条件。\nnew Object();\n}\n}\n}\nm1 = 130188712,\
  \ m2 = 130188712, m3 = 7402320\nMemory freed by gc() = -122786392\n\nm1 = 6225808,\
  \ m2 = 6225808, m3 = 7241760\nMemory freed by gc() = 1015952\n\nm1 = 7207408, m2\
  \ = 7207408, m3 = 7241832\nMemory freed by gc() = 34424\n\n清单 11-2.\n调用垃圾回收\n```\n\
  \n通常，不建议以编程方式调用垃圾回收器。调用垃圾回收器会产生一些开销。如果随意调用，可能会降低性能。Java 运行时会自动负责回收未使用对象的内存。你的程序可能会遇到\
  \ `OutOfMemoryError`。此错误可能由多种原因引起。Java 运行时会尽一切努力释放内存，在抛出 `OutOfMemoryError` 错误之前会调用垃圾回收器。因此，仅仅通过编程方式调用垃圾回收器并不能消除此错误。要解决此错误，你可以考虑以下几点：\n\
  \n*   检查你的程序，确保你没有持有一些永远不会再使用的对象引用。在使用完这些引用后，将它们设置为 `null`。将所有对某个对象的引用设置为 `null`\
  \ 会使该对象符合垃圾回收条件。如果你在静态变量中存储了大对象，这些对象将一直保留在内存中，直到类本身被卸载。通常，存储在静态变量中的对象会永久占用内存。检查你的程序，尽量避免在静态变量中存储大对象。\n\
  \n*   检查你的代码，确保你没有在对象中缓存大量数据。你可以使用弱引用在对象中缓存大量数据。与常规引用（常规引用也称为强引用）相比，弱引用有一个优势：在 Java\
  \ 运行时抛出 `OutOfMemoryError` 之前，被弱引用的对象会被垃圾回收。我将在本章后面讨论弱引用。\n\n*   如果这些解决方案都不起作用，你可以尝试调整堆大小。\n\
  \n对象终结化\n\n终结化是在对象使用的内存被垃圾回收器回收之前，自动对该对象执行的一个操作。包含要执行操作的代码块被称为终结器。`Object` 类有一个\
  \ `finalize()` 方法，其声明如下：\n\n```\nprotected void finalize() throws Throwable\n```\n\
  \n因为所有 Java 类都继承自 `Object` 类，所以可以在所有 Java 对象上调用 `finalize()` 方法。任何类都可以重写并实现自己的 `finalize()`\
  \ 方法。`finalize()` 方法充当 Java 对象的终结器。也就是说，垃圾回收器在回收对象内存之前会自动调用该对象的 `finalize()` 方法。理解\
  \ `finalize()` 方法的正确使用是编写良好 Java 程序的关键，该程序管理堆内存以外的资源。\n\n注意\n\n`Object` 类中的 `finalize()`\
  \ 方法自 JDK9 起已被弃用。请使用其他方式清理对象持有的资源。我将在本章中讨论这些方式。为了完整性，我还会讨论如何使用 `finalize()` 方法，尽管它已被弃用。\n\
  \n让我们先从一个简单的示例开始，该示例演示了 `finalize()` 方法在对象被垃圾回收之前被调用的事实。清单 11-3 在 `Finalizer` 类中定义了一个\
  \ `finalize()` 方法。我在 `finalize()` 方法上使用了 `@SuppressWarnings(\"deprecation\")` 注解来抑制编译时的弃用警告，因为该方法在\
  \ JDK9 中已被弃用。\n\n\n\n```\n// Finalizer.java\npackage com.jdojo.gc;\npublic class\
  \ Finalizer {\n// id 用于标识对象\nprivate final int id;\n// 构造函数，接收 id 作为参数\npublic Finalizer(int\
  \ id){\nthis.id = id;\n}\n// 这是对象的终结器。JVM 会在对象被垃圾回收前调用此方法。\n@SuppressWarnings(\"\
  deprecation\")\n@Override\npublic void finalize(){\n// 仅打印一条消息，指示哪个对象正在被垃圾回收。\n\
  // 仅在 id 为 100 的倍数时打印消息，以避免输出过多。\nif (id % 100 == 0) {\nSystem.out.println (\"finalize()\
  \ called for \" + id ) ;\n}\n}\npublic static void main(String[] args) {\n// 创建\
  \ 500000 个 Finalizer 类的对象\nfor(int i = 1; i <= 500000; i++){\n// 不存储对新对象的引用\nnew\
  \ Finalizer(i);\n}\n// 调用垃圾回收器\nSystem.gc();\n}\n}\nfinalize() called for 63700\n\
  finalize() called for 186000\nfinalize() called for 185000\nfinalize() called for\
  \ 184400\n...\n清单 11-3.\n使用 finalize() 方法\n```\n\n`finalize()` 方法会在被垃圾回收的对象的 ID\
  \ 是 100 的倍数时打印一条消息。`main()` 方法创建了 500,000 个 `Finalizer` 类的对象，并调用 `System.gc()` 来调用垃圾回收器。\n\
  \n当垃圾回收器确定某个对象不可达时，它会将该对象标记为待终结，并将其放入一个队列中。如果你希望 Java 运行时终结所有待终结的对象，可以通过调用 `Runtime`\
  \ 类的 `runFinalization()` 方法来实现，如下所示：\n\n```\nRuntime rt = Runtime.getRuntime();\n\
  rt.runFinalization();\n```\n\n`System` 类有一个便捷方法 `runFinalization()`，它等同于调用 `Runtime`\
  \ 类的 `runFinalization()` 方法。可以按如下方式调用：\n\n```\nSystem.runFinalization();\n```\n\n\
  调用 `runFinalization()` 方法只是向 Java 运行时发出一个提示，建议它调用所有待终结对象的 `finalize()` 方法。从技术上讲，你可以在代码中任意多次地调用某个对象的\
  \ `finalize()` 方法。然而，该方法的设计初衷是让垃圾回收器在对象的生命周期内最多调用一次其 `finalize()` 方法。垃圾回收器对对象 `finalize()`\
  \ 方法的一次性调用，不会因为之前以编程方式调用了该对象的 `finalize()` 方法而受到影响。\n\n程序员不应在类中随意重写 `finalize()`\
  \ 方法。一个没有代码的 `finalize()` 方法，或者一个仅调用 `Object` 类的 `finalize()` 方法，都是随意重写 `finalize()`\
  \ 方法的例子。`Object` 类中的该方法不执行任何操作。如果你的类是 `Object` 类的直接子类，并且你的类中的 `finalize()` 方法没有任何有意义的代码，那么最好不要在你的类中包含\
  \ `finalize()` 方法。与那些实现了 `finalize()` 方法的对象相比，没有实现该方法的对象的内存回收速度更快、更及时。\n\n**Finally\
  \ 还是 Finalize？**\n\n对象终结的时机无法保证。所有不可达对象的终结也无法保证。简而言之，无法保证不可达对象的 `finalize()` 方法何时会被调用，甚至是否会被调用。那么，`finalize()`\
  \ 方法到底有什么用呢？Java 中垃圾回收器的主要目的是减轻程序员释放未使用对象内存的负担，以避免内存泄漏和悬空引用的问题。其次要任务是在不保证时机的情况下对对象执行终结。作为程序员，你不应过分依赖垃圾回收的终结过程。你不应编写\
  \ `finalize()` 方法，或者应谨慎编写。如果你需要在资源使用完毕后确保清理它们，可以使用 `try-finally` 块。如果你的资源是 `AutoCloseable`\
  \ 的，可以使用 `try-with-resources` 块。`try-finally` 块的工作方式如下：\n\n```\ntry {\n/* 获取资源并使用它们\
  \ */\n} finally {\n/* 释放资源 */\n}\n```\n\n你可以在 `try` 块中获取并使用资源，然后在关联的 `finally` 块中释放它们。`finally`\
  \ 块保证在 `try` 块执行完毕后执行。这样，你可以确保程序中的稀缺资源在使用完毕后始终被释放。然而，由于性能问题，在资源使用完毕后立即释放它们可能并不总是可行的。例如，你可能不希望每次需要网络连接时都打开一个新的连接。你可以打开一次网络连接，使用它，然后在不再需要时关闭它。有时你可能不知道在程序的哪个确切点之后不再需要该网络连接。在这种情况下，你可以将\
  \ `finalize()` 方法作为后备方案来释放尚未释放的资源。当你确定可以释放资源时，可以以编程方式调用 `finalize()` 方法。清单 11-4\
  \ 包含一个 `FinalizeAsBackup` 类的代码，该类展示了使用这种技术的代码框架。\n\n```\n// FinalizeAsBackup.java\n\
  package com.jdojo.gc;\npublic class FinalizeAsBackup {\n/* 其他代码在此 */\nSomeResource\
  \ sr;\npublic void aMethod() {\nsr = 在此处获取资源...;\n/* 进行一些处理 . . . */\n/* 注意有条件地释放资源\
  \ */\nif (某个条件为真) {\n/* 在此处释放资源，调用 finalize() */\nthis.finalize();\n}\n}\npublic\
  \ void finalize() {\n/* 如果资源尚未释放，则释放它们 */\nif (资源尚未释放) {\n现在释放资源;\n}\n}\n}\n清单 11-4.\n\
  使用 finalize() 方法作为释放资源后备方案的类模板\n```\n\n该类的 `aMethod()` 方法获取资源并将其引用存储在 `sr` 实例变量中。当程序员确定应该释放资源时，他们会调用\
  \ `finalize()` 方法。否则，垃圾回收器会调用 `finalize()` 方法，资源将被释放。请注意，`FinalizeAsBackup` 类是一个模板。它包含用于解释该技术的伪代码。此类无法编译。\n\
  \n**提示**\n\n关于使用 `finalize()` 方法的经验法则是：不要使用它，或者谨慎使用，并且仅将其作为释放资源的最后手段。你可以使用 `try-finally`\
  \ 块来释放资源。对象被终结的顺序是未定义的。例如，如果对象 `obj1` 比对象 `obj2` 更早符合垃圾回收条件，但并不能保证 `obj1` 会在 `obj2`\
  \ 之前被终结。当抛出未捕获的异常时，主程序会停止。然而，终结器中的未捕获异常只会停止该对象的终结，而不会影响整个应用程序。\n\n**对象复活**\n\n\n\
  \n有人即将死去。上帝问他最后一个愿望。他说：“把生命还给我。”上帝满足了他的最后一个愿望，他重获新生。当他第二次即将死去时，上帝保持沉默，没有询问他的最后一个愿望就让他死去了。否则，他会反复要求重获生命，永远不死。\n\
  \n同样的逻辑也适用于 Java 中对象的终结化。调用对象的 `finalize()` 方法，就像垃圾回收器在询问对象的最后一个愿望。通常，对象会回应：“我想清理我所有的烂摊子。”也就是说，对象通过执行一些清理工作来响应其\
  \ `finalize()` 方法的调用。它也可能通过将其引用放入一个可达的引用变量中来复活自己，从而响应其 `finalize()` 方法的调用。一旦它通过一个已经可达的引用变量变得可达，它就复活了。垃圾回收器在调用对象的\
  \ `finalize()` 方法后，会使用对象的头部标记将其标记为已终结。如果一个已经终结的对象在下次垃圾回收时变得不可达，垃圾回收器不会再次调用该对象的 `finalize()`\
  \ 方法。\n\n对象的复活是可能的，因为垃圾回收器在调用其 `finalize()` 方法后并不会立即回收对象的内存。调用 `finalize()` 方法后，它只是将对象标记为已终结。在垃圾回收的下一个阶段，它会再次判断对象是否可达。如果对象不可达且已终结，只有到那时它才会回收对象的内存。如果对象可达且已终结，它不会回收对象的内存；这是一个典型的复活案例。\n\
  \n在对象的 `finalize()` 方法中复活对象不是一个好的编程实践。一个简单的原因是，如果你编写了 `finalize()` 方法，你期望它在每次对象死亡时都被执行。如果你在\
  \ `finalize()` 方法中复活了对象，当它第二次变得不可达时，垃圾回收器将不会再次调用其 `finalize()` 方法。复活后，你可能已经获得了一些你期望在\
  \ `finalize()` 方法中释放的资源。这会在你的程序中留下微妙的错误。如果你的程序在 `finalize()` 方法中复活对象，其他程序员也很难理解你的程序流程。清单\
  \ 11-5 演示了如何使用 `finalize()` 方法复活一个对象。\n\n```\n// Resurrect.java\npackage com.jdojo.gc;\n\
  public class Resurrect {\n// 声明一个 Resurrect 类型的静态变量\nprivate static Resurrect res\
  \ = null;\n// 声明一个存储对象名称的实例变量\nprivate String name = \"\";\npublic Resurrect(String\
  \ name) {\nthis.name = name;\n}\npublic static void main(String[] args) {\n// 我们将创建\
  \ Resurrect 类的对象，并且不存储它们的引用，\n// 因此它们立即符合垃圾回收的条件。\nfor (int count = 1; count <=\
  \ 1000; count++) {\nnew Resurrect(\"Object #\" + count);\n// 每创建 100 个对象，就调用一次垃圾回收\n\
  if (count % 100 == 0) {\nSystem.gc();\nSystem.runFinalization();\n}\n}\n}\npublic\
  \ void sayHello() {\nSystem.out.println(\"Hello from \" + name);\n}\npublic static\
  \ void resurrectIt(Resurrect r) {\n// 将引用 r 赋值给静态变量 res，这使得只要 res 可达，该对象就可达。\nres\
  \ = r;\n// 调用一个方法来证明我们确实找回了对象\nres.sayHello();\n}\n@SuppressWarnings(\"deprecation\"\
  )\n@Override\npublic void finalize() {\nSystem.out.println(\"Inside finalize():\
  \ \" + name);\n// 复活此对象\nResurrect.resurrectIt(this);\n}\n}\nInside finalize():\
  \ Object #82\nHello from Object #82\nInside finalize(): Object #100\nHello from\
  \ Object #100\nInside finalize(): Object #99\nHello from Object #99\n...\n清单 11-5.\n\
  对象复活\n```\n\n`Resurrect` 类在 `main()` 方法中创建了 1000 个对象。它没有存储这些新对象的引用，因此它们一被创建就变成了垃圾。每创建\
  \ 100 个新对象后，它使用 `System.gc()` 方法调用垃圾回收器。它还调用了 `System.runFinalization()` 方法，以便为垃圾对象运行终结器。当垃圾回收器为一个对象调用\
  \ `finalize()` 方法时，该对象会将其引用传递给 `resurrectIt()` 方法。此方法将濒死对象的引用存储在静态变量 `res` 中，该变量是可达的。`resurrectIt()`\
  \ 方法还在复活的对象上调用 `sayHello()` 方法，以显示哪个对象被复活了。请注意，一旦另一个对象复活了自己，你就会用最近复活的对象的引用覆盖静态变量\
  \ `res`。先前被复活的对象再次变成垃圾。垃圾回收器将回收先前复活对象的内存，而不会再次调用其 `finalize()` 方法。当你运行程序时，可能会得到不同的输出。\n\
  \n对象的状态\n\nJava 对象的状态 基于两个标准定义：\n\n*   终结状态\n\n*   可达性\n\n基于终结状态，一个对象可以处于以下三种状态之一：\n\
  \n*   未终结\n\n*   可终结\n\n*   已终结\n\n当一个对象被实例化时，它处于未终结状态。例如，\n\n```\nEmployee john\
  \ = new Employee();\n```\n\n在此语句执行后，由 `john` 引用变量引用的对象处于未终结状态。JVM 从未自动调用过未终结对象的终结器。当垃圾回收器确定可以在对象上调用\
  \ `finalize()` 方法时，该对象变为可终结。已终结对象的 `finalize()` 方法已由垃圾回收器自动调用。\n\n基于可达性，一个对象可以处于三种状态之一：\n\
  \n*   可达\n\n*   终结器可达\n\n*   不可达\n\n如果一个对象可以通过从根集出发的任何引用链访问到，则它是可达的。一个终结器可达的对象可以通过任何可终结对象的终结器访问到。如果一个终结器可达的对象，其可达的终结器将其引用存储在一个可达的对象中，那么该终结器可达的对象可能变为可达。这就是对象复活的情况。一个对象可以在其\
  \ `finalize()` 方法中复活自己，或者通过另一个对象的 `finalize()` 方法复活。一个不可达的对象无法通过任何方式访问到。\n\n基于对象的终结状态和可达性状态，共有九种对象状态组合。九种组合中的一种，即可终结且不可达，是不可能的。一个可终结对象的\
  \ `finalize()` 方法可能会在未来被调用。`finalize()` 方法仍然可以使用 `this` 关键字引用该对象。因此，一个可终结的对象不能同时也是不可达的。一个对象可以存在于以下八种状态之一：\n\
  \n*   未终结 - 可达\n\n*   未终结 - 终结器可达\n\n*   未终结 - 不可达\n\n*   可终结 - 可达\n\n*   可终结 -\
  \ 终结器可达\n\n*   已终结 - 可达\n\n*   已终结 - 终结器可达\n\n*   已终结 - 不可达\n\n弱引用\n\n在垃圾回收的上下文中，弱引用的概念对\
  \ Java 来说并不新鲜。它之前就存在于其他编程语言中。到目前为止，我讨论的对象引用都是强引用。也就是说，只要对象引用在作用域内，它所引用的对象就不能被垃圾回收。例如，考虑以下对象创建和引用赋值语句：\n\
  \n```\nEmployee john = new Employee(\"John Jacobs\");\n```\n\n这里，`john` 是对表达式 `new\
  \ Employee(\"John Jacobs\")` 创建的对象的引用。执行此语句后存在的内存状态如图 11-2 所示。\n\n\n\n![A323070_2_En_11_Fig2_HTML.gif](img/A323070_2_En_11_Fig2_HTML.gif)\n\
  \n图 11-2.\n\n强引用示例\n\n如果某个对象至少存在一个强引用，垃圾回收器就不会回收该对象。在上一节中，我根据对象的可达性讨论了其状态。所谓对某个对象存在强引用，是指该对象是可达的。随着弱引用的引入，现在根据可达性，对象又多了三种状态：\n\
  \n*   软可达\n\n*   弱可达\n\n*   虚可达\n\n因此，在上一节中我称之为可达的对象，从现在起我将称之为强可达。这种术语上的变化是由于引入了三种新的对象可达性。在讨论这三种新的对象可达性之前，你需要了解\
  \ `java.lang.ref` 包中包含的类。其中有四个相关的类，如图 11-3 所示。我不讨论图中的 `Reference` 类。\n\n![A323070_2_En_11_Fig3_HTML.jpg](img/A323070_2_En_11_Fig3_HTML.jpg)\n\
  \n图 11-3.\n\njava.lang.ref 包中部分类的类图\n\n`Reference<T>` 是一个抽象类，它是 `SoftReference<T>`、`WeakReference<T>`\
  \ 和 `PhantomReference<T>` 类的超类。它们是泛型类；其类型参数 `T` 是它们所引用对象的类型。`SoftReference`、`WeakReference`\
  \ 和 `PhantomReference` 类用于创建弱引用。请注意，短语“弱引用”指的是非强引用的引用。而短语 `WeakReference` 指的是 `java.lang.ref.WeakReference`\
  \ 类。`ReferenceQueue` 类用于将 `SoftReference`、`WeakReference` 和 `PhantomReference` 对象的引用放入队列中。让我们看看创建这三种类型对象的不同方式。这三个类的构造函数如表\
  \ 11-1 所示。\n\n表 11-1.\n\nSoftReference、WeakReference 和 PhantomReference 类的构造函数\n\
  \n| 类 | 构造函数 |\n| --- | --- |\n| `SoftReference<T>` | `SoftReference(T referent)`\
  \ |\n| | `SoftReference(T referent, ReferenceQueue<? super T> q)` |\n| `WeakReference<T>`\
  \ | `WeakReference(T referent)` |\n| | `WeakReference(T referent, ReferenceQueue<?\
  \ super T> q)` |\n| `PhantomReference<T>` | `PhantomReference(T referent, ReferenceQueue<?\
  \ super T> q)` |\n\n你可以按如下方式创建 `SoftReference` 类的对象：\n\n```\nEmployee john = new\
  \ Employee (\"John Jacobs\");\nSoftReference sr = new SoftReference(john);\n```\n\
  \n执行这两条语句后的内存状态如图 11-4 所示。\n\n![A323070_2_En_11_Fig4_HTML.gif](img/A323070_2_En_11_Fig4_HTML.gif)\n\
  \n图 11-4.\n\n软引用示例\n\n在图 11-4 中，有两个强引用和一个软引用。所有三个弱引用类都有两个实例变量：`referent` 和 `queue`。它们用于保存传递给这些类构造函数的对象引用和引用队列。存储在这三个类中任何一个类的\
  \ `referent` 实例变量中的任何对象引用，通常被称为弱引用——具体来说，根据所使用的类，分别称为软引用、弱引用或虚引用。因此，从软引用对象到图 11-4\
  \ 中 employee 对象的链接是一个弱引用。具体来说，我称之为软引用，因为我使用了 `SoftReference` 类的对象。在 Java 中，任何不涉及这三个类中任何一个类的\
  \ `referent` 实例变量的引用都是强引用。因此，`john` 和 `sr` 是强引用。\n\n弱引用与强引用有何不同？区别在于垃圾回收器如何处理它们。弱引用不会阻止它们所引用的对象被垃圾回收器回收。也就是说，如果某个对象存在一个弱引用，垃圾回收器仍然可以回收该对象。然而，如果某个对象至少存在一个强引用，垃圾回收器就不会回收该对象。在开始详细了解如何使用这三个引用类之前，让我们先讨论当程序中涉及这些类时对象的可达性。\n\
  \n*   **强可达**：如果一个对象可以从根集合通过至少一条不包含任何弱引用的引用链到达，则该对象是强可达的。\n\n*   **软可达**：如果一个对象不是强可达的，并且可以从根集合通过至少一条包含至少一个软引用但不包含弱引用和虚引用的引用链到达，则该对象是软可达的。\n\
  \n*   **弱可达**：如果一个对象既不是强可达也不是软可达，并且可以从根集合通过至少一条包含至少一个弱引用但不包含虚引用的引用链到达，则该对象是弱可达的。\n\
  \n*   **虚可达**：如果一个对象既不是强可达、软可达也不是弱可达，并且可以从根集合通过至少一条包含至少一个虚引用的引用链到达，则该对象是虚可达的。一个虚可达的对象已被终结，但尚未被回收。\n\
  \n在这三种弱引用中，软引用被认为比弱引用和虚引用更强。弱引用被认为比虚引用更强。因此，识别对象可达性的规则是：如果一个对象不是强可达的，那么它的可达性等同于通向该对象的引用链中最弱的引用。也就是说，如果通向某个对象的引用链包含一个虚引用，则该对象必定是虚可达的。如果通向某个对象的引用链不包含虚引用，但包含一个弱引用，则该对象必定是弱可达的。如果通向某个对象的引用链不包含虚引用和弱引用，但包含一个软引用，则该对象必定是软可达的。\n\
  \n当存在多条通向某个对象的引用链时，如何确定该对象的可达性？在这种情况下，你需要使用所有可能的引用链来确定对象的可达性，并采用最强的那一个。也就是说，如果某个对象通过一条引用链是软可达的，而通过另一条是虚可达的，则该对象被视为软可达。图\
  \ 11-5 展示了如何确定对象可达性的示例。每条引用链末端的椭圆形代表一个对象。对象的可达性已在椭圆形内部标明。矩形表示引用。\n\n![A323070_2_En_11_Fig5a_HTML.gif](img/A323070_2_En_11_Fig5a_HTML.gif)![A323070_2_En_11_Fig5b_HTML.gif](img/A323070_2_En_11_Fig5b_HTML.gif)\n\
  \n图 11-5.\n\n对象的不同可达性类型\n\n访问和清除引用对象的引用\n\n本节使用一个简单类的对象来演示引用类的使用。这个名为 `BigObject`\
  \ 的类如清单 11-6 所示。它有一个大的 `long` 类型数组作为实例变量，因此会占用大量内存。`id` 实例变量用于跟踪该类的对象。`finalize()`\
  \ 方法使用对象的 `id` 在控制台上打印一条消息。\n\n\n\n```\n// BigObject.java\npackage com.jdojo.gc;\n\
  public class BigObject {\n// 声明一个包含 20480 个 long 元素的大数组\nprivate final long[] anArray\
  \ = new long[20480];\n// 使用 ID 追踪对象\nprivate final long id;\npublic BigObject(long\
  \ id) {\nthis.id = id;\n}\n// 定义 finalize() 方法以追踪对象的终结过程\n@SuppressWarnings(\"deprecation\"\
  )\n@Override\npublic void finalize() {\nSystem.out.println(\"finalize() called for\
  \ id: \" + id);\n}\n@Override\npublic String toString() {\nreturn \"BigObject: id\
  \ = \" + id;\n}\n}\n清单 11-6.\n一个占用大内存的 BigObject 类\n```\n\n传递给 `WeakReference`、`SoftReference`\
  \ 和 `PhantomReference` 类构造函数的对象称为**引用对象（referent）**。换句话说，这三个引用类对象所引用的对象被称为引用对象。要获取引用对象的引用，需要调用\
  \ `get()` 方法。\n\n```\n// 创建一个 ID 为 101 的大对象\nBigObject bigObj = new BigObject(101);\n\
  /* 此时，ID 为 101 的大对象是强可达的 */\n// 使用 bigObj 作为引用对象创建一个软引用对象\nSoftReference sr = new\
  \ SoftReference(bigObj);\n/* 此时，ID 为 101 的大对象仍然是强可达的，因为 bigObj 是一个指向它的强引用。同时它也有一个软引用指向它。*/\n\
  // 将 bigObj 设为 null，使该对象变为软可达\nbigObj = null;\n/* 此时，ID 为 101 的大对象是软可达的，因为它只能通过软引用\
  \ sr 访问。*/\n// 获取软引用对象的引用对象\nBigObject referent = sr.get();\n/* 此时，ID 为 101 的大对象再次变为强可达，因为\
  \ referent 是一个强引用。同时它也有一个软引用指向它。*/\n```\n\n图 11-6 展示了执行上述代码片段中每条语句后，所有引用对应的内存状态。\n\
  \n![A323070_2_En_11_Fig6_HTML.gif](img/A323070_2_En_11_Fig6_HTML.gif)\n\n图 11-6.\n\
  \n访问引用对象的引用\n\n`clear()` 方法会清除引用（弱引用、软引用或虚引用）对象与其引用对象之间的链接。以下代码片段说明了其用法：\n\n```\n\
  // 创建一个软引用对象，使用 ID 为 976 的 BigObject 作为其引用对象\nSoftReference sr1 = new SoftReference(new\
  \ BigObject(976));\n/* 此时，ID 为 976 的 BigObject 是软可达的，因为它只能通过软引用 sr 访问。*/\n// 清除引用对象\n\
  sr1.clear();\n/* 此时，ID 为 976 的大对象是不可达的（准确地说，是终结器可达的），因为我们清除了指向该对象的唯一引用（软引用）。*/\n\
  ```\n\n执行上述代码片段中每条语句后，所有引用对应的内存状态如图 11-7 所示。使用 `clear()` 方法清除引用对象的引用后，`get()` 方法返回\
  \ `null`。请注意，`PhantomReference` 对象的 `get()` 方法始终返回 `null`。\n\n![A323070_2_En_11_Fig7_HTML.gif](img/A323070_2_En_11_Fig7_HTML.gif)\n\
  \n图 11-7.\n\n清除引用对象\n\n使用 SoftReference 类\n\n软可达对象用于维护内存敏感的缓存。也就是说，如果你想在程序内存不紧张时维护一个对象缓存，可以使用软可达对象。当程序内存不足时，垃圾回收器会清除对象的软引用，使该对象符合回收条件。此时，你的程序将从缓存中丢失部分或全部对象。Java\
  \ 不保证在程序内存不紧张时不会清除软引用。然而，它保证在 JVM 抛出 `OutOfMemoryError` 之前，所有软引用都会被清除。同时，也不保证软引用被清除的顺序。不过，鼓励\
  \ JVM 实现优先清除最近最少创建/使用的软引用。清单 11-7 展示了软引用在缓存数据时的错误用法。\n\n```\n// WrongSoftRef.java\n\
  package com.jdojo.gc;\nimport java.lang.ref.SoftReference;\nimport java.util.ArrayList;\n\
  public class WrongSoftRef {\npublic static void main(String[] args) {\n// 创建一个 ID\
  \ 为 101 的大对象用于缓存\nBigObject bigObj = new BigObject(101);\n// 将软引用包装在软引用中\nSoftReference\
  \ sr = new SoftReference(bigObj);\n// 让我们尝试创建许多大对象，并将其引用存储在数组列表中，以消耗大量内存\nArrayList\
  \ bigList = new ArrayList();\nlong counter = 102;\nwhile (true) {\nbigList.add(new\
  \ BigObject(counter++));\n}\n}\n}\nException: java.lang.OutOfMemoryError thrown\
  \ from the UncaughtExceptionHandler in thread \"main\"\n清单 11-7.\n软引用的错误用法\n```\n\
  \n程序员的意图是使用软引用缓存一个 ID 为 101 的大对象。如果程序内存不足，ID 为 101 的缓存大对象可能会被回收。程序中的 `while` 循环试图创建许多大对象，以使程序内存不足。程序员期望在执行程序时，在抛出\
  \ `OutOfMemoryError` 之前，应该回收 ID 为 101 的大对象所使用的内存。\n\n输出显示程序并未回收 ID 为 101 的大对象所使用的内存。为什么垃圾回收器的行为不符合预期？`WrongSoftRef`\
  \ 类的代码中存在一个错误。ID 为 101 的大对象是强可达的，因为指向它的 `bigObj` 引用是一个强引用。你必须将 `bigObj` 引用变量设为 `null`，才能使其变为软可达。\n\
  \n清单 11-8 展示了软引用的正确用法。从输出中可以清楚地看到，在 JVM 抛出 `OutOfMemoryError` 之前，ID 为 101 的大对象的\
  \ `finalize()` 方法被调用，并且该对象被回收了。你仍然遇到了 `OutOfMemoryError`，因为你在 `while` 循环中创建了许多新对象，并且所有这些对象都通过数组列表强可达。这证明了在\
  \ JVM 抛出 `OutOfMemoryError` 之前，软引用会被清除，并且引用对象会被垃圾回收器回收。你可能会得到不同的输出。有时，你会在对象未被回收的情况下遇到\
  \ `OutOfMemoryError`。\n\n\n\n```\n// CorrectSoftRef.java\npackage com.jdojo.gc;\n\
  import java.lang.ref.SoftReference;\nimport java.util.ArrayList;\npublic class CorrectSoftRef\
  \ {\npublic static void main(String[] args) {\n// 创建一个 ID 为 101 的大对象用于缓存\nBigObject\
  \ bigObj = new BigObject(101);\n// 将大对象包装在软引用中\nSoftReference sr = new SoftReference(bigObj);\n\
  // 将 bigObj 设为 null，使大对象变为软可达状态，必要时可被回收\nbigObj = null;\n// 尝试创建大量大对象，将其引用存储在数组列表中，以耗尽内存\n\
  ArrayList bigList = new ArrayList();\nlong counter = 102;\nwhile (true) {\nbigList.add(new\
  \ BigObject(counter++));\n}\n}\n}\nfinalize() called for id: 101\nException: java.lang.OutOfMemoryError\
  \ thrown from the UncaughtExceptionHandler in thread \"main\"\n清单 11-8.\n软引用的正确用法\n\
  ```\n\n清单 11-9 演示了如何使用软引用实现内存敏感的缓存。\n\n```\n// BigObjectCache.java\npackage com.jdojo.gc;\n\
  import java.lang.ref.SoftReference;\npublic class BigObjectCache {\n@SuppressWarnings(\"\
  unchecked\")\nprivate static final SoftReference[] cache = new SoftReference[10];\n\
  public static BigObject getObjectById(int id) {\n// 检查缓存 ID 是否有效\nif (id = cache.length)\
  \ {\nthrow new IllegalArgumentException(\"无效的 ID\");\n}\nBigObject obj;\n// 检查该\
  \ ID 是否有缓存\nif (cache[id] == null) {\n// 尚未缓存该对象，创建缓存并返回\nobj = createCacheForId(id);\n\
  return obj;\n}\n// 通过软引用获取 BigObject 引用\nobj = cache[id].get();\n// 确保对象尚未被回收\n\
  if (obj == null) {\n// 垃圾回收器已回收该对象，重新缓存并返回新缓存的对象\nobj = createCacheForId(id);\n\
  }\nreturn obj;\n}\n// 为指定 ID 创建缓存\nprivate static BigObject createCacheForId(int\
  \ id) {\nBigObject obj = null;\nif (id >= 0 && id (obj);\n}\nreturn obj;\n}\n}\n\
  清单 11-9.\n使用软引用创建缓存\n```\n\n该缓存最多可缓存 10 个 `BigObject` 类的对象，其 ID 范围为 0 到 9。要获取指定\
  \ ID 的缓存对象，需要调用 `getObjectById()` 方法。如果该 ID 尚未缓存，或已被垃圾回收器回收，该方法会创建并缓存该对象。此示例限制性很强，其目的仅在于演示如何使用\
  \ `SoftReference` 类来维护内存敏感的缓存。你只能缓存 ID 为 0 到 9 的对象。可根据具体需求对其进行修改。例如，你可以使用 `ArrayList`\
  \ 而非数组来缓存对象。`BigObjectCache` 类的使用方式如下：\n\n```\n// 从缓存中获取对象\nBigObject cachedObject\
  \ = BigObjectCache.getObjectById(5);\n/* 执行一些处理...*/\n// 使用完毕后，必须将 cachedObject\
  \ 设为 null，使缓存对象变为软可达状态，以便垃圾回收器可能回收它\ncachedObject = null;\n```\n\n如果 ID 为 5 的对象尚未在缓存中，它将被缓存，并且新对象的引用将赋值给\
  \ `cachedObject`。如果 ID 为 5 的对象已在缓存中，则返回该对象在缓存中的引用，并赋值给 `cachedObject`。\n\n使用 ReferenceQueue\
  \ 类\n\n当需要在对象可达性发生变化时得到通知，可以将 `ReferenceQueue<T>` 类的对象与 `SoftReference<T>`、`WeakReference<T>`\
  \ 和 `PhantomReference<T>` 类的对象结合使用。这些引用类中的任何一个对象都可以注册到引用队列中，如下所示：\n\n```\nReferenceQueue\
  \ q = new ReferenceQueue();\nSoftReference sr = new SoftReference(new BigObject(19),\
  \ q);\nWeakReference wr = new WeakReference(new BigObject(20), q);\nPhantomReference\
  \ pr = new PhantomReference(new BigObject(21), q);\n```\n\n将 `SoftReference` 和 `WeakReference`\
  \ 对象注册到引用队列是可选的。但是，必须将 `PhantomReference` 对象注册到引用队列。当垃圾回收器清除 `SoftReference` 或 `WeakReference`\
  \ 时，`SoftReference` 或 `WeakReference` 对象的引用会被追加到引用队列中。请注意，放入队列的是 `SoftReference`\
  \ 和 `WeakReference` 的引用，而不是它们所引用对象的引用。例如，如果垃圾回收器清除了上述代码片段中对 ID 为 19 的 `BigObject`\
  \ 的软引用，`sr` 将被放入引用队列。对于 `PhantomReference`，当其引用对象变为虚可达时，垃圾回收器会将 `PhantomReference`\
  \ 对象放入引用队列。\n\n在 JDK9 之前，与软引用和弱引用不同，垃圾回收器在将虚引用放入其引用队列时，并不会清除它们。程序必须通过调用 `clear()`\
  \ 方法来清除虚引用。从 JDK9 开始，所有三种类型的引用在入队之前都会被清除。\n\n有两种方法可以判断引用对象是否已被放入其引用队列。你可以调用 `ReferenceQueue`\
  \ 的 `poll()` 或 `remove()` 方法，也可以调用软引用、弱引用和虚引用的 `isEnqueued()` 方法。`poll()` 方法从队列中移除一个引用并返回该引用。如果队列中没有可用的引用，则返回\
  \ `null`。`remove()` 方法与 `poll()` 方法的工作方式相同，区别在于如果队列中没有可用的引用，它会阻塞直到有引用可用。对于软引用、弱引用和虚引用，如果它们已被放入队列，`isEnqueued()`\
  \ 方法返回 `true`，否则返回 `false`。清单 11-10 演示了如何使用 `ReferenceQueue` 类。\n\n```\n// ReferenceQueueDemo.java\n\
  package com.jdojo.gc;\nimport java.lang.ref.ReferenceQueue;\nimport java.lang.ref.WeakReference;\n\
  public class ReferenceQueueDemo {\npublic static void main(String[] args) {\n//\
  \ 创建一个引用队列\nReferenceQueue q = new ReferenceQueue();\n// 将 BigObject 包装在软引用中\n//\
  \ 同时将软引用注册到引用队列\nBigObject bigObj = new BigObject(131);\nWeakReference wr = new\
  \ WeakReference(bigObj, q);\n// 清除对大对象的强引用\nbigObj = null;\n// 检查弱引用是否已入队\nSystem.out.println(\"\
  调用 gc() 之前：\");\nprintMessage(wr, q);\n// 调用垃圾回收器。如果运行，它将清除弱引用\nSystem.out.println(\"\
  正在调用垃圾回收器...\");\nSystem.gc();\nSystem.out.println(\"垃圾回收器执行完毕...\");\n// 检查弱引用是否已入队\n\
  System.out.println(\"调用 gc() 之后：\");\nprintMessage(wr, q);\n}\npublic static void\
  \ printMessage(WeakReference wr,\nReferenceQueue q) {\nSystem.out.println(\"wr.get()\
  \ = \" + wr.get());\nSystem.out.println(\"wr.isEnqueued() = \" + wr.isEnqueued());\n\
  WeakReference temp = (WeakReference) q.poll();\nif (temp == wr) {\nSystem.out.println(\"\
  q.poll() 返回了 wr\");\n} else {\nSystem.out.println(\"q.poll() = \" + temp);\n}\n\
  }\n}\n调用 gc() 之前：\nwr.get()= BigObject: id = 131\nwr.isEnqueued()= false\nq.poll()=\
  \ null\n正在调用垃圾回收器...\n垃圾回收器执行完毕...\n调用 gc() 之后：\nwr.get()= null\nwr.isEnqueued()=\
  \ true\nq.poll() 返回了 wr\nfinalize() called for id: 131\n清单 11-10.\n使用 ReferenceQueue\
  \ 类\n```\n\n使用 WeakReference 类\n\n软可达对象和弱可达对象之间的唯一区别在于：垃圾回收器每次运行时都会清除并回收弱可达对象，而对于软可达对象，它会使用某种算法来决定是否需要清除并回收。换句话说，垃圾回收器可能会也可能不会回收软可达对象，但它总是会回收弱可达对象。\n\
  \n\n\n你可能看不出弱引用有什么重要用途，因为当垃圾回收器运行时，其引用对象（referent）会被回收。通常，弱引用并非用于维护缓存，而是用于将额外数据与某个对象关联。假设你有一个人的详细信息及其地址。如果你丢失了该人的详细信息，你便不再关心其地址。然而，只要该人的详细信息可访问，你就希望保留其地址信息。这类信息可以通过弱引用和`Hashtable`来存储。`Hashtable`以键值对的形式存储对象。在向`Hashtable`添加键值对时，你需要将键对象包装在一个`WeakReference`对象中。\n\
  \n当键可访问或正在使用时，键和值不会被垃圾回收。当键对象不再使用时，由于它被包装在`WeakReference`内部，它将被垃圾回收。此时，你可以从`Hashtable`中移除该条目，这样值对象也将符合垃圾回收的条件。以下是使用`Hashtable`和`WeakReference`对象的示例代码片段：\n\
  \n```\n// 创建一个 Hashtable 对象\nHashtable ht = new Hashtable();\n// 创建一个引用队列，以便检查键何时被垃圾回收\n\
  ReferenceQueue q = new ReferenceQueue();\n// 创建键和值对象\nkey = 此处编写你的键对象创建逻辑\nvalue\
  \ = 此处编写你的值对象创建逻辑\n// 使用键对象作为引用对象创建一个弱引用对象\nWeakReference wKey = new WeakReference(key,\
  \ q);\n// 将键值对放入 Hashtable。注意，我们放入的是包装在弱引用中的键。\n// 也就是说，我们将使用 wKey 作为键\nht.put(wKey,\
  \ value);\n/* 在你的程序中使用键和值对象... */\n// 当键对象使用完毕后，将其设为 null，这样它就不再是强可达的。\nkey = null;\n\
  /* 此时，如果运行垃圾回收器，指向键对象的弱引用将被清除，\n并且 WeakReference 对象 wr 将被放入引用队列 q 中。\n*/\n// 移除已被垃圾回收的键对象对应条目的逻辑如下\n\
  if (wr.isEnqueued()) {\n// 这将使值对象符合回收条件\nht.remove(wr);\n}\n```\n\n请注意，使用`WeakReference`对象通过`Hashtable`将额外信息与对象关联，涉及一些复杂的代码和逻辑。`java.util.WeakHashMap`类无需编写任何复杂逻辑即可提供此功能。你可以将键值对添加到`WeakHashMap`中，而无需将键对象包装在`WeakReference`内部。`WeakHashMap`类会负责创建引用队列并将键对象包装在`WeakReference`中。使用`WeakHashMap`时有一个重要点需要记住：当键对象不再是强可达时，它会被回收。然而，值对象不会立即被回收。值对象会在条目从映射中移除后被回收。`WeakHashMap`会在指向键的弱引用被清除后，并且调用了其`put()`、`remove()`或`clear()`方法之一时，移除该条目。清单\
  \ 11-11 演示了`WeakHashMap`的使用。该示例使用`BigObject`类的对象作为键和值。输出中的消息显示了键和值对象何时被垃圾回收器回收。当你运行此程序时，可能会得到不同的输出。\n\
  \n```\n// WeakHashMapDemo.java\npackage com.jdojo.gc;\nimport java.util.WeakHashMap;\n\
  public class WeakHashMapDemo {\npublic static void main(String[] args) {\n// 创建一个\
  \ WeakHashMap\nWeakHashMap wmap = new WeakHashMap();\n// 向 WeakHashMap 添加两个键值对\n\
  BigObject key1 = new BigObject(10);\nBigObject value1 = new BigObject(110);\nBigObject\
  \ key2 = new BigObject(20);\nBigObject value2 = new BigObject(210);\nwmap.put(key1,\
  \ value1);\nwmap.put(key2, value2);\n// 打印一条消息\nprintMessage(\"添加两个条目后：\", wmap);\n\
  /* 调用 gc()。这次 gc() 调用不会回收任何键对象，\n因为我们仍然持有它们的强引用。\n*/\nSystem.out.println(\"第一次调用\
  \ gc()...\");\nSystem.gc();\n// 打印一条消息\nprintMessage(\"第一次 gc() 调用后：\", wmap);\n\
  // 现在移除对键和值的强引用\nkey1 = null;\nkey2 = null;\nvalue1 = null;\nvalue2 = null;\n/*\
  \ 调用 gc()。这次 gc() 调用将回收 id 为 10 和 20 的两个键对象。\n然而，对应的两个值对象在 WeakHashMap 内部仍然被强引用，\n\
  因此此时不会被回收。\n*/\nSystem.out.println(\"第二次调用 gc()...\");\nSystem.gc();\n// 打印一条消息\n\
  printMessage(\"第二次 gc() 调用后：\", wmap);\n/* 此时两个键都已被回收。为了使值对象可回收，我们将调用 WeakHashMap\
  \ 的 clear() 方法。\n通常，在你的程序中不会在这里调用此方法。\n*/\nwmap.clear();\n// 调用 gc() 以便回收值对象\nSystem.out.println(\"\
  第三次调用 gc()...\");\nSystem.gc();\n// 打印消息\nprintMessage(\"调用 clear() 方法后：\", wmap);\n\
  }\npublic static void printMessage(String msgHeader, WeakHashMap wmap) {\nSystem.out.println(msgHeader);\n\
  // 打印映射的大小和内容 */\nSystem.out.println(\"大小 = \" + wmap.size());\nSystem.out.println(\"\
  内容 = \" + wmap);\nSystem.out.println();\n}\n}\n添加两个条目后：\n大小 = 2\n内容 = {BigObject:\
  \ id = 20=BigObject: id = 210, BigObject: id = 10=BigObject: id = 110}\n第一次调用 gc()...\n\
  第一次 gc() 调用后：\n大小 = 2\n内容 = {BigObject: id = 20=BigObject: id = 210, BigObject:\
  \ id = 10=BigObject: id = 110}\n第二次调用 gc()...\n第二次 gc() 调用后：\nfinalize() 被调用，id:\
  \ 20\nfinalize() 被调用，id: 10\n大小 = 0\n内容 = {}\n第三次调用 gc()...\nfinalize() 被调用，id:\
  \ 210\nfinalize() 被调用，id: 110\n调用 clear() 方法后：\n大小 = 0\n内容 = {}\n清单 11-11.\n使用 WeakHashMap\n\
  ```\n\n使用 PhantomReference 类\n\n`PhantomReference`对象必须与一个`ReferenceQueue`一起创建。当垃圾回收器确定一个对象只有虚引用时，它会终结该对象并将虚引用添加到其引用队列中。\n\
  \n直到 JDK8，虚引用的工作方式与软引用和弱引用略有不同。与软引用和弱引用不同，它不会自动清除指向对象的虚引用。程序必须通过调用`clear()`方法来清除它。在程序清除指向该对象的虚引用之前，垃圾回收器不会回收该对象。因此，就对象回收而言，虚引用表现得像一个强引用。此行为在\
  \ JDK9 中已更改。在 JDK9 中，虚引用会像软引用和弱引用一样自动清除引用。\n\n为什么要使用虚引用而不是强引用？虚引用用于执行善后处理。与软引用和弱引用的`get()`方法不同，虚引用的`get()`方法始终返回`null`。当一个对象已被终结时，它处于虚可达状态。如果虚引用从其`get()`方法返回引用对象的引用，那将复活该引用对象。这就是为什么虚引用的`get()`方法始终返回`null`。\n\
  \n\n\n清单 11-12 演示了如何使用虚引用对对象进行善后处理。运行此程序时，你可能会得到不同的输出结果。\n\n```\n// PhantomRef.java\n\
  package com.jdojo.gc;\nimport java.lang.ref.PhantomReference;\nimport java.lang.ref.ReferenceQueue;\n\
  public class PhantomRef {\npublic static void main(String[] args) {\nBigObject bigObject\
  \ = new BigObject(1857);\nReferenceQueue q = new ReferenceQueue();\nPhantomReference\
  \ pr = new PhantomReference(bigObject, q);\n/* 此处可使用 BigObject 引用 */\n// 将 BigObject\
  \ 设为 null，这样垃圾回收器将只找到其虚引用并对其进行终结处理\nbigObject = null;\n// 调用垃圾回收器\nprintMessage(pr,\
  \ \"第一次调用 gc()：\");\nSystem.gc();\nprintMessage(pr, \"第一次调用 gc() 后：\");\n// 再次调用垃圾回收器\n\
  printMessage(pr, \"第二次调用 gc()：\");\nSystem.gc();\nprintMessage(pr, \"第二次调用 gc()\
  \ 后：\");\n}\npublic static void printMessage(PhantomReference pr, String msg) {\n\
  System.out.println(msg);\nSystem.out.println(\"pr.isEnqueued = \" + pr.isEnqueued());\n\
  System.out.println(\"pr.get() = \" + pr.get());\n// 我们将检查 pr 是否已入队。如果已入队，我们将清除其引用对象的引用\n\
  if (pr.isEnqueued()) {\n// 在 JDK9 之前，调用 pr.clear() 是必要的\n// 从 JDK9 开始，虚引用会自动清除\n\
  pr.clear();\nSystem.out.println(\"已清除引用对象的引用\");\n}\nSystem.out.println(\"-----------------------\"\
  );\n}\n}\n第一次调用 gc()：\npr.isEnqueued = false\npr.get() = null\n\nfinalize() called\
  \ for id: 1857\n第一次调用 gc() 后：\npr.isEnqueued = false\npr.get() = null\n\n第二次调用 gc()：\n\
  pr.isEnqueued = false\npr.get() = null\n\n第二次调用 gc() 后：\npr.isEnqueued = true\n\
  pr.get() = null\n已清除引用对象的引用\n\n清单 11-12.\n使用 PhantomReference 对象\n```\n\n你也可以使用虚引用来协调多个对象的善后处理。假设你有三个对象，分别名为\
  \ `obj1`、`obj2` 和 `obj3`。它们都共享一个网络连接。当这三个对象都变得不可达时，你希望关闭这个共享的网络连接。你可以通过将这三个对象包装在一个虚引用对象中，并使用一个引用队列来实现这一点。你的程序可以在一个单独的线程上等待所有三个虚引用对象入队。当最后一个虚引用入队时，你就可以关闭共享的网络连接。清单\
  \ 11-13 演示了使用虚引用进行善后协调。请注意，`PhantomRefDemo` 类的 `startThread()` 方法会创建并启动一个线程，该线程等待三个引用入队。一旦所有三个引用都入队并且它们的引用对象被清除，该线程就会退出应用程序。`ReferenceQueue`\
  \ 类的 `remove()` 方法会阻塞，直到队列中有虚引用为止。运行此程序时，你可能会得到不同的输出结果。\n\n```\n// PhantomRefDemo.java\n\
  package com.jdojo.gc;\nimport java.lang.ref.PhantomReference;\nimport java.lang.ref.Reference;\n\
  import java.lang.ref.ReferenceQueue;\npublic class PhantomRefDemo {\npublic static\
  \ void main(String[] args) {\nfinal ReferenceQueue q = new ReferenceQueue();\nBigObject\
  \ bigObject1 = new BigObject(101);\nBigObject bigObject2 = new BigObject(102);\n\
  BigObject bigObject3 = new BigObject(103);\nPhantomReference pr1 = new PhantomReference(bigObject1,\
  \ q);\nPhantomReference pr2 = new PhantomReference(bigObject2, q);\nPhantomReference\
  \ pr3 = new PhantomReference(bigObject3, q);\n/* 此方法将启动一个线程，等待引用队列 q 中出现新的虚引用 */\n\
  startThread(q);\n/* 此处可使用 bigObject1、bigObject2 和 bigObject3 */\n// 将 bigObject1、bigObject2\
  \ 和 bigObject3 设为 null，\n// 这样它们所引用的对象可能变为虚可达\nbigObject1 = null;\nbigObject2 =\
  \ null;\nbigObject3 = null;\n/* 让我们在循环中调用垃圾回收。一次垃圾回收只会终结 ID 为 101、102 和 103 的三个大对象。\n\
  它们可能不会被放入引用队列。在另一次垃圾回收运行时，它们将变为虚可达并被放入队列，\n等待线程会将其从队列中移除并清除其引用对象的引用。请注意，当线程的 run()\
  \ 方法内\n所有三个对象都被清除时，我们会退出应用程序。因此，以下无限循环对于演示目的来说是可行的。\n如果 System.gc() 在你的机器上未调用垃圾回收器，你应该将以下循环替换为一个循环，\n\
  该循环会创建许多大对象并保留其引用，以便垃圾回收器运行。\n*/\nwhile (true) {\nSystem.gc();\n}\n}\npublic static\
  \ void startThread(final ReferenceQueue q) {\nThread t = new Thread(() -> {\ntry\
  \ {\n// 等待并清除 3 个引用\nfor(int i = 0; i < 3; i++) {\nReference r = q.remove();\n//\
  \ 在 JDK9 之前，调用 r.clear() 是必要的\n// 从 JDK9 开始，它没有效果\nr.clear();\n}\nSystem.out.println(\"\
  所有三个对象已入队并清除。\");\n/* 通常，你将在此处释放三个对象共享的网络连接或任何资源 */\n// 退出应用程序\nSystem.exit(1);\n\
  } catch (InterruptedException e) {\nSystem.out.println(e.getMessage());\n}\n});\n\
  // 启动线程，该线程将等待三个虚引用入队\nt.start();\n}\n}\nfinalize() called for id: 103\nfinalize()\
  \ called for id: 102\nfinalize() called for id: 101\n所有三个对象已入队并清除。\n清单 11-13.\n\
  使用虚引用进行终结后协调\n```\n\n使用 Cleaner 类\n\n在前面的章节中，你学习了如何使用 `PhantomReference` 和 `ReferenceQueue`\
  \ 在对象变为虚可达时为其执行清理工作。设置和执行清理工作并不容易。JDK9 在 `java.lang.ref` 包中引入了一个名为 `Cleaner` 的新类。它用于让你在对象变为虚可达时为其运行一个清理动作。`Cleaner`\
  \ 类旨在让你更轻松地设置和执行清理工作。以下是需要执行的步骤：\n\n1.  使用名为 `create()` 的工厂方法之一创建一个 `Cleaner` 实例……你可以让\
  \ `Cleaner` 使用预定义的线程来执行清理动作，也可以在 `create()` 方法中指定你自己的 `ThreadFactory`。\n\n2.  使用\
  \ `Cleaner` 的 `register()` 方法注册对象及其清理动作。清理动作是一个 `Runnable`。\n\n3.  `Cleaner` 类的\
  \ `register()` 方法返回一个 `Cleaner.Cleanable` 嵌套接口的实例。该接口只包含一个名为 `clean()` 的方法。\n\n\n\
  \n4.  调用 `Cleanable` 的 `clean()` 方法，以取消注册该对象并执行清理工作。执行清理工作就是调用已注册 `Runnable` 的 `run()`\
  \ 方法。第二次调用 `clean()` 方法不会产生任何效果，因为第一次调用该方法时已经取消了对象的注册。\n\n5.  通常，`Cleanable` 的 `clean()`\
  \ 方法由 `Cleaner` 中的某个线程调用。但是，如果你知道清理工作需要发生的时间和地点，你可以通过显式调用此方法来执行清理。\n\n6.  如果你打算在\
  \ `try-with-resources` 块中使用你类的对象，你需要实现 `AutoCloseable` 接口。你可以在 `close()` 方法内部调用代表你已注册对象的\
  \ `Cleanable` 的 `clean()` 方法。\n\n现在，我将带你了解一个如何使用 `Cleaner` 类的示例。你可以使用 `Cleaner`\
  \ 类的以下方法之一来创建一个 `Cleaner`：\n\n*   `static Cleaner create()`\n\n*   `static Cleaner\
  \ create(ThreadFactory threadFactory)`\n\n通常，你会为整个应用程序或库创建一个 `Cleaner` 对象，并将其引用存储在一个静态变量中。以下语句创建了一个\
  \ `Cleaner`：\n\n```\nCleaner cleaner = Cleaner.create();\n```\n\n假设你有以下对象，当它变为虚可达时需要执行清理工作：\n\
  \n```\nObject myObject = /* 获取你的对象 */;\n```\n\n下一步是定义一个清理动作，即一个 `Runnable`。有几种创建\
  \ `Runnable` 的方法，例如使用 lambda 表达式、内部类、匿名内部类、嵌套内部类，以及拥有一个实现 `Runnable` 接口的顶级类。你选择哪种方法创建\
  \ `Runnable` 并不重要。重要的是要确保 `Runnable` 不会存储它应该执行清理工作的那个对象的引用。否则，该对象将永远不会变为虚可达，并且你的清理动作也永远不会被\
  \ `Cleaner` 调用。你需要确保所有需要清理的资源对 `Runnable` 都是可访问的。假设你有一个存储了网络连接的对象，并且你想在对象清理时关闭该连接。你需要使该网络连接对\
  \ `Runnable` 可访问，这样它就能在执行清理工作时关闭连接。以下伪语句创建了一个 `Runnable`：\n\n```\nRunnable cleaningAction\
  \ = /* 获取一个 Runnable 实例 */;\n```\n\n以下语句将 `myObject` 及其 `cleaningAction` 注册到 `Cleaner`：\n\
  \n```\nCleaner.Cleanable cleanable = cleaner.register(myObject, cleaningAction);\n\
  ```\n\n通常，你会将 `Cleanable` 的引用保存在对象的实例变量中，这样如果需要，你可以直接调用其 `clean()` 方法来显式清理你的对象。清单\
  \ 11-14 包含了 `CleanBigObject` 类的代码。其各部分说明紧随代码之后。\n\n```\n// CleanBigObject.java\n\
  package com.jdojo.gc;\nimport java.lang.ref.Cleaner;\npublic class CleanBigObject\
  \ implements AutoCloseable {\n// 声明一个 20KB 的大数组。\nprivate final long[] anArray =\
  \ new long[20480];\n// 使用 id 来追踪对象\nprivate final long id;\n// 让我们使用一个 Cleaner\n\
  public static Cleaner cleaner = Cleaner.create();\n// 将清理动作的引用保存为 Cleanable\nprivate\
  \ final Cleaner.Cleanable cleanable;\n// 声明一个清理动作类，需要实现 Runnable\nprivate static\
  \ class BigObjectCleaner implements Runnable {\nprivate final long id;\nBigObjectCleaner(long\
  \ id) {\nthis.id = id;\n}\n@Override\npublic void run() {\nSystem.out.println(\"\
  正在清理 CleanBigObject: id = \" + this.id);\n}\n}\npublic CleanBigObject(long id) {\n\
  this.id = id;\n// 将此对象注册到 cleaner\nthis.cleanable = cleaner.register(this, new BigObjectCleaner(id));\n\
  }\n@Override\npublic void close() {\n// 显式清理对象，或作为 try-with-resources 块的一部分进行清理\n\
  cleanable.clean();\n}\n@Override\npublic String toString() {\nreturn \"CleanBigObject:\
  \ id = \" + id;\n}\n}\n清单 11-14.\nCleanBigObject 类\n```\n\n以下是 `CleanBigObject`\
  \ 类的不同部分：\n\n*   `CleanBigObject` 类声明了一个大的 `long` 数组。\n\n*   其 `id` 实例变量用于追踪每个对象的\
  \ ID。\n\n*   它创建了一个 `Cleaner` 对象并将其存储在一个公有类变量中。这个 `Cleaner` 旨在供此类和其他类的对象用于注册清理动作。\n\
  \n*   它声明了一个 `Cleaner.Cleanable` 类型的私有实例变量，用于存储已注册的清理动作，以便后续使用，例如在其 `close()` 方法中使用。\n\
  \n*   `BigObjectCleaner` 类是一个私有的嵌套静态类，它实现了 `Runnable`；其实例代表 `CleanBigObject` 类对象的清理动作。该类的构造函数接受\
  \ `CleanBigObject` 的 ID。在实际应用中，构造函数会接受需要清理的资源。`run()` 方法简单地打印一条消息，其中包含正在被清理的 `CleanBigObject`\
  \ 的 ID。\n\n*   `CleanBigObject` 类的构造函数接受一个 ID 来标识对象。该 ID 存储在其实例变量中。构造函数将该对象及其清理动作注册到\
  \ `Cleaner`。\n\n*   `CleanBigObject` 类的 `close()` 方法已被实现，因为该类实现了 `AutoCloseable`\
  \ 接口，所以你可以在 `try-with-resources` 块中使用此类的对象。该方法调用 `Cleanable` 的 `clean()` 方法，如果 `CleanBigObject`\
  \ 尚未被清理，该方法将清理它。\n\n*   `toString()` 方法返回一个包含对象 ID 的字符串表示。\n\n清单 11-15 包含了 `CleanerTest`\
  \ 类的代码。在其 `main()` 方法中，它创建了三个 `CleanBigObject` 类的对象，并尝试以三种不同的方式清理这些对象。第一个示例使用了 `try-with-resources`\
  \ 块，因此 `CleanBigObject` 类的 `close()` 方法会被自动调用，从而清理该对象。第二个示例通过显式调用其 `close()` 方法来清理对象。第三个示例创建了对象但没有存储其引用，并通过调用\
  \ `System.gc()` 来触发垃圾回收。最后，程序休眠两秒钟，以便在之前对 `System.gc()` 的调用使 JVM 运行垃圾回收时，给垃圾回收留出完成的时间。请注意，不能保证垃圾回收一定会运行，在这种情况下，你可能看不到输出中的最后一行。\n\
  \n\n\n```\n// CleanerTest.java\npackage com.jdojo.gc;\npublic class CleanerTest\
  \ {\npublic static void main(String[] args) throws InterruptedException {\n// 让我们在\
  \ try-with-resources 块中尝试使用 CleanBigObject\ntry (CleanBigObject cbo1 = new CleanBigObject(1969);)\
  \ {\nSystem.out.println(cbo1 + \" 在 try-with-resources 块内创建。\");\n}\n// 让我们显式创建并清理一个\
  \ CleanBigObject\nCleanBigObject cbo2 = new CleanBigObject(1968);\nSystem.out.println(cbo2\
  \ + \" 已创建。\");\ncbo2.close();\ncbo2 = null;\n// 让我们创建多个 CleanBigObject，并让 Cleaner\n\
  // 自动清理这些对象\nnew CleanBigObject(1982);\nSystem.gc();\n// 等待 2 秒让垃圾回收器完成\nThread.sleep(20000);\n\
  }\n}\nCleanBigObject: id = 1969 在 try-with-resources 块内创建。\n正在清理 CleanBigObject:\
  \ id = 1969\nCleanBigObject: id = 1968 已创建。\n正在清理 CleanBigObject: id = 1968\n正在清理\
  \ CleanBigObject: id = 1982\n清单 11-15.\n用于测试 CleanBigObject 类对象的测试类\n```\n\n摘要\n\
  \n回收死亡对象内存的过程称为垃圾回收。Java 中的垃圾回收是自动进行的。Java 运行时在一个低优先级的后台线程中运行垃圾回收。JVM 会在抛出 `OutOfMemoryError`\
  \ 之前尽最大努力释放死亡对象的内存。你可以向 JVM 传递一个提示（尽管应用程序中并不需要），方法是调用 `Runtime.getRuntime().gc()`。你也可以使用便捷方法\
  \ `System.gc()` 向 JVM 传递相同的提示。JVM 可以自由地忽略该提示。\n\n一个不可达对象所占用的内存在两个阶段中被回收。第一阶段称为终结化，是在垃圾回收器回收对象使用的内存之前，自动对不可达对象执行的一个操作。包含要执行操作的代码块称为终结器。终结器通过对象的\
  \ `finalize()` 方法实现。在 `finalize()` 方法中，不可达对象可以通过将其引用存储在一个可达对象中来复活自身。在第二阶段，如果对象仍然不可达，则该对象占用的内存将被回收。\n\
  \n有时，你可能希望使用对内存敏感的对象，如果内存充足，这些对象可以保留在内存中。然而，如果应用程序内存不足，回收这些对象也是可以的。通常，为获得更好性能而缓存的对象属于这一类。Java\
  \ 在 `java.lang.ref` 包中提供了 `SoftReference<T>`、`WeakReference<T>` 和 `PhantomReference<T>`\
  \ 类来处理此类对内存敏感的对象。当这些对象的引用对象可达性发生变化时，它们可以被排入 `ReferenceQueue`，以便你可以检查队列并执行清理工作。\n\
  \nJDK9 在 `java.lang.ref` 包中新增了一个名为 `Cleaner` 的类。该类提供了一种更好的方式，在对象变为虚可达时对其进行清理。`Cleaner`\
  \ 允许你将对象及其清理操作注册为一个 `Runnable`。当注册的对象变为虚可达时，`Cleaner` 会使用为该对象注册的 `Runnable` 执行清理工作。`Cleaner`\
  \ 还允许你显式地清理对象。它保证在任何情况下清理操作只会执行一次。\n\n问题与练习\n\n1.  显式与隐式内存分配及内存回收之间的区别是什么？\n\n2.\
  \  什么是悬空引用？\n\n3.  什么是内存泄漏？\n\n4.  什么是垃圾回收和垃圾回收器？\n\n5.  展示在程序中调用垃圾回收器的两种方法。\n\n\
  6.  什么是 `finalize()` 方法？垃圾回收器如何使用它？\n\n7.  在抛出 `OutOfMemoryError` 之前，Java 运行时做了什么？\n\
  \n8.  Java 中的对象复活是什么？\n\n9.  如何请求 Java 运行时运行垃圾回收？\n\n10. 描述 `WeakReference<T>`、`SoftReference<T>`\
  \ 和 `PhantomReference<T>` 类的用途。\n\n11. 何时使用 `ReferenceQueue`？\n\n12. 如何在 JDK9 中引入的\
  \ `Cleaner` 类？\n\n12. 集合\n\n在本章中，你将学习：\n\n*   什么是集合\n\n*   什么是集合框架及其架构\n\n*   遍历集合中元素的不同方式\n\
  \n*   不同类型的集合，例如 `List`、`Set`、`Queue`、`Map` 等\n\n*   对集合应用算法\n\n*   获取集合的不同视图\n\n\
  *   创建空集合和单例集合\n\n*   基于哈希的集合内部如何工作\n\n本章中的所有示例程序都是 `jdojo.collections` 模块的成员，如清单\
  \ 12-1 所示。\n\n```\n// module-info.java\nmodule jdojo.collections {\nexports com.jdojo.collections;\n\
  }\n清单 12-1.\njdojo.collections 模块的声明\n```\n\n什么是集合？\n\n集合 是一个包含一组对象的对象。集合也称为容器。集合中的每个对象称为集合的一个元素。\n\
  \nJava 中集合的概念与我们日常生活中的集合概念并无不同。你每天都会看到各种不同的集合。每个集合都包含一组对象。是什么区分了一种集合类型与另一种集合类型？它们根据管理其元素的方式加以区分。让我们从日常生活中举几个集合的例子。\n\
  \n让我们从存钱罐开始。存钱罐是集合的一个例子。它包含一组硬币。你会按特定顺序将硬币放入罐中吗？你会按特定顺序从罐中取出硬币吗？你能在罐中放入多个相同种类的硬币吗？你能一次性取出所有硬币，还是必须一次取一个？\n\
  \n你能称字母表为一个集合吗？它难道不是字母的集合吗？字母表中有重复的字母吗？不，字母表中不能有重复的字母。然而，你的存钱罐中可以有重复的硬币。\n\n考虑邮局柜台前顾客排成的队列。顾客队列难道不是顾客的集合吗？当然是。这个队列遵循任何特定规则吗？是的，它确实遵循一条规则，即先到先服务。你可以将先到先服务的规则重新表述为先进先出（FIFO）。\n\
  \n考虑你书桌上的一摞书。它难道不也是书的集合吗？是的。假设你一次只处理一本书，它是否遵循最后放在书堆上的书将最先被取走的规则？好吧，这条规则似乎与邮局队列中顾客集合的规则相反。这一次，书堆遵循的是后进先出（LIFO）规则。\n\
  \n我刚才提到了几个遵循不同规则来管理其元素的集合的例子。如果你必须将这些对象集合建模到 Java 程序中，你会怎么做？首先，你会对程序中可能处理的所有可能的集合类型进行分类。然后，你会编写一些可重用的通用接口和类，以便在处理对象集合的情况下使用。好消息是，你不需要编写通用代码来管理集合。Java\
  \ 语言的设计者意识到了这种需求，并在 Java 库中引入了一个框架，称为集合框架。\n\n\n集合框架\n由接口、实现类和一些工具类组成，可让你处理在 Java\
  \ 应用程序中可能遇到的大多数集合类型。如果你遇到 Java 未提供实现的集合类型，你始终可以自行实现，并且该实现将与集合框架无缝协作。集合框架简单、强大，是一个令人兴奋的学习主题。本章将探讨集合框架中可用的不同类型的集合。图\
  \ 12-1 展示了五种类型的集合：包、列表、队列、栈和映射。\n\n![A323070_2_En_12_Fig1_HTML.gif](img/A323070_2_En_12_Fig1_HTML.gif)\n\
  \n图 12-1.\n\n五种不同类型集合的示意图\n\n图中有一个集合（映射）很突出：它是一个姓名-电话号码对的集合。它将姓名映射到电话号码。此时，这些图片并未与\
  \ Java 中任何特定类型的集合类相关联。它们只是帮助你形象地理解 Java 集合与你日常生活中的集合是一样的。某些集合中的箭头表示元素进入和离开集合的方向。你可能会注意到，某些集合强制要求元素必须以特定方式添加到集合中，并且必须以特定方式离开（被移除）集合。例如，在队列中，元素从一端进入，从另一端离开；在栈中，元素从同一端进入和离开。\n\
  \n集合框架的必要性\n\nJava 编程语言从一开始就内置了对数组的支持。使用数组也是存储和检索一组对象引用和原始值最高效的方法之一。既然 Java 中已经有了数组，为什么我们还需要集合框架呢？在\
  \ Java 中使用数组具有以下优点：\n\n*   它可以使用索引来存储和检索值，并且速度很快。\n*   它知道自己的类型。它提供编译时类型检查，例如，你不能将\
  \ `double` 值存储在 `int` 数组中，但如果数组是 `Object` 类型，则没有编译时类型安全性，因为任何类型的对象都可以存储在数组中。\n*\
  \   你可以拥有对象数组和原始类型数组。\n*   有一个名为 `java.util.Arrays` 的辅助类可以帮助你处理数组。例如，它提供了搜索数组、对数组元素进行排序等方法。\n\
  \n在 Java 中使用数组具有以下缺点：\n\n*   数组的大小是固定的。你必须在创建时指定大小。一旦创建，数组大小就不能更改。也就是说，如果你需要，数组不能扩展或收缩。\n\
  *   如果你将元素存储在数组的特定位置，之后又想移除它，则无法知道该位置的元素已被移除。\n*   编译时类型检查虽然是一个优点，但也成了一个缺点。它不能存储不同类型的值。例如，一个\
  \ `Car` 类的数组只能存储 `Car` 类型的对象。一个 `double` 类型的原始数组只能存储 `double` 类型的值。\n*   如果你想使用数组实现特定类型的集合，则需要编写大量代码。假设你想要一个不允许重复值的集合。当然，你可以开发一个新类，使用数组来实现你的集合。然而，这是一项耗时的任务。\n\
  \n集合框架提供了数组提供的所有功能。它还提供了许多数组未提供的其他功能。集合框架团队已经经历了设计、开发和测试使用不同类型集合所需的接口和类的痛苦过程。你只需要学习这些类和接口，并在你的\
  \ Java 程序中使用它们。在学习集合时，你需要记住以下几点：\n\n*   集合被设计为仅适用于对象。要处理原始类型的集合，你可以将原始值包装和解包到包装器对象中，或者利用\
  \ Java 内置的自动装箱功能，该功能会根据需要自动包装和解包原始值。\n*   Java 中所有的集合类和接口都是泛型的。也就是说，你可以将集合处理的元素类型指定为类型参数。\n\
  \n集合框架的架构\n\n集合框架的类型主要位于 `java.util` 包中。表示并发集合的类型位于 `java.util.concurrent` 包中。集合框架由三个主要组件组成：\n\
  \n*   接口\n*   实现类\n*   算法类\n\n接口表示框架中特定类型的集合。每种类型的集合都定义了一个接口；例如，`List<E>` 接口表示列表，`Set<E>`\
  \ 接口表示集合，`Map<K,V>` 接口表示映射等。使用接口（而不是类）来定义集合具有以下优点：\n\n*   你使用接口编写的代码不依赖于任何特定的实现。\n\
  *   实现由接口定义的集合的类可以更改，而无需强制你更改使用接口编写的代码。\n*   你可以为集合接口提供自己的实现，以满足特定需求。\n\n集合框架提供了集合接口的实现，这些实现被称为实现类。你需要创建这些类的对象来拥有一个集合。建议使用接口编写代码，而不是使用它们的实现类。以下代码片段展示了如何使用实现类\
  \ `ArrayList<E>` 创建一个列表，并将引用存储在类型为 `List`（表示列表的接口）的变量中：\n\n```\n// 使用 ArrayList\
  \ 作为实现类创建一个字符串列表\nList names = new ArrayList();\n// 从此处开始使用 names 变量\n```\n\n注意\n\
  \n所有集合类型中的参数 `E` 代表集合中的元素类型。映射中的类型参数命名为 `K` 和 `V`，分别代表映射中键的类型和值的类型。\n\n有时你需要对集合执行不同的操作，例如搜索集合、将一种类型的集合转换为另一种类型、将元素从一个集合复制到另一个集合、按特定顺序对集合的元素进行排序等。算法类允许你将这些类型的算法应用于你的集合。\n\
  \n通常，你不需要开发这三个类别中的任何接口或类。集合框架为你提供了所需的所有接口和类。你可以从各种集合接口及其实现中进行选择。图 12-2 展示了定义集合的接口。我将在后续章节中详细讨论每种类型的集合。\n\
  \n![A323070_2_En_12_Fig2_HTML.jpg](img/A323070_2_En_12_Fig2_HTML.jpg)\n\n图 12-2.\n\
  \n包含集合框架中大多数接口的类图\n\nCollection<E> 接口\n\n\n\n`Collection<E>` 接口是集合接口层次结构的根接口。它定义了一个泛型集合。Collections\
  \ 框架并未为 `Collection` 接口提供实现。这是最通用的集合类型。你可以将其用作方法中的参数类型，当你不在意参数的具体集合类型（只要它不是 Map）时即可使用。它声明了被其他类型的集合接口所继承的方法。非\
  \ Map 的集合接口继承自 `Collection` 接口，并添加了各自的方法，以提供特定于其类型的功能。`Collection` 接口的方法可分为以下几类：\n\
  \n*   基本操作方法\n*   批量（或分组）操作方法\n*   聚合操作方法\n*   数组操作方法\n*   比较操作方法\n\n`Collection`\
  \ 接口中的方法进一步分为可选方法和必需方法。实现类不必为可选方法提供实现。如果某个实现类选择不为可选方法提供实现，那么这些方法必须抛出 `UnsupportedOperationException`。\n\
  \n基本操作方法\n\n基本操作方法允许你对集合执行基本操作，例如获取其大小（元素数量）、添加新元素、移除元素、检查某个对象是否是该集合的元素、检查集合是否为空等。`Collection`\
  \ 接口中属于此类别的一些方法如下：\n\n*   `int size()`：返回集合中的元素数量。\n*   `boolean isEmpty()`：如果集合为空，则返回\
  \ `true`。否则返回 `false`。其作用与检查 `size()` 是否为零相同。\n*   `boolean contains(Object o)`：如果集合包含指定对象，则返回\
  \ `true`。否则返回 `false`。\n*   `boolean add(E o)`：向集合添加一个元素。如果集合发生改变，则返回 `true`。否则返回\
  \ `false`。如果实现不允许集合中存在重复元素，那么当你用一个已在集合中的元素调用此方法时，它将返回 `false`。如果集合有大小限制且没有空间，该方法会抛出\
  \ `IllegalStateException`。\n*   `boolean remove(Object o)`：从集合中移除指定对象。如果此调用导致集合发生改变，则返回\
  \ `true`。否则返回 `false`。\n*   `Iterator<E> iterator()`：返回一个可用于遍历集合中元素的迭代器。\n\n批量操作方法\n\
  \n批量操作方法允许你对集合执行涉及一组对象的操作，例如移除所有元素、检查一个集合是否包含另一个集合的所有元素、将一个集合的所有元素添加到另一个集合等。`Collection`\
  \ 接口中属于此类别的一些方法如下：\n\n*   `boolean addAll(Collection<? extends E> c)`：将指定集合中的所有元素添加到此集合。如果此调用导致集合发生改变，则返回\
  \ `true`。否则返回 `false`。\n*   `void clear()`：移除集合中的所有元素。\n*   `boolean containsAll(Collection<?>\
  \ c)`：如果指定集合中的所有元素也都是此集合的元素，则返回 `true`。否则返回 `false`。\n*   `boolean removeAll(Collection<?>\
  \ c)`：移除此集合中所有属于指定集合的元素。如果此调用导致集合发生改变，则返回 `true`。否则返回 `false`。\n*   `boolean retainAll(Collection<?>\
  \ c)`：仅保留那些也属于指定集合的元素。也就是说，它将移除此集合中所有不属于指定集合的元素。如果此调用导致集合发生改变，则返回 `true`。否则返回 `false`。\n\
  \n聚合操作方法\n\nJava 8 通过流（streams）为集合添加了对聚合操作的支持。流是一个元素序列，支持顺序和并行的聚合操作，例如计算元素为整数的集合中所有元素的总和。流是一个庞大的主题，我将在第\
  \ 13 章讨论。流是 `java.util.stream` 包中 `Stream` 接口的一个实例。你可以使用 `Collection` 接口的以下方法从集合创建\
  \ `Stream` 实例：\n\n*   `default Stream<E> stream()`：返回一个顺序 `Stream`，以该集合作为 `Stream`\
  \ 的元素源。\n*   `default Stream<E> parallelStream()`：返回一个可能并行的 `Stream`，以该集合作为 `Stream`\
  \ 的元素源。\n\n数组操作方法\n\n数组操作方法允许你将集合转换为数组。以下是此类别中的方法：\n\n*   `Object[] toArray()`：以数组形式返回集合中的元素。\n\
  *   `<T> T[] toArray(T[] a)`：返回一个包含集合所有元素的指定类型 `T` 的数组。如果指定数组的长度大于或等于集合的大小，则所有元素都会被复制到指定数组中，并返回该数组。数组中的任何额外元素都将被设置为\
  \ null。否则，它会创建一个类型为 `T`、长度等于集合大小的新数组，将集合的所有元素复制到新数组中，并返回该新数组。\n\n比较操作方法\n\n比较操作方法允许你比较两个集合是否相等。以下是此类别中的方法：\n\
  \n*   `boolean equals(Object o)`：如果两个集合相等，则返回 `true`。否则返回 `false`。具体的集合类型规定了两个集合相等的标准。\n\
  *   `int hashCode()`：返回集合的哈希码。假设 `c1` 和 `c2` 是两个集合的引用。如果 `c1.equals(c2)` 返回 `true`，那么\
  \ `c1.hashCode() == c2.hashCode()` 也必须返回 `true`。\n\n快速示例\n\n在讨论不同类型的集合之前，我先给出一个使用列表（一种对象集合）的快速示例。列表是一个有序的对象集合。`List<E>`\
  \ 接口的实例代表一个列表。`ArrayList<E>` 类是 `List<E>` 接口的一个实现。清单 12-2 中的程序创建了一个用于存储名称的列表，并使用\
  \ `Collection` 接口的不同方法操作该列表。\n\n该程序使用 `add()` 方法向列表添加一些名称。它使用 `remove()` 方法从列表中移除一个名称。`clear()`\
  \ 方法用于移除列表中的所有名称。在每个阶段，程序都会打印列表的大小和列表中的元素。\n\n提示\n\n列表（以及所有类型的集合）的 `toString()`\
  \ 方法会返回一个用逗号分隔、并用方括号括起来的元素列表。如果集合为空，则返回一对空括号（`[]`）。只要每个元素都有合理的 `toString()` 实现，该字符串对于调试非常有用。\n\
  \n\n```markdown\n\n```\n// NamesList.java\npackage com.jdojo.collections;\nimport\
  \ java.util.ArrayList;\nimport java.util.List;\npublic class NamesList {\npublic\
  \ static void main(String[] args) {\n// 创建一个字符串列表\nList names = new ArrayList();\n\
  // 打印列表详情\nSystem.out.printf(\"创建后：大小 = %d，元素 = %s%n\",\nnames.size(), names);\n\
  // 向列表添加一些名字\nnames.add(\"Ken\");\nnames.add(\"Lee\");\nnames.add(\"Joe\");\n//\
  \ 打印列表详情\nSystem.out.printf(\"添加 3 个元素后：大小 = %d，元素 = %s%n\",\nnames.size(), names);\n\
  // 从列表中移除 Lee\nnames.remove(\"Lee\");\n// 打印列表详情\nSystem.out.printf(\"移除 1 个元素后：大小\
  \ = %d，元素 = %s%n\",\nnames.size(), names);\n// 清除所有元素\nnames.clear();\n// 打印列表详情\n\
  System.out.printf(\"清除所有元素后：大小 = %d，元素 = %s%n\",\nnames.size(), names);\n}\n}\n\
  清单 12-2.\n使用列表存储名字\n```\n\n```\n创建后：大小 = 0，元素 = []\n添加 3 个元素后：大小 = 3，元素 = [Ken,\
  \ Lee, Joe]\n移除 1 个元素后：大小 = 2，元素 = [Ken, Joe]\n清除所有元素后：大小 = 0，元素 = []\n```\n\n遍历集合中的元素\n\
  \n大多数情况下，你需要逐个访问集合中的所有元素。不同类型的集合以不同方式存储其元素。有些集合对元素施加顺序，有些则不然。**集合框架**提供了以下遍历集合的方式：\n\
  \n*   使用 `Iterator`\n*   使用 `for-each` 循环\n*   使用 `forEach()` 方法\n\n**提示**\n\n某些集合（如列表）会为每个元素分配一个索引，并允许你通过索引访问其元素。你也可以使用常规的\
  \ `for` 循环语句来遍历这些集合。\n\n使用迭代器\n\n集合提供一个**迭代器**来遍历其所有元素。有时迭代器也被称为生成器或游标。迭代器允许你对集合执行以下三种操作：\n\
  \n*   检查是否还有尚未被此迭代器访问过的元素。\n*   访问集合中的下一个元素。\n*   移除集合中最后被访问的元素。\n\n**注意**\n\n集合中“下一个元素”的含义取决于集合类型。迭代器本身不会强加任何顺序来决定它从集合中返回元素的顺序。但是，如果集合对其元素施加了顺序，迭代器将保持相同的顺序。通常，“下一个元素”指的是集合中尚未被此迭代器返回的任何元素。\n\
  \nJava 中的迭代器是 `Iterator<E>` 接口的一个实例。你可以使用 `Collection` 接口的 `iterator()` 方法为集合获取一个迭代器。以下代码片段创建了一个字符串列表，并为其获取了一个迭代器：\n\
  \n```\n// 创建一个字符串列表\nList names = new ArrayList();\n// 为列表获取一个迭代器\nIterator nameIterator\
  \ = names.iterator();\n```\n\n`Iterator<E>` 接口包含以下方法：\n\n*   `boolean hasNext()`\n\
  *   `E next()`\n*   `default void remove()`\n*   `default void forEachRemaining(Consumer<?\
  \ super E> action)`\n\n`hasNext()` 方法在集合中还有更多元素可供迭代时返回 `true`，否则返回 `false`。通常，在向迭代器请求集合中的下一个元素之前，你会调用此方法。\n\
  \n`next()` 方法返回集合中的下一个元素。在调用 `next()` 方法之前，应始终先调用 `hasNext()` 方法。如果你调用了 `next()`\
  \ 方法，但迭代器没有更多元素可返回，它会抛出 `NoSuchElementException`。\n\n通常，`hasNext()` 和 `next()` 方法会在循环中一起使用。以下代码片段使用迭代器打印列表的所有元素：\n\
  \n```\nList names = /* 获取一个列表 */;\n// 为列表获取一个迭代器\nIterator nameIterator = names.iterator();\n\
  // 遍历列表中的所有元素\nwhile(nameIterator.hasNext()) {\n// 从列表中获取下一个元素\nString name = nameIterator.next();\n\
  // 打印名字\nSystem.out.println(name);\n}\n```\n\n`remove()` 方法会移除集合中上一次调用迭代器的 `next()`\
  \ 方法所返回的元素。每次调用 `next()` 方法后，`remove()` 方法只能被调用一次。如果每次 `next()` 方法调用后多次调用 `remove()`\
  \ 方法，或者在首次调用 `next()` 方法之前调用，则会抛出 `IllegalStateException`。对 `remove()` 方法的支持是可选的。如果迭代器不支持移除操作，调用其\
  \ `remove()` 方法可能会抛出 `UnsupportedOperationException`。\n\n以下代码片段使用迭代器遍历列表的所有元素，如果元素长度仅为两个字符，则使用迭代器的\
  \ `remove()` 方法将其移除：\n\n```\nList names = /* 获取一个列表 */;\n// 为列表获取一个迭代器\nIterator\
  \ nameIterator = names.iterator();\n// 遍历列表中的所有元素\nwhile(nameIterator.hasNext())\
  \ {\nString name = nameIterator.next();\n// 如果名字是两个字符则移除\nif (name.length() == 2)\
  \ {\nnameIterator.remove();\n}\n}\n```\n\n`forEachRemaining()` 方法对集合中尚未被迭代器访问的每个元素执行一个操作。该操作被指定为一个\
  \ `Consumer`。你可以使用以下代码片段打印列表的所有元素：\n\n```\nList names = /* 获取一个列表 */;\n// 为列表获取一个迭代器\n\
  Iterator nameIterator = names.iterator();\n// 打印列表中的名字\nnameIterator.forEachRemaining(System.out::println);\n\
  ```\n\n该代码使用方法引用 `System.out::println` 作为 `forEachRemaining()` 方法的 `Consumer`。请注意，使用\
  \ `forEachRemaining()` 方法有助于缩短代码，因为它消除了使用 `hasNext()` 和 `next()` 方法进行循环的需要。有关使用\
  \ `Consumer` 接口和方法引用的更多信息，请参阅第 5 章。\n\n清单 12-3 包含一个完整的程序，该程序使用迭代器及其 `forEachRemaining()`\
  \ 方法将列表的所有元素打印到标准输出。\n\n```\n// NameIterator.java\npackage com.jdojo.collections;\n\
  import java.util.ArrayList;\nimport java.util.List;\npublic class NameIterator {\n\
  public static void main(String[] args) {\n// 创建一个字符串列表\nList names = new ArrayList();\n\
  // 向列表添加一些名字\nnames.add(\"Ken\");\nnames.add(\"Lee\");\nnames.add(\"Joe\");\n//\
  \ 打印 names 列表的所有元素\nnames.iterator()\n.forEachRemaining(System.out::println);\n\
  }\n}\n清单 12-3.\n使用迭代器遍历列表元素\n```\n\n```\nKen\nLee\nJoe\n```\n\n**集合框架**支持**快速失败**的并发迭代器。你可以为一个集合获取多个迭代器，并且所有这些迭代器都可以并发地遍历同一个集合。如果在获取迭代器之后，通过任何方式（除了使用同一迭代器的\
  \ `remove()` 方法）修改了集合，那么尝试使用该迭代器访问下一个元素将抛出 `ConcurrentModificationException`。这意味着你可以为一个集合拥有多个迭代器；但是，所有迭代器必须都在访问（读取）集合的元素。如果任何迭代器使用其\
  \ `remove()` 方法修改了集合，那么修改集合的迭代器将正常工作，而所有其他迭代器将失败。如果在所有迭代器之外修改了集合，则所有迭代器都将失败。\n\n\
  **提示**\n\n```\n\n\n`Iterator` 是一个一次性对象。你无法重置迭代器，也不能重复使用它来遍历集合中的元素。如果需要再次遍历同一个集合的元素，必须通过调用集合的\
  \ `iterator()` 方法来获取一个新的 `Iterator`。\n\n使用 for-each 循环\n\n你可以使用 `for-each` 循环来遍历集合中的元素，该循环隐藏了为集合设置迭代器的逻辑。`for-each`\
  \ 循环的通用语法如下：\n\n```\nCollection yourCollection = /* 获取一个集合 */;\nfor(T element :\
  \ yourCollection) {\n/* for-each 循环体对 yourCollection 中的每个元素执行一次。\n每次执行循环体代码时，element\
  \ 变量都持有集合中当前元素的引用。\n*/\n}\n```\n\n提示\n\n你可以使用 `for-each` 循环来遍历任何其实现类实现了 `Iterable`\
  \ 接口的集合。`Collection` 接口继承自 `Iterable` 接口，因此，你可以对实现了 `Collection` 接口的所有类型的集合使用 `for-each`\
  \ 循环。`Map` 集合类型不继承自 `Iterable` 接口，因此，你不能使用 `for-each` 循环来遍历 `Map` 中的条目。\n\n`for-each`\
  \ 循环简单且紧凑。在幕后，它会为你的集合获取迭代器，并为你调用 `hasNext()` 和 `next()` 方法。你可以像下面这样遍历字符串列表中的所有元素：\n\
  \n```\nList names = /* 获取一个列表 */;\n// 使用 for-each 循环打印列表中的所有元素\nfor(String name\
  \ : names) {\nSystem.out.println(name);\n}\n```\n\n清单 12-4 包含了一个完整的程序，演示了如何使用 `for-each`\
  \ 循环来遍历字符串列表中的元素。该程序简单明了，不言自明。\n\n```\n// ForEachLoop.java\npackage com.jdojo.collections;\n\
  import java.util.ArrayList;\nimport java.util.List;\npublic class ForEachLoop {\n\
  public static void main(String[] args) {\n// 创建一个字符串列表\nList names = new ArrayList();\n\
  // 向列表中添加一些名字\nnames.add(\"Ken\");\nnames.add(\"Lee\");\nnames.add(\"Joe\");\n//\
  \ 打印 names 列表中的所有元素\nfor(String name : names) {\nSystem.out.println(name);\n}\n\
  }\n}\n清单 12-4.\n使用 for-each 循环遍历列表中的元素\n```\n\n```\nKen\nLee\nJoe\n```\n\n`for-each`\
  \ 循环并不能完全替代迭代器的使用。在大多数用例中，`for-each` 循环的紧凑性胜过使用迭代器。然而，`for-each` 循环有几个局限性。\n\n你不能在所有可以使用迭代器的地方都使用\
  \ `for-each` 循环。例如，你不能使用 `for-each` 循环从集合中移除元素。以下代码片段会抛出 `ConcurrentModificationException`\
  \ 异常：\n\n```\nList names = 获取一个列表;\nfor(String name : names) {\n// 抛出 ConcurrentModificationException\
  \ 异常\nnames.remove(name);\n}\n```\n\n`for-each` 循环的另一个局限性是，你必须从集合的第一个元素遍历到最后一个元素。它无法从集合的中间开始遍历。`for-each`\
  \ 循环也无法访问之前已经访问过的元素，而某些集合类型（如列表）的迭代器是允许这样做的。\n\n使用 forEach() 方法\n\n`Iterable<T>`\
  \ 接口包含一个新的 `forEach(Consumer<? super T> action)` 方法，你可以在所有继承自 `Collection` 接口的集合类型中使用该方法。该方法遍历所有元素并执行指定的操作。它的工作方式与\
  \ `Iterator` 接口的 `forEachRemaining(Consumer<? super E> action)` 方法类似，区别在于 `Iterable.forEach()`\
  \ 方法会遍历所有元素，而 `Iterator.forEachRemaining()` 方法只遍历集合中尚未被 `Iterator` 检索到的元素。\n\n注意\n\
  \n使用 `Iterator` 是遍历集合元素的基本方式（虽然有点繁琐）。它自 Java 编程语言诞生之初就已存在。所有其他方式，例如 `for-each` 循环、`forEach()`\
  \ 方法和 `forEachRemaining()` 方法，都是 `Iterator` 的语法糖。在内部，它们都使用 `Iterator`。\n\n清单 12-5\
  \ 演示了如何使用 `forEach()` 方法打印字符串列表中的所有元素。请注意，使用 `forEach()` 方法是遍历集合元素最紧凑的方式。\n\n```\n\
  // ForEachMethod.java\npackage com.jdojo.collections;\nimport java.util.ArrayList;\n\
  import java.util.List;\npublic class ForEachMethod {\npublic static void main(String[]\
  \ args) {\n// 创建一个字符串列表\nList names = new ArrayList();\n// 向列表中添加一些名字\nnames.add(\"\
  Ken\");\nnames.add(\"Lee\");\nnames.add(\"Joe\");\n// 打印 names 列表中的所有元素\nnames.forEach(System.out::println);\n\
  }\n}\n清单 12-5.\n使用 Iterable 接口的 forEach() 方法遍历列表中的元素\n```\n\n```\nKen\nLee\nJoe\n\
  ```\n\n使用不同类型的集合\n\n在本节中，我将讨论不同类型的集合及其变体，例如集合（Set）、列表（List）、队列（Queue）、映射（Map）等。\n\
  \n使用集合（Set）\n\n集合是一个数学概念，表示一组唯一对象的集合。在数学中，集合中元素的顺序无关紧要。集合框架提供了三种类型的集合：\n\n*   数学集合\n\
  *   有序集合\n*   可导航集合\n\n以下各节将详细介绍所有类型的集合。\n\n数学集合\n\n`Set<E>` 接口模拟了数学中的集合概念。在数学中，集合是唯一元素的集合。也就是说，集合不能包含重复元素。Java\
  \ 允许在 `Set` 中最多包含一个 `null` 元素，因为一个 `null` 元素仍然可以与所有其他非 null 元素区分开来，因此它是唯一的。此外，数学集合中元素的顺序并不重要。Java\
  \ 遵循相同的规则；它不保证 `Set` 中元素的顺序。你可以按一种顺序向 `Set` 中添加元素，但在检索时，它们可能会以不同的顺序返回。唯一能保证的是，在遍历\
  \ `Set` 的所有元素时，`Set` 中的每个元素都会出现一次。\n\n集合框架提供了 `HashSet<E>` 类作为 `Set<E>` 接口的实现。以下代码片段创建了一个\
  \ `Set<String>` 并向其中添加了三个元素：\n\n```\nSet names = new HashSet();\nnames.add(\"John\"\
  );\nnames.add(\"Donna\");\nnames.add(\"Ken\");\nnames.add(\"Ken\"); // 重复！！！无效果\n\
  ```\n\n请注意，前面代码片段中的最后一条语句再次添加了相同的名字 `Ken`，这没有效果，因为 `Ken` 元素已经存在于 `Set` 中。\n\n通常需要创建并初始化一个包含少量元素的\
  \ `Set`。在 Java 9 之前，你无法同时创建和初始化一个 `Set`。请注意，在前面的代码片段中，你必须编写四行代码才能创建一个 `Set` 并向其中添加三个元素。\n\
  \nJava 9 在 `Set` 接口中添加了一个名为 `of()` 的静态工厂方法。该方法已被重载。它可以接受零个到任意数量的元素。`of()` 方法的一个版本接受可变参数。它会创建一个\
  \ `Set`，添加所有指定的元素，并返回该 `Set` 的引用。以下语句使用 `Set` 接口的静态 `of()` 方法创建了一个 `Set` 并用三个元素初始化它：\n\
  \n```\n// 创建一个包含三个名字的不可变 Set\nSet names = Set.of(\"John\", \"Donna\", \"Ken\");\n\
  ```\n\n以下语句创建了一个不可变的空 `Set`：\n\n```\n// 创建一个包含三个名字的不可变 Set\nSet emptyNames = Set.of();\n\
  ```\n\n提示\n\n\n\n`Set` 接口的静态 `of()` 方法用于创建一个不可变的 `Set`。尝试修改该 `Set` 会抛出 `UnsupportedOperationException`。与\
  \ `add()` 方法不同，如果指定了重复元素，`of()` 方法会抛出 `IllegalArgumentException`。与 `add()` 方法不同，如果添加了\
  \ `null` 元素，`of()` 方法会抛出 `NullPointerException`。`of()` 方法的实现经过了高度优化，是创建已知元素不可变 `Set`\
  \ 的首选方式。\n\n清单 12-6 演示了如何创建一个 `Set` 并向其中添加元素。请注意，你可以尝试向 `Set` 添加重复元素，这些元素会被静默忽略。如果使用\
  \ `equals()` 方法比较两个元素返回 `true`，则认为它们在 `Set` 中是相等的。你可能会得到包含相同元素但顺序不同的输出。\n\n```\n\
  // SetTest.java\npackage com.jdojo.collections;\nimport java.util.HashSet;\nimport\
  \ java.util.Set;\npublic class SetTest {\npublic static void main(String[] args)\
  \ {\n// 创建一个集合\nSet s1 = new HashSet();\n// 添加几个元素\ns1.add(\"John\");\ns1.add(\"\
  Donna\");\ns1.add(\"Ken\");\ns1.add(\"Ken\"); // 重复元素！！！无效果\n// 通过复制 s1 创建另一个集合\n\
  Set s2 = new HashSet(s1);\n// 再添加几个元素\ns2.add(\"Ellen\");\ns2.add(\"Sara\");\ns2.add(null);\
  \ // 一个 null 没问题\ns2.add(null); // 重复元素！！！无效果\n// 使用 Set.of() 方法创建一个不可变 Set\nSet\
  \ s3 = Set.of(\"Corky\", \"Paul\", \"Tom\");\n// 使用 Set.of() 方法创建一个空的不可变 Set\nSet\
  \ s4 = Set.of();\n// 打印这些集合\nSystem.out.println(\"s1: \" + s1);\nSystem.out.println(\"\
  s1.size(): \" + s1.size());\nSystem.out.println(\"s2: \" + s2);\nSystem.out.println(\"\
  s2.size(): \" + s2.size());\nSystem.out.println(\"s3: \" + s3);\nSystem.out.println(\"\
  s3.size(): \" + s3.size());\nSystem.out.println(\"s4: \" + s4);\nSystem.out.println(\"\
  s4.size(): \" + s4.size());\n}\n}\n清单 12-6.\n使用 Set 接口及其实现类 HashSet\n```\n\n```\n\
  s1: [Donna, Ken, John]\ns1.size(): 3\ns2: [null, Ellen, Donna, Ken, John, Sara]\n\
  s2.size(): 6\ns3: [Paul, Corky, Tom]\ns3.size(): 3\ns4: []\ns4.size(): 0\n```\n\n\
  我使用了 `Set` 实例的 `toString()` 方法来打印 `Set` 的元素。在实际应用中，你会使用迭代器、`for-each` 循环或 `Set`\
  \ 的 `forEach()` 方法，如下所示：\n\n```\n// 创建一个 Set 并使用 forEach 方法打印其元素\nSet names = Set.of(new\
  \ String[] {\"John\", \"Donna\", \"Ken\"});\nnames.forEach(System.out::println);\n\
  ```\n\n```\nKen\nDonna\nJohn\n```\n\nCollections 框架提供了 `LinkedHashSet<E>` 类作为 `Set<E>`\
  \ 接口的另一个实现类。该类在 `HashSet` 实现的基础上增加了一个特性。`HashSet` 实现不保证迭代时元素的顺序。`LinkedHashSet`\
  \ 实现保证 `Set` 的迭代器会按照元素插入的顺序（插入顺序）返回元素。\n\n我将在下一节讨论 `SortedSet` 时讨论如何维护 `Set` 中元素的顺序。`LinkedHashSet`\
  \ 类提供了插入顺序，且不会带来任何额外开销。\n\n提示\n\n`Set` 有一个非常有用的应用。当你获得数量未知的对象，并且只需要保留唯一对象时，可以使用它。你可以创建一个\
  \ `Set` 并将所有对象添加到其中。它只会保留唯一对象，并忽略重复对象。最终，你的 `Set` 中将只包含唯一对象。\n\n你可以对数学集合执行并集、交集和差集（或减集）操作。你也可以在\
  \ Java 中对集合执行相同的操作。为了讨论这些操作，我假设你有两个集合，分别称为 `s1` 和 `s2`。两个集合的并集（数学上写作 `s1` U `s2`）包含两个集合中的所有元素，且没有重复。两个集合的交集（数学上写作\
  \ `s1` ∩ `s2`）包含两个集合共有的元素。两个集合 `s1` 和 `s2` 的差集（写作 `s1 – s2`）是一个集合，包含所有在 `s1` 中但不在\
  \ `s2` 中的元素。以下是执行这些 `Set` 操作的方法：\n\n```\n// s1 和 s2 的并集将存储在 s1 中\ns1.add(s2);\n\
  // s1 和 s2 的交集将存储在 s1 中\ns1.retainAll(s2);\n// s1 和 s2 的差集将存储在 s1 中\ns1.removeAll(s2);\n\
  ```\n\n请注意，在执行并集、交集和差集等 `Set` 操作期间，执行操作的集合会被修改。例如，如果你执行 `s1.addAll(s2)` 来计算 `s1`\
  \ 和 `s2` 的并集，`s1` 会被修改。如果你想计算两个集合的并集并保持原始集合不变，则必须在执行并集操作之前复制原始集合，如下所示：\n\n```\n\
  /* 计算两个集合的并集，同时保持原始集合不变 */\n// 复制 s1\nSet s1Unions2 = new HashSet(s1);\n// 现在，s1Unions2\
  \ 是 s1 和 s2 的并集，并且 s1 和 s2 都保持不变\ns1Unions2.addAll(s2);\n```\n\n在数学中，你可以测试集合 `s1`\
  \ 是否是另一个集合 `s2` 的子集。如果集合 `s2` 包含集合 `s1` 中的所有元素，则集合 `s1` 是集合 `s2` 的子集。你可以使用 `s2.containsAll(s1)`\
  \ 方法来测试 `s1` 是否是 `s2` 的子集。如果 `s1` 是 `s2` 的子集，此方法将返回 `true`。否则，它将返回 `false`。\n\n\
  清单 12-7 演示了如何使用 `Set` 接口执行数学集合操作。\n\n```\n// SetOperations.java\npackage com.jdojo.collections;\n\
  import java.util.HashSet;\nimport java.util.Set;\npublic class SetOperations {\n\
  public static void main(String[] args) {\n// 创建一个集合\nSet s1 = new HashSet();\ns1.add(\"\
  John\");\ns1.add(\"Donna\");\ns1.add(\"Ken\");\n// 创建另一个集合\nSet s2 = new HashSet();\n\
  s2.add(\"Ellen\");\ns2.add(\"Sara\");\ns2.add(\"Donna\");\n// 打印两个集合的元素\nSystem.out.println(\"\
  s1: \" + s1);\nSystem.out.println(\"s2: \" + s2);\n// 执行集合操作\nperformUnion(s1, s2);\n\
  performIntersection(s1, s2);\nperformDifference(s1, s2);\ntestForSubset(s1, s2);\n\
  }\npublic static void performUnion(Set s1, Set s2) {\nSet s1Unions2 = new HashSet(s1);\n\
  s1Unions2.addAll(s2);\nSystem.out.println(\"s1 union s2: \" + s1Unions2);\n}\npublic\
  \ static void performIntersection(Set s1, Set s2) {\nSet s1Intersections2 = new\
  \ HashSet(s1);\ns1Intersections2.retainAll(s2);\nSystem.out.println(\"s1 intersection\
  \ s2: \" + s1Intersections2);\n}\npublic static void performDifference(Set s1, Set\
  \ s2) {\nSet s1Differences2 = new HashSet(s1);\ns1Differences2.removeAll(s2);\n\
  Set s2Differences1 = new HashSet(s2);\ns2Differences1.removeAll(s1);\nSystem.out.println(\"\
  s1 difference s2: \" + s1Differences2);\nSystem.out.println(\"s2 difference s1:\
  \ \" + s2Differences1);\n}\npublic static void testForSubset(Set s1, Set s2) {\n\
  System.out.println(\"s2 is subset s1: \" + s1.containsAll(s2));\nSystem.out.println(\"\
  s1 is subset s2: \" + s2.containsAll(s1));\n}\n}\n清单 12-7.\n使用 Set 接口执行数学集合操作\n\
  ```\n\n```\ns1: [Donna, Ken, John]\ns2: [Ellen, Donna, Sara]\ns1 union s2: [Ellen,\
  \ Donna, Ken, John, Sara]\ns1 intersection s2: [Donna]\ns1 difference s2: [Ken,\
  \ John]\ns2 difference s1: [Ellen, Sara]\ns2 is subset s1: false\ns1 is subset s2:\
  \ false\n```\n\n\n\n在这个例子中，我保留了原始的两个集合 `s1` 和 `s2`，在对其执行某些操作的方法内部未作修改。然而，它们本可以在这些方法中的任何一个内部被修改。如果你不希望方法修改你的集合，那么像本例中那样将集合传递给方法是不明智的。Collections\
  \ 框架提供了一种方法，可以使用 `java.util.Collections` 类获取集合的不可修改视图。我将在本章后面讨论这个类及其提供的所有其他功能。`Collections.unmodifiableSet(s1)`\
  \ 方法将返回 `s1` 集合的不可修改版本。尝试修改一个不可修改的集合会导致 `UnsupportedOperationException`。\n\n有序集合\n\
  \n有序集合是一种对其元素施加排序的集合。`SortedSet<E>` 接口的实例代表一个有序集合。`SortedSet<E>` 接口继承自 `Set<E>`\
  \ 接口。\n\n`SortedSet` 中的元素可以按自然顺序排序，也可以使用 `Comparator` 排序。`SortedSet` 必须知道如何在添加元素时对其进行排序。有序集合依赖以下两点来对其元素进行排序：\n\
  \n*   如果其元素实现了 `Comparable` 接口，它将使用元素的 `compareTo()` 方法对它们进行排序。这称为按自然顺序排序。\n*  \
  \ 你可以提供一个 `Comparator` 来使用自定义排序。建议 `SortedSet` 的实现类提供一个接受 `Comparator` 的构造函数，以便使用自定义排序。如果指定了\
  \ `Comparator`，则无论元素是否实现 `Comparable` 接口，都将使用该 `Comparator` 进行排序。\n\n如果 `SortedSet`\
  \ 元素的类没有实现 `Comparable` 接口，并且你没有提供 `Comparator` 对象，会发生什么？答案是，在这种情况下，你无法向 `SortedSet`\
  \ 添加任何元素。尝试添加元素会导致 `ClassCastException`。\n\n`TreeSet<E>` 类是 Collections 框架中为 `SortedSet`\
  \ 接口预定义的实现类之一。\n\n`String` 类实现了 `Comparable` 接口。如果你只在 `SortedSet` 中存储字符串，其元素将使用\
  \ `String` 类的 `compareTo()` 方法按自然顺序排序。清单 12-8 演示了 `SortedSet` 的使用，它使用自然顺序对其元素进行排序。\n\
  \n```\n// SortedSetTest.java\npackage com.jdojo.collections;\nimport java.util.SortedSet;\n\
  import java.util.TreeSet;\npublic class SortedSetTest {\npublic static void main(String[]\
  \ args) {\n// 创建一个包含一些名字的有序集合\nSortedSet sortedNames = new TreeSet();\nsortedNames.add(\"\
  John\");\nsortedNames.add(\"Adam\");\nsortedNames.add(\"Eve\");\nsortedNames.add(\"\
  Donna\");\n// 打印有序的名字集合\nSystem.out.println(sortedNames);\n}\n}\n清单 12-8.\n使用按自然顺序对其元素进行排序的\
  \ SortedSet\n```\n\n```\n[Adam, Donna, Eve, John]\n```\n\n让我们讨论一个实际例子，其中你想在 `SortedSet`\
  \ 中存储一个人员列表。清单 12-9 包含一个 `Person` 类的代码。它没有实现 `Comparable` 接口。我在 `SortedSet` 中使用\
  \ `Person` 类的对象来演示自定义排序。\n\n```\n// Person.java\npackage com.jdojo.collections;\n\
  public class Person {\nprivate int id;\nprivate String name;\npublic Person(int\
  \ id, String name) {\nthis.id = id;\nthis.name = name;\n}\npublic int getId() {\n\
  return id;\n}\npublic void setId(int id) {\nthis.id = id;\n}\npublic String getName()\
