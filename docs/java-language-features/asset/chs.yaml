  \n13. 流\n\n在本章中，你将学习：\n\n*   什么是流\n*   集合与流之间的区别\n*   如何从不同类型的数据源创建流\n*   如何使用 `Optional`\
  \ 类表示可选值\n*   对流应用不同类型的操作\n*   使用收集器从流中收集数据\n*   对流的数据进行分组和分区\n*   在流中查找和匹配数据\n\
  *   如何使用并行流\n\n本章中的所有示例程序都是 `jdojo.streams` 模块的成员，如清单 13-1 中所声明。\n\n```\n// module-info.java\n\
  module jdojo.streams {\nexports com.jdojo.streams;\n}\n清单 13-1.\njdojo.streams 模块的声明\n\
  ```\n\n什么是流？\n\n聚合操作从一组值中计算出一个单一值。聚合操作的结果可以是一个原始值、一个对象或一个 `void`。请注意，一个对象可以表示一个单一实体（例如一个人）或一组值（例如一个列表、一个集合、一个映射等）。\n\
  \n流是支持顺序和并行聚合操作的数据元素序列。计算整数流中所有元素的总和、将列表中的所有名称映射到其长度等，都是流的聚合操作示例。\n\n从流的定义来看，它们似乎与集合类似。那么，流与集合有何不同？两者都是数据元素集合的抽象。集合侧重于数据元素的存储以便高效访问，而流侧重于对来自数据源（通常是集合，但不一定）的数据元素进行聚合计算。\n\
  \n在本节中，我将讨论流的以下特性，并在必要时与集合进行比较：\n\n*   流没有存储空间。\n*   流可以表示无限元素的序列。\n*   流的设计基于内部迭代。\n\
  *   流被设计为无需开发人员额外工作即可并行处理。\n*   流被设计为支持函数式编程。\n*   流支持惰性操作。\n*   流可以是有序的或无序的。\n\
  *   流不能被重用。\n\n以下各节展示了使用流的简短代码片段。这些代码旨在让你感受 Streams API，并将 Streams API 与 Collections\
  \ API 进行比较。此时你无需完全理解代码。我将在后面详细解释。\n\n流没有存储空间\n\n集合是一种内存中的数据结构，它存储其所有元素。所有元素在添加到集合之前必须存在于内存中。流没有存储空间；它不存储元素。流按需从数据源拉取元素，并将其传递给操作管道进行处理。\n\
  \n无限流\n\n集合不能表示一组无限的元素，而流可以。集合将其所有元素存储在内存中，因此，集合中不可能有无限数量的元素。拥有无限数量元素的集合将需要无限的内存，并且存储过程将永远持续下去。流从其数据源拉取元素，数据源可以是集合、生成数据的函数、I/O\
  \ 通道等。因为函数可以生成无限数量的元素，并且流可以按需从中拉取数据，所以流可以表示一个无限数据元素的序列。\n\n内部迭代 vs. 外部迭代\n\n集合基于外部迭代。你为集合获取一个迭代器，并使用该迭代器串行处理集合的元素。假设你有一个从\
  \ 1 到 5 的整数列表。你可以按如下方式计算列表中所有奇数的平方和：\n\n```\nList numbers = List.of(1, 2, 3, 4,\
  \ 5);\nint sum = 0;\nfor (int n : numbers) {\nif (n % 2 == 1) {\nint square = n\
  \ * n;\nsum = sum + square;\n}\n}\n```\n\n\n\n本示例使用了一个 `for-each` 循环，该循环对整数列表执行**外部迭代**。简而言之，客户端代码（本例中的\
  \ `for` 循环）从集合中拉取元素，并应用逻辑来获取结果。请考虑以下使用流来计算同一列表中所有奇数的平方和的代码片段：\n\n```\nint sum =\
  \ numbers.stream()\n.filter(n -> n % 2 == 1)\n.map(n -> n * n)\n.reduce(0, Integer::sum);\n\
  ```\n\n你是否注意到了流的强大和简洁？你用一条语句替换了五条语句。然而，代码的简洁性并非我想强调的重点。重点在于，当你使用流时，你并没有遍历列表中的元素。流在内部为你完成了遍历。这就是我所说的流支持的**内部迭代**。你通过向流传递一个使用\
  \ lambda 表达式的算法来指定你想要什么，然后流通过在其内部迭代元素，将你的算法应用于其数据元素，并返回结果。\n\n使用外部迭代通常会产生顺序代码；也就是说，代码只能由单个线程执行。例如，当你使用\
  \ `for-each` 循环编写计算总和的逻辑时，该循环必须仅由一个线程执行。所有现代计算机都配备多核处理器。利用多核处理器并行执行逻辑，岂不美哉？Java\
  \ 库提供了 Fork/Join 框架，用于将任务递归地拆分为子任务，并利用多核处理器并行执行这些子任务。然而，Fork/Join 框架使用起来并不简单，尤其是对于初学者而言。\n\
  \n流来救你了！它们被设计成能在你甚至没有察觉的情况下并行处理其元素！这并不意味着流会自动为你决定何时串行或并行处理其元素。你只需告诉流你想要使用并行处理，流就会处理剩下的事情。流在内部处理了使用\
  \ Fork/Join 框架的细节。你可以像这样并行计算列表中奇数的平方和：\n\n```\nint sum = numbers.parallelStream()\n\
  .filter(n -> n % 2 == 1)\n.map(n -> n * n)\n.reduce(0, Integer::sum);\n```\n\n你所需要做的只是将方法\
  \ `stream()` 替换为 `parallelStream()`！Streams API 使用多个线程来过滤奇数、计算它们的平方并将它们相加得到部分和。最后，它将部分和合并起来给你结果。在这个例子中，列表中只有五个元素，使用多个线程来处理它们有些大材小用。你不会为了如此简单的计算而使用并行处理。我举这个例子是为了强调一个观点：使用流来并行化你的计算是零成本的；你只需使用一个不同的方法名就能实现！第二个观点是，并行化计算之所以成为可能，是因为流提供了内部迭代。\n\
  \n流被设计为使用内部迭代。它们提供了一个 `iterator()` 方法，该方法返回一个 `Iterator`，用于对其元素进行外部迭代。你“永远”不需要自己使用流的迭代器来迭代流的元素。如果你确实需要，以下是使用方法：\n\
  \n```\n// 获取一个从 1 到 5 的整数列表\nList numbers = List.of(1, 2, 3, 4, 5);\n...\n// 从流中获取一个迭代器\n\
  Iterator iterator = numbers.stream().iterator();\nwhile(iterator.hasNext()) {\n\
  int n = iterator.next();\n...\n}\n```\n\n命令式 vs. 函数式\n\n集合支持命令式编程，而流支持声明式编程。这是集合支持外部迭代而流支持内部迭代的衍生结果。当你使用集合时，你需要知道“做什么”以及“怎么做”；这是命令式编程的特点。当你使用流时，你只需通过流操作指定“做什么”；“怎么做”的部分由\
  \ Streams API 处理。Streams API 支持函数式编程。对流进行操作会产生结果，而不会修改数据源。就像在函数式编程中一样，当你使用流时，你使用\
  \ Streams API 提供的内置方法指定你想对其元素执行“什么”操作，通常是通过向这些方法传递 lambda 表达式来自定义这些操作的行为。\n\n流操作\n\
  \n流支持两种类型的操作：\n\n*   中间操作\n\n*   终端操作\n\n中间操作也称为**惰性操作**。终端操作也称为**急切操作**。操作根据它们从数据源拉取数据元素的方式被称为惰性或急切。对流执行惰性操作不会处理流的元素，直到对该流调用了另一个急切操作。\n\
  \n流通过一系列操作连接起来，形成一个流管道。流本质上是惰性的，直到你对其调用终端操作。对流执行中间操作会产生另一个流。当你对流调用终端操作时，元素会从数据源中拉取出来，并流经流管道。每个中间操作从输入流中获取元素，并转换这些元素以产生输出流。终端操作从流中获取输入并产生结果。图\
  \ 13-1 展示了一个包含数据源、三个流和三个操作的流管道。`filter` 和 `map` 操作是中间操作，`reduce` 操作是终端操作。\n\n![A323070_2_En_13_Fig1_HTML.gif](img/A323070_2_En_13_Fig1_HTML.gif)\n\
  \n图 13-1.\n\n一个流管道\n\n在图中，第一个流（左侧）从数据源拉取数据，并成为 `filter` 操作的输入源。`filter` 操作产生另一个流，其中包含过滤条件为真的数据。`filter`\
  \ 操作产生的流成为 `map` 操作的输入。`map` 操作产生另一个流，其中包含映射后的数据。`map` 操作产生的流成为 `reduce` 操作的输入。`reduce`\
  \ 操作是一个终端操作。它计算并返回结果，然后流处理结束。\n\n注意\n\n我在前面的讨论中使用了“流从其数据源拉取/消费元素”这个短语。这并不意味着流会从数据源中移除元素；它只是读取它们。流被设计为支持函数式编程，在函数式编程中，数据元素被读取，对读取的数据元素进行操作会产生新的数据元素。然而，数据元素不会被修改（或者至少不应该被修改）。\n\
  \n在调用终端操作之前，流处理不会开始。如果你只是对流调用中间操作，除了在内存中创建另一个对象流之外，不会发生任何令人兴奋的事情，也不会从数据源读取数据。这意味着你必须对流使用终端操作，它才能处理数据以产生结果。这也是终端操作被称为**结果承载操作**，而中间操作也被称为**非结果承载操作**的原因。\n\
  \n你看到了以下代码，它使用流操作管道来计算从 1 到 5 的奇数的平方和：\n\n\n\n```\nList numbers = List.of(1, 2,\
  \ 3, 4, 5);\nint sum = numbers.stream()\n.filter(n -> n % 2 == 1)\n.map(n -> n *\
  \ n)\n.reduce(0, Integer::sum);\n```\n\n图 13-2 至图\n13-5 展示了\n随着操作的添加，流管道的状态。请注意，在调用\
  \ reduce 操作之前，没有\n数据流过该流。最后一张图显示了输入流中用于某个操作的整数，以及\n该操作产生的映射（或转换）后的整数。reduce 终端操作产生结果\
  \ 35。\n\n![A323070_2_En_13_Fig5_HTML.gif](img/A323070_2_En_13_Fig5_HTML.gif)\n\n\
  图 13-5.\n\n调用 reduce 操作后的流管道\n\n![A323070_2_En_13_Fig4_HTML.gif](img/A323070_2_En_13_Fig4_HTML.gif)\n\
  \n图 13-4.\n\n调用 map 操作后的流管道\n\n![A323070_2_En_13_Fig3_HTML.gif](img/A323070_2_En_13_Fig3_HTML.gif)\n\
  \n图 13-3.\n\n调用 filter 操作后的流管道\n\n![A323070_2_En_13_Fig2_HTML.gif](img/A323070_2_En_13_Fig2_HTML.gif)\n\
  \n图 13-2.\n\n创建流对象后的流管道\n\n有序流\n\n流可以是有序的或无序的。有序流会保留其元素的顺序。Streams API 允许你将有序流转换为无序流。流之所以可以是有序的，是因为它代表了一个有序的数据源，例如列表或排序集合。你也可以通过应用诸如排序之类的中间操作，将无序流转换为有序流。\n\
  \n如果迭代器遍历元素的顺序是可预测且有意义的，则称该数据源具有遭遇顺序。例如，数组和列表始终具有从索引 0 处的元素到最后一个索引处的元素的遭遇顺序。所有有序数据源的元素都具有遭遇顺序。基于具有遭遇顺序的数据源的流，其元素也具有遭遇顺序。有时，流操作可能会为原本无序的流强加一个遭遇顺序。例如，`HashSet`\
  \ 的元素没有遭遇顺序。但是，对基于 `HashSet` 的流应用排序操作会强加一个遭遇顺序，以便按排序顺序生成元素。\n\n流不可重用\n\n与集合不同，流不可重用。它们是“一次性”对象。在对其调用终端操作后，流无法重用。如果你需要再次对来自同一数据源的相同元素执行计算，则必须重新创建流管道。如果流实现检测到流正在被重用，它可能会抛出\
  \ `IllegalStateException`。\n\nStreams API 的架构\n\n图 13-6 展示了流相关接口的类图。流相关接口和类位于 `java.util.stream`\
  \ 包中。\n\n![A323070_2_En_13_Fig6_HTML.jpg](img/A323070_2_En_13_Fig6_HTML.jpg)\n\n\
  图 13-6.\n\nStreams API 中流相关接口的类图\n\n所有流接口都继承自 `BaseStream` 接口，而 `BaseStream` 接口又继承自\
  \ `java.lang` 包中的 `AutoCloseable` 接口。在实践中，大多数流使用集合作为其数据源，而集合不需要关闭。当流基于可关闭的数据源（如文件\
  \ I/O 通道）时，你可以使用 `try-with-resources` 语句创建流实例，以便自动关闭它。所有流类型共有的方法在 `BaseStream` 接口中声明如下。\n\
  \n*   `Iterator<T> iterator()`：返回流的迭代器。你在代码中几乎永远不需要使用此方法。这是一个终端操作。调用此方法后，你无法在流上调用任何其他方法。\n\
  \n*   `S sequential()`：返回一个顺序流。如果流已经是顺序的，则返回自身。使用此方法将并行流转换为顺序流。这是一个中间操作。\n\n*  \
  \ `S parallel()`：返回一个并行流。如果流已经是并行的，则返回自身。使用此方法将并行流转换为顺序流。这是一个中间操作。\n\n*   `boolean\
  \ isParallel()`：如果流是并行的，则返回 `true`，否则返回 `false`。在调用终端流操作方法后调用此方法时，结果不可预测。\n\n* \
  \  `S unordered()`：返回流的无序版本。如果流已经是无序的，则返回自身。这是一个中间操作。\n\n*   `void close()`：关闭流。你不需要关闭基于集合的流。对已关闭的流进行操作会抛出\
  \ `IllegalStateException`。\n\n*   `S onClose(Runnable closeHandler)`：返回一个等效的流，并带有一个额外的关闭处理器。当在流上调用\
  \ `close()` 方法时，会运行关闭处理器，并按照它们被添加的顺序执行。\n\n`Stream<T>` 接口表示元素类型为 `T` 的流；例如，`Stream<Person>`\
  \ 表示 `Person` 对象的流。该接口包含表示中间操作和终端操作的方法，例如 `filter()`、`map()`、`reduce()`、`collect()`、`max()`、`min()`\
  \ 等。在使用流时，你大部分时间都会使用这些方法。我稍后会详细讨论每个方法。\n\n请注意，`Stream<T>` 接口接受一个类型参数 `T`，这意味着你只能将其用于处理引用类型的元素。如果你必须处理原始类型的流，例如\
  \ `int`、`long` 等，使用 `Stream<T>` 将涉及在需要原始值时对元素进行装箱和拆箱的额外成本。例如，对 `Stream<Integer>`\
  \ 的所有元素求和需要将所有 `Integer` 元素拆箱为 `int`。Streams API 的设计者意识到了这一点，并提供了三个专门的流接口，称为 `IntStream`、`LongStream`\
  \ 和 `DoubleStream`，用于处理原始类型；这些接口包含处理原始值的方法。请注意，没有表示其他原始类型（如 `float`、`short` 等）的流接口，因为这三个流类型可用于处理其他原始类型的值。\n\
  \n快速示例\n\n让我们看一个使用流的快速示例。代码读取一个整数列表，并计算列表中所有奇数的平方和。\n\n`Collection` 接口中的 `stream()`\
  \ 方法返回一个顺序流，其中 `Collection` 充当数据源。以下代码片段创建了一个 `List<Integer>` 并从该列表获取了一个 `Stream<Integer>`：\n\
  \n```\n// 获取一个从 1 到 5 的整数列表\nList numbersList = List.of(1, 2, 3, 4, 5);\n// 从列表中获取一个流\n\
  Stream numbersStream = numbersList.stream();\n```\n\n`Stream<T>` 接口的 `filter()`\
  \ 方法接受一个 `Predicate<? super T>` 作为参数，并返回一个 `Stream<T>`，其中包含指定 `Predicate` 返回 `true`\
  \ 的原始流元素。以下语句获取了一个仅包含奇整数的流：\n\n```\n// 获取一个奇整数的流\nStream oddNumbersStream = numbersStream.filter(n\
  \ -> n % 2 == 1);\n```\n\n注意使用 lambda 表达式作为 `filter()` 方法的参数。如果流中的元素不能被 2 整除，则 lambda\
  \ 表达式返回 `true`。\n\n`Stream<T>` 接口的 `map()` 方法接受 `Function<? super T,? extends R>`\
  \ 作为参数。流中的每个元素都被传递给此 `Function`，并生成一个包含 `Function` 返回值的新的流。以下语句获取所有奇数整数并将它们映射到其平方：\n\
  \n\n\n```\n// 获取奇数平方的流\nStream squaredNumbersStream = oddNumbersStream.map(n ->\
  \ n * n);\n```\n\n最后，你需要将所有奇数的平方相加得到结果。`Stream<T>` 接口的 `reduce(T identity, BinaryOperator<T>\
  \ accumulator)` 方法对流执行归约操作，将流缩减为单个值。它接受一个初始值和一个作为 `BinaryOperator<T>` 的累加器作为参数。第一次调用时，累加器接收初始值和流的第一个元素作为参数，并返回一个值。第二次调用时，累加器接收上一次调用返回的值和流中的第二个元素。此过程持续进行，直到流中的所有元素都传递给累加器。累加器最后一次调用返回的值即为\
  \ `reduce()` 方法返回的值。以下代码片段对流中的所有整数执行求和操作：\n\n```\n// 对流中所有整数求和\nint sum = squaredNumbersStream.reduce(0,\
  \ (n1, n2) -> n1 + n2);\n```\n\n`Integer` 类包含一个静态的 `sum()` 方法来执行两个整数的求和。你可以使用方法引用来重写上述语句，如下所示：\n\
  \n```\n// 对流中所有整数求和\nint sum = squaredNumbersStream.reduce(0, Integer::sum);\n```\n\
  \n在此示例中，我将流上的每个操作分解为单个语句。你不能使用中间操作返回的流，除非对它们应用其他操作。通常，你关心的是终端操作的结果，而不是中间流。流被设计为支持方法链，以避免临时变量，你在本例中使用了这一点。你可以将这些语句组合成一个语句，如下所示：\n\
  \n```\n// 对 numbers 列表中所有奇数的平方求和\nint sum = numbersList.stream()\n.filter(n -> n\
  \ % 2 == 1)\n.map(n -> n * n)\n.reduce(0, Integer::sum);\n```\n\n在后续示例中，我将流上的所有方法调用链接起来，只形成一个语句。清单\
  \ 13-2 包含了此示例的完整程序。请注意，本例中你只处理整数。为了获得更好的性能，你本可以在本例中使用 `IntStream`。稍后我将向你展示如何使用 `IntStream`。\n\
  \n```\n// SquaredIntsSum.java\npackage com.jdojo.streams;\nimport java.util.List;\n\
  public class SquaredIntsSum {\npublic static void main(String[] args) {\n// 获取一个从\
  \ 1 到 5 的整数列表\nList numbers = List.of(1, 2, 3, 4, 5);\n// 计算列表中所有奇数的平方和\nint sum\
  \ = numbers.stream()\n.filter(n -> n % 2 == 1)\n.map(n -> n * n)\n.reduce(0, Integer::sum);\n\
  System.out.println(\"Sum = \" + sum);\n}\n}\n清单 13-2.\n计算从 1 到 5 的所有奇数的平方和\n```\n\
  \n```\nSum = 35\n```\n\n我展示了许多对不同类型流执行聚合操作的示例。大多数情况下，使用数字和字符串流来解释流操作更容易。我通过使用 `Person`\
  \ 对象的流来展示一些使用流的实际示例。清单 13-3 包含了 `Person` 类的声明。\n\n```\n// Person.java\npackage com.jdojo.streams;\n\
  import java.time.LocalDate;\nimport java.time.Month;\nimport java.util.List;\npublic\
  \ class Person {\n// 表示性别的枚举\npublic static enum Gender {\nMALE, FEMALE\n}\nprivate\
  \ long id;\nprivate String name;\nprivate Gender gender;\nprivate LocalDate dob;\n\
  private double income;\npublic Person(long id, String name, Gender gender, LocalDate\
  \ dob, double income) {\nthis.id = id;\nthis.name = name;\nthis.gender = gender;\n\
  this.dob = dob;\nthis.income = income;\n}\npublic long getId() {\nreturn id;\n}\n\
  public void setId(long id) {\nthis.id = id;\n}\npublic String getName() {\nreturn\
  \ name;\n}\npublic void setName(String name) {\nthis.name = name;\n}\npublic Gender\
  \ getGender() {\nreturn gender;\n}\npublic boolean isMale() {\nreturn this.gender\
  \ == Gender.MALE;\n}\npublic boolean isFemale() {\nreturn this.gender == Gender.FEMALE;\n\
  }\npublic void setGender(Gender gender) {\nthis.gender = gender;\n}\npublic LocalDate\
  \ getDob() {\nreturn dob;\n}\npublic void setDob(LocalDate dob) {\nthis.dob = dob;\n\
  }\npublic double getIncome() {\nreturn income;\n}\npublic void setIncome(double\
  \ income) {\nthis.income = income ;\n}\npublic static List persons() {\nPerson ken\
  \ = new Person(1, \"Ken\", Gender.MALE,\nLocalDate.of(1970, Month.MAY, 4), 6000.0);\n\
  Person jeff = new Person(2, \"Jeff\", Gender.MALE,\nLocalDate.of(1970, Month.JULY,\
  \ 15), 7100.0);\nPerson donna = new Person(3, \"Donna\", Gender.FEMALE,\nLocalDate.of(1962,\
  \ Month.JULY, 29), 8700.0);\nPerson chris = new Person(4, \"Chris\", Gender.MALE,\n\
  LocalDate.of(1993, Month.DECEMBER, 16), 1800.0);\nPerson laynie = new Person(5,\
  \ \"Laynie\", Gender.FEMALE,\nLocalDate.of(2012, Month.DECEMBER, 13), 0.0);\nPerson\
  \ lee = new Person(6, \"Li\", Gender.MALE,\nLocalDate.of(2001, Month.MAY, 9), 2400.0);\n\
  // 创建一个人物列表\nList persons = List.of(ken, jeff, donna, chris, laynie, lee);\nreturn\
  \ persons;\n}\n@Override\npublic String toString() {\nString str = String.format(\"\
  (%s, %s, %s, %s, %.2f)\",\nid, name, gender, dob, income);\nreturn str;\n}\n}\n\
  清单 13-3.\nPerson 类\n```\n\n`Person` 类包含一个静态的 `Gender` 枚举来表示一个人的性别。该类声明了五个实例变量（`id`、`name`、`gender`、`dob`\
  \ 和 `income`）、getter 和 setter 方法。`isMale()` 和 `isFemale()` 方法被声明为可在 lambda 表达式中用作方法引用。你将频繁使用一个人物列表，为此，该类包含一个名为\
  \ `persons()` 的静态方法来获取人物列表。\n\n创建流\n\n创建流的方法有很多种。Java 库中的许多现有类都新增了返回流的方法。根据数据源，流的创建可以分为以下几类：\n\
  \n*   从值创建流\n\n*   空流\n\n*   从函数创建流\n\n*   从数组创建流\n\n*   从集合创建流\n\n*   从文件创建流\n\n\
  *   从其他源创建流\n\n从值创建流\n\n`Stream` 接口包含以下三个静态方法，用于从单个值和多个值创建顺序流：\n\n*   `<T> Stream<T>\
  \ of(T t)`\n\n*   `<T> Stream<T> of(T...values)`\n\n*   `<T> Stream<T> ofNullable(T\
  \ t)`\n\n以下代码片段创建了两个流：\n\n```\n// 创建一个包含一个字符串元素的流\nStream stream = Stream.of(\"\
  Hello\");\n// 创建一个包含四个字符串元素的流\nStream stream = Stream.of(\"Ken\", \"Jeff\", \"Chris\"\
  , \"Ellen\");\n```\n\n`ofNullable()` 方法是在 Java 9 中添加到 Stream 接口的。如果指定的值非空，则返回一个包含单个值的流。否则，返回一个空流。\n\
  \n```\nString str = \"Hello\";\n// 流 s1 将包含一个元素 \"Hello\"\nStream s1 = Stream.ofNullable(str);\n\
  str = null;\n// 流 s2 是一个空流，因为 str 为 null\nStream s2 = Stream.ofNullable(str);\n\
  ```\n\n你在清单 13-2 中创建了一个 `List<Integer>` 并调用了它的 `stream()` 方法来获取流对象。你可以使用 `Stream.of()`\
  \ 方法重写该示例，如下所示：\n\n\n\n```\nimport java.util.stream.Stream;\n...\n// 计算列表中所有奇数的平方和\n\
  int sum = Stream.of(1, 2, 3, 4, 5)\n.filter(n -> n % 2 == 1)\n.map(n -> n * n)\n\
  .reduce(0, Integer::sum);\nSystem.out.println(\"Sum = \" + sum);\n```\n\n```\nSum\
  \ = 35\n```\n\n请注意，`of()` 方法的第二个版本接受一个可变参数（varargs），你也可以用它从对象数组创建流。以下代码片段从一个 `String`\
  \ 数组创建流。\n\n```\nString[] names  = {\"Ken\", \"Jeff\", \"Chris\", \"Ellen\"};\n\
  // 从 names 数组中创建一个包含四个字符串的流\nStream stream = Stream.of(names);\n```\n\n提示\n\n`Stream.of()`\
  \ 方法创建的流，其元素为引用类型。如果你想从基本类型数组创建基本类型值的流，则需要使用 `Arrays.stream()` 方法，我稍后会解释。\n\n以下代码片段从\
  \ `String` 类的 `split()` 方法返回的 `String` 数组创建一个字符串流：\n\n```\nString str  = \"Ken,Jeff,Chris,Ellen\"\
  ;\n// 该流将包含 4 个元素：\"Ken\", \"Jeff\", \"Chris\" 和 \"Ellen\"\nStream stream = Stream.of(str.split(\"\
  ,\"));\n```\n\n`Stream` 接口还支持使用 `Stream.Builder<T>` 接口通过构建器模式创建流，该接口的实例代表一个流构建器。`Stream`\
  \ 接口的 `builder()` 静态方法返回一个流构建器。\n\n```\n// 获取一个流构建器\nStream.Builder builder = Stream.builder();\n\
  ```\n\n`Stream.Builder<T>` 接口包含以下方法：\n\n*   `void accept(T t)`\n\n*   `Stream.Builder<T>\
  \ add(T t)`\n\n*   `Stream<T> build()`\n\n`accept()` 和 `add()` 方法用于向正在构建的流中添加元素。你可能会疑惑为什么构建器中存在两个添加元素的方法。`Stream.Builder<T>`\
  \ 接口继承自 `Consumer<T>` 接口，因此它从 `Consumer<T>` 接口继承了 `accept()` 方法。你可以将构建器的实例传递给接受消费者（Consumer）的方法，该方法可以使用\
  \ `accept()` 方法向构建器添加元素。\n\n`add()` 方法返回构建器的引用，这使得它适合使用方法链添加多个元素。添加完元素后，调用 `build()`\
  \ 方法来创建流。调用 `build()` 方法后，不能再向流中添加元素；否则会导致 `IllegalStateException` 运行时异常。以下代码片段使用构建器模式创建了一个包含四个字符串的流：\n\
  \n```\nStream stream = Stream.builder()\n.add(\"Ken\")\n.add(\"Jeff\")\n.add(\"\
  Chris\")\n.add(\"Ellen\")\n.build();\n```\n\n请注意，在获取构建器 `Stream.<String>builder()`\
  \ 时，代码指定了类型参数为 `String`。如果不指定，编译器将无法推断类型参数。如果你单独获取构建器，编译器会将类型推断为 `String`，如下所示：\n\
  \n```\n// 获取一个构建器\nStream.Builder builder = Stream.builder();\n// 添加元素并构建流\nStream\
  \ stream = builder.add(\"Ken\")\n.add(\"Jeff\")\n.add(\"Chris\")\n.add(\"Ellen\"\
  )\n.build();\n```\n\n`IntStream` 接口包含四个静态方法，允许你从值创建 `IntStream`：\n\n*   `IntStream\
  \ of(int value)`\n\n*   `IntStream of(int... values)`\n\n*   `IntStream range(int\
  \ start, int end)`\n\n*   `IntStream rangeClosed(int start, int end)`.\n\n`of()`\
  \ 方法允许你通过指定单个值来创建 `IntStream`。`range()` 和 `rangeClosed()` 方法生成一个 `IntStream`，其中包含指定\
  \ `start` 和 `end` 之间的有序整数。在 `range()` 方法中，指定的 `end` 是排除的，而在 `rangeClosed()` 方法中则是包含的。以下代码片段使用这两种方法创建了一个包含整数\
  \ 1、2、3、4 和 5 的 `IntStream`：\n\n```\n// 创建一个包含 1, 2, 3, 4, 5 的 IntStream\nIntStream\
  \ oneToFive = IntStream.range(1, 6);\n// 创建一个包含 1, 2, 3, 4, 5 的 IntStream\nIntStream\
  \ oneToFive = IntStream.rangeClosed(1, 5);\n```\n\n`LongStream` 接口也包含 `range()`\
  \ 和 `rangeClosed()` 方法，它们接受 `long` 类型的参数并返回一个 `LongStream`。`LongStream` 和 `DoubleStream`\
  \ 接口也包含 `of()` 方法，它们处理 `long` 和 `double` 值，并分别返回 `LongStream` 和 `DoubleStream`。\n\
  \n空流\n\n空流是没有元素的流。`Stream` 接口包含一个 `empty()` 静态方法，用于创建一个空的顺序流。\n\n```\n// 创建一个空的字符串流\n\
  Stream stream = Stream.empty();\n```\n\n`IntStream`、`LongStream` 和 `DoubleStream`\
  \ 接口也包含一个 `empty()` 静态方法，用于创建基本类型的空流。示例如下：\n\n```\n// 创建一个空的整数流\nIntStream numbers\
  \ = IntStream.empty();\n```\n\n从函数创建流\n\n无限流是一种数据源能够生成无限数量元素的流。请注意，我说的是数据源应该“能够生成”无限数量的元素，而不是数据源应该拥有或包含无限数量的元素。由于内存和时间限制，存储任何类型的无限数量元素都是不可能的。然而，可以有一个能够按需生成无限数量值的函数。`Stream`\
  \ 接口包含以下两个静态方法来生成无限流：\n\n*   `<T> Stream<T> iterate(T seed, Predicate<? super T>\
  \ hasNext, UnaryOperator<T> next)`\n\n*   `<T> Stream<T> iterate(T seed, UnaryOperator<T>\
  \ f)`\n\n*   `<T> Stream<T> generate(Supplier<? extends T> s)`\n\n`iterate()` 方法创建一个有序的顺序流，而\
  \ `generate()` 方法创建一个无序的顺序流。以下部分将向你展示如何使用这些方法。\n\n用于基本类型值的流接口 `IntStream`、`LongStream`\
  \ 和 `DoubleStream` 也包含 `iterate()` 和 `generate()` 静态方法，这些方法接受特定于其基本类型的参数。例如，这些方法在\
  \ `IntStream` 接口中定义如下：\n\n*   `static IntStream iterate(int seed, IntPredicate hasNext,\
  \ IntUnaryOperator next)`\n\n*   `IntStream iterate(int seed, IntUnaryOperator f)`\n\
  \n*   `IntStream generate(IntSupplier s)`\n\n使用 Stream.iterate() 方法\n\n`iterate()`\
  \ 方法的第一个版本声明如下：\n\n```\nstatic  Stream iterate(T seed, Predicate hasNext, UnaryOperator\
  \ next)\n```\n\n该方法接受三个参数：一个种子值、一个谓词和一个函数。它通过迭代地应用 `next` 函数来生成元素，只要 `hasNext` 谓词为\
  \ `true`。`seed` 参数是初始元素。调用此方法类似于使用如下 `for` 循环：\n\n```\nfor (int index = seed; hasNext.test(index);\
  \ index = next.applyAsInt(index)) {\n// index 是流中的下一个元素\n}\n```\n\n以下代码片段生成一个从 1\
  \ 到 10 的整数流：\n\n```\nStream nums = Stream.iterate(1, n -> n  n + 1);\n```\n\n`iterate()`\
  \ 方法的第二个版本声明如下：\n\n```\nstatic  Stream iterate(T seed, UnaryOperator f)\n```\n\n\
  该方法接受两个参数：一个种子值和一个函数。第一个参数是种子值，它是流的第一个元素。第二个元素通过将函数应用于第一个元素来生成。第三个元素通过将函数应用于第二个元素来生成，依此类推。其元素为\
  \ `seed`、`f(seed)`、`f(f(seed))`、`f(f(f(seed)))`，等等。以下语句创建了一个无限的自然数流和一个无限的所有奇数自然数流：\n\
  \n\n\n```\n// 创建一个自然数流\nStream naturalNumbers = Stream.iterate(1L, n -> n + 1);\n\
  // 创建一个奇数自然数流\nStream oddNaturalNumbers = Stream.iterate(1L, n -> n + 2);\n```\n\
  \n如何处理无限流？你需要明白，不可能消费无限流中的所有元素。原因很简单，因为流处理将永远无法完成。通常，你会通过应用一个限制操作，将无限流转换为固定大小的流，该操作会将输入流截断至不超过指定大小。限制操作是一个中间操作，它会生成另一个流。你可以使用\
  \ `Stream` 接口的 `limit(long maxSize)` 方法来应用限制操作。以下代码片段创建了前 10 个自然数的流：\n\n```\n//\
  \ 创建前 10 个自然数的流\nStream tenNaturalNumbers = Stream.iterate(1L, n -> n + 1)\n.limit(10);\n\
  ```\n\n你可以使用 `Stream` 接口的 `forEach(Consumer<? super T> action)` 方法对流应用 `forEach`\
  \ 操作。该方法返回 `void`。它是一个终端操作。以下代码片段在标准输出上打印前五个奇数自然数：\n\n```\nStream.iterate(1L, n\
  \ -> n + 2)\n.limit(5)\n.forEach(System.out::println);\n```\n\n```\n\n```\n\n让我们看一个创建无限素数流的实际示例。清单\
  \ 13-4 包含一个名为 `PrimeUtil` 的工具类。该类包含两个工具方法。`next()` 实例方法返回最后一个找到的素数之后的下一个素数。`next(long\
  \ after)` 静态方法返回指定数字之后的素数。`isPrime()` 静态方法检查一个数字是否为素数。\n\n```\n// PrimeUtil.java\n\
  package com.jdojo.streams;\npublic class PrimeUtil {\n// 用于有状态的 PrimeUtil\nprivate\
  \ long lastPrime = 0L;\n// 计算最后一个生成的素数之后的下一个素数\npublic long next() {\nlastPrime\
  \ = next(lastPrime);\nreturn lastPrime;\n}\n// 计算指定数字之后的下一个素数\npublic static long\
  \ next(long after) {\nlong counter = after;\n// 持续循环直到找到下一个素数\nwhile (!isPrime(++counter));\n\
  return counter;\n}\n// 检查指定数字是否为素数\npublic static boolean isPrime(long number) {\n\
  // 2 不是素数\nif (number % 2 == 0) {\nreturn false;\n}\nlong maxDivisor = (long) Math.sqrt(number);\n\
  for (int counter = 3; counter <= maxDivisor; counter += 2) {\nif (number % counter\
  \ == 0) {\nreturn false;\n}\n}\nreturn true;\n}\n}\n清单 13-4.\n一个用于处理素数的工具类\n```\n\
  \n以下代码片段创建了一个无限素数流，并在标准输出上打印前五个素数：\n\n```\nStream.iterate(2L, PrimeUtil::next)\n\
  .limit(5)\n.forEach(System.out::println);\n```\n\n```\n\n```\n\n还有另一种获取前五个素数的方法。你可以生成一个无限的自然数流，应用一个过滤操作只挑选素数，然后将过滤后的流限制为五个。以下代码片段使用\
  \ `PrimeUtil` 类的 `isPrime()` 方法展示了此逻辑：\n\n```\n// 打印前 5 个素数\nStream.iterate(2L,\
  \ n -> n + 1)\n.filter(PrimeUtil::isPrime)\n.limit(5)\n.forEach(System.out::println);\n\
