  反序列化实现 Externalizable 接口的 PersonExt 对象\n```\n\n清单 7-29 的输出表明，在反序列化 `PersonExt` 对象后，`height`\
  \ 字段的值为默认值（`Double.NaN`）。\n\n以下是使用 `Externalizable` 接口序列化和反序列化对象的步骤：\n\n1.  当你调用\
  \ `writeObject()` 方法写入一个 `Externalizable` 对象时，Java 会将该对象的标识写入输出流，并调用其类的 `writeExternal()`\
  \ 方法。你在 `writeExternal()` 方法中将与对象相关的数据写入输出流。在此方法中，你可以完全控制写入流中的对象相关数据。如果你想存储一些敏感数据，可以在写入流之前对其进行加密，并在从流中读取时解密数据。\n\
  \n2.  当你调用 `readObject()` 方法读取一个 `Externalizable` 对象时，Java 会从流中读取该对象的标识。请注意，对于 `Externalizable`\
  \ 对象，Java 只将对象的标识写入输出流，而不写入其类定义的任何细节。它使用对象类的无参构造函数来创建对象。这就是你必须为 `Externalizable`\
  \ 对象提供无参构造函数的原因。然后它会调用对象的 `readExternal()` 方法，以便你可以填充对象的字段值。\n\n对于 `Serializable`\
  \ 对象，JVM 仅序列化未声明为 `transient` 的实例变量。我将在下一节讨论序列化 `transient` 变量。对于 `Externalizable`\
  \ 对象，你可以完全控制哪些数据片段被序列化。\n\n序列化瞬态字段\n\n关键字 `transient` 用于声明类的字段。正如“transient”一词的字面含义所暗示的，`Serializable`\
  \ 对象的瞬态字段不会被序列化。以下 `Employee` 类的代码将 `ssn` 和 `salary` 字段声明为 `transient`：\n\n```\n\
  public class Employee implements Serializable {\nprivate String name;\nprivate String\
  \ gender;\nprivate transient String ssn;\nprivate transient double salary;\n}\n\
  ```\n\n当你使用 `ObjectOutputStream` 类的 `writeObject()` 方法时，`Serializable` 对象的瞬态字段不会被序列化。\n\
  \n请注意，如果你的对象是 `Externalizable` 而非 `Serializable`，则声明字段为 `transient` 无效，因为你在 `writeExternal()`\
  \ 方法中控制哪些字段被序列化。如果你希望类的瞬态字段被序列化，则需要将类声明为 `Externalizable`，并在类的 `writeExternal()`\
  \ 方法中将瞬态字段写入输出流。我不提供序列化瞬态字段的示例，因为其逻辑与清单 7-27 中所示相同，区别仅在于你将某些实例变量声明为 `transient`，并在\
  \ `writeExternal()` 方法中将它们写入输出流。\n\n高级对象序列化\n\n以下部分讨论高级序列化技术。它们是为经验丰富的开发人员设计的。如果你是初学者或中级开发人员，可以跳过以下部分；不过，在获得更多\
  \ Java I/O 经验后，你应该重新阅读它们。\n\n多次将对象写入流\n\nJVM 会跟踪使用 `writeObject()` 方法写入对象输出流的对象引用。假设你有一个名为\
  \ `john` 的 `PersonMutable` 对象，并使用 `ObjectOutputStream` 对象 `oos` 将其写入文件，如下所示：\n\n\
  ```\nPersonMutable john = new PersonMutable(\"John\", \"Male\", 6.7);\noos.writeObject(john);\n\
  ```\n\n此时，Java 会记录对象 `john` 已被写入流。你可能希望更改 `john` 对象的某些属性，并再次将其写入流，如下所示：\n\n```\n\
  john.setName(\"John Jacobs\");\njohn.setHeight(5.9);\noos.writeObject(john);\n```\n\
  \n此时，Java 不会将 `john` 对象写入流。相反，JVM 会将其反向引用到你第一次写入的 `john` 对象。也就是说，对 `name` 和 `height`\
  \ 字段所做的所有更改都不会单独写入流。对 `john` 对象的两次写入在写入的流中共享同一个对象。当你读回对象时，两个对象将具有相同的 `name`、`gender`\
  \ 和 `height`。\n\n\n\n为了保持序列化对象的大小，同一个对象不会向流中写入多次。清单 7-30 展示了这一过程。清单 7-31 中的 `MultipleSerialization`\
  \ 类在其 `serialize()` 方法中，写入一个对象，修改该对象的属性，然后再次序列化同一个对象。其 `deserialize()` 方法则负责读取这些对象。输出结果显示，当\
  \ Java 第二次写入该对象时，并未写入对该对象所做的修改。\n\n```\n// MutablePerson.java\npackage com.jdojo.io;\n\
  import java.io.Serializable;\npublic class MutablePerson implements Serializable\
  \ {\nprivate String name = \"Unknown\";\nprivate String gender = \"Unknown\";\n\
  private double height = Double.NaN;\npublic MutablePerson(String name, String gender,\
  \ double height) {\nthis.name = name;\nthis.gender = gender;\nthis.height = height;\n\
  }\npublic void setName(String name) {\nthis.name = name;\n}\npublic String getName()\
  \ {\nreturn name ;\n}\npublic void setHeight(double height) {\nthis.height = height;\n\
  }\npublic double getHeight() {\nreturn height;\n}\n@Override\npublic String toString()\
  \ {\nreturn \"Name: \" + this.name + \", Gender: \" + this.gender\n+ \", Height:\
  \ \" + this.height;\n}\n}\n清单 7-30.\n一个名称和身高可变的 MutablePerson 类\n```\n\n```\n//\
  \ MultipleSerialization.java\npackage com.jdojo.io;\nimport java.io.File;\nimport\
  \ java.io.FileInputStream;\nimport java.io.FileOutputStream;\nimport java.io.IOException;\n\
  import java.io.ObjectInputStream;\nimport java.io.ObjectOutputStream;\npublic class\
  \ MultipleSerialization {\npublic static void main(String[] args) {\nString fileName\
  \ = \"mutableperson.ser\";\n// 将同一个对象向流中写入两次\nserialize(fileName);\nSystem.out.println(\"\
  --------------------------------------\");\n// 将两个对象读回\ndeserialize(fileName);\n\
  }\npublic static void serialize(String fileName) {\n// 创建一个 MutablePerson 对象\nMutablePerson\
  \ john = new MutablePerson(\"John\", \"Male\", 6.7);\nFile fileObject = new File(fileName);\n\
  try (ObjectOutputStream oos\n= new ObjectOutputStream(new FileOutputStream(fileObject)))\
  \ {\n// 在控制台显示已序列化的对象\nSystem.out.println(\"对象已写入 \"\n+ fileObject.getAbsolutePath());\n\
  // 第一次将 john 对象写入流\noos.writeObject(john);\nSystem.out.println(john); // 显示写入的内容\n\
  // 修改 john 对象的名称和身高\njohn.setName(\"John Jacobs\");\njohn.setHeight(6.9);\n// 使用修改后的名称和身高再次写入\
  \ john 对象\noos.writeObject(john);\nSystem.out.println(john); // 再次显示写入的内容\n} catch\
  \ (IOException e1) {\ne1.printStackTrace();\n}\n}\npublic static void deserialize(String\
  \ fileName) {\n// personmutable.ser 文件必须存在于当前目录中\nFile fileObject = new File(fileName);\n\
  try (ObjectInputStream ois\n= new ObjectInputStream(new FileInputStream(fileObject)))\
  \ {\n// 读取在 serialize() 方法中写入的两个对象\nMutablePerson john1 = (MutablePerson) ois.readObject();\n\
  MutablePerson john2 = (MutablePerson) ois.readObject();\n// 显示对象\nSystem.out.println(\"\
  对象已从 \"\n+ fileObject.getAbsolutePath() + \" 读取\");\nSystem.out.println(john1);\n\
  System.out.println(john2);\n} catch (IOException | ClassNotFoundException e) {\n\
  e.printStackTrace();\n}\n}\n}\n对象已写入 C:\\Java9LanguageFeatures\\mutableperson.ser\n\
  Name: John, Gender: Male, Height: 6.7\nName: John Jacobs, Gender: Male, Height:\
  \ 6.9\n\n对象已从 C:\\Java9LanguageFeatures\\mutableperson.ser 读取\nName: John, Gender:\
  \ Male, Height: 6.7\nName: John, Gender: Male, Height: 6.7\n清单 7-31.\n多次向同一个输出流写入同一个对象\n\
  ```\n\n如果你不希望 Java 共享对象引用，可以使用 `ObjectOutputStream` 类的 `writeUnshared()` 方法代替 `writeObject()`\
  \ 方法来序列化对象。使用 `writeUnshared()` 方法写入的对象，不会被后续对同一个对象调用 `writeObject()` 或 `writeUnshared()`\
  \ 方法所共享或反向引用。你应该使用 `ObjectInputStream` 类的 `readUnshared()` 方法来读取使用 `writeUnshared()`\
  \ 写入的对象。如果在 `MutipleSerialization` 类中将 `writeObject()` 调用替换为 `writeUnshared()`，并将\
  \ `readObject()` 调用替换为 `readUnshared()`，那么第二次读取对象时，你将获得对象修改后的状态。\n\n你还可以通过定义一个名为\
  \ `serialPersistentFields` 的字段（该字段是一个 `ObjectStreamField` 对象数组）来以另一种方式控制 `Serializable`\
  \ 对象的序列化。此字段必须声明为 `private`、`static` 和 `final`。该字段声明数组中提及的所有字段都是可序列化的。请注意，这与在字段上使用\
  \ `transient` 关键字正好相反。当你使用 `transient` 关键字时，你声明该字段不可序列化；而通过声明 `serialPersistentFields`\
  \ 数组，你声明这些字段是可序列化的。`serialPersistentFields` 的声明优先于类中 transient 字段的声明。例如，如果你将一个字段声明为\
  \ transient，但又将该字段包含在 `serialPersistentFields` 字段中，那么该字段将被序列化。以下代码片段展示了如何在 `Person`\
  \ 类中声明 `serialPersistentFields` 字段：\n\n```\npublic class Person implements Serializable\
  \ {\nprivate String name;\nprivate String gender;\nprivate double height;\n// 声明只有\
  \ name 和 height 字段是可序列化的\nprivate static final ObjectStreamField[] serialPersistentFields\n\
  = {new ObjectStreamField(\"name\", String.class),\nnew ObjectStreamField(\"height\"\
  , double.class)};\n}\n```\n\n类的演变与对象序列化\n\n你的类可能会随着时间的推移而演变（或改变）。例如，你可能从类中移除一个现有字段或方法，也可能向类中添加新字段或方法。在对象序列化过程中，Java\
  \ 会使用一个对你所序列化对象的类来说是唯一的数字。这个唯一的数字被称为**序列版本唯一 ID (SUID)**。Java 通过计算类定义的哈希码来得到这个数字。如果你更改了类定义（例如添加新字段），该类的\
  \ SUID 将会改变。当你序列化一个对象时，Java 也会将类信息保存到流中。当你反序列化对象时，Java 通过从流中读取类定义来计算正在反序列化的对象的类的\
  \ SUID。它将从流中计算出的 SUID 与加载到 JVM 中的类的 SUID 进行比较。\n\n如果你在序列化某个类的对象之后更改了该类的定义，这两个数字将不匹配，并且在反序列化过程中你将收到\
  \ `java.io.InvalidClassException`。如果你从未序列化过你的类的对象，或者在你序列化对象之后、反序列化它们之前从未更改过你的类定义，那么你无需担心类的\
  \ SUID。那么，如果你在序列化类的对象之后更改了类定义，应该怎么做才能让你的对象正确反序列化呢？你应该在你的类中声明一个 `private`、`static`\
  \ 和 `final` 的实例变量，该变量必须是 `long` 类型，并且命名为 `serialVersionUID`。\n\n```\npublic class\
  \ MyClass {\n// 声明 SUID 字段。\nprivate static final long serialVersionUID = 801890L;\n\
  // 更多代码写在这里\n}\n```\n\n\n\n`MyClass` 类使用 801890 作为 `serialVersionUID` 的值。这个数字是任意选择的。你为此字段选择什么数字并不重要。JDK\
  \ 附带了一个 `serialver` 工具，你可以用它来为你的类生成 `serialVersionUID` 字段的值。你可以在命令提示符下按如下方式使用此工具：\n\
  \n```\nserialver -classpath  \n```\n\n当你使用你的类名运行此工具时，它会打印出你的类的 `serialVersionUID`\
  \ 字段的声明以及为其生成的 SUID。你只需将该声明复制并粘贴到你的类声明中即可。\n\n提示\n\n假设你有一个不包含 `serialVersionUID`\
  \ 字段的类，并且你已经序列化了它的对象。如果你更改了你的类并尝试反序列化该对象，Java 运行时将打印一条错误消息，其中包含预期的 `serialVersionUID`。你需要在你的类中添加具有相同值的\
  \ `serialVersionUID` 字段，然后尝试反序列化这些对象。\n\n停止序列化\n\n如何阻止你的类的对象被序列化？一个显而易见的答案是不在你的类中实现\
  \ `Serializable` 接口。然而，这在所有情况下都不是一个有效的答案。例如，如果你从一个实现了 `Serializable` 接口的现有类继承你的类，那么你的类会隐式地实现\
  \ `Serializable` 接口。这使得你的类自动可序列化。为了始终阻止你的类的对象被序列化，你可以在你的类中添加 `writeObject()` 和 `readObject()`\
  \ 方法。这些方法应该简单地抛出一个异常。\n\n清单 7-32 包含了一个名为 `NotSerializable` 的类的部分代码。该类实现了 `Serializable`\
  \ 接口，但它仍然不可序列化，因为它在 `readObject()` 和 `writeObject()` 方法中抛出了异常。\n\n```\n// NotSerializable.java\n\
  package com.jdojo.io;\nimport java.io.IOException;\nimport java.io.ObjectInputStream;\n\
  import java.io.ObjectOutputStream;\nimport java.io.Serializable;\npublic class NotSerializable\
  \ implements Serializable {\n// 实例变量放在这里\nprivate void readObject(ObjectInputStream\
  \ ois)\nthrows IOException, ClassNotFoundException {\n// 抛出一个异常\nthrow new IOException(\"\
  不用于序列化！！！\");\n}\nprivate void writeObject(ObjectOutputStream os) throws IOException\
  \ {\n// 抛出一个异常\nthrow new IOException(\"不用于序列化！！！\");\n}\n// 类的其他代码放在这里\n}\n清单 7-32.\n\
  阻止类进行序列化\n```\n\n读取器和写入器\n\n输入和输出流是基于字节的流。在本节中，我将讨论读取器和写入器，它们是基于字符的流。读取器用于从数据源读取基于字符的数据。写入器用于将基于字符的数据写入数据接收端。\n\
  \n图 7-8 和图 7-9 展示了 `Reader` 和 `Writer` 流家族的一些类以及它们之间的关系。回想一下，输入和输出流的类名分别以单词“InputStream”和“OutputStream”结尾。`Reader`\
