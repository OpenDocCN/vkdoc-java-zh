  \  返回流中的元素，丢弃开头满足谓词的元素。此操作在 Java 9 中被添加到 Streams API。\n |\n\n`takeWhile`\n |\n \
  \ 中间操作\n |\n  返回流开头与谓词匹配的元素，丢弃其余元素。此操作在 Java 9 中被添加到 Streams API。\n |\n\n`sorted`\n\
  \ |\n  中间操作\n |\n  返回由该流中的元素组成的流，按自然顺序或指定的 `Comparator` 排序。对于有序流，排序是稳定的。\n |\n\n\
  `allMatch`\n |\n  终端操作\n |\n  如果流中的所有元素都匹配指定谓词，则返回 `true`，否则返回 `false`。如果流为空，则返回\
  \ `true`。\n |\n\n`anyMatch`\n |\n  终端操作\n |\n  如果流中的任意元素匹配指定谓词，则返回 `true`，否则返回 `false`。如果流为空，则返回\
  \ `false`。\n |\n\n`findAny`\n |\n  终端操作\n |\n  返回流中的任意元素。对于空流，返回一个空的 `Optional`。\n\
  \ |\n\n`findFirst`\n |\n  终端操作\n |\n  返回流的第一个元素。对于有序流，返回相遇顺序中的第一个元素；对于无序流，返回任意元素。\n\
  \ |\n\n`noneMatch`\n |\n  终端操作\n |\n  如果流中没有元素匹配指定谓词，则返回 `true`，否则返回 `false`。如果流为空，则返回\
  \ `true`。\n |\n\n`forEach`\n |\n  终端操作\n |\n  对流中的每个元素应用一个操作。\n |\n\n\n\n`reduce`\n\
  \ |\n  终端操作\n |\n  应用归约操作，从流中计算出一个单一值。\n |\n\n调试流管道\n\n你会在流上应用一系列操作。每个操作都会转换输入流中的元素，要么生成另一个流，要么生成一个结果。有时你可能需要查看元素在流经管道时的状态。你可以通过使用\
  \ `Stream<T>` 接口中仅用于调试目的的 `peek(Consumer<? super T> action)` 方法来实现。该方法在对每个输入元素应用操作后生成一个流。`IntStream`、`LongStream`\
  \ 和 `DoubleStream` 方法也包含一个 `peek()` 方法，该方法分别接受 `IntConsumer`、`LongConsumer` 和 `DoubleConsumer`\
  \ 作为参数。通常，你会将 lambda 表达式与 `peek()` 方法结合使用，以记录描述正在处理的元素的消息。以下代码片段在三个位置使用了 `peek()`\
  \ 方法来打印流经管道的元素：\n\n```\nint sum = Stream.of(1, 2, 3, 4, 5)\n.peek(e -> System.out.println(\"\
  Taking integer: \" + e))\n.filter(n -> n % 2 == 1)\n.peek(e -> System.out.println(\"\
  Filtered integer: \" + e))\n.map(n -> n * n)\n.peek(e -> System.out.println(\"Mapped\
  \ integer: \" + e))\n.reduce(0, Integer::sum);\nSystem.out.println(\"Sum = \" +\
  \ sum);\n```\n\n```\nTaking integer: 1\nFiltered integer: 1\nMapped integer: 1\n\
  Taking integer: 2\nTaking integer: 3\nFiltered integer: 3\nMapped integer: 9\nTaking\
  \ integer: 4\nTaking integer: 5\nFiltered integer: 5\nMapped integer: 25\nSum =\
  \ 35\n```\n\n请注意，输出显示偶数已从数据源取出，但未通过过滤操作。\n\n应用 ForEach 操作\n\n`forEach` 操作对流中的每个元素执行一个动作。该动作可以简单地将流中的每个元素打印到标准输出，或者将流中每个人的收入增加\
  \ 10%。`Stream<T>` 接口包含两个执行 `forEach` 操作的方法：\n\n*   `void forEach(Consumer<? super\
  \ T> action)`\n\n*   `void forEachOrdered(Consumer<? super T> action)`\n\n`IntStream`、`LongStream`\
  \ 和 `DoubleStream` 也包含相同的方法，只是它们的参数类型是针对原始类型的特化消费者类型；例如，`IntStream` 中 `forEach()`\
  \ 方法的参数类型是 `IntConsumer`。\n\n为什么会有两个方法来执行 `forEach` 操作？有时，动作应用于流中元素的顺序很重要，有时则不然。`forEach()`\
  \ 方法不保证流中每个元素应用动作的顺序。`forEachOrdered()` 方法按照流定义的元素相遇顺序执行动作。仅在必要时才对并行流使用 `forEachOrdered()`\
  \ 方法，因为它可能会降低处理速度。以下代码片段打印了 `person` 列表中女性的详细信息：\n\n```\nPerson.persons()\n.stream()\n\
  .filter(Person::isFemale)\n.forEach(System.out::println);\n```\n\n```\n(3, Donna,\
