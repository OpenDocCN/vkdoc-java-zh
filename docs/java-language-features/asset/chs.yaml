  } catch (NoSuchElementException e) {\nSystem.out.println(\"deque.removeFirst():\
  \ Deque 为空。\");\n}\n}\n}\n清单 12-19.\n将 Deque 用作 FIFO 队列\n```\n\n```\nDeque: [John,\
