  \ illegal access operations will be denied in a future release\nLong.value = 1969\n\
  Long.value = 1968\n```\n\n使用 JAR 的清单属性\n\n可执行 JAR 是一种可以使用 `-jar` 选项来运行 Java 应用程序的\
  \ JAR 文件：\n\n```\njava -jar myapp.jar\n```\n\n这里，`myapp.jar` 是一个可执行 JAR。可执行 JAR\
  \ 在其 `MANIFEST.MF` 文件中包含一个名为 `Main-Class` 的属性，其值是 `java` 命令应该运行的主类的完全限定名。回顾一下，还有其他类型的\
  \ JAR，例如模块化 JAR 和多版本 JAR。一个 JAR 基于哪种类型并不重要；可执行 JAR 的定义仅在于使用 `-jar` 选项启动应用程序的上下文。\n\
  \n假设一个打包为可执行 JAR 的现有应用程序使用深度反射来访问 JDK 内部 API。它在 JDK8 中运行良好。你想在 JDK9 上运行这个可执行 JAR。JDK9\
  \ 中的 JDK 内部 API 已经被封装。现在，你必须将 `--add-exports` 和 `--add-opens` 命令行选项与 `-jar` 选项一起使用，才能运行同一个可执行\
  \ JAR。在 JDK9 中使用新的命令行选项提供了一种解决方案。然而，对于可执行 JAR 的最终用户来说，使用这些命令行选项有点不方便。为了简化此类迁移，JDK9\
  \ 为可执行 JAR 的 `MANIFEST.MF` 文件添加了两个新属性：\n\n*   `Add-Exports`\n\n*   `Add-Opens`\n\
  \n\n\n这些属性被添加到清单文件的主节中。\n它们与两个命令行选项 `--add-exports` 和 `--add-opens` 相对应。\n使用这些属性时有一个区别。这些属性会将模块的包导出和开放给所有未命名模块。因此，你只需指定源模块及其包的列表，而无需为目标模块指定值。换句话说，在清单文件中，你可以将包导出或开放给所有未命名模块，或者不进行任何操作，但不能针对任何具名模块。这些属性的值是由空格分隔的、以斜杠分隔的模块名/包名对列表。示例如下：\n\
  \n```\nAdd-Exports: m1/p1 m2/p2 m3/p3 m1/p1\n```\n\n该条目将在运行时将模块 `m1` 中的包 `p1`、模块\
  \ `m2` 中的包 `p2` 以及模块 `m3` 中的包 `p3` 导出给未命名模块。清单文件的解析规则比较宽松，允许重复。请注意值中重复的条目 `m1/p1`。\n\
