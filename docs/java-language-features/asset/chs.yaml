  \ 和 `m3()`。请注意，`m2()` 方法  \n调用了 `m3()`  \n两次。第一次调用时，字节码索引为 8；第二次调用时，字节码索引为 35。\n\
  \n`getDeclaringClass()`  \n方法返回声明此帧所表示方法的类的 `Class` 对象引用。如果此 `StackWalker` 未  \n\
  配置 `RETAIN_CLASS_REFERENCE`  \n选项，则会抛出 `UnsupportedOperationException`。\n\n`toStackTraceElement()`\
  \  \n方法  \n返回一个 `StackTraceElement`  \n类的实例，该实例表示相同的栈帧。如果你想使用 JDK9 API 获取 `StackWalker.StackFrame`，\
  \  \n但继续使用基于 `StackTraceElement`  \n类分析帧的旧代码，此方法非常方便。\n\n获取 StackWalker 类\n\n`StackWalker`\
  \ 类  \n包含以下返回 `StackWalker`  \n实例的静态工厂方法：\n\n*   `StackWalker getInstance()`\n\n\
  *   `StackWalker getInstance (StackWalker.Option option)`\n\n*   `static StackWalker\
  \ getInstance (Set<StackWalker.Option> options)`\n\n*   `static StackWalker getInstance\
  \ (Set<StackWalker.Option> options, int estimateDepth)`\n\n你可以使用不同版本的 `getInstance()`\
  \ 方法  \n以不同方式配置 `StackWalker`。  \n默认配置是排除所有隐藏帧且不  \n保留类引用。允许你指定 `StackWalker.Option`\
  \  \n的版本将使用这些选项进行配置。\n\n`estimateDepth`  \n参数是一个提示，指示此 `StackWalker` 预期  \n遍历的栈帧数量，以便优化内部缓冲区的大小。\n\
  \n以下代码片段使用不同配置创建了四个 `StackWalker` 类的实例：\n\n```\nimport java.util.Set;\nimport static\
  \ java.lang.StackWalker.Option.*;\n...\n// 获取默认配置的 StackWalker。\n// 它将排除所有隐藏帧且不保留类引用\n\
  StackWalker sw1 = StackWalker.getInstance();\n// 获取显示反射帧的 StackWalker\nStackWalker\
  \ sw2 = StackWalker.getInstance(SHOW_REFLECT_FRAMES);\n// 获取显示所有隐藏帧的 StackWalker\n\
  StackWalker sw3 = StackWalker.getInstance(SHOW_HIDDEN_FRAMES);\n// 获取显示反射帧并保留类引用的\
  \ StackWalker\nStackWalker sw4\n= StackWalker.getInstance(Set.of(SHOW_REFLECT_FRAMES,\
  \ RETAIN_CLASS_REFERENCE));\n```\n\n提示\n\n`StackWalker`  \n是线程安全且可重用的。多个线程可以使用同一个实例\
  \  \n遍历各自的栈。\n\n\n\n下一节将解释如何使用 `StackWalker` 遍历栈帧。\n\n遍历栈\n\n现在我们来遍历一个线程的栈帧。`StackWalker`\
  \ 类包含两个方法，允许你遍历当前线程的栈：\n\n*   `void forEach(Consumer<? super StackWalker.StackFrame>\
  \ action)`\n\n*   `<T> T walk(Function<? super Stream<StackWalker.StackFrame>,?\
  \ extends T> function)`\n\n如果你需要遍历整个栈，请使用 `forEach()` 方法。指定的 `Consumer` 将依次从栈中获取一个帧——从最顶层的帧开始。以下代码片段打印了\
  \ `StackWalker` 返回的每个帧的详细信息：\n\n```\n// 打印当前线程所有栈帧的详细信息\nStackWalker.getInstance()\n\
  .forEach(System.out::println);\n```\n\n如果你想自定义栈遍历，例如使用过滤器和映射，请使用 `walk()` 方法。`walk()`\
  \ 方法接受一个 `Function`，该函数接受一个 `Stream<StackWalker.StackFrame>` 作为参数，并可以返回任何类型的对象。`StackWalker`\
  \ 将创建栈帧流并将其传递给您的函数。当函数完成时，`StackWalker` 将关闭该流。传递给 `walk()` 方法的流只能被遍历一次。尝试第二次遍历该流将抛出\
  \ `IllegalStateException`。以下代码片段使用 `walk()` 方法遍历整个栈，并打印每个帧的详细信息。此代码片段与之前使用 `forEach()`\
  \ 方法的代码片段功能相同。\n\n```\n// 打印当前线程所有栈帧的详细信息\nStackWalker.getInstance()\n.walk(s ->\
  \ {\ns.forEach(System.out::println);\nreturn null;\n});\n```\n\n提示\n\n`StackWalker`\
  \ 的 `forEach()` 方法用于一次处理一个栈帧，而 `walk()` 方法用于将整个栈作为帧流进行处理。你可以使用 `walk()` 方法来模拟 `forEach()`\
  \ 方法的功能，但反之则不行。\n\n你可能想知道为什么 `walk()` 方法不返回栈帧流，而是将流传递给您的函数。不从此方法返回栈帧流是有意为之的。流的元素是惰性求值的。一旦创建了栈帧流，JVM\
  \ 就可以自由地重新组织栈，并且在你仍然持有对流的引用时，没有确定的方法来检测栈是否已更改。这就是栈帧流的创建和关闭由 `StackWalker` 类控制的原因。\n\
  \n由于 Streams API 功能强大，`walk()` 方法的使用也同样广泛。在展示完整示例之前，我先展示几个示例用法。以下代码片段将当前线程的栈帧快照获取到一个\
  \ `List` 中。\n\n```\nimport java.lang.StackWalker.StackFrame;\nimport java.util.List;\n\
  import static java.util.stream.Collectors.toList;\n...\nList frames = StackWalker.getInstance()\n\
  .walk(s -> s.collect(toList()));\n```\n\n以下代码片段将当前线程所有栈帧的字符串形式收集到一个 `List` 中——排除了那些表示方法名以\
  \ `m2` 开头的帧：\n\n```\nimport java.util.List;\nimport static java.util.stream.Collectors.toList;\n\
  ...\nList list = StackWalker.getInstance()\n.walk(s -> s.filter(f -> !f.getMethodName().startsWith(\"\
  m2\"))\n.map(f -> f.toString())\n.collect(toList())\n);\n```\n\n以下代码片段将当前线程所有栈帧的字符串形式收集到一个\
  \ `List` 中——排除了那些表示其声明类名以 `Test` 结尾的帧：\n\n```\nimport static java.lang.StackWalker.Option.RETAIN_CLASS_REFERENCE;\n\
  import java.util.List;\nimport static java.util.stream.Collectors.toList;\n...\n\
  List list = StackWalker\n.getInstance(RETAIN_CLASS_REFERENCE)\n.walk(s -> s.filter(f\
  \ -> !f.getDeclaringClass()\n.getName().endsWith(\"Test\"))\n.map(f -> f.toString())\n\
  .collect(toList())\n);\n```\n\n以下代码片段将整个栈收集到一个字符串中——每个帧之间用平台特定的行分隔符分隔：\n\n```\n\
  import static java.util.stream.Collectors.joining;\n...\nString stackStr = StackWalker.getInstance()\n\
  .walk(s -> s.map(f -> f.toString())\n.collect(joining(System.getProperty(\"line.separator\"\
  )\n)));\n```\n\n清单 18-3 包含一个完整的程序，展示了 `StackWalker` 类及其 `walk()` 方法的用法。其 `main()`\
