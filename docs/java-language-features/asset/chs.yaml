  ```\n    1:3:5:7\n    ```\n\n14. 实现服务\n\n在本章中，你将学习：\n\n*   什么是服务、服务接口和服务提供者\n* \
  \  如何在 Java 9 及 Java 9 之前实现服务\n*   如何在 Java 9 中使用 Java 接口作为服务实现\n*   如何使用 `ServiceLoader`\
  \ 类加载服务提供者\n*   如何在模块声明中使用 `uses` 语句来指定当前模块通过 `ServiceLoader` 类发现并加载的服务接口\n*   如何使用\
  \ `provides` 语句来指定当前模块提供的服务提供者\n*   如何在不实例化服务提供者的情况下，根据其类型发现、过滤和选择它们\n*   如何在 Java\
  \ 9 之前打包服务提供者\n\n什么是服务？\n\n应用程序（或库）提供的特定功能称为**服务**。例如，你可以有不同的库提供质数服务，该服务可以检查一个数是否为质数，并在给定数之后生成下一个质数。为服务提供实现的应用程序和库称为**服务提供者**。使用服务的应用程序称为**服务消费者**或客户端。客户端如何使用服务？客户端是否知道所有服务提供者？客户端能否在不了解任何服务提供者的情况下获取服务？我将在本章中回答这些问题。\n\
  \nJava SE 6 提供了一种机制，允许服务提供者和服务消费者之间实现松散耦合。也就是说，服务消费者可以在不了解服务提供者的情况下使用其提供的服务。\n\n\
  在 Java 中，服务由一组接口和类定义。服务包含一个接口或抽象类，用于定义服务提供的功能，这被称为**服务提供者接口**或简称为**服务接口**。请注意，“服务提供者接口”和“服务接口”中的“接口”一词并非指\
  \ Java 中的接口构造。服务接口可以是 Java 接口或抽象类。使用具体类作为服务接口是可能的，但不推荐。有时，服务接口也被称为**服务类型**——用于标识服务的类型。\n\
  \n服务的特定实现称为**服务提供者**。一个服务接口可以有多个**服务提供者**。通常，服务提供者由多个接口和类组成，为服务接口提供实现。\n\nJDK 包含一个\
  \ `java.util.ServiceLoader<S>` 类，其唯一目的是在运行时为类型为 `S` 的服务接口发现并加载服务提供者。`ServiceLoader`\
  \ 类允许将服务提供者与服务消费者解耦。服务消费者只知道服务接口；`ServiceLoader` 类使实现服务接口的服务提供者实例可供消费者使用。图 14-1\
  \ 展示了服务、服务提供者和服务消费者的结构示意图。\n\n![A323070_2_En_14_Fig1_HTML.gif](img/A323070_2_En_14_Fig1_HTML.gif)\n\
  \n图 14-1.\n\n服务、服务提供者和服务消费者的结构\n\n通常，服务会使用 `ServiceLoader` 类加载所有服务提供者，并使其可供服务消费者（或客户端）使用。这种架构支持插件机制，可以在不影响服务和消费者的情况下添加或移除服务提供者。服务消费者只知道服务接口，不了解服务接口的任何具体实现（服务提供者）。\n\
  \n提示\n\n我建议阅读 `java.util.ServiceLoader` 类的文档，以全面了解 JDK9 提供的服务加载功能。\n\n在本章中，我将使用一个服务和三个服务提供者。它们的模块、类/接口名称及简要说明列于表\
  \ 14-1 中。\n\n表 14-1.\n\n本章示例中使用的模块、类和接口\n\n| 模块 | 类/接口 | 描述 |\n| --- | --- | ---\
  \ |\n| `jdojo.prime` | `PrimeChecker` | 充当服务、服务接口和服务提供者。为服务接口提供默认实现。 |\n| `jdojo.prime.faster`\
  \ | `FasterPrimeChecker` | 一个服务提供者。 |\n| `jdojo.prime.probable` | `ProbablePrimeChecker`\
  \ | 一个服务提供者。 |\n| `jdojo.prime.client` | `Main` | 一个服务消费者。 |\n\n图 14-2 展示了按服务、服务提供者和服务消费者排列的类/接口，可与图\
  \ 14-1 进行对比。\n\n![A323070_2_En_14_Fig2_HTML.gif](img/A323070_2_En_14_Fig2_HTML.gif)\n\
  \n图 14-2.\n\n本章示例中使用的服务、三个服务提供者和一个服务消费者的结构\n\n发现服务\n\n为了使用服务，需要发现并加载其提供者。`ServiceLoader`\
  \ 类负责发现和加载服务提供者。发现并加载服务提供者的模块必须在其声明中包含一个 `uses` 语句，其语法如下：\n\n```\nuses <服务接口>;\n\
  ```\n\n其中，`<服务接口>` 是服务接口的名称，可以是 Java 接口名、类名或注解类型名。如果某个模块使用 `ServiceLoader<S>` 类来加载名为\
  \ `S` 的服务接口的服务提供者实例，则该模块声明必须包含以下语句：\n\n```\nuses S;\n```\n\n在我看来，`uses` 这个语句名称似乎有些用词不当。乍一看，似乎当前模块将使用指定的服务。但事实并非如此。服务是由客户端使用的，而不是定义服务的模块。更直观的名称应该是\
  \ `discovers` 或 `loads`。如果你将其定义理解为：包含 `uses` 语句的模块使用 `ServiceLoader` 类来加载此服务接口的服务提供者，那么就能正确理解其含义。除非你的客户端模块为服务加载服务提供者，否则无需在客户端模块中使用\
  \ `uses` 语句。客户端模块加载服务的情况并不常见。\n\n一个模块可以发现并加载多个服务。以下模块声明使用了两个 `uses` 语句，表明它将发现并加载由\
  \ `com.jdojo.PrimeChecker` 和 `com.jdojo.CsvParser` 接口标识的服务：\n\n```\nmodule jdojo.loader\
  \ {\n    uses com.jdojo.PrimeChecker;\n    uses com.jdojo.CsvParser;\n    // 其他模块语句写在这里\n\
  }\n```\n\n模块声明允许使用 `import` 语句。为了提高可读性，你可以将上述模块声明重写如下：\n\n```\n// 从其他包导入类型\nimport\
  \ com.jdojo.PrimeChecker;\nimport com.jdojo.CsvParser;\nmodule jdojo.loader {\n\
  \    uses PrimeChecker;\n    uses CsvParser;\n    // 其他模块语句写在这里\n}\n```\n\n`uses`\
  \ 语句中指定的服务接口可以在当前模块中声明，也可以在另一个模块中声明。如果在另一个模块中声明，则该服务接口必须对当前模块中的代码可访问；否则会发生编译时错误。例如，上述声明中\
  \ `uses` 语句使用的 `com.jdojo.CsvParser` 服务接口可以在 `jdojo.loader` 模块中声明，也可以在另一个模块（例如 `jdojo.csvUtil`）中声明。在后一种情况下，`com.jdojo.CsvParser`\
  \ 接口必须对 `jdojo.loader` 模块可访问。\n\n\n\n服务提供者的发现发生在运行时。发现服务提供者的模块通常不会（也不需要）在编译时声明对服务提供者模块的依赖，因为不可能预先知道所有提供者模块。服务发现者模块不声明对服务提供者模块依赖的另一个原因，是为了保持服务提供者与服务消费者的解耦。\n\
  \n提供服务实现\n\n一个为服务接口提供实现的模块必须包含一个 `provides` 语句。如果一个模块包含服务提供者，但其声明中没有包含 `provides`\
  \ 语句，则该服务提供者将不会通过 `ServiceLoader` 类加载。也就是说，模块声明中的 `provides` 语句是一种告诉 `ServiceLoader`\
  \ 类的方式：“嘿！我为一个服务提供了实现。当你需要那个服务时，你可以把我当作服务提供者。” `provides` 语句的语法如下：\n\n```\nprovides\
  \ <服务接口> with <实现类>;\n```\n\n这里，`provides` 子句指定了服务接口的名称，`with` 子句指定了实现服务提供者接口的类的名称。在\
  \ JDK9 中，服务提供者可以指定一个接口作为服务接口的实现。这听起来可能不正确，但事实确实如此。我在本章中提供了一个示例，其中接口充当了服务提供者实现类型。以下模块声明包含两个\
  \ `provides` 语句：\n\n```\nmodule com.jdojo.provider {\nprovides com.jdojo.PrimeChecker\
  \ with com.jdojo.impl.PrimeCheckerFactory;\nprovides com.jdojo.CsvParser with com.jdojo.impl.CsvFastParser;\n\
  // 其他模块语句写在这里\n}\n```\n\n第一个 `provides` 语句声明 `com.jdojo.impl.PrimeCheckerFactory`\
  \ 是名为 `com.jdojo.PrimeChecker` 的服务接口的一个可能实现。第二个 `provides` 语句声明 `com.jdojo.impl.CsvFastParser`\
  \ 是名为 `com.jdojo.CsvParser` 的服务接口的一个可能实现。在 JDK9 之前，`PrimeCheckerFactory` 和 `CsvParser`\
  \ 必须是类。在 JDK9 中，它们可以是类或接口。\n\n一个模块可以包含任意组合的 `uses` 和 `provides` 语句——同一个模块可以为某个服务提供实现并发现同一个服务；它可以只为一项或多项服务提供实现，或者它可以为一项服务提供实现并发现另一种类型的服务。以下模块声明发现并提供了同一服务的实现：\n\
  \n```\nmodule com.jdojo.parser {\nuses com.jdojo.XmlParser;\nprovides com.jdojo.XmlParser\
  \ with com.jdojo.xml.impl.XmlParserFactory;\n// 其他模块语句写在这里\n}\n```\n\n提示\n\n在 `provides`\
  \ 语句的 `with` 子句中指定的服务实现类/接口必须在当前模块中声明。否则，会发生编译时错误。\n\n`ServiceLoader` 类会创建服务实现的实例。当服务实现是一个接口时，它会调用该接口的\
  \ `provider()` 静态方法来获取提供者的实例。服务实现（一个类或接口）必须遵循以下规则：\n\n*   如果服务实现隐式或显式地声明了一个没有形参的公共构造方法，则该构造方法被称为提供者构造方法。\n\
  *   如果服务实现包含一个名为 `provider` 且没有形参的公共静态方法，则该方法被称为提供者方法。\n*   提供者方法的返回类型必须是服务接口类型或其子类型。\n\
  *   如果服务实现不包含提供者方法，则服务实现的类型必须是一个具有提供者构造方法的类，并且该类必须是服务接口类型或其子类型。\n\n当请求 `ServiceLoader`\
  \ 类发现并加载服务提供者时，它会检查服务实现是否包含提供者方法。如果找到了提供者方法，则该方法的返回值就是 `ServiceLoader` 类返回的服务。如果未找到提供者方法，它将使用提供者构造方法实例化服务实现。如果服务实现既不包含提供者方法也不包含提供者构造方法，则会发生编译时错误。\n\
  \n根据这些规则，可以使用 Java 接口作为服务实现。该接口应该有一个名为 `provider` 的公共静态方法，该方法返回服务接口类型的实例。\n\n以下各节将引导您完成在\
  \ JDK9 中实现服务的步骤。最后一节解释了如何使同一服务在非模块化环境中工作。\n\n定义服务接口\n\n在本节中，您将开发一个名为“质数检查器”的服务。我保持服务简单，以便您可以专注于在\
  \ JDK9 中使用服务提供者机制，而不是编写复杂的代码来实现服务功能。该服务的要求如下：\n\n*   服务应提供一个 API 来检查一个数字是否为质数。\n\
  *   客户端应该能够知道可用服务提供者的名称。服务提供者的名称将是服务提供者类或接口的完全限定名。\n*   服务应提供服务接口的默认实现。\n*   客户端应该能够在不指定服务提供者名称的情况下检索服务实例。在这种情况下，将返回默认的服务提供者。\n\
  *   客户端应该能够通过指定服务提供者的完全限定名来检索服务实例。如果指定名称的服务提供者不存在，则返回 `null`。\n\n让我们设计这个服务。服务提供的功能将由一个名为\
  \ `PrimeChecker` 的接口表示。它包含一个方法：\n\n```\npublic interface PrimeChecker {\nboolean\
  \ isPrime(long n);\n}\n```\n\n如果指定的参数是质数，`isPrime()` 方法返回 `true`，否则返回 `false`。所有服务提供者都将实现\
  \ `PrimeChecker` 接口。`PrimeChecker` 接口就是我们的服务接口（或服务类型）。\n\n获取服务提供者实例\n\n服务需要向客户端提供\
  \ API 来检索服务提供者的实例。服务在将服务提供者提供给客户端之前，需要发现并加载所有服务提供者。服务提供者使用 `ServiceLoader` 类加载。该类没有公共构造方法。您可以使用它的一个\
  \ `load()` 方法来获取其实例。您需要将服务接口的类引用指定给 `load()` 方法。`ServiceLoader` 类包含一个 `iterator()`\
  \ 方法，该方法返回一个 `Iterator`，用于遍历由此 `ServiceLoader` 加载的特定服务接口的所有服务提供者。`ServiceLoader`\
  \ 类也实现了 `Iterable` 接口，因此您也可以使用 `for-each` 语句遍历所有服务提供者。以下代码片段向您展示了如何加载并遍历 `PrimeChecker`\
  \ 的所有服务提供者实例：\n\n```\n// 加载 PrimeChecker 的服务提供者\nServiceLoader<PrimeChecker> loader\
  \ = ServiceLoader.load(PrimeChecker.class);\n// 遍历所有服务提供者实例\nIterator<PrimeChecker>\
  \ iterator = loader.iterator();\nif (iterator.hasNext()) {\nPrimeChecker checker\
  \ = iterator.next();\n// 在这里使用质数检查器...\n}\n```\n\n以下代码片段向您展示了如何在 `for-each` 语句中使用\
  \ `ServiceLoader` 实例来遍历所有服务提供者实例：\n\n```\nServiceLoader<PrimeChecker> loader = ServiceLoader.load(PrimeChecker.class);\n\
  for (PrimeChecker checker : loader) {\n// checker 是你的服务提供者实例\n}\n```\n\n\n\n有时，您需要根据提供者的类名来选择它们。\n\
  例如，您可能只想选择那些完全限定类名以 `com.jdojo` 开头的**主要**服务提供者。\n实现这一目标的典型逻辑是使用 `ServiceLoader`\
  \ 类的 `iterator()` 方法返回的迭代器。\n然而，这种方式成本高昂。迭代器在返回之前会实例化一个提供者。JDK9 为 `ServiceLoader`\
  \ 类新增了一个 `stream()` 方法：\n\n```\npublic Stream<ServiceLoader.Provider<S>> stream()\n\
  ```\n\n该方法返回一个 `ServiceProvider.Provider<S>` 接口实例的流，该接口在 `ServiceLoader` 类中声明为嵌套接口，如下所示：\n\
  \n```\npublic static interface Provider<S> extends Supplier<S> {\n    // 返回服务提供者类的\
  \ Class 引用\n    Class<?> type();\n    @Override\n    S get();\n}\n```\n\n`ServiceLoader.Provider`\
  \ 接口的一个实例代表一个服务提供者。其 `type()` 方法返回服务实现的 `Class` 对象。`get()` 方法返回服务提供者的一个实例。\n\n`ServiceLoader.Provider`\
  \ 接口有何帮助？当您使用 `stream()` 方法时，流中的每个元素都是 `ServiceLoader.Provider` 类型。您可以基于提供者的类名或类型对流进行过滤，这不会实例化提供者。您可以在过滤器中使用\
  \ `type()` 方法。当找到所需的提供者时，再调用 `get()` 方法来实例化它。这样，您只在确定需要时才实例化提供者，而不是在遍历所有提供者时。以下是使用\
  \ `ServiceLoader` 类的 `stream()` 方法的示例。它会列出所有类名以 `com.jdojo` 开头的**主要**服务提供者。\n\n\
  ```\nstatic List<PrimeChecker> startsWith(String prefix) {\n    return ServiceLoader.load(PrimeChecker.class)\n\
  \            .stream()\n            .filter((Provider<PrimeChecker> p) -> p.type().getName().startsWith(prefix))\n\
  \            .map(Provider::get)\n            .collect(Collectors.toList());\n}\n\
  ```\n\n您的素数检查器服务应该允许客户端使用服务提供者的类或接口名称来查找服务提供者。您可以使用 `ServiceLoader` 类的 `stream()`\
  \ 方法提供一个 `newInstance(String providerName)` 方法，如下所示：\n\n```\nstatic PrimeChecker\
  \ newInstance(String providerName) {\n    // 尝试查找第一个具有指定 providerName 的服务提供者\n \
  \   Optional<Provider<PrimeChecker>> optional\n            = ServiceLoader.load(PrimeChecker.class)\n\
  \            .stream()\n            .filter((Provider<PrimeChecker> p) -> p.type().getName().equals(providerName))\n\
  \            .findFirst();\n    PrimeChecker checker = null;\n    // 如果找到，则实例化该提供者\n\
  \    if (optional.isPresent()) {\n        Provider<PrimeChecker> provider = optional.get();\n\
  \        checker = provider.get();\n    }\n    return checker;\n}\n```\n\n使用 `ServiceLoader`\
  \ 类的 `Iterator` 和 `stream()` 方法来查找服务提供者之间存在巨大差异。`Iterator` 为您提供服务提供者的实例，您可以用它来确定实际服务提供者实现类的详细信息。服务提供者可以使用提供者构造器或提供者方法来提供其实例。`stream()`\
  \ 方法不会创建服务提供者实例。相反，它会查看提供者构造器和提供者方法，以提供服务提供者实现的类型。如果您使用提供者构造器，`stream()` 方法会知道服务实现的实际类名。如果您使用提供者方法，`stream()`\
  \ 方法不会（也无法）窥探提供者方法内部以查看实际的实现类类型。在这种情况下，它仅查看提供者方法的返回类型，其 `type()` 方法会返回该返回类型的 `Class`\
  \ 引用。考虑以下 `PrimeChecker` 服务类型的提供者方法实现。\n\n```\n// FasterPrimeChecker.java\npackage\
  \ com.jdojo.prime.faster;\nimport com.jdojo.prime.PrimeChecker;\npublic class FasterPrimeChecker\
  \ implements PrimeChecker {\n    // 无提供者构造器\n    private FasterPrimeChecker() {\n\
  \        // 无代码\n    }\n    // 定义一个提供者方法\n    public static PrimeChecker provider()\
  \ {\n        return new FasterPrimeChecker();\n    }\n    @Override\n    public\
  \ boolean isPrime(long n) {\n        // 更多代码在此\n    }\n}\n```\n\n假设 `FasterPrimeChecker`\
  \ 类作为一个服务提供者可用。当您使用 `ServiceLoader` 类的 `stream()` 方法时，您将获得一个针对此服务提供者的 `ServiceLoader.Provider`\
  \ 元素，其 `type()` 方法将返回 `com.jdojo.prime.PrimeChecker` 接口的 `Class` 引用，这是 `provider()`\
  \ 方法的返回类型。当您调用 `ServiceLoader.Provider` 实例的 `get()` 方法时，它将调用 `provider()` 方法并返回\
  \ `FasterPrimeChecker` 类对象的引用，因为这是从 `provider()` 方法返回的。如果您尝试编写以下代码来查找 `FasterPrimeChecker`\
  \ 提供者，将会失败：\n\n```\nString providerName = \"com.jdojo.prime.faster.FasterPrimeChecker\"\
  ;\nOptional<Provider<PrimeChecker>> optional = ServiceLoader.load(PrimeChecker.class)\n\
  \        .stream()\n        .filter((Provider<PrimeChecker> p) -> p.type().getName().equals(providerName))\n\
  \        .findFirst();\n```\n\n如果您想使用 `ServiceLoader` 类的 `stream()` 方法通过其类名查找此服务提供者，可以更改\
  \ `provider()` 方法的返回类型，如下所示：\n\n```\n// FasterPrimeChecker.java\npackage com.jdojo.prime.faster;\n\
  import com.jdojo.prime.PrimeChecker;\npublic class FasterPrimeChecker implements\
  \ PrimeChecker {\n    // 无提供者构造器\n    private FasterPrimeChecker() {\n        //\
  \ 无代码\n    }\n    // 定义一个提供者方法\n    public static FasterPrimeChecker provider()\
  \ {\n        return new FasterPrimeChecker();\n    }\n    @Override\n    public\
  \ boolean isPrime(long n) {\n        // 更多代码在此\n    }\n}\n```\n\n定义服务\n\n在 JDK8\
  \ 之前，您必须创建一个类来为您的服务提供发现、加载和检索功能。从 JDK8 开始，您可以将静态方法添加到接口中。让我们为服务接口添加两个静态方法来实现这些目的：\n\
  \n```\npublic interface PrimeChecker {\n    // 服务接口的一部分\n    boolean isPrime(long\
  \ n);\n    // 服务的一部分\n    static PrimeChecker newInstance() { /*...*/ };\n    static\
  \ PrimeChecker newInstance(String providerName) { /*...*/ };\n    static List<PrimeChecker>\
  \ providers() { /*...*/ };\n    static List<String> providerNames(/*...*/);\n}\n\
  ```\n\n`newInstance()` 方法将返回一个 `PrimeChecker` 实例，该实例是默认的服务提供者。`newInstance(String\
  \ providerName)` 方法将返回具有指定提供者名称的服务提供者实例。`providers()` 方法将返回所有提供者实例，而 `providerNames()`\
  \ 方法将返回所有提供者名称的列表。\n\n请注意，您的 `PrimeChecker` 接口将服务于两个目的：\n\n*   它作为一个服务接口，其中 `isPrime()`\
  \ 方法是该服务接口中的唯一方法。客户端将使用 `PrimeChecker` 接口作为服务类型。\n*   它作为一个服务，包含两个版本的 `newInstance()`\
  \ 方法、`providers()` 方法和 `providerNames()` 方法。\n\n此时，您可以选择创建一个单独的服务类，例如 `PrimeService`\
  \ 类，在其中包含 `newInstance()`、`providers()` 和 `providerNames()` 方法——而只在 `PrimeChecker`\
  \ 接口中保留 `isPrime()` 方法。如果您决定这样做，客户端将使用 `PrimeService` 类来获取服务提供者。\n\n清单 14-1 包含了\
  \ `PrimeChecker` 接口的完整代码。\n\n\n\n```\n// PrimeChecker.java\npackage com.jdojo.prime;\n\
  import java.util.ArrayList;\nimport java.util.List;\nimport java.util.Optional;\n\
  import java.util.ServiceLoader;\nimport java.util.ServiceLoader.Provider;\nimport\
  \ java.util.stream.Collectors;\npublic interface PrimeChecker {\nboolean isPrime(long\
  \ n);\nstatic PrimeChecker newInstance() {\n// 返回默认服务提供者\nString defaultSP = \"\
  com.jdojo.prime.impl.GenericPrimeChecker\";\nreturn newInstance(defaultSP);\n}\n\
  static PrimeChecker newInstance(String providerName) {\nOptional> optional\n= ServiceLoader.load(PrimeChecker.class)\n\
  .stream()\n.filter((Provider p) -> p.type().getName().equals(providerName))\n.findFirst();\n\
  PrimeChecker checker = null;\nif (optional.isPresent()) {\nProvider provider = optional.get();\n\
  checker = provider.get();\n}\nreturn checker;\n}\nstatic List providers() {\nList\
  \ providers = new ArrayList();\nServiceLoader loader = ServiceLoader.load(PrimeChecker.class);\n\
  for (PrimeChecker checker : loader) {\nproviders.add(checker);\n}\nreturn providers;\n\
  }\nstatic List providerNames() {\nList providers\n= ServiceLoader.load(PrimeChecker.class)\n\
  .stream()\n.map((Provider p) -> p.type().getName())\n.collect(Collectors.toList());\n\
  return providers;\n}\n}\n清单 14-1.\n名为 PrimeChecker 的服务提供者接口\n```\n\n`jdojo.prime`\
  \ 模块的声明如清单 14-2 所示。它导出了 `com.jdojo.prime` 包，因为其他服务提供者模块需要使用 `PrimeChecker` 接口。\n\
  \n```\n// module-info.java\nmodule jdojo.prime {\nexports com.jdojo.prime;\nuses\
  \ com.jdojo.prime.PrimeChecker;\n}\n清单 14-2.\njdojo.prime 模块的声明\n```\n\n你需要使用一条\
  \ `uses` 语句，并指定 `PrimeChecker` 接口的完全限定名，因为此模块中的代码将使用 `ServiceLoader` 类来加载该接口的服务提供者。`jdojo.prime`\
  \ 模块的声明尚未完成。下一节将向此模块添加一个默认服务提供者。\n\n定义服务提供者\n\n在接下来的几节中，你将创建 `PrimeChecker` 服务接口的三个服务提供者。第一个服务提供者将是你的默认质数检查服务提供者。你将把它打包到\
  \ `jdojo.prime` 模块中。你将第二个服务提供者称为更快的质数检查提供者。你将第三个服务提供者称为概率质数检查提供者。之后，你将创建一个客户端来测试该服务。你可以选择使用其中一个或全部服务提供者。\n\
  \n这些服务提供者将实现算法来检查给定数字是否为质数。理解质数的定义对你会有帮助。一个不能被 1 或自身整除的正整数称为质数。1 不是质数。质数的一些例子有 2、3、5、7\
  \ 和 11。\n\n定义默认质数服务提供者\n\n在本节中，你将定义 `PrimeChecker` 服务的默认服务提供者。为服务定义服务提供者，只需创建一个实现服务接口的类，或创建一个带有提供者方法的接口。在本例中，你将创建一个名为\
  \ `GenericPrimeChecker` 的类，它实现了 `PrimeChecker` 接口，并将包含一个提供者构造器。\n\n此服务提供者将定义在同一个模块\
  \ `jdojo.prime` 中，该模块也包含你的服务接口。清单 14-3 包含了名为 `GenericPrimeChecker` 的类的完整代码。它实现了\
  \ `PrimeChecker` 接口，因此其实例可用作服务提供者。请注意，我将此类放在了 `com.jdojo.prime.impl` 包中，只是为了将公共接口和私有实现分开。该类的\
  \ `isPrime()` 方法检查指定参数是否为质数。此方法的实现并非最优。下一个服务提供了更好的实现。\n\n```\n// GenericPrimeChecker.java\n\
  package com.jdojo.prime.impl;\nimport com.jdojo.prime.PrimeChecker;\npublic class\
  \ GenericPrimeChecker implements PrimeChecker {\n@Override\npublic boolean isPrime(long\
  \ n) {\nif (n <= 1) {\nreturn false;\n}\nif (n == 2) {\nreturn true;\n}\nif (n %\
  \ 2 == 0) {\nreturn false;\n}\nfor (long i = 3; i < n; i += 2) {\nif (n % i == 0)\
  \ {\nreturn false;\n}\n}\nreturn true;\n}\n}\n清单 14-3.\nPrimeChecker 服务接口的服务实现类\n\
  ```\n\n为了使 `GenericPrimeChecker` 类作为 `PrimeChecker` 服务接口的服务提供者，可供 `ServiceLoader`\
  \ 类使用，你需要在 `jdojo.prime` 模块的声明中包含一条 `provides` 语句。清单 14-4 包含了 `jdojo.prime` 模块声明的修改版本。\n\
  \n```\n// module-info.java\nmodule jdojo.prime {\nexports com.jdojo.prime;\nuses\
  \ com.jdojo.prime.PrimeChecker;\nprovides com.jdojo.prime.PrimeChecker\nwith com.jdojo.prime.impl.GenericPrimeChecker;\n\
  }\n清单 14-4.\njdojo.prime 模块的修改后声明\n```\n\n`provides` 语句指定此模块为 `PrimeChecker` 接口提供了一个实现，其\
  \ `with` 子句指定了实现类的名称。实现类必须满足以下条件：\n\n*   它必须是公共的具体类或公共接口。它可以是顶层类或嵌套静态类。它不能是内部类或\
  \ `abstract` 类。\n*   它必须提供提供者构造器或提供者方法。你有一个公共的无参构造器，它充当提供者构造器。`ServiceLoader` 类使用此构造器通过反射实例化服务提供者。\n\
  *   实现类的实例必须与服务提供者接口赋值兼容。\n\n如果这些条件中的任何一个不满足，则会发生编译时错误。请注意，你不需要导出包含服务实现类的 `com.jdojo.prime.impl`\
  \ 包，因为任何客户端都不应直接依赖于服务实现。客户端只需要引用服务接口，而不需要引用任何特定的服务实现类。`ServiceLoader` 类可以访问并实例化实现类，即使包含该服务实现的包未被模块导出。\n\
  \n提示\n\n如果模块使用了 `provides` 语句，指定的服务接口可以位于当前模块或另一个可访问的模块中。`with` 子句中指定的服务实现类/接口必须在当前模块中定义。\n\
  \n这就是此模块的全部内容。编译此模块并将其打包为模块化 JAR。此时，还没有什么可测试的。\n\n定义更快的质数服务提供者\n\n在本节中，你将定义 `PrimeChecker`\
  \ 服务接口的另一个服务提供者。我们称之为更快的服务提供者，因为你将实现一个更快的算法来检查质数。此服务提供者将定义在一个名为 `jdojo.prime.faster`\
  \ 的独立模块中，服务实现类称为 `FasterPrimeChecker`。\n\n\n\n清单 14-5 包含了模块声明，该声明与我们为 `jdojo.prime`\
  \ 模块编写的声明类似。这次，只有 `with` 子句中的类名发生了变化。\n\n```\n// module-info.java\nmodule jdojo.prime.faster\
  \ {\nrequires jdojo.prime;\nprovides com.jdojo.prime.PrimeChecker\nwith com.jdojo.prime.faster.FasterPrimeChecker;\n\
  }\n清单 14-5.\ncom.jdojo.prime.faster 模块的模块声明\n```\n\n`FasterPrimechecker` 类需要实现 `PrimeChecker`\
  \ 接口，该接口位于 `jdojo.prime` 模块中。需要使用 `requires` 语句来读取 `jdojo.prime` 模块。\n\n清单 14-6\
  \ 包含了 `FasterPrimeChecker` 类的代码，其 `isPrime()` 方法的执行速度比 `GenericPrimeChecker` 类的\
  \ `isPrime()` 方法更快。这次，该方法会遍历所有从 3 开始、到待检测数字的平方根结束的奇数。\n\n```\n// FasterPrimeChecker.java\n\
  package com.jdojo.prime.faster;\nimport com.jdojo.prime.PrimeChecker;\npublic class\
  \ FasterPrimeChecker implements PrimeChecker {\n// 无提供者构造器\nprivate FasterPrimeChecker()\
  \ {\n// 无代码\n}\n// 定义一个提供者方法\npublic static FasterPrimeChecker provider() {\nreturn\
  \ new FasterPrimeChecker();\n}\n@Override\npublic boolean isPrime(long n) {\nif\
  \ (n <= 1) {\nreturn false;\n}\nif (n == 2) {\nreturn true;\n}\nif (n % 2 == 0)\
  \ {\nreturn false;\n}\nlong limit = (long) Math.sqrt(n);\nfor (long i = 3; i <=\
  \ limit; i += 2) {\nif (n % i == 0) {\nreturn false;\n}\n}\nreturn true;\n}\n}\n\
  清单 14-6.\nPrimeChecker 服务接口的一个实现\n```\n\n请注意清单 14-3 和清单 14-6 中 `GenericPrimeChecker`\
  \ 类与 `FasterPrimeChecker` 类的区别。`GenericPrimeChecker` 类包含一个默认构造器，该构造器充当提供者构造器。它不包含提供者方法。`FasterPrimeChecker`\
  \ 类将无参构造器设为私有，这使得该构造器不符合提供者构造器的条件。`FasterPrimeChecker` 类转而提供了提供者方法，声明如下：\n\n```\n\
  public static FasterPrimeChecker provider() { /*...*/ }\n```\n\n当 `ServiceLoader`\
  \ 类需要实例化更快的素数服务时，它会调用此方法。该方法非常简单——它创建并返回一个 `FasterPrimeChecker` 类的对象。\n\n目前，这个模块所需的内容就是这些。要编译此模块，需要将\
  \ `jdojo.prime` 模块放在模块路径中。将此模块编译并打包成一个模块化 JAR。目前，还没有什么需要测试的。\n\n定义概率素数服务提供者\n\n\
  在本节中，我将向你展示如何将 Java 接口用作服务实现。你将定义 `PrimeChecker` 服务接口的另一个服务提供者。我们称之为概率素数服务提供者，因为它会告诉你一个数字可能是素数。该服务提供者将定义在一个名为\
  \ `jdojo.prime.probable` 的独立模块中，服务实现接口称为 `ProbablePrimeChecker`。\n\n该服务用于检查素数。`java.math.BigInteger`\
  \ 类包含一个名为 `isProbablePrime(int certainty)` 的方法。如果该方法返回 `true`，则该数字可能是素数。如果该方法返回\
  \ `false`，则该数字肯定不是素数。`certainty` 参数决定了该方法在返回 `true` 之前确保该数字是素数的程度。`certainty` 参数的值越高，此方法产生的开销就越大，并且当方法返回\
  \ `true` 时该数字是素数的概率就越高。\n\n清单 14-7 包含了模块声明，该声明与我们之前为 `jdojo.prime.faster` 模块编写的声明类似。这次，只有\
  \ `with` 子句中的类/接口名发生了变化。清单 14-8 包含了 `ProbablePrimeChecker` 类的代码。\n\n```\n// module-info.java\n\
  module jdojo.prime.probable {\nrequires jdojo.prime;\nprovides com.jdojo.prime.PrimeChecker\n\
  with com.jdojo.prime.probable.ProbablePrimeChecker;\n}\n清单 14-7.\ncom.jdojo.prime.probable\
  \ 模块的模块声明\n```\n\n```\n// ProbablePrimeChecker.java\npackage com.jdojo.prime.probable;\n\
  import com.jdojo.prime.PrimeChecker;\nimport java.math.BigInteger;\npublic interface\
  \ ProbablePrimeChecker extends PrimeChecker {\n// 一个提供者方法\npublic static ProbablePrimeChecker\
  \ provider() {\nint certainty = 1000;\nProbablePrimeChecker checker = n -> BigInteger.valueOf(n).isProbablePrime(certainty);\n\
  return checker;\n}\n}\n清单 14-8.\nPrimeChecker 服务接口的一个实现接口\n```\n\n`ProbablePrimeChecker`\
  \ 接口扩展了 `PrimeChecker` 接口，并且只包含一个方法，即提供者方法：\n\n```\npublic static ProbablePrimeChecker\
  \ provider() {/*...*/}\n```\n\n当 `ServiceLoader` 类需要实例化概率素数服务时，它会调用此方法。该方法非常简单——它创建并返回一个\
  \ `ProbablePrimeChecker` 接口的实例。它使用 lambda 表达式来创建提供者。`isPrime()` 方法使用 `BigInteger`\
  \ 类来检查该数字是否为概率素数。\n\n清单 14-9 包含了 `ProbablePrimeChecker` 接口作为服务提供者的另一种声明。\n\n```\n\
  // ProbablePrimeChecker.java\npackage com.jdojo.prime.probable;\nimport com.jdojo.prime.PrimeChecker;\n\
  import java.math.BigInteger;\npublic interface ProbablePrimeChecker {\n// 一个提供者方法\n\
  public static PrimeChecker provider() {\nint certainty = 1000;\nPrimeChecker checker\
  \ = n -> BigInteger.valueOf(n).isProbablePrime(certainty);\nreturn checker;\n}\n\
  }\n清单 14-9.\nProbablePrimechecker 接口的另一种声明\n```\n\n这次，该接口没有扩展 `PrimeChecker` 接口。要成为服务实现，其提供者方法必须返回服务接口（`PrimeChecker`\
  \ 接口）或其子类型的实例。通过将提供者方法的返回类型声明为 `PrimeChecker`，你已满足此要求。如清单 14-9 所示声明 `ProbablePrimeChecker`\
  \ 接口有一个缺点：在不实例化服务提供者的情况下，你无法通过其类名 `com.jdojo.probable.ProbablePrimeChecker` 使用 `ServiceLoader`\
  \ 类的 `stream()` 方法找到此服务提供者。`ServiceLoader.Provider` 的 `type()` 方法将返回 `com.jdojo.prime.PrimeChecker`\
  \ 接口的 `Class` 引用，该接口是 `provider()` 方法的返回类型。我使用此接口的声明，如清单 14-8 所示。\n\n目前，这个模块所需的内容就是这些。要编译此模块，你需要将\
  \ `jdojo.prime` 模块添加到模块路径中。将此模块编译并打包成一个模块化 JAR。目前，还没有什么需要测试的。\n\n测试素数服务\n\n在本节中，你将通过创建一个客户端应用程序来测试该服务，该应用程序将定义在一个名为\
  \ `jdojo.prime.client` 的独立模块中。清单 14-10 包含了模块声明。\n\n```\n// module-info.java\nmodule\
  \ jdojo.prime.client {\nrequires jdojo.prime;\n}\n清单 14-10.\njdojo.prime.client\
  \ 模块的声明\n```\n\n\n\n客户端模块只需了解服务接口。在本例中，`jdojo.prime` 模块定义了服务接口。因此，客户端模块仅读取服务接口模块，无需其他操作。在实际应用中，客户端模块会比这复杂得多，可能还需要读取其他模块。图\
