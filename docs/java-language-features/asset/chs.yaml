  .filter(Person::isFemale)\n.forEach(p -> p.setIncome(p.getIncome() * 1.10));\n//\
  \ 再次打印列表\nSystem.out.println(\"After increasing the income: \" + persons);\n}\n\
  }\n清单 13-7.\n在人员列表上应用 ForEach 操作\n```\n\n```\nBefore increasing the income: [(1,\
