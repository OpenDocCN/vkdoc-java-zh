  \ null\ndeque.pollFirst(): null\ndeque.getFirst(): Deque 为空。\ndeque.removeFirst():\
  \ Deque 为空。\n```\n\n清单 12-20\n演示了如何将 `Deque` 用作栈（或 `LIFO` 队列）。\n\n```\n// DequeAsStack.java\n\
