  \ `n` 个元素。这是一个中间操作。以下代码片段使用此操作打印五个素数，同时跳过前 100 个素数：\n\n```\nStream.iterate(2L, PrimeUtil::next)\n\
  .skip(100)\n.limit(5)\n.forEach(System.out::println);\n```\n\n```\n\n```\n\n运用你学到的关于流的所有知识，你能编写一个流管道来打印大于\
  \ 3000 的五个素数吗？这留给读者作为练习。\n\n使用 generate() 方法\n\n`generate(Supplier<? extends T>\
  \ s)` 方法使用指定的 `Supplier` 来生成一个无限的无序顺序流。以下代码片段使用 `Math` 类的 `random()` 静态方法打印五个大于等于\
  \ 0.0 且小于 1.0 的随机数。你可能会得到不同的输出。\n\n```\nStream.generate(Math::random)\n.limit(5)\n\
  .forEach(System.out::println);\n```\n\n```\n0.05958352209327644\n0.8122226657626394\n\
  0.5073323815997652\n0.9327951597282766\n0.4314430923877808\n```\n\n如果你想使用 `generate()`\
  \ 方法生成一个无限流，其中下一个元素是基于前一个元素的值生成的，你需要使用一个存储了最后生成元素的 `Supplier`。请注意，`PrimeUtil` 对象可以充当\
  \ `Supplier`，其实例方法 `next()` 会记住最后生成的素数。以下代码片段在跳过前 100 个素数后打印五个素数：\n\n```\nStream.generate(new\
  \ PrimeUtil()::next)\n.skip(100)\n.limit(5)\n.forEach(System.out::println);\n```\n\
  \n```\n\n```\n\nJava 8 在 `java.util` 包中的 `Random` 类中添加了许多用于处理流的方法。像 `ints()`、`longs()`\
  \ 和 `doubles()` 这样的方法分别返回无限的 `IntStream`、`LongStream` 和 `DoubleStream`，其中包含 `int`、`long`\
  \ 和 `double` 类型的随机数。以下代码片段从 `Random` 类的 `ints()` 方法返回的 `IntStream` 中打印五个随机的 `int`\
  \ 值：\n\n```\n// 打印五个随机整数\nnew Random().ints()\n.limit(5)\n.forEach(System.out::println);\n\
  ```\n\n```\n\n```\n\n每次运行代码时，你可能会得到不同的输出。你可以使用 `Random` 类的 `nextInt()` 方法作为 `generate()`\
