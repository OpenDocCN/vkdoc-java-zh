  文件是否存在: true\n\n清单 7-3.\n创建、删除和重命名文件\n```\n\n处理文件属性\n\n`File` 类包含一些方法，可以让你以有限的方式获取/设置文件和目录的属性。你可以分别使用\
  \ `setReadOnly()`、`setReadable()`、`setWritable()` 和 `setExecutable()` 方法将文件设置为只读、可读、可写和可执行。你可以使用\
  \ `lastModified()` 和 `setLastModified()` 方法来获取和设置文件的最后修改日期和时间。你可以使用 `isHidden()`\
  \ 方法检查文件是否隐藏。请注意，`File` 类不包含 `setHidden()` 方法，因为隐藏文件的定义是平台相关的。\n\n提示\n\n我将在第 10\
  \ 章中讨论如何使用新的输入/输出 2 (NIO.2) API 处理文件属性。NIO.2 对文件属性提供了广泛的支持。\n\n复制文件\n\n`File` 类没有提供复制文件的方法。要复制文件，你必须创建一个新文件，从原始文件中读取内容，并将其写入新文件。我将在本章后面讨论输入和输出流之后，再讨论如何将一个文件的内容复制到另一个文件中。Java\
  \ 7 中新增的 NIO 2.0 API 提供了一种直接复制文件内容及其属性的方法。更多详细信息，请参阅第 10 章。\n\n了解文件大小\n\n你可以使用 `File`\
  \ 类的 `length()` 方法获取文件的大小（以字节为单位）。\n\n```\nFile myFile = new File(\"myfile.txt\"\
  );\nlong fileLength = myFile.length();\n```\n\n如果 `File` 对象表示一个不存在的文件，`length()`\
  \ 方法返回零。如果它是一个目录名，则返回值未指定。请注意，`length()` 方法的返回类型是 `long`，而不是 `int`。\n\n列出目录和文件\n\
  \n你可以通过使用 `File` 类的 `listRoots()` 静态方法来获取文件系统中可用根目录的列表。它返回一个 `File` 对象数组。\n\n```\n\
  // 获取所有根目录的列表\nFile[] roots = File.listRoots();\n```\n\n根目录在不同平台上有所不同。在 Windows\
  \ 上，每个驱动器都有一个根目录（例如 `C:\\`、`A:\\`、`D:\\` 等）。在 UNIX 上，有一个由斜杠 (`/`) 表示的单一根目录。\n\n\
  清单 7-4 演示了如何获取机器上的根目录。此处显示的是在 Windows 上运行此程序时的输出。在你的机器上运行此程序时，你可能会得到不同的输出。输出将取决于操作系统以及连接到机器的驱动器。\n\
