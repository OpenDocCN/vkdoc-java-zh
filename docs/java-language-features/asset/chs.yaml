  \nNIO.2 提供了一个监视服务，用于监视目录内容的变化。Java 程序向监视服务注册一个目录，以便在目录中发生特定事件时（例如创建新文件/目录、文件内容更改、文件删除等）得到通知。当注册的目录上发生感兴趣的事件时，监视服务会通知\
