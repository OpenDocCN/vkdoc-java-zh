  ```\n\n你可以在 NetBeans 中运行 `LayerTest`\n类，或者使用以下命令。你可能会得到不同的输出。\n层名是该层中所有模块的列表，由 `ModuleLayer`\n\
  类的 `toString()` 方法返回。\n\n```\nC:\\>java --module-path jdojo.layer.v1\\dist;jdojo.layer.test\\\
  dist\n--module jdojo.layer.test/com.jdojo.layer.test.LayerTest\n```\n\n前面的命令在模块路径中使用了相对路径，例如\n\
  `jdojo.layer.v1`。\n如果你已将本书的源代码解压到 Windows 的 `C:\\`\n目录中，这些路径将有效。如果你将源代码解压到了不同的目录，请替换模块路径的值。\n\
  \n总结\n\n模块 API 由类和接口组成，它们允许你以编程方式访问模块。使用该 API，你可以以编程方式读取/修改/构建模块描述符、加载模块、读取模块内容、创建层等。模块\
  \ API 很小，包含大约 15 个类和接口，分布在两个包中：`java.lang` 和 `java.lang.module`。`Module`、`ModuleLayer`\
  \ 和 `LayerInstantiationException`\n类位于 `java.lang` 包中，其余类位于 `java.lang.module` 包中。\n\
  \n\n\n`Module` 类的实例代表一个运行时模块。加载到 JVM 中的每个类型都属于某个模块。JDK9 在 `Class` 类中添加了一个名为 `getModule()`\
  \ 的方法；它返回该类所属的模块。\n\n`ModuleDescriptor` 类的实例代表一个模块定义，它由模块声明创建——通常来自 `module-info.class`\
  \ 文件。也可以使用 `ModuleDescriptor.Builder` 类动态创建模块描述符。模块声明可以通过命令行选项（如 `--add-reads`、`--add-exports`\
  \ 和 `--add-opens`）以及 `Module` 类中的方法（如 `addReads()`、`addOpens()` 和 `addExports()`）进行增强。`ModuleDescriptor`\
  \ 代表模块声明时存在的模块描述符，而不是增强后的模块描述符。`Module` 类的 `getDescriptor()` 方法返回一个 `ModuleDescriptor`。`ModuleDescriptor`\
  \ 是不可变的。未命名模块没有模块描述符。对于未命名模块，`Module` 类的 `getDescriptor()` 方法返回 `null`。`ModuleDescriptor`\
  \ 类包含多个嵌套类，例如 `ModuleDescriptor.Requires` 嵌套类；每个嵌套类代表程序中的一个模块语句。\n\n你可以使用命令行选项和通过\
  \ Module API 以编程方式增强模块描述符。你可以将对模块属性的所有查询分为两类：模块加载后可能发生变化的查询，以及模块加载后不会发生变化的查询。`Module`\
  \ 类包含第一类查询的方法，`ModuleDescriptor` 类包含第二类查询的方法。\n\n你可以在运行时使用 `Module` 类中的方法之一更新模块的定义：`addExports()`、`addOpens()`、`addReads()`\
  \ 和 `addUses()`。\n\n访问模块中资源的规则有点复杂。默认情况下，命名模块中的资源是封装的，除非包含资源的包已向访问该资源的模块开放。命名模块中，包含在名称不是有效\
  \ Java 包名的目录中的资源，对所有其他模块都是可访问的。模块中的类文件（`.class` 文件）始终对所有其他模块可访问。`Class` 类中的资源查找方法仅在加载\
  \ `Class` 对象的模块中查找资源。使用 `Module` 类中的 `getResourceAsStream()` 方法访问其他模块中的资源。\n\n你可以在模块声明上使用注解。`java.lang.annotation.ElementType`\
  \ 枚举有一个名为 `MODULE` 的新值。你可以在注解声明中使用 `MODULE` 作为目标类型，这允许该注解类型用于模块。在 Java 9 中，两个注解——`java.lang.Deprecated`\
  \ 和 `java.lang.SuppressWarnings`——已被更新，可用于模块声明。在模块上使用这些注解仅影响模块声明，而不影响模块中包含的类型。\n\
  \n模块被组织成层。一个层是一组已解析的模块，并带有一个函数，该函数将每个模块映射到一个负责加载该模块中所有类型的类加载器。这组已解析的模块称为配置。层是分层组织的。除了空层之外，一个层至少有一个父层。顾名思义，空层不包含任何模块，主要作为引导层的父层存在。引导层由\
  \ JVM 在启动时通过针对一组可观察模块解析应用程序的初始模块（根模块）来创建。你可以创建自定义层。层允许将同一模块的多个版本加载到不同的层中，并在同一个 JVM\
  \ 中使用。\n\n问题与练习\n\n1.  运行时代表模块的类的完全限定名是什么？\n\n2.  编写代码以获取名为 `Person` 的类的模块引用。\n\n\
  3.  如果你有一个名为 `Person` 的类，如何知道这个类是命名模块的成员还是未命名模块的成员？\n\n4.  `ModuleDescriptor` 类的实例代表什么？`ModuleDescriptor`\
  \ 类的实例是不可变的吗？\n\n5.  你能直接从 `module-info.class` 文件获取 `ModuleDescriptor` 吗？如果你的答案是肯定的，请说明如何操作。\n\
  \n6.  你能为未命名模块获取 `ModuleDescriptor` 吗？\n\n7.  说出其实例代表模块声明中 `exports`、`opens`、`provides`\
  \ 和 `requires` 语句的类名。\n\n8.  `ModuleDescriptor::packages()` 和 `Module::getPackages()`\
  \ 方法有什么区别？这两个方法都返回一组包名。\n\n9.  如何检查一个模块是将包导出给所有其他模块还是导出给特定模块？\n\n10. 如何知道一个模块是否是自动模块？\n\
  \n11. 假设有一个名为 `M` 的模块，它包含一个名为 `P` 的包，但未将该包导出给任何其他模块。另一个名为 `N` 的模块中的代码能否在运行时将模块 `M`\
  \ 中的包 `P` 导出给模块 `N`？\n\n12. 假设有一个名为 `M` 的模块，它包含一个名为 `Q` 的包，并向模块 `N` 开放了该包。模块 `N`\
  \ 中的代码能否在运行时将模块 `M` 中的包 `Q` 开放给另一个模块 `T`？\n\n13. 如果一个名为 `M` 的模块在名为 `P` 的包中包含资源。模块\
  \ `M` 如何使这些资源对所有其他模块可用？\n\n14. 如果一个名为 `M` 的模块在名为 `META-INF` 的目录中包含资源，其他模块可以访问这些资源吗？\n\
  \n15. 在 JDK9 中，访问 Java 运行时映像中的资源必须使用的方案名称是什么？\n\n16. 写出在 JDK9 中从运行时映像访问 `Object.class`\
  \ 文件需要使用的 URL。\n\n17. 你能在模块声明上使用注解吗？\n\n18. 以下陈述是真还是假？\n\n当一个模块被弃用时，在 requires、exports\
  \ 和 opens 语句中使用该模块会导致发出警告。\n\n19. 你能在模块声明的 `requires`、`exports` 和 `opens` 语句上使用注解吗？\n\
  \n20. 什么是模块层？层、配置和类加载器之间如何关联？\n\n21. `ModuleFinder` 接口的实例和 `ModuleReference` 类的实例有什么用途？\n\
  \n22. 说出其实例代表模块层中配置的类名。一个配置可以有多个父配置吗？\n\n23. 一个给定的模块层可以有多少个父层？引导层的父层是什么？\n\n24.\
  \ 编写一个程序，打印加载到引导层中的所有模块的名称。\n\n16. 打破模块封装\n\n在本章中，你将学习：\n\n*   打破模块封装意味着什么\n\n*\
  \   如何使用 `--add-exports` 命令行选项以及可执行 JAR 的 `MANIFEST.MF` 文件导出模块的非导出包\n\n*   如何使用\
  \ `--add-opens` 命令行选项以及可执行 JAR 的 `MANIFEST.MF` 文件开放模块的非开放包\n\n*   如何使用 `--add-reads`\
  \ 命令行选项增加模块的可读性\n\n*   如何使用 `--illegal-access` 命令行选项通过深度反射访问 JDK 内部 API\n\n什么是打破模块封装？\n\
  \n\n\nJDK9 的主要目标之一是将类型和资源封装在模块中，并且只导出那些公共类型旨在供其他模块访问的包。有时，您可能需要打破模块指定的封装，以便进行白盒测试、使用不受支持的\
  \ JDK 内部 API 或使用第三方库。这可以通过在编译时和运行时使用非标准命令行选项来实现。提供这些选项的另一个原因是向后兼容性。并非所有现有应用程序都会完全迁移到\
  \ JDK9 并实现模块化。如果这些应用程序需要使用曾经是公共的、但在 JDK9 中已被封装的 JDK API 或库提供的 API，那么它们有一种方法可以继续工作。其中一些选项具有相应的属性，可以添加到可执行\
  \ JAR 的 `MANIFEST.MF` 文件中，以避免使用命令行选项。\n\n提示\n\n每个用于打破模块封装的命令行选项也都可以通过 Module API\
  \ 以编程方式支持，这将在第 15 章中详细介绍。\n\n尽管听起来这些选项的作用与 JDK9 之前相同，但在无限制地访问 JDK 内部 API 时，需要谨慎。如果模块中的某个包未被导出或开放，这意味着模块的设计者不打算让这些包在模块外部使用。这些包可能会被修改，甚至在没有通知的情况下从模块中移除。如果您仍然通过使用命令行选项导出或开放这些包来使用它们，那么您将承担未来应用程序可能因此崩溃的风险！\n\
  \n命令行选项\n\n模块声明中的三个模块语句允许模块封装其类型和资源，并允许其他模块使用第一个模块中的封装类型和资源。这些语句是 `exports`、`opens`\
  \ 和 `requires`。每个模块语句都有一个对应的命令行选项。对于 `exports` 和 `opens` 语句，存在相应的属性，可用于可执行 JAR 的清单文件中。表\
  \ 16-1 列出了这些语句以及对应的命令行选项和清单属性。`--illegal-access` 命令行选项允许您处理对 JDK 内部 API 的非法访问。我将在以下各节中详细描述这些选项。\n\
  \n表 16-1. 模块语句及其对应的命令行选项和清单属性\n\n| 模块语句 | 命令行选项 | 清单属性 |\n| --- | --- | --- |\n\
  | `exports` | `--add-exports` | `Add-Exports` |\n| `opens` | `--add-opens` | `Add-Opens`\
  \ |\n| `requires` | `--add-reads` | （无可用属性） |\n| （无可用语句） | `--illegal-access` |\
  \ （无可用属性） |\n\n提示\n\n您可以在同一条命令中多次使用 `--add-exports`、`--add-opens` 和 `--add-reads`\
  \ 命令行选项。\n\n--add-exports 选项\n\n模块声明中的 `exports` 语句将模块中的包导出给所有或部分其他模块，以便这些模块可以使用导出包中的公共\
  \ API。如果某个模块未导出某个包，您可以使用 `--add-exports` 命令行选项将其导出。其语法如下：\n\n```\n--add-exports\
  \ <源模块>/<包>=<目标模块列表>\n```\n\n这里，`<源模块>` 是将 `<包>` 导出给 `<目标模块列表>` 的模块，`<目标模块列表>` 是一个以逗号分隔的目标模块名称列表。这相当于在\
  \ `<源模块>` 的声明中添加一个限定的 `exports` 语句：\n\n```\nmodule <源模块> {\n    exports <包> to <目标模块>;\n\
  }\n```\n\n提示\n\n如果目标模块列表是特殊值 `ALL-UNNAMED`，对于 `--add-exports` 选项，该模块的包将被导出给所有未命名模块。`--add-exports`\
  \ 选项可用于 `java` 和 `javac` 命令。\n\n以下选项将 `java.base` 模块中的 `sun.util.logging` 包导出给 `jdojo.test`\
  \ 和 `jdojo.prime` 模块：\n\n```\n--add-exports java.base/sun.util.logging=jdojo.test,jdojo.prime\n\
  ```\n\n以下选项将 `java.base` 模块中的 `sun.util.logging` 包导出给所有未命名模块：\n\n```\n--add-exports\
  \ java.base/sun.util.logging=ALL-UNNAMED\n```\n\n--add-opens 选项\n\n模块声明中的 `opens`\
  \ 语句将模块中的包开放给所有或部分其他模块，以便这些模块可以在运行时使用深度反射来访问开放包中的所有成员类型。如果模块的某个包未开放，您可以使用 `--add-opens`\
  \ 命令行选项将其开放。其语法如下：\n\n```\n--add-opens <源模块>/<包>=<目标模块列表>\n```\n\n这里，`<源模块>` 是将\
  \ `<包>` 开放给 `<目标模块列表>` 的模块，`<目标模块列表>` 是一个以逗号分隔的目标模块名称列表。这相当于在 `<源模块>` 的声明中添加一个限定的\
  \ `opens` 语句：\n\n```\nmodule <源模块> {\n    opens <包> to <目标模块>;\n}\n```\n\n提示\n\n\
  如果目标模块列表是特殊值 `ALL-UNNAMED`，对于 `--add-opens` 选项，该模块的包将对所有未命名模块开放。`--add-opens` 选项可用于\
  \ `java` 命令。\n\n以下选项将 `java.base` 模块中的 `sun.util.logging` 包开放给 `jdojo.test` 和 `jdojo.prime`\
  \ 模块：\n\n```\n--add-opens java.base/sun.util.logging=jdojo.test,jdojo.prime\n```\n\
  \n以下选项将 `java.base` 模块中的 `sun.util.logging` 包开放给所有未命名模块：\n\n```\n--add-opens java.base/sun.util.logging=ALL-UNNAMED\n\
  ```\n\n--add-reads 选项\n\n`--add-reads` 选项并非关于打破封装。相反，它是关于增加模块的可读性。在测试和调试期间，有时一个模块需要读取另一个模块，即使第一个模块并不依赖于第二个模块。模块声明中的\
  \ `requires` 语句用于声明当前模块对另一个模块的依赖。您可以使用 `--add-reads` 命令行选项从一个模块向另一个模块添加可读性边。这相当于在第一个模块中添加一个\
  \ `requires` 语句。其语法如下：\n\n```\n--add-reads <源模块>=<目标模块列表>\n```\n\n这里，`<源模块>` 是其定义被更新以读取\
  \ `<目标模块列表>` 中指定模块列表的模块，`<目标模块列表>` 是一个以逗号分隔的目标模块名称列表。这相当于为源模块添加针对目标模块列表中每个模块的 `requires`\
  \ 语句：\n\n```\nmodule <源模块> {\n    requires <目标模块 1>;\n    requires <目标模块 2>;\n}\n\
  ```\n\n提示\n\n如果目标模块列表是特殊值 `ALL-UNNAMED`，对于 `--add-reads` 选项，源模块将读取所有未命名模块。这是命名模块读取未命名模块的唯一方式。在命名模块声明中，没有等效的模块语句可以用来读取未命名模块。此选项可用于\
  \ `java` 和 `javac` 命令。\n\n以下选项为 `jdojo.common` 模块添加一个读取边，使其能够读取 `jdk.accessibility`\
  \ 模块：\n\n```\n--add-reads jdojo.common=jdk.accessibility\n```\n\n--illegal-access\
  \ 选项\n\n许多在 JDK9 之前编写的应用程序可能不会很快实现模块化。为了利用最新的 JDK，它们可能会在不进行模块化的情况下迁移到 JDK9。此类应用程序将从类路径运行。这些应用程序之前被允许使用深度反射访问\
  \ JDK 内部 API 的非公共成员。为了简化这些应用程序的迁移，JDK9 默认允许对 JDK9 模块进行深度反射，这打破了 JDK 模块的封装。允许这样做是为了帮助\
  \ Java 社区更快地适应 JDK9。允许这样做的另一个原因是向后兼容性。对 JDK 内部执行深度反射的应用程序将继续在 JDK9 中工作，因为 Java 社区没有提前收到通知，即对\
  \ JDK 内部的深度反射将在 JDK9 中停止工作。\n\n\n\nJDK9 为 `java` 命令提供了 `--illegal-access` 选项。顾名思义，它用于处理任何未命名模块（类路径上的代码）通过深度反射对\
  \ JDK 中任何命名模块内类型成员的非法访问。其语法如下：\n\n```\njava --illegal-access= \n```\n\n该选项接受四个参数之一：`permit`、`deny`、`warn`\
  \ 和 `debug`。默认值为 `permit`，这意味着不指定 `--illegal-access` 选项等同于 `--illegal-access=permit`。也就是说，默认情况下，JDK\
  \ 中所有显式模块内的所有包都对所有未命名模块中的代码开放。执行非法反射访问的代码迟早应该被修复。为了帮助识别此类违规代码，JDK9 会在首次发生此类非法访问时向标准错误输出一条警告。你无法抑制此警告。\n\
  \n`deny` 参数会禁用所有通过深度反射对 JDK 内部类型成员的非法访问，除非使用其他选项（如 `--add-opens`）允许此类访问。在未来的版本中，`deny`\
  \ 将成为默认模式。也就是说，在未来的版本中，默认情况下将禁用非法反射访问，你需要显式使用 `--illegal-access=permit` 来启用非法反射访问。\n\
  \n`warn` 参数会针对每次非法反射访问发出警告。这有助于识别现有应用程序中所有使用非法反射访问的代码。\n\n`debug` 参数会针对每次非法反射访问发出警告并打印堆栈跟踪。这有助于识别现有应用程序中所有使用非法反射访问的代码。\n\
  \n`--illegal-access` 选项不允许命名模块中的代码对其他命名模块中的类型成员进行非法访问。在这种情况下，要执行非法反射访问，你可以将此选项与\
  \ `--add-exports`、`--add-opens` 和 `--add-reads` 选项结合使用。\n\n提示\n\n`--illegal-access`\
  \ 选项将在未来的版本中被移除。首先，其默认模式将从 `permit` 更改为 `deny`，然后该选项本身将被移除。需要注意的是，此选项仅用于允许类路径上的代码非法访问\
  \ JDK 内部。此选项不允许非法访问非 JDK 模块的成员；如果需要非法访问非 JDK 模块的成员，你必须使用 `--add-opens` 选项或打开模块/包。\n\
  \n我将在下一节中提供一个使用所有这些选项来打破模块封装的示例。\n\n一个示例\n\n让我们通过几个打破模块封装的示例来逐步了解。我使用简单的示例，但它们足以演示所有可用于打破模块封装的概念和命令行选项。\n\
  \n你在本系列第一卷中创建了 `jdojo.intro` 模块作为你的第一个模块。它包含 `com.jdojo.intro` 包中的一个 `Welcome` 类。该模块未导出该包，因此\
  \ `Welcome` 类被封装，无法在模块外部访问。清单 16-1 和清单 16-2 分别包含了 `jdojo.intro` 模块及其 `Welcome` 类的声明。\n\
  \n```\n// module-info.java\nmodule jdojo.intro {\n}\n清单 16-1. 名为 jdojo.intro 的模块的声明\n\
  ```\n\n```\n// Welcome.java\npackage com.jdojo.intro;\npublic class Welcome {\n\
  public static void main(String[] args) {\nSystem.out.println(\"Welcome to Java 9!\"\
