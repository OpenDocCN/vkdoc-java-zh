  System.out.println(\"Map Size: \" + map.size());\nSystem.out.println(\"Map is empty:\
  \ \" + map.isEmpty());\nSystem.out.println(\"Map contains Donna key: \" + map.containsKey(\"\
  Donna\"));\nSystem.out.println(\"Donna Phone: \" + donnaPhone);\nSystem.out.println(\"\
  Donna key is removed: \" + map.remove(\"Donna\"));\n}\n}\n清单 12-29.\n使用 Map\n```\n\
  \n```\nMap: {Donna=(205)678-9823, Ken=(205)678-9823, John=(342)113-9878, Richard=(245)890-9045}\n\
  Map Size: 4\nMap is empty: false\nMap contains Donna key: true\nDonna Phone: (205)678-9823\n\
  Donna key is removed: (205)678-9823\nRemoved all entries from the map.\nMap: {}\n\
  Map Size: 0\nMap is empty: true\nMap contains Donna key: false\nDonna Phone: null\n\
  Donna key is removed: null\n```\n\n`WeakHashMap`\n类是`Map`接口的另一个实现。正如\n类名所示，它包含弱键。当除了映射之外没有对键的引用时，键将成为垃圾回收的候选对象。\n\
  如果一个键被垃圾回收，其关联的条目将从`Map`中移除。当你\n想要维护一个键值对缓存，并且不介意你的\n键值对被垃圾回收器从`Map`中移除时，你可以使用`WeakHashMap`。`WeakHashMap`允许\n\
  一个`null`键和\n多个`null`\n值。有关使用`WeakHashMap`类的完整示例，请参考第 11 章。\n\n有时你想迭代`Map`的键、值或条目。映射的`keySet()`、`values()`和`entrySet()`方法分别返回一个键的`Set`、一个值的`Collection`\n\
  和一个条目的`Set`。\n迭代`Set`或`Collection`的元素与“遍历集合中的元素”部分中描述的方式相同。\n以下代码片段展示了如何打印映射的所有键：\n\
  \n```\nMap map = new HashMap();\nmap.put(\"John\", \"(342)113-9878\");\nmap.put(\"\
  Richard\", \"(245)890-9045\");\nmap.put(\"Donna\", \"(205)678-9823\");\nmap.put(\"\
  Ken\", \"(205)678-9823\");\n// Get the set of keys\nSet keys = map.keySet();\n//\
  \ Print all keys using the forEach() method.\n// You can also use a for-each loop,\
  \ an iterator, etc. to do the same.\nkeys.forEach(System.out::println);\n```\n\n\
  ```\nDonna\nKen\nJohn\nRichard\n```\n\n映射中的每个键值对\n被称为一个条目。一个条目由\n`Map.Entry<K,V>`接口的一个实例表示。\n\
  `Map.Entry<K,V>`\n是`Map<K,V>`接口的一个嵌套静态接口。它有三个常用的方法，分别是`getKey()`、`getValue()`和`setValue()`，它们\n\
  分别返回条目的键、返回条目的值以及设置\n条目中的新值。对`Map`的条目集进行典型迭代的\n写法如下：\n\n```\nMap map = new HashMap();\n\
  map.put(\"John\", \"(342)113-9878\");\nmap.put(\"Richard\", \"(245)890-9045\");\n\
  map.put(\"Donna\", \"(205)678-9823\");\nmap.put(\"Ken\", \"(205)678-9823\");\n//\
  \ Get the entry Set\nSet> entries = map.entrySet();\n// Print all key-value pairs\
  \ using the forEach() method of the Collection interface.\n// You can use a for-each\
  \ loop, an iterator, etc. to do the same.\nentries.forEach((Map.Entry entry) ->\
  \ {\nString key = entry.getKey();\nString value = entry.getValue();\nSystem.out.println(\"\
  key=\" + key + \", value=\" + value);\n});\n```\n\n```\nkey=Donna, value=(205)678-9823\n\
  key=Ken, value=(205)678-9823\nkey=John, value=(342)113-9878\nkey=Richard, value=(245)890-9045\n\
  ```\n\nJava 8 向`Map<K,V>`接口添加了一个`forEach(BiConsumer<? super K,? super V> action)`方法，它允许你以更简洁的方式迭代映射中的所有条目。\n\
  该方法接受一个`BiConsumer`实例，\n其第一个参数是键，第二个参数是映射中当前条目的值。你可以将前面的代码片段重写\n如下：\n\n```\nMap\
  \ map = new HashMap();\nmap.put(\"John\", \"(342)113-9878\");\nmap.put(\"Richard\"\
  , \"(245)890-9045\");\nmap.put(\"Donna\", \"(205)678-9823\");\nmap.put(\"Ken\",\
  \ \"(205)678-9823\");\n// Use the forEach() method of the Map interface\nmap.forEach((String\
  \ key, String value) -> {\nSystem.out.println(\"key=\" + key + \", value=\" + value);\n\
  });\n```\n\n```\nkey=Donna, value=(205)678-9823\nkey=Ken, value=(205)678-9823\n\
  key=John, value=(342)113-9878\nkey=Richard, value=(245)890-9045\n```\n\n清单 12-30\n\
  演示了如何获取`Map`的三种不同视图并迭代\n这些视图中的元素。\n\n\n\n```\n// MapViews.java\npackage com.jdojo.collections;\n\
  import java.util.HashMap;\nimport java.util.Map;\nimport java.util.Set;\nimport\
  \ java.util.Collection;\npublic class MapViews {\npublic static void main(String[]\
  \ args) {\nMap map = new HashMap();\nmap.put(\"John\", \"(342)113-9878\");\nmap.put(\"\
  Richard\", \"(245)890-9045\");\nmap.put(\"Donna\", \"(205)678-9823\");\nmap.put(\"\
  Ken\", \"(205)678-9823\");\nSystem.out.println(\"Map: \" + map.toString());\n//\
  \ 打印映射中的键、值和条目\nlistKeys(map);\nlistValues(map);\nlistEntries(map);\n}\npublic static\
  \ void listKeys(Map map) {\nSystem.out.println(\"Key Set:\");\nSet keys = map.keySet();\n\
  keys.forEach(System.out::println);\nSystem.out.println();\n}\npublic static void\
  \ listValues(Map map) {\nSystem.out.println(\"Values Collection:\");\nCollection\
  \ values = map.values();\nvalues.forEach(System.out::println);\nSystem.out.println();\n\
  }\npublic static void listEntries(Map map) {\nSystem.out.println(\"Entry Set:\"\
  );\n// 获取条目 Set\nSet> entries = map.entrySet();\nentries.forEach((Map.Entry entry)\
  \ -> {\nString key = entry.getKey();\nString value = entry.getValue();\nSystem.out.println(\"\
  key=\" + key + \", value=\" + value);\n});\n}\n}\n清单 12-30.\n使用映射的键、值和条目视图\n```\n\
  \n```\nMap: {Donna=(205)678-9823, Ken=(205)678-9823, John=(342)113-9878, Richard=(245)890-9045}\n\
  Key Set:\nDonna\nKen\nJohn\nRichard\nValues Collection:\n(205)678-9823\n(205)678-9823\n\
  (342)113-9878\n(245)890-9045\nEntry Set:\nkey=Donna, value=(205)678-9823\nkey=Ken,\
  \ value=(205)678-9823\nkey=John, value=(342)113-9878\nkey=Richard, value=(245)890-9045\n\
  ```\n\nJava 9 为 `Map<K,V>` 接口添加了一个重载的 `of()` 静态工厂方法，提供了一种简单紧凑的方式来创建不可变映射。这些方法的实现针对性能进行了微调。以下是\
  \ `of()` 方法的 11 个版本，允许你创建包含零到十个键值条目的不可变 `Map`：\n\n*   `static <K,V> Map<K,V> of()`\n\
  \n*   `static <K,V> Map<K,V> of(K k1, V v1)`\n\n*   `static <K,V> Map<K,V> of(K\
  \ k1, V v1, K k2, V v2)`\n\n*   `static <K,V> Map<K,V> of(K k1, V v1, K k2, V v2,\
  \ K k3, V v3)`\n\n*   `static <K,V> Map<K,V> of(K k1, V v1, K k2, V v2, K k3, V\
  \ v3, K k4, V v4)`\n\n*   `static <K,V> Map<K,V> of(K k1, V v1, K k2, V v2, K k3,\
  \ V v3, K k4, V v4, K k5, V v5)`\n\n*   `static <K,V> Map<K,V> of(K k1, V v1, K\
  \ k2, V v2, K k3, V v3, K k4, V v4, K k5, V v5, K k6, V v6)`\n\n*   `static <K,V>\
  \ Map<K,V> of(K k1, V v1, K k2, V v2, K k3, V v3, K k4, V v4, K k5, V v5, K k6,\
  \ V v6, K k7, V v7)`\n\n*   `static <K,V> Map<K,V> of(K k1, V v1, K k2, V v2, K\
  \ k3, V v3, K k4, V v4, K k5, V v5, K k6, V v6, K k7, V v7, K k8, V v8)`\n\n*  \
  \ `static <K,V> Map<K,V> of(K k1, V v1, K k2, V v2, K k3, V v3, K k4, V v4, K k5,\
  \ V v5, K k6, V v6, K k7, V v7, K k8, V v8, K k9, V v9)`\n\n*   `static <K,V> Map<K,V>\
  \ of(K k1, V v1, K k2, V v2, K k3, V v3, K k4, V v4, K k5, V v5, K k6, V v6, K k7,\
  \ V v7, K k8, V v8, K k9, V v9, K k10, V v10)`\n\n注意 `of()` 方法中参数的位置。第一个和第二个参数分别是映射中第一个键值条目的键和值；第三个和第四个参数分别是映射中第二个键值条目的键和值，以此类推。以下代码片段展示了如何使用\
  \ `of()` 方法创建映射：\n\n```\n// 一个空的、不可变的 Map\nMap emptyMap = Map.of();\n// 一个单例的、不可修改的\
  \ Map\nMap singletonMap = Map.of(\"Ken\", \"(205)678-9823\");\n// 一个包含两个条目的不可变 Map\n\
  Map luckyNumbers = Map.of(1, \"One\", 2, \"Two\");\n```\n\n为了创建具有任意数量条目的不可变 `Map`，Java\
  \ 9 在 `Map` 接口中提供了一个名为 `ofEntries()` 的静态方法，其签名如下：\n\n```\nMap ofEntries(Map.Entry...\
  \ entries)\n```\n\n要使用 `ofEntries()` 方法，你需要将每个映射条目包装在 `Map.Entry` 实例中。Java 9 在 `Map`\
  \ 接口中提供了一个便捷的 `entry()` 静态方法来创建 `Map.Entry` 实例。`entry()` 方法的签名是：\n\n```\nMap.Entry\
  \ entry(K k, V v)\n```\n\n为了使表达式可读且紧凑，你需要对 `Map.entry` 方法进行静态导入，并使用类似下面的语句来创建具有任意数量条目的不可变\
  \ `Map`：\n\n```\nimport java.util.Map;\nimport static java.util.Map.entry;\n// ...\n\
  // 使用 Map.ofEntries() 和 Map.entry() 方法创建不可变 Map\nMap numberToWord = Map.ofEntries(entry(1,\
  \ \"One\"),\nentry(2, \"Two\"),\nentry(3, \"Three\"));\n```\n\n从 `Map` 接口的 `of()`\
  \ 和 `ofEntries()` 方法返回的映射不允许键或值为 `null`。如果映射中的键或值为 `null`，则会抛出 `NullPointerException`。如果所有键和值都是可序列化的，则这些映射是可序列化的。它们的实现类经过优化，并且不保证返回的\
  \ `Map` 的实现类。也就是说，你不应对这些方法返回的映射的实现类做任何假设。\n\n清单 12-31 包含一个完整的程序，展示了如何使用 `Map` 接口的新\
  \ `of()`、`ofEntries()` 和 `entry()` 静态方法来创建不可变映射。对于映射，你可能会得到不同的输出，这些输出将包含相同元素但顺序不同。\n\
  \n```\n// MapFactoryMethodTest.java\npackage com.jdojo.collections;\nimport java.util.Map;\n\
  import static java.util.Map.entry;\npublic class MapFactoryMethodTest {\npublic\
  \ static void main(String[] args) {\n// 创建几个不可修改的映射\nMap emptyMap = Map.of();\n\
  Map luckyNumber = Map.of(19, \"Nineteen\");\nMap numberToWord = Map.of(1, \"One\"\
  , 2, \"Two\", 3, \"Three\");\nMap days = Map.ofEntries(\nentry(\"Mon\", \"Monday\"\
  ),\nentry(\"Tue\", \"Tuesday\"),\nentry(\"Wed\", \"Wednesday\"),\nentry(\"Thu\"\
  , \"Thursday\"),\nentry(\"Fri\", \"Friday\"),\nentry(\"Sat\", \"Saturday\"),\nentry(\"\
  Sun\", \"Sunday\"));\nSystem.out.println(\"emptyMap = \" + emptyMap);\nSystem.out.println(\"\
  singletonMap = \" + luckyNumber);\nSystem.out.println(\"numberToWord = \" + numberToWord);\n\
  System.out.println(\"days = \" + days);\ntry {\n// 尝试使用 null 值\nMap map = Map.of(1,\
  \ null);\n} catch (NullPointerException e) {\nSystem.out.println(\"Map.of() 中不允许使用\
  \ null。\");\n}\ntry {\n// 尝试使用重复键\nMap map = Map.of(1, \"One\", 1, \"OneAgain\"\
  );\n} catch (IllegalArgumentException e) {\nSystem.out.println(e.getMessage());\n\
  }\n}\n}\n清单 12-31.\n使用 Map 接口的 of()、ofEntries() 和 entry() 静态方法\n```\n\n```\nemptyMap\
  \ = {}\nsingletonMap = {19=Nineteen}\nnumberToWord = {1=One, 3=Three, 2=Two}\ndays\
  \ = {Tue=Tuesday, Wed=Wednesday, Mon=Monday, Sun=Sunday, Sat=Saturday, Thu=Thursday,\
  \ Fri=Friday}\nMap.of() 中不允许使用 null。\nduplicate key: 1\n```\n\n排序映射\n\n排序映射以有序方式存储映射中的条目。它根据自然排序顺序或自定义排序顺序对键上的映射条目进行排序。自然排序顺序由键的\
  \ `Comparable` 接口定义。如果键未实现 `Comparable` 接口，则必须使用 `Comparator` 对条目进行排序。如果键实现了 `Comparable`\
  \ 接口并且你使用了 `Comparator`，则使用 `Comparator` 对键进行排序。\n\n`SortedMap<K,V>` 接口的实例表示一个排序映射。`SortedMap<K,V>`\
  \ 接口继承自 `Map<K,V>` 接口。`SortedMap` 之于 `Map`，就如同 `SortedSet` 之于 `Set`。\n\n`SortedMap`\
  \ 接口包含一些方法，让你能够利用映射中已排序的键。它提供了获取第一个和最后一个键、或基于条件获取子映射等方法。这些方法如下：\n\n*   `Comparator<?\
  \ super K> comparator()`：返回用于对 `SortedMap` 中的键进行自定义排序的 `Comparator`。如果你没有使用 `Comparator`，则返回\
  \ `null`，并将根据键的 Comparable 接口的实现使用自然排序。\n\n\n\n*   `K firstKey()`:\n    返回 `SortedMap`\
  \ 中第一个条目的键。如果 `SortedMap` 为空，则抛出 `NoSuchElementException` 异常。\n\n*   `SortedMap<K,\
  \ V> headMap(K toKey)`: 返回 `SortedMap` 的一个视图，该视图中的条目的键都小于指定的 `toKey`。如果你向该视图中添加新条目，其键必须小于指定的\
  \ `toKey`，否则将抛出异常。该视图由原始的 `SortedMap` 支持。\n\n*   `K lastKey()`: 返回 `SortedMap` 中最后一个条目的键。如果\
  \ `SortedMap` 为空，则抛出 `NoSuchElementException` 异常。\n\n*   `SortedMap<K, V> subMap(K\
  \ fromKey, K toKey)`: 返回 `SortedMap` 的一个视图，该视图中的条目的键范围从指定的 `fromKey`（包含）到 `toKey`（不包含）。原始的\
  \ `SortedMap` 支持该 `SortedMap` 的部分视图。对任一映射所做的任何更改都会反映在两者中。你可以向子映射中添加新条目，但其键必须落在 `fromKey`（包含）到\
  \ `toKey`（不包含）的范围内。\n\n*   `SortedMap<K, V> tailMap(K fromKey)`: 返回 `SortedMap`\
  \ 的一个视图，该视图中的条目的键都大于或等于指定的 `fromKey`。如果你向该视图中添加新条目，其键必须大于或等于指定的 `fromKey`，否则将抛出异常。原始的\
  \ `SortedMap` 支持该尾部视图。\n\n`TreeMap<K,V>` 类是 `SortedMap<K.V>` 接口的实现类。对于基本操作，你使用 `SortedMap`\
  \ 的方式与使用 `Map` 相同。清单 12-32 演示了如何使用 `SortedMap`。\n\n```\n// SortedMapTest.java\n\
  package com.jdojo.collections;\nimport java.util.SortedMap;\nimport java.util.TreeMap;\n\
  public class SortedMapTest {\npublic static void main(String[] args) {\nSortedMap\
  \ sMap = new TreeMap();\nsMap.put(\"John\", \"(342)113-9878\");\nsMap.put(\"Richard\"\
  , \"(245)890-9045\");\nsMap.put(\"Donna\", \"(205)678-9823\");\nsMap.put(\"Ken\"\
  , \"(205)678-9823\");\nSystem.out.println(\"Sorted Map: \" + sMap);\n// Get a sub\
  \ map from Donna (inclusive) to Ken(exclusive)\nSortedMap subMap = sMap.subMap(\"\
  Donna\", \"Ken\");\nSystem.out.println(\"Sorted Submap from Donna to Ken(exclusive):\
  \ \" + subMap);\n// Get the first and last keys\nString firstKey = sMap.firstKey();\n\
  String lastKey = sMap.lastKey();\nSystem.out.println(\"First Key: \" + firstKey);\n\
  System.out.println(\"Last key: \" + lastKey);\n}\n}\nListing 12-32.\nUsing a SortedMap\n\
  ```\n\n```\nSorted Map: {Donna=(205)678-9823, John=(342)113-9878, Ken=(205)678-9823,\
  \ Richard=(245)890-9045}\nSorted Submap from Donna to Ken(exclusive): {Donna=(205)678-9823,\
  \ John=(342)113-9878}\nFirst Key: Donna\nLast key: Richard\n```\n\n如果你想使用 `Comparator`\
  \ 根据键对 `SortedMap` 中的条目进行排序，你需要使用接受 `Comparator` 作为参数的 `TreeMap` 类的构造函数。以下代码片段展示了如何根据键的长度以及键的字母顺序（忽略大小写）对排序映射中的条目进行排序：\n\
  \n```\n// Sort entries on key's length and then on keys ignoring case\nComparator\
  \ keyComparator =\nComparator.comparing(String::length)\n.thenComparing(String::compareToIgnoreCase);\n\
  SortedMap sMap = new TreeMap(keyComparator);\nsMap.put(\"John\", \"(342)113-9878\"\
  );\nsMap.put(\"Richard\", \"(245)890-9045\");\nsMap.put(\"Donna\", \"(205)678-9823\"\
  );\nsMap.put(\"Ken\", \"(205)678-9823\");\nsMap.put(\"Zee\", \"(205)679-9823\");\n\
  System.out.println(\"Sorted Map: \" + sMap);\n```\n\n```\nSorted Map: {Ken=(205)678-9823,\
  \ Zee=(205)679-9823, John=(342)113-9878, Donna=(205)678-9823, Richard=(245)890-9045}\n\
  ```\n\n有关使用 `Comparator` 对键进行排序的更多详细信息，请参考“Sorted Set”部分。`SortedMap` 中的 `Comparator`\
  \ 对键的作用方式与 `SortedSet` 中对元素的作用方式相同。\n\n可导航映射\n\n可导航映射由 `NavigableMap<K,V>` 接口的实例表示。它通过添加一些有用的特性（例如获取键的最接近匹配项、以相反顺序获取映射视图等）来扩展\
  \ `SortedMap<K,V>` 接口。它还添加了一些与 `SortedMap` 添加的方法类似的方法，但它们返回一个条目（`Map.Entry` 对象）而不仅仅是键。`TreeMap<K,V>`\
  \ 类是 `NavigableMap<K,V>` 接口的实现类。\n\n在本段提到的 `NavigableMap` 接口的方法名称中，将 `Xxx` 替换为 `Entry`\
  \ 或 `Key`。`lowerXxx(K key)` 方法返回小于指定 `key` 的最大条目或键。`floorXxx(K key)` 方法返回小于或等于指定\
  \ `key` 的最大条目或键。`higherXxx(K key)` 方法返回大于指定 `key` 的最小条目或键。`ceilingXxx(K key)` 方法返回大于或等于指定\
  \ `key` 的最小条目或键。\n\n`NavigableMap` 包含两个方法，分别称为 `firstEntry()` 和 `lastEntry()`，它们以\
  \ `Map.Entry` 对象的形式返回第一个和最后一个条目；如果映射为空，则返回 `null`。它包含使用 `pollFirstEntry()` 和 `pollLastEntry()`\
  \ 方法从映射中检索并移除第一个和最后一个条目的方法。它添加了 `SortedMap` 中声明的 `headMap()`、`tailMap()` 和 `subMap()`\
  \ 方法的其他版本，这些版本接受一个 `boolean` 标志，用于指示是否要在这些方法返回的子映射中包含极值。最后，它添加了 `descendingKeySet()`\
  \ 和 `descendingMap()` 方法，这些方法以相反的顺序提供键的视图和映射本身的视图。清单 12-33 展示了如何使用 `NavigableMap`。\n\
  \n```\n// NavigableMapTest.java\npackage com.jdojo.collections;\nimport java.util.TreeMap;\n\
  import java.util.NavigableMap;\nimport java.util.Map.Entry;\npublic class NavigableMapTest\
  \ {\npublic static void main(String[] args) {\n// Create a sorted map sorted on\
  \ string keys alphabetically\nNavigableMap nMap = new TreeMap();\nnMap.put(\"John\"\
  , \"(342)113-9878\");\nnMap.put(\"Richard\", \"(245)890-9045\");\nnMap.put(\"Donna\"\
  , \"(205)678-9823\");\nnMap.put(\"Ken\", \"(205)678-9823\");\nSystem.out.println(\"\
  Navigable Map:\" + nMap);\n// Get the closest lower and higher matches for Ken\n\
  Entry lowerKen = nMap.lowerEntry(\"Ken\");\nEntry floorKen = nMap.floorEntry(\"\
  Ken\");\nEntry higherKen = nMap.higherEntry(\"Ken\");\nEntry ceilingKen = nMap.ceilingEntry(\"\
  Ken\");\nSystem.out.println(\"Lower Ken: \" + lowerKen);\nSystem.out.println(\"\
  Floor Ken: \" + floorKen);\nSystem.out.println(\"Higher Ken: \" + higherKen);\n\
  System.out.println(\"Ceiling Ken: \" + ceilingKen);\n// Get the reverse order view\
  \ of the map\nNavigableMap reverseMap = nMap.descendingMap();\nSystem.out.println(\"\
  Navigable Map(Reverse Order):\" + reverseMap);\n}\n}\nListing 12-33.\nUsing a NavigableMap\n\
  ```\n\n```\nNavigable Map:{Donna=(205)678-9823, John=(342)113-9878, Ken=(205)678-9823,\
  \ Richard=(245)890-9045}\nLower Ken: John=(342)113-9878\nFloor Ken: Ken=(205)678-9823\n\
  Higher Ken: Richard=(245)890-9045\nCeiling Ken: Ken=(205)678-9823\nNavigable Map(Reverse\
  \ Order):{Richard=(245)890-9045, Ken=(205)678-9823, John=(342)113-9878, Donna=(205)678-9823}\n\
  ```\n\n并发映射\n\n有时，当映射被多个线程并发使用时，你需要原子性地对映射执行多个操作。例如，你可能只想在键尚未存在于映射中时，才向映射中添加一个新的键值对。你的代码可能如下所示：\n\
  \n```\nMap map = ...;\nString key = ...;\nString value = ...;\n// Need to lock the\
  \ entire map\nsynchronized(map) {\nif (map.containsKey(key)) {\n// Key is already\
  \ in the map\n} else {\nmap.put(key, value); // Add the new key-value\n}\n}\n```\n\
  \n\n\n在这段代码中，为了在键不存在于映射中时插入新的键值对，你不得不锁定整个映射。锁定映射是必要的，因为你需要原子性地执行两个操作：检查键是否存在，以及如果检查失败则插入键值对。当一个线程对映射执行这两个操作时，其他线程无法锁定该映射执行任何其他操作。`ConcurrentMap`\
  \ 让你能够执行并发操作，就像我讨论的那样，而无需诉诸于锁定映射。\n\n你可以在使用其实现类创建并发映射时选择并发级别。并发级别被指定为预计会对映射执行写操作的线程数量。映射会尝试同时调整这么多线程。`ConcurrentMap`\
  \ 不会锁定整个映射。即使它锁定了整个映射，其他线程仍然能够对其执行读写操作，因为它使用了一种基于比较并交换原语的细粒度同步机制。\n\n`ConcurrentHashMap<K,V>`\
  \ 类是 `ConcurrentMap<K,V>` 接口的一个实现类。它们都在 `java.util.concurrent` 包中。\n\n清单 12-34 演示了\
  \ `ConcurrentMap` 的使用。该示例仅展示了如何创建和使用 `ConcurrentMap` 的一些方法。通常，你应该在多线程环境中使用 `ConcurrentMap`。该程序并未使用多个线程来访问映射。它仅演示了\
  \ `ConcurrentMap` 接口的一些方法的使用。\n\n```\n// ConcurrentMapTest.java\npackage com.jdojo.collections;\n\
  import java.util.concurrent.ConcurrentHashMap;\nimport java.util.concurrent.ConcurrentMap;\n\
  public class ConcurrentMapTest {\npublic static void main(String[] args) {\nConcurrentMap\
  \ cMap = new ConcurrentHashMap();\ncMap.put(\"one\", \"one\");\nSystem.out.println(\"\
  Concurrent Map: \" + cMap);\nSystem.out.println(cMap.putIfAbsent(\"one\", \"nine\"\
  ));\nSystem.out.println(cMap.putIfAbsent(\"two\", \"two\"));\nSystem.out.println(cMap.remove(\"\
  one\", \"two\"));\nSystem.out.println(cMap.replace(\"one\", \"two\"));\nSystem.out.println(\"\
  Concurrent Map: \" + cMap);\n}\n}\n清单 12-34.\n使用 ConcurrentMap\n```\n\n```\nConcurrent\
  \ Map: {one=one}\none\nnull\nfalse\none\nConcurrent Map: {one=two, two=two}\n```\n\
  \n并发与可导航映射\n\n一个并发可导航映射是映射的并发且可导航的版本。`ConcurrentNavigableMap<K,V>` 接口的实例代表一个并发且可导航的映射。该接口继承自\
  \ `ConcurrentMap<K,V>` 和 `NavigableMap<K,V>` 接口。`ConcurrentSkipListMap<K,V>` 是 `ConcurrentNavigableMap<K,V>`\
  \ 接口的实现类。我已经讨论过并发映射和可导航映射。关于使用 `ConcurrentNavigableMap`，请参考这两种映射的示例。\n\n对集合应用算法\n\
  \n集合框架允许你对集合的全部或部分元素应用多种类型的算法。它允许你搜索集合中的某个值；对集合元素进行排序和打乱；获取集合的只读视图等。好消息是，所有这些功能都集中在一个名为\
  \ `Collections` 的类中。请注意，我们有一个名称相似的接口叫做 `Collection`，它是集合框架中定义的大多数集合接口的祖先。`Collections`\
  \ 类由所有静态方法组成。如果你想对集合应用任何算法，在编写自己的逻辑之前，需要查看此类中的方法列表。我将在后续章节中讨论 `Collections` 类中的许多方法。\n\
  \n对列表排序\n\n你可以使用 `Collections` 类中的以下两个静态方法之一对 `List` 的元素进行排序：\n\n*   `<T extends\
  \ Comparable<? super T>> void sort(List<T> list)`：它按照 `List` 中元素实现的 `Comparable`\
  \ 接口定义的自然顺序对 `List` 中的元素进行排序。`List` 中的每个元素都必须实现 `Comparable` 接口，并且它们必须彼此可比较。\n\n\
  *   `<T> void sort(List<T> list, Comparator<? super T> c)`：它允许你传入一个 `Comparator`\
  \ 来定义元素的自定义顺序。\n\n提示\n\nJava 8 在 `List<E>` 接口中添加了一个名为 `sort(Comparator<? super E>\
  \ c)` 的默认方法。它允许你在不使用 `Collections` 类的情况下对 `List` 进行排序。\n\n以下代码片段演示了如何对 `List` 进行排序：\n\
  \n```\nimport java.util.ArrayList;\nimport java.util.Collections;\nimport java.util.List;\n\
  ...\nList list = new ArrayList();\nlist.add(\"John\");\nlist.add(\"Richard\");\n\
  list.add(\"Donna\");\nlist.add(\"Ken\");\nSystem.out.println(\"List: \" + list);\n\
  // 使用 String 中的 Comparable 实现按自然顺序排序\nCollections.sort(list);\nSystem.out.println(\"\
  Sorted List: \" + list);\n```\n\n```\nList: [John, Richard, Donna, Ken]\nSorted\
  \ List: [Donna, John, Ken, Richard]\n```\n\n以下代码片段使用 `List` 接口中的 `sort()` 方法，按照元素长度的升序对同一个列表进行排序：\n\
  \n```\nimport java.util.ArrayList;\nimport java.util.Comparator;\nimport java.util.List;\n\
  ...\nList list = new ArrayList();\nlist.add(\"John\");\nlist.add(\"Richard\");\n\
  list.add(\"Donna\");\nlist.add(\"Ken\");\nSystem.out.println(\"List: \" + list);\n\
  // 使用 List.sort() 方法并传入一个 Comparator\nlist.sort(Comparator.comparing(String::length));\n\
  System.out.println(\"Sorted List: \" + list);\n```\n\n```\nList: [John, Richard,\
  \ Donna, Ken]\nSorted List: [Ken, John, Donna, Richard]\n```\n\n`sort()` 方法使用了一种改进的归并排序算法。它是一种稳定排序。也就是说，相等的元素在排序操作后会保持它们当前的位置。在内部，所有元素被复制到一个数组中，在数组中进行排序，然后再复制回\
  \ `List` 中。排序保证提供 `n*log(n)` 的性能，其中 `n` 是 `List` 中的元素数量。\n\n搜索列表\n\n你可以使用 `Collections`\
  \ 类中的以下两个静态 `binarySearch()` 方法之一在 `List` 中搜索指定的对象。\n\n*   `<T> int binarySearch(List<?\
  \ extends Comparable<? super T>> list, T key)`\n\n*   `<T> int binarySearch(List<?\
  \ extends T> list, T key, Comparator<? super T> c)`\n\n在对 `List` 使用 `binarySearch()`\
  \ 方法之前，必须使用自然顺序或 `Comparator` 将 `List` 按升序排序。如果 `List` 未排序，则 `binarySearch()` 方法的结果是未定义的。如果在\
  \ `List` 中找到该对象，该方法返回该对象在 `List` 中的索引。否则，它返回 (`-(插入点)-1`)，其中插入点是该对象如果存在时在 `List`\
  \ 中应被放置的位置的索引。这个返回值确保只有当键在 `List` 中未找到时，你才会得到一个负值。如果你从该方法得到一个负数作为返回值，你可以使用返回索引的绝对值作为插入到列表的基础\
  \ `-((返回值) + 1)`。此方法使用二分查找算法来执行搜索。如果 `List` 支持随机访问，则搜索在 log(n) 时间内运行。如果 `List` 不支持随机访问，则搜索在\
  \ n×log(n) 时间内运行。以下代码片段展示了如何使用此方法：\n\n```\nList list = new ArrayList();\nlist.add(\"\
  John\");\nlist.add(\"Richard\");\nlist.add(\"Donna\");\nlist.add(\"Ken\");\n// 在执行二分查找之前必须排序\n\
  Collections.sort(list);\nSystem.out.println(\"List: \" + list);\n// 查找 Donna\nint\
  \ index = Collections.binarySearch(list, \"Donna\");\nSystem.out.println(\"Donna\
  \ in List is at \" + index);\n// 查找 Ellen\nindex = Collections.binarySearch(list,\
  \ \"Ellen\");\nSystem.out.println(\"Ellen in List is at \" + index);\n```\n\n\n\n\
  ```\n列表：[Donna, John, Ken, Richard]\nDonna 在列表中的索引为 0\nEllen 在列表中的索引为 -2\n```\n\n\
  由于 `\"Ellen\"`\n不在 `List` 中，二分\n查找返回了 -2。这意味着如果你将 `\"Ellen\"` 插入到 `List` 中，它将被\n\
  插入到索引 1 处，该索引通过表达式 `(-(-2+1))` 计算得出。请注意，\n`\"Donna\"` 的\n索引为 0，而 `\"John\"` 的索引\n\
  为 1。如果将 `\"Ellen\"` 添加到\n列表中，其索引将与 `\"John\"` 当前的索引相同，而 `\"John\"` 将被\n右移到索引 2 处。\n\
  \n打乱、反转、交换和旋转\n列表\n\n在本节中，我将讨论如何对\n`List` 应用不同类型的算法，例如\n打乱、反转、交换和旋转其元素。\n\n打乱  \
  \  会生成 `List` 中元素的随机\n排列。打乱\n`List` 元素的概念与\n洗牌相同。你可以通过使用\n`Collections.shuffle()`\n\
  静态方法来打乱 `List` 的元素。你可以提供一个 `java.util.Random`\n对象，或者 `shuffle()` 方法也可以\n使用默认的随机化器。`shuffle()`\
  \ 方法的两个版本\n如下：\n\n*   `void shuffle(List<?> list)`\n\n*   `void shuffle(List<?>\
  \ list, Random rnd)`\n\n反转    是一种\n将 `List` 中的元素按相反顺序排列的算法。你可以使用 `Collections` 类的以下\
  \ `reverse()` 静态\n方法来实现这一点：\n\n```\nvoid reverse(List list)\n```\n\n交换    允许你交换\n\
  `List` 中两个元素的位置。你可以\n使用 `Collections` 类的 `swap()` 静态方法\n执行交换操作，其定义如下：\n\n```\nvoid\
  \ swap(List list, int i, int j)\n```\n\n这里 `i` 和\n`j` 是要交换的两个元素的索引，它们必须介于 `0` 和\
  \ `size – 1` 之间，其中 `size` 是\n`List` 的大小。\n否则，它会抛出 `IndexOutOfBoundsException` 异常。\n\
  \n旋转    涉及将\n`List` 中的所有元素向前或\n向后移动一定的距离。假设你有一个 `List` 为 `[a, b, c, d]`。你\n需要将 `List`\
  \ 想象成一个循环\n列表，其第一个元素紧挨着最后一个元素。如果你将此\n`List` 旋转\n距离 1，得到的 `List` 变为 `[d, a, b, c]`。如果你\n\
  将 `[a, b, c, d]` 列表旋转距离 2，`List` 变为 `[c, d, a, b]`。你\n也可以使用负距离向后旋转 `List`。如果你将 `[a,\
  \ b, c, d]` 列表旋转\n距离 -2，`List` 变为 `[c, d, a, b]`。你\n还可以使用子列表视图仅旋转 `List` 的一部分。假设\
  \ `list` 是一个类型为 `List` 的引用变量，并且它包含 `[a, b, c, d]`\n元素。考虑执行以下语句：\n\n```\nCollections.rotate(list.subList(1,\
  \ 4), 1);\n```\n\n该语句会将列表更改为 `[a, d, b, c]`。请注意\n`list.subList(1, 4)` 返回 `[b, c,\
  \ d]` 元素的视图，\n并且此语句仅旋转子列表中的这三个元素。\n\n以下代码片段展示了如何使用这些方法重新排列 `List` 的元素。当你运行以下代码时，可能会得到不同的输出，\n\
  因为 `shuffle()` 使用随机算法来打乱 `List` 的元素。\n\n```\nList list = new ArrayList();\nlist.add(\"\
  John\");\nlist.add(\"Richard\");\nlist.add(\"Donna\");\nlist.add(\"Ken\");\nSystem.out.println(\"\
  List: \" + list);\n// 打乱\nCollections.shuffle(list);\nSystem.out.println(\"After\
  \ Shuffling: \" + list);\n// 反转列表\nCollections.reverse(list);\nSystem.out.println(\"\
  After Reversing: \" + list);\n// 交换索引 1 和 3 处的元素\nCollections.swap(list, 1, 3);\n\
  System.out.println(\"After Swapping (1 and 3): \" + list);\n// 将元素旋转 2 位\nCollections.rotate(list,\
  \ 2);\nSystem.out.println(\"After Rotating by 2: \" + list);\n```\n\n```\nList:\
  \ [John, Richard, Donna, Ken]\nAfter Shuffling: [Ken, Donna, Richard, John]\nAfter\
  \ Reversing: [John, Richard, Donna, Ken]\nAfter Swapping (1 and 3): [John, Ken,\
  \ Donna, Richard]\nAfter Rotating by 2: [Donna, Richard, John, Ken]\n```\n\n创建集合的不同视图\n\
  \n你可以使用 `Collections` 类的 `asLifoQueue()` 静态方法获取 `Deque` 的 `LIFO Queue` 视图：\n\n```\n\
  Queue asLifoQueue(Deque deque)\n```\n\n一些 `Map`\n实现也有对应的 `Set`\n实现。例如，对于 `HashMap`，有\n\
  `HashSet`；对于\n`TreeMap`，\n有 `TreeSet`。\n如果你想将 `Map` 的实现\n用作 `Set`\n实现，可以使用 `Collections`\
  \ 类的 `newSetFromMap()`\n静态方法：\n\n```\nSet newSetFromMap(Map map)\n```\n\n请注意，其思想是将\
  \ `Map` 的实现用作 `Set`，而不是在\n`Map` 和 `Set` 之间共享\n元素。这就是\n当你在此方法中使用 `Map` 时，它必须为空，并且你根本不应该直接使用\
  \ `Map` 的原因。\n`Map` 有一个 `WeakHashMap`\n实现类。然而，\n`Set` 没有对应的 `WeakHashSet`\n实现类。以下是你如何\n\
  获取 `WeakHashSet` 的方法：\n\n```\nMap map = new WeakHashMap();     // 不要填充和使用该 map\n\
  Set wSet = Collections.newSetFromMap(map); // 你可以使用 wSet\n```\n\n使用弱哈希集合 `wSet`\
  \ 作为 `Set`，它的行为类似于\n`WeakHashMap`\n实现。由于你不应该使用 `Map` 对象，因此\n最好使用以下语句，利用 `WeakHashMap`\n\
  实现类来创建集合：\n\n```\n// 不要保留 Map 的引用\nSet wSet = Collections.newSetFromMap(new WeakHashMap());\n\
  ```\n\n当 JVM 需要内存时，垃圾回收可以从\n`wSet` 中移除元素，就像\n它对任何 `WeakHashMap` 所做的那样。通过\n一行代码，你就得到了一个具有\
  \ `WeakHashMap` 特性的 `Set`。\n\n集合的只读视图\n\n你可以获取集合的只读\n视图\n（也称为不可修改视图）。当你想要传递集合\n\
  而不希望它被修改时，这非常有用。在这种情况下，你需要\n传递集合的只读视图。`Collections` 类\n提供了以下方法来获取不同类型集合的只读视图：\n\n\
  *   `<T> Collection<T> unmodifiableCollection(Collection<? extends T> c)`\n\n* \
  \  `<T> List<T> unmodifiableList(List<? extends T> list)`\n\n*   `<K,V> Map<K,V>\
  \ unmodifiableMap(Map<? extends K,? extends V> m)`\n\n*   `<K,V> NavigableMap<K,V>\
  \ unmodifiableNavigableMap(NavigableMap<K,? extends V> m)`\n\n*   `<T> Set<T> unmodifiableSet(Set<?\
  \ extends T> s)`\n\n*   `<T> NavigableSet<T> unmodifiableNavigableSet(NavigableSet<T>\
  \ s)`\n\n*   `<T> SortedSet<T> unmodifiableSortedSet(SortedSet<T> s)`\n\n*   `<K,V>\
  \ SortedMap<K,V> unmodifiableSortedMap(SortedMap<K,? extends V> m)`\n\n使用这些方法中的任何一个都很简单。你传入一个特定类型的集合，\n\
  就会得到一个相同类型的只读集合。\n这些方法允许你获取现有可修改集合的只读视图。\n如果你已经知道集合的元素，请使用\n`List`、`Set` 和 `Map`\
  \ 接口的 `of()` 静态\n方法来创建只读的 `List`、`Set` 和 `Map`。\n\n集合的同步视图\n\n本章讨论的 Collections\
  \ 框架中的大多数集合\n都不是线程安全的，你不应该在多线程环境中使用它们。请注意，名称中包含\n\"concurrent\" 一词的集合被设计为线程安全的。你可以\n\
  使用 `Collections` 类的以下\n静态方法之一获取集合的同步视图。\n每种集合类型都有一个方法，用于返回相同类型的同步版本集合。\n\n*   `<T>\
  \ Collection<T> synchronizedCollection(Collection<T> c)`\n\n*   `<T> List<T> synchronizedList(List<T>\
  \ list)`\n\n*   `<K,V> Map<K,V> synchronizedMap(Map<K,V> m)`\n\n*   `<K,V> NavigableMap<K,V>\
  \ synchronizedNavigableMap(NavigableMap<K,V> m)`\n\n*   `<T> NavigableSet<T> synchronizedNavigableSet(NavigableSet<T>\
  \ s)`\n\n*   `<T> Set<T> synchronizedSet(Set<T> s)`\n\n*   `<T> SortedSet<T> synchronizedSortedSet(SortedSet<T>\
  \ s)`\n\n*   `<K,V> SortedMap<K,V> synchronizedSortedMap (SortedMap<K,V> m)`\n\n\
  \n\n在处理集合的同步视图时，需要注意以下几点。通过同步视图进行的所有读写操作都是线程安全的，但使用迭代器遍历集合元素时除外。在获取迭代器并使用它的整个过程中，必须对整个集合进行同步。以下代码片段说明了这一概念：\n\
  \n```\n// 假设你有一个 Set\nSet s = ...; // 未同步的 set\n// 获取 Set s 的同步视图\nSet ss = Collections.synchronizedSet(s);\n\
  // 我们需要遍历 ss 中的元素。必须首先获取 ss 上的锁（而不是 s 上的锁）。\nsynchronized(ss) {\nIterator iterator\
  \ = ss.iterator();\n// 持有锁时使用迭代器\nwhile (iterator.hasNext()) {\nObject obj = iterator.next();\n\
  // 在此处对 obj 执行某些操作\n}\n}\n```\n\n在遍历同步 `Map` 的键、值或条目视图时，也需要遵循相同的逻辑。也就是说，在遍历其任何视图时，必须获取\
  \ `Map` 同步视图上的锁。\n\n## 受检集合\n\n泛型为集合提供了编译时的类型安全性。如果编译器确定集合可能包含违反其类型声明的元素，它会发出未受检的编译时警告。如果忽略这些警告，你的代码可能会在运行时绕过泛型规则。让我们考虑以下代码片段：\n\
  \n```\nSet s = new HashSet();\ns.add(\"Hello\");\na.add(123); // 编译时错误\n```\n\n\
  你试图向 `Set<String>` 中添加一个 `Integer`。编译器确保你无法成功执行此操作。这次，让我们通过以下代码片段绕过编译器检查：\n\n```\n\
  Set s = new HashSet();\ns.add(\"Hello\");\nSet anythingGoesSet = s;\nanythingGoesSet.add(123);\
  \ // 无运行时异常\n```\n\n这次，编译器会为 `anythingGoesSet.add(123);` 语句发出一个未受检警告，因为它无法知道你正在向\
  \ `Set` 中添加错误类型的对象。这段代码的结果是，你声明了一个 `Set<String>`，却能够向其中添加一个 `Integer`。当你尝试将 `Integer`\
  \ 对象作为 `String` 对象读取时，将会出现运行时异常，而此时再找出是哪行代码导致的错误就为时已晚了！\n\n`Collections` 类帮助你创建受检集合，当某段代码尝试添加违反规则的元素时，你会收到一个\
  \ `ClassCastException`。这使得调试更加容易。创建受检集合时，你需要指定它必须持有的元素的类类型。添加任何其他类型的元素都会抛出 `ClassCastException`。你可以使用\
  \ `Collections` 类的以下静态方法来获取特定类型的受检集合：\n\n*   `<E> Collection<E> checkedCollection(Collection<E>\
  \ c, Class<E> type)`\n\n*   `<E> List<E> checkedList(List<E> list, Class<E> type)`\n\
  \n*   `<K,V> Map<K,V> checkedMap(Map<K,V> m, Class<K> keyType, Class<V> valueType)`\n\
  \n*   `<K,V> NavigableMap<K,V> checkedNavigableMap(NavigableMap<K,V> m, Class<K>\
  \ keyType, Class<V> valueType)`\n\n*   `<E> NavigableSet<E> checkedNavigableSet(NavigableSet<E>\
  \ s, Class<E> type)`\n\n*   `<E> Queue<E> checkedQueue(Queue<E> queue, Class<E>\
  \ type)`\n\n*   `<E> Set<E> checkedSet(Set<E> s, Class<E> type)`\n\n*   `<K,V> SortedMap<K,V>\
  \ checkedSortedMap(SortedMap<K,V> m, Class<K> keyType, Class<V> valueType)`\n\n\
  *   `<E> SortedSet<E> checkedSortedSet(SortedSet<E> s, Class<E> type)`\n\n以下是前一个示例的解决方案，当尝试向\
  \ `Set<String>` 中添加 `Integer` 时，会抛出 `ClassCastException`：\n\n```\n// 使用 String 类型的受检\
  \ Set\nSet checkedSet = Collections.checkedSet(new HashSet(), String.class);\nSet\
  \ anythingGoesSet = checkedSet;\nanythingGoesSet.add(123); // 抛出 ClassCastException\n\
  ```\n\n注意\n\n使用受检集合并不能阻止你绕过编译器。相反，它有助于你在运行时轻松、准确地识别违规代码。\n\n## 创建空集合\n\n有时你需要调用一个接受集合参数的方法。然而，你没有任何元素可以传递给该集合。在这种情况下，你无需费心创建集合对象。`Collections`\
  \ 类提供了每种类型的不可变空集合对象，作为其静态方法的返回值。它还提供了返回空 `Iterator` 的方法。以下是 `Collections` 类中此类静态方法的部分列表：\n\
  \n*   `<T> List<T> emptyList()`\n\n*   `<K,V> Map<K,V> emptyMap()`\n\n*   `<T> Set<T>\
  \ emptySet()`\n\n*   `<T> Iterator<T> emptyIterator()`\n\n*   `<T> ListIterator<T>\
  \ emptyListIterator()`\n\n使用这些方法很简单。假设有一个名为 `m1(Map<String,String> map)` 的方法。如果你想向该方法传递一个空映射，调用方式如下：\n\
  \n```\nm1(Collections.emptyMap());\n```\n\nJava 9 向 `List`、`Set` 和 `Map` 接口添加了一个重载的静态\
  \ `of()` 方法。该方法分别创建一个空的不可变列表、集合和映射。你可以在 Java 9 中重写上述语句，如下所示：\n\n```\nm1(Map.of());\n\
  ```\n\n## 创建单例集合\n\n有时你需要创建一个只能包含一个元素的集合。当方法接受一个集合作为参数，而你只有一个对象要传递给该方法时，就会出现这种情况。无需费心创建新集合并向其中添加单个元素，你可以使用\
  \ `Collections` 类的三个静态方法之一，它们会创建一个包含指定元素的不可变集合。这些方法如下：\n\n*   `<T> Set<T> singleton(T\
  \ o)`\n\n*   `<T> List<T> singletonList(T o)`\n\n*   `<K,V> Map<K,V> singletonMap(K\
  \ key, V value)`\n\n以下代码片段创建了一个单例集合：\n\n```\nSet singletonSet = Collections.singleton(\"\
  Lonely\");\n```\n\nJava 9 向 `List`、`Set` 和 `Map` 接口添加了一个重载的静态 `of()` 方法。该方法分别创建一个空的不可变单例列表、集合和映射。你可以在\
  \ Java 9 中重写上述语句，如下所示：\n\n```\nSet singletonSet = Set.of(\"Lonely\");\n```\n\n提示\n\
  \n`List`、`Set` 和 `Map` 接口中 `of()` 方法的实现经过了高度优化。最好使用此方法而不是 `Collections` 类中的方法来创建不可变的\
  \ `List`、`Set` 和 `Map`。\n\n## 理解基于哈希的集合\n\n你已经使用过许多名称中包含“hash”一词的集合实现类，例如 `HashSet`、`LinkedHashSet`、`HashMap`\
  \ 等。它们被称为基于哈希的集合。它们有助于快速高效地存储和检索对象。本节将简要讨论基于哈希集合的内部工作原理。\n\n让我们从一个日常生活中的例子开始。假设你得到了许多张纸。每张纸上都写着一个数字。你的任务是整理（或存储）这些纸，以便能够尽快告诉我们你收到的这堆纸中是否存在某个特定的数字。将来你可能会收到更多带有数字的纸。\n\
  \n组织数字的一种方法是将它们全部放在一个桶中，如图 12-5 所示。\n\n![A323070_2_En_12_Fig5_HTML.gif](img/A323070_2_En_12_Fig5_HTML.gif)\n\
  \n图 12-5.\n\n将所有数字放在一个桶中\n\n\n\n当要求你验证数字 89 是否存在时，你需要逐一查看桶中的所有数字，最终才能确认该数字不在集合中。在最坏情况下，你必须搜索整个桶才能判断某个特定数字是否存在。而在最佳情况下，你可能第一次尝试就能找到该数字。验证数字是否存在所需的平均时间与集合的大小成正比。你可能会意识到，将所有数字放在一个桶中对于检索来说效率并不高。随着数字数量的增加，搜索特定数字所需的时间也会更长。\n\
  \n让我们尝试寻找一种更高效的组织数字方式。假设使用更多桶（例如四个）来存储数字。任何给定的数字都将被存入这四个桶之一。如果随意将数字放入某个桶，搜索时仍会遇到同样的问题。在最坏情况下，你需要搜索所有四个桶才能找到某个数字，因为你不知道具体哪个桶包含该数字。为了避免这种低效，我们采用一种算法将特定数字放入指定桶中。\n\
  \n为了简化算法，我们计算数字对桶数量（此处为四）的模，并将数字放入与模值对应的桶中。若用 4 计算数字的模，结果将为 0、1、2 或 3。我们将四个桶分别命名为\
  \ bucket-0、bucket-1、bucket-2 和 bucket-3。数字 17 应放入哪个桶？17 模 4 的结果为 1，因此数字 17 将放入 bucket-1。数字\
  \ 31 应放入哪个桶？31 模 4 的结果为 3，因此数字 31 将放入 bucket-3。图 12-6 展示了基于该算法使用四个桶存储部分数字的排列方式。\n\
  \n![A323070_2_En_12_Fig6_HTML.gif](img/A323070_2_En_12_Fig6_HTML.gif)\n\n图 12-6.\
  \ 使用四个桶存储数字\n\n让我们逐步演示如何将数字存入四个桶之一。假设你拿到数字 94，它应放入哪个桶？首先计算 94 模 4 的结果为 2，因此数字 94\
  \ 将存入 bucket-2。对于每个需要存储的数字，你都将遵循此逻辑决定其所属桶。\n\n现在，我们逐步演示如何验证某个数字是否存在于桶中。假设需要验证数字\
  \ 67 是否在集合中。首先计算 67 模 4 的结果为 3。根据存储逻辑，若数字 67 存在于集合中，它必然在 bucket-3 中。确定桶编号后，你只需查看该桶（此处为\
  \ bucket-3）中的每个数字。在此案例中（见图 12-6），bucket-3 中有十个数字，且均不是 67。查看完 bucket-3 中的十个数字后，你可以回答数字\
  \ 67 不存在于集合中。请注意，你仅需查看一个桶中的数字即可判断数字 67 是否存在，无需检查所有四个桶。通过使用算法存储和检索集合中的数字，你缩短了搜索数字所需的时间。\n\
  \n故事尚未结束。假设使用四个桶存储数字，且所有数字都是 4 的倍数（如 4、8、12、16、20、24 等）。对于所有 4 的倍数 N，N 模 4 的结果均为\
  \ 0。这意味着所有此类数字都将仅存入 bucket-0。这种情况是否比将所有数字存入一个桶更好？答案是否定的。只有当数字均匀分布在所有桶中时，使用多个桶才能提升搜索效率。最佳情况是所有桶中仅包含一个数字，此时你只需查看一个桶中的一个数字即可判断数字是否存在。即使数字均匀分布在桶中，随着集合规模增大，搜索性能仍可能下降。例如，假设有\
  \ 100 个数字均匀分布在四个桶中，最坏情况下你需要搜索一个桶中的 25 个数字。若数字增加到 10,000 个且仍均匀分布在四个桶中，最坏情况下你需要搜索\
  \ 2,500 个数字。为了保持搜索速度，当单个桶中的数字数量增加到影响搜索性能时，你可以增加桶的数量。\n\nJava 中基于哈希的集合与我刚才讨论的数字集合工作原理类似。请注意，Java\
  \ 集合仅存储对象，不允许存储基本类型值。`Object`类中的两个方法是哈希集合工作的核心：`equals()`和`hashCode()`。\n\n基于哈希的集合维护多个桶来存储对象。当你向哈希集合添加对象时，Java\
  \ 通过调用对象的`hashCode()`方法获取其哈希码，然后对哈希码应用算法以计算对象应放入的桶。当需要检查对象是否存在于哈希集合中时，Java 应用相同逻辑计算对象可能所在的桶：调用对象的`hashCode()`方法并应用算法计算桶位置，然后使用对象的`equals()`方法将对象与桶中现有对象进行比较，以确认对象是否存在于该桶中。\n\
  \nJava 中哈希集合的内部工作原理看似简单。然而，如果存储在哈希集合中的对象所属类未正确实现`hashCode()`和`equals()`方法，程序员将面临诸多复杂问题。让我们查看`BadKey`类的代码，如清单\
  \ 12-35 所示。\n\n```\n// BadKey.java\npackage com.jdojo.collections;\npublic class\
  \ BadKey {\nprivate int id;\npublic BadKey(int id) {\nthis.id = id;\n}\npublic int\
  \ getId() {\nreturn this.id;\n}\npublic void setId(int id) {\nthis.id = id;\n}\n\
  @Override\npublic int hashCode() {\n// 返回 id 值作为其哈希码\nreturn id;\n}\n@Override\n\
  public boolean equals(Object obj) {\nif (obj == this) {\nreturn true;\n}\nif (obj\
  \ instanceof BadKey) {\nBadKey bk = (BadKey) obj;\nif (bk.getId() == this.id) {\n\
  return true;\n}\n}\nreturn false;\n}\n@Override\npublic String toString() {\nreturn\
  \ String.valueOf(this.id);\n}\n}\n清单 12-35. 一个不适合作为哈希集合键的 BadKey 类\n\n\n\n`BadKey`\
  \ 类存储一个整数值。它是一个可变类。你可以通过调用 `setId()` 方法并为其 `id` 提供新值来修改其状态。它重写了 `Object` 类的 `equals()`\
  \ 和 `hashCode()` 方法。`hashCode()` 方法的实现很简单：它返回 `id` 实例变量的值作为哈希码。`equals()` 方法检查两个\
  \ `BadKey` 对象的 `id` 实例变量的值是否相同。如果两个 `BadKey` 对象具有相同的 `id`，则它们被视为相等。\n\n请考虑清单 12-36\
  \ 中的程序。它在 `Set<BadKey>` 中使用了 `BadKey` 对象。你能通过查看程序和输出来发现问题吗？如果没发现问题，不用担心，我会解释。\n\n\
  ```\n// BadKeyTest.java\npackage com.jdojo.collections;\nimport java.util.HashSet;\n\
  import java.util.Set;\npublic class BadKeyTest {\npublic static void main(String[]\
  \ args) {\nSet s = new HashSet();\nBadKey bk1 = new BadKey(100);\nBadKey bk2 = new\
  \ BadKey(200);\n// 将两个对象 bk1 和 bk2 添加到集合中\ns.add(bk1);\ns.add(bk2);\nSystem.out.println(\"\
  集合包含: \" + s);\nSystem.out.println(\"集合包含 bk1: \" + s.contains(bk1));\n// 将 bk1\
  \ 的 id 设置为 300\nbk1.setId(300);\nSystem.out.println(\"集合包含: \" + s);\nSystem.out.println(\"\
  集合包含 bk1: \" + s.contains(bk1));\n}\n}\n清单 12-36.\n在集合中使用 BadKey 对象\n```\n\n```\n\
  集合包含: [100, 200]\n集合包含 bk1: true\n集合包含: [300, 200]\n集合包含 bk1: false\n```\n\n该程序将两个名为\
  \ `bk1` 和 `bk2` 的 `BadKey` 对象添加到 `Set` 中。输出的第一行确认集合包含这两个对象。然后，`bk1` 对象的 `id` 值从\
  \ 100 更改为 300，输出的第三行证实了这一点。由于你并未从集合中移除对象 `bk1`，因此输出的第四行出乎意料。输出的第四行指出对象 `bk1` 不存在于集合中，而输出的第三行则指出\
  \ `bk1` 对象在集合中。\n\n哪里出了问题？对象 `bk1` 到底在不在集合中？答案是，在你移除它之前，对象 `bk1` 一直在集合中。如果你使用 `for-each`\
  \ 循环或迭代器来访问集合中的所有对象，你仍然可以找到它。然而，集合（本例中为 Set）将无法找到对象 `bk1`。集合无法找到 `bk1` 对象的原因是，对象\
  \ `bk1` 的哈希码在它被添加到集合后发生了改变。回想一下，`HashSet` 是 Java 中一种基于哈希的集合。它使用对象的哈希码来定位对象将被放置的桶。当第二次执行\
  \ `s.contains(bk1)` 时，`bk1` 的哈希码将是 300，这是从其 `hashCode()` 方法返回的值。当对象 `bk1` 被放入集合时，其哈希码是\
  \ 200。由于对象 `bk1` 的哈希码已更改，集合会错误地识别一个不同的桶来定位它。由于集合在不同于对象 `bk1` 所在桶的位置寻找它，因此找不到它。问题出在哪里？问题出在\
  \ `BadKey` 类的 `hashCode()` 方法上。`BadKey` 类是一个可变类，并且该类的可变状态（`id` 实例变量）被用来计算其哈希码，这导致了在集合中定位对象时出现问题。\n\
  \n解决这种在集合中看似丢失 `BadKey` 对象问题的一种方法是，从其 `hashCode()` 方法返回一个常量值，例如 99。以下是 `BadKey`\
  \ 类的 `hashCode()` 方法的一个有效实现（尽管不是一个好的实现）：\n\n```\n// BadKey.java\npackage com.jdojo.collections;\n\
  public class BadKey {\n// 其他代码在此...\npublic int hashCode() {\n// 始终返回相同的值 99\nreturn\
  \ 99;\n}\n}\n```\n\n这段代码将解决清单 12-36 所示示例中丢失对象 `bk1` 的问题，因为 `BadKey` 类对象的哈希码永远不会改变。然而，它引入了另一个与基于哈希的集合性能相关的问题。如果你将\
  \ `BadKey` 类的对象存储在一个基于哈希的集合（例如 Set）中，所有对象都将哈希到同一个桶，因为 `BadKey` 类的所有对象都具有相同的哈希码值\
  \ 99。你解决了一个问题，却又引入了另一个问题！\n\n`BadKey` 类的主要问题在于其可变性。它只有一个名为 `id` 的可变实例变量。当你将可变对象与基于哈希的集合一起使用时，应考虑以下指导原则：\n\
  \n*   如果可能，应避免将可变类的对象用作 `Set` 的元素和 `Map` 的键。考虑使用不可变类的对象，例如 `String`、`Integer`，或你自己定义的不可变类，作为\
  \ `Map` 的键和 `Set` 的元素。\n\n*   非常谨慎地实现可变类的 `equals()` 和 `hashCode()` 方法。你必须确保可变类对象的\
  \ `hashCode()` 方法返回相同的值。否则，你将在基于哈希的集合中丢失对可变类对象的追踪。如果可变类的某些状态是不可变的，请使用这些不可变部分来计算其哈希码值，这样可变类对象的哈希码值就不会改变。作为最后的手段（不推荐），考虑从可变类的\
  \ `hashCode()` 方法返回一个常量整数。\n\n*   确保满足 `equals()` 和 `hashCode()` 方法的约定。\n\n总结\n\n\
  集合是一组对象。Java 提供了集合框架，其中包含多个接口和类，用于处理各种集合类型，例如列表、队列、集合和映射。集合框架提供了一个接口来表示特定类型的集合。框架中的每个接口至少有一个实现类，`Collection`\
  \ 接口除外。与集合相关的接口和类位于 `java.util` 包中。用于需要同步的多线程程序的集合类位于 `java.util.concurrent` 包中。\n\
  \n集合框架包含一个 `Collection` 接口，它是大多数集合的根接口。`Collection` 接口包含用于所有类型集合（基于 `Map` 的集合除外）的大部分方法。该接口提供了添加元素、移除元素、了解集合大小等方法。Collection\
  \ 接口的特定子接口提供了用于处理特定类型集合的额外方法。\n\n集合框架提供了一种统一的方式来遍历所有类型集合的元素，即使用迭代器。`Iterator` 接口的一个实例代表一个迭代器。所有集合都支持使用\
  \ `for-each` 循环和 `forEach()` 方法遍历其元素。\n\n在数学中，集合是一组无序的唯一元素。`Set` 接口的一个实例代表集合框架中的一个集合。`HashSet`\
  \ 是数学集合的实现类。\n\n`SortedSet` 的一个实例代表一个有序的唯一集合。`TreeSet` 是 `SortedSet` 接口的实现类。有序集合中的元素可以按自然顺序排序，也可以使用\
  \ `Comparator` 按自定义顺序排序。\n\n\n\n队列是一种用于逐个处理对象的集合。对象从一端进入队列，从另一端退出队列。Collections\
  \ 框架中的 `Queue` 接口代表队列。Collections 框架为 `Queue` 接口提供了多个实现类，以支持不同类型的队列，例如简单队列、阻塞队列、优先级队列、延迟队列等。\n\
  \n列表（List）是一个有序的对象集合。`List` 接口的实例代表 Collections 框架中的列表。`ArrayList` 和 `LinkedList`\
  \ 是 `List` 接口的两个实现类，它们分别由数组和链表支持。列表中的每个元素都有一个从 0 开始的索引。`List` 接口提供了方法，允许你使用元素的索引顺序或随机访问其元素。Collections\
  \ 框架仅支持密集列表；也就是说，列表中两个元素之间不能有间隙。\n\n映射（Map）是另一种类型的集合，用于存储键值对。映射中的键必须是唯一的。`Map` 接口的实例代表\
  \ Collections 框架中的映射。`HashMap` 是 `Map` 接口的简单实现类。Collections 框架还支持排序映射、可导航映射和并发映射。排序映射根据键对所有键值对进行排序存储。`SortedMap`\
  \ 接口的实例代表排序映射。`TreeMap` 是 `SortedMap` 接口的实现类。`NavigableMap` 和 `ConcurrentMap` 的实例分别代表可导航映射和并发映射。\n\
  \nCollections 框架包含一个名为 `Collections` 的工具类，其中仅包含静态方法。该类中的方法允许你对集合应用不同类型的算法——例如，打乱集合中的元素、旋转其元素、对列表元素进行排序等。该类还提供了获取集合不同视图的方法，例如只读视图、同步视图、不可修改视图等。\n\
  \n基于哈希的集合使用桶（bucket）来存储其元素。桶的数量根据集合中的元素数量和所需性能来确定。当向集合添加元素时，会使用元素的哈希码来确定存储该元素的桶。在集合中搜索元素时，会使用反向过程。基于哈希的集合提供了更快的元素存储和检索。\n\
  \n问题与练习\n\n1.  什么是 Collections 框架？\n\n2.  在 Collections 框架中，除映射外，所有集合都实现的接口名称是什么？\n\
