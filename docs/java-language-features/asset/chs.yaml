  com.jdojo.stackwalker/com.jdojo.stackwalker.LegacyStackWalk.main(LegacyStackWalk.java:8)\n\
  ```\n\n堆栈遍历的缺点\n\n在 JDK9 之前，堆栈遍历 API 存在以下几个缺点：\n\n*   效率不高。`Throwable` 类的 `getStackTrace()`\
  \ 方法返回整个堆栈的快照。无法仅获取堆栈中的顶部几个栈帧。\n\n*   栈帧包含方法名和类名，但不包含类引用。\n\n*   JVM 规范允许 VM 实现出于性能原因省略堆栈中的某些栈帧。因此，如果你有兴趣检查整个堆栈，当\
  \ VM 隐藏了某些栈帧时，你将无法做到。\n\n*   JDK 和其他库中的许多 API 都是调用者敏感的。它们基于调用者的类来运行。在现有的 API 中，没有简单有效的方法来获取调用者的类引用。此类\
  \ API 依赖于使用 JDK 内部 API——`sun.reflect.Reflection` 类的 `getCallerClass()` 静态方法。\n\n\
  *   没有简单的方法来过滤掉特定实现类的栈帧。\n\n现有 API 的这些缺点促使 JDK9 中引入了新的堆栈遍历 API，我将在下一节中解释。\n\nJDK9\
  \ 中的堆栈遍历\n\nJDK9 引入了一个新的堆栈遍历 API，它由 `java.lang` 包中一个名为 `StackWalker` 的类组成。该类提供了简单高效的堆栈遍历功能。它为当前线程提供栈帧的顺序流。栈帧按顺序报告，从生成堆栈的最顶层帧到最底层帧。`StackWalker`\
  \ 类非常高效，因为它惰性地评估栈帧。它还包含一个便捷方法来获取调用者类的引用。`StackWalker` 类包含以下成员：\n\n*   `StackWalker.Option`\
  \ 嵌套枚举\n\n*   `StackWalker.StackFrame` 嵌套接口\n\n*   获取 `StackWalker` 类实例的方法\n\n*\
  \   处理栈帧的方法\n\n*   获取调用者类的方法\n\n我将在后续章节中详细解释 `StackWalker` 类的每个组件及其用途。\n\n指定堆栈遍历选项\n\
  \n你可以通过指定零个或多个选项来配置 `StackWalker`。选项是 `StackWalker.Option` 枚举的常量之一。这些常量是：\n\n* \
  \  `RETAIN_CLASS_REFERENCE`\n\n*   `SHOW_HIDDEN_FRAMES`\n\n*   `SHOW_REFLECT_FRAMES`\n\
  \n如果指定了 `RETAIN_CLASS_REFERENCE` 选项，则 `StackWalker` 返回的栈帧将包含该帧所表示方法的声明类的 `Class`\
  \ 对象的引用。如果你还想获取方法调用者的 `Class` 对象引用，也需要指定此选项。默认情况下，此选项不存在。\n\n\n\n默认情况下，`StackWalker`\
  \ 类返回的帧流中不包含特定于实现的帧和反射帧。  \n使用 `SHOW_HIDDEN_FRAMES`  \n选项可包含所有隐藏帧。\n\n如果指定了 `SHOW_REFLECT_FRAMES`\
  \  \n选项，`StackWalker` 类返回的帧流将  \n包含反射帧。使用此选项仍可能隐藏  \n特定于实现的帧，你可以通过 `SHOW_HIDDEN_FRAMES`\
  \  \n选项显示这些帧。\n\n在后续章节中解释如何创建 `StackWalker` 类的实例时，  \n我将展示如何使用这些选项及其效果。\n\n表示栈帧\n\
  \n在 JDK9 之前，`StackTraceElement`  \n类的实例用于表示栈帧。JDK9 中的栈遍历 API  \n使用 `StackWalker.StackFrame`\
  \  \n接口的实例来表示栈帧。\n\n提示\n\n没有可供你直接使用的 `StackWalker.StackFrame`  \n接口的具体实现类。JDK 中的栈遍历\
  \ API  \n会在你检索栈帧时提供该接口的实例。\n\n`StackWalker.StackFrame`  \n接口包含以下方法，其中大部分与  \n`StackTraceElement`\
  \  \n类中的方法相同：\n\n*   `int getByteCodeIndex()`\n\n*   `String getClassName()`\n\n\
  *   `Class<?> getDeclaringClass()`\n\n*   `String getFileName()`\n\n*   `int getLineNumber()`\n\
  \n*   `String getMethodName()`\n\n*   `boolean isNativeMethod()`\n\n*   `StackTraceElement\
  \ toStackTraceElement()`\n\n在类文件中，每个方法都使用名为 `method_info` 的结构来描述。`method_info` \
  \ \n结构包含一个属性表，该表持有一个名为 `Code` 的可变长度属性。`Code` 属性  \n包含一个名为 `code` 的数组，该数组保存了方法的字节码指令。`getByteCodeIndex()`\
  \  \n方法返回 `Code` 属性中 `code` 数组的索引，该索引指向此帧所表示的执行点所在的方法。  \n对于本地方法，它返回 -1。有关 `code`\
  \ 数组和 `Code` 属性的更多信息，请参阅  \nJava 虚拟机规范第 4.7.3 节，网址为 [`https://docs.oracle.com/javase/specs/jvms/se9/html/`](https://docs.oracle.com/javase/specs/jvms/se9/html/)。\n\
  \n如何处理方法的代码数组？作为应用程序  \n开发者，你不会使用方法中执行点的字节码索引。  \nJDK 确实支持使用内部 API 读取类文件及其所有  \n\
  属性。你可以使用 `javap` 工具查看方法中每条指令的字节码索引，  \n该工具位于 `JDK_HOME\\bin`  \n目录中。你需要使用 `javap`\
  \ 的 `–c` 选项来打印  \n方法的代码数组。以下命令显示了 `LegacyStackWalk` 类中所有方法的 `code` 数组：\n\n```\n\
