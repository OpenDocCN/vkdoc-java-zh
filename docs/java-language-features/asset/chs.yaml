  FileFilter filter = file -> {\nif (file.isFile()) {\nString fileName = file.getName().toLowerCase();\n\
  if (fileName.endsWith(\".sys\")) {\nreturn false;\n}\n}\nreturn true ;\n};\n// 将过滤器对象传递给\
  \ listFiles() 方法以排除 .sys 文件\nFile[] list = dir.listFiles(filter);\nfor (File f :\
