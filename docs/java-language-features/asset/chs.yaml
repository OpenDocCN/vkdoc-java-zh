  用于测试 PrimeChecker 服务的主类\n```\n\n`checkPrimes()` 方法接收一个 `PrimeChecker` 实例和可变参数 `long`\
  \ 类型的数字。它使用 `PrimeChecker` 来检查这些数字是否为素数，并打印相应的消息。`main()` 方法获取默认的 `PrimeChecker`\
