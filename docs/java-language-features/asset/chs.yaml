  \n阻塞双端队列\n\n阻塞双端队列提供了双端队列和阻塞队列的功能。`BlockingDeque<E>` 接口的实例代表一个阻塞双端队列。它继承自 `Deque<E>`\
  \ 和 `BlockingQueue<E>` 接口。它增加了八个方法，用于从头部和尾部添加和移除元素。这些方法会无限期阻塞或阻塞指定时间，与 `BlockingQueue`\
  \ 的情况类似。新增的方法是 `putXxx()`、`offerXxx()`、`takeXxx()` 和 `pollXxx()`，其中 `Xxx` 是 `First`\
  \ 或 `Last`。后缀为 `First` 的方法用于从 `Deque` 的头部放入或取出元素，而后缀为 `Last` 的方法用于从其尾部放入或取出元素。有关使用这些方法的更多详细信息，请参阅本章前面描述的“双端队列”和“阻塞队列”部分。\n\
  \n\n\n`LinkedBlockingDeque<E>` 类是 `BlockingDeque<E>` 接口的一个实现类。它支持有界和无界的阻塞双端队列。\n\
  \n使用 Map\n\nMap 代表一种与你之前见过的集合不同的集合类型。它包含键值映射。你可以很容易地将 Map 想象成一个包含两列的表格。表格的第一列包含键；第二列包含与键关联的值。表\
  \ 12-5 展示了以人名作为键，其电话号码作为值的例子。你可以将这个表格视为一个包含姓名与电话号码之间映射关系的 Map。有时，Map 也被称为字典。在字典中，你有一个单词，然后查找它的含义。类似地，在\
  \ Map 中，你有一个键，然后查找它的值。\n\n表 12-5.\n\n一个包含两列（键和值）的表格。每一行包含一个键值对。\n\n| 键 | 值 |\n|\
  \ --- | --- |\n| John | (342)113-9878 |\n| Richard | (245)890-9045 |\n| Donna |\
  \ (205)678-9823 |\n| Ken | (205)678-9823 |\n\n如果你仍然难以想象 Map 是什么，你可以把它看作一个集合，其中每个元素代表一个键值对，形式为\
  \ `<key,value>`。一个 `<key,value>` 对在 Map 中也被称为一个条目。键和值必须是引用类型。你不能在 Map 中对键或值使用基本类型（`int`、`double`\
  \ 等）。\n\nMap 由 `Map<K,V>` 接口的一个实例表示，其中类型参数 `K` 和 `V` 分别是键和值的类型。`Map` 接口并非继承自 `Collection`\
  \ 接口。`Map` 不允许有重复的键。每个键恰好映射到一个值。换句话说，`Map` 中的每个键都只有一个值。值不必是唯一的。也就是说，两个键可以映射到同一个值。`Map`\
  \ 最多允许一个 `null` 值作为其键，并允许多个 `null` 值作为其值。然而，实现类可能会限制 `null` 作为 `Map` 中的值。\n\n`Map`\
  \ 接口中的方法根据它们执行的操作可以分为以下四类：\n\n*   基本操作方法\n*   批量操作方法\n*   视图操作方法\n*   比较操作方法\n\n\
  基本操作方法类别中的方法允许你对 `Map` 执行基本操作，例如，向 `Map` 中放入一个条目、获取指定键的值、获取条目数量、移除条目、检查 `Map` 是否为空等。此类方法的示例如下：\n\
  \n*   `int size()`\n*   `boolean isEmpty()`\n*   `boolean containsKey(Object key)`\n\
  *   `boolean containsValue(Object value)`\n*   `V get(Object key)`\n*   `V getOrDefault(Object\
  \ key, V defaultValue)`\n*   `V put(K key, V value)`\n*   `V putIfAbsent(K key,\
  \ V value)`\n*   `V remove(Object key)`\n*   `boolean remove(Object key, Object\
  \ value)`\n*   `boolean replace(K key, V oldValue, V newValue)`\n\n批量操作方法类别中的方法允许你对\
  \ `Map` 执行批量操作，例如，将条目从一个 `Map` 复制到另一个 `Map`，以及从 `Map` 中移除所有条目。此类方法的示例如下：\n\n*  \
  \ `void clear()`\n*   `void putAll(Map<? extends K, ? extends V> m)`\n*   `void\
  \ replaceAll(BiFunction<? super K,? super V,? extends V> function)`\n\n视图操作方法类别包含三个方法。每个方法都返回\
  \ `Map` 的一个不同视图。你可以将 `Map<K,V>` 中的所有键视为一个 `Set<K>`，将所有值视为一个 `Collection<V>`，并将所有\
  \ `<key,value>` 对视为一个 `Set<Map.Entry<K,V>>`。请注意，在 `Map` 中，所有键和所有 `<key,value>` 对始终是唯一的，这就是为什么你得到的是它们的\
  \ `Set` 视图。由于 `Map` 可能包含重复的值，因此你得到的是其值的 `Collection` 视图。此类方法的示例如下：\n\n*   `Set<K>\
  \ keySet()`\n*   `Collection<V> values()`\n*   `Set<Map.Entry<K,V>> entrySet()`\n\
  \n\n\n比较操作方法用于处理两个`Map`是否相等的比较。\n此类方法的示例如下：\n\n*   `boolean equals(Object o)`\n\n\
  *   `int hashCode()`\n\n`HashMap<K,V>`、\n`LinkedHashMap<K,V>`、\n和`WeakHashMap<K,V>`\n\
  是`Map<K,V>`接口的三个可用实现类。\n\n`HashMap`\n允许一个`null`值作为键，以及多个`null`值作为\n值。以下代码片段演示了如何创建和使用\n\
  `Map`。`HashMap`不\n保证`Map`中条目的任何特定迭代顺序。\n\n```\n// Create a map using HashMap as\
  \ the implementation class\nMap map = new HashMap();\n// Put an entry to the map\
  \ - \"John\" as the key and \"(342)113-9878\" as the value\nmap.put(\"John\", \"\
  (342)113-9878\");\n```\n\n`LinkedHashMap`\n是`Map`接口的另一个实现类。它\n使用双向链表在`Map`中存储条目。它将迭代顺序定义为条目的插入顺序。\n\
  如果你想按照插入顺序迭代`Map`中的条目，你需要使用`LinkedHashMap`而不是\n`HashMap`作为实现类。\n\n清单 12-29\n演示了如何使用`Map`。请注意，\n\
  `remove()`和`get()`方法返回\n键的值。如果键在`Map`中不存在，它们返回\n`null`。你必须\n使用`containsKey()`方法\n\
  检查键是否存在于`Map`中，或者使用`getOrDefault()`方法，\n该方法允许你在键不存在于映射中时指定默认值。`toString()`方法\n为`Map`中的所有条目返回一个格式良好的字符串。它将所有\n\
  条目放在大括号（`{}`）内。每个条目都以`key=value`格式\n格式化。逗号分隔两个条目。`Map`的`toString()`方法\n返回一个类似`{key1=value1,\
  \ key2=value2, key3=value3 ...}`的字符串。\n\n```\n// MapTest.java\npackage com.jdojo.collections;\n\
