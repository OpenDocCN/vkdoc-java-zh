  \ 包未开放，因此其他模块中的代码无法定位 `encapsulated.properties` 文件。`com.jdojo.exported` 包未开放，因此其他模块中的代码无法定位\
  \ `exported.properties` 文件。`com.jdojo.opened` 包是开放的，因此其他模块中的代码可以定位 `opened.properties`\
  \ 文件。此模块中的所有类文件都可以被其他模块中的代码定位。\n\n清单 15-11 包含一个名为 `jdojo.resource.test` 的模块的模块声明。此模块中的代码访问\
