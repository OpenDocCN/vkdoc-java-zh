  .limit(5)\n.forEach(System.out::println);\n```\n\n如果你只想处理原始类型值，你可以使用原始类型流接口的 `generate()`\
  \ 方法。例如，以下代码片段使用 `IntStream` 接口的 `generate()` 静态方法打印五个随机整数：\n\n```\nIntStream.generate(new\
  \ Random()::nextInt)\n.limit(5)\n.forEach(System.out::println);\n```\n\n如何生成一个重复值的无限流？例如，如何生成一个全零的无限流？以下代码片段展示了如何做到这一点：\n\
  \n```\nIntStream zeroes = IntStream.generate(() -> 0);\n```\n\n来自数组的流\n\n`java.util`\
  \ 包中的 `Arrays` 类包含一个重载的 `stream()` 静态方法，用于从数组创建顺序流。你可以使用它从 `int` 数组创建 `IntStream`，从\
  \ `long` 数组创建 `LongStream`，从 `double` 数组创建 `DoubleStream`，以及从引用类型 `T` 的数组创建 `Stream<T>`。以下代码片段从一个\
  \ `int` 数组和一个 `String` 数组创建了一个 `IntStream` 和一个 `Stream<String>`：\n\n```\n// 从包含元素\
  \ 1、2 和 3 的 int 数组创建流\nIntStream numbers = Arrays.stream(new int[]{1, 2, 3});\n\
  // 从包含元素 \"Ken\" 和 \"Jeff\" 的 String 数组创建流\nStream names = Arrays.stream(new String[]\
  \ {\"Ken\", \"Jeff\"});\n```\n\n提示\n\n你可以使用两种方法从引用类型数组创建流：`Arrays.stream(T[] t)`\
  \ 和 `Stream.of(T...t)` 方法。在库中提供两种方法来完成相同的事情是有意为之的。\n\n来自集合的流\n\n`Collection` 接口包含\
  \ `stream()` 和 `parallelStream()` 方法，它们分别从 `Collection` 创建顺序流和并行流。以下代码片段从一个字符串集合创建流：\n\
  \n\n\n```\nimport java.util.HashSet;\nimport java.util.Set;\nimport java.util.stream.Stream;\n\
  ...\n// 创建并填充一个字符串集合\nSet names = Set.of(\"Ken\", \"jeff\");\n// 从集合创建顺序流\nStream\
  \ sequentialStream = names.stream();\n// 从集合创建并行流\nStream parallelStream = names.parallelStream();\n\
  ```\n\n来自文件的流\n\nJava 8 在 `java.io` 和 `java.nio.file` 包中的类里添加了许多方法，以支持使用流进行 I/O\
  \ 操作。例如：\n\n*   你可以将文件中的文本作为字符串流来读取，其中每个元素代表文件中的一行文本。\n*   你可以从 `JarFile` 中获取 `JarEntry`\
  \ 流。\n*   你可以将目录中的条目列表作为 `Path` 流来获取。\n*   你可以获取在指定目录中搜索文件所得到的 `Path` 流。\n*   你可以获取包含指定目录文件树的\
  \ `Path` 流。\n\n在本节中，我将展示一些将流与文件 I/O 结合使用的示例。有关流相关方法的更多详细信息，请参阅 `java.nio.file.Files`、`java.io.BufferedReader`\
  \ 和 `java.util.jar.JarFile` 类的 API 文档。\n\n`BufferedReader` 和 `Files` 类包含一个 `lines()`\
  \ 方法，该方法惰性地读取文件，并将内容作为字符串流返回。流中的每个元素代表文件中的一行文本。当你使用完流后，需要关闭文件。调用流的 `close()` 方法将关闭底层文件。或者，你可以在\
  \ `try-with-resources` 语句中创建流，这样底层文件会被自动关闭。\n\n清单 13-5 中的程序展示了如何使用流读取文件内容。它还会遍历当前工作目录的整个文件树，并打印目录中的条目。该程序假设当前工作目录中存在\
  \ `luci1.txt` 文件（该文件随源代码提供）。如果文件不存在，则会打印一条包含预期文件绝对路径的错误消息。运行该程序时，你可能会得到不同的输出。\n\n\
  ```\n// IOStream.java\npackage com.jdojo.streams;\nimport java.io.IOException;\n\
  import java.nio.file.Files;\nimport java.nio.file.Path;\nimport java.nio.file.Paths;\n\
  import java.util.stream.Stream;\npublic class IOStream {\npublic static void main(String[]\
  \ args) {\n// 读取文件 luci1.txt 的内容\nreadFileContents(\"luci1.txt\");\n// 打印当前工作目录的文件树\n\
  listFileTree();\n}\npublic static void readFileContents(String filePath) {\nPath\
  \ path = Paths.get(filePath);\nif (!Files.exists(path)) {\nSystem.out.println(\"\
  文件 \"\n+ path.toAbsolutePath() + \" 不存在。\");\nreturn;\n}\ntry (Stream lines = Files.lines(path))\
  \ {\n// 读取并打印所有行\nlines.forEach(System.out::println);\n} catch (IOException e) {\n\
  e.printStackTrace();\n}\n}\npublic static void listFileTree() {\nPath dir = Paths.get(\"\
  \");\nSystem.out.printf(\"%n%s 的文件树%n\", dir.toAbsolutePath());\ntry (Stream fileTree\
  \ = Files.walk(dir)) {\nfileTree.forEach(System.out::println);\n} catch (IOException\
  \ e) {\ne.printStackTrace();\n}\n}\n}\n清单 13-5. 使用流执行文件 I/O\n```\n\n```\n我经历过奇异的激情冲动：\n\
  但我只敢在情人的耳边，\n倾诉那曾经降临我身的，\n一切际遇与变迁。\nC:\\Java9LanguageFeatures 的文件树\nbuild\nbuild\\\
  modules\nbuild\\modules\\com\nbuild\\modules\\com\\jdojo\n...\n```\n\n来自其他源的流\n\n\
  Java 8 在许多其他类中添加了方法，以流的形式返回它们所表示的内容。接下来将介绍两个你可能经常使用的方法。\n\n*   `CharSequence` 接口中的\
  \ `chars()` 方法返回一个 `IntStream`，其元素是表示 `CharSequence` 字符的 `int` 值。你可以在 `String`、`StringBuilder`\
  \ 和 `StringBuffer` 上使用 `chars()` 方法，以获取其内容的字符流，因为这些类实现了 `CharSequence` 接口。\n*  \
  \ `java.util.regex.Pattern` 类的 `splitAsStream(CharSequence input)` 方法返回一个 `String`\
  \ 流，其元素与模式匹配。\n\n让我们来看一个涵盖这两个类别的示例。以下代码片段从字符串创建字符流，过滤掉所有数字和空白字符，并打印剩余字符：\n\n```\n\
  String str = \"5 apples and 25 oranges\";\nstr.chars()\n.filter(n -> !Character.isDigit((char)n)\
  \ && !Character.isWhitespace((char)n))\n.forEach(n -> System.out.print((char)n));\n\
  ```\n\n```\napplesandoranges\n```\n\n以下代码片段通过使用正则表达式（`\",\"`）分割字符串来获取字符串流。匹配到的字符串会被打印到标准输出。\n\
  \n```\nString str = \"Ken,Jeff,Lee\";\nPattern.compile(\",\")\n.splitAsStream(str)\n\
  .forEach(System.out::println);\n```\n\n```\nKen\nJeff\nLee\n```\n\n表示可选值\n\n在 Java\
  \ 中，`null` 用于表示“无”或“空”结果。大多数情况下，如果方法没有结果可返回，它会返回 `null`。这一直是 Java 程序中频繁出现 `NullPointerException`\
  \ 的根源。考虑打印一个人的出生年份，如下所示：\n\n```\nPerson ken = new Person(1, \"Ken\", Person.Gender.MALE,\
  \ null, 6000.0);\nint year = ken.getDob().getYear(); // 抛出 NullPointerException\n\
  System.out.println(\"Ken 出生于 \" + year + \" 年\");\n```\n\n该代码在运行时抛出 `NullPointerException`。问题出在\
  \ `ken.getDob()` 方法的返回值上，该方法返回了 `null`。在 `null` 引用上调用 `getYear()` 方法会导致 `NullPointerException`。那么，解决方案是什么？事实上，对此并没有真正的解决方案。Java\
  \ 8 在 `java.util` 包中引入了 `Optional<T>` 类，以优雅地处理 `NullPointerException`。可能不返回任何内容的方法应返回\
  \ `Optional` 而不是 `null`。\n\n`Optional` 是一个容器对象，它可能包含也可能不包含非 null 值。如果它包含非 null 值，其\
  \ `isPresent()` 方法返回 `true`，否则返回 `false`。如果它包含非 null 值，其 `get()` 方法返回该非 null 值，否则抛出\
  \ `NoSuchElementException`。这意味着，当方法返回 `Optional` 时，作为实践，你必须在请求其值之前检查它是否包含非 null\
  \ 值。如果你在确保它包含非 null 值之前使用 `get()` 方法，你可能会得到 `NoSuchElementException`，而不是 `NullPointerException`。这就是为什么我在上一段中说对于\
  \ `NullPointerException` 并没有真正的解决方案。然而，返回 `Optional` 无疑是处理 `null` 的更好方式，因为开发者会逐渐习惯按照设计的方式使用\
  \ `Optional` 对象。\n\n如何创建 `Optional<T>` 对象？`Optional<T>` 类提供了以下静态工厂方法来创建其对象：\n\n\
  *   `<T> Optional<T> empty()`：返回一个空的 `Optional`。也就是说，此方法返回的 `Optional` 不包含非 null\
  \ 值。\n*   `<T> Optional<T> of(T value)`：返回一个包含指定 `value` 作为非 null 值的 `Optional`。如果指定的值为\
  \ `null`，则抛出 `NullPointerException`。\n*   `<T> Optional<T> ofNullable(T value)`：如果指定的\
  \ `value` 非 null，则返回包含该 `value` 的 `Optional`。如果指定的 `value` 为 `null`，则返回一个空的 `Optional`。\n\
  \n以下代码片段展示了如何创建 `Optional` 对象：\n\n\n\n```\n// 创建一个空的 Optional\nOptional empty =\
  \ Optional.empty();\n// 为字符串 \"Hello\" 创建一个 Optional\nOptional str = Optional.of(\"\
  Hello\");\n// 为一个可能为 null 的字符串创建 Optional\nString nullableString = \"\"; // 获取一个可能为\
  \ null 的字符串...\nOptional str2 = Optional.of(nullableString);\n```\n\n以下代码片段会在 `Optional`\
  \ 包含非 null 值时打印其中的值：\n\n```\n// 为字符串 \"Hello\" 创建一个 Optional\nOptional str = Optional.of(\"\
  Hello\");\n// 打印 Optional 中的值\nif (str.isPresent()) {\nString value = str.get();\n\
  System.out.println(\"Optional contains \" + value);\n} else {\nSystem.out.println(\"\
  Optional is empty.\");\n}\n```\n\n```\nOptional contains Hello\n```\n\n你可以使用 `Optional`\
  \ 类的 `ifPresent(Consumer<? super T> action)` 方法对 `Optional` 中包含的值执行操作。如果 `Optional`\
  \ 为空，此方法不执行任何操作。你可以将之前打印 `Optional` 中值的代码重写如下。请注意，如果 `Optional` 为空，代码将不会打印任何内容。\n\
  \n```\n// 为字符串 \"Hello\" 创建一个 Optional\nOptional str = Optional.of(\"Hello\");\n\
  // 如果存在，则打印 Optional 中的值\nstr.ifPresent(value -> System.out.println(\"Optional contains\
  \ \" + value));\n```\n\n```\nOptional contains Hello\n```\n\n以下是获取 `Optional` 值的四种方法：\n\
  \n*   `T get()`：\n    返回 `Optional` 中包含的值。如果 `Optional` 为空，则抛出 `NoSuchElementException`。\n\
  \n*   `T orElse(T defaultValue)`：返回 `Optional` 中包含的值。如果 `Optional` 为空，则返回指定的 `defaultValue`。\n\
  \n*   `T orElseGet(Supplier<? extends T> defaultSupplier)`：返回 `Optional` 中包含的值。如果\
  \ `Optional` 为空，则返回指定的 `defaultSupplier` 返回的值。\n\n*   `<X extends Throwable> T orElseThrow(Supplier<?\
  \ extends X> exceptionSupplier) throws X extends Throwable`：返回 `Optional` 中包含的值。如果\
  \ `Optional` 为空，则抛出指定的 `exceptionSupplier` 返回的异常。\n\n`Optional<T>` 类描述了一个非 null\
  \ 的引用类型值或其缺失。`java.util` 包中还包含另外三个类：`OptionalInt`、`OptionalLong` 和 `OptionalDouble`，用于处理可选的原始类型值。它们包含适用于原始数据类型的方法，名称类似，但获取值的方法除外。它们不包含\
  \ `get()` 方法。要返回它们的值，`OptionalInt` 类包含 `getAsInt()` 方法，`OptionalLong` 类包含 `getAsLong()`\
  \ 方法，`OptionalDouble` 类包含 `getAsDouble()` 方法。与 `Optional` 类的 `get()` 方法类似，原始类型 Optional\
  \ 类的 getter 方法在它们为空时也会抛出 `NoSuchElementException`。与 `Optional` 类不同，它们不包含 `ofNullable()`\
  \ 工厂方法，因为原始类型值不能为 `null`。以下代码片段展示了如何使用 `OptionalInt` 类：\n\n```\n// 创建一个空的 OptionalInt\n\
  OptionalInt empty = OptionalInt.empty();\n// 使用 OptionalInt 存储 287\nOptionalInt\
  \ number = OptionalInt.of(287);\nif (number.isPresent()){\nint value = number.getAsInt();\n\
  System.out.println(\"Number is \" + value);\n} else {\nSystem.out.println(\"Number\
  \ is absent.\");\n}\n```\n\n```\nNumber is 287\n```\n\nStreams API 中的几个方法在无返回值时会返回\
  \ `Optional`、`OptionalInt`、`OptionalLong` 和 `OptionalDouble` 的实例。例如，所有类型的流都允许你计算流中的最大元素。如果流为空，则不存在最大元素。请注意，在流管道中，你可能从一个非空流开始，但由于过滤或其他操作（如\
  \ limit、skip 等）而最终得到一个空流。因此，所有流类中的 `max()` 方法都返回一个 Optional 对象。清单 13-6 中的程序展示了如何从\
  \ `IntStream` 中获取最大整数。\n\n```\n// OptionalTest.java\npackage com.jdojo.streams;\n\
  import java.util.Comparator;\nimport java.util.Optional;\nimport java.util.OptionalInt;\n\
  import java.util.stream.IntStream;\nimport java.util.stream.Stream;\npublic class\
  \ OptionalTest {\npublic static void main(String[] args) {\n// 从流中获取奇整数的最大值\nOptionalInt\
  \ maxOdd = IntStream.of(10, 20, 30)\n.filter(n -> n % 2 == 1)\n.max();\nif (maxOdd.isPresent())\
  \ {\nint value = maxOdd.getAsInt();\nSystem.out.println(\"Maximum odd integer is\
  \ \" + value);\n} else {\nSystem.out.println(\"Stream is empty.\");\n}\n// 从流中获取奇整数的最大值\n\
  OptionalInt numbers = IntStream.of(1, 10, 37, 20, 31)\n.filter(n -> n % 2 == 1)\n\
  .max();\nif (numbers.isPresent()) {\nint value = numbers.getAsInt();\nSystem.out.println(\"\
  Maximum odd integer is \" + value);\n} else {\nSystem.out.println(\"Stream is empty.\"\
  );\n}\n// 获取最长的名称\nOptional name = Stream.of(\"Ken\", \"Ellen\", \"Li\")\n.max(Comparator.comparingInt(String::length));\n\
  if (name.isPresent()) {\nString longestName = name.get();\nSystem.out.println(\"\
  Longest name is \" + longestName);\n} else {\nSystem.out.println(\"Stream is empty.\"\
  );\n}\n}\n}\n清单 13-6.\n使用 Optional 值\n```\n\n```\nStream is empty.\nMaximum odd\
  \ integer is 37\nLongest name is Ellen\n```\n\nJava 9 为 `Optional<T>` 类添加了以下方法：\n\
  \n*   `void ifPresentOrElse(Consumer<? super T> action, Runnable emptyAction)`\n\
  \n*   `Optional<T> or(Supplier<? extends Optional<? extends T>> supplier)`\n\n*\
  \   `Stream<T> stream()`\n\n在我描述这些方法并展示一个完整程序演示其用法之前，请考虑以下 `Optional<Integer>` 列表：\n\
  \n```\nList> optionalList = List.of(Optional.of(1),\nOptional.empty(),\nOptional.of(2),\n\
  Optional.empty(),\nOptional.of(3));\n```\n\n该列表包含五个 `Optional` 元素，其中两个为空，三个包含值 1、2\
  \ 和 3。在后续讨论中我将引用此列表。\n\n`ifPresentOrElse()` 方法允许你提供两个备选操作。如果值存在，则使用该值执行指定的 `action`。否则，执行指定的\
  \ `emptyAction`。以下代码片段使用流遍历列表中的所有元素，如果 `Optional` 包含值则打印该值，如果 `Optional` 为空则打印 `\"\
  Empty\"` 字符串：\n\n```\noptionalList.stream()\n.forEach(p -> p.ifPresentOrElse(System.out::println,\n\
  () -> System.out.println(\"Empty\")));\n```\n\n```\n\nEmpty\n\nEmpty\n\n```\n\n\
  `or()` 方法在 `Optional` 包含非 null 值时返回 `Optional` 本身。否则，返回指定的 `supplier` 返回的 `Optional`。以下代码片段从一个\
  \ `Optional` 列表创建流，并使用 `or()` 方法将所有空的 `Optional` 映射为包含值 0 的 `Optional`。\n\n```\n\
  optionalList.stream()\n.map(p -> p.or(() -> Optional.of(0)))\n.forEach(System.out::println);\n\
  ```\n\n```\nOptional[1]\nOptional[0]\nOptional[2]\nOptional[0]\nOptional[3]\n```\n\
  \n`stream()` 方法返回一个顺序流，其中包含 `Optional` 中存在的值。如果 `Optional` 为空，则返回一个空流。假设你有一个 `Optional`\
  \ 列表，并且想要将所有存在的值收集到另一个列表中。在 Java 8 中，你可以这样实现：\n\n\n\n```\n// 打印所有非空 Optional 中的值\n\
  optionalList.stream()\n.filter(Optional::isPresent)\n.map(Optional::get)\n.forEach(System.out::println);\n\
  ```\n\n```\n\n```\n\n过去，你必须使用 `filter` 来过滤掉所有空的 `Optional`，并将剩余的 `Optional` 映射为其值。借助\
  \ JDK 9 中新增的 `stream()` 方法，你可以将 `filter()` 和 `map()` 操作合并为一次 `flatMap()` 操作，如下所示。我将在本章后续的“展平流”一节中详细讨论流的展平。\n\
  \n```\n// 打印所有非空 Optional 中的值\noptionalList.stream()\n.flatMap(Optional::stream)\n\
  .forEach(System.out::println);\n```\n\n```\n\n```\n\n对流应用操作\n\n表 13-1 列出了一些常用的流操作、它们的类型及描述。`Stream`\
  \ 接口包含一个与表中操作名称同名的方法。你在前面的章节中已经见过其中一些操作。后续章节将详细介绍它们。\n\n表 13-1.\n\nStreams API 支持的常用流操作列表\n\
