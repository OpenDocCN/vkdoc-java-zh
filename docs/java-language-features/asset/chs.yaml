  System.out.println(\"根目录列表：\");\nfor (File f : roots) {\nSystem.out.println(f.getPath());\n\
  }\n}\n}\n根目录列表：\nC:\\\nE:\\\n清单 7-4.\n列出机器上所有可用的根目录\n```\n\n你可以通过使用 `File` 类的 `list()`\
  \ 或 `listFiles()` 方法来列出目录中的所有文件和目录。它们之间的唯一区别是 `list()` 方法返回一个 `String` 数组，而 `listFiles()`\
  \ 方法返回一个 `File` 数组。你还可以在这些方法中使用文件过滤器，以从返回的结果中排除某些文件和目录。\n\n清单 7-5 演示了如何列出目录中的文件和目录。请注意，`list()`\
  \ 和 `listFiles()` 方法不会递归地列出文件和目录。你需要编写逻辑来递归地列出文件。你需要更改 `main()` 方法中 `dirPath` 变量的值。你可能会得到不同的输出。此处显示的是在\
  \ Windows 上运行该程序时的结果。\n\n\n\n```\n// FileLists.java\npackage com.jdojo.io;\nimport\
  \ java.io.File;\npublic class FileLists {\npublic static void main(String[] args)\
  \ {\n// 修改 dirPath 的值以列出您目录中的文件\nString dirPath = \"C:\\\\\";\nFile dir = new File(dirPath);\n\
  File[] list = dir.listFiles();\nfor (File f : list) {\nif (f.isFile()) {\nSystem.out.println(f.getPath()\
