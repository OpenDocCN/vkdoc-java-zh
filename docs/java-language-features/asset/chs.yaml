  \  \n\n引言\n\n## 本书的缘起\n\n我第一次接触 Java 编程语言是在 1997 年参加的一次为期一周的 Java 培训课程中。直到 1999\
  \ 年，我才有机会在项目中使用 Java。我阅读了两本 Java 书籍，并参加了 Java 2 程序员认证考试。我考得很好，得了 95 分。考试中答错的三道题让我意识到，我读过的那些书并没有充分涵盖所有主题的细节。于是我下定决心要写一本关于\
  \ Java 编程语言的书。我制定了一个计划，旨在涵盖 Java 开发者在项目中有效使用 Java 以及通过认证所需的大部分主题。最初，我计划用 700 到 800\
  \ 页的篇幅涵盖 Java 中所有基本主题。\n\n随着写作的深入，我意识到一本详细涵盖大多数 Java 主题的书不可能在 700 到 800 页内完成。仅数据类型、运算符和语句这一章就写了\
  \ 90 页。当时我面临一个问题：“我应该缩短书的内容，还是包含我认为 Java 开发者需要的所有细节？”我选择了在书中包含所有细节，而不是为了维持原定页数而缩减内容。我从未打算通过这本书赚大钱。我也从不急于完成这本书，因为仓促可能会损害质量和覆盖面。简而言之，我写这本书是为了帮助\
  \ Java 社区有效地理解和使用 Java 编程语言，而无需阅读多本同类书籍。我写这本书的计划是，为所有想要学习和掌握 Java 编程语言精妙之处的人提供一本全面的一站式参考书。\n\
  \n我高中时的一位老师曾告诉我们，如果想了解一栋建筑，就必须先了解构成这栋建筑的砖块、钢筋和砂浆。同样的逻辑也适用于我们生活中想要理解的大多数事物。它当然也适用于理解\
  \ Java 编程语言。如果你想掌握 Java 编程语言，你必须从理解其基本构建块开始。我在整本书中都采用了这种方法，努力通过先描述基础知识来逐步构建每个主题。在本书中，你很少会发现一个主题在没有先了解其背景的情况下就被描述。只要可能，我都试图将编程实践与日常生活中的活动联系起来。市面上大多数关于\
  \ Java 编程语言的书籍要么根本没有图片，要么只有寥寥几张。我相信这句格言：“一图胜千言。”对读者来说，一张图片能让主题更容易理解和记忆。我在书中加入了大量插图，以帮助读者理解和形象化这些概念。编程经验很少或没有的开发者很难将各个部分组合成一个完整的程序。考虑到这一点，本书包含了超过\
  \ 390 个完整的 Java 程序，这些程序可以直接编译和运行。\n\n在撰写本书时，我花了无数时间进行研究。我的主要来源是 Java 语言规范、关于 Java\
  \ 主题的白皮书和文章，以及 Java 规范请求（JSR）。我还花了不少时间阅读 Java 源代码，以更深入地了解某些 Java 主题。有时，在写出某个主题的第一句话之前，我需要花几个月的时间进行研究。最后，编写\
  \ Java 程序总是充满乐趣，有时我会花上几个小时来编写它们，以便将它们收录到书中。\n\n\n\n\n## 第二版简介\n\n我很高兴推出《Java 语言特性》一书的第二版。这是《Java\
  \ 9 入门》三卷系列中的第二卷。由于无法在一卷中涵盖所有 JDK 9 的变更，我已在包括本卷在内的三卷中，在适当位置加入了 JDK 9 特有的变更。如果你只对学习\
  \ JDK 9 特有的主题感兴趣，我建议你阅读我的《Java 9 揭秘》一书（ISBN 9781484225912），该书仅包含 JDK 9 特有的主题。本版有以下几处变更：\n\
  \n*   我在本版中新增了以下五章：实现服务（第 14 章）、模块 API（第 15 章）、打破模块封装（第 16 章）、响应式流（第 17 章）和栈遍历（第\
  \ 18 章）。\n*   在 Java 中实现服务对 JDK 9 来说并非新事物。我觉得本书之前缺少一章关于此主题的内容。第 14 章详细介绍了如何定义服务和服务接口，以及如何使用\
  \ JDK 9 特有和 JDK 9 之前的构造来实现服务接口。本章将向你展示如何在模块声明中使用 `uses` 和 `provides` 语句。\n*   第\
  \ 15 章详细介绍了模块 API，它使你可以通过编程方式访问模块。本章还涉及一些高级主题，例如模块层。本系列的第一卷涵盖了模块的基础知识，例如如何声明模块和模块依赖关系。\n\
  *   第 16 章介绍了如何使用命令行选项打破模块封装。当你迁移到 JDK 9 时，可能会出现需要读取模块内部 API 或导出未导出包的情况。你可以使用本章介绍的命令行选项来完成这些任务。\n\
  *   响应式流是一项旨在为具有非阻塞背压的异步流处理提供标准的倡议。它旨在解决处理项目流时遇到的问题，包括如何将项目流从发布者传递给订阅者，而无需发布者阻塞或订阅者拥有无界缓冲区。第\
  \ 17 章介绍了 JDK 9 中新增的响应式流 API。\n*   第 18 章介绍了 JDK 9 中新增的栈遍历 API。该 API 允许你检查线程的栈帧，并获取方法调用者类的类引用。在\
  \ JDK 9 之前，检查线程栈和获取调用者类名也是可能的，我在第一卷的第 13 章中介绍过。新的栈遍历 API 让你能够轻松高效地完成这项工作。\n*   我收到了读者们的多封邮件，提到本系列书籍没有包含问题和练习，而这些问题和练习主要是学生和初学者所需要的。学生们在\
  \ Java 课堂上使用本系列书籍，许多初学者也用它来学习 Java。应此广泛需求，我花了超过 60 个小时为每章末尾准备了问题和练习。我的朋友 Preethi\
  \ 提供了帮助并给出了解答。\n\n除了这些新增内容，我还更新了第一版中的所有章节。我编辑了内容使其更流畅，更改或添加了新的示例，并更新了内容以包含 JDK 9\
  \ 特有的特性。\n\n我衷心希望本版能帮助你更好地学习 Java。\n\n## 本书结构\n\n这是《Java 入门》三卷系列中的第二卷。本书包含 18 章。这些章节涵盖了\
  \ Java 的语言级主题，例如注解、泛型、Lambda 表达式、线程、I/O、集合、流等。各章按复杂度递增的顺序介绍 Java 主题。Java 9 的新特性已融入这些章节的适当位置。Java\
  \ 9 中新增的模块 API、响应式流和栈遍历 API 在各自的章节中进行了深入介绍。\n\n完成本书后，你可以通过学习本系列的最后一卷《Java API、扩展与库》中涵盖的\
  \ Java API 和模块，将你的 Java 知识提升到新的水平。\n\n## 目标读者\n\n本书旨在对任何想学习 Java 编程语言的人都有用。如果你是初学者，几乎没有或没有\
  \ Java 编程背景，建议你在阅读本书之前先阅读配套书籍《Java 9 基础入门》。本书包含各种复杂程度的主题。作为初学者，如果你在阅读某章的某个部分时感到吃力，可以跳到下一节或下一章，等获得更多经验后再回头阅读。\n\
  \n如果你是有中级或高级经验的 Java 开发者，你可以直接跳到某一章或某一章中的某一节。如果某节涉及不熟悉的主题，你需要在继续当前主题之前先了解该主题。\n\n\
  如果你阅读本书是为了获得 Java 编程语言的认证，你需要阅读几乎所有章节，并注意所有详细的描述和规则。大多数认证项目测试的是你对语言的基础知识，而非高级知识。你只需要阅读那些属于你认证考试范围的主题。编译并运行超过\
  \ 390 个完整的 Java 程序将帮助你为认证做准备。\n\n如果你是在参加 Java 编程语言课程的学生，你应该有选择地阅读本书的章节。有些主题——如 Lambda\
  \ 表达式、集合和流——在开发 Java 应用程序中被广泛使用，而其他主题——如线程和归档文件——则较少使用。你只需要阅读课程大纲中涵盖的那些章节。我相信，作为一名\
  \ Java 学生，你不需要逐页阅读整本书。\n\n## 如何使用本书\n\n本书是学习 Java 编程语言的开始，而非结束。如果你正在阅读本书，这意味着你正朝着学习\
  \ Java 编程语言的正确方向前进，这将使你在学术和职业生涯中脱颖而出。然而，总有更高的目标等待你去实现，你必须不断努力才能达成。以下来自一些伟大思想家的语录可能有助于你理解努力工作和始终保持开放心态、不断求知的重要性。\n\
  \n> 我们所拥有的学习和知识，最多也不过是我们所无知的事物中的一小部分。——柏拉图\n> 真正的知识在于知道自己一无所知。而知道自己一无所知，这使你成为所有人中最聪明的。——苏格拉底\n\
  \n建议读者在阅读本书时尽可能多地使用 Java 编程语言的 API 文档。Java API 文档包含了 Java 类库中所有可用内容的完整列表。你可以从甲骨文公司的官方网站\
  \ [`www.oracle.com`](http://www.oracle.com) 下载（或查看）Java API 文档。在阅读本书时，你需要练习编写 Java\
  \ 程序。你也可以通过修改本书提供的程序来进行练习。如果你只是阅读本书而不练习编写自己的程序，对你的学习过程帮助不大。请记住“熟能生巧”，这在学习如何用 Java\
  \ 编程时也同样适用。\n\n\n\n## 源代码与勘误\n\n本书的源代码可通过点击位于[`www.apress.com/9781484233474`](http://www.apress.com/9781484233474)的“下载源代码”按钮获取。\n\
  \n注意\n\n在付印时，Java 10 刚刚发布。为了向您提供关于其部分特性以及新版 Java 版本命名方案的有用信息，我编写了三个附录，您可以通过上述“下载源代码”按钮免费下载。这些附录将帮助您抢先了解\
  \ Java 10 最重要的特性。\n\n## 问题与评论\n\n请将所有针对作者的问题和评论发送至 `ksharan@jdojo.com`。\n\n作者在本书中引用的任何源代码或其他补充材料，读者均可通过本书在\
  \ GitHub 上的产品页面获取，该页面位于[`www.apress.com/9781484233474`](http://www.apress.com/9781484233474)。如需更详细信息，请访问[`http://www.apress.com/source-code`](http://www.apress.com/source-code)。\n\
