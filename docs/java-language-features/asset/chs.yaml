  \n与装饰器模式相比较的常用输入流类\n\n\n\n抽象基类组件是 `InputStream` 类，类似于 `Drink` 类。具体组件类包括 `FileInputStream`、`ByteArrayInputStream`\
  \ 和 `PipedInputStream`，它们类似于 `Rum`、`Vodka` 和 `Whiskey` 类。还有一个 `FilterInputStream`\
  \ 类，类似于 `DrinkDecorator` 类。请注意，输入流家族中的装饰器类在其类名中并未使用“Decorator”一词，而是命名为 `FilterInputStream`。它也没有像你声明\
  \ `DrinkDecorator` 类那样声明为抽象类。不将其声明为抽象似乎是类设计中的不一致之处。具体装饰器类包括 `BufferedInputStream`、`DataInputStream`\
  \ 和 `PushbackInputStream`，它们类似于饮料应用中的 `Honey` 和 `Spices` 类。一个显著的区别是 `ObjectInputStream`\
  \ 类是一个具体装饰器，它继承自抽象组件 `InputStream`，而不是抽象装饰器 `FilterInputStream`。请注意，具体装饰器的要求是：其直接或非直接超类中必须包含抽象组件类，并且必须有一个接受抽象组件作为参数的构造函数。`ObjectInputStream`\
  \ 类满足这些要求。\n\n一旦你理解了 Java I/O 中输入流的类设计基于装饰器模式，就应该能够轻松地使用这些类构建输入流。超类 `InputStream`\
  \ 包含从输入流读取数据的基本方法，这些方法由所有具体组件类以及所有具体装饰器类支持。对输入流的基本操作是从中读取数据。`InputStream` 类中定义的一些重要方法列在表\
  \ 7-2 中。请注意，你已经在 `SimpleFileReading` 类中使用了其中两个方法 `read()` 和 `close()` 来从文件读取数据。\n\
  \n表 7-2. InputStream 类的一些重要方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `int read()` | 从输入流中读取一个字节，并将读取的字节作为\
  \ `int` 返回。当到达输入流末尾时返回 -1。 |\n| `int read(byte[] buffer)` | 最多读取指定 `buffer` 长度的字节数。返回读取到\
  \ `buffer` 中的字节数。如果到达输入流末尾则返回 -1。 |\n| `int read(byte[] buffer, int offset, int\
  \ length)` | 最多读取指定 `length` 字节。数据从 `offset` 索引开始写入 `buffer`。返回读取的字节数，如果到达输入流末尾则返回\
  \ -1。 |\n| `byte[] readAllBytes()` | 从输入流中读取所有剩余字节，并将读取的字节以 `byte[]` 形式返回。此方法在 JDK9\
  \ 中被添加到 `InputStream` 类。 |\n| `int readNBytes(byte[] buffer, int offset, int length)`\
  \ | 从输入流中读取由 `length` 指定的请求字节数到给定的字节数组中。返回实际读取到 `buffer` 中的字节数。读取的数据从 `offset` 开始存储在缓冲区中。此方法在\
  \ JDK9 中被添加到 `InputStream` 类。 |\n| `void close()` | 关闭输入流。 |\n| `int available()`\
  \ | 返回在不阻塞的情况下可以从该输入流读取的估计字节数。 |\n| `long transferTo(OutputStream out)` | 从该输入流读取所有字节，并将这些字节写入指定的输出流。返回传输的字节数。此方法在\
  \ JDK9 中被添加到 `InputStream` 类。 |\n\n提示\n\n`InputStream` 中所有读取数据的方法都会阻塞，直到输入数据可供读取、到达输入流末尾或抛出异常。\n\
  \n让我们简要讨论四个输入流具体装饰器：`BufferedInputStream`、`PushbackInputStream`、`DataInputStream`\
  \ 和 `ObjectInputStream`。我在本节讨论 `BufferedInputStream` 和 `PushbackInputStream`。在“读写基本数据类型”部分讨论\
  \ `DataInputStream`。在“对象序列化”部分讨论 `ObjectInputStream`。\n\nBufferedInputStream\n\n\
  `BufferedInputStream` 通过缓冲数据为输入流添加功能。它维护一个内部缓冲区，用于存储从底层输入流读取的字节。当从输入流读取字节时，`BufferedInputStream`\
  \ 会读取比请求更多的字节，并将其缓冲在内部维护的缓冲区中。当请求读取一个字节时，它会检查请求的字节是否已存在于其缓冲区中。如果请求的字节存在于其缓冲区中，则从其缓冲区返回该字节。否则，它会再读取一些字节到缓冲区中，并仅返回请求的字节。它还支持对输入流进行标记和重置操作，以便你可以重新读取输入流中的字节。使用\
  \ `BufferedInputStream` 的主要好处是由于缓冲而带来的更快的速度。清单 7-18 展示了如何使用 `BufferedInputStream`\
  \ 读取文件内容。\n\n```\n// BufferedFileReading.java\npackage com.jdojo.io;\nimport java.io.BufferedInputStream;\n\
  import java.io.FileInputStream;\nimport java.io.FileNotFoundException;\nimport java.io.IOException;\n\
  public class BufferedFileReading {\npublic static void main(String[] args) {\nString\
  \ srcFile = \"luci1.txt\";\ntry (BufferedInputStream bis\n= new BufferedInputStream(new\
  \ FileInputStream(srcFile))) {\n// 一次读取一个字节并显示读取的数据\nbyte byteData;\nwhile ((byteData\
  \ = (byte) bis.read()) != -1) {\nSystem.out.print((char) byteData);\n}\n} catch\
  \ (FileNotFoundException e1) {\nFileUtil.printFileNotFoundMsg(srcFile);\n} catch\
  \ (IOException e2) {\ne2.printStackTrace();\n}\n}\n}\nSTRANGE fits of passion have\
  \ I known:\nAnd I will dare to tell,\nBut in the lover's ear alone,\nWhat once to\
  \ me befell.\n清单 7-18. 使用 BufferedInputStream 读取文件以获得更快的速度\n```\n\n`BufferedFileReading`\
  \ 类中的代码读取 `luci1.txt` 文件中的文本。清单 7-14 中的 `SimpleFileReading` 与清单 7-18 中的 `BufferedFileReading`\
  \ 之间的唯一区别是，后者为 `FileInputStream` 使用了装饰器 `BufferedInputStream`，而前者仅使用了 `FileInputStream`。在\
  \ `SimpleFileReading` 中，你按如下方式构造输入流：\n\n```\nString srcFile = \"luci1.txt\";\nFileInputStream\
  \ fis = new FileInputStream(srcFile);\n```\n\n在 `BufferedFileReading` 中，你按如下方式构造输入流：\n\
  \n```\nString srcFile = \"luci1.txt\";\nBufferedInputStream bis = new BufferedInputStream(new\
  \ FileInputStream(srcFile));\n```\n\n在此示例中，你可能不会发现 `BufferedFileReading` 相对于 `SimpleFileReading`\
  \ 有明显的速度提升，因为文件大小很小。在两个示例中，你都是一次读取一个字节，以使代码更易于阅读。你应该使用输入流 `read()` 方法的另一个版本，以便一次读取更多字节。使用\
  \ JDK9 中添加到 `InputStream` 的 `readAllBytes()` 方法，你可以一次性读取文件的全部内容。\n\nPushbackInputStream\n\
  \n`PushbackInputStream` 为输入流添加了功能，允许你使用其 `unread()` 方法取消读取字节（或推回已读取的字节）。`unread()`\
  \ 方法有三个版本。\n\n*   `void unread(byte[] buffer)`\n\n*   `void unread(byte[] buffer,\
  \ int offset, int length)`\n\n*   `void unread(int buffer)`\n\n\n\n`unread(int buffer)`\
  \ 方法允许你一次推回一个字节，另外两个方法则允许你一次推回多个字节。如果在调用输入流的 `unread()` 方法后调用 `read()` 方法，你将首先读取那些被推回的字节。当所有被推回的字节被重新读取完毕后，你才会开始从输入流中读取新的字节。例如，假设你的输入流包含一个字节字符串\
  \ `HELLO`。如果你读取两个字节，你将读取到 `HE`。如果你调用 `unread((byte) 'E')` 来推回刚刚读取的最后一个字节，那么后续的读取将返回\
  \ `E`，再接下来的读取将读取到 `LLO`。\n\n清单 7-19 演示了 `PushbackInputStream` 的使用。该程序从当前工作目录下的 `luci1.txt`\
  \ 文件中读取威廉·华兹华斯诗歌《露西》的第一节。它从文件中读取每个字节两次，如输出所示。例如，`STRANGE` 被读取为 `SSTTRRAANNGGEE`。你可能会注意到两行之间有一个空行，这是因为每个换行符也被读取了两次。\n\
  \n```\n// PushbackFileReading.java\npackage com.jdojo.io;\nimport java.io.PushbackInputStream;\n\
  import java.io.FileInputStream;\nimport java.io.FileNotFoundException;\nimport java.io.IOException;\n\
  public class PushbackFileReading {\npublic static void main(String[] args) {\nString\
  \ srcFile = \"luci1.txt\";\ntry (PushbackInputStream pis\n= new PushbackInputStream(new\
  \ FileInputStream(srcFile))) {\n// 一次读取一个字节并显示\nbyte byteData;\nwhile ((byteData\
  \ = (byte) pis.read()) != -1) {\nSystem.out.print((char) byteData);\n// 推回刚刚读取的最后一个字节\n\
  pis.unread(byteData);\n// 重新读取我们推回（或回退）的字节\nbyteData = (byte) pis.read();\nSystem.out.print((char)\
  \ byteData);\n}\n} catch (FileNotFoundException e1) {\nFileUtil.printFileNotFoundMsg(srcFile);\n\
  } catch (IOException e2) {\ne2.printStackTrace();\n}\n}\n}\nSSTTRRAANNGGEE  ffiittss\
  \  ooff  ppaassssiioonn  hhaavvee  II  kknnoowwnn::\nAAnndd  II  wwiillll  ddaarree\
  \  ttoo  tteellll,,\nBBuutt  iinn  tthhee  lloovveerr''ss  eeaarr  aalloonnee,,\n\
  WWhhaatt  oonnccee  ttoo  mmee  bbeeffeellll..\n清单 7-19.\n使用 PushbackInputStream\
  \ 类\n```\n\n输出流与装饰器模式\n\n图 7-6 展示了包含一些常用输出流类的类图。你可以参考 `java.io` 包的 API 文档以获取输出流类的完整列表。类图中的注释将输出流类与实现装饰器模式所需的类进行了比较。请注意，输出流的类图与输入流以及饮料应用程序的类图相似。\n\
  \n![A323070_2_En_7_Fig6_HTML.jpg](img/A323070_2_En_7_Fig6_HTML.jpg)\n\n图 7-6.\n\n\
  一些常用的输出流类与装饰器模式的对比\n\n大多数情况下，如果你知道输入流类的名称，可以通过将类名中的“Input”替换为“Output”来找到对应的输出流类。例如，对于\
  \ `FileInputStream` 类，有对应的 `FileOutputStream` 类；对于 `BufferedInputStream` 类，有对应的\
  \ `BufferedOutputStream` 类，以此类推。并非每个输入流类都有对应的输出流类；例如，`PushbackInputStream` 类就没有对应的输出流类。你可能会发现一些不在输入流类层次结构中的新类，因为它们在读取数据时没有意义；例如，在输出流类层次结构中有一个新的具体装饰器类\
  \ `PrintStream`。表 7-3 比较了装饰器模式、你的饮料应用程序以及输出流中的类。\n\n表 7-3.\n\n比较装饰器模式、饮料应用程序和输出流中的类\n\
  \n装饰器模式\n |\n  饮料应用程序\n |\n  输出流\n |\n\n\n\n| --- | --- | --- | --- | --- | ---\
  \ | --- |\n\n`组件`\n |\n  `饮料`\n |\n  `输出流`\n |\n\n`具体组件 A`\n\n`具体组件 B`\n |\n  `朗姆酒`\n\
  \n`伏特加`\n\n`威士忌`\n |\n  `FileOutputStream ByteArrayOutputStream`\n\n`PipedOutputStream`\n\
  \ |\n\n`装饰器`\n |\n  `饮料装饰器`\n |\n  `FilterOutputStream`\n |\n\n`具体装饰器 A`\n\n`具体装饰器\
  \ B`\n |\n  `蜂蜜`\n\n`香料`\n |\n  `BufferedOutputStream`\n\n`DataOutputStream`\n\n\
  `ObjectOutputStream`\n |\n\n抽象超类`OutputStream`中定义了三个重要方法：`write()`、`flush()`和`close()`。`write()`方法用于向输出流写入字节。它有三个版本，允许你一次写入一个字节或多个字节。在清单\
  \ 7-17 的`SimpleFileWriting`类中，你曾用它向文件写入数据。`flush()`方法用于刷新所有缓冲的字节到数据接收端。`close()`方法用于关闭输出流。\n\
  \n将具体装饰器与输出流的具体组件类结合使用的技术，与输入流类相同。例如，要使用`BufferedOutputStream`装饰器来提高写入文件的速度，请使用以下语句：\n\
  \n```\nBufferedOutputStream bos = new BufferedOutputStream(\nnew FileOutputStream(\"\
  你的输出文件路径\")\n);\n```\n\n要向`ByteArrayOutputStream`写入数据，请使用以下语句：\n\n```\nByteArrayOutputStream\
  \ baos = new ByteArrayOutputStream();\nbaos.write(buffer); // 这里，buffer 是一个字节数组\n\
  ```\n\n`ByteArrayOutputStream`提供了一些重要方法：`reset()`、`size()`、`toString()`和`writeTo()`。`reset()`方法会丢弃所有已写入的字节；`size()`方法返回已写入流的字节数；`toString()`方法返回流中字节的字符串表示形式；`writeTo()`方法将流中的字节写入另一个输出流。例如，如果你已将一些字节写入名为`baos`的`ByteArrayOutputStream`，并希望将其内容写入由名为`fos`的`FileOutputStream`表示的文件，则可以使用以下语句：\n\
  \n```\n// 所有写入 baos 的字节都被写入 fos\nbaos.writeTo(fos);\n```\n\n本节不再介绍更多写入输出流的示例。你可以将清单\
  \ 7-17 中的`SimpleFileWriting`类作为示例，来使用任何其他类型的输出流。你可以通过将任何输出流的具体装饰器用作具体组件或另一个具体装饰器的包装对象来使用它们。我将在后续章节中结合示例讨论`DataOutputStream`、`ObjectOutputStream`和`PrintStream`类。\n\
  \nPrintStream\n\n`PrintStream`类是输出流的一个具体装饰器，如图 7-6 所示。它为输出流增加了以下功能：\n\n*   它包含一些方法，允许你以适合打印的格式打印任何数据类型（基本类型或对象）的值。\n\
  \n*   其向输出流写入数据的方法不会抛出`IOException`。如果某个方法调用抛出了`IOException`，它会设置一个内部标志，而不是将异常抛出给调用者。可以使用其`checkError()`方法检查该标志，如果方法执行期间发生了`IOException`，该方法返回`true`。\n\
  \n*   它具有自动刷新功能。你可以在其构造函数中指定它应自动刷新写入的内容。如果将自动刷新标志设置为`true`，则在写入字节数组、使用其重载的`println()`方法之一写入数据、写入换行符或写入一个字节（`\\\
  n`）时，它将刷新其内容。\n\n`PrintStream`类中的一些重要方法如下：\n\n*   `void print(Xxx arg)`\n\n*   `void\
  \ println(Xxx arg)`\n\n*   `PrintStream printf(String format, Object... args)`\n\
  \n*   `PrintStream printf(Locale l, String format, Object... args)`\n\n这里，`Xxx`是任何基本数据类型（`int,\
  \ char, float`等）、`String`或`Object`。\n\n`print(Xxx arg)`方法以可打印格式将指定的`arg`值写入输出流。例如，你可以使用`print(10)`向输出流写入一个整数。`Xxx`还包括两种引用类型：`String`和`Object`。如果你的参数是一个对象，则会调用该对象的`toString()`方法，并将返回的字符串写入输出流。如果对象类型参数是`null`，则会将字符串“null”写入输出流。请注意，所有输入和输出流都是基于字节的。当我提到打印流将“null”字符串写入输出流时，意味着打印流将字符串“null”转换为字节，并将这些字节写入输出流。字符到字节的转换是基于平台的默认字符编码完成的。你也可以在`PrintStream`类的某些构造函数中提供用于此类转换的字符编码。\n\
  \n`println(XXX arg)`方法的工作方式与`print(XXX arg)`方法类似，但有一个区别。它会在指定的`arg`后附加一个行分隔符字符串。也就是说，它向输出流写入一个`arg`值和一个行分隔符。不带参数的`println()`方法用于向输出流写入一个行分隔符。行分隔符是平台相关的，由名为`line.separator`的系统属性决定。\n\
  \n`printf()`方法用于向输出流写入格式化字符串。例如，如果你想以`\"Today is: <today-date>\"`的形式向输出流写入一个字符串，可以像下面这样使用其`printf()`方法：\n\
  \n```\n// 假设日期格式为 mm/dd/yyyy，ps 是 PrintStream 对象引用\nps.printf(\"Today is: %1$tm/%1$td/%1$tY\"\
  , java.time.LocalDate.now());\n```\n\n清单 7-20 演示了如何使用`PrintStream`写入文件。它将威廉·华兹华斯的诗歌《露西》中的另一节写入一个名为`luci3.txt`的文件。运行此程序后，文件内容如下：\n\
