  \ 13-7 中的程序展示了如何使用 `forEach()` 方法将所有女性的收入增加 10%。输出显示只有 Donna 的收入增加了，因为另一位名叫 Laynie\
  \ 的女性之前的收入为 0.0。\n\n```\n// ForEachTest.java\npackage com.jdojo.streams;\nimport\
  \ java.util.List;\npublic class ForEachTest {\npublic static void main(String[]\
  \ args) {\n// 获取人员列表\nList persons = Person.persons();\n// 打印列表\nSystem.out.println(\"\
