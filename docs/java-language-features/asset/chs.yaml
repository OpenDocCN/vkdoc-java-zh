  ```\n\n`lookupResource()` 方法被重载了。它们使用三个类来定位资源：`Module`、`Class` 和 `ClassLoader`。这些方法将资源名称和资源引用传递给\
  \ `print()` 方法来打印消息。\n\n`main()` 方法准备了一个资源列表，它希望使用不同的资源查找方法来查找这些资源。它将列表存储在一个 `String`\
  \ 数组中：\n\n```\n// 资源列表\nString[] resources = {/* 资源列表 */};\n```\n\n`main()` 方法尝试使用\
  \ `jdojo.resource` 模块的引用来查找所有资源。请注意，`AppResource` 类位于 `jdojo.resource` 模块中，因此 `AppResource.class.getModule()`\
  \ 方法返回 `jdojo.resource` 模块的引用。\n\n```\nSystem.out.println(\"使用模块：\");\nModule otherModule\
  \ = AppResource.class.getModule();\nfor (String resource : resources) {\nlookupResource(otherModule,\
  \ resource);\n}\n```\n\n代码找到了 `jdojo.resource` 模块中所有未命名包、无效包和开放包中的类文件及所有资源。请注意，`java/lang/Object.class`\
  \ 未被找到，因为它位于 `java.base` 模块中，而不是 `jdojo.resource` 模块中。`jdojo.resource.test` 模块中的资源也因相同原因未被找到。\n\
  \n现在，`main()` 方法使用一个代表 `ResourceTest` 类的 `Class` 对象来定位相同的资源，该类位于 `jdojo.resource.test`\
  \ 模块中。\n\n```\nClass cls = ResourceTest.class;\nfor (String resource : resources)\
  \ {\n// 在所有资源名称前添加 / 以使其成为绝对名称\nlookupResource(cls, \"/\" + resource);\n}\n```\n\
  \n这个 `Class` 对象将仅在 `jdojo.resource.test` 模块中定位资源，这在输出中显而易见。在代码中，我在资源名称前添加了斜杠，因为\
  \ `Class` 类中的资源查找方法会将不以斜杠开头的资源名称视为相对资源名称，并在其前面加上该类的包名。\n\n\n\n最终，`main()` 方法使用系统类加载器和平台类加载器来定位同一组资源：\n\
  \n```\nClassLoader clSystem = ClassLoader.getSystemClassLoader();\nfor (String resource\
  \ : resources) {\nlookupResource(clSystem, resource);\n}\nClassLoader clPlatform\
  \ = ClassLoader.getPlatformClassLoader();\nfor (String resource : resources) {\n\
  lookupResource(clPlatform, resource);\n}\n```\n\n类加载器会在其自身或其祖先类加载器已知的所有模块中定位资源。系统类加载器加载了\
  \ `jdojo.resource` 和 `jdojo.resource.test` 模块，因此它会在这些模块中查找资源，但需遵守资源查找规则所施加的限制。其父类的父类加载器（即启动类加载器）从\
  \ `java.base` 模块加载了 `Object` 类，因此系统类加载器可以定位到 `java/lang/Object.class` 文件。\n\n平台类加载器不加载\
  \ `jdojo.resource` 和 `jdojo.resource.test` 应用程序模块。从输出中可以明显看出，平台类加载器只找到了一个资源，即 `java/lang/Object.class`，该资源由其父类加载器（启动类加载器）加载。\n\
  \n访问运行时映像中的资源\n\n让我们通过几个示例来了解如何访问运行时映像中的资源。在 JDK9 之前，你可以使用 `ClassLoader` 类的 `getSystemResource()`\
  \ 静态方法。以下是在 JDK8 中查找 `Object.class` 文件的代码。输出显示了使用 `jar` 方案并指向 `rt.jar` 文件的返回 URL。\n\
  \n```\nimport java.net.URL;\n...\nString resource = \"java/lang/Object.class\";\n\
  URL url = ClassLoader.getSystemResource(resource);\nSystem.out.println(url);\n```\n\
  \n```\njar:file:/C:/java8/jre/lib/rt.jar!/java/lang/Object.class\n```\n\nJDK9 不再将运行时映像存储在\
  \ JAR 中。它以一种内部格式存储，这种格式将来可能会改变。JDK 提供了一种使用 `jrt` 方案以格式和位置无关的方式访问运行时资源的方法。之前的代码在\
  \ JDK9 中也能工作，但会返回一个使用 `jrt` 方案（而非 `jar` 方案）的 URL，如下所示：\n\n```\njrt:/java.base/java/lang/Object.class\n\
  ```\n\n提示\n\n如果你的代码从运行时映像访问资源，并且期望得到一个使用 `jar` 方案的 URL，那么在 JDK9 中需要修改，因为你将得到一个使用\
  \ `jrt` 方案的 URL。\n\n使用 `jrt` 方案的语法如下：\n\n```\njrt://\n```\n\n这里，`<module-name>`\
  \ 是模块的名称，`<path>` 是该模块中特定类或资源文件的路径。`<module-name>` 和 `<path>` 都是可选的。URL `jrt:/`\
  \ 指的是当前运行时映像中存储的所有类和资源文件。`jrt:/<module-name>` 指的是存储在 `<module-name>` 模块中的所有类和资源文件。`jrt:/<module-name>/<path>`\
  \ 指的是 `<module-name>` 模块中名为 `<path>` 的特定类或资源文件。以下是两个使用 `jrt` 方案引用类文件和资源文件的 URL 示例：\n\
  \n*   `jrt:/java.sql/java/sql/Driver.class`\n\n*   `jrt:/java.desktop/sun/print/resources/duplex.png`\n\
  \n第一个 URL 指定了 `java.sql` 模块中 `java.sql.Driver` 类的类文件。第二个 URL 指定了 `java.desktop`\
  \ 模块中的图像文件 `sun/print/resources/duplex.png`。\n\n提示\n\n你可以使用 `jrt` 方案访问运行时映像中的资源，而使用\
  \ `Module`、`Class` 和 `ClassLoader` 类中的资源查找方法则很难访问到这些资源。\n\n你可以使用 `jrt` 方案创建一个 `URL`。以下代码片段展示了如何从运行时映像中将图像文件读入\
  \ `Image` 对象，以及将类文件读入 `byte` 数组。暂时不必担心此代码中涉及的模块和包等细节：\n\n```\n// 将 duplex.png 加载到\
  \ Image 对象中\nURL imageUrl = new URL(\"jrt:/java.desktop/sun/print/resources/duplex.png\"\
  );\nImage image = ImageIO.read(imageUrl);\n// 在此处使用 image 对象\nSystem.out.println(image);\n\
  // 加载 Object.class 文件的内容\nURL classUrl = new URL(\"jrt:/java.base/java/lang/Object.class\"\
  );\nInputStream input = classUrl.openStream();\nbyte[] bytes = input.readAllBytes();\n\
  System.out.println(\"Object.class 文件大小: \" + bytes.length);\n```\n\n```\nBufferedImage@26a7b76d:\
  \ type = 6 ColorModel: #pixelBits = 32 numComponents = 4 color space = java.awt.color.ICC_ColorSpace@4cf4d528\
  \ transparency = 3 has alpha = true isAlphaPre = false ByteInterleavedRaster: width\
  \ = 41 height = 24 #numDataElements 4 dataOff[0] = 3\nObject.class 文件大小: 1932\n\
  ```\n\n何时可以使用其他形式的 `jrt` 方案来表示运行时映像中的所有文件和模块中的所有文件？你可以使用 `jrt` 方案引用一个模块，以便在 Java\
  \ 策略文件中授予权限。Java 策略文件中的以下条目授予 `java.activation` 模块中代码所有权限：\n\n```\ngrant codeBase\
  \ \"jrt:/java.activation\" {\npermission java.security.AllPermission;\n}\n```\n\n\
  许多工具和 IDE 需要枚举运行时映像中的所有模块、包和文件。JDK9 附带了一个针对 `jrt` URL 方案的只读 NIO `FileSystem` 提供程序。你可以使用此提供程序列出运行时映像中的所有类和资源文件。有些工具和\
  \ IDE 将在 JDK8 上运行，但支持 JDK9 的代码开发。这些工具也需要获取 JDK9 运行时映像中的类和资源文件列表。当你安装 JDK9 时，其 `lib`\
  \ 目录中包含一个 `jrt-fs.jar` 文件。你可以将此 JAR 文件添加到在 JDK8 上运行的工具的类路径中，并按如下方式使用 `jrt` 文件系统。\n\
  \n`jrt` 文件系统包含一个由斜杠（`/`）表示的根目录，该目录包含两个名为 `packages` 和 `modules` 的子目录：\n\n```\n/\n\
  /packages\n/modules\n```\n\n以下代码片段为 `jrt` URL 方案创建了一个 NIO `FileSystem`：\n\n```\n\
  // 创建一个 jrt FileSystem\nFileSystem fs = FileSystems.getFileSystem(URI.create(\"\
  jrt:/\"));\n```\n\n以下代码片段读取一个图像文件和 `Object.class` 文件的内容：\n\n```\n// 从模块加载图像\nPath\
  \ imagePath = fs.getPath(\"modules/java.desktop\", \"sun/print/resources/duplex.png\"\
  );\nImage image = ImageIO.read(Files.newInputStream(imagePath));\n// 在此处使用 image\
  \ 对象\nSystem.out.println(image);\n// 读取 Object.class 文件内容\nPath objectClassPath\
  \ = fs.getPath(\"modules/java.base\", \"java/lang/Object.class\");\nbyte[] bytes\
  \ = Files.readAllBytes(objectClassPath);\nSystem.out.println(\"Object.class 文件大小:\
  \ \" + bytes.length);\n```\n\n```\nBufferedImage@371a67ec: type = 6 ColorModel:\
  \ #pixelBits = 32 numComponents = 4 color space = java.awt.color.ICC_ColorSpace@fe18270\
  \ transparency = 3 has alpha = true isAlphaPre = false ByteInterleavedRaster: width\
  \ = 41 height = 24 #numDataElements 4 dataOff[0] = 3\nObject.class 文件大小: 1932\n\
  ```\n\n以下代码片段打印运行时映像中所有模块的所有条目（类和资源文件）。类似地，你可以为 `packages` 创建一个 `Path` 来枚举运行时映像中的所有包。\n\
  \n```\n// 列出运行时映像中的所有模块\nPath modules = fs.getPath(\"modules\");\nFiles.walk(modules)\n\
  .forEach(System.out::println);\n```\n\n```\n/modules\n/modules/java.base\n/modules/java.base/java\n\
  /modules/java.base/java/lang\n/modules/java.base/java/lang/Object.class\n...\n```\n\
  \n让我们看一个从运行时映像访问资源的完整程序。清单 15-13 包含一个名为 `jdojo.resource.jrt` 的模块的模块声明。清单 15-14 包含一个名为\
  \ `JrtFileSystem` 的类的源代码，该类位于 `jdojo.resource.jrt` 模块中。\n\n\n\n```\n// module-info.java\n\
  module jdojo.resource.jrt {\nrequires java.desktop;\n}\n清单 15-13.\n名为 jdojo.resource.jrt\
  \ 的模块的模块声明\n```\n\n```\n// JrtFileSystem.java\npackage com.jdojo.resource.jrt;\n\
  import java.awt.Image;\nimport java.io.IOException;\nimport java.net.URI;\nimport\
  \ java.nio.file.FileSystem;\nimport java.nio.file.FileSystems;\nimport java.nio.file.Files;\n\
  import java.nio.file.Path;\nimport javax.imageio.ImageIO;\npublic class JrtFileSystem\
  \ {\npublic static void main(String[] args) throws IOException {\n// 创建一个 jrt 文件系统\n\
  FileSystem fs = FileSystems.getFileSystem(URI.create(\"jrt:/\"));\n// 从模块中加载一张图片\n\
  Path imagePath = fs.getPath(\"modules/java.desktop\", \"sun/print/resources/duplex.png\"\
  );\nImage image = ImageIO.read(Files.newInputStream(imagePath));\n// 在此处使用 image\
  \ 对象\nSystem.out.println(image);\n// 读取 Object.class 文件内容\nPath objectClassPath\
  \ = fs.getPath(\"modules/java.base\", \"java/lang/Object.class\");\nbyte[] bytes\
  \ = Files.readAllBytes(objectClassPath);\nSystem.out.println(\"Object.class 文件大小:\
  \ \" + bytes.length);\n// 列出运行时镜像中的 5 个包\nPath packages = fs.getPath(\"packages\"\
  );\nFiles.walk(packages)\n.limit(5)\n.forEach(System.out::println);\n// 列出运行时镜像中\
  \ 5 个模块的条目\nPath modules = fs.getPath(\"modules\");\nFiles.walk(modules)\n.limit(5)\n\
  .forEach(System.out::println);\n}\n}\n清单 15-14.\n一个演示如何使用 jrt URL 方案从运行时镜像访问资源的\
  \ JrtFileSystem 类\n```\n\n```\nBufferedImage@371a67ec: type = 6 ColorModel: #pixelBits\
  \ = 32 numComponents = 4 color space = java.awt.color.ICC_ColorSpace@fe18270 transparency\
  \ = 3 has alpha = true isAlphaPre = false ByteInterleavedRaster: width = 41 height\
  \ = 24 #numDataElements 4 dataOff[0] = 3\nObject.class file size: 1932\npackages\n\
  packages/com\npackages/com/java.activation\npackages/com/java.base\npackages/com/java.corba\n\
  modules\nmodules/java.desktop\nmodules/java.desktop/sun\nmodules/java.desktop/sun/print\n\
  modules/java.desktop/sun/print/resources\n```\n\n请注意，程序仅从 `packages` 和 `modules`\
  \ 目录中打印了五个条目。另请注意，您能够访问 `sun/print/resources/duplex.png`，它位于 `java.desktop` 模块中。`java.desktop`\
  \ 模块并未打开 `sun.print.resources` 包。使用 `Module`、`Class` 和 `ClassLoader` 类中的任何资源查找方法来定位\
  \ `sun/print/resources/duplex.png` 都会失败。\n\n模块注解\n\n您可以在模块声明上使用注解。`java.lang.annotation.ElementType`\
  \ 枚举有一个名为 `MODULE` 的新值。如果您在注解声明中使用 `MODULE` 作为目标类型，则允许该注解用于模块。在 Java 9 中，两个注解——`java.lang.Deprecated`\
  \ 和 `java.lang.SuppressWarnings`——已被更新，可用于模块声明。它们可以如下使用：\n\n```\n@Deprecated(since=\"\
  1.2\", forRemoval=true)\n@SuppressWarnings(\"unchecked\")\nmodule com.jdojo.myModule\
  \ {\n// 模块语句写在这里\n}\n```\n\n当一个模块被弃用时，在 `requires` 语句（而非 `exports` 或 `opens` 语句）中使用该模块会导致发出警告。此规则基于以下事实：如果模块\
  \ `M` 被弃用，模块的用户将使用 `requires M`，他们需要收到弃用警告。其他语句如 `exports` 和 `opens` 位于正在被弃用的模块内部。被弃用的模块不会对模块内类型的使用发出警告。类似地，如果在模块声明中抑制了警告，则抑制适用于模块声明中的元素，而不适用于该模块中包含的类型。\n\
  \n`Module` 类实现了 `java.lang.reflect.AnnotatedElement` 接口，因此您可以使用多种与注解相关的方法来读取它们。要在模块声明上使用的注解类型必须包含\
  \ `ElementType.MODULE` 作为目标。\n\n提示\n\n您不能注解单个模块语句。例如，您不能使用 `@Deprecated` 注解来注解 `exports`\
  \ 语句，以指示导出的包将在未来版本中被移除。在早期设计阶段，曾考虑过此功能，但因其会占用大量时间且当前并非必需而被拒绝。如果需要，将来可能会添加此功能。因此，您不会在\
  \ `ModuleDescriptor` 类中找到任何与注解相关的方法。\n\n现在，我们将创建一个新的注解类型，并将其用于模块声明。清单 15-15 包含一个名为\
  \ `jdojo.module.api.annotation` 的模块的模块声明，该模块包含三个注解。`Version` 注解类型已在同一模块中声明，其源代码如清单\
  \ 15-16 所示。新注解类型的保留策略为 `RUNTIME`。\n\n```\n// module-info.java\nimport com.jdojo.module.api.annotation.Version;\n\
  @Deprecated(since=\"1.2\", forRemoval=false)\n@SuppressWarnings(\"unchecked\")\n\
  @Version(major=1, minor=2)\nmodule jdojo.module.api.annotation {\n// 没有模块语句\n}\n\
  清单 15-15.\n名为 jdojo.module.api.annotation 的模块的模块声明\n```\n\n```\n// Version.java\n\
  package com.jdojo.module.api.annotation;\nimport static java.lang.annotation.ElementType.MODULE;\n\
  import static java.lang.annotation.ElementType.PACKAGE;\nimport static java.lang.annotation.ElementType.TYPE;\n\
  import java.lang.annotation.Retention;\nimport static java.lang.annotation.RetentionPolicy.RUNTIME;\n\
  import java.lang.annotation.Target;\n@Retention(RUNTIME)\n@Target({PACKAGE, MODULE,\
  \ TYPE})\npublic @interface Version {\nint major();\nint minor();\n}\n清单 15-16.\n\
  可用于包、模块和类型的 Version 注解类型\n```\n\n清单 15-17 包含一个 `AnnotationTest` 类的代码。它读取 `jdojo.module.api.annotation`\
  \ 模块上的注解。输出中不包含模块上存在的 `@SuppressWarnings` 注解，因为该注解使用了 `RetentionPolicy.SOURCE` 保留策略，这意味着该注解在运行时不会被保留。\n\
  \n```\n// AnnotationTest.java\npackage com.jdojo.module.api.annotation;\nimport\
  \ java.lang.annotation.Annotation;\npublic class AnnotationTest {\npublic static\
  \ void main(String[] args) {\n// 获取 com.jdojo.module.api.annotation 模块的模块引用\nModule\
  \ m = AnnotationTest.class.getModule();\n// 打印所有注解\nAnnotation[] a = m.getAnnotations();\n\
  for (Annotation ann : a) {\nSystem.out.println(ann);\n}\n// 读取 Deprecated 注解\nDeprecated\
  \ d = m.getAnnotation(Deprecated.class);\nif (d != null) {\nSystem.out.printf(\"\
  已弃用: since=%s, forRemoval=%b%n\",\nd.since(), d.forRemoval());\n}\n// 读取 Version\
  \ 注解\nVersion v = m.getAnnotation(Version.class);\nif (v != null) {\nSystem.out.printf(\"\
  版本: major=%d, minor=%d%n\", v.major(), v.minor());\n}\n}\n}\n清单 15-17.\n演示如何读取模块上注解的\
  \ AnnotationTest 类\n```\n\n```\n@java.lang.Deprecated(forRemoval=false, since=\"\
  1.2\")\n@com.jdojo.module.api.annotation.Version(major=1, minor=2)\n已弃用: since=1.2,\
  \ forRemoval=false\n版本: major=1, minor=2\n```\n\n处理模块层\n\n处理模块层是一个高级主题。通常，Java 开发者不需要直接处理模块层。现有应用程序不会使用模块层。如果您将应用程序迁移到\
  \ JDK9 或使用 JDK9 开发新应用程序，无论您是否愿意，您至少在使用一个模块层，该层由 JVM 在启动时创建。通常，使用插件或容器架构的应用程序会使用模块层。在本节中，我将通过一个简单示例简要概述模块层。我交替使用术语“模块层”和“层”。\n\
  \n\n\n层是一组已解析的模块（模块图），并配有一个函数，该函数将每个模块映射到一个类加载器，该类加载器负责加载该模块中的所有类型。这组已解析的模块被称为配置。你可以通过下图来直观地理解模块、类加载器、配置和层之间的关系：\n\
  \n```\n配置 = 模块图\n模块层 = 配置 + (模块 -> 类加载器)\n```\n\n模块被组织到各个层中。层之间按层级排列。除了空层之外，每个层至少有一个父层。空层，顾名思义，不包含任何模块，其主要作用是作为启动层的父层。启动层由\
  \ JVM 在启动时创建，它通过解析应用程序的初始模块（根模块）与一组可观察模块来生成。在 JDK 9 中，使用类加载器加载类型的方式没有改变。类加载器通常采用父优先委托模型，即加载类型的请求被委托给父加载器，父加载器再委托给其父加载器，直至启动类加载器。如果所有父加载器都无法加载该类型，则最初接收请求的类加载器会加载它。图\
  \ 15-1 展示了模块、类加载器和层的一种排列示例。\n\n![A323070_2_En_15_Fig1_HTML.jpg](img/A323070_2_En_15_Fig1_HTML.jpg)\n\
  \n图 15-1.\n\n一个将模块组织到应用程序各层中的示例\n\n在图中，从 X 指向 Y 的箭头表示 X 是 Y 的父级，其中 X 和 Y 可以是类加载器或层。层是堆叠的——空层和启动层是最底部的两个层。在后续讨论中，我将忽略空层，并将启动层视为层堆栈中的最底层。在图中，启动层是两个自定义层`Layer1`和`Layer2`的父层。\n\
  \n堆栈中每个层内的模块可以读取其下方层中的模块。也就是说，`Layer1`和`Layer2`都可以读取启动层中的模块。然而，`Layer1`不能读取`Layer2`中的模块，因为它们是兄弟层。启动层也不能读取`Layer1`和`Layer2`中的模块，因为它是它们的父层。如图所示，两个用户定义层中的类加载器都以应用程序类加载器作为其父加载器，这通常是常见情况。将应用程序类加载器设置为自定义类加载器的父加载器，可以确保后者能够读取启动层中所有模块内的所有类型。当一个层中的模块读取其下方层中的模块时，模块的可读性属性得以遵循。\n\
  \n允许模块按层组织适用于两种常见用例——覆盖机制和扩展机制——这些机制常见于高级 Java 应用程序中，例如作为托管应用程序容器的 Java EE 应用/Web\
  \ 服务器。在覆盖机制中，托管应用程序需要覆盖容器提供的功能，例如使用同一模块的不同版本。在扩展机制中，托管应用程序需要补充容器已提供的功能，例如提供额外的服务提供者。在图\
  \ 15-1 中，`com.jdojo.test`模块同时存在于启动层和`Layer1`中。这是一个模块覆盖的案例。`Layer1`将使用`Layer1`中的模块版本，而`Layer2`将使用启动层中该模块的版本。\n\
  \n通常要求容器允许托管应用程序提供它们自己的一组模块，这些模块可能会覆盖容器内嵌的模块。这可以通过将托管应用程序的模块加载到容器层之上的一个层中来实现。加载到特定应用程序层中的模块将覆盖服务器级别的层中的模块。通过这种方式，你可以在同一个\
  \ JVM 中使用同一模块的多个版本。\n\n托管应用程序可能希望使用与容器提供的不同的服务提供者。这可以通过将特定于应用程序的服务提供者模块添加到容器层之上的一个层中来实现。你可以使用`ServiceLoader<S>`类的`load(ModuleLayer\
  \ layer, Class<S> service)`方法来加载服务提供者。指定的层将是托管应用程序特定的层。此方法从指定的层及其父层加载服务提供者。\n\n\
  提示\n\n层是不可变的。一旦创建了一个层，你就不能向其中添加模块或从中移除模块。如果需要添加模块或用另一个版本的模块替换现有模块，你必须拆除该层并重新创建它。\n\
  \n创建层是一个多步骤的过程。你需要按照以下步骤来创建一个层：\n\n1.  创建模块查找器。\n2.  创建一组根模块。\n3.  创建一个配置对象。\n4.\
  \  创建一个层。\n\n一旦创建了层，你就可以使用它来加载类型。我将在后续章节中详细引导你完成这些步骤。最后，我将向你展示如何使用层来使用一个模块的多个版本。\n\
  \n查找模块\n\n模块查找器是`ModuleFinder`接口的一个实例。它用于在模块解析和服务绑定期间查找模块。`ModuleFinder`将找到的模块作为`ModuleReference`类的实例返回。`ModuleReference`类的实例表示对模块内容的引用。该接口包含两个用于创建模块查找器的工厂方法：\n\
  \n*   `static ModuleFinder of(Path… entries)`\n*   `static ModuleFinder ofSystem()`\n\
  \n`of()`方法通过搜索指定的路径序列来定位模块，这些路径可以是目录或打包模块的路径。该方法按顺序搜索指定路径，找到模块名称的第一次出现。以下代码片段展示了如何创建一个模块查找器，该查找器将在`C:\\\
  Java9LanguageFeatures\\lib`和`C:\\Java9LanguageFeatures\\customLib`目录中搜索模块：\n\n```\n\
  // 创建模块路径\nPath mp1 = Paths.get(\"C:\\\\Java9LanguageFeatures\\\\lib\");\nPath mp2\
  \ = Paths.get(\"C:\\\\Java9LanguageFeatures\\\\customLib\");\n// 使用两个模块路径创建一个模块查找器\n\
  ModuleFinder finder = ModuleFinder.of(mp1, mp2);\n```\n\n有时，你需要一个`ModuleFinder`的引用，例如，将其传递给一个方法，但该模块查找器不需要查找任何模块。你可以使用不带任何路径参数的`ModuleFinder.of()`方法来创建这样一个模块查找器。\n\
  \n`ofSystem()`方法返回一个模块查找器，该查找器查找链接到运行时的系统模块。此方法始终能找到`java.base`模块。请注意，你可以将一组自定义模块链接到运行时映像，这意味着使用此方法定位的模块取决于运行时映像。自定义运行时映像包含\
  \ JDK 模块以及应用程序模块。此方法将找到这两种类型的模块。\n\n你还可以使用`ModuleFinder`接口的静态`compose()`方法，从零个或多个模块查找器的序列中组合出一个模块查找器：\n\
  \n```\nModuleFinder compose(ModuleFinder... finders)\n```\n\n此模块查找器将按指定的顺序使用每个模块查找器。第二个模块查找器将查找第一个模块查找器未找到的所有模块，第三个模块查找器将查找第一个和第二个模块查找器未找到的所有模块，依此类推。\n\
  \n`ModuleFinder`接口包含以下用于查找模块的方法：\n\n*   `Optional<ModuleReference> find(String name)`\n\
  *   `Set<ModuleReference> findAll()`\n\n`find()`方法查找具有指定名称的模块。`findAll()`方法查找该查找器能够定位的所有模块。\n\
  \n\n\n清单 15-18 包含了一个 `FindingModule` 类的代码，演示了如何使用 `ModuleFinder`。该代码使用了 Windows\
  \ 上的路径，例如 `C:\\Java9LanguageFeatures\\dist`，模块存储在此处。在运行该类之前，你可能需要更改模块路径。该类是 `com.jdojo.module.api`\
  \ 模块的成员。你可能会得到不同的输出。\n\n```\n// FindingModule.java\npackage com.jdojo.module.api;\n\
  import java.lang.module.ModuleDescriptor;\nimport java.lang.module.ModuleFinder;\n\
  import java.lang.module.ModuleReference;\nimport java.net.URI;\nimport java.nio.file.Path;\n\
  import java.nio.file.Paths;\nimport java.util.Optional;\nimport java.util.Set;\n\
  public class FindingModule {\npublic static void main(String[] args) {\n// 创建模块路径。请更改这些路径，使其指向你计算机上存储模块的目录\n\
  Path mp1 = Paths.get(\"C:\\\\Java9LanguageFeatures\\\\dist\");\nPath mp2 = Paths.get(\"\
  C:\\\\Java9LanguageFeatures\\\\lib\");\n// 创建一个模块查找器\nModuleFinder finder = ModuleFinder.of(mp1,\
  \ mp2);\n// 查找此查找器能够定位的所有模块\nSet moduleRefs = finder.findAll();\n// 打印找到的模块的详细信息\n\
  moduleRefs.forEach(FindingModule::printInfo);\n}\npublic static void printInfo(ModuleReference\
  \ mr) {\nModuleDescriptor md = mr.descriptor();\nOptional location = mr.location();\n\
  URI uri = null ;\nif (location.isPresent()) {\nuri = location.get();\n}\nSystem.out.printf(\"\
  Module: %s, Location: %s%n\", md.name(), uri);\n}\n}\n清单 15-18.\n使用 ModuleFinder\
  \ 定位模块\n```\n\n```\nModule: jdojo.reflection.model, Location: file:///C:/Java9LanguageFeatures/dist/jdojo.reflection.model.jar\n\
  Module: jdojo.prime.probable, Location: file:///C:/Java9LanguageFeatures/dist/jdojo.prime.probable.jar\n\
  Module: jdojo.module.api, Location: file:///C:/Java9LanguageFeatures/dist/jdojo.module.api.jar\n\
  ...\n```\n\n读取模块内容\n\n在上一节中，你学习了如何使用 `ModuleFinder` 来查找模块引用，这些引用是 `ModuleReference`\
  \ 类的实例。一个 `ModuleReference` 封装了 `ModuleDescriptor` 和模块的位置。你可以使用 `ModuleReference`\
  \ 类的 `open()` 方法来获取 `ModuleReader` 接口的一个实例。`ModuleReader` 用于列出、查找和读取模块的内容。以下代码片段展示了如何为\
  \ `java.base` 模块获取一个 `ModuleReader`：\n\n```\n// 创建一个系统模块查找器\nModuleFinder finder\
  \ = ModuleFinder.ofSystem();\n// java.base 模块保证存在\nOptional omr = finder.find(\"\
  java.base\");\nModuleReference moduleRef = omr.get();\n// 获取一个模块读取器\nModuleReader\
  \ reader = moduleRef.open();\n```\n\n`ModuleReference` 类的 `open()` 方法会抛出 `IOException`。为了保持代码简洁，我在前面的代码片段中省略了异常处理。\n\
  \n`ModuleReader` 中的以下方法用于处理模块的内容。这些方法名称直观，足以说明其功能。\n\n*   `void close() throws IOException`\n\
  \n*   `Optional<URI> find(String resourceName) throws IOException`\n\n*   `Stream<String>\
  \ list() throws IOException`\n\n*   `default Optional<InputStream> open(String resourceName)\
  \ throws IOException`\n\n*   `default Optional<ByteBuffer> read(String resourceName)\
  \ throws IOException`\n\n*   `default void release(ByteBuffer bb)`\n\n传递给这些方法的资源名称是一个以**斜杠\
  \ (`/`)** 分隔的路径字符串。例如，`java.base` 模块中 `java.lang.Object` 类的资源名称是 `java/lang/Object.class`。\n\
  \n当你完成对 `ModuleReader` 的操作后，需要使用其 `close()` 方法关闭它。如果尝试使用已关闭的 `ModuleReader` 读取模块内容，则会抛出\
  \ `IOException`。`read()` 方法返回一个 `Optional<ByteBuffer>`。你需要在消费完字节缓冲区后调用 `release(ByteBuffer\
  \ bb)` 方法来释放它，以避免资源泄漏。\n\n清单 15-19 包含了一个演示如何读取模块内容的程序。它读取 `Object` 类在 `ByteBuffer`\
  \ 中的内容，并打印其字节大小。它还打印了 `java.base` 模块中五个资源的名称。你可能会得到不同的输出。\n\n```\n// ReadingModuleContents.java\n\
  package com.jdojo.module.api;\nimport java.io.IOException;\nimport java.lang.module.ModuleFinder;\n\
  import java.lang.module.ModuleReader;\nimport java.lang.module.ModuleReference;\n\
  import java.nio.ByteBuffer;\nimport java.util.Optional;\npublic class ReadingModuleContents\
  \ {\npublic static void main(String[] args) {\n// 创建一个系统模块查找器\nModuleFinder finder\
  \ = ModuleFinder.ofSystem();\n// java.base 模块保证存在\nOptional omr = finder.find(\"\
  java.base\");\nModuleReference moduleRef = omr.get();\n// 获取一个模块读取器并使用它\ntry (ModuleReader\
  \ reader = moduleRef.open()) {\n// 读取 Object 类并打印其大小\nOptional bb = reader.read(\"\
  java/lang/Object.class\");\nbb.ifPresent(\nbuffer -> {System.out.println(\"Object.class\
  \ Size: \" + buffer.limit());\n// 释放字节缓冲区\nreader.release(buffer);\n});\nSystem.out.println(\"\
  \\njava.base 模块中的五个资源:\");\nreader.list()\n.limit(5)\n.forEach(System.out::println);\n\
  } catch (IOException e) {\ne.printStackTrace();\n}\n}\n}\n清单 15-19.\n使用 ModuleReader\
  \ 读取模块内容\n```\n\n```\nObject.class Size: 1932\njava.base 模块中的五个资源:\nmodule-info.class\n\
  sun/util/BuddhistCalendar.class\nsun/util/PreHashedMap$1$1.class\nsun/util/PreHashedMap$1.class\n\
  sun/util/PreHashedMap$2$1$1.class\n```\n\n创建配置\n\n一个配置代表一组已解析的模块。已解析的模块是指其依赖关系（通过\
  \ `requires` 语句指定）已被计算出来的模块。模块解析过程使用两组模块：一组根模块和一组可观察模块。根模块集合中的每个模块都用作初始模块，其 `requires`\
  \ 语句会针对可观察模块集合进行解析。一个根模块可能依赖于另一个模块，而该模块又可能依赖于另一个模块，依此类推。解析过程会计算所有根模块的整个依赖链。由此产生的模块图称为依赖图。\n\
  \n依赖图仅考虑 `requires` 语句。如果一个模块使用了 `requires transitive` 语句，则依赖于该模块的模块会隐式地依赖于 `requires\
  \ transitive` 语句中指定的模块。依赖图会因 `requires transitive` 语句导致的额外模块可读性而得到增强，从而产生一个称为可读性图的模块图。\n\
  \n模块中的 `uses` 和 `provides` 语句也形成了一种依赖关系。如果模块 `M` 使用了服务类型 `S`，而另一个模块 `N` 使用 `T` 提供了\
  \ `S` 的实现，则模块 `M` 依赖于模块 `N` 来使用服务类型 `S`。可读性图会因针对此类服务使用依赖关系计算出的模块而得到增强。\n\n当为引导层创建配置时，它通过解析依赖关系（`requires`\
  \ 语句）、隐含的可读性（`requires transitive`）以及服务使用依赖关系（`uses` 和 `provides` 语句）来包含模块。当你为用户定义的层创建配置时，你可以选择包含或排除服务使用依赖关系。\n\
  \n`Configuration` 类的一个实例代表一个配置。除了空配置之外，一个配置至少有一个父配置。\n\n\n\n`ResolvedModule` 类的实例表示配置中的一个已解析模块。`ResolvedModule`\
  \ 类的 `reads()` 方法返回一个 `Set<ResolvedModule>`，表示该已解析模块所读取的模块。其 `configuration()` 方法返回该已解析模块所属的\
  \ `Configuration`。其 `reference()` 方法返回一个 `ModuleReference`，你可以通过它获取 `ModuleReader`\
  \ 来读取该模块的内容。\n\n`Configuration` 类中的以下方法用于创建 `Configuration` 对象：\n\n*   `static Configuration\
  \ empty()`\n\n*   `Configuration resolve(ModuleFinder before, ModuleFinder after,\
  \ Collection<String> roots)`\n\n*   `Configuration resolveAndBind(ModuleFinder before,\
  \ ModuleFinder after, Collection<String> roots)`\n\n*   `static Configuration resolve(ModuleFinder\
  \ before, List<Configuration> parents, ModuleFinder after, Collection<String> roots)`\n\
  \n*   `static Configuration resolveAndBind(ModuleFinder before, List<Configuration>\
  \ parents, ModuleFinder after, Collection<String> roots)`\n\n`empty()` 方法返回一个空的\
  \ `Configuration`。它主要用于作为引导层配置的父配置。\n\n`resolve()` 和 `resolveAndBind()` 方法有两个版本：实例方法和静态方法。它们之间只有一个区别。实例方法使用当前配置作为父配置来创建一个新配置，而静态方法允许你为新配置传递一个父配置列表。\n\
  \n`resolve()` 方法通过解析模块声明中 `requires` 和 `requires transitive` 语句产生的依赖关系，创建一个新的 `Configuration`\
  \ 对象。指定的 `roots` 中的模块被用作根模块。在解析过程中，首先使用指定的 `before` 模块查找器搜索模块。如果未找到模块，则搜索父配置。如果仍未找到模块，则使用指定的\
  \ `after` 模块查找器来搜索模块。如果你的配置旨在覆盖父配置中的某个模块，你应该将该模块放在 `before` 模块查找器路径中。\n\n`resolveAndBind()`\
  \ 方法的工作方式与 `resolve()` 方法相同，不同之处在于它还会解析服务使用依赖关系。以下代码片段展示了如何使用引导层的配置作为其父配置来创建一个配置：\n\
  \n```\n// 定义模块查找器\nString modulePath = \"C:\\\\Java9LanguageFeatures\\\\dist\";\n\
  Path path = Paths.get(modulePath);\nModuleFinder beforFinder = ModuleFinder.of(path);\n\
  // 我们的 after 模块查找器为空\nModuleFinder afterFinder = ModuleFinder.of();\n// 设置根模块\n\
  Set rootModules = Set.of(\"jdojo.layer\");\n// 使用引导层的配置作为其父配置来创建一个配置\nConfiguration\
  \ parentConfig = ModuleLayer.boot().configuration();\nConfiguration config = parentConfig.resolve(beforFinder,\
  \ afterFinder, rootModules);\n```\n\n`Configuration` 类中的以下方法用于检索配置中已解析模块的详细信息：\n\
  \n*   `Optional<ResolvedModule> findModule(String name)`\n\n*   `Set<ResolvedModule>\
  \ modules()`\n\n*   `List<Configuration> parents()`\n\n这些方法的名称和签名足以直观地理解其用途。本节不再进一步讨论\
  \ `Configuration` 类。在下一节中，我将展示如何使用 `Configuration` 来创建一个模块层。\n\n创建模块层\n\n一个模块层由一个配置和一个将每个模块映射到一个类加载器的函数组成。要创建一个层，你必须首先创建一个配置，并拥有一个或多个类加载器来将模块映射到它们。模块的类加载器负责加载该模块中的所有类型。你可以将配置中的所有模块映射到一个类加载器；也可以将每个模块映射到不同的类加载器；或者你可以采用自定义的映射策略。通常，类加载器使用一种委托策略，将类加载请求委托给其父类加载器。当你为层中的模块定义类加载器时，也可以使用此策略。\n\
  \n`ModuleLayer` 类（位于 `java.lang` 包中）的实例表示一个模块层。该类包含两个方法 `empty()` 和 `boot()`，分别返回一个带有空配置的空层和引导层。该类中的以下方法用于创建自定义层：\n\
  \n*   `ModuleLayer defineModules(Configuration cf, Function<String,ClassLoader>\
  \ clf)`\n\n*   `static ModuleLayer.Controller defineModules(Configuration cf, List<ModuleLayer>\
  \ parentLayers, Function<String,ClassLoader> clf)`\n\n*   `ModuleLayer defineModulesWithManyLoaders(Configuration\
  \ cf, ClassLoader parentClassLoader)`\n\n*   `static ModuleLayer.Controller defineModulesWithManyLoaders(Configuration\
  \ cf, List<ModuleLayer> parentLayers, ClassLoader parentLoader)`\n\n*   `ModuleLayer\
  \ defineModulesWithOneLoader(Configuration cf, ClassLoader parentClassLoader)`\n\
  \n*   `static ModuleLayer.Controller defineModulesWithOneLoader(Configuration cf,\
  \ List<ModuleLayer> parentLayers, ClassLoader parentLoader)`\n\n`defineModulesXxx()`\
  \ 方法有两个变体：一组包含实例方法，另一组包含静态方法。实例方法使用调用它们的层作为父层，而静态方法允许你为新层指定一个父层列表。静态方法返回一个 `ModuleLayer.Controller`\
  \ 对象，你可以使用它来操作新层中的模块。`ModuleLayer.Controller` 是 `java.lang` 包中的一个嵌套类，包含以下方法：\n\n\
  *   `ModuleLayer.Controller addExports(Module source, String packageName, Module\
  \ target)`\n\n*   `ModuleLayer.Controller addOpens(Module source, String packageName,\
  \ Module target)`\n\n*   `ModuleLayer.Controller addReads(Module source, Module\
  \ target)`\n\n*   `ModuleLayer layer()`\n\n`addExports()`、`addOpens()` 和 `addReads()`\
  \ 方法允许你将此层中某个模块的包导出到另一个模块、向另一个模块打开此层中某个模块的包，以及从此层中的某个模块向另一个模块添加读取边。`layer()` 方法返回此控制器正在管理的\
  \ `ModuleLayer`。\n\n`defineModules(Configuration cf, Function<String,ClassLoader>\
  \ clf)` 方法将配置作为其第一个参数。第二个参数是一个映射函数，它接收配置中的模块名称并返回该模块的类加载器。在以下情况下，方法调用可能会失败：\n\n\
  *   多个具有相同包的模块被映射到同一个类加载器。\n*   一个模块被映射到一个已经定义了同名模块的类加载器。\n*   一个模块被映射到一个已经在该模块的任何包中定义了类型的类加载器。\n\
  \n\n\n`defineModulesWithManyLoaders`\n`(Configuration cf, ClassLoader parentClassLoader)`\
  \ 方法使用指定的配置创建一个层。配置中的每个模块都映射到一个不同的类加载器，该类加载器由此方法创建。指定的父类加载器（第二个参数）被设置为该方法创建的类加载器的父级。通常，您会将应用程序类加载器作为该方法创建的所有类加载器的父类加载器。您可以使用\
  \ `null` 作为第二个参数，以使用引导类加载器作为该方法创建的所有类加载器的父级。此方法将为配置中的每个模块创建一个新的类加载器。\n\n`defineModulesWithOneLoader`\n\
  `(Configuration cf, ClassLoader parentClassLoader)` 方法使用指定的配置创建一个层。它使用指定的父类加载器作为其父级创建一个类加载器。它将配置中的所有模块映射到这一个类加载器。您可以使用\
  \ `null` 作为第二个参数，以使用引导类加载器作为该方法创建的所有类加载器的父级。\n\n以下代码片段创建了一个以引导层为父层的层。该层中的所有模块将由一个类加载器加载，其父级是系统类加载器。\n\
  \n```\nConfiguration config = /* 创建一个配置... */\nClassLoader sysClassLoader = ClassLoader.getSystemClassLoader();\n\
  ModuleLayer parentLayer = ModuleLayer.boot();\nModuleLayer layer = parentLayer.defineModulesWithOneLoader(config,\
  \ sysClassLoader);\n```\n\n创建层后，您需要从该层的模块中加载类。模块中的所有类型都由映射到该模块的类加载器加载。请注意，同一个模块可能定义在多个层中，但这些模块将映射到不同的类加载器。`ModuleLayer`\n\
  类包含一个 `findLoader(String moduleName)` 方法，该方法接受模块名称作为参数，并返回该模块的 `ClassLoader`。如果该模块未在层中定义，则会检查父层。如果该模块在此层或其祖先层中不存在，则会抛出\
  \ `IllegalArgumentException`。一旦获取了模块的 `ClassLoader`，就可以调用其 `loadClass(String className)`\
  \ 方法来从该模块加载类。以下代码片段（不包括异常处理逻辑）展示了如何在层中加载类：\n\n```\nModuleLayer layer = /* 创建一个层...\
  \ */\n// 使用该层加载一个类\nString moduleName = \"jdojo.layer\";\nString className = \"\
  com.jdojo.layer.LayerInfo\";\n// 加载类\nClass cls = layer.findLoader(moduleName)\n\
  .loadClass(className);\n```\n\n一旦获取了 `Class` 对象，就可以使用它来实例化其对象并调用该对象上的方法。以下代码片段创建了所加载类的对象，并调用了该对象上名为\
  \ `printInfo` 的方法：\n\n```\n// 打印对象详细信息的方法名\nString methodName = \"printInfo\";\n\
  // 使用无参构造函数实例化类\nObject obj = cls.getConstructor().newInstance();\n// 查找方法\nMethod\
  \ method = cls.getMethod(methodName);\n// 调用将打印详细信息的方法\nmethod.invoke(obj);\n```\n\
  \n`ModuleLayer` 类中的以下方法可用于获取关于层本身或层中包含的模块的信息：\n\n*   `Optional<Module> findModule(String\
  \ moduleName)`\n\n*   `Set<Module> modules()`\n\n*   `List<ModuleLayer> parents()`\n\
  \n`findModule()` 方法在层或其父层中查找具有指定名称的模块。`modules()` 方法返回层中的模块集合，如果层不包含任何模块，则可能为空集合。`parent()`\
  \ 方法返回此层的父层列表，对于空层，该列表将为空。\n\n接下来，我们将通过一个完整示例来演示如何创建自定义层，以及如何在同一个应用程序的两个层中加载同一模块的两个版本。\n\
  \n模块名称为 `jdojo.layer`，它包含一个名为 `com.jdojo.layer` 的包，该包中只有一个名为 `LayerInfo` 的类。您将拥有同一模块的两个版本，因此所有内容都将重复。我在源代码中创建了两个\
  \ NetBeans 项目，名称分别为 `jdojo.layer.v1` 和 `jdojo.layer.v2`。\n\n清单 15-20 和清单 15-21 分别包含了\
  \ `com.jdojo.layer` 模块的 1.0 版模块定义和 `LayerInfo` 类的类声明。\n\n```\n// module-info.com\
  \ 版本 1.0\nmodule jdojo.layer {\nexports com.jdojo.layer;\n}\n清单 15-20.\ncom.jdojo.layer\
  \ 模块的 1.0 版\n```\n\n```\n// LayerInfo.java\npackage com.jdojo.layer;\npublic class\
  \ LayerInfo {\nprivate final static String VERSION = \"1.0\";\nstatic {\nSystem.out.println(\"\
  正在加载 LayerInfo 版本 \" + VERSION);\n}\npublic void printInfo() {\nClass cls = this.getClass();\n\
  ClassLoader loader = cls.getClassLoader();\nModule module = cls.getModule();\nString\
  \ moduleName = module.getName();\nModuleLayer layer = module.getLayer();\nSystem.out.println(\"\
  类版本: \" + VERSION);\nSystem.out.println(\"类名: \" + cls.getName());\nSystem.out.println(\"\
  类加载器: \" + loader);\nSystem.out.println(\"模块名: \" + moduleName);\nSystem.out.println(\"\
  层名: \" + layer);\n}\n}\n清单 15-21.\ncom.jdojo.layer 模块 1.0 版中的 LayerInfo 类\n```\n\
  \n`LayerInfo` 类非常简单。它将版本信息存储在一个名为 `VERSION` 的静态变量中。它在静态初始化器中打印一条包含版本信息的消息。此消息将帮助您了解加载的是哪个版本的\
  \ `LayerInfo` 类。`printInfo()` 方法打印类的详细信息：版本、类名、类加载器、模块名和层。\n\n清单 15-22 和清单 15-23\
  \ 分别包含了 `com.jdojo.layer` 模块的 2.0 版模块定义和 `LayerInfo` 类的类声明。从该模块的 1.0 版到 2.0 版，只有一处发生了变化——静态变量\
  \ `VERSION` 的值从 `1.0` 变为了 `2.0`。\n\n```\n// module-info.com 版本 2.0\nmodule com.jdojo.layer\
  \ {\nexports com.jdojo.layer;\n}\n清单 15-22.\ncom.jdojo.layer 模块的 2.0 版\n```\n\n\
  ```\n// LayerInfo.java\npackage com.jdojo.layer;\npublic class LayerInfo {\nprivate\
  \ final static String VERSION = \"2.0\";\nstatic {\nSystem.out.println(\"正在加载 LayerInfo\
  \ 版本 \" + VERSION);\n}\npublic void printInfo() {\nClass cls = this.getClass();\n\
  ClassLoader loader = cls.getClassLoader();\nModule module = cls.getModule();\nString\
  \ moduleName = module.getName();\nModuleLayer layer = module.getLayer();\nSystem.out.println(\"\
  类版本: \" + VERSION);\nSystem.out.println(\"类名: \" + cls.getName());\nSystem.out.println(\"\
  类加载器: \" + loader);\nSystem.out.println(\"模块名: \" + moduleName);\nSystem.out.println(\"\
  层名: \" + layer);\n}\n}\n清单 15-23.\ncom.jdojo.layer 模块 2.0 版中的 LayerInfo 类\n```\n\
  \n现在，您可以测试层，并在同一个 JVM 的两个不同层中加载 `com.jdojo.layer` 模块的两个版本。为此模块的 2.0 版创建一个模块化 JAR，将其命名为\
  \ `jdojo.layer.v2.jar` 或您想要的任何其他名称，并将该模块化 JAR 放入 `C:\\jdojo.layer.v2\\dist` 目录。如果您将模块化\
  \ JAR 放在其他目录中，则需要更改清单 15-25 代码中的路径。\n\n测试层的程序位于一个名为 `jdojo.layer.test` 的模块中，其声明如清单\
  \ 15-24 所示。\n\n\n\n```\n// module-info.java\nmodule jdojo.layer.test {\n// 此模块依赖于\
  \ jdojo.layer 模块的 1.0 版本\nrequires jdojo.layer;\n}\n清单 15-24.\n名为 jdojo.layer.test\
  \ 的模块的模块声明\n```\n\n`jdojo.layer.test`\n模块声明了对 `jdojo.layer` 模块 1.0 版本的依赖。\n如何确保\
  \ `jdojo.layer` 模块的 1.0 版本与 `jdojo.layer.test`\n模块一起使用？你只需在运行 `jdojo.layer.test`\n\
  模块时，将 `jdojo.layer`\n模块 1.0 版本的代码放置在模块路径上即可。要在 NetBeans 中实现这一点，请将 `jdojo.layer.v1`\n\
  项目添加到 `jdojo.layer.test`\n模块的模块路径中。\n\n清单 15-25 包含了一个 `LayerTest`\n类的代码，该类包含创建自定义层并将模块加载到其中的逻辑。该类中使用的逻辑的详细说明位于该类的输出之后。\n\
  \n```\n// LayerTest.java\npackage com.jdojo.layer.test;\nimport java.lang.module.Configuration;\n\
  import java.lang.module.ModuleFinder;\nimport java.lang.reflect.InvocationTargetException;\n\
  import java.lang.reflect.Method;\nimport java.nio.file.Path;\nimport java.nio.file.Paths;\n\
  import java.util.Set;\npublic class LayerTest {\n/* 自定义模块的位置。你需要更改此路径，\n使其指向你电脑上包含\
  \ jdojo.layer（版本 2.0）模块的模块化 JAR 的目录。\n*/\nprivate static final String MODULE_LOCATION\
  \ = \"C:\\\\jdojo.layer.v2\\\\dist\";\n// 模块名称\nprivate static final String MODULE_NAME\
  \ = \"jdojo.layer\";\npublic static void main(String[] args) {\n// 定义要在自定义层中解析的根模块集合\n\
  Set rootModules = Set.of(MODULE_NAME);\n// 创建一个自定义层\nModuleLayer customLayer = createLayer(MODULE_LOCATION,\
  \ rootModules);\n// 测试引导层中的类\nModuleLayer bootLayer = ModuleLayer.boot();\ntestLayer(bootLayer);\n\
  System.out.println();\n// 测试自定义层中的类\ntestLayer(customLayer);\n}\npublic static ModuleLayer\
  \ createLayer(String modulePath, Set rootModules) {\nPath path = Paths.get(modulePath);\n\
  // 定义用于创建自定义层配置的模块查找器\nModuleFinder beforFinder = ModuleFinder.of(path);\nModuleFinder\
  \ afterFinder = ModuleFinder.of();\n// 为自定义层创建配置\nConfiguration parentConfig = ModuleLayer.boot().configuration();\n\
  Configuration config = parentConfig.resolve(beforFinder, afterFinder, rootModules);\n\
  /* 使用一个类加载器创建自定义层。该\n类加载器的父加载器是系统类加载器。引导层是此自定义层的父层。\n*/\nClassLoader sysClassLoader\
  \ = ClassLoader.getSystemClassLoader();\nModuleLayer parentLayer = ModuleLayer.boot();\n\
  ModuleLayer layer = parentLayer.defineModulesWithOneLoader(config, sysClassLoader);\n\
  // 检查我们是否在此层中加载了模块\nif (layer.modules().isEmpty()) {\nSystem.out.println(\"\\n 无法在\
