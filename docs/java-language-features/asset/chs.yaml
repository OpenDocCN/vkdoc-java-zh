  \ `e1` 和 `e2` 相等。\n |\n\n`filter`\n |\n  中间操作\n |\n  返回由该流中与指定谓词匹配的元素组成的流。\n |\n\
  \n`flatMap`\n |\n  中间操作\n |\n  返回由对该流中的元素应用指定函数的结果组成的流。该函数为每个输入元素生成一个流，并将输出流展平。执行一对多映射。\n\
  \ |\n\n`limit`\n |\n  中间操作\n |\n  返回由该流中的元素组成的流，截断后长度不超过指定大小。\n |\n\n`map`\n |\n\
  \  中间操作\n |\n  返回由对该流中的元素应用指定函数的结果组成的流。执行一对一映射。\n |\n\n`peek`\n |\n  中间操作\n |\n\
