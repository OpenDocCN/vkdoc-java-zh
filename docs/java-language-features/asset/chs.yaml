  \ 2.0 版本的位置。\n你必须更改此路径，使其指向你电脑上包含 `jdojo.layer` 模块 2.0 版本编译后模块代码的目录。\n\n```\nprivate\
  \ static final String MODULE_LOCATION = \"C:\\\\jdojo.layer.v2\\\\dist\";\n```\n\
  \n你声明了一个名为 `MODULE_NAME` 的类变量，它\n存储了模块的名称：\n\n```\nprivate static final String MODULE_NAME\
  \ = \"jdojo.layer\";\n```\n\n`main()`\n方法将 `jdojo.layer` 存储为\n自定义层配置的唯一根模块：\n\n\
