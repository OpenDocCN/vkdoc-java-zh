  ```\n\n应用 Map 操作\n\nmap 操作（也称为映射）将一个函数应用于输入流的每个元素，以生成另一个流（也称为输出流或映射流）。输入流和输出流中的元素数量相同。该操作不会修改输入流的元素——至少理论上不应该。\n\
  \n图 13-7 描述了在流上应用 map 操作的过程。它展示了输入流中的元素 `e1` 被映射到映射流中的元素 `et1`，元素 `e2` 被映射到 `et2`，以此类推。\n\
  \n![A323070_2_En_13_Fig7_HTML.gif](img/A323070_2_En_13_Fig7_HTML.gif)\n\n图 13-7.\n\
  \nmap 操作的示意图\n\n将一个流映射到另一个流并不局限于任何特定类型的元素。你可以将类型 `T` 的流映射到类型 `S` 的流，其中 `T` 和 `S`\
  \ 可以是相同或不同的类型。例如，你可以将 `Person` 流映射到 `int` 流，其中输入流中的每个 `Person` 元素都映射到映射流中该 `Person`\
  \ 的 ID。你可以使用 `Stream<T>` 接口的以下方法之一对流应用 map 操作：\n\n*   `<R> Stream<R> map(Function<?\
  \ super T,? extends R> mapper)`\n\n*   `DoubleStream mapToDouble(ToDoubleFunction<?\
  \ super T> mapper)`\n\n*   `IntStream mapToInt(ToIntFunction<? super T> mapper)`\n\
  \n*   `LongStream mapToLong(ToLongFunction<? super T> mapper)`\n\nmap 操作接受一个函数作为参数。输入流中的每个元素都被传递给该函数。函数返回的值就是映射流中的映射元素。使用\
  \ `map()` 方法执行到引用类型元素的映射。如果映射流是原始类型，则使用其他方法；例如，使用 `mapToInt()` 方法将引用类型的流映射到 `int`\
  \ 流。`IntStream`、`LongStream` 和 `DoubleStream` 接口包含类似的方法，以方便一种流类型到另一种流类型的映射。`IntStream`\
  \ 上支持 map 操作的方法如下：\n\n*   `IntStream map(IntUnaryOperator mapper)`\n\n*   `DoubleStream\
  \ mapToDouble(IntToDoubleFunction mapper)`\n\n*   `LongStream mapToLong(IntToLongFunction\
  \ mapper)`\n\n*   `<U> Stream<U> mapToObj(IntFunction<? extends U> mapper)`\n\n\
  以下代码片段创建了一个 `IntStream`，其元素为 1 到 5 的整数，将流的元素映射到它们的平方，并将映射后的流打印到标准输出。请注意，代码中使用的 `map()`\
  \ 方法是 `IntStream` 接口的 `map()` 方法。\n\n```\nIntStream.rangeClosed(1, 5)\n.map(n ->\
  \ n * n)\n.forEach(System.out::println);\n```\n\n```\n\n```\n\n以下代码片段将人员流的元素映射到他们的姓名，并打印映射后的流。请注意，代码中使用的\
  \ `map()` 方法是 `Stream` 接口的 `map()` 方法。\n\n```\nPerson.persons()\n.stream()\n.map(Person::getName)\n\
  .forEach(System.out::println);\n```\n\n```\nKen\nJeff\nDonna\nChris\nLaynie\nLi\n\
  ```\n\n展平流\n\n在上一节中，你看到了支持一对一映射的 map 操作。输入流的每个元素都被映射到输出流中的一个元素。Streams API 还通过 `flatMap`\
  \ 操作支持一对多映射。其工作方式如下：\n\n1.  它接受一个输入流，并使用一个映射函数生成一个输出流。\n\n\n\n2.  映射函数从输入流中取出一个元素，并将该元素映射到一个流。输入元素的类型与映射流中的元素类型可能不同。此步骤会生成一个流的流。假设输入流是\
  \ `Stream<T>`，而映射流是 `Stream<Stream<R>>`，其中 `T` 和 `R` 可能相同，也可能不同。\n\n3.  最后，它将输出流（即流的流）展平，以生成一个流。也就是说，`Stream<Stream<R>>`\
  \ 被展平为 `Stream<R>`。\n\n理解 flat map 操作需要一些时间。假设你有一个包含三个数字的流：1、2 和 3。你想要生成一个包含这些数字及其平方的流。你希望输出流包含\
  \ 1、1、2、4、3 和 9。以下是实现此目标的第一种错误尝试：\n\n```\nStream.of(1, 2, 3)\n.map(n -> Stream.of(n,\
  \ n * n))\n.forEach(System.out::println);\n```\n\n```\njava.util.stream.ReferencePipeline$Head@372f7a8d\n\
  java.util.stream.ReferencePipeline$Head@2f92e0f4\njava.util.stream.ReferencePipeline$Head@28a418fc\n\
  ```\n\n你对输出感到惊讶吗？你在输出中看不到数字。`map()` 方法的输入流包含三个整数：1、2 和 3。`map()` 方法为输入流中的每个元素生成一个元素。在这种情况下，`map()`\
  \ 方法为输入流中的每个整数生成一个 `Stream<Integer>`。它生成了三个 `Stream<Integer>`。第一个流包含 1 和 1；第二个流包含\
  \ 2 和 4；第三个流包含 3 和 9。`forEach()` 方法接收 `Stream<Integer>` 对象作为其参数，并打印从每个 `Stream<Integer>`\
  \ 的 `toString()` 方法返回的字符串。你可以在流上调用 `forEach()`，因此让我们嵌套其调用来打印流的流的元素，如下所示：\n\n```\n\
  Stream.of(1, 2, 3)\n.map(n -> Stream.of(n, n * n))\n.forEach(e -> e.forEach(System.out::println));\n\
  ```\n\n```\n\n```\n\n你成功打印了数字及其平方。但你尚未实现将这些数字放入 `Stream<Integer>` 的目标。它们仍然在 `Stream<Stream<Integer>>`\
  \ 中。解决方案是使用 `flatMap()` 方法代替 `map()` 方法。以下代码片段实现了这一点：\n\n```\nStream.of(1, 2, 3)\n\
  .flatMap(n -> Stream.of(n, n * n))\n.forEach(System.out::println);\n```\n\n```\n\
  \n```\n\n图 13-8 展示了在此示例中 `flatMap()` 方法如何工作的图示。如果你对 `flatMap` 操作的工作原理仍有疑问，可以反向思考其名称。将其理解为\
  \ mapFlat，意思是“将输入流的元素映射到流，然后将映射后的流展平”。\n\n![A323070_2_En_13_Fig8_HTML.gif](img/A323070_2_En_13_Fig8_HTML.gif)\n\
  \n图 13-8.\n\n使用 flatMap() 方法展平流\n\n让我们再举一个 flat map 操作的例子。假设你有一个字符串流。你将如何计算字符串中字母\
  \ E 的数量？以下代码片段向你展示了如何操作：\n\n```\nlong count = Stream.of(\"Ken\", \"Jeff\", \"Ellen\"\
  )\n.map(name -> name.chars())\n.flatMap(intStream -> intStream.mapToObj(n -> (char)n))\n\
  .filter(ch -> ch == 'e' || ch == 'E')\n.count();\nSystem.out.println(\"Es count:\
  \ \" + count);\n```\n\n```\nEs count: 4\n```\n\n该代码将字符串映射到 `IntStream`。请注意，`String`\
  \ 类的 `chars()` 方法返回的是 `IntStream`，而不是 `Stream<Character>`。`map()` 方法的输出是 `Stream<IntStream>`。`flatMap()`\
  \ 方法将 `Stream<IntStream>` 映射到 `Stream<Stream<Character>>`，最后将其展平以生成 `Stream<Character>`。因此，`flatMap()`\
  \ 方法的输出是 `Stream<Character>`。`filter()` 方法过滤掉任何不是 `E` 或 `e` 的字符。最后，`count()` 方法返回流中元素的数量。主要逻辑是将\
  \ `Stream<String>` 转换为 `Stream<Character>`。你也可以使用以下代码实现相同的目的：\n\n```\nlong count\
  \ = Stream.of(\"Ken\", \"Jeff\", \"Ellen\")\n.flatMap(name -> IntStream.range(0,\
  \ name.length())\n.mapToObj(name::charAt))\n.filter(ch -> ch == 'e' || ch == 'E')\n\
  .count();\n```\n\n`IntStream.range()` 方法创建一个 `IntStream`，其中包含输入字符串中所有字符的索引。`mapToObj()`\
  \ 方法将 `IntStream` 转换为 `Stream<Character>`，其元素是输入字符串中的字符。\n\n应用过滤操作\n\n过滤操作应用于输入流，以生成另一个流，称为过滤流。过滤流包含输入流中所有谓词评估为\
  \ `true` 的元素。谓词是一个接受流元素并返回 `boolean` 值的函数。与映射流不同，过滤流的类型与输入流相同。\n\n过滤操作生成输入流的一个子集。如果谓词对输入流的所有元素都评估为\
  \ `false`，则过滤流是一个空流。图 13-9 展示了将过滤操作应用于流的图示。该图显示输入流中的两个元素（`e1` 和 `en`）进入了过滤流，而另外两个元素（`e2`\
  \ 和 `e3`）被过滤掉了。\n\n![A323070_2_En_13_Fig9_HTML.gif](img/A323070_2_En_13_Fig9_HTML.gif)\n\
  \n图 13-9.\n\n过滤操作的图示\n\n你可以使用 `Stream`、`IntStream`、`LongStream` 和 `DoubleStream`\
  \ 接口的 `filter()` 方法将过滤操作应用于流。该方法接受一个 `Predicate`。Streams API 提供了不同风格的过滤操作，我将在给出几个使用\
  \ `filter()` 方法的示例后进行讨论。\n\n提示\n\n在映射操作中，新流包含与输入流相同数量的元素，但值不同。在过滤操作中，新流包含不同数量的元素，但值与输入流相同。\n\
  \n以下代码片段使用一个人流，并仅过滤出女性。它将女性映射到其姓名，并打印到标准输出。\n\n```\nPerson.persons()\n.stream()\n\
  .filter(Person::isFemale)\n.map(Person::getName)\n.forEach(System.out::println);\n\
  ```\n\n```\nDonna\nLaynie\n```\n\n以下代码片段应用了两个过滤操作，以打印所有收入超过 5000.0 的男性的姓名：\n\n```\n\
  Person.persons()\n.stream()\n.filter(Person::isMale)\n.filter(p -> p.getIncome()\
  \ > 5000.0)\n.map(Person::getName)\n.forEach(System.out::println);\n```\n\n```\n\
  Ken\nJeff\n```\n\n你也可以使用以下语句实现相同的目的，该语句仅使用一个过滤操作，将两个过滤谓词合并为一个谓词：\n\n```\nPerson.persons()\n\
  .stream()\n.filter(p -> p.isMale() && p.getIncome() > 5000.0)\n.map(Person::getName)\n\
  .forEach(System.out::println);\n```\n\n```\nKen\nJeff\n```\n\n以下方法可用于对流应用过滤操作：\n\
  \n*   `Stream<T> skip(long count)`\n\n*   `Stream<T> limit(long maxCount)`\n\n*\
  \   `default Stream<T> dropWhile(Predicate<? super T> predicate)`\n\n*   `default\
  \ Stream<T> takeWhile(Predicate<? super T> predicate)`\n\n\n\n`skip()`方法会跳过流开头指定数量的`count`个元素，然后返回剩余元素。`limit()`方法则从流开头返回不超过指定`maxCount`个数的元素。这两种方法中，一种是从开头丢弃元素，另一种是从开头获取元素并丢弃剩余部分。它们都基于元素数量进行操作。`dropWhile()`和`takeWhile()`方法分别类似于`skip()`和`limit()`方法；不过，它们基于`Predicate`（谓词）而非元素数量来工作。\n\
  \n提示\n\n`dropWhile()`和`takeWhile()`方法是在 Java 9 中添加到`Stream`接口的。Java 9 还将这些方法添加到了`IntStream`、`LongStream`和`DoubleStream`接口中。\n\
  \n你可以将`dropWhile()`和`takeWhile()`方法视为与`filter()`方法类似，但有一个例外。`filter()`方法会对所有元素评估谓词，而`dropWhile()`和`takeWhile()`方法则从流开头开始评估谓词，直到谓词评估结果为`false`。\n\
  \n对于有序流，`dropWhile()`方法会丢弃流开头满足指定谓词为`true`的元素，然后返回剩余元素。考虑以下有序整数流：\n\n```\n1, 2,\
  \ 3, 4, 5, 6, 7\n```\n\n如果你在`dropWhile()`方法中使用一个谓词，该谓词对小于 5 的整数返回`true`，那么该方法将丢弃前四个元素并返回剩余部分：\n\
  \n```\nStream.of(1, 2, 3, 4, 5, 6, 7)\n.dropWhile(e -> e < 5)\n.forEach(System.out::println);\n\
  ```\n\n```\n\n```\n\n对于无序流，`dropWhile()`方法的行为是不确定的。它可能会选择丢弃任意匹配谓词的子集元素。当前的实现会从开头丢弃匹配的元素，直到遇到不匹配的元素。以下代码片段在无序流上使用了`dropWhile()`方法，并且只丢弃了一个匹配谓词的元素：\n\
  \n```\nStream.of(1, 5, 6, 2, 3, 4, 7)\n.dropWhile(e -> e < 5)\n.forEach(System.out::println);\n\
  ```\n\n```\n\n```\n\n`dropWhile()`方法有两种极端情况。如果第一个元素不匹配谓词，该方法返回原始流。如果所有元素都匹配谓词，该方法返回一个空流。\n\
  \n`takeWhile()`方法的工作方式与`dropWhile()`方法相同，区别在于它返回流开头匹配的元素，并丢弃剩余部分。\n\n警告\n\n在有序的并行流中使用`dropWhile()`和`takeWhile()`方法时要格外小心，因为可能会遇到性能下降的问题。在有序的并行流中，这些方法必须等待所有线程中的元素排序并返回后才能执行。这些方法在顺序流中性能最佳。\n\
  \n应用归约操作\n\n归约操作通过重复应用组合函数，将流中的所有元素合并以生成单个值。它也被称为归约操作或折叠操作。计算整数流元素的总和、最大值、平均值、计数等，都是归约操作的例子。将流中的元素收集到`List`、`Set`或`Map`中也是归约操作的一个例子。\n\
  \n归约操作接受两个参数：一个称为种子（也称为初始值），另一个称为累加器。累加器是一个函数。如果流为空，则种子就是结果。否则，种子代表一个部分结果。部分结果和一个元素被传递给累加器，累加器返回另一个部分结果。这个过程重复进行，直到所有元素都被传递给累加器。累加器返回的最后一个值就是归约操作的结果。图\
  \ 13-10 展示了归约操作的图示。\n\n![A323070_2_En_13_Fig10_HTML.gif](img/A323070_2_En_13_Fig10_HTML.gif)\n\
  \n图 13-10. 应用归约操作的图示\n\n与流相关的接口包含两个方法：`reduce()`和`collect()`，用于执行通用的归约操作。诸如`sum()`、`max()`、`min()`、`count()`等方法也可用于执行特定的归约操作。请注意，并非所有类型的流都提供这些特定方法。例如，在`Stream<T>`接口中有一个`sum()`方法是没有意义的，因为添加引用类型元素（例如将两个人相加）是无意义的。因此，你只会在`IntStream`、`LongStream`和`DoubleStream`接口中找到像`sum()`这样的方法。计算流中元素的数量对所有类型的流都有意义。因此，`count()`方法适用于所有类型的流。我将在本节讨论`reduce()`方法。我将在接下来的几个小节中讨论`collect()`方法。\n\
  \n让我们考虑以下代码片段，它以命令式编程风格执行归约操作。该代码计算列表中所有整数的总和。\n\n```\n// 创建整数列表\nList numbers =\
  \ List.of(1, 2, 3, 4, 5);\n// 声明一个名为 sum 的累加器，并将其初始化（或播种）为零\nint sum = 0;\nfor(int\
  \ num : numbers) {\n// 将部分结果累加到 sum 中\nsum = sum + num;\n}\n// 打印结果\nSystem.out.println(sum);\n\
  ```\n\n```\n\n```\n\n该代码声明了一个名为`sum`的变量，并将其初始化为 0。如果列表中没有元素，则`sum`的初始值就是结果。`for-each`循环遍历列表，并持续将部分结果存储在`sum`变量中，将其用作累加器。当`for-each`循环结束时，`sum`变量包含结果。正如本章开头所指出的，这样的`for`循环没有并行化的空间；整个逻辑必须在单个线程中执行。\n\
  \n考虑另一个例子，该例子计算列表中`persons`的收入总和：\n\n```\n// 声明一个名为 sum 的累加器，并将其初始化为零\ndouble sum\
  \ = 0.0;\nfor(Person person : Person.persons()) {\n// 将 Person 映射为其收入 double\ndouble\
  \ income = person.getIncome();\n// 将部分结果累加到 sum 中\nsum = sum + income;\n}\nSystem.out.println(sum);\n\
  ```\n\n这次，你不得不执行一个额外的步骤，将`Person`映射为其收入，然后才能将部分结果累加到`sum`变量中。\n\n`Stream<T>`接口包含一个`reduce()`方法来执行归约操作。该方法有三个重载版本：\n\
  \n*   `T reduce(T identity, BinaryOperator<T> accumulator)`\n\n*   `<U> U reduce(U\
  \ identity, BiFunction<U,? super T,U> accumulator, BinaryOperator<U> combiner)`\n\
  \n*   `Optional<T> reduce(BinaryOperator<T> accumulator)`\n\n`reduce()`方法的第一个版本接受一个初始值和一个累加器作为参数，并将流归约为相同类型的单个值。你可以将计算列表中整数总和的示例重写如下：\n\
  \n```\nList numbers = List.of(1, 2, 3, 4, 5);\nint sum = numbers.stream()\n.reduce(0,\
  \ Integer::sum);\nSystem.out.println(sum);\n```\n\n```\n\n```\n\n让我们尝试对第二个例子（计算收入总和）做同样的操作。以下代码会产生编译时错误。仅显示错误消息的相关部分。\n\
  \n```\ndouble sum = Person.persons()\n.stream()\n.reduce(0.0, Double::sum);\n```\n\
  \n```\nerror: no suitable method found for reduce(double,Double::sum)\n.reduce(0.0,\
  \ Double::sum);\n^\nmethod Stream.reduce(Person,BinaryOperator) is not applicable\n\
  (argument mismatch; double cannot be converted to Person) ...\n```\n\n\n\n`Person.persons().stream()`中的`stream()`方法返回一个`Stream<Person>`，因此`reduce()`方法本应对`Person`对象执行归约操作。然而，该方法的第一个参数是\
  \ 0.0，这意味着该方法试图对`Double`类型而非`Person`类型进行操作。这种期望参数类型`Person`与实际参数类型`Double`的不匹配导致了错误。\n\
  \n您想要计算所有人的收入总和。您需要使用`map`操作将人员流映射为其收入流，如下所示：\n\n```\ndouble sum = Person.persons()\n\
  .stream()\n.map(Person::getIncome)\n.reduce(0.0, Double::sum);\nSystem.out.println(sum);\n\
  ```\n\n```\n26000.0\n```\n\n执行 map-reduce 操作是函数式编程中的典型做法。为方便参考，这里再次展示`reduce`方法的第二个版本，它允许您先执行\
  \ map 操作，再执行 reduce 操作。\n\n```\nU reduce(U identity, BiFunction accumulator, BinaryOperator\
  \ combiner)\n```\n\n请注意，第二个参数（即累加器）接受一个参数，其类型可能与流的类型不同。这既用于 map 操作，也用于累积部分结果。第三个参数用于在并行执行\
  \ reduce 操作时合并部分结果，稍后我会详细说明。以下代码片段打印了所有人的收入总和：\n\n```\ndouble sum = Person.persons()\n\
  .stream()\n.reduce(0.0, (partialSum, person) -> partialSum + person.getIncome(),\
  \ Double::sum);\nSystem.out.println(sum);\n```\n\n```\n26000.0\n```\n\n如果检查代码，您会发现`reduce()`方法的第二个参数在这种情况下足以产生所需结果。那么，第三个参数`Double::sum`（即合并器）的作用是什么？实际上，即使您指定了合并器，它在`reduce()`操作中也完全没有被使用。您可以使用以下代码验证合并器未被使用，该代码会从合并器中打印一条消息：\n\
  \n```\ndouble sum = Person.persons()\n.stream()\n.reduce(0.0, (partialSum, person)\
  \ -> partialSum + person.getIncome(),\n(a, b) -> {\nSystem.out.println(\"Combiner\
  \ called: a = \" + a + \"b = \" + b );\nreturn a + b;\n});\nSystem.out.println(sum);\n\
  ```\n\n```\n26000.0\n```\n\n输出证明合并器未被调用。既然它没有被使用，为什么还需要提供合并器呢？当 reduce 操作并行执行时，它就会被使用。在这种情况下，每个线程将使用累加器累积部分结果。最后，合并器用于合并所有线程的部分结果以得到最终结果。以下代码片段展示了顺序\
  \ reduce 操作的工作原理。该代码在多个步骤中打印消息以及当前执行操作的线程名称。\n\n```\ndouble sum = Person.persons()\n\
  .stream()\n.reduce(0.0,\n(Double partialSum, Person p) -> {\ndouble accumulated\
  \ = partialSum + p.getIncome();\nSystem.out.println(Thread.currentThread().getName()\
  \ +\n\" - Accumulator: partialSum = \" +                         partialSum + \"\
  , person = \" + p +\n\", accumulated = \" + accumulated);\nreturn accumulated;\n\
  },\n(a, b) -> {\ndouble combined = a + b;\nSystem.out.println(Thread.currentThread().getName()\
  \ +\n\" - Combiner: a = \" + a + \", b = \" + b +\n\", combined = \" + combined);\n\
  return combined ;\n});\nSystem.out.println(sum);\n```\n\n```\nmain - Accumulator:\
  \ partialSum = 0.0, person = (1, Ken, MALE, 1970-05-04, 6000.00), accumulated =\
  \ 6000.0\nmain - Accumulator: partialSum = 6000.0, person = (2, Jeff, MALE, 1970-07-15,\
  \ 7100.00), accumulated = 13100.0\nmain - Accumulator: partialSum = 13100.0, person\
  \ = (3, Donna, FEMALE, 1962-07-29, 8700.00), accumulated = 21800.0\nmain - Accumulator:\
  \ partialSum = 21800.0, person = (4, Chris, MALE, 1993-12-16, 1800.00), accumulated\
  \ = 23600.0\nmain - Accumulator: partialSum = 23600.0, person = (5, Laynie, FEMALE,\
  \ 2012-12-13, 0.00), accumulated = 23600.0\nmain - Accumulator: partialSum = 23600.0,\
  \ person = (6, Li, MALE, 2001-05-09, 2400.00), accumulated = 26000.0\n26000.0\n\
  ```\n\n输出显示累加器足以产生结果，而合并器从未被调用。请注意，只有一个名为`main`的线程处理了流中的所有人员。\n\n让我们将流转换为并行流，同时保留所有调试信息。以下代码使用并行流来获取所有人的收入总和。您可能会得到包含不同消息的输出，但总和值将相同，均为\
  \ 26000.0。\n\n```\ndouble sum = Person.persons()\n.parallelStream()\n.reduce(0.0,\n\
  (Double partialSum, Person p) -> {\ndouble accumulated = partialSum + p.getIncome();\n\
  System.out.println(Thread.currentThread().getName() +\n\" - Accumulator: partialSum\
  \ = \" + partialSum + \", person = \" + p +\n\", accumulated = \" + accumulated);\n\
  return accumulated;\n},\n(a, b) -> {\ndouble combined = a + b;\nSystem.out.println(Thread.currentThread().getName()\
  \ +\n\" - Combiner: a = \" + a + \", b = \" + b +\n\", combined = \" + combined);\n\
  return combined ;\n});\nSystem.out.println(sum);\n```\n\n```\nForkJoinPool.commonPool-worker-4\
  \ - Accumulator: partialSum = 0.0, person = (5, Laynie, FEMALE, 2012-12-13, 0.00),\
  \ accumulated = 0.0\nForkJoinPool.commonPool-worker-2 - Accumulator: partialSum\
  \ = 0.0, person = (6, Li, MALE, 2001-05-09, 2400.00), accumulated = 2400.0\nForkJoinPool.commonPool-worker-1\
  \ - Accumulator: partialSum = 0.0, person = (2, Jeff, MALE, 1970-07-15, 7100.00),\
  \ accumulated = 7100.0\nForkJoinPool.commonPool-worker-2 - Combiner: a = 0.0, b\
  \ = 2400.0, combined = 2400.0\nForkJoinPool.commonPool-worker-5 - Accumulator: partialSum\
  \ = 0.0, person = (3, Donna, FEMALE, 1962-07-29, 8700.00), accumulated = 8700.0\n\
  main - Accumulator: partialSum = 0.0, person = (4, Chris, MALE, 1993-12-16, 1800.00),\
  \ accumulated = 1800.0\nForkJoinPool.commonPool-worker-3 - Accumulator: partialSum\
  \ = 0.0, person = (1, Ken, MALE, 1970-05-04, 6000.00), accumulated = 6000.0\nmain\
  \ - Combiner: a = 1800.0, b = 2400.0, combined = 4200.0\nForkJoinPool.commonPool-worker-5\
  \ - Combiner: a = 7100.0, b = 8700.0, combined = 15800.0\nForkJoinPool.commonPool-worker-5\
  \ - Combiner: a = 6000.0, b = 15800.0, combined = 21800.0\nForkJoinPool.commonPool-worker-5\
  \ - Combiner: a = 21800.0, b = 4200.0, combined = 26000.0\n26000.0\n```\n\n输出显示六个线程（五个\
  \ fork/join 工作线程和一个主线程）执行了并行归约操作。它们都使用累加器执行了部分归约以获得部分结果。最后，使用合并器将部分结果合并得到最终结果。\n\
  \n有时您无法为归约操作指定默认值。假设您想从一个整数流中获取最大值。如果流为空，您不能将最大值默认为 0。在这种情况下，结果是不确定的。`reduce(BinaryOperator<T>\
  \ accumulator)`方法的第三个版本用于执行此类归约操作。该方法返回一个`Optional<T>`，它包装了结果或结果不存在的情况。如果流只包含一个元素，则该元素就是结果。如果流包含多个元素，则前两个元素被传递给累加器，随后部分结果和剩余元素被传递给累加器。以下代码片段计算了流中整数的最大值：\n\
  \n\n\n```\nOptional max = Stream.of(1, 2, 3, 4, 5)\n.reduce(Integer::max);\nif (max.isPresent())\
  \ {\nSystem.out.println(\"max = \" + max.get());\n} else {\nSystem.out.println(\"\
  max is not defined.\");\n}\n```\n\n```\nmax = 5\n```\n\n以下代码片段尝试获取一个空流中整数的最大值：\n\
  \n```\nOptional max = Stream.empty()\n.reduce(Integer::max);\nif (max.isPresent())\
  \ {\nSystem.out.println(\"max = \" + max.get());\n} else {\nSystem.out.println(\"\
  max is not defined.\");\n}\n```\n\n```\nmax is not defined.\n```\n\n以下代码片段打印人员列表中收入最高者的详细信息：\n\
  \n```\nOptional person = Person.persons()\n.stream()\n.reduce((p1, p2) -> p1.getIncome()\
  \ > p2.getIncome() ? p1 : p2);\nif (person.isPresent()) {\nSystem.out.println(\"\
  Highest earner: \" + person.get());\n} else {\nSystem.out.println(\"Could not get\
  \ the highest earner.\");\n}\n```\n\n```\nHighest earner: (3, Donna, FEMALE, 1962-07-29,\
  \ 8700.00)\n```\n\n要计算数值流的和、最大值、最小值、平均值等，你不需要使用 `reduce()` 方法。你可以将非数值流映射为三种数值流类型（`IntStream`、`LongStream`\
  \ 或 `DoubleStream`）之一，并使用专门的方法来实现这些目的。以下代码片段打印所有人的收入总和。请注意，这里使用了 `mapToDouble()`\
  \ 方法，它将 `Stream<Person>` 转换为 `DoubleStream`。然后在 `DoubleStream` 上调用 `sum()` 方法。\n\
  \n```\ndouble totalIncome = Person.persons()\n.stream()\n.mapToDouble(Person::getIncome)\n\
  .sum();\nSystem.out.println(\"Total Income: \" + totalIncome);\n```\n\n```\nTotal\
  \ Income : 26000.0\n```\n\n要获取流的最小值和最大值，请使用特定流的 `min()` 和 `max()` 方法。`Stream<T>`\
  \ 接口中的这些方法接受一个 `Comparator` 作为参数，并返回一个 `Optional<T>`。在 `IntStream`、`LongStream`\
  \ 和 `DoubleStream` 接口中，它们不接受任何参数，并分别返回 `OptionalInt`、`OptionalLong` 和 `OptionalDouble`。以下代码片段打印人员列表中收入最高者的详细信息：\n\
  \n```\nOptional person = Person.persons()\n.stream()\n.max(Comparator.comparingDouble(Person::getIncome));\n\
  if (person.isPresent()) {\nSystem.out.println(\"Highest earner: \" + person.get());\n\
  } else {\nSystem.out.println(\"Could not get the highest earner.\");\n}\n```\n\n\
  ```\nHighest earner: (3, Donna, FEMALE, 1962-07-29, 8700.00)\n```\n\n以下代码片段使用 `DoubleStream`\
  \ 的 `max()` 方法打印人员列表中的最高收入：\n\n```\nOptionalDouble income = Person.persons()\n.stream()\n\
  .mapToDouble(Person::getIncome)\n.max();\nif (income.isPresent()) {\nSystem.out.println(\"\
  Highest income: \" + income.getAsDouble());\n} else {\nSystem.out.println(\"Could\
  \ not get the highest income.\");\n}\n```\n\n```\nHighest income: 8700.0\n```\n\n\
  如何在一个流管道中获取男性中的最高收入者和女性中的最高收入者？到目前为止，你已经学习了如何使用归约操作计算单个值。在这种情况下，你需要将人员分为男性和女性两组，然后计算每组中收入最高的人。我将在下一节讨论\
  \ `collect()` 方法时，向你展示如何执行分组并收集多个值。\n\n流通过 `count()` 方法支持计数操作，该方法简单地返回流中元素的数量，类型为\
  \ `long`。以下代码片段打印人员流中的元素数量：\n\n```\nlong personCount = Person.persons()\n.stream()\n\
  .count();\nSystem.out.println(\"Person count: \" + personCount);\n```\n\n```\nPerson\
  \ count: 6\n```\n\n计数操作是一种专门的归约操作。你是否想过使用 `map()` 和 `reduce()` 方法来计算流中元素的数量？更简单的方法是将流中的每个元素映射为\
  \ 1，然后计算总和。这种方法没有使用 `reduce()` 方法。具体做法如下：\n\n```\nlong personCount = Person.persons()\n\
  .stream()\n.mapToLong(p -> 1L)\n.sum();\n```\n\n以下代码片段使用 `map()` 和 `reduce()` 方法来实现计数操作：\n\
  \n```\nlong personCount = Person.persons()\n.stream()\n.map(p -> 1L)\n.reduce(0L,\
  \ Long::sum);\n```\n\n以下代码片段仅使用 `reduce()` 方法来实现计数操作：\n\n```\nlong personCount =\
  \ Person.persons()\n.stream()\n.reduce(0L, (partialCount, person) -> partialCount\
  \ + 1L, Long::sum);\n```\n\n提示\n\n本节向你展示了在流上执行相同归约操作的多种方法。根据流类型和所使用的并行化方式，某些方法的性能可能优于其他方法。尽可能使用原始类型流，以避免拆箱的开销；尽可能使用并行流，以利用机器上可用的多核优势。\n\
  \n使用收集器收集数据\n\n到目前为止，你一直在对流应用归约，以生成单个值（原始值或引用值）或 `void`。例如，你使用了 `Stream<Integer>`\
  \ 接口的 `reduce()` 方法来计算一个 `long` 值，该值是所有元素的总和。在许多情况下，你可能希望将执行流管道的结果收集到一个集合中，例如 `List`、`Set`、`Map`\
  \ 等。有时你可能希望应用复杂的逻辑来汇总流的数据。例如，你可能希望按性别对人员进行分组，并计算每个性别组中收入最高的人。这可以通过使用 `Stream<T>`\
  \ 接口的 `collect()` 方法来实现。`collect()` 方法有两个重载版本：\n\n*   `<R> R collect(Supplier<R>\
  \ supplier, BiConsumer<R,? super T> accumulator, BiConsumer<R,R> combiner)`\n\n\
  *   `<R,A> R collect(Collector<? super T,A,R> collector)`\n\n该方法使用可变归约操作。它使用一个可变容器（例如可变的\
  \ `Collection`）来计算输入流的结果。`collect()` 方法的第一个版本接受三个参数：\n\n*   一个 供应商 ，它提供一个可变容器来存储（或收集）结果。\n\
  *   一个 累加器 ，它将结果累加到可变容器中。\n*   一个 组合器 ，当归约操作并行进行时，它用于合并部分结果。\n\n提示\n\n使用 `collect()`\
  \ 方法收集数据的容器不必是 `Collection`。它可以是任何能够累加结果的可变对象，例如 `StringBuilder`。\n\n假设你有一个人员流，并且希望将所有人员的姓名收集到一个\
  \ `ArrayList<String>` 中。以下是实现此目标的步骤。\n\n首先，你需要一个供应商，它将返回一个 `ArrayList<String>` 来存储姓名。你可以使用以下任一语句来创建供应商：\n\
  \n```\n// 使用 lambda 表达式\nSupplier> supplier = () -> new ArrayList();\n// 使用构造方法引用\n\
  Supplier> supplier = ArrayList::new;\n```\n\n其次，你需要创建一个累加器，它接收两个参数。第一个参数是供应商返回的容器，在本例中是\
  \ `ArrayList<String>`。第二个参数是流的元素。你的累加器应该简单地将姓名添加到列表中。你可以使用以下任一语句来创建累加器：\n\n```\n\
  // 使用 lambda 表达式\nBiConsumer, String> accumulator = (list, name) -> list.add(name);\n\
  // 使用方法引用\nBiConsumer, String> accumulator = ArrayList::add;\n```\n\n最后，你需要一个组合器，它将两个\
  \ `ArrayList<String>` 的结果合并为一个 `ArrayList<String>`。请注意，组合器仅在你使用并行流收集结果时使用。在顺序流中，累加器足以收集所有结果。你的组合器将很简单；它将使用\
  \ `addAll()` 方法将第二个列表的所有元素添加到第一个列表中。你可以使用以下任一语句来创建组合器：\n\n\n\n```\n// 使用 lambda\
  \ 表达式\nBiConsumer, ArrayList> combiner =\n(list1, list2) -> list1.addAll(list2);\n\
  // 使用方法引用\nBiConsumer, ArrayList> combiner = ArrayList::addAll;\n```\n\n现在，你可以使用\
  \ `collect()` 方法，通过以下代码片段来收集列表中所有人的姓名：\n\n```\nList names = Person.persons()\n.stream()\n\
  .map(Person::getName)\n.collect(ArrayList::new, ArrayList::add, ArrayList::addAll);\n\
  System.out.println(names);\n```\n\n```\n[Ken, Jeff, Donna, Chris, Laynie, Li]\n\
  ```\n\n你可以使用类似的方法将数据收集到 `Set` 和 `Map` 中。仅仅为了将数据收集到像列表这样简单的集合中，似乎需要编写大量样板代码。`collect()`\
  \ 方法的另一个版本提供了更简单的解决方案。它接受一个 `Collector` 接口的实例作为参数，并为你收集数据。`Collector` 接口位于 `java.util.stream`\
  \ 包中，其声明如下所示。仅展示了抽象方法。\n\n```\npublic interface Collector {\nSupplier supplier();\n\
  BiConsumer accumulator();\nBinaryOperator combiner();\nFunction finisher();\nSet\
  \ characteristics();\n}\n```\n\n`Collector` 接口接受三个类型参数，分别称为 `T`、`A` 和 `R`，其中 `T`\
  \ 是输入元素的类型，`A` 是累加器的类型，`R` 是结果的类型。前三个方法看起来很熟悉；你刚刚在前面的示例中使用了它们。finisher 用于将中间类型 `A`\
  \ 转换为结果类型 `R`。`Collector` 的特性描述了由 `Collector.Characteristics` 枚举的常量所表示的属性。\n\nStreams\
  \ API 的设计者意识到，自己实现收集器工作量太大。他们提供了一个名为 `Collectors` 的工具类，该类为常用的收集器提供了开箱即用的实现。`Collectors`\
  \ 类中最常用的三个方法是 `toList()`、`toSet()` 和 `toCollection()`。`toList()` 方法返回一个将数据收集到 `List`\
  \ 中的 `Collector`；`toSet()` 方法返回一个将数据收集到 `Set` 中的 `Collector`；`toCollection()` 接受一个\
  \ `Supplier`，该 `Supplier` 返回一个用于收集数据的 `Collection`。以下代码片段将所有姓名收集到一个 `List<String>`\
  \ 中：\n\n```\nList names = Person.persons()\n.stream()\n.map(Person::getName)\n.collect(Collectors.toList());\n\
  System.out.println(names);\n```\n\n```\n[Ken, Jeff, Donna, Chris, Laynie, Li]\n\
  ```\n\n请注意，这次你以更简洁的方式实现了相同的结果。\n\n以下代码片段将所有姓名收集到一个 `Set<String>` 中。请注意，`Set` 只保留唯一的元素。\n\
  \n```\nSet uniqueNames = Person.persons()\n.stream()\n.map(Person::getName)\n.collect(Collectors.toSet());\n\
  System.out.println(uniqueNames);\n```\n\n```\n[Donna, Ken, Chris, Jeff, Laynie,\
  \ Li]\n```\n\n输出没有特定的顺序，因为 `Set` 不对其元素施加任何顺序。你可以使用 `toCollection()` 方法将姓名收集到一个有序集合中，如下所示：\n\
  \n```\nSortedSet uniqueSortedNames= Person.persons()\n.stream()\n.map(Person::getName)\n\
  .collect(Collectors.toCollection(TreeSet::new));\nSystem.out.println(uniqueSortedNames);\n\
  ```\n\n```\n[Chris, Donna, Jeff, Ken, Laynie, Li]\n```\n\n回想一下，`toCollection()`\
  \ 方法接受一个 `Supplier` 作为参数，用于收集数据。在这种情况下，你使用了构造函数引用 `TreeSet::new` 作为 `Supplier`。这会产生使用\
  \ `TreeSet`（一个有序集合）来收集数据的效果。\n\n你也可以使用 sorted 操作对姓名列表进行排序。`Stream` 接口的 `sorted()`\
  \ 方法会生成另一个流，其中包含按排序顺序排列的相同元素。以下代码片段展示了如何将排序后的姓名收集到一个列表中：\n\n```\nList sortedName\
  \ = Person.persons()\n.stream()\n.map(Person::getName)\n.sorted()\n.collect(Collectors.toList());\n\
  System.out.println(sortedName);\n```\n\n```\n[Chris, Donna, Jeff, Ken, Laynie, Li]\n\
  ```\n\n请注意，代码在收集姓名之前应用了排序。收集器注意到它正在收集一个有序流（排序后的姓名），并在收集过程中保持该顺序。\n\n你会在 `Collectors`\
  \ 类中找到许多静态方法，这些方法返回一个旨在用作嵌套收集器的 `Collector`。其中一个方法是 `counting()` 方法，它返回输入元素的数量。以下是一个计算流中人数示例：\n\
  \n```\nlong count = Person.persons()\n.stream()\n.collect(Collectors.counting());\n\
  System.out.println(\"Person count: \" + count);\n```\n\n```\nPerson count: 6\n```\n\
  \n你可能会争辩说，你也可以使用 `Stream` 接口的 `count()` 方法实现相同的结果，如下所示：\n\n```\nlong count = Person.persons()\n\
  .stream()\n.count();\nSystem.out.println(\"Persons count: \" + count);\n```\n\n\
  ```\nPersons count: 6\n```\n\n什么时候应该使用 `Collectors.counting()` 方法而不是 `Stream.count()`\
  \ 方法来计算流中的元素数量？如前所述，收集器可以嵌套。你很快就会看到嵌套收集器的示例。`Collectors` 类中的这些方法旨在用作嵌套收集器，而不是像本例这样仅仅用于计算流中的元素数量。两者之间的另一个区别在于它们的类型：`Stream.count()`\
  \ 方法表示对流的一种操作，而 `Collectors.counting()` 方法返回一个 `Collector`。清单 13-8 展示了将排序后的姓名收集到列表中的完整程序。\n\
  \n```\n// CollectTest.java\npackage com.jdojo.streams;\nimport java.util.List;\n\
  import java.util.stream.Collectors;\npublic class CollectTest {\npublic static void\
  \ main(String[] args) {\nList sortedNames = Person.persons()\n.stream()\n.map(Person::getName)\n\
  .sorted()\n.collect(Collectors.toList());\nSystem.out.println(sortedNames);\n}\n\
  }\n清单 13-8.\n将结果收集到集合中\n```\n\n```\n[Chris, Donna, Jeff, Ken, Laynie, Li]\n```\n\
  \n收集汇总统计信息\n\n在以数据为中心的应用程序中，你需要计算一组数值数据的汇总统计信息。例如，你可能想知道所有人的收入的最大值、最小值、总和、平均值和计数。`java.util`\
  \ 包包含三个用于收集统计信息的类：\n\n*   `DoubleSummaryStatistics`\n\n*   `LongSummaryStatistics`\n\
  \n*   `IntSummaryStatistics`\n\n这些类不一定需要与流一起使用。你可以使用它们来计算任何一组数值数据的汇总统计信息。使用这些类很简单：创建该类的对象，使用\
  \ `accept()` 方法不断添加数值数据，最后调用 getter 方法（例如 `getCount()`、`getSum()`、`getMin()`、`getAverage()`\
  \ 和 `getMax()`）来获取这组数据的统计信息。清单 13-9 展示了如何计算一组 `double` 值的统计信息。\n\n```\n// SummaryStats.java\n\
  package com.jdojo.streams;\nimport java.util.DoubleSummaryStatistics;\npublic class\
  \ SummaryStats {\npublic static void main(String[] args) {\nDoubleSummaryStatistics\
  \ stats = new DoubleSummaryStatistics();\nstats.accept(100.0);\nstats.accept(500.0);\n\
  stats.accept(400.0);\n// 获取统计信息\nlong count = stats.getCount();\ndouble sum = stats.getSum();\n\
  double min = stats.getMin();\ndouble avg = stats.getAverage();\ndouble max = stats.getMax();\n\
  System.out.printf(\"count=%d, sum=%.2f, min=%.2f, max=%.2f, average=%.2f%n\",\n\
  count, sum, min, max, avg);\n}\n}\n清单 13-9.\n计算一组数值数据的汇总统计信息\n```\n\n```\ncount=3,\
  \ sum=1000.00, min=100.00, max=500.00, average=333.33\n```\n\n\n\n摘要统计类被设计用于与流（streams）配合使用。它们包含一个\
  \ `combine()` 方法，用于合并两个摘要统计结果。你能猜到它的用途吗？回想一下，当你从流中收集数据时，需要指定一个合并器（combiner），而此方法可以作为两个摘要统计结果的合并器。以下代码片段计算了所有人的收入摘要统计信息：\n\
  \n```\nDoubleSummaryStatistics incomeStats =\nPerson.persons()\n.stream()\n.map(Person::getIncome)\n\
  .collect(DoubleSummaryStatistics::new,\nDoubleSummaryStatistics::accept,\nDoubleSummaryStatistics::combine);\n\
  System.out.println(incomeStats);\n```\n\n```\nDoubleSummaryStatistics{count=6, sum=26000.000000,\
  \ min=0.000000, average=4333.333333, max=8700.000000}\n```\n\n`Collectors` 类包含一些方法，用于获取一个收集器（collector）来计算特定数值类型数据的摘要统计信息。这些方法分别命名为\
  \ `summarizingDouble()`、`summarizingLong()` 和 `summarizingInt()`。它们接受一个应用于流元素的函数，并分别返回\
  \ `DoubleSummaryStatistics`、`LongSummaryStatistics` 和 `IntSummaryStatistics`。你可以将前面示例的代码重写如下：\n\
  \n```\nDoubleSummaryStatistics incomeStats =\nPerson.persons()\n.stream()\n.collect(Collectors.summarizingDouble(Person::getIncome));\n\
  System.out.println(incomeStats);\n```\n\n```\nDoubleSummaryStatistics{count=6, sum=26000.000000,\
  \ min=0.000000, average=4333.333333, max=8700.000000}\n```\n\n`Collectors` 类还包含诸如\
  \ `counting()`、`summingXxx()`、`averagingXxx()`、`minBy()` 和 `maxBy()` 等方法，它们返回一个收集器，用于对一组数值数据执行特定类型的摘要计算。而使用\
  \ `summarizingXxx()` 方法则可以一次性获得这些结果。这里的 `Xxx` 可以是 `Double`、`Long` 和 `Int`。\n\n**将数据收集到映射（Map）中**\n\
  \n你可以将流中的数据收集到一个 `Map` 中。`Collectors` 类的 `toMap()` 方法返回一个用于将数据收集到 `Map` 中的收集器。该方法被重载，共有三个版本：\n\
  \n*   `toMap(Function<? super T,? extends K> keyMapper, Function<? super T,? extends\
  \ U> valueMapper)`\n\n*   `toMap(Function<? super T,? extends K> keyMapper, Function<?\
  \ super T,? extends U> valueMapper, BinaryOperator<U> mergeFunction)`\n\n*   `toMap(Function<?\
  \ super T,? extends K> keyMapper, Function<? super T,? extends U> valueMapper, BinaryOperator<U>\
  \ mergeFunction, Supplier<M> mapSupplier)`\n\n第一个版本接受两个参数。这两个参数都是 `Function`。第一个参数将流元素映射为\
  \ Map 中的键。第二个参数将流元素映射为 Map 中的值。如果发现重复的键，则会抛出 `IllegalStateException`。以下代码片段将人员数据收集到一个\
  \ `Map<long,String>` 中，其中键是人员 ID，值是人员姓名：\n\n```\nMap idToNameMap = Person.persons()\n\
  .stream()\n.collect(Collectors.toMap(Person::getId, Person::getName));\nSystem.out.println(idToNameMap);\n\
  ```\n\n```\n{1=Ken, 2=Jeff, 3=Donna, 4=Chris, 5=Laynie, 6=Li}\n```\n\n假设你想根据性别收集人员姓名。以下是第一次不正确的尝试，它会抛出\
  \ `IllegalStateException`。仅显示部分输出。\n\n```\nMap genderToNamesMap = Person.persons()\n\
  .stream()\n.collect(Collectors.toMap(Person::getGender, Person::getName));\n```\n\
  \n```\nException in thread \"main\" java.lang.IllegalStateException: Duplicate key\
  \ Ken ...\n```\n\n运行时提示存在重复键，因为 `Person::getGender` 会将人员的性别作为键返回，而流中有多个男性和女性。\n\n\
  解决方案是使用 `toMap()` 方法的第二个版本来获取收集器。它允许你指定一个合并函数作为第三个参数。合并函数接收重复键对应的旧值和新值。该函数应合并这两个值，并返回一个将用于该键的新值。在你的场景中，你可以连接所有男性和女性的姓名。以下代码片段实现了这一点：\n\
  \n```\nMap genderToNamesMap = Person.persons()\n.stream()\n.collect(Collectors.toMap(Person::getGender,\
  \ Person::getName,\n(oldValue, newValue) -> String.join(\", \", oldValue, newValue)));\n\
  System.out.println(genderToNamesMap);\n```\n\n```\n{FEMALE=Donna, Laynie, MALE=Ken,\
  \ Jeff, Chris, Li}\n```\n\n`toMap()` 方法的前两个版本会为你创建 `Map`。第三个版本允许你传递一个 `Supplier`\
  \ 来自己提供 `Map`。我不再介绍使用此版本 `toMap()` 方法的示例。\n\n掌握了两个将数据收集到 Map 中的示例后，你能想到将数据收集到 Map\
  \ 中并汇总按性别统计人数的逻辑吗？以下是实现方法：\n\n```\nMap countByGender = Person.persons()\n.stream()\n\
  .collect(Collectors.toMap(Person::getGender, p -> 1L,\n(oldCount, newCount) -> oldCount\
  \ + 1));\nSystem.out.println(countByGender);\n```\n\n```\n{MALE=4, FEMALE=2}\n```\n\
  \n键映射函数保持不变。值映射函数是 `p -> 1L`，这意味着当首次遇到某个性别的人员时，其值被设置为 1。如果遇到重复键，则会调用合并函数，该函数简单地将旧值加\
  \ 1。\n\n本类别中最后一个示例是将按性别划分的最高收入者收集到 `Map` 中，如清单 13-10 所示。\n\n```\n// CollectIntoMapTest.java\n\
  package com.jdojo.streams;\nimport java.util.Map;\nimport java.util.function.Function;\n\
  import java.util.stream.Collectors;\npublic class CollectIntoMapTest {\npublic static\
  \ void main(String[] args) {\nMap highestEarnerByGender =\nPerson.persons()\n.stream()\n\
  .collect(Collectors.toMap(Person::getGender, Function.identity(),\n(oldPerson, newPerson)\
  \ ->\nnewPerson.getIncome() > oldPerson.getIncome()?newPerson:oldPerson));\nSystem.out.println(highestEarnerByGender);\n\
  }\n}\n清单 13-10. 将按性别划分的最高收入者收集到 Map 中\n```\n\n```\n{FEMALE=(3, Donna, FEMALE, 1962-07-29,\
  \ 8700.00), MALE=(2, Jeff, MALE, 1970-07-15, 7100.00)}\n```\n\n该程序将 `Person` 对象作为值存储在\
  \ Map 中。注意使用了 `Function.identity()` 作为值映射函数。此方法返回一个恒等函数，它简单地返回传递给它的值。你也可以使用 lambda\
  \ 表达式 `person -> person` 来代替。合并函数会比较已存储为键值的 `Person` 对象的收入。如果新人员的收入高于现有人员，则返回新人员。\n\
  \n将数据收集到 Map 中是一种非常强大的数据汇总方式。稍后讨论数据分组和分区时，你将再次看到 Map 的应用。\n\n**提示**\n\n`toMap()`\
  \ 方法返回一个非并发（non-concurrent）的 Map，当流被并行处理时，这会产生性能开销。它有一个配套方法 `toConcurrentMap()`，该方法返回一个并发收集器，应在流被并行处理时使用。\n\
  \n**使用收集器连接字符串**\n\n`Collectors` 类的 `joining()` 方法返回一个收集器，该收集器连接 `CharSequence`\
  \ 流中的元素，并将结果作为 `String` 返回。连接按遭遇顺序（encounter order）进行。`joining()` 方法被重载，共有三个版本：\n\
  \n*   `joining()`\n\n*   `joining(CharSequence delimiter)`\n\n*   `joining(CharSequence\
  \ delimiter, CharSequence prefix, CharSequence suffix)`\n\n\n\n无参数版本仅将所有元素拼接在一起。第二个版本在两个元素之间使用分隔符。第三个版本则使用分隔符、前缀和后缀。前缀添加在结果的开头，后缀添加在结果的末尾。清单\
  \ 13-11 展示了如何使用 `joining()` 方法。\n\n```\n// CollectJoiningTest.java\npackage com.jdojo.streams;\n\
  import java.util.List;\nimport java.util.stream.Collectors;\npublic class CollectJoiningTest\
  \ {\npublic static void main(String[] args) {\nList persons = Person.persons();\n\
  String names = persons.stream()\n.map(Person::getName)\n.collect(Collectors.joining());\n\
  String delimitedNames = persons.stream()\n.map(Person::getName)\n.collect(Collectors.joining(\"\
  , \"));\nString prefixedNames = persons.stream()\n.map(Person::getName )\n.collect(Collectors.joining(\"\
  , \", \"Hello \", \". Goodbye.\"));\nSystem.out.println(\"Joined names: \" + names);\n\
  System.out.println(\"Joined, delimited names: \" + delimitedNames);\nSystem.out.println(prefixedNames);\n\
  }\n}\n清单 13-11.\n使用收集器连接 CharSequence 流\n```\n\n```\nJoined names: KenJeffDonnaChrisLaynieLi\n\
  Joined, delimited names: Ken, Jeff, Donna, Chris, Laynie, Li\nHello Ken, Jeff, Donna,\
  \ Chris, Laynie, Li. Goodbye.\n```\n\n数据分组\n\n为报表目的对数据进行分组是很常见的。例如，你可能想知道按性别划分的平均收入、按性别划分的最年轻的人等。在前面的章节中，你使用了\
  \ `Collectors` 类的 `toMap()` 方法来获取可用于在映射中对数据进行分组的收集器。`Collectors` 类的 `groupingBy()`\
  \ 方法返回一个收集器，该收集器在将数据收集到 `Map` 之前先对数据进行分组。如果你使用过 SQL 语句，这类似于使用“group by”子句。`groupingBy()`\
  \ 方法被重载，它有三个版本：\n\n*   `groupingBy(Function<? super T,? extends K> classifier)`\n\
  \n*   `groupingBy(Function<? super T,? extends K> classifier, Collector<? super\
  \ T,A,D> downstream)`\n\n*   `groupingBy(Function<? super T,? extends K> classifier,\
  \ Supplier<M> mapFactory, Collector<? super T,A,D> downstream)`\n\n我将讨论第一个和第二个版本。第三个版本与第二个版本相同，只是它允许你指定一个\
  \ `Supplier` 作为工厂来获取 `Map`。在前两个版本中，收集器会为你处理创建 `Map` 的工作。\n\n提示\n\n`groupingBy()`\
  \ 方法返回一个非并发映射，当流被并行处理时，该映射会有性能开销。它有一个配套方法叫做 `groupingByConcurrent()`，该方法返回一个并发收集器，应在并行流处理中使用以获得更好的性能。\n\
  \n在最通用的版本中，`groupingBy()` 方法接受两个参数：\n\n*   一个 **分类器**，它是一个用于生成映射中键的函数。\n*   一个 **收集器**，它对与每个键关联的值执行归约操作。\n\
  \n`groupingBy()` 方法的第一个版本返回一个收集器，该收集器将数据收集到 `Map<K, List<T>>` 中，其中 `K` 是分类器函数的返回类型，`T`\
  \ 是输入流中元素的类型。请注意，映射中分组键的值是来自流的元素列表。以下代码片段按性别收集人员列表：\n\n```\nMap> personsByGender\
  \ =\nPerson.persons()\n.stream()\n.collect(Collectors.groupingBy(Person::getGender));\n\
  System.out.println(personsByGender);\n```\n\n```\n{FEMALE=[(3, Donna, FEMALE, 1962-07-29,\
  \ 8700.00), (5, Laynie, FEMALE, 2012-12-13, 0.00)], MALE=[(1, Ken, MALE, 1970-05-04,\
  \ 6000.00), (2, Jeff, MALE, 1970-07-15, 7100.00), (4, Chris, MALE, 1993-12-16, 1800.00),\
  \ (6, Li, MALE, 2001-05-09, 2400.00)]}\n```\n\n假设你想获取按性别分组的名称列表。你需要使用 `groupingBy()`\
  \ 方法的第二个版本，该版本允许你对每个键的值执行归约操作。请注意，第二个参数的类型是 `Collector`。`Collectors` 类包含许多返回 `Collector`\
  \ 的方法，你将使用这些方法作为第二个参数。\n\n让我们尝试一个简单的案例：你想按性别对人进行分组，并统计每组的人数。`Collectors` 类的 `counting()`\
  \ 方法返回一个 `Collector` 来统计流中元素的数量。以下代码片段实现了这一点：\n\n```\nMap countByGender =\nPerson.persons()\n\
  .stream()\n.collect(Collectors.groupingBy(Person::getGender, Collectors.counting()));\n\
  System.out.println(countByGender);\n```\n\n```\n{MALE=4, FEMALE=2}\n```\n\n让我们回到按性别列出人名的例子。你需要使用\
  \ `Collectors` 类的 `mapping()` 方法来获取一个收集器，该收集器将键值中的人员列表映射到他们的名字并连接起来。`mapping()`\
  \ 方法的签名如下：\n\n```\nmapping(Function mapper, Collector downstream)\n```\n\n请注意 `mapping()`\
  \ 方法第二个参数的类型。它是另一个 `Collector`。这就是处理数据分组变得复杂的地方。你需要在收集器内部嵌套收集器。为了简化分组过程，你需要分解要对数据执行的操作。你已经按性别对人进行了分组。映射中每个键的值是一个\
  \ `List<Person>`。现在你想将 `List<Person>` 归约为一个 `String`，该字符串包含所有人的逗号分隔的名称列表。你需要单独考虑这个操作以避免混淆。你可以通过以下步骤完成此归约：\n\
  \n1.  使用一个函数将每个人映射到其姓名。这个函数可以简单到像 `Person::getName` 这样的方法引用。将此步骤的输出视为一个组中人员姓名的流。\n\
  2.  你想对第一步生成的姓名流做什么？你可能希望将它们收集到 `String`、`List`、`Set` 或其他数据结构中。在这种情况下，你想连接人员的姓名，因此你使用从\
  \ `Collectors` 类的 `joining()` 方法返回的收集器。\n\n以下代码片段展示了如何按性别对人名进行分组：\n\n```\nMap namesByGender\
  \ =\nPerson.persons()\n.stream()\n.collect(Collectors.groupingBy(Person::getGender,\n\
  Collectors.mapping(Person::getName, Collectors.joining(\", \"))));\nSystem.out.println(namesByGender);\n\
  ```\n\n```\n{MALE=Ken, Jeff, Chris, Li, FEMALE=Donna, Laynie}\n```\n\n该代码将一组的姓名收集到一个逗号分隔的\
  \ `String` 中。你能想到一种将姓名收集到 `List` 中的方法吗？这很容易实现。使用 `Collectors` 类的 `toList()` 方法返回的收集器，如下所示：\n\
  \n```\nMap> namesByGender =\nPerson.persons()\n.stream()\n.collect(Collectors.groupingBy(Person::getGender,\n\
  Collectors.mapping(Person::getName, Collectors.toList())));\nSystem.out.println(namesByGender);\n\
  ```\n\n```\n{FEMALE=[Donna, Laynie], MALE=[Ken, Jeff, Chris, Li]}\n```\n\n\n\n分组可以嵌套。让我们创建一个按性别分组的报告。在每个性别组内，再根据出生月份创建子组，并列出该组中出生的人员姓名。这是一个非常简单的计算。你已经知道如何按性别分组。你只需要对键的值再次进行分组，这实际上就是再次使用\
  \ `groupingBy()` 方法获取另一个收集器。在这种情况下，表示顶层分组（按性别）的映射中，键对应的值是一个 `Map`。清单 13-12 包含了完成此任务的完整代码。请注意，为了提升代码可读性，我们使用了静态导入来导入\
  \ `Collectors` 类中的静态方法。该程序假设每个人都有出生日期。\n\n```\n// NestedGroupings.java\npackage\
  \ com.jdojo.streams;\nimport java.time.Month;\nimport java.util.Map;\nimport static\
  \ java.util.stream.Collectors.groupingBy;\nimport static java.util.stream.Collectors.mapping;\n\
  import static java.util.stream.Collectors.joining;\npublic class NestedGroupings\
  \ {\npublic static void main(String[] args) {\nMap> personsByGenderAndDobMonth\n\
  = Person.persons()\n.stream()\n.collect(groupingBy(Person::getGender,\ngroupingBy(p\
  \ -> p.getDob().getMonth(),\nmapping(Person::getName, joining(\", \")))));\nSystem.out.println(personsByGenderAndDobMonth);\n\
  }\n}\n清单 13-12.\n使用嵌套分组\n```\n\n```\n{FEMALE={DECEMBER=Laynie, JULY=Donna}, MALE={DECEMBER=Chris,\
  \ JULY=Jeff, MAY=Ken, Li}}\n```\n\n请注意，输出结果有两个基于性别的顶层组：男性和女性。在每个性别组内，又根据人员的出生月份嵌套了子组。每个月份组都列出了该月出生的人员名单。例如，Ken\
  \ 和 Li 出生于五月，且为男性，因此他们在输出结果中一同列出。\n\n作为本节的最后一个示例，我们来汇总按性别分组的人员收入。清单 13-13 中的程序计算了按性别划分的收入汇总统计信息。我使用了静态导入来引用\
  \ `Collectors` 类中的方法名，以使代码更简洁。查看输出结果，你可以发现女性的平均收入比男性高出 25 美元。你可以在一个组内继续嵌套其他组。分组嵌套的层级没有限制。\n\
  \n```\n// IncomeStatsByGender.java\npackage com.jdojo.streams;\nimport java.util.DoubleSummaryStatistics;\n\
  import java.util.Map;\nimport static java.util.stream.Collectors.groupingBy;\nimport\
  \ static java.util.stream.Collectors.summarizingDouble;\npublic class IncomeStatsByGender\
  \ {\npublic static void main(String[] args) {\nMap incomeStatsByGender =\nPerson.persons()\n\
  .stream()\n.collect(groupingBy(Person::getGender,\nsummarizingDouble(Person::getIncome)));\n\
  System.out.println(incomeStatsByGender);\n}\n}\n清单 13-13.\n按性别分组的收入汇总统计\n```\n\n\
  ```\n{MALE=DoubleSummaryStatistics{count=4, sum=17300.000000, min=1800.000000, average=4325.000000,\
  \ max=7100.000000}, FEMALE=DoubleSummaryStatistics{count=2, sum=8700.000000, min=0.000000,\
  \ average=4350.000000, max=8700.000000}}\n```\n\n数据分区\n\n数据分区是数据分组的一种特殊情况。数据分组基于函数返回的键进行。有多少个不同的键，就有多少个组。而分区则将数据收集到两个组中：一个组满足某个条件，另一个组不满足该条件。分区条件通过\
  \ `Predicate` 来指定。到现在，你可能已经猜到了 `Collectors` 类中用于返回执行分区操作的收集器的方法名。该方法就是 `partitioningBy()`。它被重载了，有两个版本：\n\
  \n*   `partitioningBy(Predicate<? super T> predicate)`\n\n*   `partitioningBy(Predicate<?\
  \ super T> predicate, Collector<? super T,A,D> downstream)`\n\n与 `groupingBy()`\
  \ 方法类似，`partitioningBy()` 方法也将数据收集到一个 `Map` 中，其键的类型始终是 `Boolean`。请注意，该收集器返回的 `Map`\
  \ 始终包含两个条目：一个键值为 `true`，另一个键值为 `false`。\n\n`partitionedBy()` 方法的第一个版本返回一个收集器，该收集器根据指定的谓词执行分区操作。每个键对应的值存储在一个\
  \ `List` 中。如果谓词对某个元素的计算结果为 `true`，则该元素被添加到键值为 `true` 的列表中；否则，该值被添加到键值为 `false` 的列表中。以下代码片段根据人员是否为男性进行分区：\n\
  \n```\nMap> partionedByMaleGender =\nPerson.persons()\n.stream()\n.collect(Collectors.partitioningBy(Person::isMale));\n\
  System.out.println(partionedByMaleGender);\n```\n\n```\n{false=[(3, Donna, FEMALE,\
  \ 1962-07-29, 8700.00), (5, Laynie, FEMALE, 2012-12-13, 0.00)], true=[(1, Ken, MALE,\
  \ 1970-05-04, 6000.00), (2, Jeff, MALE, 1970-07-15, 7100.00), (4, Chris, MALE, 1993-12-16,\
  \ 1800.00), (6, Li, MALE, 2001-05-09, 2400.00)]}\n```\n\n该方法的第二个版本允许你指定另一个收集器，该收集器可以对每个键对应的值执行归约操作。在上一节使用\
  \ `groupingBy()` 方法对数据进行分组时，你已经见过多个此类示例。以下代码片段将人员分为男性和非男性两组，并将他们的姓名收集到一个以逗号分隔的字符串中：\n\
  \n```\nMap partionedByMaleGender =\nPerson.persons()\n.stream()\n.collect(Collectors.partitioningBy(Person::isMale,\n\
  Collectors.mapping(Person::getName, Collectors.joining(\", \"))));\nSystem.out.println(partionedByMaleGender\
  \ );\n```\n\n```\n{false=Donna, Laynie, true=Ken, Jeff, Chris, Li}\n```\n\n调整收集器结果\n\
  \n到目前为止，你已经看到收集器可以独立完成出色的工作：你只需指定需求，收集器就会为你完成所有工作。还有一类收集器，它们收集数据，并允许你在数据收集前后修改结果。你可以将收集器的结果适配为不同的类型；你可以在元素分组之后、收集之前对其进行过滤；你可以在元素分组时、收集之前对其进行映射。`Collectors`\
  \ 类中的以下静态方法返回此类收集器：\n\n*   `<T,A,R,RR> Collector<T,A,RR> collectingAndThen(Collector<T,A,R>\
  \ downstream, Function<R,RR> finisher)`\n\n*   `<T,A,R> Collector<T,?,R> filtering(Predicate<?\
  \ super T> predicate, Collector<? super T,A,R> downstream)`\n\n*   `<T,U,A,R> Collector<T,?,R>\
  \ flatMapping(Function<? super T,? extends Stream<? extends U>> mapper, Collector<?\
  \ super U,A,R> downstream)`\n\n`filtering()` 和 `flatMapping()` 方法是在 Java 9 中添加到\
  \ `Collectors` 类的。\n\n`collectingAndThen()` 方法允许你在收集器收集完所有元素后修改其结果。它的第一个参数是一个收集数据的收集器。第二个参数是一个完成器函数。该完成器接收一个结果，并可以自由地修改该结果，包括其类型。此类收集器的返回类型就是完成器的返回类型。完成器的一个常见用途是返回收集数据的不可修改视图。以下是一个返回不可修改的人员姓名列表的示例：\n\
  \n```\nList names = Person.persons()\n.stream()\n.map(Person::getName)\n.collect(Collectors.collectingAndThen(Collectors.toList(),\n\
  result -> Collections.unmodifiableList(result)));\nSystem.out.println(names);\n\
  ```\n\n```\n[Ken, Jeff, Donna, Chris, Laynie, Li]\n```\n\n\n\n收集器将名称收集到一个可变列表中，终结器则将该可变列表包装成一个不可修改的列表。让我们再看一个使用终结器的例子。假设你想打印一份日历，其中包含按出生月份分组的人员姓名。你已经收集了按出生月份分组的姓名列表。可能有些月份没有任何生日。但你仍然希望打印出月份名称，并添加“None”。以下是第一次尝试：\n\
  \n```\nMap dobCalendar = Person.persons()\n.stream()\n.collect(groupingBy(p -> p.getDob().getMonth(),\n\
  mapping(Person::getName, joining(\", \"))));\ndobCalendar.entrySet().forEach(System.out::println);\n\
  ```\n\n```\nMAY=Ken, Li\nDECEMBER=Chris, Laynie\nJULY=Jeff, Donna\n```\n\n这份日历存在三个问题：\n\
  \n*   未按月份排序。\n*   未包含所有月份。\n*   它是可修改的。`collect()` 方法返回的 `Map` 是可修改的。\n\n你可以通过使用\
  \ `collectingAndThen()` 方法返回的收集器并指定一个终结器来解决所有这三个问题。该终结器会在映射中添加缺失的月份，将映射转换为有序映射，并最终将映射包装成不可修改的映射。`collect()`\
  \ 方法返回终结器处理后的映射。清单 13-14 包含了完整代码。\n\n```\n// DobCalendar.java\npackage com.jdojo.streams;\n\
  import java.time.Month;\nimport java.util.Collections;\nimport java.util.Map;\n\
  import java.util.TreeMap;\nimport static java.util.stream.Collectors.collectingAndThen;\n\
  import static java.util.stream.Collectors.groupingBy;\nimport static java.util.stream.Collectors.joining;\n\
  import static java.util.stream.Collectors.mapping;\npublic class DobCalendar {\n\
  public static void main(String[] args) {\nMap dobCalendar = Person.persons()\n.stream().collect(collectingAndThen(\n\
  groupingBy(p -> p.getDob().getMonth(),\nmapping(Person::getName, joining(\", \"\
  ))),\nresult -> {\n// 添加缺失的月份\nfor (Month m : Month.values()) {\nresult.putIfAbsent(m,\
  \ \"None\");\n}\n// 返回一个已排序且不可修改的映射\nreturn Collections.unmodifiableMap(new TreeMap(result));\n\
  }));\ndobCalendar.entrySet().forEach(System.out::println );\n}\n}\n清单 13-14.\n调整收集器结果\n\
  ```\n\n```\nJANUARY=None\nFEBRUARY=None\nMARCH=None\nAPRIL=None\nMAY=Ken, Li\nJUNE=None\n\
  JULY=Jeff, Donna\nAUGUST=None\nSEPTEMBER=None\nOCTOBER=None\nNOVEMBER=None\nDECEMBER=Chris,\
  \ Laynie\n```\n\n`filtering()` 方法允许你对元素进行分组，在每个组内应用过滤器，并收集过滤后的元素。以下代码片段展示了如何按性别对人进行分组，并只收集收入超过\
  \ 8000.00 的人：\n\n```\nMap> makingOver8000 = Person.persons()\n.stream()\n.collect(groupingBy(Person::getGender,\n\
  filtering(p -> p.getIncome() > 8000.00, toList())));\nSystem.out.println(makingOver8000);\n\
  ```\n\n```\n{MALE=[], FEMALE=[(3, Donna, FEMALE, 1962-07-29, 8700.00)]}\n```\n\n\
  注意男性组中有一个空列表。在收集器中，收集了两个组：男性和女性。`filtering()` 方法过滤掉了男性组中的所有元素，因此你得到了一个空列表。如果你在原始流上使用\
  \ `filter()` 方法来过滤掉收入为 8000.00 或更低的人，那么输出中就不会出现男性组，因为收集器根本不会看到男性组。\n\n在“数据分组”部分，你已经看到了\
  \ `Collectors` 类的 `mapping()` 函数返回的收集器的用法，它允许你在将元素累积到收集器中之前对每个元素应用一个函数。`flatMapping()`\
  \ 方法允许你对每个元素应用一个扁平映射函数。考虑表 13-2 中的人员列表。假设你想通过按性别分组以及每种性别类型的人所说的独特语言列表来汇总表格数据。\n\n\
  表 13-2.\n\n人员列表、他们的性别以及他们所说的语言列表\n\n姓名\n |\n  性别\n |\n  语言\n |\n\n| --- | --- |\
  \ --- | --- | --- | --- | --- |\n\nKen\n |\n  男\n |\n  英语, 法语\n |\n\nJeff\n |\n\
  \  男\n |\n  西班牙语, 吴语\n |\n\nDonna\n |\n  女\n |\n  英语, 法语\n |\n\nChris\n |\n  男\n\
  \ |\n  吴语, 老挝语\n |\n\nLaynie\n |\n  女\n |\n  英语, 德语\n |\n\nLi\n |\n  男\n |\n  英语\n\
  \ |\n\n对于这个例子，我使用一个 `Map.Entry<String,Set<String>>` 实例来表示表中的一行。在表的每一行中，我只使用性别和所说的语言，忽略人名。清单\
  \ 13-15 包含了完整代码。\n\n```\n// FlatMappingTest.java\npackage com.jdojo.streams;\nimport\
  \ java.util.List;\nimport java.util.Map;\nimport java.util.Map.Entry;\nimport static\
  \ java.util.Map.entry;\nimport java.util.Set;\nimport static java.util.stream.Collectors.flatMapping;\n\
  import static java.util.stream.Collectors.groupingBy;\nimport static java.util.stream.Collectors.toSet;\n\
  public class FlatMappingTest {\npublic static void main(String[] args) {\n// 表示性别和所说的语言列表\n\
  List>> list = List.of(\nentry(\"Male\", Set.of(\"English\", \"French\")),\nentry(\"\
  Male\", Set.of(\"Spanish\", \"Wu\")),\nentry(\"Female\", Set.of(\"English\", \"\
  French\")),\nentry(\"Male\", Set.of(\"Wu\", \"Lao\")),\nentry(\"Female\", Set.of(\"\
  English\", \"German\")),\nentry(\"Male\", Set.of(\"English\")));\nMap> langByGender\
  \ = list.stream()\n.collect(groupingBy(Entry::getKey,\nflatMapping(e -> e.getValue().stream(),\
  \ toSet())));\nSystem.out.println(langByGender);\n}\n}\n清单 13-15.\n分组后应用扁平映射操作\n\
  ```\n\n```\n{Female=[English, French, German], Male=[English, French, Spanish, Lao,\
  \ Wu]}\n```\n\n`Entry::getKey` 方法引用用于按性别对列表元素进行分组。第一个参数将列表中的每个条目映射到一个 `Stream<String>`，其中包含该元素所说的语言。`flatMapping()`\
  \ 方法扁平化生成的流并收集结果，这些结果是 `Set<String>` 中所述语言的名称，从而得到按性别划分的独特语言列表。\n\n流中的查找与匹配\n\n\
  Streams API 支持对流元素执行不同类型的查找和匹配操作。例如，你可以检查流中是否有任何元素匹配某个谓词，是否所有元素都匹配某个谓词等。`Stream`\
  \ 接口中的以下方法用于执行查找和匹配操作：\n\n*   `boolean allMatch(Predicate<? super T> predicate)`\n\
  *   `boolean anyMatch(Predicate<? super T> predicate)`\n*   `boolean noneMatch(Predicate<?\
  \ super T> predicate)`\n*   `Optional<T> findAny()`\n*   `Optional<T> findFirst()`\n\
  \n原始类型流，如 `IntStream`、`LongStream` 和 `DoubleStream`，也包含相同的方法，这些方法适用于谓词，并为原始类型提供可选的对应方法。例如，`IntStream`\
  \ 中的 `allMatch()` 方法接受一个 `IntPredicate` 作为参数，而 `findAny()` 方法返回一个 `OptionalInt`。\n\
  \n所有查找和匹配操作都是终端操作。它们也是短路操作。短路操作可能无需处理整个流即可返回结果。例如，`allMatch()` 方法检查指定的谓词是否对流中的所有元素都为\
  \ `true`。如果谓词对某个元素求值为 `false`，则此方法返回 `false` 就足够了。一旦谓词对某个元素求值为 `false`，它就会停止进一步处理（短路）元素，并将结果返回为\
  \ `false`。同样的道理也适用于所有其他方法。请注意，`findAny()` 和 `findFirst()` 方法的返回类型是 `Optional<T>`，因为如果流为空，这些方法可能没有结果。\n\
  \n\n\n清单 13-16 中的程序演示了如何在流上执行查找和匹配操作。该程序使用了顺序流，因为流的大小非常小。如果需要在大型流上执行匹配操作，请考虑使用并行流。在这种情况下，任何线程都可以找到匹配或未找到匹配，从而结束匹配操作。\n\
  \n```\n// FindAndMatch.java\npackage com.jdojo.streams;\nimport java.util.List;\n\
  import java.util.Optional;\npublic class FindAndMatch {\npublic static void main(String[]\
  \ args) {\n// 获取人员列表\nList persons = Person.persons();\n// 检查是否所有人都是男性\nboolean\
  \ allMales = persons.stream()\n.allMatch(Person::isMale);\nSystem.out.println(\"\
  所有人都是男性: \" + allMales);\n// 检查是否有任何人生于 1970 年\nboolean anyoneBornIn1970 =  persons.stream()\n\
  .anyMatch(p -> p.getDob().getYear() == 1970);\nSystem.out.println(\"是否有任何人生于 1970\
  \ 年: \" + anyoneBornIn1970);\n// 检查是否有任何人生于 1955 年\nboolean anyoneBornIn1955 = persons.stream()\n\
  .anyMatch(p -> p.getDob().getYear() == 1955);\nSystem.out.println(\"是否有任何人生于 1955\
  \ 年: \" + anyoneBornIn1955);\n// 查找任意一位男性\nOptional anyMale = persons.stream()\n\
  .filter(Person::isMale)\n.findAny();\nif (anyMale.isPresent()) {\nSystem.out.println(\"\
  任意一位男性: \" + anyMale.get());\n} else {\nSystem.out.println(\"未找到男性。\");\n}\n// 查找第一位男性\n\
  Optional firstMale = persons.stream()\n.filter(Person::isMale)\n.findFirst();\n\
  if (firstMale.isPresent()) {\nSystem.out.println(\"第一位男性: \" + anyMale.get());\n\
  } else {\nSystem.out.println(\"未找到男性。\");\n}\n}\n}\n清单 13-16.\n在流上执行查找和匹配操作\n```\n\
  \n```\n所有人都是男性: false\n是否有任何人生于 1970 年: true\n是否有任何人生于 1955 年: false\n任意一位男性: (1,\
  \ Ken, MALE, 1970-05-04, 6000.00)\n第一位男性: (1, Ken, MALE, 1970-05-04, 6000.00)\n\
  ```\n\n并行流\n\n流可以是顺序的或并行的。对顺序流的操作使用单个线程串行处理。对并行流的操作使用多个线程并行处理。你无需采取额外步骤来处理流，因为它们要么是顺序的，要么是并行的。你只需调用生成顺序流或并行流的适当方法即可。其他一切均由\
  \ Streams API 处理。这就是我在本章开头所说的，你“几乎”可以免费获得流处理中的并行性。\n\nStreams API 中的大多数方法默认生成顺序流。要从集合（例如\
  \ `List` 或 `Set`）生成并行流，你需要调用 `Collection` 接口的 `parallelStream()` 方法。使用流上的 `parallel()`\
  \ 方法可以将顺序流转换为并行流。相反，使用流上的 `sequential()` 方法可以将并行流转换为顺序流。以下代码片段展示了流管道的串行处理，因为该流是顺序的：\n\
  \n```\nString names = Person.persons()               // 数据源\n.stream()         \
  \       // 生成顺序流\n.filter(Person::isMale)  // 串行处理\n.map(Person::getName)    //\
  \ 串行处理\n.collect(Collectors.joining(\", \")); // 串行处理\n```\n\n以下代码片段展示了流管道的并行处理，因为该流是并行的：\n\
  \n```\nString names = Person.persons()           // 数据源\n.parallelStream()     \
  \  // 生成并行流\n.filter(Person::isMale) // 并行处理\n.map(Person::getName)   // 并行处理\n\
  .collect(Collectors.joining(\", \")); // 并行处理\n```\n\n以下代码片段展示了流管道的混合模式处理，因为管道中的操作生成了顺序流和并行流：\n\
  \n```\nString names = Person.persons()          // 数据源\n.stream()              \
  \  // 生成顺序流\n.filter(Person::isMale)  // 串行处理\n.parallel()              // 生成并行流\n\
  .map(Person::getName)    // 并行处理\n.collect(Collectors.joining(\", \")); // 并行处理\n\
  ```\n\n顺序流之后的操作串行执行，并行流之后的操作并行执行。你可以免费获得流处理中的并行性。那么，何时在流处理中使用并行性？无论何时使用并行性，你都能获得其好处吗？答案是否定的。在使用并行流之前，必须满足一些条件。有时使用并行流可能会导致性能更差。\n\
  \nStreams API 使用 Fork/Join 框架来处理并行流。Fork/Join 框架使用多个线程。它将流元素分成多个块；每个线程处理一个元素块以生成部分结果，然后将这些部分结果合并以得到最终结果。启动多个线程、将数据分成块以及合并部分结果会占用\
  \ CPU 时间。这种开销是否值得，取决于完成任务的总体时间。例如，一个包含六个人的流，并行处理所需的时间会比串行处理更长。为如此小的工作量设置线程并协调它们的开销是不值得的。\n\
  \n你已经看到使用 `Iterator` 来遍历集合元素。Streams API 使用 `Spliterator`（可拆分迭代器）来遍历流元素。`Spliterator`\
  \ 是 `Iterator` 的泛化。迭代器提供对数据元素的顺序访问。`Spliterator` 提供对数据元素的顺序访问和分解。当你创建一个 `Spliterator`\
  \ 时，它知道它将处理的数据块。你可以将一个 `Spliterator` 拆分成两个：每个将获得自己的数据块进行处理。`Spliterator` 是 `java.util`\
  \ 包中的一个接口。它被大量用于将流元素拆分成块，以便由多个线程处理。作为 Streams API 的用户，你永远不需要直接与 `Spliterator` 打交道。流的数据源提供了一个\
  \ `Spliterator`。如果 `Spliterator` 能够知道流的大小，那么流的并行处理会更快。流可以基于具有固定大小或未知大小的数据源。如果无法确定流的大小，则无法将流元素拆分成块。在这种情况下，即使你可以使用并行流，也可能无法获得并行性的好处。\n\
  \n并行处理中的另一个考虑因素是元素的顺序。如果元素是有序的，线程需要在处理结束时保持顺序。如果顺序对你来说不重要，你可以使用 `unordered()` 方法将有序流转换为无序流。\n\
  \n`Spliterator` 将数据元素分成块。重要的是，流的数据源在流处理期间不会改变；否则结果未定义。例如，如果你的流使用列表/集合作为数据源，则在处理流时不要向列表/集合中添加或删除元素。\n\
  \n流处理基于函数式编程，在处理期间不会修改数据元素。它创建新的数据元素，而不是修改它们。相同的规则适用于流处理，尤其是在并行处理时。流管道中的操作被指定为 lambda\
  \ 表达式，这些表达式不应修改正在处理的元素的可变状态。\n\n让我们举一个例子，计算一个大的自然数范围内的质数数量，比如从 2 到 214748364。数字\
  \ 214748364 是 `Integer.MAX_VALUE` 的十分之一。以下代码片段串行执行计数：\n\n\n\n```\n// 串行处理流\nlong\
  \ count = IntStream.rangeClosed(2, Integer.MAX_VALUE/10)\n.filter(PrimeUtil::isPrime)\n\
  .count();\n```\n\n这段代码耗时 758 秒。接下来，我们尝试将流转换为并行流，如下所示：\n\n```\n// 并行处理流\nlong count\
  \ = IntStream.rangeClosed(2, Integer.MAX_VALUE/10)\n.parallel()\n.filter(PrimeUtil::isPrime)\n\
  .count();\n```\n\n这次，代码仅耗时 181 秒，大约是串行处理时间的 24%。这是一个显著的性能提升。两段代码均运行在配备八核处理器的机器上。在你的机器上，代码完成时间可能会有所不同。\n\
  \n**总结**\n\n流（Stream）是一个支持顺序和并行聚合操作的数据元素序列。Java 中的集合侧重于数据存储和数据访问，而流则侧重于数据的计算。流没有存储空间，它们从数据源（通常是集合）获取数据。然而，流也可以从其他来源获取数据，例如文件\
  \ I/O 通道、函数等。流还可以基于能够生成无限数据元素的数据源。\n\n流通过操作连接起来，形成管道。流支持两种类型的操作：中间操作和终端操作。对流执行中间操作会生成另一个流，该流可以作为另一个中间操作的输入流。终端操作会以单个值的形式产生结果。一旦在流上调用了终端操作，该流便无法重复使用。\n\
  \n流上的某些操作被称为短路操作。短路操作不一定需要处理流中的所有数据。例如，`findAny` 是一个短路操作，它会在流中查找指定谓词为真的任意元素。一旦找到元素，该操作就会丢弃流中剩余的元素。\n\
  \n流本质上是惰性的。它们按需处理数据。当在流上调用中间操作时，数据不会被处理。终端操作的调用才会处理流数据。\n\n流管道可以串行或并行执行。默认情况下，流是串行的。你可以通过调用流的\
  \ `parallel()` 方法将串行流转换为并行流。你也可以通过调用流的 `sequential()` 方法将并行流转换为串行流。\n\nStreams API\
  \ 支持函数式编程中的大多数操作，例如 filter、map、`forEach`、reduce、`allMatch`、`anyMatch`、`findAny`、`findFirst`\
  \ 等。流包含一个用于调试目的的 `peek()` 方法，它允许你对流中传递的每个元素执行操作。Streams API 提供了收集器（collectors），用于将数据收集到集合中，例如\
  \ map、list、set 等。`Collectors` 类是一个工具类，提供了收集器的多种实现。使用流的 `collect()` 方法和提供的收集器，可以轻松地执行流数据的映射、分组和分区操作。\n\
  \n并行流利用了多核处理器的优势。它们使用 Fork/Join 框架来并行处理流的元素。\n\n**问题与练习**\n\n1.  什么是流以及流上的聚合操作？\n\
