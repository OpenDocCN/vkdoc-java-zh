  清单 18-3.\n使用 StackWalker 遍历当前线程的栈帧\n```\n\n\n\n了解调用者的类\n\n在 JDK 9 之前，开发者依赖以下方法来获取方法内部调用者类的引用：\n\
  \n*   `SecurityManager` 类的 `getClassContext()` 方法，由于该方法是受保护的，因此需要进行子类化。\n*   `sun.reflect.Reflection`\
  \ 类的 `getCallerClass()` 方法，该类是 JDK 内部类。\n\nJDK 9 通过在 `StackWalker` 类中添加一个名为 `getCallerClass()`\
  \ 的方法，使得获取调用者类引用变得简单。该方法的返回类型是 `Class<?>`。如果 `StackWalker` 未配置 `RETAIN_CLASS_REFERENCE`\
  \ 选项，则调用此方法会抛出 `UnsupportedOperationException`。如果栈中没有调用者帧（例如，运行一个其 `main()` 方法调用了此方法的类），则调用此方法会抛出\
  \ `IllegalStateException`。\n\n哪个类是调用者类？在 Java 中有两种可调用的结构：方法和构造器。以下讨论使用术语“方法”；然而，它同样适用于方法和构造器。假设你在一个名为\
  \ `S` 的方法内部调用了 `getCallerClass()` 方法，而 `S` 方法又被一个名为 `T` 的方法调用。进一步假设名为 `T` 的方法位于名为\
  \ `C` 的类中。在这种情况下，类 `C` 就是调用者类。\n\n提示\n\n`StackWalker` 类的 `getCallerClass()` 方法在查找调用者类时，会过滤掉所有隐藏帧和反射帧，无论使用何种选项来获取\
  \ `StackWalker` 实例。\n\n清单 18-4 包含一个完整的程序，演示如何获取调用者的类。其 `main()` 方法调用 `m1()` 方法，`m1()`\
  \ 调用 `m2()` 方法，`m2()` 调用 `m3()` 方法。`m3()` 方法获取 `StackWalker` 类的实例并获取调用者类。请注意，`m2()`\
  \ 方法使用反射来调用 `m3()` 方法。最后，`main()` 方法尝试获取调用者类。当你运行 `CallerClassTest` 方法时，`main()`\
  \ 方法由 JVM 调用，栈上将没有调用者帧。这将抛出一个 `IllegalStateException`。\n\n```\n// CallerClassTest.java\n\
  package com.jdojo.stackwalker;\nimport java.lang.StackWalker.Option;\nimport static\
  \ java.lang.StackWalker.Option.RETAIN_CLASS_REFERENCE;\nimport static java.lang.StackWalker.Option.SHOW_REFLECT_FRAMES;\n\
  import java.lang.reflect.InvocationTargetException;\nimport java.util.Set;\npublic\
  \ class CallerClassTest {\npublic static void main(String[] args) {\n// 将无法获取调用者类，因为未设置\
  \ RETAIN_CLASS_REFERENCE 选项。\nm1(Set.of());\n// 将打印调用者类\nm1(Set.of(RETAIN_CLASS_REFERENCE,\
  \ SHOW_REFLECT_FRAMES));\ntry {\n// 如果运行此类，以下语句将抛出 IllegalStateException。\n// 如果在代码中调用\
  \ main() 方法，则不会抛出异常。\nClass cls = StackWalker\n.getInstance(RETAIN_CLASS_REFERENCE)\n\
  .getCallerClass();\nSystem.out.println(\"在 main 方法中，调用者类: \" + cls.getName());\n\
  } catch (IllegalCallerException e) {\nSystem.out.println(\"在 main 方法中，异常: \" + e.getMessage());\n\
  }\n}\npublic static void m1(Set options) {\nm2(options);\n}\npublic static void\
  \ m2(Set options) {\n// 使用反射调用 m3()\ntry {\nCallerClassTest.class\n.getMethod(\"\
  m3\", Set.class)\n.invoke(null, options);\n} catch (NoSuchMethodException | InvocationTargetException\n\
  | IllegalAccessException | SecurityException e) {\ne.printStackTrace();\n}\n}\n\
  public static void m3(Set options) {\ntry {\n// 打印调用者类\nClass cls = StackWalker.getInstance(options)\n\
  .getCallerClass();\nSystem.out.println(\"调用者类: \" + cls.getName());\n} catch (UnsupportedOperationException\
  \ e) {\nSystem.out.println(e.getMessage());\n}\n}\n}\n此栈遍历器没有 RETAIN_CLASS_REFERENCE\
  \ 访问权限\n调用者类: com.jdojo.stackwalker.CallerClassTest\n在 main 方法中，异常: 没有调用者帧\n清单 18-4.\n\
  使用 StackWalker 类获取调用者类引用\n```\n\n在前面的例子中，收集栈帧的方法是从同一个类的另一个方法中调用的。让我们从另一个类的方法中调用此方法，以查看不同的结果。清单\
  \ 18-5 包含一个名为 `CallerClassTest2` 的类的代码。\n\n```\n// CallerClassTest2.java\npackage\
  \ com.jdojo.stackwalker;\nimport java.lang.StackWalker.Option;\nimport java.util.Set;\n\
  import static java.lang.StackWalker.Option.RETAIN_CLASS_REFERENCE;\npublic class\
  \ CallerClassTest2 {\npublic static void main(String[] args) {\nSet options = Set.of(RETAIN_CLASS_REFERENCE);\n\
  CallerClassTest.m1(options);\nCallerClassTest.m2(options);\nCallerClassTest.m3(options);\n\
  System.out.println(\"\\n 调用 main() 方法:\");\nCallerClassTest.main(null);\nSystem.out.println(\"\
  \\n 使用匿名类:\");\nnew Object() {\n{\nCallerClassTest.m3(options);\n}\n};\nSystem.out.println(\"\
  \\n 使用 lambda 表达式:\");\nnew Thread(() -> CallerClassTest.m3(options))\n.start();\n\
  }\n}\n调用者类: com.jdojo.stackwalker.CallerClassTest\n调用者类: com.jdojo.stackwalker.CallerClassTest\n\
  调用者类: com.jdojo.stackwalker.CallerClassTest2\n调用 main() 方法:\n此栈遍历器没有 RETAIN_CLASS_REFERENCE\
  \ 访问权限\n调用者类: com.jdojo.stackwalker.CallerClassTest\n在 main 方法中，调用者类: com.jdojo.stackwalker.CallerClassTest2\n\
  使用匿名类:\n调用者类: com.jdojo.stackwalker.CallerClassTest2$1\n使用 lambda 表达式:\n调用者类: com.jdojo.stackwalker.CallerClassTest2\n\
  清单 18-5.\n使用 StackWalker 类获取调用者类的另一个示例\n```\n\n`CallerClassTest2` 类的 `main()` 方法调用了\
  \ `CallerClassTest` 类的四个方法。当从 `CallerClassTest2` 类直接调用 `CallerClassTest.m3()` 时，调用者类是\
  \ `CallerClassTest2`。当你从 `CallerClassTest2` 类调用 `CallerClassTest.main()` 方法时，存在一个调用者帧，并且调用者类是\
  \ `CallerClassTest2` 类。将此与之前运行 `CallerClassTest` 类时的输出进行比较。当时，`CallerClassTest.main()`\
  \ 方法是由 JVM 调用的，你无法在 `CallerClassTest.main()` 方法内部获取调用者类，因为没有调用者帧。最后，`CallerClassTest.m3()`\
  \ 方法是从一个匿名类和一个 lambda 表达式中调用的。匿名类被报告为调用者类。对于 lambda 表达式，其封闭类被报告为调用者类。\n\n栈遍历权限\n\
  \n当存在 Java 安全管理器并且你使用 `RETAIN_CLASS_REFERENCE` 选项配置 `StackWalker` 时，会执行权限检查，以确保代码库被授予值为\
  \ `getStackWalkerWithClassReference` 的 `java.lang.RuntimePermission`。如果未授予该权限，则会抛出\
  \ `SecurityException`。权限检查是在创建 `StackWalker` 实例时执行的，而不是在执行栈遍历时。\n\n清单 18-6 包含 `StackWalkerPermissionCheck`\
  \ 类的代码。其 `printStackFrames()` 方法使用 `RETAIN_CLASS_REFERENCE` 选项创建一个 `StackWalker`\
  \ 实例。`main()` 方法调用此方法，该方法在假设没有安全管理器的情况下，可以毫无问题地打印栈跟踪。随后安装了一个安全管理器，并再次调用 `printStackFrames()`\
  \ 方法。这次抛出了一个 `SecurityException`，如输出中所示。\n\n\n\n```\n// StackWalkerPermissionCheck.java\n\
  package com.jdojo.stackwalker;\nimport static java.lang.StackWalker.Option.RETAIN_CLASS_REFERENCE;\n\
  public class StackWalkerPermissionCheck {\npublic static void main(String[] args)\
  \ {\nSystem.out.println(\"安装安全管理器前：\");\nprintStackFrames();\nSecurityManager sm\
  \ = System.getSecurityManager();\nif (sm == null) {\nsm = new SecurityManager();\n\
  System.setSecurityManager(sm);\n}\nSystem.out.println(\"\\n 安装安全管理器后：\");\nprintStackFrames();\n\
  }\npublic static void printStackFrames() {\ntry {\nStackWalker.getInstance(RETAIN_CLASS_REFERENCE)\n\
  .forEach(System.out::println);\n} catch (SecurityException e) {\nSystem.out.println(\"\
  无法创建 StackWalker。错误：\" + e.getMessage());\n}\n}\n}\n安装安全管理器前：\njdojo.stackwalker/com.jdojo.stackwalker.StackWalkerPermissionCheck.printStackFrames(StackWalkerPermissionCheck.java:24)\n\
  jdojo.stackwalker/com.jdojo.stackwalker.StackWalkerPermissionCheck.main(StackWalkerPermissionCheck.java:9)\n\
  安装安全管理器后：\n无法创建 StackWalker。错误：access denied (\"java.lang.RuntimePermission\" \"\
  getStackWalkerWithClassReference\")\n清单 18-6.\n在 Java 安全管理器存在时创建保留类引用的 StackWalker\n\
  ```\n\n展示了如何授予创建带有 `RETAIN_CLASS_REFERENCE` 选项的 `StackWalker` 所需的权限。该权限被授予整个代码库。你需要将此权限块添加到位于机器上\
  \ `JAVA_HOME\\conf\\security` 目录中的 `java.policy` 文件中。\n\n```\ngrant {\npermission\
  \ java.lang.RuntimePermission \"getStackWalkerWithClassReference\";\n};\n清单 18-7.\n\
  授予值为 getStackWalkerWithClassReference 的 java.lang.RuntimePermission\n```\n\n当你运行清单\
  \ 18-6 中的类并已授予相应权限时，应看到以下输出：\n\n```\n安装安全管理器前：\njdojo.stackwalker/com.jdojo.stackwalker.StackWalkerPermissionCheck.printStackFrames(StackWalkerPermissionCheck.java:24)\n\
  jdojo.stackwalker/com.jdojo.stackwalker.StackWalkerPermissionCheck.main(StackWalkerPermissionCheck.java:9)\n\
  安装安全管理器后：\njdojo.stackwalker/com.jdojo.stackwalker.StackWalkerPermissionCheck.printStackFrames(StackWalkerPermissionCheck.java:24)\n\
  jdojo.stackwalker/com.jdojo.stackwalker.StackWalkerPermissionCheck.main(StackWalkerPermissionCheck.java:18)\n\
  ```\n\n总结\n\nJVM 中的每个线程都有一个私有的 JVM 栈，该栈在创建线程的同时被创建。栈存储帧。JVM 栈上的帧表示给定线程中的一次 Java\
  \ 方法调用。每次调用方法时，都会创建一个新帧并将其推入栈顶。当方法调用完成时，该帧被销毁（从栈中弹出）。在给定线程中，任何时刻只有一个帧处于活动状态。活动帧称为当前帧，其方法称为当前方法。定义当前方法的类称为当前类。\n\
  \n在 JDK9 之前，可以使用以下类遍历线程栈中的所有帧：`Throwable`、`Thread` 和 `StackTraceElement`。`StackTraceElement`\
  \ 类的实例表示一个栈帧。`Throwable` 类的 `getStackTrace()` 方法返回一个 `StackTraceElement[]`，其中包含当前线程栈的帧。`Thread`\
  \ 类的 `getStackTrace()` 方法返回一个 `StackTraceElement[]`，其中包含该线程栈的帧。数组的第一个元素是栈顶帧，代表序列中最后一次方法调用。某些\
  \ JVM 实现可能会省略返回数组中的一些帧。\n\nJDK9 简化了栈遍历。它在 `java.lang` 包中引入了一个名为 `StackWalker` 的新类。你可以使用其静态工厂方法之一\
  \ `getInstance()` 获取 `StackWalker` 实例。`StackWalker` 可以使用选项进行配置，这些选项由枚举 `StackWalker.Option`\
  \ 中定义的常量表示。嵌套接口 `StackWalker.StackFrame` 的实例表示一个栈帧。`StackWalker` 类与 `StackWalker.StackFrame`\
  \ 实例一起工作。该接口定义了一个名为 `toStackTraceElement()` 的方法，可用于从 `StackWalker.StackFrame` 获取\
  \ `StackTraceElement` 类的实例。\n\n你可以使用 `StackWalker` 实例的 `forEach()` 和 `walk()` 方法来遍历当前线程的栈帧。`StackWalker`\
  \ 实例的 `getCallerClass()` 方法返回调用者类的引用。如果你想要表示栈帧的类的引用以及调用者类的引用，则必须使用 `RETAIN_CLASS_REFERENCE`\
  \ 配置 `StackWalker` 实例。默认情况下，`StackWalker` 不会报告所有反射帧和实现特定帧。如果你希望这些帧包含在栈遍历中，请使用 `SHOW_REFLECT_FRAMES`\
  \ 和 `SHOW_HIDDEN_FRAMES` 选项配置 `StackWalker`。使用 `SHOW_HIDDEN_FRAMES` 选项也会包含反射帧。\n\
  \n当 Java 安全管理器存在，并且你使用 `RETAIN_CLASS_REFERENCE` 选项配置 `StackWalker` 时，会执行权限检查，以确保代码库被授予值为\
  \ `getStackWalkerWithClassReference` 的 `java.lang.RuntimePermission`。如果未授予该权限，则会抛出\
  \ `SecurityException`。权限检查在创建 `StackWalker` 时执行，而不是在执行栈遍历时执行。\n\n问题与练习\n\n1.  以下陈述是否正确？\n\
  \nJava 中的每个线程都维护自己的栈，线程的每次 Java 方法调用在栈上都表示为一个帧。\n\n2.  什么是栈遍历？\n\n3.  在 JDK9 中，支持栈遍历\
  \ API 的类的完全限定名是什么？\n\n4.  说出其实例表示线程栈上帧的类名。\n\n5.  JDK9 添加了一个名为 `StackWalker.StackFrame`\
  \ 的接口。该接口的实例表示什么？\n\n6.  解释 `StackWalker` 实例在以下三个可用于配置它的选项下的行为差异：`RETAIN_CLASS_REFERENCE`、`SHOW_HIDDEN_FRAMES`\
  \ 和 `SHOW_REFLECT_FRAMES`。\n\n7.  以下代码片段获取了一个 `StackWalker` 实例：\n\n```\n    // 使用默认配置获取\
  \ StackWalker\n    StackWalker sw1 = StackWalker.getInstance();\n    ```\n\n这个 `StackWalker`\
  \ 会包含隐藏帧并保留类引用吗？\n\n8.  当运行以下 `Test` 类时，它会抛出 `IllegalCallerException`。解释此异常的原因。\n\
  \n```\n    // Test.java\n    package com.jdojo.stackwalker.exercises;\n    import\
  \ static java.lang.StackWalker.Option.RETAIN_CLASS_REFERENCE;\n    public class\
  \ Test {\n    public static void main(String[] args) {\n    StackWalker stackWalker\
  \ =\n    StackWalker.getInstance(RETAIN_CLASS_REFERENCE);\n    Class callerCls =\
  \ stackWalker.getCallerClass();\n    System.out.println(callerCls);\n    }\n   \
  \ }\n    ```\n\n9.  以下陈述是否正确？\n\n`StackWalker` 类的 `getCallerClass()` 方法在查找调用者类时会过滤掉所有隐藏帧和反射帧，无论获取\
  \ `StackWalker` 实例时使用了何种选项。\n\n10. 当安装了安全管理器时，必须授予什么 `RuntimePermission` 才能创建带有\
  \ `RETAIN_CLASS_REFERENCE` 选项的 `StackWalker`？\n\n11. 运行以下 `Test2` 类时，输出是什么？\n\n\n\
  \n```\n    // Test2.java\n    package com.jdojo.stackwalker.exercises;\n    public\
  \ class Test2 {\n    public static void main(String[] args) {\n    StackWalker.getInstance()\n\
  \    .forEach(f -> System.out.println(f.getClassName()));\n    }\n    }\n    ```\n\
