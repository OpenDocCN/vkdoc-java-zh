  \ 和 'a' 都计为 'a'。你需要提示用户指定文件的路径名。在你的代码中包含错误处理，例如处理指定文件不存在的情况。\n\n8. 处理归档文件\n\n在本章中，你将学习：\n\
  \n*   什么是归档文件\n\n*   什么是数据压缩以及如何压缩和解压数据\n\n*   如何使用不同的算法计算数据的校验和\n\n*   如何创建 ZIP、GZIP\
  \ 和 JAR 文件格式的文件并从中读取数据\n\n*   如何使用 `jar` 命令行工具处理 JAR 文件\n\n本章中的所有示例程序都是 `jdojo.archives`\
  \ 模块的成员，如清单 8-1 中所声明。\n\n```\n// module-info.java\nmodule jdojo.archives {\nexports\
  \ com.jdojo.archives;\n}\n清单 8-1.\njdojo.archives 模块的声明\n```\n\n什么是归档文件？\n\n归档文件由一个或多个文件组成。它还包含元数据，其中可能包括文件的目录结构、注释、错误检测和恢复信息等。归档文件也可以被加密。通常（但不一定）归档文件以压缩格式存储。归档文件是使用文件归档软件创建的。例如，WinZip、7-zip\
  \ 等工具用于在 Microsoft Windows 上创建 ZIP 格式的文件归档；`tar` 工具用于在基于 UNIX 的操作系统上创建归档文件。归档文件使得将多个文件作为一个文件存储和传输变得更加容易。本章详细讨论如何使用\
  \ Java I/O API 和 JDK 中包含的 `jar` 命令行工具来处理归档文件。\n\n数据压缩\n\n数据压缩是对给定数据应用编码算法以使其表示形式更小的过程。假设你有一个字符串\
  \ `777778888`。一种编码方式是 `5748`，可以解释为“五个 7 和四个 8”。通过这种编码，你将字符串的长度从九个字符减少到了四个字符。你将 `777778888`\
  \ 压缩为 `5748` 所应用的算法称为**游程编码 (RLE)**。RLE 通过用计数器和一份数据副本来替换重复的数据序列来对数据进行编码。RLE 易于实现。它仅适用于重复数据较多的情况。\n\
  \n数据压缩的逆过程称为数据解压。在这里，你对压缩数据应用算法以恢复原始数据。\n\n有两种类型的数据压缩：**无损压缩**和**有损压缩**。在无损压缩中，当你解压数据时，可以恢复原始数据。例如，如果你解压\
  \ `5748`，你可以恢复原始数据 (`777778888`)，而不会丢失任何信息。在这个例子中你可以恢复信息，因为 RLE 是一种无损数据压缩算法。其他无损数据压缩算法包括\
  \ LZ77、LZ78、LZW、霍夫曼编码、动态马尔可夫压缩 (DMC) 等。\n\n在有损数据压缩中，你在压缩过程中会丢失一些数据，并且在解压压缩数据时无法完全恢复原始数据。有损数据压缩在某些情况下是可以接受的，例如查看图片、音频和视频，在这些情况下，用户在使用解压后的数据时不会注意到明显的差异。与无损数据压缩相比，有损数据压缩以较低的数据质量为代价实现了更高的压缩比。有损数据压缩算法的例子包括离散余弦变换\
  \ (DCT)、A 律压扩器、μ 律压扩器、矢量量化等。\n\n\n\nDEFLATE 是一种\n无损数据压缩算法，用于压缩 ZIP 和 GZIP 文件格式中的数据。GZIP\n\
  是 GNU ZIP 的缩写。GNU 是一个递归缩写，代表 GNU’s Not\nUNIX。ZIP 文件格式用于数据压缩和文件\n归档。文件归档是将多个文件合并为一个文件以便于存储的过程。通常，你会压缩\n\
  多个文件并将它们一起放入一个归档文件中。\n\n你可能处理过扩展名为 `.zip` 的文件。ZIP 文件使用\nZIP 文件格式。它通过（可选地）压缩多个文件，将它们合并成一个\
  \ `.zip` 文件。\n\n如果你是 UNIX 用户，你一定处理过 `.tar` 或 `.tar.gz` 文件。\n通常，在 UNIX 上，你使用两步过程来创建一个压缩\n\
  归档文件。首先，你使用 tar 文件格式（tar 代表 磁带归档）将多个文件合并成一个 `.tar` 归档\n文件，然后使用 GZIP 文件格式压缩该\n归档文件，得到一个\
  \ `.tar.gz` 或 `.tgz` 文件。`.tar.gz` 或\n`.tgz` 文件\n也被称为 tarball\n。与 ZIP 文件相比，tarball\
  \ 的压缩率更高。ZIP\n文件分别压缩多个文件然后进行归档。而 tarball\n先归档多个文件，然后再压缩它们。因为\ntarball 将合并后的文件一起压缩，它在压缩过程中利用了所有文件之间的数据重复性，从而实现了比\
  \ ZIP 文件更好的压缩效果。\n\nZLIB 是一个通用的无损数据压缩库。它是免费的\n且不受任何专利保护。Java 提供了使用 ZLIB 库进行数据\n\
  压缩的支持。`Deflater` 和 `Inflater` 是\n`java.util.zip` 包中的两个类\n，它们支持在 Java 中使用 ZLIB 库进行通用的数据压缩/解压缩\n\
  功能。Java 提供了支持\nZIP 和 GZIP 文件格式的类。它还支持另一种文件格式\n，称为 JAR 文件格式，它是 ZIP 文件格式的一种变体。\n我将在接下来的几节中讨论\
  \ Java 支持的文件格式示例。\n\n校验和\n\n校验和   是一个整数，通过\n对字节流应用算法计算得出。有时，从字节流计算整数的算法\n也被称为校验和。通常，它用于检查数据传输过程中的错误。发送方为数据包计算校验和，并将该校验和与数据包一起发送给接收方。接收方\n\
  为其接收到的数据包计算校验和，并将其与从发送方收到的校验和进行比较。如果两者匹配，\n接收方可以认为数据传输过程中没有错误。发送方和接收方必须约定通过应用相同的算法来计算数据的校验和。否则，校验和将不匹配。使用校验和并不是一种用于验证数据真实性的数据安全措施。它被用作一种错误检测方法。黑客可以更改数据的某些位，而你仍然可能得到与原始数据相同的校验和。\n\
  \n让我们讨论一种计算校验和的算法。该算法\n以其发明者 Mark Adler 的名字命名为 Adler-32 \n。其名称中包含数字 32，因为它\n通过计算两个\
  \ 16 位校验和并将它们连接成一个 32 位整数来计算校验和。让我们将这两个 16 位校验和称为 A 和 B，\n最终的校验和称为 C。A 是数据中所有字节之和加\
  \ 1。B 是每一步中 A 的各个值的总和。在\n开始时，A 设置为 1，B 设置为 0。A 和 B 基于\n模 65521 计算。也就是说，如果 A 或 B\
  \ 的值超过 65521，它们的\n值变为当前值模 65521。最终校验和的计算如下：\n\n```\nC = B * 65536 + A\n```\n\n最终校验和是通过连接\
  \ 16 位的 B 和 A\n值计算得出的。你需要将 B 的值乘以 65536 并加上 A\n的值，以得到该 32 位最终校验和数字的十进制值。\n\n让我们应用\
  \ Adler-32 校验和算法来计算字符串 `HELLO` 的校验和\n，如表 8-1 所示。\n\n表 8-1.\n\n计算字符串 HELLO 的 Adler-32\
  \ 校验和\n\n字符\n |\n  ASCII 值（十进制）\n |\n  A\n |\n  B\n |\n\n| --- | --- | --- | ---\
  \ | --- | --- | --- | --- | --- |\n\n`H`\n |\n  `72`\n |\n  `1 + 72 = 73`\n |\n\
  \  `0 + 73 = 73`\n |\n\n`E`\n |\n  `69`\n |\n  `73 + 69 = 142`\n |\n  `73 + 142\
  \ = 215`\n |\n\n`L`\n |\n  `76`\n |\n  `142 + 76 = 218`\n |\n  `215 + 218 = 433`\n\
  \ |\n\n`L`\n |\n  `76`\n |\n  `218 + 76 = 294`\n |\n  `433 + 294 = 727`\n |\n\n\
  `O`\n |\n  `79`\n |\n  `294 + 79 = 373`\n |\n  `727 + 373 = 1100`\n |\n\n`C = B\
  \ * 65536 + A`\n\n`= 1100 * 65536 + 373`\n\n`= 72089973`\n |\n\nJava 在 `java.util.zip`\n\
  包中提供了一个 `Adler32` 类\n，用于计算字节数据的 Adler-32 校验和。你需要\n调用此类的 `update()` 方法\n向其传递字节。一旦你将所有字节传递给它，\n\
  调用其 `getValue()` 方法即可\n获取校验和。`CRC32`（循环冗余校验 32 位）是另一种\n计算 32 位校验和的算法。同一个包中还有另一个名为\n\
  `CRC32` 的类\n，它允许你使用 `CRC32` 算法计算校验和。\n\n提示\n\nJava 9 在 `java.util.zip`\n包中添加了一个\
  \ `CRC32C` 类。该类允许你计算字节流的 CRC-32C。\nCRC-32C 在 RFC 3720 中定义，网址为 [`http://www.ietf.org/rfc/rfc3720.txt`](http://www.ietf.org/rfc/rfc3720.txt)\
  \ 。\n\n清单 8-2 演示了如何\n使用 `Adler32`、\n`CRC32` 和\n`CRC32C` 类 来计算\n校验和。\n\n```\n// ChecksumTest.java\n\
  package com.jdojo.archives;\nimport java.util.zip.Adler32;\nimport java.util.zip.CRC32;\n\
  import java.util.zip.CRC32C;\nimport java.util.zip.Checksum;\npublic class ChecksumTest\
  \ {\npublic static void main(String[] args) throws Exception {\nString str = \"\
  HELLO\";\nbyte[] data = str.getBytes(\"UTF-8\");\nSystem.out.println(\"Adler32,\
  \ CRC32, and CRC32C checksums for \" + str);\n// 计算 Adler32 校验和\nChecksum ad = new\
  \ Adler32();\nad.update(data);\nlong adler32Checksum = ad.getValue();\nSystem.out.println(\"\
  Adler32: \" + adler32Checksum);\n// 计算 CRC32 校验和\nChecksum crc32 = new CRC32();\n\
  crc32.update(data);\nlong crc32Checksum = crc32.getValue();\nSystem.out.println(\"\
  CRC32: \" + crc32Checksum);\n// 计算 CRC32C 校验和\nChecksum crc32c = new CRC32C();\n\
  crc32c.update(data);\nlong crc32cChecksum = crc32c.getValue();\nSystem.out.println(\"\
  CRC32C: \" + crc32cChecksum);\n}\n}\nAdler32, CRC32, and CRC32C checksums for HELLO\n\
  Adler32: 72089973\nCRC32: 3242484790\nCRC32C: 3901656152\n清单 8-2.\n计算 Adler32、CRC32\
  \ 和 CRC32C 校验和\n```\n\n`Adler32` 比 `CRC32` 更快。然而，`CRC32` 提供了更\n健壮的校验和。校验和经常用于检查数据\n\
  损坏。`CheckedInputStream`\n和 `CheckedOutputStream`\n是 `InputStream/OutputStream`\n\
  类族中的两个具体装饰器类。它们位于 `java.util.zip`\n包中。它们与一个 `Checksum` 对象一起工作。注意\n`Checksum`\n是一个接口，`Adler32`\
  \ 和 `CRC32` 类\n实现了该接口。`CheckedInputStream`\n在你从流中读取数据时计算校验和，而 `CheckedOutputStream`\n\
  在你向流中写入数据时计算校验和。`ZipEntry` 类允许你\n使用其 `getCrc()` 方法计算 ZIP 文件中条目的 `CRC32` 校验和。\n\n\
  压缩字节数组\n\n你可以使用 `java.util.zip` 包中的 `Deflater` 和\n`Inflater` 类\n分别压缩和解压缩字节数组中的数据。这些\n\
  类是 Java 中压缩和解压缩的基本构建块。你可能不会经常直接使用它们。Java 中还有其他高级、易于使用的类来处理数据压缩。\n这些类是 `DeflaterInputStream`、\n\
  `DeflaterOutputStream`、\n`GZIPInputStream`、\n`ZipFile`、`GZIPOutputStream`、\n`ZipInputStream`\n\
  和 `ZipOutputStream`。我\n将在后续章节中详细讨论这些类。\n\n\n\n使用 `Deflater` 和 `Inflater` 类并非直观简单。你需要遵循以下步骤来压缩字节数组中的数据。\n\
  \n1.  创建一个 `Deflater` 对象。\n\n2.  使用 `setInput()` 方法设置要压缩的输入数据。\n\n3.  调用 `finish()`\
  \ 方法，表示你已经提供了所有输入数据。\n\n4.  调用 `deflate()` 方法来压缩输入数据。\n\n5.  调用 `end()` 方法来结束压缩过程。\n\
  \n你可以使用 `Deflater` 类的某个构造函数来创建该类的对象。\n\n```\n// 使用无参构造函数\nDeflater compressor =\
  \ new Deflater();\n```\n\n`Deflater` 类的其他构造函数允许你指定压缩级别。你可以使用 `Deflater` 类中的常量之一来指定压缩级别。这些常量是\
  \ `BEST_COMPRESSION`、`BEST_SPEED`、`DEFAULT_COMPRESSION` 和 `NO_COMPRESSION`。在最佳压缩和最佳速度之间进行选择需要权衡。最佳速度意味着较低的压缩比，而最佳压缩则意味着较慢的压缩速度。\n\
  \n```\n// 使用最佳压缩\nDeflater compressor = new Deflater(Deflater.BEST_COMPRESSION);\n\
  ```\n\n默认情况下，压缩数据将采用 ZLIB 格式。如果你希望压缩数据采用 GZIP 或 PKZIP 格式，则需要通过在构造函数中将 `boolean`\
  \ 标志设置为 `true` 来指定。\n\n```\n// 使用最佳速度压缩和 GZIP 格式\nDeflater compressor = new Deflater(Deflater.BEST_SPEED,\
  \ true);\n```\n\n你可以将输入数据以字节数组的形式提供给 `Deflater` 对象。\n\n```\nbyte[] input = /* 获取一个填充了数据的字节数组\
  \ */;\ncompressor.setInput(input);\n```\n\n调用 `finish()` 方法，表示你已经提供了所有输入数据。\n\n\
  ```\ncompressor.finish();\n```\n\n调用 `deflate()` 方法来压缩输入数据。它接受一个字节数组作为参数。它用压缩后的数据填充该字节数组，并返回它已填充的字节数组中的字节数。每次调用\
  \ `deflate()` 方法后，你都需要调用 `finished()` 方法来检查压缩过程是否结束。通常，你会像下面这样在一个循环中进行此检查：\n\n```\n\
  // 尝试每次读取 1024 字节的压缩数据\nbyte[] readBuffer = new byte[1024];\nint readCount = 0;\n\
  while(!compressor.finished()) {\nreadCount = compressor.deflate(readBuffer);\n/*\
  \ 此时，readBuffer 数组包含从索引 0 到 readCount - 1 的压缩数据。\n*/\n}\n```\n\n调用 `end()` 方法来释放\
  \ `Deflater` 对象所持有的任何资源。\n\n```\n// 表示压缩过程结束\ncompressor.end();\n```\n\n以下步骤用于解压缩字节数组中的数据。这些步骤与你压缩字节数组时所执行的步骤正好相反。\n\
  \n1.  创建一个 `Inflater` 对象。\n\n2.  使用 `setInput()` 方法设置要解压缩的输入数据。\n\n3.  调用 `inflate()`\
  \ 方法来解压缩输入数据。\n\n4.  调用 `end()` 方法来结束解压缩过程。\n\n你可以使用 `Inflater` 类的某个构造函数来创建该类的对象。\n\
  \n```\n// 使用无参构造函数\nInflater decompressor = new Inflater();\n```\n\n如果压缩数据是 GZIP\
  \ 或 PKZIP 格式，则使用另一个构造函数并将 `true` 作为参数传递。\n\n```\n// 创建一个解压缩器，用于解压缩 GZIP 或 PKZIP\
  \ 格式的数据\nInflater decompressor = new Inflater(true);\n```\n\n你为解压缩器设置输入，即字节数组中的压缩数据。\n\
  \n```\nbyte[] input = /* 获取字节数组中的压缩数据 */;\ndecompressor.setInput(input);\n```\n\n\
  调用 `inflate()` 方法来解压缩输入数据。它接受一个字节数组作为参数。它用解压缩后的数据填充该字节数组，并返回该字节数组中的字节数。每次调用此方法后，你都需要调用\
  \ `finished()` 方法来检查压缩过程是否结束。通常，你会像下面这样使用一个循环：\n\n```\n// 尝试每次读取 1024 字节的解压缩数据\n\
  byte[] readBuffer = new byte[1024];\nint readCount = 0;\nwhile(!decompressor.finished())\
  \ {\nreadCount = decompressor.inflate(readBuffer);\n/* 此时，readBuffer 数组包含从索引 0 到\
  \ readCount - 1 的解压缩数据。\n*/\n}\n```\n\n你需要调用 `end()` 方法来释放 `Inflater` 对象所持有的任何资源。\n\
  \n```\n// 表示解压缩过程结束\ndecompressor.end();\n```\n\n清单 8-3 演示了如何使用 `Deflater` 和 `Inflater`\
  \ 类。`compress()` 和 `decompress()` 方法分别接受输入并返回压缩和解压缩后的数据。在此示例中，我尝试压缩一个小的字符串 `Hello\
  \ world!`。它的长度是 12 字节。压缩后变成了 20 字节。压缩的目标是减小数据大小，而不是增大。然而，仅仅因为你尝试压缩数据，并不一定能实现减小数据大小的目的。清单\
  \ 8-3 中程序的输出就是这样一个例子。当你压缩数据时，压缩格式必须添加一些信息来进行一些内务处理。如果你尝试压缩的数据非常小（就像本例中的情况），或者它已经被压缩过，那么由于压缩过程添加了额外信息，压缩后数据的大小可能会增加。\n\
  \n\n\n```\n// DeflateInflateTest.java\npackage com.jdojo.archives;\nimport java.io.ByteArrayOutputStream;\n\
  import java.io.IOException;\nimport java.util.zip.DataFormatException;\nimport java.util.zip.Deflater;\n\
  import java.util.zip.Inflater;\nimport static java.util.zip.Deflater.BEST_COMPRESSION;\n\
  public class DeflateInflateTest {\npublic static void main(String[] args) throws\
  \ Exception {\nString input = \"Hello world!\";\nbyte[] uncompressedData = input.getBytes(\"\
  UTF-8\");\n// 压缩数据\nbyte[] compressedData = compress(uncompressedData, BEST_COMPRESSION,\
  \ false);\n// 解压数据\nbyte[] decompressedData = decompress(compressedData, false);\n\
  String output = new String(decompressedData, \"UTF-8\");\n// 显示统计信息\nSystem.out.println(\"\
  输入字符串: \" + input);\nSystem.out.println(\"未压缩数据长度: \" + uncompressedData.length);\n\
  System.out.println(\"压缩后数据长度: \" + compressedData.length);\nSystem.out.println(\"\
  解压后数据长度: \" + decompressedData.length);\nSystem.out.println(\"输出字符串: \" + output);\n\
  }\npublic static byte[] compress(byte[] input, int compressionLevel,\nboolean GZIPFormat)\
  \ throws IOException {\n// 创建一个 Deflater 对象来压缩数据\nDeflater compressor = new Deflater(compressionLevel,\
  \ GZIPFormat);\n// 为压缩器设置输入\ncompressor.setInput(input);\n// 调用 finish() 方法，表示不再有输入数据提供给压缩器对象\n\
  compressor.finish();\n// 压缩数据\nByteArrayOutputStream bao = new ByteArrayOutputStream();\n\
  byte[] readBuffer = new byte[1024];\nwhile (!compressor.finished()) {\nint readCount\
  \ = compressor.deflate(readBuffer);\nif (readCount > 0) {\n// 将压缩后的数据写入输出流\nbao.write(readBuffer,\
  \ 0, readCount);\n}\n}\n// 结束压缩器\ncompressor.end();\n// 返回输出流中已写入的字节\nreturn bao.toByteArray();\n\
  }\npublic static byte[] decompress(byte[] input, boolean GZIPFormat)\nthrows IOException,\
  \ DataFormatException {\n// 创建一个 Inflater 对象来解压数据\nInflater decompressor = new Inflater(GZIPFormat);\n\
  // 为解压器设置输入\ndecompressor.setInput(input);\n// 解压数据\nByteArrayOutputStream bao =\
  \ new ByteArrayOutputStream();\nbyte[] readBuffer = new byte[1024];\nwhile (!decompressor.finished())\
  \ {\nint readCount = decompressor.inflate(readBuffer);\nif (readCount > 0) {\n//\
  \ 将数据写入输出流\nbao.write(readBuffer, 0, readCount);\n}\n}\n// 结束解压器\ndecompressor.end();\n\
  // 返回输出流中已写入的字节\nreturn bao.toByteArray();\n}\n}\nInput String: Hello world!\nUncompressed\
  \ data length: 12\nCompressed data length: 20\nDecompressed data length: 12\nOutput\
  \ String: Hello world!\n清单 8-3.\n使用 Deflater 和 Inflater 类压缩和解压字节数组\n```\n\n你可以使用\
  \ `DeflaterInputStream` 和 `DeflaterOutputStream` 来压缩输入流和输出流中的数据。此外，还有 `InflaterInputStream`\
  \ 和 `InflaterOutputStream` 类用于解压输入流和输出流中的数据。这四个类是 `InputStream` 和 `OutputStream`\
  \ 类家族中的具体装饰器。有关装饰器模式及具体装饰器类的更多详细信息，请参阅第 7 章。\n\n处理 ZIP 文件格式\n\nJava API 直接支持 ZIP\
  \ 文件格式。通常，你会使用 `java.util.zip` 包中的以下四个类：\n\n*   `ZipEntry`\n\n*   `ZipInputStream`\n\
  \n*   `ZipOutputStream`\n\n*   `ZipFile`\n\n一个 `ZipEntry` 对象代表 ZIP 文件格式归档文件中的一个条目。如果你将\
  \ 10 个文件归档到一个名为 `test.zip` 的文件中，归档中的每个文件在程序中都由一个 `ZipEntry` 对象表示。一个 ZIP 条目可以是压缩的，也可以是未压缩的。当你从\
  \ ZIP 文件中读取所有文件时，你会将每个文件作为一个 `ZipEntry` 对象来读取。当你想要向 ZIP 文件中添加文件时，你会向 ZIP 文件添加一个\
  \ `ZipEntry` 对象。`ZipEntry` 类提供了设置和获取 ZIP 文件中条目信息的方法。\n\n`ZipInputStream` 是 `InputStream`\
  \ 类家族中的一个具体装饰器类；你使用它来从 ZIP 文件中读取每个条目的数据。`ZipOutputStream` 是 `OutputStream` 类家族中的一个具体装饰器类；你使用它的类来向\
  \ ZIP 文件中写入每个条目的数据。\n\n`ZipFile` 是一个用于从 ZIP 文件中读取条目的工具类。当你想要从 ZIP 文件中读取条目时，你可以选择使用\
  \ `ZipInputStream` 类或 `ZipFile` 类。\n\n创建 ZIP 文件\n\n以下是创建 ZIP 文件的步骤：\n\n1.  创建一个\
  \ `ZipOutputStream` 对象。\n\n2.  创建一个 `ZipEntry` 对象来表示 ZIP 文件中的一个条目。\n\n3.  将 `ZipEntry`\
  \ 添加到 `ZipOutputStream` 中。\n\n4.  将条目的内容写入 `ZipOutputStream`。\n\n5.  关闭 `ZipEntry`。\n\
  \n6.  对要添加到归档中的每个 ZIP 条目重复上述最后四个步骤。\n\n7.  关闭 `ZipOutputStream`。\n\n你可以使用 ZIP 文件的名称来创建\
  \ `ZipOutputStream` 对象。你需要创建一个 `FileOutputStream` 对象，并将其包装在 `ZipOutputStream` 对象中，如下所示：\n\
  \n```\n// 创建一个 ZIP 输出流\nZipOutputStream zos = new ZipOutputStream(new FileOutputStream(\"\
  ziptest.zip\"));\n```\n\n你可以使用任何其他输出流的具体装饰器来包装你的 `FileOutputStream` 对象。例如，你可能希望使用\
  \ `BufferedOutputStream` 以获得更好的速度，如下所示：\n\n```\nZipOutputStream zos = new ZipOutputStream(new\
  \ BufferedOutputStream(\nnew FileOutputStream(\"ziptest.zip\")));\n```\n\n你也可以选择性地设置\
  \ ZIP 文件条目的压缩级别。默认情况下，压缩级别设置为 `DEFAULT_COMPRESSION`。例如，以下语句将压缩级别设置为 `BEST_COMPRESSION`：\n\
  \n```\n// 设置 ZIP 条目的压缩级别\nzos.setLevel(Deflater.BEST_COMPRESSION);\n```\n\n你使用每个条目的文件路径创建一个\
  \ `ZipEntry` 对象，并使用 `ZipOutputStream` 对象的 `putNextEntry()` 方法将该条目添加到其中，如下所示：\n\n\
  ```\nZipEntry ze = new ZipEntry(\"test1.txt\")\nzos.putNextEntry(ze);\n```\n\n你也可以选择性地设置\
  \ ZIP 条目的存储方法，以指示该 ZIP 条目是以压缩形式还是未压缩形式存储。默认情况下，ZIP 条目以压缩形式存储。\n\n```\n// 以压缩形式存储\
  \ ZIP 条目\nze.setMethod(ZipEntry.DEFLATED);\n// 以未压缩形式存储 ZIP 条目\nze.setMethod(ZipEntry.STORED);\n\
  ```\n\n将上一步中添加的条目的内容写入 `ZipOutputStream` 对象。由于 `ZipEntry` 对象代表一个文件，你需要通过创建一个 `FileInputStream`\
  \ 对象来读取该文件。\n\n```\n// 创建一个输入流来读取条目文件的数据\nBufferedInputStream bis = new BufferedInputStream(new\
  \ FileInputStream(\"test1.txt\"));\nbyte[] buffer = new byte[1024];\nint count;\n\
  // 写入条目的数据\nwhile((count = bis.read(buffer)) != -1) {\nzos.write(buffer, 0, count);\n\
  }\nbis.close();\n```\n\n现在，使用 `ZipOutputStream` 的 `closeEntry()` 方法关闭该条目。\n\n```\n\
  // 关闭 ZIP 条目\nzos.closeEntry();\n```\n\n对要添加到 ZIP 文件中的每个条目重复上述步骤。最后，你需要关闭 `ZipOutputStream`。\n\
  \n```\n// 关闭 ZIP 输出流\nzos.close()\n```\n\n\n\n清单 8-4 演示了如何创建一个 ZIP 文件。它向 `ziptest.zip`\
  \ 文件中添加了两个文件，分别名为 `test1.txt` 和 `notes\\test2.txt`。程序期望这些文件位于当前工作目录中。如果文件不存在，程序会打印一条包含预期文件路径的错误消息并退出。当程序成功完成时，当前目录中会创建一个\
  \ `ziptest.zip` 文件，你可以使用 ZIP 文件工具（例如 Windows 上的 WinZip）打开它。程序会打印新创建的 ZIP 文件的路径。运行该程序时，你可能会得到不同的输出。\n\
  \n```\n// ZipUtility.java\npackage com.jdojo.archives;\nimport java.util.zip.ZipOutputStream;\n\
  import java.util.zip.ZipEntry;\nimport java.io.FileOutputStream;\nimport java.io.IOException;\n\
  import java.io.BufferedInputStream;\nimport java.io.FileInputStream;\nimport java.io.BufferedOutputStream;\n\
  import java.io.File;\nimport java.util.zip.Deflater;\npublic class ZipUtility {\n\
  public static void main(String[] args) {\n// 我们想要在当前目录中创建一个 ziptest.zip 文件。\n//\
  \ 我们想要向此 zip 文件中添加两个文件。\n// 两个文件路径都相对于当前目录。\nString zipFileName = \"ziptest.zip\"\
  ;\nString[] entries = new String[2];\nentries[0] = \"test1.txt\";\nentries[1] =\
  \ \"notes\" + File.separator + \"test2.txt\";\nzip(zipFileName, entries);\n}\npublic\
  \ static void zip(String zipFileName, String[] zipEntries) {\n// 获取当前目录以供后续使用\n\
  String currentDirectory = System.getProperty(\"user.dir\");\ntry (ZipOutputStream\
  \ zos\n= new ZipOutputStream(\nnew BufferedOutputStream(\nnew FileOutputStream(zipFileName))))\
  \ {\n// 将压缩级别设置为最佳压缩\nzos.setLevel(Deflater.BEST_COMPRESSION);\n// 向 ZIP 文件中添加每个条目\n\
  for (String zipEntry : zipEntries) {\n// 确保条目文件存在\nFile entryFile = new File(zipEntry);\n\
  if (!entryFile.exists()) {\nSystem.out.println(\"条目文件 \" + entryFile.getAbsolutePath()\n\
  + \" 不存在\");\nSystem.out.println(\"已中止处理。\");\nSystem.exit(1);\n}\n// 创建一个 ZipEntry\
  \ 对象\nZipEntry ze = new ZipEntry(zipEntry);\n// 将 zip 条目对象添加到 ZIP 文件\nzos.putNextEntry(ze);\n\
  // 将条目的内容添加到 ZIP 文件\naddEntryContent(zos, zipEntry);\n// 当前条目处理完毕\nzos.closeEntry();\n\
  }\nSystem.out.println(\"输出已写入 \"\n+ currentDirectory + File.separator + zipFileName);\n\
  } catch (IOException e) {\ne.printStackTrace();\n}\n}\npublic static void addEntryContent(ZipOutputStream\
  \ zos, String entryFileName) {\n// 创建一个输入流以从条目文件读取数据\ntry (BufferedInputStream bis\
  \ = new BufferedInputStream(\nnew FileInputStream(entryFileName))) {\nbyte[] buffer\
  \ = new byte[1024];\nint count;\nwhile ((count = bis.read(buffer)) != -1) {\nzos.write(buffer,\
  \ 0, count);\n}\n} catch (IOException e) {\ne.printStackTrace();\n}\n}\n}\n输出已写入\
  \ C:\\Java9LanguageFeatures\\ziptest.zip\n清单 8-4.\n创建 ZIP 文件\n```\n\n读取 ZIP 文件的内容\n\
  \n读取 ZIP 文件的内容与向其中写入内容正好相反。以下是读取 ZIP 文件内容（或提取条目）的步骤。\n\n1.  创建一个 `ZipInputStream`\
  \ 对象。\n2.  通过调用 `ZipInputStream` 对象的 `getNextEntry()` 方法，从输入流中获取一个 `ZipEntry`。\n\
  3.  从 `ZipInputStream` 对象中读取该 `ZipEntry` 的数据。\n4.  重复最后两个步骤以从归档文件中读取另一个 ZIP 条目。\n\
  5.  关闭 `ZipInputStream`。\n\n你可以使用 ZIP 文件名创建一个 `ZipInputStream` 对象，如下所示：\n\n```\n\
  ZipInputStream zis = new ZipInputStream(\nnew BufferedInputStream(\nnew FileInputStream(zipFileName)));\n\
  ```\n\n以下代码片段从输入流中获取下一个条目：\n\n```\nZipEntry entry = zis.getNextEntry();\n```\n\n\
  现在，你可以从 `ZipInputStream` 对象中读取当前 ZIP 条目的数据。你可以将 ZIP 条目的数据保存到文件或任何其他存储介质中。你可以使用 `ZipEntry`\
  \ 类的 `isDirectory()` 方法检查 ZIP 条目是否为目录。\n\n清单 8-5 演示了如何读取 ZIP 文件的内容。该示例未检查某些错误。它没有在覆盖文件之前检查文件是否已存在。它还假设所有条目都是文件。程序期望你的当前工作目录中存在一个\
  \ `ziptest.zip` 文件。它会从 ZIP 文件中提取所有文件，并输出包含提取文件的目录路径。你可能会得到不同的输出。\n\n```\n// UnzipUtility.java\n\
  package com.jdojo.archives;\nimport java.util.zip.ZipEntry;\nimport java.io.FileOutputStream;\n\
  import java.io.FileNotFoundException;\nimport java.io.IOException;\nimport java.io.BufferedInputStream;\n\
  import java.io.FileInputStream;\nimport java.io.BufferedOutputStream;\nimport java.io.File;\n\
  import java.util.zip.ZipInputStream;\npublic class UnzipUtility {\npublic static\
  \ void main(String[] args) {\nString zipFileName = \"ziptest.zip\";\nString unzipdirectory\
  \ = \"extracted\";\nunzip(zipFileName, unzipdirectory);\n}\npublic static void unzip(String\
  \ zipFileName, String unzipdir) {\ntry (ZipInputStream zis = new ZipInputStream(\n\
  new BufferedInputStream(\nnew FileInputStream(zipFileName)))) {\n// 从 ZIP 文件中读取每个条目\n\
  ZipEntry entry;\nwhile ((entry = zis.getNextEntry()) != null) {\n// 提取条目的内容\nextractEntryContent(zis,\
  \ entry, unzipdir);\n}\nSystem.out.println(\"ZIP 文件的内容已提取到 \"\n+ (new File(unzipdir)).getAbsolutePath());\n\
  } catch (IOException e) {\ne.printStackTrace();\n}\n}\npublic static void extractEntryContent(ZipInputStream\
  \ zis,\nZipEntry entry,\nString unzipdir)\nthrows IOException, FileNotFoundException\
  \ {\nString entryFileName = entry.getName();\nString entryPath = unzipdir + File.separator\
  \ + entryFileName;\n// 通过创建必要的目录来创建条目文件\ncreateFile(entryPath);\n// 创建一个输出流以提取 zip\
  \ 条目的内容并写入新文件\ntry (BufferedOutputStream bos = new BufferedOutputStream(\nnew FileOutputStream(entryPath)))\
  \ {\nbyte[] buffer = new byte[1024];\nint count;\nwhile ((count = zis.read(buffer))\
  \ != -1) {\nbos.write(buffer, 0, count);\n}\n}\n}\npublic static void createFile(String\
  \ filePath) throws IOException {\nFile file = new File(filePath);\nFile parent =\
  \ file.getParentFile();\n// 如果所有父目录不存在，则创建它们\nif (!parent.exists()) {\nparent.mkdirs();\n\
  }\nfile.createNewFile();\n}\n}\nZIP 文件的内容已提取到 C:\\Java9LanguageFeatures\\extracted\n\
  清单 8-5.\n读取 ZIP 文件的内容\n```\n\n使用 `ZipFile` 类来读取 ZIP 文件的内容或列出其条目更为简便。例如，`ZipFile`\
  \ 允许对 ZIP 条目进行随机访问，而 `ZipInputStream` 仅允许顺序访问。`ZipFile` 对象的 `entries()` 方法返回文件中所有\
  \ ZIP 条目的枚举。`getInputStream()` 方法返回用于读取 `ZipEntry` 对象内容的输入流。以下代码片段展示了如何使用 `ZipFile`\
  \ 类。你可以将清单 8-5 中的代码重写为使用 `ZipFile` 类而不是 `ZipOutputStream` 类，以此作为练习。当你只想列出 ZIP 文件中的条目时，`ZipFile`\
  \ 类会非常方便。\n\n\n\n```\nimport java.io.InputStream;\nimport java.util.Enumeration;\n\
  import java.util.zip.ZipEntry;\nimport java.util.zip.ZipFile;\n...\n// 使用 ZIP 文件名创建\
  \ ZipFile 对象\nZipFile zf = new ZipFile(\"ziptest.zip\");\n// 获取所有 ZIP 条目的枚举并遍历它们\n\
  Enumeration e = zf.entries();\nZipEntry entry;\nwhile (e.hasMoreElements()) {\n\
  entry = e.nextElement();\n// 获取当前 ZIP 条目的输入流\nInputStream is = zf.getInputStream(entry);\n\
  /* 使用 is 对象读取该条目的数据 */\n// 打印条目的名称\nSystem.out.println(entry.getName());\n}\n```\n\
  \nJava 8 为 `ZipFile` 类新增了一个 `stream()` 方法，该方法返回一个 `Stream<? extends ZipEntry>`。我在第\
  \ 13 章中介绍了 `Stream` 类。下面我们使用 `Stream` 类和 lambda 表达式重写之前的代码片段：\n\n```\nimport java.io.IOException;\n\
  import java.io.InputStream;\nimport java.util.stream.Stream;\nimport java.util.zip.ZipEntry;\n\
  import java.util.zip.ZipFile;\n...\n// 使用 ZIP 文件名创建 ZipFile 对象\nZipFile zf = new\
  \ ZipFile(\"ziptest.zip\");\n// 获取所有 ZIP 条目的 Stream 并对每个条目执行某些操作\nStream entryStream\
  \ = zf.stream();\nentryStream.forEach(entry -> {\ntry {\n// 获取当前 ZIP 条目的输入流\nInputStream\
  \ is = zf.getInputStream(entry);\n/* 使用 is 对象读取该条目的数据 */\n} catch(IOException e)\
  \ {\ne.printStackTrace();\n}\n// 打印条目的名称\nSystem.out.println(entry.getName());\n\
  });\n```\n\n使用 GZIP 文件格式\n\n`GZIPInputStream` 和 `GZIPOutputStream` 类用于处理 GZIP 文件格式。它们是\
  \ `InputStream` 和 `OutputStream` 类族中的具体装饰器类。其用法与 I/O 中其他具体装饰器类类似。你需要将 `OutputStream`\
  \ 对象包装在 `GZIPOutputStream` 对象中，以便对数据应用 GZIP 压缩。你需要将 `InputStream` 对象包装在 `GZIPInputStream`\
  \ 对象中，以便应用 GZIP 解压缩。以下代码片段说明了如何使用这些类来压缩和解压缩数据：\n\n```\n// 创建 GZIPOutputStream 对象以\
  \ GZIP 格式压缩数据\n// 并将其写入 gziptest.gz 文件。\nGZIPOutputStream gos = new GZIPOutputStream(new\
  \ FileOutputStream(\"gziptest.gz\"));\n// 将未压缩的数据写入 GZIP 输出流，数据将被\n// 压缩并写入 gziptest.gz\
  \ 文件\ngos.write(byteBuffer);\n```\n\n如果你希望使用缓冲写入以获得更快的速度，应将 `GZIPOutputStream` 包装在\
  \ `BufferedOutputStream` 中，并将数据写入 `BufferedOutputStream`。\n\n```\nBufferedOutputStream\
  \ bos = new BufferedOutputStream(new GZIPOutputStream(\nnew FileOutputStream(\"\
  gziptest.gz\")));\n```\n\n如何在序列化对象时对其进行压缩？很简单。只需将 `GZIPOutputStream` 包装在 `ObjectOutputStream`\
  \ 对象中即可。当你将对象写入 `ObjectOutputStream` 时，其序列化形式将使用 GZIP 格式进行压缩。\n\n```\nObjectOutputStream\
  \ oos = new ObjectOutputStream(new GZIPOutputStream(\nnew FileOutputStream(\"gziptest.ser\"\
  )));\n```\n\n应用相反的逻辑来读取 GZIP 格式的压缩数据以进行解压缩。以下代码片段展示了如何构造一个 `InputStream` 对象来解压缩\
  \ GZIP 格式的数据：\n\n```\n// 从 gziptest.gz 文件中解压缩 GZIP 格式的数据并读取它\nGZIPInputStream gis\
  \ = new GZIPInputStream(new FileInputStream(\"gziptest.gz\"));\n/* 从 GZIP 输入流中读取未压缩的数据，例如\
  \ gis.read(byteBuffer);*/\n// 构造一个 BufferedInputStream 来读取 GZIP 格式的数据\nBufferedInputStream\
  \ bis = new BufferedInputStream (new GZIPInputStream(\nnew FileInputStream(gziptest.gz\"\
  )));\n// 构造一个 ObjectInputStream 来读取压缩对象\nObjectInputStream ois = new ObjectInputStream\
  \ (new GZIPInputStream(\nnew FileInputStream(\"gziptest.ser\")));\n```\n\n使用 JAR\
  \ 文件格式\n\n\n\nJAR（Java 归档）是一种基于 ZIP 文件格式的文件格式。它用于将 Java 应用程序或小程序的资源、类文件、声音文件、图像等打包在一起，并提供数据压缩功能。最初，它被开发用于打包小程序的资源，以减少通过\
  \ HTTP 连接下载的时间。\n\n你可以将 JAR 文件视为一种特殊的 ZIP 文件。JAR 文件提供了许多 ZIP 文件不具备的功能。你可以对 JAR 文件的内容进行数字签名以提供安全性。它提供了一种平台无关的文件格式。你可以在\
  \ Java 程序中使用 JAR API 来操作 JAR 文件。\n\nJAR 文件可以包含一个可选的 `META-INF` 目录，用于存放包含应用程序配置信息的文件和目录。表\
  \ 8-2 列出了 `META-INF` 目录中的条目。\n\n表 8-2. JAR 文件的 META-INF 目录内容\n\n名称 | 类型 | 用途\n|\
  \ --- | --- | --- |\n`MANIFEST.MF` | 文件 | 包含扩展和包相关的数据。\n`INDEX.LIST` | 文件 | 包含包的位置信息。类加载器使用它来加速类的搜索和加载过程。\n\
  `X.SF` | 文件 | X 是基本文件名。存储 JAR 文件的签名。\n`X.DSA` | 文件 | X 是基本文件名。存储相应签名文件的数字签名。\n`/services`\
  \ | 目录 | 包含所有服务提供者配置文件。如果你的应用程序是使用 JDK9 中的模块系统开发的，则不需要此目录，因为可以在模块声明中配置服务。\n`versions`\
  \ | 目录 | 在多版本 JAR 文件中包含特定于 JDK 版本的文件。我在本系列第三卷的第 11 章中介绍了多版本 JAR。\n\nJDK 附带了一个 `jar`\
  \ 工具，用于创建和操作 JAR 文件。你也可以使用 Java API 中的 `java.util.jar` 包中的类来创建和操作 JAR 文件。该包中的大多数类与\
  \ `java.util.zip` 包中的类相似。实际上，该包中的大多数类都继承自处理 ZIP 文件格式的类。例如，`JarFile` 类继承自 `ZipFile`\
  \ 类；`JarEntry` 类继承自 `ZipEntry` 类；`JarInputStream` 类继承自 `ZipInputStream` 类；`JarOutputStream`\
  \ 类继承自 `ZipOutputStream` 类等。JAR API 有一些新的类来处理清单文件。`Manifest` 类表示一个清单文件。我将在本章后面讨论如何使用\
  \ JAR API。本节我将讨论 `jar` 工具。\n\n提示\n\nJDK9 为 `JarFile` 类添加了一些方法，用于处理 JDK9 中引入的多版本\
  \ JAR 文件。例如，如果 `JarFile` 表示一个多版本 JAR，则 `isMultiRelease()` 方法返回 true。\n\n使用 `jar`\
  \ 工具创建 JAR 文件时，有许多命令行选项可用。使用 `jar` 工具可以执行四种基本操作。\n\n*   创建 JAR 文件。\n*   更新 JAR 文件。\n\
  *   从 JAR 文件中提取条目。\n*   列出 JAR 文件的内容。\n\n表 8-3 列出了 `jar` 工具的命令行选项。本系列第一卷的第 3 章解释了其中一些选项。GNU\
  \ 风格的选项是在 JDK9 中添加的。有关 `jar` 工具所有选项的完整列表以及工具的用法，请使用 `--help` 或 `--help-extra` 选项运行该工具，如下所示：\n\
  \n表 8-3. jar 工具的命令行选项\n\n选项 | 描述\n| --- | --- |\n`-c, --create` | 创建一个新的 JAR 文件。\n\
  `-u, --update` | 更新一个现有的 JAR 文件。\n`-x, --extract` | 从 JAR 文件中提取指定文件或所有文件。\n`-t,\
  \ --list` | 列出 JAR 文件的目录内容。\n`-f, --file=FILE` | 指定 JAR 文件名。\n`-m, --manifest=FILE`\
  \ | 包含来自指定文件的清单信息。\n`-M, --no-manifest` | 不创建清单文件。\n`-i, --generate-index=FILE`\
  \ | 为指定的 JAR 文件生成索引信息。它会在 JAR 文件的 `META-INF` 目录下创建一个 `INDEX.LIST` 文件。\n`-0, --no-compress`\
  \ | 不压缩 JAR 文件中的条目。仅存储它们。选项值为零，表示零压缩。\n`-e, --main-class=CLASSNAME` | 将指定的类名添加为清单文件主节中\
  \ `Main-Class` 条目的值。\n`-v, --verbose` | 在标准输出上生成详细输出。\n`-C DIR` | 切换到指定目录，并将以下文件包含在\
  \ JAR 文件中。注意，该选项是大写的（`C`）。小写（`-c`）用于指示创建 JAR 文件的选项。\n`--release VERSION` | 将所有后续文件放置在\
  \ JAR 的版本化目录中（即 `META-INF/versions/VERSION/`）。\n`-d, --describe-module` | 打印模块描述符或自动模块名称。\n\
  `--module-version=VERSION` | 创建模块化 JAR 或更新非模块化 JAR 时的模块版本。\n`--hash-modules=PATTERN`\
  \ | 计算并记录与给定模式匹配且直接或间接依赖于正在创建的模块化 JAR 或正在更新的非模块化 JAR 的模块的哈希值。\n`-p, --module-path`\
  \ | 用于生成哈希的模块依赖位置。\n`--version` | 打印程序版本。\n`-h, --help[:compat], --help-extra` |\
  \ 打印 `jar` 工具的帮助信息。\n\n```\nC:\\Java9LanguageFeatures>jar --help\n```\n\n创建 JAR\
  \ 文件\n\n使用以下命令创建一个名为 `test.jar` 的 JAR 文件，其中包含两个类文件 `A.class` 和 `B.class`：\n\n```\n\
  jar --create --file test.jar A.class B.class\n```\n\n如果在运行此命令时遇到诸如 `\"jar is not\
  \ recognized as a command\"` 的错误，则需要使用 `jar` 命令的完整路径，或者将包含 `jar` 命令的目录添加到计算机的 `PATH`\
  \ 环境变量中。在 Windows 上，如果你将 JDK 安装在 `C:\\java9` 目录中，则 `jar` 命令存储在 `C:\\java9\\bin`\
  \ 目录中。\n\n在上一个命令中，`--create` 选项表示你正在创建一个新的 JAR 文件，`--file test.jar` 选项表示你将新的 JAR\
  \ 文件名指定为 `test.jar`。在命令的末尾，你可以指定一个或多个要包含在 JAR 文件中的文件名或目录名。\n\n要查看 `test.jar` 文件的内容，可以执行以下命令：\n\
  \n```\njar --list --file test.jar\nMETA-INF/\nMETA-INF/MANIFEST.MF\nA.class\nB.class\n\
  ```\n\n此命令中的 `--list` 选项表示你希望查看 JAR 文件的目录内容。`--file` 选项指定 JAR 文件名，此处为 `test.jar`。请注意，当你创建\
  \ `test.jar` 文件时，`jar` 工具会自动为你创建两个额外的条目：一个名为 `META-INF` 的目录和一个位于 `META-INF` 目录中的名为\
  \ `MANIFEST.MF` 的文件。当你列出 JAR 文件的内容时，你会看到这些条目。\n\n以下命令将通过包含当前工作目录中的所有内容来创建一个 `test.jar`\
  \ 文件。注意使用星号作为通配符来表示当前工作目录中的所有内容。\n\n```\njar --create --file test.jar *\n```\n\n\
  以下命令将创建一个 JAR 文件，其中包含 `book/archives` 目录中的所有类文件以及 `book/images` 目录中的所有图像。这里，`book`\
  \ 是当前工作目录中的一个子目录。\n\n```\njar --create --file test.jar book/archives/*.class book/images\n\
  ```\n\n\n\n您可以在创建 JAR 文件时，通过命令行选项指定一个清单文件。您指定的清单文件将是一个文本文件，其中包含 JAR 文件的所有清单条目。请注意，您的清单文件末尾必须有一个空行。否则，清单文件中的最后一个条目将不会被处理。稍后我将详细讨论清单文件的内容。\n\
  \n以下命令将在创建 `test.jar` 文件时使用 `manifest.txt` 文件，并包含当前目录中的所有文件和子目录。请注意选项 `m` 的使用。\n\
  \n```\njar --create --file test.jar --manifest manifest.txt *\n```\n\n**更新 JAR 文件**\n\
  \n使用选项 `--update` 来更新现有 JAR 文件的条目或其清单文件。以下命令将向现有的 `test.jar` 文件中添加一个 `C.class` 文件：\n\
  \n```\njar --update --file test.jar C.class\n```\n\n假设您有一个 `test.jar` 文件，并且希望将其清单文件中的\
  \ `Main-Class` 条目更改为 `pkg.HelloWorld` 类。您可以通过使用以下命令来实现：\n\n```\njar --update --file\
  \ test.jar --main-class pkg.HelloWorld\n```\n\n**为 JAR 文件建立索引**\n\n您可以为 JAR 文件生成一个索引文件。它用于加速类加载。在创建\
  \ JAR 文件后，使用一个单独的命令，将 `--generate-index` 选项与 `jar` 命令一起使用：\n\n```\njar --generate-index\
  \ test.jar\n```\n\n此命令会向 `test.jar` 文件中添加一个 `META-INF/INDEX.LIST` 文件。您可以通过使用以下命令列出\
  \ `test.jar` 文件的内容来验证这一点：\n\n```\njar --list --file test.jar\nMETA-INF/INDEX.LIST\n\
  META-INF/\nMETA-INF/MANIFEST.MF\nA.class\nB.class\nmanifest.txt\n```\n\n生成的 `INDEX.LIST`\
  \ 文件包含了 `test.jar` 文件的 `Class-Path` 属性中列出的所有 JAR 文件中所有包的位置信息。您可以在 JAR 文件的清单文件中包含一个名为\
  \ `Class-Path` 的属性。它是一个以空格分隔的 JAR 文件列表。当您运行 JAR 文件时，该属性值用于搜索和加载类。\n\n**从 JAR 文件中提取条目**\n\
  \n您可以使用 `jar` 命令的 `--extract` 选项来提取 JAR 文件中的全部或部分条目。要从 `test.jar` 文件中提取所有条目，您可以使用：\n\
  \n```\njar --extract --file test.jar\n```\n\n此命令将 `test.jar` 文件中的所有条目提取到当前工作目录。它会创建与\
  \ `test.jar` 文件中相同的目录结构。在提取条目过程中，任何已存在的文件都会被覆盖。此命令不会更改示例中的 JAR 文件 `test.jar`。\n\n\
  要从 JAR 文件中提取单个条目，您需要在命令的末尾列出它们。条目之间应以空格分隔。以下命令将从 `test.jar` 文件中提取 `A.class` 和 `book/HelloWorld.class`\
  \ 条目：\n\n```\njar --extract --file test.jar A.class book/HelloWorld.class\n```\n\
  \n要提取 `book` 目录中的所有类文件，您可以使用以下命令：\n\n```\njar --extract --file test.jar book/*.class\n\
  ```\n\n**列出 JAR 文件的内容**\n\n将选项 `t` 与 `jar` 命令一起使用，可以在标准输出上列出 JAR 文件的内容：\n\n```\n\
  jar --list --file test.jar\n```\n\n**清单文件**\n\nJAR 文件与 ZIP 文件的不同之处在于，它可以选择性地在 `META-INF`\
  \ 目录中包含一个名为 `MANIFEST.MF` 的清单文件。清单文件包含有关 JAR 文件及其条目的信息。它可以包含有关 JAR 文件的 `CLASSPATH`\
  \ 设置的信息。它的主条目类是包含“`public static void main(String[])`”方法的类，用于启动独立应用程序、包的版本信息等。\n\
  \n清单文件被分成多个节（section），节之间用空行分隔。每个节包含名称-值对。每个名称-值对由新行分隔。名称与其对应的值之间用冒号分隔。清单文件必须以新行结尾。以下是清单文件内容的示例：\n\
  \n```\nManifest-Version: 1.0\nCreated-By: 1.8.0_20-ea-b05 (Oracle Corporation)\n\
  Main-Class: com.jdojo.intro.Welcome\nMulti-Release: true\n```\n\n此清单文件有一个包含四个属性的节：\n\
  \n*   `Manifest-Version`\n*   `Created-By`\n*   `Main-Class`\n*   `Multi-Release`\n\
  \n清单文件中有两种节：主节（main section）和个体节（individual section）。任何两个节之间必须用一个空行分隔。主节中的条目适用于整个\
  \ JAR 文件。个体节中的条目适用于特定的条目。个体节中的属性会覆盖主节中的相同属性。个体条目以 `Name` 属性开头，其值是 JAR 文件中条目的名称，后面跟着该条目的其他属性。例如，假设您有一个包含以下内容的清单文件：\n\
  \n```\nManifest-Version: 1.0\nCreated-By: 1.6.0 (Sun Microsystems Inc.)\nMain-Class:\
  \ com.jdojo.chapter2.Welcome\nSealed: true\nName: book/data/\nSealed: false\nName:\
  \ images/logo.bmp\nContent-Type: image/bmp\n```\n\n该清单文件包含三个节：一个主节和两个个体节。第一个个体节表明包\
  \ `book/data` 未被密封。这个个体节的属性 `Sealed: false` 将覆盖主节的属性 `Sealed: true`。另一个个体节针对一个名为\
  \ `images/logo.bmp` 的条目。它声明该条目的内容类型是 `bmp` 类型的图像。\n\n`jar` 命令可以创建一个默认的清单文件并将其添加到\
  \ JAR 文件中。默认的清单文件只包含两个属性：`Manifest-Version` 和 `Created-By`。您可以使用选项 `--no-manifest`\
  \ 来告诉 `jar` 工具省略默认的清单文件。以下命令将创建一个 `test.jar` 文件，而不添加默认的清单文件：\n\n```\njar --create\
  \ --no-manifest --file test.jar book/*.class\n```\n\n`jar` 命令为您提供了一个自定义清单文件内容的选项。您可以使用\
  \ `--manifest` 选项来指定包含清单文件内容的文件。`jar` 命令将从指定的清单文件中读取名称-值对，并将它们添加到 `MANIFEST.MF`\
  \ 文件中。假设您有一个名为 `manifest.txt` 的文件，其中包含一个属性条目。请确保在文件末尾添加一个新行。文件内容如下：\n\n```\nMain-Class:\
  \ com.jdojo.intro.Welcome\n```\n\n要通过包含当前工作目录中的所有类文件，将 `manifest.txt` 文件中的 `Main-Class`\
  \ 属性值添加到一个新的 `test.jar` 文件中，您可以执行以下命令：\n\n```\njar --create --manifest manifest.txt\
  \ --file test.jar *.class\n```\n\n此命令将向 `test.jar` 文件中添加一个包含以下内容的清单文件：\n\n```\n\
  Manifest-Version: 1.0\nCreated-By: 9.0.1 (Oracle Corporation)\nMain-Class: com.jdojo.intro.Welcome\n\
  ```\n\n如果您在清单文件中没有指定 `Manifest-Version` 和 `Created-By` 属性，该工具会添加它们。`Manifest-Version`\
  \ 默认为 1.0，`Created-By` 默认为您使用的 JDK 版本。\n\n您也可以在清单文件中添加 `Main-Class` 属性值，而无需创建自己的清单文件。在创建/更新\
  \ JAR 文件时，将选项 `--main-class` 与 `jar` 工具一起使用。以下命令会将 `com.jdojo.intro.Welcome` 作为\
  \ `Main-Class` 的值添加到 `test.jar` 文件的 `MANIFEST.MF` 文件中：\n\n```\njar --create --main-class\
  \ com.jdojo.intro.Welcome --file test.jar *.class\n```\n\n您可以在 JAR 文件的清单文件中设置 `CLASSPATH`。属性名称为\
  \ `Class-Path`，您必须在自定义清单文件中指定它。它是一个以空格分隔的 JAR 文件、ZIP 文件和目录列表。清单文件中的 `Class-Path`\
  \ 属性如下所示：\n\n```\nClass-Path: chapter8.jar file:/c:/book/ http://www.jdojo.com/jutil.jar\n\
  ```\n\n\n\n此条目为 `CLASSPATH` 提供了三项内容：一个名为 `chapter` `8` `.jar` 的 JAR 文件，一个使用文件协议\
  \ `file:/c:/book/` 的目录，以及另一个使用 HTTP 协议 [`http://www.jdojo.com/jutil.jar`](http://www.jdojo.com/jutil.jar)\
  \ 的 JAR 文件。请注意，目录名必须以正斜杠结尾。假设此 `Class-Path` 设置包含在 `test.jar` 文件的清单文件中。当你使用以下 `java`\
  \ 命令运行 `test.jar` 文件时，将使用此 `CLASSPATH` 来搜索和加载类。\n\n```\njava –jar test.jar\n```\n\
  \n当你使用 `java` 命令的 `–jar` 选项运行 JAR 文件时，JAR 文件清单文件外部的任何 `CLASSPATH` 设置（本例中为 `test.jar`\
  \ 文件）都将被忽略。`Class-Path` 属性的另一个用途是使用 `jar` 工具的 `--generate-index` 选项生成所有包的索引。\n\n\
  在 JAR 文件中密封包\n\n你可以密封 JAR 文件中的包。密封 JAR 文件中的包意味着该包中声明的所有类都必须归档在同一个 JAR 文件中。通常，密封包是为了方便维护包的版本。如果你更改了包中的任何内容，只需重新创建一个\
  \ JAR 文件即可。要密封 JAR 文件中的包，你需要包含两个属性：`Name` 和 `Sealed`。`Name` 属性的值是包的名称，`Sealed` 属性的值为\
  \ `true`。清单文件中的以下条目将密封名为 `com.jdojo.archives` 的包。请注意，包名必须以正斜杠（`/`）结尾。\n\n```\nName:\
  \ com/jdojo/archives/\nSealed: true\n```\n\n默认情况下，JAR 文件中的包是未密封的。如果你想密封 JAR 文件本身，可以包含一个\
  \ `Sealed` 属性，如下所示：\n\n```\nSealed: true\n```\n\n密封 JAR 文件将密封该 JAR 文件中的所有包。但是，你可以通过单独不密封某个包来覆盖此设置。清单文件中的以下条目将密封\
  \ JAR 文件中的所有包，但 `book/chapter` `8` `/` 包除外：\n\n```\nSealed: true\nName: book/chapter8/\n\
  Sealed: false\n```\n\n使用 JAR API\n\n使用 JAR API 与使用 ZIP API 非常相似，不同之处在于 JAR API 包含了用于处理清单文件的类。`Manifest`\
  \ 类的对象代表一个清单文件。你可以按如下方式在代码中创建一个 `Manifest` 对象：\n\n```\nManifest manifest = new Manifest();\n\
  ```\n\n对于清单文件，你可以做两件事：从中读取条目以及向其写入条目。处理主节和各个节的条目有不同的方法。要向主节添加条目，请使用 `Manifest` 类的\
  \ `getMainAttributes()` 方法获取 `Attributes` 类的实例，然后使用其 `put()` 方法不断向其添加名称-值对。以下代码片段向\
  \ `Manifest` 对象的主节添加了一些属性。已知的属性名称在 `Attributes.Name` 类中定义为常量。例如，常量 `Attributes.Name.MANIFEST_VERSION`\
  \ 代表 `Manifest-Version` 属性名称。\n\n```\n// 创建一个 Manifest 对象\nManifest manifest = new\
  \ Manifest();\n/* 添加主属性\n1. 清单版本\n2. 主类\n3. 密封\n*/\nAttributes mainAttribs = manifest.getMainAttributes();\n\
  mainAttribs.put(Attributes.Name.MANIFEST_VERSION, \"1.0\");\nmainAttribs.put(Attributes.Name.MAIN_CLASS,\
  \ \"com.jdojo.intro.Welcome\");\nmainAttribs.put(Attributes.Name.SEALED, \"true\"\
  );\n```\n\n向清单文件添加单个条目比添加主条目稍微复杂一些。假设你想向清单文件添加以下单个条目：\n\n```\nName: \"com/jdojo/archives/\"\
  \nSealed: false\n```\n\n你需要执行以下步骤。\n\n1.  获取存储清单单个条目的 `Map` 对象。\n2.  创建一个 `Attributes`\
  \ 对象。\n3.  向 `Attributes` 对象添加名称-值对。你可以根据需要添加任意数量的名称-值对。\n4.  使用单个节的名称作为键，将 `Attributes`\
  \ 对象添加到属性 `Map` 中。\n\n以下代码片段展示了如何向 `Manifest` 对象添加单个条目：\n\n```\n// 获取 Manifest 的属性\
  \ Map\nMap attribsMap = manifest.getEntries();\n// 创建一个 Attributes 对象\nAttributes\
  \ attribs = new Attributes();\n// 为 \"Sealed\" 属性创建一个 Attributes.Name 对象\nAttributes.Name\
  \ name = new Attributes.Name(\"Sealed\");\n// 将 \"name: value\" 对 (Sealed: false)\
  \ 添加到 attributes 对象\nattribs.put(name, \"false\");\n// 将 Sealed: false 属性添加到 attributes\
  \ map\nattribsMap.put(\"com/jdojo/archives/\", attribs);\n```\n\n如果你想向 JAR 文件添加清单文件，可以在\
  \ `JarOutputStream` 类的某个构造函数中指定它。例如，以下代码片段创建了一个 JAR 输出流，用于创建一个包含 `Manifest` 对象的\
  \ `test.jar` 文件：\n\n```\n// 创建一个 Manifest 对象\nManifest manifest = new Manifest();\n\
  // 使用 Manifest 对象创建一个 JarOutputStream\nJarOutputStream jos = new JarOutputStream(new\
  \ BufferedOutputStream(\nnew FileOutputStream(\"test.jar\")), manifest);\n```\n\n\
  清单 8-6 包含了创建包含清单文件的 JAR 文件的代码。该代码与创建 ZIP 文件类似。`main()` 方法包含了用于创建 JAR 文件的文件名。所有文件都应位于当前工作目录中。\n\
  \n*   它创建了一个名为 `jartest.jar` 的 JAR 文件。\n*   它将 `images/logo.bmp` 和 `com/jdojo/archives/Test.class`\
  \ 文件添加到 `jartest.jar` 文件中。\n\n如果你的当前工作目录中不存在这些输入文件，运行程序时将会收到错误消息。如果你想向 JAR 文件添加其他文件，请相应地修改\
  \ `main()` 方法中的代码。\n\n\n\n```\n// JARUtility.java\npackage com.jdojo.archives;\n\
  import java.util.jar.Manifest;\nimport java.util.jar.Attributes;\nimport java.util.Map;\n\
  import java.util.jar.JarOutputStream;\nimport java.io.FileOutputStream;\nimport\
  \ java.io.IOException;\nimport java.io.BufferedInputStream;\nimport java.io.FileInputStream;\n\
  import java.io.FileNotFoundException;\nimport java.io.File;\nimport java.util.zip.Deflater;\n\
  import java.io.BufferedOutputStream;\nimport java.util.jar.JarEntry;\npublic class\
  \ JARUtility {\npublic static void main(String[] args) throws Exception {\n// 创建一个\
  \ Manifest 对象\nManifest manifest = getManifest();\n// 将 jar 条目存储在一个字符串数组中\nString\
  \ jarFileName = \"jartest.jar\";\nString[] entries = new String[2];\nentries[0]\
  \ = \"images/logo.bmp\";\nentries[1] = \"com/jdojo/archives/Test.class\";\ncreateJAR(jarFileName,\
  \ entries, manifest);\n}\npublic static void createJAR(String jarFileName, String[]\
  \ jarEntries, Manifest manifest) {\n// 获取当前目录以备后用\nString currentDirectory = System.getProperty(\"\
  user.dir\");\n// 创建 JAR 文件\ntry (JarOutputStream jos = new JarOutputStream(\nnew\
  \ BufferedOutputStream(\nnew FileOutputStream(jarFileName)\n), manifest)) {\n//\
  \ 设置压缩级别为最佳压缩\njos.setLevel(Deflater.BEST_COMPRESSION);\n// 将每个条目添加到 JAR 文件\nfor\
  \ (String jarEntry : jarEntries) {\n// 确保条目文件存在\nFile entryFile = new File(jarEntry);\n\
  if (!entryFile.exists()) {\nSystem.out.println(\"条目文件 \" + entryFile.getAbsolutePath()\n\
  + \" 不存在\");\nSystem.out.println(\"处理已中止。\");\nSystem.exit(1);\n}\n// 创建一个 JarEntry\
  \ 对象\nJarEntry je = new JarEntry(jarEntry);\n// 将 jar 条目对象添加到 JAR 文件\njos.putNextEntry(je);\n\
  // 将条目的内容添加到 JAR 文件\naddEntryContent(jos, jarEntry);\n// 通知 JAR 输出流，当前条目的处理已完成\n\
  jos.closeEntry();\n}\nSystem.out.println(\"输出已写入 \"\n+ currentDirectory + File.separator\
  \ + jarFileName);\n} catch (IOException e) {\ne.printStackTrace();\n}\n}\npublic\
  \ static void addEntryContent(JarOutputStream jos, String entryFileName)\nthrows\
  \ IOException, FileNotFoundException {\n// 创建一个输入流，用于从条目文件读取数据\ntry (BufferedInputStream\
  \ bis = new BufferedInputStream(\nnew FileInputStream(entryFileName))) {\nbyte[]\
  \ buffer = new byte[1024];\nint count;\nwhile ((count = bis.read(buffer)) != -1)\
  \ {\njos.write(buffer, 0, count);\n}\n}\n}\npublic static Manifest getManifest()\
  \ {\nManifest manifest = new Manifest();\n/* 添加主要属性\n1. Manifest 版本\n2. 主类\n3. 密封\n\
  */\nAttributes mainAttribs = manifest.getMainAttributes();\nmainAttribs.put(Attributes.Name.MANIFEST_VERSION,\
  \ \"1.0\");\nmainAttribs.put(Attributes.Name.MAIN_CLASS, \"com.jdojo.archives.Test\"\
  );\nmainAttribs.put(Attributes.Name.SEALED, \"true\");\n/* 添加两个独立节 */\n/* 不要密封 com/jdojo/archives/\
  \ 包。请注意，您已经密封了整个\nJAR 文件，要排除此包，我们必须为此包单独添加一个 Sealed: false 属性。\n*/\nMap attribsMap\
  \ = manifest.getEntries();\n// 创建一个属性 \"Sealed : false\" 并\n// 将其添加到独立条目 \"Name:\
  \ com/jdojo/archives/\"\nAttributes a1 = getAttribute(\"Sealed\", \"false\");\n\
  attribsMap.put(\"com/jdojo/archives/\", a1);\n// 创建一个属性 \"Content-Type: image/bmp\"\
  \ 并将其添加到 images/logo.bmp\nAttributes a2 = getAttribute(\"Content-Type\", \"image/bmp\"\
  );\nattribsMap.put(\"images/logo.bmp\", a2);\nreturn manifest;\n}\npublic static\
  \ Attributes getAttribute(String name, String value) {\nAttributes a = new Attributes();\n\
  Attributes.Name attribName = new Attributes.Name(name);\na.put(attribName, value);\n\
  return a;\n}\n}\n清单 8-6.\n使用 JAR API 创建 JAR 文件\n```\n\n你可以使用类似于从 ZIP 文件读取条目的代码来读取\
  \ JAR 文件中的条目。要读取 JAR 文件清单文件中的条目，你需要使用 `JarInputStream` 的 `getManifest()` 方法获取 `Manifest`\
  \ 类的对象，如下所示：\n\n```\n// 创建一个 JAR 输入流对象\nJarInputStream jis = new JarInputStream(new\
  \ FileInputStream(\"jartest.jar\"));\n// 从 JAR 文件中获取清单文件。如果 JAR 文件中没有清单文件，则返回 null。\n\
  Manifest manifest = jis.getManifest();\nif (manifest != null) {\n// 从主节获取属性\nAttributes\
  \ mainAttributes = manifest.getMainAttributes();\nString mainClass = mainAttributes.getValue(\"\
  Main-Class\");\n// 从独立节获取属性\nMap entries = manifest.getEntries();\n}\n```\n\n本节不包含从\
  \ JAR 文件读取条目的代码示例。请参考 `UnzipUtility` 类中的代码，该类包含从 ZIP 文件读取条目的代码。从 JAR 文件读取的代码类似，只是你将使用\
  \ `java.util.jar` 包中与 JAR 相关的类，而不是 `java.util.zip` 包中与 ZIP 相关的类。\n\n从 JAR 文件访问资源\n\
  \n你将如何访问存储在 JAR 文件中的资源？例如，你将如何访问 JAR 文件中名为 `images/logo.bmp` 的文件，以便在你的 Java 应用程序中将该\
  \ BMP 文件显示为图像？你可以通过引用 JAR 文件中的资源来构造一个 URL 对象。JAR 文件 URL 的语法形式如下：\n\n```\njar:!/{entry}\n\
  ```\n\n以下 URL 使用 HTTP 协议引用 [`www.jdojo.com`](http://www.jdojo.com) 上 `test.jar`\
  \ 文件中的 `images/logo.bmp` JAR 条目：\n\n```\njar:http://www.jdojo.com/test.jar!/images/logo.bmp\n\
  ```\n\n以下 URL 使用 `file` 协议引用本地文件系统 `C:\\jarfiles\\` 目录下 `test.jar` 文件中的 `images/logo.bmp`\
  \ JAR 条目：\n\n```\njar:file:/C:/jarfiles/test.jar!/images/logo.bmp\n```\n\n总结\n\n\
  归档文件由一个或多个文件组成。可选地，归档文件中的文件可以被压缩。它还包含元数据，可能包括文件的目录结构、注释、错误检测和恢复信息等。归档文件也可以被加密。\n\
  \n校验和 是通过对字节流应用算法计算得出的一个数字。通常，它在数据通过网络传输时用于检查数据传输过程中的错误。发送方和接收方使用相同的算法来计算传输数据的校验和。不匹配则表明数据传输中存在错误。Java\
  \ 包含 `Adler32` 和 `CRC32` 类，分别用于使用 Adler32 和 CRC32 算法计算数据的校验和。Java 提供了 `Deflater`\
  \ 和 `Inflater` 类来处理数据压缩和解压缩。\n\nJDK 通过 API 和工具支持创建和操作 ZIP、GZIP 和 JAR 格式的归档文件。这些\
  \ API 位于 `java.util.zip` 和 `java.util.jar` 包中。除了用于处理 JAR 文件的 JAR API 之外，JDK 还提供了一个\
  \ `jar` 命令行工具，可用于创建、读取和更新 JAR 文件。`jar` 工具位于 `JDK_HOME\\bin` 目录中。\n\n问题与练习\n\n1.\
  \  什么是归档文件？\n\n2.  无损数据压缩和有损数据压缩有什么区别？各举出一种算法。\n\n3.  `Deflater` 和 `Inflater` 类的用途是什么？\n\
  \n4.  什么是校验和？说出三种计算校验和的算法及其对应的 Java 类。\n\n5.  以下类的实例分别代表什么：`ZipEntry`、`ZipFile`、`ZipInputStream`\
  \ 和 `ZipOutputStream`？\n\n6.  ZIP 文件和 JAR 文件有什么区别？\n\n7.  JAR 文件的 `versions` 目录中存储了哪些类型的内容？\n\
  \n8.  什么是清单文件？如何在 Java 程序中表示清单文件？\n\n9.  用于处理 JAR 文件的命令行工具的名称是什么？\n\n10. 说出你使用 `jar`\
  \ 工具创建新 JAR 文件和更新现有 JAR 文件时使用的选项。\n\n11. 编写命令以列出名为 `test.jar` 的 JAR 文件的目录内容。\n\n\
  \n\n12. 以下类的实例代表什么：`JarEntry`、`JarFile`、`JarInputStream` 和 `JarOutputStream`？\n\n\
  9. 新输入/输出\n\n在本章中，你将学习：\n\n*   什么是新输入/输出\n*   如何创建不同类型的缓冲区\n*   如何从缓冲区读取数据以及向缓冲区写入数据\n\
  *   如何操作缓冲区的 position、limit 和 mark 属性\n*   如何创建缓冲区的不同类型视图\n*   如何使用不同字符集对缓冲区中的数据进行编码/解码\n\
  *   什么是通道，以及如何使用通道读写文件内容\n*   如何使用内存映射文件实现更快的 I/O\n*   如何使用文件锁\n*   如何了解机器的字节序，以及在使用缓冲区时如何处理字节序\n\
  \n本章中的所有示例程序都是 `jdojo.nio` 模块的成员，如代码清单 9-1 所示。\n\n```\n// module-info.java\nmodule\
  \ jdojo.nio {\n    exports com.jdojo.nio;\n}\n代码清单 9-1.\njdojo.nio 模块的声明\n```\n\n\
  什么是 NIO？\n\n基于流的 I/O 使用流在数据源/数据接收器与 Java 程序之间传输数据。Java 程序一次从流中读取一个字节或向流中写入一个字节。这种执行\
  \ I/O 操作的方式速度较慢。新输入/输出（NIO）解决了旧式基于流的 I/O 中速度慢的问题。\n\n在 NIO 中，你使用通道和缓冲区进行 I/O 操作。通道类似于流。它表示数据源/数据接收器与\
  \ Java 程序之间用于数据传输的连接。通道和流之间有一个区别。流只能用于单向数据传输。也就是说，输入流只能将数据从数据源传输到 Java 程序；输出流只能将数据从\
  \ Java 程序传输到数据接收器。然而，通道提供了双向数据传输功能。你可以使用通道来读取数据以及写入数据。根据你的需求，你可以获得只读通道、只写通道或读写通道。\n\
  \n在基于流的 I/O 中，数据传输的基本单位是字节。在基于通道的 NIO 中，数据传输的基本单位是缓冲区。缓冲区是一个有界的数据容器。也就是说，缓冲区具有固定的容量，该容量决定了它可以包含的数据的上限。在基于流的\
  \ I/O 中，你直接将数据写入流。在基于通道的 I/O 中，你将数据写入缓冲区；然后将该缓冲区传递给通道，通道再将数据写入数据接收器。类似地，当你想从数据源读取数据时，你将一个缓冲区传递给通道。通道将数据从数据源读取到缓冲区中。然后你从缓冲区中读取数据。图\
  \ 9-1 描述了通道、缓冲区、数据源、数据接收器和 Java 程序之间的交互。很明显，这种交互中最重要的部分是从缓冲区读取数据和向缓冲区写入数据。我将在后续章节中详细讨论缓冲区和通道。\n\
  \n![A323070_2_En_9_Fig1_HTML.gif](img/A323070_2_En_9_Fig1_HTML.gif)\n\n图 9-1.\n\
  通道、缓冲区、Java 程序、数据源和数据接收器之间的交互\n\n缓冲区\n\n缓冲区是一个固定长度的数据容器。对于每种基本类型的值（`boolean` 类型值除外），都有一个单独的缓冲区类型来保存数据。缓冲区是程序中的一个对象。每种类型的缓冲区都有一个单独的类来表示。所有缓冲区类都继承自一个抽象的\
  \ `Buffer` 类。保存基本类型值的缓冲区类如下：\n\n*   `ByteBuffer`\n*   `ShortBuffer`\n*   `CharBuffer`\n\
  *   `IntBuffer`\n*   `LongBuffer`\n*   `FloatBuffer`\n*   `DoubleBuffer`\n\n`XxxBuffer`\
  \ 类的对象用于保存 `Xxx` 基本数据类型的数据。例如，`ByteBuffer` 保存字节值；`ShortBuffer` 保存短整型值；`CharBuffer`\
  \ 保存字符，等等。以下是缓冲区的四个重要属性，你必须理解它们才能有效地使用缓冲区：\n\n*   容量\n*   位置\n*   限制\n*   标记\n\n\
  缓冲区的容量是它可以容纳的最大元素数量。缓冲区的容量在创建时是固定的。你可以将缓冲区的容量视为数组的长度。一旦创建了数组，其长度就是固定的。类似地，一旦创建了缓冲区，其容量就是固定的。然而，缓冲区不一定由数组支持。你可以通过调用其\
  \ `hasArray()` 方法来检查缓冲区是否由数组支持，如果缓冲区由数组支持，该方法返回 `true`。你可以通过使用缓冲区对象的 `array()` 方法来访问缓冲区的支持数组。一旦你访问了缓冲区的支持数组，对该数组所做的任何更改都将反映在缓冲区中。缓冲区有一个\
  \ `capacity()` 方法，该方法以 `int` 类型返回其容量。\n\n你可以通过多种方式创建特定类型的缓冲区。你可以使用特定缓冲区类的 `allocate()`\
  \ 工厂方法来创建缓冲区，如下所示：\n\n```\n// 创建一个容量为 8 的字节缓冲区\nByteBuffer bb = ByteBuffer.allocate(8);\n\
  // 将 8 赋值给 capacity 变量\nint capacity = bb.capacity();\n// 创建一个容量为 1024 的字符缓冲区\n\
  CharBuffer cb = CharBuffer.allocate(1024);\n```\n\n字节缓冲区在 NIO 中得到了特殊处理。它有一个额外的方法，名为\
  \ `allocateDirect()`，该方法创建一个字节缓冲区，其内存从操作系统内存中分配，而不是从 JVM 堆中分配。这避免了在 I/O 操作期间将内容复制到中间缓冲区。直接缓冲区有额外的创建成本。然而，它在\
  \ I/O 操作期间速度更快。当缓冲区生命周期较长时，你应该使用直接字节缓冲区。你可以使用 `ByteBuffer` 类的 `isDirect()` 方法来检查缓冲区是直接的还是非直接的。\n\
  \n```\n// 创建一个容量为 512 字节的直接字节缓冲区\nByteBuffer bbd = ByteBuffer.allocateDirect(512);\n\
  ```\n\n创建缓冲区的另一种方法是使用缓冲区的静态 `wrap()` 方法来包装一个数组：\n\n```\n// 创建一个字节数组\nbyte[] byteArray\
  \ = new byte[512];\n// 通过包装 byteArray 创建一个字节缓冲区\nByteBuffer bb = ByteBuffer.wrap(byteArray);\n\
  ```\n\n你可以使用相同的技术来创建用于存储其他基本类型值的缓冲区。我将在本节后面讨论创建缓冲区的其他方法。\n\n当你创建缓冲区时，缓冲区的所有元素都被初始化为零值。缓冲区的每个元素都有一个索引。第一个元素的索引为\
  \ 0，最后一个元素的索引为 `capacity – 1`。\n\n位置和限制是缓冲区的两个属性。当创建缓冲区时，其位置设置为 0，其限制等于其容量。缓冲区的位置是下一个要读取或写入的元素的索引。缓冲区的限制是第一个不应被读取或写入的元素的索引。因此，读取/写入操作从缓冲区的位置（包含）开始，并可能持续到缓冲区的限制（不包含）。\n\
  \n图 9-2 显示了刚创建后容量为 8 的缓冲区的状态。其所有元素的值都为 0。其位置设置为 0。其限制设置为 8，等于其容量。在图中，`P` 和 `L` 分别表示缓冲区的位置和限制。请注意，该图显示了索引\
  \ 8（超出了缓冲区的范围），以显示限制的值。\n\n![A323070_2_En_9_Fig2_HTML.gif](img/A323070_2_En_9_Fig2_HTML.gif)\n\
  \n图 9-2.\n创建后容量为 8 的缓冲区\n\n你可以使用其重载的 `position()` 方法来获取/设置缓冲区的位置。`position()` 方法返回缓冲区位置的当前值。`position(int\
  \ newPosition)` 方法将缓冲区的位置设置为指定的 `newPosition` 值，并返回缓冲区的引用。\n\n\n\n你可以通过重载的 `limit()`\
  \ 方法来获取/设置缓冲区的限制。`limit()` 方法返回缓冲区限制的当前值。`limit(int newLimit)` 方法将缓冲区的限制设置为指定的 `newLimit`\
  \ 值，并返回该缓冲区的引用。\n\n你可以使用 `mark()` 方法来标记缓冲区中的一个位置。当你调用 `mark()` 方法时，缓冲区会将其当前位置的当前值存储为标记值。你可以通过\
  \ `reset()` 方法将缓冲区的位置设置回之前标记的值。缓冲区在创建时，其标记是未定义的。你只能在标记已定义的情况下对缓冲区调用 `reset()` 方法。否则，`reset()`\
  \ 方法会抛出 `InvalidMarkException` 异常。\n\n在缓冲区的生命周期内，必须满足以下不变式：\n\n```\n0 <= mark <=\
  \ position <= limit <= capacity\n```\n\n由于缓冲区的容量从不改变，并且标记仅通过 `mark()` 和 `reset()`\
  \ 方法有限使用，我将只讨论缓冲区的位置和限制属性。更改位置和限制值会带来一些间接后果。由于标记不能大于位置，如果位置被设置为小于当前标记值，则标记会被丢弃。如果你将限制设置为小于位置，则位置会自动设置为等于限制值。\n\
  \n到目前为止，你已经阅读了大量关于缓冲区的内容。是时候看看缓冲区的实际应用了。清单 9-2 包含了创建一个新缓冲区并显示其四个属性的代码。\n\n```\n\
  // BufferInfo.java\npackage com.jdojo.nio;\nimport java.nio.ByteBuffer;\nimport\
  \ java.nio.InvalidMarkException;\npublic class BufferInfo {\npublic static void\
  \ main(String[] args) {\n// 创建一个容量为 8 的字节缓冲区\nByteBuffer bb = ByteBuffer.allocate(8);\n\
  System.out.println(\"容量: \" + bb.capacity());\nSystem.out.println(\"限制: \" + bb.limit());\n\
  System.out.println(\"位置: \" + bb.position());\n// 新缓冲区的标记未设置。如果标记未设置，调用 reset()\
  \ 方法会抛出运行时异常。如果标记已设置，位置会被设置为标记值。\ntry {\nbb.reset();\nSystem.out.println(\"标记: \"\
  \ + bb.position());\n} catch (InvalidMarkException e) {\nSystem.out.println(\"标记未设置\"\
  );\n}\n}\n}\n容量: 8\n限制: 8\n位置: 0\n标记未设置\n清单 9-2.\n新缓冲区的标记、位置、限制和容量\n```\n\n从缓冲区读取数据和向缓冲区写入数据\n\
  \n从缓冲区读取数据有两种方式：\n\n*   使用绝对位置\n*   使用相对位置\n\n在绝对位置读取中，你指定要从缓冲区读取数据的索引。绝对位置读取后，缓冲区的位置不变。\n\
  \n在相对位置读取中，你指定要读取多少个数据元素。缓冲区的当前位置决定了将读取哪些数据元素。在相对位置读取中，读取从缓冲区的当前位置开始，每读取一个数据元素，位置就增加一。\n\
  \n`get()` 方法用于从缓冲区读取数据。`get()` 方法是重载的。它有四个版本。在以下方法中，只需将数据类型 `byte` 替换为其他原始类型缓冲区的相应数据类型即可：\n\
  \n*   `get(int index)`：返回给定索引处的数据。例如，`get(2)` 将返回缓冲区中索引 2 处的数据。这是一种从缓冲区读取数据的绝对方式，因为你提供了要读取数据的元素的绝对位置。此方法不会改变缓冲区的当前位置。\n\
  \n*   `get()`：返回缓冲区当前位置的数据，并将位置增加 1。例如，如果位置设置为索引 2，调用 `get()` 方法将返回缓冲区中索引 2 处的值，并将位置设置为\
  \ 3。这是一种从缓冲区读取数据的相对方式，因为你是相对于当前位置读取数据的。\n\n*   `get(byte[] destination, int offset,\
  \ int length)`：批量从缓冲区读取数据。它从缓冲区的当前位置读取 `length` 个字节，并将它们放入指定的 `destination` 数组中，从指定的\
  \ `offset` 开始。如果无法从缓冲区读取 `length` 个字节，则会抛出 `BufferUnderflowException` 异常。如果没有异常，当前位置会增加\
  \ `length`。这是一种从缓冲区的相对读取。\n\n*   `get(byte[] destination)`：通过从缓冲区的当前位置读取数据来填充指定的\
  \ `destination` 数组，每读取一个数据元素，当前位置就增加一。如果没有足够的数据来填充数组，则会抛出 `BufferUnderflowException`\
  \ 异常。这是一种从缓冲区读取数据的相对方式。此方法调用等同于调用 `get(byte[] destination, 0, destination.length)`。\n\
  \n向缓冲区写入数据是从缓冲区读取数据的逆操作。`put()` 方法用于向缓冲区写入数据。`put()` 方法有五个版本：一个用于绝对位置写入，四个用于相对位置写入。`put()`\
  \ 方法的绝对版本不影响缓冲区的位置。`put()` 方法的相对版本写入数据，并且每写入一个元素，缓冲区的位置就前进一。不同的缓冲区类有不同的 `put()`\
  \ 方法版本；然而，在所有类型的缓冲区中，有五个版本是通用的。以下是 `ByteBuffer` 的 `put()` 方法的五个版本。当缓冲区为只读时，这些方法会抛出\
  \ `ReadOnlyBufferException` 异常。在以下方法中，只需将数据类型 `byte` 替换为其他原始类型缓冲区的相应数据类型即可。\n\n\
  *   `put(int index, byte b)`：在指定的 `index` 处写入指定的 `b` 数据。调用此方法不会改变缓冲区的当前位置。\n\n*\
  \   `put(byte b)`：这是一个相对 `put()` 方法，它将指定的字节写入缓冲区的当前位置，并将位置增加 1。如果缓冲区中没有足够的空间来容纳指定的字节，则会抛出\
  \ `BufferOverflowException` 异常。\n\n*   `put(byte[] source, int offset, int length)`：从\
  \ `source` 数组中从 `offset` 开始，将 `length` 个字节写入缓冲区，从当前位置开始。缓冲区的位置增加 `length`。如果缓冲区中没有足够的空间来写入所有字节，则会抛出\
  \ `BufferOverflowException` 异常。\n\n*   `put(byte[] source)`：等同于调用 `put(byte[] source,\
  \ 0, source.length)`。\n\n*   `ByteBuffer put(ByteBuffer src)`：从指定的字节缓冲区 `src` 中读取剩余的字节，并将它们写入当前缓冲区。如果目标缓冲区中的剩余空间小于源缓冲区中的剩余字节，则会抛出运行时\
  \ `BufferOverflowException` 异常。\n\n让我们通过一些图片来了解每次读写后缓冲区的状态及其属性。图 9-3 到图 9-6 展示了容量为\
  \ 8 的缓冲区在每次写入后位置是如何前进的。在第八次写入缓冲区后，位置和限制变得相等。如果你尝试第九次写入，将会得到 `BufferOverflowException`\
  \ 异常。请注意，我使用了 `put(byte b)` 方法进行相对写入。\n\n![A323070_2_En_9_Fig6_HTML.gif](img/A323070_2_En_9_Fig6_HTML.gif)\n\
  \n\n\n图 9-6.\n\n调用 `put((byte)52)`、`put((byte)53)`、`put((byte)54)`、`put((byte)55)`、`put((byte)56)`\
  \ 和 `put((byte)57)` 后的缓冲区状态；缓冲区状态为 (position=8, limit=8)\n\n![A323070_2_En_9_Fig5_HTML.gif](img/A323070_2_En_9_Fig5_HTML.gif)\n\
  \n图 9-5.\n\n调用 `put((byte)51)` 后的缓冲区状态；缓冲区状态为 (position=2, limit=8)\n\n![A323070_2_En_9_Fig4_HTML.gif](img/A323070_2_En_9_Fig4_HTML.gif)\n\
  \n图 9-4.\n\n调用 `put((byte)50)` 后的缓冲区状态；缓冲区状态为 (position=1, limit=8)\n\n![A323070_2_En_9_Fig3_HTML.gif](img/A323070_2_En_9_Fig3_HTML.gif)\n\
  \n图 9-3.\n\n创建后容量为 8 的缓冲区状态；缓冲区状态为 (position=0, limit=8)\n\n现在，让我们读取刚刚写入到状态如图 9-6\
  \ 所示的缓冲区中的数据。请注意，该缓冲区的位置为 8，其限制也为 8。如果你调用 `get()` 方法（相对读取）来读取此缓冲区中的数据，将会得到一个 `BufferUnderflowException`。你刚刚用数据填满了缓冲区。然而，当你尝试读取数据时，却得到了一个异常，因为\
  \ `get()` 方法从缓冲区的当前位置返回数据，而在此例中该位置已超出范围。只有当缓冲区的位置在 0 到 7 的范围内时，`get()` 方法才会返回数据。别灰心，让我们尝试使用\
  \ `get(int index)` 方法通过绝对位置来读取数据。如果你调用 `get(0), get(1) ... get(7)`，你会惊讶地发现可以读取所有已写入的数据。清单\
  \ 9-3 演示了这一点。\n\n```\n// BufferReadWrite.java\npackage com.jdojo.nio;\nimport java.nio.ByteBuffer;\n\
  public class BufferReadWrite {\npublic static void main(String[] args) {\n// 创建一个容量为\
  \ 8 的字节缓冲区\nByteBuffer bb = ByteBuffer.allocate(8);\n// 打印缓冲区信息\nSystem.out.println(\"\
  创建后：\");\nprintBufferInfo(bb);\n// 用 50 到 57 填充缓冲区元素\nfor (int i = 50; i < 58; i++)\
  \ {\nbb.put((byte) i);\n}\n// 打印缓冲区信息\nSystem.out.println(\"填充数据后：\");\nprintBufferInfo(bb);\n\
  }\npublic static void printBufferInfo(ByteBuffer bb) {\nint limit = bb.limit();\n\
  System.out.println(\"Position = \" + bb.position() + \", Limit = \" + limit);\n\
  // 使用绝对读取，不影响位置\nSystem.out.print(\"数据：\");\nfor (int i = 0; i < limit; i++) {\n\
  System.out.print(bb.get(i) + \" \");\n}\nSystem.out.println();\n}\n}\n创建后：\nPosition\
  \ = 0, Limit = 8\n数据：0 0 0 0 0 0 0 0\n填充数据后：\nPosition = 8, Limit = 8\n数据：50 51\
  \ 52 53 54 55 56 57\n清单 9-3.\n向缓冲区写入和从缓冲区读取\n```\n\n现在你明白了，使用相对方法和绝对方法进行缓冲区的读写存在巨大差异。两种方法都有一个工作范围。数据必须在工作范围内进行读写。相对方法和绝对方法的工作范围是不同的。\n\
  \n相对读写的工作范围是缓冲区中位置（position）和限制（limit）-1 之间的索引，其中位置小于限制 -1。也就是说，如果缓冲区的位置小于其限制，则可以使用相对的\
  \ `get()` 和 `put()` 方法读写数据。\n\n绝对读写的工作范围是 0 到限制 -1 之间的索引。那么，在完成向缓冲区写入数据后，如何使用相对位置读取来读取缓冲区中的所有数据呢？实现此目的的一种方法是将缓冲区的限制设置为其位置，并将其位置设置为\
  \ 0。以下代码片段展示了这种技术：\n\n```\n// 创建一个容量为 8 的字节缓冲区并填充其元素\nByteBuffer bb = ByteBuffer.allocate(8);\n\
  for(int i = 50; i < 58; i++) {\nbb.put((byte)i);\n}\n// 将限制设置为与位置相同，并将位置设置为 0\n\
  bb.limit(bb.position());\nbb.position(0);\n// 现在 bb 已设置为使用相对 get() 方法读取所有数据\nint\
  \ limit = bb.limit();\nfor(int i = 0; i < limit; i++) {\nbyte b = bb.get(); // 使用相对读取\n\
  System.out.println(b);\n}\n```\n\n`Buffer` 类有一个方法可以实现你在此代码片段中编写的功能。你可以通过使用其 `flip()`\
  \ 方法将缓冲区的限制设置为其位置，并将位置设置为 0。图 9-7 显示了一个容量为 8 的缓冲区在创建后以及在其索引 0 和 1 处的两个元素被写入后的状态。图\
  \ 9-8 显示了调用其 `flip()` 方法后缓冲区的状态。如果定义了标记，`flip()` 方法会丢弃缓冲区的标记。\n\n![A323070_2_En_9_Fig8_HTML.gif](img/A323070_2_En_9_Fig8_HTML.gif)\n\
  \n图 9-8.\n\n在索引 0 和 1 处写入两个元素并调用 flip() 方法后的缓冲区状态\n\n![A323070_2_En_9_Fig7_HTML.gif](img/A323070_2_En_9_Fig7_HTML.gif)\n\
  \n图 9-7.\n\n刚刚在索引 0 和 1 处写入两个元素后的缓冲区状态\n\n在前面的代码片段中，你使用了一个 `for` 循环来读取缓冲区中的数据。`for`\
  \ 循环的索引从 0 运行到限制 -1。然而，有一种更简单的方法可以使用相对读写方法从缓冲区读取/向缓冲区写入数据。缓冲区的 `hasRemaining()`\
  \ 方法返回 `true`，如果可以在缓冲区上使用相对的 `get()` 或 `put()` 方法读取/写入至少一个元素。你还可以通过使用其 `remaining()`\
  \ 方法获取可以使用相对的 `get()` 或 `put()` 方法读取/写入的最大元素数量。清单 9-4 演示了这些方法的使用。\n\n```\n// BufferReadWriteRelativeOnly.java\n\
  package com.jdojo.nio;\nimport java.nio.ByteBuffer;\npublic class BufferReadWriteRelativeOnly\
  \ {\npublic static void main(String[] args) {\n// 创建一个容量为 8 的字节缓冲区\nByteBuffer bb\
  \ = ByteBuffer.allocate(8);\n// 打印缓冲区信息\nSystem.out.println(\"创建后：\");\nprintBufferInfo(bb);\n\
  // 必须调用 flip() 将位置重置为零，因为 printBufferInfo()\n// 方法使用了相对 get() 方法，这会增加位置。\nbb.flip();\n\
  // 用 50 到 57 填充缓冲区元素\nint i = 50;\nwhile (bb.hasRemaining()) {\nbb.put((byte) i++);\n\
  }\n// 再次调用 flip() 将位置重置为零，\n// 因为上面的 put() 调用增加了位置\nbb.flip();\n// 打印缓冲区信息\nSystem.out.println(\"\
  填充数据后：\");\nprintBufferInfo(bb);\n}\npublic static void printBufferInfo(ByteBuffer\
  \ bb) {\nint limit = bb.limit();\nSystem.out.println(\"Position = \" + bb.position()\
  \ + \", Limit = \" + limit);\n// 我们使用相对方法读取数据，因此它会影响\n// 缓冲区的位置\nSystem.out.print(\"\
  数据：\");\nwhile (bb.hasRemaining()) {\nSystem.out.print(bb.get() + \" \");\n}\nSystem.out.println();\n\
  }\n}\n创建后：\nPosition = 0, Limit = 8\n数据：0 0 0 0 0 0 0 0\n填充数据后：\nPosition = 0, Limit\
  \ = 8\n数据：50 51 52 53 54 55 56 57\n清单 9-4.\n在相对读写之间使用缓冲区的 flip() 和 hasRemaining()\
  \ 方法\n```\n\n除了 `flip()` 方法之外，缓冲区还有另外三个方法可以更改其标记、位置和/或限制。它们是 `clear()`、`reset()`\
  \ 和 `rewind()`。\n\n\n\n缓冲区的 `clear()` 方法将位置设为 0，限制设为容量，并丢弃其标记。也就是说，它设置缓冲区的属性，就好像缓冲区刚刚被创建一样。请注意，它不会更改缓冲区中的任何数据。图\
  \ 9-9 和图 9-10 展示了在调用 `clear()` 方法前后，缓冲区的标记、位置和限制。通常，在开始向缓冲区填充新数据之前，你会调用缓冲区的 `clear()`\
  \ 方法。\n\n![A323070_2_En_9_Fig10_HTML.gif](img/A323070_2_En_9_Fig10_HTML.gif)\n\n\
  图 9-10.\n\n调用其 clear() 方法后的缓冲区状态；clear() 方法丢弃了标记\n\n![A323070_2_En_9_Fig9_HTML.gif](img/A323070_2_En_9_Fig9_HTML.gif)\n\
  \n图 9-9.\n\n调用其 clear() 方法前的缓冲区状态\n\n`reset()` 方法将缓冲区的位置设置为其标记。如果未定义标记，则会抛出 `InvalidMarkException`。它不影响缓冲区的限制和数据。通常，调用它是为了从先前标记的位置开始，重新访问（用于重读或重写）缓冲区中直到当前位置的元素。`reset()`\
  \ 方法不会改变缓冲区的标记。图 9-11 和图 9-12 展示了在调用其 `reset()` 方法前后缓冲区的状态。\n\n![A323070_2_En_9_Fig12_HTML.gif](img/A323070_2_En_9_Fig12_HTML.gif)\n\
  \n图 9-12.\n\n调用其 reset() 方法后的缓冲区状态\n\n![A323070_2_En_9_Fig11_HTML.gif](img/A323070_2_En_9_Fig11_HTML.gif)\n\
  \n图 9-11.\n\n调用其 reset() 方法前的缓冲区状态\n\n`rewind()` 方法将缓冲区的位置设为 0 并丢弃其标记。它不影响限制。通常，你会在多次读/写操作之间调用此方法，以便多次使用缓冲区中相同数量的数据元素。图\
  \ 9-13 和图 9-14 展示了在调用其 `rewind()` 方法前后缓冲区的状态。\n\n![A323070_2_En_9_Fig14_HTML.gif](img/A323070_2_En_9_Fig14_HTML.gif)\n\
  \n图 9-14.\n\n调用其 rewind() 方法后的缓冲区状态\n\n![A323070_2_En_9_Fig13_HTML.gif](img/A323070_2_En_9_Fig13_HTML.gif)\n\
  \n图 9-13.\n\n调用其 rewind() 方法前的缓冲区状态\n\n只读缓冲区\n\n缓冲区可以是只读的或可读写的。你只能读取只读缓冲区的内容。任何更改只读缓冲区内容的尝试都会导致\
  \ `ReadOnlyBufferException`。请注意，只读缓冲区的属性（如其位置、限制和标记）可以在读取操作期间更改，但其数据不能更改。\n\n你可能希望从可读写缓冲区获取一个只读缓冲区，这样你就可以将其作为参数传递给某个方法，以确保该方法不会修改缓冲区的内容。你可以通过调用特定缓冲区类的\
  \ `asReadOnlyBuffer()` 方法来获取只读缓冲区。你可以通过调用 `isReadOnly()` 方法来检查缓冲区是否为只读，如下所示：\n\n\
  ```\n// 创建一个默认可读写的缓冲区\nByteBuffer bb = ByteBuffer.allocate(1024);\nboolean readOnly\
  \ = bb.isReadOnly(); // 将 false 赋值给 readOnly\n// 获取一个只读缓冲区\nByteBuffer bbReadOnly\
  \ = bb.asReadOnlyBuffer();\nreadOnly = bbReadOnly.isReadOnly(); // 将 true 赋值给 readOnly\n\
  ```\n\n由 `asReadOnlyBuffer()` 方法返回的只读缓冲区是同一缓冲区的不同视图。也就是说，新的只读缓冲区与其原始缓冲区共享数据。对原始缓冲区内容的任何修改都会反映在只读缓冲区中。只读缓冲区在创建时与其原始缓冲区具有相同的位置、标记、限制和容量值，之后会独立维护这些值。\n\
  \n缓冲区的不同视图\n\n你可以获得缓冲区的不同视图。缓冲区的视图与原始缓冲区共享数据，并维护自己的位置、标记和限制。我在上一节讨论了获取缓冲区的只读视图，该视图不允许修改其内容。你也可以复制一个缓冲区，在这种情况下，它们共享内容，但独立维护标记、位置和限制。使用缓冲区的\
  \ `duplicate()` 方法获取缓冲区的副本，如下所示：\n\n```\n// 创建一个缓冲区\nByteBuffer bb = ByteBuffer.allocate(1024);\n\
  // 创建缓冲区的副本视图\nByteBuffer bbDuplicate = bb.duplicate();\n```\n\n你还可以创建缓冲区的切片视图。也就是说，你可以创建一个仅反映原始缓冲区部分内容的缓冲区视图。你使用缓冲区的\
  \ `slice()` 方法来创建其切片视图，如下所示：\n\n```\n// 创建一个缓冲区\nByteBuffer bb = ByteBuffer.allocate(8);\n\
  // 在获取切片之前设置位置和限制\nbb.position(3);\nbb.limit(6);\n// bbSlice 缓冲区将共享 bb 中索引 3 到 5\
  \ 的数据。\n// bbSlice 的位置将设为 0，其限制设为 3。\nByteBuffer bbSlice = bb.slice();\n```\n\n\
  提示\n\nJDK9 向 `Buffer` 类（其他缓冲区类型的超类）添加了 `duplicate()` 和 `slice()` 方法。在 JDK8 中，这些方法位于\
  \ `Buffer` 类的子类中。这些方法在 `Buffer` 类中的返回类型是 `Buffer`，而子类会重写这些方法，其返回类型是特定的子类类型。例如，这些方法在\
  \ `ByteBuffer` 类中的返回类型是 `ByteBuffer`。\n\n你还可以为不同的原始数据类型获取字节缓冲区的视图。例如，你可以获取字节缓冲区的字符视图、浮点视图等。`ByteBuffer`\
  \ 类包含诸如 `asCharBuffer()`、`asLongBuffer()`、`asFloatBuffer()` 等方法，用于获取其他原始数据类型的视图。\n\
  \n```\n// 创建一个字节缓冲区\nByteBuffer bb = ByteBuffer.allocate(8);\n// 创建字节缓冲区的字符视图\n\
  CharBuffer cb = bb.asCharBuffer();\n// 创建字节缓冲区的浮点视图\nFloatBuffer fb = bb.asFloatBuffer();\n\
  ```\n\n字符集\n\n一个字符并不总是存储在一个字节中。存储一个字符所用的字节数取决于编码字符集和字符编码方案。编码字符集是一组抽象字符与一组整数之间的映射。字符编码方案是编码字符集与一组八位字节序列之间的映射。有关字符集和字符编码的更多详细信息，请参阅本系列第一册的附录\
  \ A。\n\n`java.nio.charset.Charset` 类的一个实例表示一个字符集和一种字符编码方案。一些字符集名称的示例有 US-ASCII、ISO-8859-1、UTF-8、UTF-16BE、UTF-16LE\
  \ 和 UTF-16。\n\n根据编码方案将字符转换为字节序列的过程称为字符编码。根据编码方案将字节序列转换为字符的过程称为解码。\n\n在 NIO 中，你可以使用编码方案将\
  \ Unicode 字符转换为字节序列，反之亦然。`java.nio.charset` 包提供了用于将 `CharBuffer` 编码/解码为 `ByteBuffer`\
  \ 以及反向操作的类。`Charset` 类的对象表示编码方案。`CharsetEncoder` 类执行编码。`CharsetDecoder` 类执行解码。你可以通过将字符集的名称作为参数传递给\
  \ `Charset` 类的 `forName()` 方法来获取其对象。\n\n\n\n`String` 和 `InputStreamReader` 类支持字符编码和解码。当你使用\
  \ `str.getBytes(\"UTF-8\")` 时，你正在将字符串对象 `str` 中存储的 Unicode 字符，通过 UTF-8 编码方案编码为字节序列。当你使用\
  \ `String` 类的构造函数 `String(byte[] bytes, Charset charset)` 创建 `String` 对象时，你正在将 `bytes`\
  \ 数组中的字节序列从指定的字符集解码为 Unicode 字符集。同样，当你使用字符集创建 `InputStreamReader` 类的对象时，你也在将输入流中的字节序列解码为\
  \ Unicode 字符。\n\n对于简单的编码和解码任务，你可以使用 `Charset` 类的 `encode()` 和 `decode()` 方法。让我们将字符串\
  \ `Hello` 中存储在字符缓冲区中的字符序列进行编码，并使用 UTF-8 编码方案进行解码。实现此功能的代码片段如下：\n\n```\n// 获取 UTF-8\
  \ 编码的 Charset 对象\nCharset cs = Charset.forName(\"UTF-8\");\n// 待编码的字符缓冲区\nCharBuffer\
  \ cb = CharBuffer.wrap(\"Hello\");\n// 将字符缓冲区编码为字节缓冲区\nByteBuffer encodedData =\
  \ cs.encode(cb);\n// 将字节缓冲区解码回字符缓冲区\nCharBuffer decodedData = cs.decode(encodedData);\n\
  ```\n\n`Charset` 类的 `encode()` 和 `decode()` 方法易于使用。然而，它们并非在所有情况下都能使用。它们要求你预先知道输入内容。有时你无法预先知道要编码/解码的数据。\n\
  \n`CharsetEncoder` 和 `CharsetDecoder` 类在编码和解码过程中提供了更强大的功能。它们接受要编码或解码的输入块。`Charset`\
  \ 类的 `encode()` 和 `decode()` 方法会返回编码和解码后的缓冲区。然而，`CharsetEncoder` 和 `CharsetDecoder`\
  \ 允许你使用自己的缓冲区来处理输入和输出数据。这种强大功能也带来了一些复杂性！如果你想要更强大的编码/解码功能，你需要使用以下五个类，而不仅仅是 `Charset`\
  \ 类：\n\n*   `Charset`\n\n*   `CharsetEncoder`\n\n*   `CharsetDecoder`\n\n*   `CoderResult`\n\
  \n*   `CodingErrorAction`\n\n你仍然需要使用 `Charset` 类来表示字符集。`CharsetEncoder` 对象允许你通过其\
  \ `encode()` 方法将字符编码为字节序列。字节序列则通过 `CharsetDecoder` 对象的 `decode()` 方法进行解码。`Charset`\
  \ 对象的 `newEncoder()` 方法返回 `CharsetEncoder` 类的一个实例，而其 `newDecoder()` 方法则返回 `CharsetDecoder`\
  \ 类的一个实例。\n\n```\n// 从 Charset 对象获取编码器和解码器对象\nCharset cs = Charset.forName(\"UTF-8\"\
  );\nCharsetEncoder encoder = cs.newEncoder();\nCharsetDecoder decoder = cs.newDecoder();\n\
  ```\n\n编码和解码需要两个缓冲区：一个输入缓冲区和一个输出缓冲区。字符缓冲区为编码过程提供输入字符，并从解码过程接收解码后的字符。编码过程将编码结果写入字节缓冲区，解码过程则从字节缓冲区读取其输入。以下代码片段说明了使用编码器和解码器的几个步骤：\n\
  \n```\n// 对 inputChars 缓冲区中的字符进行编码。\n// outputBytes 缓冲区接收编码后的字节。\nCharBuffer inputChars\
  \ = /* 获取待编码的输入字符 */;\nByteBuffer outputBytes = /* 获取用于编码数据的输出缓冲区 */;\nboolean eoi\
  \ = true; // 表示输入结束\nCoderResult result = encoder.encode(inputChars, outputBytes,\
  \ eoi);\n// 对 inputBytes 缓冲区中的字节进行解码。\n// outputChars 缓冲区接收解码后的字符。\nByteBuffer inputBytes\
  \ = /* 获取待解码的输入字节 */;\nCharBuffer outputChars = /* 获取用于解码字符的输出缓冲区 */;\nboolean eoi\
  \ = true; // 表示输入结束\nCoderResult result = decoder.decode(inputBytes, outputChars,\
  \ eoi);\n```\n\n考虑这样一种情况：使用一个 4 字节的缓冲区对存储在字符缓冲区中的 16 个字符进行编码。编码过程无法在一次 `encode()`\
  \ 方法调用中编码所有字符。必须有一种方法能够重复读取所有编码后的输出。同样的道理也适用于解码过程。你可以将输入分块传递给编码/解码过程，并分块接收它们的输出。编码器的\
  \ `encode()` 方法和解码器的 `decode()` 方法返回一个 `CoderResult` 类的对象，该对象包含编码/解码过程的状态。该对象可以指示两个重要的结果：\n\
  \n*   下溢\n\n*   上溢\n\n**下溢**表示该过程需要更多输入。你可以通过使用 `CoderResult` 对象的 `isUnderflow()`\
  \ 方法来测试此条件。你也可以通过将 `encode()` 或 `decode()` 方法的返回值与 `CoderResult.UNDERFLOW` 对象进行比较来测试此条件，如下所示：\n\
  \n```\nCoderResult result = encoder.encode(input, output, eoi);\nif (result == CoderResult.UNDERFLOW)\
  \ {\n// 提供更多输入\n}\n```\n\n**上溢**表示该过程产生的输出超出了输出缓冲区的容量。你需要清空输出缓冲区，并再次调用 `encode()/decode()`\
  \ 方法以获取更多输出。你可以通过使用 `CoderResult` 对象的 `isOverflow()` 方法来测试此条件。你也可以通过将 `encode()`\
  \ 或 `decode()` 方法的返回值与 `CoderResult.OVERFLOW` 对象进行比较来测试此条件，如下所示：\n\n```\nCoderResult\
  \ result = encoder.encode(input, output, eoi);\nif (result == CoderResult.OVERFLOW)\
  \ {\n// 清空输出缓冲区，为更多输出腾出空间\n}\n```\n\n提示\n\n除了报告缓冲区下溢和上溢之外，`CoderResult` 对象还能够报告格式错误的输入错误和不可映射字符错误。你还可以通过使用它们的\
  \ `onMalformedInput()` 和 `onUnmappableCharacter()` 方法，自定义编码/解码引擎针对这些错误情况的默认操作。\n\
  \n`encode()/decode()` 方法的最后一个参数是一个 `boolean` 值，用于指示输入的结束。当你传递最后一块数据进行编码或解码时，应该为输入结束参数传递\
  \ `true`。\n\n在传递最后一块数据之后，你需要调用 `flush()` 方法来刷新引擎的内部缓冲区。它返回一个 `CoderResult` 对象，该对象可以指示下溢或上溢。如果发生上溢，你需要清空输出缓冲区并再次调用\
  \ `flush()` 方法。你需要持续调用 `flush()` 方法，直到其返回值指示下溢为止。`flush()` 方法调用应放在一个循环中，这样你就能获取所有编码/解码后的数据。\n\
  \n\n\n`DataSourceSink`类\n在清单 9-5 中扮演着\n数据源和数据汇的角色。我创建这个类仅用于演示\n目的；在实际应用中你不需要这样的类。\n\
  它通过字符缓冲区提供威廉·华兹华斯诗歌《露西》中的一个诗节。\n`getCharData()`方法\n填充字符缓冲区。当没有更多字符可提供时，它返回-1。\n\
  你在编码过程中使用此方法。\n`storeByteData()`方法用于\n在编码过程中累积编码后的字节。\n`getByteData()`方法用于\n在解码过程中，以块的形式提供你在编码过程中累积的编码字节。\n\
  \n```\n// DataSourceSink.java\npackage com.jdojo.nio;\nimport java.nio.ByteBuffer;\n\
  import java.nio.CharBuffer;\npublic class DataSourceSink {\nprivate CharBuffer cBuffer\
  \ = null;\nprivate ByteBuffer bBuffer = null;\npublic DataSourceSink() {\nString\
  \ text = this.getText();\ncBuffer = CharBuffer.wrap(text);\n}\npublic int getByteData(ByteBuffer\
  \ buffer) {\nif (!bBuffer.hasRemaining()) {\nreturn -1;\n}\nint count = 0;\nwhile\
  \ (bBuffer.hasRemaining() && buffer.hasRemaining()) {\nbuffer.put(bBuffer.get());\n\
  count++;\n}\nreturn count;\n}\npublic int getCharData(CharBuffer buffer) {\nif (!cBuffer.hasRemaining())\
  \ {\nreturn -1;\n}\nint count = 0;\nwhile (cBuffer.hasRemaining() && buffer.hasRemaining())\
  \ {\nbuffer.put(cBuffer.get());\ncount++;\n}\nreturn count;\n}\npublic void storeByteData(ByteBuffer\
  \ byteData) {\nif (this.bBuffer == null) {\nint total = byteData.remaining();\n\
  this.bBuffer = ByteBuffer.allocate(total);\nwhile (byteData.hasRemaining()) {\n\
  this.bBuffer.put(byteData.get());\n}\nthis.bBuffer.flip();\n} else {\nthis.bBuffer\
  \ = this.appendContent(byteData);\n}\n}\nprivate ByteBuffer appendContent(ByteBuffer\
  \ content) {\n// 创建一个新缓冲区以容纳新数据\nint count = bBuffer.limit() + content.remaining();\n\
  ByteBuffer newBuffer = ByteBuffer.allocate(count);\n// 设置包含一些数据的 bBuffer 的位置\nbBuffer.clear();\n\
  newBuffer.put(bBuffer);\nnewBuffer.put(content);\nbBuffer.clear();\nnewBuffer.clear();\n\
  return newBuffer;\n}\npublic final String getText() {\nString newLine = System.getProperty(\"\
  line.separator\");\nStringBuilder sb = new StringBuilder();\nsb.append(\"My horse\
  \ moved on; hoof after hoof\");\nsb.append(newLine);\nsb.append(\"He raised, and\
  \ never stopped:\");\nsb.append(newLine);\nsb.append(\"When down behind the cottage\
  \ roof,\");\nsb.append(newLine);\nsb.append(\"At once, the bright moon dropped.\"\
  );\nreturn sb.toString();\n}\n}\n清单 9-5.\n一个提供字符数据并存储和提供字节数据的数据源与数据汇\n```\n\n清单\
  \ 9-6 演示了\n如何使用字符集编码器/解码器。`CharEncoderDecoder`\n类的`encode()`和`decode()`方法\n包含了编码和解码逻辑。此示例将解码后的字符显示在标准输出上。\n\
  \n```\n// CharEncoderDecoder.java\npackage com.jdojo.nio;\nimport java.nio.ByteBuffer;\n\
  import java.nio.CharBuffer;\nimport java.nio.charset.Charset;\nimport java.nio.charset.CharsetDecoder;\n\
  import java.nio.charset.CharsetEncoder;\nimport java.nio.charset.CoderResult;\n\
  public class CharEncoderDecoder {\npublic static void main(String[] args) throws\
  \ Exception {\nDataSourceSink dss = new DataSourceSink();\n// 显示将要编码的文本\nSystem.out.println(\"\
  原始文本:\");\nSystem.out.println(dss.getText());\nSystem.out.println(\"--------------------\"\
  );\n// 使用 UTF-8 编码对文本进行编码。我们将在编码过程中\n// 把编码后的字节存储在 dss 对象中\nencode(dss, \"UTF-8\"\
  );\n// 使用 UTF-8 编码解码存储在 dss 对象中的字节\nSystem.out.println(\"解码后的文本:\");\ndecode(dss,\
  \ \"UTF-8\");\n}\npublic static void encode(DataSourceSink ds, String charset) {\n\
  CharsetEncoder encoder = Charset.forName(charset).newEncoder();\nCharBuffer input\
  \ = CharBuffer.allocate(8);\nByteBuffer output = ByteBuffer.allocate(8);\n// 初始化循环变量\n\
  boolean endOfInput = false;\nCoderResult result = CoderResult.UNDERFLOW;\nwhile\
  \ (!endOfInput) {\nif (result == CoderResult.UNDERFLOW) {\ninput.clear();\nendOfInput\
  \ = (ds.getCharData(input) == -1);\ninput.flip();\n}\n// 编码输入字符\nresult = encoder.encode(input,\
  \ output, endOfInput);\n// 在以下情况排空输出：\n// 1. 发生溢出。或者，\n// 2. 发生下溢且输入结束\nif (result\
  \ == CoderResult.OVERFLOW\n|| (endOfInput && result == CoderResult.UNDERFLOW)) {\n\
  output.flip();\nds.storeByteData(output);\noutput.clear();\n}\n}\n// 刷新编码器的内部状态\n\
  while (true) {\noutput.clear();\nresult = encoder.flush(output);\noutput.flip();\n\
  if (output.hasRemaining()) {\nds.storeByteData(output);\noutput.clear();\n}\n//\
  \ 下溢意味着 flush() 方法已刷新所有内容\nif (result == CoderResult.UNDERFLOW) {\nbreak;\n}\n}\n\
  }\npublic static void decode(DataSourceSink dss, String charset) {\nCharsetDecoder\
  \ decoder = Charset.forName(charset).newDecoder();\nByteBuffer input = ByteBuffer.allocate(8);\n\
  CharBuffer output = CharBuffer.allocate(8);\nboolean endOfInput = false;\nCoderResult\
  \ result = CoderResult.UNDERFLOW;\nwhile (!endOfInput) {\nif (result == CoderResult.UNDERFLOW)\
  \ {\ninput.clear();\nendOfInput = (dss.getByteData(input) == -1);\ninput.flip();\n\
  }\n// 解码输入字节\nresult = decoder.decode(input, output, endOfInput);\n// 在以下情况排空输出：\n\
  // 1. 发生溢出。或者，\n// 2. 发生下溢且输入结束\nif (result == CoderResult.OVERFLOW\n|| (endOfInput\
  \ && result == CoderResult.UNDERFLOW)) {\noutput.flip();\nwhile (output.hasRemaining())\
  \ {\nSystem.out.print(output.get());\n}\noutput.clear();\n}\n}\n// 刷新解码器的内部状态\n\
  while (true) {\noutput.clear();\nresult = decoder.flush(output);\noutput.flip();\n\
  while (output.hasRemaining()) {\nSystem.out.print(output.get());\n}\nif (result\
  \ == CoderResult.UNDERFLOW) {\nbreak;\n}\n}\n}\n}\n原始文本:\nMy horse moved on; hoof\
  \ after hoof\nHe raised, and never stopped:\nWhen down behind the cottage roof,\n\
  At once, the bright moon dropped.\n\n解码后的文本:\nMy horse moved on; hoof after hoof\n\
  He raised, and never stopped:\nWhen down behind the cottage roof,\nAt once, the\
  \ bright moon dropped.\n清单 9-6.\n使用 DataSourceSink 作为数据提供者/消费者进行编码/解码的字符集编码器和解码器\n\
  ```\n\n你可以通过`Charset`类的静态方法`availableCharsets()`获取 JVM 支持的所有可用字符集列表，该方法返回一个`SortedMap<String,Charset>`，其键是字符集名称，值是`Charset`对象。\n\
  \n提示\n\n你可以通过使用`java.nio.charset.spi`包中的`CharsetProvider`类创建自己的字符编码器/解码器。你需要查阅`java.nio.charset`和`java.nio.charset.spi`包以了解如何创建和安装自己的字符集的详细信息。本书不涵盖如何创建和安装自定义字符集。\n\
  \n\n\n清单 9-7 演示了如何列出 JVM 支持的所有字符集。此处仅显示部分输出。你得到的输出可能有所不同。\n\n```\n// AvailableCharsets.java\n\
  package com.jdojo.nio;\nimport java.util.Map;\nimport java.nio.charset.Charset;\n\
  import java.util.Set;\npublic class AvailableCharsets {\npublic static void main(String[]\
  \ args) {\nMap map = Charset.availableCharsets();\nSet keys = map.keySet();\nSystem.out.println(\"\
  Available Character Set Count: \" + keys.size());\nfor(String charsetName : keys)\
  \ {\nSystem.out.println(charsetName);\n}\n}\n}\nAvailable Character Set Count: 170\n\
  Big5\nISO-8859-1\nUS-ASCII\nUTF-16\nUTF-16BE\nUTF-16LE\nUTF-32\nUTF-32BE\nUTF-32LE\n\
  UTF-8\nwindows-1250\nx-iso-8859-11\n...\n清单 9-7.\nJVM 支持的可用字符集列表\n```\n\n通道\n\n\
  通道是数据源/数据接收器与 Java 程序之间用于执行某些 I/O 操作的开放连接。`Channel` 接口位于 `java.nio.channels` 包中。它被用作在\
  \ Java 中实现通道的基础。该接口仅声明了两个方法：`close()` 和 `isOpen()`。当创建一个通道时，它是打开的，其 `isOpen()` 方法返回\
  \ `true`。一旦你使用完通道，应调用其 `close()` 方法将其关闭。此时，`isOpen()` 返回 `false`。图 9-15 描绘了 `Channel`\
  \ 接口的类图。\n\n![A323070_2_En_9_Fig15_HTML.jpg](img/A323070_2_En_9_Fig15_HTML.jpg)\n\
  \n图 9-15.\n\n通道接口的类图\n\nJava 程序通过字节缓冲区与通道进行 I/O 操作交互。也就是说，即使你有多种不同类型的缓冲区，也需要先将它们转换为字节缓冲区，然后才能传递给通道进行数据读取/写入。\n\
  \n`ReadableByteChannel` 用于通过其 `read()` 方法将数据从数据源读取到字节缓冲区中。`WritableByteChannel`\
  \ 用于通过其 `write()` 方法将数据从字节缓冲区写入到数据接收器。`ByteChannel` 既能读取也能写入字节数据。\n\n`ScatteringByteChannel`\
  \ 将数据从数据源读取到多个字节缓冲区中。它对于从已知文件格式或类似数据源读取数据非常有用，这类数据源的数据格式通常是固定长度的头部后跟可变长度的主体。例如，假设一个文件有一个\
  \ 256 字节的固定长度头部和一个可变长度主体。`ScatteringByteChannel` 类的对象用于使用两个字节缓冲区从这种文件中读取数据。第一个字节缓冲区的容量为\
  \ 256。第二个缓冲区的大小由你选择。当你将这两个缓冲区传递给此通道时，256 字节的固定长度头部将被读入第一个缓冲区。第二个缓冲区将包含文件数据，你可能需要多次使用第二个缓冲区来读取文件中的其余字节。使用此通道的优点是将固定长度的头部数据与其他数据分离开。\n\
  \n`GatheringByteChannel` 执行的操作与 `ScatteringByteChannel` 正好相反。它将数据从多个字节缓冲区写入到数据接收器。它用于以某种格式写入数据，该格式由一些固定长度的头部后跟一个可变长度主体组成。\n\
  \n`InterruptibleChannel` 通道可以被异步关闭。如果一个线程在此通道上的 I/O 操作上被阻塞，另一个线程可以调用其 `close()`\
  \ 方法将其关闭。被阻塞的线程将收到一个 `AsynchronousCloseException`。如果一个线程在此通道上的 I/O 操作上被阻塞，另一个线程可以调用被阻塞线程的\
  \ `interrupt()` 方法。此通道将被关闭，并且被阻塞的线程会收到一个 `ClosedByInterruptException` 异常。\n\n通常，你不会在程序中直接处理这些通道接口。你处理的是实现了一个或多个这些接口的具体通道类。与\
  \ I/O 流不同，你不会直接创建通道。而是通过调用某个方法间接获得它。要获取数据源和数据接收器的通道，你需要创建一个 `InputStream` 和 `OutputStream`\
  \ 对象——使用 `java.io` 包中的类以旧的 I/O 方式工作。`java.nio.channels` 包中的 `Channels` 类是一个工具类，它有许多静态方法用于将流转换为通道，反之亦然。`Channels`\
  \ 类还提供了将读取器/写入器转换为通道以及反向转换的方法。例如，如果你有一个名为 `myInputStream` 的输入流对象，你可以按如下方式获取一个 `ReadableByteChannel`：\n\
  \n```\nReadableByteChannel rbc = Channels.newChannel(myInputStream);\n```\n\n如果你有一个名为\
  \ `rbc` 的 `ReadableByteChannel`，你可以按如下方式获取底层的 `InputStream` 对象：\n\n```\n// 获取 ReadableByteChannel\
  \ 的 InputStream\nInputStream myInputStream = Channels.newInputStream(rbc);\n```\n\
  \n`FileInputStream` 和 `FileOutputStream` 类包含处理通道的方法。它们有一个名为 `getChannel()` 的方法，该方法返回一个\
  \ `FileChannel` 对象。`FileChannel` 用于向文件读取和写入数据。从 `FileInputStream` 获取的 `FileChannel`\
  \ 以只读模式打开。从 `FileOutputStream` 对象获取的 `FileChannel` 以只写模式打开。如果你从 `RandomAccessFile`\
  \ 获取 `FileChannel`，则根据你创建该 `RandomAccessFile` 对象的方式，它以只读、只写或读写模式打开。以下代码片段为不同类型的文件流获取\
  \ `FileChannel` 对象：\n\n```\nFileInputStream fis = new FileInputStream(\"luci1.txt\"\
  );\nFileChannel fcReadOnly = fis.getChannel(); // 一个只读通道\nFileOutputStream fos =\
  \ new FileOutputStream(\"luci1.txt\");\nFileChannel fcWriteOnly = fos.getChannel();\
  \ // 一个只写通道\n// 以只读模式打开文件\nRandomAccessFile raf1 = new RandomAccessFile(\"luci1.txt\"\
  , \"r\");\nFileChannel rafReadOnly = raf1.getChannel(); // 一个只读通道\n// 以读写模式打开文件\n\
  RandomAccessFile raf2 = new RandomAccessFile(\"luci1.txt\", \"rw\");\nFileChannel\
  \ rafReadWrite = raf2.getChannel(); // 一个读写通道\n```\n\n提示\n\n你也可以使用 `FileChannel.open()`\
  \ 静态方法获取 `FileChannel`。这避免了为了创建 `FileChannel` 而创建输入/输出流的需要。新的 `open()` 方法使用一个 `Path`\
  \ 对象，它是 NIO 2 的一部分。有关使用 `Path` 对象的更多详细信息，请参阅关于 NIO 2 的第 9 章。\n\n读取/写入文件\n\n我已经介绍了缓冲区和通道的基本概念。`FileChannel`\
  \ 像缓冲区一样维护一个位置。`FileChannel` 的 `read()` 和 `write()` 方法有两种变体：相对位置读取/写入和绝对位置读取/写入。相对和绝对位置读取/写入的含义与缓冲区读取/写入上下文中的含义相同。当你打开一个\
  \ `FileChannel` 时，其位置设置为 0，即文件的开头。当你使用相对 `read()` 方法从 `FileChannel` 读取时，其位置会递增已读取的字节数。从\
  \ `FileChannel` 进行绝对位置读取不会影响其位置。你可以使用其 `position()` 方法获取 `FileChannel` 当前位置的值。你可以使用其\
  \ `position(int newPosition)` 方法将其位置设置为新位置。你需要遵循几个简单的步骤来使用 NIO 从文件读取数据和向文件写入数据。\n\
  \n使用缓冲区和通道从文件读取数据的步骤如下：\n\n1.  创建一个 `FileInputStream` 类的对象。\n2.  使用上一步中创建的 `FileInputStream`\
  \ 对象的 `getChannel()` 方法获取一个 `FileChannel` 对象。\n\n\n\n3.  创建一个 `ByteBuffer` 对象，用于从文件中读取数据。\n\
  \n4.  通过传递一个 `ByteBuffer` 对象，调用 `FileChannel` 对象的 `read()` 方法。在传递 `ByteBuffer` 之前，请确保缓冲区的\
  \ position 和 limit 已正确设置。一个简单的经验法则是：在将 `ByteBuffer` 传递给通道以读取数据之前，始终调用其 `clear()`\
  \ 方法。通道的 `read()` 方法返回读取到缓冲区中的字节数。\n\n5.  调用 `ByteBuffer` 的 `flip()` 方法，以便你可以从缓冲区中读取数据到程序中。上一步会改变缓冲区的位置，因为通道会将数据读入其中。如果你读取的字节代表字符，则可能需要使用\
  \ `CharsetDecoder` 对象将 `ByteBuffer` 解码为字符缓冲区。\n\n6.  从 `ByteBuffer` 中读取数据到你的程序中。\n\
  \n7.  重复从 `FileChannel` 读取数据到 `ByteBuffer` 的过程，即调用其 `read()` 方法，直到 `read()` 方法返回\
  \ 0 或 –1。\n\n8.  使用其 `close()` 方法关闭通道。\n\n提示\n\n与输入/输出流一样，通道也是 `AutoCloseable` 的。如果你使用\
  \ `try-with-resources` 语句来获取通道，通道将自动关闭，从而无需显式调用通道的 `close()` 方法。\n\n清单 9-8 将所有这些步骤整合在一起。它从一个名为\
  \ `luci1.txt` 的文件中读取文本。该文件应位于你的当前工作目录中。如果文件不存在，程序会打印一条消息，其中包含该文件应存在的完整路径。如果你没有此文件，请在运行程序之前创建它，并在文件中输入以下文本：\n\
  \n```\nSTRANGE fits of passion have I known:\nAnd I will dare to tell,\nBut in the\
  \ lover's ear alone,\nWhat once to me befell.\n```\n\n你需要密切关注对缓冲区 `clear()` 和 `flip()`\
  \ 方法的调用。当你调用通道的 `read()` 或 `write()` 方法时，它会对缓冲区执行相对位置的读/写操作。因此，在通道将数据写入缓冲区后，你必须调用缓冲区的\
  \ `flip()` 方法才能从中读取数据。\n\n```\n// FileChannelRead.java\npackage com.jdojo.nio;\n\
  import java.io.File;\nimport java.io.FileInputStream;\nimport java.io.IOException;\n\
  import java.nio.ByteBuffer;\nimport java.nio.channels.FileChannel;\npublic class\
  \ FileChannelRead {\npublic static void main(String[] args) {\n// 要读取的输入文件\nFile\
  \ inputFile = new File(\"luci1.txt\");\n// 确保输入文件存在\nif (!inputFile.exists()) {\n\
  System.out.println(\"输入文件 \" + inputFile.getAbsolutePath()\n+ \" 不存在。\");\nSystem.out.println(\"\
  已中止文件读取过程。\");\nSystem.exit(1);\n}\n// 获取用于读取 luci1.txt 文件的通道\ntry (FileChannel\
  \ fileChannel = new FileInputStream(inputFile).getChannel()) {\n// 创建一个缓冲区\nByteBuffer\
  \ buffer = ByteBuffer.allocate(1024);\n// 从通道中读取所有数据\nwhile (fileChannel.read(buffer)\
  \ > 0) {\n// 在读取数据之前翻转缓冲区\nbuffer.flip();\n// 将读取的数据作为字符显示在控制台上。\n// 注意，我们假设一个字节代表一个字符，这并非总是成立。\n\
  // 在实际应用中，你应该在显示/使用它们之前，\n// 使用 CharsetDecoder 将字节解码为字符。\nwhile (buffer.hasRemaining())\
  \ {\nbyte b = buffer.get();\n// 假设一个字节代表一个字符\nSystem.out.print((char) b);\n}\n//\
  \ 在下一次读取之前清除缓冲区\nbuffer.clear();\n}\n} catch (IOException e) {\ne.printStackTrace();\n\
  }\n}\n}\nSTRANGE fits of passion have I known:\nAnd I will dare to tell,\nBut in\
  \ the lover's ear alone,\nWhat once to me befell.\n清单 9-8.\n使用缓冲区和通道从文件读取\n```\n\
  \n使用缓冲区和通道将数据写入文件的步骤如下：\n\n1.  创建一个 `FileOutputStream` 类的对象。\n\n2.  使用上一步创建的 `FileOutputStream`\
  \ 对象的 `getChannel()` 方法获取一个 `FileChannel` 对象。\n\n3.  创建一个 `ByteBuffer` 对象，用于向文件写入数据。\n\
  \n4.  用数据填充 `ByteBuffer`。\n\n5.  调用缓冲区的 `flip()` 方法，使其准备好被通道读取。\n\n6.  通过传递填充了数据的\
  \ `ByteBuffer` 对象，调用 `FileChannel` 对象的 `write()` 方法。\n\n7.  通过调用其 `close()` 方法关闭通道。\n\
  \n清单 9-9 将所有这些步骤整合在一起，将以下文本写入 `luci5.txt` 文件：\n\n```\nIn one of those sweet dreams\
  \ I slept,\nKind Nature's gentlest boon!\nAnd all the while my eyes I kept\nOn the\
  \ descending moon.\n```\n\n该代码从文本创建一个字符串，并在两行之间插入一个平台相关的换行符。它将文本转换为字节数组，通过包装字节数组创建一个\
  \ `ByteBuffer`，并将缓冲区写入文件通道。请注意，你不需要对缓冲区使用 `flip()` 方法，因为在将其传递给通道进行写入之前，你的缓冲区对象刚刚用文本创建，并且其\
  \ position 和 limit 已由 `wrap()` 方法正确设置。程序会打印写入文本的文件的路径，该路径在你的机器上可能不同。\n\n```\n//\
  \ FileChannelWrite.java\npackage com.jdojo.nio;\nimport java.io.File;\nimport java.nio.channels.FileChannel;\n\
  import java.io.IOException;\nimport java.nio.ByteBuffer;\nimport java.io.FileOutputStream;\n\
  public class FileChannelWrite {\npublic static void main(String[] args) {\n// 要写入的输出文件\n\
  File outputFile = new File(\"luci5.txt\");\ntry (FileChannel fileChannel = new FileOutputStream(outputFile).getChannel())\
  \ {\n// 将文本作为字符串获取\nString text = getText();\n// 将文本转换为字节数组\nbyte[] byteData = text.getBytes(\"\
  UTF-8\");\n// 使用字节数组创建一个 ByteBuffer\nByteBuffer buffer = ByteBuffer.wrap(byteData);\n\
  // 将字节写入文件\nfileChannel.write(buffer);\nSystem.out.println(\"数据已写入 \"\n+ outputFile.getAbsolutePath());\n\
  } catch (IOException e1) {\ne1.printStackTrace();\n}\n}\npublic static String getText()\
  \ {\nString lineSeparator = System.getProperty(\"line.separator\");\nStringBuilder\
  \ sb = new StringBuilder();\nsb.append(\"In one of those sweet dreams I slept,\"\
  );\nsb.append(lineSeparator);\nsb.append(\"Kind Nature's gentlest boon!\");\nsb.append(lineSeparator);\n\
  sb.append(\"And all the while my eyes I kept\");\nsb.append(lineSeparator);\nsb.append(\"\
  On the descending moon.\");\nreturn sb.toString();\n}\n}\n数据已写入 C:\\Java9LanguageFeatures\\\
  luci5.txt\n清单 9-9.\n使用缓冲区和通道写入文件\n```\n\n一个文件关联着两种数据。一种是其内容，另一种是元数据，例如创建时间、最后修改时间等。当你将数据写入文件通道时，数据可能不会立即实际写入存储设备（例如硬盘）。为了立即将数据写入存储设备，在调用文件通道的\
  \ `write()` 方法之后，你可以调用其 `force(boolean metaData)` 方法。它保证文件的内容和元数据被写入其存储设备。如果你调用\
  \ `force(false)`，则仅将文件的元数据写入存储设备。如果你调用 `force(true)`，则文件的内容及其元数据都会被写入存储设备。实际上，这仅在存储设备是本地设备时才得到保证。否则，JVM\
  \ 会尽力将数据写入存储设备。\n\n提示\n\n\n\n文件通道仅能与字节缓冲区配合使用。在本节的示例中，我假设一个字符用一个字节表示，这仅在你使用 US-ASCII\
  \ 或 UTF-8 等编码处理英文字母时才成立。关于如何将字符缓冲区编码为字节缓冲区，以及如何将字节缓冲区解码为字符缓冲区，请参考“字符集”部分。\n\n内存映射文件\
  \ I/O\n\n还有另一种在文件上执行 I/O 的方法，即将文件的某个区域映射到物理内存中，并将其视为一个内存数组。这是在 Java 中执行文件 I/O 最快的方法。使用一种名为\
  \ `MappedByteBuffer` 的特殊字节缓冲区，可以让你执行内存映射文件 I/O。\n\n对于内存映射文件 I/O，首先需要获取文件的 `FileChannel`，然后使用\
  \ `FileChannel` 的 `map()` 方法来获取一个 `MappedByteBuffer`。直接读取或写入映射的字节缓冲区，而不是使用 `FileChannel`\
  \ 的 `read()` 或 `write()` 方法。当你从映射的字节缓冲区读取时，你实际上是在读取你已映射的文件区域。当你向映射的字节缓冲区写入时，你是在向文件的映射区域写入。如果你想将写入映射字节缓冲区的数据立即写入存储设备，你需要使用映射字节缓冲区的\
  \ `force()` 方法。`force()` 方法没有与元数据相关的布尔参数。\n\n一旦你从 `FileChannel` 获取了映射的字节缓冲区，关闭该通道对你的缓冲区没有影响。即使\
  \ `FileChannel` 已关闭，你仍然可以继续读取/写入映射的字节缓冲区。\n\n你可以以只读、读写或私有模式映射文件的某个区域。在只读模式下，你只能从映射的字节缓冲区读取。在读写模式下，你可以读取和写入映射的字节缓冲区。私有模式需要稍作解释。这种模式也称为写时复制模式。当多个程序映射文件的同一区域时，并不会为每个程序创建该区域的单独副本。相反，所有程序共享文件的同一区域。当一个程序修改映射区域时，才会为该程序创建该区域的一个单独副本，即其私有副本。对私有副本的任何修改对其他程序都是不可见的。\n\
  \n以下代码片段以只读模式映射了整个 `luci5.txt` 文件。它读取该文件并将内容显示在标准输出上。\n\n```\nFileInputStream fis\
  \ = new FileInputStream(\"luci5.txt\");\nFileChannel fc = fis.getChannel();\nlong\
  \ startRegion = 0;\nlong endRegion = fc.size();\nMappedByteBuffer mbb = fc.map(FileChannel.MapMode.READ_ONLY,\
  \ startRegion, endRegion);\nwhile(mbb.hasRemaining()) {\nSystem.out.print((char)\
  \ mbb.get());\n}\nfc.close();\n```\n\n文件\n锁定\n\nNIO 支持文件锁定以同步对文件的访问。你可以锁定文件的某个区域或整个文件。文件锁定机制由操作系统处理，因此其确切效果是平台相关的。在某些操作系统上，文件锁是建议性的，而在另一些操作系统上则是强制性的。由于它由操作系统处理，其效果对其他程序以及在其他\
  \ JVM 中运行的 Java 程序都是可见的。\n\n提示\n\n建议性锁允许其他用户使用你已获取锁的文件，但阻止他们获取同一文件上的锁。强制性锁强制用户在可以使用文件之前获取该文件上的锁。\n\
  \n有两种文件锁定：独占锁和共享锁。只有一个程序可以对文件的某个区域持有独占锁。多个程序可以对文件的同一区域持有共享锁。你不能在文件的同一区域上混合使用独占锁和共享锁。如果一个程序在一个区域上持有共享锁，另一个程序必须等待才能获取该区域的独占锁，反之亦然。某些操作系统不支持共享文件锁，在这种情况下，对共享文件锁的请求会被转换为对独占文件锁的请求。\n\
  \n`java.nio.channels` 包中的 `FileLock` 类的对象代表一个文件锁。你可以通过使用 `FileChannel` 类的 `lock()`\
  \ 或 `tryLock()` 方法来获取文件上的锁。如果请求的文件区域上的锁不可用，`lock()` 方法会阻塞。`tryLock()` 方法不会阻塞；它会立即返回。如果成功获取锁，它会返回一个\
  \ `FileLock` 类的对象；否则，返回 `null`。\n\n`lock()` 和 `tryLock()` 方法都有两个版本：一个不带参数，另一个带三个参数。不带参数的版本锁定整个文件。带三个参数的版本接受要锁定区域的起始位置、要锁定的字节数以及一个\
  \ `boolean` 标志，用于指示锁是否为共享锁。`FileLock` 对象的 `isShared()` 方法在锁为共享锁时返回 `true`；否则返回 `false`。\n\
  \n以下代码片段展示了获取文件锁的不同方式。为清晰起见，省略了异常处理代码。\n\n```\n// 创建一个随机访问文件并为其获取一个通道\nRandomAccessFile\
  \ raf = new RandomAccessFile(\"test.txt\", \"rw\");\nFileChannel fileChannel = raf.getChannel();\n\
  // 获取文件上的独占锁\nFileLock lock = fileChannel.lock();\n// 获取前 10 个字节上的独占锁\nFileLock\
  \ lock = fileChannel.lock(0, 10, false);\n// 尝试获取整个文件上的独占锁\nFileLock lock = fileChannel.tryLock();\n\
  if (lock == null) {\n// 无法获取锁\n} else {\n// 已获取锁\n}\n// 尝试以共享模式锁定从第 11 个字节开始的 100\
  \ 个字节\nFileLock lock = fileChannel.tryLock(11, 100, true);\nif (lock == null) {\n\
  // 无法获取锁\n} else {\n// 已获取锁\n}\n```\n\n你锁定的文件区域可能不包含在文件大小的范围内。假设你有一个大小为 100 字节的文件。当你请求锁定此文件时，你可以指定要锁定该文件从第\
  \ 11 个字节开始、覆盖 5000 字节的区域。请注意，此文件仅包含 100 个字节；你正在锁定 5000 个字节。在这种情况下，如果文件大小增长到超过 100\
  \ 字节，你的锁将覆盖文件的额外区域。假设你锁定了整个文件，其大小为 100 字节。如果此文件增长到 150 字节，你的锁不会覆盖你获取锁之后添加的最后 50\
  \ 个字节。`FileChannel` 对象的 `lock()` 和 `tryLock()` 方法（不指定任何参数时）会锁定从 0 到 `Long.MAX_VALUE`\
  \ 的文件区域。`fc.lock()` 和 `fc.lock(0, Long.MAX_VALUE, false)` 这两个方法调用具有相同的效果。\n\n当你完成文件锁的使用后，需要使用\
  \ `release()` 方法释放它。文件锁可以通过三种方式释放：调用其 `release()` 方法、关闭获取该锁的文件通道以及关闭 JVM。最佳实践是使用\
  \ `try-catch-finally` 块来获取和释放文件锁，如下所示：\n\n```\nRandomAccessFile raf = new RandomAccessFile(\"\
  test.txt\", \"rw\");\nFileChannel fileChannel = raf.getChannel();\nFileLock lock\
  \ = null;\ntry {\nlock = fileChannel.lock(0, 10, true);\n/* 在此处处理文件 */\n} catch(IOException\
  \ e) {\n// 处理异常\n} finally {\nif (lock != null) {\ntry {\nlock.release();\n} catch(IOException\
  \ e) {\n// 处理异常\n}\n}\n}\n```\n\n复制文件内容\n\n\n\n你可以使用缓冲区和通道来更快地复制文件。当使用 `FileChannel`\
  \ 时，将一个文件的内容复制到另一个文件只需一次方法调用。\n获取源文件和目标文件的 `FileChannel` 对象，然后在源 `FileChannel` 对象上调用\
  \ `transferTo()` 方法，或者在目标 `FileChannel` 对象上调用 `transferFrom()` 方法。\n以下代码片段展示了如何将\
  \ `luci5.txt` 文件复制到 `luci5_copy.txt`：\n\n```\n// 获取源通道和目标通道\nFileChannel sourceChannel\
  \ = new FileInputStream(sourceFile).getChannel();\nFileChannel sinkChannel = new\
  \ FileOutputStream(sinkFile).getChannel();\n// 将源文件内容复制到目标文件\nsourceChannel.transferTo(0,\
  \ sourceChannel.size(), sinkChannel);\n// 除了在源通道上使用 transferTo() 方法，\n// 你也可以在目标通道上使用\
  \ transferFrom() 方法\nsinkChannel.transferFrom(sourceChannel, 0, sourceChannel.size());\n\
  ```\n\n清单 9-10 包含了完整的代码。当文件复制成功时，程序会打印源文件和目标文件的路径。\n\n```\n// FastestFileCopy.java\n\
  package com.jdojo.nio;\nimport java.io.IOException;\nimport java.io.File;\nimport\
  \ java.io.FileInputStream;\nimport java.io.FileOutputStream;\nimport java.nio.channels.FileChannel;\n\
  public class FastestFileCopy {\npublic static void main(String[] args) {\nFile sourceFile\
  \ = new File(\"luci5.txt\");\nFile sinkFile = new File(\"luci5_copy.txt\");\ntry\
  \ {\ncopy(sourceFile, sinkFile, false);\nSystem.out.println(sourceFile.getAbsoluteFile()\n\
  + \" has been copied to \" + sinkFile.getAbsolutePath());\n} catch (IOException\
  \ e) {\nSystem.out.println(e.getMessage());\n}\n}\npublic static void copy(File\
  \ sourceFile,\nFile sinkFile, boolean overwrite) throws IOException {\n// 执行一些错误检查\n\
  if (!sourceFile.exists()) {\nthrow new IOException(\"源文件 \"\n+ sourceFile.getAbsolutePath()\
  \ + \" 不存在。\");\n}\nif (sinkFile.exists() && !overwrite) {\nthrow new IOException(\"\
  目标文件 \"\n+ sinkFile.getAbsolutePath() + \" 已存在。\");\n}\n// 在 try-with-resources\
  \ 块中获取源和目标文件通道，以便它们自动关闭。\ntry (FileChannel srcChannel = new FileInputStream(sourceFile).getChannel();\n\
  FileChannel sinkChannel = new FileOutputStream(sinkFile).getChannel()) {\n// 将源文件内容复制到目标文件\n\
  srcChannel.transferTo(0, srcChannel.size(), sinkChannel);\n}\n}\n}\n清单 9-10.\n使用\
  \ FileChannel 复制文件内容\n```\n\n了解机器的字节顺序\n\n如果你曾想知道机器的字节顺序（也称为字节序），你需要使用 `ByteOrder`\
  \ 类的 `nativeOrder()` 方法，如清单 9-11 所示。机器的字节顺序/缓冲区的字节顺序将在下一节详细讨论。该程序会打印运行它的机器的字节顺序。你可能会得到不同的输出。\n\
  \n```\n// MachineByteOrder.java\npackage com.jdojo.nio;\nimport java.nio.ByteOrder;\n\
  public class MachineByteOrder {\npublic static void main(String args[]) {\nByteOrder\
  \ b = ByteOrder.nativeOrder();\nif (b.equals(ByteOrder.BIG_ENDIAN)) {\nSystem.out.println(\"\
  大端序\");\n} else {\nSystem.out.println(\"小端序\");\n}\n}\n}\n小端序\n清单 9-11.\n了解机器的字节序（字节顺序）\n\
  ```\n\n字节缓冲区及其字节顺序\n\n字节顺序是指多字节值的字节存储顺序。假设你有一个短整型值 `300` 存储在变量中，如下所示：\n\n```\nshort\
  \ s = 300;\n```\n\n一个短整型值占用两个字节。值 `300` 可以用 16 位表示为 `0000000100101100`，其中最右边的位是最低有效位，最左边的位是最高有效位。你可以将\
  \ 16 位拆分为两个字节：`00000001` 和 `00101100`。在字节级别，你可以将 `00000001` 视为最高有效字节，将 `00101100`\
  \ 视为最低有效字节。如果你单独考虑一个短整型值的两个字节，你可以将它们存储为 `00000001` 后跟 `00101100`，或者 `00101100` 后跟\
  \ `00000001`。只要你知道字节的存储顺序，你就可以使用 16 位的任何一种形式计算出正确的值 `300`：`0000000100101100` 或 `0010110000000001`。\n\
  \n如果多字节值的字节从最高有效字节存储到最低有效字节，则字节顺序称为**大端序**。如果多字节值的字节从最低有效字节存储到最高有效字节，则称为**小端序**。为了更容易记住这两个定义，你可以将“大”替换为“最高有效”，“小”替换为“最低有效”，“端”替换为“优先”。也就是说，将“大端序”记为“最高有效优先”，将“小端序”记为“最低有效优先”。\n\
  \n如果你将短整型值 `300` 存储为 `0000000100101100`，那么你使用的是大端序字节顺序。在小端序字节顺序中，你会将 `300` 存储为 `0010110000000001`，这对于表示一个\
  \ 16 位值来说似乎是反过来的。\n\n当你在字节缓冲区中处理字节数据时，你可能将每个字节视为一个独立的字节。字节缓冲区中的一个字节可能是一个更大值的一部分。当字节缓冲区中的一个字节值是独立的时候，字节顺序不是需要考虑的因素。当字节缓冲区中的一个字节是一个更大值的一部分时（例如，短整型值\
  \ `300` 的两个字节），字节顺序在读取时就变得非常重要。如果你从字节缓冲区读取两个字节来计算一个短整型值，你必须知道这两个字节是如何存储的。假设你读取了两个字节为\
  \ `0000000100101100`。如果它是大端序字节顺序，它表示的值是 `300`。如果它是小端序字节顺序，它表示的值是 `11265`。\n\nJava\
  \ 使用大端序字节顺序来存储数据。默认情况下，字节缓冲区使用大端序字节顺序。`java.nio.ByteOrder` 类的实例表示一个字节顺序。你不需要实例化这个类，因为你总是使用表示字节顺序的值；你不会创建一个新的字节顺序。事实上，这个类没有\
  \ `public` 构造方法。你可以使用 `ByteOrder` 类中定义的两个常量 `BIG_ENDIAN` 和 `LITTLE_ENDIAN` 来表示这些字节顺序。\n\
  \n提示\n\n字节顺序仅对存储在字节缓冲区中的多字节值有意义。当你处理两个使用不同字节顺序的系统时，你可能也需要处理字节顺序。\n\n清单 9-12 演示了如何获取和设置字节缓冲区的字节顺序。你使用\
  \ `ByteBuffer` 类的 `order()` 方法来获取或设置字节顺序。该程序将一个短整型值 `300` 存储在字节缓冲区的两个字节中。它使用大端序和小端序字节顺序显示第一个和第二个字节中存储的值。输出以十进制显示字节值为\
  \ `1` 和 `44`，它们的二进制等价形式分别是 `00000001` 和 `00101100`。\n\n\n\n```\n// ByteBufferOrder.java\n\
  package com.jdojo.nio;\nimport java.nio.ByteBuffer;\nimport java.nio.ByteOrder;\n\
  public class ByteBufferOrder {\npublic static void main(String[] args) {\nByteBuffer\
  \ bb = ByteBuffer.allocate(2);\nSystem.out.println(\"默认字节顺序: \" + bb.order());\n\
  bb.putShort((short) 300);\nbb.flip();\nshowByteOrder(bb);\n// 以小端字节顺序重新填充缓冲区\nbb.clear();\n\
  bb.order(ByteOrder.LITTLE_ENDIAN);\nbb.putShort((short) 300);\nbb.flip();\nshowByteOrder(bb);\n\
  }\npublic static void showByteOrder(ByteBuffer bb) {\nSystem.out.println(\"字节顺序:\
  \ \" + bb.order());\nwhile (bb.hasRemaining()) {\nSystem.out.print(bb.get() + \"\
  \  \");\n}\nSystem.out.println();\n}\n}\n默认字节顺序: BIG_ENDIAN\n字节顺序: BIG_ENDIAN\n\
  1  44\n字节顺序: LITTLE_ENDIAN\n44  1\n清单 9-12.\n设置字节缓冲区的字节顺序\n```\n\n摘要\n\n与基于流的输入/输出相比，新的输入/输出（NIO）提供了更快的\
  \ I/O 速度。NIO 使用缓冲区和通道进行 I/O 操作。通道表示数据源/数据接收器与 Java 程序之间用于数据传输的连接。缓冲区包含要写入文件的数据或从文件读取的数据。支持存储不同类型原始值的缓冲区作为独立类的实例存在。对于文件\
  \ I/O 操作，你只能使用 `ByteBuffer`。NIO 还支持内存映射文件 I/O，这是读/写文件最快的方式。\n\n缓冲区维护着多个属性，这些属性会因读取其数据或向其写入数据而受到影响。缓冲区的\
  \ position 属性是缓冲区中的一个索引，表示下一次读/写操作中要开始读取或写入的起始位置。缓冲区的 limit 属性是缓冲区中的一个索引，表示无效读/写位置的起始索引。当你从缓冲区读取或向缓冲区写入时，缓冲区的\
  \ position 可能会发生变化。\n\n缓冲区相关的类也包含直接操作这些属性的方法。缓冲区支持绝对读/写和相对读/写。在绝对读/写中，缓冲区的 position\
  \ 不受影响。在相对读/写中，缓冲区的 position 属性会自动前进。\n\n字节缓冲区支持不同的视图。你可以使用缓冲区的视图来将数据缓冲区的数据作为不同的原始类型值进行访问，或者仅查看缓冲区数据的一部分。\n\
  \n一个字符并不总是存储在一个字节中。存储一个字符所用的字节数取决于编码字符集和字符编码方案。编码字符集是一组抽象字符与一组整数之间的映射。字符编码方案是编码字符集与一组八位字节序列之间的映射。`java.nio.charset.Charset`\
  \ 类的实例表示一个字符集和一个字符编码方案。一些字符集名称的示例有 US-ASCII、ISO-8859-1、UTF-8、UTF-16BE、UTF-16LE 和\
  \ UTF-16。根据编码方案将字符转换为字节序列的过程称为**编码**。根据编码方案将字节序列转换为字符的过程称为**解码**。在 NIO 中，你可以使用编码方案将\
  \ Unicode 字符转换为字节序列，反之亦然。`java.nio.charset` 包提供了将 `CharBuffer` 编码/解码为 `ByteBuffer`\
  \ 以及反向操作的类。`Charset` 类的对象表示编码方案。`CharsetEncoder` 类执行编码。`CharsetDecoder` 类执行解码。你可以通过调用\
  \ `Charset` 类的 `forName()` 方法并传入字符集名称作为参数来获取该类的对象。\n\n`FileChannel` 与缓冲区一起用于读/写文件。你可以从\
  \ `InputStream`、`OutputStream` 获取 `FileChannel`，或者使用 `FileChannel` 类的工厂方法获取。你还可以使用\
  \ `FileChannel` 类的 `lock()` 方法以独占模式或共享模式锁定文件。\n\n\n\n字节顺序是指多字节值中字节的存储顺序。如果多字节值的字节从最高有效字节到最低有效字节存储，则称为大端序。如果多字节值的字节从最低有效字节到最高有效字节存储，则称为小端序。如果字节缓冲区表示多字节数据，则需要处理其字节顺序。`java.nio.ByteOrder`\
  \ 类表示字节顺序。它包含两个常量 `BIG_ENDIAN` 和 `LITTLE_ENDIAN`，分别表示大端序和小端序字节顺序。\n\n问题与练习\n\n1.\
