  \ `Whiskey`），并添加自己的名称。`h.getName()` 方法将返回“`Whiskey, Honey`”。\n\n```\n// 获取价格\ndouble\
  \ drinkPrice = h.getPrice();\n```\n\n`h.getPrice()` 方法将返回 `1.75`。它将获取威士忌的价格（`1.5`）并加上蜂蜜的价格（`0.25`）。\n\
  \n你不需要两步过程来创建一杯加蜂蜜的威士忌。你可以使用以下一条语句来创建它：\n\n```\nDrink myDrink = new Honey(new Whiskey());\n\
  ```\n\n通过使用这种编码风格，你会感觉到 `Honey` 确实在包裹（或装饰）`Whiskey`。你点了一杯饮料：加蜂蜜的威士忌。因此，最好将最终饮料的引用存储到一个\
  \ `Drink` 变量（`Drink myDrink`）中，而不是一个 `Honey` 变量（`Honey h`）中。但是，如果 `Honey` 类实现了一些除从\
  \ `Drink` 类继承的方法之外的额外方法，并且你打算使用这些额外方法之一，那么你需要使用 `Honey` 类的变量来存储最终引用。\n\n```\n//\
  \ 如果我们的 Honey 类有额外的方法，这些方法未在 Drink 类中定义，\n// 则将引用存储在 Honey 类型变量中\nHoney h = new\
  \ Honey(new Whiskey());\n```\n\n你如何点一杯加了两份蜂蜜的威士忌？很简单。创建一个 `Whiskey` 对象，将其包裹在一个 `Honey`\
  \ 对象中，然后将这个 `Honey` 对象包裹在另一个 `Honey` 对象中，如下所示：\n\n```\n// 创建一杯加双份蜂蜜的威士忌\nDrink myDrink\
  \ = new Honey(new Honey(new Whiskey()));\n```\n\n类似地，你可以创建一杯加蜂蜜和香料的伏特加，并获取其名称和价格，如下所示：\n\
  \n```\n// 创建一杯加蜂蜜和香料的伏特加\nDrink myDrink = new Spices(new Honey(new Vodka()));\n\
