  \ 或 offerLast() 方法在其尾部添加元素\nDeque deque = new LinkedList();\ndeque.addLast(\"John\"\
  );\ndeque.offerLast(\"Richard\");\ndeque.offerLast(\"Donna\");\ndeque.offerLast(\"\
  Ken\");\nSystem.out.println(\"Deque: \" + deque);\n// 从 Deque 中移除元素，直到其为空\nwhile\
  \ (deque.peekFirst() != null) {\nSystem.out.println(\"头部元素: \" + deque.peekFirst());\n\
  deque.removeFirst();\nSystem.out.println(\"已从 Deque 中移除一个元素\");\nSystem.out.println(\"\
  Deque: \" + deque);\n}\n// 现在，Deque 为空。尝试调用其 peekFirst()、getFirst()、pollFirst()\
  \ 和 removeFirst() 方法\nSystem.out.println(\"deque.isEmpty(): \" + deque.isEmpty());\n\
  System.out.println(\"deque.peekFirst(): \" + deque.peekFirst());\nSystem.out.println(\"\
