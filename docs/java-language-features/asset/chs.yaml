  ```\n\n有时，阅读基于装饰器模式的对象构造可能会令人困惑，因为构造函数调用中有多层对象包装。你需要从最内层开始读取对象的构造函数。最内层始终是一个具体组件，所有后续层将是具体的装饰器。在前面的加蜂蜜和香料的伏特加示例中，最内层是创建伏特加\
  \ `new Vodka()`，它被包裹在蜂蜜中 `new Honey(new Vodka())`，而蜂蜜又被包裹在香料中 `new Spices(new Honey(new\
  \ Vodka()))`。图 7-3 描绘了这三个对象是如何排列的。清单 7-14 演示了如何使用你的饮料应用程序。\n\n![A323070_2_En_7_Fig3_HTML.gif](img/A323070_2_En_7_Fig3_HTML.gif)\n\
  \n图 7-3.\n\n装饰器模式中组件的排列\n\n\n\n```\n// DrinkTest.java\npackage com.jdojo.io;\npublic\
