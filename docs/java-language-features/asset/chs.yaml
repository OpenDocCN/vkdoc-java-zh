  将 Deque 用作栈\n```\n\n```\n栈: [Ken, Donna, Richard, John]\n顶部元素: Ken\n弹出: Ken\n栈:\
  \ [Donna, Richard, John]\n顶部元素: Donna\n弹出: Donna\n栈: [Richard, John]\n顶部元素: Richard\n\
  弹出: Richard\n栈: [John]\n顶部元素: John\n弹出: John\n栈: []\n栈为空: true\n```\n\n请注意，即使 `Deque`\
  \ 提供了将其用作栈所需的所有方法，它并没有为程序员提供一种可以真正用作栈的集合类型。如果你在方法中需要一个栈作为其参数，你需要将其声明为 `Deque` 类型，如下所示：\n\
  \n```\npublic class MyClass {\npublic void myMethod(Deque stack){\n/* 此方法可以自由地将栈参数用作（或误用作）FIFO，\n\
  即使它只需要一个 LIFO 队列。\n*/\n}\n}\n```\n\n当 `myMethod()` 需要一个栈时，它被传入了一个 `Deque`。如果你信任\
  \ `myMethod()`，那没问题。否则，它可以以 `Deque` 接口允许的任何方式访问 `Deque` 的元素。它并不局限于仅用作栈。阻止你的 `Deque`\
  \ 用户仅将其用作栈的唯一方法是推出你自己的接口和实现类。`Stack` 类可以作为一个栈使用。但是，建议你不要使用 `Stack` 类来处理栈，因为它存在你正试图解决的相同问题。\n\
  \n你可以创建一个名为 `LIFOQueue` 的接口，包含四个方法：`isEmpty()`、`push()`、`pop()` 和 `peek()`。你可以创建一个名为\
  \ `ArrayLIFOQueue` 的实现类，它实现了 `LIFOQueue` 接口。你的 `ArrayLIFOQueue` 类将包装一个 `ArrayDeque`\
  \ 对象。它的所有方法都将委托给 `ArrayDeque`。仅此而已。请注意，通过创建一个新的 `LIFOQueue` 接口及其实现，你正在偏离集合框架。你的新接口和类将位于集合框架之外。但是，如果你确实需要实现自己版本的、可以严格用作栈的数据结构，你可以这样做。\n\
  \n还有另一种从 `Deque` 创建栈的方法。你可以使用 `Collections` 类的 `asLifoQueue()` 静态方法将 `Deque` 转换为\
  \ `LIFO 队列`。方法签名如下：\n\n```\npublic static  Queue asLifoQueue(Deque deque)\n```\n\
  \n以下代码片段从 `Deque` 创建了一个栈：\n\n```\nDeque deque = /^ 创建一个 Deque */;\n// 从 Deque 获取一个\
  \ LIFO 队列\nQueue stack = Collections.asLifoQueue(deque);\n// 现在，你可以传递 stack 引用，该引用只能用作\
  \ LIFO 队列\n```\n\n阻塞队列\n\n你已经看到了 `Queue` 在两种极端情况下的行为：\n\n*   当你想要向已满的队列添加元素时\n\n\
  *   当你想要从空队列中移除元素时\n\n队列指定了两种类型的方法来处理这两种极端情况下的插入、移除和查看：一种类型的方法抛出异常，而另一种类型的方法返回一个特殊值。\n\
  \n阻塞队列扩展了队列在处理这些极端情况时的行为。它增加了另外两组方法：一组方法无限期阻塞，另一组方法允许你指定阻塞的时间段。\n\n`BlockingQueue<E>`\
  \ 接口的实例代表一个阻塞队列。`BlockingQueue<E>` 接口继承自 `Queue<E>` 接口。以下是 `BlockingQueue` 接口提供的两个额外特性：\n\
  \n*   它增加了两个方法 `put()` 和 `offer()`，允许你在阻塞队列的尾部添加元素。如果阻塞队列已满，`put()` 方法会无限期阻塞，直到队列中有可用空间。`offer()`\
  \ 方法允许你指定等待阻塞队列中可用空间的时间段。如果指定的元素成功添加，则返回 `true`；如果在空间可用之前指定的时间段已过，则返回 `false`。\n\
  \n*   它增加了两个方法 `take()` 和 `poll()`，允许你检索并移除阻塞队列的头部元素。如果阻塞队列为空，`take()` 方法会无限期阻塞。`poll()`\
  \ 方法允许你指定在阻塞队列为空时的等待时间；如果在元素可用之前指定的时间已过，则返回 `null`。\n\n如果你将 `Queue` 接口的方法与 `BlockingQueue`\
  \ 一起使用，它们的行为将如同你正在使用一个 `Queue`。`BlockingQueue` 被设计为线程安全的。通常它用于生产者/消费者类似的情况，其中一些线程（称为生产者）向其中添加元素，而另一些线程（称为消费者）从中移除元素。\n\
  \n\n\n阻塞队列不允许包含 `null` 元素。阻塞队列可以是有界或无界的。它还增加了一个名为 `remainingCapacity()` 的方法，该方法返回在不阻塞的情况下可以添加到阻塞队列中的元素数量。在根据此方法的返回值做决策时需要谨慎。当你调用此方法时，可能还有其他线程同时尝试向阻塞队列添加元素。在这种情况下，当你根据此方法的返回值尝试添加新元素时，即使你知道还有可用空间，你的元素也可能无法被添加。判断元素能否添加到阻塞队列的真正方法是尝试添加一个元素，并检查\
  \ `put()` 或 `offer()` 方法的返回值。\n\n还有一点与阻塞队列相关：公平性。公平性用于处理多个线程被阻塞以执行插入或移除操作的情况。如果阻塞队列是公平的，当允许操作继续的条件出现时，它将允许等待时间最长的线程执行该操作。如果阻塞队列是不公平的，则被阻塞线程执行操作的顺序是不确定的。具体实现决定了公平性的可用性。\n\
  \n`BlockingQueue` 接口及其所有实现类都在 `java.util.concurrent` 包中。以下是 `BlockingQueue` 接口的实现类：\n\
  \n*   `ArrayBlockingQueue`：它是 `BlockingQueue` 的一个有界实现类。它由数组支持。它还允许你在其构造函数中指定阻塞队列的公平性。默认情况下，它是不公平的。\n\
  *   `LinkedBlockingQueue`：它是 `BlockingQueue` 的另一个实现类。它可以用作有界或无界阻塞队列。它不允许为阻塞队列指定公平性规则。\n\
  *   `PriorityBlockingQueue`：它是 `BlockingQueue` 的一个无界实现类。它在对阻塞队列中的元素进行排序时，工作方式与 `PriorityQueue`\
  \ 相同。它为 `PriorityQueue` 增加了阻塞特性。\n*   `SynchronousQueue`：它是 `BlockingQueue` 的一种特殊实现类型。它没有任何容量。`put`\
  \ 操作会等待 `take` 操作来取走正在放入的元素。它促进了两个线程之间的一种握手。一个线程尝试向阻塞队列放入一个元素，必须等待直到有线程尝试取走该元素。它促进了两个线程之间对象的交换。你也可以为队列指定公平性规则。实际上，这个阻塞队列始终是空的。只有当有两个线程（一个尝试添加元素，一个尝试移除元素）时，它似乎才有一个元素。它的\
  \ `isEmpty()` 方法始终返回 `true`。\n*   `DelayQueue`：它是 `BlockingQueue` 的另一个无界实现类。它只允许在元素的指定延迟时间过后才能取出该元素。如果阻塞队列中有多个元素的指定延迟时间已过，则延迟最早到期的元素将被置于阻塞队列的头部。\n\
  \n让我们从一个生产者/消费者应用程序的示例开始。清单 12-21 包含生产者的代码。其构造函数接受一个阻塞队列和一个生产者名称。它生成一个字符串，并在等待 1\
  \ 到 5 秒之间的随机秒数后将其添加到阻塞队列中。如果阻塞队列已满，它将等待直到队列中有可用空间。\n\n```\n// BQProducer.java\n\
  package com.jdojo.collections;\nimport java.util.concurrent.BlockingQueue;\nimport\
  \ java.util.Random;\npublic class BQProducer extends Thread {\nprivate final BlockingQueue\
  \ queue;\nprivate final String name;\nprivate int nextNumber = 1;\nprivate final\
  \ Random random = new Random();\npublic BQProducer(BlockingQueue queue, String name)\
  \ {\nthis.queue = queue;\nthis.name = name;\n}\n@Override\npublic void run() {\n\
  while (true) {\ntry {\nString str = name + \"-\" + nextNumber;\nSystem.out.println(name\
  \ + \" is trying to add: \"\n+ str + \". Remaining capacity: \"\n+ queue.remainingCapacity());\n\
  this.queue.put(str);\nnextNumber++;\nSystem.out.println(name + \" added: \" + str);\n\
  // Sleep between 1 and 5 seconds\nint sleepTime = (random.nextInt(5) + 1) * 1000;\n\
  Thread.sleep(sleepTime);\n} catch (InterruptedException e) {\ne.printStackTrace();\n\
  break;\n}\n}\n}\n}\n清单 12-21.\n阻塞队列的生产者类\n```\n\n清单 12-22 包含消费者的代码。它执行与生产者相反的操作。它从阻塞队列中移除元素。如果阻塞队列为空，它将无限期等待直到有元素可用。生产者和消费者都在无限循环中运行。\n\
  \n```\n// BQConsumer.java\npackage com.jdojo.collections;\nimport java.util.concurrent.BlockingQueue;\n\
  import java.util.Random;\npublic class BQConsumer extends Thread {\nprivate final\
  \ BlockingQueue queue;\nprivate final String name;\nprivate final Random random\
  \ = new Random();\npublic BQConsumer(BlockingQueue queue, String name) {\nthis.queue\
  \ = queue;\nthis.name = name;\n}\n@Override\npublic void run() {\nwhile (true) {\n\
  try {\nSystem.out.println(name + \" is trying to take an element. \"\n+ \"Remaining\
  \ capacity: \"\n+ queue.remainingCapacity());\nString str = this.queue.take();\n\
  System.out.println(name + \" took: \" + str);\n// Sleep between 1 and 5 seconds\n\
  int sleepTime = (random.nextInt(5) + 1) * 1000;\nThread.sleep(sleepTime);\n} catch\
  \ (InterruptedException e) {\ne.printStackTrace();\nbreak;\n}\n}\n}\n}\n清单 12-22.\n\
  阻塞队列的消费者类\n```\n\n清单 12-23 创建了一个有界且公平的阻塞队列。它创建了一个生产者和两个消费者。每个生产者和消费者都在单独的线程中创建。显示了部分输出。你需要手动停止应用程序。你可以尝试添加更多生产者或消费者，并调整它们的休眠时间。请注意，输出中打印的消息可能不会以合理的顺序出现；这在多线程程序中是典型的。一个线程执行了一个操作，但在它能够打印表明它已执行该操作的消息之前被抢占。同时，你会看到来自另一个线程的消息。\n\
  \n```\n// BQProducerConsumerTest.java\npackage com.jdojo.collections;\nimport java.util.concurrent.BlockingQueue;\n\
  import java.util.concurrent.ArrayBlockingQueue;\npublic class BQProducerConsumerTest\
  \ {\npublic static void main(String[] args) {\nint capacity = 5;\nboolean fair =\
  \ true;\nBlockingQueue queue = new ArrayBlockingQueue(capacity, fair);\n// Create\
