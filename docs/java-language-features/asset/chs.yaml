  \ 管理文件权限。请注意，UNIX 支持 POSIX 标准文件属性。POSIX 文件权限由九个部分组成：所有者三个、组三个、其他用户三个。三种权限类型为读取、写入和执行。典型的\
  \ POSIX 文件权限字符串形式类似于 `\"rw-rw----\"`，表示所有者和组具有读取和写入权限。`PosixFilePermission` 枚举类型定义了九个常量，每个权限组件对应一个。这九个常量命名为\
  \ `XXX_YYY`，其中 `XXX` 为 `OWNER`、`GROUP` 和 `OTHERS`，`YYY` 为 `READ`、`WRITE` 和 `EXECUTE`。\n\
  \n`PosixFilePermissions` 是一个工具类。它包含将文件的 POSIX 权限从一种形式转换为另一种形式的方法。其 `toString()`\
  \ 方法将 `Set<PosixFilePermission>` 枚举常量集合转换为 `rwxrwxrwx` 形式的字符串。其 `fromString()` 方法将\
  \ `rwxrwxrwx` 形式的 POSIX 文件权限字符串转换为 `Set<PosixFilePermission>`。其 `asFileAttribute()`\
  \ 方法将 `Set<PosixFilePermission>` 转换为 `FileAttribute` 对象，你可以在创建新文件时将其作为参数传递给 `Files.createFile()`\
  \ 方法。\n\n读取 POSIX 文件权限很简单。你需要使用 `PosixFileAttributeView` 类的 `readAttributes()` 方法来获取\
  \ `PosixFileAttributes` 实例。`PosixFileAttributes` 的 `permissions()` 方法以 `Set<PosixFilePermission>`\
  \ 的形式返回所有 POSIX 文件权限。以下代码片段读取并打印默认目录下名为 `luci` 的文件的 POSIX 文件权限（以 `rwxrwxrwx` 形式）：\n\
  \n```\n// 获取 luci 文件的 Path 对象\nPath path = Paths.get(\"luci\");\n// 获取文件的 POSIX\
  \ 属性视图\nPosixFileAttributeView posixView =\nFiles.getFileAttributeView(path, PosixFileAttributeView.class);\n\
  // 此处确保 posixView 不为 null\n// 读取所有 POSIX 属性\nPosixFileAttributes attribs = posixView.readAttributes();\n\
  // 读取文件权限\nSet permissions = attribs.permissions();\n// 将文件权限转换为 rwxrwxrwx 字符串形式\n\
  String rwxFormPermissions = PosixFilePermissions.toString(permissions);\n// 打印权限\n\
  System.out.println(rwxFormPermissions);\n```\n\n更新 POSIX 文件权限也很简单。你需要以 `Set<PosixFilePermission>`\
  \ 的形式获取所有权限。要更新 POSIX 文件权限，请调用 `PosixFileAttributeView` 的 `setPermissions()` 方法，并将\
  \ `Set<PosixFilePermission>` 作为参数传递。以下代码片段展示了如何设置 POSIX 文件权限：\n\n```\n// 以字符串形式获取权限\n\
  String rwxFormPermissions = \"rw-r-----\";\n// 将字符串形式的权限转换为 Set\nSet permissions\
  \ = PosixFilePermissions.fromString(rwxFormPermissions);\n// 更新权限\nposixView.setPermissions(permissions);\n\
  ```\n\n或者，你也可以直接创建 `PosixFilePermission` 枚举常量的 `Set` 并将其设置为文件权限，如下所示：\n\n```\nSet\
  \ permissions = EnumSet.of(OWNER_READ, OWNER_WRITE, GROUP_READ);\nposixView.setPermissions(permissions);\n\
  ```\n\n清单 10-20 演示了如何在类 UNIX 平台上读取和更新名为 `luci` 的文件的 POSIX 文件权限。如果文件不存在，程序将输出 `NoSuchFileException`\
  \ 的堆栈跟踪。如果你在非类 UNIX 平台上运行该程序，它将打印一条消息，提示不支持 POSIX 属性视图。运行此程序时，你可能会得到不同的输出。\n\n```\n\
  // PosixPermissionsTest.java\npackage com.jdojo.nio2;\nimport java.io.IOException;\n\
  import java.nio.file.Files;\nimport java.nio.file.Path;\nimport java.nio.file.Paths;\n\
  import java.util.EnumSet;\nimport java.util.Set;\nimport java.nio.file.attribute.PosixFileAttributeView;\n\
  import java.nio.file.attribute.PosixFileAttributes;\nimport java.nio.file.attribute.PosixFilePermission;\n\
  import java.nio.file.attribute.PosixFilePermissions;\nimport static java.nio.file.attribute.PosixFilePermission.OWNER_READ;\n\
  import static java.nio.file.attribute.PosixFilePermission.OWNER_WRITE;\nimport static\
  \ java.nio.file.attribute.PosixFilePermission.GROUP_READ;\npublic class PosixPermissionsTest\
  \ {\npublic static void main(String[] args) {\nPath path = Paths.get(\"luci\");\n\
  PosixFileAttributeView posixView =\nFiles.getFileAttributeView(path, PosixFileAttributeView.class);\n\
  if (posixView == null) {\nSystem.out.println(\"POSIX attribute view is not supported.\"\
  );\nreturn;\n}\nreadPermissions(posixView);\nupdatePermissions(posixView);\n}\n\
  public static void readPermissions(PosixFileAttributeView posixView) {\ntry {\n\
  PosixFileAttributes attribs;\nattribs = posixView.readAttributes();\nSet permissions\
  \ = attribs.permissions();\n// 将 posix 文件权限集合转换为 rwxrwxrwx 形式\nString rwxFormPermissions\
  \ = PosixFilePermissions.toString(permissions);\nSystem.out.println(rwxFormPermissions);\n\
  } catch (IOException ex) {\nex.printStackTrace();\n}\n}\npublic static void updatePermissions(PosixFileAttributeView\
  \ posixView) {\ntry {\nSet permissions =\nEnumSet.of(OWNER_READ, OWNER_WRITE, GROUP_READ);\n\
  posixView.setPermissions(permissions);\nSystem.out.println(\"Permissions set successfully.\"\
  );\n} catch (IOException ex) {\nex.printStackTrace();\n}\n}\n}\n清单 10-20. 读取和写入\
  \ POSIX 文件权限\n```\n\n```\nrw-rw-r--\nPermissions set successfully.\n```\n\n监视目录的修改\n\
  \n\n\nNIO.2 支持一种监视服务，当文件系统中已注册的对象被修改时，该服务会通知 Java 程序。目前，你只能监视目录的修改。监视服务使用文件系统的原生文件事件通知机制。如果文件系统不提供文件事件通知机制，它可能会使用其他机制，例如轮询。`java.nio.file`\
  \ 包中的以下类和接口参与了监视服务的实现：\n\n*   `Watchable` 接口\n*   `WatchService` 接口\n*   `WatchKey`\
  \ 接口\n*   `WatchEvent<T>` 接口\n*   `WatchEvent.Kind<T>` 接口\n*   `StandardWatchEventKinds`\
  \ 类\n\n`Watchable` 是一个可以被监视更改的文件系统对象。一个 `Watchable` 可以注册到一个监视服务。`Path` 就是一个 `Watchable`。因此，你可以将一个\
  \ `Path` 注册到监视服务。\n\n`WatchService` 代表一个监视服务，它监视已注册对象的更改。当一个对象注册到 `WatchService`\
  \ 时，`WatchService` 会返回一个 `WatchKey`，作为该注册的令牌。换句话说，`WatchKey` 标识了一个对象在 `WatchService`\
  \ 上的注册。\n\n`WatchEvent` 代表在注册到监视服务的对象上发生的一个事件（或重复事件）。它的 `kind()` 方法返回在已注册对象上发生的事件类型。它的\
  \ `context()` 方法返回一个 `Path` 对象，该对象代表事件发生的条目。这个 `Path` 对象表示已注册到监视服务的目录与事件发生的条目之间的相对路径。一个事件在被通知之前可能会重复发生。`count()`\
  \ 方法返回特定通知中事件发生的次数。如果返回值大于 1，则表示这是一个重复事件。\n\n`WatchEvent.Kind<T>` 代表在已注册对象上发生的事件类型。`StandardWatchEventKinds`\
  \ 类定义了常量来表示事件的类型。\n\n`StandardWatchEventKinds` 类定义了以下四个常量来标识事件类型。每个常量的类型都是 `WatchEvent.Kind`。\n\
  \n*   `ENTRY_CREATE`\n*   `ENTRY_DELETE`\n*   `ENTRY_MODIFY`\n*   `OVERFLOW`\n\n\
  前三个常量的名称不言自明。它们分别表示在已注册目录中创建、删除和修改条目时的事件。最后一种事件类型是 `OVERFLOW`，它代表一种特殊的事件，用于指示事件可能已丢失或被丢弃。\n\
  \n监视目录更改需要以下步骤：\n\n1.  创建一个监视服务。\n2.  将一个目录注册到监视服务。\n3.  从监视服务队列中检索一个监视键。\n4.  处理在已注册目录上发生的事件。\n\
  5.  处理事件后重置监视键。\n6.  关闭监视服务。\n\n创建监视服务\n\n你可以按如下方式为文件系统创建一个监视服务：\n\n```\nWatchService\
  \ ws = FileSystems.getDefault()\n.newWatchService();\n```\n\n将目录注册到监视服务\n\n你需要创建一个代表你想要监视的目录的\
  \ `Path` 对象，并调用其 `register()` 方法将其注册到监视服务。在注册时，你需要指定你想要为目录注册的事件类型。`register()` 方法将返回一个\
  \ `WatchKey` 作为注册令牌。\n\n```\n// 获取要监视的 C:\\kishori 目录的 Path 对象\nPath dirToWatch\
  \ = Paths.get(\"C:\\\\kishori\");\n// 为 dirToWatch 注册创建、修改和删除事件\nWatchKey token\
  \ = dirToWatch.register(ws, ENTRY_CREATE, ENTRY_MODIFY, ENTRY_DELETE);\n```\n\n\
  你可以使用 `WatchKey` 的 `cancel()` 方法取消目录在监视服务上的注册。当一个目录被注册时，其 `WatchKey` 被认为处于就绪状态。你可以将多个目录注册到一个监视服务。请注意，目录在注册时必须存在。\n\
  \n从监视服务队列中检索 WatchKey\n\n当已注册目录上发生事件时，该已注册目录的 `WatchKey` 被认为处于信号状态，并且该 `WatchKey`\
  \ 被排队到监视服务中。当一个已注册目录的 `WatchKey` 处于信号状态时，该目录上可能发生另一个事件。如果在 `WatchKey` 处于信号状态时目录上发生了事件，则该事件会被排队到该\
  \ `WatchKey`，但 `WatchKey` 本身不会重新排队到监视服务。处于信号状态的 `WatchKey` 会保持此状态，直到调用其 `reset()`\
  \ 方法将其状态更改为就绪状态。\n\n你可以使用 `WatchService` 对象的 `take()` 或 `poll()` 方法来检索并移除一个已信号化且已排队的\
  \ `WatchKey`。`take()` 方法会等待，直到有一个 `WatchKey` 可用。`poll()` 方法允许你指定等待的超时时间。通常，会使用一个无限循环来检索已信号化的\
  \ `WatchKey`：\n\n```\nwhile(true) {\n// 从监视服务中检索并移除下一个可用的 WatchKey\nWatchKey key\
  \ = ws.take();\n// 更多代码写在这里\n}\n```\n\n处理事件\n\n一旦你从监视服务队列中检索并移除了一个 `WatchKey`，你就可以检索并移除该\
  \ `WatchKey` 的所有待处理事件。一个 `WatchKey` 可能有多个待处理事件。`WatchKey` 的 `pollEvents()` 方法会检索并移除其所有待处理事件。它返回一个\
  \ `List<WatchEvent>`。列表中的每个元素代表 `WatchKey` 上的一个事件。通常，你需要使用 `WatchEvent` 对象的 `kind()`、`context()`\
  \ 和 `count()` 方法来了解事件的详细信息。以下代码片段展示了处理事件的典型逻辑：\n\n```\nwhile(true) {\n// 检索并移除下一个可用的\
  \ WatchKey\nWatchKey key = ws.take();\n// 处理 WatchKey 的所有事件\nfor(WatchEvent event\
  \ : key.pollEvents()) {\n// 在这里处理每个事件\n}\n}\n```\n\n处理事件后重置 WatchKey\n\n你必须通过调用\
  \ `WatchKey` 对象的 `reset()` 方法来重置它，以便它可以再次接收事件通知并排队到监视服务。`reset()` 方法将 `WatchKey`\
  \ 置于就绪状态。如果 `WatchKey` 仍然有效，`reset()` 方法返回 `true`。否则，返回 `false`。如果 `WatchKey` 被取消或其监视服务被关闭，它可能会变得无效。\n\
  \n```\n// 重置 WatchKey\nboolean isKeyValid = key.reset();\nif (!isKeyValid) {\nSystem.out.println(\"\
  不再监视 \" + dirToWatch);\n}\n```\n\n关闭监视服务\n\n当你完成监视服务的使用后，通过调用其 `close()` 方法来关闭它。调用其\
  \ `close()` 方法时，你需要处理 `java.io.IOException`。\n\n```\n// 关闭监视服务\nws.close();\n```\n\
  \n提示\n\n`WatchService` 是 `AutoCloseable` 的。如果你在 `try-with-resources` 块中创建 `WatchService`\
  \ 对象，当程序退出该块时，它将被自动关闭。\n\n清单 10-21 包含一个完整的程序，用于监视 `C:\\kishori` 目录的更改。你可以将 `Watcher`\
  \ 类中的目录路径替换为你想要监视更改的目录路径。在运行 `Watcher` 类之后，你需要对监视的目录进行更改，例如创建新文件和更改现有文件。输出将显示在被监视目录的条目上发生的事件的详细信息。你可能会得到不同的输出。\n\
  \n\n\n```\n// Watcher.java\npackage com.jdojo.nio2;\nimport java.nio.file.WatchEvent.Kind;\n\
  import java.io.IOException;\nimport java.nio.file.FileSystems;\nimport java.nio.file.Path;\n\
  import java.nio.file.Paths;\nimport java.nio.file.WatchService;\nimport java.nio.file.WatchEvent;\n\
  import java.nio.file.WatchKey;\nimport static java.nio.file.StandardWatchEventKinds.ENTRY_CREATE;\n\
  import static java.nio.file.StandardWatchEventKinds.ENTRY_MODIFY;\nimport static\
  \ java.nio.file.StandardWatchEventKinds.ENTRY_DELETE;\nimport static java.nio.file.StandardWatchEventKinds.OVERFLOW;\n\
  public class Watcher {\npublic static void main(String[] args) {\ntry (WatchService\
  \ ws = FileSystems.getDefault().newWatchService()) {\n// 获取要监视的 C:\\kishori 目录的\
  \ Path 对象\nPath dirToWatch = Paths.get(\"C:\\\\kishori\");\n// 将路径注册到监视服务，用于创建、修改和删除事件\n\
  dirToWatch.register(ws, ENTRY_CREATE, ENTRY_MODIFY, ENTRY_DELETE);\nSystem.out.println(\"\
  正在监视 \" + dirToWatch + \" 的事件。\");\n// 持续监视 dirToWatch 上的事件\nwhile (true) {\n//\
  \ 检索并移除下一个可用的 WatchKey\nWatchKey key = ws.take();\nfor (WatchEvent event : key.pollEvents())\
  \ {\nKind eventKind = event.kind();\nif (eventKind == OVERFLOW) {\nSystem.out.println(\"\
  发生事件溢出\");\ncontinue ;\n}\n// 获取事件的上下文，即发生事件的目录条目\n@SuppressWarnings(\"unchecked\"\
  )\nWatchEvent currEvent = (WatchEvent) event;\nPath dirEntry = currEvent.context();\n\
  // 打印事件详情\nSystem.out.println(eventKind + \" 发生在 \" + dirEntry );\n}\n// 重置键\nboolean\
  \ isKeyValid = key.reset();\nif (!isKeyValid) {\nSystem.out.println(\"不再监视 \" +\
