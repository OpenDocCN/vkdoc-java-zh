  \ 一次性将文本行写入文件\n```\n\n```\n文本已写入 C:\\Java9LanguageFeatures\\twinkle.txt\n```\n\n\
  `Files` 类包含一个 `newOutputStream(Path path, OpenOption... options)` 方法，该方法为指定的 `path`\
  \ 返回一个 `OutputStream`。该类包含一个 `newBufferedWriter(Path path, Charset cs, OpenOption...\
  \ options)` 方法，该方法为指定的 `path` 返回一个 `BufferedWriter`。你可以使用 `java.io` API 通过 `OutputStream`\
  \ 和 `BufferedWriter` 将内容写入文件。有关如何使用 `java.io` API 的更多详细信息，请参阅第 7 章。\n\n\n\n你可以使用\
  \ `newByteChannel(Path path, OpenOption... options)` 方法为指定的 `path` 获取一个 `SeekableByteChannel`。你可以使用\
  \ `SeekableByteChannel` 的 `write(ByteBuffer src)` 方法将数据写入文件。有关如何使用通道 API 写入文件的更多详细信息，请参阅第\
  \ 9 章。我将在下一节讨论一个使用 `SeekableByteChannel` 的示例。\n\n文件的随机访问\n\n`SeekableByteChannel`\
  \ 通过通道 API 提供对文件的随机访问。你可以使用它从文件读取数据和向文件写入数据。它是 `java.nio.channels` 包中声明的一个接口。`java.nio.channels`\
  \ 包中的 `FileChannel` 类实现了此接口。你可以使用 `Files` 类的 `newByteChannel()` 方法为 `Path` 获取一个\
  \ `SeekableByteChannel`，如下所示：\n\n```\nPath src = Paths.get(\"twinkle2.txt\");\n\
  SeekableByteChannel seekableChannel =\nFiles.newByteChannel(src, READ, WRITE, CREATE,\
  \ TRUNCATE_EXISTING);\n```\n\n`SeekableByteChannel` 连接到一个实体（例如文件）。它维护一个当前位置。当你向通道写入时，数据被写入当前位置。如果你从通道读取，数据从当前位置读取。你可以使用其\
  \ `position()` 方法获取当前位置。要设置其当前位置，你需要使用其 `position(long newPosition)` 方法。\n\n你可以使用\
  \ `SeekableByteChannel` 的 `size()` 方法获取其实体的大小（以字节为单位）。当数据被截断或写入通道时，大小会更新。\n\n`SeekableByteChannel`\
  \ 的 `truncate(long size)` 方法允许你将实体的大小截断为指定的 `size`。如果指定的 `size` 小于实体的当前大小，它会将数据截断为指定的\
  \ `size`。如果指定的大小大于或等于实体的当前大小，此方法不会修改实体。\n\n使用 `read(ByteBuffer destination)` 和 `write(ByteBuffer\
  \ source)` 方法分别从通道读取数据和向通道写入数据。确保在对通道执行读写操作之前正确设置当前位置。\n\n清单 10-10 展示了如何使用 `SeekableByteChannel`\
  \ 从文件读取和向文件写入。它在默认目录中创建一个名为 `twinkle2.txt` 的文件，并向其中写入几行文本。写入数据后，它将位置重置为零，并读取文本以将其打印到标准输出。在每一步，它都会打印大小和当前位置。\n\
  \n```\n// SeekableByteChannelTest.java\npackage com.jdojo.nio2;\nimport java.nio.ByteBuffer;\n\
  import java.nio.charset.Charset;\nimport java.io.IOException;\nimport java.nio.CharBuffer;\n\
  import java.nio.channels.SeekableByteChannel;\nimport java.nio.file.Path;\nimport\
  \ java.nio.file.Paths;\nimport java.nio.file.Files;\nimport static java.nio.file.StandardOpenOption.READ;\n\
  import static java.nio.file.StandardOpenOption.WRITE;\nimport static java.nio.file.StandardOpenOption.CREATE;\n\
  import static java.nio.file.StandardOpenOption.TRUNCATE_EXISTING;\npublic class\
  \ SeekableByteChannelTest {\npublic static void main(String[] args) {\nPath src\
  \ = Paths.get(\"twinkle2.txt\");\n// 获取系统的文件编码\nString encoding = System.getProperty(\"\
  file.encoding\");\nCharset cs = Charset.forName(encoding);\ntry (SeekableByteChannel\
  \ seekableChannel\n= Files.newByteChannel(src, READ, WRITE, CREATE, TRUNCATE_EXISTING))\
  \ {\n// 打印详细信息\nprintDetails(seekableChannel, \"写入数据前\");\n// 首先，向文件写入一些数据\nwriteData(seekableChannel,\
  \ cs);\n// 打印详细信息\nprintDetails(seekableChannel, \"写入数据后\");\n// 将可查找通道的位置重置为 0，\n\
  // 以便我们可以从头开始读取数据\nseekableChannel.position(0);\n// 打印详细信息\nprintDetails(seekableChannel,\
  \ \"将位置重置为 0 后\");\n// 从文件读取数据\nreadData(seekableChannel, cs);\n// 打印详细信息\nprintDetails(seekableChannel,\
  \ \"读取数据后\");\n} catch (IOException e) {\ne.printStackTrace();\n}\n}\npublic static\
  \ void writeData(SeekableByteChannel seekableChannel ,\nCharset cs) throws IOException\
  \ {\n// 获取平台相关的行分隔符\nString separator = System.getProperty(\"line.separator\");\n\
  // 准备要写入文件的文本\nStringBuilder sb = new StringBuilder();\nsb.append(\"When the blazing\
  \ sun is gone,\");\nsb.append(separator);\nsb.append(\"When he nothing shines upon,\"\
  );\nsb.append(separator);\nsb.append(\"Then you show your little light,\");\nsb.append(separator);\n\
  sb.append(\"Twinkle, twinkle, all the night\");\nsb.append(separator);\n// 将文本包装到字符缓冲区中\n\
  CharBuffer charBuffer = CharBuffer.wrap(sb);\n// 将字符缓冲区数据编码为字节缓冲区\nByteBuffer byteBuffer\
  \ = cs.encode(charBuffer);\n// 将数据写入文件\nseekableChannel.write(byteBuffer);\n}\n\
  public static void readData(SeekableByteChannel seekableChannel,\nCharset cs) throws\
  \ IOException {\nByteBuffer byteBuffer = ByteBuffer.allocate(128);\nString encoding\
  \ = System.getProperty(\"file.encoding\");\nwhile (seekableChannel.read(byteBuffer)\
  \ > 0) {\nbyteBuffer.rewind();\nCharBuffer charBuffer = cs.decode(byteBuffer);\n\
  System.out.print(charBuffer);\nbyteBuffer.flip();\n}\n}\npublic static void printDetails(SeekableByteChannel\
  \ seekableChannel, String msg) {\ntry {\nSystem.out.println(msg + \": 大小 = \" +\
  \ seekableChannel.size()\n+ \", 位置 = \" + seekableChannel.position());\n} catch\
  \ (IOException e) {\ne.printStackTrace();\n}\n}\n}\n清单 10-10. 一个使用 SeekableByteChannel\
  \ 从文件读取和向文件写入数据的示例程序\n```\n\n```\n写入数据前: 大小 = 0, 位置 = 0\n写入数据后: 大小 = 128, 位置 = 128\n\
  将位置重置为 0 后: 大小 = 128, 位置 = 0\nWhen the blazing sun is gone,\nWhen he nothing shines\
  \ upon,\nThen you show your little light,\nTwinkle, twinkle, all the night\n读取数据后:\
  \ 大小 = 128, 位置 = 128\n```\n\n遍历文件树\n\nNIO.2 提供了一个 FileVisitor API，用于递归处理文件树中的所有文件和目录。当你希望对文件树中的所有或部分文件或目录执行某些操作时，此\
  \ API 非常有用。例如，你不能删除一个非空目录。在删除目录之前，你必须删除其下的所有文件和目录，使用 FileVisitor API 可以轻松实现这一点。你需要使用以下步骤来遍历文件树：\n\
  \n1.  通过实现 `java.nio.file.FileVisitor` 接口创建一个文件访问者类。\n\n\n\n2.  要开始遍历文件树，请使用 `Files`\
  \ 类的 `walkFileTree()` 方法，指定起始目录和上一步创建的类的文件访问器对象。当访问文件/目录或访问失败时，会调用 `FileVisitor`\
  \ 接口的其中一个方法。\n\n提示\n\nNIO.2 API 提供了 `SimpleFileVisitor` 类，它是 `FileVisitor` 接口的一个基本实现。`SimpleFileVisitor`\
  \ 类中的方法在访问文件/目录时不执行任何操作。当发生故障时，它会重新抛出原始异常。你可以从 `SimpleFileVisitor` 类继承你的文件访问器类，并仅覆盖符合你需求的方法。\n\
  \n表 10-2 列出了 `FileVisitor` 接口的方法及其描述。所有方法都会抛出 `IOException`，并且都返回 `FileVisitResult`\
  \ 类型的枚举常量。表 10-3 列出了 `FileVisitResult` 枚举类型定义的常量及其描述。\n\n表 10-3.\n\nFileVisitResult\
  \ 的枚举常量及其描述\n\n枚举常量\n |\n  描述\n |\n\n| --- | --- | --- | --- | --- |\n\n`CONTINUE`\n\
  \ |\n  继续处理。\n |\n\n`SKIP_SIBLINGS`\n |\n  继续处理，但不访问文件或目录的同级项。如果从 `preVisitDirectory()`\
  \ 方法返回此值，则还会跳过当前目录中的条目，并且不会在该目录上调用 `postVisitDirectory()` 方法。\n |\n\n`SKIP_SUBTREE`\n\
  \ |\n  继续处理，但不访问目录中的条目。仅当从 `preVisitDirectory()` 方法返回时才有意义。否则，其效果与 `CONTINUE` 相同。\n\
  \ |\n\n`TERMINATE`\n |\n  终止文件访问过程。\n |\n\n表 10-2.\n\nFileVisitor 接口的方法\n\n方法\n\
  \ |\n  描述\n |\n\n| --- | --- | --- | --- | --- |\n\n`FileVisitResult preVisitDirectory(T\
  \ dir, BasicFileAttributes attrs) throws IOException`\n |\n  在访问目录中的条目之前调用此方法一次。\n\
  \ |\n\n`FileVisitResult postVisitDirectory(T dir, IOException exc) throws IOException`\n\
  \ |\n  在访问完目录中的条目（及其所有后代）后调用此方法。即使在访问目录中的条目期间发生错误，也会调用此方法。\n\n如果在遍历目录期间抛出了任何异常，则该异常对象将作为第二个参数传递给此方法。如果此方法的第二个参数是\
  \ `null`，则表示目录遍历期间没有异常。\n |\n\n`FileVisitResult visitFile(T file, BasicFileAttributes\
  \ attrs) throws IOException`\n |\n  当访问目录中的文件时调用此方法。\n |\n\n`FileVisitResult visitFileFailed(T\
  \ file, IOException exc) throws IOException`\n |\n  当由于任何原因无法访问文件或目录时调用此方法。\n |\n\
  \n你不需要在你的文件访问器类的所有四个方法中都编写逻辑。例如，如果你想复制一个目录，你可能希望在 `preVisitDirectory()` 方法中编写代码来创建新目录，并在\
  \ `visitFile()` 方法中编写代码来复制文件。如果你想删除一个目录，你需要先删除其中的条目。在这种情况下，你将实现 `visitFile()` 方法来删除文件，然后实现\
  \ `postVisitDirectory()` 方法来删除目录。\n\n让我们实现一个文件访问器，它将打印一个目录中所有文件和子目录的名称。它还将以字节为单位打印文件的大小。清单\
  \ 10-11 包含了完整的程序。它打印默认目录的文件和子目录的详细信息。\n\n```\n// WalkFileTreeTest.java\npackage\
  \ com.jdojo.nio2;\nimport java.io.IOException;\nimport java.nio.file.FileVisitor;\n\
  import java.nio.file.Path;\nimport java.nio.file.Paths;\nimport java.nio.file.SimpleFileVisitor;\n\
  import java.nio.file.attribute.BasicFileAttributes;\nimport java.nio.file.FileVisitResult;\n\
  import java.nio.file.Files;\nimport static java.nio.file.FileVisitResult.CONTINUE;\n\
  public class WalkFileTreeTest {\npublic static void main(String[] args) {\n// 获取默认目录的\
  \ Path 对象\nPath startDir = Paths.get(\"\");\n// 获取一个文件访问器对象\nFileVisitor visitor\
  \ = getFileVisitor();\ntry {\n// 遍历 startDir 的内容\nFiles.walkFileTree(startDir, visitor);\n\
  } catch (IOException e) {\ne.printStackTrace();\n}\n}\npublic static FileVisitor\
  \ getFileVisitor() {\n// 声明一个局部类 DirVisitor，它继承自 SimpleFileVisitor 类\nclass DirVisitor\
  \ extends SimpleFileVisitor {\n@Override\npublic FileVisitResult preVisitDirectory(Path\
  \ dir, BasicFileAttributes attrs) {\nSystem.out.format(\"%s [Directory]%n\", dir);\n\
  return CONTINUE;\n}\n@Override\npublic FileVisitResult visitFile(Path file, BasicFileAttributes\
  \ attrs) {\nSystem.out.format(\"%s [File, Size: %s bytes]%n\", file, attrs.size());\n\
  return CONTINUE;\n}\n}\n// 创建一个 DirVisitor 对象\nFileVisitor visitor = new DirVisitor();\n\
  return visitor ;\n}\n}\n清单 10-11.\n一个打印目录的子目录和文件名称的程序\n```\n\n`getFileVisitor()`\
  \ 方法创建了一个 `FileVisitor` 对象，其类继承自 `SimpleFileVisitor` 类。在 `preVisitDirectory()` 方法中，它打印目录的名称并返回\
  \ `FileVisitResult.CONTINUE` 以表示它希望继续处理该目录中的条目。在 `visitFile()` 方法中，它打印文件的名称和大小并继续处理。FileVisitor\
  \ API 以深度优先的顺序遍历文件树。但是，它不保证访问目录子目录的顺序。要遍历文件树，你需要调用 `Files` 类的 `walkFileTree()` 方法。`walkFileTree()`\
  \ 方法在遍历文件树时会自动调用访问器对象的方法。\n\n当你希望对文件树中的所有条目或某些选定条目执行某些操作时，FileVisitor API 非常有用。诸如复制目录树、删除非空目录、查找文件等操作都可以使用\
  \ FileVisitor API 轻松实现。清单 10-12 演示了如何使用 FileVisitor API 删除目录树。在运行程序之前，你需要指定要删除的目录的路径。请注意，你将无法恢复已删除目录的内容。因此，在试验此程序时要小心，不要意外删除任何有用的目录。\n\
  \n\n\n```\n// DeleteDirectoryTest.java\npackage com.jdojo.nio2;\nimport java.io.IOException;\n\
  import java.nio.file.FileVisitResult;\nimport static java.nio.file.FileVisitResult.CONTINUE;\n\
  import static java.nio.file.FileVisitResult.TERMINATE;\nimport java.nio.file.FileVisitor;\n\
  import java.nio.file.Files;\nimport java.nio.file.Path;\nimport java.nio.file.Paths;\n\
  import java.nio.file.SimpleFileVisitor;\nimport java.nio.file.attribute.BasicFileAttributes;\n\
  public class DeleteDirectoryTest {\npublic static void main(String[] args) {\n/*\
  \ 警告！！！\n请将以下语句中的 YOUR_DIR_PATH_TO_DELETE 替换为\n要删除其内容的目录路径。\n运行此程序后，您将无法恢复该目录的内容。\n\
  */\nPath dirToDelete = Paths.get(\"YOUR_DIR_PATH_TO_DELETE\");\nFileVisitor visitor\
  \ = getFileVisitor();\ntry {\nFiles.walkFileTree(dirToDelete, visitor);\n} catch\
  \ (IOException e) {\nSystem.out.println(e.getMessage());\n}\n}\npublic static FileVisitor\
  \ getFileVisitor() {\n// 一个内部局部类，用作文件访问器来删除目录\nclass DeleteDirVisitor extends SimpleFileVisitor\
  \ {\n@Override\npublic FileVisitResult postVisitDirectory(Path dir,\nIOException\
  \ e) throws IOException {\nFileVisitResult result = CONTINUE ;\n// 最后，删除目录\nif (e\
  \ != null) {\nSystem.out.format(\"删除 %s 时出错。%s%n\", dir, e.getMessage());\nresult\
  \ = TERMINATE;\n} else {\nFiles.delete(dir);\nSystem.out.format(\"已删除目录 %s%n\",\
  \ dir);\n}\nreturn result;\n}\n@Override\npublic FileVisitResult visitFile(Path\
  \ file,\nBasicFileAttributes attrs) throws IOException {\n// 删除正在访问的文件\nFiles.delete(file);\n\
  System.out.format(\"已删除文件 %s%n\", file);\nreturn CONTINUE;\n}\n}\n// 创建 DirVisitor\
  \ 对象\nFileVisitor visitor = new DeleteDirVisitor();\nreturn visitor ;\n}\n}\n清单\
  \ 10-12.\n使用 FileVisitor API 删除目录树\n```\n\n默认情况下，`Files.walkFileTree()` 方法不会跟踪符号链接。如果你想跟踪符号链接，需要使用另一个版本的\
  \ `walkFileTree()` 方法，该方法允许你指定 `FileVisitOption.FOLLOW_LINKS` 作为选项。它还允许你指定最大深度，即要访问的目录的最大层级数。将深度指定为\
  \ 0 仅访问起始文件。你可以将深度指定为 `Integer.MAX_VALUE` 来访问所有层级。以下代码片段展示了如何使用 `walkFileTree()`\
  \ 方法来跟踪符号链接：\n\n```\nimport java.util.Set;\nimport java.util.EnumSet;\nimport java.nio.file.Path;\n\
  import java.nio.file.Files;\nimport java.io.IOException;\nimport java.nio.file.FileVisitor;\n\
  import java.nio.file.FileVisitOption;\nimport static java.nio.file.FileVisitOption.FOLLOW_LINKS;\n\
  ...\nPath startDir = 获取起始目录的路径;\nFileVisitor visitor = 获取一个文件访问器;\n// 准备选项集合\nSet\
  \ options = EnumSet.of(FOLLOW_LINKS);\n// 访问所有层级\nint depth = Integer.MAX_VALUE\
  \ ;\n// 遍历文件树，访问所有层级并跟踪符号链接\nFiles.walkFileTree(startDir, options, depth, visitor);\n\
  ```\n\n匹配路径\n\nNIO.2 API 允许你使用 `glob` 和 `regex` 模式对 `Path` 对象的字符串形式执行模式匹配。使用 `PathMatcher`\
  \ 接口的实例来执行匹配。`PathMatcher` 接口是一个函数式接口。它包含 `matches(Path path)` 方法，如果指定的 `path` 与模式匹配，则返回\
  \ `true`。将模式匹配到路径是一个三步过程：\n\n1.  准备一个 `glob` 或 `regex` 模式字符串。\n2.  使用 `FileSystem`\
  \ 对象的 `getPathMatcher()` 方法获取一个 `PathMatcher` 对象。\n3.  使用 `Path` 对象调用 `matches()`\
  \ 方法，检查指定路径是否与模式匹配。\n\n模式字符串由两部分组成，`syntax` 和 `pattern`，用冒号分隔：\n\n```\nsyntax:pattern\n\
  ```\n\n`syntax` 的值可以是 `glob` 或 `regex`。`pattern` 部分遵循的语法取决于 `syntax` 部分的值。我简要列出了\
  \ `glob` 模式的语法规则。关于 `regex` 模式的语法规则，请参考本系列第一卷的第 18 章。`glob` 模式使用以下语法规则：\n\n*   星号（`*`）匹配零个或多个字符，但不跨越目录边界。\n\
  *   两个连续的星号（`**`）匹配零个或多个字符，且跨越目录边界。\n*   问号（`?`）精确匹配一个字符。\n*   反斜杠（`\\`）用于转义后续字符的特殊含义。例如，`\\\
  \\` 匹配单个反斜杠，`\\*` 匹配一个星号。\n*   放在方括号（`[]`）内的字符称为括号表达式，它匹配单个字符。例如，`[aeiou]` 匹配 `a`、`e`、`i`、`o`\
  \ 或 `u`。两个字符之间的连字符指定一个范围。例如，`[a-z]` 匹配 `a` 到 `z` 之间的所有字母。左括号后的感叹号（`!`）被视为取反。例如，`[!tyu]`\
  \ 匹配除 `t`、`y` 和 `u` 之外的所有字符。\n*   你可以通过在大括号（`{}`）内指定逗号分隔的子模式来使用子模式组。例如，`{txt, java,\
  \ doc}` 匹配 `txt`、`java` 和 `doc`。\n*   路径根组件的匹配是依赖于实现的。\n\n清单 10-13 演示了如何使用 `PathMatcher`\
  \ 对象将路径与 `glob` 模式进行匹配。该程序使用 `glob` 模式在 Windows 上匹配路径。在运行程序之前，请更改路径语法以符合你的平台。\n\n\
  ```\n// PathMatching.java\npackage com.jdojo.nio2;\nimport java.nio.file.FileSystems;\n\
  import java.nio.file.Path;\nimport java.nio.file.PathMatcher;\nimport java.nio.file.Paths;\n\
  public class PathMatching {\npublic static void main(String[] args) {\nString globPattern\
  \ = \"glob:**txt\";\nPathMatcher matcher = FileSystems.getDefault().getPathMatcher(globPattern);\n\
  Path path = Paths.get(\"C:\\\\Java9LanguageFeatures\\\\luci1.txt\");\nboolean matched\
  \ = matcher.matches(path);\nSystem.out.format(\"%s 匹配 %s: %b%n\", globPattern, path,\
  \ matched);\n}\n}\n清单 10-13.\n将路径与 Glob/Regex 模式进行匹配\n```\n\n```\nglob:**txt 匹配\
  \ C:\\Java9LanguageFeatures\\luci1.txt: true\n```\n\n管理文件属性\n\n通过 `File` 类，`java.io`\
  \ API 提供了对访问非常基本的文件属性（例如文件的最后修改时间）的支持。NIO.2 对跨平台管理（读取和写入）文件属性提供了广泛的支持。`java.nio.attribute`\
  \ 包包含与属性相关的类。它将文件属性捆绑为以下六种视图类型。\n\n*   `BasicFileAttributeView`：此属性视图允许你管理基本文件属性，例如创建时间、最后访问时间、最后修改时间、大小、文件类型（常规文件、目录、符号链接或其他）以及文件键（文件的唯一编号）。它允许你修改文件的创建时间、最后访问时间和最后修改时间。所有平台都支持此视图。\n\
  *   `DosFileAttributeView`：它扩展了 `BasicFileAttributeView`。顾名思义，它允许你访问特定于 DOS 的文件属性。它提供支持来检查文件是否为隐藏文件、系统文件、存档文件和只读文件。它仅在支持\
  \ DOS 的系统（例如 Microsoft Windows）上可用。\n\n\n\n*   `PosixFileAttributeView`\n    : POSIX\
  \ 代表可移植操作系统接口（Portable Operating System Interface for UNIX）。\n    它扩展了 `BasicFileAttributeView`，\n\
  \    并增加了对支持 POSIX 标准（如 UNIX）的系统上可用属性的支持。除了基本文件属性外，\n    它还允许你管理所有者、组以及相关的访问权限。\n\
  \n*   `FileOwnerAttributeView`\n    : 此属性视图允许你管理文件的所有者。\n\n*   `AclFileAttributeView`\n\
  \    : ACL 代表访问控制列表（Access Control List）。它是一个附加到文件上的权限列表。\n    它允许你管理文件的 ACL。\n\n\
  *   `UserDefinedFileAttributeView`\n    : 此视图允许你以名称-值对的形式管理文件的一组用户自定义属性。\n    有时，文件的用户自定义属性也被称为扩展属性。属性的名称是一个\
  \ `String`。属性的值可以是任何数据类型。\n\n某些属性视图在所有平台上都可用，而某些仅在特定平台上可用。一个实现可能会提供额外的文件属性视图。\n\n\
  检查文件属性视图支持\n\n除基本视图外，并非所有文件属性视图都在所有平台上受支持。你可以使用 `FileStore` 类的 `supportsFileAttributeView()`\
  \ 方法来检查文件存储是否支持特定的文件属性视图。该方法接受你想要检查是否支持的文件属性视图类型的类引用。如果支持指定的文件属性视图，则返回 `true`；否则返回\
  \ `false`。\n以下代码片段展示了如何检查文件属性支持：\n\n```\nPath path = /* 获取文件存储的路径引用 */;\n// 获取路径对应的文件存储引用\n\
  FileStore fs = Files.getFileStore(path);\n// 检查文件存储是否支持 POSIX 文件属性\nboolean supported\
  \ = fs.supportsFileAttributeView(PosixFileAttributeView.class);\nif (supported)\
  \ {\nSystem.out.println(\"POSIX 文件属性视图受支持。\");\n} else {\nSystem.out.println(\"\
  POSIX 文件属性视图不受支持。\");\n}\n```\n\n清单 10-14 演示了如何检查文件存储是否支持文件属性视图。它检查了 Windows 上 `C:`\
  \ 驱动器的文件属性支持情况。更改 `main()` 方法中的文件存储路径，以检查你的文件存储所支持的文件属性视图。运行程序时，你可能会得到不同的输出。\n\n\
  ```\n// SupportedFileAttribViews.java\npackage com.jdojo.nio2;\nimport java.io.IOException;\n\
  import java.nio.file.FileStore;\nimport java.nio.file.Files;\nimport java.nio.file.Path;\n\
  import java.nio.file.Paths;\nimport java.nio.file.attribute.AclFileAttributeView;\n\
  import java.nio.file.attribute.BasicFileAttributeView;\nimport java.nio.file.attribute.DosFileAttributeView;\n\
  import java.nio.file.attribute.FileAttributeView;\nimport java.nio.file.attribute.FileOwnerAttributeView;\n\
  import java.nio.file.attribute.PosixFileAttributeView;\nimport java.nio.file.attribute.UserDefinedFileAttributeView;\n\
  public class SupportedFileAttribViews {\npublic static void main(String[] args)\
  \ {\n// 在 Windows 上使用 C: 作为文件存储路径\nPath path = Paths.get(\"C:\");\ntry {\nFileStore\
  \ fs = Files.getFileStore(path);\nprintDetails(fs, AclFileAttributeView.class);\n\
  printDetails(fs, BasicFileAttributeView.class);\nprintDetails(fs, DosFileAttributeView.class);\n\
  printDetails(fs, FileOwnerAttributeView.class);\nprintDetails(fs, PosixFileAttributeView.class);\n\
  printDetails(fs, UserDefinedFileAttributeView.class);\n} catch (IOException ex)\
  \ {\nex.printStackTrace();\n}\n}\npublic static void printDetails(FileStore fs,\n\
  Class attribClass) {\n// 检查文件属性视图是否受支持\nboolean supported = fs.supportsFileAttributeView(attribClass);\n\
  System.out.format(\"%s 受支持: %s%n\", attribClass.getSimpleName(), supported);\n}\n\
  }\n清单 10-14.\n检查文件存储支持的文件属性视图\n```\n\n```\nAclFileAttributeView 受支持: true\nBasicFileAttributeView\
  \ 受支持: true\nDosFileAttributeView 受支持: true\nFileOwnerAttributeView 受支持: true\n\
  PosixFileAttributeView 受支持: false\nUserDefinedFileAttributeView 受支持: true\n```\n\
  \n读取和更新文件属性\n\nNIO.2 API 提供了多种处理文件属性的方式。有时，决定使用哪种方法来管理文件属性可能会令人困惑。\n\n你可能需要一次处理文件的单个属性或多个属性。如果你需要读取或更新文件的单个属性值，你需要查看\
  \ `Files` 类中允许你读取/更新该特定属性的可用方法。例如，如果你想检查一个文件是否是目录，请使用 `Files.isDirectory()` 方法。如果你想读取文件的所有者，请使用\
  \ `Files.getOwner()` 方法。如果你想更新文件的所有者，请使用 `Files.setOwner()` 方法。`Files` 类有以下两个静态方法，允许你使用属性名称作为字符串来读取和更新文件属性：\n\
  \n*   `Object getAttribute(Path path, String attribute, LinkOption...options)`\n\
  \n*   `Path setAttribute(Path path, String attribute, Object value, LinkOption...options)`\n\
  \n如果你需要读取或更新文件的多个属性，你需要使用特定的文件属性视图。属性的类型决定了你需要使用的文件属性视图。对于大多数文件属性视图，你需要使用两个名为 `XxxAttributes`\
  \ 和 `XxxAttributeView` 的接口。例如，对于基本文件属性，你有 `BasicFileAttributes` 和 `BasicFileAttributeView`\
  \ 接口。`XxxAttributes` 允许你读取属性。`XxxAttributeView` 允许你读取和更新属性。如果你只想读取属性，请使用 `XxxAttributes`。如果你想读取和更新属性，请同时使用\
  \ `XxxAttributeView` 和 `XxxAttributes`。\n\n`Files` 类的以下两个方法允许你批量读取文件属性，这比一次读取一个属性要高效得多。\n\
  \n*   `<A extends BasicFileAttributes> A readAttributes(Path path, Class<A> type,\
  \ LinkOption... options)`\n\n*   `Map<String,Object> readAttributes(Path path, String\
  \ attributes, LinkOption... options)`\n\n两个方法的最后一个参数允许你指定如何处理符号链接。默认情况下，如果文件是符号链接，则会读取符号链接目标的属性。如果你指定\
  \ `NOFOLLOW_LINKS` 作为选项，则会读取符号链接本身的属性，而不是其目标的属性。\n\n第一个 `readAttributes()` 方法返回指定类型的所有文件属性，封装在一个\
  \ `XxxAttributes` 对象中。例如，你可以编写以下代码片段来读取基本文件属性：\n\n```\n// 创建表示文件路径的 Path 对象\nPath\
  \ path = Paths.get(\"C:\\\\poems\\\\luci1.txt\");\n// 读取基本文件属性\nBasicFileAttributes\
  \ bfa = Files.readAttributes(path, BasicFileAttributes.class);\n// 获取最后修改时间\nFileTime\
  \ lastModifiedTime = bfa.lastModifiedTime();\n// 获取文件大小\nlong size = bfa.size();\n\
  ```\n\n第二个 `readAttributes()` 方法返回特定类型的所有或部分属性。要读取的属性列表以字符串形式提供，使用以下语法：\n\n```\n\
  [视图名称:]逗号分隔的属性列表\n```\n\n\n\n`view-name` 是您想要读取的属性视图的名称，例如 `basic`、`posix`、`acl`\
  \ 等。如果省略 `view-name`，则默认为 `basic`。如果指定了 `view-name`，则其后需跟一个冒号。您可以通过将星号（`*`）指定为属性列表来读取特定视图类型的所有属性。例如，您可以指定\
  \ `\"basic:*\"` 或 `\"*\"` 来读取所有基本文件属性。要读取基本视图中的文件大小和最后修改时间，您可以使用 `\"basic:size,lastModifiedTime\"\
  ` 或 `\"size,lastModifiedTime\"`。要使用 ACL 视图读取文件的属主属性，您可以使用字符串 `\"acl:owner\"`。要读取文件的所有\
  \ `posix` 属性，您可以使用 `\"posix:*\"`。以下代码片段打印了 `C:\\poems\\luci1.txt` 文件的大小和最后修改时间。请注意，文件路径使用的是\
  \ Windows 语法。\n\n```\n// 获取一个 Path 对象\nPath path = Paths.get(\"C:\\\\poems\\\\luci1.txt\"\
  );\n// 准备属性列表\nString attribList = \"basic:size,lastModifiedTime\";\n// 读取属性\nMap\
  \ attribs = Files.readAttributes(path, attribList);\n// 在标准输出上显示属性\nSystem.out.format(\"\
  Size:%s, Last Modified Time:%s %n\",\nattribs.get(\"size\"), attribs.get(\"lastModifiedTime\"\
  ));\n```\n\n清单 10-15 读取了当前目录下 `luci1.txt` 文件的基本文件属性，并在标准输出上打印了其中一些属性。您需要修改 `main()`\
  \ 方法中的文件路径，以便在您的平台上处理其他文件。运行此程序时，您可能会得到不同的输出。如果指定的文件不存在，则会抛出 `NoSuchFileException`\
  \ 异常，并且程序会打印该异常的堆栈跟踪信息。\n\n```\n// BasicFileAttributesTest.java\npackage com.jdojo.nio2;\n\
  import java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Path;\n\
  import java.nio.file.Paths;\nimport java.nio.file.attribute.BasicFileAttributes;\n\
  public class BasicFileAttributesTest {\npublic static void main(String[] args) {\n\
  // 将文件路径更改为一个已存在的文件\nPath path = Paths.get(\"luci1.txt\");\ntry {\n// 读取基本文件属性\n\
  BasicFileAttributes bfa =\nFiles.readAttributes(path, BasicFileAttributes.class);\n\
  // 打印一些基本文件属性\nSystem.out.format(\"Size: %s bytes %n\", bfa.size());\nSystem.out.format(\"\
  Creation Time: %s %n\", bfa.creationTime());\nSystem.out.format(\"Last Access Time:\
  \ %s %n\", bfa.lastAccessTime());\n} catch (IOException e) {\ne.printStackTrace();\n\
  }\n}\n}\n清单 10-15.\n读取文件的基本文件属性\n```\n\n```\nSize: 119 bytes\nCreation Time: 2017-10-10T23:37:25.684588Z\n\
  Last Access Time: 2017-10-10T23:37:25.684588Z\n```\n\n您也可以使用特定的视图对象来读取文件属性。您可以使用\
  \ `Files` 类的 `getFileAttributeView()` 方法来获取特定的属性视图。如果文件属性视图类型不可用，它将返回 `null`。该方法声明如下：\n\
  \n```\nV getFileAttributeView(Path path, Class type, LinkOption... options)\n```\n\
  \n一旦您获得了特定视图类型的视图对象，就可以使用该视图对象的 `readAttributes()` 方法读取该视图类型的所有属性。请注意，并非所有视图都提供\
  \ `readAttributes()` 方法。例如，`FileOwnerAttributeView` 仅提供 `getOwner()` 方法来读取文件的属主属性。如果属性视图是可更新的，则该视图对象会提供相应的\
  \ setter 方法来更新属性。以下代码片段使用基本视图对象读取了 `luci1.txt` 文件的所有基本属性：\n\n```\n// 获取一个 Path 对象\n\
  Path path = Paths.get(\"luci1.txt\");\n// 获取基本视图\nBasicFileAttributeView bfv = Files.getFileAttributeView(path,\
  \ BasicFileAttributeView.class);\n// 通过视图读取所有基本属性\nBasicFileAttributes bfa = bfv.readAttributes();\n\
  ```\n\n基本视图允许您更新文件的最后修改时间、最后访问时间和创建时间。`setTimes()` 方法允许您更新所有这三种时间。如果您为某个时间传递 `null`\
  \ 值，则表示您不想更新该时间。您需要传递给 `setTimes()` 方法的时间是 `FileTime` 类型。\n\n清单 10-16 演示了如何使用基本文件属性视图来读取和更新基本文件属性。将\
  \ `main()` 方法中的文件路径更改为您想要读取其属性的现有文件的路径。该程序使用了文件路径 `luci1.txt`，这意味着假定 `luci1.txt`\
  \ 文件位于您的当前目录中。\n\n```\n// BasicFileAttributeViewTest.java\npackage com.jdojo.nio2;\n\
  import java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Path;\n\
  import java.nio.file.Paths;\nimport java.nio.file.attribute.BasicFileAttributeView;\n\
  import java.nio.file.attribute.BasicFileAttributes;\nimport java.nio.file.attribute.FileTime;\n\
  import java.time.Instant;\npublic class BasicFileAttributeViewTest {\npublic static\
  \ void main(String[] args) {\n// 将路径更改为指向您的文件\nPath path = Paths.get(\"luci1.txt\"\
  );\ntry {\n// 获取基本视图\nBasicFileAttributeView bfv\n= Files.getFileAttributeView(path,\
  \ BasicFileAttributeView.class);\n// 通过视图读取所有基本属性\nBasicFileAttributes bfa = bfv.readAttributes();\n\
  // 打印一些基本属性\nSystem.out.format(\"Size: %s bytes %n\", bfa.size());\nSystem.out.format(\"\
  Creation Time: %s %n\", bfa.creationTime());\nSystem.out.format(\"Last Access Time:\
  \ %s %n\", bfa.lastAccessTime());\n// 将创建时间更新为当前时间\nFileTime newLastModifiedTime\
  \ = null;\nFileTime newLastAccessTime = null;\nFileTime newCreateTime = FileTime.from(Instant.now());\n\
  // 时间为 null 表示您不想更新该时间\nbfv.setTimes(newLastModifiedTime, newLastAccessTime, newCreateTime\
  \ );\n} catch (IOException e) {\ne.printStackTrace();\n}\n}\n}\n清单 10-16.\n使用基本文件属性视图读取和更新基本文件属性\n\
  ```\n\n管理文件的属主\n\n管理文件属主有三种方式：\n\n*   使用 `Files.getOwner()` 和 `Files.setOwner()`\
  \ 方法\n*   使用 `Files.getAttribute()` 和 `Files.setAttribute()` 方法，并将 `\"owner\"` 作为属性名称\n\
  *   使用 `FileOwnerAttributeView`\n\n您需要使用 `UserPrincipal` 和 `GroupPrincipal` 接口来管理文件的属主。文件的属主可以是用户或组。`UserPrincipal`\
  \ 代表用户，而 `GroupPrincipal` 代表组。当您读取文件的属主时，您会得到一个 `UserPrincipal` 的实例。使用 `UserPrincipal`\
  \ 对象上的 `getName()` 方法可以获取用户的名称。当您想要设置文件的属主时，您需要从字符串形式的用户名中获取 `UserPrincipal` 对象。要从文件系统中获取\
  \ `UserPrincipal`，您需要使用 `UserPrincipalLookupService` 类的实例，您可以通过 `FileSystem` 类的\
  \ `getUserPrincipalLookupService()` 方法获取该实例。以下代码片段为用户 ID 是 `ksharan` 的用户获取了一个 `UserPrincipal`\
  \ 对象：\n\n```\nFileSystem fs = FileSystems.getDefault();\nUserPrincipalLookupService\
  \ upls = fs.getUserPrincipalLookupService();\n// 如果用户 ksharan 不存在，则抛出 UserPrincipalNotFoundException\
  \ 异常\nUserPrincipal user = upls.lookupPrincipalByName(\"ksharan\");\nSystem.out.format(\"\
  User principal name is %s%n\", user.getName());\n```\n\n您可以在前面的代码片段中使用方法链来避免中间变量。\n\
  \n```\nUserPrincipal user = FileSystems.getDefault()\n.getUserPrincipalLookupService()\n\
  .lookupPrincipalByName(\"ksharan\");\nSystem.out.format(\"User principal name is\
  \ %s%n\", user.getName());\n```\n\n\n\n用户主体查找服务是文件系统的一个可选操作。当文件系统不支持该服务时，你需要处理抛出的\
  \ `UnsupportedOperationException`。\n\n要获取 `GroupPrincipal` 实例，请使用用户主体查找服务的 `lookupPrincipalByGroupName()`\
  \ 方法。一旦你获得了代表文件所有者的 `UserPrincipal` 或 `GroupPrincipal` 实例，就可以使用本节开头描述的三种方法中的任何一种来更新文件的所有者。\n\
  \n清单 10-17 演示了如何使用 `FileOwnerAttributeView` 读取和更新文件的所有者。在运行程序之前，请将 `main()` 方法中的文件路径更改为你机器上现有的文件。该程序使用\
  \ `brice` 作为文件的新用户。请将新用户 ID 更改为你机器上存在的用户。如果你机器上不存在该用户，可能会收到 `UserPrincipalNotFoundException`\
  \ 异常。运行程序时，你可能会得到不同的输出。\n\n```\n// FileOwnerManagement.java\npackage com.jdojo.nio2;\n\
  import java.io.IOException;\nimport java.nio.file.FileSystem;\nimport java.nio.file.FileSystems;\n\
  import java.nio.file.Files;\nimport java.nio.file.Path;\nimport java.nio.file.Paths;\n\
  import java.nio.file.attribute.FileOwnerAttributeView;\nimport java.nio.file.attribute.UserPrincipal;\n\
  import java.nio.file.attribute.UserPrincipalLookupService;\npublic class FileOwnerManagement\
  \ {\npublic static void main(String[] args) throws IOException {\ntry {\n// 将文件路径更改为你机器上现有的文件\n\
  Path path = Paths.get(\"luci1.txt\");\nFileOwnerAttributeView foav\n= Files.getFileAttributeView(path,\
  \ FileOwnerAttributeView.class);\nUserPrincipal owner = foav.getOwner();\nSystem.out.format(\"\
  文件 %s 的原始所有者是 %s%n\", path, owner.getName());\nFileSystem fs = FileSystems.getDefault();\n\
  UserPrincipalLookupService upls = fs.getUserPrincipalLookupService();\n// 将文件所有者更改为\
  \ brice\nUserPrincipal newOwner = upls.lookupPrincipalByName(\"brice\");\nfoav.setOwner(newOwner);\n\
  UserPrincipal changedOwner = foav.getOwner();\nSystem.out.format(\"文件 %s 的新所有者是\
  \ %s%n\", path, changedOwner.getName());\n} catch (UnsupportedOperationException\
  \ | IOException e) {\ne.printStackTrace();\n}\n}\n}\n清单 10-17. 使用 FileOwnerAttributeView\
  \ 更改文件所有者\n```\n\n```\n文件 luci1.txt 的原始所有者是 kishori\\ksharan\n文件 luci1.txt 的新所有者是\
  \ kishori\\brice\n```\n\n以下代码片段使用 `Files.setOwner()` 方法更新由 `luci1.txt` 路径标识的文件的所有者：\n\
  \n```\nUserPrincipal owner = /* 获取所有者 */;\nPath path = Paths.get(\"luci1.txt\");\n\
  Files.setOwner(path, owner);\n```\n\n管理 ACL 文件权限\n\n在本节中，我将介绍如何使用 `AclFileAttributeView`\
  \ 管理文件权限。请注意，ACL 类型的文件属性在 Microsoft Windows 上受支持。ACL 由有序的访问控制条目列表组成。每个条目包含一个 `UserPrincipal`、访问类型以及对该对象的访问级别。在\
  \ NIO.2 中，`AclEntry` 类的实例表示 ACL 中的一个条目。你可以使用 `AclFileAttributeView` 的 `getAcl()`\
  \ 和 `setAcl()` 方法获取和设置文件的 `List` 类型的 `AclEntry`。以下代码片段获取当前目录中名为 `luci1.txt` 的文件的\
  \ ACL 条目列表：\n\n```\nPath path = Paths.get(\"luci1.txt\");\nAclFileAttributeView\
  \ view = Files.getFileAttributeView(path, AclFileAttributeView.class);\nList aclEntries\
  \ = view.getAcl();\n```\n\n`AclEntry` 类具有读取 ACL 条目各种属性的方法。其 `principal()` 方法返回用于标识用户或组的\
