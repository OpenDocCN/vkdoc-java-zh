  \n`FileInputStream` 允许你从文件中读取数据，而 `FileOutputStream` 允许你将数据写入文件。随机访问文件是两者的结合。使用随机访问文件，你既可以读取文件，也可以写入文件。使用文件输入和输出流进行读写是顺序过程。而使用随机访问文件，你可以在文件中的任意位置进行读取或写入，因此得名“随机访问”。\n\
  \n`RandomAccessFile` 类的对象实现了随机文件访问。它允许你从文件读取/向文件写入字节以及所有基本类型的值。它还允许你使用其 `readUTF()`\
  \ 和 `writeUTF()` 方法处理字符串。`RandomAccessFile` 类不属于 `InputStream` 和 `OutputStream`\
  \ 类的类层次结构。\n\n随机访问文件可以以四种不同的访问模式创建。你需要在构造函数中提供其中一种访问模式。访问模式的值是一个字符串。它们列举如下：\n\n\
  *   `\"r\"`：以只读模式打开文件。如果尝试在此模式下写入文件，将收到 `IOException`。\n*   `\"rw\"`：以读写模式打开文件。如果文件不存在，则会创建该文件。\n\
  *   `\"rws\"`：与 `\"rw\"` 模式相同，不同之处在于对文件内容及其元数据的任何修改都会立即写入存储设备。\n*   `\"rwd\"`：与\
  \ `\"rw\"` 模式相同，不同之处在于对文件内容的任何修改都会立即写入存储设备。\n\n通过指定文件名和访问模式来创建 `RandomAccessFile`\
  \ 类的实例，如下所示：\n\n```\nRandomAccessFile raf = new RandomAccessFile(\"randomtest.txt\"\
  , \"rw\");\n```\n\n随机访问文件有一个文件指针，当你从中读取数据或向其写入数据时，该指针会前进。文件指针是一种光标，指示下一次读取或写入将从何处开始。其值表示光标距离文件开头的字节数。你可以使用\
  \ `getFilePointer()` 方法获取文件指针的值。当你创建 `RandomAccessFile` 类的对象时，文件指针被设置为零，表示文件的开头。你可以使用\
  \ `seek()` 方法将文件指针设置在文件中的特定位置。\n\n`RandomAccessFile` 的 `length()` 方法返回文件的当前长度。你可以使用\
  \ `setLength()` 方法来扩展或截断文件。如果使用此方法扩展文件，则文件扩展部分的内容是未定义的。\n\n对随机访问文件的读写操作，与你对任何输入和输出流进行读写的方式相同。清单\
  \ 7-36 演示了随机访问文件的使用。当你运行此程序时，它会向文件写入两样东西：文件读取计数器（用于跟踪此程序读取文件的次数）和一条文本消息 `\"Hello\
  \ World!\"`。程序每次读取文件时，都会递增文件中的计数器值。当你重复运行此程序时，计数器值会不断递增。每次运行此程序时，你可能会得到不同的输出。\n\n\
  ```\n// RandomAccessFileReadWrite.java\npackage com.jdojo.io;\nimport java.io.File;\n\
  import java.io.IOException;\nimport java.io.RandomAccessFile;\npublic class RandomAccessFileReadWrite\
  \ {\npublic static void main(String[] args) throws IOException {\nString fileName\
  \ = \"randomaccessfile.txt\";\nFile fileObject = new File(fileName);\nif (!fileObject.exists())\
  \ {\ninitialWrite(fileName);\n}\n// 读取文件两次\nreadFile(fileName);\nreadFile(fileName);\n\
  }\npublic static void readFile(String fileName) throws IOException {\n// 以读写模式打开文件\n\
  try (RandomAccessFile raf = new RandomAccessFile(fileName, \"rw\")) {\nint counter\
  \ = raf.readInt();\nString msg = raf.readUTF();\nSystem.out.println(\"文件读取计数器：\"\
  \ + counter);\nSystem.out.println(\"文件文本：\" + msg);\nSystem.out.println(\"----------------------------\"\
  );\n// 将文件读取计数器递增 1\nincrementReadCounter(raf);\n}\n}\npublic static void incrementReadCounter(RandomAccessFile\
  \ raf) throws IOException {\n// 读取当前文件指针位置，以便最后恢复它\nlong currentPosition = raf.getFilePointer();\n\
  // 将文件指针设置在开头\nraf.seek(0);\n// 读取计数器并将其递增 1\nint counter = raf.readInt();\ncounter++;\n\
  // 再次将文件指针设置为零，以覆盖计数器的值\nraf.seek(0);\nraf.writeInt(counter);\n// 恢复文件指针\nraf.seek(currentPosition);\n\
  }\npublic static void initialWrite(String fileName) throws IOException {\n// 将文件读取计数器写为零。以读写模式打开文件。\n\
  try (RandomAccessFile raf = new RandomAccessFile(fileName, \"rw\")) {\n// 将文件读取计数器写为零\n\
  raf.writeInt(0);\n// 写入一条消息\nraf.writeUTF(\"Hello world!\");\n}\n}\n}\n文件读取计数器：0\n\
  文件文本：Hello world!\n\n文件读取计数器：1\n文件文本：Hello world!\n\n清单 7-36.\n使用 RandomAccessFile\
  \ 对象读写文件\n```\n\n复制文件内容\n\n了解了输入和输出流之后，编写将文件内容复制到另一个文件的代码就很简单了。你需要使用基于字节的输入和输出流（`InputStream`\
  \ 和 `OutputStream` 对象），这样你的文件复制程序才能适用于所有类型的文件。复制文件的主要逻辑是持续从输入流读取数据直到文件末尾，并在从输入流读取数据的同时持续向输出流写入数据。以下代码片段展示了这种文件复制逻辑：\n\
  \n```\n// 复制文件内容\nint count = -1;\nbyte[] buffer = new byte[1024];\nwhile ((count\
  \ = in.read(buffer)) != -1) {\nout.write(buffer, 0, count);\n}\n```\n\n从 JDK9 开始，你可以使用\
  \ `InputStream` 类的 `transferTo(OutputStream out)` 方法将文件内容复制到另一个文件。以下代码片段将 `luci1.txt`\
  \ 文件的内容复制到 `luci1_copy.txt` 文件。异常处理逻辑未显示。\n\n```\nFileInputStream fis = new FileInputStream(\"\
  luci1.txt\");\nFileOutputStream fos = new FileOutputStream(\"luci1_copy.txt\");\n\
  fis.transferTo(fos);\nfos.close();\nfis.close();\n```\n\n提示\n\n\n\n文件复制逻辑仅复制文件的内容。你需要编写逻辑来复制文件的属性。第\
  \ 10 章介绍的 NIO 2.0 API 在 `java.nio.file.Files` 类中提供了一个 `copy()` 方法，用于将文件的内容和属性复制到另一个文件。请使用\
  \ `Files.copy()` 方法来复制文件。\n\n标准输入/输出/错误流\n\n标准输入设备是由操作系统定义和控制的设备，你的 Java 程序可以从中接收输入。类似地，标准输出和错误是其他由操作系统定义（和控制）的设备，你的程序可以向其发送输出。通常，键盘是标准输入设备，而显示器则充当标准输出和标准错误设备。图\
  \ 7-10 描述了标准输入、输出和错误设备与 Java 程序之间的交互。\n\n![A323070_2_En_7_Fig10_HTML.gif](img/A323070_2_En_7_Fig10_HTML.gif)\n\
  \n图 7-10.\n\nJava 程序与标准输入、输出和错误设备之间的交互\n\n当你使用以下语句打印消息时会发生什么？\n\n```\nSystem.out.println(\"\
  这条消息将发送到标准输出设备！\");\n```\n\n通常，你的消息会打印在控制台上。在这种情况下，显示器是标准输出设备，Java 程序允许你通过调用高级的\
  \ `println()` 方法将一些数据发送到标准输出设备。你在上一节中看到了类似的 `println()` 方法调用，当时你使用了 `PrintStream`\
  \ 类，它是 `OutputStream` 类家族中的一个具体装饰器类。Java 使得与计算机上的标准输出设备交互变得更加容易。它创建了一个 `PrintStream`\
  \ 类的对象，并通过 `System` 类中一个名为 `out` 的公共静态变量让你访问它。查看 `System` 类的代码；它声明了三个公共静态变量（分别对应标准输入、输出和错误设备），如下所示：\n\
  \n```\npublic class System {\npublic static PrintStream out; // 标准输出\npublic static\
  \ InputStream in;  // 标准输入\npublic static PrintStream err; // 标准错误\n// 此处为 System\
  \ 类的更多代码\n}\n```\n\nJVM 会将这三个变量初始化为适当的值。你可以在任何可以使用 `OutputStream` 对象的地方使用 `System.out`\
  \ 和 `System.err` 对象引用。你可以在任何可以使用 `InputStream` 对象的地方使用 `System.in` 对象。\n\nJava 还允许你以另一种方式使用\
  \ `System` 类中的这三个对象。如果你不希望这三个对象代表标准输入、输出和错误设备，你可以提供你自己的设备；Java 会将数据流重定向到你的设备或从你的设备接收数据流。\n\
  \n假设，每当你调用 `System.out.println()` 方法在控制台上打印消息时，你希望将所有消息发送到一个文件而不是控制台。你可以非常轻松地做到这一点。毕竟，`System.out`\
  \ 只是一个 `PrintStream` 对象，并且你知道如何使用 `FileOutputStream` 对象创建一个 `PrintStream` 对象（参考清单\
  \ 7-20）来写入文件。`System` 类提供了三个静态设置方法：`setOut()`、`setIn()` 和 `setErr()`，用于用你自己的设备替换这三个标准设备。要将所有标准输出重定向到一个文件，你需要调用\
  \ `setOut()` 方法，并传入一个代表你文件的 `PrintStream` 对象。如果你想将输出重定向到当前目录中名为 `stdout.txt` 的文件，可以通过执行以下代码来实现：\n\
  \n```\n// 将所有标准输出重定向到 stdout.txt 文件\nPrintStream ps = new PrintStream(new FileOutputStream(\"\
  stdout.txt\"));\nSystem.setOut(ps);\n```\n\n清单 7-37 演示了如何将标准输出重定向到一个文件。你可能会在控制台上看到不同的输出。运行此程序后，你将在当前工作目录的\
  \ `stdout.txt` 文件中看到以下两条消息：\n\n```\nHello world!\nJava I/O is cool!\n```\n\n当你运行程序时，可能会得到不同的输出，因为它会使用你的当前工作目录打印\
  \ `stdout.txt` 文件的路径。\n\n```\n// CustomStdOut.java\npackage com.jdojo.io;\nimport\
  \ java.io.PrintStream;\nimport java.io.FileOutputStream;\nimport java.io.File;\n\
  public class CustomStdOut {\npublic static void main(String[] args) throws Exception\
  \ {\n// 为文件 stdout.txt 创建一个 PrintStream\nFile outFile = new File(\"stdout.txt\"\
  );\nPrintStream ps = new PrintStream(new FileOutputStream(outFile));\n// 在控制台上打印一条消息\n\
  System.out.println(\"消息将被重定向到 \"\n+ outFile.getAbsolutePath());\n// 将标准输出设置为该文件\n\
  System.setOut(ps);\n// 以下消息将被发送到 stdout.txt 文件\nSystem.out.println(\"Hello world!\"\
  );\nSystem.out.println(\"Java I/O is cool!\");\n}\n}\n消息将被重定向到 C:\\Java9LanguageFeatures\\\
  stdout.txt\n清单 7-37.\n将标准输出重定向到文件\n```\n\n通常，你使用 `System.out.println()` 调用来记录调试消息。假设你在整个应用程序中都使用了这个语句，而现在到了将应用程序部署到生产环境的时候了。如果你不从程序中移除调试代码，它将会持续在用户的控制台上打印消息。你没有时间遍历所有代码来移除调试代码。你能想到一个简单的解决方案吗？有一个简单的解决方案可以吞掉你所有的调试消息。你可以像在清单\
  \ 7-37 中那样，将调试消息重定向到一个文件。另一个解决方案是在 `OutputStream` 类家族中创建你自己的具体组件类。我们将这个新类命名为 `DummyStandardOutput`，如清单\
  \ 7-38 所示。\n\n```\n// DummyStandardOutput.java\npackage com.jdojo.io;\nimport java.io.OutputStream;\n\
  import java.io.IOException;\npublic class DummyStandardOutput extends OutputStream\
  \ {\n@Override\npublic void write(int b) throws IOException {\n// 不执行任何操作。吞掉所有写入的数据\n\
  }\n}\n清单 7-38.\n一个将吞掉所有写入数据的虚拟输出流类\n```\n\n你需要让 `DummyStandardOutput` 类继承自 `OutputStream`\
  \ 类。你唯一需要编写的代码是重写 `write(int b)` 方法，并且在该方法中不执行任何操作。然后，通过包装新类的对象创建一个 `PrintStream`\
  \ 对象，并使用 `System.setOut()` 方法将其设置为标准输出，如清单 7-39 所示。如果你不想创建一个新类，你可以使用匿名类来实现相同的结果，如下所示：\n\
  \n```\nSystem.setOut(new PrintStream(new OutputStream() {\n@Override\npublic void\
  \ write(int b) {\n// 不执行任何操作\n}\n}));\n```\n\n```\n// SwallowOutput.java\npackage\
  \ com.jdojo.io;\nimport java.io.PrintStream;\npublic class SwallowOutput {\npublic\
  \ static void main(String[] args) {\nPrintStream ps = new PrintStream(new DummyStandardOutput());\n\
  // 设置虚拟标准输出\nSystem.setOut(ps);\n// 以下消息不会发送到任何地方\nSystem.out.println(\"Hello world!\"\
  );\nSystem.out.println(\"有人在听吗？\");\nSystem.out.println(\"不。我们都在打盹！！！\");\n}\n}\n\
  （不会打印任何输出。）\n清单 7-39.\n吞掉所有发送到标准输出的数据\n```\n\n\n\n你可以使用 `System.in` 对象从标准输入设备（通常是键盘）读取数据。你也可以将\
  \ `System.in` 对象设置为从你选择的任何其他 `InputStream` 对象（例如文件）读取数据。你可以使用 `InputStream` 类的 `read()`\
  \ 方法从该流中读取字节。`System.in.read()` 每次从键盘读取一个字节。请注意，`InputStream` 类的 `read()` 方法会阻塞，直到有数据可供读取。当用户输入数据并按下回车键时，输入的数据变为可用，`read()`\
  \ 方法每次返回一个字节的数据。读取的最后一个字节将表示一个换行符。当你从输入设备读取到换行符时，应停止进一步读取，否则 `read()` 调用将阻塞，直到用户输入更多数据并再次按下回车键。清单\
  \ 7-40 演示了如何读取使用键盘输入的数据。\n\n```\n// EchoStdin.java\npackage com.jdojo.io;\nimport\
  \ java.io.IOException;\npublic class EchoStdin {\npublic static void main(String[]\
  \ args) throws IOException {\n// 提示用户输入一条消息\nSystem.out.print(\"请输入一条消息并按回车键：\"\
  );\n// 显示用户输入的任何内容\nint c;\nwhile ((c = System.in.read()) != '\\n') {\nSystem.out.print((char)\
  \ c);\n}\n}\n}\n清单 7-40.\n从标准输入设备读取\n```\n\n由于 `System.in` 是 `InputStream` 的一个实例，你可以使用任何具体的装饰器从键盘读取数据；例如，你可以创建一个\
  \ `BufferedReader` 对象，并一次一行地从键盘读取数据作为字符串。清单 7-41 演示了如何将 `System.in` 对象与 `BufferedReader`\
  \ 一起使用。请注意，这种情况正是你需要使用 `InputStreamReader` 类从基于字节的流（`System.in`）获取基于字符的流（`BufferedReader`）的时候。该程序会持续提示用户输入一些文本，直到用户输入\
  \ `Q` 或 `q` 退出程序。\n\n```\n// EchoBufferedStdin.java\npackage com.jdojo.io;\nimport\
  \ java.io.BufferedReader;\nimport java.io.InputStreamReader;\nimport java.io.IOException;\n\
  public class EchoBufferedStdin {\npublic static void main(String[] args) throws\
  \ IOException {\n// 获取一个 BufferedReader，它包装了 System.in 对象。注意使用了\n// InputStreamReader，这是基于字节的流和基于字符的流之间的桥梁类\n\
  BufferedReader br = new BufferedReader(new InputStreamReader(System.in));\nString\
  \ text;\nwhile (true) {\n// 提示用户输入一些文本\nSystem.out.print(\"请输入一条消息（按 Q/q 退出）\"\n\
  + \"并按回车键：\");\n// 读取文本\ntext = br.readLine();\nif (text.equalsIgnoreCase(\"q\"\
  )) {\nSystem.out.println(\"您已决定退出程序\");\nbreak;\n} else {\nSystem.out.println(\"\
  您输入的是：\" + text);\n}\n}\n}\n}\n清单 7-41.\n将 System.in 与 BufferedReader 一起使用\n```\n\
  \n如果你希望标准输入来自文件，你必须创建一个输入流对象来表示该文件，并使用 `System.setIn()` 方法设置该对象，如下所示：\n\n```\nFileInputStream\
  \ fis = new FileInputStream(\"stdin.txt\");\nSystem.setIn(fis); // 现在 System.in.read()\
  \ 将从 stdin.txt 文件读取\n```\n\n标准错误设备（通常是控制台）用于显示错误消息。在你的程序中使用它与使用标准输出设备相同。Java 提供了另一个名为\
  \ `System.err` 的 `PrintStream` 对象，而不是用于标准输出设备的 `System.out`。你可以如下使用它：\n\n```\nSystem.err.println(\"\
  这是一条错误消息。\");\n```\n\n控制台和 Scanner 类\n\n尽管 Java 提供了三个对象来表示标准输入、输出和错误设备，但使用它们从标准输入读取数字并不容易。`Console`\
  \ 类的目的是使 Java 程序与控制台之间的交互更加容易。我将在本节讨论 `Console` 类。我还将讨论用于解析从控制台读取的文本的 `Scanner`\
  \ 类。\n\n`Console` 类是 `java.io` 包中的一个实用类，它提供对与 JVM 关联的系统控制台（如果有）的访问。并非在所有机器上的 Java\
  \ 程序中都能保证访问控制台。例如，如果你的 Java 程序作为服务运行，则不会有控制台与 JVM 关联，你也就无法访问它。你可以通过使用 `System` 类的\
  \ `static console()` 方法获取 `Console` 类的实例，如下所示：\n\n```\nConsole console = System.console();\n\
  if (console != null) {\nconsole.printf(\"控制台可用。\");\n}\n```\n\n`Console` 类包含一个 `printf()`\
  \ 方法，用于在控制台上显示格式化字符串。`PrintStream` 类中也有一个 `printf()` 方法用于写入格式化数据。有关使用 `printf()`\
  \ 方法以及如何使用 `Formatter` 类格式化文本、数字和日期的更多详细信息，请参阅本系列第一卷的第 17 章。\n\n清单 7-42 演示了如何使用\
  \ `Console` 类。如果控制台不可用，它会打印一条消息并退出。如果你使用 NetBeans 等 IDE 运行此程序，控制台可能不可用。请尝试使用命令提示符运行此程序。该程序提示用户输入用户名和密码。如果用户输入密码\
  \ letmein，程序会打印一条消息。否则，它会打印密码无效。该程序使用 `readLine()` 方法从控制台读取一行文本，并使用 `readPassword()`\
  \ 方法读取密码。当用户输入密码时，密码不可见；程序以字符数组的形式接收密码。\n\n```\n// ConsoleLogin.java\npackage com.jdojo.io;\n\
  import java.io.Console;\npublic class ConsoleLogin {\npublic static void main(String[]\
  \ args) {\nConsole console = System.console();\nif (console != null) {\nconsole.printf(\"\
  控制台可用。%n\");\n} else {\nSystem.out.println(\"控制台不可用。%n\");\nreturn; // 控制台不可用\n\
  }\nString userName = console.readLine(\"用户名：\");\nchar[] passChars = console.readPassword(\"\
  密码：\");\nString passString = new String(passChars);\nif (passString.equals(\"letmein\"\
  )) {\nconsole.printf(\"你好 %s\", userName);\n} else {\nconsole.printf(\"无效密码\");\n\
  }\n}\n}\n清单 7-42.\n使用 Console 类输入用户名和密码\n```\n\n如果你想从标准输入读取数字，你必须将其作为字符串读取，然后解析为数字。`java.util`\
  \ 包中的 `Scanner` 类根据模式读取并解析文本，将其转换为基本类型和字符串。文本源可以是 `InputStream`、文件、`String` 对象或\
  \ `Readable` 对象。你可以使用 `Scanner` 从标准输入 `System.in` 读取基本类型值。它包含许多方法，这些方法命名为 `hasNextXxx()`\
  \ 和 `nextXxx()`，其中 `Xxx` 是一种数据类型，例如 `int`、`double` 等。`hasNextXxx()` 方法检查源中的下一个标记是否可以被解释为\
  \ `Xxx` 类型的值。`nextXxx()` 方法返回特定数据类型的值。\n\n清单 7-43 演示了如何通过构建一个执行加法、减法、乘法和除法的简易计算器来使用\
  \ `Scanner` 类。\n\n\n\n```\n// Calculator.java\npackage com.jdojo.io;\nimport java.util.Scanner;\n\
  public class Calculator {\npublic static void main(String[] args) {\n// 从控制台读取三个标记：操作数-1\
  \ 运算符 操作数-2\nString msg = \"您可以计算一个算术表达式。\\n\"\n+ \"表达式必须采用以下格式：a op b\\n\"\n+ \"\
  a 和 b 是两个数字，op 是 +、-、* 或 /。\"\n+ \"\\n 请输入一个表达式并按回车键：\";\nSystem.out.print(msg);\n\
  // 为标准输入构建一个扫描器\nScanner scanner = new Scanner(System.in);\ntry {\ndouble n1 = scanner.nextDouble();\n\
  String operation = scanner.next();\ndouble n2 = scanner.nextDouble();\ndouble result\
  \ = calculate(n1, n2, operation);\nSystem.out.printf(\"%s %s %s = %.2f%n\", n1,\n\
  operation, n2, result);\n} catch (Exception e) {\nSystem.out.println(\"无效的表达式。\"\
  );\n}\n}\npublic static double calculate(double op1, double op2, String operation)\
  \ {\nswitch (operation) {\ncase \"+\":\nreturn op1 + op2;\ncase \"-\":\nreturn op1\
  \ - op2;\ncase \"*\":\nreturn op1 * op2;\ncase \"/\":\nreturn op1 / op2;\n}\nreturn\
  \ Double.NaN;\n}\n}\n您可以计算一个算术表达式。\n表达式必须采用以下格式：a op b\na 和 b 是两个数字，op 是 +、-、* 或\
  \ /。\n请输入一个表达式并按回车键：10 + 19\n10.0 + 19.0 = 29.00\n清单 7-43.\n使用 Scanner 类从标准输入读取输入\n\
  ```\n\nStringTokenizer 和 StreamTokenizer\n\nJava 提供了一些实用类，可以将字符串分解为称为标记的部分。在此上下文中，标记是字符串的一部分。您通过定义分隔符字符来定义被视为标记的字符序列。假设您有一个字符串“This\
  \ is a test, which is simple”。如果您将空格定义为分隔符，则该字符串包含七个标记：\n\n*   This\n\n*   is\n\n\
  *   a\n\n*   test,\n\n*   which\n\n*   is\n\n*   simple\n\n如果您将逗号定义为分隔符，则同一个字符串包含两个标记：\n\
  \n*   This is a test\n\n*   which is simple\n\n`StringTokenizer` 类位于 `java.util`\
  \ 包中。`StreamTokenizer` 类位于 `java.io` 包中。`StringTokenizer` 允许您将字符串分解为标记，而 `StreamTokenizer`\
  \ 则允许您访问基于字符的流中的标记。\n\n`StringTokenizer` 对象允许您根据自己定义的分隔符将字符串分解为标记。它一次返回一个标记。您还可以随时更改分隔符。您可以通过指定字符串并接受默认分隔符（即空格、制表符、换行符、回车符和换页符（`\"\
  \ \\t\\n\\r\\f\"`））来创建 `StringTokenizer`，如下所示：\n\n```\n// 创建一个字符串标记生成器\nStringTokenizer\
  \ st = new StringTokenizer(\"here is my string\");\n```\n\n您可以在创建 `StringTokenizer`\
  \ 时指定自己的分隔符，如下所示：\n\n```\n// 将空格、逗号和分号作为分隔符\nString delimiters = \" ,;\";\nStringTokenizer\
  \ st = new StringTokenizer(\"my text...\", delimiters);\n```\n\n您可以使用 `hasMoreTokens()`\
  \ 方法检查是否还有更多标记，并使用 `nextToken()` 方法从字符串中获取下一个标记。\n\n您还可以使用 `String` 类的 `split()`\
  \ 方法根据分隔符将字符串拆分为标记。`split()` 方法接受一个正则表达式作为分隔符。清单 7-44 演示了如何使用 `StringTokenizer`\
  \ 和 `String` 类的 `split()` 方法。\n\n```\n// StringTokens.java\npackage com.jdojo.io;\n\
  import java.util.StringTokenizer;\npublic class StringTokens {\npublic static void\
  \ main(String[] args) {\nString str = \"This is a test, which is simple\";\nString\
  \ delimiters = \" ,\"; // 一个空格和一个逗号\nStringTokenizer st = new StringTokenizer(str,\
  \ delimiters);\nSystem.out.println(\"使用 StringTokenizer 的标记：\");\nwhile (st.hasMoreTokens())\
  \ {\nString token = st.nextToken();\nSystem.out.println(token);\n}\n// 使用 String.split()\
  \ 方法拆分同一个字符串\nSystem.out.println(\"\\n 使用 String.split() 方法的标记：\");\nString regex\
  \ = \"[ ,]+\"; // 一个空格或一个逗号\nString[] s = str.split(regex);\nfor (String item :\
  \ s) {\nSystem.out.println(item);\n}\n}\n}\n使用 StringTokenizer 的标记：\nThis\nis\n\
  a\ntest\nwhich\nis\nsimple\n使用 String.split() 方法的标记：\nThis\nis\na\ntest\nwhich\n\
  is\nsimple\n清单 7-44.\n使用 StringTokenizer 和 String.split() 方法将字符串分解为标记\n```\n\n`StringTokenizer`\
  \ 和 `String` 类的 `split()` 方法都将每个标记作为字符串返回。有时您可能希望根据标记的类型来区分它们；您的字符串可能包含注释。在使用 `StreamTokenizer`\
  \ 类将基于字符的流分解为标记时，您可以拥有这些高级功能。清单 7-45 演示了如何使用 `StreamTokenizer`。\n\n```\n// StreamTokenTest.java\n\
  package com.jdojo.io;\nimport java.io.StreamTokenizer;\nimport static java.io.StreamTokenizer.*;\n\
  import java.io.StringReader;\nimport java.io.IOException;\npublic class StreamTokenTest\
  \ {\npublic static void main(String[] args) throws Exception {\nString str = \"\
  This is a test, 200.89 which is simple 50\";\nStringReader sr = new StringReader(str);\n\
  StreamTokenizer st = new StreamTokenizer(sr);\ntry {\nwhile (st.nextToken() != TT_EOF)\
  \ {\nswitch (st.ttype) {\ncase TT_WORD:\n/* 已读取一个单词 */\nSystem.out.println(\"字符串值：\"\
  \n+ st.sval);\nbreak;\ncase TT_NUMBER:\n/* 已读取一个数字 */\nSystem.out.println(\"数字值：\"\
  \n+ st.nval);\nbreak;\n}\n}\n} catch (IOException e) {\ne.printStackTrace();\n}\n\
  }\n}\n字符串值：This\n字符串值：is\n字符串值：a\n字符串值：test\n数字值：200.89\n字符串值：which\n字符串值：is\n字符串值：simple\n\
  数字值：50.0\n清单 7-45.\n从基于字符的流中读取标记\n```\n\n该程序使用 `StringReader` 对象作为数据源。您可以使用 `FileReader`\
  \ 对象或任何其他 `Reader` 对象作为数据源。获取标记的语法并不容易使用。`StreamTokenizer` 的 `nextToken()` 方法被重复调用。它会填充\
  \ `StreamTokenizer` 对象的三个字段：`ttype`、`sval` 和 `nval`。`ttype` 字段指示已读取的标记的类型。以下是 `ttype`\
  \ 字段的四个可能值：\n\n*   `TT_EOF`：已到达流的末尾。\n\n*   `TT_EOL`：已到达行尾。\n\n*   `TT_WORD`：已从流中读取一个单词（字符串）作为标记。\n\
  \n*   `TT_NUMBER`：已从流中读取一个数字作为标记。\n\n如果 `ttype` 等于 `TT_WORD`，则字符串值存储在 `sval` 字段中。如果\
  \ `ttype` 是 `TT_NUMBER`，则数字值存储在 `nval` 字段中。\n\n`StreamTokenizer` 是一个功能强大的类，用于将流分解为标记。它基于预定义的语法创建标记。您可以使用其\
  \ `resetSyntax()` 方法重置整个语法。您可以使用其 `wordChars()` 方法指定自己的可以构成单词的字符集。您可以使用其 `whitespaceChars()`\
  \ 方法指定自定义的空白字符。\n\n总结\n\n从数据源读取数据以及向数据接收器写入数据称为输入/输出。流代表用于串行读取或写入的数据源或数据接收器。Java\
  \ I/O API 包含多个类来支持输入和输出流。Java I/O 类位于 `java.io` 和 `java.nio` 包中。Java 中的输入/输出流类基于装饰器模式。\n\
  \n\n\n你通过路径名引用计算机中的文件。文件的路径名是一个字符序列，通过它你可以在文件系统中唯一地标识该文件。路径名由文件名及其在文件系统中的唯一位置组成。`File`\
  \ 类的对象是文件或目录路径名的抽象表示，且与平台无关。`File` 对象所表示的路径名在文件系统中可能存在，也可能不存在。`File` 类提供了多种用于操作文件和目录的方法。\n\
  \nJava I/O 支持两种类型的流：基于字节的流和基于字符的流。基于字节的流继承自 `InputStream` 或 `OutputStream` 类。基于字符的流类继承自\
  \ `Reader` 或 `Writer` 类。\n\n将内存中的对象转换为字节序列，并将该字节序列存储在文件等存储介质中的过程称为**对象序列化**。读取序列化过程产生的字节序列，并将对象恢复回内存的过程称为**对象反序列化**。Java\
  \ 通过 `ObjectInputStream` 和 `ObjectOutputStream` 类支持对象的序列化和反序列化。一个对象必须实现 `Serializable`\
  \ 接口才能被序列化。\n\nJava I/O API 提供了 `Console` 和 `Scanner` 类来与控制台交互。\n\n你可以使用 `StringTokenizer`\
  \ 和 `StreamTokenizer` 类根据分隔符将文本分割成标记。`String` 类包含一个便捷的 `split()` 方法，用于根据正则表达式将字符串分割成标记。\n\
