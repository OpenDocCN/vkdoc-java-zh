  new BQProducer(queue, \"Producer1\").start();\nnew BQConsumer(queue, \"Consumer1\"\
  ).start();\nnew BQConsumer(queue, \"Consumer2\").start();\n}\n}\n清单 12-23.\n运行生产者/消费者程序的类\n\
  ```\n\n```\nConsumer2 is trying to take an element. Remaining capacity: 5\nConsumer1\
  \ is trying to take an element. Remaining capacity: 5\nProducer1 is trying to add:\
  \ Producer1-1\\. Remaining capacity: 5\nConsumer2 took: Producer1-1\nProducer1 added:\
  \ Producer1-1\nConsumer2 is trying to take an element. Remaining capacity: 5\nProducer1\
