- "# 其他 VM.* 选项已省略\nhelp\n清单 9-22\n在一个正在执行繁重工作的 Java 进程上执行 jcmd [pid] help 的输出\n```\n\
  \n本书的目标并非涵盖所有命令选项，因为它们属于 Java 的高级特性，但你应该对每个命令的适用范围有一个基本了解。例如，清单 9-23 显示了调用 `jcmd\
  \ 51301 GC.heap_info` 的输出。\n\n```\n> jcmd 74828 GC.heap_info\n74828:\ngarbage-first\
  \ heap   total reserved 8388608K, committed 1368064K, used 460069K [0x0000000600000000,\
  \ 0x0000000800000000)\nregion size 4096K, 2 young (8192K), 1 survivors (4096K)\n\
  Metaspace       used 6551K, committed 6848K, reserved 1114112K\nclass space    used\
  \ 887K, committed 1024K, reserved 1048576K\n清单 9-23\n在一个正在执行繁重工作的 Java 进程上执行 jcmd\
  \ [pid] GC.heap_info 的输出\n\n回顾**第** **5** **章**中 JVM 使用的不同类型的内存，以及 **堆** 是存储应用程序使用的所有对象的内存。此命令打印堆的详细信息，包括已使用多少、已保留多少、区域大小等。所有这些详细信息将在**第**\
  \ **13** **章**中更详细地介绍。\n\n\n\n#### jconsole\n\n**jconsole** 是一款 JDK 工具，可通过其基础图形界面检查各种\
  \ JVM 统计信息。要使用 `jconsole`，只需从命令行启动它，并将其连接到一个正在运行的 Java 应用程序。该工具非常实用，因为它既可以监控本地 JVM，也可以监控远程\
  \ JVM。它还能监控和管理应用程序。应用程序必须暴露一个端口供 `jconsole` 连接。\n\n要启动一个 Java 应用程序并暴露端口供外部应用连接，只需使用以下\
  \ VM 参数启动该应用程序：\n\n```\n-agentlib:jdwp=transport=dt_socket,server=y,suspend=y,address=1044\n\
  ```\n\n`transport=dt_socket` 参数指示 JVM，调试器连接将通过套接字进行。`address=1044` 参数告知 JVM 端口号为\
  \ 1044。`port` 号可以是任何大于 1024 的端口，因为低于该值的端口受操作系统限制。`suspend=y` 参数指示 JVM 暂停执行，直到 `jconsole`\
  \ 等调试器连接到它。若要避免这种情况，应使用 `suspend=n`。\n\n对于我们的简单示例，考虑到我们将使用 `jconsole` 在同一台机器上调试\
  \ Java 应用程序，我们并不需要所有这些参数。我们只需从命令行启动 `jconsole`，然后在 *本地进程* 部分查找并识别我们想要调试的 Java 进程。\n\
  \n在图 9-10 中，您可以看到第一个 `jconsole` 对话框窗口。\n\n![](img/463938_3_En_9_Fig10_HTML.jpg)\n\
  \n图 9-10\n\n`jconsole` 第一个对话框窗口\n\n当进程在本地运行时，很容易识别，因为它会使用模块名和完全限定的主类名来命名。对于像我们这样简单的应用程序，我们需要做一些调整，以确保在应用程序运行期间能够通过\
  \ `jconsole` 实际看到一些统计信息。我们添加了一些 `Thread.sleep(..)` 语句，以便暂停执行足够长的时间让 `jconsole` 连接。此外，我们将使用一个相当大的数据数组，以确保统计信息具有参考价值。`BigSortingSlf4jDemo`\
  \ 类如代码清单 9-24 所示。\n\n```\npackage com.apress.bgn.nine;\n// 导入语句已省略\npublic class\
  \ BigSortingDemo {\nprivate static final Logger log = LoggerFactory.getLogger(BigSortingDemo.class);\n\
  static RandomGenerator randomGenerator = RandomGenerator.of(\"SecureRandom\");\n\
  void main() throws InterruptedException {\nThread.sleep(3000);\n// 我们使用这个 int 流来生成一个巨大的数组和一个巨大的日志文件。请耐心等待，执行需要一些时间。\n\
  var intStream = IntStream.generate(() -> randomGenerator.nextInt(350) + 1).limit(100_000_000);\n\
  int[] arr =  intStream.toArray();\nif (log.isDebugEnabled()) {\nfinal StringBuilder\
  \ sb = new StringBuilder(\"使用归并排序对数组进行排序: \");\nArrays.stream(arr).forEach(i ->\
  \ sb.append(i).append(\" \"));\nlog.debug(sb.toString());\n}\nThread.sleep(3000);\n\
  var mergeSort = new MergeSort();\nmergeSort.sort(arr, 0, arr.length - 1);\nif (log.isInfoEnabled())\
  \ {\nfinal StringBuilder sb2 = new StringBuilder(\"排序后: \");\nArrays.stream(arr).forEach(i\
  \ -> sb2.append(i).append(\" \"));\nlog.info(sb2.toString());\n}\n}\n}\n代码清单 9-24\n\
  BigSortingDemo 类的内容\n```\n\n经过此修改，该类可以正常运行，并且可以将 `jconsole` 连接到它。成功连接后，会打开一个如图 9-11\
  \ 所示的窗口，显示 JVM 内存消耗、活动线程数、已加载类数和 CPU 使用率的图表。\n\n![](img/463938_3_En_9_Fig11_HTML.jpg)\n\
  \n图 9-11\n\n`jconsole` 统计信息窗口\n\n每个统计信息都有一个选项卡，提供更详细的信息。对于更复杂的应用程序，这些信息可用于改善性能、识别潜在问题，甚至预测应用程序在所需场景下的行为。对于我们这个小型应用程序，`jconsole`\
  \ 图表揭示的信息不多，但如果您真的想看到有价值的统计信息，可以在开发或运行代码时使用 `jconsole` 监控 IntelliJ IDEA。\n\n信息\n\
  \n`jconsole` 的更高级版本称为 VisualVM。它曾是 JDK 的一部分，但在 Java 8 中被移除，之后成为一个独立项目。在编写本章时，还没有适用于\
  \ Java 23 的版本，因此本书将不涉及它，但欢迎您自行尝试。^(⁷⁵)\n\n#### 使用 JDK Mission Control\n\n**JDK Mission\
  \ Control (JMC)** 是一款高级 Oracle 应用程序，用于调试和分析正在运行的应用程序的 JVM 统计信息。其官方描述指出：*JDK Mission\
  \ Control (JMC)*^(⁷⁶) *是一套用于管理、监控、性能分析和故障排查 Java 应用程序的高级工具集。*\n\n与之前讨论的工具类似，该工具可以识别当前正在运行的\
  \ Java 进程，并提供选项来查看它们在执行期间特定时间点的内存占用、某一时刻并行运行的线程数、JVM 加载的类以及运行 Java 应用程序所需的 CPU 处理能力。JMC\
  \ 拥有比 JConsole 更友好的界面，其最重要的组件之一是 Java Flight Recorder (JFR)，可用于记录应用程序运行期间的所有 JVM\
  \ 活动。在自定义执行时间内收集的所有数据对于诊断和分析应用程序非常有用。\n\n尽管 JMC 是 Oracle 的工具之一，但它不再随 JDK 一起提供，因此您需要从\
  \ JMC 官方网站下载并安装适合您操作系统的版本。\n\n要在应用程序运行时进行检查，我们打开 JMC，然后根据与之前相同的规则，选择我们识别为正在运行 `BigSortingDemo`\
  \ 主类的进程。我们查找包含模块名和完全限定类名的进程名称，右键单击它，然后选择 **启动 JMX 控制台**。您应该会看到类似于图 9-12 所示的界面。\n\
  \n![](img/463938_3_En_9_Fig12_HTML.jpg)\n\n图 9-12\n\nJMC JMX 控制台\n\n正如您可能注意到的，界面确实更加友好，提供的统计信息也肯定更加详细。使用\
  \ JMC，可以记录应用程序和 JVM 在运行期间发生的所有事情，并稍后进行分析，即使应用程序之后已停止运行。**内存** 选项卡提供了大量关于应用程序所用内存的信息，包括哪些类型的对象占用了内存。\n\
  \n要记录 Java 进程的详细信息，需要以 `-XX:+UnlockCommercialFeatures -XX:+FlightRecorder` 参数启动它。OpenJDK\
  \ 和早期访问版本的 JDK 没有商业特性或 Flight Recorder。这些是 Oracle JDK 的一部分，设计仅供商业使用，需要付费订阅。\n\n\
  JMC 的主题对于本章来说过于高级和广泛（可能整本书都可以用来介绍其用法以及如何解读统计信息），因此我们在此打住。如果您拥有 Oracle JDK 订阅并希望了解更多关于使用\
  \ JMC 的信息，Oracle 提供了非常好的相关资源。\n\n\n\n\n### 访问 Java 进程 API\n\nJava 9 除了 Jigsaw 模块（在**第**\
  \ **3****章**中介绍）之外，还带来了许多其他改进，其中之一是全新改进的 Java 进程 API，它允许你启动本地操作系统进程、检索相关信息并进行管理。在早期版本的\
  \ Java 中，虽然已经具备操作进程的能力，但功能相当简陋。清单 9-25 展示了在 Java 5 之前是如何创建进程的。\n\n```\npackage com.apress.bgn.nine;\n\
  // 导入部分已省略\npublic class ProcessCreationDemo {\nprivate static final Logger log\
  \ =\nLoggerFactory.getLogger(ProcessCreationDemo.class);\npublic static void main(String[]\
  \ args){\ntry {\nProcess exec = Runtime.getRuntime()\n.exec(new String[] { \"/bin/sh\"\
  , \"-c\", \"echo Java home: $JAVA_HOME\" });\nexec.waitFor();\nInputStream is =\
  \ exec.getInputStream();\nStringBuilder textBuilder = new StringBuilder();\ntry\
  \ (Reader reader = new BufferedReader(new InputStreamReader(is, StandardCharsets.UTF_8)))\
  \ {\nint c = 0;\nwhile ((c = reader.read()) != -1) {\ntextBuilder.append((char)\
  \ c);\n}\n}\nlog.info(\"Process output -> {}\", textBuilder.toString());\nlog.info(\"\
  Process result: {}\", exec.exitValue());\n} catch (Exception e) {\nlog.error(\"\
  Process execution failed: {}\", e.getMessage(), e);\n}\n}\n}\n// 输出\n// INFO  c.a.b.n.ProcessCreationDemo\
  \ - Process output -> Java home: /Users/iuliana/.sdkman/candidates/java/current\n\
  // INFO  c.a.b.n.ProcessCreationDemo - Process result: 0\n清单 9-25\n使用 Java 5 之前的\
  \ API 创建进程\n```\n\n拦截已启动进程的输出非常麻烦，必须将一个 `BufferedReader` 实例包装在连接到进程正常输出的 `InputStream`\
  \ 实例上。在 Java 5 中，`java.lang` 包中引入了一个名为 `ProcessBuilder` 的类，用于通过改进的 API 创建操作系统进程。然而，Java\
  \ 进程 API 的重大改进直到 Java 9 发布时才真正落地。\n\nJava 9 的进程 API 让事情变得更加实用。其核心包含几个类和接口，它们的名称都以\
  \ `Process` 开头。我们之前对 Java 可执行文件所做的操作，现在可以直接通过编写 Java 代码来完成。提供访问本地进程 API 的接口名为 `ProcessHandle`，它是核心\
  \ Java `java.lang` 包的一部分。与 `Thread` 类类似，该接口上有一个名为 `current` 的静态方法，用于检索当前运行进程的 `ProcessHandle`\
  \ 实例。一旦获得该实例，我们就可以使用其方法来访问更多进程细节。`ProcessHandle` 提供了几个静态实用方法来访问本地进程。可以编写 Java 代码来列出计算机上运行的所有进程，并且可以根据各种条件对它们进行排序。清单\
  \ 9-26 中的代码列出了所有通过运行 `java` 命令创建的进程。\n\n```\npackage com.apress.bgn.nine;\n// 导入部分已省略\n\
  public class ProcessListingDemo {\nprivate static final Logger log = LoggerFactory.getLogger(ProcessListingDemo.class);\n\
  public static void main(String[] args){\nOptional currUser = ProcessHandle.current().info().user();\n\
  ProcessHandle.allProcesses().filter(ph -> ph.info().user().equals(currUser) && ph.info().commandLine().isPresent())\n\
  .filter(ph -> ph.info().commandLine().get().contains(\"java\"))\n.forEach(p -> {\n\
  log.info(\"PID: \" + p.pid());\np.info().arguments().ifPresent(s -> Arrays.stream(s).forEach(a\
  \ -> log.info(\"   arg: {}\", a)));\np.info().command().ifPresent(c -> log.info(\"\
  \\t Command: {}\", c));\n});\n}\n}\n清单 9-26\n使用 Java 9 进程 API 列出所有 Java 进程\n```\n\
  \n清单 9-26 中的代码通过获取当前运行进程的句柄并调用 `info()` 来获取 `ProcessHandle.Info` 实例，从而提取用户信息。`ProcessHandle.Info`\
  \ 是一个接口，它声明了一组由 `ProcessHandleImpl.Info` 类实现的方法，用于访问进程的快照信息，例如用于创建进程的命令和参数。运行清单\
  \ 9-26 中代码的输出会打印在控制台上，看起来可能与清单 9-27 中列出的输出非常相似（当然，不同的用户和不同的进程会有所不同）。\n\n```\nINFO\
