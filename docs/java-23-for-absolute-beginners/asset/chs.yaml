  \ 6   7\n\n# 3. 初试身手\n\n本章涵盖了 Java 语言的基本模块和术语。虽然它可能被认为是另一个入门章节，但它非常重要。上一章为你留下了一个配置好的完整开发环境，用于编写\
  \ Java 代码。现在是时候利用它了。本章涵盖以下主题：\n\n*   核心语法部分\n\n*   Java 基本构建块：包、模块和类\n\n*   使用 IntelliJ\
  \ IDEA 创建 Java 项目\n\n*   编译和执行 Java 代码\n\n*   将 Java 应用程序打包成可执行 jar\n\n*   使用 Apache\
  \ Maven\n\n\n\n## 核心语法部分\n\n编写 Java 代码很容易，但在开始之前，需要了解一些基本的语法规则。让我们分析一下本书开头给出的代码示例，如清单\
  \ 3-1 所示。\n\n```\npackage com.apress.ch.one.hw;\nimport java.util.List;\npublic\
  \ class Example01 {\npublic static void main(String[] args) {\nList items = List.of(\"\
  1\", \"a\", \"2\", \"a\", \"3\", \"a\");\nitems.forEach(item -> {\nif (item.equals(\"\
  a\")) {\nSystem.out.println(\"A\");\n} else {\nSystem.out.println(\"Not A\");\n\
  }\n});\n}\n}\n清单 3-1\n一个聪明的初学者应得的 Java 入门代码示例\n```\n\n下面的列表解释了每一行，或具有相同用途的几行代码：\n\
  \n*   `package com.apress.ch.one.hw``;` 是一个包声明。你可以将此语句视为文件中声明的类的地址。\n\n*   `;`（分号）用于标记语句或声明的结束。\n\
  \n*   `import java.util.List``;` 是一个导入语句。JDK 提供了许多在编写代码时可以使用的类。这些类也组织在包中，当你想要使用其中一个时，必须指定要使用的类及其包，因为两个类可能具有相同的名称，但声明在不同的包中。当编译器编译你的代码时，它需要确切地知道需要哪个类。\n\
  \n*   `public class Example01` 是一个类声明语句。它包含一个访问修饰符（`public`）、类型（`class`）和类的名称（`Example01`）。类有一个用花括号包裹的主体。\n\
  \n*   `{ ... }`（花括号）用于将语句分组到代码块中。代码块不需要以 `;` 结尾。代码块可以表示类的主体、方法的主体，或者仅仅是为了让代码看起来更美观而需要组合在一起的几条语句。\n\
  \n*   `public static void main(String[]` `args)` 是一个方法声明语句。它包含一个访问修饰符（`public`）、一个保留关键字（`static`，将在后面解释）、方法名（`main`）以及一个声明参数的部分（`(String[]\
  \ args)`）。\n\n*   `List<String>` `items = List.of(\"1\", \"a\", \"2\", \"a\", \"\
  3\", \"a\");` 是一条语句，声明了一个名为 `items` 的变量，其类型为 `List<String>`，并将 `List.of(\"1\", \"\
  a\", \"2\", \"a\", \"3\", \"a\")` 返回的值赋给它。\n\n*   `items.forEach(...)` 是一条包含对 `items`\
  \ 变量进行函数调用的语句，用于遍历此列表变量中的所有值。\n\n*   `item -> { ... }` 是一个 lambda 表达式。它声明了一个代码块，该代码块将对列表中的每个项目执行。\n\
  \n*   `if (<condition>) { ... } else { ... }` 是一条决策语句。通过评估条件来决定执行哪个代码块。\n\n*   `System.out.println(<text>)``;`\
  \ 是一条用于打印传递给它的参数的语句。\n\n现在在本书中详细解释上述列表中的每一项还为时过早，但编写 Java 代码时最重要的规则是，除了包声明和导入语句之外，所有代码都必须位于代码块内。此外，如果一条语句没有跨越多行，则必须以\
  \ `;`（分号）结尾，否则代码将无法编译。\n\n要编写更高级的 Java 类，并使用代码解决实际问题，你必须了解并理解 Java 的基本构建块。\n\n##\
  \ Java 基本构建块：包、模块和类\n\n警告\n\n这是对 Java 平台的一次系统性介绍。要自信地编写 Java 代码，你需要了解底层发生了什么，构建块是什么，以及配置/编写它们的顺序。如果你愿意，可以跳到下一节“如何确定\
  \ Java 项目的结构”，但就像一些新司机在自信地握住方向盘之前需要了解一点发动机的工作原理一样，有些人如果对运行机制稍有了解，在编程时可能会感到更自信、更有掌控感。所以，我想确保任何阅读本书的人都能有一个良好的开端。\n\
  \n要编写 Java 应用程序，开发人员必须熟悉 Java 程序的构建块。可以这样想：如果你试图制造一辆汽车，你必须先了解什么是轮子以及它们安装在哪里，对吧？这就是我在本书中试图为\
  \ Java 实现的目标：解释所有组件及其用途。\n\nJava 的基本构建块是**类**。Java 中还有其他**对象类型**（如接口、枚举、注解和记录），但类是最重要的，因为它们代表了构成应用程序的对象的模板。一个类主要包含**字段**和**方法**。当创建一个对象时，字段的值定义了对象的状态，而方法描述了其行为。\n\
  \n重要\n\nJava 对象是现实世界对象的模型。因此，如果我们选择在 Java 中为汽车建模，我们将选择定义描述汽车的字段：制造商、型号名称、生产年份、颜色和速度。我们汽车类的方法描述了汽车的功能。汽车主要做两件事——加速和刹车——因此任何方法都应该描述与这两件事相关的动作。\n\
  \n\n\n### 包\n\n当你编写 Java 代码时，你是在编写代码来描述现实世界事物的状态和行为。这些代码必须组织在类和其他类型中，这些类型共同用于构建应用程序。\n\
  \n所有类型都定义在扩展名为 `.java` 的文件中。对象类型被组织在**包**中。包是类型的逻辑集合：其中一些类型在包外部可见，而另一些则不可见，这取决于它们的作用域。\n\
  \n提示\n\n要理解包的工作方式，可以想象一个包含其他盒子的盒子。这些盒子可能装满了其他盒子，也可能装满了不是盒子的物品。为了便于理解，我们假设这些物品是乐高积木。这个类比很贴切，因为\
  \ Java 类型的组合方式与乐高积木类似。\n\n包名称必须是唯一的，并且其命名应遵循特定的模板。这个模板通常由负责项目的公司定义。良好的实践表明，为了确保唯一性和含义明确，通常以组织互联网域名的倒序开头，然后添加各种分组标准。\n\
  \n在本项目中，包名称遵循此处描述的模板：`com.apress.bgn.[*]+`。该模板以本书出版商 Apress 的倒序域名（[*www.apress.com*](http://www.apress.com)）开头，然后添加一个标识本书的术语（`bgn`\
  \ 是 *beginner* 的缩写），而 `*` 则替换为源代码（通常）对应的章节编号。\n\n考虑到之前介绍的盒子和乐高积木的类比，`com` 包是最大的盒子，里面装着\
  \ `apress` 盒子。它也可能包含乐高积木，但在这个例子中没有。`apress` 盒子代表 `com.apress` 包，里面装着 `bgn` 盒子。\n\
  \n`bgn` 代表 `com.apress.bgn` 包盒子，里面装着每个章节特有的盒子，这些盒子可能包含其他盒子和/或乐高积木。乐高积木就是 Java 文件，其中包含\
  \ Java 代码。图 3-1 展示了这些盒子和乐高积木以及它们的嵌套方式。\n\n![](img/463938_3_En_3_Fig1_HTML.jpg)\n\
  \n图 3-1\n\n包含源代码的 Java 包，表示为嵌套的盒子和乐高积木\n\n在你的计算机上，包是一个目录层次结构。每个目录包含其他目录和/或 Java\
  \ 文件。这完全取决于你的组织技巧和需求。这种组织方式很重要，因为任何 Java 对象类型都可以通过包名和其自身名称唯一标识。如果我们想编写一个名为 `HelloWorld`\
  \ 的类，放在名为 `HelloWorld.java` 的文件中，并将该文件放在包 `com.apress.bgn.one` 中，那么 `com.apress.bgn.one.HelloWorld`\
  \ 就是该类的**完全限定类名**，它充当该类的唯一标识符。你可以将包名视为该类的地址。\n\n从 Java 5 开始，每个包内都可以创建一个名为 `package-info.java`\
  \ 的文件，其中包含包声明、包注解、包注释和 Javadoc 注解。这些注释会导出到该项目的开发文档中，也称为 **Javadoc**。（**第** **9**\
  \ **章**介绍了如何使用 Maven 生成项目 Javadoc。）`package-info.java` 文件必须位于包中最后一个目录下。因此，如果我们定义一个\
  \ `com.apress.bgn.one` 包，Java 项目的整体结构和内容将如图 3-2 所示。\n\n![](img/463938_3_En_3_Fig2_HTML.jpg)\n\
  \n图 3-2\n\nJava 包的内容\n\n`package-info.java` 的内容可能与清单 3-2 的内容类似。\n\n```\n/**\n* 包含用于从各种来源读取信息的类。\n\
  * @author iuliana.cosmina\n* @version 3.0-SNAPSHOT\n*/\npackage com.apress.bgn.one;\n\
  清单 3-2\npackage-info.java 示例内容\n```\n\n扩展名为 `.java` 且包含类型定义的文件会被编译成扩展名为 `.class`\
  \ 的文件，这些文件根据相同的包结构进行组织，并打包到一个或多个 **JAR**（**J**ava **Ar**chives，Java 归档文件）中。\n\n\
  当 JAR 文件托管在仓库（例如 Maven 公共仓库）中时，它们也被称为**构件**。你可以在此处阅读更多关于 JAR 的信息：[`https://docs.oracle.com/javase/8/docs/technotes/guides/jar/jarGuide.html`](https://docs.oracle.com/javase/8/docs/technotes/guides/jar/jarGuide.html)。\n\
  \n对于前面的例子，如果你解压编译和链接后生成的 JAR 文件，你会看到如图 3-3 所示的内容。\n\n![](img/463938_3_En_3_Fig3_HTML.jpg)\n\
  \n图 3-3\n\n示例 JAR 的内容\n\n`package-info.java` 文件也会被编译，即使它只包含关于包的信息，而没有行为或类型。\n\n\
  重要\n\n`package-info.java` 文件不是必需的；没有它们也可以定义包。它们主要用于文档目的。\n\n一个包的内容可以跨越多个子项目，这意味着如果你的项目中有多个子项目，你可以在多个子项目中使用相同的包名，但包含不同的类。图\
  \ 3-4 展示了这种符号表示。\n\n![](img/463938_3_En_3_Fig4_HTML.jpg)\n\n图 3-4\n\n包内容跨越多个 JAR\
  \ 的示例\n\n**库**是包含用于实现特定功能的类的 JAR 文件集合。最常用的库是日志库，例如 Log4J^(³⁴) 和 Logback^(³⁵)。例如，JUnit\
  \ 5^(³⁶) 是一个非常著名的 Java 框架，它提供了多个便于编写 Java 单元测试的类。\n\n一个中等复杂程度的 Java 应用程序会引用一个或多个库。要运行该应用程序，其所有依赖项（所有\
  \ JAR 文件）都必须位于**类路径**上。这意味着什么？这意味着要运行一个 Java 应用程序，需要 JDK、其依赖项（外部 JAR 文件）以及应用程序的\
  \ JAR 文件。图 3-5 清晰地展示了这一点。\n\n![](img/463938_3_En_3_Fig5_HTML.jpg)\n\n图 3-5\n\n应用程序类路径\n\
  \n警告\n\n我们在此假设应用程序是在编写它的同一环境中运行，因此使用 JDK 来运行应用程序。在 JDK 11 之前，任何 Java 应用程序都可以使用 JRE\
  \ 运行。但从版本 11 开始，Java 已完全模块化。这意味着只能从运行应用程序所需的模块创建定制的“JRE”发行版。这间接意味着生成的 JRE 包含最少数量的\
  \ JDK 编译类。\n\n构成应用程序类路径的 JAR 文件（显然）并不总是相互独立的。21 年来，这种组织方式已经足够，但在复杂的应用程序中，由于以下原因导致了许多复杂问题：\n\
  \n*   包分散在多个 JAR 中（还记得图 3-4 吗？）。这可能导致代码重复和循环依赖。\n\n*   JAR 之间的传递依赖，有时会导致类路径上存在同一类的不同版本。这可能导致不可预测的应用程序行为。\n\
  \n*   缺少传递依赖和可访问性问题。这可能导致应用程序崩溃。\n\n所有这些问题都被统称为一个名称：**JAR 地狱**^(³⁷)。这个问题在 Java 9\
  \ 中通过引入另一个组织包的结构层级得到了解决：**模块**。或者至少这是初衷。然而，业界一直不愿采用 Java 模块。截至撰写本文时，尽管大多数 Java 生产应用程序已不再停留在\
  \ Java 8 上，但开发者仍然像躲避瘟疫一样避免使用模块。\n\n\n\n然而，在介绍模块之前，你需要了解访问修饰符。Java 类型及其成员在包内以特定的访问权限进行声明，这是开始编码前必须理解的重要内容。\n\
  \n### 访问修饰符\n\n在 Java 中声明一个类型时——我们暂时只讨论 `class`，因为到目前为止这是唯一提到的类型——你可以使用**访问修饰符**来配置其作用域。\n\
  \n访问修饰符可用于指定对类的访问权限，在这种情况下，我们称它们用于顶层。它们也可用于指定对类成员的访问权限，在这种情况下，它们用于成员级别（我们暂时不讨论*嵌套类*，本章后面会讲到）。\n\
  \n在顶层，只能使用两种访问修饰符：public 和无修饰符。声明为 `public` 的顶层类必须定义在与其同名的 Java 文件中。清单 3-3 展示了一个名为\
  \ `Base` 的类，它定义在位于包 `com.apress.bgn.zero` 的 `Base.java` 文件中。\n\n```\npackage com.apress.bgn.zero;\n\
  // 顶层访问修饰符\npublic class Base {\n// 代码省略\n}\n清单 3-3\nBase 类\n```\n\n类的具体内容暂未展示，并用\
  \ `// 代码省略` 注释代替，以免分散你的注意力。公有类对应用程序中任何位置的所有类都是可见的。因此，不同包中的不同类可以创建此类型的对象，如清单 3-4\
  \ 所示。\n\n```\npackage com.apress.bgn.three;\nimport com.apress.bgn.zero.Base;\n\
  public class Main {\npublic static void main(String... args) {\n// 创建 Base 类型的对象\n\
  Base base = new Base();\n}\n}\n清单 3-4\n使用 Base 类创建对象\n```\n\n`Base base = new Base();`\
  \ 这一行就是创建对象的地方。`new` 关键字代表一种称为类**实例化**的操作，这意味着根据描述 `Base` 类的代码所定义的规范创建了一个对象。\n\n\
  重要提示\n\n类是一个模板。对象是使用这个模板创建的，被称为**实例**。\n\n目前，请先记住这个论断：公有类对所有类在任何位置都是可见的。\n\n当没有显式指定访问修饰符时，我们称该类被声明为**默认**或**包级私有**。我知道用两种方式描述缺少访问修饰符的情况似乎令人困惑，但因为你可能会阅读其他书籍或博客文章提到这种情况，所以最好在这里列出所有可能性。这意味着如果一个类没有访问修饰符，那么只有同一个包中定义的类才能使用该类创建对象。它的作用域仅限于其定义的包。没有访问修饰符的类可以定义在任何\
  \ Java 文件中，并且文件名不必与类名一致。\n\n重要提示\n\n当同一个文件中声明了多个类时，公有类必须与定义它的文件同名，因此这个类就是命名该文件的类。\n\
  \n为了测试这一点，让我们在之前引入的 `Base.java` 文件中添加一个名为 `HiddenBase` 的类，如清单 3-5 所示。\n\n```\npackage\
  \ com.apress.bgn.zero;\npublic class Base {\n// 代码省略\n}\nclass HiddenBase {\n//\
  \ 你看不到我\n}\n清单 3-5\n没有访问修饰符的类\n```\n\n注意，`Base` 类声明在 `com.apress.bgn.zero` 包中。如果我们尝试在包\
  \ `com.apress.bgn.three`（注意，这是不同的包）中声明的类里创建 `HiddenBase` 类型的对象，IDE 会通过将文本标红并拒绝提供任何代码补全来发出警告。此外，还会打开一个列出当前文件问题的选项卡，并显示一条非常明显的错误消息，如图\
  \ 3-6 所示。\n\n![](img/463938_3_En_3_Fig6_HTML.jpg)\n\n图 3-6\n\n没有访问修饰符的 Java 类错误\n\
  \n重要提示\n\n目前，也请记住这个论断：没有访问修饰符的类对同一个包中的所有类（以及其他类型）都是可见的。\n\n\n\n在类内部定义了类的成员：**字段**和**方法**。除此之外，我们还可以定义其他\
  \ Java 类型，这些类型被称为嵌套类型，但我们稍后会讲到这一点。在成员级别，除了之前提到的两个修饰符外，还可以应用另外两个修饰符：`private` 和 `protected`。在成员级别，访问修饰符具有以下效果：\n\
  \n*   `public`：与顶层相同，该成员可以从任何地方访问。\n\n*   `private`：该成员只能在其声明的类中访问。\n\n*   `protected`：该成员只能在其声明类所在的包中，或者由其他包中该类的任何子类访问。\n\
  \n*   `none`（无修饰符）：该成员只能在其自身的包内访问。\n\n前面的规则可能看起来复杂，但一旦你开始编写代码，你就会习惯。在 Oracle 官方文档页面上，甚至有一个成员可见性的表格^(³⁸)。表\
  \ 3-1 提供了一个修改后的版本。\n\n表 3-1\n\n成员级别访问器作用域\n\n| 修饰符 | 类 | 包 | 子类 | 全局 |\n| --- |\
  \ --- | --- | --- | --- |\n| `public` | 是 | 是 | 是 | 是 |\n| `protected` | 是 | 是 |\
  \ 是 | 否 |\n| 无（*默认/包私有*） | 是 | 是 | 否 | 否 |\n| `private` | 是 | 否 | 否 | 否 |\n\n为了全面了解该表格如何应用于代码，清单\
  \ 3-6 中的类非常有帮助。\n\n```\npackage com.apress.bgn.three.same;\npublic class PropProvider\
  \ {\npublic int publicProp;\nprotected int protectedProp;\n/* default */ int defaultProp;\n\
  private int privateProp;\npublic PropProvider(){\nprivateProp = 0;\n}\n}\n清单 3-6\n\
  PropProvider，一个成员使用各种访问器修饰的 Java 类\n```\n\n`PropProvider` 类声明了四个字段，每个字段都有不同的访问修饰符。字段\
  \ `privateProp` 只能在此类的主体内修改。这意味着此类的所有其他成员都可以读取此属性的值并更改它。\n\n在本书的这一点上，只提到了方法是其他类型的成员。但是，可以在另一个类的主体内声明类。这样的类称为**嵌套类**，它可以访问其外部类的所有成员，包括私有成员。表\
  \ 3-1 中的**类**列（第二列）涵盖了在另一个类（嵌套类）内部声明的类可以访问的字段。图 3-7 描述了修改后的 `PropProvider` 类，它添加了一个名为\
  \ `printPrivate` 的额外方法。此方法读取私有字段的值并打印它。还声明了一个名为 `LocalPropRequester` 的嵌套类，并且显示在此类中修改了私有字段（第\
  \ 56 行）。\n\n![](img/463938_3_En_3_Fig7_HTML.jpg)\n\n图 3-7\n\n表 3-1 中的**类**列在 Java\
  \ 代码中的访问器\n\n图 3-7 是 IntelliJ IDEA 中 Java 代码视图的截图。如果任何字段不可访问，则会以红色显示。\n\n表 3-1 中的第三列，即**包**列，涵盖了与\
  \ `PropProvider` 类在同一包中声明的类可以访问的字段。图 3-8 描述了一个名为 `PropRequester` 的类，它试图修改 `PropProvider`\
  \ 类中的所有字段。注意私有字段以亮红色显示。这意味着该字段不可访问，IntelliJ IDEA 使其非常明显。\n\n![](img/463938_3_En_3_Fig8_HTML.jpg)\n\
  \n图 3-8\n\n表 3-1 中的**包**列在 Java 代码中的访问器\n\n表 3-1 中的第四列，即**子类**列，涵盖了 `PropProvider`\
  \ 类的子类可以访问的字段。**子类**从其派生的类（称为其**超类**）继承状态和行为。子类是使用 `extends` 关键字和超类名称创建的。图 3-9 描述了一个名为\
  \ `SubClassedProvider` 的类，它试图修改从 `PropProvider` 继承的所有字段。注意私有字段和没有访问修饰符的字段被 IntelliJ\
  \ IDEA 以亮红色显示。这意味着这些字段不可访问。\n\n![](img/463938_3_En_3_Fig9_HTML.jpg)\n\n图 3-9\n\n\
  表 3-1 中的**子类**列在 Java 代码中的访问器\n\n重要\n\n在前面的示例中，没有访问修饰符的字段不可访问，因为子类是在不同的包中声明的。如果子类被移动到同一个包中，则适用表\
  \ 3-1 中**包**列的规则。\n\n表 3-1 中的最后一列，即**全局**列，适用于 `PropProvider` 类声明所在包之外的所有类，这些类不是此类的子类。图\
  \ 3-10 描述了一个名为 `AnotherPropRequester` 的类，它试图访问 `PropProvider` 中声明的所有字段。正如预期的那样，只有公共字段是可访问的，其余字段都以红色显示。\n\
  \n![](img/463938_3_En_3_Fig10_HTML.jpg)\n\n图 3-10\n\n表 3-1 中的**全局**列在 Java 代码中的访问器\n\
  \n使用 Maven 构建工具构建包含 `AnotherPropRequester` 类的 `chapter03` 子项目会失败。错误消息显示在清单 3-7 中。\n\
  \n```\n[ERROR] Failed to execute goal org.apache.maven.plugins:maven-compiler-plugin:3.8.1:compile\
  \ (default-compile) on project chapter03: Compilation failure: Compilation failure:\n\
  [ERROR] ./java-23-for-absolute-beginners/chapter03/src/main/java/com/apress/bgn/three/other/AnotherPropRequester.java:[42,17]\
  \ protectedProp has protected access in com.apress.bgn.three.same.PropProvider\n\
  [ERROR] ./java-23-for-absolute-beginners/chapter03/src/main/java/com/apress/bgn/three/other/AnotherPropRequester.java:[44,17]\
  \ defaultProp is not public in com.apress.bgn.three.same.PropProvider; cannot be\
  \ accessed from outside package\n[ERROR] ./java-23-for-absolute-beginners/chapter03/src/main/java/com/apress/bgn/three/other/AnotherPropRequester.java:[46,17]\
  \ privateProp has private access in com.apress.bgn.three.same.PropProvider\n清单 3-7\n\
  AnotherPropRequester 编译错误\n```\n\n正如所展示的，构建工具和编辑器在 Java 代码出现问题时能够很好地通知你。学会善用它们，信任它们，它们将提高你的生产力。*当然，构建工具和智能编辑器偶尔也会出现小问题，但不会太多。*\n\
  \n在你开始编写 Java 代码后，你可能会回过头来查阅表 3-1 一两次。即使引入了模块，本节涵盖的所有内容仍然有效。前提是你正确配置了模块访问权限。\n\n\
  \n\n### 模块\n\n从 Java 9 开始，引入了一个新概念：`modules`。\n\n重要提示\n\n诸如 Maven 或 Gradle 这类构建工具也将子项目称为模块，但其用途与\
  \ Java 模块不同。\n\nJava 模块代表了一种更强大的机制来组织和聚合包。这个新概念的实施耗时超过十年。关于模块的讨论始于 2005 年，原本希望能在\
  \ Java 7 中实现。在 **Project Jigsaw** 的名义下，探索阶段最终于 2008 年开始。Java 开发者曾希望模块化的 JDK 能随 Java\
  \ 8 一起提供，但这并未实现。\n\n经过三年的工作（以及近七年的分析），模块最终在 Java 9 中到来。支持模块将 Java 9 的官方发布日期推迟到了\
  \ 2017 年 9 月。\n\n注意\n\nJigsaw 项目的完整历史可在此处找到：[`https://openjdk.java.net/projects/jigsaw`](https://openjdk.java.net/projects/jigsaw)\n\
  \n**Java 模块**是一种对包进行分组并配置对包内容进行更细粒度访问的方式。一个 Java 模块是一个具有唯一名称、可重用的包和资源（例如，XML 文件和其他类型的非\
  \ Java 文件）组，由一个名为 `module-info.java` 的文件描述，该文件位于源目录的根目录。此文件包含以下信息：\n\n*   模块的名称\n\
  *   模块的依赖项（即，此模块依赖的其他模块）\n*   模块明确提供给其他模块的包（模块中的所有其他包默认对其他模块不可用）\n*   模块提供的服务\n\
  *   模块消费的服务\n*   允许哪些其他模块进行反射\n*   本地代码\n*   资源\n*   配置数据\n\n理论上，模块命名类似于包命名，并遵循反向域名约定。实践中，只需确保模块名称不包含任何数字，并能清晰表明其用途即可。`module-info.java`\
  \ 文件被编译成一个模块描述符，这是一个名为 `module-info.class` 的文件，它与类一起被打包到一个普通的 JAR 文件中。\n\n该文件位于\
  \ Java 源目录的根目录，在任何包之外。对于之前介绍的 `chapter03` 项目，`module-info.java` 文件位于 `src/main/java`\
  \ 目录中，与 `com` 目录同级；`com.apress.bgn.three` 包的根目录如图 3-11 所示。\n\n![](img/463938_3_En_3_Fig11_HTML.jpg)\n\
  \n图 3-11\n\n`module-info.java` 文件的位置\n\n与任何扩展名为 `*.java` 的文件一样，`module-info.java`\
  \ 文件被编译成一个 `*.class` 文件。由于模块声明不是 Java 类型声明的一部分，`module` 不是一个 Java 关键字，因此在为 Java\
  \ 类型编写代码时（例如，作为变量名）仍然可以使用它。对于 `package` 来说情况不同，因为每个 Java 类型声明都必须以包声明开头。只需看一下清单 3-8\
  \ 中声明的 `SimpleReader` 类。\n\n```\npackage com.apress.bgn.three;\npublic class SimpleReader\
  \ {\nprivate String source;\n// 代码省略\n}\n清单 3-8\nSimpleReader 类\n```\n\n你可以看到包声明，但模块在哪里？嗯，模块是一个抽象概念，由\
  \ `module-info.java` 文件描述。因此，从 Java 9 开始，如果你在应用程序中配置 Java 模块，图 3-4 将演变为图 3-12。\n\
  \n![](img/463938_3_En_3_Fig12_HTML.jpg)\n\n图 3-12\n\nJava 模块的视觉表示\n\nJava 模块是一种将属于同一逻辑组的\
  \ Java 包进行逻辑分组的方式。\n\n模块的引入也使得 JDK 可以被划分为模块。`java --list-modules` 命令列出本地 JDK 安装中的所有模块。清单\
  \ 3-9 展示了在我的个人电脑上执行此命令的输出，当前安装的是 JDK 23。\n\n```\n$ java --list-modules\njava.base@23\n\
  java.compiler@23\njava.datatransfer@23\njava.desktop@23\n"
- "# 部分输出省略\n清单 3-9\nJDK 23 模块\n```\n\n每个模块名称后跟一个版本字符串，在上面的清单中是 @23，这意味着该模块属于 Java\
  \ 版本 23。因此，如果 Java 应用程序不需要所有模块，你可以创建一个仅包含所需模块的运行时，这可以减小运行时的大小。用于构建针对应用程序需求定制的更小运行时的工具称为\
  \ `jlink`，它是 JDK 可执行文件的一部分。这允许更高的可扩展性和性能提升。如何使用 `jlink` 不是本书的主题。本书的重点是学习 Java 编程语言，因此\
  \ Java 平台的技术细节将保持最少——足以让你自信地开始编写和执行代码。\n\n引入模块有诸多好处，经验丰富的开发者多年来一直期待利用这些优势。然而，为更大、更复杂的项目配置模块并非易事，大多数软件公司宁愿完全避免配置模块。\n\
  \n`module-info.java` 文件的内容可以像模块名称和包含主体的两个大括号一样简单，如清单 3-10 所示。\n\n```\nmodule chapter.three\
  \ {\n}\n清单 3-10\n一个简单的 module-info.java 配置\n```\n\n\n\n#### 高级模块配置\n\nJava 模块声明体包含一个或多个**指令**，这些指令使用表\
  \ 3-2 中的关键字构建。这些指令代表了模块中包含的包和类的访问配置与依赖需求。\n\n表 3-2\n\nJava 模块指令\n\n| 指令 | 用途 |\n\
  | --- | --- |\n| `requires` | 指定该模块依赖于另一个模块。 |\n| `exports` | 指定模块的某个包，其 `public`\
  \ 类型（以及它们的 `nested public` 和 `protected` 类型）应对所有其他模块中的代码可访问。 |\n| `exports ... to`\
  \ | `exports` 指令的限定版本，允许通过逗号分隔的列表精确指定哪些模块的代码可以访问被导出的包。 |\n| `open` | 用于模块级声明（`open\
  \ module mm {}`），允许对所有模块的包进行反射访问。Java 反射是在运行时分析和修改类所有能力的过程，它也作用于私有类型和成员。因此在 Java\
  \ 9 之前，实际上没有任何东西是真正封装的。 |\n| `opens` | 用于模块声明体内部，选择性地配置仅通过反射访问某些包。 |\n| `opens ...\
  \ to` | `opens` 指令的限定版本，允许通过逗号分隔的列表精确指定哪些模块的代码可以通过反射访问其包。 |\n| `uses` | 指定该模块使用的一个服务，使该模块成为*服务消费者*。此处的服务代表另一个模块为其提供实现的接口/抽象类的全名。\
  \ |\n| `provides ... with` | 指定一个模块使用特定实现来提供一项服务，使该模块成为*服务提供者*。 |\n| `transitive`\
  \ | 与 `requires` 一起使用，指定对另一个模块的依赖，并确保读取你模块的其他模块也读取该依赖——这被称为*隐式可读性*。 |\n\n附录 A 提供了所有指令的示例。就学习\
  \ Java 语言而言，你真正需要了解的只有 `requires` 和 `exports`，因此本章仅涵盖这两个指令。一旦上下文适合完全理解它们，我将深入解释所有指令，并添加与现实世界事件和场景的类比，以确保概念清晰易懂。\n\
  \n重要的是，*模块可以相互依赖。* 本书的项目由 13 个模块组成，其中大多数依赖于 `chapter.zero` 模块。该模块包含用于在其他模块中构建更复杂组件的基本组件。例如，`chapter.three`\
  \ 模块内部的类需要访问 `chapter.zero` 模块中的包和类。声明模块依赖关系使用 `requires` 指令完成，如清单 3-11 所示。\n\n\
  ```\nmodule chapter.three {\n    requires chapter.zero;\n}\n清单 3-11\n一个简单的 module-info.java\
  \ 配置\n```\n\n上述依赖是**显式**的。但也存在**隐式**依赖。例如，开发者声明的任何模块都隐式地需要 JDK 的 `java.base` 模块。该模块包含\
  \ Java SE 平台的基础 API，没有它就无法编写任何 Java 应用程序。这个隐式指令确保了对最小 Java 类型集的访问，从而可以编写基本的 Java\
  \ 代码。清单 3-11 等同于清单 3-12。\n\n```\nmodule chapter.three {\n    requires java.base;\
  \ // 冗余指令\n    requires chapter.zero;\n}\n清单 3-12\n一个包含显式 requires java.base 指令的简单\
  \ module-info.java 配置\n```\n\n重要\n\n将模块声明为 required 意味着在代码编译时（通常称为*编译时*）和代码执行时（通常称为*运行时*）都需要该模块。如果某个模块仅在运行时需要，则使用\
  \ `requires static` 关键字来声明依赖。请先记住这一点；当我们讨论 Web 应用程序时，它的意义就会显现出来。\n\n现在 `chapter.three`\
  \ 依赖于模块 `chapter.zero`。但这是否意味着 `chapter.three` 可以访问 `chapter.zero` 模块中所有包的所有 `public`\
  \ 类型（以及它们的嵌套 `public` 和 `protected` 类型）？如果你认为这还不够，那么你是对的。仅仅因为一个模块依赖于另一个模块，并不意味着它可以访问它实际需要的包和类。被依赖的模块必须配置为暴露其*内部*。这该如何实现？在我们的例子中，我们需要确保\
  \ `chapter.zero` 模块授予对所需包的访问权限。我们可以通过为该模块定制 `module-info.java` 文件，添加 `exports` 指令，后跟必要的包名来实现。清单\
  \ 3-13 展示了暴露其单个包的 `chapter.zero` 模块的 `module-info.java` 文件。\n\n```\nmodule chapter.zero\
  \ {\n    exports com.apress.bgn.zero;\n}\n清单 3-13\nchapter.zero 模块的 module-info.java\
  \ 配置文件\n```\n\n提示\n\n可以这样理解：你在房间里剪圣诞装饰品，需要一个模板。你的室友有所有模板。但仅仅因为你需要它们，并不意味着它们会凭空出现。你需要去和你的室友谈谈。需要室友的帮助可以看作是\
  \ `requires room-mate` 指令。和室友交谈后，你的室友可能会说：*当然，进来吧，它们在桌子上！需要多少就拿多少。* 这可以看作是 `exports\
  \ all-templates-on-desk` 指令。桌子可能是一个很好的类比，用来比喻包。\n\n使用清单 3-13 中的配置，我们刚刚授予了任何配置了 `requires\
  \ module.zero;` 指令的模块对 `com.apress.bgn.zero` 包的访问权限。如果我们不希望这样呢？（参考前面的提示，你的室友只是让房间门开着，所以任何人都可以进去拿那些模板！）\n\
  \n如果我们想将对模块内容的访问限制为仅对 `chapter.three` 模块开放呢？（这样，你的室友只能把他们的模板给你。）这可以通过添加 `to` 关键字后跟模块名来实现，以明确只有该模块被允许访问这些组件。这就是表\
  \ 3-2 中提到的 `exports` 指令的限定版本。\n\n警告\n\n如果你出于好奇阅读了推荐的 **JAR 地狱** 文章，你会注意到处理打包在 jar\
  \ 中的 Java 源码的一个问题是安全性。原因是，即使无法访问 Java 源码，通过将 Jar 作为依赖项添加到应用程序中，对象也可以被检查、扩展和实例化。因此，除了提供可靠的配置、更好的扩展性、平台完整性和改进的性能之外，引入模块的目标实际上是**更好的安全性**。\n\
  \n清单 3-14 展示了 `chapter.zero` 模块的 `module-info.java` 文件，该文件将其单个包仅暴露给 `chapter.three`\
  \ 模块。\n\n```\nmodule chapter.zero {\n    exports com.apress.bgn.zero to chapter.three;\n\
  }\n清单 3-14\nchapter.zero 模块的高级 module-info.java 配置文件\n\n可以通过列出所需模块（用逗号分隔）来指定多个模块具有访问权限，如清单\
  \ 3-15 所示。\n\n\n\n```\nmodule chapter.zero {\n    exports com.apress.bgn.zero to\
  \ chapter.two, chapter.three;\n}\n代码清单 3-15\nchapter.zero 模块的高级 module-info.java\
  \ 配置文件（包含多个模块）\n```\n\n模块的顺序并不重要，如果模块数量很多，你可以将它们放在多行中。只需确保以 `;`（分号）结束声明即可。\n\n关于模块，本书现阶段能介绍的内容就这些，但别担心：所有其他指令都会在合适的时机进行讲解。\n\
  \n## 如何确定 Java 项目的结构\n\nJava 项目的结构有几种组织方式，选择哪种方式受两个因素影响：项目范围和使用到的构建工具。\n\n你可能会好奇为什么项目范围会影响项目结构。你可能会认为这方面应该有一个标准，对吧？实际上，标准不止一个，而这取决于项目范围。创建\
  \ Java 项目的原因会影响其规模。如果项目很小，可能不需要将源代码拆分成子项目，也可能不需要构建工具，因为构建工具有自己标准的项目组织方式。让我们从最简单的\
  \ Java 项目开始，这个项目只需在控制台打印 *Hello World!*。\n\n### IntelliJ IDEA 中的 HelloWorld! 项目\n\
  \n既然你已经安装了 IntelliJ IDEA，让我们创建一个 Java 项目，看看编辑器会为我们选择什么样的项目结构。当你第一次打开 IntelliJ IDEA\
  \ 时，会看到一个非常简单的对话框窗口，如图 3-13 所示。\n\n![](img/463938_3_En_3_Fig13_HTML.jpg)\n\n图 3-13\n\
  \nIntelliJ IDEA 初始对话框窗口\n\n选择 **New Project**。IntelliJ IDEA 会引导你进入项目设置对话框窗口，在这里你可以选择项目名称、要使用的编程语言、构建工具，并且它会自动选择系统\
  \ JDK。该对话框窗口如图 3-14 所示，显示的是我电脑上的默认选项。\n\n![](img/463938_3_En_3_Fig14_HTML.jpg)\n\
  \n图 3-14\n\nIntelliJ IDEA 创建 Java 项目的对话框窗口\n\n为了在 IntelliJ IDEA 中创建这第一个 Java 项目，将项目名称和模块名称都设为\
  \ `sandbox`，然后点击 **Create**。\n\n下一个窗口是编辑器窗口，如图 3-15 所示，你将在其中编写代码。如果你展开左侧的 `sandbox`\
  \ 节点（该部分称为*项目视图*），可以看到该项目是使用你已安装的 JDK（此处为 23 版本）构建的。创建了一个 `src` 目录来存放 Java 包和类文件。在\
  \ `src` 目录内，IntelliJ IDEA 生成了一个名为 `Main.java` 的默认类文件，其中包含一个带有简单方法体的 `main(..)` 方法，如图\
  \ 3-15 右侧所示。\n\nIntelliJ IDEA 假设你是初学者，并在代码中显示了一些入门提示。你可以通过关闭 `Main.java` 类文件顶部的通知来关闭这些提示。\n\
  \n![](img/463938_3_En_3_Fig15_HTML.jpg)\n\n图 3-15\n\nIntelliJ IDEA 项目视图和默认的 `Main`\
  \ 类\n\n在编写代码之前，让我们看看还有哪些其他项目设置可用。IntelliJ IDEA 允许你通过 **File ➤ Project Structure**\
  \ 菜单项查看和编辑项目属性。点击后，将打开一个项目结构对话框窗口，类似于图 3-16 所示。\n\n![](img/463938_3_En_3_Fig16_HTML.jpg)\n\
  \n图 3-16\n\nIntelliJ IDEA 项目结构对话框窗口\n\n当对话框窗口打开时，**Project Settings** 部分处于展开状态，并且选中了\
  \ **Project** 选项卡。在图 3-16 中，有两个箭头吸引你注意 **SDK** 字段（它显示了 Java 项目的 JDK 版本）和 **Language\
  \ level** 字段（它列出了 **SDK default**）。在撰写本章时，默认版本是最新的 JDK 23 EA。最新版本的 IntelliJ IDEA\
  \ 支持最新官方 JDK 版本的语法和代码补全。\n\n如果你切换到 **Project Settings** 下的 **Modules** 选项卡，你将看到如图\
  \ 3-17 所示的信息。\n\n![](img/463938_3_En_3_Fig17_HTML.jpg)\n\n图 3-17\n\nIntelliJ IDEA\
  \ 项目 Modules 选项卡\n\n重要\n\n除了将包封装在一起的 Java 模块之外，模块也是一种将项目中具有共同用途的 Java 源代码和资源文件封装在一起的方式。在\
  \ Oracle 引入模块概念作为 Java 应用程序模块化方式之前，组成这些应用程序的代码就已经被那些需要以某种实用方式组织大型项目的开发者进行了模块化。\n\
  \n\n\n在**模块**选项卡中，你可以查看一个项目包含多少个部分（模块）以及每个部分的设置。`sandbox` 项目包含一个部分，即一个同样名为 `sandbox`\
  \ 的模块，该模块的源代码存放在 `src` 目录下。因此，如果我们想编写一个打印 *Hello World!* 的类，名为 `HelloWorld.java`\
  \ 的文件就必须放在该目录下。如果你右键点击 `src` 目录，就会出现如图 3-18 所示的菜单。\n\n![](img/463938_3_En_3_Fig18_HTML.jpg)\n\
  \n图 3-18\n\nIntelliJ IDEA 上下文菜单，列出了可以在 `src` 目录中创建的 Java 对象\n\n除了 **Java Class**\
  \ 选项外，红色箭头指向了 `src` 目录中可以包含的其他组件。接下来我们继续创建类。点击 **Java Class** 菜单选项，在弹出的对话框中输入类名。从文本框下方的列表中选择\
  \ **Class**。图 3-19 展示了所有可以创建的 Java 类型。\n\n![](img/463938_3_En_3_Fig19_HTML.jpg)\n\
  \n图 3-19\n\nIntelliJ IDEA 创建 Java 类型的对话框窗口\n\n正如本章前面提到的，Java 应用程序的核心构建块是 `class`，但\
  \ Java 中还存在其他类型。图 3-19 中的列表显示了所有五种 Java 类型。本书后面会详细解释每一种类型，所以现在只需注意，在 `src` 目录下创建了一个名为\
  \ `HelloWorld.java` 的文件，该文件的内容非常简单，如代码清单 3-16 所示。\n\n```\npublic class HelloWorld\
  \ {\n}\n代码清单 3-16\nHelloWorld.java 的内容——一个空 Java 类的主体\n```\n\n你刚刚在你的第一个非常简单的 Java\
  \ 项目中创建了第一个 Java 类。它目前还什么都不会做。通过从 IntelliJ IDEA 的 **Build** 菜单中选择 **Build Project**\
  \ 选项（如图 3-20 所示），或者按下因操作系统而异的组合键，即可编译该类。编译该类会生成包含字节码的 `HelloWorld.class` 文件。默认情况下，IntelliJ\
  \ IDEA 会将编译结果存储到名为 `out/production` 的目录中。图 3-20 也部分展示了编译项目的结果。\n\n![](img/463938_3_En_3_Fig20_HTML.jpg)\n\
  \n图 3-20\n\n如何在 IntelliJ IDEA 中编译 Java 项目\n\n现在是时候让这个类打印 *Hello World!* 了。为此，我们需要向该类添加一个特殊的方法。任何\
  \ Java 桌面应用程序都有一个名为 `main` 的特殊方法，该方法必须在顶层类中声明。JRE 会调用此方法来运行 Java 程序/应用程序，我将其称为*入口点*。如果没有这样的方法，Java\
  \ 项目就只是一堆类的集合，不可运行，无法执行，也无法实现特定功能。\n\n提示\n\n可以这样想象：这就像你有一辆车，但无法启动它，因为点火锁芯不见了。从各方面来看，它是一辆车，但它无法实现汽车的主要目的——真正带你到某个地方。你可以把\
  \ `main` 方法想象成点火锁芯，JRE 会插入钥匙来启动你的应用程序。接下来，我们将把这个方法添加到 `HelloWorld` 类中。\n\n由于 IntelliJ\
  \ IDEA 是一个出色的编辑器，你可以通过输入 `psvm` 然后按 **Tab** 键来生成 `main` 方法。这四个字母代表了方法声明中所有组成部分的首字母：**p**ublic、**s**tatic、**v**oid\
  \ 和 **m**ain。\n\n包含 `main` 方法并打印文本 *Hello World!* 的 `HelloWorld` 类如代码清单 3-17 所示。\n\
  \n```\npublic class HelloWorld {\npublic static void main(String... args) {\nSystem.out.println(\"\
  Hello World\");\n}\n}\n代码清单 3-17\n包含 main 方法的 HelloWorld 类\n```\n\n现在我们有了 `main`\
  \ 方法，就可以执行（或运行）代码了。IntelliJ IDEA 提供了两个选项：\n\n*   从 **Run** 菜单中，选择 **Run [ClassName]**\
  \ 选项（或按下该选项右侧显示的组合键）。\n*   右键点击类主体，从出现的菜单中选择 **Run [ClassName].main()**。\n\n图 3-21\
  \ 展示了可用于执行该类的两个菜单项以及执行结果。\n\n![](img/463938_3_En_3_Fig21_HTML.jpg)\n\n图 3-21\n\n\
  如何在 IntelliJ IDEA 中执行 Java 类\n\n这是 Java 项目最基本的结构。这个项目非常简单，甚至可以从命令行手动编译，那么我们就来试试吧！\n\
  \n### 从命令行编译和执行 HelloWorld! 项目\n\n你可能已经注意到了 IntelliJ IDEA 中的 **Terminal** 按钮。点击该按钮，编辑器内会打开一个终端。在\
  \ Windows 上，它将是一个命令提示符实例；在 Linux 和 macOS 上，则是默认的 shell。IntelliJ 会将终端直接打开到你的项目根目录。接下来你需要执行以下操作：\n\
  \n*   执行以下命令进入 `src` 目录：`cd src`。（`cd` 是 change directory 的缩写。）\n*   执行 `javac HelloWorld.java`\
  \ 编译 `HelloWorld.java` 文件。（`javac` 是一个用于编译 Java 文件的 JDK 可执行文件，IntelliJ IDEA 在后台也会调用它。）\n\
  *   执行 `java HelloWorld` 运行生成的 `HelloWorld.class` 文件中的字节码。\n\n图 3-22 展示了在 IntelliJ\
  \ IDEA 的终端中执行这些命令的过程。\n\n![](img/463938_3_En_3_Fig22_HTML.jpg)\n\n图 3-22\n\n在 IntelliJ\
  \ IDEA 内部的终端中手动编译和运行 `HelloWorld` 类\n\n看起来很简单，对吧？实际上就是这么简单，因为没有定义任何包或 Java 模块。*但是，等等，这真的可能吗？*\
  \ 嗯，是的。如果你没有定义包，该类仍然属于一个未命名的默认包，这是 JSE 平台默认提供的，用于开发小型、临时性的教学应用程序，就像你现在正在构建的这个。\n\
  \n那么，让我们把项目变得稍微复杂一点，为我们的类添加一个命名包。\n\n\n\n### 将 HelloWorld 类放入包中\n\n如前文图 3-18 所示，右键点击\
  \ `src` 目录时弹出的上下文菜单中包含一个**包**选项。因此，请右键点击 `src` 目录并选择该选项。在弹出的对话框中，输入包名 `com.sandbox`。如图\
  \ 3-23 所示，如果你尝试创建的包已存在（就像我的情况），则会显示一条红色错误信息。\n\n![](img/463938_3_En_3_Fig23_HTML.jpg)\n\
  \n图 3-23\n\n在 IntelliJ IDEA 中创建重复的包\n\n现在我们已经有了一个包，但类并不在其中。要将类移入包中，只需点击该类并将其拖拽过去。此时会弹出另一个对话框，确认你是否确实要执行此操作，如图\
  \ 3-24 所示。\n\n![](img/463938_3_En_3_Fig24_HTML.jpg)\n\n图 3-24\n\n在 IntelliJ IDEA\
  \ 中将类移入包中\n\n点击**重构**按钮，观察类发生的变化。该类现在应以 `package com.sandbox``;` 声明开头。如果你重新构建项目，然后查看\
  \ `production` 目录，将会看到类似于图 3-25 所示的内容。\n\n![](img/463938_3_En_3_Fig25_HTML.jpg)\n\
  \n图 3-25\n\n添加 `com.sandbox` 包后的新目录结构\n\n显然，在手动编译和执行类时，必须考虑到包的存在，因此命令将如清单 3-18 所示发生变化。\n\
  \n```\n~/sandbox/src/> javac com/sandbox/HelloWorld.java\n~/sandbox/src/> java com/sandbox/HelloWorld\n\
  清单 3-18\n编译和执行 HelloWorld.java 文件的包版本\n```\n\n那么，当模块也被配置时会发生什么？存在一个默认的未命名模块，所有 JAR（无论是否模块化）以及类路径上的类都将包含在其中。这个默认的未命名模块会导出所有包并读取所有其他模块。由于它没有名称，因此不能被命名的应用程序模块所要求和读取。因此，即使你的小项目在\
  \ JDK 9 及以上版本中似乎能正常工作，它也无法被其他模块访问，但它之所以能工作，是因为它可以访问其他模块。（这确保了与旧版本 JDK 的向后兼容性。）话虽如此，让我们也在项目中添加一个模块。\n\
  \n### 配置 com.sandbox 模块\n\n配置模块就像在 `src` 目录下添加一个 `module-info.java` 文件一样简单。再次回到图\
  \ 3-18，`src` 的上下文菜单中包含一个 `module-info.java` 选项。选择该选项，IDE 将为你生成该文件。一切顺利，如果你不喜欢为你生成的模块名称，可以更改它。我将其更改为\
  \ `com.sandbox`，以遵循 Oracle 开发者建立的模块命名约定。该文件初始为空，如清单 3-19 所示。\n\n```\nmodule com.sandbox\
  \ {\n}\n清单 3-19\ncom.sandbox 模块配置文件\n```\n\n现在我们有了一个模块，会发生什么？从 IDE 的角度来看，变化不大。但如果你想手动编译一个模块，你需要了解一些事情。我使用清单\
  \ 3-20 中的命令编译了我们的模块。\n\n```\n~/sandbox/src/> javac -d ../out/com.sandbox \\\nmodule-info.java\
  \ \\\ncom/sandbox/HelloWorld.java\n清单 3-20\n手动编译包含在模块中的包\n```\n\n重要提示\n\n“`\\`”（反斜杠）是\
  \ macOS/Linux 的分隔符。在 Windows 上，要么将整个命令写在一行，要么将 `\\` 替换为 `^`（脱字符）。\n\n清单 3-20 中的命令是根据清单\
  \ 3-21 中的模板构建的。\n\n```\njavac -d [目标位置]/[模块名称] \\\n[源位置]/module-info.java \\\n[java\
  \ 文件...]\n清单 3-21\n手动编译包含在模块中的包的命令模板\n```\n\n`-d [目标位置]` 决定了执行结果应保存的位置。清单 3-20 中的命令行将输出文件夹指定为\
  \ `/out/com.sandbox`，是为了明确 `com.sandbox` 是外部模块。在此目录下，我们将拥有 `com.sandbox` 包的正常结构。`out`\
  \ 目录的内容如图 3-26 所示。\n\n![](img/463938_3_En_3_Fig26_HTML.jpg)\n\n图 3-26\n\n手动编译的 Java\
  \ 模块 `com.sandbox`\n\n正如你在本例中注意到的，模块实际上并不存在，直到我们编译了源代码，因为 Java 模块更像是一种由 `module-info.class`\
  \ 描述符描述的封装包的逻辑模式。`com.sandbox` 目录被创建的唯一原因是我们将其指定为 `javac -d` 命令的参数。\n\n既然我们已经成功编译了一个模块，清单\
  \ 3-22 展示了当 `HelloWorld` 类包含在模块中时如何运行它。\n\n```\n~/sandbox/> java --module-path out\
  \ \\\n--module com.sandbox/com.sandbox.HelloWorld\nHello World!  # 结果\n清单 3-22\n\
  手动执行包含在模块中的类\n\n前面的命令是根据清单 3-23 中的模板构建的。\n\n```\njava --module-path [目标位置] \\\n\
  --module [模块名称] /[包名称].HelloWorld\n清单 3-23\n手动执行包含在模块中的类的命令模板\n```\n\n2017 年 9 月的\
  \ *Oracle Magazine* 期刊首次提到了 Java 模块命名的示例。尽管 Oracle 开发者决定模块名称应遵循与包相同的规则，但对我来说这似乎有点多余，尤其是在包名称往往变得非常长的复杂项目中。你是否也应该让模块名称同样长？\n\
  \n事实是，人们制定标准，而大多数时候，实用的做法就成了标准。自 2007 年以来，那些成功采用模块的项目都选择了更简单、更实用的模块名称。例如，创建 Spring\
  \ Framework 的团队决定将其模块命名为 `spring.core` 而不是 `org.springframework.core`，`spring.beans`\
  \ 而不是 `org.springframework.beans`，等等。因此，你可以随意命名你的模块，只要避免使用特殊字符和数字即可。\n\n\n\n## 使用构建工具（主要是\
  \ Maven）的 Java 项目\n\n如第 2 章所述，Apache Maven 是一种主要用于 Java 项目的构建自动化工具。尽管 Gradle 正在兴起，但\
  \ Maven 仍然是最常用的构建工具之一。像 Maven 和 Gradle 这样的工具用于将应用程序的源代码组织成相互依赖的项目模块，并配置一种自动编译、验证、生成源代码、测试和生成工件的方式。一个*工件*是一个文件，通常是\
  \ JAR，会被部署到 Maven 仓库。Maven *仓库*是硬盘上的一个位置，JAR 文件按照特殊的目录结构保存在那里。\n\n任何关于构建工具的讨论都必须从\
  \ Maven 开始，因为这种构建工具标准化了我们今天在开发中使用的许多术语。一个拆分为多个子项目的项目可以从 GitHub 下载，并在命令行中构建，或导入到\
  \ IntelliJ IDEA 中。这种方法确保你能获得可以一次性编译的优质源代码。这也很实用，因为我想你肯定不希望每次开始阅读新章节时都要在 IntelliJ\
  \ IDEA 中加载一个新项目。此外，这也让我更容易维护源代码并使其适应新的 JDK，而且由于 Oracle 发布如此频繁，我需要能够快速完成这项工作。\n\n\
  你将用来测试本书中编写的代码，以及（如果你愿意）编写自己代码的项目，名为 `java-23-for-absolute-beginners`。它是一个多模块 Maven\
  \ 项目。项目的第一级是 `java-23-for-absolute-beginners` 项目，它有一个名为 `pom.xml` 的配置文件。在这个文件中，列出了所有依赖项及其版本。子项目，即第二级的项目，是这个项目的模块。它们被称为*子*项目，因为它们从父项目继承了这些依赖项和模块。在其配置文件中，我们可以指定需要父项目中定义的依赖项列表中的哪些依赖项。\n\
  \n这些模块实际上是一种将每章的源代码打包在一起的方法，这就是为什么这些模块被命名为 `chapter00`、`chapter01` 等等。如果一个项目很大，需要编写大量代码，代码会再次拆分到另一级模块中。`chapter05`\
  \ 模块就是这种情况，它被配置为其下项目的父模块。在图 3-27 中，你可以看到这个项目在 IntelliJ IDEA 中加载后的样子，并且 `chapter05`\
  \ 模块已展开，因此你可以看到第三级模块。每一级都用相应的数字标记。\n\n![](img/463938_3_En_3_Fig27_HTML.jpg)\n\n\
  图 3-27\n\nMaven 多级项目结构\n\n如果你已经按照**第** **2** 章所教的方法将项目加载到 IntelliJ IDEA 中，你可以通过构建项目来确保一切正常工作。以下是使用\
  \ IntelliJ IDEA 编辑器执行此操作的方法：\n\n![](img/463938_3_En_3_Fig28_HTML.jpg)\n\n图 3-28\n\
  \nMaven 项目视图\n\n*   在右上角，你应该会看到一个名为 *Maven* 的选项卡。如果子项目像图 3-28 所示那样加载，则项目已正确加载。\n\
  \n*   如果 Maven 选项卡不可见，请查找像 (1) 标记的标签并单击它。展开 `java-23-for-absolute-beginners`（根）节点，直到找到标记为\
  \ (2) 的构建任务。如果你双击它，并且在编辑器底部的视图中没有看到任何错误，则你的所有项目都已成功构建。你肯定应该看到 BUILD SUCCESS (3)\
  \ 消息。\n\n确保 Maven 项目按预期工作的第二种方法是从命令行构建它。打开一个 IntelliJ IDEA 终端，如果你按照**第** **2** 章所述将\
  \ Maven 安装在系统路径中，只需输入 `mvn` 并按**回车**。\n\n重要\n\n位于项目根目录的主 `pom.xml` 文件通过以下行配置了一个默认目标：`<defaultGoal>clean\
  \ install</defaultGoal>`。它声明了构建此项目所需的两个 Maven 执行阶段。如果配置中没有这个元素，则需要在命令中指定这两个阶段来构建项目（例如，`mvn\
  \ clean install`）。\n\n在命令行中，如果当你拿到本书时 JDK 23 仍不稳定，你可能会看到一些警告，但只要执行以 BUILD SUCCESSFUL\
  \ 结束，一切就都没问题。\n\n除了 `sandbox` 项目（它足够简单，你可以自己创建）之外，本节中提到的所有类、模块和包都是此项目的一部分。`chapter00`\
  \ 和 `chapter01` 模块实际上并不包含特定于这些章节的类，但我需要它们来构建 Java 模块示例。IntelliJ IDEA 按字母顺序对模块进行排序，因此章节模块的命名方式是这样选择的，以便它们按照你应该使用的正常顺序列出。\n\
  \n到目前为止，本章一直专注于 Java 应用程序的构建块，并且我们按照说明创建了一个打印 *Hello World!* 的类，但并非所有细节都已解释。现在让我们来看看这些细节，甚至用新的细节来丰富这个类。\n\
  \n\n\n## 解释并丰富 Hello World! 类\n\n之前，我们在 `sandbox` 项目中编写了一个名为 `HelloWorld` 的类。该类已复制到\
  \ `chapter03` 项目的 `com.apress.bgn.three.helloworld` 包中。本章首先列出了类的主要组成部分。`HelloWorld`\
  \ 类包含了其中几个元素，本节将对这些元素进行更详细的解释。在图 3-29 中，`HelloWorld` 类显示在 IntelliJ IDEA 编辑器中。\n\n\
  ![](img/463938_3_En_3_Fig29_HTML.jpg)\n\n图 3-29\n\n`java-23-for-absolute-beginners`\
  \ 项目中的 `HelloWorld` 类\n\n这些行包含不同的语句，如下列表所述，每行的编号与列表中的编号对应：\n\n1.  **包声明**：当类属于某个包时，其代码必须以声明该包的行开头。`package`\
  \ 是 Java 中的保留关键字，除了声明包之外不能用于其他任何用途。\n\n2.  *留空行以便于阅读。*\n\n3.  **类声明**：这是我们声明类型的一行：\n\
  \    *   它是公开的，因此可以从任何地方访问。\n\n*   它是一个类。\n\n*   它被命名为 HelloWorld。\n\n*   它有一个用花括号括起来的主体，左花括号在这一行。但它也可以放在下一行，因为空格会被忽略。\n\
  \n4.  `main(..)` **方法声明**：在 Java 中，方法名称及其参数的数量、类型和顺序被称为*方法签名*。方法还有一个**返回类型**，即它返回的结果的类型。但还有一种特殊类型可用于声明方法不返回任何内容。按出现顺序，以下是\
  \ `main()` 方法中每个术语的含义：\n    *   `public`：这是方法的访问修饰符。`main` 方法必须是 `public` 的，否则 JRE\
  \ 无法访问并调用它。\n\n*   `static`：回想一下，本章开头提到一个类有成员（字段和方法）。当创建该类的对象时，它拥有该类声明的字段和方法。类是创建对象的模板。然而，由于\
  \ `static` 关键字，`main` 方法不与类的对象关联，而是与类本身关联。更多细节将在**第** **4** **章**中提供。\n\n*   **void**：此关键字在此用于告知我们\
  \ `main` 方法不返回任何内容，因此它类似于*无类型*的替代品，因为如果不返回任何内容，就不需要类型。\n\n*   `String... args` 或\
  \ `String[] args`：方法有时被声明为接收一些输入数据，`String[] args` 表示一个文本值数组。三个点是指定一个方法可以有多个相同类型参数的另一种方式。（可变参数也必须是方法的唯一参数，或者是最后一个参数；否则，解析参数将变得不可能。）三个点表示法只能用于方法参数，称为*可变参数*。这意味着你可以传入一个参数数组，而无需显式创建该数组。数组是固定长度的数据集，在数学中被称为*一维矩阵*或*向量*。`String`\
  \ 是 Java 中表示文本对象的类。`[]` 表示数组，`args` 是其名称。但是等等，我们之前运行过这个方法，并没有提供任何参数！嗯，这不是强制性的，但在此列表之后，你将看到如何为其提供参数（提供给方法的值，这些值将被方法体中的代码使用）。\n\
  \n5.  `System.out.println(“HelloWorld!”);`**：** 此语句用于在控制台中输出 *Hello World!*。\n\n\
  6.  `}` 是 `main` 方法体的右花括号。\n\n7.  *留空行以便于阅读。*\n\n8.  `}` 是类体的右花括号。\n\n如果我们执行这个类，我们将在控制台中看到打印出\
  \ `Hello World!`。之前（在图 3-21 中）已经向你展示了如何执行一个包含 `main(..)` 方法的类。以这种方式执行类后，IntelliJ\
