  \ {\nvar localUri = new URI(\"file:///[workspace]/java-17-for-absolute-beginners/README.adoc\"\
  );\nvar localFile =  new File (localUri);\nprintFileStats(localFile);\n} catch (URISyntaxException\
  \ use) {\nLOGGER.error(\"URI 格式错误，该路径下没有文件\", use);\n}\n清单 11-2\n使用 URI 打印文件详情\n\
  ```\n\nURI 可能不正确，例如前缀不正确或包含错误的路径，因此 URI 构造函数被声明为会抛出 `java.net.URISyntaxException`。这是一个受检异常，所以你编写的代码必须处理它。在使用\
  \ URI 创建文件处理器的情况下，`getAbsolutePath()` 方法会返回文件所在计算机和驱动器上的绝对路径名。\n\n注意\n\n`file:///`\
  \ 协议在 macOS（及其他操作系统）中用于以 URL 格式指定文件路径。这允许应用程序和网页浏览器直接从文件系统访问文件。只要将 `[workspace]`\
  \ 替换为真实路径，它在 Windows 上也能正常工作。\n\n信息\n\n由于清单 11-1 和 11-2 都对同一个文件调用了 `printFileStats(..)`，因此控制台输出是相同的。欢迎亲自尝试运行代码。\n\
  \n### `getParent`、`getName`、`length`、`isHidden`、`canRead` 和 `canWrite`\n\n由于这些方法每个都没有太多可说的，我将它们归并到本节中。以下是简要总结：\n\
  \n*   `getParent()` 返回包含该文件的目录的绝对路径，因为在层级结构上，文件不能将另一个文件作为父级。\n\n*   `getName()`\
  \ 返回文件名。文件名包含扩展名，即 `\".\"` 之后的部分，用于指示文件类型及其预期用途。\n\n*   `length()` 返回文件的字节长度。此方法不适用于目录，因为目录可能包含对执行程序的用户受限的文件，并且可能会抛出异常。因此，如果你需要获取目录的大小，必须自己编写代码。\n\
  \n*   `isHidden()` 如果文件对当前用户不可见，则返回 `true`，否则返回 `false`。在 macOS/Linux 系统上，以 `\"\
  .\"` 开头的文件是隐藏的，所以如果我们想看到该方法返回 `true`，必须为其中一个系统配置文件（例如 `.gitconfig`）创建一个处理器。因此，在使用指向隐藏文件的路径名创建的文件处理器上调用\
  \ `printFileStats(..)` 方法，将产生类似于清单 11-3 的输出。\n\n*   `canRead()` 和 `canWrite()` 的含义显而易见，因为文件可以对普通用户进行安全保护。当用户对文件拥有特定权限时，这两个方法都返回\
  \ `true`，否则返回 `false`。\n\n```\nINFO  c.a.b.e.Main - 文件详情:\nINFO  c.a.b.e.Main -\
  \ 类型 : 文件\nINFO  c.a.b.e.Main - 位置 :/Users/[userDir]/.gitconfig\nINFO  c.a.b.e.Main\
  \ - 父目录 :/Users/[userDir]\nINFO  c.a.b.e.Main - 名称 : .gitconfig\nINFO  c.a.b.e.Main\
  \ - 大小 : 3.865234375\nINFO  c.a.b.e.Main - 是否隐藏 : true\nINFO  c.a.b.e.Main - 是否可读?\
  \ : true\nINFO  c.a.b.e.Main - 是否可写? : true\n清单 11-3\n打印隐藏文件的文件详情\n```\n\n### 处理目录：`list()`\
  \ 和 `listFiles()`\n\n可以为指向目录的路径名创建文件处理器，这意味着存在一些仅适用于目录的可调用方法。对目录最常见的操作是列出其内容。`list()`\
  \ 方法返回一个 `String` 数组，其中包含此目录下的文件（和目录）名称。使用 lambda 表达式可以非常实用地打印目录中的项目：\n\n```\nvar\
  \ d = new File(\"/[workspace]/java-17-for-absolute-beginners\");\nArrays.stream(Objects.requireNonNull(d.list())).forEach(ff\
  \ -> LOGGER.info(\"\\t 文件名 : {}\", ff));\n```\n\n在大多数情况下，文件名并不是很有用；拥有一个包含每个文件处理器的\
  \ `File` 数组会更好。这就是为什么在 1.2 版本中添加了 `listFiles()` 方法：\n\n```\nArrays.stream(Objects.requireNonNull(d.listFiles())).forEach(ff\
  \ -> LOGGER.info(\"\\t 文件 : {}\", ff.getAbsolutePath()));\n```\n\n此方法有不止一种形式，因为它可以用来过滤文件，并在使用\
  \ `FileFilter` 实例调用时，仅返回符合特定要求的文件或目录的文件处理器。清单 11-4 中的代码示例过滤了目录下的条目，并仅保留名称以 `chapter`\
  \ 开头的目录。\n\n```\npackage com.apress.bgn.eleven.io;\nimport java.io.File;\nimport\
  \ java.io.FileFilter;\n// 其他导入和包装代码已省略\nvar d = new File(\"/[workspace]/java-17-for-absolute-beginners\"\
  );\nArrays.stream(d.listFiles(new FileFilter() {\n@Override\npublic boolean accept(File\
  \ childFile) {\nreturn childFile.isDirectory() && childFile.getName().startsWith(\"\
  chapter\");\n}\n})).forEach(ff -> LOGGER.info(\"章节源码 : {}\", ff.getName()));\n清单\
  \ 11-4\n使用 FileFilter 实例过滤目录内容\n```\n\n清单 11-4 以展开形式编写，以便清楚地表明你应该为 `accept(..)`\
  \ 方法提供一个具体实现。通过如下使用 lambda 表达式，前面的代码可以简化，甚至更不容易抛出异常：\n\n```\nArrays.stream(\nObjects.requireNonNull(d.listFiles(\n\
  childFile -> childFile.isDirectory() && childFile.getName().startsWith(\"chapter\"\
  )))\n).forEach(ff -> LOGGER.info(\"章节源码 : {}\", ff.getName())\n);\n```\n\n在清单 11-4\
  \ 中，我们实现了 `accept(..)` 方法来按文件类型和名称进行过滤，但过滤器可以涉及任何条件。当你需要的过滤器严格涉及文件名时，可以使用该方法的另一个版本，它接收一个\
  \ `FilenameFilter` 实例作为参数：\n\n```\nArrays.stream(Objects.requireNonNull(d.listFiles(new\
  \ FilenameFilter() {\n@Override\npublic boolean accept(File dir, String name) {\n\
  return name.startsWith(\"chapter\");\n}\n}))).forEach(ff -> LOGGER.info(\"\\t 章节目录\
  \ : {}\", ff.getAbsolutePath()));\n```\n\n\n\n### `createNewFile()`、`exists()`、`createTempFile(..)`\
  \ 和 `deleteOnExit()`\n\n除了列出文件属性外，文件处理器还可用于创建文件。要创建文件，必须在创建具有特定路径名的文件处理器后调用 `createNewFile()`\
  \ 方法，如清单 11-5 所示。\n\n```\npackage com.apress.bgn.eleven.io;\nimport java.io.IOException;\n\
  // 其他导入和包装代码已省略\nvar created = new File(\n\"chapter11/read-write-file/src/main/resources/output/created.txt\"\
  );\nif (!created.exists()) {\ntry {\nvar result = created.createNewFile();\nLOGGER.info(\"\
  文件是否已创建？ {}\", result);\n} catch (IOException e) {\nLOGGER.error(\"无法创建文件。\", e);\n\
  }\n}\n清单 11-5\n创建文件\n```\n\n当文件处理器与具体文件或目录关联时，`exists()` 方法返回 `true`，否则返回 `false`。它可用于测试我们尝试创建的文件是否已存在。如果文件已存在，该方法不产生任何效果。如果用户没有在指定路径名创建文件的适当权限，则会抛出\
  \ `SecurityException`。\n\n在某些情况下，我们可能需要创建一个仅在程序执行期间使用的文件。这意味着我们要么显式创建文件并删除它，要么创建一个临时文件。临时文件通过调用\
  \ `createTempFile(prefix, suffix)` 创建，它们会被创建在操作系统定义的临时目录中。`prefix` 参数是 `String`\
  \ 类型，其值将作为所创建文件名称的前缀。`suffix` 参数也是 `String` 类型，可用于指定文件的扩展名。文件名的其余部分由操作系统生成。创建临时文件的代码如清单\
  \ 11-6 所示。\n\n```\npackage com.apress.bgn.eleven.io;\nimport java.io.IOException;\n\
  // 其他导入和包装代码已省略\ntry {\nFile temp = File.createTempFile(\"java_bgn_\", \".tmp\"\
  );\nLOGGER.info(\"文件创建于：{}\", temp.getAbsolutePath());\ntemp.deleteOnExit();\n}\
  \ catch (IOException e) {\nLOGGER.error(\"无法创建临时文件。\", e);\n}\n清单 11-6\n创建临时文件\n\
  ```\n\n操作系统临时目录中的文件会由操作系统定期删除，但如果你希望确保临时文件被删除，可以在临时文件的处理器上显式调用 `deleteOnExit()`。在清单\
  \ 11-6 的代码示例中，打印了文件的绝对路径以显示临时文件创建的确切位置，在 macOS 系统上，完整路径名类似于：\n\n```\n/var/folders/gg/nm_cb2lx72q1lz7xwwdh7tnc0000gn/T/java_bgn_14652264510049064218.tmp\n\
  ```\n\n你可以通过以调试模式运行 `Main` 类，并在日志语句上设置断点来停止执行，以检查临时文件在你系统上的保存位置，如图 11-1 所示。\n\n\
  ![](img/463938_3_En_11_Fig1_HTML.jpg)\n\n图 11-1\n\nIntelliJ IDEA 调试器显示临时文件的绝对路径\n\
  \n### `renameTo`\n\n文件也可以使用 Java 文件处理器进行重命名。调用 `rename(f)` 方法时，需要传入一个文件处理器参数，该参数指向文件应具有的位置和所需名称。如果重命名成功，该方法返回\
  \ `true`，否则返回 `false`。执行此操作的代码如清单 11-7 所示。\n\n```\npackage com.apress.bgn.eleven.io;\n\
  import java.io.IOException;\n// 其他导入和包装代码已省略\nfile = new File(\n\"chapter11/read-write-file/src/main/resources/output/created.txt\"\
  );\nvar renamed = new File(\n\"chapter11/read-write-file/src/main/resources/output/renamed.txt\"\
  );\nboolean result = file.renameTo(renamed);\nLOGGER.info(\"重命名是否成功？ : {} \", result);\n\
  清单 11-7\n重命名文件\n```\n\n`File` 类中的大多数方法都会抛出 `IOException`，因为操作文件可能因各种原因失败，包括硬件问题或操作系统问题。这种类型的异常是受检异常，使用文件处理器的开发人员必须捕获并处理此类异常。\n\
  \n需要特殊权限才能访问文件的方法会抛出 `SecurityException`。此类型扩展了 `RuntimeException`，因此这些异常是非受检的。它们会在应用程序运行时变得明显。\n\
  \n现在你已经掌握了使用文件处理器的所有基础知识。\n\n\n\n## 路径处理器\n\n`java.nio.file.Path` 接口与工具类 `java.nio.file.Files`\
  \ 和 `java.nio.file.Paths` 一同在 Java 7 中被引入，旨在提供更新、更实用的文件处理方式。`Path` 实例可用于定位文件系统中的文件，因此它表示一个依赖于系统的文件路径。`Path`\
  \ 实例比 `File` 实例更实用，因为它们提供了访问路径组件、组合路径以及比较路径的方法。\n\n`Path` 实例不能直接创建，因为接口无法实例化，但该接口提供了创建它们的静态工具方法，`Paths`\
  \ 类也是如此。根据你的情况，选择使用任意一种即可。\n\n创建 `Path` 实例最简单的方法是先获取一个文件处理器，然后调用 `Paths.get(fileURI)`，如清单\
  \ 11-8 所示。\n\n```\npackage com.apress.bgn.eleven.io;\n// 其他导入已省略\nimport java.io.File;\n\
  import java.nio.file.Path;\nimport java.nio.file.Paths;\npublic class PathDemo {\n\
  private static final Logger LOGGER = LoggerFactory.getLogger(PathDemo.class);\n\
  void main() {\nFile file = new File(\n\"/[workspace]/java-23-for-absolute-beginners/README.adoc\"\
  );\nPath path = Path.of(file.toURI());\nLOGGER.info(path.toString());\n}\n}\n清单\
  \ 11-8\n创建 Path 实例\n```\n\n从 Java 11 开始，`Paths.get(file.toURI())` 可以替换为 `Path.of(file.toURI())`。另一种创建\
  \ `Path` 实例的方法是使用 `Paths.get(..)` 的另一种形式，该形式接收路径的多个片段作为参数：\n\n```\nPath composedPath\
  \ = Paths.get(\"/[workspace]\",\n\"java-23-for-absolute-beginners\",\n\"README.adoc\"\
  );\nLOGGER.info(composedPath.toString());\n```\n\n之前创建的两个路径都指向同一个位置，因此如果使用 `compareTo(..)`\
  \ 方法（因为 `Path` 扩展了接口 `Comparable<Path>`）相互比较，返回的结果将是 0（零），这意味着这两个路径是相等的：\n\n```\n\
  LOGGER.info(\"是同一个路径吗？ : {} \", path.compareTo(composedPath) = =0 ? \"是\" : \"否\"\
  );\n// 输出 : INFO com.apress.bgn.ch11.PathDemo - 是同一个路径吗？ : 是\n```\n\n在清单 11-9 的代码示例中，对路径实例调用了一些\
  \ `Path` 方法。\n\n```\npackage com.apress.bgn.eleven.io;\n// 导入部分已省略\npublic class\
  \ PathDemo {\nprivate static final Logger LOGGER = LoggerFactory.getLogger(PathDemo.class);\n\
  public static void main(String... args) {\nvar path = Paths.get(\"/[workspace]\"\
  ,\n\"java-23-for-absolute-beginners\",\n\"README.adoc\");\nprintPathDetails(path);\n\
  }\nprivate static void printPathDetails(Path path) {\nLOGGER.info(\"路径详情:\");\n\
  LOGGER.info(\"\\t 文件名 : {}\", path.getFileName());\nLOGGER.info(\"\\t 父路径 :{}\"\
  , path.getParent());\nLOGGER.info(\"\\t 位置 :{}\", path.toAbsolutePath());\nLOGGER.info(\"\
  \\t 是绝对路径? : {}\", path.isAbsolute());\nLOGGER.info(\"\\t 根路径 :{}\", path.getRoot());\n\
  LOGGER.info(\"\\t 文件系统 : {}\", path.getFileSystem());\nLOGGER.info(\"\\t 文件系统是否只读\
  \ : {}\", path.getFileSystem().isReadOnly());\n}\n}\n清单 11-9\n检查路径详情\n```\n\n以下列表解释了每个方法及其结果：\n\
  \n*   `toAbsolutePath()` 返回一个 `Path` 实例，表示此路径的绝对路径。当在之前创建的 `Path` 实例上调用时，由于它已经是绝对路径，该方法将直接返回调用该方法的路径对象。此外，调用\
  \ `path.isAbsolute()` 将返回 `true`。\n\n*   `getParent()` 返回父 `Path` 实例。在 `Path` 实例上调用此方法将输出：\n\
  \n*   `getRoot()` 返回此路径的根组件，作为一个 `Path` 实例。在 Linux 或 macOS 系统上，它会输出 `\"/\"`，而在 Windows\
  \ 上，它会输出类似 `\"C:\\\"` 的内容。\n\n*   `getFileName()` 返回此路径所表示的文件或目录的名称，作为一个 `Path`\
  \ 实例；基本上，路径会按系统路径分隔符进行拆分，并返回距离根元素最远的那个部分。\n\n*   `getFileSystem()` 返回创建此对象的文件系统。对于\
  \ macOS，它是一个类型为 `sun.nio.fs.MacOSXFileSystem` 的实例。\n\n```\nINFO com.apress.bgn.ch11.PathDemo\
  \ - 父路径 :/[workspace]/java-23-for-absolute-beginners/README.adoc\n```\n\n另一个有用的\
  \ `Path` 方法是 `resolve(..)`。此方法接收一个表示路径的 `String` 实例，并针对调用它的 `Path` 实例进行解析。这意味着会根据程序运行的操作系统添加路径分隔符，并返回一个\
  \ `Path` 实例。这在清单 11-10 中进行了描述。\n\n```\nvar chapterPath = Paths.get(\"/Users/iuliana/apress/workspace\"\
  ,\n\"java-23-for-absolute-beginners/chapter11\");\nPath filePath = chapterPath.resolve(\n\
  \"read-write-file/src/main/resources/input/data.txt\") ;\nLOGGER.info(\"解析后的路径 :{}\"\
  , filePath.toAbsolutePath());\n清单 11-10\n检查路径详情（续）\n```\n\n清单 11-10 的代码示例将输出以下内容：\n\
  \n```\nINFO  c.a.b.e.PathDemo - 解析后的路径 :/[workspace]/java-23-for-absolute-beginners/chapter11/read-write-file/src/main/resources/input/data.txt\n\
  ```\n\n使用 `Path` 实例，结合 `Files` 工具方法，编写管理文件或检索其属性的代码变得更加容易。清单 11-11 中的代码示例使用了其中一些方法来打印文件的属性，方式与我们之前使用\
  \ `file` 处理器时相同。\n\n```\npackage com.apress.bgn.eleven.io;\n// 导入部分已省略\npublic class\
  \ PathDemo {\nprivate static final Logger log = LoggerFactory.getLogger(PathDemo.class);\n\
  public static void main(String... args) {\nvar outputPath = FileSystems.getDefault()\n\
  .getPath(\"/[workspace]/java-23-for-absolute-beginners/\" +\n\"chapter11/read-write-file/src/main/resources/output/sample\"\
  );\ntry {\nPath dirPath = Files.createDirectory(outputPath);\nprintPathStats(dirPath);\n\
  } catch (FileAlreadyExistsException faee) {\nLOGGER.error(\"目录已存在。\", faee);\n}\
  \ catch (IOException e) {\nLOGGER.error(\"无法创建目录。\", e);\n}\n}\nprivate static void\
  \ printPathStats(Path path) {\nif (Files.exists(path)) {\nLOGGER.info(\"路径详情:\"\
  );\nLOGGER.info(\"\\t 类型: {}\", Files.isDirectory(path) ? \"是\" : \"否\");\nLOGGER.info(\"\
  \\t 类型: {}\", Files.isRegularFile(path) ? \"是\" : \"否\");\nLOGGER.info(\"\\t 类型:\
  \ {}\", Files.isSymbolicLink(path) ? \"是\" : \"否\");\nLOGGER.info(\"\\t 位置 :{}\"\
  , path.toAbsolutePath());\nLOGGER.info(\"\\t 父路径 :{}\", path.getParent());\nLOGGER.info(\"\
  \\t 名称 : {}\", path.getFileName());\ntry {\ndouble kilobytes = Files.size(path)\
  \ / (double)1024;\nLOGGER.info(\"\\t 大小 : {} \", kilobytes);\nLOGGER.info(\"\\t\
  \ 是否隐藏: {}\", Files.isHidden(path) ? \"是\" : \"否\");\n} catch (IOException e) {\n\
  LOGGER.error(\"无法访问文件。\", e);\n}\nLOGGER.info(\"\\t 是否可读: {}\", Files.isReadable(path)\
  \ ? \"是\" : \"否\");\nLOGGER.info(\"\\t 是否可写: {}\", Files.isWritable(path) ? \"是\"\
  \ : \"否\");\n}\n}\n}\n清单 11-11\n打印更多路径详情\n```\n\n如你所见，`Files` 类提供了与 `File` 类相同的功能。`Files`\
  \ 类完全由操作文件、目录或其他类型文件的静态方法组成。它是在 Java 7 中引入的，其优势在于语法更清晰。使用 `java.nio` 类的强大和实用性在管理文件、创建、重命名、删除以及读写文件时更为明显。清单\
  \ 11-12 中的代码示例展示了使用 Java NIO 类创建、重命名和删除文件的过程。\n\n\n\n```\npackage com.apress.bgn.eleven.io;\n\
  // import section omitted\nimport java.nio.FileAlreadyExistsException;\npublic class\
  \ PathDemo {\nprivate static final Logger LOGGER = LoggerFactory.getLogger(PathDemo.class);\n\
  public static void main(String... args) {\nPath filePath = chapterPath.resolve(\n\
  \"read-write-file/src/main/resources/input/data.txt\");\nPath copyFilePath = Paths.get(outputPath.toAbsolutePath().toString(),\
  \ \"data.adoc\");\ntry {\nFiles.copy(filePath, copyFilePath);\nLOGGER.info(\"Exists?\
  \ : {}\", Files.exists(copyFilePath)? \"yes\": \"no\");\nLOGGER.info(\"File copied\
  \ to: {}\", copyFilePath.toAbsolutePath());\n} catch (FileAlreadyExistsException\
  \ faee) {\nLOGGER.error(\"File already exists.\", faee);\n} catch (IOException e)\
  \ {\nLOGGER.error(\"Could not copy file.\", e);\n}\nPath movedFilePath = Paths.get(outputPath.toAbsolutePath().toString(),\
  \ \"copy-data.adoc\");\ntry {\nFiles.move(copyFilePath, movedFilePath);\nLOGGER.info(\"\
  File moved to: {}\", movedFilePath.toAbsolutePath());\nFiles.deleteIfExists(copyFilePath);\n\
  } catch (FileAlreadyExistsException faee) {\nLOGGER.error(\"File already exists.\"\
  , faee);\n}  catch (IOException e) {\nLOGGER.error(\"Could not move file.\", e);\n\
  }\n}\n}\n列表 11-12\n复制和移动文件\n```\n\n信息\n\n尽管在**第** **5** 章中介绍了紧凑的 `catch` 异常语句，但在不同异常类型具有不同原因且应区别处理的代码示例中，将使用展开形式。\n\
  \n请注意 `FileAlreadyExistsException`，这是 Java 7 中新增的异常类型，它扩展了 `IOException`，用于提供更多关于导致文件操作失败情况的数据。它由\
  \ `createDirectory(..)`、`createFile(..)` 和 `move(..)` 方法抛出。\n\n列表 11-12 中未使用的 `delete(..)`\
  \ 方法，如果待删除的文件不存在，则会抛出 `java.nio.file.NoSuchFileException`。为了避免抛出异常，列表 11-12 中使用了\
  \ `deleteIfExists(..)`。\n\n`Files` 中的方法列表更长，但由于本章篇幅有限，您可以自行查阅官方 Javadoc API。\n\n\
  ## 读取文件\n\n每个文件都是硬盘上的一系列比特位。`File` 处理器不提供读取文件内容的方法，但可以使用其他一组类来实现，所有这些类都是通过文件处理器实例创建的。Java\
  \ 提供了多种读取文件的方式，选择哪种方式取决于实际需要对文件内容进行何种操作。本节将介绍四种最常见的方式。\n\n### 使用 `Scanner` 读取文件\n\
  \n`Scanner` 类之前用于从命令行读取输入。可以将 `System.in` 替换为 `File`，并使用 `Scanner` 方法来读取文件内容，如列表\
  \ 11-13 所示。\n\n```\npackage com.apress.bgn.eleven.io;\nimport java.util.Scanner;\n\
  // other import statements omitted\npublic class ScannerDemo {\nprivate static final\
  \ Logger LOGGER = LoggerFactory.getLogger(ScannerDemo.class);\nvoid main() {\ntry\
  \ {\nfinal String inDir = \"chapter11/read-write-file/src/main/resources/input/\"\
  ;\nvar scanner = new Scanner(new File(\"chapter11/read-write-file/src/main/resources/input/data.txt\"\
  ));\nvar content = \"\";\nwhile (scanner.hasNextLine()) {\ncontent += scanner.nextLine()\
  \ + \"\\n\";\n}\nscanner.close();\nLOGGER.info(\"Read with Scanner --> {}\", content);\n\
  } catch (IOException e) {\nLOGGER.error(\"Something went wrong! \", e);\n}\n}\n\
  }\n列表 11-13\n使用 Scanner 读取文件\n```\n\n除了文件，也可以使用 `java.nio.file.Path` 实例：\n\n```\n\
  scanner = new Scanner(Paths.get(new File(\"chapter11/read-write-file/src/main/resources/input/data.txt\"\
  ).toURI()), StandardCharsets.UTF_8.name());\n```\n\n文件可以使用不同的字符集写入，在 Java 中由 `java.nio.charset.Charset`\
  \ 实例表示。为了确保正确读取，最佳实践是使用相同的字符集读取文件。`Scanner` 构造函数接收一个字符集名称作为参数。调用 `StandardCharsets.UTF_8.name()`\
  \ 方法来提取 UTF-8 字符集的名称。\n\n### 使用 Files 工具方法读取文件\n\n列表 11-14 中的第一个代码示例展示了读取文件的最简单方式。\n\
  \n```\npackage com.apress.bgn.eleven.io;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\
  // other import statements omitted\npublic class FilesReadDemo {\nprivate static\
  \ final Logger LOGGER = LoggerFactory.getLogger(FilesReadDemo.class);\nvoid main()\
  \ {\nfinal String inDir = \"chapter11/read-write-file/src/main/resources/input/\"\
  ;\nvar file = new File(inDir + \"data.txt\");\ntry {\nvar content = new String(Files.readAllBytes(Paths.get(file.toURI())));\n\
  LOGGER.info(\"Read with Files.readAllBytes --> {}\", content);\n} catch (IOException\
  \ e) {\nLOGGER.info(\"Something went wrong! \", e);\n}\n}\n}\n列表 11-14\n读取文件的最简单方式\n\
  ```\n\n当文件大小可以预估（文件大小可估算且相对较小），并且将其存储在 `String` 对象中不会成为问题时，这种方法效果很好。\n\n使用 `Files.readAllBytes(..)`\
  \ 的优点是无需循环，我们也不必逐行构建 `String` 值，因为该方法只是读取文件中的所有字节，这些字节可以作为参数传递给 `String` 构造函数。缺点是没有使用\
  \ `Charset`，因此文本值可能不是我们期望的。有一种方法可以克服这一点，即调用 `Files.readAllLines(..)`，该方法将文件内容作为\
  \ `String` 值列表返回，并且有两种形式，其中一种将 `Charset` 声明为参数。这种读取文件的方式如列表 11-15 所示。\n\n```\ntry\
  \ {\nList lyricList = Files.readAllLines(Paths.get(file.toURI()), StandardCharsets.UTF_8);\n\
  lyricList.forEach(System.out::println);\n} catch (IOException e) {\nLOGGER.info(\"\
  Something went wrong! \", e);\n}\n列表 11-15\n指定字符集读取文件的简单方式\n```\n\n但如果我们不需要 `List<String>`，而只需要一个\
  \ `String` 实例呢？Java 11 为此引入了一个方法：`readString(..)`。使用该方法的代码示例如列表 11-16 所示。\n\n```\n\
  try {\nvar content = Files.readString(Paths.get(file.toURI()), StandardCharsets.UTF_8);\n\
  LOGGER.info(\"Read with Files.readString --> {}\", content);\n} catch (IOException\
  \ e) {\nLOGGER.info(\"Something went wrong! \", e);\n}\n列表 11-16\n将文件读取为单个字符串并指定字符集的最简单方式\n\
  ```\n\n\n\n### 使用 `Readers` 读取文件\n\n在 `Files` 类及其便捷方法问世之前，还有其他读取文件的方式。这些便捷方法也并非为读取大文件或仅读取文件部分内容而设计。让我们回顾一下历史，慢慢分析事情是如何演变的。\n\
  \n在 Java 6 之前，要逐行读取文件，你必须编写像清单 11-17 中那样的复杂代码。\n\n```\npackage com.apress.bgn.eleven.io;\n\
  import java.io.BufferedReader;\nimport java.io.FileReader;\n// 其他导入已省略\npublic class\
  \ ReadersDemo {\nprivate static final Logger LOGGER = LoggerFactory.getLogger(ReadersDemo.class);\n\
  void main() {\nBufferedReader reader = null;\nfinal String inDir = \"chapter11/read-write-file/src/main/resources/input/\"\
  ;\ntry {\nreader = new BufferedReader(new FileReader(new File(inDir + \"data.txt\"\
  ), StandardCharsets.UTF_8));\nStringBuilder sb = new StringBuilder();\nString line;\n\
  while ((line = reader.readLine()) != null) {\nsb.append(line).append(\"\\n\");\n\
  }\nLOGGER.info(\"使用 BufferedReader 读取 --> {}\", sb.toString());\n} catch (Exception\
  \ e) {\nLOGGER.error(\"文件无法读取！\", e);\n} finally {\nif (reader != null) {\ntry {\n\
  reader.close();\n} catch (IOException ioe) {\nLOGGER.error(\"出错了！\", ioe);\n}\n\
  }\n}\n}\n}\n清单 11-17\nJava 6 之前逐行读取文件\n```\n\n*哇，这代码可真够复杂的，对吧？* Java 6 之后，语法稍微简化了一些，但最大的变化出现在\
  \ Java 7。在 Java 7 之前，如果你想逐行读取文件，必须编写如下代码：\n\n1.  创建一个 `File` 处理器。\n2.  将文件处理器包装到\
  \ `FileReader` 中。这种类型的实例可以完成读取工作，但只能以 `char[]` 块的形式读取，当你需要实际文本时，这并不十分有用。\n3.  将\
  \ `FileReader` 实例包装到 `BufferedReader` 实例中，后者通过读取内部缓冲区中的字符来提供此功能。这涉及到调用 `reader.readLine()`，直到没有更多内容可读（即到达文件末尾），此时该方法返回\
  \ `null`。\n4.  在读取结束时，显式调用 `reader.close()`；否则，文件可能会被锁定，在重启之前可能变得不可读。\n\nJava 7\
  \ 引入了许多更改，以减少处理文件所需的样板代码。其中一项更改是，所有用于访问文件内容且可能保持文件锁定的类都通过声明实现 `java.io.Closeable`\
  \ 接口得到了增强，该接口将这些类型的资源标记为*可关闭的*，并且在执行结束前，JVM 会透明地调用 `close()` 方法来释放资源。此外，Java 7 引入了\
  \ `try-with-resources` 语句。通过利用所有这些特性，清单 11-17 中 Java 6 之前的代码可以编写为清单 11-18 所示。\n\n\
  ```\ntry (BufferedReader br = new BufferedReader(new FileReader(new File(inDir +\
  \ \"data.txt\")))){\nStringBuilder sb = new StringBuilder();\nString line;\nwhile\
  \ ((line = br.readLine()) != null) {\nsb.append(line).append(\"\\n\");\n}\nLOGGER.info(\"\
  使用 BufferedReader 读取 --> {}\", sb.toString() );\n} catch (Exception e) {\nLOGGER.info(\"\
  出错了！\", e);\n}\n清单 11-18\n从 Java 7 开始逐行读取文件\n```\n\n代码可以进一步简化，因为 `FileReader` 可以将文件的绝对路径作为\
  \ `String` 参数接收。但代码无法考虑编码问题。这在 Java 8 中成为可能，当时为 `FileReader` 类引入了一个接受 `Charset`\
  \ 参数的构造函数。在 Java 7 中，前面的例子中仍然有嵌套的构造函数调用，这相当丑陋。这时 Java 8 通过引入 `Files.newBufferedReader(Path)`\
  \ 和 `Files.newBufferedReader(Path, Charset)` 方法解决了这个问题。\n\n因此，清单 11-18 中的代码可以编写为清单\
  \ 11-19 所示。\n\n```\nFile file = new File(inDir + \"data.txt\");\ntry (BufferedReader\
  \ br = Files.newBufferedReader(file.toPath(), StandardCharsets.UTF_8)){\nStringBuilder\
  \ sb = new StringBuilder();\nString line;\nwhile ((line = br.readLine()) != null)\
  \ {\nsb.append(line).append(\"\\n\");\n}\nLOGGER.info(\"使用 BufferedReader 读取 -->\
  \ {}\", sb.toString());\n} catch (Exception e) {\nLOGGER.info(\"出错了！\", e);\n}\n\
  清单 11-19\n从 Java 8 开始逐行读取文件并考虑编码\n```\n\n如果我们知道文件大小可控，并且不仅关心记录内容，还想保存各行以便进一步处理，最简单的方法是使用\
  \ `Files.readAllLines(..)` 方法结合 lambda 表达式。还可以加入流，这样可以在原地过滤或处理各行，如下所示：\n\n```\n\
  List dataList = Files.readAllLines(Paths.get(file.toURI()), StandardCharsets.UTF_8)\n\
  .stream()\n.filter(line -> line!= null && !line.isBlank())\n.map(String::toUpperCase)\n\
  .collect(Collectors.toList());\n```\n\n或者我们可以用另一种方式编写，使用同样在 Java 8 中引入的 `Files.lines(..)`\
  \ 方法，并直接以流的形式获取所有内容：\n\n```\ndataList = Files.lines(Paths.get(file.toURI()), StandardCharsets.UTF_8)\n\
  .filter(line -> line!= null && !line.isBlank() )\n.map(String::toUpperCase)\n.toList();\n\
  ```\n\n无论如何，回到文件读取器。`BufferedReader` 类是扩展抽象 `Reader` 类的类组中的一员。这是一个用于读取字符流的抽象类，属于\
  \ `java.io` 包的一部分。图 11-2 展示了一个简化的层次结构，显示了最常用的实现。\n\n![](img/463938_3_En_11_Fig2_HTML.jpg)\n\
  \n图 11-2\n\n`Reader` 类层次结构（如 IntelliJ IDEA 所示）\n\n字符流可以有不同来源，文件是最常见的。它们提供对文件中存储数据的顺序访问。`BufferedReader`\
  \ 类不提供对字符编码的支持，但 `BufferedReader` 实例基于另一个 `Reader` 实例。正如你在前面的例子中注意到的，在实例化 `BufferedReader`\
  \ 时使用了 `FileReader` 实例作为参数，而 `FileReader` 在 Java 8 中被修改以支持字符编码。在 Java 8 之前，为了从文件读取并考虑字符编码，使用了\
  \ `InputStreamReader` 实例，如清单 11-20 所示。\n\n```\ntry (BufferedReader br = new BufferedReader(new\
  \ InputStreamReader(new FileInputStream(file), StandardCharsets.UTF_8))){\nStringBuilder\
  \ sb = new StringBuilder();\nString line;\nwhile ((line = br.readLine()) != null)\
  \ {\nsb.append(line).append(\"\\n\");\n}\nLOGGER.info(\"使用 BufferedReader(InputStreamReader(FileInputStream(..)))读取\
  \ --> {}\", sb.toString() );\n} catch (Exception e) {\nLOGGER.info(\"出错了！\", e);\n\
  }\n清单 11-20\nJava 8 之前逐行读取文件并考虑编码\n```\n\n在 Java 11 中，`Reader` 类增加了 `nullReader()`\
  \ 方法，该方法返回一个不执行任何操作的 `Reader` 实例。这是应开发人员测试需求而添加的，本质上只是一个伪 `Reader` 实现。\n\n\n\n###\
  \ 使用 `InputStream` 读取文件\n\n`Reader` 家族中的类是将数据作为文本读取的高级类，但从技术上讲，文件只是一系列字节，因此这些类本身是对用于读取字节流的类家族中类的封装。当尝试使用正确的字符编码，以及使用\
  \ `BufferedReader` 读取文本时（如上一节末尾所示），这一点变得非常明显，因为作为参数给出的 `InputStreamReader` 实例是基于\
  \ `java.io.FileInputStream` 实例的，而该类型是 `java.io.InputStream` 的子类。\n\n该层次结构的根类是 `java.io.InputStream`。图\
  \ 11-3 展示了一个简化的层次结构，其中列出了最常用的实现。\n\n![](img/463938_3_En_11_Fig3_HTML.jpg)\n\n图 11-3\n\
  \n`InputStream` 类层次结构（如 IntelliJ IDEA 中所示）\n\n`BufferedInputStream` 类相当于用于读取字节流的\
  \ `BufferedReader`。我们之前用来从控制台读取用户数据的 `System.in` 就属于这种类型，而 `Scanner` 实例会将其缓冲区中的字节转换为用户可理解的数据。当我们感兴趣的数据不是使用\
  \ Unicode 约定存储的文本，而是原始数值数据（例如图像、媒体文件、PDF 等二进制文件）时，使用字节流的类更为合适。仅为了向您展示如何操作，我们将使用\
  \ `FileInputStream` 读取 `data.txt` 文件的内容，如清单 11-21 所示。\n\n```\npackage com.apress.bgn.eleven.io;\n\
  import java.io.FileInputStream;\n// 其他导入已省略\npublic class FileInputStreamReadingDemo\
  \ {\nprivate static final Logger LOGGER = LoggerFactory.getLogger(FileInputStreamReadingDemo.class);\n\
  public static void main(String... args) {\nfinal String inDir = \"chapter11/read-write-file/src/main/resources/input/\"\
  ;\nFile file = new File(inDir + \"data.txt\");\ntry (FileInputStream fis = new FileInputStream(file))\
  \ {\nbyte[] buffer = new byte[1024];\nStringBuilder sb = new StringBuilder();\n\
  while (fis.read(buffer) != -1) {\nsb.append(new String(buffer));\nbuffer = new byte[1024];\n\
  }\nLOGGER.info(\"使用 FileInputStream 读取 --> {}\", sb.toString() );\n} catch (IOException\
  \ e) {\nLOGGER.error(\"出错了！\", e);\n}\n}\n}\n清单 11-21\n使用 FileInputStream 读取文件\n\
  ```\n\n如果您运行清单 11-21 中的代码，您会注意到预期的输出会打印在控制台中，但您可能还会注意到一些奇怪的现象：文本打印后，还会打印一组奇怪的字符。在\
  \ macOS 系统上，它们看起来如图 11-4 所示。\n\n![](img/463938_3_En_11_Fig4_HTML.jpg)\n\n图 11-4\n\
  \n使用 `FileInputStream` 读取的文本\n\n您知道这些字符可能是什么吗？\n\n不知道也没关系；我第一次使用 `FileInputStream`\
  \ 读取文件时也不知道。这些字符之所以出现，是因为文件大小不是 1024 的倍数，因此 `FileInputReader` 最终会用零填充最后一个缓冲区的剩余部分。解决这个问题的方法包括计算文件的字节大小，并确保相应地调整\
  \ `byte[] buffer` 的大小。如果您有兴趣编写一些代码，可以尝试将其作为练习。既然我们已经探索了多种读取文件的方式，接下来可以继续研究如何写入文件，因为您已经知道如何创建文件了。\n\
  \n在 Java 11 中，`InputStream` 还增加了一个方法，该方法返回一个不执行任何操作的 `InputStream`：`nullInputStream()`\
  \ 方法专为测试目的而设计，它只是一个伪 `InputStream` 实现。\n\n到目前为止介绍的所有类都是您在 Java 中处理文件时最常遇到的。如果您需要更专业的文件处理工具，请随时阅读官方文档，或使用第三方库（如\
  \ Apache Commons IO^(¹⁰⁶)）提供的自定义实现，该库在 Java 世界中经常使用。\n\n## 写入文件\n\n在 Java 中写入文件与读取文件非常相似，只是必须使用不同的类，因为流是单向的。用于读取数据的流不能同时用于写入数据。几乎对于每个读取文件的类或方法，都有一个对应的写入文件的方法。闲话少说，让我们开始吧。\n\
  \n\n\n### 使用 Files 工具方法写入文件\n\n从 Java 7 开始，可以使用 `Files.write(Path, byte[], OpenOption...\
  \ options)` 方法轻松写入较小的文件。该方法接受两个参数：一个表示文件位置的 `Path` 对象，以及一个表示要写入数据的字节数组。当需要写入的数据量足够小时，这个方法非常实用，一行代码即可完成。最后一个参数实际上是一个*可变参数*（在**第\
  \ 3 章**中介绍），表示文件打开时要执行的操作（零个、一个或多个）。使用该方法时可以不指定该类型的任何参数，如清单 11-22 所示。\n\n```\npackage\
  \ com.apress.bgn.eleven.io;\nimport java.io.File;\nimport java.io.IOException;\n\
  import java.nio.file.Files;\nimport java.nio.file.Path;\n// 其他导入语句已省略\npublic class\
  \ FilesWritingDemo {\nprivate static final Logger LOGGER = LoggerFactory.getLogger(FilesWritingDemo.class);\n\
  void maim() {\nvar file = new File(\"chapter11/read-write-file/src/main/resources/output/data.txt\"\
  );\nbyte[] data = \"Some of us, we’re hardly ever here\".getBytes();\ntry {\nPath\
  \ dataPath = Files.write(file.toPath(), data);\nLOGGER.info(\"字符串已写入 {}\", dataPath.toAbsolutePath());\n\
  } catch (IOException e) {\nLOGGER.debug(\"无法将数据写入文件\", e);\n}\n}\n}\n清单 11-22\n\
  从 Java 7 开始，将字符串写入文件\n```\n\n如果文件已存在，其内容将被直接覆盖。这意味着由于没有指定任何参数来配置我们对文件的操作，默认行为是以写入模式打开文件，将其大小截断为零，然后从头开始写入，从而覆盖原有内容。可用选项的列表由\
  \ `java.nio.file.StandardOpenOption` 枚举中的值定义。与默认行为对应的值是 `TRUNCATE_EXISTING`。因此，清单\
  \ 11-22 示例中的这一行：\n\n```\nPath dataPath = Files.write(file.toPath(), data);\n```\n\
  \n等价于：\n\n```\nimport java.nio.file.StandardOpenOption\n//...\nPath dataPath = Files.write(file.toPath(),\
  \ data, StandardOpenOption.TRUNCATE_EXISTING);\n```\n\n如果期望的行为是修改已存在的文件并在其末尾追加新数据，那么作为\
  \ `Files.write(..)` 方法参数使用的选项是 `APPEND`：\n\n```\nPath dataPath = Files.write(file.toPath(),\
  \ data, StandardOpenOption.APPEND);\n```\n\n另外请注意，字符串在写入之前需要转换为字节数组。在 Java 11 中，这不再是必需的，因为终于有\
  \ JDK 开发者意识到大多数人可能只是向文件写入一个简单的 `String`，并认识到强制他们显式调用 `getBytes()` 是相当愚蠢的。因此，引入了\
  \ `Files.writeString(..)` 方法族，其中一种方法还支持指定编码。清单 11-23 展示了使用该方法将字符串写入文件的示例。\n\n```\n\
  package com.apress.bgn.eleven.io;\nimport java.nio.charset.StandardCharsets;\nimport\
  \ static java.nio.file.StandardOpenOption.APPEND;\n// 导入语句已省略\nvar file = new File(\"\
  chapter11/read-write-file/src/main/resources/output/data.txt\");\ntry {\nPath dataPath\
  \ = Files.writeString(file.toPath(),\n\"\\nThe rest of us, we're born to disappear\"\
  ,\nStandardCharsets.UTF_8,\nAPPEND);\nlog.info(\"字符串已写入 {}\", dataPath.toAbsolutePath());\n\
  } catch (IOException e) {\ne.printStackTrace();\n}\n清单 11-23\n从 Java 11 开始，将字符串写入文件\n\
  ```\n\n`Files.write(..)` 的另一个版本接受类型为 `Iterable<? extends CharSequence>` 的参数，这意味着可以使用它写入一个\
  \ `String` 值列表，如清单 11-24 所示。\n\n```\nvar file = new File(\"chapter11/read-write-file/src/main/resources/output/data.txt\"\
  );\nList dataList = List.of(\n\"How do I stop myself from\",\n\"Being just a number?\"\
  );\ntry {\nPath dataPath = Files.write(file.toPath(), dataList,\nStandardCharsets.UTF_8,\n\
  APPEND);\nlog.info(\"字符串已写入 {}\", dataPath.toAbsolutePath());\n} catch (IOException\
  \ e) {\ne.printStackTrace();\n}\n清单 11-24\n使用 Files.write(..) 将列表写入文件\n```\n\n接下来，我们将研究如何使用\
  \ `Writer` 层次结构中的类来写入文件。\n\n\n\n### 使用 `Writer` 写入文件\n\n与用于读取文件的 `Reader` 层级结构类似，也存在一个名为\
  \ `Writer` 的抽象类。但在介绍它之前，我先引入 `BufferedWriter`，它是 `BufferedReader` 在写入文件方面的对应类，因为这是实践中使用最频繁的类之一。该类同样拥有一个内部缓冲区，当调用写入方法时，参数会被存储到缓冲区中；当缓冲区满时，其内容会被写入文件。可以通过调用\
  \ `flush()` 方法提前清空缓冲区。强烈建议在调用 `close()` 之前显式调用此方法，以确保所有输出都已写入文件。清单 11-25 中的代码片段展示了如何将一个\
  \ `String` 实例列表写入文件。\n\n```\npackage com.apress.bgn.eleven.io;\nimport java.io.BufferedWriter;\n\
  import java.io.FileWriter;\n// 其他 import 语句已省略\npublic class BufferedWritingDemo\
  \ {\nprivate static final Logger LOGGER = LoggerFactory.getLogger(BufferedWritingDemo.class);\n\
  void main() {\nvar file = new File(\"chapter11/read-write-file/src/main/resources/output/data.txt\"\
  );\nvar dataList = List.of (\"我该如何昂起头颅\" ,\n\"以免沉沦\");\nBufferedWriter writer =\
  \ null;\ntry {\nwriter = new BufferedWriter(new FileWriter(file));\nfor (String\
  \ entry : dataList) {\nwriter.write(entry);\nwriter.newLine();\n}\nLOGGER.info(\"\
  在 Java 7 之前使用 BufferedWriter 写入字符串\");\n} catch (IOException e) {\nLOGGER.info(\"\
  出错了！\", e);\n} finally {\nif(writer!= null) {\ntry {\nwriter.flush();\nwriter.close();\n\
  } catch (IOException e) {\nLOGGER.info(\"出错了！\", e);\n}\n}\n}\n}\n}\n清单 11-25\n\
  使用 BufferedWriter 将列表写入文件\n```\n\n还需要另一种代码结构，因为写入文件是一种敏感操作，可能因多种原因失败。清单 11-25 中的代码是你在\
  \ Java 7 之前必须编写的，而 `try-with-resources` 减少了样板代码，使得代码可以简化为清单 11-26 所示。\n\n```\ntry\
  \ (final BufferedWriter wr = new BufferedWriter(new FileWriter(file))){\ndataList.forEach(entry\
  \ -> {\ntry {\nwr.write(entry);\nwr.newLine();\n} catch (IOException e) {\nLOGGER.info(\"\
  出错了！\", e);\n}\n});\nwr.flush();\nLOGGER.info(\"在 Java 7 之后使用 BufferedWriter 写入字符串\"\
  );\n} catch (IOException e) {\nLOGGER.info(\"出错了！\", e);\n}\n清单 11-26\n使用 BufferedWriter\
  \ 和 try-with-resources 将列表写入文件\n```\n\n注意，无需调用 `wr.close()`，因为在 Java 7 中，`java.io.Closeable`\
  \ 接口被修改为继承 `java.lang.AutoCloseable`，后者声明了一个 `close()` 方法的版本，当退出 `try-with-resources`\
  \ 块时会自动调用该方法。尽管如此，代码看起来仍然相当繁琐，对吧？特别是需要声明一个 `BufferedWriter` 并将其包裹在 `FileWriter`\
  \ 实例周围。这在 Java 8 中得到了简化，新增了 `Files` 工具类，其中包含一个名为 `newBufferedWriter(Path path)`\
  \ 的方法，该方法返回一个 `BufferedWriter` 实例，因此开发者不再需要显式编写那段代码。因此，清单 11-26 中 `try-with-resources`\
  \ 的初始化表达式可以替换为：\n\n```\nfinal BufferedWriter wr = Files.newBufferedWriter(file.toPath());\n\
  ```\n\n此外，还有一个接受字符集参数的方法版本：\n\n```\nfinal BufferedWriter wr = Files.newBufferedWriter(file.toPath(),StandardCharsets.UTF_8);\n\
  ```\n\n在引入此方法之前，使用指定字符集将文本写入文件需要一个 `java.io.OutputWriter` 实例：\n\n```\nfinal OutputStreamWriter\
  \ wr = new OutputStreamWriter(new FileOutputStream(file), StandardCharsets.UTF_8);\n\
  ```\n\n还有一个接受 `OpenOption` 类型参数的方法版本，允许你指定文件的打开方式：\n\n```\nfinal BufferedWriter\
  \ wr = Files.newBufferedWriter(file.toPath(),StandardCharsets.UTF_8, StandardOpenOption.APPEND);\n\
  ```\n\n这非常有用，因为显式创建的 `BufferedWriter`（未指定文件选项）会覆盖现有文件，除非其包裹的 `FileWriter` 被配置为向现有文件追加数据，如下所示：\n\
  \n```\nfinal BufferedWriter wr = new BufferedWriter(new FileWriter(file, true))\n\
  ```\n\n第二个参数是一个 `boolean` 值，表示文件是否应打开以追加文本（`true`）或不追加（`false`）。\n\n现在，`BufferedWriter`\
  \ 的基础知识已经介绍完毕，是时候认识一下 `Writer` 家族中最有用的成员了，如图 11-5 所示。\n\n![](img/463938_3_En_11_Fig5_HTML.jpg)\n\
  \n图 11-5\n\n`Writer` 类层次结构\n\n`Writer` 类是抽象的，因此不能直接使用；追加 API 来自 `Writer` 实现的 `java.io.Appendable`\
  \ 接口。其他 `Writer` 类用于不同的目的。正如我们已经看到的，`OutputStreamWriter` 用于使用特殊字符编码写入文本。\n\n`PrintWriter`\
  \ 用于将对象的格式化表示写入文本输出流（我们在**第 10 章**中已经使用它来编写 HTML 代码）。\n\n`StringWriter` 用于将输出收集到其内部缓冲区，并将其写入一个\
  \ `String` 实例。\n\n在 Java 11 中，`Writer` 类增加了 `nullWriter()` 方法，该方法返回一个不执行任何操作的 `Writer`\
  \ 实例。这是应开发者的测试需求而提出的。\n\n\n\n### 使用 `OutputStream` 写入文件\n\n`Writer` 家族中的类是用于通过字符流将数据作为文本写入的高级类，但本质上，数据在写入之前会被转换为字节。这显然意味着也可以使用字节流来写入文件。当尝试使用\
  \ `OutputStreamWriter` 写入文本时，这一点可能变得显而易见，因为作为参数传入的 `OutputStreamWriter` 实例是基于 `FileOutputStream`\
  \ 实例的，而 `FileOutputStream` 是一种用于将字节流写入文件的类型。\n\n该层次结构的根类是 `java.io.OutputStream`，其最常见的成员如图\
  \ 11-6 所示。\n\n![](img/463938_3_En_11_Fig6_HTML.jpg)\n\n图 11-6\n\n`OutputStream`\
  \ 类层次结构\n\n清单 11-27 展示了如何使用 `FileOutputStream` 写入一个 `String` 条目列表。\n\n```\npackage\
  \ com.apress.bgn.eleven.io;\nimport java.io.FileNotFoundException;\nimport java.io.FileOutputStream;\n\
  // 其他导入语句已省略\npublic class OutputStreamWritingDemo {\nprivate static final Logger\
  \ log = LoggerFactory.getLogger(OutputStreamWritingDemo.class);\npublic static void\
  \ main(String... args) {\nvar file = new File(\"chapter11/read-write-file/src/main/resources/output/data.txt\"\
  );\nvar dataList = List.of(\"Down to the wire\" ,\n\"I wanted water but\" ,\n\"\
  I'll walk through the fire\" ,\n\"If this is what it takes\");\ntry (FileOutputStream\
  \ output = new FileOutputStream(file)){\ndataList.forEach(entry -> {\ntry {\noutput.write(entry.getBytes());\n\
  output.write(\"\\n\".getBytes());\n} catch (IOException e) {\nlog.info(\"Something\
  \ went wrong! \", e);\n}\n});\noutput.flush();\n} catch (FileNotFoundException e)\
  \ {\nlog.info(\"Something went wrong! \", e);\n} catch (IOException e) {\ne.printStackTrace();\n\
  }\n}\n}\n清单 11-27\n使用 FileOutputStream 将列表写入文件\n```\n\n`OutputStream` 家族类用于写入代表原始数据的字节流，这些数据用户无法直接读取，例如包含在二进制文件（如图像、媒体、PDF\
  \ 等）中的数据。例如，清单 11-28 中的代码使用 `FileInputStream` 读取图像，并使用 `FileOutputStream` 写入图像，从而制作图像的副本。\n\
  \n```\npackage com.apress.bgn.eleven.io;\nimport java.io.*;\n// 其他导入语句已省略\npublic\
  \ class DuplicateImageDemo {\nprivate static final Logger LOGGER = LoggerFactory.getLogger(DuplicateImageDemo.class);\n\
  void main() {\nfinal String inDir = \"chapter11/read-write-file/src/main/resources/input/\"\
  ;\nfinal String outDir = \"chapter11/read-write-file/src/main/resources/output/\"\
  ;\nFile src = new File(inDir + \"the-beach.jpg\");\nFile dest = new File(outDir\
  \ + \"copy-the-beach.jpg\");\ntry(FileInputStream fis = new FileInputStream(src);\n\
  FileOutputStream fos = new FileOutputStream(dest)) {\nint content;\nwhile ((content\
  \ = fis.read()) != -1) {\nfos.write(content);\n}\n} catch (Exception e) {\nLOGGER.debug(\"\
  Image could not be copied! \", e);\n}\n}\n}\n清单 11-28\n使用 FileOutputStream 制作图像文件的副本\n\
  ```\n\n然而，由于 Java 7 中引入了 `Files.copy(src.toPath(), dest.toPath())` 方法，不再需要编写这样的代码。\n\
  \n在 Java 11 中，`OutputStream` 增加了 `nullOutputStream()` 方法，该方法返回一个不执行任何操作的 `OutputStream`\
  \ 实例。这是应开发人员的要求，用于测试目的。\n\n## 使用 Java NIO 管理文件\n\n`java.nio` 包在本章开头与 `java.io` 包一起被介绍。我们在本书这一部分之前使用的大多数类和方法都是\
  \ `java.io` 包的一部分，并且在读取/写入数据时会阻塞主线程。上一节中引入的工具类 `java.nio.file.Paths` 和 `java.nio.file.Files`\
  \ 包含的方法既使用了 `java.nio` 包中的类，也使用了 `java.io` 包中的类。现在是时候向您展示如何使用 `java.nio` 类来操作文件了。\n\
  \n使用 `java.nio` 操作文件需要 `java.nio.channels.FileChannel` 的实例。这是一个特殊的类，描述了用于读取、写入、映射和操作文件的通道。`FileChannel`\
  \ 实例连接到文件，并持有文件内的一个位置，该位置可以被查询和修改。\n\n要使用 `FileChannel` 实例从文件读取数据，需要以下内容：\n\n* \
  \  一个文件处理器实例\n*   通道所基于的 `FileInputStream` 实例\n*   一个 `FileChannel` 实例\n*   一个 `java.nio.Buffer`\
  \ 实例\n\n由于是非阻塞的，线程可以请求通道从缓冲区读取数据，然后在数据可用之前执行其他操作。Java NIO 的缓冲区允许根据需要前后移动。数据被读入缓冲区并缓存，直到被处理。`java.nio`\
  \ 包中为所有原始类型提供了缓冲区实现，根据数据的用途，您可以使用其中任何一种。清单 11-29 展示了如何将文件中的数据读取到 `ByteBuffer` 中。由于\
  \ `ByteBuffer` 可以用初始大小实例化，通过将 `ByteBuffer` 的容量（以字节为单位）配置为与文件大小相同，可以一次性读取文件。\n\n\
  ```\npackage com.apress.bgn.eleven.nio;\nimport java.nio.ByteBuffer;\nimport java.nio.channels.FileChannel;\n\
  // 其他导入语句已省略\npublic class ChannelDemo {\nprivate static final Logger LOGGER = LoggerFactory.getLogger(ChannelDemo.class);\n\
  void main() {\nvar sb = new StringBuilder();\nfinal String inDir = \"chapter11/read-write-file/src/main/resources/input/\"\
  ;\ntry (FileInputStream is = new FileInputStream(new File(inDir + \"data.txt\"));\n\
  FileChannel inChannel = is.getChannel()) {\nlong fileSize = inChannel.size();\n\
  ByteBuffer buffer = ByteBuffer.allocate((int) fileSize);\ninChannel.read(buffer);\n\
  buffer.flip();\nwhile (buffer.hasRemaining()) {\nsb.append((char) buffer.get());\n\
  }\n} catch (IOException e) {\nLOGGER.debug(\"File could not be read! \", e);\n}\n\
  LOGGER.info(\"Read with FileChannel [1]--> {}\", sb);\n}\n}\n清单 11-29\n使用 FileChannel\
  \ 和 ByteBuffer 读取文件\n```\n\n方法 `getChannel()` 返回与此文件输入流关联的唯一 `FileChannel` 对象。清单\
  \ 11-29 中最重要的语句是 `buffer.flip()` 调用。调用此方法会*翻转缓冲区*，这意味着缓冲区从写入模式切换到读取模式。最初，这意味着通道能够将数据写入缓冲区（因为它处于写入模式），但在缓冲区填满后，缓冲区切换到读取模式，因此主线程可以读取其内容。\n\
  \n读取缓冲区内容后，如果需要再次读取，`buffer.rewind()` 方法会将位置重置为零。\n\n如果文件很大，`ByteBuffer` 可以多次重新初始化，但在这种情况下，必须在通道写入新数据之前清除缓冲区，这可以通过调用\
  \ `buffer.close()` 来完成。此外，使用 `FileInputStream` 获取通道并不是正确的方法，因为它限制了从文件读取。但通道可以同时从文件读取和写入，因此推荐的方法是使用\
  \ `java.io.RandomAccessFile` 实例作为文件处理器，如清单 11-30 所示。\n\n\n\n```\nimport java.io.RandomAccessFile;\n\
  import java.nio.ByteBuffer;\nimport java.nio.channels.FileChannel;\n// ...\nvar\
  \ sb = new StringBuilder();\ntry (var file = new RandomAccessFile(inDir + \"data.txt\"\
  , \"r\");\nvar inChannel = file.getChannel()) {\nvar buffer = ByteBuffer.allocate(48);\n\
  while(inChannel.read(buffer) > 0) {\nbuffer.flip();\nfor (int i = 0; i < buffer.limit();\
  \ i++) {\nsb.append((char) buffer.get());\n}\nbuffer.clear();\n}\n} catch (IOException\
  \ e) {\ne.printStackTrace();\n}\nSystem.out.printf(\"File content: {}\", sb);\n\
  清单 11-30\n使用较小的 ByteBuffer 通过 FileChannel 读取文件\n```\n\n`RandomAccessFile` 类的构造函数有一个名为\
  \ `mode` 的第二个参数，用于指定文件的打开访问模式。用更通俗的话说：模式描述了你的代码打算对文件执行什么操作。`mode` 参数可以设置为以下任意值：\n\
  \n*   `r`：文件以只读方式打开。尝试写入此文件将抛出 `IOException`。\n\n*   `rw`：文件以读写方式打开。\n\n*   `rws`：文件以读写方式打开，并且要求对文件内容或元数据的每次更新都同步写入底层存储设备。\n\
  \n*   `rwd`：文件以读写方式打开，并且要求对文件内容的每次更新都同步写入底层存储设备。\n\n如果 `mode` 参数设置为其他任何值，则会抛出 `IllegalArgumentException`。\n\
  \n复制文件也同样简单；只需使用缓冲区将数据从一个通道移动到另一个通道，如清单 11-31 所示。\n\n```\npackage com.apress.bgn.eleven.nio;\n\
  import java.io.RandomAccessFile;\nimport java.nio.ByteBuffer;\nimport java.nio.channels.FileChannel;\n\
  // 其他 import 语句已省略\npublic class DuplicateImageDemo {\nprivate static final Logger\
  \ LOGGER = LoggerFactory.getLogger(DuplicateImageDemo.class);\nvoid main() {\nLOGGER.info(\"\
  -- 使用 FileChannel 复制图像 -- \");\nfinal String inDir = \"chapter11/read-write-file/src/main/resources/input/\"\
  ;\nfinal String outDir = \"chapter11/read-write-file/src/main/resources/output/\"\
  ;\ntry (FileChannel source = new RandomAccessFile(inDir + \"the-beach.jpg\", \"\
  r\").getChannel();\nFileChannel dest = new RandomAccessFile(outDir + \"copy-the-beach.jpg\"\
  , \"rw\").getChannel()) {\nByteBuffer buffer = ByteBuffer.allocateDirect(48);\n\
  while (source.read(buffer) != -1) {\nbuffer.flip();\nwhile (buffer.hasRemaining())\
  \ {\ndest.write(buffer);\n}\nbuffer.clear();\n}\n} catch (Exception e) {\nLOGGER.debug(\"\
  图像无法复制！\", e);\n}\n}\n}\n清单 11-31\n使用 FileChannel 和 ByteBuffer 复制图像\n```\n\n另一种方法是使用专用的\
  \ `ReadableByteChannel` 和 `WritableByteChannel`，如清单 11-32 所示。\n\n```\nimport java.nio.channels.ReadableByteChannel;\n\
  import java.nio.channels.WritableByteChannel;\n// ...\ntry(ReadableByteChannel source\
  \ = new FileInputStream(inDir + \"the-beach.jpg\").getChannel();\nWritableByteChannel\
  \ dest = new FileOutputStream(outDir + \"2nd-copy-the-beach.jpg\").getChannel())\
  \ {\nByteBuffer buffer = ByteBuffer.allocateDirect(48);\nwhile (source.read(buffer)\
  \ != -1) {\nbuffer.flip();\nwhile (buffer.hasRemaining()) {\ndest.write(buffer);\n\
  }\nbuffer.clear();\n}\n} catch (Exception e) {\nLOGGER.error(\"图像无法复制！\", e);\n\
  }\n清单 11-32\n使用 ReadableByteChannel 和 ByteBuffer 复制图像\n```\n\n由于其非阻塞特性，Java 通道适用于处理来自多个源的数据的应用程序，例如管理通过网络与多个源连接的应用程序。图\
  \ 11-7 描绘了 `Channel` 层次结构中最重要的成员。\n\n![](img/463938_3_En_11_Fig7_HTML.jpg)\n\n图\
  \ 11-7\n\n`Channel` 类/接口层次结构\n\n`DatagramChannel` 可以通过 UDP 在网络中读写数据。`SocketChannel`\
  \ 可以通过 TCP 在网络中读写数据，而 `ServerSocketChannel` 允许你监听传入的 TCP 连接，就像 Web 服务器一样。对于每个传入的连接，都会创建一个\
  \ `SocketChannel`。\n\n引入 Java NIO 组件（接口和类）是为了补充现有的 Java IO 功能。Java IO 一次读取或写入一个字节或字符。缓冲会使用\
  \ Java 堆内存，当处理大文件时，这可能会成为问题。当 Java NIO 发布时，Oracle 曾声明 NIO 比纯 Java I/O 更高效、性能更好，但这完全取决于你正在构建的应用程序。Java\
  \ NIO 引入了批量处理原始字节的可能性、异步操作的可能性以及堆外缓冲。缓冲区在 JVM 主内存之外创建，位于不受垃圾回收器管理的内存区域中。这允许创建更大的缓冲区，因此可以读取更大的文件，而不会因为\
  \ JVM 内存不足而抛出 `OutOfMemoryException` 的风险。\n\n如果你发现自己需要处理大量数据，请务必仔细阅读 JDK NIO 文档，因为本节只是浅尝辄止。\n\
  \n## 序列化与反序列化\n\n*序列化*是指将对象的状态转换为字节序列的操作。以这种格式，它可以通过网络发送或写入文件，并还原为该对象的副本。将字节序列转换回对象的操作称为*反序列化*。Java\
  \ 序列化一直是一个有争议的话题，Java 平台首席架构师 Mark Reinhold 将其描述为 1997 年犯下的一个可怕错误。显然，大多数 Java 漏洞在某种程度上都与\
  \ Java 中序列化的实现方式有关，并且有一个名为 Project Amber^(¹⁰⁷) 的项目致力于完全移除 Java 序列化，并允许开发者选择他们喜欢的格式进行序列化。\n\
  \n\n\n### 字节序列化\n\n`java.io.Serializable` 接口没有方法或字段，仅用于将类标记为可序列化。当对象被序列化时，标识对象类型的信息也会被序列化。大多数\
  \ Java 类都是可序列化的。可序列化类的任何子类默认都被视为可序列化。\n\n如果任何新字段不可序列化，则会抛出 `NotSerializableException`\
  \ 类型的异常。由开发者编写的、包含不可序列化字段的类必须实现 `Serializable` 接口，并为清单 11-33 中所示的方法提供具体实现。\n\n```\n\
  private void writeObject(java.io.ObjectOutputStream out)\nthrows IOException;\n\
  private void readObject(java.io.ObjectInputStream in)\nthrows IOException, ClassNotFoundException;\n\
  private void readObjectNoData()\nthrows ObjectStreamException;\n清单 11-33\n使自定义类可序列化所需实现的方法\n\
  ```\n\n这些方法并非特定 Java 接口的一部分，因此在此上下文中实现它们，仅意味着在你希望使其可序列化的类中为它们编写方法体。它们被归入清单 11-33\
  \ 是为了展示这些方法的签名。\n\n`writeObject(..)` 方法用于写入对象的状态，以便 `readObject(..)` 方法能够恢复它。当反序列化操作因某种原因失败时，`readObjectNoData()`\
  \ 方法用于初始化对象的状态，因此该方法会提供一个默认状态，尽管存在一些问题（例如，流不完整、客户端应用程序无法识别反序列化的类等）。如果你是个乐观主义者，这个方法其实并非强制要求。\n\
  \n此外，在使类可序列化时，必须添加一个 `long` 类型的静态字段作为该类的唯一标识符，以确保将对象作为字节流发送的应用程序和接收它的客户端应用程序拥有相同的已加载类。如果接收字节流的应用程序拥有一个标识符不同的类，则会抛出\
  \ `java.io.InvalidClassException`。发生这种情况时，意味着应用程序未更新，或者你甚至可能怀疑有黑客在搞鬼。该字段必须命名为 `serialVersionUID`，如果开发者没有显式添加，序列化运行时将自动生成。清单\
  \ 11-34 中的代码片段展示了一个名为 `Singer` 的类，它包含了清单 11-33 代码片段中所示的序列化和反序列化方法。\n\n```\npackage\
  \ com.apress.bgn.eleven;\nimport java.io.*;\nimport java.time.LocalDate;\nimport\
  \ java.util.Objects;\npublic class Singer  implements Serializable {\nprivate static\
  \ final long serialVersionUID = 42L;\nprivate String name;\nprivate Double rating;\n\
  private LocalDate birthDate;\npublic Singer() {\n/* 反序列化所需 */\n}\npublic Singer(String\
  \ name, Double rating, LocalDate birthDate) {\nthis.name = name;\nthis.rating =\
  \ rating;\nthis.birthDate = birthDate;\n}\nprivate void writeObject(ObjectOutputStream\
  \ out) throws IOException {\nout.defaultWriteObject();\n}\nprivate void readObject(ObjectInputStream\
  \ in) throws IOException, ClassNotFoundException {\nin.defaultReadObject();\n}\n\
  private void readObjectNoData() throws ObjectStreamException {\nthis.name = \"undefined\"\
  ;\nthis.rating = 0.0;\nthis.birthDate = LocalDate.now();\n}\n// setter、getter、toString、equals\
  \ 和 hashCode 已省略\n}\n清单 11-34\n可序列化的 Singer 类\n```\n\n现在我们有了这个类，让我们实例化它，将其序列化，保存到文件，然后将文件内容反序列化为另一个对象，并与初始对象进行比较。所有这些操作都在清单\
  \ 11-35 中展示。\n\n```\npackage com.apress.bgn.eleven;\nimport org.slf4j.Logger;\n\
  import org.slf4j.LoggerFactory;\nimport java.io.*;\nimport java.time.LocalDate;\n\
  import java.time.Month;\npublic class BinarySerializationDemo {\nprivate static\
  \ final Logger log = LoggerFactory.getLogger(BinarySerializationDemo.class);\npublic\
  \ static void main(String... args) throws ClassNotFoundException {\nLocalDate johnBd\
  \ = LocalDate.of(1977, Month.OCTOBER, 16);\nSinger john = new Singer(\"John Mayer\"\
  , 5.0, johnBd);\nFile file = new File(\"chapter11/serialization/src/test/resources/output/john.txt\"\
  );\ntry (var out = new ObjectOutputStream(new FileOutputStream(file))){\nfile.createNewFile();\n\
  out.writeObject(john);\n} catch (IOException e) {\nlog.info(\"出错了！\", e);\n}\ntry(var\
  \ in = new ObjectInputStream(new FileInputStream(file))){\nSinger copyOfJohn = (Singer)\
  \ in.readObject();\nlog.info(\"对象是否相等？{}\", copyOfJohn.equals(john));\nlog.info(\"\
  --> {}\", copyOfJohn);\n} catch (IOException e) {\nlog.info(\"出错了！\", e);\n}\n}\n\
  }\n清单 11-35\n序列化与反序列化 Singer 类\n```\n\n当运行清单 11-35 中的代码时，一切按预期工作，`writeObject(..)`\
  \ 和 `readObject(..)` 分别由 `ObjectOutputStream` 和 `ObjectInputStream` 通过反射调用。如果你想测试它们是否真的被调用了，可以添加日志记录，或者在它们内部设置断点并以调试模式运行程序。如果你打开\
  \ `john.txt` 文件，可能无法理解太多内容。里面写入的文本意义不大，因为它是二进制的原始数据。如果你打开该文件，可能会看到类似图 11-8 所示的内容。\n\
  \n![](img/463938_3_En_11_Fig8_HTML.jpg)\n\n图 11-8\n\n序列化后的 `Singer` 实例\n\n\n\n###\
  \ XML 序列化\n\n然而，Java 序列化并不一定会产生难以理解的二进制文件。对象可以被序列化为可读的格式。最常用的序列化格式之一是 XML，JDK 提供了将对象转换为\
  \ XML 以及从 XML 还原为原始对象的类。\n\n**用于 XML 绑定的 Java 架构 (JAXB)** 曾提供一种快速便捷的方式来绑定 XML 模式和\
  \ Java 表示，使 Java 开发者能够轻松地将 XML 数据和数据处理功能整合到 Java 应用程序中。将对象序列化为 XML 的操作称为**编组 (marshalling)**。将对象从\
  \ XML 反序列化的操作称为**解组 (unmarshalling)**。\n\n从 JDK 11 开始，JAXB 被从 JDK 中移除，其继任者 JAXB2\
  \ 并未获得预期的关注。这并不令人意外，因为多年来，Jackson 库集合已成为大多数项目进行 XML、JSON 以及（最近）YAML 序列化和反序列化的默认首选。Jackson\
  \ 在 Java 生态系统中作为终极的 *Java JSON 库* 而闻名已久，但它也拥有支持序列化为其他多种格式的模块，其中包括 XML、CSV、YAML 和\
  \ TAML。只需查看其项目页面 ([`https://github.com/FasterXML/jackson`](https://github.com/FasterXML/jackson))；很可能每当出现一种新的流行序列化格式时，就已经有相应的模块了。\n\
  \n使用 Jackson 序列化为 XML 时，需要记住以下几点：\n\n*   需要使用一组不同的注解，其中最重要的列举如下：\n    *   `@JacksonXmlRootElement(localName\
  \ = \"...\")` 是一个顶层注解，放置在类级别，用于告知 Jackson 该类名在序列化时将成为一个 XML 元素；如果需要为 XML 元素指定不同的名称，可以通过\
  \ `localName` 属性进行设置。\n\n*   `@JacksonXmlProperty(localName = \"...\")` 是一个方法或字段级别的注解，用于告知\
  \ Jackson 该字段或方法名在序列化时将成为一个 XML 元素；如果需要为 XML 元素指定不同的名称，可以通过 `localName` 属性进行设置。\n\
  \n*   `@JacksonXmlProperty(localName = \"...\", isAttribute = true)` 配合 `isAttribute\
  \ = true` 参数使用，用于将该属性配置为 XML 属性。\n\n*   要使用 Jackson 进行序列化和反序列化，需要使用 `com.fasterxml.jackson.dataformat.xml.XmlMapper`\
  \ 的实例。\n\n*   `XmlMapper` 实例需要配置以支持特殊类型，例如新的 Java 8 日期 API 类型，这可以通过注册和配置 `com.fasterxml.jackson.datatype.jsr310.JavaTimeModule`\
  \ 来完成。\n\n*   使用 Java 模块时，必须确保它们配置正确。异常信息可能不易阅读，解决这些问题可能需要结合 Apache Maven 和模块配置。\n\
  \n话虽如此，让我们从模块配置开始，如清单 11-36 所示。\n\n```\nmodule chapter.eleven.serialization {\n\
  requires org.slf4j;\nrequires com.fasterxml.jackson.databind;\nrequires com.fasterxml.jackson.dataformat.xml;\n\
  requires com.fasterxml.jackson.datatype.jsr310;\nopens com.apress.bgn.eleven.xml\
  \ to com.fasterxml.jackson.databind;\n}\n清单 11-36\n使用 Jackson 进行 XML 序列化的模块配置\n\
  ```\n\n前两个 `requires com.fasterxml.jackson.*` 指令是必需的，以便能够使用 Jackson 注解和 `XmlMapper`。`jsr310`\
  \ 是序列化 Java 8 日期 API 类型所必需的。\n\n最后一条语句 `opens com.apress.bgn.eleven.xml to com.fasterxml.jackson.databind`\
  \ 是必需的，以便 Jackson 能够访问 `com.apress.bgn.eleven.xml` 包中的类，因为使用 Jackson 注解编写的 `Singer`\
  \ 类版本就位于此处。该类如清单 11-37 所示。\n\n```\npackage com.apress.bgn.eleven.xml;\n// 其他导入已省略\n\
  import com.fasterxml.jackson.dataformat.xml.annotation.JacksonXmlProperty;\nimport\
  \ com.fasterxml.jackson.dataformat.xml.annotation.JacksonXmlRootElement;\n@JacksonXmlRootElement(localName\
  \ = \"singer\")\npublic class Singer implements Serializable {\nprivate static final\
  \ long serialVersionUID = 42L;\nprivate String name;\nprivate Double rating;\nprivate\
  \ LocalDate birthDate;\npublic Singer() {\n/* 反序列化所需 */\n}\npublic Singer(String\
  \ name, Double rating, LocalDate birthDate) {\nthis.name = name;\nthis.rating =\
  \ rating;\nthis.birthDate = birthDate;\n}\n@JacksonXmlProperty(localName = \"name\"\
  , isAttribute = true)\npublic String getName() {\nreturn name;\n}\n@JacksonXmlProperty(localName\
  \ = \"rating\", isAttribute = true)\npublic Double getRating() {\nreturn rating;\n\
  }\n@JacksonXmlProperty(localName = \"birthdate\")\npublic LocalDate getBirthDate()\
  \ {\nreturn birthDate;\n}\n// 其他代码已省略\n}\n清单 11-37\n带有 Jackson XML 注解的 Singer 类\n\
  ```\n\n请注意注解放置的位置。根据清单 11-37 中注解的放置位置及其配置，当 `john` 对象被序列化时，`john.xml` 文件应包含清单 11-38\
  \ 所示的片段。\n\n```\n1977-10-16\n\n清单 11-38\nXML 格式的 john Singer 实例\n```\n\n它比二进制版本更易读，对吧？清单\
  \ 11-39 展示了将 `Singer` 实例保存到 `john.xml` 文件，然后将其加载回一个副本并与原始实例进行比较的代码。\n\n```\npackage\
  \ com.apress.bgn.eleven.xml;\nimport com.fasterxml.jackson.databind.SerializationFeature;\n\
  import com.fasterxml.jackson.dataformat.xml.XmlMapper;\nimport com.fasterxml.jackson.datatype.jsr310.JavaTimeModule;\n\
  // 其他导入语句已省略\npublic class XMLSerializationDemo {\nprivate static final Logger LOGGER\
  \ = LoggerFactory.getLogger(XMLSerializationDemo.class);\nvoid main(){\nvar johnBd\
  \ = LocalDate.of(1977, Month.OCTOBER, 16);\nvar john = new Singer(\"John Mayer\"\
  , 5.0, johnBd);\nvar xmlMapper = new XmlMapper();\nxmlMapper.registerModule(new\
  \ JavaTimeModule());\nxmlMapper.enable(SerializationFeature.INDENT_OUTPUT);\nxmlMapper.configure(SerializationFeature.WRITE_DATES_AS_TIMESTAMPS,\
  \ false);\nvar path = Path.of(\"chapter11/serialization/src/test/resources/output/john.xml\"\
  );\ntry {\nvar xml = xmlMapper.writeValueAsString(john);\nFiles.writeString(path,\
