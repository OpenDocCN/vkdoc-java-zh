  \ **偏好设置** 菜单项，转到 **构建、执行、部署** ➤ **构建工具** ➤ **Maven** 部分，然后选择外部的 Maven 安装目录。\n\n\
  ![](img/463938_3_En_2_Fig11_HTML.jpg)\n\n图 2-11\n\nIntelliJ IDEA Maven 视图\n\n预计编辑器底部会打开一个窗口，显示构建进度，如果源代码没问题，此过程应以消息\
  \ `BUILD SUCCESS` 结束。\n\n重要\n\n如果在 IntelliJ IDEA 中构建失败，并且你想找出问题，第一步是在 IDE 外部运行构建。你可以在终端（或\
  \ Windows 上的命令提示符）中通过执行 `mvn clean install` 来运行构建。如果构建在终端中通过，则源代码和你的设置是正确的，问题肯定出在编辑器配置上。\n\
  \nMaven 构建遵循特定的生命周期，将 Java 项目从源代码转换为可执行或可部署到应用服务器的内容。阶段按特定顺序执行。使用 `mvn {phase}`\
  \ 命令运行特定阶段会执行一系列称为 *目标* 的步骤，每个步骤负责一个特定任务。\n\n之前推荐的 `mvn clean install` 命令会执行 `clean`\
  \ 阶段（删除之前生成的字节码文件），然后执行 `install` 阶段（将 Java 文件编译成字节码，执行测试（如果有的话），将它们打包成 Java 归档文件（jar\
  \ 文件），并将它们复制到本地 Maven 仓库）。如果你想了解更多关于 Maven 的信息，请查看官方网站，但就本书范围而言，一切都已为你简化，如**第**\
  \ **3** **章**所述。\n\n## 总结\n\n如果任何说明对你来说不清楚（或者我遗漏了什么），请随时使用网络搜索答案。本章介绍的所有软件技术都有全面的官方网站和庞大的开发者社区提供支持，他们乐于提供帮助。在最坏的情况下，当你找不到任何信息时，你总是可以在本书的\
