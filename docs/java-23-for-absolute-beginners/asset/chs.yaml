  同时，让我们将`index.jsp`重命名为`date.jsp`，以明确其用途，并编写一个名为`DateServlet`的 Servlet 类，向请求中添加`today`属性，该属性将由`<fmt:formatDate>`标签格式化，结果保存到`todayFormatted`变量中，随后由`<c:out>`标签打印输出。`DateServlet`如清单
  10-40 所示。


