  如你所见，决定按钮位置的方法与 Swing 中的方法类似，但有一些差异。`BorderPane` 有五个区域，分别命名为：`Top`、`Bottom`、`Center`、`Left`
  和 `Right`。为了将节点放置在每个区域中，为每个区域定义了相应的 `set*(..)` 方法：`setTop(..)`、`setBottom(..)`、`setCenter(..)`、`setLeft(..)`
  和 `setRight(..)`。为了进一步自定义节点的位置，应将其放置在一个 `HBox` 节点中，这是另一个可以相当广泛自定义的 `JavaFX` 元素。从代码清单
  10-18 的代码中可以看到，我们使用 CSS 样式元素设置了背景。我们通过使用 `Insets` 类的实例来定制节点之间的间距以及节点与容器边框的间距，并通过调用
  `box.setAlignment(Pos.BASELINE_RIGHT)` 来定制容器内节点的对齐方式。`HBox` 支持的功能还有很多，因此使用盒子能做的事情（主要）只受限于你的想象力。


  因此，除了在代码清单 10-18 中*编写漂亮的代码*之外，我们还做了以下工作：根节点成为了一个 `BorderPane` 节点的父节点；在 `BorderPane`
  的底部区域添加了一个 `HBox`；这个 `HBox` 实例成为了一个 `Button` 的父节点。如你所见，这种组织方式是分层的，按钮是层次结构中的最后一个节点。


  我们还通过正确设置 `HBox` 节点的样式，避免了使用层叠面板。


  现在是时候为我们的应用程序添加最后的功能了：文本区域和带有可选元素的列表。选中后，该值会被添加到文本区域中。在 JavaFX 中创建文本区域很简单。该类有一个非常明显的名称：`TextArea`。我们可以直接将节点添加到
  `BorderPane` 的中心区域，因为 JavaFX 的文本区域默认是可滚动的。因此，无需将其放入 `ScrollPane` 中，尽管 `javafx.scene.control`
  包中确实存在该类，并且对于显示比窗口尺寸大的表单节点很有用。代码清单 10-19 中的三行代码创建了一个 `TextArea` 类型的节点，将其声明为不可编辑，并将其添加到
  `BorderPane` 的中心区域。


  ```

  import javafx.scene.control.TextArea;

  ...

  var textArea = new TextArea();

  textArea.setEditable(false);

  borderPane.setCenter(textArea);

  代码清单 10-19

  创建和配置 JavaFX TextArea

  ```


  接下来要添加的功能是列表。列表稍微复杂一些，但操作起来也更有趣，因为使用 JavaFX 可以对列表做很多事情。需要实例化以创建列表对象的类名为 `ComboBox<T>`。该类只是用于创建列表的更大类族中的一个，其根类是抽象类
  `ComboBoxBase<T>`。选择正确的实现取决于列表所需的行为，例如是否需要支持单选或多选，以及是否需要列表可编辑。在我们的案例中，`ComboBox<T>`
  类符合以下要求：我们需要一个不可编辑的列表，支持单选。`ComboBox<T>` 有一个 `valueProperty()` 方法，返回当前的用户输入。用户输入可以基于下拉列表中的选择，也可以是在列表可编辑时用户手动提供的输入。代码清单
  10-20 展示了如何将列表添加到 `BorderPane` 的顶部区域，并添加一个监听器来记录选中的值，并将其保存到我们之前声明的 `TextArea` 中。




  ```

  import javafx.scene.control.ComboBox;

  ...

  private static String data = {"John Mayer", "Frank Sinatra",

  "Seth MacFarlane", "Nina Simone", "BB King", "Peggy Lee"};

  ...

  ComboBox comboBox = new ComboBox();

  comboBox.getItems().addAll(data);

  borderPane.setTop(comboBox);

  comboBox.valueProperty().addListener(

  new ChangeListener() {

  @Override

  public void changed(ObservableValue observable, String oldValue, String newValue)
  {

  textArea.appendText(newValue + "\n");

  }

  });

  清单 10-20

  创建并配置 JavaFX ComboBox

  ```


  `ComboBox<T>` 的值字段是一个 `ObservableValue<T>` 实例。监听器被添加到此实例上，每当其值发生变化时，监听器会收到通知，并调用其
  `changed(..)` 方法。如你所见，`changed(..)` 方法还会将列表中先前选中的值作为参数传入，因为我们的某些逻辑可能需要同时用到这两个值。


  在 AWT 和 Swing 中，你对列表的视觉样式能做的不多。你只能使用默认的外观和感觉，仅此而已。JavaFX 为节点提供了更多的视觉定制支持，甚至支持 CSS。这就是为什么在下一节中，我们将让
  `ComboBox<T>` 列表变得更有趣。在 JavaFX 中，列表中的每个条目都是一个可以以不同方式绘制的单元格。为此，我们必须向此类添加一个 `CellFactory<T>`，它会为列表中的每个项目创建一个
  `ListCell<T>` 实例。


  如果未指定 `CellFactory<T>`，单元格将使用默认样式创建。清单 10-21 展示了自定义 `ComboBox<T>` 的代码。


  ```

  comboBox.setCellFactory(

  new Callback() {

  @Override

  public ListCell call(ListView param) {

  return new ListCell() {

  {

  super.setPrefWidth(200);

  }

  @Override

  public void updateItem(String item, boolean empty) {

  super.updateItem(item, empty);

  if (item != null) {

  setText(item);

  if (item.contains("John") || item.contains("BB")) {

  setTextFill(Color.RED);

  } else if (item.contains("Frank") || item.contains("Peggy")) {

  setTextFill(Color.GREEN);

  } else if (item.contains("Seth")) {

  setTextFill(Color.BLUE);

  } else {

  setTextFill(Color.BLACK);

  }

  } else {

  setText(null);

  }

  }

  };

  }

  });

  清单 10-21

  创建并自定义 JavaFX ComboBox 单元格的颜色

  ```


  `javafx.util.Callback` 接口是一个实用的工具接口，可在某个操作后需要回调时使用。在此例中，当一个 `String` 值被添加到 `ComboBox<T>`
  节点的 `ListView` 中时（`ListView` 顾名思义是 `ComboBox<T>` 的视觉外观类型，用于显示水平或垂直的项目列表），会创建一个单元格，并在其中插入一些逻辑，根据其值来决定单元格中文本的颜色。


  在 `ListCell<T>` 声明内部，有一段看起来不太协调的代码块：


  ```

  {

  super.setPrefWidth(200);

  }

  ```


  上面的代码块是一种在匿名类声明内部调用父类方法的有趣方式。此处调用 `setPrefWidth(200)` 方法是为了确保所有 `ListCell<T>` 实例具有相同的大小。`updateItem(..)`
  方法中的逻辑非常明显，因此无需过多解释。添加单元格工厂后的结果如图 10-9 所示。


