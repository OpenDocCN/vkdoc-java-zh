  # 其他输出已省略\n清单 9-27\n运行清单 9-26 中代码产生的部分输出\n```\n\n注意\n\n清单 9-27 中的日志仅列出了用于运行 `ProcessListingDemo`\
  \ 类的 IntelliJ IDEA 启动器以及为运行它而生成的进程，但实际输出可能会长得多。有些参数被完全跳过了，因为用书页来记录你可以自己生成的日志是相当无用的。不过，如果你选择不亲自运行代码，那么对日志格式进行一些描述还是必要的。\n\
  \n清单 9-26 中的代码示例大致向你展示了如何访问本地进程并打印相关信息。使用改进后的 Java 进程 API，我们可以创建新进程并启动底层操作系统的命令。例如，我们可以创建一个进程来打印\
  \ `JAVA_HOME` 环境变量的值，并捕获输出以显示在 IntelliJ IDEA 控制台中，如清单 9-28 所示。（此代码适用于 macOS 和 Linux；对于\
  \ Windows，应使用等效的 PowerShell 命令。）\n\n\n\n```\npackage com.apress.bgn.nine;\n// 其他导入语句已省略\n\
  import java.util.concurrent.CompletableFuture;\nimport java.util.concurrent.ExecutionException;\n\
  public class NewApiProcessCreationDemo {\nprivate static final Logger log = LoggerFactory.getLogger(NewApiProcessCreationDemo.class);\n\
  public static void main(String... args) throws IOException, InterruptedException,\
  \ ExecutionException {\nProcessBuilder processBuilder = new ProcessBuilder();\n\
  processBuilder.command(\"/bin/sh\", \"-c\", \"echo Java home: $JAVA_HOME\");\nprocessBuilder.inheritIO();\n\
  Process process = processBuilder.start();\nCompletableFuture future = process.onExit();\n\
  int result = future.get().exitValue();\nlog.info(\"进程结果: \" + result);\nCompletableFuture\
  \ futureHandle = process.toHandle().onExit();\nProcessHandle processHandle = futureHandle.get();\n\
  log.info(\"进程 ID: {}\", processHandle.pid());\nProcessHandle.Info info = processHandle.info();\n\
  info.arguments().ifPresent(s -> Arrays.stream(s).forEach(a -> log.info(\"   参数:\
  \ {}\", a)));\ninfo.command().ifPresent(c -> log.info(\"\\t 命令: {}\", c));\n}\n\
  }\n代码清单 9-28\n用于创建进程的 Java 示例代码\n```\n\n可以通过 `ProcessBuilder` 的实例来创建新进程，这些实例接收命令列表及其参数作为参数。该类拥有许多构造函数和方法，它们具有不同的签名，可以轻松地创建和启动进程。\n\
  \n`inheritIO()` 方法用于将子进程标准 I/O 的源和目标设置为与当前进程相同。这意味着进程的输出会直接打印在控制台中，无需使用 `InputStream`\
  \ 实例来读取。\n\n`Process` 类中的 `onExit()` 方法返回一个 `CompletableFuture<Process>`，可用于在其执行结束时访问该进程，以检索进程的退出值。对于正常终止的进程，该值应为\
  \ 0（零）。\n\n`ProcessHandle` 类中的 `onExit()` 方法返回一个 `CompletableFuture<ProcessHandle>`，可用于访问进程，等待进程终止，并可能触发依赖操作。\n\
  \n当 Java 程序创建一个进程时，该进程会成为创建它的进程的子进程。为了能够列出所有子进程，我们需要确保它们持续运行一段时间，因为一旦终止，它们显然就不再存在。代码清单\
  \ 9-29 中的代码示例创建了三个相同的进程，每个进程都执行三个 Linux shell 命令。\n\n```\npackage com.apress.bgn.nine;\n\
  // 导入语句已省略\npublic class ThreeProcessesDemo {\nprivate static final Logger log =\n\
  LoggerFactory.getLogger(ThreeProcessesDemo.class);\npublic static void main(String...\
  \ args) {\ntry {\nList builders = List.of(\nnew ProcessBuilder(\"/bin/sh\", \"-c\"\
  ,\n\"echo \\\"start...\\\" ; sleep 3; echo \\\"done.\\\"\").inheritIO(),\nnew ProcessBuilder(\"\
  /bin/sh\", \"-c\",\n\"echo \\\"start...\\\" ; sleep 3; echo \\\"done.\\\"\").inheritIO(),\n\
  new ProcessBuilder(\"/bin/sh\", \"-c\",\n\"echo \\\"start...\\\" ; sleep 3; echo\
  \ \\\"done.\\\"\").inheritIO()\n);\nbuilders.parallelStream().forEach(pbs -> {\n\
  try {\npbs.start();\n} catch (Exception e) {\nlog.error(\"哎呀，无法启动进程！\", e);\n}\n\
  });\nProcessHandle ph = ProcessHandle.current();\nph.children().forEach(pc -> {\n\
  log.info(\"子进程 PID: {}\", pc.pid());\npc.parent().ifPresent(parent ->\nlog.info(\"\
  \ 父进程 PID: {}\", parent.pid()));\n});\nSystem.out.println(\"按任意键退出！\");\nSystem.in.read();\n\
  } catch (Exception e) {\nlog.error(\"创建三个进程失败: {}\", e.getMessage(), e);\n}\n}\n\
  }\n代码清单 9-29\n用于创建三个进程的 Java 示例代码\n```\n\n如您所见，我们将 `ProcessBuilder` 实例分组到一个列表中，并使用并行流处理这些实例，以确保所有进程几乎同时启动。我们在每个进程终止后打印其结果，以确保所有进程都正确执行。`children()`\
  \ 方法返回一个包含 `ProcessHandle` 实例的流，这些实例对应于当前 Java 进程启动的进程。\n\n对于每个子 `ProcessHandle`\
  \ 实例，都调用了 `parent()` 方法，以获取对应于创建它的进程的 `ProcessHandle`（如果存在的话）。运行代码清单 9-29 中的代码时，您应该在控制台中看到类似于代码清单\
  \ 9-30 所示的输出。（*前提是您在 macOS 或 Linux 上运行它。Windows 可能完全不知道要求它做什么。*）\n\n```\nstart...\n\
  start...\nstart...\nINFO  c.a.b.n.ThreeProcessesDemo - 子进程 PID: 31033\nINFO  c.a.b.n.ThreeProcessesDemo\
  \ -  父进程 PID: 31032\nINFO  c.a.b.n.ThreeProcessesDemo - 子进程 PID: 31035\nINFO  c.a.b.n.ThreeProcessesDemo\
  \ -  父进程 PID: 31032\nINFO  c.a.b.n.ThreeProcessesDemo - 子进程 PID: 31034\nINFO  c.a.b.n.ThreeProcessesDemo\
  \ -  父进程 PID: 31032\n按任意键退出！\ndone.\ndone.\ndone.\n代码清单 9-30\n创建三个进程的 Java 应用程序的输出\n\
  ```\n\n在过去，需要在更高级别上处理进程的开发人员不得不求助于原生代码。改进后的 Java 进程 API 对运行中和已生成的进程提供了更多的控制，因此如果您曾经需要它，现在您知道它的存在了。您可以在\
  \ Oracle 官方页面上找到 Java 9 中新增的 Java 进程 API 改进的完整列表。^(⁷⁷)\n\n\n\n## 测试\n\n调试是名为**测试**的软件流程的一部分，涉及在开发周期中尽早识别并纠正代码错误。在软件开发中，仅仅避免技术错误是不够的。测试应用程序的意义远不止于此。甚至有一个组织为软件测试人员提供优秀的培训和认证材料。**国际软件测试资格认证委员会（ISTQB）**\
  \ 是一个国际性的软件测试资格认证组织。它制定了软件测试的教学大纲、资格等级和指南^(⁷⁸)。如果你认为自己更感兴趣的是软件测试，那么你应该考虑获取 ISTQB\
  \ 认证。\n\nISTQB 对测试的定义是：“由所有生命周期活动（包括静态和动态）组成的过程，涉及对软件及相关工作产品的规划、准备和评估，以确定它们满足规定的要求，证明它们适合其用途，并检测缺陷。”\n\
  \nISTQB 的定义是一个技术性的、学术性的定义。我提出的定义是：“验证一个实现是否在预期的时间内，以可接受的资源消耗，完成了它应该做的事情的过程。”\n\n\
  重要\n\n测试是开发过程中必不可少的一部分，应尽早开始，因为修复缺陷的工作量会随着发现时间的推移呈指数级增长。你可以在罗伯特·C·马丁的《代码整洁之道：敏捷软件工艺手册》一书中，特别是第\
  \ 9 章“测试”中，了解更多关于延迟测试的弊端。\n\n在开发阶段，除了编写实际的解决方案代码，你还可以编写代码来测试你的解决方案。你可以手动运行这些测试，也可以在构建项目时使用构建工具来运行。在编写代码时，除了思考如何编写解决方案以解决问题之外，你还应该思考如何测试该解决方案。这种方法被称为**测试驱动开发（TDD）**，这是一种编程范式，它指出你应该在实现解决方案之前思考如何测试它，因为如果它难以测试，那么它很可能难以实现、长期维护以及扩展以解决相关问题。\n\
  \n你能编写的最简单的测试称为**单元测试**，它们是测试小功能单元的非常简单的代码。如果你不能轻松地为你的设计编写单元测试，那么你的设计可能存在问题。单元测试是抵御失败的第一道防线。如果单元测试失败，你的解决方案的基础就是糟糕的。\n\
  \n跨越多个组件，测试功能单元之间的通信及其交互结果是否符合预期的测试，称为**集成测试**。\n\n开发人员应该编写的最后一种测试是**回归测试**，它会定期运行，以确保之前测试过的代码在修改后仍然能正确执行。这种测试对于由大量开发人员编写代码的大型项目至关重要，因为有时组件之间的依赖关系并不明显，一个开发人员编写的代码可能会破坏其他人的代码。\n\
  \n为了保持本书的范畴，本节将仅展示如何使用名为 Junit 的 Java 框架编写简单的单元测试，并描述一些你可以构建的典型测试组件，以便为单元测试设置上下文。因此，正如我的苏格兰同事所说：*让我们开始吧！*\n\
  \n### 测试代码位置\n\n你可能还记得，**第 3 章**解释了`java-bgn`项目结构。关于测试的讨论必须从最低级别项目模块的结构开始，这些模块包含源代码和测试。在图\
  \ 9-13 中，你可以看到包含本节所用模块的源代码和测试代码的模块结构。\n\n![](img/463938_3_En_9_Fig13_HTML.jpg)\n\
  \n图 9-13\n\nMaven 模块结构\n\n`src`目录包含项目的所有代码和资源。其内容分为两个目录：`main`和`test`。\n\n*   `main`目录包含源代码和应用程序配置文件，分为两个目录（图\
  \ 9-13 中未显示）。`java`目录包含 Java 源代码，`resources`目录包含配置文件、不可执行的文本文件（可以根据各种格式编写，如 XML、SQL、CSV\
  \ 等）、媒体文件、PDF 等。当应用程序被构建并打包成 jar（或 war 或 ear）时，只有`java`目录中的文件会被考虑；`*.class`文件与配置文件一起被打包。\n\
  \n*   `test`目录包含用于测试`src`目录中源代码的代码。Java 文件保存在`java`目录下，`resources`目录包含构建测试上下文所需的配置文件。`test`目录中的类是项目的一部分，并且可以访问`main`目录中声明的类，如**第\
  \ 3 章**中访问修饰符所述。但是，`test`目录中的内容不属于将交付给客户的项目部分。它们的存在只是为了在开发过程中帮助测试应用程序。`test/resources`目录中的文件通常会覆盖`main/resources`目录中的配置文件，以便为测试类提供一个隔离的、更小的执行上下文。\n\
  \n### 构建一个待测试的应用程序\n\n对于本节中的示例，我们将构建一个简单的应用程序，该程序使用嵌入式 Apache Derby^(⁷⁹)数据库来存储数据。这将是生产数据库。对于测试环境，该数据库将被替换为各种模拟数据库行为的伪构造。\n\
  \n这个应用程序相当简陋。一个`AccountService`实现从输入获取数据，并使用它来管理`Account`实例。`Account`类是一个非常抽象且不切实际的银行账户实现。它有一个`holder`字段（账户所有者）、一个`accountNumber`字段和一个`amount`字段。`AccountService`实现使用一个`AccountRepo`实现，通过`DBConnection`的实现来执行所有与`Account`实例相关的数据库操作。构成这个简单应用程序的类和接口以及它们之间的关系如图\
  \ 9-14 所示。\n\n![](img/463938_3_En_9_Fig14_HTML.jpg)\n\n图 9-14\n\n简单的账户管理应用程序组件（如\
  \ IntelliJ IDEA 中所示）\n\n这些类的实现与本节的讨论无关，但如果你好奇，可以在本书的官方仓库中找到完整的代码。那么，让我们开始测试吧。最简单的方法是编写一个主类并执行一些账户操作。然而，一旦应用程序投入生产，这样做是无用的，因为在其上测试新功能会带来数据损坏的风险。此外，生产数据库通常托管在昂贵的产品上，例如\
  \ Oracle RDBMS（Oracle 关系数据库管理系统）或 Microsoft SQL Server。它们并不真正适合开发或测试。我们的意图是在自动化构建过程中自动运行测试，因此内存数据库或可实例化的实现更为合适。那么，让我们从测试`AccountRepoImpl`类开始。\n\
  \n\n\n### 介绍 JUnit\n\nJUnit 无疑是 Java 开发领域中使用最广泛的测试框架。2017 年底，JUnit 5^(⁸⁰) 发布，这是该框架的下一代版本。它配备了全新的引擎，兼容\
  \ Java 9+，并包含大量基于 lambda 的功能。JUnit 5 提供了用于标记测试方法以自动执行的注解、用于初始化和销毁测试上下文的注解，以及用于实际实现测试方法的实用方法。你可以使用多种\
  \ JUnit 5 注解^(⁸¹)，但其中五个注解和一个实用类代表了 JUnit 框架的核心，这也是学习测试的最佳起点。以下列表描述了这五个 JUnit 5 注解（均来自\
  \ `org.junit.jupiter.api` 包）和实用类，以构建 JUnit 如何用于测试应用程序的整体概念：\n\n*   `@BeforeAll`\
  \ 用于返回 `void` 的非私有静态方法，该方法用于初始化当前类中所有测试方法将使用的对象和变量。此方法仅会被调用一次，在类中所有测试方法之前执行，因此测试方法不应修改这些对象，因为它们的状态是共享的，修改可能会影响测试结果。最终，由该注解方法初始化的静态字段可以声明为\
  \ `final`，这样一旦初始化，它们就无法再被更改。一个测试类中可以声明多个使用 `@BeforeAll` 注解的方法，但这有什么意义呢？\n\n*   `@AfterAll`\
  \ 是 `@BeforeAll` 的对应注解。它也用于注解返回 `void` 的非私有静态方法，其目的是销毁测试方法运行时的上下文并执行清理操作。\n\n* \
  \  `@BeforeEach` 用于返回 `void` 的非私有、非静态方法，使用该注解的方法会在每个使用 `@Test` 注解的方法之前执行。这些方法可用于进一步定制测试上下文，为对象填充将在测试方法中用于测试断言的值。\n\
  \n*   `@AfterEach` 用于返回 `void` 的非私有、非静态方法，使用该注解的方法会在每个使用 `@Test` 注解的方法之后执行。\n\n\
  *   `@Test` 用于返回 `void` 的非私有、非静态方法，使用该注解的方法即为一个测试方法。一个测试类可以有一个或多个测试方法，具体取决于被测试的类。\n\
  \n*   实用类 `org.junit.jupiter.api.Assertions` 提供了一组支持在测试中断言条件的方法。\n\n另一个值得注意的注解是\
  \ `@DisplayName`，它与所有其他注解声明在同一个包中，用于以更友好的方式命名测试。测试名称会显示在 IDE 中以及构建工具生成的报告中。\n\n\
  清单 9-31 中所示的 `PseudoTest` 类是一个简单的测试类，展示了到目前为止所介绍的注解的效果。\n\n```\npackage com.apress.bgn.nine;\n\
  // 省略了一些导入语句\nimport org.junit.jupiter.api.*;\nimport static org.junit.jupiter.api.Assertions.assertFalse;\n\
  import static org.junit.jupiter.api.Assertions.assertTrue;\npublic class PseudoTest\
  \ {\nprivate static final Logger log = LoggerFactory.getLogger(PseudoTest.class);\n\
  @BeforeAll\nstatic void loadCtx() {\nlog.info(\"加载通用测试上下文。\");\n}\n@BeforeEach\n\
  void setUp(){\nlog.info(\"准备单个测试上下文。\");\n}\n@Test\n@DisplayName(\"测试一\")\nvoid\
  \ testOne() {\nlog.info(\"执行测试一。\");\nassertTrue(true);\n}\n@Test\n@DisplayName(\"\
  测试二\")\nvoid testTwo() {\nlog.info(\"执行测试二。\");\nassertFalse(false);\n}\n@AfterEach\n\
  void tearDown(){\nlog.info(\"销毁单个测试上下文。\");\n}\n@AfterAll\nstatic void unloadCtx(){\n\
  log.info(\"卸载通用测试上下文。\");\n}\n}\n清单 9-31\n使用 JUnit 注解的 PseudoTest 类\n```\n\n记住你现在对这些注解的了解，你应该能够推断出日志消息的顺序，因为默认情况下，JUnit\
  \ Jupiter 测试是在单个线程中顺序执行的。因此，运行该类时，你可能会看到类似如下的输出：\n\n```\nINFO  c.a.b.n.PseudoTest\
  \ - 加载通用测试上下文。\nINFO  c.a.b.n.PseudoTest - 准备单个测试上下文。\nINFO  c.a.b.n.PseudoTest\
  \ - 执行测试一。\nINFO  c.a.b.n.PseudoTest - 销毁单个测试上下文。\nINFO  c.a.b.n.PseudoTest - 准备单个测试上下文。\n\
  INFO  c.a.b.n.PseudoTest - 执行测试二。\nINFO  c.a.b.n.PseudoTest - 销毁单个测试上下文。\nINFO \
  \ c.a.b.n.PseudoTest - 卸载通用测试上下文。\n```\n\n启用测试的并行执行是可能的，只需在 `test\\resources` 下添加一个名为\
  \ `junit-platform.properties` 的文件，其中包含以下属性：\n\n```\njunit.jupiter.execution.parallel.enabled\
  \ = true\njunit.jupiter.execution.parallel.mode.default = concurrent\njunit.jupiter.execution.parallel.mode.classes.default\
  \ = same_thread\n```\n\n注意 `junit.jupiter.execution.parallel.enabled` 属性被设置为 `true`。前面这组属性代表了配置参数，用于顺序执行顶层类，但并行执行其方法。官方\
  \ JUnit 文档中提供了更多配置示例。\n\n注意\n\n如果你的测试套件在设计时考虑了测试方法的执行顺序，那么并行执行可能会导致测试失败。\n\n在执行\
  \ `mvn test` 时，Maven 会运行项目中的所有测试作为构建的一部分，并且有单独运行测试类的选项。大多数智能 Java 编辑器（如 IntelliJ\
  \ IDEA）也提供了运行测试的选项；你可以运行整个类、只运行一个方法、运行特定包，甚至可以在调试模式下运行并使用断点。图 9-15 显示了在 IntelliJ\
  \ IDEA 中运行测试类的菜单选项，通过右键单击 `PseudoTest` 类打开上下文菜单即可访问。\n\n![](img/463938_3_En_9_Fig15_HTML.jpg)\n\
  \n图 9-15\n\nIntelliJ IDEA 运行单元测试的菜单\n\n选择 **运行 'PseudoTest'** 后，测试类即被执行。会创建一个启动器，以便你也可以从典型的启动菜单中启动它。测试类可以在调试模式下执行，也可以使用断点。执行\
  \ `PseudoTest` 类时，即使测试方法是并行运行的，输出也与前面提到的注解规范所对应的方法顺序一致。为了确保测试方法是并行执行的，日志记录器被配置为也打印线程\
  \ ID。示例输出如清单 9-32 所示。\n\n```\n[1-worker-1] INFO  c.a.b.n.PseudoTest - 加载通用测试上下文。\n\
  [1-worker-3] INFO  c.a.b.n.PseudoTest - 准备单个测试上下文。\n[1-worker-2] INFO  c.a.b.n.PseudoTest\
  \ - 准备单个测试上下文。\n[1-worker-2] INFO  c.a.b.n.PseudoTest - 执行测试一。\n[1-worker-3] INFO\
  \  c.a.b.n.PseudoTest - 执行测试二。\n[1-worker-2] INFO  c.a.b.n.PseudoTest - 销毁单个测试上下文。\n\
  [1-worker-3] INFO  c.a.b.n.PseudoTest - 销毁单个测试上下文。\n[1-worker-1] INFO  c.a.b.n.PseudoTest\
  \ - 卸载通用测试上下文。\n清单 9-32\nPseudoTest 执行的输出\n```\n\n清单 9-31 中的 `testOne()` 方法包含语句\
  \ `assertTrue(true);`，这是为了向你展示断言方法的样子。在实际测试中，`true` 值会被替换为一个条件。`textTwo()` 方法中的\
  \ `assertFalse(false);` 断言也是如此。\n\n这就是我们在本书中能够专门介绍 JUnit 的全部内容了。我建议你进一步深入研究它，因为一个开发者可以编写代码，但一个好的开发者知道如何确保代码也能正常工作。\n\
  \n\n\n#### 使用伪造对象\n\n使用**伪造对象**是一种在不实际依赖真实对象或方法的情况下，模拟代码中对象和方法功能的方式。用于实现此类对象的代码具有简化后的生产环境功能。\n\
  \n为了测试 `AccountRepoImpl` 类，我们必须用一个 `FakeDBConnection` 实例替换 `DerbyDBConnection` 实例。这个伪造的连接并非由数据库支持，而是由更简单、更易访问的东西（如\
  \ `Map<?,?>`）支持。`DerbyDBConnection` 使用 `java.sql.Connection` 及该包中的其他类来对 Derby 数据库执行数据操作。\n\
  \n`FakeDBConnection` 类将实现 `DBConnection` 接口，以便它可以被传递给 `AccountRepoImpl`，并且其所有方法都将被调用。\n\
  \n编写测试和测试支持类时的经验法则是：将它们与被测试或替换的对象放在同一个包中，但放在 `test/java` 目录下。这是因为测试类必须能够访问被测试的类，而无需在\
  \ `module-info.java` 文件中进行额外配置。使用伪造对象来测试应用程序类的支持类在 `com.apress.bgn.nine.fake` 包中声明。\n\
  \n编写测试时的另一个经验法则是：编写一个方法来测试被测试方法的正确结果，并编写另一个方法来测试错误行为。在意外情况下，使用意外数据，你的应用程序会以意外的方式运行，因此尽管这看起来有些矛盾，但你必须预料到意外情况并为其编写测试。\n\
  \n`AccountRepoImpl` 类实现了将 `Account` 实例持久化到数据库或从数据库中删除的基本方法。该实现如代码清单 9-33 所示。\n\n\
  ```\npackage com.apress.bgn.nine.repo;\nimport com.apress.bgn.nine.Account;\nimport\
  \ com.apress.bgn.nine.db.DbConnection;\nimport java.util.List;\nimport java.util.Optional;\n\
  public class AccountRepoImpl  implements AccountRepo {\nprivate DbConnection conn;\n\
  public AccountRepoImpl(DbConnection conn) {\nthis.conn = conn;\n}\n@Override\npublic\
  \ Account save(Account account) {\nvar dbAcc = conn.findByHolder(account.holder());\n\
  if(dbAcc == null) {\nreturn conn.insert(account);\n}\nreturn conn.update(account);\n\
  }\n@Override\npublic Optional findOne(String holder) {\nvar acc = conn.findByHolder(holder);\n\
  if(acc != null) {\nreturn Optional.of(acc);\n}\nreturn Optional.empty();\n}\n@Override\n\
  public List findAll() {\nreturn conn.findAll();\n}\n@Override\npublic int deleteByHolder(String\
  \ holder) {\nvar acc = conn.findByHolder(holder);\nconn.delete(holder);\nif(acc\
  \ != null) {\nreturn 0;\n}\nreturn 1;\n}\n}\n代码清单 9-33\nAccountRepoImpl 实现\n```\n\
  \n`AccountRepoImpl` 类中的 `deleteByHolder(..)` 方法用于删除一个账户。如果条目存在，则删除并返回 0；否则返回 1。`deleteByHolder(..)`\
  \ 方法如代码清单 9-34 所示。\n\n为了测试这个类，我们需要提供一个模拟数据库连接的 `DbConnection` 实现。这就是前面提到的 `FakeDBConnection`\
  \ 发挥作用的地方，其代码也在代码清单 9-34 中展示。\n\n```\npackage com.apress.bgn.nine.fake.db;\nimport\
  \ com.apress.bgn.nine.Account;\nimport com.apress.bgn.nine.db.DBException;\nimport\
  \ com.apress.bgn.nine.db.DbConnection;\nimport java.util.*;\npublic class FakeDBConnection\
  \ implements DbConnection {\n/**\n* 伪数据库 {@code Map}\n*/\nMap database = new HashMap();\n\
  @Override\npublic void connect() {\n// 无需实现\n}\n@Override\npublic Account insert(Account\
  \ account) {\nif (database.containsKey(account.holder())) {\nthrow new DBException(\"\
  无法插入 \" + account);\n}\ndatabase.put(account.holder(), account);\nreturn account;\n\
  }\n@Override\npublic Account findByHolder(String holder) {\nreturn database.get(holder);\n\
  }\n@Override\npublic List findAll() {\nreturn new ArrayList(database.values());\n\
  }\n@Override\npublic Account update(Account account) {\nif (!database.containsKey(account.holder()))\
  \ {\nthrow new DBException(\"找不到账户 \" + account.holder());\n}\ndatabase.put(account.holder(),\
  \ account);\nreturn account;\n}\n@Override\npublic void delete(String holder) {\n\
  database.remove(holder);\n}\n@Override\npublic void disconnect() {\n// 无需实现\n}\n\
  }\n代码清单 9-34\nFakeDBConnection 实现\n```\n\n`FakeDBConnection` 的行为完全像一个连接对象，可用于将条目保存到数据库、搜索或删除它们，只不过它是由一个\
  \ `Map<String, Account>` 而非数据库支持的。映射的键将是持有者的名字，因为在我们的数据库中，持有者名字被用作表中 `Account` 条目的唯一标识符。现在我们有了这个伪造对象，就可以测试\
  \ `AccountRepoImpl` 是否按预期运行。出于实际原因，本节仅测试一个方法，但完整代码可在本书的官方 GitHub 仓库中找到。\n\n代码清单\
  \ 9-35 展示了一个测试类，它测试了验证 `findOne(..)` 方法行为的方法。它包含一个正向测试方法（当存在匹配条件的条目时）和一个负向测试方法（当不存在时）。\n\
  \n```\npackage com.apress.bgn.nine;\n// 其他导入语句已省略\nimport static org.junit.jupiter.api.Assertions.*;\n\
  public class FakeAccountRepoTest {\nprivate static final Logger log = LoggerFactory.getLogger(FakeAccountRepoTest.class);\n\
  private static DbConnection conn;\nprivate AccountRepo repo;\n@BeforeAll\nstatic\
  \ void prepare() {\nconn = new FakeDBConnection();\n}\n@BeforeEach\npublic void\
  \ setUp(){\nrepo = new AccountRepoImpl(conn);\n// 插入一个条目以便测试 update/findOne\nrepo.save(new\
  \ Account(\"Pedala\", 200, \"2345\"));\n}\n@Test\npublic void testFindOneExisting(){\n\
  Optional expected = repo.findOne(\"Pedala\");\nassertTrue(expected.isPresent());\n\
  }\n@Test\npublic void testFindOneNonExisting(){\nOptional expected = repo.findOne(\"\
  Dorel\");\nassertFalse(expected.isPresent());\n}\n@Test\npublic void testFindAll(){\n\
  assertEquals(1, repo.findAll().size());\n}\n@Test\npublic void testInsert(){\nAccount\
  \ expected = new Account(\"Gigi\", 100, \"12345\");\nAccount actual = repo.save(expected);\n\
  assertEquals(expected, actual);\n}\n@Test\npublic void testUpdate(){\nAccount existing\
  \ = conn.findByHolder(\"Pedala\");\nint originalSum = existing.sum();\nvar upAcc\
  \ = new Account(existing.holder(), originalSum -50, existing.number());\nAccount\
  \ actual = repo.save(upAcc);\nassertEquals(upAcc.sum(),actual.sum());\n}\n@Test\n\
  public void testDeleteExisting(){\nassertEquals( 0, repo.deleteByHolder(\"Pedala\"\
  ));\n}\n@Test\npublic void testDeleteNonExisting(){\nassertEquals( 1, repo.deleteByHolder(\"\
  NotExisting\"));\n}\n@AfterEach\nvoid tearDown(){\n// 删除条目\nrepo.deleteByHolder(\"\
  Pedala\");\n}\n@AfterAll\npublic static void cleanUp(){\nconn = null;\nlog.info(\"\
  全部完成！\");\n}\n}\n代码清单 9-35\nFakeAccountRepoTest 测试类\n```\n\n注意我们是如何创建恰好一个条目并将其添加到我们的伪造数据库中的。\n\
  \n现在我们已经确定仓库类能正常工作，接下来要测试的是 `AccountServiceImpl`。为了测试这个类，我们将采用一种不同的方法。伪造对象很有用，但为一个功能复杂的类编写伪造对象可能代价相当高。那么有哪些替代方案呢？有几种。在下一节中，我们将探讨桩（stubs）。\n\
  \n\n\n#### 使用桩（Stubs）\n\n**桩**是一种模拟对象，它能静默地模拟行为并返回预定义的期望值。`AccountServiceImpl` 的实例使用\
  \ `AccountRepo` 的实例从数据库检索数据或向数据库保存数据。在为此类编写单元测试时，每个测试方法必须覆盖服务类中某个方法的功能，因此我们可以编写一个桩类来模拟\
  \ `AccountRepo` 的行为。为了让 `AccountServiceImpl` 实例能够使用它，该桩必须实现 `AccountRepo`。在本节中，测试将覆盖\
  \ `createAccount(..)` 方法，因为该方法可能以多种方式失败。因此，可以为其编写多个测试方法。清单 9-36 展示了 `createAccount(..)`\
  \ 方法。\n\n```\npackage com.apress.bgn.nine.service;\n// 省略 import 语句\npublic class\
  \ AccountServiceImpl implements AccountService {\n    AccountRepo repo;\n    public\
  \ AccountServiceImpl(AccountRepo repo) {\n        this.repo = repo;\n    }\n   \
  \ @Override\n    public Account createAccount(String holder, String accountNumber,\
  \ String amount) {\n        int intAmount;\n        try {\n            intAmount\
  \ = Integer.parseInt(amount);\n        } catch (NumberFormatException nfe) {\n \
  \           throw new InvalidDataException(\"无法使用无效金额创建账户！\");\n        }\n    \
  \    if (accountNumber == null || accountNumber.length() < 5) {\n            throw\
  \ new InvalidDataException(\"无法使用无效账号创建账户！\");\n        }\n        if (intAmount\
  \ < 0) {\n            throw new InvalidDataException(\"无法使用负数金额创建账户！\");\n     \
  \   }\n        Optional<Account> existing = repo.findOne(holder);\n        if (existing.isPresent())\
  \ {\n            throw new AccountCreationException(\"持有人 \" + holder + \" 的账户已存在\"\
  );\n        }\n        Account acc = new Account(holder, intAmount, accountNumber);\n\
  \        return repo.save(acc);\n    }\n    // 省略其他方法\n}\n清单 9-36\nAccountServiceImpl#createAccount(..)\
  \ 方法\n```\n\n`createAccount(..)` 方法接受持有人姓名、待创建账号和初始金额作为参数。所有这些参数都特意以 `String` 实例形式提供，以便方法体包含一些需要认真测试的逻辑。我们来分析\
  \ `createAccount(..)` 方法的行为，并列出所有可能的返回值和异常：\n\n*   如果 `amount` 不是数字，则抛出 `InvalidDataException`。（`InvalidDataException`\
  \ 是专门为此项目创建的自定义异常类型，目前不相关。）\n*   如果 `accountNumber` 参数为 null，则抛出 `InvalidDataException`。\n\
  *   如果 `accountNumber` 参数少于五个字符，则抛出 `InvalidDataException`。\n*   如果转换为数字的 `amount`\
  \ 参数为负数，则抛出 `InvalidDataException`。\n*   如果 `holder` 参数的账户已存在，则抛出 `AccountCreationException`。\n\
  *   如果所有输入均有效且 `holder` 参数没有对应账户，则创建 `Account` 实例，保存到数据库，并返回结果。\n\n如果我们真的对测试一丝不苟，就需要为所有这些情况编写测试场景。在软件领域，有一种称为**测试覆盖率**的概念，这是一个确定测试用例是否覆盖应用程序代码以及覆盖多少的过程。结果是一个百分比值，公司通常会定义一个测试覆盖率百分比^(⁸²)，作为应用程序质量的保证。在展示\
  \ `createAccount(..)` 方法的测试方法之前，请先查看清单 9-37，其中展示了仓库桩代码。\n\n```\npackage com.apress.bgn.nine.service.stub;\n\
  // 其他 import 语句\npublic class AccountRepoStub implements AccountRepo {\n    private\
  \ Integer option = 0;\n    public synchronized void set(int val) {\n        option\
  \ = val;\n    }\n    @Override\n    public Account save(Account account) {\n   \
  \     return account;\n    }\n    @Override\n    public Optional findOne(String\
  \ holder) {\n        if (option == 0) {\n            return Optional.of(new Account(holder,\
  \ 100, \"22446677\"));\n        }\n        return Optional.empty();\n    }\n   \
  \ @Override\n    public List findAll() {\n        return List.of(new Account(\"\
  sample\", 100, \"22446677\"));\n    }\n    @Override\n    public int deleteByHolder(String\
  \ holder) {\n        return option;\n    }\n}\n清单 9-37\nAccountRepoStub 类\n```\n\
  \n`option` 字段可用于改变桩的行为，以覆盖更多测试用例。由于我们只有一个桩仓库，这意味着测试在并行运行时可能会失败，但对于这个使用基本桩的示例来说，它是可行的。\n\
  \n使用 JUnit 编写测试有两种方式，具体取决于所使用的 `assert*(..)` 语句。清单 9-38 展示了两个负面测试方法，用于验证当提供无效金额作为参数时的行为。\n\
  \n```\npackage com.apress.bgn.nine.service;\n// 省略 import 语句\npublic class AccountServiceTest\
  \ {\n    private static AccountRepoStub repo;\n    private AccountService service;\n\
  \    @BeforeAll\n    public static void prepare() {\n        repo = new AccountRepoStub();\n\
  \    }\n    @BeforeEach\n    public void setUp() {\n        service = new AccountServiceImpl(repo);\n\
  \    }\n    @Test\n    public void testNonNumericAmountVersionOne() {\n        assertThrows(InvalidDataException.class,\n\
  \            () -> {\n                service.createAccount(\"Gigi\", \"223311\"\
  , \"2I00\");\n            });\n    }\n    @Test\n    public void testNonNumericAmountVersionTwo()\
  \ {\n        InvalidDataException expected = assertThrows(\n            InvalidDataException.class,\
  \ () -> {\n                service.createAccount(\"Gigi\", \"223311\", \"2I00\"\
  );\n            }\n        );\n        assertEquals(\"无法使用无效金额创建账户！\", expected.getMessage());\n\
  \    }\n    @AfterEach\n    public void tearDown() {\n        repo.set(0);\n   \
  \ }\n    @AfterAll\n    public static void destroy() {\n        repo = null;\n \
  \   }\n}\n清单 9-38\n使用桩仓库的 AccountServiceTest 单元测试类\n```\n\n`testNonNumericAmountVersionOne()`\
  \ 方法使用了 `assertThrows(..)`，它接收两个参数：当执行第二个 `Executable` 类型参数时预期抛出的异常类型。`Executable`\
  \ 是定义在 `org.junit.jupiter.api.function` 包中的一个函数式接口，可在 lambda 表达式中使用，从而得到清单 9-38\
  \ 中所示的紧凑测试。\n\n`testNonNumericAmountVersionTwo()` 方法保存了 `assertThrows(..)` 调用的结果，这样还可以测试异常的消息，以确保执行流程完全符合预期。\n\
  \n可以编写类似的方法来测试所有其他服务方法。本书仓库中托管的 `AccountServiceTest` 类还展示了一些其他测试方法。欢迎添加你自己的方法来覆盖你自己的场景。\n\
  \n下一节将介绍本章涵盖的最后一种测试技术：使用模拟对象（mocks）编写测试。\n\n\n\n#### 使用模拟对象\n\n**模拟对象**是能够记录其所接收调用的对象。在测试执行期间，通过使用断言工具方法，可以验证所有预期操作是否已在模拟对象上执行。幸运的是，开发者无需自行编写模拟对象的代码，因为有三个广为人知的库提供了使用模拟进行测试所需的类类型：Mockito^(⁸³)、JMock^(⁸⁴)\
  \ 和 EasyMock^(⁸⁵)。此外，如果你需要模拟静态方法（最常见的原因是糟糕的设计，而这超出了你的能力范围），可以使用 PowerMock^(⁸⁶)。\n\
  \n使用模拟对象，你可以直接开始编写测试。清单 9-39 展示了针对 `createAccount(..)` 方法的两个测试，它们专注于验证仓库类是否实际调用了其方法，因为仓库类是被模拟对象替换的类。\n\
  \n```\npackage com.apress.bgn.nine.mock;\n// 其他导入语句已省略\nimport org.junit.jupiter.api.extension.ExtendWith;\n\
  import org.mockito.Mock;\nimport org.mockito.junit.jupiter.MockitoExtension;\nimport\
  \ static org.junit.jupiter.api.Assertions.*;\nimport static org.mockito.ArgumentMatchers.any;\n\
  import static org.mockito.Mockito.when;\n@ExtendWith(MockitoExtension.class)\npublic\
  \ class AccountServiceTest {\npublic AccountService service;\n@Mock\npublic AccountRepo\
  \ mockRepo;\n@BeforeEach\npublic void checkMocks() {\nassertNotNull(mockRepo);\n\
  service = new AccountServiceImpl(mockRepo);\n}\n@Test\npublic void testCreateAccount()\
  \ {\nAccount expected = new Account(\"Gigi\", 2100, \"223311\");\nwhen(mockRepo.findOne(\"\
  Gigi\")).thenReturn(Optional.empty());\nwhen(mockRepo.save(any(Account.class))).thenReturn(expected);\n\
  Account result = service.createAccount(\"Gigi\", \"223311\", \"2100\");\nassertEquals(expected,\
  \ result);\n}\n@Test\npublic void testCreateAccountAlreadyExists() {\nAccount expected\
  \ = new Account(\"Gigi\", 2100, \"223311\");\nwhen(mockRepo.findOne(\"Gigi\")).thenReturn(Optional.of(expected));\n\
  assertThrows(AccountCreationException.class,\n() -> service.createAccount(\"Gigi\"\
  , \"223311\", \"2100\"));\n}\n}\n清单 9-39\n使用模拟仓库的 AccountServiceTest 单元测试类\n```\n\
  \n这些测试相当不言自明，`Mockito` 工具方法的命名也使得理解测试执行过程中实际发生的情况变得容易。等等，你可能会问，模拟对象是如何创建和注入的？是谁做的这些？\n\
  \n`@ExtendWith(MockitoExtension.class)` 注解对于 JUnit 5 测试支持 `Mockito` 注解是必需的。没有它，像\
  \ `@InjectMocks` 和 `@Mock` 这样的注解对代码没有影响。\n\n`@Mock` 注解用于由 Mockito 创建的模拟对象的引用。使用模拟对象的首选方式是指定一个接口类型的引用，该接口由真实对象类型和将为测试场景创建的模拟对象共同实现。但\
  \ `@Mock` 也可以放在具体类型引用上，创建的模拟对象将是该类的子类。\n\n`@InjectMocks` 注解用于待测试的对象，这样 Mockito 就知道要创建这个对象并注入模拟对象来替代依赖项。\n\
  \n这就是你在测试中开始使用 Mockito 模拟对象所需了解的全部内容。声明要替换为模拟对象的对象以及要注入的对象，是包含使用模拟对象的单元测试的类所需的唯一设置。\n\
  \n使用模拟对象的测试方法体也具有典型的结构。第一行必须声明对象和变量，这些对象和变量将作为参数传递给被测对象上调用的方法，或作为参数传递给声明模拟对象接受什么参数以及返回什么结果的\
  \ Mockito 工具方法。下一行则建立模拟对象在被测对象调用其方法时的行为。\n\n以下两行展示了 `findOne(..)` 方法的这种情况。第一行创建了一个\
  \ `account` 对象。第二行定义了模拟对象的行为。当调用 `mockRepo.findOne(\"Gigi\")` 时，先前创建的 account 实例将被包装在\
  \ `Optional<T>` 实例中返回。\n\n```\nAccount expected = new Account(\"Gigi\", 2100, \"\
  223311\");\nwhen(mockRepo.findOne(\"Gigi\")).thenReturn(Optional.of(expected));\n\
  ```\n\n还有许多其他库旨在让开发者尽可能轻松地编写测试，像 Spring 这样的大型框架也提供了自己的测试库，以帮助开发者为使用该框架的应用程序编写测试。像\
  \ Ant、Maven 和 Gradle 这样的构建工具可用于在构建项目时自动运行测试，并生成与失败相关的有用报告。\n\n使用 Maven，可以通过在控制台中调用\
  \ `mvn clean install` 来构建项目。测试模块中声明的所有测试类，如果命名为 `*Test.java`，都会被自动识别。在编写测试而不更改应用程序代码时，你可以仅通过调用\
  \ `mvn test` 来运行测试。这是一种可以通过配置 `pom.xml` 文件中的 Maven Surefire Testing 插件来更改的配置。\n\n\
  在 Maven 项目中，测试由 `maven-surefire-plugin` 运行。Maven 测试结果以 TXT 和 XML 格式保存，文件位于 `target/surefire-reports`\
  \ 目录中。可以通过将 `maven-surefire-report-plugin` 添加到项目配置中，并将其配置为在测试阶段运行，从而将测试结果分组到 HTML\
  \ 报告中。这很实用，因为通过运行 `mvn clean install` 或 `mvn test` 即可生成报告。该报告由位于 `target/site` 目录中名为\
  \ `surefire-report.html` 的文件表示。\n\n为了生成报告，构建必须完整运行，因此通过将 `testFailureIgnore` 设置为\
  \ `true`，将 `maven-surefire-plugin` 配置为继续测试，而不是在第一次失败时停止，如清单 9-40 所示。\n\n```\n\n\
  org.apache.maven.plugins\nmaven-surefire-plugin\n\norg.junit.jupiter\njunit-jupiter-engine\n\
  ${jupiter.junit.version}\n\ntrue\n\n清单 9-40\n配置为忽略测试失败的 maven-surefire-plugin\n\
  ```\n\n在以下示例中，故意引入了一个测试失败，并生成了报告。你可以在图 9-16 中看到生成报告的第一部分。\n\n![](img/463938_3_En_9_Fig16_HTML.jpg)\n\
  \n图 9-16\n\n包含一个测试失败的 Maven 测试报告（第 1 部分）\n\n报告的第一部分显示了失败测试的百分比、它们所在的包以及测试类的名称。报告的第二部分（如图\
  \ 9-17 所示）显示了失败的详细信息。\n\n![](img/463938_3_En_9_Fig17_HTML.jpg)\n\n图 9-17\n\n包含一个测试失败的\
  \ Maven 测试报告（第 2 部分）\n\n修复测试后，报告变得更简单，最后两个部分不再生成，如图 9-18 所示。\n\n![](img/463938_3_En_9_Fig18_HTML.jpg)\n\
  \n图 9-18\n\n没有测试失败且具有典型 Maven 生成站点样式的 Maven 测试报告\n\n信息\n\n在本书的第一版中，我使用 Gradle 来构建这个项目。由于与较新版本的\
  \ Java 存在各种不兼容问题以及配置困难，我转而使用 Maven，它被广泛使用且相当稳定。不幸的是，生成测试报告需要多个 Maven 插件，并且报告并不那么美观。\n\
  \n重要\n\n作为本节的结论，请记住：无论一个开发团队多么优秀，如果没有一个出色的测试团队，最终生成的应用程序可能远未达到可接受的质量标准。因此，如果你面试的公司没有专门的测试团队，或者公司文化在代码审查和编写测试等技术上有所妥协，那么在接受这份工作之前请三思。\n\
  \n\n## 文档编写\n\n在软件界有一个关于文档的笑话，可能并非人人喜欢，但值得一提：*文档* *就像性。当它好的时候，真的非常好。而当它差的时候，也总比没有强*。\n\
  \n编程的一个常识性规则和最佳实践是编写自解释的代码，这可以减少编写大量文档的需求。基本上，如果你需要写太多文档，那说明你的编程方式有问题。有很多方法可以让你的代码自解释，从而避免编写大量文档，例如为类和变量使用有意义的名称，并遵守语言的代码规范。然而，当你构建一组供其他开发者使用的类时，你需要为主要\
  \ API 提供一些文档。如果你的解决方案需要编写非常复杂的算法，你可能需要在这里或那里添加一些注释，尽管在这种情况下，也应该编写包含架构图和示意图的适当技术文档。\n\
  \n回顾一下，在**第** **3** **章**中，我介绍了不同类型的注释，并承诺在本章中提供关于 Javadoc 注释的更多细节。现在我们就来讨论这一点。Javadoc\
  \ 块注释，也称为*文档注释*，通常与公共类、接口、方法体、公共字段相关联，有时甚至在确实必要时与受保护或私有组件相关联。Javadoc 注释包含特殊的标签，用于链接文档化的元素或标记不同类型的信息。Javadoc\
  \ 注释及其关联的代码可以被 Javadoc 工具处理、提取，并打包成一个 HTML 站点，这被称为项目的 Javadoc API。此项目的 Maven 配置声明了几个报告插件，其中包括\
  \ `maven-site-plugin`，它被配置为将所有报告打包成一个项目的静态站点，该站点位于 `target/site` 目录下。\n\n重要\n\n\
  项目站点通过执行 `mvn site` 生成。\n\n智能编辑器可以下载并访问项目的文档，并在开发者尝试使用已文档化的组件编写代码时显示这些文档，因此良好的代码文档能显著提高开发过程的速度。让我们从几个\
  \ Javadoc 注释的例子开始，解释其中使用的最重要的标签。\n\n每当我们创建一个类或接口时，都应该添加 Javadoc 注释来解释其用途，标识该类或接口被添加时的应用程序版本，并最终链接一些现有资源。本章前面的“日志记录”部分介绍了\
  \ `IntSorter` 层次结构（见图 9-1），这是一个实现 `IntSorter` 接口的类层次结构，提供了不同排序算法的实现。当其他开发者使用这些类时，他们可能希望向\
  \ `IntSorter` 层次结构添加自定义算法。关于 `IntSorter` 接口的一些信息将极大地帮助他们设计合适的解决方案。清单 9-41 展示了添加到\
  \ `IntSorter` 接口的 Javadoc 注释。\n\n```\npackage com.apress.bgn.nine.algs;\n/**\n*\
  \ 接口 {@code IntSorter} 是一个需要由提供对 {@code int} 值数组进行排序方法的类来实现的接口。\n*\n* 选择 {@code\
