  \ Epsilon Heap\n[0.186s][info   ][gc,heap,exit] Allocation space:\n[0.186s][info\
  \   ][gc,heap,exit]  space 524288K,   0% used [0x0000000600000000, 0x000000060031fe10,\
  \ 0x0000000620000000)\n[0.186s][info   ][gc,heap,exit]  Metaspace       used 990K,\
  \ committed 1152K, reserved 1114112K\n[0.186s][info   ][gc,heap,exit]   class space\
  \    used 84K, committed 192K, reserved 1048576K\n[0.186s][info   ][gc         \
  \ ] Heap: 8192M reserved, 512M (6.25%) committed, 3199K (0.04%) used\n[0.186s][info\
  \   ][gc,metaspace] Metaspace: 1088M reserved, 1152K (0.10%) committed, 994K (0.09%)\
  \ used\n清单 13-6\n展示 Epsilon GC 详细信息\n```\n\n这些 GC 打印的数据具有共同元素，例如堆的初始大小，在应用程序启动时始终为\
  \ 512M，并且**在我的计算机上**最大大小为 8GB。伊甸园区和年轻代在它们之间也有所不同，G1GC 仅为年轻代使用 4096K，而 ParallelGC\
  \ 则需要 153088K（多得多）。\n\n这里最有趣的是 Epsilon 垃圾回收器，因为正如预期的那样，它没有将堆划分为代区域，因为这种类型的垃圾回收器根本不执行垃圾回收。**TLAB**\
  \ 是**线程本地分配缓冲区**的缩写，这是一个存储对象的内存区域。只有较大的对象存储在 TLAB 之外。TLAB 在执行期间为每个线程单独动态调整大小。因此，如果一个线程分配了非常多的内存，它从堆中获取的新\
  \ TLAB 的大小将会增加。TLAB 的最小大小可以通过虚拟机选项 `-XX:MinTLABSize` 来控制。\n\n对于我们使用先前虚拟机选项运行的小型空类，这个输出实际上并不相关。但是，在运行后续章节中介绍的代码时，你可以尝试使用这些选项，因为那时这里打印的统计数据才具有一定的相关性。\n\
  \n此外，还有一个名为 `-XX:+PrintCommandLineFlags` 的虚拟机选项，可以在运行类时使用，以显示垃圾回收器的配置，例如它使用的线程数、堆大小等。这些选项显示在清单\
  \ 13-7 中。\n\n```\n-XX:ConcGCThreads=3\n-XX:G1ConcRefinementThreads=13\n-XX:InitialHeapSize=536870912\n\
  -XX:MarkStackSize=4194304\n-XX:MaxHeapSize=8589934592\n-XX:MinHeapSize=6815736\n\
  -XX:+PrintCommandLineFlags\n-XX:ReservedCodeCacheSize=251658240\n-XX:+SegmentedCodeCache\n\
  -XX:+UseCompressedOops\n-XX:+UseG1GC\n清单 13-7\nG1GC 虚拟机选项\n```\n\n这些虚拟机选项中的大多数都有显而易见的名称，允许开发者推断它们的用途；对于那些名称不明显的选项，Oracle\
  \ 的官方文档提供了答案。如果你需要剖析 Oracle 的内存管理，关于这个主题有相当多优秀的 Oracle 官方文章^((130))。\n\n## 从代码层面处理垃圾回收\n\
  \n对于大多数应用程序来说，垃圾回收并不是开发者必须真正考虑的事情。JVM 会不时启动一个 GC 线程，它通常在不影响应用程序执行的情况下完成其工作。对于希望拥有超越\
  \ Java 基础技能的开发者来说，理解 Java 垃圾回收的工作原理以及如何对其进行调优是必须的。开发者必须接受的第一件事是，Java 垃圾回收无法在运行时控制。正如你将在下一节中看到的，有一种方法可以向\
  \ JVM 建议需要进行一些内存清理，但无法保证内存清理一定会被执行。从代码层面唯一能做的就是配置一些在对象被丢弃时运行的代码。\n\n\n### 使用 `finalize()`\
  \ 方法\n\n正如**第****4**章所介绍的，每个 Java 类都自动是 JDK `java.lang.Object` 类的子类。该类位于 JDK 层次结构的根节点，也是应用程序中所有类的根节点。它提供了许多有用的方法，这些方法可以被扩展或重写，以实现子类特有的行为。`equals()`、`hashCode()`\
  \ 和 `toString()` 方法已在之前的章节中介绍过。`finalize()` 方法在 Java 9 中已被弃用，但为了向后兼容，它尚未从 JDK 中移除。\n\
  \n警告\n\n终结机制存在一些问题。终结可能导致性能问题、死锁和挂起。终结器中的错误可能导致资源泄漏，并且如果不再需要终结，也无法取消。\n\n由于你可能会处理使用早期\
  \ JDK 版本的 Java 项目，因此了解 `finalize()` 方法的存在是件好事，以防你将来可能需要用到它，或者只是为了知道在哪里寻找奇怪的错误。\n\
  \n当代码中不再存在对该对象的任何引用时，垃圾回收器会调用此方法。在我们继续之前，请查看代码清单 13-8 中的代码。\n\n```\npackage com.apress.bgn.thirteen;\n\
  import com.apress.bgn.thirteen.util.NameGenerator;\nimport org.slf4j.Logger;\nimport\
  \ org.slf4j.LoggerFactory;\nimport java.time.LocalDate;\nimport static com.apress.bgn.thirteen.util.NameGenerator.RND;\n\
  public class InfiniteSingerGenerator {\nprivate static final Logger LOGGER = LoggerFactory.getLogger(InfiniteSingerGenerator.class);\n\
  private static final NameGenerator nameGenerator = new NameGenerator();\nvoid main()\
  \ {\nwhile (true) {\ngenSinger();\n}\n}\nprivate static void genSinger() {\nSinger\
  \ s = new Singer(nameGenerator.genName(), RND.nextDouble(), LocalDate.now());\n\
  LOGGER.info(\"JVM created: {}\", s.getName());\n}\n}\n代码清单 13-8\n生成无限数量 Singer 实例的类\n\
  ```\n\n即使不知道 `NameGenerator` 或 `Singer` 类是什么样的，代码清单 13-8 中代码执行的操作也应该是显而易见的。`main`\
  \ 方法在一个无限循环中调用 `genSinger()` 方法。这意味着会创建无限的 `Singer` 实例。那么会发生什么呢？代码会运行吗？能运行多久？如果你能在脑海中回答这些问题，*我的工作就完成了；你现在可以停止阅读本书了！*\n\
  \n回想一下，**第****5**章包含了一些表示小程序内存内容的图表。类似地，图 13-4 表示了在代码清单 13-8 的程序执行期间，Java 堆和栈内存可能的样子。\n\
  \n![](img/463938_3_En_13_Fig4_HTML.jpg)\n\n图 13-4\n\n执行 `InfiniteSingerGenerator`\
  \ 类期间的 Java 栈和堆内存\n\n出于显而易见的原因，这里只表示了一次 `genSinger()` 调用和一个 `Singer` 实例。如你所见，当调用\
  \ `main(..)` 方法时，会创建对静态实例的引用；这些引用在程序执行结束之前都与其相关。然后，调用 `genSinger()` 方法。这些方法中的每一个都有自己的栈，用于保存对该方法上下文中创建的对象的引用，在本例中是\
  \ `Singer` 实例。此引用仅用于打印在此方法主体中创建的 `Singer` 实例的名称。然后该方法结束，但不返回引用。这意味着创建的实例不再需要，因为它仅在此方法的上下文中使用。\n\
  \n当 `genSinger()` 方法执行结束时，对 `Singer` 的引用会从栈中丢弃。`Singer` 实例仍然存在于堆内存中，但无法再从程序中访问，因此它不再为程序所需。它现在只是占用一个内存块，其中包含其自身内容及其对其他实例的引用，在本例中是一个\
  \ `String`、一个 `Double` 和一个 `LocalDate`。\n\n考虑到 `genString()` 被调用了无限次（在图 13-4 中用\
  \ `(*n)` 表示），将会创建更多的 `Singer` 实例。它们会持续占用内存，并且程序在某个时刻将无法创建其他实例，因为将没有更多可用内存。\n\n这就是垃圾回收器发挥作用的地方。那些不再被程序引用、因此不可达的\
  \ `Singer` 实例被视为垃圾（现在你知道这个名字的由来了），因为它们不再需要，并且可以安全地清理内存。GC 是一个与主执行线程并行运行的清理线程，它会不时地开始删除堆内存中未被引用的对象。并且由于\
  \ `finalize()` 方法仍然可用，我们将为 `Singer` 类型重写它，以打印一条日志消息，这样我们就可以直接在控制台中看到垃圾回收器何时销毁一个实例，因为在此之前我们会调用\
  \ `finalize()` 方法。代码清单 13-9 中的代码片段描述了我们 `Singer` 实例。\n\n```\npackage com.apress.bgn.thirteen;\n\
  import org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\nimport java.time.LocalDate;\n\
  import java.util.Objects;\npublic class Singer {\nprivate static final Logger LOGGER\
  \ = LoggerFactory.getLogger(Singer.class);\nprivate static final long serialVersionUID\
  \ = 42L;\nprivate final long birthtime;\nprivate String name;\nprivate Double rating;\n\
  private LocalDate birthDate;\npublic Singer(String name, Double rating, LocalDate\
  \ birthDate) {\nthis.name = name;\nthis.rating = rating;\nthis.birthDate = birthDate;\n\
  this.birthtime = System.nanoTime();\n}\n// 部分代码已省略\n@Override\nprotected void finalize()\
  \ throws Throwable {\ntry {\nlong deathtime = System.nanoTime();\nlong lifespan\
  \ = (deathtime - birthtime) / 1_000_000_000;\nLOGGER.info(\"GC Destroyed: {} after\
  \ {} seconds\", name, lifespan);\n} finally {\nsuper.finalize();\n}\n}\n}\n代码清单\
  \ 13-9\n重写了 finalize() 方法的 Singer 类\n```\n\n添加 `birthtime` 字段只是为了能够计算从调用实例的构造函数到垃圾回收器调用\
  \ `finalize()` 方法之间经过的时间。由于时间以纳秒为单位，我们将差值除以 10 的 9 次方，以秒为单位获取时间。\n\n本节使用的代码示例给垃圾回收器带来了大量工作，因为每个创建的\
  \ `Singer` 实例在被丢弃之前都只被使用了很短的时间。如果你运行代码，你会在控制台中看到大量日志消息：首先是大量关于对象被创建的消息，然后，如果你等待几秒钟，会看到关于对象被丢弃的消息。所有输出都定向到一个文件，因为\
  \ IntelliJ IDEA 控制台基于一个会不时重置的缓冲区，以防止编辑器崩溃。你必须手动停止程序，因为 `while (true)` 永远不会结束，因为它的条件永远不会计算为\
  \ `false`。停止程序后，你会注意到以下位置的日志文件：`/chapter13/out/gc.log`。如果没有，请修改此类的 IntelliJ IDEA\
  \ 启动器并添加以下 VM 选项：\n\n```\n-Dlogback.configurationFile=chapter13/src/main/resources/logback.xml\n\
  ```\n\n然后，再次运行它。\n\n`gc.log` 的内容应该与代码清单 13-10 中所示的代码片段非常相似。\n\n\n\n```\nINFO  c.a.b.t.InfiniteSingerGenerator\
  \ - JVM created: Kygsmwslzpfsrso\nINFO  c.a.b.t.InfiniteSingerGenerator - JVM created:\
  \ Uuiyihrmq gohll\nINFO  c.a.b.t.InfiniteSingerGenerator - JVM created: Elpeyhru\
  \ eizdpc\nINFO  c.a.b.t.InfiniteSingerGenerator - JVM created: Jlblklupwdkyvkw\n\
  INFO  c.a.b.t.Singer - GC Destroyed: Agzdgjwvrzeerzw after 0 seconds\nINFO  c.a.b.t.InfiniteSingerGenerator\
  \ - JVM created: Fzgcnjrqqykvjab\nINFO  c.a.b.t.Singer - GC Destroyed: Jyyfhkzagazyiny\
  \ after 0 seconds\nINFO  c.a.b.t.InfiniteSingerGenerator - JVM created: Lydeqzjbgcamrfz\n\
  INFO  c.a.b.t.InfiniteSingerGenerator - JVM created: Mgogeuokjbrgwaa\nINFO  c.a.b.t.Singer\
  \ - GC Destroyed: Bzwwqkdeykcpefs after 0 seconds\nINFO  c.a.b.t.InfiniteSingerGenerator\
  \ - JVM created: Ieczaazifjehhkv\nINFO  c.a.b.t.Singer - GC Destroyed: Zlzoaufqzymepko\
  \ after 0 seconds\nINFO  c.a.b.t.InfiniteSingerGenerator - JVM created: Q bmeugibk\
  \ eezo\nINFO  c.a.b.t.Singer - GC Destroyed: Lqzdgeqqguitbgg after 1 seconds\nINFO\
  \  c.a.b.t.Singer - GC Destroyed: Ddpzqlbiryelzvr after 1 seconds\nINFO  c.a.b.t.Singer\
  \ - GC Destroyed: Ozkzfubi  vpmj  after 1 seconds\nINFO  c.a.b.t.InfiniteSingerGenerator\
  \ - JVM created: Uegz isigjcrlfj\n...\n清单 13-10\ngc.log 文件显示类 Singer 中的 finalize()\
  \ 方法被调用\n```\n\n当你拿到这个文件后，可以打开它并开始分析其内容，但由于 IntelliJ IDEA 可能无法打开如此大的文件，请尝试使用专门的文本编辑器（如\
  \ Notepad++ 或 Sublime）打开。或者，如果你使用的是 Unix/Linux 操作系统，只需打开控制台并使用 `grep` 命令，如下所示：\n\
  \n```\ngrep -a 'seconds' gc.log\n```\n\n这将显示调用 `finalize()` 方法时打印的所有日志条目。然后你可以选择一个实例的名称，并执行类似以下的操作：\n\
  \n```\n❯ grep -a 'Fmsnwrtbuldmnjs' gc.log\nINFO  c.a.b.t.InfiniteSingerGenerator\
  \ - JVM created: Fmsnwrtbuldmnjs\nINFO  c.a.b.t.Singer - GC Destroyed: Fmsnwrtbuldmnjs\
  \ after 1 seconds\n```\n\n如你所见，`Singer` 实例从堆中被删除所需的时间各不相同，这是因为 GC 是随机调用的；开发者无法控制它。有一种方法可以显式请求执行垃圾回收……嗯，有两种方法。你可以调用\
  \ `System.gc()` 或 `Runtime.getRuntime().gc()`。请注意，`System.gc()` 实际上会调用 `Runtime.getRuntime().gc()`。\n\
  \n不过，这并不意味着 GC 会立即开始清理内存。这更像是向 JVM 建议，它应该努力回收未使用的对象并释放未使用的内存，因为这是必要的。\n\n现在，回到 `finalize()`\
  \ 方法。前面提到，它在 Java 9 中被标记为已弃用。此方法旨在由处理堆外存储资源的类进行重写。这里最明显的例子是 I/O 处理类，用于读取文件、URL 和数据库等资源。当运行应用程序中的任何活动线程都无法再访问某个对象时，JVM\
  \ 会调用 `finalize()` 方法。这是为了确保这些资源已被释放，可供其他外部和不相关的程序使用。\n\n信息\n\n在旧版本的 Apache Tomcat（一个基于\
  \ Java 的 Web 服务器）中，Windows 上存在一个与资源释放相关的错误。当服务器崩溃或被强制停止时，它无法再次启动，因为其某些日志文件处理程序未能正确释放，新的服务器实例无法访问它们来开始写入新的日志条目*。（这是很久以前我在\
  \ Windows 上使用 Apache Tomcat 时，根据个人经验观察到的。）*\n\n随着 JDK 7 中 `java.lang.AutoCloseable`\
  \ 接口的引入，`finalize()` 方法的使用越来越少。前面已经提到了此方法的一些问题，但以下列表提供了更多背景信息：\n\n*   JVM 无法保证哪个线程会为任何给定对象调用此方法，因此任何有权访问该对象的线程都可以调用它，这可能导致在对象仍然需要时资源就被释放了。该方法是公开的，因此即使它本应仅由\
  \ GC 线程调用，也可以在代码中显式调用它。\n\n*   如果 `finalize()` 的自定义实现不正确，它可能会抛出异常或无法正确释放资源。\n\n\
  *   `finalize()` 方法应该只由 JVM 调用一次，但这无法得到保证。\n\n*   `finalize()` 调用不会自动链式调用，因此 `finalize()`\
  \ 方法的自定义实现必须始终显式调用超类的 `finalize()` 方法。\n\n*   如前所述，一旦调用了 `finalize()`，就无法阻止该方法执行或撤销其效果，因此你基本上会留下一个指向不再存在的对象的引用。\n\
  \n*   你可能已经意识到，在实现此方法时，开发者拥有很大的自由度，这意味着存在很大的出错空间。\n\n这个列表总结了为什么 Java 中的终结机制存在缺陷，并在\
  \ JDK 9 中被弃用以阻止其使用。不正确的 `finalize()` 实现可能导致以下任何情况：\n\n*   内存泄漏（内存内容未被丢弃）\n*   死锁（资源被两个进程阻塞）\n\
  *   挂起（进程处于无法退出的等待状态）\n\n为了帮助进行内存管理，Java 9 中引入了 `java.lang.ref.Cleaner` 类。在深入探讨之前，我必须向你展示如何以编程方式检查内存的状态。\n\
  \n\n### 堆内存统计\n\n在程序运行时，若要与 JVM 内部进行交互，`Runtime` 类非常有用。正如本章前面所述，可以调用其 `gc()` 方法来建议\
  \ JVM 清理内存；而在前几章中，我们曾使用该类中的方法从 Java 代码启动进程。该类中有三个方法可用于查看分配给 Java 程序的内存状态：\n\n* \
  \  `runtime.maxMemory()` 返回 JVM 在需要时尝试用于堆的最大内存量。该方法返回的值因机器而异，默认设置为机器总 RAM 的四分之一，除非通过\
  \ JVM 选项 `-Xmx` 后跟内存大小来显式设置；例如，`-Xmx8G` 将允许 JVM 最多使用 8GB 内存。\n\n*   `runtime.totalMemory()`\
  \ 返回 JVM 的总内存量。该方法返回的值也因机器而异，并且取决于具体实现，除非通过 JVM 选项 `-Xms` 后跟内存大小来显式设置；例如，`-Xms1G`\
  \ 将告诉 JVM 其堆内存的初始大小应为 1GB。\n\n*   `runtime.freeMemory()` 返回 Java 虚拟机空闲内存量的近似值。使用\
  \ `runtime.totalMemory()` 和 `runtime.freeMemory()` 方法，我们可以编写一些代码来检查程序执行过程中不同时间点占用的内存量。为此，创建了一个名为\
  \ `MemAudit` 的类，它将使用当前的日志记录器来打印内存值。该类的实现如代码清单 13-11 所示。\n\n```\npackage com.apress.bgn.thirteen.util;\n\
  import org.slf4j.Logger;\npublic class MemAudit {\nprivate static final long MEGABYTE\
  \ = 1024L * 1024L;\nprivate static final Runtime runtime = Runtime.getRuntime();\n\
  public static void printBusyMemory(Logger log) {\nlong memory = runtime.totalMemory()\
  \ - runtime.freeMemory();\nlog.info(\"Occupied memory: {} MB\", (memory / MEGABYTE));\n\
  }\npublic static void printTotalMemory(Logger log) {\nlog.info(\"Total Program memory:\
  \ {} MB\", (runtime.totalMemory()/MEGABYTE));\nlog.info(\"Max Program memory: {}\
  \ MB\", (runtime.maxMemory()/MEGABYTE));\n}\n}\n代码清单 13-11\n展示 Java 应用程序执行期间内存统计信息的\
  \ MemAudit 类\n```\n\n该类的这些方法将在程序执行过程中被调用，如代码清单 13-12 所示。\n\n```\npackage com.apress.bgn.thirteen;\n\
  // 省略部分导入语句\nimport static com.apress.bgn.thirteen.util.MemAudit.*;\npublic class\
  \ MemAuditDemo {\nprivate static final Logger LOGGER = LoggerFactory.getLogger(MemAuditDemo.class);\n\
  private static NameGenerator nameGenerator = new NameGenerator();\npublic static\
  \ void main(String... args) {\nprintTotalMemory(LOGGER);\nint count = 0;\nwhile\
  \ (true) {\ngenSinger();\ncount++;\nif (count % 1000 == 0) {\nprintBusyMemory(LOGGER);\n\
  }\n}\n}\nprivate static void genSinger() {\nSinger s = new Singer(nameGenerator.genName(),\
  \ RND.nextDouble(), LocalDate.now());\nLOGGER.info(\"JVM created: {}\", s.getName());\n\
  }\n}\n代码清单 13-12\nMemAuditDemo 类使用代码清单 13-11 中的类在控制台打印内存统计信息\n```\n\n删除旧的日志文件后，我们应该运行这个类并让它运行一段时间。由于无法直接看到输出，以下命令\n\
  \n```\ngrep -a 'memory' gc.log\n```\n\n可用于提取所有包含单词“memory”的行，结果应与代码清单 13-13 中的内容非常相似。\n\
  \n```\n$  grep -a 'memory' gc.log\nINFO  c.a.b.t.MemAuditDemo - Total Program memory:\
  \ 260 MB # \nINFO  c.a.b.t.MemAuditDemo - Max Program memory: 4096 MB  # \nINFO\
  \  c.a.b.t.MemAuditDemo - Occupied memory: 21 MB       # \nINFO  c.a.b.t.MemAuditDemo\
  \ - Occupied memory: 7 MB        # \nINFO  c.a.b.t.MemAuditDemo - Occupied memory:\
  \ 12 MB\n...\nINFO  c.a.b.t.MemAuditDemo - Occupied memory: 98 MB\nINFO  c.a.b.t.MemAuditDemo\
  \ - Occupied memory: 104 MB\n...\n代码清单 13-13\nJava 应用程序执行期间 MemAudit 类中的方法打印的内存统计信息\n\
  ```\n\n最大内存为 4096MB，这意味着我的机器总共有 16GB 的 RAM，而占用的内存很小，甚至远未达到 JVM 初始分配的 260MB。如果我们想看到实际占用的内存，可以修改\
  \ `genSinger()` 方法，使其返回创建的引用并将它们添加到一个列表中。由于 `Singer` 实例在主类中被引用，内存将不再被清空。前面提到的修改如代码清单\
  \ 13-14 所示。\n\n```\npackage com.apress.bgn.thirteen;\n// 省略部分导入语句\nimport static\
  \ com.apress.bgn.thirteen.util.MemAudit.*;\npublic class MemoryConsumptionDemo {\n\
  private static final Logger LOGGER = LoggerFactory.getLogger(MemoryConsumptionDemo.class);\n\
  private static NameGenerator nameGenerator = new NameGenerator();\npublic static\
  \ void main(String... args) {\nprintTotalMemory(LOGGER);\nList singers = new ArrayList();\n\
  IntStream.range(0, 1_000_000).forEach(i -> {\nsingers.add(genSinger());\nif (i %\
  \ 1000 == 0) {\nprintBusyMemory(LOGGER);\n}\n});\n}\nprivate static Singer genSinger()\
  \ {\nSinger s = new Singer(nameGenerator.genName(), RND.nextDouble(), LocalDate.now());\n\
  LOGGER.info(\"JVM created: {}\", s.getName());\nreturn s;\n}\n}\n代码清单 13-14\n将 Singer\
  \ 实例保存到列表中，以避免它们被 GC 回收并清空内存\n```\n\n运行代码清单 13-14 中的程序后，我们实际上可以看到内存使用量逐渐增加。通过 `grep`\
  \ 过滤后的日志将显示，程序会一直占用内存直到结束，因为现在引用被保存到了 `List<Singer>` 实例中，如代码清单 13-15 所示。\n\n```\n\
  $ grep -a 'memory' gc.log\nINFO  c.a.b.t.MemoryConsumptionDemo - Total Program memory:\
  \ 260 MB\nINFO  c.a.b.t.MemoryConsumptionDemo - Max Program memory: 4096 MB\nINFO\
  \  c.a.b.t.MemoryConsumptionDemo - Occupied memory: 14 MB\nINFO  c.a.b.t.MemoryConsumptionDemo\
  \ - Occupied memory: 17 MB\nINFO  c.a.b.t.MemoryConsumptionDemo - Occupied memory:\
  \ 19 MB\nINFO  c.a.b.t.MemoryConsumptionDemo - Occupied memory: 22 MB\n...\nINFO\
  \  c.a.b.t.MemoryConsumptionDemo - Occupied memory: 99 MB\nINFO  c.a.b.t.MemoryConsumptionDemo\
  \ - Occupied memory: 101 MB\nINFO  c.a.b.t.MemoryConsumptionDemo - Occupied memory:\
  \ 104 MB\n...\nINFO  c.a.b.t.MemoryConsumptionDemo - Occupied memory: 474 MB\nINFO\
  \  c.a.b.t.MemoryConsumptionDemo - Occupied memory: 477 MB\n代码清单 13-15\nJava 应用程序执行期间（实例保存到列表中）MemAudit\
  \ 类中的方法打印的内存统计信息\n```\n\n由于我们每 1000 步打印一次占用的内存，可以得出结论：1000 个 `Singer` 实例大约占用 2MB。前面的代码不再使用无限循环来生成实例；如果使用无限循环，程序最终会突然崩溃，抛出以下异常：\n\
  \n```\nException in thread \"main\" java.lang.OutOfMemoryError: Java heap space\n\
  at chapter.thirteen/com.apress.bgn.thirteen.MemoryConsumptionDemo\n.genSinger(MemoryConsumptionDemo.java:64)\n\
  at chapter.thirteen/com.apress.bgn.thirteen.MemoryConsumptionDemo\n.main(MemoryConsumptionDemo.java:55)\n\
  ```\n\n还记得 `runtime.maxMemory()` 方法返回的值吗？在我的机器上，它是 4096MB。如果我在控制台中查看，就在刚刚描述的异常之前，我看到的是：\n\
  \n\n\n```\nINFO c.a.b.c.MemoryConsumptionDemo - Occupied memory: 4094 MB\nINFO c.a.b.c.MemoryConsumptionDemo\
  \ - Occupied memory: 4094 MB\nINFO c.a.b.c.MemoryConsumptionDemo - Occupied memory:\
  \ 4095 MB\nINFO c.a.b.c.MemoryConsumptionDemo - Occupied memory: 4095 MB\nINFO c.a.b.c.MemoryConsumptionDemo\
  \ - Occupied memory: 4095 MB\n```\n\n因此，JVM 正努力创建另一个 `Singer` 实例，但已经没有剩余内存了。异常发生前打印的最后一个值是\
  \ `4095MB`，比 `4096MB`（JVM 允许使用的最大内存量）少了 1MB。所以，可怜的 JVM 因为堆内存耗尽而崩溃了。如果程序以这种方式结束，问题总是出在解决方案的设计上。JVM\
  \ 的总内存和最大内存值也会影响 GC 的行为。之前介绍的 `-Xms` 和 `-Xmx` 选项非常重要，因为它们决定了堆内存的初始大小和最大大小。配置得当可以提升性能，但使用不合适的值则会产生负面影响。例如，切勿将堆的初始大小设置得过小。如果没有足够的空间容纳应用程序创建的所有对象，JVM\
  \ 就必须分配更多内存，基本上会在程序执行期间反复重建堆。因此，如果在应用程序运行期间发生几次这种情况，整体耗时就会受到影响。堆的最大大小至关重要：分配过少会导致应用程序崩溃；分配过多则可能妨碍其他程序运行。通常需要通过反复实验来确定这些值，从\
  \ JDK 11 开始，新的 Epsilon 垃圾收集器非常适合用于此目的。\n\n如果你想了解更多关于 GC 调优的知识，通常最好的文档是官方文档^(¹³¹)。\n\
  \n现在你已经了解了 GC 的功能，让我们看看其他自定义其行为的方法，以避免出现问题。\n\n### 使用 `Cleaner`\n\n目前尚不清楚 `finalize()`\
  \ 方法何时会从 JDK 中移除，但如果你想避免使用它，有几种选择。你可以开发一些类来实现 `java.lang.AutoCloseable`，为 `close()`\
  \ 方法提供实现，然后确保在 `try-with-resources` 语句中使用你的对象。\n\n如果你想避免实现 `AutoCloseable` 接口，可以使用\
  \ `java.lang.ref.Cleaner` 对象。你可以实例化这个类，并将对象连同当每个对象被垃圾收集器丢弃时要执行的操作一起注册到其中。使用 `Cleaner`\
  \ 实例，清单 13-9 中的代码可以写成代码清单 13-16 所示的样子：\n\n```\npackage com.apress.bgn.thirteen.cleaner;\n\
  // 省略了一些导入语句\nimport java.lang.ref.Cleaner;\npublic class CleanerDemo {\nprivate\
  \ static final Logger LOGGER = LoggerFactory.getLogger(CleanerDemo.class);\npublic\
  \ static final Cleaner cleaner = Cleaner.create();\nprivate static NameGenerator\
  \ nameGenerator = new NameGenerator();\npublic static void main(String... args)\
  \ {\nprintTotalMemory(LOGGER);\nint count = 0;\nfor (int i = 0; i  {\nvar s = new\
  \ String[10_000];\ntry {Thread.sleep(1);} catch (InterruptedException _) {}\n});\n\
  }\nprivate static Cleaner.Cleanable genActor() {\nActor a = new Actor(nameGenerator.genName(),\
  \ LocalDate.now());\nLOGGER.info(\"JVM created: {}\", a.getName());\nCleaner.Cleanable\
  \ handle = cleaner.register(a, new ActorRunnable(a.getName(), LOGGER));\nreturn\
  \ handle;\n}\nstatic class ActorRunnable implements Runnable {\nprivate final String\
  \ actorName;\nprivate final Logger log;\npublic ActorRunnable(String actorName,\
  \ Logger log) {\nthis.actorName = actorName;\nthis.log = log;\n}\n@Override\npublic\
  \ void run() {\nlog.info(\"GC Destroyed: {} \", actorName);\n}\n}\n}\n清单 13-16\n\
  使用 Cleaner 实例\n```\n\n为了方便你浏览代码，由于所有这些源代码都属于同一个项目，清单 13-16 使用了一个模拟 `Actor` 的类，而不是\
  \ `Singer`，但不用担心，实现非常相似。\n\n`Cleaner` 实例有一个名为 `register(..)` 的方法，调用该方法可以注册当对象被清理时要执行的操作。要执行的操作被指定为一个\
  \ `Runnable` 实例，在本例中，我决定通过实现 `Runnable` 来创建一个类 `ActorRunnable`，这样我们就可以将要销毁的对象名称保存到一个字段中，而无需实际保留对要销毁对象的引用；否则，在程序执行期间，GC\
  \ 将不会使用 `Cleaner.Cleanable` 句柄，因为该对象看起来好像仍然有对它的引用。\n\n`cleaner.register(..)` 方法返回一个\
  \ `Cleaner.Cleanable` 类型的实例，可以通过调用 `clean()` 方法来显式执行该操作。当对象不再被使用并从内存中删除时，JVM 会调用此方法。如果你运行清单\
  \ 13-16 中的代码，打印的日志将与清单 13-17 中的日志非常相似。\n\n```\nINFO  c.a.b.t.c.CleanerDemo - Total\
  \ Program memory: 516 MB\nINFO  c.a.b.t.c.CleanerDemo - Max Program memory: 8192\
  \ MB\nINFO  c.a.b.t.c.CleanerDemo - JVM created: Nuyktryvtkewiwd\nINFO  c.a.b.t.c.CleanerDemo\
  \ - JVM created: Brqivlsbvmteihz\nINFO  c.a.b.t.c.CleanerDemo - JVM created: Qzvopg\
  \ ophjcyho\n...\nINFO  c.a.b.t.c.CleanerDemo - Occupied memory: 14 MB\nINFO  c.a.b.t.c.CleanerDemo\
  \ - JVM created: Jrliwbjadztvwdm\nINFO  c.a.b.t.c.CleanerDemo - JVM created: Evdteelpzinfcfh\n\
  INFO  c.a.b.t.c.CleanerDemo - JVM created: Hozfatszogfvzfz\n...\nINFO  c.a.b.t.c.CleanerDemo\
  \ - GC Destroyed: Giqojswtuqzs s\nINFO  c.a.b.t.c.CleanerDemo - GC Destroyed: Lzdjorokvyzwdu\n\
  INFO  c.a.b.t.c.CleanerDemo - JVM created: Igmzjiypo ttkzw\nINFO  c.a.b.t.c.CleanerDemo\
  \ - JVM created: Ljmksqzhzzhuzwl\nINFO  c.a.b.t.c.CleanerDemo - Occupied memory:\
  \ 8 MB\n...\n清单 13-17\n使用 Cleaner 实例释放内存的执行过程打印的日志\n```\n\n因此，获得了与使用 `finalize()`\
  \ 相同的结果，但无需实现一个已弃用的方法。\n\n提示\n\n从这里可以学到的一个良好实践是，如果你使用 Java 9+ 编写应用程序，请避免使用 `finalize()`，因为该方法显然正在被移除的路上。请改用\
  \ `Cleaner`，这样在升级应用程序使用的 Java 版本时，你可能会少一些麻烦。\n\n\n\n## 防止 GC 删除对象\n\n在前两节中，我们重点关注了符合垃圾回收条件的对象。在应用程序中，有些对象在程序运行期间不应被丢弃，因为它们是必需的（例如，需要在内存中保存庞大字典的翻译应用程序）。在我们的类中，那些只在执行结束时才被丢弃的最明显的引用是静态字段，并且它们是\
  \ final 类型的，因此无法重新初始化：\n\n```\nprivate static final Logger log = LoggerFactory.getLogger(CleanerDemo.class);\n\
  public static final Cleaner cleaner = Cleaner.create();\nprivate static NameGenerator\
  \ nameGenerator = new NameGenerator();\n```\n\n然而，这些静态值的问题在于它们会占用内存。如果你的应用程序使用了一个大的\
  \ `Map<K,V>`，其中包含一个甚至在应用程序启动时都不一定需要的字典，那该怎么办？为了解决这个问题，你可以使用**单例**设计模式。**单例**模式是一种特定的类设计，它确保该类在程序执行期间只会被实例化*一次*。这是通过隐藏构造函数（将其声明为\
  \ private）并声明一个类类型的静态引用以及一个返回该引用的静态方法来实现的。根据**单例**模式编写类的方法不止一种，但最常见的方式如代码清单 13-18\
  \ 所示。\n\n```\npackage com.apress.bgn.thirteen.util;\n// 省略了一些导入语句\npublic class\
  \ SingletonDictionary {\npublic static final Cleaner cleaner = Cleaner.create();\n\
  private static final Logger LOGGER = LoggerFactory.getLogger(SingletonDictionary.class);\n\
  private static final SingletonDictionary instance = new SingletonDictionary();\n\
  private Map dictionary = new HashMap();\nprivate SingletonDictionary() {\n// 初始化字典\n\
  LOGGER.info(\"开始创建字典: {}\", System.currentTimeMillis());\nfinal NameGenerator keyGen\
  \ = new NameGenerator(20);\nfinal NameGenerator valGen = new NameGenerator(200);\n\
  IntStream.range(0, 100_000).forEach(_ -> dictionary.put(keyGen.genName(), valGen.genName()));\n\
  LOGGER.info(\"字典创建完成: {}\", System.currentTimeMillis());\n}\npublic synchronized\
  \ static SingletonDictionary getInstance(){\nreturn instance;\n}\n}\n代码清单 13-18\n\
  SingletonDictionary 类\n```\n\n代码清单 13-18 中的代码模拟了一个包含 100,000 条条目的字典，所有条目均由 `NameGenerator`\
  \ 类的修改版本生成。在其构造函数中打印了日志消息，以便在实例创建时能清晰可见。关于**单例**模式，你必须记住四点：\n\n*   构造函数必须是私有的，因为它不应在类外部被调用。\n\
  *   该类必须包含一个对其自身类型对象的静态引用，该引用可以通过调用私有构造函数在原地进行初始化。\n*   必须定义一个方法来获取此实例，因此该方法必须是静态的。\n\
  *   获取静态实例的方法也必须是同步的，这样就不会有两个线程同时调用它并访问该实例，因为**单例**模式的核心思想是允许该类在程序执行期间仅被实例化一次，并确保不允许并发访问，因为这可能导致意外行为。有多种初始化和使用**单例**的方法，如果你对细节感兴趣，可以自行研究。\n\
  \n在**单例**类中，会创建一个对实例的静态引用，这个静态引用会阻止垃圾回收器在程序执行期间清理该实例。这是因为静态引用是一个类变量，而类是 GC 最后删除的对象，通常是在程序执行接近尾声时。为了测试这一点，我们将编写一个主类，它声明一个\
  \ `Cleaner` 实例，并为 `SingletonDictionary` 实例注册一个 `Cleanable`。main 方法将创建大量 `String`\
  \ 数组来填满内存，试图说服 GC 删除 `SingletonDictionary` 实例，我们甚至将其自身的引用设置为 `null`，如代码清单 13-19\
  \ 所示。\n\n```\npackage com.apress.bgn.thirteen;\n// 省略了导入语句\npublic class SingletonDictionaryDemo\
  \ {\npublic static final Cleaner cleaner = Cleaner.create();\nprivate static final\
  \ Logger LOGGER = LoggerFactory.getLogger(SingletonDictionaryDemo.class);\nvoid\
  \ main() {\nLOGGER.info(\"测试 SingletonDictionary...\");\n// 用 String 数组填充内存以强制 GC\n\
  IntStream.range(0, 10_000).forEach(_ -> {\nvar s = new String[10_000];\ntry {Thread.sleep(1);}\
  \ catch (InterruptedException _) {}\n});\nSingletonDictionary singletonDictionary\
  \ = SingletonDictionary.getInstance();\ncleaner.register(singletonDictionary, ()->\
  \ LOGGER.info(\"字典已被清理！\"));\n// 我们删除引用\nsingletonDictionary = null;\n// 用 String\
  \ 数组填充内存以强制 GC\nIntStream.range(0, 10_000).forEach(_ -> {\nvar s = new String[10_000];\n\
  try {Thread.sleep(1);} catch (InterruptedException _) {}\n});\nLOGGER.info(\"完成。\"\
  );\n}\n}\n代码清单 13-19\nSingletonDictionaryDemo 类\n```\n\n如果我们运行代码清单 13-19 中的代码，并期望在控制台中看到“字典已被清理！”的消息，那将是徒劳的。`SingletonDictionary`\
  \ 中的那个静态引用将不允许 GC 在程序结束前触及该对象。我们在 `SingletonDictionary` 类中拥有的静态引用也被称为强引用，因为它阻止了对象从内存中被丢弃。\n\
  \n\n\n## 垃圾回收异常及其原因\n\n之前提到过，如果对象无法从内存中丢弃，就会抛出 `OutOfMemoryError` 类型的异常。实际上，`OutOfMemoryError`\
  \ 并不继承自 `java.lang.Exception`，因此称其为“异常”并不准确。**第** **4 章** 中提到了异常类的层次结构。该层次结构中包含一个名为\
  \ `java.lang.Error` 的类，它实现了 `java.lang.Throwable`，并且提到当程序出现无法恢复的严重问题时，会抛出这些类型的对象。`java.lang.OutOfMemoryError`\
  \ 类的完整层次结构如下所示：\n\n```\njava.lang.Object\njava.lang.Throwable\njava.lang.Error\n\
  java.lang.VirtualMachineError\njava.lang.OutOfMemoryError\n```\n\n`OutOfMemoryError`\
  \ 实际上是你在程序运行时最不想看到的棘手问题之一，因为这意味着你的程序实际上已经停止运行了。它停止运行的原因是没有剩余内存来存储正在创建的新对象。\n\n当\
  \ JVM 在进行内存管理时出现任何问题，都会抛出此错误。虽然最常见的原因是堆内存耗尽，但也存在其他原因。当分配给 JVM 的堆内存耗尽时，错误会显示以下信息：\n\
  \n```\nException in thread \"main\" java.lang.OutOfMemoryError: Java heap space\n\
  ```\n\n但你可能还会看到另一条信息：\n\n```\nException in thread \"main\" java.lang.OutOfMemoryError:\
  \ GC Overhead Limit Exceeded\n```\n\n这条信息仍然与堆大小有关。当程序的数据勉强适合堆的大小，导致堆几乎已满时，就会抛出带有此信息的错误。此时，GC\
  \ 可以运行，但由于无法回收任何内存，GC 会持续运行，这实际上阻碍了应用程序的正常执行。当 GC 花费了 98% 的执行时间，而应用程序只占用了另外 2% 时，错误信息中会添加此提示。\n\
  \n无论出于何种原因，当 GC 无法正常工作时，这两个是你最常看到的错误信息。完整的列表可以在以下网址找到：[`https://docs.oracle.com/javase/8/docs/technotes/guides/troubleshoot/memleaks002.html`](https://docs.oracle.com/javase/8/docs/technotes/guides/troubleshoot/memleaks002.html)，但由于大多数\
  \ GC 问题都与堆大小有关，G1GC 大多会抛出带有 Java 堆空间信息的错误。\n\n## 总结\n\n这是本书的最后一章（后面还有两个附录）。在 Java\
  \ 生态系统中，互联网上有大量的书籍和教程。本书只是浅尝辄止，为你作为 Java 开发者提供了一个良好的起点，参与本书编写的整个团队希望它能满足你的需求，并激发你进一步探索的好奇心。正如本章明确指出的那样，无论应用程序的范围如何，都没有完美的解决方案来确保内存始终得到正确管理。如果遇到问题，进行实验始终是为你自己的\
  \ JVM 确定合适垃圾回收器的一个步骤。\n\n本章涵盖了以下主题：\n\n*   什么是垃圾回收及其涉及的步骤\n\n*   堆内存是如何结构的\n\n*\
  \   Oracle HotSpot JVM 中可用的多种垃圾回收器类型以及如何在它们之间切换\n\n*   如何列出所有 GC 标志并将其用作 VM 选项\n\
  \n*   如何使用 VM 选项查看 GC 配置和统计信息\n\n*   如何使用 `finalize()` 和 `Cleaner` 查看垃圾回收的实际运行情况\n\
  \n*   如何阻止垃圾回收器回收重要对象\n\n*   如何通过使用软引用来创建易于回收的对象\n\n\n\n脚注 1   2   3   4   5   6\
