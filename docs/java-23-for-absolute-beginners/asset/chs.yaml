  属性名称可以包含特殊字符下划线 (_) 和点 (.) 来分隔各部分。在本节示例中，属性名称很简单，因为数量很少。在大型应用程序中，属性名称通常包含与其用途相关的前缀；例如，如果属性值是标题，则名称会以
