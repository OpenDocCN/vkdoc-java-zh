  \ Java 项目时，你不需要总是从头开始编写所有内容，因为 Java 中有许多公开可用的库和框架，你可以将它们作为依赖项包含在你的项目中并使用它们。Java\
  \ 库是已编译类的集合，可以归档到扩展名为 `jar` 的文件中。当你运行一个引用了库中某个类的类时，你需要告诉 Java 该库的位置。这种做法称为*将库添加到类路径*，通过使用\
