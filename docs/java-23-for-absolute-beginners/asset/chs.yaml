  如果你需要构建更复杂且需要国际化的界面，你将需要配置的不仅仅是翻译。你可能需要包含不同数字和日期格式的文件，或者多个资源包。国际化是一个相当大的话题，也是一个相当重要的话题，因为如今很少有应用程序只为单一区域使用而构建。对于
  Java 初学者来说，仅仅了解支持类是什么以及如何使用它们，就是一个非常好的起点。


  ## 构建 Web 应用程序


  Web 应用程序是一种运行在服务器上，并可以通过浏览器访问的应用程序。直到最近，大多数 Java 应用程序都必须托管在像 Apache Tomcat 或 Eclipse
  GlassFish 这样的 Web 服务器上，或者像 JBoss（现在称为 WildFly）或 Apache TomEE 这样的企业服务器上，才能被访问。你需要使用类文件以及
  HTML 或 Jakarta 服务器页面（JSP）文件来编写 Web 应用程序，将其打包成 WAR（Web 归档）文件或 EAR（企业归档）文件，部署到服务器上，然后启动服务器。服务器会提供应用程序的上下文，并将请求映射到能够提供响应内容的类。假设应用程序部署在
  Tomcat 服务器上，在图 10-13 中，你可以看到已部署应用程序功能的抽象示意图。


  ![](img/463938_3_En_10_Fig13_HTML.jpg)


  图 10-13


  部署在 Apache Tomcat 服务器上的 Web 应用程序


  对 Web 应用程序的请求也可能来自浏览器以外的客户端（例如，移动应用程序），但由于本节主要介绍 Web 应用程序，我们假设所有对应用程序的请求都来自浏览器。


  在构建 Web 应用程序之前，让我们简要解释一个非常重要的事情：互联网。互联网是一个由许多相互连接的计算机组成的信息系统。一些计算机托管着提供应用程序访问的应用服务器，一些计算机访问这些应用程序，还有一些计算机两者都做。这些计算机之间的通信通过网络进行，使用一系列协议：HTTP、FTP、SMTP、POP
  等。最流行的协议是 HTTP（超文本传输协议），它是一种非对称的请求-响应客户端-服务器协议，意味着客户端向服务器发出请求，然后服务器发送响应。后续的请求彼此之间没有关联，也不共享任何状态，因此它们是*无状态的*。


  HTTP 请求可以分为不同类型，根据它们要求服务器上的应用程序执行的操作来分类，但开发人员最常用的有四种类型（即图 10-13 中箭头下“请求”所列出的类型）。我们不会深入探讨请求组件的细节，因为它们与
  Java 关系不大，但我们会介绍足够的细节来理解 Web 应用程序的工作原理。以下列表介绍了四种请求类型（也称为*请求方法*）以及服务器为每种类型返回的响应类型：


  ![](img/463938_3_En_10_Fig14_HTML.jpg)


  图 10-14


  Firefox 中的网络调试器视图


  *   **GET**：每当用户在浏览器中输入 URL（例如 [`https://my-site.com/index.html`](https://my-site.com/index.html)）时，浏览器会将地址转换为请求消息并发送给
  Web 服务器。浏览器的行为可以通过在 **Firefox** 中打开调试器视图，点击 **网络** 选项卡，并尝试访问 [`https://www.google.com/`](https://www.google.com/)
  来轻松查看。在图 10-14 中，你可以看到 Firefox 调试器视图显示了正在请求的 URL 以及请求消息的内容。




  在图片的右侧，你可以看到正在请求的 URL、请求类型（此处为 GET），以及请求发送到的服务器的**远程地址**。GET 请求用于从服务器获取某些内容，在此示例中获取的是一个网页。如果网页能够被找到，服务器会发送响应，其中包含供浏览器显示的页面以及其他属性，例如用于通信一切正常的**状态码**。HTTP
  状态码有很多，但最重要的是 200 状态码，它表示一切正常。在图 10-14 中，你可以看到，为了显示页面，在初始请求得到响应后，还会发出大量额外的请求，并且所有后续请求都成功了，因为服务器返回的状态显示在表格的第一列，且始终是
  200 或 204。


  *   **PUT**：此请求类型用于向服务器发送数据，以更新现有数据。在企业级应用中，PUT 请求被解释为更新现有对象的请求。该请求包含对象的更新版本以及用于标识该对象的方法。成功的
  PUT 请求会生成状态码为 204 的响应。


  *   **POST**：此请求类型用于向服务器发送数据，但服务器被指示同时保存这些数据。与 PUT 请求的区别在于，POST 请求中的数据在服务器上尚不存在。在企业级应用中，POST
  请求用于发送凭据以便对用户进行身份验证，或发送将用于创建新对象的数据。当 POST 请求用于发送凭据时，如果用户通过身份验证，响应状态码为 200；如果用户凭据无效，则状态码为
  401（未授权）。当 POST 请求用于发送待保存的数据时，如果对象创建成功，则返回 201 状态码。


  *   **DELETE**：此请求类型用于指示服务器删除数据。如果一切正常，响应码为 200；如果出现问题，则会发送与原因相关的错误码。


  还有一些其他 HTTP 方法用于更复杂的应用程序。如果你想了解更多关于请求方法、状态码以及 HTTP 基础知识，我强烈建议你查看这个教程^(⁹⁷)。现在，让我们回到编写
  Java Web 应用程序的话题上。


  如前所述，直到不久前，我们还需要一个服务器来托管 Web 应用程序。但从几年前开始，情况已不再如此。正如为了测试目的而用嵌入式数据库替换数据库和功能最简的应用程序一样，Web
  服务器也经历了同样的变化。如果你想快速编写一个简单的 Web 应用程序，现在可以选择使用嵌入式服务器，例如 Java 18 中引入的 Simple Web Server、Eclipse
  Jetty 或 Apache Tomcat Embedded。使用嵌入式服务器支持复杂页面相当困难，但嵌入式服务器通常用于只需要简单 REST API 的微服务。接下来的章节将浅谈如何构建
  Java Web 应用程序。


  ### 简单应用服务器


  Java 18 通过 JEP 408^(⁹⁸) 引入了 Simple Web Server，这是一个最小的 HTTP 静态文件服务器。它可以作为命令行工具使用，用于启动一个仅提供静态文件的最小
  Web 服务器；不支持 Servlet 和 JSP 页面。它仅通过 HTTP/1.1 提供静态文件服务；不支持动态内容和其他 HTTP 版本。引入它的目的是为了让
  JDK 对初学者开发者更友好。


  Simple Web Server 的工作方式可以总结如下：


  *   它服务于单个目录层次结构，并且仅通过 HTTP/1.1 提供静态文件服务。

  *   如果请求的资源是一个文件，则提供其内容。

  *   如果目录包含索引文件，则提供索引文件的内容。如果没有，则列出目录的内容。

  *   它仅支持 `HEAD` 和 `GET` 请求方法；任何其他请求都会收到 `501 - 未实现` 或 `405 - 不允许` 的响应。


  本节将首先向你展示如何使用 `jwebserver` 命令行工具，然后介绍如何从你的 Java 代码创建和自定义服务器实例。




  #### `jwebserver` 命令行工具


  按照**第** **2** **章**的说明设置好 Java 开发系统后，所有 JDK 二进制文件都应位于系统路径中。因此，如果你打开终端并运行 `jwebserver
  –help`，你将看到启动一个简单 Web 服务器的所有可用选项，如代码清单 10-25 所示。


  ```

