- "# 11. 处理文件\n\n软件最重要的功能之一是组织和存储信息，目的是使用和共享信息。传统的（且正在消退的）组织和存储信息的方式是将其写在纸上，并将纸张存放在有组织的文件柜中，以便在需要时检索。软件应用程序做着类似的事情：信息被写入文件，文件被组织在目录中，在大多数情况下，数据存储在更复杂的结构中，称为数据库。Java\
  \ 提供了从文件和数据库读取信息的类，以及写入文件和向数据库写入信息的类。数据库在前面的章节中已经提到过，**第** **9** **章**介绍了一个使用 Apache\
  \ Derby 内存数据库的简单示例，向您展示了如何模拟像数据库这样的重量级依赖项以允许进行单元测试。本章不涉及使用数据库，因为编写使用数据库的 Java 应用程序是一个高级主题，并且需要您安装额外的软件。相反，本章重点介绍读取和写入文件以及实现此目的的多种方法。\n\
  \n\n\n## Java IO 与 NIO API\n\n在开始展示如何读写文件之前，我们需要先展示如何从代码中访问文件、检查文件是否存在、查看文件大小以及列出文件属性等。Java\
  \ 中用于文件处理的核心包名为 `java.io`^(¹⁰³) 和 `java.nio`^(¹⁰⁴)。这两个包名很好地暗示了它们所包含的组件：\n\n*   `java.io`\
  \ 基本上是 Java 输入/输出（Java input/output）的缩写。该包汇集了旨在通过数据流和序列化来简化文件系统访问的输入输出操作组件。\n\n\
  *   `java.nio` 基本上是 Java 非阻塞输入/输出（Java nonblocking input/output）的缩写。该包在 1.4 版本中引入，是一组\
  \ Java 编程语言 API 的集合，提供了用于密集型 I/O 操作的功能。JDK 7 中新增的 `java.nio.file` 包包含了一系列实用类，为文件\
  \ I/O 和文件系统访问提供了全面支持。\n\nJava IO 与 Java NIO 的主要区别在于，Java IO 是面向流的，而 Java NIO 是面向缓冲区的。这意味着，使用旧的\
  \ Java IO API 时，文件是从流中一次读取一个或多个字节。字节不会在任何地方缓存，并且流的遍历是单向的。一旦流被耗尽，就无法再次遍历它。如果需要双向遍历流，则必须先将数据存储在缓冲区中。\n\
  \n使用 Java NIO API 时，数据被直接读取到缓冲区中，这意味着字节被缓存在缓冲区中，并且缓冲区支持双向操作。这为处理过程提供了更大的灵活性，但需要额外的检查来确保缓冲区包含处理所需的所有数据。\n\
  \n第二个主要区别在于，Java IO 操作是阻塞的。一旦调用了读取或写入文件的方法，线程就会被阻塞，直到没有更多数据可读或数据被完全写入。\n\nJava NIO\
  \ 操作是非阻塞的。一个线程可以通过一个打开的通道从资源（例如文件）请求数据，并且只获取当前可用的数据，如果当前没有可用数据，则什么也得不到。线程不必等待数据到来，而是可以继续执行其他操作，稍后再检查数据缓冲区是否已被填充。\n\
  \n第三个区别与其说是区别，不如说是 Java NIO 额外拥有的特性：**选择器**。这些组件允许一个线程监控多个输入通道，并只选择那些有可用数据的通道进行处理。相比之下，经典的\
  \ Java IO API 无法拥有选择器，因为线程会一直阻塞直到文件操作完成。\n\n根据你要解决的问题，你可以选择使用其中一种 API，但一切都要从**文件处理器**开始。\n\
  \n## 文件处理器\n\n在 Java 中处理文件时最重要的类是 `java.io.File`，它是文件和目录路径名的抽象表示。该类的实例被称为**文件处理器**，因为它们允许开发者在\
  \ Java 代码中使用这种类型的引用来处理文件和目录，而不是使用完整的路径名。可以使用不同的参数来创建 `File` 实例。\n\n创建 `File` 实例最简单的方法是使用构造函数，该构造函数接收一个包含绝对文件路径名的\
  \ `String` 值作为参数。在清单 11-1 的代码示例中，`printFileStats(..)` 方法用于打印文件详细信息。\n\n```\npackage\
  \ com.apress.bgn.eleven;\nimport org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\n\
  import java.io.File;\npublic class Main {\nprivate static final Logger LOGGER =\
  \ LoggerFactory.getLogger(Main.class);\nvoid main() {\n// 将 [workspace] 替换为你的工作区路径\n\
  var file = new File(\"[workspace]/java-23-for-absolute-beginners/README.adoc\");\n\
  printFileStats(file);\n}\nprivate static void printFileStats(File f) {\nif (f.exists())\
  \ {\nLOGGER.info(\"文件详细信息:\");\nLOGGER.info(\"\\t 名称 : {}\", f.getName());\nLOGGER.info(\"\
  \\t 父目录 :{}\", f.getParent());\nLOGGER.info(\"\\t 类型 : {}\", f.isFile() ? \"文件\"\
  \ : \"目录或符号链接\");\nLOGGER.info(\"\\t 位置 :{}\", f.getAbsolutePath());\ndouble kilobytes\
  \ = f.length() / (double)1024;\nLOGGER.info(\"\\t 大小 : {} \", kilobytes);\nLOGGER.info(\"\
  \\t 是否隐藏 : {}\", f.isHidden());\nLOGGER.info(\"\\t 是否可读? : {}\", f.canRead());\n\
  LOGGER.info(\"\\t 是否可写? : {}\", f.canWrite());\n} else {\nerr.println(\"文件不存在!\"\
  );\n}\n}\n}\n清单 11-1\n打印文件详细信息\n```\n\n清单 11-1 中的文件处理器实例是通过提供我电脑上的绝对文件路径名创建的。如果你想在自己的电脑上运行这段代码，必须提供一个指向你电脑上某个文件的路径名（在示例中将\
  \ `[workspace]` 替换为该路径）。如果你使用的是 Windows，请记住路径名中包含 `\\`（反斜杠）字符，该字符在 Java 中是特殊字符，必须通过双写\
  \ `\\\\` 进行转义（更多详情请参见**第 5 章**）。\n\n`printFileStats(..)` 方法使用了大量可以在文件处理器上调用的方法。可调用的方法列表很长，你可以在官方\
  \ API 文档中查看所有方法。^(¹⁰⁵) 这些方法将在以下小节中进行说明。\n\n### `isFile`\n\n如果路径名指向一个文件，`isFile()`\
  \ 方法返回 `true`；如果路径名指向一个目录或*符号链接*（一种特殊类型的文件，其存在仅用于链接到另一个文件，当你想要缩短文件的路径名时非常有用，并且在路径名长度限制为\
  \ 256 个字符的 Windows 上极其有用），则返回 `false`。在清单 11-1 中，该方法返回 `true`，日志打印如下：\n\n```\nINFO\
  \  c.a.b.e.Main - 类型 : 文件\n```\n\n如果你想查看该方法对目录是否有效，只需从路径名中删除文件名：\n\n```\nvar file\
  \ = new File(\"/[workspace]/java-17-for-absolute-beginners/\");\n```\n\n日志打印如下：\n\
  \n```\nINFO  c.a.b.e.Main - 类型 : 目录或符号链接\n```\n\n\n\n### `getAbsolutePath`\n\n`getAbsolutePath()`\
  \ 方法返回文件或目录的绝对路径名。在创建文件处理器时，并不总是需要绝对路径名，但如果你稍后在代码中需要使用它，或者需要确保相对路径被正确解析，这个方法正是你所需要的。以下代码片段通过使用相对于项目根目录（在本例中为\
