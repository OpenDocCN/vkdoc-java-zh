  当用户点击列表元素时，会发生两件事：前一个元素被取消选中，被点击的元素被选中，因此选中的元素发生了变化。`getValueIsAdjusting()` 方法返回当前事件是否属于一系列多个事件（选择事件、点击事件等，取决于支持的类型）中的一环，且更改仍在进行中。我们测试该方法是否返回
  false，以确认选择已经完成，这样我们就可以获取当前选中元素的值并将其添加到文本区域中。




  `JTextArea` 实例被添加到一个 `JScrollPane` 实例中，该实例通过提供一个或两个滚动条（取决于配置），使得 `textArea` 的内容在填充文本时仍然可见。`JScrollPane`
  也可以包裹在包含过多项目的列表周围，以确保所有项目都可访问。此外，由于我们不需要用户通过文本区域提供输入，因此调用了 `setEditable(false);`
  方法。


  现在我们有了一个更复杂的应用程序，是时候调整一下应用程序的外观和感觉了。到目前为止，我们一直使用底层操作系统提供的默认主题。使用 Swing，可以将外观和感觉配置为
  JDK 支持的默认主题之一，也可以使用项目类路径中作为依赖项提供的额外自定义主题，或者开发人员可以创建自己的主题。要显式指定外观和感觉，必须在创建任何 Swing
