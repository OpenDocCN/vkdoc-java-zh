  编写 JSP 页面有两种方式。最简单的方式（如今很少使用，因为它将 HTML 代码与 Java 代码耦合在一起）是使用 **JSP 脚本片段**。JSP 脚本片段是使用指令标签嵌入在
  HTML 代码中的 Java 代码片段。有三种类型的指令标签：


  *   `<%@ page ... %>` 用于向容器提供指令。使用此指令声明的指令属于当前页面，并且可以在页面中的任何位置使用。此类指令可用于导入 Java
  类型或定义页面属性。示例：

  *   `<%@ include ... %>` 用于在翻译阶段包含一个文件。因此，使用此指令的当前 JSP 文件是其内容与使用此指令声明的文件内容的组合：`<%@
  include file = "footer.jsp" >`


  *   `<%@ taglib ... %>` 用于声明一个标签库，其中包含将在 JSP 页面中使用的元素。此声明很重要，因为它用于导入一个包含自定义标签和元素的库，这些标签和元素将用于编写
  JSP 页面。这些标签提供了动态功能，而无需使用脚本片段。


