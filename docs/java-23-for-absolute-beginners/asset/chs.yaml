  # 4. Java 语法\n\n语言是人们之间进行口头或书面交流的工具。无论是自然语言还是人工语言，都由术语以及如何使用这些术语完成交流任务的规则构成。编程语言是与计算机进行交流的工具。与计算机的交流是一种书面交流。基本上，开发者定义一些要执行的指令，并通过中介将其传达给计算机。如果计算机理解这些指令，它就会执行一系列操作，并根据应用程序类型向开发者返回某种形式的回复。\n\
  \n在 Java 语言中，开发者与计算机进行交流的中介是 Java 虚拟机。定义术语应如何连接以生成可理解的交流单元的那套编程规则被称为*语法*。Java 的大部分语法借鉴了另一种名为\
  \ C++ 的编程语言，而 C++ 的语法又基于 C 语言的语法。C 语言的语法从它之前的其他语言中借鉴了元素和规则，但本质上所有这些语言都基于自然英语。由于引入了\
  \ lambda 表达式，Java 在版本 8 中变得有点晦涩难懂，但即便如此，在编写 Java 程序时，如果你用英语恰当地命名术语，结果代码应该像故事一样易于阅读。\n\
  \n**第** **2** **章**和**第** **3** **章**已经介绍了 Java 语法的一些细节。关于包和模块的介绍足以让你扎实理解其用途，从而避免对项目组织方式产生困惑，并在尝试执行书中提到的代码时避免盲目摸索。但在其他主题上，我们只是浅尝辄止。因此，让我们开始深入探索\
  \ Java。\n\n## 编写 Java 代码的基本规则\n\n在编写 Java 代码之前，让我们列出一些你应该遵循的规则，以确保你的代码不仅能工作，而且易于理解，从而便于维护或扩展。代码清单\
  \ 4-1 展示了我们在**第** **3** **章**结束时使用的类，并添加了一些细节。\n\n```\n01\\. package com.apress.bgn.four.basic;\n\
  02.\n03\\. import java.util.List;\n04.\n05./**\n06\\. * 这是一个 JavaDoc 注释\n07\\. */\n\
  08\\. public class HelloWorld {\n09\\.     public static void main(String... args)\
  \ {\n10\\.         // 这是一个单行注释\n11\\.         List items = List.of(\"1\", \"a\"\
  , \"2\", \"a\", \"3\", \"a\");\n12.\n13\\.         items.forEach(item -> {\n14\\\
  .             /* 这是一个\n15\\.                 多行\n16\\.             注释 */\n17\\.\
  \             if (item.equals(\"a\")) {\n18\\.                 System.out.println(\"\
  A\");\n19\\.             } else {\n20\\.                 System.out.println(\"Not\
  \ A\");\n21\\.             }\n22\\.         });\n23\\.     }\n24\\. }\n代码清单 4-1\n\
  带有注释的 HelloWorld 类\n```\n\n代码的每个部分都将在本章中单独介绍。让我们从第一行开始。\n\n### 包声明\n\n如果文件中声明的类型是在某个包内声明的，那么\
  \ Java 文件总是以*包声明*开头。包名可以包含字母和数字，用点号分隔。每个部分都对应包含该类型的路径中的一个目录，如**第** **3** **章**所示。包声明应揭示应用程序的名称以及包中类的用途。让我们以本书源码中使用的包命名为例：`com.apress.bgn.four.basic`。如果我们将包名拆分开，每个部分的含义如下：\n\
  \n*   `com.apress` 代表应用程序的域名，或者在本例中代表应用程序的所有者。\n*   `bgn` 代表代码的适用范围，在本例中代表本书的目标读者：**初学者**。\n\
  *   `four` 代表类的用途：用于**第** **4** **章**。\n*   `basic` 代表类用途的更精细级别：这些类很简单，用于描述基本的 Java\
  \ 概念。\n\n像这里介绍的由多个部分组成的包名被称为**限定包名**。它具有层次结构，包 `com` 是根包。假设一个类型 `MyType` 在此包中声明，那么其他包中的类使用以下导入语句引用此类型：`import\
  \ com.MyType``;`。\n\n包 `apress` 是包 `com` 的成员，其名称由自身名称加上外围包名和一个点号组成。假设一个类型 `MyType`\
  \ 在此包中声明，那么其他包中的类使用以下导入语句引用此类型：`import com.apress.MyType``;`。\n\n同样的规则适用于包 `bgn`，它是包\
  \ `apress` 的成员，其类型成员也遵循此规则，依此类推，直到包树的底层。\n\n提示\n\n你可以将包想象成编程世界中的俄罗斯套娃^(³⁹)。\n\n\
  因此，一个类型通过其**完全限定名**在其他类型中被引用。类型的完全限定名由类型名称加上包的限定名和一个点号构成。图 4-1 应该能让事情变得非常清晰。\n\n\
  ![](img/463938_3_En_4_Fig1_HTML.jpg)\n\n图 4-1\n\nJava 类型完全限定名的分解\n\n\n\n### 导入部分\n\
  \n在包声明之后，接下来是*导入部分*。该部分包含了文件中使用的所有类、接口和枚举的完全限定名。请查看清单 4-2 中的代码示例。\n\n```\npackage\
  \ java.lang;\nimport java.io.ObjectStreamField;\nimport java.io.UnsupportedEncodingException;\n\
  import java.lang.annotation.Native;\nimport java.lang.invoke.MethodHandles;\nimport\
  \ java.lang.constant.Constable;\nimport java.lang.constant.ConstantDesc;\nimport\
  \ java.nio.charset.Charset;\nimport java.util.ArrayList;\n// 其余导入语句已省略\npublic final\
  \ class String\nimplements java.io.Serializable, Comparable, CharSequence,\nConstable,\
  \ ConstantDesc {\nprivate static final ObjectStreamField[] serialPersistentFields\
  \ =\nnew ObjectStreamField[0];\n// 其余代码已省略\n}\n清单 4-2\n来自 java.lang.String 类的代码片段\n\
  ```\n\n这是官方 Java `String` 类的一个片段。每个导入语句都代表对某个包的引用，以及 `String` 类主体中使用的一个类的名称。\n\n\
  特殊的导入语句也可用于导入静态变量和静态方法。JDK 包含一个用于数学运算的类。它包含静态变量和方法，开发者可以使用它们来实现解决数学问题的代码。你可以直接使用它的变量和方法，而无需创建此类型的对象，因为静态成员不属于某个类型的对象，而是属于类型本身。请查看清单\
  \ 4-3 中的代码。\n\n```\npackage com.apress.bgn.four;\nimport static java.lang.Math.PI;\n\
  import static java.lang.Math.sqrt;\npublic class MathSample {\npublic static void\
  \ main(String... args) {\nSystem.out.println(\"PI value =\" + PI);\ndouble result\
  \ = sqrt(5.0);\nSystem.out.println(\"SQRT value =\" + result);\n}\n}\n// 输出\n//\
  \ PI value =3.141592653589793\n// SQRT value =2.23606797749979\n清单 4-3\n对 Math 类的成员使用静态导入\n\
  ```\n\n通过将 `import` 和 `static` 组合使用，我们可以声明一个类的完全限定名，以及我们希望在代码中使用的方法或变量。这允许我们直接使用该变量或方法，而无需使用声明它的类名。如果没有静态导入，代码将不得不重写，如清单\
  \ 4-4 所示。\n\n```\npackage com.apress.bgn.four;\nimport java.lang.Math;\npublic class\
  \ MathSample {\npublic static void main(String... args) {\nSystem.out.println(\"\
  PI value =\" + Math.PI);\ndouble result = Math.sqrt(5.0);\nSystem.out.println(\"\
  SQRT value =\" + result);\n}\n}\n清单 4-4\n使用对 Math 类的导入\n```\n\n重要\n\n完全限定名功能强大。包名在模块内是唯一的，但包名在应用程序内并不总是唯一的。类型名在应用程序内也不总是唯一的。但是，由两者组合而成的完全限定类型名在应用程序内是唯一的。\n\
  \n提示\n\n你也可以将包视为家庭地址，将类型视为人。两个人可以有相同的地址，但不能有相同的名字。两个人可以有相同的名字，但住在不同的地址。例如，这就是银行和其他机构在英国或美国唯一识别个人的方式。\n\
  \n完全限定名并不仅限于导入语句。当两个类型具有相同的名称，并且两者都用于声明第三个类型时，在类型主体内告诉编译器你打算使用哪个类型的唯一方法就是使用完全限定名。清单\
  \ 4-5 中展示了一个示例，其中来自 `com.apress.bgn.four.math` 包的 `Math` 类被用在一个也使用了 `java.lang.Math`\
  \ 类成员的类主体中。\n\n```\npackage com.apress.bgn.four.math;\nimport java.lang.Math;\n\
  public class Sample {\npublic static void main(String... args) {\nSystem.out.println(\"\
  PI value =\" + Math.PI);\nSystem.out.println(\"My PI value= \" + com.apress.bgn.four.math.Math.PI);\n\
  }\n}\n// 输出\n// PI value =3.141592653589793\n// My PI value= 3.14\n清单 4-5\n使用 com.apress.bgn.four.math.Math\
  \ 类的成员\n```\n\n当从同一个包中使用多个类型时，类型名可以用星号（`*`）代替，这意味着该包中任何可见的类型都可以在正在编写的类型代码中使用。这被称为*紧凑导入语句*。当从同一个包中使用多个类来编写代码，或者从同一个类中使用多个静态变量和方法时，建议使用紧凑导入。如果不这样做，文件的导入部分会变得冗长且难以阅读。这时紧凑导入就能派上用场。紧凑导入意味着用通配符替换来自同一个包的所有类，或来自同一个类的所有变量和方法，这样只需要一条导入语句。它也适用于静态导入。因此，之前的\
  \ `Sample` 类在清单 4-6 中变成了 `MathSample` 类。\n\n```\npackage com.apress.bgn.four;\n\
  import static java.lang.Math.*;\npublic class MathSample {\npublic static void main(String...\
  \ args) {\nSystem.out.println(\"PI value =\" + PI);\ndouble result = sqrt(5.0);\n\
  System.out.println(\"SQRT value =\" + result);\n}\n}\n清单 4-6\n使用 java.lang.Math\
  \ 类的成员\n```\n\n\n\n### Java 语法\n\nJava 语言是**区分大小写**的，这意味着我们可以编写类似清单 4-7 所示的代码，并且代码能够成功编译和执行。\n\
  \n```\npackage com.apress.bgn.four;\npublic class MultipleCaseVariables {\npublic\
  \ static void main(String... args) {\nint mynumber = 0;\nint myNumber = 1;\nint\
  \ Mynumber = 2;\nint MYNUMBER = 3;\nSystem.out.println(mynumber);\nSystem.out.println(myNumber);\n\
  System.out.println(Mynumber);\nSystem.out.println(MYNUMBER);\n}\n}\n清单 4-7\n证明 Java\
  \ 区分大小写的代码\n```\n\n所有四个变量都是不同的，最后四行将打印数字 `0 1 2 3`。显然，你不能在同一个上下文（例如，在方法体内）中声明两个同名的变量，因为这基本上是在重新声明同一个变量。Java\
  \ 编译器不允许这样做。如果你尝试这样做，你的代码将无法编译，甚至 IntelliJ IDEA 也会尝试通过用红色下划线标记代码并显示相关消息来让你看到错误所在，如图\
  \ 4-2 中的第 37 行所示，其中变量 `mynumber` 被声明了两次。\n\n![](img/463938_3_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2\n\n同一个变量名使用了两次\n\n有一组 **Java 关键字**，它们在 Java 代码中只能用于固定和预定义的目的。其中一些已经介绍过：`import`、`package`、`public`、`class`；其余的关键字将在本章末尾介绍，并在表\
  \ 4-2、4-3 和 4-4 中对每个关键字进行简短说明。\n\n重要\n\nJava 关键字不能用作开发者编写的代码中的标识符，因此它们不能用作变量、类、接口、对象等的名称。\n\
  \n可以在一个 Java 源文件中声明一个或多个类型。无论是 `class`、`interface`（或 `@interface`）还是 `enum`，类型的声明都必须用花括号（`{}`）括起来。这些被称为**块分隔符**。`import`\
  \ 和 `package` 语句不属于类型体的一部分。如果你回顾一下清单 4-1 中的代码，你会注意到那里使用花括号来包裹以下内容：\n\n*   类的内容，也称为类体（第\
  \ 08 行和第 23 行的花括号）\n*   方法的内容，也称为方法体（第 09 行和第 22 行的花括号）\n*   一组要一起执行的指令（第 13 行和第\
  \ 21 行的花括号）\n\n在 Java 中，代码行通常以分号（`;`）符号或 ASCII 字符 CR、LF 或 CR LF 结束。这些被称为**行终止符**。分号用于终止功能完整的语句，例如第\
  \ 11 行的列表声明。在小型显示器上编写代码时，你可能被迫将该语句拆分成两行以保持代码可读性。其末尾的分号告诉编译器，只有将所有部分放在一起时，该语句才是正确的。请看图\
  \ 4-3。\n\n![](img/463938_3_En_4_Fig3_HTML.jpg)\n\n图 4-3\n\n不同的语句示例\n\n前三个 `List`\
  \ 声明是等价的。以这种方式声明 `List` 时，你甚至可以将它的元素拆分成多行。然而，第 46 行的声明是故意写错的。在第 46 行添加了一个分号，这就在那里结束了该语句。该语句无效，当你尝试编译该类时，编译器会通过打印一个异常来报错，提示\
  \ `Error:(13, 46) java: illegal start of expression`。\n\n如果错误消息看起来与示例不符，可以这样理解：对于编译器来说，问题不在于语句的错误终止，而在于等号（`=`）符号之后，编译器期望找到某种能够为\
  \ `badList` 变量生成值的表达式，但它却什么也没找到。\n\n### Java 标识符和变量\n\n**标识符**是你给 Java 代码中的项目（类、变量、方法等）起的名称。标识符必须遵守一些规则才能让代码编译通过，并且还要遵循常识性的编程规则，这些规则被称为\
  \ **Java 编码约定**。这里列出其中一些：\n\n*   标识符不能是 Java 保留字之一，否则代码将无法编译。\n*   标识符不能是布尔字面量（`true`、`false`）或\
  \ `null` 字面量，否则代码将无法编译。\n*   标识符可以由字母、数字、下划线（`_`）、美元符号（`$`）组成。\n*   标识符不能以数字开头。\n\
  *   从 Java 9 开始，单个下划线不能再用作标识符，因为它变成了一个关键字。这可能是因为在 Java 7 中引入了数字字面量，多位数字可以写得更易读（例如，`int\
  \ i = 10_000;`）。\n*   从 Java 21 开始，单个下划线可以再次用作标识符，但仅限于保存代码中未使用的值的变量。这种行为借鉴自 Go 编程语言，这些变量被称为*未命名变量*。\n\
  *   开发者应遵循**驼峰式**书写风格来声明标识符，确保标识符名称中间的每个单词或缩写都以大写字母开头（例如，`StringBuilder`、`isAdult`）。\n\
  \n**变量**是一组可以与值关联的字符。它有一个类型，基于该类型，可以赋给它的值集合被限制在某个区间、值组内，或者必须遵循该类型定义的某种格式。例如，清单 4-1\
  \ 中第 11 行声明的项目是一个类型为 `List` 的变量，与其关联的值是一个值列表。\n\n在 Java 中有三种类型的变量：\n\n*   **字段**（也称为**属性**）是在方法体之外的类体中定义的变量，并且它们前面没有关键字\
  \ `static`。\n*   **局部变量**是在方法体内声明的变量，它们仅在该上下文中有效。\n*   **静态变量**是在类体内声明的变量，并且它们前面有关键字\
  \ `static`。如果它们被声明为 `public`，则在应用程序中，只要包含该变量的类型是可访问的，它们就是可访问的（除非该模块没有导出声明它们的包）。\n\
  \n### Java 注释\n\n**Java 注释**指的是不属于正在执行的代码的一部分、且被编译器忽略的解释性文本片段。在 Java 中，有三种在代码中添加注释的方式，每种方式都有其独特的声明字符。清单\
  \ 4-1 中使用了所有三种类型的注释，以下列表解释了每种注释的用途：\n\n*   `//` 用于单行注释（第 10 行）。开发者使用这种注释来添加 `TODO`\
  \ 语句或解释为什么需要某段代码。这些注释主要面向项目中的团队成员。\n*   `/** ... */` JavaDoc 注释使用特殊工具导出到项目的文档中，该文档称为\
  \ JavaDoc API（第 05 到 07 行）。开发者使用这种注释来记录他们的代码。有一些构建工具的插件可以将项目中的 JavaDoc 提取为网站，然后可以公开托管，以帮助使用你项目的其他开发者。\n\
  *   `/* ... */` 用于多行注释（第 14 到 16 行）。开发者使用这种注释来添加 `TODO` 语句或提供关于为什么需要某段代码的详细解释。这些注释主要面向项目中的团队成员。\n\
  \n\n\n## Java 类型\n\n在**第 3 章**介绍 Java 构建块时，为简单起见，只解释了类。当时提到 Java 中还有其他类型，本节将介绍所有这些类型。由于类最为重要，因此必须首先介绍。\n\
  \n### 类\n\n如**第 3 章**所述，类只是创建对象的模板。基于**类**创建对象的过程称为**实例化**。生成的对象被称为该类的一个实例。实例之所以被称为命名对象，是因为在\
  \ Java 中，如果未声明其他超类，默认情况下，任何由开发者编写的类都会隐式继承类 `java.lang.Object`。这意味着，在 Java 中，存在一个所有类的基本模板，由\
  \ `java.lang.Object` 类表示。任何类默认都是该类的扩展，因此，代码清单 4-8 中的类声明与代码清单 4-9 中的声明是等价的。\n\n```\n\
  package com.apress.bgn.four.basic;\npublic class Sample extends Object {}\n代码清单\
  \ 4-9\n显式扩展 java.lang.Object 类的简单 Sample 类\n```\n\n```\npackage com.apress.bgn.four.basic;\n\
  public class Sample {}\n代码清单 4-8\n隐式扩展 java.lang.Object 类的简单 Sample 类\n```\n\n注意\n\
  \n请注意，无需导入 `java.lang` 包，因为 `Object` 类是 Java 层次结构的根类，所有类（包括数组）都必须能够访问并扩展它。因此，`java.lang`\
  \ 包是隐式导入的。\n\n重要\n\n如**第 3 章**所述，在任何声明了 `module-info.java` 的 Java 项目中，`java.base`\
  \ 模块都会被隐式添加为必需模块。该模块导出了包含编写 Java 代码核心组件的 `java.lang` 包。\n\n提示\n\n每个人类个体都由包含 23 对染色体的\
  \ DNA 分子定义。这些染色体声明了人类为了看起来像……人类并发挥功能所应拥有的器官和四肢。你可以将 `Object` 类视为 DNA 分子，它声明了一个类为了在\
  \ Java 应用程序中看起来像一个类并发挥其功能所应拥有的所有组件。\n\n以下各节将介绍并解释可用于在 Java 中创建对象的其他模板类型的使用。为了在上下文中进行说明，我们将创建一个用于定义人类的模板家族。大多数\
  \ Java 教程使用车辆或几何形状的模板。我想建模一些任何人都能轻松理解和关联的事物。以下各节的目标是开发可用于建模不同类型人群的 Java 模板。到目前为止提到的第一个\
  \ Java 模板是**类**，那么我们就从它继续。\n\n#### 字段\n\n创建实例的操作称为**实例化**。要设计一个建模通用人类的类，我们应该考虑两件事：人类特征和人类行为。那么，所有人类有什么共同点呢？嗯，有很多，但就本节而言，让我们选择三个通用属性：姓名、年龄和身高。这些属性在\
  \ Java 类中映射为称为**字段**或**属性**的变量。`Human` 类的第一个版本如代码清单 4-10 所示。\n\n```\npackage com.apress.bgn.four.base;\n\
  public class Human {\nString name;\nint age;\nfloat height;\n}\n代码清单 4-10\n简单的 Human\
  \ 类\n```\n\n在前面的代码示例中，字段具有不同的类型，具体取决于应该与之关联的值。例如，姓名可以与文本值（如“Alex”）关联，而文本在 Java 中由\
  \ `String` 类型表示。年龄可以与数值整数值关联，因此其类型为 `int`。就本节而言，人的身高被视为有理数，例如 1.9，因此我们使用用于此类值的特殊\
  \ Java 类型：`float`。\n\n现在我们有了一个建模人类某些基本属性的类。我们如何使用它？我们需要一个 `main()` 方法，并且需要创建一个此类型的对象：我们需要实例化这个类。在代码清单\
  \ 4-11 中，创建了一个名为“Alex”的人类。\n\n```\npackage com.apress.bgn.four.base;\npublic class\
  \ BasicHumanDemo {\npublic static void main(String... args) {\nHuman human = new\
  \ Human();\nhuman.name = \"Alex\";\nhuman.age = 40;\nhuman.height = 1.91f;\n}\n\
  }\n代码清单 4-11\n创建简单的 Human 对象\n```\n\n要创建 `Human` 实例，我们使用 `new` 关键字。在 `new` 关键字之后，我们调用一个称为**构造方法**的特殊方法。我之前提到过方法，但这个很特殊。有些开发者甚至不认为构造方法是一种方法。最明显的原因是构造方法没有在\
  \ `Human` 类的主体中任何地方定义。那么它从哪里来的呢？它是一个没有参数的默认构造方法，由编译器自动生成，除非声明了显式的构造方法（带参数或不带参数）。一个类不能没有构造方法；否则，它无法被实例化，这就是为什么如果没有显式声明构造方法，编译器会生成一个。默认构造方法会调用\
  \ `super()`，而 `super()` 又会调用 `Object` 的无参构造方法，该方法将所有字段初始化为默认值。代码清单 4-12 中的代码示例对此进行了验证（包含输出）。\n\
  \n```\npackage com.apress.bgn.four.base;\npublic class BasicHumanDemo {\npublic\
  \ static void main(String... args) {\nHuman human = new Human();\nSystem.out.println(\"\
  name: \" + human.name);\nSystem.out.println(\"age: \" + human.age);\nSystem.out.println(\"\
  height: \" + human.height);\n}\n}\n// 输出\n// name: null\n// age:0\n// height:0.0\n\
  代码清单 4-12\n创建简单的 Human 对象但未设置其字段值\n```\n\n打印的是变量类型的默认值。数值变量被初始化为 `0`，`String` 值被初始化为\
  \ `null`。原因是数值类型是原始数据类型，而 `String` 是对象数据类型。`String` 类是 `java.lang` 包的一部分，是用于创建 `String`\
  \ 类型对象的预定义 Java 类之一。它是一种用于表示文本对象的特殊数据类型。我们将在**第 5 章**中更深入地探讨数据类型。\n\n\n\n#### 类变量\n\
  \n除了每个人类个体特有的属性外，所有人类都有一些共同点：寿命（我们假设最大值为 100 年）。声明一个名为`lifespan`的字段会造成冗余，因为它必须与所有`Human`实例的相同值相关联。因此，我们将在`Human`类中使用`static`关键字声明一个字段，该字段对所有`Human`实例都具有相同的值，并且只会被初始化一次。我们还可以更进一步，在其声明前添加`final`修饰符，确保该值在程序执行期间永不改变。这样，我们就创建了一种特殊类型的变量，称为**常量**。\n\
  \n注意\n\nJava 常量的编码规范规定，其名称应全部大写，单词之间用下划线（_）分隔。\n\n新的`Human`类如代码清单 4-13 所示。\n\n```\n\
  package com.apress.bgn.four.base;\npublic class Human {\nstatic final int LIFESPAN\
  \ = 100;\nString name;\nint age;\nfloat height;\n}\n代码清单 4-13\n包含常量成员的简单 Human 类\n\
  ```\n\n`LIFESPAN`变量也被称为类变量，因为它与类关联，而非与实例关联。*（其值被设为 100，这是一个相当乐观的数值。）* 代码清单 4-14\
  \ 中的代码清晰地说明了这一点。\n\n```\npackage com.apress.bgn.four.base;\npublic class BasicHumanDemo\
  \ {\npublic static void main(String... args) {\nHuman human = new Human();\nHuman\
  \ alex = new Human();\nalex.name = \"Alex\";\nalex.age = 40;\nalex.height = 1.91f;\n\
  System.out.println(\"Alex's lifespan = \" + alex.LIFESPAN);\nSystem.out.println(\"\
  human's lifespan = \" + human.LIFESPAN);\nSystem.out.println(\"Human lifespan =\
  \ \" + Human.LIFESPAN);\n}\n}\n//输出\n/*\nAlex's lifespan = 100\nhuman's lifespan\
  \ = 100\nHuman lifespan = 100\n*/\n代码清单 4-14\n测试常量的代码示例\n```\n\n#### 数据封装\n\n我们定义的类在字段上未使用任何访问修饰符，这是不可接受的。Java\
  \ 被称为**面向对象编程语言**，因此用 Java 编写的代码必须遵循**面向对象编程（OOP）原则**。遵循这些编码原则能确保编写的代码质量良好，并完全符合\
  \ Java 的基本风格。\n\n注意\n\n从 Java 8 开始，Java 语法已进行了修改——新增了类型，JDK 内部也做了更改，以允许在编写代码时采用更具函数式风格的方法——但\
  \ Java 仍然主要是一种面向对象语言。\n\nOOP 原则之一是**封装**，它指的是通过使用称为访问器（getter）和修改器（setter）的特殊方法来限制对数据的访问，从而隐藏数据实现。\n\
  \n通常，类的任何字段都应具有私有访问权限，对其访问应通过可被拦截、测试和追踪调用来源的方法来控制。使用 getter 和 setter 是处理对象时的常见做法，因此大多数\
  \ IDE 都有生成它们的默认选项，包括 IntelliJ IDEA。如图 4-4 所示，只需在类体内右键单击，选择 **Generate** 选项查看所有可能性，然后选择\
  \ **Getter and Setter** 即可为您生成这些方法。\n\n![](img/463938_3_En_4_Fig4_HTML.jpg)\n\n\
  图 4-4\n\nIntelliJ IDEA 代码生成菜单：**Generate ➤ Getter and Setter** 子菜单\n\n将字段设为私有并生成\
  \ getter 和 setter 后，`Human` 类现在如代码清单 4-15 所示。\n\n```\npackage com.apress.bgn.four.base;\n\
  public class Human {\nstatic final int LIFESPAN = 100;\nprivate String name;\nprivate\
  \ int age;\nprivate float height;\npublic String getName() {\nreturn name;\n}\n\
  public void setName(String name) {\nthis.name = name;\n}\npublic int getAge() {\n\
  return age;\n}\npublic void setAge(int age) {\nthis.age = age;\n}\npublic float\
  \ getHeight() {\nreturn height;\n}\npublic void setHeight(float height) {\nthis.height\
  \ = height;\n}\n}\n代码清单 4-15\n包含 Getter 和 Setter 的简单 Human 类\n```\n\n查看代码清单 4-15\
  \ 后，您可能会好奇 `this` 关键字的用途。正如其名称所暗示的，它是对当前对象的引用。因此，[`this.name`](http://this.name)\
  \ 实际上是当前对象字段 `name` 的值，也称为**实例变量**。在类体内，当方法中存在与字段同名的参数时，`this` 用于访问当前对象的字段。如您所见，IntelliJ\
  \ IDEA 生成的 setter 和 getter 的参数名称与字段名称完全相同。\n\n**Getter** 是最简单的方法，声明时不带任何参数，并返回与其关联的字段的值。其命名规范是使用\
  \ `get` 前缀，后跟所访问字段的名称，并将字段名的首字母大写。\n\n**Setter** 是返回类型为 `void` 的方法，声明一个与要关联的字段类型相同的变量作为参数。其名称由\
  \ `set` 前缀和所访问字段的名称组成，并将字段名的首字母大写。当编辑器生成 setter 时，参数名称与实例变量名称匹配，因此在 setter 方法体内需要使用\
  \ `this` 关键字来区分两者。\n\n图 4-5 展示了 `name` 字段的 setter 和 getter。\n\n![](img/463938_3_En_4_Fig5_HTML.jpg)\n\
  \n图 4-5\n\n用于 `name` 字段的 Setter 和 Getter 方法\n\n由于字段现在是私有的，在创建 `Human` 实例时，我们必须使用\
  \ setter 来设置字段值，并使用 getter 来访问它们。因此，我们的 `BasicHumanDemo` 类变为代码清单 4-16 所示。\n\n```\n\
  package com.apress.bgn.four.base;\npublic class BasicHumanDemo {\npublic static\
  \ void main(String... args) {\nHuman alex = new Human();\nalex.setName(\"Alex\"\
  );\nalex.setAge(40);\nalex.setHeight(1.91f);\nSystem.out.println(\"name: \" + alex.getName());\n\
  System.out.println(\"age: \" + alex.getAge());\nSystem.out.println(\"height: \"\
  \ + alex.getHeight());\n}\n}\n// 输出\n// name: Alex\n// age: 40\n// height: 1.91\n\
  代码清单 4-16\n使用包含 Getter 和 Setter 的 Human 实例的 BasicHumanDemo 类\n```\n\n大多数 Java 框架会在类中查找\
  \ getter 和 setter，以初始化或读取对象字段的值。大多数开发者将 setter 和 getter 视为**样板代码**（或简称**样板**），即那些在多个地方重复出现且几乎无变化的代码段。这就是\
  \ Lombok^(⁴⁰) 库诞生的原因——它在运行时生成这些代码，这样开发者就不必用它们污染自己的代码。Kotlin 语言则完全移除了它们。\n\nJava\
  \ 在版本 14 中通过引入*记录*做了类似的事情。记录将在本章稍后部分介绍。\n\n\n\n#### 方法\n\n既然 getter 和 setter 都是方法，那么现在也该开始讨论方法了。**方法**是一段代码块，通常由返回类型、名称和参数（如果需要）来表征，它描述了对象执行或作用于对象的某个动作，该动作会利用其字段和/或提供的参数的值。Java\
  \ 方法的抽象模板如代码清单 4-17 所示。\n\n```\n[访问修饰符] [返回类型] 方法名\n{\n// 代码\n[ [可能] return 值 ]\n\
  }\n代码清单 4-17\n方法声明模板\n```\n\n按照这个模板，让我们为 `Human` 类创建一个方法，该方法利用人的年龄和 `LIFESPAN` 常量来计算并打印一个人还能活多久。由于该方法不返回任何内容，因此使用的返回类型将是\
  \ `void`，这是一种特殊类型，它告诉编译器该方法不返回任何内容（因此方法体中不存在 return 语句）。该方法的代码如代码清单 4-18 所示。\n\n\
  ```\npackage com.apress.bgn.four.base;\npublic class Human {\nstatic final int LIFESPAN\
  \ = 100;\nprivate String name;\nprivate int age;\nprivate float height;\n/**\n*\
  \ 计算并打印剩余寿命\n*/\npublic void computeAndPrintTtl() {\nint ttl = LIFESPAN - this.age;\n\
  System.out.println(\"剩余寿命: \" + ttl);\n}\n// 部分代码省略\n}\n代码清单 4-18\nHuman#computeAndPrintTtl\
  \ 方法（无返回值）\n```\n\n上述方法定义没有声明任何参数，因此可以在 `Human` 实例上调用它，如代码清单 4-19 所示。\n\n```\npackage\
  \ com.apress.bgn.four.base;\npublic class BasicHumanDemo {\npublic static void main(String...\
  \ args) {\nHuman alex = new Human();\nalex.setName(\"Alex\");\nalex.setAge(40);\n\
  alex.setHeight(1.91f);\nalex.computeAndPrintTtl();\n}\n// 部分代码省略\n}\n代码清单 4-19\n\
  computeAndPrintTtl() 方法的调用\n```\n\n当执行代码清单 4-19 中的代码时，控制台会打印出 *剩余寿命: 60*。\n\n前面的方法可以修改为返回剩余寿命值，而不是打印它。该方法必须修改以声明要返回的值的类型，在这种情况下，类型是\
  \ `int`，与方法体内计算出的值的类型相同。实现如代码清单 4-20 所示。\n\n```\npackage com.apress.bgn.four.base;\n\
  public class Human {\nstatic final int LIFESPAN = 100;\nprivate String name;\nprivate\
  \ int age;\nprivate float height;\n/**\n* @return 剩余寿命\n*/\npublic int getTimeToLive()\
  \ {\nint ttl = LIFESPAN - this.age;\nreturn ttl;\n}\n// 部分代码省略\n}\n代码清单 4-20\ngetTimeToLive()\
  \ 方法（有返回值）\n```\n\n在这种情况下，调用该方法不会产生任何效果，因此我们必须修改代码以保存返回值并打印它，如代码清单 4-21 所示。\n\n\
  ```\npackage com.apress.bgn.four.base;\npublic class BasicHumanDemo {\npublic static\
  \ void main(String... args) {\nHuman alex = new Human();\nalex.setName(\"Alex\"\
  );\nalex.setAge(40);\nalex.setHeight(1.91f);\nint timeToLive = alex.getTimeToLive();\n\
  System.out.println(\"剩余寿命: \" + timeToLive);\n}\n// 部分代码省略\n}\n代码清单 4-21\n使用 getTimeToLive()\
  \ 方法\n```\n\n这里介绍的两种方法都没有声明参数，因此调用它们时无需提供任何参数。我们不会介绍带参数的方法，因为 setter 已经足够说明问题了。让我们直接跳到构造函数。\n\
  \n#### 构造函数\n\n现在我们已经做到了：在其他类中再也不能使用 `alex.name` 了，否则编译器会抱怨无法访问该属性。而且，仅仅为了设置这些属性而调用所有这些\
  \ setter 相当烦人，所以我们需要对此做些改进。还记得隐式构造函数吗？开发人员也可以显式地声明构造函数，并且一个类可以有多个构造函数。构造函数可以声明参数，用于初始化每个感兴趣的字段。代码清单\
  \ 4-22 展示了 `Human` 类的一个构造函数，它使用参数的值来初始化类的字段。\n\n```\npackage com.apress.bgn.four.base;\n\
  public class Human {\nstatic final int LIFESPAN = 100;\nprivate String name;\nprivate\
  \ int age;\nprivate float height;\n/**\n* 构造一个使用给定参数初始化的 Human 实例。\n* @param name\
  \ - Human 实例的名称\n* @param age - Human 实例的年龄\n* @param height - Human 实例的身高\n*/\n\
  public Human(String name, int age, float height) {\nthis.name = name;\nthis.age\
  \ = age;\nthis.height = height;\n}\n// 部分代码省略\n}\n代码清单 4-22\n带有显式构造函数的 Human 类\n\
  ```\n\n构造函数不需要 `return` 语句，即使调用构造函数的结果是创建一个对象。构造函数在这方面与方法不同。\n\n注意\n\n通过声明显式构造函数，默认构造函数将不再生成。\n\
  \n因此，通过调用默认构造函数（如前面代码清单所示）来创建 `Human` 实例的方式不再有效。代码将无法编译，因为默认构造函数不再生成。要创建 `Human`\
  \ 实例，我们现在必须调用新的构造函数，并在参数位置提供适当的实参，这些实参必须具有正确的类型并遵守它们的声明顺序。默认构造函数的调用和自定义构造函数的调用如代码清单\
  \ 4-23 所示。\n\n```\nHuman human = new Human(\"John\", 40, 1.91f);  // 这行可以工作\nHuman\
  \ human = new Human();  // 这行不再工作\n代码清单 4-23\nHuman 构造函数\n```\n\n但是，如果我们不想被迫使用这个构造函数来设置所有字段呢？我们只需定义另一个只包含我们感兴趣的参数的构造函数。让我们定义一个仅为\
  \ `Human` 实例设置姓名和年龄的构造函数，如代码清单 4-24 所示。\n\n```\npackage com.apress.bgn.four.base;\n\
  public class Human {\nstatic final int LIFESPAN = 100;\nprivate String name;\nprivate\
  \ int age;\nprivate float height;\npublic Human(String name, int age) {\nthis.name\
  \ = name;\nthis.age = age;\n}\npublic Human(String name, int age, float height)\
  \ {\nthis.name = name;\nthis.age = age;\nthis.height = height;\n}\n// 部分代码省略\n}\n\
  代码清单 4-24\n带有显式构造函数的 Human 类\n```\n\n我们刚刚偶然发现了另一个 OOP 原则，称为**多态**。这个术语源自希腊语，翻译过来就是*一个名字，多种形态*。多态适用于代码设计，即存在多个方法，它们名称相同但签名和功能略有不同。它也适用于构造函数。多态有两种基本类型：**重写**，也称为*运行时多态*，我们稍后会在介绍继承原则时进行讲解；以及**重载**，也称为*编译时多态*。\n\
  \n第二种多态类型适用于代码清单 4-24 中的构造函数，因为我们有两个构造函数，其中一个具有不同的参数集，看起来像是较简单构造函数的扩展。\n\n\n\n在清单\
  \ 4-24 中需要注意的第二点是，两个构造函数包含两行相同的代码。有一个常识性的编程原则叫做 DRY，它是 *Don’t Repeat Yourself!*（不要重复自己！）的缩写（DRY\
  \ 也是整洁编码原则之一。^(⁴¹)）。显然，清单 4-24 中的代码并未遵循 DRY 原则。因此，让我们以一种有趣的新方式使用 `this` 关键字（之前介绍过）来解决这个问题，如清单\
  \ 4-25 所示。\n\n```\npackage com.apress.bgn.four.base;\npublic class Human {\npublic\
  \ static final int LIFESPAN = 100;\nprivate String name;\nprivate int age;\nprivate\
  \ float height;\npublic Human(String name, int age) {\nthis.name = name;\nthis.age\
  \ = age;\n}\npublic Human(String name, int age, float height) {\nthis(name, age);\n\
  this.height = height;\n}\n// 部分代码已省略\n}\n清单 4-25\n具有更优自定义构造函数的 Human 类\n```\n\n\
  构造函数之间可以通过使用 `this(...)` 相互调用。这对于避免重复编写相同代码非常有用，从而促进了代码的可重用性。\n\n现在，两个构造函数都提供了创建\
  \ `Human` 实例的方法。如果我们使用不设置身高的那个构造函数，`height` 字段将被隐式初始化为 `float` 类型的默认值 `(0.0)`。\n\
  \n目前我们的类相当基础，甚至可以说它以一种相当抽象的方式对“人”进行了建模。如果我们想尝试对具有特定技能或能力的人进行建模，就必须创建新的类。假设我们要对音乐家和演员进行建模。这意味着我们需要创建两个新类。`Musician`\
  \ 类如清单 4-26 所示；字段的 getter 和 setter 方法已省略。\n\n```\npackage com.apress.bgn.four.classes;\n\
  import java.util.List;\npublic class Musician {\npublic static final int LIFESPAN\
  \ = 100;\nprivate String name;\nprivate int age;\nprivate float height;\nprivate\
  \ String musicSchool;\nprivate String genre;\nprivate List songs;\n// 其他代码已省略\n\
  }\n清单 4-26\nMusician 类\n```\n\n`Actor` 类如清单 4-27 所示；字段的 getter 和 setter 方法已省略。\n\
  \n```\npackage com.apress.bgn.four.classes;\nimport java.util.List;\npublic class\
  \ Actor {\nstatic final int LIFESPAN = 100;\nprivate String name;\nprivate int age;\n\
  private float height;\nprivate String actingSchool;\nprivate List films;\n// 其他代码已省略\n\
  }\n清单 4-27\nActor 类\n```\n\n如你所见，这两个类有不少共同元素。如前所述，整洁编码原则之一要求开发者避免代码重复。这可以通过遵循另外两个\
  \ OOP 原则来设计类实现：**继承**（之前简要提及过）和**抽象**。\n\n#### 抽象与继承\n\n**抽象**是一个管理复杂性的 OOP 原则。抽象用于分解复杂的实现，并定义可重用的核心部分。在我们的例子中，`Musician`\
  \ 和 `Actor` 类的公共字段可以归入本章前面定义的 `Human` 类。`Human` 类可以被视为一种抽象，因为这个世界上的任何人都不只是他们的姓名、年龄和身高。我们永远不需要创建\
  \ `Human` 实例，因为任何个体都将由其他东西来代表，比如激情、目标和技能。一个不需要被实例化，而只是将字段和方法组合在一起供其他类继承或提供具体实现的类，在\
  \ Java 中通过**抽象**类来建模。因此，我们对 `Human` 类进行修改，使其成为抽象类。由于我们正在抽象化这个类，我们将把 `LIFESPAN` 常量设为\
  \ public 使其在任何地方都可访问，并将 `getTimeToLive()` 方法设为抽象方法，将其实现委托给扩展类。\n\n重要\n\n当你将至少一个方法声明为抽象方法时，该类也必须被声明为抽象类。\n\
  \n类的内容如清单 4-28 所示。\n\n```\npackage com.apress.bgn.four.classes;\npublic abstract\
  \ class Human {\npublic static final int LIFESPAN = 100;\nprivate String name;\n\
  private int age;\nprivate float height;\npublic Human(String name, int age) {\n\
  this.name = name;\nthis.age = age;\n}\npublic Human(String name, int age, float\
  \ height) {\nthis(name, age);\nthis.height = height;\n}\n/**\n* @return 剩余寿命\n*/\n\
  public abstract int getTimeToLive();\n// getter 和 setter 方法已省略\n}\n清单 4-28\nHuman\
  \ 抽象类\n```\n\n抽象方法是没有方法体的方法，就像清单 4-28 中声明的 `getTimeToLive()` 方法。这意味着在 `Human` 类内部，这个方法没有具体的实现，只有一个骨架、一个模板。这个方法的具体实现必须由扩展类提供。\n\
  \n哦，等等，我们保留了构造函数！既然我们不能再使用它们了，为什么还要保留呢？我们确实不能再使用了，如图 4-6 所示，该图展示了 IntelliJ IDEA\
  \ 现在对 `BasicHumanDemo` 类的处理情况。\n\n![](img/463938_3_En_4_Fig6_HTML.jpg)\n\n图 4-6\n\
  \n尝试实例化抽象类时的 Java 编译器错误\n\n是的，这是一个编译错误。构造函数可以保留，因为它们有助于进一步抽象行为。`Musician` 和 `Actor`\
  \ 类必须重写以扩展 `Human` 类。这通过在声明类时使用 `extends` 关键字并指定要扩展的类（也称为**父类**或**超类**）来实现。生成的类称为**子类**。\n\
  \n重要\n\n当扩展一个类时，子类会继承超类中声明的所有字段和具体方法。（对它们的访问由访问修饰符定义，详见**第** **3** **章**。）抽象方法除外，子类必须为抽象方法提供具体实现——当然，除非子类本身也是抽象类。\n\
  \n重要\n\n子类必须声明自己的构造函数，并使用超类中声明的构造函数。超类中的构造函数使用关键字 `super` 来调用。方法和字段也是如此，除非它们具有禁止访问的访问修饰符。你能猜到是哪个吗？是\
  \ `private`。子类不能访问超类的私有成员。如果你不知道答案，可能需要回顾一下**第** **3** **章**。\n\n清单 4-29 展示了通过运用抽象和继承编写的\
  \ `Musician` 类的一个版本。\n\n\n\n```\npackage com.apress.bgn.four.classes;\nimport java.util.List;\n\
  public class Musician extends Human {\nprivate String musicSchool;\nprivate String\
  \ genre;\nprivate List songs;\npublic Musician(String name, int age, float height,\n\
  String musicSchool, String genre) {\nsuper(name, age, height);\nthis.musicSchool\
  \ = musicSchool;\nthis.genre = genre;\n}\n@Override\npublic int getTimeToLive()\
  \ {\nreturn (LIFESPAN - getAge()) / 2;\n}\n// getters and setters omitted\n}\n代码清单\
  \ 4-29\n继承 Human 类的 Musician 类\n```\n\n为简化起见，`songs` 字段未作为构造函数参数使用。\n\n如您所见，`Musician`\
  \ 构造函数通过 `super(..)` 调用超类中的构造函数，以设置其中定义的属性。同时请注意 `getTimeToLive()` 方法的完整实现。\n\n\
  注意\n\n关于 `super(..)` 调用有一个有趣的事实。在 Java 21 版本之前，不允许在此调用之前放置任何其他语句，这使得在子类构造函数中，在实际构造实例之前执行某些初始化或验证变得困难。\n\
  \n例如，让我们尝试为代码清单 4-29 中的 `Musician` 添加一个无参构造函数，该函数调用名为 `DataGenerator` 类中的方法，生成随机值用于填充从\
  \ `Human` 继承的字段，并且该调用发生在 `super(..)` 之前。图 4-7 显示了如果项目使用 JDK 17 编译，IntelliJ IDEA\
  \ 会显示的错误。\n\n![](img/463938_3_En_4_Fig7_HTML.jpg)\n\n图 4-7\n\nIntelliJ IDEA 使用 JDK\
  \ 17 编译 Java 22 源码，显示在 `super(..)` 调用之前不允许有语句\n\n`DataGenerator` 类非常简单，它基于一个伪随机数生成器（PRNG）实例生成值。该实例通过调用\
  \ `RandomGenerator.of(\"SecureRandom\")` 获得。`java.util.random.RandomGenerator` 接口是在\
  \ Java 17 中引入的，旨在为生成随机或（更典型地）伪随机数字序列（或 `Boolean` 值）的对象提供通用协议。在内部，`java.util.random.RandomGeneratorFactory`\
  \ 的实例支持创建各种 PRNG，其中许多位于 `jdk.random` 包中。\n\n您可以在代码清单 4-30 的 `DataGenerator` 类中看到数据生成器方法的实现。\n\
  \n```\npackage com.apress.bgn.four.classes;\nimport java.nio.charset.Charset;\n\
  import java.util.random.RandomGenerator;\npublic class DataGenerator {\nstatic RandomGenerator\
  \ randomGenerator = RandomGenerator.of(\"SecureRandom\");\npublic static String\
  \ genString() {\nbyte[] array = new byte[7];\nrandomGenerator.nextBytes(array);\n\
  return new String(array, Charset.defaultCharset());\n}\npublic static float genFloat()\
  \ {\nreturn randomGenerator.nextFloat();\n}\npublic static int genInt() {\nreturn\
  \ randomGenerator.nextInt();\n}\n}\n代码清单 4-30\n使用 JDK 17 RandomGenerator 的数据生成器方法\n\
  ```\n\n`RandomGenerator.of(String)` 方法的参数是 PRNG 的算法名称。JDK 包含许多 PRNG 类，它们取代了自 JDK\
  \ 1.0 以来就存在的 `java.util.Random` 类。`RandomGenerator` 接口包含许多方法，例如 `nextLong()`、`nextInt()`、`nextDouble()`、`nextFloat()`\
  \ 和 `nextBoolean()`，用于生成各种原始数据类型的随机数。生成 `String` 值是通过使用 `nextBytes(byte[])` 生成一个字节数组，并将其作为\
  \ `String(byte[])` 构造函数的参数来实现的。\n\n代码清单 4-31 展示了新的 `Musician` 构造函数的样子。\n\n```\n\
  package com.apress.bgn.four.classes;\nimport java.util.List;\npublic class Musician\
  \ extends Human {\nprivate String musicSchool;\nprivate String genre;\nprivate List\
  \ songs;\npublic Musician() {\n// -- 准备超类构造函数参数\nvar name = DataGenerator.genString();\n\
  var school = DataGenerator.genString();\nvar age = DataGenerator.genInt();\nvar\
  \ height = DataGenerator.genFloat();\n// ---\nsuper(name, age, height);\nthis.musicSchool\
