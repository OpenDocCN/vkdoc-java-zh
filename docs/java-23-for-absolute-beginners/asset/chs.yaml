  代码清单 3-25\n空数组异常\n```\n\n当 Java 程序因运行时错误而结束时，我们说*抛出了一个异常*。\n\n当我们尝试访问一个空数组，或者访问一个数组中不存在的元素时，JVM\
  \ 会抛出一个类型为 `ArrayIndexOutOfBoundsException` 的对象，其中包含发生失败的行以及我们试图访问的元素的索引。JVM 使用异常对象来通知开发人员\
  \ Java 执行未按预期工作时的异常情况，这些对象包含有关代码中发生位置以及导致问题的原因的详细信息。\n\n我们在代码清单 3-25 中所做的修改将打印出执行类时作为参数提供的文本值。让我们修改此类的运行配置并添加一个参数。单击**运行配置**名称旁边的小下拉箭头，将出现一个菜单，如图\
