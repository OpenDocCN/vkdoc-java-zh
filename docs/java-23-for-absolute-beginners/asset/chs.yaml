  ```\n\nJava 的 `File` 类功能相当强大；它可以用来指向另一台计算机上的共享文件。为此有一个特殊的构造函数，它接收一个 `java.net.URI`\
  \ 类型的参数，其中 `URI` 代表**统一资源标识符**。要测试这个构造函数，请在你的计算机上选择一个文本文件，并在网页浏览器中打开它，这样你就可以从浏览器地址栏获取它的\
