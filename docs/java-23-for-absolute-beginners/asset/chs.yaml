- '# 10. 让应用程序具有交互性


  到目前为止，本书中 Java 程序的输入数据是通过在代码内部初始化的数组或变量，或者通过程序参数提供的。然而，在现实生活中，大多数应用程序需要与用户进行交互。可以通过输入用户名和密码来授予用户访问权限，有时还需要用户输入详细信息以确认其身份或指示应用程序执行操作。Java
  支持多种读取用户输入的方法。在本章中，我们将介绍几种构建交互式 Java 应用程序的方法，这些应用程序可以从多种来源获取输入。


  如前几章所述，JShell 是一个 Java 命令行界面（CLI）Shell，使开发者能够测试变量声明和单行语句。其他 CLI Shell（如 `bash`）和终端（如
  Windows 的命令提示符）可用于以连续文本行的形式向程序发出命令。


  ## 从命令行读取用户数据


  本节专门讨论如何从命令行读取用户输入，无论该命令行是 IntelliJ IDEA 控制台，还是程序从特定于操作系统的任何终端中的可执行 jar 运行。在 JDK
  中，有两个类可用于从命令行读取用户数据：`java.util.Scanner` 和 `java.io.Console`。本节将详细介绍这两个类。但首先，让我们从基础开始：使用
  `System.in` 读取用户数据。



  好的，作为高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。



  ### 使用 **System.in**


  在介绍**第** **9** 章中用于在控制台打印数据的日志功能之前，本书的代码示例中一直使用 `System.out` 下的方法。还有一个对应的实用工具对象名为
  `System.in`，它用于从控制台读取数据，即程序用户为控制应用程序流程而输入的数据。你可能已经注意到，到目前为止，所有 Java 程序在执行时，都会启动、处理数据、执行声明的语句，然后终止，无论是正常退出还是出现异常时退出。将终止决定权交给用户的最简单、最常见的方法是在
  `main()` 方法末尾调用 `System.in.read()`。此方法从输入流中读取下一个字节的数据，程序会暂停，直到用户输入一个值；当值被返回时，我们甚至可以保存并打印它。清单
  10-1 展示了使用 `System.in.read` 读取用户输入的代码。


  ```

  package com.apress.bgn;

  import java.io.IOException;

  import static java.lang.System.out;

  import static java.lang.System.in;

  public class ReadingFormStdinDemo {

  public static void main(String... args) throws IOException {

  out.print("Press any key to terminate:");

  byte[] b = new byte[3];

  int read = in.read(b);

  for (int i = 0; i < b.length; ++i) {

  out.println(b[i]);

  }

  out.println("Key pressed: " + read);

  }

  }

  清单 10-1

  在控制台中读取用户提供的值

  ```


  用户输入保存在 `byte[] b` 数组中；其大小是任意的。你可以输入任何内容。只有前三个字节会保留在数组中。然而，这种读取信息的方式并不是很有用，对吧？看看下面的代码片段，它展示了上述代码的执行过程以及随机文本的输入：


  ```

  Press any key to terminate: ini mini miny moo.  # 插入的文本


  Key pressed: 3

  ```


  使用 `System.in` 与 Java 应用程序交互。


  ### 使用 **java.util.Scanner**


  `System.in` 变量的类型是 `java.io.InputStream`，这是一个 JDK 特殊类型，所有表示字节输入流的类都继承自它。（你将在**第**
  **11** 章中了解更多关于 `InputStream` 类的信息。）这意味着 `System.in` 可以被包装在任何 `java.io.Reader` 扩展类中（也将在**第**
  **11** 章中讨论），这样字节就可以作为可读数据来读取。其中真正重要的是来自 `java.util` 包的一个名为 `Scanner` 的类。可以通过调用其构造函数并将
  `System.in` 作为参数传递来创建此类型的实例。`Scanner` 类提供了许多 `next*()` 方法，可用于从控制台读取几乎任何类型。在图 10-1
  中，你可以看到 `next*()` 方法列表。


  ![](img/463938_3_En_10_Fig1_HTML.jpg)


  图 10-1


  用于读取各种类型数据的 Scanner 方法


  使用 `Scanner` 从控制台读取数据的优点是，读取的值会在可能的情况下自动转换为正确的类型；如果不可能，则会抛出 `java.util.InputMismatchException`。


  清单 10-2 中的代码旨在让你通过输入文本然后输入值来选择要读取的值的类型。调用 `Scanner` 实例的相应方法来读取该值。


  ```

  package com.apress.bgn;

  import java.math.BigInteger;

  import java.util.ArrayList;

  import java.util.List;

  import java.util.Scanner;

  import static java.lang.System.out;

  public class ReadingFromStdinUsingScannerDemo {

  public static final String EXIT = "exit";

  public static final String HELP = "help";

  public static final String BYTE = "byte";

  public static final String SHORT = "short";

  public static final String INT = "int";

  public static final String BOOLEAN = "bool";

  public static final String DOUBLE = "double";

  public static final String LINE = "line";

  public static final String BIGINT = "bigint";

  public static final String TEXT = "text";

  public static final String LONGS = "longs";

  public static void main(String... args) {

  Scanner sc = new Scanner(System.in);

  var help = getHelpString();

  out.println(help);

  String input;

  do {

  out.print("Enter option: ");

  input = sc.nextLine();

  switch (input) {

  case HELP:

  out.println(help);

  break;

  case EXIT:

  out.println("Hope you had fun. Buh-bye!");

  break;

  case BYTE:

  byte b = sc.nextByte();

  out.println("Nice byte there: " + b);

  sc.nextLine();

  break;

  case SHORT:

  short s = sc.nextShort();

  out.println("Nice short there: " + s);

  sc.nextLine();

  break;

  case INT:

  int i = sc.nextInt();

  out.println("Nice int there: " + i);

  sc.nextLine();

  break;

  case BOOLEAN:

  boolean bool = sc.nextBoolean();

  out.println("Nice boolean there: " + bool);

  sc.nextLine();

  break;

  case DOUBLE:

  double d = sc.nextDouble();

  out.println("Nice double there: " + d);

  sc.nextLine();

  break;

  case LINE:

  String line = sc.nextLine();

  out.println("Nice line of text there: " + line);

  break;

  case BIGINT:

  BigInteger bi = sc.nextBigInteger();

  out.println("Nice big integer there: " + bi);

  sc.nextLine();

  break;

  case TEXT:

  String text = sc.next();

  out.println("Nice text there: " + text);

  sc.nextLine();

  break;

  default:

  out.println("No idea what you want bruh!");

  }

  } while (!input.equalsIgnoreCase(EXIT));

  }

  private static String getHelpString() {

  return """

  This application helps you test various usage of Scanner. Enter type to be read
  next:\

  \n\t help >  displays this help\

  \n\t exit >  leave the application\

  \n\t byte > read a byte\

  \n\t short > read a short\

  \n\t int > read an int\

  \n\t bool > read a boolean\

  \n\t double > read a double\

  \n\t line > read a line of text\

  \n\t bigint > read a BigInteger\

  \n\t text > read a text value""";

  }

  }

  清单 10-2

  使用 java.util.Scanner 在控制台中读取用户提供的值

  ```




  你可能已经注意到，在代码清单 10-2 中，大多数扫描器方法都与 `nextLine()` 方法一起调用。这是因为你提供的每个输入都由实际的令牌和一个换行符（按下**<Enter>**
  结束输入）组成，在输入下一个值之前，你也需要从流中取出该字符。


  代码清单 10-3 展示了使用代码清单 10-2 中的代码来读取一些用户输入值。


  ```

  This application helps you test various usage of Scanner. Enter type to be read
  next:

  help >  displays this help

  exit >  leave the application

  byte > read a byte

  short > read a short

  int > read an int

  bool > read a boolean

  double > read a double

  line > read a line of text

  bigint > read a BigInteger

  text > read a text value

  Enter option: byte


  Nice byte there: 12

  Enter option: bool

  true

  Nice boolean there: true

  Enter option: line

  some of us are hardly ever here

  Nice line of text there: some of us are hardly ever here

  Enter option: text

  john

  Nice text there: john

  Enter option: text

  the rest of us are made to disappear...

  Nice text there: the

  Enter option: double

  4.2

  Nice double there: 4.2

  Enter option: int

  AAAA

  Exception in thread "main" java.util.InputMismatchException

  at java.base/java.util.Scanner.throwFor(Scanner.java:939)

  at java.base/java.util.Scanner.next(Scanner.java:1594)

  at java.base/java.util.Scanner.nextInt(Scanner.java:2258)

  at java.base/java.util.Scanner.nextInt(Scanner.java:2212)ReadingUsingConsoleDemo

  at chapter.ten.scanner/com.apress.bgn.ten.ReadingFromStdinUsingScannerDemo.main(ReadingFromStdinUsingScannerDemo.java:80)

  代码清单 10-3

  运行 ReadingFromStdinUsingScannerDemo 类

  ```


  代码清单 10-3 中高亮显示的输出代表了 `next()` 方法的测试用例。此方法应用于读取单个 `String` 令牌。下一个令牌会被转换为一个 `String`
  实例，显然，当遇到空白字符时令牌就会结束。这就是为什么在示例中，唯一读取到的文本是：*the*。在示例的最后一个案例中，预期的选项是一个整数值，但输入了 *AAAA*，这就是抛出异常的原因。


  当你需要从控制台重复读取相同类型的值时，可以先窥探要读取的值并在读取前进行检查，以避免抛出 `InputMismatchException`。针对这种特定场景，每个
  `next*()` 方法都有一对名为 `hasNext*()` 的方法。为了展示如何使用这些方法，让我们在代码清单 10-3 的代码中添加一个选项，使其能够读取一个
  `Long` 值列表，如代码清单 10-4 所示。


  ```

  //...

  public static final String LONGS = "longs";

  //...

  String input;

  do {

  System.out.print("Enter option: ");

  input = sc.nextLine();

  switch (input) {

  case LONGS:

  List longList = new ArrayList();

  while (sc.hasNextLong()) {

  longList.add(sc.nextLong());

  }

  System.out.println("Nice long list there: " + longList);

  // else all done

  sc.nextLine();

  sc.nextLine();

  break;

  default:

  System.out.println("No idea what you want bruh!");

  }

  } while (!input.equalsIgnoreCase(EXIT));

  //...

  代码清单 10-4

  使用 java.util.Scanner 读取 long 值列表

  ```


  虽然看起来有些奇怪，但我们需要连续调用两次 `nextLine()` 方法：一次用于处理无法转换为 `long` 的字符，以便 `while` 循环结束；另一次用于处理换行符，以便下一次读取的是下一个输入值的类型。


  `Scanner` 类中还有其他一些方法可用于过滤输入并仅读取所需的令牌，但本节列出的方法是你最常用的。


  ### 使用 **java.io.Console**


  `java.io.Console` 类是在 Java 1.6 版本中引入的，比 `Scanner` 晚一个版本，它提供了访问基于字符的控制台设备（如果存在）的方法，该设备与当前
  Java 虚拟机相关联。因此，`java.io.Console` 类的方法不仅可以用于读取用户输入，还可以用于向控制台写入内容。如果 JVM 是从后台进程或 Java
  编辑器启动的，则控制台将不可用，因为编辑器会将标准输入和输出流重定向到其自己的窗口。这就是为什么如果我们使用 `Console` 编写代码，只能通过在终端中运行类或
  jar 文件来测试它，调用方式如下：


  ```

  java ReadingUsingConsoleDemo.class

  ```


  或


  ```

  java -jar using-console-1.0-SNAPSHOT.jar

  ```


  JVM 的控制台（如果可用）在代码中由 `Console` 类的单个实例表示，可以通过调用 `System.console()` 获取。在图 10-2 中，你可以看到可以在
  Console 实例上调用的方法。


  ![](img/463938_3_En_10_Fig2_HTML.jpg)


  图 10-2


  用于读取各种类型数据的 Console 方法


  显然，`read*(..)` 方法用于从控制台读取用户输入，而 `printf(..)` 和 `format(..)` 用于在控制台中打印文本。这里比较特殊的是两个
  `readPassword(..)` 方法，它们允许从控制台读取文本，但在输入时不会显示。这意味着可以编写一个支持身份验证的 Java 应用程序，而无需任何实际的用户界面。代码清单
  10-5 展示了演示所有这些功能的示例代码。


  ```

  package com.apress.bgn.ten;

  import java.io.Console;

  import java.util.Calendar;

  import java.util.GregorianCalendar;

  import static java.lang.System.err;

  public class ReadingUsingConsoleDemo {

  public static void main(String[] args) {

  Console console = System.console();

  if (console == null) {

  err.println("No console found.");

  } else {

  console.writer().print("Hello there! (reply to salute)\n");

  console.flush();

  String hello = console.readLine();

  console.printf("You replied with: ''" + hello + "''\n");

  Calendar calendar = new GregorianCalendar();

  console.format("Today is : %1$tm %1$te,%1$tY\n", calendar);

  char[] passwordChar = console.readPassword("Please provide password: ");

  String password =  new String(passwordChar);

  console.printf("Your password starts with ''" + password.charAt(0) + "'' and ends
  with ''" + password.charAt(password.length()-1) + "''\n");

  }

  }

  }

  代码清单 10-5

  使用 java.io.Console 读取和写入值

  ```


  在代码清单 10-5 的示例代码中，我特意使用了各种方法来通过控制台读写数据，以向你展示它们的使用方法。`console.writer()` 方法返回一个 `java.io.PrintWriter`
  实例，可用于向控制台打印消息。需要注意的是，消息在调用 `console.flush()` 之前不会被打印出来。这意味着 `java.io.PrintWriter`
  实例可以排队多个消息，并且只有在调用 `flush()` 或其内部缓冲区已满时才会打印。


  调用 `console.format(..)` 方法用于打印格式化消息；在此例中，使用了一个 `Calendar` 实例来提取当前日期，并根据以下模板打印：`dd
  mm,yyyy`（由参数 `%1$tm %1$te,%1$tY` 定义）。`Console` 方法中使用的格式化模板在 `java.util.Formatter`
  类中定义。


  重要提示


  为了避免在运行代码时创建新的操作系统控制台窗口，大多数 IDE（包括 IntelliJ IDEA）都使用“无窗口 Java”。由于没有窗口，用户也就无法访问和输入数据的控制台。因此，使用
  `java.io.Console` 的应用程序必须在命令行中执行。




  使用 `Console` 运行 Java 应用程序最简单的方法是配置 Maven 的 `maven-jar-plugin`，创建一个可执行的 jar 包，并将主类设置为
  `ReadingUsingConsoleDemo`。Maven 生成的 jar 包位于：`/chapter10/using-console/target/using-console-3.0-SNAPSHOT.jar`。如果你想跟着操作，请在
  IntelliJ IDEA 中点击 **Terminal** 按钮打开终端，然后进入 `target` 目录。进入后，执行 `java -jar using-console-3.0-SNAPSHOT.jar`
  即可体验。在清单 10-6 中，你可以看到我用于测试程序的输入内容。


  ```

  Hello there! (reply to salute)

  hi

  You replied with: ''hi''

  Today is : 07 7,2024

  Please provide password:

  Your password starts with ''g'' and ends with ''a''

  Listing 10-6

  Running the Class ReadingUsingConsoleDemo

  ```


  本节介绍了关于使用控制台的所有值得涵盖的内容，因为一旦你开始处理真正的生产级项目，你可能永远不需要使用它。


  ## 使用 Swing 构建应用程序


  Swing 是 Java 的一个图形用户界面（GUI）小部件工具包。它自 JDK 1.2 版本起就成为其一部分，旨在为构建具有复杂界面的用户应用程序提供更美观、更实用的组件。Swing
  提供了各种类型的按钮、进度条、可选列表等。Swing 基于早期版本的**抽象窗口工具包（AWT）**，这是原始的 Java GUI 小部件工具包。AWT 非常基础，拥有一套在任何平台上都可用的
  GUI 组件。这意味着 AWT 是可移植的，但这并不表示在一个平台上编写的 AWT 代码实际上能在另一个平台上运行，因为存在平台特定的限制。AWT 组件依赖于原生操作系统的等效组件，因此它们被称为*重量级*组件。在图
  10-3 中，你可以看到一个简单的 Java AWT 应用程序。


  ![](img/463938_3_En_10_Fig3_HTML.jpg)


  图 10-3


  简单的 Java AWT 应用程序


  该应用程序是一个简单的窗口，包含一个列表、一个文本区域和一个按钮。该应用程序的主题（也称为*外观和感觉*）与其构建时所用的操作系统（本章示例中为 macOS）相同。主题无法更改，因为
  AWT 直接调用了操作系统的原生 GUI。如果你在 Windows 机器上运行相同的代码，窗口看起来会不同，因为它会使用 Windows 主题。


  Swing 组件是用 Java 构建的，遵循 AWT 模型，但它们提供了可插拔的外观和感觉。Swing 完全用 Java 实现，包含了 AWT 的所有特性，但不再依赖于原生
  GUI；这就是它们被称为*轻量级*组件的原因。Swing 提供了 AWT 的所有功能，并通过更高级的组件（如树视图、列表框和选项卡面板）扩展了组件集。外观和感觉以及主题都是可插拔的，并且可以轻松更改。这显然意味着
  Swing 应用程序比 AWT 应用程序更具可移植性，也意味着可以编写具有更复杂设计且不依赖特定平台的组件。自从 Swing 作为 AWT 的替代方案被引入以来，其上的开发工作已经进行了很多。


  当 Web 应用程序兴起时，它们的用户界面非常基础，因为浏览器的功能相当有限。AWT 被引入用于构建看起来更好且具有动态性的 Java Web 应用程序，称为**applet**。Java
  applet 是从浏览器启动的小型应用程序，然后在用户操作系统上安装的 JVM 中执行，其进程与浏览器本身分离。这就是为什么 applet 可以在网页的框架中、在新的应用程序窗口中或专为测试
  applet 设计的独立工具中运行。Java applet 使用操作系统的 GUI，这使得它们比当时 HTML 笨重的初始外观更漂亮。Java applet 现已弃用，并在
  Java 11 中被移除。


  至于用 Swing 或 AWT 编写的 Java 桌面应用程序，现在已经很少使用了；你可能会在编程课上学习如何构建一个，但除此之外，它们已经相当……古老了。尽管如此，一些机构和公司仍然使用基于
  Swing 构建的遗留应用程序。例如，我见过餐厅使用 Swing 应用程序来管理餐桌和订单，而且我认为大多数超市都使用 Swing 应用程序来管理商品。本书包含本节不仅是因为你最终可能会从事维护此类应用程序的工作（在这种情况下，了解基础知识是好的），而且还因为
  Swing 仍然是 JDK 的一部分。所有 Swing 组件（AWT 也是）都是 `java.desktop` 模块的一部分。因此，如果你想使用 Swing 组件，你必须声明对该模块的依赖。清单
  10-7 展示了一个配置片段，其中我们使用 Swing 的项目模块在其 `module-info.java` 文件中通过 `requires` 指令声明了对 `java.desktop`
  模块的依赖。


  ```

  module chapter.ten.swing {

  requires java.desktop;

  }

  Listing 10-7

  Module Configuration for the using-swing Project

  ```


  图 10-3 中描绘的应用程序是使用 AWT 构建的。本节将介绍如何在 Swing 中构建类似的东西，并添加更多组件。任何 Swing 应用程序的主类都命名为
  `JFrame`，该类型的实例用于创建带有边框和标题的窗口。清单 10-8 中的代码正是实现了这一点。


  ```

  package com.apress.bgn.ten;

  import javax.swing.*;

  import java.awt.*;

  public class BasicSwingDemo extends JFrame {

  public static void main(String... args) {

  BasicSwingDemo swingDemo = new BasicSwingDemo();

  swingDemo.setTitle("Swing Demo Window");

  swingDemo.setSize(new Dimension(500,500));

  swingDemo.setVisible(true);

  }

  }

  Listing 10-8

  Basic Swing Demo Class

  ```


  清单 10-8 中的代码创建了一个 `javax.swing.JFrame` 实例，为其设置了标题，并设置了大小，以便在创建窗口时我们实际上能看到一些东西。要实际显示窗口，必须在
  `JFrame` 实例上调用 `setVisible(true)`。运行上述代码会显示一个如图 10-4 所示的窗口。


  ![](img/463938_3_En_10_Fig4_HTML.jpg)


  图 10-4


  简单的 Java Swing 应用程序


  默认情况下，窗口位于主显示器的左上角，但你可以使用一些 Swing 组件来计算相对于屏幕大小的位置来更改它。确定 Swing 窗口相对于屏幕大小的尺寸和位置仅受你愿意投入的数学计算量的限制。


  此时，如果我们关闭显示的窗口，应用程序会继续运行。默认情况下，关闭窗口只是通过调用 `setVisible(false)` 使其不可见。如果我们想将默认行为更改为退出应用程序，我们必须更改关闭时执行的默认操作。这可以通过在创建
  `JFrame` 实例后添加以下代码行轻松实现：


  ```

  swingDemo.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);

  ```


  `JFrame.EXIT_ON_CLOSE` 常量是一组定义窗口关闭时应用程序行为的常量之一。`JFrame.EXIT_ON_CLOSE` 用于声明应用程序应在窗口关闭时退出。其他相关选项包括：


  *   `DO_NOTHING_ON_CLOSE`：不执行任何操作，包括关闭窗口。


  *   `HIDE_ON_CLOSE`：默认选项，会导致调用 `setVisible(false)`。


  *   `DISPOSE_ON_CLOSE`：一个应用程序可以有多个窗口；此选项用于在最后一个可显示窗口关闭时退出应用程序。




  大多数 Swing 应用程序通过扩展 `JFrame` 类来编写，以便对其组件获得更多控制权，因此前面的代码也可以写成清单 10-9 所示的形式。


  ```

  package com.apress.bgn.ten;

  import javax.swing.*;

  import java.awt.*;

  public class ExitingSwingDemo extends JFrame {

  public static void main(String... args) {

  ExitingSwingDemo swingDemo = new ExitingSwingDemo();

  swingDemo.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);

  swingDemo.setTitle("Swing 演示窗口");

  swingDemo.setSize(new Dimension(500,500));

  swingDemo.setVisible(true);

  }

  }

  清单 10-9

  关闭时退出的 Swing 应用程序

  ```


  现在我们已经有了一个窗口，接下来开始添加组件，因为如果没有更多组件来观察变化，改变外观和风格就毫无意义。每个 Swing 应用程序至少有一个 `JFrame`
  作为根窗口，它是所有其他窗口的父窗口，因为窗口也可以通过 `JDialog` 类来创建。`JDialog` 是创建对话框窗口的主要类，这是一种特殊类型的窗口，通常包含消息和用于选择选项的按钮。开发者可以使用这个类创建自定义对话框窗口，或者使用
  `JOptionPane` 类的方法来创建各种对话框窗口。


  回到向 `JFrame` 实例添加组件的话题：组件是通过添加到其容器中来添加到 `JFrame` 的。可以通过调用 `getContentPane()` 获取对
  `JFrame` 容器的引用。默认的内容面板是一个简单的中间容器，它继承自 `JComponent`，而 `JComponent` 又扩展了 `java.awt.Container`（Swing
  是 AWT 的扩展，其大部分组件都是 AWT 的扩展）。对于 `JFrame`，默认的内容面板实际上是 `JPanel` 的一个实例。这个类有一个类型为 `java.awt.LayoutManager`
  的字段，用于定义其他组件在 `JPanel` 中的排列方式。`JFrame` 实例的默认内容面板使用 `java.awt.BorderLayout` 作为其布局管理器，它将面板划分为五个区域：EAST、WEST、NORTH、SOUTH
  和 CENTER。每个区域都可以通过 `BorderLayout` 中定义的匹配名称常量来引用。


  因此，如果我们想为应用程序添加一个退出按钮，可以将其添加到 SOUTH 区域，代码如下清单 10-10 所示。


  ```

  package com.apress.bgn.ten;

  import javax.swing.*;

  import java.awt.*;

  import java.awt.event.ActionEvent;

  import java.awt.event.ActionListener;

  public class LayeredSwingDemo extends JFrame {

  private JPanel mainPanel;

  private JButton exitButton;

  public LayeredSwingDemo(String title) {

  super(title);

  mainPanel = (JPanel) this.getContentPane();

  exitButton = new JButton("再见！");

  exitButton.addActionListener(new ActionListener() {

  @Override

  public void actionPerformed(ActionEvent e) {

  System.exit(0);

  }

  });

  mainPanel.add(exitButton, BorderLayout.SOUTH);

  }

  public static void main(String... args) {

  LayeredSwingDemo swingDemo = new LayeredSwingDemo("Swing 演示窗口");

  swingDemo.setDefaultCloseOperation(JFrame.DO_NOTHING_ON_CLOSE);

  swingDemo.setSize(new Dimension(500, 500));

  swingDemo.setVisible(true);

  }

  }

