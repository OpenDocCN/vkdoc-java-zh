  代码清单 4-31\n在 super(..) 调用前包含语句的构造函数\n```\n\n`Actor` 类也可以重写为继承自抽象类 `Human`。本书源码中提供了一个实现方案，但建议您在查看\
  \ `classes` 包之前先尝试自己编写。\n\n图 4-8 展示了由 IntelliJ IDEA 生成的 `Human` 类层次结构。为简化图像，方法已被省略。\n\
  \n![](img/463938_3_En_4_Fig8_HTML.jpg)\n\n图 4-8\n\nIntelliJ IDEA 生成的 UML 图\n\nUML\
  \ 图清晰地展示了每个类的成员，箭头指向超类。UML 图是设计组件层次结构和定义应用程序逻辑的有用工具。如果您想了解更多关于它们以及各种类型的 UML 图的信息，互联网上有大量免费资源可供参考^(⁴²)。\n\
  \n在介绍了这么多关于类以及如何创建对象的内容之后，我们需要介绍其他重要的 Java 组件，这些组件可用于创建更详细的对象。我们的 `Human` 类缺少不少属性，例如\
  \ `gender`。用于建模个人性别的字段只能取固定集合中的值。过去它可能仅限于两种，但在当今世界，我们不能将性别的值集限制为两种，因此我们将引入第三种，称为\
  \ `UNSPECIFIED`，用于替代个人认同的任何性别。这意味着我们必须引入一个新的类来表示性别，并且该类只能被实例化三次。使用普通类来实现这一点会相当棘手，这就是为什么在\
  \ Java 1.5 版本中引入了 `enums`（枚举）。\n\n\n\n#### 枚举\n\n`enum`类型是一种特殊的类类型。它用于定义一种只能被实例化固定次数的特殊类。枚举声明将所有该枚举的实例组合在一起，它们都是常量。因此，`Gender`枚举可以像清单\
  \ 4-32 所示那样定义。\n\n```\npackage com.apress.bgn.four.classes;\npublic enum Gender\
  \ {\nFEMALE,\nMALE,\nUNSPECIFIED\n}\n清单 4-32\nGender 枚举\n```\n\n枚举无法在外部被实例化。枚举默认是`final`的，因此它不能被继承。还记得\
  \ Java 中每个类默认都隐式继承`Object`类吗？Java 中的每个枚举都隐式继承抽象类`java.lang.Enum<E>`，这样一来，每个枚举实例都继承了在使用枚举编写代码时非常有用的特殊方法。\n\
  \n作为一种特殊的类类型，`enum`可以拥有字段和一个只能为私有的构造函数，因为枚举实例不能在外部创建。`private`修饰符无需显式声明，因为编译器知道该怎么做。清单\
  \ 4-33 展示了通过添加一个整数型字段（表示每种性别的数值表示）和一个`String`型字段（表示文本表示）来实现的`Gender`枚举。当然，要访问枚举的属性，需要\
  \ getter 方法。\n\n```\npackage com.apress.bgn.four.classes;\npublic enum Gender {\n\
  FEMALE(1, \"f\"),\nMALE(2, \"m\"),\nUNSPECIFIED(3, \"u\");\nprivate int repr;\n\
  private String descr;\nprivate Gender(int repr, String descr) {\nthis.repr = repr;\n\
  this.descr = descr;\n}\npublic int getRepr() {\nreturn repr;\n}\npublic String getDescr()\
  \ {\nreturn descr;\n}\n}\n清单 4-33\n一个更复杂的 Gender 枚举\n```\n\n警告\n\n但是等等，有什么能阻止我们也声明\
  \ setter 方法并修改字段值呢？嗯，没什么能阻止。如果这正是你需要做的，你可以这样做，**但这并非良好实践**（实际上这非常糟糕）。\n\n枚举实例应该是常量。因此，正确的枚举设计不应声明\
  \ setter 方法，并且应通过将字段声明为`final`来确保它们的值永远不会被更改。当我们这样做时，字段初始化的唯一方式就是通过调用构造函数，而由于构造函数不能在外部调用，我们数据的完整性就得到了保证。一个良好枚举设计的示例如清单\
  \ 4-34 所示。\n\n```\npackage com.apress.bgn.four.classes;\npublic enum Gender {\n\
  FEMALE(1, \"f\"),\nMALE(2, \"m\"),\nUNSPECIFIED(3, \"u\");\nprivate final int repr;\n\
  private final String descr;\nprivate Gender(int repr, String descr) {\nthis.repr\
  \ = repr;\nthis.descr = descr;\n}\npublic int getRepr() {\nreturn repr;\n}\npublic\
  \ String getDescr() {\nreturn descr;\n}\n}\n清单 4-34\n正确的 Gender 枚举\n```\n\n可以向枚举中添加方法，并且每个实例都可以重写这些方法。因此，如果我们向`Gender`枚举添加一个名为`comment()`的方法，每个实例都会继承它。但实例可以重写它，如清单\
  \ 4-35 所示。\n\n```\npackage com.apress.bgn.four.classes;\npublic enum Gender {\n\
  FEMALE(1, \"f\"),\nMALE(2, \"m\"),\nUNSPECIFIED(3, \"u\") {\n@Override\npublic String\
  \ comment() {\nreturn \"待定: \" + getRepr() + \", \" + getDescr();\n}\n};\nprivate\
  \ final int repr;\nprivate final String descr;\nGender(int repr, String descr) {\n\
  this.repr = repr;\nthis.descr = descr;\n}\n// getter 方法已省略\npublic String comment()\
  \ {\nreturn repr + \": \" + descr;\n}\n}\n清单 4-35\n展示枚举项类的代码示例\n```\n\n重要\n\n那么，一个实例怎么可能重写其类类型的方法呢？它不能。`UNSPECIFIED`枚举值实际上是一个类的实例，该类扩展了`Gender`类并重写了`comment()`方法。\n\
  \n这一点可以通过遍历枚举值并打印从`Object`类继承的`getClass()`方法返回的结果来轻松证明，该方法返回对象的运行时类型。要获取一个枚举的所有实例，每个枚举都隐式扩展的`java.lang.Enum<E>`类提供了一个名为`values()`的方法。清单\
  \ 4-36 展示了执行此操作的代码及其输出。\n\n```\npackage com.apress.bgn.four.classes;\npublic class\
  \ BasicHumanDemo {\npublic static void main(String... args) {\nfor (Gender value\
  \ : Gender.values()) {\nSystem.out.println(value.name() + \": \" + value.getClass());\n\
  System.out.println(\"\\tcomment : \" + value.comment());\n}\n}\n}\n// 控制台预期输出\n\
  /*\nFEMALE: class com.apress.bgn.four.classes.Gender\ncomment : 1: f\nMALE: class\
  \ com.apress.bgn.four.classes.Gender\ncomment : 2: m\nUNSPECIFIED: class com.apress.bgn.four.classes.Gender$1\n\
  comment : 待定: 3, u\n*/\n清单 4-36\n带有额外方法的正确 Gender 枚举\n```\n\n注意为`UNSPECIFIED`元素打印的值。`Gender$1`这种表示法意味着编译器通过扩展原始枚举类并重写`comment()`方法（使用在`UNSPECIFIED`元素声明中提供的方法）创建了一个内部类。\n\
  \n在未来的示例中，我们也会继续使用枚举。只需记住，无论何时你需要将类的实现限制为固定数量的实例，或者将相关常量组合在一起，枚举就是你要使用的工具。现在我们已经介绍了枚举，我们的`Human`类可以拥有一个`Gender`类型的字段，如清单\
  \ 4-37 所示。\n\n```\npackage com.apress.bgn.four.classes;\npublic abstract class Human\
  \ {\npublic static final int LIFESPAN = 100;\nprotected String name;\nprotected\
  \ int age;\nprotected float height;\nprivate Gender gender;\npublic Human(String\
  \ name, int age, Gender gender) {\nthis.name = name;\nthis.age = age;\nthis.gender\
  \ = gender;\n}\npublic Human(String name, int age, float height, Gender gender)\
  \ {\nthis(name, age, gender);\nthis.height = height;\n}\n// 其他代码已省略\npublic Gender\
  \ getGender() {\nreturn gender;\n}\npublic void setGender(Gender gender) {\nthis.gender\
  \ = gender;\n}\n}\n清单 4-37\n带有 Gender 字段的 Human 类\n```\n\n在前面的章节中，**接口**被提及为用于创建对象的\
  \ Java 组件之一。现在是时候深入探讨这个主题了。\n\n\n\n#### 接口\n\n重要提示\n\n对于有志成为 Java 程序员的人来说，最常见的面试问题之一就是*接口和抽象类有什么区别？*\
  \ 本节将为你提供这个问题最详细的答案。\n\n**接口**不是类，但它确实有助于创建类。接口是完全抽象的，这意味着它没有字段，只有抽象方法定义。我也喜欢称它们为*骨架*。当一个类被声明为实现一个接口时，除非该类是抽象的，否则它必须为所有骨架方法提供具体的实现。\n\
  \n重要提示\n\n*骨架方法*这个名称在 Java 8+ 版本中相当重要，因为从这个版本开始，接口得到了丰富，`static`、`default` 和 `private`\
  \ 方法可以成为接口的一部分。\n\n接口内部的骨架方法隐式地是 `public` 和 `abstract` 的，因为骨架方法必须是抽象的，以强制类提供实现，并且必须是公开的，以便类实际上能够访问并实现它们。\n\
  \n在 Java 8 之前，接口中唯一具有具体实现的方法是 `static` 方法。在 Java 8 中，引入了接口中的 *default* 方法。在 Java\
  \ 9 中，引入了接口中的 **private** 方法。接口不能被实例化，因为它们没有构造函数。\n\n不声明任何方法定义的接口被称为*标记*接口，其目的是为特定目的标记类。最著名的\
  \ Java 标记接口是 `java.io.Serializable`，它标记了可以被序列化的对象，这样它们的状态就可以保存到二进制文件或其他数据源，并通过网络发送以进行反序列化和使用。\n\
  \n接口可以在其自己的文件中作为顶层组件声明，也可以嵌套在另一个组件内部。接口有两种类型：*普通*接口和**注解**。\n\n抽象类和接口之间的区别，以及何时应该使用其中一种，在**继承**的上下文中变得尤为重要。\n\
  \n重要提示\n\nJava 只支持单继承。这意味着一个类只能有一个超类。\n\n单继承可能看起来像是一个限制，但请考虑以下示例。让我们修改之前的层次结构，想象一个名为\
  \ `Performer` 的类，它应该继承 `Musician` 和 `Actor` 类。如果你需要一个可以用这个类建模的真实人物，可以想想大卫·杜楚尼，他既是演员又是音乐家。\n\
  \n图 4-9 描绘了前面提到的类层次结构。\n\n![](img/463938_3_En_4_Fig9_HTML.jpg)\n\n图 4-9\n\n菱形类层次结构\n\
  \n这个类层次结构引入了所谓的*菱形问题*，这个名称显然是由类之间关系形成的形状所启发。这个设计到底有什么问题？如果 `Musician` 和 `Actor`\
  \ 都继承自 `Human` 并继承了它的所有成员，那么 `Performer` 将继承什么，又从何处继承？因为它显然不能两次继承 `Human` 的成员，那会使这个类变得无用且无效。而且我们如何区分具有相同签名的方法？那么\
  \ Java 中的解决方案是什么？正如你可能想象到的，考虑到本节的重点：接口。*（嗯，某种程度上是这样，因为大多数时候需要接口和一个名为* ***组合*** *的编程概念相结合。）*\n\
  \n需要做的是将 `Musician` 和 `Actor` 类中的方法转变为方法骨架，并将这些类转变为接口。`Musician` 类中的行为将被移到一个名为（比如说）`Guitarist`\
  \ 的类中，这个类将继承 `Human` 类并实现 `Musician` 接口。对于 `Actor` 类，可以做一些类似的事情，但我把这个留作你的练习。图 4-10\
  \ 中的层次结构应该能提供一些帮助。\n\n![](img/463938_3_En_4_Fig10_HTML.jpg)\n\n图 4-10\n\n`Performer`\
  \ 类的 Java 接口层次结构\n\n因此，`Musician` 接口只包含映射音乐家行为的方法骨架。它不深入细节来建模如何做。`Actor` 接口也是如此。在代码清单\
  \ 4-38 中，你可以看到这两个接口的主体。\n\n```\npackage com.apress.bgn.four.interfaces;\nimport\
  \ java.util.List;\ninterface Musician {\nString getMusicSchool();\nvoid setMusicSchool(String\
  \ musicSchool);\nList getSongs();\nvoid setSongs(List songs);\nString getGenre();\n\
  void setGenre(String genre);\n}\ninterface Actor {\nString getActingSchool();\n\
  void setActingSchool(String actingSchool);\nList getFilms();\nvoid setFilms(List\
  \ films);\nvoid addFilm(String filmName);\n}\n代码清单 4-38\nMusician 和 Actor 接口\n```\n\
  \n如你所见，字段已被移除，因为它们不能成为接口的一部分；只保留了方法骨架。\n\n注意\n\n在某些代码示例中，一个文件中声明了多个类，该文件以其中唯一的公共类命名。之所以这样选择，是因为这些类的主体很小，将它们分散到多个文件中没有意义。\n\
  \n`Performer` 类如代码清单 4-39 所示。\n\n```\npackage com.apress.bgn.four.interfaces;\n\
  import com.apress.bgn.four.classes.Gender;\nimport com.apress.bgn.four.classes.Human;\n\
  import java.util.List;\npublic class Performer extends Human implements Musician,\
  \ Actor {\n// 音乐家特有的字段\nprivate String musicSchool;\nprivate String genre;\nprivate\
  \ List songs;\n// 演员特有的字段\nprivate String actingSchool;\nprivate List films;\npublic\
  \ Performer(String name, int age, float height, Gender gender) {\nsuper(name, age,\
  \ height, gender);\n}\n// 来自 Human\n@Override\npublic int getTimeToLive() {\nreturn\
  \ (LIFESPAN - getAge()) / 2;\n}\n// 来自 Musician\n@Override\npublic String getMusicSchool()\
  \ {\nreturn musicSchool;\n}\n// 来自 Musician\n@Override\npublic void setMusicSchool(String\
  \ musicSchool) {\nthis.musicSchool = musicSchool;\n}\n// 来自 Actor\n@Override\npublic\
  \ String getActingSchool() {\nreturn actingSchool;\n}\n// 来自 Actor\n@Override\n\
  public void setActingSchool(String actingSchool) {\nthis.actingSchool = actingSchool;\n\
  }\n// 其他方法已省略\n}\n代码清单 4-39\n实现两个接口的 Performer 类\n```\n\n重要提示\n\n你必须从这个例子中理解的是，通过使用接口，Java\
  \ 在某种程度上可以实现多重继承，并且**类只能继承一个类，但可以实现一个或多个接口**。\n\n在某些情况下，你可能需要编写一个实现多个接口的类，而这些接口可能声明了相似的方法骨架。如果方法骨架具有相同的签名，解决方案很简单：一个实现就足够了。如果签名差异足够大，则需要为每个方法提供各自的实现。\n\
  \n如果骨架相似到足以混淆编译器，最好避免继承，而选择诸如组合之类的解决方案。\n\n继承也适用于接口。例如，`Musician` 和 `Actor` 接口都可以继承一个名为\
  \ `Artist` 的接口，该接口包含两者共有的行为模板。例如，我们可以将音乐学校和表演学校合并为一个通用的学校，并将其 getter 和 setter 定义为方法骨架。`Artist`\
  \ 接口与 `Musician` 一起在代码清单 4-40 中展示。\n\n```\npackage com.apress.bgn.four.interfaces;\n\
  import java.util.List;\ninterface Artist {\nString getSchool();\nvoid setSchool(String\
  \ school);\n}\ninterface Musician extends Artist {\nList getSongs();\nvoid setSongs(List\
  \ songs);\nString getGenre();\nvoid setGenre(String genre);\n}\n代码清单 4-40\nArtist\
  \ 和 Musician 接口\n```\n\n\n\n希望你已经理解了多重继承的概念，以及在设计应用程序时，何时适合使用类、何时适合使用接口。因为现在是时候兑现本节开头许下的承诺，列出抽象类和接口之间的区别了。你可以在表\
  \ 4-1 中找到它们。\n\n表 4-1\n\nJava 中抽象类与接口的区别\n\n| 抽象类 | 接口 |\n| --- | --- |\n| 可以拥有非抽象方法。\
  \ | 只能拥有抽象方法、默认方法和私有方法。 |\n| 单继承：一个类只能继承一个类。 | 多重继承：一个类可以实现多个接口。此外，一个接口可以扩展一个或多个接口。\
  \ |\n| 可以拥有 final、非 final、static 和非 static 变量。 | 只能拥有 static 和 final 字段。 |\n| 使用\
  \ **abstract class** 声明。 | 使用 **interface** 声明。 |\n| 可以使用关键字 **extends** 扩展另一个类，并使用关键字\
  \ **implements** 实现接口。 | 只能使用关键字 **extends** 扩展其他接口（一个或多个）。 |\n| 可以拥有非抽象、protected\
  \ 或 private 成员。 | 所有成员默认都是 abstract 和 public（除了 default 和 private 方法）。 |\n| 如果一个类有抽象方法，它自身必须声明为\
  \ abstract。 | （无对应项。） |\n\n##### 接口中的默认方法\n\n接口的一个问题是，如果你修改其主体以添加新方法，代码将无法编译。为了使其能够编译，你必须在实现该接口的每个类中为新添加的接口方法添加具体实现。多年来，这一直是开发人员的痛点。接口是一种契约，它保证了一个类将如何表现。当你在项目中使用第三方库时，你通过设计代码来遵守这些契约。当切换到库的新版本时，如果该契约发生变化，你的代码将无法再编译。\n\
  \n提示\n\n这种情况非常类似于苹果公司从一代产品到另一代产品更改其电脑和手机的充电端口。如果你买了一台新的 Mac，并试图使用你的旧充电器，它将无法适配。\n\
  \n当然，一种解决方案是在新接口中声明新方法，然后创建同时实现新接口和旧接口的新类（这被称为**组合**，因为两个接口组合在一起代表一个单一的契约）。接口暴露的方法构成了应用程序编程接口（API），在开发应用程序时，目标是设计出具有稳定\
  \ API 的应用程序。这一规则由名为“开闭原则”的编程原则描述，该原则是五大 SOLID 编程原则之一 ^(⁴³)。该原则指出，你应该能够在不修改类的情况下扩展它。因此，修改类所实现的接口也需要修改该类。所以，修改接口往往会导致违反这一原则。\n\
  \n除了前面提到的接口组合之外，在 Java 8 中引入了一种解决方案：**默认方法**。从 Java 8 开始，只要使用 `default` 关键字声明，就可以在接口中声明具有完整实现的方法。\n\
  \n让我们考虑一下 `Artist` 接口。任何自称艺术家的人都应该能够创造一些东西，对吧？所以艺术家应该具有创造性。鉴于我们所处的世界，我不会提及名字，但有些艺术家实际上是产业的产物，因此他们本身并不具有创造性。所以，在我们决定了图\
  \ 4-11 中描绘的层次结构之后，才意识到我们应该有一个方法来告诉我们一个艺术家是否具有创造性。\n\n![](img/463938_3_En_4_Fig11_HTML.jpg)\n\
  \n图 4-11\n\n为 `Performer` 类添加了更多接口的 Java 层次结构\n\n如果我们向 `Artist` 接口添加一个新的抽象方法，`Performer`\
  \ 类将无法编译。IntelliJ IDEA 会通过显示大量红色下划线来明确表明我们的应用程序不再工作，如图 4-12 所示。\n\n![](img/463938_3_En_4_Fig12_HTML.jpg)\n\
  \n图 4-12\n\n由于接口中的新方法导致 Java 层次结构被破坏\n\n我们看到的编译器错误是由于我们决定向 `Artist` 接口添加一个名为 `isCreative`\
  \ 的新抽象方法造成的，如果你将鼠标悬停在类声明上，你甚至可以看到原因。清单 4-41 描述了破坏代码的抽象方法。\n\n```\npackage com.apress.bgn.four.hierarchy;\n\
  public interface Artist {\nString getSchool();\nvoid setSchool(String school);\n\
  boolean isCreative();\n}\n清单 4-41\n添加到 Artist 接口的新骨架方法\n```\n\n为了消除编译错误，我们将 `isCreative`\
  \ 方法骨架转换为一个返回 `true` 的 `default` 方法，因为每个艺术家都应该是具有创造性的。默认方法默认是 public 的，因此可以在实现声明该方法的接口的任何类型的对象上调用它们。清单\
  \ 4-42 描述了默认方法的主体。\n\n```\npackage com.apress.bgn.four.hierarchy;\npublic interface\
  \ Artist {\nString getSchool();\nvoid setSchool(String school);\ndefault boolean\
  \ isCreative() {\nreturn true;\n}\n}\n清单 4-42\n添加到 Artist 接口的新 default 方法\n```\n\
  \n现在代码应该可以再次编译了。默认方法非常实用，因为它们允许修改接口所代表的契约，而无需强制修改实现该接口的现有类。这将确保与为旧版本接口编写的代码保持二进制兼容性。\n\
  \n实现包含默认方法的接口的类可以使用现有的默认实现，或者为默认方法提供新的实现（可以覆盖它们）。为了说明这一点，清单 4-43 中名为 `MiliVanili`\
  \ 的类为 `Artist` 接口中的默认方法提供了一个新的实现。\n\n```\npackage com.apress.bgn.four.hierarchy;\n\
  import java.util.List;\npublic class MiliVanili implements Artist {\n@Override\n\
  public boolean isCreative() {\nreturn false; // 哎呀！\n}\n// 其他代码已省略\n}\n清单 4-43\n\
  在实现 Artist 接口的类中覆盖默认方法\n```\n\n扩展其他接口的接口可以编写为执行以下任何操作（为了更清晰，被扩展的接口将被称为超接口）：\n\n\
  *   声明自己的抽象方法和默认方法。\n\n*   将超接口中的默认方法重新声明为抽象方法，这强制扩展此接口的类提供实现。\n\n*   重新定义超接口中的默认方法。\n\
  \n*   声明一个默认方法，为超接口中的抽象方法提供实现。\n\n提示\n\n为所有这些场景提供代码示例对于一本 Java 绝对初学者书籍来说可能有点过多。如果你有兴趣查看代码的样子并测试这些说法的有效性，请查看\
  \ `com.ampress.bgn.four.interfaces.extensions` 包中的内容。\n\n\n\n##### 接口中的静态方法与常量\n\
  \n从 Java 1 到 Java 8 版本，接口只能包含抽象方法和静态常量。接口在 Java 8 中发生了变化，最重要的变化是支持 `default` 和 `private`\
  \ 方法。\n\n*常量*，即初始化后永不改变的变量，不需要实现，因此允许开发者在接口主体中声明它们，这很合理，对吧？当然，你也可以使用枚举来实现同样的目的，但有时你可能希望将相关组件放在一起。在之前的示例中，我们在\
  \ `Human` 类中声明了一个 `LIFESPAN` 常量。由于任何实现 `Artist` 的类都可能需要 `LIFESPAN` 来进行某种计算，我们可以将这个常量移到\
  \ `Artist` 接口中，并在任何类中使用它，如代码清单 4-44 所示。\n\n```\npackage com.apress.bgn.four.hierarchy;\n\
  interface Artist {\npublic static final int LIFESPAN = 100;\n// 其他代码省略\n}\npublic\
  \ class Performer extends Human implements Musician, Actor {\n@Override\npublic\
  \ int getTimeToLive() {\nreturn (LIFESPAN - getAge()) / 2;\n}\n// 其他代码省略\n}\n代码清单\
  \ 4-44\nArtist 接口中的常量 LIFESPAN\n```\n\n在接口中声明常量时，三个访问修饰符 `public`、`static` 和 `final`\
  \ 是多余的，因为它们是隐含的。每个修饰符的解释相当简单：\n\n*   接口不能有可变字段，因此默认情况下它们必须是 `final` 的。\n*   由于接口无法实例化，它们不能拥有会成为实例属性的字段，因此它们必须是\
  \ `static` 的。\n*   由于接口主体中的任何内容都必须能被实现类访问，因此它们必须是 `public` 的。\n\n至于接口中的静态方法，它们通常是工具方法，专门用于接口所属层次结构中的特定操作。让我们添加一个静态方法，检查作为参数提供的名称是否大写，如果不是则将其大写。\n\
  \n代码如代码清单 4-45 所示，其中 `capitalize` 方法在 `Artist` 接口中声明，并在 `Performer` 类中使用。\n\n```\n\
  package com.apress.bgn.four.hierarchy;\ninterface Artist {\npublic static String\
  \ capitalize(String name) {\nCharacter c = name.charAt(0);\nif (Character.isLowerCase(c))\
  \ {\nCharacter upperC = Character.toUpperCase(c);\nname.replace(c, upperC);\n}\n\
  return name;\n}\n// 其他代码省略\n}\npublic class Performer extends Human implements Musician,\
  \ Actor {\npublic String getCapitalizedName() {\nreturn Artist.capitalize(this.name);\n\
  }\n// 其他代码省略\n}\n代码清单 4-45\n接口中的公共静态方法\n```\n\n在 Java 8 中，任何带有方法体且未声明为 `default`\
  \ 的方法都必须声明为 `public` 和 `static`，原因如前所述。如果 `default` 或 `static` 方法共享大量代码，那么可以用一个\
  \ `default` 或 `static` 方法将这些代码分组，并让其他方法调用它，对吧？唯一的问题出现在需要将这些代码设为私有的时候。这在 Java 8 中是不可能的，因为接口主体中的所有内容默认都是\
  \ `public` 的。但在 Java 9 中，这成为了可能。\n\n##### 接口中的私有方法\n\n从 Java 9 开始，接口中引入了对 `private`\
  \ 和 `private static` 方法的支持。做出这一决定的原因（你可能已经猜到）是为了促进接口内的代码复用，并封装那些不应在接口实现之间共享的代码。这意味着，默认方法\
  \ `isCreative()` 执行的操作可以被修改，通过调用一个 `private` 方法来记录返回值的解释。为了让这个示例更完整，让我们添加一个 `private\
  \ static` 方法来打印当前系统日期，如代码清单 4-46 所示。\n\n```\npackage com.apress.bgn.four.hierarchy;\n\
  interface Artist {\ndefault boolean isCreative() {\nexplain();\nreturn true;\n}\n\
  private void explain() {\nlog();\nSystem.out.println(\"真正的艺术家具有创造性天赋。\");\n}\nprivate\
  \ static void log() {\nSystem.out.println(\"[日志] 检查创造力时间：\" + new Date());\n}\n\
  /**\n* 是的，这是允许的，你可以运行它。 ;)\n*/\npublic static void main() {\nArtist artist =  new\
  \ Performer(\"迈尔斯·肯尼迪\", 54, 1.8F, Gender.MALE);\nartist.isCreative();\n}\n}\n//\
  \ 输出\n//[日志] 检查创造力时间：Wed May 08 17:45:15 BST 2024\n//真正的艺术家具有创造性天赋。\n代码清单 4-46\n\
  添加到 Artist 接口的新私有方法\n```\n\n以下是关于接口私有方法的最后几点思考：\n\n*   私有方法只能在其声明的接口内部访问，因此应编写它们来包含敏感代码，这些代码你不希望被任何其他类或接口访问。\n\
  *   由于是私有的，它们不能被继承，也不能被重写。\n*   由此带来的一个后果是，私有方法不能是抽象的。\n\n在实际项目开发中，你会发现自己会使用类、接口、枚举等。如何设计和组织代码取决于你。只需确保避免重复，保持代码整洁、低耦合且可测试。\n\
  \n\n\n#### 记录（Records）\n\nJava 的 `record` 是一种特殊的类类型，具有清晰的语法，用于定义不可变的数据类。Java 编译器会处理你的记录代码，并自动生成构造器、getter\
  \ 方法以及其他专用方法，例如 `toString()`、`hashCode()` 和 `equals()`。\n\n信息\n\n`hashCode()` 和\
  \ `equals()` 这两个专用方法定义在 `Object` 类中，因此它们隐式地存在于每一个 Java 类中。它们在确立实例的身份标识方面非常重要，相关内容将在**第**\
  \ **5** **章**的**集合**部分进行介绍。\n\nJava 记录是在 JDK 14 中作为预览特性引入的，这远在其他编程语言（如 C#、Scala\
  \ 或 Kotlin）引入类似类型构造之后。在此之前，Java 开发者通过使用诸如 Lombok 之类的库来避免编写大量样板代码的麻烦。本章的**封装数据**部分已经提到了\
  \ Lombok，同时也列出了使用它的一些缺点。\n\nLombok 要求使用特殊的注解来标注类，这些注解会告知其注解处理器在编译时生成所需的字节码。它能够生成现在通过\
  \ Java 记录所支持的所有组件。\n\n清单 4-47 展示了如何使用 Lombok 编写 `Human` 类。\n\n```\npackage com.apress.bgn.four.lombok;\n\
  import com.apress.bgn.four.classes.Gender;\nimport lombok.*;\n@NoArgsConstructor\n\
  @AllArgsConstructor\n@RequiredArgsConstructor\n@ToString\n@EqualsAndHashCode\npublic\
  \ class Human {\n@Getter\n@Setter\n@NonNull\nprivate String name;\n@Getter\n@Setter\n\
  @NonNull\nprivate int age;\n@Getter\n@Setter\nprivate float height;\n@Getter\n@Setter\n\
  private Gender gender;\n}\n清单 4-47\nHuman 类——Lombok 版本\n```\n\nLombok 的另一个问题是，在使用模块的\
  \ Java 项目中，它会变得不可预测。在编译时操纵代码以注入额外功能是一项敏感操作，需要访问 JDK 内部 API，而这些 API 可能出于安全原因并未被导出。例如，在编写本书上一版时，使用\
  \ Lombok 编译项目就无法工作，因为 Lombok 需要访问 `jdk.compiler` 模块中的 `com.sun.tools.javac.processing.JavacProcessingEnvironment`\
  \ 类，而该模块并未导出 `com.sun.tools.javac.processing` 包。\n\n如果没有 Lombok，清单 4-47 中的类将会有更多的代码行，因为代码片段中的所有注解都替代了开发者本应编写的方法：\n\
  \n*   `@NoArgsConstructor` 告诉 Lombok 为 `Human` 类生成一个默认的无参构造器的字节码。\n*   `@AllArgsConstructor`\
  \ 告诉 Lombok 为 `Human` 类生成一个需要为每个字段提供参数的构造器的字节码。\n*   `@RequiredArgsConstructor`\
  \ 告诉 Lombok 为 `Human` 类生成一个需要为所有必需字段（即那些用 `@NotNull` 注解的字段）提供参数的构造器的字节码。\n*   `@ToString`\
  \ 告诉 Lombok 生成 `toString()` 方法的字节码。该方法的实现由 Lombok 根据类中的所有字段决定。\n*   `@EqualsAndHashCode`\
  \ 告诉 Lombok 生成 `equals()` 和 `hashCode()` 方法的字节码。这些方法的实现由 Lombok 根据类中的所有字段决定。\n\n\
  随着记录的引入，只要项目使用 JDK 15+ 进行编译和运行，就不再需要 Lombok 了。而且，你也不需要你的实例是可变的。JDK 生成的类是不可变的数据类，因此没有\
  \ setter 方法，但在响应式编程这个崭新的世界里，拥有不可变的记录无论如何都是必须的。`Human` 类的 `record` 实现如清单 4-48 所示，同时还包括实例化\
  \ `Human` 所需的代码。\n\n```\npackage com.apress.bgn.four.records;\nimport com.apress.bgn.four.classes.Gender;\n\
  record Human(String name, int age, float height, Gender gender) {\n}\npublic class\
  \ RecordDemo {\npublic static void main(String... args) {\nHuman john = new Human(\"\
  John Mayer\", 47, 1.9f, Gender.MALE);\nSystem.out.println(\"John as string: \" +\
  \ john);\nSystem.out.println(\"John's hashCode: \" + john.hashCode());\nSystem.out.println(\"\
  John's name: \" + john.name());\n}\n}\n清单 4-48\n简单的 Human 记录及其使用类\n```\n\n如你所见，记录可以像类一样被实例化，即通过使用\
  \ `new` 关键字调用构造器。毕竟，记录只是另一种类型的类。此外，由于不需要 setter 方法（因为对象是不可变的），getter 方法也就没什么意义了。因此，为了访问属性值，会生成与字段同名的、返回字段值的方法。这可以通过使用\
  \ IntelliJ IDEA 查看生成的 `Human.class` 文件中的字节码来确认。只需在 `chapter04/target/classes` 目录中找到该文件，选中它，然后从菜单中选择\
  \ **View ➤ Show Bytecode**。应该会弹出一个窗口，其内容与图 4-13 所示非常相似。\n\n![](img/463938_3_En_4_Fig13_HTML.jpg)\n\
  \n图 4-13\n\n`Human` 记录的字节码\n\n从字节码中，我们还可以发现关于记录的另一个重要信息：字节码中显示的类是 `final` 的，因此记录不能被继承。创建子记录是不可能的。此外，所有记录类都隐式地继承自\
  \ `java.lang.Record` 类。\n\n运行 `RecordDemo` 类中的 `main(..)` 方法，会得到如清单 4-49 所示的结果。\n\
  \n```\nJohn as string: Human[name=John Mayer, age=44,height=1.9,gender=MALE]\nJohn's\
  \ hashCode: 1711330636\nJohn's name: John Mayer\n清单 4-49\n执行 RecordDemo 类打印的结果\n\
  ```\n\n记录的 `toString()` 实现相当不错。`john` 实例的属性值可以轻松地读取和理解。\n\n记录是可以定制的。你可以像为类做的那样，在记录体中为\
  \ `toString()`、`equals()` 和 `hashCode()` 方法提供自定义实现，并提供各种构造器。唯一的限制是，构造器必须使用 `this`\
  \ 关键字调用记录的默认构造器。清单 4-50 展示了一个仅需要姓名和年龄的构造器。\n\n```\npackage com.apress.bgn.four.records;\n\
  import com.apress.bgn.four.classes.Gender;\nrecord Human(String name, int age, float\
  \ height, Gender gender) {\npublic Human(String name, int age) {\nthis(name, age,\
  \ -0f, null);\n}\n}\n清单 4-50\n带有一个额外构造器的简单 Human 记录\n```\n\n由于为记录生成的默认构造器和其他方法依赖于记录的参数，因此不能在记录体中声明额外的字段。但是，支持静态变量和方法。图\
  \ 4-14 描绘了一个在其体中声明了一个额外常量和字段的记录（并且编辑器不喜欢后者）。\n\n![](img/463938_3_En_4_Fig14_HTML.jpg)\n\
  \n图 4-14\n\n带有常量和字段的记录\n\n当数据不可变性是一个需求时，记录非常实用，而这种情况……在大多数时候都会出现（例如，用于在软件应用子系统之间传输数据的**数据传输对象**）。没有记录也能实现，但这需要开发者付出大量努力——像我这样的老派开发者过去在必要时总是会这样做。*你们这些年轻人根本不知道现在有多轻松！*\n\
  \n\n\n#### 密封类与接口\n\n密封类和接口是 JDK 15 中引入的预览特性，并在 Java 17 中正式确定。引入它们是为了解决为开发者类和接口选择合适作用域修饰符的问题，并允许开发者控制哪些代码负责实现它们，从而提高安全性。\n\
  \n安全性始终是一个关注点，对于某些项目而言，当类需要被扩展时，将其设为 `public` 或 `protected` 存在风险。此时，`sealed` 修饰符及其相关机制就能派上用场。它允许开发者\
  \ `密封` 一个类，以防止其被扩展，除非使用 `permits` 关键字声明的少数子类。诚然，当项目中添加新的子类时，超类似乎注定要多次更新，但为了获得更安全的应用程序，这是一个可以接受的权衡。考虑到这一点，让我们密封一个版本的\
  \ `RecordDemo` 类，并只允许 `Performer` 类扩展它。代码清单 4-51 展示了这两个类。\n\n```\n// Human.java\n\
  package com.apress.bgn.four.sealed.one;\nimport com.apress.bgn.four.classes.Gender;\n\
  // Human.java\npublic sealed class Human\npermits Performer {\nprotected String\
  \ name;\nprotected int age;\nprotected float height;\n// 其他代码省略\n}\n// Performer.java\n\
  package com.apress.bgn.four.sealed.one;\nimport com.apress.bgn.four.classes.Gender;\n\
  public final class Performer extends Human {\n// 其他代码省略\n}\n代码清单 4-51\n密封类及其允许的子类\n\
  ```\n\n如果扩展类声明在同一个源文件中，则无需在 `permits` 关键字后列出它们。如果文件外部没有扩展类，则可以完全省略 `permits` 关键字。\n\
  \n允许扩展密封类的类本身也必须是密封的或最终的。如果我们需要这些类中的某一个允许被未知类扩展，则可以使用 `non-sealed` 修饰符。代码清单 4-52\
  \ 展示了声明为 `non-sealed` 的 `Engineer` 类；当然，这个类必须被添加到 `RecordDemo` 类的 `permits` 指令列表中。\n\
  \n```\npackage com.apress.bgn.four.sealed.one;\nimport com.apress.bgn.four.classes.Gender;\n\
  public non-sealed class Engineer extends Human {\npublic Engineer(String name, int\
  \ age, Gender gender) {\nsuper(name, age, gender);\n}\npublic Engineer(String name,\
  \ int age, float height, Gender gender) {\nsuper(name, age, height, gender);\n}\n\
  }\n代码清单 4-52\n扩展密封类的 non-sealed 类\n```\n\n`sealed` 修饰符也可以应用于接口。`permits` 关键字指定了允许实现该密封接口的类。\n\
  \n注意\n\n你可能会期望 `permits` 关键字也支持扩展密封接口的接口，但在当前版本的 JDK 中并不支持。*(如果你愿意，可以尝试一下。)*\n\n\
  重要\n\n同样的规则也适用于密封接口：实现密封接口的类应为 sealed、non-sealed 或 final。\n\n代码清单 4-53 展示了密封的 `Mammal`\
  \ 接口，该接口由密封的 `Human` 类实现。\n\n```\npackage com.apress.bgn.four.sealed.two;\npublic\
  \ sealed interface Mammal permits Human {\n}\npublic sealed class Human\nimplements\
  \ Mammal\npermits Performer, Engineer {\n// 其余代码省略\n}\n代码清单 4-53\n密封的 Mammal 接口和密封的\
  \ Human 类\n```\n\n重要\n\n密封类和接口的一个限制是，任何子类和实现类都必须位于同一个模块中。\n\n此外，如果这一点不明显的话，任何出现在\
  \ `permits` 关键字之后的类都必须扩展该密封类/实现该密封接口。如果某个类在 `permits` 关键字之后指定，但没有扩展密封类/实现密封接口，编译器将不会接受。\n\
  \n密封类对记录（records）很有用，因为记录默认是 final 的。\n\n#### 隐藏类\n\n对于从事 Hibernate 或 Spring 等开发框架的开发者来说，隐藏类是一个有趣的功能，因为这些框架会动态生成代码。生成的类（或接口）不能被其他类的字节码直接使用，因为它们仅供框架内部使用。从\
  \ Java 15 开始，生成隐藏的动态类已成为行业标准。\n\n隐藏类无法通过反射等机制发现^(⁴⁴)。它们由框架动态生成，生命周期短，在不再需要时被丢弃，从而提高了在\
  \ JVM 上运行的应用程序的性能。由于隐藏类不可发现，它们不能用作超类，也不能用作字段或参数的类型。在发生错误时，默认情况下它们不会显示在堆栈跟踪中，但有一些\
  \ JVM 选项可以显示它们。\n\n隐藏类对于初学者书籍来说过于高级，但如果你有兴趣了解更多，本书的代码中有一个示例——请查看 `HiddenClassDemo`\
  \ 类。\n\n#### 注解类型\n\n注解的定义方式与接口类似，唯一的区别在于 `interface` 关键字前有一个 `@`（at）符号。注解类型是接口的一种形式，大多数时候用作标记（请参考之前的\
  \ Lombok 示例）。例如，你可能已经注意到了 `@Override` 注解。当类扩展类或实现接口时，智能 IDE 会自动在方法上放置此注解。它在 JDK\
  \ 中的声明如代码清单 4-54 中的代码片段所示。\n\n```\npackage java.lang;\nimport java.lang.annotation.*;\n\
  /**\n* 文档省略\n*/\n@Target(ElementType.METHOD)\n@Retention(RetentionPolicy.SOURCE)\n\
  public @interface Override {\n}\n代码清单 4-54\nJDK 中的 @Override 声明\n```\n\n不声明任何属性的注解称为**标记**或**信息性**注解。它们仅用于通知应用程序中的其他类，或告知开发者其所放置组件的用途。它们不是强制性的，没有它们代码也能编译。\n\
  \nJava 8 引入了一个名为 `@FunctionalInterface` 的注解。此注解被放置在所有恰好包含一个抽象方法且可用于 *lambda 表达式*\
  \ 的 Java 接口上。\n\n\n\n## Lambda 表达式\n\nLambda 表达式同样在 Java 8 中被引入，它们提供了一种从 Groovy\
  \ 和 Ruby 等语言借鉴而来的紧凑且实用的代码编写方式。清单 4-55 展示了 `@FunctionalInterface` 的声明。\n\n```\npackage\
  \ java.lang;\nimport java.lang.annotation.*;\n/**\n* 文档已省略\n*/\n@Documented\n@Retention(RetentionPolicy.RUNTIME)\n\
  @Target(ElementType.TYPE)\npublic @interface FunctionalInterface {\n}\n清单 4-55\n\
  JDK 的 @FunctionalInterface 声明\n```\n\n**函数式接口**是声明了单个抽象方法的接口。作为接口中唯一的方法，其实现可以当场提供，无需创建类来定义具体实现。想象以下场景：我们创建了一个名为\
  \ `Operation` 的接口，其中包含一个方法。我们可以通过创建一个名为 `Addition` 的类来提供该接口的实现，或者使用 lambda 表达式当场实现。清单\
  \ 4-56 展示了 `Operation` 接口、`Addition` 类以及一个名为 `OperationDemo` 的类，演示了在 `main(..)`\
  \ 方法中声明并使用当场实现的过程。\n\n```\npackage com.apress.bgn.four.lambda;\n@FunctionalInterface\n\
  interface Operation {\nint execute(int a, int b);\n}\nclass Addition implements\
  \ Operation {\n@Override\npublic int execute(int a, int b) {\nreturn a + b;\n}\n\
  }\npublic class OperationDemo {\npublic static void main(String... args) {\n// 使用\
  \ Addition 类\nAddition addition = new Addition();\nint result = addition.execute(2,\
  \ 5);\nSystem.out.println(\"结果是 \" + result);\n// 使用 Lambda 表达式当场实现\nOperation addition2\
  \ = (a, b) -> a + b;\nint result2 = addition2.execute(2, 5);\nSystem.out.println(\"\
  Lambda 结果是 \" + result2);\n}\n}\n清单 4-56\n显式接口实现与 Lambda 表达式对比\n```\n\n通过使用 lambda\
  \ 表达式，不再需要 `Addition` 类，这使得代码更少、更易读。Lambda 表达式可用于许多场景，在本书后续内容中，只要能用它们以更实用的方式编写代码，我们都会进行介绍。\n\
  \n注意\n\n`Operation` 实例可以被 `Integer::sum` 替代，这是一种称为方法引用的结构，同样在 Java 8 中引入。顾名思义，这是对\
  \ `Integer` 类中 `sum` 方法的引用，该方法也是在 Java 8 中引入的。\n\n## 异常\n\n异常是特殊的 Java 类，用于拦截程序执行过程中的意外情况，使开发者能够根据编译器警告的异常类型或\
  \ JVM 在运行时生成的异常类型，实施适当的处理措施。这些类组织成一个层次结构，如图 4-15 所示。`Throwable` 是用于表示 Java 应用程序中意外情况的类层次结构的根类。\n\
  \n![](img/463938_3_En_4_Fig15_HTML.jpg)\n\n图 4-15\n\nJava 异常层次结构\n\nJava 应用程序中的异常情况可能由多种原因引起，以下是一些常见原因：\n\
  \n*   编写代码时的人为错误\n\n*   硬件问题（尝试从损坏的数据磁盘读取文件）\n\n*   资源缺失（尝试读取不存在的文件）\n\n警告\n\n粗心的开发者在不确定时，往往会编写总是捕获\
  \ Throwable 的代码。显然，你应该尽量避免这样做，因为 `Error` 类（`Throwable` 的子类）用于通知开发者系统无法恢复的情况已经发生。\n\
  \n让我们从一个简单的例子开始。清单 4-57 定义了一个调用自身的方法（其技术名称为**递归**），但为了演示目的，它被设计成无限调用自身，导致 JVM 耗尽内存。\n\
  \n```\npackage com.apress.bgn.four.exceptions;\npublic class ExceptionsDemo {\n\
  // 错误的方法\nstatic int rec(int i) {\nreturn rec(i * i);\n}\npublic static void main(String...\
  \ args) {\nrec(1000);\nSystem.out.println(\"全部完成。\");\n}\n}\n清单 4-57\n错误的递归方法\n\
  ```\n\n如果我们运行 `ExceptionsDemo` 类，*全部完成* 不会被打印出来。相反，程序会因抛出 `StackOverflowError` 而异常终止，并指出问题所在的行（本例中是递归方法调用自身的行）。输出如清单\
  \ 4-58 所示。\n\n```\nException in thread \"main\" java.lang.StackOverflowError at\
  \ chapter.four@3.0-SNAPSHOT/com.apress.bgn.four.exceptions.ExceptionsDemo.rec(ExceptionsDemo.java:36)\n\
  at chapter.four@3.0-SNAPSHOT/com.apress.bgn.four.exceptions.ExceptionsDemo.rec(ExceptionsDemo.java:36)\n\
  ...\n清单 4-58\nExceptionsDemo 执行的控制台输出\n```\n\n`StackOverflowError` 间接是 `Error` 的子类，显然是由被调用的有缺陷的递归方法引起的。当然，我们可以修改代码来处理这种异常情况，并执行接下来必须执行的操作，如清单\
  \ 4-59 所示。\n\n```\npackage com.apress.bgn.four.exceptions;\npublic class ExceptionsDemo\
  \ {\n// 其他代码已省略\npublic static void main(String... args) {\ntry {\nrec(1000);\n\
  } catch (Throwable r) {\n}\nSystem.out.println(\"全部完成。\");\n}\n}\n清单 4-59\n另一个错误的递归方法\n\
  ```\n\n在控制台中只打印了 *全部完成* 消息，没有错误的任何踪迹。这是意料之中的，因为我们捕获了它并决定不打印任何相关信息。\n\n停止\n\n这是一种称为**异常吞噬**的不良实践——永远不要这样做！\n\
  \n此外，系统不应从此类情况中恢复，因为在抛出 `Error` 后任何操作的结果都是不可靠的。\n\n停止\n\n这就是为什么捕获 `Throwable` 是一种非常糟糕的实践！\n\
  \n`Exception` 类是所有可被捕获和处理、系统可从中恢复的异常的超类。任何 `Exception` 类中不属于 `RuntimeException`\
  \ 子类的子类都是**受检异常**。这些类型的异常在编译时已知，因为它们属于方法声明的一部分。任何声明抛出受检异常的方法，在代码中使用时，要么强制将异常进一步传播，要么要求开发者编写代码来处理该异常。\n\
  \n\n\n`RuntimeException` 类是在程序执行期间抛出的异常的父类，因此在编写代码时无法预知它们是否会被抛出。请参考清单 4-60 中的代码示例。\n\
  \n```\npackage com.apress.bgn.four.exceptions;\nimport com.apress.bgn.four.hierarchy.Performer;\n\
  public class AnotherExceptionsDemo {\npublic static void main(String... args) {\n\
  Performer p = PerformerGenerator.get(\"Bryce\");\nSystem.out.println(\"TTL: \" +\
  \ p.getTimeToLive());\n}\n}\n清单 4-60\n可能抛出异常的代码示例\n```\n\n假设我们无法访问 `PerformerGenerator`\
  \ 类的代码，因此看不到其内部实现。我们只知道调用 `get(..)` 方法并传入一个名字，应该会返回一个 `Performer` 实例。于是我们编写了清单 4-60\
  \ 中的代码，并尝试打印该表演者的生存时间。如果因为 `get(\"John\")` 调用返回 null，导致 `p` 变量实际上并未被正确的对象初始化，会发生什么？结果如清单\
  \ 4-61 所示。\n\n```\nException in thread\"main\"java.lang.NullPointerException:\n\
  Cannot invoke\"com.apress.bgn.four.hierarchy.Performer.getTimeToLive()\"\nbecause\
  \ \"p\" is null at chapter.four @3.0-SNAPSHOT/com.apress.bgn.four.exceptions.AnotherExceptionsDemo.main(AnotherExceptionsDemo.java:40)\n\
  清单 4-61\nAnotherExceptionsDemo 执行的控制台输出\n```\n\n如你所见，告知你问题所在的异常信息非常明确。更精确的 `NullPointerExceptions`\
  \ 消息是 Java 17 引入的一项特性。\n\n作为聪明的开发者，或者有点多疑，我们会为此情况做好准备。根据应用程序的需求，我们可以执行以下三项操作中的任意一项。\n\
  \n### 捕获异常，打印适当消息，并退出应用程序\n\n捕获异常需要使用 `try/catch` 块。语法非常简单，其行为可解释如下：JVM 尝试执行 `try`\
  \ 块中的语句；如果抛出的异常与 `catch` 块声明中的类型匹配，则执行此块中的代码。当没有 `Performer` 实例就无法执行其余代码时，推荐使用此方法，如清单\
  \ 4-62 所示。\n\n```\npackage com.apress.bgn.four.exceptions;\nimport com.apress.bgn.four.hierarchy.Performer;\n\
  public class AnotherExceptionsDemo {\npublic static void main(String... args) {\n\
  Performer p = PerformerGenerator.get(\"Bryce\");\ntry {\nSystem.out.println(\"TTL:\
  \ \" + p.getTimeToLive());\n} catch (Exception e) {\nSystem.out.println(\"The performer\
  \ was not initialized properly because of: \" + e.getMessage());\n}\n}\n}\n清单 4-62\n\
  包含异常处理代码的 AnotherExceptionsDemo 版本\n```\n\n这里抛出的异常类型是 `NullPointerException`，它是一个继承自\
  \ `RuntimeException` 的类，因此 `try/catch` 块并非强制要求。这种类型的异常被称为**非受检异常**，因为开发者没有义务去检查它们。它们是在应用程序执行期间抛出的，因此属于**运行时异常**。这意味着编译器不知道它们被抛出的可能性，也不会强制开发者编写代码来处理它们。\n\
  \n警告\n\n`NullPointerException` 是 Java 初学者经常与之斗争的异常类型，因为他们尚未充分培养出*多疑意识*，无法在使用来源不明的对象之前总是对其进行测试。\n\
  \n### 抛出适当的异常类型\n\n当有另一个类调用有问题的代码，并且该类将适当地处理异常时，此选项是合适的，如清单 4-63 所示。\n\n```\npackage\
  \ com.apress.bgn.four.exceptions;\nimport com.apress.bgn.four.hierarchy.Performer;\n\
  public class ExtraCallerExceptionsDemo {\npublic static void main(String... args)\
  \ {\nCaller caller = new Caller();\ntry {\ncaller.printTTL(\"Bryce\");\n} catch\
  \ (EmptyPerformerException e) {\nSystem.out.println(e.getMessage());\n}\n}\n}\n\
  class Caller {\npublic void printTTL(String name) throws EmptyPerformerException\
  \ {\ntry {\nPerformer p = PerformerGenerator.get(name);\nSystem.out.println(\"TTL:\
  \ \" + p.getTimeToLive());\n} catch (Exception e) {\nthrow new EmptyPerformerException(\"\
  There is no performer named \" + name, e);  // 此处进行包装\n}\n}\n}\nclass EmptyPerformerException\
  \ extends Exception {\npublic EmptyPerformerException(String message, Throwable\
  \ cause) {\nsuper(message, cause);\n}\n}\n清单 4-63\n将异常包装到自定义异常类型中的代码示例\n```\n\n\
  请注意 `EmptyPerformerException` 类。它是一个简单的自定义类，扩展了 `java.lang.Exception` 类，从而使其成为受检异常。受检异常被声明为由方法显式抛出，正如你在代码中第一个加粗行所看到的。在这种情况下，当调用该方法时，编译器将强制开发者处理该异常或将其继续向上抛出。如果\
  \ `printTTL(..)` 方法声明时没有包含 `throws EmptyPerformerException` 片段，则会发生编译时错误，代码将无法执行。IntelliJ\
  \ IDEA 作为一个非常智能的编辑器，会使用 JVM 编译器来验证你的代码，它会通过用红线在代码下方划线来通知你代码中存在某些问题。这种情况如图 4-16 所示，其中\
  \ `throws EmptyPerformerException` 被注释掉了，以显示编译器对此情况完全不接受。\n\n![](img/463938_3_En_4_Fig16_HTML.jpg)\n\
  \n图 4-16\n\n由于受检异常未被声明为由 `printTTL(..)` 方法抛出而导致的编译错误\n\n此外，在 `main(..)` 方法中，需要一个\
  \ `try/catch` 块来捕获并处理这种类型的异常，如清单 4-63 所示。或者，`main(..)` 方法必须声明为 `throws EmptyPerformerException`，以允许将异常进一步传递，在此情况下是传递给\
  \ JVM。\n\n提示 \n\n你可以将异常想象成碳酸饮料中的二氧化碳气泡：如果没有过滤器阻止，它们往往会浮到表面。在 Java 中，这个表面由运行应用程序的\
  \ JVM 代表。当 JVM 遇到异常时，它会停止运行应用程序。\n\n请注意，在创建 `EmptyPerformerException` 对象的行中，根据构造函数的声明，原始异常作为参数提供。这样做是为了不丢失其消息，并且可以用于调试意外情况，因为它将直接指向有问题的代码行。\n\
  \n\n\n### 执行虚拟初始化\n\n当问题调用之后的代码根据返回的执行器实例执行不同操作时，此选项非常适用，如清单 4-64 所示。\n\n```\npackage\
  \ com.apress.bgn.four.exceptions;\nimport com.apress.bgn.four.hierarchy.Performer;\n\
  import com.apress.bgn.four.classes.Gender;\nclass DummyInitializer {\npublic Performer\
  \ getPerformer(String name) {\nPerformer p = PerformerGenerator.get(name);\ntry\
  \ {\nSystem.out.println(\"Test if valid: \" + p.getName());\n} catch (Exception\
  \ e) {\np = new Performer(\"Dummy\", 0, 0.0f, Gender.UNSPECIFIED);\n}\nreturn p;\n\
  }\n}\npublic class DummyInitExceptionDemo {\npublic static void main(String... args)\
  \ {\nDummyInitializer initializer = new DummyInitializer();\nPerformer p = initializer.getPerformer(\"\
  Bryce\");\nif (\"Dummy\".equals(p.getName())) { // 根据执行器名称执行不同行为\nSystem.out.println(\"\
  Nothing to do.\");\n} else {\nSystem.out.println(\"TTL: \" + p.getTimeToLive());\n\
  }\n}\n}\n清单 4-64\n执行虚拟初始化的代码示例\n```\n\n请注意，原始异常在此处并未被使用；它被*吞没*了，因此在出现问题时，问题的根本原因被隐藏了。在原始异常不关键的应用程序中，会打印一条精心设计的警告日志消息，以通知开发者存在某些需要注意的行为。\n\
  \n警告\n\n请记住，本节列出的所有更改都适用于调用 `PerformerGenerator.get(\"Bryce\")` 方法的代码，因为假设我们无法修改此类的代码。如果该类是可访问的，则可以修改该方法以返回一个\
  \ `Optional<Performer>`。有关此类对象的更多信息将在后续章节中介绍。\n\n### try/catch 块\n\n既然我们在讨论异常，`try/catch`\
  \ 块可以补充一个 `finally` 块。`finally` 块中的内容几乎总是会被执行。如果异常与 `catch` 块中声明的任何类型都不匹配（是的，一个\
  \ `catch` 块中可以声明多种类型，本书后面会讨论），异常会被进一步抛出，但 `finally` 块仍然会被执行。如果方法正常返回，`finally` 块也会被执行。`finally`\
  \ 块唯一不执行的情况是程序因错误而终止。\n\n清单 4-65 是清单 4-63 所示代码的增强版本，它为 `Caller` 示例添加了一个 `finally`\
  \ 块。\n\n```\npackage com.apress.bgn.four.exceptions;\npublic class FinallyBlockDemo\
  \ {\npublic static void main(String... args) {\ntry {\nCaller caller = new Caller();\n\
  caller.printTTL(\"John\");\n} catch (EmptyPerformerException e) {\nSystem.out.println(\"\
  Cannot use an empty performer!\");\n} finally {\nSystem.out.println(\"All went as\
  \ expected!\");\n}\n}\n}\n清单 4-65\n展示 finally 块的代码示例\n```\n\n在本书的后续部分，当你的 Java 知识更深入时，一些示例将包含以异常情况结束的代码，以便进一步扩展异常主题。\n\
  \n## 泛型\n\n到目前为止，本章只涵盖了对象类型和用于创建对象的 Java 模板。但是，如果我们需要设计一个功能适用于多种对象类型的类呢？由于 Java\
  \ 中的每个类都继承自 `Object` 类，我们可以创建一个类，其方法接收一个 `Object` 类型的参数，并在方法中测试对象类型。这样做会很繁琐，但可以实现，并且将在本书后面介绍。幸运的是，Java\
  \ 提供了一种更简单的方法来设计功能适用于多种对象类型的类。\n\nJava 5 引入了在创建对象时使用类型作为参数的可能性。被设计用来处理其他类的类称为**泛型**。关于泛型有很多例子，但我将从学习\
  \ Java 时首先需要的一个例子开始。\n\n在编写 Java 应用程序时，你很可能需要在某个时候将不同类型的值配对。一个最简单的 `Pair` 类，可以保存任意类型的一对实例，如清单\
  \ 4-66 所示。\n\n```\npackage com.apress.bgn.four.generics;\npublic class Pair {\n\
  protected X x;\nprotected Y y;\nprivate Pair(X x, Y y) {\nthis.x = x;\nthis.y =\
  \ y;\n}\npublic X x() {\nreturn x;\n}\npublic Y y() {\nreturn y;\n}\npublic void\
  \ x(X x) {\nthis.x = x;\n}\npublic void y(Y y) {\nthis.y = y;\n}\npublic static\
  \  Pair of(X x, Y y) {\nreturn new Pair(x, y);\n}\n@Override\npublic String toString()\
  \ {\nreturn \"Pair{\" + x.toString() + \", \" + y.toString() + '}';\n}\n}\n清单 4-66\n\
  泛型类 Pair\n```\n\n现在我们有了一个泛型 `Pair` 类声明。X 和 Y 代表应用程序中的任何 Java 类型。`toString()` 方法继承自\
  \ `Object` 类，并在 `Pair` 类中被重写，以打印字段的值。\n\n下一步是使用 `Pair` 类。为了证明 `Pair` 类可用于耦合任何类型的实例，在清单\
  \ 4-67 中，创建了以下对象对：\n\n*   一对 `Performers`，我们只能假设它们一起唱歌，因为变量名为 `duet`。\n*   一个 `Performer`\
  \ 实例和一个 `Double` 实例的对，表示该表演者的净资产；变量名为 `netWorth`。\n*   一个 `String` 实例（表示表演者的流派）和一个\
  \ `Performer` 实例的对；变量名为 `johnsGenre`。\n\n```\npackage com.apress.bgn.four.generics;\n\
  import com.apress.bgn.four.classes.Gender;\nimport com.apress.bgn.four.hierarchy.Performer;\n\
  public class GenericsDemo {\npublic static void main(String... args) {\nPerformer\
  \ john = new Performer(\"John\", 40, 1.91f, Gender.MALE);\nPerformer jane = new\
  \ Performer(\"Jane\", 34, 1.591f, Gender.FEMALE);\nPair duet = Pair.of(john, jane);\n\
  System.out.println(duet);\nPair netWorth = Pair.of(john, 34_000_000.03);\nSystem.out.println(netWorth);\n\
  Pair johnsGenre = Pair.of(\"country-pop\", john);\nSystem.out.println(johnsGenre);\n\
  }\n}\n// 输出\n/*\nPair { com.apress.bgn.four.hierarchy.Performer @1e80bfe8, com.apress.bgn.four.hierarchy.Performer\
  \ @66a29884}\nPair {com.apress.bgn.four.hierarchy.Performer@1e80bfe8, 3.400000003\
  \ E7}\nPair {country-pop, com.apress.bgn.four.hierarchy.Performer@1e80bfe8}\n*/\n\
  清单 4-67\n使用 Pair 泛型类\n```\n\n`println(...)` 方法期望其参数是一个 `String` 实例，如果不是，则会在作为参数传入的对象上调用\
  \ `toString()` 方法。如果 `toString()` 方法在继承 `Object` 的类中没有被重写，则会调用 `Object` 类中的 `toString()`\
  \ 方法，该方法返回类的完全限定名以及称为**哈希码**的东西，它是对象的数值表示。\n\nJDK 中有许多泛型类可用于编写代码，其中一些将在后续章节中介绍。本节只是为了向你介绍典型的泛型语法。这将帮助你轻松识别泛型并了解它们的使用方式。\n\
  \n\n\n## `var` 与钻石运算符\n\nJava 10 引入了 `var` 关键字，用于声明变量时无需指定其类型，而由编译器进行推断。像 Python、Groovy\
  \ 和 JavaScript 这类语言早已具备此功能，Java 开发者对此也期待已久。\n\n编写以下代码并不费力：\n\n```\nString message\
  \ = \"random message\"\n```\n\n而不是：\n\n```\nvar message = \"random message\" //\
  \ 推断为 String 类型\n```\n\n但当涉及多层泛型类型时，`var` 的作用就大得多了。例如，以下语句：\n\n```\nHashMap<String,\
  \ ArrayList<Integer>> performers = new HashMap<String, ArrayList<Integer>>();\n\
  ```\n\n可以写成：\n\n```\nvar performers = new HashMap<String, ArrayList<Integer>>();\n\
  ```\n\n同样的语句也可以通过使用 Java 7 引入的**钻石运算符** `<>` 来简化。钻石运算符允许在实例化变量时省略泛型类型名称，前提是编译器能从声明中推断出这些类型。因此，前面的例子也可以写成：\n\
  \n```\nHashMap<String, ArrayList<Integer>> performers3 = new HashMap<>();\n```\n\
  \n重要提示\n\n像 `var performers = new HashMap<>();` 这样的语句是有效的，但编译器无法确定可以添加到 `performers`\
  \ 映射中的实例类型。因此，像 `performers.put(null, null);` 这样的语句是正确的，因为 `null` 没有类型，但其他任何操作，例如\
  \ `performers.put(\"john\", \"mayer\");`，都会导致编译错误。\n\n`var` 关键字可以简化 Java 代码的编写，但它仍有很长的路要走。目前，它仅允许在方法体、增强型循环的索引、Lambda\
  \ 表达式、构造函数以及循环和初始化块中使用。它不能用于类字段声明或常量中。因此，编译器只能为局部变量推断类型。\n\n`var` 不能用于声明未初始化的变量，因为这无法为编译器提供任何关于变量类型的信息。所以，`var\
  \ list;` 语句会导致编译错误，但 `var list = new ArrayList<String>();` 则可以正常工作。\n\n重要提示\n\n\
  尽管 `var` 不能用作标识符，但这并不意味着它是一个保留关键字。例如，这就是为什么可以声明一个名为 `var` 的类字段。由于它替代了变量的类型名称，`var`\
  \ 实际上是一个**保留类型名称**，并且由于它的使用取决于上下文，你可以在包含 Java 上下文关键字的表 4-4 中找到它。\n\n## 未命名模式与未命名变量\n\
  \n正如本章前面所述，使用下划线 (`_`) 字符作为标识符在 JDK 8 之前是支持的，在 Java 9 中被移除，然后在 Java 21 中作为预览功能重新引入，并在\
  \ Java 22 中作为正式特性，但其用途与 Golang 中的类似。对于那些不熟悉 Golang 的人来说，在 Golang 中，你必须使用你声明的任何变量，否则你的代码就是无效的。在某些情况下，一种解决方法是使用名为\
  \ `_`（下划线）的变量。`_` 标识符用于表示一个已声明但从未使用的**未命名变量**。\n\n在一些情况下，这非常有用。最常见的是使用 `Thread.sleep(..)`\
  \ 来暂停程序执行时。`Thread.sleep(..)` 方法的声明包含一个 `throws java.lang.InterruptedException`，如果你的代码设计良好，这个异常实际上很少被抛出，但由于它是一个受检异常，编译器强制你处理它。因此，大多数开发者过去常常将其包裹在一个\
  \ `try/catch` 块中，并声明一个从未在任何地方使用过的命名变量。清单 4-68 展示了两个 `try/catch` 块，一个是 Java 22 之前使用命名异常变量的方式，另一个是\
  \ Java 22 之后使用未命名变量的方式。\n\n```\n// Java 22 之前\ntry {\n    Thread.sleep(20);\n} catch\
  \ (InterruptedException e) {\n    // 无需处理\n}\n// Java 22：未命名变量\ntry {\n    Thread.sleep(20);\n\
  } catch (InterruptedException _) {\n}\n清单 4-68\nGenericsDemo 执行的控制台输出\n```\n\n你可能会认为这并不重要，你说得对，但有一个我个人非常满意的结果：它使代码更具可读性，而无需添加额外的赘述，比如用注释来解释为什么不对该异常做任何处理。此外，第一个\
  \ `try/catch` 块看起来很像本章前面在**异常**部分描述的异常吞噬过程，我曾告诫过你应该避免这种做法。通过使用 `_` 作为变量名，我只需看一眼代码就知道这不是一个需要担心的异常。\n\
  \n另一种可能需要未命名变量的情况是，当你需要遍历一个集合并执行一个与实际迭代器无关的操作时（这种代码也被称为*副作用比其结果更重要的代码*）。你将在**第**\
  \ **7** **章**中学习迭代器和循环。\n\n在声明需要形式参数的 Lambda 表达式时，未命名变量也很有用。然而，未命名变量在通过模式分解数据类型时最为有用，可以根据对象的类型创建具有不同分支的\
  \ `switch` 语句。这将在**第** **5** **章**和**第** **7** **章**中介绍。本书将在必要时使用未命名变量。\n\n## 总结\n\
  \n本章介绍了 Java 语言中最常用的元素。希望读完本章后，你在未来的代码示例中不会遇到太多让你感到惊讶的内容，这样你就可以专注于正确地学习这门语言。如果有些内容目前看起来不清楚，请不要担心；随着你对\
  \ Java 语言理解的加深，它们会逐渐变得清晰。\n\n以下是本章的关键要点：\n\n*   语法错误会阻止 Java 代码转换为可执行代码。这意味着*代码无法编译*。\n\
  \n*   当使用*静态导入语句*时，可以直接使用静态变量。静态方法也是如此。\n\n*   注释会被编译器忽略，Java 中有三种类型的注释。\n\n*  \
  \ 类、接口和枚举是用于创建对象的 Java 组件。\n\n*   枚举是一种特殊类型的类，其实例化次数是固定的。\n\n*   记录是一种特殊类型的类，用于创建数据不可变的对象。\n\
  \n*   抽象类不能被实例化，即使它们可以有构造函数。\n\n*   在 Java 8 之前，接口只能包含骨架（抽象）方法，直到 Java 8 引入了默认方法。\n\
  \n*   从 Java 9 开始，接口中允许使用私有方法和私有静态方法。\n\n*   Java 不支持使用类的多重继承。\n\n*   Java 标识符必须遵守命名规则。单个下划线\
  \ `_` 不是被接受的 Java 标识符，除非用于标识那些已声明但在各种上下文（异常处理、循环、Lambda 表达式和模式）中从未使用的变量。\n\n*  \
  \ 接口可以继承其他接口。\n\n*   Java 定义了一组固定数量的*保留关键字*，这些关键字只能用于特定目的，不能用作标识符。Java 关键字的列表在不同版本之间通常保持相对稳定。保留关键字将在下一节中介绍。\n\
  \n\n\n### Java 关键字\n\n如本章开头所述，Java 有一系列关键字，它们只能用于语言中固定且预定义的目的。Java 中有两种类型的关键字：**保留关键字**和**上下文关键字**。保留关键字（共\
  \ 51 个）不能用作标识符：你不能将它们用作变量、类、接口、枚举或方法的名称。上下文关键字（共 17 个）可以用作标识符，除非上下文与其预期用途相关，在这种情况下它们不能被使用，因为那会让编译器感到困惑。\n\
