  \ Java 中的计数从 0 开始。因此，数组的第一个成员位于索引 0，第二个位于索引 1，依此类推。但是数组可以为空，因此如果在运行代码清单 3-24 中的代码时没有提供任何参数，程序的执行将会崩溃，并打印出类似于代码清单\
  \ 3-25 所示的明确消息（以红色显示）。\n\n```\nException in thread \"main\" java.lang.ArrayIndexOutOfBoundsException:\
