  JavaFX 应用程序启动器使用反射来启动应用程序，因此我们需要打开 `com.apress.bgn.ten` 包，以允许使用 `opens` 指令进行反射。如果没有该指令，则会抛出
  `java.lang.IllegalAccessException` 异常，并且应用程序无法启动。


  最简单的入门应用程序是一个仅包含关闭选项的简单窗口。显示一个普通方形窗口的代码如清单 10-16 所示。


