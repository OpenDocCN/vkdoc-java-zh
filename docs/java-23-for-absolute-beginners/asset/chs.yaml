  请注意位于 `WEB-INF` 目录下的 `web.xml` 文件。该文件定义了 Web 应用的结构。在 Servlet 3.0 之前，此文件是将 Servlet
  映射到 URL 模式并将其配置为应用一部分的唯一方式。在 Servlet 3.0 及引入注解之后，该文件基本为空。


  当构建 Web 应用时，应用的字节码会保存在 `WEB-INF/classes` 下。如果应用使用了第三方库，它们都会保存在 `WEB-INF/lib` 中。


