  \ while 语句反复尝试获取数据库连接，直至尝试次数耗尽\n```\n\n重要提示\n\n作为经验法则，使用循环语句时，务必确保存在退出条件。\n\n既然我们已经涵盖了实现图\
  \ 7-7 中冒泡排序算法所需的所有语句，让我们看看代码是什么样的。请注意，该算法可以用多种方式编写，但以下代码最符合前面提供的解释：只要数组中存在未按正确顺序排列的元素，就反复遍历数组，并交换相邻元素以符合所需的顺序（此处为升序）。冒泡排序算法的最简单版本如代码清单\
  \ 7-37 所示。\n\n```\npackage com.apress.bgn.seven.whileloop;\nimport java.util.Arrays;\n\
  import static java.lang.System.out;\npublic class BubbleSortDemo {\npublic static\
