  \ Java 语法不正确或找不到依赖项而导致内存编译失败，在 99.99% 的情况下，错误消息将帮助你修复代码。让我们检查几个非常常见的错误。查看清单 2-30\
  \ 中描述的 `Practice05.java` 示例。\n\n\n\n```\nclass Practice05 {\npublic static void\
  \ main(String[] args) {\nSystem.out.println(\"Practice05: Hello World!\")\n}\n}\n\
  清单 2-30\n包含语法错误的 Java 文件\n```\n\n你能一眼看出语法错误在哪里吗？你很可能可以，但为了演示，请尝试运行这个文件。结果如清单 2-31\
  \ 所示。\n\n```\n> java Practice05.java\n#输出\nPractice05.java:3: 错误: 需要 ';'\nSystem.out.println(\"\
  Practice05: Hello World!\")\n^\n1 个错误\n错误: 编译失败\n清单 2-31\n运行包含语法错误的 Java 文件\n```\n\
  \n如你所见，Java 告诉你它期望在第 3 行的 `System.out.println(..)` 语句末尾有一个分号（`;`）。你可以随意修改这个文件，或者自己编写代码来测试各种错误。\n\
  \n`java22-sandbox` 目录包含文件 `Practice06.java`，该文件引用了一个不存在的类。这不仅仅是语法错误——而是一个设计错误。文件内容如清单\
  \ 2-32 所示。\n\n```\nclass Practice06 {\npublic static void main(String[] args) {\n\
  System.out.println(\"Practice06: \" + MockProvider.get());\n}\n}\n清单 2-32\n引用了一个不存在的类的\
  \ Java 文件\n```\n\n错误信息如清单 2-33 所示。\n\n```\n> java Practice06.java\n#输出\nPractice06.java:3:\
  \ 错误: 找不到符号\nSystem.out.println(\"Practice06: \" + MockProvider.get());\n^\n符号:\
  \   变量 MockProvider\n位置: 类 Practice06\n1 个错误\n错误: 编译失败\n清单 2-33\n运行引用了一个不存在的类的 Java\
  \ 文件\n```\n\nJava 指出了错误所在的行号（3），并报告它 `找不到符号`。这显然意味着它找不到这个类，那为什么它说 `符号` 呢？嗯，Java\
  \ 是一种编程语言，而语言是由符号组成的。在 Java 中，并非所有符号都是类，你将在阅读本书的过程中了解到这一点。\n\n你可能遇到的第三种错误类型是，当有一段\
  \ Java 无法识别的文本时，比如清单 2-34 中 `Practice07.java` 文件内容里的随机文本 `ssssssss`。\n\n```\nclass\
  \ Practice07 {\nssssssss\npublic static void main(String[] args) {\nSystem.out.println(\"\
  Practice06: \" + HelloProvider.get());\n}\n}\n清单 2-34\n包含一段随机文本的 Java 文件\n```\n\n\
  运行 `Practice07.java` 文件会导致清单 2-35 中描述的错误。\n\n```\n> java Practice07.java\n#输出\n\
  Practice07.java:3: 错误: 需要 class、interface、enum 或 record\nssssssss\n^\n1 个错误\n错误:\
  \ 编译失败\n清单 2-35\n运行包含一段随机文本的 Java 文件\n```\n\n如你所见，Java 识别出了这个不属于代码片段的陌生元素，并将你指向第\
  \ 3 行。\n\n还有一些错误可能在你运行语法正确的 Java 代码时发生，你将在本书后面部分了解到这些错误。\n\n请随意尝试这种运行 Java 代码的方式。当你想要快速测试一段代码，然后再将其放入更大的项目中，或者用这种方式测试本书中的示例时，可以使用它。然而，本书中这个主题必须保持简短，因为本书的目的是让你在读完本书后不再是一个\
  \ Java 的绝对初学者。\n\n## 安装 Apache Maven\n\n本书的源代码组织在可以使用 Apache Maven 编译和执行的小型项目中。你可以从\
  \ Apache Maven 的官方网站^(³⁰)下载它并了解更多信息。Apache Maven 是一个软件项目管理和理解工具。本书选择它作为构建工具，原因如下：\n\
  \n*   易于设置（XML 如今几乎无处不在）\n*   它与 Java 的长期合作关系\n*   许多公司都在使用它\n\n如果你还需要一个学习构建工具的理由，那就是：对于中型和大型项目，构建工具是必备的，因为它有助于依赖项的声明、下载和升级。\n\
  \n安装 Maven 非常简单。只需下载它，解压到某个位置，然后声明 `M2_HOME` 环境变量。如何执行此操作的说明可在官方网站上找到，或者你也可以使用 SDKMAN。\n\
  \n安装好 Maven 后，你可以通过打开终端（或 Windows 上的命令提示符）并执行 `mvn -version` 来检查它是否安装成功，以及它是否使用了你期望的\
  \ JDK 版本。输出应该与清单 2-36 中的输出非常相似。\n\n```\nApache Maven 4.0.0-alpha-13 (0a6a5617fe5ef65c44f05903491e170d92cf37fc)\n\
  Maven home: /Users/iuliana/.sdkman/candidates/maven/current\nJava version: 23-ea,\
  \ vendor: Oracle Corporation, runtime: /Users/iuliana/.sdkman/candidates/java/23.ea.5-open\n\
  Default locale: en_GB, platform encoding: UTF-8\nOS name: \"mac os x\", version:\
  \ \"14.2.1\", arch: \"x86_64\", family: \"mac\"\n清单 2-36\n在 macOS 上执行命令 mvn -version\
  \ 的输出\n```\n\n重要提示\n\n如果你正在从事 Java 开发职业，熟练掌握一个构建工具是一项宝贵的优势。大多数使用 Java 的公司都有大型项目，这些项目组织在相互依赖的模块中，没有构建工具是无法管理的。Apache\
  \ Maven 长期以来一直是 Java 事实上的标准构建工具，因此你可能需要熟悉它。\n\n## 安装 Git\n\n这是一个可选章节，但作为一名开发者，熟悉版本控制系统很重要，所以在此介绍。要在你的系统上安装\
  \ Git，只需访问官方网站^(³¹)并下载安装程序。打开安装程序并点击**下一步**直到完成安装。这适用于 Windows 和 macOS（对于 macOS，你可以使用\
  \ `homebrew`^(³²)）。是的，就是这么简单；你不需要做任何其他事情。在 Linux 上，可以使用 PPA 完成安装。\n\n以防你需要更多指导，这里有一个关于如何为所有操作系统安装\
  \ Git 的页面：[`https://gist.github.com/derhuerst/1b15ff4652a867391f03`](https://gist.github.com/derhuerst/1b15ff4652a867391f03)。\n\
  \n要测试 Git 是否在你的系统上成功安装，请打开终端（Windows 上的命令提示符）并运行 `git --version` 来查看打印出的结果。它应该就是你刚刚安装的\
  \ Git 版本。预期的输出应该类似于清单 2-37。\n\n```\n$ git –-version\ngit version 2.44.0\n清单 2-37\n\
  验证 Git 安装的命令 git –version 的输出\n```\n\n现在你已经安装了 Git，你可以通过在终端中或直接从 IDE 克隆官方 Git 仓库来获取本书的源代码。\n\
  \n\n\n## 安装 Java 集成开发环境\n\n根据我十多年的经验，我推荐的编辑器是 IntelliJ IDEA。它由一家名为 JetBrains 的公司开发。你可以从其官方网站下载此\
  \ IDE^(³³)。旗舰版 30 天后过期；之后需要付费许可证。还有一个社区版可供使用，无需许可证。对于学习 Java 的简单项目来说，这个版本就足够了。\n\
  \n下载 IntelliJ IDEA 压缩包后，双击进行安装。之后，启动它并首先配置你的插件。点击 **插件** 菜单项，窗口右侧应出现一个插件列表。查看 **已安装**\
  \ 选项卡上的插件列表（如图 2-9 所示）。\n\n![](img/463938_3_En_2_Fig9_HTML.jpg)\n\n图 2-9\n\nIntelliJ\
