  既然提到了*标签库*（又称*taglibs*），我们也来简单聊聊它们。最基本的标签库名为**JSTL**，代表**JSP 标准标签库**。其他更高级的标签库由
  JSF（Jakarta Server Faces）、Thymeleaf 或 Spring 提供。此库中定义的标签可用于编写根据请求属性改变行为的 JSP 页面。JSTL
  标签可用于迭代、测试和格式化值，以及配置国际化。根据提供的 JSTL 函数，标签被分为五类，并且只有在指定了相应指令后才能在 JSP 页面中使用。以下是这五个指令及其涵盖的总体主题列表：


  *   `<%@ taglib uri="http://java.sun.com/jsp/jstl/core" prefix="c" %>`：JSTL 核心标签提供对显示值、迭代、条件逻辑、捕获异常、URL、转发或重定向响应的支持。


  *   `<%@ taglib uri="http://java.sun.com/jsp/jstl/fmt" prefix="fmt" %>`：JSTL 格式化标签用于格式化数字、日期，并通过区域设置和资源包提供国际化（i18n）支持。


  *   `<%@ taglib uri="http://java.sun.com/jsp/jstl/sql" prefix="sql" %>`：JSTL SQL
  标签提供与关系数据库交互的支持——但您绝不应在网页中使用 SQL，因为它极易被黑客攻击（请在搜索引擎中查找**SQL 注入**以了解原因）。


  *   `<%@ taglib uri="http://java.sun.com/jsp/jstl/xml" prefix="x" %>`：JSTL XML 标签提供对处理
  XML 文档、解析、转换和 XPath 表达式求值的支持。


  *   `<%@ taglib uri="http://java.sun.com/jsp/jstl/functions" prefix="fn" %>`：JSTL
  函数标签提供许多可用于执行常见操作（如文本操作）的函数。


  现在您了解了基本的标签类别，您认为我们需要使用哪些标签来重新设计我们的`index.jsp`页面？如果您想到的是**FMT**和**Core**，那么您是对的。此外，使用标签库的
  JSP 页面几乎总是由一个 Servlet 支持，该 Servlet 在请求上设置将在 JSP 页面中使用的适当属性。因此，让我们修改`index.jsp`页面，如清单
  10-39 所示。


