  使用 Jackson 的 XmlMapper 序列化和反序列化 Singer 类\n```\n\n`XmlMapper` 实例可用于序列化项目中任何包含 Jackson\
  \ 注解的类。清单 11-39 中的示例还配置为支持 Java 8 日期 API 类型的默认序列化，并通过以下两行代码保持类型可读，而不将其转换为数字时间戳：\n\
  \n```\nxmlMapper.registerModule(new JavaTimeModule());\nxmlMapper.configure(SerializationFeature.WRITE_DATES_AS_TIMESTAMPS,\
  \ false);\n```\n\n由于选择的格式是 XML，如果所有内容都写在一行中会显得非常难看，因此通过以下语句支持缩进格式：\n\n```\nxmlMapper.enable(SerializationFeature.INDENT_OUTPUT)\n\
  ```\n\n信息\n\n\n\n注解并非必需；只要使用了 `XmlMapper` 实例，且待序列化的类是一个普通的旧式 Java 对象（POJO），就会生成一个\
  \ XML 文件，其中所有字段都会成为以该类命名的根元素下的 XML 子元素。注解的作用在于自定义生成的 XML、命名元素、将某些字段转换为属性，以及指定复杂类型所使用的转换器。如果你对为\
  \ `Singer` 实例生成的默认 XML 文件感到好奇，可以注释掉 `Singer` 类中的注解，然后运行清单 11-39 中的 `XMLSerializationDemo`\
  \ 示例。\n\nXML 序列化在开发领域已占据主导地位多年，广泛应用于大多数 Web 服务和远程通信中。然而，随着 XML 文件变得越来越大，它们往往会显得拥挤、冗余且难以阅读，因此一种新的格式脱颖而出：JSON。\n\
  \n### JSON 序列化\n\n**JSON**（JavaScript 对象表示法）是一种轻量级的数据交换格式。它既便于人类阅读，也易于机器解析和生成。JSON\
  \ 是 JavaScript 应用程序中数据最喜爱的格式，广泛应用于基于 REST 的应用程序，并且是许多 NoSQL 数据库的内部格式。因此，向你展示如何使用这种格式对\
  \ Java 对象进行序列化/反序列化也是恰如其分的。将 Java 对象序列化为 JSON 的优势在于，有不止一个库提供了实现此功能的类，这意味着至少有一个库在\
  \ Java 9+ 版本中是稳定的。\n\nJSON 格式本质上是一组键值对的集合。值可以是数组，也可以是键值对本身的集合。最受青睐的 JSON 序列化库同样是\
  \ Jackson 库，因为它无需编写大量代码就能将 Java 对象转换为 JSON 对象，反之亦然。本章最棒的一点是，相同的模块配置也可以用于 JSON。我们只需要更改所使用的注解，并更改用于执行序列化/反序列化的映射器类型即可。Jackson\
  \ 支持大量用于 JSON 序列化的注解，但对于本书中的简单示例，我们实际上并不需要任何注解。一个 Jackson 的 `com.fasterxml.jackson.databind.json.JsonMapper`\
  \ 实例足够智能，能够自动检测类的公开可访问属性（公共字段，或具有公共 getter 方法的私有字段），并在序列化/反序列化该类的实例时使用它们。\n\n来自\
  \ `com.fasterxml.jackson.annotation` 包的 `@JsonAutoDetect` 注解可用于注解一个类。它可以配置为告诉映射器哪些类成员应该被序列化。有几个选项，分组在注解体内声明的\
  \ `Visibility` 枚举中：\n\n*   `ANY`：自动检测所有类型的访问修饰符（`public`、`protected`、`private`）。\n\
  *   `NON_PRIVATE`：自动检测除 `private` 之外的所有修饰符。\n*   `PROTECTED_AND_PUBLIC`：仅自动检测 `protected`\
  \ 和 `public` 修饰符。\n*   `PUBLIC_ONLY`：仅自动检测 `public` 修饰符。\n*   `NONE`：禁用对字段或方法的自动检测。在这种情况下，必须使用字段上的\
  \ `@JsonProperty` 注解显式进行配置。\n*   `DEFAULT`：应用默认规则，具体取决于上下文（有时从父类继承）。\n\n将这个单独的注解放在\
  \ `Singer` 类上，结合适当的映射器和 `JavaTimeModule`，可以确保 `Singer` 类的实例能够正确地序列化为 JSON，并且也能从\
  \ JSON 反序列化回来。清单 11-40 展示了 `Singer` 类的简单配置（即使有些冗余）。\n\n```\npackage com.apress.bgn.eleven.json;\n\
  // 省略了一些导入语句\nimport com.fasterxml.jackson.annotation.JsonAutoDetect;\n@JsonAutoDetect(getterVisibility\
  \ = JsonAutoDetect.Visibility.PUBLIC_ONLY)\npublic class Singer  implements Serializable\
  \ {\nprivate static final long serialVersionUID = 42L;\nprivate String name;\nprivate\
  \ Double rating;\nprivate LocalDate birthDate;\npublic String getName() { // 自动检测\n\
  return name;\n}\npublic Double getRating() { // 自动检测\nreturn rating;\n}\npublic\
  \ LocalDate getBirthDate() { // 自动检测\nreturn birthDate;\n}\n// 其他代码省略\n}\n清单 11-40\n\
