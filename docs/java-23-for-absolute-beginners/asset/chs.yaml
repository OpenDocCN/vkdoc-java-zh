  现在，我们只需重新启动应用程序，首页将显示`Today is 06/07/2021`，并且您将看到代码运行时系统上的日期。


  如果您认为编写 Java Web 应用程序很繁琐，那您完全正确。对于此类任务，纯 Java 确实相当乏味。专业的 Java Web 应用程序通常使用框架（例如
  JSF、Vaadin、Thymeleaf、Mustache 等）编写，这些框架使创建页面并将其链接到后端变得容易。更进一步，如今的趋势是使用强大的 JavaScript
  框架（如 Angular 和 React）在 JavaScript 中创建 Web 界面，并使用高级 CSS4；许多 UI 设计现在可以 100%在 CSS3
  或 CSS4 中完成，并通过 Web 服务调用（通常是 REST）与托管在企业服务器上的 Java 后端应用程序通信。无论如何，如果您好奇，可以查阅这些选项；这个主题非常广泛，但像
  Spring 这样的框架使得设置环境并开始开发变得相当容易。只是不要陷入在不理解其基本原理的情况下使用框架的陷阱。


