  ## 介绍 JavaFX


  JavaFX Script 是 Sun Microsystems 设计的一种脚本语言，构成了 Java 平台上 JavaFX 技术家族的一部分。它于 2008
  年 12 月 JDK 6 发布后不久推出，曾一度有开发者预计它会被弃用，因为它作为一种完全不同的语言，并未真正流行起来。


  在收购 Sun Microsystems 后，Oracle 决定保留 JavaFX Script，并将其转变为 JavaFX 库。这是一组图形和媒体包，开发者可以使用它们来设计、创建、测试、调试和部署富客户端应用程序，这些应用程序能在包括移动设备在内的多种平台上一致运行。JavaFX
  旨在取代 Swing 成为 JDK 的主要 GUI 库，但在 JDK 10 之前，Swing 和 JavaFX 都是所有 JDK 版本的一部分。这种情况在 JDK
  11 中发生了变化。从 JDK 11 开始，JavaFX 仅作为独立模块提供，并且该模块成为 OpenJFX 项目下 OpenJDK 的一部分^(⁹²)。


  JavaFX 是一个用于开发桌面应用程序以及富互联网应用程序（RIA）的 Java 库。JavaFX 的使用率仍未达到 Oracle 的预期，但将其从 JDK
  中分离出来，使其得以转变为市场上其他现有 GUI 工具包（如 Eclipse SWT^(⁹³) 和 Google Web Toolkit (GWT)^(⁹⁴)）的真正竞争对手。


  在从 JDK 中分离出来后，JavaFX 独立发展，并与发布的 Java 版本保持同步。在撰写本章时，已有 JavaFX 23 版本可供下载^(⁹⁵)。官方文档足以帮助你入门。


