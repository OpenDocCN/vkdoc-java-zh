  这些特性为进修学生和有抱负的开发者提供了尝试 Java 代码的机会，而不会因为需要安装并熟悉大量工具（仅仅为了在控制台打印一条消息）而感到不知所措。


  Java 21 引入了使用简化 Java 方言运行单个 Java 文件的可能性。在编写本章时，该功能仍处于预览阶段，但在 Java 23 发布时，它可能会成为正式功能。


  Java 22 增加了运行多个 Java 文件的可能性。包含 `main(..)` 方法的类可以引用其他文件中的类，只要它们与主类位于同一目录（同级或嵌套目录）中，就可以正常工作。当一个类位于目录或嵌套目录结构中时，该类被视为位于一个包中，因此
  Java 文件必须包含包声明。例如，让我们考虑清单 2-26 中的两个 Java 文件。


