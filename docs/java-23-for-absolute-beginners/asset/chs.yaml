  \ 类将无法编译。尝试在该语句前面加上 `//`——这会将这一行变成注释，编译器会忽略它。您会看到编辑器通过将与那个列表相关的任何代码片段变成亮红色来表示报错。\n\
  \n语句 `List<String> items = List.of(\"1\", \"a\", \"2\", \"a\", \"3\", \"a\");` 创建了一个文本值的列表。这种创建列表的方式是在\
