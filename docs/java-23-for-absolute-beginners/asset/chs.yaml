  ## 国际化


  交互式应用程序通常设计为部署在多台服务器上，并实现 24/7 全天候可用，且覆盖多个地区。由于并非所有人都使用同一种语言，说服用户成为你的客户并使用你的应用程序的关键在于，以多种语言构建它。设计应用程序以满足多个国家用户需求并易于适应这些需求的过程称为**国际化**。例如，以最初的谷歌页面为例。根据访问地点，它会根据该地区切换语言。当你创建账户时，你可以选择偏好的语言。这并不意味着谷歌为每个地区都构建了一个
  Web 应用程序；相反，它是一个单一的 Web 应用程序，根据用户所在位置以不同语言显示文本。国际化应在应用程序的设计阶段就予以考虑，因为后期添加会非常困难。我们尚未构建
  Web 应用程序（将在下一节中构建），因此我们将对本章迄今为止构建的 JavaFX 应用程序进行国际化处理。


  当你开始阅读有关国际化的内容时，可能会注意到包含国际化属性文件的文件或目录被命名为 *i18n*，这是因为在英文字母表中，*i* 和 *n* 之间有 18 个字母。


  国际化基于区域设置。**区域设置**是指语言和地区的组合。应用程序的区域设置决定了将使用哪个国际化文件来自定义应用程序。区域设置概念由 Java 的 `java.util.Locale`
  类实现，一个 `Locale` 实例代表一个地理、政治或文化区域。当应用程序依赖于区域设置时，我们说它是*区域设置敏感的*，如今大多数应用程序都是如此。选择区域设置也可能是用户需要做的事情。每个
  `Locale` 可用于选择相应的*区域资源*，这些资源是包含特定区域配置的文件。这些文件按区域分组，通常可以在 `resources` 目录下找到。这些资源用于配置
  `java.util.ResourceBundle` 的实例，该实例可用于管理特定于区域的资源。


  为了构建一个合适的本地化用例，我们将修改之前的 JavaFX 应用程序：列表中将不再包含歌手姓名，而是包含一组动物名称及其标签，这些标签可以翻译成多种语言。我们还将添加一个可用语言列表，当从此列表中选择一种语言时，一个
  `Locale` 静态变量将被设置为相应的区域设置，并且窗口将被重新初始化，以便所有标签都能翻译成新语言。让我们从创建资源文件开始。


  *资源文件*具有 `.properties` 扩展名，并且顾名思义，包含一系列属性和值。每行遵循以下模式：`property_name=property_value`，如果不遵循，则不被视为国际化资源文件。每个属性名称在文件中必须是唯一的；如果存在重复，它将被忽略，并且
  IntelliJ IDEA 会通过用红色下划线标记该属性来发出警告。对于需要支持的每种语言，我们需要创建一个资源文件，该文件包含与其他文件相同的属性名称，但属性值不同，因为这些值将代表该值在每种语言中的翻译。所有文件的名称必须包含一个共同的后缀，并以语言名称和国家/地区结尾，用下划线分隔，因为这是创建
  `Locale` 实例所需的两个元素。对于我们的 JavaFX 应用程序，我们有四个文件，如图 10-10 所示。


