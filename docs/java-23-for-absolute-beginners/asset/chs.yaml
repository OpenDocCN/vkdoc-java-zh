  \ 标签用于添加文本，以解释废弃的原因、组件计划移除的版本以及应使用的替代方案。Javadoc 生成工具会提取此标签的文本，使用斜体显示，并将其添加到组件（类、字段、方法等）的主要描述中。\n\
