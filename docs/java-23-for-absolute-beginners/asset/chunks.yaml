    一个`List<E>`包含一个未排序的非唯一数据集合，包括`null`元素。在清单[5-39](#463938_3_En_5_Chapter.xhtml#PC68)中，我们声明了一个`List<E>`类型的引用和一个`ArrayList<E>`类型的对象。我们这样做是因为所有实现都具有相同的API，我们可以轻松地将`ArrayList<E>`切换为`LinkedList<E>`，并且代码仍然可以工作：


    ```java

    List stringList = new ArrayList();

    stringList = new LinkedList();

    ```


    **重要**


    声明抽象引用是一种良好的编程实践，因为它提高了代码的灵活性。


    前面示例中的语法是Java 1.7之前的版本。在Java 1.7中，引入了`<>`（菱形运算符）。这进一步简化了集合的初始化，因为它只需要在引用声明中声明列表中元素的类型。因此，前面代码片段中的两行变为：


    ```java

    List stringList = new ArrayList();

    stringList = new LinkedList();

    ```


    从Java 1.5开始，每个新的Java版本都对集合框架进行了更改。Java 1.8通过在`java.lang.Iterable<E>`接口（见图[5-20](#463938_3_En_5_Chapter.xhtml#Fig20)）中添加一个名为`forEach`的默认方法，增加了对lambda表达式的支持，该接口由`java.lang.Collection<E>`接口扩展。因此，之前使用`for`循环打印列表中所有值的代码可以替换为：


    ```java

    stringList.forEach(element -> System.out.println(element));

    ```


    在Java 9中，引入了另一个改进：集合的工厂方法。我们的集合是通过重复调用`add(..)`来填充元素的，这有点冗余，特别是当我们已经拥有要放入列表的完整元素集合时。这就是为什么在Java
    9中引入了在一行代码中创建集合对象的方法，如下例所示：


    ```java

    List stringList = List.of("one", "two", "three");

    ```


    生成的`List<E>`是一个不可变集合：它不能再被修改，意味着不能向其中添加或移除元素。


    Java 10增加了对局部变量类型推断的支持，这意味着我们不再需要显式指定引用类型，因为它将根据对象类型自动推断。因此，以下声明：


    ```java

    List stringList = List.of("one", "two", "three");

    ```


    变为：


    ```java

    var stringList = List.of("one", "two", "three");

    ```


    直到Java 21，集合框架一直缺少一种表示具有定义相遇顺序的元素序列的集合类型。它也缺少一组适用于此类集合的统一操作。例如，`List<E>`和`Deque<E>`都定义了相遇顺序，但它们的公共超类型`Collection<E>`却没有。类似地，`Set<E>`没有定义相遇顺序，并且像`HashSet<E>`这样的子类型也没有定义，但像`SortedSet<E>`和`LinkedHashSet<E>`这样的子类型定义了。Java
    21引入了`SequencedCollection<E>`接口，该接口定义了一个具有良好定义的相遇顺序的集合，支持两端操作，并且是可逆的。


    当然，在Java 21之前也可以访问集合的两端，但这需要调用带有特定索引的`get(..)`和`add(..)`方法。新方法提供了一种使用有序集合编写代码的简单方式，并且更简单的代码也更容易阅读。


