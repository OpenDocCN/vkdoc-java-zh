    ### Java 21


    JDK 21^(²³) 是下一个**长期支持**（LTS）版本，Oracle 将为其提供八年支持。根据 Oracle 为 Java SE 版本制定的六个月发布节奏，它于
    2023 年 9 月 19 日发布。


    多年来，Java 特性的提议、实现和跟踪方式一直是通过 JDK 增强提案（**JEPs**）进行的。JEPs 代表单个提案，但可以根据其范围进行分类，并归入
    Java *项目*中。这些项目的命名相当随意。以下列表列出了本书介绍的大多数特性所属的最重要项目：


    *   **Amber** 专注于 Java 语言特性和新语法。


    *   **Babylon** 专注于将 Java 的应用范围扩展到外部编程模型，例如 SQL 和机器学习。


    *   **Panama** 专注于改进和丰富 Java 虚拟机与定义明确但*外部*（非 Java）API 之间的连接，包括 C 程序员常用的许多接口。


    *   **Leyden** 专注于改进 Java 程序的启动时间、达到峰值性能的时间以及内存占用。


    *   **Loom** 专注于探索和孵化 Java VM 特性以及基于这些特性构建的 API，用于实现轻量级用户模式线程（纤程）。


    *   **Valhalla** 专注于对 Java 对象模型进行底层改进，以更高效地使用内存。


    *   **ZGC** 专注于开发和完善一种可扩展的低延迟垃圾收集器，能够处理大小从 8MB 到 16TB 的堆，且最大暂停时间低于毫秒级。


    *   **VisualVM** 继续开发用于监控 Java 应用程序的 VisualVM 工具。


    JDK 21 的特性列表更长，因为它是一个 LTS 版本，并且包含了许多已经成熟并极大改进了 JDK 的特性。以下列表列出了 JDK 21 最重要的成熟特性和预览特性；完整列表请查看官方页面。


    *   **虚拟线程** 的实现现已准备就绪，详见**第 5 章**。


    *   **分代 ZGC** 也是如此，详见**第 13 章**。


    *   **记录模式** 也已最终确定，详见**第 4 章**。


    *   `switch` 表达式的**模式匹配**，最终实现，详见**第 4 章**。


    *   **有序集合**。从一开始，Java 的集合框架就缺少一种表示具有定义相遇顺序的元素序列的集合类型。它也缺少一组适用于此类集合的统一操作。现在，通过引入
    `SequencedCollection<E>` 和 `SequencedSet<E>` 接口，这个问题已经得到解决。


    *   **分代 ZGC**。最初 ZGC 是非分代的。在此版本中，分代 ZGC 为年轻对象（最近分配的对象）和老对象（长期存活的对象）维护独立的分代。两代对象被独立收集，专注于快速收集年轻对象。这使得
    ZGC 能够更频繁地收集年轻对象——这些对象往往存活时间短。


    *   **未命名模式和变量**（预览），即 `_`（下划线）的回归。下划线在 JDK 8 之前得到支持，在 Java 9 中被移除，最终将在 JDK 21
    之后的版本中重新引入，其用途类似于 GoLang（Go 编程语言）中的下划线，详见**第 4 章**。


    *   **未命名类和实例主方法**（预览）。作为 JShell 的替代方案，此特性引入了 Java 语言的演进版本，使学生无需理解为大型程序设计的语言特性即可编写他们的第一个程序。这意味着能够直接运行
    Java 代码而无需编译。这对于跨越多行的 Java 代码片段更为实用，这些代码不太适合 JShell，详见**第 3 章**。


    *   **结构化并发**，首次预览，详见**第 5 章**。


    ### Java 22


    JDK 22^(²⁴) 于 2024 年 3 月 21 日发布，是另一个短期版本，专注于更新先前版本中引入的预览和孵化特性：


    *   **未命名变量和模式**，详见**第 4 章**。


    *   **外部函数与内存 API**。


    *   **super(...) 之前的语句**，首次预览，详见**第 4 章**。


    *   **类文件 API**，首次预览。在底层，这是一个非常重要的变化，它将允许项目使用由旧版本 Java 编译的依赖项，只要它们使用相同的类文件 API。


    *   **启动多文件源代码程序**，首次预览。Java 应用程序启动器得到增强，能够运行由多个 Java 源代码文件提供的程序。对于小型应用程序，这使得可以跳过使用构建工具，详见**第
    2 章**。


    *   **流收集器**，首次预览。对 Stream API 的增强，以支持自定义中间操作，详见**第 8 章**。


    *   **隐式声明的类和实例主方法**，第二次预览。此特性是一项增强，旨在允许学生为单类程序编写简化的声明，然后随着技能的增长，无缝地扩展其程序以使用更高级的特性，详见**第
    2 章**。它是 Java 21 中“未命名类和实例主方法”的扩展。


    *   **结构化并发**，第二次预览，详见**第 5 章**。


    ### Java 23


    JDK 23^(²⁵) 于 2024 年 9 月 17 日发布，是另一个短期版本，专注于更新先前版本中引入的预览和孵化特性。本书旨在向您介绍截至此版本最有趣的特性，即使它们仍处于预览阶段。


    此版本中最有趣的特性包括：


    *   **模式、`instanceof` 和 `switch` 中的原始类型**，首次预览，详见**第 6 章**。


    *   **Markdown 文档注释**，详见**第 9 章**。


    *   **流收集器**，第二次预览，详见**第 8 章**。


    *   **ZGC：默认启用分代模式**，详见**第 13 章**。


    *   **模块导入声明**，首次预览，详见**附录 A** 中的“高级模块配置”部分。


    *   **隐式声明的类和实例主方法**，第三次预览，详见**第 2 章**。


    *   **类文件 API**，第二次预览。再次强调，在底层，这是一个非常重要的变化，它将允许项目使用由旧版本 Java 编译的依赖项，只要它们使用相同的类文件
    API。


    *   **结构化并发**，第三次预览，详见**第 5 章**。


    *   **灵活的构造器体**，允许在 `super(..)` 调用之前放置语句的特性第二次预览，详见**第 4 章**。


    细节介绍到此为止。如果您想了解 Java 编程语言前 25 年的更多信息，可以轻松地在互联网上找到^(²⁶)。

    '
- fmt: "## Prerequisites\n\nBefore ending this chapter, it is only fair to tell you\
    \ that to learn Java, you need to have an Internet connection and know a few things:\n\
    \n- Your way around an operating system, such as Windows, Linux, or macOS.\n-\
    \ How to refine your search criteria, because information related to your operating\
    \ systems is not covered in the book; if you have issues, you must fix them yourself.\n\
    \nIf you already know Java, and you bought this book out of curiosity, knowing\
    \ about a build tool like Maven or Gradle is helpful, because the source code\
    \ is organized in a multimodule project that can be fully built with one simple\
    \ command. As previously mentioned, I’ve chosen to use a build tool because in\
    \ this day and age, learning Java without one makes no sense; any company you\
    \ apply to most definitely uses one.\n\nAside from the prerequisites that I listed,\
    \ you also need install a JDK and a Java Editor, as covered in **Chapter** [**2**](#463938_3_En_2_Chapter.xhtml).\
    \ You do not need to know math, algorithms, or design patterns. Actually, you\
    \ might end up knowing a few after you read this book.\n\nThis being said, let’s\
    \ dig in.\n\n## Summary\n\nJava has dominated the industry for more than 25 years.\
    \ It wasn’t always at the top of the most-used development technologies, but it\
    \ has never left the top five. Even with server-side JavaScript smart frameworks,\
    \ like Node.js, React, or TypeScript, the heavy lifting is still left to Java.\
    \ Emerging programming languages like Scala and Kotlin run on the JVM, so maybe\
    \ the Java programming language will suffer a serious metamorphosis in order to\
    \ compete, but it will still be here.\n\nThe modularization capability introduced\
    \ in version 9 opens the gates for Java applications to be installed on smaller\
    \ devices, because to run a Java application, we no longer need the whole runtime—only\
    \ its core plus the modules the application was built with.\n\nFurthermore, there\
    \ are a lot of applications written in Java, especially in the financial domain,\
    \ so Java will still be here because of legacy reasons and because migrating these\
    \ titan applications to another technology is an impossible task. Most of these\
    \ applications might be stuck on JDK 8 because of their complexity and because\
    \ they have a lot of dependencies that would require upgrading too.\n\nThere are\
    \ also many frameworks written in Java, like Spring, Micronaut, Helidon Quarkus.\
    \ By adopting the most recent version of Java, the teams developing them make\
    \ sure that there is an incentive to keep the JDK alive and evolving.\n\nJava\
    \ will probably survive and be on top for many years to come. The fact that it\
    \ is a very mature technology with a huge community built around it will help\
    \ to ensure that it endures. Being very easy to learn and developer-friendly makes\
    \ it remain the first choice for most companies. So, you might conclude at this\
    \ point that learning Java and buying this book is a good investment.\n\nThis\
    \ chapter has a lot of references. They are interesting to read, but they are\
    \ not mandatory to understand the contents of this book. The same goes for the\
    \ references cited in the rest of the chapters.\n\nFootnotes [1](#463938_3_En_1_Chapter.xhtml#Fn1_source)\
    \ [2](#463938_3_En_1_Chapter.xhtml#Fn2_source) [3](#463938_3_En_1_Chapter.xhtml#Fn3_source)\
    \ [4](#463938_3_En_1_Chapter.xhtml#Fn4_source) [5](#463938_3_En_1_Chapter.xhtml#Fn5_source)\
    \ [6](#463938_3_En_1_Chapter.xhtml#Fn6_source) [7](#463938_3_En_1_Chapter.xhtml#Fn7_source)\
    \ [8](#463938_3_En_1_Chapter.xhtml#Fn8_source) [9](#463938_3_En_1_Chapter.xhtml#Fn9_source)\
    \ [10](#463938_3_En_1_Chapter.xhtml#Fn10_source) [11](#463938_3_En_1_Chapter.xhtml#Fn11_source)\
    \ [12](#463938_3_En_1_Chapter.xhtml#Fn12_source) [13](#463938_3_En_1_Chapter.xhtml#Fn13_source)\
    \ [14](#463938_3_En_1_Chapter.xhtml#Fn14_source) [15](#463938_3_En_1_Chapter.xhtml#Fn15_source)\
    \ [16](#463938_3_En_1_Chapter.xhtml#Fn16_source) [17](#463938_3_En_1_Chapter.xhtml#Fn17_source)\
    \ [18](#463938_3_En_1_Chapter.xhtml#Fn18_source) [19](#463938_3_En_1_Chapter.xhtml#Fn19_source)\
    \ [20](#463938_3_En_1_Chapter.xhtml#Fn20_source) [21](#463938_3_En_1_Chapter.xhtml#Fn21_source)\
    \ [22](#463938_3_En_1_Chapter.xhtml#Fn22_source) [23](#463938_3_En_1_Chapter.xhtml#Fn23_source)\
    \ [24](#463938_3_En_1_Chapter.xhtml#Fn24_source) [25](#463938_3_En_1_Chapter.xhtml#Fn25_source)\
    \ [26](#463938_3_En_1_Chapter.xhtml#Fn26_source)\n\n# 2. Preparing Your Development\
    \ Environment\n\nTo start learning Java, your computer needs to be set up as a\
    \ Java development machine. Thus, here are the requirements:\n\n- Java support\
    \ on your computer is *kinda’ mandatory \U0001F60A.*\n- An integrated development\
    \ environment, also known as IDE, which is basically an application in which you\
    \ write your code. An IDE assists you when writing code, compiling it, and executing\
    \ it.\n    - The recommended IDE for this book is IntelliJ IDEA. You can go to\
    \ the official website ([`https://www.jetbrains.com/idea/`](https://www.jetbrains.com/idea/))\
    \ to get the free community edition, which is sufficient for the purposes of this\
    \ book.\n    - Or you can choose the most popular free IDE for Java development:\
    \ Eclipse ([`https://www.eclipse.org/`](https://www.eclipse.org/)).\n    - Or\
    \ you can try Apache NetBeans, which in the past was the default choice for most\
    \ beginners because it was bundled with the JDK until version 8. It was taken\
    \ out of the JDK in Java 9 and can now be downloaded from here: [`https://netbeans.apache.org`](https://netbeans.apache.org).\n\
    - Apache Maven is a build tool used to organize projects, easily handle dependencies,\
    \ and make your work easier in big multimodule projects. (It is mandatory because\
    \ the projects in this book are organized and built with a Maven setup.)\n- Git\
    \ is a versioning system that you can use to get the source code for the book,\
    \ and you can experiment with it and create your own version. It is optional because\
    \ GitHub, which is where the sources for this chapter are hosted, supports downloading\
    \ them directly as an archive.\n\nNote\n\nAny respectable software company uses\
    \ a versioning system these days, so being comfortable with Git is a serious advantage\
    \ when applying for a software developer position.\n\nTo write and execute Java\
    \ programs/applications, you only need the Java Development Kit installed. *Nothing\
    \ stops you writing Java code in Notepad, if that is what you want.* All other\
    \ tools that I’ve listed here are needed only to make your job easier and to familiarize\
    \ you with a real development job.\n\nImportant\n\nYou probably need administrative\
    \ rights if you install these applications for all users. For more recent versions\
    \ of Windows, you might even need administrative rights so you can install the\
    \ necessary tools. This book provides instructions on how to install everything—assuming\
    \ your user has the necessary rights. If you need more information, the Internet\
    \ is here to help.\n\nIf the requirements seem like a lot to set up, do not get\
    \ discouraged; this chapter contains instructions on how to install each tool\
    \ and verify that it is working properly. Let’s start by making sure your computer\
    \ supports Java."
