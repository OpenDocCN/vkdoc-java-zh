    The constructors can call each other by using `this(...)`. This is pretty useful
    to avoid writing the same code twice, thus promoting code reusability.


    So now both constructors provide the means to create `Human` instances. If we
    use the one that does not set the height, the `height` field will be implicitly
    initialized with the default value for type `float (0.0)`.


    Now our class is quite basic, and we could even say that it models a `human` in
    a quite abstract way. If we want to try to model humans with certain skill sets
    or abilities, we have to create new classes. Let’s say we want to model musicians
    and actors. This means we need to create two new classes. The `Musician` class
    is depicted in Listing [4-26](#463938_3_En_4_Chapter.xhtml#PC26); getters and
    setters for the fields are skipped.


    ```

    package com.apress.bgn.four.classes;

    import java.util.List;

    public class Musician {

    public static final int LIFESPAN = 100;

    private String name;

    private int age;

    private float height;

    private String musicSchool;

    private String genre;

    private List songs;

    // other code omitted

    }

    Listing 4-26

    Musician Class

    ```


    The `Actor` class is depicted in Listing [4-27](#463938_3_En_4_Chapter.xhtml#PC27);
    getters and setter for the fields are skipped.


    ```

    package com.apress.bgn.four.classes;

    import java.util.List;

    public class Actor {

    static final int LIFESPAN = 100;

    private String name;

    private int age;

    private float height;

    private String actingSchool;

    private List films;

    // other code omitted

    }

    Listing 4-27

    Actor Class

    ```


    As you can see, the two classes have more than a few common elements. As previously
    mentioned, one of the clean coding principles requires developers to avoid code
    duplication. This can be done by designing the classes by following two more OOP
    principles: **inheritance** (which was mentioned briefly) and **abstraction**.


    ### Abstraction and Inheritance


    **Abstraction** is an OOP principle that manages complexity. Abstraction is used
    to decompose complex implementations and define core parts that can be reused.
    In our case, common fields of classes `Musician` and `Actor` can be grouped in
    the `Human` class that we defined earlier in the chapter. The `Human` class can
    be viewed as an abstraction, because any human in this world is more than their
    name, age, and height. There is no need to ever create `Human` instances, because
    any human will be represented by something else, such as passion, purpose, and
    skill. A class that does not need to be instantiated, but just groups together
    fields and methods for other classes to inherit or provide a concrete implementation
    for is modelled in Java by an **abstract** class. Thus, the `Human` class is modified
    to make it abstract. Since we are abstracting this class, we’ll make the `LIFESPAN`
    constant public to make it accessible from anywhere and make the `getTimeToLive()`
    method abstract to delegate its implementation to extending classes.


    Important


    When you declare at least one method as abstract, the class must be declared abstract
    too.


    The class contents are shown in Listing [4-28](#463938_3_En_4_Chapter.xhtml#PC28).


    ```

    package com.apress.bgn.four.classes;

    public abstract class Human {

    public static final int LIFESPAN = 100;

    private String name;

    private int age;

    private float height;

    public Human(String name, int age) {

    this.name = name;

    this.age = age;

    }

    public Human(String name, int age, float height) {

    this(name, age);

    this.height = height;

    }

    /**

    * @return time to live

    */

    public abstract int getTimeToLive();

    // getters and setters omitted

    }

    Listing 4-28

    Human Abstract Class

    ```


    An abstract method is a method missing the body, like the `getTimeToLive()` method
    declared in Listing [4-28](#463938_3_En_4_Chapter.xhtml#PC28). This means that
    within the `Human` class, there is no concrete implementation for this method,
    only a skeleton, a template. A concrete implementation for this method must be
    provided by the extending classes.


    Oh, but wait, we kept the constructors! Why did we do that, if we are not allowed
    to use them anymore? And we aren’t, as confirmed in Figure [4-6](#463938_3_En_4_Chapter.xhtml#Fig6),
    which shows what IntelliJ IDEA does with the `BasicHumanDemo` class now.


    ![](images/463938_3_En_4_Chapter/463938_3_En_4_Fig6_HTML.jpg)


    Figure 4-6


    Java compiler error when trying to instantiate an abstract class


    Yes, that is a compile error. Constructors can be kept, as they can help further
    in abstracting behavior. Classes `Musician` and `Actor` must be rewritten to extend
    the `Human` class. This is done by using the `extends` keyword when declaring
    the class and specifying the class to be extended, also called the **parent class**
    or **superclass****.** The resulting class is called a **subclass**.


    Important


    When extending a class, the subclass inherits all the fields and concrete methods
    declared in the superclass. (Access to them is defined by access modifiers, covered
    in **Chapter** [**3**](#463938_3_En_3_Chapter.xhtml).) The exception are abstract
    methods, for which the subclass is forced to provide a concrete implementation—unless
    the subclass is abstract too, of course.


    Important


    The subclass must declare its own constructors that make use of the ones declared
    in the superclass. The constructors from the superclass are called using the keyword
    `super`. The same goes for methods and fields, unless they have an access modifier
    that prohibits access. Can you guess which one it is? It is `private`. A subclass
    cannot access private members of the superclass. If you did not know the answer,
    you might want to review **Chapter** [**3**](#463938_3_En_3_Chapter.xhtml).


    Listing [4-29](#463938_3_En_4_Chapter.xhtml#PC29) depicts a version of the `Musician`
    class that is written by making use of abstraction and inheritance.'
