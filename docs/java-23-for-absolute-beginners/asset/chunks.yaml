  trans: '

    ### Java 9


    JDK 9 于 2017 年 9 月发布。期待已久的 *Jigsaw* 项目终于到来。Java 平台最终实现了模块化。


    重要


    Java 模块对 Java 世界来说是一个重大变革。这并非语法上的改变，也不仅仅是一些新特性，而是平台设计上的改变。我认识的一些自 Java 诞生之初就使用它的资深开发者在适应过程中遇到了困难。它旨在解决
    Java 多年来一直存在的一些严重问题（详见**第** **3** **章**）。你很幸运，因为作为初学者，你从零开始，因此无需改变开发应用程序的方式。在
    Java 9 之前，Java 模块化应用程序是使用诸如 OSGi^(⁸) 之类的框架开发的，这些框架使用起来很痛苦，因为它们需要额外的配置和特殊的打包方式。Jigsaw
    使模块配置变得更加容易，并使其成为 Java 应用程序的一部分，而不是由 Maven 等构建工具解释的额外配置文件。


    以下是 JDK 9 除引入 Java 模块外最重要的特性：


    *   Java Shell 工具，一个用于评估用 Java 编写的声明、语句和表达式的交互式命令行界面，详见**第** **2** **章**

    *   相当多的安全更新

    *   支持接口中的 `private` 方法，详见**第** **4** **章**

    *   改进的 `try-with-resources`，允许将最终变量用作资源，详见**第** **5** **章**

    *   从合法标识符集合中移除 `_`（下划线），详见**第** **4** **章**

    *   对 G1 垃圾回收器的增强，使其成为默认垃圾回收器，详见**第** **13** **章**

    *   内部使用一种更紧凑的新 `String` 表示形式，详见**第** **5** **章**

    *   并发更新（与并行执行相关，在**第** **5** **章**中提及）

    *   集合的工厂方法，详见**第** **5** **章**

    *   图像处理 API 的更新，优化了用于编写图像处理代码的组件


    ### Java 10


    JDK 10（又名 Java 18.3）于 2018 年 3 月 20 日发布。Java 10 采用了 Oracle 制定的新版本命名约定：版本号遵循 $*YEAR*.$MONTH
    格式^(⁹)。这种发布版本风格旨在让开发者和最终用户更容易了解某个版本的发布时间，从而判断是否应将其升级到包含最新安全修复和附加功能的新版本。


    安装 JDK 10 后，在终端中运行 `java -version` 会显示类似于代码清单 1-4 的日志。


    ```

    $ java -version

    java version "10" 2018-03-20

    JavaTM SE Runtime Environment 18.3 build 10+46

    Java HotSpotTM 64-Bit Server VM 18.3 build 10+46, mixed mode

    代码清单 1-4

    执行 java -version 的 Java 10 日志

    ```


    以下是 Java 10 最重要的特性：^(¹⁰)


    *   局部变量类型推断，以增强语言能力，将类型推断扩展到局部变量（这是最受期待的特性，详见**第** **4** **章**）。

    *   更多垃圾回收优化，详见**第** **13** **章**。

    *   应用程序类数据共享，通过跨进程共享通用类元数据来减少内存占用（这是一个高级特性，本书不涉及）。

    *   更多并发更新（与并行执行相关，在**第** **5** **章**中提及）。

    *   在替代内存设备上进行堆分配。JVM 运行 Java 程序所需的内存——称为*堆内存*——可以在替代内存设备上分配，因此堆也可以在易失性和非易失性 RAM
    之间拆分。（**第** **5** **章**提供了有关 Java 应用程序使用内存的更多详细信息。）


    2018 年 6 月，Oracle 和 Java 生态系统的其他参与者宣布更改 Java SE 的发布节奏模型：不再计划每两到三年（通常变成三到四年）发布一个主要版本，然后附带一长串修补程序，而是采用新的六个月功能发布列车模型。


    注意


    对于 Java SE 8 之后的版本，Oracle 每两年指定一个版本作为**长期支持**（**LTS**）版本。使用 LTS 版本进行开发的 Oracle
    客户将获得 Oracle 首要支持和定期更新版本。非 LTS 版本是对最新 LTS 版本的一系列实现增强的累积，其支持期限仅限于下一个 LTS 版本发布之前。


    警告


    Java 9 和 10 不是 LTS 版本，因此不建议用于生产环境。

    '
- fmt: '# Java 11


    JDK 11^([^(11)](#fn11)) (a.k.a. Java 18.9), released on September 25, 2018, contains
    the following features:


    - Removal of JEE advanced components used to build enterprise Java applications
    and Corba (very old technology for remote invocation, allowing your application
    to communicate with applications installed on a different computer) modules.

    - Local-variable syntax for lambda parameters allow the `var` keyword to be used
    when declaring the formal parameters of implicitly typed lambda expressions.

    - Epsilon, a low-overhead garbage collector (a no-GC, so basically you can run
    an application without a GC), providing more optimizations to the garbage collection,
    covered in **Chapter** [**13**](#463938_3_En_13_Chapter.xhtml).

    - Introduction of the new HTTP client API.

    - More concurrency updates (related to parallel execution, mentioned in **Chapter**
    [**5**](#463938_3_En_5_Chapter.xhtml)).

    - The Nashorn JavaScript script engine and APIs are marked as deprecated with
    the intent to remove them in a future release. ECMAScript language constructs
    evolve pretty rapidly, so Nashorn was getting difficult to maintain.


    Aside from these changes, it was also speculated that a new versioning change
    should be introduced because the `$YEAR.$MONTH` format did not go so well with
    developers. (Why so many versioning naming changes, right? Is this really so important?
    Apparently, it is.) The proposed versioning change is similar to the one introduced
    in Java 9.


    When JDK 11 is installed, running `java -version` in a terminal shows a log that
    is similar to the one in Listing [1-5](#463938_3_En_1_Chapter.xhtml#PC7).


    ```

    $ java -version

    java version "11.0.20" 2023-07-18 LTS

    Java(TM) SE Runtime Environment 18.9 (build 11.0.20+9-LTS-256)

    Java HotSpot(TM) 64-Bit Server VM 18.9 (build 11.0.20+9-LTS-256, mixed mode)

    Listing 1-5

    Java 11 Log for Execution of java -version

    ```


    As shown in Listing [1-5](#463938_3_En_1_Chapter.xhtml#PC7), JDK 11 was a **Long-Term
    Support (LTS) release** with several years of support.


    Concomitant with the release of JDK 11, Oracle announced that they would start
    charging for Java SE 8 licenses, so small businesses that were trying to reduce
    their software costs started looking for alternatives. There are two free options:
    AdoptJDK and OpenJDK. AdoptOpenJDK^([^(12)](#fn12)) provides prebuilt OpenJDK
    binaries from a fully open source set of build scripts and infrastructure, for
    multiple platforms.


    OpenJDK has the same code as Oracle JDK, depending on what provider you’re using.
    Another advantage of OpenJDK is that, whereas Oracle JDK cannot be modified to
    suit the needs of a business application, OpenJDK can be modified because it is
    licensed under the GNU General Public License, which is quite permissive.


    Also, if money is not an issue, Amazon Corretto, Azul Zulu, and GraalVM are all
    alternate JDKs optimized in one way or another.


    # Java 12


    JDK 12^([^(13)](#fn13)), released on March 29, 2019, contains the following important
    features:


    - A new experimental garbage collector (GC) algorithm named Shenandoah that reduces
    GC pause times.

    - Modified syntax for the `switch` statement, allowing it to be used as an expression
    as well. Also, it removes the need for `break` statements, covered in **Chapter**
    [**7**](#463938_3_En_7_Chapter.xhtml).

    - JVM Constants API, to model nominal descriptions of key class-file and runtime
    artifacts. This API can be helpful for tools that manipulate classes and methods.

    - Minor improvements to the G1 garbage collector, covered in **Chapter** [**13**](#463938_3_En_13_Chapter.xhtml).

    - Class Data Sharing (CDS) archives to improve the JDK build process.

    - Approximately 100 microbenchmarks^([^(14)](#fn14)) were added to the JDK source.


    JDK 12 is part of Oracle’s six-month release cadence introduced with JDK 9 in
    September 2017. JDK 12 is a feature release with a short support lifespan.


    # Java 13


    JDK 13^([^(15)](#fn15)), released on September 17, 2019, contains a few important
    features, hundreds of smaller enhancements, and thousands of bug fixes. The most
    important features of this version are:


    - Improvement of the CDS archive support added in JDK 12

    - Z Garbage Collector enhancements, covered in **Chapter** [**13**](#463938_3_En_13_Chapter.xhtml)

    - A new implementation of the Legacy Socket API

    - More improvements for the `switch` expressions, covered in **Chapter** [**7**](#463938_3_En_7_Chapter.xhtml)

    - Support for text blocks (first preview), covered in **Chapter** [**5**](#463938_3_En_5_Chapter.xhtml)


    JDK 13 is a feature release with a short support lifespan as well.


    # Java 14


    JDK 14^([^(16)](#fn16)), released on March 17, 2020, contains a big list of important
    features, enhancements, and bug fixes. The most important features of this version
    are:


    - Pattern matching for the `instanceof` operator, covered in **Chapter** [**6**](#463938_3_En_6_Chapter.xhtml).

    - JFR Event Streaming API for collecting profiling and diagnostic data about a
    Java application and the JVM as they’re running.

    - More enhancements of the G1 garbage collector, covered in **Chapter** [**13**](#463938_3_En_13_Chapter.xhtml).

    - The CMS (Concurrent Mark Sweep) garbage collector was removed.

    - Support for the Z Garbage Collector for macOS, covered in **Chapter** [**13**](#463938_3_En_13_Chapter.xhtml).

    - Records were introduced to provide a compact syntax for declaring classes that
    are transparent holders for shallowly immutable data, covered in **Chapter** [**4**](#463938_3_En_4_Chapter.xhtml).

    - Foreign Memory Access API provides support for Java programs to safely and efficiently
    access foreign memory outside the Java heap.

    - Improvements of the `NullPointerException` class to provide more precise details
    to easily identify the variable being `null`.

    - The `jpackage` tool was introduced to provides support for native packaging
    formats to give end users a natural installation experience.


    Although this release contains a lot of new features, most of them are available
    only in preview mode or are considered being in the `incubation` phase, making
    this release unstable and not a candidate for long-term support.


    # Java 15


    JDK 15^([^(17)](#fn17)), released on September 15, 2020, contains considerable
    improvements to projects added in previous versions. The most notable features
    of this version are:


    - Removal of the Nashorn JavaScript Engine.

    - Addition of sealed and hidden classes (Preview), covered in **Chapter** [**4**](#463938_3_En_4_Chapter.xhtml).

    - **Text blocks** add support for multi-line string literal that avoids the need
    for most escape sequences, automatically formats the string in a predictable way,
    and gives the developer control over the format when desired, covered in **Chapter**
    [**5**](#463938_3_En_5_Chapter.xhtml).

    - The Edwards-Curve Digital Signature Algorithm (EdDSA) is now supported for cryptographic
    signatures.

    - More enhancements for the Legacy DatagramSocket API.

    - Biased Locking was disabled and deprecated, leading to performance increase
    for multithreaded applications.

    - Records, second preview, covered in **Chapter** [**4**](#463938_3_En_4_Chapter.xhtml).


    JDK 15 is just a short-term release that was supported with Oracle Premier Support
    for six months until JDK 16 arrived in March 2021.'
