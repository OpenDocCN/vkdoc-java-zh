    ### try/catch Blocks


    And since we are talking about exceptions, the `try/catch` block can be completed
    with a `finally` block. The contents of the `finally` block are almost always
    executed. If the exception does not match any of the types declared in the `catch`
    block (yes, more than one type can be declared in a `catch` block, as discussed
    later in the book.), the exception is thrown further, but the `finally` block
    is still executed. If the method returns normally, the `finally` block is executed.
    The only situation in which the `finally` block is not executed is when the program
    ends in an error.


