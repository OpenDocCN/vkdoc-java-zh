    # 13. Garbage Collection


    When executing Java code, objects are created, used, and discarded repeatedly
    from memory. The process through which unused Java objects are discarded is called
    **memory management** but is most commonly known as **garbage collection (GC)**.
    Garbage collection was mentioned in **Chapter** [**5**](#463938_3_En_5_Chapter.xhtml),
    as it was necessary for explaining the difference between primitive and reference
    types, but in this chapter we will go deep *under the hood* of the JVM to resolve
    yet another mystery of a running Java application.


    When the Java Garbage Collector does its job properly, the memory is cleaned up
    before new objects are created, and it does not fill up, so you could say that
    the memory allocated to a program is *recycled*. Programs of low complexity, like
    the ones we’ve been writing so far, do not require that much memory to function,
    but depending on their design (remember recursivity introduced in Chapter [4](#463938_3_En_4_Chapter.xhtml)?),
    they could end up using more memory than available. In Java, the garbage collector
    runs automatically. In more low-level languages like C/ C++, there is no automatic
    memory management, and the developer is responsible for writing the code to allocate
    memory as needed and deallocate it when it is no longer necessary. Although it
    seems practical to have automatic memory management, the garbage collector can
    be a problem if managed incorrectly. This chapter provides enough information
    about the garbage collector to ensure that you know how to use it wisely and that
    when problems arise, at least you will have a good place to start fixing them.


    Although some ways to tune the garbage collector will be introduced, keep in mind
    that garbage collector tuning should not be necessary. A program should be written
    in such a way that it creates only the objects that are needed to perform its
    function and references are managed correctly; estimations of memory capacity
    for the server to run the application should be done before the application is
    put into production, and the maximum amount of memory needed by it should be known
    and configured before that. If the memory allocated to a Java program is not enough,
    there is usually something rotten in the implementation.


    ## Garbage Collection Basics


    Java automatic garbage collection is one of the major features of the Java programming
    language. The JVM is a virtual machine used to execute Java programs, as mentioned
    at the beginning of this book. A Java program uses resources of the system that
    the JVM is running on top of, so it must have a way to release those resources
    safely. This job is done by the garbage collector.


    The performance of a garbage collector is evaluated considering the following
    three factors:


    *   **Throughput**: The rate at which processes complete application work. Ideally
    the JVM should be spending more time running an application and less time performing
    garbage collection.


    *   **Memory footprint**: The amount of memory required by the garbage collector.


    *   **Pause time**: The length of time the application is stopped during a garbage
    collection.


    To understand what the place of the garbage collector is among all JDK components,
    we must take a look at the JVM architecture^([^(127)](#fn127)).'
