- fmt: '### Java Grammar


    The Java language is **case sensitive**, which means that we can write a piece
    of code like the one depicted in Listing [4-7](#463938_3_En_4_Chapter.xhtml#PC7)
    and the code compiles and executes successfully.


    ```

    package com.apress.bgn.four;

    public class MultipleCaseVariables {

    public static void main(String... args) {

    int mynumber = 0;

    int myNumber = 1;

    int Mynumber = 2;

    int MYNUMBER = 3;

    System.out.println(mynumber);

    System.out.println(myNumber);

    System.out.println(Mynumber);

    System.out.println(MYNUMBER);

    }

    }

    Listing 4-7

    Java Code Proving Its Case Sensitivity

    ```


    All four variables are different, and the last four lines will print numbers `0
    1 2 3`. Obviously, you cannot declare two variables sharing the same name in the
    same context (e.g., in the body of a method), because you basically would be redeclaring
    the same variable. The Java compiler does not allow this. If you try to do this,
    your code will not compile, and even IntelliJ IDEA will try to make you see the
    error of your ways by underlining the code with red and showing you a relevant
    message, as shown on line 37 in Figure [4-2](#463938_3_En_4_Chapter.xhtml#Fig2)
    where variable `mynumber` was declared twice.


    ![](images/463938_3_En_4_Chapter/463938_3_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Same variable name used twice


    There is a set of **Java keywords** that can be used only for fixed and predefined
    purposes in the Java code. A few of them have already been introduced: `import`,
    `package`, `public`, `class`; the rest of them will be covered at the end of this
    chapter, with a short explanation for each of them in Tables [4-2](#463938_3_En_4_Chapter.xhtml#Tab2),
    [4-3](#463938_3_En_4_Chapter.xhtml#Tab3), and [4-4](#463938_3_En_4_Chapter.xhtml#Tab4).


    Important


    Java keywords cannot be used as identifiers in code written by developers, so
    they cannot be used as names for variables, classes, interfaces, objects, and
    so on.


    One or more types can be declared in a Java source file. Whether a `class`, `interface`
    (or `@interface`) or `enum`, the declaration of a type must be encased in curly
    brackets (`{}`). These are called **block delimiters**. `import` and `package`
    statements are not part of the type body. If you look back at the code in Listing
    [4-1](#463938_3_En_4_Chapter.xhtml#PC1), you will notice the brackets are used
    there to wrap up the following:


    - Contents of a class, also called the body of the class (brackets in lines 08
    and 23)

    - Contents of a method, also called the body of a method (brackets in lines 09
    and 22)

    - A set of instructions to be executed together (brackets in lines 13 and 21)


    Code lines are usually ended in Java by the semicolon (`;`) symbol or by the ASCII
    characters CR, or LF, or CR LF. These are called **line terminators**. Semicolons
    are used to terminate fully functioning statements, like the list declaration
    in line 11. When writing code on a small monitor, you might be forced to split
    that statement on two subsequent lines to keep the code readable. The semicolon
    at its end tells the compiler that the statement is correct only when taken all
    together. Look at Figure [4-3](#463938_3_En_4_Chapter.xhtml#Fig3).


    ![](images/463938_3_En_4_Chapter/463938_3_En_4_Fig3_HTML.jpg)


    Figure 4-3


    Different statement samples


    The first three `List` declarations are equivalent. When declaring a `List` this
    way, you can even split its elements on multiple lines. The declaration on line
    46, however, is written intentionally wrong. A semicolon is added in line 46,
    which ends the statement there. That statement is not valid, and when you try
    to compile that class, the compiler will complain about it by printing an exception
    saying `Error:(13, 46) java: illegal start of expression`.


    If the message of the error seems not to fit the example, think about it like
    this: the problem for the compiler is not the wrongful termination of the statement,
    but the fact that after the equals (`=`) symbol, the compiler expects to find
    some sort of expression that will produce the value for the `badList` variable,
    but instead it finds nothing.


    ### Java Identifiers and Variables


    An **identifier** is the name you give to an item in your Java code: class, variable,
    method, and so forth. Identifiers must respect a few rules to allow the code to
    compile and also follow common-sense programming rules, called **Java coding conventions**.
    A few of them are listed here:


    - An identifier cannot be one of the Java reserved words, or the code will not
    compile.

    - An identifier cannot be a boolean literal (`true`, `false`) or the `null` literal,
    or the code will not compile.

    - An identifier can be made of: letters, numbers, underscore (`_`), dollar sign
    (`$`).

    - An identifier cannot start with a number.

    - Starting with Java 9, a single underscore could no longer be used as an identifier,
    as it became a keyword. This is probably because in Java 7 numeric literals were
    introduced, and numbers with multiple digits can be written in a more readable
    way (e.g., `int i = 10_000;`).

    - Starting with Java 21, a single underscore can now be used again as an identifier,
    but only for variables that hold values not used in the code. This behavior is
    inspired from the Golang programming language, and these variables are referred
    to as *unnamed variables*.

    - Developers should declare their identifiers following **camel case** writing
    style, making sure each word or abbreviation in the middle of the identifier name
    begins with a capital letter (e.g., `StringBuilder`, `isAdult`).


    A **variable** is a set of characters that can be associated with a value. It
    has a type, and based on it, the set of values that can be assigned to it are
    restricted to a certain interval, group of values, or just must follow a certain
    format defined by that type. For example, the item declared in line 11 in Listing
    [4-1](#463938_3_En_4_Chapter.xhtml#PC1) is a variable of type `List`, and the
    value associated with it is a list of values.


    In Java there are three types of variables:


    - **Fields** (also known as **properties**) are variables that are defined in
    class bodies outside of method bodies and that do not have the keyword `static`
    in front of them.

    - **Local variables** are variables declared inside method bodies, and they are
    relevant only in that context.

    - **Static variables** are variables declared inside class bodies with the keyword
    `static` in front of them. If they are declared as `public` they are accessible
    within the application wherever the enclosing type is (unless the module does
    not export the package where they are declared, that is).


    ### Java Comments


    **Java comments** refer to pieces of explanatory text that are not part of the
    code being executed and are ignored by the compiler. There are three ways to add
    comments within the code in Java, each of which has unique characters to declare
    them. All three types of comments were used in Listing [4-1](#463938_3_En_4_Chapter.xhtml#PC1),
    and the following list explains the purpose of each:


    - `//` is used for single-line comments (line 10). Developers use this type of
    comment for adding `TODO` statements or explaining why a certain piece of code
    is needed. These comments are mostly intended for the team members working on
    the project.

    - `/** ... */` JavaDoc comments are exported using special tools into the documentation
    of a project called JavaDoc API (lines 05 to 07). Developers use this type of
    comment to document their code. There are plugins for build tools that can extract
    the JavaDoc from a project as a website, which then can be hosted publicly to
    help other developers using your project.

    - `/* ... */` is used for multiline comments (lines 14 to 16). Developers use
    this type of comment for adding `TODO` statements or for providing a lengthy explanation
    of why a certain piece of code is needed. These comments are mostly intended for
    the team members working on the project.'
  raw: '### Java Grammar


    The Java language is **case sensitive**, which means that we can write a piece
    of code like the one depicted in Listing [4-7](#463938_3_En_4_Chapter.xhtml#PC7)
    and the code compiles and executes successfully.


    ```

    package com.apress.bgn.four;

    public class MultipleCaseVariables {

    public static void main(String... args) {

    int mynumber = 0;

    int myNumber = 1;

    int Mynumber = 2;

    int MYNUMBER = 3;

    System.out.println(mynumber);

    System.out.println(myNumber);

    System.out.println(Mynumber);

    System.out.println(MYNUMBER);

    }

    }

    Listing 4-7

    Java Code Proving Its Case Sensitivity

    ```


    All four variables are different, and the last four lines will print numbers `0
    1 2 3`. Obviously, you cannot declare two variables sharing the same name in the
    same context (e.g., in the body of a method), because you basically would be redeclaring
    the same variable. The Java compiler does not allow this. If you try to do this,
    your code will not compile, and even IntelliJ IDEA will try to make you see the
    error of your ways by underlining the code with red and showing you a relevant
    message, as shown on line 37 in Figure [4-2](#463938_3_En_4_Chapter.xhtml#Fig2)
    where variable `mynumber` was declared twice.


    ![](images/463938_3_En_4_Chapter/463938_3_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Same variable name used twice


    There is a set of **Java keywords** that can be used only for fixed and predefined
    purposes in the Java code. A few of them have already been introduced: `import`,
    `package`, `public`, `class`; the rest of them will be covered at the end of this
    chapter, with a short explanation for each of them in Tables [4-2](#463938_3_En_4_Chapter.xhtml#Tab2),
    [4-3](#463938_3_En_4_Chapter.xhtml#Tab3), and [4-4](#463938_3_En_4_Chapter.xhtml#Tab4).


    Important


    Java keywords cannot be used as identifiers in code written by developers, so
    they cannot be used as names for variables, classes, interfaces, objects, and
    so on.


    One or more types can be declared in a Java source file. Whether a `class`, `interface`
    (or `@interface`) or `enum`, the declaration of a type must be encased in curly
    brackets (`{}`). These are called **block delimiters****.** `import` and `package`
    statements are not part of the type body. If you look back at the code in Listing
    [4-1](#463938_3_En_4_Chapter.xhtml#PC1), you will notice the brackets are used
    there to wrap up the following:


    *   Contents of a class, also called the body of the class (brackets in lines
    08 and 23)


    *   Contents of a method, also called the body of a method (brackets in lines
    09 and 22)


    *   A set of instructions to be executed together (brackets in lines 13 and 21)


    Code lines are usually ended in Java by the semicolon (`;`) symbol or by the ASCII
    characters CR, or LF, or CR LF. These are called **line terminators**. Semicolons
    are used to terminate fully functioning statements, like the list declaration
    in line 11\. When writing code on a small monitor, you might be forced to split
    that statement on two subsequent lines to keep the code readable. The semicolon
    at its end tells the compiler that the statement is correct only when taken all
    together. Look at Figure [4-3](#463938_3_En_4_Chapter.xhtml#Fig3).


    ![](images/463938_3_En_4_Chapter/463938_3_En_4_Fig3_HTML.jpg)


    Figure 4-3


    Different statement samples


    The first three `List` declarations are equivalent. When declaring a `List` this
    way, you can even split its elements on multiple lines. The declaration on line
    46, however, is written intentionally wrong. A semicolon is added in line 46,
    which ends the statement there. That statement is not valid, and when you try
    to compile that class, the compiler will complain about it by printing an exception
    saying `Error:(13, 46) java: illegal start of expression`.


    If the message of the error seems not to fit the example, think about it like
    this: the problem for the compiler is not the wrongful termination of the statement,
    but the fact that after the equals (`=`) symbol, the compiler expects to find
    some sort of expression that will produce the value for the `badList` variable,
    but instead it finds nothing.


    ### Java Identifiers and Variables


    An **identifier** is the name you give to an item in your Java code: class, variable,
    method, and so forth. Identifiers must respect a few rules to allow the code to
    compile and also follow common-sense programming rules, called **Java coding conventions**.
    A few of them are listed here:


    *   An identifier cannot be one of the Java reserved words, or the code will not
    compile.


    *   An identifier cannot be a boolean literal (`true`, `false`) or the `null`
    literal, or the code will not compile.


    *   An identifier can be made of: letters, numbers, underscore (`_`), dollar sign
    (`$`).


    *   An identifier cannot start with a number.


    *   Starting with Java 9, a single underscore could no longer be used as an identifier,
    as it became a keyword. This is probably because in Java 7 numeric literals were
    introduced, and numbers with multiple digits can be written in a more readable
    way (e.g., `int i = 10_000;`).


    *   Starting with Java 21, a single underscore can now be used again as an identifier,
    but only for variables that hold values not used in the code. This behavior is
    inspired from the Golang programming language, and these variables are referred
    to as *unnamed variables*.


    *   Developers should declare their identifiers following **camel case** writing
    style, making sure each word or abbreviation in the middle of the identifier name
    begins with a capital letter (e.g., `StringBuilder`, `isAdult`).


    A **variable** is a set of characters that can be associated with a value. It
    has a type, and based on it, the set of values that can be assigned to it are
    restricted to a certain interval, group of values, or just must follow a certain
    format defined by that type. For example, the item declared in line 11 in Listing
    [4-1](#463938_3_En_4_Chapter.xhtml#PC1) is a variable of type `List`, and the
    value associated with it is a list of values.


    In Java there are three types of variables:


    *   **Fields** (also known as **properties**) are variables that are defined in
    class bodies outside of method bodies and that do not have the keyword `static`
    in front of them.


    *   **Local** **variables** are variables declared inside method bodies, and they
    are relevant only in that context.


    *   **Static** **variables** are variables declared inside class bodies with the
    keyword `static` in front of them. If they are declared as `public` they are accessible
    within the application wherever the enclosing type is (unless the module does
    not export the package where they are declared, that is).


    ### Java Comments


    **Java comments** refer to pieces of explanatory text that are not part of the
    code being executed and are ignored by the compiler. There are three ways to add
    comments within the code in Java, each of which has unique characters to declare
    them. All three types of comments were used in Listing [4-1](#463938_3_En_4_Chapter.xhtml#PC1),
    and the following list explains the purpose of each:


    *   `//` is used for single-line comments (line 10). Developers use this type
    of comment for adding `TODO` statements or explaining why a certain piece of code
    is needed. These comments are mostly intended for the team members working on
    the project.


    *   `/** ... */` JavaDoc comments are exported using special tools into the documentation
    of a project called JavaDoc API (lines 05 to 07). Developers use this type of
    comment to document their code. There are plugins for build tools that can extract
    the JavaDoc from a project as a website, which then can be hosted publicly to
    help other developers using your project.


    *   `/* ... */` is used for multiline comments (lines 14 to 16). Developers use
    this type of comment for adding `TODO` statements or for providing a lengthy explanation
    of why a certain piece of code is needed. These comments are mostly intended for
    the team members working on the project.'
