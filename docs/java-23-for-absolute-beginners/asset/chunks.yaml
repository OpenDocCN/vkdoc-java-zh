    Now that we have covered how the resource files should be written, let’s see how
    they can be used. To create a `ResourceBundle` instance, we first need a locale.
    Applications have a default locale that can be obtained by calling `Locale.getDefault()`,
    and a `ResourceBundle` instance can be obtained by using a bundle name and a Locale
    instance, as depicted in the code snippet here:


    ```

    Locale locale = Locale.getDefault();

    ResourceBundle labels = ResourceBundle.getBundle("global", locale);

    ```


    When a valid `ResourceBundle` is obtained, it can be used to replace all hard-coded
    `String` instances with calls to return text values from the resource file matching
    the selected locale. So every time we need to set a label for a node, instead
    of using the actual text, we use a call to `resourceBundle.getString("[property_name]")`
    to get the localized text.


