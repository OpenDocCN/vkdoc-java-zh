- fmt: '### `do-while` Statement


    The `do-while` statement is similar to the `while` statement, with one difference:
    the continuation condition is evaluated after executing the code block. This causes
    the code block to be executed at least once, which is useful to show a menu, for
    example, unless there is a condition embedded in it that prevents it. The generic
    template for this statement is depicted in the Listing [7-38](#463938_3_En_7_Chapter.xhtml#PC39).


    ```

    do {

    [code_block]

    } while ([eval(condition)] == true)

    Listing 7-38

    The do-while Statement Template

    ```


    Most times statements `while` and `do-while` can be easily interchanged with minimum
    or no changes of the logic of the code block. For example, traversing an array
    and printing the values of its elements can be written using `do-while` as well,
    without changing the code block at all. In Figure [7-9](#463938_3_En_7_Chapter.xhtml#Fig9)
    you can see the two implementations side by side, with the `while` statement on
    the left and `do-while` on the right. Each condition is made obvious by setting
    a breakpoint on each line.


    ![](images/463938_3_En_7_Chapter/463938_3_En_7_Fig9_HTML.jpg)


    Figure 7-9


    `while` and `do-while` implementation for printing elements of an array


    The flowcharts for these two examples are quite different, however, and reveal
    the different logic of the two statements. You can compare them by taking a look
    at Figure [7-10](#463938_3_En_7_Chapter.xhtml#Fig10).


    ![](images/463938_3_En_7_Chapter/463938_3_En_7_Fig10_HTML.jpg)


    Figure 7-10


    Comparison of flowcharts for `while` and `do-while` statements


    In the examples in Figure [7-9](#463938_3_En_7_Chapter.xhtml#Fig9), if the array
    is empty, the `do-while` statement causes an `ArrayIndexOutOfBoundsException`
    exception to be thrown, because the contents of the code block are executed. The
    index value is equal to the array length (zero), so the block should not be executed.
    However, because the condition is evaluated after the code block, there’s no way
    to know that. In Figure [7-11](#463938_3_En_7_Chapter.xhtml#Fig11) you can see
    the previous code sample modified to run with an empty array and the output of
    each side by side.


    ![](images/463938_3_En_7_Chapter/463938_3_En_7_Fig11_HTML.jpg)


    Figure 7-11


    `while` and `do-while` implementation for printing elements of an empty array


    To fix the `do-while` implementation to have the same behavior as the `while`
    implementation, the code block execution must be conditioned by the array having
    at least one element. Code Listing [7-39](#463938_3_En_7_Chapter.xhtml#PC40) shows
    one way to do it.


    ```

    package com.apress.bgn.seven.dowhileloop;

    import static java.lang.System.out;

    public class DoWhileLoopDemo {

    void main(){

    int[] arr = new int[0]; //{5, 4, 1, 3, 2};

    int i = 0;

    do {

    if(arr.length >=1) {

    out.println("arr[" +i +"] = " + arr[i]);

    ++i;

    }

    } while (i < arr.length);

    }

    }

    Listing 7-39

    do-while Statement Implementation That Works Correctly for an Empty Array Too

    ```


    **Tip**


    The `do-while` statement works best when the code block must be executed at least
    once; otherwise we evaluate the condition once unnecessarily.


    The Bubble Sort algorithm introduced earlier is a good example where `while` and
    `do-while` statements can be used interchangeably with no extra code modifications.


    Since it has been mentioned that there is more than one way to write this algorithm,
    the Listing in 7-40 shows an improved version that not only uses `do-while`, but
    decreases the size of the array being traversed each time. This is possible because
    (according to Figure [7-7](#463938_3_En_7_Chapter.xhtml#Fig7)) after each traversal,
    the last index of the array holds the biggest number of the subset being traversed.


    ```

    package com.apress.bgn.seven.dowhileloop;

    import java.util.Arrays;

    import static java.lang.System.out;

    public class BubbleSortDemo {

    public static final int[] arr = {5, 1, 4, 2, 3};

    void main(){

    boolean swapped;

    do {

    swapped = false;

    for (int i = 0, n = arr.length -1; i < n; ++i) {

    if (arr[i] > arr[i + 1]) {

    int temp = arr[i];

    arr[i] = arr[i + 1];

    arr[i + 1] = temp;

    swapped = true;

    }

    }

    } while (swapped);

    Arrays.stream(arr).forEach(out::println);

    }

    }

    Listing 7-40

    Optimized Version of the Bubble Sort Algorithm Using do-while Statement

    ```


