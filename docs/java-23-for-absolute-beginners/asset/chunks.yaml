    #### +（加/加法/连接）运算符


    `+`（加）运算符用于将两个数值变量相加，如清单 6-15 中的语句所示。


    ```

    jshell> int i = 4

    i ==> 4

    |  created variable i : int

    jshell> int j = 6

    j ==> 6

    |  created variable j : int

    jshell> int k = i + j

    k ==> 10

    |  created variable k : int

    jshell> int i = i + 2

    i ==> 6

    |  modified variable i : int

    |    update overwrote variable i : int

    清单 6-15

    在 jshell 中相加数值

    ```


    最后一条语句 `int i = i + 2` 的作用是将 `i` 的值增加 2，如你所见，它有些冗余。该语句可以不必重复引用 `i` 两次，因为其效果就是将
    `i` 的值增加 2。这可以通过使用 `+=` 运算符来实现，该运算符由赋值运算符和加法运算符组成。最优的语句是 `i += 2`。


    `+` 运算符也可用于连接 `String` 实例，或连接 `String` 实例与其他类型。JVM 会根据上下文决定如何使用 `+` 运算符。例如，尝试猜测清单
    6-16 中代码在运行时的输出。


    ```

    package com.apress.bgn.six;

    import static java.lang.System.out;

    public class ConcatenationDemo {

    void main(){

    int i1 = 0;

    int i2 = 1;

    int i3 = 2;

    out.println(i1 + i2 + i3);

    out.println("Result1 = " + (i1 + i2) + i3);

    out.println("Result2 = " + i1 + i2 + i3);

    out.println("Result3 = " + (i1 + i2 + i3));

    }

    }

    清单 6-16

    连接 String 和 int 值

    ```


    *那么猜得怎么样？* 执行代码后，控制台显示如下内容：


    ```

    1. 3

    2. Result1 = 12

    3. Result2 = 012

    4. Result3 = 3

    ```


    以下是对输出中每一行的解释：


    *   第 1 行：所有操作数都是 `int` 类型，因此 JVM 将各项作为 `int` 值相加，`out.println` 方法打印此结果。

    *   第 2 行：括号将两项的加法 `(i1 + i2)` 隔离，因此 JVM 将括号内的加法作为两个 `int` 值之间的普通加法执行。但之后，我们得到
    `"Result1 = " + 1 + i3`，此操作包含一个 `String` 操作数，这意味着 `+` 运算符必须用作连接运算符，因为将数字与文本值相加在其他情况下是行不通的。

    *   第 3 行：我们有三个 `int` 操作数和一个 `String` 操作数，因此 JVM 判定该操作的上下文不能是数值运算，所以选择连接。

    *   第 4 行：与第 2 行的情况类似，括号确保了操作的上下文是数值运算，因此三个操作数被相加。


    这是一个典型的示例，展示了 JVM 如何为涉及 `+` 运算符的操作确定上下文，你在其他 Java 教程中也可能看到。`int` 变量可以替换为 `float`
    或 `double`，行为将类似。


    连接也适用于引用类型，因为任何 Java 类型默认都是 `Object` 的扩展，因此可以通过调用其 `toString()` 方法转换为 `String`。清单
    6-17 展示了 `String` 与 `Performer` 实例之间的连接。


    ```

