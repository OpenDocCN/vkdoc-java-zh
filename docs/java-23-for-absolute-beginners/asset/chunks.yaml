    \ is 2\\. The size of the array is given as a call, only instead of parentheses,\
    \ square brackets are used, prefixed by the type of elements the array groups\
    \ together. By setting the dimension of the array to 2, we are telling the JVM\
    \ that two adjacent memory locations will have to be put aside (allocated) for\
    \ this object, to store two `int` values in. Because no values were specified\
    \ as the array contents, what do you think they will be filled with when the array\
    \ is created? This is a simple one: the previous array is defined to be made of\
    \ two `int` values, so when the array is initialized, the default value for the\
    \ `int` type will be used.\n\nFigure [5-13](#463938_3_En_5_Chapter.xhtml#Fig13)\
    \ depicts what happens in the stack and heap memory when the code in Listing [5-21](#463938_3_En_5_Chapter.xhtml#PC32)\
    \ is executed.\n\n![](images/463938_3_En_5_Chapter/463938_3_En_5_Fig13_HTML.jpg)\n\
    \nFigure 5-13\n\nDeclaring an *int* array of size 2\n\nIn line 14 of Listing [5-21](#463938_3_En_5_Chapter.xhtml#PC32),\
    \ the `Arrays.toString(..)` utility method is used to convert our array to a `String`\
    \ instance, which is computed by concatenating all `String` representations of\
