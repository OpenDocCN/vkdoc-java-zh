  trans: '

    ## 安装 Java


    现在你面前摆着电脑，已经迫不及待想要开始编写 Java 应用程序了。但首先，你需要获取并安装一个 JDK。为此，你需要连接互联网。打开浏览器，访问 [`https://www.oracle.com/java/technologies/java-se-glance.html`](https://www.oracle.com/java/technologies/java-se-glance.html)。


    ![](img/463938_3_En_2_Fig1_HTML.jpg)


    图 2-1


    在 Oracle 网站上导航以找到所需的 JDK


    在 Oracle 网站上，你会找到最新的稳定版 Java。点击 **Downloads** 链接。你将被重定向到一个类似图 2-2 的下载页面。


    ![](img/463938_3_En_2_Fig2_HTML.jpg)


    图 2-2


    可下载所需 JDK 的 Oracle 页面


    JDK 23 适用于少数几种操作系统。你应该下载与你操作系统匹配的 JDK。在撰写本书和编写源代码时，我使用的是 macOS 电脑，这意味着我将下载扩展名为
    `*.dmg` 的 JDK。


    如果你想将 Java 用于开发，你需要接受许可协议。如果你好奇，可以阅读一下，但基本上它告诉你，只要你不修改其原始组件且不从中获利，你就可以使用 Java。它还告诉你，你需要对自己使用
    Java 的方式负责，因此如果你用它编写或执行恶意应用程序，你将独自承担法律责任，等等。


    如果你想获取尚未正式发布的早期版本 JDK，你需要访问这个页面：[`https://openjdk.org/projects/jdk`](https://openjdk.org/projects/jdk)。在撰写本章时，在该页面的
    *Releases* 下，版本 24 被列为 *in development*，并且可以下载早期访问（不稳定）版本的 JDK 24。


    重要


    本书将涵盖截至并包括 Java 23 版本的 Java 语法和细节。不同版本之间存在一些共同的细节。这些内容将不会被审查和更改，因为唯一不同的是版本号。建议下载
    JDK 23 版本，以确保源代码的完全兼容性。


    下载 JDK 后，下一步是安装它。默认配置即可正常工作，因此只需双击 **Next** 直到到达最后一页，然后点击 **Finish**。这适用于 Windows
    和 macOS。JDK 会安装在一个特定位置。


    在 Windows 中，默认的 Java 安装路径是 `C:\Program Files\Java\jdk-23`，但你可以选择安装到其他路径，例如更简单且不含空格的路径，如
    `C:\tools\jdk-23`。


    在 macOS 中，默认路径是 `/Library/Java/JavaVirtualMachines/jdk-23.jdk/Contents/Home`。


    在 Linux 系统上，JDK 的安装位置因发行版而异。我更喜欢的方式是从 Oracle 网站获取包含 JDK 完整内容的 `*.tar.gz` 文件，解压后将其复制到特定位置。此外，我在
    Linux 上偏好的位置是 `/home/iuliana.cosmina/tools/jdk-23.jdk`。


    提示


    在 Linux 上使用 PPA（软件源；也称为包管理器）安装程序会自动将 JDK 文件放置到 Linux 应有的位置，并在新版本发布时使用 Linux（全局）更新工具自动更新它们。但是，如果你熟练使用
    Linux，你现在可能已经明白可以跳过本节了。


    在 Linux 或 Unix 系统上简化操作的另一种方法是使用 SDKMAN。这是近年来我最喜欢的 Java 安装方式，因为 SDKMAN 可以管理多个 Java
    版本，并能根据名为 `.sdkmanrc` 的配置文件，在正在处理的项目之间自动切换。请从这里获取：[`https://sdkman.io`](https://sdkman.io)。


    安装 Java 后，如果你进入特定于你操作系统的位置，可以查看 JDK 的内容。例如，在图 2-3 中，左侧是 JDK 23 的内容，右侧是 JDK 8 的内容。


    ![](img/463938_3_En_2_Fig3_HTML.jpg)


    图 2-3


    JDK 8 与 JDK 23 内容对比


    我选择进行此对比是因为，从 Java 9 开始，JDK 的内容组织方式有所不同。直到 Java 8，JDK 都包含一个名为 `jre` 的目录，其中包含 JDK
    使用的 Java 运行时环境 (JRE)。对于只对运行 Java 应用程序感兴趣的人，可以单独下载 JRE。


    `lib` 目录包含开发工具所需的 Java 库和支持文件。


    从 Java 9 开始，JRE 不再独立存在于自己的目录中。从版本 11 开始，Java 已完全模块化。这意味着可以仅使用运行应用程序所需的模块来创建定制的“JRE”发行版。这也意味着从
    Java 11 开始，Oracle 网站上不再有可供下载的 JRE。


    关于 JDK，你需要了解的最重要的事情是，`bin` 目录包含编译、执行和审计 Java 代码所必需的可执行文件和命令行启动器。其他目录包括 `jmods`
    目录（包含已编译的模块定义）和 `include` 目录（包含支持使用 Java 本地接口 (JNI) 和 Java 调试接口进行本地代码编程的 C 语言头文件）。


    ## `JAVA_HOME` 环境变量


    JDK 中最重要的目录是 `bin` 目录，因为该目录必须添加到系统的路径中。这允许你从任何位置调用 Java 可执行文件。Java 可执行文件是在你的计算机上运行的程序，用于编译、运行和分析
    Java 代码。它还允许其他应用程序无需额外的配置步骤即可调用它们。大多数用于处理（编写、分析、编译和执行）Java 代码的 IDE 都是用 Java 编写的，并且它们需要知道
    JDK 的安装位置才能运行。这是通过声明一个名为 `JAVA_HOME` 的环境变量来实现的，该变量指向 JDK 目录的位置。为了使 Java 可执行文件可以从系统内的任何位置调用，你必须将
    `bin` 目录添加到系统路径中。接下来的三节将解释如何在三种最常见的操作系统上执行此操作。

