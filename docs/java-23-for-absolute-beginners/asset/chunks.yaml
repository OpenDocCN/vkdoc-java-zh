    实例，我们现在必须调用新的构造函数，并在参数位置提供适当的实参，这些实参必须具有正确的类型并遵守它们的声明顺序。默认构造函数的调用和自定义构造函数的调用如代码清单
    4-23 所示。


    ```

    Human human = new Human("John", 40, 1.91f);  // 这行可以工作

