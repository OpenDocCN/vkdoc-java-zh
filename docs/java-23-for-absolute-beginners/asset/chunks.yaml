    #### 中间操作 `skip` 与终端操作 `findAny`、`anyMatch`、`allMatch` 和 `noneMatch`


    这些是本章将要讨论的最后几个操作，之所以将它们放在一起，是因为当 `skip(..)` 操作与其他操作一起应用时，可能会影响它们的结果。


    `findAny()` 方法返回一个包含流中某个元素的 `Optional<T>` 实例，如果流为空，则返回一个空的 `Optional<T>` 实例。


    注意


    `findAny()` 的行为是明确非确定性的；它可以自由选择流中的任意元素。当应用于无序流时，其行为与 `findFirst()` 相同。


    由于 `findAny()` 是非确定性的，其结果不可预测，因此将其应用于并行流与应用于顺序流的效果相同。在代码清单 8-41 中，`findAny()`
    操作被应用于一个并行的 `Song` 流。


    ```

    package com.apress.bgn.eight;

    // 导入语句已省略

    public class MediaStreamTester {

    void main(){

    var songs = StreamMediaLoader.loadSongs();

    Optional optSong = songs.parallel().findAny();

    optSong.ifPresent(out::println);

    }

    }

    // 示例输出

    /*

    Song {

    id=13

    singer=George Michael

    title=Fastlove

    duration=306

    audioType=MP3

    }

    */

    代码清单 8-41

    在并行流上使用 findAny() 的示例

    ```


    `anyMatch(..)` 方法接收一个 `Predicate<T>` 类型的参数，如果流中存在任何元素与谓词匹配，则返回布尔值 `true`；否则返回
    `false`。它同样适用于并行流。代码清单 8-42 中的代码，如果流中任何歌曲的标题包含单词 `Paper`，则返回 `true`。


    ```

    package com.apress.bgn.eight;

    // 导入语句已省略

    public class MediaStreamTester {

    void main(){

    var songs = StreamMediaLoader.loadSongs();

    boolean b0 = songs.anyMatch(s -> s.getTitle().contains("Paper"));

    out.println("是否有歌曲标题包含 ''Paper''？ " + b0);

    }

    }

    // 输出

    // 是否有歌曲标题包含 ''Paper''？ true

    代码清单 8-42

    使用 anyMatch(..) 的示例

    ```


    如你所见，代码清单 8-42 中的代码打印了 `true`，因为该流中有一首名为 `Paper Dolls` 的歌曲。但如果我们想改变这个结果，只需通过调用
    `skip(6)` 来跳过原始流中的前六个元素进行处理，如代码清单 8-43 所示。是的，这个方法同样适用于并行流。


    ```

    package com.apress.bgn.eight;

    // 导入语句已省略

    public class MediaStreamTester {

    void main(){

    var songs = StreamMediaLoader.loadSongs();

    boolean b1 = songs.parallel()

    .skip(6)

    .anyMatch(s -> s.getTitle().contains("Paper"));

    out.println("是否有歌曲标题包含 `Paper`？ " + b1);

    }

    }

    // 输出

    // 是否有歌曲标题包含 `Paper`？ false

    代码清单 8-43

    使用 skip(..) 和 anyMatch(..) 的示例

    ```


    如果原始流中的前六个元素未被处理，代码清单 8-43 中的代码将返回 `false`。还有另一个函数会分析流中的所有元素，以检查它们是否都匹配同一个谓词，该方法名为
    `allMatch(..)`。在代码清单 8-44 中，我们检查所有 `Song` 实例的时长是否都大于 300 秒。该函数返回一个布尔值，如果所有 `Song`
    实例都匹配谓词，则值为 `true`，否则为 `false`。对于本章示例中使用的数据集，预期结果为 `false`，因为并非我们所有的 `Song` 实例的时长字段值都大于
    300。


    ```

    package com.apress.bgn.eight;

    // 导入语句已省略

    public class MediaStreamTester {

    void main(){

    var songs = StreamMediaLoader.loadSongs();

    boolean b2 = songs.allMatch(s -> s.getDuration() > 300);

    out.println("所有歌曲时长是否都超过 5 分钟？ " + b2);

    }

    }

    // 输出

    // 所有歌曲时长是否都超过 5 分钟？ false

    代码清单 8-44

    展示 allMatch(..) 的功能

    ```


    这个函数的“姊妹”函数名为 `noneMatch(..)`，它做的事情正好相反：接收一个谓词作为参数，同样返回一个布尔值，但如果流中没有元素与提供的谓词匹配，则值为
    `true`，否则为 `false`。在代码清单 8-45 中，我们使用 `noneMatch(..)` 方法来检查是否没有 `Song` 实例的时长 >
    300，并且我们预期结果也是 `false`。


    ```

    package com.apress.bgn.eight;

    // 导入语句已省略

    public class MediaStreamTester {

    void main(){

    var songs = StreamMediaLoader.loadSongs();

    boolean b3 = songs.noneMatch(s -> s.getDuration() > 300);

    out.println("所有歌曲时长是否都短于 5 分钟？ " + b3);

    }

    }

    // 输出

    // 所有歌曲时长是否都短于 5 分钟？ false

    代码清单 8-45

    展示 noneMatch(..) 的功能

    ```

