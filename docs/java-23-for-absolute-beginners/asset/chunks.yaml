  raw: 'The `JTextArea` instance is added to a `JScrollPane` instance that allows
    for the `textArea` contents to still be visible as it fills with text by providing
    a scrollbar or two, depending on the configuration. The `JScrollPane` can be wrapped
    around a list with too many items as well, to make sure all of them are accessible.
    Also, as we are not interested in user-provided input via the text area, the `setEditable(false);`
    method is called.


    Now that we have a more complex application, it is time to play with the look
    and feel of the application. Until now, we’ve used the default theme, provided
    by the underlying operating system. Using Swing, the look and feel can be configured
    as one of the defaults supported by the JDK, or extra custom ones can be used
    that are provided as dependencies in the project classpath, or developers can
    create their own. To specify a look and feel explicitly, the following line of
    code must be added in the main method, before any Swing component is created:


    ```

    UIManager.setLookAndFeel(..).

    ```


    This method receives as a parameter a `String` value representing the fully qualified
    name of the look-and-feel subclass. This class must extend the abstract `javax.Swing.LookAndFeel`.
    Although not necessary, you could specify explicitly that you want to use the
    native GUI by calling


    ```

    UIManager.setLookAndFeel(UIManager.getCrossPlatformLookAndFeelClassName());

    ```


    Knowing this, let’s do something interesting. The `UIManager` class contains utility
    methods and nested classes used to manage look and feel for Swing applications.
    One of these methods is `getInstalledLookAndFeels()`, which extracts the list
    of supported look-and-feel implementations and returns them as a `LookAndFeelInfo[]`.
    With this in mind, let’s do the following: list all the supported look-and-feel
    implementations, add them to our list, and apply each when a user selects it.
    Unfortunately, as Swing is rarely used these days, there are not that many custom
    look-and-feel implementations that we could use in our application, so the only
    thing to do is to work with what the JDK has. The code in Listing [10-13](#463938_3_En_10_Chapter.xhtml#PC21)
    initializes the data array with the look-and-feel fully qualified class names.


    ```

    ...

