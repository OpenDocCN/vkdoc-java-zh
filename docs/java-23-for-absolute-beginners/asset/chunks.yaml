- fmt: '### Streams of Primitives and Streams of Strings


    When we first created a stream of primitives, we used an `int[]` array as a source.
    However, streams of primitives can be created in many ways, because the Stream
    API contains more interfaces with default methods to make programming with streams
    practical. In Figure [8-1](#463938_3_En_8_Chapter.xhtml#Fig1) you can see the
    hierarchy of the Stream API interfaces.


    ![](images/463938_3_En_8_Chapter/463938_3_En_8_Fig1_HTML.jpg)


    Figure 8-1


    Stream API interfaces


    As you probably imagine after looking at Figure [8-1](#463938_3_En_8_Chapter.xhtml#Fig1),
    the `IntStream` interface can be used to create primitive streams of integers.
    This interface exposes many methods to do so, some of them inherited from `BaseStream<T,S>`.
    An `IntStream` instance can be created from a few values specified on the spot,
    either by using the `builder()`, `generate(..)`, or `iterate(..)` method or by
    using the `range*(..)` methods as depicted in Listing [8-15](#463938_3_En_8_Chapter.xhtml#PC19).


    ```

    package com.apress.bgn.eight;

    import java.util.Random;

    import java.util.stream.IntStream;

    public class NumericStreamsDemo {

    void main(){

    var intStream0 = IntStream.builder().add(0).add(1).add(2).add(5).build();

    var intStream1 = IntStream.of(0,1,2,3,4,5);

    var intStream2 = IntStream.range(0, 10);

    var intStream3 = IntStream.rangeClosed(0, 10);

    Random random = new Random();

    IntStream intStream4 = random.ints(5);

    }

    }

    Listing 8-15

    Creating IntStream Instances Using Various Methods

    ```


    An `IntStream` instance can be created by giving the start and end of an interval
    as arguments to the `range(..)` and `rangeClosed(..)` methods. Both of them generate
    elements for the stream with a step of 1, only the last one includes the upper
    range of the interval as a value.


    Also in Java 1.8, the `java.util.Random` class was enriched with a method named
    `ints(..)` that generates a stream of random integers. It declares a single argument
    that represents the number of elements to be generated and put in the stream,
    but there is a form of this method without the argument that generates an infinite
    stream.


    All the methods mentioned for `IntStream` can be used to generate `LongStream`
    instances, as equivalent methods are defined in this interface as well.


    For `DoubleStream` there are no range methods, but there is `of(..)`, `builder()`,
    `generate(..)`, and so on. Also, the `java.util.Random` class was enriched in
    Java 1.8 with the `doubles(..)` method that generates a stream of random double
    values. It declares a single argument that represents the number of elements to
    be generated and put in the stream, but there is a form of this method without
    the argument that generates an infinite stream. Listing [8-16](#463938_3_En_8_Chapter.xhtml#PC20)
    depicts a few ways of creating streams of doubles.


    ```

    package com.apress.bgn.eight;

    import java.util.Random;

    import java.util.stream.DoubleStream;

    public class NumericStreamsDemo {

    void main() {

    DoubleStream doubleStream0 = DoubleStream.of(1, 2 , 2.3, 3.4, 4.5, 6);

    Random random = new Random();

    DoubleStream doubleStream1 = random.doubles(3);

    DoubleStream doubleStream2 = DoubleStream.iterate(2.5, d -> d = d + 0.2).limit(10);

    }

    }

    Listing 8-16

    Creating Numeric Stream Instances Using Various Methods

    ```


    For streams of `char` values, there is no special interface, but `IntStream` can
    be used just fine:


    ```

    IntStream intStream = IntStream.of(''a'',''b'',''c'',''d'');

    intStream.forEach(c -> System.out.println((char) c));

    ```


    Another way to create a stream of `char` values is to use a `String` instance
    as a stream source:


    ```

    IntStream charStream = "sample".chars();

    charStream.forEach(c -> System.out.println((char) c));

    ```


    In Java 8, `java.util.regex.Pattern` was enriched with stream-specific methods
    too; as a class used to process `String` instances, it is the proper place to
    add these methods. A `Pattern` instance is useful for splitting an existing `String`
    instance and returning the pieces as a stream using the `splitAsStream(..)` method:


    ```

    Stream stringStream = Pattern.compile(" ")

    .splitAsStream("live your life");

    ```


    The contents of a file can also be returned as a stream of strings using the `Files.lines(..)`
    utility method:


    ```

    String inputPath = "chapter08/src/main/resources/songs.csv";

    Stream stringStream = Files.lines(Path.of(inputPath));

    ```


    The sections so far have shown you how to create all types of streams; the next
    sections will show you how to use them to process data.


    **Important**


    If you feel the need to associate stream instances with real objects to make sense
    of them, I recommend the following: imagine a finite stream (like one created
    from a collection) as the water dripping from a mug when inclined. The water in
    the mug will end eventually, but while the water drips, it forms a stream. An
    infinite stream is like a river that has a fountainhead: it flows continuously
    *(unless a serious drought dries the river, of course)*.'
