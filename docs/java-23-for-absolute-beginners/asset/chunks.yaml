    Important


    The usage of labels to break out of loops is frowned upon in the Java community,
    because jumping to a label resembles the `goto` statement that can be found in
    certain old-school programming languages.


    Note


    `goto` is a Java reserved keyword, because this statement used to exist in the
    first version of Java. Using jumping makes code less readable since the execution
    flow becomes more difficult to follow, less testable and promotes bad design.
    This is why `goto` was removed in later Java versions, but any need of such operation
    can be implemented `break` and `continue` statements.


    ### `return` Statement


    The `return` statement is an easy one to understand: as already mentioned, it
    can be used to exit the execution of a method body. If the method returns a value,
    the `return` statement is accompanied by the value returned. The `return` statement
    can be used to exit any of the statements mentioned in this section. It can represent
    quite a smart way to shortcut the execution of a method, as the execution of the
    current method stops and processing continues from the point in the code that
    called the method.


    Let’s look at a few examples. The code in Listing [7-47](#463938_3_En_7_Chapter.xhtml#PC50)
    shows a method that searches for the first even element in an array. If found,
    the method returns its index; otherwise, it returns -1.


