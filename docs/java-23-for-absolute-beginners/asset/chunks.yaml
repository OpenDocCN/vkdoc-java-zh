    尽管虚拟线程不应被池化，但在`Executors`工具类中引入了一个构建器方法，该方法会创建一个`Executor`实例，为每个任务启动一个新的虚拟`thread`，并且这些线程会被放入一个无界池中。这使我们能够在需要时将线程管理和创建与应用程序的其他部分分离开来。从
    Java 19 开始，`java.util.concurrent.ExecutorService`接口扩展了`java.lang.AutoCloseable`，该接口对持有资源的实例进行建模，直到调用其`close()`方法为止。这一点很重要，因为这意味着我们可以在一种称为**try-with-resources**的结构中使用虚拟线程执行器。在**第**
    **4** **章**中，你了解了异常数据类型，并且为了捕获异常，使用了`try-catch-finally`块。`try-with-resources`包装了持有资源的实例，以告知
    JVM 在执行块结束时释放它们，并且如果在执行块期间抛出异常，这些异常也可以被捕获。清单 5-56 展示了使用`Executors.newVirtualThreadPerTaskExecutor()`创建一个管理虚拟线程池的`ExecutorService`的示例。


