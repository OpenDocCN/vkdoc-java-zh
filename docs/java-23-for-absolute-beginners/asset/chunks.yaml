    # 7. Controlling the Flow


    The previous chapters have covered ways to create statements, and what operators
    to use depending on the operand types. Sometimes in the previous chapters elements
    of logic were added to make the code runnable for you, and this chapter is dedicated
    to explaining in detail how you can manipulate the execution of your code (that
    is, control the flow) using fundamental programming conditional and repetitive
    statements. The suite of steps to solve a problem and their order of execution
    is called an algorithm. Computer programs are solutions to a problem modelling
    algorithms. An algorithm can be represented using flowcharts.


    Most of the programming we did up to this chapter contained declaration and printing
    statements, simple one-step statements. Take a look at the piece of code in Listing
    [7-1](#463938_3_En_7_Chapter.xhtml#PC1).


    ```

    package com.apress.bgn.seven;

    public class Main {

    void main() {

    String text = "sample";

    System.out.println(text);

    }

    }

    Listing 7-1

    Java Code Made of a Few Statements

    ```


    If we were to design a flowchart for it, the schema would be simple and linear,
    no decision and no repetition, as depicted in Figure [7-1](#463938_3_En_7_Chapter.xhtml#Fig1).


    ![](images/463938_3_En_7_Chapter/463938_3_En_7_Fig1_HTML.jpg)


    Figure 7-1 Simple flowchart sample


    Resolving real-world problems often requires a more complicated logic than that,
    so more complicated statements are necessary. Before getting into that, let’s
    analyze the components of a flowchart, because we will make use of flowcharts
    a lot during this chapter. Table [7-1](#463938_3_En_7_Chapter.xhtml#Tab1) depicts
    and identifies all flowchart elements and explains their purpose.


    Table 7-1 Flowchart Elements


    | Shape | Name | Scope |

    | --- | --- | --- |

    | ![](images/463938_3_En_7_Chapter/463938_3_En_7_Figa_HTML.jpg) | Terminal | Indicates
    the beginning or end of a program, and contains a text relevant to its scope.
    |

    | ![](images/463938_3_En_7_Chapter/463938_3_En_7_Figb_HTML.jpg) | Flowline | Indicates
    the flow of the program and the order of operations. |

    | | Input/output | Indicates declaration of variables and outputting values. |

    | ![](images/463938_3_En_7_Chapter/463938_3_En_7_Figc_HTML.jpg) | Process | Simple
    process statement: assignment, change of values, and so on. |

    | ![](images/463938_3_En_7_Chapter/463938_3_En_7_Figd_HTML.jpg) | Decision | Shows
    a conditional operation that will decide a certain path of execution. |

    | ![](images/463938_3_En_7_Chapter/463938_3_En_7_Fige_HTML.jpg) | Predefined process
    | Indicates a process defined elsewhere. |

    | ![](images/463938_3_En_7_Chapter/463938_3_En_7_Figf_HTML.jpg) | On-page connector
    | Indicates the continuation of the flow on the same page. This element is usually
    labeled. |

    | ![](images/463938_3_En_7_Chapter/463938_3_En_7_Figg_HTML.jpg) | Off-page connector
    | Indicates the continuation of the flow on a different page. This element is
    usually labeled. |

    | ![](images/463938_3_En_7_Chapter/463938_3_En_7_Figh_HTML.jpg) | Comment (or
    annotation) | Used when a flow or an element requires extra explanation. |


    The flowchart elements presented in Table [7-1](#463938_3_En_7_Chapter.xhtml#Tab1)
    are pretty standard, and you will probably find very similar elements used in
    any programming course or tutorial. After this consistent introduction, the second
    getting into it.'
