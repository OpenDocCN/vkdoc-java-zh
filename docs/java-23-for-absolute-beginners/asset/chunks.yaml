    类似的代码可以用 `Set<E>`、`HashSet<E>` 和 `TreeSet<E>` 编写，并且对于这一系列类也存在类似的方法。


    重要


    集合是 Java 入门级工作面试中的常见话题，因此如果你申请此类工作，被问到 `List<E>` 和 `Set<E>` 之间的区别时，请不要感到惊讶。


    在使用 `Set<E>` 的实现时，你必须确保添加到集合中的对象正确实现了 `equals(..)` 和 `hashCode()` 方法。原因是 `Set<E>`
    模拟了数学上的*集合*抽象，它不允许有重复元素。


    `equals(..)` 方法指示作为参数传递的对象是否“等于”当前实例。`Object` 类提供的默认实现认为，如果两个对象存储在相同的内存位置，则它们相等。


    `hashCode(..)` 方法返回对象内存地址的整数表示，该表示通过*哈希*^(⁵⁶) 获得。`Object` 类提供的默认实现返回一个每个实例唯一的随机整数。该值可能在应用程序的多次执行之间发生变化。当对象用作哈希表中的键时，此方法非常有用，因为它优化了从哈希表中检索元素的过程。如果你想了解更多关于哈希表的信息，互联网上应有尽有；至于
    Java，哈希表可以通过 `java.util.HashMap<K,V>` 的实例来建模。


    根据官方文档，如果两个对象相等，那么对它们分别调用 `hashCode()` 必须产生相同的结果。但两个不相等的对象不一定具有不同的 `hashCode`
    值。


