    IntelliJ IDEA 可以帮助你轻松编辑资源包文件，并通过提供特殊视图确保你不会遗漏任何键。在 IntelliJ IDEA 中打开资源文件时，左下角会看到两个选项卡：`Text`
    和 `Resource Bundle`。点击 `Text` 选项卡可以像编辑普通文本文件一样编辑属性文件。点击 `Resource Bundle` 选项卡会打开一个特殊视图，左侧显示资源文件中的所有属性名，右侧显示所有资源文件中对应所选属性名的值。在图[10-11](#463938_3_En_10_Chapter.xhtml#Fig11)中，你可以看到这个视图以及属性`ChooseLanguage`的值。


