    A `List<E>` contains an unsorted collection of nonunique data, `null` elements
    included. In Listing [5-39](#463938_3_En_5_Chapter.xhtml#PC68) we declared a reference
    of type `List<E>` and an object of type `ArrayList<E>`. We did this because as
    all implementations have the same API, we could easily switch `ArrayList<E>` with
    `LinkedList<E>` and the code will still work:


    ```

    List stringList = new ArrayList();

    stringList = new LinkedList();

    ```


    Important


    Declaring abstract references is a good programming practice because it increases
    the flexibility of your code.


    The syntax in the previous examples is pre-Java 1.7\. In Java 1.7 the `<>` (diamond
    operator) was introduced. This allowed more simplification of collections initializations,
    because it required declaring the type of the elements in the list only in the
    reference declaration. So the two lines in the previous code snippet become


    ```

    List stringList = new ArrayList();

    stringList = new LinkedList();

    ```


    Starting with Java 1.5, every new Java version has added changes to the collection
    framework. Java 1.8 added support for lambda expressions by adding a default method
    named `forEach` in the `java.lang.Iterable<E>` interface (see Figure [5-20](#463938_3_En_5_Chapter.xhtml#Fig20)),
    which is extended by the `java.lang.Collection<E>` interface. So the code to print
    all the values in the list, like we did previously using a `for` loop, can be
    replaced with


    ```

    stringList.forEach(element -> System.out.println(element));

    ```


    In Java 9, yet another improvement was introduced: factory methods for collections.
    Our collection was populated with elements by repeatedly calling `add(..)`, which
    is a little redundant, especially since we have the full collection of elements
    we want to put in the list. That is why in Java 9 methods to create collection
    objects in one line of code were introduced, as shown in the following example:


    ```

    List stringList = List.of("one", "two", "three");

    ```


    The resulting `List<E>` is an immutable collection: it can no longer be modified,
    meaning elements cannot be added to it or removed from it.


    Java 10 added support for local variable type inference, which means that we no
    longer have to explicitly specify the reference type, because it will be automatically
    inferred based on the object type. So the following declaration:


    ```

    List stringList = List.of("one", "two", "three");

    ```


    becomes


    ```

    var stringList = List.of("one", "two", "three");

    ```


    Until Java 21, the collections framework lacked a collection type that represents
    a sequence of elements with a defined encounter order. It also lacked a uniform
    set of operations that apply across such collections. For example, `List<E>` and
    `Deque<E>` both define an encounter order, but their common supertype is `Collection<E>`,
    which does not. Similarly, `Set<E>` does not define an encounter order, and subtypes
    such as `HashSet<E>` do not define one, but subtypes such as `SortedSet<E>` and
    `LinkedHashSet<E>` do. Java 21 introduced the `SequencedCollection<E>` interface
    defining a collection with a well-defined encounter order that supports operations
    at both ends, and that is reversible.


    Of course, the chance to access a collection at both ends was possible before
    Java 21, but that required invoking `get(..)` and `add(..)` methods with the specific
    indexes. The new methods provide a simple way to write code using ordered collections,
    and the simpler code is also easier to read.


