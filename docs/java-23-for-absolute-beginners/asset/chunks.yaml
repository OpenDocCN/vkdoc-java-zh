    The `java.lang.String` class is the most-used class in the Java programming language.
    Because text values within an application might have the same value, for efficiency
    reasons this type of object is managed a little different within the heap. In
    the heap there is a special memory region named the **String Pool**, which is
    where all the `String` instances are stored by the JVM.


    Note


    The String Pool is mentioned here only because the following piece of code (which
    will be analyzed to explain how memory is managed in Java) contains a definition
    of a `String` instance, but the String Pool and other details about the `String`
    data type will be covered in detail a bit later in the chapter.


    Let’s consider the executable class in Listing [5-3](#463938_3_En_5_Chapter.xhtml#PC3)
    and examine how the memory is organized during its execution.


    ```

    01\. package com.apress.bgn.five;

    02.

    03\. import java.util.Date;

    04.

    05\. public class PrimitivesDemo {

    06\.     void main() {

    07\.         int i = 5;

    08\.         int j = 7;

    09\.         Date d = new Date();

    10\.         int result = add(i, j);

    11\.         System.out.print(result);

    12\.         d = null;

    13\.     }

    14.

    15\.     static int add(int a, int b) {

    16\.        String mess = new String("performing add ...");

    17\.        return a + b;

    18\.     }

    19\. }

    Listing 5-3

    Code Sample Used to Discuss Memory Usage

    ```


