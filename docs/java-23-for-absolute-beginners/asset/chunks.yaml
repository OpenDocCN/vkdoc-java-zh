    `Flow` 接口非常基础，可以在编写响应式应用时使用，但这需要大量的工作。目前，多个团队提供了多种实现，为开发响应式应用提供了更实用的方式。使用这些接口的实现，你可以编写响应式应用，而无需编写处理数据的线程同步逻辑。


