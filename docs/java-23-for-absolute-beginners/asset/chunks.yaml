- fmt: "为了在清单[11-47](#463938_3_En_11_Chapter.xhtml#PC75)中明确显示将选择哪张图片，每张图片的分辨率都被放在其旁边的注释中。当调用`getResolutionVariant(..)`时，参数会与对应的图片属性进行比较，即使两个参数都小于或等于某张图片，也会返回该图片。清单[11-48](#463938_3_En_11_Chapter.xhtml#PC76)展示了`BaseMultiResolutionImage.getResolutionVariant(..)`的代码。\n\
    \n```\n@Override\npublic Image getResolutionVariant(double destImageWidth,\ndouble\
    \ destImageHeight) {\ncheckSize(destImageWidth, destImageHeight);\nfor (Image\
    \ rvImage : resolutionVariants) {\nif (destImageWidth <= rvImage.getWidth(null)\n\
    && destImageHeight <= rvImage.getHeight(null)) {\nreturn rvImage;\n}\n}\nreturn\
    \ resolutionVariants[resolutionVariants.length - 1];\n}\nListing 11-48\nCode for\
    \ Getting an Image Variant, Based on Size\n```\n\n这段代码看起来很适合其目的。如果你调用`mrImage.getResolutionVariant(500,\
    \ 200)`，你会得到分辨率为 500 × 243 的`dest25`图片。如果你调用`mrImage.getResolutionVariant(500,\
    \ 300)`，你会得到分辨率为 1000 × 486 的`dest50`图片，因为`destImageHeight`参数是 300，大于 243，所以会返回列表中宽度和高度值都大于参数的下一个图片。\n\
    \n但是——这一点需要牢记——这仅在数组中的图片按尺寸排序时才有效。如果`imgList`被修改为：\n\n```\nImage[] imgList = new\
    \ Image[]{\nImageIO.read(src), // 2000 x 972\nImageIO.read(dest25), // 500 x 243\n\
    ImageIO.read(dest50), // 1000 x 486\nImageIO.read(dest75) // 1500 x 729\n};\n\
    ```\n\n那么两次调用都会返回原始图片，因为它是列表中的第一个，且其宽度大于 500，高度大于 200 和 300。\n\n那么，如果算法效率不高且依赖于用于创建多分辨率图片的数组中图片的顺序，该怎么办？很简单：我们可以创建自己的`MultiResolutionImage`实现，它继承`BaseMultiResolutionImage`并重写`getResolutionVariant()`方法。由于我们知道所有图片都是同一张图片的缩放副本，这意味着宽度和高度是成比例的，因此我们可以编写一个算法，该算法始终返回最适合所需分辨率的图片变体，并忽略数组中图片的顺序。该实现可能与清单[11-49](#463938_3_En_11_Chapter.xhtml#PC78)中的实现非常相似。\n\
    \n```\npackage com.apress.bgn.eleven;\n// other import statements omitted\nimport\
    \ java.awt.image.BaseMultiResolutionImage;\npublic class SmartMultiResolutionImage\
    \ extends BaseMultiResolutionImage {\npublic SmartMultiResolutionImage(int baseImageIndex,\
    \ Image... resolutionVariants) {\nsuper(baseImageIndex, resolutionVariants);\n\
    }\n@Override\npublic Image getResolutionVariant(double destImageWidth,\ndouble\
    \ destImageHeight) {\ncheckSize(destImageWidth, destImageHeight);\nMap result\
    \ = new HashMap();\nfor (Image rvImage : getResolutionVariants()) {\ndouble widthDelta\
    \ = Math.abs(destImageWidth - rvImage.getWidth(null));\ndouble heightDelta = Math.abs(destImageHeight\
    \ - rvImage.getHeight(null));\ndouble delta = widthDelta + heightDelta;\nresult.put(delta,\
    \ rvImage);\n}\njava.util.List deltaList = new ArrayList(result.keySet());\ndeltaList.sort(Double::compare);\n\
    return result.get(deltaList.get(0));\n}\nprivate static void checkSize(double\
    \ width, double height) {\nif (width <= 0 || height <= 0) {\nthrow new IllegalArgumentException(String.format(\n\
    \"Width (%s) or height (%s) cannot be <= 0\", width, height));\n}\nif (!Double.isFinite(width)\
    \ || !Double.isFinite(height)) {\nthrow new IllegalArgumentException(String.format(\n\
    \"Width (%s) or height (%s) is not finite\", width, height));\n}\n}\n}\nListing\
    \ 11-49\nBetter Code for Getting an Image Variant, Based on Size\n```\n\n`checkSize(..)`方法必须被复制，因为它是私有的并且在`getResolutionVariant(..)`内部使用，所以不能在超类中调用，但这对于拥有行为正确的实现来说是一个小麻烦。使用之前的实现，我们不再需要排序的数组，因此这些调用：\n\
    \n```\ngetResolutionVariant(500, 200), getResolutionVariant(500, 300);\n// and\n\
    getResolutionVariant(400, 300), and getResolutionVariant(600, 300);\n```\n\n都会返回图片`dest25`。\n\
    \n要使用新类，在清单[11-47](#463938_3_En_11_Chapter.xhtml#PC75)中，这一行：\n\n```\nMultiResolutionImage\
    \ mrImage = new BaseMultiResolutionImage(0,imgList);\n```\n\n必须替换为：\n\n```\nMultiResolutionImage\
    \ mrImage = new SmartMultiResolutionImage(0, imgList);\n```\n\n你也可以重新排列`imgList`数组中的图片顺序，如果你想正确测试的话。然后运行`MediaDemo`类会产生清单[11-50](#463938_3_En_11_Chapter.xhtml#PC82)中所示的输出。\n\
    \n```\n[main] INFO com.apress.bgn.eleven.MediaDemo --  --- Creating multi-resolution\
    \ image ---\n[main] INFO com.apress.bgn.eleven.MediaDemo -- BufferedImage@17211155:\
    \ type = 5 ColorModel: #pixelBits = 24 numComponents = 3 color space = java.awt.color.ICC_ColorSpace@b3d7190\
    \ transparency = 1 has alpha = false isAlphaPre = false ByteInterleavedRaster:\
    \ width = 2000 height = 972 #numDataElements 3 dataOff[0] = 2\n[main] INFO com.apress.bgn.eleven.MediaDemo\
    \ -- BufferedImage@69379752: type = 5 ColorModel: #pixelBits = 24 numComponents\
    \ = 3 color space = java.awt.color.ICC_ColorSpace@b3d7190 transparency = 1 has\
    \ alpha = false isAlphaPre = false ByteInterleavedRaster: width = 500 height =\
    \ 243 #numDataElements 3 dataOff[0] = 2\n[main] INFO com.apress.bgn.eleven.MediaDemo\
    \ -- BufferedImage@27fe3806: type = 5 ColorModel: #pixelBits = 24 numComponents\
    \ = 3 color space = java.awt.color.ICC_ColorSpace@b3d7190 transparency = 1 has\
    \ alpha = false isAlphaPre = false ByteInterleavedRaster: width = 1000 height\
    \ = 486 #numDataElements 3 dataOff[0] = 2\n[main] INFO com.apress.bgn.eleven.MediaDemo\
    \ -- BufferedImage@5f71c76a: type = 5 ColorModel: #pixelBits = 24 numComponents\
    \ = 3 color space = java.awt.color.ICC_ColorSpace@b3d7190 transparency = 1 has\
    \ alpha = false isAlphaPre = false ByteInterleavedRaster: width = 1500 height\
    \ = 729 #numDataElements 3 dataOff[0] = 2\n[main] INFO com.apress.bgn.eleven.MediaDemo\
    \ -- Most fit to the requested size: \n[main] INFO com.apress.bgn.eleven.MediaDemo\
    \ -- Are identical? false\nListing 11-50\nOutput Produced by Running the MediaDemo\n\
    ```\n\n*等等，什么？* 为什么图片不相同？它们确实具有相同的分辨率，但作为对象，它们并不相同，因为绘制像素并不是那么精确。但如果你真的想确认，你可以使用如下代码来打印两张图片的宽度和高度，用图片查看器打开它们，用肉眼你会看到它们看起来是一样的：\n\
    \n```\nlog.info(\"variant width x height : {} x {}\", variantImg.getWidth(), variantImg.getHeight());\n\
    log.info(\"dest25Img width x height : {} x {}\", dest25Img.getWidth(), dest25Img.getHeight());\n\
    ```\n\n上述代码的输出清楚地表明两张图片具有相同的尺寸，正如预期的那样：\n\n```\n[main] INFO MediaDemo - variant\
    \ width x height :  500 x 243\n[main] INFO MediaDemo - dest25Img width x height\
    \ :  500 x 243\n```\n\n正如你所注意到的，大多数图片类都属于旧的`java.awt`，它如今很少使用，并且以运行缓慢而闻名。因此，如果你想构建一个需要图像处理的应用程序，你可能需要寻找替代方案。其中一种替代方案是使用\
    \ JavaFX，下一节将对此进行介绍。"
  raw: "To make really obvious in Listing [11-47](#463938_3_En_11_Chapter.xhtml#PC75)\
    \ which image will be selected, the resolution of each image is put in a comment\
    \ next to it. When `getResolutionVariant(..)` is called, the arguments are compared\
    \ to the corresponding image properties, and even if both are less then equal\
    \ to one of the images, that image is returned. In Listing [11-48](#463938_3_En_11_Chapter.xhtml#PC76),\
    \ the code of the `BaseMultiResolutionImage.getResolutionVariant(..)` is depicted.\n\
    \n```\n@Override\npublic Image getResolutionVariant(double destImageWidth,\ndouble\
    \ destImageHeight) {\ncheckSize(destImageWidth, destImageHeight);\nfor (Image\
    \ rvImage : resolutionVariants) {\nif (destImageWidth <= rvImage.getWidth(null)\n\
    && destImageHeight <= rvImage.getHeight(null)) {\nreturn rvImage;\n}\n}\nreturn\
    \ resolutionVariants[resolutionVariants.length - 1];\n}\nListing 11-48\nCode for\
    \ Getting an Image Variant, Based on Size\n```\n\nThe code looks suited for its\
    \ purpose. If you call `mrImage.getResolutionVariant(500, 200)``,` you get the\
    \ `dest25` image with resolution 500 × 243\\. If you call `mrImage.getResolutionVariant(500,\
    \ 300),` you get the `dest50` image with resolution 1000 × 486, because the `destImageHeight`\
    \ argument is 300, which is greater than 243, so the next image in the list with\
    \ width and height values greater than the arguments is returned.\n\nBut—and this\
    \ is important to keep in mind—this works only if the images in the array are\
    \ sorted in the order of their sizes. If the `imgList` were to be modified to\n\
    \n```\nImage[] imgList = new Image[]{\nImageIO.read(src), // 2000 x 972\nImageIO.read(dest25),\
    \ // 500 x 243\nImageIO.read(dest50), // 1000 x 486\nImageIO.read(dest75) // 1500\
    \ x 729\n};\n```\n\nthen both calls return the original image, because that is\
    \ the first one in the list, and width is greater than 500 and height is greater\
    \ than both 200 and 300.\n\nSo if the algorithm is not efficient and depends on\
    \ the order of the images in the array used to create the multiresolution image,\
    \ what can be done? It’s simple: we can create our own `MultiResolutionImage`\
    \ implementation that extends `BaseMultiResolutionImage` and overrides the `getResolutionVariant()`\
    \ method. Since we know that all images are resized copies of the same image,\
    \ this means that width and height are proportional, so we can write an algorithm\
    \ that will always return the variant of the image that is most suitable to the\
    \ desired resolution and will ignore the order of the images in the array. The\
    \ implementation might look quite similar to the one in Listing [11-49](#463938_3_En_11_Chapter.xhtml#PC78).\n\
    \n```\npackage com.apress.bgn.eleven;\n// other import statements omitted\nimport\
    \ java.awt.image.BaseMultiResolutionImage;\npublic class SmartMultiResolutionImage\
    \ extends BaseMultiResolutionImage {\npublic SmartMultiResolutionImage(int baseImageIndex,\
    \ Image... resolutionVariants) {\nsuper(baseImageIndex, resolutionVariants);\n\
    }\n@Override\npublic Image getResolutionVariant(double destImageWidth,\ndouble\
    \ destImageHeight) {\ncheckSize(destImageWidth, destImageHeight);\nMap result\
    \ = new HashMap();\nfor (Image rvImage : getResolutionVariants()) {\ndouble widthDelta\
    \ = Math.abs(destImageWidth - rvImage.getWidth(null));\ndouble heightDelta = Math.abs(destImageHeight\
    \ - rvImage.getHeight(null));\ndouble delta = widthDelta + heightDelta;\nresult.put(delta,\
    \ rvImage);\n}\njava.util.List deltaList = new ArrayList(result.keySet());\ndeltaList.sort(Double::compare);\n\
    return result.get(deltaList.get(0));\n}\nprivate static void checkSize(double\
    \ width, double height) {\nif (width <= 0 || height <= 0) {\nthrow new IllegalArgumentException(String.format(\n\
    \"Width (%s) or height (%s) cannot be <= 0\", width, height));\n}\nif (!Double.isFinite(width)\
    \ || !Double.isFinite(height)) {\nthrow new IllegalArgumentException(String.format(\n\
    \"Width (%s) or height (%s) is not finite\", width, height));\n}\n}\n}\nListing\
    \ 11-49\nBetter Code for Getting an Image Variant, Based on Size\n```\n\nThe `checkSize(..)`\
    \ method must be duplicated, as it is private and used inside `getResolutionVariant(..)`,\
    \ so it cannot be called inside a superclass, but that is a minor inconvenience\
    \ to having an implementation that has proper behavior. With the previous implementation,\
    \ we no longer need a sorted array, thus these invocations\n\n```\ngetResolutionVariant(500,\
    \ 200), getResolutionVariant(500, 300);\n// and\ngetResolutionVariant(400, 300),\
    \ and getResolutionVariant(600, 300);\n```\n\nall return image `dest25`.\n\nTo\
    \ use the new class, in Listing [11-47](#463938_3_En_11_Chapter.xhtml#PC75) this\
    \ line:\n\n```\nMultiResolutionImage mrImage = new BaseMultiResolutionImage(0,imgList);\n\
    ```\n\nmust be replaced with\n\n```\nMultiResolutionImage mrImage = new SmartMultiResolutionImage(0,\
    \ imgList);\n```\n\nYou can reposition the images in the `imgList` array too,\
    \ if you want to test it properly. Then running the `MediaDemo` class produces\
    \ the output depicted in Listing [11-50](#463938_3_En_11_Chapter.xhtml#PC82).\n\
    \n```\n[main] INFO com.apress.bgn.eleven.MediaDemo --  --- Creating multi-resolution\
    \ image ---\n[main] INFO com.apress.bgn.eleven.MediaDemo -- BufferedImage@17211155:\
    \ type = 5 ColorModel: #pixelBits = 24 numComponents = 3 color space = java.awt.color.ICC_ColorSpace@b3d7190\
    \ transparency = 1 has alpha = false isAlphaPre = false ByteInterleavedRaster:\
    \ width = 2000 height = 972 #numDataElements 3 dataOff[0] = 2\n[main] INFO com.apress.bgn.eleven.MediaDemo\
    \ -- BufferedImage@69379752: type = 5 ColorModel: #pixelBits = 24 numComponents\
    \ = 3 color space = java.awt.color.ICC_ColorSpace@b3d7190 transparency = 1 has\
    \ alpha = false isAlphaPre = false ByteInterleavedRaster: width = 500 height =\
    \ 243 #numDataElements 3 dataOff[0] = 2\n[main] INFO com.apress.bgn.eleven.MediaDemo\
    \ -- BufferedImage@27fe3806: type = 5 ColorModel: #pixelBits = 24 numComponents\
    \ = 3 color space = java.awt.color.ICC_ColorSpace@b3d7190 transparency = 1 has\
    \ alpha = false isAlphaPre = false ByteInterleavedRaster: width = 1000 height\
    \ = 486 #numDataElements 3 dataOff[0] = 2\n[main] INFO com.apress.bgn.eleven.MediaDemo\
    \ -- BufferedImage@5f71c76a: type = 5 ColorModel: #pixelBits = 24 numComponents\
    \ = 3 color space = java.awt.color.ICC_ColorSpace@b3d7190 transparency = 1 has\
    \ alpha = false isAlphaPre = false ByteInterleavedRaster: width = 1500 height\
    \ = 729 #numDataElements 3 dataOff[0] = 2\n[main] INFO com.apress.bgn.eleven.MediaDemo\
    \ -- Most fit to the requested size: \n[main] INFO com.apress.bgn.eleven.MediaDemo\
    \ -- Are identical? false\nListing 11-50\nOutput Produced by Running the MediaDemo\n\
    ```\n\n*Wait, what?* Why are the images not identical? They do have the same resolution,\
    \ but as objects they are not identical, because drawing pixels is not really\
    \ that precise. But if you really want to make sure, you could use code like the\
    \ following to print the width and height of the two images, open them with an\
    \ image viewer, and with the naked eye you would see they look identical:\n\n\
    ```\nlog.info(\"variant width x height : {} x {}\", variantImg.getWidth(), variantImg.getHeight());\n\
    log.info(\"dest25Img width x height : {} x {}\", dest25Img.getWidth(), dest25Img.getHeight());\n\
    ```\n\nThe output of the previous code makes it obvious that the two images have\
    \ the same dimensions, just as expected:\n\n```\n[main] INFO MediaDemo - variant\
    \ width x height :  500 x 243\n[main] INFO MediaDemo - dest25Img width x height\
    \ :  500 x 243\n```\n\nAs you’ve noticed, most of the image classes are part of\
    \ the old `java.awt`, which is rarely used nowadays and is known to be quite slow.\
    \ So if you want to build an application and image processing is required, you\
    \ might want to look for alternatives. One such alternative is to use JavaFX,\
    \ which is presented in the following section."
  trans: "\n为了让清单 11-47 中哪张图片会被选中变得一目了然，每张图片的分辨率都被标注在其旁边的注释中。当调用 `getResolutionVariant(..)`\
    \ 时，传入的参数会与对应的图片属性进行比较，即使两个参数都小于或等于某张图片的尺寸，也会返回该图片。清单 11-48 展示了 `BaseMultiResolutionImage.getResolutionVariant(..)`\
    \ 的代码。\n\n```\n@Override\npublic Image getResolutionVariant(double destImageWidth,\n\
    double destImageHeight) {\ncheckSize(destImageWidth, destImageHeight);\nfor (Image\
