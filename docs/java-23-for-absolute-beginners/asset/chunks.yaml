  trans: '

    ### Oracle HotSpot JVM 架构


    多年来，一些大公司（例如 IBM）已经推出了各自版本的 JVM。如今，随着 Java 进入模块化时代，采用快速交付模式和更昂贵的许可模式，越来越多的公司决定构建自己的
    JVM 版本（例如 Azul、Amazon Corretto、GraalVM 和 Eclipse OpenJ9）^(¹²⁸)。


    在新的许可模式下，自 2019 年 1 月起，所有两年宽限期后的 LTS 版本都需要为 Java 支持付费，因此公司最终将不得不为运行其基于 Java 的软件的
    JDK 付费。官方的 Oracle JDK 可供正在学习编码或构建小型项目的开发者在个人计算机上使用。但是，在服务器上运行由此产生的软件、访问诸如功能完备的
    JMC 等企业级特性，并将该软件商业化，则需要付费订阅。


    目前，Oracle 的 HotSpot 仍然是许多应用程序使用的最常见的 JVM 实现。在垃圾回收方面，该 JVM 提供了一套成熟的垃圾回收选项。其架构的抽象表示如图
    13-1 所示。


    ![](img/463938_3_En_13_Fig1_HTML.jpg)


    图 13-1


    Oracle HotSpot JVM 架构（抽象表示）


    **堆**内存区域由垃圾回收器管理，并被划分为多个区域。对象在这些区域之间移动，直到被丢弃。图 13-2 中描绘的区域适用于旧式垃圾回收器和新型垃圾回收器，后者可能会遵循
    JDK 当前默认垃圾回收器 G1GC 的模型，该回收器是在 JDK 8 中引入的。


    ![](img/463938_3_En_13_Fig2_HTML.jpg)


    图 13-2


    堆结构


    **G1GC** 是新一代的垃圾回收器，专为拥有大量资源的机器设计，这就是其堆分区方法与众不同的原因。自 Java 9 起，它成为默认的 GC。它的堆被划分为一组大小相等的堆区域，每个区域都是虚拟内存的一个连续范围。某些区域集被分配了与旧回收器相同的角色（伊甸园、幸存者、老年代），但它们的尺寸不是固定的。这为内存使用提供了更大的灵活性。您可以在下一节中阅读更多关于不同类型垃圾回收器的信息，但现在我们仍将重点放在堆内存及其区域上，这些区域被称为**代**。


    当应用程序运行时，它创建的对象存储在**年轻代区域**中。当一个对象被创建时，它在该代的一个名为**伊甸园空间**的子区域中开始其生命周期。当伊甸园空间被填满时，会触发一次**次要垃圾回收（minor
    GC）运行**，清理该区域中未被引用的对象，并将被引用的对象移动到**第一个幸存者空间（S0）**。下一次伊甸园空间被填满时，会再次触发一次 minor GC
    运行，再次删除未被引用的对象，而被引用的对象则被移动到**下一个幸存者空间（S1）**。


    S0 中的对象已经经历了一次 minor GC 运行，因此它们的年龄会增加。它们也会被移动到 S1，这样 S0 和伊甸园就可以被清理干净。


    在下一次 minor GC 运行时，操作会再次执行，但这次被引用的对象会被保存到空的 S0 中。来自 S1 的较老对象的年龄会增加，并也被移动到 S0，这样
    S1 和伊甸园就可以被清理干净。


    当幸存者空间中的对象达到一定年龄（具体值因每种垃圾回收器而异）后，它们会在 minor GC 运行期间被移动到*老年代空间*。


    前面描述的步骤如图 13-3 所示，对象 `o1` 和 `o2` 会一直老化，直到它们被移动到老年代区域。


    ![](img/463938_3_En_13_Fig3_HTML.jpg)


    图 13-3


    年轻代空间上的 Minor GC 运行


    Minor GC 收集会一直进行，直到老年代空间被填满。这时会触发一次**主要垃圾回收（major GC）运行**，它将删除未被引用的对象并压缩内存，移动对象，使得留下的空闲内存成为一个大的连续空间。


    **次要垃圾回收事件是一个“停止一切”的事件**。这个过程基本上接管了应用程序的运行并暂停其执行，以便释放内存。由于年轻代空间相当小（您将在下一节中看到这一点），应用程序的暂停通常可以忽略不计。如果在一次
    minor GC 运行后无法从年轻代区域回收任何内存，则会触发一次 major GC 运行。


    **永久代**区域是为 JVM 元数据（如类和方法）保留的。该区域也会不时地被清理，以移除应用程序中不再使用的类。当堆中不再有对象时，会触发对该区域的清理。


    刚刚描述的垃圾回收过程是分代垃圾回收器（如 G1GC）所特有的。在 JDK 8 之前，垃圾回收是使用一种较旧的垃圾回收器完成的，该回收器使用一种称为**并发标记清除**的算法。这种垃圾回收器与应用程序并行运行，标记已使用和未使用的内存区域。然后它会删除未被引用的对象，并通过移动对象将内存压缩成一个连续的区域。这个过程相当低效且耗时。随着创建的对象越来越多，垃圾回收所需的时间也越来越长，但由于大多数对象的生命周期都很短，这实际上并不是一个问题。因此，CMS
    垃圾回收器在一段时间内还是可以接受的。


    G1GC 采用类似的方法，但在标记阶段完成后，G1 会专注于那些大部分为空白的区域，以尽可能多地回收未使用的内存。这就是为什么这种垃圾回收器也被称为**垃圾优先**。G1
    还使用暂停预测模型，根据为应用程序设置的暂停时间来决定可以处理多少个内存区域。来自已处理区域的对象被复制到堆的单个区域中，从而同时实现了内存压缩。此外，G1GC
    对伊甸园和幸存者空间没有固定的大小；它会在每次 minor GC 运行后决定它们的大小。

    '
- fmt: '### How Many Garbage Collectors Are There?


    The Oracle HotSpot JVM provides the following types of garbage collectors:


    - **The serial collector**: All garbage collection events are conducted serially
    in one thread. Memory compaction happens after each garbage collection.

    - **The parallel collector**: Multiple threads are used for minor garbage collection.
    A single thread is used for a major garbage collection and old generation compaction.

    - **Garbage First (G1)**: Introduced in Oracle JDK 7, update 4, it was designed
    to permanently replace the CMS GC and is suitable for applications that can operate
    concurrently with the CMS collector, that need memory compaction, that need more
    predictable GC pause durations, and that do not require a much larger heap. The
    G1 collector is a server-style garbage collector, targeted for multiprocessor
    machines with large memories, but considering that most laptops now have at least
    eight cores and 16GB RAM, it is quite suitable for them as well. G1 has both concurrent
    (runs along with application threads; e.g., refinement, marking, cleanup) and
    parallel (multithreaded; e.g., stop-the-world events) phases. Full garbage collections
    are still single threaded, but if tuned properly your applications should avoid
    full garbage collections.

    - **Z Garbage Collector (ZGC)**: This is a scalable low-latency garbage collector
    introduced in Java 11. ZGC performs all expensive work concurrently, without stopping
    the execution of application threads for more than 10ms, which makes it suitable
    for applications that require low latency and/or use a huge heap (multiple terabytes).

    - **Shenandoah Garbage Collector**: Shenandoah is the low-pause-time garbage collector,
    introduced in Java 12, that reduces GC pause times by performing more garbage
    collection work concurrently with the running Java program. Shenandoah does the
    bulk of GC work concurrently, including the concurrent compaction, which means
    its pause times are no longer directly proportional to the size of the heap.

    - **Epsilon no-op collector**: Introduced in Java 11, this type of collector is
    actually a dummy GC that does not recycle or clean up the memory. When the heap
    is full, the JVM just shuts down. This type of collector can be used for performance
    tests, memory allocation analysis, VM interface testing, and extremely short-lived
    jobs and applications that are super-limited when it comes to memory usage. Evidently,
    developers must estimate the application memory footprint as exactly as possible.


    We’ve listed the garbage collector types, but how do we know which is the one
    used by our local JVM? There is more than one way. The simplest way is to add
    `-verbose:gc` as a VM option when running a simple class with a `main()` method.


    Using Java 23, without any other configuration, the following output is shown:


    ```

    [0.011s][info][gc] Using G1

    ```


    **Note**: The simplest way to run a Java class with VM options is to create an
    IntelliJ IDEA launcher and introduce the VM options in the appropriate text field.
    The other way is to run a simple class from the command line and add the arguments
    to the command. The following example reuses the `Practice01.java` file introduced
    in **Chapter 2**:


    `java --enable-preview -Xlog:gc* Practice01.java`


    **Caution**: Using a launcher avoids complications that might be caused by the
    shell used to execute commands. For example, Zsh (or Z shell) requires the `*`
    (asterisk) to be escaped; otherwise, it will not execute the command and will
    complain that `zsh: no matches found: -Xlog:gc*`.


    As you’ve read, the G1 garbage collector is used by default. To show even more
    details of this garbage collector, `-Xlog:gc*` can be added to the VM arguments
    when running a Java class, as shown in Listing 13-1.


    ```

    [0.015s][info][gc,init] CardTable entry size: 512    # (1)

    [0.014s][info][gc     ] Using G1

    [0.017s][info][gc,init] Version: 23+37-2369 (release)

    [0.017s][info][gc,init] CPUs: 16 total, 16 available

    [0.017s][info][gc,init] Memory: 32768M

    [0.017s][info][gc,init] Large Page Support: Disabled

    [0.017s][info][gc,init] NUMA Support: Disabled

    [0.017s][info][gc,init] Compressed Oops: Enabled (Zero based)

    [0.017s][info][gc,init] Heap Region Size: 4M  # (2)

    [0.017s][info][gc,init] Heap Min Capacity: 8M

    [0.017s][info][gc,init] Heap Initial Capacity: 512M

    [0.017s][info][gc,init] Heap Max Capacity: 8G # (3)

    [0.017s][info][gc,init] Pre-touch: Disabled

    [0.017s][info][gc,init] Parallel Workers: 13

    [0.017s][info][gc,init] Concurrent Workers: 3

    [0.017s][info][gc,init] Concurrent Refinement Workers: 13

    [0.017s][info][gc,init] Periodic GC: Disabled

    [0.030s][info][gc,metaspace] CDS archive(s) mapped at: [0x000000012b000000-0x000000012bd94000-0x000000012bd94000),
    size 14237696, SharedBaseAddress: 0x000000012b000000, ArchiveRelocationMode: 1.

    [0.030s][info][gc,metaspace] Compressed class space mapped at: 0x000000012c000000-0x000000016c000000,
    reserved size: 1073741824

    [0.030s][info][gc,metaspace] Narrow klass base: 0x000000012b000000, Narrow klass
    shift: 0, Narrow klass range: 0x100000000

    ... Hey ma'' look the GC! ...

    [0.209s][info][gc,heap,exit] Heap

    [0.209s][info][gc,heap,exit]  garbage-first heap   total reserved 8388608K, committed
    528384K, used 5236K [0x0000000600000000, 0x0000000800000000)  # (4)

    [0.209s][info][gc,heap,exit]   region size 4096K, 1 young (4096K), 0 survivors
    (0K)

    [0.209s][info][gc,heap,exit]  Metaspace       used 996K, committed 1152K, reserved
    1114112K

    [0.209s][info][gc,heap,exit]   class space    used 85K, committed 192K, reserved
    1048576K

    ```


    **Listing 13-1**: Showing G1GC Details Using `-verbose:gc -Xlog:gc*` VM Options
    When Running `ShowGCDemo`


    In the Java HotSpot VM, the GC uses a data structure called a *card table*. The
    card table speeds up finding references that are no longer used. The old generation
    is split into 512-byte chunks called **cards**, as shown in the log line labeled
    with **(1)** in Listing 13-1. JDK 18 introduced configurable card table card sizes.
    The available card sizes are `128`, `256`, `512` (default), and `1024` (the last
    is 64 bits only). To customize the card size, add VM option `-XX:GCCardSizeInBytes=<card-size>`
    when running the `ShowGCDemo` class, and the first console log message should
    reflect the desired card size.


    We can see in Listing 13-1 that the memory region size is 4M **(2)**, the heap
    maximum size is 8G **(3)**, size and occupation for each generation **(4)**.


    In **Chapter 5**, the `java -XX:+PrintFlagsFinal -version` command was introduced
    to show all JVM flags. Filtering the results returned by the “GC” and “NewSize”
    shows all the GC-specific flags and their values. There are quite a few of them,
    and they are shown in Listing 13-2.'
