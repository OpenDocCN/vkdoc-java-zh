    after selecting a new look-and-feel class, we have to call `repaint()` on the
    `JFrame` instance to apply the new look and feel, so we’ll take the declaration
    out into its own class and provide the `SwingDemo` object as an argument, so that
    `repaint()` can be called on it, inside the `valueChanged(..)` method. The code
    snippet is depicted in Listing [10-14](#463938_3_En_10_Chapter.xhtml#PC22).


