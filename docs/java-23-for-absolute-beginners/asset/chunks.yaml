- fmt: "### XML Serialization\n\nJava serialization does not have to result in cryptic\
    \ files, however. Objects can be serialized to readable formats. One of the most-used\
    \ serialization formats is XML, and the JDK provides classes to convert objects\
    \ to XML and from XML back to the initial object.\n\n**Java Architecture for XML\
    \ Binding (JAXB)** used to provide a fast and convenient way to bind XML schemas\
    \ and Java representations, making it easy for Java developers to incorporate\
    \ XML data and processing functions in Java applications. The operation to serialize\
    \ an object to XML is named **marshalling**. The operation to deserialize an object\
    \ from XML is named **unmarshalling**.\n\n`JAXB` was removed from the JDK starting\
    \ with version 11, and its successor `JAXB2` did not gain the expected traction.\
    \ This was not a surprise, because for years the Jackson collection of libraries\
    \ has been the default go-to for XML, JSON, and (more recently) YAML serialization\
    \ and deserialization for most projects. Jackson has been known for quite a while\
    \ in the Java ecosystem as the ultimate *Java JSON library*, but it also has modules\
    \ that support serialization to quite a few other formats, among them XML, CSV,\
    \ YAML, and TAML. Just check the project page ([`https://github.com/FasterXML/jackson`](https://github.com/FasterXML/jackson));\
    \ chances are that if there is a new catchy serialization format emerging, there\
    \ might already be a module for that.\n\nThere are a few things to keep in mind\
    \ when serializing to XML using Jackson:\n\n*   There is a different set of annotations\
    \ to use, the most important of which are listed here:\n    *   `@JacksonXmlRootElement(localName\
    \ = \"...\")` is a top-level annotation that is placed at the class level to tell\
    \ Jackson that the class name will become an XML element at serialization time;\
    \ if a different name is needed for the XML element, it can be specified via the\
    \ `localName` attribute.\n    *   `@JacksonXmlProperty(localName = \"...\")` is\
    \ a method- or field-level annotation that is used to tell Jackson that the field\
    \ or method name will become an XML element at serialization time; if a different\
    \ name is needed for the XML element, it can be specified via the `localName`\
    \ attribute.\n    *   `@JacksonXmlProperty(localName = \"...\", isAttribute =\
    \ true)` with the `isAttribute = true` parameter is used when the property is\
    \ configured to become an XML attribute.\n    *   To serialize and deserialize\
    \ with Jackson, an instance of `com.fasterxml.jackson.dataformat.xml.XmlMapper`\
    \ is used.\n    *   The `XmlMapper` instance has to be configured to support special\
    \ types such as the new Java 8 Date API types, and this is done by registering\
    \ and configuring the `com.fasterxml.jackson.datatype.jsr310.JavaTimeModule`.\n\
    \    *   When using Java modules, you have to make sure they are configured correctly.\
    \ Exceptions will not always be easy to read, and solving them might require a\
    \ combination of Apache Maven and module configuration to solve.\n\nThis being\
    \ said, let’s start with the module configuration, shown in Listing [11-36](#463938_3_En_11_Chapter.xhtml#PC61).\n\
    \n```\nmodule chapter.eleven.serialization {\n    requires org.slf4j;\n    requires\
    \ com.fasterxml.jackson.databind;\n    requires com.fasterxml.jackson.dataformat.xml;\n\
    \    requires com.fasterxml.jackson.datatype.jsr310;\n    opens com.apress.bgn.eleven.xml\
    \ to com.fasterxml.jackson.databind;\n}\nListing 11-36\nModule Configuration for\
    \ XML Serialization with Jackson\n```\n\nThe first two `requires com.fasterxml.jackson.*`\
    \ directives are needed so that Jackson annotations and `XmlMapper` can be used.\
    \ The `jsr310` is required for serialization of Java 8 Date API types.\n\nThe\
    \ last statement, `opens com.apress.bgn.eleven.xml to com.fasterxml.jackson.databind`,\
    \ is necessary so that Jackson can access the classes in package `com.apress.bgn.eleven.xml`,\
    \ because that is where the version of the `Singer` class written using the Jackson\
    \ annotation is located. The class is depicted in Listing [11-37](#463938_3_En_11_Chapter.xhtml#PC62).\n\
    \n```\npackage com.apress.bgn.eleven.xml;\n// other imports omitted\nimport com.fasterxml.jackson.dataformat.xml.annotation.JacksonXmlProperty;\n\
    import com.fasterxml.jackson.dataformat.xml.annotation.JacksonXmlRootElement;\n\
    \n@JacksonXmlRootElement(localName = \"singer\")\npublic class Singer implements\
    \ Serializable {\n    private static final long serialVersionUID = 42L;\n    private\
    \ String name;\n    private Double rating;\n    private LocalDate birthDate;\n\
    \n    public Singer() {\n        /* required for deserialization */\n    }\n\n\
    \    public Singer(String name, Double rating, LocalDate birthDate) {\n      \
    \  this.name = name;\n        this.rating = rating;\n        this.birthDate =\
    \ birthDate;\n    }\n\n    @JacksonXmlProperty(localName = \"name\", isAttribute\
    \ = true)\n    public String getName() {\n        return name;\n    }\n\n    @JacksonXmlProperty(localName\
    \ = \"rating\", isAttribute = true)\n    public Double getRating() {\n       \
    \ return rating;\n    }\n\n    @JacksonXmlProperty(localName = \"birthdate\")\n\
    \    public LocalDate getBirthDate() {\n        return birthDate;\n    }\n   \
    \ // other code omitted\n}\nListing 11-37\nA Singer Class with Jackson XML Annotations\n\
    ```\n\nNotice the location where the annotations were placed. Based on the placement\
    \ of the annotations and their configurations in Listing [11-37](#463938_3_En_11_Chapter.xhtml#PC62)\
    \ when the `john` object is serialized, the `john.xml` file is expected to contain\
    \ the snippet depicted in Listing [11-38](#463938_3_En_11_Chapter.xhtml#PC63).\n\
    \n```\n<singer name=\"John Mayer\" rating=\"5.0\">\n    <birthdate>1977-10-16</birthdate>\n\
    </singer>\nListing 11-38\nThe john Singer Instance in XML Format\n```\n\nIt’s\
    \ more readable than the binary version, right? Listing [11-39](#463938_3_En_11_Chapter.xhtml#PC64)\
    \ depicts the code that saves the `Singer` instance to the `john.xml` file, and\
    \ then it loads it back into a copy to compare it with the original instance.\n\
    \n```\npackage com.apress.bgn.eleven.xml;\n\nimport com.fasterxml.jackson.databind.SerializationFeature;\n\
    import com.fasterxml.jackson.dataformat.xml.XmlMapper;\nimport com.fasterxml.jackson.datatype.jsr310.JavaTimeModule;\n\
    // other import statements omitted\n\npublic class XMLSerializationDemo {\n  \
    \  private static final Logger LOGGER = LoggerFactory.getLogger(XMLSerializationDemo.class);\n\
    \n    void main(){\n        var johnBd = LocalDate.of(1977, Month.OCTOBER, 16);\n\
    \        var john = new Singer(\"John Mayer\", 5.0, johnBd);\n        var xmlMapper\
    \ = new XmlMapper();\n        xmlMapper.registerModule(new JavaTimeModule());\n\
    \        xmlMapper.enable(SerializationFeature.INDENT_OUTPUT);\n        xmlMapper.configure(SerializationFeature.WRITE_DATES_AS_TIMESTAMPS,\
    \ false);\n        var path = Path.of(\"chapter11/serialization/src/test/resources/output/john.xml\"\
    );\n        try {\n            var xml = xmlMapper.writeValueAsString(john);\n\
    \            Files.writeString(path, xml, StandardCharsets.UTF_8);\n        }\
    \ catch (Exception e) {\n            LOGGER.info(\"Serialization to XML failed!\
    \ \", e);\n        }\n        try {\n            var copyOfJohn = xmlMapper.readValue(path.toFile(),\
    \ Singer.class);\n            LOGGER.info(\"Are objects equal? {}\", copyOfJohn.equals(john));\n\
    \            LOGGER.info(\"--> {}\", copyOfJohn);\n        } catch (IOException\
    \ e) {\n            LOGGER.info(\"Deserialization of XML failed! \", e);\n   \
    \     }\n    }\n}\nListing 11-39\nSerializing and Deserializing a Singer Class\
    \ with Jackson’s XmlMapper\n```\n\nThe `XmlMapper` instance can be used to serialize\
    \ any class in the project that contains Jackson annotations. The example in Listing\
    \ [11-39](#463938_3_En_11_Chapter.xhtml#PC64) is also configured to support default\
    \ serialization of Java 8 Date API types and keep types readable, by not converting\
    \ them to numeric time stamps using the following two lines:\n\n```\nxmlMapper.registerModule(new\
    \ JavaTimeModule());\nxmlMapper.configure(SerializationFeature.WRITE_DATES_AS_TIMESTAMPS,\
    \ false);\n```\n\nSince the chosen format is XML, it would look pretty ugly if\
    \ all of it was written in a single line, so indented formatting is supported\
    \ using this statement:\n\n```\nxmlMapper.enable(SerializationFeature.INDENT_OUTPUT)\n\
    ```"
