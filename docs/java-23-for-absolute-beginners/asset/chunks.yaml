    Filters can also be used to modify requests. In the example in Listing [10-31](#463938_3_En_10_Chapter.xhtml#PC41),
    the `headerAppenderFilter` is used to add a header named `Timestamp` to the request.
    Because the `outputFilter` declares the log level to be `VERBOSE` and is added
    last, when opening `http://127.0.0.1:8080/simple/` in the console, you can see
    all the details of the request, including the `Timestamp`. Listing [10-32](#463938_3_En_10_Chapter.xhtml#PC42)
