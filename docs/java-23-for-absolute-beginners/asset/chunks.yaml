    ## Installing Apache Maven


    The source code for this book is organized in small projects that can be compiled
    and executed using Apache Maven. You can download Apache Maven and read more about
    it on its official page^([^(30)](#fn30)). Apache Maven is a software project management
    and comprehension tool. It was chosen as a build tool for this book for the following
    reasons:


    *   Easy setup (XML is pretty much omnipresent nowadays)


    *   Its long-term relationship with Java


    *   Many companies use it


    If you need one more reason to learn a build tool, here it is: for medium-sized
    and large projects, a build tool is a must-have because it facilitates the declaration,
    download, and upgrade of dependencies.


    Installing Maven is quite easy. Just download it, unpack it somewhere, and declare
    the `M2_HOME` environment variable. Instructions on how to do this are available
    on the official site, or you can use SDKMAN.


    Once you have Maven installed, you can check that it installed successfully and
    that it uses the JDK version you expect by opening a terminal (or Command Prompt
    on Windows) and executing `mvn -version`. The output should look pretty similar
    to the output in Listing [2-36](#463938_3_En_2_Chapter.xhtml#PC37).


    ```

    Apache Maven 4.0.0-alpha-13 (0a6a5617fe5ef65c44f05903491e170d92cf37fc)

    Maven home: /Users/iuliana/.sdkman/candidates/maven/current

    Java version: 23-ea, vendor: Oracle Corporation, runtime: /Users/iuliana/.sdkman/candidates/java/23.ea.5-open

    Default locale: en_GB, platform encoding: UTF-8

    OS name: "mac os x", version: "14.2.1", arch: "x86_64", family: "mac"

    Listing 2-36

    Output of Command mvn -version on macOS

    ```


    Important


    If you are pursuing a career in Java development, knowing a build tool well is
    a valuable advantage. Most companies using Java have big projects, organized in
    interdependent modules that cannot be managed without a build tool. Apache Maven
    has been the de facto build tool for Java for a long time, so you might want to
    get familiar with it.


    ## Installing Git


    This is an optional section, but as a developer, being familiar with a versioning
    system is important, so here it is. To install Git on your system, just go to
    the official page^([^(31)](#fn31)) and download the installer. Open the installer
    and click **Next** until it completes the installation. This works for Windows
    and macOS (for macOS, you can use `homebrew`^([^(32)](#fn32))). Yes, it is this
    easy; you do not need to do anything else. On Linux, it can be done using a PPA.


    Just in case you need more guidance, here is a page with instructions on how to
    install Git for all operating systems: [`https://gist.github.com/derhuerst/1b15ff4652a867391f03`](https://gist.github.com/derhuerst/1b15ff4652a867391f03).


    To test that Git was installed successfully on your system, open a terminal (Command
    Prompt in Windows) and run `git --version` to see the result that it is printed.
    It should be the version of Git that you just installed. The expected output should
    be similar to Listing [2-37](#463938_3_En_2_Chapter.xhtml#PC38).


    ```

    $ git –-version

    git version 2.44.0

    Listing 2-37

    Output of Command git –version to Verify Git Installation

    ```


    Now that you have Git installed, you can get the sources for this book by cloning
    the official Git repository in a terminal or directly from the IDE.'
