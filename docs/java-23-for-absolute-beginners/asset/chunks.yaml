    *   `void onNext(T)` 是当 `Subscription` 产生下一个数据项时调用的方法，用于接收数据；如果该方法抛出异常，`Subscription`
    可能会被取消。

    *   `void onError(Throwable)` 是当 `Publisher<T>` 或 `Subscription<T>` 遇到不可恢复的错误时调用的方法。

    *   `void onComplete()` 是当没有更多数据需要消费时调用的方法，此后将不再调用 `Subscriber<T>` 的其他方法。

    *   `Processor<T,R>` 同时继承了 `Publisher<T>` 和 `Subscriber<R>`，因为它需要消费数据，并生成数据以进一步向上游发送。

    *   `Subscription` 连接了 `Publisher<T>` 和 `Subscriber<T>`，可以通过调用 `request(long)`
    来设置要生成并发送给消费者的数据项数量，从而实现背压。它还允许通过调用 `cancel()` 方法来取消数据流，告知 `Subscriber<T>` 停止接收消息。


    在 JDK 中，上述所有接口都定义在 `java.util.concurrent.Flow` 类中。这个类的名称本身就说明了其用途，因为前面的接口用于创建流控组件，这些组件可以链接在一起，构成一个响应式应用。图
    12-5 展示了 JDK 响应式流 API 与响应式流库 API 之间的对应关系。


    ![](img/463938_3_En_12_Fig5_HTML.jpg)


    图 12-5


    JDK 响应式流 API 与响应式流库 API 的对应关系


