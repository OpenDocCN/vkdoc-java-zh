    #### 结构化并发


    在 Java 19 中，通过 JEP 428^(⁵⁸) 引入了一个用于简化并发编程的新 API。该 API 简化了**结构化并发**的多线程编程。这项工作在
    Java 21^(⁵⁹)、Java 22 和 Java 23（JEP [`https://openjdk.org/jeps/480`](https://openjdk.org/jeps/480)）中得以延续，但在撰写本章时，这仍然是一个预览特性。


    结构化并发将不同线程中运行的多个任务视为一个工作单元，从而简化了错误处理和取消操作，提高了可靠性，并增强了可观测性。解释结构化并发最简单的方法是将其与典型的方法调用进行比较。如果方法
    A 调用了方法 B，那么方法 B 的执行必须在方法 A 继续执行之前完成，但这两个方法都在同一个线程中执行。结构化并发意味着虚拟线程具有相同的行为：如果虚拟线程
    A 创建了虚拟线程 B，那么线程 B 的执行应该发生在线程 A 的执行时间内。结构化并发为线程执行带来了秩序，提供了一种使用可读代码在虚拟线程执行之间创建依赖关系的方法，从而隐藏了并发和同步的复杂性。


    结构化并发 API 的主要类是 `java.util.concurrent` 包中的 `StructuredTaskScope<T>`。这个类使您能够将一组并发子任务作为一个单元进行协调。在
    Java 中，开箱即用地提供了该类的两个扩展：`ShutdownOnSuccess<T>` 和 `ShutdownOnFailure`，两者都被声明为 `StructuredTaskScope<T>`
    主体内的静态嵌套类，但开发人员可以通过扩展此类来编写自己的版本。


    `ShutdownOnSuccess<T>` 实例适用于任务集中至少有一个子任务成功即可视为执行成功的情况。这也被称为**调用任意**模式。`ShutdownOnSuccess<T>`
    实例捕获第一个**成功完成**的子任务的结果，然后调用 shutdown 方法来中断未完成的线程并唤醒所有者。


    清单 5-58 展示了如何使用 `ShutdownOnSuccess<T>` 通过两个子任务生成一个随机的 `Integer` 值：一个使用生成器，另一个返回一个常量。这种方法确保其中一个子任务很可能会被丢弃。


    ```

    package com.apress.bgn.five;

    import com.apress.bgn.four.classes.DataGenerator;

    import java.time.Duration;

    import java.time.Instant;

    import java.util.concurrent.ExecutionException;

    import static java.util.concurrent.StructuredTaskScope.*;

    import static java.lang.System.out;

    public class StructuredConcurrencyDemoOne {

    void main() {

    var start = Instant.now();

    try (var scope = new ShutdownOnSuccess()) {

    Subtask task1 = scope.fork(() -> DataGenerator.genInt());

    Subtask task2 =  scope.fork(() -> 2);

    scope.join();

    out.println("task1: " + task1.state() + ", result : " + (task1.state() == Subtask.State.SUCCESS
    ? task1.get() : "Not Available")  +

    "\ntask2: " + task2.state()+ ",  result : " + (task2.state() == Subtask.State.SUCCESS
    ? task2.get() : "Not Available")

    );

    out.println("Execution time : " + Duration.between(start, Instant.now()).toMillis()
    + " ms");

    out.println("Task result: " + scope.result());

    } catch (InterruptedException | ExecutionException e) {

    throw new RuntimeException(e);

    }

    }

    }

    // output

    /*

    task1: UNAVAILABLE, result : Not Available

    task2: SUCCESS, result : 2

    Execution time : 30ms

    Task result: 2

    */

    清单 5-58

    ShutdownOnSuccess 任务使用的简单示例

    ```


    `join()` 方法会等待在此任务作用域中启动的子任务成功完成，并在发生以下任一情况时停止等待：


    *   所有线程完成

    *   一个子任务成功完成

    *   当前线程被中断

    *   直接调用 `shutdown()` 方法来关闭所有者任务


    请注意，在清单 5-58 的输出中，我们可以检查子任务的状态。如果子任务状态是 `Subtask.State.SUCCESS`，则可以访问该子任务的结果，并且该结果将成为所有者任务的结果。虽然此处未显示，但被放弃的子任务最终会处于
    `Subtask.State.UNAVAILABLE` 状态。抛出异常或超时的子任务最终会处于 `Subtask.State.FAILED` 状态。


    `ShutdownOnFailure` 适用于所有子任务都成功才能将执行视为成功的情况。这也被称为**调用全部**模式。`ShutdownOnFailure`
    实例捕获第一个**异常完成**的子任务的结果，然后调用 shutdown 方法来中断未完成的线程并唤醒所有者。


    清单 5-59 展示了如何使用 `ShutdownOnFailure` 通过两个子任务生成一个随机的 `Integer` 值列表：一个使用生成器，另一个返回一个常量。这种方法确保其中一个子任务很可能会被丢弃。


    ```

    package com.apress.bgn.five;

    import java.time.Duration;

    import java.time.Instant;

    import java.util.ArrayList;

    import java.util.List;

    import java.util.concurrent.TimeoutException;

    import java.util.stream.Collectors;

    import static com.apress.bgn.five.VirtualThreadsExecutorDemo.RND;

    import static java.util.concurrent.StructuredTaskScope.*;

    import static java.lang.System.out;

    public class StructuredConcurrencyDemoTwo {

    void main() {

    var d = new StructuredConcurrencyDemoTwo();

    List> subtasks = new ArrayList();

    var start = Instant.now();

    try (var scope = new ShutdownOnFailure()) {

    for (int i = 0; i  d.genValue()));

    }

    scope.joinUntil(Instant.now().plusSeconds(5));

    scope.throwIfFailed(t -> new IllegalStateException(("Well this sucks!  " + t.getMessage()));

    // if all subtasks complete successfully

    var result = subtasks.stream()

    .map(Subtask::get)

    .collect(Collectors.toList());

    out.println("All results: " + result);

    } catch (InterruptedException | TimeoutException | IllegalStateException e) {

    System.err.println("Some tasks have failed. " + e.getMessage());

    subtasks.forEach(t -> out.println(

    "task "  + subtasks.indexOf(t)  + " " + t.state() + ", result : " + (t.state()
    == Subtask.State.SUCCESS ? t.get() : "Not Available")

    )

    );

    }

    out.println("Execution time : " + Duration.between(start, Instant.now()).toMillis()
    + " ms");

    }

    Integer genValue() throws InterruptedException {

    var generatedVal = RND.nextInt();

    if(generatedVal % 11 ==0) {

    throw new IllegalStateException("This value is bad, bad bad...");

    }

    return generatedVal;

    }

    }

    // output

    // all success

    /*

    All results: [-1992358099, 1997495937, 1711128236, -1859724079, 1177627696, 1839477352,
    -1031424090, 1759698562, -186490484, -73552283]

    Execution time : 371ms

    */

    // or some failures

    /*

    ..

    task6: SUCCESS, result : 930381003

    task7: FAILED, result : Not Available

    task8: SUCCESS, result : -1545203690

    ...

    Execution time : 409ms

    */

    清单 5-59

    ShutdownOnFailure 任务使用的简单示例

    ```


    这个示例与清单 5-58 中的示例类似，但行为不同。引入了 `genValue()` 方法，以便在随机生成的数字能被 11 整除时随机抛出异常，导致某些子任务失败。数字
    11 足够复杂，以至于有时根本不会抛出异常，这使得所有子任务都能成功执行。


    我们没有使用 `join()` 方法，而是使用了 `joinUntil(..)`，它接受一个 `java.time.Instant` 参数，表示允许的执行时间，在本例中为当前系统时间后的
    5 秒。如果执行任务的时间超过此时间，则执行失败并抛出 `IllegalStateException`。

    '
- fmt: '`throwIfFailed(..)`方法会抛出由给定异常提供函数生成的异常（如果某个子任务失败）。当使用此方法时，如果任何子任务因异常而失败，则会调用该函数，并传入第一个失败子任务的异常。在此示例中，我们将子任务异常消息包含在函数返回的异常中。函数返回的异常会被抛出。如果没有子任务失败，此方法不执行任何操作。此方法还有一个不接受参数的版本，在这种情况下，会抛出一个`java.util.concurrent.ExecutionException`，该异常包装了第一个失败子任务的异常。


    另一件值得一提的事情是特殊的`catch`块。这种类型的`catch`块是在 Java 7 中引入的，旨在减少因需要处理多个异常而导致的重复代码：


    ```java

    } catch (InterruptedException | TimeoutException | IllegalStateException e)  {

    // handle the exception

    }

    ```


    在 Java 7 之前，相同的代码块会写成如下形式：


    ```java

    } catch (InterruptedException e) {

    // handle the exception

    } catch (TimeoutException e) {

    // handle the exception

    } catch (IllegalStateException e) {

    // handle the exception

    }

    ```


    尽管 Java 5 中引入的`java.util.concurrent.ExecutorService`API 已经提供了对并发执行子任务的支持，但新的结构化并发
    API 帮助开发者编写更易读、更易调试的代码，并且还带来了消除由取消和关闭引起的常见风险（如线程泄漏和取消延迟）的好处。


    ## Summary


    在本章中，你学习了 JVM 如何管理 Java 程序的内存，以及最常用的 Java 数据类型的基础知识。本章中你应该记住的一些重要细节如下：


    *   JVM 管理两种类型的内存：栈和堆。

    *   原始类型和引用类型之间的区别。

    *   原始值存储在栈内存中，对象值存储在堆中。

    *   Java 中有八种原始数据类型：`boolean`、`char`、`short`、`byte`、`int`、`long`、`float`、`double`。

    *   引用只能是所分配对象的超类型。

    *   数组的大小在创建时定义，之后无法更改。

    *   在 Java 中，`String`实例是*不可变的*，这意味着它们一旦创建就无法更改。

    *   如果需要处理日历日期，请使用新的 DateTime API。

    *   `null`既实用又强大。

    *   集合可以将对象类型分组为元组或键/值对。

    *   Java 中的经典并发在小范围内很有趣。

    *   虚拟线程是 Java 21 中引入的最有用的特性之一。

    *   结构化并发允许你编写并行执行任务的代码，而无需编写任何线程管理代码。


    本章中的一些示例可能看起来很复杂，但不要气馁。如果不提供你可以执行、测试甚至自行修改的工作代码，就很难解释某些概念。不幸的是，这需要使用将在后续章节中介绍的概念（例如`for`和`if`语句）。只需记下每个目前不清楚的概念及其页码，并在你稍后详细阅读相关概念后返回本章。


