    the byte sequence back to an object is named *deserialization*. Java serialization
    has been a controversial topic, with Java Platform Chief Architect Mark Reinhold
    describing it as a horrible mistake made in 1997\. Apparently, most Java vulnerabilities
    are somehow related to the way serialization is done in Java, and there is a project
    named Project Amber^([^(107)](#fn107)) that is dedicated to removing Java serialization
    completely and allowing developers to choose the serialization in a format of
    their choice.'
