  trans: '

    ## 测试


    调试是名为**测试**的软件流程的一部分，涉及在开发周期中尽早识别并纠正代码错误。在软件开发中，仅仅避免技术错误是不够的。测试应用程序的意义远不止于此。甚至有一个组织为软件测试人员提供优秀的培训和认证材料。**国际软件测试资格认证委员会（ISTQB）**
    是一个国际性的软件测试资格认证组织。它制定了软件测试的教学大纲、资格等级和指南^(⁷⁸)。如果你认为自己更感兴趣的是软件测试，那么你应该考虑获取 ISTQB
    认证。


    ISTQB 对测试的定义是：“由所有生命周期活动（包括静态和动态）组成的过程，涉及对软件及相关工作产品的规划、准备和评估，以确定它们满足规定的要求，证明它们适合其用途，并检测缺陷。”


    ISTQB 的定义是一个技术性的、学术性的定义。我提出的定义是：“验证一个实现是否在预期的时间内，以可接受的资源消耗，完成了它应该做的事情的过程。”


    重要


    测试是开发过程中必不可少的一部分，应尽早开始，因为修复缺陷的工作量会随着发现时间的推移呈指数级增长。你可以在罗伯特·C·马丁的《代码整洁之道：敏捷软件工艺手册》一书中，特别是第
    9 章“测试”中，了解更多关于延迟测试的弊端。


    在开发阶段，除了编写实际的解决方案代码，你还可以编写代码来测试你的解决方案。你可以手动运行这些测试，也可以在构建项目时使用构建工具来运行。在编写代码时，除了思考如何编写解决方案以解决问题之外，你还应该思考如何测试该解决方案。这种方法被称为**测试驱动开发（TDD）**，这是一种编程范式，它指出你应该在实现解决方案之前思考如何测试它，因为如果它难以测试，那么它很可能难以实现、长期维护以及扩展以解决相关问题。


    你能编写的最简单的测试称为**单元测试**，它们是测试小功能单元的非常简单的代码。如果你不能轻松地为你的设计编写单元测试，那么你的设计可能存在问题。单元测试是抵御失败的第一道防线。如果单元测试失败，你的解决方案的基础就是糟糕的。


    跨越多个组件，测试功能单元之间的通信及其交互结果是否符合预期的测试，称为**集成测试**。


    开发人员应该编写的最后一种测试是**回归测试**，它会定期运行，以确保之前测试过的代码在修改后仍然能正确执行。这种测试对于由大量开发人员编写代码的大型项目至关重要，因为有时组件之间的依赖关系并不明显，一个开发人员编写的代码可能会破坏其他人的代码。


    为了保持本书的范畴，本节将仅展示如何使用名为 Junit 的 Java 框架编写简单的单元测试，并描述一些你可以构建的典型测试组件，以便为单元测试设置上下文。因此，正如我的苏格兰同事所说：*让我们开始吧！*


    ### 测试代码位置


    你可能还记得，**第 3 章**解释了`java-bgn`项目结构。关于测试的讨论必须从最低级别项目模块的结构开始，这些模块包含源代码和测试。在图 9-13
    中，你可以看到包含本节所用模块的源代码和测试代码的模块结构。


    ![](img/463938_3_En_9_Fig13_HTML.jpg)


    图 9-13


    Maven 模块结构


    `src`目录包含项目的所有代码和资源。其内容分为两个目录：`main`和`test`。


    *   `main`目录包含源代码和应用程序配置文件，分为两个目录（图 9-13 中未显示）。`java`目录包含 Java 源代码，`resources`目录包含配置文件、不可执行的文本文件（可以根据各种格式编写，如
    XML、SQL、CSV 等）、媒体文件、PDF 等。当应用程序被构建并打包成 jar（或 war 或 ear）时，只有`java`目录中的文件会被考虑；`*.class`文件与配置文件一起被打包。


    *   `test`目录包含用于测试`src`目录中源代码的代码。Java 文件保存在`java`目录下，`resources`目录包含构建测试上下文所需的配置文件。`test`目录中的类是项目的一部分，并且可以访问`main`目录中声明的类，如**第
    3 章**中访问修饰符所述。但是，`test`目录中的内容不属于将交付给客户的项目部分。它们的存在只是为了在开发过程中帮助测试应用程序。`test/resources`目录中的文件通常会覆盖`main/resources`目录中的配置文件，以便为测试类提供一个隔离的、更小的执行上下文。


    ### 构建一个待测试的应用程序


    对于本节中的示例，我们将构建一个简单的应用程序，该程序使用嵌入式 Apache Derby^(⁷⁹)数据库来存储数据。这将是生产数据库。对于测试环境，该数据库将被替换为各种模拟数据库行为的伪构造。


    这个应用程序相当简陋。一个`AccountService`实现从输入获取数据，并使用它来管理`Account`实例。`Account`类是一个非常抽象且不切实际的银行账户实现。它有一个`holder`字段（账户所有者）、一个`accountNumber`字段和一个`amount`字段。`AccountService`实现使用一个`AccountRepo`实现，通过`DBConnection`的实现来执行所有与`Account`实例相关的数据库操作。构成这个简单应用程序的类和接口以及它们之间的关系如图
    9-14 所示。


    ![](img/463938_3_En_9_Fig14_HTML.jpg)


    图 9-14


    简单的账户管理应用程序组件（如 IntelliJ IDEA 中所示）


    这些类的实现与本节的讨论无关，但如果你好奇，可以在本书的官方仓库中找到完整的代码。那么，让我们开始测试吧。最简单的方法是编写一个主类并执行一些账户操作。然而，一旦应用程序投入生产，这样做是无用的，因为在其上测试新功能会带来数据损坏的风险。此外，生产数据库通常托管在昂贵的产品上，例如
    Oracle RDBMS（Oracle 关系数据库管理系统）或 Microsoft SQL Server。它们并不真正适合开发或测试。我们的意图是在自动化构建过程中自动运行测试，因此内存数据库或可实例化的实现更为合适。那么，让我们从测试`AccountRepoImpl`类开始。

    '
- fmt: '# Introducing JUnit


    JUnit is undoubtedly the most-used testing framework in the Java development world.
    At the end of 2017, JUnit 5^([^(80)](#fn80)) was released, which is the next generation
    of this framework. It comes with a new engine, is compatible with Java 9+, and
    includes a lot of lambda-based functionalities. JUnit 5 provides annotations to
    mark test methods for automated execution, annotations for initialization and
    destruction of a test context, and utility methods to practically implement test
    methods. There are multiple JUnit 5 annotations that you can use^([^(81)](#fn81)),
    but five of them and a utility class represent the core of the JUnit framework,
    and this is the best place to start to learn testing. The following list describes
    each of the five JUnit 5 annotations (all of which are from package `org.junit.jupiter.api`)
    and the utility class, to build a general picture of how JUnit can be used to
    test your application:


    *   `@BeforeAll` is used on a nonprivate static method that returns `void` which
    is used to initialize objects and variables to be used by all test methods in
    the current class. This method will be called only once, before all test methods
    in the class, so test methods should not modify these objects because their state
    is shared, and modification might affect the test results. Eventually, the static
    fields to be initialized by the annotated method can be declared `final`, so once
    initialized, they can no longer be changed. More than one method annotated with
    `@BeforeAll` can be declared in a test class, but what would be the point?


    *   `@AfterAll` is the counterpart of `@BeforeAll`. It is also used to annotate
    nonprivate static methods that return `void`, and their purpose is to destroy
    the context the test methods were run in and perform cleanup actions.


    *   `@BeforeEach` is used on nonprivate, nonstatic methods that return `void`,
    and methods annotated with it are executed before every method annotated with
    `@Test`. These methods can be used to further customize the test context, to populate
    objects with values that will be used to test assertions in the test methods.


    *   `@AfterEach` is used on nonprivate, nonstatic methods that return `void`,
    and methods annotated with it are executed after every method annotated with `@Test`.


    *   `@Test` is used on nonprivate, nonstatic methods that return `void`, and the
    method annotated with it is a test method. A test class can have one or more test
    methods, depending on the class that is being tested.


    *   Utility class `org.junit.jupiter.api.Assertions` provides a set of methods
    that support asserting conditions in tests.


    Another noteworthy annotation is `@DisplayName`, which is declared in the same
    package as all the others and is used to name the test in a more pleasant way.
    The test name is displayed by the IDE and in the resulting reports created by
    the build tool.


    The `PseudoTest` class, shown in Listing [9-31](#463938_3_En_9_Chapter.xhtml#PC49),
    is a simple test class that shows the effect of the annotations introduced so
    far.


    ```

    package com.apress.bgn.nine;

    // some import statements omitted

    import org.junit.jupiter.api.*;

    import static org.junit.jupiter.api.Assertions.assertFalse;

    import static org.junit.jupiter.api.Assertions.assertTrue;

    public class PseudoTest {

    private static final Logger log = LoggerFactory.getLogger(PseudoTest.class);

    @BeforeAll

    static void loadCtx() {

    log.info("Loading general test context.");

    }

    @BeforeEach

    void setUp(){

    log.info("Prepare  single test context.");

    }

    @Test

    @DisplayName("test one")

    void testOne() {

    log.info("Executing test one.");

    assertTrue(true);

    }

    @Test

    @DisplayName("test two")

    void testTwo() {

    log.info("Executing test two.");

    assertFalse(false);

    }

    @AfterEach

    void tearDown(){

    log.info("Destroy  single test context.");

    }

    @AfterAll

    static void unloadCtx(){

    log.info("UnLoading general test context.");

    }

    }

    Listing 9-31

    PseudoTest Class Using JUnit Annotations

    ```


    Keeping in mind the information that you now have about these annotations, you
    should be able to infer the order of the log messages, because by default, JUnit
    Jupiter tests are run sequentially in a single thread. So when running the class,
    you could see output something like this:


    ```

    INFO  c.a.b.n.PseudoTest - Loading general test context.

    INFO  c.a.b.n.PseudoTest - Prepare  single test context.

    INFO  c.a.b.n.PseudoTest - Executing test one.

    INFO  c.a.b.n.PseudoTest - Destroy  single test context.

    INFO  c.a.b.n.PseudoTest - Prepare  single test context.

    INFO  c.a.b.n.PseudoTest - Executing test two.

    INFO  c.a.b.n.PseudoTest - Destroy  single test context.

    INFO  c.a.b.n.PseudoTest - UnLoading general test context.

    ```


    Enabling parallel execution of tests is possible by adding a file named `junit-platform.properties`
    under `test\resources` that contains the following properties:


    ```

    junit.jupiter.execution.parallel.enabled = true

    junit.jupiter.execution.parallel.mode.default = concurrent

    junit.jupiter.execution.parallel.mode.classes.default = same_thread

    ```


    Notice the `junit.jupiter.execution.parallel.enabled` property is set to `true`.
    The previous set of properties represents the configuration parameters to execute
    top-level classes sequentially but their methods in parallel. More configuration
    examples are provided in the official JUnit documentation.


    Note


    Parallel execution might lead to test failures if your test suite was designed
    with an order for the test methods executions in mind.


    Maven runs all tests in a project as part of the build when executing `mvn test`,
    and there are options to run test classes separately. Most Java smart editors
    like IntelliJ IDEA provide you with an option to run tests too; you can run entire
    classes, run just one method, run a specific package, or even run in debug mode
    and use breakpoints. Figure [9-15](#463938_3_En_9_Chapter.xhtml#Fig15) shows the
    menu option to run a test class in IntelliJ IDEA, accessed by right-clicking the
    `PseudoTest` class to open the context menu.


    ![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig15_HTML.jpg)


    Figure 9-15


    IntelliJ IDEA menu for running unit tests


    After selecting **Run ''PseudoTest''**, the test class is executed. A launcher
    is created so that you can launch it from the typical launch menu as well. Test
    classes can be executed in debug mode, and breakpoints can be used too. When executing
    the `PseudoTest` class, even if the test methods are run in parallel, the output
    is consistent with the order of the methods matching the annotation specifications
    mentioned previously. To make sure that test methods are executed in parallel,
    the logger is configured to print the thread id as well. Sample output is depicted
    in Listing [9-32](#463938_3_En_9_Chapter.xhtml#PC52).


    ```

    [1-worker-1] INFO  c.a.b.n.PseudoTest - Loading general test context.

    [1-worker-3] INFO  c.a.b.n.PseudoTest - Prepare  single test context.

    [1-worker-2] INFO  c.a.b.n.PseudoTest - Prepare  single test context.

    [1-worker-2] INFO  c.a.b.n.PseudoTest - Executing test one.

    [1-worker-3] INFO  c.a.b.n.PseudoTest - Executing test two.

    [1-worker-2] INFO  c.a.b.n.PseudoTest - Destroy  single test context.

    [1-worker-3] INFO  c.a.b.n.PseudoTest - Destroy  single test context.

    [1-worker-1] INFO  c.a.b.n.PseudoTest - UnLoading general test context.

    Listing 9-32

    Output of the Execution of PseudoTest

    ```


    The `testOne()` method in Listing [9-31](#463938_3_En_9_Chapter.xhtml#PC49) contains
    the statement `assertTrue(true);`, which is included to show you how assertion
    methods look like. The `true` value is replaced with a condition in a real test.
    The same goes for the `assertFalse(false);` assertion in method `textTwo()`.


    That’s about all the space we can dedicate to JUnit in this book. My recommendation
    is to look more into it, because a developer can write code, but a good developer
    knows how to make sure it works as well.'
  raw: '### Introducing JUnit


    JUnit is undoubtedly the most-used testing framework in the Java development world.
    At the end of 2017, JUnit 5^([^(80)](#fn80)) was released, which is the next generation
    of this framework. It comes with a new engine, is compatible with Java 9+, and
    includes a lot of lambda-based functionalities. JUnit 5 provides annotations to
    mark test methods for automated execution, annotations for initialization and
    destruction of a test context, and utility methods to practically implement test
    methods. There are multiple JUnit 5 annotations that you can use^([^(81)](#fn81)),
    but five of them and a utility class represent the core of the JUnit framework,
    and this is the best place to start to learn testing. The following list describes
    each of the five Junit 5 annotations (all of which are from package `org.junit.jupiter.api`)
    and the utility class, to build a general picture of how JUnit can be used to
    test your application:


    *   `@BeforeAll` is used on a nonprivate static method that returns `void` which
    is used to initialize objects and variables to be used by all test methods in
    the current class. This method will be called only once, before all test methods
    in the class, so test methods should not modify these objects because their state
    is shared, and modification might affect the test results. Eventually, the static
    fields to be initialized by the annotated method can be declared `final`, so once
    initialized, they can no longer be changed. More than one method annotated with
    `@BeforeAll` can be declared in a test class, but what would be the point?


    *   `@AfterAll` is the counterpart of `@BeforeAll`. It is also used to annotate
    nonprivate static methods that return `void`, and their purpose is to destroy
    the context the test methods were run in and perform cleanup actions.


    *   `@BeforeEach` is used on nonprivate, nonstatic methods that return `void`,
    and methods annotated with it are executed before every method annotated with
    `@Test`. These methods can be used to further customize the test context, to populate
    objects with values that will be used to test assertions in the test methods.


    *   `@AfterEach` is used on nonprivate, nonstatic methods that return `void`,
    and methods annotated with it are executed after every method annotated with `@Test`.


    *   `@Test` is used on nonprivate, nonstatic methods that return `void`, and the
    method annotated with it is a test method. A test class can have one or more test
    methods, depending on the class that is being tested.


    *   Utility class `org.junit.jupiter.api.Assertions` provides a set of methods
    that support asserting conditions in tests.


    Another noteworthy annotation is `@DisplayName`, which is declared in the same
    package as all the others and is used to name the test in a more pleasant way.
    The test name is displayed by the IDE and in the resulting reports created by
    the build tool.


    The `PseudoTest` class, shown in Listing [9-31](#463938_3_En_9_Chapter.xhtml#PC49),
    is a simple test class that shows the effect of the annotations introduced so
    far.


    ```

    package com.apress.bgn.nine;

    // some import statements omitted

    import org.junit.jupiter.api.*;

    import static org.junit.jupiter.api.Assertions.assertFalse;

    import static org.junit.jupiter.api.Assertions.assertTrue;

    public class PseudoTest {

    private static final Logger log = LoggerFactory.getLogger(PseudoTest.class);

    @BeforeAll

    static void loadCtx() {

    log.info("Loading general test context.");

    }

    @BeforeEach

    void setUp(){

    log.info("Prepare  single test context.");

    }

    @Test

    @DisplayName("test one")

    void testOne() {

    log.info("Executing test one.");

    assertTrue(true);

    }

    @Test

    @DisplayName("test two")

    void testTwo() {

    log.info("Executing test two.");

    assertFalse(false);

    }

    @AfterEach

    void tearDown(){

    log.info("Destroy  single test context.");

    }

    @AfterAll

    static void unloadCtx(){

    log.info("UnLoading general test context.");

    }

    }

    Listing 9-31

    PseudoTest Class Using JUnit Annotations

    ```


    Keeping in mind the information that you now have about these annotations, you
    should be able to infer the order of the log messages, because by default, JUnit
    Jupiter tests are run sequentially in a single thread. So when running the class,
    you could see output something like this:


    ```

    INFO  c.a.b.n.PseudoTest - Loading general test context.

    INFO  c.a.b.n.PseudoTest - Prepare  single test context.

    INFO  c.a.b.n.PseudoTest - Executing test one.

    INFO  c.a.b.n.PseudoTest - Destroy  single test context.

    INFO  c.a.b.n.PseudoTest - Prepare  single test context.

    INFO  c.a.b.n.PseudoTest - Executing test two.

    INFO  c.a.b.n.PseudoTest - Destroy  single test context.

    INFO  c.a.b.n.PseudoTest - UnLoading general test context.

    ```


    Enabling parallel execution of tests is possible by adding a file named `junit-platform.properties`
    under `test\resources` that contains the following properties:


    ```

    junit.jupiter.execution.parallel.enabled = true

    junit.jupiter.execution.parallel.mode.default = concurrent

    junit.jupiter.execution.parallel.mode.classes.default = same_thread

    ```


    Notice the `junit.jupiter.execution.parallel.enabled` property is set to `true`.
    The previous set of properties represents the configuration parameters to execute
    top-level classes sequentially but their methods in parallel. More configuration
    examples are provided in the official JUnit documentation.


    Note


    Parallel execution might lead to test failures if your test suite was designed
    with an order for the test methods executions in mind.


    Maven runs all tests in a project as part of the build when executing `mvn test`,
    and there are options to run test classes separately. Most Java smart editors
    like IntelliJ IDEA provide you with an option to run tests too; you can run entire
    classes, run just one method, run a specific package, or even run in debug mode
    and use breakpoints. Figure [9-15](#463938_3_En_9_Chapter.xhtml#Fig15) shows the
    menu option to run a test class in IntelliJ IDEA, accessed by right-clicking the
    `PseudoTest` class to open the context menu.


    ![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig15_HTML.jpg)


    Figure 9-15


    IntelliJ IDEA menu for running unit tests


    After selecting **Run ''PseudoTest''**, the test class is executed. A launcher
    is created so that you can launch it from the typical launch menu as well. Test
    classes can be executed in debug mode, and breakpoints can be used too. When executing
    the `PseudoTest` class, even if the test methods are run in parallel, the output
    is consistent with the order of the methods matching the annotation specifications
    mentioned previously. To make sure that test methods are executed in parallel,
    the logger is configured to print the thread id as well. Sample output is depicted
    in Listing [9-32](#463938_3_En_9_Chapter.xhtml#PC52).


    ```

    [1-worker-1] INFO  c.a.b.n.PseudoTest - Loading general test context.

    [1-worker-3] INFO  c.a.b.n.PseudoTest - Prepare  single test context.

    [1-worker-2] INFO  c.a.b.n.PseudoTest - Prepare  single test context.

    [1-worker-2] INFO  c.a.b.n.PseudoTest - Executing test one.

    [1-worker-3] INFO  c.a.b.n.PseudoTest - Executing test two.

    [1-worker-2] INFO  c.a.b.n.PseudoTest - Destroy  single test context.

    [1-worker-3] INFO  c.a.b.n.PseudoTest - Destroy  single test context.

    [1-worker-1] INFO  c.a.b.n.PseudoTest - UnLoading general test context.

    Listing 9-32

    Output of the Execution of PseudoTest

    ```


    The `testOne()` method in Listing [9-31](#463938_3_En_9_Chapter.xhtml#PC49) contains
    the statement `assertTrue(true);`, which is included to show you how assertion
    methods look like. The `true` value is replaced with a condition in a real test.
    The same goes for the `assertFalse(false);` assertion in method `textTwo()`.


    That’s about all the space we can dedicate to JUnit in this book. My recommendation
    is to look more into it, because a developer can write code, but a good developer
    knows how to make sure it works as well.'
