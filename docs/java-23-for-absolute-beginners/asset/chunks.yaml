- fmt: '### Logical Operators


    When designing conditions for controlling the flow of the execution of a program,
    sometimes there is need to write complex conditions—composed conditions constructed
    from multiple expressions. There are four operators that can be used to construct
    complex conditions. Two of them are bitwise operations that can be reused `&(AND)`
    and `|(OR)`, but they require evaluation of all the parts of the condition. The
    other operators `&&(AND)` and `||(OR)` have the exact effect as the previously
    mentioned ones, but the difference is they do not require evaluation of all the
    expression, which is why they are also called *shortcut operators*. To explain
    the behavior of these operators, we’ll use a typical example.


    In Listing [6-34](#463938_3_En_6_Chapter.xhtml#PC47) we declare a list of ten
    terms (some of them `null`) and a method to generate a random index, used to select
    an item from the list. Then we test the selected element from the list to see
    if it is not `null` and equal to an expected value. If both conditions are true,
    then a message is printed in the console.


    ```

    package com.apress.bgn.six;

    import java.util.ArrayList;

    import java.util.List;

    import java.util.Random;

    import static java.lang.System.out;

    public class LogicalOperatorsDemo {

    static List terms = new ArrayList() {{

    add("Rose");

    add(null);

    add("River");

    add("Clara");

    add("Vastra");

    add("Psi");

    add("Cas");

    add(null);

    add("Nardhole");

    add("Strax");

    }};

    void main() {

    for (int i = 0; i < 20; ++i) {

    int index = getRandomIndex(terms.size());

    String term = terms.get(index);

    out.println("Generated index: " + index);

    if (term != null & term.equals("Rose")) {

    out.println("Rose was found");

    }

    }

    }

    private static int getRandomIndex(int listSize) {

    var r = new Random();

    return r.nextInt(listSize);

    }

    }

    Listing 6-34

    Testing the & Operator to Control the Execution Flow

    ```


    To make sure we get the expected result, we repeat the operation of selecting
    a random element from the list 20 times. As you can probably notice in the marked
    line, the bitwise `&` is used to compose the two expressions. You would expect
    the text *Rose was found* to be printed in the console only if the value of the
    `term` variable is not `null` and is equal to `Rose`. But when the preceding code
    is run, this gets printed:


    ```

    Exception in thread "main" java.lang.NullPointerException: Cannot invoke "String.equals(Object)"
    because "term" is null

    at chapter.six@3.0-SNAPSHOT/com.apress.bgn.six.LogicalOperatorsDemo.main(LogicalOperatorsDemo.java:65)

    ```


    This is because both expressions are evaluated. But think about it! If the `term`
    variable is `null`, should we even evaluate its equality to `Rose`, especially
    since calling a method on a `null` object causes a runtime error? Obviously not,
    which is why the `&` operator is not suitable for this case. If the `term` variable
    is `null`, it fails the first condition and there is no point in evaluating the
    second, so enter the `&&` shortcut operator, which does exactly this. This works
    because when using the logical `AND` operator, if the first expression is evaluated
    to `false`, it does not really matter what the second expression is evaluated
    to—the result will always be `false`. So, we can correct previous code sample
    as shown in Listing [6-35](#463938_3_En_6_Chapter.xhtml#PC49).


    ```

    package com.apress.bgn.six;

    // imports omitted

    public class LogicalOperatorsDemo {

    static List terms = new ArrayList() {{ /* list elements omitted*/ }};

    void main() {

    for (int i = 0; i < 20; ++i) {

    int index = getRandomIndex(terms.size());

    String term = terms.get(index);

    out.println("Generated index: " + index);

    if (term != null && term.equals("Rose")) {

    out.println("Rose was found");

    }

    }

    }

    // getRandomIndex method omitted

    }

    Listing 6-35

    Testing the && Operator to Control the Execution Flow

    ```


    When the code is executed, no exception will be thrown, because if the `term`
    variable is `null`, the second expression is not evaluated. Thus, this code is
    technically more efficient because it evaluates fewer conditions, but it is also
    designed better because it avoids failures.


    Now let’s modify the code sample in Listing [6-35](#463938_3_En_6_Chapter.xhtml#PC49)
    to print a message if we find a `null` or if we find `Rose`. For this an OR operator
    is needed, so we’ll try first to use the bitwise version, as shown in Listing
    [6-36](#463938_3_En_6_Chapter.xhtml#PC50).


    ```

    for (int i = 0; i < 20; ++i) {

    int index = getRandomIndex(terms.size());

    String term = terms.get(index);

    out.println("Generated index: " + index);

    if (term == null | term.equals("Rose")) {

    out.println("null or Rose was found");

    }

    }

    Listing 6-36

    Testing the | Operator to Control the Execution Flow

    ```


    If we run the code in Listing [6-36](#463938_3_En_6_Chapter.xhtml#PC50), a `NullPointerException`
    will be thrown when the random index happens to match the index of a `null` element
    in the list. This is because the `|` operator requires both expressions to be
    evaluated, so if `term` is `null`, calling `term.equals(..)` will cause the exception
    to be thrown.


    To make sure the code works as expected, the `|` operator must be replaced with
    `||`, which shortcuts the condition and does not evaluate the second expression
    in it, except if the evaluation result of the first condition is `false`. This
    works because when using the logical OR operator, if the first expression evaluates
    to `true`, it does not really matter what the second expression evaluates to:
    the result will always be `true`. I’ll leave this as an exercise for you.


    Conditions can be made up from more than one expression and more than one operator,
    whether it is `&&` or `||`. The code in Listing [6-37](#463938_3_En_6_Chapter.xhtml#PC51)
    depicts a few complex conditions.


    ```

    package com.apress.bgn.six;

    // imports omitted

    public class ComplexConditionsDemo {

    static List terms = new ArrayList() {{ /* list elements omitted*/ }};

    void main(){

    for (int i = 0; i < 20; ++i) {

    int index = getRandomIndex(terms.size());

    String term = terms.get(index);

    out.println("Generated index: " + index);

    if (term != null && (term.equals("Rose") || term.equals("Clara"))) {

    out.println("Rose or Clara was found");

    }

    if (term == null || term.equals("Nardhole")) {

    out.println("null or Nardhole was found");

    }

    if (rnd > 3 && rnd < 7) {

    out.println("rnd: " + rnd + " is between 3 and 7");

    }

    if (rnd < 3 || rnd > 7) {

    out.println("rnd: " + rnd + " is not between 3 and 7");

    }

    if (!(rnd > 0)) {

    out.println("rnd: " + rnd + " is not positive");

    }

    if (rnd > 0) {

    out.println("rnd: " + rnd + " is positive");

    }

    if (rnd > 3 && rnd < 7 || rnd > 0) {

    out.println("rnd}: this works too...");

    }

    }

    }

    }

    Listing 6-37

    Testing the || Operator to Control the Execution Flow

    ```


    Beware of conditions that become too complex; make sure you cover that piece of
    code with a lot of tests. When writing complex conditions, it is possible that
    some expressions become redundant, and IntelliJ IDEA and other smart editors display
    warnings of dead code on expressions that are redundant and unused to help the
    developer improve the design of the code.


    ### Shift Operators


    The *shift operators* are operators working at the bit level. Because moving bits
    around is a sensitive operation, the requirement of these operands is for arguments
    to be integers. The operand to the left of the operator is the number that will
    be shifted, and the operand to the right of the operator is the number of bits
    that will be shifted.


    There are three shift operators in Java, and each of them can be composed with
    the assignment operator to do the shifting and assign the result to the original
    variable on the spot. This section analyzes all shift operators with simple examples
    and images to make them clear.'
