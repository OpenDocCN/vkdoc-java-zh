    much anymore. As the focus nowadays is on mobile and web applications, we’ll end
    this section here. If you ever need to create or maintain a Swing application,
    Oracle provides quite an extensive tutorial, with a lot of examples, that you
    can directly copy and paste and adapt to your necessities^([^(91)](#fn91)).'
