    然而，在介绍模块之前，你需要了解访问修饰符。Java 类型及其成员在包内以特定的访问权限进行声明，这是开始编码前必须理解的重要内容。


    ### 访问修饰符


    在 Java 中声明一个类型时——我们暂时只讨论 `class`，因为到目前为止这是唯一提到的类型——你可以使用**访问修饰符**来配置其作用域。


    访问修饰符可用于指定对类的访问权限，在这种情况下，我们称它们用于顶层。它们也可用于指定对类成员的访问权限，在这种情况下，它们用于成员级别（我们暂时不讨论*嵌套类*，本章后面会讲到）。


    在顶层，只能使用两种访问修饰符：public 和无修饰符。声明为 `public` 的顶层类必须定义在与其同名的 Java 文件中。清单 3-3 展示了一个名为
    `Base` 的类，它定义在位于包 `com.apress.bgn.zero` 的 `Base.java` 文件中。


    ```

    package com.apress.bgn.zero;

    // 顶层访问修饰符

    public class Base {

    // 代码省略

    }

    清单 3-3

    Base 类

    ```


    类的具体内容暂未展示，并用 `// 代码省略` 注释代替，以免分散你的注意力。公有类对应用程序中任何位置的所有类都是可见的。因此，不同包中的不同类可以创建此类型的对象，如清单
    3-4 所示。


    ```

    package com.apress.bgn.three;

    import com.apress.bgn.zero.Base;

    public class Main {

    public static void main(String... args) {

    // 创建 Base 类型的对象

    Base base = new Base();

    }

    }

    清单 3-4

    使用 Base 类创建对象

    ```


    `Base base = new Base();` 这一行就是创建对象的地方。`new` 关键字代表一种称为类**实例化**的操作，这意味着根据描述 `Base`
    类的代码所定义的规范创建了一个对象。


    重要提示


    类是一个模板。对象是使用这个模板创建的，被称为**实例**。


    目前，请先记住这个论断：公有类对所有类在任何位置都是可见的。


    当没有显式指定访问修饰符时，我们称该类被声明为**默认**或**包级私有**。我知道用两种方式描述缺少访问修饰符的情况似乎令人困惑，但因为你可能会阅读其他书籍或博客文章提到这种情况，所以最好在这里列出所有可能性。这意味着如果一个类没有访问修饰符，那么只有同一个包中定义的类才能使用该类创建对象。它的作用域仅限于其定义的包。没有访问修饰符的类可以定义在任何
    Java 文件中，并且文件名不必与类名一致。


    重要提示


    当同一个文件中声明了多个类时，公有类必须与定义它的文件同名，因此这个类就是命名该文件的类。


    为了测试这一点，让我们在之前引入的 `Base.java` 文件中添加一个名为 `HiddenBase` 的类，如清单 3-5 所示。


    ```

    package com.apress.bgn.zero;

    public class Base {

    // 代码省略

    }

    class HiddenBase {

    // 你看不到我

    }

    清单 3-5

    没有访问修饰符的类

    ```


    注意，`Base` 类声明在 `com.apress.bgn.zero` 包中。如果我们尝试在包 `com.apress.bgn.three`（注意，这是不同的包）中声明的类里创建
    `HiddenBase` 类型的对象，IDE 会通过将文本标红并拒绝提供任何代码补全来发出警告。此外，还会打开一个列出当前文件问题的选项卡，并显示一条非常明显的错误消息，如图
    3-6 所示。


    ![](img/463938_3_En_3_Fig6_HTML.jpg)


    图 3-6


    没有访问修饰符的 Java 类错误


    重要提示


    目前，也请记住这个论断：没有访问修饰符的类对同一个包中的所有类（以及其他类型）都是可见的。

