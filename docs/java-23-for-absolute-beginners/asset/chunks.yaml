    `javafx.util.Callback` 接口是一个实用的工具接口，可在某个操作后需要回调时使用。在此例中，当一个 `String` 值被添加到 `ComboBox<T>`
    节点的 `ListView` 中时（`ListView` 顾名思义是 `ComboBox<T>` 的视觉外观类型，用于显示水平或垂直的项目列表），会创建一个单元格，并在其中插入一些逻辑，根据其值来决定单元格中文本的颜色。


    在 `ListCell<T>` 声明内部，有一段看起来不太协调的代码块：


    ```

    {

    super.setPrefWidth(200);

    }

    ```


    上面的代码块是一种在匿名类声明内部调用父类方法的有趣方式。此处调用 `setPrefWidth(200)` 方法是为了确保所有 `ListCell<T>`
    实例具有相同的大小。`updateItem(..)` 方法中的逻辑非常明显，因此无需过多解释。添加单元格工厂后的结果如图 10-9 所示。


