    \ to a new stream is depicted in the debugger also and in Figure [8-7](#463938_3_En_8_Chapter.xhtml#Fig7).\n\
    \n![](images/463938_3_En_8_Chapter/463938_3_En_8_Fig7_HTML.jpg)\n\nFigure 8-7\n\
    \nThe `sorted()` operation in the IntelliJ IDEA Java Stream Debugger\n\nAfter\
