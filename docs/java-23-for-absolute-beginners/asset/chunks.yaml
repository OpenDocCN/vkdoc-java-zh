    for (int i = 0; i < 3; ++i) {

    HERE: for (int j = 0; j < 3; ++j) {

    for (int k = 0; k < 3; ++k) {

    if (k == 1) {

    continue HERE;

    }

    out.println("(i, j, k) = (" +i + ", " + j + ", " + k +")");

    }

    }

    }

    }

    }

