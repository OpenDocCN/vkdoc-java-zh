    除了 CLI，Java 18 还引入了一组新的 API 点用于服务器创建和定制，它们都归入 `jdk.httpserver` 模块。下一节将展示如何从 Java
    应用程序配置和启动服务器。


    #### 使用 **SimpleFileServer**


    构成服务器创建和定制新 API 点的所有组件都归入 [`com.sun.net`](http://com.sun.net)`.httpserver` 包。新类
    `SimpleFileServer` 通过三个静态方法提供服务器的关键组件：


    *   `createFileServer(InetSocketAddress addr, Path rootDirectory, OutputLevel
    outputLevel)`：创建一个绑定到给定地址、从给定路径提供文件，并根据指定日志级别记录请求详细信息的文件服务器。


    *   `createFileHandler(Path rootDirectory)`：创建一个文件处理器，用于从给定目录路径（及其子目录）提供文件。文件处理器是
    `HttpHandler` 的一个实例，被调用来处理 HTTP 交换。文件处理器用作 `HttpServer#create(..)` 方法的参数，以配置要启动的服务器。


    *   `createOutputFilter(OutputStream out, OutputLevel outputLevel)`：创建一个后处理 `Filter`，用于打印有关交换的日志消息。


    通过调用 `createFileServer(..)` 方法，可以创建一个简单的内存 Web 服务器。返回实例的类型是 `HttpServerImpl`，它扩展了
    `HttpServer` 抽象类。该类实现了一个简单的 HTTP 服务器。一个 `HttpServer` 绑定到一个 IP 地址和端口号，并在此地址上监听来自客户端的传入
    TCP 连接。代码清单 10-27 中的代码描述了创建一个内存服务器，该服务器提供 `using-simplewebserver/src/main/resources`
    目录的内容。


    ```

    package com.apress.bgn.ten;

    import com.sun.net.httpserver.SimpleFileServer;

    import java.io.File;

    import java.io.IOException;

    import java.net.InetAddress;

    import java.net.InetSocketAddress;

    import java.nio.file.Path;

    import static java.lang.System.in;

    import static java.lang.System.out;

    public class MostSimpleServer {

    public static final InetSocketAddress SERVER_ADDR =

    new InetSocketAddress(InetAddress.getLoopbackAddress(), 8080);

    private static final String SERVER_DATA = "using-simplewebserver/";

    void main() throws IOException {

    var serverDataLocation = new File(SERVER_DATA);

    var server = SimpleFileServer.createFileServer(SERVER_ADDR,

    Path.of(serverDataLocation.getAbsolutePath()),

    SimpleFileServer.OutputLevel.VERBOSE);

    server.start();

    out.println("按任意键退出！");

    in.read();

    server.stop(2);

    }

    }

    代码清单 10-27

    使用 SimpleFileServer.createFileServer(..) 配置简单 Web 服务器

    ```


    为了保持服务器运行，添加了一个 `System.in.read()` 调用来等待用户输入后再停止它。当在浏览器中访问 `http://127.0.0.1:8080/`
    时，会列出 `using-simplewebserver` 目录的内容。因此，使用 Java 代码，我们配置并创建了一个简单的 Web 服务器，该服务器本可以通过
    CLI 运行 `jwebserver -p 8080 -d using-simplewebserver` 来创建。


