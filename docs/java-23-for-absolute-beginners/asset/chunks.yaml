- fmt: '# Java Integer Primitive Types


    The following list contains the integer primitive types and their boundaries:


    - `byte` is used to represent numbers between –2^7 and 2^7 – 1 inclusive ([–128,
    127]). The default value for a `byte` field is 0 and is represented on 8 bits.

    - `short` is used to represent numbers between –2^15 and 2^15 – 1 inclusive ([–32768,
    32767]). The interval for this type is a superset of the `byte` interval, thus
    a `byte` value can be safely assigned to a `short` variable without the need for
    an explicit conversion. This applies to all types that have the interval a superset
    of the `byte` interval type. In the next code snippet, a `byte` value is assigned
    to a `short` variable, the code compiles, and when executed prints 23. The default
    value for a `short` field is 0 and is represented on 16 bits.


    ```

    byte bv = 23;

    short sbv = bv;

    System.out.println("byte to short: " + sbv);

    ```


    - `int` is used to represent integer numbers between –2^31 and 2^31 – 1 inclusive
    ([–2147483648, 2147483647]). The default value for an `int` field is 0 and is
    represented on 32 bits.

    - `long` is used to represent integer numbers between –2^63 and 2^63 – 1 inclusive
    ([–9223372036854775808, 9223372036854775807]). The default value for a `long`
    field is 0 and is represented on 64 bits.


    **Important**


    In practice, sometimes the need to work with integer numbers outside the interval
    `long` appears. For these situations, there is a special class (yes, a class,
    not a primitive type) in Java named `BigInteger` that allocates just as much memory
    as is needed to store a number of any size. Operations with `BigInteger` might
    be slow, but this is the trade-off to work with huge numbers.


    # Java Real Primitive Types


    When it comes to arithmetic, aside from integer numbers we also have real numbers,
    which are quite useful because most prices and most arithmetic operations executed
    by programs do not result in integer numbers. Real numbers contain a decimal point
    and decimals after it. To represent real numbers in Java, two primitive types
    are defined, called floating-point types: `float` and `double`.


    - `float` is used to represent single-precision, 32-bit format IEEE 754 values
    as specified in IEEE Standard for Binary Floating-Point Arithmetic. The default
    value is 0.0. A floating-point variable can represent a wider range of numbers
    than a fixed-point variable of the same bit width, but at the cost of precision.
    Values of type `int` or `long` can be assigned to variables of type `float`. What
    is actually happening, and why the loss of precision? A number is represented
    as a floating-point number and an exponent, which is actually a power of 10. So
    when the floating-point number is multiplied by 10 at this exponent power, the
    initial number should result. Let’s take the maximum `long` value and assign it
    to a `float` variable and check what is printed:


    ```

    float maxLongF = Long.MAX_VALUE;

    System.out.println("max long= " + Long.MAX_VALUE);

    System.out.println("float max long= " + maxLongF);

    ```


    `Long.MAX_VALUE` is a final static variable that has the maximum `long` value
    assigned to it: 9223372036854775807. The preceding code will print the following:


    ```

    max long= 9223372036854775807

    float max long= 9.223372E18

    ```


    As you can see, the `maxLongF` number should be equal to 9223372036854775807,
    but because it is represented as a smaller number and a power of 10, precision
    is lost. If we were to reconstruct the integer number by multiplying 9.223372
    by 10^18, the result would be 9223372000000000000. It’s close, but not close enough.
    So what are the interval edges for `float`? `float` is used to represent real
    numbers between 1.4E^–45 and 2^128 × 10^38.


    - `double` is used to represent single-precision, 64-bit format IEEE 754 values
    as specified in IEEE Standard for Binary Floating-Point Arithmetic and is used
    to represent numbers between 4.9E^–324 and 2^127 × 10^308. The default value is
    0.0.


    **Important**


    Values `0` and `0.0` (`double`) are different in Java. To a normal user, they
    both mean zero, but in mathematics, the one with the decimal point is more precise.
    Still, in Java we are allowed to compare an `int` value to a `float` value, and
    if we compare `0` and `0.0`, the result will be that they are equal. Also, positive
    zero and negative zero are considered equal; thus the result of the comparison
    `0.0 == -0.0` is true.


    Developers cannot define a primitive type, neither by defining it from scratch
    nor by extending an existing primitive type. Type names are reserved Java keywords
    that cannot be redefined by the developer. Java prohibits declaring fields, methods,
    or class names that are named as those types.


    As you have noticed until now, a variable that we intend to use must be declared
    first and used later. When it is declared, a value can be associated as well.
    For primitive values, a number can be written in many ways. In Listing [5-12](#463938_3_En_5_Chapter.xhtml#PC21)
    you can see a few samples of how numeric values can be written when variables
    are initialized or assigned afterward.'
