    # 12. 发布/订阅框架


    到目前为止，本书中解释的所有编程概念都涉及需要处理的数据。无论数据以何种形式提供，我们编写的Java程序都会获取这些数据，对其进行修改，并将结果输出到控制台、文件或其他软件组件。可以说，所有这些组件都在相互通信，并将处理后的数据从一个组件传递到另一个组件。例如，图[12-1](#463938_3_En_12_Chapter.xhtml#Fig1)抽象地描述了程序中Java组件之间的交互。


    ![](images/463938_3_En_12_Chapter/463938_3_En_12_Fig1_HTML.jpg)


    图12-1


    程序中Java组件之间的交互


    每个箭头都标有从一个组件传递到另一个组件的信息类型。在此图中，可以识别出一个起点，信息通过`Reader`读取进入程序，以及一个终点，信息由`Printer`打印到某个输出组件。可以说，`Reader`提供数据，`Filter`和`DocumentCreator`是某些内部处理器，处理数据，而`Printer`是数据的消费者。


    到目前为止所描述的内容类似于**点对点（P2P）消息传递模型**，该模型描述了一条消息发送给一个消费者的概念。P2P模型特定于一个名为Java消息服务（JMS）的Java
    API，该API支持网络中计算机之间的正式通信（称为消息传递）。图[12-1](#463938_3_En_12_Chapter.xhtml#Fig1)中描绘的示例表明，Java程序组件之间的通信工作方式类似。实现图[12-1](#463938_3_En_12_Chapter.xhtml#Fig1)所描述过程的解决方案设计，可以通过将所有组件链接到消息传递风格的通信模型中来创建。


    存在不止一种通信模型——生产者/消费者、发布/订阅和发送者/接收者——每种模型都有其特定之处，但本章重点介绍**发布/订阅**，因为这是响应式编程所基于的模型。


    注意


    如果您有兴趣了解更多关于其他通信模型的信息，请搜索Web上的企业集成模式。'
