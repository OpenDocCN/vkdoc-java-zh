    文档非常有价值，当它真正优秀时，能让开发变得实用且愉快。因此，在编写代码时，你应该像期望项目依赖项有文档那样去编写文档。你可能听说过 **RTFM** 这个说法，它是
    **Read The F%ing Manual!** 的缩写。在软件开发中，经验丰富的开发者经常用这个说法来对待新手开发者。问题是，如果没有手册该怎么办？大多数面临截止日期的公司可能倾向于分配很少甚至不分配时间来记录项目，因此本书加入这一节是为了强调良好文档在软件开发中的重要性，并教你如何在编写代码的同时编写文档，因为你之后可能没有时间再做这件事。


    ## 总结


    本章涵盖了重要的开发工具和技术，帮助你编写可用于生产的 Java 代码。阅读本章后，你应该对如何实现以下内容有了良好的基础理解：


    *   在 Java 应用程序中配置和使用日志记录

    *   在控制台中记录消息

    *   将消息记录到文件

    *   使用 Java 日志记录

    *   使用日志门面（并理解为何推荐使用它）

    *   配置并使用 SLF4J 与 Logback

    *   使用断言进行编程

    *   使用 IntelliJ IDEA 进行逐步调试

    *   在应用程序运行时，使用各种 JDK 工具（如 `jps`、`jcmd`、`jconsole` 和 `jmc`）监控和检查 JVM 统计信息

    *   使用 Process API 监控和创建进程

    *   使用 JUnit 测试应用程序

    *   使用假对象编写测试

    *   使用模拟对象编写测试

    *   使用桩对象编写测试

    *   编写 Javadoc 注释来记录 Java 应用程序，并使用 Maven 生成 HTML 格式的文档


