  trans: "\n## 安装 Java 集成开发环境\n\n根据我十多年的经验，我推荐的编辑器是 IntelliJ IDEA。它由一家名为 JetBrains\
    \ 的公司开发。你可以从其官方网站下载此 IDE^(³³)。旗舰版 30 天后过期；之后需要付费许可证。还有一个社区版可供使用，无需许可证。对于学习 Java\
    \ 的简单项目来说，这个版本就足够了。\n\n下载 IntelliJ IDEA 压缩包后，双击进行安装。之后，启动它并首先配置你的插件。点击 **插件**\
    \ 菜单项，窗口右侧应出现一个插件列表。查看 **已安装** 选项卡上的插件列表（如图 2-9 所示）。\n\n![](img/463938_3_En_2_Fig9_HTML.jpg)\n\
    \n图 2-9\n\nIntelliJ IDEA 社区版配置插件对话框窗口\n\n重要\n\nIntelliJ IDEA 默认启用了各种 Java 项目风格所需的插件。你可以修改该列表并禁用不需要的插件。这将减少\
    \ IntelliJ IDEA 运行所需的内存量。\n\nMaven 插件默认是启用的；Git 插件也是如此。这意味着你的 IDE 立即可用，这反过来意味着你需要获取本书的源代码。获取本书源代码有三种方式：\n\
    \n*   直接从 GitHub 下载压缩包。\n\n*   使用终端（或 Windows 下的 Git Bash Shell）通过以下命令克隆仓库：\n\n\
    ```\n    $ git clone https://github.com/Apress/java-23-for-absolute-beginners.git\n\
    \    ```\n\n*   使用 IntelliJ IDEA 克隆项目。\n\n当使用仓库的 HTTPS URL 时，从命令行或 IntelliJ IDEA\
    \ 克隆都不需要 GitHub 用户。图 2-10 展示了克隆本书 GitHub 项目所需的两个步骤。\n\n![](img/463938_3_En_2_Fig10_HTML.jpg)\n\
    \n图 2-10\n\nIntelliJ IDEA 社区版从版本控制系统克隆对话框窗口\n\n首次打开 IntelliJ IDEA 时，选择 **项目**\
    \ 菜单项，然后点击 **从版本控制系统获取** 按钮。出现一个新的对话框窗口，你可以在其中插入仓库 URL 以及源代码应复制到的位置。点击 **克隆**\
    \ 按钮后，项目将被复制，IntelliJ IDEA 将打开它并识别出它使用了 Maven。\n\n如果你使用命令行克隆了项目，可以通过 **打开** 按钮并选择克隆操作创建的目录，将其导入\
    \ IntelliJ IDEA。\n\n重要\n\nIntelliJ IDEA 有其内部的 Maven 捆绑包。如果你想告诉 IntelliJ IDEA 使用你的本地安装，只需打开\
    \ **偏好设置** 菜单项，转到 **构建、执行、部署** ➤ **构建工具** ➤ **Maven** 部分，然后选择外部的 Maven 安装目录。\n\
    \n![](img/463938_3_En_2_Fig11_HTML.jpg)\n\n图 2-11\n\nIntelliJ IDEA Maven 视图\n\n\
    预计编辑器底部会打开一个窗口，显示构建进度，如果源代码没问题，此过程应以消息 `BUILD SUCCESS` 结束。\n\n重要\n\n如果在 IntelliJ\
    \ IDEA 中构建失败，并且你想找出问题，第一步是在 IDE 外部运行构建。你可以在终端（或 Windows 上的命令提示符）中通过执行 `mvn clean\
    \ install` 来运行构建。如果构建在终端中通过，则源代码和你的设置是正确的，问题肯定出在编辑器配置上。\n\nMaven 构建遵循特定的生命周期，将\
    \ Java 项目从源代码转换为可执行或可部署到应用服务器的内容。阶段按特定顺序执行。使用 `mvn {phase}` 命令运行特定阶段会执行一系列称为 *目标*\
    \ 的步骤，每个步骤负责一个特定任务。\n\n之前推荐的 `mvn clean install` 命令会执行 `clean` 阶段（删除之前生成的字节码文件），然后执行\
    \ `install` 阶段（将 Java 文件编译成字节码，执行测试（如果有的话），将它们打包成 Java 归档文件（jar 文件），并将它们复制到本地\
    \ Maven 仓库）。如果你想了解更多关于 Maven 的信息，请查看官方网站，但就本书范围而言，一切都已为你简化，如**第** **3** **章**所述。\n\
