    The components of the template are explained in the following list:


    *   `[code_block]`: The code block to execute.


    *   `[exception_block]`: A declaration or more of an exception type for the instances
    that can be thrown by the `[code_block]`.


    *   `[handling_code_block]`: An exception being thrown marks an unexpected situation
    that must be handled. Once the exception is caught, this piece of code is executed
    to treat it, either by trying to return the system to a normal state or by logging
    details about the cause of the exception.


    *   `[cleanup_code_block]`: If needed, this block of code is used to release resources
    or set objects to `null` so that they are eligible for collection. When present,
    this block of code is executed regardless of whether an exception is thrown or
    not.


    Now that you know how a `try-catch-finally` statement works, you can probably
    imagine how to use it to control the execution flow. Within the `[code_block]`
    you can explicitly throw exceptions and decide how they are treated.


    Considering the array that we have been using until now, we’ll design our piece
    of code based on it again. Listing [7-50](#463938_3_En_7_Chapter.xhtml#PC53) shows
    a piece of code that throws an exception when an even value is found.


    ```

    package com.apress.bgn.seven.ex;

    import java.util.Arrays;

    import static java.lang.System.out;

    public class ExceptionFlowDemo {

    public static final int[] arr = {5, 1, 4, 2, 3};

    void main(){

    try {

    checkNotEven(arr);

    out.println("Not found, all good!");

    } catch (EvenException e) {

    out.println(e.getMessage());

    } finally {

    out.println("Cleaning up arr");

    Arrays.fill(arr, 0);

    }

    }

    public static int checkNotEven(int... arr) throws EvenException {

    for (int i = 0; i < arr.length; ++i) {

    if (arr[i] % 2 == 0) {

    throw new EvenException("Did not expect an even number at " + i);

    }

    }

    return -1;

    }

    }

    class EvenException extends Exception{

    public EvenException(String message) {

    super(message);

    }

    }

    // output

    //Did not expect an even number at 2

    //Cleaning up arr

    Listing 7-50

    Controlling Flow Using Exceptions

    ```


    The `EvenException` type is a custom exception type written for this specific
    example. Notice the output of this snippet. As you can see, by throwing an exception,
    we’ve directed the execution to the handling code, so *Not found, all good!* is
    not printed. Because there is a `finally` block that was executed as well, we
    get the *Cleaning up arr* message in the console too.


    You also can mix and match: use different types of exceptions and include multiple
    `catch` blocks—whatever you need to solve your problem. At a previous company
    I worked for we had a piece of code that validated a document and threw different
    types of exceptions depending on the validation check that failed, and in the
    `finally` block we had code that converted the error object to PDF. The code looked
    similar to that in Listing [7-51](#463938_3_En_7_Chapter.xhtml#PC54).


    ```

    ErrorContainter errorContainer = new ErrorContainter();

    try {

    validate(report);

    } catch (FileNotFoundException | NotParsable e) {

    errorContainer.addBadFileError(e);

    } catch (InvestmentMaxException e) {

    errorContainer.addInvestmentError(e);

    } catch (CreditIncompatibilityException e) {

    errorContainer.addIncompatibilityError(e);

    } finally {

    if (errorContainer.isEmpty()) {

    printValidationPassedDocument();

    } else {

    printValidationFailedDocument(errorContainer);

    }

    }

    Listing 7-51

    Code Sample Showing a try-catch-finally Block with Multiple catch Statements

    ```


    The code in the `finally` code block was complex and totally not recommended to
    be in there. However, sometimes in the real world, the solutions do not always
    respect best practices, or even commonsense practices. When dealing with legacy
    code, you might find yourself in the position of having to write functional but
    crappy code that solves the client’s problem—because sure, programming is awesome,
    but in the eyes of some managers, results are more important…quicker results even
    more so. If you are lucky enough to get a job at a company that is looking to
    build the code in the future or hand it to other team members, you might actually
    end up with a manager who favors best practices. Just remember to do your best
    and document everything properly, and you’ll be fine.


    `try-catch-finally` blocks are quite powerful. They are a useful construction
    for directing execution flow and printing useful information about the overall
    status of the application and the source of an eventual problem. When designed
    properly, exception handling can increase the quality and readability of your
    code. There are a few rules to follow when designing exception handling:


    ![](images/463938_3_En_7_Chapter/463938_3_En_7_Fig12_HTML.jpg)


    Figure 7-12


    IntelliJ IDEA compile error and message showing the wrong order of exception types
    in a `try-catch` block


    *   Try to avoid multiple `catch` blocks, unless they are used to treat different
    types of exceptions differently.


    *   Group together similar types of exceptions that are treated the same way by
    using the `|` (pipe) symbol. Support for this was added in Java 7.


    *   Be careful when catching exceptions with related types. The first `catch`
    statement that matches an exception type handles the exception, so superclasses
    should be lower in the `catch` list. The compiler will even get really upset if
    the order is not correct, as shown in Figure [7-12](#463938_3_En_7_Chapter.xhtml#Fig12).


    And of course, you should also respect the basic rules of avoiding exception swallowing
    and catching `Throwable` that were mentioned earlier in the book.


    ## Summary


    This chapter covered one of the most important aspects of development: how to
    design your solutions, and the logic of it. You’ve also been introduced to flowcharts
    and their components as tools for deciding how to write your code and how to control
    execution paths. And finally, you’ve learned which statements to use and when,
    and a few Java best practices for using them, so that you will be able to design
    the most suitable solutions to solve your problems. Java provides the following:


    *   Both simple and more complex ways to write `if` statements


    *   A `switch` statement that works with any primitive type, enumerations, and
    (starting with Java 7) `String` instances


    *   A `switch` expression that returns a value and that can be used to write more
    complex statements


    *   Use of pattern matching and record patterns in `switch` expressions and statements


    *   A few ways to write `for` statements


    *   Use of `forEach` methods and streams to traverse a collection of values


    *   A `while` statement, used when a step must be repeated until a condition is
    met


    *   A `do-while` statement, used when a step must be repeated until a condition
    is met, and the step is repeated at least once, because the continuation condition
    is evaluated after it


    *   Manipulation of loop behavior by using statements such as `break`, `continue`,
    and `return`


    *   Control of the execution flow by using `try-catch-finally` constructions'
