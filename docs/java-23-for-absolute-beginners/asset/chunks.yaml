    ### 导入部分


    在包声明之后，接下来是*导入部分*。该部分包含了文件中使用的所有类、接口和枚举的完全限定名。请查看清单 4-2 中的代码示例。


    ```

    package java.lang;

    import java.io.ObjectStreamField;

    import java.io.UnsupportedEncodingException;

    import java.lang.annotation.Native;

    import java.lang.invoke.MethodHandles;

    import java.lang.constant.Constable;

    import java.lang.constant.ConstantDesc;

    import java.nio.charset.Charset;

    import java.util.ArrayList;

    // 其余导入语句已省略

    public final class String

    implements java.io.Serializable, Comparable, CharSequence,

    Constable, ConstantDesc {

    private static final ObjectStreamField[] serialPersistentFields =

    new ObjectStreamField[0];

    // 其余代码已省略

    }

    清单 4-2

    来自 java.lang.String 类的代码片段

    ```


    这是官方 Java `String` 类的一个片段。每个导入语句都代表对某个包的引用，以及 `String` 类主体中使用的一个类的名称。


    特殊的导入语句也可用于导入静态变量和静态方法。JDK 包含一个用于数学运算的类。它包含静态变量和方法，开发者可以使用它们来实现解决数学问题的代码。你可以直接使用它的变量和方法，而无需创建此类型的对象，因为静态成员不属于某个类型的对象，而是属于类型本身。请查看清单
    4-3 中的代码。


    ```

    package com.apress.bgn.four;

    import static java.lang.Math.PI;

    import static java.lang.Math.sqrt;

    public class MathSample {

    public static void main(String... args) {

    System.out.println("PI value =" + PI);

    double result = sqrt(5.0);

    System.out.println("SQRT value =" + result);

    }

    }

    // 输出

    // PI value =3.141592653589793

    // SQRT value =2.23606797749979

    清单 4-3

    对 Math 类的成员使用静态导入

    ```


    通过将 `import` 和 `static` 组合使用，我们可以声明一个类的完全限定名，以及我们希望在代码中使用的方法或变量。这允许我们直接使用该变量或方法，而无需使用声明它的类名。如果没有静态导入，代码将不得不重写，如清单
    4-4 所示。


    ```

    package com.apress.bgn.four;

    import java.lang.Math;

    public class MathSample {

    public static void main(String... args) {

    System.out.println("PI value =" + Math.PI);

    double result = Math.sqrt(5.0);

    System.out.println("SQRT value =" + result);

    }

    }

    清单 4-4

    使用对 Math 类的导入

    ```


    重要


    完全限定名功能强大。包名在模块内是唯一的，但包名在应用程序内并不总是唯一的。类型名在应用程序内也不总是唯一的。但是，由两者组合而成的完全限定类型名在应用程序内是唯一的。


    提示


    你也可以将包视为家庭地址，将类型视为人。两个人可以有相同的地址，但不能有相同的名字。两个人可以有相同的名字，但住在不同的地址。例如，这就是银行和其他机构在英国或美国唯一识别个人的方式。


    完全限定名并不仅限于导入语句。当两个类型具有相同的名称，并且两者都用于声明第三个类型时，在类型主体内告诉编译器你打算使用哪个类型的唯一方法就是使用完全限定名。清单
    4-5 中展示了一个示例，其中来自 `com.apress.bgn.four.math` 包的 `Math` 类被用在一个也使用了 `java.lang.Math`
    类成员的类主体中。


    ```

    package com.apress.bgn.four.math;

    import java.lang.Math;

    public class Sample {

    public static void main(String... args) {

    System.out.println("PI value =" + Math.PI);

    System.out.println("My PI value= " + com.apress.bgn.four.math.Math.PI);

    }

    }

    // 输出

    // PI value =3.141592653589793

    // My PI value= 3.14

    清单 4-5

    使用 com.apress.bgn.four.math.Math 类的成员

    ```


    当从同一个包中使用多个类型时，类型名可以用星号（`*`）代替，这意味着该包中任何可见的类型都可以在正在编写的类型代码中使用。这被称为*紧凑导入语句*。当从同一个包中使用多个类来编写代码，或者从同一个类中使用多个静态变量和方法时，建议使用紧凑导入。如果不这样做，文件的导入部分会变得冗长且难以阅读。这时紧凑导入就能派上用场。紧凑导入意味着用通配符替换来自同一个包的所有类，或来自同一个类的所有变量和方法，这样只需要一条导入语句。它也适用于静态导入。因此，之前的
    `Sample` 类在清单 4-6 中变成了 `MathSample` 类。


    ```

    package com.apress.bgn.four;

    import static java.lang.Math.*;

    public class MathSample {

    public static void main(String... args) {

    System.out.println("PI value =" + PI);

    double result = sqrt(5.0);

    System.out.println("SQRT value =" + result);

    }

    }

    清单 4-6

    使用 java.lang.Math 类的成员

    ```

