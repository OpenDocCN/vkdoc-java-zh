- fmt: '# Oracle HotSpot JVM Architecture


    Over the years, some big companies have produced their own variations of the JVM
    (e.g., IBM), and now that Java is moving into the module age, with a rapid delivery
    style and a more expensive licensing model, more and more companies have decided
    to build their own version of the JVM (e.g., Azul, Amazon Corretto, GraalVM, and
    Eclipse OpenJ9)^([^(128)](#fn128)).


    Under the new licensing model, Java Support is paid as of January 2019, for all
    LTS versions after the two-year grace period, so companies will eventually have
    to pay for the JDK running their Java-based software. The official Oracle JDK
    can be used on personal computers by developers who are learning to code or building
    small projects. However, running the resulting software on a server, accessing
    enterprise features such as full-fledged JMC, and turning that software profitable
    requires a paid subscription.


    Currently, the Oracle’s HotSpot is still the most common JVM implementation being
    used by many applications. When it comes to garbage collection, this JVM provides
    a mature set of garbage collection options. An abstract representation of its
    architecture is depicted in Figure [13-1](#463938_3_En_13_Chapter.xhtml#Fig1).


    ![](images/463938_3_En_13_Chapter/463938_3_En_13_Fig1_HTML.jpg)


    Figure 13-1


    Oracle HotSpot JVM architecture (abstract representation)


    The `heap` memory area is managed by the garbage collector and is split into multiple
    zones. Objects are moved between these zones until being discarded. The zones
    depicted in Figure [13-2](#463938_3_En_13_Chapter.xhtml#Fig2) are for old-styles
    garbage collectors and the new style of garbage collector, which will probably
    follow the model of the current default garbage collector used by the JDK, the
    G1GC, that was introduced in JDK 8.


    ![](images/463938_3_En_13_Chapter/463938_3_En_13_Fig2_HTML.jpg)


    Figure 13-2


    The heap structure


    The `G1GC` is a next-generation garbage collector, designed for machines with
    a lot of resources, which is why its approach to the partitioning of the heap
    is different. It is the default GC since Java 9. Its heap is partitioned into
    a set of equal-sized heap regions, each a contiguous range of virtual memory.
    Certain region sets are assigned the same roles (eden, survivor, old) as in the
    older collectors, but there is not a fixed size for them. This provides greater
    flexibility in memory usage. You can read more about the different types of garbage
    collectors in the next section, but for now the focus will remain on the heap
    memory and its zones, which are named `generations`.


    When an application is running, objects created by it are stored in the `young
    generation area`. When an object is created, it starts its life in a subdivision
    of this generation named the `eden space`. When the eden space is filled, this
    triggers a `minor garbage collection (minor GC) run` that cleans up this area
    of unreferenced objects, and moves referenced objects to the `first survivor space
    (S0)`. The next time the eden space is filled, another minor GC run is triggered,
    which again deletes unreferenced objects, and referenced objects are moved to
    the `next survivor space (S1)`.


    The objects in S0 have been there for a minor GC run, so their age is incremented.
    They are moved to S1 as well, so S0 and the eden can be cleaned up.


    At the next minor GC run, the operation is performed again, but this time referenced
    objects are saved into the empty S0. The older objects from S1 have their age
    incremented and moved to S0 as well, so the S1 and eden can be cleaned up.


    After the objects in survivor space reach a certain age (value-specific to each
    type garbage collector), they are moved to `the old generation space` during minor
    GC runs.


    The previously described steps are depicted in Figure [13-3](#463938_3_En_13_Chapter.xhtml#Fig3),
    and the objects `o1` and `o2` are aged until they are moved to the old generation
    area.


    ![](images/463938_3_En_13_Chapter/463938_3_En_13_Fig3_HTML.jpg)


    Figure 13-3


    Minor GC runs on the young generation space


    Minor GC collections will happen until the old generation space is filled. That
    is when a `major garbage collection (major GC) run` is triggered, which will delete
    unreferenced objects and will compact the memory, moving objects around so that
    the empty memory left is one big compact space.


    `The minor garbage collection event` is a “stop the world” event. This process
    basically takes over the run of the application and pauses its execution, so it
    can free the memory. As the young generation space is quite small (as you will
    see this in the next section), the application pause is usually negligible. If
    no memory can be reclaimed from the young generation area after a minor GC run
    takes place, a major GC run is triggered.


    The `permanent generation` area is reserved for JVM metadata such as classes and
    methods. This area is cleaned too from time to time to remove classes that are
    no longer used in the application. The cleanup of this area is triggered when
    there are no more objects in the heap.


    The garbage collection process just described is specific to generational garbage
    collectors, such as the G1GC. Before JDK 8, garbage collection was done using
    an older garbage collector that used an algorithm called `Concurrent Mark Sweep`.
    This type of garbage collector ran in parallel with the application and marked
    used and unused zones of memory. Then it would delete unreferenced objects and
    would compact the memory into a contiguous zone, by moving objects around. This
    process was quite inefficient and time-consuming. As more and more objects were
    created, the garbage collection took more and more time to be performed, but as
    most objects are quite short-lived, this was not really a problem. So the CMS
    garbage collector was okay for a while.


    The G1GC has a similar approach, but after the marking phase is finished, G1 focuses
    on regions that are mostly empty to recover as much unused memory as possible.
    That is why this garbage collector is also named `Garbage First`. G1 also uses
    a pause prediction model to decide how many memory regions can be processed based
    on the pause time set for the application. Objects from the processed region are
    copied to a single region of the heap, thus realizing a memory compaction at the
    same time. Also, G1GC does not have a fixed size for the eden and survivor spaces;
    it decides their size after every minor GC run.'
