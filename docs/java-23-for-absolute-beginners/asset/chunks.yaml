    Figure 10-7 JavaFX window demo


    按钮和粉色矩形被添加到一个`StackPane`实例中，该实例以从后到前的堆叠方式布局其子节点。子节点的大小会被调整以填充`StackPane`实例，除非它们的大小已经固定，并且默认情况下它们居中。JavaFX支持以类似于Swing的方式在窗口中排列节点，但Java
    FX提供了几个支持多种不同布局样式的布局面板。在JavaFX中，相当于带有`BorderLayout`管理器的`JPanel`的内置布局名为`BorderPane`。`BorderPane`提供了五个区域来放置节点，其分布类似于`BorderLayout`，但名称不同。清单[10-18](#463938_3_En_10_Chapter.xhtml#PC26)展示了将按钮放置在底部区域右侧角落的代码。


    ```java

    package com.apress.bgn.ten;

    // other ''javafx'' import statements omitted

    import javafx.scene.layout.HBox;

    public class PannedJavaFxDemo extends Application {

    void main() {

    launch();

    }

    @Override

    public void start(Stage primaryStage) {

    primaryStage.setTitle("Java FX Demo Window!");

    var exitButton = new Button();

    exitButton.setText("Bye bye! ");

    exitButton.setOnAction(_ -> Platform.exit());

    var borderPane = new BorderPane();

    var box = new HBox();

    box.setPadding(new Insets(10, 12, 10, 12));

    box.setSpacing(10);

    box.setAlignment(Pos.BASELINE_RIGHT);

    box.setStyle("-fx-background-color: #85929e;");

    box.getChildren().add(exitButton);

    borderPane.setBottom(box);

    var root = new StackPane();

    root.getChildren().add(borderPane);

    primaryStage.setScene(new Scene(root, 500, 500));

    primaryStage.show();

    }

    }

    ```


    Listing 10-18 Simple JavaFX Application with a Properly Positioned Button


    运行`PannedJavaFxDemo`类会导致图[10-8](#463938_3_En_10_Chapter.xhtml#Fig8)所示的窗口弹出到屏幕上；该图已被修改以显示`BorderPane`的区域。


    ![Figure 10-8](images/463938_3_En_10_Chapter/463938_3_En_10_Fig8_HTML.jpg)


    Figure 10-8 JavaFX window with `BorderPane` demo


    如你所见，决定按钮位置的方法与Swing中的方法类似，但有一些差异。`BorderPane`有五个区域，分别命名为：`Top`、`Bottom`、`Center`、`Left`和`Right`。为了将节点放置在每个区域中，为每个区域定义了`set*(..)`方法：`setTop(..)`、`setBottom(..)`、`setCenter(..)`、`setLeft(..)`和`setRight(..)`。为了进一步自定义节点的位置，应将其放置在一个`HBox`节点中，这是另一个可以相当广泛自定义的`JavaFX`元素。从清单[10-18](#463938_3_En_10_Chapter.xhtml#PC26)的代码中可以看出，我们使用CSS样式元素设置背景。我们通过使用`Insets`类的实例来定制节点之间的间距以及节点与包含节点边框之间的间距，并通过调用`box.setAlignment(Pos.BASELINE_RIGHT)`来定制包含节点的对齐方式。`HBox`支持的功能还有很多，因此你可以用盒子做的事情（主要）只受限于你的想象力。


    因此，除了在清单[10-18](#463938_3_En_10_Chapter.xhtml#PC26)中*编写漂亮的代码*之外，我们还做了以下事情：根节点成为了一个`BorderPane`节点的父节点；在`BorderPane`的底部区域，添加了一个`HBox`；这个`HBox`实例成为了一个`Button`的父节点。如你所见，这种组织是层次化的，按钮是层次结构中的最后一个节点。


    我们还通过正确设置`HBox`节点的样式，避免了使用层叠面板。


    现在是时候为我们的应用程序添加最后的功能了：文本区域和带有可选元素的列表。选中后，该值会被添加到文本区域。在JavaFX中创建文本区域很简单。该类有一个非常明显的名称：`TextArea`。我们可以直接将节点添加到`BorderPane`的中心区域，因为JavaFX文本区域默认是可滚动的。因此，无需将其放入`ScrollPane`中，尽管该类确实存在于`javafx.scene.control`包中，并且对于在其中显示比窗口尺寸大的表单节点很有用。清单[10-19](#463938_3_En_10_Chapter.xhtml#PC27)中的三行代码创建了一个`TextArea`类型的节点，声明其为不可编辑，并将其添加到`BorderPane`的中心区域。


    ```java

    import javafx.scene.control.TextArea;

    ...

    var textArea = new TextArea();

    textArea.setEditable(false);

    borderPane.setCenter(textArea);

    ```


    Listing 10-19 Creating and Configuring a JavaFX TextArea


    接下来要添加的功能是列表。列表稍微复杂一些，但使用起来也更有趣，因为通过使用JavaFX，你可以用列表做很多事情。需要实例化以创建列表对象的类名为`ComboBox<T>`。这个类只是用于创建列表的更大类族中的一个，根类是抽象类`ComboBoxBase<T>`。选择正确的实现取决于列表的期望行为，例如是否需要支持单选或多选，以及是否需要列表可编辑。在我们的例子中，`ComboBox<T>`类满足以下要求：我们需要一个不可编辑的、支持单选元素的列表。`ComboBox<T>`有一个`valueProperty()`方法，返回当前的用户输入。用户输入可以基于下拉列表的选择，或者当列表可编辑时用户手动提供的输入。清单[10-20](#463938_3_En_10_Chapter.xhtml#PC28)展示了如何将列表添加到`BorderPane`的顶部区域，并添加一个监听器来记录选中的值并将其保存到我们之前声明的`TextArea`中。'
