    参数可以设置为以下任意值：


    *   `r`：文件以只读方式打开。尝试写入此文件将抛出 `IOException`。


    *   `rw`：文件以读写方式打开。


    *   `rws`：文件以读写方式打开，并且要求对文件内容或元数据的每次更新都同步写入底层存储设备。


    *   `rwd`：文件以读写方式打开，并且要求对文件内容的每次更新都同步写入底层存储设备。


