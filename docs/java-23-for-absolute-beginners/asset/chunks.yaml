    表 3-1 中的**子类**列在 Java 代码中的访问器


    重要


    在前面的示例中，没有访问修饰符的字段不可访问，因为子类是在不同的包中声明的。如果子类被移动到同一个包中，则适用表 3-1 中**包**列的规则。


    表 3-1 中的最后一列，即**全局**列，适用于 `PropProvider` 类声明所在包之外的所有类，这些类不是此类的子类。图 3-10 描述了一个名为
    `AnotherPropRequester` 的类，它试图访问 `PropProvider` 中声明的所有字段。正如预期的那样，只有公共字段是可访问的，其余字段都以红色显示。


    ![](img/463938_3_En_3_Fig10_HTML.jpg)


    图 3-10


    表 3-1 中的**全局**列在 Java 代码中的访问器


    使用 Maven 构建工具构建包含 `AnotherPropRequester` 类的 `chapter03` 子项目会失败。错误消息显示在清单 3-7 中。


    ```

    [ERROR] Failed to execute goal org.apache.maven.plugins:maven-compiler-plugin:3.8.1:compile
    (default-compile) on project chapter03: Compilation failure: Compilation failure:

    [ERROR] ./java-23-for-absolute-beginners/chapter03/src/main/java/com/apress/bgn/three/other/AnotherPropRequester.java:[42,17]
    protectedProp has protected access in com.apress.bgn.three.same.PropProvider

    [ERROR] ./java-23-for-absolute-beginners/chapter03/src/main/java/com/apress/bgn/three/other/AnotherPropRequester.java:[44,17]
    defaultProp is not public in com.apress.bgn.three.same.PropProvider; cannot be
    accessed from outside package

    [ERROR] ./java-23-for-absolute-beginners/chapter03/src/main/java/com/apress/bgn/three/other/AnotherPropRequester.java:[46,17]
    privateProp has private access in com.apress.bgn.three.same.PropProvider

    清单 3-7

    AnotherPropRequester 编译错误

    ```


    正如所展示的，构建工具和编辑器在 Java 代码出现问题时能够很好地通知你。学会善用它们，信任它们，它们将提高你的生产力。*当然，构建工具和智能编辑器偶尔也会出现小问题，但不会太多。*


    在你开始编写 Java 代码后，你可能会回过头来查阅表 3-1 一两次。即使引入了模块，本节涵盖的所有内容仍然有效。前提是你正确配置了模块访问权限。

