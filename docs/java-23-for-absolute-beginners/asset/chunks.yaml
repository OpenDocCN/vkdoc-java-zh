  trans: '

    ## 媒体 API


    除了文本数据，Java 还可用于操作二进制文件，例如图像。Java 媒体 API 包含一组用于多种流行图像存储格式的图像编码器/解码器（编解码器）类：BMP、GIF（仅解码器）、FlashPix（仅解码器）、JPEG、PNG、PNM3、TIFF
    和 WBMP。


    在 Java 9 中，Java 媒体 API 也进行了改造，新增了将多个不同分辨率的图像封装到多分辨率图像中的功能。Java 媒体 API 的核心是 `java.awt.Image`
    抽象类，它是所有用于表示图形图像的类的超类。最重要的图像表示类及其之间的关系如图 11-9 所示。


    ![](img/463938_3_En_11_Fig9_HTML.jpg)


    图 11-9


    `Image` 类层次结构（由 IntelliJ IDEA 显示）


    `SmartMultiResolutionImage` 类将在本节后面使用。


    尽管 `java.awt.Image` 类是该层次结构中的根类，但最常用的类是 `java.awt.BufferedImage`，它是一个具有可访问图像数据缓冲区的实现。它提供了许多方法，可用于创建图像、设置其大小和内容、提取其内容并进行分析等等。在本节中，我们将使用此类来读取和写入图像。


    图像文件是一种复杂的文件。除了图片本身，它还包含大量附加信息，其中如今最重要的信息是图像的创建位置。如果你曾好奇社交网络是如何为你发布的图片推荐签到位置的，那么信息就来源于此。这看起来可能没那么重要，但发布一张在你家拍摄的猫咪照片，就会将你的位置暴露给全世界。我不确定你怎么看，但对我来说这很可怕。我曾经在我的个人博客上发布过我的猫舒适地坐在我写这本书的电脑上的照片，这意味着我基本上将我的位置和一台相当昂贵的笔记本电脑暴露给了全世界。当然，大多数人并不关心我的猫或笔记本电脑，但那些想轻松赚钱的人可能会关心。因此，当一位友好且知识渊博的读者给我发了一封私人邮件，告诉我一种叫做可交换图像文件格式（EXIF）的数据，以及他如何因为我博客上最新发布的猫咪照片而知道我的住址时，我对此进行了研究。照片的
    EXIF 数据包含大量关于你的相机以及照片拍摄地点（GPS 坐标）的信息。大多数智能手机都会将 EXIF 数据嵌入到用其相机拍摄的照片中。


    在图 11-10 中，你可以看到由 macOS 预览应用程序显示的 EXIF 信息。


    ![](img/463938_3_En_11_Fig10_HTML.jpg)


    图 11-10


    JPG 图像上的 EXIF 信息


    请注意，EXIF 信息包含拍摄照片的确切位置，包括纬度和经度。有一些工具可以删除 EXIF 数据，但当你在博客（像我一样）或社交媒体网站上发布大量照片时，逐一清理它们会花费太多时间。这时
    Java 就派上用场了，在代码清单 11-44 中，我与你分享了一段我用来清理照片 EXIF 数据的代码片段。


    ```

    package com.apress.bgn.eleven;

    // 省略了一些导入语句

    import org.apache.commons.imaging.formats.jpeg.exif.ExifRewriter;

    import java.awt.image.BufferedImage;

    public class MediaDemo {

    private static final Logger LOGGER = LoggerFactory.getLogger(MediaDemo.class);

    void main() {

    File src = new File("chapter11/media-handling/src/main/resources/input/the-beach.jpg");

    try {

    LOGGER.info(" --- 正在移除 EXIF 信息 ---");

    File destNoExif = new File("chapter11/media-handling/src/main/resources/output/the-beach-no-exif.jpg");

    removeExifMetadata(src, destNoExif);

    } catch (Exception e) {

    LOGGER.error("发生了错误。", e);

    }

    }

    public void removeExifMetadata(final File jpegImageFile, final File dst) throws
    IndexOutOfBoundsException, IOException {

    try (FileOutputStream fos = new FileOutputStream(dst);

    OutputStream os = new BufferedOutputStream(fos)) {

    new ExifRewriter().removeExifMetadata(jpegImageFile, os);

    }

    }

    }

    代码清单 11-44

    从图像中剥离 EXIF 数据的代码片段

    ```


    移除 EXIF 数据相当容易，因为 `javax.imageio.ImageIO` 不会在图像文件中持久保存 EXIF 信息或任何其他与实际图像无关的信息。


    注意


    提供比 Java AWT 类性能更好的 `EXIF` 信息剥离类的实用工具库名为 Apache Commons Imaging^(¹⁰⁸)。该项目是 Apache
    Sanselan 的延续，本书第一版中使用了后者。


    `removeExifMetadata(..)` 方法将图像源和一个管理新图像保存位置的 `File` 处理器作为参数。要测试生成的图像是否没有 EXIF
    数据，只需在图像查看器中打开它。任何显示 EXIF 的选项要么应被禁用，要么不显示任何内容。在 macOS 的预览图像查看器中，该选项是灰色的。


    如果你的项目要求不惜一切代价避免使用第三方解决方案，JDK 自带了自己的移除 `EXIF` 数据的方法。`javax.imageio.ImageIO` 类提供了一个写入
    `BufferedImage` 实例的方法，该方法会忽略 `EXIF` 数据。因此，`removeExifMetadata(..)` 方法可以简单地写成：


    ```

    private static void removeExifMetadata(final File src, final File dest) throws
    Exception {

    BufferedImage originalImage = ImageIO.read(src);

    ImageIO.write(originalImage, "jpg", dest);

    }

    ```


    现在我们已经解决了这个问题，接下来让我们调整原始图像的大小。要调整图像大小，我们需要从原始图像创建一个 `BufferedImage` 实例以获取图像尺寸。之后，我们修改尺寸，并将它们用作参数来创建一个新的
    `BufferedImage`，该图像将由 `java.awt.Graphics2D` 实例填充数据，这是一种用于渲染 2D 形状、文本和图像的特殊类型类。代码如代码清单
    11-45 所示（该方法被调用来创建缩小 25%、缩小 50% 和缩小 75% 的图像）。

    '
- fmt: "```java\npackage com.apress.bgn.eleven;\nimport org.apache.commons.imaging.formats.jpeg.exif.ExifRewriter;\n\
    import org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\nimport javax.imageio.ImageIO;\n\
    import java.awt.*;\nimport java.awt.image.BufferedImage;\nimport java.awt.image.MultiResolutionImage;\n\
    import java.io.*;\npublic class MediaDemo {\nprivate static final Logger LOGGER\
    \ = LoggerFactory.getLogger(MediaDemo.class);\nvoid main() {\nvar src = new File(\"\
    chapter11/media-handling/src/main/resources/input/the-beach.jpg\");\ntry {\nBufferedImage\
    \ originalImage = ImageIO.read(src);\nLOGGER.debug(\" --- Original image sizes\
    \ {} x {} ---\", originalImage.getWidth(), originalImage.getHeight() );\nLOGGER.info(\"\
    \ --- Creating 25% image ---\");\nFile dest25 = new File(\"chapter11/media-handling/src/main/resources/output/the-beach_25.jpg\"\
    );\nresize(dest25, src, 0.25f);\nBufferedImage dest25Image = ImageIO.read(dest25);\n\
    LOGGER.debug(\" --- 25% image sizes {} x {} ---\", dest25Image.getWidth(), dest25Image.getHeight()\
    \ );\nLOGGER.info(\" --- Creating 50% image ---\");\nFile dest50 = new File(\"\
    chapter11/media-handling/src/main/resources/output/the-beach_50.jpg\");\nresize(dest50,\
    \ src, 0.5f);\nBufferedImage dest50Image = ImageIO.read(dest50);\nLOGGER.debug(\"\
    \ --- 50% image sizes {} x {} ---\", dest50Image.getWidth(), dest50Image.getHeight()\
    \ );\nLOGGER.info(\" --- Creating 75% image ---\");\nFile dest75 = new File(\"\
    chapter11/media-handling/src/main/resources/output/the-beach_75.jpg\");\nresize(dest75,\
    \ src, 0.75f);\n} catch (Exception e) {\nLOGGER.error(\"Something bad happened.\"\
    , e);\n}\n}\nprivate static void resize(final File dest, final File src, final\
    \ float percent) throws IOException {\nBufferedImage originalImage = ImageIO.read(src);\n\
    int scaledWidth = (int) (originalImage.getWidth() * percent);\nint scaledHeight\
    \ = (int) (originalImage.getHeight() * percent);\nImage resultingImage = originalImage.getScaledInstance(scaledWidth,\
    \ scaledHeight, Image.SCALE_SMOOTH);\nBufferedImage outputImage = new BufferedImage(scaledWidth,\
    \ scaledHeight, BufferedImage.TYPE_INT_RGB);\noutputImage.getGraphics().drawImage(resultingImage,\
