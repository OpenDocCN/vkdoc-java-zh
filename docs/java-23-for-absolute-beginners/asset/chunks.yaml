    在清单 5-26 中，第 11 和 12 行展示了如何从 `char[3]` 数组创建一个 `String` 实例。直到 Java 8，`String` 值的内部初始表示形式都是字符数组。一个字符占用
    2 个字节，这意味着 `String` 会消耗大量内存。在 Java 9 中，引入了一种名为 Compact `String` 的新表示形式，它会根据内容使用
    `byte[]` 或 `char[]`。这意味着，从 Java 9 开始，处理 `String` 的应用程序所消耗的内存显著降低。


    `String` 类提供了大量用于操作字符串的方法。多年来，它得到了许多改进，例如更好的优化可能性、多行文本块以及新的实用文本转换方法。长期以来，JDK 中缺少许多
    `String` 实用方法，开发者会使用像 Apache Commons Lang^(⁵²) 这样的库来避免自己编写。Java 8 之后，添加了一些修改，使得外部库变得不再必要。以下部分列出并解释了初学者应该了解的最有趣和最有用的方法。


    ##### Java 8 之后添加的有用 String 方法


    Java 8 之后添加的所有有用的 `String` 方法都在 `com.apress.bgn.five.NewAgeStringDemo` 类中进行了演示，为了将本书控制在可接受的篇幅内，不会完整展示该类。以下列表简要描述了
    Java 8 之后添加到 `String` 类中的最有用的方法。


    **在 Java 11 中：**


    *   `strip()`：返回一个字符串，其值为原字符串，并移除所有前导和尾随空白。


    *   `stripLeading()`：返回一个字符串，其值为原字符串，并移除所有前导空白。


    *   `stripTrailing()`：返回一个字符串，其值为原字符串，并移除所有尾随空白。


    *   `isBlank()`：如果字符串为空或仅包含空白代码点，则返回 `true`，否则返回 `false`。


    *   `lines()`：返回从该字符串中提取的行流，这些行由行终止符分隔。


    *   `repeat(int count)`：返回一个字符串，其值为将该字符串重复 `count` 次后的拼接结果。


    **在 Java 12 中：**


    *   `indent(int n)`：根据 `n` 的值调整此字符串每行的缩进，并规范化行终止字符。


    **在 Java 15 中：**


    *   `String formatted(Object templateReference)`：使用此字符串作为格式字符串，并使用提供的参数进行格式化。此方法等同于
    Java 1.5 中引入的 `String.format(stringReference, templateReference)`，后者是 `String`
    类中的一个静态方法，需要将待处理的字符串作为参数提供。


    **在 Java 21 中：**


    *   `int indexOf(int ch, int beginIndex, int endIndex)`：返回此字符串中指定字符第一次出现的索引，从
    `beginIndex` 开始搜索，在 `endIndex` 之前停止。


    *   `int indexOf(String str, int beginIndex, int endIndex)`：返回此字符串指定索引范围内第一次出现指定子字符串的索引（等同于
    `s.substring(beginIndex, endIndex).indexOf(str) + beginIndex`）。


    *   `String[] splitWithDelimiters(String regex, int limit)`：根据给定正则表达式的匹配项拆分此字符串，并返回字符串和匹配的分隔符（该模式最多应用
    `limit-1` 次）。


    ##### 转义字符


    有些特殊字符不能成为 `String` 值的一部分。你可能已经注意到，`String` 值是在双引号（`"sample"`）之间定义的，这使得 `"`（双引号）字符无法作为值使用。为了能够将其用作
    `String` 值或其中的一部分，必须对其进行*转义*。另一个不允许成为 `String` 值一部分的特殊字符是 `\`（反斜杠）。图 5-17 展示了
    IntelliJ IDEA 如何通过红色波浪线提示你无法在 `String` 值的内容中使用这些字符。它还展示了如何转义这些字符以使其可用。


    ![](img/463938_3_En_5_Fig17_HTML.jpg)


    图 5-17


    包含特殊字符的代码示例


    要转义这些字符，必须在它们前面插入一个反斜杠。因此，单个 `\` 不允许成为 `String` 值的一部分，但两个连续的 `\` 可以，这告诉编译器 `String`
    值包含一个 `\` 字符：


    ```

    System.out.println(" Example using \\.")

    //打印

    Example using \.

    ```


    图 5-17 中的 `\a` 特殊字符不允许出现在 `String` 值中，因为 `\` 用于构造转义序列，但 `\a` 不是一个转义序列。


    `''`（单引号）在用作字符值时也必须转义。


    ```

    char quote = ''\'''';

    ```


    有几种 Java 转义序列可以在 `String` 值中使用以达到特定效果，其中最重要的列于表 5-1 中。


    表 5-1


    Java 转义序列


    | 转义序列 | 效果 |

    | --- | --- |

    | `\n` | 创建新行（通常称为换行符）。 |

    | `\t` | 创建制表符。 |

    | `\b` | 创建退格字符（可能会删除前一个字符，具体取决于输出设备）。 |

    | `\r` | 返回到行首（但不创建新行，相当于键盘上的 `Home` 键）。 |

    | `\f` | 换页（对于打印机，移动到下一页的顶部）。 |

    | `\s` | 创建空格字符。 |

    | `\` | 行终止符。 |


    信息


    需要在 `String` 值中转义的完整字符列表可以在 Java 语言规范文档中找到，网址为：`https://`[`docs.oracle.com/javase/specs/jls/se23/html/jls-3.html#jls-3.10.7`](http://docs.oracle.com/javase/specs/jls/se23/html/jls-3.html%2523jls-3.10.7)


    重要


    根据 JLS，如果转义序列中反斜杠后面的字符不是 `\` 或 ASCII 字符 `b`、`s`、`t`、`n`、`f`、`r`、`"`、`''`、`0`、`1`、`2`、`3`、`4`、`5`、`6`
    或 `7`，则会发生编译时错误。


    换行符 `\n` 和制表符 `\t` 在编程中经常用于正确格式化控制台输出。如果我们像下面这样声明一个 `String` 实例：


    ```

    String perf = "The singers performing tonight are: \n\t Paolo Nutini \n\t Seth
    MacFarlane\n\t John Mayer";

    ```


    当在控制台中打印时，文本将被格式化，看起来像这样：


    ```

    The singers performing tonight are:

    Paolo Nutini

    Seth MacFarlane

    John Mayer

    ```

