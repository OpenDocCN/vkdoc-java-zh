  trans: '

    如您所见，完全限定的类名 `com.apress.bgn.nine.SortingLogbackDemo` 被缩短为 `c.a.b.n.SortingLogbackDemo`。配置文件可以作为
    VM 参数（JVM 在运行您的类时将使用的参数）提供给程序，这意味着日志格式可以在外部进行配置。启动该类时，如果您想提供不同的日志文件，只需使用 `-Dlogback.configurationFile=\temp\ext-logback.xml`
    作为 VM 参数即可。


    Logback 也可以将输出定向到文件；只需使用 `ch.qos.logback.core.FileAppender` 类添加配置，并通过在 `<root>`
    配置中添加一个 `<appender>` 元素将输出定向到文件。配置示例如清单 9-18 所示。


    ```


    chapter09/logging-slf4j/out/output.log

    true


    %d{HH:mm:ss.SSS} %-5level %logger{5} - %msg%n


    UTF-8

    %d{HH:mm:ss.SSS} %-5level %logger{5} - %msg%n


    清单 9-18

    将日志消息定向到文件的 Logback 配置

    ```


    在前面的示例中，保留了原始配置，以便日志消息也能打印到控制台，从而证明日志消息可以同时定向到两个目标。


    如果日志文件变得太大而无法打开怎么办？有一种方法可以解决这个问题。可以配置一个名为 `ch.qos.logback.core.rolling.RollingFileAppender`
    的类，使其写入文件直到达到配置的大小限制，然后开始写入另一个文件。`RollingFileAppender` 类需要两个参数：


    *   一个实现了 `ch.qos.logback.core.rolling.RollingPolicy` 接口的类型的实例，该接口提供写入新日志文件的功能（此操作也称为*滚动*）

    *   一个实现了 `ch.qos.logback.core.rolling.TriggeringPolicy` 接口的类型的实例，该接口配置触发滚动的条件


    此外，也可以使用一个同时实现了这两个接口的类型的单个实例来配置日志记录器。滚动日志文件意味着日志文件会根据配置被重命名——通常是将文件最后被访问的日期添加到其名称中，然后创建一个新的日志文件，使用配置的日志文件名（不带日期后缀，以明确这是当前正在写入日志的文件）。这样的
    Logback 配置如清单 9-19 所示。


    ```


    chapter09/logging-slf4j/out/output.log


    chapter09/logging-slf4j/out/output_%d{yyyy-MM-dd}.%i.log


    10MB


    UTF-8

    %d{HH:mm:ss.SSS} %-5level %logger{5} - %msg%n


    %d{HH:mm:ss.SSS} %-5level %logger{5} - %msg%n


    清单 9-19

    将日志消息定向到合理大小限制文件的 Logback 配置

    ```


    清单 9-19 中的配置包含以下元素：


    *   `<file>` 元素配置日志文件的位置和名称。

    *   `<rollingPolicy>` 元素使用 `<fileNamePattern>` 元素配置当日志消息不再写入时日志文件将接收的名称。例如，在前面的配置中，`output.log`
    文件将被重命名为 `output_2020-07-22.log`，然后在应用程序运行的下一天创建一个新的 `output.log` 文件。

    *   `<timeBasedFileNamingAndTriggeringPolicy>` 元素配置何时应创建新的日志文件，以及在创建新文件之前 `output.log`
    文件应达到多大。前面示例中配置的大小是 10MB。如果在一天结束之前日志文件超过 10MB，则该文件会被重命名为 `output_2018-07-22.1.log`。名称中会添加一个索引，并创建一个新的
    `output.log` 文件。

    *   `<maxHistory>` 元素配置日志文件的保留期限，在此示例中为 30 天。


    日志记录如果使用得当，是一个强大的工具。如果使用不当，则很容易导致性能问题。此外，记录所有内容实际上并没有太大用处，因为在一个巨大的日志文件中查找问题就像大海捞针。


    在清单 9-19 中，另一个值得注意的事情是使用了 `StringBuilder` 实例来构建要在特定级别打印的大型日志消息。如果通过配置禁用了该级别的日志记录，会发生什么？如果您猜测即使这些消息没有被记录，创建它们也会消耗时间和内存，那么您猜对了。那么，我们该怎么办？SLF4J
    的创建者也考虑到了这一点，并添加了方法来测试某个日志级别是否已启用，从而可以将创建复杂日志消息的语句封装在 `if` 语句中。话虽如此，可以通过重写 `SortingLogbackDemo.main(..)`
    方法使其更高效，如清单 9-20 所示。


    ```

    package com.apress.bgn.nine;

    // 导入语句已省略

    public class SortingLogbackDemo {

    private static final Logger log = LoggerFactory.getLogger(SortingLogbackDemo.class);

    public static void main(String... args) {

    if (args.length == 0) {

    log.error("没有数据需要排序！");

    return;

    }

    int[] arr = getInts(args);

    if (log.isDebugEnabled()) {

    var sb = new StringBuilder("使用归并排序对数组进行排序：");

    Arrays.stream(arr).forEach(i -> sb.append(i).append(" "));

    log.debug(sb.toString());

    }

    IntSorter mergeSort = new MergeSort();

    mergeSort.sort(arr, 0, arr.length - 1);

    if (log.isInfoEnabled()) {

    var sb2 = new StringBuilder("排序后：");

    Arrays.stream(arr).forEach(i -> sb2.append(i).append(" "));

    log.info(sb2.toString());

    }

    }

    }

    清单 9-20

    在 SortingLogbackDemo 类中高效地记录日志

    ```


    在清单 9-20 中，如果 `com.apress.bgn.nine` 包的 SLF4J 配置设置为 `info`，则以 *使用归并排序对数组进行排序：*
    开头的消息将不再被创建或打印，因为 `log.isDebugEnabled()` 返回 `false`，所以 `if` 语句中包含的代码将不再执行。`Logger`
    类为所有日志记录器级别都包含了 `if<Level>Enabled()` 方法。


    至此，本书范围内关于日志记录的讨论就结束了。请记住，您应该适度使用日志记录，在决定在循环中记录消息时要非常小心，并且对于大型应用程序，始终使用日志门面；在
    Java 中，对于 99% 的项目，这个门面就是 SLF4J。

