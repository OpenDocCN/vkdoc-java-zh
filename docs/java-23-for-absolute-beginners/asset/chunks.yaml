    we have some logic that requires both.


    In AWT and Swing there was not much that you could do with a list visually. You
    had the default look and feel and that was that. JavaFX supports more visual customization
    for nodes, as it even supports CSS. That is why in the next section we’ll make
    our `ComboBox<T>` list interesting. In Java FX each entry in a list is a cell
    that can be drawn differently. To do that, we have to add a `CellFactory<T>` to
    this class, which will create for each item in a list an instance of `ListCell<T>`.


    If a `CellFactory<T>` is not specified, the cells will be created with the default
    style. Listing [10-21](#463938_3_En_10_Chapter.xhtml#PC29) shows the code to customize
    a `ComboBox<T>`.


