- fmt: '# Preventing GC from Deleting an Object


    In the two previous sections, we focused on objects that were eligible for garbage
    collection. In an application, there are objects that should not be discarded
    while the program runs because they are necessary (for example, translation applications
    that need to keep a huge dictionary in memory). The most obvious references in
    our classes that were discarded only at the end of the execution were the static
    fields, and they are final, so they cannot be reinitialized:


    ```

    private static final Logger log = LoggerFactory.getLogger(CleanerDemo.class);

    public static final Cleaner cleaner = Cleaner.create();

    private static NameGenerator nameGenerator = new NameGenerator();

    ```


    The problem with these static values, however, is that they occupy the memory.
    What if your application uses a big `Map<K,V>` that contains a dictionary that
    is not even necessary right when the application starts? To solve this, you can
    use the `Singleton` design pattern. The `Singleton` pattern is a specific design
    of a class that ensures the class will be instantiated only *once* during the
    execution of the program. This is done by hiding the constructor (declare it private)
    and declaring a static reference of the class type and a static method to return
    it. There is more than one way to write a class according to the `Singleton` pattern,
    but the most common way is depicted in Listing [13-18](#463938_3_En_13_Chapter.xhtml#PC26).


    ```

    package com.apress.bgn.thirteen.util;

    // some import statements omitted

    public class SingletonDictionary {

    public static final Cleaner cleaner = Cleaner.create();

    private static final Logger LOGGER = LoggerFactory.getLogger(SingletonDictionary.class);

    private static final SingletonDictionary instance = new SingletonDictionary();

    private Map dictionary = new HashMap();

    private SingletonDictionary() {

    // init dictionary

    LOGGER.info("Starting to create dictionary: {}", System.currentTimeMillis());

    final NameGenerator keyGen = new NameGenerator(20);

    final NameGenerator valGen = new NameGenerator(200);

    IntStream.range(0, 100_000).forEach(_ -> dictionary.put(keyGen.genName(), valGen.genName()));

    LOGGER.info("Done creating dictionary: {}", System.currentTimeMillis());

    }

    public synchronized static SingletonDictionary getInstance(){

    return instance;

    }

    }

    Listing 13-18

    SingletonDictionary Class

    ```


    The code in Listing [13-18](#463938_3_En_13_Chapter.xhtml#PC26) simulates a dictionary
    with 100,000 entries, all generated by a modified version of the `NameGenerator`
    class. Log messages are printed in its constructor, to be really obvious when
    the instance is created. There are four things you must remember about the `Singleton`
    pattern:


    - The constructor must be private, as it should not be called outside the class.

    - The class must contain a static reference to an object of its type that can
    be initialized in place by calling the private constructor.

    - A method to retrieve this instance must be defined, so it must be static.

    - The method to retrieve the static instance also has to be synchronized, so that
    no two threads can call it at the same time and gain access to the instance, because
    the core idea of the `Singleton` pattern is to allow the class to be instantiated
    only once during the duration of the execution of the program and ensure that
    no concurrent access is allowed, as it might lead to unexpected behavior. There
    are multiple ways to initialize and work with a `Singleton`, so feel free to do
    your own research if you are interested in the details.


    In a `Singleton` class, a static reference to an instance is created and this
    static reference prevents the garbage collector from cleaning up this instance
    during the execution of the program. This is because a static reference is a class
    variable, and classes are the last to be deleted by the GC, toward the end of
    the program execution. To test this, we’ll write a main class that declares a
    `Cleaner` instance and registers a `Cleanable` for the `SingletonDictionary` instance.
    The main method will create a lot of `String` arrays to fill up the memory to
    try to convince the GC to delete the `SingletonDictionary` instance, and we’ll
    even set its own reference to it to `null`, as depicted in Listing [13-19](#463938_3_En_13_Chapter.xhtml#PC27).


    ```

    package com.apress.bgn.thirteen;

    // import statements omitted

    public class SingletonDictionaryDemo {

    public static final Cleaner cleaner = Cleaner.create();

    private static final Logger LOGGER = LoggerFactory.getLogger(SingletonDictionaryDemo.class);

    void main() {

    LOGGER.info("Testing SingletonDictionary...");

    //filling memory with arrays of String to force GC

    IntStream.range(0, 10_000).forEach(_ -> {

    var s = new String[10_000];

    try {Thread.sleep(1);} catch (InterruptedException _) {}

    });

    SingletonDictionary singletonDictionary = SingletonDictionary.getInstance();

    cleaner.register(singletonDictionary, ()-> LOGGER.info("Cleaned up the dictionary!"));

    // we delete the reference

    singletonDictionary = null;

    //filling memory with arrays of String to force GC

    IntStream.range(0, 10_000).forEach(_ -> {

    var s = new String[10_000];

    try {Thread.sleep(1);} catch (InterruptedException _) {}

    });

    LOGGER.info("DONE.");

    }

    }

    Listing 13-19

    SingletonDictionaryDemo Class

    ```


    If we run the code in Listing [13-19](#463938_3_En_13_Chapter.xhtml#PC27) and
    expect to see the “Cleaned up the dictionary!” message in the console, we’re expecting
    in vain. That static reference in the `SingletonDictionary` will not allow the
    GC to touch that object until the program ends. The static reference that we have
    in class `SingletonDictionary` is also called a strong reference, because it prevents
    the object from being discarded from memory.'
