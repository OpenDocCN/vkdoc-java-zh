  trans: "\n## 响应式编程与响应式宣言\n\n**响应式编程**是一种声明式编程风格，涉及使用数据流和变更传播。它围绕异步和事件驱动编程原则展开，意味着构建解决方案来高效管理数据流和异步操作。响应式流是一项倡议，旨在为带有非阻塞背压的异步流处理提供标准。响应式流对于解决需要跨线程边界进行复杂协调的问题极为有用。其操作符允许你将数据收集到所需线程上，并确保线程安全操作，在大多数情况下无需过度使用`synchronized`和`volatile`结构。\n\
    \n在 Java 领域，曾有人认为 Java 21 中虚拟线程的引入会扼杀构建响应式解决方案的兴趣，但响应式编程是一种编程范式，而虚拟线程是一种技术实现。因此，我在本版中仍保留了这一响应式编程章节。\n\
    \nJava 在版本 8 中引入 Stream API 后向响应式编程迈出了一步，但响应式流直到版本 9 才可用。你已经学会了如何在**第****8 章**中使用流，现在你只需理解如何使用响应式流进行一些响应式编程。\n\
    \n使用响应式流并非新概念。《响应式宣言》于 2014 年首次公开发布^(¹¹⁶)，提出软件开发应遵循这样的方式：**系统应具备“响应性、韧性、弹性与消息驱动”——简而言之，它们应该是响应式的**。\n\
    \n以下简要解释《响应式宣言》中使用的四个术语：\n\n*   **响应性**：系统应提供快速且一致的响应时间。\n*   **韧性**：系统在发生故障时应保持响应能力，并能够恢复。\n\
    *   **弹性**：系统在不同工作负载下应保持响应能力。\n*   **消息驱动**：系统应使用异步消息进行通信，避免阻塞，并在必要时应用背压。\n\n\
    按此方式设计的系统应更加灵活、松耦合且可扩展，同时应更易于开发、便于变更，并更能容忍故障。为了实现这一切，系统需要一个通用的通信 API。如前所述，响应式流是一项倡议，旨在提供这样一个用于异步、非阻塞流处理的标准\
    \ API，同时支持背压。稍后我将解释**背压**的含义。让我们从响应式流处理的基础开始。\n\n任何类型的流处理都涉及数据生产者、数据消费者以及它们之间处理数据的组件。显然，数据流的方向是从生产者到消费者。至此描述的系统抽象模式如图\
    \ 12-2 所示。\n\n![](img/463938_3_En_12_Fig2_HTML.jpg)\n\n图 12-2\n\n生产者/消费者系统\n\n\
    当生产者比消费者快时，系统可能会陷入困境，因此必须处理无法被处理的额外数据。有多种方式可以做到这一点：\n\n![](img/463938_3_En_12_Fig3_HTML.jpg)\n\
    \n图 12-3\n\n响应式生产者/消费者系统\n\n*   丢弃额外数据（这在网络硬件中完成）。\n*   阻塞生产者，以便消费者有时间赶上。\n* \
    \  缓冲数据。然而，缓冲区是有限的，如果生产者快而消费者慢，则存在缓冲区溢出的风险。\n*   应用**背压**，这涉及赋予消费者调节生产者的能力，并控制生产多少数据。背压可以看作是从消费者发送给生产者的消息，让生产者知道消费者需要降低其数据生产速率。考虑到这一点，我们可以完善上图中的设计，结果如图\
    \ 12-3 所示。\n\n如果生产者、处理器和消费者不同步，那么通过阻塞直到每个组件准备好处理数据来解决数据过多的问题并非可行选项，因为这将使系统变为同步系统。丢弃数据也不可行，而缓冲则不可预测，因此对于响应式系统，我们唯一的选择是应用**非阻塞背压**。\n\
    \n提示\n\n如果软件示例让你感到困惑，请想象以下场景：你有一个名叫吉姆的朋友。你还有一桶颜色各异的球。吉姆让你把所有红球给他。你有两种方式做到这一点：\n\
    \n*   你挑出所有红球，放入另一个桶中，然后将桶递给吉姆。这是典型的请求-完整响应模型。这是一种异步模型。如果挑选红球耗时过长，吉姆会在你分拣时去做其他事情，当你完成后，你通知他他的红球桶已准备好。这是异步的，因为吉姆没有被你分拣球的过程阻塞，他能够去做其他事情，然后在球准备好时再取走。\n\
    *   你从桶中一个一个地取出红球，然后扔向吉姆。这就是你的数据流，或者在此例中是球流。如果你找球和扔球的速度比吉姆接球的速度快，就会发生堵塞。于是吉姆让你慢下来。这就是他在调节球的流动，相当于现实世界中的背压。\n\
    \n在 Java 9 之前，无法在 Java 中编写可聚合到响应式系统中的应用程序，因此开发者不得不依赖外部库。响应式应用程序必须根据响应式编程原则进行设计，并使用响应式流来处理数据。响应式编程的标准\
    \ API 最初由**reactive-streams**库描述，该库也可与 Java 8 一起使用。在 Java 9 中，标准 API 被添加到 JDK\
    \ 中，而下一版本的`reactive-streams`库包含一组声明为嵌套在`org.reactivestreams.FlowAdapters`类中的类，这些类代表两个\
    \ API（响应式流 API 和响应式流 Flow API）中类似组件之间的桥梁。\n\n在图 12-4 中，你可以看到来自`org.reactivestreams`的接口，这些接口旨在由具有前述角色的组件实现。\n\
    \n![](img/463938_3_En_12_Fig4_HTML.jpg)\n\n图 12-4\n\n响应式流接口（如 IntelliJ IDEA 中所示）\n\
    \n响应式流 API 由四个基本接口组成：\n\n*   `Publisher<T>`暴露一个名为`void subscribe(Subscriber<?\
    \ super T>)`的方法，该方法被调用来添加一个`Subscriber<T>`实例，并生成类型为`T`的元素，这些元素将由`Subscriber<T>`消费。`Publisher<T>`实现的目的是根据从其订阅者收到的需求发布值。\n\
    *   `Subscriber<T>`消费来自`Publisher<T>`的元素，并暴露四个必须实现的方法，以根据`Publisher<T>`实例接收的事件类型定义实例的具体行为：\n\
    \    *   `void onSubscribe(Subscription)`是订阅者上第一个被调用的方法，它使用`Subscription`参数将`Publisher<T>`链接到`Subscriber<T>`实例；如果此方法抛出异常，则后续行为无法保证。\n"
- fmt: '*   `void onNext(T)` is the method invoked with a `Subscription`’s next item
    to receive the data; if it throws an exception, the `Subscription` might be cancelled.

    *   `void onError(Throwable)` is the method invoked upon an unrecoverable error
    encountered by a `Publisher<T>` or `Subscription<T>`.

    *   `void onComplete()` is the method called when there is no more data to consume,
    thus no additional `Subscriber<T>` method invocations will occur.

    *   `Processor<T,R>` extends both `Publisher<T>` and `Subscriber<R>`, because
    it needs to consume data and produce it to send it further upstream.

    *   `Subscription` links the `Publisher<T>` and the `Subscriber<T>` and can be
    used to apply back pressure by calling the `request(long)` to set the number of
    items to be produced and sent to the consumer. It also allows the cancellation
    of a flow, by calling the `cancel()` method to tell a `Subscriber<T>` to stop
    receiving messages.


    In the JDK, all the previously listed interfaces are defined in the `java.util.concurrent.Flow`
    class. The name of this class is obvious in nature, as the previous interfaces
    are used to create flow-controlled components that can be linked together to create
    a reactive application. Figure [12-5](#463938_3_En_12_Chapter.xhtml#Fig5) shows
    the correspondence between the JDK Reactive Streams API and the Reactive Streams
    library API.


    ![](images/463938_3_En_12_Chapter/463938_3_En_12_Fig5_HTML.jpg)


    Figure 12-5


    JDK Reactive Streams API and Reactive Streams library API correspondence


    Aside from these four interfaces, there is a single JDK implementation, the `java.util.concurrent.SubmissionPublisher<T>`
    class implementing `Publisher<T>`, which is a convenient base for subclasses that
    generate items and use the methods in this class to publish them.


    The `Flow` interfaces are quite basic and can be used when writing reactive applications,
    but this requires a lot of work. Currently, there are multiple implementations,
    by various teams, that provide a more practical way to develop reactive applications.
    Using implementations of these interfaces, you can write reactive applications
    without needing to write the logic for synchronization of threads processing the
    data.


    The following list contains the most well-known Reactive Streams API implementations
    (and there are more, because in a big data world, reactive data processing is
    no longer a luxury, but a necessity):


    *   Project Reactor^([^(117)](#fn117)), embraced by Spring for its Web Reactive
    Framework

    *   Akka Streams^([^(118)](#fn118))

    *   MongoDB Reactive Streams Java Driver^([^(119)](#fn119))

    *   Ratpack^([^(120)](#fn120))

    *   ReactiveX^([^(121)](#fn121))


    ## Using the JDK Reactive Streams API


    The JDK-provided interfaces for reactive programming are quite basic, so implementation
    is quite cumbersome, but nevertheless we’ll make an attempt in this section. We
    will build an application that generates an infinite number of integer values,
    filters these values, and selects the values that are less than 127. For the values
    that are even and between 98 and 122, the application will subtract 32 (basically
    converting lowercase letters to uppercase letters) and then convert them to a
    character and print them.


    The most basic solution, without reactive streams, is depicted in Listing [12-1](#463938_3_En_12_Chapter.xhtml#PC1).


    ```

    package com.apress.bgn.twelve.dummy;

    // some input statements omitted

    import java.security.SecureRandom;

    public class BasicIntTransformer {

    private static final Logger LOGGER = LoggerFactory.getLogger(BasicIntTransformer.class);

    private static final SecureRandom random = new SecureRandom();

    void main() {

    int rndNo = random.nextInt(130);

    if (rndNo =98 && rndNo <=122) {

    rndNo -=32;

    }

    char res = (char) rndNo;

    LOGGER.info("Result: {}", res);

    } else {

    LOGGER.debug("Number {} discarded.", rndNo);

    }

    }

    }

    // sample output

    //[main] INFO com.apress.bgn.twelve.dummy.BasicIntTransformer -- Initial value:
    95

    //[main] INFO com.apress.bgn.twelve.dummy.BasicIntTransformer -- Result: _

    //[main] INFO com.apress.bgn.twelve.dummy.BasicIntTransformer -- Initial value:
    33

    //[main] INFO com.apress.bgn.twelve.dummy.BasicIntTransformer -- Result: !

    // ..

    Listing 12-1

    Generating an Infinite Number of Integers < 127

    ```


    Each line of code in Listing [12-1](#463938_3_En_12_Chapter.xhtml#PC1) has a purpose,
    a desired outcome. This approach is called *imperative programming*, because it
    sequentially executes a series of statements to produce a desired output. However,
    this is not what we are aiming for. In this section, we will implement a reactive
    solution using implementations of the JDK reactive interfaces, so we’ll need the
    following:


    *   A publisher component that makes use of an infinite stream to generate random
    integer values. The class should implement the `Flow.Publisher<Integer>` interface.

    *   A processor that selects only integer values that can be converted to visible
    characters, which in our solution will be all characters with codes between [0,127].
    The class should implement the `Flow.Processor<Integer, Integer>`.

    *   A processor that modifies elements received that are even and between 98 and
    122 by subtracting 32. This class should also implement the `Flow.Processor<Integer,
    Integer>`.

    *   A processor that transforms integer elements into the equivalent characters.
    This is a special type of processor that maps one value to another of another
    type and should implement `Flow.Processor<Integer, Character>`.

    *   A subscriber that prints the received elements from the last processor in
    the chain. This class will implement the `Flow.Subscriber<Character>` interface.


    Let’s start by declaring the `Publisher<T>` that will wrap around an infinite
    stream to produce values to be consumed. We will implement the `Flow.Publisher<Integer>`
    interface by providing a full concrete implementation to submit the elements asynchronously.
    To buffer them in case of need, a lot of code would need to be added. Fortunately,
    the class `SubmissionPublisher<T>` does that already, so internally, in our class
    we’ll make use of a `SubmissionPublisher<Integer>` object. The code for the publisher
    is depicted in Listing [12-2](#463938_3_En_12_Chapter.xhtml#PC2).'
