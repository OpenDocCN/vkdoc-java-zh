  trans: '

    ### 使用 Files 工具方法写入文件


    从 Java 7 开始，可以使用 `Files.write(Path, byte[], OpenOption... options)` 方法轻松写入较小的文件。该方法接受两个参数：一个表示文件位置的
    `Path` 对象，以及一个表示要写入数据的字节数组。当需要写入的数据量足够小时，这个方法非常实用，一行代码即可完成。最后一个参数实际上是一个*可变参数*（在**第
    3 章**中介绍），表示文件打开时要执行的操作（零个、一个或多个）。使用该方法时可以不指定该类型的任何参数，如清单 11-22 所示。


    ```

    package com.apress.bgn.eleven.io;

    import java.io.File;

    import java.io.IOException;

    import java.nio.file.Files;

    import java.nio.file.Path;

    // 其他导入语句已省略

    public class FilesWritingDemo {

    private static final Logger LOGGER = LoggerFactory.getLogger(FilesWritingDemo.class);

    void maim() {

    var file = new File("chapter11/read-write-file/src/main/resources/output/data.txt");

    byte[] data = "Some of us, we’re hardly ever here".getBytes();

    try {

    Path dataPath = Files.write(file.toPath(), data);

    LOGGER.info("字符串已写入 {}", dataPath.toAbsolutePath());

    } catch (IOException e) {

    LOGGER.debug("无法将数据写入文件", e);

    }

    }

    }

    清单 11-22

    从 Java 7 开始，将字符串写入文件

    ```


    如果文件已存在，其内容将被直接覆盖。这意味着由于没有指定任何参数来配置我们对文件的操作，默认行为是以写入模式打开文件，将其大小截断为零，然后从头开始写入，从而覆盖原有内容。可用选项的列表由
    `java.nio.file.StandardOpenOption` 枚举中的值定义。与默认行为对应的值是 `TRUNCATE_EXISTING`。因此，清单
    11-22 示例中的这一行：


    ```

    Path dataPath = Files.write(file.toPath(), data);

    ```


    等价于：


    ```

    import java.nio.file.StandardOpenOption

    //...

    Path dataPath = Files.write(file.toPath(), data, StandardOpenOption.TRUNCATE_EXISTING);

    ```


    如果期望的行为是修改已存在的文件并在其末尾追加新数据，那么作为 `Files.write(..)` 方法参数使用的选项是 `APPEND`：


    ```

    Path dataPath = Files.write(file.toPath(), data, StandardOpenOption.APPEND);

    ```


    另外请注意，字符串在写入之前需要转换为字节数组。在 Java 11 中，这不再是必需的，因为终于有 JDK 开发者意识到大多数人可能只是向文件写入一个简单的
    `String`，并认识到强制他们显式调用 `getBytes()` 是相当愚蠢的。因此，引入了 `Files.writeString(..)` 方法族，其中一种方法还支持指定编码。清单
    11-23 展示了使用该方法将字符串写入文件的示例。


    ```

    package com.apress.bgn.eleven.io;

    import java.nio.charset.StandardCharsets;

    import static java.nio.file.StandardOpenOption.APPEND;

    // 导入语句已省略

    var file = new File("chapter11/read-write-file/src/main/resources/output/data.txt");

    try {

    Path dataPath = Files.writeString(file.toPath(),

    "\nThe rest of us, we''re born to disappear",

    StandardCharsets.UTF_8,

    APPEND);

    log.info("字符串已写入 {}", dataPath.toAbsolutePath());

    } catch (IOException e) {

    e.printStackTrace();

    }

    清单 11-23

    从 Java 11 开始，将字符串写入文件

    ```


    `Files.write(..)` 的另一个版本接受类型为 `Iterable<? extends CharSequence>` 的参数，这意味着可以使用它写入一个
    `String` 值列表，如清单 11-24 所示。


    ```

    var file = new File("chapter11/read-write-file/src/main/resources/output/data.txt");

    List dataList = List.of(

    "How do I stop myself from",

    "Being just a number?");

    try {

    Path dataPath = Files.write(file.toPath(), dataList,

    StandardCharsets.UTF_8,

    APPEND);

    log.info("字符串已写入 {}", dataPath.toAbsolutePath());

    } catch (IOException e) {

    e.printStackTrace();

    }

    清单 11-24

    使用 Files.write(..) 将列表写入文件

    ```


    接下来，我们将研究如何使用 `Writer` 层次结构中的类来写入文件。

