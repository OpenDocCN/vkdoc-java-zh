- fmt: "# Reactive Programming and the Reactive Manifesto\n\n**Reactive programming**\
    \ is a declarative programming style that involves using data streams and propagation\
    \ of change. It revolves around asynchronous and event-driven programming principles,\
    \ and implies building solutions to manage streams of data and asynchronous operations\
    \ efficiently. `Reactive Streams` is an initiative to provide a standard for asynchronous\
    \ stream processing with nonblocking back pressure. Reactive streams are extremely\
    \ useful for solving problems that require complex coordination across thread\
    \ boundaries. The operators allow you to gather your data on to the desired threads\
    \ and ensure thread-safe operations without requiring, in most cases, excessive\
    \ use of `synchronized` and `volatile` constructs.\n\nIt was assumed in the Java\
    \ world that the introduction of virtual threads in Java 21 would kill the interest\
    \ in building reactive solutions, but reactive programming is a programming paradigm,\
    \ while virtual threads are a technical implementation. Thus, I am retaining this\
    \ reactive programming chapter in this edition too.\n\nJava took a step toward\
    \ reactive programming after introducing the `Stream` API in version 8, but reactive\
    \ streams were not available until version 9. You’ve already learned how to use\
    \ streams in Chapter 8, so now all you have to do is understand how to use reactive\
    \ streams to do some reactive programming.\n\nUsing reactive streams is not a\
    \ new idea. The Reactive Manifesto was first made public in 2014 and proposed\
    \ that software be developed in such a way that systems are “Responsive, Resilient,\
    \ Elastic and Message Driven”—in short, they should be **reactive**.\n\nEach of\
    \ the four terms used in the Reactive Manifesto is briefly explained here:\n\n\
    - **Responsive**: Systems should provide fast and consistent response times.\n\
    - **Resilient**: Systems should remain responsive in case of failure and be able\
    \ to recover.\n- **Elastic**: Systems should remain responsive under various workloads.\n\
    - **Message Driven**: Systems should communicate using asynchronous messages,\
    \ avoid blocking, and apply back pressure when necessary.\n\nSystems designed\
    \ this way are supposed to be more flexible, loosely coupled, and scalable, but\
    \ at the same time they should be easier to develop, amenable to change, and more\
    \ tolerant of failure. To be able to achieve all that, the systems need a common\
    \ API for communication. As previously mentioned, `Reactive Streams` is an initiative\
    \ to provide such a standard API for asynchronous, nonblocking stream processing\
    \ that also supports back pressure. I’ll explain what **back pressure** means\
    \ in a moment. Let’s start with the basics of reactive stream processing.\n\n\
    Any type of stream processing involves a producer of data, a consumer of data,\
    \ and components in the middle between them that process the data. Obviously,\
    \ the direction of the data flow is from the producer to the consumer. The abstract\
    \ schema of a system described thus far is depicted in Figure 12-2.\n\n![Figure\
    \ 12-2](images/463938_3_En_12_Chapter/463938_3_En_12_Fig2_HTML.jpg)\n\nFigure\
    \ 12-2: Producer/consumer system\n\nThe system might end up in a pickle when the\
    \ producer is faster than the consumer, so the extra data that cannot be processed\
    \ must be dealt with. There is more than one way of doing that:\n\n![Figure 12-3](images/463938_3_En_12_Chapter/463938_3_En_12_Fig3_HTML.jpg)\n\
    \nFigure 12-3: Reactive producer/consumer system\n\n- The extra data is discarded\
    \ (this is done in network hardware).\n- The producer is blocked so the consumer\
    \ has time to catch up.\n- The data is buffered. However, buffers are limited,\
    \ and if we have a fast producer and a slow consumer, there is a danger of the\
    \ buffer overflowing.\n- **Back pressure** is applied, which involves giving the\
    \ consumer the power to regulate the producer and control how much data is produced.\
    \ Back pressure can be viewed as a message being sent from the consumer to the\
    \ producer to let the producer know that the consumer has to slow its data production\
    \ rate. With this in mind, we can complete the design in the previous image, which\
    \ will result in Figure 12-3.\n\nIf the producer, processors, and consumer are\
    \ not synchronized, solving the problem of too much data by blocking until each\
    \ one is ready to process it is not an option, as it would transform the system\
    \ into a synchronous one. Discarding it is not an option either, and buffering\
    \ is unpredictable, so all we’re left with for a reactive system is applying **nonblocking\
    \ back pressure**.\n\n**Tip**: If the software example is too puzzling for you,\
    \ imagine the following scenario: You have a friend named Jim. You also have a\
    \ bucket of differently colored balls. Jim tells you to give him all the red balls.\
    \ You have two ways of doing this:\n\n- You pick all the red balls, put them in\
    \ another bucket, and hand the bucket to Jim. This is the typical request - complete\
    \ response model. It is an asynchronous model. If selecting the red balls takes\
    \ too long, Jim just goes and does other things while you do the sorting, and\
    \ when you are done, you notify him that his bucket of red balls is ready. It\
    \ is asynchronous because Jim is not blocked by you sorting the balls and is able\
    \ to go do other things and then get the balls when they are ready.\n- You get\
    \ the red balls one by one from your bucket and throw them at Jim. This is your\
    \ data flow, or a ball flow in this case. If you are faster at finding the balls\
    \ and throwing them than Jim is at catching them, you have a blockage. So Jim\
    \ tells you to slow down. This is him regulating the flow of balls, which is the\
    \ real-world equivalent of back pressure.\n\nWriting applications that can be\
    \ aggregated in reactive systems was not possible in Java before version 9, so\
    \ developers had to make do with external libraries. A reactive application must\
    \ be designed according to the principle of reactive programming and use reactive\
    \ streams for handling the data. The standard API for reactive programming was\
    \ first described by the `reactive-streams` library, which could be used with\
    \ Java 8 as well. In Java 9, the standard API was added to the JDK and the next\
    \ version of the `reactive-streams` library included a set of classes declared\
    \ nested into the `org.reactivestreams.FlowAdapters` class that represents bridges\
    \ between the analogous components in the two APIs (the Reactive Streams API and\
    \ the Reactive Streams Flow API).\n\nIn Figure 12-4 you can see the interfaces\
    \ from `org.reactivestreams` that are meant to be implemented by components with\
    \ the roles defined previously.\n\n![Figure 12-4](images/463938_3_En_12_Chapter/463938_3_En_12_Fig4_HTML.jpg)\n\
    \nFigure 12-4: Reactive Streams interfaces (as shown in IntelliJ IDEA)\n\nThe\
    \ Reactive Streams API is made of four basic interfaces:\n\n- `Publisher<T>` exposes\
    \ one method named `void subscribe(Subscriber<? super T>)`, which is called to\
    \ add a `Subscriber<T>` instance and produces elements of type `T`, which will\
    \ be consumed by the `Subscriber<T>`. The purpose of a `Publisher<T>` implementation\
    \ is to publish values according to the demand received from its subscribers.\n\
    - `Subscriber<T>` consumes elements from the `Publisher<T>` and exposes four methods\
    \ that must be implemented to define concrete behavior of the instance depending\
    \ on the event type received by the `Publisher<T>` instance:\n  - `void onSubscribe(Subscription)`\
    \ is the first method called on a subscriber and is the method that links the\
    \ `Publisher<T>` to the `Subscriber<T>` instance using the `Subscription` argument;\
    \ if this method throws an exception, the following behavior is not guaranteed."
