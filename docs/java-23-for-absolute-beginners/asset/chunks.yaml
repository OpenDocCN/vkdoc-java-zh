  trans: "\n### Linux 系统中的 `JAVA_HOME`\n\n提示\n\n如果你精通 Linux，那你很可能正在使用 PPA 或 SDKMAN，因此可以跳过本节。不过，如果你喜欢自行控制\
    \ JDK 的安装位置并定义自己的环境变量，请继续阅读。\n\nLinux 系统是类 Unix 操作系统。这与基于 Unix 的 macOS 类似。根据你的\
    \ Linux 发行版，安装 Java 可以通过特定的包管理器完成，也可以直接从 Oracle 官网下载 `*.tar.gz` 格式的 JDK 归档文件。\n\
    \n如果通过包管理器安装 Java，必要的可执行文件通常会在安装时自动放入系统路径中。因此，本书只涵盖手动完成所有操作的情况，并选择将 Java 仅为当前用户安装到诸如\
    \ `/home/{your.user}/tools/jdk-23.jdk` 的位置，因为介绍包管理器并非本书的目的。\n\n从 Oracle 网站下载 JDK\
    \ 归档文件并将其解压到 `/home/{your.user}/tools/jdk-23.jdk` 后，你需要在用户主目录中创建一个名为 `.bashrc`\
    \ 或 `.bash_profile` 的文件。在某些 Linux 发行版中，这些文件可能已经存在，此时你只需编辑它们即可。添加如代码清单 2-4 所示的行。\n\
    \n```\nexport JAVA_HOME=/home/{your.user}/tools/jdk-23.jdk\nexport PATH=$JAVA_HOME/bin:$PATH\n\
    代码清单 2-4\n在 Linux 中为当前用户设置 JAVA_HOME\n```\n\n如你所见，其语法与 macOS 的语法类似。要检查 JDK 的位置和\
    \ Java 版本，可使用与 macOS 部分相同的命令。\n\n## 运行 Java 代码\n\n在指导你安装更多工具（Apache Maven、Git\
    \ 等）之前，我们先运行一些 Java 代码。Java 9 引入的 JShell 等增强功能，以及 Java 21 引入并在未来版本中扩展范围（即使仍处于预览阶段）的未命名类和实例\
    \ `main` 方法，使得 Java 绝对初学者无需经过编译阶段即可直接运行 Java 代码，从而帮助他们熟悉语法并“快速体验”语言语法。\n\n###\
    \ 使用 JShell\n\n从 Java 9 开始，想要测试 Java 语言的开发者无需创建完整的 Java 项目即可进行测试。JShell 是一个用于学习\
    \ Java 编程语言和原型化 Java 代码的交互式命令行工具。因此，你无需在类中编写代码、编译它并执行字节码，只需使用 JShell 直接执行语句即可。\n\
    \nJShell 的出现相当晚，因为像 Python 和 Node 这样的脚本语言多年前就引入了类似的工具，而 Scala、Clojure 和 Groovy\
    \ 等 JVM 语言也紧随其后。但迟到总比没有好。\n\nJShell 是一个读取-求值-打印循环（REPL），它会在输入声明、语句和表达式时立即对其进行求值，并立即显示结果。它非常适合快速尝试新的想法和技术，无需拥有完整的开发环境，也无需为代码执行提供完整的上下文。\n\
    \nJShell 是 JDK 的标准组件。启动它的可执行文件位于 JDK 安装目录的 `bin` 目录中。这意味着你只需打开一个终端（Windows 中的命令提示符）并输入\
    \ `jshell`。如果 `bin` 目录的内容已添加到系统路径中，你应该会看到一条包含系统上 JDK 版本的欢迎消息。此外，你的终端根目录会变为 `jshell>`，以提示你现在正在使用\
    \ `jshell`。\n\n在代码清单 2-5 中，通过调用 `jshell -v` 以详细模式启动了 `jshell`，该模式会为会话结束前执行的所有语句提供详细的反馈。\n\
    \n```\n$ jshell -v\n|  欢迎使用 JShell -- 版本 23\n|  如需介绍，请输入：/help intro\njshell>\n\
    代码清单 2-5\n命令 jshell -v 的输出\n```\n\n如果你在阅读本书的同时执行命令，请继续输入 `/help` 以查看所有可用操作和命令的列表。假设你没有这样做，代码清单\
    \ 2-6 展示了预期的输出。\n\n```\njshell> /help\n|  输入 Java 语言表达式、语句或声明。\n|  或输入以下命令之一：\n\
    |  /list [|-all|-start]\n|   列出你输入的源代码\n|  /edit \n|   编辑源代码条目\n|  /drop \n| \
    \  删除源代码条目\n|  /save [-all|-history|-start] \n|   将代码片段保存到文件\n...\n|  /exit []\n\
    |   退出 jshell 工具\n...\n代码清单 2-6\n在 jshell 中执行命令 /help 的输出\n```\n\n在 Java 中，值被分配给称为**变量**的字符组。（关于如何选择和使用它们，详见**第**\
    \ **4** **章**。）为了开始使用 JShell，我们将声明一个名为 `six` 的变量，并将值 6 赋给它（*我知道，很聪明吧？*）。该语句和 `jshell`\
    \ 的日志如代码清单 2-7 所示。\n\n```\njshell> int six = 6;\nsix ==> 6\n|  已创建变量 six : int\n\
    代码清单 2-7\n使用 jshell 声明变量\n```\n\n如你所见，日志消息清晰明了，告诉我们命令已成功执行，并且创建了一个名为 `six` 的 `int`\
    \ 类型变量。`six ==> 6` 让我们知道值 6 已分配给我们刚刚创建的变量。\n\n你可以创建任意数量的变量，并执行数学运算、字符串拼接以及任何你需要快速执行的操作。只要\
    \ JShell 会话未关闭，这些变量就存在并且可以使用。代码清单 2-8 展示了使用 JShell 执行的一些语句及其结果。\n\n```\njshell>\
    \ int six = 6\nsix ==> 6\n|  已修改变量 six : int\n|    更新覆盖了变量 six : int\njshell>\
    \ six = six + 1\nsix ==> 7\n|  已赋值给 six : int\njshell> six +1\n$14 ==> 8\n|  已创建临时变量\
    \ $14 : int\njshell> System.out.println(\"当前值: \" + six)\n当前值: 7\n代码清单 2-8\njshell\
    \ 的各种语句及输出\n```\n"
- fmt: "`$14 ==> 8` 如[清单 2-8](#463938_3_En_2_Chapter.xhtml#PC9) 所示，将值 8 赋给名为`$14`的变量。该变量由`jshell`创建。当语句的结果未分配给开发者命名的变量时，`jshell`会生成一个临时变量，其名称由`$`（美元符号）和一个表示该变量内部索引的数字组成。文档中并未明确说明，但根据我在使用`jshell`时的观察，索引值似乎是导致该变量创建的语句编号。\n\
    \n**重要提示**\n\nJava 代码最重要的构建块之一是**类**。类是模拟现实世界对象和事件的代码片段。类包含两种类型的**成员**：一种用于模拟状态，即类变量，也称为**字段**或**属性**；另一种用于模拟行为，称为**方法**。\n\
    \nJDK 提供了大量类，用于模拟创建大多数应用程序所需的基本组件。**第** [**3**](#463938_3_En_3_Chapter.xhtml)\
    \ **章**将更详细地介绍类。即使现在有些概念看起来很陌生，请耐心等待，让它们慢慢积累；以后你会更明白它们的含义。\n\n最重要的 JDK 类之一是`java.lang.String`，它用于表示文本对象。该类提供了丰富的方法集，用于操作`String`变量的值。[清单\
    \ 2-9](#463938_3_En_2_Chapter.xhtml#PC10) 展示了在声明的`String`类型变量上调用其中一些方法的情况。\n\n\
    ```\njshell> String lyric = \"twice as much ain't twice as good\"\nlyric ==> \"\
    twice as much ain't twice as good\"\n|  created variable lyric : String\njshell>\
    \ lyric.toUpperCase()\n$18 ==> \"TWICE AS MUCH AIN'T TWICE AS GOOD\"\n|  created\
    \ scratch variable $18 : String\njshell> lyric.length()\n$20 ==> 33\n|  created\
    \ scratch variable $20 : int\nListing 2-9\njshell Method Calling Examples with\
    \ String Variable\n```\n\n在`jshell`中使用 JDK 类型的变量编写 Java 代码可能看起来很复杂，因为你不知道该调用哪个方法，对吧？`jshell`非常有用，因为它会在方法不存在时告诉你。尝试调用方法时，你可以按\
    \ **Tab** 键显示可用方法的列表。这称为**代码补全**，智能的 Java 编辑器也提供此功能。\n\n在[清单 2-10](#463938_3_En_2_Chapter.xhtml#PC11)\
    \ 中，你可以看到当你尝试调用一个不存在的方法时，`jshell`打印的错误消息，以及如何显示和过滤特定类型可用的方法。\n\n```\njshell> lyric.toupper()\n\
    |  Error:\n|  cannot find symbol\n|    symbol:   method toupper()\n|  lyric.toupper()\n\
    |  ^-----------^\njshell> lyric.to  # \ntoCharArray()   toLowerCase(    toString()\
    \      toUpperCase(\njshell> lyric.   # \ncharAt(                chars()     \
    \           codePointAt(\ncodePointBefore(       codePointCount(        codePoints()\n\
    ...\nListing 2-10\nMore jshell Method Calling Examples with String Variable\n\
    ```\n\nJShell 非常明确地告诉我们，`toupper()`方法对于`String`类是未知的。\n\n在列出可能的方法时，以`()`结尾的方法不需要参数。以`(`结尾的方法接受零个或多个参数，并且有多个形式。要查看这些形式，只需在变量上写下该方法，然后再次按\
    \ **Tab** 键。[清单 2-11](#463938_3_En_2_Chapter.xhtml#PC12) 展示了`indexOf`方法的多种形式。\n\
    \n```\njshell> lyric.indexOf( # \n$1      $14     $18     $19     $2      $20\
    \     $5      $9      lyric   six\nSignatures:\nint String.indexOf(int ch)\nint\
    \ String.indexOf(int ch, int fromIndex)\nint String.indexOf(String str)\nint String.indexOf(String\
    \ str, int fromIndex)\n\nListing 2-11\njshell Listing All Forms of the indexOf\
    \ Method in the String Class\n```\n\n在`lyric.indexOf(`行之后，`jshell`会列出会话期间创建的变量，以便你轻松选择现有的参数。\n\
    \n你可以在 Java 项目中编写的任何代码，都可以在`jshell`中编写。其优势在于，你可以将程序拆分为一系列语句，即时执行以检查结果，并根据需要进行调整。`jshell`还能为你做其他事情，其中最重要的部分将在本书中介绍。\n\
    \n通过执行`/vars`命令，可以列出在 JShell 会话中声明的所有变量。[清单 2-12](#463938_3_En_2_Chapter.xhtml#PC13)\
    \ 展示了本章会话中声明的变量。\n\n```\njshell> /vars\n|    int $1 = 5\n|    int $2 = 42\n| \
    \   int $5 = 8\n|    int $9 = 8\n|    int six = 7\n|    int $14 = 8\n|    String\
    \ lyric = \"twice as much ain't twice as good\"\n|    String $18 = \"TWICE AS\
    \ MUCH AIN'T TWICE AS GOOD\"\n|    int $19 = 9\n|    int $20 = 33\nListing 2-12\n\
    jshell> /vars Output Sample for a Small Coding Session (part one)\n```\n\n现在，既然你已经充分练习了声明变量和进行数学运算，是时候编写最著名的程序了——一个在控制台打印\
    \ *Hello World!* 的程序。只需打开`jshell`并输入`System.out.print(\"Hello World!\")`语句，如[清单\
    \ 2-13](#463938_3_En_2_Chapter.xhtml#PC14) 所示。\n\n```\njshell>\n|  Welcome to\
    \ JShell -- Version 23-ea\n|  For an introduction type: /help intro\njshell> System.out.print(\"\
    Hello World!\")\nHello World!\nListing 2-13\njshell> /vars Output Sample for a\
    \ Small Coding Session (part two)\n```"
  raw: "The `$14 ==> 8` depicted in Listing [2-8](#463938_3_En_2_Chapter.xhtml#PC9)\
    \ shows the value 8 being assigned to a variable named `$14`. This variable was\
    \ created by `jshell`. When the result of a statement is not assigned to a variable\
    \ named by the developer, `jshell` generates a scratch variable and its name is\
    \ made of the `$` (dollar) character and a number representing an internal index\
    \ for that variable. It is not explicitly stated in the documentation, but from\
    \ my observations while playing with `jshell`, the index value appears to be the\
    \ number of the statement that lead to its creation.\n\nImportant\n\nOne of the\
    \ most important building blocks of Java code is the **class**. Classes are pieces\
    \ of code that model real-world objects and events. Classes contain two types\
    \ of **members**: those modeling states, which are the class variables, also named\
    \ **fields** or **properties**, and those modeling behaviors, named **methods**.\n\
    \nJDK provides a lot of classes that model the base components needed to create\
    \ most applications. Classes are covered in more detail in **Chapter** [**3**](#463938_3_En_3_Chapter.xhtml).\
    \ Even if some concepts seem foreign now, just be patient, and let them accumulate;\
    \ they will make more sense later.\n\nOne of the most important JDK classes is\
    \ `java.lang.String`, which is used to represent text objects. This class provides\
    \ a rich set of methods that manipulate the value of a `String` variable. Listing\
    \ [2-9](#463938_3_En_2_Chapter.xhtml#PC10) depicts a few of these methods being\
    \ called on a declared variable of type `String`.\n\n```\njshell> String lyric\
    \ = \"twice as much ain't twice as good\"\nlyric ==> \"twice as much ain't twice\
    \ as good\"\n|  created variable lyric : String\njshell> lyric.toUpperCase()\n\
    $18 ==> \"TWICE AS MUCH AIN'T TWICE AS GOOD\"\n|  created scratch variable $18\
    \ : String\njshell> lyric.length()\n$20 ==> 33\n|  created scratch variable $20\
    \ : int\nListing 2-9\njshell Method Calling Examples with String Variable\n```\n\
    \nThe task of writing Java code in `jshell` using variables of JDK types might\
    \ look complicated, because you do not know what method to call, right? `jshell`\
    \ is quite helpful because it tells you when the method does not exist. When trying\
    \ to call a method, you can press the **Tab** key to display a list of methods\
    \ available. This is called **code completion**, and smart Java editors offer\
    \ it too.\n\nIn Listing [2-10](#463938_3_En_2_Chapter.xhtml#PC11), you can see\
    \ the error message printed by `jshell` when you try to call a method that does\
    \ not exist and how to display and filter methods available for a certain type.\n\
    \n```\njshell> lyric.toupper()\n|  Error:\n|  cannot find symbol\n|    symbol:\
    \   method toupper()\n|  lyric.toupper()\n|  ^-----------^\njshell> lyric.to \
    \ # \ntoCharArray()   toLowerCase(    toString()      toUpperCase(\njshell> lyric.\
    \   # \ncharAt(                chars()                codePointAt(\ncodePointBefore(\
    \       codePointCount(        codePoints()\n...\nListing 2-10\nMore jshell Method\
    \ Calling Examples with String Variable\n```\n\nJShell is quite obvious in telling\
    \ us that the `toupper()` method is not known for the `String` class.\n\nWhen\
    \ listing possible methods, methods ending in `()` require no arguments. The methods\
    \ ending in `(` take none or more arguments and have more than one form. To view\
    \ those forms, just write the method on your variable and press **Tab** again.\
    \ Listing [2-11](#463938_3_En_2_Chapter.xhtml#PC12) depicts the multiple forms\
    \ of the `indexOf` method.\n\n```\njshell> lyric.indexOf( # \n$1      $14    \
    \ $18     $19     $2      $20     $5      $9      lyric   six\nSignatures:\nint\
    \ String.indexOf(int ch)\nint String.indexOf(int ch, int fromIndex)\nint String.indexOf(String\
    \ str)\nint String.indexOf(String str, int fromIndex)\n\nListing 2-11\njshell\
    \ Listing All Forms of the indexOf Method in the String Class\n```\n\nRight after\
    \ the `lyric.indexOf(` line, `jshell` lists the variables that were created during\
    \ the session, to give you an easy choice of existing arguments.\n\nAnything you\
    \ can write in a Java project, you can write in `jshell` as well. The advantage\
    \ is that you can split your program in a sequence of statements, execute them\
    \ instantly to check the result, and adjust as necessary. There are other things\
    \ that `jshell` can do for you, the most important of which are covered in this\
    \ book.\n\nAll variables you declared in a JShell session are listed by executing\
    \ the `/vars` command. Listing [2-12](#463938_3_En_2_Chapter.xhtml#PC13) depicts\
    \ the variables declared in the session for this chapter.\n\n```\njshell> /vars\n\
    |    int $1 = 5\n|    int $2 = 42\n|    int $5 = 8\n|    int $9 = 8\n|    int\
    \ six = 7\n|    int $14 = 8\n|    String lyric = \"twice as much ain't twice as\
    \ good\"\n|    String $18 = \"TWICE AS MUCH AIN'T TWICE AS GOOD\"\n|    int $19\
    \ = 9\n|    int $20 = 33\nListing 2-12\njshell> /vars Output Sample for a Small\
    \ Coding Session (part one)\n```\n\nNow, since you’ve played enough with declaring\
    \ variables and doing mathematical operations, it is time to write the most famous\
    \ program of them all, the one that prints *Hello World!* in the console. Just\
    \ open `jshell` and type the `System.out.print(\"Hello World!\")` statement, like\
    \ depicted in Listing [2-13](#463938_3_En_2_Chapter.xhtml#PC14).\n\n```\njshell>\n\
    |  Welcome to JShell -- Version 23-ea\n|  For an introduction type: /help intro\n\
    jshell> System.out.print(\"Hello World!\")\nHello World!\nListing 2-13\njshell>\
    \ /vars Output Sample for a Small Coding Session (part two)\n```"
