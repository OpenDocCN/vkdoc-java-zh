    \ Fmsnwrtbuldmnjs\nINFO  c.a.b.t.Singer - GC Destroyed: Fmsnwrtbuldmnjs after\
    \ 1 seconds\n```\n\nAs you can see, the time it takes for a `Singer` instance\
    \ to be deleted from the heap varies, and this is because the GC is called randomly;\
    \ the developer has no control over it. There is a way to explicitly request garbage\
    \ collection to be done…well, two ways. You can call `System.gc()` or `Runtime.getRuntime().gc()`.\
    \ Note that `System.gc()` calls `Runtime.getRuntime().gc()` anyway.\n\nThis doesn’t\
    \ mean that the GC will immediately start cleaning up the memory, though. It is\
    \ more like a suggestion to the JVM that it should make an effort to recycle unused\
    \ objects and reclaim unused memory, because it is needed.\n\nNow, back to the\
    \ `finalize()` method. It was mentioned that it was marked as deprecated in Java\
    \ 9. This method is meant to be overridden by classes that handle resources that\
    \ are stored outside the heap. The obvious example here is the I/O handling classes,\
    \ used to read resources as files or URLs and databases. The `finalize()` method\
    \ would be called by the JVM when an object can no longer be accessed by any living\
    \ thread of the running application. This is to make sure that those resources\
    \ were released and available for other external and unrelated programs to use.\n\
    \n> **Info**  \n> In older versions of Apache Tomcat (a Java-based web server),\
    \ on Windows there was a bug related to the release of resources. When the server\
