    \ IDEA 将编译结果存储到名为 `out/production` 的目录中。图 [3-20](#463938_3_En_3_Chapter.xhtml#Fig20)\
    \ 也部分显示了编译项目的结果。\n\n![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig20_HTML.jpg)\n\
    \n**图 3-20** 如何在 IntelliJ IDEA 中编译 Java 项目\n\n现在是时候让这个类打印 *Hello World!* 了。为此，我们需要向该类添加一个特殊的方法。任何\
    \ Java 桌面应用程序都有一个名为 `main` 的特殊方法，该方法必须在顶层类中声明。JRE 调用此方法来运行 Java 程序/应用程序，我将其称为*入口点*。如果没有这样的方法，Java\
    \ 项目就只是一组类的集合，不可运行，无法执行，也无法执行特定功能。\n\n> **提示**\n> \n> 可以这样想象：这就像有一辆车，但无法启动它，因为缺少点火锁芯。无论从哪个角度看，它都是一辆车，但它无法实现汽车的主要目的——真正带你到某个地方。你可以将\
    \ `main` 方法想象成点火锁芯，JRE 将插入钥匙来启动你的应用程序。接下来，我们将把这个方法添加到 `HelloWorld` 类中。\n\n由于 IntelliJ\
