  raw: '#### Advanced Module Configurations


    A Java module declaration body contains one or more **directives** that are constructed
    using the keywords in Table [3-2](#463938_3_En_3_Chapter.xhtml#Tab2). These directives
    represent access configurations and dependency requirements for the packages and
    classes contained in the modules.


    Table 3-2


    Java Module Directives


    | Directive | Purpose |

    | --- | --- |

    | `requires` | Specifies that the module depends on another module. |

    | `exports` | One of the module’s packages whose `public` types (and their `nested
    public` and `protected` types) should be accessible to code in all other modules.
    |

    | `exports ... to` | Qualified version of the `exports` directive that enables
    specifying in a comma-separated list precisely which module’s or modules’ code
    can access the exported package. |

    | `open` | Used at module-level declaration (`open module mm {}`) and allows reflective
    access to all module’s packages. Java Reflection is the process of analyzing and
    modifying all the capabilities of a class at runtime, and it works on private
    types and members too. So before Java 9, nothing was really encapsulated. |

    | `opens` | Used inside the body of a module’s declaration to selectively configure
    access through reflection only to certain packages. |

    | `opens ... to` | Qualified version of the `opens` directive that enables specifying
    in a comma-separated list precisely which module’s or modules’ code can access
    its packages reflectively. |

    | `uses` | Specifies a service used by this module, making the module a *service
    consumer*. A service in this case represents the full name of an interface/abstract
    class that another module provides an implementation for. |

    | `provides ... with` | Specifies that a module provides a service with a specific
    implementation, making the module a *service provider*. |

    | `transitive` | Used together with `requires` to specify a dependency on another
    module and to ensure that other modules reading your module also read that dependency—known
    as *implied readability*. |


    Appendix A provides examples for all directives. For the purpose of learning the
    Java language, the only ones you really need to know are `requires` and `exports`,
    so those are the only two covered in this chapter. I will explain all directives
    in depth as soon as the context is appropriate for understanding them completely,
    and I will add analogies with real-world events and scenarios to make sure the
    idea comes through.


    Importantly, *modules can depend on one another.* The project for this book consists
    of 13 modules, and most on them depend on module `chapter.zero`. This module contains
    the basic components used to build more complex components in the other modules.
    For example, classes inside module `chapter.three` need access to packages and
    classes in module `chapter.zero`. Declaring a module dependency is done using
    the `requires` directive, as depicted in Listing [3-11](#463938_3_En_3_Chapter.xhtml#PC11).


    ```

    module chapter.three {

    requires chapter.zero;

    }

    Listing 3-11

    A Simple module-info.java Configuration

    ```


    The preceding dependency is an **explicit** one. But there are also **implicit**
    dependencies. For example, any module declared by a developer implicitly requires
    the JDK `java.base` module. This module contains the foundational APIs of the
    Java SE Platform, and no Java application could be written without it. This implicit
    directive ensures access to a minimal set of Java types, so basic Java code can
    be written. Listing [3-11](#463938_3_En_3_Chapter.xhtml#PC11) is equivalent to
    Listing [3-12](#463938_3_En_3_Chapter.xhtml#PC12).


    ```

    module chapter.three {

    requires java.base; // redundant directive

    requires chapter.zero;

    }

    Listing 3-12

    A Simple module-info.java Configuration with an Explicit Directive of requires
    java.base

    ```


    Important


    Declaring a module as required means that the module is required when the code
    is compiled (frequently referred to as *compile time*) and when the code is executed
    (frequently referred to as *runtime*). If a module is required only at runtime,
    the `requires static` keywords are used to declare the dependency. Just keep that
    in mind for now; it will make sense when we talk about web applications.


    Now `chapter.three` depends on module `chapter.zero`. But does this mean `chapter.three`
    can access all `public` types (and their nested `public` and `protected` types)
    in the all the packages in module `chapter.zero`? If you are thinking that this
    is not enough, you are right. Just because a module depends on another, it does
    not mean it has access to the packages and classes it actually needs to. The required
    module must be configured to expose its *insides*. How can this be done? In our
    case, we need to make sure module `chapter.zero` gives access to the required
    packages. We can do so by customizing the `module-info.java` file for this module
    by adding the `exports` directive, followed by the necessary package names. Listing
    [3-13](#463938_3_En_3_Chapter.xhtml#PC13) depicts the `module-info.java` file
    for the `chapter.zero` module that exposes its single package.


    ```

    module chapter.zero {

    exports com.apress.bgn.zero;

    }

    Listing 3-13

    The module-info.java Configuration File for the chapter.zero Module

    ```


    Tip


    Think about it like this: You are in your room cutting out Christmas decorations,
    and you need a template for your decorations. Your roommate has all the templates.
    But just because you need them doesn’t mean they will magically appear. You need
    to go and talk to your roommate. Needing your roommate’s assistance can be viewed
    as the *requires room-mate* directive. After talking to your roommate, your roommate
    will probably say: *Sure, come in, they are on the desk! Take as many as you need.*
    This can be considered the *exports all-templates-on-desk* directive. The desk
    is probably a good analogy for a package.


    Using the configuration in Listing [3-13](#463938_3_En_3_Chapter.xhtml#PC13),
    we have just given access to the `com.apress.bgn.zero` package to any module configured
    with a `requires module.zero;` directive. What if we do not want that? (Considering
    the previous tip, your roommate just left the door to their room open, so anybody
    can enter and get those templates!)


    What if we want to limit the access to module contents only to the `chapter.three`
    module? (So, your roommate has to give their templates only to you.) This can
    be done by adding the `to` keyword followed by the module name to clarify that
    only this module is allowed to access the components. This is the qualified version
    of the `exports` directive mentioned in Table [3-2](#463938_3_En_3_Chapter.xhtml#Tab2).


    Warning


    If you were curious and you read the recommended **JAR Hell** article, you noticed
    that one of the concerns of working with Java sources packed in jars is security.
    The reason is that, even without access to Java sources, by adding a Jar as a
    dependency to an application, objects can be inspected, extended, and instantiated.
    So aside from providing a reliable configuration, better scaling, integrity for
    the platform, and improved performance, the goal for introduction of modules was
    in fact **better security**.


    Listing [3-14](#463938_3_En_3_Chapter.xhtml#PC14) depicts the `module-info.java`
    file for the `chapter.zero` module that exposes its single package only to the
    `chapter.three` module.


    ```

    module chapter.zero {

    exports com.apress.bgn.zero to chapter.three;

    }

    Listing 3-14

    Advanced module-info.java Configuration File for the chapter.zero Module

    ```


    More than one module can be specified to have access, by listing the desired modules
    separated by commas, as depicted in Listing [3-15](#463938_3_En_3_Chapter.xhtml#PC15).'
  trans: "\n#### 高级模块配置\n\nJava 模块声明体包含一个或多个**指令**，这些指令使用表 3-2 中的关键字构建。这些指令代表了模块中包含的包和类的访问配置与依赖需求。\n\
    \n表 3-2\n\nJava 模块指令\n\n| 指令 | 用途 |\n| --- | --- |\n| `requires` | 指定该模块依赖于另一个模块。\
    \ |\n| `exports` | 指定模块的某个包，其 `public` 类型（以及它们的 `nested public` 和 `protected`\
    \ 类型）应对所有其他模块中的代码可访问。 |\n| `exports ... to` | `exports` 指令的限定版本，允许通过逗号分隔的列表精确指定哪些模块的代码可以访问被导出的包。\
    \ |\n| `open` | 用于模块级声明（`open module mm {}`），允许对所有模块的包进行反射访问。Java 反射是在运行时分析和修改类所有能力的过程，它也作用于私有类型和成员。因此在\
    \ Java 9 之前，实际上没有任何东西是真正封装的。 |\n| `opens` | 用于模块声明体内部，选择性地配置仅通过反射访问某些包。 |\n| `opens\
    \ ... to` | `opens` 指令的限定版本，允许通过逗号分隔的列表精确指定哪些模块的代码可以通过反射访问其包。 |\n| `uses` | 指定该模块使用的一个服务，使该模块成为*服务消费者*。此处的服务代表另一个模块为其提供实现的接口/抽象类的全名。\
    \ |\n| `provides ... with` | 指定一个模块使用特定实现来提供一项服务，使该模块成为*服务提供者*。 |\n| `transitive`\
    \ | 与 `requires` 一起使用，指定对另一个模块的依赖，并确保读取你模块的其他模块也读取该依赖——这被称为*隐式可读性*。 |\n\n附录 A\
    \ 提供了所有指令的示例。就学习 Java 语言而言，你真正需要了解的只有 `requires` 和 `exports`，因此本章仅涵盖这两个指令。一旦上下文适合完全理解它们，我将深入解释所有指令，并添加与现实世界事件和场景的类比，以确保概念清晰易懂。\n\
    \n重要的是，*模块可以相互依赖。* 本书的项目由 13 个模块组成，其中大多数依赖于 `chapter.zero` 模块。该模块包含用于在其他模块中构建更复杂组件的基本组件。例如，`chapter.three`\
    \ 模块内部的类需要访问 `chapter.zero` 模块中的包和类。声明模块依赖关系使用 `requires` 指令完成，如清单 3-11 所示。\n\n\
    ```\nmodule chapter.three {\n    requires chapter.zero;\n}\n清单 3-11\n一个简单的 module-info.java\
    \ 配置\n```\n\n上述依赖是**显式**的。但也存在**隐式**依赖。例如，开发者声明的任何模块都隐式地需要 JDK 的 `java.base` 模块。该模块包含\
    \ Java SE 平台的基础 API，没有它就无法编写任何 Java 应用程序。这个隐式指令确保了对最小 Java 类型集的访问，从而可以编写基本的 Java\
    \ 代码。清单 3-11 等同于清单 3-12。\n\n```\nmodule chapter.three {\n    requires java.base;\
    \ // 冗余指令\n    requires chapter.zero;\n}\n清单 3-12\n一个包含显式 requires java.base 指令的简单\
    \ module-info.java 配置\n```\n\n重要\n\n将模块声明为 required 意味着在代码编译时（通常称为*编译时*）和代码执行时（通常称为*运行时*）都需要该模块。如果某个模块仅在运行时需要，则使用\
    \ `requires static` 关键字来声明依赖。请先记住这一点；当我们讨论 Web 应用程序时，它的意义就会显现出来。\n\n现在 `chapter.three`\
    \ 依赖于模块 `chapter.zero`。但这是否意味着 `chapter.three` 可以访问 `chapter.zero` 模块中所有包的所有 `public`\
    \ 类型（以及它们的嵌套 `public` 和 `protected` 类型）？如果你认为这还不够，那么你是对的。仅仅因为一个模块依赖于另一个模块，并不意味着它可以访问它实际需要的包和类。被依赖的模块必须配置为暴露其*内部*。这该如何实现？在我们的例子中，我们需要确保\
