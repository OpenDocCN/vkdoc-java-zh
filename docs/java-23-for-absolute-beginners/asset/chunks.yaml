    ### Java 语法


    Java 语言是**区分大小写**的，这意味着我们可以编写类似清单 4-7 所示的代码，并且代码能够成功编译和执行。


    ```

    package com.apress.bgn.four;

    public class MultipleCaseVariables {

    public static void main(String... args) {

    int mynumber = 0;

    int myNumber = 1;

    int Mynumber = 2;

    int MYNUMBER = 3;

    System.out.println(mynumber);

    System.out.println(myNumber);

    System.out.println(Mynumber);

    System.out.println(MYNUMBER);

    }

    }

    清单 4-7

    证明 Java 区分大小写的代码

    ```


    所有四个变量都是不同的，最后四行将打印数字 `0 1 2 3`。显然，你不能在同一个上下文（例如，在方法体内）中声明两个同名的变量，因为这基本上是在重新声明同一个变量。Java
    编译器不允许这样做。如果你尝试这样做，你的代码将无法编译，甚至 IntelliJ IDEA 也会尝试通过用红色下划线标记代码并显示相关消息来让你看到错误所在，如图
    4-2 中的第 37 行所示，其中变量 `mynumber` 被声明了两次。


    ![](img/463938_3_En_4_Fig2_HTML.jpg)


    图 4-2


    同一个变量名使用了两次


    有一组 **Java 关键字**，它们在 Java 代码中只能用于固定和预定义的目的。其中一些已经介绍过：`import`、`package`、`public`、`class`；其余的关键字将在本章末尾介绍，并在表
    4-2、4-3 和 4-4 中对每个关键字进行简短说明。


    重要


    Java 关键字不能用作开发者编写的代码中的标识符，因此它们不能用作变量、类、接口、对象等的名称。


    可以在一个 Java 源文件中声明一个或多个类型。无论是 `class`、`interface`（或 `@interface`）还是 `enum`，类型的声明都必须用花括号（`{}`）括起来。这些被称为**块分隔符**。`import`
    和 `package` 语句不属于类型体的一部分。如果你回顾一下清单 4-1 中的代码，你会注意到那里使用花括号来包裹以下内容：


    *   类的内容，也称为类体（第 08 行和第 23 行的花括号）

    *   方法的内容，也称为方法体（第 09 行和第 22 行的花括号）

    *   一组要一起执行的指令（第 13 行和第 21 行的花括号）


    在 Java 中，代码行通常以分号（`;`）符号或 ASCII 字符 CR、LF 或 CR LF 结束。这些被称为**行终止符**。分号用于终止功能完整的语句，例如第
    11 行的列表声明。在小型显示器上编写代码时，你可能被迫将该语句拆分成两行以保持代码可读性。其末尾的分号告诉编译器，只有将所有部分放在一起时，该语句才是正确的。请看图
    4-3。


    ![](img/463938_3_En_4_Fig3_HTML.jpg)


    图 4-3


    不同的语句示例


    前三个 `List` 声明是等价的。以这种方式声明 `List` 时，你甚至可以将它的元素拆分成多行。然而，第 46 行的声明是故意写错的。在第 46 行添加了一个分号，这就在那里结束了该语句。该语句无效，当你尝试编译该类时，编译器会通过打印一个异常来报错，提示
    `Error:(13, 46) java: illegal start of expression`。


    如果错误消息看起来与示例不符，可以这样理解：对于编译器来说，问题不在于语句的错误终止，而在于等号（`=`）符号之后，编译器期望找到某种能够为 `badList`
    变量生成值的表达式，但它却什么也没找到。


    ### Java 标识符和变量


    **标识符**是你给 Java 代码中的项目（类、变量、方法等）起的名称。标识符必须遵守一些规则才能让代码编译通过，并且还要遵循常识性的编程规则，这些规则被称为
    **Java 编码约定**。这里列出其中一些：


    *   标识符不能是 Java 保留字之一，否则代码将无法编译。

    *   标识符不能是布尔字面量（`true`、`false`）或 `null` 字面量，否则代码将无法编译。

    *   标识符可以由字母、数字、下划线（`_`）、美元符号（`$`）组成。

    *   标识符不能以数字开头。

    *   从 Java 9 开始，单个下划线不能再用作标识符，因为它变成了一个关键字。这可能是因为在 Java 7 中引入了数字字面量，多位数字可以写得更易读（例如，`int
    i = 10_000;`）。

    *   从 Java 21 开始，单个下划线可以再次用作标识符，但仅限于保存代码中未使用的值的变量。这种行为借鉴自 Go 编程语言，这些变量被称为*未命名变量*。

    *   开发者应遵循**驼峰式**书写风格来声明标识符，确保标识符名称中间的每个单词或缩写都以大写字母开头（例如，`StringBuilder`、`isAdult`）。


    **变量**是一组可以与值关联的字符。它有一个类型，基于该类型，可以赋给它的值集合被限制在某个区间、值组内，或者必须遵循该类型定义的某种格式。例如，清单 4-1
    中第 11 行声明的项目是一个类型为 `List` 的变量，与其关联的值是一个值列表。


    在 Java 中有三种类型的变量：


    *   **字段**（也称为**属性**）是在方法体之外的类体中定义的变量，并且它们前面没有关键字 `static`。

    *   **局部变量**是在方法体内声明的变量，它们仅在该上下文中有效。

    *   **静态变量**是在类体内声明的变量，并且它们前面有关键字 `static`。如果它们被声明为 `public`，则在应用程序中，只要包含该变量的类型是可访问的，它们就是可访问的（除非该模块没有导出声明它们的包）。


    ### Java 注释


    **Java 注释**指的是不属于正在执行的代码的一部分、且被编译器忽略的解释性文本片段。在 Java 中，有三种在代码中添加注释的方式，每种方式都有其独特的声明字符。清单
    4-1 中使用了所有三种类型的注释，以下列表解释了每种注释的用途：


    *   `//` 用于单行注释（第 10 行）。开发者使用这种注释来添加 `TODO` 语句或解释为什么需要某段代码。这些注释主要面向项目中的团队成员。

    *   `/** ... */` JavaDoc 注释使用特殊工具导出到项目的文档中，该文档称为 JavaDoc API（第 05 到 07 行）。开发者使用这种注释来记录他们的代码。有一些构建工具的插件可以将项目中的
    JavaDoc 提取为网站，然后可以公开托管，以帮助使用你项目的其他开发者。

    *   `/* ... */` 用于多行注释（第 14 到 16 行）。开发者使用这种注释来添加 `TODO` 语句或提供关于为什么需要某段代码的详细解释。这些注释主要面向项目中的团队成员。

    '
- fmt: "# Java Types\n\n在[第3章](#463938_3_En_3_Chapter.xhtml)介绍Java构建块时，为了简单起见，只解释了`class`。当时提到Java中还有其他类型，本节将介绍所有这些类型。由于`class`是最重要的，因此必须首先介绍它们。\n\
    \n## 类（Classes）\n\n如[第3章](#463938_3_En_3_Chapter.xhtml)所述，`class`只是创建对象的模板。基于`class`创建对象的过程称为**实例化**。生成的对象被称为该`class`的实例。实例被称为命名对象，因为默认情况下，如果未声明其他超类，任何由开发者编写的`class`都会隐式继承`java.lang.Object`类。这意味着在Java中，所有`class`都有一个基本模板，由`java.lang.Object`类表示。任何`class`默认都是该类的扩展，因此[清单4-8](#463938_3_En_4_Chapter.xhtml#PC8)中的类声明等同于[清单4-9](#463938_3_En_4_Chapter.xhtml#PC9)中的声明。\n\
    \n```\npackage com.apress.bgn.four.basic;\npublic class Sample extends Object\
    \ {}\nListing 4-9\nSimple Sample Class Explicitly Extending the java.lang.Object\
    \ Class\n```\n\n```\npackage com.apress.bgn.four.basic;\npublic class Sample {}\n\
    Listing 4-8\nSimple Sample Class Implicitly Extending the java.lang.Object Class\n\
    ```\n\n> **注意**：请注意，导入`java.lang`包并非必需，因为`Object`类是Java层次结构的根类，所有类（包括数组）都必须能够扩展它。因此，`java.lang`包是隐式导入的。\n\
    \n> **重要**：如[第3章](#463938_3_En_3_Chapter.xhtml)所述，在任何声明了`module-info.java`的Java项目中，`java.base`模块都会被隐式添加为必需模块。该模块导出了`java.lang`包，其中包含编写Java代码的核心组件。\n\
    \n> **提示**：每个人类都由包含23对染色体的DNA分子定义。这些染色体声明了人类应具备的器官和肢体，使其看起来和运作起来像……人类。您可以将`Object`类视为DNA分子，它声明了一个类在Java应用程序中应具备的所有组件，使其看起来和运作起来像一个类。\n\
    \n以下各节将介绍并解释Java中可用于创建对象的其他模板类型的使用。为了在上下文中进行说明，我们将创建一个用于定义人类的模板家族。大多数Java教程使用车辆或几何形状的模板。我想建模一些任何人都能轻松理解和关联的东西。以下各节的目标是开发可用于建模不同类型人群的Java模板。到目前为止提到的第一个Java模板是`class`，那么让我们继续讨论它。\n\
    \n### 字段（Fields）\n\n创建实例的操作称为**实例化**。要设计一个建模通用人类的`class`，我们应该考虑两件事：人类特征和人类行为。那么，所有人类有什么共同点呢？很多，但就本节而言，让我们选择三个通用属性：姓名、年龄和身高。这些属性在Java类中映射为名为**字段**或**属性**的变量。`Human`类的第一个版本如[清单4-10](#463938_3_En_4_Chapter.xhtml#PC10)所示。\n\
    \n```\npackage com.apress.bgn.four.base;\npublic class Human {\n    String name;\n\
    \    int age;\n    float height;\n}\nListing 4-10\nSimple Human Class\n```\n\n\
    在上面的代码示例中，字段具有不同的类型，具体取决于应与之关联的值。例如，姓名可以与文本值（如\"Alex\"）关联，而文本在Java中由`String`类型表示。年龄可以与数值整数值关联，因此其类型为`int`。就本节而言，人的身高被视为有理数（如1.9），因此我们使用`float`这种特殊的Java类型来处理此类值。\n\
    \n现在我们有了一个建模人类基本属性的`class`。如何使用它？我们需要一个`main()`方法，并且需要创建此类型的对象：我们需要实例化这个`class`。在[清单4-11](#463938_3_En_4_Chapter.xhtml#PC11)中，创建了一个名为\"\
    Alex\"的人类。\n\n```\npackage com.apress.bgn.four.base;\npublic class BasicHumanDemo\
    \ {\n    public static void main(String... args) {\n        Human human = new\
    \ Human();\n        human.name = \"Alex\";\n        human.age = 40;\n        human.height\
    \ = 1.91f;\n    }\n}\nListing 4-11\nSimple Human Object Being Created\n```\n\n\
    要创建`Human`实例，我们使用`new`关键字。在`new`关键字之后，我们调用一个称为**构造方法**的特殊方法。我之前提到过方法，但这个方法很特殊。有些开发者甚至不认为构造方法是方法。最明显的原因是构造方法没有在`Human`类的任何地方定义。那么它从哪里来的呢？它是一个无参的默认构造方法，由编译器自动生成，除非显式声明了一个构造方法（带参数或不带参数）。一个`class`不能没有构造方法；否则它无法被实例化，这就是为什么如果没有显式声明构造方法，编译器会生成一个。默认构造方法会调用`super()`，而`super()`又会调用`Object`的无参构造方法，该方法将所有字段初始化为默认值。这一点通过[清单4-12](#463938_3_En_4_Chapter.xhtml#PC12)中的代码示例（包含输出）得到了验证。\n\
    \n```\npackage com.apress.bgn.four.base;\npublic class BasicHumanDemo {\n    public\
