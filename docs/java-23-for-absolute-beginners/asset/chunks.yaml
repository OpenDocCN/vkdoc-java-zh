- fmt: '# The Assignment Operator


    The `=` (assignment) operator is the most-used operator in programming, as nothing
    can be done without it. Any variable that you create, regardless of the type,
    primitive or reference, has to be given a value at some point in the program.
    Setting of a value using the assignment operator is quite simple: specify a variable
    name on the left side of the `=` (equal) operator and specify a value on the right
    side. The only condition for an assignment to work is that the value must match
    the type of the variable.


    To test this operator, you can use `JShell`; just make sure you start it in verbose
    mode (`-v`) so that you can see the effect of your assignments. The statements
    executed for this chapter are shown in Listing [6-1](#463938_3_En_6_Chapter.xhtml#PC1).


    ```

    jshell -v

    |  Welcome to JShell -- Version 23-ea

    |  For an introduction type: /help intro

    jshell>int i = 0;

    i ==> 0

    |  created variable i : int

    jshell> i = -4

    i ==> -4

    |  assigned to i : int

    jshell> String sample = "text"

    sample ==> "text"

    |  created variable sample : String

    jshell> List list = new ArrayList()

    list ==> []

    |  created variable list : List

    jshell>  list = new LinkedList()

    list ==> []

    |  assigned to list : List

    Listing 6-1

    Using jshell to Play with the Assignment Operator

    ```


    In Listing [6-1](#463938_3_En_6_Chapter.xhtml#PC1), we declared primitive and
    reference values and assigned and reassigned values to them. Assignment of values
    with types that mismatch the initial type is not permitted. In the code sample
    in Listing [6-2](#463938_3_En_6_Chapter.xhtml#PC2), we are trying to assign a
    text value to a variable that was previously declared as having the `int` type.


    ```

    jshell> i = -5

    i ==> -5

    |  assigned to i : int

    jshell> i = "you are not allowed"

    |  Error:

    |  incompatible types: java.lang.String cannot be converted to int

    |  i = "you are not allowed";

    |      ^-------------------^

    Listing 6-2

    More jshell Play with the Assignment Operator

    ```


    Introduction of type inference in JDK 10 does not affect this, and the type of
    the variable will be inferred depending on the type of the first value assigned.
    Obviously, this means you cannot declare a variable using the `var` keyword without
    specifying an initial value. This excludes the `null` value, as it has no type.
    This can be forced, though, by casting the `null` value to the type we are interested
    in, as shown in Listing [6-3](#463938_3_En_6_Chapter.xhtml#PC3).


    ```

    jshell> var j

    |  Error:

    |  cannot infer type for local variable j

    |    (cannot use ''var'' on variable without initializer)

    |  var j;

    |  ^----^

    jshell> var j =5

    j ==> 5

    |  created variable j : int

    jshell> var sample2 = "bubulina";

    sample2 ==> "bubulina"

    |  created variable sample2 : String

    // this does not work, obviously

    jshell> var funny = null;

    |  Error:

    |  cannot infer type for local variable funny

    |    (variable initializer is ''null'')

    |  var funny = null;

    |  ^---------------^

    // yes, this actually works !

    jshell> var funny = (Integer) null;

    funny ==> null

    |  created variable funny : Integer

    Listing 6-3

    jshell Failed Variable Declaration

    ```


    ## Explicit Type Conversion: `(type)` and `instanceof`


    These two operators are covered together because it is easier to provide code
    samples pretty similar to what you might need to write for real scenarios.


    As previously mentioned in this book, it is better to keep the reference type
    as generic as possible to allow for changing of the concrete implementation without
    breaking the code. This is called **type polymorphism**. Type polymorphism is
    the provision of a single interface to entities of different types or the use
    of a single symbol to represent multiple different types.


    Sometimes we might need to group objects together but execute different code depending
    on their types. Recall the `Performer` hierarchy presented in Chapter [5](#463938_3_En_5_Chapter.xhtml)
    (depicted in Figure 5-10). We’re going to make use of these types here to show
    you how to use these operators. If you do not want to go back to the previous
    chapter to remember the hierarchy, Figure [6-1](#463938_3_En_6_Chapter.xhtml#Fig1)
    shows it again, but with a twist: it adds an extra class named `Graphician` that
    implements interface `Artist` and extends class `Human`.


    Note


    The implementation of the `Graphician` class is not relevant for this chapter,
    so it won’t be detailed here, but you can find it in the project attached to this
    book.


    ![](images/463938_3_En_6_Chapter/463938_3_En_6_Fig1_HTML.jpg)


    Figure 6-1


    The `Human` hierarchy


    In Listing [6-4](#463938_3_En_6_Chapter.xhtml#PC4), an object of type `Musician`
    and one of type `Graphician` are created and then added into a list containing
    references of type `Artist`. We can do this because both types implement the interface
    `Artist`. The code in Listing [6-4](#463938_3_En_6_Chapter.xhtml#PC4) shows a
    few classes in this hierarchy being used to create objects, added to the same
    list and then extracted from it and have their type tested.


    ```

    package com.apress.bgn.six;

    import com.apress.bgn.four.classes.Gender;

    import com.apress.bgn.four.hierarchy.Artist;

    import com.apress.bgn.four.hierarchy.Musician;

    import com.apress.bgn.four.hierarchy.Performer;

    import java.util.ArrayList;

    import java.util.List;

    import static java.lang.System.out;

    public class OperatorDemo {

    public static void main() {

    List artists = new ArrayList();

    Musician john = new Performer("John", 47, 1.91f, Gender.MALE);

    List songs = List.of("Gravity");

    john.setSongs(songs);

    artists.add(john);

    Graphician diana = new Graphician("Diana", 23, 1.62f, Gender.FEMALE, "macOs");

    artists.add(diana);

    for (Artist artist : artists) {

    if (artist instanceof Musician) {   // (*)

    Musician musician = (Musician) artist; // (**)

    out.println("Songs: " + musician.getSongs());

    } else {

    out.println("Other Type: " +  artist.getClass());

    }

    }

    }

    }

    // output

    /*

    Songs: Gravity

    Other Type: class com.apress.bgn.six.Graphician

    */

    Listing 6-4

    Code Sample Showing instanceof and (type)

    ```


    The line marked with `(*)` at the end shows how to use the `instanceof` operator.
    This operator is used to test whether the object is an instance of the specified
    type (class, superclass, or interface). It is used in writing conditions to decide
    which code block should be executed.


    The line marked with `(**)` does an explicit conversion of a reference, also known
    as a *cast* operation. Since the `instanceof` operator helps figure out that the
    object the reference points to is of type `Musician`, we can now convert the reference
    to the proper type so methods of class `Musician` can be called.


    Notice how the `instanceof` operator is used to test the type however, to use
    the reference an explicit conversion needs to be written.'
