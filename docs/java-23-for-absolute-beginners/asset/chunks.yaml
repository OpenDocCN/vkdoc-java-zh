    ### 使用嵌入式服务器的 Java Web 应用


    本节将使用一个嵌入式 Apache Tomcat 服务器，通过 Java Servlet *（耐心点，年轻的学徒，稍后会解释它们）* 来展示几个简单的网页。这里使用的是
    Tomcat 11 版本，这意味着它支持 Java 模块。使用嵌入式 Tomcat 服务器的优势在于，你可以通过执行一个 main 方法来运行 Web 应用。代码如清单
    10-33 所示，声明了一个非常简单的 Servlet，作为应用的主页面。


    ```

    package com.apress.bgn.ten;

    import jakarta.servlet.http.HttpServlet;

    import jakarta.servlet.http.HttpServletRequest;

    import jakarta.servlet.http.HttpServletResponse;

    import org.apache.catalina.Context;

    import org.apache.catalina.LifecycleException;

    import org.apache.catalina.startup.Tomcat;

    // 其他导入语句已省略

    public class WebDemo {

    private static final Logger LOGGER = Logger.getLogger(WebDemo.class.getName());

    public static final Integer PORT = Optional.ofNullable(System.getenv("PORT")).map(Integer::parseInt).orElse(8080);

    public static final String TMP_DIR = Optional.ofNullable(System.getenv("TMP_DIR")).orElse("/tmp/tomcat-tmp");

    public static final String STATIC_DIR = Optional.ofNullable(System.getenv("STATIC_DIR")).orElse("/tmp/tomcat-static");

    void main() throws IOException, LifecycleException {

    var tomcat = new Tomcat();

    tomcat.setBaseDir(TMP_DIR);

    tomcat.setPort(PORT);

    tomcat.getConnector();

    tomcat.setAddDefaultWebXmlToWebapp(false);

    var contextPath = ""; // 根上下文

    boolean createDirs =  new File(STATIC_DIR).mkdirs();

    if(createDirs) {

    LOGGER.info("Tomcat 静态目录创建成功。");

    } else {

    LOGGER.severe("Tomcat 静态目录创建失败。");

    }

    var docBase = new File(STATIC_DIR).getCanonicalPath();

    var context = tomcat.addWebapp(contextPath, docBase);

    addIndexServlet(tomcat, contextPath, context); // 已省略

    // 用于正确销毁 Servlet

    Runtime.getRuntime().addShutdownHook(new Thread(() -> {

    try {

    tomcat.getServer().stop();

    } catch (LifecycleException e) {

    LOGGER.warning("无法停止 Tomcat 服务器");

    }

    }));

    tomcat.start();

    tomcat.getServer().await();

    }

    }

    清单 10-33

    简单的嵌入式服务器 Java 应用

    ```


    当你不需要复杂的网页，并且不使用像 JSP 这样的模板库来生成 HTML 时，使用嵌入式 Tomcat 服务器编写应用是相当容易的。清单 10-33 中的代码片段仅需要
    `tomcat-embed-core` 库作为依赖，创建服务器的简单步骤如下：


    1.  创建一个 `org.apache.catalina.startup.Tomcat` 实例，并选择要暴露的端口。本例中为 `8080`，即 `PORT`
    变量的默认值，除非使用同名的系统环境变量进行声明。


    2.  为 `Tomcat` 实例设置一个基础目录，运行中的服务器将在该目录下保存各种生成的文件，例如日志。本例中，该目录配置为 `/tmp/tomcat-tmp`，除非使用名为
    `TMPDIR` 的系统环境变量进行声明。运行应用的用户应对该位置拥有写入权限。


    3.  设置一个目录，用于存放 `Tomcat` 的静态文件。本例中，该目录配置为 `/tmp/tomcat-static`，除非使用名为 `STATICDIR`
    的系统环境变量进行声明。运行应用的用户应对该位置拥有写入权限。


    4.  通过调用 `tomcat.setAddDefaultWebXmlToWebapp(false)` 来禁用 `Tomcat` 的默认配置。本例中，这可以防止注册
    `org.apache.jasper.servlet.JspServlet`。该 Servlet 允许在 Web 应用中使用 JSP 文件，但配置后它会自动接管并假定任何请求都必须解析为
    JSP 页面，从而导致 Java Servlet 被忽略。由于我们希望保持应用简单并使用 Java Servlet，因此禁用了它。


    5.  通过添加一个关闭钩子（shutdown hook），确保应用关闭时服务器能优雅地停止。


    6.  编写一个简单的 Servlet 来显示应用的主页面，以测试服务器是否正确启动并按预期工作。这是通过 `addIndexServlet(..)` 方法完成的，该方法已从清单
    10-33 中省略，以确保焦点集中在 `Tomcat` 实例上。该方法如清单 10-34 所示。


    ```

    private static void addIndexServlet(Tomcat tomcat, String contextPath, Context
    context) {

    var indexServlet = new HttpServlet() {

    @Override

    protected void doGet(HttpServletRequest req, HttpServletResponse resp)

    throws IOException {

    var writer = resp.getWriter();

    writer.print("""


    """);

    }

    };

    var servletName = "IndexServlet";

    var urlPattern = "/";

    tomcat.addServlet(contextPath, servletName, indexServlet);

    context.addServletMappingDecoded(urlPattern, servletName);

    }

    清单 10-34

    一个简单方法，用于创建一个非常简单的 Servlet 并将其注册到 Tomcat 实例

    ```


    Servlet 实例必须与一个名称和 URL 模式相关联，当用户尝试打开 `serverURL/contextPath/urlPattern` 页面时，会调用
    `doGet(..)` 方法，该方法返回在其主体中构建的响应。


    部署在服务器（即使是嵌入式服务器）上的 Java Web 应用需要一个上下文路径（context path）。上下文路径的值是访问应用的 URL 的一部分。一个
    URL 由四个部分组成：


    *   `协议`：客户端和服务器用于通信的应用层协议，例如 `http`、`https`、`ftp` 等。


    *   `主机名`：DNS 域名（例如 [`www.google.com`](http://www.google.com)）或 IP 地址（例如 `192.168.0.255`），或网络中可识别的任何别名。例如，当从安装服务器的同一台计算机访问应用时，可以使用
    `127.0.0.1`、`localhost` 或 `0.0.0.0`。


    *   `端口`：用于标识特定进程或服务的数字。例如，`8080`。


    *   `路径和文件名`：资源在服务器文档基础目录下的名称和位置。用户通常请求查看服务器上托管的特定页面，这就是 URL 看起来像 [`https://docs.oracle.com/index.html`](https://docs.oracle.com/index.html)
    的原因。出于安全考虑，常见的做法是通过使用内部映射（称为 *URL 重定向*）来隐藏路径和文件名。


    那么，前面提到的 `contextPath` 值在哪里发挥作用呢？当我们像清单 10-34 那样声明一个嵌入式服务器时，它托管的任何文件都可以通过 `http://localhost:8080/`
    访问。但在专用服务器上，可能同时运行多个应用，必须有办法将它们区分开，对吧？这就是 `contextPath` 值的用武之地。通过将 `contextPath`
    值设置为 `/demo` 而不是空字符串，`WebDemo` 应用及其提供给用户的资源就可以通过 `http://localhost:8080/demo/`
    访问。

    '
- fmt: '# Java Web Applications


    Anyway, back to Java web applications. Java web applications are dynamic: the
    pages are generated from Java code using servlets and JSP pages. Because of that,
    Java web applications run not on a server but inside a web container on the server.
    (This is why Tomcat and Jetty are sometimes called *servlet containers*.) The
    web container provides a Java runtime environment for Java web applications. Apache
    Tomcat is such a container running in the JVM, which supports execution of servlets
    and JSP pages. A **servlet** is a Java class that is a subclass of `jakarta.servlet.http.HttpServlet`.
    Instances of this type answer HTTP Requests within a web container.


    ## Caution


    Apache Tomcat 11.x is an open source software implementation of a subset of the
    Jakarta EE (formally Java EE) technologies. Tomcat is based on Servlet 5.0, JSP
    3.0, EL 4.0, WS 2.0, and JASIC 2.0. Up to Tomcat 9.x, a **servlet** is a Java
    class that is a subclass of `javax.servlet.http.HttpServlet`. The migration from
    `javax.*` packages to `jakarta.*` was needed in Tomcat 10.x to separate Oracle
    official Java products from the open source ones, built using Eclipse build servers^([^(100)](#fn100)).


    A **JSP page** is a file with `.jsp` extension that contains HTML and Java code.
    A JSP page gets compiled into a servlet by the web container the first time the
    page is accessed. In essence, the servlet is the core element of a Java web application.
    The server must also know that the servlet exists and how to identify it, which
    is where the call to `tomcat.addServlet(contextPath, servletName, servlet)` comes
    in. It basically says to add the servlet with name `servletName` to the application
    context with the `contextPath` value and then to associate a URL pattern to the
    servlet, the `context.addServletMapping(urlPattern, servletName)` is called.


    When a Java web application is running, all its servlets and JSP are running into
    its context, but they have to be added into the context in the code and mapped
    to a URL pattern. The request URL which matches that URL pattern will be handled
    by the configured servlet. In Listing [10-34](#463938_3_En_10_Chapter.xhtml#PC44)
    the servlet was created on the spot by instantiating the `HttpServlet` abstract
    class and resulted in an anonymous servlet instance. Listing [10-35](#463938_3_En_10_Chapter.xhtml#PC45)
    depicts a concrete class named `SampleServlet` that extends the `HttpServlet`
    class. The advantage of doing this is that the URL pattern and the servlet name
    can become properties of this class, simplifying the syntax of adding them to
    the application context.


    ```

    package com.apress.bgn.ten;

    import jakarta.servlet.http.HttpServlet;

    import jakarta.servlet.http.HttpServletRequest;

    import jakarta.servlet.http.HttpServletResponse;

    import java.io.IOException;

    import java.util.logging.Logger;

    public class SampleServlet  extends HttpServlet {

    private static final Logger LOGGER = Logger.getLogger(SampleServlet.class.getName());

    private final String servletName = "sampleServlet";

    private final String urlPattern = "/sample";

    @Override

    protected void doGet(HttpServletRequest req, HttpServletResponse resp)

    throws IOException {

    PrintWriter writer = resp.getWriter();

    try {

    writer.println(WebResourceUtils.readResource("index.html"));

    } catch (Exception e) {

    LOGGER.warning("Could not read static file : " + e.getMessage());

    }

    }

    @Override

    public String getServletName() {

    return servletName;

    }

    public String getUrlPattern() {

    return urlPattern;

    }

    }

    Listing 10-35

    The SampleServlet Class

    ```


    The `urlPattern` property was added to this class for practical reasons, to keep
    everything related to this servlet in one place. The same goes for `servletName`.
    If the intention were to instantiate this class multiple times to create multiple
    servlets, these two properties should be declared as configurable. Adding this
    servlet to the application is pretty easy. An object of this type needs to be
    created and then the `tomcat.addServlet(..)` and `context.addServletMappingDecoded(..)`
    methods must be called, as depicted in Listing [10-36](#463938_3_En_10_Chapter.xhtml#PC46).


    ```

    SampleServlet sampleServlet = new SampleServlet();

    tomcat.addServlet(contextPath, sampleServlet.getServletName(), sampleServlet);

    context.addServletMappingDecoded(sampleServlet.getUrlPattern(), sampleServlet.getServletName());

    Listing 10-36

    Adding the SampleServlet Class to the Web Application

    ```


    Inside the `doGet(..)` method the contents of the `index.html` file are read (using
    `WebResourceUtils`, which is part of the project for this chapter but not relevant
    to this chapter) and are written in the response object using the response `PrintWriter`.


    As you can see, the `doGet(..)` method receives as arguments two objects: the
    `HttpServletRequest` instance is read, and all contents of the request sent from
    the client can be accessed using appropriate methods, and the `HttpServletResponse`
    instance, which is used to add information to the response. In Listing [10-36](#463938_3_En_10_Chapter.xhtml#PC46),
    we are just writing HTML code read from another file. An extra method that can
    be called is `response.setStatus(HttpServletResponse.SC_OK)`, which sets the response
    status.


    Aside from the `doGet(..)` method, there are `do*(..)` methods matching each HTTP
    method that declare the same type of parameters.


    Starting with the Java Servlet 3.0 specification, servlets can be written using
    the `@WebServlet` annotation, which removes the necessity to be explicitly added
    to the web application and mapped in the context as shown in Listing [10-36](#463938_3_En_10_Chapter.xhtml#PC46),
    because they are picked automatically when Tomcat starts. Also, there is no need
    to instantiate the servlet class either.


    The `SampleServlet` class after Servlet 3.0 is shown in Listing [10-37](#463938_3_En_10_Chapter.xhtml#PC47).


    ```

    package com.apress.bgn.ten;

    import jakarta.servlet.annotation.WebServlet;

    import jakarta.servlet.http.*;

    // other import statements omitted

    @WebServlet(

    name = "sampleServlet",

    urlPatterns = {"/sample"}

    )

    public class SampleServlet  extends HttpServlet {

    private static final Logger LOGGER = Logger.getLogger(SampleServlet.class.getName());

    @Override

    protected void doGet(HttpServletRequest req, HttpServletResponse resp)

    throws IOException {

    PrintWriter writer = resp.getWriter();

    try {

    writer.println(WebResourceUtils.readResource("index.html"));

    } catch (Exception e) {

    LOGGER.warning("Could not read static file : " + e.getMessage());

    }

    }

    }

    Listing 10-37

    Annotated SampleServlet Class

    ```


    So this is how we handle servlets, but how do we handle JSP pages using an embedded
    server? It’s not impossible, but it is not easy either. That is why, for this
    task, usually people rely on smarter frameworks such as Spring Boot.^([^(101)](#fn101))'
