    \ () -> {\n                service.createAccount(\"Gigi\", \"223311\", \"2I00\"\
    );\n            }\n        );\n        assertEquals(\"无法使用无效金额创建账户！\", expected.getMessage());\n\
    \    }\n    @AfterEach\n    public void tearDown() {\n        repo.set(0);\n \
    \   }\n    @AfterAll\n    public static void destroy() {\n        repo = null;\n\
    \    }\n}\n清单 9-38\n使用桩仓库的 AccountServiceTest 单元测试类\n```\n\n`testNonNumericAmountVersionOne()`\
    \ 方法使用了 `assertThrows(..)`，它接收两个参数：当执行第二个 `Executable` 类型参数时预期抛出的异常类型。`Executable`\
    \ 是定义在 `org.junit.jupiter.api.function` 包中的一个函数式接口，可在 lambda 表达式中使用，从而得到清单 9-38\
    \ 中所示的紧凑测试。\n\n`testNonNumericAmountVersionTwo()` 方法保存了 `assertThrows(..)` 调用的结果，这样还可以测试异常的消息，以确保执行流程完全符合预期。\n\
    \n可以编写类似的方法来测试所有其他服务方法。本书仓库中托管的 `AccountServiceTest` 类还展示了一些其他测试方法。欢迎添加你自己的方法来覆盖你自己的场景。\n\
    \n下一节将介绍本章涵盖的最后一种测试技术：使用模拟对象（mocks）编写测试。\n"
- fmt: "### Using Mocks\n\n**Mocks** are objects that register calls they receive.\
    \ During execution of a test, using assert utility methods, the assumption that\
    \ all expected actions were performed on mocks are tested. Thankfully, code for\
    \ mocks does not have to be written by the developer, because there are three\
    \ well-known libraries that provide the type of classes needed to test using mocks:\
    \ `Mockito`^([^(83)](#fn83)), `JMock`^([^(84)](#fn84)), and `EasyMock`^([^(85)](#fn85)).\
    \ Also, if you ever need to mock static methods—the most common reason being bad\
    \ design (which is beyond your power to fix)—there is `PowerMock`^([^(86)](#fn86)).\n\
    \nUsing mocks, you can jump directly to writing the tests. Listing [9-39](#463938_3_En_9_Chapter.xhtml#PC59)\
    \ shows two tests for the `createAccount(..)` method that focus on the repository\
    \ class actually calling its methods, because the repository class is the one\
    \ being replaced with a mock.\n\n```\npackage com.apress.bgn.nine.mock;\n// other\
    \ import statements omitted\nimport org.junit.jupiter.api.extension.ExtendWith;\n\
    import org.mockito.Mock;\nimport org.mockito.junit.jupiter.MockitoExtension;\n\
    import static org.junit.jupiter.api.Assertions.*;\nimport static org.mockito.ArgumentMatchers.any;\n\
    import static org.mockito.Mockito.when;\n@ExtendWith(MockitoExtension.class)\n\
    public class AccountServiceTest {\npublic AccountService service;\n@Mock\npublic\
    \ AccountRepo mockRepo;\n@BeforeEach\npublic void checkMocks() {\nassertNotNull(mockRepo);\n\
    service = new AccountServiceImpl(mockRepo);\n}\n@Test\npublic void testCreateAccount()\
    \ {\nAccount expected = new Account(\"Gigi\", 2100, \"223311\");\nwhen(mockRepo.findOne(\"\
    Gigi\")).thenReturn(Optional.empty());\nwhen(mockRepo.save(any(Account.class))).thenReturn(expected);\n\
    Account result = service.createAccount(\"Gigi\", \"223311\", \"2100\");\nassertEquals(expected,\
    \ result);\n}\n@Test\npublic void testCreateAccountAlreadyExists() {\nAccount\
    \ expected = new Account(\"Gigi\", 2100, \"223311\");\nwhen(mockRepo.findOne(\"\
    Gigi\")).thenReturn(Optional.of(expected));\nassertThrows(AccountCreationException.class,\n\
    () -> service.createAccount(\"Gigi\", \"223311\", \"2100\"));\n}\n}\nListing 9-39\n\
    The AccountServiceTest Unit Test Class Using a Mock Repo\n```\n\nThe tests are\
    \ quite self-explanatory, and the `Mockito` utility methods’ names make it easy\
    \ to understand what is actually happening during a test execution. Wait, you\
    \ might ask, how are the mocks created and injected? Who does that?\n\nThe `@ExtendWith(MockitoExtension.class)`\
    \ annotation is necessary for JUnit 5 tests to support `Mockito` annotations.\
    \ Without it, annotations like `@InjectMocks` and `@Mock` have no effect on the\
    \ code.\n\nThe `@Mock` annotation is used on references to mocks created by `Mockito`.\
    \ The preferred way to work with mocks is to specify a reference of an interface\
    \ type that is implemented by the real object type and the mock that will be created\
    \ for the test scenario. But `@Mock` can be placed on a concrete type reference\
    \ as well, and the created mock will be a subclass of that class.\n\nThe `@InjectMocks`\
    \ annotation is used on the object to be tested, so that `Mockito` knows to create\
    \ this object and inject mocks instead of the dependencies.\n\nThis is all you\
    \ need to know to start using `Mockito` mocks in your test. Declaring the objects\
    \ to be replaced with mocks and the object to be injected in is the only setup\
    \ a class containing unit tests using mocks needs.\n\nThe body of test methods\
    \ using mocks has a typical structure as well. The first line must declare objects\
    \ and variables passed as arguments to the method called on the object being tested\
    \ or passed as arguments to `Mockito` utility methods that declare what mocks\
    \ take as arguments and what they return. The next line establishes the behavior\
    \ of the mock when its methods are called by the object to be tested.\n\nThe following\
    \ two lines depict this for the `findOne(..)` method. The first line creates an\
    \ `account` object. The second line defines the behavior of the mock. When `mockRepo.findOne(\"\
    Gigi\")` will be called, then the previously created account instance will be\
    \ returned wrapped in an `Optional<T>` instance.\n\n```\nAccount expected = new\
    \ Account(\"Gigi\", 2100, \"223311\");\nwhen(mockRepo.findOne(\"Gigi\")).thenReturn(Optional.of(expected));\n\
    ```\n\nThere are many other libraries to make writing tests as effortless as possible\
    \ for developers, and big frameworks like Spring provide their own testing library\
    \ to help developers write tests for applications using this framework. Build\
    \ tools like Ant, Maven, and Gradle can be used to automatically run the tests\
    \ when the project is built and generate useful reports related to the failures.\n\
    \nUsing Maven, the project can be built by calling `mvn clean install` in the\
    \ console. All test classes declared in the test module are picked up automatically\
    \ if they are named `*Test.java`. When writing tests, and not changing application\
    \ code, you can just run the tests only, by calling `mvn test`. This is a configuration\
    \ that can be changed by configuring the Maven Surefire Testing Plugin configured\
    \ in the `pom.xml` file.\n\nIn a Maven project, tests are run by the `maven-surefire-plugin`.\
    \ The Maven test results are saved in TXT and XML format and the files are located\
    \ in the `target/surefire-reports` directory. The test results can be grouped\
    \ into an HTML report by adding the `maven-surefire-report-plugin` to the project\
    \ configuration and configuring it to run during the test phase. This is practical\
    \ since it causes the report to be generated by running `mvn clean install` or\
    \ `mvn test`. The report is represented by a file named `surefire-report.html`\
    \ located in the `target/site` directory.\n\nTo have the report generated, the\
    \ build has to run fully, so the `maven-surefire-plugin` is configured to continue\
    \ testing, not to stop at the first failure, by setting `testFailureIgnore` to\
    \ `true`, as shown in Listing [9-40](#463938_3_En_9_Chapter.xhtml#PC61).\n\n```\n\
    <plugin>\n    <groupId>org.apache.maven.plugins</groupId>\n    <artifactId>maven-surefire-plugin</artifactId>\n\
    \    <configuration>\n        <testFailureIgnore>true</testFailureIgnore>\n  \
    \  </configuration>\n</plugin>\nListing 9-40\nThe maven-surefire-plugin Being\
    \ Configured to Ignore Test Failures\n```\n\nFor the following example, a test\
    \ failure was introduced intentionally, and the report is generated. You can see\
    \ the first part of the generated report in Figure [9-16](#463938_3_En_9_Chapter.xhtml#Fig16).\n\
    \n![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig16_HTML.jpg)\n\nFigure 9-16\n\
    \nThe Maven test report with a test failure (part 1)\n\nThe first part of the\
    \ report shows the percentage of failed tests, the package in which they are located,\
    \ and the name of the test class. The second part of the report, shown in Figure\
    \ [9-17](#463938_3_En_9_Chapter.xhtml#Fig17), shows the details of the failure.\n\
    \n![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig17_HTML.jpg)\n\nFigure 9-17\n\
    \nThe Maven test report with a test failure (part 2)\n\nUpon fixing the test,\
    \ the report becomes simpler, and the last two sections are not generated, as\
    \ depicted in Figure [9-18](#463938_3_En_9_Chapter.xhtml#Fig18).\n\n![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig18_HTML.jpg)\n\
    \nFigure 9-18\n\nThe Maven test report with no test failures and typical Maven-generated\
    \ site styling\n\n**Information**\n\nIn the first edition of this book, I used\
    \ Gradle to build this project. Because of various incompatibilities with newer\
    \ versions of Java and the difficulty of configuration, I dropped it in favor\
    \ of Maven, which is widely used and pretty stable. Unfortunately, generating\
    \ test reports requires multiple Maven plugins and the reports are not as pretty.\n\
    \n**Important**\n\nAs a conclusion of this section, remember this: no matter how\
    \ good a development team is, without a great testing team, the resulting application\
    \ might actually be far away from an acceptable quality standard. So if you ever\
    \ interview with a company that does not have a dedicated testing team, or a company\
    \ with a culture that compromises in techniques such as code review and writing\
    \ tests, think twice before accepting that job."
  raw: '#### Using Mocks


    **Mocks** are objects that register calls they receive. During execution of a
    test, using assert utility methods, the assumption that all expected actions were
    performed on mocks are tested. Thankfully, code for mocks does not have to be
    written by the developer, because there are three well-known libraries that provide
    the type of classes needed to test using mocks: Mockito^([^(83)](#fn83)), JMock^([^(84)](#fn84)),
    and EasyMock^([^(85)](#fn85)). Also, if you ever need to mock static methods—the
    most common reason being bad design (which is beyond your power to fix)—there
    is PowerMock^([^(86)](#fn86)).


    Using mocks, you can jump directly to writing the tests. Listing [9-39](#463938_3_En_9_Chapter.xhtml#PC59)
    shows two tests for the `createAccount(..)` method that focus on the repository
    class actually calling its methods, because the repository class is the one being
    replaced with a mock.


    ```

    package com.apress.bgn.nine.mock;

    // other import statements omitted

    import org.junit.jupiter.api.extension.ExtendWith;

    import org.mockito.Mock;

    import org.mockito.junit.jupiter.MockitoExtension;

    import static org.junit.jupiter.api.Assertions.*;

    import static org.mockito.ArgumentMatchers.any;

    import static org.mockito.Mockito.when;

    @ExtendWith(MockitoExtension.class)

    public class AccountServiceTest {

    public AccountService service;

    @Mock

    public AccountRepo mockRepo;

    @BeforeEach

    public void checkMocks() {

    assertNotNull(mockRepo);

    service = new AccountServiceImpl(mockRepo);

    }

    @Test

    public void testCreateAccount() {

    Account expected = new Account("Gigi", 2100, "223311");

    when(mockRepo.findOne("Gigi")).thenReturn(Optional.empty());

    when(mockRepo.save(any(Account.class))).thenReturn(expected);

    Account result = service.createAccount("Gigi", "223311", "2100");

    assertEquals(expected, result);

    }

    @Test

    public void testCreateAccountAlreadyExists() {

    Account expected = new Account("Gigi", 2100, "223311");

    when(mockRepo.findOne("Gigi")).thenReturn(Optional.of(expected));

    assertThrows(AccountCreationException.class,

    () -> service.createAccount("Gigi", "223311", "2100"));

    }

    }

    Listing 9-39

    The AccountServiceTest Unit Test Class Using a Mock Repo

    ```


    The tests are quite self-explanatory, and the `Mockito` utility methods’ names
    make it easy to understand what is actually happening during a test execution.
    Wait, you might ask, how are the mocks created and injected? Who does that?


    The `@ExtendWith(MockitoExtension.class)` annotation is necessary for JUnit 5
    tests to support `Mockito` annotations. Without it, annotations like `@InjectMocks`
    and `@Mock` have no effect on the code.


    The `@Mock` annotation is used on references to mocks created by Mockito. The
    preferred way to work with mocks is to specify a reference of an interface type
    that is implemented by the real object type and the mock that will be created
    for the test scenario. But `@Mock` can be placed on a concrete type reference
    as well, and the created mock will be a subclass of that class.


    The `@InjectMocks` annotation is used on the object to be tested, so that Mockito
    knows to create this object and inject mocks instead of the dependencies.


    This is all you need to know to start using Mockito mocks in your test. Declaring
    the objects to be replaced with mocks and the object to be injected in is the
    only setup a class containing unit tests using mocks needs.


    The body of test methods using mocks has a typical structure as well. The first
    line must declare objects and variables passed as arguments to the method called
    on the object being tested or passed as arguments to Mockito utility methods that
    declare what mocks take as arguments and what they return. The next line establishes
    the behavior of the mock when its methods are called by the object to be tested.


    The following two lines depict this for the `findOne(..)` method. The first line
    creates an `account` object. The second line defines the behavior of the mock.
    When `mockRepo.findOne("Gigi")` will be called, then the previously created account
    instance will be returned wrapped in an `Optional<T>` instance.


    ```

    Account expected = new Account("Gigi", 2100, "223311");

    when(mockRepo.findOne("Gigi")).thenReturn(Optional.of(expected));

    ```


    There are many other libraries to make writing tests as effortless as possible
    for developers, and big frameworks like Spring provide their own testing library
    to help developers write tests for applications using this framework. Build tools
    like Ant, Maven, and Gradle can be used to automatically run the tests when the
    project is built and generate useful reports related to the failures.


    Using Maven, the project can be built by calling `mvn clean install` in the console.
    All test classes declared in the test module are picked up automatically if they
    are named `*Test.java`. When writing tests, and not changing application code,
    you can just run the tests only, by calling `mvn test`. This is a configuration
    that can be changed by configuring the Maven Surefire Testing Plugin configured
    in the `pom.xml` file.


    In a Maven project, tests are run by the `maven-surefire-plugin`. The Maven test
    results are saved in TXT and XML format and the files are located in the `target/surefire-reports`
    directory. The test results can be grouped into an HTML report by adding the `maven-surefire-report-plugin`
    to the project configuration and configuring it to run during the test phase.
    This is practical since it causes the report to be generated by running `mvn clean
    install` or `mvn test`. The report is represented by a file named `surefire-report.html`
    located in the `target/site` directory.


    To have the report generated, the build has to run fully, so the `maven-surefire-plugin`
    is configured to continue testing, not to stop at the first failure, by setting
    `testFailureIgnore` to `true`, as shown in Listing [9-40](#463938_3_En_9_Chapter.xhtml#PC61).


    ```


    org.apache.maven.plugins

    maven-surefire-plugin


    org.junit.jupiter

    junit-jupiter-engine

    ${jupiter.junit.version}


    true


    Listing 9-40

    The maven-surefire-plugin Being Configured to Ignore Test Failures

    ```


    For the following example, a test failure was introduced intentionally, and the
    report is generated. You can see the first part of the generated report in Figure
    [9-16](#463938_3_En_9_Chapter.xhtml#Fig16).


    ![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig16_HTML.jpg)


    Figure 9-16


    The Maven test report with a test failure (part 1)


    The first part of the report shows the percentage of failed tests, the package
    in which they are located, and the name of the test class. The second part of
    the report, shown in Figure [9-17](#463938_3_En_9_Chapter.xhtml#Fig17), shows
    the details of the failure.


    ![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig17_HTML.jpg)


    Figure 9-17


    The Maven test report with a test failure (part 2)


    Upon fixing the test, the report becomes simpler, and the last two sections are
    not generated, as depicted in Figure [9-18](#463938_3_En_9_Chapter.xhtml#Fig18).


    ![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig18_HTML.jpg)


    Figure 9-18


    The Maven test report with no test failures and typical Maven-generated site styling


    Information


    In the first edition of this book, I used Gradle to build this project. Because
    of various incompatibilities with newer versions of Java and the difficulty of
    configuration, I dropped it in favor of Maven, which is widely used and pretty
    stable. Unfortunately, generating test reports requires multiple Maven plugins
    and the reports are not as pretty.


    Important


    As a conclusion of this section, remember this: no matter how good a development
    team is, without a great testing team, the resulting application might actually
    be far away from an acceptable quality standard. So if you ever interview with
    a company that does not have a dedicated testing team, or a company with a culture
    that compromises in techniques such as code review and writing tests, think twice
    before accepting that job.'
  trans: '

    #### 使用模拟对象


    **模拟对象**是能够记录其所接收调用的对象。在测试执行期间，通过使用断言工具方法，可以验证所有预期操作是否已在模拟对象上执行。幸运的是，开发者无需自行编写模拟对象的代码，因为有三个广为人知的库提供了使用模拟进行测试所需的类类型：Mockito^(⁸³)、JMock^(⁸⁴)
    和 EasyMock^(⁸⁵)。此外，如果你需要模拟静态方法（最常见的原因是糟糕的设计，而这超出了你的能力范围），可以使用 PowerMock^(⁸⁶)。


    使用模拟对象，你可以直接开始编写测试。清单 9-39 展示了针对 `createAccount(..)` 方法的两个测试，它们专注于验证仓库类是否实际调用了其方法，因为仓库类是被模拟对象替换的类。


    ```

    package com.apress.bgn.nine.mock;

    // 其他导入语句已省略

    import org.junit.jupiter.api.extension.ExtendWith;

    import org.mockito.Mock;

    import org.mockito.junit.jupiter.MockitoExtension;

    import static org.junit.jupiter.api.Assertions.*;

    import static org.mockito.ArgumentMatchers.any;

    import static org.mockito.Mockito.when;

    @ExtendWith(MockitoExtension.class)

    public class AccountServiceTest {

    public AccountService service;

    @Mock

    public AccountRepo mockRepo;

    @BeforeEach

    public void checkMocks() {

    assertNotNull(mockRepo);

    service = new AccountServiceImpl(mockRepo);

    }

    @Test

    public void testCreateAccount() {

    Account expected = new Account("Gigi", 2100, "223311");

    when(mockRepo.findOne("Gigi")).thenReturn(Optional.empty());

    when(mockRepo.save(any(Account.class))).thenReturn(expected);

    Account result = service.createAccount("Gigi", "223311", "2100");

    assertEquals(expected, result);

    }

    @Test

    public void testCreateAccountAlreadyExists() {

    Account expected = new Account("Gigi", 2100, "223311");

    when(mockRepo.findOne("Gigi")).thenReturn(Optional.of(expected));

    assertThrows(AccountCreationException.class,

    () -> service.createAccount("Gigi", "223311", "2100"));

    }

    }

    清单 9-39

    使用模拟仓库的 AccountServiceTest 单元测试类

    ```


    这些测试相当不言自明，`Mockito` 工具方法的命名也使得理解测试执行过程中实际发生的情况变得容易。等等，你可能会问，模拟对象是如何创建和注入的？是谁做的这些？


    `@ExtendWith(MockitoExtension.class)` 注解对于 JUnit 5 测试支持 `Mockito` 注解是必需的。没有它，像
    `@InjectMocks` 和 `@Mock` 这样的注解对代码没有影响。


    `@Mock` 注解用于由 Mockito 创建的模拟对象的引用。使用模拟对象的首选方式是指定一个接口类型的引用，该接口由真实对象类型和将为测试场景创建的模拟对象共同实现。但
    `@Mock` 也可以放在具体类型引用上，创建的模拟对象将是该类的子类。


    `@InjectMocks` 注解用于待测试的对象，这样 Mockito 就知道要创建这个对象并注入模拟对象来替代依赖项。


    这就是你在测试中开始使用 Mockito 模拟对象所需了解的全部内容。声明要替换为模拟对象的对象以及要注入的对象，是包含使用模拟对象的单元测试的类所需的唯一设置。


    使用模拟对象的测试方法体也具有典型的结构。第一行必须声明对象和变量，这些对象和变量将作为参数传递给被测对象上调用的方法，或作为参数传递给声明模拟对象接受什么参数以及返回什么结果的
    Mockito 工具方法。下一行则建立模拟对象在被测对象调用其方法时的行为。


    以下两行展示了 `findOne(..)` 方法的这种情况。第一行创建了一个 `account` 对象。第二行定义了模拟对象的行为。当调用 `mockRepo.findOne("Gigi")`
    时，先前创建的 account 实例将被包装在 `Optional<T>` 实例中返回。


    ```

    Account expected = new Account("Gigi", 2100, "223311");

    when(mockRepo.findOne("Gigi")).thenReturn(Optional.of(expected));

    ```


    还有许多其他库旨在让开发者尽可能轻松地编写测试，像 Spring 这样的大型框架也提供了自己的测试库，以帮助开发者为使用该框架的应用程序编写测试。像 Ant、Maven
    和 Gradle 这样的构建工具可用于在构建项目时自动运行测试，并生成与失败相关的有用报告。


    使用 Maven，可以通过在控制台中调用 `mvn clean install` 来构建项目。测试模块中声明的所有测试类，如果命名为 `*Test.java`，都会被自动识别。在编写测试而不更改应用程序代码时，你可以仅通过调用
    `mvn test` 来运行测试。这是一种可以通过配置 `pom.xml` 文件中的 Maven Surefire Testing 插件来更改的配置。


    在 Maven 项目中，测试由 `maven-surefire-plugin` 运行。Maven 测试结果以 TXT 和 XML 格式保存，文件位于 `target/surefire-reports`
    目录中。可以通过将 `maven-surefire-report-plugin` 添加到项目配置中，并将其配置为在测试阶段运行，从而将测试结果分组到 HTML
    报告中。这很实用，因为通过运行 `mvn clean install` 或 `mvn test` 即可生成报告。该报告由位于 `target/site` 目录中名为
    `surefire-report.html` 的文件表示。


    为了生成报告，构建必须完整运行，因此通过将 `testFailureIgnore` 设置为 `true`，将 `maven-surefire-plugin`
    配置为继续测试，而不是在第一次失败时停止，如清单 9-40 所示。


    ```


    org.apache.maven.plugins

    maven-surefire-plugin


    org.junit.jupiter

    junit-jupiter-engine

    ${jupiter.junit.version}


    true


    清单 9-40

    配置为忽略测试失败的 maven-surefire-plugin

    ```


    在以下示例中，故意引入了一个测试失败，并生成了报告。你可以在图 9-16 中看到生成报告的第一部分。


    ![](img/463938_3_En_9_Fig16_HTML.jpg)


    图 9-16


    包含一个测试失败的 Maven 测试报告（第 1 部分）


    报告的第一部分显示了失败测试的百分比、它们所在的包以及测试类的名称。报告的第二部分（如图 9-17 所示）显示了失败的详细信息。


    ![](img/463938_3_En_9_Fig17_HTML.jpg)


    图 9-17


    包含一个测试失败的 Maven 测试报告（第 2 部分）


    修复测试后，报告变得更简单，最后两个部分不再生成，如图 9-18 所示。


    ![](img/463938_3_En_9_Fig18_HTML.jpg)


    图 9-18


    没有测试失败且具有典型 Maven 生成站点样式的 Maven 测试报告


    信息


    在本书的第一版中，我使用 Gradle 来构建这个项目。由于与较新版本的 Java 存在各种不兼容问题以及配置困难，我转而使用 Maven，它被广泛使用且相当稳定。不幸的是，生成测试报告需要多个
    Maven 插件，并且报告并不那么美观。


    重要


    作为本节的结论，请记住：无论一个开发团队多么优秀，如果没有一个出色的测试团队，最终生成的应用程序可能远未达到可接受的质量标准。因此，如果你面试的公司没有专门的测试团队，或者公司文化在代码审查和编写测试等技术上有所妥协，那么在接受这份工作之前请三思。'
- fmt: "# Documenting\n\nIn the software world there is a joke about documentation\
    \ that might not be to everybody’s liking, but it is worth a mention: *Documentation\
    \ is like sex. When it’s good, it’s really, really good. And when it’s bad, it’s\
    \ still better than nothing*.\n\nA commonsense rule and best practice of programming\
    \ is to write code that is self-explanatory, which lessens the need to write much\
    \ documentation. Basically, if you need to write too much documentation, you’re\
    \ programming wrong. There are many ways to make your code self-explanatory to\
    \ obviate the need to write lots of documentation, such as using meaningful names\
    \ for classes and variables and respecting the language code conventions. However,\
    \ when you are building a set of classes that will be used by other developers,\
    \ you need to provide some documentation for the main APIs. If your solution requires\
    \ a very complicated algorithm to be written, you might want to add comments about\
    \ it here and there, although in this case, proper technical documentation with\
    \ schemas and diagrams should be written too.\n\nRecall that in Chapter [3](#463938_3_En_3_Chapter.xhtml)\
    \ I introduced the different types of comments and promised to provide more details\
    \ regarding Javadoc comments in this chapter. We’ve reached that point. Javadoc\
    \ block comments, also called *documentation comments*, can be found associated\
    \ with a public class, interface, method body, public field, and sometimes even\
    \ protected or private components if really necessary. Javadoc comments contain\
    \ special tags that link documented elements together or mark the different types\
    \ of information. Javadoc comments and their associated code can be processed\
    \ by Javadoc tools, extracted, and wrapped together into an HTML site, which is\
    \ called the Javadoc API of the project. The Maven configuration of this project\
    \ declares a few reporting plugins and among them `maven-site-plugin` that is\
    \ configured to wrap together all reports into a static site for the project that\
    \ can be found under `target/site`.\n\n**Important:** The project site is generated\
    \ by executing `mvn site`.\n\nSmart editors can download and access documentation\
    \ of a project and display it when the developer tries to write code using the\
    \ documented components, so good code documentation considerably increases the\
    \ speed of the development process. Let’s start with a few examples of Javadoc\
    \ comments, to explain the most important tags used.\n\nWhenever we create a class\
    \ or interface, we should add Javadoc comments to explain its purpose, identify\
    \ the version of the application in which the class or interface was added, and\
    \ eventually link some existing resources. The “Logging” section early in this\
    \ chapter introduced the `IntSorter` hierarchy (see Figure [9-1](#463938_3_En_9_Chapter.xhtml#Fig1)),\
    \ a hierarchy of classes implementing the `IntSorter` interface that provide implementations\
    \ of different sorting algorithms. When other developers use these classes, they\
    \ might want to add a customized algorithm to the `IntSorter` hierarchy. Some\
    \ information about the `IntSorter` interface would help them a lot in designing\
    \ a proper solution. Listing [9-41](#463938_3_En_9_Chapter.xhtml#PC62) shows a\
    \ Javadoc comment added to the `IntSorter` interface.\n\n```\npackage com.apress.bgn.nine.algs;\n\
    /**\n* Interface {@code IntSorter} is an interface that needs to be implemented\n\
    * by classes that provide a method to sort an array of {@code int} values. \n\
    *\n* {@code int[]} was chosen as a type because int values are sortable efficiently\
    \ ({@link Comparable})\n*\n* \n*     You can use any implementation like this:\n\
    *      {@snippet id=\"highlighting\" lang=\"java\" :\n*       IntSorter mergeSort\
    \ = new MergeSort(); // @highlight type=highlighted\n*      mergeSort.sort(arr,0,arr.length-1);\n\
    *     }\n*     where {@code arr} is an {@code int[]}\n* \n* @author Iuliana Cosmina\n\
    * @since 1.0\n*/\npublic interface IntSorter {\n// interface body omitted\n}\n\
    Listing 9-41\nThe Documentation Comment on the IntSorter Interface\n```\n\nIn\
    \ the Javadoc comments, HTML tags can be used to format information. In the code\
    \ in Listing [9-41](#463938_3_En_9_Chapter.xhtml#PC62), a `<p>` element is used\
    \ to make sure the comment will consist of two paragraphs instead of one.\n\n\
    The `@author` tag, introduced in JDK 1.0, is useful when the development team\
    \ is quite big, because if you end up working with somebody else’s code, you know\
    \ who to consult in case issues appear.\n\nThe `@since` tag is used to identify\
    \ the version of the application in which this interface was added. For an application\
    \ that has had a long development and release cycle, this tag can be used to mark\
    \ elements (methods, classes, fields, etc.) of a specific version, so that a developer\
    \ using the codebase of your application knows when elements were added and, in\
    \ case of a rollback to a previous version, will know where in their application\
    \ compile-time errors might appear.\n\nThe best example of using the `@since`\
    \ tag is the Java official Javadoc. Let’s focus on the `String` class. It was\
    \ introduced in Java version 1.0, but more constructors and methods were added\
    \ to it with every Java version being released. Each of the constructors and methods\
    \ is marked with the specific versions. Listing [9-42](#463938_3_En_9_Chapter.xhtml#PC63)\
    \ depicts code snippets and documentation comments that prove the previous affirmation.\n\
    \n```\npackage java.lang;\n// import statements omitted\n/**\n* // omitted\n*\
    \ @since   1.0\n*/\npublic final class String\nimplements java.io.Serializable,\
    \ Comparable, CharSequence,\nConstable, ConstantDesc {\n/**\n* ...\n* @since \
    \ 1.1\n*/\npublic String(byte[] bytes, int offset, int length, String charsetName)\n\
    throws UnsupportedEncodingException {\nthis(lookupCharset(charsetName), bytes,\
    \ checkBoundsOffCount(offset, length, bytes.length), length);\n}\n/**\n* ...\n\
    * @since  1.4\n*/\npublic boolean contentEquals(StringBuffer sb) {\n// method\
    \ body omitted\n}\n/**\n* ...\n* @since  1.5\n*/\npublic String(int[] codePoints,\
    \ int offset, int count) {\n// method body omitted\n}\n/**\n* ...\n* @since  1.6\n\
    */\npublic String(byte[] bytes, int offset, int length, Charset charset) {\n//\
    \ method body omitted\n}\n/**\n* ...\n* @since 1.8\n*/\npublic static String join(CharSequence\
    \ delimiter, CharSequence... elements) {\n// method body omitted\n}\n/**\n* ...\n\
    * @since 9\n*/\n@Override\npublic IntStream codePoints() {\n// method body omitted\n\
    }\n/**\n* ...\n* @since 11\n*/\npublic String strip() {\n// method body omitted\n\
    }\n/**\n* ...\n* @since 12\n*/\npublic String indent(int n) {\n// method body\
    \ omitted\n}\n/**\n* ...\n* @since 15\n*/\npublic String stripIndent() {\n// method\
    \ body omitted\n}\n}\nListing 9-42\nThe Documentation Comments in the String Class\n\
    ```\n\nIn the `IntSorter` example in Listing [9-41](#463938_3_En_9_Chapter.xhtml#PC62),\
    \ you might have noticed the `@code` tag. This tag was introduced in Java 1.5\
    \ and is used to display text in code form by using a special font and escaping\
    \ symbols that might break the HTML syntax (e.g., `<` or `>`).\n\nThe `@link`\
    \ tag was added in Java 1.2 and is used to insert a navigable link to relevant\
    \ documentation.\n\nThe `@snippet` tag was introduced in Java 18 to easily integrate\
    \ code snippets into documentation. It provides a lot of attributes to support\
    \ documentation text formatting that enables developers to make important pieces\
    \ in their code *pop*. As just mentioned, adding code snippets was possible before\
    \ Java 18 with the `@code` annotation, but it was quite limited, as it treated\
    \ the code like normal text.\n\nListing [9-43](#463938_3_En_9_Chapter.xhtml#PC64)\
    \ shows an even better documented version of the `IntSorter` interface, which\
    \ contains documentation comments for the methods so that developers implementing\
    \ it know how its methods should be used."
