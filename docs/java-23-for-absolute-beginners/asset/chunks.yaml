    # 6. 运算符


    前面的章节涵盖了 Java 编程的基本概念。你学习了如何组织代码、如何命名文件，以及根据要解决的问题可以使用哪些数据类型。你还学习了如何声明字段、变量和方法，以及它们如何存储在内存中，以帮助你设计解决方案，使资源消耗达到最佳。


    在本章中，你将学习如何使用运算符组合声明的变量。大多数 Java 运算符与你从数学中了解的运算符相同，但由于编程涉及数字类型以外的其他类型，Java 包含了具有特定用途的额外运算符。表
    6-1 列出了所有 Java 运算符及其类别和范围。


    **表 6-1 Java 运算符**


    | 类别 | 运算符 | 范围 |

    | --- | --- | --- |

    | 类型转换 | `(type)` | 显式类型转换。 |

    | 一元，后缀 | `expr++`, `expr--` | 后置递增/递减。 |

    | 一元，前缀 | `++expr`, `--expr` | 前置递增/递减。 |

    | 一元 | `+expr`, `-expr` | 符号。 |

    | 一元，逻辑 | `!` | 取反。 |

    | 一元，按位 | `~` | 按位取反。对整数值逐位取反。 |

    | 乘法，二元 | `*, /, %` | 对于数值类型：乘法、除法、除法并返回余数。 |

    | 加法，二元 | `+, -` | 对于数值类型：加法、减法。`+`也用于`String`连接。 |

    | 位移，二元 | `>>, >>>` | 对于数值类型：乘以和除以 2 的幂，有符号和无符号。 |

    | 条件，关系 | `instanceof` | 测试对象是否为指定类型（类、子类或接口）的实例。 |

    | 条件，关系 | `==, !=, <, >, <=, >=` | 等于、不等于、小于、大于、小于等于、大于等于。 |

    | 与，二元 | `&` | 按位逻辑与。 |

    | 异或，二元 | `^` | 按位逻辑异或。 |

    | 或，二元 | `&#124;` | 按位逻辑或。 |

