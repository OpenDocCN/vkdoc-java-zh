    \ true;\nif (o == null || getClass() != o.getClass()) return false;\nBall ball\
    \ = (Ball) o;\nreturn diameter == ball.diameter &&\ncolor.equals(ball.color) &&\n\
    material.equals(ball.material);\n}\n@Override\npublic int hashCode() {\nint result\
    \ = 17 * diameter;\nresult = 31 * result + (color == null ? 0 : color.hashCode());\n\
    result = 31 * result + (material == null ? 0 : material.hashCode());\nreturn result;\n\
    }\n// 其他代码已省略\n}\n// 输出\n//Set size: 2\n//Duplicate ball not added to the set.\n\
    //Set size: 2\n代码清单 5-41\n基本的 equals(..) 和 hashCode() 实现\n```\n\n在 Java 1.7 之前，开发人员必须为所有可能用于\
    \ `Set<E>` 或作为 `Map<K,V>` 键的类编写类似于代码清单 5-41 中的 `equals(..)` 和 `hashCode()` 实现。这些实现必须基于类中最重要的字段的值；17\
    \ 和 31 只是用于计算 `hashCode()` 返回值的两个随机整数。\n\nJava 1.7 引入了 `java.util.Objects` 类，提供了实用方法来简化\
    \ `equals(..)` 和 `hashCode()` 的实现。代码清单 5-42 展示了 Java 1.7 之后的 `equals(..)` 和 `hashCode()`\
    \ 实现。\n\n```\npackage com.apress.bgn.five;\nimport java.util.HashSet;\nimport\
    \ java.util.Objects;\nimport java.util.Set;\nimport static java.lang.System.out;\n\
    public class SetDemo {\nvoid main() {\nSet ballSet = new HashSet();\nballSet.add(new\
    \ Ball(2, \"RED\", \"rubber\"));\nballSet.add(new Ball(4, \"BLUE\", \"cotton\"\
    ));\nout.println(\"Set size: \" +  ballSet.size());\nBall duplicate = new Ball(2,\
    \ \"RED\", \"rubber\");\nboolean wasAdded = ballSet.add(duplicate);\nif(!wasAdded)\
    \ {\nout.println(\"Duplicate ball not added to the set. \");\nout.println(\"Set\
    \ size: \" +  ballSet.size());\n}\n}\n}\nclass Ball {\nprivate int diameter;\n\
    private String color;\nprivate String material;\n@Override\npublic boolean equals(Object\
    \ o) {\nif (this == o) return true;\nif (o == null || getClass() != o.getClass())\
    \ return false;\nBall ball = (Ball) o;\nreturn diameter == ball.diameter &&\n\
    Objects.equals(color, ball.color) &&\nObjects.equals(material, ball.material);\n\
    }\n@Override\npublic int hashCode() {\nreturn Objects.hash(diameter, color, material);\n\
    }\n// 其他代码已省略\n}\n// 输出\n//Set size: 2\n//Duplicate ball not added to the set.\n\
    //Set size: 2\n代码清单 5-42\nJava 1.7 之后的 equals(..) 和 hashCode() 基本实现\n```\n\n从\
    \ Java 14 开始，事情变得更加简单，因为像 `Ball` 这样的类可以写成记录（record），如代码清单 5-43 所示。\n\n```\npackage\
    \ com.apress.bgn.five;\nimport java.util.HashSet;\nimport java.util.Objects;\n\
    import java.util.Set;\nimport static java.lang.System.out;\npublic class SetDemo\
    \ {\nvoid main() {\n// 与代码清单 5-42 相同\n}\n}\nrecord Ball(int diameter, String colour,\
    \ String material) {}\n// 输出\n//Set size: 2\n//Duplicate ball not added to the\
    \ set.\n//Set size: 2\n代码清单 5-43\n将 Ball 类写为记录以避免实现 equals(..) 和 hashCode()\n\
    ```\n\n执行代码清单 5-43 中的代码会产生与代码清单 5-42 中代码相同的结果，从而证明 Java 编译器生成的 `equals(..)` 方法是有效的。\n\
    \n`Map<K,V>` 的实现有一些不同之处，因为它们模拟的是键/值对的集合。编程中最常用的映射接口和类的简化层次结构如图 5-21 所示。\n\n![](img/463938_3_En_5_Fig21_HTML.jpg)\n\
    \n图 5-21\n\n映射层次结构\n\n代码清单 5-44 中的代码展示了创建和初始化一个映射的过程，该映射使用 `Ball` 类型的键和 `Integer`\
    \ 类型的值。你可以将这个映射实例想象成表示一个桶中相同球的数量。\n\n```\npackage com.apress.bgn.five;\nimport\
    \ java.util.HashMap;\nimport java.util.Map;\npublic class MapDemo {\nvoid main(String...\
    \ args) {\nMap ballMap = new HashMap();\nballMap.put(new Ball(2, \"RED\", \"rubber\"\
    ), 5);\nballMap.put(new Ball(4, \"BLUE\", \"cotton\"), 7);\nfor (Map.Entry entry\
    \ : ballMap.entrySet()) {\nSystem.out.println(entry.getKey() + \": \" + entry.getValue());\n\
    }\n}\n}\n//输出\n/*\nBall[diameter=2, colour=RED, material=rubber]: 5\nBall[diameter=4,\
    \ colour=BLUE, material=cotton]: 7\n*/\n代码清单 5-44\n映射代码示例\n```\n\n从 `for` 循环中你可以推断出，映射实际上是\
    \ `Map.Entry<K, V>` 元素的集合。继续看 Java 1.7 的语法，通过应用 `<>`（菱形）运算符，映射的声明变得更简单：\n\n```\n\
    Map ballMap = new HashMap();\n```\n\n进一步到 Java 1.8，由于引入了 `forEach(..)` 方法和 lambda\
    \ 表达式，映射的遍历和打印值也变得更加实用：\n\n```\nballMap.forEach((k,v) -> System.out.println(k\
    \ + \": \" + v));\n```\n\n而在 Java 9 中，声明和填充映射也变得更加容易：\n\n```\nMap ballMap = Map.of(new\
    \ Ball(2, \"RED\", \"rubber\"), 5, new Ball(4, \"BLUE\", \"cotton\"), 7);\n```\n\
    \nJava 10 增加了 `var` 来进一步简化声明：\n\n```\nvar ballMap = Map.of(new Ball(2, \"RED\"\
    , \"rubber\"), 5, new Ball(4, \"BLUE\", \"cotton\"), 7);\n```\n\n在结束本节之前，还需要提及另一件事：当向映射中添加键/值对且该键已存在时会发生什么。正如你可能预料的那样，映射中现有的键/值对会被覆盖。在\
    \ Java 8 之前，要编写代码防止这种情况导致一组值丢失，需要检查键是否存在，如果不存在才添加新的键值对，如代码清单 5-45 所示。\n\n```\n\
    package com.apress.bgn.five;\nimport java.util.HashMap;\nimport java.util.Map;\n\
    public class MapDemo {\nvoid main(String... args) {\nMap ballMap = new HashMap();\n\
    Ball redBall = new Ball(2, \"RED\", \"rubber\");\nballMap.put( redBall, 5);\n\
    ballMap.put(new Ball(4, \"BLUE\", \"cotton\"), 7);\n//ballMap.put( redBall, 3);\
    \ // 这会覆盖条目 \nif(!ballMap.containsKey(redBall)) {\nballMap.put(redBall, 3);\n\
    }\nfor (Map.Entry entry : ballMap.entrySet()) {\nSystem.out.println(entry.getKey()\
    \ + \": \" + entry.getValue());\n}\n}\n}\n代码清单 5-45\nJava 8 之前防止键/值对覆盖\n```\n\n\
    在 Java 8 中，`Map<K,V>` 接口添加了一组实用的方法，以简化使用映射编写的代码，包括代码清单 5-46 中描述的 `putIfAbsent(..)`\
    \ 方法，它替换了代码清单 5-45 中标记的语句。\n\n```\npackage com.apress.bgn.five;\nimport java.util.HashMap;\n\
    import java.util.Map;\npublic class MapDemo {\nvoid main(String... args) {\nMap\
    \ ballMap = new HashMap();\nBall redBall = new Ball(2, \"RED\", \"rubber\");\n\
    ballMap.put( redBall, 5);\nballMap.put(new Ball(4, \"BLUE\", \"cotton\"), 7);\n\
    ballMap.putIfAbsent(redBall, 3);\nfor (Map.Entry entry : ballMap.entrySet()) {\n\
    System.out.println(entry.getKey() + \": \" + entry.getValue());\n}\n}\n}\n代码清单\
    \ 5-46\nJava 8 之后防止键值对覆盖\n```\n"
- fmt: '# The JDK Classes for Working with Collections


    The JDK classes for working with collections cover a wide range of functionality,
    like sorting, searching, merging collections, intersections, conversions to/from
    arrays, and so on. As the book advances, the context of the code samples will
    widen, and we will be able to use collections to solve real-life problems.


    ## Concurrency-Specific Types


    Previously in the book it was mentioned from time to time that a Java program
    can run multiple threads in parallel. The abstract concept to support that is
    referred to as executing multiple threads. There are a few Java-specific types
    used to implement parallel processing, and this section introduces them to you.


    ### Classic Thread Creation (Before Java 21)


    By default, when a Java program is executed, a thread is created for the code
    that is called from the `main(..)` method. A few other utility threads are created
    and executed in parallel for JVM-related things. These threads can be accessed
    easily by using static utility methods defined in the `java.lang.Thread` class.
    The code in Listing [5-47](#463938_3_En_5_Chapter.xhtml#PC86) does just that,
    extracts the references to the `Thread` instances and prints their name to the
    console.


    ```

    package com.apress.bgn.five;

    public class ListJvmThreads {

    void main() {

    var threadSet = Thread.getAllStackTraces().keySet();

    var threadArray = threadSet.toArray(new Thread[threadSet.size()]);

    for (int i = 0; i < threadArray.length; ++i) {

    System.out.println("thread name: " + threadArray[i].getName());

    }

    }

    }

    // output

    /*

    thread name: main

    thread name: Signal Dispatcher

    thread name: Common-Cleaner

    thread name: Monitor Ctrl-Break

    thread name: Reference Handler

    thread name: Notification Thread

    thread name: Finalizer

    */

    Listing 5-47

    Preventing Key/Pair Overwriting After Java 8

    ```


    The output shown in Listing [5-47](#463938_3_En_5_Chapter.xhtml#PC86) was produced
    when running the code on JDK 23.ea, on a macOS computer, in IntelliJ IDEA. The
    threads listed have the following responsibilities:


    - `main` executes the developer-written code. The developer can write code to
    start its own threads from the main thread.

    - `Reference Handler` takes unused objects and adds them to a queue to be evicted.

    - `Finalizer` is a low-priority JVM thread that executes the `finalize()` method
    of each object in a queue waiting to be evicted from memory. This method can be
    overwritten by developers explicitly to free resources linked to objects about
    to be evicted.

    - `Common-Cleaner` is a low-priority JVM thread that is in charge of lightweight
    cleanup of objects without using finalization.

    - `Monitor Ctrl-Break` is a thread created by IntelliJ IDEA, since the code is
    executed using this editor that probably watches the execution and picks up the
    output so it can display it.

    - `Signal Dispatcher` handles native signals sent by an operating system to the
    JVM.

    - `Notification Thread` handles notifications sent by an operating system to the
    JVM.


    Except for `main`, `Monitor Ctrl-Break` (which is not a JVM application thread)
    and `Common-Cleaner`, all the other three are system threads that ensure the JVM
    collaborates with the operating system. Except for `main`, all other threads are
    called daemon threads. They have low priority, and they provide services to user
    threads, which is what the `main` thread is. These are the only two types of threads
    in Java.


    The developer can write code to start its own threads from the main thread. A
    thread is the smallest unit of processing that can be scheduled. The simplest
    way to create a custom thread is to create a class that extends the `Thread` class.
    The `Thread` class implements an interface named `Runnable` that declares a single
    method named `run()`. The `Thread` class declares a method named `start()`. When
    this method is called, the body of the `run()` method is executed in a separate
    execution thread than the one calling `start()`.


    **Note**


    The internals of thread management is much more complicated, so this section just
    scratches the surface.


    Thus, when extending the `Thread` class or implementing the `Runnable` interface
    directly, the `run()` method must be overridden.'
