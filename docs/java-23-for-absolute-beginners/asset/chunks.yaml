  trans: '

    ## `if-else` 语句


    Java 中最简单的决策流语句是 `if-else` 语句（其他语言可能也是如此）。在前几章的代码示例中，你已经见过 `if-else` 语句的使用；这是无法避免的，因为提供可运行代码并鼓励你自行编写，是本书的一个重要目标。本节将严格聚焦于这类语句。


    让我们设想这样一个场景：我们运行一个 Java 程序，用户提供一个数值参数。如果该数字是偶数，我们在控制台打印 EVEN；否则，打印 ODD。匹配该场景的流程图如图
    7-2 所示。


    ![](img/463938_3_En_7_Fig2_HTML.jpg)


    图 7-2


    `if-else` 流程图示例


    条件会被求值为一个 `boolean` 值：如果结果为 `true`，则执行 `if` 分支对应的语句；如果结果为 `false`，则执行 `else` 分支对应的语句。


    实现该流程图所描述过程的 Java 代码如代码清单 7-2 所示。


    ```

    package com.apress.bgn.seven;

    public class IfElseFlowDemo {

    void main(String... args){

    int a = Integer.parseInt(args[0]);

    if (a % 2 == 0) { // 是偶数

    //显示 EVEN

    System.out.println("EVEN");

    } else {

    //显示 ODD

    System.out.println("ODD");

    }

    }

    }

    代码清单 7-2

    包含 if-else 语句的 Java 代码

    ```


    要使用不同参数运行此类，你需要创建一个 IntelliJ IDEA 启动器，并在 `Program arguments` 文本字段中添加参数，如本书开头所述。代码清单
    7-2 中的每条 Java 语句都配有一个与流程图元素对应的注释，以使实现意图一目了然。


    请注意，`if` 语句的两个分支并非都是必需的。`else` 分支并非总是必要。有时你只想在某个值满足条件时打印一些内容，而不关心其他情况。例如，给定一个用户提供的参数，我们只想在数字为负数时打印一条消息，但如果数字为正数，我们并不想打印或执行任何其他操作。对应的流程图如图
    7-3 所示。


    ![](img/463938_3_En_7_Fig3_HTML.jpg)


    图 7-3


    缺少 `else` 分支的 `if` 流程图示例


    匹配该流程图的 Java 代码如代码清单 7-3 所示。


    ```

    package com.apress.bgn.seven;

    public class IfFlowDemo {

    public static void main(String... args) {

    int a = Integer.parseInt(args[0]);

    if (a < 0) {

    System.out.println("Negative");

    }

    }

    }

    代码清单 7-3

    包含 if 语句的 Java 代码

    ```


    同样，语句可以很简单，我们也可以在需要时将多个 `if-else` 语句链接起来。考虑以下示例：用户输入一个 1 到 12 之间的数字，我们需要打印该数字对应月份的季节。图
    7-4 所示的流程图符合该场景。


    ![](img/463938_3_En_7_Fig4_HTML.jpg)


    图 7-4


    复杂的 `if-else` 流程图示例


    重要提示


    当 `if` 或 `else` 的代码块只包含一条语句时，花括号不是必需的。大多数开发者会保留它们以保持代码清晰，并帮助 IDE 正确缩进代码。


    看起来很复杂，对吧？等你看到代码清单 7-4 中的代码就知道了。


    ```

    package com.apress.bgn.seven;

    public class SeasonsDemo {

    void main(String... args) {

    int a = Integer.parseInt(args[0]);

    if(a == 12 || (a>=1 && a2 && a 5 && a 8 && a <= 11 ) {

    System.out.println("Autumn");

    } else {

    System.out.println("Error");

    }

    }

    }

    }

    }

    }

    代码清单 7-4

    包含大量 if-else 语句的 Java 代码

    ```


    看起来很丑，对吧？幸运的是，Java 提供了一种简化方法，尤其是因为拥有这么多仅包含另一个 `if` 语句的 `else` 块确实毫无意义。简化后的代码将
    `else` 语句与其包含的 `if(s)` 语句连接起来。最终代码如代码清单 7-5 所示。


    ```

    package com.apress.bgn.seven;

    public class CompactedSeasonDemo {

    void main(String... args) {

    int a = Integer.parseInt(args[0]);

    if (a == 12 || (a >= 1 && a  2 && a  5 && a  8 && a <= 11) {

    System.out.println("Autumn");

    } else {

    System.out.println("Error");

    }

    }

    }

    代码清单 7-5

    包含紧凑型 if-else 语句的 Java 代码

    ```


    任何不在 `[1,12]` 范围内的用户输入参数都会导致程序打印 *Error*。你可以通过修改 IntelliJ IDEA 启动器自行测试。需要关注的重点元素已在图
    7-5 中加下划线标出。


    ![](img/463938_3_En_7_Fig5_HTML.jpg)


    图 7-5


    IntelliJ IDEA 启动器与参数


    ## switch


    当某个解决方案需要针对一组固定值执行不同操作时，`if` 语句可能会变得复杂。在这种情况下，更合适的语句是 `switch` 语句或 `switch` 表达式。

    '
- fmt: "### The Classic `switch` Statement\n\nThe original `switch` statement, which\
    \ we will refer to as the classic `switch` statement, has been part of the Java\
    \ language since its conception.\n\nLet’s look at the code in Listing [7-6](#463938_3_En_7_Chapter.xhtml#PC6)\
    \ first, and then check what more can be improved.\n\n```\npackage com.apress.bgn.seven.switchst;\n\
    import static java.lang.System.out;\npublic class SeasonSwitchDemo {\nvoid main(String...\
    \ args) {\n//Read a\nint a = Integer.parseInt(args[0]);\nvar season = \"\";\n\
    switch (a) {\ncase 1:\nseason = \"Winter\";\nbreak;\ncase 2:\nseason = \"Winter\"\
    ;\nbreak;\ncase 3:\nseason = \"Spring\";\nbreak;\ncase 4:\nseason = \"Spring\"\
    ;\nbreak;\ncase 5:\nseason = \"Spring\";\nbreak;\ncase 6:\nseason = \"Summer\"\
    ;\nbreak;\ncase 7:\nseason = \"Summer\";\nbreak;\ncase 8:\nseason = \"Summer\"\
    ;\nbreak;\ncase 9:\nseason = \"Autumn\";\nbreak;\ncase 10:\nseason = \"Autumn\"\
    ;\nbreak;\ncase 11:\nseason = \"Autumn\";\nbreak;\ncase 12:\nseason = \"Winter\"\
    ;\nbreak;\ndefault:\nout.println(\"Error\");\n}\nout.println(\">> Result: \" +\
    \ season);\n}\n}\nListing 7-6\nJava Code with Detailed switch Statement\n```\n\
    \nThat does not look very practical, at least not for this scenario. The general\
    \ template of the classic `switch` statement is depicted in Listing [7-7](#463938_3_En_7_Chapter.xhtml#PC7).\n\
    \n```\nswitch ([onvar]) {\ncase [option]:\n[statement;]\nbreak;\n...\ndefault:\n\
    [statement;]\n}\nListing 7-7\nGeneral Template of the switch Statement\n```\n\n\
    The terms in square brackets are detailed in the list here:\n\n- `[onvar]`: The\
    \ variable that is tested against the `case` statements to select a statement.\
    \ It can be of any primitive type, enumerations, and (starting with Java 7) `String`.\
    \ Clearly the `switch` statement is not limited by conditions evaluated to boolean\
    \ results, which allows for a lot of flexibility.\n- `case [option]`: A value\
    \ the variable mentioned previously is matched upon to make a decision regarding\
    \ the statement to execute (a case, as the keyword states).\n- `[statement]`:\
    \ A statement or a group of statements to execute when `[onvar] == [option]`.\
    \ Considering that there is no `else` branch, we have to make sure that only the\
    \ statement(s) corresponding to the first match is executed, which is where the\
    \ `break;` statement comes in. The `break;` statement stops the current execution\
    \ path and moves the execution point to the next statement outside the statement\
    \ that contains it. Without `break;` statements the behavior switches to fall-through,\
    \ which means every `case` statement after the match is executed until a `break;`\
    \ is found. Without it, after the first match, all subsequent cases are traversed\
    \ and statements corresponding to them will be executed.\n    - If we execute\
    \ the program in Listing [7-6](#463938_3_En_7_Chapter.xhtml#PC6) and provide the\
    \ number 7 as an argument, the text *Summer* will be printed.\n    - If the `break`\
    \ statements for case 7 and 8 are commented, the output changes to *Autumn*.\n\
    - `default [statement;]`: A statement that is executed when no match on a `case`\
    \ has been found; the `default` case does not need a `break` statement. If the\
    \ program in Listing [7-6](#463938_3_En_7_Chapter.xhtml#PC6) is run with any number\
    \ outside the `[1-12]` interval, *Error* will be printed, because the default\
    \ statement will be executed.\n\nNow that you understand how `switch` works, let’s\
    \ see how we can reduce the previous statement. The months example is suitable\
    \ here because it can be modified further to show how the `switch` statement can\
    \ be simplified when a single statement should be executed for multiple cases.\
    \ In our code, writing each assignment statement three times is a little redundant.\
    \ There are also a lot of `break;` statements. There are two ways in which the\
    \ previous `switch` statement can be improved.\n\nThe first way of simplifying\
    \ the `switch` statement in Listing [7-6](#463938_3_En_7_Chapter.xhtml#PC6) is\
    \ by grouping together the cases that return the same value, as shown in Listing\
    \ [7-8](#463938_3_En_7_Chapter.xhtml#PC8).\n\n```\npackage com.apress.bgn.seven.switchst;\n\
    import static java.lang.System.out;\npublic class SimplifiedSwitchDemo {\nvoid\
    \ main(String... args){\n//Read a\nint a = Integer.parseInt(args[0]);\nvar season\
    \ = \"\";\nswitch (a) {\ncase 1:\ncase 2:\ncase 12:\nseason = \"winter\";\nbreak;\n\
    case 3:\ncase 4:\ncase 5:\nseason = \"Spring\";\nbreak;\ncase 6:\ncase 7:\ncase\
    \ 8:\nseason = \"Summer\";\nbreak;\ncase 9:\ncase 10:\ncase 11:\nseason = \"Autumn\"\
    ;\nbreak;\ndefault:\nout.println(\"Error\");\n}\nout.println(\">> Result: \" +\
    \ season);\n}\n}\nListing 7-8\nSimplified switch Statement\n```\n\nThe grouping\
    \ in this case represents the alignment of the cases that require the same statement\
    \ to be executed. This still looks a little weird, but it reduces the statement\
    \ repetition a little. The behavior in the previous case is possible because each\
    \ `case` statement without a `break` statement is followed by the next `case`\
    \ statement. This is also called a **fall-through condition**. The second way\
    \ of simplifying the `switch` statement in Listing [7-6](#463938_3_En_7_Chapter.xhtml#PC6)\
    \ is to use a `switch` expression, described next.\n\n### The `switch` Expression\n\
    \nJava 12 introduced the `switch` expression. Continuing our months example, the\
    \ `switch` expression returns the season directly instead of storing it in a variable,\
    \ and this allows for a simpler syntax, as depicted in Listing [7-9](#463938_3_En_7_Chapter.xhtml#PC9).\n\
    \n```\nimport static java.lang.System.out;\npublic class ExpessionSwitchDemo {\n\
    void main(String... args) {\n//Read a\nint a = Integer.parseInt(args[0]);\nString\
    \ season = switch (a) {\ncase 1 -> \"Winter\";\ncase 2 -> \"Winter\";\ncase 3\
    \ -> \"Spring\";\ncase 4 -> \"Spring\";\ncase 5 -> \"Spring\";\ncase 6 -> \"Summer\"\
    ;\ncase 7 -> \"Summer\";\ncase 8 -> \"Summer\";\ncase 9 -> \"Autumn\";\ncase 10\
    \ -> \"Autumn\";\ncase 11 -> \"Autumn\";\ncase 12 -> \"winter\";\ndefault -> \"\
    Error\";\n};\nout.println(season);\n}\n}\nListing 7-9\nswitch Expression Example\n\
    ```\n\nThe `switch` expression was introduced as a way to treat a `switch` statement\
    \ as an expression, evaluate it to a single value, and thus use it in statements.\n\
    \nThe `switch` expression does not require `break;` statements to prevent fall-through.\
    \ When blocks of code are executed following a match with a `case` value, the\
    \ value is returned using the `yield` statement, introduced in Java 13. The code\
    \ in Listing [7-10](#463938_3_En_7_Chapter.xhtml#PC10) shows a different version\
    \ of the `switch` expression, where `case` values that require the same result\
    \ are grouped using a `,` (comma), an extra `System.out.println(..)` is added\
    \ to show the `yield` usage, and the returned value is provided as an argument\
    \ to a `System.out.println()` method, to be printed directly.\n\n```\npackage\
    \ com.apress.bgn.seven.switchst;\nimport static java.lang.System.out;\npublic\
    \ class AnotherSwitchExpressionDemo {\nvoid main(String... args) {\n//Read a\n\
    int a = Integer.parseInt(args[0]);\nout.println( switch (a) {\ncase 1, 2, 12 ->\
    \ {\nSystem.out.println(\"One of 1,2,12 is tested.\");\nyield \"Winter\";\n}\n\
    case 3,4,5 -> {\nSystem.out.println(\"One of 3,4,5 is tested.\");\nyield \"Spring\"\
    ;\n}\ncase 6,7,8 -> {\nSystem.out.println(\"One of 6,7,8 is tested.\");\nyield\
    \ \"Summer\";\n}\ncase 9,10,11 -> {\nSystem.out.println(\"One of 9,10,11 is tested.\"\
    );\nyield \"Autumn\";\n}\ndefault ->\nthrow new IllegalStateException(\"Unexpected\
    \ value\");\n});\n}\n}\nListing 7-10\nswitch Expression Example Using yield Statements\n\
    ```\n\nBefore Java 7, the `switch` statement supported only `Integer` and `enum`\
    \ options. In Java 7, the `switch` statement started supporting `String` options."
  raw: "### The Classic **switch** Statement\n\nThe original `switch` statement, which\
    \ we will refer to as the **classic switch** statement, has been part of the Java\
    \ language since its conception.\n\nLet’s look at the code in Listing [7-6](#463938_3_En_7_Chapter.xhtml#PC6)\
    \ first, and then check what more can be improved.\n\n```\npackage com.apress.bgn.seven.switchst;\n\
    import static java.lang.System.out;\npublic class SeasonSwitchDemo {\nvoid main(String...\
    \ args) {\n//Read a\nint a = Integer.parseInt(args[0]);\nvar season = \"\";\n\
    switch (a) {\ncase 1:\nseason = \"Winter\";\nbreak;\ncase 2:\nseason = \"Winter\"\
    ;\nbreak;\ncase 3:\nseason = \"Spring\";\nbreak;\ncase 4:\nseason = \"Spring\"\
    ;\nbreak;\ncase 5:\nseason = \"Spring\";\nbreak;\ncase 6:\nseason = \"Summer\"\
    ;\nbreak;\ncase 7:\nseason = \"Summer\";\nbreak;\ncase 8:\nseason = \"Summer\"\
    ;\nbreak;\ncase 9:\nseason = \"Autumn\";\nbreak;\ncase 10:\nseason = \"Autumn\"\
    ;\nbreak;\ncase 11:\nseason = \"Autumn\";\nbreak;\ncase 12:\nseason = \"Winter\"\
    ;\nbreak;\ndefault:\nout.println(\"Error\");\n}\nout.println(\">> Result: \" +\
    \ season);\n}\n}\nListing 7-6\nJava Code with Detailed switch Statement\n```\n\
    \nThat does not look very practical, at least not for this scenario. The general\
    \ template of the classic `switch` statement is depicted in Listing [7-7](#463938_3_En_7_Chapter.xhtml#PC7).\n\
    \n```\nswitch ([onvar]) {\ncase [option]:\n[statement;]\nbreak;\n...\ndefault:\n\
    [statement;]\n}\nListing 7-7\nGeneral Template of the switch Statement\n```\n\n\
    The terms in square brackets are detailed in the list here:\n\n*   `[onvar]`:\
    \ The variable that is tested against the `case` statements to select a statement.\
    \ It can be of any primitive type, enumerations, and (starting with Java 7) `String`.\
    \ Clearly the `switch` statement is not limited by conditions evaluated to boolean\
    \ results, which allows for a lot of flexibility.\n\n*   `case [option]`: A value\
    \ the variable mentioned previously is matched upon to make a decision regarding\
    \ the statement to execute (a case, as the keyword states).\n\n*   `[statement]`:\
    \ A statement or a group of statements to execute when `[onvar] == [option]`.\
    \ Considering that there is no `else` branch, we have to make sure that only the\
    \ statement(s) corresponding to the first match is executed, which is where the\
    \ `break;` statement comes in. The `break;` statement stops the current execution\
    \ path and moves the execution point to the next statement outside the statement\
    \ that contains it. Without `break;` statements the behavior switches to fall-through,\
    \ which means every `case` statement after the match is executed until a `break;`\
    \ is found. Without it, after the first match, all subsequent cases are traversed\
    \ and statements corresponding to them will be executed.\n    *   If we execute\
    \ the program in Listing [7-6](#463938_3_En_7_Chapter.xhtml#PC6) and provide the\
    \ number 7 as an argument, the text *Summer* will be printed.\n\n*   If the `break`\
    \ statements for case 7 and 8 are commented, the output changes to *Autumn*.\n\
    \n*   `default [statement;]`: A statement that is executed when no match on a\
    \ `case` has been found; the `default` case does not need a `break` statement.\
    \ If the program in Listing [7-6](#463938_3_En_7_Chapter.xhtml#PC6) is run with\
    \ any number outside the `[1-12]` interval, *Error* will be printed, because the\
    \ default statement will be executed.\n\nNow that you understand how `switch`\
    \ works, let’s see how we can reduce the previous statement. The months example\
    \ is suitable here because it can be modified further to show how the `switch`\
    \ statement can be simplified when a single statement should be executed for multiple\
    \ cases. In our code, writing each assignment statement three times is a little\
    \ redundant. There are also a lot of `break;` statements. There are two ways in\
    \ which the previous `switch` statement can be improved.\n\nThe first way of simplifying\
    \ the `switch` statement in Listing [7-6](#463938_3_En_7_Chapter.xhtml#PC6) is\
    \ by grouping together the cases that return the same value, as shown in Listing\
    \ [7-8](#463938_3_En_7_Chapter.xhtml#PC8).\n\n```\npackage com.apress.bgn.seven.switchst;\n\
    import static java.lang.System.out;\npublic class SimplifiedSwitchDemo {\nvoid\
    \ main(String... args){\n//Read a\nint a = Integer.parseInt(args[0]);\nvar season\
    \ = \"\";\nswitch (a) {\ncase 1:\ncase 2:\ncase 12:\nseason = \"winter\";\nbreak;\n\
    case 3:\ncase 4:\ncase 5:\nseason = \"Spring\";\nbreak;\ncase 6:\ncase 7:\ncase\
    \ 8:\nseason = \"Summer\";\nbreak;\ncase 9:\ncase 10:\ncase 11:\nseason = \"Autumn\"\
    ;\nbreak;\ndefault:\nout.println(\"Error\");\n}\nout.println(\">> Result: \" +\
    \ season);\n}\n}\nListing 7-8\nSimplified switch Statement\n```\n\nThe grouping\
    \ in this case represents the alignment of the cases that require the same statement\
    \ to be executed. This still looks a little weird, but it reduces the statement\
    \ repetition a little. The behavior in the previous case is possible because each\
    \ `case` statement without a `break` statement is followed by the next `case`\
    \ statement. This is also called a **fall-through condition**. The second way\
    \ of simplifying the `switch` statement in Listing [7-6](#463938_3_En_7_Chapter.xhtml#PC6)\
    \ is to use a `switch` expression, described next.\n\n### The `switch` Expression\n\
    \nJava 12 introduced the `switch` expression. Continuing our months example, the\
    \ `switch` expression returns the season directly instead of storing it in a variable,\
    \ and this allows for a simpler syntax, as depicted in Listing [7-9](#463938_3_En_7_Chapter.xhtml#PC9).\n\
    \n```\nimport static java.lang.System.out;\npublic class ExpessionSwitchDemo {\n\
    void main(String... args) {\n//Read a\nint a = Integer.parseInt(args[0]);\nString\
    \ season = switch (a) {\ncase 1 -> \"Winter\";\ncase 2 -> \"Winter\";\ncase 3\
    \ -> \"Spring\";\ncase 4 -> \"Spring\";\ncase 5 -> \"Spring\";\ncase 6 -> \"Summer\"\
    ;\ncase 7 -> \"Summer\";\ncase 8 -> \"Summer\";\ncase 9 -> \"Autumn\";\ncase 10\
    \ -> \"Autumn\";\ncase 11 -> \"Autumn\";\ncase 12 -> \"winter\";\ndefault -> \"\
    Error\";\n};\nout.println(season);\n}\n}\nListing 7-9\nswitch Expression Example\n\
    ```\n\nThe `switch` expression was introduced as a way to treat a `switch` statement\
    \ as an expression, evaluate it to a single value, and thus use it in statements.\n\
    \nThe `switch` expression does not require `break;` statements to prevent fall-through.\
    \ When blocks of code are executed following a match with a `case` value, the\
    \ value is returned using the `yield` statement, introduced in Java 13\\. The\
    \ code in Listing [7-10](#463938_3_En_7_Chapter.xhtml#PC10) shows a different\
    \ version of the `switch` expression, where `case` values that require the same\
    \ result are grouped using a `,` (comma), an extra `System.out.println(..)` is\
    \ added to show the `yield` usage, and the returned value is provided as an argument\
    \ to a `System.out.println()` method, to be printed directly.\n\n```\npackage\
    \ com.apress.bgn.seven.switchst;\nimport static java.lang.System.out;\npublic\
    \ class AnotherSwitchExpressionDemo {\nvoid main(String... args) {\n//Read a\n\
    int a = Integer.parseInt(args[0]);\nout.println( switch (a) {\ncase 1, 2, 12 ->\
    \ {\nSystem.out.println(\"One of 1,2,12 is tested.\");\nyield \"Winter\";\n}\n\
    case 3,4,5 -> {\nSystem.out.println(\"One of 3,4,5 is tested.\");\nyield \"Spring\"\
    ;\n}\ncase 6,7,8 -> {\nSystem.out.println(\"One of 6,7,8 is tested.\");\nyield\
    \ \"Summer\";\n}\ncase 9,10,11 -> {\nSystem.out.println(\"One of 9,10,11 is tested.\"\
    );\nyield \"Autumn\";\n}\ndefault ->\nthrow new IllegalStateException(\"Unexpected\
    \ value\");\n});\n}\n}\nListing 7-10\nswitch Expression Example Using yield Statements\n\
    ```\n\nBefore Java 7, the `switch` statement supported only `Integer` and `enum`\
    \ options. In Java 7, the `switch` statement started supporting `String` options."
  trans: "\n### 经典的 **switch** 语句\n\n原始的 `switch` 语句（我们称之为**经典 switch** 语句）自 Java\
    \ 语言诞生以来就一直存在。\n\n我们先来看一下代码清单 7-6 中的代码，然后再看看有哪些地方可以改进。\n\n```\npackage com.apress.bgn.seven.switchst;\n\
    import static java.lang.System.out;\npublic class SeasonSwitchDemo {\nvoid main(String...\
    \ args) {\n//读取 a\nint a = Integer.parseInt(args[0]);\nvar season = \"\";\nswitch\
    \ (a) {\ncase 1:\nseason = \"Winter\";\nbreak;\ncase 2:\nseason = \"Winter\";\n\
    break;\ncase 3:\nseason = \"Spring\";\nbreak;\ncase 4:\nseason = \"Spring\";\n\
    break;\ncase 5:\nseason = \"Spring\";\nbreak;\ncase 6:\nseason = \"Summer\";\n\
    break;\ncase 7:\nseason = \"Summer\";\nbreak;\ncase 8:\nseason = \"Summer\";\n\
    break;\ncase 9:\nseason = \"Autumn\";\nbreak;\ncase 10:\nseason = \"Autumn\";\n\
    break;\ncase 11:\nseason = \"Autumn\";\nbreak;\ncase 12:\nseason = \"Winter\"\
    ;\nbreak;\ndefault:\nout.println(\"Error\");\n}\nout.println(\">> Result: \" +\
    \ season);\n}\n}\n代码清单 7-6\n包含详细 switch 语句的 Java 代码\n```\n\n这段代码看起来并不实用，至少对于这个场景来说是这样。经典\
    \ `switch` 语句的通用模板如代码清单 7-7 所示。\n\n```\nswitch ([onvar]) {\ncase [option]:\n[statement;]\n\
    break;\n...\ndefault:\n[statement;]\n}\n代码清单 7-7\nswitch 语句的通用模板\n```\n\n方括号中的术语详细说明如下：\n\
    \n*   `[onvar]`：用于与 `case` 语句进行匹配以选择执行语句的变量。它可以是任何基本类型、枚举类型，以及（从 Java 7 开始）`String`\
    \ 类型。显然，`switch` 语句并不局限于结果为布尔值的条件，这提供了很大的灵活性。\n\n*   `case [option]`：一个值，用于与前面提到的变量进行匹配，以决定要执行的语句（正如关键字所示，这是一个“情况”）。\n\
    \n*   `[statement]`：当 `[onvar] == [option]` 时要执行的一条或多条语句。考虑到没有 `else` 分支，我们必须确保只执行与第一个匹配项对应的语句，这就是\
    \ `break;` 语句的作用。`break;` 语句会停止当前执行路径，并将执行点移动到包含它的语句之外的下一条语句。如果没有 `break;` 语句，行为会变成“穿透”，这意味着匹配之后的所有\
    \ `case` 语句都会被执行，直到遇到 `break;` 为止。如果没有它，在第一个匹配之后，会遍历所有后续的 `case`，并执行它们对应的语句。\n\
    \    *   如果我们执行代码清单 7-6 中的程序，并传入数字 7 作为参数，将会打印文本 *Summer*。\n\n*   如果注释掉 case 7\
    \ 和 case 8 的 `break` 语句，输出将变为 *Autumn*。\n\n*   `default [statement;]`：当没有匹配到任何\
    \ `case` 时执行的语句；`default` 情况不需要 `break` 语句。如果使用 `[1-12]` 区间之外的任何数字运行代码清单 7-6 中的程序，将会打印\
    \ *Error*，因为会执行默认语句。\n\n现在你已经了解了 `switch` 的工作原理，让我们看看如何简化前面的语句。月份示例很适合这里，因为它可以进一步修改，以展示当多个\
    \ case 需要执行同一条语句时，如何简化 `switch` 语句。在我们的代码中，每个赋值语句都写了三次，这有点冗余。此外，还有大量的 `break;`\
    \ 语句。有两种方法可以改进前面的 `switch` 语句。\n\n简化代码清单 7-6 中 `switch` 语句的第一种方法是将返回相同值的 case\
    \ 分组在一起，如代码清单 7-8 所示。\n\n```\npackage com.apress.bgn.seven.switchst;\nimport static\
    \ java.lang.System.out;\npublic class SimplifiedSwitchDemo {\nvoid main(String...\
    \ args){\n//读取 a\nint a = Integer.parseInt(args[0]);\nvar season = \"\";\nswitch\
    \ (a) {\ncase 1:\ncase 2:\ncase 12:\nseason = \"winter\";\nbreak;\ncase 3:\ncase\
    \ 4:\ncase 5:\nseason = \"Spring\";\nbreak;\ncase 6:\ncase 7:\ncase 8:\nseason\
    \ = \"Summer\";\nbreak;\ncase 9:\ncase 10:\ncase 11:\nseason = \"Autumn\";\nbreak;\n\
    default:\nout.println(\"Error\");\n}\nout.println(\">> Result: \" + season);\n\
    }\n}\n代码清单 7-8\n简化的 switch 语句\n```\n\n这种情况下的分组代表了需要执行相同语句的 case 的对齐。这看起来仍然有点奇怪，但它稍微减少了语句的重复。之所以能实现前一种情况的行为，是因为每个没有\
    \ `break` 语句的 `case` 语句后面都会跟着下一个 `case` 语句。这也被称为**穿透条件**。简化代码清单 7-6 中 `switch`\
    \ 语句的第二种方法是使用 `switch` 表达式，接下来将对此进行描述。\n\n### `switch` 表达式\n\nJava 12 引入了 `switch`\
    \ 表达式。继续我们的月份示例，`switch` 表达式直接返回季节，而不是将其存储在变量中，这使得语法更简洁，如代码清单 7-9 所示。\n\n```\n\
    import static java.lang.System.out;\npublic class ExpessionSwitchDemo {\nvoid\
    \ main(String... args) {\n//读取 a\nint a = Integer.parseInt(args[0]);\nString season\
    \ = switch (a) {\ncase 1 -> \"Winter\";\ncase 2 -> \"Winter\";\ncase 3 -> \"Spring\"\
    ;\ncase 4 -> \"Spring\";\ncase 5 -> \"Spring\";\ncase 6 -> \"Summer\";\ncase 7\
    \ -> \"Summer\";\ncase 8 -> \"Summer\";\ncase 9 -> \"Autumn\";\ncase 10 -> \"\
    Autumn\";\ncase 11 -> \"Autumn\";\ncase 12 -> \"winter\";\ndefault -> \"Error\"\
    ;\n};\nout.println(season);\n}\n}\n代码清单 7-9\nswitch 表达式示例\n```\n\n引入 `switch`\
    \ 表达式是为了将 `switch` 语句视为一个表达式，将其求值为单个值，从而可以在语句中使用它。\n\n`switch` 表达式不需要 `break;`\
    \ 语句来防止穿透。当代码块在匹配某个 `case` 值后执行时，会使用 Java 13 中引入的 `yield` 语句返回值。代码清单 7-10 中的代码展示了\
    \ `switch` 表达式的另一个版本，其中需要相同结果的 `case` 值使用 `,`（逗号）分组，添加了一个额外的 `System.out.println(..)`\
    \ 来展示 `yield` 的用法，并且返回值作为参数提供给 `System.out.println()` 方法，以便直接打印。\n\n```\npackage\
    \ com.apress.bgn.seven.switchst;\nimport static java.lang.System.out;\npublic\
    \ class AnotherSwitchExpressionDemo {\nvoid main(String... args) {\n//读取 a\nint\
    \ a = Integer.parseInt(args[0]);\nout.println( switch (a) {\ncase 1, 2, 12 ->\
    \ {\nSystem.out.println(\"测试了 1、2、12 中的一个。\");\nyield \"Winter\";\n}\ncase 3,4,5\
    \ -> {\nSystem.out.println(\"测试了 3、4、5 中的一个。\");\nyield \"Spring\";\n}\ncase 6,7,8\
    \ -> {\nSystem.out.println(\"测试了 6、7、8 中的一个。\");\nyield \"Summer\";\n}\ncase 9,10,11\
    \ -> {\nSystem.out.println(\"测试了 9、10、11 中的一个。\");\nyield \"Autumn\";\n}\ndefault\
    \ ->\nthrow new IllegalStateException(\"意外的值\");\n});\n}\n}\n代码清单 7-10\n使用 yield\
    \ 语句的 switch 表达式示例\n```\n\n在 Java 7 之前，`switch` 语句只支持 `Integer` 和 `enum` 选项。在\
    \ Java 7 中，`switch` 语句开始支持 `String` 选项。\n"
- fmt: '### `switch` with `String` Options


    To rewrite the `switch` statement in Listing [7-8](#463938_3_En_7_Chapter.xhtml#PC8)
    using `String` options, we must modify the code a bit, and instead of converting
    the program argument to `Integer`, we’ll just treat it as a `String` and require
    it to be the name of a month. This version of the code is depicted in Listing
    [7-11](#463938_3_En_7_Chapter.xhtml#PC11).


    ```

    package com.apress.bgn.seven.switchst;

    import static java.lang.System.out;

    public class StringSwitchSeasonDemo {

    void main(String... args) {

    //Read a

    String a = args[0];

    var season = "";

    switch (a) {

    case "January":

    case "February":

    case "December":

    season = "winter";

    break;

    case "March":

    case "April":

    case "May":

    season = "Spring";

    break;

    case "June":

    case "July":

    case "August":

    season = "Summer";

    break;

    case "September":

    case "October":

    case "November":

    season = "Autumn";

    break;

    default:

    out.println("Error");

    }

    out.println(">> Result: " + season);

    }

    }

    Listing 7-11

    switch Statement Using String Values

    ```


    The `switch` expression supports `String` values as well. The main problem with
    `switch` supporting `String` values is that there is always a possibility of unexpected
    behavior, because the `equals(..)` method, which is case sensitive, is used to
    find a match.


    The example in Listing [7-11](#463938_3_En_7_Chapter.xhtml#PC11) can be modified
    to ask the user for a text representing the month. The `switch` statement is used
    to decide the season to print, and unless the text in the `case` options matches
    the text introduced by the user exactly, the text printed is *Error*. Also, since
    the `switch` expression was mentioned, the code changes shown in Listing [7-12](#463938_3_En_7_Chapter.xhtml#PC12).


    ```

    package com.apress.bgn.seven.switchst;

    import static java.lang.System.out;

    public class StringSwitchSeasonDemo {

    void main(String... args) {

    //Read a

    String a = args[0];

    var season = "";

    switch (a) {

    case "January", "February", "December" -> season = "Winter";

    case "March", "April", "May" -> season = "Spring";

    case "June", "July", "August" -> season = "Summer";

    case "September", "October", "November" -> season = "Autumn";

    default -> out.println("Error");

    }

    out.println(season);

    }

    }

    Listing 7-12

    switch Expression Using String Values

    ```


    If we run the previous program with lowercase argument `january`, winter will
    be printed in the console. If we run it with `January` or `null`, *Error* will
    be printed in the console.


    ### `switch` with enum Options


    Before support for `String` values, `switch` statements supported enum values.
    This is practical when the values are grouped into a fixed set, such as the names
    of the months in a year. By using enums, support for `String` values can be achieved.
    The user introduces the month as a text value. This value is converted to uppercase
    and used to extract the corresponding enum value. This allows for support of `String`
    values that are not case sensitive in a `switch` statement. The code in Listing
    [7-13](#463938_3_En_7_Chapter.xhtml#PC13) shows such an implementation.


    ```

    package com.apress.bgn.seven.switchst;

    import static java.lang.System.out;

    public class EnumSwitchDemo {

    enum Month {

    JANUARY, FEBRUARY, MARCH, APRIL, MAY, JUNE, JULY, AUGUST,

    SEPTEMBER, OCTOBER, NOVEMBER, DECEMBER

    }

    void main(String... args) {

    //Read a

    String a = args[0];

    try {

    Month month = Month.valueOf(a.toUpperCase());

    var season = "";

    switch (month) {

    case JANUARY:

    case FEBRUARY:

    case DECEMBER:

    season = "Winter";

    break;

    case MARCH:

    case APRIL:

    case MAY:

    season = "Spring";

    break;

    case JUNE:

    case JULY:

    case AUGUST:

    season = "Summer";

    break;

    case SEPTEMBER:

    case OCTOBER:

    case NOVEMBER:

    season = "Autumn";

    break;

    }

    out.println(season);

    } catch(IllegalArgumentException iae) {

    out.println("Unrecognized enum value: " + a );

    }

    }

    }

    Listing 7-13

    switch Statement Using enum Values

    ```


    By using enums, the same season is returned for `january`, `January`, `JANuary`,
    and other case variation. This is because of the way the code was designed, of
    course. Also, no `default` option is needed, because an exception is thrown if
    an enum value cannot be found matching the user-provided data before the `switch`
    expression is evaluated.


    The `switch` expression equivalent of the code in Listing [7-13](#463938_3_En_7_Chapter.xhtml#PC13)
    is shown in Listing [7-14](#463938_3_En_7_Chapter.xhtml#PC14).


    ```

    package com.apress.bgn.seven.switchst;

    import static java.lang.System.out;

    public class EnumSwitchExprDemo {

    enum Month {

    JANUARY, FEBRUARY, MARCH, APRIL, MAY, JUNE, JULY, AUGUST,

    SEPTEMBER, OCTOBER, NOVEMBER, DECEMBER

    }

    void main(String... args) {

    String a = args[0];

    try {

    Month month = Month.valueOf(a.toUpperCase());

    out.println(switch(month) {

    case JANUARY, FEBRUARY, DECEMBER -> "Winter";

    case MARCH , APRIL, MAY -> "Spring";

    case JUNE, JULY, AUGUST -> "Summer";

    case SEPTEMBER, OCTOBER, NOVEMBER -> "Autumn";

    });

    } catch(IllegalArgumentException iae) {

    out.println("Unrecognized enum value: " + a );        }

    }

    }

    Listing 7-14

    switch Expression Using enum Values

    ```


    In practice, depending on the solution you are trying to develop, you might decide
    to use a combination of `if` and `switch` statements. Unfortunately, because of
    the `switch` statement’s peculiar logic and its flexible number of options, drawing
    a flowchart for the `switch` statement is difficult, but nevertheless I’ve tried,
    and it’s depicted in Figure [7-6](#463938_3_En_7_Chapter.xhtml#Fig6).


    ![](images/463938_3_En_7_Chapter/463938_3_En_7_Fig6_HTML.jpg)


    Figure 7-6


    The `switch` statement flowchart


    So what should you use, the `switch` statement or the `switch` expression? The
    answer is pretty easy to determine. The classic `switch` statement comes with
    a few drawbacks:


    - Accidental fall-through, if you forget to add a `break`; the execution will
    continue to the next clause.

    - Variables are scoped to the entire `switch` statement, which means a variable
    name cannot be reused in two different `case` clauses.

    - The `default` clause is not required, and thus somebody reading the code might
    be confused as to what should be done with values that do not match the `switch`
    options, and whether the `default` clause was omitted intentionally or just forgotten.


    The `switch` expression does not have any of these drawbacks and has a few other
    advantages:


    - `break` is not necessary, because there is no default fall-through.

    - There is no need for a `default` clause with `enums` when all enum values are
    used as options, and if not all values are used but there is no `default` clause,
    the compiler will complain about it through an error.

    - Instead of falling through by listing multiple labels, they can be comma-separated.

    - Options can be of any type. *For real.* (Check out the `FloatSwitchExprDemo`
    class in the book repo to see an example, or feel free to write your own with
    a type of your choice.)


    *Which one would you use?*


    Caution


    Keep in mind that the `switch` expression must return a value or throw an exception,
    and you cannot use a `return` statement to exit a `switch` expression. The classic
    `switch` statement, however, allows using the `return` statement in its clause.'
