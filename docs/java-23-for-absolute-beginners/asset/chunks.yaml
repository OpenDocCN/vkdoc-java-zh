  trans: '

    请注意，`HttpServer.create()` 方法提供了更多配置选项，例如文件服务的上下文路径（此处为 `simple/`），以及内部排队等待的最大
    TCP 连接数（此处为 `10`）。


    还可以使用工具方法 `HttpHandlers.of(statusCode, headers, body)` 来创建处理器。额外的配置非常有用，因为它提供了服务其他类型文件（例如
    JSON 文件）的机会。清单 10-29 中的代码定义了一个用于服务 JSON 文件的处理器，同时还使用了 `HttpHandlers.handleOrElse(predicate,
    mainHandler, fallbackHandler)` 来强制只允许 `GET` 请求。


    ```

    package com.apress.bgn.ten;

    // 省略了 import 语句

    public class JsonServingServer {

    public static Predicate IS_GET = r -> r.getRequestMethod().equals("GET");

    void main() throws IOException {

    var serverDataLocation = new File(SERVER_DATA);

    var jsonHandler = HttpHandlers.of(200,

    Headers.of("Content-Type", "application/json"),

    Files.readString(Path.of(serverDataLocation.getAbsolutePath() + File.separator
    + "simple.json")));

    var methodNotAllowedHandler = HttpHandlers.of(405,

    Headers.of("Allow", "GET"), "");

    var handler = HttpHandlers.handleOrElse(IS_GET, jsonHandler, methodNotAllowedHandler);

    var server = HttpServer.create(SERVER_ADDR, 10, "/simple/", handler);

    server.start();

    out.println("按任意键退出！");

    in.read();

    server.stop(2);

    }

    }

    清单 10-29

    配置简单 Web 服务器以服务 JSON 文件

    ```


