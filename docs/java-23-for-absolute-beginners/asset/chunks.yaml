    The modulus operator returns the remainder, but what happens when the operands
    are real numbers? The short answer is that operations with floating-point numbers
    are tricky. The result depends on the digits after the decimal point and the operand
    used for the division. Look at Listing [6-22](#463938_3_En_6_Chapter.xhtml#PC31).


    ```

    jshell> double d = 5.28d

    d ==> 5.28

    |  created variable d : double

    jshell> d / 2

    $2 ==> 2.64

    |  created scratch variable $2 : double

    jshell> d % 2

    $4 ==> 1.2800000000000002

    |  created scratch variable $4 : double

    Listing 6-22

    Modulus Numeric Operations with Floating-Point Numbers in jshell

    ```


    The explanation for the previous result is loss of precision because of how floating-point
    numbers are represented internally.


    Also, if the remainder is a real number with an infinite number of decimals after
    the decimal point, representing it is not possible, so some rounding is necessary.
    This is shown in Listing [6-23](#463938_3_En_6_Chapter.xhtml#PC32).


    ```

    jshell> float f = 1.9f

    f ==> 1.9

    |  created variable f : float

    jshell> float g = 0.4f

    g ==> 0.4

    |  created variable g : float

    jshell> float h = f % g

    h ==> 0.29999995    # remainder

    |  created variable h : float

    Listing 6-23

    Loss of Precision in jshell for a Remainder with an Infinite Number of Decimals
    After the Decimal Point

    ```


    The reminder returned in `jshell` is `0.29999995`, which can be rounded to `0.3`
    for some cases. However, rounding can be dangerous when the data is used for sensitive
    operations, such as determining the volume of a tumor for a robot to operate on,
    or the perfect trajectory for a rocket to be sent to Mars.


    **Warning**


    Rounding of floating-point numbers is problematic because it causes a loss of
    precision.


    The loss of precision when working with floating-point numbers is not a Java problem,
    since operations with floating-point numbers are supported according to the rules
    of the IEEE 754 (IEEE Standard for Floating-Point Arithmetic)^([^(63)](#fn63))
    arithmetic.


    If a project needs mathematical operations with a better precision, the `java.lang.Math`
    class provides methods for different types of rounding and other types of floating-point
    number operations.


    ### Relational Operators


    In certain cases, when designing the solution for a problem, you need to introduce
    conditions to drive and control the execution flow. Conditions require the evaluation
    of a comparison between two terms using a **comparison** operator. In this section
    all comparison operators used in Java are described and code samples are be provided.
    Let’s proceed.


    #### The `==` (Equals) Operator


    The `==` (equals) operator tests equality of terms. Because in Java a single `=`
    is used to assign values, `==` was introduced to test equality and avoid confusion.
    This operator is very often used to control execution flows. Controlling execution
    flows is the topic of **Chapter** [**7**](#463938_3_En_7_Chapter.xhtml), but to
    show how the `==` operator should be used, a few simple code samples involving
    control statements such as `if` and `for` are introduced in this chapter.


    In Listing [6-24](#463938_3_En_6_Chapter.xhtml#PC33), you can see an example of
    testing the `==` comparator in searching value 2 in an array. If the value is
    found, the index where it was found is printed in the console.


    ```

    package com.apress.bgn.six;

    import static java.lang.System.out;

    public class ComparisonOperatorsDemo {

    void main(){

    int[] values = {1, 7, 9, 2, 6,};

    for (int i = 0; i < values.length; ++i) {

    if (values[i] == 2) {

    out.println("Found 2 at index: " + i);

    }

    }

    }

    }

    // output

    // Found 2 at index: 3

    Listing 6-24

    Example of Using the == Operator to Test a Value in an Array

    ```


    The condition in the marked line is evaluated, and the result is a boolean value.
    When the result is `false`, nothing is done, but if the result is `true`, the
    index is printed. Because the result is of type `boolean`, if you make a mistake
    and use `=` instead of `==`, the code will not compile. So you must be extra careful
    when comparing boolean values. The code in Listing [6-25](#463938_3_En_6_Chapter.xhtml#PC34)
    compiles and runs, but it doesn’t work as expected.


    ```

    package com.apress.bgn.six;

    import static java.lang.System.out;

    public class BadAssignementDemo {

    void main() {

    boolean testVal = false;

    if(testVal = true) {

    out.println("TestVal got initialized incorrectly!");

    } else {

    out.println("TestVal is false? " + (testVal == false));

    }

    }

    }

    // output

    //TestVal got initialized incorrectly!

    Listing 6-25

    Example of an Unexpected Initialization of a Boolean Variable Instead of an Evaluation
    of Its Value

    ```


    The `==` operator works just fine for primitives. For reference types, you need
    to use the `equals()` method, which was covered at the beginning of **Chapter**
    [**5**](#463938_3_En_5_Chapter.xhtml) when explaining the difference between stack
    and heap memory.'
