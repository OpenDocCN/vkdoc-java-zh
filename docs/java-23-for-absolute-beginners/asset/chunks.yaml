    \ [INFO] Call sort of [low,high]: [0 4] 5 3 2 1 4\n# other log messages omitted\n\
    ```\n**清单 9-12** 运行新版本 `SortingJulDemo` 期间显示的 `WARNING` 级别日志消息\n\n如前所述，在某些情况下，写入日志可能会影响性能。当应用程序在生产系统中运行时，我们可能希望优化日志配置，以过滤掉不太重要的日志消息，只保留那些通知我们存在问题风险的消息。之前的配置示例包含以下配置行，该行允许打印所有日志消息：\n\
    \n```\njava.util.logging.ConsoleHandler.level=ALL\n```\n\n或者，更通用的格式适用于任何 `java.util.logging.Handler`\
    \ 子类：\n\n```\n.level=ALL\n```\n\n如果将此属性的值更改为 `OFF`，则不会打印任何内容。日志级别具有分配给它们的整数值，这些值可用于比较消息的严重性。通常，如果你配置了某个级别的消息，那么更严重的消息也会被打印出来。因此，如果我们将该属性设置为\
    \ `INFO`，`WARNING` 消息也会被打印出来。消息严重性级别的值在 `java.util.logging.Level` 类中定义，如果你在编辑器中打开该类，可以看到分配给每个级别的整数值，如清单\
    \ [9-13](#463938_3_En_9_Chapter.xhtml#PC16) 所示。\n\n```\npackage java.util.logging;\n\
    // import statements omitted\npublic class Level implements java.io.Serializable\
    \ {\npublic static final Level OFF = new Level(\"OFF\",Integer.MAX_VALUE, defaultBundle);\n\
    public static final Level SEVERE = new Level(\"SEVERE\",1000, defaultBundle);\n\
    public static final Level WARNING = new Level(\"WARNING\", 900, defaultBundle);\n\
    public static final Level INFO = new Level(\"INFO\", 800, defaultBundle);\npublic\
    \ static final Level CONFIG = new Level(\"CONFIG\", 700, defaultBundle);\npublic\
    \ static final Level FINE = new Level(\"FINE\", 500, defaultBundle);\npublic static\
    \ final Level FINER = new Level(\"FINER\", 400, defaultBundle);\npublic static\
    \ final Level FINEST = new Level(\"FINEST\", 300, defaultBundle);\npublic static\
    \ final Level ALL = new Level(\"ALL\", Integer.MIN_VALUE, defaultBundle);\n//\
    \ other comments and code omitted\n}\n```\n**清单 9-13** 日志级别对应的整数值\n\n在前面的配置中，通过将\
    \ `.level=ALL` 更改为 `.level=WARNING`，我们期望看到所有级别为 `WARNING` 和 `SEVERE` 的日志消息。使用之前的参数运行\
    \ `SortingJulDemo` 类，我们应该只看到 `WARNING` 级别的消息，如清单 [9-14](#463938_3_En_9_Chapter.xhtml#PC17)\
    \ 所示。\n\n```\n[2021-06-06 17:12:29] [WARNING] Element a is not an integer and\
    \ cannot be added to the array!\n[2021-06-06 17:12:29] [WARNING] Element b is\
    \ not an integer and cannot be added to the array!\n[2021-06-06 17:12:29] [WARNING]\
    \ Element - is not an integer and cannot be added to the array!\n[2021-06-06 17:12:29]\
    \ [WARNING] Element ds is not an integer and cannot be added to the array!\n```\n\
    **清单 9-14** 运行 `SortingJulDemo` 期间仅显示 `WARNING` 级别的日志消息\n\n还存在其他定义日志消息格式化的方法：可以使用系统属性，或者以编程方式实例化一个格式化器并将其设置到\
    \ `Logger` 实例上。选择哪种方法实际上取决于应用程序的具体情况。然而，本书不会涵盖这个主题，因此如果你有兴趣阅读更多关于使用 JUL 进行 Java\
    \ 日志记录的内容，我推荐脚注^([^(71)](#fn71))中引用的教程。这里不再进一步介绍 JUL 的原因是，与其他日志库相比，JUL 以其较弱的性能而闻名。你还需要考虑的另一件事是，如果你正在构建的应用程序是一个复杂的、具有许多依赖项的应用程序，这些依赖项可能使用不同的日志库——你该如何配置和使用它们呢？这时，日志门面就派上用场了。下一节将向你展示如何使用最著名的\
    \ Java 日志门面：**SLF4J**。"
  raw: "The execution stops right there, because there is nothing to sort. Since you’ve\
    \ probably run this class a few times, IntelliJ IDEA probably created a launcher\
    \ configuration for you that you can customize and provide arguments for the execution.\
    \ Take a look at Figure [9-5](#463938_3_En_9_Chapter.xhtml#Fig5) and try to edit\
    \ your configuration as depicted there by adding the recommended values as program\
    \ arguments.\n\n![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig5_HTML.jpg)\n\
    \nFigure 9-5\n\nIntelliJ IDEA launcher for the `SortingJulDemo` class\n\nRunning\
    \ this version of the `SortingJulDemo` class with the default console logging\
    \ configured produces a few extra log messages, as depicted in Listing [9-12](#463938_3_En_9_Chapter.xhtml#PC13).\n\
    \n```\n[2021-06-06 12:21:35] [WARNING] Element a is not an integer and cannot\
    \ be added to the array! # \n[2021-06-06 12:21:35] [WARNING] Element b is not\
    \ an integer and cannot be added to the array! # \n[2021-06-06 12:21:35] [WARNING]\
    \ Element - is not an integer and cannot be added to the array! # \n[2021-06-06\
    \ 12:21:35] [WARNING] Element ds is not an integer and cannot be added to the\
    \ array! # \n[2021-06-06 12:21:35] [INFO] Sorting an array with merge sort: 5\
    \ 3 2 1 4\n[2021-06-06 12:21:35] [INFO] Call sort of [low,high]: [0 4] 5 3 2 1\
    \ 4\n# other log messages omitted\nListing 9-12\nLogging Messages of Level WARNING\
    \ Shown During Execution of the New Version of SortingJulDemo\n```\n\nAs mentioned\
    \ in the previous section, writing logs can affect performance in some cases.\
    \ When the application is running in a production system, we might want to refine\
    \ the logging configuration to filter out less important log messages and keep\
    \ only those that notify us of a risk of a problem. The previous configuration\
    \ examples included the following configuration line that enables all log messages\
    \ to be printed:\n\n```\njava.util.logging.ConsoleHandler.level=ALL\n```\n\nOr\
    \ the more general format that works for any `java.util.logging.Handler` subclass:\n\
    \n```\n.level=ALL\n```\n\nIf the value of this property is changed to `OFF`, nothing\
    \ will be printed. The log levels have integer values assigned to them, and those\
    \ values can be used to compare the severity of the messages. As a rule, if you\
    \ configure a certain level of messages, more severe messages will be printed\
    \ as well. So if we set that property to `INFO`, `WARNING` messages will be printed\
    \ as well. The values for the severity levels of messages are defined in the `java.util.logging.Level`\
    \ class, and if you open that class in your editor, you can see the integer values\
    \ assigned to each of them as depicted in Listing [9-13](#463938_3_En_9_Chapter.xhtml#PC16).\n\
    \n```\npackage java.util.logging;\n// import statements omitted\npublic class\
    \ Level implements java.io.Serializable {\npublic static final Level OFF = new\
    \ Level(\"OFF\",Integer.MAX_VALUE, defaultBundle);\npublic static final Level\
    \ SEVERE = new Level(\"SEVERE\",1000, defaultBundle);\npublic static final Level\
    \ WARNING = new Level(\"WARNING\", 900, defaultBundle);\npublic static final Level\
    \ INFO = new Level(\"INFO\", 800, defaultBundle);\npublic static final Level CONFIG\
    \ = new Level(\"CONFIG\", 700, defaultBundle);\npublic static final Level FINE\
    \ = new Level(\"FINE\", 500, defaultBundle);\npublic static final Level FINER\
    \ = new Level(\"FINER\", 400, defaultBundle);\npublic static final Level FINEST\
    \ = new Level(\"FINEST\", 300, defaultBundle);\npublic static final Level ALL\
    \ = new Level(\"ALL\", Integer.MIN_VALUE, defaultBundle);\n// other comments and\
    \ code omitted\n}\nListing 9-13\nThe Integer Values Specific to the Log Levels\n\
    ```\n\nIn the previous configuration, by changing `.level=ALL` to `.level=WARNING`,\
    \ we would expect to see all log messages of levels WARNING and SEVERE. Running\
    \ the `SortingJulDemo` class with the previous arguments, we should see only the\
    \ `WARNING` level messages, as depicted in Listing [9-14](#463938_3_En_9_Chapter.xhtml#PC17).\n\
    \n```\n[2021-06-06 17:12:29] [WARNING] Element a is not an integer and cannot\
    \ be added to the array!\n[2021-06-06 17:12:29] [WARNING] Element b is not an\
    \ integer and cannot be added to the array!\n[2021-06-06 17:12:29] [WARNING] Element\
    \ - is not an integer and cannot be added to the array!\n[2021-06-06 17:12:29]\
    \ [WARNING] Element ds is not an integer and cannot be added to the array!\nListing\
    \ 9-14\nOnly Logging Messages of Level WARNING Being Shown During Execution of\
    \ SortingJulDemo\n```\n\nOther ways to define log messaging formatting exist:\
    \ system properties can be used or, programmatically, a formatter can be instantiated\
    \ and set on a `Logger` instance. The choice really depends on the specifics of\
    \ the application. This topic won’t be covered in the book, however, so if you\
    \ are interested in reading more about Java logging with JUL, I recommend the\
    \ tutorial referenced in the footnote^([^(71)](#fn71)). The reason JUL isn’t covered\
    \ further here is that JUL is known for its weak performance compared to other\
    \ logging libraries. Another thing you have to take into account is that if the\
    \ application you are building is a complex one, with a lot of dependencies, these\
    \ dependencies might use different logging libraries—how do you configure and\
    \ use them all? This is where a logging facade proves useful. The next section\
    \ will show you how to use the most renown Java logging facade: **SLF4J**."
