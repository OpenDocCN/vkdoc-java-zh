  trans: '

    ### 将 HelloWorld 类放入包中


    如前文图 3-18 所示，右键点击 `src` 目录时弹出的上下文菜单中包含一个**包**选项。因此，请右键点击 `src` 目录并选择该选项。在弹出的对话框中，输入包名
    `com.sandbox`。如图 3-23 所示，如果你尝试创建的包已存在（就像我的情况），则会显示一条红色错误信息。


    ![](img/463938_3_En_3_Fig23_HTML.jpg)


    图 3-23


    在 IntelliJ IDEA 中创建重复的包


    现在我们已经有了一个包，但类并不在其中。要将类移入包中，只需点击该类并将其拖拽过去。此时会弹出另一个对话框，确认你是否确实要执行此操作，如图 3-24 所示。


    ![](img/463938_3_En_3_Fig24_HTML.jpg)


    图 3-24


    在 IntelliJ IDEA 中将类移入包中


    点击**重构**按钮，观察类发生的变化。该类现在应以 `package com.sandbox``;` 声明开头。如果你重新构建项目，然后查看 `production`
    目录，将会看到类似于图 3-25 所示的内容。


    ![](img/463938_3_En_3_Fig25_HTML.jpg)


    图 3-25


    添加 `com.sandbox` 包后的新目录结构


    显然，在手动编译和执行类时，必须考虑到包的存在，因此命令将如清单 3-18 所示发生变化。


    ```

    ~/sandbox/src/> javac com/sandbox/HelloWorld.java

    ~/sandbox/src/> java com/sandbox/HelloWorld

    清单 3-18

    编译和执行 HelloWorld.java 文件的包版本

    ```


    那么，当模块也被配置时会发生什么？存在一个默认的未命名模块，所有 JAR（无论是否模块化）以及类路径上的类都将包含在其中。这个默认的未命名模块会导出所有包并读取所有其他模块。由于它没有名称，因此不能被命名的应用程序模块所要求和读取。因此，即使你的小项目在
    JDK 9 及以上版本中似乎能正常工作，它也无法被其他模块访问，但它之所以能工作，是因为它可以访问其他模块。（这确保了与旧版本 JDK 的向后兼容性。）话虽如此，让我们也在项目中添加一个模块。


    ### 配置 com.sandbox 模块


    配置模块就像在 `src` 目录下添加一个 `module-info.java` 文件一样简单。再次回到图 3-18，`src` 的上下文菜单中包含一个 `module-info.java`
    选项。选择该选项，IDE 将为你生成该文件。一切顺利，如果你不喜欢为你生成的模块名称，可以更改它。我将其更改为 `com.sandbox`，以遵循 Oracle
    开发者建立的模块命名约定。该文件初始为空，如清单 3-19 所示。


    ```

    module com.sandbox {

    }

    清单 3-19

    com.sandbox 模块配置文件

    ```


    现在我们有了一个模块，会发生什么？从 IDE 的角度来看，变化不大。但如果你想手动编译一个模块，你需要了解一些事情。我使用清单 3-20 中的命令编译了我们的模块。


    ```

    ~/sandbox/src/> javac -d ../out/com.sandbox \

    module-info.java \

    com/sandbox/HelloWorld.java

    清单 3-20

    手动编译包含在模块中的包

    ```


    重要提示


    “`\`”（反斜杠）是 macOS/Linux 的分隔符。在 Windows 上，要么将整个命令写在一行，要么将 `\` 替换为 `^`（脱字符）。


    清单 3-20 中的命令是根据清单 3-21 中的模板构建的。


    ```

    javac -d [目标位置]/[模块名称] \

    [源位置]/module-info.java \

    [java 文件...]

    清单 3-21

    手动编译包含在模块中的包的命令模板

    ```


    `-d [目标位置]` 决定了执行结果应保存的位置。清单 3-20 中的命令行将输出文件夹指定为 `/out/com.sandbox`，是为了明确 `com.sandbox`
    是外部模块。在此目录下，我们将拥有 `com.sandbox` 包的正常结构。`out` 目录的内容如图 3-26 所示。


    ![](img/463938_3_En_3_Fig26_HTML.jpg)


    图 3-26


    手动编译的 Java 模块 `com.sandbox`


    正如你在本例中注意到的，模块实际上并不存在，直到我们编译了源代码，因为 Java 模块更像是一种由 `module-info.class` 描述符描述的封装包的逻辑模式。`com.sandbox`
    目录被创建的唯一原因是我们将其指定为 `javac -d` 命令的参数。


    既然我们已经成功编译了一个模块，清单 3-22 展示了当 `HelloWorld` 类包含在模块中时如何运行它。


    ```

    ~/sandbox/> java --module-path out \

    --module com.sandbox/com.sandbox.HelloWorld

    Hello World!  # 结果

    清单 3-22

    手动执行包含在模块中的类


    前面的命令是根据清单 3-23 中的模板构建的。


    ```

    java --module-path [目标位置] \

    --module [模块名称] /[包名称].HelloWorld

    清单 3-23

    手动执行包含在模块中的类的命令模板

    ```


    2017 年 9 月的 *Oracle Magazine* 期刊首次提到了 Java 模块命名的示例。尽管 Oracle 开发者决定模块名称应遵循与包相同的规则，但对我来说这似乎有点多余，尤其是在包名称往往变得非常长的复杂项目中。你是否也应该让模块名称同样长？


    事实是，人们制定标准，而大多数时候，实用的做法就成了标准。自 2007 年以来，那些成功采用模块的项目都选择了更简单、更实用的模块名称。例如，创建 Spring
    Framework 的团队决定将其模块命名为 `spring.core` 而不是 `org.springframework.core`，`spring.beans`
    而不是 `org.springframework.beans`，等等。因此，你可以随意命名你的模块，只要避免使用特殊字符和数字即可。

    '
- fmt: '## Java Projects Using Build Tools, Mostly Maven


    As introduced in Chapter [2](#463938_3_En_2_Chapter.xhtml), Apache Maven is a
    build automation tool used primarily for Java projects. Although Gradle is gaining
    ground, Maven is still one of the most commonly used build tools. Tools like Maven
    and Gradle are used to organize the source code of an application in interdependent
    project modules and configure a way to compile, validate, generate sources, test,
    and generate artifacts automatically. An *artifact* is a file, usually a JAR,
    that gets deployed to a Maven repository. A Maven *repository* is a location on
    an HDD where JARs get saved in a special directory structure.


    Any discussion about build tools must start with Maven, because this build tool
    standardized a lot of the terms we use in development today. A project split into
    multiple subprojects can be downloaded from GitHub and built in the command line
    or imported into IntelliJ IDEA. This approach ensures that you get quality sources
    that can be compiled in one go. It is also practical, because I imagine you do
    not want to load a new project in IntelliJ IDEA every time you start reading a
    new chapter. Also, it makes it easier for me to maintain the sources and adapt
    them to a new JDK, and with Oracle releasing so often, I need to be able to do
    this quickly.


    The project you will use to test the code written in this book, and to write your
    own code if you want to, is called `java-23-for-absolute-beginners`. It is a multimodule
    Maven project. The first level of the project is the `java-23-for-absolute-beginners`
    project, which has a configuration file named `pom.xml`. In this file, all dependencies
    and their versions are listed. The child projects, the ones on the second level,
    are the modules of this project. They are called *child* projects because they
    inherit those dependencies and modules from the parent project. In their configuration
    files, we can specify which dependencies are needed from the list defined in the
    parent.


    These modules are actually a method of wrapping up together sources for each chapter,
    which is why these modules are named `chapter00`, `chapter01`, and so forth. If
    a project is big and needs a lot of code to be written, the code is split again
    in another level of modules. Module `chapter05` is such a case and is configured
    as a parent for the projects underneath it. In Figure [3-27](#463938_3_En_3_Chapter.xhtml#Fig27)
    you can see what this project looks like loaded in IntelliJ IDEA, and module `chapter05`
    is expanded, so you can see the third level of modules. Each level is marked with
    the corresponding number.


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig27_HTML.jpg)


    Figure 3-27


    Maven multilevel project structure


    If you have loaded the project into IntelliJ IDEA like you were taught in Chapter
    [2](#463938_3_En_2_Chapter.xhtml), you can make sure everything is working correctly
    by building it. Here’s how you do it using the IntelliJ IDEA editor:


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig28_HTML.jpg)


    Figure 3-28


    Maven project view


    *   In the upper right side, you should have a tab called *Maven*. If the subprojects
    are loaded like they are depicted in Figure [3-28](#463938_3_En_3_Chapter.xhtml#Fig28),
    the project was loaded correctly.

    *   If the Maven tab is not visible, look for a label like the one marked with
    (1) and click it. Expand the `java-23-for-absolute-beginners` (root) node until
    you find the built task, marked with (2). If you double-click it and do not see
    any error in the view at the bottom of the editor, all your projects were built
    successfully. You should definitely see the BUILD SUCCESS (3) message.


    The second way to make sure the Maven project is working as expected is to build
    it from the command line. Open an IntelliJ IDEA terminal, and if you installed
    Maven on the system path as explained in Chapter [2](#463938_3_En_2_Chapter.xhtml),
    just type `mvn` and press **Enter**.


    **Important**


    The main `pom.xml` file, located in the root of the project, has a default goal
    configured through the following line: `<defaultGoal>clean install</defaultGoal>`.
    It declares the two Maven execution phases required to build this project. Without
    this element in the configuration, to build the project, the two phases would
    be specified in the command (e.g., `mvn clean install`).


    In the command line, you might see some warnings if JDK 23 is still unstable when
    this book reaches you, but as long as the execution ends with BUILD SUCCESSFUL,
    everything is all right.


    Aside from the `sandbox` project, which is simple enough for you to create yourself,
    all the classes, modules, and packages mentioned in this section are part of this
    project. The `chapter00` and `chapter01` modules do not really contain classes
    specific to those chapters, but I needed them to be able to construct the Java
    module examples. IntelliJ IDEA sorts modules in alphabetical order, so the naming
    for the chapter modules was chosen this way so that they are listed in the normal
    order you should work with them.


    Until now, this chapter has been focused on the building blocks of Java applications
    and we have created a class that prints *Hello World!* by following the instructions,
    but not all details were explained. Let’s look at those now and even enrich the
    class with new details.'
