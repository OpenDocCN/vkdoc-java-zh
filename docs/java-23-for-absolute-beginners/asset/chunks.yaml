    \ `submissionPublisher`; otherwise, our flow won’t work as expected. Also, we’ve\
    \ added a `start()` method that takes elements from the infinite `IntStream` and\
    \ submits them using the internal `submissionPublisher`.\n\nThe `IntStream` makes\
    \ use of a `RandomGenerator` instance to generate integer values in the `[0,150]`\
    \ interval. This interval is chosen so that we can see how values greater than\
    \ 127 are discarded by the first `Flow.Processor<T,R>` instance connected to the\
    \ publisher. To be able to slow down the element submission, we’ve added a call\
    \ to `Thread.sleep(1000)` that basically guarantees one element per second will\
    \ be forwarded up the chain.\n\nThe name of the first processor will be `FilterCharProcessor`\
    \ and will make use of an internal `SubmissionPublisher<Integer>` instance to\
    \ send the elements it processes onward to the next processor.\n\nExceptions thrown\
    \ will be also forwarded using the `SubmissionPublisher<Integer>`. The processor\
    \ acts as a publisher, but as a subscriber as well, so the implementation on the\
    \ `onNext(..)` method will have to include a call to `subscription.request(..)`\
