- fmt: '### Running Java Source Files Directly Using Java 22


    The improvements to support beginners’ introduction to Java continue in Java 22,
    through JEP 458, *Launch Multi-File Source-Code Programs*, which introduces the
    possibility to run actual Java files with proper Java syntax, not a simplified
    dialect for total beginners. In Java 22, people learning Java can write and run
    single-class programs and then expand them to include more features as their learning
    progresses.


    As introduced in Chapter 1, most Java books for beginners start with the typical
    *Hello World!* example, shown in Listing 2-18.


    ```

    public class Practice01 {

    public static void main(String[] args) {

    System.out.println("Practice01: Hello World!");

    }

    }

    Listing 2-18

    TyTypical `HelloWorld` Java Example

    ```


    The code depicted in Listing 2-18 represents the content of the `java22-sandbox/Practice01.java`
    file. You can run this file directly as shown in Listing 2-19.


    ```

    > java Practice01.java

    # output

    Practice01: Hello World!

    Listing 2-19

    Running a Java File Using Java 22

    ```


    **Information**


    Notice that the `--enable-preview --source 22` options are not necessary, since
    this is not a preview feature.


    In the previous section covering Java 21, the text to be printed was provided
    via a variable, or another method. In Java 22, the text can be provided using
    a method in another class. Listing 2-20 shows the contents of the `HelloProvider`
    class.


    ```

    public class HelloProvider {

    public static String get(){

    return "Hello World from HelloProvider!";

    }

    }

    Listing 2-20

    Class That Declares a Method That Returns Text

    ```


    This class is located in the `java22-sandbox` directory as well. Another class
    named `Practice02` that invokes the `get()` method in the `HelloProvider` can
    be created in the same directory with the contents shown in Listing 2-21.


    ```

    public class Practice02 {

    public static void main(String[] args) {

    System.out.println("Practice02: " + HelloProvider.get());

    }

    }

    Listing 2-21

    Class That Invokes HelloProvider.get()

    ```


    This class has a `main(..)` method, thus the file can be run with the same command
    in Listing 2-19. The command and output is shown in Listing 2-22.


    ```

    > java Practice02.java

    # output

    Practice02: Hello World from HelloProvider!

    Listing 2-22

    Running a Java File That Invokes a Method from a Different Class, from a Different
    File

    ```


    Because the `HelloProvider.java` file is located in the same directory, Java can
    easily find it and use it. This proves that Java 22 can launch multiple Java files
    without the need to go through the compile phase.


    And there is one thing more Java 22 can do. When wiring a Java project, you don’t
    need to always write everything from scratch, because multiple libraries and frameworks
    in Java are publicly available that you can include in your project as a dependency
    and use them. Java libraries are collections of compiled classes that can be archived
    in files with the `jar` extension. When you run a class that references a class
    in a library, you need to tell Java where that library can be found. This practice
    is called *adding a library to the classpath* and is done by invoking the `java`
    extension command with the `-cp` option and providing as an argument the location
    of the library.


    Listing 2-23 shows the code of a class named `Practice03` that invokes the `HelloProvider.get()`
    method but the `HelloProvider` class is loaded from a library on the classpath.


    ```

    public class Practice03 {

    public static void main(String[] args) {

    System.out.println("Practice03: " + lib.HelloProvider.get());

    }

    }

    Listing 2-23

    Class That Invokes HelloProvider.get() from a Library

    ```


    To make it obvious that we are using the compiled and archived version of the
    `HelloProvider` class, the class definition includes the `lib` package, as shown
    in Listing 2-24.


    ```

    package lib;

    public class HelloProvider {

    public static String get(){

    return "Hello World from HelloProvider in the lib jar!";

    }

    }

    Listing 2-24

    Class That Invokes HelloProvider.get()

    ```


    You will learn how to compile classes and pack them in **Chapter 3**; for now,
    just use the provided `jar` for this example, which is located at `java22-sandbox/lib/lib-provider.jar`.
    The command to run the `Practice03.java` file and its output are shown in Listing
    2-25.


    ```

    > java -cp "lib/*" Practice03.java

    # output

    Practice03: Hello World from HelloProvider in the lib jar!

    Listing 2-25

    Running a Java File That Invokes a Method from a Different Class, from a Library

    ```


    These features offer extension students and aspiring developers the opportunity
    to experiment with Java code without feeling overwhelmed by the number of tools
    they need to install and be somewhat familiar with just to print a message in
    the console.


    Java 21 introduced the possibility of running a single Java file with a simplified
    Java dialect. The feature is still a preview when this chapter is being written,
    but it might be an official feature when Java 23 is released.


    Java 22 added the possibility to run multiple Java files. The class containing
    the `main(..)` method can reference classes in other files, and it works as long
    as they are in the same directory with it, either at the same level or in nested
    directories. When a class is in a directory or in a nested directory structure,
    the class is considered to be in a package and thus the Java file must contain
    a package declaration. For example, let’s consider the two Java files in Listing
    2-26.


    ```

    ├── Practice04.java

    └──  com

    └── provider

    └── HelloProvider.java

    Listing 2-26

    HelloProvider.java Java File in a Directory Hierarchy

    ```


    The `HelloProvider.java` file is located under `com/provider` and is referenced
    in the `Practice04.java` file. The `HelloProvider.java` body starts with the `package
    com.provider;` statement (you will learn about packages in **Chapter 3**), as
    shown in Listing 2-27.


    ```

    package com.provider;

    public class HelloProvider {

    public static String get(){

    return "Hello World from com.provider.HelloProvider!";

    }

    }

    Listing 2-27

    HelloProvider.java Contents

    ```


    When referencing it in the `Practice04.java` file, the package name must be used
    as shown in Listing 2-28.


    ```

    class Practice04 {

    public static void main(String[] args) {

    System.out.println("Practice04: " +  com.provider.HelloProvider.get());

    }

    }

    Listing 2-28

    HelloProvider.java Java File in a Directory Hierarchy

    ```


    The command to run the `Practice04.java` file and its output are shown in Listing
    2-29. Notice that no arguments are necessary to ensure that Java will find `com/provider/HelloProvider.java`.


    ```

    > java Practice04.java

    # output

    Practice04: Hello World from com.provider.HelloProvider!

    Listing 2-29

    Running a Java File That Invokes a Method from a Class in a Hierarchy of Directories

    ```


    Java 22 added the possibility to also use Java classes contained in libraries,
    and the in-memory compilation works as long as they are added to the classpath.


    If the in-memory compilation fails because the Java syntax is incorrect, or dependencies
    cannot be found, in 99.99% of cases the error messages will help you fix the code.
    Let’s examine a few very common errors. Look at the `Practice05.java` example
    depicted in Listing 2-30.'
