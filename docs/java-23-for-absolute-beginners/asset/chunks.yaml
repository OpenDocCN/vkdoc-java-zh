- fmt: '### Text Blocks


    In JDK 15, support for text blocks was introduced, which means instead of splitting
    a big `String` value into multiple smaller values written on multiple lines and
    concatenating them to keep the code readable, you can now declare a single block
    of text and assign it to a `String` reference.


    Before Java 15, if you wanted to declare a multiline string value, you had a few
    options, which included concatenations, explicit line terminators, and delimiters.
    A few of these options are depicted in Listing 5-30. Depending on the solution
    you are building, you can choose any of them; a discussion about the efficiency
    and drawbacks of each is out of scope for this book.


    ```

    package com.apress.bgn.five;

    import java.io.PrintWriter;

    import java.io.StringWriter;

    public class MultiLineDemo {

    void main() {

    // this statement extracts the newline character specific to the

    // operating system

    String newLineCh = System.getProperty("line.separator");

    // method 1: simple concatenation using the ''+'' operator

    String multilineStr = "line one of the text block" +

    newLineCh +

    "line two of the text block" +

    newLineCh +

    "last line of the text block" ;

    // or method 2 using `String#concat(..)` method

    multilineStr = "line one of the text block"

    .concat(newLineCh)

    .concat("line two of the text block")

    .concat(newLineCh)

    .concat("last line of the text block") ;

    // or method 3 using `String.join` utility method

    multilineStr = String.join("line one of the text block" ,

    newLineCh ,

    "line two of the text block" ,

    newLineCh ,

    "last line of the text block");

    // or method 4 using a StringBuffer instance

    multilineStr = new StringBuffer("line one of the text block")

    .append(newLineCh)

    .append("line two of the text block")

    .append(newLineCh)

    .append("last line of the text block").toString();

    // or method 5 using a StringBuilder instance

    multilineStr = new StringBuilder("line one of the text block")

    .append(newLineCh)

    .append("line two of the text block")

    .append(newLineCh)

    .append("last line of the text block").toString();

    // or method 5 using a StringWriter instance

    StringWriter stringWriter = new StringWriter();

    stringWriter.write("line one of the text block");

    stringWriter.write(newLineCh);

    stringWriter.write("line two of the text block");

    stringWriter.write(newLineCh);

    stringWriter.write("last line of the text block");

    multilineStr = stringWriter.toString();

    // or method 6 using a StringWriter and PrintWriter instance

    stringWriter = new StringWriter();

    PrintWriter printWriter = new PrintWriter(stringWriter);

    printWriter.println("line one of the text block");

    printWriter.println("line two of the text block");

    printWriter.println("last line of the text block");

    multilineStr = stringWriter.toString();

    System.out.println(multilineStr);

    }

    }

    ```


    **Listing 5-30** Multiline Java String Value Before JDK 15


    **Important**


    `StringBuffer` represents a thread-safe, mutable sequence of characters. This
    means any action on a `StringBuffer` is executed after single access is ensured.
    This is why using `StringBuffer` to concatenate strings is slower than using `StringBuilder`,
    which is its non-thread-safe equivalent. So when designing your code, unless there
    is a risk that your string concatenation block will be executed by multiple threads
    in parallel, go with `StringBuilder`.


    In JDK 15, support for declaring text blocks was added, which enables programmers
    to embed multiline texts in the code exactly as they are without modifying them
    to add line terminators, delimiters, or concatenation operators. A text block
    is thus an alternative form of Java `String` representation that starts with three
    double-quote characters followed by a line terminator and ends with three double-quote
    characters. So the previous multiline text can be written with the new syntax
    as shown here:


    ```

    String multilineStr = """

    line one of the text block

    line two of the text block

    last line of the text block

    """;

    ```


    The new syntax is designed only for declaring multiline texts, so it cannot be
    used to declare single-line texts. Doing so will result in a compile error. The
    same will happen if the starting three double-quote characters are followed by
    text instead of the expected line terminator. Figure 5-18 depicts two wrong ways
    to declare multiline text blocks, and the explanation provided by the IDE.


    ![Figure 5-18](images/463938_3_En_5_Chapter/463938_3_En_5_Fig18_HTML.jpg)


    **Figure 5-18** Invalid syntax for declaring multiline texts


    The following are a few items to note about the syntax:


    - The `"` (double quote) does not need to be escaped in a multiline text block,
    unless three of them are grouped together within the value. In this case the compiler
    might be a little confused as to where the text block ends, so in this case at
    least one of them must be escaped.


    - When the lines that make the text block need to be indented, either spaces or
    tabs should be used; using them both might lead to unpredictable results (e.g.,
    irregular indentation can break a YAML configuration).


    - Text blocks support two extra escape sequences: `\<line-terminator>` and `\s`.
    Both are described next.


    The first escape sequence, `\<line-terminator>`, suppresses the inclusion of an
    implicit newline character. For example, a text block declared as shown previously
    is equivalent to the following:


    ```

    String multilineStr = "line one of the text block" + "\n" +

    "line two of the text block" + "\n" +

    "last line of the text block" + "\n" ;

    ```


    If the last line is not needed, there are two options. First, the text block can
    have the terminator specified inline with the last line of text:


    ```

    String multilineStr = """

    line one of the text block

    line two of the text block

    last line of the text block""";

    ```


    But this is not recommended since it might affect indentation. The recommended
    way is to use the `\<line-terminator>` escape character since this better frames
    the text block and allows the closing delimiter to manage indentation.


    ```

    String multilineStr = """

    line one of the text block

    line two of the text block

    last line of the text block\

    """;

    ```


    The other escape sequence supported by text blocks, `\s`, translates to space.
    This is useful when we want some spaces at end of the lines in the text block:


    ```

    String multilineStr = """

    line one of the text block\s

    line two of the text block\s

    last line of the text block\

    """;

    ```


    The official Oracle documentation includes a section dedicated to the new multiline
    blocks added in JDK 15. If you ever need more information, that is the best place
    to look.'
