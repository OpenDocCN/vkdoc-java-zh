- fmt: '### Java Web Application with an Embedded Server


    For this section, an embedded Apache Tomcat server is used to display a few simple
    web pages, using Java servlets (patience young padawan, they will be explained
    shortly). Tomcat version 11 is used, which means Java modules are supported. The
    advantage of using an embedded Tomcat server is that you can run a web application
    by executing a `main` method. The code, depicted in Listing [10-33](#463938_3_En_10_Chapter.xhtml#PC43),
    declares a single, very simple servlet that serves as the main page of the application.


    ```

    package com.apress.bgn.ten;

    import jakarta.servlet.http.HttpServlet;

    import jakarta.servlet.http.HttpServletRequest;

    import jakarta.servlet.http.HttpServletResponse;

    import org.apache.catalina.Context;

    import org.apache.catalina.LifecycleException;

    import org.apache.catalina.startup.Tomcat;

    // other import statements omitted

    public class WebDemo {

    private static final Logger LOGGER = Logger.getLogger(WebDemo.class.getName());

    public static final Integer PORT = Optional.ofNullable(System.getenv("PORT")).map(Integer::parseInt).orElse(8080);

    public static final String TMP_DIR = Optional.ofNullable(System.getenv("TMP_DIR")).orElse("/tmp/tomcat-tmp");

    public static final String STATIC_DIR = Optional.ofNullable(System.getenv("STATIC_DIR")).orElse("/tmp/tomcat-static");

    void main() throws IOException, LifecycleException {

    var tomcat = new Tomcat();

    tomcat.setBaseDir(TMP_DIR);

    tomcat.setPort(PORT);

    tomcat.getConnector();

    tomcat.setAddDefaultWebXmlToWebapp(false);

    var contextPath = ""; // root context

    boolean createDirs =  new File(STATIC_DIR).mkdirs();

    if(createDirs) {

    LOGGER.info("Tomcat static directory created successfully.");

    } else {

    LOGGER.severe("Tomcat static directory could not be created.");

    }

    var docBase = new File(STATIC_DIR).getCanonicalPath();

    var context = tomcat.addWebapp(contextPath, docBase);

    addIndexServlet(tomcat, contextPath, context); // omitted

    // needed for proper servlets disposal

    Runtime.getRuntime().addShutdownHook(new Thread(() -> {

    try {

    tomcat.getServer().stop();

    } catch (LifecycleException e) {

    LOGGER.warning("Unable to stop Tomcat server");

    }

    }));

    tomcat.start();

    tomcat.getServer().await();

    }

    }

    Listing 10-33

    Simple Java Application with an Embedded Server

    ```


    Writing an application with an embedded Tomcat server is quite easy when you don’t
    need complex web pages, making use of templating libraries for HTML generation,
    like JSP, for example. The code snippet in Listing [10-33](#463938_3_En_10_Chapter.xhtml#PC43)
    only requires the `tomcat-embed-core` library as a dependency, and the simple
    steps to create the server are explained here:


    1.  Create an `org.apache.catalina.startup.Tomcat` instance and select the port
    to expose it. In this case it is `8080`, the default value of the `PORT` variable,
    unless declared using a system environment variable with the same name.


    2.  Set a base directory for the `Tomcat` instance, where the running server will
    save its various generated files, such as logs. In this case, the directory is
    configured to be `/tmp/tomcat-tmp` unless declared using a system environment
    variable with the name `TMPDIR`. The user running the application should have
    writing rights over that location.


    3.  Set a directory where static files for `Tomcat` are located. In this case,
    the directory is configured to be `/tmp/tomcat-static` unless declared using a
    system environment variable with the name `STATICDIR`. The user running the application
    should have writing rights over that location.


    4.  Disable default configurations for `Tomcat` by calling `tomcat.setAddDefaultWebXmlToWebapp(false)`.
    In this case this prevents the `org.apache.jasper.servlet.JspServlet` from being
    registered. This servlet enables using JSP files in the web app, but when configured
    it automatically takes over and assumes any request must resolve to a JSP page,
    so the Java servlets are ignored. Since we want to keep the application simple
    and use Java servlets, we disable it.


    5.  Make sure the server shuts down gracefully when the application is closed,
    by adding a shutdown hook.


    6.  Write a simple servlet to display the main page of the application to test
    that the server was started correctly and works as intended. This is done by the
    `addIndexServlet(..)` method that was omitted from Listing [10-33](#463938_3_En_10_Chapter.xhtml#PC43)
    to make sure the focus would be on the `Tomcat` instance. The method is shown
    in Listing [10-34](#463938_3_En_10_Chapter.xhtml#PC44).


    ```

    private static void addIndexServlet(Tomcat tomcat, String contextPath, Context
    context) {

    var indexServlet = new HttpServlet() {

    @Override

    protected void doGet(HttpServletRequest req, HttpServletResponse resp)

    throws IOException {

    var writer = resp.getWriter();

    writer.print("""


    """);

    }

    };

    var servletName = "IndexServlet";

    var urlPattern = "/";

    tomcat.addServlet(contextPath, servletName, indexServlet);

    context.addServletMappingDecoded(urlPattern, servletName);

    }

    Listing 10-34

    A Simple Method That Creates a Very Simple Servlet and Registers It with a Tomcat
    Instance

    ```


    The servlet instance must be associated with a name and a URL pattern, and when
    the user tries to open the `serverURL/contextPath/urlPattern` page, the `doGet(..)`
    method is called that returns the response constructed in its body.


    A Java web application deployed on a server (even an embedded one) needs a context
    path. The context path value is a part of the URL to access the application. A
    URL is made up of four parts:


    *   `protocol`: The application-level protocol used by the client and server to
    communicate, such as `http`, `https`, `ftp`, and so on.


    *   `hostname`: The DNS domain name (e.g., `www.google.com`) or IP address (e.g.,
    `192.168.0.255`) or any alias recognized in a network. For example, when an application
    is accessed from the same computer the server is installed on, either `127.0.0.1`,
    `localhost`, or `0.0.0.0` can be used.


    *   `path and filename`: The name and location of the resource, under the server
    document base directory. Users usually request to view specific pages hosted on
    servers, which is why URLs look like this: `https://docs.oracle.com/index.html`.
    For security reasons, a common practice is to hide the paths and filenames by
    using internal mappings (called *URL redirection*).


    So where does the `contextPath` value mentioned previously come in? When we have
    an embedded server declared as in Listing [10-34](#463938_3_En_10_Chapter.xhtml#PC44),
    any files that are hosted by it can be accessed by using `http://localhost:8080/`.
    But on a dedicated server, more than one application can be running at the same
    time, and there must be a way to separate them, right? This is where the `contextPath`
    value comes in handy. By setting the `contextPath` value to `/demo` instead of
    the empty string, the `WebDemo` application and the resources it provides to the
    users can be accessed at `http://localhost:8080/demo/`.'
