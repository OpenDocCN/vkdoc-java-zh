    \ = 729 #numDataElements 3 dataOff[0] = 2\n[main] INFO com.apress.bgn.eleven.MediaDemo\
    \ -- 最适合请求尺寸的图片: \n[main] INFO com.apress.bgn.eleven.MediaDemo -- 是否完全相同? false\n\
    清单 11-50\n运行 MediaDemo 产生的输出\n```\n\n*等等，什么？* 为什么图片不完全相同？它们确实具有相同的分辨率，但作为对象，它们并不相同，因为绘制像素并不是那么精确。但如果你真的想确认，你可以使用如下代码来打印两张图片的宽度和高度，用图片查看器打开它们，用肉眼你会看到它们看起来是一样的：\n\
    \n```\nlog.info(\"变体图片宽度 x 高度 : {} x {}\", variantImg.getWidth(), variantImg.getHeight());\n\
    log.info(\"dest25Img 宽度 x 高度 : {} x {}\", dest25Img.getWidth(), dest25Img.getHeight());\n\
    ```\n\n前面代码的输出清楚地表明两张图片具有相同的尺寸，正如预期的那样：\n\n```\n[main] INFO MediaDemo - 变体图片宽度\
    \ x 高度 :  500 x 243\n[main] INFO MediaDemo - dest25Img 宽度 x 高度 :  500 x 243\n\
    ```\n\n正如你所注意到的，大多数图片类都属于旧的 `java.awt`，它如今已很少使用，并且众所周知速度相当慢。因此，如果你想构建一个需要图像处理的应用程序，你可能需要寻找替代方案。其中一种替代方案是使用\
    \ JavaFX，这将在下一节中介绍。\n"
- fmt: '# Using JavaFX Image Classes


    Besides the Java Media API, which is centered on components of the `java.awt`
    package, another way to display and edit images is provided by JavaFX. The core
    class for the `javafx.scene.image` package is named `Image` and can be used to
    handle images in a few common formats: PNG, JPEG, BMP, GIF, and others. JavaFX
    applications display images using an instance of `javafx.scene.image.ImageView`,
    and the part that I like most about this class is that the images can also be
    displayed scaled, without modifying the original image.


    To create a `javafx.scene.image.Image` instance, all we need is either a `FileInputStream`
    instance to read the image from the user-provided location or a URL location given
    as `String`. The code snippet in Listing [11-51](#463938_3_En_11_Chapter.xhtml#PC85)
    creates a JavaFX application that displays an image with its original width and
    height, which can be accessed using methods in class `javafx.scene.image.Image`.


    ```

    package com.apress.bgn.eleven;

    // import statements omitted

    public class JavaFxMediaDemo extends Application {

    final static int option = 3;

    public static void main(String... args) {

    Application.launch(args);

    }

    @Override

    public void start(Stage primaryStage) throws Exception {

    primaryStage.setTitle("JavaFX Image Demo");

    File src = new File("chapter11/media-handling/src/main/resources/cover.png");

    Image image = new Image(new FileInputStream(src));

    ImageView imageView = new ImageView(image);

    imageView.setFitHeight(image.getHeight());

    imageView.setFitWidth(image.getWidth());

    imageView.setPreserveRatio(true);

    //Creating a Group object

    StackPane root = new StackPane();

    root.getChildren().add(imageView);

    primaryStage.setScene(new Scene(root,

    image.getWidth()+10,

    image.getHeight()+10));

    primaryStage.show();

    }

    }

    Listing 11-51

    Using JavaFX to Display Images

    ```


    The `Image` instance cannot be added to the `Scene` of the JavaFX instance directly,
    as it does not extend the `Node` abstract class that is required to be implemented
    by all JavaFX elements that make a `JavaFxApplication`. That is why this instance
    must be wrapped in a `javafx.scene.image.ImageView` instance, which is a class
    extending `Node` and that is specialized for rendering images loaded with the
    `Image` class. The `ImageView` class resizes the displayed image, with or without
    preserving the original aspect ratio, by calling the `setPreserveRatio(..)` method
    with the appropriate argument: `true` to keep the original aspect ratio, `false`
    otherwise.


    > **Caution**

    >

    > Check out Chapter 10 to learn how to install JavaFX for your system so that
    the examples in this chapter can be run correctly.


    As you can see in Listing [11-51](#463938_3_En_11_Chapter.xhtml#PC85), we use
    the values retuned by `image.getWidth()` and `image.getHeight()` to set the size
    of the `ImageView` object and the size of the `Scene` instance. But let’s get
    creative and display the scaled image, still preserving the aspect ratio and also
    using a better-quality filtering algorithm when scaling the image by using the
    `smooth(..)` method, as shown here:


    ```

    //...

    ImageView imageView = new ImageView(image);

    imageView.setFitWidth(100);

    imageView.setPreserveRatio(true);

    imageView.setSmooth(true);

    //...

    ```


    Another thing that the `ImageView` class can do is support a `Rectangle2D` view
    port that can be used to rotate the image:


    ```

    //...

    ImageView imageView = new ImageView(image);

    Rectangle2D viewportRect = new Rectangle2D(2, 2, 600, 600);

    imageView.setViewport(viewportRect);

    imageView.setRotate(90);

    //...

    ```


    Being an implementation of `Node`, `ImageView` supports clicking events, and it
    is quite easy to write some code to resize an image as a response to a single
    mouse click on it. Just take a look at code in Listing [11-52](#463938_3_En_11_Chapter.xhtml#PC88).


    ```

    //...

    ImageView imageView = new ImageView(image);

    imageView.setFitHeight(image.getHeight());

    imageView.setFitWidth(image.getWidth());

    imageView.setPreserveRatio(true);

    root.getChildren().add(imageView);

    imageView.setPickOnBounds(true);

    imageView.setOnMouseClicked(mouseEvent -> {

    if(imageView.getFitWidth() > 100) {

    imageView.setFitWidth(100);

    imageView.setPreserveRatio(true);

    imageView.setSmooth(true);

    } else {

    imageView.setFitHeight(image.getHeight());

    imageView.setFitWidth(image.getWidth());

    imageView.setPreserveRatio(true);

    }

    });

    //...

    Listing 11-52

    Using JavaFX to Resize Images on Click Events

    ```


    In the code snippet in Listing [11-52](#463938_3_En_11_Chapter.xhtml#PC88), by
    calling the `setOnMouseClicked(..)` method, we attached an `EventHandler<? super
    MouseEvent>` instance to the mouse-clicking event on the `imageView`. `EventHandler<T
    extends Event>` is a functional interface containing a single method named `handle`,
    and its concrete implementation is the body of the lambda expression in Listing
    [11-52](#463938_3_En_11_Chapter.xhtml#PC88).


    If you are interested in learning more about media processing, Oracle provides
    some really good tutorials. Also, as practice, you can try writing your own code,
    based on the code in the book, to add a mouse event that rotates the image. This
    is all the space we can dedicate to playing with images in Java. I hope you found
    this section useful and that you might get the chance to test your Java Media
    API skills in the future, at least for cleaning EXIF data from your images.'
  raw: '## Using JavaFX Image Classes


    Besides the Java Media API, which is centered on components of the `java.awt`
    package, another way to display and edit images is provided by JavaFX. The core
    class for the `javafx.scene.image` package is named `Image` and can be used to
    handle images in a few common formats: PNG, JPEG, BMP, GIF, and others. JavaFX
    applications display images using an instance of `javafx.scene.image.ImageView`,
    and the part that I like most about this class is that the images can also be
    displayed scaled, without modifying the original image.


    To create a `javafx.scene.image.Image` instance, all we need is either a `FileInputStream`
    instance to read the image from the user-provided location or a URL location given
    as `String`. The code snippet in Listing [11-51](#463938_3_En_11_Chapter.xhtml#PC85)
    creates a JavaFX application that displays an image with its original width and
    height, which can be accessed using methods in class `javafx.scene.image.Image`.


    ```

    package com.apress.bgn.eleven;

    // import statements omitted

    public class JavaFxMediaDemo extends Application {

    final static int option = 3;

    public static void main(String... args) {

    Application.launch(args);

    }

    @Override

    public void start(Stage primaryStage) throws Exception {

    primaryStage.setTitle("JavaFX Image Demo");

    File src = new File("chapter11/media-handling/src/main/resources/cover.png");

    Image image = new Image(new FileInputStream(src));

    ImageView imageView = new ImageView(image);

    imageView.setFitHeight(image.getHeight());

    imageView.setFitWidth(image.getWidth());

    imageView.setPreserveRatio(true);

    //Creating a Group object

    StackPane root = new StackPane();

    root.getChildren().add(imageView);

    primaryStage.setScene(new Scene(root,

    image.getWidth()+10,

    image.getHeight()+10));

    primaryStage.show();

    }

    }

    Listing 11-51

    Using JavaFX to Display Images

    ```


    The `Image` instance cannot be added to the `Scene` of the JavaFX instance directly,
    as it does not extend the `Node` abstract class that is required to be implemented
    by all JavaFX elements that make a `JavaFxApplication`. That is why this instance
    must be wrapped in a `javafx.scene.image.ImageView` instance, which is a class
    extending `Node` and that is specialized for rendering images loaded with the
    `Image` class. The `ImageView` class resizes the displayed image, with or without
    preserving the original aspect ratio, by calling the `setPreserveRatio(..)` method
    with the appropriate argument: `true` to keep the original aspect ratio, `false`
    otherwise.


    Caution


    Check out **Chapter** [**10**](#463938_3_En_10_Chapter.xhtml) to learn how to
    install JavaFX for your system so that the examples in this chapter can be run
    correctly.


    As you can see in Listing [11-51](#463938_3_En_11_Chapter.xhtml#PC85), we use
    the values retuned by `image.getWidth()` and `image.getHeight()` to set the size
    of the `ImageView` object and the size of the `Scene` instance. But let’s get
    creative and display the scaled image, still preserving the aspect ratio and also
    using a better-quality filtering algorithm when scaling the image by using the
    `smooth(..)` method, as shown here:


    ```

    //...

    ImageView imageView = new ImageView(image);

    imageView.setFitWidth(100);

    imageView.setPreserveRatio(true);

    imageView.setSmooth(true);

    //...

    ```


    Another thing that the `ImageView` class can do is support a `Rectangle2D` view
    port that can be used to rotate the image:


    ```

    //...

    ImageView imageView = new ImageView(image);

    Rectangle2D viewportRect = new Rectangle2D(2, 2, 600, 600);

    imageView.setViewport(viewportRect);

    imageView.setRotate(90);

    //...

    ```


    Being an implementation of `Node`, `ImageView` supports clicking events, and it
    is quite easy to write some code to resize an image as a response to a single
    mouse click on it. Just take a look at code in Listing [11-52](#463938_3_En_11_Chapter.xhtml#PC88).


    ```

    //...

    ImageView imageView = new ImageView(image);

    imageView.setFitHeight(image.getHeight());

    imageView.setFitWidth(image.getWidth());

    imageView.setPreserveRatio(true);

    root.getChildren().add(imageView);

    imageView.setPickOnBounds(true);

    imageView.setOnMouseClicked(mouseEvent -> {

    if(imageView.getFitWidth() > 100) {

    imageView.setFitWidth(100);

    imageView.setPreserveRatio(true);

    imageView.setSmooth(true);

    } else {

    imageView.setFitHeight(image.getHeight());

    imageView.setFitWidth(image.getWidth());

    imageView.setPreserveRatio(true);

    }

    });

    //...

    Listing 11-52

    Using JavaFX to Resize Images on Click Events

    ```


    In the code snippet in Listing [11-52](#463938_3_En_11_Chapter.xhtml#PC88), by
    calling the `setOnMouseClicked(..)` method, we attached an `EventHandler<? super
    MouseEvent>` instance to the mouse-clicking event on the `imageView`. `EventHandler<T
    extends Event>` is a functional interface containing a single method named handle,
