- fmt: "### Running Java Source Files Directly Using Java 21\n\nJava 21, through JEP\
    \ 445, *Unnamed Classes and Instance Main Methods*, makes it easier for Java beginners\
    \ to write their first programs without needing to understand language features\
    \ designed for large programs. As the JEP title indicates, it does so by adding\
    \ support for unnamed classes and instance `main` methods. What does this mean?\
    \ Java 21 provides the ability to run Java code directly without needing to compile\
    \ it explicitly (it is being done for you in memory), and a beginner can write\
    \ Java code without having to use a dedicated IDE. JShell already provides this\
    \ feature, but anything else than single-line commands is not practical.\n\nLet’s\
    \ test that, shall we? In directory `chapter02/java21-sandbox` there is a file\
    \ named `practice01.java`. Its contents are depicted in Listing 2-14.\n\n> **Note**\
    \  \n> Oracle caused me a *chicken-and-egg* problem with the introduction of this\
    \ feature. At this point in the book you haven’t cloned the book repository yet,\
    \ so you don’t have the sources. For running the examples shown in this section\
    \ and the next, you don’t really need to have the sources anyway. You can create\
    \ your own sandbox directory and create the files with the provided content. If\
    \ you want to download the sources, you can temporarily jump to the **Installing\
    \ Git** section.\n\n```\nvoid main() {\nSystem.out.println(\"Practice01: Hello\
    \ World\");\n}\n```\n\n*Listing 2-14* Simple `main` Method in `practice01.java`\
    \ File\n\nThe method signature is very simple, and is different from the `main`\
    \ methods you will see later in this book. This is a simplified dialect of the\
    \ Java programming language targeted at total beginners. IntelliJ IDEA knows how\
    \ to run this file, but if JEP 445 is still in preview status when you are reading\
    \ this book, you will need to select an option for the project **Language level**\
    \ that includes preview features. At the time of writing, this feature is a preview\
    \ in Java version 21, which means running the file can be done only with the command\
    \ shown in Listing 2-15.\n\n```\n> java --enable-preview --source 21 practice.java\n\
    # output\nNote: practice.java uses preview features of Java SE 21.\nNote: Recompile\
    \ with -Xlint:preview for details.\nPractice01: Hello World!\n```\n\n*Listing\
    \ 2-15* `java` Command to Run the `practice01.java` File\n\nListing 2-15 also\
    \ shows the output produced by running the command. Normally in Java, methods\
    \ must be enclosed in classes. However, the code in `practice01.java` does not\
    \ require a `class` declaration; thus, it can be said that the `main()` method\
    \ is actually part of an **unnamed** class. *Now the name of the JEP makes more\
    \ sense, right?*\n\nFor Java code to be executed directly like this, there are\
    \ a few rules to follow:\n\n- The `package` statement is *not allowed*.\n- There\
    \ is no class definition and no constructor.\n- The code in the file must be enclosed\
    \ in an unnamed class, which cannot `extend` or `implement` another class or interface.\n\
    - A `main()` method must exist and is `static` by default (and `public`) — however,\
    \ these two terms are omitted to avoid confusing a beginner with notions such\
    \ as class and instance members.\n- The file can declare only static members (fields\
    \ and methods), and static methods can access only other static members.\n- The\
    \ `main()` method can have arguments, and they are passed over when executing\
    \ the file.\n\nThese rules probably do not make sense to you right now, since\
    \ most of the terms in this list are introduced in **Chapter 3**, but as an absolute\
    \ beginner, it is not critical to know these rules yet. Feel free to come back\
    \ to this section later if you need to. For now, let’s see what other code we\
    \ can run directly.\n\nWe can run Java code directly with arguments, as shown\
    \ in Listing 2-16, which depicts the code in file `practice02.java`.\n\n```\n\
    void main(String... args) {\nif (args.length > 0) {\nSystem.out.print(\"Practice02:\
    \ Hello \" + args[0] + \"\\n\");\n} else {\nSystem.out.println(\"Practice02: Hello\
    \ World!\");\n}\n}\n```\n\n*Listing 2-16* `main` Method with Arguments\n\nThe\
    \ code in `practice02.java` can be run with and without arguments. If an argument\
    \ is provided, running the file produces output `Practice02: Hello {argument}`;\
    \ otherwise it produces `Practice02: Hello World!`. Listing 2-17 shows running\
    \ `practice02.java` with and without an argument.\n\n```\n> java --enable-preview\
    \ --source 21 practice02.java Mayer\n# output\nPractice02: Hello Mayer\n> java\
    \ --enable-preview --source 21 practice02.java\n# output\nPractice02: Hello World\n\
    ```\n\n*Listing 2-17* Java command to run the `practice02.java` file\n\nThere\
    \ are two other files in the `java21-sandbox` directory. The `practice03.java`\
    \ file contains a static variable. Its value is printed when the file is run without\
    \ an argument. The `practice04.java` file contains an additional static method,\
    \ aptly named `staticMethod`. This method is invoked in the `main` method and\
    \ its result is printed when the file is run. Feel free to try them out.\n\nThis\
    \ feature provides the opportunity to start writing Java code and running it immediately,\
    \ to get familiar with the language syntax fast before jumping to advanced programming\
    \ concepts.\n\nThe second preview of this feature is present in Java 22 under\
    \ JEP 463, *Implicitly Declared Classes and Instance Main Methods*. A different\
    \ JEP was necessary to include feedback from the community. The implicitly declared\
    \ classes mentioned in the JEP title relax a few of the rules for Java directly\
    \ executable files introduced in Java 21, as the `main()` method is considered\
    \ implicitly enclosed in a class with a name decided by the system, and the `main()`\
    \ method is no longer static. Anyway, there are a lot of details about the inner\
    \ workings in this JEP that will make more sense after you have finished reading\
    \ this book; for now, the only thing you need to know is that you can write simple\
    \ Java programs and execute them easily."
  raw: '### Running Java Source Files Directly Using Java 21


    Java 21, through JEP 445,^([^(27)](#fn27)) *Unnamed Classes and Instance Main
    Methods*, makes it easier for Java beginners to write their first programs without
    needing to understand language features designed for large programs. As the JEP
    title indicates, it does so by adding support for unnamed classes and instance
    `main` methods. What does this mean? Java 21 provides the ability to run Java
    code directly without needing to compile it explicitly (it is being done for you
    in memory), and a beginner can write Java code without having to use a dedicated
    IDE. JShell already provides this feature, but anything else than single-line
    commands is not practical.


    Let’s test that, shall we? In directory `chapter02/java21-sandbox` there is a
    file named `practice01.java`. Its contents are depicted in Listing [2-14](#463938_3_En_2_Chapter.xhtml#PC15).


    Note


    Oracle caused me a *chicken-and-egg* problem with the introduction of this feature.
    At this point in the book you haven’t cloned the book repository yet, so you don’t
    have the sources. For running the examples shown in this section and the next,
    you don’t really need to have the sources anyway. You can create your own sandbox
    directory and create the files with the provided content. If you want to download
    the sources, you can temporarily jump to the **Installing Git** section.


    ```

    void main() {

    System.out.println("Practice01: Hello World");

    }

    Listing 2-14

    Simple main Method in practice01.java File

    ```


    The method signature is very simple, and is different from the `main` methods
    you will see later in this book. This is a simplified dialect of the Java programming
    language targeted at total beginners. IntelliJ IDEA knows how to run this file,
    but if JEP 445 is still in preview status when you are reading this book, you
    will need to select an option for the project **Language level** that includes
    preview features. At the time of writing, this feature is a preview in Java version
    21, which means running the file can be done only with the command shown in Listing
    [2-15](#463938_3_En_2_Chapter.xhtml#PC16).


    ```

    > java --enable-preview --source 21 practice.java

    # output

    Note: practice.java uses preview features of Java SE 21.

    Note: Recompile with -Xlint:preview for details.

    Practice01: Hello World!

    Listing 2-15

    java Command to Run the practice01.java File

    ```


    Listing [2-15](#463938_3_En_2_Chapter.xhtml#PC16) also shows the output produced
    by running the command. Normally in Java, methods must be enclosed in classes.
    However, the code in `practice01.java` does not require a `class` declaration;
    thus, it can be said that the `main()` method is actually part of an **unnamed**
    class. *Now the name of the JEP makes more sense, right?*


    For Java code to be executed directly like this, there are a few rules to follow:


    *   The `package` statement is *not allowed*.


    *   There is no class definition and no constructor.


    *   The code in the file must be enclosed in an unnamed class, which cannot `extend`
    or `implement` another class or interface.


    *   A `main()` method must exist and is `static` by default (and `public`)—however,
    these two terms are omitted to avoid confusing a beginner with notions such as
    class and instance members.


    *   The file can declare only static members (fields and methods), and static
    methods can access only other static members.


    *   The `main()` method can have arguments, and they are passed over when executing
    the file.


    These rules probably do not make sense to you right now, since most of the terms
    in this list are introduced in **Chapter** [**3**](#463938_3_En_3_Chapter.xhtml),
    but as an absolute beginner, it is not critical to know these rules yet. Feel
    free to come back to this section later if you need to. For now, let’s see what
    other code we can run directly.


    We can run Java code directly with arguments, as shown in Listing [2-16](#463938_3_En_2_Chapter.xhtml#PC17),
    which depicts the code in file `practice02.java`.


    ```

    void main(String... args) {

    if (args.length > 0) {

    System.out.print("Practice02: Hello " + args[0] + "\n");

    } else {

    System.out.println("Practice02: Hello World!");

    }

    }

    Listing 2-16

    main Method with Arguments

    ```


    The code in `practice02.java` can be run with and without arguments. If an argument
    is provided, running the file produces output `Practice02: Hello {argument}`;
    otherwise it produces `Practice02: Hello World!`. Listing [2-17](#463938_3_En_2_Chapter.xhtml#PC18)
    shows running `practice02.java` with and without an argument.


    ```

    > java --enable-preview --source 21 practice02.java Mayer

    # output

    Practice02: Hello Mayer

    > java --enable-preview --source 21 practice02.java

    # output

    Practice02: Hello World

    Listing 2-17

    Java command to run the practice02.java file

    ```


    There are two other files in the `java21-sandbox` directory. The `practice03.java`
    file contains a static variable. Its value is printed when the file is run without
    an argument. The `practice04.java` file contains an additional static method,
    aptly named `staticMethod`. This method is invoked in the `main` method and its
    result is printed when the file is run. Feel free to try them out.


    This feature provides the opportunity to start writing Java code and running it
    immediately, to get familiar with the language syntax fast before jumping to advanced
    programming concepts.


    The second preview of this feature is present in Java 22 under JEP 463,^([^(28)](#fn28))
    *Implicitly Declared Classes and Instance Main Methods*. A different JEP was necessary
    to include feedback from the community. The implicitly declared classes mentioned
    in the JEP title relax a few of the rules for Java directly executable files introduced
    in Java 21, as the `main()` method is considered implicitly enclosed in a class
    with a name decided by the system, and the `main()` method is no longer static.
    Anyway, there are a lot of details about the inner workings in this JEP that will
    make more sense after you have finished reading this book; for now, the only thing
    you need to know is that you can write simple Java program and execute them easily.'
  trans: '

    ### 使用 Java 21 直接运行 Java 源文件


    Java 21 通过 JEP 445^(²⁷)（*未命名类和实例 main 方法*）降低了 Java 初学者的入门门槛，使他们无需理解专为大型程序设计的语言特性即可编写第一个程序。正如
    JEP 标题所示，它通过支持未命名类和实例 `main` 方法来实现这一目标。这意味着什么？Java 21 提供了直接运行 Java 代码的能力，无需显式编译（编译过程在内存中自动完成），初学者也无需使用专门的
    IDE 即可编写 Java 代码。JShell 虽然早已具备此功能，但除单行命令外的其他场景并不实用。


    我们来测试一下，好吗？在 `chapter02/java21-sandbox` 目录下有一个名为 `practice01.java` 的文件，其内容如代码清单
    2-14 所示。


    注意


    Oracle 在引入此功能时给我制造了一个*先有鸡还是先有蛋*的问题。在本书的这个阶段，你尚未克隆本书的代码仓库，因此没有源代码。不过，运行本节及下一节中的示例并不需要源代码。你可以自行创建沙盒目录，并根据提供的内容创建文件。如果你想下载源代码，可以暂时跳转到**安装
    Git** 一节。


    ```

    void main() {

    System.out.println("Practice01: Hello World");

    }

    代码清单 2-14

    practice01.java 文件中的简单 main 方法

    ```


    该方法签名非常简洁，与本书后续章节中你将看到的 `main` 方法不同。这是 Java 编程语言的一种简化方言，专为完全初学者设计。IntelliJ IDEA
    能够识别并运行此文件，但如果你阅读本书时 JEP 445 仍处于预览状态，则需要为项目选择包含预览功能的**语言级别**。在撰写本文时，此功能在 Java
    21 中仍为预览特性，这意味着只能通过代码清单 2-15 所示的命令来运行该文件。


    ```

    > java --enable-preview --source 21 practice.java

    # 输出

    Note: practice.java uses preview features of Java SE 21.

    Note: Recompile with -Xlint:preview for details.

    Practice01: Hello World!

    代码清单 2-15

    运行 practice01.java 文件的 java 命令

    ```


    代码清单 2-15 还展示了运行该命令后产生的输出。在常规 Java 中，方法必须包含在类中。然而，`practice01.java` 中的代码并不需要 `class`
    声明；因此，可以说 `main()` 方法实际上属于一个**未命名**类。*现在 JEP 的名称是不是更有意义了？*


    要使 Java 代码能够像这样直接执行，需要遵循以下规则：


    *   **不允许**使用 `package` 语句。


    *   没有类定义和构造函数。


    *   文件中的代码必须包含在未命名类中，该类不能 `extend` 或 `implement` 其他类或接口。


    *   必须存在一个 `main()` 方法，默认情况下它是 `static`（且 `public`）的——但为了不让初学者混淆类成员和实例成员等概念，这两个关键字被省略了。


    *   文件只能声明静态成员（字段和方法），且静态方法只能访问其他静态成员。


    *   `main()` 方法可以包含参数，并在执行文件时传递这些参数。


    这些规则目前对你来说可能难以理解，因为列表中的大部分术语将在**第** **3** 章中介绍。但作为完全初学者，现在了解这些规则并非关键。如有需要，你可以稍后再回到本节。现在，让我们看看还能直接运行哪些其他代码。


    我们可以直接运行带参数的 Java 代码，如代码清单 2-16 所示，该清单展示了 `practice02.java` 文件中的代码。


    ```

    void main(String... args) {

    if (args.length > 0) {

    System.out.print("Practice02: Hello " + args[0] + "\n");

    } else {

    System.out.println("Practice02: Hello World!");

    }

    }

    代码清单 2-16

    带参数的 main 方法

    ```


    `practice02.java` 中的代码可以带参数或不带参数运行。如果提供了参数，运行文件将输出 `Practice02: Hello {参数}`；否则输出
    `Practice02: Hello World!`。代码清单 2-17 展示了带参数和不带参数运行 `practice02.java` 的情况。


    ```

    > java --enable-preview --source 21 practice02.java Mayer

    # 输出

    Practice02: Hello Mayer

    > java --enable-preview --source 21 practice02.java

    # 输出

    Practice02: Hello World

    代码清单 2-17

    运行 practice02.java 文件的 Java 命令

    ```


    `java21-sandbox` 目录下还有另外两个文件。`practice03.java` 文件包含一个静态变量，当不带参数运行该文件时会打印其值。`practice04.java`
    文件包含一个额外的静态方法，恰如其名 `staticMethod`。该方法在 `main` 方法中被调用，运行文件时会打印其结果。欢迎尝试运行它们。


    此功能提供了立即编写并运行 Java 代码的机会，让你在深入学习高级编程概念之前，快速熟悉语言语法。


    该功能的第二个预览版本出现在 Java 22 的 JEP 463^(²⁸)（*隐式声明类和实例 main 方法*）中。之所以需要另一个 JEP，是为了纳入社区反馈。JEP
    标题中提到的隐式声明类放宽了 Java 21 中引入的 Java 直接可执行文件的部分规则：`main()` 方法被视为隐式包含在一个由系统决定名称的类中，并且
    `main()` 方法不再是静态的。无论如何，这个 JEP 中关于内部工作机制的许多细节，在你读完本书后会更容易理解；目前，你只需要知道你可以编写简单的 Java
    程序并轻松执行它们。

