- fmt: '### `jwebserver` 命令行工具


    按照**第 2 章**的说明设置好 Java 开发系统后，所有 JDK 二进制文件都应位于系统路径中。因此，如果打开终端并运行`jwebserver –help`，你将看到启动简单
    Web 服务器的所有可用选项，如清单 10-25 所示。


    ```

    > jwebserver --help

    Usage: jwebserver [-b bind address] [-p port] [-d directory]

    [-o none|info|verbose] [-h to show options]

    [-version to show version information]

    Options:

    -b, --bind-address    - Address to bind to. Default: 127.0.0.1 (loopback).

    For all interfaces use "-b 0.0.0.0" or "-b ::".

    -d, --directory       - Directory to serve. Default: current directory.

    -o, --output          - Output format. none|info|verbose. Default: info.

    -p, --port            - Port to listen on. Default: 8000.

    -h, -?, --help        - Prints this help message and exits.

    -version, --version   - Prints version information and exits.

    To stop the server, press Ctrl + C.

    Listing 10-25

    jwebserver --help Output

    ```


    如果直接在终端中运行`jwebserver`，Web 服务器将在默认端口`8000`上启动，并提供启动时所在目录的内容。因此，如果在`java-23-for-absolute-beginners/chapter10/using-simplewebserver`目录的终端中运行`jwebserver`，然后在浏览器中打开`http://127.0.0.1:8000/`，你将看到典型的
    Maven 项目结构，如图 10-15 所示。


    ![Figure 10-15](images/463938_3_En_10_Chapter/463938_3_En_10_Fig15_HTML.jpg)


    **图 10-15** Java Simple Web Server CLI 显示当前目录


    如果端口`8000`未被其他进程占用，服务器将成功启动。浏览目录结构时，你将在控制台中看到所有`GET`请求的日志。在清单 10-26 中，你可以看到示例输出。


    ```

    127.0.0.1 - - [27/Jul/2024:23:09:08 +0100] "GET / HTTP/1.1" 200 -

    127.0.0.1 - - [27/Jul/2024:23:09:10 +0100] "GET /target/ HTTP/1.1" 200 -

    127.0.0.1 - - [27/Jul/2024:23:09:11 +0100] "GET /target/generated-sources/ HTTP/1.1"
    200 -

    127.0.0.1 - - [27/Jul/2024:23:09:12 +0100] "GET /target/generated-sources/annotations/
    HTTP/1.1" 200 -

    127.0.0.1 - - [27/Jul/2024:23:09:13 +0100] "GET /livereload/149020878/149023281
    HTTP/1.1" 404 -

    127.0.0.1 - - [27/Jul/2024:23:09:14 +0100] "GET /target/classes/ HTTP/1.1" 200
    -

    127.0.0.1 - - [27/Jul/2024:23:09:17 +0100] "GET /livereload/149020878/149023281
    HTTP/1.1" 404 -

    127.0.0.1 - - [27/Jul/2024:23:09:17 +0100] "GET /src/ HTTP/1.1" 200 -

    127.0.0.1 - - [27/Jul/2024:23:09:18 +0100] "GET /src/main/ HTTP/1.1" 200 -

    127.0.0.1 - - [27/Jul/2024:23:09:19 +0100] "GET /src/main/java/ HTTP/1.1" 200
    -

    Listing 10-26

    jwebserver Output

    ```


    此实用程序的目的并非提供生产级服务器的功能——这需要复杂得多的实现。


    如果你想更改提供服务的目录，可以使用`jwebserver -d {path/to/dir}`配置服务器。例如，使用`using-simplewebserver/src/main/resources`目录启动服务器，当在浏览器中访问`http://127.0.0.1:8000/`时，将显示`index.html`文件，如图
    10-16 所示。


    ![Figure 10-16](images/463938_3_En_10_Chapter/463938_3_En_10_Fig16_HTML.jpg)


    **图 10-16** Java Simple Web Server CLI 显示的索引页面


    请随意尝试其他配置。要停止服务器，只需在终端窗口中按`Ctrl+C`。


    除了 CLI，Java 18 还引入了一组新的 API 点用于服务器创建和自定义，它们都归入`jdk.httpserver`模块。下一节将展示如何从 Java
    应用程序配置和启动服务器。


    ### 使用 `SimpleFileServer`


    构成服务器创建和自定义新 API 点的所有组件都归入`com.sun.net.httpserver`包。新类`SimpleFileServer`通过三个静态方法提供服务器的关键组件：


    - `createFileServer(InetSocketAddress addr, Path rootDirectory, OutputLevel outputLevel)`：创建一个绑定到给定地址、从给定路径提供文件，并根据指定日志级别记录请求详细信息的文件服务器。

    - `createFileHandler(Path rootDirectory)`：创建一个文件处理器，从给定目录路径（及其子目录）提供文件。文件处理器是`HttpHandler`的一个实例，被调用来处理
    HTTP 交换。文件处理器用作`HttpServer#create(..)`方法的参数，以配置要启动的服务器。

    - `createOutputFilter(OutputStream out, OutputLevel outputLevel)`：创建一个后处理`Filter`，打印有关交换的日志消息。


    通过调用`createFileServer(..)`方法，可以创建一个简单的内存 Web 服务器。返回实例的类型是`HttpServerImpl`，它扩展了`HttpServer`抽象类。该类实现了一个简单的
    HTTP 服务器。`HttpServer`绑定到一个 IP 地址和端口号，并在此地址上监听来自客户端的传入 TCP 连接。清单 10-27 中的代码展示了创建一个内存服务器的过程，该服务器提供`using-simplewebserver/src/main/resources`目录的内容。


    ```

    package com.apress.bgn.ten;

    import com.sun.net.httpserver.SimpleFileServer;

    import java.io.File;

    import java.io.IOException;

    import java.net.InetAddress;

    import java.net.InetSocketAddress;

    import java.nio.file.Path;

    import static java.lang.System.in;

    import static java.lang.System.out;

    public class MostSimpleServer {

    public static final InetSocketAddress SERVER_ADDR =

    new InetSocketAddress(InetAddress.getLoopbackAddress(), 8080);

    private static final String SERVER_DATA = "using-simplewebserver/";

    void main() throws IOException {

    var serverDataLocation = new File(SERVER_DATA);

    var server = SimpleFileServer.createFileServer(SERVER_ADDR,

    Path.of(serverDataLocation.getAbsolutePath()),

    SimpleFileServer.OutputLevel.VERBOSE);

    server.start();

    out.println("Press any key to exit!");

    in.read();

    server.stop(2);

    }

    }

    Listing 10-27

    Configuring a Simple Web Server Using SimpleFileServer.createFileServer(..)

    ```


    为了保持服务器运行，添加了`System.in.read()`调用以等待用户输入后再停止它。当在浏览器中访问`http://127.0.0.1:8080/`时，会列出`using-simplewebserver`目录的内容。因此，使用
    Java 代码，我们配置并创建了一个简单的 Web 服务器，该服务器本可以通过 CLI 运行`jwebserver -p 8080 -d using-simplewebserver`来创建。


    要单独配置文件处理器，我们需要使用`HttpServer.create(..)`来创建服务器，如清单 10-28 所示。


    ```

    package com.apress.bgn.ten;

    import com.sun.net.httpserver.HttpServer;

    import static com.apress.bgn.ten.MostSimpleServer.SERVER_ADDR;

    // other import statements omitted

    /**

    └── resources

    ├── favicon.ico

    ├── home.html

    ├── index.html

    ├── simple.json

    └── simple.zip

    */

    public class ContextServer {

    public static final String SERVER_DATA = "using-simplewebserver/src/main/resources";

    void main() throws IOException {

    var serverDataLocation = new File(SERVER_DATA);

    var handler = SimpleFileServer.createFileHandler(Path.of(serverDataLocation.getAbsolutePath()));

    var server = HttpServer.create(SERVER_ADDR, 10, "/simple", handler);

    server.start();

    out.println("Press any key to exit!");

    in.read();

    server.stop(2);

    }

    }

    Listing 10-28

    Configure the file handler separately

    ```'
  raw: '#### The `jwebserver` Command-Line Tool


    After you have set up your Java development system as instructed in **Chapter**
    [**2**](#463938_3_En_2_Chapter.xhtml), you should have all the JDK binaries in
    the system path. So if you open a terminal and run `jwebserver –help`, you will
    see all the options available for starting a simple web server, just like shown
    in Listing [10-25](#463938_3_En_10_Chapter.xhtml#PC35).


    ```

    > jwebserver --help

    Usage: jwebserver [-b bind address] [-p port] [-d directory]

    [-o none|info|verbose] [-h to show options]

    [-version to show version information]

    Options:

    -b, --bind-address    - Address to bind to. Default: 127.0.0.1 (loopback).

    For all interfaces use "-b 0.0.0.0" or "-b ::".

    -d, --directory       - Directory to serve. Default: current directory.

    -o, --output          - Output format. none|info|verbose. Default: info.

    -p, --port            - Port to listen on. Default:mkdocs serve --dev-addr=0.0.0.0:8002
    8000.

    -h, -?, --help        - Prints this help message and exits.

    -version, --version   - Prints version information and exits.

    To stop the server, press Ctrl + C.

    Listing 10-25

    jwebserver --help Output

    ```


    If you just run `jwebserver` in the terminal, a web server will start on the default
    port `8000`, and it will serve the contents of the directory in which the server
    was started. So if you run `jwebserver` in a terminal in `java-23-for-absolute-beginners/chapter10/using-simplewebserver`
    and then open `http://127.0.0.1:8000/` in the browser, you should see the typical
    Maven project structure, as shown in Figure [10-15](#463938_3_En_10_Chapter.xhtml#Fig15).


    ![](images/463938_3_En_10_Chapter/463938_3_En_10_Fig15_HTML.jpg)


    Figure 10-15


    Java Simple Web Server CLI showing the current directory


    If port `8000` is not occupied by another process, the server starts successfully.
    If you navigate the directory structure, you will see all the `GET` requests being
    logged in the console. In Listing [10-26](#463938_3_En_10_Chapter.xhtml#PC36),
    you can see a sample output.


    ```

    127.0.0.1 - - [27/Jul/2024:23:09:08 +0100] "GET / HTTP/1.1" 200 -

    127.0.0.1 - - [27/Jul/2024:23:09:10 +0100] "GET /target/ HTTP/1.1" 200 -

    127.0.0.1 - - [27/Jul/2024:23:09:11 +0100] "GET /target/generated-sources/ HTTP/1.1"
    200 -

    127.0.0.1 - - [27/Jul/2024:23:09:12 +0100] "GET /target/generated-sources/annotations/
    HTTP/1.1" 200 -

    127.0.0.1 - - [27/Jul/2024:23:09:13 +0100] "GET /livereload/149020878/149023281
    HTTP/1.1" 404 -

    127.0.0.1 - - [27/Jul/2024:23:09:14 +0100] "GET /target/classes/ HTTP/1.1" 200
    -

    127.0.0.1 - - [27/Jul/2024:23:09:17 +0100] "GET /livereload/149020878/149023281
