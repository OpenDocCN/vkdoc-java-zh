  raw: '## Java Types


    In **Chapter** [**3**](#463938_3_En_3_Chapter.xhtml) when introducing the Java
    building blocks, only the class was explained, to keep things simple. It was mentioned
    that there are other types in Java, and this section introduces all of them. Since
    classes are the most important, they must be covered first.


    ### Classes


    As mentioned in **Chapter** [**3**](#463938_3_En_3_Chapter.xhtml), classes are
    just templates for creating objects. Creating an object based on a **class** is
    called **instantiation**. The resulting object is referred to as an instance of
    that class. Instances are named objects because by default any class written by
    a developer implicitly extends class `java.lang.Object`, if no other superclass
    is declared. What this means is that in Java, there is a basic template for all
    classes and that is represented by the `java.lang.Object` class. Any class is
    by default an extension of this class, so the class declaration in Listing [4-8](#463938_3_En_4_Chapter.xhtml#PC8)
    is equivalent to the one in Listing [4-9](#463938_3_En_4_Chapter.xhtml#PC9).


    ```

    package com.apress.bgn.four.basic;

    public class Sample extends Object {}

    Listing 4-9

    Simple Sample Class Explicitly Extending the java.lang.Object Class

    ```


    ```

    package com.apress.bgn.four.basic;

    public class Sample {}

    Listing 4-8

    Simple Sample Class Implicitly Extending the java.lang.Object Class

    ```


    Note


    Notice how importing the `java.lang` package is not necessary, because the `Object`
    class being the root class of the Java hierarchy, all classes (including arrays)
    must have access to extend it. Thus, the `java.lang` package is implicitly imported.


    Important


    As mentioned in **Chapter** [**3**](#463938_3_En_3_Chapter.xhtml), the `java.base`
    module is added implicitly as required in any Java project that declares `module-info.java`.
    This module exports the `java.lang` package that contains the core components
    to writing Java code.


    Tip


    Every human being is defined by a DNA molecule containing 23 pairs of chromosomes.
    They declare the organs and limbs a human should have to look and function as
    a…human. You can view the `Object` class as the DNA molecule that declares all
    the components that a class should have to look and function as a class within
    a Java application.


    The following sections introduce and explain the use of the other template types
    that can be used for creating objects in Java. To do so in context, we will create
    a family of templates for defining humans. Most Java tutorials use templates for
    vehicles or geometrical shapes. I want to model something that anybody can easily
    understand and relate to. The purpose of the following sections is to develop
    Java templates that can be used to model different types of people. The first
    Java template that was mentioned so far is the **class**, so let’s continue with
    that.


    #### Fields


    The operation through which instances are created is called **instantiation**.
    To design a class that models a generic human, we should think about two things:
    human characteristics and human actions. So, what do all humans have in common?
    Well, a lot, but for the purpose of this section, let’s choose three generic attributes:
    name, age, and height. These attributes map in a Java class to variables named
    **fields** or **properties**. The first version of the `Human` class is depicted
    in Listing [4-10](#463938_3_En_4_Chapter.xhtml#PC10).


    ```

    package com.apress.bgn.four.base;

    public class Human {

    String name;

    int age;

    float height;

    }

    Listing 4-10

    Simple Human Class

    ```


    In the previous code sample, the fields have different types, depending on what
    values should be associated with them. For example, the name can be associated
    with a text value, like “Alex,” and texts are represented in Java by the `String`
    type. The age can be associated with numeric integer values, so it is of type
    `int`. And for the purpose of this section, the height of a person is considered
    a rational number like 1.9, so we use the special Java type for this kind of values:
    `float`.


    So now we have a class modeling some basic attributes of a human. How do we use
    it? We need a `main()` method and we need to create an object of this type: we
    need to instantiate this class. In Listing [4-11](#463938_3_En_4_Chapter.xhtml#PC11)
    a human named “Alex” is created.


    ```

    package com.apress.bgn.four.base;

    public class BasicHumanDemo {

    public static void main(String... args) {

    Human human = new Human();

    human.name = "Alex";

    human.age = 40;

    human.height = 1.91f;

    }

    }

    Listing 4-11

    Simple Human Object Being Created

    ```


    To create a `Human` instance, we use the `new` keyword. After the `new` keyword
    we call a special method called a **constructor**. I’ve mentioned methods before,
    but this one is special. Some developers do not even consider a constructor to
    be a method. The most obvious reason for that is the constructor is not defined
    anywhere in the body of the `Human` class. So where is it coming from? It’s a
    default constructor without parameters that is automatically generated by the
    compiler unless an explicit one is declared (with or without parameters). A class
    cannot exist without a constructor; otherwise, it cannot be instantiated, which
    is why the compiler generates one if none was explicitly declared. The default
    constructor, invokes `super()`, which in turn invokes the `Object` no argument
    constructor that initializes all fields with default values. This is tested by
    the code sample in Listing [4-12](#463938_3_En_4_Chapter.xhtml#PC12) (which includes
    the output).


    ```

    package com.apress.bgn.four.base;

    public class BasicHumanDemo {

    public static void main(String... args) {

    Human human = new Human();

    System.out.println("name: " + human.name);

    System.out.println("age: " + human.age);

    System.out.println("height: " + human.height);

    }

    }

    // output

    // name: null

    // age:0

    // height:0.0

    Listing 4-12

    Simple Human Object Being Created Without Setting Values or Its Fields

    ```


    Default values for the variable types are printed. Numeric variables were initialized
    with `0`, and the `String` value was initialized with `null`. The reason for that
    is that the numeric types are primitive data types and `String` is an object data
    type. The `String` class is part of the `java.lang package` and is one of the
    predefined Java classes that is used to create objects of type `String`. It is
    a special data type that is used to represent text objects. We’ll get deeper into
    data types in **Chapter** [**5**](#463938_3_En_5_Chapter.xhtml).'
