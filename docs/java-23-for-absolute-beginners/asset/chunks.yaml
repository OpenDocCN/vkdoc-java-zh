- fmt: '## Testing


    Debugging is a part of a software process named **testing** and involves identifying
    and correcting code errors as early as possible in the development cycle. In software
    development, avoiding technical errors is not enough. Testing an application means
    much more than that. There is even an organization that provides great materials
    for training and certifications for software testers. The **International Software
    Testing Qualifications Board (ISTQB)** is a software testing qualification certification
    organization that operates internationally. It established a syllabus and a hierarchy
    of qualifications and guidelines for software testing^([^(78)](#fn78)). If you
    think you are more interested in software testing, then you should look into getting
    an ISTQB certification.


    The ISTQB definition of testing is “the process consisting of all lifecycle activities,
    both static and dynamic, concerned with planning, preparation and evaluation of
    software and related work products to determine that they satisfy specified requirements
    to demonstrate that they are fit for purpose and to detect defects.”


    The ISTQB definition is a technical, academic definition. The definition I propose
    is “the process of verifying that an implementation does what it is supposed to,
    in the amount of time it is expected to, with an acceptable resources consumption.”


    **Important**


    Testing is an essential part of the development process and should start as early
    as possible, because the effort of fixing a defect grows exponentially with the
    time it takes to be discovered. You can read more about the disadvantages of testing
    late in Robert Martin’s book *Clean Code: A Handbook of Agile Software Craftsmanship*,
    specifically in Chapter [9](#463938_3_En_9_Chapter.xhtml), “Testing.”


    During the development phase, aside from writing the actual solution, you can
    also write code to test your solution. You can run those tests either manually
    or by using a build tool when you build your project. When writing your code,
    in addition to thinking about how you can write it so that the solution solves
    the problem, you should think about how to test the solution. This approach is
    named **Test Driven Development (TDD)**, a programming paradigm that states that
    you should think about how to test your solution before implementing it, because
    if it is difficult to test, it probably will be difficult to implement, maintain
    in the long run, and extend to solve related problems.


    The simplest tests you can write are called **unit tests**, which are very simple
    methods that test small units of functionality. If you can’t easily write unit
    tests for your design, it might be rotten. Unit tests are the first line of defense
    against failures. If unit tests fail, the foundation of your solution is bad.


    The tests that span across multiple components, testing the communication between
    units of functionality and the results of their interactions against expected
    results, are called **integration tests**.


    The last type of tests a developer should write are **regression tests**, which
    are run periodically to make sure that code that was previously tested still performs
    correctly after it was changed. This type of test is crucial for big projects
    where code is written by a considerable number of developers, because sometimes
    dependencies among components are not obvious and code that one developer wrote
    might break somebody else’s code.


    To stay within the scope of this book, this section will show you how to write
    only the simple unit tests, using a Java framework named Junit, and describe a
    few typical testing components you can build to set up a context for the unit
    tests. Thus, as my Scottish colleagues say: *Let’s get cracking!*


    ### Test Code Location


    As you probably remember, **Chapter** [**3**](#463938_3_En_3_Chapter.xhtml) explained
    the `java-bgn` project structure. The discussion about tests must start with the
    structure of the lowest-level project’s modules, the ones that contain the source
    code and tests. In Figure [9-13](#463938_3_En_9_Chapter.xhtml#Fig13) you can see
    the structure of the module containing the sources and test code for the module
    used in this section.


    ![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig13_HTML.jpg)


    **Figure 9-13** The Maven module structure


    The `src` directory contains all code and resources of the project. The contents
    are split into two directories, `main` and `test`.


    *   The `main` directory contains the source code and the application configuration
    files, split into two directories (not displayed in Figure [9-13](#463938_3_En_9_Chapter.xhtml#Fig13)).
    The `java` directory contains the Java source code, and the `resources` directory
    contains configuration files, nonexecutable text files (which can be written according
    to various formats, such as XML, SQL, CSV, etc.), media files, PDFs, and so forth.
    When the application is built and packed into a jar (or war or ear), only the
    files in the `java` directory are taken onto account; the `*.class` files together
    with the configuration files are packed.


    *   The `test` directory contains code used to test the source code in the `src`
    directory. The Java files are kept under the `java` directory, and the `resources`
    directory contains configuration files needed to build a test context. The classes
    in the `test` directory are part of the project and have access to the classes
    declared in the `main` directory as described by accessors in **Chapter** [**3**](#463938_3_En_3_Chapter.xhtml).
    However, the contents of the `test` directory are not part of the project that
    will be delivered to a client. They exist just to help test the application during
    development. The files in the `test/resources` directory usually override configuration
    files in the `main/resources` directory to provide an isolated, smaller execution
    context for the test classes.


    ### Building an Application to Test


    For the examples in this section, we will build a simple application that uses
    an embedded Apache Derby^([^(79)](#fn79)) database to store data. This will be
    the production database. For the test environment, the database will be replaced
    with various pseudo-constructions that will mimic the database behavior.


    The application is quite rudimentary. An `AccountService` implementation takes
    data from the input and uses it to manage `Account` instances. The `Account` class
    is a very abstract and unrealistic implementation of a banking account. It has
    a `holder` field, which is the account owner, an `accountNumber` field, and an
    `amount` field. The `AccountService` implementation uses an `AccountRepo` implementation
    to perform all related database operations with `Account` instances using an implementation
    of `DBConnection`. The classes and interfaces that make up this simple application
    and the relationships between them are depicted in Figure [9-14](#463938_3_En_9_Chapter.xhtml#Fig14).


    ![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig14_HTML.jpg)


    **Figure 9-14** Simple account management application components (as shown in
    IntelliJ IDEA)


    The implementation of these classes is not relevant for this section, but if you
    are curious, you can find the full code in the official repository of this book.
    So let’s start testing. The easiest way would be to write a main class and perform
    some account operations. However, it is useless to do that once the application
    is in production, since testing new features on it comes with risks of data corruption.
    Also, production databases are usually hosted on costly products, such as Oracle
    RDBMS (Oracle Relational Database Management System) or Microsoft SQL Server.
    They are not really appropriate for development, or testing. The intention is
    to run tests automatically during an automated build, so in-memory databases or
    implementations that can be instantiated are more suitable. So let’s start by
    testing the `AccountRepoImpl` class.'
  raw: '## Testing


    Debugging is a part of a software process named **testing** and involves identifying
    and correcting code errors as early as possible in the development cycle. In software
    development, avoiding technical errors is not enough. Testing an application means
    much more than that. There is even an organization that provides great materials
    for training and certifications for software testers. The **International Software
    Testing Qualifications Board (ISTQB)** is a software testing qualification certification
    organization that operates internationally. It established a syllabus and a hierarchy
    of qualifications and guidelines for software testing^([^(78)](#fn78)). If you
    think you are more interested in software testing, then you should look into getting
    an ISTQB certification.


    The ISTQB definition of testing is “the process consisting of all lifecycle activities,
    both static and dynamic, concerned with planning, preparation and evaluation of
    software and related work products to determine that they satisfy specified requirements
    to demonstrate that they are fit for purpose and to detect defects.”


    The ISTQB definition is a technical, academic definition. The definition I propose
    is “the process of verifying that an implementation does what it is supposed to,
    in the amount of time it is expected to, with an acceptable resources consumption.”


    Important


    Testing is an essential part of the development process and should start as early
    as possible, because the effort of fixing a defect grows exponentially with the
    time it takes to be discovered. You can read more about the disadvantages of testing
    late in Robert Martin’s book *Clean Code: A Handbook of Agile Software Craftsmanship*,
    specifically in Chapter [9](#463938_3_En_9_Chapter.xhtml), “Testing.”


    During the development phase, aside from writing the actual solution, you can
    also write code to test your solution. You can run those tests either manually
    or by using a build tool when you build your project. When writing your code,
    in addition to thinking about how you can write it so that the solution solves
    the problem, you should think about how to test the solution. This approach is
    named **Test Driven Development (TDD)**, a programming paradigm that states that
    you should think about how to test your solution before implementing it, because
    if it is difficult to test, it probably will be difficult to implement, maintain
    in the long run, and extend to solve related problems.


    The simplest tests you can write are called **unit tests**, which are very simple
    methods that test small units of functionality. If you can’t easily write unit
    tests for your design, it might be rotten. Unit tests are the first line of defense
    against failures. If unit tests fail, the foundation of your solution is bad.


    The tests that span across multiple components, testing the communication between
    units of functionality and the results of their interactions against expected
    results, are called **integration tests**.


    The last type of tests a developer should write are **regression tests**, which
    are run periodically to make sure that code that was previously tested still performs
    correctly after it was changed. This type of test is crucial for big projects
    where code is written by a considerable number of developers, because sometimes
    dependencies among components are not obvious and code that one developer wrote
    might break somebody else’s code.


    To stay within the scope of this book, this section will show you how to write
    only the simple unit tests, using a Java framework named Junit, and describe a
    few typical testing components you can build to set up a context for the unit
    tests. Thus, as my Scottish colleagues say: *Let’s get cracking!*


    ### Test Code Location


    As you probably remember, **Chapter** [**3**](#463938_3_En_3_Chapter.xhtml) explained
    the `java-bgn` project structure. The discussion about tests must start with the
    structure of the lowest-level project’s modules, the ones that contain the source
    code and tests. In Figure [9-13](#463938_3_En_9_Chapter.xhtml#Fig13) you can see
    the structure of the module containing the sources and test code for the module
    used in this section.


    ![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig13_HTML.jpg)


    Figure 9-13


    The Maven module structure


    The `src` directory contains all code and resources of the project. The contents
    are split into two directories, `main` and `test`.


    *   The `main` directory contains the source code and the application configuration
    files, split into two directories (not displayed in Figure [9-13](#463938_3_En_9_Chapter.xhtml#Fig13)).
    The `java` directory contains the Java source code, and the `resources` directory
    contains configuration files, nonexecutable text files (which can be written according
    to various formats, such as XML, SQL, CSV, etc.), media files, PDFs, and so forth.
    When the application is built and packed into a jar (or war or ear), only the
    files in the `java` directory are taken onto account; the `*.class` files together
    with the configuration files are packed.


    *   The `test` directory contains code used to test the source code in the `src`
    directory. The Java files are kept under the `java` directory, and the `resources`
    directory contains configuration files needed to build a test context. The classes
    in the `test` directory are part of the project and have access to the classes
    declared in the `main` directory as described by accessors in **Chapter** [**3**](#463938_3_En_3_Chapter.xhtml).
    However, the contents of the `test` directory are not part of the project that
    will be delivered to a client. They exist just to help test the application during
    development. The files in the `test/resources` directory usually override configuration
    files in the `main/resources` directory to provide an isolated, smaller execution
    context for the test classes.


    ### Building an Application to Test


    For the examples in this section, we will build a simple application that uses
    an embedded Apache Derby^([^(79)](#fn79)) database to store data. This will be
    the production database. For the test environment, the database will be replaced
    with various pseudo-constructions that will mimic the database behavior.


    The application is quite rudimentary. An `AccountService` implementation takes
    data from the input and uses it to manage `Account` instances. The `Account` class
    is a very abstract and unrealistic implementation of a banking account. It has
    a `holder` field, which is the account owner, an `accountNumber` field, and an
    `amount` field. The `AccountService` implementation uses an `AccountRepo` implementation
    to perform all related database operations with `Account` instances using an implementation
    of `DBConnection`. The classes and interfaces that make up this simple application
    and the relationships between them are depicted in Figure [9-14](#463938_3_En_9_Chapter.xhtml#Fig14).


    ![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig14_HTML.jpg)


    Figure 9-14


    Simple account management application components (as shown in IntelliJ IDEA)


    The implementation of these classes is not relevant for this section, but if you
    are curious, you can find the full code in the official repository of this book.
    So let’s start testing. The easiest way would be to write a main class and perform
    some account operations. However, it is useless to do that once the application
    is in production, since testing new features on it comes with risks of data corruption.
    Also, production databases are usually hosted on costly products, such as Oracle
    RDBMS (Oracle Relational Database Management System) or Microsoft SQL Server.
    They are not really appropriate for development, or testing. The intention is
