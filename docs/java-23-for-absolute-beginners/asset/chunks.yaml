    \ this line. But it can be on the next one too, since empty spaces are ignored.\n\
    \n4.  `main(..)` **method declaration**: In Java the method name and the number,\
    \ type, and order of its parameters is referred to as the *method signature*.\
    \ A method also has a **return type**, as in the type of result it returns. But\
    \ there is also a special type that can be used to declare that a method does\
    \ not return anything. In the order of appearance, here is what every term of\
    \ the `main()` method represents:\n    *   `public`: This is the method accessor.\
    \ The `main` method must be `public`, because otherwise JRE can’t access it and\
    \ call it.\n\n*   `static`: Recall that the beginning of this chapter mentioned\
    \ that a class has members (fields and methods). When an object of that class\
    \ type is created, it has the fields and methods as declared by the class. The\
    \ class is a template for creating objects. Because of the `static` keyword though,\
    \ the `main` method is not associated with an object of a class type, but with\
    \ the class itself. More details about this are provided in **Chapter** [**4**](#463938_3_En_4_Chapter.xhtml).\n\
    \n*   **void**: This keyword is used here to tell us that the `main` method does\
    \ not return anything, so it’s like a replacement for *no type*, because if nothing\
    \ is returned, there is no need for a type.\n\n*   `String... args` or `String[]\
    \ args`: Methods are sometimes declared as receiving some input data, `String[]\
    \ args` represents an array of text values. The three dots is another way to specify\
    \ that a method can have more than one argument of the same type. (The varargs\
    \ argument also has to be the only parameter for the method, or the last one;\
    \ otherwise, resolving the arguments becomes an impossible job.) The three dots\
    \ notation can be used only in a method argument, and are called *varargs*. It\
    \ means you can pass in an array of parameters without explicitly creating the\
    \ array. Arrays are sets of data of fixed length, and in mathematics they are\
    \ known as *one-dimension matrix* or *vector*. `String` is the class representing\
    \ text objects in Java. The `[]` means array and `args` is its name. But wait,\
    \ we’ve run this method before and we did not need to provide anything! Well,\
    \ it is not mandatory, but you’ll see how you can give it arguments (values provided\
    \ to the method that will be used by the code in its body) after this list.\n\n\
    5.  `System.out.println(“HelloWorld!”);`**:** This statement is used for writing\
    \ *Hello World!* in the console.\n\n6.  `}` is the closing bracket of the `main`\
    \ method body.\n\n7.  *Line left empty for easier viewing.*\n\n8.  `}` is the\
    \ closing bracket for the class body.\n\nIf we execute this class, we will see\
    \ `Hello World!` printed in the console. You were shown earlier (in Figure [3-21](#463938_3_En_3_Chapter.xhtml#Fig21))\
    \ how to execute a class with a `main(..)` method in it. After executing a class\
    \ that way, IntelliJ IDEA automatically saves the configuration for that execution\
    \ in a *Run Configuration* and displays it in a drop-down list on the header of\
    \ the IDE, located next to a triangular green button that can be clicked to execute\
    \ that class, both of which options are ostentatiously pointed out to you in Figure\
    \ [3-29](#463938_3_En_3_Chapter.xhtml#Fig29).\n\nThose two elements are really\
    \ important, because they enable you to edit a run configuration and add arguments\
    \ for the JVM and the `main` method. Let’s first modify the `main(..)` method\
    \ to do something with the arguments. The modified `HelloWorld` class is depicted\
    \ in Listing [3-24](#463938_3_En_3_Chapter.xhtml#PC24).\n\n```\npublic class HelloWorld\
    \ {\npublic static void main(String... args) {\nSystem.out.println(\"Hello \"\
    \ + args[0] + \"!\");\n}\n}\nListing 3-24\nMain Method with varargs\n```\n\nAn\
    \ important point to note is that arrays are accessed using indexes of their elements,\
    \ and the counting starts in Java from 0\\. Consequently, the first member of\
    \ an array can be found at 0, the second at 1, and so on. But arrays can be empty,\
    \ so if no argument is provided when running the code in Listing [3-24](#463938_3_En_3_Chapter.xhtml#PC24),\
    \ the execution of the program will crash and an explicit message similar to the\
    \ one shown in Listing [3-25](#463938_3_En_3_Chapter.xhtml#PC25) will be printed\
    \ (in red).\n\n```\nException in thread \"main\" java.lang.ArrayIndexOutOfBoundsException:\
    \ Index 0 out of bounds for length 0\nat chapter.three/com.apress.bgn.three.helloworld.HelloWorld.main(HelloWorld.java:5)\n\
    Listing 3-25\nEmpty Array Exception\n```\n\nWhen a Java program ends because an\
    \ error during execution time, we say that *an exception was thrown*.\n\nWhen\
    \ we try to access an empty array, or an element of an array that does not exist,\
    \ the JVM throws an object of type `ArrayIndexOutOfBoundsException` containing\
    \ the line where the failure happened and the index of the element we were trying\
    \ to access. Exception objects are used by the JVM to notify developers of exceptional\
    \ situations when a Java execution does not work as expected, and these objects\
    \ contain details regarding where in the code it happened and what caused the\
    \ problem.\n\nThe modification we did in Listing [3-25](#463938_3_En_3_Chapter.xhtml#PC25)\
    \ will print the text value provided as an argument when executing the class.\
    \ Let’s modify the run configuration for this class and add an argument. Click\
    \ the small drop-down arrow next to the **Run Configuration** name and a menu\
    \ will appear, as shown in Figure [3-30](#463938_3_En_3_Chapter.xhtml#Fig30).\
    \ Click the **Edit Configurations** option and inspect the dialog window depicted\
    \ to you, also shown in Figure [3-30](#463938_3_En_3_Chapter.xhtml#Fig30).\n\n\
    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig30_HTML.jpg)\n\nFigure 3-30\n\
    \nCustomizing a Run Configuration"
  trans: "\n## 解释并丰富 Hello World! 类\n\n之前，我们在 `sandbox` 项目中编写了一个名为 `HelloWorld` 的类。该类已复制到\
