    that are not boxes. For the sake of this example, let’s say those items are Lego
    pieces. This analogy works well, because Java types can be composed in the same
    way as Lego pieces are.


    Package names must be unique, and their name should follow a certain template.
    This template is usually defined by the company working on the project. Good practices
    say that to ensure unicity and meaning, you typically begin the name with your
    organization’s Internet domain name in reverse order, then add various grouping
    criteria.


    In this project, package names follow the template depicted here: `com.apress.bgn.[*]+`.
    This template begins with the reversed domain name for the publisher of this book,
    Apress ([*www.apress.com*](http://www.apress.com)), then a term identifying the
    book is added (`bgn` is a shortcut for *beginner*), and the `*` replaces the number
    of the chapter the source (usually) matches.


    Considering the previously introduced boxes and Legos analogy, the `com` package
    is the big box, containing the `apress` box. It could contain Legos too, but for
    this example it does not. The `apress` box represents the `com.apress` package
    and contains the `bgn` box.


    The `bgn` represents the `com.apress.bgn` package box and contains boxes specific
    to each chapter, containing either other boxes and/or Legos. The Legos are the
    Java files, containing Java code. Figure [3-1](#463938_3_En_3_Chapter.xhtml#Fig1)
    represents these boxes and Legos and the way they are nested.


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Java packages with source code represented as nested boxes and Legos


    On your computer, a package is a hierarchy of directories. Each directory contains
    other directories and/or Java files. It all depends on your organizational skills
    and needs. This organization is important, because any Java object type can be
    identified uniquely using the package name and its own name. If we were to write
    a class named `HelloWorld` in a file named `HelloWorld.java` and put this file
    in package `com.apress.bgn.one`, `com.apress.bgn.one.HelloWorld` is the **fully
    qualified class name**, which acts as a unique identifier for this class. You
    can view the package name as an address of that class.


    Starting with Java 5, inside each package a file named `package-info.java` can
    be created that contains a package declaration, package annotations, package comments,
    and Javadoc annotations. The comments are exported to the development documentation
    for that project, also known as **Javadoc**. (**Chapter** [**9**](#463938_3_En_9_Chapter.xhtml)
    covers how to generate the project Javadoc using Maven.) The `package-info.java`
    file must reside under the last directory in the package. So, if we define a `com.apress.bgn.one`
    package, the overall structure and contents of the Java project looks like Figure
    [3-2](#463938_3_En_3_Chapter.xhtml#Fig2).


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Java package contents


    The `package-info.java` contents could be similar to the contents of Listing [3-2](#463938_3_En_3_Chapter.xhtml#PC2).


    ```

    /**

    * Contains classes used for reading information from various sources.

    * @author iuliana.cosmina

    * @version 3.0-SNAPSHOT

    */

    package com.apress.bgn.one;

    Listing 3-2

    package-info.java Sample Contents

    ```


    The files with `.java` extension containing type definitions are compiled into
    files with `.class` extension that are organized according to the same package
    structure and packaged into one or more **JAR**s (**J**ava **Ar**chives).


    When jar are hosted on a repository, such as The Maven Public Repository, they
    are also called **artifacts**. You can read more about jars here: [`https://docs.oracle.com/javase/8/docs/technotes/guides/jar/jarGuide.html`](https://docs.oracle.com/javase/8/docs/technotes/guides/jar/jarGuide.html).


    For the previous example, if you were to unpack the jar that resulted after the
    compilation and linkage, you would see what’s shown in Figure [3-3](#463938_3_En_3_Chapter.xhtml#Fig3).


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Contents of a sample JAR


    The `package-info.java` file is compiled too, even if it only holds information
    about the package and no behavior or types.


    Important


    `package-info.java` files are not mandatory; packages can be defined without them.
    They are useful mostly for documentation purposes.


    The contents of one package can span across multiple subprojects, meaning that
    if you have more than one subproject in your project, you can have the same package
    name in more than one subproject, containing different classes. A symbolic representation
    of this is depicted in Figure [3-4](#463938_3_En_3_Chapter.xhtml#Fig4).


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Example of package contents that span across multiple JARs


    A **library** is a collection of jars containing classes used to implement a certain
    functionality. The most commonly used libraries are logging libraries like Log4J^([^(34)](#fn34))
    and Logback^([^(35)](#fn35)). For example, JUnit 5^([^(36)](#fn36)) is a very
    famous Java framework providing multiple classes that facilitate writing Java
    unit tests.


    A moderately complex Java application references one or more libraries. To run
    the application, all its dependencies (all the JARs) must be on the **classpath**.
    What does this mean? It means that in order to run a Java application, a JDK,
    its dependencies (external jars), and the application jars are needed. Figure
    [3-5](#463938_3_En_3_Chapter.xhtml#Fig5) depicts this quite clearly.


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Application classpath


    Warning


    We are assuming here that the application is being run on the same environment
    where it was written, and so the JDK is used to run the application. Until JDK
    11, any Java application could be run using the JRE. But starting with version
    11, Java has become fully modular. This means a customized “JRE” distribution
    can be created only from the modules needed to run an application. Indirectly,
    this means that the resulting JRE contains a minimal number of JDK compiled classes.


    The JARs that make up an application classpath are (obviously) not always independent
    of each other. For 21 years this organization style was enough, but in complex
    applications there were a lot of complications caused by


    *   Packages scattered in multiple jars(remember Figure [3-4](#463938_3_En_3_Chapter.xhtml#Fig4)?).
    This might lead to code duplication and circular dependencies.


    *   Transitive dependencies between jars, which sometimes lead to different versions
    of the same class being on the classpath. This might lead to unpredictable application
    behavior.


    *   Missing transitive dependencies and accessibility problems. This might lead
    to application crash.


    All these problems are grouped under one name: **JAR Hell**^([^(37)](#fn37)).
    This problem was resolved in Java 9 by introducing another level to organize packages:
    **modules**. Or at least that was the intention. However, the industry has been
    reluctant to adopt Java modules. As of this writing, although the majority of
    Java production applications are no longer stuck on Java 8, developers still avoid
    modules like the plague.'
  trans: '

    ### 包


    当你编写 Java 代码时，你是在编写代码来描述现实世界事物的状态和行为。这些代码必须组织在类和其他类型中，这些类型共同用于构建应用程序。


    所有类型都定义在扩展名为 `.java` 的文件中。对象类型被组织在**包**中。包是类型的逻辑集合：其中一些类型在包外部可见，而另一些则不可见，这取决于它们的作用域。


    提示


    要理解包的工作方式，可以想象一个包含其他盒子的盒子。这些盒子可能装满了其他盒子，也可能装满了不是盒子的物品。为了便于理解，我们假设这些物品是乐高积木。这个类比很贴切，因为
    Java 类型的组合方式与乐高积木类似。


    包名称必须是唯一的，并且其命名应遵循特定的模板。这个模板通常由负责项目的公司定义。良好的实践表明，为了确保唯一性和含义明确，通常以组织互联网域名的倒序开头，然后添加各种分组标准。


    在本项目中，包名称遵循此处描述的模板：`com.apress.bgn.[*]+`。该模板以本书出版商 Apress 的倒序域名（[*www.apress.com*](http://www.apress.com)）开头，然后添加一个标识本书的术语（`bgn`
    是 *beginner* 的缩写），而 `*` 则替换为源代码（通常）对应的章节编号。


    考虑到之前介绍的盒子和乐高积木的类比，`com` 包是最大的盒子，里面装着 `apress` 盒子。它也可能包含乐高积木，但在这个例子中没有。`apress`
    盒子代表 `com.apress` 包，里面装着 `bgn` 盒子。


    `bgn` 代表 `com.apress.bgn` 包盒子，里面装着每个章节特有的盒子，这些盒子可能包含其他盒子和/或乐高积木。乐高积木就是 Java 文件，其中包含
    Java 代码。图 3-1 展示了这些盒子和乐高积木以及它们的嵌套方式。


    ![](img/463938_3_En_3_Fig1_HTML.jpg)


    图 3-1


    包含源代码的 Java 包，表示为嵌套的盒子和乐高积木


    在你的计算机上，包是一个目录层次结构。每个目录包含其他目录和/或 Java 文件。这完全取决于你的组织技巧和需求。这种组织方式很重要，因为任何 Java 对象类型都可以通过包名和其自身名称唯一标识。如果我们想编写一个名为
    `HelloWorld` 的类，放在名为 `HelloWorld.java` 的文件中，并将该文件放在包 `com.apress.bgn.one` 中，那么
    `com.apress.bgn.one.HelloWorld` 就是该类的**完全限定类名**，它充当该类的唯一标识符。你可以将包名视为该类的地址。


    从 Java 5 开始，每个包内都可以创建一个名为 `package-info.java` 的文件，其中包含包声明、包注解、包注释和 Javadoc 注解。这些注释会导出到该项目的开发文档中，也称为
    **Javadoc**。（**第** **9** **章**介绍了如何使用 Maven 生成项目 Javadoc。）`package-info.java`
    文件必须位于包中最后一个目录下。因此，如果我们定义一个 `com.apress.bgn.one` 包，Java 项目的整体结构和内容将如图 3-2 所示。


    ![](img/463938_3_En_3_Fig2_HTML.jpg)


    图 3-2


    Java 包的内容


    `package-info.java` 的内容可能与清单 3-2 的内容类似。


    ```

    /**

    * 包含用于从各种来源读取信息的类。

    * @author iuliana.cosmina

    * @version 3.0-SNAPSHOT

    */

    package com.apress.bgn.one;

    清单 3-2

    package-info.java 示例内容

    ```


    扩展名为 `.java` 且包含类型定义的文件会被编译成扩展名为 `.class` 的文件，这些文件根据相同的包结构进行组织，并打包到一个或多个 **JAR**（**J**ava
    **Ar**chives，Java 归档文件）中。


    当 JAR 文件托管在仓库（例如 Maven 公共仓库）中时，它们也被称为**构件**。你可以在此处阅读更多关于 JAR 的信息：[`https://docs.oracle.com/javase/8/docs/technotes/guides/jar/jarGuide.html`](https://docs.oracle.com/javase/8/docs/technotes/guides/jar/jarGuide.html)。


    对于前面的例子，如果你解压编译和链接后生成的 JAR 文件，你会看到如图 3-3 所示的内容。


    ![](img/463938_3_En_3_Fig3_HTML.jpg)


    图 3-3


    示例 JAR 的内容


    `package-info.java` 文件也会被编译，即使它只包含关于包的信息，而没有行为或类型。


    重要


    `package-info.java` 文件不是必需的；没有它们也可以定义包。它们主要用于文档目的。


    一个包的内容可以跨越多个子项目，这意味着如果你的项目中有多个子项目，你可以在多个子项目中使用相同的包名，但包含不同的类。图 3-4 展示了这种符号表示。


    ![](img/463938_3_En_3_Fig4_HTML.jpg)


    图 3-4


    包内容跨越多个 JAR 的示例


    **库**是包含用于实现特定功能的类的 JAR 文件集合。最常用的库是日志库，例如 Log4J^(³⁴) 和 Logback^(³⁵)。例如，JUnit 5^(³⁶)
    是一个非常著名的 Java 框架，它提供了多个便于编写 Java 单元测试的类。


    一个中等复杂程度的 Java 应用程序会引用一个或多个库。要运行该应用程序，其所有依赖项（所有 JAR 文件）都必须位于**类路径**上。这意味着什么？这意味着要运行一个
    Java 应用程序，需要 JDK、其依赖项（外部 JAR 文件）以及应用程序的 JAR 文件。图 3-5 清晰地展示了这一点。


    ![](img/463938_3_En_3_Fig5_HTML.jpg)


    图 3-5


    应用程序类路径


    警告


    我们在此假设应用程序是在编写它的同一环境中运行，因此使用 JDK 来运行应用程序。在 JDK 11 之前，任何 Java 应用程序都可以使用 JRE 运行。但从版本
    11 开始，Java 已完全模块化。这意味着只能从运行应用程序所需的模块创建定制的“JRE”发行版。这间接意味着生成的 JRE 包含最少数量的 JDK 编译类。


    构成应用程序类路径的 JAR 文件（显然）并不总是相互独立的。21 年来，这种组织方式已经足够，但在复杂的应用程序中，由于以下原因导致了许多复杂问题：


    *   包分散在多个 JAR 中（还记得图 3-4 吗？）。这可能导致代码重复和循环依赖。


    *   JAR 之间的传递依赖，有时会导致类路径上存在同一类的不同版本。这可能导致不可预测的应用程序行为。


    *   缺少传递依赖和可访问性问题。这可能导致应用程序崩溃。


    所有这些问题都被统称为一个名称：**JAR 地狱**^(³⁷)。这个问题在 Java 9 中通过引入另一个组织包的结构层级得到了解决：**模块**。或者至少这是初衷。然而，业界一直不愿采用
    Java 模块。截至撰写本文时，尽管大多数 Java 生产应用程序已不再停留在 Java 8 上，但开发者仍然像躲避瘟疫一样避免使用模块。

