- fmt: 'As you can see, the fully qualified class name `com.apress.bgn.nine.SortingLogbackDemo`
    was shortened to `c.a.b.n.SortingLogbackDemo`. The configuration file can be provided
    to the program as a VM argument (an argument the JVM will use when running your
    class), which means the logging format can be configured externally. When launching
    the class, just use `-Dlogback.configurationFile=\temp\ext-logback.xml` as a VM
    argument if you want to provide a different log file.


    Logback can direct output to a file as well; simply add a configuration using
    the `ch.qos.logback.core.FileAppender` class and direct the output to the file
    by adding an `<appender>` element in the `<root>` configuration. A configuration
    sample is depicted in Listing [9-18](#463938_3_En_9_Chapter.xhtml#PC21).


    ```

    chapter09/logging-slf4j/out/output.log

    true


    %d{HH:mm:ss.SSS} %-5level %logger{5} - %msg%n


    UTF-8

    %d{HH:mm:ss.SSS} %-5level %logger{5} - %msg%n


    Listing 9-18

    Logback Configuration to Direct Log Messages to a File

    ```


    In the previous example, the original configuration was kept so that log messages
    are also printed in the console, thus proving that log messages can be directed
    to two destinations at once.


    What if the log file becomes too big and cannot be opened? There’s an approach
    for that. A class named `ch.qos.logback.core.rolling.RollingFileAppender` can
    be configured to write a file up to a configured limit in size and then start
    another file. The `RollingFileAppender` class requires two arguments:


    *   An instance of a type that implements `ch.qos.logback.core.rolling.RollingPolicy`,
    which provides functionality to write a new log file (an operation also called
    *rollover*)

    *   An instance of a type that implements `ch.qos.logback.core.rolling.TriggeringPolicy`,
    which configures the conditions under which the rollover will happen


    Also, a single instance of a type that implements both of the interfaces can be
    used to configure the logger. Rolling over a log file means that the log file
    is renamed according to the configuration—usually the last date the file was accessed
    is added to its name, and a new log file is created, with the log file name configured
    (and without a date suffix, to make it clear this is the file logs are currently
    dumped in). Such a Logback configuration is depicted in Listing [9-19](#463938_3_En_9_Chapter.xhtml#PC22).


    ```

    chapter09/logging-slf4j/out/output.log


    chapter09/logging-slf4j/out/output_%d{yyyy-MM-dd}.%i.log


    10MB


    UTF-8

    %d{HH:mm:ss.SSS} %-5level %logger{5} - %msg%n


    %d{HH:mm:ss.SSS} %-5level %logger{5} - %msg%n


    Listing 9-19

    Logback Configuration to Direct Log Messages to a File of a Reasonable Limit

    ```


    The configuration in Listing [9-19](#463938_3_En_9_Chapter.xhtml#PC22) includes
    the following elements:


    *   The `<file>` element configures the location and the name of the log file.

    *   The `<rollingPolicy>` element configures the name the log file will receive
    when log messages will no longer be written in it, using the `<fileNamePattern>`
    element. For example, in the previous configuration the `output.log` file will
    be renamed to `output_2020-07-22.log`, and then a new `output.log` file will be
    created for the next day the application is running.

    *   The `<timeBasedFileNamingAndTriggeringPolicy>` element configures when the
    new log file should be created and how big the `output.log` file should be before
    a new file is created. The configured size in the previous example is 10MB. If
    a log file gets bigger than 10MB before the end of the day, the file is renamed
    to `output_2018-07-22.1.log`. An index is added to the name and a new `output.log`
    file is created.

    *   The `<maxHistory>` element configures the lifespan of a log file, and in this
    example it is 30 days.


    Logging is a powerful tool when used properly. When not used properly, it can
    easily lead to performance problems. Also, logging everything is not really useful,
    because looking for a problem in a big logging file is like looking for a needle
    in a haystack.


    Another thing worth noticing in Listing [9-19](#463938_3_En_9_Chapter.xhtml#PC22)
    is that `StringBuilder` instances are used to construct big log messages that
    are to be printed at a certain level. What happens if logging for that level is
    disabled via configuration? If you guessed that time and memory is consumed creating
    those messages, even if they are not logged, you are right. So, what do we do?
    The creators of SLF4J have thought of this as well and added methods to test if
    a certain logging level is enabled and statements creating elaborate log messages
    can be encapsulated in an `if` statement. This being said, the `SortingLogbackDemo.main(..)`
    method can be made more effective by rewriting it as shown in Listing [9-20](#463938_3_En_9_Chapter.xhtml#PC23).


    ```

    package com.apress.bgn.nine;

    // import statements omitted

    public class SortingLogbackDemo {

    private static final Logger log = LoggerFactory.getLogger(SortingLogbackDemo.class);

    public static void main(String... args) {

    if (args.length == 0) {

    log.error("No data to sort!");

    return;

    }

    int[] arr = getInts(args);

    if (log.isDebugEnabled()) {

    var sb = new StringBuilder("Sorting  an array with merge sort: ");

    Arrays.stream(arr).forEach(i -> sb.append(i).append(" "));

    log.debug(sb.toString());

    }

    IntSorter mergeSort = new MergeSort();

    mergeSort.sort(arr, 0, arr.length - 1);

    if (log.isInfoEnabled()) {

    var sb2 = new StringBuilder("Sorted: ");

    Arrays.stream(arr).forEach(i -> sb2.append(i).append(" "));

    log.info(sb2.toString());

    }

    }

    }

    Listing 9-20

    Logging Efficiently in Class SortingLogbackDemo

    ```


    In Listing [9-20](#463938_3_En_9_Chapter.xhtml#PC23), if the SLF4J configuration
    for the `com.apress.bgn.nine` package is set to `info`, the message starting with
    *Sorting an array with merge sort:* is no longer created, nor printed, because
    `log.isDebugEnabled()` returns `false`, so the code enclosed in the `if` statement
    is no longer executed. The `Logger` class contains `if<Level>Enabled()` methods
    for any logger level.


    This concludes the discussion of logging within the scope of this book. Just keep
    in mind that you should use logging moderately, pay very close attention when
    you decide to log messages in loops, and for big application always use a logging
    facade; in Java, for 99% of projects this facade is SLF4J.'
