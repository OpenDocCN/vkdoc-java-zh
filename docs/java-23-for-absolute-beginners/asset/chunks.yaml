    代码清单 6-34

    测试 & 运算符以控制执行流程

    ```


    为了确保得到预期结果，我们重复从列表中随机选取元素的操作 20 次。正如你在标记行中可能注意到的，按位运算符 `&` 用于组合两个表达式。你可能会期望只有当
    `term` 变量的值不为 `null` 且等于 `Rose` 时，控制台才会打印文本 *Rose was found*。但是，当运行上述代码时，会打印出以下内容：


    ```

    Exception in thread "main" java.lang.NullPointerException: Cannot invoke "String.equals(Object)"
    because "term" is null

    at chapter.six@3.0-SNAPSHOT/com.apress.bgn.six.LogicalOperatorsDemo.main(LogicalOperatorsDemo.java:65)

    ```


    这是因为两个表达式都被计算了。但请想一想！如果 `term` 变量是 `null`，我们是否还应该计算它是否等于 `Rose`，尤其是在 `null` 对象上调用方法会导致运行时错误的情况下？显然不应该，这就是为什么
    `&` 运算符不适合这种情况。如果 `term` 变量是 `null`，它无法通过第一个条件，那么计算第二个条件就没有意义了，因此引入了 `&&` 短路运算符，它正是这样做的。之所以有效，是因为使用逻辑
    `AND` 运算符时，如果第一个表达式计算结果为 `false`，那么第二个表达式计算结果如何实际上并不重要——结果始终为 `false`。因此，我们可以像代码清单
    6-35 所示那样修正之前的代码示例。


    ```

    package com.apress.bgn.six;

    // 导入省略

    public class LogicalOperatorsDemo {

    static List terms = new ArrayList() {{ /* 列表元素省略*/ }};

    void main() {

    for (int i = 0; i < 20; ++i) {

    int index = getRandomIndex(terms.size());

    String term = terms.get(index);

    out.println("Generated index: " + index);

    if (term != null && term.equals("Rose")) {

    out.println("Rose was found");

    }

    }

    }

    // getRandomIndex 方法省略

    }

    代码清单 6-35

    测试 && 运算符以控制执行流程

    ```


    当代码执行时，不会抛出异常，因为如果 `term` 变量是 `null`，第二个表达式不会被计算。因此，这段代码在技术上更高效，因为它计算的条件更少，而且设计也更好，因为它避免了失败。


    现在，让我们修改代码清单 6-35 中的代码示例，以便在找到 `null` 或找到 `Rose` 时打印一条消息。为此需要一个 OR 运算符，所以我们首先尝试使用按位版本，如代码清单
    6-36 所示。


    ```

    for (int i = 0; i < 20; ++i) {

    int index = getRandomIndex(terms.size());

    String term = terms.get(index);

    out.println("Generated index: " + index);

    if (term == null | term.equals("Rose")) {

    out.println("null or Rose was found");

    }

    }

    代码清单 6-36

    测试 | 运算符以控制执行流程

    ```


    如果我们运行代码清单 6-36 中的代码，当随机索引恰好匹配列表中某个 `null` 元素的索引时，将会抛出 `NullPointerException`。这是因为
    `|` 运算符要求两个表达式都被计算，所以如果 `term` 是 `null`，调用 `term.equals(..)` 将导致抛出异常。


    为了确保代码按预期工作，必须将 `|` 运算符替换为 `||`，后者会短路条件，并且不计算其中的第二个表达式，除非第一个条件的计算结果为 `false`。之所以有效，是因为使用逻辑
    OR 运算符时，如果第一个表达式计算结果为 `true`，那么第二个表达式计算结果如何实际上并不重要：结果始终为 `true`。我将把这个留作练习给你。


    条件可以由多个表达式和多个运算符组成，无论是 `&&` 还是 `||`。代码清单 6-37 中的代码展示了一些复杂条件。


    ```

    package com.apress.bgn.six;

    // 导入省略

    public class ComplexConditionsDemo {

    static List terms = new ArrayList() {{ /* 列表元素省略*/ }};

    void main(){

    for (int i = 0; i < 20; ++i) {

    int rnd = getRandomIndex(100);

    if (rnd > 3 && rnd < 20 || rnd > 0) {

    out.println("rnd}: this works too...");

    }

    }

    }

    }

    代码清单 6-37

    测试 || 运算符以控制执行流程

    ```


    注意避免条件变得过于复杂；确保用大量测试覆盖那段代码。在编写复杂条件时，某些表达式可能会变得冗余，IntelliJ IDEA 和其他智能编辑器会在冗余且未使用的表达式上显示死代码警告，以帮助开发者改进代码设计。


    ### 移位运算符


    *移位运算符*是在位级别工作的运算符。由于移动位是一项敏感操作，这些操作数的要求是参数必须为整数。运算符左侧的操作数是要被移位的数字，运算符右侧的操作数是要移位的位数。


    Java 中有三个移位运算符，每个都可以与赋值运算符组合，以进行移位并将结果立即赋值给原始变量。本节将通过简单的示例和图片分析所有移位运算符，使其清晰易懂。

