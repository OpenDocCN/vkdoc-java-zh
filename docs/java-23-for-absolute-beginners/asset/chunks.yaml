- fmt: '# `if-else` Statement


    The simplest decisional flow statement in Java is the `if-else` statement (probably
    in other languages as well). You’ve seen the `if-else` statement being used in
    code samples in the previous chapters; there was no way to avoid it, because providing
    runnable code that encourages you to write your own is an important goal of this
    book. In this section the focus will be strictly on this type of statement.


    Let’s imagine this scenario: We run a Java program with a numeric argument provided
    by the user. If the number is even, we print EVEN in the console; otherwise, we
    print ODD. The flowchart matching this scenario is depicted in Figure [7-2](#463938_3_En_7_Chapter.xhtml#Fig2).


    ![](images/463938_3_En_7_Chapter/463938_3_En_7_Fig2_HTML.jpg)


    Figure 7-2


    `if-else` flowchart sample


    The condition is evaluated to a `boolean` value: if the result is `true` the statement
    corresponding to the `if` branch is executed, and if the result is `false`, the
    statement corresponding to the `else` branch is executed.


    The Java code that implements the process described by this flowchart is depicted
    in Listing [7-2](#463938_3_En_7_Chapter.xhtml#PC2).


    ```

    package com.apress.bgn.seven;

    public class IfElseFlowDemo {

    void main(String... args){

    int a = Integer.parseInt(args[0]);

    if (a % 2 == 0) { // is even

    //Display EVEN

    System.out.println("EVEN");

    } else {

    //Display ODD

    System.out.println("ODD");

    }

    }

    }

    Listing 7-2

    Java Code with if-else Statement

    ```


    To run this class with different arguments, you have to create an IntelliJ IDEA
    launcher and add your argument into the `Program arguments` text field, as explained
    at the beginning of this book. Each Java statement in Listing [7-2](#463938_3_En_7_Chapter.xhtml#PC2)
    is paired with a comment matching the flowchart element, to make the implementation
    obvious.


    Note that both branches of an `if` statement are not mandatory. The `else` branch
    is not always necessary. Sometimes you just want to print something if a value
    matches a condition, and you are not interested in what happens otherwise. For
    example, given a user-provided argument, we just want to print a message if the
    number is negative, but we are not interested in printing or doing anything else
    if the number is positive. The flowchart for that is depicted in Figure [7-3](#463938_3_En_7_Chapter.xhtml#Fig3).


    ![](images/463938_3_En_7_Chapter/463938_3_En_7_Fig3_HTML.jpg)


    Figure 7-3


    `if` flowchart sample, missing the `else` branch


    The Java code matching this flowchart is depicted in Listing [7-3](#463938_3_En_7_Chapter.xhtml#PC3).


    ```

    package com.apress.bgn.seven;

    public class IfFlowDemo {

    public static void main(String... args) {

    int a = Integer.parseInt(args[0]);

    if (a < 0) {

    System.out.println("Negative");

    }

    }

    }

    Listing 7-3

    Java Code with if Statements

    ```


    In the same way as the statement can be made simple, we can link more `if-else`
    statements together if needed. Let’s consider the following example: the user
    inserts a number from 1 to 12, and we have to print the season of the month corresponding
    to that number. The flowchart presented in Figure [7-4](#463938_3_En_7_Chapter.xhtml#Fig4)
    fits the scenario.


    ![](images/463938_3_En_7_Chapter/463938_3_En_7_Fig4_HTML.jpg)


    Figure 7-4


    Complex `if-else` flowchart sample


    Important


    When the code block for `if` or `else` contains a single statement, the curly
    brackets are not mandatory. Most developers keep them for code clarity, and to
    help IDEs indent the code properly.


    Looks complicated, right? Wait until you see the code, which is depicted in Listing
    [7-4](#463938_3_En_7_Chapter.xhtml#PC4).


    ```

    package com.apress.bgn.seven;

    public class SeasonsDemo {

    void main(String... args) {

    int a = Integer.parseInt(args[0]);

    if(a == 12 || (a>=1 && a2 && a 5 && a 8 && a <= 11 ) {

    System.out.println("Autumn");

    } else {

    System.out.println("Error");

    }

    }

    }

    }

    }

    }

    Listing 7-4

    Java Code with a Lot of if-else Statements

    ```


    It looks ugly, right? Fortunately, Java provides a way to simplify it, especially
    because it really makes no sense to have so many `else` blocks that only contain
    another `if` statement. The simplified code connects the `else` statements with
    the contained `if(s)` statements. The code ends up looking like Listing [7-5](#463938_3_En_7_Chapter.xhtml#PC5).


    ```

    package com.apress.bgn.seven;

    public class CompactedSeasonDemo {

    void main(String... args) {

    int a = Integer.parseInt(args[0]);

    if (a == 12 || (a >= 1 && a  2 && a  5 && a  8 && a <= 11) {

    System.out.println("Autumn");

    } else {

    System.out.println("Error");

    }

    }

    }

    Listing 7-5

    Java Code with Compacted if-else Statements

    ```


    Any argument provided by the user that is not in the `[1,12]` range will cause
    the program to print *Error*. You can test it for yourself by modifying your IntelliJ
    IDEA launcher. The elements to focus on are underlined in Figure [7-5](#463938_3_En_7_Chapter.xhtml#Fig5).


    ![](images/463938_3_En_7_Chapter/463938_3_En_7_Fig5_HTML.jpg)


    Figure 7-5


    IntelliJ IDEA launcher and parameters


    ## `switch`


    When a solution requires different actions for a fixed set of values, the `if`
    statement might get more complex. In this case the more suitable statement is
    the `switch` statement or a `switch` expression.'
