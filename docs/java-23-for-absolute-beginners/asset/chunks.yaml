    \ hierarchy is depicted in Figure [9-2](#463938_3_En_9_Chapter.xhtml#Fig2).\n\n\
    ![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig2_HTML.jpg)\n\nFigure 9-2  \n\
    The Sorting Classes Hierarchy\n\nIn Listing [9-1](#463938_3_En_9_Chapter.xhtml#PC1),\
    \ the `MergeSort` class contents are modified to add `System.out.print(..)` statements\
    \ to log the steps of the algorithm. `MergeSort` is the name of a sorting algorithm\
    \ that provides better performance than Bubble Sort (introduced in **Chapter**\
    \ [**7**](#463938_3_En_7_Chapter.xhtml)). `MergeSort` describes sorting an array\
    \ as the following suite of steps:\n\n1. Split the array in two halves.\n2. Split\
    \ each half again until the resulting array is one that can be sorted easily.\n\
    3. Merge the sorted arrays repeatedly until the result is a single sorted array.\n\
    \nThis approach of splitting the array repeatedly until sorting becomes a manageable\
    \ operation is called **divide et impera**, also known as **divide and conquer**\
    \ (previously introduced in **Chapter** [**5**](#463938_3_En_5_Chapter.xhtml)).\
    \ There are more algorithms that follow the same approach for solving a problem,\
    \ and `MergeSort` is only the first of them that will be covered in this book.\
    \ In Figure [9-3](#463938_3_En_9_Chapter.xhtml#Fig3), you can see what happens\
    \ in every step of a `MergeSort` algorithm.\n\n![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig3_HTML.jpg)\n\
    \nFigure 9-3  \nMerge Sort algorithm steps\n\nIn each step of the algorithm, the\
    \ middle index of the array is identified. Then the `sort(..)` method is called\
    \ for the arrays split in the middle by that index. This continues until there\
    \ is no middle index, because the array has a single element. That is when the\
    \ `merge(..)` method is called, which merges pieces of the array and also sorts\
    \ them during the merging.\n\nFigure [9-3](#463938_3_En_9_Chapter.xhtml#Fig3)\
    \ depicts the algorithm in a pretty similar way to the output that will be generated\
    \ by the `System.out.print(..)` statements. Since it was mentioned that this algorithm\
    \ is based on the divide-and-conquer method, Figure [9-4](#463938_3_En_9_Chapter.xhtml#Fig4)\
    \ better shows the order of the operations.\n\n![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig4_HTML.jpg)\n\
    \nFigure 9-4  \nMerge Sort algorithm steps shown as a tree\n\nTo write the code\
    \ that models the Merge-Sort algorithm, we need to write the two methods: `sort(array,\
    \ low, high)` and `merge(array, low, high, middle)`. The proposed implementation\
    \ is going to be depicted in the next section, with the appropriate logging.\n\
    \n#### Logging with System.out.print\n\nThe code for the Merge-Sort algorithm\
    \ requires a lot of steps and a lot of variables to refer to all the indexes used\
    \ to arrange our elements in the proper order. To make sure our solution is properly\
    \ implemented, it would be useful to see the values each method is called with\
    \ and the array pieces that are being handled. We can do this by simply adding\
    \ a few `System.out.print` statements. To keep things even simpler, we’ll use\
    \ `import static java.lang.System.out;`, which allows us to write `out.println`\
    \ as shown in Listing [9-1](#463938_3_En_9_Chapter.xhtml#PC1).\n\n```\npackage\
    \ com.apress.bgn.nine.algs;\nimport static java.lang.System.out;\npublic class\
    \ MergeSort implements IntSorter {\npublic void sort(int[] arr, int low, int high)\
    \ {\nout.print(\"Call sort of [low,high]: [\" + low + \", \" + high + \"] \");\n\
    for (int i = low; i <= high; ++i) {\nout.print(arr[i] + \" \");\n}\nout.println();\n\
    if (low < high) {\nvar middle = (low + high) / 2;\n//sort lower half of the interval\n\
    sort(arr, low, middle);\n//sort upper half of the interval\nsort(arr, middle +\
    \ 1, high);\n// merge the two intervals\nmerge(arr, low, high, middle);\n}\n}\n\
    private void merge(int[] arr, int low, int high, int middle) {\nvar leftLength\
    \ = middle - low + 1;\nvar rightLength = high - middle;\nvar left = new int[leftLength];\n\
    var right = new int[rightLength];\nfor (int i = 0; i < leftLength; ++i) {\nleft[i]\
    \ = arr[low + i];\n}\nfor (int i = 0; i < rightLength; ++i) {\nright[i] = arr[middle\
    \ + 1 + i];\n}\nvar i = 0;\nvar j = 0;\nvar k = low;\nwhile (i < leftLength &&\
    \ j < rightLength) {\nif (left[i] <= right[j]) {\narr[k] = left[i++];\n} else\
    \ {\narr[k] = right[j++];\n}\nk++;\n}\nwhile (i < leftLength) {\narr[k++] = left[i++];\n\
    }\nwhile (j < rightLength) {\narr[k++] = right[j++];\n}\nout.print(\"Called merge\
    \ of [low, high, middle]: \" + low + \", \" + high + \", \" + middle + \"]\");\n\
    for (int z = low; z <= high; ++z) {\nout.print(arr[z] + \" \");\n}\nout.println();\n\
    }\n}\nListing 9-1\nMerge-Sort Proposed Implementation with Logging Using out.print\
    \ Statements\n```\n\nA combination of `out.print(..)` and `out.println(..)` statements\
    \ format the output to show the progress of the algorithm. To test the output,\
    \ we need a class containing a `main(..)` method to execute the algorithm, something\
    \ similar to the one depicted in Listing [9-2](#463938_3_En_9_Chapter.xhtml#PC2).\n\
    \n```\npackage com.apress.bgn.nine;\nimport com.apress.bgn.nine.algs.IntSorter;\n\
    import com.apress.bgn.nine.algs.MergeSort;\nimport java.util.Arrays;\nimport static\
    \ java.lang.System.out;\npublic class SortingDemo {\nvoid main(){\nint[] arr =\
    \ {5,1,4,2,3};\nIntSorter mergeSort = new MergeSort();\nmergeSort.sort(arr, 0,\
    \ arr.length - 1);\nout.print(\"Sorted: \");\nArrays.stream(arr).forEach(i ->\
    \ out.print(i + \" \"));\n}\n}\nListing 9-2\nMain Class to Execute the Merge-Sort\
    \ Proposed Implementation\n```\n\nIf we run the class in Listing [9-2](#463938_3_En_9_Chapter.xhtml#PC2),\
    \ the arguments provided to methods `sort(..)` and `merge(..)` are printed in\
    \ the console, as are the values being sorted and the array pieces being merged.\
    \ The output should look like the one depicted in Listing [9-3](#463938_3_En_9_Chapter.xhtml#PC3).\n\
    \n```\nCall sort of [low,high]: [0 4] 5 1 4 2 3\nCall sort of [low,high]: [0 2]\
    \ 5 1 4\nCall sort of [low,high]: [0 1] 5 1\nCall sort of [low,high]: [0 0] 5\n\
    Call sort of [low,high]: [1 1] 1\nCalled merge of [low, high, middle]: [0 1 0])\
    \ 1 5\nCall sort of [low,high]: [2 2] 4\nCalled merge of [low, high, middle]:\
    \ [0 2 1]) 1 4 5\nCall sort of [low,high]: [3 4] 2 3\nCall sort of [low,high]:\
    \ [3 3] 2\nCall sort of [low,high]: [4 4] 3\nCalled merge of [low, high, middle]:\
    \ [3 4 3]) 2 3\nCalled merge of [low, high, middle]: [0 4 2]) 1 2 3 4 5\nSorted:\
    \ 1 2 3 4 5\nListing 9-3\nValues Printed During Execution of the Merge-Sort Proposed\
    \ Implementation\n```\n\nYou can see that the console output matches the algorithm\
    \ steps depicted in Figure [9-3](#463938_3_En_9_Chapter.xhtml#Fig3), so that output\
    \ is clearly proof that the solution works as expected.\n\nAlthough all seems\
    \ well, there is a problem with this code: every time the `sort(..)` method is\
    \ called, those printing statements are executed.\n\n**Caution**\n\nIf the sorting\
    \ is just a step of a more complex solution, the output is not really necessary\
    \ and can even pollute the output of the bigger solution. Also, if the array is\
    \ quite big, printing that output could affect the performance of the overall\
    \ solution.\n\nSo a different approach should be considered, one that could be\
    \ customized and that includes the option to choose whether or not to print the\
    \ output. This is where logging libraries come in."
  raw: '### Logging


    In the real world, logging is the destructive (at least for mother nature) process
    of cutting down and processing trees to produce timber. In software programming
    **logging** means writing log files that can be later used to identify problems
    in code. The simplest way to log information is to use the `System.out.print*(..)`
    method family, as depicted in Figure [9-1](#463938_3_En_9_Chapter.xhtml#Fig1).


    ![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig1_HTML.jpg)


    Figure 9-1


    `System.out.print*(..)` method family


    The examples in this chapter use a hierarchy of classes that provide methods to
    sort integer arrays. The class hierarchy is depicted in Figure [9-2](#463938_3_En_9_Chapter.xhtml#Fig2).


    ![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig2_HTML.jpg)


    Figure 9-2


    The Sorting Classes Hierarchy


    In Listing [9-1](#463938_3_En_9_Chapter.xhtml#PC1), the `MergeSort` class contents
    are modified to add `System.out.print(..)` statements to log the steps of the
    algorithm. **MergeSort** is the name of a sorting algorithm that provides better
    performance than Bubble Sort (introduced in **Chapter** [**7**](#463938_3_En_7_Chapter.xhtml)).
    MergeSort describes sorting an array as the following suite of steps:


    1.  Split the array in two halves.


    2.  Split each half again until the resulting array is one that can be sorted
    easily.


    3.  Merge the sorted arrays repeatedly until the result is a single sorted array.


    This approach of splitting the array repeatedly until sorting becomes a manageable
    operation is called **divide et impera,** also known as **divide and conquer**
    (previously introduced in **Chapter** [**5**](#463938_3_En_5_Chapter.xhtml). There
    are more algorithms that follow the same approach for solving a problem, and MergeSort
    is only the first of them that will be covered in this book. In Figure [9-3](#463938_3_En_9_Chapter.xhtml#Fig3),
    you can see what happens in every step of a MergeSort algorithm.


    ![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Merge Sort algorithm steps


    In each step of the algorithm, the middle index of the array is identified. Then
    the `sort(..)` method is called for the arrays split in the middle by that index.
    This continues until there is no middle index, because the array has a single
    element. That is when the `merge(..)` method is called, which merges pieces of
    the array and also sorts them during the merging.


    Figure [9-3](#463938_3_En_9_Chapter.xhtml#Fig3) depicts the algorithm in a pretty
    similar way to the output that will be generated by the `System.out.print(..)`
    statements. Since it was mentioned that this algorithm is based on the divide-and-conquer
    method, Figure [9-4](#463938_3_En_9_Chapter.xhtml#Fig4) better shows the order
    of the operations.


    ![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig4_HTML.jpg)


    Figure 9-4


    Merge Sort algorithm steps shown as a tree


    To write the code that models the Merge-Sort algorithm, we need to write the two
    methods: `sort(array, low, high)` and `merge(array, low, high, middle)`. The proposed
    implementation is going to be depicted in the next section, with the appropriate
    logging.


    #### Logging with System.out.print


    The code for the Merge-Sort algorithm requires a lot of steps and a lot of variables
    to refer to all the indexes used to arrange our elements in the proper order.
    To make sure our solution is properly implemented, it would be useful to see the
    values each method is called with and the array pieces that are being handled.
    We can do this by simply adding a few `System.out.print` statements. To keep things
    even simpler, we’ll use `import static java.lang.System.out;`, which allows us
    to write `out.println` as shown in Listing [9-1](#463938_3_En_9_Chapter.xhtml#PC1).


    ```

    package com.apress.bgn.nine.algs;

    import static java.lang.System.out;

    public class MergeSort implements IntSorter {

    public void sort(int[] arr, int low, int high) {

    out.print("Call sort of [low,high]: [" + low + ", " + high + "] ");

    for (int i = low; i <= high; ++i) {

    out.print(arr[i] + " ");

    }

    out.println();

    if (low < high) {

    var middle = (low + high) / 2;

    //sort lower half of the interval

    sort(arr, low, middle);

    //sort upper half of the interval

    sort(arr, middle + 1, high);

    // merge the two intervals

    merge(arr, low, high, middle);

    }

    }

    private void merge(int[] arr, int low, int high, int middle) {

    var leftLength = middle - low + 1;

    var rightLength = high - middle;

    var left = new int[leftLength];

    var right = new int[rightLength];

    for (int i = 0; i < leftLength; ++i) {

    left[i] = arr[low + i];

    }

    for (int i = 0; i < rightLength; ++i) {

    right[i] = arr[middle + 1 + i];

    }

    var i = 0;

    var j = 0;

    var k = low;

    while (i < leftLength && j < rightLength) {

    if (left[i] <= right[j]) {

    arr[k] = left[i++];

    } else {

    arr[k] = right[j++];

    }

    k++;

    }

    while (i < leftLength) {

    arr[k++] = left[i++];

    }

    while (j < rightLength) {

    arr[k++] = right[j++];

    }

    out.print("Called merge of [low, high, middle]: " + low + ", " + high + ", " +
    middle + "]");

    for (int z = low; z <= high; ++z) {

    out.print(arr[z] + " ");

    }

    out.println();

    }

    }

    Listing 9-1

    Merge-Sort Proposed Implementation with Logging Using out.print Statements

    ```


    A combination of `out.print(..)` and `out.println(..)` statements format the output
    to show the progress of the algorithm. To test the output, we need a class containing
    a `main(..)` method to execute the algorithm, something similar to the one depicted
    in Listing [9-2](#463938_3_En_9_Chapter.xhtml#PC2).


    ```

    package com.apress.bgn.nine;

    import com.apress.bgn.nine.algs.IntSorter;

    import com.apress.bgn.nine.algs.MergeSort;

    import java.util.Arrays;

    import static java.lang.System.out;

    public class SortingDemo {

    void main(){

    int[] arr = {5,1,4,2,3};

    IntSorter mergeSort = new MergeSort();

    mergeSort.sort(arr, 0, arr.length - 1);

    out.print("Sorted: ");

    Arrays.stream(arr).forEach(i -> out.print(i + " "));

    }

    }

    Listing 9-2

    Main Class to Execute the Merge-Sort Proposed Implementation

    ```


    If we run the class in Listing [9-2](#463938_3_En_9_Chapter.xhtml#PC2), the arguments
    provided to methods `sort(..)` and `merge(..)` are printed in the console, as
    are the values being sorted and the array pieces being merged. The output should
    look like the one depicted in Listing [9-3](#463938_3_En_9_Chapter.xhtml#PC3).


    ```

    Call sort of [low,high]: [0 4] 5 1 4 2 3

    Call sort of [low,high]: [0 2] 5 1 4

    Call sort of [low,high]: [0 1] 5 1

    Call sort of [low,high]: [0 0] 5

    Call sort of [low,high]: [1 1] 1

    Called merge of [low, high, middle]: [0 1 0]) 1 5

    Call sort of [low,high]: [2 2] 4

    Called merge of [low, high, middle]: [0 2 1]) 1 4 5

    Call sort of [low,high]: [3 4] 2 3

    Call sort of [low,high]: [3 3] 2

    Call sort of [low,high]: [4 4] 3

    Called merge of [low, high, middle]: [3 4 3]) 2 3

    Called merge of [low, high, middle]: [0 4 2]) 1 2 3 4 5

    Sorted: 1 2 3 4 5

    Listing 9-3

    Values Printed During Execution of the Merge-Sort Proposed Implementation

    ```


    You can see that the console output matches the algorithm steps depicted in Figure
    [9-3](#463938_3_En_9_Chapter.xhtml#Fig3), so that output is clearly proof that
    the solution works as expected.


    Although all seems well, there is a problem with this code: every time the `sort(..)`
    method is called, those printing statements are executed.


    Caution


    If the sorting is just a step of a more complex solution, the output is not really
    necessary and can even pollute the output of the bigger solution. Also, if the
    array is quite big, printing that output could affect the performance of the overall
    solution.


    So a different approach should be considered, one that could be customized and
    that includes the option to choose whether or not to print the output. This is
    where logging libraries come in.'
  trans: '

    ### 日志记录


    在现实世界中，伐木是一个破坏性（至少对大自然母亲而言）的过程，即砍伐和加工树木以生产木材。在软件编程中，**日志记录**意味着编写日志文件，这些文件日后可用于识别代码中的问题。记录信息最简单的方法是使用
    `System.out.print*(..)` 方法族，如图 9-1 所示。


    ![](img/463938_3_En_9_Fig1_HTML.jpg)


    图 9-1


    `System.out.print*(..)` 方法族


    本章中的示例使用了一个类层次结构，该结构提供了对整数数组进行排序的方法。该类层次结构如图 9-2 所示。


    ![](img/463938_3_En_9_Fig2_HTML.jpg)


    图 9-2


    排序类层次结构


    在代码清单 9-1 中，修改了 `MergeSort` 类的内容，添加了 `System.out.print(..)` 语句来记录算法的步骤。**MergeSort**
    是一种排序算法的名称，其性能优于冒泡排序（在**第** **7** **章**中介绍）。MergeSort 将数组排序描述为以下一系列步骤：


    1.  将数组分成两半。

    2.  再次分割每一半，直到得到的数组可以轻松排序。

    3.  重复合并已排序的数组，直到最终得到一个已排序的数组。


    这种反复分割数组直到排序成为可管理操作的方法称为 **divide et impera**，也称为 **分治法**（之前在**第** **5** **章**中介绍过）。还有更多算法遵循相同的方法来解决问题，而
    MergeSort 只是本书中将介绍的第一个此类算法。在图 9-3 中，你可以看到 MergeSort 算法每一步发生的情况。


    ![](img/463938_3_En_9_Fig3_HTML.jpg)


    图 9-3


    归并排序算法步骤


    在算法的每一步中，都会确定数组的中间索引。然后，对按该索引从中间分割的数组调用 `sort(..)` 方法。这个过程会持续进行，直到没有中间索引为止，因为数组只有一个元素。此时会调用
    `merge(..)` 方法，该方法合并数组片段，并在合并过程中对它们进行排序。


    图 9-3 以与 `System.out.print(..)` 语句将生成的输出非常相似的方式描绘了该算法。由于前面提到该算法基于分治法，图 9-4 能更好地展示操作的顺序。


    ![](img/463938_3_En_9_Fig4_HTML.jpg)


    图 9-4


    以树形展示的归并排序算法步骤


    为了编写模拟归并排序算法的代码，我们需要编写两个方法：`sort(array, low, high)` 和 `merge(array, low, high,
    middle)`。提议的实现将在下一节中展示，并包含适当的日志记录。


    #### 使用 System.out.print 进行日志记录


    归并排序算法的代码需要很多步骤和很多变量来引用用于将元素按正确顺序排列的所有索引。为了确保我们的解决方案正确实现，查看每个方法被调用时使用的参数值以及正在处理的数组片段会很有用。我们可以通过简单地添加几个
    `System.out.print` 语句来实现这一点。为了更简单，我们将使用 `import static java.lang.System.out;`，这允许我们编写
    `out.println`，如代码清单 9-1 所示。


    ```

    package com.apress.bgn.nine.algs;

    import static java.lang.System.out;

    public class MergeSort implements IntSorter {

    public void sort(int[] arr, int low, int high) {

    out.print("Call sort of [low,high]: [" + low + ", " + high + "] ");

    for (int i = low; i <= high; ++i) {

    out.print(arr[i] + " ");

    }

    out.println();

    if (low < high) {

    var middle = (low + high) / 2;

    //sort lower half of the interval

    sort(arr, low, middle);

    //sort upper half of the interval

    sort(arr, middle + 1, high);

    // merge the two intervals

    merge(arr, low, high, middle);

    }

    }

    private void merge(int[] arr, int low, int high, int middle) {

    var leftLength = middle - low + 1;

    var rightLength = high - middle;

    var left = new int[leftLength];

    var right = new int[rightLength];

    for (int i = 0; i < leftLength; ++i) {

    left[i] = arr[low + i];

    }

    for (int i = 0; i < rightLength; ++i) {

    right[i] = arr[middle + 1 + i];

    }

    var i = 0;

    var j = 0;

    var k = low;

    while (i < leftLength && j < rightLength) {

    if (left[i] <= right[j]) {

    arr[k] = left[i++];

    } else {

    arr[k] = right[j++];

    }

    k++;

    }

    while (i < leftLength) {

    arr[k++] = left[i++];

    }

    while (j < rightLength) {

    arr[k++] = right[j++];

    }

    out.print("Called merge of [low, high, middle]: " + low + ", " + high + ", " +
    middle + "]");

    for (int z = low; z <= high; ++z) {

    out.print(arr[z] + " ");

    }

    out.println();

    }

    }

    代码清单 9-1

    使用 out.print 语句进行日志记录的归并排序提议实现

    ```


    `out.print(..)` 和 `out.println(..)` 语句的组合格式化了输出，以显示算法的进度。为了测试输出，我们需要一个包含 `main(..)`
    方法来执行算法的类，类似于代码清单 9-2 中所示的类。


    ```

    package com.apress.bgn.nine;

    import com.apress.bgn.nine.algs.IntSorter;

    import com.apress.bgn.nine.algs.MergeSort;

    import java.util.Arrays;

    import static java.lang.System.out;

    public class SortingDemo {

    void main(){

    int[] arr = {5,1,4,2,3};

    IntSorter mergeSort = new MergeSort();

    mergeSort.sort(arr, 0, arr.length - 1);

    out.print("Sorted: ");

    Arrays.stream(arr).forEach(i -> out.print(i + " "));

    }

    }

    代码清单 9-2

    执行归并排序提议实现的主类

    ```


    如果我们运行代码清单 9-2 中的类，传递给方法 `sort(..)` 和 `merge(..)` 的参数会打印在控制台中，正在排序的值和正在合并的数组片段也会被打印。输出应类似于代码清单
    9-3 中所示的内容。


    ```

    Call sort of [low,high]: [0 4] 5 1 4 2 3

    Call sort of [low,high]: [0 2] 5 1 4

    Call sort of [low,high]: [0 1] 5 1

    Call sort of [low,high]: [0 0] 5

    Call sort of [low,high]: [1 1] 1

    Called merge of [low, high, middle]: [0 1 0]) 1 5

    Call sort of [low,high]: [2 2] 4

    Called merge of [low, high, middle]: [0 2 1]) 1 4 5

    Call sort of [low,high]: [3 4] 2 3

    Call sort of [low,high]: [3 3] 2

    Call sort of [low,high]: [4 4] 3

    Called merge of [low, high, middle]: [3 4 3]) 2 3

    Called merge of [low, high, middle]: [0 4 2]) 1 2 3 4 5

    Sorted: 1 2 3 4 5

    代码清单 9-3

    执行归并排序提议实现期间打印的值

    ```


    你可以看到控制台输出与图 9-3 中描绘的算法步骤相匹配，因此该输出清楚地证明了该解决方案按预期工作。


    尽管一切看起来都很好，但这段代码存在一个问题：每次调用 `sort(..)` 方法时，这些打印语句都会被执行。


    注意


    如果排序只是一个更复杂解决方案中的一个步骤，那么输出并不是真正必要的，甚至可能污染更大解决方案的输出。此外，如果数组非常大，打印该输出可能会影响整体解决方案的性能。


    因此，应考虑一种不同的方法，一种可以定制的方法，并且包含选择是否打印输出的选项。这就是日志库的用武之地。

