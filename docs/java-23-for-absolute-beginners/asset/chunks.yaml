- fmt: '#### `jconsole`


    `jconsole` is a JDK utility that can be used to inspect various JVM statistics
    in its very basic GUI. To use `jconsole`, you just have to start it from the command
    line and connect it to a Java application that is already running. This application
    is quite useful, as it can monitor both local and remote JVMs. It can also monitor
    and manage an application. The application must expose a port for `jconsole` to
    connect to.


    To start a Java application and expose a port for an external application, simply
    start the application with the following VM parameters:


    ```

    -agentlib:jdwp=transport=dt_socket,server=y,suspend=y,address=1044

    ```


    The `transport=dt_socket` parameter instructs the JVM that the debugger connections
    will be made through a socket. The `address=1044` parameter informs the JVM that
    the port number will be 1044. The `port` number can be any port higher than 1024,
    because those are restricted by the operating system. The `suspend=y` parameter
    instructs the JVM to suspend execution until a debugger such as `jconsole` is
    connected to it. To avoid that, `suspend=n` should be used.


    For our simple example and considering that we will use `jconsole` to debug a
    Java application on the same machine, we do not need all those parameters. We
    just need to start `jconsole` from the command line and look in the *Local Processes*
    section and identify the Java process we are interested in debugging.


    In Figure [9-10](#463938_3_En_9_Chapter.xhtml#Fig10) you can see the first `jconsole`
    dialog window.


    ![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig10_HTML.jpg)


    Figure 9-10


    `jconsole` first dialog window


    When the process is running locally, it can be easily identified because it will
    be named using the module and the fully qualified main class name. For an application
    as simple as ours, we need to make a few tweaks to make sure that we can actually
    see a few statistics with `jconsole` during the run of the application. A few
    `Thread.sleep(..)` statements were added to pause the execution enough for `jconsole`
    to connect. Also, we’ll use quite a big array of data to make sure the statistics
    are relevant. The `BigSortingSlf4jDemo` class is depicted in Listing [9-24](#463938_3_En_9_Chapter.xhtml#PC42).


    ```

    package com.apress.bgn.nine;

    // import statements omitted

    public class BigSortingDemo {

    private static final Logger log = LoggerFactory.getLogger(BigSortingDemo.class);

    static RandomGenerator randomGenerator = RandomGenerator.of("SecureRandom");

    void main() throws InterruptedException {

    Thread.sleep(3000);

    // We are using this stream of ints to generate a huge array and a huge log file.
    Be patient, the execution will take a while.

    var intStream = IntStream.generate(() -> randomGenerator.nextInt(350) + 1).limit(100_000_000);

    int[] arr =  intStream.toArray();

    if (log.isDebugEnabled()) {

    final StringBuilder sb = new StringBuilder("Sorting  an array with merge sort:
    ");

    Arrays.stream(arr).forEach(i -> sb.append(i).append(" "));

    log.debug(sb.toString());

    }

    Thread.sleep(3000);

    var mergeSort = new MergeSort();

    mergeSort.sort(arr, 0, arr.length - 1);

    if (log.isInfoEnabled()) {

    final StringBuilder sb2 = new StringBuilder("Sorted: ");

    Arrays.stream(arr).forEach(i -> sb2.append(i).append(" "));

    log.info(sb2.toString());

    }

    }

    }

    Listing 9-24

    The Contents of the BigSortingDemo Class

    ```


    With this modification, the class can be executed normally and connect `jconsole`
    to it. After a successful connection, a window like the one shown in Figure [9-11](#463938_3_En_9_Chapter.xhtml#Fig11)
    opens, displaying graphs of the JVM memory consumption, number of live threads,
    number of classes loaded, and CPU usage.


    ![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig11_HTML.jpg)


    Figure 9-11


    `jconsole` statistics window


    There is a tab for each of these statistics that provides more information, and
    in the case of a more complex application, this information can be used to improve
    performance, identify potential problems, and even estimate application behavior
    for desired cases. For our small application, the `jconsole` graphs do not reveal
    much, but if you really want to see valuable statistics, use `jconsole` to monitor
    IntelliJ IDEA during development or while running some code.


    **Information**


    The more advanced version of `jconsole` is called VisualVM. It used to be part
    of the JDK, but it was removed in Java 8, after which it became an independent
    project. When this chapter is being written, there is no version available for
    Java 23, so it won’t be covered in this book, but feel free to give it a try.^([^(75)](#fn75))


    #### Using JDK Mission Control


    `JDK Mission Control (JMC)` is an advanced Oracle application for debugging and
    analyzing JVM statistics for a running application. Its official description states
    *JDK Mission Control (JMC)*^([^(76)](#fn76)) *is an advanced set of tools for
    managing, monitoring, profiling, and troubleshooting Java applications.*


    Similar to the previous tools discussed, this utility identifies the Java processes
    currently running and provides the option to check out how much memory they require
    at specific times during execution, how many threads are running in parallel at
    a given moment in time, the classes loaded by the JVM, and how much CPU processing
    power is required to run a Java application. JMC has a friendlier interface than
    JConsole and one of its most important components is the Java Flight Recorder
    (JFR) that can be used to record all JVM activity while the application is running.
    All data collected during a custom time of the execution is useful to diagnose
    and profile the application.


    Although JMC is one of the Oracle tools, it is no longer shipped as part of the
    JDK, so you have to download it from the JMC official page and install the version
    suitable for your operating system.


    To inspect the application while it is running, we open JMC and then select the
    process that we recognize as the one running the `BigSortingDemo` main class based
    on the same rule as before. We look for a process name containing the module name
    and the fully classified class name, right-click it, and select **Start JMX Console**.
    You should see something similar to the image depicted in Figure [9-12](#463938_3_En_9_Chapter.xhtml#Fig12).


    ![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig12_HTML.jpg)


    Figure 9-12


    JMC JMX Console


    As you probably noticed, the interface is definitely more friendly, and the provided
    statistics are definitely more detailed. Using JMC, everything that happens with
    the application and JVM during a run can be recorded and analyzed later, even
    if the application has stopped running since. The **Memory** tab provides a lot
    of information regarding the memory used by the application, including what types
    of objects are occupying it.


    Recording detailed information about a Java process requires it to be started
    with `-XX:+UnlockCommercialFeatures -XX:+FlightRecorder`. OpenJDK and early access
    JDKs do not have commercial features or Flight Recorder. These are part of the
    Oracle JDK, designed to be used only commercially and require a paid subscription.


    The JMC subject is too advanced and wide for this chapter (probably an entire
    book could be written about its usage and how to interpret the statistics), so
    we’ll stop here. If you have an Oracle JDK subscription and want to learn more
    about using JMC, Oracle provides very good resources for that.'
