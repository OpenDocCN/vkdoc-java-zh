    到目前为止，我们编写的代码使用了相当多的对象类型来在控制台中打印一些简单的消息。`List<E>` 对象用于保存一些 `String` 对象。消息是通过在
    `out` 对象上调用的 `println` 方法打印的，`out` 是 `System` 类中的一个静态字段。而这些只是您在代码中可见的对象。在底层，`List<E>`
    元素由一个 `Consumer<E>` 对象处理，该对象是在清单 3-26 中为简单起见而隐藏的 lambda 表达式所在的位置即时创建的，因此代码可以展开，如清单
    3-28 所示。


    ```

    package com.apress.bgn.three.helloworld;

    import java.util.List;

    import java.util.function.Consumer;

    public class HelloWorld {

    public static void main(String... args) {

    List items = List.of("1", "a", "2", "a", "3", "a");

    items.forEach(new Consumer() {

    @Override

    public void accept(String item) {

    if (item.equals("a")) {

    System.out.println("A");

    } else {

    System.out.println("Not A");

    }

    }

    });

    }

    }

    清单 3-28

    不使用 Lambda 表达式的更复杂的 main 方法

    ```


    在结束本章之前，我想向您展示另一个巧妙之处。`forEach` 块的内容可以写成一行：


    ```

    + items.forEach(item -> System.out.println(item.equals("a") ? "A" : "Not A"));

    ```


    而上面这一行可以通过使用一种叫做*方法引用*的东西变得更简单。但关于这个，本书稍后会再详细介绍。


    您在本章中读到的内容现在可能看起来很吓人，但我保证本书会在清晰的上下文中介绍每个概念，并将这些概念与现实生活中的对象和事件进行比较，以便您能轻松理解它们。如果这还不行，总还有更多的书籍、更多的博客，当然还有每个
    JDK 的官方 Oracle 页面，上面有相当不错的教程。有志者，事竟成。


    重要


    另外，请善用您的 IDE！在按住 Control/Command 键的同时单击代码中的任何对象类型，该对象类的代码就会被打开，使您能够看到该类是如何编写的，并且您可以直接在编辑器中阅读其文档。作为练习，请对
    `forEach` 方法和 `System` 类执行此操作。


    大多数真正智能的编辑器都有*键映射*，即一组按键，当同时按下时可以执行某些操作，例如导航、代码生成、执行等。打印出 IntelliJ IDEA 的键映射参考并熟悉它。您的大脑非常快，在编码时，目标是尽可能做到想多快就敲多快。:)


    ## 总结


    在本章中，您了解了 Java 应用程序的基本构建块。您还学习了如何使用 `jshell` 在应用程序上下文之外执行 Java 语句。您了解了如何手动编译声明了包和模块的
