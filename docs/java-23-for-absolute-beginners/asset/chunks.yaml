    ### 原始类型流与字符串流


    当我们首次创建原始类型流时，我们使用了一个 `int[]` 数组作为数据源。然而，原始类型流可以通过多种方式创建，因为 Stream API 包含了更多带有默认方法的接口，使得流式编程更加实用。在图
    8-1 中，你可以看到 Stream API 接口的层次结构。


    ![](img/463938_3_En_8_Fig1_HTML.jpg)


    图 8-1

    Stream API 接口


    查看图 8-1 后，你可能已经猜到，`IntStream` 接口可用于创建整数的原始类型流。该接口提供了许多方法来实现这一点，其中一些方法继承自 `BaseStream<T,S>`。可以通过现场指定几个值来创建
    `IntStream` 实例，具体方式包括使用 `builder()`、`generate(..)`、`iterate(..)` 方法，或者使用 `range*(..)`
    系列方法，如代码清单 8-15 所示。


    ```

    package com.apress.bgn.eight;

    import java.util.Random;

    import java.util.stream.IntStream;

    public class NumericStreamsDemo {

    void main(){

    var intStream0 = IntStream.builder().add(0).add(1).add(2).add(5).build();

    var intStream1 = IntStream.of(0,1,2,3,4,5);

    var intStream2 = IntStream.range(0, 10);

    var intStream3 = IntStream.rangeClosed(0, 10);

    Random random = new Random();

    IntStream intStream4 = random.ints(5);

    }

    }

    代码清单 8-15

    使用多种方法创建 IntStream 实例

    ```


    可以通过将区间的起始和结束值作为参数传递给 `range(..)` 和 `rangeClosed(..)` 方法来创建 `IntStream` 实例。这两种方法都会以步长
    1 生成流中的元素，只有后者会将区间的上限值包含在内。


    同样在 Java 1.8 中，`java.util.Random` 类新增了一个名为 `ints(..)` 的方法，用于生成随机整数的流。该方法声明了一个参数，表示要生成并放入流中的元素数量，但该方法还有一种不带参数的形式，用于生成无限流。


    所有为 `IntStream` 提到的方法都可以用于生成 `LongStream` 实例，因为该接口中也定义了等效的方法。


    对于 `DoubleStream`，没有 range 方法，但有 `of(..)`、`builder()`、`generate(..)` 等方法。此外，`java.util.Random`
    类在 Java 1.8 中新增了 `doubles(..)` 方法，用于生成随机双精度浮点数的流。该方法声明了一个参数，表示要生成并放入流中的元素数量，但该方法还有一种不带参数的形式，用于生成无限流。代码清单
    8-16 展示了几种创建双精度浮点数流的方式。


    ```

    package com.apress.bgn.eight;

    import java.util.Random;

    import java.util.stream.DoubleStream;

    public class NumericStreamsDemo {

    void main() {

    DoubleStream doubleStream0 = DoubleStream.of(1, 2 , 2.3, 3.4, 4.5, 6);

    Random random = new Random();

    DoubleStream doubleStream1 = random.doubles(3);

    DoubleStream doubleStream2 = DoubleStream.iterate(2.5, d -> d = d + 0.2).limit(10);

    }

    }

    代码清单 8-16

    使用多种方法创建数值流实例

    ```


    对于 `char` 类型的流，没有专门的接口，但使用 `IntStream` 完全可以胜任：


    ```

    IntStream intStream = IntStream.of(''a'',''b'',''c'',''d'');

    intStream.forEach(c -> System.out.println((char) c));

    ```


    另一种创建 `char` 类型流的方式是使用 `String` 实例作为流数据源：


    ```

    IntStream charStream = "sample".chars();

    charStream.forEach(c -> System.out.println((char) c));

    ```


    在 Java 8 中，`java.util.regex.Pattern` 也新增了流相关的方法；作为一个用于处理 `String` 实例的类，它是添加这些方法的合适位置。`Pattern`
    实例可用于拆分现有的 `String` 实例，并通过 `splitAsStream(..)` 方法将拆分后的片段以流的形式返回：


    ```

    Stream stringStream = Pattern.compile(" ")

    .splitAsStream("live your life");

    ```


    文件的内容也可以通过 `Files.lines(..)` 工具方法以字符串流的形式返回：


    ```

    String inputPath = "chapter08/src/main/resources/songs.csv";

    Stream stringStream = Files.lines(Path.of(inputPath));

    ```


    到目前为止，这些章节已经向你展示了如何创建所有类型的流；接下来的章节将向你展示如何使用它们来处理数据。


    重要提示


    如果你觉得需要将流实例与真实对象关联起来以便更好地理解它们，我建议如下：将有限流（例如从集合创建的流）想象成杯子倾斜时滴落的水滴。杯子里的水最终会流尽，但在水滴落的过程中，它们形成了一股水流。无限流则像一条有源头的河流：它持续不断地流淌*（当然，除非发生严重的干旱导致河流干涸）*。

    '
- fmt: '### Short Introduction to `Optional<T>`


    `java.util.Optional<T>`实例是Java语言中的薛定谔盒子。它们非常有用，因为可以作为方法的返回类型，避免返回`null`值，从而防止抛出`NullPointerException`，或者避免开发者编写额外代码来处理可能抛出的异常。`Optional<T>`实例的创建方式与流类似。


    有一个`empty()`方法用于创建不包含任何内容的任意类型的可选值：


    ```

    Optional empty = Optional.empty();

    ```


    有一个`of()`方法用于将现有对象包装到`Optional<T>`实例中：


    ```

    Optional value = Optional.of(5L);

    ```


    考虑到这类实例的设计初衷是不允许`null`值，上述创建`Optional<T>`实例的方式阻止了我们编写类似这样的代码：


    ```

    Song song = null;

    Optional nonNullable = Optional.of(song);

    ```


    编译器不会报错，但在运行时执行代码时，会抛出`NullPointerException`。不过，如果我们确实需要一个允许`null`值的`Optional<T>`实例，也是可行的：Java
    9中引入了一个名为`ofNullable(T t)`的实用方法，专门用于此目的：


    ```

    Song song = null;

    Optional nullable = Optional.ofNullable(song);

    ```


    现在我们有了`Optional<T>`实例，可以像清单[8-17](#463938_3_En_8_Chapter.xhtml#PC29)中的代码所示那样使用它们。


    ```

    package com.apress.bgn.eight;

    import com.apress.bgn.eight.util.MediaLoader;

    import com.apress.bgn.eight.util.Song;

    import java.util.List;

    import static java.lang.System.out;

    public class NonOptionalDemo {

    void main() {

    List songs = MediaLoader.loadSongs();

    Song song = findFirst(songs, "B.B. King");

    if(song != null && song.getSinger().equals("The Thrill Is Gone")) {

    out.println("Good stuff!");

    } else {

    out.println("not found!");

    }

    }

    public static Song findFirst(List songs, String singer) {

    for (Song song: songs) {

    if (singer.equals(song.getSinger())) {

    return song;

    }

    }

    return null;

    }

    }

    Listing 8-17

    Code Showing the Necessity of Optional

    ```


    `findFirst(..)`方法在列表中查找第一个歌手等于“B.B. King”的歌曲；如果找到则返回并打印一条消息，否则打印另一条消息。注意其中的空值检查以及列表的迭代。在Java
    8中，这两者都不再必要。清单[8-18](#463938_3_En_8_Chapter.xhtml#PC30)展示了清单[8-17](#463938_3_En_8_Chapter.xhtml#PC29)中的代码使用`Optional<T>`重新设计后的版本。


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class OptionalDemo {

    void main() {

    List songs = MediaLoader.loadSongs();

    Optional opt = songs.stream()

    .filter(s -> "B.B. King".equals(s.getSinger()))

    .findFirst();

    opt.ifPresent(r -> out.println(r.getTitle()));

    }

    }

    Listing 8-18

    Code Showing the Necessity of Optional

    ```


    如果`Optional<T>`实例不为空，则会打印歌曲标题；否则，不会打印任何内容，代码会从该点继续执行，而不会抛出异常。但是，如果我们想在`Optional<T>`实例为空时打印一些内容呢？在Java
    11中，我们可以对此进行处理，因为引入了一个名为`isEmpty()`的方法来测试`Optional<T>`实例的内容，如清单[8-19](#463938_3_En_8_Chapter.xhtml#PC31)所示。


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class OptionalDemo {

    void main() {

    Optional opt1 = songs.stream()

    .filter(s -> "B.B. King".equals(s.getSinger()))

    .findFirst();

    if(opt1.isEmpty()) {

    out.println("Not found!");

    }

    }

    }

    Listing 8-19

    Code Showing Usage of Optional.isEmpty()

    ```


    但是等等，这有点……不太对劲。难道我们不能在`Optional<T>`实例上调用一个方法，使其行为完全等同于`if-else`语句吗？是的，从Java 9开始这是可能的；`ifPresentOrElse(..)`方法接受两个参数：一个`Consumer<T>`实例，用于在`Optional<T>`实例不为空时处理其内容；以及一个`Runnable`实例，用于在`Optional<T>`实例为空时执行，如清单[8-20](#463938_3_En_8_Chapter.xhtml#PC32)所示。


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class OptionalDemo {

    void main() {

    List songs = MediaLoader.loadSongs();

    Optional opt2 = songs.stream()

    .filter(ss -> "B.B. King".equals(ss.getSinger())).findFirst();

    opt2.ifPresentOrElse(

    r -> out.println(r.getTitle()),

    () -> out.println("Not found!")) ;

    }

    }

    Listing 8-20

    Code Showing Usage of Optional.ifPresentOrElse(..)

    ```


    如果`Optional<T>`实例不为空，可以通过调用`get()`方法提取其内容，如清单[8-21](#463938_3_En_8_Chapter.xhtml#PC33)所示。


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class OptionalDemo {

    void main() {

    List songs = MediaLoader.loadSongs();

    Optional opt3 = songs.stream()

    .filter(ss -> "Rob Thomas".equals(ss.getSinger()))

    .findFirst();

    out.println("Found Song " + opt3.get());

    }

    }

    Listing 8-21

    Code Showing Usage of Optional.get()

    ```


    当未找到所需对象时，上述代码不会打印任何内容，因为`Optional<T>`实例为空。但是，如果我们想打印一个默认值，例如，也可以使用名为`orElse(..)`的方法来实现，如清单[8-22](#463938_3_En_8_Chapter.xhtml#PC34)所示。


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class OptionalDemo {

    void main() {

    List songs = MediaLoader.loadSongs();

    Optional opt4 = songs.stream()

    .filter(ss -> "B.B. King".equals(ss.getSinger()))

    .findFirst();

    opt4.ifPresent(r -> out.println(r.getTitle()));

    Song defaultSong = new Song();

    defaultSong.setTitle("Untitled");

    Song s = opt4.orElse(defaultSong);

    out.println("Found: " + s.getTitle());

    }

    }

    Listing 8-22

    Code Showing Usage of Optional.orElse(..)

    ```


    `orElse(T t)`方法接收一个由`Optional<T>`包装的类型的实例作为参数。还有另一个版本，它接收一个返回所需类型对象的`Supplier<T>`实例。使用该方法的代码片段如下所示：


    ```

    Song fromSupplier =

    opt4.orElseGet(() -> new Song("None", "Untitled", 0, null));

    System.out.println("Found: " + fromSupplier.getTitle());

    ```


    如果我们希望在`Optional<T>`实例为空时抛出一个特定的异常，也有一个方法可以实现，名为`orElseThrow(..)`，如清单[8-23](#463938_3_En_8_Chapter.xhtml#PC36)所示。


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class OptionalDemo {

    void main() {

    List songs = MediaLoader.loadSongs();

    Optional opt5 = songs.stream()

    .filter(st -> "B.B. King".equals(st.getSinger()))

    .findFirst();

    Song song = opt5.orElseThrow(IllegalArgumentException::new);

    }

    }

    Listing 8-23

    Code Showing Usage of Optional.orElseThrow(..)

    ```


    正如你可能在前面的代码示例中注意到的，`Optional<T>`和`Stream<T>`实例可以结合使用，编写实用的代码来解决复杂的问题。`Optional<T>`和`Stream<T>`实例上可以应用许多方法，因此接下来的章节将介绍流的相关方法，并随机引用`Optional<T>`。'
  raw: '### Short Introduction to **Optional<T>**


    The `java.util.Optional<T>` instances are the Schrödinger^([^(66)](#fn66)) boxes
    of the Java language. They are very useful because they can be used as a return
    type for methods to avoid returning a `null` value, and cause either a possible
    `NullPointerException` to be thrown or the developer using the method to write
    extra code to treat the possibility of an exception being thrown. `Optional<T>`
    instances can be created in a similar way to streams.


    There is an `empty()` method for creating an optional value of any type that does
    not contain anything:


    ```

    Optional empty = Optional.empty();

    ```


    There is an `of()` method used to wrap an existing object into an `Optional<T>`
    instance:


    ```

    Optional value = Optional.of(5L);

    ```


    Considering that these type of instances are designed not to allow `null` values,
    the way the `Optional<T>` instance was created previously, stops us from writing
    something like this:


    ```

    Song song = null;

    Optional nonNullable = Optional.of(song);

    ```


    The compiler doesn’t mind, but at runtime when the code is executed, a `NullPointerException`
    will be thrown. Still, if we really need an `Optional<T>` instance to permit `null`
    values, it is possible: a utility method named `ofNullable(T t)` was introduced
    in Java 9 just for that purpose:


    ```

    Song song = null;

    Optional nullable = Optional.ofNullable(song);

    ```


    Now that we have `Optional<T>` instances, what can use them, as shown in the code
    in Listing [8-17](#463938_3_En_8_Chapter.xhtml#PC29).


    ```

    package com.apress.bgn.eight;

    import com.apress.bgn.eight.util.MediaLoader;

    import com.apress.bgn.eight.util.Song;

    import java.util.List;

    import static java.lang.System.out;

    public class NonOptionalDemo {

    void main() {

    List songs = MediaLoader.loadSongs();

    Song song = findFirst(songs, "B.B. King");

    if(song != null && song.getSinger().equals("The Thrill Is Gone")) {

    out.println("Good stuff!");

    } else {

    out.println("not found!");

    }

    }

    public static Song findFirst(List songs, String singer) {

    for (Song song: songs) {

    if (singer.equals(song.getSinger())) {

    return song;

    }

    }

    return null;

    }

    }

    Listing 8-17

    Code Showing the Necessity of Optional

    ```


    The `findFirst(..)` method looks for the first song in the list that has the singer
    equal to “B.B. King”; returns it and prints a message if found, and another message
    if not. Notice the nullability test and iteration of the list. In Java 8, both
    of them are no longer necessary. Listing [8-18](#463938_3_En_8_Chapter.xhtml#PC30)
    depicts the code in Listing [8-17](#463938_3_En_8_Chapter.xhtml#PC29) redesigned
    to use `Optional<T>`.


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class OptionalDemo {

    void main() {

    List songs = MediaLoader.loadSongs();

    Optional opt = songs.stream()

    .filter(s -> "B.B. King".equals(s.getSinger()))

    .findFirst();

    opt.ifPresent(r -> out.println(r.getTitle()));

    }

    }

    Listing 8-18

    Code Showing the Necessity of Optional

    ```


    If the `Optional<T>` instance is not empty, the song title will be printed; otherwise,
    nothing will be printed and the code will continue from that point on without
    an exception being thrown. But what if we want to print something when the `Optional<T>`
    instance is empty? In Java 11, we can do something about that, because a method
    named `isEmpty()` was introduced to test the `Optional<T>` instance contents,
    as demonstrated in Listing [8-19](#463938_3_En_8_Chapter.xhtml#PC31).


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class OptionalDemo {

    void main() {

    Optional opt1 = songs.stream()

    .filter(s -> "B.B. King".equals(s.getSinger()))

    .findFirst();

    if(opt1.isEmpty()) {

    out.println("Not found!");

    }

    }

    }

    Listing 8-19

    Code Showing Usage of Optional.isEmpty()

    ```


    But wait, this is a little bit…not right. Can’t we just have a method to call
    on an `Optional<T>` instance to get the exact behavior as an `if-else` statement?
    Yes, that is possible starting with Java 9; the `ifPresentOrElse(..)` method takes
    as arguments a `Consumer<T>` instance to process the contents of the `Optional<T>`
    instance when it is not empty and a `Runnable` instance to execute when the `Optional<T>`
    instance is empty, as shown in Listing [8-20](#463938_3_En_8_Chapter.xhtml#PC32).


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class OptionalDemo {

    void main() {

    List songs = MediaLoader.loadSongs();

    Optional opt2 = songs.stream()

    .filter(ss -> "B.B. King".equals(ss.getSinger())).findFirst();

    opt2.ifPresentOrElse(

    r -> out.println(r.getTitle()),

    () -> out.println("Not found!")) ;

    }

    }

    Listing 8-20

    Code Showing Usage of Optional.ifPresentOrElse(..)

    ```


    If the `Optional<T>` instance is not empty, its contents can be extracted by calling
    the `get()` method, as shown in Listing [8-21](#463938_3_En_8_Chapter.xhtml#PC33).


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class OptionalDemo {

    void main() {

    List songs = MediaLoader.loadSongs();

    Optional opt3 = songs.stream()

    .filter(ss -> "Rob Thomas".equals(ss.getSinger()))

    .findFirst();

    out.println("Found Song " + opt3.get());

    }

    }

    Listing 8-21

    Code Showing Usage of Optional.get()

    ```


    The previous code does not print anything when the desired object is not found,
    because the `Optional<T>` instance is empty. But if we want to print a default
    value, for example, we can do that as well by using a method named `orElse(..)`,
    as shown in Listing [8-22](#463938_3_En_8_Chapter.xhtml#PC34).


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class OptionalDemo {

    void main() {

    List songs = MediaLoader.loadSongs();

    Optional opt4 = songs.stream()

    .filter(ss -> "B.B. King".equals(ss.getSinger()))

    .findFirst();

    opt4.ifPresent(r -> out.println(r.getTitle()));

    Song defaultSong = new Song();

    defaultSong.setTitle("Untitled");

    Song s = opt4.orElse(defaultSong);

    out.println("Found: " + s.getTitle());

    }

    }

    Listing 8-22

    Code Showing Usage of Optional.orElse(..)

    ```


    The `orElse(T t)` method receives as an argument an instance of the type wrapped
    by `Optional<T>`. There is another version of it that takes a `Supplier<T>` instance
    that returns an object of the required type. The snippet using that method is
    shown here:


    ```

    Song fromSupplier =

    opt4.orElseGet(() -> new Song("None", "Untitled", 0, null));

    System.out.println("Found: " + fromSupplier.getTitle());

    ```


    If we were interested in throwing a specific exception when the `Optional<T>`
    instance is empty, there is a method for that as well, named `orElseThrow(..)``,`
    as shown in Listing [8-23](#463938_3_En_8_Chapter.xhtml#PC36).


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class OptionalDemo {

    void main() {

    List songs = MediaLoader.loadSongs();

    Optional opt5 = songs.stream()

    .filter(st -> "B.B. King".equals(st.getSinger()))

    .findFirst();

    Song song = opt5.orElseThrow(IllegalArgumentException::new);

    }

    }

    Listing 8-23

    Code Showing Usage of Optional.orElseThrow(..)

    ```


    As you probably noticed in the previous code samples, `Optional<T>` and `Stream<T>`
    instances can be combined to write practical code to solve complex solutions.
    There are a lot of methods that can be applied to `Optional<T>` and `Stream<T>`
    instances as well, so the next sections will introduce them for streams and randomly
    make reference to `Optional<T>` as well.'
  trans: '

    ### **Optional<T>** 简介


    `java.util.Optional<T>` 实例是 Java 语言中的薛定谔^(⁶⁶)盒子。它们非常有用，因为可以作为方法的返回类型，从而避免返回 `null`
    值，并防止可能抛出 `NullPointerException`，或者迫使使用该方法的开发者编写额外代码来处理可能抛出的异常。`Optional<T>` 实例的创建方式与流类似。


    有一个 `empty()` 方法，用于创建不包含任何内容的任意类型的可选值：


    ```

    Optional empty = Optional.empty();

    ```


    有一个 `of()` 方法，用于将现有对象包装到 `Optional<T>` 实例中：


    ```

    Optional value = Optional.of(5L);

    ```


    考虑到这类实例的设计初衷是不允许 `null` 值，之前创建 `Optional<T>` 实例的方式阻止了我们编写类似下面的代码：


    ```

    Song song = null;

    Optional nonNullable = Optional.of(song);

    ```


    编译器不会在意，但在运行时执行代码时，会抛出 `NullPointerException`。不过，如果我们确实需要一个允许 `null` 值的 `Optional<T>`
    实例，也是可以的：Java 9 中引入了一个名为 `ofNullable(T t)` 的实用方法，正是为此目的：


    ```

    Song song = null;

    Optional nullable = Optional.ofNullable(song);

    ```


    现在我们有了 `Optional<T>` 实例，如何使用它们呢？如清单 8-17 中的代码所示。


    ```

    package com.apress.bgn.eight;

    import com.apress.bgn.eight.util.MediaLoader;

    import com.apress.bgn.eight.util.Song;

    import java.util.List;

    import static java.lang.System.out;

    public class NonOptionalDemo {

    void main() {

    List songs = MediaLoader.loadSongs();

    Song song = findFirst(songs, "B.B. King");

    if(song != null && song.getSinger().equals("The Thrill Is Gone")) {

    out.println("好歌！");

    } else {

    out.println("未找到！");

    }

    }

    public static Song findFirst(List songs, String singer) {

    for (Song song: songs) {

    if (singer.equals(song.getSinger())) {

    return song;

    }

    }

    return null;

    }

    }

    清单 8-17

    展示 Optional 必要性的代码

    ```


    `findFirst(..)` 方法在列表中查找第一位歌手为“B.B. King”的歌曲；如果找到则返回并打印一条消息，否则打印另一条消息。注意其中的空值检查和对列表的迭代。在
    Java 8 中，这两者都不再必要。清单 8-18 展示了将清单 8-17 中的代码重新设计为使用 `Optional<T>` 后的版本。


    ```

    package com.apress.bgn.eight;

    // 省略 import 语句

    public class OptionalDemo {

    void main() {

    List songs = MediaLoader.loadSongs();

    Optional opt = songs.stream()

    .filter(s -> "B.B. King".equals(s.getSinger()))

    .findFirst();

    opt.ifPresent(r -> out.println(r.getTitle()));

    }

    }

    清单 8-18

    展示 Optional 必要性的代码

    ```


    如果 `Optional<T>` 实例不为空，则会打印歌曲标题；否则，不会打印任何内容，代码会从该点继续执行，而不会抛出异常。但是，如果我们想在 `Optional<T>`
    实例为空时打印一些内容呢？在 Java 11 中，我们可以对此进行处理，因为引入了一个名为 `isEmpty()` 的方法来测试 `Optional<T>`
    实例的内容，如清单 8-19 所示。


    ```

    package com.apress.bgn.eight;

    // 省略 import 语句

    public class OptionalDemo {

    void main() {

    Optional opt1 = songs.stream()

    .filter(s -> "B.B. King".equals(s.getSinger()))

    .findFirst();

    if(opt1.isEmpty()) {

    out.println("未找到！");

    }

    }

    }

    清单 8-19

    展示 Optional.isEmpty() 用法的代码

    ```


    但是等等，这有点……不太对劲。难道我们不能在 `Optional<T>` 实例上调用一个方法，来获得与 `if-else` 语句完全相同的行为吗？是的，从
    Java 9 开始这是可能的；`ifPresentOrElse(..)` 方法接受两个参数：一个 `Consumer<T>` 实例，用于在 `Optional<T>`
    实例不为空时处理其内容；以及一个 `Runnable` 实例，用于在 `Optional<T>` 实例为空时执行，如清单 8-20 所示。


    ```

    package com.apress.bgn.eight;

    // 省略 import 语句

    public class OptionalDemo {

    void main() {

    List songs = MediaLoader.loadSongs();

    Optional opt2 = songs.stream()

    .filter(ss -> "B.B. King".equals(ss.getSinger())).findFirst();

    opt2.ifPresentOrElse(

    r -> out.println(r.getTitle()),

    () -> out.println("未找到！")) ;

    }

    }

    清单 8-20

    展示 Optional.ifPresentOrElse(..) 用法的代码

    ```


    如果 `Optional<T>` 实例不为空，可以通过调用 `get()` 方法提取其内容，如清单 8-21 所示。


    ```

    package com.apress.bgn.eight;

    // 省略 import 语句

    public class OptionalDemo {

    void main() {

    List songs = MediaLoader.loadSongs();

    Optional opt3 = songs.stream()

    .filter(ss -> "Rob Thomas".equals(ss.getSinger()))

    .findFirst();

    out.println("找到歌曲 " + opt3.get());

    }

    }

    清单 8-21

    展示 Optional.get() 用法的代码

    ```


    当未找到所需对象时，上述代码不会打印任何内容，因为 `Optional<T>` 实例为空。但是，如果我们想打印一个默认值，例如，我们也可以使用一个名为 `orElse(..)`
    的方法来实现，如清单 8-22 所示。


    ```

    package com.apress.bgn.eight;

    // 省略 import 语句

    public class OptionalDemo {

    void main() {

    List songs = MediaLoader.loadSongs();

    Optional opt4 = songs.stream()

    .filter(ss -> "B.B. King".equals(ss.getSinger()))

    .findFirst();

    opt4.ifPresent(r -> out.println(r.getTitle()));

    Song defaultSong = new Song();

    defaultSong.setTitle("无标题");

    Song s = opt4.orElse(defaultSong);

    out.println("找到: " + s.getTitle());

    }

    }

    清单 8-22

    展示 Optional.orElse(..) 用法的代码

    ```


    `orElse(T t)` 方法接收一个由 `Optional<T>` 包装的类型的实例作为参数。它还有另一个版本，接受一个返回所需类型对象的 `Supplier<T>`
    实例。使用该方法的代码片段如下所示：


    ```

    Song fromSupplier =

    opt4.orElseGet(() -> new Song("无", "无标题", 0, null));

    System.out.println("找到: " + fromSupplier.getTitle());

    ```


    如果我们希望在 `Optional<T>` 实例为空时抛出一个特定的异常，也有一个方法可以实现，名为 `orElseThrow(..)`，如清单 8-23
    所示。


    ```

    package com.apress.bgn.eight;

    // 省略 import 语句

    public class OptionalDemo {

    void main() {

    List songs = MediaLoader.loadSongs();

    Optional opt5 = songs.stream()

    .filter(st -> "B.B. King".equals(st.getSinger()))

    .findFirst();

    Song song = opt5.orElseThrow(IllegalArgumentException::new);

    }

    }

    清单 8-23

    展示 Optional.orElseThrow(..) 用法的代码

    ```


    正如你可能在前面的代码示例中注意到的，`Optional<T>` 和 `Stream<T>` 实例可以结合使用，编写实用的代码来解决复杂的问题。有很多方法也可以应用于
    `Optional<T>` 和 `Stream<T>` 实例，因此接下来的部分将针对流介绍这些方法，并随机引用 `Optional<T>`。

    '
- fmt: '### How to Use Streams Like a Pro


    After creating a stream, the next thing is to process the data on the stream.
    Before taking a deep dive into advanced stream usage, let’s recapitulate the core
    concepts:


    - The result of that processing can be another stream, which can be further processed
    as many times as needed. There are quite a few methods to use to process a stream
    and return the result as another stream. These methods are called **intermediate
    operations**.

    - The methods that do not return a stream but actual data structures, or nothing,
    are named **terminal operations**.


    All these are defined in the `Stream<T>` interface, and they are used to define
    a **stream pipeline**.


    The key feature of streams is that the processing of data using streams occurs
    only when the terminal operation is initiated, which means the elements from sources
    are consumed only as needed. So you could say that the whole stream process is
    actually **lazy**. Lazy loading of source elements and processing them only when
    needed allows significant optimizations.


    After the previous affirmations, you’ve probably realized that the `forEach(..)`
    method that was used a lot previously to print values from the streams is actually
    a terminal operation. But there are quite a few other terminal operations, and
    a few of them—the ones you’ll most likely need for the most commons implementations—will
    be used in the examples in the rest of the chapter.


    This chapter started with an example that processes a stream of `Song` instances,
    but the `Song` class was not shown. You can see its fields in Listing [8-24](#463938_3_En_8_Chapter.xhtml#PC37).


    ```

    package com.apress.bgn.eight;

    public class Song implements Comparable {

    private Long id;

    private String singer;

    private String title;

    private Integer duration;

    private AudioType audioType;

    //getters and setters and other methods omitted

    }

    Listing 8-24

    Fields of Class Song

    ```


    `AudioType` is an enum containing the types of audio files and is depicted in
    Listing [8-25](#463938_3_En_8_Chapter.xhtml#PC38).


    ```

    package com.apress.bgn.eight;

    public enum AudioType {

    MP3, FLAC, OGG, AAC, M4A, WMA

    }

    Listing 8-25

    AudioType Enum

    ```


    Having identified the data type that will be used on the following stream examples,
    the data is presented next. In the example in Listing [8-26](#463938_3_En_8_Chapter.xhtml#PC39),
    the data is contained in a file named `songs.csv`. The `.csv` extension denotes
    a *comma separated file*, and each `Song` instance matches a line in the file.
    Each line contains all the property values of each `Song` instance, separated
    by columns. The order of the values must match the order of the constructor arguments.
    Other separators can be used, but semicolons are used here for practical reasons
    (which is the default supported by the library reading the data).


    ```

    01;John Mayer;New Light;206;FLAC

    02;John Mayer;My Stupid Mouth;225;M4A

    ...

    28;Mike Shinoda;Crossing A Line;248;MP3

    19;John Mayer;Helpless;249;MP3

    Listing 8-26

    Song Entries (Sample) in the songs.csv File

    ```


    Each line in the file will be transformed into a `Song` instance by using classes
    in a library named JSefa^([^(67)](#fn67)). This library is not the focus of this
    discussion, but if you are interested, you can use the link in the footnote to
    get more details from the official site.


    Now you are ready to start playing with streams.


    #### Terminal Functions `forEach` and `forEachOrdered`


    Assuming the songs stream will provide all `Song` instances declared in Listing
    [8-26](#463938_3_En_8_Chapter.xhtml#PC39), let’s first print all the elements
    in the stream. The code in Listing [8-27](#463938_3_En_8_Chapter.xhtml#PC40) prints
    all `Song` instances on a `Stream<Song>` instance using a simple consumer.


    ```

    package com.apress.bgn.eight;

    import com.apress.bgn.eight.util.Song;

    import com.apress.bgn.eight.util.StreamMediaLoader;

    import java.util.stream.Stream;

    import static java.lang.System.out;

    public class MediaStreamTester {

    public static void main(String... args) {

    Stream songs = StreamMediaLoader.loadSongs();

    songs.forEach(song -> out.println(song));

    }

    }

    Listing 8-27

    Using a Stream to Print Song Instances

    ```


    *Method references*, introduced in Java 8, are a shortcut for cases when a lambda
    expression does nothing else than call a method, so the method can be referenced
    by name directly. So this line:


    ```

    songs.forEach(song -> System.out.println(song));

    ```


    becomes


    ```

    songs.forEach(System.out::println);

    ```


    The `forEach(..)` method receives an instance of `Consumer<T>` as an argument.
    In the two previous examples, the implementation of the `accept()` method contained
    only a call to `System.out.println(song)`, and that is why the code is so compact,
    because method references can be used. But if the implementation of this method
    needs to contain more statements, then the compact code previously written would
    not be possible (unless a method reference is introduced). Instead of printing
    the songs directly, let’s first change to uppercase the singer’s name, as depicted
    in Listing [8-28](#463938_3_En_8_Chapter.xhtml#PC43).


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class MediaStreamTester {

    void main(){

    Stream songs = StreamMediaLoader.loadSongs();

    songs.forEach(new Consumer() {

    @Override

    public void accept(Song song) {

    song.setSinger(song.getSinger().toUpperCase());

    out.println(song);

    }

    });

    }

    }

    Listing 8-28

    Using a Consumer Anonymous Class to Print Song Instances

    ```


    It can be simplified using lambda expressions, but since the method body has two
    lines, it still looks bad. So, a different way to do it is to declare a consumer
    field and use lambda expression to call its `accept(..)` method for every song,
    as depicted in Listing [8-29](#463938_3_En_8_Chapter.xhtml#PC44).


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class MediaStreamTester {

    public static Consumer myConsumer = song -> {

    song.setSinger(song.getSinger().toUpperCase());

    out.println(song);

    };

    void main(){

    Stream songs = StreamMediaLoader.loadSongs();

    songs.forEach(song -> myConsumer.accept(song));

    }

    }

    Listing 8-29

    Using a Consumer Instance to Print Song Instances

    ```


    The sister function `forEachOrdered(..)` does the same thing as `forEach(..)`,
    with one little difference to ensure that the elements on the stream will be processed
    in encounter order, if such order is defined for the stream, even if the stream
    is a parallel one. So basically the following second and third lines will print
    the songs in the same order:


    ```

    import static java.lang.System.out;

    ...

    songs.forEach(out::println);

    songs.parallel().forEachOrdered(out::println); // underline function or make it
    bold

    ```


    #### Intermediate Operation `filter` and Terminal Operation `toArray`


    In the following example, we will select all MP3 songs and save them to an array.
    Selecting all MP3 songs is done using the `filter(..)` method. This method receives
    an argument of type `Predicate<T>`, which is used to define a condition that the
    elements of the stream must pass to be put into the array that results by calling
    the terminal method named `toArray(..)`.


    The `toArray(..)` method receives an argument of type `IntFunction<A[]>`. This
    type of function is also called a *generator* and takes an integer as an argument
    and generates an array of that size. In most cases the most suitable generator
    is an array constructor reference.


    The code to filter the MP3 entries and put them into an array of type `Song[]`
    is depicted in Listing [8-30](#463938_3_En_8_Chapter.xhtml#PC46).


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class MediaStreamTester {

    void main(){

    Stream songs = StreamMediaLoader.loadSongs();

    Song[] sarray = songs.filter(s -> s.getAudioType() == AudioType.MP3).toArray(Song[]::new);
    // array constructor reference

    Arrays.stream(sarray).forEach(out::println);

    }

    }

    Listing 8-30

    Using filter(..) to Select Songs from a Stream

    ```'
