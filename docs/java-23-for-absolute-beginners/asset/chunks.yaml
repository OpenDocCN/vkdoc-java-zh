- fmt: '### Using `OutputStream` to Write Files


    Classes in the `Writer` family are advanced classes for writing data as text using
    character streams, but essentially, before data is written it is turned into bytes.
    This obviously means that files can be written by using streams of bytes as well.
    This probably became obvious when trying to use the proper character encoding
    when writing text using the `OutputStreamWriter`, as the `OutputStreamWriter`
    instance given as an argument is based on a `FileOutputStream` instance, a type
    that is used to write byte streams to a file.


    The root class of this hierarchy is `java.io.OutputStream`, and the most common
    members of the hierarchy are depicted in Figure [11-6](#463938_3_En_11_Chapter.xhtml#Fig6).


    ![](images/463938_3_En_11_Chapter/463938_3_En_11_Fig6_HTML.jpg)


    Figure 11-6


    The `OutputStream` class hierarchy


    Listing [11-27](#463938_3_En_11_Chapter.xhtml#PC52) shows how to use `FileOutputStream`
    to write a list of `String` entries.


    ```

    package com.apress.bgn.eleven.io;

    import java.io.FileNotFoundException;

    import java.io.FileOutputStream;

    // other import statements omitted

    public class OutputStreamWritingDemo {

    private static final Logger log = LoggerFactory.getLogger(OutputStreamWritingDemo.class);

    public static void main(String... args) {

    var file = new File("chapter11/read-write-file/src/main/resources/output/data.txt");

    var dataList = List.of("Down to the wire" ,

    "I wanted water but" ,

    "I''ll walk through the fire" ,

    "If this is what it takes");

    try (FileOutputStream output = new FileOutputStream(file)){

    dataList.forEach(entry -> {

    try {

    output.write(entry.getBytes());

    output.write("\n".getBytes());

    } catch (IOException e) {

    log.info("Something went wrong! ", e);

    }

    });

    output.flush();

    } catch (FileNotFoundException e) {

    log.info("Something went wrong! ", e);

    } catch (IOException e) {

    e.printStackTrace();

    }

    }

    }

    Listing 11-27

    Writing a List to a File Using FileOutputStream

    ```


    The `OutputStream` family class is used for writing streams of bytes that represent
    raw data, unreadable by users directly, such as the ones contained in binary files
    like images, media, PDFs, and so on. For example, the code in Listing [11-28](#463938_3_En_11_Chapter.xhtml#PC53)
    makes a copy of an image using `FileInputStream` to read it and `FileOutputStream`
    to write it.


    ```

    package com.apress.bgn.eleven.io;

    import java.io.*;

    // other import statements missing

    public class DuplicateImageDemo {

    private static final Logger LOGGER = LoggerFactory.getLogger(DuplicateImageDemo.class);

    void main() {

    final String inDir = "chapter11/read-write-file/src/main/resources/input/";

    final String outDir = "chapter11/read-write-file/src/main/resources/output/";

    File src = new File(inDir + "the-beach.jpg");

    File dest = new File(outDir + "copy-the-beach.jpg");

    try(FileInputStream fis = new FileInputStream(src);

    FileOutputStream fos = new FileOutputStream(dest)) {

    int content;

    while ((content = fis.read()) != -1) {

    fos.write(content);

    }

    } catch (Exception e) {

    LOGGER.debug("Image could not be copied! ", e);

    }

    }

    }

    Listing 11-28

    Making a Copy of an Image File Using FileOutputStream

    ```


    However, writing code like this is no longer necessary, thanks to the introduction
    of the `Files.copy(src.toPath(), dest.toPath())` method in Java 7.


    In Java 11, the `OutputStream` was enriched with the `nullOutputStream()` method,
    which returns an `OutputStream` instance that does nothing. This was requested
    by developers for testing purposes.


    ## Using Java NIO to Manage Files


    The `java.nio` package was introduced at the beginning of the chapter in conjunction
    with the `java.io` package. Most classes and methods we have used up to this section
    of this book were part of the `java.io` package and blocked the main thread while
    the data was read/written. The utility classes `java.nio.file.Paths` and `java.nio.file.Files`
    introduced in the previous section contain methods that make use of classes in
    the `java.nio` package as well as in the `java.io` package. It is time to show
    you how to manipulate files using `java.nio` classes as well.


    Manipulating a file using `java.nio` requires an instance of `java.nio.channels.FileChannel`.
    This a special class that describes a channel for reading, writing, mapping, and
    manipulating a file. A `FileChannel` instance is connected to a file and holds
    a position within a file that can be queried and modified.


    To read data from a file using a `FileChannel` instance, the following are needed:


    - A file handler instance

    - A `FileInputStream` instance the channel is based on

    - A `FileChannel` instance

    - A `java.nio.Buffer` instance


    Being nonblocking, a thread can ask a channel to read data from a buffer and then
    do other things until the data is available. Java NIO’s buffers allow moving back
    and forth in the buffer as needed. The data is read into a buffer and cached there
    until it is processed. There are buffer implementations for all primitive types
    in the `java.nio` package and, depending on the purpose of the data, you can use
    any of them. Listing [11-29](#463938_3_En_11_Chapter.xhtml#PC54) shows how to
    read data from a file into a `ByteBuffer`. Since the `ByteBuffer` can be instantiated
    with an initial size, by configuring the `ByteBuffer` capacity in bytes to be
    the same as the file size, the file can be read in one go.


    ```

    package com.apress.bgn.eleven.nio;

    import java.nio.ByteBuffer;

    import java.nio.channels.FileChannel;

    // other import statements omitted

    public class ChannelDemo {

    private static final Logger LOGGER = LoggerFactory.getLogger(ChannelDemo.class);

    void main() {

    var sb = new StringBuilder();

    final String inDir = "chapter11/read-write-file/src/main/resources/input/";

    try (FileInputStream is = new FileInputStream(new File(inDir + "data.txt"));

    FileChannel inChannel = is.getChannel()) {

    long fileSize = inChannel.size();

    ByteBuffer buffer = ByteBuffer.allocate((int) fileSize);

    inChannel.read(buffer);

    buffer.flip();

    while (buffer.hasRemaining()) {

    sb.append((char) buffer.get());

    }

    } catch (IOException e) {

    LOGGER.debug("File could not be read! ", e);

    }

    LOGGER.info("Read with FileChannel [1]--> {}", sb);

    }

    }

    Listing 11-29

    Reading a File Using FileChannel Using a ByteBuffer

    ```


    The method `getChannel()` returns the unique `FileChannel` object associated with
    this file input stream. The most important statement in Listing [11-29](#463938_3_En_11_Chapter.xhtml#PC54)
    is the `buffer.flip()` call. Calling this method *flips the buffer*, meaning that
    a buffer is switched from writing mode to reading mode. Initially this means that
    the channel is the able to write data in the buffer because it is in writing mode,
    but after the buffer is full, the buffer is switched to reading mode, so the main
    thread can read its contents.


    After reading the contents of a buffer, if there is a need to do it again, the
    `buffer.rewind()` method sets the position to zero.


    If the file is big, the `ByteBuffer` can be reinitialized multiple times, but
    in this case the buffer must be cleared before new data is written by the channel,
    and this can be done by calling `buffer.close()`. Also, using a `FileInputStream`
    to obtain a channel is not the correct way to do it, since it limits it to reading
    from the file. But a channel can both read and write from a file, so the recommended
    way is to use a `java.io.RandomAccessFile` instance as a file handler, as depicted
    in Listing [11-30](#463938_3_En_11_Chapter.xhtml#PC55).'
