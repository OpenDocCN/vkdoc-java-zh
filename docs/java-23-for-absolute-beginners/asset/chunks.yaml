    ### `getAbsolutePath`


    `getAbsolutePath()` 方法返回文件或目录的绝对路径名。在创建文件处理器时，并不总是需要绝对路径名，但如果你稍后在代码中需要使用它，或者需要确保相对路径被正确解析，这个方法正是你所需要的。以下代码片段通过使用相对于项目根目录（在本例中为
    `java-17-for-absolute-beginners` 目录）的路径，为 `resources` 目录中的一个文件创建了一个文件处理器：


    ```

    var d = new File("chapter11/read-write-file/src/main/resources/input/");

    ```


    `getAbsolutePath()` 方法返回完整的路径名，日志语句会将其打印为：


    ```

    INFO  c.a.b.e.Main - Location :/[workspace]/java-17-for-absolute-beginners/chapter11/read-write-file/src/main/resources/input

    ```


    Java 的 `File` 类功能相当强大；它可以用来指向另一台计算机上的共享文件。为此有一个特殊的构造函数，它接收一个 `java.net.URI` 类型的参数，其中
    `URI` 代表**统一资源标识符**。要测试这个构造函数，请在你的计算机上选择一个文本文件，并在网页浏览器中打开它，这样你就可以从浏览器地址栏获取它的 URI。清单
    11-2 中的代码展示了使用本地 URI 实例化 `File` 类。


    ```

    package com.apress.bgn.eleven;

    import java.net.URI;

    import java.net.URISyntaxException;

    // 其他导入和包装代码已省略

    try {

    var localUri = new URI("file:///[workspace]/java-17-for-absolute-beginners/README.adoc");

    var localFile =  new File (localUri);

    printFileStats(localFile);

    } catch (URISyntaxException use) {

    LOGGER.error("URI 格式错误，该路径下没有文件", use);

    }

    清单 11-2

    使用 URI 打印文件详情

    ```


    URI 可能不正确，例如前缀不正确或包含错误的路径，因此 URI 构造函数被声明为会抛出 `java.net.URISyntaxException`。这是一个受检异常，所以你编写的代码必须处理它。在使用
    URI 创建文件处理器的情况下，`getAbsolutePath()` 方法会返回文件所在计算机和驱动器上的绝对路径名。


    注意


    `file:///` 协议在 macOS（及其他操作系统）中用于以 URL 格式指定文件路径。这允许应用程序和网页浏览器直接从文件系统访问文件。只要将 `[workspace]`
    替换为真实路径，它在 Windows 上也能正常工作。


    信息


    由于清单 11-1 和 11-2 都对同一个文件调用了 `printFileStats(..)`，因此控制台输出是相同的。欢迎亲自尝试运行代码。


    ### `getParent`、`getName`、`length`、`isHidden`、`canRead` 和 `canWrite`


    由于这些方法每个都没有太多可说的，我将它们归并到本节中。以下是简要总结：


    *   `getParent()` 返回包含该文件的目录的绝对路径，因为在层级结构上，文件不能将另一个文件作为父级。


    *   `getName()` 返回文件名。文件名包含扩展名，即 `"."` 之后的部分，用于指示文件类型及其预期用途。


    *   `length()` 返回文件的字节长度。此方法不适用于目录，因为目录可能包含对执行程序的用户受限的文件，并且可能会抛出异常。因此，如果你需要获取目录的大小，必须自己编写代码。


    *   `isHidden()` 如果文件对当前用户不可见，则返回 `true`，否则返回 `false`。在 macOS/Linux 系统上，以 `"."`
    开头的文件是隐藏的，所以如果我们想看到该方法返回 `true`，必须为其中一个系统配置文件（例如 `.gitconfig`）创建一个处理器。因此，在使用指向隐藏文件的路径名创建的文件处理器上调用
    `printFileStats(..)` 方法，将产生类似于清单 11-3 的输出。


    *   `canRead()` 和 `canWrite()` 的含义显而易见，因为文件可以对普通用户进行安全保护。当用户对文件拥有特定权限时，这两个方法都返回
    `true`，否则返回 `false`。


    ```

    INFO  c.a.b.e.Main - 文件详情:

    INFO  c.a.b.e.Main - 类型 : 文件

    INFO  c.a.b.e.Main - 位置 :/Users/[userDir]/.gitconfig

    INFO  c.a.b.e.Main - 父目录 :/Users/[userDir]

    INFO  c.a.b.e.Main - 名称 : .gitconfig

    INFO  c.a.b.e.Main - 大小 : 3.865234375

    INFO  c.a.b.e.Main - 是否隐藏 : true

    INFO  c.a.b.e.Main - 是否可读? : true

    INFO  c.a.b.e.Main - 是否可写? : true

    清单 11-3

    打印隐藏文件的文件详情

    ```


    ### 处理目录：`list()` 和 `listFiles()`


    可以为指向目录的路径名创建文件处理器，这意味着存在一些仅适用于目录的可调用方法。对目录最常见的操作是列出其内容。`list()` 方法返回一个 `String`
    数组，其中包含此目录下的文件（和目录）名称。使用 lambda 表达式可以非常实用地打印目录中的项目：


    ```

    var d = new File("/[workspace]/java-17-for-absolute-beginners");

    Arrays.stream(Objects.requireNonNull(d.list())).forEach(ff -> LOGGER.info("\t
    文件名 : {}", ff));

    ```


    在大多数情况下，文件名并不是很有用；拥有一个包含每个文件处理器的 `File` 数组会更好。这就是为什么在 1.2 版本中添加了 `listFiles()`
    方法：


    ```

    Arrays.stream(Objects.requireNonNull(d.listFiles())).forEach(ff -> LOGGER.info("\t
    文件 : {}", ff.getAbsolutePath()));

    ```


    此方法有不止一种形式，因为它可以用来过滤文件，并在使用 `FileFilter` 实例调用时，仅返回符合特定要求的文件或目录的文件处理器。清单 11-4 中的代码示例过滤了目录下的条目，并仅保留名称以
    `chapter` 开头的目录。


    ```

    package com.apress.bgn.eleven.io;

    import java.io.File;

    import java.io.FileFilter;

    // 其他导入和包装代码已省略

    var d = new File("/[workspace]/java-17-for-absolute-beginners");

    Arrays.stream(d.listFiles(new FileFilter() {

    @Override

    public boolean accept(File childFile) {

    return childFile.isDirectory() && childFile.getName().startsWith("chapter");

    }

    })).forEach(ff -> LOGGER.info("章节源码 : {}", ff.getName()));

    清单 11-4

    使用 FileFilter 实例过滤目录内容

    ```


    清单 11-4 以展开形式编写，以便清楚地表明你应该为 `accept(..)` 方法提供一个具体实现。通过如下使用 lambda 表达式，前面的代码可以简化，甚至更不容易抛出异常：


    ```

    Arrays.stream(

    Objects.requireNonNull(d.listFiles(

    childFile -> childFile.isDirectory() && childFile.getName().startsWith("chapter")))

    ).forEach(ff -> LOGGER.info("章节源码 : {}", ff.getName())

    );

    ```


    在清单 11-4 中，我们实现了 `accept(..)` 方法来按文件类型和名称进行过滤，但过滤器可以涉及任何条件。当你需要的过滤器严格涉及文件名时，可以使用该方法的另一个版本，它接收一个
    `FilenameFilter` 实例作为参数：


    ```

    Arrays.stream(Objects.requireNonNull(d.listFiles(new FilenameFilter() {

    @Override

    public boolean accept(File dir, String name) {

    return name.startsWith("chapter");

    }

    }))).forEach(ff -> LOGGER.info("\t 章节目录 : {}", ff.getAbsolutePath()));

    ```

