    ### try/catch 块


    既然我们在讨论异常，`try/catch` 块可以补充一个 `finally` 块。`finally` 块中的内容几乎总是会被执行。如果异常与 `catch`
    块中声明的任何类型都不匹配（是的，一个 `catch` 块中可以声明多种类型，本书后面会讨论），异常会被进一步抛出，但 `finally` 块仍然会被执行。如果方法正常返回，`finally`
    块也会被执行。`finally` 块唯一不执行的情况是程序因错误而终止。


