    ```

    package com.apress.bgn.twelve.jdkstreams;

    public class ReactiveDemo {

    void main() {

    var publisher = new IntPublisher(0);

    var filterCharProcessor = new FilterCharProcessor();

    var transformerProcessor = new TransformerProcessor();

    var mappingProcessor = new MappingProcessor(element -> (char) element.intValue());

    var charPrinter = new CharPrinter();

    publisher.subscribe(filterCharProcessor);

    filterCharProcessor.subscribe(transformerProcessor);

    transformerProcessor.subscribe(mappingProcessor);

    mappingProcessor.subscribe(charPrinter);

    publisher.start();

    }

    }

    代码清单 12-12

    响应式管道完整实现

    ```


    如果`subscribe(..)`方法能返回调用者实例，以便我们可以链式调用`subscribe(..)`，那将非常方便，但我们只能使用现有提供的功能。当运行代码清单[12-12](#463938_3_En_12_Chapter.xhtml#PC12)中的代码时，控制台会打印出类似于代码清单[12-13](#463938_3_En_12_Chapter.xhtml#PC13)所示的日志。


    ```

    ...

    INFO  c.a.b.t.j.CharPrinter - Result: `

    INFO  c.a.b.t.j.CharPrinter - Result: I

    DEBUG c.a.b.t.j.FilterCharProcessor - Element 128 discarded.

    INFO  c.a.b.t.j.CharPrinter - Result: Z

    INFO  c.a.b.t.j.CharPrinter - Result: \

    INFO  c.a.b.t.j.CharPrinter - Result: %

    DEBUG c.a.b.t.j.FilterCharProcessor - Element 147 discarded.

    INFO  c.a.b.t.j.CharPrinter - Result: _

    DEBUG c.a.b.t.j.FilterCharProcessor - Element 137 discarded.

    ...

    代码清单 12-13

    响应式流执行的控制台输出

    ```


    前面在代码清单[12-2](#463938_3_En_12_Chapter.xhtml#PC2)中给出的示例使用了一个无限的`IntStream`来生成要发布、处理和消费的元素。这会导致程序永远运行，因此你必须手动停止它。另一个后果是`onComplete()`方法永远不会被调用。如果我们想使用它，必须通过使用非零值初始化`IntPublisher`来确保发布的项目数量是有限的。


    另外需要提及的是，背压处理更多是概念性的。响应式流`Flow` API 不提供任何机制来发出背压信号或处理背压。因此，`subscription.request(1)`只是确保当调用`onNext(..)`时，元素生成速率降低到1。可以根据订阅者的微调设计各种策略来处理背压，但在一个不涉及两个微服务响应式交互的基本示例中展示这样的内容颇具挑战性。


    即使在2024年9月17日发布的JDK 23版本中，对响应式流的支持也相当薄弱。原本期望在未来的版本中会添加更多有用的类。然而，Oracle显然专注于其他方面，如虚拟线程、结构化并发和类文件API、重组模块结构，以及决定如何更好地通过JDK的使用实现盈利。这就是为什么本章最后一节将介绍一个使用Project
    Reactor库进行响应式编程的简短示例。'
  raw: 'The next processor implementation is the one that transforms smaller letters
    into big letters by subtracting 32\. It can be easily implemented by extending
    `AbstractProcessor<Integer, T>` as well, and the implementation is depicted in
    Listing [12-7](#463938_3_En_12_Chapter.xhtml#PC7).


    ```

    package com.apress.bgn.twelve.jdkstreams;

    public class TransformerProcessor extends AbstractProcessor{

    @Override

    public void onNext(Integer element) {

    if(element % 2 == 0 && element >=98 && element <=122) {

    element -=32;

    }

    submit(element);

    subscription.request(1);

    }

    }

    Listing 12-7

    The TransformerProcessor Implementation

    ```


    To plug in this processor in the flow, we just need to instantiate it and call
    the `filterCharProcessor.subscribe(..)` and provide this instance as an argument.
    Listing [12-8](#463938_3_En_12_Chapter.xhtml#PC8) shows the next step in creating
    our reactive flow.


    ```

    package com.apress.bgn.twelve.jdkstreams;

    public class ReactiveDemo {

    void main() {

    var publisher = new IntPublisher(0);

    var filterCharProcessor = new FilterCharProcessor();

    var transformerProcessor = new TransformerProcessor();

    // some code omitted

    publisher.subscribe(filterCharProcessor);

    filterCharProcessor.subscribe(transformerProcessor);

    // some code omitted

    publisher.start();

    }

    }

    Listing 12-8

    A TransformerProcessor Instance Being Added to a Reactive Flow

    ```


    The next processor to implement is the final processor that we need for this solution
    and is the one that converts an `Integer` value to a `String` value. To keep the
    implementation as declarative as possible, the processor will be provided in the
    mapping function as an argument. The code is shown in Listing [12-9](#463938_3_En_12_Chapter.xhtml#PC9).


    ```

    package com.apress.bgn.twelve.jdkstreams;

    import java.util.function.Function;

    public class MappingProcessor extends AbstractProcessor {

    private final Function function;

    public MappingProcessor(Function function) {

    this.function = function;

    }

    @Override

    public void onNext(Integer element) {

    submit(function.apply(element));

    subscription.request(1);

    }

    }

    Listing 12-9

    The MappingProcessor Implementation

    ```


    In Listing [12-10](#463938_3_En_12_Chapter.xhtml#PC10), you can see a `MappingProcessor`
    instance being added to the reactive flow.


    ```

    package com.apress.bgn.twelve.jdkstreams;

    public class ReactiveDemo {

    void main() {

    var publisher = new IntPublisher(0);

    var filterCharProcessor = new FilterCharProcessor();

    var transformerProcessor = new TransformerProcessor();

    var mappingProcessor = new MappingProcessor(element -> (char) element.intValue());

    // some code omitted

    publisher.subscribe(filterCharProcessor);

    filterCharProcessor.subscribe(transformerProcessor);

    transformerProcessor.subscribe(mappingProcessor);

    // some code omitted

    publisher.start();

    }

    }

    Listing 12-10

    A MappingProcessor Instance Being Added to a Reactive Flow

    ```


    The last component of this flow is the subscriber. The subscriber is the most
    important component in a flow—until a subscriber is added to the flow and a `Subscription`
    instance is created, nothing actually happens. Our subscriber implements the `Flow.Subscriber<Character>`
    and most of it is identical to the code we’ve isolated in the `AbstractProcessor<T>`,
    which might look a little bit redundant, but makes things very easy as well. Listing
    [12-11](#463938_3_En_12_Chapter.xhtml#PC11) depicts the `Subscriber` implementation.


    ```

    package com.apress.bgn.twelve.jdkstreams;

    // some import statements omitted

    import java.util.concurrent.Flow;

    public class CharPrinter  implements Flow.Subscriber {

    private static final Logger LOGGER = LoggerFactory.getLogger(CharPrinter.class);

    private Flow.Subscription subscription;

    @Override

    public void onSubscribe(Flow.Subscription subscription) {

    if (this.subscription == null) {

    this.subscription = subscription;

    this.subscription.request(1);

    } else {

    subscription.cancel();

    }

    }

    @Override

    public void onNext(Character element) {

    LOGGER.info("Result: {}", element);

    //apply back-pressure again

    subscription.request(1);

    }

    @Override

    public void onError(Throwable throwable) {

    LOGGER.error("Something went wrong.", throwable);

    }

    @Override

    public void onComplete() {

    LOGGER.info("Printing complete.");

    }

    }

    Listing 12-11

    Subscriber Implementation

    ```


    Using this subscriber class, the flow can now be completed like shown in Listing
    [12-12](#463938_3_En_12_Chapter.xhtml#PC12).


    ```

    package com.apress.bgn.twelve.jdkstreams;

    public class ReactiveDemo {

    void main() {

    var publisher = new IntPublisher(0);

    var filterCharProcessor = new FilterCharProcessor();

    var transformerProcessor = new TransformerProcessor();

    var mappingProcessor = new MappingProcessor(element -> (char) element.intValue());

    var charPrinter = new CharPrinter();

    publisher.subscribe(filterCharProcessor);

    filterCharProcessor.subscribe(transformerProcessor);

    transformerProcessor.subscribe(mappingProcessor);

    mappingProcessor.subscribe(charPrinter);

    publisher.start();

    }

    }

    Listing 12-12

    Reactive Pipeline Complete Implementation

    ```


    It would be nice if the `subscribe(..)` method would return the caller instance,
    so that we could chain the `subscribe(..)` calls, but we’ll work with what is
    provided for us. When the code in Listing [12-12](#463938_3_En_12_Chapter.xhtml#PC12)
    is run, a log similar to the one depicted in Listing [12-13](#463938_3_En_12_Chapter.xhtml#PC13)
    is printed in the console.


    ```

    ...

    INFO  c.a.b.t.j.CharPrinter - Result: `

    INFO  c.a.b.t.j.CharPrinter - Result: I

    DEBUG c.a.b.t.j.FilterCharProcessor - Element 128 discarded.

    INFO  c.a.b.t.j.CharPrinter - Result: Z

    INFO  c.a.b.t.j.CharPrinter - Result: \

    INFO  c.a.b.t.j.CharPrinter - Result: %

    DEBUG c.a.b.t.j.FilterCharProcessor - Element 147 discarded.

    INFO  c.a.b.t.j.CharPrinter - Result: _

    DEBUG c.a.b.t.j.FilterCharProcessor - Element 137 discarded.

    ...

    Listing 12-13

    Console Output of a Reactive Flow Being Executed

    ```


    The earlier example presented in Listing [12-2](#463938_3_En_12_Chapter.xhtml#PC2)
    uses an infinite `IntStream` to generate elements to be published, processed,
    and consumed. This leads to the execution program running forever, so you will
    have to stop it manually. Another consequence of this is that the `onComplete()`
    method will never be called. If we want to use it, we must make sure the number
    of items being published is finite by initializing the `IntPublisher` with a value
    different from 0.


    Another thing to mention is that back-pressure handling is done more in a conceptual
    way. The Reactive Streams Flow API doesn’t provide any mechanism to signal about
    back pressure or to deal with it. So the `subscription.request(1)` just makes
    sure that when `onNext(..)` is called, the element-producing rate is reduced to
    one. Various strategies can be devised to deal with back pressure based on the
    fine-tuning of the subscriber, but it is challenging to show something like this
    in a basic example that does not involve two microservices reactively interacting
    with each other.


    Support for reactive streams is quite thin in the JDK, even in version 23, released
    on September 17, 2024\. It was expected that more useful classes would be added
    in future versions. However, apparently Oracle is focused on other aspects, like
    virtual threads, structured concurrency and Class-File API, reorganizing the module
    structure, and deciding how to better monetize usage of the JDK. That is why the
    last section of this chapter covers a short example of reactive programming done
    with the Project Reactor library.'
