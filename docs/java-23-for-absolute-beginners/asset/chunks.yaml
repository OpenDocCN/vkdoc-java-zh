  raw: 'The `RuntimeException` class is the superclass of exceptions that are thrown
    during the execution of the program, so the possibility of them being thrown is
    not known when the code is written. Consider the code sample in Listing [4-60](#463938_3_En_4_Chapter.xhtml#PC60).


    ```

    package com.apress.bgn.four.exceptions;

    import com.apress.bgn.four.hierarchy.Performer;

    public class AnotherExceptionsDemo {

    public static void main(String... args) {

    Performer p = PerformerGenerator.get("Bryce");

    System.out.println("TTL: " + p.getTimeToLive());

    }

    }

    Listing 4-60

    Code Sample That Might Throw an Exception

    ```


    Let’s suppose we do not have access to the code of the `PerformerGenerator` class,
    so we cannot see its code. We just know that calling the `get(..)` method with
    a name is supposed to return a `Performer` instance. So we write the code in Listing
    [4-60](#463938_3_En_4_Chapter.xhtml#PC60) and try to print the performer’s time
    to live. What will happen if the `p` variable is not actually initialized with
    a proper object, because the `get("John")` call returns null? The outcome is depicted
    in Listing [4-61](#463938_3_En_4_Chapter.xhtml#PC61).


    ```

    Exception in thread"main"java.lang.NullPointerException:

    Cannot invoke"com.apress.bgn.four.hierarchy.Performer.getTimeToLive()"

    because "p" is null at chapter.four @3.0-SNAPSHOT/com.apress.bgn.four.exceptions.AnotherExceptionsDemo.main(AnotherExceptionsDemo.java:40)

    Listing 4-61

    Console Output of AnotherExceptionsDemo Execution

    ```


    As you can see, the exception message telling you what is wrong is really explicit.
    More precise `NullPointerExceptions` messages are a feature introduced in Java
    17.


    Being smart developers, or a little paranoid, we’ll prepare for this case. Depending
    on the requirements of the application, we can do any of the following three things.


    ### Catch the exception, print an appropriate message, and exit the application


    Catching an exception is done using a `try/catch` block. The syntax is pretty
    simple, and the behavior can be explained as follows: the JVM tries to execute
    the statements in the `try` block; if an exception is thrown that matches the
    type in the `catch` block declaration, the code in this block is executed. This
    is recommended when the rest of the code cannot be executed without a `Performer`
    instance, as depicted in Listing [4-62](#463938_3_En_4_Chapter.xhtml#PC62).


    ```

    package com.apress.bgn.four.exceptions;

    import com.apress.bgn.four.hierarchy.Performer;

    public class AnotherExceptionsDemo {

    public static void main(String... args) {

    Performer p = PerformerGenerator.get("Bryce");

    try {

    System.out.println("TTL: " + p.getTimeToLive());

    } catch (Exception e) {

    System.out.println("The performer was not initialized properly because of: " +
    e.getMessage());

    }

    }

    }

    Listing 4-62

    AnotherExceptionsDemo Version with Exception Handling Code

    ```


    The exception that was thrown here is of type `NullPointerException`, a class
    that extends `RuntimeException`, so a `try/catch` block is not mandatory. This
    type of exception is called an **unchecked exception** because the developer is
    not obligated to check for them. They are thrown during the execution of an application,
    and thus they are **runtime exceptions**. This means the compiler is not aware
    of the possibility of their being thrown and is not forcing the developer to write
    code to handle them.


    Caution


    The `NullPointerException` is the exception type Java beginner developers struggle
    with a lot because they do not have the *paranoia sense* developed well enough
    to always test objects with unknown origin before using them.


    ### Throw an appropriate exception type


    This option is suitable when there is a different class calling the problematic
    code, and that class will handle the exception appropriately, as depicted in Listing
    [4-63](#463938_3_En_4_Chapter.xhtml#PC63).


    ```

    package com.apress.bgn.four.exceptions;

    import com.apress.bgn.four.hierarchy.Performer;

    public class ExtraCallerExceptionsDemo {

    public static void main(String... args) {

    Caller caller = new Caller();

    try {

    caller.printTTL("Bryce");

    } catch (EmptyPerformerException e) {

    System.out.println(e.getMessage());

    }

    }

    }

    class Caller {

    public void printTTL(String name) throws EmptyPerformerException {

    try {

    Performer p = PerformerGenerator.get(name);

    System.out.println("TTL: " + p.getTimeToLive());

    } catch (Exception e) {

    throw new EmptyPerformerException("There is no performer named " + name, e);  //
    wrapping happens here

    }

    }

    }

    class EmptyPerformerException extends Exception {

    public EmptyPerformerException(String message, Throwable cause) {

    super(message, cause);

    }

    }

    Listing 4-63

    Code Sample That Wraps the Exception into a Custom Exception Type

    ```


    Notice the `EmptyPerformerException` class. It is a simple custom class that extends
    the `java.lang.Exception` class, thus making it a checked exception. Checked exceptions
    are declared as explicitly being thrown by a method, as you can see in the first
    bold line in the code. In this case, when invoking that method, the compiler will
    force the developer to treat that exception or throw it forward. If the `printTTL(..)`
    method were to be declared without the `throws EmptyPerformerException` snippet,
    a compile-time error would be thrown and the code would not be executed. IntelliJ
    IDEA, being a very smart editor and using the JVM compiler to verify your code,
    will notify you that something is not okay in your code by underlining it with
    a red line. This situation is depicted in Figure [4-16](#463938_3_En_4_Chapter.xhtml#Fig16),
    where the `throws EmptyPerformerException` was commented to show the compiler
    being totally not okay with the situation.


    ![](images/463938_3_En_4_Chapter/463938_3_En_4_Fig16_HTML.jpg)


    Figure 4-16


    Compile errors caused by checked exception not being declared as being thrown
    by the `printTTL(..)` method


    Also, in the `main(..)` method, a `try/catch` block is required to catch and treat
    this type of exception, as shown in Listing [4-63](#463938_3_En_4_Chapter.xhtml#PC63).
    Or the `main(..)` method must be declared with `throws EmptyPerformerException`,
    to be allowed to pass the exception further, in this case to the JVM.


    Tip 


    You can think of exceptions as being like the CO[2] bubbles in a frizzy drink:
    they tend to float up to the surface if not stopped by a filter. In Java the surface
    is represented by the JVM running the application. When the JVM encounters an
    exception, it stops running the application.


    Notice in the line creating the `EmptyPerformerException` object that the original
    exception is provided as an argument, as per the constructor declaration. This
    is done so its message is not lost and can be used to debug the unexpected situation,
    since it will point directly to the problematic line.'
