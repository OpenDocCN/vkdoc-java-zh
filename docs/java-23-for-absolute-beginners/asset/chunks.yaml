    当你拿到这个文件后，可以打开它并开始分析其内容，但由于 IntelliJ IDEA 可能无法打开如此大的文件，请尝试使用专门的文本编辑器（如 Notepad++
    或 Sublime）打开。或者，如果你使用的是 Unix/Linux 操作系统，只需打开控制台并使用 `grep` 命令，如下所示：


    ```

    grep -a ''seconds'' gc.log

    ```


    这将显示调用 `finalize()` 方法时打印的所有日志条目。然后你可以选择一个实例的名称，并执行类似以下的操作：


    ```

    ❯ grep -a ''Fmsnwrtbuldmnjs'' gc.log

    INFO  c.a.b.t.InfiniteSingerGenerator - JVM created: Fmsnwrtbuldmnjs

    INFO  c.a.b.t.Singer - GC Destroyed: Fmsnwrtbuldmnjs after 1 seconds

    ```


    如你所见，`Singer` 实例从堆中被删除所需的时间各不相同，这是因为 GC 是随机调用的；开发者无法控制它。有一种方法可以显式请求执行垃圾回收……嗯，有两种方法。你可以调用
    `System.gc()` 或 `Runtime.getRuntime().gc()`。请注意，`System.gc()` 实际上会调用 `Runtime.getRuntime().gc()`。


    不过，这并不意味着 GC 会立即开始清理内存。这更像是向 JVM 建议，它应该努力回收未使用的对象并释放未使用的内存，因为这是必要的。


    现在，回到 `finalize()` 方法。前面提到，它在 Java 9 中被标记为已弃用。此方法旨在由处理堆外存储资源的类进行重写。这里最明显的例子是 I/O
    处理类，用于读取文件、URL 和数据库等资源。当运行应用程序中的任何活动线程都无法再访问某个对象时，JVM 会调用 `finalize()` 方法。这是为了确保这些资源已被释放，可供其他外部和不相关的程序使用。


    信息


    在旧版本的 Apache Tomcat（一个基于 Java 的 Web 服务器）中，Windows 上存在一个与资源释放相关的错误。当服务器崩溃或被强制停止时，它无法再次启动，因为其某些日志文件处理程序未能正确释放，新的服务器实例无法访问它们来开始写入新的日志条目*。（这是很久以前我在
    Windows 上使用 Apache Tomcat 时，根据个人经验观察到的。）*


    随着 JDK 7 中 `java.lang.AutoCloseable` 接口的引入，`finalize()` 方法的使用越来越少。前面已经提到了此方法的一些问题，但以下列表提供了更多背景信息：


    *   JVM 无法保证哪个线程会为任何给定对象调用此方法，因此任何有权访问该对象的线程都可以调用它，这可能导致在对象仍然需要时资源就被释放了。该方法是公开的，因此即使它本应仅由
    GC 线程调用，也可以在代码中显式调用它。


    *   如果 `finalize()` 的自定义实现不正确，它可能会抛出异常或无法正确释放资源。


    *   `finalize()` 方法应该只由 JVM 调用一次，但这无法得到保证。


    *   `finalize()` 调用不会自动链式调用，因此 `finalize()` 方法的自定义实现必须始终显式调用超类的 `finalize()` 方法。


    *   如前所述，一旦调用了 `finalize()`，就无法阻止该方法执行或撤销其效果，因此你基本上会留下一个指向不再存在的对象的引用。


    *   你可能已经意识到，在实现此方法时，开发者拥有很大的自由度，这意味着存在很大的出错空间。


    这个列表总结了为什么 Java 中的终结机制存在缺陷，并在 JDK 9 中被弃用以阻止其使用。不正确的 `finalize()` 实现可能导致以下任何情况：


    *   内存泄漏（内存内容未被丢弃）

    *   死锁（资源被两个进程阻塞）

    *   挂起（进程处于无法退出的等待状态）


    为了帮助进行内存管理，Java 9 中引入了 `java.lang.ref.Cleaner` 类。在深入探讨之前，我必须向你展示如何以编程方式检查内存的状态。'
- fmt: "### Heap Memory Statistics\n\nThe `Runtime` class is quite useful when trying\
    \ to interact with the internals of the JVM while a program is running. As previously\
    \ mentioned in this chapter, its `gc()` method can be called to suggest to the\
    \ JVM that the memory should be cleaned, and a few chapters ago we used methods\
    \ in this class to start processes from the Java code. There are three methods\
    \ in this class that are useful to see the status of the memory assigned to a\
    \ Java program:\n\n- `runtime.maxMemory()` returns the maximum amount of memory\
    \ the JVM will attempt to use for its heap, in case of need. The value returned\
    \ by this method varies from machine to machine and is set implicitly to a quarter\
    \ of the total existing RAM memory on the machine, unless it is set explicitly\
    \ by using the JVM option `-Xmx` followed by the amount of memory; for example,\
    \ `-Xmx8G` will allow the JVM to use a maximum of 8GB of memory.\n\n- `runtime.totalMemory()`\
    \ returns the total amount of memory of the JVM. The value returned by this method\
    \ also varies from machine to machine, and it is implementation-dependent unless\
    \ explicitly set by using the JVM option `-Xms` followed by the amount of memory;\
    \ for example, `-Xms1G` will tell the JVM that the initial size of its heap memory\
    \ should be 1GB of memory.\n\n- `runtime.freeMemory()` returns an approximation\
    \ of the amount of free memory for the Java Virtual Machine. Using the `runtime.totalMemory()`\
    \ and `runtime.freeMemory()` methods, we can write some code to check how much\
    \ of our memory is occupied at various times during the execution of the program.\
    \ For this a class named `MemAudit` is created that will use the current logger\
    \ to print memory values. The implementation of this class is shown in Listing\
    \ [13-11](#463938_3_En_13_Chapter.xhtml#PC15).\n\n```\npackage com.apress.bgn.thirteen.util;\n\
    import org.slf4j.Logger;\npublic class MemAudit {\nprivate static final long MEGABYTE\
    \ = 1024L * 1024L;\nprivate static final Runtime runtime = Runtime.getRuntime();\n\
    public static void printBusyMemory(Logger log) {\nlong memory = runtime.totalMemory()\
    \ - runtime.freeMemory();\nlog.info(\"Occupied memory: {} MB\", (memory / MEGABYTE));\n\
    }\npublic static void printTotalMemory(Logger log) {\nlog.info(\"Total Program\
    \ memory: {} MB\", (runtime.totalMemory()/MEGABYTE));\nlog.info(\"Max Program\
    \ memory: {} MB\", (runtime.maxMemory()/MEGABYTE));\n}\n}\nListing 13-11\nThe\
    \ MemAudit Class Showing Memory Statistics During the Execution of a Java Application\n\
    ```\n\nThe methods of this class will be called during the execution of our program,\
    \ as shown in Listing [13-12](#463938_3_En_13_Chapter.xhtml#PC16).\n\n```\npackage\
    \ com.apress.bgn.thirteen;\n// some imports omitted\nimport static com.apress.bgn.thirteen.util.MemAudit.*;\n\
    public class MemAuditDemo {\nprivate static final Logger LOGGER = LoggerFactory.getLogger(MemAuditDemo.class);\n\
    private static NameGenerator nameGenerator = new NameGenerator();\npublic static\
    \ void main(String... args) {\nprintTotalMemory(LOGGER);\nint count = 0;\nwhile\
    \ (true) {\ngenSinger();\ncount++;\nif (count % 1000 == 0) {\nprintBusyMemory(LOGGER);\n\
    }\n}\n}\nprivate static void genSinger() {\nSinger s = new Singer(nameGenerator.genName(),\
    \ RND.nextDouble(), LocalDate.now());\nLOGGER.info(\"JVM created: {}\", s.getName());\n\
    }\n}\nListing 13-12\nThe MemAuditDemo Class Using the Class in Listing 13-11 to\
    \ Print Memory Statistics in the Console\n```\n\nAfter we delete the old log file,\
    \ we should run this class and leave it running for a while. Since it will be\
    \ impossible again to see the output, this command\n\n```\ngrep -a 'memory' gc.log\n\
    ```\n\nis useful to extract all lines containing the word \"memory,\" and the\
    \ result should look quite similar to one in Listing [13-13](#463938_3_En_13_Chapter.xhtml#PC18).\n\
    \n```\n$  grep -a 'memory' gc.log\nINFO  c.a.b.t.MemAuditDemo - Total Program\
    \ memory: 260 MB # \nINFO  c.a.b.t.MemAuditDemo - Max Program memory: 4096 MB\
    \  # \nINFO  c.a.b.t.MemAuditDemo - Occupied memory: 21 MB       # \nINFO  c.a.b.t.MemAuditDemo\
    \ - Occupied memory: 7 MB        # \nINFO  c.a.b.t.MemAuditDemo - Occupied memory:\
    \ 12 MB\n...\nINFO  c.a.b.t.MemAuditDemo - Occupied memory: 98 MB\nINFO  c.a.b.t.MemAuditDemo\
    \ - Occupied memory: 104 MB\n...\nListing 13-13\nMemory Statistics Printed by\
    \ Methods in the MemAudit Class During Java Application Execution\n```\n\nThe\
    \ max memory is 4096MB, which means my machine has a total of 16GB of RAM, and\
    \ the occupied memory is tiny, not even close to the initial 260MB the JVM is\
    \ given to use. If we want to see real memory being occupied, we can modify the\
    \ `genSinger()` method to return the created references and add them to a list.\
    \ Since the `Singer` instances are referenced in the main class, the memory is\
    \ no longer emptied. The modifications mentioned previously are shown in Listing\
    \ [13-14](#463938_3_En_13_Chapter.xhtml#PC19).\n\n```\npackage com.apress.bgn.thirteen;\n\
    // some import statements omitted\nimport static com.apress.bgn.thirteen.util.MemAudit.*;\n\
    public class MemoryConsumptionDemo {\nprivate static final Logger LOGGER = LoggerFactory.getLogger(MemoryConsumptionDemo.class);\n\
