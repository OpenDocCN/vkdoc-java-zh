    # 10. 让应用程序具有交互性


    到目前为止，本书中 Java 程序的输入数据是通过在代码内部初始化的数组或变量，或者通过程序参数提供的。然而，在现实生活中，大多数应用程序需要与用户进行交互。可以通过输入用户名和密码来授予用户访问权限，有时用户需要输入详细信息来确认身份或指示应用程序执行操作。Java
    支持多种读取用户输入的方法。在本章中，我们将介绍几种构建交互式 Java 应用程序的方法，这些应用程序可以从多种来源获取输入。


    如前几章所述，`JShell` 是一个 Java 命令行界面（CLI）Shell，使开发者能够测试变量声明和单行语句。其他 CLI Shell（如 `bash`）和终端（如
    Windows 的命令提示符）可用于以连续文本行的形式向程序发出命令。


    ## 从命令行读取用户数据


    本节专门讨论如何从命令行读取用户输入，无论是 IntelliJ IDEA 控制台，还是从特定于操作系统的任何终端运行可执行 jar 文件。在 JDK 中，有两个类可用于从命令行读取用户数据：`java.util.Scanner`
    和 `java.io.Console`。本节将详细介绍这两个类。但首先，让我们从基础开始：使用 `System.in` 读取用户数据。'
