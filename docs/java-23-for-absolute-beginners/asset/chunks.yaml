  trans: '

    #### Java 21 线程新语法与虚拟线程


    在 Java 领域，常有人说 JVM 线程映射到操作系统线程。在代码中，当调用 `Thread` 对象的 `start()` 方法时，会创建一个**平台线程**并将其链接到操作系统线程。平台线程在其整个生命周期内始终与操作系统线程保持链接，这意味着
    Java 应用程序可用的线程数取决于可用的操作系统线程数，而操作系统线程数又取决于 CPU 架构。这意味着，创建多个执行大量工作的 Java 线程实际上可能会使
    CPU 过载并导致计算机死机，除非这些线程由线程池机制管理，如上一节**经典线程创建（Java 21 之前）**末尾所述。


    Java 21 不仅通过改进现有的线程创建代码，还通过引入**虚拟线程**来改进 Java 并发模型。虚拟线程不与操作系统线程链接。它们的代码在操作系统线程中执行，但通过一个管理**载体线程**的引擎来实现，该引擎确保当虚拟线程被阻塞时，操作系统线程可以被释放，直到虚拟线程可以恢复执行。因此，虚拟线程是轻量级线程，可显著减少编写、维护和观察高吞吐量并发应用程序的工作量。显然，它们旨在用于大多数时间处于阻塞状态（通常等待
    I/O 操作完成）的紧凑简单操作。因此，虚拟线程适用于需要大量并发任务的应用程序。


    在深入探讨虚拟线程的更多细节之前，我们先来看看创建平台线程的语法变化。上一节中的列表展示了如何扩展 `Thread` 类并实现 `Runnable` 接口来创建线程。清单
    5-53 展示了 Java 21 中引入的创建线程的新方法，即通过调用 `Thread.ofPlatform()` 来创建平台线程。


    ```

    package com.apress.bgn.five;

    public class MultipleUserThreadsJava21Demo {

    void main() {

    for (int i = 0; i < 10; ++i) {

    var rdt = new RandomDurationRunnable();

    Thread.ofPlatform().name("rdt " + i).start(rdt);

    }

    }

    }

    // 输出

    /*

    rdt 4 started...

    rdt 6 started...

    ...

    rdt 1 ended.

    redt 0 ended.

    ...

    */

    清单 5-53

    使用 Thread.ofPlatform() 创建并运行多个线程的代码示例

    ```


    由于 `RandomDurationRunnable` 实现包含非常简单的处理逻辑，因此它适合在虚拟线程中运行。将清单 5-53 中的代码改为创建虚拟线程，只需将
    `Thread.ofPlatform()` 替换为 `Thread.ofVirtual()`，如清单 5-54 所示。`java.lang.VirtualThread`
    类扩展了 `java.lang.Thread`，因此是用于编写旨在并行执行的 Java 代码的组件层次结构（见图 5-22）中的最新成员。


    ![](img/463938_3_En_5_Fig22_HTML.jpg)


    图 5-22

    线程类层次结构


    ```

    package com.apress.bgn.five;

    public class VirtualThreadsDemo {

    void main() {

    for (int i = 0; i < 1000; ++i) {

    var rdt = new RandomDurationRunnable();

    Thread.ofVirtual().name("rdt " + i).start(rdt);

    }

    }

    }

    清单 5-54

    使用 Thread.ofVirtual() 创建并运行多个线程的代码示例

    ```


    由于虚拟线程非常轻量级，因此可以创建并运行大量虚拟线程。请注意，`VirtualThreadsDemo` 创建并运行了 1000 个线程，并且以创纪录的速度完成。此外，虚拟线程允许以熟悉的、顺序的、每个请求一个线程的风格进行编程。顺序代码不仅更易于编写和阅读，而且更易于调试，因为我们可以使用调试器逐步跟踪程序流程，并且堆栈跟踪反映了预期的调用堆栈。由于这种编码风格，它们也更易于调试。


    重要提示


    虚拟线程是轻量级、短生命周期的，并且具有较浅的调用堆栈，因此无需对其进行池化。如果需要线程，直接创建一个即可。


    虚拟线程旨在模拟*单个任务*，而不是一种运行任务的机制。


    虚拟线程在阻塞时会透明地挂起/恢复。整个 JDK 中的阻塞 API 已经过改造，以支持虚拟线程。


    `Runnable` 实例可以替换为 lambda 表达式，并且 `Thread` 类中的其他方法可用于配置、创建和启动虚拟线程和平台线程。线程可以创建为未启动状态，并且可以在调用
    `start(..)` 方法时提供 `run()` 方法的主体。清单 5-55 展示了使用 Java 21 开始支持的语法创建、命名和启动平台线程与虚拟线程的几种方法。


    ```

    package com.apress.bgn.five;

    import static java.lang.System.out;

    public class NewTheadSyntax21Demo {

    void main() {

    // 操作系统线程

    Thread.ofPlatform()

    .name("Thread-P")

    .start(() -> out.println(" >> 你好，我是 " + Thread.currentThread().getName() + "，我是一个平台线程！"));

    // 虚拟线程

    Thread.startVirtualThread(() -> out.println(" >> 你好，我是 " + Thread.currentThread()+"，我是一个虚拟线程！"));

    // 使用 ''底层'' 的 VirtualThreadBuilder

    Thread.ofVirtual()

    .name("Thread-V1")

    .start(() -> out.println(" >> 你好，我是 " + Thread.currentThread().getName()+"，我也是一个虚拟线程！"));

    // 或者创建未启动的线程

    Thread vt = Thread.ofVirtual()

    .name("Thread-V2")

    .unstarted(() -> out.println(" >> 你好，我是 " +     Thread.currentThread().getName()+"，我也是一个虚拟线程！"));

    vt.start();

    try {

    Thread.sleep(2000); // 确保 ''main'' 线程最后完成执行

    } catch (InterruptedException _) {}

    }

    }

    // 输出

    /**

    >> 你好，我是 Thread-P，我是一个平台线程！

    >> 你好，我是 VirtualThread[#30]/runnable@ForkJoinPool-1-worker-1，我是一个虚拟线程！

    >> 你好，我是 Thread-V2，我也是一个虚拟线程！

    >> 你好，我是 Thread-V1，我也是一个虚拟线程！

    */

    清单 5-55

    Java 21 创建和启动平台线程与虚拟线程的语法

    ```


    注意


    请注意 `Thread.sleep(2000);` 语句，它暂停主线程以允许由其启动的线程完成执行。如果没有它，主线程可能会在其中一个线程启动或结束之前退出，从而无法打印其消息。可以随意注释掉该语句并多次运行程序。


    其中一个虚拟线程没有配置自定义名称，因此打印其名称不会产生任何结果。但是，我们可以使用 `Thread.currentThread()` 打印线程的字符串表示形式，它会输出
    `VirtualThread[#30]/runnable@ForkJoinPool-1-worker-1`。此输出由三部分组成：


    *   `VirtualThread[#30]`：标识正在执行的虚拟线程。


    *   `runnable`：标识用于创建线程的实例，在本例中是一个 `java.lang.Runnable` 实例。


    *   `@ForkJoinPool-1-worker-1`：标识虚拟线程在其上执行的载体线程。

