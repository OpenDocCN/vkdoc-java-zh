    #### 中间操作 `sorted` 与终端操作 `findFirst`


    顾名思义，`sorted()` 方法与排序有关：即元素排序。当在流上调用该方法时，它会创建一个新流，其中包含原始流的所有元素，但按自然顺序排序。如果流中元素的类型不可比较（即该类型未实现
    `java.lang.Comparable<T>`），则会抛出 `java.lang.ClassCastException`。由于我们将使用 `sorted()`
    来获取已排序元素的流，因此我们将使用 `findFirst()` 来获取流中的第一个元素。该方法返回一个 `Optional<T>` 实例，因为流可能为空，从而没有第一个元素。这意味着要获取值，必须调用
    `get()` 方法。对于流可能为空的情况，可以使用 `orElse(..)` 或 `orElseGet(..)` 方法，在缺少第一个元素时返回一个默认值。清单
    8-36 中的代码描述了这两种情况。


    ```

    package com.apress.bgn.eight;

    // 导入语句已省略

    public class MoreStreamsDemo {

    public static Function processDuration = song -> song.getDuration()/60;

    void main(){

    // 非空流，结果为 ''ever''

    List pieces = List.of("some","of", "us", "we''re", "hardly", "ever", "here");

    String first0 = pieces.stream().sorted().findFirst().get();

    out.println("排序后列表的第一个元素: " + first0);

    // 空流，结果为 ''none''

    pieces = List.of();

    String first1 = pieces.stream().sorted().findFirst().orElse("none");

    out.println("排序后列表的第一个元素: " + first1);

    }

    }

    清单 8-36

    提取有序流中的第一个元素

    ```


    #### 中间操作 `distinct` 与终端操作 `count`


    `distinct()` 方法接收一个流，并生成一个包含原始流中所有不同元素的新流。由于本书中的示例将中间操作和终端操作结合使用，我们使用 `count()`
    来统计流中的元素数量。清单 8-37 展示了一个小例子。


    ```

    package com.apress.bgn.eight;

    // 导入语句已省略

    public class MoreStreamsDemo {

    void main(){

    pieces = List.of("as","long", "as", "there", "is", "you", "there", "is", "me");

    long count = pieces.stream().distinct().count();

    out.println("流中的元素数量: " + count);

    }

    }

    // 输出

    // 流中的元素数量: 6

    清单 8-37

    移除重复元素后，统计流中的元素数量

    ```


    如清单 8-37 的输出所示，运行时，代码打印出 *流中的元素数量: 6*，因为在移除了 *as*、*there* 和 *is* 的重复项后，我们剩下六个词。如果初始流为空，`count()`
    方法返回 0（零）。


    #### 中间操作 `limit` 与终端操作 `min` 和 `max`


    本章前面曾使用 `limit(..)` 方法将无限流转换为有限流。因为 `limit(..)` 将一个流转换为另一个流，它显然是一个中间函数。本节介绍的终端方法模拟了两个数学函数：


    *   计算流中元素的最小值：`min(..)`

    *   计算流中元素的最大值：`max(..)`


    流中元素的类型必须实现 `java.util.Comparator<T>`；否则无法计算最小值和最大值。清单 8-38 展示了如何一起使用 `limit(..)`、`min(..)`
    和 `max(..)` 函数。


    ```

    package com.apress.bgn.eight;

    // 导入语句已省略

    public class MoreStreamsDemo {

    void main(){

    out.println("清单 8-38\. 计算流中的最大值和最小值。");

    Stream ints0 = Stream.of(5,2,7,9,8,1,12,7,2);

    ints0.limit(4).min(Integer::compareTo)

    .ifPresent(min -> out.println("最小值是: " + min));

    // 打印 "最小值是: 2"

    Stream ints1 = Stream.of(5,2,7,9,8,1,12,7,2);

    ints1.limit(4).max(Integer::compareTo)

    .ifPresent(max -> out.println("最大值是: " + max));

    // 打印 "最大值是: 9"

    }

    }

    清单 8-38

    计算流中的最大值和最小值

    ```


    #### 终端操作 **sum** 和 **reduce**


    考虑这样一个场景：我们有一个有限的 `Song` 值流，想要计算它们时长的总和。有两种流终止方法可用于此：`sum(..)` 方法和 `reduce(..)`
    方法。实现此功能的代码如清单 8-39 所示。


    ```

    package com.apress.bgn.eight;

    import com.apress.bgn.eight.util.Song;

    import com.apress.bgn.eight.util.StreamMediaLoader;

    import static java.lang.System.out;

    public class MediaStreamTester {

    void main(){

    var songs = StreamMediaLoader.loadSongs();

    Integer totalDuration0 = songs

    .mapToInt(Song::getDuration)

    .sum();

    out.println("总时长: " + totalDuration0);

    songs = StreamMediaLoader.loadSongs();

    Integer totalDuration1 = songs

    .mapToInt(Song::getDuration)

    .reduce(0, (a, b) -> a + b);

    out.println("总时长: " + totalDuration1);

    }

    }

    // 两条语句均输出

    // 总时长: 5466

    清单 8-39

    对流中的元素求和

    ```


    `reduce(..)` 操作的版本接受两个参数：


    *   **identity** 参数表示归约的初始结果，以及流中没有元素时的默认结果。

    *   **accumulator** 函数接受两个参数，操作应用于这两个参数以获取部分结果（在此例中，是对这两个元素进行加法运算）。


    `reduce(..)` 操作的累加器是 `java.util.function.BinaryOperator<T>` 的一个实例，它表示对两个相同类型的操作数执行操作，并生成与操作数相同类型的结果。在
    `IntStream` 实例上（例如由 `mapToInt(..)` 操作返回的实例），`reduce(..)` 操作的累加器是 `java.util.function.IntBinaryOperator`
    的一个实例，这是一个自定义函数，接受两个 `int` 参数并返回一个 `int` 结果。


    本质上，每次处理流中的一个元素时，累加器都会返回一个新值，在此例中，该值是已处理元素与先前部分结果相加的结果。如果处理的结果是一个集合，那么累加器的结果也是一个集合，因此每次处理流元素时，都会创建一个新集合。这效率相当低，因此在涉及集合的场景中，`collect(..)`
    操作更为合适。


    #### 中间操作 `peek`


    `peek()` 函数很特殊，因为它不会以任何方式影响流；它不会消费流元素。`peek()` 函数返回一个由调用它的流的元素组成的流，同时对其每个元素执行由其
    `Consumer<T>` 参数指定的操作。这意味着该函数可用于通过运行时打印信息的日志语句来调试流操作。


    让我们以 `Song` 实例流为例，根据时长过滤它们，选择所有时长 > 300 秒的歌曲，然后获取它们的标题并将其收集到一个列表中。实现此功能的代码如清单
    8-40 所示。


    ```

    package com.apress.bgn.eight;

    // 导入语句已省略

    public class MediaStreamTester {

    void main(){

    var songs = StreamMediaLoader.loadSongs();

    List result = songs.filter(s -> s.getDuration() > 300)

    .peek(e -> out.println("\t 过滤后的值: " + e))

    .map(Song::getTitle)

    .peek(e -> out.println("\t 映射后的值: " + e))

    .toList();

    }

    }

    清单 8-40

    在流元素上调用 peek(..)

    ```


    在清单 8-40 中，在 `map(..)` 调用之前，引入了一个 `peek(..)` 调用来检查过滤后的元素是否是我们期望的。之后又引入了另一个 `peek(..)`
    调用来检查映射后的值。

