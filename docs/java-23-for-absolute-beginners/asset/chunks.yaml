    with the goal of using it and sharing it. The traditional (and fading) way of
    organizing and storing information is to write it on paper and store the paper
    in organized file cabinets from which it can be retrieved when needed. Software
    applications do something similar: information is written in files, files are
    organized in directories, and in most situations data is stored in more complex
    structures named databases. Java provides classes to read information from files
