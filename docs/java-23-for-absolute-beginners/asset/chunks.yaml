  raw: 'Although virtual threads are not supposed to be pooled, a builder method was
    introduced in the `Executors` utility class that creates an `Executor` instance
    that starts a new virtual `thread` for each task, and the threads are put into
    an unbounded pool. This allows us to separate thread management and creation from
    the rest of the application if needed. Starting with Java 19, the `java.util.concurrent.ExecutorService`
    interface extends `java.lang.AutoCloseable` that models instances that hold on
    to a resource until its `close()` method is invoked. This is important because
    this means we can use the virtual thread executor in a construction referred to
    as **try-with-resources**. In **Chapter** [**4**](#463938_3_En_4_Chapter.xhtml)
    you were introduced to the exception data type, and in order to catch exceptions
    `try-catch-finally` blocks were used. `try-with-resources` wraps around instances
    that hold on to resources, to tell the JVM to release them at the end of the execution
    block, and if exceptions are thrown during the execution of the block, they can
    be caught too. Listing [5-56](#463938_3_En_5_Chapter.xhtml#PC95) shows an example
    of using `Executors.newVirtualThreadPerTaskExecutor()` to create an `ExecutorService`
    that manages a pool of virtual threads.


    ```

    package com.apress.bgn.five;

    import java.util.ArrayList;

    import java.util.concurrent.*;

    import java.util.random.RandomGenerator;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import static com.apress.bgn.five.VirtualThreadsExecutorDemo.log;

    public class VirtualThreadsExecutorDemo {

    public static final Logger log = LoggerFactory.getLogger(VirtualThreadsExecutorDemo.class);

    public static RandomGenerator RND = RandomGenerator.of("SecureRandom");

    void main() {

    try (ExecutorService executor = Executors.newVirtualThreadPerTaskExecutor()) {

    var tasks = new ArrayList();

    for (int i = 0; i  future : futures) {

    sum += future.get();

    }

    time = System.currentTimeMillis() - time;

    log.info(">> Virtual threads: sum = " + sum+ ", time = " + time + " ms");

    } catch (ExecutionException | InterruptedException e) {

    throw new RuntimeException("Failed to execute tasks", e);

    }

    }

    }

    class MyTask implements Callable {

    @Override

    public Integer call() {

    var pause = VirtualThreadsExecutorDemo.RND.nextInt(0, 1000);

    log.info("Thread.currentThread()} produces " + pause);

    return pause;

    }

    }

    Listing 5-56

    Using Executors.newVirtualThreadPerTaskExecutor() to Manage an Unbounded Pool
    of Virtual Threads

    ```


    Note


    The `VirtualThreadsExecutorDemo` uses a different way to print messages in the
    console called logging, which is explained in detail in **Chapter** [**9**](#463938_3_En_9_Chapter.xhtml).
    This approach was chosen to show more details about the execution threads without
    having to write the complex code to do so.


    #### Asynchronous Programming Using `CompletableFuture<T>`


    Most applications that make use of threads need them to work together in parallel,
    but synchronize to exchange data when required. This can be resolved using **asynchronous
    programming**. In Java there is a hierarchy of components with the `java.util.concurrent.Future<V>`
    interface at the top that are used to model the result of an asynchronous computation.
    By using classes in this hierarchy, we can start a thread and tell it what to
    do when the data arrives. This action that is triggered by data arrival is called
    a **callback action**.


    The `java.util.concurrent.CompletableFuture<T>` class, introduced in Java 8, implements
    `Future<V>` and is one of the most-used classes to write asynchronous code in
    Java because it provides a big set of convenience methods for creating, chaining,
    and combining multiple `Future<V>` instances. It also has a very comprehensive
    exception handling support.


    Listing [5-57](#463938_3_En_5_Chapter.xhtml#PC96) shows a few simple ways to use
    `CompletableFuture<T>`.


    ```

    package com.apress.bgn.five;

    import java.util.concurrent.CompletableFuture;

    import java.util.concurrent.ExecutionException;

    public class AsynchronousDemo {

    void main() throws ExecutionException, InterruptedException {

    CompletableFuture.runAsync(

    () -> System.out.println(Thread.currentThread().getName() +" async run (1)") //
    Runnable as lambda

    ).get(); // Block and wait for the future to complete

    var result1 = CompletableFuture.supplyAsync(() ->  Thread.currentThread().getName()
    + " async run (2)" // Supplier as lambda

    ).get(); // Block and wait for the future to complete

    System.out.println(result1);

    var result2 = CompletableFuture.supplyAsync(() ->  Thread.currentThread().getName()+
    " async run (3)" // Supplier as lambda

    ).thenApply(String::toUpperCase) // apply transformation to result

    .get(); // Block and wait for the future to complete

    System.out.println(result2);

    CompletableFuture.supplyAsync(() ->  Thread.currentThread().getName() + " async
    run (4)" // Supplier as lambda

    ).thenAccept(System.out::println); //  Consumer processes the result when received

    var result3 = CompletableFuture.supplyAsync(() ->  Thread.currentThread().getName()+
    "  async run (5)" // Supplier as lambda

    ).thenApplyAsync(s -> Thread.currentThread().getName() + " thenApplyAsync : "
    + s) // apply async transformation to result

    .get(); // Block and wait for the future to complete

    System.out.println(result3);

    var result4 = CompletableFuture.supplyAsync(() -> {

    if (System.currentTimeMillis()%2 ==0) {

    throw new IllegalStateException("No can do!");

    }

    return Thread.currentThread().getName() + " async run (6)";

    }).exceptionally(ex -> {

    System.err.println(ex.getMessage());

    return "There be dragons!";

    })

    .get(); // Block and wait for the future to complete

    System.out.println(result4);

    try {

    Thread.sleep(2000); // making sure ''main'' thread finishes execution last

    } catch (InterruptedException _) {}

    }

    }

    Listing 5-57

    Simple Examples of CompletableFuture Usage

    ```


    For each example, the `Thread.currentThread().getName()` invocation is used as
    part of the `String` returned so that it is obvious that the thread on which the
    body of a `CompletableFuture<T>` executes is a different one than the main thread.


    Asynchronous programming using `CompletableFuture<T>` is useful enough, but the
    Oracle team decided it could do better.'
