    Just by looking at this code, can you figure out which variables are saved on
    the stack and which are saved on the heap? Let’s go over the program line by line
    and see what is happening:


    ![](images/463938_3_En_5_Chapter/463938_3_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Java stack and heap memory, after declaring two primitive variables


    *   As soon as the program starts, runtime classes that JVM needs are loaded in
    the heap memory.


    *   The `main(..)` method is discovered in line 06, so a stack memory is created
    to be used during the execution of this method.


    *   The primitive local variable in line 07, `i=5`, is created and stored in the
    stack memory of the `main(..)` method.


    *   The primitive local variable in line 08, `j=7`, is created and stored in the
    stack memory of the `main(..)` method. At this point the program memory can be
    depicted as shown in Figure [5-1](#463938_3_En_5_Chapter.xhtml#Fig1).


    ![](images/463938_3_En_5_Chapter/463938_3_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Java stack and heap memory, after declaring two primitive variables and an object


    *   In line 09 an object of type `java.util.Date` is declared, so this object
    is created and stored in the heap memory and a reference named `d` is saved on
    the stack. At this point the program memory looks as depicted in Figure [5-2](#463938_3_En_5_Chapter.xhtml#Fig2).


    ![](images/463938_3_En_5_Chapter/463938_3_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Java stack and heap memory, after calling the `add(..)` method


    *   In line 10 method `add(..)` is called with arguments `i` and `j`. This means
    their values will be copied into the local variables for this method named `a`
    and `b` and these two will be stored in the memory block for this method.


    *   Inside the `add(..)` method body, in line 16 a `String` instance is declared.
    So the `String` object is created in the heap memory, in the String Pool memory
    block, and the reference named `mess` is stored in the stack, in the memory block
    for this method. At this point the program memory looks as depicted in Figure
    [5-3](#463938_3_En_5_Chapter.xhtml#Fig3).


    *   Also in line 10, the result of the execution of method `add(..)` is stored
    into the local variable named `result`. At this point the `add(..)` method has
    finished its execution, so its stack block is discarded. Thus, we can conclude
    that variables that are stored on the stack exist for as long as the function
    that created them is running. In the stack memory of the `main(..)` method, the
    `result` variable is saved.


    *   In line 11, the `print(..)` method is called, but we’ll skip the explanation
    for this line for simplicity reasons.


    *   In line 12, the `d` reference is being assigned a `null` value, which means
    the object of type `Date` is now only in the heap and not linked to the execution
    of the `main(..)` method in any way. In that line the JVM is instructed that that
    object is no longer needed and thus can be safely discarded, which means the space
    containing it can be collected and used to store other objects.'
