  trans: "\n### 记录模式\n\n从 JDK 19 开始，`instanceof` 运算符也适用于记录。记录模式特性通过 JEP 440^(⁶¹) 在\
    \ Java 21 中完成并正式发布。**记录模式**不仅有助于识别记录类型，还能进行解构。\n\n记录实例是不可变的数据载体。它们携带的数据被称为**组件**。这些数据通过内置的组件访问器方法进行访问。\n\
    \n为了展示记录模式的一些常见用法，我们需要几个记录类。让我们从清单 6-8 中非常简单的示例开始。\n\n```\npackage com.apress.bgn.six;\n\
    record FullName (String firstName, String lastName){ }\npublic class RecordPatternsDemo\
    \ {\nvoid main() {\nObject john = new FullName(\"John\", \"Mayer\");\n/*1*/\n\
    if (john instanceof FullName full) {\nSystem.out.println(\"FullName: \" + full);\n\
    }\n/*2*/\nif (john instanceof FullName(String firstName, String lastName)) {\n\
    System.out.println(\"[Deconstruction] FirstName: \" + firstName);\nSystem.out.println(\"\
    [Deconstruction] LastName: \" + lastName);\n}\n}\n}\n// 输出\n/*\nFullName: FullName[firstName=John,\
    \ lastName=Mayer]\n[Deconstruction] FirstName: John\n[Deconstruction] LastName:\
    \ Mayer\n*/\n清单 6-8\n记录模式示例\n```\n\n在清单 6-8 中，我们声明了一个非常简单的记录，名为 `FullName`，它包含两个字段。\n\
    \n第一个语句（标记为 `/*1*/`）看起来像是一个普通的类型检查和转换，与类型模式的使用非常相似。第二个语句（标记为 `/*2*/`）是一个记录模式示例，它将实例解构为其组件，这些组件可以独立使用，而无需封装在记录实例中。这也适用于嵌套记录。如果我们声明一个包含\
    \ `FullName` 组件的 `PersonRecord` 记录，我们可以使用如清单 6-9 所示的嵌套记录模式。\n\n```\npackage com.apress.bgn.six;\n\
    record FullName (String firstName, String lastName){ }\nrecord PersonRecord (FullName\
    \ fullName, Integer age) {}\npublic class RecordPatternsDemo {\nvoid main() {\n\
    Object john = new FullName(\"John\", \"Mayer\");\nObject johnRecord = new PersonRecord((FullName)\
    \ john, 47);\nif (johnRecord instanceof PersonRecord(FullName(var firstName, String\
    \ lastName), var age)) {\nSystem.out.println(\"[Nested] FirstName: \" + firstName);\n\
    System.out.println(\"[Nested] LastName: \" + lastName);\nSystem.out.println(\"\
    [Nested] Age: \" + age);\n}\n}\n}\n// 输出\n/*\n[Nested] FirstName: John\n[Nested]\
    \ LastName: Mayer\n[Nested] Age: 47\n*/\n清单 6-9\n嵌套记录模式示例\n```\n\n借助嵌套记录模式，我们可以分解嵌套记录并单独使用它们的组件。\n\
    \n注意\n\n*嵌套记录*只是指代**记录组合**的另一种说法。\n\n它同样适用于泛型。清单 6-10 中的代码展示了如何使用记录模式来分解泛型类型。\n\
    \n```\npackage com.apress.bgn.six;\nrecord FullName (String firstName, String\
    \ lastName){ }\nrecord PersonRecord (FullName fullName, Integer age) {}\nrecord\
    \ WrapperBeing(T t, String description) { }\npublic class RecordPatternsDemo {\n\
    void main() {\nObject john = new FullName(\"John\", \"Mayer\");\nWrapperBeing\
    \ wrapper = new WrapperBeing((PersonRecord) johnRecord, \"is mise Iain\");\nif\
    \ (wrapper instanceof WrapperBeing(var personRecord, var description)) {\nSystem.out.println(\"\
    [Generics] PersonRecord: \" + personRecord);\nSystem.out.println(\"[Generics]\
    \ Description: \" + description);\n}\n}\n}\n// 输出\n/*\n[Generics] PersonRecord:\
    \ PersonRecord[fullName=FullName[firstName=John, lastName=Mayer], age=47]\n[Generics]\
    \ Description: is mise Iain\n*/\n清单 6-10\n分解泛型类型包装器\n```\n\n你可能已经注意到，本节中的一些示例使用了\
    \ `var` 而不是实际的组件类型。只要某些参数具有其类型，以便编译器能够识别正确的模式，一切就能按预期工作。\n\n在分解嵌套记录时，你可能并不总是对使用所有组件感兴趣。这时就轮到\
    \ `_`（下划线），即未命名变量登场了。例如，在分解 `johnRecord` 实例时，你可能只对提取 `lastName` 组件感兴趣，那么可以这样写：\n\
    \n```\nif (johnRecord instanceof PersonRecord (FullName\n(var _, String lastName),\
    \ var _)) {\nSystem.out.println(\"[Unnamed Variable] LastName: \" + lastName);\n\
    }\n```\n\n基本上就是这些了，除了在 `switch` 表达式中的用法，这将在**第** **7** **章**中介绍。\n\n### 原始类型模式\n\
    \n显式转换不仅限于引用类型——它也适用于原始类型。**第** **5** **章**提到，任何值域较小的类型的变量都可以在不进行显式转换的情况下转换为值域较大的类型。反之亦然，但需要使用显式转换；不过，如果值太大，会丢失位，结果将……出乎意料。只需看看清单\
    \ 6-11 中描述的 `byte` 和 `int` 之间的转换示例。\n\n```\njshell> byte b = 2;\nb ==> 2\n|  创建了变量\
    \ b : byte\njshell> int i = 10;\ni ==> 10\n|  修改了变量 i : int\n|    更新覆盖了变量 i :\
    \ int\njshell> i = b\ni ==> 2\n|  赋值给 i : int\njshell> b = i\n|  错误:  \\\\ \n\
    |  不兼容的类型: 从 int 到 byte 可能有损转换\n|  b = i\n|      ^\njshell> b = (byte) i\nb ==>\
    \ 2\n|  赋值给 b : byte\njshell> i = 300_000\ni ==> 300000\n|  赋值给 i : int\njshell>\
    \ b = (byte) i\nb ==> -32  // 哎呀！值超出了 byte 的范围\n|  赋值给 b : byte\n清单 6-11\njshell\
