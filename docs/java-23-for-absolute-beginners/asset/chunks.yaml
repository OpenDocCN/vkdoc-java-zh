- fmt: '# The Media API


    Besides text data, Java can be used to manipulate binary files such as images.
    The Java Media API contains a set of image encoder/decoder (codec) classes for
    several popular image storage formats: BMP, GIF (decoder only), FlashPix (decoder
    only), JPEG, PNG, PNM3, TIFF, and WBMP.


    In Java 9, the Java media API was transformed as well, with functionality added
    to encapsulate many images with different resolutions into a multiresolution image.
    The core of the Java Media API is the `java.awt.Image` abstract class that is
    the super class of all classes used to represent graphical images. The most important
    image-representing classes and the relationships between them are depicted in
    Figure [11-9](#463938_3_En_11_Chapter.xhtml#Fig9).


    ![](images/463938_3_En_11_Chapter/463938_3_En_11_Fig9_HTML.jpg)


    Figure 11-9


    `Image` classes hierarchy (as shown by IntelliJ IDEA)


    The `SmartMultiResolutionImage` class is used later in this section.


    Although the `java.awt.Image` class is the root class in this hierarchy, the class
    used the most is `java.awt.BufferedImage`, which is an implementation with an
    accessible buffer of image data. It provides a lot of methods that can be used
    to create an image, to set its size and its contents, to extract its contents
    and analyze them, and so much more. In this section we will use this class to
    read and write images.


    An image file is a complex file. Aside from the picture itself, it contains a
    lot of additional information, the most important of which nowadays is the location
    where that image was created. If you have ever wondered how a social network proposes
    a check-in location for an image you are posting, this is where the information
    is found. This might not seem that important, but posting a picture of your cat,
    taken in your house, exposes your location to the whole world. I’m not sure what
    you think about it, but to me this is terrifying. I used to post on my person
    blog pictures of my cat sitting comfortably on the computer where I was writing
    this book, which meant that I basically exposed my location and that of a quite
    expensive laptop to the whole world. Sure, most people do not care about my cat,
    nor the laptop, but somebody looking to make an easy buck might. So after a friendly
    and knowledgeable reader sent me a private email telling me about something called
    Exchangeable Image File Format (EXIF) data and how he knows where I live because
    of the latest cat picture I posted on my blog, I looked into it. A photo’s EXIF
    data contains a ton of information about your camera and where the picture was
    taken (GPS coordinates). Most smartphones embed EXIF data into pictures taken
    with their camera.


    In Figure [11-10](#463938_3_En_11_Chapter.xhtml#Fig10) you can see the EXIF information
    depicted by the macOS Preview application.


    ![](images/463938_3_En_11_Chapter/463938_3_En_11_Fig10_HTML.jpg)


    Figure 11-10


    EXIF information on a JPG image


    Notice that the EXIF info contains the exact location, latitude and longitude
    included, where the picture was taken. There are utilities to remove EXIF data,
    but when you post a lot of pictures on your blog (like I do) or social media sites,
    it takes too much time to clean them one by one. This is where Java comes in,
    and in Listing [11-44](#463938_3_En_11_Chapter.xhtml#PC71) I share with you a
    snippet of code I use to clean my pictures of EXIF data.


    ```

    package com.apress.bgn.eleven;

    // some import statement omitted

    import org.apache.commons.imaging.formats.jpeg.exif.ExifRewriter;

    import java.awt.image.BufferedImage;

    public class MediaDemo {

    private static final Logger LOGGER = LoggerFactory.getLogger(MediaDemo.class);

    void main() {

    File src = new File("chapter11/media-handling/src/main/resources/input/the-beach.jpg");

    try {

    LOGGER.info(" --- Removing EXIF info ---");

    File destNoExif = new File("chapter11/media-handling/src/main/resources/output/the-beach-no-exif.jpg");

    removeExifMetadata(src, destNoExif);

    } catch (Exception e) {

    LOGGER.error("Something bad happened.", e);

    }

    }

    public void removeExifMetadata(final File jpegImageFile, final File dst) throws
    IndexOutOfBoundsException, IOException {

    try (FileOutputStream fos = new FileOutputStream(dst);

    OutputStream os = new BufferedOutputStream(fos)) {

    new ExifRewriter().removeExifMetadata(jpegImageFile, os);

    }

    }

    }

    Listing 11-44

    Code Snippet to Strip EXIF Data from Images

    ```


    Removing EXIF data is pretty easy, since `javax.imageio.ImageIO` does not persist
    in the image file EXIF information, or any other information, that is not linked
    to the actual image.


    **Note**


    The utility library that provides classes that do the stripping of the `EXIF`
    information with better performance than the Java AWT classes is named Apache
    Commons Imaging^([^(108)](#fn108)). This project is the continuation of Apache
    Sanselan, which was used in the first edition of this book.


    The `removeExifMetadata(..)` method is given as an argument the source of the
    image and a `File` handler managing the location where the new image should be
    saved. To test that the resulting image has no EXIF data, just open it in an image
    viewer. Any option that shows EXIF should either be disabled or display nothing.
    In the Preview image viewer from macOS, the option is grayed out.


    If your project requires avoiding third-party solutions at all costs, JDK comes
    with its own way of removing `EXIF` data. The `javax.imageio.ImageIO` class provides
    a method to write a `BufferedImage` instance that leaves the `EXIF` data out.
    So the `removeExifMetadata(..)` method can be simply written as:


    ```

    private static void removeExifMetadata(final File src, final File dest) throws
    Exception {

    BufferedImage originalImage = ImageIO.read(src);

    ImageIO.write(originalImage, "jpg", dest);

    }

    ```


    Now that we have that out of the way, let’s resize the original image. To resize
    an image, we need to create a `BufferedImage` instance from the original image
    to get the image dimensions. After that, we modify the dimensions and use them
    as arguments to create a new `BufferedImage` that will be populated with data
    by a `java.awt.Graphics2D` instance, a special type of class that is used to render
    2-D shapes, text, and images. The code is depicted in Listing [11-45](#463938_3_En_11_Chapter.xhtml#PC73)
    (the method is called to create an image 25% smaller, an image 50% smaller, and
    one 75% smaller).'
