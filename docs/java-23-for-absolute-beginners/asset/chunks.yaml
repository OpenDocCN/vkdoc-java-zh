    out.println("(i, j, k) = (" +i + ", " + j + ", " + k +")");

    }

    }

    }

    }

    }

    Listing 7-44

    Breaking Out of a Nested for Loop

    ```


    The label used in Listing [7-44](#463938_3_En_7_Chapter.xhtml#PC45) is named `HERE`
    and it is declared in front of the `for` statement that is exited when the condition
    is fulfilled. The same label follows the `break` statement. Writing label names
    with all all-caps letters is considered a best practice in development, as it
    avoids confusing labels with variables or class names when reading the code.


    To make sure this works, you can take a look in the console. You should see that
    some combinations of `(i, j, k)`, including the one with `i = j = k`, are missing.
    The output is listed here:


    ```

    (i, j, k) = (1,0,0)

    (i, j, k) = (1,0,1)

    (i, j, k) = (1,1,0)

    ```


    Caution


    Breaking loops with labels is very much frowned upon in software development,
    which is a tame way to say **it is a bad practice**, since it causes a code jump
    and makes the execution flow more difficult to follow. So if you have no choice
    but to do it, make sure your labels are visible.


    Tip


    Depending on the solution you are building, you might be able to avoid using breaking
    with labels by wrapping the nested loops inside a method and using a `return`
    statement to break out of the loop, as you will be shown a little bit later in
    this chapter.


    ### `continue` Statement


    The `continue` statement does not break a loop, but it can be used to skip certain
    steps based on a condition. Essentially, the `continue` statement stops the execution
    of the current step of the loop and moves to the next one, so you could say that
    this statement continues the loop. Let’s continue experimenting with the array
    traversal example, but let’s skip the step of printing the elements with odd indexes
    by using the `continue` statement. The code is shown in Listing [7-45](#463938_3_En_7_Chapter.xhtml#PC47).


    ```

    package com.apress.bgn.seven.forloop;

    import static java.lang.System.out;

    public class ContinueForDemo {

    public static final int[] arr = {5, 1, 4, 2, 3};

    void main(){

    for (int i = 0; i < arr.length; ++i) {

    if (i % 2 != 0) {

    continue;

    }

    out.println("arr[" +i +"] = " + arr[i]);

    }

    }

    }

    Listing 7-45

    Skipping Printing Elements with Odd Indexes Using a for Loop and continue Statement

    ```


    Obviously, this statement must be conditioned—otherwise, the loop will just iterate
    uselessly.


