    (i, j, k) = (0,2,0)

    (i, j, k) = (1,0,0)

    (i, j, k) = (1,1,0)

    (i, j, k) = (1,2,0)

    (i, j, k) = (2,0,0)

    (i, j, k) = (2,1,0)

    (i, j, k) = (2,2,0)

