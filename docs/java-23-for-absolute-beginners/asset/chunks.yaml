    ### 逻辑运算符


    在设计用于控制程序执行流程的条件时，有时需要编写复杂的条件——即由多个表达式组合而成的复合条件。有四个运算符可用于构建复杂条件。其中两个是可复用的按位运算符
    `&`（与）和 `|`（或），但它们需要计算条件的所有部分。另外两个运算符 `&&`（与）和 `||`（或）与前述运算符效果完全相同，但区别在于它们不需要计算所有表达式，因此也被称为*短路运算符*。为了解释这些运算符的行为，我们将使用一个典型示例。


    在代码清单 6-34 中，我们声明了一个包含十个术语的列表（其中一些为 `null`），以及一个生成随机索引的方法，用于从列表中选取一个元素。然后我们测试从列表中选出的元素，检查它是否不为
    `null` 且等于预期值。如果两个条件都为真，则在控制台打印一条消息。


    ```

    package com.apress.bgn.six;

    import java.util.ArrayList;

    import java.util.List;

    import java.util.Random;

    import static java.lang.System.out;

    public class LogicalOperatorsDemo {

    static List terms = new ArrayList() {{

    add("Rose");

    add(null);

    add("River");

    add("Clara");

    add("Vastra");

    add("Psi");

    add("Cas");

    add(null);

    add("Nardhole");

    add("Strax");

    }};

    void main() {

    for (int i = 0; i < 20; ++i) {

    int index = getRandomIndex(terms.size());

    String term = terms.get(index);

    out.println("Generated index: " + index);

    if (term != null & term.equals("Rose")) {

    out.println("Rose was found");

    }

    }

    }

    private static int getRandomIndex(int listSize) {

    var r = new Random();

    return r.nextInt(listSize);

    }

