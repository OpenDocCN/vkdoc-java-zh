    up by IntelliJ IDEA and other smart editors and depicted on the spot, while the
    developer uses the documented components in the code. Smarter editors, when selecting
    a class, method name, interface method, and so on, provide some kind of combination
    of keys that include F1, that the developer must press, so that the documentation
    is depicted in a pop-up window. In IntelliJ IDEA, just click an element and press
    **F1** and the Javadoc documentation is shown in a pop-up window, formatted quite
    nicely, like depicted in Figure [9-22](#463938_3_En_9_Chapter.xhtml#Fig22).


    ![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig22_HTML.jpg)


    Figure 9-22


    Javadoc information depicted in IntelliJ IDEA


    You can view Javadoc information in a smart editor for any dependency of your
    project (including JDK classes) as long as the code is open source and the module
    exports the appropriate packages.


    In Java 9 the Doclet API for generating Javadoc received an upgrade and a facelift.
    Before Java 9, developers complained about the performance issues of the old version,
    the cryptic API, the lack of support, and the shallowness of it overall. In Java
    9 most of the problems were resolved. The detailed description and list of improvements
    can be found on the JEP 221 page^([^(88)](#fn88)). Improvements continued in Java
    18 with the introduction of the `@snippet` annotation, and in Java 23 by enabling
    Javadoc documentation comments to be written in Markdown^([^(89)](#fn89)) rather
    than in a mixture of HTML and Javadoc @-tags^([^(90)](#fn90)). Figure [9-23](#463938_3_En_9_Chapter.xhtml#Fig23)
    shows side by side the same Javadoc comments written in the classic way (left)
    and written using Markdown.


    ![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig23_HTML.jpg)


    Figure 9-23


    Javadoc classic (left) and Markdown (supported starting with Java 23 for class
    `QuickSort`


    Figure [9-24](#463938_3_En_9_Chapter.xhtml#Fig24) shows the generated documentation
    for the Javadoc comments in the `QuickSort` class shown in Figure [9-23](#463938_3_En_9_Chapter.xhtml#Fig23).


    ![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig24_HTML.jpg)


    Figure 9-24


    `QuickSort` documentation


    Documentation is valuable and can make development practical and pleasant when
    it is really good. So when writing code, document it as you would expect the dependencies
    of your project to be. You might have heard of the expression **RTFM**, which
    is an abbreviation for **Read The F%ing Manual!**. This expression is used quite
    a lot in software by experienced developers when working with newbie developers.
    The problem is, what can you do when there is no manual? Most companies on a deadline
    might have the tendency to allocate little or no time to documenting a project,
    so this section was added to this book to emphasize the importance of good documentation
    in software development, and to teach you how to write your documentation while
    you write your code, because you might not have time to do it afterward.


    ## Summary


    This chapter has covered important development tools and techniques to help you
    write production-worthy Java code. Having read this chapter, you should have a
    good basis for understanding of how to accomplish the following:


    *   Configure and use logging in a Java application


    *   Log messages in the console


    *   Log messages to a file


    *   Use Java logging


    *   Use a logging facade (and appreciate why it is recommended)


    *   Configure and use SLF4J with Logback


    *   Program using assertions


    *   Debug step by step using IntelliJ IDEA


    *   Monitor and inspect JVM statistics while an application is running using various
    JDK tools such as `jps`, `jcmd`, `jconsole`, and `jmc`


    *   Use the Process API to monitor and create processes


    *   Test an application using JUnit


    *   Write tests using fakes


    *   Write tests using mocks


    *   Write tests using stubs


    *   Write Javadoc comments to document a Java application and generate documentation
    in HTML format using Maven


