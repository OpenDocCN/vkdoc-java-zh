- fmt: "### Class Variables\n\nAside from attributes that are specific to each human\
    \ in particular, all humans have something in common: a lifespan (which we’ll\
    \ assume to be 100 years for the maximum value). It would be redundant to declare\
    \ a field called `lifespan`, because it would have to be associated with the same\
    \ value for all `Human` instances. So we will declare a field using the `static`\
    \ keyword in the `Human` class, which will have the same value for all `Human`\
    \ instances and that will be initialized only once. And we can go one step further\
    \ as well and make sure that value never changes during the execution of the program\
    \ by adding the `final` modifier in front of its declaration as well. This way\
    \ we created a special type of variable called a constant.\n\n> **Note:** Java\
    \ code conventions for constants specifies that their names should be all uppercase\
    \ with words separated by underscores (`_`).\n\nThe new `Human` class is depicted\
    \ in Listing [4-13](#463938_3_En_4_Chapter.xhtml#PC13).\n\n```java\npackage com.apress.bgn.four.base;\n\
    public class Human {\n    static final int LIFESPAN = 100;\n    String name;\n\
    \    int age;\n    float height;\n}\n```\n\n*Listing 4-13: Simple Human Class\
    \ with a Constant Member*\n\nThe `LIFESPAN` variable is also called a class variable\
    \ because it is associated with the class, not with instances. (And it was set\
    \ to 100, which is a pretty optimistic value.) This is made obvious by the code\
    \ in Listing [4-14](#463938_3_En_4_Chapter.xhtml#PC14).\n\n```java\npackage com.apress.bgn.four.base;\n\
    public class BasicHumanDemo {\n    public static void main(String... args) {\n\
    \        Human human = new Human();\n        Human alex = new Human();\n     \
    \   alex.name = \"Alex\";\n        alex.age = 40;\n        alex.height = 1.91f;\n\
    \        System.out.println(\"Alex’s lifespan = \" + alex.LIFESPAN);\n       \
    \ System.out.println(\"human’s lifespan = \" + human.LIFESPAN);\n        System.out.println(\"\
    Human lifespan = \" + Human.LIFESPAN);\n    }\n}\n// output\n/*\nAlex’s lifespan\
    \ = 100\nhuman’s lifespan = 100\nHuman lifespan = 100\n*/\n```\n\n*Listing 4-14:\
    \ Code Sample Testing a Constant*\n\n### Encapsulating Data\n\nThe class we defined\
    \ makes no use of access modifiers on the fields, and this is not acceptable.\
    \ Java is known as an **object-oriented programming language**, and thus code\
    \ written in Java must respect the **principles of object-oriented programming\
    \ (OOP)**. Respecting these coding principles ensures that the written code is\
    \ of good quality and totally aligns with the fundamental Java style.\n\n> **Note:**\
    \ Starting with Java 8, the Java syntax has been modified—new types have been\
    \ added, and internal changes have been made to the JDK to allow a more functional\
    \ approach when writing code—but Java still remains mostly an OOP language.\n\n\
    One of the OOP principles is **encapsulation**, which refers to hiding the data\
    \ implementation by restricting access to it using special methods called accessors\
    \ (getters) and mutators (setters).\n\nUsually, any field of a class should have\
    \ private access, and access to it should be controlled by methods that can be\
    \ intercepted, tested, and tracked to see where they were called. Using getters\
    \ and setters is a common practice when working with objects, so most IDEs have\
    \ a default option to generate them, including IntelliJ IDEA. As shown in Figure\
    \ [4-4](#463938_3_En_4_Chapter.xhtml#Fig4), just right-click inside the class\
    \ body, select the **Generate** option to see all possibilities, and then select\
    \ **Getter and Setter** to generate the methods for you.\n\n![Figure 4-4](images/463938_3_En_4_Chapter/463938_3_En_4_Fig4_HTML.jpg)\n\
    \n*Figure 4-4: IntelliJ IDEA code generation menu: **Generate ➤ Getter and Setter**\
    \ submenu*\n\nAfter making the fields private and generating the getters and setters,\
    \ the `Human` class now looks like the one depicted in Listing [4-15](#463938_3_En_4_Chapter.xhtml#PC15).\n\
    \n```java\npackage com.apress.bgn.four.base;\npublic class Human {\n    static\
    \ final int LIFESPAN = 100;\n    private String name;\n    private int age;\n\
    \    private float height;\n\n    public String getName() {\n        return name;\n\
    \    }\n\n    public void setName(String name) {\n        this.name = name;\n\
    \    }\n\n    public int getAge() {\n        return age;\n    }\n\n    public\
    \ void setAge(int age) {\n        this.age = age;\n    }\n\n    public float getHeight()\
    \ {\n        return height;\n    }\n\n    public void setHeight(float height)\
    \ {\n        this.height = height;\n    }\n}\n```\n\n*Listing 4-15: Simple Human\
    \ Class with Getters and Setters*\n\nAfter looking at Listing [4-15](#463938_3_En_4_Chapter.xhtml#PC15),\
    \ you may be wondering what is the purpose of the `this` keyword. As the keyword\
    \ name hints, it is a reference to the current object. So `this.name` is actually\
    \ the value of the field `name` of the current object, also referred to as an\
    \ **instance variable**. Inside the class body, `this` is used to access fields\
    \ for the current objects when there are parameters in methods that have the same\
    \ name. As you can see, the setters and getters that IntelliJ IDEA generates have\
    \ parameters named exactly as the fields.\n\n**Getters** are the simplest methods\
    \ that are declared without any parameter, and they return the value of the field\
    \ they are associated with. The coding convention for their names is to use the\
    \ `get` prefix and the name of the field they access, with its first letter uppercased.\n\
    \n**Setters** are methods that return nothing and declare as a parameter a variable\
    \ with the same type that needs to be associated to the field. Their names are\
    \ made of the `set` prefix and the name of the field they access, with its first\
    \ letter uppercased. When setters are generated by an editor, the parameter name\
    \ matches the instance variable name, and the `this` keyword is needed to discern\
    \ between the two in the context of the setter’s body.\n\nFigure [4-5](#463938_3_En_4_Chapter.xhtml#Fig5)\
    \ depicts the setter and getter for the `name` field.\n\n![Figure 4-5](images/463938_3_En_4_Chapter/463938_3_En_4_Fig5_HTML.jpg)\n\
    \n*Figure 4-5: Setter and getter methods used for the `name` field*\n\nSince the\
    \ fields are now private, when creating a `Human` instance, we have to use the\
    \ setters to set the field values and the getters when accessing them. Therefore,\
    \ our class `BasicHumanDemo` changes to the one depicted in Listing [4-16](#463938_3_En_4_Chapter.xhtml#PC16).\n\
    \n```java\npackage com.apress.bgn.four.base;\npublic class BasicHumanDemo {\n\
    \    public static void main(String... args) {\n        Human alex = new Human();\n\
    \        alex.setName(\"Alex\");\n        alex.setAge(40);\n        alex.setHeight(1.91f);\n\
    \        System.out.println(\"name: \" + alex.getName());\n        System.out.println(\"\
    age: \" + alex.getAge());\n        System.out.println(\"height: \" + alex.getHeight());\n\
    \    }\n}\n// output\n// name: Alex\n// age: 40\n// height: 1.91\n```\n\n*Listing\
    \ 4-16: BasicHumanDemo Class Using Human Instance with Getters and Setters*\n\n\
    Most Java frameworks look for getters and setters within classes to initialize\
    \ or read the values of an object’s fields. Setters and getters are considered\
    \ by most developers as **boilerplate code** (or just **boilerplate**), sections\
    \ of code that are repeated in multiple places with little to no variation. This\
    \ is why the Lombok^([(40)](#fn40)) library was born—to generate them at runtime,\
    \ so developers don’t have to pollute their code with them. The Kotlin language\
    \ removed them altogether.\n\nJava did something similar in version 14 with the\
    \ introduction of *records*. Records will be covered a little later in this chapter."
