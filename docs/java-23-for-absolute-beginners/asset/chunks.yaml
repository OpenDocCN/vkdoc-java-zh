    \ 所示，其中 `throws EmptyPerformerException` 被注释掉了，以展示编译器对此情况完全不接受。\n\n![](images/463938_3_En_4_Chapter/463938_3_En_4_Fig16_HTML.jpg)\n\
    \n**图 4-16** 由受检异常未在 `printTTL(..)` 方法中声明抛出而导致的编译错误\n\n此外，在 `main(..)` 方法中，需要使用\
