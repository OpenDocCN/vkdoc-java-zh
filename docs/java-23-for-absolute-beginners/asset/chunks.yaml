- fmt: '#### Interfaces


    **Important**


    One of the most common job interview questions for prospective Java programmer
    is *What is the difference between an interface and an abstract class?* This section
    will provide you the most detailed answer to this question.


    An **interface** is not a class, but it does help create classes. An interface
    is fully abstract, meaning that it has no fields, only abstract method definitions.
    I also like to call them *skeletons*. When a class is declared to implement an
    interface, unless the class is abstract, it must provide concrete implementations
    for all skeleton methods.


    **Important**


    The name *skeleton method* is quite important in Java 8+ versions, because from
    this version on, interfaces are enriched so that `static`, `default`, and `private`
    methods can be part them.


    Skeleton methods inside an interface are implicitly `public` and `abstract`, because
    skeleton methods must be abstract to force classes to provide implementations
    and must be public so that classes actually have access to do so.


    The only methods with concrete implementation in an interface until Java 8 were
    `static` methods. In Java 8, *default* methods in interfaces were introduced.
    In Java 9 **private** methods in interfaces were introduced. The interfaces cannot
    be instantiated, because they do not have constructors.


    Interfaces that declare no method definitions are called *marker* interfaces and
    have the purpose to mark classes for specific purposes. The most renown Java marker
    interface is `java.io.Serializable`, which marks objects that can be serialized,
    so their state can be saved to a binary file or another data source and sent over
    a network to be deserialized and used.


    An interface can be declared in its own file as a top-level component or nested
    inside another component. There are two types of interfaces: *normal* interfaces
    and **annotations**.


    The difference between abstract classes and interfaces and when one or the other
    should be used becomes relevant in the context of **inheritance**.


    **Important**


    Java supports only single inheritance. This means a class can have only one superclass.


    Single inheritance might seem like a limitation, but consider the following example.
    Let’s modify the previous hierarchy and imagine a class named `Performer` that
    should extend classes `Musician` and `Actor`. If you need a real human that can
    be modeled by this class, think of David Duchovny, who is both an actor and a
    musician.


    Figure [4-9](#463938_3_En_4_Chapter.xhtml#Fig9) depicts the class hierarchy mentioned
    previously.


    ![](images/463938_3_En_4_Chapter/463938_3_En_4_Fig9_HTML.jpg)


    Figure 4-9


    Diamond class hierarchy


    This class hierarchy introduces something called the *diamond problem*, and the
    name is obviously inspired by the shape formed by the relationships between classes.
    What is actually wrong with the design? If both `Musician` and `Actor` extend
    `Human` and inherit all members from it, what will `Performer` inherit and from
    where? Because it obviously cannot inherit members of `Human` twice, that would
    make this class useless and invalid. And how could we discern between methods
    with the same signature? So what is the solution in Java? As you probably imagine,
    considering the focus of this section: interfaces. *(Well, sort of, because most
    times a combination of interfaces and a programming concept named* ***composition***
    *is required.)*


    What has to be done is to turn methods in classes `Musician` and `Actor` into
    method skeletons and transform those classes into interfaces. The behavior from
    the `Musician` class will be moved to a class called, let’s say `Guitarist`, that
    will extend the `Human` class and implement the `Musician` interface. For the
    `Actor` class, something similar can be done, but I’ll leave that as an exercise
    for you. The hierarchy in Figure [4-10](#463938_3_En_4_Chapter.xhtml#Fig10) should
    provide some help.


    ![](images/463938_3_En_4_Chapter/463938_3_En_4_Fig10_HTML.jpg)


    Figure 4-10


    Java hierarchy with interfaces for `Performer` class


    So the `Musician` interface contains only method skeletons mapping what a musician
    does. It does not go into detail to model how. The same goes for the `Actor` interface.
    In Listing [4-38](#463938_3_En_4_Chapter.xhtml#PC38), you can see the bodies of
    the two interfaces.


    ```

    package com.apress.bgn.four.interfaces;

    import java.util.List;

    interface Musician {

    String getMusicSchool();

    void setMusicSchool(String musicSchool);

    List getSongs();

    void setSongs(List songs);

    String getGenre();

    void setGenre(String genre);

    }

    interface Actor {

    String getActingSchool();

    void setActingSchool(String actingSchool);

    List getFilms();

    void setFilms(List films);

    void addFilm(String filmName);

    }

    Listing 4-38

    Musician and Actor Interfaces

    ```


    As you can see, the fields have been removed because they cannot be part of the
    interfaces; only the method skeletons remain.


    **Note**


    In some of the code samples, more classes are declared in a single file that is
    named after the only public class in it. This choice was made because these classes
    have small bodies, and it made no sense to spread them into multiple files.


    The `Performer` class is depicted in Listing [4-39](#463938_3_En_4_Chapter.xhtml#PC39).


    ```

    package com.apress.bgn.four.interfaces;

    import com.apress.bgn.four.classes.Gender;

    import com.apress.bgn.four.classes.Human;

    import java.util.List;

    public class Performer extends Human implements Musician, Actor {

    // fields specific to musician

    private String musicSchool;

    private String genre;

    private List songs;

    // fields specific to actor

    private String actingSchool;

    private List films;

    public Performer(String name, int age, float height, Gender gender) {

    super(name, age, height, gender);

    }

    // from Human

    @Override

    public int getTimeToLive() {

    return (LIFESPAN - getAge()) / 2;

    }

    // from Musician

    @Override

    public String getMusicSchool() {

    return musicSchool;

    }

    // from Musician

    @Override

    public void setMusicSchool(String musicSchool) {

    this.musicSchool = musicSchool;

    }

    // from Actor

    @Override

    public String getActingSchool() {

    return actingSchool;

    }

    // from Actor

    @Override

    public void setActingSchool(String actingSchool) {

    this.actingSchool = actingSchool;

    }

    // other methods omitted

    }

    Listing 4-39

    Performer Class Implementing Two Interfaces

    ```


    **Important**


    What you must take from this example is that by using interfaces, multiple inheritance
    is possible in Java to some extent, and that **classes extend only one class and
    can implement one or more interfaces**.


    There might be situations in which you need to write a class that implements multiple
    interfaces that might declare similar method skeletons. If the method skeletons
    have identical signatures, the solution is simple: only one implementation suffices.
    If the signatures differ enough, one implementation for each is necessary.


    If the skeletons are similar enough to confuse the compiler, better avoid the
    inheritance and opt for solutions such as composition.


    Inheritance applies to interfaces too. For example, both `Musician` and `Actor`
    interfaces can extend an interface named `Artist` that contains a template for
    behavior common to both. For example, we can combine the music school and acting
    school into a generic school and define the setters and getters for it as method
    skeletons. The `Artist` interface is depicted in Listing [4-40](#463938_3_En_4_Chapter.xhtml#PC40)
    together with `Musician`.


    ```

    package com.apress.bgn.four.interfaces;

    import java.util.List;

    interface Artist {

    String getSchool();

    void setSchool(String school);

    }

    interface Musician extends Artist {

    List getSongs();

    void setSongs(List songs);

    String getGenre();

    void setGenre(String genre);

    }

    Listing 4-40

    Artist and Musician Interfaces

    ```'
