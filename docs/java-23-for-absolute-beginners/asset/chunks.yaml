    ## 使用 Project Reactor


    如前所述，JDK 对响应式编程的支持相当有限。发布者、处理器和订阅者应异步运行，所有这些行为都必须由开发者实现，这可能会有些麻烦。目前 JDK 唯一适合做的事情，就是为所有其他已有的实现提供一个通用接口。这些实现有很多，它们提供了更多有用的类，用于更专门的响应式组件，以及更易于创建和连接它们的实用方法。作为
    Spring 的爱好者，我个人最喜欢的是 **Project Reactor**，这也是 Spring 开发团队青睐的同一个库。


    Project Reactor 是最早的响应式编程库之一，其类为构建响应式应用提供了非阻塞的稳定基础，并具备高效的请求管理能力。它适用于 Java 8，但也为
    JDK 9+ 的响应式流类提供了适配器类。


    Project Reactor 适用于微服务应用，并且提供了比 JDK 多得多的类，旨在使响应式应用的编程更加实用。Project Reactor 提供了两个主要的发布者实现：`reactor.core.publisher.Mono<T>`，这是一个限制为发布零个或一个元素的响应式流发布者；以及
    `reactor.core.publisher.Flux<T>`，这是一个带有基本流操作符的响应式流发布者。


    使用 Project Reactor 的优势在于，我们有更多的类和方法可以使用，有静态工厂可用于创建发布者，并且操作链可以更容易地组合。不过，Project
    Reactor 团队不喜欢“处理器”这个名称，因此中间组件被命名为**操作符**。


    如果你查看官方文档，很可能会遇到图 12-7^(¹²³) 中的示意图。


    ![](img/463938_3_En_12_Fig7_HTML.jpg)


    图 12-7


    Project Reactor Flux 发布者实现


    这是 `Flux<T>` 发布者工作原理的抽象示意图。`Flux<T>` 发射元素，可能抛出异常，并在没有更多元素可发布时完成——这与之前解释的行为相同，但
    Project Reactor 团队找到了一种更美观的绘制方式。`Mono` 实现的示意图非常相似^(¹²⁴)。


    不过，我们先把这个放在一边，来看一些代码示例。使用该类中的多个实用方法，创建 `Flux<T>` 实例非常容易。在开始发布元素之前，让我们设计一个通用的订阅者，它除了打印值之外什么都不做，因为我们需要它来确保我们的
    `Flux<T>` 发布者确实能工作。要使用 Project Reactor API 编写订阅者，你有多种选择。首先，你可以直接实现 `org.reactivestreams.Subscriber<T>`，如清单
    12-15 所示。


    ```

    package com.apress.bgn.twelve.reactor;

    import org.reactivestreams.Subscriber;

    import org.reactivestreams.Subscription;

    // 其他导入语句已省略

    public class GenericSubscriber implements Subscriber {

    private static final Logger LOGGER = LoggerFactory.getLogger(GenericSubscriber.class);

    private Subscription subscription;

    @Override

    public void onSubscribe(Subscription subscription) {

    if (this.subscription == null) {

    this.subscription = subscription;

    this.subscription.request(1);

    } else {

    subscription.cancel();

    }

    }

    @Override

    public void onNext(T element) {

    LOGGER.info("consumed {} ", element);

    subscription.request(1);

    }

    @Override

    public void onError(Throwable t) {

    LOGGER.error("Unexpected issue!", t);

    }

    @Override

    public void onComplete() {

    LOGGER.info("All done!");

    }

    }

    清单 12-15

    org.reactivestreams.Subscriber 实现

    ```


    为了避免实现那么多带有样板代码的方法，还可以选择实现 `reactor.core.CoreSubscriber<T>`（订阅者的 Reactor 基础接口），或者更好的方式是扩展
    `reactor.core.publisher.BaseSubscriber<T>` 类，该类提供了基本的订阅者功能。可以通过重写同名但带有 `hook`
    前缀的方法来修改典型订阅者方法的行为。在清单 12-16 中，你可以看到使用 Project Reactor 编写订阅者是多么容易。


    ```

    package com.apress.bgn.twelve.reactor;

    import reactor.core.publisher.BaseSubscriber;

    // 其他导入语句已省略

    public class GenericSubscriber  extends BaseSubscriber {

    private static final Logger LOGGER = LoggerFactory.getLogger(GenericSubscriber.class);

    @Override

    protected void hookOnNext(T value) {

    LOGGER.info("consumed {} ", value);

    super.hookOnNext(value);

    }

    @Override

    protected void hookOnComplete() {

    LOGGER.info("call done.");

    super.hookOnComplete();

    }

    }

    清单 12-16

    reactor.core.publisher.BaseSubscriber 扩展

    ```


    *嗒哒！* 现在我们有了一个订阅者类，让我们创建一个响应式发布者，它从一个无限的整数流中提供整数，以便使用这个类的实例。实现如清单 12-17 所示。


    ```

    package com.apress.bgn.twelve.reactor;

    import reactor.core.publisher.Flux;

    import java.util.random.RandomGenerator;

    import java.util.stream.Stream;

    public class ReactorDemo {

    static RandomGenerator randomGenerator = RandomGenerator.of("SecureRandom");

    void main() {

    Flux intFlux = Flux.fromStream(

    Stream.generate(() -> randomGenerator.nextInt(150))

    );

    intFlux.subscribe(new GenericSubscriber());

    }

    }

    // 示例输出

    /*

    INFO  c.a.b.t.r.GenericSubscriber - consumed 14

    INFO  c.a.b.t.r.GenericSubscriber - consumed 35

    INFO  c.a.b.t.r.GenericSubscriber - consumed 115

    */

    清单 12-17

    使用 Project Reactor 的 Flux 创建响应式发布者

    ```


    如果你运行上述代码，你会看到所有生成的整数值都被订阅者打印出来。`Flux<T>` 可以从多种来源创建，包括数组和其他发布者。在特殊情况下，为了避免返回空值，可以通过调用
    `empty()` 方法创建一个空的 `Flux<T>`：


    ```

    String[] names = {"Joy", "John", "Anemona", "Takeshi"};

    Flux.fromArray(names).subscribe(new GenericSubscriber());

    Flux intFlux = Flux.empty();

    intFlux.subscribe(new GenericSubscriber());

    ```


    在我看来，最棒的方法叫做 `just(..)`，它同时为 `Flux` 和 `Mono` 提供。它接受一个或多个值，并返回一个发布者，即 `Flux<T>`
    或 `Mono<T>`，具体取决于调用它的类型：


    ```

    Flux dummyStr = Flux.just("one", "two", "three");

    Flux dummyInt = Flux.just(1,2,3);

    Mono one = Mono.just(1);

    Mono empty = Mono.empty();

    ```


    另一个你可能觉得有用的方法是 `concat(..)`，它允许你连接两个 `Flux<T>` 实例：


    ```

    String[] names = {"Joy", "John", "Anemona", "Takeshi"};

    Flux namesFlux = Flux.fromArray(names);

    String[] names2 = {"Hanna", "Eugen", "Anthony", "David"};

    Flux names2Flux = Flux.fromArray(names2);

    Flux combined = Flux.concat(namesFlux, names2Flux);

    combined.subscribe(new GenericSubscriber());

    ```


    还有一件你可能喜欢的事情：还记得 `IntPublisher` 类必须通过调用 `Thread.sleep(1000)` 来减速吗？使用 `Flux<T>`
    你不需要这样做，因为有两个实用方法组合起来可以达到同样的效果：


    ```

    Flux infiniteFlux = Flux.fromStream(

    Stream.generate(() -> randomGenerator.nextInt(150))

    );

    Flux delay = Flux.interval(Duration.ofSeconds(1));

    Flux delayedInfiniteFlux = infiniteFlux.zipWith(delay, (s,l) -> s);

    delayedInfiniteFlux.subscribe(new GenericSubscriber());

    ```

    '
