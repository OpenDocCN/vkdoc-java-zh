- fmt: '#### Using Fakes


    Using `fakes` is a way for us to simulate objects and method functionality in
    our code without actually depending on a real object or method. The code written
    to implement such an object has simplified functionality of the one deployed in
    production.


    To test the `AccountRepoImpl` class, we have to replace the `DerbyDBConnection`
    instance with a `FakeDBConnection` instance that is not backed up by a database,
    but by something simpler and more accessible, like a `Map<?,?>`. The `DerbyDBConnection`
    uses `java.sql.Connection` and other classes in that package to perform data operations
    on the Derby database.


    The `FakeDBConnection` class will implement the `DBConnection` interface so that
    it can be passed to an `AccountRepoImpl` and all its methods will be called on
    it.


    The rule of thumb when writing tests and test supporting classes is to put them
    in the same packages with the objects tested or replaced, but in the `test/java`
    directory. This is because test classes must access the classes being tested,
    without extra configurations needed in the `module-info.java` file. Supporting
    classes to test the application classes using fakes are declared in the `com.apress.bgn.nine.fake`
    package.


    Another rule of thumb when writing tests is to write a method to test the correct
    outcome of the method being tested, and to write a method to test the incorrect
    behavior. In unexpected cases, with unexpected data, your application will behave
    in unexpected ways, so although this seems paradoxical, you have to expect the
    unexpected and write tests for it.


    The `AccountRepoImpl` class implements the basic methods to persist or delete
    an `Account` instance to/from the database. The implementation is depicted in
    Listing [9-33](#463938_3_En_9_Chapter.xhtml#PC53).


    ```

    package com.apress.bgn.nine.repo;

    import com.apress.bgn.nine.Account;

    import com.apress.bgn.nine.db.DbConnection;

    import java.util.List;

    import java.util.Optional;

    public class AccountRepoImpl  implements AccountRepo {

    private DbConnection conn;

    public AccountRepoImpl(DbConnection conn) {

    this.conn = conn;

    }

    @Override

    public Account save(Account account) {

    var dbAcc = conn.findByHolder(account.holder());

    if(dbAcc == null) {

    return conn.insert(account);

    }

    return conn.update(account);

    }

    @Override

    public Optional findOne(String holder) {

    var acc = conn.findByHolder(holder);

    if(acc != null) {

    return Optional.of(acc);

    }

    return Optional.empty();

    }

    @Override

    public List findAll() {

    return conn.findAll();

    }

    @Override

    public int deleteByHolder(String holder) {

    var acc = conn.findByHolder(holder);

    conn.delete(holder);

    if(acc != null) {

    return 0;

    }

    return 1;

    }

    }

    Listing 9-33

    The AccountRepoImpl Implementation

    ```


    The `deleteByHolder(..)` method in the `AccountRepoImpl` class is used to delete
    an account. If the entry is present, it deletes it and returns 0; otherwise it
    returns 1. The `deleteByHolder(..)` method is depicted in Listing [9-34](#463938_3_En_9_Chapter.xhtml#PC54).


    To test this class, we need to provide a `DbConnection` implementation that simulates
    a connection to a database. This is where the previously mentioned `FakeDBConnection`
    comes in, the code for which is also shown in Listing [9-34](#463938_3_En_9_Chapter.xhtml#PC54).


    ```

    package com.apress.bgn.nine.fake.db;

    import com.apress.bgn.nine.Account;

    import com.apress.bgn.nine.db.DBException;

    import com.apress.bgn.nine.db.DbConnection;

    import java.util.*;

    public class FakeDBConnection implements DbConnection {

    /**

    * pseudo-database {@code Map}

    */

    Map database = new HashMap();

    @Override

    public void connect() {

    // no implementation needed

    }

    @Override

    public Account insert(Account account) {

    if (database.containsKey(account.holder())) {

    throw new DBException("Could not insert " + account);

    }

    database.put(account.holder(), account);

    return account;

    }

    @Override

    public Account findByHolder(String holder) {

    return database.get(holder);

    }

    @Override

    public List findAll() {

    return new ArrayList(database.values());

    }

    @Override

    public Account update(Account account) {

    if (!database.containsKey(account.holder())) {

    throw new DBException("Could not find account for " + account.holder());

    }

    database.put(account.holder(), account);

    return account;

    }

    @Override

    public void delete(String holder) {

    database.remove(holder);

    }

    @Override

    public void disconnect() {

    // no implementation needed

    }

    }

    Listing 9-34

    The FakeDBConnection Implementation

    ```


    The `FakeDBConnection` behaves exactly like a connection object that can be used
    to save entries to a database, search for them, or delete them, only instead of
    a database it is backed up by a `Map<String, Account>`. The map key will be the
    holder’s name, because in our database the holder name is used as a unique identifier
    for an `Account` entry in the table. Now that we have the fake object, we can
    test that our `AccountRepoImpl` behaves as expected. Because of practical reasons,
    only one method will be tested in this section, but the full code is available
    on the official GitHub repo for this book.


    Listing [9-35](#463938_3_En_9_Chapter.xhtml#PC55) shows a test class that tests
    methods that verify the behavior of the `findOne(..)` method. It contains a positive
    test method when there is an entry matching the criteria and a negative test method
    when there isn’t.


    ```

    package com.apress.bgn.nine;

    // other import statements omitted

    import static org.junit.jupiter.api.Assertions.*;

    public class FakeAccountRepoTest {

    private static final Logger log = LoggerFactory.getLogger(FakeAccountRepoTest.class);

    private static DbConnection conn;

    private AccountRepo repo;

    @BeforeAll

    static void prepare() {

    conn = new FakeDBConnection();

    }

    @BeforeEach

    public void setUp(){

    repo = new AccountRepoImpl(conn);

    // inserting an entry so we can test update/findOne

    repo.save(new Account("Pedala", 200, "2345"));

    }

    @Test

    public void testFindOneExisting(){

    Optional expected = repo.findOne("Pedala");

    assertTrue(expected.isPresent());

    }

    @Test

    public void testFindOneNonExisting(){

    Optional expected = repo.findOne("Dorel");

    assertFalse(expected.isPresent());

    }

    @Test

    public void testFindAll(){

    assertEquals(1, repo.findAll().size());

    }

    @Test

    public void testInsert(){

    Account expected = new Account("Gigi", 100, "12345");

    Account actual = repo.save(expected);

    assertEquals(expected, actual);

    }

    @Test

    public void testUpdate(){

    Account existing = conn.findByHolder("Pedala");

    int originalSum = existing.sum();

    var upAcc = new Account(existing.holder(), originalSum -50, existing.number());

    Account actual = repo.save(upAcc);

    assertEquals(upAcc.sum(),actual.sum());

    }

    @Test

    public void testDeleteExisting(){

    assertEquals( 0, repo.deleteByHolder("Pedala"));

    }

    @Test

    public void testDeleteNonExisting(){

    assertEquals( 1, repo.deleteByHolder("NotExisting"));

    }

    @AfterEach

    void tearDown(){

    // delete the entry

    repo.deleteByHolder("Pedala");

    }

    @AfterAll

    public static void cleanUp(){

    conn = null;

    log.info("All done!");

    }

    }

    Listing 9-35

    The FakeAccountRepoTest Test Class

    ```


    Notice how we are creating exactly one entry that is added to our fake database.


    Now that we are sure the repository class does its job properly, the next one
    to test is `AccountServiceImpl`. To test this class, we will look into a different
    approach. Fakes are useful, but writing one for a class with complex functionality
    can be quite costly. So what are the alternatives? There are a few. In the next
    section, we’ll look at stubs.'
