    Before writing code, let’s check out what other project settings are available.
    IntelliJ IDEA provides you access to view and edit project properties through
    the **File ➤ Project Structure** menu item. If you click it, a Project Structure
    dialog window will open, similar to the one depicted in Figure [3-16](#463938_3_En_3_Chapter.xhtml#Fig16).


