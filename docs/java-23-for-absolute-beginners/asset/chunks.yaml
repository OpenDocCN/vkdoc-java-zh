    compiler complaining about not being able to access that property. Also, calling
    all those setters just to set those properties is quite annoying, so we need to
    do something about that. Remember the implicit constructor? Developers can also
    declare constructors explicitly, and a class can have more than one. Constructors
    can be declared with parameters for each of the fields of interest. Listing [4-22](#463938_3_En_4_Chapter.xhtml#PC22)
    depicts a constructor for the `Human` class that initializes the class fields
    with the values of its parameters.


    ```

    package com.apress.bgn.four.base;

    public class Human {

    static final int LIFESPAN = 100;

    private String name;

    private int age;

    private float height;

    /**

    * Constructs a Human instance initialized with the given parameters.

    * @param name - the name for the Human instance

    * @param age - the age for the Human instance

    * @param height - the height for the Human instance

    */

    public Human(String name, int age, float height) {

    this.name = name;

    this.age = age;

    this.height = height;

    }

    // some code omitted

    }

    Listing 4-22

    Human Class with Explicit Constructor

    ```


    A constructor does not require a `return` statement, even if the result of calling
    a constructor is the creation of an object. Constructors are different from methods
    in that way.


    Note


    By declaring an explicit constructor, the default constructor is no longer generated.


    So creating a `Human` instance by calling the default constructor (as depicted
    in earlier code listings) does not work anymore. The code no longer compiles because
    the default constructor is no longer generated. To create a `Human` instance,
    we now have to call the new constructor and provide proper arguments in place
    of the parameters, having the correct types and respecting their declaration order.
    The default constructor invocation and the invocation of the custom constructor
    are shown in Listing [4-23](#463938_3_En_4_Chapter.xhtml#PC23).


    ```

    Human human = new Human("John", 40, 1.91f);  // this works

    Human human = new Human();  // this no longer works

    Listing 4-23

    Human Constructors

    ```


    But what if we do not want to be forced to set all fields using this constructor?
    We simply define another constructor with only the parameters we are interested
    in. Let’s define a constructor that sets only the name and the age for a `Human`
    instance, as depicted in Listing [4-24](#463938_3_En_4_Chapter.xhtml#PC24).


    ```

    package com.apress.bgn.four.base;

    public class Human {

    static final int LIFESPAN = 100;

    private String name;

    private int age;

    private float height;

    public Human(String name, int age) {

    this.name = name;

    this.age = age;

    }

    public Human(String name, int age, float height) {

    this.name = name;

    this.age = age;

    this.height = height;

    }

    // some code omitted

    }

    Listing 4-24

    Human Class with Explicit Constructors

    ```


    We’ve just stumbled upon another OOP principle called **polymorphism**. The term
    is Greek and translates to *one name, many forms*. Polymorphism applies to code
    design that has multiple methods all with the same name but slightly different
    signatures and functionality. It applies to constructors too. There are two basic
    types of polymorphism: **overriding**, also called *runtime polymorphism*, which
    we will cover a bit later with the coverage of the inheritance principle, and
    **overloading**, which is also referred to as *compile-time polymorphism*.


    The second type of polymorphism applies to the constructors in Listing [4-24](#463938_3_En_4_Chapter.xhtml#PC24),
    because we have two of them, one with a different set of parameters that looks
    like it is an extension of the simpler one.'
