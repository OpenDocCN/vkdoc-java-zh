  trans: '

    #### `<<` 左移运算符


    顾名思义，给定一个二进制表示的数字，此运算符用于将位向左移动。清单 6-38 中的代码展示了 `<<` 左移运算符的实际应用。


    ```

    package com.apress.bgn.six;

    // 导入已省略

    public class ShiftDemo {

    void main(){

    byte b1 = 12;

    print8Bits(b1);

    byte b2 = (byte) (b1 << 3);

    print8Bits(b2);

    }

    // print8Bits 方法已省略

    }

    // 输出

    /*

    decimal:12

    binary:00001100

    decimal:96

    binary:01100000

    */

    清单 6-38

    测试 << 运算符

    ```


    当位向左移动时，空出的位置用 0 填充。同时，数字会变大，新值是旧值乘以 `2^N`，其中 `N` 是第二个操作数。


    清单 6-38 中的代码可以写成 `b1 <<= 3`，使用复合运算符，无需声明另一个变量。结果是 `12 * 2³`。位的移动过程如图 6-7 所示。


    ![](img/463938_3_En_6_Fig7_HTML.jpg)


    图 6-7


    `<<` 运算符的效果


    警告


    移位运算符会将 `byte` 值提升为 `int`，以避免精度损失。在清单 6-38 中，要移动的位数足够小，结果仍在 `byte` 类型区间内。这就是为什么显式转换为
    `byte` 有效且结果仍然有效。但这并非总是可行，你将在本节后面看到。


    #### `>>` 右移运算符


    顾名思义，给定一个二进制表示的数字，此运算符用于将位向右移动。清单 6-39 中的代码展示了 `>>` 右移运算符的*实际应用*。


    ```

    package com.apress.bgn.six;

    // 导入已省略

    public class ShiftDemo {

    void main(){

    byte b1 = 96;

    print8Bits(b1);

    byte b2 = (byte) (b1 >> 3);

    print8Bits(b2);

    }

    // print8Bits 方法已省略

    }

    // 输出

    /*

    decimal:96

    binary:01100000

    decimal:12

    binary:00001100

    */

    清单 6-39

    测试 >> 运算符

    ```


    当位向右移动时，如果数字为正数，空出的位置用 0 填充。如果数字为负数，空出的位置用 1 替换。这样做是为了保留数字的符号。同时，数字会变小，新值是旧值除以
    `2^N`，其中 `N` 是第二个操作数。


    清单 6-39 中的代码可以写成 `b1 >>= 3`，使用复合运算符，无需声明另一个变量。所以结果是 `12 * 2³`。位的移动过程如图 6-8 所示。


    ![](img/463938_3_En_6_Fig8_HTML.jpg)


    图 6-8


    `>>` 运算符的效果


    图 6-8 和清单 6-39 都展示了应用于正数的右移运算符。当涉及到负数时，情况变得复杂，因为负数在内部以二进制补码形式表示。这意味着，要得到负数的表示，我们先得到正数的表示，翻转所有位，然后加
    1。图 6-9 描述了从 `7` 的表示开始，获取 `-7` 内部表示的过程。


    ![](img/463938_3_En_6_Fig9_HTML.jpg)


    图 6-9


    在内部以二进制补码表示负数


    `-7` 的二进制补码表示超出了 `byte` 范围，因此负数在内部表示为整数。这意味着 `print8Bits(..)` 方法需要替换为打印 `int`
    值所有 32 位的版本。清单 6-40 展示了将 `>>` 无符号右移运算符应用于负数的情况。


    ```

    package com.apress.bgn.six;

    // 导入已省略

    public class ShiftDemo {

    void main(){

    out.println( " -- ");

    int i1 = -96;

    print32Bits(i1);

    int i2 =  i1 >> 3;

    print32Bits(i2);

    }

    public static void print32Bits(int arg) {

    out.println("decimal:" + arg);

    String str = arg > 0 ?

    String.format("%32s", Integer.toBinaryString(arg)).replace('' '', ''0'') :

    String.format("%32s", Integer.toBinaryString(arg)).replace('' '', ''1'') ;

    out.println("binary: " + str);

    }

    }

    // 输出

    /*

    decimal:-96

    binary:11111111111111111111111110100000

    decimal:-12

    binary:11111111111111111111111111110100

    */

    清单 6-40

    使用负数测试 >> 运算符

    ```


    二进制补码表示的一个优点是，算术运算对于有符号和无符号运算符是相同的，这意味着 CPU 的算术逻辑单元只需要一半的电路。


    信息


    关于二进制补码表示的一个奇特之处在于，`Integer.MAX_VALUE` 和 `Integer.MIN_VALUE` 的表示方式相同，因为当整数加法溢出时，结果是数学和的低位，以某种足够大的二进制补码格式表示。


    #### `>>>` 无符号右移运算符


    `>>>` 无符号右移运算符也称为*逻辑移位*。给定一个二进制表示的数字，此运算符用于将位向右移动，并且无论值是正数还是负数，空出的位置都用 0 替换。这就是为什么结果总是一个正数。


    清单 6-41 展示了 `>>>` 运算符应用于负数值的情况。


    ```

    package com.apress.bgn.six;

    // 导入已省略

    public class ShiftDemo {

    void main(){

    System.out.println( " -- ");

    int i1 = -16;

    print32Bits(i1);

    int i2 = i1 >>> 1;

    print32Bits(i2);

    }

    // print32Bits 方法已省略

    }

    // 输出

    /*

    decimal:-16

    binary:11111111111111111111111111110000

    decimal:2147483640

    binary:01111111111111111111111111111000

    */

    清单 6-41

    使用负数值测试 >>> 运算符

    ```


    清单 6-41 中的代码可以写成 `i1 >>>= 1`，使用复合运算符，无需声明另一个变量。结果是一个非常大的正数。位的移动过程如图 6-10 所示。


    ![](img/463938_3_En_6_Fig10_HTML.jpg)


    图 6-10


    `>>>` 运算符对负数值的效果


    与所有位运算符一样，移位运算符会将 `char`、`byte` 或 `short` 类型的变量提升为 `int`，这就是为什么需要进行显式转换。你可能已经注意到，对负数进行位移操作很棘手，因为结果很容易超出某个类型允许值的范围，而显式转换可能导致精度损失甚至严重异常。那么为什么要使用它们呢？因为它们速度快。只需确保在使用移位运算符时进行充分测试。

    '
- fmt: '# The Elvis Operator


    The *Elvis operator* (`? :`) is the only ternary operator in Java. Its function
    is equivalent to a Java method that evaluates a condition and, depending on the
    outcome, returns a value. The template of the Elvis operator is depicted here:


    ```

    variable = (condition) ? val1 : val2

    ```


    The method equivalent to this operator is depicted in Listing [6-42](#463938_3_En_6_Chapter.xhtml#PC57).


    ```

    variable = methodName(..);

    type methodName(..) {

    if (condition) {

    return val1;

    } else {

    return val2;

    }

    }

    Listing 6-42

    The Elvis Operator Equivalent Method

    ```


    The reason this operator is named the *Elvis operator* is that, with a little
    imagination, the question mark resembles Elvis Presley’s hair and the colon resembles
    eyes. The Elvis operator can be easily tested in `jshell`, as depicted in Listing
    [6-43](#463938_3_En_6_Chapter.xhtml#PC58).


    ```

    jshell> int a = 4

    a ==> 4

    |  created variable a : int

    jshell> int result = a > 4 ? 3 : 1;

    result ==> 1

    |  created variable result : int

    jshell> String a2 = "test"

    a2 ==> "test"

    |  created variable a2 : String

    jshell> var a3 = a2.length() > 3 ? "hello": "bye-bye"

    a3 ==> "hello"

    |  created variable a3 : String

    Listing 6-43

    The Elvis Operator Example in JShell

    ```


    This operator is quite practical when you have a simple `if` statement that contains
    only one expression per branch, because using this operator enables you to compact
    the whole thing in one expression, one line of code. Just make sure when using
    it that the readability of the code is improved. From a performance point of view,
    there is no difference between an `if` statement and the equivalent Elvis operator
    expression. Another advantage of using the Elvis operator is that the expression
    can be used to initialize a variable.


    ## Summary


    In this chapter you learned the following:


    - Java has a lot of operators, simple and composed.

    - Java has the capability of converting instances of one type to another in the
    same statement where the check of the conversion is possible using `instanceof`.
    This is done via type, record, and primitive patterns.

    - Bitwise operators are fast, but dangerous.

    - Negative numbers are represented internally in 2’s complement.

    - The `+` operator does different things in different contexts.

    - Java has a ternary operator that accepts three operands: a boolean expression
    and two objects of the same type. The result of the evaluation of the boolean
    expression decides which operand is the result of the statement.


    The purpose of this chapter was just to make you familiar with all the operators
    that will be used throughout the book, to help you understand the provided solutions
    and even design and write your own.


