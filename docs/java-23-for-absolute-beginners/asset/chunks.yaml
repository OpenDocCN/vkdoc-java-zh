    仅通过查看此代码，你能判断哪些变量保存在栈上，哪些保存在堆上吗？让我们逐行分析程序，看看发生了什么：


    ![](images/463938_3_En_5_Chapter/463938_3_En_5_Fig1_HTML.jpg)


    图5-1 声明两个基本类型变量后的Java栈和堆内存


    *   程序启动后，JVM所需的运行时类被加载到堆内存中。

    *   在第06行发现`main(..)`方法，因此创建一个栈内存用于此方法的执行。

    *   第07行的基本类型局部变量`i=5`被创建并存储在`main(..)`方法的栈内存中。

    *   第08行的基本类型局部变量`j=7`被创建并存储在`main(..)`方法的栈内存中。此时，程序内存可以如图5-1所示。


    ![](images/463938_3_En_5_Chapter/463938_3_En_5_Fig2_HTML.jpg)


    图5-2 声明两个基本类型变量和一个对象后的Java栈和堆内存


    *   在第09行，声明了一个`java.util.Date`类型的对象，因此该对象被创建并存储在堆内存中，一个名为`d`的引用被保存在栈上。此时，程序内存如图5-2所示。


    ![](images/463938_3_En_5_Chapter/463938_3_En_5_Fig3_HTML.jpg)


    图5-3 调用`add(..)`方法后的Java栈和堆内存


    *   在第10行，使用参数`i`和`j`调用了`add(..)`方法。这意味着它们的值将被复制到此方法的局部变量`a`和`b`中，这两个变量将存储在此方法的内存块中。

    *   在`add(..)`方法体内，第16行声明了一个`String`实例。因此，`String`对象在堆内存的String Pool内存块中创建，名为`mess`的引用存储在栈上此方法的内存块中。此时，程序内存如图5-3所示。

    *   同样在第10行，`add(..)`方法执行的结果被存储到名为`result`的局部变量中。此时，`add(..)`方法已完成执行，因此其栈块被丢弃。因此，我们可以得出结论：存储在栈上的变量在其创建函数运行期间一直存在。在`main(..)`方法的栈内存中，保存了`result`变量。

    *   在第11行，调用了`print(..)`方法，但为了简单起见，我们跳过对此行的解释。

    *   在第12行，`d`引用被赋值为`null`，这意味着`Date`类型的对象现在仅在堆中，并且与`main(..)`方法的执行没有任何关联。在该行，JVM被指示该对象不再需要，因此可以安全地丢弃，这意味着包含它的空间可以被回收并用于存储其他对象。'
  raw: 'The **heap** memory is used at runtime to allocate memory for objects and
    JRE classes. Objects are instances of JDK classes or developer-defined classes.
    Any object created with `new` will be stored inside the heap memory. Objects created
    inside the heap memory can be accessed by all threads of the application. Access
    and management of the heap memory are a little more complex and will be covered
    more in **Chapter** [**13**](#463938_3_En_13_Chapter.xhtml), which covers garbage
    collection. The `-Xms` and `-Xmx` JVM parameters are used to set the initial and
    maximum size of the heap memory for a Java program during execution. The heap
    size may vary depending on the number of objects created by the program, and if
    all heap memory allocated to a Java program is full, then a `java.lang.OutOfMemoryError`
    is thrown. The default size for the heap memory depends on the available physical
    memory of the computer running the JVM, and its minimum and maximum values and
    other additional data can be extracted from the output of the `java -XX:+PrintFlagsFinal
    -version` too.


    Listing [5-2](#463938_3_En_5_Chapter.xhtml#PC2) shows the command being executed
    on my macOS computer, which has a total physical memory of 32GB. Again, the `grep`
    command filters the output for the criteria provided as an argument, thus resulting
    in a cleaner and scoped output.


    ```

    > java -XX:+PrintFlagsFinal -version | grep HeapSize

    #  Data Type  # Flag Name  #  = # Flag Value

    size_t MaxHeapSize         = 8589934592  # TODO make number bold

    size_t MinHeapSize         = 8388608     # TODO make number bold

