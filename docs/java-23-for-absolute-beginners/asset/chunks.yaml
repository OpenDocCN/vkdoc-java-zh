    \ 实例丢弃的。为了能够减慢元素提交的速度，我们添加了对 `Thread.sleep(1000)` 的调用，这基本上保证了每秒会有一个元素被向上游转发。\n\
    \n第一个处理器的名称将是 `FilterCharProcessor`，它将使用一个内部的 `SubmissionPublisher<Integer>` 实例，将其处理后的元素发送给下一个处理器。\n\
