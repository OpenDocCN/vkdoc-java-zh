    `throwIfFailed(..)` 方法会抛出由给定异常提供函数所产生的异常（前提是某个子任务失败）。当使用此方法时，如果任何子任务因异常而失败，则会调用该函数，并传入第一个失败子任务的异常。在此示例中，我们将子任务异常信息包含在函数返回的异常中。函数返回的异常会被抛出。如果没有子任务失败，此方法不执行任何操作。该方法还有一个不接受参数的版本，在这种情况下，会抛出一个包装了第一个失败子任务异常的
    `java.util.concurrent.ExecutionException`。


    另一件值得一提的事情是特殊的 `catch` 块。这种类型的 `catch` 块是在 Java 7 中引入的，旨在减少因需要处理多个异常而产生的重复代码：


    ```

    } catch (InterruptedException | TimeoutException | IllegalStateException e)  {

    // 处理异常

    }

    ```


    在 Java 7 之前，同样的代码块需要写成如下形式：


    ```

    } catch (InterruptedException e) {

    // 处理异常

    } catch (TimeoutException e) {

    // 处理异常

    } catch (IllegalStateException e) {

    // 处理异常

    }

    ```


    尽管 Java 5 中引入的 `java.util.concurrent.ExecutorService` API 已经支持并发执行子任务，但新的结构化并发
    API 帮助开发者编写出更易读、更易调试的代码，并且额外消除了因取消和关闭而产生的常见风险，例如线程泄漏和取消延迟。


    ## 总结


    在本章中，你学习了 JVM 如何管理 Java 程序的内存，以及最常用的 Java 数据类型的基础知识。以下列出本章中你应该记住的一些重要细节：


    *   JVM 管理两种类型的内存：栈内存和堆内存。


    *   原始类型和引用类型之间的区别。


    *   原始值存储在栈内存中，对象值存储在堆内存中。


    *   Java 中有八种原始数据类型：`boolean`、`char`、`short`、`byte`、`int`、`long`、`float`、`double`。


    *   引用只能是所赋值对象的超类型。


    *   数组的大小在创建时定义，之后无法更改。


    *   在 Java 中，`String` 实例是*不可变的*，这意味着它们一旦创建就无法更改。


    *   如果需要处理日历日期，请使用新的 DateTime API。


    *   `null` 既实用又强大。


    *   集合可以将对象类型分组为元组或键/值对。


    *   Java 中的经典并发在小规模使用时很有趣。


    *   虚拟线程是 Java 21 中引入的最有用的特性之一。


    *   结构化并发允许你编写并行执行任务的代码，而无需编写任何线程管理代码。


    本章中的一些示例可能看起来很复杂，但请不要气馁。如果不提供你可以执行、测试甚至自行修改的有效代码，就很难解释某些概念。不幸的是，这需要使用将在后续章节中介绍的概念（例如
    `for` 和 `if` 语句）。只需记下每个目前不清楚的概念及其页码，等你在本书后面详细阅读了相关概念后，再回到本章。


