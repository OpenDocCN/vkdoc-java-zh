- fmt: "# 8. The Stream API\n\nThe noun *stream* has more than one meaning, as defined\
    \ on [Dictionary.com](http://dictionary.com):\n\n1. a body of water flowing in\
    \ a channel or watercourse, as a river, rivulet, or brook\n2. a steady current\
    \ in water, as in a river or the ocean\n3. any flow of water or other liquid or\
    \ fluid\n4. a current or flow of air, gas, or the like\n5. a beam or trail of\
    \ light\n6. a continuous flow or succession of anything\n7. prevailing direction;\
    \ drift\n8. *Digital Technology*\n   1. a flow of data, as an audio broadcast,\
    \ a movie, or live video, transmitted smoothly and continuously from a source\
    \ to a computer, mobile device, etc.\n   2. livestream\n\nWhen it comes to the\
    \ term *stream* in the context of programming, the definitions in the preceding\
    \ list that are closest to what a stream is are numbers 6 and 8a. Indeed, in programming,\
    \ a stream is a sequence of objects from a source that supports aggregate operations\
    \ (operations that accumulate all values in a stream). In your mind, you might\
    \ be thinking the more appropriate term is *collection*. Well…not quite. This\
    \ chapter will make the distinction clear.\n\n## Introduction to Streams\n\nConsider\
    \ a really big collection of songs that we want to analyze and find all songs\
    \ with duration of at least 300 seconds. For these songs, we want to save the\
    \ names in a list and sort them in decreasing order of their duration. Assuming\
    \ we already have the songs in a list, the code looks like Listing [8-1](#463938_3_En_8_Chapter.xhtml#PC1).\n\
    \n```\n// non-relevant code omitted\nList songList = loadSongs();\nList resultedSongs\
    \ = new ArrayList();\n//find all songs with duration of at least 300 seconds\n\
    for (Song song: songList) {\nif (song.getDuration() >= 300) {\nresultedSongs.add(song);\n\
    }\n}\nCollections.sort(resultedSongs, new Comparator(){\npublic int compare(Song\
    \ s1, Song s2){\nreturn s2.getDuration().compareTo(s1.getDuration());\n}\n});\n\
    System.out.println(resultedSongs);\nList finalList0 = new ArrayList();\nfor (Song\
    \ song: resultedSongs) {\nfinalList0.add(song.getTitle()); // only the song title\
    \ is required\n}\nSystem.out.println(\"Before Java 8: \" + finalList0);\nListing\
    \ 8-1\nJava Code Made of a Few Statements\n```\n\nOne of the problems with this\
    \ code is that processing large collections is not very efficient. Also, we are\
    \ traversing lists over and over again and performing checks to get to a final\
    \ result. Wouldn’t it be more efficient if we could execute all those operations\
    \ on every element one by one, without repeated traversals? It would be, and it\
    \ is possible to do so starting with Java 8.\n\nThe new `Stream` abstraction introduced\
    \ in Java 8 represents a sequence of elements that can be processed sequentially\
    \ or in parallel and supports aggregate operations. Because of the latest evolutions\
    \ in hardware development, CPUs have become more powerful and more complex, containing\
    \ multiple cores that can process information in parallel. To make use of these\
    \ hardware capabilities, in Java, the Fork Join Framework was introduced. And\
    \ in Java 8, the Stream API was introduced to support parallel data processing,\
    \ without the boilerplate code of defining and synchronizing threads.\n\nThe central\
    \ interface of the Stream API is `java.util.stream.BaseStream`. Any object with\
    \ stream capabilities is of a type that extends this interface. A stream does\
    \ not store elements itself, because it is not a data structure; it is just used\
    \ to compute elements and serve them on demand to an operation or a set of aggregate\
    \ operations.\n\n*Aggregate operations* are special methods in the Stream API\
    \ with the following characteristics:\n\n- They support behavior as parameters.\
    \ Most aggregate operations support lambda expressions as parameters.\n- They\
    \ use internal iteration. Internal iteration does not go over the elements sequentially,\
    \ thus taking advantage of parallel computing. Internal iteration splits a problem\
    \ into subproblems, solves them simultaneously, then combines the results.\n-\
    \ They process the elements from a stream, not directly from the stream origin.\n\
    \nServing the elements in a sequence involves an internal automatic iteration.\
    \ Operations that return a stream can be chained in a pipeline, and are called\
    \ **intermediate operations**. Operations process elements of a stream and return\
    \ the result as a stream to the next operation in the pipeline. Operations that\
    \ return a result that is not a stream are called **terminal operations** and\
    \ are normally present at the end of a pipeline. As a quick example before getting\
    \ deeper into using streams, the code in Listing [8-1](#463938_3_En_8_Chapter.xhtml#PC1)\
    \ is rewritten as depicted in Listing [8-2](#463938_3_En_8_Chapter.xhtml#PC2),\
    \ and it is called a **stream pipeline**.\n\n```\nList finalList = songList.stream()\n\
    .filter(s -> s.getDuration() >= 300)\n.sorted(Comparator.comparing(Song::getDuration).reversed())\n\
    .map(Song::getTitle)\n.collect(Collectors.toList());\nSystem.out.println(finalList);\n\
    Listing 8-2\nCode in Listing 8-1 Rewritten with Streams\n```"
