    Because of their nonblocking nature, Java channels are suitable for applications
    that handle data provided by multiple sources, such as applications that manage
    connections with multiple sources over a network. Figure 11-7 depicts the most
    important members of the `Channel` hierarchy.


    ![](images/463938_3_En_11_Chapter/463938_3_En_11_Fig7_HTML.jpg)


    Figure 11-7 The `Channel` class/interface hierarchy


    The `DatagramChannel` can read and write data over the network via UDP. The `SocketChannel`
    can read and write data over the network via TCP, and the `ServerSocketChannel`
    allows you to listen for incoming TCP connections, like a web server does. For
    each incoming connection, a `SocketChannel` is created.


    The Java NIO components (interfaces and classes) were introduced to complement
    existing Java IO functionality. Java IO reads or writes one byte or character
    at a time. Buffering makes use of Java heap memory, which can become problematic
    when files of considerable sizes are used. When Java NIO was released, there was
    a statement from Oracle that NIO was more efficient and had better performance
    than pure Java I/O, but it all depends on the application you are trying to build.
    Java NIO introduces the possibility to handle raw bytes in bulk, the possibility
    of asynchronous operations, and off-heap buffering. Buffers are created outside
    the central memory of the JVM, in portions of memory not handled by the garbage
    collector. This allows for larger buffers to be created, so bigger files can be
    read without the danger of an `OutOfMemoryException` being thrown because the
    JVM is out of memory.


    If you ever find yourself needing to handle a lot of data, make sure to read the
    JDK NIO documentation very well, because this section has just scratched the surface.


    ## Serialization and Deserialization


    *Serialization* is the name given to the operation of converting the state of
    an object to a byte sequence. In this format it can be sent over a network or
    written to a file and reverted into a copy of that object. The operation to convert
    the byte sequence back to an object is named *deserialization*. Java serialization
    has been a controversial topic, with Java Platform Chief Architect Mark Reinhold
    describing it as a horrible mistake made in 1997. Apparently, most Java vulnerabilities
    are somehow related to the way serialization is done in Java, and there is a project
    named Project Amber that is dedicated to removing Java serialization completely
    and allowing developers to choose the serialization in a format of their choice.'
