    ```


    因为 `Builder<T>` 接口是一个泛型接口，所以必须指定一个类型参数，作为流中元素的类型。此外，`builder()` 方法是泛型的，需要在调用它之前将类型作为参数提供给它。如果未指定类型，则使用默认的
