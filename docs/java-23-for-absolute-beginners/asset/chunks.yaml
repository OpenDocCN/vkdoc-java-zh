    # 13. 垃圾回收


    在执行 Java 代码时，对象会在内存中被反复创建、使用和丢弃。丢弃未使用的 Java 对象的过程称为**内存管理**，但更常见的叫法是**垃圾回收 (GC)**。在**第**
    **5** **章**中曾提到垃圾回收，因为解释原始类型和引用类型之间的区别时需要它，但在本章中，我们将深入 JVM 的*内部机制*，以解开运行中的 Java
    应用程序的另一个谜团。


    当 Java 垃圾回收器正常工作，在创建新对象之前清理内存，并且内存不会填满时，你可以说分配给程序的内存被*回收*了。像我们到目前为止编写的这种低复杂度的程序，运行时不需要那么多内存，但根据其设计（还记得第
    4 章介绍的递归吗？），它们最终可能会使用比可用内存更多的内存。在 Java 中，垃圾回收器会自动运行。在像 C/C++ 这样的更底层的语言中，没有自动内存管理，开发人员负责编写代码来根据需要分配内存，并在不再需要时释放它。虽然自动内存管理看起来很实用，但如果管理不当，垃圾回收器可能会成为一个问题。本章提供了关于垃圾回收器的足够信息，以确保你知道如何明智地使用它，并且当问题出现时，至少你有一个好的起点来开始修复它们。


    虽然会介绍一些调整垃圾回收器的方法，但请记住，通常不应该需要调整垃圾回收器。程序的编写方式应该使其只创建执行其功能所需的对象，并正确管理引用；在应用程序投入生产之前，应该估算运行应用程序的服务器的内存容量，并且在此之前应该知道并配置应用程序所需的最大内存量。如果分配给
    Java 程序的内存不足，通常意味着实现中存在某些问题。


    ## 垃圾回收基础


    Java 自动垃圾回收是 Java 编程语言的主要特性之一。正如本书开头所述，JVM 是用于执行 Java 程序的虚拟机。Java 程序使用 JVM 所运行系统的资源，因此它必须有一种安全释放这些资源的方法。这项工作由垃圾回收器完成。


    垃圾回收器的性能根据以下三个因素进行评估：


    *   **吞吐量**：进程完成应用程序工作的速率。理想情况下，JVM 应该花更多时间运行应用程序，而花更少时间执行垃圾回收。

    *   **内存占用**：垃圾回收器所需的内存量。

    *   **暂停时间**：在垃圾回收期间应用程序停止的时间长度。


    要理解垃圾回收器在所有 JDK 组件中的位置，我们必须查看 JVM 架构^((127))。

