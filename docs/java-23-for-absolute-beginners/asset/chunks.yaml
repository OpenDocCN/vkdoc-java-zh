- fmt: "### Modules\n\nStarting with Java 9, a new concept was introduced: `modules`.\n\
    \n**Important:** Build tools such as Maven or Gradle refer to subprojects as modules\
    \ as well, but their purpose is different from that of the Java modules.\n\nJava\
    \ modules represent a more powerful mechanism to organize and aggregate packages.\
    \ The implementation of this new concept took more than ten years. The discussion\
    \ about modules started in 2005, and the hope was for them to be implemented for\
    \ Java 7. Under the name **Project Jigsaw**, an exploratory phase eventually started\
    \ in 2008. Java developers hoped a modular JDK would be available with Java 8,\
    \ but that did not happen.\n\nModules finally arrived in Java 9 after three years\
    \ of work (and almost seven years of analysis). Supporting modules delayed the\
    \ official release date of Java 9 to September 2017.\n\n**Note:** The full history\
    \ of the Jigsaw project can be found here: [`https://openjdk.java.net/projects/jigsaw`](https://openjdk.java.net/projects/jigsaw)\n\
    \nA **Java module** is a way to group packages and configure more-granulated access\
    \ to package contents. A Java module is a uniquely named, reusable group of packages\
    \ and resources (e.g., XML files and other types of non-Java files) described\
    \ by a file named `module-info.java`, located at the root of the source directory.\
    \ This file contains the following information:\n\n- The module’s name\n- The\
    \ module’s dependencies (that is, other modules this module depends on)\n- The\
    \ packages the module explicitly makes available to other modules (all other packages\
    \ in the module are implicitly unavailable to other modules)\n- The services the\
    \ module offers\n- The services the module consumes\n- To what other modules it\
    \ allows reflection\n- Native code\n- Resources\n- Configuration data\n\nIn theory,\
    \ module naming resembles package naming and follows the reversed-domain-name\
    \ convention. In practice, just make sure the module name does not contain any\
    \ numbers and that it reveals clearly what its purpose is. The `module-info.java`\
    \ file is compiled into a module descriptor, which is a file named `module-info.class`\
    \ that is packed together with classes into a plain old JAR file.\n\nThe file\
    \ is located at the root of the Java source directory, outside of any package.\
    \ For the `chapter03` project introduced earlier, the `module-info.java` file\
    \ is located in the `src/main/java` directory, at the same level with the `com`\
    \ directory; the root of the `com.apress.bgn.three` package is shown in Figure\
    \ [3-11](#463938_3_En_3_Chapter.xhtml#Fig11).\n\n![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig11_HTML.jpg)\n\
    \n**Figure 3-11** Location of the `module-info.java` file\n\nAs with any file\
    \ with the `*.java` extension, the `module-info.java` file is compiled into a\
    \ `*.class` file. As the module declaration is not a part of Java type declaration,\
    \ `module` is not a Java keyword, so it can still be used when writing code for\
    \ Java types (as a variable name, for example). For `package` the situation is\
    \ different, as every Java type declaration must start with a package declaration.\
    \ Just take a look at the `SimpleReader` class declared in Listing [3-8](#463938_3_En_3_Chapter.xhtml#PC8).\n\
    \n```\npackage com.apress.bgn.three;\npublic class SimpleReader {\n    private\
    \ String source;\n    // code omitted\n}\n```\n\n**Listing 3-8** `SimpleReader`\
    \ Class\n\nYou can see the package declaration, but where is the module? Well,\
    \ the module is an abstract concept, described by the `module-info.java` file.\
    \ So, starting with Java 9, if you are configuring Java modules in your application,\
    \ Figure [3-4](#463938_3_En_3_Chapter.xhtml#Fig4) evolves into Figure [3-12](#463938_3_En_3_Chapter.xhtml#Fig12).\n\
    \n![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig12_HTML.jpg)\n\n**Figure 3-12**\
    \ Java modules represented visually\n\nA Java module is a way to logically group\
    \ Java packages that belong together.\n\nThe introduction of modules allows for\
    \ the JDK to be divided into modules too. The `java --list-modules` command lists\
    \ all modules in your local JDK installation. Listing [3-9](#463938_3_En_3_Chapter.xhtml#PC9)\
    \ depicts the output of this command executed on my personal computer, where currently\
    \ JDK 23 is installed.\n\n```\n$ java --list-modules\njava.base@23\njava.compiler@23\n\
    java.datatransfer@23\njava.desktop@23\n# some output omitted\n```\n\n**Listing\
    \ 3-9** JDK 23 Modules\n\nEach module name is followed by a version string, `@23`\
    \ in the previous listing, which means that the module belongs to Java version\
    \ 23. So if a Java application does not require all modules, you can create a\
    \ runtime with only the modules that it needs, which reduces the runtime’s size.\
    \ The tool to build a smaller runtime customized to an application’s needs is\
    \ called `jlink` and is part of the JDK executables. This allows for bigger levels\
    \ of scalability and increased performance. How to use `jlink` is not a topic\
    \ of this book. The focus of the book is learning the Java programming language,\
    \ so the technical details of the Java platform will be kept to a minimum—just\
    \ enough to start writing and executing code confidently.\n\nThere are multiple\
    \ benefits of introducing modules that more experienced developers have been waiting\
    \ for years to take advantage of. However, configuring modules for bigger and\
    \ more complex projects is no walk in the park, and most software companies prefer\
    \ to avoid configuring modules altogether.\n\nThe contents of the `module-info.java`\
    \ file can be as simple as the name of the module and two brackets containing\
    \ the body, as shown in Listing [3-10](#463938_3_En_3_Chapter.xhtml#PC10).\n\n\
    ```\nmodule chapter.three {\n}\n```\n\n**Listing 3-10** A Simple `module-info.java`\
    \ Configuration"
  raw: '### Modules


    Starting with Java 9 a new concept was introduced: `modules`.


    Important


    Build tools such as Maven or Gradle refer to subprojects as modules as well, but
    their purpose is different from that of the Java modules.


    Java modules represent a more powerful mechanism to organize and aggregate packages.
    The implementation of this new concept took more than ten years. The discussion
    about modules started in 2005, and the hope was for them to be implemented for
    Java 7\. Under the name **Project Jigsaw**, an exploratory phase eventually started
    in 2008\. Java developers hoped a modular JDK would be available with Java 8,
    but that did not happen.


    Modules finally arrived in Java 9 after three years of work (and almost seven
    years of analysis). Supporting modules delayed the official release date of Java
    9 to September 2017.


    Note


    The full history of the Jigsaw project can be found here: [`https://openjdk.java.net/projects/jigsaw`](https://openjdk.java.net/projects/jigsaw)


    A **Java module** is a way to group packages and configure more-granulated access
    to package contents. A Java module is a uniquely named, reusable group of packages
    and resources (e.g., XML files and other types of non-Java files) described by
    a file named `module-info.java`, located at the root of the source directory.
    This file contains the following information:


    *   The module’s name


    *   The module’s dependencies (that is, other modules this module depends on)


    *   The packages the module explicitly makes available to other modules (all other
    packages in the module are implicitly unavailable to other modules)


    *   The services the module offers


    *   The services the module consumes


    *   To what other modules it allows reflection


    *   Native code


    *   Resources


    *   Configuration data


    In theory, module naming resembles package naming and follows the reversed-domain-name
    convention. In practice, just make sure the module name does not contain any numbers
    and that it reveals clearly what its purpose is. The `module-info.java` file is
    compiled into a module descriptor, which is a file named `module-info.class` that
    is packed together with classes into a plain old JAR file.


    The file is located at the root of the Java source directory, outside of any package.
    For the `chapter03` project introduced earlier, the `module-info.java` file is
    located in the `src/main/java` directory, at the same level with the `com` directory;
    the root of the `com.apress.bgn.three` package is shown in Figure [3-11](#463938_3_En_3_Chapter.xhtml#Fig11).


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig11_HTML.jpg)


    Figure 3-11


    Location of the `module-info.java` file


    As with any file with the `*.java` extension, the `module-info.java` file is compiled
    into a `*.class` file. As the module declaration is not a part of Java type declaration,
    `module` is not a Java keyword, so it can still be used when writing code for
    Java types (as a variable name, for example). For `package` the situation is different,
    as every Java type declaration must start with a package declaration. Just take
    a look at the `SimpleReader` class declared in Listing [3-8](#463938_3_En_3_Chapter.xhtml#PC8).


    ```

    package com.apress.bgn.three;

    public class SimpleReader {

    private String source;

    // code omitted

    }

    Listing 3-8

    SimpleReader Class

    ```


    You can see the package declaration, but where is the module? Well, the module
    is an abstract concept, described by the `module-info.java` file. So, starting
    with Java 9, if you are configuring Java modules in your application, Figure [3-4](#463938_3_En_3_Chapter.xhtml#Fig4)
    evolves into Figure [3-12](#463938_3_En_3_Chapter.xhtml#Fig12).


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig12_HTML.jpg)


    Figure 3-12


    Java modules represented visually


    A Java module is a way to logically group Java packages that belong together.


    The introduction of modules allows for the JDK to be divided into modules too.
    The `java --list-modules` command lists all modules in your local JDK installation.
    Listing [3-9](#463938_3_En_3_Chapter.xhtml#PC9) depicts the output of this command
    executed on my personal computer, where currently JDK 23 is installed.


    ```

    $ java --list-modules

    java.base@23

    java.compiler@23

    java.datatransfer@23

    java.desktop@23

    # some output omitted

    Listing 3-9

    JDK 23 Modules

    ```


    Each module name is followed by a version string, @23 in the previous listing,
    which means that the module belongs to Java version 23\. So if a Java application
    does not require all modules, you can create a runtime with only the modules that
    it needs, which reduces the runtime’s size. The tool to build a smaller runtime
    customized to an application’s needs is called `jlink` and is part of the JDK
    executables. This allows for bigger levels of scalability and increased performance.
    How to use `jlink` is not a topic of this book. The focus of the book is learning
    the Java programming language, so the technical details of the Java platform will
    be kept to a minimum—just enough to start writing and executing code confidently.


    There are multiple benefits of introducing modules that more experienced developers
    have been waiting for years to take advantage of. However, configuring modules
    for bigger and more complex projects is no walk in the park, and most software
    companies prefer to avoid configuring modules altogether.


    The contents of the `module-info.java` file can be as simple as the name of the
    module and two brackets containing the body, as shown in Listing [3-10](#463938_3_En_3_Chapter.xhtml#PC10).


    ```

    module chapter.three {

    }

    Listing 3-10

    A Simple module-info.java Configuration

    ```'
  trans: '

    ### 模块


    从 Java 9 开始，引入了一个新概念：`modules`。


    重要提示


    诸如 Maven 或 Gradle 这类构建工具也将子项目称为模块，但其用途与 Java 模块不同。


    Java 模块代表了一种更强大的机制来组织和聚合包。这个新概念的实施耗时超过十年。关于模块的讨论始于 2005 年，原本希望能在 Java 7 中实现。在
    **Project Jigsaw** 的名义下，探索阶段最终于 2008 年开始。Java 开发者曾希望模块化的 JDK 能随 Java 8 一起提供，但这并未实现。


    经过三年的工作（以及近七年的分析），模块最终在 Java 9 中到来。支持模块将 Java 9 的官方发布日期推迟到了 2017 年 9 月。


    注意


    Jigsaw 项目的完整历史可在此处找到：[`https://openjdk.java.net/projects/jigsaw`](https://openjdk.java.net/projects/jigsaw)


    **Java 模块**是一种对包进行分组并配置对包内容进行更细粒度访问的方式。一个 Java 模块是一个具有唯一名称、可重用的包和资源（例如，XML 文件和其他类型的非
    Java 文件）组，由一个名为 `module-info.java` 的文件描述，该文件位于源目录的根目录。此文件包含以下信息：


    *   模块的名称

    *   模块的依赖项（即，此模块依赖的其他模块）

    *   模块明确提供给其他模块的包（模块中的所有其他包默认对其他模块不可用）

    *   模块提供的服务

    *   模块消费的服务

    *   允许哪些其他模块进行反射

    *   本地代码

    *   资源

    *   配置数据


    理论上，模块命名类似于包命名，并遵循反向域名约定。实践中，只需确保模块名称不包含任何数字，并能清晰表明其用途即可。`module-info.java` 文件被编译成一个模块描述符，这是一个名为
    `module-info.class` 的文件，它与类一起被打包到一个普通的 JAR 文件中。


    该文件位于 Java 源目录的根目录，在任何包之外。对于之前介绍的 `chapter03` 项目，`module-info.java` 文件位于 `src/main/java`
    目录中，与 `com` 目录同级；`com.apress.bgn.three` 包的根目录如图 3-11 所示。


    ![](img/463938_3_En_3_Fig11_HTML.jpg)


    图 3-11


    `module-info.java` 文件的位置


    与任何扩展名为 `*.java` 的文件一样，`module-info.java` 文件被编译成一个 `*.class` 文件。由于模块声明不是 Java
    类型声明的一部分，`module` 不是一个 Java 关键字，因此在为 Java 类型编写代码时（例如，作为变量名）仍然可以使用它。对于 `package`
    来说情况不同，因为每个 Java 类型声明都必须以包声明开头。只需看一下清单 3-8 中声明的 `SimpleReader` 类。


    ```

    package com.apress.bgn.three;

    public class SimpleReader {

    private String source;

    // 代码省略

    }

    清单 3-8

    SimpleReader 类

    ```


    你可以看到包声明，但模块在哪里？嗯，模块是一个抽象概念，由 `module-info.java` 文件描述。因此，从 Java 9 开始，如果你在应用程序中配置
    Java 模块，图 3-4 将演变为图 3-12。


    ![](img/463938_3_En_3_Fig12_HTML.jpg)


    图 3-12


    Java 模块的视觉表示


    Java 模块是一种将属于同一逻辑组的 Java 包进行逻辑分组的方式。


    模块的引入也使得 JDK 可以被划分为模块。`java --list-modules` 命令列出本地 JDK 安装中的所有模块。清单 3-9 展示了在我的个人电脑上执行此命令的输出，当前安装的是
    JDK 23。


    ```

    $ java --list-modules

    java.base@23

    java.compiler@23

    java.datatransfer@23

    java.desktop@23

    # 部分输出省略

    清单 3-9

    JDK 23 模块

    ```


    每个模块名称后跟一个版本字符串，在上面的清单中是 @23，这意味着该模块属于 Java 版本 23。因此，如果 Java 应用程序不需要所有模块，你可以创建一个仅包含所需模块的运行时，这可以减小运行时的大小。用于构建针对应用程序需求定制的更小运行时的工具称为
    `jlink`，它是 JDK 可执行文件的一部分。这允许更高的可扩展性和性能提升。如何使用 `jlink` 不是本书的主题。本书的重点是学习 Java 编程语言，因此
    Java 平台的技术细节将保持最少——足以让你自信地开始编写和执行代码。


    引入模块有诸多好处，经验丰富的开发者多年来一直期待利用这些优势。然而，为更大、更复杂的项目配置模块并非易事，大多数软件公司宁愿完全避免配置模块。


    `module-info.java` 文件的内容可以像模块名称和包含主体的两个大括号一样简单，如清单 3-10 所示。


    ```

    module chapter.three {

    }

    清单 3-10

    一个简单的 module-info.java 配置

    ```

