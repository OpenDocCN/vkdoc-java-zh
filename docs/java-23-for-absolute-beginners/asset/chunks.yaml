    The `RandomAccessFile` class constructor has a second argument named `mode` that
    specifies the access mode in which the file is to be opened. Or in more human
    language: the mode describes what your code intends to do with the file. The `mode`
    parameter can be set any of the following values:


    * `r`: The file is open for reading only. Attempts to write to this file will
    cause an `IOException` to be thrown.

    * `rw`: The file is open for reading and writing.

    * `rws`: The file is open for reading and writing and also requires that every
    update to the file’s content or metadata be written synchronously to the underlying
    storage device.

    * `rwd`: The file is open for reading and writing and also requires that every
    update to the file’s content be written synchronously to the underlying storage
    device.


    If the `mode` parameter it is set to anything else, an `IllegalArgumentException`
    is thrown.


    Making a copy of a file is simple as well; it’s just about moving the data from
    a channel to another using a buffer, as shown in Listing 11-31.


    ```java

    package com.apress.bgn.eleven.nio;

    import java.io.RandomAccessFile;

    import java.nio.ByteBuffer;

    import java.nio.channels.FileChannel;

    // other import statements omitted

    public class DuplicateImageDemo {

    private static final Logger LOGGER = LoggerFactory.getLogger(DuplicateImageDemo.class);

    void main() {

    LOGGER.info("-- Image duplicated using FileChannel -- ");

    final String inDir = "chapter11/read-write-file/src/main/resources/input/";

    final String outDir = "chapter11/read-write-file/src/main/resources/output/";

    try (FileChannel source = new RandomAccessFile(inDir + "the-beach.jpg", "r").getChannel();

    FileChannel dest = new RandomAccessFile(outDir + "copy-the-beach.jpg", "rw").getChannel())
    {

    ByteBuffer buffer = ByteBuffer.allocateDirect(48);

    while (source.read(buffer) != -1) {

    buffer.flip();

    while (buffer.hasRemaining()) {

    dest.write(buffer);

    }

    buffer.clear();

    }

    } catch (Exception e) {

    LOGGER.debug("Image could not be copied! ", e);

    }

    }

    }

