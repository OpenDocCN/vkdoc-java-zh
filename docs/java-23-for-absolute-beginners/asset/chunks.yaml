    *Listing 8-12 Creating Stream Using a Supplier and Lambda Expressions*


    如果`Supplier<Integer>.get()`总是返回相同的数字，无论这样的流多么无用，之前的声明将变为：


    ```java

    Stream generated = Stream.generate( () -> 5 ).limit(15);

    ```


    如果需要更多控制`Stream<T>`实例发出的元素，可以使用`iterate(..)`方法。该方法有两个版本，一个在Java 8中添加，另一个在Java
    9中添加。使用任一版本的方法就像使用`for`语句生成流的条目。


    Java 8版本的`iterate(..)`方法用于生成无限流。该版本的方法接收一个称为`seed`的初始值和一个迭代`step`作为参数。


    Java 9版本的`iterate(..)`方法用于生成有限流。该版本的方法接收一个称为`seed`的初始值、一个决定何时停止迭代的`predicate`，以及一个迭代`step`作为参数。


    **重要**


    *谓词*是函数式接口`java.util.function.Predicate<T>`的内联实现，该接口声明了一个名为`test(T t)`的单一方法，返回一个布尔值。该方法的实现应测试其类型为`T`的单个参数是否满足某个条件，如果条件满足则返回`true`，否则返回`false`。


    **重要**


    迭代步骤是函数式接口`java.util.function.UnaryOperator<T>`的内联实现，用于表示对单个操作数执行操作并生成与其操作数相同类型的结果。


    在以下示例中，流元素从0开始生成，步长为5，并且只要值小于50（由谓词定义）就持续生成：


    ```java

    Stream iterated = Stream.iterate(0, i -> i < 50, i -> i + 5);

    ```


    类似于`for`语句，如果没有谓词，你将调用Java 8中引入的该方法版本，此时必须使用`limit(..)`方法来确保流是有限的。


    ```java

    Stream iterated = Stream.iterate(0, i -> i + 5).limit(15);

    ```


    在Java 9中，除了`limit(..)`方法之外，另一种控制流中值数量的方法是`takeWhile(..)`方法。该方法从原始流中获取与作为参数传入的谓词匹配的最长元素集，从第一个元素开始。这对于有序流效果良好，但如果流是无序的，结果将是任何匹配谓词的元素集，包括空集。


    为了解释调用`takeWhile(..)`所产生的不同流，首先需要讨论流的**顺序**概念。


    **遭遇顺序**表示`Stream<T>`实例遭遇数据的顺序。流的遭遇顺序由源和中间操作定义。例如，如果使用数组作为源，流的遭遇顺序由数组中的顺序定义。如果使用列表作为源，遭遇顺序是列表的迭代顺序。如果使用集合作为源，则没有遭遇顺序，因为集合本质上是无序的。


    流管道中的每个中间操作都会影响遭遇顺序，其效果如下：


    *   可以对输出施加遭遇顺序。例如，`sorted()`操作对无序流施加遭遇顺序。

    *   保留遭遇顺序。某些操作如`filter(..)`可能会丢弃一些元素，但原始顺序不受影响。

    *   破坏遭遇顺序。例如，`sorted()`操作对有序流施加遭遇顺序，替换现有的顺序。


    如果收集器操作将元素累积到具有遭遇顺序的容器中，则会保留遭遇顺序。顺序流和并行流在排序方面具有相同的属性。


    清单[8-13](#463938_3_En_8_Chapter.xhtml#PC17)展示了`takeWhile(Predicate<? super T>
    predicate)`方法的两种用法。


    ```java

    package com.apress.bgn.eight;

    import java.util.stream.Stream;

    import static java.lang.System.out;

    public class FiniteStreamsDemo {

    void main() {

    // (1)

    Stream orderedStream = List.of( 3, 6, 9, 11, 12, 13, 15).stream();

    Stream result = orderedStream.takeWhile(s -> s % 3 == 0);

    result.forEach(s -> out.print(s + " "));

    // output: 3 6 9

    // (2)

    Stream unorderedStream = Set.of(3, 6, 9, 2, 4, 8, 12, 36, 18, 42, 11, 13).stream();

    result = unorderedStream.parallel().takeWhile(s -> s % 3 == 0);

    result.forEach(s -> out.print(s + " "));

    // output (maybe): 3 12 36

    }

    }

    ```

    *Listing 8-13 Creating a Stream Using a Supplier and the takeWhile(..) Method*


    第一个代码块在有序整数流上使用`takeWhile(..)`，并返回一个包含能被3整除的元素的流。结果流包含元素*3 6 9*，因为这是第一个匹配给定谓词的元素集。


    如果在无序流上调用`takeWhile(..)`，如第二个代码块所示，结果将是不可预测的。结果可能是*3 6 9*或*12 36 18 42*，因为结果是任何匹配谓词元素的子集。此外，由于顺序不固定，代码块可能最终打印*6
    3 9*或*9 3 6*等。因此，在无序流上调用`takeWhile(..)`的结果是**非确定性的**。


    `takeWhile(..)`方法是`dropWhile(..)`方法的“姐妹”方法，同样在Java 9中引入。顾名思义，`dropWhile(..)`执行与`takeWhile(..)`完全相反的操作：对于有序流，它返回一个由丢弃最长匹配谓词元素集后剩余元素组成的新流。对于无序流，结果是不确定的，因为任何匹配谓词的子集都可能被丢弃，包括空流。清单[8-14](#463938_3_En_8_Chapter.xhtml#PC18)展示了`dropWhile(..)`方法的两种用法。


    ```java

    package com.apress.bgn.eight;

    import java.util.stream.Stream;

    import static java.lang.System.out;

    public class FiniteStreamsDemo {

    void main() {

    List.of( 3, 6, 9, 11, 12, 13, 15).stream()

    .dropWhile(s -> s % 3 == 0 )

    .forEach(s -> out.print(STR."\{s} "));

    // output: 11 12 13 15

    Set.of(3, 6, 9, 2, 4, 8, 12, 36, 18, 42, 11, 13).stream()

    .parallel()

    .dropWhile(s -> s % 3 == 0 ).forEach(s -> out.print(STR."\{s} "));

    // output (maybe): 2 4 8 12 36 18 42 11 13

    }

    }

    ```

    *Listing 8-14 Creating Stream Using a Supplier and the dropWhile(..) Method*


    如果这两个操作应用于并行流，唯一改变的是元素打印的顺序，但结果集将包含相同的元素。'
