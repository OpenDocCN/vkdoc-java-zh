    Before the `Files` class and its fancy methods were introduced, there were other
    ways to read files. The fancy methods are also not designed for reading big files,
    or for reading only parts of a file. Let’s take a trip to the past and slowly
    analyze how things have evolved.


    Before Java 6, to read a file line by line, you would have to write a contraption
    such as the one in Listing [11-17](#463938_3_En_11_Chapter.xhtml#PC32).


    ```

    package com.apress.bgn.eleven.io;

    import java.io.BufferedReader;

    import java.io.FileReader;

    // other imports omitted

    public class ReadersDemo {

    private static final Logger LOGGER = LoggerFactory.getLogger(ReadersDemo.class);

    void main() {

    BufferedReader reader = null;

    final String inDir = "chapter11/read-write-file/src/main/resources/input/";

    try {

    reader = new BufferedReader(new FileReader(new File(inDir + "data.txt"), StandardCharsets.UTF_8));

    StringBuilder sb = new StringBuilder();

    String line;

    while ((line = reader.readLine()) != null) {

    sb.append(line).append("\n");

    }

    LOGGER.info("Read with BufferedReader --> {}", sb.toString());

    } catch (Exception e) {

    LOGGER.error("File could not be read! ", e);

    } finally {

    if (reader != null) {

    try {

    reader.close();

    } catch (IOException ioe) {

    LOGGER.error("Something went wrong! ", ioe);

    }

    }

    }

    }

    }

    Listing 11-17

    Reading a File Line by Line, Before Java 6

    ```


    *Whoa, what is that, right?* After Java 6, the syntax was simplified a little,
    but the biggest changes came in Java 7. Before Java 7, if you wanted to read a
    file line by line, you had to write code as follows:


    1. Create a `File` handler.

    2. Wrap the file handler into a `FileReader`. This type of instance could do the
    job of reading, but only in chunks of `char[]`, which is not very useful when
    you need the actual text.

    3. Wrap the `FileReader` instance into an instance of `BufferedReader` that provides
    this functionality by reading the characters in an internal buffer. This involved
    calling `reader.readLine()` until there is nothing more to read because the end
    of the file was reached, at which point this method returned `null`.

    4. At the end of the reading, call `reader.close()` explicitly; otherwise, a lock
    might be kept on the file, and it might become unreadable until a restart.


    Java 7 introduced a lot of changes to reduce the boilerplate needed to work with
    files. One of those changes was that all classes used to access file contents
    and that could keep a lock on the file were enriched by being declared to implement
    the `java.io.Closeable` interface, which marks resources of these types as *closable*
    and a `close()` method is invoked to release resources transparently by the JVM
    before execution ends. Also, Java 7 introduced the `try-with-resources` statement.
    By making use of all these features, the pre–Java 6 code in Listing [11-17](#463938_3_En_11_Chapter.xhtml#PC32)
    can be written as depicted in Listing [11-18](#463938_3_En_11_Chapter.xhtml#PC33).


    ```

    try (BufferedReader br = new BufferedReader(new FileReader(new File(inDir + "data.txt")))){

    StringBuilder sb = new StringBuilder();

    String line;

    while ((line = br.readLine()) != null) {

    sb.append(line).append("\n");

    }

    LOGGER.info("Read with BufferedReader --> {}", sb.toString() );

    } catch (Exception e) {

    LOGGER.info("Something went wrong! ", e);

    }

    Listing 11-18

    Reading a File Line by Line, Starting with Java 7

    ```


    The code can be further simplified, as the `FileReader` can take the absolute
    path to a file as `String` as a parameter. But the code cannot be made to take
    encoding into consideration. This became possible in Java 8, when a constructor
    was introduced for the `FileReader` class that accepts a `Charset` argument. In
    Java 7, we still have nested constructor calls in the previous example, and it
    is quite ugly. Here is where Java 8 comes to the rescue, by introducing the `Files.newBufferedReader(Path)`
    and the `Files.newBufferedReader(Path, Charset)` method.


    So, the code in Listing [11-18](#463938_3_En_11_Chapter.xhtml#PC33) can be written
    as shown in Listing [11-19](#463938_3_En_11_Chapter.xhtml#PC34).


    ```

    File file = new File(inDir + "data.txt");

    try (BufferedReader br = Files.newBufferedReader(file.toPath(), StandardCharsets.UTF_8)){

    StringBuilder sb = new StringBuilder();

    String line;

    while ((line = br.readLine()) != null) {

    sb.append(line).append("\n");

    }

    LOGGER.info("Read with BufferedReader --> {}", sb.toString());

    } catch (Exception e) {

    LOGGER.info("Something went wrong! ", e);

    }

    Listing 11-19

    Reading a File Line by Line, Taking Encoding into Consideration Starting with
    Java 8

    ```


    If we know that the size of the file is manageable and we are interested in not
    only logging the contents but also saving the individual lines for further processing,
    the easiest way to do this is by using `Files.readAllLines(..)` method combined
    with lambda expressions. Streams can be added in the mix, so the lines can be
    filtered or processed on the spot as shown here:


    ```

    List dataList = Files.readAllLines(Paths.get(file.toURI()), StandardCharsets.UTF_8)

    .stream()

    .filter(line -> line!= null && !line.isBlank())

    .map(String::toUpperCase)

    .collect(Collectors.toList());

    ```


    Or we can write it another way, using the `Files.lines(..)` method, also introduced
    in Java 8, and get all contents as a stream directly:


    ```

    dataList = Files.lines(Paths.get(file.toURI()), StandardCharsets.UTF_8)

    .filter(line -> line!= null && !line.isBlank() )

    .map(String::toUpperCase)

    .toList();

    ```


    Anyway, back to file readers. The `BufferedReader` class is a member of a class
    group that extend the abstract `Reader` class. This is an abstract class used
    for reading character streams and is part of the `java.io` package. A simplified
    hierarchy showing the most-used implementations is depicted in Figure [11-2](#463938_3_En_11_Chapter.xhtml#Fig2).


    ![](images/463938_3_En_11_Chapter/463938_3_En_11_Fig2_HTML.jpg)


    Figure 11-2


    `Reader` class hierarchy (as shown in IntelliJ IDEA)


    Character streams can have different sources, files being the most common. They
    provide sequential access to data stored in the file. The `BufferedReader` class
    does not provide support for character encoding, but a `BufferedReader` instance
    is based on another `Reader` instance. And as you have noticed in the previous
    examples, a `FileReader` instance was used as argument when instantiating a `BufferedReader`,
    and `FileReader` was modified in Java 8 to support character encoding. Before
    Java 8, to read from a file and take character encoding into consideration, an
    `InputStreamReader` instance was used, as depicted in Listing [11-20](#463938_3_En_11_Chapter.xhtml#PC37).


    ```

    try (BufferedReader br = new BufferedReader(new InputStreamReader(new FileInputStream(file),
    StandardCharsets.UTF_8))){

    StringBuilder sb = new StringBuilder();

    String line;

    while ((line = br.readLine()) != null) {

    sb.append(line).append("\n");

    }

    LOGGER.info("Read with BufferedReader(InputStreamReader(FileInputStream(..)))
    --> {}", sb.toString() );

    } catch (Exception e) {

    LOGGER.info("Something went wrong! ", e);

    }

    Listing 11-20

    Reading a File Line by Line, Taking Encoding into Consideration Before Java 8

    ```


    In Java 11, the `Reader` class was enriched with the `nullReader()` method, which
    returns a `Reader` instance that does nothing. This was requested by developers
    for testing purposes and is nothing else but a pseudo-`Reader` implementation.'
