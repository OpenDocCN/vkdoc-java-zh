    XML序列化多年来一直主导着开发领域，被广泛应用于大多数Web服务和远程通信中。然而，XML文件随着体积增大往往会变得臃肿、冗余且难以阅读，因此一种新格式脱颖而出：JSON。


    ### JSON序列化


    **JSON**（JavaScript对象表示法）是一种轻量级的数据交换格式。它易于人类阅读，也便于机器解析和生成。JSON是JavaScript应用程序、基于REST的应用程序以及许多NoSQL数据库内部格式的首选。因此，有必要向你展示如何使用这种格式对Java对象进行序列化/反序列化。将Java对象序列化为JSON的优势在于，有多个库提供了相关类来实现这一功能，这意味着至少有一个库在Java
    9+版本中保持稳定。


    JSON格式本质上是一组键值对。值可以是数组，也可以是键值对集合本身。最常用的JSON序列化库同样是Jackson库，因为它无需编写大量代码即可将Java对象转换为JSON对象，反之亦然。本章最棒的一点是，相同的模块配置也可用于JSON。我们只需更改所使用的注解，并更改用于执行序列化/反序列化的映射器类型即可。Jackson支持多种用于JSON序列化的注解，但对于本书中的简单示例，我们实际上不需要任何注解。一个Jackson的`com.fasterxml.jackson.databind.json.JsonMapper`实例足够智能，能够自动检测类的公开可访问属性（公共字段，或具有公共getter方法的私有字段），并在序列化/反序列化该类的实例时使用它们。


    来自`com.fasterxml.jackson.annotation`包的`@JsonAutoDetect`注解可用于注解类。它可以配置为告诉映射器哪些类成员应被序列化。有几个选项，分组在注解体内声明的`Visibility`枚举中：


    *   `ANY`：自动检测所有类型的访问修饰符（`public`、`protected`、`private`）。

    *   `NON_PRIVATE`：自动检测除`private`之外的所有修饰符。

    *   `PROTECTED_AND_PUBLIC`：仅自动检测`protected`和`public`修饰符。

    *   `PUBLIC_ONLY`：仅自动检测`public`修饰符。

    *   `NONE`：禁用字段或方法的自动检测。在这种情况下，必须使用字段上的`@JsonProperty`注解显式进行配置。

    *   `DEFAULT`：应用默认规则，具体取决于上下文（有时从父类继承）。


