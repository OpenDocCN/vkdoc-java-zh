- fmt: "# How Is Java Portable?\n\nI mentioned a few times that Java is portable and\
    \ that Java programs can run on any operating system. It is time to explain how\
    \ this is possible. Let’s start with the simple drawing shown in Figure [1-4](#463938_3_En_1_Chapter.xhtml#Fig4).\n\
    \n![](images/463938_3_En_1_Chapter/463938_3_En_1_Fig4_HTML.jpg)\n\nFigure 1-4\n\
    \nRunning a Java program on multiple platforms\n\nJava is what we call a **high-level\
    \ programming language** that allows a developer to write programs that are independent\
    \ of a particular type of computer. High-level languages are easier to read, write,\
    \ and maintain. However, their code must be translated by a compiler or interpreted\
    \ into machine language (unreadable by humans because is it made up of numbers)\
    \ to be executed, because that is the only language that computers understand.\n\
    \nIn Figure [1-4](#463938_3_En_1_Chapter.xhtml#Fig4), notice that on top of the\
    \ operating systems, a `JVM` is needed to execute a Java program. `JVM` stands\
    \ for **Java Virtual Machine**, which is an abstract computing machine that enables\
    \ a computer to run a Java program. It is a platform-independent execution environment\
    \ that converts Java code into machine language and executes it.\n\nSo, what is\
    \ the difference between Java and other high-level languages? Well, other high-level\
    \ languages compile source code directly into machine code that is designed to\
    \ run on a specific microprocessor architecture or operating system, such as Windows\
    \ or Unix. By contrast, `JVM` mimics a Java processor, making it possible for\
    \ a Java program to be interpreted as a sequence of actions or operating system\
    \ calls on any processor regardless of the operating system. Sure, the compiling\
    \ step makes Java slower than a pure compiled language like C++, but the advantage\
    \ of portability makes it worth it. Also, Java is not the only member of the `JVM`\
    \ languages family. Groovy, Scala, Kotlin, and Clojure are all very popular programming\
    \ languages that run on the `JVM`.\n\nHaving mentioned the Java compiler, let’s\
    \ get back to Java 1.1, which was widely used even as new versions were released.\
    \ It came with an improved **Abstract Window Toolkit** (`AWT`) graphical application\
    \ programming interface (API, a collection of components used for building applets),\
    \ inner classes, database connectivity classes (JDBC model), classes for remote\
    \ calls (`RMI`), a special compiler for Microsoft platforms named the `JIT` (**J**ust\
    \ **I**n **T**ime) compiler, support for internationalization, and support for\
    \ Unicode. What also made Java 1.1 so widely embraced is that shortly after Java\
    \ was released, Microsoft licensed it and started creating applications using\
    \ it. The feedback helped further development of Java, and thus Java 1.1 was supported\
    \ on all browsers of the time, which is why it was so widely deployed.\n\n> **Information**\n\
    > \n> A lot of terms used in this introductory chapter might seem foreign to you\
    \ now, but as you read the book, these terms will start to make more sense as\
    \ you are introduced to more information and they are used in context.\n\nSo,\
    \ what exactly happens to developer-written Java code until the actual execution?\
    \ The process is depicted in Figure [1-5](#463938_3_En_1_Chapter.xhtml#Fig5).\n\
    \n![](images/463938_3_En_1_Chapter/463938_3_En_1_Fig5_HTML.jpg)\n\nFigure 1-5\n\
    \nFrom Java code to machine code\n\nJava code is compiled and transformed to bytecode\
    \ that is then interpreted and executed by the `JVM` on the underlying operating\
    \ system. This is what Java is: a compiled and interpreted general-purpose programming\
    \ language with numerous features that make it well suited for the Web. Now that\
    \ we’ve covered how Java code is executed, let’s go back to some more history.\n\
    \n## Sun Microsystem’s Java Versions\n\nThe first stable Java version released\
    \ by Sun Microsystems could be downloaded from the website as an archive named\
    \ `JDK`, and its version at the time was 1.0.2. `JDK` is an acronym for **J**ava\
    \ **D**evelopment **K**it. This is the software development environment used for\
    \ developing Java applications and applets. It includes the **J**ava **R**untime\
    \ **E**nvironment (`JRE`), an interpreter (loader), a compiler, an archiver, a\
    \ documentation generator, and other tools needed for Java development. We will\
    \ get into more details about the `JDK` in Chapter [2](#463938_3_En_2_Chapter.xhtml)\
    \ in the section about installing it on your computer.\n\nStarting with version\
    \ 1.2, released in 1998, Java versions were given codenames.^([³](#fn3)) The Java\
    \ version 1.2 unofficial codename was *Playground*. It was a massive release,\
    \ and this was the moment when people started talking about the *Java 2 Platform*.\
    \ Starting with this version, the releases up to `J2SE` 5.0 were renamed, and\
    \ *J2SE* replaced Java because the Java platform was now composed of three parts:\n\
    \n*   `J2SE` (Java 2 Platform, Standard Edition), which later became `JSE`, a\
    \ computing platform for the development and deployment of portable code for desktop\
    \ and server environments.\n*   `J2EE` (Java 2 Platform, Enterprise Edition),\
    \ which later became `JEE`, a set of specifications extending Java SE with specifications\
    \ for enterprise features such as distributed computing and web services.\n* \
    \  `J2ME` (Java 2 Platform, Micro Edition), which later became `JME`, a computing\
    \ platform for development and deployment of portable code for embedded and mobile\
    \ devices.\n\nWith this release, the `JIT` compiler became part of Sun Microsystem’s\
    \ `JVM` (which basically means turning code into executable code became a faster\
    \ operation and the generated executable code was optimized), the Swing graphical\
    \ API was introduced as a fancy alternative to the `AWT` (new components to create\
    \ fancy desktop applications were introduced), and the Java Collections Framework\
    \ (for working with sets of data) was introduced.\n\n`J2SE` 1.3 was released in\
    \ 2000 with the codename *Kestrel* (maybe as a reference to the newly introduced\
    \ Java sound classes). This release also contained Java Extensible Markup Language\
    \ (XML) APIs.\n\n`J2SE` 1.4 was released in 2002 with the codename *Merlin*. This\
    \ is the first year that the Java Community Process members were involved in deciding\
    \ which features the release should contain, and thus the release was quite consistent.\
    \ This is the first release of the Java platform developed under the Java Community\
    \ Process as `JSR 59`^([⁴](#fn4)). The following features are among those worth\
    \ mentioning:\n\n*   **Support for Internet Protocol version 6 (IPv6)**: This\
    \ feature enables applications that run over a network to be written to work using\
    \ networking protocol `IPv6`.\n*   **Nonblocking I/O**: `I/O` is an acronym for\
    \ *input-output*, which refers to reading and writing data—a very slow operation.\
    \ Making `I/O` nonblocking means to optimize these operations to increase speed\
    \ of the running application.\n*   **Logging API**: Operations that get executed\
    \ need to be reported to a file or a resource, which can be read in case of failure\
    \ to determine the cause and find a solution. This process is called *logging*\
    \ components to support this operation were introduced in this version for the\
    \ first time.\n*   **Image processing API**: Components developers can use this\
    \ API to manipulate images with Java code.\n\nJava’s coffee cup logo made its\
    \ entrance in 2003 (between releases 1.4 and 5.0) at the JavaOne conference. You\
    \ can see it in Figure [1-6](#463938_3_En_1_Chapter.xhtml#Fig6).\n\n![](images/463938_3_En_1_Chapter/463938_3_En_1_Fig6_HTML.jpg)\n\
    \nFigure 1-6\n\nJava official logo 2003–2006 (image source: [*https://oracle.com*](https://oracle.com))\n\
    \n> **Note**"
  raw: '## How Is Java Portable?


    I mentioned a few times that Java is portable and that Java programs can run on
    any operating system. It is time to explain how this is possible. Let’s start
    with the simple drawing shown in Figure [1-4](#463938_3_En_1_Chapter.xhtml#Fig4).


    ![](images/463938_3_En_1_Chapter/463938_3_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Running a Java program on multiple platforms


    Java is what we call a **high-level programming language** that allows a developer
    to write programs that are independent of a particular type of computer. High-level
    languages are easier to read, write, and maintain. However, their code must be
    translated by a compiler or interpreted into machine language (unreadable by humans
    because is it made up of numbers) to be executed, because that is the only language
    that computers understand.


    In Figure [1-4](#463938_3_En_1_Chapter.xhtml#Fig4), notice that on top of the
    operating systems, a **JVM** is needed to execute a Java program. JVM stands for
    **Java Virtual Machine**, which is an abstract computing machine that enables
    a computer to run a Java program. It is a platform-independent execution environment
    that converts Java code into machine language and executes it.


    So, what is the difference between Java and other high-level languages? Well,
    other high-level languages compile source code directly into machine code that
    is designed to run on a specific microprocessor architecture or operating system,
    such as Windows or Unix. By contrast, JVM mimics a Java processor, making it possible
    for a Java program to be interpreted as a sequence of actions or operating system
    calls on any processor regardless of the operating system. Sure, the compiling
    step makes Java slower than a pure compiled language like C++, but the advantage
    of portability makes it worth it. Also, Java is not the only member of the JVM
    languages family. Groovy, Scala, Kotlin, and Clojure are all very popular programming
    languages that run on the JVM.


    Having mentioned the Java compiler, let’s get back to Java 1.1, which was widely
    used even as new versions were released. It came with an improved **Abstract Window
    Toolkit** (**AWT**) graphical application programming interface (API, a collection
    of components used for building applets), inner classes, database connectivity
    classes (JDBC model), classes for remote calls (RMI), a special compiler for Microsoft
    platforms named the **JIT** (**J**ust **I**n **T**ime) compiler, support for internationalization,
    and support for Unicode. What also made Java 1.1 so widely embraced is that shortly
    after Java was released, Microsoft licensed it and started creating applications
    using it. The feedback helped further development of Java, and thus Java 1.1 was
    supported on all browsers of the time, which is why it was so widely deployed.


    Information


    A lot of terms used in this introductory chapter might seem foreign to you now,
    but as you read the book, these terms will start to make more sense as you are
    introduced to more information and they are used in context.


    So, what exactly happens to developer-written Java code until the actual execution?
    The process is depicted in Figure [1-5](#463938_3_En_1_Chapter.xhtml#Fig5).


    ![](images/463938_3_En_1_Chapter/463938_3_En_1_Fig5_HTML.jpg)


    Figure 1-5


    From Java code to machine code


    Java code is compiled and transformed to bytecode that is then interpreted and
    executed by the JVM on the underlying operating system. This is what Java is:
    a compiled and interpreted general-purpose programming language with numerous
    features that make it well suited for the Web. Now that we’ve covered how Java
    code is executed, let’s go back to some more history.


    ## Sun Microsystem’s Java Versions


    The first stable Java version released by Sun Microsystems could be downloaded
    from the website as an archive named **JDK**, and its version at the time was
    1.0.2\. JDK is an acronym for **J**ava **D**evelopment **K**it. This is the software
    development environment used for developing Java applications and applets. It
    includes the **J**ava **R**untime **E**nvironment (**JRE**), an interpreter (loader),
    a compiler, an archiver, a documentation generator, and other tools needed for
    Java development. We will get into more details about the JDK in Chapter [2](#463938_3_En_2_Chapter.xhtml)
    in the section about installing it on your computer.


    Starting with version 1.2, released in 1998, Java versions were given codenames.^([³](#fn3))
    The Java version 1.2 unofficial codename was *Playground*. It was a massive release,
    and this was the moment when people started talking about the *Java 2 Platform*.
    Starting with this version, the releases up to J2SE 5.0 were renamed, and *J2SE*
    replaced Java because the Java platform was now composed of three parts:


    *   **J2SE** (Java 2 Platform, Standard Edition), which later became JSE, a computing
    platform for the development and deployment of portable code for desktop and server
    environments.


    *   **J2EE** (Java 2 Platform, Enterprise Edition), which later became JEE, a
    set of specifications extending Java SE with specifications for enterprise features
    such as distributed computing and web services.


    *   **J2ME** (Java 2 Platform, Micro Edition), which later became JME, a computing
    platform for development and deployment of portable code for embedded and mobile
    devices.


    With this release, the JIT compiler became part of Sun Microsystem’s JVM (which
    basically means turning code into executable code became a faster operation and
    the generated executable code was optimized), the Swing graphical API was introduced
    as a fancy alternative to the AWT (new components to create fancy desktop applications
    were introduced), and the Java Collections Framework (for working with sets of
    data) was introduced.


    J2SE 1.3 was released in 2000 with the codename *Kestrel* (maybe as a reference
    to the newly introduced Java sound classes). This release also contained Java
    Extensible Markup Language (XML) APIs.


    J2SE 1.4 was released in 2002 with the codename *Merlin*. This is the first year
    that the Java Community Process members were involved in deciding which features
    the release should contain, and thus the release was quite consistent. This is
    the first release of the Java platform developed under the Java Community Process
    as JSR 59^([⁴](#fn4)). The following features are among those worth mentioning:


    *   **Support for** **Internet Protocol version 6 (IPv6)**: This feature enables
    applications that run over a network to be written to work using networking protocol
    IPv6.


    *   **Nonblocking I/O**: I/O is an acronym for *input-output*, which refers to
    reading and writing data—a very slow operation. Making I/O nonblocking means to
    optimize these operations to increase speed of the running application.


    *   **Logging API**: Operations that get executed need to be reported to a file
    or a resource, which can be read in case of failure to determine the cause and
    find a solution. This process is called *logging* components to support this operation
    were introduced in this version for the firt time.


    *   **Image processing API**: Components developers can use this API to manipulate
    images with Java code.


    Java’s coffee cup logo made its entrance in 2003 (between releases 1.4 and 5.0)
    at the JavaOne conference. You can see it in Figure [1-6](#463938_3_En_1_Chapter.xhtml#Fig6).


    ![](images/463938_3_En_1_Chapter/463938_3_En_1_Fig6_HTML.jpg)


    Figure 1-6


    Java official logo 2003–2006 (image source: [*https://oracle.com*](https://oracle.com))


    Note'
  trans: '

    ## Java 如何实现可移植性？


    我多次提到 Java 具有可移植性，Java 程序可以在任何操作系统上运行。现在是时候解释一下这是如何实现的了。让我们从图 1-4 所示的简单示意图开始。


    ![](img/463938_3_En_1_Fig4_HTML.jpg)


    图 1-4


    在多个平台上运行 Java 程序


    Java 是一种所谓的**高级编程语言**，它允许开发者编写不依赖于特定类型计算机的程序。高级语言更易于阅读、编写和维护。然而，它们的代码必须由编译器翻译或由解释器解释成机器语言（由数字组成，人类无法阅读）才能执行，因为这是计算机唯一能理解的语言。


    在图 1-4 中，请注意，在操作系统之上，需要一个 **JVM** 来执行 Java 程序。JVM 代表 **Java 虚拟机**，它是一种抽象的计算设备，能使计算机运行
    Java 程序。它是一个独立于平台的执行环境，负责将 Java 代码转换为机器语言并执行。


    那么，Java 和其他高级语言有什么区别呢？其他高级语言会将源代码直接编译成机器码，这些机器码是为特定的微处理器架构或操作系统（如 Windows 或 Unix）设计的。相比之下，JVM
    模拟了一个 Java 处理器，使得 Java 程序可以在任何处理器上被解释为一系列操作或操作系统调用，而无需考虑底层操作系统。诚然，编译步骤使得 Java
    比像 C++ 这样的纯编译语言慢，但可移植性的优势使其物有所值。此外，Java 并非 JVM 语言家族的唯一成员。Groovy、Scala、Kotlin 和
    Clojure 都是非常流行的、运行在 JVM 上的编程语言。


    既然提到了 Java 编译器，让我们回到 Java 1.1 版本，即使在新版本发布后，它仍被广泛使用。该版本附带了一个改进的**抽象窗口工具包**（**AWT**）图形应用程序编程接口（API，用于构建小程序的组件集合）、内部类、数据库连接类（JDBC
    模型）、远程调用类（RMI）、一个名为 **JIT**（**即**时**编译**器）的专为微软平台设计的编译器、对国际化的支持以及对 Unicode 的支持。Java
    1.1 被如此广泛接受的另一个原因是，在 Java 发布后不久，微软就获得了其许可，并开始使用它创建应用程序。这些反馈帮助了 Java 的进一步发展，因此
    Java 1.1 得到了当时所有浏览器的支持，这也是它被如此广泛部署的原因。


    信息


    本入门章节中使用的许多术语现在对你来说可能很陌生，但随着你阅读本书，当你接触到更多信息并在上下文中使用这些术语时，它们会变得更有意义。


    那么，开发者编写的 Java 代码在真正执行之前到底经历了什么？这个过程如图 1-5 所示。


    ![](img/463938_3_En_1_Fig5_HTML.jpg)


    图 1-5


    从 Java 代码到机器码


    Java 代码被编译并转换为字节码，然后由 JVM 在底层操作系统上进行解释和执行。这就是 Java：一种编译型且解释型的通用编程语言，具有众多使其非常适合
    Web 的特性。既然我们已经介绍了 Java 代码是如何执行的，让我们再回顾一些历史。


    ## Sun Microsystems 的 Java 版本


    Sun Microsystems 发布的第一个稳定 Java 版本可以从网站上下载，存档文件名为 **JDK**，当时的版本是 1.0.2。JDK 是 **Java
    开发工具包**的缩写。这是用于开发 Java 应用程序和小程序的软件开发环境。它包括 **Java 运行时环境**（**JRE**）、解释器（加载器）、编译器、归档器、文档生成器以及其他
    Java 开发所需的工具。我们将在第 2 章关于在你的计算机上安装 JDK 的部分详细介绍。


    从 1998 年发布的 1.2 版本开始，Java 版本有了代号。^(³) Java 1.2 版本的非官方代号是 *Playground*。这是一个重大的版本发布，也是人们开始谈论
    *Java 2 平台* 的时刻。从这个版本开始，直到 J2SE 5.0 的版本都被重新命名，*J2SE* 取代了 Java，因为 Java 平台现在由三部分组成：


    *   **J2SE**（Java 2 平台，标准版），后来成为 JSE，是一个用于开发和部署桌面及服务器环境可移植代码的计算平台。

    *   **J2EE**（Java 2 平台，企业版），后来成为 JEE，是一组扩展 Java SE 的规范，增加了分布式计算和 Web 服务等企业级特性。

    *   **J2ME**（Java 2 平台，微型版），后来成为 JME，是一个用于开发和部署嵌入式及移动设备可移植代码的计算平台。


    在此版本中，JIT 编译器成为 Sun Microsystems JVM 的一部分（这基本上意味着将代码转换为可执行代码的操作变得更快，并且生成的可执行代码得到了优化），Swing
    图形 API 作为 AWT 的华丽替代品被引入（引入了用于创建华丽桌面应用程序的新组件），并且引入了 Java 集合框架（用于处理数据集）。


    J2SE 1.3 于 2000 年发布，代号为 *Kestrel*（可能指的是新引入的 Java 声音类）。此版本还包含了 Java 可扩展标记语言（XML）API。


    J2SE 1.4 于 2002 年发布，代号为 *Merlin*。这是 Java 社区流程成员首次参与决定版本应包含哪些功能的一年，因此该版本相当一致。这是根据
    Java 社区流程作为 JSR 59^(⁴) 开发的第一个 Java 平台版本。以下是一些值得一提的特性：


    *   **支持互联网协议第 6 版（IPv6）**：此特性使运行在网络上的应用程序能够使用 IPv6 网络协议进行编写和工作。

    *   **非阻塞 I/O**：I/O 是 *输入-输出* 的缩写，指的是读取和写入数据——这是一种非常慢的操作。使 I/O 非阻塞意味着优化这些操作以提高运行应用程序的速度。

    *   **日志记录 API**：执行的操作需要报告到文件或资源中，以便在发生故障时可以读取这些记录以确定原因并找到解决方案。这个过程称为*日志记录*，支持此操作的组件在此版本中首次引入。

    *   **图像处理 API**：开发者可以使用此 API 通过 Java 代码操作图像。


    Java 的咖啡杯标志于 2003 年（在 1.4 和 5.0 版本之间）在 JavaOne 大会上首次亮相。你可以在图 1-6 中看到它。


    ![](img/463938_3_En_1_Fig6_HTML.jpg)


    图 1-6


    Java 官方标志 2003–2006（图片来源：[*https://oracle.com*](https://oracle.com)）


    注意

    '
- fmt: 'There are a few theories online about how the name *Java* was chosen. One
    theory is that it is a variation of the initials from the names of the Green Team
    members, James Gosling, Arthur Van Hoff, and Andy Bechtolsheim, and that the logo
    is inspired by their love of coffee.


    `J2SE 5.0` was released in 2004 with the codename *Tiger*. Initially it followed
    the typical versioning and was named `J2SE 1.5`, but because this was a major
    release with a significant number of new features that proved a serious improvement
    of maturity, stability, scalability, and security of the `J2SE`, the version was
    labeled `5.0` and presented like that to the public, even if internally `1.5`
    was still used. For this version and the next two, it was considered that `1.x
    = x.0`. Let’s list those features because most of them are covered in the book:


    - **Generics** provide support for compile-time (static) type safety for collections
    and eliminates the need for most type conversions, which means the type used in
    a certain context is decided while the application is running. (**Chapter** [**4**](#463938_3_En_4_Chapter.xhtml)
    has a full section about this topic).

    - **Annotations**, also known as *metadata*, are used to tag classes and methods
    to allow metadata-aware utilities to process them (which means a component is
    labeled as something another component recognizes and does specific operations
    with it).

    - **Autoboxing/unboxing** refers to the automatic conversion between primitive
    types and matching object types (wrappers). This feature is covered in **Chapter**
    [**5**](#463938_3_En_5_Chapter.xhtml).

    - **Enumerations** define static final ordered sets of values using the `enum`
    keyword; also covered in **Chapter** [**4**](#463938_3_En_4_Chapter.xhtml).

    - **Varargs** provide a shorthand for methods that support an arbitrary number
    of parameters of one type. The last parameter of a method is declared using a
    type name followed by three dots (e.g., `String...`), which implies that any number
    of arguments of that type can be provided and are placed into an array; covered
    in **Chapter** [**3**](#463938_3_En_3_Chapter.xhtml).

    - An **enhanced for each loop** is used to iterate over collections and arrays
    too; covered in **Chapter** [**7**](#463938_3_En_7_Chapter.xhtml).

    - **Static imports**, which provide a way to include existing static methods and
    constants into code; also covered in **Chapter** [**4**](#463938_3_En_4_Chapter.xhtml).

    - Improvements for **RMI** (not covered in the book), Swing (**Chapter** [**10**](#463938_3_En_10_Chapter.xhtml)),
    and introduction of the `Scanner` class (**Chapter** [**11**](#463938_3_En_11_Chapter.xhtml)).


    `J2SE 5.0` was the first version available for Apple Mac OS X 10.4, and the default
    version installed on Apple Mac OS X 10.5. However, it was a pretty buggy release,
    and hotfixes for minor and not-so-minor bugs were released continuously until
    2015.


    In 2006, *JDK 6* (codename *Mustang*) was released with a little delay. Yes, yet
    another rename, using `JDK` again, because the two other products were not as
    successful. And yes, yet again a serious number of features were implemented in
    quite a short period of time. A lot of updates were required afterward to fix
    the existing issues. This was the last major Java release released by Sun Microsystems,
    as Oracle acquired this company in January 2010. The most important features in
    this release are listed next.


    - **Dramatic performance improvements for the core platform**: Applications run
    faster and need less memory or CPU to execute.

    - **Improved web service support**: Optimized the components that are required
    for development of web applications, like the `HttpServer` (used in **Chapter**
    [**10**](#463938_3_En_10_Chapter.xhtml)).

    - **JDBC 4.0**: Optimized the components that are required for development of
    applications using relational databases, covered in **Chapter** [**11**](#463938_3_En_11_Chapter.xhtml).

    - **Many GUI improvements**: These included integration of `SwingWorker` in the
    API, table sorting and filtering, and true Swing double-buffering (eliminating
    the gray-area effect). Overall, components used to create interfaces for desktop
    applications were improved.


    Shortly after (*in Java terms*), in December 2008, *JavaFX* 1.0 SDK was released.
    JavaFX is suitable for creating graphical user interfaces (GUIs) for any platform.
    The initial version was a scripting language. Until 2008, in Java there were two
    ways to create a user interface:


    - Using AWT components, which are rendered and controlled by a native peer component
    specific to the underlying operating system; that is why AWT components are also
    called *heavyweight* components.

    - Using Swing components, which are called *lightweight* because they do not require
    allocation of native resources in the operating system’s windowing toolkit. The
    Swing API is a complementary extension of AWT.


    For the first versions, it was never really clear if JavaFX would actually have
    a future and if it would grow up to replace Swing. Management turmoil inside Sun
    at the time did not help in defining a clear path for this project, either.


    ## Oracle Takes Over


    Although Sun Microsystems won a lawsuit against Microsoft, in which Microsoft
    agreed to pay Sun Microsystems $20 million for not implementing the Java 1.1 standard
    completely, in 2008, after some poor acquisition missteps and misdirected focus
    on Sparc instead of x86 architecture, the company was in such poor shape that
    negotiations for a merger with IBM and Hewlett-Packard began (but eventually failed).
    In 2009, Oracle and Sun announced that they agreed on a deal: Oracle would acquire
    Sun for $9.50 per share in cash, which amounted to a $5.6 billion offer. The impact
    was massive. A lot of engineers quit, including James Gosling, *the father of
    Java*, which made a lot of developers question the future of the Java platform.'
