- fmt: '# Using Project Reactor


    As mentioned previously, the JDK support for reactive programming is quite scarce.
    Publishers, processors, and subscribers should function asynchronously, and all
    that behavior must be implemented by the developer, which can be a bit of a pain.
    The only thing that the JDK is suitable for at the moment is providing a common
    interface between all the other already existing implementations. There are a
    lot of them, providing many more useful classes for more specialized reactive
    components and utility methods to create and connect them easier. The one I personally
    fancy the most as a Spring aficionado is Project Reactor, the same one favored
    by the Spring development team.


    Project Reactor is one of the first libraries for reactive programming, and its
    classes provide a nonblocking stable foundation with efficient demand management
    for building reactive applications. It works with Java 8, but does provide adapter
    classes for JDK 9+ reactive streams classes.


    Project Reactor is suitable for microservices applications and provides a lot
    more classes designed to make programming reactive applications more practical
    than the JDK does. Project Reactor provides two main publisher implementations:
    `reactor.core.publisher.Mono<T>`, which is a reactive stream publisher limited
    to publishing zero or one element, and `reactor.core.publisher.Flux<T>`, which
    is a reactive stream publisher with basic flow operators.


    The advantages of using Project Reactor is that we have a lot more classes and
    methods to work with, there are static factories that can be used to create publishers,
    and operations can be chained way more easily. The Project Reactor team did not
    like the name processor, though, so the intermediary components are named operators.


    If you look in the official documentation, you will most likely encounter the
    schema in Figure [12-7](#463938_3_En_12_Chapter.xhtml#Fig7)^([^(123)](#fn123)).


    ![](images/463938_3_En_12_Chapter/463938_3_En_12_Fig7_HTML.jpg)


    Figure 12-7


    Project Reactor Flux publisher implementation


    This is an abstract schema of how the `Flux<T>` publisher works. The `Flux<T>`
    emits elements, can throw exceptions, and completes when there are no more elements
    to publish—the same behavior explained previously, but the Project Reactor team
    found a prettier way to draw it. The drawing for the `Mono` implementation is
    quite similar^([^(124)](#fn124)).


    But let’s put that aside and look at a few code samples. Creating `Flux<T>` instances
    is very easy using the multiple utility methods in this class. Before starting
    to publish elements, let’s design a general subscriber that does nothing else
    than print values, because we will need it to make sure our `Flux<T>` publishers
    actually work. To write a subscriber using the Project Reactor API, you have multiple
    options. First, you can implement the `org.reactivestreams.Subscriber<T>` directly,
    as shown in Listing [12-15](#463938_3_En_12_Chapter.xhtml#PC15).


    ```

    package com.apress.bgn.twelve.reactor;

    import org.reactivestreams.Subscriber;

    import org.reactivestreams.Subscription;

    // other import statements omitted

    public class GenericSubscriber implements Subscriber {

    private static final Logger LOGGER = LoggerFactory.getLogger(GenericSubscriber.class);

    private Subscription subscription;

    @Override

    public void onSubscribe(Subscription subscription) {

    if (this.subscription == null) {

    this.subscription = subscription;

    this.subscription.request(1);

    } else {

    subscription.cancel();

    }

    }

    @Override

    public void onNext(T element) {

    LOGGER.info("consumed {} ", element);

    subscription.request(1);

    }

    @Override

    public void onError(Throwable t) {

    LOGGER.error("Unexpected issue!", t);

    }

    @Override

    public void onComplete() {

    LOGGER.info("All done!");

    }

    }

    Listing 12-15

    org.reactivestreams.Subscriber Implementation

    ```


    To avoid implementing that many methods with boilerplate code, there is also the
    option of implementing `reactor.core.CoreSubscriber<T>`, the reactor base interface
    for subscribers, or even better, by extending the `reactor.core.publisher.BaseSubscriber<T>`
    class, which provides basic subscriber functionality. The behavior of typical
    subscriber methods can be modified by overriding methods with the same name, but
    prefixed with `hook`. In Listing [12-16](#463938_3_En_12_Chapter.xhtml#PC16),
    you can see how easy it is to write a subscriber using Project Reactor.


    ```

    package com.apress.bgn.twelve.reactor;

    import reactor.core.publisher.BaseSubscriber;

    // other import statements omitted

    public class GenericSubscriber  extends BaseSubscriber {

    private static final Logger LOGGER = LoggerFactory.getLogger(GenericSubscriber.class);

    @Override

    protected void hookOnNext(T value) {

    LOGGER.info("consumed {} ", value);

    super.hookOnNext(value);

    }

    @Override

    protected void hookOnComplete() {

    LOGGER.info("call done.");

    super.hookOnComplete();

    }

    }

    Listing 12-16

    reactor.core.publisher.BaseSubscriber Extension

    ```


    *Ta, da!* Now we have a subscriber class, so let’s create a reactive publisher
    that serves integers from an infinite integer stream, to use an instance of this
    class. The implementation is shown in Listing [12-17](#463938_3_En_12_Chapter.xhtml#PC17).


    ```

    package com.apress.bgn.twelve.reactor;

    import reactor.core.publisher.Flux;

    import java.util.random.RandomGenerator;

    import java.util.stream.Stream;

    public class ReactorDemo {

    static RandomGenerator randomGenerator = RandomGenerator.of("SecureRandom");

    void main() {

    Flux intFlux = Flux.fromStream(

    Stream.generate(() -> randomGenerator.nextInt(150))

    );

    intFlux.subscribe(new GenericSubscriber());

    }

    }

    // sample output

    /*

    INFO  c.a.b.t.r.GenericSubscriber - consumed 14

    INFO  c.a.b.t.r.GenericSubscriber - consumed 35

    INFO  c.a.b.t.r.GenericSubscriber - consumed 115

    */

    Listing 12-17

    Creating a Reactive Publisher Using Project Reactor’s Flux

    ```


    If you run the preceding code, you will see that all the generated integer values
    are printed by the subscriber. A `Flux<T>` can be created from a multitude of
    sources, including arrays and other publishers. For special situations, to avoid
    returning a null value, an empty `Flux<T>` can be created by calling the `empty()`
    method:


    ```

    String[] names = {"Joy", "John", "Anemona", "Takeshi"};

    Flux.fromArray(names).subscribe(new GenericSubscriber());

    Flux intFlux = Flux.empty();

    intFlux.subscribe(new GenericSubscriber());

    ```


    The most awesome method in my opinion is named `just(..)` and it is provided for
    both `Flux` and `Mono`. It takes one or more values and returns a publisher, a
    `Flux<T>` or a `Mono<T>`, depending on the type being called on:


    ```

    Flux dummyStr = Flux.just("one", "two", "three");

    Flux dummyInt = Flux.just(1,2,3);

    Mono one = Mono.just(1);

    Mono empty = Mono.empty();

    ```


    Another method that you might find useful is `concat(..)`, which allows you to
    concatenate two `Flux<T>` instances:


    ```

    String[] names = {"Joy", "John", "Anemona", "Takeshi"};

    Flux namesFlux = Flux.fromArray(names);

    String[] names2 = {"Hanna", "Eugen", "Anthony", "David"};

    Flux names2Flux = Flux.fromArray(names2);

    Flux combined = Flux.concat(namesFlux, names2Flux);

    combined.subscribe(new GenericSubscriber());

    ```


    Another thing that you might like: remember how the `IntPublisher` class had to
    be slowed down using a `Thread.sleep(1000)` call? With `Flux<T>` you do not need
    to do that, because there are two utility methods that when combined lead to the
    same behavior:


    ```

    Flux infiniteFlux = Flux.fromStream(

    Stream.generate(() -> randomGenerator.nextInt(150))

    );

    Flux delay = Flux.interval(Duration.ofSeconds(1));

    Flux delayedInfiniteFlux = infiniteFlux.zipWith(delay, (s,l) -> s);

    delayedInfiniteFlux.subscribe(new GenericSubscriber());

    ```'
