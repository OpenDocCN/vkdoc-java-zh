    array as its source. Streams are covered in **Chapter** [**8**](#463938_3_En_8_Chapter.xhtml),
    and these classes provide methods to process elements one by one, without the
    need of a `for` loop. In Listing [5-25](#463938_3_En_5_Chapter.xhtml#PC40), the
    elements of the resulting stream are processed one by one using the `System.out.println(..)`
    method, which means they are printed one by one in the console.


    *   `Arrays.sort(array)` sorts the specified array into ascending numerical order.
    This method does not return a new sorted array, so the elements change positions
    within the original array. The algorithm used to perform the sorting is called
    **Dual-Pivot Quicksort** and is one of the most efficient sorting algorithms^([^(51)](#fn51)).


    *   `array = new int[]{4, 2, 1, 5, 7}` is a reinitialization of the array. This
    means a new array value is assigned to the `array` reference. So the declaration
    must specify the `new` keyword together with the type and the array size, unless
    a set of elements is used for the initialization, which is exactly the case of
    this statement, so the size is not mandatory.


    *   `Arrays.binarySearch(array, 5)` searches the array for the value provided
    as an argument (in this case, 5) and returns a value representing the position
    of the element in the array (ergo, its index). The algorithm used for the search
    is called **Binary Search** and works by splitting the array repeatedly in two
    parts until the element is found. This technique is called *divide et impera*
    (or **divide and conquer**), and it involves splitting a big problem into smaller
    problems repeatedly (recursively) until they can be easily solved. Of course,
    binary search on an array is most efficient when the array is sorted.


    Tip


    Feel free to search the Web for the algorithms mentioned in this section; they
    are useful to understand when you need to develop your own solutions. **Chapter**
    [**7**](#463938_3_En_7_Chapter.xhtml) will show you how to write code following
    a few simple and well-known algorithms.


    #### The `String` Type


    The next special Java data type on our list is `String`. Together with the primitive
    `int`, this is one of the most-used types in Java. `String` instances are used
    to model texts and perform all kinds of operations on them. The `String` type
    is a special type because objects of this type are given special treatment by
    the JVM. If you remember the first image with memory contents (Figure [5-1](#463938_3_En_5_Chapter.xhtml#Fig1)),
    the `String` object was allocated in the heap in a special place called the **String
    Pool**. In this section dedicated to it, this type will be covered in detail,
    and a lot of questions you might have had so far will hopefully be answered.


    Until now `String` variables were declared in this book as depicted in Listing
    [5-26](#463938_3_En_5_Chapter.xhtml#PC41).


