    accepted this, because it assumes we know what we are doing. The converted instance
    is then assigned to a reference of type `Performer` and then methods `getSchool()`
    and `.``getFilms()` are called on it.


    When running the code in Listing [5-17](#463938_3_En_5_Chapter.xhtml#PC27), you
    would expect the `performer.getSchool()` method to be executed correctly and “Learned
