  trans: '

    #### jconsole


    **jconsole** 是一款 JDK 工具，可通过其基础图形界面检查各种 JVM 统计信息。要使用 `jconsole`，只需从命令行启动它，并将其连接到一个正在运行的
    Java 应用程序。该工具非常实用，因为它既可以监控本地 JVM，也可以监控远程 JVM。它还能监控和管理应用程序。应用程序必须暴露一个端口供 `jconsole`
    连接。


    要启动一个 Java 应用程序并暴露端口供外部应用连接，只需使用以下 VM 参数启动该应用程序：


    ```

    -agentlib:jdwp=transport=dt_socket,server=y,suspend=y,address=1044

    ```


    `transport=dt_socket` 参数指示 JVM，调试器连接将通过套接字进行。`address=1044` 参数告知 JVM 端口号为 1044。`port`
    号可以是任何大于 1024 的端口，因为低于该值的端口受操作系统限制。`suspend=y` 参数指示 JVM 暂停执行，直到 `jconsole` 等调试器连接到它。若要避免这种情况，应使用
    `suspend=n`。


    对于我们的简单示例，考虑到我们将使用 `jconsole` 在同一台机器上调试 Java 应用程序，我们并不需要所有这些参数。我们只需从命令行启动 `jconsole`，然后在
    *本地进程* 部分查找并识别我们想要调试的 Java 进程。


    在图 9-10 中，您可以看到第一个 `jconsole` 对话框窗口。


    ![](img/463938_3_En_9_Fig10_HTML.jpg)


    图 9-10


    `jconsole` 第一个对话框窗口


    当进程在本地运行时，很容易识别，因为它会使用模块名和完全限定的主类名来命名。对于像我们这样简单的应用程序，我们需要做一些调整，以确保在应用程序运行期间能够通过
    `jconsole` 实际看到一些统计信息。我们添加了一些 `Thread.sleep(..)` 语句，以便暂停执行足够长的时间让 `jconsole` 连接。此外，我们将使用一个相当大的数据数组，以确保统计信息具有参考价值。`BigSortingSlf4jDemo`
    类如代码清单 9-24 所示。


    ```

    package com.apress.bgn.nine;

    // 导入语句已省略

    public class BigSortingDemo {

    private static final Logger log = LoggerFactory.getLogger(BigSortingDemo.class);

    static RandomGenerator randomGenerator = RandomGenerator.of("SecureRandom");

    void main() throws InterruptedException {

    Thread.sleep(3000);

    // 我们使用这个 int 流来生成一个巨大的数组和一个巨大的日志文件。请耐心等待，执行需要一些时间。

    var intStream = IntStream.generate(() -> randomGenerator.nextInt(350) + 1).limit(100_000_000);

    int[] arr =  intStream.toArray();

    if (log.isDebugEnabled()) {

    final StringBuilder sb = new StringBuilder("使用归并排序对数组进行排序: ");

    Arrays.stream(arr).forEach(i -> sb.append(i).append(" "));

    log.debug(sb.toString());

    }

    Thread.sleep(3000);

    var mergeSort = new MergeSort();

    mergeSort.sort(arr, 0, arr.length - 1);

    if (log.isInfoEnabled()) {

    final StringBuilder sb2 = new StringBuilder("排序后: ");

    Arrays.stream(arr).forEach(i -> sb2.append(i).append(" "));

    log.info(sb2.toString());

    }

    }

    }

    代码清单 9-24

    BigSortingDemo 类的内容

    ```


    经过此修改，该类可以正常运行，并且可以将 `jconsole` 连接到它。成功连接后，会打开一个如图 9-11 所示的窗口，显示 JVM 内存消耗、活动线程数、已加载类数和
    CPU 使用率的图表。


    ![](img/463938_3_En_9_Fig11_HTML.jpg)


    图 9-11


    `jconsole` 统计信息窗口


    每个统计信息都有一个选项卡，提供更详细的信息。对于更复杂的应用程序，这些信息可用于改善性能、识别潜在问题，甚至预测应用程序在所需场景下的行为。对于我们这个小型应用程序，`jconsole`
    图表揭示的信息不多，但如果您真的想看到有价值的统计信息，可以在开发或运行代码时使用 `jconsole` 监控 IntelliJ IDEA。


    信息


    `jconsole` 的更高级版本称为 VisualVM。它曾是 JDK 的一部分，但在 Java 8 中被移除，之后成为一个独立项目。在编写本章时，还没有适用于
    Java 23 的版本，因此本书将不涉及它，但欢迎您自行尝试。^(⁷⁵)


    #### 使用 JDK Mission Control


    **JDK Mission Control (JMC)** 是一款高级 Oracle 应用程序，用于调试和分析正在运行的应用程序的 JVM 统计信息。其官方描述指出：*JDK
    Mission Control (JMC)*^(⁷⁶) *是一套用于管理、监控、性能分析和故障排查 Java 应用程序的高级工具集。*


    与之前讨论的工具类似，该工具可以识别当前正在运行的 Java 进程，并提供选项来查看它们在执行期间特定时间点的内存占用、某一时刻并行运行的线程数、JVM 加载的类以及运行
    Java 应用程序所需的 CPU 处理能力。JMC 拥有比 JConsole 更友好的界面，其最重要的组件之一是 Java Flight Recorder
    (JFR)，可用于记录应用程序运行期间的所有 JVM 活动。在自定义执行时间内收集的所有数据对于诊断和分析应用程序非常有用。


    尽管 JMC 是 Oracle 的工具之一，但它不再随 JDK 一起提供，因此您需要从 JMC 官方网站下载并安装适合您操作系统的版本。


    要在应用程序运行时进行检查，我们打开 JMC，然后根据与之前相同的规则，选择我们识别为正在运行 `BigSortingDemo` 主类的进程。我们查找包含模块名和完全限定类名的进程名称，右键单击它，然后选择
    **启动 JMX 控制台**。您应该会看到类似于图 9-12 所示的界面。


    ![](img/463938_3_En_9_Fig12_HTML.jpg)


    图 9-12


    JMC JMX 控制台


    正如您可能注意到的，界面确实更加友好，提供的统计信息也肯定更加详细。使用 JMC，可以记录应用程序和 JVM 在运行期间发生的所有事情，并稍后进行分析，即使应用程序之后已停止运行。**内存**
    选项卡提供了大量关于应用程序所用内存的信息，包括哪些类型的对象占用了内存。


    要记录 Java 进程的详细信息，需要以 `-XX:+UnlockCommercialFeatures -XX:+FlightRecorder` 参数启动它。OpenJDK
    和早期访问版本的 JDK 没有商业特性或 Flight Recorder。这些是 Oracle JDK 的一部分，设计仅供商业使用，需要付费订阅。


    JMC 的主题对于本章来说过于高级和广泛（可能整本书都可以用来介绍其用法以及如何解读统计信息），因此我们在此打住。如果您拥有 Oracle JDK 订阅并希望了解更多关于使用
    JMC 的信息，Oracle 提供了非常好的相关资源。


