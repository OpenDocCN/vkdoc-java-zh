  raw: '### Byte Serialization


    The `java.io.Serializable` interface has no methods or fields and serves only
    to mark classes as being serializable. When an object is serialized, the information
    that identifies the object type is serialized as well. Most Java classes are serializable.
    Any subclass of a serializable class is by default considered serializable.


    If any new fields are nonserializable, then an exception of type `NotSerializableException`
    will be thrown. Classes written by developers that contain nonserializable fields
    must implement the `Serializable` interface and provide a concrete implementation
    for the methods shown in Listing [11-33](#463938_3_En_11_Chapter.xhtml#PC58).


    ```

    private void writeObject(java.io.ObjectOutputStream out)

    throws IOException;

    private void readObject(java.io.ObjectInputStream in)

    throws IOException, ClassNotFoundException;

    private void readObjectNoData()

    throws ObjectStreamException;

    Listing 11-33

    Methods That Need to Be Implemented to Make a Custom Class Serializable

    ```


    These are not methods that are part of a specific Java interface, so implementing
    them in this context just means writing a body for them in the class you want
    to make serializable. The reason they are grouped in Listing [11-33](#463938_3_En_11_Chapter.xhtml#PC58)
    is to depict the signatures of these methods.


    The `writeObject(..)` method is used for writing the state of the object, so that
    the `readObject(..)` method can restore it. The `readObjectNoData()` method is
    used to initialize the state of the object when the deserialization operation
    failed for some reason, so this method provides a default state despite the issues
    (e.g., incomplete stream, client application does not recognize the deserialized
    class, etc.). This method is not really mandatory, if you are an optimist.


    Also, when making a class serializable, a static field of type `long` must be
    added as a unique identifier for the class to make sure both the application that
    sends the object as a byte stream and the client application receiving it have
    the same loaded classes. If the application that receives the byte stream has
    a class with a different identifier, a `java.io.InvalidClassException` will be
    thrown. When this happens, it means that the application was not updated, or you
    might even suspect some foul play from a hacker. The field has to be named `serialVersionUID`,
    and if the developer does not explicitly add one, the serialization runtime will.
    The code snippet in Listing [11-34](#463938_3_En_11_Chapter.xhtml#PC59) depicts
    a class named `Singer` that contains serialization and deserialization methods
    shown in the Listing [11-33](#463938_3_En_11_Chapter.xhtml#PC58) code snippet.


    ```

    package com.apress.bgn.eleven;

    import java.io.*;

    import java.time.LocalDate;

    import java.util.Objects;

    public class Singer  implements Serializable {

    private static final long serialVersionUID = 42L;

    private String name;

    private Double rating;

    private LocalDate birthDate;

    public Singer() {

    /* required for deserialization */

    }

    public Singer(String name, Double rating, LocalDate birthDate) {

    this.name = name;

    this.rating = rating;

    this.birthDate = birthDate;

    }

    private void writeObject(ObjectOutputStream out) throws IOException {

    out.defaultWriteObject();

    }

    private void readObject(ObjectInputStream in) throws IOException, ClassNotFoundException
    {

    in.defaultReadObject();

    }

    private void readObjectNoData() throws ObjectStreamException {

    this.name = "undefined";

    this.rating = 0.0;

    this.birthDate = LocalDate.now();

    }

    // setter, getters, toString, equals and hashCode omitted

    }

