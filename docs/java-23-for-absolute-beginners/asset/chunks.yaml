- fmt: '# Introducing JavaFX


    JavaFX Script was a scripting language designed by Sun Microsystems, forming part
    of the JavaFX family of technologies on the Java platform. It was released shortly
    after JDK 6 in December 2008, and for a while developers expected it would be
    dropped because it really did not catch on that much, being a totally different
    language.


    After acquiring Sun Microsystems, Oracle decided to keep JavaFX Script, and they
    transformed into the JavaFX library, which is a set of graphics and media packages
    that can be used by developers to design, create, test, debug, and deploy rich
    client applications that operate consistently across diverse platforms, including
    mobile ones. JavaFX was intended to replace Swing as the main GUI library of the
    JDK, but both Swing and JavaFX have been part of all JDK versions until 10. This
    changed in JDK 11. Starting with JDK 11, JavaFX became available only as a separate
    module, and that module became part of the OpenJDK under the OpenJFX project^([^(92)](#fn92)).


    JavaFX is a Java library that is used to develop desktop applications as well
    as Rich Internet Applications (RIAs). JavaFX is still not used as much as Oracle
    hoped, but separating it from the JDK allowed it to transform into an actual competitor
    for the other existing GUI toolkits on the market, like Eclipse SWT^([^(93)](#fn93))
    and Google Web Toolkit (GWT)^([^(94)](#fn94)).


    After its exclusion from the JDK, JavaFX has evolved on its own, keeping itself
    in sync with the Java versions being released. At the moment when this chapter
    is being written, there is a JavaFX 23 version available for download^([^(95)](#fn95)).
    The official documentation is good enough to get you started.


    ## Information


    The project for this book is built using Maven, and this makes things very practical,
    because the Maven configuration ensures that the necessary dependencies are added
    to the classpath without too much of a fuss.


    JavaFX code is currently normal Java code, so no more scripting. JavaFX components
    are defined under a list of `java.fx` modules. In the configuration snippet shown
    in Listing [10-15](#463938_3_En_10_Chapter.xhtml#PC23), you can see that the module
    of our project that uses JavaFX declares its dependency on a few `java.fx` modules
    by using the `requires` directive in its `module-info.java` file.


    ```

    module chapter.ten.javafx {

    requires javafx.base;

    requires javafx.graphics;

    requires javafx.controls;

    opens com.apress.bgn.ten to javafx.graphics;

    }

    ```


    Listing 10-15 Configuration Sample for a Project Using `java.fx` Modules


    The JavaFX application launcher uses reflection to launch an application, so we
    need to open the `com.apress.bgn.ten` package to allow reflection using the `opens`
    directive. Without that directive a `java.lang.IllegalAccessException` is thrown
    and the application does not start.


    The easiest application to start with is a simple window that has just a closing
    option. The code to display a plain square window is depicted in Listing [10-16](#463938_3_En_10_Chapter.xhtml#PC24).


    ```

    package com.apress.bgn.ten;

    import javafx.application.Application;

    import javafx.scene.Scene;

    import javafx.scene.layout.StackPane;

    import javafx.stage.Stage;

    public class JavaFxDemo extends Application {

    public static void main(String... args) {

    launch(args);

    }

    @Override

    public void start(Stage primaryStage) {

    primaryStage.setTitle("JavaFX Demo Window!");

    var root = new StackPane();

    primaryStage.setScene(new Scene(root, 500, 500));

    primaryStage.show();

    }

    }

    ```


    Listing 10-16 Simple JavaFX Application


    The first thing you need to know is that the main class of the application must
    extend the `javafx.application.Application` class, because this is the entry point
    for a JavaFX application. This is required because JavaFX applications are run
    by a new performance graphics engine named Prism that sits on top of the JVM.
    Aside from Prism, JavaFX comes with its own windowing system named Glass, a media
    engine and a web engine. They are not exposed publicly; the only thing available
    to developers is the JavaFX API that provides access to any components you might
    need to build applications with fancy interfaces. All these engines are tied together
    by the Quantum toolkit, which is the interface between these engines and the layer
    above in the stack. The Quantum toolkit manages execution threads and rendering.


    The `launch(..)` method is a static method in the `Application` class that is
    used to launch a stand-alone application. It is usually called from the main method
    and can be called only once; otherwise, a `java.lang.IllegalStateException` will
    be thrown. The `launch(..)` method does not return until the application is exited,
    by closing all windows or calling `Platform.exit()`. The `launch(..)` method creates
    a `JavaFxDemo` instance, calls the `init()` method on it, and then calls `start(..)`.
    The `start(..)` method is declared abstract in the `Application` class, so the
    developer is forced to provide a concrete implementation.


    A JavaFX application is built using components defined under the `javafx.scene`
    package and has a hierarchical organization. The core class of the `javafx.scene`
    package is `javafx.scene.Node`, which is the root of the `Scene` hierarchy. Classes
    in this hierarchy provide implementations for all the visual elements of the application’s
    user interface. Because all of them have `Node` as a root class, visual elements
    are called *nodes*, which makes an application *a scene graph of nodes*, and the
    initial node of this graph is called a *root*. Each node has a unique identifier,
    a style class, and a bounding volume, and except the root node, each node in the
    graph has a single parent and zero or more children. Besides that, a node has
    the following properties:


    - Effects, such as blurs and shadow, which are useful when you hover with your
    mouse cursor over the interface, to make sure you click the right component

    - Opacity

    - Transformations for changing visual state or position

    - Event handlers, similar to listeners in Swing, used to define reaction on mouse,
    key, and input methods

    - Application-specific state


    The scene graph simplifies building rich interfaces a lot, and because it also
    includes primitive graphics such as rectangles, text, images, and media. Animating
    various graphics can be accomplished by the animation APIs from package `javax.animation`.
    If you are interested in finding out more about what’s under the hood of JavaFX,
    check out the information at Dev.Java^([^(96)](#fn96)). The focus of this book
    is more on *how to do things* than on *how they work*, so reading that additional
    article might help you with the design of your future solutions.


    We’ve started again with a simple window. The first step is to add a button for
    quitting the application. As rendering a JavaFX application involves a rendering
    engine, this means it has to shut down gracefully, so calling `System.exit(0)`
    is not a preferred option. The contents of the `start(..)` method must call a
    special JavaFX method to close the application gracefully. The code is shown in
    Listing [10-17](#463938_3_En_10_Chapter.xhtml#PC25).'
