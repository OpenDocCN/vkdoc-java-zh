    Once the breakpoints are in place, when the application runs in debug mode, it
    will pause on each of the marked lines. During the pause, you can continue the
    execution step by step, inspect values of the variables, and even evaluate expressions
    in the context of the running application. IntelliJ IDEA is very helpful with
    this, as it shows you the contents of every variable in each line of the code
    currently being executed. In Figure [9-8](#463938_3_En_9_Chapter.xhtml#Fig8) the
