    #### Arrays


    The `new` keyword can also be used to create arrays, in a similar way it is used
    to create objects. An **array** is a data structure that holds a group of values
    together. Its size is defined when created and cannot be changed. Each variable
    can be accessed using an index that starts from 0 and goes up to the length of
    the array-1\. Arrays can hold primitive and reference values. Listing [5-19](#463938_3_En_5_Chapter.xhtml#PC29)
    contains a class with a declaration of an array field that groups together `int`
    values.


    ```

    package com.apress.bgn.five;

    import java.util.Arrays;

    public class ArrayDemo {

    int array[];

    void main() {

    ArrayDemo ad = new ArrayDemo();

    System.out.println("array was initialized with " + Arrays.toString(ad.array));

    }

    }

    Listing 5-19

    Class with int array Field

    ```


    There are two ways to declare an array, depending on where the brackets are positioned—after
    the array name or after the array element types:


    ```

    int array[];

    int[] array;

    ```


    Important


    This is important to know because if you are ever interested in getting your Java
    knowledge certification^([^(49)](#fn49)), the exam might contain questions regarding
    the correct ways to declare arrays.


    What do you think is the console output that results when the code in Listing
    [5-19](#463938_3_En_5_Chapter.xhtml#PC29) is executed? If you assumed that the
    `ad.array` field is initialized with `null`, and the message printed is *array
    was initialized with null*, you are quite right in your assumption.


    Arrays are reference types, even when they contain elements of primitive types
    and thus when left to the JVM to initialize fields of this type with a default
    value, `null` will be used, as this is the typical default value for reference
    types. The `null` keyword was mentioned before, but let’s emphasize its importance.
    The `null` keyword is used to represent a nonexistent value. A reference that
    is assigned this value does not have a concrete object assigned to it, meaning
    it does not point to an object in the heap. That is why when writing code, if
    an object is used (through its reference, of course) before being initialized,
    a `NullPointerException` is thrown. That is why developers test equality to `null`
    before using the object (or array).


    The code snippet in Listing [5-19](#463938_3_En_5_Chapter.xhtml#PC29) could be
    written a little better to take into account the possibility of the array being
    `null` and to exit from the `main(..)` method gracefully using the `return` keyword,
    as shown in Listing [5-20](#463938_3_En_5_Chapter.xhtml#PC31).


    ```

    package com.apress.bgn.five;

    import java.util.Arrays;

    public class ArrayDemo {

    int[] array;

    void main() {

    var ad = new ArrayDemo();

    if (ad.array == null) {

    System.out.println("Array unusable. Nothing to do.");

    return;

    }

    System.out.println("array was initialized with " + Arrays.toString(ad.array));

    }

    }

    Listing 5-20

    Class with int array Field and Null Check

    ```


    Information


    When a method is declared to return nothing using the `void` keyword, a correct
    return from the method can be enforced by the `return;` statement without a value.


    Why do we need the `null` keyword to mark something that does not exist yet? Because
    it is common practice in programming to declare a reference first and initialize
    it only when it is used for the first time. This is useful especially for objects
    that are big and require allocating a lot of memory. This programming technique
    is called **lazy loading**^([^(50)](#fn50)).


    Listing [5-21](#463938_3_En_5_Chapter.xhtml#PC32) depicts a more evolved version
    of the `ArrayDemo` class where the array field is initialized and a size is set
    for it.'
