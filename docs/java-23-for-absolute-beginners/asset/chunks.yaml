    either click the gutter area on the line you are interested in or select the line
    and choose from the **Run** menu the option **Toggle Line Breakpoint**. When a
    breakpoint is in place, a red bubble appears on the line in the gutter section.
    Figure [9-7](#463938_3_En_9_Chapter.xhtml#Fig7) shows a few breakpoints set in
    IntelliJ IDEA.


    ![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig7_HTML.jpg)


