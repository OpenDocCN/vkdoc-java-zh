    ### **switch** 的模式匹配


    **第 6 章**介绍了 `instanceof` 运算符，用于检查实例的类型并据此执行特定操作。然而，这意味着当一个对象可能具有多种类型时，最终会得到类似清单
    7-15 所示的结构。


    ```

    if (obj instanceof type1 t1) {

    // 对 t1 执行某些操作

    } else  if (obj instanceof type2 t2) {

    // 对 t2 执行某些操作

    } else if (...) {

    } else {

    // 当类型不属于上述任何一种时的操作

    }

    清单 7-15

    检查对象多种类型的 if 语句

    ```


    清单 7-15 中的代码能够完成任务，并且没有任何错误，但编写起来很繁琐，而且看起来也不美观。将所有这些条件放入一个 `switch` 表达式中会很不错，不是吗？嗯，从
    Java 21 开始，我们可以做到了。


    `switch` 表达式功能强大且实用，但它与其他语言中的类似结构（例如 Kotlin 中的 `when` 结构）相比仍有差距——至少在 Java 17 之前是这样，当时
    `switch` 的模式匹配作为预览特性被引入。`switch` 的模式匹配特性在 Java 21 中成熟并正式发布。将模式匹配扩展到 `switch` 允许一个表达式与多个模式进行测试，每个模式都有特定的操作，从而可以简洁且安全地表达复杂的数据导向查询。这意味着，从
    Java 21 开始，我们可以编写类似于清单 7-16 所示的代码。


    ```

    package com.apress.bgn.seven.pattern;

    import com.apress.bgn.four.classes.Gender;

    import com.apress.bgn.four.hierarchy.MiliVanili;

    import com.apress.bgn.four.hierarchy.Performer;

    import com.apress.bgn.six.Graphician;

    import java.util.List;

    import static java.lang.System.out;

    public class PatternDemo {

    void main(){

    Object obj = genRandomInstance();

    var res = switch (obj) { /* (*) */

    case Performer p -> "参演作品: " + p.getFilms();

    case MiliVanili m -> "创造力 " + (m.isCreative() ? "已发现" : "未发现");

    case Graphician g -> "偏好 " + g.getFavoriteOs();

    case Painter p -> "风格: " + p.getStyle();

    default -> "其他类型";

    };

    out.println(res);

    }

    static Object genRandomInstance(){

    var t = System.currentTimeMillis();

    if (t % 3 == 0 ) {

    return new Painter("巴勃罗·毕加索", "立体主义", "巴塞罗那美术学院");

    } else if (t % 5 == 0 ) {

    return new Performer("肖恩", 94, 1.88f, Gender.MALE, List.of("詹姆斯·邦德"));

    } else if (t % 11 == 0) {

    return new MiliVanili();

    } else if (t % 17 == 0) {

    return new Graphician("戴安娜", 23, 1.62f, Gender.FEMALE, "macOs");

    } else  if (t % 23== 0) {

    return "随机文本";

    } else  if (t % 31== 0) {

    return Integer.MAX_VALUE;

    }

    return null;

    }

    }

    清单 7-16

    检查对象多种类型的 switch 语句

    ```


    示例中包含 `genRandomInstance()` 方法是为了展示被测试对象可能的类型。重复运行清单 7-16 中的程序，会根据当前系统时间生成不同的输出。请注意，支持测试任何类型对象的
    `switch` 表达式（和语句）允许 case 标签使用模式，而不仅仅是常量。多次运行代码可能会生成每种类型的对象，但你可能注意到有时会抛出带有以下消息的
    `NullPointerException` 异常：


    ```

    Exception in thread "main" java.lang.NullPointerException

    at java.base/java.util.Objects.requireNonNull(Objects.java:220)

    at chapter.seven/com.apress.bgn.seven.pattern.PatternDemo.main(PatternDemo.java:47)

    ```


    这是怎么回事？如果你在编辑器中打开 `PatternDemo.java` 文件，你会注意到抛出异常的行是 `switch` 表达式的第一行（示例中标记为 `(*)`
    的行）。发生这种情况是因为表达式求值为 `null`。为了避免这种情况，我们可以在求值 `switch` 表达式之前测试 `null`，但这会增加额外的代码。好消息是，`switch`
    的模式匹配也支持将 `null` 值作为一个选项。因此，我们可以重写 `switch` 表达式，包含一个 `null` 选项，并针对这种情况返回一个 `string`，瞧，不再抛出异常（参见清单
    7-17）；相反，当 `genRandomInstance()` 方法返回 `null` 时，控制台会打印 *no object* 文本。


    ```

    package com.apress.bgn.seven.pattern;

    import com.apress.bgn.four.classes.Gender;

    import com.apress.bgn.four.hierarchy.MiliVanili;

    import com.apress.bgn.four.hierarchy.Performer;

    import com.apress.bgn.six.Graphician;

    import java.util.List;

    import static java.lang.System.out;

    public class PatternDemo {

    void main(){

    Object obj = genRandomInstance();

    var res = switch (obj) {

    case null -> "无对象";

    case Performer p -> "参演作品: " + p.getFilms();

    case MiliVanili m -> "创造力 " + (m.isCreative() ? "已发现" : "未发现");

    case Graphician g -> "偏好 " + g.getFavoriteOs();

    case Painter p -> "风格: " + p.getStyle();

    default -> "其他类型";

    };

    out.println(res);

    }

    // 方法 genRandomInstance() 已省略

    }

    清单 7-17

    检查对象多种类型并处理 null 值的 switch 语句

    ```


    当 `switch` 语句或表达式中的选项属于密封层次结构时，会发生一件有趣的事情。你可能没有注意到（除非你自己编写了本章中的一些代码），但在编写 `switch`
    语句或表达式时，除非选项属于固定集合（例如 `enum`），否则编译器总是强制你添加一个 `default` 选项。对于密封层次结构中的类型来说，情况并非如此——*你能猜出为什么吗？*


    答案很简单：由于接口和类声明了哪些其他接口和类正在实现它们，因此类型集合在编译时就已知晓，所以可以使用层次结构的根作为生成实例的引用类型，来编写一个不需要
    `default` 选项的 `switch` 语句或表达式。此外，由于所有类型都属于同一个层次结构，最具体的类型必须放在选项列表的前面。


    考虑到**第 4 章**中引入的密封层次结构，其根节点是密封接口 `com.apress.bgn.four.sealed.two.Mammal`，我们可以编写一个如清单
    7-18 所示的 `switch` 表达式。


    ```

    // 来自第 4 章的密封层次结构

    package com.apress.bgn.four.sealed.two;

    public sealed interface Mammal permits Human { }

    public sealed class Human implements Mammal permits Performer, Engineer { ...
    }

    public non-sealed class  Engineer extends Human {...}

    public final class Performer  extends Human { ... }

    // 测试类

    package com.apress.bgn.seven.sealed;

    import com.apress.bgn.four.classes.Gender;

    import com.apress.bgn.four.sealed.two.Engineer;

    import com.apress.bgn.four.sealed.two.Human;

    import com.apress.bgn.four.sealed.two.Mammal;

    import com.apress.bgn.four.sealed.two.Performer;

    public class SealedHierachyDemo {

    void main(){

    var obj = genRandomInstance();

    switch (obj) {

    case Engineer e -> System.out.println(e);

    case Performer p -> System.out.println(p);

    case Human h -> System.out.println(h);

    }

    }

    public static Mammal genRandomInstance(){

    var t = System.currentTimeMillis();

    if (t % 3 == 0 ) {

    return new Engineer("胡安", 41, Gender.MALE);

    } else if (t % 5 == 0 ) {

    return new Human("奥姆", 41, Gender.MALE);

    }

    return new Performer("艾达", 209, Gender.FEMALE);

    }

    }

    清单 7-18

    检查对象来自密封层次结构的多种类型的 switch 表达式

