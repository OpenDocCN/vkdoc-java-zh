    #### 数组


    `new` 关键字也可以用于创建数组，其方式与创建对象类似。**数组**是一种将一组值保存在一起的数据结构。其大小在创建时定义，且无法更改。每个变量可以通过索引访问，索引从
    0 开始，一直到数组长度减 1。数组可以保存基本类型值和引用类型值。清单 5-19 包含一个类，其中声明了一个将 `int` 值组合在一起的数组字段。


    ```

    package com.apress.bgn.five;

    import java.util.Arrays;

    public class ArrayDemo {

    int array[];

    void main() {

    ArrayDemo ad = new ArrayDemo();

    System.out.println("数组已初始化为 " + Arrays.toString(ad.array));

    }

    }

    清单 5-19

    包含 int 数组字段的类

    ```


    声明数组有两种方式，取决于方括号的位置——是在数组名称之后，还是在数组元素类型之后：


    ```

    int array[];

    int[] array;

    ```


    重要提示


    这一点很重要，因为如果你有兴趣获得 Java 知识认证^(⁴⁹)，考试中可能会包含关于声明数组正确方式的问题。


    你认为执行清单 5-19 中的代码时，控制台输出会是什么？如果你认为 `ad.array` 字段被初始化为 `null`，并且打印的消息是“数组已初始化为
    null”，那么你的猜测完全正确。


    数组是引用类型，即使它们包含基本类型的元素也是如此。因此，当让 JVM 用默认值初始化此类型的字段时，将使用 `null`，因为这是引用类型的典型默认值。之前提到过
    `null` 关键字，但让我们强调一下它的重要性。`null` 关键字用于表示不存在的值。被赋值为该值的引用没有具体的对象与之关联，这意味着它不指向堆中的任何对象。这就是为什么在编写代码时，如果在对象（通过其引用）被初始化之前使用它，会抛出
    `NullPointerException`。这就是开发人员在使用对象（或数组）之前测试其是否等于 `null` 的原因。


    清单 5-19 中的代码片段可以写得更好一些，考虑到数组可能为 `null` 的情况，并使用 `return` 关键字优雅地退出 `main(..)` 方法，如清单
    5-20 所示。


    ```

    package com.apress.bgn.five;

    import java.util.Arrays;

    public class ArrayDemo {

    int[] array;

    void main() {

    var ad = new ArrayDemo();

    if (ad.array == null) {

    System.out.println("数组不可用。无需操作。");

    return;

    }

    System.out.println("数组已初始化为 " + Arrays.toString(ad.array));

    }

    }

    清单 5-20

    包含 int 数组字段和空值检查的类

    ```


