    A Few String Statements Used in This Book

    ```


    As you can see, each one of the lines 03, 04, 05, 09, and 12 define a `String`
    object with the same content, *two*. I intentionally did this for reasons that
    will become obvious soon enough. In real life applications, especially in this
    big-data hype period, applications handle a lot of data, most of it in text form.
    So being able to compress the data and reuse it would reduce the memory consumption.
    Reducing memory access attempts increases speed by reducing processing, which
    in turn will reduce costs.


    `String` variables can be initialized with text values directly (lines 03 and
    04). In this case the JVM looks first in the String Pool for a `String` object
    with the same value. If found, the new `String` variable is initialized with a
    reference to it. If not found, memory is allocated, the text value is written
    to it, and the new `String` variable is initialized with a reference to it.


    In line 05, the constructor of the class `String` is used to create a `String`
    object. Notice the `new` keyword is being used. This means that allocation for
    memory to store the text provided as a parameter is being explicitly requested.


    Before continuing this section, we have to make a quick detour and mention what
    **object equality** means in Java. Objects are handled in Java using references
    to their memory location. The `==` (double equals) operator compares memory locations
    the references point to, so two objects are equal if and only if they are stored
    in the same memory address. That is why objects should be compared using the `equals(..)`
    method. This is a special method inherited from the `Object` class, but each class
    must provide its own implementation that is truly relevant to its own structure.
    As expected, the `equals(..)` implementation in the `Object` class defaults to
    the `==` behavior.


    Think about two red balls with the same diameter and same color, made of the same
    material. They are identical, which translates to Java as being equal, but they
    are not the same ball; they were just created using the same specifications. If
    you take two random kids, like Jim and Jane, each can play with their own ball.
    But if Jim and Jane play with the same ball, just throwing it from one to the
    other, this is pretty similar to equality of references in Java. Figure [5-15](#463938_3_En_5_Chapter.xhtml#Fig15)
    is an abstract representation of this situation.


