- fmt: "# Advanced Module Configurations\n\nA Java module declaration body contains\
    \ one or more **directives** that are constructed using the keywords in Table\
    \ 3-2. These directives represent access configurations and dependency requirements\
    \ for the packages and classes contained in the modules.\n\n**Table 3-2** Java\
    \ Module Directives\n\n| Directive | Purpose |\n| --- | --- |\n| `requires` |\
    \ Specifies that the module depends on another module. |\n| `exports` | One of\
    \ the module’s packages whose `public` types (and their `nested public` and `protected`\
    \ types) should be accessible to code in all other modules. |\n| `exports ...\
    \ to` | Qualified version of the `exports` directive that enables specifying in\
    \ a comma-separated list precisely which module’s or modules’ code can access\
    \ the exported package. |\n| `open` | Used at module-level declaration (`open\
    \ module mm {}`) and allows reflective access to all module’s packages. Java Reflection\
    \ is the process of analyzing and modifying all the capabilities of a class at\
    \ runtime, and it works on private types and members too. So before Java 9, nothing\
    \ was really encapsulated. |\n| `opens` | Used inside the body of a module’s declaration\
    \ to selectively configure access through reflection only to certain packages.\
    \ |\n| `opens ... to` | Qualified version of the `opens` directive that enables\
    \ specifying in a comma-separated list precisely which module’s or modules’ code\
    \ can access its packages reflectively. |\n| `uses` | Specifies a service used\
    \ by this module, making the module a *service consumer*. A service in this case\
    \ represents the full name of an interface/abstract class that another module\
    \ provides an implementation for. |\n| `provides ... with` | Specifies that a\
    \ module provides a service with a specific implementation, making the module\
    \ a *service provider*. |\n| `transitive` | Used together with `requires` to specify\
    \ a dependency on another module and to ensure that other modules reading your\
    \ module also read that dependency—known as *implied readability*. |\n\nAppendix\
    \ A provides examples for all directives. For the purpose of learning the Java\
    \ language, the only ones you really need to know are `requires` and `exports`,\
    \ so those are the only two covered in this chapter. I will explain all directives\
    \ in depth as soon as the context is appropriate for understanding them completely,\
    \ and I will add analogies with real-world events and scenarios to make sure the\
    \ idea comes through.\n\nImportantly, *modules can depend on one another.* The\
    \ project for this book consists of 13 modules, and most of them depend on module\
    \ `chapter.zero`. This module contains the basic components used to build more\
    \ complex components in the other modules. For example, classes inside module\
    \ `chapter.three` need access to packages and classes in module `chapter.zero`.\
    \ Declaring a module dependency is done using the `requires` directive, as depicted\
    \ in Listing 3-11.\n\n```\nmodule chapter.three {\n    requires chapter.zero;\n\
    }\n```\n\n**Listing 3-11** A Simple `module-info.java` Configuration\n\nThe preceding\
    \ dependency is an **explicit** one. But there are also **implicit** dependencies.\
    \ For example, any module declared by a developer implicitly requires the JDK\
    \ `java.base` module. This module contains the foundational APIs of the Java SE\
    \ Platform, and no Java application could be written without it. This implicit\
    \ directive ensures access to a minimal set of Java types, so basic Java code\
    \ can be written. Listing 3-11 is equivalent to Listing 3-12.\n\n```\nmodule chapter.three\
    \ {\n    requires java.base; // redundant directive\n    requires chapter.zero;\n\
    }\n```\n\n**Listing 3-12** A Simple `module-info.java` Configuration with an Explicit\
    \ Directive of `requires java.base`\n\n> **Important:** Declaring a module as\
    \ required means that the module is required when the code is compiled (frequently\
    \ referred to as *compile time*) and when the code is executed (frequently referred\
    \ to as *runtime*). If a module is required only at runtime, the `requires static`\
    \ keywords are used to declare the dependency. Just keep that in mind for now;\
    \ it will make sense when we talk about web applications.\n\nNow `chapter.three`\
    \ depends on module `chapter.zero`. But does this mean `chapter.three` can access\
    \ all `public` types (and their nested `public` and `protected` types) in all\
    \ the packages in module `chapter.zero`? If you are thinking that this is not\
    \ enough, you are right. Just because a module depends on another, it does not\
    \ mean it has access to the packages and classes it actually needs. The required\
    \ module must be configured to expose its *insides*. How can this be done? In\
    \ our case, we need to make sure module `chapter.zero` gives access to the required\
    \ packages. We can do so by customizing the `module-info.java` file for this module\
    \ by adding the `exports` directive, followed by the necessary package names.\
    \ Listing 3-13 depicts the `module-info.java` file for the `chapter.zero` module\
    \ that exposes its single package.\n\n```\nmodule chapter.zero {\n    exports\
    \ com.apress.bgn.zero;\n}\n```\n\n**Listing 3-13** The `module-info.java` Configuration\
    \ File for the `chapter.zero` Module\n\n> **Tip:** Think about it like this: You\
    \ are in your room cutting out Christmas decorations, and you need a template\
    \ for your decorations. Your roommate has all the templates. But just because\
    \ you need them doesn’t mean they will magically appear. You need to go and talk\
    \ to your roommate. Needing your roommate’s assistance can be viewed as the `requires\
    \ room-mate` directive. After talking to your roommate, your roommate will probably\
    \ say: *Sure, come in, they are on the desk! Take as many as you need.* This can\
    \ be considered the `exports all-templates-on-desk` directive. The desk is probably\
