  trans: '

    # 5. 数据类型


    尽管我们在前一章编写了大量代码，但在设计类时，仅使用了最简单的数据类型——几个数值类型和文本类型。JDK 中声明了许多数据类型，用于多种用途：建模日历日期、表示多种数值类型、操作文本、集合、数据流、文件、数据库连接等。除了
    JDK，还有许多由其他方创建的库提供了更多功能。JDK 提供的数据类型是基础类型，是每个 Java 应用程序的构建基石。当然，根据你正在构建的应用程序类型，你可能不需要全部使用它们。例如，我从未有机会使用
    `java.util.logging.Logger` 类。我参与过的大多数应用程序在我加入时已由其他团队搭建完成，他们使用了像 `Log4j` 或 `Logback`
    这样的外部库，或者像 SLF4J 这样的日志抽象（详见第 9 章）。


    本章将介绍编写约 80% 的 Java 应用程序所需的基本 Java 数据类型。闲话少叙，让我们开始吧。


    ## 栈内存与堆内存


    Java 类型可分为两大类：**基本**类型和**引用**类型。Java 代码文件和字节码文件存储在硬盘上。Java 程序在 JVM 上运行，JVM 通过执行
    `java` 可执行文件作为进程启动。在执行过程中，所有数据都存储在两种不同类型的内存中：栈和堆，它们由操作系统为程序执行分配。


    **栈**内存在执行期间（也称为*运行时*）用于存储方法的原始局部变量以及堆中存储的对象的引用。*栈*也是一种数据结构，由只能在一端访问的值列表表示，也称为后进先出（LIFO）顺序。这个名称很贴切，因为每次调用方法时，都会在栈内存中创建一个新块来保存方法的局部变量：基本类型和方法中其他对象的引用。当调用结束时，该块被移除（弹出），并为之后调用的方法创建新块。


    *重要提示*


    栈数据结构与一叠盘子非常相似；你只能在顶部添加或移除额外的盘子。栈中的第一个元素称为*栈顶*。对栈执行的操作有特定名称：向栈中添加元素称为*压栈*操作，检查栈中的第一个元素称为*窥视*或*查看栈顶*，提取栈中的第一个元素（即栈顶）称为*出栈*。通过重复调用*出栈*直到栈大小为零，栈会被清空。


    每个 JVM 执行线程都有自己的栈内存，其大小可以使用 JVM 参数 `-Xss`（或等效且更明确的 `-XX:ThreadStackSize`）指定。如果分配了太多变量，或者被调用的方法是递归的且设计不良，导致返回条件永远无法满足，从而不断自我调用，你将遇到
    `java.lang.StackOverflowError`。这意味着没有剩余的栈内存了，因为每次方法调用都会在栈上创建一个新块。栈内存的大小取决于运行 JVM
    的平台：对于基于 Unix 的系统（Linux 和 macOS）为 1024KB，对于 Windows，大小取决于虚拟内存。要检查你计算机上的大小，只需打开终端或命令提示符并运行此命令：`java
    -XX:+PrintFlagsFinal -version`。该命令返回一系列 JVM 配置，称为*标志*。其中一些用于配置 JVM 允许管理的内存。


    清单 5-1 显示了在我的 macOS 计算机上执行的命令。`grep` 命令根据提供的参数过滤输出，从而得到更清晰、范围更明确的输出。


    ```

    > java -XX:+PrintFlagsFinal -version | grep ThreadStack

    #  数据类型  # 标志名称  #    = # 标志值

    intx        ThreadStackSize   =    1024

    清单 5-1

    显示 macOS 上的栈大小默认值

    ```'
