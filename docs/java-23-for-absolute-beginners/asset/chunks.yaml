    ## Introduction to Java Data Types


    As you have noticed in the previous example, the data types can be split in Java
    in two big groups based on where and how they are stored during execution: **primitive**
    types and **reference** types. Let’s introduce them briefly and later explain
    their most important members.


    ### Primitive Data Types


    **Primitive types** are defined by the Java programming language as special types
    that do not have a supporting class and are named by their reserved keyword. Variables
    of these types are saved on the stack memory, and when values are assigned to
    them using the `=`(equals) operator, the value is actually copied. So if we declare
    two primitive variables of type `int` as in Listing [5-5](#463938_3_En_5_Chapter.xhtml#PC5),
    we end up with two variables, `k` and `q`, both having the same value: `42`.


    ```

    package com.apress.bgn.five;

    public class AnotherPrimitivesDemo {

    void main() {

    int k = 42;

    int q = k;

    System.out.println("k = " + k);

    System.out.println("q = " + q);

    }

    }

    Listing 5-5

    Code Sample Used to Discuss Primitives

    ```


    When passed as arguments to other methods, the values of primitive values are
    copied and used without the initial variables being modified. Importantly, this
    means that in Java methods, *primitive arguments are passed by value.* This can
    be proved by creating a method to swap the values of two `int` variables. The
    code for the method and how to use it are depicted in Listing [5-6](#463938_3_En_5_Chapter.xhtml#PC6).


    ```

    package com.apress.bgn.five;

    public class SwappingPrimitivesDemo {

    void main() {

    int k = 42;

    int q = 44;

    swap(k, q);

    System.out.println("k = " + k);

    System.out.println("q = " + q);

    }

    static void swap(int a, int b) {

    int temp = a;

    a = b;

    b = temp;

    }

    }

    Listing 5-6

    Code Sample Used to Show Primitives Are Passed by Value

    ```


    So what do you think will get printed as values for `k` and `q`? If you thought
    the output is the same as the following, you are correct:


    ```

    k = 42

    q = 44

    ```


    This happens because in Java passing arguments to a method is done through their
    value, which means for primitives, changing the formal parameter’s value doesn’t
    affect the actual parameter’s (the method argument’s) value. If you read the previous
    section, you can already imagine what happens on the stack. When the `swap(..)`
    method is called, a new stack memory block is created to save the values used
    by this method. During the execution of the method, the values might change, but
    if they are not returned and assigned to variables in the calling method, the
    values are lost when the method execution ends. Figure [5-5](#463938_3_En_5_Chapter.xhtml#Fig5)
    depicts the changes that take place on the stack during the execution of the code
    in Listing [5-6](#463938_3_En_5_Chapter.xhtml#PC6).


    ![](images/463938_3_En_5_Chapter/463938_3_En_5_Fig5_HTML.jpg)


    Figure 5-5


    Java passing primitive arguments by value


    ### Reference Data Types


    There are six *reference types* in Java:


    *   Class types


    *   Interface types


    *   Enums


    *   Array types


    *   Records


    *   Annotations


    Reference types are different from primitive types because they are instantiable
    (except interfaces and annotations). Instances (objects) of these types are created
    by calling constructors. Variables of these types are actually just references
    to objects stored in the heap. Because the references are stored on the stack
    as well, even if we modify the previous code to use references, the behavior will
    be the same.


    Listing [5-7](#463938_3_En_5_Chapter.xhtml#PC8) introduces a class named `IntContainer`,
    with the only purpose to wrap `int` primitive values into objects.


    ```

    package com.apress.bgn.five;

    public class IntContainer {

    private int value;

    public IntContainer(int value) {

    this.value = value;

    }

    public int getValue() {

    return value;

    }

    public void setValue(int value) {

    this.value = value;

    }

    }

    Listing 5-7

    Code Sample Used to Show IntContainer

    ```


    Listing [5-8](#463938_3_En_5_Chapter.xhtml#PC9) shows the creation of two objects
    of this type and two references for them, and a new version of the `swap` method.


    ```

    package com.apress.bgn.five;

    public class IntContainerDemo {

    void main() {

    IntContainer k = new IntContainer(42);

    IntContainer q = new IntContainer(44);

    swap(k,q);

    System.out.println("k = " + k.getValue());

    System.out.println("q = " + q.getValue());

    }

    static void swap(IntContainer a, IntContainer b) {

    IntContainer temp = a;

    a = b;

    b = temp;

    }

    }

    Listing 5-8

    Code Sample Used to Show Swap of Two int Values Using a Reference Type

    ```


    If we run the `main(..)` method, you will notice that we still get:


    ```

    k = 42

    q = 44

    ```


    How can this be explained? Java still uses the same style of passing arguments,
    **by value**, only this time the value of the reference is the one passed.


    Figure [5-6](#463938_3_En_5_Chapter.xhtml#Fig6) depicts what is going on in the
    memory managed by the JVM for the execution of the previous code.


    ![](images/463938_3_En_5_Chapter/463938_3_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Java passing reference arguments by value


    The references to the objects are interchanged in the body of the `swap(..)` method,
    but they have no effect on the `k` and `q` references, nor on the objects they
    point to in the heap.


    Tip


    If you use an intelligent Java editor like IntelliJ IDEA, it might even point
    you to the fact that something is wrong with this implementation by showing the
    `a` and `b` variables inside the `swap` method body in light gray, which means
    these two references are not used anywhere else.


    To really exchange the values, we need to exchange the content of the objects,
    by using a new object. Look at the new version of the `swap(..)` method depicted
    in Listing [5-9](#463938_3_En_5_Chapter.xhtml#PC11).


    ```

    package com.apress.bgn.five;

    public class ReferencesSwapDemo {

    void main() {

    IntContainer k = new IntContainer(42);

    IntContainer q = new IntContainer(44);

    swap(k,q);

    System.out.println("k = " + k.getValue());

    System.out.println("q = " + q.getValue());

    }

    static void swap(IntContainer a, IntContainer b) {

    IntContainer temp = new IntContainer(a.getValue());

    a.setValue(b.getValue());

    b.setValue(temp.getValue());

    }

    }

    Listing 5-9

    Code Sample Used to Show Swap of Two int Values Using References That Actually
    Swap the Values

    ```


    By making use of setters and getters, we exchange the values of the objects, because
    the references are never modified inside the body of the method. Figure [5-7](#463938_3_En_5_Chapter.xhtml#Fig7)
    depicts what happens within the memory during execution of the previous piece
    of code.


    ![](images/463938_3_En_5_Chapter/463938_3_En_5_Fig7_HTML.jpg)


    Figure 5-7


    Java passing reference arguments by value, swapping object contents


    If you run the `main()` method in Listing [5-9](#463938_3_En_5_Chapter.xhtml#PC11),
    you will notice that the values of `k` and `q` are swapped:


    ```

    k = 44

    q = 42

    ```


