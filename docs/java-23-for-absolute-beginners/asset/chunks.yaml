    INFO  c.a.b.n.ProcessListingDemo -   Command: /Users/iuliana/.sdkman/candidates/java/current/bin/java

    # other output omitted

    Listing 9-27

    Partial Output Produced by Running the Code in Listing 9-26

    ```


    **Note**


    The log in Listing [9-27](#463938_3_En_9_Chapter.xhtml#PC45) lists only the IntelliJ
    IDEA launcher used to run the `ProcessListingDemo` class and the process spawned
    to run it, but the output could be much longer. Some arguments were skipped all
    together, as it is quite useless to waste pages of the book with logs that you
    can produce yourself. Nevertheless, some depiction of the log format was necessary
    in you choose not to run the code yourself.


    The code sample in Listing [9-26](#463938_3_En_9_Chapter.xhtml#PC44) showed you
    roughly how to access native processes and print information about them. Using
    the improved Java Process API, we can create new processes and start commands
    of the underlying operating system. For example, we can create a process that
    prints the value of the `JAVA_HOME` environment variable, and capture the output
    to display it in the IntelliJ IDEA console, as depicted in Listing [9-28](#463938_3_En_9_Chapter.xhtml#PC46).
    (This code works on macOS and Linux; for Windows the equivalent PowerShell command
    should be used.)'
