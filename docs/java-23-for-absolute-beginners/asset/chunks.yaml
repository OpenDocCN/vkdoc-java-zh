    \ :\nIntStream.generate(() -> randomGenerator.nextInt(150)).limit(30);\n}\nprivate\
    \ final SubmissionPublisher submissionPublisher = new SubmissionPublisher();\n\
    @Override\npublic void subscribe(Flow.Subscriber subscriber) {\nsubmissionPublisher.subscribe(subscriber);\n\
    }\npublic void start() {\nintStream.forEach(element -> {\nsubmissionPublisher.submit(element);\n\
    sleep();\n});\n}\nprivate void sleep() {\ntry {\nThread.sleep(1000);\n} catch\
    \ (InterruptedException _) {\n}\n}\n}\n```\n\n**Listing 12-2** Publisher Generating\
    \ an Infinite Number of Integers\n\n> **Tip**  \n> Notice how the constructor\
    \ of the `IntPublisher` class takes a single argument. If the value provided as\
    \ argument at instantiation time is 0 (zero), an infinite stream is created. If\
    \ the argument value is different from 0, a finite stream is created. This is\
    \ useful if you want to run the example and not forcefully stop the execution.\n\
