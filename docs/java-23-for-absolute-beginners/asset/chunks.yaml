    \ 和 **m**ain。\n\n包含一个 `main` 方法并打印文本 *Hello World!* 的 `HelloWorld` 类如清单 [3-17](#463938_3_En_3_Chapter.xhtml#PC17)\
    \ 所示。\n\n```\npublic class HelloWorld {\npublic static void main(String... args)\
