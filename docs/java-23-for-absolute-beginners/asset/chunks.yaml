    Java provides thread management classes that can create and manage threads, so
    the developer mustn’t declare the threads explicitly. One such interface is `java.util.concurrent.ExecutorService`.
    Java provides implementing classes that can be instantiated, and the instances
    can be configured to run a big number of threads in parallel in a **thread pool**.
    A thread pool is a group of preconstructed platform threads that are reused when
    they become available. Some thread pools have a fixed number of threads, while
    others create new threads as needed. Most times, though, you won’t need to go
    too much into detail, and can just rely on factory methods provided by the `java.util.concurrent.Executors`
    utility class.


    Listing [5-52](#463938_3_En_5_Chapter.xhtml#PC91) shows an example of using the
    `Executors.newFixedThreadPool(..)` method to create a thread pool instance used
    to manage 100 instances of `java.util.concurrent.Callable<V>`. The `Callable<V>`
    interface is a concurrency Java type used to model a task that returns a result
    and may throw an exception. `Callable<V>` is similar to `java.lang.Runnable` in
    that they are both supposed to be implemented by classes whose instances are executed
    on a thread.


