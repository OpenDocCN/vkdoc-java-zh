- fmt: '### `jps`


    一个正在运行的 Java 应用程序拥有一个唯一的进程标识符，也称为 *PID* 或 *进程 ID*。操作系统通过它来跟踪所有同时并行运行的应用程序。你可以在诸如
    Windows 的 **Process Explorer** 和 macOS 的 **Activity Monitor** 等工具中看到进程 ID，但如果你对在控制台中操作足够熟悉，你可能会更喜欢使用
    JDK 提供的 `jps`（Java 虚拟机进程状态工具的缩写）可执行文件，因为它只关注 Java 进程。


    当从控制台调用 `jps` 时，将列出所有 Java 进程 ID，以及主类名称或 API 暴露的一些有助于识别正在运行的应用程序的详细信息。当应用程序崩溃但进程仍处于挂起状态时，这非常有用。当应用程序使用文件或网络端口等资源时，这可能会很麻烦，因为它可能会阻塞这些资源并阻止你使用它们。在我的电脑（我有一台
    Mac）上执行 `jps` 时，我看到以下正在运行的 Java 进程：


    ```

    > jps

    73397 SortingLogbackDemo

    72196 RemoteMavenServer40

    73396 Launcher

    73814 Jps

    59103 Main

    ```


    如你所见，`jps` 在输出中包含了自身，因为它本身也是一个 Java 进程。其他进程如下（不按输出顺序）：


    *   进程 `73397` 是 `SortingLogbackDemo` 类的执行。

    *   进程 `73396` 是 IntelliJ IDEA 用来启动 `SortingLogbackDemo` 类执行的启动器应用程序。

    *   进程 `60935` 没有任何描述，但此时我可以自己识别该进程，因为我知道我打开了 IntelliJ IDEA，它本身就是一个 Java 应用程序。

    *   进程 `59103` 也是 IntelliJ IDEA，你将在下一节中看到。

    *   进程 `72196` 也是 IntelliJ IDEA，因为我将其配置为使用 Maven 构建我的源代码。


    能够知道进程 ID 的好处是，当它们最终挂起并阻塞资源时，你可以杀死它们。假设进程是因为 `SortingLogbackDemo` 的执行最终挂起而启动的。要杀死一个进程，所有操作系统都提供了
    `kill` 命令的一个版本。对于 macOS 和 Linux，你应该执行以下命令：


    ```

    kill -9 [process_id]

    ```


    对于这个例子，如果我调用 `kill -9 73397`，然后调用 `jps`，我可以看到 `SortingLogbackDemo` 进程不再列出：


    ```

    > jps

    72196 RemoteMavenServer40

    73396 Launcher

    59103 Main

    74029 Jps

    ```


    警告


    `kill -9` 命令并不总是合适的，尤其是当你试图杀死的进程使用了需要安全释放的资源时。此外，这里用作示例的命令适用于 Linux 和 macOS 系统，不适用于
    Windows；在 Windows 上，根据你使用的是命令提示符还是 PowerShell，你可能需要使用 `taskkill` 或 `Stop-Process`。


    我仍然有启动器进程，但那是 IntelliJ IDEA 的子进程，所以杀死它没有意义，因为下次我在 IDE 中运行一个主类时，该进程将再次启动。


    `jps` 是一个相当简单的工具，当你怀疑一个 Java 应用程序是否在只能通过终端访问的远程机器上存活时，它特别有用。所以知道它的存在是件好事。


    ### `jcmd`


    `jcmd` 可执行文件是另一个可能有用的 JDK 工具。你可以使用它向 JVM 发送诊断命令请求，这有助于对 JVM 和正在运行的 Java 应用程序进行故障排除和诊断。它必须在运行
    JVM 的同一台机器上使用，并且不带任何参数调用它的结果是显示当前机器上运行的所有 Java 进程，包括它自己。除了进程 ID，`jcmd` 还会显示用于启动其执行的命令：


    ```

    > jcmd

    74152 chapter.nine.logback/com.apress.bgn.nine.SortingLogbackDemo 5 a 3 2 b -
    1 ds 4

    74158 jdk.jcmd/sun.tools.jcmd.JCmd

    59103 com.intellij.idea.Main

    72196 com.intellij.maven.server.m40.RemoteMavenServer40

    74151 org.jetbrains.jps.cmdline.Launcher ... # rest of the details omitted

    ```


    当使用 Java 进程 ID 和文本 `help` 作为参数运行 `jcmd` 时，它会显示你可以在该进程上使用的所有附加命令。这仅在应用程序当前正在运行且未因断点而暂停时才有效。在我写这篇文章时，`SortingLogbackDemo`
    类当前已暂停，因为它的执行时间太短，无法使用 `jcmd`。另一个 Java 进程，为运行 `BigSortingSlf4jDemo` 类而创建，该类对 100,000,000
    个随机生成的数字数组进行排序，被用作示例来生成清单 [9-22](#463938_3_En_9_Chapter.xhtml#PC39) 中描述的输出。


    ```

    > jcmd 74152 help

    74152:

    The following commands are available:

    Compiler.CodeHeap_Analytics

    Compiler.codecache

    Compiler.codelist

    # other Compiler.* options omitted

    GC.class_histogram

    GC.finalizer_info

    GC.heap_dump

    GC.heap_info

    GC.run

    GC.run_finalization

    JFR.check

    JFR.configure

    # other JFR.* options omitted

    JVMTI.agent_load

    JVMTI.data_dump

    ManagementAgent.start

    ManagementAgent.start_local

    ManagementAgent.status

    ManagementAgent.stop

    Thread.dump_to_file

    Thread.print

    VM.cds

    VM.class_hierarchy

    # other VM.* options omitted

    help

    Listing 9-22

    The Output of jcmd [pid] help on a Java Process Doing Some Serious Work

    ```


    本书的目的不是涵盖所有命令选项，因为它们属于 Java 的高级特性，但你应该对每个命令的范围有一个基本的了解。例如，清单 [9-23](#463938_3_En_9_Chapter.xhtml#PC40)
    显示了调用 `jcmd 51301 GC.heap_info` 的输出。


    ```

    > jcmd 74828 GC.heap_info

    74828:

    garbage-first heap   total reserved 8388608K, committed 1368064K, used 460069K
    [0x0000000600000000, 0x0000000800000000)

    region size 4096K, 2 young (8192K), 1 survivors (4096K)

    Metaspace       used 6551K, committed 6848K, reserved 1114112K

    class space    used 887K, committed 1024K, reserved 1048576K

    Listing 9-23

    The Output of jcmd [pid] GC.heap_info on a Java Process Doing Some Serious Work

    ```


    回顾第 [5](#463938_3_En_5_Chapter.xhtml) 章中 JVM 使用的不同类型的内存，以及 **堆** 是存储应用程序使用的所有对象的内存。此命令打印堆的详细信息，包括使用了多少、预留了多少、区域大小等等。所有这些细节将在第
    [13](#463938_3_En_13_Chapter.xhtml) 章中更详细地介绍。'
  raw: '#### jps


    A running Java application has a unique process id entifier also referred to as
    *PID* or *process id*. This is how an operating system keeps track of all applications
    running in parallel at the same. You can see the process ids in utilities such
    as **Process Explorer** in Windows and **Activity Monitor** in macOS, but if you
    are comfortable enough working in the console, you might prefer using the **jps**
    (short for Java Virtual Machine Process Status Tool) executable provided by the
    JDK because it focuses only on Java processes.


    When calling `jps` from the console, all Java process ids will be listed, together
    with the main class name or some details that are exposed by the API that will
    help you identify the application running. This is useful when an application
    crashes but the process remains in a hanging state. This can be painful when the
    application uses resources such as files or network ports, because it might block
    them and prevent you from using them. When executing `jps` on my computer (I have
    a Mac) these are the Java processes I see running:


    ```

    > jps

    73397 SortingLogbackDemo

    72196 RemoteMavenServer40

    73396 Launcher

    73814 Jps

    59103 Main


    ```


    As you can see, `jps` includes itself in the output, because it is also a Java
    process. The other processes are as follows (not in order of the output):


    *   Process `73397` is the execution of the `SortingLogbackDemo` class.


    *   Process `73396` is a launcher application that IntelliJ IDEA uses to start
    the execution of the `SortingLogbackDemo` class.


    *   Process `60935` does not have any description, but at this point I can identify
    the process myself, because I know I have IntelliJ IDEA opened, which is itself
    a Java application.


    *   Process `59103` is also IntelliJ IDEA, as you will see in the next section.


    *   Process `72196` is also IntelliJ IDEA, because I have it configured to build
    my sources using Maven.


    The advantage of being able to know the process ids is that you can kill them
    when they end up hanging and blocking resources. Let’s assume that the process
    started because the execution of `SortingLogbackDemo` ended up hanging. To kill
    a process, all operating systems provide a version of the `kill` command. For
    macOS and Linux you should execute the following:


    ```

    kill -9 [process_id]

    ```


    For this example, if I call `kill -9 73397` and then call `jps`, I can see that
    the `SortingLogbackDemo` process is no longer listed:


    ```

    > jps

    72196 RemoteMavenServer40

    73396 Launcher


    59103 Main

    74029 Jps

    ```


    Warning


    The `kill -9` command is not always suitable, especially if the process you are
    trying to kill uses resources that need to be safely released. Also, the command
    used as an example here works on Linux and macOS systems, not on Windows; on Windows,
    depending if you use Command Prompt or PowerShell, you might need to use `taskkill`
    or `Stop-Process`.


    I still have the Launcher process, but that is a child process of IntelliJ IDEA,
    so there is no point in killing it, because the next time that I run a main class
    in the IDE, the process will be started again.


    `jps` is quite a simple tool and is particularly useful when you have doubts about
    a Java application being alive or not on a remote machine that you can access
    only via a terminal. So it’s good to know it exists.


    #### jcmd


    The **jcmd** executable is another JDK utility that can be useful. You can use
    it to send diagnostic command requests to the JVM that can help to troubleshoot
    and diagnose the JVM and running Java applications. It must be used on the same
    machine where the JVM is running, and the result of calling it without any arguments
    is that it shows all Java processes currently running on the machine, including
    itself. Beside the process ids, `jcmd` also displays the command used to start
    their execution:


    ```

    > jcmd

    74152 chapter.nine.logback/com.apress.bgn.nine.SortingLogbackDemo 5 a 3 2 b -
    1 ds 4

    74158 jdk.jcmd/sun.tools.jcmd.JCmd

    59103 com.intellij.idea.Main

    72196 com.intellij.maven.server.m40.RemoteMavenServer40

    74151 org.jetbrains.jps.cmdline.Launcher ... # rest of the details omitted

    ```


    When `jcmd` is run with a Java process id and the text `help` as an argument,
    it displays all additional commands you can use on that process. This will work
    if the application is currently running and not paused using a breakpoint. The
    `SortingLogbackDemo` class is currently paused when I am writing this since its
    execution lasts too little time for the `jcmd` to be used. Another Java process,
    created for running the `BigSortingSlf4jDemo` class that sorts an array of 100,000,000
    randomly generated numbers, is used as an example to produce the output depicted
    in Listing [9-22](#463938_3_En_9_Chapter.xhtml#PC39).


    ```

    > jcmd 74152 help

    74152:

    The following commands are available:

    Compiler.CodeHeap_Analytics

    Compiler.codecache

    Compiler.codelist

    # other Compiler.* options omitted

    GC.class_histogram

    GC.finalizer_info

    GC.heap_dump

    GC.heap_info

    GC.run

    GC.run_finalization

    JFR.check

    JFR.configure

    # other JFR.* options omitted

    JVMTI.agent_load

    JVMTI.data_dump

    ManagementAgent.start

    ManagementAgent.start_local

    ManagementAgent.status

    ManagementAgent.stop

    Thread.dump_to_file

    Thread.print

    VM.cds

    VM.class_hierarchy

    # other VM.* options omitted

    help

    Listing 9-22

    The Output of jcmd [pid] help on a Java Process Doing Some Serious Work

    ```


    It is not the objective of this book to cover all the command options, as they
    are quite advanced features of Java, but you should have a basic idea of the scope
    of each command. As an example, Listing [9-23](#463938_3_En_9_Chapter.xhtml#PC40)
    shows the output of calling `jcmd 51301 GC.heap_info`.


    ```

    > jcmd 74828 GC.heap_info

    74828:

    garbage-first heap   total reserved 8388608K, committed 1368064K, used 460069K
    [0x0000000600000000, 0x0000000800000000)

    region size 4096K, 2 young (8192K), 1 survivors (4096K)

    Metaspace       used 6551K, committed 6848K, reserved 1114112K

    class space    used 887K, committed 1024K, reserved 1048576K

    Listing 9-23

    The Output of jcmd [pid] GC.heap_info on a Java Process Doing Some Serious Work

    ```


    Recall from **Chapter** [**5**](#463938_3_En_5_Chapter.xhtml) the different types
    of memory used by the JVM, and that **heap** is the memory where all the objects
    used by an application are stored. This command prints the heap details, including
    how much of it is used, how much is reserved, the region size, and so on. All
    these details will be covered in more detail in **Chapter** [**13**](#463938_3_En_13_Chapter.xhtml).'
  trans: '

    #### jps


    正在运行的 Java 应用程序拥有一个唯一的进程标识符，也称为 *PID* 或 *进程 ID*。操作系统通过它来跟踪所有同时并行运行的应用程序。你可以在诸如
    Windows 的**进程资源管理器**和 macOS 的**活动监视器**等工具中看到进程 ID，但如果你对在控制台中操作足够熟悉，你可能会更喜欢使用 JDK
    提供的 **jps**（Java 虚拟机进程状态工具的简称）可执行文件，因为它只关注 Java 进程。


    当从控制台调用 `jps` 时，将列出所有 Java 进程 ID，以及主类名称或 API 暴露的一些有助于识别正在运行的应用程序的详细信息。当应用程序崩溃但进程仍处于挂起状态时，这非常有用。当应用程序使用文件或网络端口等资源时，这可能会很麻烦，因为它可能会阻塞这些资源并阻止你使用它们。在我的电脑（我有一台
    Mac）上执行 `jps` 时，我看到正在运行的 Java 进程如下：


    ```

    > jps

    73397 SortingLogbackDemo

    72196 RemoteMavenServer40

    73396 Launcher

    73814 Jps

    59103 Main


    ```


    如你所见，`jps` 在输出中包含了自身，因为它本身也是一个 Java 进程。其他进程如下（不按输出顺序）：


    *   进程 `73397` 是 `SortingLogbackDemo` 类的执行实例。

    *   进程 `73396` 是 IntelliJ IDEA 用来启动 `SortingLogbackDemo` 类执行的启动器应用程序。

    *   进程 `60935` 没有任何描述，但此时我可以自己识别这个进程，因为我知道我打开了 IntelliJ IDEA，它本身就是一个 Java 应用程序。

    *   进程 `59103` 也是 IntelliJ IDEA，你将在下一节中看到。

    *   进程 `72196` 也是 IntelliJ IDEA，因为我将其配置为使用 Maven 构建我的源代码。


    能够知道进程 ID 的好处是，当它们最终挂起并阻塞资源时，你可以终止它们。假设进程是因为 `SortingLogbackDemo` 的执行挂起而启动的。要终止一个进程，所有操作系统都提供了
    `kill` 命令的某个版本。对于 macOS 和 Linux，你应该执行以下命令：


    ```

    kill -9 [process_id]

    ```


    对于这个例子，如果我调用 `kill -9 73397`，然后调用 `jps`，我可以看到 `SortingLogbackDemo` 进程不再被列出：


    ```

    > jps

    72196 RemoteMavenServer40

    73396 Launcher


    59103 Main

    74029 Jps

    ```


    警告


    `kill -9` 命令并不总是适用，特别是当你试图终止的进程使用了需要安全释放的资源时。此外，这里用作示例的命令适用于 Linux 和 macOS 系统，不适用于
    Windows；在 Windows 上，根据你使用的是命令提示符还是 PowerShell，你可能需要使用 `taskkill` 或 `Stop-Process`。


    我仍然有 Launcher 进程，但那是 IntelliJ IDEA 的子进程，所以终止它没有意义，因为下次我在 IDE 中运行一个主类时，该进程会再次启动。


    `jps` 是一个相当简单的工具，当你怀疑一个只能通过终端访问的远程机器上的 Java 应用程序是否还活着时，它特别有用。所以知道它的存在是件好事。


    #### jcmd


    **jcmd** 可执行文件是另一个可能有用的 JDK 工具。你可以使用它向 JVM 发送诊断命令请求，这有助于对 JVM 和正在运行的 Java 应用程序进行故障排除和诊断。它必须在运行
    JVM 的同一台机器上使用，并且不带任何参数调用它的结果是显示当前机器上运行的所有 Java 进程，包括它自己。除了进程 ID 之外，`jcmd` 还会显示用于启动它们执行的命令：


    ```

    > jcmd

    74152 chapter.nine.logback/com.apress.bgn.nine.SortingLogbackDemo 5 a 3 2 b -
    1 ds 4

    74158 jdk.jcmd/sun.tools.jcmd.JCmd

    59103 com.intellij.idea.Main

    72196 com.intellij.maven.server.m40.RemoteMavenServer40

    74151 org.jetbrains.jps.cmdline.Launcher ... # 其余细节省略

    ```


    当使用 Java 进程 ID 和文本 `help` 作为参数运行 `jcmd` 时，它会显示你可以在该进程上使用的所有附加命令。这仅在应用程序当前正在运行且未因断点而暂停时才有效。在我写这篇文章时，`SortingLogbackDemo`
    类当前处于暂停状态，因为它的执行时间太短，无法使用 `jcmd`。另一个 Java 进程，是为运行 `BigSortingSlf4jDemo` 类而创建的，该类对一个包含
    100,000,000 个随机生成数字的数组进行排序，被用作示例来生成清单 9-22 中描述的输出。


    ```

    > jcmd 74152 help

    74152:

    可用的命令如下：

    Compiler.CodeHeap_Analytics

    Compiler.codecache

    Compiler.codelist

    # 其他 Compiler.* 选项已省略

    GC.class_histogram

    GC.finalizer_info

    GC.heap_dump

    GC.heap_info

    GC.run

    GC.run_finalization

    JFR.check

    JFR.configure

    # 其他 JFR.* 选项已省略

    JVMTI.agent_load

    JVMTI.data_dump

    ManagementAgent.start

    ManagementAgent.start_local

    ManagementAgent.status

    ManagementAgent.stop

    Thread.dump_to_file

    Thread.print

    VM.cds

    VM.class_hierarchy

    # 其他 VM.* 选项已省略

    help

    清单 9-22

    在一个正在执行繁重工作的 Java 进程上执行 jcmd [pid] help 的输出

    ```


    本书的目标并非涵盖所有命令选项，因为它们属于 Java 的高级特性，但你应该对每个命令的适用范围有一个基本了解。例如，清单 9-23 显示了调用 `jcmd
    51301 GC.heap_info` 的输出。


    ```

    > jcmd 74828 GC.heap_info

    74828:

    garbage-first heap   total reserved 8388608K, committed 1368064K, used 460069K
    [0x0000000600000000, 0x0000000800000000)

    region size 4096K, 2 young (8192K), 1 survivors (4096K)

    Metaspace       used 6551K, committed 6848K, reserved 1114112K

    class space    used 887K, committed 1024K, reserved 1048576K

    清单 9-23

    在一个正在执行繁重工作的 Java 进程上执行 jcmd [pid] GC.heap_info 的输出


    回顾**第** **5** **章**中 JVM 使用的不同类型的内存，以及 **堆** 是存储应用程序使用的所有对象的内存。此命令打印堆的详细信息，包括已使用多少、已保留多少、区域大小等。所有这些详细信息将在**第**
    **13** **章**中更详细地介绍。

