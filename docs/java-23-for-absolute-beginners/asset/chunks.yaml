- fmt: '## Core Syntax Parts


    Writing Java code is easy, but before doing so, a few basic syntax rules are necessary.
    Let’s analyze the code sample that started this book, reproduced in Listing [3-1](#463938_3_En_3_Chapter.xhtml#PC1).


    ```

    package com.apress.ch.one.hw;

    import java.util.List;

    public class Example01 {

    public static void main(String[] args) {

    List items = List.of("1", "a", "2", "a", "3", "a");

    items.forEach(item -> {

    if (item.equals("a")) {

    System.out.println("A");

    } else {

    System.out.println("Not A");

    }

    });

    }

    }

    Listing 3-1

    The Java Beginner Code Sample a Smart Beginner Deserves

    ```


    The next list explains each line, or group of lines with the same purpose:


    * `package com.apress.ch.one.hw;` is a package declaration. You can view this
    statement as an address of the class declared in the file.

    * `;` (semicolon) is used to mark the end of a statement or declaration.

    * `import java.util.List;` is an import statement. JDK provides a number of classes
    to use when writing code. Those classes are organized in packages too, and when
    you want to use one of them, you have to specify the class to use and its package,
    because two classes might have the same name but are declared in different packages.
    And when the compiler compiles your code, it needs to know exactly which class
    is needed.

    * `public class Example01` is a class declaration statement. It contains an accessor
    (`public`), the type (`class`), and the name of the class (`Example01`). A class
    has a body that is wrapped between curly braces.

    * `{ ... }` (curly braces) are used to group statements together into code blocks.
    Blocks do not require to be ended with a `;`. Blocks of code can represent a body
    of a class, a method, or just a few statements that have to be grouped together
    so the code looks better.

    * `public static void main(String[] args)` is a method declaration statement.
    It contains an accessor (`public`), a reserved keyword (`static`) that will be
    explained later, the name of the method (`main`), and a section that declares
    parameters (`(String[] args)`).

    * `List<String> items = List.of("1", "a", "2", "a", "3", "a");` is a statement
    declaring a variable named `items` of type `List<String>` and assigning the value
    returned by this statement to it: `List.of("1", "a", "2", "a", "3", "a")`.

    * `items.forEach(...)` is a statement containing a function call on the `items`
    variable used to traverse all values in this list variable.

    * `item -> { ... }` is a lambda expression. It declares a code block to be executed
    for each item in the list.

    * `if (<condition>) { ... } else { ... }` is a decision statement. The block of
    code being executed is decided by evaluating the condition.

    * `System.out.println(<text>);` is a statement used to print an argument passed
    to it.


    It’s too early in the book to start explaining everything in the previous list
    in detail, but the most important rule when writing Java code is that, except
    package declarations and import statements, all code must be within a block. Also,
    if a statement is not spread on multiple lines, it must end with `;` (semicolon),
    because otherwise the code will not compile.


    For writing more advanced Java classes, with code that solves a real problem,
    you must know and understand the building blocks of Java.


    ## Java Fundamental Building Blocks: Packages, Modules, and Classes


    **Warning**


    This is a consistent introduction into Java as a platform. To write Java code
    confidently, you need to have a grasp of what happens under the hood, what the
    building blocks are, and the order in which you have to configure/write them.
    If you want, you can skip to the next section, “How to Determine the Structure
    of a Java Project,” but in the same way some new drivers need a little knowledge
    of how the engine works before grabbing the driving wheel confidently, some people
    might feel more confident and in control when programming if they understand the
    mechanics a little. So, I wanted to make sure that anyone reading this book gets
    a proper start.


    To write Java applications, a developer must be familiar with the Java building
    blocks of a Java program. Think about it like this: if you are trying to build
    a car, you have to learn what wheels are and where they are placed, right? This
    is what I’m trying to achieve for Java in this book: to explain all the components
    and their purpose.


    The fundamental building block of Java is the **class**. There are other **object
    types** (like interfaces, enums, annotations, and records) in Java, but classes
    are the most important because they represent the templates for the objects making
    up an application. A class mainly contains **fields** and **methods**. When an
    object is created, the values of the fields define the state of the object, and
    the methods describe its behavior.


    **Important**


    The Java object is a model of a real-world object. So, if we choose to model a
    car in Java, we will choose to define fields that describe the car: `manufacturer`,
    `modelName`, `productionYear`, `color`, and `speed`. The methods of our car class
    describe what the car does. A car does mainly two things—accelerates and brakes—so
    any method should describe actions related to these two things.'
