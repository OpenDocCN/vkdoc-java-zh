- fmt: '# 类成员访问修饰符


    在类内部，类成员被定义为**字段**和**方法**。除此之外，我们还可以定义其他Java类型，这些类型被称为嵌套类型，但我们稍后会讨论这个问题。在成员级别，除了之前提到的两个修饰符外，还可以应用另外两个修饰符：`private`和`protected`。在成员级别，访问修饰符具有以下效果：


    *   `public`：与顶层相同，该成员可以从任何地方访问。

    *   `private`：该成员只能在其声明的类中访问。

    *   `protected`：该成员只能在包含它的类所在的包中访问，或者由另一个包中该类的任何子类访问。

    *   `none`（默认/包私有）：该成员只能在其自己的包内访问。


    前面的规则可能看起来很复杂，但一旦你开始编写代码，你就会习惯它。在Oracle官方文档页面上，甚至有一个成员可见性的表格^([^(38)](#fn38))。表[3-1](#463938_3_En_3_Chapter.xhtml#Tab1)提供了一个修改后的版本。


    **表3-1 成员级别访问器作用域**


    | 修饰符 | 类 | 包 | 子类 | 世界 |

    | --- | --- | --- | --- | --- |

    | `public` | 是 | 是 | 是 | 是 |

    | `protected` | 是 | 是 | 是 | 否 |

    | `none`（默认/包私有） | 是 | 是 | 否 | 否 |

    | `private` | 是 | 否 | 否 | 否 |


    为了全面了解该表如何应用于代码，清单[3-6](#463938_3_En_3_Chapter.xhtml#PC6)中的类非常有帮助。


    ```

    package com.apress.bgn.three.same;

    public class PropProvider {

    public int publicProp;

    protected int protectedProp;

    /* default */ int defaultProp;

    private int privateProp;

    public PropProvider(){

    privateProp = 0;

    }

    }

    ```

    **清单3-6** `PropProvider`，一个使用各种访问器装饰成员的Java类


    `PropProvider`类声明了四个字段，每个字段都有不同的访问修饰符。`privateProp`字段只能在此类的主体内修改。这意味着此类的所有其他成员都可以读取此属性的值并更改它。


    在本书中，到目前为止只提到了方法是其他类型的成员。但是，可以在另一个类的主体内声明类。这样的类称为**嵌套类**，它可以访问包装它的类的所有成员，包括私有成员。表[3-1](#463938_3_En_3_Chapter.xhtml#Tab1)中的**类**列（第二列）涵盖了在另一个类（嵌套类）内声明的类可以访问的字段。图[3-7](#463938_3_En_3_Chapter.xhtml#Fig7)描述了修改后的`PropProvider`类，它添加了一个名为`printPrivate`的额外方法。此方法读取私有字段的值并打印它。还声明了一个名为`LocalPropRequester`的嵌套类，并且显示在此类中修改了私有字段（第56行）。


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig7_HTML.jpg)


    **图3-7** 表[3-1](#463938_3_En_3_Chapter.xhtml#Tab1)中**类**列在Java代码中的访问器


    图[3-7](#463938_3_En_3_Chapter.xhtml#Fig7)是Java代码在IntelliJ IDEA中查看的屏幕截图。如果任何字段不可访问，则会以红色显示。


    表[3-1](#463938_3_En_3_Chapter.xhtml#Tab1)中的第三列，即**包**列，涵盖了与`PropProvider`类在同一包中声明的类可以访问的字段。图[3-8](#463938_3_En_3_Chapter.xhtml#Fig8)描述了一个名为`PropRequester`的类，它试图修改`PropProvider`类中的所有字段。请注意，私有字段以亮红色显示。这意味着该字段不可访问，IntelliJ
    IDEA使其非常明显。


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig8_HTML.jpg)


    **图3-8** 表[3-1](#463938_3_En_3_Chapter.xhtml#Tab1)中**包**列在Java代码中的访问器


    表[3-1](#463938_3_En_3_Chapter.xhtml#Tab1)中的第四列，即**子类**列，涵盖了`PropProvider`类的子类可以访问的字段。**子类**从其派生的类（称为其**超类**）继承状态和行为。子类是使用`extends`关键字和超类名称创建的。图[3-9](#463938_3_En_3_Chapter.xhtml#Fig9)描述了一个名为`SubClassedProvider`的类，它试图修改从`PropProvider`继承的所有字段。请注意，私有字段和没有访问器的字段被IntelliJ
    IDEA以亮红色显示。这意味着这些字段不可访问。


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig9_HTML.jpg)


    **图3-9** 表[3-1](#463938_3_En_3_Chapter.xhtml#Tab1)中**子类**列在Java代码中的访问器


    **重要**


    在前面的示例中，没有访问器的字段不可访问，因为子类是在不同的包中声明的。如果子类移动到同一个包中，则适用表[3-1](#463938_3_En_3_Chapter.xhtml#Tab1)中**包**列的规则。


    表[3-1](#463938_3_En_3_Chapter.xhtml#Tab1)中的最后一列，即**世界**列，适用于`PropProvider`类所在包之外的所有类，这些类不是此类的子类。图[3-10](#463938_3_En_3_Chapter.xhtml#Fig10)描述了一个名为`AnotherPropRequester`的类，它试图访问`PropProvider`中声明的所有字段。正如预期的那样，只有公共字段是可访问的，其余字段以红色显示。


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig10_HTML.jpg)


    **图3-10** 表[3-1](#463938_3_En_3_Chapter.xhtml#Tab1)中**世界**列在Java代码中的访问器


    使用Maven构建工具构建包含`AnotherPropRequester`类的`chapter03`子项目会失败。错误消息显示在清单[3-7](#463938_3_En_3_Chapter.xhtml#PC7)中。


    ```

    [ERROR] Failed to execute goal org.apache.maven.plugins:maven-compiler-plugin:3.8.1:compile
    (default-compile) on project chapter03: Compilation failure: Compilation failure:

    [ERROR] ./java-23-for-absolute-beginners/chapter03/src/main/java/com/apress/bgn/three/other/AnotherPropRequester.java:[42,17]
    protectedProp has protected access in com.apress.bgn.three.same.PropProvider

    [ERROR] ./java-23-for-absolute-beginners/chapter03/src/main/java/com/apress/bgn/three/other/AnotherPropRequester.java:[44,17]
    defaultProp is not public in com.apress.bgn.three.same.PropProvider; cannot be
    accessed from outside package

    [ERROR] ./java-23-for-absolute-beginners/chapter03/src/main/java/com/apress/bgn/three/other/AnotherPropRequester.java:[46,17]
    privateProp has private access in com.apress.bgn.three.same.PropProvider

    ```

    **清单3-7** `AnotherPropRequester`编译错误


    如所示，构建工具和编辑器非常擅长在Java代码出现问题时通知你。学会好好使用它们，信任它们，它们会提高你的生产力。*当然，构建工具和智能编辑器偶尔也会出现问题，但不会那么多。*


    在开始编写Java代码后，你可能会再次参考表[3-1](#463938_3_En_3_Chapter.xhtml#Tab1)一两次。即使引入了模块，本节涵盖的所有内容仍然有效。前提是你正确配置了模块访问。'
  raw: 'Inside a class the class members are defined: **fields** and **methods**.
    Aside from that, we can also define other Java types, which are referred to as
    being nested, but we’ll cross that bridge when we come to it. At member-level
    two more modifiers can be applied, aside from the two previously mentioned: `private`
    and `protected`. At member-level the access modifiers have the following effect:


    *   `public`: Same as at top level, the member can be accessed from everywhere.


    *   `private`: -The member can be accessed only in the class where is declared.


    *   `protected`: The member can be accessed only in the package where the class
    containing it is declared or by any subclass of its class in another package.


    *   `none`: The member can be accessed only from within its own package.


    The preceding rules might seem complicated, but once you start writing code, you’ll
    get used to it. On the official Oracle documentation page, there is even a table
    with the visibility of members^([^(38)](#fn38)). Table [3-1](#463938_3_En_3_Chapter.xhtml#Tab1)
    provides a modified version.


    Table 3-1


    Member-Level Accessors Scope


    | Modifier | Class | Package | Subclass | World |

    | --- | --- | --- | --- | --- |

    | `public` | Yes | Yes | Yes | Yes |

    | `protected` | Yes | Yes | Yes | No |

    | none (*default/package-private*) | Yes | Yes | No | No |

    | `private` | Yes | No | No | No |


    To get an overall idea how that table applies to code, the class in Listing [3-6](#463938_3_En_3_Chapter.xhtml#PC6)
    is very helpful.


    ```

    package com.apress.bgn.three.same;

    public class PropProvider {

    public int publicProp;

    protected int protectedProp;

    /* default */ int defaultProp;

    private int privateProp;

    public PropProvider(){

    privateProp = 0;

    }

    }

    Listing 3-6

    PropProvider, a Java Class with Members Decorated with Various Accessors

    ```


    The class `PropProvider` declares four fields, each with a different access modifier.
    The field `privateProp` can only be modified within the body of this class. This
    means all other members of this class can read the value of this property and
    change it.


    At this point in the book, only methods have been mentioned as being other types
    of members. But classes can be declared inside the body of another class. Such
    a class is called a **nested class** and has access to all the members of the
    class that is wrapped around it, including the private ones. The **Class** column
    (second column) in Table [3-1](#463938_3_En_3_Chapter.xhtml#Tab1) covers the fields
    that are accessible to a class declared within another class (nested). Figure
    [3-7](#463938_3_En_3_Chapter.xhtml#Fig7) depicts the modified `PropProvider` class
    that has an extra method added, named `printPrivate`. This method reads the value
    of the private field and prints it. A nested class named `LocalPropRequester`
    is declared as well, and the private field is shown being modified in this class
    (line 56).


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig7_HTML.jpg)


    Figure 3-7


    Table [3-1](#463938_3_En_3_Chapter.xhtml#Tab1) column **Class** accessors in Java
    code


    Figure [3-7](#463938_3_En_3_Chapter.xhtml#Fig7) is a screenshot of how the Java
    code is viewed in IntelliJ IDEA. If any field is not accessible, it is displayed
    in red.


    The third column in Table [3-1](#463938_3_En_3_Chapter.xhtml#Tab1), the **Package**
    column, covers the fields that are accessible to a class declared in the same
    package as class `PropProvider`. Figure [3-8](#463938_3_En_3_Chapter.xhtml#Fig8)
    depicts a class named `PropRequester` trying to modify all fields in class `PropProvider`.
    Notice the private field is shown in bright red. This means the field is not accessible,
    and IntelliJ IDEA makes that quite obvious.


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig8_HTML.jpg)


    Figure 3-8


    Table [3-1](#463938_3_En_3_Chapter.xhtml#Tab1) column **Package** accessors in
    Java code


    The fourth column in Table [3-1](#463938_3_En_3_Chapter.xhtml#Tab1), the **Subclass**
    column, covers the fields that are accessible to a subclass of class `PropProvider`.
    A **subclass** inherits states and behavior from a class it derives from, which
    is called its **superclass**. The subclass is created using the `extends` keyword
    together with the superclass name. Figure [3-9](#463938_3_En_3_Chapter.xhtml#Fig9)
    depicts a class named `SubClassedProvider` trying to modify all fields inherited
    from `PropProvider`. Notice the private field and the field without an accessor
    shown in bright red by IntelliJ IDEA. This means the fields are not accessible.


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig9_HTML.jpg)


    Figure 3-9


    Table [3-1](#463938_3_En_3_Chapter.xhtml#Tab1) column **Subclass** accessors in
    Java code


    Important


    The field without an accessor is not accessible in the previous example, because
    the subclass is declared in a different package. If the subclass is moved in the
    same package, the rules from the **Package** column in Table [3-1](#463938_3_En_3_Chapter.xhtml#Tab1)
    apply.


    The final column in Table [3-1](#463938_3_En_3_Chapter.xhtml#Tab1), the **World**
    column, applies to all classes outside the package where class `PropProvider`
    is declared, that are not subclasses of this class. Figure [3-10](#463938_3_En_3_Chapter.xhtml#Fig10)
    depicts a class named `AnotherPropRequester` that tries to access all fields declared
    in `PropProvider`. As expected, only the public field is accessible, and the rest
    are shown in red.


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig10_HTML.jpg)


    Figure 3-10


    Table [3-1](#463938_3_En_3_Chapter.xhtml#Tab1) column **World** accessors in Java
    code


    Building the `chapter03` subproject containing the `AnotherPropRequester` class
    using the Maven build tool fails. The error messages are displayed in Listing
    [3-7](#463938_3_En_3_Chapter.xhtml#PC7).


    ```

    [ERROR] Failed to execute goal org.apache.maven.plugins:maven-compiler-plugin:3.8.1:compile
    (default-compile) on project chapter03: Compilation failure: Compilation failure:

    [ERROR] ./java-23-for-absolute-beginners/chapter03/src/main/java/com/apress/bgn/three/other/AnotherPropRequester.java:[42,17]
    protectedProp has protected access in com.apress.bgn.three.same.PropProvider

    [ERROR] ./java-23-for-absolute-beginners/chapter03/src/main/java/com/apress/bgn/three/other/AnotherPropRequester.java:[44,17]
    defaultProp is not public in com.apress.bgn.three.same.PropProvider; cannot be
    accessed from outside package

    [ERROR] ./java-23-for-absolute-beginners/chapter03/src/main/java/com/apress/bgn/three/other/AnotherPropRequester.java:[46,17]
    privateProp has private access in com.apress.bgn.three.same.PropProvider

    Listing 3-7

    AnotherPropRequester Compile Errors

    ```


    As demonstrated, build tools and editors are pretty good at letting you know when
    something is wrong in your Java code. Learn to use them well, trust them, and
    they will increase your productivity. *Sure, build tools and smart editors have
    occasional hiccups but not that many.*


    You will probably come back to Table [3-1](#463938_3_En_3_Chapter.xhtml#Tab1)
    once or twice after you start writing Java code. Everything covered in this section
    is still valid even after the introduction of modules. If you configure module
    access properly, that is.'
