    `execute(..)`方法执行给定的SQL语句，如果第一个结果是`ResultSet`对象则返回`true`；如果是更新计数或没有结果则返回`false`。如果与数据库通信时出现任何问题，此方法还会抛出`SQLException`。该方法适用于执行SQL
    DDL语句，因为它们不返回数据，也适用于SQL DML UPDATE/DELETE语句。


    此方法的替代方法是`executeUpdate(..)`，它返回插入、更新和删除语句影响的行数，对于SQL DDL语句返回0（零）。因此，清单[11-53](#463938_3_En_11_Chapter.xhtml#PC90)中的代码可以重写为清单[11-54](#463938_3_En_11_Chapter.xhtml#PC91)所示。


    ```

    // snippet from class com.apress.bgn.eleven.DDLMySQLDemoV2

