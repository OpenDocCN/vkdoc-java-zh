    \ all-templates-on-desk` 指令。桌子可能是一个很好的类比，用来比喻包。\n\n使用清单 3-13 中的配置，我们刚刚授予了任何配置了\
    \ `requires module.zero;` 指令的模块对 `com.apress.bgn.zero` 包的访问权限。如果我们不希望这样呢？（参考前面的提示，你的室友只是让房间门开着，所以任何人都可以进去拿那些模板！）\n\
    \n如果我们想将对模块内容的访问限制为仅对 `chapter.three` 模块开放呢？（这样，你的室友只能把他们的模板给你。）这可以通过添加 `to` 关键字后跟模块名来实现，以明确只有该模块被允许访问这些组件。这就是表\
    \ 3-2 中提到的 `exports` 指令的限定版本。\n\n警告\n\n如果你出于好奇阅读了推荐的 **JAR 地狱** 文章，你会注意到处理打包在\
