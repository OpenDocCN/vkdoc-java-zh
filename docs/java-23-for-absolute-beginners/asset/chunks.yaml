    ```


    你在 Stream API 中记住的大多数函数都已在 Project Reactor 中为响应式使用而实现，因此，如果前面的代码看起来很熟悉，这就是原因。


    关于 Project Reactor API，如果你需要响应式库，可以首先考虑这个。官方文档^([(125)](#fn125))非常出色，并且包含大量示例。Oracle
    显然已暂时推迟了提供用于编写响应式应用程序的丰富 API 的计划。


    ## 总结


    响应式编程不是一个简单的话题，但响应式应用程序最适合建模事件驱动、异步、响应式和弹性的系统。本章不需要深入探讨真正高级的主题，就能展示响应式解决方案的真正威力。作为一本面向
    Java 初学者的书，这不是一个合适的主题。但是，如果你想了解更多关于构建响应式应用程序的信息，由 Apress 于 2021 年 1 月出版的《Pro Spring
    MVC with WebFlux》^([(126)](#fn126))（第二版）中有几个关于使用 Spring 和 Project Reactor 构建响应式应用程序的精彩章节。


    重要


    你必须记住的是，响应式实现对于非响应式实现是无用的，因此要构建一个真正的响应式应用程序，所有层都必须是响应式的。


    设计和使用的响应式组件与非响应式组件是没有意义的，因为你实际上可能会引入故障点并降低速度。例如，如果你使用的是 Oracle 数据库，则定义一个使用响应式流返回元素的存储库类是没有意义的，因为
    Oracle 数据库不支持响应式访问。你只是添加了一个增加额外实现的响应式层，因为在这种情况下没有真正的好处。但是，如果你选择的数据库是 MongoDB，则可以放心地使用响应式编程，因为
    MongoDB 数据库支持响应式访问。此外，如果你正在使用 ReactJS 或 Angular 界面构建 Web 应用程序，你可以设计你的控制器类以响应式地提供数据供界面显示。


    本章内容总结如下：


    *   解释了响应式编程。

    *   解释了响应式流的行为。

    *   涵盖了 JDK 响应式流支持。

    *   讨论了如何使用响应式流技术兼容性工具包来测试你的响应式解决方案。

    *   简要介绍了用于构建响应式应用程序的 Project Reactor 组件。


