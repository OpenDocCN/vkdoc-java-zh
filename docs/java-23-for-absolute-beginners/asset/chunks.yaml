- fmt: 'Most Swing applications are written by extending the `JFrame` class to gain
    more control over its component, so the preceding code can also be written as
    depicted in Listing [10-9](#463938_3_En_10_Chapter.xhtml#PC13).


    ```

    package com.apress.bgn.ten;

    import javax.swing.*;

    import java.awt.*;

    public class ExitingSwingDemo extends JFrame {

    public static void main(String... args) {

    ExitingSwingDemo swingDemo = new ExitingSwingDemo();

    swingDemo.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);

    swingDemo.setTitle("Swing Demo Window");

    swingDemo.setSize(new Dimension(500,500));

    swingDemo.setVisible(true);

    }

    }

    Listing 10-9

    Swing Application That Exits When Closed

    ```


    Now that we have a window, let’s start adding components, because changing the
    look and feel is pointless if we do not have more components so that we can notice
    the change. Each Swing application has at least one `JFrame` that is the root,
    the parent of all other windows, because windows can be created by using the `JDialog`
    class as well. `JDialog` is the main class for creating a dialog window, a special
    type of window that contains mostly a message and buttons to select options. Developers
    can use this class to create custom dialog windows or use `JOptionPane` class
    methods to create a variety of dialog windows.


    Back to adding components to a `JFrame` instance: components are added to a `JFrame`
    by adding them to its container. A reference to the `JFrame` container can be
    retrieved by calling `getContentPane()`. The default content pane is a simple
    intermediate container that inherits from `JComponent`, which extends `java.awt.Container`
    (Swing being an extension of AWT, most of its components are AWT extensions).
    For `JFrame` the default content pane is actually an instance of `JPanel`. This
    class has a field of type `java.awt.LayoutManager` that defines how other components
    are arranged in a `JPanel`. The default content pane of a `JFrame` instance uses
    a `java.awt.BorderLayout` as its layout manager, which splits a pane in five regions:
    EAST, WEST, NORTH, SOUTH, and CENTER. Each of the zones can be referred by a constant
    with a matching name defined in the `BorderLayout`.


    So if we would like to add an exit button to our application, we could add it
    to the SOUTH region by writing the code depicted in Listing [10-10](#463938_3_En_10_Chapter.xhtml#PC14).


    ```

    package com.apress.bgn.ten;

    import javax.swing.*;

    import java.awt.*;

    import java.awt.event.ActionEvent;

    import java.awt.event.ActionListener;

    public class LayeredSwingDemo extends JFrame {

    private JPanel mainPanel;

    private JButton exitButton;

    public LayeredSwingDemo(String title) {

    super(title);

    mainPanel = (JPanel) this.getContentPane();

    exitButton = new JButton("Bye Bye!");

    exitButton.addActionListener(new ActionListener() {

    @Override

    public void actionPerformed(ActionEvent e) {

    System.exit(0);

    }

    });

    mainPanel.add(exitButton, BorderLayout.SOUTH);

    }

    public static void main(String... args) {

    LayeredSwingDemo swingDemo = new LayeredSwingDemo("Swing Demo Window");

    swingDemo.setDefaultCloseOperation(JFrame.DO_NOTHING_ON_CLOSE);

    swingDemo.setSize(new Dimension(500, 500));

    swingDemo.setVisible(true);

    }

    }

    Listing 10-10

    Swing Application Using BorderLayout to Arrange Components

    ```


    In Figure [10-5](#463938_3_En_10_Chapter.xhtml#Fig5) you can see the modified
    application. We’ve added an exit button in the SOUTH area of the content pane
    and underlined the overall region arrangement of the `BorderLayout`.


    ![](images/463938_3_En_10_Chapter/463938_3_En_10_Fig5_HTML.jpg)


    Figure 10-5


    Border layout zones


    Also, because the new button has to be the only way to exit our application, the


    ```

    setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);

    ```


    was replaced with


    ```

    setDefaultCloseOperation(JFrame.DO_NOTHING_ON_CLOSE);

    ```


    and an `java.awt.event.ActionListener` instance was attached to the button, so
    that it could record the event of the button being clicked and react accordingly,
    in this case by exiting the application.


    Most Swing components support listeners that can be defined to capture events
    performed on the object by the user and react in a certain way. As we can see,
    the button expands and fills the entire space of the region, because it inherits
    the dimension of the region. To avoid that, the button should be put in another
    container, and that container should use a different layout: `FlowLayout`. As
    the name implies, this layout allows for Swing components to be added in a directional
    flow, as in a paragraph. Adjustments can be made similar to text formatting in
    text documents, and constants are defined for components being aligned: in the
    center (CENTER), left-justified (LEFT), and so on. Continuing the previous example,
    we will wrap the `exitButton` in another `JPanel` that will make use of the `FlowLayout`.


    Listing [10-11](#463938_3_En_10_Chapter.xhtml#PC17) shows how `FlowLayout` can
    be used to place a button in the right corner of the `JFrame` instance.


    ```

    public LayeredSwingDemo(String title) {

    super(title);

    mainPanel = (JPanel) this.getContentPane();

    exitButton = new JButton("Bye Bye!");

    exitButton.addActionListener(e -> System.exit(0));

    JPanel exitPanel = new JPanel();

    FlowLayout flowLayout = new FlowLayout();

    flowLayout.setAlignment(FlowLayout.RIGHT);

    exitPanel.setLayout(flowLayout);

    exitPanel.setComponentOrientation(ComponentOrientation.RIGHT_TO_LEFT);

    exitPanel.add(exitButton);

    mainPanel.add(exitPanel, BorderLayout.SOUTH);

    }

    ...

    Listing 10-11

    Swing Application Using BorderLayout and FlowLayout to Arrange Components

    ```


    There are more layouts available in the JDK, but for now let’s complete the application
    by adding a list with a number of entries. We’ll also add a listener to it, so
    that when an element is clicked, its value is added to a text area added to the
    center of the frame.


    A Swing list can be created by instantiating the `JList<E>` class. This will create
    an object that displays a list of objects and allows the user to select one or
    more items. The Swing `JList<E>` class contains a field of type `ListModel<E>`
    that manages the data contents displayed by the list. After each object is created
    and has elements added to it, the object is associated with an index. When the
    user selects an object, the index can be used for processing as well. In the snippet
    shown in Listing [10-12](#463938_3_En_10_Chapter.xhtml#PC18), the `JList<E>` object
    is declared and initialized and a `ListSelectionListener` is associated with it
    to define the action to perform when an element from the list is selected. In
    our case the element’s value must be added to a `JTextArea`.


    ```

    private static String[] data = {"John Mayer", "Frank Sinatra",

    "Seth MacFarlane", "Nina Simone", "BB King", "Peggy Lee"};

    private JList list;

    private JTextArea textArea;

    ...

    textArea = new JTextArea(50, 10);

    //NORTH

    list = new JList(data);

    list.addListSelectionListener(new ListSelectionListener() {

    @Override

    public void valueChanged(ListSelectionEvent e) {

    if (!e.getValueIsAdjusting()) {

    textArea.append(list.getSelectedValue() + "\n");

    }

    }

    });

    mainPanel.add(list, BorderLayout.NORTH);

    //CENTER

    JScrollPane txtPanel = new JScrollPane(textArea);

    textArea.setBackground(Color.LIGHT_GRAY);

    mainPanel.add(txtPanel, BorderLayout.CENTER);

    ...

    Listing 10-12

    Swing Application Using Layouts and JTextArea to Arrange Components

    ```


    When a user clicks a list element, two things happen: the previous element is
    deselected, and the one that was clicked is selected, so the selected element
    changes. The `getValueIsAdjusting()` method returns whether this is one in a series
    of multiple events (selection events, click events, whatever is supported), where
    changes are still being made, and we test if this method returns false to check
    that the selection has been already made, so we can get the value of the current
    selected element and add it to the text area.'
