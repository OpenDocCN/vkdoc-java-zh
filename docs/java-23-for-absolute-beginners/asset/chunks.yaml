    \ Tomcat on Windows, from a long, long time ago.)*\n\nWith the introduction of\
    \ the `java.lang.AutoCloseable` interface in JDK 7, the `finalize()` method became\
    \ less and less used. A few problems with this method have been mentioned previously,\
    \ but the following list gives more context:\n\n- The JVM cannot guarantee which\
    \ thread will call this method for any given object, so any thread that has access\
    \ to it can call it, and we might end up with resources being released while the\
    \ object is still necessary. The method is public, and thus it can be called explicitly\
    \ in the code, even if it is supposed to be called only by the GC thread.\n- If\
    \ the custom implementation of `finalize()` is not correct, it could throw exceptions\
    \ or not release resources properly.\n- The `finalize()` method should be called\
    \ only once, by the JVM, but this cannot be guaranteed.\n- `finalize()` calls\
    \ are not automatically chained, so a custom implementation of a `finalize()`\
    \ method must always explicitly call the `finalize()` method of the superclass.\n\
    - As previously mentioned, once a `finalize()` is called, there is no way to stop\
    \ the method from executing or undo its effect, so you are basically left with\
    \ a reference to an object that no longer exists.\n- As you have probably figured\
    \ out by now, there is a lot of freedom given to the developer when it comes to\
    \ implementing this method, and this means there is a lot of room for errors to\
    \ happen.\n\nThis list summarizes why the finalization mechanism in Java is flawed\
    \ and was deprecated in JDK 9 to discourage its use. Improper `finalize()` implementations\
    \ could lead to any of the following:\n\n- Memory leaks (memory contents are not\
    \ discarded)\n- Deadlocks (resource is blocked by two processes)\n- Hangs (process\
    \ is in a waiting state it cannot go out of)\n\nTo help with memory management,\
    \ the `java.lang.ref.Cleaner` class was introduced in Java 9. Before getting into\
    \ that, I must show you how to check out the status of your memory programmatically."
