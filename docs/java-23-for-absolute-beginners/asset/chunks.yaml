  trans: "\n### Windows 系统上的 `JAVA_HOME`\n\n要在 Windows 系统上声明 `JAVA_HOME` 环境变量，你需要打开设置系统变量的对话框窗口。在\
    \ Windows 系统中，点击**开始**按钮。在菜单中有一个搜索框。在较新的版本中，水平工具栏上也有一个搜索框，你也可以使用它。在其中输入单词 **environment**（不过，输入该单词的前三个字母就足以定位到该选项）。当\
    \ **编辑系统环境变量** 选项可用时，点击它。在 Windows 10 系统上，这些步骤如图 2-4 所示。\n\n![](img/463938_3_En_2_Fig4_HTML.jpg)\n\
    \n图 2-4\n\n用于配置环境变量的 Windows 菜单项\n\n点击该菜单项后，**系统属性** 对话框窗口应会打开，并显示 **高级** 选项卡，如图\
    \ 2-5 所示。\n\n![](img/463938_3_En_2_Fig5_HTML.jpg)\n\n图 2-5\n\n在 Windows 上设置环境变量的第一个对话框窗口\n\
    \n点击 **环境变量** 按钮，打开同名的对话框窗口，该窗口分为两个部分：用户变量和系统变量。你关注的是**系统变量**，因为你要在这里声明 `JAVA_HOME`。只需点击该部分的\
    \ **新建** 按钮，就会出现一个小的 **新建系统变量** 对话框窗口，其中包含两个文本字段；顶部字段要求你输入变量名称——此处为 `JAVA_HOME`——底部字段要求你输入路径（变量值）——此处为\
    \ JDK 路径。图 2-6 显示了背景中的 **环境变量** 对话框窗口和前景中的 **编辑系统变量** 对话框窗口（我已经创建了 `JAVA_HOME`，所以显示的对话框窗口是“编辑系统变量”而不是“新建系统变量”）。\n\
    \n![](img/463938_3_En_2_Fig6_HTML.jpg)\n\n图 2-6\n\n在 Windows 10 上将 `JAVA_HOME`\
    \ 声明为系统变量\n\n声明 `JAVA_HOME` 变量后，你需要将可执行文件添加到系统路径中。你可以通过编辑 `Path` 变量来实现。在 **环境变量**\
    \ 对话框的 **系统变量** 列表中选择它，如图 2-7 左侧所示，然后点击 **编辑** 按钮打开 **编辑环境变量** 对话框（如右侧所示）。从 Windows\
    \ 10 开始，`Path` 变量的每个部分都显示在不同的行上，因此你可以添加一个新行，并在其中添加 `%JAVA_HOME%\\bin`。这种语法很实用，因为它会从\
    \ `JAVA_HOME` 变量包含的任何位置获取 `bin` 目录的位置。\n\n![](img/463938_3_En_2_Fig7_HTML.jpg)\n\
    \n图 2-7\n\n在 Windows 10 上将 JDK 可执行文件目录声明为系统 `Path` 变量的一部分\n\n在较旧的 Windows 系统上，`Path`\
    \ 的内容显示在一个文本字段中。因此，你必须在 **变量值** 文本字段中添加 `%JAVA_HOME%\\bin` 表达式，并使用分号 (;) 将其与现有内容分隔开。\n\
    \n无论你使用哪种 Windows 系统，你都可以通过打开 **命令提示符**（在搜索框中开始键入名称以轻松定位）并执行 `set` 命令来检查是否一切设置正确。这将列出所有系统变量及其值。`JAVA_HOME`\
    \ 和 `Path` 应该出现在那里，并带有期望的值。对于本节提出的设置，执行 `set` 命令的输出如图 2-8 所示。\n\n![](img/463938_3_En_2_Fig8_HTML.jpg)\n\
    \n图 2-8\n\n使用 `set` 命令列出的 Windows 10 系统变量\n\n如果你执行了上述命令并看到了预期的输出，那么你现在可以通过在 **命令提示符**\
    \ 窗口中执行 `java -version` 来测试你的 Java 安装，该命令会打印出预期的结果，类似于清单 2-1 的内容。\n\n```\n$ java\
    \ –version\nopenjdk version \"23\" 2024-09-17\nOpenJDK Runtime Environment (build\
    \ 23+37-2369)\nOpenJDK 64-Bit Server VM (build 23+37-2369, mixed mode, sharing)\n\
    清单 2-1\n执行 java -version 的 Java 23 日志\n```\n\n### macOS 系统上的 `JAVA_HOME`\n\nJDK\
    \ 的安装位置是 `/Library/Java/JavaVirtualMachines/jdk-23.jdk/Contents/Home`。你的 `JAVA_HOME`\
    \ 应指向此位置。要为当前用户执行此操作，你可以执行以下步骤：\n\n*   在 `/Users/{your.user}` 目录（将 `{your.user}`\
    \ 替换为你实际的系统用户名）中，创建一个名为 `.bash_profile` 的文件（如果该文件尚不存在）。\n\n*   在此文件中，写入以下内容：\n\
    \n    ```\n    export JAVA_HOME=$(/usr/libexec/java_home -v23)\n    export PATH=$JAVA_HOME/bin:$PATH\n\
    \    ```\n\n如果你使用不同的 shell，只需在其自己的配置文件中添加相同的两行。\n\n在 macOS 上，你可以同时安装多个 Java 版本。你可以通过调用\
    \ `/usr/libexec/java_home` 命令并将你感兴趣的 Java 版本作为参数传递，来获取所需版本的 JDK 位置，从而设置系统当前使用的版本。命令执行的结果将存储为\
    \ `JAVA_HOME` 变量的值。\n\n在我的系统上，我安装了 JDK 8 到 23。我可以通过执行 `/usr/libexec/java_home`\
    \ 命令并为每个版本提供参数来检查每个 JDK 的位置。版本 8 和 23 的命令和输出如清单 2-2 所示。\n\n```\n$ /usr/libexec/java_home\
    \ -v23\n/Library/Java/JavaVirtualMachines/jdk-23.jdk/Contents/Home\n$ /usr/libexec/java_home\
    \ -v1.8\n/Library/Java/JavaVirtualMachines/jdk1.8.0_381.jdk/Contents/Home\n清单\
    \ 2-2\n通过调用 /usr/libexec/java_home 获取的 Java 8 和 23 的位置\n```\n\n提示\n\n通过使用 SDKMAN，可以避免手动安装\
    \ Java 和声明 `JAVA_HOME` 环境变量。\n\n`export PATH=$JAVA_HOME/bin:$PATH` 这行代码将 JDK 位置下的\
    \ `bin` 目录的内容添加到系统路径中。这意味着我可以打开一个终端并执行其下的任何 Java 可执行文件。例如，我可以通过执行 `java –version`\
    \ 来验证为用户设置的默认 Java 版本是否符合预期。\n\n根据作为参数给出的版本，会返回不同的 JDK 位置。如果你想测试 `JAVA_HOME` 的值，`echo`\
    \ 命令可以帮到你。清单 2-3 展示了 `echo` 和 `java –version` 命令的输出。\n\n```\n$ echo $JAVA_HOME\n\
    /Library/Java/JavaVirtualMachines/jdk-23.0.1/Contents/Home\n$ java -version\n\
    openjdk version \"23\" 2024-09-17\nOpenJDK Runtime Environment (build 23+37-2369)\n\
    OpenJDK 64-Bit Server VM (build 23+37-2369, mixed mode, sharing)\n清单 2-3\necho\
    \ 和 java -version 命令输出的 JAVA_HOME 值及已安装的 Java 版本。\n```\n"
- fmt: "### `JAVA_HOME` on Linux\n\n**Tip**\n\nIf you are using Linux proficiently,\
    \ you are either using a PPA or SDKMAN, so you can skip this section. However,\
    \ if you like to control where the JDK is located and define your own environment\
    \ variables, keep reading.\n\nLinux systems are Unix-like operating systems. This\
    \ is similar to macOS, which is based on Unix. Depending on your Linux distribution,\
    \ installing Java can be done via the specific package manager or by directly\
    \ downloading the JDK as a `*.tar.gz` archive from the official Oracle site.\n\
    \nIf Java is installed using a package manager, the necessary executables are\
    \ usually automatically placed in the system path at installation time. That is\
    \ why this book covers only the cases where you do everything manually, and choose\
    \ to install Java only for the current user in a location such as `/home/{your.user}/tools/jdk-23.jdk`,\
    \ because covering package managers is not the object of the book.\n\nAfter downloading\
    \ the JDK archive from the Oracle site and unpacking it at `/home/{your.user}/tools/jdk-23.jdk`,\
    \ you need to create a file named either `.bashrc` or `.bash_profile` in your\
    \ user home directory. On some Linux distributions, the files might already exist,\
    \ in which case you just need to edit them. Add the lines depicted in Listing\
    \ [2-4](#463938_3_En_2_Chapter.xhtml#PC5).\n\n```\nexport JAVA_HOME=/home/{your.user}/tools/jdk-23.jdk\n\
    export PATH=$JAVA_HOME/bin:$PATH\nListing 2-4\nSetting JAVA_HOME for the Current\
    \ User in Linux\n```\n\nAs you can see, the syntax is similar to the macOS syntax.\
    \ To check the location of the JDK and the Java version, the same commands presented\
    \ in the macOS section are used.\n\n## Running Java Code\n\nBefore instructing\
    \ you to install even more tools (Apache Maven, Git, etc.), let’s run some Java\
    \ code. Enhancements like JShell, introduced in Java 9, and unnamed classes and\
    \ instance `main` methods, introduced in Java 21 and expanded in scope in future\
    \ versions (even if still in preview), allow Java absolute beginners to run Java\
    \ code directly without going through the compile phase, enabling them to get\
    \ used to the syntax and get a “quick taste” of the language syntax.\n\n### Using\
    \ JShell\n\nStarting with Java 9, developers that want to test out the Java language\
    \ can do so without the need to create a full-blown Java project. JShell is an\
    \ interactive command-line tool for learning the Java programming language and\
    \ prototyping Java code. So instead of writing your code in a class, compiling\
    \ it, and executing the bytecode, you can just use JShell to directly execute\
    \ statements.\n\nJShell is quite late to the party, as scripting languages like\
    \ Python and Node introduced similar utilities years ago, and JVM languages like\
    \ Scala, Clojure, and Groovy followed in their footsteps. But better late than\
    \ never.\n\nJShell is a Read-Eval-Print Loop (REPL), which evaluates declarations,\
    \ statements, and expressions as they are entered, and then it immediately shows\
    \ the results. It is practical to try new ideas and techniques quickly and without\
    \ the need to have a complete development environment, nor an entire context for\
    \ the code to be executed in.\n\nJShell is a standard component of the JDK. The\
    \ executable to start it is in the `bin` directory located in the JDK installation\
    \ directory. This means that all you have to do is open a terminal (Command Prompt\
    \ in Windows) and type `jshell`. If the contents of the `bin` directory were added\
    \ to the system path, you should see a welcome message containing the JDK version\
    \ on your system. Also, the root of your terminal changes to `jshell>` to let\
    \ you know you are now using `jshell`.\n\nIn Listing [2-5](#463938_3_En_2_Chapter.xhtml#PC6),\
    \ `jshell` was started in verbose mode by calling `jshell -v`, which enables detailed\
    \ feedback to be provided for all statements executed until the end of the session.\n\
    \n```\n$ jshell -v\n|  Welcome to JShell -- Version 23\n|  For an introduction\
    \ type: /help intro\njshell>\nListing 2-5\nOutput of Command jshell -v\n```\n\n\
    If you are executing the commands as you are reading the book, go ahead and enter\
    \ `/help` to view a list of all the available actions and commands. Assuming you\
    \ are not, Listing [2-6](#463938_3_En_2_Chapter.xhtml#PC7) depicts the expected\
    \ output.\n\n```\njshell> /help\n|  Type a Java language expression, statement,\
    \ or declaration.\n|  Or type one of the following commands:\n|  /list [|-all|-start]\n\
    |   list the source you have typed\n|  /edit \n|   edit a source entry\n|  /drop\
    \ \n|   delete a source entry\n|  /save [-all|-history|-start] \n|   Save snippet\
    \ source to a file\n...\n|  /exit []\n|   exit the jshell tool\n...\nListing 2-6\n\
    Output of Command /help in jshell\n```\n\nIn Java, values are assigned to groups\
    \ of characters named **variables**. (More about how to choose them and use them\
    \ in **Chapter** [**4**](#463938_3_En_4_Chapter.xhtml).) To begin using JShell,\
    \ we’ll declare a variable named `six` and assign the value 6 to it (*I know,\
    \ smart right?*). The statement and the `jshell` logs are depicted in Listing\
    \ [2-7](#463938_3_En_2_Chapter.xhtml#PC8).\n\n```\njshell> int six = 6;\nsix ==>\
    \ 6\n|  created variable six : int\nListing 2-7\nDeclaring a Variable Using jshell\n\
    ```\n\nAs you can see, the log message is clear and tells us that our command\
    \ was executed successfully, and a variable of type `int` named `six` was created.\
    \ The `six ==> 6` lets us know that value 6 was assigned to the variable that\
    \ we just created.\n\nYou can create as many variables as you want and perform\
    \ mathematical operations, string concatenations, and anything that you need to\
    \ quickly execute. As long as the JShell session is not closed, the variables\
    \ exist and can be used. Listing [2-8](#463938_3_En_2_Chapter.xhtml#PC9) depicts\
    \ a few statements being executed with JShell and their results.\n\n```\njshell>\
    \ int six = 6\nsix ==> 6\n|  modified variable six : int\n|    update overwrote\
    \ variable six : int\njshell> six = six + 1\nsix ==> 7\n|  assigned to six : int\n\
    jshell> six +1\n$14 ==> 8\n|  created scratch variable $14 : int\njshell> System.out.println(\"\
    Current val: \" + six)\nCurrent val: 7\nListing 2-8\njshell Various Statements\
    \ and Outputs\n```"
