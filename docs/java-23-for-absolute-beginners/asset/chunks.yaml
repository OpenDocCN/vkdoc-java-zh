    # 10. Making Your Application Interactive


    So far in the book, input data for our Java programs was provided via arrays or
    variables that were initialized inside the code or via program arguments. In real
    life, however, most applications require interaction with the user. The user can
    be provided access by entering a username and a password, and the user is sometimes
    required to type in details to confirm their identity or to instruct the application
    what to do. Java supports multiple methods for user input to be read. In this
    chapter, we will be covering a few ways to build interactive Java applications
    that take their input a variety of sources.


    As introduced in previous chapters, JShell is a Java command-line interface (CLI)
    shell that enables developers to test variable declarations and one-line statements.
    Other CLI shells like `bash` and terminals like Command Prompt from Windows can
    be used to issue commands to programs in the form of successive lines of text.


    ## Reading User Data from the Command Line


    This section is dedicated to reading user input from the command line, whether
    it is the IntelliJ IDEA console, or whether if the program is run from an executable
    jar from any terminal specific to an operating system. In the JDK there are two
    classes that can be used to read user data from the command line, `java.util.Scanner`
    and `java.io.Console`, and this section will cover them both in detail. But first,
    let’s start with the basics: using `System.in` to read user data.'
