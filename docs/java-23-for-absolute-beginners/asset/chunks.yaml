  trans: '

    ### 使用 `Readers` 读取文件


    在 `Files` 类及其便捷方法问世之前，还有其他读取文件的方式。这些便捷方法也并非为读取大文件或仅读取文件部分内容而设计。让我们回顾一下历史，慢慢分析事情是如何演变的。


    在 Java 6 之前，要逐行读取文件，你必须编写像清单 11-17 中那样的复杂代码。


    ```

    package com.apress.bgn.eleven.io;

    import java.io.BufferedReader;

    import java.io.FileReader;

    // 其他导入已省略

    public class ReadersDemo {

    private static final Logger LOGGER = LoggerFactory.getLogger(ReadersDemo.class);

    void main() {

    BufferedReader reader = null;

    final String inDir = "chapter11/read-write-file/src/main/resources/input/";

    try {

    reader = new BufferedReader(new FileReader(new File(inDir + "data.txt"), StandardCharsets.UTF_8));

    StringBuilder sb = new StringBuilder();

    String line;

    while ((line = reader.readLine()) != null) {

    sb.append(line).append("\n");

    }

    LOGGER.info("使用 BufferedReader 读取 --> {}", sb.toString());

    } catch (Exception e) {

    LOGGER.error("文件无法读取！", e);

    } finally {

    if (reader != null) {

    try {

    reader.close();

    } catch (IOException ioe) {

    LOGGER.error("出错了！", ioe);

    }

    }

    }

    }

    }

    清单 11-17

    Java 6 之前逐行读取文件

    ```


    *哇，这代码可真够复杂的，对吧？* Java 6 之后，语法稍微简化了一些，但最大的变化出现在 Java 7。在 Java 7 之前，如果你想逐行读取文件，必须编写如下代码：


    1.  创建一个 `File` 处理器。

    2.  将文件处理器包装到 `FileReader` 中。这种类型的实例可以完成读取工作，但只能以 `char[]` 块的形式读取，当你需要实际文本时，这并不十分有用。

    3.  将 `FileReader` 实例包装到 `BufferedReader` 实例中，后者通过读取内部缓冲区中的字符来提供此功能。这涉及到调用 `reader.readLine()`，直到没有更多内容可读（即到达文件末尾），此时该方法返回
    `null`。

    4.  在读取结束时，显式调用 `reader.close()`；否则，文件可能会被锁定，在重启之前可能变得不可读。


    Java 7 引入了许多更改，以减少处理文件所需的样板代码。其中一项更改是，所有用于访问文件内容且可能保持文件锁定的类都通过声明实现 `java.io.Closeable`
    接口得到了增强，该接口将这些类型的资源标记为*可关闭的*，并且在执行结束前，JVM 会透明地调用 `close()` 方法来释放资源。此外，Java 7 引入了
    `try-with-resources` 语句。通过利用所有这些特性，清单 11-17 中 Java 6 之前的代码可以编写为清单 11-18 所示。


    ```

    try (BufferedReader br = new BufferedReader(new FileReader(new File(inDir + "data.txt")))){

    StringBuilder sb = new StringBuilder();

    String line;

    while ((line = br.readLine()) != null) {

    sb.append(line).append("\n");

    }

    LOGGER.info("使用 BufferedReader 读取 --> {}", sb.toString() );

    } catch (Exception e) {

    LOGGER.info("出错了！", e);

    }

    清单 11-18

    从 Java 7 开始逐行读取文件

    ```


    代码可以进一步简化，因为 `FileReader` 可以将文件的绝对路径作为 `String` 参数接收。但代码无法考虑编码问题。这在 Java 8 中成为可能，当时为
    `FileReader` 类引入了一个接受 `Charset` 参数的构造函数。在 Java 7 中，前面的例子中仍然有嵌套的构造函数调用，这相当丑陋。这时
    Java 8 通过引入 `Files.newBufferedReader(Path)` 和 `Files.newBufferedReader(Path, Charset)`
    方法解决了这个问题。


    因此，清单 11-18 中的代码可以编写为清单 11-19 所示。


    ```

    File file = new File(inDir + "data.txt");

    try (BufferedReader br = Files.newBufferedReader(file.toPath(), StandardCharsets.UTF_8)){

    StringBuilder sb = new StringBuilder();

    String line;

    while ((line = br.readLine()) != null) {

    sb.append(line).append("\n");

    }

    LOGGER.info("使用 BufferedReader 读取 --> {}", sb.toString());

    } catch (Exception e) {

    LOGGER.info("出错了！", e);

    }

    清单 11-19

    从 Java 8 开始逐行读取文件并考虑编码

    ```


    如果我们知道文件大小可控，并且不仅关心记录内容，还想保存各行以便进一步处理，最简单的方法是使用 `Files.readAllLines(..)` 方法结合
    lambda 表达式。还可以加入流，这样可以在原地过滤或处理各行，如下所示：


    ```

    List dataList = Files.readAllLines(Paths.get(file.toURI()), StandardCharsets.UTF_8)

    .stream()

    .filter(line -> line!= null && !line.isBlank())

    .map(String::toUpperCase)

    .collect(Collectors.toList());

    ```


    或者我们可以用另一种方式编写，使用同样在 Java 8 中引入的 `Files.lines(..)` 方法，并直接以流的形式获取所有内容：


    ```

    dataList = Files.lines(Paths.get(file.toURI()), StandardCharsets.UTF_8)

    .filter(line -> line!= null && !line.isBlank() )

    .map(String::toUpperCase)

    .toList();

    ```


    无论如何，回到文件读取器。`BufferedReader` 类是扩展抽象 `Reader` 类的类组中的一员。这是一个用于读取字符流的抽象类，属于 `java.io`
    包的一部分。图 11-2 展示了一个简化的层次结构，显示了最常用的实现。


    ![](img/463938_3_En_11_Fig2_HTML.jpg)


    图 11-2


    `Reader` 类层次结构（如 IntelliJ IDEA 所示）


    字符流可以有不同来源，文件是最常见的。它们提供对文件中存储数据的顺序访问。`BufferedReader` 类不提供对字符编码的支持，但 `BufferedReader`
    实例基于另一个 `Reader` 实例。正如你在前面的例子中注意到的，在实例化 `BufferedReader` 时使用了 `FileReader` 实例作为参数，而
    `FileReader` 在 Java 8 中被修改以支持字符编码。在 Java 8 之前，为了从文件读取并考虑字符编码，使用了 `InputStreamReader`
    实例，如清单 11-20 所示。


    ```

    try (BufferedReader br = new BufferedReader(new InputStreamReader(new FileInputStream(file),
    StandardCharsets.UTF_8))){

    StringBuilder sb = new StringBuilder();

    String line;

    while ((line = br.readLine()) != null) {

    sb.append(line).append("\n");

    }

    LOGGER.info("使用 BufferedReader(InputStreamReader(FileInputStream(..)))读取 --> {}",
    sb.toString() );

    } catch (Exception e) {

    LOGGER.info("出错了！", e);

    }

    清单 11-20

    Java 8 之前逐行读取文件并考虑编码

    ```


    在 Java 11 中，`Reader` 类增加了 `nullReader()` 方法，该方法返回一个不执行任何操作的 `Reader` 实例。这是应开发人员测试需求而添加的，本质上只是一个伪
    `Reader` 实现。

    '
- fmt: '### Using `InputStream` to Read Files


    Classes in the `Reader` family are advanced classes for reading data as text,
    but technically speaking files are just a sequence of bytes, so these classes
    are themselves wrappers around classes in a family of classes used for reading
    byte streams. This becomes quite obvious when trying to use the proper character
    encoding, and when reading text (as shown at the end of the previous section)
    using the `BufferedReader`, as the `InputStreamReader` instance given as an argument
    is based on a `java.io.FileInputStream` instance, a type that is a subclass of
    `java.io.InputStream`.


    The root class of this hierarchy is `java.io.InputStream`. A simplified hierarchy,
    showing the most commonly used implementations is depicted in Figure [11-3](#463938_3_En_11_Chapter.xhtml#Fig3).


    ![](images/463938_3_En_11_Chapter/463938_3_En_11_Fig3_HTML.jpg)


    Figure 11-3


    `InputStream` class hierarchy (as shown in IntelliJ IDEA)


    The class `BufferedInputStream` is the equivalent of `BufferedReader` for reading
    streams of bytes. The `System.in` that we previously used to read user data from
    the console is of this type, and the `Scanner` instance converts the bytes from
    its buffer into user-understandable data. When the data we are interested in is
    not text that was stored using Unicode conventions, but raw numeric data (binary
    files such as images, media files, PDFs, etc.), classes for using streams of bytes
    are more suitable. Just for the purpose of showing you how it’s done, we’ll read
    the contents of the `data.txt` file using `FileInputStream`, as depicted in Listing
    [11-21](#463938_3_En_11_Chapter.xhtml#PC38).


    ```

    package com.apress.bgn.eleven.io;

    import java.io.FileInputStream;

    // other imports omitted

    public class FileInputStreamReadingDemo {

    private static final Logger LOGGER = LoggerFactory.getLogger(FileInputStreamReadingDemo.class);

    public static void main(String... args) {

    final String inDir = "chapter11/read-write-file/src/main/resources/input/";

    File file = new File(inDir + "data.txt");

    try (FileInputStream fis = new FileInputStream(file)) {

    byte[] buffer = new byte[1024];

    StringBuilder sb = new StringBuilder();

    while (fis.read(buffer) != -1) {

    sb.append(new String(buffer));

    buffer = new byte[1024];

    }

    LOGGER.info("Read with FileInputStream --> {}", sb.toString() );

    } catch (IOException e) {

    LOGGER.error("Something went wrong! ", e);

    }

    }

    }

    Listing 11-21

    Reading a File Using FileInputStream

    ```


    If you run the code in Listing [11-21](#463938_3_En_11_Chapter.xhtml#PC38), you
    will notice that the expected output is printed in the console, but you might
    also notice something odd: after the text is printed, a set of strange characters
    is printed too. On a macOS system they look as depicted in Figure [11-4](#463938_3_En_11_Chapter.xhtml#Fig4).


    ![](images/463938_3_En_11_Chapter/463938_3_En_11_Fig4_HTML.jpg)


    Figure 11-4


    Text read with `FileInputStream`


    Do you have any idea what those characters might be?


    It’s okay if you have no idea; I did not either, the first time I had to use `FileInputStream`
    to read a file. Those characters appear there because the file size is not a multiple
    of 1024, so the `FileInputReader` ends up filling the rest of the last buffer
    with zeros. A fix for this involves computing the size of the file in bytes and
    making sure we adapt the `byte[] buffer` size accordingly. You can try doing that
    as an exercise if you are in the mood for some coding. And now that we’ve explored
    how to read files in a lot of ways, we can continue by examining how to write
    files, since you already know how to create them.


    In Java 11, the `InputStream` was also enriched with a method that returns an
    `InputStream` that does nothing: the `nullInputStream()` method is designed for
    testing purposes and is nothing but a pseudo-`InputStream` implementation.


    All classes presented so far are the ones you will encounter most while working
    with files in Java. If you need more specialized file handling tools, feel free
    to read the official documentation or use custom implementations provided by third-party
    libraries such as Apache Commons IO^([^(106)](#fn106)), which is frequently used
    in the Java world.


    ## Writing Files


    Writing files in Java is quite similar to reading them, only different classes
    have to be used, because streams are unidirectional. A stream that is used for
    reading data cannot be used for writing data as well. For almost any class or
    method of reading files there is one for writing files. Without further ado, let’s
    start.'
  raw: '### Using `InputStream` to Read Files


    Classes in the `Reader` family are advanced classes for reading data as text,
    but technically speaking files are just a sequence of bytes, so these classes
    are themselves wrappers around classes in a family of classes used for reading
    byte streams. This becomes quite obvious when trying to use the proper character
    encoding, and when reading text (as shown at the end of the previous section)
    using the `BufferedReader`, as the `InputStreamReader` instance given as an argument
    is based on a `java.io.FileInputStream` instance, a type that is a subclass of
    `java.io.InputStream`.


    The root class of this hierarchy is `java.io.InputStream`. A simplified hierarchy,
    showing the most commonly used implementations is depicted in Figure [11-3](#463938_3_En_11_Chapter.xhtml#Fig3).


    ![](images/463938_3_En_11_Chapter/463938_3_En_11_Fig3_HTML.jpg)


    Figure 11-3


    `InputStream` class hierarchy (as shown in IntelliJ IDEA)


    The class `BufferedInputStream` is the equivalent of `BufferedReader` for reading
    streams of bytes. The `System.in` that we previously used to read user data from
    the console is of this type, and the `Scanner` instance converts the bytes from
    its buffer into user-understandable data. When the data we are interested in is
    not text that was stored using Unicode conventions, but raw numeric data (binary
    files such as images, media files, PDFs, etc.), classes for using streams of bytes
    are more suitable. Just for the purpose of showing you how it’s done, we’ll read
    the contents of the `data.txt` file using `FileInputStream`, as depicted in Listing
    [11-21](#463938_3_En_11_Chapter.xhtml#PC38).


    ```

    package com.apress.bgn.eleven.io;

    import java.io.FileInputStream;

    // other imports omitted

    public class FileInputStreamReadingDemo {

    private static final Logger LOGGER = LoggerFactory.getLogger(FileInputStreamReadingDemo.class);

    public static void main(String... args) {

    final String inDir = "chapter11/read-write-file/src/main/resources/input/";

    File file = new File(inDir + "data.txt");

    try (FileInputStream fis = new FileInputStream(file)) {

    byte[] buffer = new byte[1024];

    StringBuilder sb = new StringBuilder();

    while (fis.read(buffer) != -1) {

    sb.append(new String(buffer));

    buffer = new byte[1024];

    }

    LOGGER.info("Read with FileInputStream --> {}", sb.toString() );

    } catch (IOException e) {

    LOGGER.error("Something went wrong! ", e);

    }

    }

    }

    Listing 11-21

    Reading a File Using FileInputStream

    ```


    If you run the code in Listing [11-21](#463938_3_En_11_Chapter.xhtml#PC38), you
    will notice that the expected output is printed in the console, but you might
    also notice something odd: after the text is printed, a set of strange characters
    is printed too. On a macOS system they look as depicted in Figure [11-4](#463938_3_En_11_Chapter.xhtml#Fig4).


    ![](images/463938_3_En_11_Chapter/463938_3_En_11_Fig4_HTML.jpg)


    Figure 11-4


    Text read with `FileInputStream`


    Do you have any idea what those characters might be?


    It’s okay if you have no idea; I did not either, the first time I had to use `FileInputStream`
    to read a file. Those characters appear there because the file size is not a multiple
    of 1024, so the `FileInputReader` ends up filling the rest of the last buffer
    with zeros. A fix for this involves computing the size of the file in bytes and
    making sure we adapt the `byte[] buffer` size accordingly. You can try doing that
    as an exercise if you are in the mood for some coding. And now that we’ve explored
    how to read files in a lot of ways, we can continue by examining how to write
    files, since you already know how to create them.


    In Java 11, the `InputStream` was also enriched with a method that returns an
    `InputStream` that does nothing: the `nullInputStream()` method is designed for
    testing purposes and is nothing but a pseudo-`InputStream` implementation.


    All classes presented so far are the ones you will encounter most while working
    with files in Java. If you need more specialized file handling tools, feel free
    to read the official documentation or use custom implementations provided by third-party
    libraries such as Apache Commons IO^([^(106)](#fn106)), which is frequently used
    in the Java world.


    ## Writing Files


    Writing files in Java is quite similar to reading them, only different classes
    have to be used, because streams are unidirectional. A stream that is used for
    reading data cannot be used for writing data as well. For almost any class or
    method of reading files there is one for writing files. Without further ado, let’s
    start.'
  trans: '

    ### 使用 `InputStream` 读取文件


    `Reader` 家族中的类是将数据作为文本读取的高级类，但从技术上讲，文件只是一系列字节，因此这些类本身是对用于读取字节流的类家族中类的封装。当尝试使用正确的字符编码，以及使用
    `BufferedReader` 读取文本时（如上一节末尾所示），这一点变得非常明显，因为作为参数给出的 `InputStreamReader` 实例是基于
    `java.io.FileInputStream` 实例的，而该类型是 `java.io.InputStream` 的子类。


    该层次结构的根类是 `java.io.InputStream`。图 11-3 展示了一个简化的层次结构，其中列出了最常用的实现。


    ![](img/463938_3_En_11_Fig3_HTML.jpg)


    图 11-3


    `InputStream` 类层次结构（如 IntelliJ IDEA 中所示）


    `BufferedInputStream` 类相当于用于读取字节流的 `BufferedReader`。我们之前用来从控制台读取用户数据的 `System.in`
    就属于这种类型，而 `Scanner` 实例会将其缓冲区中的字节转换为用户可理解的数据。当我们感兴趣的数据不是使用 Unicode 约定存储的文本，而是原始数值数据（例如图像、媒体文件、PDF
    等二进制文件）时，使用字节流的类更为合适。仅为了向您展示如何操作，我们将使用 `FileInputStream` 读取 `data.txt` 文件的内容，如清单
    11-21 所示。


    ```

    package com.apress.bgn.eleven.io;

    import java.io.FileInputStream;

    // 其他导入已省略

    public class FileInputStreamReadingDemo {

    private static final Logger LOGGER = LoggerFactory.getLogger(FileInputStreamReadingDemo.class);

    public static void main(String... args) {

    final String inDir = "chapter11/read-write-file/src/main/resources/input/";

    File file = new File(inDir + "data.txt");

    try (FileInputStream fis = new FileInputStream(file)) {

    byte[] buffer = new byte[1024];

    StringBuilder sb = new StringBuilder();

    while (fis.read(buffer) != -1) {

    sb.append(new String(buffer));

    buffer = new byte[1024];

    }

    LOGGER.info("使用 FileInputStream 读取 --> {}", sb.toString() );

    } catch (IOException e) {

    LOGGER.error("出错了！", e);

    }

    }

    }

    清单 11-21

    使用 FileInputStream 读取文件

    ```


    如果您运行清单 11-21 中的代码，您会注意到预期的输出会打印在控制台中，但您可能还会注意到一些奇怪的现象：文本打印后，还会打印一组奇怪的字符。在 macOS
    系统上，它们看起来如图 11-4 所示。


    ![](img/463938_3_En_11_Fig4_HTML.jpg)


    图 11-4


    使用 `FileInputStream` 读取的文本


    您知道这些字符可能是什么吗？


    不知道也没关系；我第一次使用 `FileInputStream` 读取文件时也不知道。这些字符之所以出现，是因为文件大小不是 1024 的倍数，因此 `FileInputReader`
    最终会用零填充最后一个缓冲区的剩余部分。解决这个问题的方法包括计算文件的字节大小，并确保相应地调整 `byte[] buffer` 的大小。如果您有兴趣编写一些代码，可以尝试将其作为练习。既然我们已经探索了多种读取文件的方式，接下来可以继续研究如何写入文件，因为您已经知道如何创建文件了。


    在 Java 11 中，`InputStream` 还增加了一个方法，该方法返回一个不执行任何操作的 `InputStream`：`nullInputStream()`
    方法专为测试目的而设计，它只是一个伪 `InputStream` 实现。


    到目前为止介绍的所有类都是您在 Java 中处理文件时最常遇到的。如果您需要更专业的文件处理工具，请随时阅读官方文档，或使用第三方库（如 Apache Commons
    IO^(¹⁰⁶)）提供的自定义实现，该库在 Java 世界中经常使用。


    ## 写入文件


    在 Java 中写入文件与读取文件非常相似，只是必须使用不同的类，因为流是单向的。用于读取数据的流不能同时用于写入数据。几乎对于每个读取文件的类或方法，都有一个对应的写入文件的方法。闲话少说，让我们开始吧。

    '
- fmt: '### Writing Files Using Files Utility Methods


    Smaller files can be easily written starting with Java 7, using the `Files.write(Path,
    byte[], OpenOption... options)` method. It takes two arguments: a `Path` representing
    the location of a file and an array of bytes representing the data to be written.
    This method is a practical one-liner when the data required to be written is small
    enough. The last argument is actually a *varargs* (introduced in **Chapter 3**)
    and represents none, one, or more operations the file is opened for. The method
    can be used without specifying any argument of that type, as shown in Listing
    [11-22](#463938_3_En_11_Chapter.xhtml#PC39).


    ```

    package com.apress.bgn.eleven.io;

    import java.io.File;

    import java.io.IOException;

    import java.nio.file.Files;

    import java.nio.file.Path;

    // other import statements omitted

    public class FilesWritingDemo {

    private static final Logger LOGGER = LoggerFactory.getLogger(FilesWritingDemo.class);

    void maim() {

    var file = new File("chapter11/read-write-file/src/main/resources/output/data.txt");

    byte[] data = "Some of us, we’re hardly ever here".getBytes();

    try {

    Path dataPath = Files.write(file.toPath(), data);

    LOGGER.info("String written to {}", dataPath.toAbsolutePath());

    } catch (IOException e) {

    LOGGER.debug("Could not write data to file", e);

    }

    }

    }

    Listing 11-22

    Writing a String to a File, Starting with Java 7

    ```


    If the file already exists, the contents will be simply overwritten. This means
    that since no argument was specified to configure what we want to do with the
    file, the default behavior was to open the file for writing and truncate its size
    to zero and start writing from there, thus overwriting it. The list of available
    options is modeled by the values in the `java.nio.file.StandardOpenOption` enum.
    The value corresponding to the default behavior is `TRUNCATE_EXISTING`. So this
    line in the example in Listing [11-22](#463938_3_En_11_Chapter.xhtml#PC39):


    ```

    Path dataPath = Files.write(file.toPath(), data);

    ```


    is equivalent to


    ```

    import java.nio.file.StandardOpenOption

    //...

    Path dataPath = Files.write(file.toPath(), data, StandardOpenOption.TRUNCATE_EXISTING);

    ```


    If the desired behavior is to modify a file if it exists and append the new data
    at its end, the option to use as an argument for the `Files.write(..)` method
    is `APPEND`:


    ```

    Path dataPath = Files.write(file.toPath(), data, StandardOpenOption.APPEND);

    ```


    Also notice how the string needs to be converted to an array of bytes before being
    written. In Java 11, this is no longer necessary, because finally some JDK developer
    thought that most people would probably write a simple `String` to a file and
    realized that forcing them to explicitly call `getBytes()` is pretty silly. As
    a result the `Files.writeString(..)` method family was introduced, and one of
    them also supports specifying an encoding. An example of this method being used
    to write a string into a file can be seen in Listing [11-23](#463938_3_En_11_Chapter.xhtml#PC43).


    ```

    package com.apress.bgn.eleven.io;

    import java.nio.charset.StandardCharsets;

    import static java.nio.file.StandardOpenOption.APPEND;

    // import statements omitted

    var file = new File("chapter11/read-write-file/src/main/resources/output/data.txt");

    try {

    Path dataPath = Files.writeString(file.toPath(),

    "\nThe rest of us, we''re born to disappear",

    StandardCharsets.UTF_8,

    APPEND);

    log.info("String written to {}", dataPath.toAbsolutePath());

    } catch (IOException e) {

    e.printStackTrace();

    }

    Listing 11-23

    Writing a String to a File, Starting with Java 11

    ```


    Another version of `Files.write(..)` takes an argument of type `Iterable<? extends
    CharSequence>`, which means that a list of `String` values can be written using
    it, as shown in Listing [11-24](#463938_3_En_11_Chapter.xhtml#PC44).


    ```

    var file = new File("chapter11/read-write-file/src/main/resources/output/data.txt");

    List dataList = List.of(

    "How do I stop myself from",

    "Being just a number?");

    try {

    Path dataPath = Files.write(file.toPath(), dataList,

    StandardCharsets.UTF_8,

    APPEND);

    log.info("String written to {}", dataPath.toAbsolutePath());

    } catch (IOException e) {

    e.printStackTrace();

    }

    Listing 11-24

    Writing a List to a File Using Files.write(..)

    ```


    Next we are going to look into writing files using classes in the `Writer` hierarchy.'
