    \    } else {\n        printValidationFailedDocument(errorContainer);\n    }\n\
    }\n```\n\n*Listing 7-51* Code Sample Showing a `try-catch-finally` Block with\
    \ Multiple `catch` Statements\n\nThe code in the `finally` code block was complex\
    \ and totally not recommended to be in there. However, sometimes in the real world,\
    \ the solutions do not always respect best practices, or even commonsense practices.\
    \ When dealing with legacy code, you might find yourself in the position of having\
    \ to write functional but crappy code that solves the client’s problem—because\
    \ sure, programming is awesome, but in the eyes of some managers, results are\
    \ more important… quicker results even more so. If you are lucky enough to get\
    \ a job at a company that is looking to build the code in the future or hand it\
    \ to other team members, you might actually end up with a manager who favors best\
    \ practices. Just remember to do your best and document everything properly, and\
    \ you’ll be fine.\n\n`try-catch-finally` blocks are quite powerful. They are a\
    \ useful construction for directing execution flow and printing useful information\
    \ about the overall status of the application and the source of an eventual problem.\
    \ When designed properly, exception handling can increase the quality and readability\
    \ of your code. There are a few rules to follow when designing exception handling:\n\
    \n![Figure 7-12](images/463938_3_En_7_Chapter/463938_3_En_7_Fig12_HTML.jpg)\n\n\
    *Figure 7-12* IntelliJ IDEA compile error and message showing the wrong order\
    \ of exception types in a `try-catch` block\n\n- Try to avoid multiple `catch`\
    \ blocks, unless they are used to treat different types of exceptions differently.\n\
    - Group together similar types of exceptions that are treated the same way by\
    \ using the `|` (pipe) symbol. Support for this was added in Java 7.\n- Be careful\
    \ when catching exceptions with related types. The first `catch` statement that\
    \ matches an exception type handles the exception, so superclasses should be lower\
    \ in the `catch` list. The compiler will even get really upset if the order is\
    \ not correct, as shown in Figure [7-12](#463938_3_En_7_Chapter.xhtml#Fig12).\n\
    \nAnd of course, you should also respect the basic rules of avoiding exception\
    \ swallowing and catching `Throwable` that were mentioned earlier in the book.\n\
    \n## Summary\n\nThis chapter covered one of the most important aspects of development:\
    \ how to design your solutions, and the logic of it. You’ve also been introduced\
    \ to flowcharts and their components as tools for deciding how to write your code\
    \ and how to control execution paths. And finally, you’ve learned which statements\
    \ to use and when, and a few Java best practices for using them, so that you will\
    \ be able to design the most suitable solutions to solve your problems. Java provides\
    \ the following:\n\n- Both simple and more complex ways to write `if` statements\n\
    - A `switch` statement that works with any primitive type, enumerations, and (starting\
    \ with Java 7) `String` instances\n- A `switch` expression that returns a value\
    \ and that can be used to write more complex statements\n- Use of pattern matching\
    \ and record patterns in `switch` expressions and statements\n- A few ways to\
    \ write `for` statements\n- Use of `forEach` methods and streams to traverse a\
    \ collection of values\n- A `while` statement, used when a step must be repeated\
    \ until a condition is met\n- A `do-while` statement, used when a step must be\
    \ repeated until a condition is met, and the step is repeated at least once, because\
    \ the continuation condition is evaluated after it\n- Manipulation of loop behavior\
    \ by using statements such as `break`, `continue`, and `return`\n- Control of\
    \ the execution flow by using `try-catch-finally` constructions"
