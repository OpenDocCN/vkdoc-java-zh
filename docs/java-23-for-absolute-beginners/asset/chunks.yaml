- fmt: "### `JAVA_HOME` on Windows\n\nTo declare the `JAVA_HOME` environment variable\
    \ on a Windows system, you need to open the dialog window for setting up system\
    \ variables. On Windows systems, click the **Start** button. In the menu, there\
    \ is a search box. In more recent versions, there is a search box on the horizontal\
    \ toolbar; you can use this one too. Enter the word **environment** in there (the\
    \ first three letters of the word should suffice to locate the option, though).\
    \ Click the **Edit the system environment variables** option when it becomes available.\
    \ These steps on Windows 10 are depicted in Figure [2-4](#463938_3_En_2_Chapter.xhtml#Fig4).\n\
    \n![](images/463938_3_En_2_Chapter/463938_3_En_2_Fig4_HTML.jpg)\n\nFigure 2-4\n\
    \nWindows menu item to configure environment variables\n\nAfter clicking that\
    \ menu item, the **System Properties** dialog window should open with the **Advanced**\
    \ tab displayed, as shown in Figure [2-5](#463938_3_En_2_Chapter.xhtml#Fig5).\n\
    \n![](images/463938_3_En_2_Chapter/463938_3_En_2_Fig5_HTML.jpg)\n\nFigure 2-5\n\
    \nFirst dialog window to set environment variables on Windows\n\nClick the **Environment\
    \ Variables** button to open the dialog window of the same name, which is split\
    \ into two sections: User variables and System variables. You are interested in\
    \ **System variables** because that is where you declare `JAVA_HOME`. Just click\
    \ the **New** button in that section, and a small **New System Variable** dialog\
    \ window appears with two text fields; the top field requires you to enter the\
    \ variable name—`JAVA_HOME`, in this case—and the bottom field requires you to\
    \ enter the path (variable value)—the JDK path in this case. Figure [2-6](#463938_3_En_2_Chapter.xhtml#Fig6)\
    \ shows the **Environment Variables** dialog window in the background and the\
    \ **Edit System Variable** dialog window in the foreground (I had already created\
    \ `JAVA_HOME`, so the dialog window shown is Edit System Variable instead of New\
    \ System Variable).\n\n![](images/463938_3_En_2_Chapter/463938_3_En_2_Fig6_HTML.jpg)\n\
    \nFigure 2-6\n\nDeclaring `JAVA_HOME` as a system variable on Windows 10\n\nAfter\
    \ declaring the `JAVA_HOME` variable, you need to add the executables to the system\
    \ path. You do so by editing the `Path` variable. Select it from the **System\
    \ variables** list in the **Environment Variables** dialog box, as shown on the\
    \ left in Figure [2-7](#463938_3_En_2_Chapter.xhtml#Fig7), and click the **Edit**\
    \ button to open the **Edit environment variable** dialog (shown on the right).\
    \ Starting in Windows 10, each part of the `Path` variable is shown on a different\
    \ line, so you can add a new line and add `%JAVA_HOME%\\bin` on it. This syntax\
    \ is practical because it takes the location of the `bin` directory from whatever\
    \ location the `JAVA_HOME` variable contains.\n\n![](images/463938_3_En_2_Chapter/463938_3_En_2_Fig7_HTML.jpg)\n\
    \nFigure 2-7\n\nDeclaring the JDK executables directory as part of the system\
    \ `Path` variable on Windows 10\n\nOn older Windows systems, the contents of the\
    \ `Path` are shown in a text field. So, you must add the `%JAVA_HOME%\\bin` expression\
    \ in the **Variable** text field and separate it from the existing content by\
    \ using a semicolon (`;`).\n\nNo matter which Windows system you have, you can\
    \ check that you set up everything correctly by opening **Command Prompt** (start\
    \ typing the name in the search box to locate it easily) and executing the `set`\
    \ command. This lists all the system variables and their values. `JAVA_HOME` and\
    \ `Path` should be there with the desired values. For the setup proposed in this\
    \ section, the output of executing `set` is depicted in Figure [2-8](#463938_3_En_2_Chapter.xhtml#Fig8).\n\
    \n![](images/463938_3_En_2_Chapter/463938_3_En_2_Fig8_HTML.jpg)\n\nFigure 2-8\n\
    \nWindows 10 system variables listed with the `set` command\n\nIf you execute\
    \ the previous command and see the expected output, you can now test your Java\
    \ installation by executing `java -version` in the **Command Prompt** window,\
    \ which prints the expected result, similar to the contents of Listing [2-1](#463938_3_En_2_Chapter.xhtml#PC1).\n\
    \n```\n$ java –version\nopenjdk version \"23\" 2024-09-17\nOpenJDK Runtime Environment\
    \ (build 23+37-2369)\nOpenJDK 64-Bit Server VM (build 23+37-2369, mixed mode,\
    \ sharing)\nListing 2-1\nJava 23 Log for Execution of java -version\n```\n\n###\
    \ `JAVA_HOME` on macOS\n\nThe location in which JDK is installed is `/Library/Java/JavaVirtualMachines/jdk-23.jdk/Contents/Home`.\
    \ Your `JAVA_HOME` should point to this location. To do this for the current user,\
    \ you can do the following:\n\n*   In the `/Users/{your.user}` directory (replace\
    \ `{your.user}` with your actual system username), create a file named `.bash_profile`,\
    \ if it doesn’t exist already.\n\n*   In this file, write the following:\n\n \
    \   ```\n    export JAVA_HOME=$(/usr/libexec/java_home -v23)\n    export PATH=$JAVA_HOME/bin:$PATH\n\
    \    ```\n\nIf you use a different shell, just add the same two lines in its own\
    \ configuration file.\n\nOn macOS, you can simultaneously install multiple Java\
    \ versions. You can set which version is the one currently used on the system\
    \ by obtaining the JDK location for the desired version by calling the `/usr/libexec/java_home`\
    \ command and giving the Java version you are interested in as the argument. The\
    \ result of executing the command is stored as a value for the `JAVA_HOME` variable.\n\
    \nOn my system, I have JDK 8 to 23 installed. I can check the location for each\
    \ JDK by executing the `/usr/libexec/java_home` command and providing each version\
    \ as an argument. The commands and outputs for version 8 and 23 are depicted in\
    \ Listing [2-2](#463938_3_En_2_Chapter.xhtml#PC3).\n\n```\n$ /usr/libexec/java_home\
    \ -v23\n/Library/Java/JavaVirtualMachines/jdk-23.jdk/Contents/Home\n$ /usr/libexec/java_home\
    \ -v1.8\n/Library/Java/JavaVirtualMachines/jdk1.8.0_381.jdk/Contents/Home\nListing\
    \ 2-2\nJava 8 and 23 Locations Obtained by Calling /usr/libexec/java_home\n```\n\
    \n**Tip**\n\nManually installing Java and declaring the `JAVA_HOME` environment\
    \ variable can be avoided by using SDKMAN.\n\nThe line `export PATH=$JAVA_HOME/bin:$PATH`\
    \ adds the contents of the `bin` directory from the JDK location to the system\
    \ patch. This means that I could open a terminal and execute any of the Java executables\
    \ under it. For example, I could verify that the Java version set as default for\
    \ my user is the expected one by executing `java –version`.\n\nDepending on the\
    \ version given as the argument, a different JDK location is returned. If you\
    \ want to test the value of the `JAVA_HOME`, the `echo` command can help with\
    \ that. Listing [2-3](#463938_3_En_2_Chapter.xhtml#PC4) depicts the outputs of\
    \ the `echo` and `java –version` commands.\n\n```\n$ echo $JAVA_HOME\n/Library/Java/JavaVirtualMachines/jdk-23.0.1/Contents/Home\n\
    $ java -version\nopenjdk version \"23\" 2024-09-17\nOpenJDK Runtime Environment\
    \ (build 23+37-2369)\nOpenJDK 64-Bit Server VM (build 23+37-2369, mixed mode,\
    \ sharing)\nListing 2-3\necho and java _HOME Value and Java Version Installed.\n\
    ```"
