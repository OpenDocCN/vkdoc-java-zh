    `F1` 的组合键，开发者按下该组合键后，文档便会以弹出窗口的形式显示。在 `IntelliJ IDEA` 中，只需点击一个元素并按下 `F1`，Javadoc
    文档就会以格式精美的弹出窗口显示，如图 [9-22](#463938_3_En_9_Chapter.xhtml#Fig22) 所示。


