- fmt: '# Reactive Streams Technology Compatibility Kit


    When building applications that use reactive streams, a lot of things can go wrong.
    To make sure things go as expected, the **Reactive Streams Technology Compatibility
    Kit** project, also known as **TCK**^([^(122)](#fn122)), is an invaluable library
    to write tests. This library contains classes that can be used to test reactive
    implementations against the Reactive Streams specifications. `TCK` is intended
    to verify the interfaces contained in the JDK’s `java.util.concurrent.Flow` class.
    For some reason the team that created the library decided to use TestNG as a testing
    library.


    `TCK` contains the following four classes that have to be implemented to provide
    their `Flow.Publisher<T>`, `Flow.Subscriber<T>`, and `Flow.Processor<T,R>` implementations
    for the test harness to validate:


    *   `org.reactivestreams.tck.PublisherVerification<T>` is used to test `Publisher<T>`
    implementations.

    *   `org.reactivestreams.tck.SubscriberWhiteboxVerification<T>` is used for white-box
    testing `Subscriber<T>` implementations and `Subscription` instances.

    *   `org.reactivestreams.tck.SubscriberBlackboxVerification<T>` is used for black-box
    testing `Subscriber<T>` implementations and `Subscription` instances.

    *   `org.reactivestreams.tck.IdentityProcessorVerification<T>` is used to test
    `Processor<T,R>` implementations.


    To make the purpose of each test obvious, the library test methods’ names follow
    this pattern: `TYPE_spec####_DESC`, where `TYPE` is one of `required`, `optional`,
    `stochastic`, or `untested`, which refers to the importance of the rule being
    tested. The hash signs in `spec####` represent the rule number, with the first
    one being `1` for `Publisher<T>` instances and `2` for `Subscriber<T>` instances.
    The `DESC` is a short explanation of the test purpose.


    Let’s see how we could test the `IntPublisher` instance that we defined previously.
    The `PublisherVerification<T>` class requires implementation of two test methods:
    one to test a working `Publisher<T>` (the `createPublisher(..)` method) instance
    that emits a number of elements, and one to test a “failed” `Publisher<T>` (the
    `createFailedPublisher(..)` method) instance, which was unable to initialize a
    connection it needs to emit elements.


    The instance tested by the `createPublisher(..)` is created by passing an argument
    with a value different from 0, so the `IntPublisher` instance emits a limited
    set of elements so the test execution is finite as well.


    The `PublisherVerification<Integer>` implementation is depicted in Listing [12-14](#463938_3_En_12_Chapter.xhtml#PC14).


    ```

    package com.apress.bgn.twelve.jdkstreams;

    import org.reactivestreams.FlowAdapters;

    import org.reactivestreams.Publisher;

    import org.reactivestreams.tck.PublisherVerification;

    import org.reactivestreams.tck.TestEnvironment;

    import java.util.concurrent.Flow;

    // other import statements omitted

    public class IntPublisherTest  extends PublisherVerification {

    private static final Logger log = LoggerFactory.getLogger(IntPublisherTest.class);

    public IntPublisherTest() {

    super(new TestEnvironment(300));

    }

    @Override

    public Publisher createPublisher(final long elements) {

    return FlowAdapters.toPublisher(new IntPublisher(30) {

    @Override

    public void subscribe(Flow.Subscriber subscriber) {

    intStream.forEach(subscriber::onNext);

    subscriber.onComplete();

    }

    });

    }

    @Override

    public Publisher createFailedPublisher() {

    return FlowAdapters.toPublisher(new IntPublisher(0) {

    @Override

    public void subscribe(Flow.Subscriber subscriber) {

    subscriber.onError(new RuntimeException("There be dragons!"));

    }

    });

    }

    }

    Listing 12-14

    TestNG Test Class for Testing an IntPublisher Instance

    ```


    Another thing that should be mentioned about the previous test class is that since
    the implementation is designed to work with the Reactive Streams API, it cannot
    be used to test the JDK-based `IntPublisher`. However, the Reactive Streams API
    was enriched in version 1.0.3 with a set of classes used as bridges between the
    Reactive Streams API and the JDK Reactive Streams API. Thus, `IntPublisher` must
    be provided as an argument to the `FlowAdapters.toPublisher(..)` method that converts
    it to an equivalent `org.reactivestreams.Publisher` that the `IntPublisherTest`
    can test.


    A `Publisher<T>` implementation might not pass all the tests, because of design
    decisions that are specific to the application you are building. In our case the
    `IntPublisher` implementation is quite simplistic, and when running the `createPublisher(..)`
    method of all the executed tests, few of them pass and most are ignored, as depicted
    in Figure [12-6](#463938_3_En_12_Chapter.xhtml#Fig6).


    ![](images/463938_3_En_12_Chapter/463938_3_En_12_Fig6_HTML.jpg)


    Figure 12-6


    TestNG reactive publisher execution results


    The reason tests do not pass or are ignored is that our implementation does not
    implement behaviors targeted by those specific tests (e.g., `maySupportMultiSubscribe`,
    `maySignalLessThanRequestedAndTerminateSubscription`, and `mustSignalOnMethodsSequentially`).


    We can test the processor and subscriber we defined in the previous section by
    extending the previously mentioned testing classes as well. However, I’ll leave
    that as an exercise for you, because there is one more interesting thing I would
    like to cover in this chapter.'
  raw: '## Reactive Streams Technology Compatibility Kit


    When building applications that use reactive streams, a lot of things can go wrong.
    To make sure things go as expected, the **Reactive Streams Technology Compatibility
    Kit** project, also known as **TCK**^([^(122)](#fn122)), is an invaluable library
    to write tests. This library contains classes that can be used to test reactive
    implementations against the Reactive Streams specifications. TCK is intended to
    verify the interfaces contained in the JDK’s `java.util.concurrent.Flow` class.
    For some reason the team that created the library decided to use TestNG as a testing
    library.


    TCK contains the following four classes that have to be implemented to provide
    their `Flow.Publisher<T>`, `Flow.Subscriber<T>`, and `Flow.Processor<T,R>` implementations
    for the test harness to validate:


    *   `org.reactivestreams.tck.PublisherVerification<T>` is used to test `Publisher<T>`
    implementations.


    *   `org.reactivestreams.tck.SubscriberWhiteboxVerification<T>` is used for white-box
    testing `Subscriber<T>` implementations and `Subscription` instances.


    *   `org.reactivestreams.tck.SubscriberBlackboxVerification<T>` is used for black-box
    testing `Subscriber<T>` implementations and `Subscription` instances


    *   `org.reactivestreams.tck.IdentityProcessorVerification<T>` is used to test
    `Processor<T,R>` implementations.


    To make the purpose of each test obvious, the library test methods’ names follow
    this pattern: `TYPE_spec####_DESC`, where `TYPE` is one of `required, optional,
    stochastic`, or `untested`, which refers to the importance of the rule being tested.
    The hash signs in `spec####` represent the rule number, with the first one being
    `1` for `Publisher<T>` instances and `2` for `Subscriber<T>` instances. The `DESC`
    is a short explanation of the test purpose.


    Let’s see how we could test the `IntPublisher` instance that we defined previously.
    The `PublisherVerification<T>` class requires implementation of two test methods:
    one to test a working `Publisher<T>` (the `createPublisher(..)` method) instance
    that emits a number of elements, and one to test a “failed” `Publisher<T>` (the
    `createFailedPublisher(..)` method) instance, which was unable to initialize a
    connection it needs to emit elements.


    The instance tested by the `createPublisher(..)` is created by passing an argument
    with a value different from 0, so the `IntPublisher` instance emits a limited
    set of elements so the test execution is finite as well.


    The `PublisherVerification<Integer>` implementation is depicted in Listing [12-14](#463938_3_En_12_Chapter.xhtml#PC14).


    ```

    package com.apress.bgn.twelve.jdkstreams;

    import org.reactivestreams.FlowAdapters;

    import org.reactivestreams.Publisher;

    import org.reactivestreams.tck.PublisherVerification;

    import org.reactivestreams.tck.TestEnvironment;

    import java.util.concurrent.Flow;

    // other import statements omitted

    public class IntPublisherTest  extends PublisherVerification {

    private static final Logger log = LoggerFactory.getLogger(IntPublisherTest.class);

    public IntPublisherTest() {

    super(new TestEnvironment(300));

    }

    @Override

    public Publisher createPublisher(final long elements) {

    return FlowAdapters.toPublisher(new IntPublisher(30) {

    @Override

    public void subscribe(Flow.Subscriber subscriber) {

    intStream.forEach(subscriber::onNext);

    subscriber.onComplete();

    }

    });

    }

    @Override

    public Publisher createFailedPublisher() {

    return FlowAdapters.toPublisher(new IntPublisher(0) {

    @Override

    public void subscribe(Flow.Subscriber subscriber) {

    subscriber.onError(new RuntimeException("There be dragons!"));

    }

    });

    }

    }

    Listing 12-14

    TestNG Test Class for Testing an IntPublisher Instance

    ```


    Another thing that should be mentioned about the previous test class is that since
    the implementation is designed to work with the Reactive Streams API, it cannot
    be used to test the JDK-based `IntPublisher`. However, the Reactive Streams API
    was enriched in version 1.0.3 with a set of classes used as bridges between the
    Reactive Streams API and the JDK Reactive Streams API. Thus, `IntPublisher` must
    be provided as an argument to the `FlowAdapters.toPublisher(..)` method that converts
    it to an equivalent `org.reactivestreams.Publisher` that the `IntPublisherTest`
    can test.


    A `Publisher<T>` implementation might not pass all the tests, because of design
    decisions that are specific to the application you are building. In our case the
    `IntPublisher` implementation is quite simplistic, and when running the `createPublisher(..)`
    method of all the executed tests, few of them pass and most are ignored, as depicted
    in Figure [12-6](#463938_3_En_12_Chapter.xhtml#Fig6).


    ![](images/463938_3_En_12_Chapter/463938_3_En_12_Fig6_HTML.jpg)


    Figure 12-6


    TestNG reactive publisher execution results


    The reason tests do not pass or are ignored is that our implementation does not
    implement behaviors targeted by those specific tests (e.g., `maySupportMultiSubscribe`,
    `maySignalLessThanRequestedAndTerminateSubscription`, and `mustSignalOnMethodsSequentially`).


    We can test the processor and subscriber we defined in the previous section by
    extending the previously mentioned testing classes as well. However, I’ll leave
    that as an exercise for you, because there is one more interesting thing I would
    like to cover in this chapter.'
  trans: '

    ## 响应式流技术兼容性工具包


    在构建使用响应式流的应用程序时，很多地方都可能出错。为了确保一切按预期运行，**响应式流技术兼容性工具包**（Reactive Streams Technology
    Compatibility Kit）项目，也称为 **TCK**^(¹²²)，是一个用于编写测试的宝贵库。该库包含可用于根据响应式流规范测试响应式实现的类。TCK
    旨在验证 JDK 的 `java.util.concurrent.Flow` 类中包含的接口。出于某种原因，创建该库的团队决定使用 TestNG 作为测试库。


    TCK 包含以下四个类，必须实现这些类以提供其 `Flow.Publisher<T>`、`Flow.Subscriber<T>` 和 `Flow.Processor<T,R>`
    实现，供测试框架进行验证：


    *   `org.reactivestreams.tck.PublisherVerification<T>` 用于测试 `Publisher<T>` 的实现。

    *   `org.reactivestreams.tck.SubscriberWhiteboxVerification<T>` 用于对 `Subscriber<T>`
    的实现和 `Subscription` 实例进行白盒测试。

    *   `org.reactivestreams.tck.SubscriberBlackboxVerification<T>` 用于对 `Subscriber<T>`
    的实现和 `Subscription` 实例进行黑盒测试。

    *   `org.reactivestreams.tck.IdentityProcessorVerification<T>` 用于测试 `Processor<T,R>`
    的实现。


    为了使每个测试的目的清晰明了，该库的测试方法名称遵循以下模式：`TYPE_spec####_DESC`，其中 `TYPE` 是 `required`、`optional`、`stochastic`
    或 `untested` 之一，表示被测试规则的重要性。`spec####` 中的井号代表规则编号，第一个数字 `1` 用于 `Publisher<T>`
    实例，`2` 用于 `Subscriber<T>` 实例。`DESC` 是对测试目的的简短说明。


    让我们看看如何测试我们之前定义的 `IntPublisher` 实例。`PublisherVerification<T>` 类要求实现两个测试方法：一个用于测试能够发出多个元素的正常工作的
    `Publisher<T>`（`createPublisher(..)` 方法）实例，另一个用于测试“失败的”`Publisher<T>`（`createFailedPublisher(..)`
    方法）实例，该实例无法初始化其发出元素所需的连接。


    由 `createPublisher(..)` 测试的实例是通过传入一个值不为 0 的参数创建的，因此 `IntPublisher` 实例会发出一组有限的元素，从而使测试执行也是有限的。


    `PublisherVerification<Integer>` 的实现如代码清单 12-14 所示。


    ```

    package com.apress.bgn.twelve.jdkstreams;

    import org.reactivestreams.FlowAdapters;

    import org.reactivestreams.Publisher;

    import org.reactivestreams.tck.PublisherVerification;

    import org.reactivestreams.tck.TestEnvironment;

    import java.util.concurrent.Flow;

    // 其他导入语句已省略

    public class IntPublisherTest  extends PublisherVerification {

    private static final Logger log = LoggerFactory.getLogger(IntPublisherTest.class);

    public IntPublisherTest() {

    super(new TestEnvironment(300));

    }

    @Override

    public Publisher createPublisher(final long elements) {

    return FlowAdapters.toPublisher(new IntPublisher(30) {

    @Override

    public void subscribe(Flow.Subscriber subscriber) {

    intStream.forEach(subscriber::onNext);

    subscriber.onComplete();

    }

    });

    }

    @Override

    public Publisher createFailedPublisher() {

    return FlowAdapters.toPublisher(new IntPublisher(0) {

    @Override

    public void subscribe(Flow.Subscriber subscriber) {

    subscriber.onError(new RuntimeException("这里有龙！"));

    }

    });

    }

    }

    代码清单 12-14

    用于测试 IntPublisher 实例的 TestNG 测试类

    ```


    关于上述测试类，还有一点需要提及：由于该实现是为与响应式流 API 配合使用而设计的，因此它不能用于测试基于 JDK 的 `IntPublisher`。然而，响应式流
    API 在 1.0.3 版本中增加了一组类，用作响应式流 API 与 JDK 响应式流 API 之间的桥梁。因此，必须将 `IntPublisher` 作为参数提供给
    `FlowAdapters.toPublisher(..)` 方法，该方法会将其转换为 `IntPublisherTest` 可以测试的等效 `org.reactivestreams.Publisher`。


    `Publisher<T>` 的实现可能无法通过所有测试，原因在于你所构建应用程序的特定设计决策。在我们的案例中，`IntPublisher` 的实现非常简单，当运行所有已执行测试的
    `createPublisher(..)` 方法时，只有少数测试通过，大多数被忽略，如图 12-6 所示。


    ![](img/463938_3_En_12_Fig6_HTML.jpg)


    图 12-6


    TestNG 响应式发布者执行结果


    测试未通过或被忽略的原因是我们的实现没有实现这些特定测试所针对的行为（例如，`maySupportMultiSubscribe`、`maySignalLessThanRequestedAndTerminateSubscription`
    和 `mustSignalOnMethodsSequentially`）。


    我们也可以通过扩展前面提到的测试类来测试上一节中定义的处理器和订阅者。不过，我将把这个留作练习给你，因为本章中我还想介绍一个更有趣的内容。

