    *   类类型

    *   接口类型

    *   枚举

    *   数组类型

    *   记录

    *   注解


    引用类型与基本类型不同，因为它们是可实例化的（接口和注解除外）。这些类型的实例（对象）通过调用构造函数创建。这些类型的变量实际上只是对存储在堆中的对象的引用。由于引用也存储在栈上，即使我们修改前面的代码以使用引用，行为也将是相同的。


