    这些 GC 打印的数据具有共同元素，例如堆的初始大小，在应用程序启动时始终为 512M，并且**在我的计算机上**最大大小为 8GB。伊甸园区和年轻代在它们之间也有所不同，G1GC
    仅为年轻代使用 4096K，而 ParallelGC 则需要 153088K（多得多）。


    这里最有趣的是 Epsilon 垃圾回收器，因为正如预期的那样，它没有将堆划分为代区域，因为这种类型的垃圾回收器根本不执行垃圾回收。**TLAB** 是**线程本地分配缓冲区**的缩写，这是一个存储对象的内存区域。只有较大的对象存储在
    TLAB 之外。TLAB 在执行期间为每个线程单独动态调整大小。因此，如果一个线程分配了非常多的内存，它从堆中获取的新 TLAB 的大小将会增加。TLAB
    的最小大小可以通过虚拟机选项 `-XX:MinTLABSize` 来控制。


    对于我们使用先前虚拟机选项运行的小型空类，这个输出实际上并不相关。但是，在运行后续章节中介绍的代码时，你可以尝试使用这些选项，因为那时这里打印的统计数据才具有一定的相关性。


    此外，还有一个名为 `-XX:+PrintCommandLineFlags` 的虚拟机选项，可以在运行类时使用，以显示垃圾回收器的配置，例如它使用的线程数、堆大小等。这些选项显示在清单
    13-7 中。


    ```

    -XX:ConcGCThreads=3

    -XX:G1ConcRefinementThreads=13

    -XX:InitialHeapSize=536870912

    -XX:MarkStackSize=4194304

    -XX:MaxHeapSize=8589934592

    -XX:MinHeapSize=6815736

    -XX:+PrintCommandLineFlags

    -XX:ReservedCodeCacheSize=251658240

    -XX:+SegmentedCodeCache

    -XX:+UseCompressedOops

    -XX:+UseG1GC

    清单 13-7

    G1GC 虚拟机选项

    ```


    这些虚拟机选项中的大多数都有显而易见的名称，允许开发者推断它们的用途；对于那些名称不明显的选项，Oracle 的官方文档提供了答案。如果你需要剖析 Oracle
    的内存管理，关于这个主题有相当多优秀的 Oracle 官方文章^((130))。


    ## 从代码层面处理垃圾回收


    对于大多数应用程序来说，垃圾回收并不是开发者必须真正考虑的事情。JVM 会不时启动一个 GC 线程，它通常在不影响应用程序执行的情况下完成其工作。对于希望拥有超越
    Java 基础技能的开发者来说，理解 Java 垃圾回收的工作原理以及如何对其进行调优是必须的。开发者必须接受的第一件事是，Java 垃圾回收无法在运行时控制。正如你将在下一节中看到的，有一种方法可以向
    JVM 建议需要进行一些内存清理，但无法保证内存清理一定会被执行。从代码层面唯一能做的就是配置一些在对象被丢弃时运行的代码。'
- fmt: '### Using the `finalize()` Method


    As introduced back in Chapter [4](#463938_3_En_4_Chapter.xhtml), every Java class
    is automatically a subclass of the JDK `java.lang.Object` class. This class is
    at the root of the JDK hierarchy and is the root of all classes in an application.
    It provides quite a few useful methods that can be extended or overwritten to
    implement behavior specific to the subclass. The `equals()`, `hashCode()`, and
    `toString()` methods have already been covered in previous chapters. The `finalize()`
    method was deprecated in Java 9, but it has not yet been removed from the JDK
    in the interest of backward compatibility.


    **Caution**


    The finalization mechanism is somewhat problematic. Finalization can lead to performance
    issues, deadlocks, and hangs. Errors in finalizers can lead to resource leaks,
    and there is no way to cancel finalization if it is no longer necessary.


    Since you might end up working with Java projects using earlier versions of the
    JDK, it is good to know that the `finalize()` method exists, in case you might
    ever need it, or just to know where to look for weird bugs.


    This method is called by the garbage collector when there are no longer any references
    to that object in the code. Before we move forward, take a look at the code in
    Listing [13-8](#463938_3_En_13_Chapter.xhtml#PC9).


    ```

    package com.apress.bgn.thirteen;

    import com.apress.bgn.thirteen.util.NameGenerator;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.time.LocalDate;

    import static com.apress.bgn.thirteen.util.NameGenerator.RND;

    public class InfiniteSingerGenerator {

    private static final Logger LOGGER = LoggerFactory.getLogger(InfiniteSingerGenerator.class);

    private static final NameGenerator nameGenerator = new NameGenerator();

    void main() {

    while (true) {

    genSinger();

    }

    }

    private static void genSinger() {

    Singer s = new Singer(nameGenerator.genName(), RND.nextDouble(), LocalDate.now());

    LOGGER.info("JVM created: {}", s.getName());

    }

    }

    Listing 13-8

    Class Generating Infinite Number of Singer Instances

    ```


    The action performed by the code in Listing [13-8](#463938_3_En_13_Chapter.xhtml#PC9)
    should be obvious even without knowing how the `NameGenerator` or the `Singer`
    class look. The main method calls the `genSinger()` method in an infinite loop.
    This means that infinite `Singer` instances are created. So what happens? Will
    the code run? For how long? If you can answer these questions in your mind, *my
    work here is complete; you can stop reading the book now!*


    Recall that Chapter [5](#463938_3_En_5_Chapter.xhtml) included some figures representing
    the memory contents for a small program. Similarly, Figure [13-4](#463938_3_En_13_Chapter.xhtml#Fig4)
    represents how the Java heap and stack memory might look during the execution
    of the program in Listing [13-8](#463938_3_En_13_Chapter.xhtml#PC9).


    ![](images/463938_3_En_13_Chapter/463938_3_En_13_Fig4_HTML.jpg)


    Figure 13-4


    Java stack and heap memory during execution of the `InfiniteSingerGenerator` class


    Only one `genSinger()` call is represented and only one `Singer` instance, for
    obvious reasons. As you can see, when the `main(..)` method is called, references
    to the static instances are created; that will be relevant to the program until
    the end of its execution. Then, `genSinger()` methods are called. Each of these
    methods has its own stack where it saves references to the objects created within
    the context of that method, in this case the `Singer` instance. This reference
    is used just to print the name of the `Singer` instance that was created in the
    body of this method. Then the method exists, without returning the reference.
    This means that the instance that was created is no longer necessary, as it was
    created to be used only in the context of this method.


    When the execution of the `genSinger()` method ends, the reference to the `Singer`
    is discarded from the stack. The `Singer` instance still exists, in the heap memory,
    but can no longer be accessed from the program, thus it is no longer necessary
    to it. It now just keeps a memory block occupied with its own contents, its references
    to other instances, in this case, a `String`, a `Double`, and a `LocalDate`.


    Considering that the `genString()` is called an infinite number of times (represented
    by `(*n)` in Figure [13-4](#463938_3_En_13_Chapter.xhtml#Fig4)), more `Singer`
    instances will be created. They will keep the memory occupied, and the program
    will be unable at some point to create others, because there will be no more memory
    available.


    This is where the garbage collector comes into the picture. The `Singer` instances
    that are no longer being referenced from the program, and thus unreachable, are
    considered garbage (now you know where the name comes from) because they are no
    longer necessary, and the memory can be safely cleaned up. The GC is a cleanup
    thread that runs in parallel with the main execution thread and from time to time
    starts deleting the unreferenced objects in the heap memory. And because the `finalize()`
    method is still available for use, we will overwrite it for the `Singer` type
    to print a log message, so we can see in our console directly when the garbage
    collector is destroying an instance, because before that we will call the `finalize()`
    method. The code snippet in Listing [13-9](#463938_3_En_13_Chapter.xhtml#PC10)
    depicts our `Singer` instance.


    ```

    package com.apress.bgn.thirteen;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.time.LocalDate;

    import java.util.Objects;

    public class Singer {

    private static final Logger LOGGER = LoggerFactory.getLogger(Singer.class);

    private static final long serialVersionUID = 42L;

    private final long birthtime;

    private String name;

    private Double rating;

    private LocalDate birthDate;

    public Singer(String name, Double rating, LocalDate birthDate) {

    this.name = name;

    this.rating = rating;

    this.birthDate = birthDate;

    this.birthtime = System.nanoTime();

    }

    // some code omitted

    @Override

    protected void finalize() throws Throwable {

    try {

    long deathtime = System.nanoTime();

    long lifespan = (deathtime - birthtime) / 1_000_000_000;

    LOGGER.info("GC Destroyed: {} after {} seconds", name, lifespan);

    } finally {

    super.finalize();

    }

    }

    }

    Listing 13-9

    The Singer Class with the Overridden finalize() Method

    ```


    The field `birthtime` was added just to be able to calculate the time that passes
    between when the constructor for an instance is called and the time the garbage
    collector calls the `finalize()` method. As the time is counted in nanoseconds,
    we are dividing the difference by `pow(10, 9)` to get the time in seconds.


    The code sample used in this section gives the garbage collector a lot of work
    to do, as every `Singer` instance being created is being used very little before
    being discarded. If you run the code, you will see a lot of log messages in the
    console: first a lot of messages about objects being created, and then, if you
    wait a few seconds, messages about objects being discarded. All output is directed
    to a file, because the IntelliJ IDEA console is based on a buffer that resets
    from time to time to prevent the editor from crashing. You will have to stop the
    program manually, because the `while (true)` never ends, because its condition
    will never evaluate to `false`. After you stop the program, you will notice a
    log file at the following location: `/chapter13/out/gc.log`. If you don’t, modify
    the IntelliJ IDEA launcher for this class and add the following VM option:


    ```

    -Dlogback.configurationFile=chapter13/src/main/resources/logback.xml

    ```


    Then, run it again.


    The `gc.log` contents should look a lot like the snippet depicted in Listing [13-10](#463938_3_En_13_Chapter.xhtml#PC12).'
