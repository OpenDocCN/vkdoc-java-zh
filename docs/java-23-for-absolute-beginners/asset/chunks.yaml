- fmt: '# String Pool and String Manipulation in Java


    The `String Pool` had a default size of 1009 entries until Java 6. Starting with
    this version, its size can be modified using the `-XX:StringTableSize` command-line
    option. Since the size varies from one Java version to another and the memory
    available to the program, my recommendation is just to run `java -XX:+PrintFlagsFinal
    -version` and look for `StringTableSize` in the returned output to get the real
    size of the `String Pool` on your machine.


    In Listing [5-26](#463938_3_En_5_Chapter.xhtml#PC41), lines 11 and 12 depict how
    a `String` instance can be created from a `char[3]` array. Until Java 8, internally
    that was the initial representation for `String` values—arrays of characters.
    A character is represented on 2 bytes, which means a lot of memory was consumed
    for `Strings`. In Java 9, a new representation was introduced called Compact `String`,
    which uses `byte[]` or `char[]` depending on the content. This means that the
    memory consumed by a `String` processing application is significantly lower starting
    with Java 9.


    The `String` class provides a huge set of methods to manipulate strings. Over
    the years it received many improvements, like better optimization possibilities,
    multiline blocks, and new practical methods of text transformations. A lot of
    `String` utility methods were missing from the JDK over the years, and developers
    used libraries like Apache Commons Lang^([^(52)](#fn52)) to avoid writing their
    own. After Java 8 a few modifications have been added that make external libraries
    unnecessary. The following section lists and explains the most interesting and
    useful of them that a beginner should be aware of.


    ## Useful String Methods Added After Java 8


    All the useful `String` methods added after Java 8 are demonstrated in class `com.apress.bgn.five.NewAgeStringDemo`,
    which won’t be fully depicted in the book to keep it to an acceptable size. The
    following list briefly describes the most useful methods added to the `String`
    class after Java 8.


    **In Java 11:**


    - `strip()`: Returns a string whose value is this string, with all leading and
    trailing whitespace removed.

    - `stripLeading()`: Returns a string whose value is this string, with all leading
    whitespace removed.

    - `stripTrailing()`: Returns a string whose value is this string, with all trailing
    whitespace removed.

    - `isBlank()`: Returns `true` if the string is empty or contains only whitespace
    codepoints, otherwise returns `false`.

    - `lines()`: Returns a stream of lines extracted from this string, separated by
    line terminators.

    - `repeat(int count)`: Returns a string whose value is the concatenation of this
    string repeated `count` times.


    **In Java 12:**


    - `indent(int n)`: Adjusts the indentation of each line of this string based on
    the value of `n`, and normalizes line-termination characters.


    **In Java 15:**


    - `String formatted(Object templateReference)`: Formats using this string as the
    format string, and the supplied arguments. This method is an equivalent to `String.format(stringReference,
    templateReference)` introduced in Java 1.5, a static method in the `String` class
    that required the processed string to be provided as an argument.


    **In Java 21:**


    - `int indexOf(int ch, int beginIndex, int endIndex)`: Returns the index within
    this string of the first occurrence of the specified character, starting the search
    at `beginIndex` and stopping before `endIndex`.

    - `int indexOf(String str, int beginIndex, int endIndex)`: Returns the index of
    the first occurrence of the specified substring within the specified index range
    of this string (equivalent of `s.substring(beginIndex, endIndex).indexOf(str)
    + beginIndex`).

    - `String[] splitWithDelimiters(String regex, int limit)`: Splits this string
    around matches of the given regular expression and returns both the strings and
    the matching delimiters (the pattern will be applied at most `limit-1` times).


    ## Escaping Characters


    There are special characters that cannot be part of a `String` value. As you have
    probably noticed, `String` values are defined between double quotes (`"sample"`),
    and this makes the `"` (double quote) character unusable as a value. To be able
    to use it as a `String` value or part of one, it has to be *escaped*. Another
    special character that is not allowed to be part of a `String` value is `\` (backslash).
    Figure [5-17](#463938_3_En_5_Chapter.xhtml#Fig17) shows how IntelliJ IDEA informs
    you with its squiggly red line that you cannot use those characters in the content
    of a `String` value. It also shows how you can escape those characters to make
    them usable.


    ![](images/463938_3_En_5_Chapter/463938_3_En_5_Fig17_HTML.jpg)


    Figure 5-17


    Code samples with special characters


    To escape those characters, a backlash must be inserted before them. So a single
    `\` is not allowed to be part of a `String` value, but two of them together are,
    which tells the compiler that the `String` value contains a `\` character:


    ```

    System.out.println(" Example using \\.")

    //Prints

    Example using \.

    ```


    The `\a` special character in Figure [5-17](#463938_3_En_5_Chapter.xhtml#Fig17)
    is not allowed in a `String` value because the `\` is used to construct escape
    sequences, but `\a` is not an escape sequence.


    The `''` (single quote) must be escaped as well when used as a character value.


    ```

    char quote = ''\'''';

    ```


    There are several Java escape sequences that can be used in `String` values to
    get a certain effect, the most important of which are listed in Table [5-1](#463938_3_En_5_Chapter.xhtml#Tab1).


    Table 5-1


    Java Escape Sequences


    | Escape Sequence | Effect |

    | --- | --- |

    | `\n` | Create a new line (often called the newline character). |

    | `\t` | Create a tab character. |

    | `\b` | Create a backspace character (which might delete the preceding character,
    depending on the output device). |

    | `\r` | Return to the start of the line (but do not make a new line, the equivalent
    of the `Home` key on the keyboard). |

    | `\f` | Form feed (move to the top of the next page for printers). |

    | `\s` | Create a space character. |

    | `\` | Line terminator. |


    **Information**


    The full list of characters that need to be escaped in `String` values can be
    found in the Java Language Specification documentation here: `https://docs.oracle.com/javase/specs/jls/se23/html/jls-3.html#jls-3.10.7`


    **Important**


    According to the JLS, it is a compile-time error if the character following a
    backslash in an escape sequence is not a `\` or an ASCII `b`, `s`, `t`, `n`, `f`,
    `r`, `"`, `''`, `0`, `1`, `2`, `3`, `4`, `5`, `6`, or `7`.


    The newline `\n` and the tab `\t` character are used quite often in programming
    to properly format console output. If we declare a `String` instance like the
    following:


    ```

    String perf = "The singers performing tonight are: \n\t Paolo Nutini \n\t Seth
    MacFarlane\n\t John Mayer";

    ```


    When printed in the console, the text will be formatted and will look like this:


    ```

    The singers performing tonight are:

    Paolo Nutini

    Seth MacFarlane

    John Mayer

    ```'
