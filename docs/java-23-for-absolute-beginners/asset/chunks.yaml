    Important


    Collections is a common topic in interviews for Java entry-level jobs, so if you
    apply for such a job, don’t be surprised if you are asked what the difference
    is between a List<`E>` and a `Set<E>`.


    When working with `Set<E>` implementations, you have to make sure the objects
    added to the set have `equals(..)` and `hashCode()` implemented correctly. The
    reason for this is that `Set<E>` models the mathematical *set* abstraction that
    allows no duplicate elements.


    The `equals(..)` method indicates whether the object passed as an argument is
    “equal to” the current instance. The default implementation provided by the `Object`
    class considers two objects to be equal if they are stored in the same memory
    location.


    The `hashCode(..)` method returns an integer representation of the object memory
    address, obtained via *hashing*^([^(56)](#fn56)). The default implementation provided
    by the `Object` class returns a random integer that is unique for each instance.
    This value might change between several executions of the application. This method
    is useful when objects are used as keys in hash tables, because it optimizes retrieving
    elements from them. If you want to learn more about hash tables, the Internet
    is your oyster; as for Java, a hash table can be modeled by an instance of `java.util.HashMap<K,V``>`.


    As per the official documentation, if two objects are equal, then calling `hashCode()`
    on each of them must yield the same result. But it is not a must for two unequal
    objects to have different hashCodes ) values.


