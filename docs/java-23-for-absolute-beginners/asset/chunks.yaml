    .get(); // Block and wait for the future to complete

    System.out.println(result2);

    CompletableFuture.supplyAsync(() ->  Thread.currentThread().getName() + " async
    run (4)" // Supplier as lambda

    ).thenAccept(System.out::println); //  Consumer processes the result when received

    var result3 = CompletableFuture.supplyAsync(() ->  Thread.currentThread().getName()+
    "  async run (5)" // Supplier as lambda

    ).thenApplyAsync(s -> Thread.currentThread().getName() + " thenApplyAsync : "
    + s) // apply async transformation to result

    .get(); // Block and wait for the future to complete

    System.out.println(result3);

    var result4 = CompletableFuture.supplyAsync(() -> {

    if (System.currentTimeMillis()%2 ==0) {

    throw new IllegalStateException("No can do!");

