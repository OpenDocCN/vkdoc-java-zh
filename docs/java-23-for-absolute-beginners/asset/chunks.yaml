    \ Index 5 out of bounds for length 2 at chapter.five.arrays/com.apress.bgn.five.ArrayDemo.main(ArrayDemo.java:40)\n\
    ```\n\n为了更方便地处理 Java 中的数组，有一个专门的类：`java.util.Arrays`。这个类提供了实用方法来对数组进行排序和比较、搜索元素，或者将其内容转换为文本或流（如**第**\
    \ **8** **章**所述），这样无需编写示例中一直使用的繁琐的 `for` 循环即可打印它们。代码清单 5-25 展示了其中一些实用方法。\n\n```\n\
    package com.apress.bgn.five;\nimport java.util.Arrays;\npublic class ArrayUtilitiesDemo\
    \ {\nvoid main() {\nint[] array =  {4, 2};\nSystem.out.println(Arrays.toString(array));\n\
    // 或者\nArrays.stream(array).forEach(ai -> System.out.println(ai));\n// 或者使用方法引用\n\
    Arrays.stream(array).forEach(System.out::println);\nArrays.sort(array);\narray\
    \ = new int[]{4, 2, 1, 5, 7};\nint foundAt = Arrays.binarySearch(array, 5);\n\
    System.out.println(\"Key found at: \" + foundAt);\n}\n}\n// 输出\n/*\n[4, 2]\n\n\
    Key found at: 3\n*/\n代码清单 5-25\njava.util.Arrays 的有用方法\n```\n\n以下列表简要解释了代码清单 5-25\
    \ 中的每条语句：\n\n*   `int[] array = {4, 2}` 是一个数组声明和初始化。不需要 `new int[]`，因为编译器可以从数组的声明中推断出元素的类型，并根据提供的初始化值集合的大小推断出数组的大小。\n"
- fmt: '`Arrays.toString(array)`返回指定数组内容的`String`表示形式。元素的`String`表示形式用逗号分隔，结果字符串用方括号（`[]`）括起来。


    `Arrays.stream(array)`返回以指定数组为源的顺序`IntStream`。流将在**第**[**8**](#463938_3_En_8_Chapter.xhtml)章中介绍，这些类提供了逐个处理元素的方法，无需使用`for`循环。在清单[5-25](#463938_3_En_5_Chapter.xhtml#PC40)中，结果流的元素使用`System.out.println(..)`方法逐个处理，这意味着它们会逐个打印到控制台。


    `Arrays.sort(array)`将指定数组按升序数值顺序排序。此方法不会返回新的排序数组，因此元素会在原数组内改变位置。用于执行排序的算法称为**双轴快速排序**，是最有效的排序算法之一^([^(51)](#fn51))。


    `array = new int[]{4, 2, 1, 5, 7}`是对数组的重新初始化。这意味着将一个新的数组值赋给`array`引用。因此，声明必须指定`new`关键字以及类型和数组大小，除非使用一组元素进行初始化（这正是此语句的情况），所以大小不是必需的。


    `Arrays.binarySearch(array, 5)`在数组中搜索作为参数提供的值（本例中为5），并返回一个表示该元素在数组中位置的值（即其索引）。用于搜索的算法称为**二分查找**，其工作原理是将数组反复分成两部分，直到找到该元素。这种技术称为*分治法*（或**分而治之**），它涉及将一个大问题反复（递归地）分解成小问题，直到它们可以轻松解决。当然，当数组已排序时，对数组进行二分查找效率最高。


    提示


    请随意在网上搜索本节中提到的算法；当您需要开发自己的解决方案时，它们有助于理解。**第**[**7**](#463938_3_En_7_Chapter.xhtml)章将向您展示如何遵循一些简单且众所周知的算法来编写代码。


    ### `String`类型


    我们列表中的下一个特殊Java数据类型是`String`。与原始类型`int`一起，这是Java中最常用的类型之一。`String`实例用于建模文本并对其执行各种操作。`String`类型是一种特殊类型，因为JVM会对此类型的对象进行特殊处理。如果您还记得第一张包含内存内容的图片（图[5-1](#463938_3_En_5_Chapter.xhtml#Fig1)），`String`对象被分配在堆中一个称为**字符串常量池**的特殊位置。在本节中，将详细介绍此类型，并且希望您迄今为止可能遇到的许多问题都能得到解答。


    到目前为止，本书中`String`变量的声明方式如清单[5-26](#463938_3_En_5_Chapter.xhtml#PC41)所示。


    ```

    package com.apress.bgn.five;

    public class SimpleStringDemo {

    public static void main(String... args) {

    01\.        String text1 = null;

    02.

    03\.        String text21 = "two";

    04\.        String text22 = "two";

    05\.        String text23 = new String ("two");

    06.

    07\.        String piece1 = "t";

    08\.        String piece2 = "wo";

    09\.        String text24 = piece1 + piece2;

    10.

    11\.        char[] twoCh = {''t'', ''w'', ''o''};

    12\.        String text25 = new String(twoCh);

    }

    }

    清单 5-26

    本书中使用的一些 String 语句

    ```


    如您所见，第03、04、05、09和12行各自定义了一个内容相同的`String`对象，即*two*。我故意这样做，原因很快就会明了。在实际应用程序中，尤其是在这个大数据热潮时期，应用程序处理大量数据，其中大部分是文本形式。因此，能够压缩数据并重用数据将减少内存消耗。减少内存访问尝试可以通过减少处理来提高速度，从而降低成本。


    `String`变量可以直接用文本值初始化（第03和04行）。在这种情况下，JVM首先在字符串常量池中查找具有相同值的`String`对象。如果找到，则新的`String`变量将使用对该对象的引用进行初始化。如果未找到，则分配内存，将文本值写入其中，并使用对该内存的引用初始化新的`String`变量。


    在第05行，使用`String`类的构造函数来创建一个`String`对象。注意使用了`new`关键字。这意味着显式请求分配内存来存储作为参数提供的文本。


    在继续本节之前，我们必须快速绕道，提一下Java中**对象相等**的含义。在Java中，对象通过引用其内存位置来处理。`==`（双等号）运算符比较引用指向的内存位置，因此两个对象相等当且仅当它们存储在同一个内存地址中。这就是为什么应该使用`equals(..)`方法来比较对象。这是一个从`Object`类继承的特殊方法，但每个类必须提供其自身真正与其结构相关的实现。不出所料，`Object`类中的`equals(..)`实现默认采用`==`的行为。


    想象两个红色球，具有相同的直径和相同的颜色，由相同的材料制成。它们是相同的，在Java中这意味着相等，但它们不是同一个球；它们只是按照相同的规格制造的。如果你拿两个随机的小孩，比如Jim和Jane，每个人都可以玩自己的球。但如果Jim和Jane玩同一个球，只是互相扔来扔去，这非常类似于Java中引用的相等性。图[5-15](#463938_3_En_5_Chapter.xhtml#Fig15)是这种情况的抽象表示。


    ![](images/463938_3_En_5_Chapter/463938_3_En_5_Fig15_HTML.jpg)


    图 5-15


    使用红球展示`equals(..)`和`==`之间的区别'
