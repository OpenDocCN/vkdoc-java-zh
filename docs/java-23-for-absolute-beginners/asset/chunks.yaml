    As you can see, the `Musician` constructor calls the constructor in the superclass
    to set the properties defined there, using the `super(..)` invocation. Also notice
    the full implementation provided for the `getTimeToLive()` method.


    Note


    Here is a fun fact about the `super(..)` invocation. Until version 21, in Java
    you were not allowed to put any other statement before this invocation, which
    made it difficult to use a constructor in a subclass to perform some initializations
    or validations before the actual construction of the instance.


    For example, let’s try to add a constructor without parameters for the `Musician`
    shown in Listing [4-29](#463938_3_En_4_Chapter.xhtml#PC29), that invokes the methods
    in a class named `DataGenerator` to generate random values use to populate fields
    inherited from the `Human`, and it does that right before calling `super(..)`.
    Figure [4-7](#463938_3_En_4_Chapter.xhtml#Fig7) shows the error that IntelliJ
    IDEA would show if the project were to be compiled with JDK 17.


    ![](images/463938_3_En_4_Chapter/463938_3_En_4_Fig7_HTML.jpg)


    Figure 4-7


    IntelliJ IDEA compiling Java 22 sources with JDK 17, showing statements not allowed
    before the `super(..)` invocation


    The `DataGenerator` class is very simple and generates values based on a pseudo-random
    number generator (PRNG) instance. This instance is obtained by invoking `RandomGenerator.of("SecureRandom")`.
    The `java.util.random.RandomGenerator` interface was introduced in Java 17 to
    provide a common protocol for objects that generate random or (more typically)
    pseudo-random sequences of numbers (or `Boolean` values). Internally, an instance
    of `java.util.random.RandomGeneratorFactory` enables creation of various PRNGs,
    many of which are in the `jdk.random` package.


    You can see the implementation of the data generator methods in class `DataGenerator`
    in Listing [4-30](#463938_3_En_4_Chapter.xhtml#PC30).


    ```

    package com.apress.bgn.four.classes;

    import java.nio.charset.Charset;

    import java.util.random.RandomGenerator;

    public class DataGenerator {

    static RandomGenerator randomGenerator = RandomGenerator.of("SecureRandom");

    public static String genString() {

    byte[] array = new byte[7];

    randomGenerator.nextBytes(array);

    return new String(array, Charset.defaultCharset());

    }

    public static float genFloat() {

    return randomGenerator.nextFloat();

    }

    public static int genInt() {

    return randomGenerator.nextInt();

    }

    }

    Listing 4-30

    Data Generator Methods Using JDK 17 RandomGenerator

    ```


    The argument of the `RandomGenerator.of(String)` method is the algorithm name
    of the PRNG. The JDK contains many PRNG classes, which replace the `java.util.Random`
    class that has been part of the JDK since version 1.0\. The `RandomGenerator`
    interface contains many methods, such as `nextLong()`, `nextInt()`, `nextDouble()`,
    `nextFloat()`, and `nextBoolean()`, to generate a random number of various primitive
    data types. Generating a `String` value is done by generating an array of bytes
    using `nextBytes(byte[])` and using it as an argument for the `String(byte[])`
    constructor.


    Listing [4-31](#463938_3_En_4_Chapter.xhtml#PC31) shows how the new `Musician`
    constructor looks.


    ```

    package com.apress.bgn.four.classes;

    import java.util.List;

    public class Musician extends Human {

    private String musicSchool;

    private String genre;

    private List songs;

    public Musician() {

    // -- preparing superclass constructor arguments

    var name = DataGenerator.genString();

    var school = DataGenerator.genString();

    var age = DataGenerator.genInt();

    var height = DataGenerator.genFloat();

    // ---

    super(name, age, height);

    this.musicSchool = DataGenerator.genString();

    this.genre = "undefined";

    }

