- fmt: '### Using `Writer` to Write Files


    Similar to the `Reader` hierarchy for reading files, there is an abstract class
    named `Writer`, but before we get to that, I’ll introduce the `BufferedWriter`,
    the correspondent of `BufferedReader` for writing files, because this is one of
    the most used in practice. This class too has an internal buffer, and when write
    methods are called, the arguments are stored into the buffer, and when the buffer
    is full, its contents are written to the file. The buffer can be emptied earlier
    by calling the `flush()` method. It is definitely recommended to call this method
    explicitly before calling `close()` to make sure all output was written to the
    file. The code snippet in Listing [11-25](#463938_3_En_11_Chapter.xhtml#PC45)
    depicts how a list of `String` instances is written to a file.


    ```

    package com.apress.bgn.eleven.io;

    import java.io.BufferedWriter;

    import java.io.FileWriter;

    // other import statements omitted

    public class BufferedWritingDemo {

    private static final Logger LOGGER = LoggerFactory.getLogger(BufferedWritingDemo.class);

    void main() {

    var file = new File("chapter11/read-write-file/src/main/resources/output/data.txt");

    var dataList = List.of ("How will I hold my head" ,

    "To keep from going under");

    BufferedWriter writer = null;

    try {

    writer = new BufferedWriter(new FileWriter(file));

    for (String entry : dataList) {

    writer.write(entry);

    writer.newLine();

    }

    LOGGER.info("String written using BufferedWriter before Java 7");

    } catch (IOException e) {

    LOGGER.info("Something went wrong! ", e);

    } finally {

    if(writer!= null) {

    try {

    writer.flush();

    writer.close();

    } catch (IOException e) {

    LOGGER.info("Something went wrong! ", e);

    }

    }

    }

    }

    }

    Listing 11-25

    Writing a List to a File Using BufferedWriter

    ```


    Yet another code contraption is needed, because writing files is a sensitive operation
    that can fail for many reasons. The code in Listing [11-25](#463938_3_En_11_Chapter.xhtml#PC45)
    is what you had to write before Java 7, when `try-with-resources` reduced the
    boilerplate and allowed that code to be reduced as shown in Listing [11-26](#463938_3_En_11_Chapter.xhtml#PC46).


    ```

    try (final BufferedWriter wr = new BufferedWriter(new FileWriter(file))){

    dataList.forEach(entry -> {

    try {

    wr.write(entry);

    wr.newLine();

    } catch (IOException e) {

    LOGGER.info("Something went wrong! ", e);

    }

    });

    wr.flush();

    LOGGER.info("String written using BufferedWriter after Java 7");

    } catch (IOException e) {

    LOGGER.info("Something went wrong! ", e);

    }

    Listing 11-26

    Writing a List to a File Using BufferedWriter and try-with-resources

    ```


    Notice that there is no need to call `wr.close()`, because in Java 7 the `java.io.Closeable`
    interface was modified to extend `java.lang.AutoCloseable`, which declares a version
    of the `close()` method that is called automatically when exiting a `try-with-resources`
    block. Still, the code looks pretty stuffy, right? Especially since a `BufferedWriter`
    needs to be declared and needs to be wrapped around a `FileWriter` instance. This
    was simplified in Java 8 with the addition of the `Files` utility class, which
    contains a method named `newBufferedWriter(Path path)` that returns a `BufferedWriter`
    instance, so that the developer no longer has to write that code explicitly. So
    the initialization expression in the `try-with-resources` in Listing [11-26](#463938_3_En_11_Chapter.xhtml#PC46)
    can be replaced with


    ```

    final BufferedWriter wr = Files.newBufferedWriter(file.toPath());

    ```


    Also, there is a version of this method taking a charset argument:


    ```

    final BufferedWriter wr = Files.newBufferedWriter(file.toPath(),StandardCharsets.UTF_8);

    ```


    Before this method was introduced, writing text to a file with a specified charset
    required a `java.io.OutputWriter` instance:


    ```

    final OutputStreamWriter wr = new OutputStreamWriter(new FileOutputStream(file),
    StandardCharsets.UTF_8);

    ```


    There is also a version of this method that takes an argument of type `OpenOption`
    that allows you to specify how the file should be opened:


    ```

    final BufferedWriter wr = Files.newBufferedWriter(file.toPath(),StandardCharsets.UTF_8,
    StandardOpenOption.APPEND);

    ```


    This is very useful, since a `BufferedWriter` created explicitly (without specifying
    a file option) overrides an existing file, unless the `FileWriter` that is wrapped
    around is configured to append data to an existing file, like depicted here:


    ```

    final BufferedWriter wr = new BufferedWriter(new FileWriter(file, true))

    ```


    The second parameter is a `boolean` value representing if the file should be opened
    for appending text (`true`) or not (`false`).


    Now that the basics of using `BufferedWriter` have been covered, it’s time to
    meet the most useful members of the `Writer` family, depicted in Figure [11-5](#463938_3_En_11_Chapter.xhtml#Fig5).


    ![](images/463938_3_En_11_Chapter/463938_3_En_11_Fig5_HTML.jpg)


    Figure 11-5


    The `Writer` class hierarchy


    The `Writer` class is abstract, so it cannot be used directly; the appending API
    comes from the `java.io.Appendable` interface that `Writer` implements. The other
    `Writer` classes are used for different purposes. As we’ve already seen, the `OutputStreamWriter`
    is used to write text using a special character encoding.


    The `PrintWriter` is used to write formatted representations of objects to a text-output
    stream (we’ve already used it to write HTML code, in Chapter 10).


    The `StringWriter` is used to collect output into its internal buffer and write
    it to a `String` instance.


    In Java 11, the `Writer` class was enriched with the `nullWriter()` method, which
    returns a `Writer` instance that does nothing. This was requested by developers
    for testing purposes.'
  raw: '### Using `Writer` to Write Files


