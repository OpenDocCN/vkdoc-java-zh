    \ message) {\n        super(message);\n    }\n}\n\n// output\n// Did not expect\
    \ an even number at 2\n// Cleaning up arr\n```\n\n*Listing 7-50* Controlling Flow\
    \ Using Exceptions\n\nThe `EvenException` type is a custom exception type written\
    \ for this specific example. Notice the output of this snippet. As you can see,\
    \ by throwing an exception, we’ve directed the execution to the handling code,\
    \ so *Not found, all good!* is not printed. Because there is a `finally` block\
    \ that was executed as well, we get the *Cleaning up arr* message in the console\
    \ too.\n\nYou also can mix and match: use different types of exceptions and include\
    \ multiple `catch` blocks—whatever you need to solve your problem. At a previous\
    \ company I worked for we had a piece of code that validated a document and threw\
    \ different types of exceptions depending on the validation check that failed,\
