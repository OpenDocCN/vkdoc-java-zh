  trans: '

    ### Java 16


    JDK 16^(¹⁸) 于 2021 年 3 月 16 日发布，是继 JDK 15 之后标准 Java 版本的参考实现，这意味着 JDK 15 中所有不稳定的内容预计在
    JDK 16 中会更加稳定。除此之外，该版本最显著的特性包括：


    *   引入 Vector API，用于表达向量计算，在支持的 CPU 架构上可编译为最优的向量硬件指令，从而实现比等效标量计算更卓越的性能

    *   默认对 JDK 内部进行强封装（详见**第** **3****章**）

    *   引入 Foreign Linker API，提供静态类型、纯 Java 方式访问本地代码

    *   引入弹性元空间，能够更及时地将未使用的 HotSpot 类元数据（即元空间）内存返还给操作系统

    *   增加对 C++ 14 语言特性的支持

    *   最终版 Records 发布（详见**第** **4****章**）


    JDK 16 只是一个短期版本，在 2021 年 9 月 JDK 17 到来之前，由 Oracle Premier Support 提供六个月的持续支持。


    ### Java 17


    JDK 17^(¹⁹) 是下一个**长期支持**（LTS）版本，Oracle 将为其提供八年的支持。根据 Oracle 对 Java SE 版本每六个月发布一次的节奏，它于
    2021 年 9 月 14 日发布。


    JDK 17 的特性列表主要聚焦于 JVM 内部，以提升性能并弃用/淘汰旧 API：


    *   对 JDK 16 中引入的 Vector API 进行性能和实现方面的改进

    *   对密封类与密封接口的完善，详见**第** **4****章**

    *   为 `switch` 表达式引入模式匹配，详见**第** **7****章**

    *   macOS 专属改进

    *   对伪随机数生成器（PRNG）的增强，包括引入新的 PRNG 接口和实现，其中包含可跳跃的 PRNG 以及一类新的可拆分 PRNG 算法（LXM），详见**第**
    **4****章**

    *   对 JDK 内部封装的增强

    *   Foreign Function & Memory API，合并了之前两个孵化中的 API，即 Foreign-Memory Access API
    和 Foreign Linker API，允许开发者调用本地库并处理本地数据，而无需承担 JNI 的风险


    安装 JDK 17 后，在终端中运行 `java -version` 会显示类似于清单 1-6 所示的日志。


    ```

    $ java -version

    java version "17.0.9" 2023-10-17 LTS

    Java(TM) SE Runtime Environment (build 17.0.9+11-LTS-201)

    Java HotSpot(TM) 64-Bit Server VM (build 17.0.9+11-LTS-201, mixed mode, sharing)

    清单 1-6

    执行 java -version 时的 Java 17 日志

    ```


    ### Java 18


    JDK 18^(²⁰) 于 2022 年 3 月 22 日发布，是另一个专注于预览和孵化特性更新的短期版本：


    *   Vector API 新增功能（第三次孵化）

    *   **简易 Web 服务器**，一个命令行工具，用于启动仅提供静态文件的最小化 Web 服务器，详见**第** **10****章**

    *   在 JavaDoc 中引入 `@snippet` 标签，以简化文档中代码的包含，详见**第** **9****章**

    *   `switch` 表达式的模式匹配，第二次预览，详见**第** **7****章**

    *   弃用终结机制，为移除做准备，详见**第** **13****章**


    ### Java 19


    JDK 19^(²¹) 于 2022 年 9 月 20 日发布，是另一个专注于预览和孵化特性更新的短期版本：


    *   Vector API 新增功能（第四次孵化）

    *   Record 模式，第一次预览，详见**第** **6****章**

    *   虚拟线程，第一次预览，详见**第** **5****章**

    *   `switch` 表达式的模式匹配，第三次预览，详见**第** **7****章**

    *   结构化并发（第一次孵化），详见**第** **5****章**


    ### Java 20


    JDK 20^(²²) 于 2023 年 3 月 21 日发布，是另一个专注于预览和孵化特性更新的短期版本：


    *   Vector API 新增功能（第五次孵化）

    *   Record 模式，第二次预览，详见**第** **7****章**

    *   虚拟线程，第二次预览，详见**第** **5****章**

    *   `switch` 表达式的模式匹配，第四次预览，详见**第** **7****章**

    *   结构化并发（第二次孵化），详见**第** **5****章**

    *   作用域值（第一次孵化）

    '
- fmt: '### Java 21


    `JDK 21`，^([^(23)](#fn23)) 下一个**长期支持**（LTS）版本，将获得 Oracle 八年的支持。它于 2023 年 9 月 19
    日发布，遵循 Oracle 为 Java SE 版本制定的六个月发布节奏。


    多年来，Java 特性的提议、实现和跟踪方式是通过 JDK 增强提案（**JEP**）。JEP 代表单个提案，但可以根据其范围进行分类，并归入 Java *项目*。这些项目的命名相当随意。以下列表列出了本书中介绍的大多数特性所属的最重要项目：


    *   **Amber** 专注于 Java 语言特性和新语法。

    *   **Babylon** 专注于将 Java 的应用范围扩展到外部编程模型，例如 SQL 和机器学习。

    *   **Panama** 专注于改进和丰富 Java 虚拟机与定义明确但*外部*（非 Java）API 之间的连接，包括许多 C 程序员常用的接口。

    *   **Leyden** 专注于改进 Java 程序的启动时间、达到峰值性能的时间和内存占用。

    *   **Loom** 专注于探索和孵化 Java VM 特性以及基于这些特性构建的 API，用于实现轻量级用户模式线程（纤程）。

    *   **Valhalla** 专注于对 Java 对象模型进行底层改进，以更高效地使用内存。

    *   **ZGC** 专注于开发和改进可扩展的低延迟垃圾收集器，能够处理大小从 8MB 到 16TB 的堆，最大暂停时间低于毫秒。

    *   **VisualVM** 继续开发用于监控 Java 应用程序的 VisualVM 工具。


    `JDK 21` 的特性列表更长，因为它是一个 LTS 版本，并且包含了许多已经成熟并极大改进了 JDK 的特性。以下列表列出了 `JDK 21` 最重要的成熟特性和预览特性；完整列表请查看官方页面。


    *   **虚拟线程** 实现现已准备就绪，涵盖于**第 [5] 章**。

    *   **分代 ZGC** 也是如此，涵盖于**第 [13] 章**。

    *   **记录模式** 也已最终确定，涵盖于**第 [4] 章**。

    *   `switch` 表达式的**模式匹配**，最终实现，涵盖于**第 [4] 章**。

    *   **有序集合**。从一开始，Java 的集合框架就缺少一种表示具有定义相遇顺序的元素序列的集合类型。它也缺少一组适用于此类集合的统一操作。现在，通过引入
    `SequencedCollection<E>` 和 `SequencedSet<E>` 接口，这个问题已经得到解决。

    *   **分代 ZGC**。最初，`ZGC` 是非分代的。在此版本中，分代 `ZGC` 为年轻对象（最近分配的对象）和老对象（长期存活的对象）维护独立的分代。两代独立收集，专注于快速收集年轻对象。这使得
    `ZGC` 能够更频繁地收集年轻对象（这些对象往往存活时间短）。

    *   **未命名模式和变量**（预览），即 `_`（下划线）的回归。下划线在 `JDK 8` 之前得到支持，在 Java 9 中被移除，最终将在 `JDK
    21` 之后的版本中重新引入，其用途类似于 GoLang（Go 编程语言）中的下划线，涵盖于**第 [4] 章**。

    *   **未命名类和实例 Main 方法**（预览）。作为 `JShell` 的替代方案，此特性引入了 Java 语言的演进版本，使学生无需理解为大型程序设计的语言特性即可编写他们的第一个程序。这意味着能够直接运行
    Java 代码而无需编译。这对于跨越多行的 Java 代码片段更为实用，这些代码不太适合 `JShell`，涵盖于**第 [3] 章**。

    *   **结构化并发**，首次预览，涵盖于**第 [5] 章**。


    ### Java 22


    `JDK 22`，^([^(24)](#fn24)) 于 2024 年 3 月 21 日发布，是另一个短期版本，专注于更新先前版本中引入的预览和孵化器特性：


    *   **未命名变量和模式**，涵盖于**第 [4] 章**。

    *   **外部函数与内存 API**。

    *   `super(…)` 之前的语句，首次预览，涵盖于**第 [4] 章**。

    *   **类文件 API**，首次预览。在底层，这是一个非常重要的变化，它将允许项目使用旧版 Java 编译的依赖项，只要它们使用相同的类文件 API。

    *   **启动多文件源代码程序**，首次预览。Java 应用程序启动器得到增强，能够运行由多个 Java 源代码文件提供的程序。对于小型应用程序，这使得可以跳过使用构建工具，涵盖于**第
    [2] 章**。

    *   **流收集器**，首次预览。对 `Stream` API 的增强，以支持自定义中间操作，涵盖于**第 [8] 章**。

    *   **隐式声明的类和实例 Main 方法**，第二次预览。此特性是一项增强，旨在允许学生为单类程序编写简化的声明，然后随着技能的增长无缝扩展其程序以使用更高级的特性，涵盖于**第
    [2] 章**。它是 Java 21 中“未命名类和实例 Main 方法”的扩展。

    *   **结构化并发**，第二次预览，涵盖于**第 [5] 章**。


    ### Java 23


    `JDK 23`，^([^(25)](#fn25)) 于 2024 年 9 月 17 日发布，是另一个短期版本，专注于更新先前版本中引入的预览和孵化器特性。本书旨在向您介绍截至此版本最有趣的特性，即使它们仍处于预览阶段。


    此版本中最有趣的特性包括：


    *   `instanceof` 和 `switch` 中的**原始类型模式**，首次预览，涵盖于**第 [6] 章**。

    *   **Markdown 文档注释**，涵盖于**第 [9] 章**。

    *   **流收集器**，第二次预览，涵盖于**第 [8] 章**。

    *   **ZGC：默认启用分代模式**，涵盖于**第 [13] 章**。

    *   **模块导入声明**，首次预览，涵盖于**附录 A** 的“高级模块配置”部分。

    *   **隐式声明的类和实例 Main 方法**，第三次预览，涵盖于**第 [2] 章**。

    *   **类文件 API**，第二次预览。再次强调，在底层，这是一个非常重要的变化，它将允许项目使用旧版 Java 编译的依赖项，只要它们使用相同的类文件
    API。

    *   **结构化并发**，第三次预览，涵盖于**第 [5] 章**。

    *   **灵活的构造器体**，允许在 `super(..)` 调用之前使用语句的特性第二次预览，涵盖于**第 [4] 章**。


    细节到此为止。如果您想了解 Java 编程语言前 25 年的更多信息，可以轻松地在互联网上找到^([^(26)](#fn26))。'
  raw: '### Java 21


    JDK 21,^([^(23)](#fn23)) the next **Long-Term Support** (LTS) release, will be
    supported by Oracle for eight years. It was released on September 19, 2023, as
    per Oracle’s six-month release cadence for Java SE versions.


    Over the years, the way Java features were proposed, implemented, and tracked
    was via JDK Enhancement Proposals (**JEPs**). JEPs represent individual proposals,
    but they can be categorized based on their scope and grouped in Java *projects*.
    These projects are named rather randomly. The following list depicts the most
    important projects that group most of the features introduced in this book:


    *   **Amber** is focused on Java language features and new syntax.


    *   **Babylon** is focused on extending the reach of Java to foreign programming
    models, such as SQL and machine learning.


    *   **Panama** is focused on improving and enriching the connections between the
    Java Virtual Machine and well-defined but *foreign* (non-Java) APIs, including
    many interfaces commonly used by C programmers.


    *   **Leyden** is focused on improvement of the startup time, time to peak performance,
    and footprint of Java programs.


    *   **Loom** is focused on exploring and incubating Java VM features and APIs
    built on top of them for the implementation of lightweight user-mode threads (fibers).


    *   **Valhalla** is focused on under-the-hood improvements of the Java object
    model to use memory less efficiently.


    *   **ZGC** is focused on the development and improvement of a scalable low-latency
    garbage collector capable of handling heaps ranging from 8MB to 16TB in size,
    with submillisecond max pause times.


    *   **VisualVM** continues the development of the VisualVM tool for monitoring
    Java applications.


    The list of features for JDK 21 is longer because it is an LTS version and contains
    quite a few features that have reached maturity and improve the JDK a lot. The
    following list identifies the most important mature and preview features of JDK
    21; for the full list, check the official page.


    *   **Virtual Threads** implementation is now ready for use, covered in **Chapter**
    [**5**](#463938_3_En_5_Chapter.xhtml).


    *   So is the **Generational ZGC**, covered in **Chapter** [**13**](#463938_3_En_13_Chapter.xhtml).


    *   Record Patterns are final too, covered in **Chapter** [**4**](#463938_3_En_4_Chapter.xhtml).


    *   Pattern Matching for `switch` expressions, final implementation, covered in
    **Chapter** [**4**](#463938_3_En_4_Chapter.xhtml).


    *   **Sequenced Collections**. Since the beginning, Java’s collections framework
    has lacked a collection type that represents a sequence of elements with a defined
    encounter order. It also has lacked a uniform set of operations that apply across
    such collections. This now has been resolved by the introduction of the `SequencedCollection<E>`
    and `SequencedSet<E>` interfaces.


    *   **Generational ZGC**. Initially ZGC was nongenerational. With this release,
    the Generational ZGC maintains separate generations for young objects (recently
    allocated objects) and old objects (long-lived objects). Both generations are
    collected independently, focusing on quickly collecting younger objects. This
    allows ZGC to collect young objects—which tend to die young—more frequently.


    *   **Unnamed Patterns and Variables** (preview), or the return of the `_` (underscore).
    The underscore was supported up to JDK 8, removed in Java 9, and it will finally
    be reintroduced in a version after JDK 21, for purposes similar to the ones in
    GoLang (The Go programming language), covered in **Chapter** [**4**](#463938_3_En_4_Chapter.xhtml).


    *   **Unnamed Classes and Instance Main Methods** (Preview). An alternative to
    JShell, this feature introduces an evolved version of the Java language, so that
    students can write their first programs without needing to understand language
    features designed for large programs. This means the ability to run Java code
    directly without the need to compile it. This is more practical for bits of Java
    code that span multiple lines, which are not that suitable for JShell, covered
    in **Chapter** [**3**](#463938_3_En_3_Chapter.xhtml).


    *   **Structured Concurrency**, first preview, covered in **Chapter** [**5**](#463938_3_En_5_Chapter.xhtml).


    ### Java 22


    JDK 22,^([^(24)](#fn24)) released on March 21, 2024, is another short-term release
    that focuses on updates of previews and incubator features introduced in previous
    releases:


    *   Unnamed Variables & Patterns, covered in **Chapter** [**4**](#463938_3_En_4_Chapter.xhtml).


    *   Foreign Function & Memory API.


    *   Statements before super (…), first preview, covered in **Chapter** [**4**](#463938_3_En_4_Chapter.xhtml).


    *   **Class-File API**, first preview. Under the hood, this is a very important
    change that will allow a project to use dependencies compiled with older versions
    of Java, as long as they use the same Class-File API.


    *   **Launch Multi-File Source-Code Programs**, first preview. The Java application
    launcher is enhanced to be able to run a program supplied as multiple files of
    Java source code. For tiny applications, this makes it possible to skip using
    a build tool, covered in **Chapter** [**2**](#463938_3_En_2_Chapter.xhtml).


    *   **Stream Gatherers**, first preview. Enhancements of the Stream API to support
    custom intermediate operations, covered in **Chapter** [**8**](#463938_3_En_8_Chapter.xhtml).


    *   **Implicitly Declared Classes and Instance Main Methods**, second preview.
    This feature is an enhancement designed to allow students to write streamlined
    declarations for single-class programs and then seamlessly expand their programs
    to use more advanced features as their skills grow, covered in **Chapter** [**2**](#463938_3_En_2_Chapter.xhtml).
    It is the extension of “Unnamed Classes and Instance Main Methods” form Java 21.


    *   **Structured Concurrency**, second preview, covered in **Chapter** [**5**](#463938_3_En_5_Chapter.xhtml)


    ### Java 23


    JDK 23,^([^(25)](#fn25)) released on September 17, 2024, is another short-term
    release that focuses on updates of preview and incubator features introduced in
    previous releases. This book aims to introduce you to the most interesting features
    up to this release, even if they are still in preview.


    The most interesting features in this release are


    *   Primitive Types in Patterns, `instanceof`, and `switch`, first preview, covered
    in **Chapter** [**6**](#463938_3_En_6_Chapter.xhtml).


    *   **Markdown Documentation Comments**, covered in **Chapter** [**9**](#463938_3_En_9_Chapter.xhtml).


    *   **Stream Gatherers**, second preview, covered in **Chapter** [**8**](#463938_3_En_8_Chapter.xhtml).


    *   **ZGC: Generational Mode by Default**, covered in **Chapter** [**13**](#463938_3_En_13_Chapter.xhtml).


    *   **Module Import Declarations**, first preview, covered in **Appendix A** in
    the “Advanced Module Configurations” section.


    *   **Implicitly Declared Classes and Instance Main Methods**, third preview,
    covered in **Chapter** [**2**](#463938_3_En_2_Chapter.xhtml).


    *   **Class-File API**, second preview. Again, under the hood, this is a very
    important change that will allow a project to use dependencies compiled with older
    version of Java, as long as they use the same class-file API.


    *   **Structured Concurrency**, third preview, covered in **Chapter** [**5**](#463938_3_En_5_Chapter.xhtml).


    *   **Flexible Constructor Bodies**, second preview of the feature allowing statements
    before `super(..)` invocations, covered in **Chapter** [**4**](#463938_3_En_4_Chapter.xhtml).


    And this is where the details end. If you want more information on the first 25
    years of the Java programming language, you can easily find it on the Internet^([^(26)](#fn26)).'
