    `import java.util.List``;` 语句是唯一可以存在于包声明和类声明之间的语句类型。这条语句告诉 Java 编译器，程序中将会使用一个对象类型
    `java.util.List`。`import` 关键字后面跟着该类型的完全限定名。一个类型的完全限定名由包名（`java.util`）、一个点（`.`）和类型的简单名称（`List`）组成。没有它，`HelloWorld`
    类将无法编译。尝试在该语句前面加上 `//`——这会将这一行变成注释，编译器会忽略它。您会看到编辑器通过将与那个列表相关的任何代码片段变成亮红色来表示报错。


    语句 `List<String> items = List.of("1", "a", "2", "a", "3", "a");` 创建了一个文本值的列表。这种创建列表的方式是在
    Java 9 中引入的。使用 `<E>` 来指定列表中元素的类型是在 Java 5 中引入的，这被称为**泛型**。然后，列表中的元素通过 `forEach`
    方法进行遍历，并测试每个元素是否等于字符“*a*”。用于执行此操作的整个表达式被称为 **lambda 表达式**，这种语法是在 Java 8 中与 `forEach`
    方法一起引入的。


    如果您现在运行这个类，在控制台中您应该会看到一系列 *A* 和 *Not A* 被打印出来，每个占一行，如清单 3-27 所示。


