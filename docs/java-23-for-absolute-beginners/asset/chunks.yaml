    \ the editor of your choice. This book is focused of the Java language mostly,\
    \ and this section is just added here for convenience.\n\nTo use the Java Stream\
    \ Debugger, you must place a breakpoint on the line where a stream processing\
    \ chain is defined. In Figure [8-4](#463938_3_En_8_Chapter.xhtml#Fig4) you can\
    \ see a piece of code representing the processing of a stream of `Song` instances\
    \ being executed in debug mode and a breakpoint pausing the execution in line\
    \ 44\\. When the execution is paused, you can open the stream debugger view by\
    \ clicking the button with three vertical points (in the toolbar at the top of\
    \ the Debug window) and selecting **Trace Current Stream Chain** from the menu\
    \ that opens.\n\n![](images/463938_3_En_8_Chapter/463938_3_En_8_Fig4_HTML.jpg)\n\
    \nFigure 8-4\n\nStarting the Java Stream Debugger\n\nA popup window will appear\
    \ that has a tab for each operation of the stream processing. In Figure [8-5](#463938_3_En_8_Chapter.xhtml#Fig5)\
    \ you can see the tabs and their methods underlined and linked to each other.\n\
    \n![](images/463938_3_En_8_Chapter/463938_3_En_8_Fig5_HTML.jpg)\n\nFigure 8-5\n\
    \nThe Java Stream Debugger window\n\nIn the operation tabs, the text box on the\
    \ left contains the elements on the original stream. The text box on the right\
    \ contains the resulting stream with its elements. The following images in the\
    \ chapter show tabs for various operations. For operations that reduce the number\
    \ of elements or change their order, there are lines from one set of elements\
    \ to the other. The first `map(..)` method transforms the song titles to their\
    \ uppercase version. The second `map(..)` method transforms the duration of the\
    \ songs in minutes and returns a stream of integers.\n\nThe `distinct(..)` method\
    \ produces a new stream that contains only the distinct elements in the previous\
    \ one, and this operation’s effect is depicted quite nicely in the debugger and\
    \ in Figure [8-6](#463938_3_En_8_Chapter.xhtml#Fig6).\n\n![](images/463938_3_En_8_Chapter/463938_3_En_8_Fig6_HTML.jpg)\n\
    \nFigure 8-6\n\nThe `distinct()` operation in the IntelliJ IDEA Java Stream Debugger\n\
    \nThe next operation is `sorted()`, which sorts the entries on the stream returned\
