- fmt: '### Date/Time API


    Many applications make use of calendar date types to print the current date, deadlines,
    and birthdays. No matter what application you decide to build, you will most likely
    need to use calendar dates. Until Java 8, the main class to model a calendar date
    was `java.util.Date`. There are a few problems with this class and others involved
    in handling calendar dates. But before we get into those problems, take a look
    at Listing [5-33](#463938_3_En_5_Chapter.xhtml#PC59) and check out how we can
    get the current date, create a custom date, and print certain details.


    ```

    package com.apress.bgn.five;

    import java.text.ParseException;

    import java.text.SimpleDateFormat;

    import java.util.Date;

    public class DateDemo {

    public static void main() {

    SimpleDateFormat sdf = new SimpleDateFormat("dd-MM-yyyy");

    Date currentDate = new Date();

    System.out.println("Today: " + sdf.format(currentDate));

    //deprecated since 1.1

    Date johnBirthday = new Date(77, 9, 16);

    System.out.println("John’s Birthday: " + sdf.format(johnBirthday));

    int day = johnBirthday.getDay();

    System.out.println("Day: " + day);

    int month = johnBirthday.getMonth() + 1;

    System.out.println("Month: " + month);

    int year = johnBirthday.getYear();

    System.out.println("Year:" + year");

    try {

    Date johnBirthday2 = sdf.parse("16-10-1977");

    } catch (ParseException e) {

    e.printStackTrace();

    }

    }

    }

    //output

    /*

    Today: 18-05-2024

    John’s Birthday: 16-10-1977

    Day: 0

    Month: 10

    Year: 77

    */

    Listing 5-33

    java.util.Date Code Sample

    ```


    Retrieving the current date on your system is simple; just call the default constructor
    of the `Date` class:


    ```

    Date currentDate = new Date();

    ```


    The contents of `currentDate` can be displayed directly, but usually an instance
    of `java.text.SimpleDateFormat` is used to format the date to a pattern that is
    country specific or just more readable. The formatter can also be used to convert
    a `String` with that specific format into a `Date` instance. Of course, if the
    text does not match the pattern of the formatter, a specific exception will be
    thrown (type `java.text.ParseException`):


    ```

    try {

    Date johnBirthday = sdf.parse("16-10-1977");

    } catch (ParseException e) {

    // do something with the exception

    }

    ```


    To create a `Date` instance from the numbers representing a date (year, month,
    and day), a constructor that takes those values as arguments can be used. That
    constructor, however, has been deprecated since Java 1.1, so some developers prefer
    to use the `sdf.parse(..)` method instead. The constructor has a few particularities
    regarding its arguments:


    *   The year argument must be the year value – 1900.

    *   The months are counted from 0, so the month provided as an argument must be
    the month we want – 1.


    The code to construct a `Date` instance from the numeric values for year, month,
    and day is depicted below:


    ```

    //deprecated since 1.1

    Date johnBirthday = new Date(77, 9, 16);

    System.out.println("John’s Birthday: " + sdf.format(johnBirthday));

    //it prints: John’s Birthday: 16-10-1977

    ```


    If we want to extract the year, month, and day of the month from the date, there
    are methods for that, but again a peculiarity exists: the method to extract the
    day of the month is named `getDate()`. Also keep in mind that since months are
    numbered from 0 to 11, to get the real month value you have to add 1 to the result
    returned by `getMonth()`. Listing [5-34](#463938_3_En_5_Chapter.xhtml#PC63) shows
    the code to create a `Date` instance, extract the day, month, and year, and then
    print them.


    ```

    package com.apress.bgn.five;

    import java.text.ParseException;

    import java.text.SimpleDateFormat;

    import java.util.Date;

    public class PrintDateDemo {

    void main() {

    try {

