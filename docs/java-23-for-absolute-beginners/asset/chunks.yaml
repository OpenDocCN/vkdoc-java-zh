    When you have the file, you can open it and start analyzing its contents, but
    because IntelliJ IDEA might not open such a big file, try to open it with a specialized
    text editor like Notepad++ or Sublime. Or if you use a Unix/Linux operating system,
    just open your console and use the `grep` command like this:


    ```

    grep -a ''seconds'' gc.log

    ```


    This will display all log entries printed when the `finalize()` method is called.
    Then you can select the name of an instance and do something like this:


    ```

    ❯ grep -a ''Fmsnwrtbuldmnjs'' gc.log

    INFO  c.a.b.t.InfiniteSingerGenerator - JVM created: Fmsnwrtbuldmnjs

    INFO  c.a.b.t.Singer - GC Destroyed: Fmsnwrtbuldmnjs after 1 seconds

    ```


    As you can see, the time it takes for a `Singer` instance to be deleted from the
    heap varies, and this is because the GC is called randomly; the developer has
    no control over it. There is a way to explicitly request garbage collection to
    be done…well, two ways. You can call `System.gc()` or `Runtime.getRuntime().gc()`.
    Note that `System.gc()` calls `Runtime.getRuntime().gc()` anyway.


    This doesn’t mean that the GC will immediately start cleaning up the memory, though.
    It is more like a suggestion to the JVM that it should make an effort to recycle
    unused objects and reclaim unused memory, because it is needed.


    Now, back to the `finalize()` method. It was mentioned that it was marked as deprecated
    in Java 9\. This method is meant to be overridden by classes that handle resources
    that are stored outside the heap. The obvious example here is the I/O handling
    classes, used to read resources as files or URLs and databases. The `finalize()`
    method would be called by the JVM when an object can no longer be accessed by
    any living thread of the running application. This is to make sure that those
    resources were released and available for other external and unrelated programs
    to use.


    Info


    In older versions of Apache Tomcat (a Java-based web server), on Windows there
    was a bug related to the release of resources. When the server would crash or
    would be stopped forcefully, it couldn’t be started again because some of its
    log file handlers were not released properly, and the new server instance could
    not get access to them to start writing the new log entries*.(This is an observation
    from my personal experience when working with Apache Tomcat on Windows, from a
    long, long time ago.)*


    With the introduction of the `java.lang.AutoCloseable` interface in JDK 7, the
    `finalize()` method became less and less used. A few problems with this method
    have been mentioned previously, but the following list gives more context:


    *   The JVM cannot guarantee which thread will call this method for any given
    object, so any thread that has access to it can call it, and we might end up with
    resources being released while the object is still necessary. The method is public,
    and thus it can be called explicitly in the code, even if it is supposed to be
    called only by the GC thread.


    *   If the custom implementation of `finalize()` is not correct, it could throw
    exceptions or not release resources properly.


    *   The `finalize()` method should be called only once, by the JVM, but this cannot
    be guaranteed.


    *   `finalize()` calls are not automatically chained, so a custom implementation
    of a `finalize()` method must always explicitly call the `finalize()` method of
    the superclass.


    *   As previously mentioned, once a `finalize()` is called, there is no way to
    stop the method from executing or undo its effect, so you are basically left with
    a reference to an object that no longer exists.


    *   As you have probably figured out by now, there is a lot of freedom given to
    the developer when it comes to implementing this method, and this means there
    is a lot of room for errors to happen.


    This list summarizes why the finalization mechanism in Java is flawed and was
    deprecated in JDK 9 to discourage its use. Improper `finalize()` implementations
    could lead to any of the following:


    *   Memory leaks (memory contents are not discarded)


    *   Deadlocks (resource is blocked by two processes)


    *   Hangs (process is in a waiting state it cannot go out of)


    To help with memory management, the `java.lang.ref.Cleaner` class was introduced
    in Java 9\. Before getting into that, I must show you how to check out the status
    of your memory programmatically.'
