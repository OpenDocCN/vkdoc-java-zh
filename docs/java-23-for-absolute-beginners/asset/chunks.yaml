    ### `while` 语句


    `while` 语句与 `for` 语句的主要区别在于，`while` 语句不需要执行固定次数的步骤，因此并不总是需要计数器。`while` 语句执行的重复次数仅取决于控制该次数的继续条件被评估为
    `true` 的次数。该语句的通用模板如代码清单 7-32 所示。


    ```

    while ([eval(condition)] == true) {

    [code_block]

    }

    代码清单 7-32

    while 语句模板

    ```


    `while` 语句实际上也不需要初始化语句。如果需要，它可以放在 `while` 代码块内部或外部。`while` 语句可以替代 `for` 语句，但 `for`
    语句的优势在于它将初始化、终止条件和计数器的修改封装在一个块中，因此更加简洁。数组遍历的代码示例可以使用 `while` 语句重写，如代码清单 7-33 所示。


    ```

    package com.apress.bgn.seven.whileloop;

    import static java.lang.System.out;

    public class WhileLoopDemo {

    void main(){

    int[] arr = {5, 1, 4, 2, 3};

    int i = 0;

    while(i < arr.length) {

    out.println("arr[" +i +"] = " + arr[i]);

    ++i;

    }

    }

    }

    代码清单 7-33

    使用 while 语句遍历数组

    ```


    如你所见，计数器变量 `int i = 0;` 的声明和初始化是在 `while` 代码块外部完成的。计数器的递增则在需要重复的代码块内部完成。此时，如果我们为此场景设计流程图，它将与图
    7-8 中 `for` 语句的流程图相同。


    听起来可能难以置信，`[condition]` 也不是强制性的，因为它可以直接替换为 `true`，但在这种情况下，你必须确保代码块中存在一个一定会被执行的退出条件；否则，执行很可能会以错误告终，因为
    JVM 不允许无限循环。这个条件必须放在代码块的开头，以防止在不应该执行有用逻辑的情况下执行它。对于我们的简单示例，显然我们不想为索引超出数组范围的元素调用
    `System.out.println`，如代码清单 7-34 所示。


    ```

    package com.apress.bgn.seven.whileloop;

    import static java.lang.System.out;

    public class AnotherWhileLoopDemo {

    void main(){

    int[] arr = {5, 1, 4, 2, 3};

    int i=0;

    while(true){

    if (i >= arr.length) {

    break;

    }

    out.println("arr[" +i +"] = " + arr[i]);

    ++i;

    }

    }

    }

    代码清单 7-34

    使用 while 语句遍历数组，无继续条件

    ```


    当我们处理一个并非始终在线的资源时，最好使用 `while` 语句。假设我们为应用程序使用了一个位于不稳定网络中的远程数据库。与其在第一次超时后就放弃保存数据，不如一直尝试直到成功，对吧？这可以通过使用
    `while` 语句来实现，它会在其代码块中持续尝试初始化一个连接对象。代码大致如代码清单 7-35 所示。


    ```

