- fmt: '在图片的右侧，你可以看到正在请求的`URL`、请求类型（此处为`GET`），以及请求发送到的服务器的**远程地址**。`GET`请求用于从服务器检索某些内容，在此示例中，检索的是一个网页。如果网页可以被找到，服务器会发送响应，其中包含供浏览器显示的页面以及其他属性，例如用于通信一切正常的`状态码`。`HTTP`状态码有很多，但最重要的是`200`码，它表示一切正常。在图[10-14](#463938_3_En_10_Chapter.xhtml#Fig14)中，你可以看到，为了显示该页面，在初始请求得到响应后，还发出了许多额外的请求，并且所有后续请求都成功了，因为服务器返回的状态显示在表格的第一列，且始终是`200`或`204`。


    *   **`PUT`**：此请求类型用于向服务器发送数据以更新现有数据。在企业应用中，`PUT`请求被解释为更新现有对象的请求。该请求包含对象的更新版本以及用于标识该对象的方法。一个成功的`PUT`请求会生成一个状态码为`204`的响应。


    *   **`POST`**：此请求类型用于向服务器发送数据，但指示服务器同时保存这些数据。与`PUT`请求的区别在于，`POST`请求中的数据在服务器上尚不存在。在企业应用中，`POST`请求用于发送凭据以便对用户进行身份验证，或发送将用于创建新对象的数据。当`POST`请求用于发送凭据时，如果用户通过身份验证，响应状态码为`200`；如果用户凭据无效，则状态码为`401`（未授权）。当`POST`请求用于发送要保存的数据时，如果对象创建成功，则返回`201`状态码。


    *   **`DELETE`**：此请求类型用于指示服务器删除数据。如果一切正常，响应码为`200`；如果未成功，则会发送与原因相关的错误码。


    还有一些其他`HTTP`方法用于更复杂的应用程序。如果你想了解更多关于请求方法、状态码以及`HTTP`基础知识的信息，我强烈建议你查看这个教程^([^(97)](#fn97))。现在，让我们回到编写`Java`
    Web 应用程序的话题上。


    如前所述，直到不久前，我们还需要一个服务器来托管 Web 应用程序。但从几年前开始，情况已不再如此。正如为了测试目的而用嵌入式数据库替换数据库以及功能最简的应用程序一样，Web
    服务器也发生了同样的情况。如果你想快速编写一个简单的 Web 应用程序，现在可以选择使用嵌入式服务器，例如`Java 18`中引入的`Simple Web
    Server`、`Eclipse Jetty`或`Apache Tomcat Embedded`。使用嵌入式服务器支持复杂的页面相当困难，但嵌入式服务器通常用于只需要简单`REST
    API`的微服务。接下来的章节将浅谈构建`Java` Web 应用程序。


    ### 简单应用服务器


    `Java 18`通过`JEP 408`^([^(98)](#fn98))引入了`Simple Web Server`，这是一个最小的`HTTP`静态文件服务器。它可以作为命令行工具使用，用于启动一个仅提供静态文件的最小
    Web 服务器；不支持`servlet`和`JSP`页面。它仅通过`HTTP/1.1`提供静态文件服务；不支持动态内容和其他`HTTP`版本。引入它的目的是使`JDK`对初学者开发者更友好。


    `Simple Web Server`的工作方式可以总结如下：


    *   它服务于单个目录层次结构，并且仅通过`HTTP/1.1`提供静态文件服务。

    *   如果请求的资源是一个文件，则提供其内容。

    *   如果目录包含索引文件，则提供索引文件的内容。如果没有，则列出目录的内容。

    *   它仅支持`HEAD`和`GET`请求方法；任何其他请求都会收到`501 - Not Implemented`或`405 - Not Allowed`响应。


    本节将首先向你展示如何使用`jwebserver`命令行工具，然后介绍如何从你的`Java`代码创建和自定义服务器实例。'
  raw: 'In the right part of the image, you can see the URL being requested, the type
    of request (which is GET in this case), and the **Remote address** of the server
    where the request was sent to. GET requests are used to retrieve something from
    the server, in this example, a web page. If the web page can be found, the response
    is sent with the page to be displayed by the browser and other attributes, such
    as a status code to communicate that all went fine. There is a long list of HTTP
    status codes, but the most important one is the 200 code, which means all went
    fine. In Figure [10-14](#463938_3_En_10_Chapter.xhtml#Fig14), you can see that
    to display the page a lot of additional requests are done, after the initial request
    is replied to, and all subsequent requests are successful, because the status
    returned by the server is put in the first column in the table, and it’s always
    200 or 204.


    *   **PUT**: This type of request is used to send data to the server to be used
    to update existing data. In enterprise applications, a PUT request is interpreted
    as a request to update an existing object. The request contains the updated version
    of the object and the means to identify it. A successful PUT request generates
    a response with a status code of 204.


    *   **POST**: This type of request is used to send data to the server, but the
    server is instructed to save data for storage as well. The difference from a PUT
    request is that the data in a POST request does not exist on the server yet. In
    enterprise applications a POST request is used either to send credentials so that
    the user can be authenticated or to send data that will be used to create a new
    object. When a POST request is used to send credentials, the response status code
    is 200 when the user is authenticated and 401 (Unauthorized) when the user credentials
    are not good. When a POST request is used to send data to be saved, the 201 status
    code is returned if the object was created.


    *   **DELETE**: This type of request is used to instruct the server to delete
    data. The response code is 200 when all went okay, and if it did not, an error
    code related to the cause is sent.


    There are a few other HTTP methods that are used in more complex applications.
    If you want to know more about request methods, status codes, and HTTP basics
    overall, I confidently recommend you to look at this tutorial^([^(97)](#fn97)).
    Now let’s get back to writing Java web applications.


    As previously mentioned, until a while ago, we needed a server to host a web application.
    This is no longer the case as of a few years ago. As databases were replaced for
    testing purposes and applications with minimum functionality with embedded databases,
    the same happened to web servers as well. If you want to quickly write a simple
    web application, you now have the option of using an embedded server such as the
    Simple Web Server introduced in Java 18, Eclipse Jetty, or Apache Tomcat Embedded.
    Supporting complex pages with an embedded server is pretty difficult, but embedded
    servers are usually used for microservices that only need simple REST APIs. The
    following sections will scratch the surface on building Java web applications.


    ### Simple Application Server


    Java 18 introduced the Simple Web Server, a minimal HTTP static file server, via
    JEP 408^([^(98)](#fn98)). It can be used as a command-line tool to start a minimal
    web server that serves static files only; servlets and JSP pages are not supported.
    It serves only static files over HTTP/1.1; dynamic content and other HTTP versions
    are not supported. The purpose of its introduction is to make the JDK more approachable
    for beginner developers.


    The way the Simple Web Server works can be summarized as follows:


    *   It serves a single directory hierarchy, and it serves only static files over
    HTTP/1.1


    *   If the requested resource is a file, its content is served.


    *   If the directory contains an index file, the content of the index file is
    served. If not, the contents of the directory are listed.


    *   It supports only the `HEAD` and `GET` request methods; any other requests
    receive either a `501 - Not Implemented` or a `405 - Not Allowed` response.


    This section will show you how to use the `jwebserver` command-line tool first,
    and then how create and customize a server instance from your Java code.'
