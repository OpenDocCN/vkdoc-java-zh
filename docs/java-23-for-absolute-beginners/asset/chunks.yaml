    The bitwise AND operator, represented by `&`, compares two numbers bit by bit.
    If the bits on identical positions have the value of `1`, the bit in the result
    will be `1`. The code sample in Listing [6-31](#463938_3_En_6_Chapter.xhtml#PC41)
    depicts the result of the `&` operator.


