  raw: '## Java IO and NIO APIs


    Before starting to show you how to read or write files, we need to show you how
    to access them from the code, how to check if they exist, check their size and
    list their properties, and so on. The core packages for file handling in Java
    are named `java.io`^([^(103)](#fn103)) and `java.nio`^([^(104)](#fn104)). The
    package names give a pretty good hint about the components they contain:


    *   `java.io` is basically an acronym for Java input/output. This package groups
    together components designed to facilitate input and output operations for accessing
    the file system through data streams and serialization.


    *   `java.nio` is basically an acronym for Java nonblocking input/output. This
    package was introduced in version 1.4 and is a collection of Java programming
    language APIs that offer features for intensive I/O operations. A package named
    `java.nio.file` that was added in JDK 7 contains a collection of utility classes
    providing comprehensive support for file I/O and for accessing the file system.


    The main difference between Java IO and Java NIO is that Java IO is stream oriented,
    whereas Java NIO is buffer oriented. What this means is that with the old Java
    IO API, files are read one or more bytes at a time from a stream. Bytes are not
    cached anywhere and stream traversal is unidirectional. Once the stream is exhausted,
    there is no way to traverse it again. If you need to walk the stream in both directions,
    data must be stored in a buffer first.


    With the Java NIO API, the data is read directly into a buffer, which means bytes
    are cached in a web browser and the browser supports bidirectional operations.
    This gives more flexibility during processing, but extra checks are required to
    make sure the buffer contains all the data needed for processing.


    The second main difference is that Java IO operations are blocking. Once a method
    to read or write a file is called, the thread is blocked until there is no more
    data to read or the data was fully written.


    Java NIO operations are nonblocking. A thread can request data from a resource
    (e.g., a file) via an open channel and only get what is currently available, or
    nothing at all if no data is currently available. Rather than waiting until some
    data is there, the thread can go ahead and do something else, and later check
    if the data buffer was populated.


    The third difference is not so much a difference but something that Java NIO has
    extra: **selectors**. These components allow a thread to monitor multiple input
    channels and select for processing only the ones that have available data. By
    comparison, the classic Java IO API cannot have selectors because a thread blocks
    until a file operation is done.


    Depending on the problem you are trying to solve, you can use one API or the other,
    but it all starts with a **file handler**.


    ## File Handlers


    The most important class when working with files in Java is `java.io.File`, which
    is an abstract representation of a file and directory pathname. Instances of this
    class are named **file handlers** because they allow developers to handle files
    and directories in the Java code using references of this type, instead of complete
    path names. A `File` instance can be created by using different arguments.


    The simplest way to create a `File` instance is to use the constructor that receives
    as an argument a `String` value containing the absolute file pathname. In the
    code sample in Listing [11-1](#463938_3_En_11_Chapter.xhtml#PC1), the `printFileStats(..)`
    method is used to print file details.


    ```

    package com.apress.bgn.eleven;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.io.File;

    public class Main {

    private static final Logger LOGGER = LoggerFactory.getLogger(Main.class);

    void main() {

    // replace [workspace] with your workspace path

    var file = new File("[workspace]/java-23-for-absolute-beginners/README.adoc");

    printFileStats(file);

    }

    private static void printFileStats(File f) {

    if (f.exists()) {

    LOGGER.info("File Details:");

    LOGGER.info("\tName : {}", f.getName());

    LOGGER.info("\tParent :{}", f.getParent());

    LOGGER.info("\tType : {}", f.isFile() ? "file" : "directory or symlink");

    LOGGER.info("\tLocation :{}", f.getAbsolutePath());

    double kilobytes = f.length() / (double)1024;

    LOGGER.info("\tSize : {} ", kilobytes);

    LOGGER.info("\tIs Hidden : {}", f.isHidden());

    LOGGER.info("\tIs Readable? : {}", f.canRead());

    LOGGER.info("\tIs Writable? : {}", f.canWrite());

    } else {

    err.println("File does not exist!");

    }

    }

    }

    Listing 11-1

    Printing File Details

    ```


    The file handler instance in Listing [11-1](#463938_3_En_11_Chapter.xhtml#PC1)
    is created by providing the absolute file pathname on my computer. If you want
    to run the code on your computer, you must provide a pathname to a file on your
    computer (replace `[workspace]` with it in the example). If you are using Windows,
    keep in mind that the pathname contains the `\` (backslash) character that is
    a special character in Java and must be escaped by doubling it, `\\` (see **Chapter
    5** for more details).


    The `printFileStats(..)` method makes use of a lot of methods that can be called
    on a file handler. The full list of methods that you can call is long, and you
    can see them all in the official API documentation.^([^(105)](#fn105)) The methods
    are explained in the following subsections.


    ### `isFile`


    The `isFile()` method returns `true` if the pathname points to a file and returns
    `false` if the pathname points to a directory or a *symlink* (a special type of
    file that exists only for the purpose of linking to another file, which can be
    quite useful when you want to shorten the pathname to a file and incredibly useful
    on Windows where the pathname length limit is 256 characters). In Listing [11-1](#463938_3_En_11_Chapter.xhtml#PC1)
    the method returns `true` and the logger prints


    ```

    INFO  c.a.b.e.Main - Type : file

    ```


    If you want to see if the method works for a directory, just delete the file name
    from the pathname:


    ```

    var file = new File("/[workspace]/java-17-for-absolute-beginners/");

    ```


    The log prints


    ```

    INFO  c.a.b.e.Main - Type : directory or symlink

    ```'
  trans: '

    ## Java IO 与 NIO API


    在开始展示如何读写文件之前，我们需要先展示如何从代码中访问文件、检查文件是否存在、查看文件大小以及列出文件属性等。Java 中用于文件处理的核心包名为 `java.io`^(¹⁰³)
    和 `java.nio`^(¹⁰⁴)。这两个包名很好地暗示了它们所包含的组件：


    *   `java.io` 基本上是 Java 输入/输出（Java input/output）的缩写。该包汇集了旨在通过数据流和序列化来简化文件系统访问的输入输出操作组件。


    *   `java.nio` 基本上是 Java 非阻塞输入/输出（Java nonblocking input/output）的缩写。该包在 1.4 版本中引入，是一组
    Java 编程语言 API 的集合，提供了用于密集型 I/O 操作的功能。JDK 7 中新增的 `java.nio.file` 包包含了一系列实用类，为文件
    I/O 和文件系统访问提供了全面支持。


    Java IO 与 Java NIO 的主要区别在于，Java IO 是面向流的，而 Java NIO 是面向缓冲区的。这意味着，使用旧的 Java IO
    API 时，文件是从流中一次读取一个或多个字节。字节不会在任何地方缓存，并且流的遍历是单向的。一旦流被耗尽，就无法再次遍历它。如果需要双向遍历流，则必须先将数据存储在缓冲区中。


    使用 Java NIO API 时，数据被直接读取到缓冲区中，这意味着字节被缓存在缓冲区中，并且缓冲区支持双向操作。这为处理过程提供了更大的灵活性，但需要额外的检查来确保缓冲区包含处理所需的所有数据。


    第二个主要区别在于，Java IO 操作是阻塞的。一旦调用了读取或写入文件的方法，线程就会被阻塞，直到没有更多数据可读或数据被完全写入。


    Java NIO 操作是非阻塞的。一个线程可以通过一个打开的通道从资源（例如文件）请求数据，并且只获取当前可用的数据，如果当前没有可用数据，则什么也得不到。线程不必等待数据到来，而是可以继续执行其他操作，稍后再检查数据缓冲区是否已被填充。


    第三个区别与其说是区别，不如说是 Java NIO 额外拥有的特性：**选择器**。这些组件允许一个线程监控多个输入通道，并只选择那些有可用数据的通道进行处理。相比之下，经典的
    Java IO API 无法拥有选择器，因为线程会一直阻塞直到文件操作完成。


    根据你要解决的问题，你可以选择使用其中一种 API，但一切都要从**文件处理器**开始。


    ## 文件处理器


    在 Java 中处理文件时最重要的类是 `java.io.File`，它是文件和目录路径名的抽象表示。该类的实例被称为**文件处理器**，因为它们允许开发者在
    Java 代码中使用这种类型的引用来处理文件和目录，而不是使用完整的路径名。可以使用不同的参数来创建 `File` 实例。


    创建 `File` 实例最简单的方法是使用构造函数，该构造函数接收一个包含绝对文件路径名的 `String` 值作为参数。在清单 11-1 的代码示例中，`printFileStats(..)`
    方法用于打印文件详细信息。


    ```

    package com.apress.bgn.eleven;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.io.File;

    public class Main {

    private static final Logger LOGGER = LoggerFactory.getLogger(Main.class);

    void main() {

    // 将 [workspace] 替换为你的工作区路径

    var file = new File("[workspace]/java-23-for-absolute-beginners/README.adoc");

    printFileStats(file);

    }

    private static void printFileStats(File f) {

    if (f.exists()) {

    LOGGER.info("文件详细信息:");

    LOGGER.info("\t 名称 : {}", f.getName());

    LOGGER.info("\t 父目录 :{}", f.getParent());

    LOGGER.info("\t 类型 : {}", f.isFile() ? "文件" : "目录或符号链接");

    LOGGER.info("\t 位置 :{}", f.getAbsolutePath());

    double kilobytes = f.length() / (double)1024;

    LOGGER.info("\t 大小 : {} ", kilobytes);

    LOGGER.info("\t 是否隐藏 : {}", f.isHidden());

    LOGGER.info("\t 是否可读? : {}", f.canRead());

    LOGGER.info("\t 是否可写? : {}", f.canWrite());

    } else {

    err.println("文件不存在!");

    }

    }

    }

    清单 11-1

    打印文件详细信息

    ```


    清单 11-1 中的文件处理器实例是通过提供我电脑上的绝对文件路径名创建的。如果你想在自己的电脑上运行这段代码，必须提供一个指向你电脑上某个文件的路径名（在示例中将
    `[workspace]` 替换为该路径）。如果你使用的是 Windows，请记住路径名中包含 `\`（反斜杠）字符，该字符在 Java 中是特殊字符，必须通过双写
    `\\` 进行转义（更多详情请参见**第 5 章**）。


    `printFileStats(..)` 方法使用了大量可以在文件处理器上调用的方法。可调用的方法列表很长，你可以在官方 API 文档中查看所有方法。^(¹⁰⁵)
    这些方法将在以下小节中进行说明。


    ### `isFile`


    如果路径名指向一个文件，`isFile()` 方法返回 `true`；如果路径名指向一个目录或*符号链接*（一种特殊类型的文件，其存在仅用于链接到另一个文件，当你想要缩短文件的路径名时非常有用，并且在路径名长度限制为
    256 个字符的 Windows 上极其有用），则返回 `false`。在清单 11-1 中，该方法返回 `true`，日志打印如下：


    ```

    INFO  c.a.b.e.Main - 类型 : 文件

    ```


    如果你想查看该方法对目录是否有效，只需从路径名中删除文件名：


    ```

    var file = new File("/[workspace]/java-17-for-absolute-beginners/");

    ```


    日志打印如下：


    ```

    INFO  c.a.b.e.Main - 类型 : 目录或符号链接

    ```

    '
- fmt: '### `getAbsolutePath`


    `getAbsolutePath()`方法返回文件或目录的绝对路径名。创建文件处理器时，并不总是需要绝对路径名，但如果后续需要在代码中使用它，或确保相对路径被正确解析，这个方法正是你所需要的。以下代码通过相对于项目根目录（本例中为`java-17-for-absolute-beginners`目录）的路径，创建了一个指向`resources`目录中文件的处理器：


    ```

    var d = new File("chapter11/read-write-file/src/main/resources/input/");

    ```


    `getAbsolutePath()`方法返回完整路径名，并通过日志语句打印如下：


    ```

    INFO  c.a.b.e.Main - Location :/[workspace]/java-17-for-absolute-beginners/chapter11/read-write-file/src/main/resources/input

    ```


    Java的`File`类功能强大，可用于指向另一台计算机上的共享文件。为此有一个特殊的构造函数，它接收一个`java.net.URI`类型的参数，其中`URI`代表**统一资源标识符**。要测试此构造函数，请选择计算机上的一个文本文件，在Web浏览器中打开它，然后从浏览器地址栏获取其URI。清单[11-2](#463938_3_En_11_Chapter.xhtml#PC7)中的代码展示了使用本地URI实例化`File`类的过程。


    ```

    package com.apress.bgn.eleven;

    import java.net.URI;

    import java.net.URISyntaxException;

    // other imports & wrapper code omitted

    try {

    var localUri = new URI("file:///[workspace]/java-17-for-absolute-beginners/README.adoc");

    var localFile =  new File (localUri);

    printFileStats(localFile);

    } catch (URISyntaxException use) {

    LOGGER.error("Malformed URI, no file there", use);

    }

    Listing 11-2

    Printing File Details using an URI

    ```


    URI可能不正确，例如前缀错误或包含错误路径，因此`URI`构造函数声明会抛出`java.net.URISyntaxException`。这是一个受检异常，因此你编写的代码必须处理它。当使用URI创建文件处理器时，`getAbsolutePath()`方法返回文件所在计算机和驱动器上的绝对路径名。


    > **注意**：`file:///`协议在macOS（及其他操作系统）中用于以URL格式指定文件路径。这允许应用程序和Web浏览器直接从文件系统访问文件。只要将`[workspace]`替换为真实路径，它在Windows上也能正常工作。


    > **信息**：由于清单[11-1](#463938_3_En_11_Chapter.xhtml#PC1)和[11-2](#463938_3_En_11_Chapter.xhtml#PC7)都对同一文件调用了`printFileStats(..)`，因此控制台输出完全相同。欢迎自行尝试运行代码。


    ### `getParent`、`getName`、`length`、`isHidden`、`canRead`和`canWrite`


    由于这些方法各自的内容不多，我将它们归并到本节中。以下是简要总结：


    *   `getParent()`返回包含该文件的目录的绝对路径，因为在层级结构中，文件不能以另一个文件作为父级。

    *   `getName()`返回文件名。文件名包含扩展名（即`"."`之后的部分），用于指示文件类型及其预期用途。

    *   `length()`返回文件的字节长度。此方法不适用于目录，因为目录可能包含对执行程序的用户受限的文件，从而可能抛出异常。因此，如果你需要获取目录的大小，必须自行编写代码。

    *   `isHidden()`如果文件对当前用户不可见则返回`true`，否则返回`false`。在macOS/Linux系统中，以`"."`开头的文件是隐藏的，因此如果我们希望该方法返回`true`，必须创建一个指向系统配置文件（如`.gitconfig`）的处理器。因此，对使用隐藏文件路径名创建的文件处理器调用`printFileStats(..)`方法，将产生类似于清单[11-3](#463938_3_En_11_Chapter.xhtml#PC8)的输出。

    *   `canRead()`和`canWrite()`含义明确，因为文件可能对普通用户设置了安全限制。当用户对文件具有特定权限时，这两个方法返回`true`，否则返回`false`。


    ```

    INFO  c.a.b.e.Main - File Details:

    INFO  c.a.b.e.Main - Type : file

    INFO  c.a.b.e.Main - Location :/Users/[userDir]/.gitconfig

    INFO  c.a.b.e.Main - Parent :/Users/[userDir]

    INFO  c.a.b.e.Main - Name : .gitconfig

    INFO  c.a.b.e.Main - Size : 3.865234375

    INFO  c.a.b.e.Main - Is Hidden : true

    INFO  c.a.b.e.Main - Is Readable? : true

    INFO  c.a.b.e.Main - Is Writable? : true

    Listing 11-3

    Printing File Details for a Hidden File

    ```


    ### 处理目录：`list()`和`listFiles()`


    可以为指向目录的路径名创建文件处理器，这意味着存在仅适用于目录的方法。对目录最常见的操作是列出其内容。`list()`方法返回一个`String`数组，包含该目录下的文件（和目录）名称。使用lambda表达式可以非常实用地打印目录中的项目：


    ```

    var d = new File("/[workspace]/java-17-for-absolute-beginners");

    Arrays.stream(Objects.requireNonNull(d.list())).forEach(ff -> LOGGER.info("\t
    File Name : {}", ff));

    ```


    在大多数情况下，文件名并不是很有用；拥有一个包含每个文件处理器的`File`数组会更好。这就是为什么在1.2版本中添加了`listFiles()`方法：


    ```

    Arrays.stream(Objects.requireNonNull(d.listFiles())).forEach(ff -> LOGGER.info("\t
    File : {}", ff.getAbsolutePath()));

    ```


    此方法有多个重载形式，因为它可以与`FileFilter`实例一起使用，以过滤文件，仅返回符合特定条件的文件或目录的处理器。清单[11-4](#463938_3_En_11_Chapter.xhtml#PC11)中的代码示例过滤了目录下的条目，仅保留名称以`chapter`开头的目录。


    ```

    package com.apress.bgn.eleven.io;

    import java.io.File;

    import java.io.FileFilter;

    // other imports and wrapper code omitted

    var d = new File("/[workspace]/java-17-for-absolute-beginners");

    Arrays.stream(d.listFiles(new FileFilter() {

    @Override

    public boolean accept(File childFile) {

    return childFile.isDirectory() && childFile.getName().startsWith("chapter");

    }

    })).forEach(ff -> LOGGER.info("Chapter Source : {}", ff.getName()));

    Listing 11-4

    Filtering Content of a Directory Using a FileFilter Instance

    ```


    清单[11-4](#463938_3_En_11_Chapter.xhtml#PC11)以展开形式编写，以明确你需要为`accept(..)`方法提供具体实现。通过使用如下lambda表达式，之前的代码可以简化，甚至更不容易抛出异常：


    ```

    Arrays.stream(

    Objects.requireNonNull(d.listFiles(

    childFile -> childFile.isDirectory() && childFile.getName().startsWith("chapter")))

    ).forEach(ff -> LOGGER.info("Chapter Source : {}", ff.getName())

    );

    ```


    在清单[11-4](#463938_3_En_11_Chapter.xhtml#PC11)中，我们实现了`accept(..)`方法来按文件类型和名称进行过滤，但过滤器可以涉及任何条件。当你需要的过滤器严格涉及文件名时，可以使用该方法的另一个版本，它接收一个`FilenameFilter`实例作为参数：


    ```

    Arrays.stream(Objects.requireNonNull(d.listFiles(new FilenameFilter() {

    @Override

    public boolean accept(File dir, String name) {

    return name.startsWith("chapter");

    }

    }))).forEach(ff -> LOGGER.info("\t Chapter directory : {}", ff.getAbsolutePath()));

    ```'
  raw: '### `getAbsolutePath`


    The `getAbsolutePath()` method returns the absolute pathname to a file or a directory.
    When creating a file handler, the absolute pathname is not always needed, but
    if you need to use it later in the code or make sure the relative path was resolved
    correctly, this method is just what you need. The following piece of code creates
    a file handler to a file in the `resources` directory, by using the path relative
    to the root project directory (in our case the `java-17-for-absolute-beginners`
    directory):


    ```

    var d = new File("chapter11/read-write-file/src/main/resources/input/");

    ```


    The `getAbsolutePath()` method returns the full pathname, which is printed by
    the log statement as


    ```

    INFO  c.a.b.e.Main - Location :/[workspace]/java-17-for-absolute-beginners/chapter11/read-write-file/src/main/resources/input

    ```


    The Java `File` class is quite powerful; it can be used to point to a shared file
    on another computer. There is a special constructor for that which receives an
    argument of type `java.net.URI`, where `URI` stands for **Uniform Resource Identifier**.
    To test this constructor, select a text file on your computer and open it in a
    web browser so that you can get its URI from the browser address bar. The code
    in Listing [11-2](#463938_3_En_11_Chapter.xhtml#PC7) depicts the `File` class
    being instantiated using a local URI.


    ```

    package com.apress.bgn.eleven;

    import java.net.URI;

    import java.net.URISyntaxException;

    // other imports & wrapper code omitted

    try {

    var localUri = new URI("file:///[workspace]/java-17-for-absolute-beginners/README.adoc");

    var localFile =  new File (localUri);

    printFileStats(localFile);

    } catch (URISyntaxException use) {

    LOGGER.error("Malformed URI, no file there", use);

    }

    Listing 11-2

    Printing File Details using an URI

    ```


    The URI might be incorrect, as in having an incorrect prefix or containing a wrong
    path, so the URI constructor is declared to throw a `java.net.URISyntaxException`.
    This is a checked exception, so the code you write must handle it. In the case
    of a URI being used to create a file handler, the `getAbsolutePath()` method returns
    the absolute pathname of the file on the computer and drive where the file is
    located.


    Caution


    The `file:///` protocol is used in macOS (and other operating systems) to specify
    a file path in a URL format. This allows applications and web browsers to access
    files directly from the file system. It will work on Windows as well, as long
    as you replace `[workspace]` with a real path.


    Info


    Since both Listing [11-1](#463938_3_En_11_Chapter.xhtml#PC1) and [11-2](#463938_3_En_11_Chapter.xhtml#PC7)
    call `printFileStats(..)` on the same file, the console output is identical. Feel
    free to try running the code yourself.


    ### `getParent`, `getName`, `length`, `isHidden`, `canRead`, and `canWrite`


    Since there is not much to say about each of these method, I grouped them together
    in this section. Here’s the brief summary:


    *   `getParent()` returns the absolute path to the directory containing the file,
    because hierarchically, a file cannot have another file as a parent.


    *   `getName()` returns the file name. The file name contains the extension as
    the suffix after `"."` is called, which is used to indicate they type of file
    and what it is intended to be used for.


    *   `length()` returns the length of the file in bytes. This method does not work
    for directories, as directories can contain files restricted to the user executing
    the program and exceptions might be thrown. So if you ever need the size of a
    directory, you have to write the code yourself.


    *   `isHidden()` returns `true` if the file is not visible to the current user,
    and returns `false` otherwise. On a macOS/Linux system, files with names starting
    with `"."` are hidden, so if we want to see that method returning `true` we have
    to create a handler to one of the system configuration files, such as `.gitconfig`.
    So calling the `printFileStats(..)` method on a file handler created using a pathname
    to a hidden file results in output similar to the output in Listing [11-3](#463938_3_En_11_Chapter.xhtml#PC8).


    *   `canRead()` and `canWrite()` are obvious, as files can be secured from normal
    users. Both methods return `true` when the user has the specific right on the
    file and return `false` otherwise.


    ```

    INFO  c.a.b.e.Main - File Details:

    INFO  c.a.b.e.Main - Type : file

    INFO  c.a.b.e.Main - Location :/Users/[userDir]/.gitconfig

    INFO  c.a.b.e.Main - Parent :/Users/[userDir]

    INFO  c.a.b.e.Main - Name : .gitconfig

    INFO  c.a.b.e.Main - Size : 3.865234375

    INFO  c.a.b.e.Main - Is Hidden : true

    INFO  c.a.b.e.Main - Is Readable? : true

    INFO  c.a.b.e.Main - Is Writable? : true

    Listing 11-3

    Printing File Details for a Hidden File

    ```


    ### Handling Directories: `list()` and `listFiles()`


    File handlers can be created for pathnames pointing to directories, which means
    there are available methods to call that are specific only to directories. The
    most common thing to do with a directory is to list its contents. The `list()`
    method returns a `String` array containing the names of the files (and directories)
    under this directory. Using lambda expressions makes printing the items in a directory
    pretty practical:


    ```

    var d = new File("/[workspace]/java-17-for-absolute-beginners");

    Arrays.stream(Objects.requireNonNull(d.list())).forEach(ff -> LOGGER.info("\t
    File Name : {}", ff));

    ```


    Files names are not really useful in most cases; having a `File` array with file
    handlers to each of them would be better. That is why `listFiles()` method was
    added in version 1.2:


    ```

    Arrays.stream(Objects.requireNonNull(d.listFiles())).forEach(ff -> LOGGER.info("\t
    File : {}", ff.getAbsolutePath()));

    ```


    This method has more than one form, because it can be used to filter the files
    and return file handlers only for files or directories matching a certain requirement
    when called with an instance of `FileFilter`. The code sample in Listing [11-4](#463938_3_En_11_Chapter.xhtml#PC11)
    filters the entries under the directories and keeps only the directories with
    names that start with `chapter`.


    ```

    package com.apress.bgn.eleven.io;

    import java.io.File;

    import java.io.FileFilter;

    // other imports and wrapper code omitted

    var d = new File("/[workspace]/java-17-for-absolute-beginners");

    Arrays.stream(d.listFiles(new FileFilter() {

    @Override

    public boolean accept(File childFile) {

    return childFile.isDirectory() && childFile.getName().startsWith("chapter");

    }

    })).forEach(ff -> LOGGER.info("Chapter Source : {}", ff.getName()));

    Listing 11-4

    Filtering Content of a Directory Using a FileFilter Instance

    ```


    Listing [11-4](#463938_3_En_11_Chapter.xhtml#PC11) is written in expanded form
    to make it obvious that you should provide a concrete implementation for the `accept(..)`
    method. By using lambda expressions as follows, the previous code can be simplified
    and even made less prone to exceptions being thrown:


    ```

    Arrays.stream(

    Objects.requireNonNull(d.listFiles(

    childFile -> childFile.isDirectory() && childFile.getName().startsWith("chapter")))

    ).forEach(ff -> LOGGER.info("Chapter Source : {}", ff.getName())

    );

    ```


    In Listing [11-4](#463938_3_En_11_Chapter.xhtml#PC11) we implemented the `accept(..)`
    method to filter by file type and name, but the filter can involve anything. When
    the filter you need strictly involves the file name, you can use the other version
    of the method, which receives a `FilenameFilter` instance as argument:


    ```

    Arrays.stream(Objects.requireNonNull(d.listFiles(new FilenameFilter() {

    @Override

    public boolean accept(File dir, String name) {

    return name.startsWith("chapter");

    }

    }))).forEach(ff -> LOGGER.info("\t Chapter directory : {}", ff.getAbsolutePath()));

    ```'
