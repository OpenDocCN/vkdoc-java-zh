    The data printed for these GCs has common elements, such as the initial size of
    heap, which will always be 512M at the start of the application and has a maximum
    size of 8GB **on my computer**. The eden and the young generation differ between
    them as well, the G1GC using just 4096K for the young generation, whereas the
    ParallelGC requires 153088K (a lot more).


    The most interesting here is the Epsilon garbage collector because, as expected,
    it does not have a heap split into generation areas, as this type of garbage collector
    does not perform garbage collection at all. **TLAB** is an acronym for **Thread
    Local Allocation Buffer**, which is a memory area where objects are stored. Only
    bigger objects are stored outside of TLABs. The TLABs are dynamically resized
    during the execution for each thread individually. So, if a thread allocates very
    much memory, the new TLABs that it gets from the heap will increase in size. The
    minimum size of a TLAB can be controlled using the VM `-XX:MinTLABSize` option.


    For the small empty class that we ran with the previous VM options, this output
    is not really relevant. However, you can play with these options when running
    the code presented in the next sections, because that is when the statistics printed
    here have some relevance.


    Also, there is a VM option named `-XX:+PrintCommandLineFlags` that can be used
    when a class is run to depict configurations of the garbage collector, as the
    number of threads it makes use of, heap size, and so on. These options are shown
    in Listing [13-7](#463938_3_En_13_Chapter.xhtml#PC8).


    ```

    -XX:ConcGCThreads=3

    -XX:G1ConcRefinementThreads=13

    -XX:InitialHeapSize=536870912

    -XX:MarkStackSize=4194304

    -XX:MaxHeapSize=8589934592

    -XX:MinHeapSize=6815736

    -XX:+PrintCommandLineFlags

    -XX:ReservedCodeCacheSize=251658240

    -XX:+SegmentedCodeCache

    -XX:+UseCompressedOops

    -XX:+UseG1GC

    Listing 13-7

    G1GC VM Options

    ```


    Most of these VM options have obvious names that allow developers to infer what
    they are used for; for those that do not have obvious names, the official documentation
    from Oracle provides the answers. If you ever need to dissect the Oracle memory
    management, there are quite a few good official Oracle articles about this topic^([(130)](#fn130)).


    ## Working with Garbage Collection from the Code


    For most applications, garbage collection is not something a developer must really
    consider. The JVM starts a GC thread from time to time, which does its job usually
    without hindering the execution of the application. For developers who want to
    have more than Java basic skills, understanding how the Java garbage collection
    works and how it can be tuned is a must. The first thing a developer must accept
    about Java garbage collection is that it cannot be controlled at runtime. As you
    will see in the next section, there is a way to suggest to the JVM that some memory
    cleaning is necessary, but there is no guarantee that a memory cleaning will actually
    be performed. The only thing that can be done from the code is to configure some
    code to be run when an object is discarded.'
