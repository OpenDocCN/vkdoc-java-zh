    这些方法不属于特定Java接口的一部分，因此在此上下文中实现它们仅意味着在您希望使其可序列化的类中为它们编写方法体。它们被归入清单[11-33](#463938_3_En_11_Chapter.xhtml#PC58)是为了展示这些方法的签名。


    `writeObject(..)`方法用于写入对象的状态，以便`readObject(..)`方法可以恢复它。`readObjectNoData()`方法用于在反序列化操作因某种原因失败时初始化对象的状态，因此该方法在出现问题（例如，流不完整、客户端应用程序无法识别反序列化的类等）时提供默认状态。如果您是乐观主义者，此方法并非强制要求。


    此外，在使类可序列化时，必须添加一个`long`类型的静态字段作为类的唯一标识符，以确保发送对象作为字节流的应用程序和接收它的客户端应用程序具有相同的已加载类。如果接收字节流的应用程序具有不同标识符的类，则会抛出`java.io.InvalidClassException`。发生这种情况时，意味着应用程序未更新，或者您甚至可能怀疑黑客的恶意行为。该字段必须命名为`serialVersionUID`，如果开发者未显式添加，序列化运行时将自动生成。清单[11-34](#463938_3_En_11_Chapter.xhtml#PC59)中的代码片段展示了一个名为`Singer`的类，其中包含清单[11-33](#463938_3_En_11_Chapter.xhtml#PC58)代码片段中所示的序列化和反序列化方法。


