    import java.util.Set;\nimport static java.lang.System.out;\npublic class SetDemo\
    \ {\nvoid main() {\n// same as Listing 5-42\n}\n}\nrecord Ball(int diameter, String\
    \ colour, String material) {}\n// output\n//Set size: 2\n//Duplicate ball not\
    \ added to the set.\n//Set size: 2\nListing 5-43\nClass Ball Written As a Record\
    \ to Avoid Implementing equals(..) and hashCode()\n```\n\nExecuting the code Listing\
    \ [5-43](#463938_3_En_5_Chapter.xhtml#PC78) yields the same result as the code\
    \ in Listing [5-42](#463938_3_En_5_Chapter.xhtml#PC77), thus proving that the\
    \ `equals(..)` method generated by the Java compiler is valid.\n\n`Map<K,V>` implementations\
    \ come with a few differences because they model collections of key/value pairs.\
    \ The simplified hierarchy of map interfaces and classes most used in programming\
    \ is depicted in Figure [5-21](#463938_3_En_5_Chapter.xhtml#Fig21).\n\n![](images/463938_3_En_5_Chapter/463938_3_En_5_Fig21_HTML.jpg)\n\
    \nFigure 5-21\n\nMap hierarchy\n\nThe code in Listing [5-44](#463938_3_En_5_Chapter.xhtml#PC79)\
    \ depicts the creation and initialization of a map that uses keys of type `Ball`\
    \ and values of type `Integer`. You can imagine this map instance to represent\
    \ the number of identical balls in a bucket.\n\n```\npackage com.apress.bgn.five;\n\
    import java.util.HashMap;\nimport java.util.Map;\npublic class MapDemo {\nvoid\
    \ main(String... args) {\nMap ballMap = new HashMap();\nballMap.put(new Ball(2,\
    \ \"RED\", \"rubber\"), 5);\nballMap.put(new Ball(4, \"BLUE\", \"cotton\"), 7);\n\
    for (Map.Entry entry : ballMap.entrySet()) {\nSystem.out.println(entry.getKey()\
    \ + \": \" + entry.getValue());\n}\n}\n}\n//output\n/*\nBall[diameter=2, colour=RED,\
    \ material=rubber]: 5\nBall[diameter=4, colour=BLUE, material=cotton]: 7\n*/\n\
    Listing 5-44\nMap Code Sample\n```\n\nAs you can notice from the `for` loop, you\
    \ can infer that a map is actually a collection of `Map.Entry<K, V>` elements.\
    \ Moving ahead to the Java 1.7 syntax, the declaration of the map becomes simpler\
    \ by applying the `<>` (diamond) operator:\n\n```\nMap ballMap = new HashMap();\n\
    ```\n\nMoving further to Java 1.8, traversal and printing values in a map become\
    \ more practical as well, because of the introduction of the `forEach(..)` method\
    \ and lambda expressions:\n\n```\nballMap.forEach((k,v) -> System.out.println(k\
    \ + \": \" + v));\n```\n\nAnd in Java 9, declaring and populating a map becomes\
    \ easier too:\n\n```\nMap ballMap = Map.of(new Ball(2, \"RED\", \"rubber\"), 5,\
    \ new Ball(4, \"BLUE\", \"cotton\"), 7);\n```\n\nJava 10 adds in `var` to simplify\
    \ the declaration even more:\n\n```\nvar ballMap = Map.of(new Ball(2, \"RED\"\
    , \"rubber\"), 5, new Ball(4, \"BLUE\", \"cotton\"), 7);\n```\n\nAnother thing\
    \ that needs to be mentioned before ending this section is what happens when a\
    \ key/pair value is added to the map and the key already exists. As you probably\
    \ expect, the existing key/pair in the map is overwritten. Before Java 8, writing\
    \ code to prevent this situation when a set of values is lost required checking\
    \ if the key is present, and if not present only then adding the new key-pair,\
    \ as depicted in Listing [5-45](#463938_3_En_5_Chapter.xhtml#PC84).\n\n```\npackage\
    \ com.apress.bgn.five;\nimport java.util.HashMap;\nimport java.util.Map;\npublic\
    \ class MapDemo {\nvoid main(String... args) {\nMap ballMap = new HashMap();\n\
    Ball redBall = new Ball(2, \"RED\", \"rubber\");\nballMap.put( redBall, 5);\n\
    ballMap.put(new Ball(4, \"BLUE\", \"cotton\"), 7);\n//ballMap.put( redBall, 3);\
    \ // this overrides entry \nif(!ballMap.containsKey(redBall)) {\nballMap.put(redBall,\
    \ 3);\n}\nfor (Map.Entry entry : ballMap.entrySet()) {\nSystem.out.println(entry.getKey()\
    \ + \": \" + entry.getValue());\n}\n}\n}\nListing 5-45\nPreventing Key/Pair Overwriting\
    \ Before Java 8\n```\n\nIn Java 8 a practical set of utility methods was added\
    \ to the `Map<K,V>` interface to simplify code written using maps, including the\
    \ method `putIfAbsent(..)` depicted in Listing [5-46](#463938_3_En_5_Chapter.xhtml#PC85),\
    \ which replaces the statement marked in Listing [5-45](#463938_3_En_5_Chapter.xhtml#PC84).\n\
    \n```\npackage com.apress.bgn.five;\nimport java.util.HashMap;\nimport java.util.Map;\n\
    public class MapDemo {\nvoid main(String... args) {\nMap ballMap = new HashMap();\n\
    Ball redBall = new Ball(2, \"RED\", \"rubber\");\nballMap.put( redBall, 5);\n\
    ballMap.put(new Ball(4, \"BLUE\", \"cotton\"), 7);\nballMap.putIfAbsent(redBall,\
    \ 3);\nfor (Map.Entry entry : ballMap.entrySet()) {\nSystem.out.println(entry.getKey()\
    \ + \": \" + entry.getValue());\n}\n}\n}\nListing 5-46\nPreventing Key-Pair Overwriting\
    \ After Java 8\n```"
