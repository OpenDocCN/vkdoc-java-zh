    `java.io.Serializable`接口没有方法或字段，仅用于标记类为可序列化。当对象被序列化时，标识对象类型的信息也会被序列化。大多数Java类都是可序列化的。任何可序列化类的子类默认被视为可序列化。


    如果任何新字段不可序列化，则会抛出`NotSerializableException`类型的异常。包含不可序列化字段的开发者编写的类必须实现`Serializable`接口，并为清单[11-33](#463938_3_En_11_Chapter.xhtml#PC58)中所示的方法提供具体实现。


