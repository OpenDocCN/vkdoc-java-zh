- fmt: '### Creating Streams from Collections


    The code snippet previously presented in Listing [8-2](#463938_3_En_8_Chapter.xhtml#PC2)
    depicts one method of creating a stream from a list. Starting with Java 8, all
    collection interfaces and classes were enriched with default methods that return
    streams. In Listing [8-4](#463938_3_En_8_Chapter.xhtml#PC5), we take a list of
    integers and transform it into a stream by calling the `stream()` method. After
    the stream is created, we traverse it using the `forEach(..)` method to print
    the values in the stream, and the name of the execution thread this code is executed
    on. Why the thread name, you ask? You will see shortly.


    ```

    package com.apress.bgn.eight;

    import java.util.List;

    import static java.lang.System.out;

    public class IntegerStreamDemo {

    void main() {

    List bigList = List.of(50, 10, 250, 100/* ...*/);

    bigList.stream().forEach(i ->

    out.println(Thread.currentThread().getName() +": " + i));

    }

    }

    Listing 8-4

    Creating a Stream of Integer Values from a List of Integers

    ```


    The code in Listing [8-4](#463938_3_En_8_Chapter.xhtml#PC5) creates a stream of
    integer elements. The `Stream<E>` interface exposes a set of methods that each
    `Stream<E>` implementation provides a concrete implementation for. The most used
    is the `forEach(..)` method that iterates over the elements in the stream. The
    `forEach(..)` method requires a parameter of type `java.util.function.Consumer<T>`.


    **Important**


    A **consumer** is what we call in this book an inline implementation of the `java.util.function.Consumer<T>`
    functional interface. This interface declares a unique abstract method that a
    class implementing it has to provide a concrete implementation for. This interface
    is annotated with `@FunctionalInterface` for this same reason. The method is named
    `accept(T t)` and is referred to as a **functional method**. It takes an element
    of type `T` as argument, processes it, and returns nothing (void). For this reason,
    consumer functions are suitable for the end of a functional pipeline.


    This consumer method is called for each element in the stream. The implementing
    class is basically declared inline, by only mentioning the body of the method.
    The JVM does the rest, because of the magic of lambda expressions. Without them,
    you would have to write code like the one in Listing [8-5](#463938_3_En_8_Chapter.xhtml#PC6).


    ```

    package com.apress.bgn.eight;

    import java.util.List;

    import java.util.function.Consumer;

    import static java.lang.System.out;

    public class IntegerStreamDemo {

    void main() {

    List bigList = List.of(50, 10, 250, 100/* ...*/);

    bigList.stream().forEach(

    new Consumer() {

    @Override

    public void accept(Integer i) {

    out.println(STR."\{Thread.currentThread().getName()}: \{i}");

    }

    });

    }

    }

    // output

    /*

    main: 50

    main: 10

    main: 250

    main: 100

    ...

    */

    Listing 8-5

    Expanded Declaration of a Consumer

    ```


    Again, this is the way the code had to be written before lambda expressions were
    introduced in Java 8. When classes implement interfaces this way, inline, using
    a syntax that looks a lot like a constructor call using the interface type, they
    are called **anonymous classes** because they don’t have a name, and they are
    used exactly where declared. Lambda expressions simplified this process a lot,
    but only for interfaces that define one single method, the interfaces named **functional
    interfaces**. These interfaces were annotated with `@FunctionalInterface` annotation
    starting with Java 8. In the previous example the code prints the thread name
    and the value of the element.


    Each number is prefixed with `main`, which means that all integers in the stream
    are processed sequentially by the same thread, the main thread of the application.


    **Tip**


    For practical reasons, for collections there is no need to invoke `stream()` when
    a sequential stream is needed only for traversal, because the `forEach(..)` method
    defined for them does the job just as well. So the preceding code can be reduced
    to this:


    `bigList.forEach(i -> System.out.println(Thread.currentThread().getName() + ":
    " + i));`


    The name of the thread was printed because there is another way to create a stream,
    by calling the `parallelStream()` method. The only difference is that the returned
    stream is a parallel stream. This means that each element of the stream is processed
    on a different thread, which in turn means the implementation of `Consumer<T>`
    must be thread-safe and not contain code that involves instances that are not
    meant to be shared among threads. The code to print the value of a stream element
    does not affect the value of the element returned by the stream, nor other external
    objects, so it is safe to parallelize.


    Listing [8-6](#463938_3_En_8_Chapter.xhtml#PC7) depicts the use of `parallelStream()`
    instead of `stream()` to create a stream and print the elements of the stream
    using the same `Consumer<T>` implementation. The output is depicted at the bottom
    of the snippet.


    ```

    package com.apress.bgn.eight;

    import java.util.List;

    import java.util.function.Consumer;

    import static java.lang.System.out;

    public class IntegerStreamDemo {

    void main() {

    List bigList = List.of(50, 10, 250, 100/* ...*/);

    bigList.parallelStream()

    .forEach(i ->

    out.println(Thread.currentThread().getName() + ": " + i)

    );

    }

    }

    // sample output

    /*

    main: 83

    ForkJoinPool.commonPool-worker-1: 23

    main: 33

    ForkJoinPool.commonPool-worker-1: 45

    ForkJoinPool.commonPool-worker-2: 50

    main: 67...

    */

    Listing 8-6

    Creating a Parallel Stream of Integer Values from a List of Integers

    ```


    The first thing you will notice is the thread name: we no longer have only one,
    but a lot of them all named `ForkJoinPool.commonPool-worker-`. The main thread
    still prints some values, but the other threads do some of the work too, and the
    order (or more like, the disorder) of the printed values makes it clear that the
    threads run in parallel. The threads have similar names that make it obvious that
    they are all part of the same *thread pool*. A thread pool is created by the JVM
    in this case to contain a few thread instances used to process all elements in
    the stream in parallel, and this concept was introduced in **Chapter** [**5**](#463938_3_En_5_Chapter.xhtml).
    The advantage of using a thread pool is that the threads can be reused, so no
    new thread instances need to be created, and this optimizes the execution time
    a little.


    If you look at the number associated to each thread (the number at the end of
    the thread name), you can see that the numbers sometimes repeat. This basically
    means the same thread is reused to process another stream element.


    **Tip**


    Performance improvements when using `parallelStream()` have been and still are
    up for debate in the Java world. For simple examples, creating a thread pool and
    managing the threads is clearly a waste of CPU and memory. So unless you have
    a specific problem that can be resolved more efficiently using parallel execution
    and a fast CPU with multiple cores, you probably won’t need `parallelStream()`.


    **Caution**


    The Stream API is the preferred way to process large data sets in parallel. The
    process is assumed to be a fairly complex function, so virtual threads are not
    supposed to be used for stream parallel processing, since they are lightweight
    threads that process compact simple operations.'
  raw: '### Creating Streams from Collections


    The code snippet previously presented in Listing [8-2](#463938_3_En_8_Chapter.xhtml#PC2)
    depicts one method of creating a stream from a list. Starting with Java 8, all
    collection interfaces and classes were enriched with default methods that return
    streams. In Listing [8-4](#463938_3_En_8_Chapter.xhtml#PC5), we take a list of
    integers and transform it into a stream by calling the `stream()` method. After
    the stream is created, we traverse it using the `forEach(..)` method to print
    the values in the stream, and the name of the execution thread this code is executed
    on. Why the thread name, you ask? You will see shortly.


    ```

    package com.apress.bgn.eight;

    import java.util.List;

    import static java.lang.System.out;

    public class IntegerStreamDemo {

    void main() {

    List bigList = List.of(50, 10, 250, 100/* ...*/);

    bigList.stream().forEach(i ->

    out.println(Thread.currentThread().getName() +": " + i));

    }

    }

    Listing 8-4

    Creating a Stream of Integer Values from a List of Integers

    ```


    The code in Listing [8-4](#463938_3_En_8_Chapter.xhtml#PC5) creates a stream of
    integer elements. The `Stream<E>` interface exposes a set of methods that each
    `Stream<E>` implementation provides a concrete implementation for. The most used
    is the `forEach(..)` method that iterates over the elements in the stream. The
    `forEach(..)` method requires a parameter of type `java.util.function.Consumer<T>`.


    Important


    A **consumer** is what we call in this book an inline implementation of the `java.util.function.Consumer<T>`
    functional interface. This interface declares a unique abstract method that a
    class implementing it has to provide a concrete implementation for. This interface
    is annotated with `@FunctionalInterface` for this same reason. The method is named
    `accept(T t)` and is referred to as a **functional method**. It takes an element
    of type `T` as argument, processes it, and returns nothing (void). For this reason,
    consumer functions are suitable for the end of a functional pipeline.


    This consumer method is called for each element in the stream. The implementing
    class is basically declared inline, by only mentioning the body of the method.
    The JVM does the rest, because of the magic of lambda expressions. Without them,
    you would have to write code like the one in Listing [8-5](#463938_3_En_8_Chapter.xhtml#PC6).


    ```

    package com.apress.bgn.eight;

    import java.util.List;

    import java.util.function.Consumer;

    import static java.lang.System.out;

    public class IntegerStreamDemo {

    void main() {

    List bigList = List.of(50, 10, 250, 100/* ...*/);

    bigList.stream().forEach(

    new Consumer() {

    @Override

    public void accept(Integer i) {

    out.println(STR."\{Thread.currentThread().getName()}: \{i}");

    }

    });

    }

    }

    // output

    /*

    main: 50

    main: 10

    main: 250

    main: 100

    ...

    */

    Listing 8-5

    Expanded Declaration of a Consumer

    ```


    Again, this is the way the code had to be written before lambda expressions were
    introduced in Java 8\. When classes implement interfaces this way, inline, using
    a syntax that looks a lot like a constructor call using the interface type, they
    are called **anonymous classes** because they don’t have a name, and they are
    used exactly where declared. Lambda expressions simplified this process a lot,
    but only for interfaces that define one single method, the interfaces named **functional
    interfaces**. These interfaces were annotated with `@FunctionalInterface` annotation
    starting with Java 8. In the previous example the code prints the thread name
    and the value of the element.


    Each number is prefixed with `main`, which means that all integers in the stream
    are processed sequentially by the same thread, the main thread of the application.


    Tip


    For practical reasons, for collections there is no need to invoke `stream()` when
    a sequential stream is needed only for traversal, because the `forEach(..)` method
    defined for them does the job just as well. So the preceding code can be reduced
    to this:


    `bigList.`*forEach*`(i ->`


    `System.out.println(Thread.currentThread().getName() + ": " +` `i`


    *));*


    The name of the thread was printed because there is another way to create a stream,
    by calling the `parallelStream()` method. The only difference is that the returned
    stream is a parallel stream. This means that each element of the stream is processed
    on a different thread, which in turn means the implementation of `Consumer<T>`
    must be thread-safe and not contain code that involves instances that are not
    meant to be shared among threads. The code to print the value of a stream element
    does not affect the value of the element returned by the stream, nor other external
    objects, so it is safe to parallelize.


    Listing [8-6](#463938_3_En_8_Chapter.xhtml#PC7) depicts the use of `parallelStream()`
    instead of `stream()` to create a stream and print the elements of the stream
    using the same `Consumer<T>` implementation. The output is depicted at the bottom
    of the snippet.


    ```

    package com.apress.bgn.eight;

    import java.util.List;

    import java.util.function.Consumer;

    import static java.lang.System.out;

    public class IntegerStreamDemo {

    void main() {

    List bigList = List.of(50, 10, 250, 100/* ...*/);

    bigList.parallelStream()

    .forEach(i ->

    out.println(Thread.currentThread().getName() + ": " + i)

    );

    }

    }

    // sample output

    /*

    main: 83

    ForkJoinPool.commonPool-worker-1: 23

    main: 33

    ForkJoinPool.commonPool-worker-1: 45

    ForkJoinPool.commonPool-worker-2: 50

    main: 67...

    */

    Listing 8-6

    Creating a Parallel Stream of Integer Values from a List of Integers

    ```


    The first thing you will notice is the thread name: we no longer have only one,
    but a lot of them all named `ForkJoinPool.commonPool-worker``-`. The main thread
    still prints some values, but the other threads do some of the work too, and the
    order (or more like, the disorder) of the printed values makes it clear that the
    threads run in parallel. The threads have similar names that make it obvious that
    they are all part of the same *thread pool*. A thread pool is created by the JVM
    in this case to contain a few thread instances used to process all elements in
    the stream in parallel, and this concept was introduced in **Chapter** [**5**](#463938_3_En_5_Chapter.xhtml).
    The advantage of using a thread pool is that the threads can be reused, so no
    new thread instances need to be created, and this optimizes the execution time
    a little.


    If you look at the number associated to each thread (the number at the end of
    the thread name), you can see that the numbers sometimes repeat. This basically
    means the same thread is reused to process another stream element.


    Tip


    Performance improvements when using `parallelStream()` have been and still are
    up for debate in the Java world. For simple examples, creating a thread pool and
    managing the threads is clearly a waste of CPU and memory. So unless you have
    a specific problem that can be resolved more efficiently using parallel execution
    and a fast CPU with multiple cores, you probably won’t need `parallelStream()`.


    Caution


    The Stream API is the preferred way to process large data sets in parallel. The
    process is assumed to be a fairly complex function, so virtual threads are not
    supposed to be used for stream parallel processing, since they are lightweight
    threads that process compact simple operations.'
  trans: '

    ### 从集合创建流


    先前在代码清单 8-2 中展示的代码片段描述了一种从列表创建流的方法。从 Java 8 开始，所有集合接口和类都增加了返回流的默认方法。在代码清单 8-4
    中，我们获取一个整数列表，并通过调用 `stream()` 方法将其转换为流。创建流后，我们使用 `forEach(..)` 方法遍历它，以打印流中的值以及执行此代码的线程名称。你可能会问，为什么要打印线程名称？你很快就会明白。


    ```

    package com.apress.bgn.eight;

    import java.util.List;

    import static java.lang.System.out;

    public class IntegerStreamDemo {

    void main() {

    List bigList = List.of(50, 10, 250, 100/* ...*/);

    bigList.stream().forEach(i ->

    out.println(Thread.currentThread().getName() +": " + i));

    }

    }

    代码清单 8-4

    从整数列表创建整数值流

    ```


    代码清单 8-4 中的代码创建了一个整数元素的流。`Stream<E>` 接口公开了一组方法，每个 `Stream<E>` 实现都为其提供了具体实现。最常用的是
    `forEach(..)` 方法，它遍历流中的元素。`forEach(..)` 方法需要一个类型为 `java.util.function.Consumer<T>`
    的参数。


    重要


    **消费者** 是我们在本书中称之为 `java.util.function.Consumer<T>` 函数式接口的内联实现。该接口声明了一个唯一的抽象方法，实现它的类必须为其提供具体实现。出于同样的原因，该接口被注解为
    `@FunctionalInterface`。该方法名为 `accept(T t)`，被称为**函数式方法**。它接受一个类型为 `T` 的元素作为参数，对其进行处理，并且不返回任何内容（void）。因此，消费者函数适用于函数式管道的末端。


    这个消费者方法会为流中的每个元素调用。实现类基本上是内联声明的，只需提及方法体即可。由于 lambda 表达式的魔力，JVM 会处理其余部分。如果没有它们，你将不得不编写类似代码清单
    8-5 中的代码。


    ```

    package com.apress.bgn.eight;

    import java.util.List;

    import java.util.function.Consumer;

    import static java.lang.System.out;

    public class IntegerStreamDemo {

    void main() {

    List bigList = List.of(50, 10, 250, 100/* ...*/);

    bigList.stream().forEach(

    new Consumer() {

    @Override

    public void accept(Integer i) {

    out.println(STR."\{Thread.currentThread().getName()}: \{i}");

    }

    });

    }

    }

    // 输出

    /*

    main: 50

    main: 10

    main: 250

    main: 100

    ...

    */

    代码清单 8-5

    消费者的展开声明

    ```


    再次强调，这是在 Java 8 引入 lambda 表达式之前必须编写代码的方式。当类以这种方式实现接口时，内联地使用一种看起来很像使用接口类型进行构造函数调用的语法，它们被称为**匿名类**，因为它们没有名称，并且就在声明的位置被使用。Lambda
    表达式极大地简化了这一过程，但仅适用于定义单个方法的接口，即名为**函数式接口**的接口。从 Java 8 开始，这些接口被注解为 `@FunctionalInterface`。在前面的示例中，代码打印了线程名称和元素的值。


    每个数字都以 `main` 为前缀，这意味着流中的所有整数都由同一个线程（应用程序的主线程）顺序处理。


    提示


    出于实际原因，对于集合，如果仅为了遍历而需要顺序流时，无需调用 `stream()`，因为为它们定义的 `forEach(..)` 方法同样可以完成这项工作。因此，前面的代码可以简化为：


    `bigList.`*forEach*`(i ->`


    `System.out.println(Thread.currentThread().getName() + ": " +` `i`


    *));*


    打印线程名称是因为还有另一种创建流的方法，即调用 `parallelStream()` 方法。唯一的区别是返回的流是一个并行流。这意味着流的每个元素都在不同的线程上处理，这反过来意味着
    `Consumer<T>` 的实现必须是线程安全的，并且不能包含涉及不打算在线程间共享的实例的代码。打印流元素值的代码不会影响流返回的元素值，也不会影响其他外部对象，因此并行化是安全的。


    代码清单 8-6 描述了使用 `parallelStream()` 代替 `stream()` 来创建流，并使用相同的 `Consumer<T>` 实现打印流元素。输出显示在代码片段的底部。


    ```

    package com.apress.bgn.eight;

    import java.util.List;

    import java.util.function.Consumer;

    import static java.lang.System.out;

    public class IntegerStreamDemo {

    void main() {

    List bigList = List.of(50, 10, 250, 100/* ...*/);

    bigList.parallelStream()

    .forEach(i ->

    out.println(Thread.currentThread().getName() + ": " + i)

    );

    }

    }

    // 示例输出

    /*

    main: 83

    ForkJoinPool.commonPool-worker-1: 23

    main: 33

    ForkJoinPool.commonPool-worker-1: 45

    ForkJoinPool.commonPool-worker-2: 50

    main: 67...

    */

    代码清单 8-6

    从整数列表创建整数值的并行流

    ```


    你首先会注意到线程名称：我们不再只有一个线程，而是有很多线程，它们都命名为 `ForkJoinPool.commonPool-worker``-`。主线程仍然打印一些值，但其他线程也分担了一些工作，并且打印值的顺序（或者更确切地说，无序性）清楚地表明线程是并行运行的。这些线程具有相似的名称，这明显表明它们都属于同一个*线程池*。在这种情况下，JVM
    会创建一个线程池，其中包含一些用于并行处理流中所有元素的线程实例，这个概念在**第** **5** **章**中介绍过。使用线程池的好处是线程可以被重用，因此无需创建新的线程实例，这在一定程度上优化了执行时间。


    如果你查看与每个线程关联的数字（线程名称末尾的数字），你会发现这些数字有时会重复。这基本上意味着同一个线程被重用来处理另一个流元素。


    提示


    在 Java 世界中，使用 `parallelStream()` 时的性能提升一直且仍然存在争议。对于简单的示例，创建线程池和管理线程显然是浪费 CPU 和内存。因此，除非你有一个特定问题，可以通过并行执行和具有多核的快速
    CPU 更有效地解决，否则你可能不需要 `parallelStream()`。


    警告


    Stream API 是并行处理大型数据集的首选方式。该过程被假定为一个相当复杂的函数，因此虚拟线程不应用于流的并行处理，因为它们是处理紧凑简单操作的轻量级线程。

