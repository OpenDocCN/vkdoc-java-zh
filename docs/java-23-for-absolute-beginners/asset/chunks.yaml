    ## Java数据类型简介


    正如你在前面的示例中所注意到的，Java中的数据类型可以根据它们在执行期间的存储位置和方式分为两大类：**基本**类型和**引用**类型。让我们简要介绍它们，然后解释它们最重要的成员。


    ### 基本数据类型


    **基本类型**由Java编程语言定义为特殊类型，它们没有对应的支持类，并通过保留关键字命名。这些类型的变量保存在栈内存中，当使用`=`（等号）运算符为其赋值时，值实际上是被复制的。因此，如果我们像清单[5-5](#463938_3_En_5_Chapter.xhtml#PC5)那样声明两个`int`类型的原始变量，最终会得到两个变量`k`和`q`，它们都具有相同的值：`42`。


    ```

    package com.apress.bgn.five;

    public class AnotherPrimitivesDemo {

    void main() {

    int k = 42;

    int q = k;

    System.out.println("k = " + k);

    System.out.println("q = " + q);

    }

    }

    清单5-5 用于讨论基本类型的代码示例

    ```


    当作为参数传递给其他方法时，基本类型的值会被复制并使用，而原始变量不会被修改。重要的是，这意味着在Java方法中，*基本参数是按值传递的*。这可以通过创建一个交换两个`int`变量值的方法来证明。该方法的代码及其使用方法如清单[5-6](#463938_3_En_5_Chapter.xhtml#PC6)所示。


    ```

    package com.apress.bgn.five;

    public class SwappingPrimitivesDemo {

    void main() {

    int k = 42;

    int q = 44;

    swap(k, q);

    System.out.println("k = " + k);

    System.out.println("q = " + q);

    }

    static void swap(int a, int b) {

    int temp = a;

    a = b;

    b = temp;

    }

    }

    清单5-6 用于展示基本类型按值传递的代码示例

    ```


    那么，你认为`k`和`q`会打印出什么值？如果你认为输出如下所示，那么你是正确的：


    ```

    k = 42

    q = 44

    ```


    这是因为在Java中，向方法传递参数是通过其值进行的，这意味着对于基本类型，改变形式参数的值不会影响实际参数（方法参数）的值。如果你阅读了上一节，你已经可以想象栈上发生了什么。当调用`swap(..)`方法时，会创建一个新的栈内存块来保存该方法使用的值。在方法执行期间，这些值可能会改变，但如果它们没有被返回并赋值给调用方法中的变量，那么当方法执行结束时，这些值就会丢失。图[5-5](#463938_3_En_5_Chapter.xhtml#Fig5)描述了在清单[5-6](#463938_3_En_5_Chapter.xhtml#PC6)代码执行期间栈上发生的变化。


    ![](images/463938_3_En_5_Chapter/463938_3_En_5_Fig5_HTML.jpg)


    图5-5 Java按值传递基本参数


