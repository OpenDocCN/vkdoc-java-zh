  raw: '#### Logging with SLF4J and Logback


    The most renown Java logging facade is SLF4J (Simple Logging Facade for Java)^([^(72)](#fn72)),
    which serves as a logging abstraction for various logging frameworks. This means
    that if you use the SLF4J interfaces and classes in your code, behind the scenes
    all the work will be done by a concrete logging implementation found in the classpath.
    The best part? You can change the logging implementation at any time and your
    code will still compile and execute correctly, with no need to change anything
    in it.


    In the logging code samples covered thus far in this chapter, the code is tied
    to JUL; if we want for some reason to change the logging library, we need to change
    the existing code as well. The first step is to change our code to use the SLF4J
    API.


    Note


    As a reminder, an application programming interface (API) describes the publicly
    available components of a library: interfaces, classes, methods, and so forth.


    Another advantage of using SLF4J is that the configuration is read automatically
    if the logging configuration file is on the classpath. This means the `LogManager`
    initialization block that we needed for JUL is not needed for SLF4J, as long as
    the configuration file is named according to the standard of the concrete logging
    implementation used. This section starts with the transformation of the main `SortingJulDemo`
    class in Listing [9-5](#463938_3_En_9_Chapter.xhtml#PC5) to the `SortingLogbackDemo`
    class shown in Listing [9-15](#463938_3_En_9_Chapter.xhtml#PC18), by replacing
    JUL configuration and log statements with SLF4J-specific ones.


    ```

    package com.apress.bgn.nine;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    // other imports omitted

    public class SortingLogbackDemo {

    private static final Logger log = LoggerFactory.getLogger(SortingLogbackDemo.class);

    public static void main(String... args) {

    if (args.length == 0) {

    log.error("No data to sort!");

    return;

    }

    int[] arr = getInts(args);

    final StringBuilder sb = new StringBuilder ("Sorting an array with merge sort:
    ");

    Arrays.stream(arr).forEach(i -> sb.append(i).append(" "));

    log.debug(sb.toString());

    IntSorter mergeSort = new MergeSort();

    mergeSort.sort(arr, 0, arr.length - 1);

    final StringBuilder sb2 = new StringBuilder("Sorted: ");

    Arrays.stream(arr).forEach(i -> sb2.append(i).append( " "));

    log.info(sb2.toString());

    }

    // getInts method omitted

    }

    Listing 9-15

    The SortingLogbackDemo Class

    ```


    SLF4J defines an API that maps to the concrete implementation provided by a logging
    library that hasn’t been mentioned yet. The SLF4J log statements look pretty similar,
    but the log levels are a little different than JUL’s log levels. The following
    list explains the most common SLF4J log statements:


    *   `log.error(..)` is used for logging messages at the `ERROR` level; usually
    these messages are used when there is a critical failure of the application and
    normal execution cannot continue. There is more than one form for this method,
    and exceptions and objects can be passed as arguments to it so that the state
    of the application at the moment of the failure can be assessed.


    *   `log.warn(..)` is used for logging messages at the `WARN` level; usually these
    messages are printed to notify that the application is not functioning normally
    and there might be reason to worry. As with `log.error(..)`, there is more than
    one form of `log.warn(..)`, and exceptions and objects can be passed as arguments
    to better assess the current state of the application.


    *   `log.info``(..)` is used for logging messages at the `INFO` level; this type
    of message is informational, to let the user know that everything is okay and
    working as expected.


    *   `log.debug(..)` is used for logging messages at the `DEBUG` level; usually
    these messages are used to print intermediary states of the application, to check
    that things are going as expected and, in case of a failure, to trace the evolution
    of the application objects.


    *   `log.trace(..)` is used for logging messages at the `TRACE` level; this type
    of message is informational and of very low importance.


    The concrete logging implementation used for this example is called Logback^([^(73)](#fn73)),
    which I chose for the first edition of this book because, at the time, it was
    the only library that worked with SLF4J after modules were introduced in Java
    9\. Logback was viewed as the successor of Apache Log4j^([^(74)](#fn74)), another
    popular logging implementation.


    Info


    Fun fact: Log4j, SLF4j, and Logback were all founded by the same person: Ceki
    Gülcü. He is currently working on the latter two. As for Log4j, it was replaced
    by Apache Log4j 2, an upgrade that provides significant improvements over its
    predecessor. Currently, Log4j 2 version 3 is under development, so when it comes
    to logging, developers have quite a few decent options to choose from.


    Logback implements SLF4J natively, so there is no need to add another bridge library,
    and it is faster, as the Logback internals have been rewritten to perform faster
    on critical execution points. After modifying our classes to use SLF4J, we simply
    have to add Logback as a dependency of our application and add a configuration
    file under the `src/main/resources` directory. The configuration file can be written
    in XML or Groovy, and the standard requires it to be named `logback.xml`. Listing
    [9-16](#463938_3_En_9_Chapter.xhtml#PC19) depicts the contents of this file for
    this section’s example.


    ```


    %d{HH:mm:ss.SSS} %-5level %logger{5} - %msg%n


    Listing 9-16

    Contents of the logback.xml Configuration File

    ```


    The `ch.qos.logback.core.ConsoleAppender` class writes log messages in the console,
    and the `<pattern>` element value defines the format of the log messages. Logback
    can format fully qualified class names by shortening up package names to their
    initials, thus it allows for compact logging without losing details. This makes
    Logback one of the favorite logging implementations of the Java development world
    at the moment. The package names, if they are made up of more than one part, are
    reduced to the first letter of each part. The logging calls in the `MergeSort`
    class were all replaced with `log.debug(..)` because these messages are intermediary
    and not really informational, just samples of the state of the objects used by
    the application during the execution of the process. The general logging level
    of the application can be set using a `<root>` element to the desired level, but
    different logging levels can be set for classes or packages or subsets of packages
    using `<logger>` elements.


    Using the previous configuration running the `SortingLogbackDemo` class yields
    the output shown in Listing [9-17](#463938_3_En_9_Chapter.xhtml#PC20).


    ```

    16:25:41.178 WARN  c.a.b.n.SortingLogbackDemo - Element a is not an integer and
    cannot be added to the array!

    16:25:41.182 WARN  c.a.b.n.SortingLogbackDemo - Element b is not an integer and
    cannot be added to the array!

    16:25:41.182 WARN  c.a.b.n.SortingLogbackDemo - Element - is not an integer and
    cannot be added to the array!

    16:25:41.182 WARN  c.a.b.n.SortingLogbackDemo - Element ds is not an integer and
    cannot be added to the array!

    16:25:41.183 DEBUG c.a.b.n.SortingLogbackDemo - Sorting  an array with merge sort:
    5 3 2 1 4

    16:25:41.185 DEBUG c.a.b.n.a.MergeSort - Call sort of : [0 4] 5 3 2 1 4

    # log statements omitted

    16:25:41.185 DEBUG c.a.b.n.a.MergeSort - Called merge of: [0 1 0],) 3 5

    # log statements omitted

    16:25:41.185 DEBUG c.a.b.n.a.MergeSort - Called merge of: [0 4 2],) 1 2 3 4 5

    16:25:41.186 INFO  c.a.b.n.SortingLogbackDemo - Sorted: 1 2 3 4 5

    Listing 9-17

    Log Messages Printed by SLF4J + Logback

    ```'
