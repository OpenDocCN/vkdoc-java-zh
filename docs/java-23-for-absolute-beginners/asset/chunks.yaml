- fmt: '# Java 21 Threads New Syntax and Virtual Threads


    It is said often in the Java world that a JVM thread maps to an OS thread. In
    the code, when the `start()` method of a `Thread` object is invoked, a **platform
    thread** is created and linked to an OS thread. The platform thread remains linked
    to the OS thread for the platform thread’s entire lifetime, which means the number
    of threads available to the Java application depends on the number of available
    OS threads, which in turn depends on the architecture of the CPU. This means that
    creating multiple Java threads that do extensive work might actually overload
    the CPU and freeze your computer, unless the threads are managed by a thread pooling
    mechanism, like mentioned at the end of the previous section, **Classic Thread
    Creation (Before Java 21)**.


    Java 21 improved the Java concurrency model not only by revamping the existing
    code for creating threads but also by introducing **virtual threads**. Virtual
    threads are not linked to OS threads. Their code executes in an OS thread, but
    it does so through an engine managing **carrier threads** that ensures when a
    virtual thread is blocked, the OS thread can be released until the virtual thread
    can resume its execution. For this reason, virtual threads are lightweight threads
    that dramatically reduce the effort of writing, maintaining, and observing high-throughput
    concurrent applications. They are obviously meant to be used for compact simple
    operations that spend most of the time blocked, often waiting for I/O operations
    to complete. So virtual threads are suitable for applications that require a large
    number of concurrent tasks.


    Before going into more detail about virtual threads, let’s take a look at the
    change in syntax for creating platform threads. The listings in the previous section
    showed how to extend the `Thread` class and implement the `Runnable` interface
    to create threads. Listing [5-53](#463938_3_En_5_Chapter.xhtml#PC92) shows the
    new way to create threads introduced in Java 21, by invoking `Thread.ofPlatform()`
    to create a platform thread.


    ```

    package com.apress.bgn.five;

    public class MultipleUserThreadsJava21Demo {

    void main() {

    for (int i = 0; i < 10; ++i) {

    var rdt = new RandomDurationRunnable();

    Thread.ofPlatform().name("rdt " + i).start(rdt);

    }

    }

    }

    // output

    /*

    rdt 4 started...

    rdt 6 started...

    ...

    rdt 1 ended.

    redt 0 ended.

    ...

    */

    Listing 5-53

    Code Sample to Run Multiple Threads Created with Thread.ofPlatform()

    ```


    Since the `RandomDurationRunnable` implementation contains very simple processing,
    it is suitable to be run in a virtual thread. Changing the code in Listing [5-53](#463938_3_En_5_Chapter.xhtml#PC92)
    to create virtual threads is as simple as replacing `Thread.ofPlatform()` with
    `Thread.ofVirtual()`, as shown in Listing [5-54](#463938_3_En_5_Chapter.xhtml#PC93).
    The `java.lang.VirtualThread` class extends `java.lang.Thread` and, as such, is
    the latest addition to the hierarchy (see Figure [5-22](#463938_3_En_5_Chapter.xhtml#Fig22))
    of components for writing Java code destined to be run in parallel.


    ![](images/463938_3_En_5_Chapter/463938_3_En_5_Fig22_HTML.jpg)


    Figure 5-22


    Thread classes hierarchy


    ```

    package com.apress.bgn.five;

    public class VirtualThreadsDemo {

    void main() {

    for (int i = 0; i < 1000; ++i) {

    var rdt = new RandomDurationRunnable();

    Thread.ofVirtual().name("rdt " + i).start(rdt);

    }

    }

    }

    Listing 5-54

    Code Sample to Run Multiple Threads Created with Thread.ofVirtual()

    ```


    Because virtual threads are so lightweight, you can create and run a lot of them.
    Notice that the `VirtualThreadsDemo` creates and runs 1000 threads, and does so
    in record time. Also, virtual threads allow programming in the familiar, sequential
    thread-per-request style. Sequential code is not only easier to write and read
    but also easier to debug since we can use a debugger to trace the program flow
    step by step, and stack traces reflect the expected call stack. Because of this
    coding style, they are also easier to debug.


    **Important**


    Virtual threads are lightweight, short-lived, and have shallow call stacks, so
    there is no need to pool them. If you need a thread, just create one.


    Virtual threads are designed to model a *single task* rather than a mechanism
    for running tasks.


    Virtual threads are transparently suspended/resumed when they block. The Blocking
    API throughout the JDK has been retrofitted to be aware of virtual threads.


    `Runnable` instances can be replaced with lambda expressions and other methods
    in the `Thread` class to configure, create, and start virtual and platform threads.
    Threads can be created as unstarted, and the body of the `run()` method can be
    provided when invoking the `start(..)` method. Listing [5-55](#463938_3_En_5_Chapter.xhtml#PC94)
    shows a few ways to create, name, and start platform and virtual threads using
    syntax supported starting with Java 21.


    ```

    package com.apress.bgn.five;

    import static java.lang.System.out;

    public class NewTheadSyntax21Demo {

    void main() {

    // Os Thread

    Thread.ofPlatform()

    .name("Thread-P")

    .start(() -> out.println(" >> Hi, I am " + Thread.currentThread().getName() +
    " and I am an Platform thread! "));

    // Virtual thread

    Thread.startVirtualThread(() -> out.println(" >> Hi, I am " + Thread.currentThread()+"
    and I am a Virtual thread!"));

    // using VirtualThreadBuilder ''under the bonnet''

    Thread.ofVirtual()

    .name("Thread-V1")

    .start(() -> out.println(" >> Hi, I am " + Thread.currentThread().getName()+"
    and I am also a Virtual thread! "));

    // or creating it unstarted

    Thread vt = Thread.ofVirtual()

    .name("Thread-V2")

    .unstarted(() -> out.println(" >> Hi, I am " +     Thread.currentThread().getName()+"
    and I am also a Virtual thread! "));

    vt.start();

    try {

    Thread.sleep(2000); // making sure ''main'' thread finishes execution last

    } catch (InterruptedException _) {}

    }

    }

    // output

    /**

    >> Hi, I am Thread-P and I am an Platform thread!

    >> Hi, I am VirtualThread[#30]/runnable@ForkJoinPool-1-worker-1 and I am a Virtual
    thread!

    >> Hi, I am Thread-V2 and I am also a Virtual thread!

    >> Hi, I am Thread-V1 and I am also a Virtual thread!

    */

    Listing 5-55

    Java 21 Syntax for Creating and Starting Platform and Virtual Threads

    ```


    **Note**


    Notice the `Thread.sleep(2000);` statement that pauses the main thread to allow
    for the threads started by it to finish execution. Without it, the main thread
    might exit before one of the threads has even started, or ended, and thus won’t
    be able to print its message. Feel free to comment the statement and run the program
    a few times.


    One of the virtual threads is not configured with a custom name, so printing its
    name yields nothing. However, we can print the string representation of the thread
    using `Thread.currentThread()` and it yields `VirtualThread[#30]/runnable@ForkJoinPool-1-worker-1`.
    This output is made of three parts:


    *   `VirtualThread[#30]`: Identifies the virtual thread in execution.

    *   `runnable`: Identifies the instance used to create the thread, in this case
    a `java.lang.Runnable` instance.

    *   `@ForkJoinPool-1-worker-1`: Identifies the carrier thread on which the virtual
    thread executes.'
