    # 12. The Publish/Subscribe Framework


    All the programming concepts explained so far in the book involved data that needed
    to be processed. Regardless of the form in which data is provided, the Java programs
    we’ve written so far took that data, modified it, and printed out the results,
    whether to console, files, or another software component. You could say that all
    these components were communicating with each other, and passing processed data
    from one to another. For example, take Figure [12-1](#463938_3_En_12_Chapter.xhtml#Fig1),
    which abstractly describes the interaction between Java components in a program.


    ![](images/463938_3_En_12_Chapter/463938_3_En_12_Fig1_HTML.jpg)


    Figure 12-1


    Interactions between Java components within a program


    Each of the arrows is labeled with the type of information being passed from one
    component to another. In this image, you can identify a starting point where information
    enters the program by being read by the `Reader`, and an end point where the information
    is printed to some output component by the `Printer`. You could say that the `Reader`
    provides the data, the `Filter` and the `DocumentCreator` are some internal processors,
    and processing the data and the `Printer` is the consumer of the data.


    What was described so far is something resembling a **point-to-point (P2P) messaging
    model**, which describes a concept of one message being sent to one consumer.
    The P2P model is specific to a Java API named *Java Message Service (JMS)* that
    supports the formal communication known as messaging between computers in a network.
    The example depicted in Figure [12-1](#463938_3_En_12_Chapter.xhtml#Fig1) shows
    that communication between components of a Java program works similarly. The design
    of a solution to implement a process as described by Figure [12-1](#463938_3_En_12_Chapter.xhtml#Fig1)
    could be created by considering all components linked into a messaging style communication
    model.


    There is more than one communication model—producer/consumer, publish/subscribe,
    and sender/receiver—each with its own specifics, but this chapter is focused on
    **publish/subscribe** because this is the model that reactive programming is based
    on.


    Note


    If you are interested in knowing more about other communication models, search
    the Web for Enterprise Integration Patterns.'
