- fmt: 'The depicted date will be the one on your system when you run the application
    yourself.


    Since *tag libraries* (a.k.a. *taglibs*) have been mentioned, let’s talk a little
    about them as well. The most basic tag library is named **JSTL**, which stands
    for **JSP Standard Tag Library**. Other, more evolved tag libraries are provided
    by JSF (Jakarta Server Faces), Thymeleaf, or Spring. Tags defined in this library
    can be used to write JSP pages that change behavior depending on request attributes.
    JSTL tags can be used to iterate, test and format values and to configure internationalization.
    Based on the JSTL functions provided, the tags are grouped into five categories,
    and they can be used in a JSP page only after specifying the appropriate directive.
    Following are the five directives listed together with the overall topic the tags
    are covering:


    *   `<%@ taglib uri="http://java.sun.com/jsp/jstl/core" prefix="c" %>`: JSTL Core
    tags provide support for displaying values, iteration, conditional logic, catch
    exception, url, forward or redirect responses.

    *   `<%@ taglib uri="http://java.sun.com/jsp/jstl/fmt" prefix="fmt" %>`: JSTL
    Formatting tags are provided for formatting of numbers, dates, and i18n support
    through locales and resource bundles.

    *   `<%@ taglib uri="http://java.sun.com/jsp/jstl/sql" prefix="sql" %>`: JSTL
    SQL tags provide support for interaction with relational databases—but you should
    never use SQL in a web page because it is very easily hackable (look up **SQL
    injection** on a search engine to see why).

    *   `<%@ taglib uri="http://java.sun.com/jsp/jstl/xml" prefix="x" %>`: JSTL XML
    tags provide support for handling XML documents, parsing, transformations, and
    XPath expressions evaluation.

    *   `<%@ taglib uri="http://java.sun.com/jsp/jstl/functions" prefix="fn" %>`:
    JSTL Function tags provide a number of functions that can be used to perform common
    operations such as text manipulations.


    Now that you know the basic tag categories, which ones do you think we will need
    to use to redesign our `index.jsp` page? If you’re thinking **FMT** and **Core**,
    you are right. Also, JSP pages that use taglibs are almost always backed up by
    a servlet that sets the proper attributes on the request that will be used within
    the JSP page. So let’s modify the `index.jsp` page as depicted in Listing [10-39](#463938_3_En_10_Chapter.xhtml#PC51).


    ```

    Web Application Demo JSP Page


    Today is


    Listing 10-39

    Using FMT and Core Taglibs to Rewrite index.jsp

    ```


    And while we are at it, let’s rename `index.jsp` to `date.jsp` to make it obvious
    what it is used for, and write a servlet class named `DateServlet` to add to the
    request the `today` attribute, which will be formatted by the `<fmt:formatDate>`
    tag and the result saved into the `todayFormatted` variable, later printed out
    by the `<c:out>` tag. The `DateServlet` is depicted in Listing [10-40](#463938_3_En_10_Chapter.xhtml#PC52).


    ```

    package com.apress.bgn.ten;

    import jakarta.servlet.RequestDispatcher;

    import jakarta.servlet.ServletException;

    import jakarta.servlet.annotation.WebServlet;

    import jakarta.servlet.http.HttpServlet;

    import jakarta.servlet.http.HttpServletRequest;

