    ## 使用 JDK 响应式流 API


    JDK 为响应式编程提供的接口非常基础，因此实现起来相当繁琐，但本节我们仍将尝试一下。我们将构建一个应用，该应用生成无限数量的整数值，过滤这些值，并选出小于
    127 的值。对于偶数且在 98 到 122 之间的值，应用将减去 32（基本上是将小写字母转换为大写字母），然后将其转换为字符并打印出来。


    不使用响应式流的最基本解决方案如代码清单 12-1 所示。


    ```

