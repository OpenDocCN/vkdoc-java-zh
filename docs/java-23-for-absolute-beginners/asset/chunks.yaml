    \ Field That Is Initialized Properly\n```\n\nBefore explicit initialization, elements\
    \ of the array are initialized with the default value for the `Performer` type.\
    \ Since `Performer` is a reference type, that value is `null`.\n\nBecause depicting\
    \ the memory contents makes it more obvious what happens with our array and objects,\
    \ I give to you Figure [5-14](#463938_3_En_5_Chapter.xhtml#Fig14).\n\n![](images/463938_3_En_5_Chapter/463938_3_En_5_Fig14_HTML.jpg)\n\
    \nFigure 5-14\n\nDeclaring an array of Performers Instances with size 2\n\nSo\
    \ yes, we actually have an array of references, and the object they point to can\
    \ be changed during the program.\n\nThe last thing I need to cover here is that\
    \ arrays can be multidimensional. If you studied advanced math you probably remember\
    \ the *matrix* concept, which is a rectangular array arranged in rows and columns.\
    \ In Java, you can model *matrices* by using arrays. If you want a simple matrix\
    \ with rows and columns, you just define an array with two dimensions. A very\
    \ simple example is depicted in Listing [5-23](#463938_3_En_5_Chapter.xhtml#PC36).\n\
    \n```\npackage com.apress.bgn.five;\npublic class MatrixDemo {\nvoid main() {\n\
    // bi-dimensional array: 2 rows, 2 columns\nint[][] intMatrix2 = new int[2][2];\n\
    for (int i = 0; i < intMatrix2.length; ++i) {\nfor (int j = 0; j < intMatrix2[i].length;\
    \ ++j) {\nintMatrix2[i][j] = i + j;\nSystem.out.print(intMatrix2[i][j] + \" \"\
    );\n}\nSystem.out.println();\n}\n}\n}\n//output\n//0 1\n//1 2\nListing 5-23\n\
    Class Modeling a Matrix Using a Two-Dimensional Array\n```\n\nYou can even go\
    \ multidimensional and define as many coordinates as you want. Listing [5-24](#463938_3_En_5_Chapter.xhtml#PC37)\
    \ shows how to model a cube by using a three-dimensional array.\n\n```\npackage\
    \ com.apress.bgn.five;\npublic class CubeDemo {\nvoid main() {\n// three-dimensional\
