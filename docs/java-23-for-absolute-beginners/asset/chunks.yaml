    \ 类。它是一个简单的自定义类，继承自 `java.lang.Exception` 类，因此它成为了一个受检异常。受检异常被显式声明为由方法抛出，正如代码中第一行粗体所示。在这种情况下，当调用该方法时，编译器会强制开发者处理该异常或将其继续向上抛出。如果\
