    ## 垃圾回收异常及其原因


    之前提到过，如果对象无法从内存中丢弃，就会抛出 `OutOfMemoryError` 类型的异常。实际上，`OutOfMemoryError` 并不继承自
    `java.lang.Exception`，因此称其为“异常”并不准确。**第** **4 章** 中提到了异常类的层次结构。该层次结构中包含一个名为 `java.lang.Error`
    的类，它实现了 `java.lang.Throwable`，并且提到当程序出现无法恢复的严重问题时，会抛出这些类型的对象。`java.lang.OutOfMemoryError`
    类的完整层次结构如下所示：


    ```

    java.lang.Object

    java.lang.Throwable

    java.lang.Error

    java.lang.VirtualMachineError

    java.lang.OutOfMemoryError

    ```


    `OutOfMemoryError` 实际上是你在程序运行时最不想看到的棘手问题之一，因为这意味着你的程序实际上已经停止运行了。它停止运行的原因是没有剩余内存来存储正在创建的新对象。


    当 JVM 在进行内存管理时出现任何问题，都会抛出此错误。虽然最常见的原因是堆内存耗尽，但也存在其他原因。当分配给 JVM 的堆内存耗尽时，错误会显示以下信息：


    ```

    Exception in thread "main" java.lang.OutOfMemoryError: Java heap space

    ```


    但你可能还会看到另一条信息：


    ```

    Exception in thread "main" java.lang.OutOfMemoryError: GC Overhead Limit Exceeded

    ```


    这条信息仍然与堆大小有关。当程序的数据勉强适合堆的大小，导致堆几乎已满时，就会抛出带有此信息的错误。此时，GC 可以运行，但由于无法回收任何内存，GC 会持续运行，这实际上阻碍了应用程序的正常执行。当
    GC 花费了 98% 的执行时间，而应用程序只占用了另外 2% 时，错误信息中会添加此提示。


    无论出于何种原因，当 GC 无法正常工作时，这两个是你最常看到的错误信息。完整的列表可以在以下网址找到：[`https://docs.oracle.com/javase/8/docs/technotes/guides/troubleshoot/memleaks002.html`](https://docs.oracle.com/javase/8/docs/technotes/guides/troubleshoot/memleaks002.html)，但由于大多数
    GC 问题都与堆大小有关，G1GC 大多会抛出带有 Java 堆空间信息的错误。


    ## 总结


    这是本书的最后一章（后面还有两个附录）。在 Java 生态系统中，互联网上有大量的书籍和教程。本书只是浅尝辄止，为你作为 Java 开发者提供了一个良好的起点，参与本书编写的整个团队希望它能满足你的需求，并激发你进一步探索的好奇心。正如本章明确指出的那样，无论应用程序的范围如何，都没有完美的解决方案来确保内存始终得到正确管理。如果遇到问题，进行实验始终是为你自己的
    JVM 确定合适垃圾回收器的一个步骤。


    本章涵盖了以下主题：


    *   什么是垃圾回收及其涉及的步骤


    *   堆内存是如何结构的


    *   Oracle HotSpot JVM 中可用的多种垃圾回收器类型以及如何在它们之间切换


    *   如何列出所有 GC 标志并将其用作 VM 选项


    *   如何使用 VM 选项查看 GC 配置和统计信息


    *   如何使用 `finalize()` 和 `Cleaner` 查看垃圾回收的实际运行情况


    *   如何阻止垃圾回收器回收重要对象


    *   如何通过使用软引用来创建易于回收的对象

    '
