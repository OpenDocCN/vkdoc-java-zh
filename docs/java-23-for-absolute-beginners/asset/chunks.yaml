    Running the `JavaFxDemo` class causes the window depicted in Figure [10-7](#463938_3_En_10_Chapter.xhtml#Fig7)
    to pop up on your screen, and if you click the `Bye bye!` Button, the application
    will be gracefully closed because of the `Platform.exit()` call.


    ![](images/463938_3_En_10_Chapter/463938_3_En_10_Fig7_HTML.jpg)


    Figure 10-7


    JavaFX window demo


    The button and the pink rectangle are added to an instance of `StackPane` that
    lays out its children in a back-to-front stack. The children are sized to fill
    the `StackPane` instance, unless their size is already fixed, and by default they
    are centered. JavaFX supports arranging nodes in a window in a manner similar
    to Swing, but Java FX provides a few layout panes that support several different
    styles of layouts. The equivalent of a `JPanel` with `BorderLayout` manager in
    JavaFX is a built-in layout named `BorderPane`. The `BorderPane` provides five
    regions in which to place your nodes, with distribution similar to `BorderLayout`,
    but different names. Listing [10-18](#463938_3_En_10_Chapter.xhtml#PC26) shows
    the code to place our button in the bottom region in the right corner.


    ```

    package com.apress.bgn.ten;

    // other ''javafx'' import statements omitted

    import javafx.scene.layout.HBox;

    public class PannedJavaFxDemo extends Application {

    void main() {

    launch();

    }

    @Override

    public void start(Stage primaryStage) {

    primaryStage.setTitle("Java FX Demo Window!");

    var exitButton = new Button();

    exitButton.setText("Bye bye! ");

    exitButton.setOnAction(_ -> Platform.exit());

    var borderPane = new BorderPane();

    var box = new HBox();

    box.setPadding(new Insets(10, 12, 10, 12));

    box.setSpacing(10);

    box.setAlignment(Pos.BASELINE_RIGHT);

    box.setStyle("-fx-background-color: #85929e;");

    box.getChildren().add(exitButton);

    borderPane.setBottom(box);

    var root = new StackPane();

    root.getChildren().add(borderPane);

    primaryStage.setScene(new Scene(root, 500, 500));

    primaryStage.show();

    }

    }

    Listing 10-18

    Simple JavaFX Application with a Properly Positioned Button

    ```


    Running the `PannedJavaFxDemo` class causes the window depicted in Figure [10-8](#463938_3_En_10_Chapter.xhtml#Fig8)
    to pop up on your screen; the figure has been modified to show the regions of
    a `BorderPane`.


    ![](images/463938_3_En_10_Chapter/463938_3_En_10_Fig8_HTML.jpg)


    Figure 10-8


    JavaFX window with `BorderPane` demo


    As you can see, the approach to decide where our button should be located is similar
    to the approach in Swing, with a few differences. The `BorderPane` has five regions
    named: `Top`, `Bottom`, `Center`, `Left`, and `Right`. To place a node in each
    of those regions, a `set*(..)` method for each of them has been defined: `setTop(..)`,
    `setBottom(..)`, `setCenter(..)`, `setLeft(..)`, and `setRight(..)`. To further
    customize the position of the node, it should be placed in an `HBox` node, another
    `JavaFX` element that can be customized quite extensively. As you can see from
    the code in Listing [10-18](#463938_3_En_10_Chapter.xhtml#PC26), we are setting
    the background using CSS style elements. We customize the space between nodes
    in it and the borders of the containing node by using an instance of class `Insets`,
    and we customize the alignment of the contained nodes by calling `box.setAlignment(Pos.BASELINE_RIGHT)`.
    There are many more things that `HBox` supports, so what you can do with a box
    is limited (mostly) only by your imagination.


    So besides *making pretty code* in Listing [10-18](#463938_3_En_10_Chapter.xhtml#PC26),
    we did the following: the root node became parent to a `BorderPane` node; in the
    bottom region of the `BorderPane`, a `HBox` was added; and this `HBox` instance
    became parent for a `Button`. As you can see, this organization is hierarchic,
    with the button being the last node in the hierarchy.


    We also avoided using a layer pane, by styling the `HBox` node properly.


    It is time to add the last functionality to our application: the text area and
    the list with selectable elements. On being selected, the value is added to the
    text area. Creating a text area in JavaFX is simple. The class has a pretty obvious
    name: `TextArea`. We can directly add the node in the center region of the `BorderPane`
    because the JavaFX text area is scrollable by default. So there is no need to
    put it in a `ScrollPane`, although the class does exist in the `javafx.scene.control`
    package and is useful to display nodes inside it that make a form that is bigger
    than the window size. The three lines of code in Listing [10-19](#463938_3_En_10_Chapter.xhtml#PC27)
    create a node of type `TextArea`, declare it to not be editable, and add it to
    the center region of the `BorderPane`.


    ```

    import javafx.scene.control.TextArea;

    ...

    var textArea = new TextArea();

    textArea.setEditable(false);

    borderPane.setCenter(textArea);

    Listing 10-19

    Creating and Configuring a JavaFX TextArea

    ```


    The next functionality to add is the list. The list is a little more complicated,
    but also a lot more fun to work with, because by using JavaFX there is a lot you
    can do with a list. The class that needs to be instantiated to create a list object
    is named `ComboBox<T>`. This class is just one of a bigger family of classes used
    to create lists, the root class being the abstract class `ComboBoxBase<T>`. The
    choice of the proper implementation depends on the desired behavior of the list,
