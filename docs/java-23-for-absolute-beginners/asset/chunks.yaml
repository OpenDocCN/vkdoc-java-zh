    \n阅读本章并运行提供的代码示例后，应该能明显看出 Stream API 为何如此强大。就我个人而言，我最喜欢四点：\n\n*   可以编写更紧凑、更简单的代码来解决问题，同时不丧失可读性（可以避免使用\
    \ `if` 语句和循环）。\n*   只要考虑到性能角度，就可以在无需 Java 8 之前所需的样板代码的情况下实现数据的并行处理。\n*   可以使用函数式编程风格编写代码。\n\
    *   可以使用收集器实现复杂的处理。\n\n此外，Stream API 是一种更具声明性的编程方式，因为大多数流方法都接受 `Consumer<T>`、`Predicate<T>`、`Supplier<T>`、`Function<T>`\
    \ 等类型的参数，这些参数声明了应对每个流元素执行什么操作，但除非流中有元素，否则这些方法不会被显式调用。\n\n本章还介绍了如何使用 `Optional<T>`\
    \ 实例来避免 `NullPointerException` 和编写 `if` 语句。\n\n阅读完本章后，你应该对以下内容有了相当清晰的认识：\n\n*\
    \   如何从集合创建顺序流和并行流\n*   空流的用途\n*   这些与流相关的术语：\n    *   元素序列\n    *   谓词\n    *\
    \   消费者\n    *   供应者\n    *   收集器\n    *   方法引用\n    *   数据源\n    *   聚合操作\n \
    \   *   中间操作\n    *   终端操作\n    *   管道化\n    *   内部自动迭代\n*   如何创建和使用 `Optional<T>`\
    \ 实例\n*   如何使用内置收集器\n*   如何实现自定义收集器\n*   如何调试流管道\n\n脚注 1   2   3   4   5\n\n#\
    \ 9. 调试、测试与文档编写\n\n开发工作不仅要求你为问题设计解决方案并编写代码，还需要进行测试，以确保你的解决方案能够解决问题。**测试**涉及确保构成解决方案的每个组件在预期和非预期情况下都能按预期运行。\n\
    \n测试代码最实用的方法是通过**日志记录**在特定情况下将中间变量的值记录并打印到控制台。\n\n当解决方案复杂时，**调试**提供了暂停执行并检查变量状态的机会。调试有时涉及**断点**，并且需要集成开发环境（IDE）。顾名思义，断点就是应用程序暂停执行并进行变量检查的点。\n\
    \n在确保你的解决方案符合要求后，你必须为其编写文档，特别是当所解决的问题需要复杂代码来解决时。或者，如果你的解决方案可能是其他应用程序的先决条件，你有责任向其他开发人员解释如何使用它。\n\
    \n本章将介绍执行这些测试、调试和文档编写活动的一些方法，因为这些是开发人员的关键技能。\n\n## 调试\n\n调试是查找并解决计算机程序中缺陷或问题的过程。有几种调试策略，根据应用程序的复杂程度，可以使用一种或多种策略。这里列出了一些技术：\n\
    \n*   记录过程中涉及对象的中间状态并分析日志文件\n*   使用断点进行交互式调试，以暂停程序执行并检查过程中涉及对象的中间状态\n*   测试\n\
    *   在应用程序或系统级别进行监控\n*   分析内存转储和性能分析，这是一种动态程序分析形式，用于测量程序占用的内存、CPU 使用率、方法调用的持续时间等。\n\
    \n让我们从最简单的调试方式开始：*日志记录*。\n"
