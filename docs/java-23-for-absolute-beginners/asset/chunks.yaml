    package com.apress.bgn.nine;

    // other import statements omitted

    import java.util.concurrent.CompletableFuture;

    import java.util.concurrent.ExecutionException;

    public class NewApiProcessCreationDemo {

    private static final Logger log = LoggerFactory.getLogger(NewApiProcessCreationDemo.class);

    public static void main(String... args) throws IOException, InterruptedException,
    ExecutionException {

    ProcessBuilder processBuilder = new ProcessBuilder();

    processBuilder.command("/bin/sh", "-c", "echo Java home: $JAVA_HOME");

    processBuilder.inheritIO();

    Process process = processBuilder.start();

    CompletableFuture future = process.onExit();

    int result = future.get().exitValue();

    log.info("Process result: " + result);

    CompletableFuture futureHandle = process.toHandle().onExit();

    ProcessHandle processHandle = futureHandle.get();

    log.info("Process ID: {}", processHandle.pid());

    ProcessHandle.Info info = processHandle.info();

    info.arguments().ifPresent(s -> Arrays.stream(s).forEach(a -> log.info("   arg:
    {}", a)));

    info.command().ifPresent(c -> log.info("\t Command: {}", c));

    }

    }

    ```

    **Listing 9-28** Java Sample Code to Create a Process


    New processes can be created by using instances of `ProcessBuilder`, which receive
    as arguments a list of commands and arguments for them. The class has many constructors
    and methods with different signatures that can be used to create and start processes
    easily.


    The `inheritIO()` method is used to set the source and destination for the subprocess
    standard I/O to be the same as the current process. This means the process output
    is printed directly in the console, without the need of reading it using an `InputStream`
    instance.


    The `onExit()` method in the `Process` class returns a `CompletableFuture<Process>`
    that can be used to access the process at the end of its execution to retrieve
    the exit value of the process. For a process terminating normally, the value should
    be 0 (zero).


    The `onExit()` method in the `ProcessHandle` class returns a `CompletableFuture<ProcessHandle>`
    that can be used to access the process, can be used to wait for process termination,
    and possibly trigger dependent actions.


    When a Java program creates a process, that process becomes a child of the process
    that created it. To be able to list all children processes, we need to make sure
    they last a while, because once terminated they obviously no longer exist. The
    code sample in Listing [9-29](#463938_3_En_9_Chapter.xhtml#PC47) creates three
    identical processes, each of them executing three Linux shell commands.


    ```java

    package com.apress.bgn.nine;

    //import statements omitted

    public class ThreeProcessesDemo {

    private static final Logger log =

    LoggerFactory.getLogger(ThreeProcessesDemo.class);

    public static void main(String... args) {

    try {

    List builders = List.of(

    new ProcessBuilder("/bin/sh", "-c",

    "echo \"start...\" ; sleep 3; echo \"done.\"").inheritIO(),

    new ProcessBuilder("/bin/sh", "-c",

    "echo \"start...\" ; sleep 3; echo \"done.\"").inheritIO(),

    new ProcessBuilder("/bin/sh", "-c",

    "echo \"start...\" ; sleep 3; echo \"done.\"").inheritIO()

    );

    builders.parallelStream().forEach(pbs -> {

    try {

    pbs.start();

    } catch (Exception e) {

    log.error("Oops, could not start process!", e);

    }

    });

    ProcessHandle ph = ProcessHandle.current();

    ph.children().forEach(pc -> {

    log.info("Child PID: {}", pc.pid());

    pc.parent().ifPresent(parent ->

    log.info(" Parent PID: {}", parent.pid()));

    });

    System.out.println("Press any key to exit!");

    System.in.read();

    } catch (Exception e) {

    log.error("Failed to create three processes: {}", e.getMessage(), e);

    }

    }

    }

    ```

    **Listing 9-29** Java Sample Code to Create Three Processes


    As you can see, we have grouped the `ProcessBuilder` instances in a list and processed
    the instances using a parallel stream to make sure that all processes were started
    almost at the same time. We printed the results of each of them after termination,
    to make sure all were executed correctly. The `children()` method returns a stream
    containing `ProcessHandle` instances corresponding to the processes started by
    the current Java process.


    The `parent()` method was called for each child `ProcessHandle` instance to obtain
    the `ProcessHandle` corresponding to the process that created it, if there is
    one. When running the code in Listing [9-29](#463938_3_En_9_Chapter.xhtml#PC47),
