  trans: '

    关于 *Java* 这个名称的由来，网上有几种理论。一种理论认为，它是 Green 团队成员 James Gosling、Arthur Van Hoff 和
    Andy Bechtolsheim 三人名字首字母的变体，而 Logo 的灵感则源于他们对咖啡的热爱。


    J2SE 5.0 于 2004 年发布，代号为 *Tiger*。最初它遵循典型的版本命名方式，被称为 J2SE 1.5，但由于这是一个重大版本，包含了大量新特性，显著提升了
    J2SE 的成熟度、稳定性、可扩展性和安全性，因此该版本被标记为 5.0 并向公众如此呈现，尽管内部仍沿用 1.5。对于这个版本及随后的两个版本，都遵循 1.x
    = x.0 的规则。让我们列出这些特性，因为本书大部分都会涉及：


    *   **泛型（Generics）** 为集合提供了编译时（静态）类型安全支持，并消除了大多数类型转换的需要，这意味着在特定上下文中使用的类型是在应用程序运行时决定的。（**第**
    **4** **章**有专门一节讨论此主题）。

    *   **注解（Annotations）**，也称为*元数据*，用于标记类和方法，以便支持元数据的工具可以处理它们（这意味着一个组件被标记为另一个组件能够识别并对其进行特定操作的东西）。

    *   **自动装箱/拆箱（Autoboxing/unboxing）** 指的是基本类型与对应的对象类型（包装器）之间的自动转换。此特性在**第** **5**
    **章**中介绍。

    *   **枚举（Enumerations）** 使用 `enum` 关键字定义静态的、有序的常量值集合；同样在**第** **4** **章**中介绍。

    *   **可变参数（Varargs）** 为支持任意数量同类型参数的方法提供了一种简写形式。方法的最后一个参数使用类型名后跟三个点来声明（例如，`String...`），这意味着可以提供任意数量的该类型参数，它们会被放入一个数组中；在**第**
    **3** **章**中介绍。

    *   **增强的 for each 循环** 也用于遍历集合和数组；在**第** **7** **章**中介绍。

    *   **静态导入（Static imports）**，提供了一种将现有的静态方法和常量包含到代码中的方式；同样在**第** **4** **章**中介绍。

    *   对 **RMI**（本书未涉及）、Swing（**第** **10** **章**）的改进，以及引入了 `Scanner` 类（**第** **11**
    **章**）。


    J2SE 5.0 是首个可用于 Apple Mac OS X 10.4 的版本，也是 Apple Mac OS X 10.5 上默认安装的版本。然而，这个版本存在相当多的错误，针对大大小小错误的修补程序一直持续发布到
    2015 年。


    2006 年，*JDK 6*（代号 *Mustang*）在稍有延迟后发布。是的，又一次重命名，再次使用 JDK，因为另外两个产品并不成功。同样，在相当短的时间内又实现了大量特性。之后需要进行大量更新来修复现有问题。这是
    Sun Microsystems 发布的最后一个主要 Java 版本，因为 Oracle 在 2010 年 1 月收购了这家公司。此版本中最重要的特性如下所列。


    *   **核心平台性能的显著提升**：应用程序运行更快，执行所需的内存或 CPU 更少。

    *   **改进的 Web 服务支持**：优化了开发 Web 应用所需的组件，例如 `HttpServer`（在**第** **10** **章**中使用）。

    *   **JDBC 4.0**：优化了使用关系数据库开发应用所需的组件，在**第** **11** **章**中介绍。

    *   **许多 GUI 改进**：这些包括将 `SwingWorker` 集成到 API 中、表格排序和过滤，以及真正的 Swing 双缓冲（消除了灰色区域效果）。总体而言，用于创建桌面应用界面的组件得到了改进。


    不久之后（*用 Java 的术语来说*），在 2008 年 12 月，*JavaFX* 1.0 SDK 发布了。JavaFX 适用于为任何平台创建图形用户界面（GUI）。最初的版本是一种脚本语言。直到
    2008 年，在 Java 中有两种创建用户界面的方式：


    *   使用 AWT 组件，这些组件由底层操作系统特定的原生对等组件渲染和控制；这就是为什么 AWT 组件也被称为*重量级*组件。

    *   使用 Swing 组件，这些组件被称为*轻量级*组件，因为它们不需要在操作系统的窗口工具包中分配原生资源。Swing API 是 AWT 的补充扩展。


    在最初的几个版本中，从未真正明确 JavaFX 是否会有未来，以及它是否会发展壮大以取代 Swing。当时 Sun 内部的管理层动荡也无助于为这个项目规划一条清晰的路径。


    ## Oracle 接手


    尽管 Sun Microsystems 在与微软的诉讼中胜诉，微软同意因未完全实现 Java 1.1 标准而向 Sun Microsystems 支付 2000
    万美元，但在 2008 年，由于一些失败的收购举措以及错误地将重心放在 Sparc 而非 x86 架构上，该公司状况非常糟糕，以至于开始了与 IBM 和惠普的合并谈判（但最终失败）。2009
    年，Oracle 和 Sun 宣布达成协议：Oracle 将以每股 9.50 美元现金收购 Sun，总价达 56 亿美元。其影响是巨大的。许多工程师离职，包括
    *Java 之父* James Gosling，这使许多开发者开始质疑 Java 平台的未来。

    '
- fmt: "### Java 7\n\n**Note**\n\nStarting with this version, developers started using\
    \ the term **Java** as an umbrella term for all Java related components: the language,\
    \ the compiler, and the JVM. Thus, the titles of section starting now will follow\
    \ the pattern: **Java {version}**.\n\nIt took five years for the Oracle developers\
    \ to take over from the Green Team, but finally Oracle released JDK 7, codename\
    \ *Dolphin*, in 2011. This first Java version released by Oracle was the result\
    \ of an extensive collaboration between Oracle engineers and members of the worldwide\
    \ Java communities, such as the OpenJDK Community and the Java Community Process\
    \ (JCP). It contained a lot of changes, but a lot fewer than developers expected.\
    \ Considering the long period between the releases, the expectations were pretty\
    \ high. Project *Lambda*, which was supposed to allow usage of lambda expressions\
    \ in Java (this leads to considerable syntax simplification in certain cases),\
    \ and *Jigsaw* (making JVM and the Java application modular; there is a section\
    \ in **Chapter** [**3**](#463938_3_En_3_Chapter.xhtml) about them) were dropped.\
    \ Both were released in future versions. The following are the most notable features\
    \ of JDK 7:\n\n- JVM support for dynamic languages with the new `invokedynamic`\
    \ bytecode. Basically, Java code can use code implemented in non-Java languages\
    \ (e.g., Python, Ruby, Perl, JavaScript, Groovy, etc.).\n- Compressed 64-bit pointers\
    \ (internal optimization of the JVM, so less memory is consumed).\n- Small language\
    \ changes grouped under project *Coin*:\n    - Strings in `switch` statements,\
    \ covered in **Chapter** [**7**](#463938_3_En_7_Chapter.xhtml)\n    - Automatic\
    \ resource management in `try-with-resources` statements, covered in **Chapter**\
    \ [**5**](#463938_3_En_5_Chapter.xhtml)\n    - Improved type inference for generics—the\
    \ diamond `<>` operator, covered in **Chapter** [**4**](#463938_3_En_4_Chapter.xhtml)\n\
    \    - Binary integer literals: integer numbers can be represented directly as\
    \ binary numbers, using the form `0b` (or `0B`) followed by one or more binary\
    \ digits (0 or 1), covered in **Chapter** [**5**](#463938_3_En_5_Chapter.xhtml)\n\
    \    - Multiple exception handling improvements, covered in **Chapter** [**5**](#463938_3_En_5_Chapter.xhtml).\n\
    - Concurrency improvements.\n- New I/O library (new classes added to read/write\
    \ data to/from files, covered in **Chapter** [**11**](#463938_3_En_11_Chapter.xhtml)).\n\
    - Introduction of the `Timsort` algorithm to sort collections and arrays of objects\
    \ instead of merge sort because it has better performance. Better performance\
    \ usually means reducing consumed resources (memory and/or CPU) or reducing the\
    \ time needed for execution.\n\nContinuing development on a project with almost\
    \ none of the original development team involved must have been a very tough job.\
    \ That was made obvious by the 161 updates that followed, most of which were needed\
    \ to fix security issues and vulnerabilities.\n\nJavaFX 2.0 was released with\
    \ Java 7. This confirmed that the JavaFX project had a future with Oracle. As\
    \ a major change, JavaFX stopped being a scripting language and became a Java\
    \ API. This meant that knowledge of the Java language syntax would be enough to\
    \ start building GUIs with it. JavaFX started gaining ground over Swing because\
    \ of its hardware-accelerated graphical engine called *Prism* that did a better\
    \ job at rendering.\n\n**Note**\n\nStarting with Java 7, OpenJDK^([⁵](#fn5)) was\
    \ born, an open source reference implementation of the Java SE Platform Edition.\
    \ This was an effort from the Java developers’ community to provide a version\
    \ of the JDK that was not under an Oracle license, because they assumed that Oracle\
    \ would introduce stricter licensing for the JDK in order to profit from it. However\
    \ Oracle ended up supporting the OpenJDK community, because the best ideas come\
    \ from people passionate about Java.\n\n### Java 8\n\nJDK 8, codename *Spider*,\
    \ was released in 2014, and included features that were initially intended to\
    \ be part of JDK 7. Better late than never, right? Three years in the making,\
    \ JDK 8 contained the following key features:\n\n- Language syntax changes:\n\
    \    - Language-level support for lambda expressions (functional programming features)\n\
    \    - Support for default methods in interfaces, covered in **Chapter** [**4**](#463938_3_En_4_Chapter.xhtml)\n\
    \    - New date and time API, covered in **Chapter** [**5**](#463938_3_En_5_Chapter.xhtml)\n\
    \    - New way to do parallel processing by using streams, covered in **Chapter**\
    \ [**8**](#463938_3_En_8_Chapter.xhtml)\n- Improved integration with JavaScript\
    \ (the Nashorn project). JavaScript is a web scripting language that is quite\
    \ loved in the development community, so providing support for it in Java probably\
    \ won Oracle a few new supporters.\n- Improvements of the garbage collection process.\n\
    \nStarting with Java 8, Oracle dropped codenames to avoid any trademark-law hassles;\
    \ instead, Oracle adopted a semantic versioning that easily distinguishes major,\
    \ minor, and security-update releases^([⁶](#fn6)). The version number matches\
    \ the following pattern: `$MAJOR.$MINOR.$SECURITY`.\n\nWhen executing `java -version`\
    \ in a terminal (if you have Java 8 installed), you see a log similar to the one\
    \ in Listing [1-3](#463938_3_En_1_Chapter.xhtml#PC5).\n\n```\n$ java -version\n\
    java version \"1.8.0_381\"\nJava(TM) SE Runtime Environment (build 1.8.0_381-b09)\n\
    Java HotSpot(TM) 64-Bit Server VM (build 25.381-b09, mixed mode)\nListing 1-3\n\
    Java 8 Log for Execution of java -version\n```\n\nIn this log, the version numbers\
    \ have the following meaning:\n\n- The `1` represents the major version number,\
    \ incremented for a major release that contains significant new features as specified\
    \ in a new edition of the Java SE Platform Specification.\n- The `8` represents\
    \ the minor version number, incremented for a minor update release that may contain\
    \ compatible bug fixes, revisions to standard APIs, and other small features.\n\
    - The `0` represents the security level that is incremented for a security-update\
    \ release that contains critical fixes, including those necessary to improve security.\
    \ `$SECURITY` is not reset to zero when `$MINOR` is incremented, which lets the\
    \ users know that this version is a more secure one.\n- `162` is the build number.\n\
    - `b12` represents additional build information.\n\nThis versioning style is quite\
    \ common for Java applications; thus, this versioning style was adopted to align\
    \ with the general industry practices.\n\n**Warning**\n\nJava SE 8u203 versions\
    \ and more recent are provided under the new Java SE OTN License^([⁷](#fn7)),\
    \ so if you intend to use any of these versions in production, read the license\
    \ carefully to understand what Oracle allows you to do with it and what it will\
    \ cost you."
  raw: "### Java 7\n\nNote\n\nStarting with this version, developers started using\
    \ the term **Java** as an umbrella term for all Java related components: the language,\
    \ the compiler, and the JVM. Thus, the titles of section starting now will follow\
    \ the pattern: **Java {version}**.\n\nIt took five years for the Oracle developers\
    \ to take over from the Green Team, but finally Oracle released JDK 7, codename\
    \ *Dolphin*, in 2011\\. This first Java version released by Oracle was the result\
    \ of an extensive collaboration between Oracle engineers and members of the worldwide\
    \ Java communities, such as the OpenJDK Community and the Java Community Process\
    \ (JCP). It contained a lot of changes, but a lot fewer than developers expected.\
    \ Considering the long period between the releases, the expectations were pretty\
    \ high. Project *Lambda*, which was supposed to allow usage of lambda expressions\
    \ in Java (this leads to considerable syntax simplification in certain cases),\
    \ and *Jigsaw* (making JVM and the Java application modular; there is a section\
    \ in **Chapter** [**3**](#463938_3_En_3_Chapter.xhtml) about them) were dropped.\
    \ Both were released in future versions. The following are the most notable features\
    \ of JDK 7:\n\n*   JVM support for dynamic languages with the new `invokedynamic`\
    \ bytecode. Basically, Java code can use code implemented in non-Java languages\
    \ (e.g., Python, Ruby, Perl, JavaScript, Groovy, etc.).\n\n*   Compressed 64-bit\
    \ pointers (internal optimization of the JVM, so less memory is consumed).\n\n\
    *   Small language changes grouped under project *Coin*:\n    *   Strings in `switch`\
    \ statements, covered in **Chapter** [**7**](#463938_3_En_7_Chapter.xhtml)\n\n\
    \    *   Automatic resource management in `try-with-resources` statements, covered\
    \ in **Chapter** [**5**](#463938_3_En_5_Chapter.xhtml)\n\n    *   Improved type\
    \ inference for generics—the diamond `<>` operator, covered in **Chapter** [**4**](#463938_3_En_4_Chapter.xhtml)\n\
    \n    *   Binary integer literals: integer numbers can be represented directly\
    \ as binary numbers, using the form 0b (or 0B) followed by one or more binary\
    \ digits (0 or 1), covered in **Chapter** [**5**](#463938_3_En_5_Chapter.xhtml)\n\
    \n    *   Multiple exception handling improvements, covered in **Chapter** [**5**](#463938_3_En_5_Chapter.xhtml).\n\
    \n*   Concurrency improvements.\n\n*   New I/O library (new classes added to read/write\
    \ data to/from files, covered in **Chapter** [**11**](#463938_3_En_11_Chapter.xhtml)).\n\
    \n*   Introduction of the `Timsort` algorithm to sort collections and arrays of\
    \ objects instead of merge sort because it has better performance. Better performance\
    \ usually means reducing consumed resources (memory and/or CPU) or reducing the\
    \ time needed for execution.\n\nContinuing development on a project with almost\
    \ none of the original development team involved must have been a very tough job.\
    \ That was made obvious by the 161 updates that followed, most of which were needed\
    \ to fix security issues and vulnerabilities.\n\nJavaFX 2.0 was released with\
    \ Java 7\\. This confirmed that the JavaFX project had a future with Oracle. As\
    \ a major change, JavaFX stopped being a scripting language and became a Java\
    \ API. This meant that knowledge of the Java language syntax would be enough to\
    \ start building GUIs with it. JavaFX started gaining ground over Swing because\
    \ of its hardware-accelerated graphical engine called *Prism* that did a better\
    \ job at rendering.\n\nNote\n\nStarting with Java 7, OpenJDK^([⁵](#fn5)) was born,\
    \ an open source reference implementation of the Java SE Platform Edition. This\
    \ was an effort from the Java developers’ community to provide a version of the\
    \ JDK that was not under an Oracle license, because they assumed that Oracle would\
    \ introduce stricter licensing for the JDK in order to profit from it. However\
    \ Oracle ended up supporting the OpenJDK community, because the best ideas come\
    \ from people passionate about Java.\n\n### Java 8\n\nJDK 8, codename *Spider*,\
    \ was released in 2014, and included features that were initially intended to\
    \ be part of JDK 7\\. Better late than never, right? Three years in the making,\
    \ JDK 8 contained the following key features:\n\n*   Language syntax changes:\n\
    \    *   Language-level support for lambda expressions (functional programming\
    \ features)\n\n    *   Support for default methods in interfaces, covered in **Chapter**\
    \ [**4**](#463938_3_En_4_Chapter.xhtml)\n\n    *   New date and time API, covered\
    \ in **Chapter** [**5**](#463938_3_En_5_Chapter.xhtml)\n\n    *   New way to do\
    \ parallel processing by using streams, covered in **Chapter** [**8**](#463938_3_En_8_Chapter.xhtml)\n\
    \n*   Improved integration with JavaScript (the Nashorn project). JavaScript is\
    \ a web scripting language that is quite loved in the development community, so\
    \ providing support for it in Java probably won Oracle a few new supporters.\n\
    \n*   Improvements of the garbage collection process.\n\nStarting with Java 8,\
    \ Oracle dropped codenames to avoid any trademark-law hassles; instead, Oracle\
    \ adopted a semantic versioning that easily distinguishes major, minor, and security-update\
    \ releases^([⁶](#fn6)). The version number matches the following pattern: `$MAJOR.$MINOR.$SECURITY`.\n\
    \nWhen executing `java -version` in a terminal (if you have Java 8 installed),\
    \ you see a log similar to the one in Listing [1-3](#463938_3_En_1_Chapter.xhtml#PC5).\n\
    \n```\n$ java -version\njava version \"1.8.0_381\"\nJava(TM) SE Runtime Environment\
    \ (build 1.8.0_381-b09)\nJava HotSpot(TM) 64-Bit Server VM (build 25.381-b09,\
    \ mixed mode)\nListing 1-3\nJava 8 Log for Execution of java -version\n```\n\n\
    In this log, the version numbers have the following meaning:\n\n*   The 1 represents\
    \ the major version number, incremented for a major release that contains significant\
    \ new features as specified in a new edition of the Java SE Platform Specification.\n\
    \n*   The 8 represents the minor version number, incremented for a minor update\
    \ release that may contain compatible bug fixes, revisions to standard APIs, and\
    \ other small features.\n\n*   The 0 represents the security level that is incremented\
    \ for a security-update release that contains critical fixes, including those\
    \ necessary to improve security. $SECURITY is not reset to zero when $MINOR is\
    \ incremented, which lets the users know that this version is a more secure one.\n\
    \n*   162 is the build number.\n\n*   b12 represents additional build information.\n\
    \nThis versioning style is quite common for Java applications; thus, this versioning\
    \ style was adopted to align with the general industry practices.\n\nWarning\n\
    \nJava SE 8u203 versions and more recent are provided under the new Java SE OTN\
    \ License^([⁷](#fn7)), so if you intend to use any of these versions in production,\
    \ read the license carefully to understand what Oracle allows you to do with it\
    \ and what it will cost you."
  trans: "\n### Java 7\n\n注意\n\n从该版本开始，开发者开始使用术语 **Java** 作为所有 Java 相关组件（语言、编译器和 JVM）的总称。因此，从现在开始的章节标题将遵循以下模式：**Java\
    \ {版本号}**。\n\nOracle 开发者从 Green Team 接手后花了五年时间，但最终 Oracle 于 2011 年发布了代号为 *Dolphin*\
    \ 的 JDK 7。这是 Oracle 发布的首个 Java 版本，是 Oracle 工程师与全球 Java 社区成员（如 OpenJDK 社区和 Java\
    \ 社区流程 (JCP)）广泛合作的成果。它包含了许多变化，但远少于开发者的预期。考虑到两个版本之间漫长的间隔期，大家的期望值相当高。原本计划允许在 Java\
    \ 中使用 lambda 表达式（这能在某些情况下显著简化语法）的 *Lambda* 项目，以及 *Jigsaw* 项目（使 JVM 和 Java 应用程序模块化；**第**\
    \ **3** **章**有相关章节介绍）都被搁置了。两者都在未来的版本中发布。以下是 JDK 7 最值得注意的特性：\n\n*   JVM 通过新的 `invokedynamic`\
    \ 字节码支持动态语言。基本上，Java 代码可以使用非 Java 语言（例如 Python、Ruby、Perl、JavaScript、Groovy 等）实现的代码。\n\
    *   压缩的 64 位指针（JVM 的内部优化，从而消耗更少的内存）。\n*   归入 *Coin* 项目的小型语言变更：\n    *   `switch`\
    \ 语句中的字符串，详见**第** **7** **章**。\n    *   `try-with-resources` 语句中的自动资源管理，详见**第**\
    \ **5** **章**。\n    *   改进的泛型类型推断——菱形 `<>` 运算符，详见**第** **4** **章**。\n    *   二进制整数字面量：整数可以直接表示为二进制数，使用形式\
    \ 0b（或 0B）后跟一个或多个二进制数字（0 或 1），详见**第** **5** **章**。\n    *   多项异常处理改进，详见**第** **5**\
    \ **章**。\n*   并发性改进。\n*   新的 I/O 库（新增了用于从文件读取/向文件写入数据的类，详见**第** **11** **章**）。\n\
    *   引入 `Timsort` 算法来对对象集合和数组进行排序，以替代归并排序，因为其性能更优。更优的性能通常意味着减少消耗的资源（内存和/或 CPU）或减少执行所需的时间。\n\
    \n在几乎没有原始开发团队成员参与的情况下继续开发一个项目，这一定是一项非常艰巨的工作。后续发布的 161 个更新版本就证明了这一点，其中大部分更新都是为了修复安全问题和漏洞。\n\
    \nJavaFX 2.0 随 Java 7 一同发布。这证实了 JavaFX 项目在 Oracle 旗下仍有未来。作为一个重大变化，JavaFX 不再是一种脚本语言，而是变成了一个\
    \ Java API。这意味着掌握 Java 语言语法就足以开始用它构建图形用户界面。JavaFX 开始取代 Swing，因为它拥有名为 *Prism* 的硬件加速图形引擎，该引擎在渲染方面表现更佳。\n\
    \n注意\n\n从 Java 7 开始，诞生了 OpenJDK^(⁵)，它是 Java SE 平台版的一个开源参考实现。这是 Java 开发者社区努力提供的一个不受\
    \ Oracle 许可限制的 JDK 版本，因为他们认为 Oracle 会为了盈利而对 JDK 实施更严格的许可。然而，Oracle 最终支持了 OpenJDK\
    \ 社区，因为最好的想法来自对 Java 充满热情的人。\n\n### Java 8\n\nJDK 8，代号 *Spider*，于 2014 年发布，包含了最初计划作为\
    \ JDK 7 一部分的功能。迟到总比不到好，对吧？经过三年的开发，JDK 8 包含了以下关键特性：\n\n*   语言语法变更：\n    *   语言级别对\
    \ lambda 表达式（函数式编程特性）的支持。\n    *   支持接口中的默认方法，详见**第** **4** **章**。\n    *   新的日期和时间\
    \ API，详见**第** **5** **章**。\n    *   使用流进行并行处理的新方式，详见**第** **8** **章**。\n*   改进了与\
    \ JavaScript 的集成（Nashorn 项目）。JavaScript 是一种在开发社区中颇受欢迎的 Web 脚本语言，因此在 Java 中为其提供支持可能为\
    \ Oracle 赢得了一些新的支持者。\n*   垃圾回收过程的改进。\n\n从 Java 8 开始，Oracle 放弃了代号，以避免任何商标法方面的麻烦；取而代之的是，Oracle\
    \ 采用了一种语义化版本控制方案，可以轻松区分主版本、次版本和安全更新版本^(⁶)。版本号遵循以下模式：`$MAJOR.$MINOR.$SECURITY`。\n\
    \n在终端中执行 `java -version` 命令时（如果你安装了 Java 8），你会看到类似于清单 1-3 所示的日志。\n\n```\n$ java\
    \ -version\njava version \"1.8.0_381\"\nJava(TM) SE Runtime Environment (build\
    \ 1.8.0_381-b09)\nJava HotSpot(TM) 64-Bit Server VM (build 25.381-b09, mixed mode)\n\
    清单 1-3\n执行 java -version 的 Java 8 日志\n```\n\n在此日志中，版本号具有以下含义：\n\n*   1 代表主版本号，当发布包含\
    \ Java SE 平台规范新版本中规定的重要新功能的主版本时，该数字会增加。\n*   8 代表次版本号，当发布可能包含兼容性错误修复、标准 API 修订和其他小功能的次更新版本时，该数字会增加。\n\
    *   0 代表安全级别，当发布包含关键修复（包括提高安全性所必需的修复）的安全更新版本时，该数字会增加。当 $MINOR 增加时，$SECURITY 不会重置为零，这使用户知道此版本是更安全的版本。\n\
    *   162 是构建编号。\n*   b12 代表额外的构建信息。\n\n这种版本控制风格在 Java 应用程序中相当常见；因此，采用这种版本控制风格是为了与行业通用实践保持一致。\n\
    \n警告\n\nJava SE 8u203 及更高版本是根据新的 Java SE OTN 许可^(⁷)提供的，因此，如果你打算在生产环境中使用这些版本中的任何一个，请仔细阅读许可协议，以了解\
    \ Oracle 允许你用它做什么以及需要付出什么代价。\n"
- fmt: '### Java 9


    JDK 9 was released in September 2017. The long-awaited *Jigsaw* project finally
    arrived. The Java platform was at last modular.


    **Important**


    Java modules were a big change for the Java world. It was not a change in syntax,
    nor was it just some new feature. It was a change in the design of the platform.
    Some experienced developers I know who have used Java since its first years had
    difficulties adapting. It was supposed to fix some serious problems that Java
    had been living with for years (covered in **Chapter** [**3**](#463938_3_En_3_Chapter.xhtml)).
    You are lucky, because as a beginner, you start from scratch, so you do not need
    to change the way you develop your applications. Until Java 9, Java modular applications
    were developed using frameworks such as OSGi^([⁸](#fn8)), which are a pain to
    use because they require additional configurations and special packaging. Jigsaw
    made configuring modules easier and made it a part of the Java application, not
    an additional configuration file interpreted by a build tool such as Maven.


    The following are the most important features of JDK 9, aside from the introduction
    of Java modules:


    - The Java Shell tool, an interactive command-line interface for evaluation declarations,
    statements, and expressions written in Java, covered in **Chapter** [**2**](#463938_3_En_2_Chapter.xhtml)

    - Quite a few security updates

    - Support for `private` methods in interfaces, covered in **Chapter** [**4**](#463938_3_En_4_Chapter.xhtml)

    - Improved `try-with-resources`, enabling final variables to be used as resources,
    covered in **Chapter** [**5**](#463938_3_En_5_Chapter.xhtml)

    - Removal of `_` (underscore) from the set of legal identifiers, covered in **Chapter**
    [**4**](#463938_3_En_4_Chapter.xhtml)

    - Enhancements for the Garbage-First (G1) garbage collector, which becomes the
    default garbage collector, as covered in **Chapter** [**13**](#463938_3_En_13_Chapter.xhtml)

    - Internally, use of a new more compact `String` representation, covered in **Chapter**
    [**5**](#463938_3_En_5_Chapter.xhtml)

    - Concurrency updates (related to parallel execution, mentioned in **Chapter**
    [**5**](#463938_3_En_5_Chapter.xhtml))

    - Factory methods for collections, covered in **Chapter** [**5**](#463938_3_En_5_Chapter.xhtml)

    - Updates of the image processing API optimization of components used to write
    code that processes images


    ### Java 10


    JDK 10 (a.k.a. Java 18.3) was released on March 20, 2018. Java 10 used a new versioning
    convention set up by Oracle: the version numbers follow a `$YEAR.$MONTH` format^([⁹](#fn9)).
    This release versioning style was supposed to make it easier for developers and
    end users to figure out the age of a release, so that they could judge whether
    to upgrade it to a newer release with the latest security fixes and additional
    features.


    When JDK 10 is installed, running `java -version` in a terminal shows a log that
    is similar to the one in Listing [1-4](#463938_3_En_1_Chapter.xhtml#PC6).


    ```

    $ java -version

    java version "10" 2018-03-20

    JavaTM SE Runtime Environment 18.3 build 10+46

    Java HotSpotTM 64-Bit Server VM 18.3 build 10+46, mixed mode

    Listing 1-4

    Java 10 Log for Execution of java -version

    ```


    The following are the most important features of Java 10:^([^(10)](#fn10))


    - A local-variable type inference to enhance the language to extend type inference
    to local variables (this was the most expected feature, and is covered in **Chapter**
    [**4**](#463938_3_En_4_Chapter.xhtml))

    - More optimizations for garbage collection, covered in **Chapter** [**13**](#463938_3_En_13_Chapter.xhtml)

    - Application Class-Data Sharing to reduce the footprint by sharing common class
    metadata across processes (this is an advanced feature and won’t be covered in
    this book)

    - More concurrency updates (related to parallel execution, mentioned in **Chapter**
    [**5**](#463938_3_En_5_Chapter.xhtml))

    - Heap allocation on alternative memory devices. The memory needed by JVM to run
    a Java program—called *heap memory*—can be allocated on an alternative memory
    device, so the heap can also be split between volatile and nonvolatile RAM. (**Chapter**
    [**5**](#463938_3_En_5_Chapter.xhtml) provides more details about memory used
    by Java applications.)


    In June 2018, Oracle and other participants in the Java ecosystem announced a
    change to the release cadence model for Java SE: rather than having a major release
    planned for every two to three years (which would often become three to four years),
    followed by a long list of hotfixes, a new six-month feature-release-train model
    would be used.


    **Note**


    For releases after Java SE 8, Oracle designates one release every two years as
    a **Long-Term-Support** (**LTS**) release. Oracle customers using LTS releases
    for development will receive Oracle Premier Support and periodic update releases.
    Non-LTS releases are a cumulative set of implementation enhancements of the most
    recent LTS release, and support for them is limited until the following LTS release.


    **Caution**


    Java 9 and 10 are not LTS releases and therefore are not recommended for production
    use.'
