    ```


    现在，`ListSelectionListener`的实现变得有点复杂，因为在选择新的外观类之后，我们必须调用`JFrame`实例上的`repaint()`来应用新的外观，因此我们将声明提取到自己的类中，并提供`SwingDemo`对象作为参数，以便在`valueChanged(..)`方法内部对其调用`repaint()`。代码片段如清单[10-14](#463938_3_En_10_Chapter.xhtml#PC22)所示。


