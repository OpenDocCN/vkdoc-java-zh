    //output

    /*

    Alex’s lifespan = 100

    human’s lifespan = 100

    Human lifespan = 100

    */

    Listing 4-14

    Code Sample Testing a Constant

    ```


    #### Encapsulating Data


    The class we defined makes no use of access modifiers on the fields, and this
    is not acceptable. Java is known as an **object-oriented programming language**,
    and thus code written in Java must respect the **principles of object-oriented
    programming (OOP)****.** Respecting these coding principles ensures that the written
    code is of good quality and totally aligns with the fundamental Java style.


    Note


    Starting with Java 8, the Java syntax has been modified—new types have been added,
    and internal changes have been made to the JDK to allow a more functional approach
    when writing code—but Java still remains mostly an OOP language.


    One of the OOP principles is **encapsulation**, which refers to hiding the data
    implementation by restricting access to it using special methods called accessors
    (getters) and mutators (setters).


    Usually, any field of a class should have private access, and access to it should
    be controlled by methods that can be intercepted, tested, and tracked to see where
    they were called. Using getters and setters is a common practice when working
    with objects, so most IDEs have a default option to generate them, including IntelliJ
    IDEA. As shown in Figure [4-4](#463938_3_En_4_Chapter.xhtml#Fig4), just right-click
    inside the class body, select the **Generate** option to see all possibilities,
    and then select **Getter** **and Setter** to generate the methods for you.


    ![](images/463938_3_En_4_Chapter/463938_3_En_4_Fig4_HTML.jpg)


    Figure 4-4


    IntelliJ IDEA code generation menu: **Generate ➤ Getter** **and Setter** submenu


    After making the fields private and generating the getters and setters, the `Human`
    class now looks like the one depicted in Listing [4-15](#463938_3_En_4_Chapter.xhtml#PC15).


    ```

    package com.apress.bgn.four.base;

    public class Human {

    static final int LIFESPAN = 100;

    private String name;

    private int age;

    private float height;

    public String getName() {

    return name;

    }

    public void setName(String name) {

    this.name = name;

    }

    public int getAge() {

    return age;

    }

    public void setAge(int age) {

    this.age = age;

    }

    public float getHeight() {

    return height;

    }

    public void setHeight(float height) {

    this.height = height;

    }

    }

    Listing 4-15

    Simple Human Class with Getters and Setters

    ```


    After looking at Listing [4-15](#463938_3_En_4_Chapter.xhtml#PC15), you may be
    wondering what is the purpose of the `this` keyword. As the keyword name hints,
    it is a reference to the current object. So [`this.name`](http://this.name) is
    actually the value of the field name of the current object, also referred to as
    an **instance variable**. Inside the class body, this is used to access fields
    for the current objects when there are parameters in methods that have the same
    name. As you can see, the setters and getters that IntelliJ IDEA generates have
    parameters named exactly as the fields.


    **Getters** are the simplest methods that are declared without any parameter,
    and they return the value of the field they are associated with. The coding convention
    for their names is to use the `get` prefix and the name of the field they access,
    with its first letter uppercased.


    **Setters** are methods that return nothing and declare as a parameter a variable
    with the same type that needs to be associated to the field. Their names are made
    of the `set` prefix and the name of the field they access, with its first letter
    uppercased. When setters are generated by an editor, the parameter name matches
    the instance variable name, and the `this` keyword is needed to discern between
    the two in the context of the setter’s body.


    Figure [4-5](#463938_3_En_4_Chapter.xhtml#Fig5) depicts the setter and getter
    for the `name` field.


    ![](images/463938_3_En_4_Chapter/463938_3_En_4_Fig5_HTML.jpg)


    Figure 4-5


    Setter and getter methods used for the `name` field


    Since the fields are now private, when creating a `Human` instance, we have to
    use the setters to set the field values and the getters when accessing them. Therefore,
    our class `BasicHumanDemo` changes to the one depicted in Listing [4-16](#463938_3_En_4_Chapter.xhtml#PC16).


    ```

    package com.apress.bgn.four.base;

    public class BasicHumanDemo {

    public static void main(String... args) {

    Human alex = new Human();

    alex.setName("Alex");

    alex.setAge(40);

    alex.setHeight(1.91f);

    System.out.println("name: " + alex.getName());

    System.out.println("age: " + alex.getAge());

    System.out.println("height: " + alex.getHeight());

    }

    }

    // output

    // name: Alex

    // age: 40

    // height: 1.91

    Listing 4-16

    BasicHumanDemo Class Using Human Instance with Getters and Setters

    ```


    Most Java frameworks look for getters and setters within classes to initialize
    or read the values of an object’s fields. Setters and getters are considered by
    most developers as **boilerplate code** (or just **boilerplate**), sections of
    code that are repeated in multiple places with little to no variation. This is
    why the Lombok^([^(40)](#fn40)) library was born—to generate them at runtime,
    so developers don’t have to pollute their code with them. The Kotlin language
    removed them altogether.


    Java did something similar in version 14 with the introduction of *records*. Records
    will be covered a little later in this chapter.'
