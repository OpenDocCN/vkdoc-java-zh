    Most functions that you remember from the Stream API have been implemented for
    a reactive usage in Project Reactor, so if the previous code seems familiar, this
    is the reason why.


    Regarding the Project Reactor API, if you are ever in need of a reactive library,
    you could consider this one first. The official documentation^([^(125)](#fn125))
    is great and full of examples. Oracle apparently has postponed for now its plans
    to provide a rich API for programming reactive applications.


    ## Summary


    Reactive programming is not an easy topic, but reactive applications are the most
    suitable for modeling event-driven, asynchronous, responsive, and resilient systems.
    This chapter did not need to get into really advanced topics to show the true
    power of a reactive solution. Being a book for absolute beginners in Java, this
    is not a suitable subject for it. However, if you want to learn more about building
    reactive applications, the book *Pro Spring MVC with WebFlux*^([^(126)](#fn126))
    (second edition) published by Apress in January 2021 has a few great chapters
    about building reactive applications with Spring and Project Reactor.


    Important


    What you must keep in mind is that reactive implementations are useless with implementations
    that are not reactive, so to build a truly reactive application, all layers must
    be reactive.


    There is no use in designing and using reactive components with nonreactive components,
    because you might actually introduce failure points and slow things down. For
    example, if you are using an Oracle database, there is no point in defining a
    repository class that returns elements using reactive streams, because an Oracle
    database does not support reactive access. You would just be adding a reactive
    layer that adds extra implementation, because there are no real benefits in this
    case. But if your database of choice is MongoDB, you can use reactive programming
    confidently, because MongoDB databases support reactive access. Also, if you are
    building a web application with a ReactJS or Angular interface, you can design
    your controller classes to provide data reactively to be displayed by the interface.


    The contents of this chapter can be summarized as follows:


    *   Reactive programming was explained.


    *   The behavior of reactive streams was explained.


    *   The JDK reactive streams support was covered.


    *   How to use the Reactive Streams Technology Compatibility Kit to test your
    reactive solution was addressed.


    *   A brief introduction to Project Reactor components for building reactive applications
    was provided.


