- fmt: '### Accessing the Java Process API


    Java 9 came with a lot of other improvements besides the Jigsaw modules (introduced
    in **Chapter** [**3**](#463938_3_En_3_Chapter.xhtml)), one of which was a new
    and improved Java Process API, which allows you to start native operating system
    processes, retrieve information about them, and manage them. The ability to manipulate
    processes existed in previous versions of Java, but it was quite rudimentary.
    Listing [9-25](#463938_3_En_9_Chapter.xhtml#PC43) shows how a process was created
    before Java 5.


    ```

    package com.apress.bgn.nine;

    // import section omitted

    public class ProcessCreationDemo {

    private static final Logger log =

    LoggerFactory.getLogger(ProcessCreationDemo.class);

    public static void main(String[] args){

    try {

    Process exec = Runtime.getRuntime()

    .exec(new String[] { "/bin/sh", "-c", "echo Java home: $JAVA_HOME" });

    exec.waitFor();

    InputStream is = exec.getInputStream();

    StringBuilder textBuilder = new StringBuilder();

    try (Reader reader = new BufferedReader(new InputStreamReader(is, StandardCharsets.UTF_8)))
    {

    int c = 0;

    while ((c = reader.read()) != -1) {

    textBuilder.append((char) c);

    }

    }

    log.info("Process output -> {}", textBuilder.toString());

    log.info("Process result: {}", exec.exitValue());

    } catch (Exception e) {

    log.error("Process execution failed: {}", e.getMessage(), e);

    }

    }

    }

    // output

    // INFO  c.a.b.n.ProcessCreationDemo - Process output -> Java home: /Users/iuliana/.sdkman/candidates/java/current

    // INFO  c.a.b.n.ProcessCreationDemo - Process result: 0

    Listing 9-25

    Creating a Process Using Pre-Java 5 API

    ```


    Intercepting output of the started process was a pain, and a `BufferedReader`
    instance had to be wrapped around the `InputStream` instance connected to the
    normal output of the process. In Java 5, a class named `ProcessBuilder` was introduced
    in the `java.lang` package to create operating system processes using an improved
    API, however considerable improvements of the Java Process API landed only with
    the release of Java 9.


    The Java 9 Process API made things a little more practical. It has at its core
    a few classes and interfaces, all having names that start with `Process`. What
    we’ve done so far with Java executables can be directly done by writing Java code.
    The interface that provides an API to access native processes is named `ProcessHandle`
    and is part of the core Java `java.lang` package. Similar to the `Thread` class,
    there is a static method named `current` to call on this interface to retrieve
    the `ProcessHandle` instance of the current running process. Once we have this,
    we can use its methods to access more process details. The `ProcessHandle` provides
    several static utility methods to access native processes. Java code can be written
    to list all processes running on a computer, and they can be sorted based on various
    criteria. The code in Listing [9-26](#463938_3_En_9_Chapter.xhtml#PC44) lists
    all processes that were created by running the `java` command.


    ```

    package com.apress.bgn.nine;

    // import section omitted

    public class ProcessListingDemo {

    private static final Logger log = LoggerFactory.getLogger(ProcessListingDemo.class);

    public static void main(String[] args){

    Optional currUser = ProcessHandle.current().info().user();

    ProcessHandle.allProcesses().filter(ph -> ph.info().user().equals(currUser) &&
    ph.info().commandLine().isPresent())

    .filter(ph -> ph.info().commandLine().get().contains("java"))

    .forEach(p -> {

    log.info("PID: " + p.pid());

    p.info().arguments().ifPresent(s -> Arrays.stream(s).forEach(a -> log.info("   arg:
    {}", a)));

    p.info().command().ifPresent(c -> log.info("\t Command: {}", c));

    });

    }

    }

    Listing 9-26

    Listing All java Processes Using Java 9 Process API

    ```


    The code in Listing [9-26](#463938_3_En_9_Chapter.xhtml#PC44) extracts the user
    from the current running process by obtaining its handle and calling `info()`
    to obtain an instance of `ProcessHandle.Info`, an interface that declares a set
    of methods that are implemented by the `ProcessHandleImpl.Info` class to access
    snapshot information about the process as the command and arguments that were
    used to create the process. The output of running the code in Listing [9-26](#463938_3_En_9_Chapter.xhtml#PC44)
    is printed in the console and might look pretty similar to the output listed in
    Listing [9-27](#463938_3_En_9_Chapter.xhtml#PC45) (except, you know, different
    user, different processes).


    ```

    INFO  c.a.b.n.ProcessListingDemo - PID: 30750

    INFO  c.a.b.n.ProcessListingDemo -    arg: -classpath

    INFO  c.a.b.n.ProcessListingDemo -    arg: /Users/iuliana/apress/workspace/java-23-for-absolute-beginners/chapter09/process-api/target/classes:...*.jar

    INFO  c.a.b.n.ProcessListingDemo -    arg: com.apress.bgn.nine.ProcessListingDemo
    # TODO underline

