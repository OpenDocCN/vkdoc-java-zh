    ## 数据库的写入与读取


    注意


    在**第** **7****章**中，为了介绍 `do-while` 循环，我们曾涉及建立连接和执行简单查询的内容。然而，该章的重点并非数据库和 JDBC
    的细节，因此本节将对此主题进行简要介绍。


    *数据库*是一种数据存储方式。数据以特定方式组织，以便能够轻松地回读、搜索、更新和删除，同时保持不同数据片段之间的关系。


    最常用的数据库是**关系型数据库**，它以包含行和列的**表**来呈现信息。表是具有相同结构的行的集合。表中的每一行通过**主键**唯一标识。一个表中的行可以与其他表中的行相关联，这些关联称为**关系**。数据库管理系统（**DBMS**）负责处理数据的存储、维护和检索方式。包含以相关表形式组织数据的数据库称为**关系型数据库**，因此其管理系统被称为关系型数据库管理系统（**RDBMS**）。


    RDBMS 通过使用结构化查询语言（**SQL**）来执行其功能，SQL 是一种用于在关系型数据库中存储和处理信息的编程语言。


    Java 数据库连接（JDBC）API 是行业标准，用于在 Java 编程语言与各种 SQL 数据库以及其他表格数据源（如电子表格或平面文件）之间实现与数据库无关的连接。JDBC
    通常包含三个主要部分。第一部分是 **JDBC API**，它包含各种方法和接口，这些方法和接口被归入 `java.sql` 包中，以便于与数据库进行通信。


    JDBC 的第二主要部分是 **JDBC 驱动程序管理器**，由 `java.sql.DriverManager` 类表示，它封装了用于管理一组 **JDBC
    驱动程序**的服务。应用程序加载并可用的驱动程序取决于类路径上的库。例如，`chapter11/database-sample` 项目的类路径包含 MySQL
    和 PostgreSQL 驱动程序的库，因此调用 Java 9 中引入的 `DriverManager.drivers()` 方法会返回一个包含以下驱动程序的流：


    ```

    class com.mysql.cj.jdbc.Driver

    class org.postgresql.Driver

    ```


    JDBC 驱动程序是由数据库供应商（Oracle、Microsoft SQL Server、MySQL、PostgreSQL 等）提供的特定于实现的组件，它们允许
    Java 应用程序与其自身的数据库进行通信。为了被 `DriverManager` 识别，它们必须实现 `java.sql.Driver` 接口。


    JDBC 架构可以总结为图 11-12 所示。


    ![](img/463938_3_En_11_Fig12_HTML.jpg)


    图 11-12


    JDBC 架构


    对于直接与数据库通信的独立 Java 应用程序，该架构被称为**两层架构**。对于部署在应用服务器（如**第** **10****章**介绍的 Apache
    Tomcat）上的应用程序，服务器通常提供 JDBC 实现并自身成为一个层，因此该架构被称为**三层架构**。这样，JDBC API 就成为了中间层。


    JDBC 驱动程序被称为数据库的纯 Java 直接驱动程序。这意味着 JDBC 是一种数据库驱动程序实现，它在调用程序和数据库之间利用中间层（例如应用服务器）。


    JDBC 的核心组件之一是到数据库的**连接**。这由实现 `java.sql.Connection` 的类来建模。数据库连接由工厂对象创建，这些工厂对象是实现
    `javax.sql.DataSource` 接口的类的实例。


    JDBC 的第三个重要部分是 **JDBC 测试套件**，它用于验证你的代码与所使用的 JDBC 驱动程序的兼容性。


    那么它是如何工作的呢？Java 对象如何保存到数据库，数据又如何转换回 Java 对象？理论上，在最简单的情况下，一个类映射到一个表；其字段映射到该表的列。你还需要编写代码来支持各种查询、结果解释以及更多操作。这是因为
    JDBC 是多个框架最终用来与数据库通信的低级 API。如果不使用更高级别的 API，你就必须自己完成所有繁重的工作（编写 SQL 查询、将结果映射到对象等）。某些类型的应用程序（通常是金融类）需要这种方法，因为
    SQL 级别的优化优于其上层级别的优化。对于其他应用程序，则有诸如 JDO^(¹¹²)、JPA^(¹¹³)、Hibernate^(¹¹⁴) 等框架。然而，这些框架对于本书来说过于高级，因此我们将介绍如何使用
    JDBC 执行一些基本操作，以便让你有一个整体的了解。


    本书的 `database-sample` 项目包含用于与 MySQL 数据库通信、执行一些数据定义语言（DDL）语句和一些数据操作语言（DML）SQL 命令的源代码。


    **DDL** 是 SQL 命令的一个子集，用于定义数据库的结构或模式。它涉及创建、修改和删除数据库结构，如表、索引、视图和用户。


    **DML** 是 SQL 命令的一个子集，用于管理和操作数据库中的数据。它包括常见的 SQL 语句，如 `SELECT`、`INSERT`、`UPDATE`
    和 `DELETE`，这些语句允许用户从数据库表中检索、添加、修改和删除数据。


    因此，我们编写 DML 语句来操作数据，编写 DDL 语句来定义保存数据的结构。JDBC 的 `java.sql.Statement` 接口包含方法骨架，各种驱动程序实现这些方法以支持
    DML 和 DDL 语句。


    要遵循本节中的示例，你需要有一个本地 MySQL 数据库实例或一个已设置的容器。GitHub 上提供的源代码提供了启动容器的方法，并且官方站点^(¹¹⁵)上提供了在计算机上安装
    Docker 的说明。清单 11-53 展示了一些典型的 JDBC 代码，用于使用具有管理权限的 `root` 用户创建到 `mysql` 数据库的连接，并创建一个名为
    `musicdb` 的新数据库和一个名为 `sample` 的用户。


    ```

    // 来自类 com.apress.bgn.eleven.DDLMySQLDemo 的代码片段

    import java.sql.DriverManager;

    import java.sql.SQLException;

    // 部分代码已省略

    private static final Logger LOGGER = LoggerFactory.getLogger(DDLMySQLDemo.class);

    //...

    try (var con = DriverManager.getConnection(

    "jdbc:mysql://localhost:3306/mysql",

    "root", "mypass")) {

    var stmt = con.createStatement();

    stmt.execute("create database musicdb");

    stmt.execute("CREATE USER ''sample''@''%'' IDENTIFIED BY ''sample''");

    stmt.execute("GRANT ALL PRIVILEGES ON *.* TO ''sample''@''%''");

    stmt.execute("flush privileges");

    var rs = stmt.executeQuery("SELECT * FROM user");

    var foundUser = false;

    while (rs.next() && !foundUser) {

    foundUser = rs.getString("User") .equals("sample");

    }

    if (foundUser) {

    LOGGER.info("用户 ''sample'' 已创建。");

    }

    } catch (SQLException e) {

    LOGGER.error("嗯，这出乎意料...", e);

    }

    清单 11-53

    使用 JDBC 创建用户和数据库

    ```


    清单 11-53 中的代码示例执行了所有必要的语句，以创建一个名为 `musicdb` 的数据库，创建一个名为 `sample` 且使用密码 `sample`
    连接数据库的用户，并授予该用户对 `musicdb` 数据库的管理权限。

