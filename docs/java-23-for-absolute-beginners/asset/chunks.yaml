    **Read The F%ing Manual!**（去读那该死的说明书！）的缩写。在软件领域，经验丰富的开发者与新手开发者合作时，经常会用到这个表达。问题是，当没有说明书时你该怎么办？大多数面临截止日期的公司可能倾向于分配很少甚至不分配时间来记录项目，因此本书加入这一节是为了强调优秀文档在软件开发中的重要性，并教你如何在编写代码的同时编写文档，因为你之后可能没有时间来做这件事。


