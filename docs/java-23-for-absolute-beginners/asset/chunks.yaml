    状态码有很多，但最重要的是 200 状态码，它表示一切正常。在图 10-14 中，你可以看到，为了显示页面，在初始请求得到响应后，还会发出大量额外的请求，并且所有后续请求都成功了，因为服务器返回的状态显示在表格的第一列，且始终是
    200 或 204。


    *   **PUT**：此请求类型用于向服务器发送数据，以更新现有数据。在企业级应用中，PUT 请求被解释为更新现有对象的请求。该请求包含对象的更新版本以及用于标识该对象的方法。成功的
    PUT 请求会生成状态码为 204 的响应。


    *   **POST**：此请求类型用于向服务器发送数据，但服务器被指示同时保存这些数据。与 PUT 请求的区别在于，POST 请求中的数据在服务器上尚不存在。在企业级应用中，POST
    请求用于发送凭据以便对用户进行身份验证，或发送将用于创建新对象的数据。当 POST 请求用于发送凭据时，如果用户通过身份验证，响应状态码为 200；如果用户凭据无效，则状态码为
    401（未授权）。当 POST 请求用于发送待保存的数据时，如果对象创建成功，则返回 201 状态码。


    *   **DELETE**：此请求类型用于指示服务器删除数据。如果一切正常，响应码为 200；如果出现问题，则会发送与原因相关的错误码。


    还有一些其他 HTTP 方法用于更复杂的应用程序。如果你想了解更多关于请求方法、状态码以及 HTTP 基础知识，我强烈建议你查看这个教程^(⁹⁷)。现在，让我们回到编写
    Java Web 应用程序的话题上。


    如前所述，直到不久前，我们还需要一个服务器来托管 Web 应用程序。但从几年前开始，情况已不再如此。正如为了测试目的而用嵌入式数据库替换数据库和功能最简的应用程序一样，Web
    服务器也经历了同样的变化。如果你想快速编写一个简单的 Web 应用程序，现在可以选择使用嵌入式服务器，例如 Java 18 中引入的 Simple Web
    Server、Eclipse Jetty 或 Apache Tomcat Embedded。使用嵌入式服务器支持复杂页面相当困难，但嵌入式服务器通常用于只需要简单
    REST API 的微服务。接下来的章节将浅谈如何构建 Java Web 应用程序。


    ### 简单应用服务器


    Java 18 通过 JEP 408^(⁹⁸) 引入了 Simple Web Server，这是一个最小的 HTTP 静态文件服务器。它可以作为命令行工具使用，用于启动一个仅提供静态文件的最小
    Web 服务器；不支持 Servlet 和 JSP 页面。它仅通过 HTTP/1.1 提供静态文件服务；不支持动态内容和其他 HTTP 版本。引入它的目的是为了让
    JDK 对初学者开发者更友好。


    Simple Web Server 的工作方式可以总结如下：


    *   它服务于单个目录层次结构，并且仅通过 HTTP/1.1 提供静态文件服务。

    *   如果请求的资源是一个文件，则提供其内容。

    *   如果目录包含索引文件，则提供索引文件的内容。如果没有，则列出目录的内容。

    *   它仅支持 `HEAD` 和 `GET` 请求方法；任何其他请求都会收到 `501 - 未实现` 或 `405 - 不允许` 的响应。


    本节将首先向你展示如何使用 `jwebserver` 命令行工具，然后介绍如何从你的 Java 代码创建和自定义服务器实例。

