    # 10. 让应用程序具有交互性


    到目前为止，本书中 Java 程序的输入数据是通过在代码内部初始化的数组或变量，或者通过程序参数提供的。然而，在现实生活中，大多数应用程序需要与用户进行交互。可以通过输入用户名和密码来授予用户访问权限，有时还需要用户输入详细信息以确认其身份或指示应用程序执行操作。Java
    支持多种读取用户输入的方法。在本章中，我们将介绍几种构建交互式 Java 应用程序的方法，这些应用程序可以从多种来源获取输入。


    如前几章所述，JShell 是一个 Java 命令行界面（CLI）Shell，使开发者能够测试变量声明和单行语句。其他 CLI Shell（如 `bash`）和终端（如
    Windows 的命令提示符）可用于以连续文本行的形式向程序发出命令。


    ## 从命令行读取用户数据


    本节专门讨论如何从命令行读取用户输入，无论该命令行是 IntelliJ IDEA 控制台，还是程序从特定于操作系统的任何终端中的可执行 jar 运行。在 JDK
    中，有两个类可用于从命令行读取用户数据：`java.util.Scanner` 和 `java.io.Console`。本节将详细介绍这两个类。但首先，让我们从基础开始：使用
    `System.in` 读取用户数据。

    '
- fmt: '### Using `System.in`


    Before introducing logging in Chapter [9](#463938_3_En_9_Chapter.xhtml) to print
    data in the console, methods under `System.out` were used in the code samples
    for this book. There is also a counterpart utility object named `System.in` that
    is used to read data from the console, data that a user of the program introduces
    to control the application flow. You might have noticed that until now, all Java
    programs, when executed, would start, process the data, execute the declared statements,
    and then terminate, exiting gracefully or with an exception when something went
    wrong. The simplest and most common way to pass decision of termination to the
    user is to end the `main()` method with a call to `System.in.read()`. This method
    reads the next byte of data from the input stream, and the program is paused until
    the user introduces a value; as the value is returned, we can even save it and
    print it. Listing [10-1](#463938_3_En_10_Chapter.xhtml#PC1) shows the code to
    read user input using `System.in.read`.


    ```

    package com.apress.bgn;

    import java.io.IOException;

    import static java.lang.System.out;

    import static java.lang.System.in;

    public class ReadingFormStdinDemo {

    public static void main(String... args) throws IOException {

    out.print("Press any key to terminate:");

    byte[] b = new byte[3];

    int read = in.read(b);

    for (int i = 0; i < b.length; ++i) {

    out.println(b[i]);

    }

    out.println("Key pressed: " + read);

    }

    }

    Listing 10-1

    Reading a Value Provided by the User in the Console

    ```


    The user input is saved in the `byte[] b` array; its size is arbitrary. You can
    type anything you want. Only the first three bytes will be kept in the array.
    However, this way of reading information is not really useful, is it? Take a look
    at the following snippet, which depicts the previous code being executed and random
    text being inserted:


    ```

    Press any key to terminate: ini mini miny moo.  # inserted text


    Key pressed: 3

    ```


    Using `System.in` to interact with a java application.


    ### Using `java.util.Scanner`


    The `System.in` variable is of type `java.io.InputStream`, which is a JDK special
    type extended by all classes representing an input stream of bytes. (You will
    learn more about the class `InputStream` in Chapter [11](#463938_3_En_11_Chapter.xhtml).)
    This means that `System.in` can be wrapped in any `java.io.Reader` extension (also
    discussed in Chapter [11](#463938_3_En_11_Chapter.xhtml)), so bytes can be read
    as readable data. The one that is really important is a class named `Scanner`
    from package `java.util`. An instance of this type can be created by calling its
    constructor and providing `System.in` as an argument. The `Scanner` class provides
    a lot of `next*()` methods that can be used to read almost any type from the console.
    In Figure [10-1](#463938_3_En_10_Chapter.xhtml#Fig1) you can see the `next*()`
    methods list.


    ![](images/463938_3_En_10_Chapter/463938_3_En_10_Fig1_HTML.jpg)


    Figure 10-1


    Scanner methods for reading various types of data


    The advantage of using `Scanner` to read data from the console is that the values
    read are automatically converted to the proper types, when possible; when not
    possible, a `java.util.InputMismatchException` is thrown.


    The code in Listing [10-2](#463938_3_En_10_Chapter.xhtml#PC3) is designed so that
    you can select the type of value you want to read by inserting text and then the
    value. The appropriate method of the `Scanner` instance is called to read the
    value.


    ```

    package com.apress.bgn;

    import java.math.BigInteger;

    import java.util.ArrayList;

    import java.util.List;

    import java.util.Scanner;

    import static java.lang.System.out;

    public class ReadingFromStdinUsingScannerDemo {

    public static final String EXIT = "exit";

    public static final String HELP = "help";

    public static final String BYTE = "byte";

    public static final String SHORT = "short";

    public static final String INT = "int";

    public static final String BOOLEAN = "bool";

    public static final String DOUBLE = "double";

    public static final String LINE = "line";

    public static final String BIGINT = "bigint";

    public static final String TEXT = "text";

    public static final String LONGS = "longs";

    public static void main(String... args) {

    Scanner sc = new Scanner(System.in);

    var help = getHelpString();

    out.println(help);

    String input;

    do {

    out.print("Enter option: ");

    input = sc.nextLine();

    switch (input) {

    case HELP:

    out.println(help);

    break;

    case EXIT:

    out.println("Hope you had fun. Buh-bye!");

    break;

    case BYTE:

    byte b = sc.nextByte();

    out.println("Nice byte there: " + b);

    sc.nextLine();

    break;

    case SHORT:

    short s = sc.nextShort();

    out.println("Nice short there: " + s);

    sc.nextLine();

    break;

    case INT:

    int i = sc.nextInt();

    out.println("Nice int there: " + i);

    sc.nextLine();

    break;

    case BOOLEAN:

    boolean bool = sc.nextBoolean();

    out.println("Nice boolean there: " + bool);

    sc.nextLine();

    break;

    case DOUBLE:

    double d = sc.nextDouble();

    out.println("Nice double there: " + d);

    sc.nextLine();

    break;

    case LINE:

    String line = sc.nextLine();

    out.println("Nice line of text there: " + line);

    break;

    case BIGINT:

    BigInteger bi = sc.nextBigInteger();

    out.println("Nice big integer there: " + bi);

    sc.nextLine();

    break;

    case TEXT:

    String text = sc.next();

    out.println("Nice text there: " + text);

    sc.nextLine();

    break;

    default:

    out.println("No idea what you want bruh!");

    }

    } while (!input.equalsIgnoreCase(EXIT));

    }

    private static String getHelpString() {

    return """

    This application helps you test various usage of Scanner. Enter type to be read
    next:\

    \n\t help >  displays this help\

    \n\t exit >  leave the application\

    \n\t byte > read a byte\

    \n\t short > read a short\

    \n\t int > read an int\

    \n\t bool > read a boolean\

    \n\t double > read a double\

    \n\t line > read a line of text\

    \n\t bigint > read a BigInteger\

    \n\t text > read a text value""";

    }

    }

    Listing 10-2

    Reading a Value Provided by the User in the Console Using java.util.Scanner

    ```'
