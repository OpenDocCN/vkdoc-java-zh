    \ this book is intended for absolute beginners. You don’t even have to know what\
    \ a programming language is; you just need to be familiar enough with your operating\
    \ system to install the tools you need for Java development.\n\nMost Java books\
    \ for beginners start with the typical *Hello World!* example depicted in Listing\
    \ [1-1](#463938_3_En_1_Chapter.xhtml#PC1).\n\n```\npublic class HelloWorld {\n\
    public static void main(String[] args) {\nSystem.out.println(\"Hello World!\"\
    );\n}\n}\nListing 1-1\nThe Most Common Java Beginner Code Sample\n```\n\nThis\
    \ code, when executed, prints *Hello World!* in the console. However, because\
    \ you are reading this book, I assume that you want to develop real applications\
    \ in Java, and possibly want to have a realistic chance when applying for a position\
    \ as a Java developer. If this is what you want and is who you are—a beginner\
    \ with the wits and the desire to make full use of this language’s power—then\
    \ this book is for you. Based on that assumption, I will give you enough credit\
    \ to start this book with a more complex example than *Hello World!*.\n\nJava\
    \ is a language with a syntax that is readable and based on the English language.\
    \ So, if you are a logical thinker and have a working knowledge of the English\
    \ language, it should be obvious to you what the code in Listing [1-2](#463938_3_En_1_Chapter.xhtml#PC2)\
    \ does without even executing it.\n\n```\npackage com.apress.ch.one.hw;\nimport\
    \ java.util.List;\npublic class Example01 {\npublic static void main(String[]\
    \ args) {\nvar items = List.of(\"1\", \"a\", \"2\", \"a\", \"3\", \"a\");\nitems.forEach(item\
    \ -> {\nif (item.equals(\"a\")) {\nSystem.out.println(\"A\");\n} else {\nSystem.out.println(\"\
    Not A\");\n}\n});\n}\n}\nListing 1-2\nThe Java Beginner Code Sample a Smart Beginner\
    \ Deserves\n```\n\nIn this code example, a list of text values is declared; then\
    \ the list is traversed, and when a text is equal to “a”, the letter “A” is printed\
    \ in the console; otherwise, “Not A” is printed.\n\nIf you are an absolute beginner\
    \ to programming, this book is for you, especially because the sources attached\
    \ to this book make use of algorithms and design patterns commonly used in programming.\
    \ This book introduces you to the Java programming language, the core libraries,\
    \ and tools any Java developer needs, and covers both imperative and declarative\
    \ programming examples. So, if your plan is to get into programming and learn\
    \ a high-level programming language, read the book, run the examples, write your\
    \ own code, and you should have a good head start.\n\nIf you already know Java,\
    \ you can use this book too, because it covers syntax and under-the-hood details\
    \ for Java versions up to 23, and you will surely find some helpful tidbits that\
    \ you did not know.\n\n## How This Book Is Structured\n\nThe chapter you are currently\
    \ reading is an introductory one that covers a small part of Java history, showing\
    \ you how the language has evolved and providing a glimpse into its future. Also,\
    \ the mechanics of executing a Java application are covered, so that you are prepared\
    \ for **Chapter** [**2**](#463938_3_En_2_Chapter.xhtml), which consists of instructions\
    \ to set up your development environment and introduces you to a first simple\
    \ application.\n\nStarting with **Chapter** [**3**](#463938_3_En_3_Chapter.xhtml),\
    \ fundamental parts of the language will be covered: packages, modules, classes,\
    \ interfaces, annotations, objects, operators, data types, records, statements,\
    \ streams, lambda expressions, and so on.\n\nStarting with **Chapter** [**8**](#463938_3_En_8_Chapter.xhtml),\
    \ interactions with external data sources are covered: reading and writing files,\
    \ serializing/deserializing objects, testing and creating a user interface, writing\
    \ a simple web application, interacting with it using the Java HTTP client, and\
    \ packing it into a container image.\n\n**Chapter** [**12**](#463938_3_En_12_Chapter.xhtml)\
    \ is dedicated fully to the publish-subscribe framework introduced in Java 9 and\
    \ reactive programming.\n\n**Chapter** [**13**](#463938_3_En_13_Chapter.xhtml)\
    \ will cover the Garbage Collector.\n\nMost of the sources used in the listings\
    \ in this book, and some that did not make it (to keep the book to a reasonable\
    \ size), are part of a project named `java-23-for-absolute-beginners`. This project\
    \ is organized in subprojects, also called *modules* (thus it is a *multimodule*\
    \ project), that are linked to each other and have to be managed by something\
    \ called **Apache Maven**. The sources that are not part of the Maven project\
    \ are designed to be built separately.\n\nMaven is something we developers call\
    \ a *build tool*, and it provides the capability to build projects containing\
    \ a lot of source code. To *build* a project means transforming the code written\
    \ into something that can be executed. I choose to use multimodule projects for\
    \ the books I write because they are easier to build and because common elements\
    \ can be grouped, keeping the configuration of the project simple and nonrepetitive.\
    \ Also, by having all the sources organized in one multimodule project, you get\
    \ the feedback if the sources are not working as soon as possible, enabling you\
    \ to notify the author to update them. I know that having a build tool introduces\
    \ a certain level of complexity, but it gives you the opportunity to get comfortable\
    \ with a development environment very similar to what you will work in as an Java\
    \ developer. However, you don’t need to worry about how to use build tools immediately,\
    \ because **Chapter** [**2**](#463938_3_En_2_Chapter.xhtml) starts by explaining\
    \ how to run Java code directly, without needing a build tool.\n\n## Conventions\n\
    \nThis book uses several formatting conventions that should make it easier to\
    \ read. To that end, the following conventions are used within the book:\n\n*\
    \   Code or concept names in sentences appear as follows: `java.util.List`\n\n\
    *   Code listings appear as follows:\n\n    ```\n    public static void main(String[]\
    \ args) {\n    System.out.println(\"Hello World!\");\n    }\n    ```\n\n*   Logs\
    \ in console outputs appear as follows:\n\n    ```\n    01:24:07.809 [main] INFO\
    \ c.a.Application - Starting Application\n    01:24:07.814 [main] DEBUG c.a.p.c.Application\
    \ - Running in debug mode\n    ```\n\n*   `{xx}` is a placeholder, where the `xx`\
    \ value is a pseudo-value giving a hint about the real value that should be used\
    \ in the command or statement. For example, `{YourVariableName}`.\n\n*   Notice\
    \ boxes labeled **IMPORTANT**, **WARNING**, **TIP**, **NOTE**, and **CAUTION**\
    \ appear throughout the book. The name of the label conveys the importance and\
    \ scope of the labeled statement.\n\n*   **Bold** font is used for chapter cross-references\
    \ and important terms. It is also used to put emphasis on terms within the code.\
    \ Underlining terms in code will be used for the same purpose.\n\n*   *Italic*\
    \ font is used for somewhat important terms, humorous metaphors and expressions.\n\
    \nAs for my style of writing, I like to write my books in the same way I have\
    \ technical conversations with colleagues and friends, sprinkling jokes, giving\
    \ production examples and making analogies to non-programming situations, because\
    \ programming is nothing but just another way to model the real world."
  trans: "\n## 本书面向的读者\n\n正如书名《Java 23 极速入门》所示，本书面向的是零基础读者。你甚至不需要知道什么是编程语言；只需熟悉操作系统，能够安装\
    \ Java 开发所需的工具即可。\n\n大多数面向初学者的 Java 书籍都会从清单 1-1 中经典的 *Hello World!* 示例开始。\n\n\
    ```\npublic class HelloWorld {\npublic static void main(String[] args) {\nSystem.out.println(\"\
    Hello World!\");\n}\n}\n清单 1-1\n最常见的 Java 初学者代码示例\n```\n\n这段代码执行后会在控制台输出 *Hello\
    \ World!*。然而，既然你正在阅读本书，我假设你希望用 Java 开发真正的应用程序，并且可能希望在申请 Java 开发职位时拥有切实的竞争力。如果你正是如此——一个渴望充分发挥这门语言强大功能的聪明初学者——那么本书就是为你准备的。基于这个假设，我会给予你足够的信任，用一个比\
    \ *Hello World!* 更复杂的示例来开启本书。\n\nJava 是一种语法可读性强且基于英语的语言。因此，如果你具备逻辑思维能力，并且掌握基本的英语知识，那么即使不执行代码，清单\
    \ 1-2 中的代码功能对你来说也应该一目了然。\n\n```\npackage com.apress.ch.one.hw;\nimport java.util.List;\n\
    public class Example01 {\npublic static void main(String[] args) {\nvar items\
    \ = List.of(\"1\", \"a\", \"2\", \"a\", \"3\", \"a\");\nitems.forEach(item ->\
    \ {\nif (item.equals(\"a\")) {\nSystem.out.println(\"A\");\n} else {\nSystem.out.println(\"\
    Not A\");\n}\n});\n}\n}\n清单 1-2\n聪明初学者应得的 Java 代码示例\n```\n\n在这个代码示例中，声明了一个文本值列表；然后遍历该列表，当某个文本等于“a”时，在控制台输出字母“A”；否则输出“Not\
    \ A”。\n\n如果你是完全的编程新手，本书非常适合你，尤其是因为本书附带的源代码使用了编程中常用的算法和设计模式。本书将向你介绍 Java 编程语言、核心库以及任何\
    \ Java 开发者所需的工具，并涵盖命令式和声明式编程示例。因此，如果你计划进入编程领域并学习一门高级编程语言，请阅读本书、运行示例、编写自己的代码，你将会有一个良好的开端。\n\
    \n如果你已经了解 Java，同样可以使用本书，因为它涵盖了截至 Java 23 的语法和底层细节，你一定会发现一些之前不知道的有用知识。\n\n## 本书结构\n\
    \n你正在阅读的本章是一个介绍性章节，涵盖了 Java 历史的一小部分，展示了这门语言是如何演进的，并让你一窥其未来。此外，本章还介绍了执行 Java 应用程序的机制，为你学习**第**\
    \ **2****章**做好准备，该章包含设置开发环境的说明，并向你介绍第一个简单的应用程序。\n\n从**第** **3****章**开始，将介绍语言的基础部分：包、模块、类、接口、注解、对象、运算符、数据类型、记录、语句、流、Lambda\
    \ 表达式等。\n\n从**第** **8****章**开始，将介绍与外部数据源的交互：读写文件、序列化/反序列化对象、测试和创建用户界面、编写简单的 Web\
    \ 应用程序、使用 Java HTTP 客户端与其交互，并将其打包成容器镜像。\n\n**第** **12****章**专门介绍 Java 9 中引入的发布-订阅框架和响应式编程。\n\
    \n**第** **13****章**将介绍垃圾回收器。\n\n本书清单中使用的大部分源代码（以及一些为了控制篇幅而未收录的代码）都属于一个名为 `java-23-for-absolute-beginners`\
    \ 的项目。该项目按子项目（也称为*模块*）组织，因此是一个*多模块*项目，这些模块相互关联，需要通过名为 **Apache Maven** 的工具进行管理。不属于\
    \ Maven 项目的源代码则设计为单独构建。\n\nMaven 是我们开发者称之为*构建工具*的东西，它提供了构建包含大量源代码的项目的能力。*构建*项目意味着将编写的代码转换成可执行的形式。我选择为我编写的书籍使用多模块项目，因为它们更容易构建，并且可以将公共元素分组，使项目配置保持简单且不重复。此外，通过将所有源代码组织在一个多模块项目中，如果源代码无法正常工作，你可以尽快获得反馈，从而能够通知作者进行更新。我知道引入构建工具会增加一定的复杂性，但它能让你有机会熟悉一个与\
    \ Java 开发者实际工作环境非常相似的开发环境。不过，你无需立即担心如何使用构建工具，因为**第** **2****章**会从解释如何直接运行 Java\
    \ 代码开始，无需构建工具。\n\n## 排版约定\n\n本书使用了几种排版约定，以便于阅读。为此，书中采用了以下约定：\n\n*   句子中的代码或概念名称显示如下：`java.util.List`\n\
    \n*   代码清单显示如下：\n\n    ```\n    public static void main(String[] args) {\n   \
    \ System.out.println(\"Hello World!\");\n    }\n    ```\n\n*   控制台输出中的日志显示如下：\n\
    \n    ```\n    01:24:07.809 [main] INFO c.a.Application - Starting Application\n\
    \    01:24:07.814 [main] DEBUG c.a.p.c.Application - Running in debug mode\n \
    \   ```\n\n*   `{xx}` 是一个占位符，其中 `xx` 值是一个伪值，提示应在命令或语句中使用的实际值。例如，`{YourVariableName}`。\n\
    \n*   书中通篇会出现标注为**重要**、**警告**、**提示**、**注意**和**小心**的提示框。标签名称传达了标注语句的重要性和范围。\n\n\
    *   **粗体**字体用于章节交叉引用和重要术语。也用于强调代码中的术语。代码中加下划线的术语也用于相同目的。\n\n*   *斜体*字体用于较为重要的术语、幽默的比喻和表达。\n\
    \n至于我的写作风格，我喜欢以与同事和朋友进行技术交流的方式来写书，穿插笑话、提供生产环境示例，并与非编程场景进行类比，因为编程不过是模拟现实世界的另一种方式。\n"
- fmt: '# When Java Was Owned by Sun Microsystems


    The first stable version of Java was released in 1996. A very small team named
    **Green Team** worked on a prototype language named Oak (named by James Gosling
    after the oak tree in front of his house). The language was introduced to the
    world with a working demo—an interactive handheld home entertainment controller
    called the Star7. The “star” of the animated touch-screen user interface was a
    cartoon character named **Duke**, created by one of the team’s graphic artists,
    Joe Palrang. Over the years, Duke (see Figure [1-1](#463938_3_En_1_Chapter.xhtml#Fig1))
    has become the official Java technology mascot, and every JavaOne conference (organized
    by Oracle once a year) has its own Duke mascot personality.


    ![](images/463938_3_En_1_Chapter/463938_3_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Duke, the Java official mascot (image source: [*https://www.oracle.com*](https://www.oracle.com))


    The Green Team released Java to the world as open source via the Internet, because
    that was the fastest way to create widespread adoption. You can imagine that they
    jumped for joy every time somebody downloaded it, because that meant people were
    interested in it. The main advantage of making software open source is that contributions
    and feedback are provided by a large number of people from all over the world.
    For Java, the release as open source was a great decision, as it shaped the language
    that a lot of developers are using today. Even after 28 years, Java is still among
    the top-three most-used programming languages.


    The Green Team was working for an American company named *Sun Microsystems*, founded
    in 1982. It guided the computer revolution by selling computers, computer parts,
    and software. One of their greatest achievements is the Java programming language.
    In Figure [1-2](#463938_3_En_1_Chapter.xhtml#Fig2), you can see the company logo^([²](#fn2))
    that was used since Java’s birth year until it was acquired by Oracle in 2010.


    ![](images/463938_3_En_1_Chapter/463938_3_En_1_Fig2_HTML.jpg)


    Figure 1-2


    The Sun Microsystems logo (image source: [*https://en.wikipedia.org/wiki/Sun_Microsystems*](https://en.wikipedia.org/wiki/Sun_Microsystems))


    It is quite difficult to find information about the first version of Java, but
    dedicated developers that witnessed its *birth*, when the World Wide Web was way
    smaller and full of static pages, did create blogs and shared their experience
    with the world. It was quite easy for Java to shine with its applets that displayed
    dynamic content that interacted with the user. The development team got bigger
    and Java became much more than a web programming language. In trying to make applets
    run in any browser, the team found a solution to a common problem: **portability**.


    Developers nowadays face a lot of headaches when developing software that should
    run on any operating system. And with the mobile revolution, things got really
    tricky. Figure [1-3](#463938_3_En_1_Chapter.xhtml#Fig3) shows an abstract drawing
    of what is believed to be the first Java logo.


    ![](images/463938_3_En_1_Chapter/463938_3_En_1_Fig3_HTML.jpg)


    Figure 1-3


    The first Java logo, 1996–2003 (image source: [`https://www.oracle.com`](https://www.oracle.com))


    Java 1.0 was released at the first edition of the JavaOne conference, which had
    over 6000 attendees. The language was really similar to C++ and was designed for
    handheld devices and set-top boxes. It evolved into the first version of Java,
    which provided developers the following advantages that C++ did not:


    * **Security**: In Java, there is no danger of reading bogus data when accidentally
    going over the size of an array.

    * **Automatic memory management**: A Java developer does not have to check if
    there is enough memory to allocate for an object and then deallocate it explicitly;
    the operations are automatically handled by the garbage collector. This also means
    that pointers are not necessary.

    * **Simplicity**: Java has no pointers, unions, templates, or structures. Mostly
    anything in Java can be declared as a class. Also, confusion when using multiple
    inheritance is avoided by modifying the inheritance model and not allowing multiple
    class inheritance.

    * **Support for multithreaded execution**: Java was designed from the start to
    support development of multithreaded software.

    * **Portability**: One of the most known Java mottos is **Write once, run anywhere**.
    This is made possible by the Java Virtual Machine.


    All these features made Java appealing for developers, and by 1997, when Java
    1.1 was released, there were already approximately 400,000 Java developers in
    the world. The JavaOne conference had 10,000 attendees that year. The path to
    greatness was set. Before going further in our analysis of each Java version,
    let’s clarify a few things.'
