    to print a message when the array element value is different from 2.


    *   `<` (less than) and `<=` (less than or equal with) have the same purpose as
    you probably learned in math class: `<` tests if the item on the left of the operator
    is less than the one on the right, and `<=` tests if the item on the left of the
    operator is less or equal to the one on the right. The `<=` operator cannot be
    used on reference types.


    *   `>` and `>=` also have the same purpose as you probably learned in math class:
    `>` tests if the item on the left of the operator is greater than the one on the
    right, and `>=` tests if the item on the left of the operator is greater than
    or equal to the one on the right. The `>=` operator cannot be used on reference
    types.


