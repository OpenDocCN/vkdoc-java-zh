- fmt: '### String Concatenation


    Java does not have a way to embed variables in strings to be resolved at runtime.
    Most developers can work around this problem by using various string concatenation
    and formatter methods. Class `com.apress.bgn.five.PseudoTemplatesDemo` demonstrates
    all these methods. You can see its code in Listing [5-31](#463938_3_En_5_Chapter.xhtml#PC57),
    together with comments indicating the drawbacks of using each method.


    ```

    package com.apress.bgn.five;

    import com.apress.bgn.four.classes.Musician;

    import java.text.MessageFormat;

    public class PseudoTemplatesDemo {

    void main() {

    var bryce = new Musician("Bryce", 38, 1.72f, "High School Rock", "Metal");

    // hard to read

    // concatenation using +

    var introduction = "My name is " + bryce.getName() +"  and I am "

    + bryce.getAge() +" years old.";

    System.out.println("[using ''+''] -> " + introduction);

    // still hard to read

    // concatenation using String#concat

    introduction = "My name is ".concat(bryce.getName()).concat("  and I am ")

    .concat(String.valueOf(bryce.getAge())).concat(" years old.");

    System.out.println("[using ''concat(..)''] -> " + introduction);

    // verbose, hard to read as well

    // concatenation using StringBuilder

    // similar approach to using StringBuffer

    introduction = new StringBuilder("My name is ").append(bryce.getName()).append("  and
    I am ")

    .append(bryce.getAge() ).append(" years old.").toString();

    System.out.println("[using ''StringBuilder#append(..)'' ] -> " + introduction);

    // numbber of arguments mismatch

    // concatenation using String.format

    introduction = String.format("My name is %s and I am %d years old.", bryce.getName()
    , bryce.getAge());

    System.out.println("[using `String.format(..)`] -> " + introduction);

    // number of arguments mismatch

    // concatenation using MessageFormat.format

    introduction = MessageFormat.format("My name is {0} and I am {1} years old.",
    bryce.getName() , bryce.getAge());

    System.out.println("[using ''MessageFormat.format(..)''] -> " + introduction);

    // Java 15

    // concatenation using String#formatted

    introduction = introduction.formatted(bryce.getName() , bryce.getAge());

    System.out.println("[using ''String#formatted(..)'']:  -> " + introduction);

    }

    }

    Listing 5-31

    Java Code Workarounds for Lack of Embedded Variables

    ```


    Embedded variables resolved at runtime, also known as *string interpolation*,
    is a concept that Java finally implemented via preview JEP 430 in Java 21, and
    continued the work in Java 22 via JEP 459^([^(54)](#fn54)), but it was finally
    dropped in Java 23. Most languages implement string interpolation in the following
    way:


    - Evaluate expression/variable

    - Convert to `String` if needed

    - Insert resulting `String` into the original `String` literal


    While string interpolation is extremely helpful, it has a few drawbacks:


    - Replacing the result of the interpolation would create an invalid overall string
    literal without validation, which opens up the possibility of SQL injections.

    - And invalid JSON, if the test being processed is in this format.

    - The results need to be validated or secured, especially when interacting with
    other systems.


    Java designers wanted to improve on this, but the way they chose to do it did
    not have developers rejoice about it, so string interpolation is not included
    in Java 23.


    ### Wrapper Classes for Primitive Types


    As mentioned in the **Primitive Data Types** section of this chapter, each primitive
    type has a corresponding reference type. Before covering each of them and why
    they are needed, check out Table [5-2](#463938_3_En_5_Chapter.xhtml#Tab2).


    **Table 5-2** Java Primitive Types and Equivalent Reference Types


    | Primitive Type | Reference Type |

    | --- | --- |

    | `char` | `java.lang.Character` |

    | `boolean` | `java.lang.Boolean` |

    | `byte` | `java.lang.Byte` |

    | `short` | `java.lang.Short` |

    | `int` | `java.lang.Integer` |

    | `long` | `java.lang.Long` |

    | `float` | `java.lang.Float` |

    | `double` | `java.lang.Double` |


    The Java wrapper classes wrap a value of the primitive type with the same name.
    In addition, these classes provide methods for converting primitive values to
    `String` and vice versa, as well as constants and methods that are useful when
    dealing with primitive types that need to be treated as objects. The numeric wrapper
    classes are related in that all of them extend the `Number` class, as depicted
    in Figure [5-19](#463938_3_En_5_Chapter.xhtml#Fig19).


    ![](images/463938_3_En_5_Chapter/463938_3_En_5_Fig19_HTML.jpg)


    **Figure 5-19** Java primitive and equivalent reference types


    The code samples in this section will use mostly the `Integer` class, but the
    other numeric wrapper classes can be used in a similar way. Converting a primitive
    value to its equivalent reference is called **boxing**; the reverse process is
    called **unboxing**. JVM does these conversions automatically in most situations;
    the term **autoboxing** was introduced to refer to the process of boxing, while
    for some reason automatic unboxing is still called **unboxing**.


    The code sample depicted in Listing [5-32](#463938_3_En_5_Chapter.xhtml#PC58)
    contains a few operations with `Integer` and `int` values.


    ```

    package com.apress.bgn.five;

    public class WrapperDemo {

    void main() {

    // upper interval boundary for int

    Integer max = Integer.MAX_VALUE;

    System.out.println(max);

    //autoboxing Integer -> int

    int pmax = max;

    //autoboxing int -> Integer

    Integer io = 10;

    //creating primitive utility method

    //exception is thrown, if string is not a number

    int i1 = Integer.parseInt("11");

    //exception is thrown, if string is not a number

    Integer i3 = Integer.valueOf("12");

    //convert int into to String

    String s0 = Integer.toString(13);

    //convert int to float

    float f0 = Integer.valueOf(14).floatValue();

    //creating string with binary representation of number 9 (1001)

    String s1 = Integer.toBinaryString(9);

    //introduced in Java 1.8

    Integer i4 = Integer.parseUnsignedInt("+15");

    //method to add to integers

    int sum = Integer.sum(2, 3);

    //method to get the bigger value

    int maximum = Integer.max(2, 7);

    }

    }

    Listing 5-32

    Autoboxing and Unboxing in Action

    ```


    The `Character` and `Boolean` types are a little different, because these types
    are not numeric, so they cannot be converted to any numeric values. They cannot
    be converted one to another either. Oracle provides good documentation for its
    classes, so if you are curious about using these two types, check out the official
    JDK API documentation^([^(55)](#fn55)).'
