    using breakpoints.


    ![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig8_HTML.jpg)


    Figure 9-8


    IntelliJ IDEA `SortingLogbackDemo` class paused during execution


    To run an application in debug mode, instead of starting the launcher normally,
    start it by clicking the green bug-shaped button with a curved arrow (marked with
    a red **1.** in Figure [9-8](#463938_3_En_9_Chapter.xhtml#Fig8)) next to the green
    triangle-shaped button that is used to run the application normally.


    The application runs and stops at the first line marked with a breakpoint, enabling
    the developer to inspect the values of the variables on that line, as shown in
    the upper half of Figure [9-8](#463938_3_En_9_Chapter.xhtml#Fig8). From that point,
    the developer can also do the following in the **Debug** section at the bottom
    of Figure [9-8](#463938_3_En_9_Chapter.xhtml#Fig8):


    *   Continue the execution until the next breakpoint by clicking the green triangle-shaped
    button (left toolbar, marked in Figure [9-8](#463938_3_En_9_Chapter.xhtml#Fig8)
    with **2.**).


    *   Stop the execution by clicking the red square-shaped button (left toolbar).


    *   Disable all breakpoints by clicking the button with a red bubble cut diagonally
    (left toolbar).


    *   Continue execution to the next line of code by clicking the button with a
    thin black arrow with a 90-degree angle (left toolbar).


    *   Continue execution by entering the method in the current line of code by clicking
    the button with a thin black arrow oriented down with an underscore at its tip
    (left toolbar).


    Important


    The **Force Step Into** and **Step Out of Code Block** options in the **Debug**
    menu marked in Figure [9-8](#463938_3_En_9_Chapter.xhtml#Fig8) with **3**. are
    used to step over and step into methods provided by third-party libraries. IntelliJ
    IDEA tries to find source code for those methods. If it can’t find source code,
    then it might show you an auto-generated stub based on the bytecode/library. The
    thin black arrows in the section marked with **2**. Only allow debugging of the
    current project code.


    *   Continue execution by stepping out of the current method by choosing the **Step
    Out of Code Block** option from the drop-down menu marked in Figure [9-8](#463938_3_En_9_Chapter.xhtml#Fig8)
    with **3.**


    *   Continue the execution to the line pointed at by the cursor by choosing the
    **Run to Cursor** option from the drop-down menu marked in Figure [9-8](#463938_3_En_9_Chapter.xhtml#Fig8)
    with **3.**


    *   Evaluate your own expressions by adding them to the **Watches** section marked
    in Figure [9-8](#463938_3_En_9_Chapter.xhtml#Fig8) with 4, by using the button
    marked with 5\. The only condition is that the expressions only use variables
    that are accessible in the context of the breakpoint line. E.g. are part of the
    same method body, or class body and the accessor is not important, private fields
    can be inspected too.


    Another way to evaluate expression in the context of the application currently
    running is to right-click the file where your execution is currently paused and,
    from the context menu that opens, select the option **Evaluate Expression**. A
    dialog window opens where you can write complex expressions and then click **Evaluate**
    to evaluate them on the spot, as depicted in Figure [9-9](#463938_3_En_9_Chapter.xhtml#Fig9).


    ![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig9_HTML.jpg)


    Figure 9-9


    IntelliJ IDEA expression evaluation during debugging session


    Most Java smart editors provide means to run a Java application in debug mode;
    just make sure to clean up your Watches (or equivalent) section from time to time.
    If the expressions added in the Watches section are expensive to evaluate, they
    might affect the performance of the application. Also, be aware of expressions
    that use streams, since these might make the application fail, as proven in **Chapter**
    [**8**](#463938_3_En_8_Chapter.xhtml).


    ### Inspect a Running Application Using Java Tools


    Aside from the executables to compile Java code and execute or package Java bytecode,
    the JDK provides a set of utility executables that can be used to debug and inspect
    the state of a running Java application. This section covers the most useful of
    them. Without further ado, let’s do this!'
  trans: '

    ### 逐步调试


    如果你不想编写日志消息或使用断言，但仍希望在程序执行期间检查变量的值，有一种方法可以使用 IDE 来实现，正如前几章所述：使用断点暂停执行，然后利用 IDE
    检查变量内容或执行简单语句，以验证程序是否按预期运行。


    **断点**是设置在可执行代码行（非注释行、空行或声明行）上的标记。要在 IntelliJ IDEA 中设置断点，可以点击目标行左侧的装订线区域，或者选中该行后，从
    **Run** 菜单中选择 **Toggle Line Breakpoint** 选项。断点设置成功后，装订线区域对应行会出现一个红色圆点。图 9-7 展示了在
    IntelliJ IDEA 中设置的几个断点。


    ![](img/463938_3_En_9_Fig7_HTML.jpg)


    图 9-7


    IntelliJ IDEA 断点


    一旦断点设置完成，当应用程序以调试模式运行时，它会在每个标记行暂停。在暂停期间，你可以逐步执行代码、检查变量值，甚至可以在正在运行的应用程序上下文中计算表达式。IntelliJ
    IDEA 在这方面非常有用，它会显示当前执行的每一行代码中所有变量的内容。在图 9-8 中，`SortingLogbackDemo` 类正在以调试模式运行，并在执行过程中通过断点暂停。


    ![](img/463938_3_En_9_Fig8_HTML.jpg)


    图 9-8


    IntelliJ IDEA 中 `SortingLogbackDemo` 类在执行过程中暂停


    要以调试模式运行应用程序，不要像平常那样启动启动器，而是点击绿色三角形按钮（用于正常启动应用程序）旁边的绿色虫子形状带箭头按钮（在图 9-8 中用红色 **1.**
    标记）。


    应用程序运行并在第一个标记了断点的行停止，使开发者能够检查该行变量的值，如图 9-8 的上半部分所示。从该点开始，开发者还可以在图 9-8 底部的 **Debug**
    部分执行以下操作：


    *   点击绿色三角形按钮（左侧工具栏，在图 9-8 中用 **2.** 标记）继续执行直到下一个断点。


    *   点击红色方形按钮（左侧工具栏）停止执行。


    *   点击带有对角斜线红色圆点的按钮（左侧工具栏）禁用所有断点。


    *   点击带有 90 度角细黑箭头的按钮（左侧工具栏）继续执行到下一行代码。


    *   点击带有向下细黑箭头且尖端带下划线的按钮（左侧工具栏）进入当前代码行的方法内部继续执行。


    重要提示


    图 9-8 中用 **3.** 标记的 **Debug** 菜单中的 **Force Step Into** 和 **Step Out of Code Block**
    选项用于单步跳过或进入第三方库提供的方法。IntelliJ IDEA 会尝试查找这些方法的源代码。如果找不到源代码，它可能会显示一个基于字节码/库自动生成的存根。用
    **2.** 标记的部分中的细黑箭头仅允许调试当前项目代码。


    *   从图 9-8 中用 **3.** 标记的下拉菜单中选择 **Step Out of Code Block** 选项，跳出当前方法继续执行。


    *   从图 9-8 中用 **3.** 标记的下拉菜单中选择 **Run to Cursor** 选项，继续执行到光标所在行。


    *   通过使用标记为 5 的按钮，将自定义表达式添加到图 9-8 中用 4 标记的 **Watches** 部分进行评估。唯一条件是表达式只能使用在断点行上下文中可访问的变量。例如，这些变量属于同一方法体或类体，且访问修饰符不重要，私有字段也可以被检查。


    另一种在当前运行的应用程序上下文中评估表达式的方法是，右键单击当前执行暂停所在的文件，从打开的上下文菜单中选择 **Evaluate Expression**
    选项。将打开一个对话框窗口，你可以在其中编写复杂表达式，然后点击 **Evaluate** 立即评估它们，如图 9-9 所示。


    ![](img/463938_3_En_9_Fig9_HTML.jpg)


    图 9-9


    IntelliJ IDEA 调试会话期间的表达式评估


    大多数 Java 智能编辑器都提供了以调试模式运行 Java 应用程序的方法；只需记得定期清理你的 Watches（或等效）部分。如果添加到 Watches
    部分的表达式评估成本很高，可能会影响应用程序的性能。同时，要注意使用流的表达式，因为这些表达式可能导致应用程序失败，正如**第** **8** **章**所证明的那样。


    ### 使用 Java 工具检查正在运行的应用程序


    除了用于编译 Java 代码以及执行或打包 Java 字节码的可执行文件外，JDK 还提供了一组实用可执行文件，可用于调试和检查正在运行的 Java 应用程序的状态。本节将介绍其中最有用的几个。闲话少叙，我们开始吧！

