    //[main] INFO com.apress.bgn.twelve.dummy.BasicIntTransformer -- Initial value:
    95

    //[main] INFO com.apress.bgn.twelve.dummy.BasicIntTransformer -- Result: _

    //[main] INFO com.apress.bgn.twelve.dummy.BasicIntTransformer -- Initial value:
    33

    //[main] INFO com.apress.bgn.twelve.dummy.BasicIntTransformer -- Result: !

    // ..

    代码清单 12-1

    生成无限数量的小于 127 的整数

    ```


    代码清单 12-1 中的每一行代码都有其目的和期望的结果。这种方法被称为*命令式编程*，因为它按顺序执行一系列语句以产生期望的输出。然而，这并不是我们的目标。在本节中，我们将使用
    JDK 响应式接口的实现来实现一个响应式解决方案，因此我们需要以下组件：


    *   一个发布者组件，它利用无限流来生成随机整数值。该类应实现 `Flow.Publisher<Integer>` 接口。

    *   一个处理器，仅选择可以转换为可见字符的整数值，在我们的解决方案中，这些字符的编码范围是 [0,127]。该类应实现 `Flow.Processor<Integer,
    Integer>`。

    *   一个处理器，修改接收到的偶数且在 98 到 122 之间的元素，减去 32。该类也应实现 `Flow.Processor<Integer, Integer>`。

    *   一个处理器，将整数元素转换为对应的字符。这是一种特殊类型的处理器，它将一种类型的值映射为另一种类型的值，应实现 `Flow.Processor<Integer,
    Character>`。

    *   一个订阅者，打印从链中最后一个处理器接收到的元素。该类将实现 `Flow.Subscriber<Character>` 接口。


    让我们从声明 `Publisher<T>` 开始，它将包装一个无限流以生成待消费的值。我们将通过提供一个完整的、具体的实现来异步提交元素，从而实现 `Flow.Publisher<Integer>`
    接口。为了在需要时缓冲它们，需要添加大量代码。幸运的是，`SubmissionPublisher<T>` 类已经实现了这一点，因此，在我们的类内部，我们将使用一个
    `SubmissionPublisher<Integer>` 对象。发布者的代码如代码清单 12-2 所示。

