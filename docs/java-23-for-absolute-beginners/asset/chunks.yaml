  trans: '

    ## 当 Java 属于 Sun Microsystems 时


    Java 的第一个稳定版本于 1996 年发布。一个名为**Green Team**（绿色团队）的极小团队，致力于开发一款名为 Oak（橡树，由 James
    Gosling 以其屋前的橡树命名）的原型语言。该语言通过一个可运行的演示——一款名为 Star7 的交互式手持家庭娱乐控制器——向世界亮相。这个动画触摸屏用户界面的“明星”是一个名为**Duke**（杜克）的卡通角色，由团队中的一位图形艺术家
    Joe Palrang 创作。多年来，Duke（见图 1-1）已成为 Java 技术的官方吉祥物，并且每届 JavaOne 大会（由 Oracle 每年组织一次）都有其专属的
    Duke 吉祥物形象。


    ![](img/463938_3_En_1_Fig1_HTML.jpg)


    图 1-1


    Java 官方吉祥物 Duke（图片来源：[`https://www.oracle.com`](https://www.oracle.com)）


    Green Team 通过互联网将 Java 作为开源软件发布给全世界，因为这是实现广泛采用的最快方式。你可以想象，每当有人下载它时，他们都会欢呼雀跃，因为这意味着人们对它感兴趣。将软件开源的主要优势在于，可以获得来自世界各地大量人员的贡献和反馈。对于
    Java 而言，开源发布是一个伟大的决定，它塑造了如今众多开发者使用的这门语言。即使在 28 年后的今天，Java 仍然位列最常用的三大编程语言之中。


    Green Team 当时为一家名为 *Sun Microsystems* 的美国公司工作，该公司成立于 1982 年。它通过销售计算机、计算机部件和软件引领了计算机革命。其最伟大的成就之一便是
    Java 编程语言。在图 1-2 中，你可以看到自 Java 诞生之年起，直至 2010 年被 Oracle 收购期间所使用的公司标志^(²)。


    ![](img/463938_3_En_1_Fig2_HTML.jpg)


    图 1-2


    Sun Microsystems 标志（图片来源：[`https://en.wikipedia.org/wiki/Sun_Microsystems`](https://en.wikipedia.org/wiki/Sun_Microsystems)）


    要找到关于 Java 第一个版本的信息相当困难，但那些见证了其*诞生*、当时万维网规模小得多且充满静态页面的资深开发者们，确实创建了博客并与世界分享了他们的经验。Java
    凭借其能够显示与用户交互的动态内容的小程序（applets）而大放异彩，这并非难事。开发团队不断壮大，Java 也远不止是一门网络编程语言。在试图让小程序能在任何浏览器中运行的过程中，团队找到了一个常见问题的解决方案：**可移植性**。


    如今的开发者在开发应能在任何操作系统上运行的软件时，面临着诸多头疼问题。而随着移动革命，情况变得尤为棘手。图 1-3 展示了一幅被认为是首个 Java 标志的抽象图。


    ![](img/463938_3_En_1_Fig3_HTML.jpg)


    图 1-3


    首个 Java 标志，1996–2003（图片来源：[`https://www.oracle.com`](https://www.oracle.com)）


    Java 1.0 是在首届 JavaOne 大会上发布的，该大会有超过 6000 名与会者。这门语言与 C++ 非常相似，专为手持设备和机顶盒设计。它演变成了
    Java 的第一个版本，为开发者提供了 C++ 所不具备的以下优势：


    *   **安全性**：在 Java 中，意外超出数组大小而读取虚假数据是没有风险的。


    *   **自动内存管理**：Java 开发者无需检查是否有足够内存为对象分配，然后再显式释放它；这些操作由垃圾回收器自动处理。这也意味着指针并非必需。


    *   **简单性**：Java 没有指针、联合体、模板或结构体。Java 中几乎所有内容都可以声明为类。此外，通过修改继承模型且不允许多重类继承，避免了使用多重继承时的混淆。


    *   **支持多线程执行**：Java 从一开始就被设计为支持多线程软件的开发。


    *   **可移植性**：Java 最著名的口号之一是**一次编写，到处运行**。这得益于 Java 虚拟机。


    所有这些特性使 Java 对开发者极具吸引力。到 1997 年 Java 1.1 发布时，全球已有大约 40 万名 Java 开发者。那年的 JavaOne
    大会有 10,000 名与会者。通往伟大的道路已然铺就。在进一步分析每个 Java 版本之前，让我们先澄清一些事情。

