- fmt: '### The `+` (Plus/Addition/Concatenation) Operator


    The `+` (plus) operator is used to add two numeric variables, as shown in the
    statements from Listing [6-15](#463938_3_En_6_Chapter.xhtml#PC23).


    ```

    jshell> int i = 4

    i ==> 4

    |  created variable i : int

    jshell> int j = 6

    j ==> 6

    |  created variable j : int

    jshell> int k = i + j

    k ==> 10

    |  created variable k : int

    jshell> int i = i + 2

    i ==> 6

    |  modified variable i : int

    |    update overwrote variable i : int

    Listing 6-15

    Adding Numeric Values in jshell

    ```


    The last statement, `int i = i + 2`, has the effect of incrementing the value
    of `i` with 2, and as you can see, it has a little redundancy. That statement
    can be written without referring to `i` twice, because its effect is to increase
    the value of `i` with 2. This can be done by using the `+=` operator, which is
    composed of the assignment operator and the addition operator. The optimal statement
    is `i += 2`.


    The `+` operator can also be used to concatenate `String` instances, or to concatenate
    `String` instances with other types. The JVM decides how to use the `+` operator
    depending on the context. For example, try to guess the output of the code in
    Listing [6-16](#463938_3_En_6_Chapter.xhtml#PC24) at runtime.


    ```

    package com.apress.bgn.six;

    import static java.lang.System.out;

    public class ConcatenationDemo {

    void main(){

    int i1 = 0;

    int i2 = 1;

    int i3 = 2;

    out.println(i1 + i2 + i3);

    out.println("Result1 = " + (i1 + i2) + i3);

    out.println("Result2 = " + i1 + i2 + i3);

    out.println("Result3 = " + (i1 + i2 + i3));

    }

    }

    Listing 6-16

    Concatenating String and int Values

    ```


    *So how did the guessing go?* Executing the code displays the following in the
    console:


    ```

    1. 3

    2. Result1 = 12

    3. Result2 = 012

    4. Result3 = 3

    ```


    The explanation for each line in this output is provided here:


    - Line 1: All operands are of type `int`, so JVM adds the terms as `int` values,
    and the `out.println` method prints this result.

    - Line 2: Parentheses isolate the addition of two terms, `(i1 + i2)`, so the JVM
    executes the addition between the parentheses as a normal addition between two
    `int` values. But after that, we are left with `"Result1 = " + 1 + i3`, and this
    operation includes a `String` operand, which means the `+` operator must be used
    as a concatenation operator, since adding a number with a text value does not
    work otherwise.

    - Line 3: We have three `int` operands and a `String` operand, and thus the JVM
    decides that the context of the operation cannot be numeric, so it chooses concatenation.

    - Line 4: Similar to the case in line 2, the parentheses ensure that the context
    of the operation is numeric, and thus the three operands are added.


    This is a typical example to show how JVM decides the context for operations involving
    the `+` operator that you might find in other Java tutorials as well. The `int`
    variables can be replaced with `float` or `double` and the behavior will be similar.


    Concatenation works with reference types too, since any Java type is by default
    an extension of `Object` and thus can be converted to `String`, by calling its
    `toString()` method. Listing [6-17](#463938_3_En_6_Chapter.xhtml#PC26) shows the
    concatenation between a `String` and a `Performer` instance.


