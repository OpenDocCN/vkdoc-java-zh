  raw: 'Selecting songs with distinct singers does not allow for parallel processing,
    because having multiple sets storing distinct singers does not ensure that the
    songs emitted downstream all have distinct singers. A use case that is suitable
    for parallel processing is finding the longest duration for a song in a stream.
    This use case is also suitable for short-circuiting the gatherer and stopping
    processing if a duration has been found that is above a custom limit. And since
    we only expect one element to be returned, a finisher is also suitable.


    The `LongestSong` gatherer and its usage are shown in Listing [8-48](#463938_3_En_8_Chapter.xhtml#PC65).


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class LongestSongDemo {

    record LongestSong(int limit) implements Gatherer, Integer> {

    @Override

    public Supplier> initializer() {

    return () -> new ArrayList(1);

    }

    @Override

    public Integrator, Song, Integer> integrator() {

    return Integrator.of((max, element, downstream) -> {

    if (max.isEmpty()) max.addFirst(element.getDuration());

    else if (element.getDuration() > max.getFirst()) max.set(0, element.getDuration());

    // "short-circuit": emit the current duration downstream

    // and return false to stop processing stream elements

    if (element.getDuration() >= limit) {

    downstream.push(element.getDuration());

    return false;

    }

    // Return true to continue processing stream elements

    return true;

    });

    }

    @Override

    public BinaryOperator> combiner() {

    return (left, right) -> {

    if (left.isEmpty()) return right;

    if (right.isEmpty()) return left;

    int leftVal = left.getFirst();

    int rightVal = right.getFirst();

    if (leftVal > rightVal) return left;

    else return right;

    };

    }

    @Override

    public BiConsumer, Downstream> finisher() {

    // Emit the largest integer, if there is one, downstream

    return (max, downstream) -> {

    if (!max.isEmpty()) {

    downstream.push(max.getFirst());

    }

    };

    }

    }

    void main(){

    var songs = StreamMediaLoader.loadSongs();

    var longestDuration = songs.gather(new LongestSong(360)).findFirst().orElse(-1);

    out.println("Longest duration: " + longestDuration + " seconds");

    }

    }

    Listing 8-48

    Stream Custom Gatherer for Computing the Longest Duration of a Song in a Stream

    ```


    In this example we use the initializer to declare an `ArrayList<Integer>` instance
    with a capacity of only one `Integer`, as it is meant to store the longest song
    duration the gatherer has encountered so far.


    The integrator compares the stream element duration with the value stored in the
    `ArrayList<Integer>` instance, and if it is greater than the stored value, it
    replaces it. Also, if the value is greater than the limit passed as an argument
    when instantiating the `LongestSong(limit)` instance, the gatherer just stops
    processing stream elements.


    When the gatherer is run in parallel, the combinator merges two private state
    objects using the provided implementation. In this case the list containing the
    larger value is returned. This might remind you of the merge phase of the divide-and-conquer
    algorithm mentioned in **Chapter** [**5**](#463938_3_En_5_Chapter.xhtml).


    The finisher function is a lambda expression that contains two parameters: the
    gatherer private state and the downstream where to push the value contained within
    it. In this example, the finisher function pushes the value contained in the private
    state object.


    The result of running the code in Listing 4-48 is *Longest duration: 372 seconds*.
    This happens because the integrator encounters the `372` value that is bigger
    than `360` and stops processing stream elements. If the limit is set higher or
    lower and the code is run again, the returned duration will be different.


    The two custom gatherers introduced were created by implementing `Gatherer<T,
    A, R>`, but gatherers can be created using `Gatherer.of(..)` factory methods too.
    For example, the code in Listing [8-48](#463938_3_En_8_Chapter.xhtml#PC65) can
    be written as shown in Listing [8-49](#463938_3_En_8_Chapter.xhtml#PC66).


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class LongestSongFactoryDemo {

    static Gatherer, Integer>  LONGEST_SONG(int limit) {

    return Gatherer.of(

    () -> new ArrayList(1),

    Gatherer.Integrator.of(

    (max, element, downstream) -> {

    if (max.isEmpty()) max.addFirst(element.getDuration());

    else if (element.getDuration() > max.getFirst()) max.set(0, element.getDuration());

    if (element.getDuration() >= limit) {

    downstream.push(element.getDuration());

    return false;

    }

    return true;

    }),

    (left, right) -> {

    if (left.isEmpty()) return right;

    if (right.isEmpty()) return left;

    int leftVal = left.getFirst();

    int rightVal = right.getFirst();

    if (leftVal > rightVal) return left;

    else return right;

    },

    (max, downstream) -> {

    if (!max.isEmpty()) {

    downstream.push(max.getFirst());

    }

    }

    );

    }

    void main(){

    var songs = StreamMediaLoader.loadSongs();

    var longestDuration = songs

    .gather(LONGEST_SONG(360))

    .findFirst().orElse(-1);

    out.println("Longest duration: " + longestDuration + " seconds");

    }

    }

