  raw: '#### Intermediate Operation `skip` and Terminal Operations `findAny`, `anyMatch`,
    `allMatch`, and `noneMatch`


    These are the last operations that will be discussed in this chapter, so they
    were coupled all together because the `skip(..)` operation might affect the result
    of the others when applied together.


    The `findAny()` method returns either an `Optimal<T>` instance that contains some
    element of the stream or an empty `Optimal<T>` instance when the stream is empty.


    Caution


    The behavior of `findAny()` is explicitly nondeterministic; it is free to select
    any element in the stream. Its behavior is the same as `findFirst()` when applied
    to an unordered stream.


    Since `findAny()` is nondeterministic, its result is unpredictable, so applying
    it to a parallel stream is the same as applying it to a sequential stream. The
    `findAny()` operation is applied to a parallel `Song` stream in Listing [8-41](#463938_3_En_8_Chapter.xhtml#PC58).


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class MediaStreamTester {

    void main(){

    var songs = StreamMediaLoader.loadSongs();

    Optional optSong = songs.parallel().findAny();

    optSong.ifPresent(out::println);

    }

    }

    // sample output

    /*

    Song {

    id=13

    singer=George Michael

    title=Fastlove

    duration=306

    audioType=MP3

    }

    */

    Listing 8-41

    Example Using findAny() on a Parallel Stream

    ```


    The `anyMatch(..)` method receives an argument of type `Predicate<T>` and returns
    a boolean `true` value if there is any element in the stream that matches the
    predicate; it returns `false` otherwise. It works on parallel streams as well.
    The code in Listing [8-42](#463938_3_En_8_Chapter.xhtml#PC59) returns `true` if
    any of the songs in our stream has a title containing the word `Paper`.


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class MediaStreamTester {

    void main(){

    var songs = StreamMediaLoader.loadSongs();

    boolean b0 = songs.anyMatch(s -> s.getTitle().contains("Paper"));

    out.println("Are there songs with title containing ''Paper''? " + b0);

    }

    }

    // output

    // Are there songs with title containing ''Paper''? true

    Listing 8-42

    Example Using anyMatch(..)

    ```


    As you can see, the code in Listing [8-42](#463938_3_En_8_Chapter.xhtml#PC59)
    prints `true`, because there is a song in that stream named `Paper Dolls`. But
    if we want to change that result, all we have to do is skip the first six elements
    from processing in the original stream, by calling `skip(6)` as depicted in Listing
    [8-43](#463938_3_En_8_Chapter.xhtml#PC60). Yes, this method works on parallel
    streams as well.


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class MediaStreamTester {

    void main(){

    var songs = StreamMediaLoader.loadSongs();

    boolean b1 = songs.parallel()

    .skip(6)

    .anyMatch(s -> s.getTitle().contains("Paper"));

    out.println("Are there songs with title containing `Paper`? " + b1);

    }

    }

    // output

    // Are there songs with title containing `Paper` false

    Listing 8-43

    Example Using skip(..) and anyMatch(..)

    ```


    If the first six elements in the original stream are not processed, the code in
    Listing [8-43](#463938_3_En_8_Chapter.xhtml#PC60) returns `false`. There is another
    function that analyzes all elements of a stream to check if they all match a single
    predicate, and that method is named `allMatch(..)`. In Listing [8-44](#463938_3_En_8_Chapter.xhtml#PC61),
    we check if all `Song` instances have duration longer than 300 seconds. The function
    returns a boolean value, and the value is `true` if all `Song` instances match
    the predicate and `false` otherwise. For the dataset used in the examples for
    this chapter, the expected result is a `false` value, because not all our `Song`
    instances have the duration field value greater than 300.


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class MediaStreamTester {

    void main(){

    var songs = StreamMediaLoader.loadSongs();

    boolean b2 = songs.allMatch(s -> s.getDuration() > 300);

    out.println("Are all songs longer than 5 minutes? " + b2);

    }

    }

    // output

    // Are all songs longer than 5 minutes? false

    Listing 8-44

    Showing What allMatch(..) Can Do

    ```


    The “sister” of this function is a function named `noneMatch(..)` that does exactly
    the opposite thing: takes a predicate as an argument and returns a boolean value
    as well, but the value is `true` if none of the stream elements match the predicate
    provided as an argument, and `false` otherwise. In Listing [8-45](#463938_3_En_8_Chapter.xhtml#PC62)
    we use the `noneMatch(..)` method to check if there is no `Song` instance with
    duration > 300, and we expect the result to be `false` as well.


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class MediaStreamTester {

    void main(){

    var songs = StreamMediaLoader.loadSongs();

    boolean b3 = songs.noneMatch(s -> s.getDuration() > 300);

    out.println("Are all songs shorter than 5 minutes? " + b3);

    }

    }

    // output

    // Are all songs shorter than 5 minutes? false

    Listing 8-45

    Showing What noneMatch(..) Can Do

    ```'
