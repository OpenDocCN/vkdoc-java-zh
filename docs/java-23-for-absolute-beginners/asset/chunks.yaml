    \n# 9. Debugging, Testing, and Documenting\n\nDevelopment work requires you to\
    \ not only design the solution for a problem and write the code for it but also\
    \ test it to make sure your solution solves the problem. **Testing** involves\
    \ making sure every component making up your solution behaves as expected in both\
    \ expected and unexpected situations.\n\nThe most practical way to test code is\
    \ to inspect values of intermediary variables by **logging** them and printing\
    \ them in the console in specific situations.\n\nWhen a solution is complex, **debugging**\
    \ provides the opportunity to pause the execution and inspect the state of the\
    \ variables. Debugging sometimes involves **break points** and requires an integrated\
    \ development environment (IDE). Break points, as the name says, are points where\
    \ the application pauses its execution and inspection of variables is performed.\n\
    \nAfter making sure your solution fits the requirements, you have to document\
    \ it, especially if the problem that is being solved is one that requires complex\
    \ code to solve it. Or if your solution might be a prerequisite for other applications,\
    \ it is your responsibility to explain to other developers how to use it.\n\n\
    This chapter will cover a few ways to do all these testing, debugging, and documenting\
    \ activities, because these are key talents for a developer.\n\n## Debugging\n\
    \nDebugging is a process of finding and resolving defects or problems within a\
    \ computer program. There are several debugging tactics and, depending on the\
    \ complexity of an application, one or more can be used. A list of those techniques\
    \ is noted here:\n\n*   Logging intermediary states of objects involved in the\
    \ process and analyzing log files\n*   Interactive debugging using breakpoints\
    \ to pause the execution of the program and inspect intermediary states of objects\
    \ involved in the process\n*   Testing\n*   Monitoring at the application or system\
    \ level\n*   Analysis of memory dumps item profiling, a form of dynamic program\
    \ analysis that measures the memory occupied by a program, or CPU used, duration\
    \ of method calls, and so on.\n\nLet’s start with the simplest way of debugging:\
    \ *logging*."
