  trans: '

    大多数 Swing 应用程序通过扩展 `JFrame` 类来编写，以便对其组件获得更多控制权，因此前面的代码也可以写成清单 10-9 所示的形式。


    ```

    package com.apress.bgn.ten;

    import javax.swing.*;

    import java.awt.*;

    public class ExitingSwingDemo extends JFrame {

    public static void main(String... args) {

    ExitingSwingDemo swingDemo = new ExitingSwingDemo();

    swingDemo.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);

    swingDemo.setTitle("Swing 演示窗口");

    swingDemo.setSize(new Dimension(500,500));

    swingDemo.setVisible(true);

    }

    }

    清单 10-9

    关闭时退出的 Swing 应用程序

    ```


    现在我们已经有了一个窗口，接下来开始添加组件，因为如果没有更多组件来观察变化，改变外观和风格就毫无意义。每个 Swing 应用程序至少有一个 `JFrame`
    作为根窗口，它是所有其他窗口的父窗口，因为窗口也可以通过 `JDialog` 类来创建。`JDialog` 是创建对话框窗口的主要类，这是一种特殊类型的窗口，通常包含消息和用于选择选项的按钮。开发者可以使用这个类创建自定义对话框窗口，或者使用
    `JOptionPane` 类的方法来创建各种对话框窗口。


    回到向 `JFrame` 实例添加组件的话题：组件是通过添加到其容器中来添加到 `JFrame` 的。可以通过调用 `getContentPane()` 获取对
    `JFrame` 容器的引用。默认的内容面板是一个简单的中间容器，它继承自 `JComponent`，而 `JComponent` 又扩展了 `java.awt.Container`（Swing
    是 AWT 的扩展，其大部分组件都是 AWT 的扩展）。对于 `JFrame`，默认的内容面板实际上是 `JPanel` 的一个实例。这个类有一个类型为 `java.awt.LayoutManager`
    的字段，用于定义其他组件在 `JPanel` 中的排列方式。`JFrame` 实例的默认内容面板使用 `java.awt.BorderLayout` 作为其布局管理器，它将面板划分为五个区域：EAST、WEST、NORTH、SOUTH
    和 CENTER。每个区域都可以通过 `BorderLayout` 中定义的匹配名称常量来引用。


    因此，如果我们想为应用程序添加一个退出按钮，可以将其添加到 SOUTH 区域，代码如下清单 10-10 所示。


    ```

    package com.apress.bgn.ten;

    import javax.swing.*;

    import java.awt.*;

    import java.awt.event.ActionEvent;

    import java.awt.event.ActionListener;

    public class LayeredSwingDemo extends JFrame {

    private JPanel mainPanel;

    private JButton exitButton;

    public LayeredSwingDemo(String title) {

    super(title);

    mainPanel = (JPanel) this.getContentPane();

    exitButton = new JButton("再见！");

    exitButton.addActionListener(new ActionListener() {

    @Override

    public void actionPerformed(ActionEvent e) {

    System.exit(0);

    }

    });

    mainPanel.add(exitButton, BorderLayout.SOUTH);

    }

    public static void main(String... args) {

    LayeredSwingDemo swingDemo = new LayeredSwingDemo("Swing 演示窗口");

    swingDemo.setDefaultCloseOperation(JFrame.DO_NOTHING_ON_CLOSE);

    swingDemo.setSize(new Dimension(500, 500));

    swingDemo.setVisible(true);

    }

    }

    清单 10-10

    使用 BorderLayout 排列组件的 Swing 应用程序

    ```


    在图 10-5 中，你可以看到修改后的应用程序。我们在内容面板的 SOUTH 区域添加了一个退出按钮，并标明了 `BorderLayout` 的整体区域划分。


    ![](img/463938_3_En_10_Fig5_HTML.jpg)


    图 10-5


    边框布局区域


    此外，由于新按钮必须成为退出应用程序的唯一方式，原来的


    ```

    setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);

    ```


    被替换为


    ```

    setDefaultCloseOperation(JFrame.DO_NOTHING_ON_CLOSE);

    ```


    并且将一个 `java.awt.event.ActionListener` 实例附加到按钮上，以便它能记录按钮被点击的事件并做出相应反应，在本例中就是退出应用程序。


    大多数 Swing 组件都支持监听器，可以定义这些监听器来捕获用户对对象执行的事件，并以特定方式做出反应。正如我们所见，按钮会扩展并填满整个区域空间，因为它继承了该区域的尺寸。为了避免这种情况，应该将按钮放入另一个容器中，并且该容器应使用不同的布局：`FlowLayout`。顾名思义，这种布局允许
    Swing 组件像段落中的文字一样按方向流添加。可以像文本文档中的文本格式一样进行调整，并且为组件的对齐方式定义了常量：居中对齐（CENTER）、左对齐（LEFT）等。继续前面的示例，我们将把
    `exitButton` 包装在另一个使用 `FlowLayout` 的 `JPanel` 中。


    清单 10-11 展示了如何使用 `FlowLayout` 将按钮放置在 `JFrame` 实例的右下角。


    ```

    public LayeredSwingDemo(String title) {

    super(title);

    mainPanel = (JPanel) this.getContentPane();

    exitButton = new JButton("再见！");

    exitButton.addActionListener(e -> System.exit(0));

    JPanel exitPanel = new JPanel();

    FlowLayout flowLayout = new FlowLayout();

    flowLayout.setAlignment(FlowLayout.RIGHT);

    exitPanel.setLayout(flowLayout);

    exitPanel.setComponentOrientation(ComponentOrientation.RIGHT_TO_LEFT);

    exitPanel.add(exitButton);

    mainPanel.add(exitPanel, BorderLayout.SOUTH);

    }

    ...

    清单 10-11

    使用 BorderLayout 和 FlowLayout 排列组件的 Swing 应用程序

    ```


    JDK 中还有更多布局可用，但现在让我们先完成应用程序，添加一个包含若干条目的列表。我们还将为其添加一个监听器，以便当点击某个元素时，其值会被添加到框架中央的一个文本区域中。


    Swing 列表可以通过实例化 `JList<E>` 类来创建。这将创建一个显示对象列表并允许用户选择一个或多个项目的对象。Swing 的 `JList<E>`
    类包含一个类型为 `ListModel<E>` 的字段，用于管理列表显示的数据内容。每个对象创建并添加元素后，该对象会与一个索引关联。当用户选择一个对象时，该索引也可用于后续处理。在清单
    10-12 所示的代码片段中，声明并初始化了 `JList<E>` 对象，并为其关联了一个 `ListSelectionListener`，以定义从列表中选择元素时要执行的操作。在我们的例子中，元素的值必须添加到
    `JTextArea` 中。


    ```

    private static String[] data = {"约翰·梅尔", "弗兰克·辛纳屈",

    "塞思·麦克法兰", "妮娜·西蒙", "B.B.金", "佩吉·李"};

    private JList list;

    private JTextArea textArea;

    ...

    textArea = new JTextArea(50, 10);

    //NORTH

    list = new JList(data);

    list.addListSelectionListener(new ListSelectionListener() {

    @Override

    public void valueChanged(ListSelectionEvent e) {

    if (!e.getValueIsAdjusting()) {

    textArea.append(list.getSelectedValue() + "\n");

    }

    }

    });

    mainPanel.add(list, BorderLayout.NORTH);

    //CENTER

    JScrollPane txtPanel = new JScrollPane(textArea);

    textArea.setBackground(Color.LIGHT_GRAY);

    mainPanel.add(txtPanel, BorderLayout.CENTER);

    ...

    清单 10-12

    使用布局和 JTextArea 排列组件的 Swing 应用程序

    ```


    当用户点击列表元素时，会发生两件事：前一个元素被取消选中，被点击的元素被选中，因此选中的元素发生了变化。`getValueIsAdjusting()` 方法返回当前事件是否属于一系列多个事件（选择事件、点击事件等，取决于支持的类型）中的一环，且更改仍在进行中。我们测试该方法是否返回
    false，以确认选择已经完成，这样我们就可以获取当前选中元素的值并将其添加到文本区域中。

    '
- fmt: '`JTextArea`实例被添加到`JScrollPane`实例中，该实例通过提供一个或两个滚动条（取决于配置）来确保`textArea`内容在填充文本时仍然可见。`JScrollPane`也可以包裹在包含过多项目的列表周围，以确保所有项目都可访问。此外，由于我们不关心用户通过文本区域提供的输入，因此调用了`setEditable(false);`方法。


    现在我们有了一个更复杂的应用程序，是时候调整应用程序的外观和感觉了。到目前为止，我们一直使用底层操作系统提供的默认主题。使用Swing，外观和感觉可以配置为JDK支持的默认值之一，也可以使用项目类路径中作为依赖项提供的额外自定义外观，或者开发人员可以创建自己的外观。要显式指定外观，必须在创建任何Swing组件之前，在`main`方法中添加以下代码行：


    ```

    UIManager.setLookAndFeel(..).

    ```


    该方法接收一个`String`值作为参数，该值代表外观子类的完全限定名称。此类必须扩展抽象的`javax.Swing.LookAndFeel`。虽然不是必须的，但你可以通过调用以下代码显式指定要使用原生GUI：


    ```

    UIManager.setLookAndFeel(UIManager.getCrossPlatformLookAndFeelClassName());

    ```


    知道了这一点，让我们做一些有趣的事情。`UIManager`类包含用于管理Swing应用程序外观的实用方法和嵌套类。其中一个方法是`getInstalledLookAndFeels()`，它提取支持的外观实现列表，并将其作为`LookAndFeelInfo[]`返回。考虑到这一点，让我们执行以下操作：列出所有支持的外观实现，将它们添加到我们的列表中，并在用户选择时应用每个实现。不幸的是，由于Swing如今很少使用，我们可以在应用程序中使用的自定义外观实现并不多，因此唯一能做的就是使用JDK提供的内容。清单[10-13](#463938_3_En_10_Chapter.xhtml#PC21)中的代码使用外观完全限定类名初始化数据数组。


    ```

    ...

