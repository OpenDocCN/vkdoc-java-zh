- fmt: '#### Enums


    `enum`类型是一种特殊的类类型。它用于定义一种只能被实例化固定次数的特殊类。枚举声明将所有该枚举的实例组合在一起，它们都是常量。因此，`Gender`枚举可以如[清单
    4-32](#463938_3_En_4_Chapter.xhtml#PC32)所示进行定义。


    ```

    package com.apress.bgn.four.classes;

    public enum Gender {

    FEMALE,

    MALE,

    UNSPECIFIED

    }

    Listing 4-32

    Gender Enum

    ```


    枚举无法从外部实例化。枚举默认是`final`的，因此不能被继承。还记得 Java 中每个类默认隐式继承`Object`类吗？Java 中的每个枚举都隐式继承抽象类`java.lang.Enum<E>`，因此每个枚举实例都继承了在编写使用枚举的代码时非常有用的特殊方法。


    作为一种特殊的类类型，`enum`可以拥有字段和一个只能为`private`的构造函数，因为枚举实例无法在外部创建。`private`修饰符无需显式声明，因为编译器知道如何处理。[清单
    4-33](#463938_3_En_4_Chapter.xhtml#PC33)展示了`Gender`枚举的实现，它添加了一个表示每种性别数值的整数字段和一个表示文本描述的`String`字段。当然，要访问枚举属性，需要提供
    getter 方法。


    ```

    package com.apress.bgn.four.classes;

    public enum Gender {

    FEMALE(1, "f"),

    MALE(2, "m"),

    UNSPECIFIED(3, "u");

    private int repr;

    private String descr;

    private Gender(int repr, String descr) {

    this.repr = repr;

    this.descr = descr;

    }

    public int getRepr() {

    return repr;

    }

    public String getDescr() {

    return descr;

    }

    }

    Listing 4-33

    A More Complex Gender Enum

    ```


    警告


    但等等，什么能阻止我们声明 setter 并修改字段值呢？嗯，没什么。如果这正是你需要做的，你可以这样做，**但这并不是一个好实践**（实际上非常糟糕）。


    枚举实例应该是常量。因此，正确的枚举设计不应声明 setter，并且应通过将字段声明为`final`来确保它们的值永远不会被更改。当我们这样做时，字段初始化的唯一方式就是通过调用构造函数，而由于构造函数无法从外部调用，我们数据的完整性就得到了保证。一个良好枚举设计的示例如[清单
    4-34](#463938_3_En_4_Chapter.xhtml#PC34)所示。


    ```

    package com.apress.bgn.four.classes;

    public enum Gender {

    FEMALE(1, "f"),

    MALE(2, "m"),

    UNSPECIFIED(3, "u");

    private final int repr;

    private final String descr;

    private Gender(int repr, String descr) {

    this.repr = repr;

    this.descr = descr;

    }

    public int getRepr() {

    return repr;

    }

    public String getDescr() {

    return descr;

    }

    }

    Listing 4-34

    Proper Gender Enum

    ```


    方法可以添加到枚举中，并且每个实例都可以重写它们。因此，如果我们向`Gender`枚举添加一个名为`comment()`的方法，每个实例都会继承它。但实例可以重写它，如[清单
    4-35](#463938_3_En_4_Chapter.xhtml#PC35)所示。


    ```

    package com.apress.bgn.four.classes;

    public enum Gender {

    FEMALE(1, "f"),

    MALE(2, "m"),

    UNSPECIFIED(3, "u") {

    @Override

    public String comment() {

    return "to be decided later: " + getRepr() + ", " + getDescr();

    }

    };

    private final int repr;

    private final String descr;

    Gender(int repr, String descr) {

    this.repr = repr;

    this.descr = descr;

    }

    // getters omitted

    public String comment() {

    return repr + ": " + descr;

    }

    }

    Listing 4-35

    Code Sample Listing Enum Items Classes

    ```


    重要


    那么，一个实例怎么可能重写其类类型的方法呢？它不能。`UNSPECIFIED`枚举值实际上是一个类的实例，该类扩展了`Gender`类并重写了`comment()`方法。


    这可以通过遍历枚举值并打印`getClass()`方法返回的结果来轻松证明，该方法继承自`Object`类，返回对象的运行时类型。要获取枚举的所有实例，每个枚举隐式扩展的`java.lang.Enum<E>`类提供了一个名为`values()`的方法。[清单
    4-36](#463938_3_En_4_Chapter.xhtml#PC36)展示了执行此操作的代码及其输出。


    ```

    package com.apress.bgn.four.classes;

    public class BasicHumanDemo {

    public static void main(String... args) {

    for (Gender value : Gender.values()) {

    System.out.println(value.name() + ": " + value.getClass());

    System.out.println("\tcomment : " + value.comment());

    }

    }

    }

    // output expected in the console

    /*

    FEMALE: class com.apress.bgn.four.classes.Gender

    comment : 1: f

    MALE: class com.apress.bgn.four.classes.Gender

    comment : 2: m

    UNSPECIFIED: class com.apress.bgn.four.classes.Gender$1

    comment : to be decided later: 3, u

    */

