- fmt: '### Intermediate Operations `map` and `flatMap` and Terminal Operation `collect`


    In the following example we will process all the songs and calculate the duration
    in minutes. To do this, we will use the `map(..)` method to call a pure function
    for each song instance emitted by the stream that returns the duration in minutes.
    This will result in a new stream of `Integer` values. All its elements will be
    added to a `List<Integer>` instance using the `collect(..)` method. This method
    accumulates the elements as they are processed into a `Collection<Integer>` instance.
    Listing [8-31](#463938_3_En_8_Chapter.xhtml#PC47) shows these methods being used.


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class MediaStreamTester {

    public static int processDuration(Song song) {

    int secs = song.getDuration();

    return secs/60;

    }

    void main(){

    Stream songs = StreamMediaLoader.loadSongs();

    List durationAsMinutes = songs

    .map(SongTransformer::processDuration) // method reference

    .collect(Collectors.toList());

    durationAsMinutes.forEach(out::println);

    }

    }

    Listing 8-31

    Using map(..) and collect(..) Methods

    ```


    The `map(..)` method receives an argument of type `Function<T,R>` (T input type,
    R result type), which is basically a reference to a function to apply on each
    element of the stream. The function we applied in the previous example takes a
    song element from the stream, gets its duration and transforms it into minutes,
    and returns it. The code in Listing [8-31](#463938_3_En_8_Chapter.xhtml#PC47)
    can be rewritten as depicted in Listing [8-32](#463938_3_En_8_Chapter.xhtml#PC48),
    where the method `processDuration` is declared as a field of type `Function<T,R>`
    and the `Collection<Integer>` instance is replaced by the `.toList()` method for
    a simplified syntax.


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class MediaStreamTester {

    public static Function processDuration = song -> song.getDuration()/60;

    void main(){

    Stream songs = StreamMediaLoader.loadSongs();

    List durationAsMinutes = songs

    .map(processDuration)

    .toList();

    durationAsMinutes.forEach(out::println);

    }

    }

    Listing 8-32

    Using a Function Instance to Process Stream Elements

    ```


    The first generic type of the `Function<T,R>` instance is the type of the processed
    element, and the second is the type of the result.


    A version of the `filter(..)` method mentioned in the previous section is defined
    for the `Optional<T>` type as well and can be used to avoid writing complicated
    `if` statements, together with the `map(..)` method. Let’s assume we have a `Song`
    instance and we want to check if it is more than three minutes long and less than
    ten minutes long. Instead of writing an `if` statement with two conditions connected
    by an `AND` operator, we can use an `Optional<Song>` instance and those two methods
    to do the same, as shown in Listing [8-33](#463938_3_En_8_Chapter.xhtml#PC49).


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class MediaStreamTester {

    void main(){

    Song song0 = new Song("Ben Barnes", "You find me", 420, AudioType.FLAC);

    if(isMoreThan3MinsAndLessThenTen(song0)) {

    out.println("This song is just right!");

    }

    }

    public static boolean isMoreThan3MinsAndLessThenTen(Song song) {

    return Optional.ofNullable(song).map(SongTransformer::processDuration)

    .filter(d -> d >= 3)

    .filter(d -> d <= 10)

    .isPresent();

    }

    }

    Listing 8-33

    Using filter(..) and map(..) to Avoid Writing if Statements

    ```


    **Caution**


    The implementation in Listing [8-33](#463938_3_En_8_Chapter.xhtml#PC49) might
    not be ideal when it comes to performance—the two `filter()` invocations could
    be one, after all—but code like that can be written if you wish. Just make sure
    to read the documentation properly before abusing stream operations.


    So the `map(..)` method is quite powerful, but it has a small flaw. If we take
    a look at its signature in the `Stream.java` file, this is what we will see:


    ```

    Stream map(Function mapper);

    ```


    So if the `map(..)` function applied to each element in the stream returns a stream
    with the result, which is placed into another stream that contains all results,
    the `collect(...)` method is actually called on a `Stream<Stream<R>>` instance.


    The same goes for `Optional<T>`; the terminal method will be called on an `<Optional<Optional<T>>`
    instance. When the objects are simple, like the `Song` instances used in this
    chapter’s code samples, the `map(..)` method works quite well, but if the objects
    in the original stream are more complex, such as a `List<List<T>>` instance, things
    *might* get complicated.


    The easiest way to show the effects of the `flatMap(..)` method is to apply it
    on a `List<List>` instance. Let’s take a look at the example in Listing [8-34](#463938_3_En_8_Chapter.xhtml#PC51).


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class MoreStreamsDemo {

    public static Function processDuration = song -> song.getDuration()/60;

    void main(){

    List> testList = List.of (List.of(2,3), List.of(4,5), List.of(6,7));

    System.out.println(processList(testList));

    }

    public static List processList( List> list) {

    List result = list

    .stream()

    .flatMap(Collection::stream)

    .collect(Collectors.toList());

    return result;

    }

    }

    Listing 8-34

    Using flatMap(..) to Unwrap Stream Elements

    ```


    The `flatMap(..)` method receives as an argument a reference to a method that
    takes a collection and transforms it into a stream, which is the simplest way
    to create a `Stream<Stream<Integer>>` instance. The `flatMap(..)` method does
    its magic and the result is transformed into `Stream<Integer>`, and the elements
    are then collected by the `collect(..)` method into a `List<Integer>` instance.
    The operation of removing the useless stream wrapper is called *flattening*. If
    it is still not obvious what is happening, Figure [8-2](#463938_3_En_8_Chapter.xhtml#Fig2)
    should make things clearer.


    ![](images/463938_3_En_8_Chapter/463938_3_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Visual depiction of the effects of `flatMap(..)`


    In the code sample in Listing [8-34](#463938_3_En_8_Chapter.xhtml#PC51), using
    the `map(..)` method doesn’t yield the expected result. If the `flatMap(..)` method
    is replaced with `map(..)`, the final result is not a `List<Integer>` instance,
    but a `List<Stream<Integer>>` instance. IntelliJ IDEA is smart enough to figure
    it out, and it provides the appropriate message to help you choose the right method
    to call, as depicted in Figure [8-3](#463938_3_En_8_Chapter.xhtml#Fig3).


    ![](images/463938_3_En_8_Chapter/463938_3_En_8_Fig3_HTML.jpg)


    Figure 8-3


    IntelliJ IDEA error message when `map(..)` is used instead of `flatMap(..)`


    Another way to see the effect of the `flatMap(..)` method is to write an even
    simpler example with `Optional<T>`. Let’s say we need a function that transforms
    a `String` value into an `Integer` value. If the `String` value is not a valid
    number, we want to avoid returning `null`. This means that our function must take
    a `String` value and return `Optional<Integer>`. The code shown in Listing [8-35](#463938_3_En_8_Chapter.xhtml#PC52)
    contains an explicit flattening and a flattening done with `flatMap(..)`.


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class MoreStreamsDemo {

    void main(){

    // explicit flattening

    Optional str0 = Optional.of("42");

    Optional> resInt0 = str0.map(toIntOpt);

    Optional desiredRes0 = resInt0.orElse(Optional.empty());

    out.println("finally: " + desiredRes0.get());

    // flatMap(..) flattening

    Optional str1 = Optional.of("42");

    Optional desiredRes1 = str1.flatMap(toIntOpt);

    out.println("boom: " + desiredRes1.get());

    }

    public static Function> toIntOpt = str -> {

    try {

    return Optional.of(Integer.parseInt(str));

    } catch (NumberFormatException e) {

    return Optional.empty();

    }

    };

    }

    Listing 8-35

    Flattening of an Optional> Instance

    ```


    So yes, there is a slight difference between `map(..)` and `flatMap(..)`, and
    although in most cases you will use `map(..)`, it is good to know that `flatMap(..)`
    exists too.'
