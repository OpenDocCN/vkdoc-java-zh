    // output

    /*

    Today: 18-05-2024

    John’s Birthday: 16-10-1977

    Day: 16

    Month: 9

    Year: 1977

    */

    Listing 5-35

    Code Sample for Handling Calendar Dates Using the Calendar Class

    ```


    不幸的是，前面提到的一些特殊性仍然存在，因为表示日期的核心类仍然是 `java.util.Date`，但至少我们不再使用已弃用的方法了。


    `java.util.Date` 类和 `java.text.SimpleDateFormat` 类不是线程安全的，因此在具有多个执行线程的复杂应用程序中，开发者必须显式地同步对这些类型对象的访问。这些类型的对象不是不可变的，并且处理时区非常麻烦。这就是
    Java 8 引入一个新的 API 来建模日历日期操作的主要原因，该 API 设计得更好，使日期实例具有线程安全性和不可变性。


    该 API 的核心类是 `java.time.LocalDate` 和 `java.time.LocalDateTime`，分别用于建模日历日期和带时间的日历日期。清单
    5-36 展示了如何使用新 API 获取当前日期以及如何创建自定义日期。

