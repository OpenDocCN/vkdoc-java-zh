    ## 构建 Web 应用程序


    Web 应用程序是一种运行在服务器上并可以通过浏览器访问的应用程序。直到最近，大多数 Java 应用程序都必须托管在像 Apache Tomcat 或 Eclipse
    GlassFish 这样的 Web 服务器上，或者像 JBoss（现在称为 WildFly）或 Apache TomEE 这样的企业服务器上，才能被访问。你需要使用类以及
    HTML 或 Jakarta 服务器页面（JSP）文件来编写 Web 应用程序，将其打包成 WAR（Web 归档）文件或 EAR（企业归档）文件，部署到服务器，然后启动服务器。服务器会提供应用程序的上下文，并将请求映射到能够提供答案作为响应返回的类。假设应用程序部署在
    Tomcat 服务器上，在图 [10-13](#463938_3_En_10_Chapter.xhtml#Fig13) 中，你可以看到已部署应用程序功能的抽象示意图。


    ![](images/463938_3_En_10_Chapter/463938_3_En_10_Fig13_HTML.jpg)


    Figure 10-13


    Web application deployed on an Apache Tomcat server


    对 Web 应用程序的请求也可以来自浏览器以外的客户端（例如，移动应用程序），但由于本节介绍的是 Web 应用程序，我们假设所有对应用程序的请求都来自浏览器。


    在构建 Web 应用程序之前，让我们简要解释一件非常重要的事情：互联网。互联网是一个由许多连接在一起的计算机组成的信息系统。一些计算机托管提供应用程序访问的应用服务器，一些计算机访问这些应用程序，还有一些计算机两者都做。这些计算机之间的通信通过网络通过一系列协议完成：HTTP、FTP、SMTP、POP
    等。最流行的协议是 HTTP（超文本传输协议），它是一种非对称的请求-响应客户端-服务器协议，意味着客户端向服务器发出请求，然后服务器发送响应。后续的请求彼此之间没有关联，也不共享任何状态，因此它们是*无状态的*。


    HTTP 请求可以有不同的类型，根据它们要求服务器上的应用程序执行的操作进行分类，但开发人员最常用的有四种类型（即图 [10-13](#463938_3_En_10_Chapter.xhtml#Fig13)
    中箭头下“请求”列出的那些）。我们不会深入探讨请求组件的细节，因为它们与 Java 关系不大，但我们会介绍足够的细节来理解 Web 应用程序的工作原理。以下列表介绍了四种请求类型（也称为*请求方法*）以及服务器为每种类型返回的响应类型：


    ![](images/463938_3_En_10_Chapter/463938_3_En_10_Fig14_HTML.jpg)


    Figure 10-14


    Network debugger view in Firefox


    *   **GET**：每当用户在浏览器中输入 URL（例如`https://my-site.com/index.html`）时，浏览器会将地址转换为请求消息并发送到
    Web 服务器。浏览器所做的操作可以通过在 **Firefox** 中打开调试器视图，单击 **网络** 选项卡，并尝试访问`https://www.google.com/`来轻松查看。在图
    [10-14](#463938_3_En_10_Chapter.xhtml#Fig14) 中，你可以看到 Firefox 调试器视图显示了正在请求的 URL
    以及请求消息的内容。'
