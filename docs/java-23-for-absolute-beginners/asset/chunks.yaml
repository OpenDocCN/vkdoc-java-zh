  raw: 'The annotations are not necessary; as long as an `XmlMapper` instance is used
    and the class to be serialized is a plain old Java object (POJO), an XML file
    is generated, with all fields becoming XML elements under a root element named
    as the class. The annotations are useful for customizing the generated XML, naming
    elements, converting some fields into attributes, and specifying which converters
    to use for complex types. If you are curious about the default XML file generated
    for a `Singer` instance, comment the annotations in the `Singer` class and run
    the `XMLSerializationDemo` example from Listing [11-39](#463938_3_En_11_Chapter.xhtml#PC64).


    XML serialization has been dominating the development field for many years, being
    used in most web services and remote communication. However, XML files tend to
    become crowded, redundant, and painful to read as they become bigger, so a new
    format stole the show: JSON.


    ### JSON Serialization


    **JSON** (JavaScript Object Notation) is a lightweight data-interchange format.
    It is readable for humans and is easy for machines to parse and generate. JSON
    is the favorite format for data being used in JavaScript applications, for REST-based
    applications and as the internal format for quite a few NoSQL databases. Therefore,
    it is only appropriate to show you how to serialize/deserialize Java objects using
    this format as well. The advantage of serializing Java objects to JSON is that
    there is more than one library providing classes to do so, which means at least
    one of them is stable with Java 9+ versions.


    JSON format is in essence a collection of key-pair values. The values can be arrays,
    or collection of key/pairs themselves. The most preferred library for JSON serialization
    is the Jackson library as well, because it can convert Java objects to JSON objects
    and back again without requiring much code to be written. The best part for this
    chapter is that the same module configuration can be used for JSON too. All we
    need to do is change the annotations used and change the type of mapper used to
    do the serialization/deserialization. Jackson supports a multitude of annotations
    for JSON serialization, but for the simple example in this book, we don’t really
    need any. A Jackson `com.fasterxml.jackson.databind.json.JsonMapper` instance
    is smart enough to auto-detect the publicly accessible properties (public fields,
    or private fields with public getters) of a class and use them when serializing/deserializing
    instances of this class.


    The `@JsonAutoDetect` annotation from the package `com.fasterxml.jackson.annotation`
    can be used to annotate a class. It can be configured to tell the mapper which
    class members should be serialized. There are a few options, grouped in the `Visibility`
    enum declared within the annotation body:


    *   `ANY`: All kinds of access modifiers (`public`, `protected`, `private`) are
    auto-detected.


    *   `NON_PRIVATE`: All modifiers except `private` are auto-detected.


    *   `PROTECTED_AND_PUBLIC`: Only `protected` and `public` modifiers are auto-detected.


    *   `PUBLIC_ONLY`: Only `public` modifiers are auto-detected.


    *   `NONE`: Disable auto-detection for fields or methods. In this case configuration
    has to be done explicitly using `@JsonProperty` annotations on fields.


    *   `DEFAULT`: Default rules apply, depending on the context (sometimes inherited
    from a parent).


    This single annotation placed on the `Singer` class combined with the proper mapper
    and the `JavaTimeModule` ensures that an instance of the `Singer` class can be
    serialized to JSON correctly; and also deserialized from JSON. Listing [11-40](#463938_3_En_11_Chapter.xhtml#PC67)
    shows the simple configuration of the `Singer` class (even if redundant).


    ```

    package com.apress.bgn.eleven.json;

    // some import statements omitted

    import com.fasterxml.jackson.annotation.JsonAutoDetect;

    @JsonAutoDetect(getterVisibility = JsonAutoDetect.Visibility.PUBLIC_ONLY)

    public class Singer  implements Serializable {

    private static final long serialVersionUID = 42L;

    private String name;

    private Double rating;

    private LocalDate birthDate;

    public String getName() { // auto-detected

    return name;

    }

    public Double getRating() { // auto-detected

    return rating;

    }

    public LocalDate getBirthDate() { // auto-detected

    return birthDate;

    }

    // other code omitted

    }

