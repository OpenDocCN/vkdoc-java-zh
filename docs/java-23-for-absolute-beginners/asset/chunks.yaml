- fmt: '### Creating Streams from Arrays


    For the previous code samples, the source for our streams is represented by a
    `List<E>` instance. The same syntax is used with `Set<E>` instances as well.


    But streams can be created from arrays as well, as the example shown in Listing
    [8-7](#463938_3_En_8_Chapter.xhtml#PC8) demonstrates.


    ```

    package com.apress.bgn.eight;

    import java.util.Arrays;

    import static java.lang.System.out;

    public class ArrayStreamDemo {

    void main() {

    int[] arr = { 50, 10, 250, 100 /* ... */};

    Arrays.stream(arr).forEach(

    i -> out.println(Thread.currentThread().getName() + ": " + i)

    );

    }

    }

    Listing 8-7

    Creating a Stream of Integer Values from an Array of Integers

    ```


    The static method `stream(int[] array)` was added to the `java.util.Arrays` in
    Java 1.8 and is used in Listing [8-7](#463938_3_En_8_Chapter.xhtml#PC8) to create
    a stream of primitives.


    For arrays that contain objects, the method called is `stream(T[] array)`, where
    `T` is a generic type that replaces any reference type (also added in Java 1.8).
    Streams generated from arrays can be parallelized, by calling the same `parallel()`
    method.


    The novelty with arrays is that a stream can be created from a part of the array,
    by specifying the start and the end indexes for the array chunk. The code in Listing
    [8-8](#463938_3_En_8_Chapter.xhtml#PC9) shows the creation of a stream from a
    part of the array and the output of printing the elements of the resulting stream
    using a simple consumer.


    ```

    package com.apress.bgn.eight;

    import java.util.Arrays;

    import static java.lang.System.out;

    public class ArrayStreamDemo {

    void main() {

    int[] arr = { 50, 10, 250, 100 /* ... */};

    Arrays.stream(arr, 3,6).forEach(

    i -> System.out.println(Thread.currentThread().getName() + ": " + i)

    );

    }

    }

    // output

    /*

    main: 100

    main: 23

    main: 45

    */

    Listing 8-8

    Creating a Stream of Integer Values from a part of an Array of Integers

    ```


    ### Creating Empty Streams


    When writing Java code, a good practice is to write methods that return objects
    and to avoid returning `null`. This reduces the possibility of `NullPointerException`s
    being thrown. When methods return streams, the preferred way is to return an empty
    stream. This can be done by calling the static `Stream.empty()` method provided
    by the `Stream<T>` interface.


    The code snippet in Listing [8-9](#463938_3_En_8_Chapter.xhtml#PC10) depicts a
    method that takes a list of `Song` instances as an argument and returns a stream
    using it as a source. If the list is `null` or empty, an empty stream is returned.
    The resulting stream is traversed in the `main(..)` method, without additional
    verification. If the stream is empty, nothing will be printed.


    ```

    package com.apress.bgn.eight;

    import com.apress.bgn.eight.util.Song;

    import com.apress.bgn.eight.util.StreamMediaLoader;

    import java.util.List;

    import java.util.stream.Stream;

    import static java.lang.System.out;

    public class SongStreamDemo {

    void main(){

    out.println(" -- Testing ''getAsStream(..)'' method with null -- ");

    getAsStream(null).forEach(out::println);

    out.println(" -- Testing ''getAsStream(..)'' method with empty list --");

    getAsStream(List.of()).forEach(out::println);

    out.println(" -- Testing ''getAsStream(..)'' method with a list -- ");

    getAsStream(StreamMediaLoader.loadSongsAsList()).forEach(out::println);

    }

    public static Stream getAsStream(List songList) {

    if(songList == null || songList.isEmpty()) {

    return Stream.empty();

    } else {

    return songList.stream();

    }

    }

    }

    // output

    /*

    -- Testing ''getAsStream(..)'' method with null --

    -- Testing ''getAsStream(..)'' method with empty list --

    -- Testing ''getAsStream(..)'' method with a list --

    Song {

    id=1

    singer=John Mayer

    title=New Light

    duration=206

    audioType=FLAC

    }

    ...

    */

    Listing 8-9

    Creating a empty streams

    ```


    Running the code in Listing [8-9](#463938_3_En_8_Chapter.xhtml#PC10) results in
    the first two messages being printed one after the other with nothing in between,
    since the stream returned by the method is empty.


    ### Creating Finite Streams


    Aside from creating streams from actual sources, streams can be created on the
    spot by calling stream utility methods like `Stream.generate()` or `Stream.builder()`.


    The `builder()` method should be used when building a limited stream with a fixed
    set of known values. This method returns an instance of `java.util.stream.Stream.Builder<T>`,
    an internal interface that declares a default method named `add(T t)` that needs
    to be called to add the elements of the stream. To create the `Stream<T>` instance,
    its `build()` method must be called last. The `add(T t)` method returns a reference
    to the `Builder<T>` instance, so it can be chained with any other methods of this
    interface. The code in Listing [8-10](#463938_3_En_8_Chapter.xhtml#PC11) is a
    sample of how the `builder()` method can be used to create a finite stream of
    various values.


    ```

    package com.apress.bgn.eight;

    import com.apress.bgn.eight.util.AudioType;

    import com.apress.bgn.eight.util.Song;

    import java.util.List;

    import java.util.stream.Stream;

    public class FiniteStreamsDemo {

    void main() {

    Stream built = Stream.builder()

    .add(50).add(10).add(250)

    .build();

    Stream lyrics = Stream.builder()

    .add("In a world where people never meet,")

    .add("They fall in love looking at some screen")

    .add("And love can only be one-sided")

    .add("Bitter, burning unrequited.")

    .build();

    Stream songs = Stream.builder()

    .add (new Song("John Mayer", "New Light", 206, AudioType.FLAC))

    .add (new Song("Ben Barnes", "You find me", 420, AudioType.FLAC))

    .build();

    Stream data = Stream.builder() // compiler warns about raw use of parameterized
    class ''Stream''

    .add("Vultures")

    .add(3)

    .add(List.of("aa"))

    .build();

    }

    }

    Listing 8-10

    Creating Streams from Finite Sets of Values

    ```


    Because the `Builder<T>` interface is a generic one, it is mandatory to specify
    a type argument, as the type of the elements in the stream. Also, the `builder()`
    method is generic and requires the type to be provided as a parameter in front
    of it, right before being called. If no type is specified, the default `Object`
    is used, and instances of any type can be added to the stream (as shown in the
    fourth stream declaration in Listing [8-10](#463938_3_En_8_Chapter.xhtml#PC11)).
    However, the compiler warns about *raw use of parameterized class ‘Stream’*.


    To create a stream, there is another method named `generate(..)`. This method
    requires an argument of type `java.util.function.Supplier<T>`.


    **Important**


    A **supplier** is what we call in this book an inline implementation of the `java.util.function.Supplier<T>`
    functional interface. This interface requires a concrete implementation to be
    provided for its single method named `get()`. This method should return the element
    to be added to the stream.


    So if we want to generate a stream of integers, a proper implementation for `get()`
    should return a random integer. The expanded code is depicted in Listing [8-11](#463938_3_En_8_Chapter.xhtml#PC12).
    Lambda expressions are not used to make it clear that the `generate(..)` method
    receives as a parameter a `Supplier<Integer>` instance created on the spot.


    ```

    package com.apress.bgn.eight;

    import java.util.function.Supplier;

    import java.util.random.RandomGenerator;

    import java.util.stream.Stream;

    public class FiniteStreamsDemo {

    static RandomGenerator randomGenerator = RandomGenerator.of("SecureRandom");

    void main() {

    Stream generated = Stream.generate(

    new Supplier() {

    @Override

    public Integer get() {

    return randomGenerator.nextInt(300) + 1;

    }

    }).limit(15);

    }

    }

    Listing 8-11

    Creating Stream Using a Supplier

    ```


    The `limit(15)` method limits the number of elements generated by the supplier
    to 15; otherwise the generated stream would be infinite. The code in Listing [8-11](#463938_3_En_8_Chapter.xhtml#PC12)
    can be simplified by using Lambda expressions as depicted in Listing [8-12](#463938_3_En_8_Chapter.xhtml#PC13).'
  raw: '### Creating Streams from Arrays


    For the previous code samples, the source for our streams is represented by a
    `List<E>` instance. The same syntax is used with `Set<E>` instances as well.


    But streams can be created from arrays as well, as the example shown in Listing
    [8-7](#463938_3_En_8_Chapter.xhtml#PC8) demonstrates.


    ```

    package com.apress.bgn.eight;

    import java.util.Arrays;

    import static java.lang.System.out;

    public class ArrayStreamDemo {

    void main() {

    int[] arr = { 50, 10, 250, 100 /* ... */};

    Arrays.stream(arr).forEach(

    i -> out.println(Thread.currentThread().getName() + ": " + i)

    );

    }

    }

    Listing 8-7

    Creating a Stream of Integer Values from an Array of Integers

    ```


    The static method `stream(int[] array)` was added to the `java.util.Arrays` in
    Java 1.8 and is used in Listing [8-7](#463938_3_En_8_Chapter.xhtml#PC8) to create
    a stream of primitives.


    For arrays that contain objects, the method called is `stream(T[] array)`, where
    `T` is a generic type that replaces any reference type (also added in Java 1.8).
    Streams generated from arrays can be parallelized, by calling the same `parallel()`
    method.


    The novelty with arrays is that a stream can be created from a part of the array,
    by specifying the start and the end indexes for the array chunk. The code in Listing
    [8-8](#463938_3_En_8_Chapter.xhtml#PC9) shows the creation of a stream from a
    part of the array and the output of printing the elements of the resulting stream
    using a simple consumer.


    ```

    package com.apress.bgn.eight;

    import java.util.Arrays;

    import static java.lang.System.out;

    public class ArrayStreamDemo {

    void main() {

    int[] arr = { 50, 10, 250, 100 /* ... */};

    Arrays.stream(arr, 3,6).forEach(

    i -> System.out.println(Thread.currentThread().getName() + ": " + i)

    );

    }

    }

    // output

