  trans: '

    ### 独立服务器上的 Java Web 应用


    设计部署在应用服务器上的 Java Web 应用通常被打包为 Web 归档（war）文件或企业归档（ear）文件。这些是 Java 归档（jar）文件的特殊类型，用于将构成
    Web 应用的其他 JAR 文件、JSP 文件、Java 类、静态页面及其他资源组合在一起。有一个名为 `maven-war-plugin` 的 Maven
    插件，可将构件打包为 war 文件。EAR 是 Jakarta EE 使用的一种文件格式，用于将一个或多个模块打包成单个部署单元，部署到应用服务器上；它本质上将一组
    JAR 和 WAR 文件链接成一个单一应用。


    在本节中，我们将构建一个非常简单的 Web 应用，将其打包为 war 文件，其中包含 Java Server Pages，并将其部署到 Apache Tomcat
    服务器的独立实例上。


    要在本地安装 Apache Tomcat 服务器，请访问官方网站^(¹⁰²)，下载 Apache Tomcat 11 版本，并按照适用于您操作系统的说明进行操作。由于
    Apache Tomcat 以归档文件（zip 或 gz）形式提供，安装过程只需将其解压到计算机上的某个位置即可。在本节中，将使用 IntelliJ IDEA
    的 Tomcat 启动器来运行 Web 应用，因此与服务器的交互将非常少。


    Java Web 应用的结构与典型的 Java 应用不同。它包含典型的 `main` 和 `test` 目录，但还包含一个存放 Web 资源的 `webapp`
    目录。项目结构如图 10-19 所示。


    ![](img/463938_3_En_10_Fig19_HTML.jpg)


    图 10-19


    Web 应用结构变化


    请注意位于 `WEB-INF` 目录下的 `web.xml` 文件。该文件定义了 Web 应用的结构。在 Servlet 3.0 之前，此文件是将 Servlet
    映射到 URL 模式并将其配置为应用一部分的唯一方式。在 Servlet 3.0 及引入注解之后，该文件基本为空。


    当构建 Web 应用时，应用的字节码会保存在 `WEB-INF/classes` 下。如果应用使用了第三方库，它们都会保存在 `WEB-INF/lib` 中。


    现在，回到 Jakarta Pages。


    编写 JSP 页面有两种方式。最简单的方式（如今很少使用，因为它将 HTML 代码与 Java 代码耦合在一起）是使用 **JSP 脚本片段**。JSP 脚本片段是使用指令标签嵌入在
    HTML 代码中的 Java 代码片段。有三种类型的指令标签：


    *   `<%@ page ... %>` 用于向容器提供指令。使用此指令声明的指令属于当前页面，并且可以在页面中的任何位置使用。此类指令可用于导入 Java
    类型或定义页面属性。示例：

    *   `<%@ include ... %>` 用于在翻译阶段包含一个文件。因此，使用此指令的当前 JSP 文件是其内容与使用此指令声明的文件内容的组合：`<%@
    include file = "footer.jsp" >`


    *   `<%@ taglib ... %>` 用于声明一个标签库，其中包含将在 JSP 页面中使用的元素。此声明很重要，因为它用于导入一个包含自定义标签和元素的库，这些标签和元素将用于编写
    JSP 页面。这些标签提供了动态功能，而无需使用脚本片段。


    图 10-19 中显示的 `index.jsp` 页面非常简单，其内容如清单 10-38 所示。


    ```


    Web 应用演示 JSP 页面


    今天是


    清单 10-38

    非常简单的 index.jsp 页面内容

    ```


    `index.jsp` 页面除了打印当前日期外不做其他事情，它通过调用 `new Date()` 来实现。如您所见，我们在看似 HTML 的页面中使用了 Java
    代码。由于包含了这些指令且扩展名为 `.jsp`，容器知道此文件必须编译为 Servlet。当访问 Web 应用的根域名时（如果没有将任何内容映射到默认 URL
    模式 `/`），默认打开的页面是名为 `index.html`、`index.htm` 或本例中的 `index.jsp` 文件。


    将 `index.jsp` 文件添加到 `WEB-INF` 目录中，确保容器可以找到它之后，剩下的工作就是在 IntelliJ IDEA 中配置一个 Apache
    Tomcat 启动器，并配置它在启动 Tomcat 之前部署构建此应用时生成的 war 文件。


    要配置 Apache Tomcat 启动器，IntelliJ IDEA 需要启用 Tomcat 和 TomEE 插件。如果您安装 IntelliJ IDEA
    时未进行自定义，则此插件默认已安装。如果您设法卸载了它，只需打开 IntelliJ IDE **设置**窗口，选择**插件**，在**市场**选项卡中查找它，然后勾选其复选框，如图
    10-20 所示（但应选中**已安装**选项卡，因为我已经安装了该插件）。


    ![](img/463938_3_En_10_Fig20_HTML.jpg)


    图 10-20


    在 IntelliJ IDEA 中启用 Tomcat 和 TomEE 插件


    安装插件后，单击**启动**部分，然后单击三个点（图 10-21 中标记为 1），在弹出的对话框中单击**编辑**（2），然后单击左下角的**编辑配置模板**链接（3）。在打开的“运行/调试配置模板”对话框中，从左侧列表中选择
    **Tomcat Server ➤ Local**（4），然后单击**配置**按钮（5）。在“应用服务器”对话框中，将 **Tomcat Home** 字段设置为系统上解压
    Apache Tomcat 服务器的位置，如图 10-21 所示。


    ![](img/463938_3_En_10_Fig21_HTML.jpg)


    图 10-21


    配置用于 IntelliJ IDEA Web 启动器的 Apache Tomcat 实例


    配置好用于 Web 启动器的 Tomcat 实例后，我们需要创建一个启动器。再次单击**启动**部分的三个点，然后单击**编辑…**，但这次，在弹出的“运行/调试配置”对话框中，选择左上角的
    **+**（加号）按钮（图 10-22 中标记为 1）。然后从列表中选择 **Tomcat Server ➤ Local**（2）。右侧会出现一个包含启动器详细信息的表单，如图
    10-22 所示。


    ![](img/463938_3_En_10_Fig22_HTML.jpg)


    图 10-22


    在 IntelliJ IDEA 中配置 Web 启动器


    为启动器设置一个更相关的名称，例如 `web-app`。然后点击**修复**按钮或**部署**选项卡，并点击 **+** 按钮选择构件，如图 10-23 所示。IntelliJ
    IDEA 将识别项目中的所有 Web 应用，并提供一个列表供选择。选择 `web-app:war`，如图 10-23 所示。


    ![](img/463938_3_En_10_Fig23_HTML.jpg)


    图 10-23


    在 IntelliJ IDEA 中创建 Apache Tomcat 启动器——选择要部署的 Web 应用


    在**部署**选项卡中，还有一个名为“应用上下文”的文本字段。IntelliJ IDEA 会根据应用名称生成一个默认的上下文名称。将其更改为 **demo**。


    配置好启动器后，启动服务器，并在浏览器中打开 `http://localhost:8080/demo` 页面。您应该会在页面上看到类似这样的简单消息：


    ```

    Today is Sun Jul 28 23:56:18 BST 2024

    ```

