- fmt: '### Pattern Matching for `switch`


    Chapter 6 introduced the `instanceof` operator to check the type of an instance
    and perform a certain operation based on it. This meant, however, that in the
    case where an object could have multiple types, you would end up with a construction
    similar to the one shown in Listing 7-15.


    ```

    if (obj instanceof type1 t1) {

    //do something with t1

    } else  if (obj instanceof type2 t2) {

    //do something with t2

    } else if (...) {

    } else {

    // action when type is none of the above

    }

    ```


    The code in Listing 7-15 gets the job done and is not wrong in any way, but it
    is tedious to write and it looks bad. Putting all those conditions in a `switch`
    expression would be nice, wouldn’t it? Well, we can, starting with Java 21.


    The `switch` expression is powerful and practical, but it does not come close
    to the similar constructs in other languages (e.g., the `when` construct in Kotlin)—at
    least it didn’t until Java 17, when pattern matching for `switch` was introduced
    as a feature preview. The pattern matching for `switch` feature matured and was
    released in Java 21. Extending pattern matching to `switch` allows an expression
    to be tested against a number of patterns, each with a specific action, so that
    complex data-oriented queries can be expressed concisely and safely. This means,
    starting with Java 21, we can write code similar to shown in Listing 7-16.


    ```

    package com.apress.bgn.seven.pattern;

    import com.apress.bgn.four.classes.Gender;

    import com.apress.bgn.four.hierarchy.MiliVanili;

    import com.apress.bgn.four.hierarchy.Performer;

    import com.apress.bgn.six.Graphician;

    import java.util.List;

    import static java.lang.System.out;

    public class PatternDemo {

    void main(){

    Object obj = genRandomInstance();

    var res = switch (obj) { /* (*) */

    case Performer p -> "Performed in: " + p.getFilms();

    case MiliVanili m -> "Creativity " + (m.isCreative() ? "found" : "not found");

    case Graphician g -> "Prefers " + g.getFavoriteOs();

    case Painter p -> "Style: " + p.getStyle();

    default -> "something else";

    };

    out.println(res);

    }

    static Object genRandomInstance(){

    var t = System.currentTimeMillis();

    if (t % 3 == 0 ) {

    return new Painter("Pablo Picasso", "Cubism", "School of Fine Arts Barcelona");

    } else if (t % 5 == 0 ) {

    return new Performer("Sean", 94, 1.88f, Gender.MALE, List.of("James Bond"));

    } else if (t % 11 == 0) {

    return new MiliVanili();

    } else if (t % 17 == 0) {

    return new Graphician("Diana", 23, 1.62f, Gender.FEMALE, "macOs");

    } else  if (t % 23== 0) {

    return "random text";

    } else  if (t % 31== 0) {

    return Integer.MAX_VALUE;

    }

    return null;

    }

    }

    ```


    The `genRandomInstance()` method is included in the example to show the possible
    types of the object being tested. Repeated runs of the program in Listing 7-16
    will generate a different output based on the current system time. Notice that
    the `switch` expression (and statement) supporting objects of any types to be
    tested allows the case labels to work with patterns instead of just constants.
    Running the code a few times might generate an object of each type, but you might
    notice that sometimes a `NullPointerException` exception with the following message
    is thrown:


    ```

    Exception in thread "main" java.lang.NullPointerException

    at java.base/java.util.Objects.requireNonNull(Objects.java:220)

    at chapter.seven/com.apress.bgn.seven.pattern.PatternDemo.main(PatternDemo.java:47)

    ```


    So what gives? If you open the `PatternDemo.java` file in an editor, you will
    notice that the line where the exception is thrown is the first line of the `switch`
    expression (the line marked with `(*)` in the example). This happens because the
    expression evaluates to `null`. To avoid this, we could test for `null` before
    evaluating the `switch` expression, but that would add extra code. The good news
    is that pattern matching for `switch` supports `null` values as an option too.
    So we can rewrite the `switch` expression to include a `null` option and return
    a `string` for this scenario, and *voila*, no more exceptions are thrown (see
    Listing 7-17); instead, when the `genRandomInstance()` method returns `null`,
    the *no object* text is printed in the console.


    ```

    package com.apress.bgn.seven.pattern;

    import com.apress.bgn.four.classes.Gender;

    import com.apress.bgn.four.hierarchy.MiliVanili;

    import com.apress.bgn.four.hierarchy.Performer;

    import com.apress.bgn.six.Graphician;

    import java.util.List;

    import static java.lang.System.out;

    public class PatternDemo {

    void main(){

    Object obj = genRandomInstance();

    var res = switch (obj) {

    case null -> "no object";

    case Performer p -> "Performed in: " + p.getFilms();

    case MiliVanili m -> "Creativity " + (m.isCreative() ? "found" : "not found");

    case Graphician g -> "Prefers " + g.getFavoriteOs();

    case Painter p -> "Style: " + p.getStyle();

    default -> "something else";

    };

    out.println(res);

    }

    // method genRandomInstance() omitted

    }

    ```


    An interesting thing happens when a `switch` statement or expression has options
    in a sealed hierarchy. You might not have noticed (unless you wrote some of the
    code in this chapter yourself), but when writing a `switch` statement or expression,
    unless the options are part of a fixed set, such as `enum`, the compiler always
    forces you to add a `default` option. This is not the case for the types in a
    sealed hierarchy—*can you guess why?*


    The answer is quite simple: since interfaces and classes declare which other interfaces
    and classes are implementing them, the set of types becomes known at compile time,
    so it is possible by using the root of the hierarchy as a reference type for a
    generated instance to write a `switch` statement or expression that does not require
    a `default` option. Also, because all the types are part of the same hierarchy,
    the most specific types must come first in the list of options.


    Considering the sealed hierarchy introduced in Chapter 4, which has sealed interface
    `com.apress.bgn.four.sealed.two.Mammal` at the root, we could write a `switch`
    expression like the one shown in Listing 7-18.


    ```

    // sealed hierarchy from Chapter 4

    package com.apress.bgn.four.sealed.two;

    public sealed interface Mammal permits Human { }

    public sealed class Human implements Mammal permits Performer, Engineer { ...
    }

    public non-sealed class  Engineer extends Human {...}

    public final class Performer  extends Human { ... }

    // testing class

    package com.apress.bgn.seven.sealed;

    import com.apress.bgn.four.classes.Gender;

    import com.apress.bgn.four.sealed.two.Engineer;

    import com.apress.bgn.four.sealed.two.Human;

    import com.apress.bgn.four.sealed.two.Mammal;

    import com.apress.bgn.four.sealed.two.Performer;

    public class SealedHierachyDemo {

    void main(){

    var obj = genRandomInstance();

    switch (obj) {

    case Engineer e -> System.out.println(e);

    case Performer p -> System.out.println(p);

    case Human h -> System.out.println(h);

    }

    }

    public static Mammal genRandomInstance(){

    var t = System.currentTimeMillis();

    if (t % 3 == 0 ) {

    return new Engineer("Juan", 41, Gender.MALE);

    } else if (t % 5 == 0 ) {

    return new Human("Om", 41, Gender.MALE);

    }

    return new Performer("Ada", 209, Gender.FEMALE);

    }

    }

    ```'
  raw: '### Pattern Matching for **switch**


    **Chapter** [**6**](#463938_3_En_6_Chapter.xhtml) introduced the `instanceof`
    operator to check the type of an instance and perform a certain operation based
    on it. This meant, however, that in the case where an object could have multiple
    types, you would end up with a construction similar to the one shown in Listing
    [7-15](#463938_3_En_7_Chapter.xhtml#PC15).


    ```

    if (obj instanceof type1 t1) {

    //do something with t1

    } else  if (obj instanceof type2 t2) {

    //do something with t2

    } else if (...) {

    } else {

    // action when type is none of the above

    }

    Listing 7-15

    if Statement Checking Multiple Types for an Object

    ```


    The code in Listing [7-15](#463938_3_En_7_Chapter.xhtml#PC15) gets the job done
    and is not wrong in any way, but it is tedious to write and it looks bad. Putting
    all those conditions in a `switch` expression would be nice, wouldn’t it? Well,
    we can, starting with Java 21.


    `The switch` expression is powerful and practical, but it does not come close
    to the similar constructs in other languages (e.g., the `when` construct in Kotlin)—at
    least it didn’t until Java 17, when pattern matching for `switch` was introduced
    as a feature preview. The pattern matching for `switch` feature matured and was
    released in Java 21\. Extending pattern matching to `switch` allows an expression
    to be tested against a number of patterns, each with a specific action, so that
    complex data-oriented queries can be expressed concisely and safely. This means,
    starting with Java 21, we can write code similar to shown in Listing [7-16](#463938_3_En_7_Chapter.xhtml#PC16).


    ```

    package com.apress.bgn.seven.pattern;

    import com.apress.bgn.four.classes.Gender;

    import com.apress.bgn.four.hierarchy.MiliVanili;

    import com.apress.bgn.four.hierarchy.Performer;

    import com.apress.bgn.six.Graphician;

    import java.util.List;

    import static java.lang.System.out;

    public class PatternDemo {

    void main(){

    Object obj = genRandomInstance();

    var res = switch (obj) { /* (*) */

    case Performer p -> "Performed in: " + p.getFilms();

    case MiliVanili m -> "Creativity " + (m.isCreative() ? "found" : "not found");

    case Graphician g -> "Prefers " + g.getFavoriteOs();

    case Painter p -> "Style: " + p.getStyle();

    default -> "something else";

    };

    out.println(res);

    }

    static Object genRandomInstance(){

    var t = System.currentTimeMillis();

    if (t % 3 == 0 ) {

    return new Painter("Pablo Picasso", "Cubism", "School of Fine Arts Barcelona");

    } else if (t % 5 == 0 ) {

    return new Performer("Sean", 94, 1.88f, Gender.MALE, List.of("James Bond"));

    } else if (t % 11 == 0) {

    return new MiliVanili();

    } else if (t % 17 == 0) {

    return new Graphician("Diana", 23, 1.62f, Gender.FEMALE, "macOs");

    } else  if (t % 23== 0) {

    return "random text";

    } else  if (t % 31== 0) {

    return Integer.MAX_VALUE;

    }

    return null;

    }

    }

    Listing 7-16

    switch Statement Checking Multiple Types for an Object

    ```


    The `genRandomInstance()` method is included in the example to show the possible
    types of the object being tested. Repeated runs of the program in Listing [7-16](#463938_3_En_7_Chapter.xhtml#PC16)
    will generate a different output based on the current system time. Notice that
    the `switch` expression (and statement) supporting objects of any types to be
    tested allows the case labels to work with patterns instead of just constants.
    Running the code a few times might generate an object of each type, but you might
    notice that sometimes a `NullPointerException` exception with the following message
    is thrown:


    ```

    Exception in thread "main" java.lang.NullPointerException

    at java.base/java.util.Objects.requireNonNull(Objects.java:220)

    at chapter.seven/com.apress.bgn.seven.pattern.PatternDemo.main(PatternDemo.java:47)

    ```


    So what gives? If you open the `PatternDemo.java` file in an editor, you will
    notice that the line where the exception is thrown is the first line of the `switch`
    expression (the line marked with `(*)` in the example). This happens because the
    expression evaluates to `null`. To avoid this, we could test for `null` before
    evaluating the `switch` expression, but that would add extra code. The good news
    is that pattern matching for `switch` supports `null` values as an option too.
    So we can rewrite the `switch` expression to include a `null` option and return
    a `string` for this scenario, and *voila*, no more exceptions are thrown (see
    Listing [7-17](#463938_3_En_7_Chapter.xhtml#PC18)); instead, when the `genRandomInstance()`
    method returns `null`, the *no object* text is printed in the console.


    ```

    package com.apress.bgn.seven.pattern;

    import com.apress.bgn.four.classes.Gender;

    import com.apress.bgn.four.hierarchy.MiliVanili;

    import com.apress.bgn.four.hierarchy.Performer;

    import com.apress.bgn.six.Graphician;

    import java.util.List;

    import static java.lang.System.out;

    public class PatternDemo {

    void main(){

    Object obj = genRandomInstance();

    var res = switch (obj) {

    case null -> "no object";

    case Performer p -> "Performed in: " + p.getFilms();

    case MiliVanili m -> "Creativity " + (m.isCreative() ? "found" : "not found");

    case Graphician g -> "Prefers " + g.getFavoriteOs();

    case Painter p -> "Style: " + p.getStyle();

    default -> "something else";

    };

    out.println(res);

    }

    // method genRandomInstance() omitted

    }

    Listing 7-17

    switch Statement Checking Multiple Types for an Object and Handling null Values

    ```


    An interesting thing happens when a `switch` statement or expression has options
    in a sealed hierarchy. You might not have noticed (unless you wrote some of the
    code in this chapter yourself), but when writing a `switch` statement or expression,
    unless the options are part of a fixed set, such as `enum`, the compiler always
    forces you to add a `default` option. This is not the case for the types in a
    sealed hierarchy—*can you guess why?*


    The answer is quite simple: since interfaces and classes declare which other interfaces
    and classes are implementing them, the set of types becomes known at compile time,
    so it is possible by using the root of the hierarchy as a reference type for a
    generated instance to write a `switch` statement or expression that does not require
    a `default` option. Also, because all the types are part of the same hierarchy,
    the most specific types must come first in the list of options.


    Considering the sealed hierarchy introduced in **Chapter** [**4**](#463938_3_En_4_Chapter.xhtml),
    which has sealed interface `com.apress.bgn.four.sealed.two.Mammal` at the root,
    we could write a `switch` expression like the one shown in Listing [7-18](#463938_3_En_7_Chapter.xhtml#PC19).


    ```

    // sealed hierarchy from Chapter 4

    package com.apress.bgn.four.sealed.two;

    public sealed interface Mammal permits Human { }

    public sealed class Human implements Mammal permits Performer, Engineer { ...
    }

    public non-sealed class  Engineer extends Human {...}

    public final class Performer  extends Human { ... }

    // testing class

    package com.apress.bgn.seven.sealed;

    import com.apress.bgn.four.classes.Gender;

    import com.apress.bgn.four.sealed.two.Engineer;

    import com.apress.bgn.four.sealed.two.Human;

    import com.apress.bgn.four.sealed.two.Mammal;

    import com.apress.bgn.four.sealed.two.Performer;

    public class SealedHierachyDemo {

    void main(){

    var obj = genRandomInstance();

    switch (obj) {

    case Engineer e -> System.out.println(e);

    case Performer p -> System.out.println(p);

    case Human h -> System.out.println(h);

    }

    }

    public static Mammal genRandomInstance(){

    var t = System.currentTimeMillis();

    if (t % 3 == 0 ) {

    return new Engineer("Juan", 41, Gender.MALE);

    } else if (t % 5 == 0 ) {

    return new Human("Om", 41, Gender.MALE);

    }

    return new Performer("Ada", 209, Gender.FEMALE);

    }

    }

    Listing 7-18

    switch Expression Checking Multiple Types from a sealed Hierarchy for an Object

    ```'
