    \nAfter reading this chapter and running the provided code samples, it should\
    \ be obvious why the Stream API is so awesome. Personally, I like four things\
    \ best:\n\n*   More compact and simple code can be written to solve problems without\
    \ losing readability (`if` statements and loops can be avoided),\n*   Parallel\
    \ processing of data is possible without the boilerplate code required before\
    \ Java 8, as long as the performance angle is taken into consideration.\n*   Code\
    \ can be written in functional programming style.\n*   Complex processing can\
    \ be implemented using gatherers.\n\nAlso, the Stream API is a more declarative\
    \ way of programming, as most stream methods take arguments of type `Consumer<T>`,\
    \ `Predicate<T>`, `Supplier<T>`, `Function<T>`, and so on, that declare what should\
    \ be done for each stream element, but the methods are not explicitly called unless\
    \ there are elements on the stream.\n\nThis chapter also covered how to use `Optional<T>`\
    \ instances to avoid `NullPointerException`s and writing `if` statements.\n\n\
    Having finished reading this chapter, you should have a pretty good idea about\
    \ the following:\n\n*   How to create sequential and parallel streams from collections\n\
    *   What empty streams are useful for\n*   These stream-related terms:\n    *\
    \   sequence of elements\n    *   predicate\n    *   consumer\n    *   supplier\n\
    \    *   gatherer\n    *   method reference\n    *   source\n    *   aggregate\
    \ operations\n    *   intermediate operation\n    *   terminal operation\n   \
    \ *   pipelining\n    *   internal automatic iterations\n*   How to create and\
    \ use `Optional<T>` instances\n*   How to use built-in gatherers\n*   How to implement\
    \ custom gatherers\n*   How to debug stream pipelines\n\nFootnotes [1](#463938_3_En_8_Chapter.xhtml#Fn1_source)\
