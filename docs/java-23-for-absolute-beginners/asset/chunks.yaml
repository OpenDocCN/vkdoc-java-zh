    # 11. 处理文件


    软件最重要的功能之一是组织和存储信息，目的是使用和共享信息。传统的（且正在消退的）组织和存储信息的方式是将其写在纸上，并将纸张存放在有组织的文件柜中，以便在需要时检索。软件应用程序做着类似的事情：信息被写入文件，文件被组织在目录中，在大多数情况下，数据存储在更复杂的结构中，称为数据库。Java
    提供了从文件和数据库读取信息的类，以及写入文件和向数据库写入信息的类。数据库在前面的章节中已经提到过，**第** **9** **章**介绍了一个使用 Apache
    Derby 内存数据库的简单示例，向您展示了如何模拟像数据库这样的重量级依赖项以允许进行单元测试。本章不涉及使用数据库，因为编写使用数据库的 Java 应用程序是一个高级主题，并且需要您安装额外的软件。相反，本章重点介绍读取和写入文件以及实现此目的的多种方法。

