    `executeQuery(..)`方法执行给定的SQL语句并返回单个`ResultSet`对象。此方法允许我们通过检查MySQL`user`表的内容来验证用户是否已创建。


    除了此处列出的方法外，`Statement`接口还提供了一些其他实用方法。然而，这些方法都无法帮助将`ResultSet`转换为`Singer`实例，因此使用JDBC无法将SQL表行映射到Java对象。JDBC简单高效、安全且平台无关；但它并不以对开发者友好而著称。


    ## Summary


    本章涵盖了处理各种类型文件、序列化Java对象并保存到文件、以及通过反序列化恢复它们所需的大部分细节。在编写Java应用程序时，很可能需要将数据保存到文件或从文件读取数据，本章提供了相当广泛的组件来实现这一点。以下是本章所学内容的简要总结：


    *   使用`File`和`Path`实例

    *   使用`java.nio.file.Files`和`java.nio.file.Paths`中的实用方法

    *   将Java对象序列化/反序列化为二进制、XML和JSON格式

    *   使用Java Media API调整和修改图像大小

    *   在JavaFX应用程序中使用图像

    *   使用JDBC执行SQL DDL和DML语句


