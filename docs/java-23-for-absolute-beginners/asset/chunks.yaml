    to the three `for` nested loops used earlier, but this time, when the `k` index
    is equal to 1, nothing is printed, and we skip to the next step of the loop enclosing
    the `k` loop. The code is shown in Listing [7-46](#463938_3_En_7_Chapter.xhtml#PC48).


    ```

    package com.apress.bgn.seven.forloop;

    import static java.lang.System.out;

