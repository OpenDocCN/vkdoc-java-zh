  trans: '

    言归正传，回到 Java Web 应用。Java Web 应用是动态的：页面是通过使用 Servlet 和 JSP 页面的 Java 代码生成的。因此，Java
    Web 应用并非运行在服务器上，而是运行在服务器内部的 Web 容器中。（这就是为什么 Tomcat 和 Jetty 有时被称为 *servlet 容器*。）Web
    容器为 Java Web 应用提供了 Java 运行时环境。Apache Tomcat 就是这样一个运行在 JVM 中的容器，它支持 Servlet 和 JSP
    页面的执行。**Servlet** 是一个 Java 类，它是 `jakarta.servlet.http.HttpServlet` 的子类。此类型的实例在
    Web 容器内响应 HTTP 请求。


    注意


    Apache Tomcat 11.x 是 Jakarta EE（原 Java EE）技术子集的一个开源软件实现。Tomcat 基于 Servlet 5.0、JSP
    3.0、EL 4.0、WS 2.0 和 JASIC 2.0。在 Tomcat 9.x 及更早版本中，**Servlet** 是一个 Java 类，它是 `javax.servlet.http.HttpServlet`
    的子类。Tomcat 10.x 需要从 `javax.*` 包迁移到 `jakarta.*` 包，以将 Oracle 官方 Java 产品与使用 Eclipse
    构建服务器构建的开源产品区分开来^(¹⁰⁰)。


    **JSP 页面** 是一个扩展名为 `.jsp` 的文件，其中包含 HTML 和 Java 代码。JSP 页面在首次被访问时，会被 Web 容器编译成一个
    Servlet。本质上，Servlet 是 Java Web 应用的核心元素。服务器还必须知道 Servlet 的存在以及如何识别它，这就用到了 `tomcat.addServlet(contextPath,
    servletName, servlet)` 这个调用。它基本上是说，将名为 `servletName` 的 Servlet 添加到 `contextPath`
    值对应的应用上下文中，然后通过调用 `context.addServletMapping(urlPattern, servletName)` 将一个 URL
    模式与该 Servlet 关联起来。


    当 Java Web 应用运行时，其所有的 Servlet 和 JSP 都在其上下文中运行，但它们必须在代码中被添加到上下文中，并映射到一个 URL 模式。匹配该
    URL 模式的请求 URL 将由配置好的 Servlet 处理。在代码清单 10-34 中，Servlet 是通过实例化 `HttpServlet` 抽象类当场创建的，并产生了一个匿名
    Servlet 实例。代码清单 10-35 展示了一个名为 `SampleServlet` 的具体类，它继承了 `HttpServlet` 类。这样做的好处是，URL
    模式和 Servlet 名称可以成为该类的属性，从而简化将它们添加到应用上下文的语法。


    ```

    package com.apress.bgn.ten;

    import jakarta.servlet.http.HttpServlet;

    import jakarta.servlet.http.HttpServletRequest;

    import jakarta.servlet.http.HttpServletResponse;

    import java.io.IOException;

    import java.util.logging.Logger;

    public class SampleServlet  extends HttpServlet {

    private static final Logger LOGGER = Logger.getLogger(SampleServlet.class.getName());

    private final String servletName = "sampleServlet";

    private final String urlPattern = "/sample";

    @Override

    protected void doGet(HttpServletRequest req, HttpServletResponse resp)

    throws IOException {

    PrintWriter writer = resp.getWriter();

    try {

    writer.println(WebResourceUtils.readResource("index.html"));

    } catch (Exception e) {

    LOGGER.warning("Could not read static file : " + e.getMessage());

    }

    }

    @Override

    public String getServletName() {

    return servletName;

    }

    public String getUrlPattern() {

    return urlPattern;

    }

    }

    代码清单 10-35

    SampleServlet 类

    ```


    出于实际原因，`urlPattern` 属性被添加到了这个类中，以便将所有与此 Servlet 相关的内容集中在一处。`servletName` 也是如此。如果意图是多次实例化此类以创建多个
    Servlet，那么这两个属性应声明为可配置的。将此 Servlet 添加到应用程序非常简单。需要创建一个此类型的对象，然后调用 `tomcat.addServlet(..)`
    和 `context.addServletMappingDecoded(..)` 方法，如代码清单 10-36 所示。


    ```

    SampleServlet sampleServlet = new SampleServlet();

    tomcat.addServlet(contextPath, sampleServlet.getServletName(), sampleServlet);

    context.addServletMappingDecoded(sampleServlet.getUrlPattern(), sampleServlet.getServletName());

    代码清单 10-36

    将 SampleServlet 类添加到 Web 应用

    ```


    在 `doGet(..)` 方法内部，读取了 `index.html` 文件的内容（使用 `WebResourceUtils`，它是本章项目的一部分，但与本章内容无关），并使用响应的
    `PrintWriter` 将这些内容写入响应对象。


    如您所见，`doGet(..)` 方法接收两个对象作为参数：读取 `HttpServletRequest` 实例，可以使用适当的方法访问客户端发送的所有请求内容；以及
    `HttpServletResponse` 实例，用于向响应中添加信息。在代码清单 10-36 中，我们只是写入从另一个文件读取的 HTML 代码。另一个可以调用的方法是
    `response.setStatus(HttpServletResponse.SC_OK)`，它用于设置响应状态。


    除了 `doGet(..)` 方法之外，还有与每个 HTTP 方法对应的 `do*(..)` 方法，它们声明了相同类型的参数。


    从 Java Servlet 3.0 规范开始，可以使用 `@WebServlet` 注解编写 Servlet，这消除了像代码清单 10-36 那样显式添加到
    Web 应用并在上下文中进行映射的必要性，因为当 Tomcat 启动时，它们会被自动拾取。此外，也无需实例化 Servlet 类。


    Servlet 3.0 之后的 `SampleServlet` 类如代码清单 10-37 所示。


    ```

    package com.apress.bgn.ten;

    import jakarta.servlet.annotation.WebServlet;

    import jakarta.servlet.http.*;

    // 其他导入语句已省略

    @WebServlet(

    name = "sampleServlet",

    urlPatterns = {"/sample"}

    )

    public class SampleServlet  extends HttpServlet {

    private static final Logger LOGGER = Logger.getLogger(SampleServlet.class.getName());

    @Override

    protected void doGet(HttpServletRequest req, HttpServletResponse resp)

    throws IOException {

    PrintWriter writer = resp.getWriter();

    try {

    writer.println(WebResourceUtils.readResource("index.html"));

    } catch (Exception e) {

    LOGGER.warning("Could not read static file : " + e.getMessage());

    }

    }

    }

    代码清单 10-37

    带注解的 SampleServlet 类

    ```


    所以，这就是我们处理 Servlet 的方式，但是如何使用嵌入式服务器处理 JSP 页面呢？这并非不可能，但也不容易。因此，对于这项任务，人们通常依赖更智能的框架，例如
    Spring Boot。^(¹⁰¹)

    '
- fmt: '### Java Web Application on a Standalone Server


    Java web applications that are designed to be deployed on an application server
    are either packaged as a Web Archive (`war`) file or Enterprise Archive (`ear`)
    file. These are special types of Java Archive (`jar`) files that are used to group
    together other Jars, JSPs, Java classes, static pages, and other resources that
    are part of a web application. There is a Maven plugin named `maven-war-plugin`
    that packs an artifact as a `war` file. `EAR` is a file format used by Jakarta
    EE to package one or more modules into a single deployment onto an application
    server; it basically links a group of jars and wars together into a single application.


    In this section we’ll build a very simple web application, packaged as a `war`
    file and containing Java Server Pages, and deploy it to a stand-alone instance
    of an Apache Tomcat server.


    To install Apache Tomcat server locally, go to the official site^([(102)](#fn102))
    and download Apache Tomcat version 11 and follow the instructions for your operating
    system. Since Apache Tomcat is provided as an archive (zip or gz), the installation
    process should be as simple as unpacking it somewhere on your computer. In this
    section an IntelliJ IDEA Tomcat launcher is used to run the web application, so
    the interaction with the server will be minimal.


    A Java web application has a different structure than a typical Java application.
    It contains the typical `main` and `test` directories, but it also contains a
    `webapp` directory that contains the web resources. The project structure is depicted
    in Figure [10-19](#463938_3_En_10_Chapter.xhtml#Fig19).


    ![](images/463938_3_En_10_Chapter/463938_3_En_10_Fig19_HTML.jpg)


    Figure 10-19 Web application structure change


    Notice the `web.xml` file located under the `WEB-INF` directory. This file defines
    the structure of the web application. Before Servlet 3.0 this file was the only
    way to map servlets onto url patterns and configure them to be part of the application.
    After Servlet 3.0 and the introduction of annotations, this file is mostly empty.


    When the web application is built, the bytecode of the application is saved under
    `WEB-INF/classes`. If the application uses third-party libraries, they are all
    saved into `WEB-INF/lib`.


    Now, back to Jakarta Pages.


    There are two ways of writing JSP pages. The simplest one, which is rarely used
    these days because it couples HTML code with Java code, is to use JSP scriptlets.
    JSP scriptlets are pieces of Java code embedded in HTML code using directive tags.
    There are three types of directive tags:


    *   `<%@ page ... %>` is used to provide instructions to the container. Instructions
    declared using this directive belong to the current page and can be used anywhere
    in the page. Such a directive can be used to import Java types or define page
    properties. Example:

    *   `<%@ include ... %>` is used to include a file during the translation phase.
    Thus, the current JSP file where this directive is used is a composition of its
    content and the content of the file that is declared using this directive: `<%@
    include file = "footer.jsp" >`

    *   `<%@ taglib ... %>` is used to declare a tag library with elements that will
    be used in the JSP page. This declarative is important because it is used to import
    a library with custom tags and elements that will be used to write the JSP page.
    These tags provide dynamic functionality without the need for scriptlets.


    The `index.jsp` page shown in Figure [10-19](#463938_3_En_10_Chapter.xhtml#Fig19)
    is quite simple, as its content in Listing [10-38](#463938_3_En_10_Chapter.xhtml#PC49)
    demonstrates.


    ```

    Web Application Demo JSP Page

    Today is

    ```


    Listing 10-38 The Very Simple `index.jsp` Page Contents


    The `index.jsp` page does nothing else but print today’s date, and it does so
    by calling `new Date()`. As you can see, we are using Java code in what looks
    like an HTML page. Because those directives are included and the extension is
    `.jsp`, the container knows this file must be compiled into a servlet. The default
    page a web application opens with when its root domain is accessed (if nothing
    was mapped to the default URL pattern, `/`) is a file named `index.html`, `index.htm`,
    or `index.jsp` in this case.


    After adding the `index.jsp` file in the `WEB-INF` directory and thus making sure
    the container can find it, all that is left to do is to configure an Apache Tomcat
    launcher in IntelliJ IDEA and configure it to deploy the `war` file that results
    when this application is built before starting Tomcat.


    To configure an Apache Tomcat launcher, IntelliJ IDEA needs to have the Tomcat
    and TomEE plugin enabled. If you install IntelliJ IDEA without customizing it,
    this plugin is installed by default. If you managed somehow to uninstall it, just
    open the IntelliJ IDE **Settings** window, select **Plugins**, look for it in
    the **Marketplace** tab, and check its box, as depicted in Figure [10-20](#463938_3_En_10_Chapter.xhtml#Fig20)
    (but with the **Installed** tab selected, because I already have the plugin installed).


    ![](images/463938_3_En_10_Chapter/463938_3_En_10_Fig20_HTML.jpg)


    Figure 10-20 Enabling Tomcat and TomEE plugin in IntelliJ IDEA


    Once the plugin is installed, click the **Launch** section and click the three
    dots (labeled 1 in Figure [10-21](#463938_3_En_10_Chapter.xhtml#Fig21)), click
    **Edit** (2) in the dialog window that pops up, and then click the **Edit configuration
    templates** link (3) in the lower left corner. In the Run/Debug Configuration
    Templates dialog window that opens, select **Tomcat Server ➤ Local** (4) from
    the list on the left, and then click the **Configure** button (5). In the Application
    Servers dialog window, set the **Tomcat Home** field to the location where you
    unzipped the Apache Tomcat server on your system, as depicted in Figure [10-21](#463938_3_En_10_Chapter.xhtml#Fig21).


    ![](images/463938_3_En_10_Chapter/463938_3_En_10_Fig21_HTML.jpg)


    Figure 10-21 Configuring Apache Tomcat instance to be used in web launchers in
    IntelliJ IDEA


    After configuring the instance of Tomcat to use with the web launchers, we need
    to create a launcher. Start again by clicking the three dots in the **Launch**
    section, then click **Edit…**, but this time, in the Run/Debug Configurations
    dialog window that pops up, select the **+** (plus) button (labeled 1 in Figure
    [10-22](#463938_3_En_10_Chapter.xhtml#Fig22)) in the upper left corner. Then from
    the list, select **Tomcat Server ➤ Local** (2). On the right side, a form with
    the launcher details appears, as shown in Figure [10-22](#463938_3_En_10_Chapter.xhtml#Fig22).


    ![](images/463938_3_En_10_Chapter/463938_3_En_10_Fig22_HTML.jpg)


    Figure 10-22 Configuring a web launcher in IntelliJ IDEA


    Set a more relevant name for the launcher, such as `web-app`. Then click the **Fix**
    button or the **Deployment** tab and click the **+** button to select an artifact,
    as shown in Figure [10-23](#463938_3_En_10_Chapter.xhtml#Fig23). IntelliJ IDEA
    will identify all web applications in the project and provide a list to choose
    from. Select `web-app:war`, as depicted in Figure [10-23](#463938_3_En_10_Chapter.xhtml#Fig23).


    ![](images/463938_3_En_10_Chapter/463938_3_En_10_Fig23_HTML.jpg)


    Figure 10-23 Creating Apache Tomcat launcher in IntelliJ IDEA—selecting the web
    application to deploy


    In the **Deployment** tab there is also a text field named Application Context.
    IntelliJ IDEA generates a default context name based on the application name.
    Change it to **demo**.


    After configuring the launcher, start the server and open the `http://localhost:8080/demo`
    page in your browser. You should see a simple message like this on the page:


    ```

    Today is Sun Jul 28 23:56:18 BST 2024

    ```'
