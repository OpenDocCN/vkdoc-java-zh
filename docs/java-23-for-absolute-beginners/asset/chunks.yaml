    ## Reading Files


    Every file is a succession of bits on a hard drive. A `File` handler does not
    provide methods to read the content of a file, but a group of other classes can
    be used to do so, all of which are created using a file handler instance. Java
    provides many ways to read files, the choice of which depends on what actually
    needs to be done with the contents of a file. This section will cover the four
    most common ways.


    ### Using `Scanner` to Read Files


    The `Scanner` class was used previously to read input from the command line. `System.in`
    can be replaced with a `File` and `Scanner` methods can be used to read file contents,
    as depicted in Listing [11-13](#463938_3_En_11_Chapter.xhtml#PC27).


    ```java

    package com.apress.bgn.eleven.io;

    import java.util.Scanner;

    // other import statements omitted

    public class ScannerDemo {

    private static final Logger LOGGER = LoggerFactory.getLogger(ScannerDemo.class);

    void main() {

    try {

    final String inDir = "chapter11/read-write-file/src/main/resources/input/";

    var scanner = new Scanner(new File("chapter11/read-write-file/src/main/resources/input/data.txt"));

    var content = "";

    while (scanner.hasNextLine()) {

    content += scanner.nextLine() + "\n";

    }

    scanner.close();

    LOGGER.info("Read with Scanner --> {}", content);

    } catch (IOException e) {

    LOGGER.error("Something went wrong! ", e);

    }

    }

    }

    ```

    **Listing 11-13** Using Scanner to Read a File


    Instead of a file, a `java.nio.file.Path` instance can be used as well:


    ```java

    scanner = new Scanner(Paths.get(new File("chapter11/read-write-file/src/main/resources/input/data.txt").toURI()),
    StandardCharsets.UTF_8.name());

    ```


    Files can be written using different sets of characters, referred to in Java by
    `java.nio.charset.Charset` instances. To ensure they are read correctly, it is
    a good practice to read them using the same charset. The `Scanner` constructor
    receives a charset name as an argument. The `StandardCharsets.UTF_8.name()` method
    is called to extract the name of the UTF-8 charset.


    ### Using Files Utility Methods to Read Files


    The first code sample in Listing [11-14](#463938_3_En_11_Chapter.xhtml#PC29) shows
    the simplest way to read a file.


    ```java

    package com.apress.bgn.eleven.io;

    import java.nio.file.Files;

    import java.nio.file.Paths;

    // other import statements omitted

    public class FilesReadDemo {

    private static final Logger LOGGER = LoggerFactory.getLogger(FilesReadDemo.class);

    void main() {

    final String inDir = "chapter11/read-write-file/src/main/resources/input/";

    var file = new File(inDir + "data.txt");

    try {

    var content = new String(Files.readAllBytes(Paths.get(file.toURI())));

    LOGGER.info("Read with Files.readAllBytes --> {}", content);

    } catch (IOException e) {

    LOGGER.info("Something went wrong! ", e);

    }

    }

    }

    ```

    **Listing 11-14** The Simplest Way to Read a File


    This approach works well when the file size can be approximated (the file size
    can be estimated and is relatively small) and storing it in a `String` object
    would not be a problem.


    The advantage of using `Files.readAllBytes(..)` is that no loop is needed, and
    we do not have to construct the `String` value line by line, because this method
    just reads all the bytes in the files that can be given as an argument to the
    `String` constructor. The disadvantage is that no `Charset` is used, so the text
    value might not be the one we expect. There is a way to overcome this, by calling
    `Files.readAllLines(..)` that returns the file content as a list of `String` values,
    and has two forms one of them declaring a `Charset` as a parameter. This version
    of reading a file is depicted in Listing [11-15](#463938_3_En_11_Chapter.xhtml#PC30).


    ```java

    try {

    List lyricList = Files.readAllLines(Paths.get(file.toURI()), StandardCharsets.UTF_8);

    lyricList.forEach(System.out::println);

    } catch (IOException e) {

    LOGGER.info("Something went wrong! ", e);

    }

    ```

    **Listing 11-15** A Simple Way to Read a File Specifying a Charset


    But what if we do not need a `List<String>`, but the one `String` instance? Java
    11 introduced a method for that: `readString(..)`. The code sample using it is
    shown in Listing [11-16](#463938_3_En_11_Chapter.xhtml#PC31).


    ```java

    try {

    var content = Files.readString(Paths.get(file.toURI()), StandardCharsets.UTF_8);

    LOGGER.info("Read with Files.readString --> {}", content);

    } catch (IOException e) {

    LOGGER.info("Something went wrong! ", e);

    }

    ```

    **Listing 11-16** The Simplest Way to Read a File into a Single String Specifying
    a Charset'
