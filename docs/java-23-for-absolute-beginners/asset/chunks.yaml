    using `jwebserver -d {path/to/dir}`. For example, starting the server using the
    `using-simplewebserver/src/main/resources` directory shows the `index.html` file
    when http://127.0.0.1:8000/ is accessed in the browser, as shown in Figure [10-16](#463938_3_En_10_Chapter.xhtml#Fig16).


