    boolean swapped = true;

    while (swapped) {

    swapped = false;

    for (int i = 0; i  arr[i + 1]) {

    int temp = arr[i];

    arr[i] = arr[i + 1];

    arr[i + 1] = temp;

    swapped = true;

    }

    }

    }

    Arrays.stream(arr).forEach(out::println);

    }

    }

    // output

