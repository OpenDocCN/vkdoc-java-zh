    package com.apress.bgn.five;

    public class NumericDemo {

    private byte b;

    private short s;

    private int i;

    private long l;

    private float f;

    private double d;

    void main() {

    NumericDemo nd = new NumericDemo();

    nd.b = 0b1100;

    System.out.println("Byte binary value: " + nd.b);

    nd.i = 42 ; // decimal case

    nd.i = 045 ; // octal case - base 8

    System.out.println("Int octal value: " + nd.i);

    nd.i = 0xcafe ; // hexadecimal case - base 16

    System.out.println("Int hexadecimal value: " + nd.i);

    nd.i = 0b10101010101010101010101010101011;

    System.out.println("Int binary value: " + nd.i);

    // Java 7 syntax

    nd.i = 0b1010_1010_1010_1010_1010_1010_1010_1011;

    System.out.println("Int binary value: " + nd.i);

    nd.l = 1000_000l; // equivalent to 1000_000L

    System.out.println("Long value: " + nd.l);

    nd.f = 5;

    System.out.println("Integer value assigned to a float variable: " + nd.f);

    nd.f = 2.5f; // equivalent to nd.f = 2.5F;

    System.out.println("Decimal value assigned to a float variable: " + nd.f);

    nd.d = 2.5d; // equivalent to nd.d = 2.5D;

    System.out.println("Decimal value assigned to a double variable: " + nd.f);

    }

    }

    // output

    /**

    Byte binary value: 12

    Int octal value: 37

    Int hexadecimal value: 51966

    Int binary value: -1431655765

    Int binary value: -1431655765

    Long value: 1000000

    Integer value assigned to a float variable: 5.0

    Decimal value assigned to a float variable: 2.5

    Decimal value assigned to a double variable: 2.5

    */

    Listing 5-12

    Code Sample Used to Print Primitive Values in Multiple Ways

    ```


    As you can figure out from Listing [5-12](#463938_3_En_5_Chapter.xhtml#PC21),
    integer numbers can be represented in Java in four ways:


    * **Decimal**: Base 10, written using digits 0 to 9.

    * **Octal**: Base 8, written using digits 0 to 7 and prefixed by 0 (zero); this
    means number 8 is represented in octal as the `010` digits.

    * **Hexadecimal**: Base 16, written using digits 0 to 9 and letters A to F, lowercase
    or uppercase and prefixed by `0x` or `0X`; this means that number 10 is represented
    in hexadecimal as `0x00A`, number 11 as `0x00B`, and so on until the letters in
    the set end, and 16 is represented as `0x010`.

    * **Binary**: Base 2, written using digits 0 and 1 and prefixed by `0b` or `0B`.
    This was already covered when explaining bits.


    You can read more about numeric representation in a computer programming book,
    but unless you end up working on some project requiring you to do mathematical
    operations, you will seldom get to play with representations other than decimal.


    Starting with Java 7, the `_` (underscore) is permitted to be used when declaring
    numeric values to group together digits and increase clarity. Of course, there
    are some limitations, such us `_` cannot be used:


    * At the start or end of a numeric value

    * For byte values

    * Next to digits or symbols representing the base (`0b`/`0B` for binary, `0` for
    octal, `0x`/`0X` for hexadecimal)

    * Next to the decimal point


    The output of executing the code in Listing [5-12](#463938_3_En_5_Chapter.xhtml#PC21)
    is depicted in Listing [5-13](#463938_3_En_5_Chapter.xhtml#PC22).


    ```

    Byte binary value: 12

    Int octal value: 37

    Int hexadecimal value: 51966

    Int binary value: -1431655765

    Int binary value: -1431655765

    Long value: 1000000

    Integer value assigned to a float variable: 5.0

    Decimal value assigned to a float variable: 2.5

    Decimal value assigned to a double variable: 2.5

    Listing 5-13

    Output from Executing the Code in Listing 5-12

    ```


    As no formatting is done when the variables are printed, the values depicted in
    the console are in the decimal system.


    For now, this is all that can be said about the primitive types. Each of the primitive
    types has a matching reference type defined within the JDK, which will be mentioned
    later in the chapter.


    ## Java Reference Types


    A short description of the Java reference types was provided earlier in the chapter
    to highlight the difference between primitive and reference types as early as
    possible. It is now time to expand that description and give some examples of
    the most-used JDK reference types when programming.


    **Objects** or **instances** are created using the `new` keyword followed by the
    call of a constructor. The constructor is a special member of a class and is used
    to create an object by initializing all fields of the class with their default
    values, or values received as arguments. A class instance is created by calling
    the class constructor (one of them, because there might be more than one defined
    within the class). Consider the example in **Chapter** [**4**](#463938_3_En_4_Chapter.xhtml)
    of the `Performer` class. To declare a reference to an object of type `Performer`,
    the following expression is used:


    ```

    Performer human = new Performer("John", 40, 1.91f, Gender.MALE);

    ```


    The interface reference types cannot be instantiated, but objects of class types
    that implement that interface can be assigned to references of that interface
    type. The hierarchy used in Chapter [4](#463938_3_En_4_Chapter.xhtml) is depicted
    in Figure [5-10](#463938_3_En_5_Chapter.xhtml#Fig10).


    ![](images/463938_3_En_5_Chapter/463938_3_En_5_Fig10_HTML.jpg)


    Figure 5-10


    Class and interface hierarchy


    Based on this hierarchy, the four statements in Listing [5-14](#463938_3_En_5_Chapter.xhtml#PC24)
    are valid; they compile, and the code can be executed successfully.


    ```

    package com.apress.bgn.five;

    import com.apress.bgn.four.classes.Gender;

    import com.apress.bgn.four.hierarchy.*;

    public class ReferencesDemo {

    void main() {

    Performer performer = new Performer("John", 40, 1.91f, Gender.MALE);

    Human human = new Performer("Jack", 40, 1.91f, Gender.MALE);

    Actor actor = new Performer("Jean", 40, 1.61f, Gender.UNSPECIFIED);

    Musician musician = new Performer("Jodie", 40, 1.81f, Gender.FEMALE);

    }

    }

    Listing 5-14

    Code Sample Showing Different Reference Types

    ```


    Listing [5-14](#463938_3_En_5_Chapter.xhtml#PC24) creates four objects of type
    `Performer` and assigns them to different reference types, including two interface
    reference types. If we were to inspect the stack and heap contents for the preceding
    method, we would find the scenario depicted in Figure [5-11](#463938_3_En_5_Chapter.xhtml#Fig11).


    ![](images/463938_3_En_5_Chapter/463938_3_En_5_Fig11_HTML.jpg)


    Figure 5-11


    Multiple reference types pointing to different objects in heap memory


    All the references in the previous example point to different objects in the heap,
    but having references of different types pointing to the same object is possible
    too, as shown in Listing [5-15](#463938_3_En_5_Chapter.xhtml#PC25).


    ```

    package com.apress.bgn.five;

    import com.apress.bgn.four.classes.Gender;

    import com.apress.bgn.four.hierarchy.*;

    public class ReferencesDemo {

    void main() {

