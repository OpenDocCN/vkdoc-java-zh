- fmt: 'However, before you are introduced to modules, you should know about access
    modifiers. Java types and their members are declared with certain access rights
    within packages, and that is something quite important to understand before jumping
    to coding.


    ### Access Modifiers


    When declaring a type in Java—let’s stick to the `class` for now, because it is
    the only one mentioned so far—you can configure its scope using access modifiers.


    Access modifiers can be used to specify access to classes, and in this case we
    say that they are used at top-level. They also can be used to specify access to
    class members, and in this case they are used at member-level (We will not mention
    nested classes right now. We’ll get there later in this chapter.


    At top-level only two access modifiers can be used: `public` and none. A top-level
    class that is declared `public` must be defined in a Java file with the same name.
    Listing [3-3](#463938_3_En_3_Chapter.xhtml#PC3) depicts a class named `Base` that
    is defined in a file named `Base.java` located in package `com.apress.bgn.zero`.


    ```

    package com.apress.bgn.zero;

    // top-level access modifier

    public class Base {

    // code omitted

    }

    Listing 3-3

    Base Class

    ```


    The contents of the class are not depicted for the moment and replaced with the
    `// code omitted` comment to stop you from losing focus. A public class is visible
    to all classes anywhere in the application. So, a different class in a different
    package can create an object of this type, as depicted in Listing [3-4](#463938_3_En_3_Chapter.xhtml#PC4).


    ```

    package com.apress.bgn.three;

    import com.apress.bgn.zero.Base;

    public class Main {

    public static void main(String... args) {

    // creating an object of type Base

    Base base = new Base();

    }

    }

    Listing 3-4

    Creating an Object Using the Base Class

    ```


    The line `Base base = new Base();` is where the object is created. The `new` keyword
    represents an operation called instantiation of a class, which means an object
    is created based on the specification described by the code that represents the
    `Base` class.


    Important


    A class is a template. Objects are created using this template and are called
    instances.


    For now, just let this affirmation sink in: a public class is visible to all classes
    everywhere.


    When no explicit access modifier is mentioned, it is said that the class is declared
    as default or that it is package-private. I know it seems confusing that there
    are two ways to talk about the lack of access modifiers, but because you might
    read other books or blog posts that refer to this situation, it is better to have
    all the possibilities listed here. This means if a class has no access modifier,
    the class can be used to create objects only by the classes defined in the same
    package. Its scope is limited to the package it is defined in. A class without
    an access modifier can be defined in any Java file, and it is not mandatory for
    the file name to coincide with the class name.


    Important


    When multiple classes are declared in the same file, the public class must have
    the same name as the file it is defined in, thus this is the class that names
    the file.


    To test this, let’s add a class named `HiddenBase` in the `Base.java` file introduced
    previously, as depicted in Listing [3-5](#463938_3_En_3_Chapter.xhtml#PC5).


    ```

    package com.apress.bgn.zero;

    public class Base {

    // code omitted

    }

    class HiddenBase {

    // you cannot see me

    }

    Listing 3-5

    Class with No Access Modifier

    ```


    Notice that the `Base` class is declared in the `com.apress.bgn.zero` package.
    If we try to create an object of type `HiddenBase` in a class declared within
    package `com.apress.bgn.three` (observe in a different package), the IDE will
    warn us by making the text red and refusing to provide any code completion. Furthermore,
    a tab listing the problems of the current file will be opened with an error message
    that is more than obvious, like depicted in Figure [3-6](#463938_3_En_3_Chapter.xhtml#Fig6).


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig6_HTML.jpg)


    Figure 3-6


    Java class with no accessor modifier error


    Important


    For now, let this affirmation sink in as well: a class with no access modifier
    is visible to all classes (and other types) in the same package.'
