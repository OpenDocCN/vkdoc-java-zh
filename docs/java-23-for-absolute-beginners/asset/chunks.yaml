  trans: '

    ## 使用 JavaFX 图像类


    除了以 `java.awt` 包组件为核心的 Java Media API 之外，JavaFX 还提供了另一种显示和编辑图像的方式。`javafx.scene.image`
    包的核心类名为 `Image`，可用于处理几种常见格式的图像：PNG、JPEG、BMP、GIF 等。JavaFX 应用程序使用 `javafx.scene.image.ImageView`
    的实例来显示图像，我最喜欢这个类的一点是，它可以在不修改原始图像的情况下缩放显示图像。


    要创建 `javafx.scene.image.Image` 实例，我们只需要一个 `FileInputStream` 实例来从用户指定的位置读取图像，或者一个以
    `String` 形式给出的 URL 位置。代码清单 11-51 中的代码片段创建了一个 JavaFX 应用程序，该应用程序以其原始宽度和高度显示图像，这些尺寸可以通过
    `javafx.scene.image.Image` 类中的方法访问。


    ```

    package com.apress.bgn.eleven;

    // 省略 import 语句

    public class JavaFxMediaDemo extends Application {

    final static int option = 3;

    public static void main(String... args) {

    Application.launch(args);

    }

    @Override

    public void start(Stage primaryStage) throws Exception {

    primaryStage.setTitle("JavaFX 图像演示");

    File src = new File("chapter11/media-handling/src/main/resources/cover.png");

    Image image = new Image(new FileInputStream(src));

    ImageView imageView = new ImageView(image);

    imageView.setFitHeight(image.getHeight());

    imageView.setFitWidth(image.getWidth());

    imageView.setPreserveRatio(true);

    // 创建一个 Group 对象

    StackPane root = new StackPane();

    root.getChildren().add(imageView);

    primaryStage.setScene(new Scene(root,

    image.getWidth()+10,

    image.getHeight()+10));

    primaryStage.show();

    }

    }

    代码清单 11-51

    使用 JavaFX 显示图像

    ```


    `Image` 实例不能直接添加到 JavaFX 实例的 `Scene` 中，因为它没有扩展 `Node` 抽象类（所有构成 `JavaFxApplication`
    的 JavaFX 元素都必须实现该类）。因此，该实例必须包装在 `javafx.scene.image.ImageView` 实例中，这是一个扩展了 `Node`
    的类，专门用于渲染使用 `Image` 类加载的图像。`ImageView` 类通过调用 `setPreserveRatio(..)` 方法并传入适当的参数（`true`
    表示保持原始宽高比，`false` 表示不保持）来调整显示图像的大小，同时可以选择是否保持原始宽高比。


    注意


    请查看**第** **10** **章**，了解如何为你的系统安装 JavaFX，以便本章中的示例能够正确运行。


    如代码清单 11-51 所示，我们使用 `image.getWidth()` 和 `image.getHeight()` 返回的值来设置 `ImageView`
    对象的大小以及 `Scene` 实例的大小。但让我们发挥创意，显示缩放后的图像，同时保持宽高比，并在缩放图像时使用 `smooth(..)` 方法采用更高质量的过滤算法，如下所示：


    ```

    //...

    ImageView imageView = new ImageView(image);

    imageView.setFitWidth(100);

    imageView.setPreserveRatio(true);

    imageView.setSmooth(true);

    //...

    ```


    `ImageView` 类还能做的另一件事是支持 `Rectangle2D` 视口，可用于旋转图像：


    ```

    //...

    ImageView imageView = new ImageView(image);

    Rectangle2D viewportRect = new Rectangle2D(2, 2, 600, 600);

    imageView.setViewport(viewportRect);

    imageView.setRotate(90);

    //...

    ```


    作为 `Node` 的实现，`ImageView` 支持点击事件，并且编写一些代码来响应鼠标单击以调整图像大小是相当容易的。请看代码清单 11-52 中的代码。


    ```

    //...

    ImageView imageView = new ImageView(image);

    imageView.setFitHeight(image.getHeight());

    imageView.setFitWidth(image.getWidth());

    imageView.setPreserveRatio(true);

    root.getChildren().add(imageView);

    imageView.setPickOnBounds(true);

    imageView.setOnMouseClicked(mouseEvent -> {

    if(imageView.getFitWidth() > 100) {

    imageView.setFitWidth(100);

    imageView.setPreserveRatio(true);

    imageView.setSmooth(true);

    } else {

    imageView.setFitHeight(image.getHeight());

    imageView.setFitWidth(image.getWidth());

    imageView.setPreserveRatio(true);

    }

    });

    //...

    代码清单 11-52

    使用 JavaFX 在点击事件中调整图像大小

    ```


    在代码清单 11-52 的代码片段中，通过调用 `setOnMouseClicked(..)` 方法，我们为 `imageView` 上的鼠标点击事件附加了一个
    `EventHandler<? super MouseEvent>` 实例。`EventHandler<T extends Event>` 是一个函数式接口，包含一个名为
    `handle` 的单一方法，其具体实现就是代码清单 11-52 中 lambda 表达式的主体。


    如果你想了解更多关于媒体处理的知识，Oracle 提供了一些非常好的教程^(¹¹¹)。此外，作为练习，你可以尝试根据本书中的代码编写自己的代码，添加一个旋转图像的鼠标事件。这就是我们能在
    Java 中处理图像方面所讨论的全部内容。希望你觉得本节内容有用，并有机会在未来测试你的 Java Media API 技能，至少能用于从图像中清理 EXIF
    数据。

    '
- fmt: '## Writing and Reading from Databases


    **Note**


    Establishing a connection and executing a simple query was covered in **Chapter**
    [**7**](#463938_3_En_7_Chapter.xhtml) with the purpose of introducing the `do-while`
    loop. Details about databases and JDBC were not the focus of that chapter, however,
    so the subject will be covered lightly in this section.


    A *database* is a storage of data. The data is organized in such a way that it
    can easily be read back, searched through, updated, and deleted, all without losing
    relationships between various pieces of data.


    The most-used databases are relational databases that present information in **tables**
    with rows and columns. A table is a collection of rows with the same structure.
    Each row in a table is uniquely identified via a **primary key**. Rows in a table
    can be associated with rows in other tables. These associations are called **relationships**.
    A database management system (**DBMS**) handles the way data is stored, maintained,
    and retrieved. Databases containing data organized in related tables are called
    **relational**, and thus management systems for them are called relational database
    management systems (**RDBMSs**).


    RDBMSs do their job by using Structured Query Language (**SQL**), which is a programming
    language for storing and processing information in a relational database.


    The Java Database Connectivity (JDBC) API is the industry standard for database-independent
    connectivity between the Java programming language and a wide range of SQL databases
    and other tabular data sources, such as spreadsheets or flat files. There are
    generally three main parts of JDBC. The first is the **JDBC API**, which comprises
    various methods and interfaces, grouped under the `java.sql` package for easy
    communication with the database.


    The second main part of JDBC is the **JDBC Driver manager** represented by the
    `java.sql.DriverManager` class encapsulate the service for managing a set of **JDBC
    drivers**. Which drivers are loaded and available to an application depends on
    the libraries on the classpath. For example, the `chapter11/database-sample` project
    classpath contains the libraries for the MySQL and PostgreSQL drivers, so invoking
    the `DriverManager.drivers()` method introduced in Java 9 returns a stream containing
    the following drivers:


    ```

    class com.mysql.cj.jdbc.Driver

    class org.postgresql.Driver

    ```


    JDBC drivers are implementation-specific components provided by database vendors
    (Oracle, Microsoft SQL Server, MySQL, PostgreSQL, etc.) that let Java applications
    talk to their own databases. To be recognized by `DriverManager`, they have to
    implement the `java.sql.Driver` interface.


    The JDBC architecture can be summarized as shown in Figure [11-12](#463938_3_En_11_Chapter.xhtml#Fig12).


    ![](images/463938_3_En_11_Chapter/463938_3_En_11_Fig12_HTML.jpg)


    Figure 11-12


    The JDBC architecture


    For stand-alone Java applications that communicate directly with the database,
    the architecture is referred to as **two-tier**. For applications that get deployed
    on an application server (like Apache Tomcat, introduced in **Chapter** [**10**](#463938_3_En_10_Chapter.xhtml)),
    the server usually provides the JDBC implementation and becomes a layer itself,
    so the architecture is referred to as **three-tier**. The JDBC API thus becomes
    the middle tier.


    The JDBC driver is known as a pure Java driver direct for the database. This means
    JDBC is a database driver implementation which makes use of a middle tier (such
    as an application server) between the calling program and the database.


    One of the core components of JDBC is the **connection** to the database. This
    is modeled by classes implementing `java.sql.Connection`. Database connections
    are created by factory objects that are instances of classes implementing the
    `javax.sql.DataSource` interface.


    The third important part of JDBC is the **JDBC Test Suite** that provides validation
    of your code compatibility with the JDBC driver used.


    So how does it work? How can Java objects be saved to a database, and how can
    data be turned back into a Java object? In theory, in the simplest of cases, a
    class is mapped to a table; its fields are mapped to columns in the table columns.
    You would also need to write code to support various querying and interpretation
    of the results and much more. This is because JDBC is the low-level API used by
    multiple frameworks at the end to talk to a database. Without using a higher level
    API, you have to do all the grunt work yourself (writing SQL queries, mapping
    results to objects, etc.). There are certain types of applications (financial,
    usually) that require this approach, because optimizations at SQL level are better
    than optimizations on the level above it. For the rest of the applications, there
    are frameworks such as JDO^([^(112)](#fn112)), JPA^([^(113)](#fn113)), Hibernate^([^(114)](#fn114)),
    and a few others. These frameworks, however, are too advanced for this book, so
    let’s go over how to do some basic things using JDBC to give you an overall idea.


    The `database-sample` project for this book contains sources for communicating
    with a MySQL database and executing some Data Definition Language (DDL) statements
    and some Data Manipulation Language (DML) SQL commands.


    **DDL** is a subset of SQL commands that define the structure or schema of the
    database. It deals with creating, modifying, and deleting database structures
    such as tables, indexes, views, and users.


    **DML** is a subset of SQL commands that deal with managing and manipulating data
    within the database. It includes common SQL statements such as `SELECT`, `INSERT`,
    `UPDATE`, and `DELETE`, which allow users to retrieve, add, modify, and delete
    data from database tables.


    Thus, we write DML statements to manipulate data, and we write DDL statements
    to define the structures that hold the data. The JDBC `java.sql.Statement` interface
    contains method skeletons that various drivers implement to support both DML and
    DDL statements.


    Following the examples in this section requires you to have a local MySQL database
    instance or a container set up. The sources available on GitHub provide the means
    to start up the container, and instructions to install Docker on your computer
    are available on the official site^([^(115)](#fn115)). Listing [11-53](#463938_3_En_11_Chapter.xhtml#PC90)
    shows some typical JDBC code to create a connection to the `mysql` database using
    the `root` user, which has administrative powers, and create a new database named
    `musicdb` and a user named `sample`.


    ```

    // snippet from class com.apress.bgn.eleven.DDLMySQLDemo

    import java.sql.DriverManager;

    import java.sql.SQLException;

    // some code omitted

    private static final Logger LOGGER = LoggerFactory.getLogger(DDLMySQLDemo.class);

    //...

    try (var con = DriverManager.getConnection(

    "jdbc:mysql://localhost:3306/mysql",

    "root", "mypass")) {

    var stmt = con.createStatement();

    stmt.execute("create database musicdb");

    stmt.execute("CREATE USER ''sample''@''%'' IDENTIFIED BY ''sample''");

    stmt.execute("GRANT ALL PRIVILEGES ON *.* TO ''sample''@''%''");

    stmt.execute("flush privileges");

    var rs = stmt.executeQuery("SELECT * FROM user");

    var foundUser = false;

    while (rs.next() && !foundUser) {

    foundUser = rs.getString("User") .equals("sample");

    }

    if (foundUser) {

    LOGGER.info("User ''sample'' created.");

    }

    } catch (SQLException e) {

    LOGGER.error("Well, this is unexpected...", e);

    }

    Listing 11-53

    Using JDBC to Create a User and Database

    ```


    The code sample in Listing [11-53](#463938_3_En_11_Chapter.xhtml#PC90) executes
    all the necessary statements to create a database named `musicdb`, create a user
    named `sample` that uses password `sample` to connect to the database, and give
    this user administrative rights on the `musicdb` database.'
