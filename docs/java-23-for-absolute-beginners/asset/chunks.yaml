  raw: '#### Enums


    The `enum` type is a special class type. It is used to define a special type of
    class that can be instantiated only a fixed number of times. An enum declaration
    groups together all instances of that enum. All of them are constants. So the
    `Gender` enum can be defined as shown in Listing [4-32](#463938_3_En_4_Chapter.xhtml#PC32).


    ```

    package com.apress.bgn.four.classes;

    public enum Gender {

    FEMALE,

    MALE,

    UNSPECIFIED

    }

    Listing 4-32

    Gender Enum

    ```


    An enum cannot be instantiated externally. An enum is by default `final`, thus
    it cannot be extended. Remember how by default every class in Java implicitly
    extends class `Object`? Every enum in Java implicitly extends the abstract class
    `java.lang.Enum<E>`, and in doing so, every enum instance inherits special methods
    that are useful when writing code using enums.


    Being a special type of class, an `enum` can have fields and a constructor that
    can only be private, as enum instances cannot be created externally. The private
    modifier is not needed explicitly, as the compiler knows what to do. Listing [4-33](#463938_3_En_4_Chapter.xhtml#PC33)
    shows the `Gender` enum implemented by adding an integer field that will be the
    numerical representation of each gender and a `String` field that will be the
    text representation. Of course, to access the enum properties, getters are needed.


    ```

    package com.apress.bgn.four.classes;

    public enum Gender {

    FEMALE(1, "f"),

    MALE(2, "m"),

    UNSPECIFIED(3, "u");

    private int repr;

    private String descr;

    private Gender(int repr, String descr) {

    this.repr = repr;

    this.descr = descr;

    }

    public int getRepr() {

    return repr;

    }

    public String getDescr() {

    return descr;

    }

    }

    Listing 4-33

    A More Complex Gender Enum

    ```


    Warning


    But wait, what would stop us from declaring setters as well and modifying the
    field values? Well, nothing. If that is what you need to do, you can do it, **but
    this is not a good practice** (it is actually really bad).


    Enum instances should be constant. So, a correct enum design should not declare
    setters, and should make sure the values of the fields will never be changed by
    declaring them `final`. When we do so, the only way the fields are initialized
    is by calling the constructor, and since the constructor cannot be called externally,
    the integrity of our data is ensured. An example of a good enum design is depicted
    in Listing [4-34](#463938_3_En_4_Chapter.xhtml#PC34).


    ```

    package com.apress.bgn.four.classes;

    public enum Gender {

    FEMALE(1, "f"),

    MALE(2, "m"),

    UNSPECIFIED(3, "u");

    private final int repr;

    private final String descr;

    private Gender(int repr, String descr) {

    this.repr = repr;

    this.descr = descr;

    }

    public int getRepr() {

    return repr;

    }

    public String getDescr() {

    return descr;

    }

    }

    Listing 4-34

    Proper Gender Enum

    ```


    Methods can be added to enums, and each instance can override them. So if we add
    a method called `comment()` to the `Gender` enum, every instance will inherit
    it. But the instance can override it, as depicted in Listing [4-35](#463938_3_En_4_Chapter.xhtml#PC35).


    ```

    package com.apress.bgn.four.classes;

    public enum Gender {

    FEMALE(1, "f"),

    MALE(2, "m"),

    UNSPECIFIED(3, "u") {

    @Override

    public String comment() {

    return "to be decided later: " + getRepr() + ", " + getDescr();

    }

    };

    private final int repr;

    private final String descr;

    Gender(int repr, String descr) {

    this.repr = repr;

    this.descr = descr;

    }

    // getters omitted

    public String comment() {

    return repr + ": " + descr;

    }

    }

    Listing 4-35

    Code Sample Listing Enum Items Classes

    ```


    Important


    So, how can an instance possibly override a method of its class type? It can’t.
    The `UNSPECIFIED` enum value is actually an instance of a class that extends the
    `Gender` class and overrides the `comment()` method.


    This can be easily proven by iterating over the enum values and printing the result
    returned by the `getClass()` method, inherited from the `Object` class that returns
    the runtime type of the object. To get all the instances of an enum, the class
    `java.lang.Enum<E>`, which every enum extends implicitly, provides a method named
    `values()`. Listing [4-36](#463938_3_En_4_Chapter.xhtml#PC36) shows the code that
    does that and its output too.


    ```

    package com.apress.bgn.four.classes;

    public class BasicHumanDemo {

    public static void main(String... args) {

    for (Gender value : Gender.values()) {

    System.out.println(value.name() + ": " + value.getClass());

    System.out.println("\tcomment : " + value.comment());

    }

    }

    }

    // output expected in the console

    /*

    FEMALE: class com.apress.bgn.four.classes.Gender

    comment : 1: f

    MALE: class com.apress.bgn.four.classes.Gender

    comment : 2: m

    UNSPECIFIED: class com.apress.bgn.four.classes.Gender$1

    comment : to be decided later: 3, u

    */

    Listing 4-36

    Proper Gender Enum with Extra Method

    ```


    Notice the value printed for the `UNSPECIFIED` element. The `Gender$1` notation
    means that the compiler created an inner class by extending the original enum
    class and overriding the `comment()` method with the one provided in the declaration
    of the `UNSPECIFIED` element.


    We’re going to be playing with enums in future examples as well. Just remember
    that whenever you need to limit the implementation of a class to a fixed number
    of instances, or group related constants together, enums are the tools to use.
    Now that we have introduced enums, our `Human` class can have a field of type
    `Gender`, as depicted in Listing [4-37](#463938_3_En_4_Chapter.xhtml#PC37).


    ```

    package com.apress.bgn.four.classes;

    public abstract class Human {

    public static final int LIFESPAN = 100;

    protected String name;

    protected int age;

    protected float height;

    private Gender gender;

    public Human(String name, int age, Gender gender) {

    this.name = name;

    this.age = age;

    this.gender = gender;

    }

    public Human(String name, int age, float height, Gender gender) {

    this(name, age, gender);

    this.height = height;

    }

    // other code omitted

    public Gender getGender() {

    return gender;

    }

    public void setGender(Gender gender) {

    this.gender = gender;

    }

    }

    Listing 4-37

    Human Class with a Gender Field

    ```


    In the previous sections **interfaces** were mentioned as one of the Java components
    used to create objects. It is high time we expand the subject.'
