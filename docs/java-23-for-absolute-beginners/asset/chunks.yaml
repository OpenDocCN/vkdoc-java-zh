    #### 中间操作 `map` 和 `flatMap` 以及终端操作 `collect`


    在以下示例中，我们将处理所有歌曲并计算以分钟为单位的时长。为此，我们将使用 `map(..)` 方法为流中发出的每个歌曲实例调用一个纯函数，该函数返回以分钟为单位的时长。这将产生一个新的
    `Integer` 值流。其所有元素将使用 `collect(..)` 方法添加到一个 `List<Integer>` 实例中。该方法在处理元素时将其累积到一个
    `Collection<Integer>` 实例中。清单 8-31 展示了这些方法的使用。


    ```

    package com.apress.bgn.eight;

    // 导入语句已省略

    public class MediaStreamTester {

    public static int processDuration(Song song) {

    int secs = song.getDuration();

    return secs/60;

    }

    void main(){

    Stream songs = StreamMediaLoader.loadSongs();

    List durationAsMinutes = songs

    .map(SongTransformer::processDuration) // 方法引用

    .collect(Collectors.toList());

    durationAsMinutes.forEach(out::println);

    }

    }

    清单 8-31

    使用 map(..) 和 collect(..) 方法

    ```


    `map(..)` 方法接收一个 `Function<T,R>` 类型的参数（T 为输入类型，R 为结果类型），这基本上是对一个函数的引用，该函数将应用于流中的每个元素。我们在前一个示例中应用的函数从流中获取一个歌曲元素，获取其时长并将其转换为分钟，然后返回。清单
    8-31 中的代码可以重写为清单 8-32 所示，其中方法 `processDuration` 被声明为 `Function<T,R>` 类型的字段，并且
    `Collection<Integer>` 实例被替换为 `.toList()` 方法，以简化语法。


    ```

    package com.apress.bgn.eight;

    // 导入语句已省略

    public class MediaStreamTester {

    public static Function processDuration = song -> song.getDuration()/60;

    void main(){

    Stream songs = StreamMediaLoader.loadSongs();

    List durationAsMinutes = songs

    .map(processDuration)

    .toList();

    durationAsMinutes.forEach(out::println);

    }

    }

    清单 8-32

    使用 Function 实例处理流元素

    ```


    `Function<T,R>` 实例的第一个泛型类型是被处理元素的类型，第二个是结果的类型。


    上一节提到的 `filter(..)` 方法的一个版本也为 `Optional<T>` 类型定义，并且可以与 `map(..)` 方法一起使用，以避免编写复杂的
    `if` 语句。假设我们有一个 `Song` 实例，并且想要检查它是否超过三分钟且少于十分钟。我们可以使用 `Optional<Song>` 实例和这两个方法来完成相同的操作，而不是编写一个包含两个由
    `AND` 运算符连接的条件 `if` 语句，如清单 8-33 所示。


    ```

    package com.apress.bgn.eight;

    // 导入语句已省略

    public class MediaStreamTester {

    void main(){

    Song song0 = new Song("Ben Barnes", "You find me", 420, AudioType.FLAC);

    if(isMoreThan3MinsAndLessThenTen(song0)) {

    out.println("这首歌时长刚刚好！");

    }

    }

    public static boolean isMoreThan3MinsAndLessThenTen(Song song) {

    return Optional.ofNullable(song).map(SongTransformer::processDuration)

    .filter(d -> d >= 3)

    .filter(d -> d <= 10)

    .isPresent();

    }

    }

    清单 8-33

    使用 filter(..) 和 map(..) 避免编写 if 语句

    ```


    注意


    清单 8-33 中的实现在性能方面可能并不理想——毕竟两次 `filter()` 调用可以合并为一次——但如果你愿意，可以编写这样的代码。只是在滥用流操作之前，请务必仔细阅读文档。


    因此，`map(..)` 方法非常强大，但它有一个小缺陷。如果我们查看 `Stream.java` 文件中它的签名，我们会看到：


    ```

    Stream map(Function mapper);

    ```


    因此，如果应用于流中每个元素的 `map(..)` 函数返回一个包含结果的新流，该结果被放入另一个包含所有结果的流中，那么 `collect(...)` 方法实际上是在一个
    `Stream<Stream<R>>` 实例上调用的。


    `Optional<T>` 也是如此；终端方法将在 `<Optional<Optional<T>>` 实例上调用。当对象很简单时，比如本章代码示例中使用的
    `Song` 实例，`map(..)` 方法工作得很好，但如果原始流中的对象更复杂，例如 `List<List<T>>` 实例，事情*可能*会变得复杂。


    展示 `flatMap(..)` 方法效果的最简单方法是将其应用于 `List<List>` 实例。让我们看一下清单 8-34 中的示例。


    ```

    package com.apress.bgn.eight;

    // 导入语句已省略

    public class MoreStreamsDemo {

    public static Function processDuration = song -> song.getDuration()/60;

    void main(){

    List> testList = List.of (List.of(2,3), List.of(4,5), List.of(6,7));

    System.out.println(processList(testList));

    }

    public static List processList( List> list) {

    List result = list

    .stream()

    .flatMap(Collection::stream)

    .collect(Collectors.toList());

    return result;

    }

    }

    清单 8-34

    使用 flatMap(..) 展开流元素

    ```


    `flatMap(..)` 方法接收一个方法引用作为参数，该方法接受一个集合并将其转换为流，这是创建 `Stream<Stream<Integer>>` 实例的最简单方式。`flatMap(..)`
    方法施展其魔法，结果被转换为 `Stream<Integer>`，然后元素被 `collect(..)` 方法收集到 `List<Integer>` 实例中。移除无用流包装器的操作称为*扁平化*。如果仍然不清楚发生了什么，图
    8-2 应该能让事情更清晰。


    ![](img/463938_3_En_8_Fig2_HTML.jpg)


    图 8-2


    `flatMap(..)` 效果的视觉描述


    在清单 8-34 的代码示例中，使用 `map(..)` 方法不会产生预期的结果。如果将 `flatMap(..)` 方法替换为 `map(..)`，最终结果将不是
    `List<Integer>` 实例，而是 `List<Stream<Integer>>` 实例。IntelliJ IDEA 足够智能，能够识别这一点，并提供适当的消息来帮助你选择要调用的正确方法，如图
    8-3 所示。


    ![](img/463938_3_En_8_Fig3_HTML.jpg)


    图 8-3


    当使用 `map(..)` 代替 `flatMap(..)` 时 IntelliJ IDEA 的错误消息


    另一种查看 `flatMap(..)` 方法效果的方法是编写一个更简单的 `Optional<T>` 示例。假设我们需要一个将 `String` 值转换为
    `Integer` 值的函数。如果 `String` 值不是有效数字，我们希望避免返回 `null`。这意味着我们的函数必须接受一个 `String` 值并返回
    `Optional<Integer>`。清单 8-35 中显示的代码包含显式扁平化和使用 `flatMap(..)` 进行的扁平化。


    ```

    package com.apress.bgn.eight;

    // 导入语句已省略

    public class MoreStreamsDemo {

    void main(){

    // 显式扁平化

    Optional str0 = Optional.of("42");

    Optional> resInt0 = str0.map(toIntOpt);

    Optional desiredRes0 = resInt0.orElse(Optional.empty());

    out.println("最终结果: " + desiredRes0.get());

    // flatMap(..) 扁平化

    Optional str1 = Optional.of("42");

    Optional desiredRes1 = str1.flatMap(toIntOpt);

    out.println("搞定: " + desiredRes1.get());

    }

    public static Function> toIntOpt = str -> {

    try {

    return Optional.of(Integer.parseInt(str));

    } catch (NumberFormatException e) {

    return Optional.empty();

    }

    };

    }

    清单 8-35

    对 Optional> 实例进行扁平化

    ```


    所以，是的，`map(..)` 和 `flatMap(..)` 之间确实存在细微差别，尽管在大多数情况下你会使用 `map(..)`，但了解 `flatMap(..)`
    的存在也是件好事。

