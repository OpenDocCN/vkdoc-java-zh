    The reason for the error is that the methods are called on the reference type,
    so the object the reference is pointing to must have those methods. That is why
    the Java compiler complains, and that is why smart editors notify you by underlining
    the statement with a red line. The easiest way to fix the compiling errors in
    the previous example is an explicit cast (or conversion) to the `Performer` type.
    That silences the compiler, but it won’t make the code runnable.


    The easiest way to prove this is by creating a class named `Fiddler` that implements
    `Musician` and assign an instance of this class to a `Performer` reference. An
    explicit conversion of the `Fiddler` instance to `Performer` is necessary to trick
    the compiler into accepting this code as valid, as shown in the marked line in
    Listing [5-17](#463938_3_En_5_Chapter.xhtml#PC27).


    ```

