    So the JVM was struggling to create another `Singer` instance, but there was no
    more memory left. The last value printed before the exception was `4095MB`, which
    is 1MB less than `4096MB`, the maximum amount of memory that the JVM was allowed
    to use. So the poor JVM crashed because there was no more heap memory available.
    If a program ever ends like that, the problem is always in the design of the solution.
    The values for total and maximum memory for the JVM can influence the behavior
    of the GC as well. The `-Xms` and `-Xmx` options introduced previously are quite
    important, as they decide the initial and the maximum size of the heap memory.
    Configured properly, they can increase performance, but when unsuitable values
    are used, they have an adverse effect. For example, never set an initial size
    for the heap too small. If there is not enough space to fit all objects created
    by the application, the JVM has to allocate more memory, basically rebuilding
    the heap repeatedly during the execution of the program. So if this happens a
    few times during the application run, the overall time consumption will be affected.
    The maximum size for the heap is crucial: allocating too little will cause the
    application to crash; allocating too much might hinder another program from running.
    Deciding these values is usually done through repeated experiments, and starting
    with JDK 11, the new Epsilon garbage collector is quite handy for this purpose.


    If you want to learn more about GC tunning, usually the best documentation is
    the official one^([^(131)](#fn131)).


    Now that you know what to expect from the GC, let’s see other methods of customizing
    its behavior so that problems are avoided.


    ### Using `Cleaner`


    It is not clear when the `finalize()` method is to be taken out of the JDK, but
    if you want to avoid using it, there are a few options. You can develop some classes
    to implement `java.lang.AutoCloseable`, provide an implementation for the `close()`
    method, and then make sure that you use your objects in a `try-with-resources`
    statement.


    If you want to avoid implementing the `AutoCloseable` interface, you can use a
    `java.lang.ref.Cleaner` object. You can instantiate this class and register objects
    to it together with an action to perform when each object is being discarded by
    the garbage collector. Using a `Cleaner` instance, the code in Listing [13-9](#463938_3_En_13_Chapter.xhtml#PC10)
    can be written as depicted in code Listing [13-16](#463938_3_En_13_Chapter.xhtml#PC23):


    ```

    package com.apress.bgn.thirteen.cleaner;

    // some import statements omitted

    import java.lang.ref.Cleaner;

    public class CleanerDemo {

    private static final Logger LOGGER = LoggerFactory.getLogger(CleanerDemo.class);

    public static final Cleaner cleaner = Cleaner.create();

    private static NameGenerator nameGenerator = new NameGenerator();

    public static void main(String... args) {

    printTotalMemory(LOGGER);

    int count = 0;

    for (int i = 0; i  {

    var s = new String[10_000];

    try {Thread.sleep(1);} catch (InterruptedException _) {}

    });

    }

    private static Cleaner.Cleanable genActor() {

    Actor a = new Actor(nameGenerator.genName(), LocalDate.now());

    LOGGER.info("JVM created: {}", a.getName());

    Cleaner.Cleanable handle = cleaner.register(a, new ActorRunnable(a.getName(),
    LOGGER));

    return handle;

    }

    static class ActorRunnable implements Runnable {

    private final String actorName;

    private final Logger log;

    public ActorRunnable(String actorName, Logger log) {

    this.actorName = actorName;

    this.log = log;

    }

    @Override

    public void run() {

    log.info("GC Destroyed: {} ", actorName);

    }

    }

    }

    Listing 13-16

    Using a Cleaner Instance

    ```


    Because I wanted to make it easier for you to browse the code, as all these sources
    are part of the same project, Listing [13-16](#463938_3_En_13_Chapter.xhtml#PC23)
    uses a class modeling an `Actor` instead of a `Singer`, but no worries, the implementation
    is quite similar.


    The `Cleaner` instance has a method named `register(..)` that is called to register
    the action to be performed when the object is cleaned. The action to be performed
    is specified as a `Runnable` instance, and I decided to create a class by implementing
    it, `ActorRunnable` in this example, so that we could save the name of the object
    to be destroyed into a field without actually keeping a reference to the object
    to be destroyed; otherwise, the `Cleaner.Cleanable` handle would not be used by
