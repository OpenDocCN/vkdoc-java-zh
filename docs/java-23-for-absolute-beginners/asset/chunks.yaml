    ## 使用 Java NIO 管理文件


    `java.nio` 包在本章开头与 `java.io` 包一起被介绍。我们在本书这一部分之前使用的大多数类和方法都是 `java.io` 包的一部分，并且在读取/写入数据时会阻塞主线程。上一节中引入的工具类
    `java.nio.file.Paths` 和 `java.nio.file.Files` 包含的方法既使用了 `java.nio` 包中的类，也使用了 `java.io`
    包中的类。现在是时候向您展示如何使用 `java.nio` 类来操作文件了。


    使用 `java.nio` 操作文件需要 `java.nio.channels.FileChannel` 的实例。这是一个特殊的类，描述了用于读取、写入、映射和操作文件的通道。`FileChannel`
    实例连接到文件，并持有文件内的一个位置，该位置可以被查询和修改。


    要使用 `FileChannel` 实例从文件读取数据，需要以下内容：


    *   一个文件处理器实例

    *   通道所基于的 `FileInputStream` 实例

    *   一个 `FileChannel` 实例

    *   一个 `java.nio.Buffer` 实例


    由于是非阻塞的，线程可以请求通道从缓冲区读取数据，然后在数据可用之前执行其他操作。Java NIO 的缓冲区允许根据需要前后移动。数据被读入缓冲区并缓存，直到被处理。`java.nio`
    包中为所有原始类型提供了缓冲区实现，根据数据的用途，您可以使用其中任何一种。清单 11-29 展示了如何将文件中的数据读取到 `ByteBuffer` 中。由于
    `ByteBuffer` 可以用初始大小实例化，通过将 `ByteBuffer` 的容量（以字节为单位）配置为与文件大小相同，可以一次性读取文件。


    ```

    package com.apress.bgn.eleven.nio;

    import java.nio.ByteBuffer;

    import java.nio.channels.FileChannel;

    // 其他导入语句已省略

    public class ChannelDemo {

    private static final Logger LOGGER = LoggerFactory.getLogger(ChannelDemo.class);

    void main() {

    var sb = new StringBuilder();

    final String inDir = "chapter11/read-write-file/src/main/resources/input/";

    try (FileInputStream is = new FileInputStream(new File(inDir + "data.txt"));

    FileChannel inChannel = is.getChannel()) {

    long fileSize = inChannel.size();

    ByteBuffer buffer = ByteBuffer.allocate((int) fileSize);

    inChannel.read(buffer);

    buffer.flip();

    while (buffer.hasRemaining()) {

    sb.append((char) buffer.get());

    }

    } catch (IOException e) {

    LOGGER.debug("File could not be read! ", e);

    }

    LOGGER.info("Read with FileChannel [1]--> {}", sb);

    }

    }

    清单 11-29

