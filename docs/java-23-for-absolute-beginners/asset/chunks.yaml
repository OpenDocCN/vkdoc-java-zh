    ## 位运算符


    在 Java 中，有一些运算符用于在位级别操作数值类型的变量。位运算符用于改变操作数中的单个位。位运算速度更快，并且通常使用更少的 CPU 处理能力，因为资源使用量减少了。它们在编程可视化应用程序（例如游戏）中最有用，在这些应用程序中，需要快速确定颜色、鼠标点击和移动，以确保令人满意的体验。


    ### 按位非 (~) 运算符


    `~` 运算符有点像二进制**取反器**。它对整数值逐位进行反转。这会影响用于表示该值的所有位。因此，如果我们声明


    ```

    byte b1 = 10;

    ```


    其二进制表示为 `00001010`。


    `Integer` 类提供了一个名为 `toBinaryString()` 的方法，可用于打印先前定义的变量的二进制表示，但它不会打印所有位，因为该方法不知道我们想要在多少位上表示该值。因此，我们需要使用一个特殊的
    `String` 方法来格式化输出。清单 6-29 中描述的方法可用于在 8 位上打印 `b1` 值的二进制形式，正如前面所述。


    ```

    import static java.lang.System.out;

    //...

    public static void print8Bits(byte arg) {

    out.println("decimal:" + arg);

    String str = String.format("%8s", Integer.toBinaryString(arg)).replace('' '',
    ''0'');

    out.println("binary:" + str);

    }

    清单 6-29

    用于打印 byte 值每一位的方法

    ```


    如果我们在 `b1` 值上应用 `~` 运算符，得到的二进制值为 `11110101`。如果你没有注意到，这个值超出了 `byte` 的范围，因此会自动转换为
    `int`。这就是负数在 Java 内部的表示方式，根据 Java 语言规范，这种表示称为**2 的补码**。（这将在本章末尾介绍。）


    因此，结果将是 `-11`，如清单 6-30 中的代码所示。


    ```

    package com.apress.bgn.six;

    import static java.lang.System.out;

    public class BitwiseDemo {

    void main(){

    byte b1 = 10;

    print8Bits(b1);

    byte b2 = (byte) ~b1;

    print8Bits(b2);

    }

    // print8Bits 方法已省略

    }

    // 输出

    /*

    decimal:10

    binary:00001010

    decimal:-11

    binary:11111111111111111111111111110101

    */

    清单 6-30

    测试 ~ 按位取反运算符

    ```


    注意清单 6-30 中的语句 `byte b2 = (byte) ~b1`。按位补码表达式运算符要求操作数可转换为原始整数类型，否则会发生编译时错误。在内部，Java
    使用一个或多个字节来表示值。`~` 运算符将其操作数转换为 `int` 类型，因此它可以在执行补码操作时使用 32 位；这是为了避免精度损失。这就是为什么在前面的示例中需要显式转换为
    `byte`。


    并且，由于有图更清晰，在图 6-3 中，你可以看到 `~` 运算符对 `b1` 变量的位的影响，以及其值。


    ![](img/463938_3_En_6_Fig3_HTML.jpg)


    图 6-3


    `~` 取反运算符对 byte 值每一位的影响

