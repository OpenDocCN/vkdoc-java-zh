    LOGGER.info(\"--> {}\", copyOfJohn);\n} catch (IOException e) {\nLOGGER.info(\"\
    Deserialization of XML failed! \", e);\n}\n}\n}\nListing 11-39\nSerializing and\
    \ Deserializing a Singer Class with Jackson’s XmlMapper\n```\n\nThe `XmlMapper`\
    \ instance can be used to serialize any class in the project that contains Jackson\
