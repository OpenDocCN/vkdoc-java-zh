    如你所见，Java 告诉你它期望在第 3 行的 `System.out.println(..)` 语句末尾有一个分号（`;`）。你可以随意修改这个文件，或者自己编写代码来测试各种错误。


    `java22-sandbox` 目录包含文件 `Practice06.java`，该文件引用了一个不存在的类。这不仅仅是语法错误——而是一个设计错误。文件内容如清单
    2-32 所示。


    ```

    class Practice06 {

    public static void main(String[] args) {

    System.out.println("Practice06: " + MockProvider.get());

    }

    }

    清单 2-32

    引用了一个不存在的类的 Java 文件

    ```


    错误信息如清单 2-33 所示。


    ```

    > java Practice06.java

    #输出

    Practice06.java:3: 错误: 找不到符号

    System.out.println("Practice06: " + MockProvider.get());

    ^

    符号:   变量 MockProvider

    位置: 类 Practice06

    1 个错误

    错误: 编译失败

    清单 2-33

    运行引用了一个不存在的类的 Java 文件

    ```


    Java 指出了错误所在的行号（3），并报告它 `找不到符号`。这显然意味着它找不到这个类，那为什么它说 `符号` 呢？嗯，Java 是一种编程语言，而语言是由符号组成的。在
    Java 中，并非所有符号都是类，你将在阅读本书的过程中了解到这一点。


    你可能遇到的第三种错误类型是，当有一段 Java 无法识别的文本时，比如清单 2-34 中 `Practice07.java` 文件内容里的随机文本 `ssssssss`。


    ```

    class Practice07 {

    ssssssss

    public static void main(String[] args) {

    System.out.println("Practice06: " + HelloProvider.get());

    }

    }

    清单 2-34

    包含一段随机文本的 Java 文件

    ```


    运行 `Practice07.java` 文件会导致清单 2-35 中描述的错误。


    ```

    > java Practice07.java

    #输出

    Practice07.java:3: 错误: 需要 class、interface、enum 或 record

    ssssssss

    ^

    1 个错误

    错误: 编译失败

    清单 2-35

    运行包含一段随机文本的 Java 文件

    ```


    如你所见，Java 识别出了这个不属于代码片段的陌生元素，并将你指向第 3 行。


    还有一些错误可能在你运行语法正确的 Java 代码时发生，你将在本书后面部分了解到这些错误。


    请随意尝试这种运行 Java 代码的方式。当你想要快速测试一段代码，然后再将其放入更大的项目中，或者用这种方式测试本书中的示例时，可以使用它。然而，本书中这个主题必须保持简短，因为本书的目的是让你在读完本书后不再是一个
    Java 的绝对初学者。


    ## 安装 Apache Maven


    本书的源代码组织在可以使用 Apache Maven 编译和执行的小型项目中。你可以从 Apache Maven 的官方网站^(³⁰)下载它并了解更多信息。Apache
    Maven 是一个软件项目管理和理解工具。本书选择它作为构建工具，原因如下：


    *   易于设置（XML 如今几乎无处不在）

    *   它与 Java 的长期合作关系

    *   许多公司都在使用它


    如果你还需要一个学习构建工具的理由，那就是：对于中型和大型项目，构建工具是必备的，因为它有助于依赖项的声明、下载和升级。


    安装 Maven 非常简单。只需下载它，解压到某个位置，然后声明 `M2_HOME` 环境变量。如何执行此操作的说明可在官方网站上找到，或者你也可以使用 SDKMAN。


    安装好 Maven 后，你可以通过打开终端（或 Windows 上的命令提示符）并执行 `mvn -version` 来检查它是否安装成功，以及它是否使用了你期望的
    JDK 版本。输出应该与清单 2-36 中的输出非常相似。


    ```

    Apache Maven 4.0.0-alpha-13 (0a6a5617fe5ef65c44f05903491e170d92cf37fc)

    Maven home: /Users/iuliana/.sdkman/candidates/maven/current

    Java version: 23-ea, vendor: Oracle Corporation, runtime: /Users/iuliana/.sdkman/candidates/java/23.ea.5-open

    Default locale: en_GB, platform encoding: UTF-8

    OS name: "mac os x", version: "14.2.1", arch: "x86_64", family: "mac"

    清单 2-36

    在 macOS 上执行命令 mvn -version 的输出

    ```


    重要提示


    如果你正在从事 Java 开发职业，熟练掌握一个构建工具是一项宝贵的优势。大多数使用 Java 的公司都有大型项目，这些项目组织在相互依赖的模块中，没有构建工具是无法管理的。Apache
    Maven 长期以来一直是 Java 事实上的标准构建工具，因此你可能需要熟悉它。


    ## 安装 Git


    这是一个可选章节，但作为一名开发者，熟悉版本控制系统很重要，所以在此介绍。要在你的系统上安装 Git，只需访问官方网站^(³¹)并下载安装程序。打开安装程序并点击**下一步**直到完成安装。这适用于
    Windows 和 macOS（对于 macOS，你可以使用 `homebrew`^(³²)）。是的，就是这么简单；你不需要做任何其他事情。在 Linux
    上，可以使用 PPA 完成安装。


    以防你需要更多指导，这里有一个关于如何为所有操作系统安装 Git 的页面：[`https://gist.github.com/derhuerst/1b15ff4652a867391f03`](https://gist.github.com/derhuerst/1b15ff4652a867391f03)。


    要测试 Git 是否在你的系统上成功安装，请打开终端（Windows 上的命令提示符）并运行 `git --version` 来查看打印出的结果。它应该就是你刚刚安装的
    Git 版本。预期的输出应该类似于清单 2-37。


    ```

    $ git –-version

    git version 2.44.0

    清单 2-37

    验证 Git 安装的命令 git –version 的输出

    ```


    现在你已经安装了 Git，你可以通过在终端中或直接从 IDE 克隆官方 Git 仓库来获取本书的源代码。

    '
- fmt: '# Install a Java IDE


    The editor that I recommend, based on my experience of more than ten years, is
    IntelliJ IDEA. It is produced by a company called JetBrains. You can download
    this IDE from their official site^([^(33)](#fn33)). The Ultimate Edition expires
    after 30 days; beyond that, a paid license is required. There is also a Community
    Edition available that can be used without a license. For simple projects that
    facilitate learning Java, this version suffices.


    After you download the IntelliJ IDEA archive, double-click it to install it. After
    that, start it and configure your plugins first. Click the **Plugins** menu item,
    and a list of plugins should appear on the right side of the window. Check out
    the list of plugins on the **Installed** tab (depicted in Figure [2-9](#463938_3_En_2_Chapter.xhtml#Fig9)).


    ![](images/463938_3_En_2_Chapter/463938_3_En_2_Fig9_HTML.jpg)


    Figure 2-9


    IntelliJ IDEA Community Edition configure plugins dialog window


    **Important**


    The plugins necessary for diverse styles of Java projects are enabled by default
    in IntelliJ IDEA. You can modify that list and disable the ones you do not need.
    This will reduce the amount of memory IntelliJ IDEA needs to function.


    The Maven plugin is enabled by default; so is the Git plugin. This means your
    IDE is suitable for use right away, which in turn means that you need to get your
    hands on the sources for this book. There are three ways to get the sources for
    the book:


    *   Download the zipped package directly from GitHub.

    *   Clone the repository using a terminal (or Git Bash Shell in Windows) using
    the following command:


    ```

    $ git clone https://github.com/Apress/java-23-for-absolute-beginners.git

    ```


    *   Clone the project using IntelliJ IDEA.


    Cloning from the command line or from IntelliJ IDEA does not require a GitHub
    user when the HTTPS URL of the repository is used. Figure [2-10](#463938_3_En_2_Chapter.xhtml#Fig10)
    shows the two steps necessary to clone the GitHub project for this book.


    ![](images/463938_3_En_2_Chapter/463938_3_En_2_Fig10_HTML.jpg)


    Figure 2-10


    IntelliJ IDEA Community Edition clone from VCS dialog windows


    When opening IntelliJ IDEA the first time, select the **Projects** menu item,
    then click the **Get from VCS** button. A new dialog window appears in which you
    can insert the repository URL and the location where the sources should be copied.
    After clicking the **Clone** button, the project will be copied, and IntelliJ
    IDEA will open it and figure out it uses Maven.


    If you cloned the project using the command line, you can import it in IntelliJ
    IDEA using the **Open** button and selecting the directory created by the cloning
    operation.


    **Important**


    IntelliJ IDEA has its own internal Maven bundle. If you want to tell IntelliJ
    IDEA to use your local installation, just open the **Preferences** menu item,
    go to **Build, Execution, Deployment** ➤ **Build Tools** ➤ **Maven** section,
    and select the external Maven installation directory.


    ![](images/463938_3_En_2_Chapter/463938_3_En_2_Fig11_HTML.jpg)


    Figure 2-11


    IntelliJ IDEA Maven view


    It is expected a window to be opened at the bottom of the editor depicting the
    build progress and if the sources are ok this process should end with the message
    `BUILD SUCCESS`.


    **Important**


    If the build fails in IntelliJ IDEA, and you want to identify the problem, the
    first step is to run the build outside the IDE. You can run the build in a terminal
    (or Command Prompt on Windows) by executing `mvn clean install`. If the build
    passes in the terminal, the sources and your setup are correct and there is a
    problem with the editor configuration for sure.


    The Maven build follows a specific life cycle to transform a Java project from
    sources to something that can be executed or deployed to an application server.
    Phases are executed in a specific order. Running a specific phase using the `mvn
    {phase}` command executes a number of steps called *goals*, each responsible for
    a specific task.


    The `mvn clean install` command recommended previously executes the `clean` phase
    that deletes previously generated bytecode files and then executes the `install`
    phase that compiles Java files into bytecode, executes tests (if there are any),
    packs them up in Java Archives (jar files), and copies them to the local Maven
    repository. If you want to read more about Maven, check out the official site,
    but for the scope of this book, everything has been made really easy for you,
    as explained in **Chapter** [**3**](#463938_3_En_3_Chapter.xhtml).


    ## Summary


    If any of instructions are unclear to you (or I missed something), do not hesitate
    to use the Web to search for answers. All the software technologies introduced
    in this chapter are backed up by comprehensive official websites and by huge communities
    of developers eager to help. In the worst-case scenario, when you find nothing,
    you can always create an issue on the Apress GitHub official repository for this
    book, or drop me an e-mail. I’ll do my best to support you if need be.


    Footnotes [1](#463938_3_En_2_Chapter.xhtml#Fn1_source)   [2](#463938_3_En_2_Chapter.xhtml#Fn2_source)
      [3](#463938_3_En_2_Chapter.xhtml#Fn3_source)   [4](#463938_3_En_2_Chapter.xhtml#Fn4_source)
      [5](#463938_3_En_2_Chapter.xhtml#Fn5_source)   [6](#463938_3_En_2_Chapter.xhtml#Fn6_source)
      [7](#463938_3_En_2_Chapter.xhtml#Fn7_source)


    # 3. Getting Your Feet Wet


    This chapter covers the fundamental blocks and terms of the Java language. Although
    it could be considered yet another introductory chapter, it is quite important.
    The previous chapter left you with a complete development environment configured
    for writing Java code. It is time to make use of it. The following topics are
    covered in this chapter:


    *   Core syntax parts

    *   Java fundamental building blocks: packages, modules, and classes

    *   Creating a Java project with IntelliJ IDEA

    *   Compiling and executing Java code

    *   Packing a Java application into an executable jar

    *   Using Apache Maven'
