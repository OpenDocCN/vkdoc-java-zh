    ## Bitwise Operators


    In Java there are a few operators that are used at the bit level to manipulate
    variables of numerical types. Bitwise operators are used to change individual
    bits in an operand. Bitwise operations are faster and usually use less CPU processing
    power because of the reduced use of resources. They are most useful in programming
    visual applications (e.g., games) where color, mouse clicks, and movements should
    be quickly determined to ensure a satisfactory experience.


    ### Bitwise (~) NOT


    Operator `~` is sort of a binary **negator**. It performs a bit-by-bit reversal
    of an integer value. This affects all bits used to represent the value. So if
    we declare


    ```

    byte b1 = 10;

    ```


    the binary representation is `00001010`.


    The `Integer` class provides a method named `toBinaryString()`, which can be used
    to print the binary representation of the previously defined variable, but it
    won’t print all the bits, because the method doesn’t know on how many bits we
    want the representation on. So we need to use a special `String` method to format
    the output. The method depicted in Listing [6-29](#463938_3_En_6_Chapter.xhtml#PC39)
    can be used to print the `b1` value in binary on 8 bits, exactly as mentioned
    previously.


    ```

    import static java.lang.System.out;

    //...

    public static void print8Bits(byte arg) {

    out.println("decimal:" + arg);

    String str = String.format("%8s", Integer.toBinaryString(arg)).replace('' '',
    ''0'');

    out.println("binary:" + str);

    }

    Listing 6-29

    Method Used to Print Each Bit of a byte Value

    ```


    If we apply the `~` operator on the `b1` value, the binary value that results
    is `11110101`. In case you did not notice, this value is out of the `byte` interval
    range and thus is converted to `int` automatically. This is how negative numbers
    are represented internally in Java, which according to the Java Language Specification
    is a representation called **2’s complement**. (This will be covered toward the
    end of the chapter.)


    So the result will be `-11`, as displayed by the code in Listing [6-30](#463938_3_En_6_Chapter.xhtml#PC40).


    ```

    package com.apress.bgn.six;

    import static java.lang.System.out;

    public class BitwiseDemo {

    void main(){

    byte b1 = 10;

    print8Bits(b1);

    byte b2 = (byte) ~b1;

    print8Bits(b2);

    }

    // print8Bits method omitted

    }

    // output

    /*

    decimal:10

    binary:00001010

    decimal:-11

    binary:11111111111111111111111111110101

    */

    Listing 6-30

    Testing the ~ Bitwise Negator Operator

    ```


    Notice the statement `byte b2 = (byte) ~b1` in Listing [6-30](#463938_3_En_6_Chapter.xhtml#PC40).
    The bitwise complement expression operator requires an operand that is convertible
    to a primitive integral type, or a compile-time error occurs. Internally, Java
    uses one or more bytes to represent values. The `~` operator converts its operand
    to the `int` type, so it can use 32 bits when doing the complement operation;
    this is needed to avoid loss of precision. That is why an explicit cast to `byte`
    is needed in the previous example.


    And because everything is clearer with images, in Figure [6-3](#463938_3_En_6_Chapter.xhtml#Fig3)
    you can see the effect of the `~` operator on the bits of the `b1` variable, in
    parallel with its value.


    ![](images/463938_3_En_6_Chapter/463938_3_En_6_Fig3_HTML.jpg)


    Figure 6-3


    The effect of the `~` negator operator on every bit of a byte value'
