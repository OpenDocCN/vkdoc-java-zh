    import java.util.ArrayList;

    // the rest of import statements omitted

    public final class String

    implements java.io.Serializable, Comparable, CharSequence,

    Constable, ConstantDesc {

    private static final ObjectStreamField[] serialPersistentFields =

    new ObjectStreamField[0];

    // the rest of the code omitted

    }

    Listing 4-2

    Small Code Snippet from the java.lang.String Class

    ```


    It is a snippet from the official Java `String` class. Every import statement
    represents a reference to the package and the name of a class used within the
    `String` class body.


    Special import statements can be used to import static variables and static methods
    as well. The JDK includes a class used for mathematical processes. It contains
    static variables and methods that can be used by developers to implement code
    that solves mathematical problems. You can use its variables and methods without
    the need to create objects of this type, because static members do not belong
    to an object of a type, but to the type itself. Check out the code in Listing
    [4-3](#463938_3_En_4_Chapter.xhtml#PC3).


    ```

    package com.apress.bgn.four;

    import static java.lang.Math.PI;

    import static java.lang.Math.sqrt;

    public class MathSample {

    public static void main(String... args) {

    System.out.println("PI value =" + PI);

    double result = sqrt(5.0);

    System.out.println("SQRT value =" + result);

    }

    }

    // output

    // PI value =3.141592653589793

    // SQRT value =2.23606797749979

    Listing 4-3

    Using Static Imports for Members of Class Math

    ```


    By putting together `import` and `static` we can declare a fully qualified name
    of a class and the method or the variable we are interested in using in the code.
    This allows us to use the variable or method directly, without the name of the
    class it is being declared in. Without the static imports the code will have to
    be rewritten as shown in Listing [4-4](#463938_3_En_4_Chapter.xhtml#PC4).


    ```

    package com.apress.bgn.four;

    import java.lang.Math;

    public class MathSample {

    public static void main(String... args) {

    System.out.println("PI value =" + Math.PI);

    double result = Math.sqrt(5.0);

    System.out.println("SQRT value =" + result);

    }

    }

    Listing 4-4

    Using Import of Class Math

    ```


    **Important**


    Fully qualified names are powerful. Package names are unique within a module,
    but package names are not always unique within an application. Type names are
    not always unique within an application either. But fully qualified type names,
    formed by combining the two, are unique within an application.


    **Tip**


    You can also think about packages as home addresses and types as persons. Two
    persons can have the same address, but they can’t have the same name. Two persons
    can have the same name and live at different addresses. This is how banks and
    other institutions identify individuals uniquely in the UK or US, for example.


    Fully qualified names are not limited to import statements. When two types have
    the same name and both are used to declare a third type, the only way to be able
    to tell the compiler within a type body which you intend to use is to use the
    fully qualified name. An example of this is shown in Listing [4-5](#463938_3_En_4_Chapter.xhtml#PC5),
    where a class `Math` from package `com.apress.bgn.four.math` is used within the
    body of a class where members of the `java.lang.Math` class are used too.


    ```

    package com.apress.bgn.four.math;

    import java.lang.Math;

    public class Sample {

    public static void main(String... args) {

    System.out.println("PI value =" + Math.PI);

    System.out.println("My PI value= " + com.apress.bgn.four.math.Math.PI);

    }

    }

    // output

    // PI value =3.141592653589793

    // My PI value= 3.14

    Listing 4-5

    Using a Member of Class com.apress.bgn.four.math.Math

    ```


    When more than one type is used from the same package, the type names can be replaced
    by an asterisk (`*`) that means any visible type from the package can be used
    in the code of the type being written. These are called *compact import statements*.
    Compacting imports is recommended when using multiple classes from the same package
    to write code, or multiple static variables and methods from the same class. When
    doing so, the import section of a file becomes verbose and difficult to read.
    This is where compacting comes to help. Compacting imports means replacing all
    classes from the same package, or variables and methods from the same class, with
    a wildcard so that only one import statement is needed. It works for static imports
    too. So the previous `Sample` class becomes class `MathSample` in Listing [4-6](#463938_3_En_4_Chapter.xhtml#PC6).


    ```

    package com.apress.bgn.four;

    import static java.lang.Math.*;

    public class MathSample {

    public static void main(String... args) {

    System.out.println("PI value =" + PI);

    double result = sqrt(5.0);

    System.out.println("SQRT value =" + result);

    }

    }

    Listing 4-6

    Using a Member of class java.lang.Math

    ```'
