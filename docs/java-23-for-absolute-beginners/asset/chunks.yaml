    Feel free to experiment with the other configurations. To stop the server, just
    press **Ctrl+C** while in the terminal window.


    Beside the CLI, Java 18 introduced a new set of API points for server creation
    and customization, all grouped under module `jdk.httpserver`. How to configure
    and start a server from a Java application will be shown in the next section.


    #### Using **SimpleFileServer**


    All components that make up the new set of API points for server creation and
    customization are grouped under the [`com.sun.net`](http://com.sun.net)`.httpserver`
    package. The new class `SimpleFileServer` offers the key components of the server
    via three static methods:


    *   `createFileServer(InetSocketAddress addr, Path rootDirectory, OutputLevel
    outputLevel)`: Creates a file server bound to a given address, from a given path,
    and logs request details according to the specified logging level.


    *   `createFileHandler(Path rootDirectory)`: Creates a file handler that serves
    files from a given directory path (and its subdirectories). A file handler is
    an instance of `HttpHandler` and is invoked to process HTTP exchanges. A file
    handler is used as an argument for the `HttpServer#create(..)` method to configure
    the server to be started.


    *   `createOutputFilter(OutputStream out, OutputLevel outputLevel)`: Creates a
    post-processing `Filter` that prints log messages about exchanges.


    By invoking the `createFileServer(..)` method, a simple in-memory web server is
    created. The type of the returned instance is `HttpServerImpl`, which extends
    the `HttpServer` abstract class. This class implements a simple HTTP server. An
    `HttpServer` is bound to an IP address and port number and listens for incoming
    TCP connections from clients on this address. The code in Listing [10-27](#463938_3_En_10_Chapter.xhtml#PC37)
    depicts the creation of an in-memory server that serves the contents of the `using-simplewebserver/src/main/resources`
    directory.


    ```

    package com.apress.bgn.ten;

    import com.sun.net.httpserver.SimpleFileServer;

    import java.io.File;

    import java.io.IOException;

    import java.net.InetAddress;

    import java.net.InetSocketAddress;

    import java.nio.file.Path;

    import static java.lang.System.in;

    import static java.lang.System.out;

    public class MostSimpleServer {

    public static final InetSocketAddress SERVER_ADDR =

    new InetSocketAddress(InetAddress.getLoopbackAddress(), 8080);

    private static final String SERVER_DATA = "using-simplewebserver/";

    void main() throws IOException {

    var serverDataLocation = new File(SERVER_DATA);

    var server = SimpleFileServer.createFileServer(SERVER_ADDR,

    Path.of(serverDataLocation.getAbsolutePath()),

    SimpleFileServer.OutputLevel.VERBOSE);

    server.start();

    out.println("Press any key to exit!");

    in.read();

    server.stop(2);

    }

    }

    Listing 10-27

    Configuring a Simple Web Server Using SimpleFileServer.createFileServer(..)

    ```


    To keep the server running, a `System.in.read()` invocation is added to wait for
    a user input before stopping it. The contents of the `using-simplewebserver` directory
    are listed when `http://127.0.0.1:8080/` is accessed in the browser. Thus, using
    Java code, we have configured and created a simple web server that could have
    been created using the CLI by running `jwebserver -p 8080 -d using-simplewebserver`.


    To configure the file handler separately, we need to use `HttpServer.create(..)`
    to create the server, as shown in Listing [10-28](#463938_3_En_10_Chapter.xhtml#PC38).


    ```

    package com.apress.bgn.ten;

    import com.sun.net.httpserver.HttpServer;

    import static com.apress.bgn.ten.MostSimpleServer.SERVER_ADDR;

    // other import statements omitted

    /**

    └── resources

    ├── favicon.ico

    ├── home.html

    ├── index.html

    ├── simple.json

    └── simple.zip

    */

    public class ContextServer {

    public static final String SERVER_DATA = "using-simplewebserver/src/main/resources";

    void main() throws IOException {

    var serverDataLocation = new File(SERVER_DATA);

    var handler = SimpleFileServer.createFileHandler(Path.of(serverDataLocation.getAbsolutePath()));

    var server = HttpServer.create(SERVER_ADDR, 10, "/simple", handler);

    server.start();

    out.println("Press any key to exit!");

    in.read();

    server.stop(2);

    }

    }

    Listing 10-28

    Configure the file handler separately

    ```'
