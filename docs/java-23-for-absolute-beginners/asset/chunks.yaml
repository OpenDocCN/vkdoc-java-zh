    ```\n\nThe following list explains the components of Listing [8-47](#463938_3_En_8_Chapter.xhtml#PC64):\n\
    \n* The three types used as parameters when implementing the `Gatherer<T, A, R>`\
    \ represent the following:\n  * `T`: The type of input elements to the gatherer\
    \ operation. In this case the original stream contains `Song` instances that are\
