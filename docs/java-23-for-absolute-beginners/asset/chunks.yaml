    实现自定义序列化和反序列化类

    ```


    就本书的范围而言，关于使用 Jackson 进行 JSON 序列化，能说的就是这些了。如果你对这个主题感兴趣，可以自行阅读更多内容。


    重要


    还有一个 Jackson 库用于将 Java 实例序列化为 YAML，这在配置文件领域是*新秀*。该库名为 `jackson-dataformat-yaml`。

