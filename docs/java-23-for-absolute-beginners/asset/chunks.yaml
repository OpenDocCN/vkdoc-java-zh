- fmt: '```java

    package com.apress.bgn.five;

    import java.time.LocalDate;

    import java.time.LocalDateTime;

    import java.time.Month;

    public class NewCalendarDateDemo {

    void main() {

    var currentTime = LocalDateTime.now();

    System.out.println("Current DateTime: " + currentTime);

    LocalDate today = currentTime.toLocalDate();

    System.out.println("Today: " + today);

    var johnBd = LocalDate.of(1977, Month.OCTOBER, 16);

    System.out.println("John’s Birthday: " + johnBd);

    int day = johnBd.getDayOfMonth();

    System.out.println("Day: " + johnBd.getDayOfWeek());

    int month = johnBd.getMonthValue();

    System.out.println("Month: " +  johnBd.getMonth());

    int year = johnBd.getYear();

    System.out.println("Year: " + year);

    }

    }

    //output

    /*

    Current DateTime: 2024-05-18T00:28:35.873773

    Today: 2024-05-18

    John’s Birthday: 1977-10-16

    Day: 16, SUNDAY

    Month: 10, OCTOBER

    Year: 1977

    */

    Listing 5-36

    Code Sample for Handling Calendar Dates Using the New DateTime API, Introduced
    in JDK 8

    ```


    To get the current date and time, a static method named `now()` is called, which
    returns an instance of type `LocalDateTime`. This instance can be used to get
    the current date by calling `toLocalDate()`, which returns the current date as
    an instance of type `LocalDate`. This class has a `toString()` method that prints
    the formatted date according to the default locale set on the system.


    To create a custom date, the actual year and day of month can be used as arguments,
    and the month can be specified using one of the values of the `java.time.Month`
    enum.


    Extracting information regarding a date can be done easily by calling methods
    with intuitive names. Just look at the `getDayOfMonth()` and `getDayOfWeek()`
    methods in Listing [5-36](#463938_3_En_5_Chapter.xhtml#PC65). Their names reflect
    exactly what data they are returning.


    As you can see, classes `LocalDate` and `LocalDateTime` simplify the development
    where time zones are not required. Working with time zones is quite an advanced
    subject, so it won’t be covered within this book.


    ## Collections


    One of the most important family of types in JDK is the collections family, which
    you will probably use a lot. Classes and interfaces in the collections family
    are used to model common data collections such as sets, lists, and maps. All the
    classes are stored under package `java.util` and can be split into two categories:
    tuples and collections of key/value pairs.


    The tuples are unidimensional sets of data: if the values are unique, any class
    implementing the `java.util.Set<E>` interface should be used to model them, if
    not any class implementing the `java.util.List<E>` interface should be used. For
    collections of key/value pair classes, `java.util.Map<K,V>` should be implemented.


    Starting with Java version 1.5, collections have become generic, which allows
    developers more precision and security when working with them. Before Java 1.5,
    collections could contain any type of objects. Developers can still write code
    like that, as depicted in Listing [5-37](#463938_3_En_5_Chapter.xhtml#PC66).


    ```java

    package com.apress.bgn.five;

    import com.apress.bgn.four.classes.Gender;

    import com.apress.bgn.four.hierarchy.Performer;

    import java.util.ArrayList;

    import java.util.List;

    public class CollectionsBasicDemo {

    void main() {

    List objList = new ArrayList();

    objList.add("temp");

    objList.add(Integer.valueOf(5));

    objList.add(new Performer("John", 40, 1.91f, Gender.MALE));

    }

    }

    Listing 5-37

    Code Using Collections Up to Java 1.5

    ```


    You probably do not see any problem with this (the compiler sure doesn’t), but
    when you iterate this list, it is quite difficult to determine which objects you
    are handling, at least not without complicated code analyzing the type of each
    object. This was mentioned before at the end of **Chapter** [**4**](#463938_3_En_4_Chapter.xhtml)
    when generics were introduced. The code to iterate the list and process the elements
    differently based on their type is depicted in Listing [5-38](#463938_3_En_5_Chapter.xhtml#PC67),
    just to show you why this is a bad idea and bad practice in this day and age of
    Java.


    ```java

    package com.apress.bgn.five;

    import com.apress.bgn.four.classes.Gender;

    import com.apress.bgn.four.hierarchy.Performer;

    import java.util.ArrayList;

    import java.util.List;

    public class CollectionsBasicDemo {

    void main() {

    List objList = new ArrayList();

    objList.add("temp");

    objList.add(Integer.valueOf(5));

    objList.add(new Performer("John", 40, 1.91f, Gender.MALE));

    for (Object obj : objList) {

    if (obj instanceof String) {

    System.out.println("String object = " + obj.toString());

    } else if (obj instanceof Integer) {

    Integer i = (Integer)obj;

    System.out.println("Integer object = " + i.intValue());

    } else {

    Performer p = (Performer) obj;

    System.out.println("Performer object = " + p.getName());

    }

    }

    }

    }

    Listing 5-38

    More Code Using Collections Up to Java 1.5

    ```


    Maybe this is not clear to you now, but to be able to use the contents of the
    list, you have to know exactly all the types of the objects that were put in the
    list. This might be doable when you are working alone on a project, but in a bigger
    project, when multiple developers are involved, this can get messy really fast.


    This is where **generics** come to help. Generics help define at compile time
    what types of objects should be put into a collection, and thus if the wrong object
    type is added to the collection, the code no longer compiles. Both lists and sets
