- fmt: "#### Intermediate Operation `gather`\n\nLet’s assume we want to reduce the\
    \ stream of songs we have been playing with so far by keeping only one song for\
    \ each singer. There is no stream operation that does this, so we need to design\
    \ a component that defines songs’ equality based on the singer and use it together\
    \ with `map(..)` and `distinct(..)` as shown in Listing [8-46](#463938_3_En_8_Chapter.xhtml#PC63).\n\
    \n```\npackage com.apress.bgn.eight;\nimport com.apress.bgn.eight.util.Song;\n\
    import com.apress.bgn.eight.util.StreamMediaLoader;\nimport java.util.HashSet;\n\
    import java.util.Objects;\nimport static java.lang.System.out;\npublic class NoStreamGathererDemo\
    \ {\nrecord DistinctBySinger(Song song) {\n@Override public boolean equals(Object\
    \ obj) {\nreturn obj instanceof DistinctBySinger(Song other)\n&& Objects.equals(song.getSinger(),\
    \ other.getSinger());\n}\n@Override public int hashCode() {\nreturn song == null\
    \ ? 0 : song.getSinger().hashCode();\n}\n}\nvoid main(){\nvar songs = StreamMediaLoader.loadSongs();\n\
    var reducedSongs = songs.map(DistinctBySinger::new)\n.distinct()\n.map(DistinctBySinger::song)\n\
    .peek(out::println);\nvar songList = reducedSongs.toList();\nout.println(songList.size()\
    \ + \" == \" + new HashSet(songList).size());\n}\n}\nListing 8-46\nStream Complex\
    \ Operation for Creating a Stream Containing Only One Song per Singer\n```\n\n\
    Just because it is practical to do so, we’ve defined the `DistinctBySinger` instance\
    \ to be a record, but this does not do much to simplify the stream pipeline. A\
    \ better solution to simplify the stream pipeline would be to have—instead of\
    \ two `map(..)` calls and one `distinct(..)` call—a single call to a method we\
    \ pass a `DistinctBySinger` instance to.\n\nThe `gather(..)` method, introduced\
    \ in Java 22 as a preview feature, returns a stream consisting of the results\
    \ of applying the given `java.util.stream.Gatherer<T, A, R>` instance. This operation\
    \ has been introduced to provide support for more complex stream intermediary\
    \ operations by applying a user-defined entity called a **gatherer**. The `gather(..)`\
    \ operation allows developers to build efficient, parallel-ready streams that\
    \ implement almost any intermediate operation. A gatherer is very powerful and\
    \ has the following capabilities:\n\n* Transform elements in a one-to-one, one-to-many,\
    \ many-to-one, or many-to-many fashion.\n* Track previously seen elements to influence\
    \ the transformation of later elements.\n* Short-circuit to transform infinite\
    \ streams to finite streams.\n* Apply different transformations based on conditions,\
    \ and create more elements as a result of processing one from the initial stream.\n\
    \nThese capabilities translate into being able to group elements in batches, deduplicate\
    \ consecutively similar elements, gradually accumulate elements, or gradually\
    \ reorder them.\n\nAs you can see, a gatherer can do a lot of things, and this\
    \ is because the gatherer is actually made of four functions that work together:\n\
    \n* An **initializer** function: Can be used to provide an object that maintains\
    \ private state while processing stream elements.\n* An **integrator** function:\
    \ Integrates a new element from the input stream, possibly inspecting the private\
    \ state object and possibly emitting elements to the output stream.\n* A **combiner**\
    \ function: Can be used evaluate the gatherer in parallel when the input stream\
    \ is marked as parallel.\n* A **finisher** function: Can be invoked when there\
    \ are no more input elements to consume. This function can inspect the private\
    \ state object and, possibly, emit additional output elements.\n\nThere would\
    \ be a lot more things to say about gatherers, but let’s mix some practice with\
    \ the theory, shall we?\n\n##### Creating a Custom Gatherer\n\n`Gatherer<T, A,\
    \ R>` is an interface that developers must implement to create their own custom\
    \ gatherer. So, to rewrite the code in Listing [8-46](#463938_3_En_8_Chapter.xhtml#PC63)\
    \ to replace the two `map(..)` calls and one `distinct(..)` call with a call of\
    \ `gather(..)`, we need to implement the `DistinctBySinger` record to implement\
    \ the `Gatherer<T, A, R>` interface. This type of processing does not require\
    \ a *combiner*, since we are not interested in running the gatherer in parallel,\
    \ and does not require a *finisher*, since we are interested in the resulting\
    \ stream. So the code in Listing [8-46](#463938_3_En_8_Chapter.xhtml#PC63) becomes\
    \ the code in Listing [8-47](#463938_3_En_8_Chapter.xhtml#PC64).\n\n```\npackage\
    \ com.apress.bgn.eight;\nimport com.apress.bgn.eight.util.Song;\nimport com.apress.bgn.eight.util.StreamMediaLoader;\n\
    import java.util.ArrayList;\nimport java.util.HashSet;\nimport java.util.List;\n\
    import java.util.function.Supplier;\nimport java.util.stream.Gatherer;\nimport\
    \ static java.lang.System.out;\npublic class CustomGathererDemo {\nrecord DistinctBySinger()\
    \ implements Gatherer, Song> {\n@Override\npublic Supplier>  initializer() {\n\
    return () -> new HashSet();\n}\n@Override\npublic Integrator, Song, Song> integrator()\
    \ {\nreturn Integrator.of((singersList, element, downstream) -> {\nif (singersList.add(element.getSinger()))\
    \ {\n// emit the current integer downstream, if singer was added to the set\n\
    downstream.push(element);\n}\n// Return true to continue processing stream elements\n\
    return true;\n});\n}\n}\nvoid main(){\nvar songs = StreamMediaLoader.loadSongs();\n\
    var reducedSongs = songs.gather(new DistinctBySinger())\n.peek(out::println);\n\
