    ## Breaking Loops and Skipping Steps


    As promised in the discussion of the previous examples that exited a loop using
    the `break;` statement, this section adds more details. There are three statements
    that we can use to manipulate the behavior of a loop:


    *   `break`: Exits the loop and, if accompanied by a label, breaks the loop that
    is labeled with it; this is useful when we have more nested loops, because we
    can break from any of the nested loops, not just the one containing the statement.

    *   `continue`: Skips the execution of any code after it and continues with the
    next step.

    *   `return`: Exits a method, so if the loop or a `switch` statement is within
    the body of a method, it can be used to exit the loop as well.


    **Warning**


    As for best practices, usage of `return` statements to exit a method should not
    be abused, as they might make the execution flow difficult to follow.'
