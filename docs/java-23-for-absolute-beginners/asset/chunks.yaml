- fmt: '### Intermediate Operation `sorted` and Terminal Operation `findFirst`


    As the name indicates, the `sorted()` method has something to do with sorting:
    element ordering. When called on a stream, it creates another stream with all
    the elements of the initial stream, but sorted in their natural order. If the
    type of elements on the stream is not comparable (i.e., the type does not implement
    `java.lang.Comparable<T>`), a `java.lang.ClassCastException` is thrown. And since
    we are going to use `sorted()` to get a stream of sorted elements, we will use
    `findFirst()` to get the first element in the stream. This method returns an `Optional<T>`
    instance, because the stream might be empty and thus there is no first element.
    This means to get the value, the `get()` method must be called. For the situation
    where the stream might be empty, the `orElse(..)` or `orElseGet(..)` method can
    be used to return a default value in case of the missing first element. The code
    in Listing [8-36](#463938_3_En_8_Chapter.xhtml#PC53) depicts both situations.


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class MoreStreamsDemo {

    public static Function processDuration = song -> song.getDuration()/60;

    void main(){

    // non-empty stream, result ''ever''

    List pieces = List.of("some","of", "us", "we''re", "hardly", "ever", "here");

    String first0 = pieces.stream().sorted().findFirst().get();

    out.println("First from sorted list: " + first0);

    // empty stream, result ''none''

    pieces = List.of();

    String first1 = pieces.stream().sorted().findFirst().orElse("none");

    out.println("First from sorted list: " + first1);

    }

    }

    Listing 8-36

    Extracting the First Element in an Ordered Stream

    ```


    ### Intermediate Operation `distinct` and Terminal Operation `count`


    The `distinct()` method takes a stream and generates a stream with all the distinct
    elements of the original stream. And since in the examples in this book we couple
    intermediary and terminal operations, let’s use `count()`, which counts the elements
    of the stream. A small example is depicted in Listing [8-37](#463938_3_En_8_Chapter.xhtml#PC54).


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class MoreStreamsDemo {

    void main(){

    pieces = List.of("as","long", "as", "there", "is", "you", "there", "is", "me");

    long count = pieces.stream().distinct().count();

    out.println("Elements in the stream: " + count);

    }

    }

    // output

    // Elements in the stream: 6

    Listing 8-37

    Counting Elements of a Stream, After Removing Duplicate Elements

    ```


    As shown in the output of Listing [8-37](#463938_3_En_8_Chapter.xhtml#PC54), when
    run, the code prints *Elements in the stream: 6*, because after removing the duplicate
    terms of *as*, *there*, and *is*, we are left with six terms. If the initial stream
    is empty, the `count()` method returns 0 (zero).


    ### Intermediate Operation `limit` and Terminal Operations `min` and `max`


    The `limit(..)` method was used previously in this chapter to transform an infinite
    stream into a finite one. Because `limit(..)` transforms a stream into another,
    it clearly is an intermediate function. The terminal methods covered in this section
    model two mathematical functions:


    *   Calculating the minimum of the elements in the stream: `min(..)`

    *   Calculating the maximum of the elements in the stream: `max(..)`


    The type of elements in the stream must implement `java.util.Comparator<T>`; otherwise,
    a minimum value and maximum value cannot be calculated. Using the `limit(..)`,
    `min(..)`, and `max(..)` functions together is depicted in Listing [8-38](#463938_3_En_8_Chapter.xhtml#PC55).


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class MoreStreamsDemo {

    void main(){

    out.println("Listing 8-38\. Computing the maximum and minimum value in a stream.");

    Stream ints0 = Stream.of(5,2,7,9,8,1,12,7,2);

    ints0.limit(4).min(Integer::compareTo)

    .ifPresent(min -> out.println("Min is: " + min));

    // Prints "Min is: 2"

    Stream ints1 = Stream.of(5,2,7,9,8,1,12,7,2);

    ints1.limit(4).max(Integer::compareTo)

    .ifPresent(max -> out.println("Max is: " + max));

    // Prints "Max is: 9"

    }

    }

    Listing 8-38

    Computing the Maximum and Minimum Values in a Stream

    ```


    ### Terminal Operations `sum` and `reduce`


    Let’s consider the scenario in which we have a finite stream of `Song` values
    and we want to calculate the sum of their durations. There are two stream terminator
    methods that can be used to do this: the `sum(..)` method and the `reduce(..)`
    method. The code to do this is depicted in Listing [8-39](#463938_3_En_8_Chapter.xhtml#PC56).


    ```

    package com.apress.bgn.eight;

    import com.apress.bgn.eight.util.Song;

    import com.apress.bgn.eight.util.StreamMediaLoader;

    import static java.lang.System.out;

    public class MediaStreamTester {

    void main(){

    var songs = StreamMediaLoader.loadSongs();

    Integer totalDuration0 = songs

    .mapToInt(Song::getDuration)

    .sum();

    out.println("Total duration: " + totalDuration0);

    songs = StreamMediaLoader.loadSongs();

    Integer totalDuration1 = songs

    .mapToInt(Song::getDuration)

    .reduce(0, (a, b) -> a + b);

    out.println("Total duration: " + totalDuration1);

    }

    }

    // both statements output

    // Total duration: 5466

    Listing 8-39

    Adding the Elements of a Stream

    ```


    The version of the `reduce(..)` operation takes two arguments:


    *   The **identity** argument represents the initial result of the reduction and
    the default result if there are no elements in the stream.

    *   The **accumulator** function takes two parameters that the operation is applied
    on to get a partial result (in this case, it is the addition of those two elements).


    The `reduce(..)` operation accumulator is an instance of `java.util.function.BinaryOperator<T>`
    that represents an operation upon two operands of the same type, producing a result
    of the same type as the operands. On an `IntStream` instance, like the one returned
    by the `mapToInt(..)` operation, the `reduce(..)` operation accumulator is an
    instance of `java.util.function.IntBinaryOperator`, which is a custom function
    that takes two `int` arguments and returns an `int` result.


    Essentially, every time an element of the stream is processed, the accumulator
    returns a new value, which in this case is the result of adding the processed
    element with the previous partial result. If the result of the process is a collection,
    the accumulator’s result is a collection, so every time a stream element is processed,
    a new collection is created. This is pretty inefficient, so in scenarios where
    collections are involved, the `collect(..)` operation is more suitable.


    ### Intermediate Operation `peek`


    The `peek()` function is special, because it doesn’t affect a stream in any way;
    it does not consume stream elements. The `peek()` function returns a stream consisting
    of the elements of the stream it is called on, while also performing the operation
    specified by its `Consumer<T>` argument on each element. This means that this
    function can be used to debug stream operations using logging statements that
    print information at runtime.


    Let’s take our stream of `Song` instances, filter them by their duration, select
    all of them with duration > 300 seconds, and then get their titles and collect
    them in a list. The code to do this is depicted in Listing [8-40](#463938_3_En_8_Chapter.xhtml#PC57).


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class MediaStreamTester {

    void main(){

    var songs = StreamMediaLoader.loadSongs();

    List result = songs.filter(s -> s.getDuration() > 300)

    .peek(e -> out.println("\t Filtered value: " + e))

    .map(Song::getTitle)

    .peek(e -> out.println("\t Mapped value: " + e))

    .toList();

    }

    }

    Listing 8-40

    Calling peek(..) on Stream Elements

    ```


    In Listing [8-40](#463938_3_En_8_Chapter.xhtml#PC57), before the `map(..)` call,
    a `peek(..)` call is introduced to check if the filtered elements are the ones
    we expect. Another `peek(..)` call is introduced after to inspect the mapped value.'
