    ## Building a Web Application


    A web application is an application that runs on a server and can be accessed
    using a browser. Until recently, most Java applications had to be hosted on web
    servers like Apache Tomcat or Eclipse GlassFish or enterprise servers like JBoss
    (currently known as WildFly) or Apache TomEE so that they could be accessed. You
    would write the web application with the classes and HTML or Jakarta Server Pages
    (JSP) files, pack it in a WAR (Web Archive) file or an EAR (Enterprise Archive)
    file, deploy it to a server, and start the server. The server would provide the
    context of the application and map requests to classes that would provide the
    answers to be served as responses. Assuming the application would be deployed
    on a Tomcat server, in Figure [10-13](#463938_3_En_10_Chapter.xhtml#Fig13) you
    can see an abstract schema of the deployed application functionality.


    ![](images/463938_3_En_10_Chapter/463938_3_En_10_Fig13_HTML.jpg)


    Figure 10-13


    Web application deployed on an Apache Tomcat server


    Requests to a web application can also come from clients other than browsers (e.g.,
    mobile applications), but because this section covers web applications, we’ll
    assume all requests to our application come from a browser.


    Before we build a web application, let’s briefly explain a very important thing:
    the Internet. The Internet is an information system made up of a lot of computers
    linked together. Some computers host application servers that provide access to
    applications, some computers access these applications, and some do both. The
    communication between these computers is done over a network through a list of
    protocols: HTTP, FTP, SMTP, POP, and so on. The most popular protocol is HTTP
    (Hypertext Transfer Protocol), which is an asymmetric request-response client-server
    protocol, meaning that the client makes a request to the server and then the server
    sends a response. Subsequent requests have no knowledge of one another and they
    do not share any state, thus they are *stateless*.


    HTTP requests can be of different types, categorized by the action they require
    the application on the server to perform, but there are four types that are most
    commonly used by developers (the ones listed under “Request” in the arrow in Figure
    [10-13](#463938_3_En_10_Chapter.xhtml#Fig13)). We won’t go into depth regarding
    request components, as they are not really related to Java, but we’ll cover enough
    details to understand how a web application works. The following list presents
    the four request types (also called *request methods*) and the types of responses
    the server sends back for each of them:


    ![](images/463938_3_En_10_Chapter/463938_3_En_10_Fig14_HTML.jpg)


    Figure 10-14


    Network debugger view in Firefox


    *   **GET**: Whenever a user enters a URL in the browser, such as [`https://my-site.com/index.html`](https://my-site.com/index.html),
    the browser transforms the address into a Request message and sends it to the
    web server. What the browser does can be easily viewed by opening the debugger
    view in **Firefox**, clicking the **Network** tab, and trying to access [`https://www.google.com/`](https://www.google.com/).
    In Figure [10-14](#463938_3_En_10_Chapter.xhtml#Fig14) you can see Firefox debugger
    view showing the URL being requested and the contents of the Request message.'
