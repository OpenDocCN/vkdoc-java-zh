    JDK 有很多类，其中包含您可以用来编写应用程序的字段和方法。随着每个版本的发布，情况都会发生变化，您必须让自己保持最新状态。大脑容量有限；没有雇主会期望您知道每一个
    JDK 类和方法，但要聪明地工作，并始终在浏览器中打开这个 URL [h`ttps://docs.oracle.com/en/java/javase/23/docs/api/index.html`](https://docs.oracle.com/en/java/javase/23/docs/api/index.html)（或与所使用的
