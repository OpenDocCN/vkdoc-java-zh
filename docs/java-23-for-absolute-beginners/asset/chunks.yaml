    The `%` (modulus) operator is used to divide two variables, but the result is
    the remainder of the division. The operation is called **modularization**. There
    is also a composed operator, `%=`, that can be used to divide the value of a variable
    and assign the remainder on the spot. In Listing [6-21](#463938_3_En_6_Chapter.xhtml#PC30),
    you can see this operator in action.


    ```

    jshell> int i = 4

    i ==> 4

    |  created variable i : int

    jshell> int j = 3

    j ==> 3

    |  created variable j : int

    jshell> int k = i % j

    k ==> 1

    |  created variable k : int

    jshell> int i = 4

    i ==> 4

    |  modified variable i : int

    |    update overwrote variable i : int

    jshell> i = i % 3

    i ==> 1

    |  assigned to i : int

    jshell> int i = 4

    i ==> 4

    |  modified variable i : int

    |    update overwrote variable i : int

    jshell> i %= 3

    $7 ==> 1

    |  created scratch variable $7 : int

    # modularization is essentially a division, so yet again, nope!

