- fmt: "### Record Patterns for `switch`\n\nJDK 21 also introduced **record patterns**,\
    \ which, beside normal type matching and automatic conversion, introduced the\
    \ capability of deconstructing records, as shown in **Chapter** [**6**](#463938_3_En_6_Chapter.xhtml).\
    \ By using record patterns, not only can record types be used as options for the\
    \ `switch` statements and expressions, but the options can be deconstruction expressions.\
    \ Listing [7-19](#463938_3_En_7_Chapter.xhtml#PC20) shows a piece of code that\
    \ shows a `switch` expression using various deconstructed record patterns as options.\n\
    \n```\npackage com.apress.bgn.seven.pattern;\nimport static java.lang.System.out;\n\
    record FullName (String firstName, String lastName){}\nrecord PersonRecord (FullName\
    \ fullName, Integer age) {}\nrecord WrapperBeing(T t, String description) {}\n\
    public class RecordPatternDemo {\nvoid main(){\nObject obj = genRandomRecordInstance();\n\
    switch (obj) {\ncase null -> out.println(\"no record\");\ncase FullName(String\
    \ fn, String ln) -> out.println(\"FullName record: \" + fn +\" \" + ln);\ncase\
    \ PersonRecord(FullName(var fn, String _), var age) -> out.println(\"Person record\
    \ \" + fn +\"  of age \" + age);\ndefault -> out.println(\"something else\");\n\
    }\n}\npublic static Object genRandomRecordInstance(){\nvar t = System.currentTimeMillis();\n\
    if (t % 3 == 0 ) {\nreturn new FullName(\"John\", \"Doe\");\n} else if (t % 5\
    \ == 0 ) {\nreturn new PersonRecord(new FullName(\"John\", \"Doe\"), 42);\n} else\
    \ if (t % 11 == 0) {\nreturn new WrapperBeing(new PersonRecord(new FullName(\"\
    John\", \"Doe\"), 42), \"is mise\");\n}\nreturn null;\n}\n}\nListing 7-19\nswitch\
    \ Statement Checking Multiple Record Types for an Object\n```\n\n## Looping Statements\n\
    \nSometimes in programming, we need repetitive steps that involve the same variables.\
    \ To write the same statement over and over again to get the job done would be\
    \ ridiculous. Let’s take the example of sorting an array of integer values. The\
    \ most popular algorithm to do this, and the one that is taught first in programming\
    \ courses because it is simple, is called *Bubble Sort*. The algorithm compares\
    \ the elements of an array two by two, and if they are not in the correct order,\
    \ it swaps them. It goes over the array again and again until no more swaps are\
    \ needed. The effects of the algorithm are depicted in Figure [7-7](#463938_3_En_7_Chapter.xhtml#Fig7).\n\
    \n![](images/463938_3_En_7_Chapter/463938_3_En_7_Fig7_HTML.jpg)\n\nFigure 7-7\n\
    \nBubble Sort algorithm phases and effect\n\nThis algorithm performs two types\
    \ of loops: one iterates each element of the array using indexes. The second one\
    \ repeats this traversal until no swaps are necessary. In Java this algorithm\
    \ can be written in more than one way using different looping statements. But\
    \ we’ll get there; let’s take it slow.\n\nThere are three types of looping statements\
    \ in Java:\n\n*   `for` statement\n*   `while` statement\n*   `do-while` statement\n\
    \nThe `for` looping statement is the most used, but `while` and `do-while` have\
    \ their uses as well.\n\n### `for` Statement\n\nThe `for` statement is recommended\
    \ for iterating on objects such as arrays and collections that can be counted.\
    \ For example, traversing an array and printing each one of its values is as simple\
    \ as depicted in Listing [7-20](#463938_3_En_7_Chapter.xhtml#PC21).\n\n```\npackage\
    \ com.apress.bgn.seven.forloop;\nimport static java.lang.System.out;\npublic class\
    \ ForLoopBasicDemo {\nvoid main() {\nint[] arr = {5, 1, 4, 2, 3};\nfor (int i\
    \ = 0; i < arr.length; ++i) {\nout.println(\"arr[\" +i +\"] = \" + arr[i]);\n\
    }\n}\n}\nListing 7-20\nfor Statement traversing an array\n```\n\nBased on the\
    \ Listing [7-20](#463938_3_En_7_Chapter.xhtml#PC21) example, a flowchart for the\
    \ `for` statement can be drawn as depicted in Figure [7-8](#463938_3_En_7_Chapter.xhtml#Fig8).\n\
    \n![](images/463938_3_En_7_Chapter/463938_3_En_7_Fig8_HTML.jpg)\n\nFigure 7-8\n\
    \nThe `for` statement flowchart\n\nThe code snippet in Listing [7-21](#463938_3_En_7_Chapter.xhtml#PC22)\
    \ depicts the `for` loop template.\n\n```\nfor ([init_expr]; [condition];[step]){\n\
    [code_block]\n}\nListing 7-21\nThe for Loop Template\n```\n\nEach of the terms\
    \ between square brackets have a specific purpose that is explained in the following\
    \ list:\n\n*   `[init_expr]`: The initialization expression that is used to set\
    \ the initial value of the counter used by this loop. It ends with `;` and is\
    \ not mandatory, as the declaration and initialization can be done outside the\
    \ statement, especially if we are interested in using the counter variable later\
    \ in the code and outside the statement. The code in Listing [7-20](#463938_3_En_7_Chapter.xhtml#PC21)\
    \ can be very well written as shown in Listing [7-22](#463938_3_En_7_Chapter.xhtml#PC23).\n\
    \n```\n    package com.apress.bgn.seven.forloop;\n    import static java.lang.System.out;\n\
    \    public class AnotherForLoopBasicDemo {\n    void main(){\n    int[] arr =\
    \ {5, 1, 4, 2, 3};\n    int i = 0;\n    for (; i < arr.length; ++i) {\n    out.println(\"\
    arr[\" +i +\"] = \" + arr[i]);\n    }\n    out.println(\"Loop exited with index:\
    \ \" + i);\n    }\n    }\n    Listing 7-22\n    The for Loop with Termination\
    \ Condition and Counter Modification Expression\n    ```\n\n*   `[condition]`:\
    \ The termination condition of the loop. As long as this condition is evaluated\
    \ to `true`, the loop will continue executing. The condition ends with `;` and,\
    \ funny enough, it is not mandatory either, as the termination condition can be\
    \ placed inside the code to be executed repeatedly by the loop. So the code in\
    \ Listing [7-22](#463938_3_En_7_Chapter.xhtml#PC23) can be modified further as\
    \ shown in Listing [7-23](#463938_3_En_7_Chapter.xhtml#PC24).\n\n```\n    package\
    \ com.apress.bgn.seven.forloop;\n    import static java.lang.System.out;\n   \
    \ public class AndAnotherForLoopDemo {\n    void main() {\n    int[] arr = {5,\
    \ 1, 4, 2, 3};\n    int i = 0;\n    for (; ; ++i) {\n    if (i >= arr.length)\
    \ {\n    break;\n    }\n    out.println(\"arr[\" +i +\"] = \" + arr[i]);\n   \
    \ }\n    out.println(\"Loop exited with index: \" + i);\n    }\n    }\n    Listing\
    \ 7-23\n    The for Loop with Only Counter Modification Statement\n    ```\n\n\
    *   `[step]`: The step expression, or increment, that increases the counter on\
    \ every step of the loop. Being the last term, it does not end in `;`. As you\
    \ probably already expected, it is not mandatory either, as nothing stops the\
    \ developer from manipulating the counter inside the code block. So the code in\
    \ Listing [7-23](#463938_3_En_7_Chapter.xhtml#PC24) can also be written as shown\
    \ in Listing [7-24](#463938_3_En_7_Chapter.xhtml#PC25).\n\n```\n    package com.apress.bgn.seven.forloop;\n\
    \    import static java.lang.System.out;\n    public class YeyAnotherForLoopDemo\
    \ {\n    void main() {\n    int[] arr = {5, 1, 4, 2, 3};\n    int i = 0;\n   \
    \ for (; ;) {\n    if (i >= arr.length) {\n    break;\n    }\n    out.println(\"\
    arr[\" +i +\"] = \" + arr[i]);\n    ++i;\n    }\n    out.println(\"Loop exited\
    \ with index: \" + i);\n    }\n    }\n    Listing 7-24\n    The for Loop with\
    \ No Initialization, Condition, or Counter Modification Expression\n    ```"
  raw: "### Record Patterns for `switch`\n\nJDK 21 also introduced **record patterns**,\
    \ which, beside normal type matching and automatic conversion, introduced the\
    \ capability of deconstructing records, as shown in **Chapter** [**6**](#463938_3_En_6_Chapter.xhtml).\
    \ By using record patterns, not only can record types be used as options for the\
    \ `switch` statements and expressions, but the options can be deconstruction expressions.\
    \ Listing [7-19](#463938_3_En_7_Chapter.xhtml#PC20) shows a piece of code that\
    \ shows a `switch` expression using various deconstructed record patterns as options.\n\
    \n```\npackage com.apress.bgn.seven.pattern;\nimport static java.lang.System.out;\n\
    record FullName (String firstName, String lastName){}\nrecord PersonRecord (FullName\
    \ fullName, Integer age) {}\nrecord WrapperBeing(T t, String description) {}\n\
    public class RecordPatternDemo {\nvoid main(){\nObject obj = genRandomRecordInstance();\n\
    switch (obj) {\ncase null -> out.println(\"no record\");\ncase FullName(String\
    \ fn, String ln) -> out.println(\"FullName record: \" + fn +\" \" + ln);\ncase\
    \ PersonRecord(FullName(var fn, String _), var age) -> out.println(\"Person record\
    \ \" + fn +\"  of age \" + age);\ndefault -> out.println(\"something else\");\n\
    }\n}\npublic static Object genRandomRecordInstance(){\nvar t = System.currentTimeMillis();\n\
    if (t % 3 == 0 ) {\nreturn new FullName(\"John\", \"Doe\");\n} else if (t % 5\
    \ == 0 ) {\nreturn new PersonRecord(new FullName(\"John\", \"Doe\"), 42);\n} else\
    \ if (t % 11 == 0) {\nreturn new WrapperBeing(new PersonRecord(new FullName(\"\
    John\", \"Doe\"), 42), \"is mise\");\n}\nreturn null;\n}\n}\nListing 7-19\nswitch\
    \ Statement Checking Multiple Record Types for an Object\n```\n\n## Looping Statements\n\
    \nSometimes in programming, we need repetitive steps that involve the same variables.\
    \ To write the same statement over and over again to get the job done would be\
    \ ridiculous. Let’s take the example of sorting an array of integer values. The\
    \ most popular algorithm to do this, and the one that is taught first in programming\
    \ courses because it is simple, is called *Bubble Sort*. The algorithm compares\
    \ the elements of an array two by two, and if they are not in the correct order,\
    \ it swaps them. It goes over the array again and again until no more swaps are\
    \ needed. The effects of the algorithm are depicted in Figure [7-7](#463938_3_En_7_Chapter.xhtml#Fig7).\n\
    \n![](images/463938_3_En_7_Chapter/463938_3_En_7_Fig7_HTML.jpg)\n\nFigure 7-7\n\
    \nBubble Sort algorithm phases and effect\n\nThis algorithm performs two types\
    \ of loops: one iterates each element of the array using indexes. The second one\
    \ repeats this traversal until no swaps are necessary. In Java this algorithm\
    \ can be written in more than one way using different looping statements. But\
    \ we’ll get there; let’s take it slow.\n\nThere are three types of looping statements\
    \ in Java:\n\n*   `for` statement\n\n*   `while` statement\n\n*   `do-while` statement\n\
    \nThe `for` looping statement is the most used, but `while` and `do-while` have\
    \ their uses as well.\n\n### **for** Statement\n\nThe `for` statement is recommended\
    \ for iterating on objects such as arrays and collections that can be counted.\
    \ For example, traversing an array and printing each one of its values is as simple\
    \ as depicted in Listing [7-20](#463938_3_En_7_Chapter.xhtml#PC21).\n\n```\npackage\
    \ com.apress.bgn.seven.forloop;\nimport static java.lang.System.out;\npublic class\
    \ ForLoopBasicDemo {\nvoid main() {\nint[] arr = {5, 1, 4, 2, 3};\nfor (int i\
    \ = 0; i < arr.length; ++i) {\nout.println(\"arr[\" +i +\"] = \" + arr[i]);\n\
    }\n}\n}\nListing 7-20\nfor Statement traversing an array\n```\n\nBased on the\
    \ Listing [7-20](#463938_3_En_7_Chapter.xhtml#PC21) example, a flowchart for the\
    \ `for` statement can be drawn as depicted in Figure [7-8](#463938_3_En_7_Chapter.xhtml#Fig8).\n\
    \n![](images/463938_3_En_7_Chapter/463938_3_En_7_Fig8_HTML.jpg)\n\nFigure 7-8\n\
    \nThe `for` statement flowchart\n\nThe code snippet in Listing [7-21](#463938_3_En_7_Chapter.xhtml#PC22)\
    \ depicts the `for` loop template.\n\n```\nfor ([init_expr]; [condition];[step]){\n\
    [code_block]\n}\nListing 7-21\nThe for Loop Template\n```\n\nEach of the terms\
    \ between square brackets have a specific purpose that is explained in the following\
    \ list:\n\n*   `[init_expr]`: The initialization expression that is used to set\
    \ the initial value of the counter used by this loop. It ends with `;` and is\
    \ not mandatory, as the declaration and initialization can be done outside the\
    \ statement, especially if we are interested in using the counter variable later\
    \ in the code and outside the statement. The code in Listing [7-20](#463938_3_En_7_Chapter.xhtml#PC21)\
    \ can be very well written as shown in Listing [7-22](#463938_3_En_7_Chapter.xhtml#PC23).\n\
    \n```\n    package com.apress.bgn.seven.forloop;\n    import static java.lang.System.out;\n\
    \    public class AnotherForLoopBasicDemo {\n    void main(){\n    int[] arr =\
    \ {5, 1, 4, 2, 3};\n    int i = 0;\n    for (; i < arr.length; ++i) {\n    out.println(\"\
    arr[\" +i +\"] = \" + arr[i]);\n    }\n    out.println(\"Loop exited with index:\
    \ \" + i);\n    }\n    }\n    Listing 7-22\n    The for Loop with Termination\
    \ Condition and Counter Modification Expression\n    ```\n\n*   `[condition]`:\
    \ The termination condition of the loop. As long as this condition is evaluated\
    \ to `true`, the loop will continue executing. The condition ends with `;` and,\
    \ funny enough, it is not mandatory either, as the termination condition can be\
    \ placed inside the code to be executed repeatedly by the loop. So the code in\
    \ Listing [7-22](#463938_3_En_7_Chapter.xhtml#PC23) can be modified further as\
    \ shown in Listing [7-23](#463938_3_En_7_Chapter.xhtml#PC24).\n\n```\n    package\
    \ com.apress.bgn.seven.forloop;\n    import static java.lang.System.out;\n   \
    \ public class AndAnotherForLoopDemo {\n    void main() {\n    int[] arr = {5,\
    \ 1, 4, 2, 3};\n    int i = 0;\n    for (; ; ++i) {\n    if (i >= arr.length)\
    \ {\n    break;\n    }\n    out.println(\"arr[\" +i +\"] = \" + arr[i]);\n   \
    \ }\n    out.println(\"Loop exited with index: \" + i);\n    }\n    }\n    Listing\
    \ 7-23\n    The for Loop with Only Counter Modification Statement\n    ```\n\n\
    *   `[step]`: The step expression, or increment, that increases the counter on\
    \ every step of the loop. Being the last term, it does not end in `;`. As you\
    \ probably already expected, it is not mandatory either, as nothing stops the\
    \ developer from manipulating the counter inside the code block. So the code in\
    \ Listing [7-23](#463938_3_En_7_Chapter.xhtml#PC24) can also be written as shown\
    \ in Listing [7-24](#463938_3_En_7_Chapter.xhtml#PC25).\n\n```\n    package com.apress.bgn.seven.forloop;\n\
    \    import static java.lang.System.out;\n    public class YeyAnotherForLoopDemo\
    \ {\n    void main() {\n    int[] arr = {5, 1, 4, 2, 3};\n    int i = 0;\n   \
    \ for (; ;) {\n    if (i >= arr.length) {\n    break;\n    }\n    out.println(\"\
    arr[\" +i +\"] = \" + arr[i]);\n    ++i;\n    }\n    out.println(\"Loop exited\
    \ with index: \" + i);\n    }\n    }\n    Listing 7-24\n    The for Loop with\
    \ No Initialization, Condition, or Counter Modification Expression\n    ```"
  trans: "\n### `switch` 的记录模式\n\nJDK 21 还引入了**记录模式**，除了常规的类型匹配和自动转换外，它还引入了解构记录的能力，如**第**\
    \ **6****章**所示。通过使用记录模式，不仅可以将记录类型用作 `switch` 语句和表达式的选项，而且这些选项可以是解构表达式。清单 7-19\
    \ 展示了一段代码，该代码展示了一个使用各种解构记录模式作为选项的 `switch` 表达式。\n\n```\npackage com.apress.bgn.seven.pattern;\n\
    import static java.lang.System.out;\nrecord FullName (String firstName, String\
    \ lastName){}\nrecord PersonRecord (FullName fullName, Integer age) {}\nrecord\
    \ WrapperBeing(T t, String description) {}\npublic class RecordPatternDemo {\n\
    void main(){\nObject obj = genRandomRecordInstance();\nswitch (obj) {\ncase null\
    \ -> out.println(\"no record\");\ncase FullName(String fn, String ln) -> out.println(\"\
    FullName record: \" + fn +\" \" + ln);\ncase PersonRecord(FullName(var fn, String\
    \ _), var age) -> out.println(\"Person record \" + fn +\"  of age \" + age);\n\
    default -> out.println(\"something else\");\n}\n}\npublic static Object genRandomRecordInstance(){\n\
    var t = System.currentTimeMillis();\nif (t % 3 == 0 ) {\nreturn new FullName(\"\
    John\", \"Doe\");\n} else if (t % 5 == 0 ) {\nreturn new PersonRecord(new FullName(\"\
    John\", \"Doe\"), 42);\n} else if (t % 11 == 0) {\nreturn new WrapperBeing(new\
    \ PersonRecord(new FullName(\"John\", \"Doe\"), 42), \"is mise\");\n}\nreturn\
    \ null;\n}\n}\n清单 7-19\n检查对象多个记录类型的 switch 语句\n```\n\n## 循环语句\n\n在编程中，有时我们需要重复执行涉及相同变量的步骤。为了完成任务而一遍又一遍地编写相同的语句是荒谬的。让我们以对整型数组进行排序为例。最流行的排序算法，也是编程课程中首先教授的算法，因为它简单，被称为*冒泡排序*。该算法将数组的元素两两比较，如果顺序不正确，则交换它们。它会一遍又一遍地遍历数组，直到不再需要交换为止。该算法的效果如图\
    \ 7-7 所示。\n\n![](img/463938_3_En_7_Fig7_HTML.jpg)\n\n图 7-7\n\n冒泡排序算法的阶段和效果\n\n\
    该算法执行两种类型的循环：一种使用索引遍历数组的每个元素。第二种重复此遍历过程，直到不需要交换为止。在 Java 中，可以使用不同的循环语句以多种方式编写此算法。但我们稍后会讲到；让我们慢慢来。\n\
    \nJava 中有三种类型的循环语句：\n\n*   `for` 语句\n\n*   `while` 语句\n\n*   `do-while` 语句\n\n\
    `for` 循环语句是最常用的，但 `while` 和 `do-while` 也有其用途。\n\n### **for** 语句\n\n`for` 语句推荐用于迭代可计数的对象，例如数组和集合。例如，遍历数组并打印其每个值，就像清单\
    \ 7-20 中描述的那样简单。\n\n```\npackage com.apress.bgn.seven.forloop;\nimport static\
    \ java.lang.System.out;\npublic class ForLoopBasicDemo {\nvoid main() {\nint[]\
    \ arr = {5, 1, 4, 2, 3};\nfor (int i = 0; i < arr.length; ++i) {\nout.println(\"\
    arr[\" +i +\"] = \" + arr[i]);\n}\n}\n}\n清单 7-20\n遍历数组的 for 语句\n```\n\n基于清单 7-20\
    \ 的示例，可以绘制出 `for` 语句的流程图，如图 7-8 所示。\n\n![](img/463938_3_En_7_Fig8_HTML.jpg)\n\n\
    图 7-8\n\n`for` 语句流程图\n\n清单 7-21 中的代码片段描述了 `for` 循环模板。\n\n```\nfor ([init_expr];\
    \ [condition];[step]){\n[code_block]\n}\n清单 7-21\nfor 循环模板\n```\n\n方括号中的每个术语都有特定的用途，如下表所述：\n\
    \n*   `[init_expr]`：初始化表达式，用于设置此循环使用的计数器的初始值。它以 `;` 结尾，并且不是强制性的，因为声明和初始化可以在语句外部完成，特别是如果我们希望在代码中稍后并在语句外部使用计数器变量。清单\
    \ 7-20 中的代码可以很好地写成清单 7-22 所示的形式。\n\n```\n    package com.apress.bgn.seven.forloop;\n\
    \    import static java.lang.System.out;\n    public class AnotherForLoopBasicDemo\
    \ {\n    void main(){\n    int[] arr = {5, 1, 4, 2, 3};\n    int i = 0;\n    for\
    \ (; i < arr.length; ++i) {\n    out.println(\"arr[\" +i +\"] = \" + arr[i]);\n\
    \    }\n    out.println(\"Loop exited with index: \" + i);\n    }\n    }\n   \
    \ 清单 7-22\n    带有终止条件和计数器修改表达式的 for 循环\n    ```\n\n*   `[condition]`：循环的终止条件。只要此条件求值为\
    \ `true`，循环就会继续执行。该条件以 `;` 结尾，有趣的是，它也不是强制性的，因为终止条件可以放在循环重复执行的代码内部。因此，清单 7-22 中的代码可以进一步修改，如清单\
    \ 7-23 所示。\n\n```\n    package com.apress.bgn.seven.forloop;\n    import static\
    \ java.lang.System.out;\n    public class AndAnotherForLoopDemo {\n    void main()\
    \ {\n    int[] arr = {5, 1, 4, 2, 3};\n    int i = 0;\n    for (; ; ++i) {\n \
    \   if (i >= arr.length) {\n    break;\n    }\n    out.println(\"arr[\" +i +\"\
    ] = \" + arr[i]);\n    }\n    out.println(\"Loop exited with index: \" + i);\n\
    \    }\n    }\n    清单 7-23\n    仅带有计数器修改语句的 for 循环\n    ```\n\n*   `[step]`：步进表达式或增量，在循环的每一步增加计数器。作为最后一个项，它不以\
    \ `;` 结尾。正如您可能已经预料到的，它也不是强制性的，因为没有什么能阻止开发人员在代码块内部操作计数器。因此，清单 7-23 中的代码也可以写成清单\
    \ 7-24 所示的形式。\n\n```\n    package com.apress.bgn.seven.forloop;\n    import static\
    \ java.lang.System.out;\n    public class YeyAnotherForLoopDemo {\n    void main()\
    \ {\n    int[] arr = {5, 1, 4, 2, 3};\n    int i = 0;\n    for (; ;) {\n    if\
    \ (i >= arr.length) {\n    break;\n    }\n    out.println(\"arr[\" +i +\"] = \"\
    \ + arr[i]);\n    ++i;\n    }\n    out.println(\"Loop exited with index: \" +\
    \ i);\n    }\n    }\n    清单 7-24\n    没有初始化、条件或计数器修改表达式的 for 循环\n    ```\n"
- fmt: "另一种发挥`for`循环创意的方式是将计数器的修改和终止条件合并为一个条件。清单[7-25](#463938_3_En_7_Chapter.xhtml#PC26)中的代码与本节迄今为止展示的所有示例具有相同的效果。\n\
    \n```\npackage com.apress.bgn.seven.forloop;\nimport static java.lang.System.out;\n\
    public class LastForLoopDemo {\npublic static void main(String... args) {\nint[]\
    \ arr = {5, 1, 4, 2, 3};\nint i = -1;\nfor (; i++ < arr.length -1;) {\nout.println(\"\
    arr[\" +i +\"] = \" + arr[i]);\n}\nout.println(\"Loop exited with index: \" +\
    \ i);\n}\n}\n```\n\n清单 7-25 —— 在终止条件中修改计数器的`for`循环\n\n另外请注意，步进表达式不一定必须是递增操作。它可以是任何修改计数器值的表达式。除了`++i`或`i++`，你还可以使用`i\
    \ = i + 1`或`i = i + 3`，甚至如果从较大索引向较小索引遍历数组或集合，也可以使用递减操作。\n\n> **注意**：任何能够将计数器保持在类型边界和集合边界内的数学运算都可以安全使用。\n\
    \n- `[code_block]`：一个代码块，在循环的每一步中重复执行。如果此代码块内没有退出条件，则该代码块将执行与计数器通过终止条件次数相同的次数。\n\
    \n> **重要**：当代码块只包含一条语句时，花括号不是必需的，但大多数开发者为了代码清晰并帮助IDE正确缩进代码，仍会保留花括号。\n\n> **警告**：如前所述，初始化表达式、终止条件和迭代表达式都是可选的，这意味着以下是一个有效的`for`语句：\n\
    > \n> ```\n> for ( ; ; ) {\n>     // 语句在这里\n> }\n> ```\n\n> **注意**：使用这种形式的`for`语句时要小心。代码块必须包含一个终止条件，以避免出现*无限循环*。\n\
    \n这是`for`循环语句的基本形式，但在Java中还有其他遍历一组值的方法。假设我们需要遍历一个列表而不是数组，如清单[7-26](#463938_3_En_7_Chapter.xhtml#PC27)所示。\n\
    \n```\npackage com.apress.bgn.seven.forloop;\nimport java.util.List;\nimport static\
    \ java.lang.System.out;\npublic class ListLoopDemo {\nvoid main() {\nvar list\
    \ = List.of(5, 1, 4, 2, 3);\nfor (int j = 0; j < list.size(); ++j) {\nout.println(\"\
    list[ \" +j +\"] = \" + list.get(j));\n}\n}\n}\n```\n\n清单 7-26 —— 遍历列表的`for`循环\n\
    \n清单[7-26](#463938_3_En_7_Chapter.xhtml#PC27)中的代码由于多次调用列表方法而显得有些不实用，这就是为什么`List<E>`实例可以用另一种类型的`for`语句来遍历，这种语句在Java\
    \ 8之前被称为`forEach`。你马上就会明白原因，但首先让我们在清单[7-27](#463938_3_En_7_Chapter.xhtml#PC28)中看看`forEach`的实际应用。\n\
    \n```\npackage com.apress.bgn.seven.forloop;\nimport java.util.List;\nimport static\
    \ java.lang.System.out;\npublic class ForEachLoopDemo {\nvoid main() {\nvar list\
    \ = List.of(5, 1, 4, 2, 3);\nfor (Integer item : list) {\nout.println(item);\n\
    }\n}\n}\n```\n\n清单 7-27 —— 遍历列表的`forEach`循环\n\n这种类型的`for`语句也被称为具有增强语法，它对其表达式中使用的集合中的每个项执行代码块。这意味着它适用于任何`Collection<E>`接口的实现，也适用于数组。因此，到目前为止展示的代码示例也可以写成清单[7-28](#463938_3_En_7_Chapter.xhtml#PC29)中的形式。\n\
    \n```\npackage com.apress.bgn.seven.forloop;\nimport static java.lang.System.out;\n\
    public class ArrayForEachDemo {\nvoid main(){\nint[] arr = {5, 1, 4, 2, 3};\n\
    for (int item : arr) {\nout.println(item);\n}\n}\n}\n```\n\n清单 7-28 —— 遍历数组的`forEach`循环\n\
    \n显然，在这种情况下，最大的好处是我们不再需要终止条件或计数器。从Java 8开始，`forEach`这个名称不能再用于具有增强语法的`for`语句，因为`forEach`默认方法已被添加到所有`Collection<E>`实现中，所以现在它被称为“增强型`for`”。将`forEach`默认方法与lambda表达式结合，打印列表元素的代码就变成了清单[7-29](#463938_3_En_7_Chapter.xhtml#PC30)中的样子。\n\
    \n```\npackage com.apress.bgn.seven.forloop;\nimport java.util.List;\nimport static\
    \ java.lang.System.out;\npublic class ForLoopDemo {\nvoid main(){\nvar list =\
    \ List.of(5, 1, 4, 2, 3);\nlist.forEach(item -> out.println(item));\n// 或者使用方法引用\n\
    list.forEach(out::println);\n}\n}\n```\n\n清单 7-29 —— 使用`forEach`方法遍历列表\n\n很简洁，对吧？但等等，还有更多：它同样适用于数组，但首先需要将数组转换为合适的`java.util.stream.BaseStream`实现。这由`Arrays`工具类提供，该类在Java\
    \ 8中得到了增强，增加了支持lambda表达式的方法。因此，到目前为止使用`arr`数组编写的代码从Java 8开始可以写成清单[7-30](#463938_3_En_7_Chapter.xhtml#PC31)中的形式。\n\
    \n```\npackage com.apress.bgn.seven.forloop;\nimport static java.lang.System.out;\n\
    public class ForLoopDemo {\nvoid main(){\nint[] arr = {5, 1, 4, 2, 3};\nArrays.stream(arr).forEach(out::println);\n\
    }\n}\n```\n\n清单 7-30 —— 使用`forEach`方法遍历数组\n\n另一种不使用索引变量遍历数组的方法是使用`java.util.stream.IntStream.range(..)`，如清单[7-31](#463938_3_En_7_Chapter.xhtml#PC32)所示。`range(startInclusive,\
    \ endExclusive)`方法返回一个从`startInclusive`（包含）到`endExclusive`（不包含）的顺序有序`IntStream`，步长为1。\n\
    \n```\npackage com.apress.bgn.seven.forloop;\nimport java.util.stream.IntStream;\n\
    import static java.lang.System.out;\npublic class ForLoopDemo {\nvoid main(){\n\
    int[] arr = {5, 1, 4, 2, 3};\nIntStream.range(0, arr.length).forEach(out::println);\n\
    }\n}\n```\n\n清单 7-31 —— 使用`IntStream.range(startInclusive, endExclusive)`遍历数组\n\
    \n在Java 21中，上述所有示例都能正常编译和执行，因此在编写解决方案时，你可以使用自己最喜欢的语法。"
  raw: 'Another way to get creative with the `for` loop is to merge the modification
    of the counter and termination condition into a single condition. The code depicted
    in Listing [7-25](#463938_3_En_7_Chapter.xhtml#PC26) has the same effect as all
    examples shown so far in this section.


    ```

    package com.apress.bgn.seven.forloop;

    import static java.lang.System.out;

    public class LastForLoopDemo {

    public static void main(String... args) {

    int[] arr = {5, 1, 4, 2, 3};

    int i = -1;

    for (; i++ < arr.length -1;) {

    out.println("arr[" +i +"] = " + arr[i]);

    }

    out.println("Loop exited with index: " + i);

    }

    }

    Listing 7-25

    The for Loop with Counter Modification in Termination Condition

    ```


    Also note that the step expression does not really have to be an incrementation.
    It can be any expression that modifies the value of the counter. Instead of `++i`
    or `i++`, you can use `i= i+1` or `i=i+3`, or even decrementation if the array
    or collection is traversed starting with a bigger index toward a lower one.


    Note


    Any mathematical operations that keep the counter within the boundaries of the
    type and within the collection boundaries can be used safely.


    *   `[code_block]`: A block of code that is executed repeatedly, in every step
    of the loop. If there is no exit condition within this code, this block of code
    will be executed as many times as the counter passes the termination condition.


    Important


    When the code block contains a single statement, the curly brackets are not mandatory,
    but most developers keep them for code clarity and to help IDEs indent the code
    properly.


    Warning


    As mentioned, the initialization expression, the termination condition, and the
    iteration expression are optional, which means the following is a valid `for`
    statement:


    `for` `( ; ; ) {`


    `\\` `statement(``s``)` `here`


    `}`


    Caution


    Just be careful when using the `for` statement like that. The code block must
    contain a termination condition to avoid an *infinite loop*.


    This is the basic form of the `for` looping statement, but in Java there are other
    ways to iterate a group of values. Let’s say that instead of an array we have
    to iterate over a list, as depicted in Listing [7-26](#463938_3_En_7_Chapter.xhtml#PC27).


    ```

    package com.apress.bgn.seven.forloop;

    import java.util.List;

    import static java.lang.System.out;

    public class ListLoopDemo {

    void main() {

    var list = List.of(5, 1, 4, 2, 3);

    for (int j = 0; j < list.size(); ++j) {

    out.println("list[ " +j +"] = " + list.get(j));

    }

    }

    }

    Listing 7-26

    The for Loop over a list

    ```


    The code in Listing [7-26](#463938_3_En_7_Chapter.xhtml#PC27) seems somehow impractical
    because of the multiple invocations of list methods, which is why `List<E>` instances
    can be traversed with a different type of `for` statement that was known as `forEach`
    until Java 8. You will see immediately why, but first let’s see the `forEach`
    in action in Listing [7-27](#463938_3_En_7_Chapter.xhtml#PC28).


    ```

    package com.apress.bgn.seven.forloop;

    import java.util.List;

    import static java.lang.System.out;

    public class ForEachLoopDemo {

    void main() {

    var list = List.of(5, 1, 4, 2, 3);

    for (Integer item : list) {

    out.println(item);

    }

    }

    }

    Listing 7-27

    The forEach Loop over a List

    ```


    This type of `for` statement is also referenced as having enhanced syntax and
    executes the code block for each item in the collection used in its expression.
    This means that it works on any implementation of the `Collection<E>` interface,
    and it works on arrays too. So the code examples presented until now can also
    be written as depicted in Listing [7-28](#463938_3_En_7_Chapter.xhtml#PC29).


    ```

    package com.apress.bgn.seven.forloop;

    import static java.lang.System.out;

    public class ArrayForEachDemo {

    void main(){

    int[] arr = {5, 1, 4, 2, 3};

    for (int item : arr) {

    out.println(item);

    }

    }

    }

    Listing 7-28

    The forEach Loop over an Array

    ```


    Clearly the best part in this case is that we no longer need a termination condition
    or counter at all. Starting with Java 8, the name `forEach` can no longer be used
    for the `for` statement with enhanced syntax, because the `forEach` default method
    was added to all `Collection<E>` implementations, so now it is just being called
    “enhanced for”. Combine the `forEach` default method with lambda expressions,
    and the code to print the elements of a list becomes the one in Listing [7-29](#463938_3_En_7_Chapter.xhtml#PC30).


    ```

    package com.apress.bgn.seven.forloop;

    import java.util.List;

    import static java.lang.System.out;

    public class ForLoopDemo {

    void main(){

    var list = List.of(5, 1, 4, 2, 3);

    list.forEach(item -> out.println(item));

    //or using method reference

    list.forEach(out::println);

    }

    }

    Listing 7-29

    The forEach Method Used to Loop over a List

    ```


    Pretty neat, right? But wait, there’s more: it works on arrays too, but a small
    conversion to a suitable implementation of `java.util.stream.BaseStream` is necessary
    first. This is provided by the `Arrays` utility class, which was enriched in Java
    8 with methods to support lambda expressions. So the code with the `arr` array
    written so far can be written starting in Java 8 as shown in Listing [7-30](#463938_3_En_7_Chapter.xhtml#PC31).


    ```

    package com.apress.bgn.seven.forloop;

    import static java.lang.System.out;

    public class ForLoopDemo {

    void main(){

    int[] arr = {5, 1, 4, 2, 3};

    Arrays.stream(arr).forEach(out::println);

    }

    }

    Listing 7-30

    The forEach Method Used to Loop over an Array

    ```


    Another way to traverse an array without using an index variable is by using `java.util.stream.IntStream.range(..)`,
    as shown in Listing [7-31](#463938_3_En_7_Chapter.xhtml#PC32). The `range(startInclusive,
    endExclusive)` method returns a sequential ordered `IntStream` from `startInclusive`
    (inclusive) to `endExclusive` (exclusive) by an incremental step of 1.


    ```

    package com.apress.bgn.seven.forloop;

    import java.util.stream.IntStream;

    import static java.lang.System.out;

    public class ForLoopDemo {

    void main(){

    int[] arr = {5, 1, 4, 2, 3};

    IntStream.range(0, arr.length).forEach(out::println);

    }

    }

    Listing 7-31

    Loop over an Array Using IntStream.range(startInclusive, endExclusive)

    ```


    In Java 21, all the preceding examples will compile and execute just fine, so
    use whatever syntax you prefer most when writing your solutions.'
