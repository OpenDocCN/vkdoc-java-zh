  trans: '

    ## Lambda 表达式


    Lambda 表达式同样在 Java 8 中被引入，它们提供了一种从 Groovy 和 Ruby 等语言借鉴而来的紧凑且实用的代码编写方式。清单 4-55
    展示了 `@FunctionalInterface` 的声明。


    ```

    package java.lang;

    import java.lang.annotation.*;

    /**

    * 文档已省略

    */

    @Documented

    @Retention(RetentionPolicy.RUNTIME)

    @Target(ElementType.TYPE)

    public @interface FunctionalInterface {

    }

    清单 4-55

    JDK 的 @FunctionalInterface 声明

    ```


    **函数式接口**是声明了单个抽象方法的接口。作为接口中唯一的方法，其实现可以当场提供，无需创建类来定义具体实现。想象以下场景：我们创建了一个名为 `Operation`
    的接口，其中包含一个方法。我们可以通过创建一个名为 `Addition` 的类来提供该接口的实现，或者使用 lambda 表达式当场实现。清单 4-56 展示了
    `Operation` 接口、`Addition` 类以及一个名为 `OperationDemo` 的类，演示了在 `main(..)` 方法中声明并使用当场实现的过程。


    ```

    package com.apress.bgn.four.lambda;

    @FunctionalInterface

    interface Operation {

    int execute(int a, int b);

    }

    class Addition implements Operation {

    @Override

    public int execute(int a, int b) {

    return a + b;

    }

    }

    public class OperationDemo {

    public static void main(String... args) {

    // 使用 Addition 类

    Addition addition = new Addition();

    int result = addition.execute(2, 5);

    System.out.println("结果是 " + result);

    // 使用 Lambda 表达式当场实现

    Operation addition2 = (a, b) -> a + b;

    int result2 = addition2.execute(2, 5);

    System.out.println("Lambda 结果是 " + result2);

    }

    }

    清单 4-56

    显式接口实现与 Lambda 表达式对比

    ```


    通过使用 lambda 表达式，不再需要 `Addition` 类，这使得代码更少、更易读。Lambda 表达式可用于许多场景，在本书后续内容中，只要能用它们以更实用的方式编写代码，我们都会进行介绍。


    注意


    `Operation` 实例可以被 `Integer::sum` 替代，这是一种称为方法引用的结构，同样在 Java 8 中引入。顾名思义，这是对 `Integer`
    类中 `sum` 方法的引用，该方法也是在 Java 8 中引入的。


    ## 异常


    异常是特殊的 Java 类，用于拦截程序执行过程中的意外情况，使开发者能够根据编译器警告的异常类型或 JVM 在运行时生成的异常类型，实施适当的处理措施。这些类组织成一个层次结构，如图
    4-15 所示。`Throwable` 是用于表示 Java 应用程序中意外情况的类层次结构的根类。


    ![](img/463938_3_En_4_Fig15_HTML.jpg)


    图 4-15


    Java 异常层次结构


    Java 应用程序中的异常情况可能由多种原因引起，以下是一些常见原因：


    *   编写代码时的人为错误


    *   硬件问题（尝试从损坏的数据磁盘读取文件）


    *   资源缺失（尝试读取不存在的文件）


    警告


    粗心的开发者在不确定时，往往会编写总是捕获 Throwable 的代码。显然，你应该尽量避免这样做，因为 `Error` 类（`Throwable` 的子类）用于通知开发者系统无法恢复的情况已经发生。


    让我们从一个简单的例子开始。清单 4-57 定义了一个调用自身的方法（其技术名称为**递归**），但为了演示目的，它被设计成无限调用自身，导致 JVM 耗尽内存。


    ```

    package com.apress.bgn.four.exceptions;

    public class ExceptionsDemo {

    // 错误的方法

    static int rec(int i) {

    return rec(i * i);

    }

    public static void main(String... args) {

    rec(1000);

    System.out.println("全部完成。");

    }

    }

    清单 4-57

    错误的递归方法

    ```


    如果我们运行 `ExceptionsDemo` 类，*全部完成* 不会被打印出来。相反，程序会因抛出 `StackOverflowError` 而异常终止，并指出问题所在的行（本例中是递归方法调用自身的行）。输出如清单
    4-58 所示。


    ```

    Exception in thread "main" java.lang.StackOverflowError at chapter.four@3.0-SNAPSHOT/com.apress.bgn.four.exceptions.ExceptionsDemo.rec(ExceptionsDemo.java:36)

    at chapter.four@3.0-SNAPSHOT/com.apress.bgn.four.exceptions.ExceptionsDemo.rec(ExceptionsDemo.java:36)

    ...

    清单 4-58

    ExceptionsDemo 执行的控制台输出

    ```


    `StackOverflowError` 间接是 `Error` 的子类，显然是由被调用的有缺陷的递归方法引起的。当然，我们可以修改代码来处理这种异常情况，并执行接下来必须执行的操作，如清单
    4-59 所示。


    ```

    package com.apress.bgn.four.exceptions;

    public class ExceptionsDemo {

    // 其他代码已省略

    public static void main(String... args) {

    try {

    rec(1000);

    } catch (Throwable r) {

    }

    System.out.println("全部完成。");

    }

    }

    清单 4-59

    另一个错误的递归方法

    ```


    在控制台中只打印了 *全部完成* 消息，没有错误的任何踪迹。这是意料之中的，因为我们捕获了它并决定不打印任何相关信息。


    停止


    这是一种称为**异常吞噬**的不良实践——永远不要这样做！


    此外，系统不应从此类情况中恢复，因为在抛出 `Error` 后任何操作的结果都是不可靠的。


    停止


    这就是为什么捕获 `Throwable` 是一种非常糟糕的实践！


    `Exception` 类是所有可被捕获和处理、系统可从中恢复的异常的超类。任何 `Exception` 类中不属于 `RuntimeException`
    子类的子类都是**受检异常**。这些类型的异常在编译时已知，因为它们属于方法声明的一部分。任何声明抛出受检异常的方法，在代码中使用时，要么强制将异常进一步传播，要么要求开发者编写代码来处理该异常。

