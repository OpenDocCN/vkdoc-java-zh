    `DatagramChannel` 可以通过 UDP 在网络中读写数据。`SocketChannel` 可以通过 TCP 在网络中读写数据，而 `ServerSocketChannel`
    允许你监听传入的 TCP 连接，就像 Web 服务器一样。对于每个传入的连接，都会创建一个 `SocketChannel`。


    引入 Java NIO 组件（接口和类）是为了补充现有的 Java IO 功能。Java IO 一次读取或写入一个字节或字符。缓冲会使用 Java 堆内存，当处理大文件时，这可能会成为问题。当
    Java NIO 发布时，Oracle 曾声明 NIO 比纯 Java I/O 更高效、性能更好，但这完全取决于你正在构建的应用程序。Java NIO 引入了批量处理原始字节的可能性、异步操作的可能性以及堆外缓冲。缓冲区在
    JVM 主内存之外创建，位于不受垃圾回收器管理的内存区域中。这允许创建更大的缓冲区，因此可以读取更大的文件，而不会因为 JVM 内存不足而抛出 `OutOfMemoryException`
    的风险。


    如果你发现自己需要处理大量数据，请务必仔细阅读 JDK NIO 文档，因为本节只是浅尝辄止。


    ## 序列化与反序列化


    *序列化*是指将对象的状态转换为字节序列的操作。以这种格式，它可以通过网络发送或写入文件，并还原为该对象的副本。将字节序列转换回对象的操作称为*反序列化*。Java
    序列化一直是一个有争议的话题，Java 平台首席架构师 Mark Reinhold 将其描述为 1997 年犯下的一个可怕错误。显然，大多数 Java 漏洞在某种程度上都与
    Java 中序列化的实现方式有关，并且有一个名为 Project Amber^(¹⁰⁷) 的项目致力于完全移除 Java 序列化，并允许开发者选择他们喜欢的格式进行序列化。

