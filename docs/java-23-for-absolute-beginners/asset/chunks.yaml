  trans: "\n# 8. Stream API\n\n名词 *stream* 不止一个含义，正如 [Dictionary.​com](http://dictionary.com)\
    \ 所定义的：\n\n1.  在河道或水道中流动的水体，如河流、小溪或溪流\n2.  水中稳定的水流，如河流或海洋中的水流\n3.  水或其他液体或流体的任何流动\n\
    4.  空气、气体等的气流或流动\n5.  一束或一道光线\n6.  任何事物的连续流动或接续\n7.  主导方向；趋势\n8.  *数字技术*\n   \
    \ 1.  数据流，如音频广播、电影或实时视频，从源端平稳连续地传输到计算机、移动设备等。\n    2.  直播\n\n在编程语境下，*stream* 一词最接近上述定义中的第\
    \ 6 条和第 8a 条。实际上，在编程中，流（stream）是来自某个源、支持聚合操作（即累加流中所有值的操作）的对象序列。你可能会想，更合适的术语应该是*集合*。嗯……不完全对。本章将阐明两者的区别。\n\
    \n## Stream 简介\n\n假设我们有一个非常大的歌曲集合，想要分析并找出所有时长至少为 300 秒的歌曲。对于这些歌曲，我们希望将名称保存到一个列表中，并按时长降序排序。假设我们已经将歌曲存储在一个列表中，代码如清单\
    \ 8-1 所示。\n\n```\n// 省略非相关代码\nList songList = loadSongs();\nList resultedSongs\
    \ = new ArrayList();\n// 找出所有时长至少为 300 秒的歌曲\nfor (Song song: songList) {\nif (song.getDuration()\
    \ >= 300) {\nresultedSongs.add(song);\n}\n}\nCollections.sort(resultedSongs, new\
    \ Comparator(){\npublic int compare(Song s1, Song s2){\nreturn s2.getDuration().compareTo(s1.getDuration());\n\
    }\n});\nSystem.out.println(resultedSongs);\nList finalList0 = new ArrayList();\n\
    for (Song song: resultedSongs) {\nfinalList0.add(song.getTitle()); // 只需要歌曲标题\n\
    }\nSystem.out.println(\"Java 8 之前: \" + finalList0);\n清单 8-1\n由若干语句组成的 Java 代码\n\
    ```\n\n这段代码的一个问题是处理大型集合时效率不高。此外，我们反复遍历列表并执行检查才能得到最终结果。如果能够对每个元素逐一执行所有这些操作，而无需重复遍历，效率会不会更高？答案是肯定的，从\
    \ Java 8 开始，这已经成为可能。\n\nJava 8 引入的新的 **Stream** 抽象表示一个元素序列，可以顺序或并行处理，并支持聚合操作。由于硬件的最新发展，CPU\
    \ 变得更加强大和复杂，包含多个可以并行处理信息的内核。为了利用这些硬件能力，Java 引入了 Fork Join 框架。而在 Java 8 中，引入了 Stream\
    \ API 来支持并行数据处理，无需编写定义和同步线程的样板代码。\n\nStream API 的核心接口是 `java.util.stream.BaseStream`。任何具有流能力的对象都是扩展了此接口的类型。流本身不存储元素，因为它不是数据结构；它仅用于计算元素，并按需提供给某个操作或一组聚合操作。\n\
    \n*聚合操作*是 Stream API 中的特殊方法，具有以下特征：\n\n*   支持行为作为参数。大多数聚合操作支持 lambda 表达式作为参数。\n\
    *   使用内部迭代。内部迭代不会顺序遍历元素，从而利用并行计算的优势。内部迭代将问题分解为子问题，同时解决它们，然后合并结果。\n*   处理来自流的元素，而不是直接来自流的源头。\n\
    \n按顺序提供元素涉及内部自动迭代。返回流的操作可以链接成一个管道，称为**中间操作**。操作处理流中的元素，并将结果作为流返回给管道中的下一个操作。返回非流结果的操作称为**终端操作**，通常位于管道的末端。在深入使用流之前，先看一个快速示例：清单\
    \ 8-1 中的代码被重写为清单 8-2 所示，这被称为**流管道**。\n\n```\nList finalList = songList.stream()\n\
    .filter(s -> s.getDuration() >= 300)\n.sorted(Comparator.comparing(Song::getDuration).reversed())\n\
    .map(Song::getTitle)\n.collect(Collectors.toList());\nSystem.out.println(finalList);\n\
    清单 8-2\n使用 Stream 重写清单 8-1 中的代码\n```\n"
- fmt: '# 使用 Stream 进行函数式编程


    是的，使用流进行编程非常棒，既富有表现力又高效。`Stream API` 的概念允许开发者将集合转换为流，编写代码并行处理数据，然后将结果放入新的集合中。


    使用流是一种相当敏感的编程方式，建议在设计代码时考虑到每一种可能性。`NullPointerException` 是 Java 中最常抛出的异常之一。


    在 Java 8 中，引入了`Optional<T>`类来避免此类异常。`Stream<E>`实例用于存储类型`T`的无限实例，而`Optional<T>`是一个可能包含也可能不包含类型`T`实例的实例。由于这两种实现基本上都是其他类型的包装器，因此将一起介绍它们。


    **注意**


    出于实际原因，本章将`Stream<E>`实例称为**流**，类似于将`List<E>`实例称为**列表**、将`Collection<E>`实例称为**集合**等。


    **重要**


    您可能会注意到引入了术语**函数**，并用于指代作为参数提供给流操作的行为。这是因为使用流允许以*函数式编程*风格编写 Java 代码。正如本书开头所述，Java
    是一种面向对象编程（OOP）语言，对象是其核心术语。在函数式编程中，核心术语是**纯函数**，代码通过组合纯函数来编写，这允许程序员避免共享状态，利用不可变数据，从而避免处理污染的副作用。


    **提示**


    如果您想了解更多关于 Java 中函数式编程的知识，有不少好书可以参考^([^(64)](#fn64))，但如果您想将其作为一种编程范式来学习，我乐意推荐您查看这篇^([^(65)](#fn65))博客文章。


    *纯函数*是数学函数的软件模拟，并具有以下属性：


    *   纯函数对于相同的参数返回相同的值。实现不涉及任何随机值或可能导致相同参数返回不同值的非最终全局变量。纯函数必须产生一致的结果。

    *   函数的返回值仅取决于传递给函数的输入参数。

    *   纯函数没有副作用（不改变局部静态变量、非局部变量、可变引用参数或输入/输出流）。


    流、纯函数和 lambda 表达式的结合有助于编写 Java **声明式代码**。在本章中，我们摒弃了典型的面向对象**命令式编码风格**（其中算法的每一步都依次声明，流程由`boolean`条件控制）。相反，我们开始设计应用于流元素的纯函数链。


    ## 创建流


    在享受使用流优化代码的乐趣之前，让我们看看如何创建它们。要创建流，我们显然需要一个**源**。该源可以是任何东西：一个集合（列表、集合或映射）、一个数组，或用作输入的
    I/O 资源（例如文件、数据库或任何可以转换为实例序列的东西）。


    **重要**


    流不会修改其源，因此可以从同一源创建多个流实例并用于不同的操作。


    集合和流之间最大的区别在于，流发出的元素会被操作消耗，因此流不能多次使用。然而，清单 [8-3](#463938_3_En_8_Chapter.xhtml#PC3)
    中的错误代码是被 Java 编译器接受的。


    ```

    int[] arr = { 50, 10, 250, 100};

    IntStream intStream = Arrays.stream(arr);

    intStream.forEach(System.out::println);

    intStream.forEach(System.out::println);

    Listing 8-3

    Bad Code: Attempting to Reuse a Stream

    ```


    然而，当我们第二次尝试遍历流时，会在运行时抛出`IllegalStateException`：


    ```

    Streams cannot be recycled: stream has already been operated upon or closed

    java.lang.IllegalStateException: stream has already been operated upon or closed

    at java.base/java.util.stream.AbstractPipeline.sourceStageSpliterator(AbstractPipeline.java:311)

    at java.base/java.util.stream.IntPipeline$Head.forEach(IntPipeline.java:617)

    at chapter.eigth/com.apress.bgn.eight.StreamRecyclingDemo.main(StreamRecyclingDemo.java:45)

    ```


    因此，如果您需要两次处理流的元素，则必须再次从源重新创建它。'
  raw: 'Yes, programming with streams is awesome, both expressive and efficient. The
    *Stream API* concept allows developers to transform collections into streams,
    write code to process the data in parallel, and then get the results into a new
    collection.


    Working with streams is quite a sensitive way of programming, and it is recommended
    to design the code taking every possibility in mind. `NullPointerException` is
    one of the most common exceptions to be thrown in Java.


    In Java 8, the class `Optional<T>` was introduced to avoid this type of exception.
    `Stream<E>` instances are used to store an infinite instance of type `T`, while
    `Optional<T>` is an instance that might or might not contain an instance of type
    `T`. Because both of these implementations are basically wrappers for other types,
    they will be covered together.


    Note


    For practical reasons, this chapter refers to `Stream<E>` instances as **streams**,
    in a similar manner that `List<E>` instances are referred to as **lists**, `Collection<E>`
    instances as **collections**, and many more.


    Important


    You might notice that the term **function** was introduced and is used to refer
    to the behavior provided as an argument to stream operations. This is because
    working with streams allows for Java code to be written in *functional programming*
    style. As mentioned at the beginning of this book, Java is an object-oriented
    programming (OOP) language, and the object is its core term. In functional programming
    the core term is **pure function** and code is written by composing pure functions,
    which allows programmers to avoid shared state, take advantage of immutable data,
    and thus avoid side effects of processing contamination.


    Tip


    If you want to learn more about functional programming in Java, there are quite
    a few good books about it^([^(64)](#fn64)), but if you want to learn more about
    it as a programming paradigm, I gladly recommend you to check out this^([^(65)](#fn65))
    blog entry.


    *Pure functions* are software analogues of mathematical functions and have the
    following properties:


    *   Pure functions return identical values for identical arguments. The implementation
    does not involve any random value, or non-final global variables that might cause
    a different value to be returned for the same arguments. Pure functions must produce
    consistent results.


    *   The return value of the function depends only on the input parameters passed
    to the function.


    *   Pure functions have no side effects (no mutation of local static variables,
    non-local variables, mutable reference arguments, or input/output streams).


    The combination of streams, pure functions, and lambda expressions facilitates
    writing Java **declarative code**. In this chapter we leave behind the typical
    object-oriented **imperative coding style**, where each step of the algorithm
    is declared one after the other and the flow is controlled by `boolean` conditions.
    Instead, we start designing the chain of pure functions applied to elements of
    streams.


    ## Creating Streams


    Before having fun and optimizing our code using streams, let’s see how we can
    create them. To create a stream we obviously need a **source**. That source can
    be anything: a collection (list, set, or map), an array, or I/O resources used
    as input (such as files, databases, or anything that can be transformed into a
    sequence of instances).


    Important


    A stream does not modify its source, so multiple stream instances can be created
    from the same source and used for different operations.


    The biggest difference between collections and streams is that the elements emitted
    by the stream are consumed by the operations and thus the stream cannot be used
    more than once. However, the bad code in Listing [8-3](#463938_3_En_8_Chapter.xhtml#PC3)
    is accepted by the Java compiler.


    ```

    int[] arr = { 50, 10, 250, 100};

    IntStream intStream = Arrays.stream(arr);

    intStream.forEach(System.out::println);

    intStream.forEach(System.out::println);

    Listing 8-3

    Bad Code: Attempting to Reuse a Stream

    ```


    However, an `IllegalStateException` is thrown at runtime when we try traversing
    the stream a second time:


    ```

    Streams cannot be recycled: stream has already been operated upon or closed

    java.lang.IllegalStateException: stream has already been operated upon or closed

    at java.base/java.util.stream.AbstractPipeline.sourceStageSpliterator(AbstractPipeline.java:311)

    at java.base/java.util.stream.IntPipeline$Head.forEach(IntPipeline.java:617)

    at chapter.eigth/com.apress.bgn.eight.StreamRecyclingDemo.main(StreamRecyclingDemo.java:45)

    ```


    So if you need to process the elements of a stream twice, you have to re-create
    it from the source again.'
