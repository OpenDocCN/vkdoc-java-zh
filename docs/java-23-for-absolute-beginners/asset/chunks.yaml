    The `executeQuery(..)` method executes the given SQL statement and returns a single
    `ResultSet` object. This method allows us to check that the user was created,
    by inspecting the contents of the MySQL `user` table.


    Besides the methods listed here, the `Statement` interface provides a few other
    utility methods. None of them, however, help with converting a `ResultSet` into
    a `Singer` instance, so mapping SQL table rows to Java objects is not possible
    with JDBC. JDBC is simplistic and efficient, and it is secure and platform-independent;
    the one thing it is not known for is being friendly to developers.


    ## Summary


    This chapter has covered most of the details you need to know to be able to work
    with various types of files, how to serialize Java objects and save them to a
    file, and how to then recover them through deserialization. When writing Java
    applications, you will most likely need to save data to files or read data from
    files, and this chapter provides quite a wide list of components to do so. This
    is a short summary of what you learned how to do in this chapter:


    *   Use `File` and `Path` instances


    *   Use utility methods in java.nio.file.Files and java.nio.file.Paths


    *   Serialize/deserialize Java objects to/from binary, XML, and JSON


    *   Resize and modify images using the Java Media API


    *   Use images in JavaFX applications


    *   Execute SQL DDL and DML statements using JDBC


