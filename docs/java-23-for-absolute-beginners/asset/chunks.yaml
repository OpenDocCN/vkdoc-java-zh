- fmt: '### Structured Concurrency


    In Java 19, through JEP 428^([^(58)](#fn58)), a new API for simplifying concurrent
    programming was introduced. This API simplifies multithreaded programming for
    **structured concurrency**. The work continued in Java 21^([^(59)](#fn59)), Java
    22, and Java 23 (JEP [`https://openjdk.org/jeps/480`](https://openjdk.org/jeps/480)),
    but when this chapter is being written, this is still a preview feature.


    Structured concurrency treats multiple tasks running in different threads as a
    single unit of work, thereby streamlining error handling and cancellation, improving
    reliability, and enhancing observability. The simplest way to explain structured
    concurrency is to compare it to typical methods’ invocation. If method A invokes
    method B, then the execution of method B must finish before the execution of method
    A can continue, but both methods execute in the same thread. Structured concurrency
    means having the same behavior for virtual threads: if virtual thread A creates
    virtual thread B, the execution of thread B should take place within the execution
    time of thread A. Structured concurrency brings an order to thread execution,
    a way to create dependency relationships between virtual threads’ executions using
    readable code that hides the complexity of concurrency and synchronization.


    The main class of the structured concurrency API is `StructuredTaskScope<T>` in
    the `java.util.concurrent` package. This class enables you to coordinate a group
    of concurrent subtasks as a unit. Out of the box, in Java there are two extensions
    of this class, `ShutdownOnSuccess<T>` and `ShutdownOnFailure`, both of which are
    declared as static nested in the `StructuredTaskScope<T>` body, but developers
    can write their own versions by extending this class.


    The `ShutdownOnSuccess<T>` instance is suitable for situations in which the success
    of at least one subtask in a task set is enough to consider the execution a success.
    This is also known as the **invoke any** pattern. The `ShutdownOnSuccess<T>` instance
    captures the result of the first subtask **to complete successfully**, then it
    invokes the `shutdown()` method to interrupt unfinished threads and wake up the
    owner.


    Listing [5-58](#463938_3_En_5_Chapter.xhtml#PC97) shows how to use `ShutdownOnSuccess<T>`
    to generate a random `Integer` value using two subtasks: one that uses a generator
    and one that returns a constant. This approach ensures that one subtask will most
    likely be dropped.


    ```

    package com.apress.bgn.five;

    import com.apress.bgn.four.classes.DataGenerator;

    import java.time.Duration;

    import java.time.Instant;

    import java.util.concurrent.ExecutionException;

    import static java.util.concurrent.StructuredTaskScope.*;

    import static java.lang.System.out;

    public class StructuredConcurrencyDemoOne {

    void main() {

    var start = Instant.now();

    try (var scope = new ShutdownOnSuccess()) {

    Subtask task1 = scope.fork(() -> DataGenerator.genInt());

    Subtask task2 =  scope.fork(() -> 2);

    scope.join();

    out.println("task1: " + task1.state() + ", result : " + (task1.state() == Subtask.State.SUCCESS
    ? task1.get() : "Not Available")  +

    "\ntask2: " + task2.state()+ ",  result : " + (task2.state() == Subtask.State.SUCCESS
    ? task2.get() : "Not Available")

    );

    out.println("Execution time : " + Duration.between(start, Instant.now()).toMillis()
    + " ms");

    out.println("Task result: " + scope.result());

    } catch (InterruptedException | ExecutionException e) {

    throw new RuntimeException(e);

    }

    }

    }

    // output

    /*

    task1: UNAVAILABLE, result : Not Available

    task2: SUCCESS, result : 2

    Execution time : 30ms

    Task result: 2

    */

    Listing 5-58

    Simple Example of ShutdownOnSuccess Task Usage

    ```


    The `join()` method waits for a subtask started in this task scope to complete
    successfully, and it stops waiting when one of the following happens:


    - All threads finish

    - A subtask completes successfully

    - The current thread is interrupted

    - The `shutdown()` method is invoked directly to shut down the owner task


    Notice in the output of Listing [5-58](#463938_3_En_5_Chapter.xhtml#PC97) that
    we can inspect the subtask states. If the subtask state is `Subtask.State.SUCCESS`,
    the result of the subtask can be accessed, and it becomes the result of the owner
    task. Although not shown here, subtasks that get abandoned end up in state `Subtask.State.UNAVAILABLE`.
    Subtasks that end up with an exception being thrown, or time out, end up in state
    `Subtask.State.FAILED`.


    `ShutdownOnFailure` is suitable for situations in which the success of all subtasks
    is necessary to consider the execution a success. This is also known as the **invoke
    all** pattern. The `ShutdownOnFailure` instance captures the result of the first
    subtask **to complete abnormally**, then it invokes the `shutdown()` method to
    interrupt unfinished threads and wake up the owner.


    Listing [5-59](#463938_3_En_5_Chapter.xhtml#PC98) shows how to use `ShutdownOnFailure`
    to generate a list of random `Integer` values using two subtasks: one that uses
    a generator and one that returns a constant. This approach ensures that one subtask
    will most likely be dropped.


    ```

    package com.apress.bgn.five;

    import java.time.Duration;

    import java.time.Instant;

    import java.util.ArrayList;

    import java.util.List;

    import java.util.concurrent.TimeoutException;

    import java.util.stream.Collectors;

    import static com.apress.bgn.five.VirtualThreadsExecutorDemo.RND;

    import static java.util.concurrent.StructuredTaskScope.*;

    import static java.lang.System.out;

    public class StructuredConcurrencyDemoTwo {

    void main() {

    var d = new StructuredConcurrencyDemoTwo();

    List> subtasks = new ArrayList();

    var start = Instant.now();

    try (var scope = new ShutdownOnFailure()) {

    for (int i = 0; i  d.genValue()));

    }

    scope.joinUntil(Instant.now().plusSeconds(5));

    scope.throwIfFailed(t -> new IllegalStateException(("Well this sucks!  " + t.getMessage()));

    // if all subtasks complete successfully

    var result = subtasks.stream()

    .map(Subtask::get)

    .collect(Collectors.toList());

    out.println("All results: " + result);

    } catch (InterruptedException | TimeoutException | IllegalStateException e) {

    System.err.println("Some tasks have failed. " + e.getMessage());

    subtasks.forEach(t -> out.println(

    "task "  + subtasks.indexOf(t)  + " " + t.state() + ", result : " + (t.state()
    == Subtask.State.SUCCESS ? t.get() : "Not Available")

    )

    );

    }

    out.println("Execution time : " + Duration.between(start, Instant.now()).toMillis()
    + " ms");

    }

    Integer genValue() throws InterruptedException {

    var generatedVal = RND.nextInt();

    if(generatedVal % 11 ==0) {

    throw new IllegalStateException("This value is bad, bad bad...");

    }

    return generatedVal;

    }

    }

    // output

    // all success

    /*

    All results: [-1992358099, 1997495937, 1711128236, -1859724079, 1177627696, 1839477352,
    -1031424090, 1759698562, -186490484, -73552283]

    Execution time : 371ms

    */

    // or some failures

    /*

    ..

    task6: SUCCESS, result : 930381003

    task7: FAILED, result : Not Available

    task8: SUCCESS, result : -1545203690

    ...

    Execution time : 409ms

    */

    Listing 5-59

    Simple Example of ShutdownOnFailure Task Usage

    ```


    This example is similar to the one in Listing [5-58](#463938_3_En_5_Chapter.xhtml#PC97),
    but the behavior is different. The `genValue()` method was introduced to randomly
    throw an exception when the randomly generated number divides perfectly by 11,
    causing some of the subtasks to fail. The number 11 is complex enough that sometimes
    it happens for the exception not to be thrown at all, which makes all the subtasks
    to execute successfully.


    Instead of the `join()` method, we’ve used `joinUntil(..)` that takes a `java.time.Instant`
    argument that represents the allowed execution time, which in this case is 5 seconds
    from the current system time. If executing the task takes longer than that, the
    execution fails and an `IllegalStateException` is thrown.'
  raw: '#### Structured Concurrency


    In Java 19, through JEP 428^([^(58)](#fn58)) a new API for simplifying concurrent
    programming was introduced. This API simplifies multithreaded programming for
    **structured concurrency**. The work continued in Java 21^([^(59)](#fn59)), Java
    22 and Java 23 (JEP [`https://openjdk.org/jeps/480`](https://openjdk.org/jeps/480)),
    but when this chapter is being written this is still a preview feature.


    Structured concurrency treats multiple tasks running in different threads as a
    single unit of work, thereby streamlining error handling and cancellation, improving
    reliability, and enhancing observability. The simplest way to explain structured
    concurrency is to compare it to typical methods’ invocation. If method A invokes
    method B, then the execution of method B must finish before the execution of method
    A can continue, but both methods execute in the same thread. Structured concurrency
    means having the same behavior for virtual threads: if virtual thread A creates
    virtual thread B, the execution of thread B should take place within the execution
    time of thread A. Structured concurrency brings an order to thread execution,
    a way to create dependency relationships between virtual threads’ executions using
    readable code that hides the complexity of concurrency and synchronization.


    The main class of the structured concurrency API is `StructuredTaskScope<T>` in
    the `java.util.concurrent` package. This class enables you to coordinate a group
    of concurrent subtasks as a unit. Out of the box, in Java there are two extensions
    of this class, `ShutdownOnSuccess<T>` and `ShutdownOnFailure`, both of which are
    declared as static nested in the `StructuredTaskScope<T>` body, but developers
    can write their own versions by extending this class.


    The `ShutdownOnSuccess<T>` instance is suitable for situations in which the success
    of at least one subtask in a task set is enough to consider the execution a success.
    This is also known as the **invoke any** pattern. The `ShutdownOnSuccess<T>` instance
    captures the result of the first subtask **to complete successfully**, then it
    invokes the shutdown method to interrupt unfinished threads and wake up the owner.


    Listing [5-58](#463938_3_En_5_Chapter.xhtml#PC97) shows how to use `ShutdownOnSuccess<T>`
    to generate a random `Integer` value using two subtasks: one that uses a generator
    and one that returns a constant. This approach ensures that one subtask will most
    likely be dropped.


    ```

    package com.apress.bgn.five;

    import com.apress.bgn.four.classes.DataGenerator;

    import java.time.Duration;

    import java.time.Instant;

    import java.util.concurrent.ExecutionException;

    import static java.util.concurrent.StructuredTaskScope.*;

    import static java.lang.System.out;

    public class StructuredConcurrencyDemoOne {

    void main() {

    var start = Instant.now();

    try (var scope = new ShutdownOnSuccess()) {

    Subtask task1 = scope.fork(() -> DataGenerator.genInt());

    Subtask task2 =  scope.fork(() -> 2);

    scope.join();

    out.println("task1: " + task1.state() + ", result : " + (task1.state() == Subtask.State.SUCCESS
    ? task1.get() : "Not Available")  +

    "\ntask2: " + task2.state()+ ",  result : " + (task2.state() == Subtask.State.SUCCESS
    ? task2.get() : "Not Available")

    );

    out.println("Execution time : " + Duration.between(start, Instant.now()).toMillis()
    + " ms");

    out.println("Task result: " + scope.result());

    } catch (InterruptedException | ExecutionException e) {

    throw new RuntimeException(e);

    }

    }

    }

    // output

    /*

    task1: UNAVAILABLE, result : Not Available

    task2: SUCCESS, result : 2

    Execution time : 30ms

    Task result: 2

    */

    Listing 5-58

    Simple Example of ShutdownOnSuccess Task Usage

    ```


    The `join()` method waits for a subtask started in this task scope to complete
    successfully, and it stops waiting when one of the following happens:


    *   All threads finish


    *   A subtask completes successfully


    *   The current thread is interrupted


    *   The `shutdown()` method is invoked directly to shut down the owner task


    Notice in the output of Listing [5-58](#463938_3_En_5_Chapter.xhtml#PC97) that
    we can inspect the subtask states. If the subtask state is `Subtask.State.SUCCESS`,
    the result of the subtask can be accessed, and it becomes the result of the owner
    task. Although not shown here, subtasks that get abandoned end up in state `Subtask.State.UNAVAILABLE`.
    Subtasks that end up with an exception being thrown, or time out, end up in state
    `Subtask.State.FAILED`.


    `ShutdownOnFailure` is suitable for situations in which the success of all subtasks
    is necessary to consider the execution a success. This is also known as the **invoke
    all** pattern. The `ShutdownOnFailure` instance captures the result of the first
    subtask **to complete abnormally**, then it invokes the shutdown method to interrupt
    unfinished threads and wake up the owner.


    Listing [5-59](#463938_3_En_5_Chapter.xhtml#PC98) shows how to use `ShutdownOnFailure`
    to generate a list of random `Integer` values using two subtasks: one that uses
    a generator and one that returns a constant. This approach ensures that one subtask
    will most likely be dropped.


    ```

    package com.apress.bgn.five;

    import java.time.Duration;

    import java.time.Instant;

    import java.util.ArrayList;

    import java.util.List;

    import java.util.concurrent.TimeoutException;

    import java.util.stream.Collectors;

    import static com.apress.bgn.five.VirtualThreadsExecutorDemo.RND;

    import static java.util.concurrent.StructuredTaskScope.*;

    import static java.lang.System.out;

    public class StructuredConcurrencyDemoTwo {

    void main() {

    var d = new StructuredConcurrencyDemoTwo();

    List> subtasks = new ArrayList();

    var start = Instant.now();

    try (var scope = new ShutdownOnFailure()) {

    for (int i = 0; i  d.genValue()));

    }

    scope.joinUntil(Instant.now().plusSeconds(5));

    scope.throwIfFailed(t -> new IllegalStateException(("Well this sucks!  " + t.getMessage()));

    // if all subtasks complete successfully

    var result = subtasks.stream()

    .map(Subtask::get)

    .collect(Collectors.toList());

    out.println("All results: " + result);

    } catch (InterruptedException | TimeoutException | IllegalStateException e) {

    System.err.println("Some tasks have failed. " + e.getMessage());

    subtasks.forEach(t -> out.println(

    "task "  + subtasks.indexOf(t)  + " " + t.state() + ", result : " + (t.state()
    == Subtask.State.SUCCESS ? t.get() : "Not Available")

    )

    );

    }

    out.println("Execution time : " + Duration.between(start, Instant.now()).toMillis()
    + " ms");

    }

    Integer genValue() throws InterruptedException {

    var generatedVal = RND.nextInt();

    if(generatedVal % 11 ==0) {

    throw new IllegalStateException("This value is bad, bad bad...");

    }

    return generatedVal;

    }

    }

    // output

    // all success

    /*

    All results: [-1992358099, 1997495937, 1711128236, -1859724079, 1177627696, 1839477352,
    -1031424090, 1759698562, -186490484, -73552283]

    Execution time : 371ms

    */

    // or some failures

    /*

    ..

    task6: SUCCESS, result : 930381003

    task7: FAILED, result : Not Available

    task8: SUCCESS, result : -1545203690

    ...

    Execution time : 409ms

    */

    Listing 5-59

    Simple Example of ShutdownOnFailure Task Usage

    ```


    This example is similar to the one in Listing [5-58](#463938_3_En_5_Chapter.xhtml#PC97),
    but the behavior is different. The `genValue()` method was introduced to randomly
    throw an exception when the randomly generated number divides perfectly by 11,
    causing some of the subtasks to fail. The number 11 is complex enough that sometimes
    it happens for the exception not to be thrown at all, which makes all the subtasks
    to execute successfully.


    Instead of the `join()` method, we’ve used `joinUntil(..)` that takes a `java.time.Instant`
    argument that represents the allowed execution time, which in this case is 5 seconds
    from the current system time. If executing the task takes longer than that, the
    execution fails and an `IllegalStateException` is thrown.'
