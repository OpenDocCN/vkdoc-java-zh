- fmt: '### Type Patterns


    Starting with Java 14 the `instanceof` operator was enriched to include conversion,
    which allows for a clearer and simpler syntax, as depicted in Listing [6-5](#463938_3_En_6_Chapter.xhtml#PC5).


    ```

    for (Artist artist : artists) {

    if (artist instanceof Musician musician) {

    out.println("Songs: " + musician.getSongs());

    } else {

    out.println("Other Type: " + artist.getClass());

    }

    }

    Listing 6-5

    Java 14 New instanceof Syntax

    ```


    The `musician` variable is called a **pattern variable**; it is final and declared
    and initialized at the same place. Its scope is limited to the `if` block—if you
    try to use it in the `else` block, the compiler will object. Using `instanceof`
    this way is referred to as a **type pattern**.


    But what happens if an explicit conversion fails? To find out, we will try to
    convert the previously declared `Graphician` reference to `Musician`. The following
    line can be added to Listing [6-5](#463938_3_En_6_Chapter.xhtml#PC5) and it won’t
    stop the code from compiling:


    ```

    Musician fake = (Musician) diana;

    ```


    The `Graphician` class has no relation to the `Musician` type, so the code will
    not run. A special exception will be thrown in the console to tell you what is
    wrong. The error message printed in the console will be quite explicit and is
    depicted in the next log snippet:


    ```

    Exception in thread "main" java.lang.ClassCastException:

    class com.apress.bgn.six.Graphician cannot be cast to class com.apress.bgn.four.hierarchy.Musician

    (com.apress.bgn.six.Graphician is in module chapter.six of loader ''app'';

    com.apress.bgn.four.hierarchy.Musician is in module chapter.four@3.0-SNAPSHOT
    of loader ''app'')

    at chapter.six/com.apress.bgn.six.OperatorDemo.main(OperatorDemo.java:75)

    ```


    The message clearly states that the two types are not compatible, and it includes
    the package and module names.


    The situation in which the `instanceof` operator is most useful is in `equals(..)`
    methods. **Chapter** [**5**](#463938_3_En_5_Chapter.xhtml) introduced the `equals(..)`
    and `hashCode()` methods when discussing object equality. IntelliJ IDEA can generate
    these two methods for you. Just right-click inside the class body and select the
    **Generate** option to see all possibilities, and then select **equals() and hashCode**
    to generate the methods for you. The menu is depicted in Figure [6-2](#463938_3_En_6_Chapter.xhtml#Fig2).


    ![](images/463938_3_En_6_Chapter/463938_3_En_6_Fig2_HTML.jpg)


    Figure 6-2


    IntelliJ IDEA code generation menu: **Generate > equals() and hashCode()** submenu


    Listing [6-6](#463938_3_En_6_Chapter.xhtml#PC8) shows the IntelliJ IDEA–generated
    `equals(..)` and `hashCode()` methods.


    ```

    package com.apress.bgn.four.hierarchy;

    import com.apress.bgn.four.classes.Gender;

    import java.util.List;

    import java.util.Objects;

    public class Performer extends Human implements Musician, Actor {

    private String school;

    private String genre;

    private List songs;

    private List films;

    public Performer(String name, int age, float height, Gender gender) {

    super(name, age, height, gender);

    }

    @Override

    public boolean equals(Object o) {

    if (this == o) return true;

    if (o == null || getClass() != o.getClass()) return false;

    Performer other = (Performer) o;

    return Objects.equals(school, other.school)

    && Objects.equals(genre, other.genre)

    && Objects.equals(songs, other.songs)

    && Objects.equals(films, other.films);

    }

    @Override

    public int hashCode() {

    return Objects.hash(school, genre, songs, films);

    }

    // other code omitted

    }

    Listing 6-6

    equals(..) and hashCode() Generated Methods for Class Performer

    ```


    Look at the `equals(..)` method. Before checking field equality, it checks that
    the type of the argument is equal to the type of the instance being compared to:
    `getClass() != o.getClass()`. This works, but another way to write this comparison
    would be `!(o instanceof Performer)`. But we still have cast the `o` argument
    before doing field comparison. We had to do this before Java 14. After Java 14,
    we can rewrite the `equals(..)` method as shown in Listing [6-7](#463938_3_En_6_Chapter.xhtml#PC9).


    ```

    @Override

    public boolean equals(Object o) {

    if (this == o) return true;

    if (o == null || !(o instanceof Performer)) return false;

    return (o instanceof Performer other)

    && Objects.equals(school, other.school)

    && Objects.equals(genre, other.genre)

    && Objects.equals(songs, other.songs)

    && Objects.equals(films, other.films);

    }

    Listing 6-7

    equals(..) Using instanceof Starting with Java 14

    ```


    Note


    The work of incorporating pattern matching for `instanceof` started in Java 14,
    when it was introduced as a preview, and was finalized in Java 16 through JEP
    394^([^(60)](#fn60)).


    Another situation where the pattern matching for `instanceof` is useful is in
    `switch` expressions, which will be covered in **Chapter** [**7**](#463938_3_En_7_Chapter.xhtml).'
