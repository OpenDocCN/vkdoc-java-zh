    ## How to Determine the Structure of a Java Project


    There are a few ways Java projects can be structured, and the choice is influenced
    by two things: project scope and the build tool used.


    You might wonder why the project scope influences the project’s structure. You
    might expect there should be a standard for this, right? Well, there is more than
    one standard, and that is dependent on the project scope. The reason for creating
    a Java project influences its size. If a project is small, it might not require
    you to split the sources into subprojects, and it might not need a build tool
    either, since build tools come with their own standard way of organizing a project.
    Let’s start with the smallest Java project ever that should just print *Hello
    World!* to the console.


    ### The HelloWorld! Project in IntelliJ IDEA


    Since you installed IntelliJ IDEA, let’s create a Java project and check what
    project structure the editor chooses for us. When you first open IntelliJ IDEA,
    you see a very simple dialog window, as shown in Figure [3-13](#463938_3_En_3_Chapter.xhtml#Fig13).


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig13_HTML.jpg)


    Figure 3-13


    IntelliJ IDEA first dialog window


    Select **New Project**. IntelliJ IDEA directs you to the project setup dialog
    window, where you can choose the name of the project, the programming language
    you want to use, and the build tool and automatically selects the system JDK.
    This dialog window is shown in Figure [3-14](#463938_3_En_3_Chapter.xhtml#Fig14),
    with the default options for my computer.


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig14_HTML.jpg)


    Figure 3-14


    IntelliJ IDEA dialog window for creating a Java project


    For purposes of creating this first Java project in IntelliJ IDEA, use `sandbox`
    for both the project name and the module name and then click **Create**.


    The next window is the editor window, as shown in Figure [3-15](#463938_3_En_3_Chapter.xhtml#Fig15),
    which is where you write your code. If you expand the `sandbox` node on the left
    (that section is called the *Project view*), you can see that the project is built
    using the JDK you have installed (in this case 23). A `src` directory is created
    to contain Java packages and class files. Inside the `src` directory, IntelliJ
    IDEA generates a default class file named `Main.java` containing a `main(..)`
    method with a simple body, as shown on the right in Figure [3-15](#463938_3_En_3_Chapter.xhtml#Fig15).


    IntelliJ IDEA assumes that you are a beginner and shows some onboarding tips in
