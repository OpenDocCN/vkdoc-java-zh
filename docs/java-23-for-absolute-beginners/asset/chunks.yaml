    另一种发挥`for`循环创意的方式是将计数器的修改与终止条件合并为一个条件。清单 7-25 所示的代码与本节目前展示的所有示例效果相同。


    ```

    package com.apress.bgn.seven.forloop;

    import static java.lang.System.out;

    public class LastForLoopDemo {

    public static void main(String... args) {

    int[] arr = {5, 1, 4, 2, 3};

    int i = -1;

    for (; i++ < arr.length -1;) {

    out.println("arr[" +i +"] = " + arr[i]);

    }

    out.println("Loop exited with index: " + i);

    }

    }

    清单 7-25

    在终止条件中修改计数器的 for 循环

    ```


    另外请注意，步进表达式不一定非得是递增操作。它可以是任何修改计数器值的表达式。除了`++i`或`i++`，你还可以使用`i = i+1`或`i = i+3`，甚至如果从较大索引向较小索引遍历数组或集合，也可以使用递减操作。


    注意


    任何能将计数器保持在类型边界和集合边界内的数学运算都可以安全使用。


    *   `[code_block]`：一个代码块，在循环的每一步中重复执行。如果此代码块内没有退出条件，则该代码块将执行与计数器通过终止条件次数相同的次数。


    重要


    当代码块只包含一条语句时，花括号不是必需的，但大多数开发者会保留它们以提高代码清晰度，并帮助 IDE 正确缩进代码。


    警告


    如前所述，初始化表达式、终止条件和迭代表达式都是可选的，这意味着以下是一个有效的`for`语句：


    `for` `( ; ; ) {`


    `\\` `在此处放置语句`


    `}`


    谨慎


    使用这种形式的`for`语句时请务必小心。代码块必须包含一个终止条件，以避免出现*无限循环*。


    这是`for`循环语句的基本形式，但在 Java 中还有其他遍历一组值的方法。假设我们需要遍历一个列表而不是数组，如清单 7-26 所示。


    ```

    package com.apress.bgn.seven.forloop;

    import java.util.List;

    import static java.lang.System.out;

    public class ListLoopDemo {

    void main() {

    var list = List.of(5, 1, 4, 2, 3);

    for (int j = 0; j < list.size(); ++j) {

    out.println("list[ " +j +"] = " + list.get(j));

    }

    }

    }

    清单 7-26

    遍历列表的 for 循环

    ```


    清单 7-26 中的代码由于多次调用列表方法而显得有些不便，这就是为什么`List<E>`实例可以用另一种类型的`for`语句来遍历，这种语句在 Java
    8 之前被称为`forEach`。你马上就会明白原因，但首先让我们在清单 7-27 中看看`forEach`的实际应用。


    ```

    package com.apress.bgn.seven.forloop;

    import java.util.List;

    import static java.lang.System.out;

    public class ForEachLoopDemo {

    void main() {

    var list = List.of(5, 1, 4, 2, 3);

    for (Integer item : list) {

    out.println(item);

    }

    }

    }

    清单 7-27

    遍历列表的 forEach 循环

    ```


    这种类型的`for`语句也被称为具有增强语法，它会对其表达式中使用的集合中的每个项执行代码块。这意味着它适用于任何`Collection<E>`接口的实现，也适用于数组。因此，到目前为止展示的代码示例也可以写成清单
    7-28 所示的形式。


    ```

    package com.apress.bgn.seven.forloop;

    import static java.lang.System.out;

    public class ArrayForEachDemo {

    void main(){

    int[] arr = {5, 1, 4, 2, 3};

    for (int item : arr) {

    out.println(item);

    }

    }

    }

    清单 7-28

    遍历数组的 forEach 循环

    ```


    显然，这种情况下最好的部分是，我们不再需要终止条件或计数器。从 Java 8 开始，`forEach`这个名称不能再用于具有增强语法的`for`语句，因为`forEach`默认方法已被添加到所有`Collection<E>`实现中，所以现在它被称为“增强型
    for”。将`forEach`默认方法与 lambda 表达式结合，打印列表元素的代码就变成了清单 7-29 中的样子。


    ```

    package com.apress.bgn.seven.forloop;

    import java.util.List;

    import static java.lang.System.out;

    public class ForLoopDemo {

    void main(){

    var list = List.of(5, 1, 4, 2, 3);

    list.forEach(item -> out.println(item));

    //或者使用方法引用

    list.forEach(out::println);

    }

    }

    清单 7-29

    使用 forEach 方法遍历列表

    ```


    很简洁，对吧？但等等，还有更多：它也适用于数组，但首先需要将其转换为合适的`java.util.stream.BaseStream`实现。这由`Arrays`工具类提供，该类在
    Java 8 中得到了增强，增加了支持 lambda 表达式的方法。因此，到目前为止使用`arr`数组编写的代码，从 Java 8 开始可以写成清单 7-30
    所示的形式。


    ```

    package com.apress.bgn.seven.forloop;

    import static java.lang.System.out;

    public class ForLoopDemo {

    void main(){

    int[] arr = {5, 1, 4, 2, 3};

    Arrays.stream(arr).forEach(out::println);

    }

    }

    清单 7-30

    使用 forEach 方法遍历数组

    ```


    另一种不使用索引变量遍历数组的方法是使用`java.util.stream.IntStream.range(..)`，如清单 7-31 所示。`range(startInclusive,
    endExclusive)`方法返回一个从`startInclusive`（包含）到`endExclusive`（不包含）的连续有序`IntStream`，步长为
    1。


    ```

    package com.apress.bgn.seven.forloop;

    import java.util.stream.IntStream;

    import static java.lang.System.out;

    public class ForLoopDemo {

    void main(){

    int[] arr = {5, 1, 4, 2, 3};

    IntStream.range(0, arr.length).forEach(out::println);

    }

    }

    清单 7-31

    使用 IntStream.range(startInclusive, endExclusive) 遍历数组

    ```


    在 Java 21 中，上述所有示例都能正常编译和执行，因此在编写解决方案时，你可以使用自己最喜欢的语法。

