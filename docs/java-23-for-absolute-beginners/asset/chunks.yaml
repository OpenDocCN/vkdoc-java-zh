  trans: '

    ### 使用 `Writer` 写入文件


    与用于读取文件的 `Reader` 层级结构类似，也存在一个名为 `Writer` 的抽象类。但在介绍它之前，我先引入 `BufferedWriter`，它是
    `BufferedReader` 在写入文件方面的对应类，因为这是实践中使用最频繁的类之一。该类同样拥有一个内部缓冲区，当调用写入方法时，参数会被存储到缓冲区中；当缓冲区满时，其内容会被写入文件。可以通过调用
    `flush()` 方法提前清空缓冲区。强烈建议在调用 `close()` 之前显式调用此方法，以确保所有输出都已写入文件。清单 11-25 中的代码片段展示了如何将一个
    `String` 实例列表写入文件。


    ```

    package com.apress.bgn.eleven.io;

    import java.io.BufferedWriter;

    import java.io.FileWriter;

    // 其他 import 语句已省略

    public class BufferedWritingDemo {

    private static final Logger LOGGER = LoggerFactory.getLogger(BufferedWritingDemo.class);

    void main() {

    var file = new File("chapter11/read-write-file/src/main/resources/output/data.txt");

    var dataList = List.of ("我该如何昂起头颅" ,

    "以免沉沦");

    BufferedWriter writer = null;

    try {

    writer = new BufferedWriter(new FileWriter(file));

    for (String entry : dataList) {

    writer.write(entry);

    writer.newLine();

    }

    LOGGER.info("在 Java 7 之前使用 BufferedWriter 写入字符串");

    } catch (IOException e) {

    LOGGER.info("出错了！", e);

    } finally {

    if(writer!= null) {

    try {

    writer.flush();

    writer.close();

    } catch (IOException e) {

    LOGGER.info("出错了！", e);

    }

    }

    }

    }

    }

    清单 11-25

    使用 BufferedWriter 将列表写入文件

    ```


    还需要另一种代码结构，因为写入文件是一种敏感操作，可能因多种原因失败。清单 11-25 中的代码是你在 Java 7 之前必须编写的，而 `try-with-resources`
    减少了样板代码，使得代码可以简化为清单 11-26 所示。


    ```

    try (final BufferedWriter wr = new BufferedWriter(new FileWriter(file))){

    dataList.forEach(entry -> {

    try {

    wr.write(entry);

    wr.newLine();

    } catch (IOException e) {

    LOGGER.info("出错了！", e);

    }

    });

    wr.flush();

    LOGGER.info("在 Java 7 之后使用 BufferedWriter 写入字符串");

    } catch (IOException e) {

    LOGGER.info("出错了！", e);

    }

    清单 11-26

    使用 BufferedWriter 和 try-with-resources 将列表写入文件

    ```


    注意，无需调用 `wr.close()`，因为在 Java 7 中，`java.io.Closeable` 接口被修改为继承 `java.lang.AutoCloseable`，后者声明了一个
    `close()` 方法的版本，当退出 `try-with-resources` 块时会自动调用该方法。尽管如此，代码看起来仍然相当繁琐，对吧？特别是需要声明一个
    `BufferedWriter` 并将其包裹在 `FileWriter` 实例周围。这在 Java 8 中得到了简化，新增了 `Files` 工具类，其中包含一个名为
    `newBufferedWriter(Path path)` 的方法，该方法返回一个 `BufferedWriter` 实例，因此开发者不再需要显式编写那段代码。因此，清单
    11-26 中 `try-with-resources` 的初始化表达式可以替换为：


    ```

    final BufferedWriter wr = Files.newBufferedWriter(file.toPath());

    ```


    此外，还有一个接受字符集参数的方法版本：


    ```

    final BufferedWriter wr = Files.newBufferedWriter(file.toPath(),StandardCharsets.UTF_8);

    ```


    在引入此方法之前，使用指定字符集将文本写入文件需要一个 `java.io.OutputWriter` 实例：


    ```

    final OutputStreamWriter wr = new OutputStreamWriter(new FileOutputStream(file),
    StandardCharsets.UTF_8);

    ```


    还有一个接受 `OpenOption` 类型参数的方法版本，允许你指定文件的打开方式：


    ```

    final BufferedWriter wr = Files.newBufferedWriter(file.toPath(),StandardCharsets.UTF_8,
    StandardOpenOption.APPEND);

    ```


    这非常有用，因为显式创建的 `BufferedWriter`（未指定文件选项）会覆盖现有文件，除非其包裹的 `FileWriter` 被配置为向现有文件追加数据，如下所示：


    ```

    final BufferedWriter wr = new BufferedWriter(new FileWriter(file, true))

    ```


    第二个参数是一个 `boolean` 值，表示文件是否应打开以追加文本（`true`）或不追加（`false`）。


    现在，`BufferedWriter` 的基础知识已经介绍完毕，是时候认识一下 `Writer` 家族中最有用的成员了，如图 11-5 所示。


    ![](img/463938_3_En_11_Fig5_HTML.jpg)


    图 11-5


    `Writer` 类层次结构


    `Writer` 类是抽象的，因此不能直接使用；追加 API 来自 `Writer` 实现的 `java.io.Appendable` 接口。其他 `Writer`
    类用于不同的目的。正如我们已经看到的，`OutputStreamWriter` 用于使用特殊字符编码写入文本。


    `PrintWriter` 用于将对象的格式化表示写入文本输出流（我们在**第 10 章**中已经使用它来编写 HTML 代码）。


    `StringWriter` 用于将输出收集到其内部缓冲区，并将其写入一个 `String` 实例。


    在 Java 11 中，`Writer` 类增加了 `nullWriter()` 方法，该方法返回一个不执行任何操作的 `Writer` 实例。这是应开发者的测试需求而提出的。

