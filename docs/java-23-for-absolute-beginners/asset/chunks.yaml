- fmt: "希望您已经理解了多重继承的概念，以及在设计应用程序时何时适合使用类、何时适合使用接口。现在是时候兑现本节开头做出的承诺，列出抽象类和接口之间的区别了。您可以在表\
    \ [4-1](#463938_3_En_4_Chapter.xhtml#Tab1) 中找到它们。\n\n**表 4-1** Java 中抽象类与接口的区别\n\
    \n| 抽象类 | 接口 |\n| --- | --- |\n| 可以包含非抽象方法。 | 只能包含抽象方法、默认方法和私有方法。 |\n| 单继承：一个类只能继承一个类。\
    \ | 多重继承：一个类可以实现多个接口。此外，一个接口可以继承一个或多个接口。 |\n| 可以包含 final、非 final、static 和 nonstatic\
    \ 变量。 | 只能包含 static 和 final 字段。 |\n| 使用 `abstract class` 声明。 | 使用 `interface`\
    \ 声明。 |\n| 可以使用关键字 `extends` 继承另一个类，并使用关键字 `implements` 实现接口。 | 只能使用关键字 `extends`\
    \ 继承其他接口（一个或多个）。 |\n| 可以包含非抽象、protected 或 private 成员。 | 所有成员默认都是 abstract 和 public（除了\
    \ default 和 private 方法）。 |\n| 如果一个类包含抽象方法，则它自身必须声明为 abstract。 | （无对应项。） |\n\n\
    ### 接口中的默认方法\n\n接口的一个问题是，如果你修改其主体以添加新方法，代码将无法编译。为了使其编译通过，你必须在实现该接口的每个类中为新添加的接口方法添加具体实现。多年来，这一直是开发人员的痛点。接口是一种契约，它保证了一个类的行为方式。在你的项目中使用第三方库时，你通过设计代码来遵守这些契约。当切换到库的新版本时，如果该契约发生变化，你的代码将无法编译。\n\
    \n> **提示**\n> 这种情况非常类似于苹果公司改变其电脑和手机的充电端口。如果你买了一台新的 Mac，并试图使用旧的充电器，它将无法适配。\n\n\
    当然，一种解决方案是在新接口中声明新方法，然后创建同时实现新接口和旧接口的新类（这被称为**组合**，因为两个接口组合在一起代表一个单一的契约）。接口暴露的方法构成了应用程序编程接口（API），在开发应用程序时，目标是设计出具有稳定\
    \ API 的应用程序。这一规则由名为“开闭原则”的编程原则描述，该原则是五大 SOLID 编程原则之一^([(43)](#fn43))。该原则指出，你应该能够在不修改类的情况下扩展它。因此，修改类实现的接口也需要修改该类。所以，修改接口往往会破坏这一原则。\n\
    \n除了前面提到的接口组合之外，在 Java 8 中引入了一个解决方案：**默认方法**。从 Java 8 开始，只要方法使用 `default` 关键字声明，就可以在接口中声明具有完整实现的方法。\n\
    \n让我们考虑一下 `Artist` 接口。任何自称艺术家的人都应该能够创造一些东西，对吧？所以艺术家应该具有创造性。鉴于我们所处的世界，我不会提及名字，但有些艺术家实际上是产业的产物，所以他们本身并不具有创造性。因此，在我们决定了图\
    \ [4-11](#463938_3_En_4_Chapter.xhtml#Fig11) 所示的层次结构之后，我们才意识到应该有一个方法来判断艺术家是否具有创造性。\n\
    \n![](images/463938_3_En_4_Chapter/463938_3_En_4_Fig11_HTML.jpg)\n\n**图 4-11**\
    \ 为 `Performer` 类添加更多接口的 Java 层次结构\n\n如果我们向 `Artist` 接口添加一个新的抽象方法，`Performer`\
    \ 类将无法编译。IntelliJ IDEA 会通过显示大量红色下划线来明确表明我们的应用程序不再工作，如图 [4-12](#463938_3_En_4_Chapter.xhtml#Fig12)\
    \ 所示。\n\n![](images/463938_3_En_4_Chapter/463938_3_En_4_Fig12_HTML.jpg)\n\n**图\
    \ 4-12** 由于接口中添加了新方法而导致的 Java 层次结构破坏\n\n我们看到的编译器错误是由于我们决定向 `Artist` 接口添加一个名为 `isCreative`\
    \ 的新抽象方法造成的。如果将鼠标光标悬停在类声明上，你甚至可以看到原因。清单 [4-41](#463938_3_En_4_Chapter.xhtml#PC41)\
    \ 展示了破坏代码的抽象方法。\n\n```\npackage com.apress.bgn.four.hierarchy;\npublic interface\
    \ Artist {\n    String getSchool();\n    void setSchool(String school);\n    boolean\
    \ isCreative();\n}\n```\n\n**清单 4-41** 添加到 `Artist` 接口的新骨架方法\n\n为了消除编译错误，我们将 `isCreative`\
    \ 方法骨架转换为一个返回 `true` 的 `default` 方法，因为每个艺术家都应该是具有创造性的。默认方法默认是 `public` 的，因此可以在实现声明该方法的接口的任何类型的对象上调用它们。清单\
    \ [4-42](#463938_3_En_4_Chapter.xhtml#PC42) 展示了默认方法的主体。\n\n```\npackage com.apress.bgn.four.hierarchy;\n\
    public interface Artist {\n    String getSchool();\n    void setSchool(String\
    \ school);\n    default boolean isCreative() {\n        return true;\n    }\n\
    }\n```\n\n**清单 4-42** 添加到 `Artist` 接口的新 `default` 方法\n\n现在代码应该可以再次编译了。默认方法非常实用，因为它们允许修改接口所代表的契约，而无需强制修改实现该接口的现有类。这将确保与为旧版本接口编写的代码的二进制兼容性。\n\
    \n实现包含默认方法的接口的类可以使用现有的默认实现，也可以为默认方法提供新的实现（可以覆盖它们）。为了说明这一点，清单 [4-43](#463938_3_En_4_Chapter.xhtml#PC43)\
    \ 中的 `MiliVanili` 类为 `Artist` 接口中的默认方法提供了新的实现。\n\n```\npackage com.apress.bgn.four.hierarchy;\n\
    import java.util.List;\npublic class MiliVanili implements Artist {\n    @Override\n\
    \    public boolean isCreative() {\n        return false; // 哎呀！\n    }\n    //\
    \ 其他代码已省略\n}\n```\n\n**清单 4-43** 在实现 `Artist` 接口的类中覆盖默认方法\n\n继承其他接口的接口可以编写为执行以下任何操作（为了更清晰，被继承的接口将被称为超接口）：\n\
    \n*   声明自己的抽象方法和默认方法。\n*   将超接口中的默认方法重新声明为抽象方法，这强制继承此接口的类提供实现。\n*   重新定义超接口中的默认方法。\n\
    *   声明一个默认方法，为超接口中的抽象方法提供实现。\n\n> **提示**\n> 为所有这些场景提供代码示例对于一本 Java 绝对初学者书籍来说可能有点过多。如果您有兴趣查看代码的样子并测试这些断言的正确性，请查看\
    \ `com.ampress.bgn.four.interfaces.extensions` 包中的内容。"
  raw: 'Hopefully, you understood the idea of multiple inheritance and when it is
    appropriate to use classes and when to use interfaces in designing your applications,
    because it is high time to fulfil the promise made in the beginning of this section
    and list the differences between abstract classes and interfaces. You can find
    them in Table [4-1](#463938_3_En_4_Chapter.xhtml#Tab1).


    Table 4-1


    Differences Between Abstract Classes and Interfaces in Java


    | Abstract Class | Interface |

    | --- | --- |

    | Can have nonabstract methods. | Can have only abstract, default, and private
    methods. |

    | Single inheritance: a class can extend only one class. | Multiple inheritance:
    a class can implement more than one interface. Also, an interface can extend one
    or more interfaces. |

    | Can have final, nonfinal, static, and nonstatic variables. | Can have only static
    and final fields. |

    | Declared with **abstract class**. | Declared with **interface**. |

    | Can extend another class using keyword **extends** and implement interfaces
    with keyword **implements**. | Can only extend other interfaces (one or more)
    using keyword **extends**. |

    | Can have nonabstract, protected, or private members. | All members are by default
    abstract and public (except default and private methods). |

    | If a class has an abstract method, it must be declared itself abstract. | (No
    correspondence.) |


    ##### Default Methods in Interfaces


    One problem with interfaces is that if you modify their bodies to add new methods,
    the code will stop compiling. To make it compile, you have to add a concrete implementation
    for the newly added interface method(s) in every class that implements that interface.
    This has been a pain for developers for many years. An interface is a contract
    that guarantees how a class will behave. When using third-party libraries in your
    project, you do so by designing your code to respect those contracts. When switching
    to a new version of a library, if that contract changes, your code will no longer
    compile.


    Tip


    This situation is very similar to Apple changing the charging ports for their
    computers and phones from one version to another. If you buy a new Mac and try
    to use your old charger, it won’t fit.


    Sure, a solution would be to declare the new methods in a new interface and then
    create new classes that implement both new and old interfaces (this is called
    **composition**, because the two interfaces are composed to represent a single
    contract). The methods exposed by an interface make up an application programming
    interface (API), and when developing applications, the aim is to design them to
    have stable APIs. This rule is described by a programming principle called Open-Closed
    Principle, which is one of the five SOLID Programming Principles ^([^(43)](#fn43)).
    This principle states that you should be able to extend a class without modifying
    it. Thus, modifying the interface that a class implements requires modifying the
    class too. So, modifying interfaces tends to lead to breaking this principle.


    Aside from interfaces composition mentioned previously, in Java 8 a solution for
    this was introduced: **default methods**. Starting with Java 8, methods with a
    full implementation can be declared in interfaces as long as they are declared
    using the `default` keyword.


    Let’s consider the `Artist` interface. Any self-proclaimed artist should be able
    to create something, right? So an artist should have a creative nature. Given
    the world we are living in, I won’t mention names, but some artists are actually
    products of the industry, so they are not creative themselves. So, the realization
    that we should have a method that tells us if an artist has a creative nature
    or not came after we decided our hierarchy depicted in Figure [4-11](#463938_3_En_4_Chapter.xhtml#Fig11).


    ![](images/463938_3_En_4_Chapter/463938_3_En_4_Fig11_HTML.jpg)


    Figure 4-11


    Java hierarchy with more interfaces for `Performer` class


    If we add a new abstract method to the `Artist` interface, the `Performer` class
    fails to compile. IntelliJ IDEA will make it really obvious that our application
    does not work anymore by showing a lot of things underlined in red, as depicted
    in Figure [4-12](#463938_3_En_4_Chapter.xhtml#Fig12).


    ![](images/463938_3_En_4_Chapter/463938_3_En_4_Fig12_HTML.jpg)


    Figure 4-12


    Java broken hierarchy because of new method in interface


    The compiler errors that we see are caused by our decision to add a new abstract
    method named `isCreative` to the `Artist` interface, and if you hover your mouse
    cursor over the class declaration, you can even see why. Listing [4-41](#463938_3_En_4_Chapter.xhtml#PC41)
    depicts the abstract method breaking the code.


    ```

    package com.apress.bgn.four.hierarchy;

    public interface Artist {

    String getSchool();

    void setSchool(String school);

    boolean isCreative();

    }

    Listing 4-41

    New Skeleton Method Added to the Artist Interface

    ```


    To get rid of the compiling errors, we’ll transform the `isCreative` method skeleton
    into a `default` method that returns `true`, because every artist should be creative.
    Default methods are by default public, so they can be called on every object of
    a type implementing the interface where the method is declared. Listing [4-42](#463938_3_En_4_Chapter.xhtml#PC42)
    depicts the body of the default method.


    ```

    package com.apress.bgn.four.hierarchy;

    public interface Artist {

    String getSchool();

    void setSchool(String school);

    default boolean isCreative() {

    return true;

    }

    }

    Listing 4-42

    New default Method Added to the Artist Interface

    ```


    Now the code should compile again. Default methods are pretty practical, as they
    allow the modification of the contract represented by an interface without enforcing
    modification of existing classes implementing that interface. This will ensure
    binary compatibility with code written for older versions of that interface.


    Classes that implement an interface containing a default method can use the existing
    default implementation or provide a new implementation for default methods (can
    override them). To show this, the class named `MiliVanili` in Listing [4-43](#463938_3_En_4_Chapter.xhtml#PC43)
    provides a new implementation for the default method in the `Artist` interface.


    ```

    package com.apress.bgn.four.hierarchy;

    import java.util.List;

    public class MiliVanili implements Artist {

    @Override

    public boolean isCreative() {

    return false; // dooh!

    }

    // other code omitted

    }

    Listing 4-43

    Default Method Being Overridden in Class Implementing the Artist Interface

    ```


    Interfaces extending other interfaces can be written to do any of the following
    (for a little more clarity, the extended interface will be referred to as the
    super-interface):


    *   Declare their own abstract methods and default methods.


    *   Redeclare the default method from the super-interface as an abstract method,
    which forces classes extending this interface to provide an implementation.


    *   Redefine the default method from the super-interface.


    *   Declare a default method that provides an implementation for an abstract method
    from the super-interface.


    Tip


    Providing code samples for all these scenarios would be a bit too much for a Java
    absolute beginner book. If you are interested in seeing what the code looks like
    and testing the validity of these affirmations, check out the contents of the
    `com.ampress.bgn.four.interfaces.extensions` package.'
  trans: '

    希望你已经理解了多重继承的概念，以及在设计应用程序时，何时适合使用类、何时适合使用接口。因为现在是时候兑现本节开头许下的承诺，列出抽象类和接口之间的区别了。你可以在表
    4-1 中找到它们。


    表 4-1


    Java 中抽象类与接口的区别


    | 抽象类 | 接口 |

    | --- | --- |

    | 可以拥有非抽象方法。 | 只能拥有抽象方法、默认方法和私有方法。 |

    | 单继承：一个类只能继承一个类。 | 多重继承：一个类可以实现多个接口。此外，一个接口可以扩展一个或多个接口。 |

    | 可以拥有 final、非 final、static 和非 static 变量。 | 只能拥有 static 和 final 字段。 |

    | 使用 **abstract class** 声明。 | 使用 **interface** 声明。 |

    | 可以使用关键字 **extends** 扩展另一个类，并使用关键字 **implements** 实现接口。 | 只能使用关键字 **extends**
    扩展其他接口（一个或多个）。 |

    | 可以拥有非抽象、protected 或 private 成员。 | 所有成员默认都是 abstract 和 public（除了 default 和 private
    方法）。 |

    | 如果一个类有抽象方法，它自身必须声明为 abstract。 | （无对应项。） |


    ##### 接口中的默认方法


    接口的一个问题是，如果你修改其主体以添加新方法，代码将无法编译。为了使其能够编译，你必须在实现该接口的每个类中为新添加的接口方法添加具体实现。多年来，这一直是开发人员的痛点。接口是一种契约，它保证了一个类将如何表现。当你在项目中使用第三方库时，你通过设计代码来遵守这些契约。当切换到库的新版本时，如果该契约发生变化，你的代码将无法再编译。


    提示


    这种情况非常类似于苹果公司从一代产品到另一代产品更改其电脑和手机的充电端口。如果你买了一台新的 Mac，并试图使用你的旧充电器，它将无法适配。


    当然，一种解决方案是在新接口中声明新方法，然后创建同时实现新接口和旧接口的新类（这被称为**组合**，因为两个接口组合在一起代表一个单一的契约）。接口暴露的方法构成了应用程序编程接口（API），在开发应用程序时，目标是设计出具有稳定
    API 的应用程序。这一规则由名为“开闭原则”的编程原则描述，该原则是五大 SOLID 编程原则之一 ^(⁴³)。该原则指出，你应该能够在不修改类的情况下扩展它。因此，修改类所实现的接口也需要修改该类。所以，修改接口往往会导致违反这一原则。


    除了前面提到的接口组合之外，在 Java 8 中引入了一种解决方案：**默认方法**。从 Java 8 开始，只要使用 `default` 关键字声明，就可以在接口中声明具有完整实现的方法。


    让我们考虑一下 `Artist` 接口。任何自称艺术家的人都应该能够创造一些东西，对吧？所以艺术家应该具有创造性。鉴于我们所处的世界，我不会提及名字，但有些艺术家实际上是产业的产物，因此他们本身并不具有创造性。所以，在我们决定了图
    4-11 中描绘的层次结构之后，才意识到我们应该有一个方法来告诉我们一个艺术家是否具有创造性。


    ![](img/463938_3_En_4_Fig11_HTML.jpg)


    图 4-11


    为 `Performer` 类添加了更多接口的 Java 层次结构


    如果我们向 `Artist` 接口添加一个新的抽象方法，`Performer` 类将无法编译。IntelliJ IDEA 会通过显示大量红色下划线来明确表明我们的应用程序不再工作，如图
    4-12 所示。


    ![](img/463938_3_En_4_Fig12_HTML.jpg)


    图 4-12


    由于接口中的新方法导致 Java 层次结构被破坏


    我们看到的编译器错误是由于我们决定向 `Artist` 接口添加一个名为 `isCreative` 的新抽象方法造成的，如果你将鼠标悬停在类声明上，你甚至可以看到原因。清单
    4-41 描述了破坏代码的抽象方法。


    ```

    package com.apress.bgn.four.hierarchy;

    public interface Artist {

    String getSchool();

    void setSchool(String school);

    boolean isCreative();

    }

    清单 4-41

    添加到 Artist 接口的新骨架方法

    ```


    为了消除编译错误，我们将 `isCreative` 方法骨架转换为一个返回 `true` 的 `default` 方法，因为每个艺术家都应该是具有创造性的。默认方法默认是
    public 的，因此可以在实现声明该方法的接口的任何类型的对象上调用它们。清单 4-42 描述了默认方法的主体。


    ```

    package com.apress.bgn.four.hierarchy;

    public interface Artist {

    String getSchool();

    void setSchool(String school);

    default boolean isCreative() {

    return true;

    }

    }

    清单 4-42

    添加到 Artist 接口的新 default 方法

    ```


    现在代码应该可以再次编译了。默认方法非常实用，因为它们允许修改接口所代表的契约，而无需强制修改实现该接口的现有类。这将确保与为旧版本接口编写的代码保持二进制兼容性。


    实现包含默认方法的接口的类可以使用现有的默认实现，或者为默认方法提供新的实现（可以覆盖它们）。为了说明这一点，清单 4-43 中名为 `MiliVanili`
    的类为 `Artist` 接口中的默认方法提供了一个新的实现。


    ```

    package com.apress.bgn.four.hierarchy;

    import java.util.List;

    public class MiliVanili implements Artist {

    @Override

    public boolean isCreative() {

    return false; // 哎呀！

    }

    // 其他代码已省略

    }

    清单 4-43

    在实现 Artist 接口的类中覆盖默认方法

    ```


    扩展其他接口的接口可以编写为执行以下任何操作（为了更清晰，被扩展的接口将被称为超接口）：


    *   声明自己的抽象方法和默认方法。


    *   将超接口中的默认方法重新声明为抽象方法，这强制扩展此接口的类提供实现。


    *   重新定义超接口中的默认方法。


    *   声明一个默认方法，为超接口中的抽象方法提供实现。


    提示


    为所有这些场景提供代码示例对于一本 Java 绝对初学者书籍来说可能有点过多。如果你有兴趣查看代码的样子并测试这些说法的有效性，请查看 `com.ampress.bgn.four.interfaces.extensions`
    包中的内容。

    '
- fmt: '# Static Methods and Constants in Interfaces


    From Java version 1 up to version 8, interfaces could only contain abstract methods
    and static constants. Interfaces changed in version 8, with the most important
    changes being the support for `default` and `private` methods.


    `Constants`, or variables that never change once initialized, do not need an implementation,
    so it makes sense for developers to be allowed to declare them in an interface’s
    body, right? Of course, you can do the same using enums, but sometimes you might
    want to keep related components together. In a previous example a `LIFESPAN` constant
    was declared in the `Human` class. Since any class implementing `Artist` will
    probably need the `LIFESPAN` for some calculation or another, we can move this
    constant in the `Artist` interface and use it in any class, as depicted in Listing
    [4-44](#463938_3_En_4_Chapter.xhtml#PC44).


    ```

    package com.apress.bgn.four.hierarchy;

    interface Artist {

    public static final int LIFESPAN = 100;

    // other code omitted

    }

    public class Performer extends Human implements Musician, Actor {

    @Override

    public int getTimeToLive() {

    return (LIFESPAN - getAge()) / 2;

    }

    // other code omitted

    }

    Listing 4-44

    The Constant LIFESPAN in the Artist Interface

    ```


    When declaring constants in interfaces, the three accessors `public`, `static`,
    and `final` are redundant, because they are implied. The explanation for each
    is quite simple:


    - Interfaces cannot have mutable fields, so by default they have to be `final`.

    - Since interfaces cannot be instantiated, they cannot have fields that will become
    properties on instances, so they have to be `static`.

    - Since anything in an interface body must be accessible to implementing classes,
    they have to be `public`.


    As for static methods in interfaces, they are usually utility methods that are
    specific to certain operations within the hierarchy the interface is part of.
    Let’s add a static method that checks if the name provided as an argument is capitalized,
    and capitalizes it if it isn’t.


    The code is depicted in Listing [4-45](#463938_3_En_4_Chapter.xhtml#PC45), where
    the method `capitalize` is declared in the `Artist` interface and used in the
    `Performer` class.


    ```

    package com.apress.bgn.four.hierarchy;

    interface Artist {

    public static String capitalize(String name) {

    Character c = name.charAt(0);

    if (Character.isLowerCase(c)) {

    Character upperC = Character.toUpperCase(c);

    name.replace(c, upperC);

    }

    return name;

    }

    // other code omitted

    }

    public class Performer extends Human implements Musician, Actor {

    public String getCapitalizedName() {

    return Artist.capitalize(this.name);

    }

    // other code omitted

    }

    Listing 4-45

    Public Static Method in Interface

    ```


    In Java 8, any method with a body that was not declared as `default` had to be
    declared `public` and `static`, because of the reasons mentioned previously. If
    `default` or `static` methods share a lot of code, then a `default` or `static`
    method can group that code and have the others call it, right? The only problem
    appears when there is a need for that code to be private. That was not possible
    in Java 8, because everything in the body of an interface was `public` by default.
    But it became possible in Java 9.


    # Private Methods in Interfaces


    Starting with Java 9, support for `private` and `private static` methods in interfaces
    was introduced. The reason behind this decision was (as you can probably imagine)
    to promote code reusability within interfaces and encapsulation of code that should
    not be shared across implementations of the interface. This means that the action
    performed by the default `isCreative()` method can be modified to also log an
    explanation for the returned value, by calling a `private` method. And just to
    make this example complete, let’s add in a `private static` method printing the
    current system date, as shown in Listing [4-46](#463938_3_En_4_Chapter.xhtml#PC46).


    ```

    package com.apress.bgn.four.hierarchy;

    interface Artist {

    default boolean isCreative() {

    explain();

    return true;

    }

    private void explain() {

    log();

    System.out.println("A true artist has a creative nature.");

    }

    private static void log() {

    System.out.println("[LOG] checked creativity on: " + new Date());

    }

    /**

    * Yes this is allowed and you can run this. ;)

    */

    public static void main() {

    Artist artist =  new Performer("Myles Kennedy", 54, 1.8F, Gender.MALE);

    artist.isCreative();

    }

    }

    // output

    //[LOG] checked creativity on: Wed May 08 17:45:15 BST 2024

    //A true artist has a creative nature.

    Listing 4-46

    New private Method Added to the Artist Interface

    ```


    Here are a few last thoughts about private interface methods:


    - Private methods are only accessible within the interfaces they are declared
    in, and thus should be written to contain sensitive code, which you do not want
    accessed by any other class or interface.

    - Being private, they cannot be inherited, nor overridden.

    - A consequence of this is that private methods cannot be abstract.


    When doing development on a concrete project, you will find yourself using classes,
    interfaces, enums, and others. It is up to you how you design and organize your
    code. Just make sure to avoid repetition and keep it clean, uncoupled, and testable.'
  raw: '##### Static Methods and Constants in Interfaces


    From Java version 1 up to version 8, interfaces could only contain abstract methods
    and static constants. Interfaces changed in version 8, with the most important
    changes being the support for `default` and `private` methods.


    *Constants*, or variables that never change once initialized, do not need an implementation,
    so it makes sense for developers to be allowed to declare them in an interface’s
    body, right? Of course, you can do the same using enums, but sometimes you might
    want to keep related components together. In a previous example a `LIFESPAN` constant
    was declared in the `Human` class. Since any class implementing `Artist` will
    probably need the `LIFESPAN` for some calculation or another, we can move this
    constant in the `Artist` interface and use it in any class, as depicted in Listing
    [4-44](#463938_3_En_4_Chapter.xhtml#PC44).


    ```

    package com.apress.bgn.four.hierarchy;

    interface Artist {

    public static final int LIFESPAN = 100;

    // other code omitted

    }

    public class Performer extends Human implements Musician, Actor {

    @Override

    public int getTimeToLive() {

    return (LIFESPAN - getAge()) / 2;

    }

    // other code omitted

    }

    Listing 4-44

    The Constant LIFESPAN in the Artist Interface

    ```


    When declaring constants in interfaces, the three accessors `public`, `static,
    and final` are redundant, because they are implied. The explanation for each is
    quite simple:


    *   Interfaces cannot have mutable fields, so by default they have to be `final`.


    *   Since interfaces cannot be instantiated, they cannot have fields that will
    become properties on instances, so they have to be `static`.


    *   Since anything in an interface body must be accessible to implementing classes,
    they have to be `public.`


    As for static methods in interfaces, they are usually utility methods that are
    specific to certain operations within the hierarchy the interface is part of.
    Let’s add a static method that checks if the name provided as an argument is capitalized,
    and capitalizes it if it isn’t.


    The code is depicted in Listing [4-45](#463938_3_En_4_Chapter.xhtml#PC45), where
    the method `capitalize` is declared in the `Artist` interface and used in the
    `Performer` class.


    ```

    package com.apress.bgn.four.hierarchy;

    interface Artist {

    public static String capitalize(String name) {

    Character c = name.charAt(0);

    if (Character.isLowerCase(c)) {

    Character upperC = Character.toUpperCase(c);

    name.replace(c, upperC);

    }

    return name;

    }

    // other code omitted

    }

    public class Performer extends Human implements Musician, Actor {

    public String getCapitalizedName() {

    return Artist.capitalize(this.name);

    }

    // other code omitted

    }

    Listing 4-45

    Public Static Method in Interface

    ```


    In Java 8, any method with a body that was not declared as `default` had to be
    declared `public` and `static`, because of the reasons mentioned previously. If
    `default` or `static` methods share a lot of code, then a `default` or `static`
    method can group that code and have the others call it, right? The only problem
    appears when there is a need for that code to be private. That was not possible
    in Java 8, because everything in the body of an interface was `public` by default.
    But it became possible in Java 9.


    ##### Private Methods in Interfaces


    Starting with Java 9, support for `private` and `private static` methods in interfaces
    was introduced. The reason behind this decision was (as you can probably imagine)
    to promote code reusability within interfaces and encapsulation of code that should
    not be shared across implementations of the interface. This means that the action
    performed by the default `isCreative()` method can be modified to also log an
    explanation for the returned value, by calling a `private` method. And just to
    make this example complete, let’s add in a `private static` method printing the
    current system date, as shown in Listing [4-46](#463938_3_En_4_Chapter.xhtml#PC46).


    ```

    package com.apress.bgn.four.hierarchy;

    interface Artist {

    default boolean isCreative() {

    explain();

    return true;

    }

    private void explain() {

    log();

    System.out.println("A true artist has a creative nature.");

    }

    private static void log() {

    System.out.println("[LOG] checked creativity on: " + new Date());

    }

    /**

    * Yes this is allowed and you can run this. ;)

    */

    public static void main() {

    Artist artist =  new Performer("Myles Kennedy", 54, 1.8F, Gender.MALE);

    artist.isCreative();

    }

    }

    // output

    //[LOG] checked creativity on: Wed May 08 17:45:15 BST 2024

    //A true artist has a creative nature.

    Listing 4-46

    New private Method Added to the Artist Interface

    ```


    Here are a few last thoughts about private interface methods:


    *   Private methods are only accessible within the interfaces they are declared
    in, and thus should be written to contain sensitive code, which you do not want
    accessed by any other class or interface.


    *   Being private, they cannot be inherited, nor overridden.


    *   A consequence of this is that private methods cannot be abstract.


    When doing development on a concrete project, you will find yourself using classes,
    interfaces, enums, and others. It is up to you how you design and organize your
    code. Just make sure to avoid repetition and keep it clean, uncoupled, and testable.'
  trans: '

    ##### 接口中的静态方法与常量


    从 Java 1 到 Java 8 版本，接口只能包含抽象方法和静态常量。接口在 Java 8 中发生了变化，最重要的变化是支持 `default` 和 `private`
    方法。


    *常量*，即初始化后永不改变的变量，不需要实现，因此允许开发者在接口主体中声明它们，这很合理，对吧？当然，你也可以使用枚举来实现同样的目的，但有时你可能希望将相关组件放在一起。在之前的示例中，我们在
    `Human` 类中声明了一个 `LIFESPAN` 常量。由于任何实现 `Artist` 的类都可能需要 `LIFESPAN` 来进行某种计算，我们可以将这个常量移到
    `Artist` 接口中，并在任何类中使用它，如代码清单 4-44 所示。


    ```

    package com.apress.bgn.four.hierarchy;

    interface Artist {

    public static final int LIFESPAN = 100;

    // 其他代码省略

    }

    public class Performer extends Human implements Musician, Actor {

    @Override

    public int getTimeToLive() {

    return (LIFESPAN - getAge()) / 2;

    }

    // 其他代码省略

    }

    代码清单 4-44

    Artist 接口中的常量 LIFESPAN

    ```


    在接口中声明常量时，三个访问修饰符 `public`、`static` 和 `final` 是多余的，因为它们是隐含的。每个修饰符的解释相当简单：


    *   接口不能有可变字段，因此默认情况下它们必须是 `final` 的。

    *   由于接口无法实例化，它们不能拥有会成为实例属性的字段，因此它们必须是 `static` 的。

    *   由于接口主体中的任何内容都必须能被实现类访问，因此它们必须是 `public` 的。


    至于接口中的静态方法，它们通常是工具方法，专门用于接口所属层次结构中的特定操作。让我们添加一个静态方法，检查作为参数提供的名称是否大写，如果不是则将其大写。


    代码如代码清单 4-45 所示，其中 `capitalize` 方法在 `Artist` 接口中声明，并在 `Performer` 类中使用。


    ```

    package com.apress.bgn.four.hierarchy;

    interface Artist {

    public static String capitalize(String name) {

    Character c = name.charAt(0);

    if (Character.isLowerCase(c)) {

    Character upperC = Character.toUpperCase(c);

    name.replace(c, upperC);

    }

    return name;

    }

    // 其他代码省略

    }

    public class Performer extends Human implements Musician, Actor {

    public String getCapitalizedName() {

    return Artist.capitalize(this.name);

    }

    // 其他代码省略

    }

    代码清单 4-45

    接口中的公共静态方法

    ```


    在 Java 8 中，任何带有方法体且未声明为 `default` 的方法都必须声明为 `public` 和 `static`，原因如前所述。如果 `default`
    或 `static` 方法共享大量代码，那么可以用一个 `default` 或 `static` 方法将这些代码分组，并让其他方法调用它，对吧？唯一的问题出现在需要将这些代码设为私有的时候。这在
    Java 8 中是不可能的，因为接口主体中的所有内容默认都是 `public` 的。但在 Java 9 中，这成为了可能。


    ##### 接口中的私有方法


    从 Java 9 开始，接口中引入了对 `private` 和 `private static` 方法的支持。做出这一决定的原因（你可能已经猜到）是为了促进接口内的代码复用，并封装那些不应在接口实现之间共享的代码。这意味着，默认方法
    `isCreative()` 执行的操作可以被修改，通过调用一个 `private` 方法来记录返回值的解释。为了让这个示例更完整，让我们添加一个 `private
    static` 方法来打印当前系统日期，如代码清单 4-46 所示。


    ```

    package com.apress.bgn.four.hierarchy;

    interface Artist {

    default boolean isCreative() {

    explain();

    return true;

    }

    private void explain() {

    log();

    System.out.println("真正的艺术家具有创造性天赋。");

    }

    private static void log() {

    System.out.println("[日志] 检查创造力时间：" + new Date());

    }

    /**

    * 是的，这是允许的，你可以运行它。 ;)

    */

    public static void main() {

    Artist artist =  new Performer("迈尔斯·肯尼迪", 54, 1.8F, Gender.MALE);

    artist.isCreative();

    }

    }

    // 输出

    //[日志] 检查创造力时间：Wed May 08 17:45:15 BST 2024

    //真正的艺术家具有创造性天赋。

    代码清单 4-46

    添加到 Artist 接口的新私有方法

    ```


    以下是关于接口私有方法的最后几点思考：


    *   私有方法只能在其声明的接口内部访问，因此应编写它们来包含敏感代码，这些代码你不希望被任何其他类或接口访问。

    *   由于是私有的，它们不能被继承，也不能被重写。

    *   由此带来的一个后果是，私有方法不能是抽象的。


    在实际项目开发中，你会发现自己会使用类、接口、枚举等。如何设计和组织代码取决于你。只需确保避免重复，保持代码整洁、低耦合且可测试。

    '
- fmt: '### Records


    Java `record`是一种特殊的类类型，具有用于定义不可变数据类的清晰语法。Java 编译器会处理你的记录代码，并生成构造函数、getter 以及其他专用方法，例如`toString()`、`hashCode()`和`equals()`。


    **信息**


    `hashCode()`和`equals()`专用方法定义在`Object`类中，因此它们隐式地定义在每个 Java 类中。它们在建立实例的身份标识方面非常重要，并将在**第**
    [**5**](#463938_3_En_5_Chapter.xhtml)**章**的**集合**部分中介绍。


    Java 记录是在 JDK 14 中作为预览特性引入的，这远晚于其他编程语言（如 C#、Scala 或 Kotlin）中引入类似类型构造的时间。Java 开发者通过使用诸如
    Lombok 之类的库来避免编写大量样板代码的麻烦。Lombok 在本章的**封装数据**部分已经提到过，其中也列出了使用它的一些缺点。


    Lombok 需要使用特殊的注解来注解类，这些注解会告诉其注解处理器在编译时生成所需的字节码。它适用于生成现在由 Java 记录支持的所有组件。


    清单 [4-47](#463938_3_En_4_Chapter.xhtml#PC47) 展示了如何使用 Lombok 编写`Human`类。


    ```java

    package com.apress.bgn.four.lombok;

    import com.apress.bgn.four.classes.Gender;

    import lombok.*;

    @NoArgsConstructor

    @AllArgsConstructor

    @RequiredArgsConstructor

    @ToString

    @EqualsAndHashCode

    public class Human {

    @Getter

    @Setter

    @NonNull

    private String name;

    @Getter

    @Setter

    @NonNull

    private int age;

    @Getter

    @Setter

    private float height;

    @Getter

    @Setter

    private Gender gender;

    }

    ```

    *清单 4-47 Human 类——Lombok 版本*


    Lombok 的另一个问题是，在使用模块的 Java 项目中，它会变得不可预测。在编译时操作代码以注入额外功能是一项敏感操作，需要访问 JDK 内部 API，而这些
    API 可能出于安全原因未导出。例如，在编写本书上一版时，使用 Lombok 编译项目无法工作，因为 Lombok 需要访问模块`jdk.compiler`中的类`com.sun.tools.javac.processing.JavacProcessingEnvironment`，而该模块并未导出包`com.sun.tools.javac.processing`。


    如果没有 Lombok，清单 [4-47](#463938_3_En_4_Chapter.xhtml#PC47) 中的类将会有更多行代码，因为代码片段中的所有注解都替代了开发者本应编写的方法：


    *   `@NoArgsConstructor`告诉 Lombok 为`Human`类生成一个默认的无参构造函数的字节码。

    *   `@AllArgsConstructor`告诉 Lombok 为`Human`类生成一个需要为每个字段提供参数的构造函数的字节码。

    *   `@RequiredArgsConstructor`告诉 Lombok 为`Human`类生成一个需要为所有必需字段（即用`@NotNull`注解的字段）提供参数的构造函数的字节码。

    *   `@ToString`告诉 Lombok 为`toString()`方法生成字节码。该方法的实现由 Lombok 根据类中的所有字段决定。

    *   `@EqualsAndHashCode`告诉 Lombok 为`equals()`和`hashCode()`方法生成字节码。这些方法的实现由 Lombok
    根据类中的所有字段决定。


    随着记录的引入，只要项目使用 JDK 15+ 编译和运行，就不再需要 Lombok。而且你不需要你的实例是不可变的。JDK 生成的类是不可变的数据类，因此没有
    setter，但在响应式编程的新世界中，拥有不可变记录无论如何都是必须的。`Human`类的`record`实现如清单 [4-48](#463938_3_En_4_Chapter.xhtml#PC48)
    所示，同时还包括实例化`Human`所需的代码。


    ```java

    package com.apress.bgn.four.records;

    import com.apress.bgn.four.classes.Gender;

    record Human(String name, int age, float height, Gender gender) {

    }

    public class RecordDemo {

    public static void main(String... args) {

    Human john = new Human("John Mayer", 47, 1.9f, Gender.MALE);

    System.out.println("John as string: " + john);

    System.out.println("John''s hashCode: " + john.hashCode());

    System.out.println("John''s name: " + john.name());

    }

    }

    ```

    *清单 4-48 简单的 Human 记录及其使用类*


    如你所见，记录可以像类一样被实例化，通过使用`new`关键字调用构造函数。毕竟，记录只是另一种类型的类。此外，由于不需要 setter（因为对象是不可变的），getter
    也没有太大意义。因此，为了访问属性值，会生成与字段同名的、返回字段值的方法。这可以通过使用 IntelliJ IDEA 查看生成的`Human.class`文件中的字节码来确认。只需在`chapter04/target/classes`目录中找到此文件，选中它，然后从菜单中选择
    **View ➤ Show Bytecode**。应该会弹出一个窗口，其内容与图 [4-13](#463938_3_En_4_Chapter.xhtml#Fig13)
    中显示的内容非常相似。


    ![](images/463938_3_En_4_Chapter/463938_3_En_4_Fig13_HTML.jpg)


    *图 4-13 `Human`记录的字节码*


    从字节码中，我们可以发现关于记录的另一个重要信息：字节码中显示的类是`final`的，因此记录不能被扩展。创建子记录是不可能的。此外，所有记录类都隐式地继承自类`java.lang.Record`。


    运行`RecordDemo`类中的`main(..)`方法会产生如清单 [4-49](#463938_3_En_4_Chapter.xhtml#PC49)
    所示的结果。


    ```

    John as string: Human[name=John Mayer, age=44,height=1.9,gender=MALE]

    John''s hashCode: 1711330636

    John''s name: John Mayer

    ```

    *清单 4-49 执行 RecordDemo 类打印的结果*


    记录的`toString()`实现相当不错。`john`实例的属性值可以轻松读取和理解。


    记录是可以自定义的。没有什么能阻止你为`toString()`、`equals()`和`hashCode()`方法提供自定义实现，并在记录体中提供各种构造函数，就像你对类所做的那样。唯一的限制是构造函数必须使用`this`关键字调用记录的默认构造函数。清单
    [4-50](#463938_3_En_4_Chapter.xhtml#PC50) 展示了一个仅需要 name 和 age 的构造函数。


    ```java

    package com.apress.bgn.four.records;

    import com.apress.bgn.four.classes.Gender;

    record Human(String name, int age, float height, Gender gender) {

    public Human(String name, int age) {

    this(name, age, -0f, null);

    }

    }

    ```

    *清单 4-50 带有一个额外构造函数的简单 Human 记录*


    由于为记录生成的默认构造函数和其他方法依赖于记录的参数，因此不能在记录体中声明额外的字段。但是，支持静态变量和方法。图 [4-14](#463938_3_En_4_Chapter.xhtml#Fig14)
    描绘了一个在其体中声明了一个额外常量和字段的记录（而编辑器不喜欢后者）。


    ![](images/463938_3_En_4_Chapter/463938_3_En_4_Fig14_HTML.jpg)


    *图 4-14 带有常量和字段的记录*


    当数据不可变性是一个要求时（这在大多数情况下都是如此，例如，用于在软件应用于系统之间传输数据的 DTO），记录非常实用。没有记录也可以实现，但这需要开发者付出大量努力——像我这样的老派开发者在必要时总是会这样做。*你们这些年轻人根本不知道现在有多轻松！*'
  raw: '#### Records


    The Java `record` is a special type of class with a clear syntax for defining
    immutable data-only classes. The Java compiler takes the code of your record and
    generates constructors, getters, and other specialized methods such as `toString()`,
    `hashCode()`, and `equals()`.


    Information


    The `hashCode()` and `equals()` specialized methods are defined in the `Object`
    class, and thus they are implicitly defined in every Java class. They are very
    important in establishing the identity of an instance and will be covered in **Chapter**
    [**5**](#463938_3_En_5_Chapter.xhtml), in the **Collections** section.


    Java records were introduced in JDK 14 as a preview feature, long after similar
    types of constructs were introduced in other programming languages as C#, Scala,
    or Kotlin. Java developers avoided the hassle of writing a lot of boilerplate
    code by using libraries such as Lombok. Lombok was already mentioned in the **Encapsulating
    Data** section of this chapter, where some disadvantages of using it were listed
    too.


    Lombok requires annotating classes with special annotations that tell its annotation
    processor to generate the desired bytecode at compile time. It works for generation
    of all the components now supported using Java records.


    Listing [4-47](#463938_3_En_4_Chapter.xhtml#PC47) shows how the `Human` class
    would be written using Lombok.


    ```

    package com.apress.bgn.four.lombok;

    import com.apress.bgn.four.classes.Gender;

    import lombok.*;

    @NoArgsConstructor

    @AllArgsConstructor

    @RequiredArgsConstructor

    @ToString

    @EqualsAndHashCode

    public class Human {

    @Getter

    @Setter

    @NonNull

    private String name;

    @Getter

    @Setter

    @NonNull

    private int age;

    @Getter

    @Setter

    private float height;

    @Getter

    @Setter

    private Gender gender;

    }

    Listing 4-47

    Human Class—the Lombok Version

    ```


    Another issue with Lombok is that it becomes unpredictable in a Java project using
    modules. Manipulating code at compile time to inject extra functionalities is
    a sensitive operation that requires access to JDK internals that might not be
    exported for security reasons. For example, when writing the previous edition
    of this book, compiling the project using Lombok didn’t work because Lombok required
    access to class `com.sun.tools.javac.processing.JavacProcessingEnvironment` from
    module `jdk.compiler` that did not export the `com.sun.tools.javac.processing`
    package.


    Without Lombok, the class in Listing [4-47](#463938_3_En_4_Chapter.xhtml#PC47)
    would have a lot more lines, because all the annotations in code snippets replace
    methods that the developer should write otherwise:


    *   `@NoArgsConstructor` tells Lombok to generate the bytecode for a default no-arguments
    constructor for the `Human` class.


    *   `@AllArgsConstructor` tells Lombok to generate the bytecode for a constructor
    requiring an argument for each field of the `Human` class.


    *   `@RequiredArgsConstructor` tells Lombok to generate the bytecode for a constructor
    requiring an argument for all required fields (the ones annotated with `@NotNull`).


    *   `@ToString` tells Lombok to generate the bytecode for the `toString()` method.
    The implementation of this method is decided by `Lombok` based on all the fields
    in the class.


    *   `@EqualsAndHashCode` tells Lombok to generate the bytecode for the `equals()`
    and `hashCode()` methods. The implementation of these methods is decided by Lombok
    based on all the fields in the class.


    With the introduction of records, Lombok is no longer needed as long as the project
    is being compiled and run using JDK 15+. And you don’t need your instances to
    be immutable. The classes generated by the JDK are immutable data-only classes,
    so there are no setters, but in the brave new world of reactivity, having immutable
    records is a must anyway. The `record` implementation of the `Human` class is
    shown in Listing [4-48](#463938_3_En_4_Chapter.xhtml#PC48) together with the code
    necessary to instantiate a `Human`.


    ```

    package com.apress.bgn.four.records;

    import com.apress.bgn.four.classes.Gender;

    record Human(String name, int age, float height, Gender gender) {

    }

    public class RecordDemo {

    public static void main(String... args) {

    Human john = new Human("John Mayer", 47, 1.9f, Gender.MALE);

    System.out.println("John as string: " + john);

    System.out.println("John''s hashCode: " + john.hashCode());

    System.out.println("John''s name: " + john.name());

    }

    }

    Listing 4-48

    Simple Human Record and Class Where Used

    ```


    As you can see, records can be instantiated in the same way classes are, by calling
    a constructor using the `new` keyword. After all, records are just another type
    of classes. Also, since there is no need for setters, because the objects are
    immutable, getters don’t make much sense either. So to access the property values,
    methods with the same name as the field are generated that return the field value.
    This can be confirmed by viewing the bytecode in the generated `Human.class` file
    using IntelliJ IDEA. Just look for this file in the `chapter04/target/classes`
    directory, select it, and from the menu select **View ➤ Show Bytecode**. A window
    should pop up with contents pretty similar to the ones shown in Figure [4-13](#463938_3_En_4_Chapter.xhtml#Fig13).


    ![](images/463938_3_En_4_Chapter/463938_3_En_4_Fig13_HTML.jpg)


    Figure 4-13


    Bytecode of the `Human` record


    From the bytecode we can figure out yet another important thing about records:
    the class being shown in the bytecode is `final`, thus records cannot be extended.
    Creation of sub-records is not possible. Also, all record classes implicitly extend
    class `java.lang.Record`.


    Running the `main(..)` method in the `RecordDemo` class yields the results shown
    in Listing [4-49](#463938_3_En_4_Chapter.xhtml#PC49).


    ```

    John as string: Human[name=John Mayer, age=44,height=1.9,gender=MALE]

    John''s hashCode: 1711330636

    John''s name: John Mayer

    Listing 4-49

    Results Printed by Execution of the RecordDemo Class

    ```


    The `toString()` implementation of a record is decent enough. The values of the
    properties of the `john` instance can be read and understood easily.


    Records can be customized. Nothing stops you from providing a custom implementation
    for the `toString()`, `equals()`, and `hashCode()` methods and providing various
    constructors in the record body, in the same way you would do it for a class.
    The only catch is that the constructor must call the default constructor of the
    record using the `this` keyword. Listing [4-50](#463938_3_En_4_Chapter.xhtml#PC50)
    shows a constructor being added that only requires name and age.


    ```

    package com.apress.bgn.four.records;

    import com.apress.bgn.four.classes.Gender;

    record Human(String name, int age, float height, Gender gender) {

    public Human(String name, int age) {

    this(name, age, -0f, null);

    }

    }

    Listing 4-50

    Simple Human Record with an Additional Constructor

    ```


    Since the default constructor and other methods generated for a record rely on
    the arguments of the record, no extra fields can be declared in a record’s body.
    However, static variables and methods are supported. Figure [4-14](#463938_3_En_4_Chapter.xhtml#Fig14)
    depicts a record with an extra constant and a field declared in its body (and
    the editor doesn’t like the latter).


    ![](images/463938_3_En_4_Chapter/463938_3_En_4_Fig14_HTML.jpg)


    Figure 4-14


    Record with constant and field


    Records are pretty practical when data immutability is a requirement, which is…most
    of the time (e.g., data transfer objects [DTOs] used to transfer data between
    software application subsystems). It can be done without records, but it requires
    a lot of effort from the developer—effort that old-school developers like me were
    doing whenever necessary. *You youngsters have no idea how easy you have it nowadays!*'
  trans: '

    #### 记录（Records）


    Java 的 `record` 是一种特殊的类类型，具有清晰的语法，用于定义不可变的数据类。Java 编译器会处理你的记录代码，并自动生成构造器、getter
    方法以及其他专用方法，例如 `toString()`、`hashCode()` 和 `equals()`。


    信息


    `hashCode()` 和 `equals()` 这两个专用方法定义在 `Object` 类中，因此它们隐式地存在于每一个 Java 类中。它们在确立实例的身份标识方面非常重要，相关内容将在**第**
    **5** **章**的**集合**部分进行介绍。


    Java 记录是在 JDK 14 中作为预览特性引入的，这远在其他编程语言（如 C#、Scala 或 Kotlin）引入类似类型构造之后。在此之前，Java
    开发者通过使用诸如 Lombok 之类的库来避免编写大量样板代码的麻烦。本章的**封装数据**部分已经提到了 Lombok，同时也列出了使用它的一些缺点。


    Lombok 要求使用特殊的注解来标注类，这些注解会告知其注解处理器在编译时生成所需的字节码。它能够生成现在通过 Java 记录所支持的所有组件。


    清单 4-47 展示了如何使用 Lombok 编写 `Human` 类。


    ```

    package com.apress.bgn.four.lombok;

    import com.apress.bgn.four.classes.Gender;

    import lombok.*;

    @NoArgsConstructor

    @AllArgsConstructor

    @RequiredArgsConstructor

    @ToString

    @EqualsAndHashCode

    public class Human {

    @Getter

    @Setter

    @NonNull

    private String name;

    @Getter

    @Setter

    @NonNull

    private int age;

    @Getter

    @Setter

    private float height;

    @Getter

    @Setter

    private Gender gender;

    }

    清单 4-47

    Human 类——Lombok 版本

    ```


    Lombok 的另一个问题是，在使用模块的 Java 项目中，它会变得不可预测。在编译时操纵代码以注入额外功能是一项敏感操作，需要访问 JDK 内部 API，而这些
    API 可能出于安全原因并未被导出。例如，在编写本书上一版时，使用 Lombok 编译项目就无法工作，因为 Lombok 需要访问 `jdk.compiler`
    模块中的 `com.sun.tools.javac.processing.JavacProcessingEnvironment` 类，而该模块并未导出 `com.sun.tools.javac.processing`
    包。


    如果没有 Lombok，清单 4-47 中的类将会有更多的代码行，因为代码片段中的所有注解都替代了开发者本应编写的方法：


    *   `@NoArgsConstructor` 告诉 Lombok 为 `Human` 类生成一个默认的无参构造器的字节码。

    *   `@AllArgsConstructor` 告诉 Lombok 为 `Human` 类生成一个需要为每个字段提供参数的构造器的字节码。

    *   `@RequiredArgsConstructor` 告诉 Lombok 为 `Human` 类生成一个需要为所有必需字段（即那些用 `@NotNull`
    注解的字段）提供参数的构造器的字节码。

    *   `@ToString` 告诉 Lombok 生成 `toString()` 方法的字节码。该方法的实现由 Lombok 根据类中的所有字段决定。

    *   `@EqualsAndHashCode` 告诉 Lombok 生成 `equals()` 和 `hashCode()` 方法的字节码。这些方法的实现由
    Lombok 根据类中的所有字段决定。


    随着记录的引入，只要项目使用 JDK 15+ 进行编译和运行，就不再需要 Lombok 了。而且，你也不需要你的实例是可变的。JDK 生成的类是不可变的数据类，因此没有
    setter 方法，但在响应式编程这个崭新的世界里，拥有不可变的记录无论如何都是必须的。`Human` 类的 `record` 实现如清单 4-48 所示，同时还包括实例化
    `Human` 所需的代码。


    ```

    package com.apress.bgn.four.records;

    import com.apress.bgn.four.classes.Gender;

    record Human(String name, int age, float height, Gender gender) {

    }

    public class RecordDemo {

    public static void main(String... args) {

    Human john = new Human("John Mayer", 47, 1.9f, Gender.MALE);

    System.out.println("John as string: " + john);

    System.out.println("John''s hashCode: " + john.hashCode());

    System.out.println("John''s name: " + john.name());

    }

    }

    清单 4-48

    简单的 Human 记录及其使用类

    ```


    如你所见，记录可以像类一样被实例化，即通过使用 `new` 关键字调用构造器。毕竟，记录只是另一种类型的类。此外，由于不需要 setter 方法（因为对象是不可变的），getter
    方法也就没什么意义了。因此，为了访问属性值，会生成与字段同名的、返回字段值的方法。这可以通过使用 IntelliJ IDEA 查看生成的 `Human.class`
    文件中的字节码来确认。只需在 `chapter04/target/classes` 目录中找到该文件，选中它，然后从菜单中选择 **View ➤ Show
    Bytecode**。应该会弹出一个窗口，其内容与图 4-13 所示非常相似。


    ![](img/463938_3_En_4_Fig13_HTML.jpg)


    图 4-13


    `Human` 记录的字节码


    从字节码中，我们还可以发现关于记录的另一个重要信息：字节码中显示的类是 `final` 的，因此记录不能被继承。创建子记录是不可能的。此外，所有记录类都隐式地继承自
    `java.lang.Record` 类。


    运行 `RecordDemo` 类中的 `main(..)` 方法，会得到如清单 4-49 所示的结果。


    ```

    John as string: Human[name=John Mayer, age=44,height=1.9,gender=MALE]

    John''s hashCode: 1711330636

    John''s name: John Mayer

    清单 4-49

    执行 RecordDemo 类打印的结果

    ```


    记录的 `toString()` 实现相当不错。`john` 实例的属性值可以轻松地读取和理解。


    记录是可以定制的。你可以像为类做的那样，在记录体中为 `toString()`、`equals()` 和 `hashCode()` 方法提供自定义实现，并提供各种构造器。唯一的限制是，构造器必须使用
    `this` 关键字调用记录的默认构造器。清单 4-50 展示了一个仅需要姓名和年龄的构造器。


    ```

    package com.apress.bgn.four.records;

    import com.apress.bgn.four.classes.Gender;

    record Human(String name, int age, float height, Gender gender) {

    public Human(String name, int age) {

    this(name, age, -0f, null);

    }

    }

    清单 4-50

    带有一个额外构造器的简单 Human 记录

    ```


    由于为记录生成的默认构造器和其他方法依赖于记录的参数，因此不能在记录体中声明额外的字段。但是，支持静态变量和方法。图 4-14 描绘了一个在其体中声明了一个额外常量和字段的记录（并且编辑器不喜欢后者）。


    ![](img/463938_3_En_4_Fig14_HTML.jpg)


    图 4-14


    带有常量和字段的记录


    当数据不可变性是一个需求时，记录非常实用，而这种情况……在大多数时候都会出现（例如，用于在软件应用子系统之间传输数据的**数据传输对象**）。没有记录也能实现，但这需要开发者付出大量努力——像我这样的老派开发者过去在必要时总是会这样做。*你们这些年轻人根本不知道现在有多轻松！*

    '
- fmt: '# Sealed Classes and Interfaces


    Sealed classes and interfaces were a preview feature introduced in JDK 15 and
    finalized in Java 17. They were introduced to solve the problem of choosing the
    right scope modifier for developers’ classes and interfaces and to allow them
    to control which code is responsible for implementing them, thus allowing for
    better security.


    Security is always a concern, and for some projects, when classes need to be extended,
    making them `public` or `protected` is a risk. This is where the `sealed` modifier
    and its entire family should come in handy. It allows developers to `seal` a class
    to prevent it from being extended, except for a few subclasses declared using
    the `permits` keyword. Sure, the superclass seems to be doomed to be updated many
    times when new subclasses are added to the project, but it is an acceptable trade-off
    to have a better secured application. Taking this into consideration, let’s seal
    a version of our `RecordDemo` class and permit only class `Performer` to extend
    it. Listing [4-51](#463938_3_En_4_Chapter.xhtml#PC51) depicts the two classes.


    ```

    // Human.java

    package com.apress.bgn.four.sealed.one;

    import com.apress.bgn.four.classes.Gender;

    // Human.java

    public sealed class Human

    permits Performer {

    protected String name;

    protected int age;

    protected float height;

    // other code omitted

    }

    // Performer.java

    package com.apress.bgn.four.sealed.one;

    import com.apress.bgn.four.classes.Gender;

    public final class Performer extends Human {

    // other code omitted

    }

    Listing 4-51

    Sealed Class and Allowed Subclass

    ```


    If the extending classes are declared in the same source file, there is no need
    to list them after the `permits` keyword. If there are no extending classes outside
    the file, the `permits` keyword can be omitted altogether.


    Classes allowed to extend sealed classes should be sealed or final themselves.
    If we need one of those classes to allow being extended by unknown classes, the
    `non-sealed` modifier allows that. Listing [4-52](#463938_3_En_4_Chapter.xhtml#PC52)
    shows the class `Engineer` that is declared `non-sealed`; of course, this class
    must be added to the list in the `permits` directive from the `RecordDemo` class.


    ```

    package com.apress.bgn.four.sealed.one;

    import com.apress.bgn.four.classes.Gender;

    public non-sealed class Engineer extends Human {

    public Engineer(String name, int age, Gender gender) {

    super(name, age, gender);

    }

    public Engineer(String name, int age, float height, Gender gender) {

    super(name, age, height, gender);

    }

    }

    Listing 4-52

    non-sealed Class That Extends a sealed Class

    ```


    The `sealed` modifier can be applied to interfaces as well. The `permits` keyword
    specifies the classes that are permitted to implement the sealed interface.


    **Caution**


    You would expect the `permits` keyword to also support interfaces that extend
    the sealed interface, but in the current version of JDK it doesn’t. *(You can
    try it if you want.)*


    **Important**


    The same rule applies for sealed interfaces as well: classes implementing a sealed
    interface are expected to be sealed, non-sealed, or final.


    Listing [4-53](#463938_3_En_4_Chapter.xhtml#PC53) shows the sealed `Mammal` interface,
    which is implemented by the sealed `Human` class.


    ```

    package com.apress.bgn.four.sealed.two;

    public sealed interface Mammal permits Human {

    }

    public sealed class Human

    implements Mammal

    permits Performer, Engineer {

    // rest of the code omitted

    }

    Listing 4-53

    sealed Mammal Interface and the Sealed Human Class

    ```


    **Important**


    A limitation of sealed classes and interfaces is that any subclasses and implementing
    classes need to be in the same module.


    Also, in case it wasn’t obvious, any classes present after the `permits` keyword
    must extend the sealed class/implement the sealed interface. If a class is specified
    after the `permits` keyword and does not extend the sealed class/implement the
    sealed interface, the compiler won’t like it.


    Sealed classes are a good for records, since records are by default final.


    # Hidden Classes


    Hidden classes are an interesting feature for developers working on development
    frameworks such as Hibernate or Spring, because these frameworks generate code
    dynamically. The generated classes (or interfaces) cannot be used directly by
    the bytecode of other classes, since they are destined to be used only internally
    by the framework. Starting with Java 15, generating dynamic classes that are hidden
    has become an industry standard.


    Hidden classes are not discoverable through a mechanism such as reflection^([^(44)](#fn44)).
    They are generated dynamically by the framework, they have a short lifespan, and
    they are discarded when no longer needed, which leads to performance improvement
    of applications running on a JVM. Since hidden classes are undiscoverable, they
    cannot be used as a superclass, or as a type for fields or parameters. In case
    of error, by default, they do not show up in stack traces, but there are JVM options
    to show them.


    Hidden classes are too advanced for a beginner’s book, but if you are curious
    to learn more about them, there is an example in the code for this book—look at
    the class `HiddenClassDemo`.


    # Annotation Types


    An annotation is defined similarly to an interface, the only difference being
    that the `interface` keyword is preceded by the `@` (at) sign. Annotation types
    are a form of interfaces, and most times are used as markers (look at the previous
    Lombok example). For example, you’ve probably noticed the `@Override` annotation.
    This annotation is placed on methods generated automatically by intelligent IDEs
    when classes extend classes or implement interfaces. Its declaration in the JDK
    is depicted in the code snippet in Listing [4-54](#463938_3_En_4_Chapter.xhtml#PC54).


    ```

    package java.lang;

    import java.lang.annotation.*;

    /**

    * documentation omitted

    */

    @Target(ElementType.METHOD)

    @Retention(RetentionPolicy.SOURCE)

    public @interface Override {

    }

    Listing 4-54

    The JDK @Override Declaration

    ```


    Annotations that do not declare any property are called **marker** or **informative**
    annotations. They are needed only to inform other classes in the application,
    or to inform developers of the purpose of the components they are placed on. They
    are not mandatory, and the code will compile without them.


    Java 8 introduced an annotation named `@FunctionalInterface`. This annotation
    was placed on all Java interfaces containing exactly one abstract method, and
    that can be used in *lambda expressions*.'
