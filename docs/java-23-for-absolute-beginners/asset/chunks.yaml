  trans: '

    ### Java 11


    JDK 11^(¹¹)（又称 Java 18.9）于 2018 年 9 月 25 日发布，包含以下特性：


    *   移除了用于构建企业级 Java 应用程序的 JEE 高级组件以及 Corba（一种用于远程调用的老旧技术，允许你的应用程序与安装在其他计算机上的应用程序进行通信）模块。


    *   Lambda 参数的局部变量语法允许在声明隐式类型 Lambda 表达式的形式参数时使用 `var` 关键字。


    *   Epsilon，一种低开销的垃圾收集器（一种无 GC 收集器，因此基本上可以在没有 GC 的情况下运行应用程序），为垃圾收集提供了更多优化，相关内容在**第**
    **13** **章**中介绍。


    *   引入了新的 HTTP 客户端 API。


    *   更多的并发更新（与并行执行相关，在**第** **5** **章**中提及）。


    *   Nashorn JavaScript 脚本引擎和 API 被标记为已弃用，并计划在未来的版本中移除。ECMAScript 语言结构发展非常迅速，因此
    Nashorn 变得越来越难以维护。


    除了这些变化之外，还推测应该引入一种新的版本命名变更，因为 `$YEAR.$MONTH` 格式在开发者中反响不佳。（为什么有这么多版本命名变更，对吧？这真的那么重要吗？显然是的。）提议的版本命名变更与
    Java 9 中引入的类似。


    安装 JDK 11 后，在终端中运行 `java -version` 会显示类似于清单 1-5 的日志。


    ```

    $ java -version

    java version "11.0.20" 2023-07-18 LTS

    Java(TM) SE Runtime Environment 18.9 (build 11.0.20+9-LTS-256)

    Java HotSpot(TM) 64-Bit Server VM 18.9 (build 11.0.20+9-LTS-256, mixed mode)

    清单 1-5

    执行 java -version 的 Java 11 日志

    ```


    如清单 1-5 所示，JDK 11 是一个**长期支持（LTS）版本**，提供数年的支持。


    与 JDK 11 的发布同时，Oracle 宣布他们将开始对 Java SE 8 许可证收费，因此试图降低软件成本的小型企业开始寻找替代方案。有两个免费选项：AdoptJDK
    和 OpenJDK。AdoptOpenJDK^(¹²) 通过完全开源的构建脚本和基础设施，为多个平台提供预构建的 OpenJDK 二进制文件。


    OpenJDK 拥有与 Oracle JDK 相同的代码，具体取决于你使用的提供商。OpenJDK 的另一个优势是，虽然 Oracle JDK 无法修改以适应业务应用程序的需求，但
    OpenJDK 可以修改，因为它采用相当宽松的 GNU 通用公共许可证进行许可。


    此外，如果资金不是问题，Amazon Corretto、Azul Zulu 和 GraalVM 都是以某种方式优化过的替代 JDK。


    ### Java 12


    JDK 12^(¹³) 于 2019 年 3 月 29 日发布，包含以下重要特性：


    *   一种名为 Shenandoah 的新实验性垃圾收集器（GC）算法，可减少 GC 暂停时间。


    *   修改了 `switch` 语句的语法，使其也可以用作表达式。此外，它还消除了对 `break` 语句的需求，相关内容在**第** **7** **章**中介绍。


    *   JVM 常量 API，用于对关键类文件和运行时工件的名义描述进行建模。此 API 对于操作类和方法的工具可能很有帮助。


    *   对 G1 垃圾收集器的微小改进，相关内容在**第** **13** **章**中介绍。


    *   类数据共享（CDS）归档，以改进 JDK 构建过程。


    *   大约 100 个微基准测试^(¹⁴)被添加到 JDK 源代码中。


    JDK 12 是 Oracle 自 2017 年 9 月随 JDK 9 引入的六个月发布节奏的一部分。JDK 12 是一个功能版本，支持周期较短。


    ### Java 13


    JDK 13^(¹⁵) 于 2019 年 9 月 17 日发布，包含一些重要特性、数百项较小的增强以及数千个错误修复。此版本最重要的特性包括：


    *   改进了 JDK 12 中添加的 CDS 归档支持


    *   Z 垃圾收集器的增强，相关内容在**第** **13** **章**中介绍


    *   传统 Socket API 的新实现


    *   对 `switch` 表达式的更多改进，相关内容在**第** **7** **章**中介绍


    *   支持文本块（首次预览），相关内容在**第** **5** **章**中介绍


    JDK 13 也是一个支持周期较短的功能版本。


    ### Java 14


    JDK 14^(¹⁶) 于 2020 年 3 月 17 日发布，包含一长串重要特性、增强功能和错误修复。此版本最重要的特性包括：


    *   针对 `instanceof` 运算符的模式匹配，相关内容在**第** **6** **章**中介绍。


    *   JFR 事件流 API，用于在 Java 应用程序和 JVM 运行时收集有关它们的性能分析和诊断数据。


    *   对 G1 垃圾收集器的更多增强，相关内容在**第** **13** **章**中介绍。


    *   移除了 CMS（并发标记清除）垃圾收集器。


    *   支持 macOS 的 Z 垃圾收集器，相关内容在**第** **13** **章**中介绍。


    *   引入了记录（Records），为声明作为浅层不可变数据的透明持有者的类提供了一种紧凑的语法，相关内容在**第** **4** **章**中介绍。


    *   外部内存访问 API 为 Java 程序提供支持，使其能够安全高效地访问 Java 堆之外的外部内存。


    *   改进了 `NullPointerException` 类，以提供更精确的详细信息，从而轻松识别为 `null` 的变量。


    *   引入了 `jpackage` 工具，为原生打包格式提供支持，从而为最终用户提供自然的安装体验。


    尽管此版本包含许多新特性，但其中大部分仅在预览模式下可用，或者被认为处于 `incubation` 阶段，这使得此版本不稳定，不适合作为长期支持版本。


    ### Java 15


    JDK 15^(¹⁷) 于 2020 年 9 月 15 日发布，对先前版本中添加的项目进行了相当大的改进。此版本最值得注意的特性包括：


    *   移除了 Nashorn JavaScript 引擎。


    *   添加了密封类和隐藏类（预览），相关内容在**第** **4** **章**中介绍。


    *   **文本块**增加了对多行字符串字面量的支持，避免了大多数转义序列的需要，以可预测的方式自动格式化字符串，并在需要时让开发者控制格式，相关内容在**第**
    **5** **章**中介绍。


    *   现在支持 Edwards-Curve 数字签名算法（EdDSA）用于加密签名。


    *   对传统 DatagramSocket API 的更多增强。


    *   偏向锁被禁用并弃用，从而提高了多线程应用程序的性能。


    *   记录（Records），第二次预览，相关内容在**第** **4** **章**中介绍。


    JDK 15 只是一个短期版本，在 2021 年 3 月 JDK 16 到来之前，由 Oracle Premier Support 提供六个月的支

    '
- fmt: '### Java 16


    `JDK 16`^([^(18)](#fn18)), released on March 16, 2021, is the reference implementation
    of the version of standard Java set to follow `JDK 15`, which means that everything
    unstable in `JDK 15` is expected to be more stable in `JDK 16`. Aside from that,
    the most notable features of this version are:


    - Introduction of a `Vector API`, to express vector computations that compile
    to optimal vector hardware instructions on supported CPU architectures, to achieve
    superior performance to equivalent scalar computations

    - Strong encapsulation of `JDK` internals by default (covered in Chapter [3](#463938_3_En_3_Chapter.xhtml))

    - Introduction of `Foreign Linker API` to provide statically typed, pure-Java
    access to native code

    - Introduction of an `Elastic Metaspace`, which promotes return of unused `HotSpot`
    class-metadata (i.e., metaspace) memory to the operating system more promptly

    - Added support for C++ 14 language features

    - Final records release (covered in Chapter [4](#463938_3_En_4_Chapter.xhtml))


    `JDK 16` is just a short-term release that was supported with Oracle Premier Support
    for six months until `JDK 17` arrived in September 2021.


    ### Java 17


    `JDK 17`^([^(19)](#fn19)), the next **Long-Term Support** (LTS) release, will
    be supported by Oracle for eight years. It was released on September 14, 2021,
    as per Oracle’s six-month release cadence for Java SE versions.


    The list of features for `JDK 17` are focused on the JVM internals to improve
    performance and deprecate/discard old APIs:


    - Performance and implementation improvements for the `Vector API` introduced
    in `JDK 16`

    - Refinements for sealed classes and interfaces, covered in Chapter [4](#463938_3_En_4_Chapter.xhtml)

    - Introduction of pattern matching for `switch` expressions, covered in Chapter
    [7](#463938_3_En_7_Chapter.xhtml)

    - macOS-specific improvements

    - Enhancements for pseudo-random number generators (PRNGs), including introduction
    of new interfaces and implementations for PRNGs, which include jumpable PRNGs
    and a new class of splitable PRNG algorithms (LXM), covered in Chapter [4](#463938_3_En_4_Chapter.xhtml)

    - Enhancements on encapsulating JDK internals

    - Foreign Function & Memory API, which merges two previously incubating APIs,
    the Foreign-Memory Access API and the Foreign Linker API, to allow developers
    to call up native libraries and process native data without the risks of JNI


    When `JDK 17` is installed, running `java -version` in a terminal shows a log
    that is similar to the one in Listing [1-6](#463938_3_En_1_Chapter.xhtml#PC8).


    ```

    $ java -version

    java version "17.0.9" 2023-10-17 LTS

    Java(TM) SE Runtime Environment (build 17.0.9+11-LTS-201)

    Java HotSpot(TM) 64-Bit Server VM (build 17.0.9+11-LTS-201, mixed mode, sharing)

    Listing 1-6

    Java 17 Log for Execution of java -version

    ```


    ### Java 18


    `JDK 18`,^([^(20)](#fn20)) released on March 22, 2022, is another short-term release
    that focuses on updates of preview and incubator features:


    - Vector API additions (third incubator)

    - **Simple Web Server**, a command-line tool to start a minimal web server that
    serves static files only, covered in Chapter [10](#463938_3_En_10_Chapter.xhtml)

    - Introduction of the `@snippet` tag in JavaDocs to simplify inclusion of code
    in documentation, covered in Chapter [9](#463938_3_En_9_Chapter.xhtml)

    - Pattern Matching for `switch` expressions, second preview, covered in Chapter
    [7](#463938_3_En_7_Chapter.xhtml)

    - Deprecation of the finalization mechanism, in preparation for removal, covered
    in Chapter [13](#463938_3_En_13_Chapter.xhtml)


    ### Java 19


    `JDK 19`,^([^(21)](#fn21)) released on September 20, 2022, is another short-term
    release that focuses on updates of preview and incubator features:


    - Vector API additions (fourth incubator)

    - Record Patterns, first preview, covered in Chapter [6](#463938_3_En_6_Chapter.xhtml)

    - Virtual Threads, first preview, covered in Chapter [5](#463938_3_En_5_Chapter.xhtml)

    - Pattern Matching for `switch` expressions, third preview, covered in Chapter
    [7](#463938_3_En_7_Chapter.xhtml)

    - Structured Concurrency (first incubator), covered in Chapter [5](#463938_3_En_5_Chapter.xhtml)


    ### Java 20


    `JDK 20`,^([^(22)](#fn22)) released on March 21, 2023, is another short-term release
    that focuses on updates of preview and incubator features:


    - Vector API additions (fifth incubator)

    - Record Patterns, second preview, covered in Chapter [7](#463938_3_En_7_Chapter.xhtml)

    - Virtual Threads, second preview, covered in Chapter [5](#463938_3_En_5_Chapter.xhtml)

    - Pattern Matching for `switch` expressions, fourth preview, covered in Chapter
    [7](#463938_3_En_7_Chapter.xhtml)

    - Structured Concurrency (second incubator), covered in Chapter [5](#463938_3_En_5_Chapter.xhtml)

    - Scoped Values (first incubator)'
