    ```


    你刚刚在你的第一个非常简单的 Java 项目中创建了第一个 Java 类。它目前还什么都不会做。通过从 IntelliJ IDEA 的 **Build**
    菜单中选择 **Build Project** 选项（如图 3-20 所示），或者按下因操作系统而异的组合键，即可编译该类。编译该类会生成包含字节码的 `HelloWorld.class`
    文件。默认情况下，IntelliJ IDEA 会将编译结果存储到名为 `out/production` 的目录中。图 3-20 也部分展示了编译项目的结果。


    ![](img/463938_3_En_3_Fig20_HTML.jpg)


    图 3-20


    如何在 IntelliJ IDEA 中编译 Java 项目


    现在是时候让这个类打印 *Hello World!* 了。为此，我们需要向该类添加一个特殊的方法。任何 Java 桌面应用程序都有一个名为 `main` 的特殊方法，该方法必须在顶层类中声明。JRE
    会调用此方法来运行 Java 程序/应用程序，我将其称为*入口点*。如果没有这样的方法，Java 项目就只是一堆类的集合，不可运行，无法执行，也无法实现特定功能。


    提示


    可以这样想象：这就像你有一辆车，但无法启动它，因为点火锁芯不见了。从各方面来看，它是一辆车，但它无法实现汽车的主要目的——真正带你到某个地方。你可以把 `main`
    方法想象成点火锁芯，JRE 会插入钥匙来启动你的应用程序。接下来，我们将把这个方法添加到 `HelloWorld` 类中。


    由于 IntelliJ IDEA 是一个出色的编辑器，你可以通过输入 `psvm` 然后按 **Tab** 键来生成 `main` 方法。这四个字母代表了方法声明中所有组成部分的首字母：**p**ublic、**s**tatic、**v**oid
    和 **m**ain。


    包含 `main` 方法并打印文本 *Hello World!* 的 `HelloWorld` 类如代码清单 3-17 所示。


    ```

    public class HelloWorld {

    public static void main(String... args) {

    System.out.println("Hello World");

    }

    }

    代码清单 3-17

    包含 main 方法的 HelloWorld 类

    ```


    现在我们有了 `main` 方法，就可以执行（或运行）代码了。IntelliJ IDEA 提供了两个选项：


    *   从 **Run** 菜单中，选择 **Run [ClassName]** 选项（或按下该选项右侧显示的组合键）。

    *   右键点击类主体，从出现的菜单中选择 **Run [ClassName].main()**。


    图 3-21 展示了可用于执行该类的两个菜单项以及执行结果。


    ![](img/463938_3_En_3_Fig21_HTML.jpg)


    图 3-21


    如何在 IntelliJ IDEA 中执行 Java 类


    这是 Java 项目最基本的结构。这个项目非常简单，甚至可以从命令行手动编译，那么我们就来试试吧！


    ### 从命令行编译和执行 HelloWorld! 项目


    你可能已经注意到了 IntelliJ IDEA 中的 **Terminal** 按钮。点击该按钮，编辑器内会打开一个终端。在 Windows 上，它将是一个命令提示符实例；在
    Linux 和 macOS 上，则是默认的 shell。IntelliJ 会将终端直接打开到你的项目根目录。接下来你需要执行以下操作：


    *   执行以下命令进入 `src` 目录：`cd src`。（`cd` 是 change directory 的缩写。）

    *   执行 `javac HelloWorld.java` 编译 `HelloWorld.java` 文件。（`javac` 是一个用于编译 Java 文件的
    JDK 可执行文件，IntelliJ IDEA 在后台也会调用它。）

    *   执行 `java HelloWorld` 运行生成的 `HelloWorld.class` 文件中的字节码。


    图 3-22 展示了在 IntelliJ IDEA 的终端中执行这些命令的过程。


    ![](img/463938_3_En_3_Fig22_HTML.jpg)


    图 3-22


    在 IntelliJ IDEA 内部的终端中手动编译和运行 `HelloWorld` 类


    看起来很简单，对吧？实际上就是这么简单，因为没有定义任何包或 Java 模块。*但是，等等，这真的可能吗？* 嗯，是的。如果你没有定义包，该类仍然属于一个未命名的默认包，这是
    JSE 平台默认提供的，用于开发小型、临时性的教学应用程序，就像你现在正在构建的这个。


    那么，让我们把项目变得稍微复杂一点，为我们的类添加一个命名包。

    '
- fmt: '### Putting the `HelloWorld` Class in a Package


    As pointed out previously in Figure [3-18](#463938_3_En_3_Chapter.xhtml#Fig18),
    the context menu that opens when you right-click the `src` directory contains
    a **Package** option. So, right-click the `src` directory and select it. In the
    small dialog window that appears, enter the package name, `com.sandbox`. As shown
    in Figure [3-23](#463938_3_En_3_Chapter.xhtml#Fig23), if the package you are trying
    to create already exists (as in my case), an error message is displayed in red.


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig23_HTML.jpg)


    Figure 3-23


    Creating duplicate package in IntelliJ IDEA


    Now we have a package, but the class is not in it. To get the class there, just
    click on it and drag it. Another dialog window will appear to confirm that this
    is what you really want to do, as depicted in Figure [3-24](#463938_3_En_3_Chapter.xhtml#Fig24).


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig24_HTML.jpg)


    Figure 3-24


    Moving a class into a package in IntelliJ IDEA


    Click the **Refactor** button and look at what happens to the class. The class
    should now start with a `package com.sandbox;` declaration. If you rebuild your
    project and then look at the `production` directory, you will see something similar
    to what is depicted in Figure [3-25](#463938_3_En_3_Chapter.xhtml#Fig25).


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig25_HTML.jpg)


    Figure 3-25


    New directory structure after adding the `com.sandbox` package


    Obviously, when compiling and executing the class manually, the package has to
    be taken into account, so the commands will change as shown in Listing [3-18](#463938_3_En_3_Chapter.xhtml#PC18).


    ```

    ~/sandbox/src/> javac com/sandbox/HelloWorld.java

    ~/sandbox/src/> java com/sandbox/HelloWorld

    Listing 3-18

    Compiling and Executing the Package Version of HelloWorld.java File

    ```


    So what happens when modules are configured too? There is a default unnamed module,
    and all JARs, modular or not, and classes on the classpath will be contained in
    it. This default and unnamed module exports all packages and reads all other modules.
    Because it does not have a name, it cannot be required and read by named application
    modules. Thus, even if your small project seems to work with JDKs with versions
    9 and above, it cannot be accessed by other modules, but it works because it can
    access others. (This ensures backward compatibility with older versions of the
    JDK.) That being said, let’s add a module in our project as well.


    ### Configuring the `com.sandbox` Module


    Configuring a module is as easy as adding a `module-info.java` file under the
    `src` directory. Returning again to Figure [3-18](#463938_3_En_3_Chapter.xhtml#Fig18),
    the `src` context menu contains a `module-info.java` option. Select that, and
    the IDE will generate the file for you. All is well and fine, and if you do not
    like the module name that was generated for you, you can change it. I changed
    it to `com.sandbox` to respect the module naming convention established by Oracle
    developers. The file is initially empty, as depicted in Listing [3-19](#463938_3_En_3_Chapter.xhtml#PC19).


    ```

    module com.sandbox {

    }

    Listing 3-19

    The com.sandbox Module Configuration File

    ```


    What happens now that we have a module? Not much from the IDE’s point of view.
    But if you want to compile a module manually, you have to know a few things. I
    compiled our module using the command in Listing [3-20](#463938_3_En_3_Chapter.xhtml#PC20).


    ```

    ~/sandbox/src/> javac -d ../out/com.sandbox \

    module-info.java \

    com/sandbox/HelloWorld.java

    Listing 3-20

    Manually Compiling a Package Enclosed Within a Module

    ```


    Important


    “`\`” (backslash) is a macOS/Linux separator. On Windows, either write the whole
    command on a single line or replace `\` with `^` (caret).


    The command in Listing [3-20](#463938_3_En_3_Chapter.xhtml#PC20) is built according
    to the template in Listing [3-21](#463938_3_En_3_Chapter.xhtml#PC21).


    ```

    javac -d [destination location]/[module name] \

    [source location]/module-info.java \

    [java files...]

    Listing 3-21

    Template for Command to Manually Compile a Package Enclosed Within a Module

    ```


    The `-d [destination]` determines where the results of the execution should be
    saved. The reason why the command line in Listing [3-20](#463938_3_En_3_Chapter.xhtml#PC20)
    specifies the output folder as `/out/com.sandbox` is to make it clear that `com.sandbox`
    is the enclosing module. Under this directory, we’ll have the normal structure
    of the `com.sandbox` package. The contents of the `out` directory are depicted
    in Figure [3-26](#463938_3_En_3_Chapter.xhtml#Fig26).


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig26_HTML.jpg)


    Figure 3-26


    Java module `com.sandbox` compiled manually


    As you have noticed in this example, the module does not really exist until we
    compile the sources, because a Java module is more of a logical mode of encapsulating
    packages described by the `module-info.class` descriptor. The only reason the
    `com.sandbox` directory was created is that we specified it as argument in the
    `javac -d` command.


    Now that we’ve managed to compile a module, Listing [3-22](#463938_3_En_3_Chapter.xhtml#PC22)
    shows you how to run the `HelloWorld` class when it is enclosed in a module.


    ```

    ~/sandbox/> java --module-path out \

    --module com.sandbox/com.sandbox.HelloWorld

    Hello World!  # result

    Listing 3-22

    Manually Executing a Class Enclosed Within a Module

    ```


    The previous command is built according to the template in Listing [3-23](#463938_3_En_3_Chapter.xhtml#PC23).


    ```

    java --module-path [destination] \

    --module [module name] /[package name].HelloWorld

    Listing 3-23

    Template for Command to Manually Execute a Class Enclosed Within a Module

    ```


    The *Oracle Magazine* edition from September 2017 mentioned examples of naming
    Java modules for the first time. Although Oracle developers have decided that
    module names should follow the same rules as packages, to me this seems a little
    redundant, especially in complex projects where package names tend to become very
    long. Should you have module names just as long?


    The truth is that people make the standards, and most times the practical becomes
    the standard. Since 2007, projects that have managed to embrace modules have chosen
    simpler, more practical module names. For example, the team that created the Spring
    Framework decided to name their modules `spring.core` instead of `org.springframework.core`,
    `spring.beans` instead of `org.springframework.beans`, and so on. So name your
    modules as you wish, as long as you avoid special characters and numbers.'
