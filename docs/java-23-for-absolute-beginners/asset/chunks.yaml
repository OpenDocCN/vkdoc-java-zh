- fmt: "### Record Patterns\n\nStarting with JDK 19, the `instanceof` operator works\
    \ with records too. The record patterns feature was completed and released officially\
    \ in Java 21, through JEP 440^([^(61)](#fn61)). Record patterns help not only\
    \ with record type identification but deconstruction as well.\n\nRecord instances\
    \ are immutable data carriers. The data they carry is referred to as components.\
    \ The data is accessed using the built-in component accessor methods.\n\nTo show\
    \ a few common ways record patterns could be used, we need a few record classes.\
    \ Let’s start with the very simple example in Listing [6-8](#463938_3_En_6_Chapter.xhtml#PC10).\n\
    \n```\npackage com.apress.bgn.six;\nrecord FullName (String firstName, String\
    \ lastName){ }\npublic class RecordPatternsDemo {\nvoid main() {\nObject john\
    \ = new FullName(\"John\", \"Mayer\");\n/*1*/\nif (john instanceof FullName full)\
    \ {\nSystem.out.println(\"FullName: \" + full);\n}\n/*2*/\nif (john instanceof\
    \ FullName(String firstName, String lastName)) {\nSystem.out.println(\"[Deconstruction]\
    \ FirstName: \" + firstName);\nSystem.out.println(\"[Deconstruction] LastName:\
    \ \" + lastName);\n}\n}\n}\n// output\n/*\nFullName: FullName[firstName=John,\
    \ lastName=Mayer]\n[Deconstruction] FirstName: John\n[Deconstruction] LastName:\
    \ Mayer\n*/\nListing 6-8\nRecord Patterns Example\n```\n\nIn Listing [6-8](#463938_3_En_6_Chapter.xhtml#PC10)\
    \ we declared a very simple record named `FullName` that contains two fields.\n\
    \nThe first statement (marked with `/*1*/`) looks like a normal type check and\
    \ conversion, very similar to a type pattern usage. The second statement (marked\
    \ with `/*2*/`) is a record pattern example that deconstructs the instance into\
    \ its components, which are used independently without being encapsulated into\
    \ a record instance. This works for nested records too. If we declare a `PersonRecord`\
    \ record that has a `FullName` component, we can use a nested record pattern like\
    \ shown in Listing [6-9](#463938_3_En_6_Chapter.xhtml#PC11).\n\n```\npackage com.apress.bgn.six;\n\
    record FullName (String firstName, String lastName){ }\nrecord PersonRecord (FullName\
    \ fullName, Integer age) {}\npublic class RecordPatternsDemo {\nvoid main() {\n\
    Object john = new FullName(\"John\", \"Mayer\");\nObject johnRecord = new PersonRecord((FullName)\
    \ john, 47);\nif (johnRecord instanceof PersonRecord(FullName(var firstName, String\
    \ lastName), var age)) {\nSystem.out.println(\"[Nested] FirstName: \" + firstName);\n\
    System.out.println(\"[Nested] LastName: \" + lastName);\nSystem.out.println(\"\
    [Nested] Age: \" + age);\n}\n}\n}\n// output\n/*\n[Nested] FirstName: John\n[Nested]\
    \ LastName: Mayer\n[Nested] Age: 47\n*/\nListing 6-9\nNested Record Pattern Example\n\
    ```\n\nWith nested record patterns, we can decompose nested records and use their\
    \ components individually too.\n\nNote\n\n*Nested records* is just another way\
    \ to refer to record composition.\n\nIt also works with generics. The code in\
    \ Listing [6-10](#463938_3_En_6_Chapter.xhtml#PC12) shows using a record pattern\
    \ to decompose a generic type.\n\n```\npackage com.apress.bgn.six;\nrecord FullName\
    \ (String firstName, String lastName){ }\nrecord PersonRecord (FullName fullName,\
    \ Integer age) {}\nrecord WrapperBeing(T t, String description) { }\npublic class\
    \ RecordPatternsDemo {\nvoid main() {\nObject john = new FullName(\"John\", \"\
    Mayer\");\nWrapperBeing wrapper = new WrapperBeing((PersonRecord) johnRecord,\
    \ \"is mise Iain\");\nif (wrapper instanceof WrapperBeing(var personRecord, var\
    \ description)) {\nSystem.out.println(\"[Generics] PersonRecord: \" + personRecord);\n\
    System.out.println(\"[Generics] Description: \" + description);\n}\n}\n}\n// output\n\
    /*\n[Generics] PersonRecord: PersonRecord[fullName=FullName[firstName=John, lastName=Mayer],\
    \ age=47]\n[Generics] Description: is mise Iain\n*/\nListing 6-10\nDecomposing\
    \ a Generic Type Wrapper\n```\n\nYou’ve already noticed that some examples in\
    \ this section use `var` instead of the actual component type. As long as some\
    \ parameters have their types, so that the compiler can identify the correct pattern,\
    \ all works as intended.\n\nWhen decomposing nested records, you might not always\
    \ be interested in using all the components. This is where `_` (underscore), the\
    \ unnamed variable, comes in. For example, when decomposing the `johnRecord` instance,\
    \ you would just be interested in extracting the `lastName` component, so you\
    \ could write something like this:\n\n```\nif (johnRecord instanceof PersonRecord\
    \ (FullName\n(var _, String lastName), var _)) {\nSystem.out.println(\"[Unnamed\
    \ Variable] LastName: \" + lastName);\n}\n```\n\nAnd that’s about it, except for\
    \ usage in `switch` expressions, which will be covered in Chapter [7](#463938_3_En_7_Chapter.xhtml).\n\
    \n### Primitive Patterns\n\nExplicit conversion is not limited to reference types—it\
    \ works for primitives too. Chapter [5](#463938_3_En_5_Chapter.xhtml) mentioned\
    \ that any variable of a type with values in a smaller interval can be converted\
    \ to a type with a bigger interval without explicit conversion. The reverse is\
    \ possible too, by using explicit conversion, but if the value is too big, bits\
    \ will be lost and the value will be…unexpected. Just look at the examples of\
    \ conversions between `byte` and `int` depicted in Listing [6-11](#463938_3_En_6_Chapter.xhtml#PC14).\n\
    \n```\njshell> byte b = 2;\nb ==> 2\n|  created variable b : byte\njshell> int\
    \ i = 10;\ni ==> 10\n|  modified variable i : int\n|    update overwrote variable\
    \ i : int\njshell> i = b\ni ==> 2\n|  assigned to i : int\njshell> b = i\n|  Error:\
    \  \\\\ \n|  incompatible types: possible lossy conversion from int to byte\n\
    |  b = i\n|      ^\njshell> b = (byte) i\nb ==> 2\n|  assigned to b : byte\njshell>\
    \ i = 300_000\ni ==> 300000\n|  assigned to i : int\njshell> b = (byte) i\nb ==>\
    \ -32  // oops! value outside of byte interval\n|  assigned to b : byte\nListing\
    \ 6-11\njshell Conversions Examples\n```\n\nImportant\n\nAs a rule, just use explicit\
    \ conversion to widen the scope of a variable, not to narrow it, as narrowing\
    \ it can lead to exceptions or loss of precision.\n\nThe accompanying note is\
    \ a good recommendation, but what if the value you are working with is provided\
    \ by a generator component that you have no control over? Should you test the\
    \ value against all the numerical types of interval boundaries to see what is\
    \ the proper type to convert it to? It is doable, sure, but tedious. Java 23 introduces\
    \ a preview feature that makes things easier. As this section is being written,\
    \ this feature has just been introduced, but it has been a request from developers\
    \ for years: primitive types in patterns, or the ability to use `instanceof` with\
    \ primitive types.\n\nNote\n\nAnother thing developers have been requesting for\
    \ years is the ability to use primitive types in collections, so maybe that is\
    \ on the way too.\n\nChapter [5](#463938_3_En_5_Chapter.xhtml) introduced primitive\
    \ data types, most of which are numeric types limited to certain intervals and\
    \ representations. The only way to check if a numeric value is a `byte`, `short`,\
    \ `int`, or `long` is to check the value against the margins of the interval for\
    \ each type or attempt a conversion and check if an exception was thrown. Without\
    \ the check, a conversion of an `int` value to a `byte` might work, but with some\
    \ potential loss of precision. It would be nice if we could test if a value can\
    \ be converted to a certain type and convert it in one go, right? Well, this is\
    \ one of the features previewed by JEP 455^([^(62)](#fn62)).\n\nListing [6-12](#463938_3_En_6_Chapter.xhtml#PC15)\
    \ shows an example that generates a random `long` value based on the current system\
    \ time; this value is then checked and, if possible, converted to any numeric\
    \ type."
