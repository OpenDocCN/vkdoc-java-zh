    byte b1 = 117;

    print8Bits(b1);

    byte b2 = 95;

    print8Bits(b2);

    byte result  = (byte) (b1 & b2);

    print8Bits(result);

    }

    // print8Bits method omitted

    }

    // output

    /*

    decimal:117

    binary:01110101

    decimal:95

    binary:01011111

    decimal:85

    binary:01010101

    */

    Listing 6-31

    Testing the & Bitwise AND Operator

    ```


    The effect of the `&` operator can be seen better in Figure [6-4](#463938_3_En_6_Chapter.xhtml#Fig4).
    The `01010101` value is the binary representation of decimal number 85.


    ![](images/463938_3_En_6_Chapter/463938_3_En_6_Fig4_HTML.jpg)


    Figure 6-4


    The effect of the `&` operator on every bit


    Also, for practical reasons the composed operator `&=` is available in Java, so
    that the bitwise AND operation can be done on the same variable to which the result
    is assigned, as shown next. The advantage of this is that the result is automatically
    converted to `byte`, so no explicit conversion is required.


    ```

    jshell> byte b1 = 117

    b1 ==> 117

    |  created variable b1 : byte

    jshell> b1 &= 95

    $2 ==> 85

    |  created scratch variable $2 : byte

    ```


    ### Bitwise Inclusive (`|`) OR


    The bitwise OR operator (also known as inclusive OR), represented by `|` (pipe),
    compares two numbers bit by bit, and if at least one of the bits is 1, the bit
    in the result is set to 1. The code in Listing [6-32](#463938_3_En_6_Chapter.xhtml#PC43)
    depicts the result of the `|` operator.


    ```

    package com.apress.bgn.six;

    import static java.lang.System.out;

    public class BitwiseDemo {

    void main(){

    byte b1 = 117;

    print8Bits(b1);

    byte b2 = 95;

    print8Bits(b2);

    byte result  = (byte) (b1 | b2);

    print8Bits(result);

    }

    // print8Bits method omitted

    }

    // output

    /*

    decimal:117

    binary:01110101

    decimal:95

    binary:01011111

    decimal:127

    binary:01111111

    */

    Listing 6-32

    Testing the | Bitwise OR Operator

    ```


    The effect of the `|` operator can be seen better in Figure [6-5](#463938_3_En_6_Chapter.xhtml#Fig5).
    The `01111111` value is the binary representation of number 127.


    ![](images/463938_3_En_6_Chapter/463938_3_En_6_Fig5_HTML.jpg)


    Figure 6-5


    The effect of the `|` operator on every bit


    Also, for practical reasons the composed operator `|=` is available in Java, so
    that the bitwise inclusive OR operation can be done on the same variable to which
    the result is assigned, as shown next. The advantage of this is that the result
    is automatically converted to `byte`, so no explicit conversion is required.


    ```

    jshell>  byte b1 = 117

    b1 ==> 117

    |  created variable b1 : byte

    jshell> b1 |= 95

    $2 ==> 127

    |  created scratch variable $2 : byte

    ```


    ### Bitwise Exclusive (`^`) OR


    The bitwise exclusive OR (or XOR) operator, `^`, compares two numbers bit by bit,
    and if the values of the bits are different, the bit in the result is set to 1.
    The code sample in Listing [6-33](#463938_3_En_6_Chapter.xhtml#PC45) depicts the
    result of the `^` operator.


