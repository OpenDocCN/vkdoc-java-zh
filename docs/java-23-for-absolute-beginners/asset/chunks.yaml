    ## Numerical Operators


    This section groups together all operators that are mostly used on numerical types.
    The numerical operators you know from math: `+`, `-`, `/`, `*`. Comparators are
    found in programming too, but they can be combined to obtain different effects.


    ### Unary Operators


    Unary operators require only one operand, and they affect the variable they are
    applied to.


    #### Incrementors and Decrementors


    In Java (and some other programming languages) there are unary operators named
    incrementors (`++`) and decrementors (`--`). These operators are placed before
    or after a variable to increase or decrease its value by 1. They are usually used
    in loops as counters, to condition the termination of the loop. When they are
    placed before the variable, they are called prefixed, and when they are placed
    after it, they are called postfixed.


    When incrementors and decrementors are prefixed, the operation is executed on
    the variable before the variable is used in the next statement. This means that
    in Listing [6-13](#463938_3_En_6_Chapter.xhtml#PC16), the value of the `i` variable
    will be incremented and then assigned to `j`.


    ```java

    package com.apress.bgn.six;

    import static java.lang.System.out;

    public class UnaryOperatorsDemo {

    void main() {

    int i = 1;

    int j = ++i;

    out.println("j is " + j+ ", i is " + i);

    }

    }

    // output

    // j is 2, i is 2

    Listing 6-13

    Prefixed Incrementor Example

    ```


    The expected result of the code in Listing [6-13](#463938_3_En_6_Chapter.xhtml#PC16)
    is that `j equals 2`, because the value of the `i` variable is modified to 2 before
    it is assigned to `j`.


    When incrementors and decrementors are postfixed, the operation is executed on
    the variable after the variable is used in the next statement. This means that
    in the code in Listing [6-14](#463938_3_En_6_Chapter.xhtml#PC17), the value of
    `i` first is assigned to `j` and then incremented.


    ```java

    package com.apress.bgn.six;

    import static java.lang.System.out;

    public class UnaryOperatorsDemo {

    void main() {

    int i = 1;

    int j = i++;

    out.println("j is " + j+ ", i is " + i);

    }

    }

    // output

    // j is 1, i is 2

    Listing 6-14

    Postfixed Incrementor Example

    ```


    The expected result of the code in Listing [6-14](#463938_3_En_6_Chapter.xhtml#PC17)
    is that `j equals 1`, because the value of the `i` variable is modified to 2 after
    it is assigned to `j`.


    The decrementor operator can be used in the same way, the only difference being
    that the variable is decreased by 1.


    **Tip**


    Try to modify the `UnaryOperatorsDemo` class to use the `--` operator instead.


    #### Sign Operators


    Mathematical operator `+` (plus) can be used on a single operator to indicate
    that a number is positive (this operator is quite redundant and mostly never used).
    So, basically


    ```java

    int i = 3;

    ```


    is the same as


    ```java

    int i = +3;

    ```


    Mathematical operator `-` (minus) can be used to declare negative numbers:


    ```java

    [jshell> int i = -3

    i ==> -3

    | created variable i : int

    ```


    Or it can be used to negate an expression:


    ```java

    [jshell> int i = -3

    i ==> -3

    | created variable i : int

    [jshell> int j = -( i + 4 )

    j ==> -1

    | created variable j : int

    ```


    As you can see in the previous example, the result of `( i + 4 )` is 1, because
    `i = -3`, but because of the `-` operator in front of the parentheses, the final
    result that is assigned to the `j` variable is `-1`.


    #### Negation Operator


    There is one more unary operator, and its role is to negate variables. Operator
    `!` (bang or exclamation mark) applies to boolean variables and is used to negate
    them. So `true` becomes `false` and `false` becomes `true`, as shown in the next
    code snippet:


    ```java

    [jshell> boolean t = true

    t ==> true

    | created variable t : boolean

    [jshell> boolean f = !t

    f ==> false

    | created variable f : boolean

    [jshell> boolean t2 = !f

    t2 ==> true

    | created variable t2 : boolean

    ```


    ### Binary Operators


    There are quite a few binary operators, and some of them can even be combined
    to perform new operations. This section starts with the ones you probably know
    from math.'
