    ## 埃尔维斯运算符


    *埃尔维斯运算符*（`? :`）是 Java 中唯一的三元运算符。其功能相当于一个 Java 方法，该方法评估一个条件，并根据结果返回一个值。埃尔维斯运算符的模板如下所示：


    ```

    variable = (condition) ? val1 : val2

    ```


    与该运算符等效的方法如代码清单 6-42 所示。


    ```

    variable = methodName(..);

    type methodName(..) {

    if (condition) {

    return val1;

    } else {

    return val2;

    }

    }

    代码清单 6-42

    埃尔维斯运算符的等效方法

    ```


    该运算符之所以被称为*埃尔维斯运算符*，是因为稍微发挥一下想象力，问号就像猫王的头发，而冒号则像眼睛。埃尔维斯运算符可以很容易地在 `jshell` 中进行测试，如代码清单
    6-43 所示。


    ```

    jshell> int a = 4

    a ==> 4

    |  已创建变量 a : int

    jshell> int result = a > 4 ? 3 : 1;

    result ==> 1

    |  已创建变量 result : int

    jshell> String a2 = "test"

    a2 ==> "test"

    |  已创建变量 a2 : String

    jshell> var a3 = a2.length() > 3 ? "hello": "bye-bye"

    a3 ==> "hello"

    |  已创建变量 a3 : String

    代码清单 6-43

    JShell 中的埃尔维斯运算符示例

    ```


    当你有一个简单的 `if` 语句，且每个分支只包含一个表达式时，这个运算符非常实用，因为使用它可以将整个内容压缩到一个表达式、一行代码中。只需确保在使用时能提高代码的可读性。从性能角度来看，`if`
    语句和等效的埃尔维斯运算符表达式之间没有区别。使用埃尔维斯运算符的另一个优点是，该表达式可用于初始化变量。


    ## 本章小结


    在本章中，你学习了以下内容：


    *   Java 有很多运算符，既有简单的也有复合的。

    *   Java 能够在同一语句中将一种类型的实例转换为另一种类型，并且可以使用 `instanceof` 检查转换是否可行。这是通过类型、记录和原始模式实现的。

    *   位运算符速度快，但有风险。

    *   负数在内部以 2 的补码形式表示。

    *   `+` 运算符在不同上下文中执行不同的操作。

    *   Java 有一个三元运算符，它接受三个操作数：一个布尔表达式和两个相同类型的对象。布尔表达式求值的结果决定了哪个操作数作为该语句的结果。


    本章的目的只是让你熟悉本书中将要使用的所有运算符，帮助你理解所提供的解决方案，甚至设计和编写你自己的解决方案。


    脚注 1   2   3   4


    # 7. 控制流程


    前面的章节介绍了创建语句的方法，以及根据操作数类型应使用哪些运算符。有时在前面的章节中，为了让你能够运行代码，会添加一些逻辑元素，而本章将专门详细解释如何使用基本的编程条件语句和重复语句来操纵代码的执行（即控制流程）。解决问题的一系列步骤及其执行顺序称为算法。计算机程序是对问题进行建模的解决方案。算法可以使用流程图来表示。


    到目前为止，我们编写的大部分程序都包含声明和打印语句，这些是简单的单步语句。请看代码清单 7-1 中的代码片段。


    ```

    package com.apress.bgn.seven;

    public class Main {

    void main() {

    String text = "sample";

    System.out.println(text);

    }

    }

    代码清单 7-1

    由几个语句组成的 Java 代码

    ```


    如果我们要为其设计一个流程图，那么该模式将是简单且线性的，没有决策和重复，如图 7-1 所示。


    ![](img/463938_3_En_7_Fig1_HTML.jpg)


    图 7-1


    简单的流程图示例


    解决现实世界的问题通常需要比这更复杂的逻辑，因此需要更复杂的语句。在深入探讨之前，让我们分析一下流程图的组成部分，因为在本章中我们会大量使用流程图。表 7-1
    展示并标识了所有流程图元素，并解释了它们的用途。


    表 7-1


    流程图元素


    | 形状 | 名称 | 作用 |

    | --- | --- | --- |

    | ![](img/463938_3_En_7_Figa_HTML.jpg) | 终端 | 表示程序的开始或结束，并包含与其作用相关的文本。 |

    | ![](img/463938_3_En_7_Figb_HTML.jpg) | 流程线 | 表示程序的流程和操作的顺序。 |

    |   | 输入/输出 | 表示变量的声明和值的输出。 |

    | ![](img/463938_3_En_7_Figc_HTML.jpg) | 处理 | 简单的处理语句：赋值、值更改等。 |

    | ![](img/463938_3_En_7_Figd_HTML.jpg) | 决策 | 显示将决定特定执行路径的条件操作。 |

    | ![](img/463938_3_En_7_Fige_HTML.jpg) | 预定义处理 | 表示在其他地方定义的处理过程。 |

    | ![](img/463938_3_En_7_Figf_HTML.jpg) | 同页连接符 | 表示流程在同一页上的继续。此元素通常带有标签。 |

    | ![](img/463938_3_En_7_Figg_HTML.jpg) | 异页连接符 | 表示流程在不同页面上的继续。此元素通常带有标签。 |

    | ![](img/463938_3_En_7_Figh_HTML.jpg) | 注释（或批注） | 当流程或元素需要额外解释时使用。 |


    表 7-1 中展示的流程图元素非常标准，你可能会在任何编程课程或教程中找到非常相似的元素。经过这一连贯的介绍之后，我们将进入第二部分。

