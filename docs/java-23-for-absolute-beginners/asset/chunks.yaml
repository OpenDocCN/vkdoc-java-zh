    清单 9-42

    String 类中的文档注释

    ```


    在清单 9-41 的 `IntSorter` 示例中，你可能注意到了 `@code` 标签。此标签在 Java 1.5 中引入，用于通过使用特殊字体并转义可能破坏
    HTML 语法的符号（例如 `<` 或 `>`）来以代码形式显示文本。


    `@link` 标签在 Java 1.2 中添加，用于插入指向相关文档的可导航链接。


    `@snippet` 标签在 Java 18 中引入，用于轻松地将代码片段集成到文档中。它提供了许多属性来支持文档文本格式化，使开发者能够突出显示其代码中的重要部分。如前所述，在
    Java 18 之前，可以使用 `@code` 注解添加代码片段，但功能相当有限，因为它将代码视为普通文本。


    清单 9-43 展示了 `IntSorter` 接口的一个文档更完善的版本，其中包含方法的文档注释，以便实现它的开发者知道如何使用其方法。

