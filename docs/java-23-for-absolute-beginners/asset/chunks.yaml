    Up to this point in the chapter we have covered only object types and Java templates
    used for creating objects. But what if we need to design a class with functionality
    that applies to multiple types of objects? Since every class in Java extends the
    `Object` class, we could create a class with a method that receives a parameter
    of type `Object`, and in the method we could test the object type. It would be
    cumbersome, but it can be done, and will be covered later in the book. Fortunately,
    Java provides an easier way to design a class with functionality that applies
    to multiple types of objects.


    Java 5 introduced the possibility to use a type as a parameter when creating an
    object. The classes that are developed to process other classes are called **generics**.
    There are a lot of examples for generics, but I will start with the one that I
    needed first when learning Java.


    When writing Java applications, you will most likely need at some point to pair
    up values of different types. The simplest version of a `Pair` class that can
    hold a pair of instances of any type is shown in Listing [4-66](#463938_3_En_4_Chapter.xhtml#PC66).


    ```

    package com.apress.bgn.four.generics;

    public class Pair {

    protected X x;

    protected Y y;

    private Pair(X x, Y y) {

    this.x = x;

    this.y = y;

    }

    public X x() {

    return x;

    }

    public Y y() {

    return y;

    }

    public void x(X x) {

    this.x = x;

    }

    public void y(Y y) {

    this.y = y;

    }

    public static  Pair of(X x, Y y) {

    return new Pair(x, y);

    }

    @Override

    public String toString() {

    return "Pair{" + x.toString() + ", " + y.toString() + ''}'';

    }

    }

    Listing 4-66

    Generic Class Pair

    ```


