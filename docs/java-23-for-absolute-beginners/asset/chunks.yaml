    \n清单 3-14 展示了 `chapter.zero` 模块的 `module-info.java` 文件，该文件将其单个包仅暴露给 `chapter.three`\
    \ 模块。\n\n```\nmodule chapter.zero {\n    exports com.apress.bgn.zero to chapter.three;\n\
    }\n清单 3-14\nchapter.zero 模块的高级 module-info.java 配置文件\n\n可以通过列出所需模块（用逗号分隔）来指定多个模块具有访问权限，如清单\
    \ 3-15 所示。\n"
