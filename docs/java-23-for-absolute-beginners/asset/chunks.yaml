- fmt: "# `var` and the Diamond Operator\n\nJava 10 introduced the `var` keyword to\
    \ provide the capability to declare variables without their type, leaving the\
    \ compiler to infer it. Languages like Python, Groovy, and JavaScript had provided\
    \ this capability for years, and Java developers wanted it too.\n\nIt is not a\
    \ big effort to write\n\n```\nString message = \"random message\"\n```\n\ninstead\
    \ of\n\n```\nvar message = \"random message\" // infers String\n```\n\nBut `var`\
    \ becomes a lot more helpful when multilayered generic types are involved. For\
    \ example, this statement:\n\n```\nHashMap<String, List<String>> performers =\
    \ new HashMap<String, List<String>>();\n```\n\ncan be written as\n\n```\nvar performers\
    \ = new HashMap<String, List<String>>();\n```\n\nThat same statement can be simplified\
    \ by using the **diamond operator**, `<>`, introduced in Java 7. The diamond operator\
    \ allows omitting the names of the generic types used when instantiating a variable\
    \ if they can be inferred by the compiler from the declaration. So the previous\
    \ example can also be written as follows:\n\n```\nHashMap<String, List<String>>\
    \ performers3 = new HashMap<>();\n```\n\n**Important**\n\nA statement like `var\
    \ performers = new HashMap<>();` is valid, but the compiler has no way of deciding\
    \ the type of the instances that can be added to the `performers` map. So a statement\
    \ like `performers.put(null, null);` is correct, since `null` does not have a\
    \ type, but anything else, such as `performers.put(\"john\", \"mayer\");`, will\
    \ cause a compile error.\n\nThe `var` keyword can simplify the code being written\
    \ in Java, but it has a long way to go. For now, it is being allowed only in the\
    \ body of methods, indexes for enhanced loops, lambda expressions, constructors,\
    \ and loop and initialization blocks. It cannot be used in class field declarations\
    \ or constants. Thus, the compiler can infer the type only for local variables.\n\
    \n`var` cannot be used to declare variables that are not initialized, because\
    \ this doesn’t give the compiler any information about the type of the variable.\
    \ So the `var list;` statement causes a compiler error, but `var list = new ArrayList<String>();`\
    \ works just fine.\n\n**Important**\n\nAlthough `var` cannot be used as an identifier,\
    \ this doesn’t make it a reserved keyword. That is why a class field named `var`\
    \ can be declared, for example. Since it replaces the type name of a variable,\
    \ `var` is actually a **reserved type name**, and since using it depends on the\
    \ context, you will find it in Table [4-4](#463938_3_En_4_Chapter.xhtml#Tab4)\
    \ containing Java contextual keywords.\n\n## Unnamed Patterns and Unnamed Variables\n\
    \nAs mentioned earlier in the chapter, using the underscore (`_`) character as\
    \ an identifier was supported up to JDK 8, was then removed in Java 9, and was\
    \ reintroduced in Java 21 as a preview and as a feature in Java 22 but for purposes\
    \ similar to the ones in Golang. For those unfamiliar with Golang, in Golang you\
    \ must use any variable you declare, otherwise your code is invalid. A workaround\
    \ for this in some cases is to use variables named `_` (underscore). The `_` identifier\
    \ is used to denote an **unnamed variable** that is declared but never used.\n\
    \nThere are a few situations in which this is useful. The most common is when\
    \ using `Thread.sleep(..)` to pause the execution of a program. The `Thread.sleep(..)`\
    \ method declaration includes a `throws java.lang.InterruptedException` that is\
    \ rarely actually thrown if your code design is good, but since it is a checked\
    \ exception, the compiler forces you to handle it. So most developers used to\
    \ enclose this in a `try/catch` block that declares a named variable that is never\
    \ used anywhere. Listing [4-68](#463938_3_En_4_Chapter.xhtml#PC73) shows two `try/catch`\
    \ blocks, one pre-Java 22 with a named exception variable, and one since Java\
    \ 22 with an unnamed variable.\n\n```\n// before Java 22\ntry {\n    Thread.sleep(20);\n\
    } catch (InterruptedException e) {\n    // nothing to do\n}\n// Java 22: unnamed\
    \ variable\ntry {\n    Thread.sleep(20);\n} catch (InterruptedException _) {\n\
    }\n```\n\nYou might think that this is not important, and you are right, but there\
    \ is one consequence that I personally am very happy about: it makes the code\
    \ more readable without adding extra verbiage, like a comment to explain why nothing\
    \ is done with that exception. Also, the first `try/catch` block looks a lot like\
    \ the exception-swallowing process previously described in the **Exceptions**\
    \ section in this chapter, which I cautioned you should avoid. By using an `_`\
    \ as the variable name, I know just by looking at the code that this is not an\
    \ exception I should worry about.\n\nAnother situation in which you might need\
    \ an unnamed variable is when you need to iterate a collection and perform an\
    \ operation that has nothing to do with the actual iterator (code that is also\
    \ referred to as *code whose side effect is more important than its result*).\
    \ You will learn about iterators and loops in **Chapter** [**7**](#463938_3_En_7_Chapter.xhtml).\n\
    \nUnnamed variables are also useful when declaring lambda expressions that need\
    \ a formal parameter. However, unnamed variables are most useful when decomposing\
    \ data types using patterns, to create `switch` statements with different branches\
    \ based on the type of object. This will be covered in **Chapter** [**5**](#463938_3_En_5_Chapter.xhtml)\
    \ and **Chapter** [**7**](#463938_3_En_7_Chapter.xhtml). Unnamed variables will\
    \ be used wherever necessary throughout the book.\n\n## Summary\n\nThis chapter\
    \ introduced the most often used elements of the Java language. Hopefully, having\
    \ read this chapter, not much you find in future code samples code will surprise\
    \ you, so you can focus on learning the language properly. Do not worry if some\
    \ things seem unclear at this point; they will become clearer later as your understanding\
    \ of the Java language grows.\n\nHere are the key takeaways from this chapter:\n\
    \n* Syntax mistakes prevent Java code from being transformed into executable code.\
    \ This means *the code is not compiling*.\n* Static variables can be used directly\
    \ when *static import statements* are used. The same applies to static methods.\n\
    * Comments are ignored by the compiler, and there are three types of comments\
    \ in Java.\n* Classes, interfaces, and enums are Java components used to create\
