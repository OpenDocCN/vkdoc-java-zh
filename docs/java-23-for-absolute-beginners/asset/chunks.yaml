    ### 创建有限流


    除了从实际源创建流之外，还可以通过调用流工具方法（如 `Stream.generate()` 或 `Stream.builder()`）即时创建流。


    当构建一个包含固定已知值集合的有限流时，应使用 `builder()` 方法。此方法返回一个 `java.util.stream.Stream.Builder<T>`
    实例，这是一个内部接口，声明了一个名为 `add(T t)` 的默认方法，需要调用该方法来添加流的元素。要创建 `Stream<T>` 实例，必须最后调用其
    `build()` 方法。`add(T t)` 方法返回对 `Builder<T>` 实例的引用，因此它可以与此接口的任何其他方法链式调用。清单 8-10
    中的代码是一个示例，展示了如何使用 `builder()` 方法创建包含各种值的有限流。


    ```

