- fmt: '### `createNewFile()`, `exists()`, `createTempFile(..)`, and `deleteOnExit()`


    Aside from listing properties of file, a file handler can also be used to create
    a file. To create a file, the `createNewFile()` method must be called after creating
    a file handler with a specific pathname, as shown in Listing [11-5](#463938_3_En_11_Chapter.xhtml#PC14).


    ```

    package com.apress.bgn.eleven.io;

    import java.io.IOException;

    // other imports and wrapper code omitted

    var created = new File(

    "chapter11/read-write-file/src/main/resources/output/created.txt");

    if (!created.exists()) {

    try {

    var result = created.createNewFile();

    LOGGER.info("File was created ? {}", result);

    } catch (IOException e) {

    LOGGER.error("Could not create file.", e);

    }

    }

    Listing 11-5

    Creating a File

    ```


    The `exists()` method returns `true` when the file hander is associated with a
    concrete file or directory, and returns `false` otherwise. It can be used to test
    if the file we are trying to create already exists. If the file exists, the method
    has no effect. If the user does not have proper rights to create the file at the
    specified pathname, a `SecurityException` will be thrown.


    In certain cases, we might need to create a file that needs to be used only during
    the execution of the program. This means we either have to create the file and
    delete it explicitly or create a temporary file. Temporary files are created by
    calling `createTempFile(prefix, suffix)` and they are created in the temporary
    directory defined for the operating system. The `prefix` argument is of type `String`
    and its value will be the prefix of the name of the created file. The `suffix`
    argument is of type `String` as well, and it can be used to specify an extension
    for the file. The rest of the file name is generated by the operating system.
    The code to create a temporary file is depicted in Listing [11-6](#463938_3_En_11_Chapter.xhtml#PC15).


    ```

    package com.apress.bgn.eleven.io;

    import java.io.IOException;

    // other imports and wrapper code omitted

    try {

    File temp = File.createTempFile("java_bgn_", ".tmp");

    LOGGER.info("File created at: {}", temp.getAbsolutePath());

    temp.deleteOnExit();

    } catch (IOException e) {

    LOGGER.error("Could not create temporary file.", e);

    }

    Listing 11-6

    Creating a Temporary File

    ```


    Files in the temporary directory of an operating system are periodically deleted
    by the operating system, but if you want to make sure a temporary file will be
    deleted, you can explicitly call `deleteOnExit()` on the file handler for the
    temporary file. In the code sample in Listing [11-6](#463938_3_En_11_Chapter.xhtml#PC15),
    the absolute path to the file is printed to show the exact location where the
    temporary file was created, and on a macOS system the full pathname looks very
    similar to this:


    ```

    /var/folders/gg/nm_cb2lx72q1lz7xwwdh7tnc0000gn/T/java_bgn_14652264510049064218.tmp

    ```


    You can stop the execution of the `Main` class by running it in debug mode and
    putting a break point on the logging statement to check where temporary files
    are saved on your system, like shown in Figure [11-1](#463938_3_En_11_Chapter.xhtml#Fig1).


    ![](images/463938_3_En_11_Chapter/463938_3_En_11_Fig1_HTML.jpg)


    Figure 11-1


    IntelliJ IDEA debugger showing absolute path of temporary file


    ### `renameTo`


    A file can also be renamed using a Java file handler. The `rename(f)` method is
    called with a file handler argument pointing to the location and desired name
    that the file should have. The method returns `true` if the renaming succeeded
    and returns `false` otherwise. The code for doing this is depicted in Listing
    [11-7](#463938_3_En_11_Chapter.xhtml#PC17).


    ```

    package com.apress.bgn.eleven.io;

    import java.io.IOException;

    // other imports and wrapper code omitted

    file = new File(

    "chapter11/read-write-file/src/main/resources/output/created.txt");

    var renamed = new File(

    "chapter11/read-write-file/src/main/resources/output/renamed.txt");

    boolean result = file.renameTo(renamed);

    LOGGER.info("Renaming succeeded? : {} ", result);

    Listing 11-7

    Renaming a File

    ```


    Most methods in the class `File` throw `IOException`, because manipulating a file
    can fail for various reasons, including a hardware problem or an operating system
    problem. This type of exception is a checked exception, and developers using file
    handlers are forced to catch and treat this type of exception.


    Methods that require special rights for accessing a file throw `SecurityException`.
    This type extends `RuntimeException` so exceptions are not checked. They become
    obvious when the application is running.


    You now know all the basics of working with file handlers.'
