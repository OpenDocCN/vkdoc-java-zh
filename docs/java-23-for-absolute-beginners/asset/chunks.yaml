- fmt: "### The Other Comparison Operators\n\nThe other comparison operators work\
    \ only on primitive types. Since there is not that much to say about each of them\
    \ individually, this section covers them all.\n\n- `!=` tests inequality of terms.\
    \ It is the opposite of the `==` operator. This operator also works on reference\
    \ types, but it compares reference values instead the objects themselves, exactly\
    \ as `==`.\n\n**Tip**  \nAs an exercise, modify the example in Listing [6-24](#463938_3_En_6_Chapter.xhtml#PC33)\
    \ to print a message when the array element value is different from 2.\n\n- `<`\
    \ (less than) and `<=` (less than or equal with) have the same purpose as you\
    \ probably learned in math class: `<` tests if the item on the left of the operator\
    \ is less than the one on the right, and `<=` tests if the item on the left of\
    \ the operator is less or equal to the one on the right. The `<=` operator cannot\
    \ be used on reference types.\n\n- `>` and `>=` also have the same purpose as\
    \ you probably learned in math class: `>` tests if the item on the left of the\
    \ operator is greater than the one on the right, and `>=` tests if the item on\
    \ the left of the operator is greater than or equal to the one on the right. The\
    \ `>=` operator cannot be used on reference types.\n\nAlmost all numeric operators\
    \ can be used on variables of different types, as they are automatically converted\
    \ to the type that has a wider interval representation. The code in Listing [6-26](#463938_3_En_6_Chapter.xhtml#PC35)\
    \ reflects a few situations, but in practice you might need to make even more\
    \ dubious things that do not always abide to the commonsense rules of programming,\
    \ nor follow good practices. Just try to avoid doing that if you can, though!\n\
    \n```\npackage com.apress.bgn.six;\nimport static java.lang.System.out;\npublic\
    \ class MixedOperationsDemo {\nvoid main() {\nbyte b = 1;\nshort s = 2;\nint i\
    \ = 3;\nlong l = 4;\nfloat f = 5;\ndouble d = 6;\nint ii = 6;\ndouble resd = l\
    \ + d;\nlong resl = s + 3;\n//etc\nif (b = b) {\nout.println(\"int val >= byte\
    \ val\");\n}\nif (l > b) {\nout.println(\"long val > byte val\");\n}\nif(d > i)\
    \ {\nout.println(\"double val > byte val\");\n}\nif(i == i) {\nout.println(\"\
    double val == int val\");\n}\n}\n}\n// output\n/*\nbyte val = byte val\nlong val\
    \ > byte val\ndouble val > byte val\ndouble val == int val\n*/\nListing 6-26\n\
    Different Primitive Types Comparison Examples\n```\n\nJust make sure that if you\
    \ are ever in a situation where you need to make shady things *(nonoptimal code\
    \ constructs)* like these, test a lot and think your conversions well, especially\
    \ when floating-point types are involved. This is because (for example) the piece\
    \ of code in Listing [6-27](#463938_3_En_6_Chapter.xhtml#PC36) can have quite\
    \ unexpected results.\n\n```\npackage com.apress.bgn.six;\nimport static java.lang.System.out;\n\
    public class BadDecimalPointDemo {\nvoid main(){\nfloat f1 = 2.2f;\nfloat f2 =\
    \ 2.0f;\nfloat f3 = f1 * f2;\nif (f3 == 4.4) {\nout.println(\"expected float value\
    \ of 4.4\");\n} else {\nout.println(\"!! unexpected value of \" + f3);\n}\n}\n\
    }\nListing 6-27\nUnexpected Comparison Results with Floating-Point Numbers\n```\n\
    \nIf you expected the message *expected float value of 4.4* to be printed in the\
    \ console, you will be quite surprised.\n\nAny IEEE 754 floating-point number\
    \ representation will present issues, because some numbers that appear to have\
    \ a fixed number of decimals in the decimal system actually have an infinite number\
    \ of decimals in the binary system. So obviously we cannot compare floats and\
    \ doubles using `==`. One of the solutions that is easiest to implement is to\
    \ use the compare method provided by the wrapper class, in this case `Float.compare(..)`,\
    \ as shown in Listing [6-28](#463938_3_En_6_Chapter.xhtml#PC37).\n\n```\npackage\
    \ com.apress.bgn.six;\nimport static java.lang.System.out;\npublic class GoodDecimalPointDemo\
    \ {\nvoid main(){\nfloat f1 = 2.2f;\nfloat f2 = 2.0f;\nfloat f3 = f1 * f2;\nif\
    \ (Float.compare(f3,4.4f) == 0) {\nout.println(\"expected float value of 4.4\"\
    );\n} else {\nout.println(\"!!unexpected value of \" + f3);\n}\n}\n}\nListing\
    \ 6-28\nCorrect Comparison Results with Float.compare\n```\n\nUsing the previous\
    \ example, the expected message is now printed in the console: *expected float\
    \ value of 4.4*.\n\n## Bitwise Operators\n\nIn Java there are a few operators\
    \ that are used at the bit level to manipulate variables of numerical types. Bitwise\
    \ operators are used to change individual bits in an operand. Bitwise operations\
    \ are faster and usually use less CPU processing power because of the reduced\
    \ use of resources. They are most useful in programming visual applications (e.g.,\
    \ games) where color, mouse clicks, and movements should be quickly determined\
    \ to ensure a satisfactory experience.\n\n### Bitwise (~) NOT\n\nOperator `~`\
    \ is sort of a binary **negator**. It performs a bit-by-bit reversal of an integer\
    \ value. This affects all bits used to represent the value. So if we declare\n\
    \n```\nbyte b1 = 10;\n```\n\nthe binary representation is `00001010`.\n\nThe `Integer`\
    \ class provides a method named `toBinaryString()`, which can be used to print\
    \ the binary representation of the previously defined variable, but it won’t print\
    \ all the bits, because the method doesn’t know on how many bits we want the representation\
    \ on. So we need to use a special `String` method to format the output. The method\
    \ depicted in Listing [6-29](#463938_3_En_6_Chapter.xhtml#PC39) can be used to\
    \ print the `b1` value in binary on 8 bits, exactly as mentioned previously.\n\
    \n```\nimport static java.lang.System.out;\n//...\npublic static void print8Bits(byte\
    \ arg) {\nout.println(\"decimal:\" + arg);\nString str = String.format(\"%8s\"\
    , Integer.toBinaryString(arg)).replace(' ', '0');\nout.println(\"binary:\" + str);\n\
    }\nListing 6-29\nMethod Used to Print Each Bit of a byte Value\n```\n\nIf we apply\
    \ the `~` operator on the `b1` value, the binary value that results is `11110101`.\
    \ In case you did not notice, this value is out of the `byte` interval range and\
    \ thus is converted to `int` automatically. This is how negative numbers are represented\
    \ internally in Java, which according to the Java Language Specification is a\
    \ representation called **2’s complement**. (This will be covered toward the end\
    \ of the chapter.)\n\nSo the result will be `-11`, as displayed by the code in\
    \ Listing [6-30](#463938_3_En_6_Chapter.xhtml#PC40).\n\n```\npackage com.apress.bgn.six;\n\
    import static java.lang.System.out;\npublic class BitwiseDemo {\nvoid main(){\n\
    byte b1 = 10;\nprint8Bits(b1);\nbyte b2 = (byte) ~b1;\nprint8Bits(b2);\n}\n//\
    \ print8Bits method omitted\n}\n// output\n/*\ndecimal:10\nbinary:00001010\ndecimal:-11\n\
    binary:11111111111111111111111111110101\n*/\nListing 6-30\nTesting the ~ Bitwise\
    \ Negator Operator\n```\n\nNotice the statement `byte b2 = (byte) ~b1` in Listing\
    \ [6-30](#463938_3_En_6_Chapter.xhtml#PC40). The bitwise complement expression\
    \ operator requires an operand that is convertible to a primitive integral type,\
    \ or a compile-time error occurs. Internally, Java uses one or more bytes to represent\
    \ values. The `~` operator converts its operand to the `int` type, so it can use\
    \ 32 bits when doing the complement operation; this is needed to avoid loss of\
