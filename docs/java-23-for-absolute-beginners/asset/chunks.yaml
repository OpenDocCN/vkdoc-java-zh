- fmt: '# Logging with JUL


    JUL is the name of the logging back end provided by the JDK and is an acronym
    for `java.util.logging`. The JDK provides its own logger classes that are grouped
    under this package. A `Logger` instance is used to write messages. The `Logger`
    instance should be provided a name when it is created. Log messages are printed
    by calling specialized methods that print messages at different levels. For the
    JUL module, the levels and their scope are listed here, but other logging libraries
    have similar logging levels:


    * `OFF`: Used to turn off all logging

    * `SEVERE`: Highest level message, indicates a serious failure

    * `WARNING`: Indicates that this message is being printed because of a potential
    problem

    * `INFO`: Indicates that this is an informational message

    * `CONFIG`: Indicates that this is a message containing configuration information

    * `FINE`: Indicates that this is a message providing tracing information

    * `FINER`: Indicates that this is a fairly detailed tracing message

    * `FINEST`: Indicates that this is a very detailed tracing message

    * `ALL`: Indicates all log messages should be printed


    Loggers can be configured using `.xml` (Extensible Markup Language) or `.properties`
    files, and their output can be directed to external files. For the code sample
    introduced previously, all `out.print` statements in the `MergeSort` class are
    replaced with logging statements. Listing [9-4](#463938_3_En_9_Chapter.xhtml#PC4)
    depicts the `MergeSort` class with logging statements.


    ```

    package com.apress.bgn.algs;

    import java.util.logging.Logger;

    public class MergeSort implements IntSorter {

    private static final Logger log = Logger.getLogger(MergeSort.class.getName());

    public void sort(int[] arr, int low, int high) {

    var sb = new StringBuilder("Call sort of ")

    .append("[low,high]: [")

    .append(low).append(" ").append(high)

    .append("] ");

    for (var i = low; i <= high; ++i) {

    sb.append(arr[i]).append(" ");

    }

    log.info(sb.toString());

    if (low < high) {

    var middle = (low + high) / 2;

    //sort lower half of the interval

    sort(arr, low, middle);

    //sort upper half of the interval

    sort(arr, middle + 1, high);

    // merge the two intervals

    merge(arr, low, high, middle);

    }

    }

    private void merge(int[] arr, int low, int high, int middle) {

    var leftLength = middle - low + 1;

    var rightLength = high - middle;

    var left = new int[leftLength];

    var right = new int[rightLength];

    for (int i = 0; i < leftLength; ++i) {

    left[i] = arr[low + i];

    }

    for (int i = 0; i < rightLength; ++i) {

    right[i] = arr[middle + 1 + i];

    }

    var i = 0;

    var j = 0;

    var k = low;

    while (i < leftLength && j < rightLength) {

    if (left[i] <= right[j]) {

    arr[k] = left[i++];

    } else {

    arr[k] = right[j++];

    }

    k++;

    }

    while (i < leftLength) {

    arr[k++] = left[i++];

    }

    while (j < rightLength) {

    arr[k++] = right[j++];

    }

    var sb = new StringBuilder("Called merge of [low, high, middle]: [")

    .append(low).append(" ").append(high).append(" ").append(middle)

    .append("]) ");

    for (var z = low; z <= high; ++z) {

    sb.append(arr[z]).append(" ");

    }

    log.info(sb.toString());

    }

    }

    Listing 9-4

    MergeSort Implementation with JUL Logging Statements

    ```


    A `StringBuilder` instance is introduced to construct longer messages before writing
    them with `log.info([message])`, which is equivalent to calling `log.log(Level.INFO,
    [message]);`. Listing [9-5](#463938_3_En_9_Chapter.xhtml#PC5) depicts the main
    class to run the algorithm.


    ```

    package com.apress.bgn.nine;

    import com.apress.bgn.algs.IntSorter;

    import com.apress.bgn.algs.MergeSort;

    import java.io.FileInputStream;

    import java.io.IOException;

    import java.util.Arrays;

    import java.util.logging.Level;

    import java.util.logging.LogManager;

    import java.util.logging.Logger;

    public class SortingJulDemo {

    private static final Logger log = Logger.getLogger(SortingJulDemo.class.getName());

    static {

    try {

    LogManager logManager = LogManager.getLogManager();

    logManager.readConfiguration(new FileInputStream("./chapter09/logging-jul/src/main/resources/logging.properties"));

    } catch (IOException exception) {

    log.log(Level.SEVERE, "Error in loading configuration", exception);

    }

    }

    void main(){

    int[] arr = {5,1,4,2,3};

    final StringBuilder sb = new StringBuilder("Sorting  an array with merge sort:
    ");

    Arrays.stream(arr).forEach(i -> sb.append(i).append(" "));

    log.info(sb.toString());

    IntSorter mergeSort = new MergeSort();

    mergeSort.sort(arr, 0, arr.length - 1);

    final StringBuilder sb2 = new StringBuilder("Sorted: ");

    Arrays.stream(arr).forEach(i -> sb2.append(i).append( " "));

    log.info(sb2.toString());

    }

    }

    Listing 9-5

    Main Class to Run the MergeSort Proposed Implementation with JUL Logging Statements

    ```


    There are not many log statements in this class. The body of the class starts
    with the declaration and initialization of the `Logger` instance. The instance
    is not created by calling the constructor, but obtained by calling the `getLogger(..)`
    static method declared in the `Logger` class. This method looks for a `Logger`
    instance with the name provided as an argument and, if found, returns that instance;
    otherwise, it creates an instance with that name and returns it. In this example
    the name of the `Logger` instance is the fully qualified class name, obtained
    by calling `SortingJulDemo.class.getName()`.


    Right after this statement, there is a `static` block used to configure the logger
    from the `logging.properties` file. The contents of this file are shown in Listing
    [9-6](#463938_3_En_9_Chapter.xhtml#PC6).


    ```

    handlers=java.util.logging.ConsoleHandler

    java.util.logging.ConsoleHandler.level=ALL

    java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter

    java.util.logging.SimpleFormatter.format=[%1$tF %1$tT] [%4$-4s] %5$s %n

    Listing 9-6

    Properties Used to Configure the JUL Logger Declared in the logging.properties
    File

    ```


    This file contains a list of values in the format `propertyName=propertyValue`,
    which represents the configuration for the JUL logger. Their values specify the
    following:


    * The class used to print the log messages: `java.util.logging.ConsoleHandler`
    prints messages in the console.

    * The class used to format the log messages: `java.util.logging.SimpleFormatter`

    * A template for printing log messages: `[%1$tF %1$tT] [%4$-4s] %5$s %n`

    * The levels of the log messages that are printed, which in this case includes
    all levels of log messages because of the `ALL` value.


    The `Logger` instance is created by calling the static method `Logger.getLogger(..)`.
    The recommended practice is for the logger to be named as the class it is logging
    messages for. Without any additional configuration, every message printed with
    `log.info(..)` is printed prefixed with the full system date, full class name,
    and method name in front of it. As you can imagine the result is quite verbose,
    and this is why the `logging.properties` file comes in handy and the `LogManager`
    configured from it. The `LogManager` reads the configuration that customizes the
    `Logger` instance.


    Running the `SortingJulDemo` produces the output shown in Listing [9-7](#463938_3_En_9_Chapter.xhtml#PC7).'
