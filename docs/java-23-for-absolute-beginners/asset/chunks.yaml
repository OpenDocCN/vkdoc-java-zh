    \ The list of Java keywords tends to stay quite constant between Java versions.\
    \ The reserved keywords are covered in the following section."
  raw: '## `var` and the Diamond Operator


    Java 10 introduced the `var` keyword to provide the capability to declare variables
    without their type, leaving the compiler to infer it. Languages like Python, Groovy,
    and JavaScript had provided this capability for years, and Java developers wanted
    it too.


    It is not a big effort to write


    ```

    String message = "random message"

    ```


    instead of


    ```

    var message = "random message" // infers String

    ```


    But `var` becomes a lot more helpful when multilayered generic types are involved.
    For example, this statement:


    ```

    HashMap> performers = new HashMap>() ;

    ```


    can be written as


    ```

    var performers = new HashMap>();

    ```


    That same statement can be simplified by using the **diamond operator**, `<>`,
    introduced in Java 7\. The diamond operator allows omitting the names of the generic
    types used when instantiating a variable if they can be inferred by the compiler
    from the declaration. So the previous example can also be written as follows:


    ```

    HashMap> performers3 = new HashMap();

    ```


    Important


    A statement like `var performers = new HashMap<>();` is valid, but the compiler
    has no way of deciding the type of the instances that can be added to the `performers`
    map. So a statement like `performers.put(null, null);` is correct, since `null`
    does not have a type, but anything else, such as `performers.put("john", "mayer");`,
    will cause a compile error.


    The `var` keyword can simplify the code being written in Java, but it has a long
    way to go. For now, it is being allowed only in the body of methods, indexes for
    enhanced loops, lambda expressions, constructors, and loop and initialization
    blocks. It cannot be used in class field declarations or constants. Thus, the
    compiler can infer the type only for local variables.


    `var` cannot be used to declare variables that are not initialized, because this
    doesn’t give the compiler any information about the type of the variable. So the
    `var list;` statement causes a compiler error, but `var list = new ArrayList<String>();`
    works just fine.


    Important


    Although `var` cannot be used as an identifier, this doesn’t make it a reserved
    keyword. That is why a class field named `var` can be declared, for example. Since
    it replaces the type name of a variable, `var` is actually a **reserved type name**,
    and since using it depends on the context, you will find it in Table [4-4](#463938_3_En_4_Chapter.xhtml#Tab4)
    containing Java contextual keywords.


    ## Unnamed Patterns and Unnamed Variables


    As mentioned earlier in the chapter, using the underscore (`_`) character as an
    identifier was supported up to JDK 8, was then removed in Java 9, and was reintroduced
    in Java 21 as a preview and as a feature in Java 22 but for purposes similar to
    the ones in Golang. For those unfamiliar with Golang, in Golang you must use any
    variable you declare, otherwise your code is invalid. A workaround for this in
    some cases is to use variables named `_` (underscore). The `_` identifier is used
    to denote an **unnamed variable** that is declared but never used.


    There are a few situations in which this is useful. The most common is when using
    `Thread.sleep(..)` to pause the execution of a program. The `Thread.sleep(..)`
    method declaration includes a `throws java.lang.InterruptedException` that is
    rarely actually thrown if your code design is good, but since it is a checked
    exception, the compiler forces you to handle it. So most developers used to enclose
    this in a `try/catch` block that declares a named variable that is never used
    anywhere. Listing [4-68](#463938_3_En_4_Chapter.xhtml#PC73) shows two `try/catch`
    blocks, one pre-Java 22 with a named exception variable, and one since Java 22
    with an unnamed variable.


    ```

    // before Java 22

    try {

    Thread.sleep(20);

    } catch (InterruptedException e) {

    // nothing to do

    }

    // Java 22: unnamed variable

    try {

    Thread.sleep(20);

    } catch (InterruptedException _) {

    }

    Listing 4-68

    Console Output for the Execution of GenericsDemo

    ```


    You might think that this is not important, and you are right, but there is one
    consequence that I personally am very happy about: it makes the code more readable
    without adding extra verbiage, like a comment to explain why nothing is done with
    that exception. Also, the first `try/catch` block looks a lot like the exception-swallowing
    process previously described in the **Exceptions** section in this chapter, which
    I cautioned you should avoid. By using an `_` as the variable name, I know just
    by looking at the code that this is not an exception I should worry about.


    Another situation in which you might need an unnamed variable is when you need
    to iterate a collection and perform an operation that has nothing to do with the
    actual iterator (code that is also referred to as *code whose side effect is more
    important than its result*). You will learn about iterators and loops in **Chapter**
    [**7**](#463938_3_En_7_Chapter.xhtml).


    Unnamed variables are also useful when declaring lambda expressions that need
    a formal parameter. However, unnamed variables are most useful when decomposing
    data types using patterns, to create `switch` statements with different branches
    based on the type of object. This will be covered in **Chapter** [**5**](#463938_3_En_5_Chapter.xhtml)
    and **Chapter** [**7**](#463938_3_En_7_Chapter.xhtml). Unnamed variables will
    be used wherever necessary throughout the book.


    ## Summary


    This chapter introduced the most often used elements of the Java language. Hopefully,
    having read this chapter, not much you find in future code samples code will surprise
    you, so you can focus on learning the language properly. Do not worry if some
    things seem unclear at this point; they will become clearer later as your understanding
    of the Java language grows.


    Here are the key takeaways from this chapter:


    *   Syntax mistakes prevent Java code from being transformed into executable code.
    This means *the code is not compiling*.


    *   Static variables can be used directly when *static import statements* are
    used. The same applies to static methods.


    *   Comments are ignored by the compiler, and there are three types of comments
    in Java.


    *   Classes, interfaces, and enums are Java components used to create objects.


    *   Enums are special types of classes that can be instantiated only a fixed number
    of times.


    *   Records are special types of classes used to create data-immutable objects.


    *   Abstract classes cannot be instantiated, even if they can have constructors.


    *   Interfaces could only contain skeleton (abstract) methods until Java version
    8, when default methods were introduced.


    *   Private methods and private static methods are allowed in interfaces starting
    with Java 9.


    *   In Java there is no multiple inheritance using classes.


    *   Java identifiers must respect naming rules. A single underscore ``_`` is not
    an accepted Java identifier, unless is used to identify variables which are declared,
    but never used in various contexts (exception handling, loops, lambda expressions
    and patterns).


    *   Interfaces can extend other interfaces.


    *   Java defines a fixed number of *reserved keywords* that can be used only for
    specific purposes, and cannot be used as identifiers. The list of Java keywords
    tends to stay quite constant between Java versions. The reserved keywords are
    covered in the following section.'
  trans: "\n## `var` 与钻石运算符\n\nJava 10 引入了 `var` 关键字，用于声明变量时无需指定其类型，而由编译器进行推断。像 Python、Groovy\
    \ 和 JavaScript 这类语言早已具备此功能，Java 开发者对此也期待已久。\n\n编写以下代码并不费力：\n\n```\nString message\
    \ = \"random message\"\n```\n\n而不是：\n\n```\nvar message = \"random message\" //\
    \ 推断为 String 类型\n```\n\n但当涉及多层泛型类型时，`var` 的作用就大得多了。例如，以下语句：\n\n```\nHashMap<String,\
    \ ArrayList<Integer>> performers = new HashMap<String, ArrayList<Integer>>();\n\
    ```\n\n可以写成：\n\n```\nvar performers = new HashMap<String, ArrayList<Integer>>();\n\
    ```\n\n同样的语句也可以通过使用 Java 7 引入的**钻石运算符** `<>` 来简化。钻石运算符允许在实例化变量时省略泛型类型名称，前提是编译器能从声明中推断出这些类型。因此，前面的例子也可以写成：\n\
    \n```\nHashMap<String, ArrayList<Integer>> performers3 = new HashMap<>();\n```\n\
    \n重要提示\n\n像 `var performers = new HashMap<>();` 这样的语句是有效的，但编译器无法确定可以添加到 `performers`\
    \ 映射中的实例类型。因此，像 `performers.put(null, null);` 这样的语句是正确的，因为 `null` 没有类型，但其他任何操作，例如\
    \ `performers.put(\"john\", \"mayer\");`，都会导致编译错误。\n\n`var` 关键字可以简化 Java 代码的编写，但它仍有很长的路要走。目前，它仅允许在方法体、增强型循环的索引、Lambda\
    \ 表达式、构造函数以及循环和初始化块中使用。它不能用于类字段声明或常量中。因此，编译器只能为局部变量推断类型。\n\n`var` 不能用于声明未初始化的变量，因为这无法为编译器提供任何关于变量类型的信息。所以，`var\
    \ list;` 语句会导致编译错误，但 `var list = new ArrayList<String>();` 则可以正常工作。\n\n重要提示\n\n\
    尽管 `var` 不能用作标识符，但这并不意味着它是一个保留关键字。例如，这就是为什么可以声明一个名为 `var` 的类字段。由于它替代了变量的类型名称，`var`\
    \ 实际上是一个**保留类型名称**，并且由于它的使用取决于上下文，你可以在包含 Java 上下文关键字的表 4-4 中找到它。\n\n## 未命名模式与未命名变量\n\
    \n正如本章前面所述，使用下划线 (`_`) 字符作为标识符在 JDK 8 之前是支持的，在 Java 9 中被移除，然后在 Java 21 中作为预览功能重新引入，并在\
    \ Java 22 中作为正式特性，但其用途与 Golang 中的类似。对于那些不熟悉 Golang 的人来说，在 Golang 中，你必须使用你声明的任何变量，否则你的代码就是无效的。在某些情况下，一种解决方法是使用名为\
    \ `_`（下划线）的变量。`_` 标识符用于表示一个已声明但从未使用的**未命名变量**。\n\n在一些情况下，这非常有用。最常见的是使用 `Thread.sleep(..)`\
    \ 来暂停程序执行时。`Thread.sleep(..)` 方法的声明包含一个 `throws java.lang.InterruptedException`，如果你的代码设计良好，这个异常实际上很少被抛出，但由于它是一个受检异常，编译器强制你处理它。因此，大多数开发者过去常常将其包裹在一个\
    \ `try/catch` 块中，并声明一个从未在任何地方使用过的命名变量。清单 4-68 展示了两个 `try/catch` 块，一个是 Java 22\
    \ 之前使用命名异常变量的方式，另一个是 Java 22 之后使用未命名变量的方式。\n\n```\n// Java 22 之前\ntry {\n    Thread.sleep(20);\n\
    } catch (InterruptedException e) {\n    // 无需处理\n}\n// Java 22：未命名变量\ntry {\n\
    \    Thread.sleep(20);\n} catch (InterruptedException _) {\n}\n清单 4-68\nGenericsDemo\
    \ 执行的控制台输出\n```\n\n你可能会认为这并不重要，你说得对，但有一个我个人非常满意的结果：它使代码更具可读性，而无需添加额外的赘述，比如用注释来解释为什么不对该异常做任何处理。此外，第一个\
    \ `try/catch` 块看起来很像本章前面在**异常**部分描述的异常吞噬过程，我曾告诫过你应该避免这种做法。通过使用 `_` 作为变量名，我只需看一眼代码就知道这不是一个需要担心的异常。\n\
    \n另一种可能需要未命名变量的情况是，当你需要遍历一个集合并执行一个与实际迭代器无关的操作时（这种代码也被称为*副作用比其结果更重要的代码*）。你将在**第**\
    \ **7** **章**中学习迭代器和循环。\n\n在声明需要形式参数的 Lambda 表达式时，未命名变量也很有用。然而，未命名变量在通过模式分解数据类型时最为有用，可以根据对象的类型创建具有不同分支的\
    \ `switch` 语句。这将在**第** **5** **章**和**第** **7** **章**中介绍。本书将在必要时使用未命名变量。\n\n##\
    \ 总结\n\n本章介绍了 Java 语言中最常用的元素。希望读完本章后，你在未来的代码示例中不会遇到太多让你感到惊讶的内容，这样你就可以专注于正确地学习这门语言。如果有些内容目前看起来不清楚，请不要担心；随着你对\
    \ Java 语言理解的加深，它们会逐渐变得清晰。\n\n以下是本章的关键要点：\n\n*   语法错误会阻止 Java 代码转换为可执行代码。这意味着*代码无法编译*。\n\
    \n*   当使用*静态导入语句*时，可以直接使用静态变量。静态方法也是如此。\n\n*   注释会被编译器忽略，Java 中有三种类型的注释。\n\n*\
    \   类、接口和枚举是用于创建对象的 Java 组件。\n\n*   枚举是一种特殊类型的类，其实例化次数是固定的。\n\n*   记录是一种特殊类型的类，用于创建数据不可变的对象。\n\
    \n*   抽象类不能被实例化，即使它们可以有构造函数。\n\n*   在 Java 8 之前，接口只能包含骨架（抽象）方法，直到 Java 8 引入了默认方法。\n\
    \n*   从 Java 9 开始，接口中允许使用私有方法和私有静态方法。\n\n*   Java 不支持使用类的多重继承。\n\n*   Java 标识符必须遵守命名规则。单个下划线\
    \ `_` 不是被接受的 Java 标识符，除非用于标识那些已声明但在各种上下文（异常处理、循环、Lambda 表达式和模式）中从未使用的变量。\n\n*\
    \   接口可以继承其他接口。\n\n*   Java 定义了一组固定数量的*保留关键字*，这些关键字只能用于特定目的，不能用作标识符。Java 关键字的列表在不同版本之间通常保持相对稳定。保留关键字将在下一节中介绍。\n"
- fmt: '# Java Keywords


    As mentioned at the beginning of this chapter, there is a list of Java keywords
    that can be used only for their fixed and predefined purpose in the language.
    There are two types of keywords in Java: reserved keywords and contextual keywords.
    Reserved keywords (there are 51) cannot be used as identifiers: you cannot use
    them as names for variables, classes, interfaces, enums, or methods. Contextual
    keywords (there are 17) can be used as identifiers unless the context is related
    to their intended purpose, in which case they can’t be used because it is too
    confusing for the compiler.


    You can find the reserved keywords in Tables [4-2](#463938_3_En_4_Chapter.xhtml#Tab2)
    and [4-3](#463938_3_En_4_Chapter.xhtml#Tab3).^([(45)](#fn45))


    ## Table 4-3: Java Reserved Keywords (Part 2)


    | Keyword | Description |

    | --- | --- |

    | `do` `for` `while` | Keywords used to create loops: `do{..}` `while(condition)`
    `while(condition){..}` `for(initialization;condition;incrementation){..}` |

    | `goto` | Another keyword borrowed from `C` but currently not used in Java, because
    it can be replaced by labeled `break` and `continue` statements. |

    | `if` `else` | Used to create conditional statements: `if(condition) {..}` `else
    {..}` `else if (condition) {..}` |

    | `import` | Used to make classes and interfaces available in the current source
    code. |

    | `instanceof` | Used to test instance types in conditional expressions. |

    | `native` | Used to indicate that a method is implemented in native code using
    JNI (Java Native Interface). |

    | `new` | Used to create Java instances. |

    | `package` | Used to declare the package the class, interface, enum, annotation,
    or record is part of. It should be the first Java statement line. |

    | `public` `private` `protected` | Access-level modifiers for Java items (templates,
    fields, or methods). |

    | `return` | Used within a method to return to the code that invoked it. The method
    can also return a value to the calling code. |

    | `static` | This modifier can be applied to variables, methods, blocks, and nested
    class. It declares an item that is shared between all instances of the class where
    declared. |

    | `stricfp` | Used to restrict floating-point calculations to ensure portability.
    Added in Java 1.2. |

    | `super` | Used inside a class to access members of the super class. |

    | `this` | Used to access members of the current object. |

    | `synchronized` | Used to ensure that only one thread executes a block of code
    at any given time. This is used to avoid a problem named race condition. |

    | `transient` | Used to mark data that should not be serialized. |

    | `volatile` | Used to ensure that changes done to a variable value are accessible
    to all threads accessing it. |

    | `void` | Used when declaring methods as a return type to indicate that the method
    does not return a value. |

    | `_` (underscore) | Can be used as an identifier prior to Java 9. Cannot be used
    as an identifier starting with Java 9 and up to Java 20. Starting with Java 21
    it can be used as an identifier for unused (unnamed) variables. |


    ## Table 4-2: Java Reserved Keywords (Part 1)


    | Keyword | Description |

    | --- | --- |

    | `abstract` | Used to declare a class or method as abstract—as in, any extending
    or implementing class must provide a concrete implementation. |

    | `assert` | Used to test an assumption about your code. Introduced in Java 1.4,
    it is ignored by the JVM unless the program is run with the `-ea` option. |

    | `boolean` `byte` `char` `short` `int` `long` `float` `double` | Primitive type
    names. |

    | `break` | Statement used inside loops to terminate them immediately. |

    | `continue` | Statement used inside loops to jump to the next iteration immediately.
    |

    | `switch` | Statement used to test equality against a set of values known as
    cases. |

    | `case` | Statement used to define case values in a `switch` statement. |

    | `default` | Used to declare a default case within a `switch` statement. And
    starting with Java 8 it can be used to declare default methods in interfaces.
    |

    | `try` `catch` `finally` `throw` `throws` | Keywords used in exception handling.
    |

    | `class` `interface` `enum` | Keywords used to declare classes, interfaces, and
    enums. |

    | `extends` `implements` | Keywords used in extending classes and implementing
    interfaces. |

    | `const` | Not actually used in Java, a keyword borrowed from `C`, where it is
    used to declare constants, variables that are assigned a value that cannot be
    changed during the execution of the program. |

    | `final` | The equivalent of the `const` keyword in Java. Anything defined with
    this modifier cannot change after a final initialization. A final class cannot
    be extended. A final method cannot be overridden. A final variable has the same
    value that was initialized with throughout the execution of the program. Any code
    written to modify final items will lead to a compiler error. |


    You can find the contextual keywords in Table [4-4](#463938_3_En_4_Chapter.xhtml#Tab4).


    ## Table 4-4: Java Contextual Keywords


    | Keyword | Description |

    | --- | --- |

    | `export` `module` `open` `opens` `provides` `requires` `to` `transitive` `uses`
    `with` | Used in `module-info.java` to configure Java modules. |

    | `record` | Keyword to declare Java records. It can be used as an identifier
    within the body of a Java class, interface, or enum. |

    | `permits` `sealed` `non-sealed` | Keywords used in the declaration of sealed
    classes and interfaces. |

    | `when` | Keyword used to declare a guard expression in a `switch` block. |

    | `yield` | Keyword used to declare a `yield` statement in a `switch` block. |

    | `var` | Keyword introduced in Java 10 to replace the declared type of a variable
    method (or lambda expression) body when the type is obvious. `var` is a reserved
    type name. For example, `var` can be used as a field name or as a package name.
    |


    The following are a few important points to mention:


    *   `true` and `false` are boolean literals, but they are not reserved keywords.
    For example, `true` and `false` are valid package names.

    *   `null` is not a reserved keyword either. It is a literal used to represent
    a missing object. But it is a valid name for a package, for example.


    ## Important


    The keywords and many other details of the Java language are covered extensively
    in the Java Language Specification (JLS)^([(46)](#fn46)), so if you are ever in
    doubt about the proper syntax of your Java code (or are just curious), browse
    through it. In the early days of my Java learning, when the Internet was smaller
    and not so helpful, the JLS saved me many times.


    ## Footnotes


    [1](#463938_3_En_4_Chapter.xhtml#Fn1_source) [2](#463938_3_En_4_Chapter.xhtml#Fn2_source)
    [3](#463938_3_En_4_Chapter.xhtml#Fn3_source) [4](#463938_3_En_4_Chapter.xhtml#Fn4_source)
    [5](#463938_3_En_4_Chapter.xhtml#Fn5_source) [6](#463938_3_En_4_Chapter.xhtml#Fn6_source)
    [7](#463938_3_En_4_Chapter.xhtml#Fn7_source) [8](#463938_3_En_4_Chapter.xhtml#Fn8_source)'
  raw: '### Java Keywords


    As mentioned at the beginning of this chapter, there is a list of Java keywords
    that can be used only for their fixed and predefined purpose in the language.
    There are two types of keywords in Java: **reserved keywords** and **contextual
    keywords**. Reserved keywords (there are 51) cannot be used as identifiers: you
    cannot use them as names for variables, classes, interfaces, enums, or methods.
    Contextual keywords (there are 17) can be used as identifiers unless the context
    is related to their intended purpose, in which case they can’t be used because
    it is too confusing for the compiler.


    You can find the reserved keywords in Tables [4-2](#463938_3_En_4_Chapter.xhtml#Tab2)
    and [4-3](#463938_3_En_4_Chapter.xhtml#Tab3).^([^(45)](#fn45))


    Table 4-3


    Java Reserved Keywords (Part 2)


    | Keyword | Description |

    | --- | --- |

    | `do``for``while` | Keywords used to create loops:`do{..}``while(condition)``while(condition){..}``for(initialization;condition;incrementation){..}`
    |

    | `goto` | Another keyword borrowed from `C` but currently not used in Java, because
    it can be replaced by labeled `break` and `continue` statements. |

    | `if``else` | Used to create conditional statements:`if(condition) {..}``else
    {..}``else if (condition ) {..}` |

    | `import` | Used to make classes and interfaces available in the current source
    code. |

    | `instanceof` | Used to test instance types in conditional expressions. |

    | `native` | Used to indicate that a method is implemented in native code using
    JNI (Java Native Interface). |

    | `new` | Used to create Java instances. |

    | `package` | Used to declare the package the class, interface, enum, annotation,
    or record is part of. It should be the first Java statement line. |

    | `public private protected` | Access-level modifiers for Java items (templates,
    fields, or methods). |

    | `return` | Used within a method to return to the code that invoked it. The method
    can also return a value to the calling code. |

    | `static` | This modifier can be applied to variables, methods, blocks, and nested
    class. It declares an item that is shared between all instances of the class where
    declared. |

    | `stricfp` | Used to restrict floating-point calculations to ensure portability.
    Added in Java 1.2. |

    | `super` | Used inside a class to access members of the super class. |

    | `this` | Used to access members of the current object. |

    | `synchronized` | Used to ensure that only one thread executes a block of code
    at any given time. This is used to avoid a problem named race condition. |

    | `transient` | Used to mark data that should not be serialized. |

    | `volatile` | Used to ensure that changes done to a variable value are accessible
    to all threads accessing it. |

    | `void` | Used when declaring methods as a return type to indicate that the method
    does not return a value. |

    | `_` (underscore) | Can be used as an identifier prior to Java 9\. Cannot be
    used as an identifier starting with Java 9 and up to Java 20\. Starting with Java
    21 it can be used as an identifier for unused (unnamed) variables. |


    Table 4-2


    Java Reserved Keywords (Part 1)


    | Keyword | Description |

    | --- | --- |

    | `abstract` | Used to declare a class or method as abstract—as in, any extending
    or implementing class must provide a concrete implementation. |

    | `assert` | Used to test an assumption about your code. Introduced in Java 1.4,
    it is ignored by the JVM unless the program is run with the `-ea` option. |

    | `boolean byte``char``short``int``long``float double` | Primitive type names.
    |

    | `break` | Statement used inside loops to terminate them immediately. |

    | `continue` | Statement used inside loops to jump to the next iteration immediately.
    |

    | `switch` | Statement used to test equality against a set of values known as
    cases. |

    | `case` | Statement used to define case values in a `switch` statement. |

    | `default` | Used to declare a default case within a `switch` statement. And
    starting with Java 8 it can be used to declare default methods in interfaces.
    |

    | `try``catch finally throw throws` | Keywords used in exception handling. |

    | `class interface enum` | Keywords used to declare classes, interfaces, and enums.
    |

    | `extends implements` | Keywords used in extending classes and implementing interfaces.
    |

    | `const` | Not actually used in Java, a keyword borrowed from `C,` where it is
    used to declare constants, variables that are assigned a value that cannot be
    changed during the execution of the program. |

    | `final` | The equivalent of the `const` keyword in Java. Anything defined with
    this modifier cannot change after a final initialization. A final class cannot
    be extended. A final method cannot be overridden. A final variable has the same
    value that was initialized with throughout the execution of the program. Any code
    written to modify final items will lead to a compiler error. |


    You can find the contextual keywords in Table [4-4](#463938_3_En_4_Chapter.xhtml#Tab4).


    Table 4-4


    Java Contextual Keywords


    | Keyword | Description |

    | --- | --- |

    | `export``module``open``opens``provides``requires``to``transitive``uses``with`
    | Used in `module-info.java` to configure Java modules. |

    | `record` | Keyword to declare Java records. It can be used as an identifier
    within the body of a Java class, interface, or enum. |

    | `permits``sealed``non-sealed` | Keywords used in the declaration of sealed classes
    and interfaces. |

    | `when` | Keyword used to declare a guard expression in a `switch` block. |

    | `yield` | Keyword used to declare a `yield` statement in a `switch` block. |

    | `var` | Keyword introduced in Java 10 to replace the declared type of a variable
    method (or lambda expression) body when the type is obvious. `var` is a reserved
    type name. For example, `var` can be used as a field name or as a package name.
    |


    The following are a few important points to mention:


    *   `true` and `false` are boolean literals, but they are not reserved keywords.
    For example, `true` and `false` are valid package names.


    *   `null` is not a reserved keyword either. It is a literal used to represent
    a missing object. But it is a valid name for a package, for example.


    Important


    The keywords and many other details of the Java language are covered extensively
    in the Java Language Specification (JLS)^([^(46)](#fn46)), so if you are ever
    in doubt about the proper syntax of your Java code (or are just curious), browse
    through it. In the early days of my Java learning, when the Internet was smaller
    and not so helpful, the JLS saved me many times.


    Footnotes [1](#463938_3_En_4_Chapter.xhtml#Fn1_source)   [2](#463938_3_En_4_Chapter.xhtml#Fn2_source)
      [3](#463938_3_En_4_Chapter.xhtml#Fn3_source)   [4](#463938_3_En_4_Chapter.xhtml#Fn4_source)
      [5](#463938_3_En_4_Chapter.xhtml#Fn5_source)   [6](#463938_3_En_4_Chapter.xhtml#Fn6_source)
      [7](#463938_3_En_4_Chapter.xhtml#Fn7_source)   [8](#463938_3_En_4_Chapter.xhtml#Fn8_source)'
