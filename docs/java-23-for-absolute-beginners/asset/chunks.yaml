    `java.util.function.BiFunction<T, U, R>` 将这些元素组合起来。在我们的例子中，该函数只是丢弃第二个元素，并返回被第二个流生成的秒数所减慢的调用流的元素。


    Project Reactor 提供的组件的一个优点是，它们返回的大多是调用它们时所用的相同类型的对象，这意味着它们可以很容易地被链式调用。一个与之前基于
    JDK 的实现等效的响应式代码片段，可以使用 Project Reactor API 编写，如清单 12-18 所示。


    ```

    Flux infiniteFlux = Flux.fromStream(

    Stream.generate(() -> random.nextInt(150))

    );

    Flux delay = Flux.interval(Duration.ofSeconds(1));

    Flux delayedInfiniteFlux = infiniteFlux.zipWith(delay, (s, l) -> s);

    delayedInfiniteFlux

    .filter(element -> (element >= 0 && element  {

    if (item % 2 == 0 && item >= 98 && item  (char) element.intValue())

    .subscribe(new GenericSubscriber());

    Listing 12-18

    使用 Project Reactor 编写响应式管道

    ```


    你在 Stream API 中记得的大多数函数在 Project Reactor 中都已为响应式使用而实现，所以如果前面的代码看起来很熟悉，原因就在于此。


    关于 Project Reactor API，如果你需要响应式库，可以优先考虑这个。官方文档^((125))非常棒，并且充满了示例。Oracle 显然已经推迟了提供用于编写响应式应用程序的丰富
    API 的计划。


    ## 总结


    响应式编程不是一个简单的主题，但响应式应用程序最适合于建模事件驱动、异步、响应式和弹性的系统。本章不需要深入探讨真正高级的主题来展示响应式解决方案的真正威力。作为一本面向
    Java 初学者的书，这不是一个合适的主题。然而，如果你想了解更多关于构建响应式应用程序的知识，由 Apress 于 2021 年 1 月出版的《Pro Spring
    MVC with WebFlux》^((126))（第二版）中有几个关于使用 Spring 和 Project Reactor 构建响应式应用程序的精彩章节。


    重要


    你必须记住的是，响应式实现与非响应式实现结合是无用的，因此要构建一个真正的响应式应用程序，所有层都必须是响应式的。


    设计和使用的响应式组件与非响应式组件结合是没有意义的，因为你实际上可能会引入故障点并降低速度。例如，如果你使用的是 Oracle 数据库，那么定义一个使用响应式流返回元素的仓库类是没有意义的，因为
    Oracle 数据库不支持响应式访问。你只是添加了一个增加额外实现的响应式层，因为在这种情况下没有真正的好处。但是，如果你选择的数据库是 MongoDB，你可以放心地使用响应式编程，因为
    MongoDB 数据库支持响应式访问。此外，如果你正在使用 ReactJS 或 Angular 界面构建 Web 应用程序，你可以设计你的控制器类来响应式地提供数据以供界面显示。


    本章内容可总结如下：


    *   解释了响应式编程。

    *   解释了响应式流的行为。

    *   涵盖了 JDK 对响应式流的支持。

    *   讨论了如何使用响应式流技术兼容性工具包来测试你的响应式解决方案。

    *   简要介绍了用于构建响应式应用程序的 Project Reactor 组件。


