- fmt: '#### Using Stubs


    **Stubs** are a type of fake that quietly fake behavior and can return a predefined
    expected value. An instance of `AccountServiceImpl` uses an instance of `AccountRepo`
    to retrieve data from the database or save data to a database. When writing unit
    tests for this class, each test method must cover the functionality from a method
    in a service class, so that we can write a stub class to simulate the behavior
    of `AccountRepo`. For the `AccountServiceImpl` instance to be able to use it,
    the stub must implement `AccountRepo`. In this section the tests will cover the
    method `createAccount(..)` because this method can fail in many ways. Thus, more
    than one test method can be written for it. Listing [9-36](#463938_3_En_9_Chapter.xhtml#PC56)
    shows the `createAccount(..)` method.


    ```java

    package com.apress.bgn.nine.service;

    // import statements omitted

    public class AccountServiceImpl implements AccountService {

    AccountRepo repo;

    public AccountServiceImpl(AccountRepo repo) {

    this.repo = repo;

    }

    @Override

    public Account createAccount(String holder, String accountNumber, String amount)
    {

    int intAmount;

    try {

    intAmount = Integer.parseInt(amount);

    } catch (NumberFormatException nfe) {

    throw new InvalidDataException("Could not create account with invalid amount!");

    }

    if (accountNumber == null || accountNumber.length()  existing = repo.findOne(holder);

    if (existing.isPresent()) {

    throw new AccountCreationException("Account already exists for holder " + holder);

    }

    Account acc = new Account(holder, intAmount, accountNumber);

    return repo.save(acc);

    }

    // other methods omitted

    }

    Listing 9-36

    The AccountServiceImpl#createAccount(..) Method

    ```


    The `createAccount(..)` method takes as parameters the holder name, the number
    of the account to be created, and the initial amount. All of these parameters
    are provided as `String` instances intentionally, so that the method body contains
    a little bit of logic that requires serious testing. Let’s analyze the behavior
    of the `createAccount(..)` method and make a list with all possible returned values
    and returned exceptions:


    *   If the `amount` is not a number, an `InvalidDataException` is thrown. (`InvalidDataException`
    is a custom type of exception created specifically for this project, which is
    not relevant at the moment.)

    *   If the `accountNumber` argument is null, an `InvalidDataException` is thrown.

    *   If the `accountNumber` argument has less than five characters, an `InvalidDataException`
    is thrown.

    *   If the `amount` argument converted to a number is negative, an `InvalidDataException`
    is thrown.

    *   If the `account` for the `holder` argument already exists, an `AccountCreationException`
    is thrown.

    *   If all the inputs are valid and there is no account for the `holder` argument,
    an `Account` instance is created, saved to the database, and the result is returned.


    If we were to be really obsessive about testing, we would have to write a test
    scenario for all those cases. In the software world, there is something called
    **test coverage**, which is a process that determines whether test cases cover
    application code and how much of it. The result is a percentage value, and companies
    usually define a test coverage percentage^([^(82)](#fn82)) that represents a warranty
    of quality for the application. Before showing the test methods for the `createAccount(..)`
    method, take a look at Listing [9-37](#463938_3_En_9_Chapter.xhtml#PC57) that
    shows the repo stub code.


    ```java

    package com.apress.bgn.nine.service.stub;

    //other import statement

    public class AccountRepoStub implements AccountRepo {

    private Integer option = 0;

    public synchronized void set(int val) {

    option = val;

    }

    @Override

    public Account save(Account account) {

    return account;

    }

    @Override

    public Optional findOne(String holder) {

    if (option == 0) {

    return Optional.of(new Account(holder, 100, "22446677"));

    }

    return Optional.empty();

    }

    @Override

    public List findAll() {

    return List.of(new Account("sample", 100, "22446677"));

    }

    @Override

    public int deleteByHolder(String holder) {

    return option;

    }

    }

    Listing 9-37

    The AccountRepoStub Class

    ```


    The `option` field can be used to change behavior of the stub to cover more test
    cases. As we have one stub repository, this means tests might fail when run in
    parallel, but for this example with this basic stub, it works.


    There are two ways to write tests using JUnit, depending on the `assert*(..)`
    statements used. Listing [9-38](#463938_3_En_9_Chapter.xhtml#PC58) shows two negative
    test methods that validate the behavior when an invalid amount is provided as
    an argument.


    ```java

    package com.apress.bgn.nine.service;

    // import statements omitted

    public class AccountServiceTest {

    private static AccountRepoStub repo;

    private AccountService service;

    @BeforeAll

    public static void prepare() {

    repo = new AccountRepoStub();

    }

    @BeforeEach

    public void setUp() {

    service = new AccountServiceImpl(repo);

    }

    @Test

    public void testNonNumericAmountVersionOne() {

    assertThrows(InvalidDataException.class,

    () -> {

    service.createAccount("Gigi", "223311", "2I00");

    });

    }

    @Test

    public void testNonNumericAmountVersionTwo() {

    InvalidDataException expected = assertThrows(

    InvalidDataException.class, () -> {

    service.createAccount("Gigi", "223311", "2I00");

    }

    );

    assertEquals("Could not create account with invalid amount!", expected.getMessage());

    }

    @AfterEach

    public void tearDown() {

    repo.set(0);

    }

    @AfterAll

    public static void destroy() {

    repo = null;

    }

    }

    Listing 9-38

    The AccountServiceTest Unit Test Class Using a Stub Repo

    ```


    The `testNonNumericAmountVersionOne()` method makes use of `assertThrows(..)`,
    which receives two parameters: the type of exception expected to be thrown when
    the second parameter of type `Executable` is executed. `Executable` is a functional
    interface defined in the `org.junit.jupiter.api.function` package that can be
    used in a lambda expression to get the compact test that you see in Listing [9-38](#463938_3_En_9_Chapter.xhtml#PC58).


    The `testNonNumericAmountVersionTwo()` method saves the result of the `assertThrows(..)`
    call, which allows for the message of the exception to be tested as well, to make
    sure that the execution flow worked exactly as expected.


    Similar methods can be written to test all other service methods. The `AccountServiceTest`
    class hosted on the repository for this book depicts a few other testing methods.
    Feel free to add your own methods to cover your own situations.


    The next section introduces the last test technique covered in this chapter: writing
    tests using mocks.'
