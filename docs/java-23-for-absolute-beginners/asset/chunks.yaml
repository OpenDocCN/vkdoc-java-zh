    About the Author About the Technical Reviewer


    # 1. An Introduction to Java and Its History


    Java has been consistently ranked among the top ten most popular programming languages
    in the world, and even after 28 years, it continues to be one of the most influential
    languages. Sun Microsystems officially released Java 1.0 in 1996, and it was able
    to overcome well-established languages like C/C++ to become one of the most commonly
    used programming languages. Over the years the number of Java’s competitors grew
    to include C#, Groovy, Clojure, Scala, and Kotlin, among others, all of which
    have at some point been predicted to be the one that would bury Java, but clearly
    that has not happened (otherwise, you wouldn’t be reading this book). This chapter
    is a short history lesson about the language you are about to learn; if you are
    not interested in the historical perspective, feel free to skip to Chapter [2](#463938_3_En_2_Chapter.xhtml).


    ## How It All Started


    In 1990, Sun Microsystems was an American company that was leading the revolution
    in the computer industry. When computers around the world started to be connected
    to the World Wide Web, the company decided to gather its best engineers to design
    and develop a product that would allow Sun to become an important player in the
    new emerging Internet world. Among those engineers was James Arthur Gosling, a
    Canadian computer scientist that is recognized today as the *father* of the Java
    programming language. Development of Sun’s product would take five years of design
    and programming and one renaming (from Oak to Java because of copyright issues),
    but finally, on January 23, 1996^([¹](#fn1)), Java 1.0 was released for Linux,
    Solaris, Mac, and Windows.


    The general tendency when reading a technical book is to skip the introductory
    chapter altogether. However, I encourage you to read this chapter. Personally,
    I was never much interested in the history of Java until I wrote the first edition
    of this book. I knew that James Gosling was considered the creator of Java and
    that Oracle bought Sun Microsystems in 2010, and that was pretty much it. I never
    cared much about how the language evolved, where the inspiration came from, or
    how one version was different from another. I just wanted to write code and get
    paid to do it. I started learning Java at version 1.5, and I took a lot of features
    for granted. Subsequently, I was assigned to a project running on Java 1.4, and
    I was quite confused, because I did not know why parts of the code I wrote were
    not compiling. Although the IT industry is moving very fast, there will always
    be that one client that has a legacy application, and knowing the peculiarities
    of each Java version is an advantage, because you know the issues when performing
    a migration.


    When I started doing research for this book, I was mesmerized. The history of
    Java is interesting because it is a tale of incredible growth, success of a technology,
    and how a clash of egos in management almost killed the company that created it.
    Currently Java is the most commonly used technology in software development, and
    it is simply paradoxical that the company that gave birth to it no longer exists.
    Oracle, however, is still thriving and still investing in Java, so the future
    is looking pretty good for aspiring Java programmers.


    This chapter describes each version of Java released so far, tracking succinctly
    the evolution of the language and the Java Virtual Machine (JVM).'
