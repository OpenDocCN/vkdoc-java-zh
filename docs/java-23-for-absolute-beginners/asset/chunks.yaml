    for (int i = 0; i < 10; ++i) {

    try {

    Thread.sleep(i * 10);

    } catch (InterruptedException _) {}

    }

    System.out.println(this.getName() +" ended.");

    }

    }

    public class MultipleUserThreadsDemo {

    void main() {

    for (int i = 0; i < 10; ++i) {

    new RandomDurationThread().start();

    }

    }

    }

