- fmt: "### Debug Using Assertions\n\nAnother way to debug your code is to use assertions.\
    \ As introduced in the **Chapter** [**4**](#463938_3_En_4_Chapter.xhtml) section\
    \ about Java keywords, the `assert` reserved keyword is used to write an assertion\
    \ statement, which is just a test of your assumptions about the program execution.\
    \ In the previous examples in this chapter, we had the user provide the input\
    \ for our sorting program, so in order for our program to do the right thing,\
    \ it is assumed that the user will provide the proper input, which means an array\
    \ with size greater than 1, because there is no point to run the algorithm for\
    \ a single number. So what does this assertion look like in the code? The answer\
    \ is depicted in Listing [9-21](#463938_3_En_9_Chapter.xhtml#PC24).\n\n```\npackage\
    \ com.apress.bgn.nine;\nimport com.apress.bgn.algs.QuickSort;\nimport java.util.Arrays;\n\
    import static com.apress.bgn.nine.SortingLogbackDemo.getInts;\nimport static java.lang.System.out;\n\
    public class AssertionDemo {\nvoid main(String... args){\nint[] arr = getInts(args);\n\
    assert arr.length > 1;\nvar mergeSort = new QuickSort();\nmergeSort.sort(arr,\
    \ 0, arr.length - 1);\nfinal StringBuilder sb2 = new StringBuilder(\"Sorted: \"\
    );\nArrays.stream(arr).forEach(i -> sb2.append(i).append(\" \"));\nout.println(sb2);\n\
    }\n}\nListing 9-21\nAsserting the Size of User-Provided Array\n```\n\nRunning\
    \ the code in Listing [9-21](#463938_3_En_9_Chapter.xhtml#PC24) without providing\
    \ any arguments to the program is possible, even though we have an assertion statement\
    \ in it. As expected, the code does nothing because there is no array to be sorted.\
    \ The reason the code runs despite the assertion is that all assertions need to\
    \ be enabled using a VM argument: `-ea`. To specify this argument, you can add\
    \ it to the command when executing from the command line, but you also can use\
    \ the editor by adding the argument in the VM options text box of the IntelliJ\
    \ IDEA launcher, as depicted in Figure [9-6](#463938_3_En_9_Chapter.xhtml#Fig6).\n\
    \n![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig6_HTML.jpg)\n\nFigure 9-6\n\
    \nIntelliJ IDEA launcher for the `AssertionDemo` class with the `-ea` VM argument\
    \ set\n\nWhen assertions are enabled, running the code in Listing [9-21](#463938_3_En_9_Chapter.xhtml#PC24)\
    \ ends with a `java.lang.AssertionError` being thrown because the expression of\
    \ the assertions is evaluated to `false`, since obviously the value of `arr.length`\
    \ is clearly not greater than 1 when no argument is provided.\n\nAssertions have\
    \ two forms, one simple and one more complex. The simple form of an expression\
    \ has just the expression to evaluate, the assumption to test:\n\n```\nassertion\
    \ [expression];\n```\n\nIn this case, the `java.lang.AssertionError` being thrown\
    \ just prints the line where the assumption is asserted for the current run of\
    \ the program, together with the module and the full classname:\n\n```\nException\
    \ in thread \"main\" java.lang.AssertionError\nat chapter.nine.logback@3.0-SNAPSHOT/com.apress.bgn.nine.AssertionDemo.main(AssertionDemo.java:46)\n\
    ```\n\nThe more complex form of an assertion adds another expression to be evaluated\
    \ or a value to be used in the stack to tell the user which assumption was wrong:\n\
    \n```\nassertion [expression1] : [expression2];\n```\n\nSo if we replace\n\n```\n\
    assert arr.length > 1;\n```\n\nwith\n\n```\nassert arr.length > 1 : \"Not enough\
    \ data to sort!\";\n```\n\nwhen the `java.lang.AssertionError` is thrown, now\
    \ it also depicts the *Not enough data to sort!* message, which makes it clear\
    \ why the assertion statement is preventing the rest of the code from being executed:\n\
    \n```\nException in thread \"main\" java.lang.AssertionError: Not enough data\
    \ to sort!\nat chapter.nine.logback@3.0-SNAPSHOT/com.apress.bgn.nine.AssertionDemo.main(AssertionDemo.java:46)\n\
    ```\n\nOr we could just print the size of the array:\n\n```\nassert arr.length\
    \ > 1 : arr.length;\n```\n\nOr both:\n\n```\nassert arr.length > 1 : \"Not enough\
    \ data to sort! Number of values: \" + arr.length;\n```\n\nAssertions can be used\
    \ before and after the piece of code that needs to be debugged. In the previous\
    \ case, the assertion was used as a precondition of the execution, because the\
    \ failure of the assertion prevents code from being executed.\n\nAssertions can\
    \ also be used as post conditions, to test the outcome of executing a piece of\
    \ code.\n\nIn the previous code snippet, the assertion was used to test the correctness\
    \ of the user-provided input. In situations like this, the restriction of a valid\
    \ input should be obeyed, whether assertions are enabled or not. Sure, if our\
    \ array is empty or contains just a single element, this is not a problem, as\
    \ the algorithm is not executed and this does not lead to a technical failure.\n\
    \nThere are a few rules to obey, or things to look for, when writing code using\
    \ assertions, and they are listed here:\n\n*   **Assertions should not be used\
    \ to check the correctness of arguments provided to public methods**. Correctness\
    \ of arguments should be tested in the code, and a proper `RuntimeException` should\
    \ be thrown. Validating public methods’ arguments should not be avoidable.\n\n\
    Caution\n\nUnfortunately, to keep this introduction to assertions simple, the\
    \ previous code samples showing how assertions work break this rule. After all,\
    \ the presence of valid arguments for the `main(..)` method is checked using an\
    \ assertion.\n\n*   **Assertions should not be used to do work that is required\
    \ for your application to run properly**. The main reason for this is that assertions\
    \ are disabled by default, and having them disabled leads to that code not being\
    \ executed, so the rest of the application will actually not function properly\
    \ because of the missing code. Assuming no arguments are provided to the `main(..)`\
    \ method in the previous example, an assertion could be used to initialize the\
    \ array being processed with a default value. But that doesn’t mean you should!\
    \ Code like the next line is bad, because disabling assertions removes the initialization\
    \ of the array with a default value:\n\n```\n    assert arr.length > 1 : arr =\
    \ new int[]{1, 2, 3};\n    ```\n\n*   **For performance reasons, do not use expressions\
    \ that are expensive to evaluate in assertions.** Even if assertions are disabled\
    \ by default, imagine that somebody enables them by mistake on a production application,\
    \ which could be quite unfortunate if some of those assertions are expensive to\
    \ evaluate. The next assertion breaks all three rules: initializes the array with\
    \ a default value if none is supplied, but only after waiting five minutes.\n\n\
    ```\n    Function sleepFiveMinsThenInit  =  aLong ->   {\n    try {Thread.sleep(Duration.ofMinutes(aLong).toMillis());\
    \ } catch (InterruptedException _) {}\n    return new int[]{1, 2, 3};\n    };\n\
    \    assert arr.length > 1 : sleepFiveMinsThenInit.apply(5L);\n    ```\n\nAssertions\
    \ are a simple but powerful feature. They can be used to detect bugs early in\
    \ the development life cycle, when they are easy to fix, and they simplify debugging\
    \ and improve quality. Just make sure to stick to the preceding three rules if\
    \ you use them."
  raw: "### Debug Using Assertions\n\nAnother way to debug your code is to use assertions.\
    \ As introduced in the **Chapter** [**4**](#463938_3_En_4_Chapter.xhtml) section\
    \ about Java keywords, the `assert` reserved keyword is used to write an assertion\
    \ statement, which is just a test of your assumptions about the program execution.\
    \ In the previous examples in this chapter, we had the user provide the input\
    \ for our sorting program, so in order for our program to do the right thing,\
    \ it is assumed that the user will provide the proper input, which means an array\
    \ with size greater than 1, because there is no point to run the algorithm for\
    \ a single number. So what does this assertion look like in the code? The answer\
    \ is depicted in Listing [9-21](#463938_3_En_9_Chapter.xhtml#PC24).\n\n```\npackage\
    \ com.apress.bgn.nine;\nimport com.apress.bgn.algs.QuickSort;\nimport java.util.Arrays;\n\
    import static com.apress.bgn.nine.SortingLogbackDemo.getInts;\nimport static java.lang.System.out;\n\
    public class AssertionDemo {\nvoid main(String... args){\nint[] arr = getInts(args);\n\
    assert arr.length > 1;\nvar mergeSort = new QuickSort();\nmergeSort.sort(arr,\
    \ 0, arr.length - 1);\nfinal StringBuilder sb2 = new StringBuilder(\"Sorted: \"\
    );\nArrays.stream(arr).forEach(i -> sb2.append(i).append(\" \"));\nout.println(sb2);\n\
    }\n}\nListing 9-21\nAsserting the Size of User-Provided Array\n```\n\nRunning\
    \ the code in Listing [9-21](#463938_3_En_9_Chapter.xhtml#PC24) without providing\
    \ any arguments to the program is possible, even though we have an assertion statement\
    \ in it. As expected, the code does nothing because there is no array to be sorted.\
    \ The reason the code runs despite the assertion is that all assertions need to\
    \ be enabled using a VM argument: `-ea`. To specify this argument, you can add\
    \ it to the command when executing from the command line, but you also can use\
    \ the editor by adding the argument in the VM options text box of the IntelliJ\
    \ IDEA launcher, as depicted in Figure [9-6](#463938_3_En_9_Chapter.xhtml#Fig6).\n\
    \n![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig6_HTML.jpg)\n\nFigure 9-6\n\
    \nIntelliJ IDEA launcher for the `AssertionDemo` class with the `-ea` VM argument\
    \ set\n\nWhen assertions are enabled, running the code in Listing [9-21](#463938_3_En_9_Chapter.xhtml#PC24)\
    \ ends with a `java.lang.AssertionError` being thrown because the expression of\
    \ the assertions is evaluated to `false`, since obviously the value of `arr.length`\
    \ is clearly not greater than 1 when no argument is provided.\n\nAssertions have\
    \ two forms, one simple and one more complex. The simple form of an expression\
    \ has just the expression to evaluate, the assumption to test:\n\n```\nassertion\
    \ [expression];\n```\n\nIn this case, the `java.lang.AssertionError` being thrown\
    \ just prints the line where the assumption is asserted for the current run of\
    \ the program, together with the module and the full classname:\n\n```\nException\
    \ in thread \"main\" java.lang.AssertionError\nat chapter.nine.logback@3.0-SNAPSHOT/com.apress.bgn.nine.AssertionDemo.main(AssertionDemo.java:46)\n\
    ```\n\nThe more complex form of an assertion adds another expression to be evaluated\
    \ or a value to be used in the stack to tell the user which assumption was wrong:\n\
    \n```\nassertion [expression1] : [expression2];\n```\n\nSo if we replace\n\n```\n\
    assert arr.length > 1;\n```\n\nwith\n\n```\nassert arr.length > 1 : \"Not enough\
    \ data to sort!\";\n```\n\nwhen the `java.lang.AssertionError` is thrown, now\
    \ it also depicts the *Not enough data to sort!* message, which makes it clear\
    \ why the assertion statement is preventing the rest of the code from being executed:\n\
    \n```\nException in thread \"main\" java.lang.AssertionError: Not enough data\
    \ to sort!\nat chapter.nine.logback@3.0-SNAPSHOT/com.apress.bgn.nine.AssertionDemo.main(AssertionDemo.java:46)\n\
    ```\n\nOr we could just print the size of the array:\n\n```\nassert arr.length\
    \ > 1 : arr.length;\n```\n\nOr both:\n\n```\nassert arr.length > 1 : \"Not enough\
    \ data to sort! Number of values: \" + arr.length;\n```\n\nAssertions can be used\
    \ before and after the piece of code that needs to be debugged. In the previous\
    \ case, the assertion was used as a precondition of the execution, because the\
    \ failure of the assertion prevents code from being executed.\n\nAssertions can\
    \ also be used as post conditions, to test the outcome of executing a piece of\
    \ code.\n\nIn the previous code snippet, the assertion was used to test the correctness\
    \ of the user-provided input. In situations like this, the restriction of a valid\
    \ input should be obeyed, whether assertions are enabled or not. Sure, if our\
    \ array is empty or contains just a single element, this is not a problem, as\
    \ the algorithm is not executed and this does not lead to a technical failure.\n\
    \nThere are a few rules to obey, or things to look for, when writing code using\
    \ assertions, and they are listed here:\n\n*   **Assertions should not be used\
    \ to check the correctness of arguments provided to public methods**. Correctness\
    \ of arguments should be tested in the code, and a proper `RuntimeException` should\
    \ be thrown. Validating public methods’ arguments should not be avoidable.\n\n\
    Caution\n\nUnfortunately, to keep this introduction to assertions simple, the\
    \ previous code samples showing how assertions work break this rule. After all,\
    \ the presence of valid arguments for the `main(..)` method is checked using an\
    \ assertion.\n\n*   **Assertions should not be used to do work that is required\
    \ for your application to run properly**. The main reason for this is that assertions\
    \ are disabled by default, and having them disabled leads to that code not being\
    \ executed, so the rest of the application will actually not function properly\
    \ because of the missing code. Assuming no arguments are provided to the `main(..)`\
    \ method in the previous example, an assertion could be used to initialize the\
    \ array being processed with a default value. But that doesn’t mean you should!\
    \ Code like the next line is bad, because disabling assertions removes the initialization\
    \ of the array with a default value:\n\n```\n    assert arr.length > 1 : arr =\
    \ new int[]{1, 2, 3};\n    ```\n\n*   **For performance reasons, do not use expressions\
    \ that are expensive to evaluate in assertions.** Even if assertions are disabled\
    \ by default, imagine that somebody enables them by mistake on a production application,\
    \ which could be quite unfortunate if some of those assertions are expensive to\
    \ evaluate. The next assertion breaks all three rules: initializes the array with\
    \ a default value if none is supplied, but only after waiting five minutes.\n\n\
    ```\n    Function sleepFiveMinsThenInit  =  aLong ->   {\n    try {Thread.sleep(Duration.ofMinutes(aLong).toMillis());\
    \ } catch (InterruptedException _) {}\n    return new int[]{1, 2, 3};\n    };\n\
    \    assert arr.length > 1 : sleepFiveMinsThenInit.apply(5L);\n    ```\n\nAssertions\
    \ are a simple but powerful feature. They can be used to detect bugs early in\
    \ the development life cycle, when they are easy to fix, and they simplify debugging\
    \ and improve quality. Just make sure to stick to the preceding three rules if\
    \ you use them."
  trans: "\n### 使用断言进行调试\n\n调试代码的另一种方法是使用断言。正如**第****4**章关于 Java 关键字的章节中所介绍的，`assert`\
    \ 保留关键字用于编写断言语句，它只是对你关于程序执行的假设进行测试。在本章前面的示例中，我们让用户为排序程序提供输入，因此为了让程序正确运行，我们假设用户会提供正确的输入，即一个长度大于\
    \ 1 的数组，因为对单个数字运行算法是没有意义的。那么，这个断言在代码中是什么样子的呢？答案如代码清单 9-21 所示。\n\n```\npackage\
    \ com.apress.bgn.nine;\nimport com.apress.bgn.algs.QuickSort;\nimport java.util.Arrays;\n\
    import static com.apress.bgn.nine.SortingLogbackDemo.getInts;\nimport static java.lang.System.out;\n\
    public class AssertionDemo {\nvoid main(String... args){\nint[] arr = getInts(args);\n\
    assert arr.length > 1;\nvar mergeSort = new QuickSort();\nmergeSort.sort(arr,\
    \ 0, arr.length - 1);\nfinal StringBuilder sb2 = new StringBuilder(\"Sorted: \"\
    );\nArrays.stream(arr).forEach(i -> sb2.append(i).append(\" \"));\nout.println(sb2);\n\
    }\n}\n代码清单 9-21\n断言用户提供的数组大小\n```\n\n即使代码清单 9-21 中包含断言语句，在不向程序提供任何参数的情况下运行它也是可能的。不出所料，代码什么也没做，因为没有数组需要排序。尽管有断言，代码仍能运行的原因是，所有断言都需要使用\
    \ VM 参数 `-ea` 来启用。要指定此参数，你可以在命令行执行时将其添加到命令中，也可以在 IntelliJ IDEA 启动器的 VM options\
    \ 文本框中添加该参数，如图 9-6 所示。\n\n![](img/463938_3_En_9_Fig6_HTML.jpg)\n\n图 9-6\n\n设置了\
    \ `-ea` VM 参数的 `AssertionDemo` 类的 IntelliJ IDEA 启动器\n\n当断言启用时，运行代码清单 9-21 中的代码会抛出\
    \ `java.lang.AssertionError`，因为断言的表达式被评估为 `false`，显然，当没有提供参数时，`arr.length` 的值肯定不大于\
    \ 1。\n\n断言有两种形式，一种简单，一种更复杂。简单的表达式形式只有待评估的表达式，即要测试的假设：\n\n```\nassertion [expression];\n\
    ```\n\n在这种情况下，抛出的 `java.lang.AssertionError` 只会打印当前程序运行中断言所在的行，以及模块和完整的类名：\n\n\
    ```\nException in thread \"main\" java.lang.AssertionError\nat chapter.nine.logback@3.0-SNAPSHOT/com.apress.bgn.nine.AssertionDemo.main(AssertionDemo.java:46)\n\
    ```\n\n更复杂的断言形式会添加另一个待评估的表达式，或一个在堆栈中使用的值，以告知用户哪个假设是错误的：\n\n```\nassertion [expression1]\
    \ : [expression2];\n```\n\n因此，如果我们把\n\n```\nassert arr.length > 1;\n```\n\n替换为\n\
    \n```\nassert arr.length > 1 : \"Not enough data to sort!\";\n```\n\n那么当抛出 `java.lang.AssertionError`\
    \ 时，它还会显示 *Not enough data to sort!* 消息，这清楚地说明了为什么断言语句阻止了其余代码的执行：\n\n```\nException\
    \ in thread \"main\" java.lang.AssertionError: Not enough data to sort!\nat chapter.nine.logback@3.0-SNAPSHOT/com.apress.bgn.nine.AssertionDemo.main(AssertionDemo.java:46)\n\
    ```\n\n或者，我们也可以只打印数组的大小：\n\n```\nassert arr.length > 1 : arr.length;\n```\n\n\
    或者两者都打印：\n\n```\nassert arr.length > 1 : \"Not enough data to sort! Number of\
    \ values: \" + arr.length;\n```\n\n断言可以在需要调试的代码片段之前和之后使用。在前面的例子中，断言被用作执行的前提条件，因为断言失败会阻止代码执行。\n\
    \n断言也可以用作后置条件，以测试执行一段代码后的结果。\n\n在前面的代码片段中，断言用于测试用户提供输入的正确性。在这种情况下，无论断言是否启用，都应该遵守有效输入的限制。当然，如果我们的数组为空或只包含一个元素，这也不是问题，因为算法不会执行，也不会导致技术故障。\n\
    \n在使用断言编写代码时，有一些规则需要遵守，或者需要注意的事项，现列举如下：\n\n*   **不应使用断言来检查提供给公共方法的参数的正确性**。参数的正确性应在代码中进行测试，并应抛出适当的\
    \ `RuntimeException`。验证公共方法的参数不应是可避免的。\n\n注意\n\n不幸的是，为了保持对断言的介绍简单明了，前面展示断言如何工作的代码示例违反了这条规则。毕竟，`main(..)`\
    \ 方法有效参数的存在是通过断言来检查的。\n\n*   **不应使用断言来执行应用程序正常运行所需的工作**。主要原因是断言默认是禁用的，禁用它们会导致那段代码不被执行，因此应用程序的其余部分实际上会因为缺少代码而无法正常运行。假设在前面的例子中没有向\
    \ `main(..)` 方法提供参数，可以使用断言来用默认值初始化正在处理的数组。但这并不意味着你应该这样做！像下面这行代码是不好的，因为禁用断言会移除用默认值初始化数组的操作：\n\
    \n```\n    assert arr.length > 1 : arr = new int[]{1, 2, 3};\n    ```\n\n*   **出于性能原因，不要在断言中使用评估成本高昂的表达式**。即使断言默认是禁用的，想象一下有人在生产应用程序中错误地启用了它们，如果其中一些断言评估成本高昂，那可能会非常不幸。下面的断言违反了所有三条规则：如果没有提供数组，则用默认值初始化数组，但前提是等待五分钟之后。\n\
    \n```\n    Function sleepFiveMinsThenInit  =  aLong ->   {\n    try {Thread.sleep(Duration.ofMinutes(aLong).toMillis());\
    \ } catch (InterruptedException _) {}\n    return new int[]{1, 2, 3};\n    };\n\
    \    assert arr.length > 1 : sleepFiveMinsThenInit.apply(5L);\n    ```\n\n断言是一个简单但强大的特性。它们可以在开发生命周期的早期（此时问题易于修复）用于检测错误，并且它们简化了调试并提高了质量。如果你使用它们，请务必遵守上述三条规则。\n"
- fmt: "### Step-By-Step Debugging\n\nIf you do not want to write log messages or\
    \ use assertions, but you still want to inspect values of variables during the\
    \ execution of a program, there is a way to do that using an IDE, as mentioned\
    \ in previous chapters: pause the execution using breakpoints and use the IDE\
    \ to inspect variable contents or execute simple statements to check if your program\
    \ is performing as expected.\n\nA **breakpoint** is a mark set on an executable\
    \ line of code (not a comment line or an empty line, and not a declaration). To\
    \ set a breakpoint in IntelliJ IDEA, either click the gutter area on the line\
    \ you are interested in or select the line and choose from the **Run** menu the\
    \ option **Toggle Line Breakpoint**. When a breakpoint is in place, a red bubble\
    \ appears on the line in the gutter section. Figure [9-7](#463938_3_En_9_Chapter.xhtml#Fig7)\
    \ shows a few breakpoints set in IntelliJ IDEA.\n\n![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig7_HTML.jpg)\n\
    \nFigure 9-7  \nIntelliJ IDEA breakpoints\n\nOnce the breakpoints are in place,\
    \ when the application runs in debug mode, it will pause on each of the marked\
    \ lines. During the pause, you can continue the execution step by step, inspect\
    \ values of the variables, and even evaluate expressions in the context of the\
    \ running application. IntelliJ IDEA is very helpful with this, as it shows you\
    \ the contents of every variable in each line of the code currently being executed.\
    \ In Figure [9-8](#463938_3_En_9_Chapter.xhtml#Fig8) the `SortingLogbackDemo`\
    \ class is running in debug mode and is paused during execution using breakpoints.\n\
    \n![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig8_HTML.jpg)\n\nFigure 9-8\
    \  \nIntelliJ IDEA `SortingLogbackDemo` class paused during execution\n\nTo run\
    \ an application in debug mode, instead of starting the launcher normally, start\
    \ it by clicking the green bug-shaped button with a curved arrow (marked with\
    \ a red **1.** in Figure [9-8](#463938_3_En_9_Chapter.xhtml#Fig8)) next to the\
    \ green triangle-shaped button that is used to run the application normally.\n\
    \nThe application runs and stops at the first line marked with a breakpoint, enabling\
    \ the developer to inspect the values of the variables on that line, as shown\
    \ in the upper half of Figure [9-8](#463938_3_En_9_Chapter.xhtml#Fig8). From that\
    \ point, the developer can also do the following in the **Debug** section at the\
    \ bottom of Figure [9-8](#463938_3_En_9_Chapter.xhtml#Fig8):\n\n- Continue the\
    \ execution until the next breakpoint by clicking the green triangle-shaped button\
    \ (left toolbar, marked in Figure [9-8](#463938_3_En_9_Chapter.xhtml#Fig8) with\
    \ **2.**).\n- Stop the execution by clicking the red square-shaped button (left\
    \ toolbar).\n- Disable all breakpoints by clicking the button with a red bubble\
    \ cut diagonally (left toolbar).\n- Continue execution to the next line of code\
    \ by clicking the button with a thin black arrow with a 90-degree angle (left\
    \ toolbar).\n- Continue execution by entering the method in the current line of\
    \ code by clicking the button with a thin black arrow oriented down with an underscore\
    \ at its tip (left toolbar).\n\n**Important**  \nThe **Force Step Into** and **Step\
    \ Out of Code Block** options in the **Debug** menu marked in Figure [9-8](#463938_3_En_9_Chapter.xhtml#Fig8)\
    \ with **3.** are used to step over and step into methods provided by third-party\
    \ libraries. IntelliJ IDEA tries to find source code for those methods. If it\
    \ can’t find source code, then it might show you an auto-generated stub based\
    \ on the bytecode/library. The thin black arrows in the section marked with **2.**\
    \ only allow debugging of the current project code.\n\n- Continue execution by\
    \ stepping out of the current method by choosing the **Step Out of Code Block**\
    \ option from the drop-down menu marked in Figure [9-8](#463938_3_En_9_Chapter.xhtml#Fig8)\
    \ with **3.**.\n- Continue the execution to the line pointed at by the cursor\
    \ by choosing the **Run to Cursor** option from the drop-down menu marked in Figure\
    \ [9-8](#463938_3_En_9_Chapter.xhtml#Fig8) with **3.**.\n- Evaluate your own expressions\
    \ by adding them to the **Watches** section marked in Figure [9-8](#463938_3_En_9_Chapter.xhtml#Fig8)\
    \ with **4.**, by using the button marked with **5.**. The only condition is that\
    \ the expressions only use variables that are accessible in the context of the\
    \ breakpoint line. E.g., are part of the same method body, or class body and the\
    \ accessor is not important, private fields can be inspected too.\n\nAnother way\
    \ to evaluate expression in the context of the application currently running is\
    \ to right-click the file where your execution is currently paused and, from the\
    \ context menu that opens, select the option **Evaluate Expression**. A dialog\
    \ window opens where you can write complex expressions and then click **Evaluate**\
    \ to evaluate them on the spot, as depicted in Figure [9-9](#463938_3_En_9_Chapter.xhtml#Fig9).\n\
    \n![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig9_HTML.jpg)\n\nFigure 9-9\
    \  \nIntelliJ IDEA expression evaluation during debugging session\n\nMost Java\
    \ smart editors provide means to run a Java application in debug mode; just make\
    \ sure to clean up your **Watches** (or equivalent) section from time to time.\
    \ If the expressions added in the **Watches** section are expensive to evaluate,\
    \ they might affect the performance of the application. Also, be aware of expressions\
    \ that use streams, since these might make the application fail, as proven in\
    \ **Chapter** [**8**](#463938_3_En_8_Chapter.xhtml).\n\n### Inspect a Running\
    \ Application Using Java Tools\n\nAside from the executables to compile Java code\
    \ and execute or package Java bytecode, the JDK provides a set of utility executables\
    \ that can be used to debug and inspect the state of a running Java application.\
    \ This section covers the most useful of them. Without further ado, let’s do this!"
