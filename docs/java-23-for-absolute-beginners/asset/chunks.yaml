  raw: 'The `throwIfFailed(..)` method throws the exception produced by the given
    exception supplying the function if a subtask failed. When this is used, if any
    subtask failed with an exception, then the function is invoked, with the exception
    of the first subtask to fail. In this example we include the subtask exception
    message in the exception returned by the function. The exception returned by the
    function is thrown. This method does nothing if no subtasks failed. There is a
    version of this method that takes no argument, and in this case a `java.util.concurrent.ExecutionException`
    is thrown that is wrapped around the exception of the first subtask to fail.


    Another thing that is worth mentioning is the special `catch` block. This type
    of `catch` block was introduced in Java 7 to reduce the duplicated code caused
    by the necessity of handling multiple exceptions:


    ```

    } catch (InterruptedException | TimeoutException | IllegalStateException e)  {

    // handle the exception

    }

    ```


    Before Java 7 the same block would have been written as follows:


    ```

    } catch (InterruptedException e) {

    // handle the exception

    } catch (TimeoutException e) {

    // handle the exception

    } catch (IllegalStateException e) {

    // handle the exception

    }

    ```


    Even if there was support for executing subtasks concurrently in Java, provided
    by the `java.util.concurrent.ExecutorService` API introduced in Java 5, the new
    structured concurrency API helps developers write more readable code, which is
    easier to debug too and adds in the bonus of eliminating common risks arising
    from cancellation and shutdown, such as thread leaks and cancellation delays.


    ## Summary


    In this chapter you learned how memory for a Java program is administered by the
    JVM and the basics of the most-used Java data types. A few important details that
    should remain with you from this chapter are listed here:


    *   There are two type of memory managed by the JVM: stack and heap.


    *   The difference between primitive and reference types.


    *   Primitive values are stored in the stack memory, and object values are stored
    in the heap.


    *   There are eight primitive data types in Java: `boolean`, `char`, `short`,
    `byte`, `int`, `long`, `float`, `double`.


    *   References can only be of the super-type of an assigned object.


    *   The size of an array is defined when it is created, and it cannot be changed
    afterward.


    *   In Java, `String` instances are *immutable*, which means they cannot be changed
    once created.


    *   If calendar dates need to be handled, use the new DateTime API.


    *   `null` is useful and powerful.


    *   Collections can group object types together in tuples or key/value pairs.


    *   Classic concurrency in Java is fun in small doses.


    *   Virtual threads are one of the most useful features introduced in Java 21.


    *   Structured concurrency allows you to write code to execute tasks in parallel
    without needing to write any thread management code.


    Some examples in this chapter might seem complicated, but do not be discouraged.
    It is difficult to explain certain concepts without providing working code that
    you can execute, test, and even modify yourself. Unfortunately, this requires
    the use of concepts that will be introduced in later chapters (such as `for` and
    `if` statements). Just make a note of every concept that it is not clear now and
    the page number, and return to this chapter after you have read about the concept
    in detail later in the book.


