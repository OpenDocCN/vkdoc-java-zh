    `List<E>` 包含一个未排序的非唯一数据集合，其中也包括 `null` 元素。在代码清单 5-39 中，我们声明了一个 `List<E>` 类型的引用和一个
    `ArrayList<E>` 类型的对象。我们这样做是因为所有实现都具有相同的 API，因此我们可以轻松地将 `ArrayList<E>` 切换为 `LinkedList<E>`，并且代码仍然可以工作：


    ```

    List stringList = new ArrayList();

    stringList = new LinkedList();

    ```


    重要


    声明抽象引用是一种良好的编程实践，因为它能提高代码的灵活性。


    前面示例中的语法是 Java 1.7 之前的版本。在 Java 1.7 中引入了 `<>`（菱形运算符）。这进一步简化了集合的初始化，因为它只需要在引用声明中指定列表中元素的类型。因此，前面代码片段中的两行变成了：


    ```

    List stringList = new ArrayList();

    stringList = new LinkedList();

    ```


    从 Java 1.5 开始，每个新的 Java 版本都对集合框架进行了更改。Java 1.8 通过在 `java.lang.Iterable<E>` 接口（见图
    5-20）中添加一个名为 `forEach` 的默认方法来支持 lambda 表达式，而该接口由 `java.lang.Collection<E>` 接口扩展。因此，像我们之前使用
    `for` 循环打印列表中所有值的代码，可以替换为：


    ```

    stringList.forEach(element -> System.out.println(element));

    ```


    在 Java 9 中，引入了另一项改进：集合的工厂方法。我们的集合是通过重复调用 `add(..)` 来填充元素的，这有点冗余，特别是当我们已经拥有要放入列表的完整元素集合时。因此，在
    Java 9 中引入了用一行代码创建集合对象的方法，如下例所示：


    ```

    List stringList = List.of("one", "two", "three");

    ```


    生成的 `List<E>` 是一个不可变集合：它不能再被修改，意味着不能向其中添加或移除元素。


    Java 10 增加了对局部变量类型推断的支持，这意味着我们不再需要显式指定引用类型，因为它会根据对象类型自动推断。因此，以下声明：


    ```

    List stringList = List.of("one", "two", "three");

    ```


    变成了：


    ```

    var stringList = List.of("one", "two", "three");

    ```


    直到 Java 21，集合框架一直缺少一种表示具有定义相遇顺序的元素序列的集合类型。它也缺少一组统一的、适用于此类集合的操作。例如，`List<E>` 和
    `Deque<E>` 都定义了相遇顺序，但它们的公共超类型 `Collection<E>` 却没有。类似地，`Set<E>` 没有定义相遇顺序，其子类型如
    `HashSet<E>` 也没有定义，但 `SortedSet<E>` 和 `LinkedHashSet<E>` 等子类型定义了。Java 21 引入了 `SequencedCollection<E>`
    接口，该接口定义了一个具有明确相遇顺序的集合，支持两端操作，并且是可逆的。


    当然，在 Java 21 之前也可以访问集合的两端，但这需要调用带有特定索引的 `get(..)` 和 `add(..)` 方法。新方法提供了一种使用有序集合编写代码的简单方式，而更简单的代码也更容易阅读。


