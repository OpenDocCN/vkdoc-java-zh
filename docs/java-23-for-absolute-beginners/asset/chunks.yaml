  trans: '

    ### 访问 Java 进程 API


    Java 9 除了 Jigsaw 模块（在**第** **3****章**中介绍）之外，还带来了许多其他改进，其中之一是全新改进的 Java 进程 API，它允许你启动本地操作系统进程、检索相关信息并进行管理。在早期版本的
    Java 中，虽然已经具备操作进程的能力，但功能相当简陋。清单 9-25 展示了在 Java 5 之前是如何创建进程的。


    ```

    package com.apress.bgn.nine;

    // 导入部分已省略

    public class ProcessCreationDemo {

    private static final Logger log =

    LoggerFactory.getLogger(ProcessCreationDemo.class);

    public static void main(String[] args){

    try {

    Process exec = Runtime.getRuntime()

    .exec(new String[] { "/bin/sh", "-c", "echo Java home: $JAVA_HOME" });

    exec.waitFor();

    InputStream is = exec.getInputStream();

    StringBuilder textBuilder = new StringBuilder();

    try (Reader reader = new BufferedReader(new InputStreamReader(is, StandardCharsets.UTF_8)))
    {

    int c = 0;

    while ((c = reader.read()) != -1) {

    textBuilder.append((char) c);

    }

    }

    log.info("Process output -> {}", textBuilder.toString());

    log.info("Process result: {}", exec.exitValue());

    } catch (Exception e) {

    log.error("Process execution failed: {}", e.getMessage(), e);

    }

    }

    }

    // 输出

    // INFO  c.a.b.n.ProcessCreationDemo - Process output -> Java home: /Users/iuliana/.sdkman/candidates/java/current

    // INFO  c.a.b.n.ProcessCreationDemo - Process result: 0

    清单 9-25

    使用 Java 5 之前的 API 创建进程

    ```


    拦截已启动进程的输出非常麻烦，必须将一个 `BufferedReader` 实例包装在连接到进程正常输出的 `InputStream` 实例上。在 Java
    5 中，`java.lang` 包中引入了一个名为 `ProcessBuilder` 的类，用于通过改进的 API 创建操作系统进程。然而，Java 进程
    API 的重大改进直到 Java 9 发布时才真正落地。


    Java 9 的进程 API 让事情变得更加实用。其核心包含几个类和接口，它们的名称都以 `Process` 开头。我们之前对 Java 可执行文件所做的操作，现在可以直接通过编写
    Java 代码来完成。提供访问本地进程 API 的接口名为 `ProcessHandle`，它是核心 Java `java.lang` 包的一部分。与 `Thread`
    类类似，该接口上有一个名为 `current` 的静态方法，用于检索当前运行进程的 `ProcessHandle` 实例。一旦获得该实例，我们就可以使用其方法来访问更多进程细节。`ProcessHandle`
    提供了几个静态实用方法来访问本地进程。可以编写 Java 代码来列出计算机上运行的所有进程，并且可以根据各种条件对它们进行排序。清单 9-26 中的代码列出了所有通过运行
    `java` 命令创建的进程。


    ```

    package com.apress.bgn.nine;

    // 导入部分已省略

    public class ProcessListingDemo {

    private static final Logger log = LoggerFactory.getLogger(ProcessListingDemo.class);

    public static void main(String[] args){

    Optional currUser = ProcessHandle.current().info().user();

    ProcessHandle.allProcesses().filter(ph -> ph.info().user().equals(currUser) &&
    ph.info().commandLine().isPresent())

    .filter(ph -> ph.info().commandLine().get().contains("java"))

    .forEach(p -> {

    log.info("PID: " + p.pid());

    p.info().arguments().ifPresent(s -> Arrays.stream(s).forEach(a -> log.info("   arg:
    {}", a)));

    p.info().command().ifPresent(c -> log.info("\t Command: {}", c));

    });

    }

    }

    清单 9-26

    使用 Java 9 进程 API 列出所有 Java 进程

    ```


