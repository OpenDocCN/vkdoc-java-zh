    #### 使用 SLF4J 和 Logback 进行日志记录


    最著名的 Java 日志门面是 SLF4J（Simple Logging Facade for Java）^(⁷²)，它为各种日志框架提供了日志抽象。这意味着，如果你在代码中使用
    SLF4J 的接口和类，那么所有后台工作将由类路径中找到的具体日志实现来完成。最棒的是？你可以随时更改日志实现，而你的代码仍然可以正确编译和执行，无需修改任何内容。


    在本章迄今为止介绍的日志代码示例中，代码都与 JUL 绑定；如果我们出于某种原因想要更改日志库，我们也需要更改现有代码。第一步是将我们的代码改为使用 SLF4J
    API。


    注意


    提醒一下，应用程序编程接口（API）描述了库中公开可用的组件：接口、类、方法等。


    使用 SLF4J 的另一个优点是，如果日志配置文件位于类路径上，配置会自动被读取。这意味着，只要配置文件的命名符合所使用的具体日志实现的标准，JUL 所需的
    `LogManager` 初始化块对于 SLF4J 来说就不是必需的。本节首先将清单 9-5 中的主要 `SortingJulDemo` 类转换为清单 9-15
    中所示的 `SortingLogbackDemo` 类，方法是将 JUL 配置和日志语句替换为 SLF4J 特有的语句。


    ```

    package com.apress.bgn.nine;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    // 其他导入已省略

    public class SortingLogbackDemo {

    private static final Logger log = LoggerFactory.getLogger(SortingLogbackDemo.class);

    public static void main(String... args) {

    if (args.length == 0) {

    log.error("没有要排序的数据！");

    return;

    }

    int[] arr = getInts(args);

    final StringBuilder sb = new StringBuilder ("使用归并排序对数组进行排序：");

    Arrays.stream(arr).forEach(i -> sb.append(i).append(" "));

    log.debug(sb.toString());

    IntSorter mergeSort = new MergeSort();

    mergeSort.sort(arr, 0, arr.length - 1);

    final StringBuilder sb2 = new StringBuilder("排序后：");

    Arrays.stream(arr).forEach(i -> sb2.append(i).append( " "));

    log.info(sb2.toString());

    }

    // getInts 方法已省略

    }

    清单 9-15

    SortingLogbackDemo 类

    ```


    SLF4J 定义了一个 API，该 API 映射到尚未提及的日志库提供的具体实现。SLF4J 的日志语句看起来非常相似，但日志级别与 JUL 的日志级别略有不同。以下列表解释了最常见的
    SLF4J 日志语句：


    *   `log.error(..)` 用于在 `ERROR` 级别记录消息；通常，当应用程序发生严重故障且无法继续正常执行时，会使用这些消息。此方法有不止一种形式，异常和对象可以作为参数传递给它，以便评估故障发生时的应用程序状态。


    *   `log.warn(..)` 用于在 `WARN` 级别记录消息；通常，打印这些消息是为了通知应用程序运行不正常，并且可能有理由担心。与 `log.error(..)`
    一样，`log.warn(..)` 也有不止一种形式，异常和对象可以作为参数传递，以更好地评估应用程序的当前状态。


    *   `log.info``(..)` 用于在 `INFO` 级别记录消息；此类消息是信息性的，用于让用户知道一切正常且按预期工作。


    *   `log.debug(..)` 用于在 `DEBUG` 级别记录消息；通常，这些消息用于打印应用程序的中间状态，以检查事情是否按预期进行，并且在发生故障时，用于追踪应用程序对象的演变。


    *   `log.trace(..)` 用于在 `TRACE` 级别记录消息；此类消息是信息性的，重要性非常低。


    此示例使用的具体日志实现称为 Logback^(⁷³)，我在本书的第一版中选择了它，因为当时它是 Java 9 引入模块后唯一能与 SLF4J 配合使用的库。Logback
    被视为 Apache Log4j^(⁷⁴) 的继任者，后者是另一种流行的日志实现。


    信息


    趣闻：Log4j、SLF4j 和 Logback 都是由同一个人创立的：Ceki Gülcü。他目前正在开发后两者。至于 Log4j，它已被 Apache
    Log4j 2 取代，这是一个对其前身进行了重大改进的升级版本。目前，Log4j 2 的第 3 版正在开发中，因此，在日志记录方面，开发人员有相当多的不错选择。


    Logback 原生实现了 SLF4J，因此无需添加另一个桥接库，并且它速度更快，因为 Logback 的内部结构已被重写，以便在关键执行点上执行得更快。在修改我们的类以使用
    SLF4J 之后，我们只需将 Logback 添加为应用程序的依赖项，并在 `src/main/resources` 目录下添加一个配置文件。配置文件可以用
    XML 或 Groovy 编写，标准要求将其命名为 `logback.xml`。清单 9-16 描述了本节示例中该文件的内容。


    ```


    %d{HH:mm:ss.SSS} %-5level %logger{5} - %msg%n


    清单 9-16

    logback.xml 配置文件的内容

    ```


    `ch.qos.logback.core.ConsoleAppender` 类将日志消息写入控制台，`<pattern>` 元素的值定义了日志消息的格式。Logback
    可以通过将包名缩短为其首字母来格式化完全限定的类名，从而允许在不丢失细节的情况下进行紧凑的日志记录。这使得 Logback 成为当前 Java 开发世界中最受欢迎的日志实现之一。包名如果由多个部分组成，则会缩减为每个部分的首字母。`MergeSort`
    类中的日志调用全部被替换为 `log.debug(..)`，因为这些消息是中间状态的，并非真正的信息性消息，只是应用程序在执行过程中使用的对象状态的示例。应用程序的通用日志级别可以使用
    `<root>` 元素设置为所需级别，但可以使用 `<logger>` 元素为类、包或包的子集设置不同的日志级别。


    使用之前的配置运行 `SortingLogbackDemo` 类会产生如清单 9-17 所示的输出。


    ```

    16:25:41.178 WARN  c.a.b.n.SortingLogbackDemo - 元素 a 不是整数，无法添加到数组中！

    16:25:41.182 WARN  c.a.b.n.SortingLogbackDemo - 元素 b 不是整数，无法添加到数组中！

    16:25:41.182 WARN  c.a.b.n.SortingLogbackDemo - 元素 - 不是整数，无法添加到数组中！

    16:25:41.182 WARN  c.a.b.n.SortingLogbackDemo - 元素 ds 不是整数，无法添加到数组中！

    16:25:41.183 DEBUG c.a.b.n.SortingLogbackDemo - 使用归并排序对数组进行排序：5 3 2 1 4

    16:25:41.185 DEBUG c.a.b.n.a.MergeSort - 调用排序：[0 4] 5 3 2 1 4

    # 日志语句已省略

    16:25:41.185 DEBUG c.a.b.n.a.MergeSort - 调用合并：[0 1 0],) 3 5

    # 日志语句已省略

    16:25:41.185 DEBUG c.a.b.n.a.MergeSort - 调用合并：[0 4 2],) 1 2 3 4 5

    16:25:41.186 INFO  c.a.b.n.SortingLogbackDemo - 排序后：1 2 3 4 5

