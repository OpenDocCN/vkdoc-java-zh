  raw: "#### Intermediate Operation **gather**\n\nLet’s assume we want to reduce the\
    \ stream of songs we have been playing with so far by keeping only one song for\
    \ each singer. There is no stream operation that does this, so we need to design\
    \ a component that defines songs’ equality based on the singer and use it together\
    \ with `map(..)`and `distinct(..)` as shown in Listing [8-46](#463938_3_En_8_Chapter.xhtml#PC63).\n\
    \n```\npackage com.apress.bgn.eight;\nimport com.apress.bgn.eight.util.Song;\n\
    import com.apress.bgn.eight.util.StreamMediaLoader;\nimport java.util.HashSet;\n\
    import java.util.Objects;\nimport static java.lang.System.out;\npublic class NoStreamGathererDemo\
    \ {\nrecord DistinctBySinger(Song song) {\n@Override public boolean equals(Object\
    \ obj) {\nreturn obj instanceof DistinctBySinger(Song other)\n&& Objects.equals(song.getSinger(),\
    \ other.getSinger());\n}\n@Override public int hashCode() {\nreturn song == null\
    \ ? 0 : song.getSinger().hashCode();\n}\n}\nvoid main(){\nvar songs = StreamMediaLoader.loadSongs();\n\
    var reducedSongs = songs.map(DistinctBySinger::new)\n.distinct()\n.map(DistinctBySinger::song)\n\
    .peek(out::println);\nvar songList = reducedSongs.toList();\nout.println(songList.size()\
    \ + \" == \" + new HashSet(songList).size());\n}\n}\nListing 8-46\nStream Complex\
    \ Operation for Creating a Stream Containing Only One Song per Singer\n```\n\n\
    Just because it is practical to do so, we’ve defined the `DistinctBySinger` instance\
    \ to be a record, but this does not do much to simplify the stream pipeline. A\
    \ better solution to simplify the stream pipeline would be to have—instead of\
    \ two `map(..)` calls and one `distinct(..)` call—a single call to a method we\
    \ pass a `DistinctBySinger` instance to.\n\nThe `gather(..)` method, introduced\
    \ in Java 22 as a preview feature, returns a stream consisting of the results\
    \ of applying the given `java.util.stream.Gatherer<T, A, R>` instance. This operation\
    \ has been introduced to provide support for more complex stream intermediary\
    \ operations by applying a user-defined entity called a **gatherer**. The `gather(..)`\
    \ operation allows developers to build efficient, parallel-ready streams that\
    \ implement almost any intermediate operation. A gatherer is very powerful and\
    \ has the following capabilities:\n\n*   Transform elements in a one-to-one, one-to-many,\
    \ many-to-one, or many-to-many fashion.\n\n*   Track previously seen elements\
    \ to influence the transformation of later elements.\n\n*   Short-circuit to transform\
    \ infinite streams to finite streams.\n\n*   Apply different transformations based\
    \ on conditions, and create more elements as a result of processing one from the\
    \ initial stream.\n\nThese capabilities translate into being able to group elements\
    \ in batches, deduplicate consecutively similar elements, gradually accumulate\
    \ elements, or gradually reorder them.\n\nAs you can see, a gatherer can do a\
    \ lot of things, and this is because the gatherer is actually made of four functions\
    \ that work together:\n\n*   An **initializer** function: Can be used to provide\
    \ an object that maintains private state while processing stream elements.\n\n\
    *   An **integrator** function: Integrates a new element from the input stream,\
    \ possibly inspecting the private state object and possibly emitting elements\
    \ to the output stream.\n\n*   A **combiner** function: Can be used evaluate the\
    \ gatherer in parallel when the input stream is marked as parallel.\n\n*   A **finisher**\
    \ function: Can be invoked when there are no more input elements to consume. This\
    \ function can inspect the private state object and, possibly, emit additional\
    \ output elements.\n\nThere would be a lot more things to say about gatherers,\
    \ but let’s mix some practice with the theory, shall we?\n\n##### Creating a Custom\
    \ Gatherer\n\n`Gatherer<T, A, R>` is an interface that developers must implement\
    \ to create their own custom gatherer. So, to rewrite the code in Listing [8-46](#463938_3_En_8_Chapter.xhtml#PC63)\
    \ to replace the two `map(..)` calls and one `distinct(..)` call with a call of\
    \ `gather(..)`, we need to implement the `DistinctBySinger` record to implement\
    \ the `Gatherer<T, A, R>` interface. This type of processing does not require\
    \ a *combiner*, since we are not interested in running the gatherer in parallel,\
    \ and does not require a *finisher*, since we are interested in the resulting\
    \ stream. So the code in Listing [8-46](#463938_3_En_8_Chapter.xhtml#PC63) becomes\
    \ the code in Listing [8-47](#463938_3_En_8_Chapter.xhtml#PC64).\n\n```\npackage\
    \ com.apress.bgn.eight;\nimport com.apress.bgn.eight.util.Song;\nimport com.apress.bgn.eight.util.StreamMediaLoader;\n\
    import java.util.ArrayList;\nimport java.util.HashSet;\nimport java.util.List;\n\
    import java.util.function.Supplier;\nimport java.util.stream.Gatherer;\nimport\
    \ static java.lang.System.out;\npublic class CustomGathererDemo {\nrecord DistinctBySinger()\
    \ implements Gatherer, Song> {\n@Override\npublic Supplier>  initializer() {\n\
    return () -> new HashSet();\n}\n@Override\npublic Integrator, Song, Song> integrator()\
    \ {\nreturn Integrator.of((singersList, element, downstream) -> {\nif (singersList.add(element.getSinger()))\
    \ {\n// emit the current integer downstream, if singer was added to the set\n\
    downstream.push(element);\n}\n// Return true to continue processing stream elements\n\
    return true;\n});\n}\n}\nvoid main(){\nvar songs = StreamMediaLoader.loadSongs();\n\
    var reducedSongs = songs.gather(new DistinctBySinger())\n.peek(out::println);\n\
    var songList = reducedSongs.toList();\nout.println(songList.size() + \" == \"\
    \ + new HashSet(songList).size());\n}\n}\nListing 8-47\nStream Complex Operation\
    \ for Creating a Stream Containing Only One Song per Singer Using a Gatherer\n\
    ```\n\nThe following list explains the components of Listing [8-47](#463938_3_En_8_Chapter.xhtml#PC64):\n\
    \n*   The three types used as parameters when implementing the `Gatherer<T, A,\
    \ R>` represent the following:\n    *   `T`: The type of input elements to the\
    \ gatherer operation. In this case the original stream contains `Song` instances\
    \ that are the input to the gatherer operation.\n\n*   `A`: The potential mutable\
    \ state type of the gatherer operation. In this case the type is `Set<String>`\
    \ because we are going to use this string to keep track of the distinct singer\
    \ names.\n\n*   `R`: The type of output elements from the gatherer operation.\
    \ In this case the type is also `Song`.\n\n*   The `initializer()` function is\
    \ optional, but in this scenario we need it to initialize the `Set<String>` instance\
    \ that will hold the values that determine the output of the gatherer.\n\n*  \
    \ The `integrator()` function is mandatory, since a gatherer would not be a gatherer\
    \ without the ability to integrate(*gather*) the provided elements. To make it\
    \ easy to create an integrator function the JDK provides two factory methods:\n\
    \    *   `Gatherer.Integrator.of(Gatherer.Integrator)``:` The method used in this\
    \ example, it receives elements, processes them, and optionally sends incremental\
    \ results downstream. Our integrator function does exactly this using the `Set<String>`\
    \ instance as an internal state for the gatherer: it attempts to add the element\
    \ singer name to the set, and if that succeeds it pushes the element downstream.\n\
    \n*   `Gatherer.Integrator.ofGreedy(Gatherer.Greedy)`: As its name indicates,\
    \ this method consumes all the input and may only relay that the downstream does\
    \ not want more elements.\n\n*   The class that implements `Gatherer<T, A, R>`\
    \ is instantiated and the instance is passed as an argument to the `gather(..)`\
    \ method."
  trans: "\n#### 中间操作 **gather**\n\n假设我们想要缩减目前处理的歌曲流，只为每位歌手保留一首歌。现有的流操作无法直接实现这一点，因此我们需要设计一个组件，基于歌手定义歌曲的相等性，并将其与\
    \ `map(..)` 和 `distinct(..)` 结合使用，如清单 8-46 所示。\n\n```\npackage com.apress.bgn.eight;\n\
    import com.apress.bgn.eight.util.Song;\nimport com.apress.bgn.eight.util.StreamMediaLoader;\n\
    import java.util.HashSet;\nimport java.util.Objects;\nimport static java.lang.System.out;\n\
    public class NoStreamGathererDemo {\nrecord DistinctBySinger(Song song) {\n@Override\
    \ public boolean equals(Object obj) {\nreturn obj instanceof DistinctBySinger(Song\
    \ other)\n&& Objects.equals(song.getSinger(), other.getSinger());\n}\n@Override\
    \ public int hashCode() {\nreturn song == null ? 0 : song.getSinger().hashCode();\n\
    }\n}\nvoid main(){\nvar songs = StreamMediaLoader.loadSongs();\nvar reducedSongs\
    \ = songs.map(DistinctBySinger::new)\n.distinct()\n.map(DistinctBySinger::song)\n\
    .peek(out::println);\nvar songList = reducedSongs.toList();\nout.println(songList.size()\
    \ + \" == \" + new HashSet(songList).size());\n}\n}\n清单 8-46\n用于创建每位歌手仅包含一首歌的流的复杂流操作\n\
    ```\n\n出于实用考虑，我们将 `DistinctBySinger` 实例定义为一个记录，但这对于简化流管道并没有太大帮助。简化流管道的更好方案是：不采用两次\
    \ `map(..)` 调用和一次 `distinct(..)` 调用，而是改为单次调用一个方法，并将 `DistinctBySinger` 实例作为参数传入。\n\
    \n`gather(..)` 方法在 Java 22 中作为预览特性引入，它返回一个流，该流由应用给定的 `java.util.stream.Gatherer<T,\
    \ A, R>` 实例后的结果组成。引入此操作是为了通过应用一个名为 **gatherer** 的用户定义实体，为更复杂的流中间操作提供支持。`gather(..)`\
    \ 操作允许开发者构建高效、支持并行的流，这些流几乎可以实现任何中间操作。gatherer 非常强大，具备以下能力：\n\n*   以一对一、一对多、多对一或多对多的方式转换元素。\n\
    *   跟踪先前看到的元素，以影响后续元素的转换。\n*   短路操作，将无限流转换为有限流。\n*   根据条件应用不同的转换，并在处理初始流中的一个元素后创建更多元素。\n\
    \n这些能力意味着能够将元素分组为批次、对连续相似元素去重、逐步累积元素或逐步重新排序元素。\n\n如您所见，gatherer 可以完成许多事情，这是因为\
    \ gatherer 实际上由四个协同工作的函数组成：\n\n*   **初始化器**函数：可用于提供一个对象，在处理流元素时维护私有状态。\n*   **集成器**函数：从输入流中集成一个新元素，可能检查私有状态对象，并可能将元素发送到输出流。\n\
    *   **组合器**函数：当输入流被标记为并行时，可用于并行评估 gatherer。\n*   **终结器**函数：当没有更多输入元素需要消费时调用。此函数可以检查私有状态对象，并可能发出额外的输出元素。\n\
    \n关于 gatherer 还有很多内容可以讨论，但让我们将理论与实践结合起来，好吗？\n\n##### 创建自定义 Gatherer\n\n`Gatherer<T,\
    \ A, R>` 是一个接口，开发者必须实现它才能创建自己的自定义 gatherer。因此，要重写清单 8-46 中的代码，将两次 `map(..)` 调用和一次\
    \ `distinct(..)` 调用替换为一次 `gather(..)` 调用，我们需要让 `DistinctBySinger` 记录实现 `Gatherer<T,\
    \ A, R>` 接口。这种处理方式不需要 *组合器*，因为我们不关心并行运行 gatherer；也不需要 *终结器*，因为我们只关心结果流。因此，清单 8-46\
    \ 中的代码变成了清单 8-47 中的代码。\n\n```\npackage com.apress.bgn.eight;\nimport com.apress.bgn.eight.util.Song;\n\
    import com.apress.bgn.eight.util.StreamMediaLoader;\nimport java.util.ArrayList;\n\
    import java.util.HashSet;\nimport java.util.List;\nimport java.util.function.Supplier;\n\
    import java.util.stream.Gatherer;\nimport static java.lang.System.out;\npublic\
    \ class CustomGathererDemo {\nrecord DistinctBySinger() implements Gatherer, Song>\
    \ {\n@Override\npublic Supplier>  initializer() {\nreturn () -> new HashSet();\n\
    }\n@Override\npublic Integrator, Song, Song> integrator() {\nreturn Integrator.of((singersList,\
    \ element, downstream) -> {\nif (singersList.add(element.getSinger())) {\n// 如果歌手被添加到集合中，则将当前元素发送到下游\n\
    downstream.push(element);\n}\n// 返回 true 以继续处理流元素\nreturn true;\n});\n}\n}\nvoid\
    \ main(){\nvar songs = StreamMediaLoader.loadSongs();\nvar reducedSongs = songs.gather(new\
    \ DistinctBySinger())\n.peek(out::println);\nvar songList = reducedSongs.toList();\n\
    out.println(songList.size() + \" == \" + new HashSet(songList).size());\n}\n}\n\
    清单 8-47\n使用 Gatherer 创建每位歌手仅包含一首歌的流的复杂流操作\n```\n\n以下列表解释了清单 8-47 的组成部分：\n\n* \
    \  实现 `Gatherer<T, A, R>` 时用作参数的三种类型含义如下：\n    *   `T`：gatherer 操作的输入元素类型。在此例中，原始流包含\
    \ `Song` 实例，这些实例是 gatherer 操作的输入。\n    *   `A`：gatherer 操作的潜在可变状态类型。在此例中，类型是 `Set<String>`，因为我们将使用这个字符串集合来跟踪不同的歌手姓名。\n\
    \    *   `R`：gatherer 操作的输出元素类型。在此例中，类型也是 `Song`。\n*   `initializer()` 函数是可选的，但在此场景中，我们需要它来初始化\
    \ `Set<String>` 实例，该实例将保存决定 gatherer 输出的值。\n*   `integrator()` 函数是必需的，因为如果没有集成（*收集*）所提供元素的能力，gatherer\
    \ 就不成其为 gatherer。为了简化集成器函数的创建，JDK 提供了两个工厂方法：\n    *   `Gatherer.Integrator.of(Gatherer.Integrator)``：`\
    \ 本例中使用的方法，它接收元素、处理元素，并可选择性地将增量结果发送到下游。我们的集成器函数正是利用 `Set<String>` 实例作为 gatherer\
    \ 的内部状态来实现这一点：它尝试将元素的歌手姓名添加到集合中，如果成功，则将元素推送到下游。\n    *   `Gatherer.Integrator.ofGreedy(Gatherer.Greedy)`：顾名思义，此方法会消费所有输入，并且可能仅在下游不再需要更多元素时进行中继。\n\
    *   实现 `Gatherer<T, A, R>` 的类被实例化，其实例作为参数传递给 `gather(..)` 方法。\n"
- fmt: '# Selecting Songs with Distinct Singers


    Selecting songs with distinct singers does not allow for parallel processing,
    because having multiple sets storing distinct singers does not ensure that the
    songs emitted downstream all have distinct singers. A use case that is suitable
    for parallel processing is finding the longest duration for a song in a stream.
    This use case is also suitable for short-circuiting the gatherer and stopping
    processing if a duration has been found that is above a custom limit. And since
    we only expect one element to be returned, a finisher is also suitable.


    The `LongestSong` gatherer and its usage are shown in Listing [8-48](#463938_3_En_8_Chapter.xhtml#PC65).


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class LongestSongDemo {

    record LongestSong(int limit) implements Gatherer, Integer> {

    @Override

    public Supplier> initializer() {

    return () -> new ArrayList(1);

    }

    @Override

    public Integrator, Song, Integer> integrator() {

    return Integrator.of((max, element, downstream) -> {

    if (max.isEmpty()) max.addFirst(element.getDuration());

    else if (element.getDuration() > max.getFirst()) max.set(0, element.getDuration());

    // "short-circuit": emit the current duration downstream

    // and return false to stop processing stream elements

    if (element.getDuration() >= limit) {

    downstream.push(element.getDuration());

    return false;

    }

    // Return true to continue processing stream elements

    return true;

    });

    }

    @Override

    public BinaryOperator> combiner() {

    return (left, right) -> {

    if (left.isEmpty()) return right;

    if (right.isEmpty()) return left;

    int leftVal = left.getFirst();

    int rightVal = right.getFirst();

    if (leftVal > rightVal) return left;

    else return right;

    };

    }

    @Override

    public BiConsumer, Downstream> finisher() {

    // Emit the largest integer, if there is one, downstream

    return (max, downstream) -> {

    if (!max.isEmpty()) {

    downstream.push(max.getFirst());

    }

    };

    }

    }

    void main(){

    var songs = StreamMediaLoader.loadSongs();

    var longestDuration = songs.gather(new LongestSong(360)).findFirst().orElse(-1);

    out.println("Longest duration: " + longestDuration + " seconds");

    }

    }

    Listing 8-48

    Stream Custom Gatherer for Computing the Longest Duration of a Song in a Stream

    ```


    In this example we use the initializer to declare an `ArrayList<Integer>` instance
    with a capacity of only one `Integer`, as it is meant to store the longest song
    duration the gatherer has encountered so far.


    The integrator compares the stream element duration with the value stored in the
    `ArrayList<Integer>` instance, and if it is greater than the stored value, it
    replaces it. Also, if the value is greater than the limit passed as an argument
    when instantiating the `LongestSong(limit)` instance, the gatherer just stops
    processing stream elements.


    When the gatherer is run in parallel, the combinator merges two private state
    objects using the provided implementation. In this case the list containing the
    larger value is returned. This might remind you of the merge phase of the divide-and-conquer
    algorithm mentioned in Chapter [5](#463938_3_En_5_Chapter.xhtml).


    The finisher function is a lambda expression that contains two parameters: the
    gatherer private state and the downstream where to push the value contained within
    it. In this example, the finisher function pushes the value contained in the private
    state object.


    The result of running the code in Listing 4-48 is *Longest duration: 372 seconds*.
    This happens because the integrator encounters the `372` value that is bigger
    than `360` and stops processing stream elements. If the limit is set higher or
    lower and the code is run again, the returned duration will be different.


    The two custom gatherers introduced were created by implementing `Gatherer<T,
    A, R>`, but gatherers can be created using `Gatherer.of(..)` factory methods too.
    For example, the code in Listing [8-48](#463938_3_En_8_Chapter.xhtml#PC65) can
    be written as shown in Listing [8-49](#463938_3_En_8_Chapter.xhtml#PC66).


    ```

    package com.apress.bgn.eight;

    // import statements omitted

    public class LongestSongFactoryDemo {

    static Gatherer, Integer>  LONGEST_SONG(int limit) {

    return Gatherer.of(

    () -> new ArrayList(1),

    Gatherer.Integrator.of(

    (max, element, downstream) -> {

    if (max.isEmpty()) max.addFirst(element.getDuration());

    else if (element.getDuration() > max.getFirst()) max.set(0, element.getDuration());

    if (element.getDuration() >= limit) {

    downstream.push(element.getDuration());

    return false;

    }

    return true;

    }),

    (left, right) -> {

    if (left.isEmpty()) return right;

    if (right.isEmpty()) return left;

    int leftVal = left.getFirst();

    int rightVal = right.getFirst();

    if (leftVal > rightVal) return left;

    else return right;

