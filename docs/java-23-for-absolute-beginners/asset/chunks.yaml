    \n![](img/463938_3_En_3_Fig29_HTML.jpg)\n\n图 3-29\n\n`java-23-for-absolute-beginners`\
    \ 项目中的 `HelloWorld` 类\n\n这些行包含不同的语句，如下列表所述，每行的编号与列表中的编号对应：\n\n1.  **包声明**：当类属于某个包时，其代码必须以声明该包的行开头。`package`\
    \ 是 Java 中的保留关键字，除了声明包之外不能用于其他任何用途。\n\n2.  *留空行以便于阅读。*\n\n3.  **类声明**：这是我们声明类型的一行：\n\
    \    *   它是公开的，因此可以从任何地方访问。\n\n*   它是一个类。\n\n*   它被命名为 HelloWorld。\n\n*   它有一个用花括号括起来的主体，左花括号在这一行。但它也可以放在下一行，因为空格会被忽略。\n\
    \n4.  `main(..)` **方法声明**：在 Java 中，方法名称及其参数的数量、类型和顺序被称为*方法签名*。方法还有一个**返回类型**，即它返回的结果的类型。但还有一种特殊类型可用于声明方法不返回任何内容。按出现顺序，以下是\
    \ `main()` 方法中每个术语的含义：\n    *   `public`：这是方法的访问修饰符。`main` 方法必须是 `public` 的，否则\
    \ JRE 无法访问并调用它。\n\n*   `static`：回想一下，本章开头提到一个类有成员（字段和方法）。当创建该类的对象时，它拥有该类声明的字段和方法。类是创建对象的模板。然而，由于\
    \ `static` 关键字，`main` 方法不与类的对象关联，而是与类本身关联。更多细节将在**第** **4** **章**中提供。\n\n*   **void**：此关键字在此用于告知我们\
    \ `main` 方法不返回任何内容，因此它类似于*无类型*的替代品，因为如果不返回任何内容，就不需要类型。\n\n*   `String... args`\
    \ 或 `String[] args`：方法有时被声明为接收一些输入数据，`String[] args` 表示一个文本值数组。三个点是指定一个方法可以有多个相同类型参数的另一种方式。（可变参数也必须是方法的唯一参数，或者是最后一个参数；否则，解析参数将变得不可能。）三个点表示法只能用于方法参数，称为*可变参数*。这意味着你可以传入一个参数数组，而无需显式创建该数组。数组是固定长度的数据集，在数学中被称为*一维矩阵*或*向量*。`String`\
    \ 是 Java 中表示文本对象的类。`[]` 表示数组，`args` 是其名称。但是等等，我们之前运行过这个方法，并没有提供任何参数！嗯，这不是强制性的，但在此列表之后，你将看到如何为其提供参数（提供给方法的值，这些值将被方法体中的代码使用）。\n\
    \n5.  `System.out.println(“HelloWorld!”);`**：** 此语句用于在控制台中输出 *Hello World!*。\n\
    \n6.  `}` 是 `main` 方法体的右花括号。\n\n7.  *留空行以便于阅读。*\n\n8.  `}` 是类体的右花括号。\n\n如果我们执行这个类，我们将在控制台中看到打印出\
    \ `Hello World!`。之前（在图 3-21 中）已经向你展示了如何执行一个包含 `main(..)` 方法的类。以这种方式执行类后，IntelliJ\
    \ IDEA 会自动将该执行的配置保存在一个*运行配置*中，并将其显示在 IDE 顶部的下拉列表中，该列表位于一个可点击的绿色三角形按钮旁边，用于执行该类。图\
    \ 3-29 中醒目地指出了这两个选项。\n\n这两个元素非常重要，因为它们使你能够编辑运行配置并为 JVM 和 `main` 方法添加参数。让我们首先修改\
    \ `main(..)` 方法，使其对参数进行一些处理。修改后的 `HelloWorld` 类如代码清单 3-24 所示。\n\n```\npublic class\
    \ HelloWorld {\npublic static void main(String... args) {\nSystem.out.println(\"\
    Hello \" + args[0] + \"!\");\n}\n}\n代码清单 3-24\n带有可变参数的 Main 方法\n```\n\n需要注意的重要一点是，数组是使用其元素的索引来访问的，并且\
    \ Java 中的计数从 0 开始。因此，数组的第一个成员位于索引 0，第二个位于索引 1，依此类推。但是数组可以为空，因此如果在运行代码清单 3-24 中的代码时没有提供任何参数，程序的执行将会崩溃，并打印出类似于代码清单\
    \ 3-25 所示的明确消息（以红色显示）。\n\n```\nException in thread \"main\" java.lang.ArrayIndexOutOfBoundsException:\
    \ Index 0 out of bounds for length 0\nat chapter.three/com.apress.bgn.three.helloworld.HelloWorld.main(HelloWorld.java:5)\n\
    代码清单 3-25\n空数组异常\n```\n\n当 Java 程序因运行时错误而结束时，我们说*抛出了一个异常*。\n\n当我们尝试访问一个空数组，或者访问一个数组中不存在的元素时，JVM\
    \ 会抛出一个类型为 `ArrayIndexOutOfBoundsException` 的对象，其中包含发生失败的行以及我们试图访问的元素的索引。JVM 使用异常对象来通知开发人员\
    \ Java 执行未按预期工作时的异常情况，这些对象包含有关代码中发生位置以及导致问题的原因的详细信息。\n\n我们在代码清单 3-25 中所做的修改将打印出执行类时作为参数提供的文本值。让我们修改此类的运行配置并添加一个参数。单击**运行配置**名称旁边的小下拉箭头，将出现一个菜单，如图\
    \ 3-30 所示。单击**编辑配置**选项，并检查向你显示的对话框窗口，该窗口也显示在图 3-30 中。\n\n![](img/463938_3_En_3_Fig30_HTML.jpg)\n\
    \n图 3-30\n\n自定义运行配置\n"
- fmt: '在 Figure [3-30](#463938_3_En_3_Chapter.xhtml#Fig30) 中，关键元素以浅蓝色和灰色高亮显示。IntelliJ
    IDEA 会保存你之前的几次执行记录（包括 Maven 构建任务），以便你可以一键重新运行它们。在 **Run/Debug Configurations**
    对话框窗口的左侧，IntelliJ IDEA 按类型对运行配置进行分组。默认情况下，上次运行的配置会显示在窗口的右侧，在本例中为 `HelloWorld`
    类的运行配置。如你所见，你可以为一次执行配置许多选项，其中大部分已由 IDE 自动决定。程序参数或 `main()` 方法的参数在蓝色高亮的文本框中输入。在图
    [3-30](#463938_3_En_3_Chapter.xhtml#Fig30) 中，我们输入了 `JavaDeveloper`。因此，如果你点击 **Apply**
    按钮，然后点击 **OK** 按钮，再执行该类，控制台现在应该显示 `Hello JavaDeveloper!`，而不是 `Hello World!`。


    那么，我们还能对这个类做些什么呢？还记得本书开头的代码吗？让我们把它放到这个类的 `main()` 方法中。该代码再次展示在清单 [3-26](#463938_3_En_3_Chapter.xhtml#PC26)
    中。


    ```

    package com.apress.bgn.three.helloworld;

    import java.util.List;

    public class HelloWorld {

    public static void main(String... args) {

    //System.out.println("Hello " + args[0] + "!");

    List items = List.of("1", "a", "2", "a", "3", "a");

    items.forEach(item -> {

    if (item.equals("a")) {

    System.out.println("A");

    } else {

    System.out.println("Not A");

    }

    });

    }

    }

    Listing 3-26

    A More Complex main Method

    ```


    `import java.util.List;` 语句是唯一可以放在包声明和类声明之间的语句类型。这条语句告诉 Java 编译器，程序中将会使用 `java.util.List`
    对象类型。`import` 关键字后面跟着该类型的完全限定名。一个类型的完全限定名由包名（`java.util`）、一个点（`.`）和类型的简单名（`List`）组成。没有它，`HelloWorld`
    类将无法编译。你可以尝试在该语句前加上 `//`——这会将这一行变成注释，从而被编译器忽略。你会看到编辑器报错，并将与该列表相关的任何代码片段标记为亮红色。


    语句 `List<String> items = List.of("1", "a", "2", "a", "3", "a");` 创建了一个文本值的列表。这种创建列表的方式是在
    Java 9 中引入的。使用 `<E>` 指定列表中元素的类型是在 Java 5 中引入的，这被称为**泛型**。然后，列表中的元素通过 `forEach`
    方法进行遍历，并测试每个元素是否等于字符 `"a"`。用于执行此操作的整个表达式被称为 **lambda 表达式**，这种语法是在 Java 8 中与 `forEach`
    方法一起引入的。


    如果你现在运行这个类，控制台应该会打印出一系列 `A` 和 `Not A`，每个占一行，如清单 [3-27](#463938_3_En_3_Chapter.xhtml#PC27)
    所示。


    ```

    Not A

    A

    Not A

    A

    Not A

    A

    Listing 3-27

    Output of Running the Advanced HelloWorld Class

    ```


    到目前为止，我们编写的代码使用了相当多的对象类型来在控制台打印一些简单的消息。`List<E>` 对象用于保存几个 `String` 对象。消息是通过在 `out`
    对象上调用的 `println` 方法打印的，而 `out` 是 `System` 类中的一个静态字段。这些只是你在代码中可见的对象。在底层，`List<E>`
    的元素由一个 `Consumer<E>` 对象处理，该对象是在 lambda 表达式（清单 [3-26](#463938_3_En_3_Chapter.xhtml#PC26)
    中为了简洁而隐藏了）所在的位置即时创建的，因此代码可以展开，如清单 [3-28](#463938_3_En_3_Chapter.xhtml#PC28) 所示。


    ```

    package com.apress.bgn.three.helloworld;

    import java.util.List;

    import java.util.function.Consumer;

    public class HelloWorld {

    public static void main(String... args) {

    List items = List.of("1", "a", "2", "a", "3", "a");

    items.forEach(new Consumer() {

    @Override

    public void accept(String item) {

    if (item.equals("a")) {

    System.out.println("A");

    } else {

    System.out.println("Not A");

    }

    }

    });

    }

    }

    Listing 3-28

    A More Complex main Method Without Lambda Expressions

    ```


    在结束本章之前，我想向你展示另一个巧妙之处。`forEach` 块的内容可以写成一行：


    ```

    items.forEach(item -> System.out.println(item.equals("a") ? "A" : "Not A"));

    ```


    而上一行代码可以通过使用一种叫做**方法引用**的东西变得更简单。但关于这一点，本书稍后会详细介绍。


    你在本章中读到的内容现在可能看起来很吓人，但我保证本书会在清晰的上下文中介绍每个概念，并将这些概念与现实生活中的对象和事件进行比较，以便你能够轻松理解它们。如果这还不行，总还有更多的书籍、博客，当然还有每个
    JDK 的官方 Oracle 页面，上面有相当不错的教程。有志者，事竟成。


    **重要提示**


    另外，请善用你的 IDE！在按住 Control/Command 键的同时点击代码中的任何对象类型，该对象类的代码就会被打开，使你能够看到该类是如何编写的，并可以直接在编辑器中阅读其文档。作为练习，请对
    `forEach` 方法和 `System` 类执行此操作。


    大多数真正智能的编辑器都有**键映射**，即一组按键，当同时按下时可以执行某些操作，例如导航、代码生成、执行等。打印出 IntelliJ IDEA 的键映射参考并熟悉它。你的大脑非常快，在编码时，目标是尽可能快地打字，就像你思考一样快，如果可能的话。:)


    ## 总结


    在本章中，你了解了 Java 应用程序的基本构建块。你还学习了如何使用 `jshell` 在应用程序上下文之外执行 Java 语句。你了解了如何手动编译声明了包和模块的
    Java 代码。


    如果你找到一份 Java 开发人员的工作，你在学习本章时所做的许多事情，可能每天都会做……除了那些你将花费在查找和修复现有代码中 bug 的日子。你可能也会花很多时间阅读文档，因为
    JDK 有很多类，其中包含你可以用来编写应用程序的字段和方法。随着每个版本的发布，情况都会发生变化，你必须让自己保持最新状态。大脑容量有限；没有雇主会期望你知道每一个
    JDK 类和方法，但要聪明地工作，并始终在浏览器中打开这个 URL `https://docs.oracle.com/en/java/javase/23/docs/api/index.html`（或与你使用的
    JDK 版本匹配的 URL）。当你对某个 JDK 类或方法有疑问时，随时查阅即可。


