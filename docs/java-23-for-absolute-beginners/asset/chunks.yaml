    Proper Gender Enum with Extra Method

    ```


    注意为`UNSPECIFIED`元素打印的值。`Gender$1`这种表示法意味着编译器通过扩展原始枚举类并重写`comment()`方法（使用`UNSPECIFIED`元素声明中提供的方法）创建了一个内部类。


