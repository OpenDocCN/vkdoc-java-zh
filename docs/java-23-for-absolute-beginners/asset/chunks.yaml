- fmt: '# 4. Java Syntax


    Languages are means of communication, verbal or written, between people. Whether
    they are natural or artificial, languages are made of terms and rules on how to
    use them to perform the task of communication. Programming languages are means
    of communication with a computer. The communication with a computer is a written
    communication. Basically, the developer defines some instructions to be executed
    and communicates them through an intermediary to the computer. If the computer
    understands the instructions, it performs the set of actions and, depending on
    the application type, returns some sort of reply to the developer.


    In the Java language, the intermediary through which the developer communicates
    to the computer is the Java Virtual Machine. The set of programming rules that
    define how terms should be connected to produce an understandable unit of communication
    is called *syntax*. Java borrowed most of its syntax from another programming
    language called C++, which in turn has syntax based on the C language syntax.
    C syntax borrows elements and rules from other languages that preceded it, but
    in essence all these languages are based on the natural English language. Java
    got a little cryptic in version 8 because of the introduction of lambda expressions,
    but still, when writing a Java program, if you are naming your terms properly
    in the English language, the result should be a code that is easily readable,
    like a story.


    A few details of Java syntax have been covered in **Chapter 2** and **Chapter
    3**. Packages and modules were covered enough to give you a solid understanding
    of their purpose to avoid confusion regarding the organization of the project
    and avoid aimless fumbling through the code when trying to execute code mentioned
    in the book. But on other topics, the surface has been barely scratched. Thus,
    let’s begin our deep dive into Java.


    ## Base Rules of Writing Java Code


    Before writing Java code, let’s list a few rules that you should follow to make
    sure your code not only works but is easy to understand and thus maintain or extend.
    Listing 4-1 depicts the class we ended **Chapter 3** with and adds a few details.


    ```

    01\. package com.apress.bgn.four.basic;

    02.

    03\. import java.util.List;

    04.

    05./**

    06\. * this is a JavaDoc comment

    07\. */

    08\. public class HelloWorld {

    09\.     public static void main(String... args) {

    10\.         //this is a one-line comment

    11\.         List items = List.of("1", "a", "2", "a", "3", "a");

    12.

    13\.         items.forEach(item -> {

    14\.             /* this is a

    15\.                 multi-line

    16\.             comment */

    17\.             if (item.equals("a")) {

    18\.                 System.out.println("A");

    19\.             } else {

    20\.                 System.out.println("Not A");

    21\.             }

    22\.         });

    23\.     }

    24\. }

    ```


    Each section of the code gets its own section in this chapter. Let’s start with
    the first line.


    ### Package Declaration


    A Java file always starts with the *package declaration* if the type declared
    in the file is declared within a package. The package name can contain letters
    and numbers, separated by dots. Each part matches a directory in the path to the
    type contained in it, as shown in **Chapter 3**. The package declaration should
    reveal the name of the application and the purpose of the classes in the package.
    Let’s take the package naming used for the sources of this book: `com.apress.bgn.four.basic`.
    If we split the package name in pieces, this is the meaning of each piece:


    *   `com.apress` represents the domain of the application, or who owns the application
    in this case.

    *   `bgn` represents the scope of the code, in this case the book who it is written
    for: **beginners**.

    *   `four` represents the purpose of the classes: to be used with **Chapter 4**.

    *   `basic` represents a more refined level of the purpose for the classes: these
    classes are simple, used to depict basic Java notions.


    A package name like the one introduced here that is made of more parts is called
    a **qualified package name**. It has a hierarchical structure, and package `com`
    is the root package. Assuming a type `MyType` is declared in this package, this
    type is referenced in classes in other packages using this import statement: `import
    com.MyType;`.


    Package `apress` is a member of package `com` and is identified by a name composed
    of its own name prefixed by the enclosing package and a dot. Assuming a type `MyType`
    is declared in this package, this type is referenced in classes in other packages
    using this import statement: `import com.apress.MyType;`.


    The same applies to package `bgn`, which is a member of package `apress` and its
    type members, and so on down the package tree.


    **Tip:** You can imagine packages being the programming equivalent of Russian
    nesting Matryoshka dolls.


    Thus, a type is referenced in other types via its **fully qualified name**. The
    fully qualified name of a type is formed by prefixing the type name with the qualified
    name of the package and a dot. Figure 4-1 should make things pretty clear.


    ![Figure 4-1: Dissection of the fully qualified name of a Java type](images/463938_3_En_4_Chapter/463938_3_En_4_Fig1_HTML.jpg)'
