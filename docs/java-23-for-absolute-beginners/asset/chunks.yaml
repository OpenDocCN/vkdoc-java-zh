    ### 日期/时间 API


    许多应用程序都使用日历日期类型来打印当前日期、截止日期和生日。无论你决定构建什么应用程序，你很可能都需要使用日历日期。在 Java 8 之前，用于建模日历日期的主要类是
    `java.util.Date`。这个类以及处理日历日期的其他类存在一些问题。但在我们深入探讨这些问题之前，先看一下清单 5-33，了解如何获取当前日期、创建自定义日期以及打印特定细节。


    ```

    package com.apress.bgn.five;

    import java.text.ParseException;

    import java.text.SimpleDateFormat;

    import java.util.Date;

    public class DateDemo {

    public static void main() {

    SimpleDateFormat sdf = new SimpleDateFormat("dd-MM-yyyy");

    Date currentDate = new Date();

    System.out.println("Today: " + sdf.format(currentDate));

    //deprecated since 1.1

    Date johnBirthday = new Date(77, 9, 16);

    System.out.println("John’s Birthday: " + sdf.format(johnBirthday));

    int day = johnBirthday.getDay();

    System.out.println("Day: " + day);

    int month = johnBirthday.getMonth() + 1;

    System.out.println("Month: " + month);

    int year = johnBirthday.getYear();

    System.out.println("Year:" + year");

    try {

    Date johnBirthday2 = sdf.parse("16-10-1977");

    } catch (ParseException e) {

    e.printStackTrace();

    }

    }

    }

    //output

    /*

    Today: 18-05-2024

    John’s Birthday: 16-10-1977

    Day: 0

    Month: 10

    Year: 77

    */

    Listing 5-33

    java.util.Date Code Sample

    ```


    在你的系统上获取当前日期很简单；只需调用 `Date` 类的默认构造函数即可：


    ```

    Date currentDate = new Date();

    ```


    `currentDate` 的内容可以直接显示，但通常使用 `java.text.SimpleDateFormat` 的实例将日期格式化为特定于国家或更易读的模式。格式化器也可以用于将具有该特定格式的
    `String` 转换为 `Date` 实例。当然，如果文本与格式化器的模式不匹配，则会抛出一个特定的异常（类型为 `java.text.ParseException`）：


    ```

    try {

    Date johnBirthday = sdf.parse("16-10-1977");

    } catch (ParseException e) {

    // do something with the exception

    }

    ```


    要从表示日期（年、月、日）的数字创建 `Date` 实例，可以使用一个接受这些值作为参数的构造函数。然而，该构造函数自 Java 1.1 起已被弃用，因此一些开发者更倾向于使用
    `sdf.parse(..)` 方法。该构造函数在其参数方面有一些特殊性：


    *   年份参数必须是年份值 – 1900。


    *   月份从 0 开始计数，因此作为参数提供的月份必须是所需月份 – 1。


    下面展示了从年、月、日的数值构造 `Date` 实例的代码：


    ```

    //deprecated since 1.1

    Date johnBirthday = new Date(77, 9, 16);

    System.out.println("John’s Birthday: " + sdf.format(johnBirthday));

    //it prints: John’s Birthday: 16-10-1977

    ```


    如果我们想从日期中提取年、月和日，有一些方法可以实现，但同样存在一个特殊性：提取月份中日期的方法名为 `getDate()`。还要记住，由于月份是从 0 到
    11 编号的，要获得真实的月份值，必须将 `getMonth()` 返回的结果加 1。清单 5-34 展示了创建 `Date` 实例、提取日、月、年并打印它们的代码。


    ```

    package com.apress.bgn.five;

    import java.text.ParseException;

    import java.text.SimpleDateFormat;

    import java.util.Date;

    public class PrintDateDemo {

    void main() {

    try {

    SimpleDateFormat sdf = new SimpleDateFormat("dd-MM-yyyy");

    Date johnBirthday = sdf.parse("16-10-1977");

    System.out.println("John’s Birthday: " + sdf.format(johnBirthday));

    //day of the month

    int day = johnBirthday.getDate();

    System.out.println("Day: " + day);

    int month = johnBirthday.getMonth() + 1;

    System.out.println("Month: " +"month);

    int year = johnBirthday.getYear();

    System.out.println("Year: " +"year);

    } catch (ParseException e) {

    e.printStackTrace();

    }

    }

    }

    //output

    /*

    John’s Birthday: 16-10-1977

    Day: 16

    Month: 10

    Year: 77

    */

    Listing 5-34

    Printing Components of a Calendar Date

    ```


    警告


    `java.util.Date` 类有两个容易混淆的方法：`getDate()` 方法返回 `Date` 对象中的月份日期，而 `getDay()` 方法返回
    `Date` 对象中的星期几。


    自 JDK 1.1 版本起，这两个方法都已弃用，并且本节稍后将介绍更好、更不易混淆的方法来提取这些信息。


    如果你在 IntelliJ IDEA 编辑器中检查本节的演示类，你会注意到一些构造函数和方法使用了删除线字体。这意味着它们已被弃用，并可能在未来的 Java
    版本中被移除，因此不应再使用。这就是为什么还有另一种方法可以实现上述所有结果：使用 `java.util.Calendar class`。使用 `Calendar`
    类执行与清单 5-34 相同操作的代码如清单 5-35 所示。


