    ## 读取文件


    每个文件都是硬盘上的一系列比特位。`File` 处理器不提供读取文件内容的方法，但可以使用其他一组类来实现，所有这些类都是通过文件处理器实例创建的。Java
    提供了多种读取文件的方式，选择哪种方式取决于实际需要对文件内容进行何种操作。本节将介绍四种最常见的方式。


    ### 使用 `Scanner` 读取文件


    `Scanner` 类之前用于从命令行读取输入。可以将 `System.in` 替换为 `File`，并使用 `Scanner` 方法来读取文件内容，如列表
    11-13 所示。


    ```

    package com.apress.bgn.eleven.io;

    import java.util.Scanner;

    // other import statements omitted

    public class ScannerDemo {

    private static final Logger LOGGER = LoggerFactory.getLogger(ScannerDemo.class);

    void main() {

    try {

    final String inDir = "chapter11/read-write-file/src/main/resources/input/";

    var scanner = new Scanner(new File("chapter11/read-write-file/src/main/resources/input/data.txt"));

    var content = "";

    while (scanner.hasNextLine()) {

    content += scanner.nextLine() + "\n";

    }

    scanner.close();

    LOGGER.info("Read with Scanner --> {}", content);

    } catch (IOException e) {

    LOGGER.error("Something went wrong! ", e);

    }

    }

    }

    列表 11-13

    使用 Scanner 读取文件

    ```


    除了文件，也可以使用 `java.nio.file.Path` 实例：


    ```

    scanner = new Scanner(Paths.get(new File("chapter11/read-write-file/src/main/resources/input/data.txt").toURI()),
    StandardCharsets.UTF_8.name());

    ```


    文件可以使用不同的字符集写入，在 Java 中由 `java.nio.charset.Charset` 实例表示。为了确保正确读取，最佳实践是使用相同的字符集读取文件。`Scanner`
    构造函数接收一个字符集名称作为参数。调用 `StandardCharsets.UTF_8.name()` 方法来提取 UTF-8 字符集的名称。


    ### 使用 Files 工具方法读取文件


    列表 11-14 中的第一个代码示例展示了读取文件的最简单方式。


