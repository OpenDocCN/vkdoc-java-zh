- fmt: "### Perform a dummy initialization\n\nThis option is suitable when the code\
    \ following the problematic call does different things depending on the performer\
    \ instance returned, as depicted in Listing [4-64](#463938_3_En_4_Chapter.xhtml#PC64).\n\
    \n```\npackage com.apress.bgn.four.exceptions;\nimport com.apress.bgn.four.hierarchy.Performer;\n\
    import com.apress.bgn.four.classes.Gender;\nclass DummyInitializer {\npublic Performer\
    \ getPerformer(String name) {\nPerformer p = PerformerGenerator.get(name);\ntry\
    \ {\nSystem.out.println(\"Test if valid: \" + p.getName());\n} catch (Exception\
    \ e) {\np = new Performer(\"Dummy\", 0, 0.0f, Gender.UNSPECIFIED);\n}\nreturn\
    \ p;\n}\n}\npublic class DummyInitExceptionDemo {\npublic static void main(String...\
    \ args) {\nDummyInitializer initializer = new DummyInitializer();\nPerformer p\
    \ = initializer.getPerformer(\"Bryce\");\nif (\"Dummy\".equals(p.getName())) {\
    \ // different behavior based on performer name\nSystem.out.println(\"Nothing\
    \ to do.\");\n} else {\nSystem.out.println(\"TTL: \" + p.getTimeToLive());\n}\n\
    }\n}\nListing 4-64\nCode Sample That Performs a Dummy Initialization\n```\n\n\
    Notice here that the original exception is not used anywhere; it is being *swallowed*,\
    \ and thus in case of trouble, the root cause of the problem is hidden. In applications\
    \ where the original exception is not critical, a curated warning log message\
    \ is printed to notify the developer that there was some behavior that should\
    \ be noted.\n\n**Warning**  \nKeep in mind that all the changes listed in this\
    \ section apply to the code calling the `PerformerGenerator.get(\"Bryce\")` method,\
    \ because it is assumed that we cannot modify the contents of this class. If the\
    \ class is accessible, the method can be modified to return an `Optional<Performer>`.\
    \ More information about this type of object is presented in subsequent chapters.\n\
    \n### try/catch Blocks\n\nAnd since we are talking about exceptions, the `try/catch`\
    \ block can be completed with a `finally` block. The contents of the `finally`\
    \ block are almost always executed. If the exception does not match any of the\
    \ types declared in the `catch` block (yes, more than one type can be declared\
