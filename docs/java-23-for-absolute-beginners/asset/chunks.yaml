- fmt: '# Lambda Expressions


    Lambda expressions were also introduced in Java 8, and they represent a compact
    and practical way of writing code that was borrowed from languages like Groovy
    and Ruby. Listing [4-55](#463938_3_En_4_Chapter.xhtml#PC55) depicts the `@FunctionalInterface`
    declaration.


    ```

    package java.lang;

    import java.lang.annotation.*;

    /**

    * documentation omitted

    */

    @Documented

    @Retention(RetentionPolicy.RUNTIME)

    @Target(ElementType.TYPE)

    public @interface FunctionalInterface {

    }

    Listing 4-55

    The JDK @FunctionalInterface Declaration

    ```


    **Functional interfaces** are interfaces that declare a single abstract method.
    Being the only method in the interface, the implementation can be provided on
    the spot, without the need to create a class to define a concrete implementation.
    Imagine the following scenario: we create an interface named `Operation` that
    contains a single method. We can provide an implementation for this interface
    by creating a class named `Addition`, or we can do it on the spot using a lambda
    expression. Listing [4-56](#463938_3_En_4_Chapter.xhtml#PC56) depicts the `Operation`
    interface, the `Addition` class, and a class named `OperationDemo`, showing the
    on-the-spot implementation being declared and used in the `main(..)` method.


    ```

    package com.apress.bgn.four.lambda;

    @FunctionalInterface

    interface Operation {

    int execute(int a, int b);

    }

    class Addition implements Operation {

    @Override

    public int execute(int a, int b) {

    return a + b;

    }

    }

    public class OperationDemo {

    public static void main(String... args) {

    // using the Addition class

    Addition addition = new Addition();

    int result = addition.execute(2, 5);

    System.out.println("Result is " + result);

    // implementation on the spot using a Lambda Expression

    Operation addition2 = (a, b) -> a + b;

    int result2 = addition2.execute(2, 5);

    System.out.println("Lambda Result is " + result2);

    }

    }

    Listing 4-56

    Explicit Interface Implementation Compared to Lambda Expression

    ```


    By using a lambda expression, class `Addition` is no longer needed, which leads
    to less and more readable code. Lambda expressions can be used for a lot of things,
    and we’ll cover them more throughout the book whenever code can be written in
    a more practical way using them.


    Note


    The `Operation` instance can be replaced by `Integer::sum`, a construction named
    a method reference, introduced in Java 8. As the name indicates, this is a reference
    to the `sum` method in class `Integer`, also introduced in Java 8.


    ## Exceptions


    Exceptions are special Java classes that are used to intercept unexpected situations
    during the execution of a program, enabling the developer to implement the proper
    course of action based on the type of exception the compiler warns about or the
    type of exception that gets generated at runtime by the JVM. These classes are
    organized in a hierarchy that is depicted in Figure [4-15](#463938_3_En_4_Chapter.xhtml#Fig15).
    `Throwable` is the root class of the hierarchy of classes used to represent unexpected
    situations in a Java application.


    ![](images/463938_3_En_4_Chapter/463938_3_En_4_Fig15_HTML.jpg)


    Figure 4-15


    Java exception hierarchy


    Exceptional situations in a Java application can happen for a myriad of reasons,
    but here are a few common reasons:


    * Human error when writing the code

    * Hardware issues (trying to read a file from a corrupted data disk)

    * Missing resources (trying to read a file that does not exist)


    Warning


    Sloppy developers, when in doubt, tend to write code that always catches a `Throwable`.
    Obviously, you should try to avoid doing that, as class `Error` (a subclass of
    `Throwable`) is used to notify the developer that a situation the system cannot
    recover from has happened.


    Let’s start with a simple example. Listing [4-57](#463938_3_En_4_Chapter.xhtml#PC57)
    defines a method that calls itself (its technical name is **recursive**), but
    for purposes of demonstration it is designed badly to call itself forever and
    cause the JVM to run out of memory.


    ```

    package com.apress.bgn.four.exceptions;

    public class ExceptionsDemo {

    // bad method

    static int rec(int i) {

    return rec(i * i);

    }

    public static void main(String... args) {

    rec(1000);

    System.out.println("ALL DONE.");

    }

    }

    Listing 4-57

    Bad Recursive Method

    ```


    If we run the `ExceptionsDemo` class, *ALL DONE* is not printed. Instead, the
    program will end abnormally by throwing a `StackOverflowError` and mentioning
    the line where the problem is (in this case the line where the recursive method
    calls itself). The output is shown in Listing [4-58](#463938_3_En_4_Chapter.xhtml#PC58).


    ```

    Exception in thread "main" java.lang.StackOverflowError at chapter.four@3.0-SNAPSHOT/com.apress.bgn.four.exceptions.ExceptionsDemo.rec(ExceptionsDemo.java:36)

    at chapter.four@3.0-SNAPSHOT/com.apress.bgn.four.exceptions.ExceptionsDemo.rec(ExceptionsDemo.java:36)

    ...

    Listing 4-58

    Console Output of ExceptionsDemo Execution

    ```


    The `StackOverflowError` is indirectly a subclass of `Error` and is obviously
    caused by the defective recursive method that was called. Sure, we could modify
    the code to treat this exceptional situation and execute whatever has to be executed
    next, as shown in Listing [4-59](#463938_3_En_4_Chapter.xhtml#PC59).


    ```

    package com.apress.bgn.four.exceptions;

    public class ExceptionsDemo {

    // other code omitted

    public static void main(String... args) {

    try {

    rec(1000);

    } catch (Throwable r) {

    }

    System.out.println("ALL DONE.");

    }

    }

    Listing 4-59

    Another Bad Recursive Method

    ```


    In the console only the *ALL DONE* message is printed, with no trace of the error.
    That is expected since we caught it and decided not to print any information about
    it.


    Stop


    This is a bad practice called **exception swallowing**—never do this!


    Also, the system should not recover from this, as the result of any operation
    after an `Error` being thrown is unreliable.


    Stop


    This is why it is a very bad practice to catch a `Throwable`!


    The `Exception` class is the superclass of all exceptions that can be caught and
    treated and from which the system can recover. Any subclasses of the `Exception`
    class that are not subclasses of `RuntimeException` are **checked exceptions**.
    These types of exceptions are known at compile time, because they are part of
    the methods declarations. Any method that is declared to throw a checked exception,
    when used in the code, either enforces the propagation of the exception further
    or requires the developer to write code to treat the exception.'
