    10-18 所示。


    ![](img/463938_3_En_10_Fig18_HTML.jpg)


    图 10-18


    IntelliJ IDEA 为 `FilterServer` 自定义的启动器


    Java 简单 Web 服务器在很大程度上相当于 Apache HTTPD：它的配置和使用并不繁琐，不需要 JDK 外部的容器来托管你的 Web 应用程序，并且尽管存在一些限制，但对于初学者来说，它是一种快速简便地开始用
    Java 编写 Web 应用程序的方式。

