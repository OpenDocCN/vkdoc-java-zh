  trans: '

    ### 使用 `finalize()` 方法


    正如**第****4**章所介绍的，每个 Java 类都自动是 JDK `java.lang.Object` 类的子类。该类位于 JDK 层次结构的根节点，也是应用程序中所有类的根节点。它提供了许多有用的方法，这些方法可以被扩展或重写，以实现子类特有的行为。`equals()`、`hashCode()`
    和 `toString()` 方法已在之前的章节中介绍过。`finalize()` 方法在 Java 9 中已被弃用，但为了向后兼容，它尚未从 JDK 中移除。


    警告


    终结机制存在一些问题。终结可能导致性能问题、死锁和挂起。终结器中的错误可能导致资源泄漏，并且如果不再需要终结，也无法取消。


    由于你可能会处理使用早期 JDK 版本的 Java 项目，因此了解 `finalize()` 方法的存在是件好事，以防你将来可能需要用到它，或者只是为了知道在哪里寻找奇怪的错误。


    当代码中不再存在对该对象的任何引用时，垃圾回收器会调用此方法。在我们继续之前，请查看代码清单 13-8 中的代码。


    ```

    package com.apress.bgn.thirteen;

    import com.apress.bgn.thirteen.util.NameGenerator;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.time.LocalDate;

    import static com.apress.bgn.thirteen.util.NameGenerator.RND;

    public class InfiniteSingerGenerator {

    private static final Logger LOGGER = LoggerFactory.getLogger(InfiniteSingerGenerator.class);

    private static final NameGenerator nameGenerator = new NameGenerator();

    void main() {

    while (true) {

    genSinger();

    }

    }

    private static void genSinger() {

    Singer s = new Singer(nameGenerator.genName(), RND.nextDouble(), LocalDate.now());

    LOGGER.info("JVM created: {}", s.getName());

    }

    }

    代码清单 13-8

    生成无限数量 Singer 实例的类

    ```


    即使不知道 `NameGenerator` 或 `Singer` 类是什么样的，代码清单 13-8 中代码执行的操作也应该是显而易见的。`main` 方法在一个无限循环中调用
    `genSinger()` 方法。这意味着会创建无限的 `Singer` 实例。那么会发生什么呢？代码会运行吗？能运行多久？如果你能在脑海中回答这些问题，*我的工作就完成了；你现在可以停止阅读本书了！*


    回想一下，**第****5**章包含了一些表示小程序内存内容的图表。类似地，图 13-4 表示了在代码清单 13-8 的程序执行期间，Java 堆和栈内存可能的样子。


    ![](img/463938_3_En_13_Fig4_HTML.jpg)


    图 13-4


    执行 `InfiniteSingerGenerator` 类期间的 Java 栈和堆内存


    出于显而易见的原因，这里只表示了一次 `genSinger()` 调用和一个 `Singer` 实例。如你所见，当调用 `main(..)` 方法时，会创建对静态实例的引用；这些引用在程序执行结束之前都与其相关。然后，调用
    `genSinger()` 方法。这些方法中的每一个都有自己的栈，用于保存对该方法上下文中创建的对象的引用，在本例中是 `Singer` 实例。此引用仅用于打印在此方法主体中创建的
    `Singer` 实例的名称。然后该方法结束，但不返回引用。这意味着创建的实例不再需要，因为它仅在此方法的上下文中使用。


    当 `genSinger()` 方法执行结束时，对 `Singer` 的引用会从栈中丢弃。`Singer` 实例仍然存在于堆内存中，但无法再从程序中访问，因此它不再为程序所需。它现在只是占用一个内存块，其中包含其自身内容及其对其他实例的引用，在本例中是一个
    `String`、一个 `Double` 和一个 `LocalDate`。


    考虑到 `genString()` 被调用了无限次（在图 13-4 中用 `(*n)` 表示），将会创建更多的 `Singer` 实例。它们会持续占用内存，并且程序在某个时刻将无法创建其他实例，因为将没有更多可用内存。


    这就是垃圾回收器发挥作用的地方。那些不再被程序引用、因此不可达的 `Singer` 实例被视为垃圾（现在你知道这个名字的由来了），因为它们不再需要，并且可以安全地清理内存。GC
    是一个与主执行线程并行运行的清理线程，它会不时地开始删除堆内存中未被引用的对象。并且由于 `finalize()` 方法仍然可用，我们将为 `Singer`
    类型重写它，以打印一条日志消息，这样我们就可以直接在控制台中看到垃圾回收器何时销毁一个实例，因为在此之前我们会调用 `finalize()` 方法。代码清单
    13-9 中的代码片段描述了我们 `Singer` 实例。


    ```

    package com.apress.bgn.thirteen;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.time.LocalDate;

    import java.util.Objects;

    public class Singer {

    private static final Logger LOGGER = LoggerFactory.getLogger(Singer.class);

    private static final long serialVersionUID = 42L;

    private final long birthtime;

    private String name;

    private Double rating;

    private LocalDate birthDate;

    public Singer(String name, Double rating, LocalDate birthDate) {

    this.name = name;

    this.rating = rating;

    this.birthDate = birthDate;

    this.birthtime = System.nanoTime();

    }

    // 部分代码已省略

    @Override

    protected void finalize() throws Throwable {

    try {

    long deathtime = System.nanoTime();

    long lifespan = (deathtime - birthtime) / 1_000_000_000;

    LOGGER.info("GC Destroyed: {} after {} seconds", name, lifespan);

    } finally {

    super.finalize();

    }

    }

    }

    代码清单 13-9

    重写了 finalize() 方法的 Singer 类

    ```


    添加 `birthtime` 字段只是为了能够计算从调用实例的构造函数到垃圾回收器调用 `finalize()` 方法之间经过的时间。由于时间以纳秒为单位，我们将差值除以
    10 的 9 次方，以秒为单位获取时间。


    本节使用的代码示例给垃圾回收器带来了大量工作，因为每个创建的 `Singer` 实例在被丢弃之前都只被使用了很短的时间。如果你运行代码，你会在控制台中看到大量日志消息：首先是大量关于对象被创建的消息，然后，如果你等待几秒钟，会看到关于对象被丢弃的消息。所有输出都定向到一个文件，因为
    IntelliJ IDEA 控制台基于一个会不时重置的缓冲区，以防止编辑器崩溃。你必须手动停止程序，因为 `while (true)` 永远不会结束，因为它的条件永远不会计算为
    `false`。停止程序后，你会注意到以下位置的日志文件：`/chapter13/out/gc.log`。如果没有，请修改此类的 IntelliJ IDEA
    启动器并添加以下 VM 选项：


    ```

    -Dlogback.configurationFile=chapter13/src/main/resources/logback.xml

    ```


    然后，再次运行它。


    `gc.log` 的内容应该与代码清单 13-10 中所示的代码片段非常相似。

