    现在，让我们添加一个过滤器来更好地记录请求。这意味着我们将同时使用`SimpleFileServer.createFileHandler(..)`和`SimpleFileServer.createOutputFilter()`。要创建服务器，我们需要一个也接受过滤器作为参数的`HttpServer.create(..)`版本。代码如清单[10-31](#463938_3_En_10_Chapter.xhtml#PC41)所示。


