  trans: '

    ### 有多少种垃圾回收器？


    Oracle HotSpot JVM 提供了以下几种垃圾回收器：


    *   **串行回收器**：所有垃圾回收事件都在一个线程中串行执行。每次垃圾回收后都会进行内存压缩。


    *   **并行回收器**：次要垃圾回收使用多线程。主要垃圾回收和老年代压缩使用单线程。


    *   **G1 回收器**：在 Oracle JDK 7 update 4 中引入，旨在永久取代 CMS GC，适用于能够与 CMS 回收器并发运行、需要内存压缩、需要更可预测的
    GC 暂停时间，且不需要更大堆内存的应用程序。G1 回收器是一种服务器风格的垃圾回收器，针对具有大内存的多处理器机器，但考虑到现在大多数笔记本电脑至少拥有八个核心和
    16GB 内存，它也非常适合这些设备。G1 既有并发阶段（与应用程序线程同时运行；例如，细化、标记、清理），也有并行阶段（多线程；例如，停止所有事件）。完全垃圾回收仍然是单线程的，但如果调整得当，你的应用程序应该可以避免完全垃圾回收。


    *   **Z 垃圾回收器 (ZGC)**：这是在 Java 11 中引入的一种可扩展的低延迟垃圾回收器。ZGC 并发执行所有耗时的工作，不会停止应用程序线程的执行超过
    10ms，这使其适用于需要低延迟和/或使用巨大堆（数 TB）的应用程序。


    *   **Shenandoah 垃圾回收器**：Shenandoah 是一种低暂停时间的垃圾回收器，在 Java 12 中引入，它通过与正在运行的 Java
    程序并发执行更多垃圾回收工作来减少 GC 暂停时间。Shenandoah 并发执行大部分 GC 工作，包括并发压缩，这意味着其暂停时间不再与堆的大小成正比。


    *   **Epsilon 无操作回收器**：在 Java 11 中引入，这种回收器实际上是一个虚拟 GC，不回收或清理内存。当堆满时，JVM 直接关闭。这种回收器可用于性能测试、内存分配分析、VM
    接口测试，以及内存使用极其受限的极短生命周期任务和应用程序。显然，开发者必须尽可能精确地估算应用程序的内存占用。


    我们已经列出了垃圾回收器的类型，但我们如何知道本地 JVM 使用的是哪一种呢？方法不止一种。最简单的方法是在运行一个带有 `main()` 方法的简单类时，添加
    `-verbose:gc` 作为 VM 选项。


    使用 Java 23，无需任何其他配置，将显示以下输出：


    ```

    [0.011s][info][gc] Using G1

    ```


    注意


    使用 VM 选项运行 Java 类的最简单方法是创建一个 IntelliJ IDEA 启动器，并在相应的文本字段中引入 VM 选项。另一种方法是从命令行运行一个简单的类，并将参数添加到命令中。以下示例复用了**第**
    **2** **章**中介绍的 `Practice01.java` 文件：


    `java --enable-preview -Xlog:gc* Practice01.java`


    警告


    使用启动器可以避免因执行命令所用的 shell 而引起的复杂问题。例如，Zsh（或 Z shell）需要对 `*`（星号）进行转义；否则，它将无法执行命令并报错
    `zsh: no matches found: -Xlog:gc*`。


    正如你所读到的，默认使用 G1 垃圾回收器。为了显示该垃圾回收器的更多细节，可以在运行 Java 类时将 `-Xlog:gc*` 添加到 VM 参数中，如代码清单
    13-1 所示。


    ```

    [0.015s][info][gc,init] CardTable entry size: 512    # (1)

    [0.014s][info][gc     ] Using G1

    [0.017s][info][gc,init] Version: 23+37-2369 (release)

    [0.017s][info][gc,init] CPUs: 16 total, 16 available

