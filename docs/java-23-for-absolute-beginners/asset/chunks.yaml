    So, what else can we do with our class? Remember the code the book started with?
    Let’s put it the `main()` method in this class. The code is depicted again in
    Listing [3-26](#463938_3_En_3_Chapter.xhtml#PC26).


    ```

    package com.apress.bgn.three.helloworld;

    import java.util.List;

    public class HelloWorld {

    public static void main(String... args) {

    //System.out.println("Hello " + args[0] + "!");

    List items = List.of("1", "a", "2", "a", "3", "a");

    items.forEach(item -> {

    if (item.equals("a")) {

    System.out.println("A");

    } else {

    System.out.println("Not A");

    }

    });

    }

    }

    Listing 3-26

    A More Complex main Method

    ```


    The import `java.util.List``;` statement is the only type of statement that can
    exist between a package and a class declaration. This statement is telling the
    Java compiler that an object type `java.util.List` will be used in the program.
    The `import` keyword is followed by the fully qualified name of the type. A fully
    qualified name of a type is made of the package name (`java.util`), a dot (`.`),
    and the simple name of the type (`List`). Without it, the `HelloWorld` class will
    not compile. Try it by putting `//` in front of the statement—this will turn the
    line into a comment that is ignored by the compiler. You will see the editor complain
    by making any piece of code related to that list bright red.


    The statement `List<String> items = List.of("1", "a", "2", "a", "3", "a");` creates
    a list of text values. Creating lists this way was introduced in Java 9\. Specifying
    what type of elements are in a list by using `<E>` was introduced in Java 5, and
    it’s called **generics**. The elements in the list are then traversed by the `forEach`
    method, and each of them is tested to see if it is equal to the “*a*” character.
    The whole expression used to do this is called a **lambda expression** and this
    type of syntax was introduced in Java 8, together with the `forEach` method.


    If you run the class now, in the console you should see a sequence of *A* and
    *Not A* printed, each on its own line, like shown in Listing [3-27](#463938_3_En_3_Chapter.xhtml#PC27).


    ```

    Not A

    A

    Not A

    A

    Not A

    A

    Listing 3-27

    Output of Running the Advanced HelloWorld Class

    ```


    The code we have written until now uses quite a few types of objects to print
    some simple messages in the console. The `List<E>` object is used to hold a few
    `String` objects. The messages are printed using the `println` method that is
    called on the `out` object, which is a static field in the `System` class. And
    these are just the objects that are visible to you in the code. Under the hood,
    the `List<E>` elements are processed by a `Consumer<E>` object created on the
    spot that the lambda expression in Listing [3-26](#463938_3_En_3_Chapter.xhtml#PC26)
    hides for simplicity reasons, so that code can be expanded as shown in Listing
    [3-28](#463938_3_En_3_Chapter.xhtml#PC28).


    ```

    package com.apress.bgn.three.helloworld;

    import java.util.List;

    import java.util.function.Consumer;

    public class HelloWorld {

    public static void main(String... args) {

    List items = List.of("1", "a", "2", "a", "3", "a");

    items.forEach(new Consumer() {

    @Override

    public void accept(String item) {

    if (item.equals("a")) {

    System.out.println("A");

    } else {

    System.out.println("Not A");

    }

    }

    });

    }

    }

    Listing 3-28

    A More Complex main Method Without Lambda Expressions

    ```


    Before ending this chapter, I would like to show you another neat thing. The contents
    of the `forEach` block can be written as a single line:


    ```

    + items.forEach(item -> System.out.println(item.equals("a") ? "A" : "Not A"));

    ```


    And the previous line can be made even simpler by using something called a *method
    reference*. But more about that a little bit later in the book.


    What you read in this chapter might look scary now, but I promise that this book
    introduces each concept in a clear context and compares the concepts with real-life
    objects and events so that you can understand them easily. And if that does not
    work, there are always more books, more blogs, and of course the official Oracle
    page for each JDK, which has quite good tutorials. Where there’s a will, there’s
    a way.


    Important


    Also, take advantage of your IDE! By clicking on any object type in the code while
    pressing the Control/Command key, the code of the object class is opened, enabling
    you to see how that class was written, and you can read the documentation for
    it directly in the editor. As an exercise, do this for the `forEach` method and
    the `System` class.


    Most really smart editors have *keymaps*, groups of keys that when pressed together
    perform certain actions, like navigation, code generation, execution, and so on.
    Print the IntelliJ IDEA keymap reference and get comfortable with it. Your brains
    is very fast, and when coding, the aim is to type as fast as you think, if possible.
    :)


    ## Summary


    In this chapter you were introduced to the fundamental building blocks of a Java
    application. You were also taught how to use `jshell` to execute Java statements
    outside of the context of an application. You found out how you can manually compile
    and Java code that declared packages and modules.


    Many of the things you did while following this chapter you will probably do daily
    if you get a job as a Java developer...except for the days that you will spend
    hunting and fixing bugs in existing code. You will probably spend a lot of time
    reading documentation too, because the JDK has a lot of classes, with fields and
    methods you can use to write an application. With each released version, things
    change, and you have to keep yourself up-to-date. The brain has limited capacity;
    no employer will ever expect you to know every JDK class and method, but work
    smart and keep this URL [h`ttps://docs.oracle.com/en/java/javase/23/docs/api/index.html`](https://docs.oracle.com/en/java/javase/23/docs/api/index.html)
    (or the one matching the JDK version used) always opened in your browser. When
    you have doubts about a JDK class or method, just read about it on the spot.


