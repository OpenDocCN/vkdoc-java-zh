    \ com.apress.bgn.five;\npublic class CubeDemo {\nvoid main() {\n// 三维数组，包含三个坐标\n\
    int[][][] intMatrix3 = new int[2][2][2];\nfor (int i = 0; i < intMatrix3.length;\
