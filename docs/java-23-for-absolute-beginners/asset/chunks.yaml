    ```


    在 Java HotSpot VM 中，GC 使用一种称为*卡表*的数据结构。卡表加速了查找不再被引用的对象的过程。老年代被分割成 512 字节的块，称为**卡片**，如代码清单
    13-1 中标记为 **(1)** 的日志行所示。JDK 18 引入了可配置的卡表卡片大小。可用的卡片大小为 `128`、`256`、`512`（默认）和
    `1024`（最后一种仅限 64 位）。要自定义卡片大小，请在运行 `ShowGCDemo` 类时添加 VM 选项 `-XX:GCCardSizeInBytes=<card-size>`，第一个控制台日志消息应反映所需的卡片大小。


    我们可以在代码清单 13-1 中看到，内存区域大小为 4M **(2)**，堆最大大小为 8G **(3)**，以及每个代的大小和占用情况 **(4)**。


    在**第** **5** **章**中，介绍了 `java -XX:+PrintFlagsFinal -version` 命令来显示所有 JVM 标志。通过过滤“GC”和“NewSize”返回的结果，可以显示所有
    GC 特定的标志及其值。这样的标志相当多，它们显示在代码清单 13-2 中。

