- fmt: '## Garbage Collection Exceptions and Causes


    It was mentioned before that if objects cannot be discarded from the memory, an
    exception of type `OutOfMemoryError` will be thrown. `OutOfMemoryError` does not
    actually extend `java.lang.Exception`, so calling it an "exception" is inaccurate.
    The exception class hierarchy was mentioned in **Chapter 4**. That hierarchy includes
    a class named `java.lang.Error` that implements `java.lang.Throwable`, and it
    was mentioned that these types of objects are thrown by a program when there is
    a critical issue that the program cannot recover from. The full hierarchy of the
    `java.lang.OutOfMemoryError` class is depicted here:


    ```

    java.lang.Object

    java.lang.Throwable

    java.lang.Error

    java.lang.VirtualMachineError

    java.lang.OutOfMemoryError

    ```


    `OutOfMemoryError` is actually one of those ugly things you do not want thrown
    when your program is running, because this means your program is actually no longer
    running. The reason why it is not running is that it has no memory left to store
    new objects being created.


    This error is thrown by the JVM when anything goes wrong when it is doing memory
    management. Although the most common cause is that the heap memory is depleted,
    there are other causes. When heap memory allocated to the JVM is depleted, the
    error has the following message:


    ```

    Exception in thread "main" java.lang.OutOfMemoryError: Java heap space

    ```


    But there is another message that you might see:


    ```

    Exception in thread "main" java.lang.OutOfMemoryError: GC Overhead Limit Exceeded

    ```


    This message is still related to the heap size. The error is thrown with this
    message when the data for the program barely fits the size of the heap, so the
    heap is almost full, which allows the GC to run, but because it cannot redeem
    any memory, the GC keeps running, and it is actually hindering the normal execution
    of the application. This message is added to the error when the GC spends 98%
    of execution time and the application spends the other 2%.


    These two are the most common error messages you will see when the GC cannot do
    its job properly for whatever reason. A complete list can be found at: `https://docs.oracle.com/javase/8/docs/technotes/guides/troubleshoot/memleaks002.html`,
    but since most GC issues relate to the heap size, G1GC mostly throws errors with
    the Java heap space messages.


    ## Summary


    This is the final chapter of the book (two appendixes follow). When it comes to
    the Java ecosystem, there are a lot of books and tutorials available on the Internet.
    This book only scratched the surface to give you a good starting point as a Java
    developer, and the whole team that worked on it hopes it satisfied your needs
    and raised your curiosity to find out more. As this chapter clearly demonstrated,
    there is no perfect solution to make sure memory is always managed right regardless
    of the application scope. If you get into trouble, experimentation is always a
    step of determining the right garbage collector for your JVM.


    This chapter has covered the following topics:


    *   What garbage collection is, and the steps involved

    *   How the heap memory is structured

    *   The many types of garbage collectors available in the Oracle HotSpot JVM and
    how to switch between them

    *   How to list all GC flags and use them as VM options

    *   How to view GC configurations and statistics using VM options

    *   How to view the garbage collection in action using `finalize()` and `Cleaner`

    *   How to stop the garbage collector from collecting important objects

    *   How to create objects that are easily collected by using soft references'
