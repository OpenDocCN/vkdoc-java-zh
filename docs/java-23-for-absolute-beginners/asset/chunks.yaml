- fmt: '# Path Handlers


    The `java.nio.file.Path` interface was introduced in Java 7 together with utility
    classes `java.nio.file.Files` and `java.nio.file.Paths` to provide new and more
    practical ways to work with files. A `Path` instance may be used to locate a file
    in a file system, and thus represents a system-dependent file path. `Path` instances
    are more practical than `File` instances because they can provide methods to access
    components of a path, combine paths, and compare paths.


    `Path` instances cannot be directly created, because an interface cannot be instantiated,
    but the interface provides static utility methods to create them, and so does
    the class `Paths`. Use whichever you want depending on your situation.


    The simplest way to create a `Path` instance is to start with a file handler and
    call `Paths.get(fileURI)`, as shown in Listing [11-8](#463938_3_En_11_Chapter.xhtml#PC18).


    ```

    package com.apress.bgn.eleven.io;

    // other imports omitted

    import java.io.File;

    import java.nio.file.Path;

    import java.nio.file.Paths;

    public class PathDemo {

    private static final Logger LOGGER = LoggerFactory.getLogger(PathDemo.class);

    void main() {

    File file = new File(

    "/[workspace]/java-23-for-absolute-beginners/README.adoc");

    Path path = Path.of(file.toURI());

    LOGGER.info(path.toString());

    }

    }

    Listing 11-8

    Creating a Path Instance

    ```


    Starting with Java 11, `Paths.get(file.toURI())` can be replaced with `Path.of(file.toURI())`.
    The other way to create a `Path` instance is to use the other form of the `Paths.get(..)`
    that receives as arguments multiple pieces of the path:


    ```

    Path composedPath = Paths.get("/[workspace]",

    "java-23-for-absolute-beginners",

    "README.adoc");

    LOGGER.info(composedPath.toString());

    ```


    Both paths created previously point to the same location, thus if compared with
    each other using the `compareTo(..)` method (because `Path` extends interface
    `Comparable<Path>`), the result returned will be 0 (zero), which means the paths
    are equal:


    ```

    LOGGER.info("Is the same path? : {} ", path.compareTo(composedPath) = =0 ? "yes"
    : "no");

    // prints : INFO com.apress.bgn.ch11.PathDemo - Is the same path? : yes

    ```


    In the code sample in Listing [11-9](#463938_3_En_11_Chapter.xhtml#PC21), a few
    `Path` methods are called on the path instance.


    ```

    package com.apress.bgn.eleven.io;

    // import section omitted

    public class PathDemo {

    private static final Logger LOGGER = LoggerFactory.getLogger(PathDemo.class);

    public static void main(String... args) {

    var path = Paths.get("/[workspace]",

    "java-23-for-absolute-beginners",

    "README.adoc");

    printPathDetails(path);

    }

    private static void printPathDetails(Path path) {

    LOGGER.info("Path Details:");

    LOGGER.info("\tFileName : {}", path.getFileName());

    LOGGER.info("\tParent :{}", path.getParent());

    LOGGER.info("\tLocation :{}", path.toAbsolutePath());

    LOGGER.info("\tIs Absolute? : {}", path.isAbsolute());

    LOGGER.info("\tRoot :{}", path.getRoot());

    LOGGER.info("\tFileSystem : {}", path.getFileSystem());

    LOGGER.info("\tIsFileReadOnly : {}", path.getFileSystem().isReadOnly());

    }

    }

    Listing 11-9

    Inspecting Path Details

    ```


    The following list explains each method and its outcome:


    *   `toAbsolutePath()` returns a `Path` instance representing the absolute path
    of this path. When called on the `Path` instance created previously, as it is
    already absolute, the method will just return the path object the method is called
    on. Also, calling `path.isAbsolute()` will return `true`.


    *   `getParent()` returns the parent `Path` instance. Calling this method on the
    `Path` instance will print:


    *   `getRoot()` returns the root component of this path as a `Path` instance.
    On a Linux or macOS system it prints `"/"`, and on Windows it prints something
    like `"C:\"`.


    *   `getFileName()` returns the name of the file or directory denoted by this
    path as a `Path` instance; basically, the path is split by the system path separator,
    and the most far away from the root element is returned.


    *   `getFileSystem()` returns the file system that created this object. For macOS,
    it is an instance of type `sun.nio.fs.MacOSXFileSystem`.


    ```

    INFO com.apress.bgn.ch11.PathDemo - Parent :/[workspace]/java-23-for-absolute-beginners/README.adoc

    ```


    Another useful `Path` method is `resolve(..)`. This method takes a `String` instance
    that is a representation of a path and resolves it against the `Path` instance
    it is called on. This means that path separators are added according to the operating
    system the program runs on and a `Path` instance will be returned. This is depicted
    in Listing [11-10](#463938_3_En_11_Chapter.xhtml#PC23).


    ```

    var chapterPath = Paths.get("/Users/iuliana/apress/workspace",

    "java-23-for-absolute-beginners/chapter11");

    Path filePath = chapterPath.resolve(

    "read-write-file/src/main/resources/input/data.txt") ;

    LOGGER.info("Resolved Path :{}", filePath.toAbsolutePath());

    Listing 11-10

    Inspecting Path Details (again)

    ```


    The Listing [11-10](#463938_3_En_11_Chapter.xhtml#PC23) code sample will print
    the following:


    ```

    INFO  c.a.b.e.PathDemo - Resolved Path :/[workspace]/java-23-for-absolute-beginners/chapter11/read-write-file/src/main/resources/input/data.txt

    ```


    Using `Path` instances, writing code that manages files or retrieves their properties
    becomes easier to write in combination with `Files` utility methods. The code
    sample in Listing [11-11](#463938_3_En_11_Chapter.xhtml#PC25) makes use of a few
    of these methods to print properties of a file, in the same way we did previously
    using a `file` handler.


    ```

    package com.apress.bgn.eleven.io;

    // import section omitted

    public class PathDemo {

    private static final Logger log = LoggerFactory.getLogger(PathDemo.class);

    public static void main(String... args) {

    var outputPath = FileSystems.getDefault()

    .getPath("/[workspace]/java-23-for-absolute-beginners/" +

    "chapter11/read-write-file/src/main/resources/output/sample");

    try {

    Path dirPath = Files.createDirectory(outputPath);

    printPathStats(dirPath);

    } catch (FileAlreadyExistsException faee) {

    LOGGER.error("Directory already exists.", faee);

    } catch (IOException e) {

    LOGGER.error("Could not create directory.", e);

    }

    }

    private static void printPathStats(Path path) {

    if (Files.exists(path)) {

    LOGGER.info("Path Details:");

    LOGGER.info("\tType: {}", Files.isDirectory(path) ? "yes" : "no");

    LOGGER.info("\tType: {}", Files.isRegularFile(path) ? "yes" : "no");

    LOGGER.info("\tType: {}", Files.isSymbolicLink(path) ? "yes" : "no");

    LOGGER.info("\tLocation :{}", path.toAbsolutePath());

    LOGGER.info("\tParent :{}", path.getParent());

    LOGGER.info("\tName : {}", path.getFileName());

    try {

    double kilobytes = Files.size(path) / (double)1024;

    LOGGER.info("\tSize : {} ", kilobytes);

    LOGGER.info("\tIs Hidden: {}", Files.isHidden(path) ? "yes" : "no");

    } catch (IOException e) {

    LOGGER.error("Could not access file.", e);

    }

    LOGGER.info("\tIs Readable: {}", Files.isReadable(path) ? "yes" : "no");

    LOGGER.info("\tIs Writable: {}", Files.isWritable(path) ? "yes" : "no");

    }

    }

    }

    Listing 11-11

    Printing Even More Path Details

    ```


    As you can see, the `Files` class provides the same functionality as the `File`
    class. The `Files` class consists exclusively of static methods that operate on
    files, directories, or other types of files. It was introduced in Java 7 and its
    advantage is the clearer syntax. The power and practicality of using `java.nio`
    classes is more obvious when managing files, creating them, renaming them, deleting
    them, and reading and writing them. The code sample in Listing [11-12](#463938_3_En_11_Chapter.xhtml#PC26)
    shows a file being created, renamed, and deleted using Java NIO classes.'
