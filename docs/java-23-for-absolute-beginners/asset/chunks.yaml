    ## 介绍 JavaFX


    JavaFX Script 是 Sun Microsystems 设计的一种脚本语言，构成了 Java 平台上 JavaFX 技术家族的一部分。它于 2008
    年 12 月 JDK 6 发布后不久推出，曾一度有开发者预计它会被弃用，因为它作为一种完全不同的语言，并未真正流行起来。


    在收购 Sun Microsystems 后，Oracle 决定保留 JavaFX Script，并将其转变为 JavaFX 库。这是一组图形和媒体包，开发者可以使用它们来设计、创建、测试、调试和部署富客户端应用程序，这些应用程序能在包括移动设备在内的多种平台上一致运行。JavaFX
    旨在取代 Swing 成为 JDK 的主要 GUI 库，但在 JDK 10 之前，Swing 和 JavaFX 都是所有 JDK 版本的一部分。这种情况在
    JDK 11 中发生了变化。从 JDK 11 开始，JavaFX 仅作为独立模块提供，并且该模块成为 OpenJFX 项目下 OpenJDK 的一部分^(⁹²)。


    JavaFX 是一个用于开发桌面应用程序以及富互联网应用程序（RIA）的 Java 库。JavaFX 的使用率仍未达到 Oracle 的预期，但将其从 JDK
    中分离出来，使其得以转变为市场上其他现有 GUI 工具包（如 Eclipse SWT^(⁹³) 和 Google Web Toolkit (GWT)^(⁹⁴)）的真正竞争对手。


    在从 JDK 中分离出来后，JavaFX 独立发展，并与发布的 Java 版本保持同步。在撰写本章时，已有 JavaFX 23 版本可供下载^(⁹⁵)。官方文档足以帮助你入门。


    信息


    本书的项目是使用 Maven 构建的，这使得操作非常实用，因为 Maven 配置确保必要的依赖项能够轻松添加到类路径中。


    JavaFX 代码目前是普通的 Java 代码，因此不再需要脚本。JavaFX 组件在 `java.fx` 模块列表下定义。在清单 10-15 所示的配置片段中，你可以看到我们使用
    JavaFX 的项目模块在其 `module-info.java` 文件中通过 `requires` 指令声明了对几个 `java.fx` 模块的依赖。


    ```

    module chapter.ten.javafx {

    requires javafx.base;

    requires javafx.graphics;

    requires javafx.controls;

    opens com.apress.bgn.ten to javafx.graphics;

    }

    清单 10-15

    使用 java.fx 模块的项目配置示例

    ```


    JavaFX 应用程序启动器使用反射来启动应用程序，因此我们需要打开 `com.apress.bgn.ten` 包，以允许使用 `opens` 指令进行反射。如果没有该指令，则会抛出
    `java.lang.IllegalAccessException` 异常，并且应用程序无法启动。


    最简单的入门应用程序是一个仅包含关闭选项的简单窗口。显示一个普通方形窗口的代码如清单 10-16 所示。


    ```

    package com.apress.bgn.ten;

    import javafx.application.Application;

    import javafx.scene.Scene;

    import javafx.scene.layout.StackPane;

    import javafx.stage.Stage;

    public class JavaFxDemo extends Application {

    public static void main(String... args) {

    launch(args);

    }

    @Override

    public void start(Stage primaryStage) {

    primaryStage.setTitle("JavaFX Demo Window!");

    var root = new StackPane();

    primaryStage.setScene(new Scene(root, 500, 500));

    primaryStage.show();

    }

    }

    清单 10-16

    简单的 JavaFX 应用程序

    ```


    首先你需要知道，应用程序的主类必须继承 `javafx.application.Application` 类，因为这是 JavaFX 应用程序的入口点。这是必需的，因为
    JavaFX 应用程序由名为 **Prism** 的新性能图形引擎运行，该引擎位于 JVM 之上。除了 Prism，JavaFX 还自带名为 **Glass**
    的窗口系统、一个媒体引擎和一个 Web 引擎。它们不对外公开；开发者唯一能使用的是 JavaFX API，它提供了构建具有精美界面的应用程序所需的任何组件。所有这些引擎都由
    **Quantum** 工具包连接在一起，该工具包是这些引擎与堆栈中上层之间的接口。Quantum 工具包管理执行线程和渲染。


    `launch(..)` 方法是 `Application` 类中的一个静态方法，用于启动独立应用程序。它通常从 main 方法中调用，并且只能调用一次；否则会抛出
    `java.lang.IllegalStateException` 异常。`launch(..)` 方法在应用程序退出之前不会返回，退出方式可以是关闭所有窗口或调用
    `Platform.exit()`。`launch(..)` 方法会创建一个 JavaFxDemo 实例，调用其 `init()` 方法，然后调用 `start(..)`。`start(..)`
    方法在 `Application` 类中被声明为抽象方法，因此开发者必须提供具体实现。


    JavaFX 应用程序使用 `javafx.scene` 包下定义的组件构建，并具有层次化组织结构。`javafx.scene` 包的核心类是 `javafx.scene.Node`，它是
    `Scene` 层次结构的根。该层次结构中的类为应用程序用户界面的所有视觉元素提供了实现。由于所有这些类都以 `Node` 作为根类，视觉元素被称为*节点*，这使得应用程序成为*节点的场景图*，而该图的初始节点称为*根*。每个节点都有一个唯一标识符、一个样式类和一个包围体，并且除了根节点之外，图中的每个节点都有一个父节点和零个或多个子节点。除此之外，节点还具有以下属性：


    *   效果，例如模糊和阴影，当鼠标光标悬停在界面上时，这些效果有助于确保你点击正确的组件

    *   不透明度

    *   用于改变视觉状态或位置的变换

    *   事件处理器，类似于 Swing 中的监听器，用于定义对鼠标、键盘和输入方法的反应

    *   特定于应用程序的状态


    场景图大大简化了丰富界面的构建，并且因为它还包含基本图形，如矩形、文本、图像和媒体。各种图形的动画可以通过 `javax.animation` 包中的动画
    API 来实现。如果你有兴趣了解更多关于 JavaFX 底层机制的信息，请查看 Dev.Java^(⁹⁶) 上的信息。本书的重点更多在于*如何做事*，而不是*它们如何工作*，因此阅读那篇额外的文章可能有助于你设计未来的解决方案。


    我们再次从一个简单的窗口开始。第一步是添加一个用于退出应用程序的按钮。由于渲染 JavaFX 应用程序涉及渲染引擎，这意味着它必须优雅地关闭，因此调用 `System.exit(0)`
    不是首选选项。`start(..)` 方法的内容必须调用一个特殊的 JavaFX 方法来优雅地关闭应用程序。代码如清单 10-17 所示。

    '
