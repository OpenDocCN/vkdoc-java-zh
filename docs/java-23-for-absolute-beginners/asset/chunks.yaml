- fmt: '# `while` Statement


    The main difference between a `while` statement and a `for` statement is that
    a `while` statement does not require executing a fixed number of steps, so a counter
    is not always needed. The number of repetitions a `while` statement executes depends
    only on how many times the continuation condition that controls this number is
    evaluated to `true`. The generic template for this statement is depicted in Listing
    [7-32](#463938_3_En_7_Chapter.xhtml#PC33).


    ```

    while ([eval(condition)] == true) {

    [code_block]

    }

    Listing 7-32

    The while Statement Template

    ```


    A `while` statement does not really require an initialization statement either.
    If needed, it can be inside the `while` code block, or outside it. The `while`
    statement can replace the `for` statement, but the advantage of the `for` statement
    is that it encapsulates the initialization, the termination condition, and the
    modification of the counter in a single block, so it is more concise. The array
    traversal code sample can be rewritten using the `while` statement, as depicted
    in Listing [7-33](#463938_3_En_7_Chapter.xhtml#PC34).


    ```

    package com.apress.bgn.seven.whileloop;

    import static java.lang.System.out;

    public class WhileLoopDemo {

    void main(){

    int[] arr = {5, 1, 4, 2, 3};

    int i = 0;

    while(i < arr.length) {

    out.println("arr[" +i +"] = " + arr[i]);

    ++i;

    }

    }

    }

    Listing 7-33

    The while Statement Used to Loop over an Array

    ```


    As you can see, the declaration and initialization of the counter variable `int
    i = 0;` is done outside the `while` code block. The incrementation of the counter
    is done inside the code block to be repeated. At this point, if we design the
    flowchart for this scenario, it will look the same as the one for the `for` statement
    depicted in Figure [7-8](#463938_3_En_7_Chapter.xhtml#Fig8).


    As incredible as it sounds, the `[condition]` is not mandatory either, as it can
    be replaced directly with `true`, but in that case you have to make sure there
    is an exit condition inside the block of code that will definitely be executed;
    otherwise, the execution will most likely end with an error, since the JVM will
    not allow an infinite loop. This condition must be placed at the beginning of
    the block of code, to prevent the execution of the useful logic in a situation
    where it shouldn''t be executed. For our simple example, clearly we do not want
    to call `System.out.println` for an element with an index outside the array range,
    as depicted in Listing [7-34](#463938_3_En_7_Chapter.xhtml#PC35).


    ```

    package com.apress.bgn.seven.whileloop;

    import static java.lang.System.out;

    public class AnotherWhileLoopDemo {

    void main(){

    int[] arr = {5, 1, 4, 2, 3};

    int i=0;

    while(true){

    if (i >= arr.length) {

    break;

    }

    out.println("arr[" +i +"] = " + arr[i]);

    ++i;

    }

    }

    }

    Listing 7-34

    The while Statement Used to Loop over an Array, Without a Continuation Expression

    ```


    The `while` statement is best used when we are working with a resource that is
    not always online. Let''s say we are using a remote database for our application
    that is in a network that is unstable. Instead of giving up trying to save our
    data after the first timeout, we could try until we succeed, right? This can be
    done by using a `while` statement, which will keep trying to initialize a connection
    object in its code block. The code looks roughly as depicted in Listing [7-35](#463938_3_En_7_Chapter.xhtml#PC36).


    ```

    package com.apress.bgn.seven.whileloop;

    import java.sql.Connection;

    import java.sql.DriverManager;

    import java.sql.ResultSet;

    import java.sql.Statement;

    import static java.lang.System.out;

    public class WhileConnectionTester {

    void main()throws Exception {

    Connection con = null;

    while (con == null) {

    try {

    con = DriverManager.getConnection(

    "jdbc:mysql://localhost:3306/mysql",

    "root", "mypass");

    } catch (Exception e) {

    out.println("Connection refused. Retrying in 5 seconds ...");

    Thread.sleep(5000);

    }

    }

    // con != null, do the thing

    Statement stmt = con.createStatement();

    ResultSet rs = stmt.executeQuery("select * from user");

    while (rs.next()) {

    out.println(rs.getString(1) + " " + rs.getString(2));

    }

    con.close();

    }

    }

    // output

    // maybe

    // Connection refused. Retrying in 5 seconds ...

    // definitely

    /*

    % root

    localhost mysql.infoschema

    localhost mysql.session

    localhost mysql.sys

    localhost root

    */

    Listing 7-35

    The while Statement Used to Repeatedly Try to Obtain a Database Connection

    ```


    The problem with this code is that it will run forever if there is no database
    to connect to. If we want to give up trying after a certain time, we have to introduce
    a variable counting the number of tries and exit the loop using a `break;` statement,
    as shown in Listing [7-36](#463938_3_En_7_Chapter.xhtml#PC37).


    ```

    package com.apress.bgn.seven.whileloop;

    import java.sql.Connection;

    import java.sql.DriverManager;

    import static java.lang.System.out;

    public class AnotherWhileConnectionTester {

    public static final int MAX_TRIES = 10;

    void main()throws Exception {

    var cntTries = 0;

    Connection con = null;

    while (con == null && cntTries < MAX_TRIES) {

    try {

    con = DriverManager.getConnection(

    "jdbc:mysql://localhost:3306/mysql",

    "root", "mypass");

    } catch (Exception e) {

    ++cntTries;

    out.println("Connection refused. Retrying in 5 seconds ...");

    Thread.sleep(5000);

    }

    }

    if (con != null) {

    // con != null, do the thing

    var stmt = con.createStatement();

    var rs = stmt.executeQuery("select * from user");

    while (rs.next()) {

    out.println(rs.getString(1) + " " + rs.getString(2));

    }

    con.close();

    } else {

    out.println("Could not connect!");

    }

    }

    }

    // output when no db

    // Connection refused. Retrying in 5 seconds ... (10 times)

    // Could not connect!

    Listing 7-36

    The while Statement Used to Repeatedly Try to Obtain a Database Connection Until
    the Number of Tries Expires

    ```


    **Important**


    As a rule of thumb, always make sure there is an exit condition when using looping
    statements.


    Since we''ve now covered all the statements needed to implement the Bubble Sort
    algorithm depicted in Figure [7-7](#463938_3_En_7_Chapter.xhtml#Fig7), let''s
    see what the code looks like. Be aware that this algorithm can be written in many
    ways, but the following code best matches the explanation provided earlier: while
    there are elements in the array that are not in the proper order, the array is
    traversed again and again and adjacent elements are swapped to fit the desired
    order (ascending, in this case). The simplest version of the Bubble Sort algorithm
    is depicted in Listing [7-37](#463938_3_En_7_Chapter.xhtml#PC38).


    ```

    package com.apress.bgn.seven.whileloop;

    import java.util.Arrays;

    import static java.lang.System.out;

    public class BubbleSortDemo {

    public static final int[] arr = {5, 1, 4, 2, 3};

    void main() {

    boolean swapped = true;

    while (swapped) {

    swapped = false;

    for (int i = 0; i < arr.length - 1; i++) {

    if (arr[i] > arr[i + 1]) {

    int temp = arr[i];

    arr[i] = arr[i + 1];

    arr[i + 1] = temp;

    swapped = true;

    }

    }

    }

    Arrays.stream(arr).forEach(out::println);

    }

    }

    // output

    /*

    1

    2

    3

    4

    5

    */

    Listing 7-37

    The Simplest Version of the Bubble Sort Algorithm

    ```'
