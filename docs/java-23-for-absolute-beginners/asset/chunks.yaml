    \ mother nature) process of cutting down and processing trees to produce timber.\
    \ In software programming, **logging** means writing log files that can be later\
    \ used to identify problems in code. The simplest way to log information is to\
    \ use the `System.out.print*(..)` method family, as depicted in Figure [9-1](#463938_3_En_9_Chapter.xhtml#Fig1).\n\
    \n![](images/463938_3_En_9_Chapter/463938_3_En_9_Fig1_HTML.jpg)\n\nFigure 9-1\
    \  \n`System.out.print*(..)` method family\n\nThe examples in this chapter use\
