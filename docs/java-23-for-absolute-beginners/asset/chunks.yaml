    The Java 9 version of the `iterate(..)` method is used to generate a finite stream.
    This version of the method receives as arguments an initial value called a `seed`,
    a `predicate` that determines when the iteration should stop, and an iteration
    `step`.


    Important


    A *predicate* is an inline implementation of the functional interface `java.util.function.Predicate<T>`,
    which declares a single method named `test(T t)` that returns a boolean value.
    The implementation of this method should test its single argument of type `T`
    against a condition and return `true` if the condition is fulfilled and `false`
    if not.


    Important


    The iteration step is an inline implementation of the functional interface `java.util.function.UnaryOperator<T>`
    used to represent an operation on a single operand that produces a result of the
    same type as its operand.


    In the following example, stream elements are generated starting from 0, using
    a step of 5, and they are generated as long as the values are lesser than 50,
    as defined by the predicate:


    ```

    Stream iterated = Stream.iterate(0, i -> i  i + 5);

    ```


    Similar to the `for` statement, without the predicate, you would be calling the
    version of this method introduced in Java 8, and in this case the `limit(..)`
    method must be used to make sure the stream is finite.


    ```

    Stream iterated = Stream.iterate(0, i -> i + 5).limit(15);

    ```


    In Java 9, beside the `limit(..)` method, another way to control the numbers of
    values in a stream is the `takeWhile(..)` method. This method takes the longest
    set of elements from the original stream that match the predicate received as
    an argument, starting with the first element. This works fine for ordered streams,
    but if the stream is unordered, the result is any set of elements that matches
    the predicate, including an empty one.


    To explain the different streams that result by calling `takeWhile(..)`, the concept
    of **order** for streams has to be discussed first.


    The expression **encounter order** represents the order in which a `Stream<T>`
    instance encounters data. The encounter order of a stream is defined by the source
    and intermediate operations. For example, if an array is used as a source, the
    encounter order of the stream is defined by the ordering in the array. If a list
    is used as a source, the encounter order is the list’s iteration order. If a set
    is used as a source, then there is no encounter order, because a set is inherently
    unordered.


    Each intermediate operation in a stream pipeline acts on the encounter order,
    and the effects are as follows:


    *   An encounter order could be imposed on the output. For example, the `sorted()`
    operation imposes an encounter order on an unordered stream.


    *   The encounter order is preserved. Some operations like `filter(..)` might
    drop a few elements, but the original order is unaffected.


    *   The encounter order is destroyed. For example, the `sorted()` operation imposes
    an encounter order on an ordered stream, replacing the existing one.


    Collector operations preserve encounter order if accumulating elements into a
    container with an encounter order. Sequential and parallel streams have the same
    properties with respect to ordering.


    Listing [8-13](#463938_3_En_8_Chapter.xhtml#PC17) shows two usages of the `takeWhile(Predicate<?
    super T> predicate)` method.


    ```

    package com.apress.bgn.eight;

    import java.util.stream.Stream;

    import static java.lang.System.out;

    public class FiniteStreamsDemo {

    void main() {

    // (1)

    Stream orderedStream = List.of( 3, 6, 9, 11, 12, 13, 15).stream();

    Stream result = orderedStream.takeWhile(s -> s % 3 == 0);

    result.forEach(s -> out.print(s + " "));

    // output: 3 6 9

    // (2)

    Stream unorderedStream = Set.of(3, 6, 9, 2, 4, 8, 12, 36, 18, 42, 11, 13).stream();

    result = unorderedStream.parallel().takeWhile(s -> s % 3 == 0);

    result.forEach(s -> out.print(s + " "));

    // output (maybe): 3 12 36

    }

    }

    Listing 8-13

    Creating a Stream Using a Supplier and the takeWhile(..) Method

    ```


    The first code chunk uses `takeWhile(..)` on an ordered stream of integers and
    returns a stream with elements that divide by 3\. The resulting stream contains
    the elements *3 6 9* because this is the first set of elements that match the
    given predicate.


    If `takeWhile(..)` is called on an unordered stream, as depicted in the second
    code chunk, the result will be unpredictable. The result might be *3 6 9* or *12
    36 18 42*, as the result is a subset of any elements matching the predicate. Also,
    since the order is not fixed, the code chunk might end up printing *6 3 9*, or
    *9 3 6*, and so on. So the result of `takeWhile(..)` on an unordered stream is
    **nondeterministic**.


    The `takeWhile(..)` method is the “sister” of the `dropWhile(..)` method, also
    introduced in Java 9\. As its name indicates, `dropWhile(..)` does exactly the
    reverse of what `takeWhile(..)` does: it returns, for an ordered stream, a new
    stream consisting of elements after dropping the longest set of elements that
    matches the predicate. For an unordered stream, there is only chaos, because any
    subset of elements matching the predicate can be dropped, including the empty
    stream. Listing [8-14](#463938_3_En_8_Chapter.xhtml#PC18) shows two usages of
    the `dropWhile(..)` method.


    ```

    package com.apress.bgn.eight;

    import java.util.stream.Stream;

    import static java.lang.System.out;

    public class FiniteStreamsDemo {

    void main() {

    List.of( 3, 6, 9, 11, 12, 13, 15).stream()

    .dropWhile(s -> s % 3 == 0 )

    .forEach(s -> out.print(STR."\{s} "));

    // output: 11 12 13 15

    Set.of(3, 6, 9, 2, 4, 8, 12, 36, 18, 42, 11, 13).stream()

    .parallel()

    .dropWhile(s -> s % 3 == 0 ).forEach(s -> out.print(STR."\{s} "));

    // output (maybe): 2 4 8 12 36 18 42 11 13

    }

    }

    Listing 8-14

    Creating Stream Using a Supplier and the dropWhile(..) Method

    ```


    If these two operations are applied to parallel streams, the only thing that changes
    is the order in which the elements are printed, but the result sets will contain
    the same elements.'
