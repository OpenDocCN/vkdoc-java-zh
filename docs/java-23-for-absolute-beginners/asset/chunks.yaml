    # 1. Java 及其历史简介


    Java 一直稳居全球最受欢迎的十大编程语言之列，即使在 28 年后的今天，它仍然是最具影响力的语言之一。Sun Microsystems 于 1996 年正式发布
    Java 1.0，它成功超越了像 C/C++这样早已确立地位的语言，成为最常用的编程语言之一。多年来，Java 的竞争对手数量不断增加，包括 C#、Groovy、Clojure、Scala
    和 Kotlin 等，这些语言都曾一度被预测将取代 Java，但显然这并未发生（否则，你也不会读这本书了）。本章是关于你即将学习的这门语言的简短历史课；如果你对历史视角不感兴趣，可以随意跳到第
    2 章。


    ## 一切是如何开始的


    1990 年，Sun Microsystems 是一家引领计算机行业革命的美国公司。当世界各地的计算机开始连接到万维网时，该公司决定召集其最优秀的工程师来设计和开发一款产品，使
    Sun 能够在新兴的互联网世界中成为重要参与者。这些工程师中包括詹姆斯·亚瑟·高斯林，一位加拿大计算机科学家，如今被公认为 Java 编程语言的*之父*。Sun
    产品的开发经历了五年的设计和编程，并经历了一次更名（由于版权问题，从 Oak 改为 Java），最终于 1996 年 1 月 23 日^(¹)，Java 1.0
    在 Linux、Solaris、Mac 和 Windows 平台上发布。


    阅读技术书籍时，人们通常倾向于跳过引言章节。然而，我鼓励你阅读本章。就我个人而言，在撰写本书第一版之前，我对 Java 的历史从未有过太大兴趣。我只知道詹姆斯·高斯林被认为是
    Java 的创造者，以及 Oracle 在 2010 年收购了 Sun Microsystems，仅此而已。我从未过多关心这门语言是如何演变的、灵感来自何处，或者一个版本与另一个版本有何不同。我只想编写代码并以此获得报酬。我从
    1.5 版本开始学习 Java，并认为许多特性是理所当然的。随后，我被分配到一个运行在 Java 1.4 上的项目，这让我相当困惑，因为我不知道为什么我编写的部分代码无法编译。尽管
    IT 行业发展非常迅速，但总会有某个客户拥有遗留应用程序，而了解每个 Java 版本的特性则是一种优势，因为你在执行迁移时会知道问题所在。


    当我开始为本书做研究时，我深深着迷了。Java 的历史之所以有趣，是因为它讲述了一个技术惊人成长和成功的故事，以及管理层之间的自负冲突如何几乎扼杀了创造它的公司。目前，Java
    是软件开发中最常用的技术，而创造它的公司已不复存在，这简直是一个悖论。然而，Oracle 仍在蓬勃发展，并持续投资于 Java，因此对于有志于成为 Java
    程序员的人来说，前景相当不错。


    本章描述了迄今为止发布的每个 Java 版本，简要追踪了该语言和 Java 虚拟机（JVM）的演变过程。

