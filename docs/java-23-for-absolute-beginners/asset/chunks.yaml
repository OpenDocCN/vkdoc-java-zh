- fmt: '### The `<<` Shift Left Operator


    As its name indicates, given a number represented in binary, this operator is
    used to shift bits to the left. The code in Listing [6-38](#463938_3_En_6_Chapter.xhtml#PC52)
    shows the `<<` shift left operator in action.


    ```

    package com.apress.bgn.six;

    // imports omitted

    public class ShiftDemo {

    void main(){

    byte b1 = 12;

    print8Bits(b1);

    byte b2 = (byte) (b1 << 3);

    print8Bits(b2);

    }

    // print8Bits method omitted

    }

    // output

    /*

    decimal:12

    binary:00001100

    decimal:96

    binary:01100000

    */

    Listing 6-38

    Testing the << Operator

    ```


    When bits are shifted to the left, the remaining positions are filled with 0.
    Also, the number becomes bigger, and the new value is its old value multiplied
    with `2^N`, where `N` is the second operand.


    The code in Listing [6-38](#463938_3_En_6_Chapter.xhtml#PC52) can be written as
    `b1 <<= 3`, using the composed operator, without the need to declare another variable.
    The result is `12 * 2^3`. The bits are shifted as displayed in Figure [6-7](#463938_3_En_6_Chapter.xhtml#Fig7).


    ![](images/463938_3_En_6_Chapter/463938_3_En_6_Fig7_HTML.jpg)


    Figure 6-7


    The effect of the `<<` operator


    **Warning**


    Shifting operators promote `byte` values to `int`, to avoid loss of precision.
    In Listing [6-38](#463938_3_En_6_Chapter.xhtml#PC52), the number of bits to shift
    was small enough to result in a value inside the `byte` type interval. That is
    why explicit conversion to `byte` works and the result is still valid. This is
    not always possible, as you will see further in this section.


    ### The `>>` Shift Right Operator


    As its name indicates, given a number represented in binary, this operator is
    used to shift bits to the right. The code in Listing [6-39](#463938_3_En_6_Chapter.xhtml#PC53)
    shows the `>>` shift right operator in action.


    ```

    package com.apress.bgn.six;

    // imports omitted

    public class ShiftDemo {

    void main(){

    byte b1 = 96;

    print8Bits(b1);

    byte b2 = (byte) (b1 >> 3);

    print8Bits(b2);

    }

    // print8Bits method omitted

    }

    // output

    /*

    decimal:96

    binary:01100000

    decimal:12

    binary:00001100

    */

    Listing 6-39

    Testing the >> Operator

    ```


    When bits are shifted to the right, the remaining positions are filled with 0
    if the number is positive. If the number is negative, the remaining positions
    are replaced with 1. This is done to preserve the sign of the number. Also, the
    number becomes smaller, and the new value is its old value divided by `2^N`, where
    `N` is the second operand.


    The code in Listing [6-39](#463938_3_En_6_Chapter.xhtml#PC53) can be written as
    `b1 >>= 3`, using the composed operator, without the need to declare another variable.
    So, the result is `12 * 2^3`. The bits are shifted as displayed in Figure [6-8](#463938_3_En_6_Chapter.xhtml#Fig8).


    ![](images/463938_3_En_6_Chapter/463938_3_En_6_Fig8_HTML.jpg)


    Figure 6-8


    The effect of the `>>` operator


    Figure [6-8](#463938_3_En_6_Chapter.xhtml#Fig8) and Listing [6-39](#463938_3_En_6_Chapter.xhtml#PC53)
    both show the shift right operator applied to a positive number. When it comes
    to negative numbers, things get complicated, because negative numbers are represented
    internally as 2’s complement. This means that, to get the representation of a
    negative number, we get the representation of the positive number, flip the bits,
    and then add 1. Figure [6-9](#463938_3_En_6_Chapter.xhtml#Fig9), depicts the process
    of obtaining the internal representation of `-7`, starting from the representation
    of `7`.


    ![](images/463938_3_En_6_Chapter/463938_3_En_6_Fig9_HTML.jpg)


    Figure 6-9


    Representing negative numbers internally in 2’s complement


    The `-7` value in 2’s complement representation is out of the `byte` range, so
    internally negative numbers are represented as integers. This means that the `print8Bits(..)`
    method needs to be replaced with a version that prints all 32 bits of an `int`
    value. Listing [6-40](#463938_3_En_6_Chapter.xhtml#PC54) shows the `>>` unsigned
    shift right operator applied to a negative number.


    ```

    package com.apress.bgn.six;

    // imports omitted

    public class ShiftDemo {

    void main(){

    out.println( " -- ");

    int i1 = -96;

    print32Bits(i1);

    int i2 =  i1 >> 3;

    print32Bits(i2);

    }

    public static void print32Bits(int arg) {

    out.println("decimal:" + arg);

    String str = arg > 0 ?

    String.format("%32s", Integer.toBinaryString(arg)).replace('' '', ''0'') :

    String.format("%32s", Integer.toBinaryString(arg)).replace('' '', ''1'') ;

    out.println("binary: " + str);

    }

    }

    // output

    /*

    decimal:-96

    binary:11111111111111111111111110100000

    decimal:-12

    binary:11111111111111111111111111110100

    */

    Listing 6-40

    Testing the >> Operator with Negative Numbers

    ```


    An advantage of 2’s complement representation is that arithmetic operations are
    identical for signed and unsigned operators, which means half the circuitry is
    required in the CPU’s arithmetic logic unit.


    **Information**


    A peculiar thing about 2’s complement representation is that `Integer.MAX_VALUE`
    and `Integer.MIN_VALUE` are represented in the same way, because when an integer
    addition overflows, then the result is the low-order bits of the mathematical
    sum as represented in some sufficiently large 2’s-complement format.


    ### The `>>>` Unsigned Shift Right Operator


    The `>>>` unsigned shift right operator is also called *logical shift*. Given
    a number represented in binary, this operator is used to shift bits to the right,
    and the remaining positions are replaced with 0, regardless of whether the value
    is positive or negative. This is why the result will always be a positive number.


    Listing [6-41](#463938_3_En_6_Chapter.xhtml#PC55) shows the `>>>` operator in
    action on a negative value.


    ```

    package com.apress.bgn.six;

    // imports omitted

    public class ShiftDemo {

    void main(){

    System.out.println( " -- ");

    int i1 = -16;

    print32Bits(i1);

    int i2 = i1 >>> 1;

    print32Bits(i2);

    }

    // print32Bits method omitted

    }

    // output

    /*

    decimal:-16

    binary:11111111111111111111111111110000

    decimal:2147483640

    binary:01111111111111111111111111111000

    */

    Listing 6-41

    Testing the >>> Operator with Negative Values

    ```


    The code in Listing [6-41](#463938_3_En_6_Chapter.xhtml#PC55) can be written as
    `i1 >>>= 1`, using the composed operator, without the need to declare another
    variable. The result is a very big positive number. The bits are shifted as displayed
    in Figure [6-10](#463938_3_En_6_Chapter.xhtml#Fig10).


    ![](images/463938_3_En_6_Chapter/463938_3_En_6_Fig10_HTML.jpg)


    Figure 6-10


    The effect of the `>>>` operator on a negative value


    As with all bitwise operators, shift operators promote `char`, `byte`, or `short`
    type variables to `int`, which is why an explicit conversion is necessary. As
    you have probably noticed, shifting bits on negative numbers is tricky, because
    it is quite easy for the resulting number to be outside the interval of allowed
    values for a type, and an explicit conversion can lead to loss of precision or
    even serious anomalies. So why use them? Because they are fast. Just make sure
    to test intensively when using shift operators.'
