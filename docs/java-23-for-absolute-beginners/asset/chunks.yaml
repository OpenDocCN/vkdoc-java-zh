  trans: "\n### XML 序列化\n\n然而，Java 序列化并不一定会产生难以理解的二进制文件。对象可以被序列化为可读的格式。最常用的序列化格式之一是\
    \ XML，JDK 提供了将对象转换为 XML 以及从 XML 还原为原始对象的类。\n\n**用于 XML 绑定的 Java 架构 (JAXB)** 曾提供一种快速便捷的方式来绑定\
    \ XML 模式和 Java 表示，使 Java 开发者能够轻松地将 XML 数据和数据处理功能整合到 Java 应用程序中。将对象序列化为 XML 的操作称为**编组\
    \ (marshalling)**。将对象从 XML 反序列化的操作称为**解组 (unmarshalling)**。\n\n从 JDK 11 开始，JAXB\
    \ 被从 JDK 中移除，其继任者 JAXB2 并未获得预期的关注。这并不令人意外，因为多年来，Jackson 库集合已成为大多数项目进行 XML、JSON\
    \ 以及（最近）YAML 序列化和反序列化的默认首选。Jackson 在 Java 生态系统中作为终极的 *Java JSON 库* 而闻名已久，但它也拥有支持序列化为其他多种格式的模块，其中包括\
    \ XML、CSV、YAML 和 TAML。只需查看其项目页面 ([`https://github.com/FasterXML/jackson`](https://github.com/FasterXML/jackson))；很可能每当出现一种新的流行序列化格式时，就已经有相应的模块了。\n\
    \n使用 Jackson 序列化为 XML 时，需要记住以下几点：\n\n*   需要使用一组不同的注解，其中最重要的列举如下：\n    *   `@JacksonXmlRootElement(localName\
    \ = \"...\")` 是一个顶层注解，放置在类级别，用于告知 Jackson 该类名在序列化时将成为一个 XML 元素；如果需要为 XML 元素指定不同的名称，可以通过\
    \ `localName` 属性进行设置。\n\n*   `@JacksonXmlProperty(localName = \"...\")` 是一个方法或字段级别的注解，用于告知\
    \ Jackson 该字段或方法名在序列化时将成为一个 XML 元素；如果需要为 XML 元素指定不同的名称，可以通过 `localName` 属性进行设置。\n\
    \n*   `@JacksonXmlProperty(localName = \"...\", isAttribute = true)` 配合 `isAttribute\
    \ = true` 参数使用，用于将该属性配置为 XML 属性。\n\n*   要使用 Jackson 进行序列化和反序列化，需要使用 `com.fasterxml.jackson.dataformat.xml.XmlMapper`\
    \ 的实例。\n\n*   `XmlMapper` 实例需要配置以支持特殊类型，例如新的 Java 8 日期 API 类型，这可以通过注册和配置 `com.fasterxml.jackson.datatype.jsr310.JavaTimeModule`\
    \ 来完成。\n\n*   使用 Java 模块时，必须确保它们配置正确。异常信息可能不易阅读，解决这些问题可能需要结合 Apache Maven 和模块配置。\n\
    \n话虽如此，让我们从模块配置开始，如清单 11-36 所示。\n\n```\nmodule chapter.eleven.serialization {\n\
    requires org.slf4j;\nrequires com.fasterxml.jackson.databind;\nrequires com.fasterxml.jackson.dataformat.xml;\n\
    requires com.fasterxml.jackson.datatype.jsr310;\nopens com.apress.bgn.eleven.xml\
    \ to com.fasterxml.jackson.databind;\n}\n清单 11-36\n使用 Jackson 进行 XML 序列化的模块配置\n\
    ```\n\n前两个 `requires com.fasterxml.jackson.*` 指令是必需的，以便能够使用 Jackson 注解和 `XmlMapper`。`jsr310`\
    \ 是序列化 Java 8 日期 API 类型所必需的。\n\n最后一条语句 `opens com.apress.bgn.eleven.xml to com.fasterxml.jackson.databind`\
    \ 是必需的，以便 Jackson 能够访问 `com.apress.bgn.eleven.xml` 包中的类，因为使用 Jackson 注解编写的 `Singer`\
    \ 类版本就位于此处。该类如清单 11-37 所示。\n\n```\npackage com.apress.bgn.eleven.xml;\n// 其他导入已省略\n\
    import com.fasterxml.jackson.dataformat.xml.annotation.JacksonXmlProperty;\nimport\
    \ com.fasterxml.jackson.dataformat.xml.annotation.JacksonXmlRootElement;\n@JacksonXmlRootElement(localName\
    \ = \"singer\")\npublic class Singer implements Serializable {\nprivate static\
    \ final long serialVersionUID = 42L;\nprivate String name;\nprivate Double rating;\n\
    private LocalDate birthDate;\npublic Singer() {\n/* 反序列化所需 */\n}\npublic Singer(String\
    \ name, Double rating, LocalDate birthDate) {\nthis.name = name;\nthis.rating\
    \ = rating;\nthis.birthDate = birthDate;\n}\n@JacksonXmlProperty(localName = \"\
    name\", isAttribute = true)\npublic String getName() {\nreturn name;\n}\n@JacksonXmlProperty(localName\
    \ = \"rating\", isAttribute = true)\npublic Double getRating() {\nreturn rating;\n\
    }\n@JacksonXmlProperty(localName = \"birthdate\")\npublic LocalDate getBirthDate()\
    \ {\nreturn birthDate;\n}\n// 其他代码已省略\n}\n清单 11-37\n带有 Jackson XML 注解的 Singer\
    \ 类\n```\n\n请注意注解放置的位置。根据清单 11-37 中注解的放置位置及其配置，当 `john` 对象被序列化时，`john.xml` 文件应包含清单\
    \ 11-38 所示的片段。\n\n```\n1977-10-16\n\n清单 11-38\nXML 格式的 john Singer 实例\n```\n\n\
    它比二进制版本更易读，对吧？清单 11-39 展示了将 `Singer` 实例保存到 `john.xml` 文件，然后将其加载回一个副本并与原始实例进行比较的代码。\n\
    \n```\npackage com.apress.bgn.eleven.xml;\nimport com.fasterxml.jackson.databind.SerializationFeature;\n\
    import com.fasterxml.jackson.dataformat.xml.XmlMapper;\nimport com.fasterxml.jackson.datatype.jsr310.JavaTimeModule;\n\
    // 其他导入语句已省略\npublic class XMLSerializationDemo {\nprivate static final Logger\
    \ LOGGER = LoggerFactory.getLogger(XMLSerializationDemo.class);\nvoid main(){\n\
    var johnBd = LocalDate.of(1977, Month.OCTOBER, 16);\nvar john = new Singer(\"\
    John Mayer\", 5.0, johnBd);\nvar xmlMapper = new XmlMapper();\nxmlMapper.registerModule(new\
    \ JavaTimeModule());\nxmlMapper.enable(SerializationFeature.INDENT_OUTPUT);\n\
    xmlMapper.configure(SerializationFeature.WRITE_DATES_AS_TIMESTAMPS, false);\n\
    var path = Path.of(\"chapter11/serialization/src/test/resources/output/john.xml\"\
    );\ntry {\nvar xml = xmlMapper.writeValueAsString(john);\nFiles.writeString(path,\
    \ xml, StandardCharsets.UTF_8);\n} catch (Exception e) {\nLOGGER.info(\"序列化为 XML\
    \ 失败！\", e);\n}\ntry {\nvar copyOfJohn = xmlMapper.readValue(path.toFile(), Singer.class);\n\
    LOGGER.info(\"对象是否相等？{}\", copyOfJohn.equals(john));\nLOGGER.info(\"--> {}\",\
    \ copyOfJohn);\n} catch (IOException e) {\nLOGGER.info(\"XML 反序列化失败！\", e);\n\
    }\n}\n}\n清单 11-39\n使用 Jackson 的 XmlMapper 序列化和反序列化 Singer 类\n```\n\n`XmlMapper`\
    \ 实例可用于序列化项目中任何包含 Jackson 注解的类。清单 11-39 中的示例还配置为支持 Java 8 日期 API 类型的默认序列化，并通过以下两行代码保持类型可读，而不将其转换为数字时间戳：\n\
    \n```\nxmlMapper.registerModule(new JavaTimeModule());\nxmlMapper.configure(SerializationFeature.WRITE_DATES_AS_TIMESTAMPS,\
    \ false);\n```\n\n由于选择的格式是 XML，如果所有内容都写在一行中会显得非常难看，因此通过以下语句支持缩进格式：\n\n```\nxmlMapper.enable(SerializationFeature.INDENT_OUTPUT)\n\
    ```\n\n信息\n"
