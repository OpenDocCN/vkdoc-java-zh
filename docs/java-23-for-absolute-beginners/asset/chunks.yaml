    ## Building Applications Using Swing


    Swing is a graphical user interface (GUI) widget toolkit for Java. It has been
    part of the JDK since version 1.2 and was developed to provide more pleasant-looking
    and practical components for building user applications with complex interfaces.
    Swing offers all types of buttons, progress bars, selectable lists, and so on.
    Swing is based on an early version of the **Abstract Window Toolkit (AWT)**, which
    is the original Java GUI widget toolkit. AWT is pretty basic and has a set of
    GUI components that are available on any platform. This means that AWT is portable,
    but this does not imply that AWT code written on one platform will actually work
    on another, because of the platform-specific limitations. AWT components depend
    on the native OS equivalent components, which is why they are called *heavyweight*
    components. In Figure [10-3](#463938_3_En_10_Chapter.xhtml#Fig3) you can see a
    simple Java AWT application.


    ![](images/463938_3_En_10_Chapter/463938_3_En_10_Fig3_HTML.jpg)


    Figure 10-3


    Simple Java AWT application


    The application is a simple window that contains a list, a text area, and a button.
    The theme, also called *look and feel*, of the application is the same as that
    of the operating system it was built on—macOS in the examples in this chapter.
    The theme cannot be changed because AWT taps into the OS native GUI. If you run
    the same code on a Windows machine, the window will look different because it
    will use the Windows theme.


    Swing components are built in Java and follow the AWT model, but they provide
    a pluggable look and feel. Swing is implemented entirely in Java and includes
    all features of AWT, but they are no longer dependent on the native GUI; this
    is why they are called *lightweight* components. Swing provides everything AWT
    does and also extends the set of components with higher-level ones such as tree
    views, list boxes, and tabbed panes. The look-and-feel and the theme are both
    pluggable and can be easily changed. This obviously means that Swing applications
    are more portable than AWS applications, and also means that writing applications
    with a more-complex design and components that are not platform-specific is possible.
    From the time Swing was introduced as an alternative to AWT, a lot more development
    has been done on it.


    When web applications took flight, their UI was pretty basic, because browsers
    had quite limited capabilities. AWT was introduced to build Java web applications,
    called **applets**, that looked better, and they were also dynamic. Java applets
    were small applications that were launched from the browser and then executed
    within the JVM installed on the user’s operating system in a process separate
    from the browser itself. That is why an applet can be run in a frame of the web
    page, in a new application window, or in stand-alone tools designed for testing
    applets. Java applets used the GUI from the operating system, which made them
    prettier than the bulky initial look of HTML at the time. Java applets are now
    deprecated and were removed in Java 11.


    As for Java desktop applications written in Swing or AWT, they are rarely used
    anymore; you might learn how to build one in a programming class, but otherwise
    they are quite…antique. Nevertheless, some institutions and companies still use
    legacy applications that are built with Swing. For example, I have seen Swing
    applications used by restaurants to manage tables and orders, and I think most
    supermarkets use Swing applications to manage shopping items. This section exists
    in this book not only because you might end up working on maintaining such applications,
    in which case it is good to know the basics, but also because Swing is still a
    part of the JDK. All Swing components (AWT too) are part of the `java.desktop`
    module. So if you want to use Swing components, you have to declare a dependence
    on this module. Listing [10-7](#463938_3_En_10_Chapter.xhtml#PC10) shows a configuration
    snippet in which the module of our project that uses Swing declares its dependency
    on the `java.desktop` module by using the `requires` directive in its `module-info.java`
    file.


    ```

    module chapter.ten.swing {

    requires java.desktop;

    }

    Listing 10-7

    Module Configuration for the using-swing Project

    ```


    The application depicted in Figure [10-3](#463938_3_En_10_Chapter.xhtml#Fig3)
    was built using AWT. This section will cover building something similar in Swing
    and adding more components to it. The main class of any Swing application is named
    `JFrame`, and instances of this type are used to create windows with borders and
    a title. The code in Listing [10-8](#463938_3_En_10_Chapter.xhtml#PC11) does just
    that.


    ```

    package com.apress.bgn.ten;

    import javax.swing.*;

    import java.awt.*;

    public class BasicSwingDemo extends JFrame {

    public static void main(String... args) {

    BasicSwingDemo swingDemo = new BasicSwingDemo();

    swingDemo.setTitle("Swing Demo Window");

    swingDemo.setSize(new Dimension(500,500));

    swingDemo.setVisible(true);

    }

    }

    Listing 10-8

    Basic Swing Demo Class

    ```


    The code in Listing [10-8](#463938_3_En_10_Chapter.xhtml#PC11) creates an instance
    of `javax.swing.JFrame`, sets a title for it, and sets a size so that when the
    window is created we can actually see something. To actually display the window,
    `setVisible(true)` must be called on the `JFrame` instance. Running the previous
    code displays a window like the one shown in Figure [10-4](#463938_3_En_10_Chapter.xhtml#Fig4).


    ![](images/463938_3_En_10_Chapter/463938_3_En_10_Fig4_HTML.jpg)


    Figure 10-4


    Simple Java Swing application


    By default, the window is positioned in the upper left corner of your main monitor,
    but you can change that by using some Swing components to compute a position relative
    to the screen size. Determining the size and position of a Swing window relative
    to screen size is limited only by the amount of math you are willing to get into.


    At this moment, if we close the displayed window, the application keeps running.
    By default, closing the window just makes it invisible by calling `setVisible(false)`.
    If we want to change the default behavior to exiting the application, we have
    to change the default operation that is done when closing. This can be easily
    done by adding the following line of code after creating the `JFrame` instance:


    ```

    swingDemo.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);

    ```


    The `JFrame.EXIT_ON_CLOSE` constant is part of a set of constants that define
    application behavior when the window is closed. `JFrame.EXIT_ON_CLOSE` is used
    to declare that the application should exit when the window is closed. The other
    related options are


    *   `DO_NOTHING_ON_CLOSE`: Does nothing, including closing the window.


    *   `HIDE_ON_CLOSE`: The default option that causes `setVisible(false)` to be
    called.


    *   `DISPOSE_ON_CLOSE`: An application can have more than one window; this option
    is used to exit the application when the last displayable window is closed.'
