    除了此标签之外，`@Deprecated` 注解是在 Java 1.5 中引入的。用此注解标注组件应阻止开发者使用它。此注解的优势在于，编译器会识别它，并在非废弃代码中使用或重写废弃组件时发出警告。此注解可用于任何
