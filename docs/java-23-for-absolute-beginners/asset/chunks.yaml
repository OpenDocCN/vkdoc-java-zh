    ### Java 关键字


    如本章开头所述，Java 有一系列关键字，它们只能用于语言中固定且预定义的目的。Java 中有两种类型的关键字：**保留关键字**和**上下文关键字**。保留关键字（共
    51 个）不能用作标识符：你不能将它们用作变量、类、接口、枚举或方法的名称。上下文关键字（共 17 个）可以用作标识符，除非上下文与其预期用途相关，在这种情况下它们不能被使用，因为那会让编译器感到困惑。


    你可以在表 4-2 和 4-3 中找到保留关键字。^(⁴⁵)


    表 4-3


    Java 保留关键字（第二部分）


    | 关键字 | 描述 |

    | --- | --- |

    | `do``for``while` | 用于创建循环的关键字：`do{..}``while(condition)``while(condition){..}``for(initialization;condition;incrementation){..}`
    |

    | `goto` | 另一个从 `C` 语言借用的关键字，但目前未在 Java 中使用，因为它可以被带标签的 `break` 和 `continue` 语句替代。
    |

    | `if``else` | 用于创建条件语句：`if(condition) {..}``else {..}``else if (condition ) {..}`
    |

    | `import` | 用于使类和接口在当前源代码中可用。 |

    | `instanceof` | 用于在条件表达式中测试实例类型。 |

    | `native` | 用于指示方法是通过 JNI（Java 本地接口）以本地代码实现的。 |

    | `new` | 用于创建 Java 实例。 |

    | `package` | 用于声明类、接口、枚举、注解或记录所属的包。它应该是 Java 语句的第一行。 |

    | `public private protected` | Java 项目（模板、字段或方法）的访问级别修饰符。 |

    | `return` | 在方法内部使用，用于返回到调用它的代码。该方法也可以向调用代码返回一个值。 |

    | `static` | 此修饰符可应用于变量、方法、块和嵌套类。它声明一个在声明它的类的所有实例之间共享的项目。 |

    | `stricfp` | 用于限制浮点计算以确保可移植性。在 Java 1.2 中引入。 |

    | `super` | 在类内部使用，用于访问超类的成员。 |

    | `this` | 用于访问当前对象的成员。 |

    | `synchronized` | 用于确保在任何给定时间只有一个线程执行某段代码。这用于避免称为竞态条件的问题。 |

    | `transient` | 用于标记不应被序列化的数据。 |

    | `volatile` | 用于确保对变量值所做的更改对所有访问它的线程都是可见的。 |

    | `void` | 在声明方法时用作返回类型，以指示该方法不返回值。 |

    | `_`（下划线） | 在 Java 9 之前可用作标识符。从 Java 9 到 Java 20 不能用作标识符。从 Java 21 开始，它可以用作未使用（未命名）变量的标识符。
    |


    表 4-2


    Java 保留关键字（第一部分）


    | 关键字 | 描述 |

    | --- | --- |

    | `abstract` | 用于将类或方法声明为抽象——即，任何继承或实现它的类必须提供具体的实现。 |

    | `assert` | 用于测试关于代码的假设。在 Java 1.4 中引入，除非程序使用 `-ea` 选项运行，否则 JVM 会忽略它。 |

    | `boolean byte``char``short``int``long``float double` | 原始类型名称。 |

    | `break` | 在循环内部使用的语句，用于立即终止循环。 |

    | `continue` | 在循环内部使用的语句，用于立即跳转到下一次迭代。 |

    | `switch` | 用于测试与一组称为 case 的值是否相等的语句。 |

    | `case` | 用于在 `switch` 语句中定义 case 值的语句。 |

    | `default` | 用于在 `switch` 语句中声明默认 case。从 Java 8 开始，它可用于在接口中声明默认方法。 |

    | `try``catch finally throw throws` | 异常处理中使用的关键字。 |

    | `class interface enum` | 用于声明类、接口和枚举的关键字。 |

    | `extends implements` | 用于继承类和实现接口的关键字。 |

    | `const` | 实际上未在 Java 中使用，是从 `C` 语言借用的关键字，在 C 中用于声明常量，即被赋予一个在程序执行期间不能改变的值的变量。
    |

    | `final` | Java 中 `const` 关键字的等价物。任何用此修饰符定义的内容在最终初始化后都不能更改。final 类不能被继承。final
    方法不能被重写。final 变量在整个程序执行期间保持初始化的值。任何修改 final 项目的代码都会导致编译器错误。 |


    你可以在表 4-4 中找到上下文关键字。


    表 4-4


    Java 上下文关键字


    | 关键字 | 描述 |

    | --- | --- |

    | `export``module``open``opens``provides``requires``to``transitive``uses``with`
    | 在 `module-info.java` 中用于配置 Java 模块。 |

    | `record` | 用于声明 Java 记录的关键字。它可以在 Java 类、接口或枚举的主体内部用作标识符。 |

    | `permits``sealed``non-sealed` | 用于声明密封类和接口的关键字。 |

    | `when` | 用于在 `switch` 块中声明守卫表达式的关键字。 |

    | `yield` | 用于在 `switch` 块中声明 `yield` 语句的关键字。 |

    | `var` | Java 10 中引入的关键字，用于在类型显而易见时替换变量方法（或 lambda 表达式）主体的声明类型。`var` 是一个保留类型名称。例如，`var`
    可以用作字段名或包名。 |


    以下几点值得注意：


    *   `true` 和 `false` 是布尔字面量，但它们不是保留关键字。例如，`true` 和 `false` 是有效的包名。


    *   `null` 也不是保留关键字。它是一个用于表示缺失对象的字面量。但它是一个有效的包名，例如。


    重要提示


    Java 语言规范（JLS）^(⁴⁶) 中详细介绍了 Java 语言的关键字和许多其他细节，因此如果你对 Java 代码的正确语法有任何疑问（或者只是好奇），可以浏览一下。在我学习
    Java 的早期，当互联网还比较小且帮助不大时，JLS 多次拯救了我。


    脚注 1   2   3   4   5   6   7   8

    '
- fmt: '# 5. Data Types


    Although we wrote a lot of code in the previous chapter, when designing classes,
    we used only the simplest data types, a few numeric ones and texts. In the JDK
    a lot of data types are declared for a multitude of purposes: for modeling calendar
    dates, for representing multiple types of numerics, and for manipulating texts,
    collections, data streams, files, database connections, and so on. Aside from
    the JDK, numerous libraries created by other parties are available that provide
    even more functionality. The data types provided by the JDK are fundamental types,
    the bricks every Java application is built from. Of course, depending on the type
    of application you are building, you might not need all of them. For example,
    I’ve never had the occasion to use the `java.util.logging.Logger` class. Most
    applications I have worked on were already set up by a different team when I came
    along, and they were using external libraries like `Log4j` or `Logback` or logging
    abstractions like SLF4J (covered in Chapter [9](#463938_3_En_9_Chapter.xhtml)).


    This chapter covers the basic Java data types that you will need to write about
    80% of any Java application. Without further ado, let’s begin.


    ## Stack and Heap Memory


    Java types can be split in two main categories: primitive types and reference
    types. Java code files and bytecode files are stored on the HDD. Java programs
    run on the JVM, which is launched as a process by executing the `java` executable.
    During execution, all data is stored in two different types of memory, stack and
    heap, which are allocated for a program’s execution by the operating system.


    The stack memory is used during execution (also referred to as *at runtime*) to
    store method primitive local variables and references to objects stored in the
    heap. A *stack* is also a data structure represented by a list of values that
    can be accessed only at one end, also called last-in, first-out (LIFO) order.
    The name fits, because every time a method gets called, a new block is created
    in the stack memory to hold local variables of the method: primitives and references
    to other objects in the method. When the call ends, the block is removed (popped
    out) and new blocks are created for methods being called after that.


    *Important*


    A stack data structure is very similar to a stack of plates; you can only add
    or remove extra plates on the top. The first element in a stack is called the
    *head*. Operations performed on a stack have specific names: adding an element
    to the stack is called a *push* operation, inspecting the first element in the
    stack is called a *peek* or *top*, and extracting the first element in the stack,
    its head, is called a *pop*. A stack gets emptied by calling *pop* repeatedly
    until its size is zero.


    Each JVM execution thread has its own stack memory, and its size can be specified
    using JVM parameter `-Xss` (or the equivalent and more explicit `-XX:ThreadStackSize`).
    If too many variables are allocated, or if the method being called is recursive
    and badly designed, the condition to return is never fulfilled and thus keeps
    invoking itself forever, and you will run into a `java.lang.StackOverflowError`.
    This means that there is no stack memory left, because every method call will
    cause a new block to be created on the stack. The size of the stack memory depends
    on the platform running the JVM: it is 1024KB for Unix-based systems (Linux and
    macOS), and for Windows, the size depends on the virtual memory. To check its
    size on your computer, just open a terminal or command prompt and run this command:
    `java -XX:+PrintFlagsFinal -version`. The command returns a list of JVM configurations
    referred to as *flags*. Some of them are used to configure the memory JVM is allowed
    to manage.


    Listing [5-1](#463938_3_En_5_Chapter.xhtml#PC1) shows the command being executed
    on my macOS computer. The `grep` command filters the output for the criteria provided
    as an argument, thus resulting in a cleaner and scoped output.


    ```

    > java -XX:+PrintFlagsFinal -version | grep ThreadStack

    #  Data Type  # Flag Name  #    = # Flag Value

    intx        ThreadStackSize   =    1024

    Listing 5-1

    Showing the Stack Size Default Values on macOS

    ```'
