    # 6. Operators


    The previous chapters have covered basic concepts of Java programming. You learned
    how to organize your code, how your files should be named, and which data types
    you can use, depending on the problem you are trying to solve. You also learned
    how to declare fields, variables, and methods and how they are stored in memory,
    to help you design your solutions so that the resource consumption will be optimal.


    In this chapter you will learn how to combine your declared variables by using
    operators. Most Java operators are the same operators that you know from math,
    but because programming involves other types than numeric, Java includes extra
    operators with specific purposes. Table [6-1](#463938_3_En_6_Chapter.xhtml#Tab1)
    lists all Java operators along with their category and their scope.


    Table 6-1


    Java Operators


    | Category | Operator | Scope |

    | --- | --- | --- |

    | casting | (type) | Explicit type conversion. |

    | unary, postfix | expr++, expr-- | Post increment/decrement. |

    | unary, prefix | ++expr, --expr | Pre increment/decrement. |

    | unary | +expr, -expr | Sign. |

    | unary, logical | `!` | Negation. |

    | unary, bitwise | `~` | Bitwise complement. Performs a bit-by-bit reversal of
    an integer value. |

    | multiplicative, binary | `*, /, %` | For numeric types: multiply, divide, divide
    and return remainder. |

    | additive, binary | `+, -` | For numeric types: addition, subtraction. + is used
    for `String` concatenation as well. |

    | bit shifting, binary | `>>, >>, >>>` | For numeric types: multiply and divide
    by a power of two, signed, and unsigned. |

    | conditional, relational | `instanceof` | Test whether the object is an instance
    of the specified type (class or subclass or interface). |

    | conditional, relational | `==, !=, <, >, <=, >=` | Equals, differs from, lesser
    than, greater than, less than or equals, greater than or equals. |

    | AND, binary | `&` | Bitwise logical AND. |

    | exclusive OR, binary | `^` | Bitwise logical XOR. |

    | inclusive OR, binary | `&#124;` | Bitwise logical OR. |

    | conditional, logical AND | `&&` | Logical AND. |

    | conditional, logical OR | `&#124;&#124;` | Logical OR. |

    | conditional, ternary | `? :` | Also called the *Elvis operator.* |

    | assignment | `=, +=, -=, *=, /= %=, &=, ^=, <<= >>=, >>>= , &#124;=` | Simple
    assignments, combined assignments. |


    Let’s start this chapter with the most common operator in programming: the assignment
    operator, `=`.'
