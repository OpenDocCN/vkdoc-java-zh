    来完成。此外，使用 `FileInputStream` 获取通道并不是正确的方法，因为它限制了从文件读取。但通道可以同时从文件读取和写入，因此推荐的方法是使用
    `java.io.RandomAccessFile` 实例作为文件处理器，如清单 11-30 所示。

