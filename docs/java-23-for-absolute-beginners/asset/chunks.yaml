    只要代码是开源的，并且模块导出了相应的包，你就可以在智能编辑器中查看项目任何依赖项（包括 JDK 类）的 Javadoc 信息。


    在 Java 9 中，用于生成 Javadoc 的 `Doclet API` 得到了升级和改造。在 Java 9 之前，开发者一直抱怨旧版本存在性能问题、API
    晦涩难懂、缺乏支持以及整体功能浅薄。在 Java 9 中，大部分问题都得到了解决。详细的改进描述和列表可以在 JEP 221 页面^([^(88)](#fn88))找到。改进工作持续进行，Java
    18 引入了 `@snippet` 注解，Java 23 则支持使用 Markdown^([^(89)](#fn89)) 编写 Javadoc 文档注释，取代了
    HTML 和 Javadoc `@` 标签的混合体^([^(90)](#fn90))。图 [9-23](#463938_3_En_9_Chapter.xhtml#Fig23)
