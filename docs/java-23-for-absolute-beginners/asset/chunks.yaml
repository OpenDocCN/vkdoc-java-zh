    \ `HelloWorld` 类\n\n现在我们有了 `main` 方法，就可以执行（或运行）代码了。IntelliJ IDEA 提供了两个选项：\n\n\
    *   从 **Run** 菜单中，选择 **Run [ClassName]** 选项（或按下选项右侧显示的组合键）。\n*   右键单击类主体，从出现的菜单中选择\
    \ **Run [ClassName].main()**。\n\n图 [3-21](#463938_3_En_3_Chapter.xhtml#Fig21)\
    \ 展示了可用于执行该类的两个菜单项以及执行结果。\n\n![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig21_HTML.jpg)\n\
    \n**图 3-21** 如何在 IntelliJ IDEA 中执行 Java 类\n\n这是 Java 项目最基本的结构。这个项目非常简单，也可以从命令行手动编译，让我们来试试吧！\n\
    \n### 从命令行编译和执行 HelloWorld! 项目\n\n你可能已经注意到 IntelliJ IDEA 中的 **Terminal** 按钮。点击该按钮，编辑器内会打开一个终端。在\
    \ Windows 上，它将是一个命令提示符实例；对于 Linux 和 macOS，它将是默认的 shell。IntelliJ 会将终端直接打开到你的项目根目录。接下来你需要执行以下操作：\n\
    \n*   通过执行命令 `cd src` 进入 `src` 目录。（`cd` 是 change directory 的缩写。）\n*   通过执行 `javac\
    \ HelloWorld.java` 编译 `HelloWorld.java` 文件。（`javac` 是一个用于编译 Java 文件的 JDK 可执行文件，IntelliJ\
    \ IDEA 在后台也会调用它。）\n*   通过执行 `java HelloWorld` 运行生成的 `HelloWorld.class` 文件中的字节码。\n\
    \n图 [3-22](#463938_3_En_3_Chapter.xhtml#Fig22) 展示了在 IntelliJ IDEA 的终端中执行这些命令的过程。\n\
    \n![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig22_HTML.jpg)\n\n**图 3-22**\
    \ 在 IntelliJ IDEA 内部的终端中手动编译和运行 `HelloWorld` 类\n\n看起来很简单，对吧？实际上就是这么简单，因为没有定义包或\
    \ Java 模块。*但是，等等，这可行吗？* 嗯，是的。如果你没有定义包，该类仍然属于一个未命名的默认包，JSE 平台默认提供该包，用于开发小型、临时性的教育应用程序，就像你现在正在构建的这个一样。\n\
    \n那么，让我们让项目稍微复杂一点，为我们的类添加一个命名包。"
  raw: 'On the **Modules** tab, you can see how many parts (modules) a project has
    and the settings for each part. The `sandbox` project has one part, one module
    also named `sandbox`, and the source for this module is contained in the `src`
    directory. So if we want to write a class that prints *Hello World!*, the file
    called `HelloWorld.java` has to be placed under it. If you right-click on the
    `src` directory, the menu depicted in Figure [3-18](#463938_3_En_3_Chapter.xhtml#Fig18)
    appears.


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig18_HTML.jpg)


    Figure 3-18


    IntelliJ IDEA context menu listing which Java objects can be created in the `src`
    directory


    Aside from the **Java Class** option, the red arrows point to the other components
    that can be in the `src` directory. Let’s go ahead and create our class. Click
    the **Java Class** menu option and in the dialog box that appears introduce the
    class name. Select **Class** from the list below the test field. Figure [3-19](#463938_3_En_3_Chapter.xhtml#Fig19)
    shows all the Java types that you can create.


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig19_HTML.jpg)


    Figure 3-19


    IntelliJ IDEA dialog window to create a Java type


    As mentioned early in this chapter, the core building block of a Java application
    is the `class` but other types also exist in Java. The list in Figure [3-19](#463938_3_En_3_Chapter.xhtml#Fig19)
    shows all five Java types. Each of them is explained in detail later in the book,
    so for now, notice that a file named `HelloWorld.java` was created under the `src`
    directory and the contents of that file are as simple as shown in Listing [3-16](#463938_3_En_3_Chapter.xhtml#PC16).


    ```

    public class HelloWorld {

    }

    Listing 3-16

    The HelloWorld.java Contents—the Body of an Empty Java Class

    ```


    You have just created your first Java class, in your first very simple Java project.
    It does nothing yet. The class is compiled by selecting the **Build Project**
    option from the IntelliJ IDEA **Build** menu, as shown in Figure [3-20](#463938_3_En_3_Chapter.xhtml#Fig20),
    or by pressing a combination of keys that differs for each operating system. Compiling
    the class produces the `HelloWorld.class` file, containing the bytecode. By default,
    IntelliJ IDEA stores compilation results into a directory named `out/production`.
    Figure [3-20](#463938_3_En_3_Chapter.xhtml#Fig20) also partially show the result
    of compiling your project.


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig20_HTML.jpg)


    Figure 3-20


    How to compile a Java project in IntelliJ IDEA


    It is time to make the class print *Hello World!*. For that we need to add a special
    method to the class. Any Java desktop application has a special method named `main`
    that has to be declared in a top-level class. This method is called by the JRE
    to run the Java program/application, and I call it the *entry point*. Without
    such a method, a Java project is just a collection of classes that is not runnable,
    cannot be executed, and cannot perform a certain function.


    Tip


    Imagine it like this: it’s like having a car, but you have no way of starting
    it, because the ignition lock cylinder is missing. For all intents and purposes,
    it is a car, but it cannot perform the main purpose of a car, which is to actually
    take you somewhere. You can imagine the `main` method as being the ignition lock
    cylinder, where the JRE will insert the key to get your application running. We’ll
    add that method to the `HelloWorld` class next.


    Because IntelliJ IDEA is an awesome editor, you can generate the `main` method
    by typing `psvm` and pressing the **Tab** key. The four letters represent the
    starting letter of all the components of the method declaration: **p**ublic, **s**tatic,
    **v**oid, and **m**ain.


    The `HelloWorld` class with a `main` method that prints the text *Hello World!*
    is depicted in Listing [3-17](#463938_3_En_3_Chapter.xhtml#PC17).


    ```

    public class HelloWorld {

    public static void main(String... args) {

    System.out.println("Hello World");

    }

    }

    Listing 3-17

    The HelloWorld Class with the main Method

    ```


    Now that we have a `main` method, we can execute (or run) the code. IntelliJ IDEA
    gives you two options:


    *   From the **Run** menu, choose the option **Run [ClassName]** (or press the
    key combination shown to the right of the option).


    *   Right-click the class body and select **Run [ClassName].main()** from the
    menu that appears.


    Figure [3-21](#463938_3_En_3_Chapter.xhtml#Fig21) depicts both menu items that
    you can use to execute the class, and the result of the execution.


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig21_HTML.jpg)


    Figure 3-21


    How to execute a Java class in IntelliJ IDEA


    This is the most basic structure for a Java project. This project is so simple
    that it can also be compiled manually from the command line, so let’s do that!


    ### The HelloWorld! Project Compiled and Executed from the Command Line


    You’ve probably noticed the **Terminal** button in your IntelliJ IDEA. If you
    click that button, inside the editor a terminal will open. On Windows, it will
    be a Command Prompt instance, and for Linux and macOS it will be the default shell.
    IntelliJ will open your terminal right into your project root. Here is what you
    have to do next:


    *   Enter the `src` directory by executing the following command: `cd src`. (`cd`
    is short for change directory.)


    *   Compile the `HelloWorld.java` file by executing `javac HelloWorld.java`. (`javac`
    is a JDK executable used to compile Java files, which IntelliJ IDEA calls in the
    background as well.)


    *   Run the resulting bytecode from the `HelloWorld.class` file by executing `java
    HelloWorld`.


    Figure [3-22](#463938_3_En_3_Chapter.xhtml#Fig22) depicts the execution of those
    commands in a terminal in IntelliJ IDEA.


    ![](images/463938_3_En_3_Chapter/463938_3_En_3_Fig22_HTML.jpg)


    Figure 3-22


    Manually compiling and running the `HelloWorld` class in a terminal inside IntelliJ
    IDEA


    Looks simple right? And it actually is that simple, because no packages or Java
    modules were defined. *But wait, is that possible?* Well, yes. If you did not
    define a package, the class is still part of an unnamed default package that is
    provided by default by the JSE platform for development of small, temporary, educational
    applications, like the one you are building now.


    So let’s make our project a little bit more complicated and add a named package
    for our class to be in.'
