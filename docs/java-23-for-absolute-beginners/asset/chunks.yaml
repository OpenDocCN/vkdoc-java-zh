    The output that is highlighted in Listing [10-3](#463938_3_En_10_Chapter.xhtml#PC4)
    represents the test case for the `next()` method. This method should be used to
    read a single `String` token. The next token gets converted to a `String` instance,
    and obviously the token ends when a whitespace is encountered. That is why in
    the example the only read text ends up being: `the`. In the last case in the example,
    the expected option is an integer value, but `AAAA` is entered, and that is why
    the exception is thrown.


    When you need to repeatedly read the same type of values from the console, you
    can peek at the value you want to read and check it before reading it to avoid
    the `InputMismatchException` being thrown. For this particular scenario, each
    of the `next*()` methods has a pair of methods named `hasNext*()`. To show an
    example how these methods can be used, let’s add an option to the code in Listing
    [10-3](#463938_3_En_10_Chapter.xhtml#PC4) to be able to read a list of `Long`
    values, as depicted in Listing [10-4](#463938_3_En_10_Chapter.xhtml#PC5).


    ```

    //...

    public static final String LONGS = "longs";

    //...

    String input;

    do {

    System.out.print("Enter option: ");

    input = sc.nextLine();

    switch (input) {

    case LONGS:

    List longList = new ArrayList();

    while (sc.hasNextLong()) {

    longList.add(sc.nextLong());

    }

    System.out.println("Nice long list there: " + longList);

    // else all done

    sc.nextLine();

    sc.nextLine();

    break;

    default:

    System.out.println("No idea what you want bruh!");

    }

    } while (!input.equalsIgnoreCase(EXIT));

    //...

    Listing 10-4

    Using java.util.Scanner to Read a List of long Values

    ```


    Although it seems weird, we need to call the `nextLine()` method twice in a row:
    once for the character that cannot be converted to `long`, so that the `while`
    loop ends, and once for the newline character, so that the next read is the type
    of the following read value.


    There are a few other methods in the `Scanner` class that can be used to filter
    the input and read only desired tokens, but the methods listed in this section
    are the ones you will use the most.


    ### Using `java.io.Console`


    The `java.io.Console` class was introduced in Java version 1.6, one version later
    than `Scanner`, and provides methods to access the character-based console device,
    if any, associated with the current Java Virtual Machine. Thus, the methods of
    class `java.io.Console` can also be used to write to the console, not only read
    user input. If the JVM is started from a background process or a Java editor,
    the console will not be available, as the editor redirects the standard input
    and output streams to its own window. That is why if we write code using `Console`,
    we can only test it by running the class or jar from a terminal, by calling


    ```

    java ReadingUsingConsoleDemo.class

    ```


    or


    ```

    java -jar using-console-1.0-SNAPSHOT.jar

    ```


    The console of a JVM, if available, is represented in the code by a single instance
    of class `Console` that can be obtained by calling `System.console()`. In Figure
    [10-2](#463938_3_En_10_Chapter.xhtml#Fig2) you can see the methods that can be
    called on the `Console` instance.


    ![](images/463938_3_En_10_Chapter/463938_3_En_10_Fig2_HTML.jpg)


    Figure 10-2


    Console methods for reading various types of data


    Obviously, the `read*(..)` methods are for reading user input from the console
    and `printf(..)` and `format(..)` are for printing text in the console. The special
    case here are the two `readPassword(..)` methods that allow for text to be read
    from the console, but not depicted while it is being written. This means that
    a Java application supporting authentication can be written without any actual
    user interface. Listing [10-5](#463938_3_En_10_Chapter.xhtml#PC8) depicts sample
    code to see all that in action.


    ```

    package com.apress.bgn.ten;

    import java.io.Console;

    import java.util.Calendar;

    import java.util.GregorianCalendar;

    import static java.lang.System.err;

    public class ReadingUsingConsoleDemo {

    public static void main(String[] args) {

    Console console = System.console();

    if (console == null) {

    err.println("No console found.");

    } else {

    console.writer().print("Hello there! (reply to salute)\n");

    console.flush();

    String hello = console.readLine();

    console.printf("You replied with: ''" + hello + "''\n");

    Calendar calendar = new GregorianCalendar();

    console.format("Today is : %1$tm %1$te,%1$tY\n", calendar);

    char[] passwordChar = console.readPassword("Please provide password: ");

    String password =  new String(passwordChar);

    console.printf("Your password starts with ''" + password.charAt(0) + "'' and ends
    with ''" + password.charAt(password.length()-1) + "''\n");

    }

    }

    }

    Listing 10-5

    Using java.io.Console to Read and Write Values

    ```


    In the code sample in Listing [10-5](#463938_3_En_10_Chapter.xhtml#PC8), I intentionally
    used various methods to read and write data using the console to show you how
    they should be used. The `console.writer()` method returns an instance of `java.io.PrintWriter`
    that can be used to print messages to the console. The catch is that the messages
    are not printed until `console.flush()` is called. This means that more messages
    can be queued up by the `java.io.PrintWriter` instance and printed only when `flush()`
    is called or when its internal buffer is full.


    The `console.format(..)` method is called to print a formatted message; in this
    case a `Calendar` instance is used to extract the current date and print it according
    to the following template: `dd mm,yyyy` (defined by the argument `%1$tm %1$te,%1$tY`).
    Templates accepted by the `Console` methods that use formatters are defined in
    class `java.util.Formatter`.


    **Important**


    To avoid creating new OS console windows when running code, most IDEs, including
    IntelliJ IDEA, use “windowless Java.” Since there is no window, there is no console
    for the user to access and insert data. So, applications using `java.io.Console`
    must be executed in the command line.'
