  Freemarker ([`https://freemarker.apache.org/`](https://freemarker.apache.org/))，或者完全放弃这些，直接编写返回
  JSON 的 RESTful 组件。


  为了使用 Mustache，我们需要注册一个新的 `ViewResolver`，并设置模板的位置以及扫描时使用的后缀。


  注意


  我们在这里显式地创建了一个 `ViewResolver`。Spring 本身已经有一个 Mustache 的 `ViewResolver`，作为 Spring
  Boot 的一部分，我们将在后续章节中使用它，但在本章中我们还不准备使用 Spring Boot。这个 `ViewResolver` 目前已经足够了。如果你查看
  Spring 自身提供的那个，会发现这个版本与其非常接近。


  要创建一个 `ViewResolver`，我们首先需要实现一个 `View`。




  ```

  package com.bsg6.chapter06;

  import com.samskivert.mustache.Mustache.Compiler;

  import com.samskivert.mustache.Template;

  import jakarta.servlet.http.HttpServletRequest;

  import jakarta.servlet.http.HttpServletResponse;

  import org.springframework.core.io.Resource;

  import org.springframework.web.servlet.view.AbstractTemplateView;

  import java.io.IOException;

  import java.io.InputStreamReader;

  import java.io.Reader;

  import java.util.Locale;

  import java.util.Map;

  public class MustacheView extends AbstractTemplateView {

  private Compiler compiler;

  private String charset;

  public void setCompiler(Compiler compiler) {

  this.compiler = compiler;

  }

  public void setCharset(String charset) {

  this.charset = charset;

  }

  @Override

  public boolean checkResource(Locale locale) throws Exception {

  var resource = getApplicationContext()

  .getResource(getUrl());

  return (resource != null && resource.exists());

  }

  @Override

  protected void renderMergedTemplateModel(

  Map model,

  HttpServletRequest request,

  HttpServletResponse response)

  throws Exception {

  var template = createTemplate(getApplicationContext()

  .getResource(getUrl()));

  if (template != null) {

  template.execute(model, response.getWriter());

  }

  }

  private Template createTemplate(Resource resource)

  throws IOException {

  try (Reader reader = getReader(resource)) {

  return this.compiler.compile(reader);

  }

  }

  private Reader getReader(Resource resource) throws IOException {

  if (this.charset != null) {

  return new InputStreamReader(

  resource.getInputStream(),

  this.charset);

  }

  return new InputStreamReader(

  resource.getInputStream()

  );

  }

  }

