  ### “Hello, World” Boot 机制总结\n\n我们已经了解了如何构建项目结构并为 Spring Boot 创建可运行类，以及如何创建可执行的\
  \ jar 文件；我们还了解了如何创建 REST 端点（使用我们在第 6 章讨论的概念）并附带一个可工作的测试，以及如何将静态资源嵌入到我们的应用程序中。现在，是时候回到我们的音乐推荐应用程序，并展示更多内容如何在一个（稍微）更贴近实际的应用中整合在一起了。\n\
  \n\n\n## Spring Boot 与数据库连接\n\n是时候为我们的音乐网关服务创建一个更好的版本了。在前面的章节中，我们一直复用第 3 章中仅使用内存的服务版本，这很方便，因为这些服务没有其他依赖项；它们既不使用数据库，也不使用任何可能需要配置的东西。为了演示一个功能更完整的配置，让我们创建一个由嵌入式数据库（此处为\
  \ H2）支持的 `MusicService`。\n\n我们仍在向你展示一些并非“最高效”的做法。这是因为本章的重点是 Spring Boot 及其**一些**特性，而不是\
  \ JDBC 或其他类似技术；我们有意不利用将在后续章节中介绍的一些内容。其中一些内容，比如 Spring Boot 本身，将使完成某些编程任务变得更加容易，且代码量更少。\n\
  \n首先，当然，我们需要确保 H2 对我们的项目可用。我们还需要确保 `spring-boot-starter-jdbc` 在我们的依赖项列表中，以便——剧透警告——让\
  \ Spring Boot 为我们的数据库添加连接池。^(⁹⁰)\n\n为什么选择 H2 而不是 HSQL 或 Derby？一方面，H2 可能是其中最流行的；H2\
  \ 和 HSQLDB 都是 HSQL 的活跃维护分支，但 H2 由 HSQL 的原作者维护。Derby 实际上出人意料地强大，几乎可以看作是 IBM DB2 的\
  \ Java 版本，并由 Apache 维护，但它对系统资源的消耗比 H2 或 HSQLDB 更大。\n\n```xml\n<?xml version=\"1.0\"\
  \ encoding=\"UTF-8\"?>\n<project xmlns=\"http://maven.apache.org/POM/4.0.0\"\n \
  \        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n         xsi:schemaLocation=\"\
  http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
  >\n    <modelVersion>4.0.0</modelVersion>\n\n    <groupId>com.apress</groupId>\n\
  \    <artifactId>bsg6</artifactId>\n    <version>1.0</version>\n\n    <parent>\n\
  \        <groupId>org.springframework.boot</groupId>\n        <artifactId>spring-boot-starter-parent</artifactId>\n\
  \        <version>${springBootVersion}</version>\n        <relativePath/>\n    </parent>\n\
  \n    <groupId>chapter07</groupId>\n    <artifactId>chapter07</artifactId>\n   \
  \ <version>1.0</version>\n    <packaging>war</packaging>\n\n    <dependencies>\n\
  \        <dependency>\n            <groupId>com.h2database</groupId>\n         \
  \   <artifactId>h2</artifactId>\n            <scope>runtime</scope>\n        </dependency>\n\
  \        <dependency>\n            <groupId>org.springframework.boot</groupId>\n\
  \            <artifactId>spring-boot-starter-web</artifactId>\n        </dependency>\n\
  \        <dependency>\n            <groupId>org.springframework.boot</groupId>\n\
  \            <artifactId>spring-boot-starter-jdbc</artifactId>\n        </dependency>\n\
  \        <dependency>\n            <groupId>org.springframework.boot</groupId>\n\
  \            <artifactId>spring-boot-starter-test</artifactId>\n            <scope>test</scope>\n\
  \        </dependency>\n    </dependencies>\n\n    <build>\n        <plugins>\n\
  \            <plugin>\n                <groupId>org.springframework.boot</groupId>\n\
  \                <artifactId>spring-boot-maven-plugin</artifactId>\n           \
  \     <version>${springBootVersion}</version>\n                <executions>\n  \
  \                  <execution>\n                        <goals>\n              \
  \              <goal>repackage</goal>\n                        </goals>\n      \
  \              </execution>\n                </executions>\n            </plugin>\n\
  \        </plugins>\n    </build>\n</project>\n清单 7-10\n包含 H2 的 chapter07/pom.xml\n\
  ```\n\n注意在 `build` 节点中使用了 Spring Boot Maven 插件。这使我们能够将 Spring Boot 应用打包成可执行形式，随时可以部署和运行，同时还能处理其他一些（相对次要的）事情。\n\
  \n这里巧妙之处在于，对于三种 Java 嵌入式数据库——H2、HSQLDB 和 Derby——Spring Boot 可以为我们**自动配置**数据库。我们只需包含依赖项，剩下的工作由\
  \ Boot 完成。这并不意味着我们**不想**配置数据库，但对于早期开发和测试来说，这相当方便，就像 Spring Boot 的许多特性一样。然而，出于最佳实践的考虑，我们将手动配置数据库连接。\n\
  \n### 使用 Spring Boot 初始化数据\n\nSpring Boot 还会在应用启动时为我们执行 SQL。它首先从类路径（例如，我们可以将这些文件放在源代码树的\
  \ `src/main/resources` 目录下）执行名为 `schema.sql` 和 `data.sql`（按此顺序）的文件中包含的 SQL 命令。它还会根据一个平台属性（我们稍后会展示）运行特定于数据库的脚本，这样我们就可以设置通用的模式，然后根据我们可能选择的任何数据库微调配置——如果我们碰巧使用了基于非\
  \ SQL 标准的特性的话。（换句话说，如果我们的模式需要特定数据库的特性，并使用该数据库的自定义 SQL，我们可以将自定义 SQL 放在一个以该数据库命名的文件中。）\n\
  \n请注意，我们的启动脚本是为测试需求设计的，而不是用于实际部署。我们强制重置数据以匹配测试要求，这是实际应用不会希望做的事情。\n\n我们现在已经提到了数据库连接池的自动配置和一个“平台”属性。这些来自类路径中一个简单的属性文件，名为\
  \ `application.properties`。在我们的例子中，我们希望设置一个简单的数据库连接，包含 JDBC URL、用户名、密码和数据库驱动程序名称。实际上，我们并不**需要**所有这些——甚至一个都不需要——但设置它们是一个好习惯，以便将来你想将它们更改为比嵌入式数据库更健壮的东西。^(⁹¹)\n\
  \n我们目前的 `application.properties` 文件。\n\n```\nspring.datasource.url=jdbc:h2:./chapter07;DB_CLOSE_ON_EXIT=FALSE\n\
  spring.datasource.username=sa\nspring.datasource.password=\nspring.datasource.driver-class-name=org.h2.Driver\n\
  spring.sql.init.platform=h2\n清单 7-11\nchapter07/src/main/resources/application.properties\n\
  ```\n\n这样，当应用运行时，我们会在用户的当前目录中创建一个数据库，数据库用户名为 `sa`，密码为空（这恰好与默认的 H2 用户配置文件匹配）；我们还显式地将驱动程序类名设置为\
  \ `org.h2.Driver`。最后，我们还将平台设置为 `h2`，这样 Spring Boot 将首先尝试运行 `schema.sql`，然后运行 `schema-h2.sql`，之后运行\
  \ `data.sql` 和 `data-h2.sql`。\n\n为什么要有特定于数据库的脚本？嗯，SQL 通常在所有数据库平台上都是相同的，但也不尽然。有些数据库会有非标准的数据类型或定义主键、表关系的方式；遗憾的是，尽管\
  \ SQL 如此常见且强大，但为了完成某些任务，通常需要特定于数据库的脚本——而定义模式正是最需要这样做的领域之一。\n\n如果你还记得我们在第 3 章中的数据模型，你会注意到我们有两个实体需要管理：`Artist`\
  \ 和 `Song`。这暗示我们应该有两个与这些实体名称对应的表，我们可以这样做，但我们不打算这么做。\n\n原因很简单：本章已经涵盖了很多内容，同时涵盖 `Artist`\
  \ 和 `Song` 服务会花费太多时间，而且增加的价值相对较少（一旦你理解了与 `Artist` 相关的服务是怎么回事，与 `Song` 相关的服务就不会有太大区别——但这会占用更多篇幅）。我们将在下一章中修改访问数据的方式，因此更有意义的是将重点放在第\
  \ 8 章中服务的完整功能集上，而不是在第 7 章中。我们将在此处包含数据描述——作为 SQL 注释——只是为了向你展示它们应该放在哪里，但随后我们将假装 `Song`\
  \ 不存在，直到我们进入第 8 章。\n\n```sql\nDROP INDEX IF EXISTS artist_name;\nDROP TABLE IF EXISTS\
  \ artists;\nCREATE TABLE IF NOT EXISTS ARTISTS\n(\n    id   BIGINT NOT NULL GENERATED\
  \ BY DEFAULT AS IDENTITY,\n    name VARCHAR(64) NOT NULL\n);\nCREATE UNIQUE INDEX\
  \ IF NOT EXISTS artist_name\n    ON ARTISTS(name);\n清单 7-12\nchapter07/src/main/resources/schema.sql\n\
  ```\n\n我们还希望应用启动时数据库中有数据。在测试中，我们可能会（经常）清除数据，以便知道给定测试时数据库的状态。这是我们的 `data.sql` 文件。（如果我们碰巧使用了此\
  \ SQL 无法正常工作的数据库，我们最好为该数据库创建一个特定于平台的文件。）\n\n```sql\nINSERT INTO ARTISTS (NAME)\n\
  VALUES ('Threadbare Loaf');\nINSERT INTO ARTISTS (NAME)\nVALUES ('Therapy Zeppelin');\n\
  INSERT INTO ARTISTS (NAME)\nVALUES ('Clancy In Silt');\n清单 7-13\nchapter07/src/main/resources/data.sql\n\
  ```\n\n\n\n### 构建 ArtistService\n\n现在我们需要开始填充服务层——这意味着，像往常一样，创建一组文件。我们需要一种表示艺术家的方式——因此，我们将创建一个类，`com.bsg5.chapter07.Artist`，这很合乎逻辑。我们还需要一个服务——实际上是一个\
  \ `Repository`，即负责与数据库交互的组件——我们将其命名为 `com.bsg6.chapter07.ArtistRepository`。最后，我们需要一个将服务连接到\
  \ Web 层的组件——即控制器——因此，很自然地，我们将创建一个 `com.bsg6.chapter07.ArtistController`。\n\n注意\n\
  \n如果你对第 3 章记忆犹新，你会记得我们当时使用了一个 `MusicService` 类来处理与数据模型相关的所有操作。而在这里，我们正如在第 3 章中所预告的那样，将功能拆分了出来。原因在于：便利性。我们在第\
  \ 3 章中选择构建内存服务，是因为将数据模型的控制点集中在一组数据结构中要简单得多。而在这里，我们有了一个真正的“记录系统”——数据库——将交互拆分成更小的模块是合理的，因为从数据管理的角度来看，我们无需担心艺术家与歌曲之间的相互干扰。\n\
  \n`Artist` 类是一个简单的 POJO，具备其应有的一切特征：一个无参构造函数（默认构造函数）、私有字段、一个用于初始化私有字段的构造函数、访问器和修改器^(⁹²)、`equals()`\
  \ 和 `hashCode()` 的实现，以及一个简单的 `toString()` 实现。一旦字段被添加到类中，几乎所有代码都由 IDE 生成；这个实现没有任何特殊或独特之处。（例外情况：`compareTo()`\
  \ 方法忽略了艺术家名称的大小写，`equals()` 方法也做了同样的修改。）与它所做的事情相比，这是一个很长的类——毕竟它只是一个用于存放艺术家引用的容器——但这正是\
  \ Java 的美妙（或“美妙”）之处。\n\n注意\n\n当然，我们还有其他选择。为了简单起见，我们为 `Artist` 选择了 POJO；例如，我们也可以使用\
  \ Java 的 `record` 类。\n\n```\npackage com.bsg6.chapter07;\nimport java.util.Objects;\n\
  import java.util.StringJoiner;\npublic class Artist implements Comparable {\nprivate\
  \ int id;\nprivate String name;\npublic Artist() {\n}\npublic Artist(int id, String\
  \ name) {\nthis.id = id;\nthis.name = name;\n}\npublic int getId() {\nreturn id;\n\
  }\npublic void setId(int id) {\nthis.id = id;\n}\npublic String getName() {\nreturn\
  \ name;\n}\npublic void setName(String name) {\nthis.name = name;\n}\n@Override\n\
  public String toString() {\nreturn new StringJoiner(\", \",\nArtist.class.getSimpleName()\
  \ + \"[\", \"]\")\n.add(\"id=\" + id)\n.add(\"name='\" + name + \"'\")\n.toString();\n\
  }\n@Override\npublic boolean equals(Object o) {\nif (this == o) return true;\nif\
  \ (!(o instanceof Artist)) return false;\nArtist artist = (Artist) o;\nreturn getId()\
  \ == artist.getId() &&\nObjects.equals(\ngetName().toLowerCase(),\nartist.getName().toLowerCase()\n\
  );\n}\n@Override\npublic int hashCode() {\nreturn Objects.hash(getId(), getName());\n\
  }\n@Override\npublic int compareTo(Artist o) {\nreturn o.getName().toLowerCase().compareTo(getName().toLowerCase());\n\
  }\n}\nListing 7-14\nchapter07/src/main/java/com/bsg6/chapter07/Artist.java\n```\n\
  \n`ArtistService` 需要更多解释。\n\n首先，请记住，我们正在尝试实现第 3 章中列出的与艺术家相关的以下服务：\n\n*   检索艺术家名称列表（用于自动补全操作）\n\
  \n这意味着我们在第 3 章中列出的其他四项服务是与歌曲相关的，尽管涉及艺术家，而事实也确实如此。\n\n问题是，其他服务也隐含了与艺术家相关的操作。请记住，在我们的完整需求集中，我们希望记录歌曲的存在，并为歌曲投票——这些确实是歌曲相关的服务，但歌曲也需要与艺术家关联。因此，我们应该在我们的需求列表中添加一些基础服务：\n\
  \n*   根据 id 获取艺术家。\n\n*   根据名称获取艺术家。\n\n*   保存艺术家。\n\n这些函数的结构看起来也有些奇怪。实际上，每个函数我们都需要两个版本：一个只接受函数所需的参数（例如，如果通过\
  \ `id` 获取 `Artist`，则只需一个 `id`），另一个则在这些参数的基础上增加一个 `Connection` 对象。我们这样做是因为我们希望能够组合方法，并且希望这种组合不需要每次调用都使用一个独立的数据库连接。例如，保存艺术家时可能首先需要根据名称查找艺术家；我们希望这两个操作使用同一个\
  \ `Connection`，因为这样我们就可以使用一个数据库事务而不是两个。（我们将在本章后面看到这一点。）\n\n警告\n\n与本章中的许多其他内容一样，我们……实际上并没有显式地使用数据库事务。我们将在第\
  \ 8 章中更深入地讨论事务隔离特性。不过，在本章中，维护事务状态会分散注意力。\n\n让我们看看 `ArtistService` 的前两个方法，`findArtistById()`。这些方法非常简单：检索一个主键与提供的参数匹配的\
  \ `Artist`。\n\n实际上，我们将拥有*两个*方法——一个接受 `Connection` 和 `id`，另一个只需要 `id`。这是有意为之的设计，以便我们可以通过\
  \ `Connection` 对象传播事务；方法的“简单”版本可以启动事务并控制回滚，而执行实际工作的方法可以*参与*事务，但不控制它。我们将在后续章节中看到更多这种模式，直到我们让\
  \ Spring 来为我们管理它。\n\n```\npublic Artist findArtistById(int id) throws SQLException\
  \ {\ntry (Connection conn = dataSource.getConnection()) {\nreturn findArtistById(conn,\
  \ id);\n}\n}\nprivate Artist findArtistById(Connection conn, int id) {\nString sql\
  \ = \"SELECT * FROM artists WHERE id=?\";\ntry (PreparedStatement ps = conn.prepareStatement(sql))\
  \ {\nps.setInt(1, id);\ntry (ResultSet rs = ps.executeQuery()) {\nif (rs.next())\
  \ {\nreturn new Artist(id, rs.getString(\"name\"));\n} else {\nthrow new ArtistNotFoundException(id\
  \ +\n\" not found in artist database\");\n}\n}\n} catch (SQLException e) {\nthrow\
  \ new ArtistNotFoundException(e);\n}\n}\nListing 7-15\nchapter07/src/main/java/com/bsg6/chapter07/services/ArtistService.java\
  \ excerpt\n```\n\n我们看到的是一个相当简单的机制：如果我们调用 `findArtistById(int)`，我们会使用 Java 的 try-with-resources\
  \ 分配一个 `Connection`（这意味着当退出 `try` 块时，`Connection` 会被正确关闭，而无需我们编写显式代码），然后在 `try`\
  \ 块内部，委托给同名的重载方法，并传入该 `Connection`。\n\n重载方法简单地创建一个 `PreparedStatement`，并用它来查询数据库中匹配的\
  \ `Artist`。如果找到，它会用查询到的数据构造一个 `Artist` 并返回。如果未找到，它会抛出一个自定义异常——`ArtistNotFoundException`。\n\
  \n\n\n### 在 Spring Boot 中处理异常\n\n我们创建自定义异常，是因为我们希望以不同的方式处理不同的路径。通用异常也能工作，但自定义异常允许我们为异常赋予语义含义，并精确地处理它。事实上，既然我们已经提到了异常，在查看\
  \ `ArtistService.java` 的其余部分之前，我们应该先快速了解一下它。\n\n```\npackage com.bsg6.chapter07;\n\
  import org.springframework.http.HttpStatus;\nimport org.springframework.web.bind.annotation.ResponseStatus;\n\
  @ResponseStatus(HttpStatus.NOT_FOUND)\npublic class ArtistNotFoundException extends\
  \ RuntimeException {\npublic ArtistNotFoundException(String message) {\nsuper(message);\n\
  }\npublic ArtistNotFoundException(Exception e) {\nsuper(e);\n}\n}\n清单 7-16\nchapter07/src/main/java/com/bsg6/chapter07/ArtistNotFoundException.java\n\
  ```\n\n这是一个非常普通的异常类，其中有一行我们真正需要关注：`@ResponseStatus(HttpStatus.NOT_FOUND)`。这告诉 Spring\
  \ 的 `@Controller`，此异常应映射到特定的 HTTP 状态码——在本例中，它是 404，对应“未找到”，正如其名称明确暗示的那样。如果我们没有设置显式的响应状态，这些异常将被视为服务错误，对应\
  \ HTTP 状态码 500。使用精确的 HTTP 错误码意味着，如果此异常从 `Controller` 返回，它应被视为“资源未找到”——从名称来看，这**正是**它所代表的含义。（这似乎显而易见，但如果我们不指出来，就有些失职了。）\n\
  \n同样值得指出的是，它继承自 `RuntimeException`。这在 Spring 的异常处理中很典型，因为这意味着我们不必在方法签名中指定抛出的异常，从而使代码更简洁。看待这种做法的方式有很多，但**大多数**语言都没有与\
  \ Java 显式错误机制类似的东西，即使在 Java 虚拟机上也是如此，而且大多数程序员似乎也乐于编写更简洁的代码。\n\n现在我们可以查看 `ArtistRepository`\
  \ 的其余部分了。一旦我们理解了所使用的方法重载，尽管类很长，但它实际上非常简单。另外值得注意的是：类上使用了 `@Repository` 注解，并且通过 `DataSource`\
  \ 进行构造。将其标记为 `@Repository` 描述了其特定的架构角色（它封装了与数据存储系统交互的行为），并使其能够参与转换某些异常类型（本章不介绍此功能）。\n\
  \n### `ArtistService` 及其小 `Controller` 的实际实现\n\n```\npackage com.bsg6.chapter07;\n\
  import org.springframework.stereotype.Repository;\nimport javax.sql.DataSource;\n\
  import java.sql.Connection;\nimport java.sql.PreparedStatement;\nimport java.sql.ResultSet;\n\
  import java.sql.Statement;\nimport java.sql.SQLException;\nimport java.util.ArrayList;\n\
  import java.util.List;\n@Repository\npublic class ArtistRepository {\nprivate DataSource\
  \ dataSource;\npublic ArtistRepository(DataSource dataSource) {\nthis.dataSource\
  \ = dataSource;\n}\npublic Artist findArtistById(int id) throws SQLException {\n\
  try (Connection conn = dataSource.getConnection()) {\nreturn findArtistById(conn,\
  \ id);\n}\n}\nprivate Artist findArtistById(Connection conn, int id) {\nString sql\
  \ = \"SELECT * FROM artists WHERE id=?\";\ntry (PreparedStatement ps = conn.prepareStatement(sql))\
  \ {\nps.setInt(1, id);\ntry (ResultSet rs = ps.executeQuery()) {\nif (rs.next())\
  \ {\nreturn new Artist(id, rs.getString(\"name\"));\n} else {\nthrow new ArtistNotFoundException(id\
  \ +\n\" not found in artist database\");\n}\n}\n} catch (SQLException e) {\nthrow\
  \ new ArtistNotFoundException(e);\n}\n}\npublic Artist saveArtist(String name) throws\
  \ SQLException {\ntry (Connection conn = dataSource.getConnection()) {\ntry {\n\
  return saveArtist(conn, name);\n} catch (SQLException e) {\ne.printStackTrace();\n\
  return findArtistByName(conn, name);\n}\n}\n}\nprivate Artist saveArtist(Connection\
  \ conn, String name)\nthrows SQLException {\nString sql = \"INSERT INTO ARTISTS\
  \ (NAME) VALUES (?)\";\ntry (PreparedStatement ps = conn.prepareStatement(sql, Statement.RETURN_GENERATED_KEYS))\
  \ {\nps.setString(1, name);\nps.executeUpdate();\ntry (ResultSet rs = ps.getGeneratedKeys())\
  \ {\nrs.next();\nint id = rs.getInt(1);\nreturn new Artist(id, name);\n}\n}\n}\n\
  public Artist findArtistByName(String name) throws SQLException {\ntry (Connection\
  \ conn = dataSource.getConnection()) {\nreturn findArtistByName(conn, name);\n}\n\
  }\nprivate Artist findArtistByName(\nConnection conn,\nString name\n) throws SQLException\
  \ {\nString sql = \"SELECT * FROM artists WHERE LOWER(name)=LOWER(?)\";\ntry (PreparedStatement\
  \ ps = conn.prepareStatement(sql)) {\nps.setString(1, name);\ntry (ResultSet rs\
  \ = ps.executeQuery()) {\nif (rs.next()) {\nreturn new Artist(\nrs.getInt(\"id\"\
  ),\nrs.getString(\"name\")\n);\n} else {\nthrow new ArtistNotFoundException(name\
  \ +\n\" not found in artist database\");\n}\n}\n}\n}\npublic List findAllArtistsByName(String\
  \ name)\nthrows SQLException {\ntry (Connection conn = dataSource.getConnection())\
  \ {\nreturn findAllArtistsByName(conn, name);\n}\n}\nprivate List findAllArtistsByName(\n\
  Connection conn,\nString name\n) throws SQLException {\nString sql = \"SELECT *\
  \ FROM artists WHERE LOWER(name) LIKE LOWER(?)\"\n+ \" ORDER BY name\";\nList artists\
  \ = new ArrayList();\ntry (PreparedStatement ps = conn.prepareStatement(sql)) {\n\
  ps.setString(1, name + \"%\");\ntry (ResultSet rs = ps.executeQuery()) {\nwhile\
  \ (rs.next()) {\nartists.add(new Artist(\nrs.getInt(\"id\"),\nrs.getString(\"name\"\
  )\n));\n}\n}\n}\nreturn artists;\n}\n}\n清单 7-17\nchapter07/src/main/java/com/bsg6/chapter07/ArtistRepository.java\n\
  ```\n\n在这个 `ArtistRepository` 的特定实现中，包括 SQL 本身，并没有什么特别之处。\n\n然而，`saveArtist` 方法需要一些解释——它实际上返回一个有效的\
  \ `Artist`。它通过首先尝试将 `Artist` 保存到数据库来实现这一点——但如果数据已经存在了呢？我们会得到一个异常（`SQLException`，表示违反了唯一键约束）。此方法如果捕获到该\
  \ `SQLException`，就会假设 `Artist` 已经在数据库中，然后查询该 `Artist` 数据并返回它——因此我们总能得到一个有效的“已保存”的\
  \ `Artist`，即使我们并没有在此特定调用中实际创建 `Artist` 数据。\n\n> 注意\n>\n> 为了简便起见，我们仍然（稍微）有点取巧；我们没有检查所涉及的\
  \ `SQLException` 是否由索引违规引起，而这是我们希望遵循此逻辑的唯一情况。\n\n\n\n\n该类在 `findAllArtistsByName`\
  \ 方法中使用通配符匹配进行搜索——传入 `foo` 时，它会通过参数值 `foo%` 搜索所有名称以 `foo` 开头的艺术家——并且使用 SQL 的 `LOWER()`\
  \ 函数来消除查询中的大小写敏感性。但除此之外（当然，还有 try-with-resources [[`https://docs.oracle.com/javase/tutorial/essential/exceptions/tryResourceClose.html`](https://docs.oracle.com/javase/tutorial/essential/exceptions/tryResourceClose.html)]），它与\
  \ JDBC 早期编写的代码并无二致。当然，从 Spring 的角度来看，这既低效又相当糟糕——Spring 拥有出色的数据访问机制，而我们在这里**完全**忽略了它们——但同样，这更多是下一章的主题。\n\
  \n为了实现服务功能，我们还需要查看一个类——`Controller` 本身，它主要将任务委托给 `ArtistRepository`。实际上它相当简短，谢天谢地，只暴露了四个端点。\n\
  \n```\npackage com.bsg6.chapter07;\nimport org.springframework.http.HttpStatus;\n\
