  我们的 `userDetailsService()` 方法执行的操作与之前示例中使用的 `userDetailsService` 覆盖类似。我们使用 `DelegatingPasswordEncoder`
  设置了两个用户，分别为 `USER` 角色使用凭据 `user:user123`，为同时具有 `USER` 和 `ADMIN` 权限的角色使用凭据 `admin:admin123`。


  我们的第二个方法是之前见过的 `filterChain` 方法，但在 `HttpSecurity` 上使用了一些新方法。由于这里使用了 REST，我们不需要使用
  `CSRF`——它用于防止使用 JavaScript 的跨站请求伪造。除了这些之外，我们正在使用 `USER` 角色保护所有端点，现在可以使用已经定义的更简单的凭据。当你添加了这个新类后，终止现有的
  `bootRun` 并使用 `mvn spring:bootRun` 重新运行它。我们可以复制上面清单 10-33 中现有的 curl 命令，并将凭据替换为 `user:user123`，应该会看到类似的结果。



