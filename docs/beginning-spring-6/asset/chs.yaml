  在编程术语中，信号量是用于控制对资源访问的对象。例如，您可以使用信号量来指示某个对象正被特定线程使用，因此其他线程应等待该对象“可用”后再访问它。Java 的标准库以各种形式内置了信号量，但此处仅出于示例目的使用了一种“手动信号量”。


