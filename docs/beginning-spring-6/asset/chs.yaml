  ```\n\n\n\n接下来，我们来看 `CapLeadingNormalizer`。`transform()` 方法会去除输入字符串两端的空白，然后按空白字符将字符串拆分为单词并创建一个\
  \ `Stream`。接着，它会过滤掉空白标记，然后（通过 `map()`）将每个单词的首字母大写，其余字母小写。最后，它将结果合并为一个 `String` 作为输出。这看起来（听起来）比实际复杂。\n\
  \n```\npackage com.bsg6.chapter03.mem03;\nimport com.bsg6.chapter03.Normalizer;\n\
  import org.springframework.stereotype.Component;\nimport java.util.StringJoiner;\n\
  import java.util.stream.Stream;\n@Component(\"bar\")\npublic class CapLeadingNormalizer\
  \ implements Normalizer {\n@Override\npublic String transform(String input) {\n\
  StringJoiner joiner = new StringJoiner(\" \");\nStream\n.of(input.trim().split(\"\
  \\\\s\"))\n.filter(s -> !s.isBlank())\n.map(s ->\nCharacter.toUpperCase(s.charAt(0))\
  \ +\ns.substring(1).toLowerCase()\n)\n.forEach(joiner::add);\nreturn joiner.toString();\n\
  }\n}\n代码清单 3-20\nchapter03/src/main/java/com/bsg6/chapter03/mem03/CapLeadingNormalizer.java\n\
  ```\n\n当然，现在我们不禁要问：这段代码能工作吗？最简单的回答是“当然能”，但如果你和我最喜欢的一位作者一样来自密苏里州，那这个答案恐怕行不通。我们最好照顾一下来自密苏里州的读者，通过一个测试来证明这个类确实能完成预期功能。^(⁵⁵)\
