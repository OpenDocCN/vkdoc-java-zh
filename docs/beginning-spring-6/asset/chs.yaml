  ## 使用 JSR-250 注解的生命周期


  注解提供了 XML 配置所提供的大部分（但并非**全部**）功能。主要区别在于构造过程；大多数其他生命周期功能要么是相同的（使用 `InitializingBean`
  和 `DisposableBean` 接口），要么有直接的对应项（例如，使用包含 `init-method` 方法名的注解）。让我们逐一介绍这些功能，从组件作用域开始。


