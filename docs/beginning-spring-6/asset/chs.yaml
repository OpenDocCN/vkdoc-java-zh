  \n\n\n### 使用注解进行构造器注入\n\n还有一种主要的 Bean 注入方式我们尚未涉及：构造器注入。如果你曾在 IDEA ([`https://jetbrains.com/idea`](https://jetbrains.com/idea))\
  \ 或 Eclipse ([`https://eclipse.org`](https://eclipse.org)) 这类 IDE 中查看过我们的示例代码，你可能会注意到\
  \ IDE 正在提示关于 `@Autowired` 注解的一些警告信息，例如“不推荐使用字段注入。”\n\n另一种选择是使用*构造器注入*，即创建一个带有参数的构造器，并使用\
  \ `@Autowired` 标记，必要时还可使用 `@Qualifier`。原因很简单：字段默认是可变的，而使用构造器参数意味着我们可以将字段标记为 `final`；*这*意味着我们不仅可以*要求*设置某个字段，还可以假定一旦设置，该字段将保持其被赋予的值。\n\
  \n在实践中，启用构造器注入所需做的，就是创建一个有效的构造器，并将需要注入的参数标记好。构造器注入的规则与字段注入的规则相同；只是我们对其有了更多的控制权。\n\
  \n为了在后续章节（以及小节）中避免无休止的重复，我们还想引入一个新的配置标签：`<import>`。\n\n注意\n\n如果你希望我们能在本章更早的地方就介绍这个标签……嗯，我们也是这么想的。然而，我们正刻意放慢引入新信息的节奏，以免让不熟悉我们讨论概念的读者感到不知所措，所以这是我们*最终*觉得有机会引入它的地方。我们发现，当新概念被逐步引入时，人们通常学得最好，因此我们选择了相当缓慢的节奏。\n\
  \n`<import>` 的作用应该相当明显：它将一个独立的配置文件导入到另一个配置文件中。它允许我们创建模块化的配置。\n\n我们将创建两个“模块”——即具有特定用途的配置。一个将是一组来自\
  \ `com.bsg6.chapter03.mem03` 包的 `Normalizer` 实例；另一个将是我们的 `MusicServiceTests` 类。当我们将这两个配置导入到*第三个*配置中时，每个配置中的\
  \ Bean 将能够互相访问。\n\n不过，有一个问题：`mem03` 包中也包含一个 `MusicService` 实现！因此，我们将为 `<context:component-scan\
  \ />` 引入一个额外的属性，名为 `resource-pattern`。\n\n让我们开始构建我们的模块。首先，是最简单的一个，即 `MusicServiceTests`\
  \ 的纯 XML 配置。我们不会改变我们已经见过的那个类的代码，所以没有注解；我们将使用一个简单的 XML `<bean />` 标签，就像我们在第 2 章中看到的那样。\n\
  \n```\n\n清单 3-24\nchapter03/src/test/resources/musicservicetest.xml\n```\n\n这个配置非常简单：它声明了一个名为\
  \ `musicServiceTests` 的 Bean，类型为 `com.bsg6.chapter03.MusicServiceTests`。因此，在任何引用了*此*文件的上下文中，`MusicServiceTests`\
  \ 都是一个有效的注入候选，我们稍后会看到。\n\n```\n\n清单 3-25\nchapter03/src/test/resources/normalizers.xml\n\
  ```\n\n在这里，我们看到了 `<context:component-scan />` 的 `resource-pattern` 注解。这个标签是对被扫描类的一个过滤器。这里，我们使用了\
  \ `resource-pattern=\"*Normalizer.class\"`，这意味着扫描中包含的类仅限于那些*以* `Normalizer` *结尾*的类——因此，也就是我们的\
  \ `SimpleNormalizer` 和 `CapLeadingNormalizer` 类。\n\n我们为什么在这里使用 `resource-pattern`？嗯，我们实际上是在告诉系统只扫描\
  \ `com.bsg6.chapter03.mem03` 包中的**特定**类。如果我们不将扫描范围限制在规范化类上，我们也会导入 `MusicService3`，而我们不希望将那个类包含在一个本应仅限于规范化器的配置中。\n\
  \n这里使用的表达式是一个 Java 正则表达式，并包含了*整个*资源名称——默认情况下是 `**/*.class`，意思是“从 `base-package`\
  \ 指定的包开始的整个包树中，任何以 `.class` 结尾的文件。”\n\n然而，在 `normalizers.xml` 配置中，它被限制为“当前包中任何以\
  \ `Normalizer.class` 结尾的文件”，包设置为 `com.bsg6.chapter03.mem03`，因此它只会获取到我们的两个 `Normalizer`\
  \ 实现。\n\n现在，我们来看看我们的“主配置”是如何使用的，它展示了两个 `<import />` 标签的用法。这会创建一个“扁平化的配置”，使得任何加载\
  \ `config-04.xml` 的组件不仅能看到 `config-04.xml` 加载的所有组件，还能看到 `normalizers.xml` 和 `musicservicetest.xml`\
  \ 加载的所有组件。\n\n```\n\n清单 3-26\nchapter03/src/test/resources/config-04.xml\n```\n\n\
  事实上，让我们通过编写一个快速测试来证明这一点，该测试验证我们期望在配置中拥有的 Bean 是否可用。像往常一样，我们将使用 `@DataProvider` 为参数化测试提供灵活的数据集。我们会做一些稍微不同的事情，即将\
  \ `String` 实例和 `Class` 引用都放入数据提供器中——然后检查类型以确定使用哪个 `ApplicationContext getBean()`\
  \ 方法。（可能有更简洁的方法来实现这一点，但老实说，这是一个一次性测试。我们不需要它完美，只需要它能满足我们的目的即可。^(⁵⁷)）\n\n```\npackage\
  \ com.bsg6.chapter03;\nimport com.bsg6.chapter03.mem03.CapLeadingNormalizer;\nimport\
  \ com.bsg6.chapter03.mem03.SimpleNormalizer;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.context.ApplicationContext;\nimport org.springframework.test.context.ContextConfiguration;\n\
  import org.springframework.test.context.testng.AbstractTestNGSpringContextTests;\n\
  import org.testng.annotations.DataProvider;\nimport org.testng.annotations.Test;\n\
  import static org.testng.Assert.assertNotNull;\nimport static org.testng.Assert.fail;\n\
  @ContextConfiguration(locations = \"/config-04.xml\")\npublic class TestConfigurationImport\
  \ extends AbstractTestNGSpringContextTests {\n@Autowired\nApplicationContext context;\n\
  @DataProvider\nObject[][] resources() {\nreturn new Object[][]{\n{\"musicServiceTests\"\
  },\n{MusicServiceTests.class},\n{\"foo\"},\n{\"bar\"},\n{SimpleNormalizer.class},\n\
  {CapLeadingNormalizer.class},\n{\"musicService4\"}\n};\n}\n@Test(dataProvider =\
  \ \"resources\")\npublic void validateResourceExistence(Object resource) {\nif (resource\
  \ instanceof String) {\nassertNotNull(context.getBean(resource.toString()));\n}\
  \ else {\nif (resource instanceof Class) {\nassertNotNull(context.getBean((Class)\
  \ resource));\n} else {\nfail(\"Invalid resource type\");\n}\n}\n}\n}\n清单 3-27\n\
  chapter03/src/test/java/com/bsg6/chapter03/TestConfigurationImport.java\n```\n\n\
  最后，是时候看看我们的 `MusicService4` 了，它是 `MusicService3` 的近亲克隆——就像我们所有的 `MusicService` 实现一样。这里的主要变化是，我们将使\
  \ `Normalizer` 引用变为 `final`，并通过构造器注入来初始化它们。然后，我们将再有一个测试类（其他测试的近亲克隆，引用的是 `config-04.xml`\
  \ 而不是其他配置）来确保我们的配置能够顺利且正确地加载（并且，就此而言，速度也很快）。\n\n\n\n```\npackage com.bsg6.chapter03.mem04;\n\
  import com.bsg6.chapter03.AbstractMusicService;\nimport com.bsg6.chapter03.Normalizer;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.beans.factory.annotation.Qualifier;\n\
  import org.springframework.stereotype.Component;\n@Component\npublic class MusicService4\
  \ extends AbstractMusicService {\nprivate final Normalizer artistNormalizer;\nprivate\
  \ final Normalizer songNormalizer;\npublic MusicService4(@Autowired\n@Qualifier(\"\
  bar\")\nNormalizer artistNormalizer,\n@Autowired\n@Qualifier(\"foo\")\nNormalizer\
  \ songNormalizer) {\nthis.artistNormalizer = artistNormalizer;\nthis.songNormalizer\
  \ = songNormalizer;\n}\n@Override\nprotected String transformArtist(String input)\
  \ {\nreturn artistNormalizer.transform(input);\n}\n@Override\nprotected String transformSong(String\
  \ input) {\nreturn songNormalizer.transform(input);\n}\n}\n代码清单 3-28\nchapter03/src/main/java/com/bsg6/chapter03/mem04/MusicService4.java\n\
  ```\n\n在这里，我们仍然使用了`@Autowired`和`@Qualifier`注解；只不过它们被应用到了构造函数的参数上，而不是类属性上。类属性本身被标记为`private\
  \ final`——因为它们不会在该类外部使用，并且我们希望告知虚拟机，一旦设置后，不允许更改这些引用。\n\n在*这个*类中，将引用设为 final 的价值有限，主要是因为整个`MusicService`的价值也有限——到目前为止，我们的实现纯粹是为了展示\
  \ Spring 的配置特性。话虽如此，在实际组件中，将值标记为`final`有助于 JVM 优化代码，同时也能明确表达你对这些值的意图：它们不应被管理或更改，而应被设置后保持不变。\n\
  \n现在，我们有一个几乎随意的测试：它看起来与`TestMusicService3`完全一样，只是配置文件名不同。我们将在本章后面参数化这些配置，并实际上在*一个*测试中测试*每一个配置文件*，但让我们先看看\
  \ Spring 的 XML 配置和编程式配置。\n\n```\npackage com.bsg6.chapter03;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.testng.AbstractTestNGSpringContextTests;\n\
  import org.testng.annotations.Test;\n@ContextConfiguration(locations = \"/config-04.xml\"\
  )\npublic class TestMusicService4 extends AbstractTestNGSpringContextTests {\n@Autowired\n\
  MusicService service;\n@Autowired\nMusicServiceTests tests;\n@Test\npublic void\
  \ testSongVoting() {\ntests.testSongVoting(service);\n}\n@Test\npublic void testGetMatchingArtistNames()\
  \ {\ntests.testMatchingArtistNames(service);\n}\n@Test\npublic void testGetSongsForArtist()\
  \ {\ntests.testSongsForArtist(service);\n}\n@Test\npublic void testMatchingSongNamesForArtist()\
  \ {\ntests.testMatchingSongNamesForArtist(service);\n}\n}\n代码清单 3-29\nchapter03/src/test/com/bsg6/chapter03/TestMusicService4.java\n\
  ```\n\n下一节我们将重新创建刚才介绍的内容，但不再依赖注解。我们将逐步介绍如何使用 XML 配置 Spring Bean 并将它们装配在一起。\n\n##\
  \ 通过 XML 进行配置\n\nXML 并非定义配置的*必需*方式，尽管到目前为止我们一直用它来启动组件扫描的流程。然而，从历史上看，它*确实*是最常见的方式（它是最古老的配置机制），并且还具有非常容易集中化配置的优点。（这一点我们可以看出，因为在本章的所有配置中，我们都使用了\
  \ XML 进行组件扫描。）\n\n我们想要做的是，通过复制基于注解的示例，但改用 XML，来演示基本的 XML 装配能力。唯一的例外是测试类本身，它们将继续使用注解进行注入；这是因为`AbstractTestNGSpringContextTests`类（及其\
  \ JUnit 等价类）专门实现了一个应用注解注入的流程。因此，显式使用 XML 来装配测试类的依赖关系是没有意义的；注解已经被扫描和处理了。\n\n\n\n\
  ### 使用 **<bean />** 声明 Bean\n\n要在 XML 中声明组件，需要使用 `<bean />` 标签，如清单 3-25 所示。\n\n\
  ```\n清单 3-30\nchapter03/src/test/resources/musicservicetest.xml\n```\n\n这是 `<bean/>`\
  \ 的一种简单直接的用法，但这里其实可以使用*大量*属性。本章将介绍其中最常见的属性，其余属性将在第 4 章中介绍。此表中未涵盖的属性比已涵盖的更多，但未在此处列出的属性较为罕见。\n\
  \n其他值得关注的属性（尤其是在第 4 章中）包括 `init-method`、`destroy-method`、`factory-method` 和 `factory-bean`。\n\
  \n表 3-1\n\n属性列表\n\n| 属性 | 含义 | 描述 |\n| --- | --- | --- |\n| `name` | Bean 的限定名称\
  \ | 如果未提供名称，则 Bean 名称派生自类名。 |\n| `class` | Bean 的完全限定类名 | 在某些情况下，此属性实际上并非必需，但这种情况很少见，且不在面向\
  \ Spring 初学者的书籍中介绍。 |\n| `scope` | Bean 组件的生命周期 | 这决定了每次调用 `getBean()` 时是返回同一个实例（从而将组件保持为单例），还是\
  \ Spring 在每次调用 `getBean()` 时创建一个新实例。默认值为单例模式（属性值为 `singleton`，如果你能想象的话）。如果需要原型模式，则属性值为\
  \ `prototype`。 |\n| `lazy-init` | 在上下文的生命周期中，何时应创建 Bean | 如果设置为 `true`，则 Bean 将在被请求时实例化，而不是在容器启动时实例化。默认值为\
  \ `false`，因此 Spring Bean 会立即且急切地创建。 |\n| `autowire` | 控制此 Bean 的自动装配行为 | 默认情况下，Spring\
  \ 不会自动装配通过 XML 创建的引用；此设置允许程序员微调自动装配行为。可以设置为 `no`（表示“不自动装配”）、`byName` 和 `byType`（表示自动装配基于属性名称，因此\
  \ `foo` 将匹配名称为 `foo` 的组件，或基于引用类型），以及 `constructor`（类似于 `byType`，但针对构造函数参数）。 |\n\
  | `depends-on` | 必须在此 Bean 之前初始化的 Bean 列表 | 这是一个逗号分隔的依赖引用列表，这些依赖必须在此 Bean 初始化之前完全初始化。通常不需要此属性；Spring\
  \ 可以判断 Bean `foo` 是否依赖于 `bar`，因此仅当默认依赖机制因静态引用或类似原因而失效时才需要使用此属性。一般来说，如果你需要此属性，说明你做错了什么。\
  \ |\n\n因此，我们在清单 3-30 中看到的是一个简单的 Spring Bean，名为 `musicServiceTests`，类型为 `com.bsg6.chapter03.MusicServiceTests`。它将在配置加载后立即创建（因为\
  \ `lazy-init` 保持默认值 `false`），并且是单例（每个 `ApplicationContext` 仅加载一个实例），因为我们让 `scope`\
  \ 保持其默认值 `singleton`。\n\n当然，这是要创建的最简单的 Bean 类型，即没有需要管理的属性的 Bean。它完全是自包含的。如果我们想设置其他属性（就像我们对\
  \ `Normalizer` 实例所做的那样），会发生什么？好吧，首先，让我们创建一个 `normalizers-na.xml` 配置。我们将使用 `normalizers-na.xml`，因为\
  \ `normalizers.xml` 使用注解进行配置，而我们希望显式声明^(⁵⁸)；我们的 Bean 仍将命名为 `foo` 和 `bar`，但我们希望显式创建它们。请注意，这些\
  \ Bean 是来自 `mem03` 包的 `Normalizer` 类——我们还将重用 `MusicService3`，只是不处理注解。\n\n```\n\n\
  清单 3-31\nchapter03/src/test/resources/normalizers-na.xml\n```\n\n### 使用 **<property\
  \ />** 连接组件\n\n现在我们已经声明了一组配置，其中包含一组 Spring Bean，我们需要弄清楚如何在这些 Bean 中使用 `MusicService3`；当然，如果你仔细阅读过第\
  \ 2 章，你就会知道：我们将使用 `<property />` 来设置引用。\n\n`property` 标签具有以下属性值和含义：\n\n| **属性**\
  \ | **含义** | **描述** |\n| --- | --- | --- |\n| `name` | 要设置的属性名称 | 此属性为必需 |\n| `value`\
  \ | 参数的值，必须能轻松转换为 `type` | 此属性不能与 `ref` 共存 |\n| `ref` | 对另一个已命名 Spring Bean 的引用，按名称引用\
  \ | 此属性不能与 `value` 共存 |\n\n在这种情况下，我们有两个可用的 `Normalizer` 引用，前提是我们导入 `normalizers-na.xml`——我们将会导入——因此我们将使用\
  \ `ref` 来设置值。以下是我们的 `config-05.xml`，它声明了一个 `MusicService`（类型为 `com.bsg6.chapter03.mem03.MusicService3`），然后使用适当的引用调用\
  \ `setArtistNormalizer()` 和 `setSongNormalizer()`，并按名称查找它们。\n\n```\n\n清单 3-32\n\
  chapter03/src/test/resources/config-05.xml\n```\n\n当然，拥有方便、模块化的配置文件固然很好……但它们实际上*不*做任何事情。敏锐的读者知道接下来会发生什么：一个测试！\n\
  \n这个测试将与我们之前的测试*非常*相似，只有一个区别：我们将在 `@ContextConfiguration` 注解中加载多个配置文件。（我们的测试不使用\
  \ XML 配置，实际上也不应该使用。）除了使用配置文件*数组*之外，此测试与 `TestMusicService4` 完全相同。每个配置文件都加载到一个 `ApplicationContext`\
  \ 中，因此这对于我们进行模块化测试来说是一种便捷方式，其中像 `MusicServiceTests` 这样的 Bean 不需要成为“主配置”（即我们的 `config-05.xml`\
  \ 文件）的一部分。\n\n```\npackage com.bsg6.chapter03;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.testng.AbstractTestNGSpringContextTests;\n\
  import org.testng.annotations.Test;\n@ContextConfiguration(locations = {\"/config-05.xml\"\
  ,\"/musicservicetest.xml\"})\npublic class TestMusicService5 extends AbstractTestNGSpringContextTests\
  \ {\n@Autowired\nMusicService service;\n@Autowired\nMusicServiceTests tests;\n@Test\n\
  public void testSongVoting() {\ntests.testSongVoting(service);\n}\n@Test\npublic\
  \ void testGetMatchingArtistNames() {\ntests.testMatchingArtistNames(service);\n\
  }\n@Test\npublic void testGetSongsForArtist() {\ntests.testSongsForArtist(service);\n\
