  \n## 后续步骤\n\n本章我们经历了一段关于事务支持、`JdbcTemplate`使用以及集成服务测试的旅程。值得庆幸的是，核心概念相当容易总结：使用 Spring\
  \ 的数据访问机制可以让你轻松获得事务支持，并且 Spring 接口尽管提供了广泛的选择，但使用起来非常简单。不过，一个限制是，我们仍然需要手动编写用于关系数据库的\
  \ SQL。\n\n在下一章中，我们将了解 Spring 的另一个数据抽象，称为“Spring Data”。借助 Spring Data，我们可以编写接口来访问几乎**任何**数据库，无论是关系型还是非关系型，并且我们将看到如何使我们的查询在程序上可验证。\n\
  \n脚注 1   2   3   4   5\n\n"
- "# 9. 使用 Spring 和 Spring Data 进行持久化\n\n在第 8 章中，我们终于不再关注配置和展示机制，而是研究了如何使用`JdbcTemplate`访问关系数据库。在本章中，我们将再次探讨数据访问——这次使用一个名为“Spring\
  \ Data”的 Spring 项目，它可以提供一种基本与数据无关的数据访问视图。\n\nSpring Data 统一了 Spring 的数据访问，不仅为不同的数据库提供了通用访问，还为不同的\
  \ API（如 JPA（Java 持久化 API）和我们的老朋友 JDBC）以及不同类型的数据库（如 MongoDB、Neo4J 等）提供了通用访问。\n\n\n\
  \n## 引言\n\n我们通常倾向于从最简单的技术使用逐步过渡到更高级的技术，但本章将稍微颠倒一下顺序，从 JPA 开始；JDBC 和 SQL 是基础级别的技术（并且在\
  \ JPA 的底层被使用），但 JDBC 的问题在于，嗯，它就是 JDBC——并且它严重依赖于一个实时的数据结构，这种结构你会在一个运行中的、拥有功能完备且已实现的模式的数据库中看到。这意味着，刚性数据访问的某些方面可能有效也可能无效，具体取决于数据库，因为它是“记录系统”，是数据样貌的权威描述。当我们编译应用程序时，我们不知道数据库是否存在，也不知道模式是什么样，这使得针对该数据库的自动化工具变得相当困难。\n\
  \n然而，JPA 允许我们描述应用程序应该看到的数据模型。我们可以使用一个 JPA 数据模型，并随意更改底层结构（只要我们同时也告诉 JPA 底层结构是什么），但我们也可以在编译时就知道程序所看到的数据模型是什么。这意味着，当我们首次编译应用程序时，无论数据库是否存在，我们都能知道如何期望访问我们的数据（因为它在代码中描述了）——这意味着我们可以高度确信我们的应用程序将正确地访问数据，尽管可能效率不高。^(⁹⁸)\n\
  \n为什么我们不知道数据访问是否高效？答案很简单：例如，我们可能以某种方式设计我们的对象模型，导致数据库使用了未索引的数据，或者使用了比实际需要更多的表，从而导致查询需要进行全表扫描等等。JPA\
  \ 并不是一颗神奇的子弹，无论你如何描述数据，它都能给你一个优秀的模式；它通常能帮助你创建一个**可运行**的模式，但你仍然需要理解关系型数据库的工作原理，才能真正微调数据模型。不过，要是能有神奇的性能配方就好了。\n\
  \n我们将介绍 Spring Data 抽象层背后的几种不同的存储机制，但本章将回顾第 3 章和第 8 章以及它们对测试的使用。一旦服务正常工作，在服务前面添加\
  \ REST 端点就是一件小事（正如我们在第 7 章和第 8 章中看到的那样），因此我们不会在此处通过添加一个支持 Web 的前端来分散注意力。\n\n## 总体架构\n\
  \nSpring Data 扩展了 `Repository<T,ID>` 的概念，这是一个针对给定数据存储和实体的通用访问层。我们已经见过 `@Repository`\
  \ 注解，但在这里我们将看到一个接口（也叫做 `Repository<T,ID>`，其中 `T` 是被存储的类型，`ID` 是主键类型，并通过 `CrudRepository<T,ID>`\
  \ 和 `PagingAndSortingRepository<T,ID>` 进行扩展），Spring 将通过代理（在很大程度上）**为你**实现这个接口。\n\
  \n不幸的是，Java 中的代理并不真正属于本书的讨论范围。话虽如此，这里还是对一种方法做一个非常粗略的概述：你可以定义一个对象（称为 `Proxy`），它拦截方法调用，并在一个处理器对象中任意执行代码。由于代理可以访问调用的方法签名和被调用的实例，处理器可以在实际方法体之前或之后执行代码——或者它也可以从一开始就避免调用实际的方法体。\n\
  \n对于实现 `Repository<T,ID>` 的类，该接口被用来（几乎）从无到有地制造方法体，其效果是我们定义一个简单的接口，然后 Spring 神奇地为我们实现这个接口。显然，这里没有*真正的*魔法——它只是一个\
  \ `Proxy`——但这使得使用 Spring Data 比原本可能的方式容易得多。\n\n值得注意的是，Spring 中有多种代理机制。默认是使用 Java\
  \ 原生的代理机制，但在某些情况下，Spring 会使用一个名为 CGLIB 的库，并用它构建一种不同类型的代理。\n\n你将用 Java 定义实体，然后创建一个接口（或一组接口）来描述如何在数据存储系统中操作该实体。`Repository<T,ID>`\
  \ 接口本身只是一个标记；它没有方法，但向 Spring 指示其实现以某种方式与数据库协同工作。\n\n如果 `Repository<T,ID>` 没有方法，那它有什么用呢？\n\
  \n嗯，有时你想通过使用细粒度的接口来限制对方法的访问。例如，可能有一个 `Controller` 没有保存实体的能力；如果我们愿意，我们可以定义一个只定义读取数据方法的\
  \ `Repository<T,ID>`，而实际的实例则拥有保存或更新实体的方法。`Controller` 可能会从 Spring 接收到这个只读接口的一个副本，因此**编译器**可以强制执行它永远不能保存实体的要求。\n\
  \n`CrudRepository<T,ID>` 接口扩展了 `Repository<T,ID>`，定义了用于读取、写入、更新、删除**甚至**查询数据库的操作——并且\
  \ Spring Data 应用了一些魔法，使得你甚至可以在**接口中**指定查询，而无需知道如何实际查询数据库本身。在第 7 章中，我们看到了像 `findAllArtistsByName()`\
  \ 这样的方法，它选择了所有名称匹配通配符的艺术家，且不区分大小写；使用 Spring Data，我们在仓库中定义一个方法**签名**，就能获得几乎相同的功能。（我们需要在外部构建通配符，尽管确实**有**方法可以通过接口本身来实现。）\n\
  \n```\npublic interface ArtistRepository\nextends Repository {\nList findLikeNameIgnoreCase(String\
  \ name);\n}\n清单 9-1\nSpring Data 中与第 7 章 findAllArtistsByName 等价的方法\n```\n\n构建一个\
  \ `Repository<T,ID>` 涉及三个源文件。对于一个给定的仓库，你将拥有：\n\n1.  一个 Spring 配置（当然，它可以服务于多个仓库）\n\
  2.  一个实体类型（代表数据的对象），带有某种主键\n3.  一个实现 `Repository<T,ID>`（或者实践中常用的 `CrudRepository<T,ID>`\
  \ 或 `PagingAndSortingRepository<T,ID>`）的接口，并指定实体类型及其主键类型\n\n接口的创建也有多种变体，以允许不同级别的方法访问。我们将在本章中展示其中的一些。\n\
  \n### 关于需求的重要说明\n\n本章将演示访问两个数据库系统：一个嵌入式 H2 数据库（就像在第 7 章和第 8 章中一样）和一个 MongoDB 数据库。我们将使用一个允许我们嵌入\
  \ MongoDB 的项目，因此你无需运行（或安装）MongoDB。\n\n\n\n## 创建项目结构\n\n第 9 章实际上由四个子项目组成，分别是：\n\n\
  *   `chapter09-api`，包含第 9 章其他项目使用的基础类和接口\n*   `chapter09-test`，包含我们的 Spring Data\
  \ 实现应能通过的测试\n*   `chapter09-jpa`，包含 JPA 的实现和配置\n*   `chapter09-mongo`，包含 MongoDB\
  \ 的实现和配置\n\n`chapter09-test` 模块的测试类位于 `src/main/java` 目录下，这意味着这些类可供导入 `chapter09-test`\
  \ 的项目使用——我们将在测试阶段将其作为依赖项。\n\n现在让我们开始创建项目结构——由于有四个独立的项目，内容很多，但操作相当重复。\n\n```\nmkdir\
  \ -p chapter09-api/src/main/java\nmkdir -p chapter09-api/src/main/resources\nmkdir\
  \ -p chapter09-api/src/test/java\nmkdir -p chapter09-api/src/test/resources\nmkdir\
  \ -p chapter09-test/src/main/java\nmkdir -p chapter09-test/src/main/resources\n\
  mkdir -p chapter09-test/src/test/java\nmkdir -p chapter09-test/src/test/resources\n\
  mkdir -p chapter09-jpa/src/main/java\nmkdir -p chapter09-jpa/src/main/resources\n\
  mkdir -p chapter09-jpa/src/test/java\nmkdir -p chapter09-jpa/src/test/resources\n\
  mkdir -p chapter09-mongo/src/main/java\nmkdir -p chapter09-mongo/src/main/resources\n\
  mkdir -p chapter09-mongo/src/test/java\nmkdir -p chapter09-mongo/src/test/resources\n\
  代码清单 9-2\n使用 POSIX 命令创建目录结构\n```\n\n当然，还有另一种方法。既然我们是程序员，使用 `bash` shell（或等效工具）并编写一点脚本，实际上会更优雅、更简单。（这也是编写本章时实际创建项目的方式。不过别告诉编辑！）\n\
  \n```\nfor i in api test jpa mongo; do\nfor j in main test; do\nfor k in java resources;\
  \ do\nmkdir -p chapter09-$i/src/$j/$k;\ndone;\ndone;\ndone\n代码清单 9-3\n使用 POSIX 命令创建目录结构（第二版）\n\
  ```\n\n当然，既然我们已经深入了解了 bash 脚本的能力，还可以做得更漂亮。虽然这不是一本关于 shell 脚本的书，但边学边用也很有趣。\n\n```\n\
  mkdir -p chapter09-{api,test,jpa,mongo}/src/{main,test}/{java,resources}\n代码清单 9-4\n\
  使用 POSIX 命令创建目录结构（第三版）\n```\n\n在真正编写可执行的代码之前，我们需要先了解 `chapter09-api` 和 `chapter09-test`\
  \ 项目，因为这两个项目是 `chapter09-jpa` 和 `chapter09-mongo` 项目的基础。（它们包含的代码也比 `jpa` 和 `mongodb`\
  \ 项目更多。`chapter09-jpa` 和 `chapter09-mongo` 项目的源代码主要由扩展或实现 `chapter09-api` 或 `chapter09-test`\
  \ 中类的类组成，实际的*源代码*非常少。）\n\n### 公共代码\n\n`chapter09-api` 项目包含五个接口、一个抽象类和一个最终将成为 Spring\
  \ 组件的类。它们分别是：\n\n*   `BaseEntity`，一个泛型接口，定义了通用标识符的访问器和修改器\n*   `BaseArtist`，一个接口，定义了访问艺术家\
  \ `name` 字段的方法，并扩展了 `BaseEntity`\n*   `BaseSong`，一个接口，定义了访问 `BaseArtist` 实现、歌曲名称和歌曲投票数的方法，同时扩展了\
  \ `BaseEntity`\n*   `BaseArtistRepository`，一个接口，定义了如何访问扩展 `BaseArtist` 的实体\n*  \
  \ `BaseSongRepository`，一个接口，定义了如何访问扩展 `BaseSong` 的实体\n*   `BaseMusicService`，一个抽象类，用于协调各种仓库方法\n\
  *   `WildcardConverter`，一个提供构建服务通配符机制的类\n\n以下是用 UML 绘制的类图，展示了各类之间的关系。当我们在 `chapter09-jpa`\
  \ 和 `chapter09-mongo` 中实现该结构的具体版本时，基本上就是在最终确定这些基类的版本。\n\n![](img/471370_2_En_9_Fig1_HTML.jpg)\n\
  \n流程图如下：I BaseSongRepository 和 A BaseMusicService 指向 I BaseSong 和 I BaseArtist。I\
  \ BaseSong 和 I BaseArtistRepository 指向 I BaseArtist。I BaseSong 和 I BaseArtist 指向\
  \ I BaseEntity。C WildcardConverter 与主流程分离。\n\n图 9-1\n基本数据设计\n\n其中大部分都非常简单。但由于它们是泛型的，类声明往往相当冗长；原因是不同的数据库可能以不同方式处理主键；因此，我们需要一种方法来根据具体情况定义主键。\n\
  \n我们在这里使用“数据库”一词，是取其“存储数据的应用程序”的广义含义，而非特指“关系型数据库”。\n\n例如，对于关系型数据库，主键通常最好生成为某种整数；但对于像\
  \ MongoDB 这样的文档数据库，主键则生成为以 `String` 实例表示的 UUID。我们可以强制类型统一（因此，要么到处使用 UUID，要么使用整数），但这感觉像是在毫无理由地放弃优化（当然，除非你认为更简单的接口是一个“好理由”，这完全有可能）。\n\
  \n首先，我们来看一下 `chapter09-api` 的构建脚本。它与我们之前的一些构建脚本有一些不同之处。\n\n```\n\n4.0.0\n\ncom.apress\n\
  bsg6\n1.0\n\nchapter09-api\n1.0\n\norg.springframework.data\nspring-data-bom\n${springDataBomVersion}\n\
  import\npom\n\norg.springframework.data\nspring-data-commons\n\norg.springframework\n\
  spring-tx\n\norg.springframework\nspring-beans\ntest\n\norg.springframework.boot\n\
  spring-boot-maven-plugin\n${springBootVersion}\n\n代码清单 9-5\nchapter09-api/pom.xml\n\
  ```\n\n这里的一切都相当直接，不过我们需要注意在 `dependencyManagement` 块中特别包含了 `spring-data-bom`，这使我们能够访问\
  \ Spring Data 的一组一致依赖项。\n\n那么，让我们先来看看实体接口；它们很简单（除了泛型声明，随着我们在 `chapter09-api` 项目中的深入，这些声明只会变得更复杂）。\n\
  \n首先，我们有 `BaseEntity` 接口，它接受一个 `ID` 类型。\n\n```\npackage com.bsg6.chapter09.common;\n\
  public interface BaseEntity {\nID getId();\nvoid setId(ID id);\n}\n代码清单 9-6\nchapter09-api/src/main/java/com/bsg6/chapter09/common/BaseEntity.java\n\
  ```\n\n这非常简单；它是一个接口，因此本身不包含任何状态（没有属性），但它表明任何实现 `BaseEntity` 的类都可以访问某种类型的 `Id` 属性，该类型以泛型\
  \ `<ID>` 的形式传递给编译器。\n\n接下来，我们看看 `BaseArtist`，它使用了 `BaseEntity` 并添加了对自身属性的访问。\n\n\
  \n\n```\npackage com.bsg6.chapter09.common;\npublic interface BaseArtist\nextends\
  \ BaseEntity {\n/**\n* 获取艺术家名称\n*/\nString getName();\nvoid setName(String name);\n\
  }\n清单 9-7\nchapter09-api/src/main/java/com/bsg6/chapter09/common/BaseArtist.java\n\
  ```\n\n它有一个泛型参数，就像 `BaseEntity` 一样，但仅用它来将功能**委托**给 `BaseEntity`。\n\n注意\n\n这些都是接口，因为实际的实现需要比泛型接口所能提供的更多信息。例如，对于\
  \ JPA，每个属性（如 `name`）都会有一个关于 `name` 应如何在数据库中表示的描述，但这些表示会根据实际使用的数据存储而改变；例如，MongoDB\
  \ 会使用与 JPA 不同的信息。因此，我们只描述 `Artist` 应*呈现*的方式，而不描述艺术家在具体、实际意义上的真实表示方式。\n\n`BaseSong`\
  \ 稍微复杂一些，因为它需要提供对实现了 `BaseArtist` 的对象的访问。它有两个泛型参数：一个是实现了 `BaseArtist` 的类型，另一个是 `BaseEntity`\
  \ 的标识符类型。\n\n```\npackage com.bsg6.chapter09.common;\npublic interface BaseSong\n\
  , ID>\nextends BaseEntity {\nT getArtist();\nvoid setArtist(T artist);\n/**\n* 获取歌曲名称\n\
  */\nString getName();\nvoid setName(String name);\nint getVotes();\nvoid setVotes(int\
  \ votes);\n}\n清单 9-8\nchapter09-api/src/main/java/com/bsg6/chapter09/common/BaseSong.java\n\
  ```\n\n现在，我们开始进入有趣的部分；我们将查看 `BaseArtistRepository`，它实际上使用了 Spring Data 来提供功能，之后我们将查看\
  \ `BaseSongRepository`、`BaseMusicService` 和 `WildcardConverter`。一旦我们理解了 `BaseArtistRepository`，其他类就很容易理解了。\n\
  \n```\npackage com.bsg6.chapter09.common;\nimport java.util.List;\nimport java.util.Optional;\n\
  import org.springframework.data.repository.CrudRepository;\npublic interface BaseArtistRepository\n\
  , ID>\nextends CrudRepository {\nList findAllByNameIsLikeIgnoreCaseOrderByName(String\
  \ name);\nOptional findByNameIgnoreCase(String name);\n}\n清单 9-9\nchapter09-api/src/main/java/com/bsg6/chapter09/common/BaseArtistRepository.java\n\
  ```\n\n从表面上看，这个接口似乎相当简单。它有两个泛型参数：一个是实现了 `BaseArtist` 的类型，另一个是主键类型。它还实现了一个接口 `CrudRepository`，这是我们连接大量功能的桥梁。\n\
  \n`CrudRepository` 暴露了许多有用的标准方法，用于 CRUD 操作——即“创建”、“读取”、“更新”和“删除”。`ArtistRepository`\
  \ 的声明意味着这是一个 `CrudRepository` 的实现，适用于扩展了 `BaseArtist` 的类型，并使用 `ID` 表示的主键类型。`CrudRepository`\
  \ 接口本身暴露了以下方法。\n\n| 方法签名 | 描述 |\n| --- | --- |\n| `<S extends T> S save(S entity)`\
  \ | 保存一个实体，并返回一个可赋值给该实体类型的类型。（如果传入一个 `Artist`，返回的将等同于一个 `Artist`。）如果保存操作分配了可见的值（即，如果保存实体生成了一个主键），它也可能改变作为参数传入的实体。它可能不是相同的类型，因为某些持久化机制（如\
  \ Hibernate）返回的是可赋值给该类型的代理，而不是简单的类型本身。 |\n| `<S extends T> Iterable<S> saveAll(Iterable<S>\
  \ entities)` | 保存一组实体；你可以传入任何 JVM 可以迭代的集合。在某些有限的情况下，这可以模拟批量操作，尽管在服务层面进行事务性操作可能更好。\
  \ |\n| `Optional<T> findById(ID id)` | 根据传入的主键对实体类型进行主键查找。如果未找到，则返回 `Optional.empty()`。\
  \ |\n| `boolean existsByid(ID id)` | 指示数据库中是否存在具有传入 `id` 的正确类型的实体。 |\n| `Iterable<T>\
  \ findAll()` | 返回实体类型的 `Iterable`。 |\n| `Iterable<T> findAllById(Iterable<ID> ids)`\
  \ | 返回一个 `Iterable`，包含主键集合中具有匹配 `id` 的每个现有实体。 |\n| `long count()` | 返回仓库中所有正确类型实体的计数。（我们确信这并不意外。）\
  \ |\n| `void deleteById(ID id)` | 如果数据存储中存在具有此 `id` 的实体，则将其删除。 |\n| `void delete(T\
  \ entity)` | 如果实体与现有实体匹配，则将其从数据存储中删除。 |\n| `void deleteAll(Iterable<? extends T>\
  \ entities)` | 从数据存储中删除所有匹配的实体。 |\n| `void deleteAll()` | 从数据存储中删除此类型的所有现有实体。 |\n\
  \n`PagingAndSortingRepository` 向 `CrudRepository` 添加了两个方法，以支持分页（和排序！），并作为其他可用方法的标记。这两个方法是\
  \ `findAll(Sort)`（其中 `Sort` 表示排序选项）和 `findAll(Pageable pageable)`（其中 `pageable`\
  \ 表示分页和排序选项）。它们都是相当简单的方法，但不在本章的讨论范围内。\n\n然而，`BaseArtistRepository` 还定义了另外两个方法：\n\
  \n```\nList findAllByNameIsLikeIgnoreCaseOrderByName(String name);\nOptional findByNameIgnoreCase(String\
  \ name);\n```\n\n这些方法由 Spring Data 通过动态代理实现，其功能源自方法名称，并遵循相当具体的语法。该语法可以这样理解：\n\n\
  *   查询类型，例如：\n    *   `find`，可以返回一个集合或单个实体；例如，通过将返回类型设为 `List`，你可以获得一个集合；如果底层数据持久化机制支持，你还可以返回实体类型的\
  \ `java.util.Stream`。\n\n*   `read`，其操作方式与 `find` 相同。\n\n*   `query`，其操作方式与 `find`\
  \ 相同。\n\n*   `get`，其操作方式与 `find` 相同。`get`、`read`、`query` 和 `find` 在应用和含义上都是等价的；它们的存在只是为了让程序员可以选择他们喜欢的查询语义。\n\
  \n*   `count`，返回匹配查询的实体数量。\n\n*   修饰符，例如：\n    *   `Top`、`First` 或 `Bottom`，后跟一个可选数字（`1`\
  \ 是默认值，因此 `Top1` 和 `Top` 相同）。\n\n*   `Distinct`，用于对结果应用去重；这适用于基于 `id` 或其他唯一字段之外的属性的查询。\n\
  \n*   可选的实体类型（不是必需的，但可能增加方法名称的可读性）。你可以使用 `findArtistByName` 或 `findByName`——选择哪种取决于你。\n\
  \n\n\n*   `By`，表示查询条件的开始\n\n*   条件列表，由以下部分组成：\n    *   实体的属性，例如 `Name`（对应 `Artist.name`）。支持遍历，因此，如果你有一个\
  \ `Person` 实体，它引用了包含 `city` 的 `Address`，那么使用 `findByAddressCity` 将城市名称作为查询条件的一部分是可行的。\n\
  \n*   `IgnoreCase` 将使查询不区分大小写，具体实现取决于数据存储——例如，JPA 会对属性调用 `UPPER()`。\n\n*   运算符，其可用性取决于具体的数据存储实现。示例包括：\n\
  \        *   Between\n\n*   LessThan\n\n*   GreaterThan\n\n*   Like\n\n*   可选的排序，由以下部分组成：\n\
  \        *   OrderBy\n\n*   属性名称，例如 Artist 或 Song 的 Name\n\n*   可选的方向，Asc 或 Desc\n\
  \n*   第一个条件与所有后续条件之间的分隔符 `And`\n\n显然，这**并非**实际的语法——要描述实际语法，我们最终会得到四五页的巴科斯-瑙尔范式图，这些图旨在说明形式语法——但希望这能让命名系统更清晰。\n\
  \n如果我们有一个 `ArtistRepository<Artist, Integer>`（我们确实会有！），并且我们想通过 `name` 查找一个 `Artist`（此处用\
  \ `<T>` 表示，因为 `T` 继承自 `BaseArtist`），而不必担心精确的大小写匹配，那么我们的查询名称将表示为 `findByNameIgnoreCase(String\
  \ name)`。它可能返回一个 `Optional<Artist>` 或一个 `Artist` 引用；如果是 `Artist`，当数据库中不存在该名称时（即条件不满足），它将返回\
  \ `null`。如果是 `Optional<Artist>`，则条件匹配失败将返回 `Optional.empty()`——这种形式主要用于流式处理。\n\n\
  值得注意的是：虽然 Spring Data 的查询生成器非常强大，但它往往会产生相当复杂的方法名称，并且查询名称的验证有点……欠缺。这给程序员带来了正确命名的负担。然而，有一个名为“Querydsl”的库（[`http://querydsl.com/`](http://querydsl.com/)）可以在一定程度上解决这个问题，它为\
  \ Spring Data 提供了类型安全的查询。\n\n使用 Querydsl，您可以使用注解处理器生成一个“元模型”——实际上很像 JPA 的条件建模——然后使用该模型生成可由编译器本身验证的查询。您将使用元模型的方法和属性来构建查询的程序化条件，而不是手动输入名称。这意味着您（希望）也能拥有更容易输入的方法名称。\n\
  \n然而，Querydsl 的集成仍然有些变动。就**本书**而言，Querydsl 是一个值得关注的方向，但不在讨论范围之内。\n\n让我们快速看一下 `BaseSongRepository`。这个接口与\
  \ `BaseArtistRepository` 实质上是相同的，尽管声明更长，因为它必须引用一个继承自 `BaseArtist` 的类（因为 `BaseSong`\
  \ 声明也需要它）。这也是我们在声明中使用 `A extends BaseArtist<ID>` 的原因；`Repository` 本身并不使用 `A`，但需要声明\
  \ `A` 来理解 `BaseSong<A, ID>` 是如何构造的。（还有其他构造方式，但这种方式涉及的嵌套类型更少。）\n\n```\npackage com.bsg6.chapter09.common;\n\
  import org.springframework.data.repository.CrudRepository;\nimport java.util.List;\n\
  import java.util.Optional;\npublic interface BaseSongRepository\n, S extends BaseSong,\
  \ ID>\nextends CrudRepository {\nOptional findByArtistIdAndNameIgnoreCase(\nID artistId,\
  \ String name\n);\nList findByArtistIdOrderByVotesDesc(ID artistId);\nList findByArtistIdAndNameLikeIgnoreCaseOrderByNameDesc(\n\
  ID artistId, String name\n);\n}\n清单 9-10\nchapter09-api/src/main/java/com/bsg6/chapter09/common/BaseSongRepository.java\n\
  ```\n\n接下来，让我们快速看一下我们的 `WildcardConverter`，它主要提供了一个名为 `convertToWildCard(String)`\
  \ 的方法。当然，它非常简单。这个类存在的原因是一些数据库使用特殊字符来匹配通配符；例如，SQL 使用 `%`，而 Neo4J 使用正则表达式（如 `\".*\"\
  `）。其他数据库可能使用不同的字符，或者像我们将在 MongoDB 中看到的那样，根本不使用任何字符。通过这个类，我们可以让 Spring 配置为我们的数据库构建合适的\
  \ `WildcardConverter`，而我们的 `BaseMusicService` 则完全不需要更改。\n\n```\npackage com.bsg6.chapter09.common;\n\
  public class WildcardConverter {\nprivate final String append;\npublic WildcardConverter(String\
  \ append) {\nthis.append = append;\n}\npublic String convertToWildCard(String data)\
  \ {\nreturn data + append;\n}\n}\n清单 9-11\nchapter09-api/src/main/java/com/bsg6/chapter09/common/WildcardConverter.java\n\
  ```\n\n现在，我们来看看 `BaseMusicService`，它使用了实现 `BaseSongRepository` 和 `BaseArtistRepository`\
  \ 的类。这是一个抽象类。继承 `BaseMusicService` 的类需要做四件事：\n\n*   拥有正确的类签名。\n\n*   委托给此类的构造函数。\n\
  \n*   实现 `createArtist(String)`，该方法创建一个实现 `BaseArtist` 的实例。\n\n*   实现 `createSong(Artist,\
  \ String)`，该方法创建一个实现 `BaseSong` 的实例。\n\n除此之外——我们保证，很快就会看到这个类是如何使用的！——这个类实现了我们音乐服务在第\
  \ 3 章和第 8 章中的所有功能需求，同时还提供了两个额外的方法，用于通过 `id` 直接访问 `Song` 和 `Artist`。（这对于 REST 服务来说是一个有用的特性，我们将在第\
  \ 10 章中有限地看到这一点。）实际上，它看起来比实际更复杂。我们知道代码很冗长——这是因为这个类是整章中最重要的类之一。\n\n请注意，在大多数情况下，这是一个中心入口点，允许我们提供这四个特定方法，而不会影响整个对象设计。通常，当您需要适配多种数据存储服务时，您会根据这些数据仓库的擅长领域来设计对象和访问方式，而在这里，我们试图避免这种情况（以防止在大量清单中重复非常相似的对象模型）。这个类允许我们根据需求，以非常狭窄的方式进行特化。\n\
  \n\n\n```\npackage com.bsg6.chapter09.common;\nimport org.springframework.transaction.annotation.Transactional;\n\
  import java.util.List;\nimport java.util.stream.Collectors;\npublic abstract class\
  \ BaseMusicService\n,\nS extends BaseSong,\nID> {\nprivate final BaseArtistRepository\
  \ artistRepository;\nprivate final BaseSongRepository songRepository;\nprivate final\
  \ WildcardConverter converter;\nprotected BaseMusicService(\nBaseArtistRepository\
  \ artistRepository,\nBaseSongRepository songRepository,\nWildcardConverter converter\n\
  ) {\nthis.artistRepository = artistRepository;\nthis.songRepository = songRepository;\n\
  this.converter = converter;\n}\nprotected abstract A createArtist(String name);\n\
  protected abstract S createSong(A artist, String name);\n@Transactional\npublic\
  \ void voteForSong(String artistName, String songTitle) {\nS song = getSong(artistName,\
  \ songTitle);\nsong.setVotes(song.getVotes() + 1);\nsongRepository.save(song);\n\
  }\n@Transactional\npublic S getSong(String artistName, String songTitle) {\nA artist\
  \ = getArtist(artistName);\nreturn songRepository\n.findByArtistIdAndNameIgnoreCase(\n\
  artist.getId(),\nsongTitle\n)\n.orElseGet(() -> {\nS entity = createSong(artist,\
  \ songTitle);\nsongRepository.save(entity);\nreturn entity;\n});\n}\n@Transactional\n\
  public A getArtist(String artistName) {\nreturn artistRepository\n.findByNameIgnoreCase(artistName)\n\
  .orElseGet(() -> {\nA entity = createArtist(artistName);\nartistRepository.save(entity);\n\
  return entity;\n});\n}\n@Transactional\npublic List getSongsForArtist(String artistName)\
  \ {\nA artist = getArtist(artistName);\nreturn songRepository.findByArtistIdOrderByVotesDesc(\n\
  artist.getId()\n);\n}\n@Transactional(readOnly = true)\npublic List getMatchingArtistNames(String\
  \ artistName) {\nreturn artistRepository\n.findAllByNameIsLikeIgnoreCaseOrderByName(\n\
  converter.convertToWildCard(artistName))\n.stream()\n.map(A::getName)\n.collect(Collectors.toList());\n\
  }\n@Transactional\npublic A getArtistById(ID id) {\nreturn artistRepository.findById(id).orElse(null);\n\
  }\n@Transactional\npublic S getSongById(ID id) {\nreturn songRepository.findById(id).orElse(null);\n\
