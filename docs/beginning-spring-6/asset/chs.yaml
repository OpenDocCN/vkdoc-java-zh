  在接下来的示例中，我们将继续展示 Spring MVC 的部分功能，并尽可能在每个示例中遵循 REST 风格。鉴于这是本书中首次讨论 REST，我们有必要在下一节中探讨使用这种范式所固有的一些架构概念。


  ### REST 概念


  过去几十年中，指导 API 设计的主要策略之一便是 REST，即表述性状态转移。^(⁸²) 它由 Roy T. Fielding 在 20 世纪 90 年代末期与
  HTTP 1.1 的开发同步提出，并基于 HTTP 1.0 的现有设计。将 SOAP 协议^(⁸³)与 REST 所指定的架构原则进行比较，我们可以看到 REST
  更侧重于通过利用 HTTP 协议内置的概念来降低整体复杂性和提高可发现性。


  作为 RESTful API 的基础实现，应遵循以下两点。当然还有其他原则，但以下两点最为普遍：


  *   基础 URI——例如[`http://api.bandgateway.com/songs/`](http://api.bandgateway.com/songs/)，它指定了集合（此处为“songs”），你将通过
  HTTP 方法指定的操作在该集合上进行操作。


  *   恰当地使用 HTTP 方法，最常用的是`GET`、`POST`、`PUT`和`DELETE`。其他方法如`PATCH`、`OPTIONS`和`HEAD`使用频率较低，但同样重要。在
  REST 中，它们被用作对集合或实体执行的操作。


  我们并非暗示 REST 架构风格的其他原则没有用处——它们确实有用。但它们超出了**本书**的讨论范围。


  上述原则应该能帮助你朝着构建更简单的 API 迈出一大步。接下来，我们来谈谈如何恰当地使用 HTTP 方法。



  #### 正确使用 HTTP 方法


  俗话说，吃 Reese''s 花生酱杯没有错误的方式^(⁸⁴)，使用 HTTP 方法也是如此。然而，确实存在一种**规定**的方式来使用 HTTP 方法，以遵循
  REST 架构风格。


  REST 将事物分为成员资源和集合资源。它自诩为一种范式，因为它并不适用于所有可能的 API，但在表示你能想到的大多数模式方面做得非常出色。下面我们将对此进行一些扩展，但如果你觉得你的
  API 需要一些不同的东西，那也没关系；它并非完美的抽象，所以专注于完成任务，而不是构建完美的 API。为了我们简单 API 的目的，我们将讨论资源和集合的单一层级，但请知晓，使用
  Spring MVC 实现嵌套是可能且相当简单的。如果你处理的是资源集合，你会看到像 [`http://api.bandgateway.com/songs/`](http://api.bandgateway.com/songs/)
  这样的 URL。对于成员资源，我们将指定某种标识符，因此你的 URL 结构会更像 [`http://api.bandgateway.com/songs/42`](http://api.bandgateway.com/songs/42)。


  警告：前方术语高能！


  HTTP 动词列表经常涉及“幂等性”的概念。当你使用完全相同的数据进行多次调用并产生**相同**的结果时，该调用就是“幂等的”。只读操作——比如 `GET`——本质上是幂等的；对于其他动词，情况可能会更复杂一些。如果一个调用改变了应用程序状态，但每次改变的方式一致，那么它被认为是幂等的，就像你多次将电灯开关拨到“开”位置会发生的情况一样——它只会保持开启状态。当然，在现实中，这要稍微复杂一些。


  抽象是好的，但并不完美。回到我们的正文！


  `GET` 用于检索资源。这种性质的请求通常不应有副作用，这意味着该请求是“安全的”，因为资源的状态从未改变。


  ![](img/471370_2_En_6_Figa_HTML.jpg)


  一张图表说明了通过请求和响应进行的客户端-服务器通信。客户端发送了 2 个针对 songs/1 的 GET 请求和 1 个针对 songs/3 的 GET 请求。服务器针对
  songs/1 响应了 200 状态码和数据，针对 songs/3 响应了 404 状态码。


  `POST` 用于创建新资源，并将使用集合资源的 URL 结构。它与 `PUT` 的主要区别在于它不是幂等的，因为多次调用 `POST` 会创建新资源，并且它使用集合资源的
  URL 结构。（它不是幂等的，因为每次调用都会创建新的对象状态，而新状态会有自己的标识符，等等。）


  ![](img/471370_2_En_6_Figb_HTML.jpg)


  一张图表说明了通过请求和响应进行的客户端-服务器通信。客户端发送了 2 个针对 songs 的 POST 请求，标题为 something。服务器针对第一个请求响应了
  id 1, title something，针对第二个请求响应了 id 2, title something。


  `PUT` 主要用于完整更新一个现有资源。如果资源不存在，源服务器必须使用 HTTP 201（已创建）响应码；如果是更新操作，则根据是否返回实体，使用 HTTP
  状态码 200（如果返回实体）或 HTTP 状态码 204（如果选择不返回实体）。`PUT` 请求应该是幂等的，这意味着使用相同的数据执行一次或多次应该产生相同的结果，这确保了重复/重试对
  `PUT` 的调用不会产生意外效果（因此，幂等性）。此外，`PUT` 请求是针对单个资源而非集合进行操作的，因为在大多数情况下它旨在进行更新。


  ![](img/471370_2_En_6_Figc_HTML.jpg)


  一张图表说明了通过请求和响应进行的客户端-服务器通信。客户端发送了 3 个针对 songs/1 的 PUT 请求，分别带有不同的标题。服务器针对第一个请求响应了
  201, id 1, title something，针对最后两个请求响应了 200, id 1, title something。


  `DELETE` 用于移除由请求 URI 标识的资源。与 `PUT` 一样，`DELETE` 操作是幂等的，这意味着重复调用该资源上的 `DELETE` 端点不会改变结果，但假设删除成功，第二次调用将返回
  404。


  ![](img/471370_2_En_6_Figd_HTML.jpg)


  一张图表说明了通过请求和响应进行的客户端-服务器通信。客户端发送了 2 个针对 songs/1 的 DELETE 请求。服务器针对第一个请求响应了 200 状态码，针对第二个请求响应了
  404 状态码。


  `OPTIONS` 通常用于 CORS 请求^(⁸⁵)。对 CORS 的深入探讨超出了本书的范围；它是一种通过 HTTP 头实现的安全机制，告诉浏览器允许在一个源上运行的应用程序拥有访问来自不同源的选定资源的权限。在现实世界中，一种常见的基于
  Web 的攻击媒介是注入恶意 JavaScript 代码，这些代码可能会攻击你拥有所需访问权限的其他域。因此，最佳实践是将允许访问你 API 的外部代码范围限制在一个批准的域名列表中。我们不打算为
  `OPTIONS` 包含序列图，即使是很小的一个，因为它超出了本章的范围。


  以上（希望）是关于 HTTP 和 REST 中有用方法的合适但简明的入门介绍，接下来让我们通过创建第一个 REST 端点将它们付诸实践。




  ## 使用 MVC 开发我们的第一个端点


  在进一步解释了 REST 涉及的概念之后，让我们开始构建一些端点。最容易解释的是一个简单的 `GET` 请求。以下代码片段将处理发送到类似 [`http://api.bandgateway.com/songs?artist=threadbare%20loaf`](http://api.bandgateway.com/songs?artist=threadbare%20loaf)
  的 URI 的任何请求。当 Spring 返回查询参数时，它会被 URL 解码，因此 `threadbare%20loaf` 将变成 `threadbare loaf`，中间有一个
  ASCII 空格。URI 中允许使用特定的字符，以便于传输。这些字符由 RFC 3986 第 2 节 ([`https://tools.ietf.org/html/rfc3986`](https://tools.ietf.org/html/rfc3986))
  定义，通常包括 US-ASCII 字母数字字符，以及在 URI 字符串中具有特定含义的几个保留字符。如果所表示的字符不符合规范，则会使用代表该字符的 US-ASCII
  码进行百分号编码。


