  模块时，这些 Servlet 会自动设置为响应由 `@WebServlet` 注解指定的 URL 模式——即 `/vote` 和 `/songs`。这意味着当我们使用
  `jetty:run` 运行 `anno` 应用时，这些 Servlet 已经处于活动状态——尽管除非我们放置了 `ServletContextListener`，否则它们无法正常工作。


