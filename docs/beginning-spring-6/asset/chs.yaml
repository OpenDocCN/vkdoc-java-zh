  \ 为我们提供了一种更简单的方法来获得 Spring 更丰富的功能集，并提供了一套集成的服务，旨在部署正在运行的应用程序，而无需依赖传统的 Jakarta EE\
  \ 服务（如 Apache Tomcat）。\n\n**微容器**有多种定义，但在上下文中，它是一个自包含的应用程序，可以表示为单个工件，部署在虚拟机中。这在\
  \ Java 的上下文中听起来有点奇怪，因为 Java 本身就在虚拟机中运行；那么，难道每个应用程序不都符合“微容器”的条件吗？\n\n答案是“……​也许吧”。然而，“微容器”更常见的用法是指具有单一用途的应用程序，例如“运行乐队网关应用程序”，在其自己的虚拟机内运行（因此，是一个虚拟机在另一个虚拟机内运行），例如\
  \ Docker 容器。\n\n\n\n## 什么是 Spring Boot？\n\nSpring Boot ([`https://spring.io/projects/spring-boot`](https://spring.io/projects/spring-boot))\
  \ 的定义方式多种多样，就像 Spring 本身一样。\n\n其核心是一个项目，它将许多最常用的 Spring 组件整合到一个统一的生态系统中，使得依赖管理更加容易，同时提供了一个可执行环境，使得无需容器即可轻松部署。\n\
  \n虽然随着章节项目的推进，我们添加了越来越多的模块，但到目前为止，我们还没有遇到太多相互关联的依赖关系，以至于需要费力去追踪依赖中的**问题**。一直以来，我们都专注于每一章的主题，因此能够将依赖列表保持在相当精简的程度。即便如此，我们也遇到了一些小问题——不过我们无需处理它们，因为它们非常微小，而且我们的工具实际上已经帮我们修复了。\n\
  \n假设我们依赖一个库——为了便于讨论，我们称它为 `spring-foobar`。这个项目名称完全是虚构的。假设这个库本身有传递性依赖，比如 `guava`、`slf4j-api`\
  \ 和 `spring-webmvc`。问题是：*哪个* `spring-webmvc`？如果我们**自己**也依赖了 `spring-webmvc`，那么 `spring-foobar`\
  \ 的依赖（比如 `spring-webmvc` 3.1^(⁸⁷)）和*我们*的依赖（可能是 `spring-webmvc` 6.1.0）之间就可能存在冲突。\n\
  \n无论我们使用什么构建系统，我们的构建脚本通常都会“胜出”，并且像 Maven 和 Gradle 这样的构建系统能够在必要时专门排除传递性依赖，以防它们产生混淆。然而，还有另一种可能性：我们可以在构建中使用物料清单（BOM），它整合了一系列相关的依赖，而不是挑选特定的版本。\n\
  \n这样做的结果是，我们最终会得到一个更一致、更稳定的构建。\n\n通过 Spring Boot 父项目，我们将许多 Spring 依赖合并到一个参考列表（即物料清单）中，从而一举消除了这些潜在问题。这对我们的库声明和测试都有影响，因为几乎所有东西都神奇地可用了。^(⁸⁸)\n\
  \n但这还不是全部。\n\nSpring Boot 旨在让你能够*无需*像 Apache Tomcat 这样的容器即可使项目可执行。你仍然可以以完全相同的方式编写控制器和\
  \ Spring Bean，但 Spring Boot 可以作为一个常规的可执行 Jar 文件运行，而不是启动一个 Tomcat 实例并将你的 Web 应用程序部署到其中（这是我们使用\
  \ `mvn jetty:run` 时或多或少假装执行的过程）。它自身嵌入了一个 Web 容器（默认是 Tomcat）并进行管理；它还管理日志记录、数据库连接（和数据库设置）、配置、指标以及其他事项。\n\
  \n这简直方便得不得了。\n\n## 设置项目\n\n实际设置一个 Spring Boot 项目相当简单。在 Maven 中，它涉及一个插件和一个初始依赖（可以选择配置一个可执行\
  \ jar）——之后，几乎所有事情都通过约定来完成，**包括**一个基本配置。让我们再走一遍“Hello, World”应用程序的流程，只是为了展示我们需要的部分——请注意，我们将在本章中逐步添加更多内容。\n\
  \n首先，当然，我们需要创建源代码结构和 `pom.xml` 本身。源代码结构与迄今为止我们看到的其他章节相同，包含一个 `main` 目录和一个 `test`\
  \ 目录；我们的 `main` 目录包含一个 `java` 目录和一个 `resources` 目录。（我们将在本章后面使用 `resources` 来添加静态内容，只是为了说明如何创建一个“用户界面”——这个术语在本书中应用得非常宽泛。）\n\
  \n```\nmkdir -p chapter07/src/main/java/com/bsg6/chapter07\nmkdir -p chapter07/src/main/resources\n\
  mkdir -p chapter07/src/test/java/com/bsg6/chapter07\n清单 7-1\n使用 POSIX 命令创建目录结构\n\
  ```\n\n我们的 `pom.xml` 相当简洁——这在构建脚本中是一件好事。需要注意以下几点：\n\n1.  我们包含了一个构建插件 `spring-boot-dependencies`，它为后续的依赖提供了版本信息。\n\
  \n2.  `spring-boot-starter-web` 依赖，其版本来自 `boot` 插件——所以我们不必（通常也不想）指定任何东西（它会从插件中获取）。\n\
  \n这种结构在 Spring Boot 应用程序中非常非常常见——如果你愿意，你甚至可以复制粘贴这个作为 Spring Boot 项目的起始模板。（需要说明的是，我们将在本章后面修改这个脚本，以添加一些测试所需的功能。）\n\
  \n需要说明的是，这并非什么特殊信息或行业秘闻——Spring Boot 自己的文档以及几乎所有其他 Spring Boot 参考资料都会向你展示几乎完全相同的内容。\n\
  \n```\n\n4.0.0\n\ncom.apress\nbsg6\n1.0\n\nchapter07\n1.0\nwar\n\norg.springframework.boot\n\
  spring-boot-starter-web\n\norg.springframework.boot\nspring-boot-starter-test\n\
  test\n\norg.springframework.boot\nspring-boot-maven-plugin\n${springBootVersion}\n\
  \n清单 7-2\nchapter07/pom.xml\n```\n\n## 检查基础\n\n现在我们已经设置好了项目结构，可以创建我们的入口点了，我们将其命名为\
  \ `Chapter7Application`。它本身不会执行任何特定的代码——它将加载一个配置（通过 `@SpringBootApplication` 注解，这个注解有特殊含义，我们将在后面几段中看到）——并启动一个\
  \ Web 容器，同时为我们创建许多 Bean，用于指标和其他服务。我们的应用程序要做的事情很简单：声明 Bean 和控制器，并确保它们对应用程序类可见（通过位于同一个包树中，即包名以\
  \ `com.bsg6.chapter07` 开头，包括 `com.bsg6.chapter07` **下**的任何包）。这些服务将自动提供给任何需要它们的组件，我们将在后面看到。\n\
  \n### 构建应用程序\n\n```\npackage com.bsg6.chapter07;\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\n@SpringBootApplication\n\
  public class Chapter7Application {\npublic static void main(String[] args) {\nSpringApplication.run(Chapter7Application.class,\
  \ args);\n}\n}\n清单 7-3\nchapter07/src/main/java/com/bsg6/chapter07/Chapter7Application.java\n\
  ```\n\n### 构建传输对象\n\n当然，如果没有一个实际的控制器作为 HTTP 端点，这并没有什么用，所以让我们也创建一个简单的问候服务，以确保所有部分都能协同工作。首先，我们将创建一个\
  \ `Greeting`——一个包含内容的对象——我们可以从 REST 端点提供它。\n\n注意使用了 `Objects.equals()` 和 `Objects.hash()`\
  \ 等方法——这些是早在 Java 1.7 中引入的实用方法，用于帮助生成哈希码和判断相等性。\n\n如果你跳过了第 6 章中关于 REST 的概念，现在可能是回去复习的好时机。如果你不想这样做，也没关系——基本上，我们是在\
  \ HTTP `GET` 请求后面托管一个资源。\n\n```\npackage com.bsg6.chapter07;\nimport java.util.Objects;\n\
  public class Greeting {\nString message;\npublic Greeting(String message) {\nthis.message\
  \ = message;\n}\npublic Greeting() {\n}\npublic String getMessage() {\nreturn message;\n\
  }\npublic void setMessage(String message) {\nthis.message = message;\n}\n@Override\n\
  public boolean equals(Object o) {\nif (this == o) {\nreturn true;\n}\nif (!(o instanceof\
  \ Greeting)) {\nreturn false;\n}\nGreeting greeting = (Greeting) o;\nreturn Objects.equals(getMessage(),\
  \ greeting.getMessage());\n}\n@Override\npublic int hashCode() {\nreturn Objects.hash(getMessage());\n\
  }\n}\n清单 7-4\nchapter07/src/main/java/com/bsg6/chapter07/Greeting.java\n```\n\n\n\
  \n### 实际执行“问候”\n\n既然我们有了一个可传递的对象，接下来创建`GreetingController`，其概念与第 6 章的`GreetingController`极为相似。^(⁸⁹)\
  \ 我们将添加一两个特殊情况：首先，当未提供姓名时，我们会有一个通用问候语；其次，我们的控制器不会识别“隐形人”（在 1933 年恐怖电影中名为“杰克·格里芬”）的姓名。\n\
  \n```\npackage com.bsg6.chapter07;\nimport org.springframework.web.bind.annotation.PathVariable;\n\
  import org.springframework.web.bind.annotation.RequestMapping;\nimport org.springframework.web.bind.annotation.RestController;\n\
  @RestController\npublic class GreetingController {\n@RequestMapping(value = {\"\
  /greeting/{name}\", \"/greeting/\"})\nGreeting greeting(@PathVariable(required =\
  \ false) String name) {\nString object = name != null ? name : \"world\";\n/* Jack\
  \ Griffin is the name of the \"Invisible Man.\" */\nif (object.equalsIgnoreCase(\"\
  jack griffin\")) {\nreturn new Greeting(\"I don't know who you are.\");\n} else\
  \ {\nreturn new Greeting(\"Hello, \" + object + \"!\");\n}\n}\n}\n代码清单 7-5\nchapter07/src/main/java/com/bsg6/chapter07/GreetingController.java\n\
  ```\n\n需要指出几点：\n\n*   `@RequestMapping` 表示该端点将处理多种 HTTP 方法的响应，因此我们既可以向此端点发送`POST`请求，也可以发送`GET`请求，并且它会以相同方式响应。如果我们想限制\
  \ HTTP 方法，可以使用`@GetMapping`或`@PostMapping`等注解。\n\n*   我们指定了多个路径——一个包含`{name}`，另一个不包含。这是为了处理未提供姓名的情况，这样我们就可以用同一个端点响应`/greeting/World`和`/greeting`。这种做法并不特别明智，因为`POST`接受不同类型的数据，而我们却假设所有\
  \ HTTP 请求都得到相同处理。\n\n*   我们使用`@PathVariable`注解映射参数类型，并指定该参数不是必需的（因为默认是必需的）。如果我们没有告诉\
  \ Spring 该参数是可选的，那么在未提供该值时就会抛出异常。\n\n### 使用 Spring Boot 进行测试\n\n当然，如果我们不知道控制器或服务是否正常工作，那么拥有它们就没有意义，因此我们为其创建一个测试，用几个示例输入及其预期输出来运行。实际上，这里有两种方法可以采用；一种测试方法是直接对端点方法进行方法调用来测试控制器。然而，这忽略了端点本身的许多功能。让我们快速看一下那段代码，以便了解我们在说什么。\n\
  \n```\n@Test(dataProvider = \"greetingData\")\npublic void testDirectGreeting(String\
  \ name, String greeting) {\nassertEquals(\ngreetingController.greeting(name).getMessage(),\n\
  greeting);\n}\n代码清单 7-6\nchapter07/src/test/java/com/bsg6/chapter07/TestGreetingController.java\n\
  ```\n\n我想，这段代码没问题，它实际上验证了控制器的 Java 代码是否按预期工作。然而，我们想要做的是通过 HTTP 发出调用，以确保参数转换和 URL\
  \ 映射正常工作，并且我们能够以正确的形式获取返回的对象。只要允许 Spring Boot 在测试中注入一个用于发出 REST 调用的对象，并构建实际的端点，我们就可以做到这一点。为了发出调用，我们使用`TestRestTemplate`，它将允许我们从端点获取`ResponseEntity<Greeting>`。`ResponseEntity`使我们能够检查\
  \ REST 调用的实际结果——HTTP 状态码等——并返回一个我们可以像之前测试中那样检查的对象。这意味着我们需要更多代码来实际验证调用的结果，但这没关系；我们实际上对这些事情感兴趣。（如果我们对\
  \ HTTP 状态不感兴趣，可以使用`TestRestTemplate.getForObject()`代替，它会直接返回`Greeting`本身，而忽略`ResponseEntity`包装器。）以下是完整且可运行的`TestGreetingController`类，以展示具体内容。\n\
  \n```\npackage com.bsg6.chapter07;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.boot.test.context.SpringBootTest;\nimport org.springframework.boot.test.web.client.TestRestTemplate;\n\
  import org.springframework.boot.test.web.server.LocalServerPort;\nimport org.springframework.http.HttpStatus;\n\
  import org.springframework.http.ResponseEntity;\nimport org.springframework.test.context.testng.AbstractTestNGSpringContextTests;\n\
  import org.testng.annotations.DataProvider;\nimport org.testng.annotations.Test;\n\
  import static org.testng.Assert.assertEquals;\n@SpringBootTest(webEnvironment =\
  \ SpringBootTest.WebEnvironment.RANDOM_PORT)\npublic class TestGreetingController\
  \ extends AbstractTestNGSpringContextTests {\n@Autowired\nprivate GreetingController\
  \ greetingController;\n@LocalServerPort\nprivate int port;\n@Autowired\nprivate\
  \ TestRestTemplate restTemplate;\n@DataProvider\nObject[][] greetingData() {\nreturn\
  \ new Object[][]{\nnew Object[]{null, \"Hello, world!\"},\nnew Object[]{\"World\"\
  , \"Hello, World!\"},\nnew Object[]{\"Andrew\", \"Hello, Andrew!\"},\nnew Object[]{\"\
  Jack Griffin\", \"I don't know who you are.\"}\n};\n}\n@Test(dataProvider = \"greetingData\"\
  )\npublic void testRestGreeting(String name, String greeting) {\nString url = \"\
  http://localhost:\" + port + \"/greeting/\" +\n(name != null ? name : \"\");\nResponseEntity\
  \ result =\nrestTemplate.getForEntity(url, Greeting.class);\nassertEquals(result.getStatusCode(),\
  \ HttpStatus.OK);\nassertEquals(result.getBody().getMessage(), greeting);\n}\n@Test(dataProvider\
  \ = \"greetingData\")\npublic void testDirectGreeting(String name, String greeting)\
  \ {\nassertEquals(\ngreetingController.greeting(name).getMessage(),\ngreeting);\n\
  }\n}\n代码清单 7-7\nchapter07/src/test/java/com/bsg6/chapter07/TestGreetingController.java\n\
  ```\n\n我们现在**可以**实际运行测试，并执行这四个测试；现在我们知道控制器工作正常了。\n\n\n\n### Spring Boot 中的配置\n\n\
  最后，我们是否需要创建某种额外的配置呢？\n\n事实证明，不需要。（至少目前不需要。）`@SpringBootApplication` 注解实际上隐含了自动配置（因此连接会自动完成，并为我们生成大量基础设施）、对同一包（以及该包“下”的子包）中带有该注解的类进行组件扫描（因此\
  \ `com.bsg6.chapter07` 中的所有类都会被扫描，以检查它们是否为 Spring Bean），并且还隐式地包含了一个配置引用——所以，除非我们做一些非常规的操作，否则\
  \ Spring Boot 会自动识别当前包中所有被引用的 Bean，包括包含 Java 配置的类。实际上，我们的“Hello, World”Web 服务本身已经完成了。\n\
  \n在本章中，我们已经多次提到包树，即扫描发生在 `com.bsg6.chapter07` 及其“下”的子包中（如果有的话）。不过，值得记住的是，包是**按层级命名**的，虽然把它们想象成层级结构很方便，但它们实际上并不是真正的层级结构；你不能\
  \ `import` 一个包树，只能导入特定的包。\n\n你必须逐个导入每个包。\n\n因此，当我们说扫描发生在“包树”中时，请注意它实际上是在遍历具有共同前缀的包；它并不是真正的树。\n\
  \n如果我们告诉 Maven 在 `pom.xml` 中使用 `mvn -pl chapter07 package` 打包 war 文件，Maven 将构建一个我们可以直接运行的可执行归档文件。它不像\
  \ Java 中许多可执行包那样是 `.jar` 文件，但它同样可以工作。\n\n```\nmvn -pl chapter07\njava -jar chapter07/target/chapter07-1.0.war\n\
  代码清单 7-8\n构建并运行我们的«Hello, World»容器\n```\n\n在启动时输出大量日志信息（这应该只需要几秒钟）之后，我们可以在浏览器中打开\
  \ `http://localhost:8080/greeting/Joe`，然后我们的应用程序会热情地（甚至可以说是“深情地”）向我们打招呼。\n\n![](img/471370_2_En_7_Fig1_HTML.jpg)\n\
  \n一个网页浏览器窗口的截图，显示了一个托管在 localhost:8080/greeting/Joe 的网页。页面主体区域显示了文本：{ \"message\"\
  : \"hello, Joe!\" }\n\n图 7-1\n\n运行应用程序\n\n### 使用 Spring Boot 处理静态内容\n\n同样值得注意的是，只要我们将静态内容放在构建树中的\
  \ `src/main/resources/static` 目录下，Boot 就可以提供静态内容服务。（实际上还不止这些：默认情况下，静态内容可以从 `/static`、`/public`、`/resources`\
  \ 甚至 `/META-INF/resources` 提供——是的，你也可以修改这些路径，尽管不建议这样做。在不增加更多混乱的情况下，拥有**四个**“标准位置”本身就很有趣了。）\n\
  \n让我们添加一个 `hello-boot.html` 页面，它将允许我们实际从 HTML 页面**发起**一个 REST 调用，只是为了演示一个端到端的过程。\n\
  \n这并不是对任何富客户端编程实践的推荐。这几乎可以说是能制作出的最简单的“富客户端”了，建议读者阅读 Apress 出版的众多关于 HTML 用户界面的优秀书籍，而不是将这个原始示例视为正确设计和实践的指导。\n\
  \n我们的 HTML 页面将包含的内容相当简单：一个通过简短 JavaScript 函数提交数据的 HTML 表单、JavaScript 代码本身，以及一个用于渲染结果的占位符。JavaScript\
  \ 将使用 JQuery（[`https://jquery.com/`](https://jquery.com/)）向我们的端点发起 REST 调用，就像我们的测试所做的那样，并且它会修改占位符，逐字渲染来自\
  \ `GreetingController` 的数据。\n\n```\n\nHello, World\n\nfunction submitForm() {\n\
  $.get('http://localhost:8080/greeting/'+\n$('#helloform input[name=name]').val(),\n\
  function(data) {\n$(\"#greeting\").text(data.message);\n},\n'json');\n};\n\np#greeting\
  \ {\nfont-family: \"Andale Mono\",monospace;\n}\n\nHello, what is your name?\n\n\
