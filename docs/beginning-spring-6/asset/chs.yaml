  \n```\npackage com.bsg6.chapter03.model;\nimport java.util.*;\npublic class Artist\
  \ {\nprivate String name;\nprivate Map songs=new HashMap();\npublic Artist() {\n\
  }\npublic Artist(String name) {\nsetName(name);\n}\npublic String getName() {\n\
  return name;\n}\npublic void setName(String name) {\nthis.name = name;\n}\npublic\
  \ Map getSongs() {\nreturn songs;\n}\npublic void setSongs(Map songs) {\nthis.songs\
  \ = songs;\n}\n@Override\npublic boolean equals(Object o) {\nif (this == o) return\
  \ true;\nif (!(o instanceof Artist)) return false;\nArtist artist = (Artist) o;\n\
  return Objects.equals(getName(), artist.getName());\n}\n@Override\npublic int hashCode()\
  \ {\nreturn Objects.hash(getName());\n}\n@Override\npublic String toString() {\n\
  return new StringJoiner(\", \", Artist.class.getSimpleName() + \"[\", \"]\")\n.add(\"\
  name='\" + name + \"'\")\n.add(\"songs=\" + songs)\n.toString();\n}\n}\n清单 3-4\n\
  chapter03/src/main/java/com/bsg6/chapter03/model/Artist.java\n```\n\n#### 标准化器接口\n\
  \n这是一个简单的单访问方法接口，通过它我们可以以某种方式转换输入。默认的转换是去除输入字符串两端的空白字符，但实现类显然可以改变其行为。\n\n这只是一个*接口*。它有一个`transform`方法的默认实现；我们本可以将其做成一个基类，但我们选择将其做成接口，以便在本章后面用它来演示\
  \ Spring 的一些概念。\n\n```\npackage com.bsg6.chapter03;\npublic interface Normalizer\
  \ {\ndefault String transform(String input) {\nreturn input.trim();\n}\n}\n清单 3-5\n\
  chapter03/src/main/java/com/bsg6/chapter03/Normalizer.java\n```\n\n\n\n#### 音乐服务\n\
  \n音乐服务 API 本身通过一个单一接口呈现。在实际应用中，更好的做法是将与 `Artist` 相关的 API 调用拆分到 `ArtistService` 中，将其他\
  \ API 调用拆分到 `SongService` 中，然后让 `MusicService` 委托给*这些*接口的具体实现。不过，我们最初的修订版将侧重于配置的不同方面，而非对象设计。^(⁴⁵)\n\
  \n该接口本身很简单：\n\n```\npackage com.bsg6.chapter03;\nimport com.bsg6.chapter03.model.Song;\n\
  import java.util.List;\npublic interface MusicService {\nList getSongsForArtist(String\
  \ artist);\nList getMatchingSongNamesForArtist(String artist, String prefix);\n\
  List getMatchingArtistNames(String prefix);\nSong getSong(String artist, String\
  \ name);\nSong voteForSong(String artist, String name);\n}\n清单 3-6\nchapter03/src/main/java/com/bsg6/chapter03/MusicService.java\n\
  ```\n\n敏锐的读者可能会想：“为什么不用 `Set` 而用 `List` 来存储歌曲名称或艺术家？” 这是个好问题！原因在于——如果我们稍微展望一下未来——我们实际上是在返回有序的结果。这些结果是唯一的，这使得\
  \ `Set` 可行——但结果是有序的——而 Java 的 `Set` 实现**可以**是有序的（参见 `TreeSet`），但这种结构比简单的 `List`\
  \ 更复杂。对于这些类的外部使用者来说，`List` 代表了预期的访问方式，而 `Set` 则不然，因此我们在这里选择了 `List`，即使我们可以让 `Set`\
  \ 工作。\n\n为了测试目的，我们还需要另一个接口——`Resettable`。^(⁴⁶) 这允许我们将一个组件标记为可重置——这在测试过程中对我们很有用。\n\
  \n有多种方法可以实现类的重置。这里恰好使用了一个接口来向其他类暴露 `reset()` 方法，因此它满足了一些面向对象的设计要求，但实际上贡献的价值相当有限。它只是为了测试方便，尤其是当我们还没有探索从\
  \ Spring 获取的引用范围时——我们将在第 4 章介绍 `prototype` 时进一步探讨。\n\n```\npackage com.bsg6.chapter03;\n\
  public interface Resettable {\nvoid reset();\n}\n清单 3-7\nchapter03/src/main/java/com/bsg6/chapter03/Resettable.java\n\
  ```\n\n这里没什么复杂的——我们只是希望实现能够被轻松标记为可重置，并且我们想知道实际触发重置的入口点。既然我们并不疯狂，我们就将这个方法命名为 `reset()`。\n\
  \n我们还将构建一个基类，在不同程度上实现 `MusicService` 和 `Resettable` 中的每个方法。这个类会比它实际应有的样子更冗长一些，因为它必须预见到正常实现本不需要处理的情况。让我们来看一下它，然后讨论它在做什么以及为什么这么做。\n\
  \n```\npackage com.bsg6.chapter03;\nimport com.bsg6.chapter03.model.Artist;\nimport\
  \ com.bsg6.chapter03.model.Song;\nimport java.util.*;\nimport java.util.function.Function;\n\
  import java.util.stream.Collectors;\npublic abstract class AbstractMusicService\
  \ implements MusicService, Resettable {\nprivate Map bands = new HashMap();\nprotected\
  \ String transformArtist(String input) {\nreturn input;\n}\nprotected String transformSong(String\
  \ input) {\nreturn input;\n}\n@Override\npublic void reset() {\nbands.clear();\n\
  }\nprivate Artist getArtist(String name) {\nString normalizedName = transformArtist(name);\n\
  return bands.computeIfAbsent(normalizedName,\ns -> new Artist(normalizedName));\n\
  }\n@Override\npublic Song getSong(String artistName, String name) {\nArtist artist\
  \ = getArtist(artistName);\nString normalizedTitle = transformSong(name);\nreturn\
  \ artist\n.getSongs()\n.computeIfAbsent(normalizedTitle, Song::new);\n}\n@Override\n\
  public List getSongsForArtist(String artist) {\nList songs = new ArrayList(\ngetArtist(artist)\n\
  .getSongs()\n.values()\n);\nsongs.sort(Song::compareTo);\nreturn songs;\n}\n@Override\n\
  public List getMatchingSongNamesForArtist(String artist,\nString prefix) {\nString\
  \ normalizedPrefix = transformSong(prefix)\n.toLowerCase();\n/**\n* 这是一个有趣的操作！\n\
  *\n* 我们获取艺术家的歌曲，这些歌曲存储在一个映射中。\n* 然后我们只获取映射的键，这是我们关心的全部内容。\n* 接下来，我们想要在流中处理这些键...\n\
  * 我们通过查找以我们的前缀开头的标题来过滤名称。\n* 然后按字母顺序排序\n* 最后以列表形式返回。\n*/\nreturn getArtist(artist)\n\
  .getSongs()\n.keySet()\n.stream()\n.map(this::transformSong)\n.filter(name -> name\n\
  .toLowerCase()\n.startsWith(normalizedPrefix))\n.sorted(Comparator.comparing(Function.identity()))\n\
  .collect(Collectors.toList());\n}\n@Override\npublic List getMatchingArtistNames(String\
  \ prefix) {\nString normalizedPrefix = transformArtist(prefix)\n.toLowerCase();\n\
  return bands\n.keySet()\n.stream()\n.filter(name -> name\n.toLowerCase()\n.startsWith(normalizedPrefix))\n\
  .sorted(Comparator.comparing(Function.identity()))\n.collect(Collectors.toList());\n\
  }\n@Override\npublic Song voteForSong(String artistName, String name) {\nSong song\
  \ = getSong(artistName, name);\nsong.setVotes(song.getVotes() + 1);\nreturn song;\n\
  }\n}\n清单 3-8\nchapter03/src/main/java/com/bsg6/chapter03/AbstractMusicService.java\n\
  ```\n\n这个类中有很多内容。\n\n首先，我们有两个方法（`transformSong()` 和 `transformArtist()`），它们除了返回输入参数外什么都不做。这些是功能存根或钩子；扩展\
  \ `AbstractMusicService` 的类可以（并且可能应该）重写它们的行为，可能通过委托给一个 `Normalizer` 实例来实现。这些方法旨在被调用，以确保\
  \ `Song` 和 `Artist` 名称在使用前处于某种一致的形式。\n\n接下来是我们简单的 `reset()` 方法——名副其实，它只是清空了内存中的数据结构。\n\
  \n在规范化方法之后，我们有一个私有方法 `getArtist()`，它将一个 `String` 映射到一个有效的 `Artist` 引用。如果 `Artist`\
  \ 不存在，我们会创建一个实例供将来使用。然后我们在 `getSong()` 中看到相同的模式，主要区别在于 `getSong()` 作为外部 API 的一部分暴露出来。（它满足了规范要求，即能够在不投票的情况下创建一个\
  \ `Song`，作为艺术家的钩子。）\n\n\n\n接下来，我们有一系列方法，用于为 `Artist` 检索排序后的 `Song` 引用集合，并返回匹配名称的列表。在几乎所有情况下，我们都会调用转换方法，以确保名称格式一致（尽管默认情况下这根本不会改变名称）。即使某些方法链看起来很长（例如\
  \ `getMatchingSongNamesForArtist()` 方法，其中*八个*方法连续链式调用，并嵌入了几个额外的链），实际的处理过程却相当简单，而且这些方法中几乎没有哪个会消耗显著的\
  \ CPU 成本。\n\n注意\n\n在 `getMatchingSongNamesForArtist()` 中，`Stream` 的 `sorted()` 方法可能是最耗时的调用。当然，如果你真想确认，可以启动你常用的性能分析器进行检查，而把猜测留给作者和其他此类不靠谱的人。\n\
  \n我们眼尖的读者可能已经注意到一个问题：我们的模型类是可变的（即可以被修改），*并且*我们在这些方法中返回的是代表模型的实际实例。换句话说，一个恶意行为者（或新手程序员）可以从\
  \ `voteForSong()` 获取一首歌，然后调用 `setVotes(400)`——而实际的“数据库”会将那首 `Song` 的投票数改为 400。这并不明智；你不希望无意中传播更改。不过，在这里我们允许这样做，因为这只是纯内存演示，而且代码已经足够复杂，无需再为方法添加复制步骤。就把它当作留给读者的一个练习吧。\n\
  \n注意\n\n如果我们的数据模型实际上存储在辅助存储器中——例如文件、数据库或穿孔卡片中——持久化层可能会有一个与内存引用无关的步骤，因此，错误的更改只会传播到该实例的作用域内。这个问题仅限于内存形式的数据存储。\n\
  \n终于，是时候开始构建一些具体的实现和测试，并用 Spring 将它们连接起来了。^(⁴⁷)\n\n## 通过注解进行配置\n\n在 Spring 中通过注解进行配置非常简单。需要记住的主要事情是，我们要**告诉\
  \ Spring 我们正在使用注解**。你可以通过多种方式实现这一点；我们将使用 XML 来配置注解，因为它很简单（并且反映了我们在第 2 章中学到的内容）。\n\
  \n之后，我们必须记住，Spring 只对*受管理*的对象起作用：这意味着我们可以随意注解一个类，但如果我们不从 Spring 容器（一个 `ApplicationContext`）中获取它，这些注解将毫无意义。\n\
  \nSpring 中的注解通常分为两类：组件声明和装配。组件声明意味着一个类由容器管理，而装配意味着该类拥有由容器注入（或“装配”）的资源。\n\n### 使用\
  \ **@Component** 声明 Spring Bean\n\n要启用组件扫描，我们需要告诉 Spring 去扫描组件。让我们在 `src/test/resources`\
  \ 中创建一系列配置文件中的第一个，名为 `config-01.xml`。这是用于注解的基线 Spring 配置；通常这个文件中会有*稍微*多一点的信息，但这足以满足我们最初的探索。\n\
  \n这个文件中有一行重要的内容：`<context:component-scan base-package=\"com.bsg6.chapter03.mem01\"\
  \ />`。（严格来说，这不完全正确：整个 `<beans...`​`>` 内容也非常重要。大多数人，包括作者在内，都会复制粘贴那部分，除非你使用像 Spring\
  \ Tool Suite^(⁴⁸) 这样的工具，它可以为你构建头部。）这行代码的作用非常简单：它扫描该包及其子包，查找标记了有效组件注解（如 `@Component`、`@Service`、`@Repository`\
  \ 等）的 Bean。（具体含义将在后续章节讨论。）这些 Bean 将被注册到 `ApplicationContext` 中，并且可以被该 `ApplicationContext`\
  \ 管理的任何其他 Spring 组件引用，无论这些组件是否通过 `<component-scan />` 扫描得到。^(⁴⁹)\n\n现在我们已经讨论了这些，让我们来看看\
  \ Spring 配置的第一个版本：\n\n```\n\n清单 3-9\nchapter03/src/test/resources/config-01.xml\n\
  ```\n\n我们还需要两个类才能让这一切有意义。第一个类将是 `AbstractMusicService` 接口的具体实现，它所做的只是向抽象类添加一个 `@Component`\
  \ 注解。（Java 中的抽象类不能被实例化，所以告诉 Spring 一个抽象组件是一个组件将会……很不幸。）\n\n```\npackage com.bsg6.chapter03.mem01;\n\
  import com.bsg6.chapter03.AbstractMusicService;\nimport org.springframework.stereotype.Component;\n\
  @Component\npublic class MusicService1 extends AbstractMusicService {\n}\n清单 3-10\n\
  chapter03/src/main/java/com/bsg6/chapter03/mem01/MusicService1.java\n```\n\n然而，我们还想构建一个测试。我们的第一个测试将非常简单，只测试\
  \ `MusicService` 接口的一小部分功能；我们将用它来*获取*一个 `MusicService`，同时还会快速查看 `ApplicationContext`\
  \ 内部，以了解我们简单的 Spring 配置实际包含什么。\n\n正如我们在第 2 章中看到的，使用 TestNG 的 Spring 感知测试需要继承 `AbstractTestNGSpringContextTests`。我们添加一个类级别的注解\
  \ `@ContextConfiguration`，并引用 `/config-01.xml` 文件，以指定该测试使用该特定配置。让我们看看测试的源文件，然后讨论我们可以从中了解到什么。\n\
  \n\n\n```\npackage com.bsg6.chapter03;\nimport com.bsg6.chapter03.model.Song;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.context.ApplicationContext;\n\
  import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.testng.AbstractTestNGSpringContextTests;\n\
  import org.testng.annotations.Test;\nimport java.util.Arrays;\nimport java.util.HashSet;\n\
  import java.util.Set;\nimport static org.testng.Assert.assertEquals;\nimport static\
  \ org.testng.Assert.assertNotNull;\nimport static org.testng.Assert.assertTrue;\n\
  @ContextConfiguration(locations = \"/config-01.xml\")\npublic class TestMusicService1\
  \ extends AbstractTestNGSpringContextTests {\n@Autowired\nApplicationContext context;\n\
  @Autowired\nMusicService service;\n@Test\npublic void testConfiguration() {\nassertNotNull(context);\n\
