  ```\n\n几点注意事项：\n\n首先，我们有一个用 `@BeforeMethod` 注解的方法。TestNG（以及其他测试框架）提供了在给定测试的不同阶段前后运行特定方法的机制；在这种情况下，我们希望在执行任何标记为\
  \ `@Test` 的方法之前运行 `clearDatabase()`（它会清空数据库，然后用已知数据填充它）。我们也可以在每次测试**之后**运行方法，使用\
  \ `@AfterMethod`，并且我们还有其他可用的注解，例如 `@BeforeClass` 和 `@BeforeTest`，每个都有其自身重要的行为。更多详情请参见\
