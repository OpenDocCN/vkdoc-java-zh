  ## 一个简单的 Spring 应用


  到目前为止我们做了什么？我们在测试中构建了一个“应用程序”，它创建了一个 `Greeter`，并在为其提供可用于测试的 `PrintStream` 实例后，对其进行了测试。我们手动构建了要注入到
  `Greeter` 中的类，并且也手动实例化了实际的 `Greeter` 实现。


  Spring 允许我们自动化几乎所有事情，**但**测试本身除外——我们并不真正希望自动化测试（尽管我想，如果有一个脚手架，我们也可以做到）。我们将让 Spring
  为我们完成所有的对象实例化和注入；其强大之处在于，如果我们想要重定向到不同的东西，我们只需要更改实际注入的对象即可。


  历史上，不使用 Spring 的一个最普遍的理由是其配置，这些配置是用带命名空间的 XML 编写的。


  虽然确实有一种编程式的方法来实现我们的 Spring 上下文，^(³⁵) 但为了本示例的目的，我们将坚持使用 XML 文件。使用构建系统中的约定，我们可以将配置文件放在
  `src/main/resources` 中，并从类路径加载它。


  下面我们文件的头部引入了 Spring 中需要的特定内容，其中包括 bean 的规范。


