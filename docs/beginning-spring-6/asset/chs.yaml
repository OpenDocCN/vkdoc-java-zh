  ## Modulith 简介


  Spring Modulith [`https://spring.io/projects/spring-modulith`](https://spring.io/projects/spring-modulith)
  使我们能够基于模块驱动的领域设计构建结构良好的应用程序。其最有用的功能包括：验证模块化结构、事件发布与消费、单个模块的集成测试，以及根据结构创建文档片段。


  我们将从一贯的起点开始，即 Spring Boot 应用程序，这与我们之前看到的相同。当然，你可以在默认设置之上指定不同的内容，但就我们的需求而言，只需要基础配置。


  ```

  package com.bsg6.chapter11;

  import org.springframework.boot.SpringApplication;

  import org.springframework.boot.autoconfigure.SpringBootApplication;

  @SpringBootApplication

  public class GatewayApplication {

  public static void main(String[] args) {

  SpringApplication.run(GatewayApplication.class, args);

  }

  }

