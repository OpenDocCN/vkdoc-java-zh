  #### 为 Servlet 添加 Spring 上下文


  在 Servlet 中使用 Spring 有几种方式：我们可以使用 Spring 模块，例如 Spring Web（它包含一个 Servlet，作为调度器，用于处理为
  Spring 设计的服务对象^(⁷⁷)，我们实际上已将其作为依赖包含在此处）；或者使用 Spring Boot（它实际上嵌入了自己的 Servlet 引擎）；或者我们可以让
  Web 应用实例化一个 Spring 上下文，并从传统 Servlet 内部将其作为资源进行访问。大多数 Spring 专家可能倾向于使用 Spring Boot，因为
  Boot 的开发和部署模型非常简单，但 Spring Boot 是第 7 章的主题，而非第 5 章；而 Spring Web 也是后续章节（第 6 章）的主题……这意味着我们得先从更基础的方法入手。


  当我们研究 Spring Boot 和 Spring Web（再次说明，分别是第 6 章和第 7 章）时，我们会找到更简单的方法来实现我们即将看到的功能——但本章将让我们深入了解后续章节中幕后发生的事情。


  既然我们已经讨论了这是一种“基础方法”等等，那么**具体**方法是什么呢？


  我们将为两个 Web 应用添加一个 `ServletContextListener`，在这个 `ServletContextListener` 中，我们将实例化一个
  Spring `WebApplicationContext`，并将其存储在整个 Web 应用的应用程序作用域中。当我们需要 Spring 上下文中的资源时，我们将从
  `ServletContext` 中获取——这有点像 Jakarta EE 中的传统 JNDI 模型，正如我们在 `common` 模块的 Servlet 中看到的那样。（当我们研究
  Spring Web 和 Spring Boot 时，我们会看到自动注入依赖的简便方法。）


  让我们来看看这个 `ServletContextListener`，我们将其命名为 `AnnotationContextListener`。


  ```

  package com.bsg6.chapter05;

  import jakarta.servlet.ServletContextEvent;

  import jakarta.servlet.ServletContextListener;

  import jakarta.servlet.annotation.WebListener;

  import org.springframework.context.ApplicationContext;

  import org.springframework.web.context.

  support.AnnotationConfigWebApplicationContext;

  @WebListener

  public class AnnotationContextListener implements ServletContextListener {

  @Override

  public void contextInitialized(ServletContextEvent event) {

  ApplicationContext context = buildAnnotationContext();

  event.getServletContext().setAttribute("context", context);

  }

  private ApplicationContext buildAnnotationContext() {

  AnnotationConfigWebApplicationContext context =

  new AnnotationConfigWebApplicationContext();

  context.scan("com.bsg6.chapter03.mem03");

  context.refresh();

  return context;

  }

  }

  Listing 5-12

  chapter05-anno/src/main/java/com/bsg6/chapter05/AnnotationContextListener.java

  ```


  大部分情况下，这个类非常简单。它在整个类上使用了 `@WebListener`——这告诉 Servlet 容器在**适当的时候**使用此类的实例——并且，鉴于它实现了
  `ServletContextListener`，它将接收与上下文相关的事件。事件只有两个：`contextInitialized`（在应用启动时调用）和 `contextDestroyed`（在应用销毁时调用，如果可能的话）。


  `ServletContextListener` 接口为 `contextInitialized()` 和 `contextDestroyed()` 都提供了默认实现，因此除非我们确实有操作要执行，否则无需实现任何内容。如果
  Servlet 上下文停止，我们没有任何操作需要执行，所以我们不会费心去实现 `contextDestroyed()`。然而，我们希望在 `contextInitialized`
  事件中创建我们的 Spring 上下文。


  顾名思义，`AnnotationConfigWebApplicationContext` 为我们提供了扫描可用组件的能力，就像我们在前几章中看到的 `<context:component-scan
  />` 标签一样。使用这个类，我们可以通过编程方式告诉 Spring 上下文要扫描哪些包以查找可用的注解，这正是 `buildAnnotationContext()`
  方法所做的。^(⁷⁸) 一旦我们有了 `AnnotationConfigWebApplicationContext`，就需要告诉它去哪里查找候选类——在这种情况下，我们复用了第
  3 章中一个基于内存的实现，因此我们提供了一个包名 `com.bsg6.chapter03.mem03`。这个方法实际上接受一个包名数组，并且它实际上接受可变数量的参数；只是碰巧我们这里只需要扫描一个包，但我们可以提供一个逗号分隔的列表，列出我们需要扫描的任意数量的包。


  请注意，这与 Java 配置并不完全相同。如果我们使用 Java 配置而不是构建配置，我们可以用 `@ComponentScan` 标记它——这将完成我们在这里使用
  `@AnnotationConfigWebApplicationContext` 和 `<context:component-scan />` 所做的相同事情。我们将在后续章节中看到它的使用，届时我们实际上会切换到基于
  Java 的配置。


  通常，明智的做法是**精确**扫描你所需的内容，而不是添加整个包树。扫描相当慢；你不会经常执行它（仅在应用程序启动时），但它对 Java 运行时来说仍然相当沉重。如果你实际感兴趣的类不多，请考虑使用带有
  `@Configuration` 注解的类进行编程配置，而不是扫描包。我们在这里进行扫描主要是因为它的代码行数比 Java 配置少，而 Java 配置需要一个带有自身样板代码的类。


  然而，仅仅告诉上下文它**应该**扫描的位置并不会让它实际执行扫描。这是 `context.refresh()` 的作用。在我们完成**那一步**之后，我们从
  `ServletContextEvent` 中获取 `ServletContext`，并将 Spring 上下文作为命名属性存储到 Servlet 上下文中^(⁷⁹)；为简单起见，我们将其命名为“context”。一旦完成，整个
  Web 应用中的任何可执行代码都可以通过名称从 Servlet 上下文中获取 Spring 上下文。


  当我们以这种方式使用 Spring 上下文（将 Spring 上下文显式加载到 Servlet 上下文中）时，我们无法将 Spring 资源自动注入到我们的 Servlet
  中。相反，我们从 Spring 上下文中获取它们。（然而，**从** Spring 上下文中检索到的 bean 将具有自动注入功能——我们使用的特定 `MusicService`
  需要并演示了这一点。）由于我们完全控制实例生命周期（参见第 4 章），我们可以精细地控制创建什么以及何时创建。


  所有这些都非常有用^(⁸⁰)；我们现在可以从 Spring 中获取我们的 `MusicService`，如 `common` 模块中的 Servlet 所示，但我们如何演示它呢？


  当然，通过执行与“Hello, World”Servlet 相同的操作。


