- "# 3. Bean 的配置与声明\n\n在本章中，我们将深入探索 Spring 配置中相当重要的一部分，并将注意力从“Hello, World”转移到一个简单的应用程序上，以便我们能够探索其特性与配置。我们将首先介绍示例应用程序，然后逐步讲解几种不同的配置方式。本章代码量较大，其中许多代码表面上看似重复，但我们将使用一些基类来帮助减少重复倾向。^(³⁸)\n\
  \n## 容器\n\nSpring 改变了 Java 开发人员对应用程序中类结构与设计的思考方式，^(³⁹) 并且完全可以在不借助 Spring 的情况下，以依赖注入的思想来设计应用程序，同时享受这种思维方式带来的好处。然而，无论使用何种框架，运用依赖注入思想的核心机制都是**容器**。\n\
  \n容器负责管理所谓的“托管对象”的实例。例如，第 2 章中的 `HelloWorldGreeter` 就是一个可托管对象（大多数对象都是如此），但只有当它通过\
  \ `ApplicationContext`（即容器）被创建并注入时，才真正处于被管理状态。`ApplicationContext` 是与 Spring 管理的类进行交互的主要入口点，因此当我们提到“上下文”时，通常指的就是它。\n\
  \n由 Spring 容器管理的类，在上下文中被称为“Spring Bean”。\n\n容器不仅创建实例（即 Spring Bean），还通过各种方式（通过构造函数、修改器或访问器^(⁴⁰)）提供对这些实例的引用。整个过程被称为“装配”。\n\
  \n我们将逐步讲解一个示例应用程序的规范，然后开始展示如何使用 Spring 来装配该应用程序。\n\n## 示例应用程序\n\n接下来的这一部分——实际上，是整个标题——与\
  \ Spring 完全无关。没有对 Spring 的依赖，没有 Spring 的引用，没有 Spring 的仪式，除了偶尔提及以提醒我们这是一本关于 Spring\
  \ 的书之外，绝对没有任何相关内容。然而，我们引入这个应用程序是为了提供足够的功能，以便我们能够深入探索 Spring；如果没有这个应用程序及其理解，我们最终只会用八十种不同的方式说“Hello,\
  \ World”。有了这个项目，在后续章节中探索 Spring 特性时，我们就能有一个实际的应用程序作为参考。\n\n假设你是一个名为“Threadbare Loaf”^(⁴¹)\
  \ 乐队的粉丝。如果你想向朋友介绍 Threadbare Loaf，他们可能会想知道应该听哪首歌（或哪些歌）才能了解 Threadbare Loaf 作为艺术家的风格；你可能会推荐他们的首支热门单曲“Someone\
  \ Stole The Flour”，或者他们第二张专辑中的单曲“What Happened to Our First Release?”\n\n这两首歌可以被视为该艺术家的“入门曲”。大多数艺术家都有一首或一组歌曲能够体现乐队的风格和重点；对于滚石乐队，可能是“Satisfaction”或“Jumpin’\
  \ Jack Flash”；对于平克·弗洛伊德，可能是“Money”或“Comfortably Numb”；对于披头士，可能是“Hey Jude”或“Let It\
  \ Be”，等等。\n\n这并不是说艺术家的*其他*歌曲不好，而是这些歌曲可能被认为是吸引他人同样喜欢这支乐队的完美选择。\n\n我们要做的是为应用程序创建一个\
  \ API，允许用户为艺术家推荐“入门曲”，并让其他用户查看哪些歌曲被推荐得最多。这是一个简单的应用程序，我们不会构建完整的用户体验；我们将主要关注应用程序的核心\
  \ API，以说明 Spring 的概念。\n\n我们还将创建许多、许多版本的 API，每个迭代版本都用于演示 Spring 的不同特性。随着我们的推进，API\
  \ 可能会有所改进，但迭代的目标*通常*是演示性的，而不是为了使 API 更“成熟”或功能更全面。\n\n在本书中，该应用程序将被称为“乐队网关”，暗示由 API\
  \ 管理的歌曲是欣赏相关艺术家的“入门歌曲”。\n\n我们最初将考虑数据模型中的两个实体：`Artist` 和 `Song`。\n\n`Artist` 通过名称唯一标识。^(⁴²)\
  \ 只要我们*只*处理音乐，就应该只支持一个具有给定名称的 `Artist`。\n\n`Song` 属于某个 `Artist`，并且*没有*唯一的名称——例如，披头士和史密斯飞船都录制过名为“Come\
  \ Together”的歌曲，这是完全合理的，用户可能会认为这些歌曲是了解这两个乐队的理想入门曲。^(⁴³) 我们还意识到，艺术家可能拥有其他类型的媒体作品作为乐队的“入门曲”，例如视频或其他艺术作品；为简单起见，我们假设*只*管理音频录音，而不管理可能与特定\
  \ `Artist` 相关的视频或绘画等。\n\n我们的应用程序，在其初始形式中，需要支持一些基本的读取操作和两个写入操作。\n\n与*读取*数据相关的操作如下：\n\
  \n*   按流行度排序检索某个艺术家的歌曲（最流行的歌曲是更好的“入门曲”）。\n\n*   检索某个艺术家的歌曲名称（用于自动补全操作）。\n\n*   检索艺术家名称列表（用于自动补全操作）。\n\
  \n此外，我们还需要允许人们**贡献**到我们的数据库：\n\n*   记录某首歌曲的存在。\n\n*   为某首歌曲投票，作为特定 `Artist` 的入门曲。\n\
  \n### 乐队网关的代码\n\n我们至少需要五个类来开始构建我们的 API：我们的模型包含两个类（`Artist` 和 `Song`），我们将创建一个接口（名为\
  \ `Normalizer`），它代表一种方法，用于转换（或“规范化”）API 中的名称，最后，还需要一个 API 接口（`MusicService`）和一个包含模型内存表示的基类（`BaseMusicService`）。\n\
