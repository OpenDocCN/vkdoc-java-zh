  h2\nruntime\n\norg.springframework.boot\nspring-boot-starter-web\n\norg.springframework.boot\n\
  spring-boot-starter-jdbc\n\norg.springframework.boot\nspring-boot-starter-test\n\
  test\n\norg.springframework.boot\nspring-boot-maven-plugin\n${springBootVersion}\n\
  \n清单 8-2\nchapter8/pom.xml\n```\n\n首先，请注意我们包含了 `spring-boot-starter-jdbc`。这将引入 Spring\
  \ 确保其 JDBC 支持和生态系统所需的一切，这意味着我们将获得各种好东西，例如连接池（默认使用 HikariCP^(⁹³)）、测试专用的数据源和数据加载功能（如第\
  \ 7 章所述，使用 `schema.sql` 和 `data.sql`）。\n\n我们想要确保包含的下一个依赖项实际上是最不相关的，因为我们在第 7 章中已经见过它：`spring-boot-starter-web`。我们在这里包含它是因为本章实际上将包含一个完全可用的乐队网关后端。\n\
  \n## 我们的实体和数据模型\n\n我们使用与第 3 章描述且此后一直使用的相同的实体模型。但是，我们想稍微更改一下**数据**模型，以使数据管理更高效。\n\
  \n“实体模型”和“数据模型”有什么区别？嗯，具体来说，它们在很大程度上是可以互换的。没有一个正式的定义可以用来区分“这是实体模型，那是数据模型”。然而，通俗地说——正如这里所使用的——实体模型描述了我们正在处理的事物（实体）之间的整体关系，而数据模型是对实际管理元素的更具体描述。\n\
  \n例如，在一个**实体**模型中，一个 `Artist` 存在（因此，它是一个实体！），并且它有一个 `name`。在一个数据模型中，我们可能会包含一些使处理\
  \ `Artist` 更方便的内容——例如一个生成的主键，或者该 `Artist` 的歌曲数量——这些内容从编程角度来看可能与 `Artist` 相关，但不一定是\
  \ `Artist` 作为概念定义的一部分。\n\n我们的实体模型（再次参见第 3 章）如下所示。\n\n![](img/471370_2_En_8_Fig1_HTML.jpg)\n\
  \n艺术家与歌曲之间的实体关系模型。具有属性 id（整数）的实体 E（艺术家）通过一对多关系分别与具有属性 title（字符串）和 votes（整数）的实体 E（歌曲）相互连接。\n\
  \n图 8-1\n\n实体模型\n\n我们的**数据**模型为实体添加了一些属性，以创建关系并使对象管理更加高效。\n\n![](img/471370_2_En_8_Fig2_HTML.jpg)\n\
  \n艺术家与歌曲之间的数据关系模型。具有属性 id（整数）和 name（字符串）的实体 E（艺术家）通过一对多关系分别与具有属性 id（整数）、artist_id（整数）、title（字符串）和\
  \ votes（整数）的实体 E（歌曲）相互连接。\n\n图 8-2\n\n数据模型\n\n这并不完全描述性——我们没有在模型中包含可空性或大小，但我们也不是**完全**试图构建一个正式的实体模型。我们主要考虑的是如何设计我们的类结构。当你从\
  \ SQL 优先的访问模型出发时（即，当你预期使用 JDBC 访问数据时，正如我们在本章中所做的那样），这是建模数据的“正确方式”；在下一章中，当我们研究 Spring\
  \ Data 时，我们实际上可以先设计类，然后确保它们生成一个可工作的数据库模式，而不是从模式开始并构建一个可工作的类结构。\n\n以下是 `Artist` 类的完整实现。\n\
  \n```\npackage com.bsg6.chapter08;\nimport org.springframework.lang.NonNull;\nimport\
  \ java.util.Objects;\nimport java.util.StringJoiner;\npublic class Artist {\nInteger\
  \ id;\n@NonNull\nString name;\npublic Artist() {}\npublic Artist(@NonNull String\
  \ name) {\nthis.name=name;\n}\npublic Artist(Integer id, @NonNull String name) {\n\
  this.id = id;\nthis.name = name;\n}\npublic Integer getId() {\nreturn id;\n}\npublic\
  \ void setId(Integer id) {\nthis.id = id;\n}\n@NonNull\npublic String getName()\
  \ {\nreturn name;\n}\npublic void setName(@NonNull String name) {\nthis.name = name;\n\
  }\n@Override\npublic String toString() {\nreturn new StringJoiner(\", \", Artist.class.getSimpleName()\
  \ + \"[\", \"]\")\n.add(\"id=\" + id)\n.add(\"name='\" + name + \"'\")\n.toString();\n\
  }\n@Override\npublic boolean equals(Object o) {\nif (this == o) return true;\nif\
  \ (!(o instanceof Artist artist)) return false;\nreturn Objects.equals(getId(),\
  \ artist.getId()) && Objects.equals(getName(), artist.getName());\n}\n@Override\n\
  public int hashCode() {\nreturn Objects.hash(getId(), getName());\n}\n}\n清单 8-3\n\
  chapter8/src/main/java/com/bsg6/chapter08/Artist.java\n```\n\n\n\n细心的读者会注意到`@NonNull`的使用。这引出了一个在前几章中已经提及的有趣观点：Spring\
  \ 会影响你的设计和对象模型，但影响程度完全取决于*你的意愿*。`@NonNull`意味着当 Spring 自身构建模型或对模型应用验证时（例如在`@Controller`中使用或在其他类似场景中），它可以检查验证结果并提示模型是否构建正确。\n\
  \n但当 Spring*不参与*时——或者仅以特定方式参与时——这些注解就毫无作用。毕竟注解是在运行时由代码应用的，除非有东西检查被注解的结构并根据注解采取行动，否则*什么都不会发生*。\n\
  \n因此这些注解是有价值的，但重要的是要注意，它们的存在对*普通代码*而言并不意味着什么——它更多是提供信息，如果我们编写普通的 Java 代码，这些注解对任何事情都没有影响。这里使用的`@NonNull`注解意味着验证机制可以确保没有`null`值通过*验证层*，但\
  \ JVM 本身或执着的程序员仍然可以将值设置为`null`。\n\n现在让我们看看`Song`类是什么样的。\n\n```\npackage com.bsg6.chapter08;\n\
