  *   `/admin_dashboard` – 拥有 `ADMIN` 角色的用户可以访问


  在下面的代码中，我们使用了 Lambda DSL 风格，这使得一切更容易理解。思考上述端点，我们的实现将确保角色和权限与意图相匹配，并且任何未指定的请求将自动要求认证。`HttpSecurity`
  对象使用了构建器模式，因此我们可以确保每一步都返回该对象，并使用 `build` 方法返回一个 `SecurityFilterChain` 实例，以便 Spring
  Security 按照我们定义的意愿执行。


  ```

  @Bean

  public SecurityFilterChain filterChain(HttpSecurity http) throws Exception {

  http

  .authorizeHttpRequests(authorize -> authorize

  .requestMatchers("/login")

  .permitAll()

  .requestMatchers("/dashboard")

  .hasRole("USER")

  .requestMatchers("/admin_dashboard")

  .hasRole("ADMIN")

  .anyRequest()

  .authenticated()

  )

  .formLogin(formLogin -> formLogin

  .loginPage("/login")

  .permitAll()

  );

  return http.build();

  }

