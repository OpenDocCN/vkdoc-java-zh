  ### 带注解类的构造方法


  这就是与 XML 配置不同之处：带注解的类将根据可用的信息被调用，并且对象将按照尽可能满足依赖关系的顺序进行构造。这反映了我们在第 3 章中看到的内容；如果构造方法有一个标记了
  `@Autowired` 的参数，Spring 将查找与该参数类型和限定符（如果有）匹配的类，并在内部构建依赖关系图后，将其注入到构造方法调用中。


  换句话说，如果我们有一个对象 `A` 依赖于对象 `B`，而 `B` 本身又需要一个对象 `C`，那么 Spring 将首先构建 `C`，并使用它来构造 `B`，然后使用
  `B` 来构造 `A`。


  因此，这里实际上没有什么可展示的，因为这与我们在第 3 章中已经看到的内容相同（有关使用注解进行构造方法注入的完整讨论和示例，请参见 3.4 节）。




  ### 在构造之后和销毁之前调用方法


  这里开始变得有趣了。我们不再为 `init-method` 和 `destroy-method` 命名方法，而是通过从 `pom.xml` 文件导入的 `javax.annotation-api`
  工件获得两个注解：`@PostConstruct` 和 `@PreDestroy`。带有这些注解的方法将在对象和上下文生命周期的适当时机被调用，如下面的测试所示。


