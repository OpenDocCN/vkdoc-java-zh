  ## 一个简单的应用程序


  本章的目标是重新审视第 1 章中的“Hello, World”应用程序，但这次我们将检查工具以及驱动设计的思维方式。


  首先，为什么是“Hello, World？”传统上，编程语言（和框架）使用这个应用程序是因为它非常**简单**——这意味着我们有空间专注于诸如整体语法、如何设计、如何构建以及如何运行应用程序之类的事情。“Hello,
  World”让我们可以专注于探索一个“完整程序”的生命周期。^(²⁴)


  对于这样一个简单的应用程序来说，Spring 将会显得异常沉重，而且在第一次迭代中我们甚至不会使用它，但这让我们可以专注于工具和流程，包括测试。^(²⁵) 随着我们的继续，我们将使用
  Spring 将所有内容连接起来——尽管这看起来有点傻——因为这将演示我们如何根据需要移动配置，这是现实场景中必不可少的功能。




  ### 面向痛苦的编程


  在整本书中，我们将一遍又一遍（再一遍）地做简单的事情——你可能会对“Hello, World”感到厌烦，因为我们在本章中会多次用到它。这在一定程度上是因为“Hello,
  World”的熟悉性——它有简单、可知的输入和简单、可知的输出，因此让我们能够专注于**围绕**基本过程的细节，而不是“打招呼”这个过程本身。


  一点历史：“Hello, World”是由克尼汉和里奇在《C 程序设计语言》一书中引入世界的。^(²⁶) 这是一本标志性的编程书籍，也是《计算机程序设计艺术》（高德纳）或《设计模式》（伽马、赫尔姆、约翰逊、弗利赛德斯）等经典编程书籍中最易读的一本。其他书籍也易于理解——它们成为经典自有其道理——但《C
  程序设计语言》因其直截了当、对主题的简单清晰阐述以及出版时机而独树一帜。


  “Hello, World”被用作“健全性检查”——一个非常简单的程序，用于确保编译器和运行时环境正常工作，同时也展示了让一个程序运行并实际产生输出的“最低要求”。


  许多程序员会为其添加功能以展示额外特性；自由软件基金会的“Hello, World”（可在[`www.gnu.org/software/hello/`](http://www.gnu.org/software/hello/)找到）有*184*行代码，展示了命令行解析、许可协议以及
  FSF 关心的其他问题——而可下载的存档文件接近 800K！


  遵循这一历史悠久的传统——还有其他有效的传统吗？——我们将在本书中效仿，通常使用“Hello, World”来确保我们的库按预期工作，然后再添加实际练习本章主题的功能。


  我们还遵循“面向痛苦的编程”这一概念，该术语由内森·马茨在[`http://nathanmarz.com/blog/suffering-oriented-programming.html`](http://nathanmarz.com/blog/suffering-oriented-programming.html)提出。其背后的理念很简单：“先让它可行。再让它优美。最后让它快速。”


  这种思维方式认为，**能运行**的代码优于任何其他类型的代码；你应该首先专注于让你的应用程序**跑起来**。在任何情况下，能运行的代码都优于不能运行的代码，无论不能运行的代码多么漂亮。


  代码的下一个最重要的方面是让它**易于理解**——或者“优美”，或者“简单”。一旦你以某种方式解决了问题（让它运行起来），你很可能比刚开始写代码时更全面地理解了问题。现在你有了能运行的代码，你可以尝试简化你的解决方案，使其更清晰、更易于维护。（顺便说一句，Spring
  在这方面帮了大忙。）在此过程中，如果你发现“更优美”的版本实际上无法运行，嗯……你仍然有你的基线代码，即你在美化之前存在的代码，因此你可以完善清理代码的尝试，直到它也能运行为止。


  最后，让你的代码**快速**。此时，你大概已经用简单的抽象编写了能运行的代码；现在是时候关注代码实际运行效率低下的地方，以便它能正确使用资源。这时你需要用性能分析器检查代码，寻找不必要分配内存的地方（对于
  Java 这类语言来说，短期内存使用用技术术语来说“快如闪电”，所以这问题不大），或者遍历数据结构速度较慢的地方。


  本书重点讨论面向痛苦编程的前两个方面，因为 Java 在让简单代码高效运行方面实际上相当出色，但牢记所有三个关注点仍然值得。


  ## 构建


  本着简洁的原则，我们将使用一个名为 Maven 的开源构建工具。^(²⁷) Maven 是 Java 中流行的两大构建系统之一，另一个是 Gradle（[`https://gradle.org/`](https://gradle.org/)）；本书选择
  Maven，尽管 Gradle 的配置文件更简单，但 Maven 的配置具有更高一致性的优势。


  说实话，Gradle 在很多方面都是一个很棒的构建系统，本书的先前版本也使用过它。然而，Gradle 也正在经历非常活跃的开发，这意味着它不断变化；适用于 Gradle
  5 的技术并不适用于 Gradle 8。我们本可以为本书锁定一个一致的旧版 Gradle，但认为建议读者使用过时的技术并非良策。


  如果你愿意，当然也可以使用 Gradle 来构建本书的源代码；目录结构宽而扁平，非常适合 Gradle。在大多数情况下，Gradle 的构建结构甚至比 Maven
  的项目文件更简短。我们选择了一致性；几乎任何安装了 Maven 的人，无论 Maven 版本如何，都能使用和复制这些项目文件并获得“正确的构建”，而对于 Gradle
  来说，这要难保证得多。


  Maven 为项目使用了一种约定俗成的目录结构。基本上，有一个名为`src`的目录用于存放源文件——其中通常包含两个子目录。`src/main`存放应用程序文件——即构成正在构建的实际程序的文件——而`src/test`包含仅用于测试的文件。`src/main`和`src/test`本身又有不同的子目录；属于应用程序的
  Java 文件会放入`src/main/java`，而用 Java 编写的测试文件则位于`src/test/java`。你可能会有作为构建一部分的静态资源；用于交付的内容会放入`src/main/resources`，而仅用于测试的资源则放入`src/test/resources`。


