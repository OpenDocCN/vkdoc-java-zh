  在本章中，我们了解了 Web 应用程序幕后的情况，包括原始 Servlet、使用 Mustache 进行模板渲染以及从手动填充的 Spring 上下文中获取资源。我们还了解了
  Maven 中的模块如何相互引用。第 6 章将向我们展示如何构建一个功能更全面的乐队网关应用程序，通过从应用程序中移除所有手动调用和转换（以及 Servlet），引导我们进入一个更精简、更现代的
  Web 应用程序开发流程，包括自动化测试。


