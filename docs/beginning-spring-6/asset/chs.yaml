  在前面的章节中，我们已经深入探讨了 XML 配置，因此在本章及后续章节中，我们将不再赘述，而是专注于使用注解来完成所有配置需求。


  为什么？


  基于 Java 的配置在 Java 生态系统中更加简单且更标准化，而且我们倾向于去除那些没有增加任何价值的冗余内容。XML 配置**很有用**，但根据我们在实际项目中的观察（以及我们个人的经验），*大多数*程序员更习惯于*编程*，而将配置作为代码的一部分意味着可以通过
  Java 类路径更轻松地选择配置。^(⁸¹)


  让我们来看一个简单的配置和 MVC 端点是什么样的。在下面的清单中，我们将创建一个简单的控制器，当端点被访问时，它会向最终用户输出一句常见的教程用语。


  ```

  package com.bsg6.chapter06;

  import org.springframework.http.HttpStatus;

  import org.springframework.http.MediaType;

  import org.springframework.http.ResponseEntity;

  import org.springframework.stereotype.Controller;

  import org.springframework.web.bind.annotation.GetMapping;

  @Controller

  public class GreetingController {

  @GetMapping(

  path = "/greeting",

  produces = {MediaType.TEXT_PLAIN_VALUE}

  )

  public ResponseEntity greeting() {

  return new ResponseEntity(

  "Hello, World!",

  HttpStatus.OK

  );

  }

  }

