  \ songRepository\n.findByArtistIdAndNameLikeIgnoreCaseOrderByNameDesc(\nartist.getId(),\n\
  converter.convertToWildCard(songTitle)\n)\n.stream()\n.map(S::getName)\n.collect(Collectors.toList());\n\
  }\n}\n清单 9-12\nchapter09-api/src/main/java/com/bsg6/chapter09/common/BaseMusicService.java\n\
  ```\n\n现在我们已经看到了一组可用于构建应用程序的类。是时候创建本章四个项目中的第二个项目了：`chapter09-test`，它将包含三个代表测试套件的抽象类。与\
  \ `BaseMusicService` 一样，它们不算特别短（但也不算特别长！）——最终的结果是，我们在 JPA 和 MongoDB 项目中的“测试代码”将非常简短（实际上主要由类声明组成）。\n\
  \n### `chapter09-test` 项目\n\n`chapter09-test` 项目与 `chapter09-api` 类似，不是一个“真正的”Spring\
  \ Boot 项目；它是一个供 Spring Boot 项目使用的构件。它有点独特，因为它旨在被导入到其他模块的**测试**作用域中，因此它通过 `src/main/java`\
  \ 导出所有内容。\n\n`chapter09-test` 的 `pom.xml` 与 `chapter09-api` 的 `pom.xml` 非常相似。\n\n\
  ```\n\n4.0.0\n\ncom.apress\nbsg6\n1.0\n\nchapter09-test\n1.0\n\norg.springframework.data\n\
  spring-data-bom\n${springDataBomVersion}\nimport\npom\n\ncom.apress\nchapter09-api\n\
  1.0\n\norg.springframework.boot\nspring-boot-starter-test\n\norg.springframework\n\
  spring-test\n\norg.testng\ntestng\n\norg.springframework.boot\nspring-boot-maven-plugin\n\
  ${springBootVersion}\n\n清单 9-13\nchapter09-test/pom.xml\n```\n\n请注意，它显式依赖了 TestNG、`spring-boot-starter-test`\
  \ 和 `spring-test`——并且它们没有被设置为 `test` 作用域。当我们将此项目导入到 `chapter09-jpa` 和 `chapter09-mongo`\
  \ 时，我们会在 `test` 作用域下进行导入，因此 TestNG 和 `spring-boot-starter-test` 依赖项对于下游依赖项将处于测试作用域，但对于*这个*项目，我们希望它们位于主编译类路径中。由于我们以\
  \ `test` 作用域将该项目导入到*其他*项目中，任何传递性依赖也将以 `test` 作用域导入。这样我们就不会污染类路径。\n\n`chapter09-test`\
  \ 中包含三组测试：`BaseArtistRepositoryTests`、`BaseSongRepositoryTests` 和 `BaseMusicServiceTests`。每一个都相当简单；目标是执行测试目标，但由\
  \ Spring 注入服务的实现。\n\n因此，当我们**使用**这些测试时，我们将有一个引用必要服务的 Spring 配置，并且这些类将使用所提供的任何内容。与\
