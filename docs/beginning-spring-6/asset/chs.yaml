  ## Batch 简介


  Batch [`https://spring.io/projects/spring-batch`](https://spring.io/projects/spring-batch)
  是一组轻量级函数，其构建具有足够的健壮性，可以集成到企业环境中。Batch 提供的功能包括：


  *   事务管理

  *   基于块的处理

  *   声明式 I/O

  *   启动/停止/重启

  *   重试/跳过

  *   通过 Spring Cloud Data Flow [`https://dataflow.spring.io/`](https://dataflow.spring.io/)
  提供的基于 Web 的管理界面


