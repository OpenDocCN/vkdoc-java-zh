  ## 附加作用域


  Spring 就像一个由曲折通道组成的迷宫，全都大同小异^(⁶⁴)，自然会在本章讨论的作用域（`prototype` 和 `singleton` 作用域）之外增加更多内容——这主要是因为附加作用域存在于
  Spring Web 的上下文中，将在第 6 章中介绍。作用域的规则不变，但名称和可达性会变；例如，一个组件可以被标记为在单个 HTTP 请求的上下文中作为单例存在，或者在用户会话的上下文中存在。这些作用域将在适当的章节（即第
  6 章）中更详细地探讨。第 5 章介绍了 Servlet API 以及从 HTTP 端点访问 Spring 上下文的简单方法，但该方法过于简单，无法提供 Spring
  的全部能力。


