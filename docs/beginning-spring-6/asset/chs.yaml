  **DelegatingPasswordEncoder**


  由于需求变更，或者因为你接手了一个仍在使用 MD5 的系统，迁移到新的密码编码方法可能会很痛苦。从 Spring Security 5 开始引入了 `DelegatingPasswordEncoder`，它通过使用前缀来支持多种密码编码器。如果我们使用工厂方法
  `PasswordEncoderFactories.createDelegatingPasswordEncoder()`，你会发现，如果未指定，它会默认使用 `{bcrypt}`，并提供一种简单的方法来升级未使用你首选方法的现有密码。


  对于我们的示例应用程序，我们将设置两个用户账户，每个账户拥有一个或多个角色的访问权限。我们将创建一个拥有 `ADMIN` 和 `USER` 角色访问权限的账户，以及另一个仅拥有
  `USER` 角色访问权限的账户。由于我们仍希望保持简单，我们将使用 `InMemoryUserDetailsManager`^(¹⁰⁵)，它允许我们基本上硬编码用户，并返回这个内存管理器，该管理器后续会被一个实际的安全提供者替换。你会注意到，我们使用了之前定义的
  `passwordEncoder` 方法，这样我们就可以为返回的 `UserDetailsService` 提供一个通用的密码编码方法。


  **GrantedAuthority 和 Roles**


  一开始看到用户的两种不同区分可能会感到困惑，一种是 `GrantedAuthority`，另一种是 `Role`。`GrantedAuthority` 是一种比角色粒度更细的权限，例如
  `READ_AUTHORITY` 或 `WRITE_AUTHORITY`，其命名和处理方式完全由你决定，非常灵活。Spring Security 为此提供了一个检查权限的方法
  `hasAuthority`。另一方面，我们有 `Role`，它可以是对系统中用户角色更粗粒度的定义。`Role` 可以与 `hasRole` 方法一起使用，通常表示为
  `ADMIN`、`USER` 或 `SUPERUSER`——同样，其命名也由你决定。


  ```

  @Bean

  public UserDetailsService userDetailsService() {

  InMemoryUserDetailsManager manager = new InMemoryUserDetailsManager();

  PasswordEncoder encoder = passwordEncoder();

  UserDetails adminUser = User

  .withUsername("admin")

  .password(encoder.encode("admin123"))

  .roles("ADMIN", "USER")

  .build();

  UserDetails regularUser = User

  .withUsername("user")

  .password(encoder.encode("user123"))

  .roles("USER")

  .build();

  manager.createUser(adminUser);

  manager.createUser(regularUser);

  return manager;

  }

