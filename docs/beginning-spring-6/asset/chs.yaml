- '# 10. Spring Security


  安全性在任何能够访问实时信息（即使是公开信息）的应用程序中都至关重要。^(¹⁰¹) 安全性意味着控制对功能和信息的访问权限；除非安妮被特别授权访问弗兰克的信息，否则弗兰克的数据应该是**安全**的，并且从安妮的角度来看是不可见的。自然而然地，Spring
  拥有一个强大且功能完备的安全项目——名为 Spring Security——它允许你控制应用程序安全的几乎每个方面。


  在本章中，我们将开发两个模块——`chapter10` 和 `chapter10-custom`——并且我们将使用我们在第 9 章中构建的一个简单 Web 应用程序——`chapter09-jpa`
  项目——并在其上添加一个简单的接口来验证用户身份并控制对资源的授权。


  ## 简介


  Spring Security 子项目最初是一个独立的项目，始于 2003 年，名为 Acegi Security System。^(¹⁰²) 在与 Spring
  本身分开开发了 3 年之后，它于 2007 年被 Spring 正式采纳并更名为 Spring Security。如今，该子项目已成为 Spring 进行身份验证和访问控制的标准。它提供了足够的样板代码，让你无需任何定制即可使用，同时也具有足够的可扩展性，以满足你特定身份验证和授权需求可能需要的任何具体实现细节。


  与许多其他 Spring 项目（包括第 8 章中介绍的 Spring Data）一样，Spring Security 子项目根据功能进一步细分为许多其他子项目。在最基本的层面上，你通常默认需要包含的三个
  Spring Security 库是 `spring-security-core`、`spring-security-config` 和 `spring-security-web`。


  以下是主要模块及其能帮助你实现的需求的非详尽列表：


  | 库 | 描述 |

  | --- | --- |

  | `spring-security-core` | 所有使用 Spring Security 的应用程序都需要核心库。它包含访问控制和身份验证的类及接口，可用于独立或远程需求。
  |

  | `spring-security-config` | 这也是一个核心库——提供通过 Java 或 XML 进行的配置。 |

  | `spring-security-web` | 该库包含在你的 Web 应用程序中使用 Spring Security 所需的必要过滤器和 Web 安全基础设施。
  |

  | `spring-security-test` | 为测试 Spring Security 应用程序提供支持。它与 JUnit 的映射最为简单，但我们也能使用
  TestNG 实现相同的技巧。 |

  | `spring-security-acl` | 提供对应用程序中特定 Java 对象实例上特定操作的访问控制。有了它，你可以指定某个特定用户有权在特定对象实例上执行特定方法，当然，你也可以依赖不那么**具体**的访问控制。（通常，人们依赖角色访问而非特定用户访问……但你可以选择所需的功能。）
  |

  | `spring-security-ldap` | 该库提供对 LDAP（轻量级目录访问协议）的访问，用于身份验证和用户配置。 |


  还有许多其他库值得一提，例如 OAuth（它有自己的工件组 `org.springframework.security.oauth`，包含许多提供特定功能的工件）和
  JOSE。^(¹⁰³) 此外，还支持 CAS（一种单点登录系统；CAS 代表“中央认证服务”）和 OpenID（一种广泛的互联网身份验证规范），以及，嗯，`在此处插入你的安全机制`，无论是官方支持还是通过众多开源集成之一。有些库只关注身份验证方面，而有些则整合了围绕授权的不同概念。在撰写本文时，Maven
  中为 `org.springframework.security` 命名空间提供了 48 个官方包。


  **身份验证与授权**


  当我们谈论身份验证时，我们试图正确断言访问我们资源的实体就是它所声称的实体或身份。当我们从基于 Web 的身份验证角度谈论这一点时，通常涉及多种不同的方法，最简单的是
  HTTP BASIC 访问，一直到更复杂的机制，如 OpenID 或 CAS。


  授权是一组或多条规则，用于确定一旦通过身份验证，谁被允许做什么。例如，如果 Jennifer 以 ADMIN 身份进行身份验证，那么她可能拥有对系统中所有实体的创建/读取/更新/删除权限，而
  John 可能拥有 USER 权限，只能查看和更新与其账户关联的项目。


  正如你在前几章中所见，Spring Boot 可以极大地减少入门所需的工作量，并以更少的精力让复杂的东西运行起来。在下一节中，我们将了解如何开始使用 Spring
  Security 配置一个 Web 应用程序和一个 REST API。




