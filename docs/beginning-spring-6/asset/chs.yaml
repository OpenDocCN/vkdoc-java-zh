  最后，我们将查看测试类，重点关注新的 `testHelloWorld` 方法，并看看它简化了多少。


  它做的第一件事是通过实例化 `ClassPathXmlApplicationContext` 来创建一个 `ApplicationContext` 引用。这是一个具体的
  `ApplicationContext` 实例，它从类路径加载配置文件。正如你可能（也可能不）怀疑的那样，这是许多可能的 `ApplicationContext`
  具体实例之一；对于大多数简单用途，这是一个效果很好的实例。


