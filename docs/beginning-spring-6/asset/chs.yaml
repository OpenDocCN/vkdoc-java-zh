  IDEA。）


  为什么 `equals()` 需要接受子类？嗯，这实际上取决于用例。在这里，我们别无选择，只能接受与 `HasData` 不同类的东西，因为 `HasData`
  是抽象的——除非定义发生变化，否则永远不会有此类型的有效实例。然而，如果我们谈论的是**具体**类型，那么你可能仍然希望接受子类——因为许多像 Hibernate
  ([`https://hibernate.org`](https://hibernate.org)) 这样的框架会为实体生成代理作为子类，使得它们看起来完全像实体类，但具有根据需要与数据库交互的代码。`HasData`
  不太可能成为 Hibernate 的实体，但在可能的情况下做正确的事情是一个好习惯。


  要将对象设置为原型，我们只需在配置中添加 `scope` 属性。（我们将首先展示 XML 配置，因为我们发现它在细粒度控制事件方面比注解更明确。）这两个值——令人惊讶的是——是
  `prototype` 和 `singleton`，尽管 `singleton` 是默认值，因此完全不是必需的。


  我们定义了两个 bean——`foo` 和 `bar`——都是相同的类型，因为我们可以通过名称获取对象——但具有不同的作用域。


