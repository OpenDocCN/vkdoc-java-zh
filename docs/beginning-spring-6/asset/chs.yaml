  成功的测试没有输出——只有成功的构建。恭喜你，程序员！


  有一点：**非常**重要的是要注意这个测试的类层次结构：它**必须**继承 `AbstractTestNGSpringContextTests`（或者，如果你使用
  JUnit 4，则继承 `AbstractJUnit4SpringContextTests`；JUnit 5 有不同的扩展机制，你可以在测试类上使用 `@ExtendWith(SpringExtension.class)`
  注解，而不是更改类层次结构）。测试的新基类是在运行测试之前加载上下文并执行任何处理的地方。^(³⁶)


  如果我们忽略构建 Hello, World 应用程序所花费的过多精力，并思考在更大的应用程序中松散耦合各个类所带来的强大功能，依赖注入的强大之处就真正开始显现了。在这种情况下，我们只是创建并注入了一个
  `OutputStream`，它使我们能够看到写入其中的内容；我们可以轻松地将其替换为发送电子邮件、记录数据、执行不同语言翻译或任何我们能想到的其他功能的 `OutputStream`（或
  `Greeter`）——然而，我们的客户端应用程序不必更改，甚至不必知道这些差异。


  由于结构的配置**外部于**类本身，我们可以从根本上改变程序的功能——同时保持对程序按设计工作的相当高的信心，因为我们的对象模型易于测试，并且我们的配置易于调试。


