  \ `id`。这意味着我们的测试不知道用于查询特定 `Artist` 的 `id`；`testGetArtistsById()` 使用的 `@DataProvider`（即\
  \ `artistData()` 方法）需要有一种方法来查询数据库并构建测试数据集。\n\n因此，我们编写了 `getArtists()` 方法，它使用 `JdbcTemplate`\
  \ 根据数据库返回一个“有效艺术家”列表；而 `artistData()` 方法则获取该列表，并向其中追加*无效*的 `Artist` 记录，这样我们既能测试命中情况，也能测试未命中情况。\n\
  \n\n\n### `SongController`\n\n现在来看新代码——让我们添加一个`SongController`。如你所见，这是一个相当简单的控制器——几乎所有工作都委托给了`MusicService`。我们之前讨论的适用于`ArtistController`的相同方法在此同样适用。\n\
