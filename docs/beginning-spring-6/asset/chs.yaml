- "# 8. 使用 JdbcTemplate 进行 Spring 数据访问\n\n是时候开始研究我们如何实际访问数据了。Spring 有多种数据访问方式；在这里，我们将介绍\
  \ `JdbcTemplate`，这是一个为常见操作提供简单访问的门面模式，并且我们将解决第 7 章中关于数据访问的其他一些问题。\n\n\n\n## 引言\n\
  \n第 7 章是一章“总括性”章节，重点介绍了 Spring Boot。随后我们探讨了 Spring Boot 为我们处理的一些常见事务，例如处理依赖解析，以及为开发者常用的功能（如简单的\
  \ Web 部署、便捷的可执行归档文件和近乎透明的数据库配置）提供便捷的起点。\n\n接着，我们介绍了数据库访问，大多数有经验的开发者——以及许多经验不足的开发者——可能会将其描述为“古雅”。我们还略微提到了数据库访问代码中的一个关键问题——该问题最终导致我们的服务只能处理两个数据库实体中的一个，因为在第\
  \ 7 章的上下文中解决该问题得不偿失。因此，我们在第 7 章中选择对更简单的内容进行建模，将合适的数据库访问推迟到**本章**和下一章进行。\n\n你认为第\
  \ 7 章中的“关键问题”是什么？除了显而易见的答案“没有引用‘Song’”之外？剧透倒计时：三…​ 二…​ 一…​。\n\n第 7 章完全没有管理事务。如果不引入超出第\
  \ 7 章范围的数据库抽象，就无法解决数据库请求的协调问题。相反，我们选择保持事情非常简单，并为第 8 章和第 9 章奠定基础，这两章都将以更优雅（也更正确）的方式处理数据库访问。\n\
  \n在本章中，我们将演示 `JdbcTemplate` 的使用，它本身是 Spring 许多更简单的数据访问设施的模型。`JdbcTemplate` 为我们提供了一个单一的通用工作流模型，并提供了从关系数据映射到类的简单机制，以及用于异常处理和集中日志记录的简单模型。我们还将通过添加控制器来访问所有数据，并为所有内容编写测试，来完善本应是第\
  \ 7 章的功能集。\n\n## 项目设置\n\n这是一个简单、相当直接的项目。首先，让我们创建项目目录结构。\n\n```\nmkdir -p chapter08/src/main/java/com/bsg6/chapter08\n\
  mkdir -p chapter08/src/main/resources\nmkdir -p chapter08/src/test/java/com/bsg6/chapter08\n\
  mkdir -p chapter08/src/test/resources\n清单 8-1\n使用 POSIX 命令创建目录结构\n```\n\n和往常一样，我们需要一个\
  \ `pom.xml`。我们将使用在第 7 章中首次看到的 Spring Boot 依赖解析，并包含四个特别值得注意的内容。让我们看一下 `pom.xml`，然后更详细地了解这些依赖项。\n\
