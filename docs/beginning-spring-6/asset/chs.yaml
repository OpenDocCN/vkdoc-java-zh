  \n## 访问数据\n\n让我们重新审视一下 `MusicService`，正如我们在第 3 章及后续章节中所见。我们的服务有五个主要操作：\n\n*   检索某个艺术家的歌曲，按流行度排序（最流行的歌曲是更好的“主打歌”）。\n\
  \n*   检索某个艺术家的歌曲名称（用于自动补全操作，我们预计更完整的应用程序会用到此功能）。\n\n*   检索艺术家名称列表（用于自动补全操作）。\n\n\
  *   记录某首歌曲的存在。\n\n*   为某首歌曲投票，使其成为给定 `Artist` 的主打歌。\n\n使用 `JdbcTemplate` 实现这些机制其实相当简单。我们要做的是创建一个类\
  \ `MusicService`，它将 `JdbcTemplate` 作为自动注入的属性接收。然后，它可以根据需要使用 `JdbcTemplate.query()`\
  \ 和 `JdbcTemplate.update()` 向数据库发出 SQL 语句。让我们看看仅实现了一个方法的 `MusicService` 可能是什么样子。\n\
  \n我们需求中最简单的方法可能是检索匹配的艺术家名称，例如，如果我们传入一个“T”，就会得到一个字符串列表，反映的是以字母“T”开头的艺术家名称。为简单起见，我们将“the”、“a”和“an”^(⁹⁴)\
  \ 等冠词视为有效——也就是说，在匹配艺术家时，“The Who”和“Who”是不同的乐队名称。当然有办法让冠词成为可选项，这对于 API 的增强版本来说确实是个好主意，但这超出了本章的范围。\n\
  \n如果你感兴趣，实现这一点的一种方法是在 `Artist` 表中添加另一个字段，该字段包含去除所有冠词后的名称。你还可以对剩余单词进行“词干提取”——“词干提取”意味着将单词转换为其最基本的形式，以便对单词应用一个称为“词干提取”的转换阶段，将其简化为最原始的形式；“improbably”变成“improb”，“threadbare\
  \ loaf”变成“threadbar loaf”。然后，你可以使用这个人工的、仅供内部使用的内容来进行匹配，或许还可以结合实际的乐队名称。（毕竟，你希望当输入\
  \ `Th` 时，搜索“The Who”也能生效，而不仅仅是输入 `Wh` 时。）这甚至还没有开始考虑用于此类目的的访问模式或机器学习。正如我们所说，这最好留作未来增强的练习，因为仅此一项练习就足以写满一本书的好几章。\n\
  \n如果你感兴趣，有一些关于这个主题的研究论文，包括：\n\n*   “算法与用户研究：基于大型医学词汇表的自动补全算法”；[`www.sciencedirect.com/science/article/pii/S153204641100164X`](http://www.sciencedirect.com/science/article/pii/S153204641100164X)。\n\
  \n*   Apache Solr 的 `Suggester` 实现，它可以为你隐藏许多细节；[`https://lucene.apache.org/solr/guide/7_7/suggester.html`](https://lucene.apache.org/solr/guide/7_7/suggester.html)。\n\
  \n*   当然，借助 Java 庞大的生态系统，有人移植了 Python 中能提供很大帮助的工具：Python 的 `fuzzywuzzy` 库。更多详情请参见\
  \ [`https://github.com/xdrop/fuzzywuzzy`](https://github.com/xdrop/fuzzywuzzy)。\n\
  \n*   最后，可以在 `https://`[`blogs.bing.com/search-quality-insights/September-2016/more-intelligent-autocomplete`](http://blogs.bing.com/search-quality-insights/September-2016/more-intelligent-autocomplete)\
  \ 找到一篇关于 Bing 自动补全功能的优秀概述。^(⁹⁵)\n\n还可以找到其他资料，尽管在 Google（或 Bing、DuckDuckGo，或你喜欢的任何搜索引擎）上搜索会返回大量面向用户界面的自动补全机制，而服务器端的信息则不多。祝你好运！\n\
  \n我们很快就会介绍 `MusicRepository` 的完整实现，但先让我们看一个不完整的版本，以便初步了解这个 API。\n\n```\n@Repository\n\
  public class MusicRepository {\n    JdbcTemplate jdbcTemplate;\n    MusicRepository(JdbcTemplate\
  \ template) {\n        jdbcTemplate = template;\n    }\n    @Transactional\n   \
  \ public List getMatchingArtistNames(String prefix) {\n        String selectSQL\
  \ = \"SELECT name FROM artists WHERE \" +\n                \"lower(name) like lower(?)\
  \ \" +\n                \"order by name asc\";\n        /*\n         * 注意使用 Object[]\
  \ 作为查询参数，\n         * 以及使用 lambda 将行映射为 String\n         */\n        return jdbcTemplate.query(\n\
  \            selectSQL,\n            new Object[]{prefix + \"%\"},\n           \
  \ (rs, rowNum) -> rs.getString(\"name\"));\n    }\n}\n清单 8-9\nchapter8/src/main/java/com/bsg6/chapter08/MusicRepository.java\
  \ 的一部分\n```\n\n核心观察点：\n\n*   `MusicRepository` 被标记为 `@Repository`，因此它是一个 Spring\
  \ Bean。\n\n*   我们有一个由构造函数提供的 `JdbcTemplate` 引用；Spring 会自动为我们提供这个引用。\n\n*   我们有一个方法，用\
  \ `@Transactional` 注解，它调用了 `JdbcTemplate.query()`。\n\n关于 `getMatchingArtistNames()`，有两件事值得我们思考。第一是\
  \ `query()` 调用本身——鉴于本章以 `JdbcTemplate` 为核心——另一件事是关于事务支持。\n\n\n\n### `JdbcTemplate.query()`\n\
  \n`JdbcTemplate` 中的 `query()` 方法有**十九**种变体，这还不包括像 `queryForMap`、`queryForObject`\
  \ 和 `queryForList` 这样的查询方法，而每个方法又有一系列重载签名。（在 `JdbcTemplate` 类中，名称以 `query` 开头的方法有四十多个。）清单\
  \ 8-12 中使用的是其中最简单的一种。\n\n```\npublic  List query(\nString sql,\n@Nullable Object[]\
  \ args,\nRowMapper rowMapper\n) throws DataAccessException\n```\n\n这里的第一个参数是一个 SQL\
  \ 查询语句。与 JDBC 一样，使用问号 `?` 作为占位符。\n\n第二个参数是一个 `Object` 数组。该数组中的每个元素都会按顺序位置对应地填入 SQL\
  \ 查询语句中——这意味着第一个 `?` 会被 `Object[]` 中的第一个元素替换，第二个 `?` 会被第二个元素替换，以此类推。\n\n这个版本接受一个\
  \ `RowMapper<T>` 作为最后一个参数。`RowMapper<T>` 是一个简单的接口，只有一个方法（并返回由 `<T>` 表示的特定类型），因此它在\
  \ Java 中属于“单一访问方法”类——这意味着它可以用 lambda 表达式来表示。`RowMapper<T>` 负责接收一个 `ResultSet` 和一个行号（`int`\
  \ 类型），并将该行映射为某种类型的对象；因此，我们用于查询艺术家姓名的方法负责接收一个 `ResultSet`，并从该 `ResultSet` 的当前行中返回艺术家的姓名。用\
  \ lambda 形式表示如下：\n\n```\n(rs, rowNum) -> rs.getString(\"name\")\n```\n\n如果用“传统 Java”形式表示，则会稍长一些：\n\
  \n```\nnew RowMapper() {\n@Override\nString mapRow(ResultSet rs, int rowNum) throws\
  \ SQLException {\nreturn rs.getString(\"name\");\n}\n}\n```\n\n两种形式都可以接受；实际上，它们在编译后生成的代码几乎相同，并且实现的功能完全一样。\n\
  \n因此，这个方法非常简单：它包含一条 SQL 语句，带有一个参数占位符，用于从 `artists` 表中检索艺术家姓名。该参数会被处理，添加一个 SQL 通配符（“%”），供\
  \ SQL 的 `LIKE` 运算符使用，然后将结果数据从 `ResultSet` 转换为每行一个单独的 `String` 对象——由于 `query()` 返回一个带类型的\
  \ `List`，我们就能将得到的 `List<String>` 返回给调用者。（我们本可以使用任何 Java 类型作为 `RowMapper` 的返回类型；只是这里我们处理的是简单的\
  \ `String` 实例。我们也不需要担心类型强制转换，因为声明给编译器提供了足够的信息，让编译器知道返回的是什么类型。）\n\n由于 `query()` 返回一个\
  \ `List`，我们可以对这个 `List` 进行操作；不过，我们更希望获得特定的结果。考虑一个通过 `id` 查找 `Artist` 的方法：\n\n```\n\
  @Repository\npublic class MusicRepository {\nJdbcTemplate jdbcTemplate;\nMusicRepository(JdbcTemplate\
  \ template) {\njdbcTemplate=template;\n}\n@Transactional\npublic Artist findArtistById(Integer\
  \ id) {\nreturn jdbcTemplate.query(\n\"SELECT id, name FROM artists WHERE id=?\"\
  ,\nnew Object[]{id},\n(rs, rowNum) ->\nnew Artist(\nrs.getInt(\"id\"),\nrs.getString(\"\
  name\"\n)\n)\n)\n.stream()\n.findFirst()\n.orElse(null);\n}\n}\n清单 8-10\n摘自 chapter08/src/main/java/com/bsg6/chapter08/MusicRepository.java\n\
  ```\n\n如果你还对 lambda 表达式感到疑惑，这里是它的“传统形式”：\n\n```\nnew RowMapper() {\n@Override\n\
  String mapRow(ResultSet rs, int rowNum) throws SQLException {\nreturn new Artist(\n\
  rs.getInt(\"id\"),\nrs.getString(\"name\")\n);\n}\n}\n```\n\n在清单 8-10 中，我们在结构上做的事情与\
  \ `getMatchingArtistNames()` 中看到的相同。我们有一个简单的 SQL 查询，其中包含一个用于 `id` 的占位符，并传入一个包含 `id`\
  \ 方法参数的对象数组。我们有一个简单的 lambda 表达式（实际上是一行代码，为了适应印刷页面宽度而拆分开来），就像在 `getMatchingArtistNames()`\
  \ 中一样，只不过这里我们将 `ResultSet` 映射为一个 `Artist` 对象。\n\n然后，我们让 Java 的 Stream API 获取 `List`\
  \ 中的第一个结果——该列表最多只有一个条目。`Stream.findFirst()` 返回一个 `Optional<T>`，因此如果 `List<Artist>`\
  \ 为空，我们可以通过 `Optional<T>.orElse()` 将其转换为 `null`。我们还会在 `MusicRepository` 的其他地方看到**这种**模式，即我们搜索数据，并在数据不存在时采取相应操作。\n\
  \n在进一步深入探讨 `MusicRepository` 之前——以及在我们看到完整的实际实现而非代码片段之前——我们先来聊聊 `@Transactional`。\n\
  \n\n\n### `@Transactional`\n\n回顾第 7 章的数据库交互服务，我们当时仅支持处理 `Artist` 实体，这有几个原因。\n\n\
  原因之一是，我们当时知道这些代码后续会被废弃（就在本章你**现在**阅读的这一节中），而且增加对 `Song` 的支持并不会给服务带来任何价值；对 `Artist`\
  \ 的支持已经足以传达我们试图理解的重点。\n\n不过，主要原因在于，我们的代码结构本身就不太容易支持事务。借助工具箱中的 Spring 数据访问工具（例如 `JdbcTemplate`），我们可以非常轻松地指示方法参与事务。\n\
  \n`@Transactional` 的含义是，被注解的方法需要在某种*事务上下文*中运行，这种上下文甚至可能包括“完全没有事务”。事务上下文被称为其*传播行为*。默认的传播行为是\
  \ `REQUIRED`，这意味着如果事务尚未启动，则*应该*启动一个事务；你也可以使用 `REQUIRES_NEW`，它表示即使事务已经启动，也会为该方法调用启动一个新事务（这……可能有效，也可能无效，具体取决于你的数据存储和配置）；还有\
  \ `SUPPORTS`，它表示如果事务已经启动，则会遵循事务语义，但如果没有事务，该方法将以非事务方式执行。\n\n| 传播行为 | 描述 |\n| ---\
  \ | --- |\n| `REQUIRED` | 参与一个已启动的事务，如果不存在事务则创建一个新事务。 |\n| `SUPPORTS` | 参与一个已启动的事务，如果不存在事务则以非事务方式执行。\
  \ |\n| `REQUIRES_NEW` | 如果事务正在进行，则挂起当前事务并启动一个新事务；新事务完成后，旧事务将恢复。这在所有上下文中可能不都有效。 |\n\
  | `MANDATORY` | 如果当前存在事务则参与其中，如果**不**存在事务则抛出异常。 |\n| `NOT_SUPPORTED` | 如果事务正在进行则挂起它，并在事务上下文之外执行。\
  \ |\n| `NEVER` | 这是 `MANDATORY` 的反向操作；如果事务正在进行则抛出异常。如果没有当前事务，则以非事务方式执行。 |\n| `NESTED`\
  \ | 在当前运行的事务**内部**创建一个新事务（如果存在事务）。这在所有上下文中可能不都有效，因为所用的事务管理器需要支持嵌套事务。 |\n\n`@Transactional`\
  \ 注解还可以指定事务上下文为只读（通过 `readOnly` 属性，该属性接受一个 `boolean` 值：因此，使用时看起来像 `@Transactional(readOnly=true)`）。\n\
  \n事务的另一个属性是 `isolation`（隔离级别），它影响事务提交前，该事务所执行操作对其他事务的可见性。例如，假设一个需要五秒才能完成的事务，在其开始后的前\
  \ 50 毫秒内删除了一条记录；那么*其他*事务是否能在该事务完成之前看到删除操作的效果？允许有四种特定的隔离级别，此外还提供了一个 `DEFAULT` 级别，表示使用数据存储的底层默认隔离级别。\n\
  \n| 隔离级别 | 描述 |\n| --- | --- |\n| `READ_UNCOMMITTED` | 允许一个事务更改的行在更改提交之前被另一个事务读取。如果该事务失败，第二个事务可能会得到无效数据。\
  \ |\n| `READ_COMMITTED` | 阻止事务读取已被其他事务更改但尚未提交的数据，直到其他事务的更改已提交。 |\n| `REPEATABLE_READ`\
  \ | 阻止读取包含更改的行（与 `READ_COMMITTED` 非常相似），但同时也防止在数据被更改后查询重新获取数据的情况。数据库行为可能很奇怪，但当你深入探究时，这仍然是有意义的。\
  \ |\n| `SERIALIZABLE` | 阻止事务看到已更改的数据（如同 `REPEATABLE_READ`），同时还强制事务在*本*事务完成之前，不能看到来自*任何*其他活动事务的数据；就好像事务拥有一个在事务开始时数据状态的快照视图。\
  \ |\n| `NEVER` | 这意味着如果在调用方法时事务正在进行，则会抛出异常！（据作者所知，这在现实世界中相当罕见；他们从未见过有人使用它。） |\n\n\
  `@Transactional` 注解还有其他字段；其中有两个特别值得指出，尽管我们在本章中并未使用它们。\n\n第一个是 `timeout`（超时）。如果提供了这个属性（例如\
  \ `@Transactional(timeout=5)`），那么当事务持续时间超过超时值时，事务将以异常结束。（默认值是 `-1`，表示“无超时”。）如果你有一个长时间运行的事务，或者遇到了死锁情况，这个属性就非常有价值。\n\
  \n当事务需要的资源不可用时，就可能发生死锁。例如，假设事务“X” - `tX` - 获取了资源 `A` 上的锁，同时，事务“Y” - `tY` - 获取了资源\
  \ `B` 上的锁。此时还没有死锁——除非在**下一个**时刻，`tX` 试图获取 `B` 上的锁，而 `tY` 试图获取 `A` 上的锁。`tX` 和 `tY`\
  \ 都无法继续执行，因为它们需要的资源被另一个事务锁定了。\n\n事务超时会在超时时间结束后终止事务，让程序有机会恢复并继续执行——并且希望能告知程序员问题所在。\n\
  \n有很多方法可以处理此类锁问题，但这超出了本书的范围；你确实需要考虑导致死锁的具体情况以及你所使用的特定数据库的事务能力。\n\n话虽如此，一个快速简单的经验法则是**始终**以相同的顺序获取资源——因此\
  \ `tX` 和 `tY` 将始终*按该顺序*尝试获取资源 `A` 和 `B`，这样 `tX` 完成对 `A` 和 `B` 的操作之前，`tY` 不会继续执行。正如所述，这是一个“快速而粗糙”的经验法则，而且这是非常严肃的说法；你的特定问题领域可能不允许如此简单的解决方案。\n\
  \n`@Transactional` 注解还支持许多与**回滚**相关的属性。回滚将取消事务创建的所有更改；所有锁、更新或删除操作都将被回滚取消。（这是对事务的取消，并将数据库恢复到事务开始前的状态。）\n\
  \n使用 `@Transactional`，你可以添加 `rollbackFor`，后跟一个扩展了 `Throwable` 的类数组，或者 `rollbackForClassName`，后跟一个类**名称**数组——例如，作为字符串。如果被注解的方法抛出了这些异常，则事务将在方法退出时作为一部分被回滚。还有\
  \ `noRollback` 和 `noRollbackForClassName`，它们指示如果方法抛出这些异常，事务**不会**被回滚。默认行为是在 `@Transactional`\
  \ 方法抛出异常时进行回滚——但它是完全可调的。\n\n这些默认设置对于我们的 `MusicRepository` 来说实际上已经足够了。说到 `MusicRepository`，让我们回到它上面，实际看看真实、活生生的实现是什么样的——全部\
  \ 150 多行代码。\n\n\n\n### 实际的 `MusicRepository`\n\n以下是 `MusicRepository` 的**实际**内容。其中有一个方法值得我们详细审视：`internalFindArtistByName()`。还有其他一些方法遵循了部分相同的原则（例如，`getSong()`\
  \ 几乎沿用了 `findArtistByName()` 所使用的模式，而 `voteForSong()` 本质上也是类似的操作），但 `findArtistByName`\
  \ 为我们的实现引入了一些架构上重要的概念。\n\n为完整起见，本清单中也包含了 `getMatchingArtistNames()` 和 `findArtistById()`\
  \ 的内容。\n\n```\npackage com.bsg6.chapter08;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.jdbc.core.JdbcTemplate;\nimport org.springframework.jdbc.support.GeneratedKeyHolder;\n\
  import org.springframework.jdbc.support.KeyHolder;\nimport org.springframework.stereotype.Repository;\n\
  import org.springframework.transaction.annotation.Transactional;\nimport java.sql.PreparedStatement;\n\
  import java.sql.Statement;\nimport java.util.List;\n// tag::declaration[]\n@Repository\n\
  public class MusicRepository {\nJdbcTemplate jdbcTemplate;\nMusicRepository(JdbcTemplate\
  \ template) {\njdbcTemplate=template;\n}\n// end::declaration[]\n@Autowired\nSongRowMapper\
  \ songRowMapper;\n// tag::findArtistById[]\n@Transactional\npublic Artist findArtistById(Integer\
  \ id) {\nreturn jdbcTemplate.query(\n\"SELECT id, name FROM artists WHERE id=?\"\
  ,\nnew Object[]{id},\n(rs, rowNum) ->\nnew Artist(\nrs.getInt(\"id\"),\nrs.getString(\"\
  name\"\n)\n)\n)\n.stream()\n.findFirst()\n.orElse(null);\n}\n// end::findArtistById[]\n\
  @Transactional\npublic Artist findArtistByName(String name) {\nreturn internalFindArtistByName(name,\
  \ true);\n}\n@Transactional\npublic Artist findArtistByNameNoUpdate(String name)\
  \ {\nreturn internalFindArtistByName(name, false);\n}\nprivate Artist internalFindArtistByName(String\
  \ name, boolean update) {\nString insertSQL = \"INSERT into artists (name) values\
  \ (?)\";\nString selectSQL = \"SELECT id, name FROM artists \" +\n\"WHERE lower(name)=lower(?)\"\
  ;\nreturn jdbcTemplate.query(\nselectSQL,\nnew Object[]{name},\n(rs, rowNum) ->\
  \ new Artist(\nrs.getInt(\"id\"),\nrs.getString(\"name\")\n)\n)\n.stream()\n.findFirst()\n\
  .orElseGet(() -> {\nif (update) {\nKeyHolder keyHolder = new GeneratedKeyHolder();\n\
  jdbcTemplate.update(conn -> {\nPreparedStatement ps = conn.prepareStatement(\ninsertSQL,\n\
  Statement.RETURN_GENERATED_KEYS\n);\nps.setString(1, name);\nreturn ps;\n}, keyHolder);\n\
  return new Artist(keyHolder.getKey().intValue(), name);\n} else {\nreturn null;\n\
  }\n});\n}\n@Transactional\npublic List getSongsForArtist(String artistName) {\n\
  String selectSQL = \"SELECT id, artist_id, name, votes \" +\n\"FROM songs WHERE\
  \ artist_id=? \" +\n\"order by votes desc, name asc\";\nArtist artist = internalFindArtistByName(artistName,\
  \ true);\nreturn jdbcTemplate.query(\nselectSQL, new Object[]{artist.getId()},\n\
  songRowMapper);\n}\n@Transactional\npublic List getMatchingSongNamesForArtist(\n\
  String artistName,\nString prefix\n) {\nString selectSQL = \"SELECT name FROM songs\
  \ WHERE artist_id=? \" +\n\"and lower(name) like lower(?) \" +\n\"order by name\
  \ asc\";\nArtist artist = internalFindArtistByName(artistName, true);\nreturn jdbcTemplate.query(\n\
  selectSQL, new Object[]{artist.getId(), prefix + \"%\"},\n(rs, rowNum) -> rs.getString(\"\
  name\"));\n}\n// tag::getMatchingArtistNames[]\n@Transactional\npublic List getMatchingArtistNames(String\
  \ prefix) {\nString selectSQL = \"SELECT name FROM artists WHERE \" +\n\"lower(name)\
  \ like lower(?) \" +\n\"order by name asc\";\n/*\n* Note use of Object[] for query\
  \ arguments, and\n* the use of a lambda to map from a row to a String\n*/\nreturn\
  \ jdbcTemplate.query(\nselectSQL,\nnew Object[]{prefix + \"%\"},\n(rs, rowNum) ->\
  \ rs.getString(\"name\"));\n}\n// end::getMatchingArtistNames[]\n@Transactional\n\
  public Song getSong(String artistName, String name) {\nreturn internalGetSong(artistName,\
  \ name);\n}\nprivate Song internalGetSong(String artistName, String name) {\nString\
  \ selectSQL = \"SELECT id, artist_id, name, votes FROM songs \" +\n\"WHERE artist_id=?\
  \ \" +\n\"and lower(name) = lower(?)\";\nString insertSQL = \"INSERT INTO SONGS\
  \ (artist_id, name, votes) \" +\n\"values(?,?,?)\";\nArtist artist = internalFindArtistByName(artistName,\
  \ true);\nSong song = jdbcTemplate.query(\nselectSQL,\nnew Object[]{artist.getId(),\
  \ name},\nsongRowMapper)\n.stream()\n.findFirst()\n.orElseGet(() -> {\nKeyHolder\
  \ keyHolder = new GeneratedKeyHolder();\njdbcTemplate.update(conn -> {\nPreparedStatement\
  \ ps = conn.prepareStatement(insertSQL,\nStatement.RETURN_GENERATED_KEYS);\nps.setInt(1,\
  \ artist.getId());\nps.setString(2, name);\nps.setInt(3, 0);\nreturn ps;\n}, keyHolder);\n\
  return new Song(keyHolder.getKey().intValue(),\nartist.getId(),\nname,\n0);\n});\n\
  return song;\n}\n@Transactional\npublic Song voteForSong(String artistName, String\
  \ name) {\nString updateSQL = \"UPDATE songs SET votes=? WHERE id=?\";\nSong song\
  \ = internalGetSong(artistName, name);\nsong.setVotes(song.getVotes() + 1);\njdbcTemplate.update(conn\
  \ -> {\nPreparedStatement ps = conn.prepareStatement(updateSQL);\nps.setInt(1, song.getVotes());\n\
  ps.setInt(2, song.getId());\nreturn ps;\n});\nreturn song;\n}\n}\n清单 8-11\nchapter08/src/main/java/com/bsg6/chapter08/MusicRepository.java\n\
  ```\n\n\n\n请记住，无需关注 `// tag::` 和 `// end::` 注释。本书使用 AsciiDoctor ([`https://asciidoctor.org`](https://asciidoctor.org))\
  \ 编写，这些是排版注释，用于帮助我们根据需要提取特定的代码片段。这样做的结果是，我们无需将代码从源代码树复制到书中，并期望示例代码与书籍内容保持同步；我们实际上是在使用真实的代码来生成书籍内容。虽然存在一些例外情况，包括本章中的某些内容（例如，用于替换\
  \ lambda 表达式的 `RowMapper` 代码），但大多数情况下，您在阅读本书时看到的是真实的代码，即用于实际编译和运行所有内容的代码。因此，当您（如果）键入或复制它时，您得到的是在本书编写时实际可用的代码。\n\
  \n我们现在要检查的第一件事是：`intFindArtistByName()`，这是一个内部方法，通过两个 `public` 方法提供访问点。第一个公共方法（`findArtistByName`）接收一个\
  \ `String`（艺术家的名字）。第二个公共方法（`findArtistByNameNoUpdate()`）具有相同的参数——艺术家的名字——但调用内部方法时不会尝试进行更新。\n\
  \n这个私有方法*没有*使用 `@Transactional` 注解——它是一个私有的内部方法，期望被一个已标记为 `@Transactional` 的公共方法调用。这避免了异常传播的问题；在这个类中，我们对异常条件有足够的控制，以至于它*可能*不是问题，但我们不妨*尝试*正确地处理它。\n\
  \n在内部，`internalFindArtistByName()` 的第一部分与清单 8-10 中的 `findArtistById()` 方法类似；我们有一个返回\
  \ `List<Artist>` 的查询，并将其转换为一个流。不过，`.orElse()` 代码稍微复杂一些。\n\n您看，这个方法可能以两种方式使用：第一种方式意味着应该创建一个\
  \ `Artist`，第二种方式则不会。这是因为当我们搜索歌曲列表时，我们不一定想要创建一个 `Artist`；搜索是一个只读操作，因此没有必要或要求尝试写入任何内容——事实上，我们**不希望**写入任何内容。该方法的默认“模式”是写入一个\
  \ `Artist`，但我们希望访问一个不进行写入的版本。因此，公共版本（`findArtistByName()`）假定进行更新，而内部版本——即执行所有工作的版本——会检查需要执行哪些操作。\n\
  \n如果是只读操作，我们返回 `null`——这是我们表示“未找到”的信号值。我们本可以抛出一个异常，或者返回一个 `Optional`，但在上下文中，`null`\
  \ 更简单；此外，我们已经在代码的其他地方使用过它（例如，再次参见清单 8-10 中的 `findArtistById()`）。\n\n如果需要更新，那么我们需要考虑几个因素。当然，我们需要返回一个\
  \ `Artist` 对象，并且该对象应该被完全填充。`name` 很容易；我们按名称搜索 `Artist`，因此这是 `name` 属性的一个逻辑值。（这还需要说吗？……可能不需要，但我们在这里力求一定程度的完整性。）\n\
  \n然而，我们也需要获取数据库分配给 `Artist` 的 `id`。我们这样做的方式相当简单，但有一些动态部分需要考虑：\n\n1.  首先，我们创建一个 `KeyHolder`（一个接口，其具体实现为\
  \ `GeneratedKeyHolder`）。这个接口有一些获取键的访问方法——但最有用（并且在这种情况下相关）的是 `getKey()`，它返回一个 `java.lang.Number`。\n\
  \n2.  然后，我们使用一个 lambda 表达式作为 `PreparedStatementCreator` 的实例。这是一个单访问方法的类（方法为 `createPreparedStatement()`\
  \ 并接受一个 `Connection`）；您的任务是，嗯，创建一个填充了适当占位符的 `PreparedStatement`。我们只有一个占位符（因为一个 `Artist`\
  \ 除了 `id` 之外只有一个属性），所以这……相当简单。\n\n3.  我们将 `KeyHolder` 作为最后一个参数传递给 `JdbcTemplate.update()`\
  \ 方法。\n\n最后，我们从 `KeyHolder` 中取出键——使用 `keyHolder.getKey().intValue()`，它从 `Number`\
  \ 抽象中获取一个整数——并用它来构建一个 `Artist` 引用。\n\n我们能否将其编写得更简单，或者至少更直接？嗯……某种程度上可以。在这种情况下，“直接”意味着“没有流或\
  \ `Optional`”，老实说……这是可以做到的，但会涉及很多临时变量来保存局部状态。“更简单”的版本实际上会比流式版本具有更高的圈复杂度^(⁹⁶)；现在的写法设计复杂度为\
  \ 2，圈复杂度也为 2，而使用 `if` 和检查 `List.size()` 来判断是否存在的老方法，复杂度得分实际上是 3——数字越低越好。\n\n您在 `getSong()`\
  \ 中可以看到相同的模式，使用 `private internalGetSong()` 方法来避免嵌套来自同一类的事务调用。`voteForSong()` 在需要获取\
  \ `Song` 时使用 `internalGetSong()`——事务语义仅在公共方法层应用。\n\n在实践中，如果您小心谨慎，可以（某种程度上）避免嵌套事务调用，但它们通常是不好的做法（由于\
  \ Spring 应用事务的方式），并且可能会产生一些奇怪的错误。\n\n\n\n#### 测试 MusicRepository\n\n编写 `MusicRepository`\
  \ 固然不错，但和往常一样，如果它实际上无法工作，那价值就不大。我们需要一个测试。幸运的是，我们早就写了一个——早在第 3 章。这里展示的是对第 3 章（清单\
  \ 3-16）中 `MusicServiceTests` 的修改，去掉了超类结构。\n\n第 3 章将 `MusicServiceTests` 创建为一系列测试的抽象超类，这样我们就可以通过更改配置机制，针对\
  \ `MusicService` 的多个实现运行相同的测试。本章没有这个顾虑，因此这个测试在组织上稍微简单一些。执行测试的实际代码是相同的，尽管每个方法都略有不同，因为自第\
