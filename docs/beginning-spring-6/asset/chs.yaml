  因此，这些内容往往是作者们注意到在某些方面有趣或相关的东西，并且我们认为这些内容可能会在读者开发自己的项目时激发他们的兴趣。




  ## 对书籍的批评


  在鄙人看来，书籍是开发者的绝佳资源，^(¹¹³) 但它们远非完美。


  技术书籍最大的问题在于，它们往往目标定得太低。大多数书籍只展示代码片段，这取决于它们试图演示的内容或许可行，但对于任何实际应用而言，当你的部署代码库由数千行代码和数十个组件构成时，十行代码示例根本不够用。


  因此，在本书中，我们尽可能选择展示**完整**的类，包括 `package` 和 `import` 语句，以消除代码归属的歧义。我们的意图是，你可以将本书的文本作为可用的参考；当我们展示的代码旨在执行时，你无需在查看某个片段时自行判断是否包含了所有内容（或正确的内容）。


  我们还倾向于使用测试，而不是运行代码并手动检查输出。测试是你**确认**代码工作的方式；很容易在看到 `"Hello, wor1d"` 时忽略 `"world"`
  中的数字 `1` 而非*字母* `l`。如果你足够仔细——并且你的字体足够清晰——你能发现它，但人类大脑非常擅长纠正所见以使其合理，所以如果你在“world”中嵌入了数字时读成“Hello,
  world”，这绝对无可指责。


  测试不存在自动纠正结果为有效的问题。输出必须正确。如果你的测试使用了一个正则表达式——`"Hello, wor[1l]d"`——这将会通过，那么你可以在测试中看到，匹配器使用的正则表达式*可能*在确保输出符合预期方面毫无意义。


  编写测试可能令人恼火，但它们应该是每个人都能掌握的工具。我们本可以在本书中进行**更多**测试，但我们追求的是在意图测试上取得良好平衡：如果一个服务应该能够以某种特定方式写入、读取、更新和删除数据，我们已尽力在测试中体现这些需求的某些合理方面。


  我们尚未涉及测试的某些方面，比如性能（“该服务能否在三秒或更短时间内处理来自四百个用户的一千次更新，且内存影响为……​”），但这引出了书籍在知识传递方面的另一个问题：范围。


  像本书这样的书籍必须在范围上有所限制，否则我们涵盖的内容就太多了。我们选择聚焦于 Spring 框架及其配套生态系统中你在实际开发中可能遇到的方面，以便你能对框架的预期行为以及真实项目的样子有一定信心。但若在某些方向上走得太远，就会涉及部署场景，这对于一本关于
  **Spring** 的书籍来说过于宽泛……​除非我们至少再花几年时间写作，再加上几卷内容（导致像高德纳的《计算机程序设计艺术》^(¹¹⁴)那样——一套多卷本至今仍未完成，尽管始于
  1968 年），不仅我们温和的出版商会反对这个想法，而且作者们也没有唐纳德·高德纳的才华。^(¹¹⁵)


  我们还刻意避开了诸如“使用什么 IDE”之类的规定性决策，而是专注于与 IDE 无关的构建工具。你可以用 Notepad++、vim、emacs、IDEA、Eclipse、NetBeans……​任何能够以
  Java 编译器可读的格式保存文本的工具来编写本书的代码。我们在写作时使用了 IDEA（包括编写章节内容，而不仅仅是代码），但我们本可以使用*任何*可行的工具，因为我们觉得告诉读者偏好某一种工具并无帮助，而涵盖*所有*选项也不可行。


  想象一下，你在阅读时不得不看一张又一张 Eclipse 运行测试的截图……​然后是 IDEA 运行测试的截图（因为显示意图相似但不同）……​然后是 NetBeans。要求你们，我们的读者，忍受这一切实在太过分了，而且这对本书的价值增加甚微。


  我们已尽力在脚注之外提供尽可能多的价值。^(¹¹⁶)


