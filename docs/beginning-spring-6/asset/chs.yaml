  \"What Happened To Our First CD?\");\n}\n}\nListing 9-16\nchapter09-test/src/main/java/com/bsg6/chapter09/test/BaseMusicServiceTests.java\n\
  ```\n\n现在，我们终于要开始**使用** Spring Data，而不是为使用它做准备了。\n\n\n\n### `chapter09-jpa` 项目\n\
  \nJPA（Java 持久化 API）是一种规范，为 Java 提供了惯用的对象/关系映射（简称“ORM”）。换句话说，它旨在将数据库表（或表集合）中的数据（以行和列的形式存储）映射到\
  \ Java 对象模型。\n\n我们在第 8 章中已经看到了一些相关内容，只不过当时我们是手动进行转换（并且仅在查询数据库时）。\n\n有许多 JPA 的实现。Hibernate（[`https://hibernate.org`](https://hibernate.org)）*可能*是\
  \ Java 中最具影响力的对象关系映射器，就像 Spring*可能*是 Java 中最具影响力的依赖注入库一样。Hibernate 的替代方案包括 OpenJPA（[`https://openjpa.apache.org/`](https://openjpa.apache.org/)）、EclipseLink（[`https://eclipse.dev/eclipselink//`](https://eclipse.dev/eclipselink//)）和\
  \ DataNucleus（[`www.datanucleus.org`](http://www.datanucleus.org)）等，但在本章中，我们将使用\
  \ Spring Data 为我们提供的实现——也就是 Hibernate。\n\n让我们快速浏览一下我们的`pom.xml`。有几点需要注意：\n\n*  \
  \ 它包含一个对`chapter09-test`的测试时依赖。\n*   它具有与`chapter09-api`和`chapter09-test`相同的有限插件配置和依赖管理。这是因为我们将在第\
  \ 10 章中将`chapter09-jpa`用作依赖项。\n*   它依赖于`spring-boot-starter-data-jpa`和`h2`（作为示例数据库）。\n\
  *   它导入了`jackson-annotations`，因为我们想在一个实体类中使用一个注解——我们将在查看`Artist`实现时看到（并解释）这个注解。\n\
  \n```\n\n4.0.0\n\ncom.apress\nbsg6\n1.0\n\nchapter09-jpa\n1.0\n\norg.springframework.data\n\
  spring-data-bom\n${springDataBomVersion}\nimport\npom\n\ncom.apress\nchapter09-api\n\
  1.0\n\ncom.apress\nchapter09-test\n1.0\ntest\n\norg.springframework.boot\nspring-boot-starter-data-jpa\n\
  \ncom.h2database\nh2\nruntime\n\ncom.fasterxml.jackson.core\njackson-annotations\n\
  \norg.springframework.boot\nspring-boot-maven-plugin\n${springBootVersion}\n\n列表\
  \ 9-17\nchapter09-jpa/pom.xml\n```\n\n实际上，繁重的工作已经在`chapter09-api`中完成了。这个项目需要做的事情虽然冗长（因为是用\
  \ Java 编写的，而 Java 习惯上将类放在各自的源文件中，这意味着大量重复的样板代码），但仍然出奇地简单：\n\n*   创建所有基类的具体实现。\n\
  *   提供 Spring 配置。\n\n让我们开始吧。我们必须实现`BaseArtist`、`BaseSong`、`BaseArtistRepository`、`BaseSongRepository`和`BaseMusicService`；值得庆幸的是，所有这些类都非常简短，但我们仍然必须拥有它们。然后，我们需要构建一个配置，接着还需要扩展我们的测试类。\n\
  \n首先，是`Artist`类。这是一个 JPA 实体；请注意，它扩展了`BaseArtist`并使用`Integer`作为标识符类型。它还使用常规的 JPA\
  \ 注解来定义艺术家和歌曲之间的关系。\n\n你会注意到在`songs`引用上使用了`@JsonIgnore`注解；在我们相当简单的对象结构中，这是必需的，因为`Artist`持有一组`Song`对象的引用，而每个`Song`对象又持有对`Artist`的引用。这在序列化对象结构时会产生影响——由于此模块在第\
  \ 10 章中使用，我们必须考虑序列化问题，否则会遇到堆栈溢出。\n\n```\npackage com.bsg6.chapter09.jpa;\nimport\
  \ com.bsg6.chapter09.common.BaseArtist;\nimport com.fasterxml.jackson.annotation.JsonIgnore;\n\
  import jakarta.persistence.*;\nimport org.springframework.lang.NonNull;\nimport\
  \ java.util.ArrayList;\nimport java.util.List;\nimport java.util.Objects;\nimport\
  \ java.util.StringJoiner;\n@Entity\npublic class Artist implements BaseArtist {\n\
  @Id\n@GeneratedValue(strategy = GenerationType.AUTO)\nInteger id;\n@NonNull\nString\
  \ name;\n@OneToMany(\ncascade = CascadeType.ALL,\nmappedBy = \"artist\",\nfetch\
  \ = FetchType.EAGER\n)\n@OrderBy(\"votes DESC\")\n@JsonIgnore\nList songs = new\
  \ ArrayList();\npublic Artist() {\n}\npublic Artist(@NonNull String name) {\nthis.name\
  \ = name;\n}\n@Override\npublic String getName() {\nreturn name;\n}\n@Override\n\
  public void setName(String name) {\nthis.name = name;\n}\n@Override\npublic Integer\
  \ getId() {\nreturn id;\n}\n@Override\npublic void setId(Integer id) {\nthis.id\
  \ = id;\n}\n@Override\npublic String toString() {\nreturn new StringJoiner(\", \"\
  , Artist.class.getSimpleName() + \"[\", \"]\")\n.add(\"id=\" + id)\n.add(\"name='\"\
  \ + name + \"'\")\n.add(\"songs=\" + songs)\n.toString();\n}\n@Override\npublic\
  \ boolean equals(Object o) {\nif (this == o) return true;\nif (!(o instanceof Artist\
  \ artist)) return false;\nreturn Objects.equals(\ngetId(),\nartist.getId()\n) &&\
  \ Objects.equals(\ngetName(),\nartist.getName()\n);\n}\n@Override\npublic int hashCode()\
  \ {\nreturn Objects.hash(getId(), getName());\n}\n}\n列表 9-18\nchapter09-jpa/src/main/java/com/bsg6/chapter09/jpa/Artist.java\n\
  ```\n\n注意\n\n对`songs`的引用使用了`FetchType.EAGER`。这意味着当加载`Artist`时，该艺术家的`Song`引用会同时被加载，这可能会导致检索`Artist`的速度比预期慢。这样做的原因在于实体管理的方式；如果我们使用`FetchType.LAZY`，就需要更主动地管理访问和填充此字段的时机，而这更适合在专门讨论\
  \ JPA 主题的书籍中讲解。\n\n如果没有对`Song`的引用，我们就无法使用这个类。\n\n```\npackage com.bsg6.chapter09.jpa;\n\
  import com.bsg6.chapter09.common.BaseSong;\nimport org.springframework.lang.NonNull;\n\
  import jakarta.persistence.*;\nimport java.util.StringJoiner;\n@Entity\n@Table(indexes\
  \ = {\n@Index(\nname = \"artist_song\",\ncolumnList = \"artist_id,name\",\nunique\
  \ = true\n)\n})\npublic class Song implements BaseSong {\n@Id\n@GeneratedValue(strategy\
  \ = GenerationType.AUTO)\nInteger id;\n@ManyToOne\n@NonNull\nArtist artist;\n@NonNull\n\
  String name;\nint votes;\npublic Song() {\n}\npublic Song(@NonNull Artist artist,\
  \ @NonNull String name) {\nthis.artist = artist;\nthis.name = name;\n}\n@Override\n\
  public Integer getId() {\nreturn id;\n}\n@Override\npublic void setId(Integer id)\
  \ {\nthis.id = id;\n}\n@Override\npublic Artist getArtist() {\nreturn artist;\n\
  }\n@Override\npublic void setArtist(Artist artist) {\nthis.artist = artist;\n}\n\
  @Override\npublic String getName() {\nreturn name;\n}\n@Override\npublic void setName(String\
  \ name) {\nthis.name = name;\n}\n@Override\npublic int getVotes() {\nreturn votes;\n\
  }\n@Override\npublic void setVotes(int votes) {\nthis.votes = votes;\n}\n@Override\n\
  public String toString() {\nreturn new StringJoiner(\", \", Song.class.getSimpleName()\
  \ + \"[\", \"]\")\n.add(\"id=\" + id)\n.add(\"artist=\" + artist)\n.add(\"votes=\"\
  \ + votes)\n.toString();\n}\n}\n列表 9-19\nchapter09-jpa/src/main/java/com/bsg6/chapter09/jpa/Song.java\n\
  ```\n\n`@Table`声明包含一个使用`artist_id`和`name`的索引——这意味着我们对特定艺术家的歌曲标题有一个自然的、由数据库强制执行的限制：每个艺术家只能有一首具有给定标题的歌曲。（我们不能将歌曲的`name`用作唯一索引，因为多个艺术家可能会发布具有相同歌曲名称的歌曲。它们甚至可能是同一首歌，因为艺术家可以翻唱其他音乐人的作品：想想吉米·亨德里克斯的《沿着瞭望塔》，这是对鲍勃·迪伦歌曲的翻唱。）\n\
  \n同样，这是一个相当标准（可能也比较简单）的 JPA 实体实现。\n\n\n\n`ArtistRepository` 实际上非常简单：它只是一个接口，为 `BaseArtistRepository`\
  \ 使用了具体类型。仅此而已。这里添加的唯一信息就在接口定义中。\n\n```\npackage com.bsg6.chapter09.jpa;\nimport\
  \ com.bsg6.chapter09.common.BaseArtistRepository;\npublic interface ArtistRepository\n\
  extends BaseArtistRepository {\n}\n清单 9-20\nchapter09-jpa/src/main/java/com/bsg6/chapter09/jpa/ArtistRepository.java\n\
  ```\n\n`SongRepository` 的完成方式完全相同：它的存在仅仅是为了向 `BaseSongRepository` 添加类型信息。\n\n```\n\
  package com.bsg6.chapter09.jpa;\nimport com.bsg6.chapter09.common.BaseSongRepository;\n\
  public interface SongRepository\nextends BaseSongRepository {\n}\n清单 9-21\nchapter09-jpa/src/main/java/com/bsg6/chapter09/jpa/SongRepository.java\n\
  ```\n\n最后，我们来看 `MusicService`——这里的情况稍微复杂一点，但也不会复杂太多。我们需要实现两个方法来创建 `Artist` 和 `Song`\
  \ 的实例，并且我们还想委托给 `BaseMusicService` 的构造函数。\n\n然而，它并没有被标记为 `@Component`，因为我们将在 Spring\
  \ 配置中专门构造它。（由于所有泛型的使用导致的类型解析，使得显式配置更容易使用。）\n\n```\npackage com.bsg6.chapter09.jpa;\n\
  import com.bsg6.chapter09.common.BaseMusicService;\nimport com.bsg6.chapter09.common.WildcardConverter;\n\
  public class MusicService extends BaseMusicService {\nMusicService(\nArtistRepository\
  \ artistRepository,\nSongRepository songRepository,\nWildcardConverter converter\n\
  ) {\nsuper(artistRepository, songRepository, converter);\n}\n@Override\nprotected\
  \ Artist createArtist(String name) {\nreturn new Artist(name);\n}\n@Override\nprotected\
  \ Song createSong(Artist artist, String name) {\nreturn new Song(artist, name);\n\
  }\n}\n清单 9-22\nchapter09-jpa/src/main/java/com/bsg6/chapter09/jpa/MusicService.java\n\
  ```\n\n那么，剩下的唯一一件事就是 Spring 配置。我们将通过一个名为 `JpaConfiguration` 的类来完成。\n\n```\npackage\
  \ com.bsg6.chapter09.jpa;\nimport com.bsg6.chapter09.common.WildcardConverter;\n\
  import org.springframework.boot.SpringBootConfiguration;\nimport org.springframework.boot.autoconfigure.domain.EntityScan;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.data.jpa.repository.config.EnableJpaRepositories;\n\
  @SpringBootConfiguration\n@EnableJpaRepositories\n@EntityScan\npublic class JpaConfiguration\
  \ {\n@Bean\nWildcardConverter converter() {\nreturn new WildcardConverter(\"%\"\
  );\n}\n@Bean\nMusicService musicService(\nArtistRepository artistRepository,\nSongRepository\
  \ songRepository,\nWildcardConverter converter\n) {\nreturn new MusicService(artistRepository,\
  \ songRepository, converter);\n}\n}\n清单 9-23\nchapter09-jpa/src/main/java/com/bsg6/chapter09/jpa/JpaConfiguration.java\n\
  ```\n\n在这里，我们利用 Spring Boot 来完成大部分工作，使用了 `@SpringBootConfiguration`。这将扫描当前包（以及任何包名以\
  \ `com.bsg6.chapter09.jpa` 开头的包）以查找 Spring 组件——这将捕获我们的 `MusicService`、`ArtistRepository`\
  \ 和 `SongRepository` 接口；通过 `@EnableJpaRepositories`，我们告知 Spring 要实现哪种类型的服务（以及在哪里查找带有\
  \ `@Repository` 注解的类）。\n\n我们还使用 `@EntityScan` 注解来强制扫描当前包（以及任何“子包”，即包名以此包名开头的包）中的实体（标记有\
  \ `@Entity` 的类）。运行测试时我们不需要这个——测试注解会为我们完成——但在“真实代码”中，我们会需要它。\n\n我们还创建了 JPA 兼容的 `WildcardConverter`\
  \ 作为一个组件。\n\n请注意，我们没有做任何事情来为 JPA 创建任何资源；没有数据源，没有 `EntityManager` 引用，什么都没有。Spring\
  \ Boot 通过 `spring-boot-starter-data-jpa` 依赖为我们完成了这些。默认情况下，我们将拥有类路径中任何数据库（在此项目中为\
  \ H2）的内存版本；如果我们想要（也确实需要），我们可以使用 `application.properties` 并通过 `spring.datasource.url=jdbc:h2:file:chapter09-jpa`\
  \ 或任何合适的值来设置 JDBC URL。下面是一个示例。\n\n```\nspring.datasource.url=jdbc:h2:./chapter9jpa;DB_CLOSE_DELAY=-1;\n\
  spring.datasource.username=sa\nspring.datasource.password=\nspring.jpa.hibernate.ddl-auto=update\n\
  清单 9-24\nchapter09-jpa/src/main/resources/application.properties\n```\n\n注意\n\n\
  我们使用 `update` 作为 `spring.jpa.hibernate.ddl-auto` 的值。对于开发和测试来说，这没问题。对于生产环境来说，这简直是一场噩梦。请谨慎使用。\n\
  \n我们对 `chapter09-jpa` 的测试看起来与其余代码非常相似。我们有三个测试，每个测试都扩展了 `chapter09-test` 项目中的一个类，添加了特定于\
  \ `chapter09-jpa` 的类型信息，并且偶尔实现一两个方法来帮助测试实例化正确类型的类。\n\n这是第一个测试，`ArtistRepositoryTests`。\n\
  \n```\npackage com.bsg6.chapter09.jpa;\nimport com.bsg6.chapter09.test.BaseArtistRepositoryTests;\n\
  import org.springframework.boot.test.autoconfigure.orm.jpa.DataJpaTest;\n@DataJpaTest\n\
  public class ArtistRepositoryTests\nextends BaseArtistRepositoryTests {\nprotected\
  \ Artist createArtist(String name) {\nreturn new Artist(name);\n}\n}\n清单 9-25\n\
  chapter09-jpa/src/test/java/com/bsg6/chapter09/jpa/ArtistRepositoryTests.java\n\
  ```\n\n注意 `@DataJpaTest` 的使用。\n\n`SongRepositoryTests` 实际上是一样的。\n\n```\npackage\
  \ com.bsg6.chapter09.jpa;\nimport org.springframework.boot.test.autoconfigure.orm.jpa.DataJpaTest;\n\
  import com.bsg6.chapter09.test.BaseSongRepositoryTests;\n@DataJpaTest\npublic class\
  \ SongRepositoryTests\nextends BaseSongRepositoryTests {\n@Override\nprotected Artist\
  \ createArtist(String name) {\nreturn new Artist(name);\n}\n@Override\nprotected\
  \ Song createSong(Artist artist, String name) {\nreturn new Song(artist, name);\n\
  }\n}\n清单 9-26\nchapter09-jpa/src/test/java/com/bsg6/chapter09/jpa/SongRepositoryTests.java\n\
  ```\n\n最后，让我们看看 `MusicServiceTests`，它与前两个测试类似，主要作用是为泛型超类提供具体类型，并实现 `getNonexistentId()`，使用一个荒谬的高标识符。\n\
  \n```\npackage com.bsg6.chapter09.jpa;\nimport org.springframework.boot.test.autoconfigure.orm.jpa.DataJpaTest;\n\
  import com.bsg6.chapter09.test.BaseMusicServiceTests;\n@DataJpaTest\npublic class\
  \ MusicServiceTests\nextends BaseMusicServiceTests {\n@Override\nprotected Integer\
  \ getNonexistentId() {\nreturn 1928491;\n}\n}\n清单 9-27\nchapter09-jpa/src/test/java/com/bsg6/chapter09/jpa/MusicServiceTests.java\n\
  ```\n\n如您所见，`chapter09-jpa` 项目实际上并没有增加太多内容。它提供了具体的实体（`Artist` 和 `Song`），配置提供了一个\
  \ `WildcardConverter`；`MusicService` 也提供了一种构建实体实例的简便方法，但仅此而已。项目代码的其余部分是为各种接口提供具体类型。\n\
  \n我们是否可以以不同的方式构建基类，特别是为了不必提供像 `createArtist()` 和 `createSong()` 这样的方法？答案当然是“可以”，而且有多种方式。例如，我们可以在\
  \ `BaseMusicService` 中派生具体类的引用（这些引用对 `BaseMusicService` 不可用，但对子类可用，我们可以利用这一点）。\n\
  \n我们也可以将具体引用（即 `Artist.class`）传递给 `BaseMusicService` 的构造函数，并使用这些引用来构建新对象。\n\n\n\n\
  最终选择哪种方法实际上取决于你*偏好*哪种方法。这里选择了最简单的方法之一——抽象方法，这些方法在给定数据后，会返回有效的实例。这种方法简单且不易出错。\n\n\
  它违反了 DRY（“不要重复自己”）原则——尤其是当你考虑到每个被复制的方法签名看起来完全一样时。在这种情况下，为了简洁和简单，我们特意选择重新编写这些方法；如果我们将所有内容都抽象化，就需要再创建一整套类。\n\
  \n如果我们愿意，可以像第 8 章中看到的那样，编写一个配置来运行 Spring Boot 应用程序；剩下的就是创建一个功能性的用户界面，这样我们就有了一个可用的音乐应用程序，并使用关系数据库进行数据存储。\n\
  \n现在，让我们看看使用**不同**的数据提供者——MongoDB——需要做多少工作。\n\n### `chapter09-mongo` 项目\n\nMongoDB（[`www.mongodb.com`](http://www.mongodb.com)）是一个开源数据库，它将数据表示为二进制\
  \ JSON 文档的集合。因此，它使用动态、灵活的模式。它大致被归为“NoSQL 数据库”一类，这些数据管理系统不使用 SQL 来操作数据。它也是说明 NoSQL\
  \ 优缺点的一个很好的例子：惊人的速度和可扩展性，偶尔晦涩的查询和建模，以及通常特定于提供者的事务方法。^(¹⁰⁰)\n\n幸运的是，Spring Data 使得使用\
  \ MongoDB 变得相当简单，并且它符合我们在 JPA 示例中看到的模式，即使用 Spring Data MongoDB 模块。\n\n### 获取 MongoDB\n\
  \n我们将使用一个库，该库允许我们在测试中**嵌入** MongoDB，因此你无需安装 MongoDB。当然，你可能实际上*希望*在本地安装 MongoDB，而不是依赖嵌入式安装；毕竟，如果你使用\
  \ MongoDB 构建应用程序，外部依赖项并不意外。以下是你可以选择安装 MongoDB 的方法；请注意，测试仍将使用嵌入式版本，但如果你愿意，运行 MongoDB\
  \ 也很容易。\n\n在 OSX 上，只需运行 `brew install mongo` 即可。\n\n在 Ubuntu 上，可以通过 `apt-get install\
  \ mongodb` 安装 MongoDB。\n\n在 Windows 上，你可以通过访问其下载页面（[`www.mongodb.com/try/download/community`](http://www.mongodb.com/try/download/community)）并获取相应的\
  \ MSI 文件来安装 MongoDB。\n\n你可以通过找到一个空目录并运行它来轻松启动 MongoDB。\n\n```\nmkdir /var/tmp/musicdata\n\
  mongod --noauth -dbpath /var/tmp/musicdata\n清单 9-28\n在 Linux 上启动 MongoDB\n```\n\n\
  如果这对你不起作用，请查阅 [`www.mongodb.com`](http://www.mongodb.com) 上针对你特定操作系统的说明。另请注意，这会以无身份验证方式启动\
  \ MongoDB；这**仅**适用于运行测试和其他此类长期价值不大的操作。\n\n### `chapter09-mongo` 项目的代码\n\n我们的 `pom.xml`\
  \ 看起来与我们的 `chapter09-jpa pom.xml` 非常相似。它没有使用 `spring-boot-starter-data-jpa`，而是使用了\
  \ `spring-boot-starter-data-``mongodb`，并且还包含一个额外的测试依赖项 `de.flapdoodle.embed.mongo`。这个依赖项将允许我们的测试实际下载并启动一个嵌入式的\
  \ MongoDB 实例，这样我们就不必在执行任何测试之前确保 MongoDB 正在运行。\n\n```\n\n4.0.0\n\ncom.apress\nbsg6\n\
  1.0\n\nchapter09-mongo\n1.0\n\norg.springframework.data\nspring-data-bom\n${springDataBomVersion}\n\
  import\npom\n\ncom.apress\nchapter09-api\n1.0\n\ncom.apress\nchapter09-test\n1.0\n\
  test\n\norg.springframework.boot\nspring-boot-starter-data-mongodb\n\nde.flapdoodle.embed\n\
  de.flapdoodle.embed.mongo.spring30x\n4.7.0\ntest\n\norg.springframework.boot\nspring-boot-maven-plugin\n\
  ${springBootVersion}\n\n清单 9-29\nchapter09-mongo/pom.xml\n```\n\n`chapter09-mongo`\
  \ 项目的实体实际上是该项目与 `chapter09-jpa` 项目之间的核心实质性区别。其他类看起来几乎完全相同，主要区别在于包声明（因为 `chapter09-mongo`\
  \ 项目使用 `com.bsg6.chapter09.mongodb` 而不是 `com.bsg6.chapter09.jpa`）。\n\n然而，即使在我们的实体中，差异也很小；例如，在\
  \ `Artist` 中，我们使用 `@Document` 而不是 `@Entity`，并且主键是 `String` 而不是 `Integer`。\n\n```\n\
  package com.bsg6.chapter09.mongodb;\nimport com.bsg6.chapter09.common.BaseArtist;\n\
