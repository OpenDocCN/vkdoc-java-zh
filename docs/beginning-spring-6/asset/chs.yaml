  \ 当然也有其对应的行为，即 `@BeforeEach` 和 `@BeforeAll`。\n\n其次，注意在类级别注解中使用了 `@SpringBootTest(webEnvironment\
  \ = SpringBootTest.WebEnvironment.RANDOM_PORT)`。在**这个**测试的上下文中，端口意义不大——但我们将在本章后面用到它，所以暂时请忍耐一下。我们在这里使用这个注解是因为配置本身（实际上，它是从本章其余部分的其它测试中复制过来的，因此成为了本书这一部分的标准做法）；这很简单，我们只是将其标记为支持\
  \ Web 的配置，因此为了正确运行完整的初始化，我们需要将此测试也标记为支持 Web。我们可以通过使用多个配置来避免这种情况，这些配置都绑定在一个“顶层”配置类中，但这除了避免需要一个注解以及在本书印刷时消耗更多纸张之外，几乎没有什么用处。\n\
  \n能够重用第 3 章的测试固然很好，但按原样编写基本上很困难——因为第 3 章测试的基类位于 `src/tests` 目录中，因此它不会被导出供其他项目使用。我们本可以创建一个\
  \ `testsupport` 项目，**确实**导出类供测试使用，但这对于这么早的章节来说会引入很多复杂性。我们将在第 9 章看到这种技术的应用，届时我们将希望为两个完全独立的持久层重用测试。\n\
  \n## 添加 REST 端点\n\n我们现在有了一个 `MusicService` 实现，它使用数据库通过 `JdbcTemplate` 存储数据——因此我们与数据库的交互相当安全、易于维护，并且对于任何稍微熟悉\
  \ SQL 的人来说都很清晰。是时候将所有内容整合到一个实际的 Web 应用程序中，以展示所有部分协同工作了。^(⁹⁷)\n\n\n\n### `ArtistController`\n\
  \n让我们从小处着手，重新创建第 7 章中的`ArtistController`。（由于底层服务已更改，我们无法复用原有代码。）这段代码与第 7 章中的代码基本相同，只是增加了一个`decode()`方法（如第\
  \ 6 章简要提及，此处为完整性添加），以便处理包含空格、问号和其他特殊字符的乐队名称，并通过构造函数自动注入`MusicService`。我们还需要一个`ArtistNotFoundException`，就像第\
  \ 7 章中那样；这里不包含`ProblemDetail`，因为问题详情虽然非常重要，但不在*本章*的讨论范围内。\n\n```\npackage com.bsg6.chapter08;\n\
  import org.springframework.http.MediaType;\nimport org.springframework.web.bind.annotation.*;\n\
  import org.springframework.web.util.UriUtils;\nimport java.nio.charset.Charset;\n\
  import java.util.List;\n@RestController\npublic class ArtistController {\nprivate\
  \ MusicRepository service;\nArtistController(MusicRepository service) {\nthis.service\
  \ = service;\n}\nString decode(Object data) {\nreturn UriUtils.decode(data.toString(),\
  \ Charset.defaultCharset());\n}\n@GetMapping(value = \"/artists/{id}\",\nproduces\
  \ = MediaType.APPLICATION_JSON_VALUE)\nArtist findArtistById(@PathVariable int id)\
  \ {\nArtist artist = service.findArtistById(id);\nif (artist != null) {\nreturn\
  \ artist;\n} else {\nthrow new ArtistNotFoundException();\n}\n}\n/*\n* 如果未提供艺术家名称，则始终选择异常路径，\n\
  * 并抛出 IllegalArgumentException。\n*/\n@GetMapping(value = {\"/artists/search/{name}\"\
  , \"/artists/search/\"},\nproduces = MediaType.APPLICATION_JSON_VALUE)\nArtist findArtistByName(\n\
  @PathVariable(required = false) String name\n) {\nif (name != null) {\nArtist artist\
  \ = service.findArtistByNameNoUpdate(decode(name));\nif (artist != null) {\nreturn\
  \ artist;\n} else {\nthrow new ArtistNotFoundException();\n}\n} else {\nthrow new\
  \ NoArtistNameSubmittedException();\n}\n}\n@PostMapping(value=\"/artists\",\nproduces\
  \ = MediaType.APPLICATION_JSON_VALUE)\nArtist saveArtist(@RequestBody Artist artist)\
  \ {\nreturn service.findArtistByName(artist.getName());\n}\n@GetMapping(value={\"\
  /artists/match/{name}\", \"/artists/match/\"},\nproduces = MediaType.APPLICATION_JSON_VALUE)\n\
  List findArtistByMatchingName(\n@PathVariable(required = false)\nString name\n)\
  \ {\nreturn service.getMatchingArtistNames(name != null ? decode(name) : \"\");\n\
  }\n}\n清单 8-13\nchapter08/src/main/java/com/bsg6/chapter08/ArtistController.java\n\
  ```\n\n在`findArtistByName()`中，我们可以看到使用“传统”（即非流式）的直白代码来处理`findArtistByName()`的结果。我们本可以用流来编写这段代码；下一个示例包含一个方法，用于将`MusicService.findArtistByName()`返回的`null`转换为`Optional<Artist>`。让我们看一下，然后弄清楚它的含义：\n\
  \n我们仍然在用糟糕的方式实现 REST。当我们创建一个`Artist`（或者一个`Song`，稍后会看到）时，我们应该在响应中返回一个`Location`头，其中包含一个能返回新创建对象的端点。\n\
  \n为什么不这样做呢？\n\n嗯……一个原因是，这里的 Web 接口并非旨在做到完全完整——Spring 的 Web 层非常全面，我们只是触及了它能力的皮毛；我们主要展示的是**能够**工作的代码，而不是工作得极其出色的代码。本章已经够长了。\n\
  \n```\n/*\n* 此方法用于将 MusicService 的 findArtistByName()\n* 迁移为接受并返回 Optional 的形式\n\
  */\nOptional findArtistByName(Optional name, boolean update) {\nreturn Optional.of(service.findArtistByName(\n\
  decode(\nname.orElseThrow(\n() -> new IllegalArgumentException(\"No artist name\
  \ supplied\")\n)\n)\n));\n}\n@GetMapping({\"/artist/search/{name}\", \"/artist/search/\"\
  })\nArtist findArtistByName(\n@PathVariable(required = false) Optional name\n) {\n\
  Optional artistOptional = findArtistByName(name, false);\nreturn artistOptional.orElseThrow(\n\
  ArtistNotFoundException::new\n);\n}\n清单 8-14\nfindArtistByName 的流式版本\n```\n\n这里类内部的`findArtistByName()`方法存在有两个原因：一是将`MusicService.findArtistByName()`的结果转换为`Optional<Artist>`。显然，如果服务本身返回的是`Optional`而不是`null`来表示“未找到艺术家”，我们就不需要这个转换。另一个原因是确保在传入一个看起来有效的`name`时调用`decode()`，否则抛出异常。\n\
  \n我们**需要**这个功能吗？实际上，不需要。我们完全可以不在控制器中映射`\"/artists/search/\"`。然而，这意味着调用`/artists/search/`（不带艺术家名称）会返回\
  \ HTTP“未找到”错误，而不是“无效调用”错误（用 HTTP 错误码的说法，是`404`而不是`400`）。你可以通过添加一个返回正确错误码的特定映射来解决**这个**问题。\n\
  \n哪种方式最好？嗯……能工作的方式最好。这里并没有真正的“最佳”，尽管可以对代码的每个方面提出论点。你应该使用你认为最合理的方法。\n\n“简单”版本（即实际示例代码中的版本）的圈复杂度是\
  \ 3（它有多个分支和执行路径）。流式代码（所有代码，包括两个方法）的圈复杂度是**1**。从代码度量来看，流式版本实际上比更直白的代码**更简单**。这并不意味着流式版本更好——我们也没有使用它们，因为`MusicService`的\
  \ API 无论如何都不返回`Optional<Artist>`。这个例子只是为了说明程序员可用的（嗯哼）选项。\n\n现在来看异常类，它有一个注解，用于告诉\
  \ Spring 将其转换为 HTTP 错误码，就像第 7 章中那样。注意，它是我们实际程序代码的一部分，因此位于`src/main`中：\n\n```\npackage\
  \ com.bsg6.chapter08;\nimport org.springframework.http.HttpStatus;\nimport org.springframework.web.bind.annotation.ResponseStatus;\n\
  @ResponseStatus(code = HttpStatus.NOT_FOUND, reason = \"Artist not found\")\npublic\
  \ class ArtistNotFoundException extends RuntimeException{\n}\n清单 8-15\nchapter08/src/main/java/com/bsg6/chapter08/ArtistNotFoundException.java\n\
  ```\n\n现在，我们有了一个可用的接口，可以通过 HTTP 处理`Artist`实体。我们还不能对`Song`实体做任何操作，但让我们先让简单的东西运行起来。（毕竟，如果无法对`Artist`做任何操作，也就无法对`Song`做任何操作。）\n\
  \n当然，如果没有实际测试的东西，就不能算拥有`ArtistController`，所以让我们看看`ArtistControllerTest`——同样，它与我们在第\
