  注意


  我们很快将向这个类添加一个方法。


  在清单 6-6 中，我们有一个类 `GetSongsController`，为了告诉 Spring MVC 我们打算让这个类以某种方式响应 HTTP 请求，我们使用
  `@Controller` 注解它。这个注解基本上是我们在前面章节中看到的 `@Bean` 或 `@Component` 的一种更具体的形式，并且我们将在本章和本书中大量使用它。我们希望能够引入我们的
  `MusicService`，因此我们在声明上使用了我们在第 5 章中学到的 `@Autowired` 注解。随着我们逐步深入各章节，我们将继续使用前面章节中的服务，以便在我们已知概念的基础上进行扩展。


  与本章前面的 `GreetingController` 一样，我们使用 `@GetMapping` 注解了 `getSongsByArtist` 方法，这意味着任何对
  `/songs` 的 GET 请求都将命中此方法。


  我们的 `getSongsByArtist` 方法被设置为返回一个 `Song` 对象列表，格式为 JSON 数组。为此，我们需要接受一个查询参数 `artist`。既然我们已经走上了注解的道路，我们在方法参数前加上
  `@RequestParam`，将其映射到一个 Web 参数。


  `@RequestParam` 映射到查询参数、表单数据以及多部分请求中的部分。虽然不是必需的，但任何 `@*Mapping` 注解都可以接受一个 `params`
  属性，以便您可以更明确地指定哪些参数映射到您的方法。对于 `@RequestParam`，它可以有以下参数，所有参数也都是可选的。


  | 参数 | 描述 |

  | --- | --- |

  | `name` | 这是 URI 中查询参数的名称 |

  | `required` | 默认为 true，如果符合您的要求，可以忽略；否则指定相反值 |

  | `defaultValue` | 在未指定值时使用，以便您可以基于默认值进行操作 |


  我们将返回一个 `Song` 类型的 JSON 数组，因此我们将实现一点魔法，返回一个 `ResponseEntity` 对象，该对象在 Spring MVC
  中通常用作 `@Controller` 方法的返回值。当我们构造 `ResponseEntity` 时，我们包含歌曲列表——在 JSON 中，列表类型会表示为数组——以及
