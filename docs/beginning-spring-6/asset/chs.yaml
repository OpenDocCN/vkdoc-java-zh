  ```


  当我们构建 `Job` 时，我们使用 `JobBuilder` 来设置所有必要的部分以使其工作。`Job` 本质上只是 `Step` 实例的容器。给定流程中的每个
  `Step` 都可以使用块或 Tasklet 进行处理。Tasklet 旨在在一个步骤内执行一个任务，可能包含多个步骤，具体取决于处理方式。另一方面，块将获取固定数量的记录（一个块），并通过
  `.reader()`、`.processor()` 和 `writer()` 流程进行处理，直到没有更多记录为止。构建器接受两个重要的部分，它们将被 `JobLauncher`
  用于支持批处理的执行：作业名称和 `JobRepository`。处理 `Job` 的 CRUD 操作的 `JobRepository` 具有默认值，这些默认值可能适用于你遇到的大多数情况，参考文档中针对你可能想要自定义的不同情况提供了完整的说明。


  对于我们的情况，我们将配置两个步骤的执行。第一步导入艺术家，下一步为之前导入的艺术家导入歌曲。如果我们正在构建一个生产应用程序，我们会进行更多的验证和检查，但由于篇幅有限，我们将保持简单。我们需要添加的第一件事是一个
  `JobParametersIncrementer`，用于保持 ID 递增，我们不做任何花哨的事情，所以我们将直接使用 `RunIdIncrementer` 实现。


  我们将在下一节中详细讨论 `listener`，它基本上允许你使用 `JobExecution` 对象在作业执行之前和之后触发代码。我们也可以将 `*Listener`
  对象附加到每个 `Step` 上。它们都是步骤范围的，除了 `StepExecutionListener` 和 `SkipListener` 之外，所有监听器在发生错误时都有处理程序。


  *   `StepExecutionListener` – 在步骤执行之前和之后进行通知

  *   `ChunkListener` – 在块之前和块之后进行通知

  *   `ItemReadListener` – 在每个项目读取之前和之后进行通知

  *   `ItemProcessListener` – 在每个 `ItemProcessor` 运行之前和之后进行通知

  *   `ItemWriteListener` – 在每个项目写入之前和之后进行通知

  *   `SkipListener` – 在读取、处理或写入过程中发生跳过时进行通知，以便进一步处理


  `Step` 的不同流程可以构成一整章的内容。根据我们的需求，我们希望做一些顺序执行的事情，首先是 `step1`，然后是 `step2`，如果在处理过程中发生任何错误，作业将停止。


  ```

  @Bean

  public Job importJob(JobRepository jobRepository, Step step1, Step step2, JobNotificationListener
  listener) {

  return new JobBuilder("importJob", jobRepository)

  .incrementer(new RunIdIncrementer())

  .listener(listener)

  .start(step1)

  .next(step2)

  .build();

  }

  清单 11-10

  位于 chapter11-batch/src/main/java/com/bsg6/chapter11/GatewayConfiguration.java 中的作业定义

  ```


  但是，假设在失败时，你希望不失败，而是转移到另一个步骤？我们可以按正确的顺序组合使用 `on`、`from` 和 `to` 方法来模拟我们的新流程图。我们没有在自己的代码中实现这个流程，但认为将其作为一个示例来说明如何根据你的需求进行配置会很好。


  ```

  return new JobBuilder("myJob", jobRepository)

  .start(step1)

  .on("*").to(step2)

  .from(step1).on("FAILED").to(stepError)

  .end()

  .build();

  ```


  我们的流程基本上是说运行 `step1`，并且在所有情况下都继续执行 `step2`。如果从 `step1` 退出状态为 `FAILED`，则我们转移到 `stepError`。可以想象，对于任何特定的用例，这可能会变得相当复杂，因此请参阅
  Spring Batch 的参考文档以获取更多详细信息。


  对于我们要处理的两个步骤，我们将使用 `StepBuilder` 创建，并非常简单地命名为 `step1` 和 `step2`。对于批处理作业，我们希望提供一些合理的数据处理拆分，而
  `chunk` 方法就是我们实现这一目标的方式。对于每个步骤，我们提供一个读取器和一个写入器，我们将在下一节中更详细地介绍，但歌曲导入步骤将在其间运行一个 `processor`，以便我们可以在写入数据库之前转换由读取器创建的内容。


  ```

  @Bean

  public Step step1(JobRepository jobRepository, PlatformTransactionManager transactionManager,
  JdbcBatchItemWriter writer) {

  return new StepBuilder("step1", jobRepository)

  . chunk(5, transactionManager)

  .reader(artistReader())

  .writer(writer)

  .build();

  }

  @Bean

  public Step step2(JobRepository jobRepository, PlatformTransactionManager transactionManager,
  JdbcBatchItemWriter songsWriter) {

  return new StepBuilder("step2", jobRepository)

  . chunk(10, transactionManager)

  .reader(songReader())

  .processor(processor())

  .writer(songsWriter)

  .build();

  }

