  这段代码片段中有不少我们尚未讨论的内容，让我们来解析一下。我们使用 `@GetMapping` 注解引入了一个 `GET` 请求映射。这个注解是基础注解 `@RequestMapping`
  的一种更具体的形式。我们将在涉及 REST 时更详细地讨论 HTTP 方法，但这里只需说明，对于你想要映射到控制器的每个 HTTP 方法，都有一个对应的注解。


  `String` 是一种简单类型，不需要转换；在更复杂的情况下，Spring MVC 会使用 Jackson（作为 Spring 本身的一部分，以传递依赖的方式包含在内）将实体转换为你的方法预期返回的任何类型。


  从我们的 `@GetMapping` 可以看出，它*生成*的是 `text/plain` 类型。我们的方法返回一个类型为 `String` 的 `ResponseEntity`，考虑到我们返回的是一个简单的纯文本项，这是合理的。简单的返回值是
  `Hello, World!`，状态为 `OK` 或 `HTTP 200`。Spring MVC 会在启动时进行检查，以确保没有冲突的映射。


