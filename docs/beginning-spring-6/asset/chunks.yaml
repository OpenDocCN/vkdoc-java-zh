    在*这个*类中，将引用设为 final 的价值有限，主要是因为整个`MusicService`的价值也有限——到目前为止，我们的实现纯粹是为了展示 Spring
    的配置特性。话虽如此，在实际组件中，将值标记为`final`有助于 JVM 优化代码，同时也能明确表达你对这些值的意图：它们不应被管理或更改，而应被设置后保持不变。


