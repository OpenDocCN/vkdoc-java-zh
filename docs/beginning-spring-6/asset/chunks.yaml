    From a coding standpoint, it’s not particularly complex, but it is fairly comprehensive.


    ## Next Steps


    This chapter has been a bit of a journey through transaction support, `JdbcTemplate`
    usage, and testing of integrated services. Thankfully, the core concepts are fairly
    easy to summarize: using Spring’s data access mechanism gives you trivial access
    to transaction support, and the Spring interfaces are really easy to use despite
    presenting a wide array of options. One limitation, though, is that we’re still
    manually writing SQL for use with a relational database.


    In our next chapter, we are going to take a look at another data abstraction from
    Spring, called “Spring Data.” With Spring Data, we can write interfaces to access
    nearly **any** database, whether relational or not, and we will see how to make
    our queries programmatically verifiable.


