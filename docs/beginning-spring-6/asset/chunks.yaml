- fmt: "### Testing MusicRepository\n\nWriting `MusicRepository` is all well and good,\
    \ but as usual, it’s not worth much if it doesn’t actually work. We need a test.\
    \ Luckily, we already wrote one – all the way back in Chapter [3](#471370_2_En_3_Chapter.xhtml).\
    \ What’s presented here is a modification of `MusicServiceTests` from Chapter\
    \ [3](#471370_2_En_3_Chapter.xhtml) (Listing [3-16](#471370_2_En_3_Chapter.xhtml#PC16)),\
    \ without the superclass structure.\n\nChapter [3](#471370_2_En_3_Chapter.xhtml)\
    \ created `MusicServiceTests` as an abstract superclass for a series of tests,\
    \ so we could issue the same tests against multiple implementations of `MusicService`\
    \ by altering configuration mechanisms. We don’t have that concern in this chapter,\
    \ so this test is slightly simpler in organization. The actual code to do the\
    \ tests is the same, even though every method is slightly different because we’ve\
    \ added things like `@BeforeMethod` to our toolbox since Chapter [3](#471370_2_En_3_Chapter.xhtml).\n\
    \n```java\npackage com.bsg6.chapter08;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.boot.test.context.SpringBootTest;\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
    import org.springframework.test.context.testng.AbstractTestNGSpringContextTests;\n\
    import org.testng.annotations.BeforeMethod;\nimport org.testng.annotations.Test;\n\
    import java.util.List;\nimport java.util.function.Consumer;\nimport static org.testng.Assert.assertEquals;\n\
    @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)\n\
    public class MusicRepositoryTest extends AbstractTestNGSpringContextTests {\n\
    @Autowired\nMusicRepository musicRepository;\n@Autowired\nJdbcTemplate jdbcTemplate;\n\
    private Object[][] model = new Object[][]{\n{\"Threadbare Loaf\", \"Someone Stole\
    \ the Flour\", 4},\n{\"Threadbare Loaf\", \"What Happened To Our First CD?\",\
    \ 17},\n{\"Therapy Zeppelin\", \"Medium\", 4},\n{\"Clancy in Silt\", \"Igneous\"\
    , 5}\n};\nvoid iterateOverModel(Consumer consumer) {\nfor (Object[] data : model)\
    \ {\nconsumer.accept(data);\n}\n}\nvoid populateData() {\niterateOverModel(data\
    \ -> {\nfor (int i = 0; i \nassertEquals(\nmusicRepository.getSong((String) data[0],\n\
    (String) data[1]).getVotes(),\n((Integer) data[2]).intValue()\n));\n}\n@Test\n\
    void testSongsForArtist() {\nList songs = musicRepository.getSongsForArtist(\"\
    Threadbare Loaf\");\nassertEquals(songs.size(), 2);\nassertEquals(songs.get(0).getName(),\
    \ \"What Happened To Our First CD?\");\nassertEquals(songs.get(0).getVotes(),\
    \ 17);\nassertEquals(songs.get(1).getName(), \"Someone Stole the Flour\");\nassertEquals(songs.get(1).getVotes(),\
    \ 4);\n}\n@Test\nvoid testMatchingArtistNames() {\nList names = musicRepository.getMatchingArtistNames(\"\
    Th\");\nassertEquals(names.size(), 2);\nassertEquals(names.get(0), \"Therapy Zeppelin\"\
    );\nassertEquals(names.get(1), \"Threadbare Loaf\");\n}\n@Test\nvoid testMatchingSongNamesForArtist()\
    \ {\nList names = musicRepository.getMatchingSongNamesForArtist(\n\"Threadbare\
    \ Loaf\", \"W\"\n);\nassertEquals(names.size(), 1);\nassertEquals(names.get(0),\
    \ \"What Happened To Our First CD?\");\n}\n}\nListing 8-12\nchapter08/src/test/java/com/bsg6/chapter08/MusicRepositoryTest.java\n\
    ```\n\nA few things of note:\n\nFirst, we have a method annotated with `@BeforeMethod`.\
    \ TestNG (and other testing frameworks) has mechanisms to run specific methods\
    \ before and after different stages in a given test; in this case, we want to\
    \ run `clearDatabase()` (which clears the database and then populates it with\
    \ known data) before executing any and every method marked with `@Test`. We could\
    \ also run methods **after** each test, with `@AfterMethod`, and we have other\
    \ annotations available as well, like `@BeforeClass` and `@BeforeTest`, each of\
    \ which have their own significant behaviors. See [`https://testng.org/doc/documentation-main.html#annotations`](https://testng.org/doc/documentation-main.html#annotations)\
    \ for more details. JUnit certainly has its own analogs to this behavior with\
    \ `@BeforeEach` and `@BeforeAll`.\n\nSecond, note the use of `@SpringBootTest(webEnvironment\
    \ = SpringBootTest.WebEnvironment.RANDOM_PORT)` for the class-level annotation.\
    \ In the context of **this** test, the port makes little sense – but we’re going\
    \ to use it later in this chapter, so bear with it for now. We’re using this annotation\
    \ here because of the configuration itself (and it’s copied from the other tests\
    \ from the rest of the chapter, actually, so it becomes part of standard practice\
    \ for this section of the book); it’s simple enough that we simply marked this\
    \ as a web-enabled configuration, and therefore in order to get the full initialization\
    \ to run properly, we need to mark this as a test that is also web-enabled. We\
    \ could have avoided this by using multiple configurations, all tied together\
    \ in a sort of “top-level” configuration class, but that’d serve little purpose\
    \ other than preventing the need for one annotation and consuming more trees when\
    \ the book is printed.\n\nIt’d be nice to re-use the test from Chapter [3](#471370_2_En_3_Chapter.xhtml),\
    \ but it’s fundamentally difficult to do as written – because the base class for\
    \ the Chapter [3](#471370_2_En_3_Chapter.xhtml) tests is in the `src/tests` directory,\
    \ and therefore, it isn’t exported for use by other projects. We could have created\
    \ a `testsupport` project that **did** export classes for use in testing, but\
    \ that would have introduced a lot of complexity for such an early chapter. We\
    \ will see this technique applied in Chapter [9](#471370_2_En_9_Chapter.xhtml),\
    \ when we want to reuse tests for two completely separate persistence layers.\n\
    \n## Adding the REST Endpoints\n\nWe now have a `MusicService` implementation\
    \ that uses a database to store data with `JdbcTemplate` – so our interactions\
    \ with the database are reasonably safe, easy to maintain, and clear to anyone\
    \ moderately familiar with SQL. It’s time for us to tie all of it together into\
    \ an actual web application to show all of the pieces working together.^([^(97)](#fn97))"
