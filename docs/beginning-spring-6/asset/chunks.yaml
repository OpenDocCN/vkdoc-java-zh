    ### 构建 ArtistService


    现在我们需要开始填充服务层——这意味着，像往常一样，创建一组文件。我们需要一种表示艺术家的方式——因此，我们将创建一个类，`com.bsg5.chapter07.Artist`，这很合乎逻辑。我们还需要一个服务——实际上是一个
    `Repository`，即负责与数据库交互的组件——我们将其命名为 `com.bsg6.chapter07.ArtistRepository`。最后，我们需要一个将服务连接到
    Web 层的组件——即控制器——因此，很自然地，我们将创建一个 `com.bsg6.chapter07.ArtistController`。


    注意


    如果你对第 3 章记忆犹新，你会记得我们当时使用了一个 `MusicService` 类来处理与数据模型相关的所有操作。而在这里，我们正如在第 3 章中所预告的那样，将功能拆分了出来。原因在于：便利性。我们在第
    3 章中选择构建内存服务，是因为将数据模型的控制点集中在一组数据结构中要简单得多。而在这里，我们有了一个真正的“记录系统”——数据库——将交互拆分成更小的模块是合理的，因为从数据管理的角度来看，我们无需担心艺术家与歌曲之间的相互干扰。


    `Artist` 类是一个简单的 POJO，具备其应有的一切特征：一个无参构造函数（默认构造函数）、私有字段、一个用于初始化私有字段的构造函数、访问器和修改器^(⁹²)、`equals()`
    和 `hashCode()` 的实现，以及一个简单的 `toString()` 实现。一旦字段被添加到类中，几乎所有代码都由 IDE 生成；这个实现没有任何特殊或独特之处。（例外情况：`compareTo()`
    方法忽略了艺术家名称的大小写，`equals()` 方法也做了同样的修改。）与它所做的事情相比，这是一个很长的类——毕竟它只是一个用于存放艺术家引用的容器——但这正是
    Java 的美妙（或“美妙”）之处。


    注意


    当然，我们还有其他选择。为了简单起见，我们为 `Artist` 选择了 POJO；例如，我们也可以使用 Java 的 `record` 类。


    ```

    package com.bsg6.chapter07;

    import java.util.Objects;

    import java.util.StringJoiner;

    public class Artist implements Comparable {

    private int id;

    private String name;

    public Artist() {

    }

    public Artist(int id, String name) {

    this.id = id;

    this.name = name;

    }

    public int getId() {

    return id;

    }

    public void setId(int id) {

    this.id = id;

    }

    public String getName() {

    return name;

    }

    public void setName(String name) {

    this.name = name;

    }

    @Override

    public String toString() {

    return new StringJoiner(", ",

    Artist.class.getSimpleName() + "[", "]")

    .add("id=" + id)

    .add("name=''" + name + "''")

    .toString();

    }

    @Override

    public boolean equals(Object o) {

    if (this == o) return true;

    if (!(o instanceof Artist)) return false;

    Artist artist = (Artist) o;

    return getId() == artist.getId() &&

    Objects.equals(

    getName().toLowerCase(),

    artist.getName().toLowerCase()

    );

    }

    @Override

    public int hashCode() {

    return Objects.hash(getId(), getName());

    }

