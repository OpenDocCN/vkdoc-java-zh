    端点发出请求，然后检查预期的 HTTP 响应和预期的 HTTP 实体内容（即，确保我们得到正确的 HTTP 状态，然后检查响应中包含的数据）。大部分代码都是基于我们对数据库已知数据所做的断言；`artistData()`（我们的一个数据提供者方法）包含
    `Artist` 的名称和标识符，而 `artistSearches()` 则跟踪与所提供内容匹配的响应数量（如果请求包含 `"Th"`，则应返回 `Threadbare
    Loaf` 和 `Therapy Zeppelin` 两位艺术家，记录数为 `2`）。


