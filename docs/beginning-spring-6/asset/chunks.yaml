    In Chapter [5](#471370_2_En_5_Chapter.xhtml) we introduced using Mustache for
    our template rendering, and we’ll continue doing that with Spring MVC. The reason
    to use this library is it provides a very simple and easily understood templating
    engine. It’s a fine option, and if you’re looking for something an alternative
    you can look into Freemarker (`https://freemarker.apache.org/`), or dispense with
    any of this and just write RESTful components which return JSON.


    In order to use Mustache, we need to register a new `ViewResolver` and set up
    where our templates are and what suffix to use when we scan.


    **Note**


    We’re explicitly creating a `ViewResolver` here. Spring already has a Mustache
    `ViewResolver`, as part of Spring Boot, and we’ll use that one in future chapters,
    but we’re not ready to use Spring Boot yet for this chapter. This `ViewResolver`
    is enough for now. If you look at the one provided by Spring itself, this one’s
    a pretty close copy.


    To create a `ViewResolver`, we have to first create an implementation of a `View`.'
