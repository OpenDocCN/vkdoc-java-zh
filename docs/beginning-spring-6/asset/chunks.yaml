    \ for a value called `name`. The renderer (Mustache, of course) will replace `{{\
    \ name }}` with the value of `name` passed into the `render()` method, if any.\n\
    \nAll this is well and good, but it’s a little bit abstract: how do we *run* it?\
    \ How can we get our Servlet to actually achingly and finally greet the world,\
    \ which surely has been waiting with bated breath?\n\nWe do it with Maven and\
    \ the afore-mentioned `jetty-maven-plugin` plugin, of course, by executing the\
