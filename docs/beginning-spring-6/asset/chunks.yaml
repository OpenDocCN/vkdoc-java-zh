    ## Configuration Through XML


    XML is not *required* to define a configuration, even though we’ve used it so
    far to kick-start the process of scanning for components. However, it *is* historically
    the most common (it’s the oldest configuration mechanism), and it also has the
    benefit of centralizing configuration very easily. (We can see that because in
    every configuration in this chapter, we’ve used XML to do component scanning.)


    What we’d like to do is demonstrate the basic XML wiring capabilities, by replicating
    our annotation-based examples, except with XML. The only exceptions will be the
    test classes themselves, which will continue to use annotations for injection;
    this is because the `AbstractTestNGSpringContextTests` class (and its JUnit equivalent)
    specifically implements a process by which annotation injection is applied. Therefore,
    there’d be no point to explicitly using XML to wire the test class’ dependencies;
    the annotations are already being scanned and processed.'
