    ```


    ## Lifecycle with JSR-250 Annotations


    Annotations provide most – but not **quite** all – features that the XML configuration
    provides. The main difference is in construction; most other lifecycle features
    are either identical (with the `InitializingBean` and `DisposableBean` interfaces)
    or have direct analogs (with annotations that contain method names for `init-method`,
    for example). Let’s step through our features, one by one, starting with component
    scope.


    ### Annotated Beans with Scopes


    The scopes can be demonstrated with annotations logically enough: simply add the
    `@Scope` annotation with the correct scope name. Our example will be slightly
    more contrived than our XML example, because we need two different types such
    that they’re annotated differently. We’re going to use only **one** configuration
    file for all of the annotated lifecycle tests, though, and here it is.


    ```


    Listing 4-13

