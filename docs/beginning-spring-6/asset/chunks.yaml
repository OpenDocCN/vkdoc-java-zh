    package com.bsg6.chapter06;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.http.MediaType;

    import org.springframework.test.context.ContextConfiguration;

    import org.springframework.test.context.testng.AbstractTestNGSpringContextTests;

    import org.springframework.test.context.web.WebAppConfiguration;

    import org.springframework.test.web.servlet.MockMvc;

    import org.springframework.test.web.servlet.setup.MockMvcBuilders;

    import org.springframework.web.context.WebApplicationContext;

    import org.testng.annotations.Test;

    import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.get;

    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.status;

    @Test

    @WebAppConfiguration

    @ContextConfiguration(classes = GatewayAppWebConfig.class)

    public class TestGreetingController

    extends AbstractTestNGSpringContextTests {

    @Autowired

    private WebApplicationContext wac;

    private MockMvc mockMvc;

    @Test

    public void greetingTest() throws Exception {

    this.mockMvc = MockMvcBuilders

    .webAppContextSetup(this.wac)

    .build();

    this.mockMvc.perform(get("/greeting")

    .accept(MediaType.ALL))

    .andExpect(status().isOk());

    }

    }

    Listing 6-4

    chapter06/src/test/java/com/bsg6/chapter06/TestGreetingController.java

    ```


    The preceding test is a fairly simple test ensuring that our controller is handling
    things that we expect it to. We are using the `MockMvc` class which fakes the
    HTTP call for the web layer so that we can keep this test quick, and we’re purposefully
    not starting up a web container for the test as that will be covered more in Chapter
    [7](#471370_2_En_7_Chapter.xhtml) with the `TestRestTemplate`. With this test
    we can ensure the contract is being fulfilled and our code is doing what it’s
    supposed to, which is exactly what you’d want to see in a test.


    You’ll notice that it uses a `GatewayAppWebConfig` class. We’re going to flesh
    this out further, but here’s enough to get things running for now.


    ```

    package com.bsg6.chapter06;

    import org.springframework.context.annotation.ComponentScan;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.web.servlet.config.annotation.EnableWebMvc;

    import org.springframework.web.servlet.config.annotation.WebMvcConfigurer;

    @Configuration

    @EnableWebMvc

    @ComponentScan(basePackages = {"com.bsg6.chapter06", "com.bsg6.chapter03.mem03"})

    public class GatewayAppWebConfig implements WebMvcConfigurer {

    }

