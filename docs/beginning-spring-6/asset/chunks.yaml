    #### The Model


    First let’s take a look at our model classes, `Artist` and `Song`. These are simple
    Java objects, and as such there’s a lot of boilerplate with accessors and mutators,
    `equals()`, `hashCode()`, and `toString()`.


    Our implementations are also fairly simple – we’re choosing mutable classes, with
    default constructors as well as simple parameterized constructors. We’re leaving
    our classes mutable (thus, an `Artist` might change names, according to our model.)
    There are reasons to prefer immutable classes (namely, performance, and avoiding
    having programmers who worship at the Church of Functional Programming say rude
    things about you), and there are also reasons to expect more complicated constructors
    that validate arguments and other such things, but we’re going to stay simple
    by choice and acknowledge that there are workable alternatives even though we’re
    not using them here.


    Our first class is the `Song`, which is very simple: it contains the `Song name`
    (a `String`) and a number of `votes`, basically the number of people who suggest
    that this `Song` is a good hook for its artist. It does not have a reference to
    the `Artist` (because it will exist only in the context of an `Artist`, as we’ll
    see in the next code listing – an `Artist` has a reference to a `Set` of `Song`
    instances).


    Most of the code in the listing is, of course, boilerplate; note that we do not
    consider `votes` as part of uniqueness, but only the `Song name`.


