- fmt: "### The `SongController`\n\nNow for new code – let’s add a `SongController`.\
    \ This is a fairly simple controller, as you can see – nearly everything is delegated\
    \ to the `MusicService`. The same approaches that we discussed for `ArtistController`\
    \ apply here as well.\n\n```java\npackage com.bsg6.chapter08;\nimport org.springframework.http.MediaType;\n\
    import org.springframework.web.bind.annotation.GetMapping;\nimport org.springframework.web.bind.annotation.PathVariable;\n\
    import org.springframework.web.bind.annotation.RestController;\nimport org.springframework.web.util.UriUtils;\n\
    import java.nio.charset.Charset;\nimport java.util.List;\n@RestController\npublic\
    \ class SongController {\nprivate MusicRepository service;\nSongController(MusicRepository\
    \ service) {\nthis.service = service;\n}\nString decode(Object data) {\nreturn\
    \ UriUtils.decode(data.toString(), Charset.defaultCharset());\n}\n@GetMapping(value=\"\
    /artists/{name}/vote/{title}\",\nproduces = MediaType.APPLICATION_JSON_VALUE)\n\
    Song voteForSong(@PathVariable String name, @PathVariable String title) {\nreturn\
    \ service.voteForSong(decode(name), decode(title));\n}\n@GetMapping(value=\"/artists/{name}/song/{title}\"\
    ,\nproduces = MediaType.APPLICATION_JSON_VALUE)\nSong getSong(@PathVariable String\
    \ name, @PathVariable String title) {\nreturn service.getSong(decode(name), decode(title));\n\
    }\n@GetMapping(value=\"/artists/{name}/songs\",\nproduces = MediaType.APPLICATION_JSON_VALUE)\n\
    List getSongsForArtist(@PathVariable String name) {\nreturn service.getSongsForArtist(decode(name));\n\
    }\n@GetMapping(value={\"/artists/{name}/match/{title}\",\n\"/artists/{name}/match/\"\
    },\nproduces = MediaType.APPLICATION_JSON_VALUE)\nList findSongsForArtist(@PathVariable\
    \ String name,\n@PathVariable(required = false)\nString title) {\nreturn service.getMatchingSongNamesForArtist(decode(name),\n\
    title != null ? decode(title) : \"\");\n}\n}\n```\n\nListing 8-17  \n`chapter08/src/main/java/com/bsg6/chapter08/SongController.java`\n\
