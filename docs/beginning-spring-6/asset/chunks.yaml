    Here, we leverage Spring Boot to do most of the work, with `@SpringBootConfiguration`.
    This will scan the current package (and any packages whose names start with `com.bsg6.chapter09.jpa`)
    for Spring components – which will catch our `MusicService` and `ArtistRepository`
    and `SongRepository` interfaces; with `@EnableJpaRepositories` we’re informing
    Spring of what kind of services to implement (and where to look for classes that
    have the `@Repository` annotation).


    We also use the `@EntityScan` annotation to force scanning for entities (classes
    marked with `@Entity`) in the current package (and any “subpackages” – i.e., packages
    whose names start with this package’s name.) We won’t need this to run our tests
    – the test annotations will do this for us – but in “real code” we’ll want it.


    We also create our JPA-compatible `WildcardConverter` as a component.


    Note that we’re not doing anything to create any resources for JPA; no datasources,
    no `EntityManager` references, nothing. Spring Boot is doing that for us, through
    the `spring-boot-starter-data-jpa` dependency. By default we’ll have an in-memory
    version of whatever database is in our classpath (H2, in this project); if we
    wanted to (and we do), we can use `application.properties` and set a JDBC url
    with `spring.datasource.url=jdbc:h2:file:chapter09-jpa`, or whatever value makes
    sense. Here is an example.


    ```

    spring.datasource.url=jdbc:h2:./chapter9jpa;DB_CLOSE_DELAY=-1;

    spring.datasource.username=sa

    spring.datasource.password=

    spring.jpa.hibernate.ddl-auto=update

    Listing 9-24

    chapter09-jpa/src/main/resources/application.properties

    ```


    Note


    We are using `update` as the value for `spring.jpa.hibernate.ddl-auto`. For development
    and testing, this is fine. For production, this is a nightmare. Use it with caution.


