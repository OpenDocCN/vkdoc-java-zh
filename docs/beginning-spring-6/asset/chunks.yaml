    Aside from the `@ContextConfiguration` annotation on the test class itself, we
    also have two fields marked with `@Autowired`. The first one is an `ApplicationContext`
    and the second is a `MusicService`. When Spring sees an `@Autowired` field, it
    will look for classes that it manages that fit the description of the field, and
    automatically set their references to the matching instances.


    Warning


    Autowiring happens **only** if Spring manages the class that requests autowiring!
    If we were to instantiate the classes manually, Spring would leave them alone
    and no wiring would occur.


    The simplest matching is done on the basis of type; if we are wiring a field of
    type `ApplicationContext` and Spring is managing only one component that can be
    assigned to that field, then that component’s reference is used in the field.


    If the configuration contains more than one component that can be assigned to
    the reference, then Spring will look for a component whose name matches the reference.
    Thus, if we had a field named `xyzyx`, of type `Fuzzball`, it would look for a
    *single* component of type `Fuzzball`, and if it had more than one `Fuzzball`
    in the configuration, it would look for the component named `xyzyx`, and fail
    to inject that value if such a component wasn’t found.


    We’ll also see the use of `@Qualifier` for autowired fields in a subsequent test,
    through which we can tell Spring what specific component name to look for, such
    that it does not try to derive the component name from the reference. (In other
    words, we could tell it to look for a component called `myxalotl` even if the
    field was `xyzyx`. We promise: we’ll explain more later.)


    There are two tests in this file: `testConfiguration()` and `testMusicService()`.
    The first test, `testConfiguration()`, simply checks our configuration to demonstrate
    that wiring has occurred properly. It first checks to make sure that the `ApplicationContext`
    has been provided to the test; if the `context` reference is `null`, we know something
    has failed rather dramatically.^([^(50)](#fn50)) After it makes sure that the
    `context` is available, it checks to make sure that a component with a specific
    name (`musicService1`) is available in the context. This is the name Spring will
    derive from a component called `MusicService1`, by default. We can override it
    with `@Component`, and we will do so in a later example; if no name is specified,
    Spring takes the class name (`MusicService1`) and decapitalizes the first letter
    (leaving it as `musicService1`).


    If you would like to see all of the beans in the context as specified by our current
    configuration and package structure, you could include the code from the Java
    comment. For this test, for the record, this code outputs the following.


    ```

    org.springframework.context.event.internalEventListenerProcessor

    org.springframework.context.event.internalEventListenerFactory

    org.springframework.context.annotation.internalConfigurationAnnotationProcessor

    musicService1

    org.springframework.context.annotation.internalAutowiredAnnotationProcesso

    Listing 3-12

    Console output from the commented code in TestMusicService1

    ```


    The `org.springframework` classes noted here are components for internal Spring
    use; they’re not really things we care about much, as application designers. What
    we’re looking for in that list is the `musicService1` reference.


    The second test simply calls `getSong()` for our mythical band, “Threadbare Loaf,”
    and makes sure that the song should have no votes (as we’ve not registered any
    yet).'
