- fmt: '# Testing


    The best way to ensure that your program is working as intended is *not* `System.out.println`
    all over your codebase. It’s to write tests. Tests allow us to write assumptions
    about what our code does, and have those validated (or not). They help with refactoring
    and can sometimes be an initial basis for self documentation of the codebase.


    As we saw in Listing [2-1](#471370_2_En_2_Chapter.xhtml#PC3), we added TestNG
    to our configuration for every submodule in our directory structure. So let’s
    assume before we write any implementation that we have a class called `HelloWorldGreeter`
    that implements an interface `Greeter` which defines two methods `greet()` and
    `setPrintStream()`.


    Here is our very simple `Greeter` interface.


    ```

    package com.bsg6.chapter02;

    import java.io.PrintStream;

    public interface Greeter {

    void setPrintStream(PrintStream printStream);

    void greet();

    }

    Listing 2-3

    chapter02/src/main/java/com/bsg6/chapter02/Greeter.java

    ```


    As mentioned above, TestNG makes use of annotations to instrument your test classes.
    For our test `GreeterTest`, we will use the method annotation `@Test` to let TestNG
    know to run `testHelloWorld` as a test – if any of the assertions fail, or if
    an exception is thrown, the test will be considered to have failed.


    ```

    package com.bsg6.chapter02;

    import org.testng.annotations.Test;

    import java.io.ByteArrayOutputStream;

    import java.io.PrintStream;

    import java.nio.charset.StandardCharsets;

    import static org.testng.Assert.assertEquals;

    public class GreeterTest {

    @Test

    public void testHelloWorld() {

    Greeter greeter = new HelloWorldGreeter();

    final ByteArrayOutputStream baos = new ByteArrayOutputStream();

    try (PrintStream ps = new PrintStream(baos,

    true,

    StandardCharsets.UTF_8)) {

    greeter.setPrintStream(ps);

    greeter.greet();

    }

    String data = baos.toString(StandardCharsets.UTF_8);

    assertEquals(data, "Hello, World!");

    }

    }

    Listing 2-4

    chapter2/src/test/java/com/bsg5/chapter2/GreeterTest.java

    ```


    You can see above that we also have a static import so in our assertions we can
    type `assertEquals(actual, expected)` vs. `Assert.assertEquals(actual, expected)`.
    Using static imports in test code is generally a good idea^([^(33)](#fn33)) as
    this type of code tends to duplicate calls many times in each method and we’re
    not losing any readability since it’s fairly constrained. The implementation of
    a `Greeter` is that an implementation will output something (the default implementation
    will send to `System.out`). A test that can confirm this is a bit difficult, so
    we inject our own implementation of a `PrintStream` and use that to assert the
    test case we expect. Take a look at the snippet of code below, and see how we’re
    creating a new `HelloWorldGreeter` object, a `ByteArrayOutputStream`, and the
    `PrintStream` which our `Greeter` will use to send data to (which by default is
    assigned to `System.out` – we want to override it so we can check the output).


    Now that we have a test we can use to validate expected functionality, let’s write
    the implementation for `HelloWorldGreeter` so we can get it to compile and run.
    Below you’ll find a base implementation of the `Greeter` interface.


    ```

    package com.bsg6.chapter02;

    import java.io.PrintStream;

    public class HelloWorldGreeter implements Greeter {

    public void setPrintStream(PrintStream printStream) {

    }

    public void greet() {

    }

    }

    Listing 2-5

    HelloWorldGreeter without implementation

    ```


    With the above in place, we can run `mvn test` and get the expected failure below.^([^(34)](#fn34))
    The failure proves our assumption that the current implementation of `Greeter`
    does in fact not print “Hello, World!” and the test works as expected. (The actual
    failure record can be seen in `chapter02/target/surefire-reports/index.html`,
    if you’re interested, but in this case we know exactly why the test failed: our
    class doesn’t do anything yet.)


    ```

    [INFO]

    [INFO] Results:

    [INFO]

    [ERROR] Failures:

    [ERROR]   GreeterTest.testHelloWorld:23 expected [Hello, World!] but found []

    Listing 2-6

    GreeterTest failure

    ```


    Finally, let’s actually write the implementation for `HelloWorldGreeter` so that
    we know the test not only works as expected but will pass. We’re going to write
    a non-Spring implementation of `HelloWorldGreeter` so that in the next section
    when we add the relevant Spring configuration you’ll have a base of understanding
    to work from.


    ```

    package com.bsg6.chapter02;

    import com.bsg6.chapter02.Greeter;

    import java.io.PrintStream;

    public class HelloWorldGreeter implements Greeter {

    private PrintStream printStream = System.out;

    public void setPrintStream(PrintStream printStream) {

    this.printStream = printStream;

    }

    public void greet() {

    printStream.print("Hello, World!");

    }

    }

    Listing 2-7

    chapter02/src/main/java/com/bsg6/chapter02/HelloWorldGreeter.java

    ```


    Now if we rerun the build, the test passes, because the `PrintStream` contains
    the content the test expects.


    In this section, we wrote a test using TestNG against the `Greeter` interface
    and exercised the implementation we wrote called `HelloWorldGreeter`. Everything
    has used vanilla Java so far because of the nature of the example and was very
    simple to achieve. In the next section we’re going to refactor the above to show
    you how to wire the beans together using the power of Spring’s dependency injection
    framework.'
