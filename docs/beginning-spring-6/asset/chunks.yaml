    在接下来的示例中，我们将继续展示 Spring MVC 的部分功能，并尽可能在每个示例中遵循 REST 风格。鉴于这是本书中首次讨论 REST，我们有必要在下一节中探讨使用这种范式所固有的一些架构概念。


    ### REST 概念


    过去几十年中，指导 API 设计的主要策略之一便是 REST，即表述性状态转移。^(⁸²) 它由 Roy T. Fielding 在 20 世纪 90 年代末期与
    HTTP 1.1 的开发同步提出，并基于 HTTP 1.0 的现有设计。将 SOAP 协议^(⁸³)与 REST 所指定的架构原则进行比较，我们可以看到 REST
    更侧重于通过利用 HTTP 协议内置的概念来降低整体复杂性和提高可发现性。


    作为 RESTful API 的基础实现，应遵循以下两点。当然还有其他原则，但以下两点最为普遍：


    *   基础 URI——例如[`http://api.bandgateway.com/songs/`](http://api.bandgateway.com/songs/)，它指定了集合（此处为“songs”），你将通过
    HTTP 方法指定的操作在该集合上进行操作。


    *   恰当地使用 HTTP 方法，最常用的是`GET`、`POST`、`PUT`和`DELETE`。其他方法如`PATCH`、`OPTIONS`和`HEAD`使用频率较低，但同样重要。在
    REST 中，它们被用作对集合或实体执行的操作。


    我们并非暗示 REST 架构风格的其他原则没有用处——它们确实有用。但它们超出了**本书**的讨论范围。


    上述原则应该能帮助你朝着构建更简单的 API 迈出一大步。接下来，我们来谈谈如何恰当地使用 HTTP 方法。'
- fmt: '#### Using HTTP Methods Appropriately


    They say there’s no wrong way to eat a Reese’s,^([^(84)](#fn84)) and the same
    can be said of using HTTP methods. There is, however, a prescribed way of using
    the HTTP methods to follow the REST architectural style.


    REST splits things into member resources and collection resources. It bills itself
    as a paradigm because it doesn’t fit every possible API out there but does a very
    good job at representing most patterns you can think of. Below we’ll expand on
    some of this, but if your API feels like it needs something a bit different, that’s
    fine; it’s not a perfect abstraction, so focus on getting the job done rather
    than building out the perfect API. For the purposes of our simple API, we’ll talk
    about a single level of both resources **and** collections, but just know that
    nesting is possible and simple enough to achieve with Spring MVC. If you’re dealing
    with a collection of resources, you’d be looking at a URL like `http://api.bandgateway.com/songs/`.
    For a member resource we will specify an identifier of some kind so your URL structure
    will look more like `http://api.bandgateway.com/songs/42`.


    Warning: jargon ahead!


    The list of HTTP verbs often refers to a concept of “idempotency.” A call is “idempotent”
    when you can make multiple calls with the exact same data and produce the **same**
    result. Operations that are read-only – like `GET` – are idempotent by nature;
    for other verbs, it can get a little more complicated. If a call changes the application
    state but does so consistently, it’s considered to be idempotent, like what would
    happen if you turned a light switch to “on” multiple times – it’s just going to
    stay on. In reality, of course, it’s a little more complicated.


    Abstractions are nice, but not perfect. Back to our text!


    `GET` is used to retrieve a resource. A request of this nature should normally
    have no side effects, meaning that the request is “safe” because the state of
    the resource is never changed.


    ![](images/471370_2_En_6_Chapter/471370_2_En_6_Figa_HTML.jpg)


    A diagram illustrates client-server communication via requests and responses.
    The client sends 2 get requests for songs slash 1 and 1 for songs slash 3. The
    server responds with 200 status codes and data for songs slash 1, and 404 status
    code for songs slash 3.


    `POST` is used to create new resources and will use the collection resource URL
    structure. The primary differences with `PUT` are that it is not idempotent as
    multiple calls to `POST` will create new resources and it uses the collection
    resource URL structure. (It’s not idempotent because each call will create new
    object state, and the new state will have its own identifiers, and so forth.)


    ![](images/471370_2_En_6_Chapter/471370_2_En_6_Figb_HTML.jpg)


    A diagram illustrates client-server communication via requests and responses.
    The client sends 2 post requests for songs with title something. The server responds
    with i d 1, title something for the first request, and i d 2, title something
    for the second request.


    `PUT` is used primarily to update an existing resource in full. If the resource
    does not exist, the origin server must use the HTTP 201 (Created) response code
    and if it is an update a HTTP status code 200 if returning the entity, or an HTTP
    status code 204 if the choice is made to not return the entity. `PUT` requests
    should be idempotent, which means that they should produce the same result if
    executed once or multiple times with the same data, which ensures repeated/retried
    calls to a `PUT` will not cause unintended effects (thus, idempotency). In addition,
    a `PUT` request is operated on an individual resource rather than the collection
    since it’s intended to be an update in most cases.


    ![](images/471370_2_En_6_Chapter/471370_2_En_6_Figc_HTML.jpg)


    A diagram illustrates client-server communication via requests and responses.
    The client sends 3 put requests for songs slash 1 with respective titles. The
    server responds with 201, i d 1, title something for the first request, and 200,
    i d 1, title something for the last 2 requests.


    `DELETE` is used to remove a resource identified by the Request URI. As with `PUT`,
    a `DELETE` operation is idempotent which means repeatedly calling the `DELETE`
    endpoint on that resource will not change the outcome but a second time will return
    a 404 assuming the delete was successful.


    ![](images/471370_2_En_6_Chapter/471370_2_En_6_Figd_HTML.jpg)


    A diagram illustrates client-server communication via requests and responses.
    The client sends 2 delete requests for songs slash 1. The server responds with
    200 status code for the first request and 404 status code for the second request.


    `OPTIONS` is generally used for CORS requests.^([^(85)](#fn85)) A deeper look
    at CORS is beyond the scope of this book; it is a security-based mechanism implemented
    via HTTP headers that tells a browser to allow an application running at one origin
    to have permission to access selected resources from a different origin. In the
    real world, a common vector of web-based attack is injecting malicious JavaScript
    code which may hit other domains you have desired access to. Thus, a best practice
    is to limit the scope of external code that is allowed to hit your API to an approved
    list of domains. We’re not going to include a sequence diagram for `OPTIONS`,
    even a small one, since it’s out of scope for this chapter.


    The above is (hopefully) a suitable-yet-sparse primer on useful methods with HTTP
    and REST, so let’s put them into action next with our first REST endpoint.'
