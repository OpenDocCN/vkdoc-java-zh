    throws an exception; for this chapter, all of our services **are** resettable,
    and if they’re not, we want to know. Assuming they are, then this method simply
    delegates to the service’s `reset()` method, which **should** empty out the service’s
    data model.


    After that, we have four methods that are designed to be delegated to – `testSongVoting()`,
    `testSongsForArtist()`, `testMatchingArtistNames()`, and `testMatchingSongsForArtist()`.
