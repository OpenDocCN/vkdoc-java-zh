- fmt: '### Constructor Injection with Annotations


    There’s one more primary mode of bean injection we haven’t addressed so far: constructor
    injection. If you’ve looked at our example code in an IDE like IDEA (`https://jetbrains.com/idea`)
    or Eclipse (`https://eclipse.org`), you might have noticed that the IDE was telling
    you something ominous about the `@Autowired` annotation, like “Field injection
    is not recommended.”


    The alternative is to use *constructor injection*, to have a constructor with
    parameters marked with `@Autowired` and, if necessary, `@Qualifier`. The reason
    is pretty simple: fields are mutable by implication, and using a constructor argument
    means that we can mark a field as `final`; *this* means that we can not only *require*
    a field to be set, but we can also assume that when it’s set, it remains at the
    value that’s been set.


    In practice, all we need to do to enable constructor injection is, well, to create
    a valid constructor with the arguments marked for injection. The rules for constructor
    injection mirror the rules for field injection; we just get more control over
    it.


    One other thing we’d like to do, to save ourselves from endless repetition in
    later sections (and chapters), is introduce a new configuration tag: `<import>`.


    **Note**


    If you’re wishing we’d have introduced this tag earlier in the chapter…​ well,
    us too. However, we’re trying to introduce new pieces of information at a deliberately
    slow pace, to avoid overwhelming readers new to the concepts we’re discussing,
    so this was where we *finally* felt like we had the chance to introduce this one.
    We’ve found that people usually learn best when new concepts are introduced piecemeal,
    so we’ve chosen to go fairly slowly.


    What `<import>` does should be pretty obvious: it imports a separate configuration
    file into another. It allows us to create modular configurations.


    We’re going to create two “modules” – meaning configurations with specific purposes.
    One is going to be a set of `Normalizer` instances, from the `com.bsg6.chapter03.mem03`
    package; the other is going to be our `MusicServiceTests` class. When we import
    those two configurations into a *third* configuration, the beans in each configuration
    will have access to one another.


    There’s one problem, though: the `mem03` package has a `MusicService` implementation,
    too! So we’re going to introduce an additional attribute for `<context:component-scan
    />`, called `resource-pattern`.


    Let’s start building our modules. First, the simplest one, a pure-XML configuration
    for `MusicServiceTests`. We’re not going to change that class from the code we’ve
    already seen, so there’s no annotation; we’re going to use a simple XML `<bean
    />` tag, much as we saw in Chapter [2](#471370_2_En_2_Chapter.xhtml).


    ```

    Listing 3-24

    chapter03/src/test/resources/musicservicetest.xml

    ```


    This configuration is quite simple: it declares a bean named `musicServiceTests`,
    of the type `com.bsg6.chapter03.MusicServiceTests`. Therefore, in any context
    in which *this* file is referenced, `MusicServiceTests` is a valid candidate for
    injection, as we’ll see.


    ```

    Listing 3-25

    chapter03/src/test/resources/normalizers.xml

    ```


    Here, we see the `resource-pattern` annotation for `<context:component-scan />`.
    This tag is a filter for the classes being scanned. Here, we use `resource-pattern="*Normalizer.class"`,
    which means that the only classes included in the scan are classes that *end with*
    `Normalizer` – thus, our `SimpleNormalizer` and `CapLeadingNormalizer` classes.


    Why are we using `resource-pattern` here? Well, what we’re really doing is saying
    to scan only **specific** classes in the `com.bsg6.chapter03.mem03` package. If
    we didn’t limit the scan to only the normalization classes, we’d be importing
    the `MusicService3` too, and we don’t want to include that class in a configuration
    that’s supposed to be limited to, well, normalizers only.


    The expression used here is a Java regular expression and includes the *entire*
    resource name – by default it’s `**/*.class`, meaning “any file in the entire
    package tree beginning at the package specified in `base-package` that ends with
    `.class`.”


    In the `normalizers.xml` configuration, however, it’s limited to “any file in
    the current package that ends with `Normalizer.class,`” with the package set to
    `com.bsg6.chapter03.mem03`, so it will only pick up our two `Normalizer` implementations.


    Now, we get to see our “master configuration” in use, showing the use of the two
    `<import />` tags. This creates a “flattened configuration,” such that anything
    that loads `config-04.xml` is going to see every component loaded by not only
    `config-04.xml`, but anything loaded by `normalizers.xml` and `musicservicetest.xml`
    as well.


    ```

    Listing 3-26

    chapter03/src/test/resources/config-04.xml

    ```


    In fact, let’s prove this, by writing a quick test that validates that the beans
    we expect to have in our configuration are available. As usual, we’ll use a `@DataProvider`
    to provide a flexible dataset for a parameterized test. We’ll do something a little
    different, in that we’ll put both `String` instances and `Class` references into
    the data provider – and we’ll check the type to figure out which `ApplicationContext.getBean()`
    method to use. (There are probably cleaner ways to do this, but honestly, this
    is a throwaway test. We don’t need it to be perfect, we just need it to work for
    our purposes.^([^(57)](#fn57)))


    ```

    package com.bsg6.chapter03;

    import com.bsg6.chapter03.mem03.CapLeadingNormalizer;

    import com.bsg6.chapter03.mem03.SimpleNormalizer;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.context.ApplicationContext;

    import org.springframework.test.context.ContextConfiguration;

    import org.springframework.test.context.testng.AbstractTestNGSpringContextTests;

    import org.testng.annotations.DataProvider;

    import org.testng.annotations.Test;

    import static org.testng.Assert.assertNotNull;

    import static org.testng.Assert.fail;

    @ContextConfiguration(locations = "/config-04.xml")

    public class TestConfigurationImport extends AbstractTestNGSpringContextTests
    {

    @Autowired

    ApplicationContext context;

    @DataProvider

    Object[][] resources() {

    return new Object[][]{

    {"musicServiceTests"},

    {MusicServiceTests.class},

    {"foo"},

    {"bar"},

    {SimpleNormalizer.class},

    {CapLeadingNormalizer.class},

    {"musicService4"}

    };

    }

    @Test(dataProvider = "resources")

    public void validateResourceExistence(Object resource) {

    if (resource instanceof String) {

    assertNotNull(context.getBean(resource.toString()));

    } else {

    if (resource instanceof Class) {

    assertNotNull(context.getBean((Class) resource));

    } else {

    fail("Invalid resource type");

    }

    }

    }

    }

    Listing 3-27

    chapter03/src/test/java/com/bsg6/chapter03/TestConfigurationImport.java

    ```


    At last, it’s time to see our `MusicService4`, a near-clone of `MusicService3`
    – as all of our `MusicService` implementations have been. The major change here
    is that we’re going to make our `Normalizer` references `final`, and we’re going
    to initialize them through constructor injection. We’ll then have one more test
    class (a near-clone of other tests, referring to `config-04.xml` instead of the
    other configurations) to make sure our configuration loads smoothly and correctly
    (and, for that matter, quickly).'
