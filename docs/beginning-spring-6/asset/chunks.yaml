    \n`BaseSongRepositoryTests`更长，但这是因为`BaseSongRepository`做了更多工作；毕竟它需要与艺术家交互。它使用`@BeforeMethod`在测试`BaseSongRepository`实例之前重置数据库（无论是什么数据库！）。\n\
