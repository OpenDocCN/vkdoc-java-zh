    ## 附加作用域


    Spring 就像一个由曲折通道组成的迷宫，全都大同小异^(⁶⁴)，自然会在本章讨论的作用域（`prototype` 和 `singleton` 作用域）之外增加更多内容——这主要是因为附加作用域存在于
    Spring Web 的上下文中，将在第 6 章中介绍。作用域的规则不变，但名称和可达性会变；例如，一个组件可以被标记为在单个 HTTP 请求的上下文中作为单例存在，或者在用户会话的上下文中存在。这些作用域将在适当的章节（即第
    6 章）中更详细地探讨。第 5 章介绍了 Servlet API 以及从 HTTP 端点访问 Spring 上下文的简单方法，但该方法过于简单，无法提供 Spring
    的全部能力。


    ## 后续步骤


    在第 5 章中，我们将转换思路，讨论如何将 Spring 与 Jakarta EE 集成。Spring 从早期开始就一直是企业环境领域的驱动力，我们将介绍一些术语和
    API，以及一种相当古老且简单的集成 Spring 的方法，为第 6 章中更有用的内容做准备。


    脚注 1   2   3   4   5   6


    # 5. Spring 与 Jakarta EE


    Spring 当然可以在独立环境中使用，但历史上 Spring 最常见的环境是企业环境，在托管服务器中驱动 Web 应用程序和后端服务。本章将演示在 Jakarta
    EE 容器（以前称为 Java EE 或 J2EE，甚至可能根据您的接触程度、当前认知和经验，仅称为“Tomcat”）中进行集成的某些方面。


    注意


    Tomcat 是一个 Servlet 容器，它代表了 Jakarta EE 所能涵盖的一小部分——它实际上是 Jakarta EE 特定配置文件的实现。话虽如此，许多开发人员过去（和现在）并不了解
    Sun 命名约定的乐趣，因此他们以为 Tomcat 等同于 Java 企业版，而实际上它只是该技术某些方面的有用实现。


    本章还介绍了项目的子模块以及模块间的依赖关系。我们将创建一个 `chapter05-api` 模块（我们将在其中存储一些在其他模块中保持不变的类）、一个 `chapter05-anno`
    模块（将使用基于注解的配置）和一个 `chapter05-xml` 模块（将使用 XML 进行配置，这真是出人意料）。我们不打算使用 Java 配置，因为通过这个过程我们学不到任何新东西。（不过，一旦我们进入第
    6 章，我们将大量转向使用基于 Java 的配置。）


    ## Jakarta EE 简介


    Jakarta EE 是一组规范，涵盖了在 Java 平台上编写的应用程序的大部分（如果不是全部）企业架构模式。例如，如果您的应用程序具有请求/响应交互模型，则有一个规范涵盖它——Servlet
    规范。如果您有面向消息的架构，则有 Java 消息服务。如果您需要远程调用架构，Jakarta EE 也有几个规范，从企业 Java Bean 规范开始。甚至还有一个上下文和依赖注入（CDI）规范，看起来与
    Spring 非常相似。


    CDI 看起来很像 Spring，因为 Spring 框架的作者为该规范做出了贡献。这是 Java 生态系统如此强大的部分原因，也导致了 Java 规范有时令人抓狂。规范制定团体给予，他们也收回。总的来说，这对每个人都有好处，但有时会做出相当令人沮丧的决定。


    当然，这些规范也有参考实现。例如，Glassfish ([`https://glassfish.org/`](https://glassfish.org/))
    是 Servlet 和 Java 消息服务规范的当前实现；Weld ([`http://weld.cdi-spec.org/`](http://weld.cdi-spec.org/))
    是 CDI 的参考实现，尽管 Spring 首先启发了该规范这一点是很有争议的。


    注意


    这些是“活规范”，相关信息变化很快。Glassfish 7 被列为 Servlet 6.0 的指定兼容实现，但此信息可能很快就会过时。


    顺便提一下，Jakarta EE 是以前称为 Java 企业版（“JavaEE”）以及更早的“Java 2 企业版”或“J2EE”的一个相当新的名称。2018
    年，Oracle 将 Java EE 发布给 Eclipse 基金会，由开源社区管理，由于“Java”名称的版权问题，该基金会将其重命名为“Jakarta
    EE”。这又是围绕 Java 的品牌混淆——Java 从第一天起就饱受品牌、命名和版本混淆之苦，但希望开源社区对 Jakarta EE 的管理将有助于稳定未来的名称和版本。^(⁶⁵)


    本章将向您展示一些最常用的企业规范（Servlet 规范）的基础知识，以及 Jetty 作为 Servlet 容器。请注意：Jakarta EE 并不简单。Jakarta
    EE 实现作为嵌套应用程序在其他应用程序内部运行，这对类路径和资源可用性有影响，甚至*编写*相关内容也可能令人困惑，因为解决每个给定问题都有许多不同且成功的方法。


    本章实际上主要旨在介绍后续章节将依赖的概念，并说明一种将 Spring 集成到 Jakarta EE 中的相当古老的方法——主要是作为通往更复杂、更完整解决方案的简单入门。'
- fmt: '### The Servlet API


    As previously stated, the Servlet API is designed for services that follow a request/response
    lifecycle: a request comes in, and a response goes out. Ultimately, requests map
    to a single class that implements a known interface, `javax.servlet.Servlet`,
    but Servlets can chain (or `forward`) calls to other Servlets. The API also defines
    filters that can execute before or after Servlet invocation as well as listeners
    that can watch for events emitted by the container (like application startup or
    shutdown, for example).


    Servlet containers establish network listeners on specific ports; how this is
    done is very dependent on the Servlet container in question. They typically use
    HTTP – the HyperText Transfer Protocol, one version of which can be found at [`https://tools.ietf.org/html/rfc2616`](https://tools.ietf.org/html/rfc2616)
    – but they don’t *have* to.


    A Servlet has a `service()` method along with a Servlet context^([^(66)](#fn66))
    and some lifecycle methods (including `init()` and `destroy()`). The `service()`
    method receives `ServletRequest` and `ServletResponse` references, both of which
    are interfaces themselves. The `ServletRequest` interface references information
    about the request (the protocol, attributes of the request, parameters, etc.),
    and the `ServletResponse` provides mechanisms by which a Servlet can build a response
    matching the request.


    Filters can be defined in a manner similar to Servlets; there’s a general `javax.servlet.Filter`
    interface with a single primary entrypoint (called `doFilter()`, of all things,
    although `Filter` has other methods associated with filter lifecycles); this method
    receives the request and response objects created by the Servlet container, as
    well as a `FilterChain` reference. The filter can do almost anything it wants
    with the request and response, although usually filters will either set up data
    for delegated services, or decorate responses.


    Again, most Servlets work with HTTP. As a protocol, HTTP maps Uniform Resource
    Locators – URLs – to data. HTTP also specifies verbs in relation to these URLs,
    such as `GET`, `POST`, `DELETE`, and `HEAD`. (There are others; check the specification^([^(67)](#fn67))
    for the full list.)


    Each HTTP verb has implicit semantic meanings.


    Roy T. Fielding wrote a dissertation back in 2000 called “Architectural Styles
    and the Design of Network-based Software Architectures.” You can find it at [`www.ics.uci.edu/~fielding/pubs/dissertation/top.htm;`](http://www.ics.uci.edu/~fielding/pubs/dissertation/top.htm%3B)
    it describes an architectural approach called “REST,” for “Representational State
    Transfer.” REST is a *big deal* in HTTP-based applications; it took some of the
    implications of the HTTP protocol and formalized them. If you **really** want
    to know how to use the HTTP verbs and how URLs work on the modern web, check out
    REST – which we’ll be using to create our application services in Chapters [6](#471370_2_En_6_Chapter.xhtml)
    and [7](#471370_2_En_7_Chapter.xhtml).


    - `GET` is a request for a resource whose location is known, and URLs used with
    `GET` are traditionally able to be bookmarked. This is by far the most common
    type of HTTP request.

    - `POST` is a request to store data into a known location (although how this location
    is determined depends on the implementation).

    - `PUT` is another type of storage request, although where `POST` means “store,”
    `PUT` implies “store or update if the object already exists.”

    - `HEAD` means to return data **about** the resource without returning the resource
    itself; this can be used to determine if a resource has been updated, for example.

    - `DELETE` requests that a resource referred to by the URL is removed somehow.


    One usually speaks of the verbs in context of the URL itself; thus, one might
    say to issue a `GET http://localhost/foo/bar` – or, in the context of a specific
    host already, you might say to simply `GET /foo/bar`.


    In `HttpServlet`, the `service()` method is overridden to dispatch the request
    type to methods specifically named for each verb, and with parameter types that
    cater to HTTP^([^(68)](#fn68)); thus, `GET` in HTTP is handled by the `doGet()`
    method, `POST` in HTTP is handled by the `doPost()` method, and so forth and so
    on.


    It’s useful to understand how Servlets work and what they are actually doing,
    in order to make future endpoints easier to conceptualize. We’re eventually going
    to leverage resource handlers provided by Spring itself, and those handlers will
    dispatch requests into methods of our choosing, with arguments parsed by the framework
    and not manually as we’ll be doing in this chapter.


    ### Modern Web Application Design Principles


    It used to be that web applications were built to be monolithic, or “complete”:
    they would include all static resources necessary for server-side rendering of
    content, for example. This hasn’t been the preferred practice for quite some time
    now, with the use of rich clients being very much the norm. A web application
    will refer to Javascript libraries like JQuery or Vue.js that request resources
    in JSON or XML,^([^(69)](#fn69)) and render that content appropriately.


    There’s nothing preventing coders from using the older, monolithic approach, and
    there’s nothing inherently wrong with it, although it’s difficult to say whether
    there are any actual advantages to rendering a full page instead of sending data
    client-side to be rendered on-demand. The server-side rendering means that it’s
    nicer on lower-powered clients, as long as they have bandwidth to spare; the client-side
    rendering is better on bandwidth but uses more CPU power on the browser’s machine.
    (In practice, users have idle CPU cycles to use for client-side rendering, and
    a busy server is a more finite resource, so this approach makes a lot of cost-effective
    sense, although some applications’ needs may vary.)


    For the purposes of this book, we’re going to use the modern approach, because
    it allows us to focus on the server-side technologies in use, rather than how
    rich clients work. We’ll use simple command line tools to issue HTTP requests
    where necessary, instead of using Javascript embedded in a web page.


    ## Module Structure


    We’re going to create three modules in this chapter: `chapter05-api`, `chapter05-anno`,
    and `chapter05-xml`. In most builds, these would be grouped under a `chapter05`
    module whose sole purpose would be to contain the other modules, but that only
    adds another nested directory and a `pom.xml` file, so there’s no tangible benefit.


    Previous editions of this book used Gradle, which prefers wider, flatter module
    structures. Maven handles more deeply nested modules better than Gradle, but in
    this case, there’s no point and nesting further only makes the filesystem path
    references longer.'
