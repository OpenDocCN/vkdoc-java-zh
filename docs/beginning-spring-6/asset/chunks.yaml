- fmt: '# Rod and Juergen Change the (Java) World


    In *J2EE Development without EJB*, Rod (and Juergen, but I’ll shorten it to Rod
    and hope Juergen takes no offense!) mapped out a process for J2EE development
    that focused on six themes:


    - Simplicity

    - Productivity

    - The fundamental importance of object orientation

    - The primacy of business requirements

    - The importance of empirical process

    - The importance of testability^([^(11)](#fn11))


    In addition to these themes being obviously fairly important, it’s important to
    recognize that these themes were *secondary* concerns for typical J2EE development.


    For example, EJBs were meant to represent *generic* access to remote services,
    so developing an EJB meant creating something that could be invoked via complex
    protocols, along with handling fairly complex transactional concerns. If that’s
    what you *actually needed*, then EJB was fine…​ but most developers *didn’t* need
    to worry about CORBA,^([^(12)](#fn12)) and their transactional needs tended to
    be very simple. EJB represented complexity that the *applications* didn’t need.


    If the applications didn’t need the complexity, but programmers had to be aware
    of it, then the complexity represented a direct and unavoidable sunk cost for
    development.


    Further, EJBs tended to be non-Java-like in how they worked. They represented
    endpoints of functionality, not self-contained objects. Designing an EJB meant
    stepping outside of the very paradigms that made Java useful in the first place.


    Spring was designed to change enterprise development such that it prioritized,
    well, all six of those themes. It was designed to be simple (and thus productive
    and by definition focused on actual business requirements), object oriented, and
    **testable**, a feature whose value is difficult to overvalue.^([^(13)](#fn13))


    *J2EE Development without EJB* then went on a tear, demonstrating a self-contained
    application context that, despite the use of XML, was far easier for developers
    to work with than J2EE’s striated developer/deployer model. It returned power
    to the developers, and along the way provided easy ways to create objects that
    were used solely for testing – a feature EJB provided but only with great difficulty
    – and ways to change how the application objects acquired resources such that
    it made sense to most developers.


    > **Note**

    > XML is a fantastic specification, but it’s also a *formal* specification, and
    it’s sometimes difficult to get right. Other markup languages like JSON and YAML
    have largely supplanted it in common usage, because they’re so much easier to
    write, and the tradeoffs in reliability are generally seen as being worth it.


    After all, if you need a `Widget` in your `FooFram`, one doesn’t normally think
    that in ordinary Java the `FooFram` should ask a remote service to provide a `Widget`
    somehow; normally one has a `setWidget(Widget widget)` method in the `FooFram`
    object.


    Spring went a long way to making Java look like, well, Java again. Objective adoption
    rates are unclear, but it’s safe to say that Java developers were a lot more excited
    about developing with Spring than with traditional J2EE. However, Spring was not
    a formal part of the development landscape of J2EE.


    Spring had an almost subversive approach; one used J2EE, and Spring was used alongside
    J2EE to actually get things done. It was a curious, but effective, model. Spring
    was becoming a standard dependency for many; it was standard idiom without being
    an actual part of any standards.


    Better approaches were possible, with the creation of community processes such
    that Java application design wasn’t decided upon by cloistered architects in San
    Jose.


    ## The Lever: Dependency Injection


    The core design pattern that Spring introduced to the wider Java world is currently
    called “Dependency Injection.”^([^(14)](#fn14)) With the “traditional J2EE approach,”
    objects that needed a resource deterministically acquired that resource, with
    a specific name. (You could, I suppose, *look up* the name you wanted, but then
    you have to look up the *specific name*, which isn’t much better.) Control over
    which resource was provided was given to the J2EE application server’s administrator.


    For a developer to use J2EE, he or she had to assume the administrator role and
    configure the name service somehow. Name services, to borrow a phrase from Barbie,
    are hard; you have to make sure you have qualifying types (a low barrier, honestly,
    because most of the things you’d want a name service for would qualify, by design),
    you have to know how to make sure the objects are constructed properly, you have
    to know how to set up the names and resources *for your specific application server*,
    and you then have to know how to set up the application-specific redirected names
    – again, for each application server, because while most of them were similar,
    they weren’t quite the same, either.


    It’s a very powerful idea, but it’s more than most developers wanted to do – and
    many of them did only the minimum necessary, and didn’t bother setting up local
    names for resources. It also made testing very difficult, because you couldn’t
    just use a `Widget` in a test, you had to **deploy** a `Widget`, set up a name
    for it, and have your object *look up* the `Widget` in the test. It’s doable,
    certainly – programmers are often inventive and driven – but it’s also a pain.


    With dependency injection, however, the objects that want a `Widget` no longer
    have to *look up* a `Widget`. Now, when an object that needs a `Widget` is constructed,
    the dependency injection framework (in this book, Spring!) *provides* a `Widget`
    immediately.^([^(15)](#fn15)) The dependency injection framework gathers information
    about `Widget` in a few different ways: the simplest way (and the earliest) was
    simply to create an XML file that had a reference to a `Widget` and the classes
    that needed it. In later versions of Java and Spring, the application code can
    be *searched* for possible instances of injectable resources, making configuration
    of simple applications very lightweight.


    When programmers designed code for J2EE, they indebted themselves to the J2EE
    mindset; everything one did with J2EE involved a lot of, well, J2EE. You couldn’t
    test code that used an EJB without involving yourself in JNDI configuration –
    a simple test would have to start up a JNDI container (and, possibly, an EJB container),
    along with populating the JNDI dataset and making sure the EJBs could be resolved.
    None of that is actually **testing the service** – it’s all gruntwork required
    just to get to the point where you’re *able* to test the service. It implies enduring
    startup time for the containers (which is time wasted even in the best of circumstances)
    and time spent on testing the configuration, and many containers had a long startup
    time.


    But if the *goal* is to test something, pragmatism would suggest that configuration
    of containers and startup times is *all* wasted.


    With Dependency Injection, you simply create a Java class that reflects the behavior
    you want, and supply it to the class you’re testing. Your test doesn’t even have
    to depend on Spring or anything else. As an example, let’s consider two forms
    of “Hello, World”^([^(16)](#fn16)) – the EJB version (as it would exist around
    2005^([^(17)](#fn17))) and a version that represents the class structure that’s
    ready for dependency injection.'
