    A `@Component` with an implementation of `JobExecutionListener` which defines
    methods for `beforeJob` and `afterJob` with an instance of the `JobExecution`
    which will run or just ran. We will use the listener here to do a verification
    spot check of the database to see that things got added that we expected. We’ll
    inject a `JdbcTemplate` and do some `SELECT` statements against the `artist` and
    `song` tables and print them out to the logger.


    ```

    package com.bsg6.chapter11;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.batch.core.BatchStatus;

    import org.springframework.batch.core.JobExecution;

    import org.springframework.batch.core.JobExecutionListener;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.jdbc.core.JdbcTemplate;

    import org.springframework.stereotype.Component;

    @Component

    public class JobNotificationListener implements JobExecutionListener {

    private static final Logger log =

    LoggerFactory.getLogger(JobNotificationListener.class);

    private final JdbcTemplate jdbcTemplate;

