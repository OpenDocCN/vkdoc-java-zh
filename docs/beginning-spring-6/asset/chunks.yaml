    class SecondObject extends HasData {

    SecondObject(String initialValue) {

    setDatum(initialValue);

    }

    }

    @ContextConfiguration(locations = "/config-02.xml")

    public class TestLifecycle02 extends AbstractTestNGSpringContextTests {

    @Autowired

    ApplicationContext context;

    @Test

    public void validateConstruction() {

    HasData o1 = context.getBean(HasData.class);

    assertEquals(o1.getDatum(), "Initial Value");

    }

    @Test

    public void validateSecondObjectScan() {

    // 我们可以通过其层次结构中的任何唯一标识来查找实例。

    SecondObject o2 = context.getBean(SecondObject.class);

    assertEquals(o2.getDatum(), "Initial Value");

    }

    }

    清单 4-7

    chapter04/src/test/java/com/bsg6/chapter04/TestLifeCycle02.java

    ```


    我们的测试更简单，因为我们需要做的只是确保 Spring 构建的对象具有预期的数据值。


    另外，请注意 `context.getBean()` 如何查找匹配的对象：我们进行了两个测试，分别使用 `HasData` 和 `SecondObject`
    查找 Bean，并验证实例所引用的数据在两种情况下是否相同（如配置所指定）。


    ### 在构造之后和销毁之前调用方法


    我们还可以在对象构造之后，以及（奇怪的是）在上下文丢弃其管理的所有引用之前调用方法。在 XML 中，这是通过 `init-method` 和 `destroy-method`
    属性完成的。


    `destroy-method` 与 Java 终结器不同，尽管它可以扮演**某些**相同的角色；如果 `ApplicationContext` 能够被关闭（通过命名恰当的
    `close()` 方法，该方法首次出现在类层次结构中的 `ConfigurableApplicationContext` 中），上下文将在**上下文关闭之前**调用这些方法。这与终结化不同；如果类具有终结器或使用
    Java 9 的 `Cleaner` 工具，这些方法将在垃圾回收发生之前被调用。


    请注意，`destroy-method` 仅适用于**单例** Spring Bean。原型 Bean 由 Spring 创建，一旦被检索，就被视为不受管理；Spring
    将构造它们并将其传递给您的代码，然后忘记这些实例的存在。因此，`destroy-method` 指示的方法不会在原型实例上被调用；这**可能**没问题，因为无论如何
    `destroy-method` 应该很少使用，毕竟人们一开始也很少关闭 Spring 上下文。


    换句话说，`destroy-method` 的存在是为了让您能够精细控制 Spring Bean **可能**发生某些事情的时间点，但在普通开发中不太可能有用。不过，这并不会阻止我们演示它！


    对于这两种方法，它们需要遵循一个约定。它们可以命名为任何有效的名称（因为我们指定了要调用哪些方法），但这些方法不能有返回值（必须声明为 `void` 类型），并且不能有方法参数。


    以下是一个指定了这些方法的配置。


    ```


    清单 4-8

    chapter04/src/test/resources/config-03.xml

    ```


    这意味着当 Spring 创建 `ThirdObject` 时，它将在所有构造完成后调用 `init()`，就像执行了以下代码片段一样。


    ```

    ThirdObject foo=new ThirdObject();

    foo.init();

    清单 4-9

    模拟 init-method 的代码片段

    ```


    我们的测试源码将定义 `ThirdObject` 并创建一个名为 `semaphore` 的静态引用。（它并不是**真正**的信号量，但它……可能算是？）此引用**仅**由
    `init` 方法设置；因此，我们可以验证是否遵循了正确的初始化方法。我们还定义了一个 `destroy` 方法，它将 `semaphore` 引用设置为
    null；它不是一个真正的信号量，但在我们的测试中它有点像信号量。


    注意


    在编程术语中，信号量是用于控制对资源访问的对象。例如，您可以使用信号量来指示某个对象正被特定线程使用，因此其他线程应等待该对象“可用”后再访问它。Java
    的标准库以各种形式内置了信号量，但此处仅出于示例目的使用了一种“手动信号量”。


    实际的测试本身使用 `ConfigurableApplicationContext` 而不是 `ApplicationContext`，因为我们希望在从中检索对象后显式关闭上下文。`ApplicationContext`
    接口没有定义 `close()`，而 `ConfigurableApplicationContext` 实现了 `Closeable`（以及 `ApplicationContext`
    和 `Lifecycle`）。方法可见性是我们使用 `ConfigurableApplicationContext` 的**唯一**原因——如果不是因为 `ApplicationContext`
    上没有定义 `close()`，它本来也适用于此测试。


    测试方法从应用程序上下文中获取一个 Bean，然后运行两个简单的验证：一个是 Bean **实例**看起来正确（即，它具有我们期望的数据），另一个是 `semaphore`
    已被填充。


    然后我们关闭上下文并再次检查 `semaphore` 引用——如果 `dispose()` 已被调用，该引用将被设置为 `null`。


    ```

    package com.bsg6.chapter04;

    import org.springframework.context.ConfigurableApplicationContext;

    import org.springframework.context.support.ClassPathXmlApplicationContext;

    import org.springframework.test.context.ContextConfiguration;

    import org.testng.annotations.Test;

    import static org.testng.Assert.*;

    class ThirdObject extends HasData {

    static Object semaphore = null;

    public void init() {

    semaphore = new Object();

    }

    public void dispose() {

    semaphore = null;

    }

    }

    @ContextConfiguration(locations = "/config-03.xml")

    public class TestLifecycle03 {

    @Test

    public void testInitDestroyMethods() {

    ConfigurableApplicationContext context

    =new ClassPathXmlApplicationContext("/config-03.xml");;

    ThirdObject o1 = context.getBean(ThirdObject.class);

    assertNotNull(ThirdObject.semaphore);

    assertEquals(o1.getDatum(), "default");

    context.close();

    assertNull(ThirdObject.semaphore);

    }

    }

