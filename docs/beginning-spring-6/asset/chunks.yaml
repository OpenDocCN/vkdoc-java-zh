- fmt: '# 排版后的内容


    In the end, which approach you choose really depends on which approach you *prefer*.
    Here, one of the simplest approaches possible was chosen – abstract methods that,
    given data, pass back valid instances. It’s simple and hard to screw up.


    It violates DRY – “don’t repeat yourself” – especially when you consider that
    the signature of each of the copied methods looks exactly the same. In this case,
    the choice was made deliberately to write the methods over again in the interest
    of space and simplicity; if we abstracted everything out, we’d have another whole
    set of classes to go through.


    If we wanted to, we could write a configuration that ran a Spring Boot application
    as we saw in Chapter [8](#471370_2_En_8_Chapter.xhtml); all that would be left
    would be the creation of a functional user interface, and we’d have a working
    music application, using a relational database for data storage.


    Now let’s see how much work we have to do to use a **different** data provider
    – MongoDB.


    ## The `chapter09-mongo` Project


    MongoDB ([`www.mongodb.com`](http://www.mongodb.com)) is an open source database
    that represents data as collections of documents in binary JSON. As such, it uses
    a dynamic, flexible schema. It’s loosely grouped among “NoSQL databases,” those
    data management systems that don’t SQL to manipulate data. It’s also a good example
    of what makes NoSQL both good and bad: incredible speed and scalability, occasionally
    obscure querying and modeling, and a typically provider-specific approach to transactions.^([^(100)](#fn100))


    Thankfully, Spring Data makes using MongoDB fairly trivial, and it matches the
    pattern we saw in the JPA example, with the use of the Spring Data MongoDB module.


    ### Getting MongoDB


    We’re going to use a library that allows us to **embed** MongoDB for our tests,
    so you don’t have to have MongoDB installed. Of course, you might actually *want*
    to have MongoDB installed locally, rather than relying on an embedded installation;
    if you build an application using MongoDB, an external dependency isn’t unexpected,
    after all. Here’s how you can install MongoDB should you so choose; note that
    the tests will still use an embedded version, but it’s easy to run MongoDB if
    that’s what you want to do.


    On OSX, it’s as simple as running `brew install mongo`.


    On Ubuntu, MongoDB can be installed with `apt-get install mongodb`.


    On Windows, you can install MongoDB by going to its download page ([`www.mongodb.com/try/download/community`](http://www.mongodb.com/try/download/community))
    and grabbing the proper MSI file.


    You’d start MongoDB trivially by finding an empty directory and running it.


    ```

    mkdir /var/tmp/musicdata

    mongod --noauth -dbpath /var/tmp/musicdata

    Listing 9-28

    Starting MongoDB on Linux

    ```


    Consult the instructions on [`www.mongodb.com`](http://www.mongodb.com) for your
    specific operating system if this doesn’t work properly for you. Note also that
    this starts MongoDB without authentication; this is **solely** useful for running
    tests and other such operations of little long-term value.


    ### The Code for the `chapter09-mongo` Project


    Our `pom.xml` looks very similar to our `chapter09-jpa pom.xml`. Instead of `spring-boot-starter-data-jpa`,
    it uses `spring-boot-starter-data-mongodb`, and it also includes one more test
    dependency, `de.flapdoodle.embed.mongo`. This dependency is going to allow our
    tests to actually download and start an embedded MongoDB instance so we don’t
    have to make sure MongoDB is running before executing any of our tests.


    ```

    4.0.0


    com.apress

    bsg6

    1.0


    chapter09-mongo

    1.0


    org.springframework.data

    spring-data-bom

    ${springDataBomVersion}

    import

    pom


    com.apress

    chapter09-api

    1.0


    com.apress

    chapter09-test

    1.0

    test


    org.springframework.boot

    spring-boot-starter-data-mongodb


    de.flapdoodle.embed

    de.flapdoodle.embed.mongo.spring30x

    4.7.0

    test


    org.springframework.boot

    spring-boot-maven-plugin

    ${springBootVersion}


    Listing 9-29

    chapter09-mongo/pom.xml

    ```


    The entities for the `chapter09-mongo` project are actually the core substantive
    difference between this and the `chapter09-jpa` project. The other classes will
    look pretty much exactly the same, with the primary differences being in package
    declarations (since the `chapter09-mongo` project uses `com.bsg6.chapter09.mongodb`
    instead of `com.bsg6.chapter09.jpa`.)


    However, even in our entities the differences are minor; in `Artist`, for example,
    instead of using `@Entity`, we use `@Document`, for example, and the primary key
    is a `String` instead of an `Integer`.


    ```

    package com.bsg6.chapter09.mongodb;

    import com.bsg6.chapter09.common.BaseArtist;

    import org.springframework.data.annotation.Id;

    import org.springframework.data.mongodb.core.mapping.Document;

    import org.springframework.lang.NonNull;

    import java.util.Objects;

    import java.util.StringJoiner;

    @Document

    public class Artist implements BaseArtist {

    @Id

    String id;

    @NonNull

    String name;

    public Artist() {

    }

    public Artist(@NonNull String name) {

    this.name = name;

    }

    @Override

    public String getId() {

    return id;

    }

    @Override

    public void setId(String id) {

    this.id = id;

    }

    @Override

    @NonNull

    public String getName() {

    return name;

    }

    @Override

    public void setName(@NonNull String name) {

    this.name = name;

    }

    @Override

    public String toString() {

    return new StringJoiner(", ", Artist.class.getSimpleName() + "[", "]")

    .add("id=''" + id + "''")

    .add("name=''" + name + "''")

    .toString();

    }

    @Override

    public boolean equals(Object o) {

    if (this == o) return true;

    if (!(o instanceof Artist artist)) return false;

    return Objects.equals(

    getId(),

    artist.getId()

    ) && Objects.equals(

    getName(),

    artist.getName()

    );

    }

    @Override

    public int hashCode() {

    return Objects.hash(getId(), getName());

    }

    }

    Listing 9-30

    chapter09-mongo/src/main/java/com/bsg6/chapter09/mongodb/Artist.java

    ```


    The `Song` is also nearly identical. There are differences, of course; we see
    the use of `@CompoundIndexes` to declare a unique index between the artist and
    the name of the song. (In this, it’s a close analog to how a relational database
    implements compound indexes. The `":1"` in the index structure refers to sort
    order, which isn’t relevant for our application but still needs to be specified.)
    We also refer to an `Artist` as a `@DBRef`, which is a way of telling Spring to
    store a reference to a valid `Artist` document in the field. The result is that
    we still use the object in the exact same way as we would have with JPA – after
    all, we’re using the exact same interfaces – but we’re helping Spring Data determine
    what the object model should look like.'
