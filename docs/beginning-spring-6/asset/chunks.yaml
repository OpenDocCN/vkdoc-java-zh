    As you can see, the `chapter09-jpa` project really doesn’t add much. It provides
    concrete entities (`Artist` and `Song`), and the configuration provides a `WildcardConverter`;
    `MusicService`, too, provides an easy way to build our entity instances, but that’s
    about it. The rest of the project’s code is providing concrete types for various
    interfaces.


    Could we have built our base classes differently, in particular to make it so
    we didn’t have to provide methods like `createArtist()` and `createSong()`? The
    answer, of course, is “yes,” and in multiple ways. We could have derived the concrete
    class references in `BaseMusicService`, for example (the references aren’t available
    for `BaseMusicService` but would have been for child classes, and we could have
    exploited that).


    We could also have passed in concrete references (i.e., `Artist.class`) to `BaseMusicService`’s
    constructor and used those references to build new objects, as well.'
