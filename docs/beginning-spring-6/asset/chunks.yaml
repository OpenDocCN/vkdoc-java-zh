  trans: "\n## Spring Boot 与数据库连接\n\n是时候为我们的音乐网关服务创建一个更好的版本了。在前面的章节中，我们一直复用第 3 章中仅使用内存的服务版本，这很方便，因为这些服务没有其他依赖项；它们既不使用数据库，也不使用任何可能需要配置的东西。为了演示一个功能更完整的配置，让我们创建一个由嵌入式数据库（此处为\
    \ H2）支持的 `MusicService`。\n\n我们仍在向你展示一些并非“最高效”的做法。这是因为本章的重点是 Spring Boot 及其**一些**特性，而不是\
    \ JDBC 或其他类似技术；我们有意不利用将在后续章节中介绍的一些内容。其中一些内容，比如 Spring Boot 本身，将使完成某些编程任务变得更加容易，且代码量更少。\n\
    \n首先，当然，我们需要确保 H2 对我们的项目可用。我们还需要确保 `spring-boot-starter-jdbc` 在我们的依赖项列表中，以便——剧透警告——让\
    \ Spring Boot 为我们的数据库添加连接池。^(⁹⁰)\n\n为什么选择 H2 而不是 HSQL 或 Derby？一方面，H2 可能是其中最流行的；H2\
    \ 和 HSQLDB 都是 HSQL 的活跃维护分支，但 H2 由 HSQL 的原作者维护。Derby 实际上出人意料地强大，几乎可以看作是 IBM DB2\
    \ 的 Java 版本，并由 Apache 维护，但它对系统资源的消耗比 H2 或 HSQLDB 更大。\n\n```xml\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n<project xmlns=\"http://maven.apache.org/POM/4.0.0\"\
    \n         xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n         xsi:schemaLocation=\"\
    http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
    >\n    <modelVersion>4.0.0</modelVersion>\n\n    <groupId>com.apress</groupId>\n\
    \    <artifactId>bsg6</artifactId>\n    <version>1.0</version>\n\n    <parent>\n\
    \        <groupId>org.springframework.boot</groupId>\n        <artifactId>spring-boot-starter-parent</artifactId>\n\
    \        <version>${springBootVersion}</version>\n        <relativePath/>\n  \
    \  </parent>\n\n    <groupId>chapter07</groupId>\n    <artifactId>chapter07</artifactId>\n\
    \    <version>1.0</version>\n    <packaging>war</packaging>\n\n    <dependencies>\n\
    \        <dependency>\n            <groupId>com.h2database</groupId>\n       \
    \     <artifactId>h2</artifactId>\n            <scope>runtime</scope>\n      \
    \  </dependency>\n        <dependency>\n            <groupId>org.springframework.boot</groupId>\n\
    \            <artifactId>spring-boot-starter-web</artifactId>\n        </dependency>\n\
    \        <dependency>\n            <groupId>org.springframework.boot</groupId>\n\
    \            <artifactId>spring-boot-starter-jdbc</artifactId>\n        </dependency>\n\
    \        <dependency>\n            <groupId>org.springframework.boot</groupId>\n\
    \            <artifactId>spring-boot-starter-test</artifactId>\n            <scope>test</scope>\n\
    \        </dependency>\n    </dependencies>\n\n    <build>\n        <plugins>\n\
    \            <plugin>\n                <groupId>org.springframework.boot</groupId>\n\
    \                <artifactId>spring-boot-maven-plugin</artifactId>\n         \
    \       <version>${springBootVersion}</version>\n                <executions>\n\
    \                    <execution>\n                        <goals>\n          \
    \                  <goal>repackage</goal>\n                        </goals>\n\
    \                    </execution>\n                </executions>\n           \
    \ </plugin>\n        </plugins>\n    </build>\n</project>\n清单 7-10\n包含 H2 的 chapter07/pom.xml\n\
    ```\n\n注意在 `build` 节点中使用了 Spring Boot Maven 插件。这使我们能够将 Spring Boot 应用打包成可执行形式，随时可以部署和运行，同时还能处理其他一些（相对次要的）事情。\n\
    \n这里巧妙之处在于，对于三种 Java 嵌入式数据库——H2、HSQLDB 和 Derby——Spring Boot 可以为我们**自动配置**数据库。我们只需包含依赖项，剩下的工作由\
    \ Boot 完成。这并不意味着我们**不想**配置数据库，但对于早期开发和测试来说，这相当方便，就像 Spring Boot 的许多特性一样。然而，出于最佳实践的考虑，我们将手动配置数据库连接。\n\
    \n### 使用 Spring Boot 初始化数据\n\nSpring Boot 还会在应用启动时为我们执行 SQL。它首先从类路径（例如，我们可以将这些文件放在源代码树的\
    \ `src/main/resources` 目录下）执行名为 `schema.sql` 和 `data.sql`（按此顺序）的文件中包含的 SQL 命令。它还会根据一个平台属性（我们稍后会展示）运行特定于数据库的脚本，这样我们就可以设置通用的模式，然后根据我们可能选择的任何数据库微调配置——如果我们碰巧使用了基于非\
    \ SQL 标准的特性的话。（换句话说，如果我们的模式需要特定数据库的特性，并使用该数据库的自定义 SQL，我们可以将自定义 SQL 放在一个以该数据库命名的文件中。）\n\
    \n请注意，我们的启动脚本是为测试需求设计的，而不是用于实际部署。我们强制重置数据以匹配测试要求，这是实际应用不会希望做的事情。\n\n我们现在已经提到了数据库连接池的自动配置和一个“平台”属性。这些来自类路径中一个简单的属性文件，名为\
    \ `application.properties`。在我们的例子中，我们希望设置一个简单的数据库连接，包含 JDBC URL、用户名、密码和数据库驱动程序名称。实际上，我们并不**需要**所有这些——甚至一个都不需要——但设置它们是一个好习惯，以便将来你想将它们更改为比嵌入式数据库更健壮的东西。^(⁹¹)\n\
    \n我们目前的 `application.properties` 文件。\n\n```\nspring.datasource.url=jdbc:h2:./chapter07;DB_CLOSE_ON_EXIT=FALSE\n\
    spring.datasource.username=sa\nspring.datasource.password=\nspring.datasource.driver-class-name=org.h2.Driver\n\
    spring.sql.init.platform=h2\n清单 7-11\nchapter07/src/main/resources/application.properties\n\
    ```\n\n这样，当应用运行时，我们会在用户的当前目录中创建一个数据库，数据库用户名为 `sa`，密码为空（这恰好与默认的 H2 用户配置文件匹配）；我们还显式地将驱动程序类名设置为\
    \ `org.h2.Driver`。最后，我们还将平台设置为 `h2`，这样 Spring Boot 将首先尝试运行 `schema.sql`，然后运行 `schema-h2.sql`，之后运行\
    \ `data.sql` 和 `data-h2.sql`。\n\n为什么要有特定于数据库的脚本？嗯，SQL 通常在所有数据库平台上都是相同的，但也不尽然。有些数据库会有非标准的数据类型或定义主键、表关系的方式；遗憾的是，尽管\
    \ SQL 如此常见且强大，但为了完成某些任务，通常需要特定于数据库的脚本——而定义模式正是最需要这样做的领域之一。\n\n如果你还记得我们在第 3 章中的数据模型，你会注意到我们有两个实体需要管理：`Artist`\
    \ 和 `Song`。这暗示我们应该有两个与这些实体名称对应的表，我们可以这样做，但我们不打算这么做。\n\n原因很简单：本章已经涵盖了很多内容，同时涵盖\
    \ `Artist` 和 `Song` 服务会花费太多时间，而且增加的价值相对较少（一旦你理解了与 `Artist` 相关的服务是怎么回事，与 `Song`\
    \ 相关的服务就不会有太大区别——但这会占用更多篇幅）。我们将在下一章中修改访问数据的方式，因此更有意义的是将重点放在第 8 章中服务的完整功能集上，而不是在第\
    \ 7 章中。我们将在此处包含数据描述——作为 SQL 注释——只是为了向你展示它们应该放在哪里，但随后我们将假装 `Song` 不存在，直到我们进入第 8\
    \ 章。\n\n```sql\nDROP INDEX IF EXISTS artist_name;\nDROP TABLE IF EXISTS artists;\n\
    CREATE TABLE IF NOT EXISTS ARTISTS\n(\n    id   BIGINT NOT NULL GENERATED BY DEFAULT\
    \ AS IDENTITY,\n    name VARCHAR(64) NOT NULL\n);\nCREATE UNIQUE INDEX IF NOT\
    \ EXISTS artist_name\n    ON ARTISTS(name);\n清单 7-12\nchapter07/src/main/resources/schema.sql\n\
    ```\n\n我们还希望应用启动时数据库中有数据。在测试中，我们可能会（经常）清除数据，以便知道给定测试时数据库的状态。这是我们的 `data.sql` 文件。（如果我们碰巧使用了此\
    \ SQL 无法正常工作的数据库，我们最好为该数据库创建一个特定于平台的文件。）\n\n```sql\nINSERT INTO ARTISTS (NAME)\n\
    VALUES ('Threadbare Loaf');\nINSERT INTO ARTISTS (NAME)\nVALUES ('Therapy Zeppelin');\n\
    INSERT INTO ARTISTS (NAME)\nVALUES ('Clancy In Silt');\n清单 7-13\nchapter07/src/main/resources/data.sql\n\
    ```\n"
