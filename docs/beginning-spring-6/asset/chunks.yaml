    ## 测试


    确保程序按预期运行的最佳方式*不是*在代码库中到处使用 `System.out.println`，而是编写测试。测试允许我们编写关于代码行为的假设，并验证这些假设是否成立（或不成立）。它们有助于重构，有时还能作为代码库自我文档化的初始基础。


    正如我们在清单 2-1 中所见，我们将 TestNG 添加到了目录结构中每个子模块的配置中。因此，假设在编写任何实现之前，我们有一个名为 `HelloWorldGreeter`
    的类，它实现了一个名为 `Greeter` 的接口，该接口定义了 `greet()` 和 `setPrintStream()` 两个方法。


    以下是我们非常简单的 `Greeter` 接口。


    ```

    package com.bsg6.chapter02;

    import java.io.PrintStream;

    public interface Greeter {

    void setPrintStream(PrintStream printStream);

    void greet();

    }

    清单 2-3

    chapter02/src/main/java/com/bsg6/chapter02/Greeter.java

    ```


    如上所述，TestNG 使用注解来装备你的测试类。对于我们的测试 `GreeterTest`，我们将使用方法注解 `@Test` 来让 TestNG 知道将
    `testHelloWorld` 作为测试运行——如果任何断言失败，或者抛出异常，则该测试将被视为失败。


    ```

    package com.bsg6.chapter02;

    import org.testng.annotations.Test;

    import java.io.ByteArrayOutputStream;

    import java.io.PrintStream;

    import java.nio.charset.StandardCharsets;

    import static org.testng.Assert.assertEquals;

    public class GreeterTest {

    @Test

    public void testHelloWorld() {

    Greeter greeter = new HelloWorldGreeter();

    final ByteArrayOutputStream baos = new ByteArrayOutputStream();

    try (PrintStream ps = new PrintStream(baos,

    true,

    StandardCharsets.UTF_8)) {

    greeter.setPrintStream(ps);

    greeter.greet();

    }

    String data = baos.toString(StandardCharsets.UTF_8);

    assertEquals(data, "Hello, World!");

    }

    }

    清单 2-4

    chapter2/src/test/java/com/bsg5/chapter2/GreeterTest.java

    ```


    你可以在上面看到，我们还有一个静态导入，这样在断言中我们可以输入 `assertEquals(actual, expected)` 而不是 `Assert.assertEquals(actual,
    expected)`。在测试代码中使用静态导入通常是个好主意^(³³)，因为这类代码往往在每个方法中多次重复调用，而且由于它相当受限，我们不会损失任何可读性。`Greeter`
    的实现意味着某个实现会输出一些内容（默认实现会发送到 `System.out`）。能够确认这一点的测试有点困难，因此我们注入自己的 `PrintStream`
    实现，并用它来断言我们期望的测试用例。请看下面的代码片段，了解我们如何创建一个新的 `HelloWorldGreeter` 对象、一个 `ByteArrayOutputStream`，以及我们的
    `Greeter` 将用来发送数据的 `PrintStream`（默认情况下，它被分配给 `System.out`——我们希望覆盖它，以便检查输出）。


    现在我们有了一个可用于验证预期功能的测试，让我们编写 `HelloWorldGreeter` 的实现，以便能够编译并运行它。下面你会找到 `Greeter`
    接口的一个基础实现。


    ```

    package com.bsg6.chapter02;

    import java.io.PrintStream;

    public class HelloWorldGreeter implements Greeter {

    public void setPrintStream(PrintStream printStream) {

    }

    public void greet() {

    }

    }

    清单 2-5

    未实现的 HelloWorldGreeter

    ```


    有了上述代码，我们可以运行 `mvn test` 并得到下面预期的失败结果。^(³⁴) 这个失败证明了我们的假设：`Greeter` 的当前实现确实没有打印“Hello,
    World!”，并且测试按预期工作。（如果你感兴趣，实际的失败记录可以在 `chapter02/target/surefire-reports/index.html`
    中看到，但在这个例子中，我们确切知道测试失败的原因：我们的类还没有做任何事情。）


    ```

    [INFO]

    [INFO] Results:

    [INFO]

    [ERROR] Failures:

    [ERROR]   GreeterTest.testHelloWorld:23 expected [Hello, World!] but found []

    清单 2-6

    GreeterTest 失败

    ```


    最后，让我们实际编写 `HelloWorldGreeter` 的实现，这样我们不仅知道测试按预期工作，而且还会通过。我们将编写一个非 Spring 的 `HelloWorldGreeter`
    实现，以便在下一节添加相关 Spring 配置时，你有一个理解的基础。


    ```

    package com.bsg6.chapter02;

    import com.bsg6.chapter02.Greeter;

    import java.io.PrintStream;

    public class HelloWorldGreeter implements Greeter {

    private PrintStream printStream = System.out;

    public void setPrintStream(PrintStream printStream) {

    this.printStream = printStream;

    }

    public void greet() {

    printStream.print("Hello, World!");

    }

    }

    清单 2-7

    chapter02/src/main/java/com/bsg6/chapter02/HelloWorldGreeter.java

    ```


    现在，如果我们重新运行构建，测试就会通过，因为 `PrintStream` 包含了测试期望的内容。


    在本节中，我们使用 TestNG 针对 `Greeter` 接口编写了一个测试，并实践了我们编写的名为 `HelloWorldGreeter` 的实现。到目前为止，由于示例的性质，所有内容都使用了纯
    Java，并且实现起来非常简单。在下一节中，我们将重构上述内容，向你展示如何利用 Spring 依赖注入框架的强大功能来装配这些 Bean。

