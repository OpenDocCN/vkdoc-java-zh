    ## Configuration Through Annotation


    Configuration through annotations in Spring is very simple. The main thing to
    remember is that we want to **tell Spring we’re using annotations**. You can do
    this in a number of ways; we’re going to use XML to configure the annotations,
    since it’s simple (and reflects what we’ve already learned, in Chapter [2](#471370_2_En_2_Chapter.xhtml)).


    After that, we have to remember that Spring will work only with *managed* objects:
    that means we can annotate a class all we like, but if we don’t retrieve it from
    a Spring container (an `ApplicationContext`), the annotations will be irrelevant.


    Annotations in Spring generally fall into two categories: component declaration
    and wiring. Component declaration means that a class is managed by a container,
    and wiring means that the class has resources that are injected (or “wired”) by
    the container.


    ### Declaring a Spring Bean with **@Component**


    To enable scanning for components, we need to tell Spring to, well, scan for the
    components. Let’s create the first in a series of configuration files, called
    `config-01.xml`, in `src/test/resources`. This is a baseline Spring configuration
    for annotations; normally we’d have a *little* more information in this file,
    but this will serve for our first explorations.


    This file has one significant line in it: `<context:component-scan base-package="com.bsg6.chapter03.mem01" />`.
    (Well, that’s not strictly true: the entire `<beans...`​`>` content is pretty
    important, too. Most people, including your authors, copy and paste that section,
    unless you use something like the Spring Tool Suite,^([^(48)](#fn48)) which can
    build the header for you.) What this line does is pretty simple: it scans that
    package and any others under it for beans marked with the valid annotations for
    components, like `@Component`, `@Service`, `@Repository`, and others. (The specific
    meanings will be discussed in later chapters.) Those beans will be registered
    in the `ApplicationContext` and can be referred to by any other Spring components
    managed by that `ApplicationContext`, whether scanned in with `<component-scan
    />` or not.^([^(49)](#fn49))


    Now that we’ve talked about it, let’s take a look at our first iteration of the
    Spring configuration:


    ```


    Listing 3-9

    chapter03/src/test/resources/config-01.xml

    ```


