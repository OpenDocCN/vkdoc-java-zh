- fmt: "### The Common Module\n\nOur first module will be a simple API module. It\
    \ will contain two Servlets, matching services that we’ll want in our music gateway\
    \ application.\n\nTo create our directory structure, we need to create `chapter05-api/src/main/java/com/bsg6/chapter05`:\n\
    \n```\nmkdir -p chapter05-api/src/main/java/com/bsg6/chapter05\n```\n\nWe’ll also\
    \ want a `pom.xml`:\n\n```xml\n<project>\n    <modelVersion>4.0.0</modelVersion>\n\
    \    <parent>\n        <groupId>com.apress</groupId>\n        <artifactId>bsg6</artifactId>\n\
    \        <version>1.0</version>\n    </parent>\n    <artifactId>chapter05-api</artifactId>\n\
    \    <version>1.0</version>\n    <dependencies>\n        <dependency>\n      \
    \      <groupId>${project.parent.groupId}</groupId>\n            <artifactId>chapter03</artifactId>\n\
    \            <version>${project.parent.version}</version>\n        </dependency>\n\
    \        <dependency>\n            <groupId>com.fasterxml.jackson.core</groupId>\n\
    \            <artifactId>jackson-databind</artifactId>\n        </dependency>\n\
    \        <dependency>\n            <groupId>jakarta.servlet</groupId>\n      \
    \      <artifactId>jakarta.servlet-api</artifactId>\n            <version>6.0.0</version>\n\
    \            <scope>provided</scope>\n        </dependency>\n    </dependencies>\n\
    </project>\n```\n\nThis is all fairly straightforward, although we’re adding a\
    \ resource for the Servlet API, set to `provided`, which means that it’s available\
    \ for the compiler (we can compile using classes from the Servlet API, which is\
    \ rather important when compiling Servlets), but it’s not a transitive dependency.\
    \ It *shouldn’t* be a transitive dependency, remember; Servlets run in a container\
    \ like Jetty or Tomcat, which will have its own copy of the Servlet API, so our\
    \ application should actually make sure that it has no dependency that would duplicate\
    \ what the container would provide.\n\nWe also have a transitive dependency on\
    \ the `chapter03` module. The transitive dependency means that a dependency on\
    \ `chapter05-api` carries with it another dependency on `chapter03` – as well\
    \ as dependencies on anything else that `chapter05-api` or `chapter03` depend\
    \ on. We are going to use one of the `MusicService` implementations from Chapter\
    \ 3 in some of our examples here, because we don’t want to have to rebuild a working\
    \ example when we have fully working interfaces and implementations already written.\n\
    \nThis way, we can have an intermodule dependency without having to copy our module\
    \ outputs into a known repository.\n\nWe also have a dependency on `jackson-databind`;\
    \ Jackson (`https://github.com/FasterXML/jackson`) is a popular library for converting\
    \ Java objects to various formats like XML, JSON, CSV, and others. We’re explicitly\
    \ including it here because our base servlet will use it; in practice, Spring\
    \ has a transitive dependency on it already, so we wouldn’t have to include it,\
    \ but this library doesn’t have a dependency that includes Jackson; therefore,\
    \ we *do* need to include it in order to use it. In practice, this approach is\
    \ fairly primitive, but it’s useful for learning how things work in practice.\n\
    \nNow it’s time to see our Servlets. Both of them will have the exact same structure:\n\
    \n1.  Grab a Spring application context from the Servlet context.\n2.  Get a `MusicService`\
    \ from the Spring application context.\n3.  Create an `ObjectMapper` to prepare\
    \ to generate JSON output.\n4.  Get Servlet parameters from the `HttpServletRequest`.\n\
    5.  Validate parameters.\n6.  Generate output from the `MusicService`, using Jackson’s\
    \ `ObjectMapper.writeValueAsString()` method to convert to JSON.\n\nThe first\
    \ Servlet is the `VoteForSongServlet`. We won’t get a chance to see this in action\
    \ until we finish either the `anno` or `xml` modules, but note the `@WebServlet(urlPatterns=\"\
    /vote\")`, which tells us part of the URL this Servlet will be attached to. (The\
    \ other parts of the URL are the protocol, host, the port the server is listening\
    \ on, and the application name itself – so when we run the `anno` project, by\
    \ default, this Servlet will be available at `http://localhost:8080/anno/vote`.)\n\
    \n```java\npackage com.bsg6.chapter05;\n\nimport com.bsg6.chapter03.MusicService;\n\
    import com.fasterxml.jackson.databind.ObjectMapper;\nimport jakarta.servlet.annotation.WebServlet;\n\
    import jakarta.servlet.http.HttpServlet;\nimport jakarta.servlet.http.HttpServletRequest;\n\
    import jakarta.servlet.http.HttpServletResponse;\nimport org.springframework.context.ApplicationContext;\n\
    \nimport java.io.IOException;\n\n@WebServlet(urlPatterns = \"/vote\")\npublic\
    \ class VoteForSongServlet extends HttpServlet {\n    @Override\n    public void\
    \ doGet(HttpServletRequest req, HttpServletResponse resp)\n            throws\
    \ IOException {\n        ApplicationContext context = (ApplicationContext) req\n\
    \                .getServletContext()\n                .getAttribute(\"context\"\
    );\n        MusicService service = context.getBean(MusicService.class);\n    \
    \    ObjectMapper mapper = new ObjectMapper();\n\n        String artist = req.getParameter(\"\
    artist\");\n        String song = req.getParameter(\"song\");\n\n        if (artist\
    \ == null || song == null) {\n            log(\"Missing data in request: requires\
    \ artist and song parameters\");\n            resp.setStatus(500);\n        }\
    \ else {\n            log(\"Voting for artist \" + artist + \", song \" + song);\n\
    \            service.voteForSong(artist, song);\n            resp.setStatus(200);\n\
    \            resp.getWriter().println(\n                    mapper.writeValueAsString(service.getSong(artist,\
    \ song))\n            );\n        }\n    }\n}\n```\n\n**Warning:** This approach,\
    \ using `@WebServlet`, is very much a matter of our writing directly to the Servlet\
    \ API. In Spring, there are better ways to accomplish this, and we’ll see them\
    \ very shortly as we progress. In practice, using `@WebServlet` like this is very\
    \ rare for application developers.\n\nNote how we get the `ApplicationContext`.\
    \ A `ServletRequest` has a `ServletContext` associated with it by the container;\
    \ we’re going to store a reference to an `ApplicationContext` as an attribute\
    \ into the `ServletContext`. The two Servlets we’re showing here are going to\
    \ grab the Spring context from the Servlet context.\n\nOur next Servlet – the\
    \ `GetSongsForArtistServlet` – follows the exact same pattern.\n\n```java\npackage\
    \ com.bsg6.chapter05;\n\nimport com.bsg6.chapter03.MusicService;\nimport com.bsg6.chapter03.model.Song;\n\
    import com.fasterxml.jackson.databind.ObjectMapper;\nimport jakarta.servlet.annotation.WebServlet;\n\
    import jakarta.servlet.http.HttpServlet;\nimport jakarta.servlet.http.HttpServletRequest;\n\
    import jakarta.servlet.http.HttpServletResponse;\nimport org.springframework.context.ApplicationContext;\n\
    \nimport java.io.IOException;\nimport java.util.List;\n\n@WebServlet(urlPatterns\
    \ = \"/songs\")\npublic class GetSongsForArtistServlet extends HttpServlet {\n\
    \    @Override\n    public void doGet(HttpServletRequest req, HttpServletResponse\
    \ resp)\n            throws IOException {\n        ApplicationContext context\
    \ = (ApplicationContext) req\n                .getServletContext()\n         \
    \       .getAttribute(\"context\");\n        MusicService service = context.getBean(MusicService.class);\n\
    \        ObjectMapper mapper = new ObjectMapper();\n\n        String artist =\
    \ req.getParameter(\"artist\");\n\n        if (artist == null) {\n           \
    \ log(\"Missing data in request: requires artist parameter\");\n            resp.setStatus(500);\n\
    \        } else {\n            List<Song> data = service.getSongsForArtist(artist);\n\
    \            resp.setStatus(200);\n            resp.getWriter().println(\n   \
    \                 mapper.writeValueAsString(data)\n            );\n        }\n\
    \    }\n}\n```\n\nFascinating stuff – and archaic – but it’s necessary in order\
    \ to save ourselves from copying source files back and forth. It’s time we looked\
    \ at an actual web application, first with a non-Spring-related “Hello, World”\
    \ Servlet, and then we’ll see how we can create a Spring context for use by our\
    \ `common` module’s Servlets.\n\nNow let’s see how we can execute our servlets."
  raw: '### The Common Module


    Our first module will be a simple API module. It will contain two Servlets, matching
    services that we’ll want in our music gateway application.^([^(70)](#fn70))


    To create our directory structure, we need to create `chapter05-api/src/main/java/com/bsg6/chapter05`:


    ```

    mkdir -p chapter05-api/src/main/java/com/bsg6/chapter05

    Listing 5-1

    Creating the directory structure with a UNIX shell

    ```


    We’ll also want a `pom.xml`:


    ```


    4.0.0


    com.apress

    bsg6

    1.0


    chapter05-api

    1.0


    ${project.parent.groupId}

    chapter03

    ${project.parent.version}


    com.fasterxml.jackson.core

    jackson-databind


    jakarta.servlet

    jakarta.servlet-api

    6.0.0

    provided


    Listing 5-2

    chapter05-api/pom.xml

    ```


    This is all fairly straightforward, although we’re adding a resource for the Servlet
    API, set to `provided`, which means that it’s available for the compiler (we can
    compile using classes from the Servlet API, which is rather important when compiling
    Servlets), but it’s not a transitive dependency. It *shouldn’t* be a transitive
    dependency, remember; Servlets run in a container like Jetty or Tomcat, which
    will have its own copy of the Servlet API, so our application should actually
    make sure that it has no dependency that would duplicate what the container would
    provide.


    We also have a transitive dependency on the `chapter03` module. The transitive
    dependency means that a dependency on `chapter05-api` carries with it another
    dependency on `chapter03` – as well as dependencies on anything else that `chapter05-api`
    or `chapter03` depend on.^([^(71)](#fn71)) We are going to use one of the `MusicService`
    implementations from Chapter [3](#471370_2_En_3_Chapter.xhtml) in some of our
    examples here, because we don’t want to have to rebuild a working example when
    we have fully working interfaces and implementations already written.


    This way, we can have an intermodule dependency without having to copy our module
    outputs into a known repository.


    We also have a dependency on `jackson-databind`; Jackson ([`https://github.com/FasterXML/jackson`](https://github.com/FasterXML/jackson))
    is a popular library for converting Java objects to various formats like XML,
    JSON, CSV, and others. We’re explicitly including it here because our base servlet
    will use it; in practice, Spring has a transitive dependency on it already, so
    we wouldn’t have to include it, but this library doesn’t have a dependency that
    includes Jackson; therefore, we *do* need to include it in order to use it. In
    practice, this approach is fairly primitive, but it’s useful for learning how
    things work in practice.


    Now it’s time to see our Servlets. Both of them will have the exact same structure:


    1.  Grab a Spring application context from the Servlet context.


    2.  Get a `MusicService` from the Spring application context.


    3.  Create an `ObjectMapper` to prepare to generate JSON output.


    4.  Get Servlet parameters from the `HttpServletRequest.`


    5.  Validate parameters.


    6.  Generate output from the `MusicService`, using Jackson’s `ObjectMapper.writeValueAsString()`
    method to convert to JSON.


    The first Servlet is the `VoteForSongServlet`. We won’t get a chance to see this
    in action until we finish either the `anno` or `xml` modules, but note the `@WebServlet(urlPatterns="/vote")`,
    which tells us part of the URL this Servlet will be attached to. (The other parts
    of the URL are the protocol, host, the port the server is listening on, and the
    application name itself – so when we run the `anno` project, by default, this
    Servlet will be available at `http://localhost:8080/anno/vote`.)


    ```

    package com.bsg6.chapter05;

    import com.bsg6.chapter03.MusicService;

    import com.fasterxml.jackson.databind.ObjectMapper;

    import jakarta.servlet.annotation.WebServlet;

    import jakarta.servlet.http.HttpServlet;

    import jakarta.servlet.http.HttpServletRequest;

    import jakarta.servlet.http.HttpServletResponse;

    import org.springframework.context.ApplicationContext;

    import java.io.IOException;

    @WebServlet(urlPatterns = "/vote")

    public class VoteForSongServlet extends HttpServlet {

    @Override

    public void doGet(HttpServletRequest req, HttpServletResponse resp)

    throws IOException {

    ApplicationContext context = (ApplicationContext) req

    .getServletContext()

    .getAttribute("context");

    MusicService service = context.getBean(MusicService.class);

    ObjectMapper mapper = new ObjectMapper();

    String artist = req.getParameter("artist");

    String song = req.getParameter("song");

    if (artist == null || song == null) {

    log("Missing data in request: requires artist and song parameters");

    resp.setStatus(500);

    } else {

    log("Voting for artist " + artist + ", song " + song);

    service.voteForSong(artist, song);

    resp.setStatus(200);

    resp.getWriter().println(

    mapper.writeValueAsString(service.getSong(artist, song))

    );

    }

    }

    }

    Listing 5-3

    chapter05-api/src/main/java/com/bsg6/chapter05/VoteForSongServlet.java

    ```


    Warning


    This approach, using `@WebServlet`, is very much a matter of our writing directly
    to the Servlet API. In Spring, there are better ways to accomplish this, and we’ll
    see them very shortly as we progress. In practice, using `@WebServlet` like this
    is very rare for application developers.


    Note how we get the `ApplicationContext`. A `ServletRequest` has a `ServletContext`
    associated with it by the container; we’re going to store a reference to an `ApplicationContext`
    as an attribute into the `ServletContext`. The two Servlets we’re showing here
    are going to grab the Spring context from the Servlet context.


    Our next Servlet – the `GetSongsForArtistServlet` – follows the exact same pattern.


    ```

    package com.bsg6.chapter05;

    import com.bsg6.chapter03.MusicService;

    import com.bsg6.chapter03.model.Song;

    import com.fasterxml.jackson.databind.ObjectMapper;

    import jakarta.servlet.annotation.WebServlet;

    import jakarta.servlet.http.HttpServlet;

    import jakarta.servlet.http.HttpServletRequest;

    import jakarta.servlet.http.HttpServletResponse;

    import org.springframework.context.ApplicationContext;

    import java.io.IOException;

    import java.util.List;

    @WebServlet(urlPatterns = "/songs")

    public class GetSongsForArtistServlet extends HttpServlet {

    @Override

    public void doGet(HttpServletRequest req, HttpServletResponse resp)

    throws IOException {

    ApplicationContext context = (ApplicationContext) req

    .getServletContext()

    .getAttribute("context");

    MusicService service = context.getBean(MusicService.class);

    ObjectMapper mapper = new ObjectMapper();

    String artist = req.getParameter("artist");

    if (artist == null ) {

    log("Missing data in request: requires artist parameter");

    resp.setStatus(500);

    } else {

    List data=service.getSongsForArtist(artist);

    resp.setStatus(200);

    resp.getWriter().println(

    mapper.writeValueAsString(data)

    );

    }

    }

    }

    Listing 5-4

    chapter05-api/src/main/java/com/bsg6/chapter05/GetSongsForArtistServlet.java

    ```


    Fascinating stuff – and archaic – but it’s necessary in order to save ourselves
    from copying source files back and forth. It’s time we looked at an actual web
    application, first with a non-Spring-related “Hello, World” Servlet, and then
    we’ll see how we can create a Spring context for use by our `common` module’s
    Servlets.


    Now let’s see how we can execute our servlets.'
