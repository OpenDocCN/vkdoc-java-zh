    # 1. 历史与缘由


    Spring 是一个为 Java 虚拟机提供依赖注入特性的应用框架——这些特性为应用程序开发者带来了可测试性、可靠性和灵活性。它改变了 Java 的开发方式，以下是其如何以及为何发生改变的原因。


    ## 为更好的开发奠定基础


    根据维基百科的说法，Spring 是四个温带季节之一，紧随冬季之后……不，不，这不是一本关于天气的书。让我们再试一次。


    弹簧是一种储存动能的机械装置，当储存的张力……不，这听起来也不对。这应该是一本关于编程的书。


    再试一次：


    从上下文来看，Spring 是一个用于 JVM 的应用框架。它使用一种称为“依赖注入”（我们保证本章后面会介绍）的概念作为通用开发模型，并且它改变了 Java
    程序的编写方式——即使所讨论的程序本身避免使用 Spring。


    Spring 也是一个*生态系统*——一个以名为 spring-core 的库为中心的扩展和模块星系。这些扩展和模块增加了功能和特性，以覆盖许多许多可能的用例。通常，人们不会过多提及
    spring-core；相反，他们只使用“Spring”，并期望其他人理解所指的是整个生态系统。


    如前所述，这些模块相当广泛。如果你需要用 Java 处理某些事情，很可能有一个 Spring 模块适用于它……在某处。


    当然，Spring 最初来自某个地方；那个“某个地方”实际上是“某个人”，Rod Johnson。


    2002 年，Rod 写了一本书，名为《Expert One-on-One J2EE Design and Development》。^(¹) 这本书是对
    J2EE 某些方面的回应，J2EE 是当时 Java 企业应用设计的主流框架，因此它代表了 Java 编程的一场革命——或者如果你愿意，可以说是快乐与便捷的重生。在书中，Rod
    包含了一些示例代码，Juergen Hoeller 和其他人请他将其开源，这些代码最终进入了一个名为“Spring”的项目，该项目后来又出现在另一本书《Expert
    One-on-One J2EE Development without EJB》^(²) 中。*正是*这本书真正推动了事情的发展。^(³)


    要理解 J2EE^(⁴)（以及实际上 Spring）的重要性，我们需要思考当时编程是如何演变的。“真正的应用程序”往往仍在小型机或大型机上运行；托管资源仍然占据主导地位，而那些能在个人计算机上运行并保持相关性的应用程序则令人惊讶。当然，每个人都知道
    Lotus 1-2-3，^(⁵) dBase 是一个功能出奇强大的数据库应用程序，当然，学生和其他类似出身低微的人用个人计算机写文档也没问题……但要真正运行*真正的应用程序*，意味着要在企业大型机上运行。


    对于今天的开发者来说，大型机开发会极其受限；安排作业运行（即使是编译或测试）的概念是陌生的。例如，我们习惯于能够快速启动一个 Docker^(⁷) 中的 PostgreSQL^(⁶)
    实例，然后将我们的应用连接上去进行快速集成测试。今天，我们觉得运行一个应用程序两秒钟只是为了看看函数是否返回正确的值，这没什么大不了的……但在大型机时代，这代表着相当可观的时间、金钱和磁盘空间投入。你通常有一个生产数据库和一个测试数据库，两者都比黄金更珍贵，仅仅是因为它们很难替换。


    在这种环境中，系统管理员是王者。系统管理员告诉你他或她把数据库放在哪里，以及如何连接它们，更重要的是，有多少系统资源分配给了你的程序。超出这些资源，你的程序就会被终止，以防止对其他所有程序产生负面影响。'
- fmt: '# Enter Java


    Enter Java, which could be compiled on a wimpy local desktop. Suddenly, the cost
    of development for applications meant to be run on the mainframe dropped, because
    no longer was the mainframe as important for anything except running the application.
    What’s more, Java was incredibly strong enough to bring the mainframe ethos (“Real
    programs run here”) into smaller machines like minicomputers and even the personal
    computer.


    # J2EE


    `J2EE` was created as an application framework that provided a set of standards
    for enterprise development. It had a presentation layer and a computation layer,
    among others, and incorporated formal standards for communications between those
    layers. It also used the concept of a “container” into which one deployed `J2EE`
    modules – like web modules and other such components – and the container represented
    a point of control for system administrators. An administrator could control how
    many connections a given container could make to a specific database, for example.


    The most important word in the prior paragraph was “formal.” The next most important
    word was “control,” as in “what the container administrator had.”


    # Java Bean


    Java had a concept that it called the “Java bean,” which was meant to be a deployable
    unit of functionality; you might have a “bean” that followed certain standards
    and represented some kind of relevant operation; you might have a bean that, for
    example, served to calculate the points along a curve when provided sample data,
    or a bean that performed matrix computations.


    Likewise, `J2EE` had the concept of an “Enterprise Java Bean,” or “EJB,” which
    was a Java Bean with additional restrictions and capabilities, mostly centering
    around transactions and the ability to be called remotely. An `EJB`, when called,
    represented an interprocess communication, even if it was co-located with its
    caller.


    In practice, this meant that every `J2EE` programmer was enabled right out of
    the gate to design working distributed architectures. This is not a small accomplishment
    at all; distributed architectures are difficult to get right, and `J2EE` made
    invoking processes on separate machines trivial.


    There’s a cost to all of this, of course.


    ## The Cost of EJB


    The nature of `EJB`, especially early in `J2EE`’s lifecycle, meant that when every
    call could be remote, every call had to be treated as if it were a remote call,
    with a specific deployment and development cycle (early on, you had a separate
    packaging compiler for `EJB`, called `ejbc`, to build the supporting classes for
    `EJB`s to run), and because of the requirement that `EJB`s be considered to be
    remote even when they weren’t, `EJB`s were slow.


    `EJB`s were slow to develop, slow to test, slow to deploy, slow to invoke. And
    they were everywhere.


    ## *J2EE Development without EJB*


    *J2EE Development without EJB* was written as a logical reaction to the entrenched
    mindset. Rod Johnson and Juergen Hoeller looked at how `EJB`s were being used
    (and misused), and their actual cost to developer productivity – which was really
    quite high, for the value they were providing. To use an `EJB`, not only did you
    have to go through a special development and deployment cycle, but then you had
    to look them up at runtime, and handle the exceptions when they weren’t available.


    ```

    // get the JNDI context for the application

    Context ctx=new InitialContext();

    // Inferencer is the java interface for the EJB

    // First, we have to get the "Home" object, which

    // can create the EJB for the caller

    // The deployer should have set up the name to point to /

    // an actual deployed EJB artifact

    Object ref=ctx.lookup("java:comp/env/ejb/inferencer");

    InferencerHome home=

    (InferencerHome) PortableRemoteObject.narrow(

    ref,

    InferencerHome.class

    );

    // now, we use the home object to actually get the EJB

    Inferencer engine=home.create();

    // presumably, generate an inference using inputs...

    engine.generate(input);

    Listing 1-1

    Looking up an EJB in the olden days

    ```


    In Listing [1-1](#471370_2_En_1_Chapter.xhtml#PC1), not only did you have to write
    the code to grab a component that can create the `EJB` from somewhere else,^([⁸](#fn8))
    but you had to *configure* that reference, and then you had to go through a set
    of semantics to get something that can actually invoke your `EJB`. But why go
    through the development and remote semantics when they were rarely needed and
    desired? Those semantics were rarely important despite how much they catastrophically
    affected your code; at a Java Symposium in the early 2000s, attendees were asked
    how many used `EJB`s, and most hands went up; the next question was how many of
    those `EJB`s were actually invoked remotely. The answer: anecdotally, about two
    percent.^([⁹](#fn9))


    *That* mindset is what drove *J2EE Development without EJB* a desire to return
    freedom to the coders, to provide support for programming with necessary complexity.
    If you needed to call a remote service, well, nothing stops you from doing that,
    but experience with actual coding showed that it was rarely necessary and, instead,
    served as a barrier to just getting things done.


    Rod’s primary insight was that `EJB`s might be powerful, but they were a little
    like strapping a V6 engine into a child’s bicycle. Most developers didn’t need
    them, or want them; `EJB` just happened to be the language feature *du jour*,
    and as a result development was slowed down, deployment was more difficult,^([^(10)](#fn10))
    testing was difficult, and configuration was arcane. Most developers didn’t use
    the “correct techniques” for looking up `EJB`s because they didn’t want to take
    the time to configure the `EJB` container. Configuring the container meant that
    reproducing conditions was more difficult, as well.


    It was a mess. It was a productive mess, at times; after all, the technology was
    created as a response to actual user needs. But even if developers were able to
    use it to get real things done well, it created a lot of burden on those same
    developers, and the practices in place weren’t making it better. The technology
    didn’t even really *allow* better practices.'
