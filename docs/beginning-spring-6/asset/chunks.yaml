- fmt: "# Introduction\n\nChapter [7](#471370_2_En_7_Chapter.xhtml) was an “umbrella”\
    \ chapter, a chapter focused on introducing Spring Boot. We then walked through\
    \ some of the common things Spring Boot does for us, like handling dependency\
    \ resolution and providing an easy starting point for features developers use\
    \ often like trivial web deployment, a conveniently executable archive, and nearly\
    \ transparent database configuration.\n\nWe followed all of that up with database\
    \ access that most experienced developers – and many inexperienced ones – would\
    \ describe as, perhaps, “quaint.” We also made a slight reference to a crucial\
    \ problem in our database access code – one that ended up limiting our services\
    \ to working with one of our two database entities, because solving it in the\
    \ context of Chapter [7](#471370_2_En_7_Chapter.xhtml) would be more work than\
    \ it was worth. Instead, we chose to model simpler things in Chapter [7](#471370_2_En_7_Chapter.xhtml),\
    \ to defer proper database access to **this** chapter and the next.\n\nWhat do\
    \ you think the “crucial problem” was in Chapter [7](#471370_2_En_7_Chapter.xhtml),\
    \ besides the obvious answer of “There was no reference to a ‘Song’”? Spoiler\
    \ in three…​ two…​ one…​.\n\nChapter [7](#471370_2_En_7_Chapter.xhtml) didn’t\
    \ manage transactions at all. There was no way to address coordination of database\
    \ requests without introducing database abstractions that were out of scope for\
    \ Chapter [7](#471370_2_En_7_Chapter.xhtml). Instead, we chose to keep things\
    \ very simple, and lay the groundwork for Chapters [8](#471370_2_En_8_Chapter.xhtml)\
    \ and [9](#471370_2_En_9_Chapter.xhtml), both of which address database access\
    \ in far more elegant (and more correct) ways.\n\nIn this chapter, we’re going\
    \ to demonstrate the use of `JdbcTemplate`, which itself serves as a model for\
    \ many of Spring’s simpler data access facilities. `JdbcTemplate` gives us a single,\
    \ common workflow model, as well as providing easy mechanisms to map from relational\
    \ data into classes as well as a simple model for exception handling and central\
    \ logging. We’re also going to round out what should have been Chapter [7](#471370_2_En_7_Chapter.xhtml)’s\
    \ feature set, by adding controllers to access all of our data, as well as tests\
    \ for everything.\n\n# Project Setup\n\nThis is a simple, fairly straightforward\
    \ project. First, let’s create our project directory structure.\n\n```\nmkdir\
    \ -p chapter08/src/main/java/com/bsg6/chapter08\nmkdir -p chapter08/src/main/resources\n\
    mkdir -p chapter08/src/test/java/com/bsg6/chapter08\nmkdir -p chapter08/src/test/resources\n\
    ```\n\n*Listing 8-1* Creating the directory structure with POSIX\n\nAs always,\
    \ we need a `pom.xml`. We’re going to use the Spring Boot dependency resolution\
    \ we saw first in Chapter [7](#471370_2_En_7_Chapter.xhtml) and include four things\
    \ of particular note. Let’s take a look at the `pom.xml`, and then we’ll look\
    \ at the dependencies in more detail.\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<project xmlns=\"http://maven.apache.org/POM/4.0.0\"\n         xmlns:xsi=\"\
    http://www.w3.org/2001/XMLSchema-instance\"\n         xsi:schemaLocation=\"http://maven.apache.org/POM/4.0.0\n\
    \         http://maven.apache.org/xsd/maven-4.0.0.xsd\">\n    <modelVersion>4.0.0</modelVersion>\n\
    \n    <parent>\n        <groupId>com.apress</groupId>\n        <artifactId>bsg6</artifactId>\n\
    \        <version>1.0</version>\n    </parent>\n\n    <artifactId>chapter08</artifactId>\n\
    \    <version>1.0</version>\n    <packaging>war</packaging>\n\n    <dependencies>\n\
    \        <dependency>\n            <groupId>com.h2database</groupId>\n       \
    \     <artifactId>h2</artifactId>\n            <scope>runtime</scope>\n      \
    \  </dependency>\n\n        <dependency>\n            <groupId>org.springframework.boot</groupId>\n\
    \            <artifactId>spring-boot-starter-web</artifactId>\n        </dependency>\n\
    \n        <dependency>\n            <groupId>org.springframework.boot</groupId>\n\
    \            <artifactId>spring-boot-starter-jdbc</artifactId>\n        </dependency>\n\
    \n        <dependency>\n            <groupId>org.springframework.boot</groupId>\n\
    \            <artifactId>spring-boot-starter-test</artifactId>\n            <scope>test</scope>\n\
    \        </dependency>\n    </dependencies>\n\n    <build>\n        <plugins>\n\
    \            <plugin>\n                <groupId>org.springframework.boot</groupId>\n\
    \                <artifactId>spring-boot-maven-plugin</artifactId>\n         \
    \       <version>${springBootVersion}</version>\n            </plugin>\n     \
    \   </plugins>\n    </build>\n</project>\n```\n\n*Listing 8-2* `chapter8/pom.xml`\n\
    \nFirst, note that we’re including `spring-boot-starter-jdbc`. This will bring\
    \ in everything Spring needs to make sure we have Spring’s JDBC support and ecosystem,\
    \ which means we get all kinds of goodies like a connection pool (HikariCP^([^(93)](#fn93))\
    \ by default) test-specific datasources and data loading features (as described\
    \ in Chapter [7](#471370_2_En_7_Chapter.xhtml), with `schema.sql` and `data.sql`).\n\
    \nThe next dependency we want to make sure we’ve included is actually the least\
    \ relevant, because it’s one we saw in Chapter [7](#471370_2_En_7_Chapter.xhtml):\
    \ `spring-boot-starter-web`. We’re including it here because this chapter will\
    \ in fact contain a fully working backend for our band gateway.\n\n# Our Entity\
    \ and Data Models\n\nWe’re using the same entity model we described in Chapter\
    \ [3](#471370_2_En_3_Chapter.xhtml) and that we’ve used since then. However, we\
    \ want to change the **data** model slightly, to make data management more efficient.\n\
    \nWhat’s the difference between an “entity model” and a “data model”? Well, in\
    \ concrete terms, they’re largely interchangeable. There’s not a formal definition\
    \ that one would use to say “this is an entity model, that is a data model.” However,\
    \ colloquially speaking – and as used here – an entity model describes the overall\
    \ relationships between things we’re working with (the entities), and a data model\
    \ is a more specific description of the actual managed elements.\n\nFor example,\
    \ in an **entity** model, an `Artist` exists (therefore, it’s an entity!), and\
    \ it has a `name`. In a data model, we might include things that make working\
    \ with an `Artist` more convenient – a generated primary key, or a count of the\
    \ songs for that `Artist`, for example – things that might be relevant for an\
    \ `Artist` from a programming standpoint, but that aren’t necessarily part of\
    \ the definition of an `Artist` as a concept.\n\nOur entity model (again, Chapter\
    \ [3](#471370_2_En_3_Chapter.xhtml)) looks like this.\n\n![Entity model](images/471370_2_En_8_Chapter/471370_2_En_8_Fig1_HTML.jpg)\n\
    \n*Figure 8-1* Entity model\n\nAn entity-relationship model between artist and\
    \ song. E artist with attribute I d integer is interconnected to E song with attributes\
    \ title string and votes integer via one-to-many relationship, respectively.\n\
    \nOur **data** model adds a few attributes to the entities, to create relationships\
    \ and make managing the objects much more efficient.\n\n![Data model](images/471370_2_En_8_Chapter/471370_2_En_8_Fig2_HTML.jpg)\n\
    \n*Figure 8-2* Data model\n\nA data-relationship model between artist and song.\
    \ E artist with attributes I d integer and name string is interconnected to E\
    \ song with attributes I d integer, artist I d integer, title string, and votes\
    \ integer via one-to-many relationship, respectively.\n\nThis isn’t entirely descriptive\
    \ – we’re not including nullability or sizes into our models, but we’re also not\
    \ **quite** trying to build a formal entity model, either. We’re mostly thinking\
    \ about how we design our class structure. This is the “right way” to model data\
    \ when you’re proceeding from a SQL-first access model (i.e., when you anticipate\
    \ using JDBC to access your data, as we are in this chapter); in our next chapter,\
    \ when we look at Spring Data, we can actually design our classes first and then\
    \ make sure they generate a workable database schema, rather than starting with\
    \ the schema and building a workable class structure.\n\nHere’s a full implementation\
    \ of the `Artist` class.\n\n```java\npackage com.bsg6.chapter08;\n\nimport org.springframework.lang.NonNull;\n\
    import java.util.Objects;\nimport java.util.StringJoiner;\n\npublic class Artist\
    \ {\n    Integer id;\n    @NonNull\n    String name;\n\n    public Artist() {}\n\
    \n    public Artist(@NonNull String name) {\n        this.name = name;\n    }\n\
    \n    public Artist(Integer id, @NonNull String name) {\n        this.id = id;\n\
    \        this.name = name;\n    }\n\n    public Integer getId() {\n        return\
    \ id;\n    }\n\n    public void setId(Integer id) {\n        this.id = id;\n \
    \   }\n\n    @NonNull\n    public String getName() {\n        return name;\n \
    \   }\n\n    public void setName(@NonNull String name) {\n        this.name =\
    \ name;\n    }\n\n    @Override\n    public String toString() {\n        return\
    \ new StringJoiner(\", \", Artist.class.getSimpleName() + \"[\", \"]\")\n    \
    \            .add(\"id=\" + id)\n                .add(\"name='\" + name + \"'\"\
    )\n                .toString();\n    }\n\n    @Override\n    public boolean equals(Object\
    \ o) {\n        if (this == o) return true;\n        if (!(o instanceof Artist\
    \ artist)) return false;\n        return Objects.equals(getId(), artist.getId())\
    \ && Objects.equals(getName(), artist.getName());\n    }\n\n    @Override\n  \
    \  public int hashCode() {\n        return Objects.hash(getId(), getName());\n\
    \    }\n}\n```\n\n*Listing 8-3* `chapter8/src/main/java/com/bsg6/chapter08/Artist.java`"
