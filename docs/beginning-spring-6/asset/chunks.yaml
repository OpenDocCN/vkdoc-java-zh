    The `FlatFileItemReaderBuilder` is an implementation of `ItemReader` from Spring
    Batch which helps us ingest data from a given resource location (here we’re using
    a classpath resource), helps us define the fields we see in the document, and
    maps them to our bean which is `Artist`. We do the same thing for `Song` with
    the only difference being that we include `artistId,` so our songs can map to
    our unique and diverse artists in our catalog.


    ```

    @Bean

    public FlatFileItemReader artistReader() {

    return new FlatFileItemReaderBuilder().name("artistsReader")

    .resource(new ClassPathResource(artistsFileInput))

    .delimited()

    .names(new String[] { "id", "name" })

    .fieldSetMapper(new BeanWrapperFieldSetMapper() {{

    setTargetType(Artist.class);

    }})

    .build();

    }

    @Bean

    public FlatFileItemReader songReader() {

    return new FlatFileItemReaderBuilder().name("songsReader")

    .resource(new ClassPathResource(songsFileInput))

    .delimited()

