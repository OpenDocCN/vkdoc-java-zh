- fmt: '### Alternative JVM Languages


    This book uses Java, for the most part, with XML used for project configuration
    (thanks to Maven), and a tiny bit of a templating language commonly referred to
    as “Moustache.” However, there are *many* languages available on the JVM, and
    there’s no reason whatsoever to limit yourself to Java if one of those other languages
    suits you for whatever reason.


    Spring even supports most of those languages with tweaks that tune them for Spring,
    so you can write idiomatic code in, say, Groovy or Kotlin and get every feature
    we’ve demonstrated with Java.


    It’s outside the scope of this book to recommend a given language (outside of
    Java, of course), but both Groovy and Kotlin are first-class Spring citizens,
    and you can certainly leverage languages like Scala or Clojure as well. Spring
    works on *classes* in the JVM; it doesn’t care how those classes are created.


    Each of these languages has strengths and weaknesses. Groovy, for example, brings
    a very terse syntax such that you can add a lot of functionality with very few
    lines of code, and as a scripting language it tends to be very expressive. Kotlin
    *feels* a lot like Java, but also tends to be very expressive in its syntax (as
    it was created to represent Java’s syntax tree rather than Java’s *syntax*). Interoperability
    between both of these languages and Java tends to be *very* high.


    Languages you might want to consider in addition to Java, in some rough order
    of popularity:


    1.  Kotlin (`https://kotlinlang.org/`)

    2.  Groovy (`https://groovy-lang.org/`)

    3.  Ruby (`www.ruby-lang.org/` and `www.jruby.org/` on the JVM)

    4.  Scala (`www.scala-lang.org/`)

    5.  Clojure (`https://clojure.org/`)


    ## Spring WebMVC.fn


    In Chapters 6, 7, and 10, we looked at using WebMVC, Spring’s project for creating
    HTTP endpoints. Functional Endpoints (`https://docs.spring.io/spring-framework/reference/web/webmvc-functional.html`)
    were introduced in Spring 5 as Spring WebMVC.fn and fully integrated with Spring
    Web MVC in version 6.


    The Functional Endpoints model provides a method of using functions to route and
    handle requests and designed for immutability. It provides a “Domain-Specific
    Language” approach from within Spring as an alternative to the annotation-based
    approach but still runs on the same `DispatcherServlet`.


    A Domain-Specific Language – or DSL – is a language or subset of grammar specialized
    for a specific application domain.


    Languages like Java are very generalized, but code written in Java can target
    specific domains quite easily; you can, for example, create an abstraction of
    a `Door` that understands how to `open` or `close` itself.


    However, you’re still expressing the actions in Java. Opening and closing doors
    is a fundamentally simple process to model, but consider simulating electronic
    signals as an example; it’s easy to write Java code to express concrete electronics
    concepts, but to an engineer, the Java code would have all kinds of extra information
    that the engineer wouldn’t need and might not understand.


    A DSL, on the other hand, is usually designed to fit the problem space it describes
    very tightly, and an engineer would ideally be able to read an “electronics DSL”
    without having to deal with very much of the underlying programming language being
    used.


    Popular examples of DSLs for the JVM include Gradle (which uses DSLs for building
    projects in either Groovy or Kotlin), JavaFX, and Processing (see `https://processing.org/`).
    There are, of course, many, many more – including `WebMVC.fn` itself. But you
    knew that, because we started off by describing `WebMVC.fn` as a DSL!


    Instead of mapping the endpoints in the `Component`, though, you’d create **another**
    bean, of type `RouterFunction<ServerResponse>`, which has a convenient fluent
    API for creating endpoints for handling `GET` requests, `POST` requests, filtering,
    and so forth.


    Here is a sample code snippet.


    ```java

    @Bean

    RouterFunction routes(PersonHandler ph) {

    return route()

    .GET("/people", ph::handleGetAllPeople)

    .GET("/people/{id}", ph::handleGetPersonById)

    .POST("/people", ph::handlePostPerson)

    .filter((serverRequest, handlerFunction) -> {

    try {

    log.info("entering HandlerFilterFunction");

    return handlerFunction.handle(serverRequest);

    }

    finally {

    log.info("exiting HandlerFilterFunction");

    }

    })

    .build();

    }

    ```


    Listing 12-1: `WebMVC.fn` route configuration example


    It takes a little bit of getting used to, in part because Java isn’t quite as
    flexible for creating domain-specific languages as programming languages like
    Scala, Kotlin, or Groovy, so the DSL isn’t quite as clean as it might be – it’s
    going to have Java-isms like lambdas, method references, and concrete type declarations,
    as you can see from Listing 12-1.


    However, `WebMVC.fn` does allow you to centralize the endpoint configuration.
    If you have 17 different classes that are serving as `Controller` objects today,
    `WebMVC.fn` would allow you to change them back to ordinary `Component` classes
    – and have one location for configuration of all of the endpoints, instead of
    forcing a programmer to chase down which of those seventeen classes actually provides
    a specific endpoint.


    Is this a worthy goal? Honestly, yes (or, well, “maybe”); a good design will allow
    you to easily map between an endpoint and a specific `Controller`, but having
    the `Controller` objects handle their own endpoint construction means that they
    have a wider visibility to the grand design and deployment of the application
    than perhaps they should.


    It’s a minor design decision, in the end (after all, Web MVC works now, and you
    can manually register endpoints just as `WebMVC.fn` does, just with more code
    and in idiomatic Java), but it’s still a neat idea. You can still accomplish similar
    things without `WebMVC.fn` (by registering the endpoints in a central location,
    but without `WebMVC.fn`’s DSL), but the DSL makes it far more convenient than
    it otherwise might be.


    As usual, Spring provides flexibility such that you can design your application
    in nearly any fashion you would like.'
