    </project>\n```\n\n*Listing 5-6* `chapter05-anno/pom.xml`\n\n#### Our First Standalone\
    \ Working Servlet\n\nNow it’s time for us to create our first *working* Servlet\
    \ – an endpoint that will accept a request from a web browser and generate a response\
    \ for it. It’s not very long, but it shows us how to accept a `GET` request (again,\
    \ the most common request type) from a browser, and how to render output via Mustache\
    \ (a skill that’s useful to have, but not one that’s horrendously useful for this\
    \ chapter).\n\n```\npackage com.bsg6.chapter05;\n\nimport com.samskivert.mustache.Mustache;\n\
    import jakarta.servlet.annotation.WebServlet;\nimport jakarta.servlet.http.HttpServlet;\n\
    import jakarta.servlet.http.HttpServletRequest;\nimport jakarta.servlet.http.HttpServletResponse;\n\
    import java.io.IOException;\nimport java.io.InputStreamReader;\nimport java.util.Map;\n\
    import java.util.Objects;\n\n@WebServlet(urlPatterns = \"/hello1\")\npublic class\
    \ FirstHelloServlet extends HttpServlet {\n    @Override\n    protected void doGet(HttpServletRequest\
    \ request,\n                         HttpServletResponse response)\n         \
    \   throws IOException {\n        try (var in = Objects.requireNonNull(this\n\
    \                .getClass()\n                .getResourceAsStream(\"/hello.html\"\
    ))) {\n            try (var reader = new InputStreamReader(in)) {\n          \
    \      var output = Mustache.compiler().compile(reader)\n                    \
    \    .execute(Map.of(\"name\", \"world\"));\n                response.getWriter().println(output);\n\
    \            }\n        }\n    }\n}\n```\n\n*Listing 5-7* `chapter5-anno/src/main/java/com/bsg6/chapter05/FirstHelloServlet.java`\n\
    \nIn this Servlet – identified with an annotation, and available at a relative\
    \ URL path of `/hello1` – we have a lot of boilerplate to handle imports. We also\
    \ have a `doGet()` method – which handles `GET` requests over HTTP – which does\
    \ nothing more than render a Mustache template (held in the classpath at `/src/main/resources/hello.html`,\
    \ shown in our next listing) with a variable `name` that has a static value of\
