    ## The `chapter09-test` Project


    The `chapter09-test` project, like `chapter09-api`, is not a “real” Spring Boot
    project; it’s an artifact that a Spring Boot project would use. It’s a little
    unique in that it’s meant to be imported into other modules’ **test** scopes,
    so it exports everything via `src/main/java`.


    The `pom.xml` for `chapter09-test` is very similar to the `pom.xml` for `chapter09-api`.


