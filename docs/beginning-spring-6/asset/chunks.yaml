    这里没有什么神奇之处；我们基本上是在用 Java 源代码复现我们的数据模型。


    我们将按照第 7 章所述，通过创建`schema.sql`文件来手动创建数据库模式。这些文件不会放在源代码树的相同位置，因为`application.properties`仅适用于我们的测试——毕竟在生产环境中我们可能想使用不同的数据库——但无论
    H2 实例是内存型（如我们的测试中）还是外部数据库，或者任何其他形式，我们的`schema.sql`都是适用的。


    H2 可以作为嵌入式数据库运行，也可以作为独立的数据库服务器运行。此外，它可以在磁盘上或内存中创建数据库，因此我们可以有四种不同的配置。


    | 嵌入式且内存型 | 适用于测试 |

    | --- | --- |

    | 嵌入式且磁盘型 | 适用于在单个容器中运行且无需共享访问的应用程序 |

    | 外部且内存型 | 或许适用于创建侧缓存；这在现实世界中相当罕见 |

    | 外部且磁盘型 | 适用于多个进程使用数据库的应用程序，并反映了大多数其他数据库的使用方式 |


    首先，简单（且幸运地简短）的`application.properties`，我们将把它放在`chapter08/src/test/resources`中——记住，这仅用于测试，所以我们**希望**它位于测试目录树中。（如果我们想要生产版本，可以在`chapter08/src/main/resources`中创建，其中包含用于生产环境的特定属性——例如显式的
    JDBC URL 等。`test`目录树中的版本在我们的测试中具有优先权。）


    这个文件的主要目的是确保 Spring Boot 知道我们使用的数据库平台，这样它就会使用`schema.sql`来创建我们的数据库表。


    ```

    spring.sql.init.platform=h2

