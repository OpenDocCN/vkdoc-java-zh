    Our web application will have the following routes:


    *   `/login` – A form showing a username and password challenge with a submit
    button


    *   `/home` – Shown after a successful login and available to any authenticated
    user


    *   `/dashboard` – Available to be shown to any user with the `USER` role


    *   `/admin_dashboard` – Available to users with the `ADMIN` role


    We’re using the Lambda DSL style in the following code which makes everything
    a lot easier to grok. Thinking through the above endpoints, our implementation
    below will ensure that the roles and permissions match up with intentions, and
    that any request not specified will automatically require authentication. The
    HttpSecurity object uses a builder pattern so we can ensure at each step that
    we’re getting that object back, and use the `build` method to return an instance
    of `SecurityFilterChain` so that Spring Security will act on our defined wishes.


    ```

    @Bean

    public SecurityFilterChain filterChain(HttpSecurity http) throws Exception {

    http

    .authorizeHttpRequests(authorize -> authorize

    .requestMatchers("/login")

    .permitAll()

    .requestMatchers("/dashboard")

    .hasRole("USER")

    .requestMatchers("/admin_dashboard")

    .hasRole("ADMIN")

    .anyRequest()

    .authenticated()

    )

    .formLogin(formLogin -> formLogin

    .loginPage("/login")

    .permitAll()

    );

    return http.build();

