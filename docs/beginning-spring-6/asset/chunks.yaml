    ### Using a Programmatic Configuration for **ApplicationContext**


    We’ve seen how to load configurations with `ClassPathXmlApplicationContext` (from
    Chapter [2](#471370_2_En_2_Chapter.xhtml)), but that class accepts XML file locations
    as arguments; here, we have no XML at all. In order to use this kind of configuration,
    we need to use `AnnotationConfigApplicationContext`, passing it a reference to
    the `Class<?>` that represents the configuration. We can pass in as many configuration
    classes as we need. In practice, a runnable application might look something like
    Listing [3-38](#471370_2_En_3_Chapter.xhtml#PC38), which loads our two configuration
    classes and dumps every managed Spring bean’s name to the console.


