    # 4. Lifecycle


    In this chapter, we’ll expand on our sample application and learn about the lifecycle
    options in Spring. We’ll introduce how to invoke methods when Spring beans are
    created or destroyed and how to do so via multiple configurable options either
    using the Spring XML file, annotations, or the programmatic configurations, all
    of which were used in Chapter [3](#471370_2_En_3_Chapter.xhtml).


    ## Introduction of Lifecycle


    Every object has a lifecycle in the Java Virtual Machine. When an object is created,
    it’s got a series of initialization stages (at the class’ level, then the instance’
    level), then the class’ constructor is called. When (and if) the object becomes
    unreachable by program code, the object might be cleaned up by the garbage collector,
    which might itself call specially named methods so that the object can clear out
    any allocated resources, a process known as finalization.^([^(59)](#fn59))


    Dependency injection frameworks add extra control to the lifecycle of objects,
    by adding callbacks for lifecycle events or offering hooks that the dependency
    context will call when certain things have been accomplished. Spring also provides
    scope within a given context, to control whether the resources are considered
    to be singletons or not.


    Let’s look at scope, first.'
