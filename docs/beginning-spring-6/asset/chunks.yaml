    \n## Lifecycle with Java Configuration\n\nAnnotated beans are all well and good,\
    \ but annotating the beans makes their configuration *global* – if you set an\
    \ annotated bean’s name, it’s set for every instance of that class in the current\
    \ classpath; compare that to XML, where you can have multiple beans of the same\
    \ class, with different names and different property values.\n\nWe’ve demonstrated\
    \ how to set beans to different scopes with XML and annotations; there’s also\
    \ the ability to use a configuration class as well, and scope applies here just\
    \ like it does elsewhere. The advantage of a configuration class is that you can\
    \ have multiple configuration classes present on the classpath at any time, which\
    \ gives you the power and cleanliness of the annotated approach, with the flexibility\
    \ of the XML approach.\n\nLet’s take one more look at a test. This one will create\
    \ another object type extending `HasData` – this time named `NinthObject` – but\
    \ the configuration will be stored in a local class called `Config08`. In it,\
    \ there are two methods declared, `foo()` and `bar()`, and these methods are both\
    \ marked with `@Bean` – which means that `foo()` will describe how to create a\
    \ bean named `foo`, and `bar()` will describe how to name a bean named `bar`.\
    \ We could, of course, provide annotation directives to rename the beans instead\
    \ of using the method names, but that’s something we’ve already seen in Chapter\
    \ [3](#471370_2_En_3_Chapter.xhtml).\n\nJust as with our annotation example, we\
    \ can add `@Scope(\"prototype\")` to our methods, which tells Spring the appropriate\
    \ scope to use for beans with that name.\n\nWe’re also changing the `@ContextConfiguration`\
    \ for the test class, to refer to `Config08.class` instead of a named configuration\
    \ file. Past that, though, everything looks similar (and acts the same as) what\
    \ we saw in `TestLifecycle05.java` – we have a data provider that tells the test\
    \ whether the class should be a singleton or not, and validates the instance references\
    \ and instance data appropriately.\n\nHere’s the test source.\n\n```\npackage\
    \ com.bsg6.chapter04;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.context.ApplicationContext;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.Configuration;\nimport org.springframework.context.annotation.Scope;\n\
    import org.springframework.test.annotation.DirtiesContext;\nimport org.springframework.test.context.ContextConfiguration;\n\
    import org.springframework.test.context.testng.AbstractTestNGSpringContextTests;\n\
    import org.testng.annotations.DataProvider;\nimport org.testng.annotations.Test;\n\
    import java.util.UUID;\nimport static org.testng.Assert.*;\nclass NinthObject\
    \ extends HasData {\n}\n@Configuration\nclass Config08 {\n@Bean\npublic NinthObject\
    \ foo() {\nreturn new NinthObject();\n}\n@Bean\n@Scope(\"prototype\")\npublic\
    \ NinthObject bar() {\nreturn new NinthObject();\n}\n}\n@ContextConfiguration(classes=Config08.class)\n\
    @DirtiesContext(classMode = DirtiesContext.ClassMode.AFTER_CLASS)\npublic class\
    \ TestLifecycle08 extends AbstractTestNGSpringContextTests {\n@Autowired\nApplicationContext\
    \ context;\n@DataProvider\nObject[][] getReferences() {\nreturn new Object[][]{\n\
    {\"foo\", true},\n{\"bar\", false}\n};\n}\n@Test(dataProvider = \"getReferences\"\
    )\npublic void testReferenceTypes(String reference, boolean singleton) {\nHasData\
