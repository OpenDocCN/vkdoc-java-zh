    same scaffolding as `TestMusicService1`, except with a different configuration
    file. It uses an injected `MusicService` and instantiates a local copy of `MusicServiceTests`;
    it then has four test methods, each of which delegates to the method of the same
    name in `MusicServiceTests`. It’s very simple. It **also** manages to test *every
    line of code* in `MusicService2` and its superclass, `AbstractMusicService`, with
    the sole exceptions being the methods in `AbstractMusicService` that are overridden
    by `MusicService2`.


    Note


    It’s a good thing that every line of code is hit, even though all of these are
    test classes and the code doesn’t *really* matter, but don’t make the mistake
    of thinking that 100% code coverage is an “end goal.” We have 100% coverage, but
    we’ve not tested any edge cases, and no failure conditions. Again: 100% coverage
    is good, but it’s a lousy target; you should aim to fulfill all of the specification’s
    requirements, instead. It just so happens that our “specification” doesn’t contain
    any error conditions to speak of.


    ### Choosing Components with `@Qualifier` and Bean Names


    In the previous section, we injected a normalizer into our `MusicService2`, and
    used it to normalize both the artist names and the song names. This assumes, though,
    that both sets of names are normalized in the same way. What if they’re not?


    In that case, we need to use two different kinds of normalizers. Then we’re faced
    with a different kind of problem: how do we tell Spring which normalizer to use,
    and where?


    It turns out we have a few different options. Since injection is based on types,
    we could simply create new marker interfaces, like `SongNameNormalizer`, that
    simply extends `Normalizer`. Then we would have a declaration like `@Autowired
    SongNameNormalizer` `songNameNormalizer` and be done; Spring would look at the
    components it manages, find one component that can be assigned to `songNameNormalizer`,
    and be done.


    We can also use the component names, as opposed to the components’ assignable
    types. The `@Component` annotation has an optional value that serves as the component
    name for Spring. The default component name is the class’ name itself, with an
    initial lowercase letter (thus, `MusicService1` is given a component name of `musicService1`),
    but if we use `@Component("bluePin")` then the component is named, predictably,
    `bluePin` instead.


    If the autowired reference uses a name that matches a Spring bean – that is, we
    have `MusicService bluePin` – then Spring will inject a bean with that name.


    That doesn’t help us when one of two different circumstances arise in our code,
    though. If our variable reference doesn’t match a component name, *or* we have
    two of the same types to inject, Spring still won’t know how to choose which instance
    to inject.


    We can help Spring decide which component to inject by using the `@Qualifier`
    annotation, which requires a value corresponding to the name of the Spring bean
    you want assigned.


    Let’s see it in action! We’re going to use *two* `Normalizer` types: one will
    trim all whitespace from the beginning and the end of the input text (the default
    behavior, and we’re basically replicating the `SimpleNormalizer` from the last
    example), and the other will capitalize the start of every word in addition to
    trimming the whitespace. Then we’ll create a `MusicService` that uses both normalizers,
    and lastly, we’ll have another test.


    These listings will all be short, thankfully.


    Here’s our configuration file. Again, it’s *very* similar to our previous configurations,
    only changing the `base-package` of the `component-scan` tag.


    ```


    Listing 3-18

    chapter03/src/test/resources/config-03.xml

    ```


    Our `Normalizer` instances come next. Note that we don’t *need* the `@Component`
    annotations to use names; the two classes would get names of `simpleNormalizer`
    and `capLeadingNormalizer` by default. Those are boring names, and thus we’re
    changing them to `foo` and `bar`, respectively.


    Note


    Of course, `foo` and `bar` are just as boring, as is the use of `baz` later in
    this very chapter. These are known as “metasyntactic variables,” a set of meaningless
    placeholder words used as names when we don’t want to communicate specific meaning.
    In this code, they’re actually being used in exactly the wrong sense, since these
    references *do* have specific meaning, but we’re using the meaningless words because
    they help us illustrate a concept.


