    在这里，我们利用Spring Boot完成大部分工作，使用`@SpringBootConfiguration`。这将扫描当前包（以及任何名称以`com.bsg6.chapter09.jpa`开头的包）以查找Spring组件——这将捕获我们的`MusicService`、`ArtistRepository`和`SongRepository`接口；通过`@EnableJpaRepositories`，我们通知Spring要实现哪种服务（以及在哪里查找带有`@Repository`注解的类）。


    我们还使用`@EntityScan`注解来强制扫描当前包（以及任何“子包”——即名称以此包名开头的包）中的实体（标记有`@Entity`的类）。我们运行测试时不需要这个——测试注解会为我们完成——但在“真实代码”中，我们会需要它。


    我们还创建了JPA兼容的`WildcardConverter`作为一个组件。


    请注意，我们没有做任何事情来为JPA创建任何资源；没有数据源，没有`EntityManager`引用，什么都没有。Spring Boot通过`spring-boot-starter-data-jpa`依赖为我们完成了这些。默认情况下，我们将拥有类路径中任何数据库的内存版本（在此项目中是H2）；如果我们想要（也确实需要），我们可以使用`application.properties`并通过`spring.datasource.url=jdbc:h2:file:chapter09-jpa`或任何有意义的设置JDBC
    URL。这是一个示例。


    ```

