  raw: '### The Annotation-Based Web Application


    Let’s see how we can do two things: one, build a working web application, and
    two, use a Spring context that programmatically scans packages for Spring-annotates
    classes, for use by our Servlets. This application is going to be called `anno`,
    not because we’re fond of Latin words for periods of time, but because it’s much
    shorter to type than “annotation” or other variants that might be more descriptive.


    Let’s write our “Hello, World” Servlet first, because it allows us to get all
    of our pieces in place to integrate Spring for our second and third Servlets.


    Maven has a package type that is designed to create artifacts designed for web
    containers, called “web archives,” or – more colloquially – “wars.”^([^(72)](#fn72))
    It **also** has a series of convenient plugin to run a web application inside
    a container. which we’ll see in a few paragraphs.


    First, we need to create the `chapter05-anno` directory itself.


    ```

    mkdir -p chapter05-anno/src/main/java/com/bsg6/chapter05

    mkdir -p chapter05-anno/src/main/resources

    Listing 5-5

    Creating the directory structure with POSIX

    ```


    The source layout is nearly identical to our other projects’ source layouts.


    Our `pom.xml` is where things start to get interesting. Note the addition of the
    extra things in the `plugins` section, and note also the additional dependencies:


    *   The Servlet API itself, as in the `chapter05-api` module.


    *   See also `spring-web` for web-application-specific bits of Spring.


    *   A templating library, Mustache. ^([^(73)](#fn73))


    *   A dependency on the code from Chapter [3](#471370_2_En_3_Chapter.xhtml) which
    we’ll use to do the actual work in this chapter.


    *   Lastly, the `jetty-maven-plugin` plugin, which gives Maven a convenient way
    to run Jetty as a Servlet container with our application deployed in it.


    ```


    4.0.0


    com.apress

    bsg6

    1.0


    chapter05-anno

    1.0

    war


    ${project.parent.groupId}

    chapter05-api

    ${project.parent.version}


    jakarta.servlet

    jakarta.servlet-api

    6.0.0

    provided


    org.springframework

    spring-web


    com.samskivert

    jmustache

    1.15


    org.eclipse.jetty

    jetty-maven-plugin

    11.0.15


    Listing 5-6

    chapter05-anno/pom.xml

    ```


    #### Our First Standalone Working Servlet


    Now it’s time for us to create our first *working* Servlet^([^(74)](#fn74)) –
    an endpoint that will accept a request from a web browser and generate a response
    for it. It’s not very long, but it shows us how to accept a `GET` request (again,
    the most common request type) from a browser, and how to render output via Mustache
    (a skill that’s useful to have, but not one that’s horrendously useful for this
    chapter).


    ```

    package com.bsg6.chapter05;

    import com.samskivert.mustache.Mustache;

    import jakarta.servlet.annotation.WebServlet;

    import jakarta.servlet.http.HttpServlet;

    import jakarta.servlet.http.HttpServletRequest;

    import jakarta.servlet.http.HttpServletResponse;

    import java.io.IOException;

    import java.io.InputStreamReader;

    import java.util.Map;

    import java.util.Objects;

    @WebServlet(urlPatterns = "/hello1")

    public class FirstHelloServlet extends HttpServlet {

    @Override

    protected void doGet(HttpServletRequest request,

    HttpServletResponse response)

    throws IOException {

    try (var in = Objects.requireNonNull(this

    .getClass()

    .getResourceAsStream("/hello.html"))) {

    try (var reader = new InputStreamReader(in)) {

    var output = Mustache.compiler().compile(reader)

    .execute(Map.of("name", "world"));

    response.getWriter().println(output);

    }

    }

    }

    }

    Listing 5-7

    chapter5-anno/src/main/java/com/bsg6/chapter05/FirstHelloServlet.java

    ```


    In this Servlet – identified with an annotation, and available at a relative URL
    path of `/hello1` – we have a lot of boilerplate to handle imports. We also have
    a `doGet()` method – which handles `GET` requests over HTTP – which does nothing
    more than render a Mustache template (held in the classpath at `/src/main/resources/hello.html`,
    shown in our next listing) with a variable `name` that has a static value of `"world."`


    As promised, let’s take a look at our Mustache template.


    ```


    Hello, {{ name }}


    Hello, {{ name }}!


    Listing 5-8

    chapter05-anno/src/main/resources/hello.html

    ```


    Without going too far into too much detail, this template is simply an HTML5 document,
    with placeholders for a value called `name`. The renderer (Mustache, of course)
    will replace `{{ name }}` with the value of `name` passed into the `render()`
    method, if any.


    All this is well and good, but it’s a little bit abstract: how do we *run* it?
    How can we get our Servlet to actually achingly and finally greet the world, which
    surely has been waiting with bated breath?^([^(75)](#fn75))


    We do it with Maven and the afore-mentioned `jetty-maven-plugin` plugin, of course,
    by executing the following command in the top-level project directory, the one
    that contains `chapter03` and `chapter05`:


    ```

    $ mvn -pl chapter05-anno jetty:run

    Listing 5-9

    Running the chapter05-anno project

    ```


    After some churning to download the appropriate resources and compile our Servlet,
    Maven informs us that – among other things – Jetty is running on port 8080\. Our
    application, such that it is, is available at `http://localhost:8080/`.


    ```

    [INFO] Started ServerConnector@5238896f{HTTP/1.1, (http/1.1)}{0.0.0.0:8080}

    [INFO] Started Server@236ae13d{STARTING}[11.0.15,sto=0] @3218ms

    [INFO] Automatic redeployment disabled, see ''mvn jetty:help'' for more redeployment
    options

    Listing 5-10

    Relevant logs from the chapter05-anno project

    ```


    If you recall the `@WebServlet` annotation we used on `FirstHelloServlet`, you’ll
    remember that we have a relative URL path of `/hello1`. This is added to the web
    application’s root URL – which is, as said, `http://localhost:8080/` – giving
    our Servlet an endpoint of `http://localhost:8080/hello1`. If we open up a web
    browser and go to that location, we will be showered with glory and praise as
    our browser window triumphantly displays `Hello, world` and all of our dreams
    come true.


    ![](images/471370_2_En_5_Chapter/471370_2_En_5_Fig1_HTML.jpg)


    A screenshot of a web browser window displays a webpage hosted on localhost colon
    8080 slash hello 1\. The main area of the page depicts the text Hello, World exclamation
    mark.


    Figure 5-1


    Hello, world!


    We can also test with a command line application, `curl`,^([^(76)](#fn76)) which
    we’ll be doing for our other Servlets.


    ```

    $ curl http://localhost:8080/hello1


    Hello, world


    Hello, world!


    $

    Listing 5-11

    The content from the application

    ```


    It’s exciting stuff, but as with other “Hello, World” mechanisms, it mostly makes
    sure all of the plumbing is in place so that we can start working on more interesting
    bits.'
  trans: '

    ### 基于注解的 Web 应用


    让我们看看如何实现两件事：第一，构建一个可运行的 Web 应用；第二，使用一个 Spring 上下文，通过编程方式扫描包中带有 Spring 注解的类，供我们的
    Servlet 使用。这个应用将被命名为 `anno`，这并非因为我们偏爱表示时间段的拉丁词汇，而是因为相比“annotation”或其他更具描述性的变体，它输入起来要简短得多。


    我们先编写“Hello, World” Servlet，因为它能让我们将所有组件就位，以便为第二和第三个 Servlet 集成 Spring。


    Maven 有一种专为 Web 容器设计工件的包类型，称为“Web 归档文件”，或者更通俗地说，“war”文件。^(⁷²) 它**还**提供了一系列便捷的插件，用于在容器内运行
    Web 应用，我们将在几段后看到这一点。


    首先，我们需要创建 `chapter05-anno` 目录本身。


    ```

    mkdir -p chapter05-anno/src/main/java/com/bsg6/chapter05

    mkdir -p chapter05-anno/src/main/resources

    清单 5-5

    使用 POSIX 命令创建目录结构

    ```


    源代码布局与我们其他项目的源代码布局几乎相同。


    我们的 `pom.xml` 才是开始变得有趣的地方。请注意 `plugins` 部分新增的内容，以及额外的依赖项：


    *   Servlet API 本身，与 `chapter05-api` 模块中的相同。

    *   另外，请参见 `spring-web`，用于 Spring 中与 Web 应用相关的部分。

    *   一个模板库，Mustache。^(⁷³)

    *   对第 3 章代码的依赖，我们将在本章中使用它来完成实际工作。

    *   最后是 `jetty-maven-plugin` 插件，它为 Maven 提供了一种便捷的方式，将 Jetty 作为 Servlet 容器运行，并将我们的应用部署在其中。


    ```


    4.0.0


    com.apress

    bsg6

    1.0


    chapter05-anno

    1.0

    war


    ${project.parent.groupId}

    chapter05-api

    ${project.parent.version}


    jakarta.servlet

    jakarta.servlet-api

    6.0.0

    provided


    org.springframework

    spring-web


    com.samskivert

    jmustache

    1.15


    org.eclipse.jetty

    jetty-maven-plugin

    11.0.15


    清单 5-6

    chapter05-anno/pom.xml

    ```


    #### 我们的第一个独立可运行 Servlet


    现在，是时候创建我们的第一个*可运行* Servlet^(⁷⁴) 了——一个端点，它将接受来自 Web 浏览器的请求并为其生成响应。代码并不长，但它向我们展示了如何接受来自浏览器的
    `GET` 请求（同样，这是最常见的请求类型），以及如何通过 Mustache 渲染输出（这是一项有用的技能，但对于本章来说并非至关重要）。


    ```

    package com.bsg6.chapter05;

    import com.samskivert.mustache.Mustache;

    import jakarta.servlet.annotation.WebServlet;

    import jakarta.servlet.http.HttpServlet;

    import jakarta.servlet.http.HttpServletRequest;

    import jakarta.servlet.http.HttpServletResponse;

    import java.io.IOException;

    import java.io.InputStreamReader;

    import java.util.Map;

    import java.util.Objects;

    @WebServlet(urlPatterns = "/hello1")

    public class FirstHelloServlet extends HttpServlet {

    @Override

    protected void doGet(HttpServletRequest request,

    HttpServletResponse response)

    throws IOException {

    try (var in = Objects.requireNonNull(this

    .getClass()

    .getResourceAsStream("/hello.html"))) {

    try (var reader = new InputStreamReader(in)) {

    var output = Mustache.compiler().compile(reader)

    .execute(Map.of("name", "world"));

    response.getWriter().println(output);

    }

    }

    }

    }

    清单 5-7

    chapter5-anno/src/main/java/com/bsg6/chapter05/FirstHelloServlet.java

    ```


    在这个 Servlet 中——通过注解标识，并在相对 URL 路径 `/hello1` 上可用——我们有很多处理导入的样板代码。我们还有一个 `doGet()`
    方法——用于处理 HTTP 上的 `GET` 请求——它所做的只是渲染一个 Mustache 模板（位于类路径下的 `/src/main/resources/hello.html`，见下一个清单），其中包含一个静态值为
    `"world"` 的变量 `name`。


    正如所承诺的，让我们看看我们的 Mustache 模板。


    ```


    Hello, {{ name }}


    Hello, {{ name }}!


    清单 5-8

    chapter05-anno/src/main/resources/hello.html

    ```


    在不深入过多细节的情况下，这个模板只是一个 HTML5 文档，其中包含一个名为 `name` 的值的占位符。渲染器（当然是 Mustache）会将 `{{
    name }}` 替换为传递给 `render()` 方法的 `name` 值（如果有的话）。


    这一切都很好，但有点抽象：我们如何*运行*它？我们怎样才能让我们的 Servlet 最终真正地向世界问好，而这个世界无疑一直在屏息以待？^(⁷⁵)


    当然，我们通过 Maven 和前面提到的 `jetty-maven-plugin` 插件来实现，方法是在顶层项目目录（包含 `chapter03` 和 `chapter05`
    的目录）中执行以下命令：


    ```

    $ mvn -pl chapter05-anno jetty:run

    清单 5-9

    运行 chapter05-anno 项目

    ```


    经过一番下载适当资源和编译 Servlet 的忙碌之后，Maven 会通知我们——除其他事项外——Jetty 正在 8080 端口上运行。我们的应用（目前就是这样）可在
    `http://localhost:8080/` 访问。


    ```

    [INFO] Started ServerConnector@5238896f{HTTP/1.1, (http/1.1)}{0.0.0.0:8080}

    [INFO] Started Server@236ae13d{STARTING}[11.0.15,sto=0] @3218ms

    [INFO] Automatic redeployment disabled, see ''mvn jetty:help'' for more redeployment
    options

    清单 5-10

    来自 chapter05-anno 项目的相关日志

    ```


    如果你还记得我们在 `FirstHelloServlet` 上使用的 `@WebServlet` 注解，你会记得我们有一个相对 URL 路径 `/hello1`。这被添加到
    Web 应用的根 URL 上——即前面提到的 `http://localhost:8080/`——从而为我们的 Servlet 提供了一个端点 `http://localhost:8080/hello1`。如果我们打开一个
    Web 浏览器并访问该地址，我们将沐浴在荣耀和赞美之中，因为浏览器窗口会胜利地显示 `Hello, world`，我们所有的梦想都将成真。


    ![](img/471370_2_En_5_Fig1_HTML.jpg)


    一个 Web 浏览器窗口的截图，显示了一个托管在 localhost:8080/hello1 的网页。页面的主要区域显示了文本 Hello, World!。


    图 5-1


    Hello, world!


    我们也可以使用命令行应用程序 `curl`^(⁷⁶) 进行测试，我们将在其他 Servlet 中使用它。


    ```

    $ curl http://localhost:8080/hello1


    Hello, world


    Hello, world!


    $

    清单 5-11

    来自应用的内容


    ```


    这很令人兴奋，但与其他“Hello, World”机制一样，它主要是确保所有基础架构都已就位，以便我们可以开始处理更有趣的部分。

