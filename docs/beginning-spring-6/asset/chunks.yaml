    \ and the method that does the actual work can *participate* in a transaction\
    \ without controlling it. We’ll see more of this pattern in later chapters, until\
    \ we start to let Spring manage it for us.\n\n```\npublic Artist findArtistById(int\
    \ id) throws SQLException {\ntry (Connection conn = dataSource.getConnection())\
    \ {\nreturn findArtistById(conn, id);\n}\n}\nprivate Artist findArtistById(Connection\
    \ conn, int id) {\nString sql = \"SELECT * FROM artists WHERE id=?\";\ntry (PreparedStatement\
    \ ps = conn.prepareStatement(sql)) {\nps.setInt(1, id);\ntry (ResultSet rs = ps.executeQuery())\
    \ {\nif (rs.next()) {\nreturn new Artist(id, rs.getString(\"name\"));\n} else\
    \ {\nthrow new ArtistNotFoundException(id +\n\" not found in artist database\"\
    );\n}\n}\n} catch (SQLException e) {\nthrow new ArtistNotFoundException(e);\n\
    }\n}\n```\n\n**Listing 7-15**  \n`chapter07/src/main/java/com/bsg6/chapter07/services/ArtistService.java`\
    \ excerpt\n\nWhat we see is a simple enough mechanism: if we call the `findArtistById(int)`,\
    \ we allocate a `Connection` with Java’s try-with-resources (which means that\
    \ when exiting the `try` block, the `Connection` will get closed properly without\
    \ us having to write explicit code for that purpose), and then, inside the `try`\
    \ block, delegate to an overloaded method of the same name, with that `Connection`.\n\
    \nThe overloaded method simply creates a `PreparedStatement` and uses it to query\
    \ the database for a matching `Artist`. If it finds one, it constructs an `Artist`\
    \ with the data from the query and returns it. If one isn’t found, it throws a\
    \ custom exception – `ArtistNotFoundException`."
  raw: '### Building an ArtistService


    Now we need to start populating our services – which means, as usual, creating
    a set of files. We need a way to represent artists – so we’ll create a class,
    `com.bsg5.chapter07.Artist`, logically enough. We’ll also want a service – a `Repository`,
    actually, something that actually does the work of interacting with a database
    – and we’ll call that one `com.bsg6.chapter07.ArtistRepository`. Lastly, we’ll
    need something to connect the service to the web layer – a controller – so, naturally,
    we’ll create a `com.bsg6.chapter07.ArtistController`.


    Note


    If you remember Chapter [3](#471370_2_En_3_Chapter.xhtml) well, you’ll recall
    that we used a `MusicService` class there that handled all the things we needed
    to do with our data model. Here, we’re splitting things out, as we said we were
    going to do back in Chapter [3](#471370_2_En_3_Chapter.xhtml). The reason: expediency.
    We chose to build the in-memory service in Chapter [3](#471370_2_En_3_Chapter.xhtml)
    as we did because it was far easier to have a single point of control for our
    data model, contained in a set of data structures. Here, we have an actual "system
    of record" – the database – and it makes sense for us to split the interactions
    out into smaller chunks, because we don’t have to worry about artists messing
    around with songs, in terms of our data management.


    The `Artist` class is a simple POJO, with everything that implies: a no-argument
    constructor (a default constructor), private fields, a constructor that will initialize
    the private fields, accessors and mutators,^([^(92)](#fn92)) an implementation
    of `equals()` and `hashCode()`, and a simple implementation of `toString()` as
    well. Almost every bit of it was generated by an IDE once the fields were put
    into the class; there’s nothing special or unique about this implementation at
    all. (The exceptions: `compareTo()`, which ignores case for the artist names,
    and `equals()` was modified to do the same thing.) It’s a long class, compared
    to what it does – it’s simply a container for artist references, after all – but
    that’s the beauty (or “beauty”) of Java.


    Note


    Naturally, we have options here. We chose a POJO for `Artist` for simplicity’s
    sake; we could have used a Java `record` class, for instance.


    ```

    package com.bsg6.chapter07;

    import java.util.Objects;

    import java.util.StringJoiner;

    public class Artist implements Comparable {

    private int id;

    private String name;

    public Artist() {

    }

    public Artist(int id, String name) {

    this.id = id;

    this.name = name;

    }

    public int getId() {

    return id;

    }

    public void setId(int id) {

    this.id = id;

    }

    public String getName() {

    return name;

    }

    public void setName(String name) {

    this.name = name;

    }

    @Override

    public String toString() {

    return new StringJoiner(", ",

    Artist.class.getSimpleName() + "[", "]")

    .add("id=" + id)

    .add("name=''" + name + "''")

    .toString();

    }

    @Override

    public boolean equals(Object o) {

    if (this == o) return true;

    if (!(o instanceof Artist)) return false;

    Artist artist = (Artist) o;

    return getId() == artist.getId() &&

    Objects.equals(

    getName().toLowerCase(),

    artist.getName().toLowerCase()

    );

    }

    @Override

    public int hashCode() {

    return Objects.hash(getId(), getName());

    }

    @Override

    public int compareTo(Artist o) {

    return o.getName().toLowerCase().compareTo(getName().toLowerCase());

    }

    }

    Listing 7-14

    chapter07/src/main/java/com/bsg6/chapter07/Artist.java

    ```


    The `ArtistService` needs a little more explanation.


    First, remember that we’re trying to implement the following services, as listed
    in Chapter [3](#471370_2_En_3_Chapter.xhtml) that relates to artists:


    *   Retrieve a list of artist names (for use in autocompletion operations)


    The implication is that the other four services we listed in Chapter [3](#471370_2_En_3_Chapter.xhtml)
    are related to songs instead, even though artists are involved, and this is indeed
    the case.


    The thing is, the other services also imply something about artists as well. Remember
    that we would want to record that a song exists, as well as vote for one, in our
    full set of requirements – these are song-related services, to be sure, but the
    songs also need to be related to artists. Therefore, we should add some basic
    services to our list of requirements:


    *   Get an artist by id.


    *   Get artists by name.


    *   Save an artist.


    The structure of each one of these functions looks a little odd, too. We actually
    will want two versions of each function: one that accepts just the parameters
    we need for the function (an `id` if we’re getting an `Artist` by `id`, for example)
    and another that adds a `Connection` object to those parameters. We’ll do this
    because we want to be able to compose our methods, and we want the composition
    to not require a unique database connection for every call. For example, saving
    an artist might look up the artist by name first; we want to use a single `Connection`
    for both operations, because that gives us the ability to use one database transaction
    instead of two. (We’ll see this done later on in this chapter.)


    Warning


    As with so many other things in this chapter, we’re …​ not actually using database
    transactions explicitly. We’ll get more into transaction isolation features in
    Chapter [8](#471370_2_En_8_Chapter.xhtml). In this chapter, though, maintaining
    transaction state would be distracting.


    Let’s take a look at the first two of our `ArtistService` methods, `findArtistById()`.
    These methods are simple enough: retrieve an `Artist` whose primary key matches
    the one supplied as an argument.


    We’re actually going to have *two* methods – one that accepts a `Connection` and
    the `id` and one that only requires an `id`. This is done by design so we can
    propagate transactions through the `Connection` object; the “simple” version of
    the method can start a transaction and control rollback, and the method that does
    the actual work can *participate* in a transaction without controlling it. We’ll
    see more of this pattern in later chapters, until we start to let Spring manage
    it for us.


    ```

    public Artist findArtistById(int id) throws SQLException {

    try (Connection conn = dataSource.getConnection()) {

    return findArtistById(conn, id);

    }

    }

    private Artist findArtistById(Connection conn, int id) {

    String sql = "SELECT * FROM artists WHERE id=?";

    try (PreparedStatement ps = conn.prepareStatement(sql)) {

    ps.setInt(1, id);

    try (ResultSet rs = ps.executeQuery()) {

    if (rs.next()) {

    return new Artist(id, rs.getString("name"));

    } else {

    throw new ArtistNotFoundException(id +

    " not found in artist database");

    }

    }

    } catch (SQLException e) {

    throw new ArtistNotFoundException(e);

    }

    }

    Listing 7-15

    chapter07/src/main/java/com/bsg6/chapter07/services/ArtistService.java excerpt

    ```


    What we see is a simple enough mechanism: if we call the `findArtistById(int)`,
    we allocate a `Connection` with Java’s try-with-resources (which means that when
    exiting the `try` block, the `Connection` will get closed properly without us
    having to write explicit code for that purpose), and then, inside the `try` block,
    delegate to an overloaded method of the same name, with that `Connection`.


    The overloaded method simply creates a `PreparedStatement` and uses it to query
    the database for a matching `Artist`. If it finds one, it constructs an `Artist`
    with the data from the query and returns it. If one isn’t found, it throws a custom
    exception – `ArtistNotFoundException`.'
