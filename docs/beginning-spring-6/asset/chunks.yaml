- fmt: "### Wiring Components Together with `@Autowired`\n\nIn our first configuration,\
    \ we had a single component (a `MusicService`), and our test simply made sure\
    \ the component scanning was working and that our component was able to be injected\
    \ into our test.\n\nIn our next configuration, we’re going to actually have two\
    \ components, and wire them together. We’re going to add a good bit of code here,\
    \ too, to have a repeatable set of tests that we can apply to multiple configurations;\
    \ when we reach the end of the chapter, we can use this to test nearly all of\
    \ our implementations in series.^([^(51)](#fn51))\n\nWe’re going to create another\
    \ instance of `MusicService`, one that looks almost exactly like our `MusicService1`,\
    \ except that it’s going to override `transformArtist()` and `transformSong()`\
    \ such that they call an injected `Normalizer` instance. We’ll also need to create\
    \ a concrete type to serve as a `Normalizer` – because we declared it as an interface,\
    \ so it’s non-instantiable in and of itself. We also need another configuration\
    \ file, and two more classes: one will be our base test class (incorporating tests\
    \ we will want to be able to apply to *every* `MusicService`), and the other will\
    \ be our actual executable test, which delegates to our base test class.\n\nOur\
    \ `MusicService2` class is very simple:\n\n```\npackage com.bsg6.chapter03.mem02;\n\
    import com.bsg6.chapter03.AbstractMusicService;\nimport com.bsg6.chapter03.Normalizer;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Component;\n\
    @Component\npublic class MusicService2 extends AbstractMusicService {\n@Autowired\n\
    Normalizer normalizer;\n@Override\nprotected String transformArtist(String input)\
    \ {\nreturn normalizer.transform(input);\n}\n@Override\nprotected String transformSong(String\
    \ input) {\nreturn normalizer.transform(input);\n}\n}\nListing 3-13\nchapter03/src/main/java/com/bsg6/chapter03/mem02/MusicService2.java\n\
    ```\n\nOur `Normalizer` is a simple concrete realization of our `Normalizer` interface;\
    \ the primary values it conveys are in that it can be marked as a `@Component`,\
    \ and it can be instantiated. Since we have a default method body in `Normalizer`,\
    \ we don’t even have to create the method in our `SimpleNormalizer`, unless we\
    \ want it to do more than simply trim whitespace. (At this point in our application,\
    \ we’re not concerned about the actual functionality; we’re demonstrating component\
    \ wiring).\n\n```\npackage com.bsg6.chapter03.mem02;\nimport com.bsg6.chapter03.Normalizer;\n\
    import org.springframework.stereotype.Component;\n@Component\npublic class SimpleNormalizer\
    \ implements Normalizer {\n/* inherits default transform() method from interface\
    \ */\n}\nListing 3-14\nchapter03/src/main/java/com/bsg6/chapter03/mem02/SimpleNormalizer.java\n\
    ```\n\nLastly, our configuration file, `config-02.xml`.\n\n```\n\nListing 3-15\n\
    chapter03/src/test/resources/config-02.xml\n```\n\nNow we get to the “fun” part\
    \ of the code. We’re going to build a test class that contains a series of methods\
    \ usable by a test. They won’t be invoked directly by TestNG, but they’re designed\
    \ to be called from test methods that *are* invoked by the test framework.\n\n\
    Why are we doing it this way? Primarily, it’s because a test class has a single\
    \ application context.^([^(52)](#fn52)) What we’d like to do is enable ourselves\
    \ to eventually load a set of configurations on demand and run each test on each\
    \ individual configuration; this way, we repeat ourselves for the delegation call\
    \ but little else.\n\nThis class is designed to be used through composition –\
    \ that is, it’s designed to be included in an actual class with the tests. This\
    \ may make you think that it’s a good candidate to be a Spring bean – and you’re\
    \ right, it is. We’ll show this in practice in a later section of this chapter.\n\
    \nLet’s take a look at our `MusicServiceTests` class, and then we’ll step through\
    \ some of the details of what it provides. After we do that, we’ll show a test\
    \ that actually uses this class – and the good news is that the actual test class\
    \ is far, far shorter than the `MusicServiceTests` class.\n\n```\npackage com.bsg6.chapter03;\n\
    import com.bsg6.chapter03.model.Song;\nimport java.util.List;\nimport java.util.function.Consumer;\n\
    import static org.testng.Assert.assertEquals;\npublic class MusicServiceTests\
    \ {\nprivate Object[][] model = new Object[][]{\n{\"Threadbare Loaf\", \"Someone\
    \ Stole the Flour\", 4},\n{\"Threadbare Loaf\", \"What Happened To Our First CD?\"\
    , 17},\n{\"Therapy Zeppelin\", \"Medium\", 4},\n{\"Clancy in Silt\", \"Igneous\"\
    , 5}\n};\nvoid iterateOverModel(Consumer consumer) {\nfor (Object[] data : model)\
    \ {\nconsumer.accept(data);\n}\n}\nvoid populateService(MusicService service)\
    \ {\niterateOverModel(data -> {\nfor (int i = 0; i \nassertEquals(\nservice.getSong((String)\
    \ data[0],\n(String) data[1]).getVotes(),\n((Integer) data[2]).intValue()\n));\n\
    }\nvoid testSongsForArtist(MusicService service) {\nreset(service);\npopulateService(service);\n\
    List songs = service.getSongsForArtist(\"Threadbare Loaf\");\nassertEquals(songs.size(),\
    \ 2);\nassertEquals(songs.get(0).getName(), \"What Happened To Our First CD?\"\
    );\nassertEquals(songs.get(0).getVotes(), 17);\nassertEquals(songs.get(1).getName(),\
    \ \"Someone Stole the Flour\");\nassertEquals(songs.get(1).getVotes(), 4);\n}\n\
    void testMatchingArtistNames(MusicService service) {\nreset(service);\npopulateService(service);\n\
    List names = service.getMatchingArtistNames(\"Th\");\nassertEquals(names.size(),\
    \ 2);\nassertEquals(names.get(0), \"Therapy Zeppelin\");\nassertEquals(names.get(1),\
    \ \"Threadbare Loaf\");\n}\nvoid testMatchingSongNamesForArtist(MusicService service)\
    \ {\nreset(service);\npopulateService(service);\nList names = service.getMatchingSongNamesForArtist(\n\
    \"Threadbare Loaf\", \"W\"\n);\nassertEquals(names.size(), 1);\nassertEquals(names.get(0),\
    \ \"What Happened To Our First CD?\");\n}\n}\nListing 3-16\nchapter03/src/main/test/com/bsg6/chapter03/MusicServiceTests.java\n\
    ```\n\nThe first bit worth noticing in this class is the `Object[][] model`. This\
    \ may surprise some readers, but this is our starting data model for the tests.\
    \ Each row represents an artist’s song, and the number of times users have indicated\
    \ that this song is the artist’s ideal introductory song. Thus, we have three\
    \ artists represented, with four songs; two of the artists have “Th” at the beginning\
    \ of the names, and one of the artists has two songs represented. This allows\
    \ us to test name matching (for autocompletion) as well as allowing us to test\
    \ the sorting of songs based on votes.\n\nThe first method in the class is `iterateOverModel()`.\
    \ This method is designed to allow us to execute a simple method over every row\
    \ in the `model`; it accepts a `Consumer<Object[]>`, which means a lambda that\
    \ expects an `Object[]`, and calls the lambda for every row; nothing more, nothing\
    \ less. It can be seen being used in the next method in this class, `populateService()`.\n\
    \nThe next method – again, `populateService()` – creates a lambda that issues\
    \ a single vote for a song and calls that lambda multiple times for every row\
    \ in our `model`. The model has an `Integer` as the third “column,” and `populateService()`\
    \ calls `voteForSong()` for each song as many times as that column indicates.\
    \ In other words, if we have an artist of “Threadbare Loaf” and a song title of\
    \ “What Happened To Our First CD?” with a third column of 17 – and this may surprise\
    \ you, but we do have those things – `populateService` will call `voteForSong()`\
    \ seventeen times for that particular song. This method is primarily meant as\
    \ a utility method, not something to serve as a test itself."
  raw: "### Wiring Components Together with **@Autowired**\n\nIn our first configuration,\
    \ we had a single component (a `MusicService`), and our test simply made sure\
    \ the component scanning was working and that our component was able to be injected\
    \ into our test.\n\nIn our next configuration, we’re going to actually have two\
    \ components, and wire them together. We’re going to add a good bit of code here,\
    \ too, to have a repeatable set of tests that we can apply to multiple configurations;\
    \ when we reach the end of the chapter, we can use this to test nearly all of\
    \ our implementations in series.^([^(51)](#fn51))\n\nWe’re going to create another\
    \ instance of `MusicService`, one that looks almost exactly like our `MusicService1`,\
    \ except that it’s going to override `transformArtist()` and `transformSong()`\
    \ such that they call an injected `Normalizer` instance. We’ll also need to create\
    \ a concrete type to serve as a `Normalizer` – because we declared it as an interface,\
    \ so it’s non-instantiable in and of itself. We also need another configuration\
    \ file, and two more classes: one will be our base test class (incorporating tests\
    \ we will want to be able to apply to *every* `MusicService`), and the other will\
    \ be our actual executable test, which delegates to our base test class.\n\nOur\
    \ `MusicService2` class is very simple:\n\n```\npackage com.bsg6.chapter03.mem02;\n\
    import com.bsg6.chapter03.AbstractMusicService;\nimport com.bsg6.chapter03.Normalizer;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Component;\n\
    @Component\npublic class MusicService2 extends AbstractMusicService {\n@Autowired\n\
    Normalizer normalizer;\n@Override\nprotected String transformArtist(String input)\
    \ {\nreturn normalizer.transform(input);\n}\n@Override\nprotected String transformSong(String\
    \ input) {\nreturn normalizer.transform(input);\n}\n}\nListing 3-13\nchapter03/src/main/java/com/bsg6/chapter03/mem02/MusicService2.java\n\
    ```\n\nOur `Normalizer` is a simple concrete realization of our `Normalizer` interface;\
    \ the primary values it conveys are in that it can be marked as a `@Component`,\
    \ and it can be instantiated. Since we have a default method body in `Normalizer`,\
    \ we don’t even have to create the method in our `SimpleNormalizer`, unless we\
    \ want it to do more than simply trim whitespace. (At this point in our application,\
    \ we’re not concerned about the actual functionality; we’re demonstrating component\
    \ wiring).\n\n```\npackage com.bsg6.chapter03.mem02;\nimport com.bsg6.chapter03.Normalizer;\n\
    import org.springframework.stereotype.Component;\n@Component\npublic class SimpleNormalizer\
    \ implements Normalizer {\n/* inherits default transform() method from interface\
    \ */\n}\nListing 3-14\nchapter03/src/main/java/com/bsg6/chapter03/mem02/SimpleNormalizer.java\n\
    ```\n\nLastly, our configuration file, `config-02.xml`.\n\n```\n\nListing 3-15\n\
    chapter03/src/test/resources/config-02.xml\n```\n\nNow we get to the “fun” part\
    \ of the code. We’re going to build a test class that contains a series of methods\
    \ usable by a test. They won’t be invoked directly by TestNG, but they’re designed\
    \ to be called from test methods that *are* invoked by the test framework.\n\n\
    Why are we doing it this way? Primarily, it’s because a test class has a single\
    \ application context.^([^(52)](#fn52)) What we’d like to do is enable ourselves\
    \ to eventually load a set of configurations on demand and run each test on each\
    \ individual configuration; this way, we repeat ourselves for the delegation call\
    \ but little else.\n\nThis class is designed to be used through composition –\
    \ that is, it’s designed to be included in an actual class with the tests. This\
    \ may make you think that it’s a good candidate to be a Spring bean – and you’re\
    \ right, it is. We’ll show this in practice in a later section of this chapter.\n\
    \nLet’s take a look at our `MusicServiceTests` class, and then we’ll step through\
    \ some of the details of what it provides. After we do that, we’ll show a test\
    \ that actually uses this class – and the good news is that the actual test class\
    \ is far, far shorter than the `MusicServiceTests` class.\n\n```\npackage com.bsg6.chapter03;\n\
    import com.bsg6.chapter03.model.Song;\nimport java.util.List;\nimport java.util.function.Consumer;\n\
    import static org.testng.Assert.assertEquals;\npublic class MusicServiceTests\
    \ {\nprivate Object[][] model = new Object[][]{\n{\"Threadbare Loaf\", \"Someone\
    \ Stole the Flour\", 4},\n{\"Threadbare Loaf\", \"What Happened To Our First CD?\"\
    , 17},\n{\"Therapy Zeppelin\", \"Medium\", 4},\n{\"Clancy in Silt\", \"Igneous\"\
    , 5}\n};\nvoid iterateOverModel(Consumer consumer) {\nfor (Object[] data : model)\
    \ {\nconsumer.accept(data);\n}\n}\nvoid populateService(MusicService service)\
    \ {\niterateOverModel(data -> {\nfor (int i = 0; i \nassertEquals(\nservice.getSong((String)\
    \ data[0],\n(String) data[1]).getVotes(),\n((Integer) data[2]).intValue()\n));\n\
    }\nvoid testSongsForArtist(MusicService service) {\nreset(service);\npopulateService(service);\n\
    List songs = service.getSongsForArtist(\"Threadbare Loaf\");\nassertEquals(songs.size(),\
    \ 2);\nassertEquals(songs.get(0).getName(), \"What Happened To Our First CD?\"\
    );\nassertEquals(songs.get(0).getVotes(), 17);\nassertEquals(songs.get(1).getName(),\
    \ \"Someone Stole the Flour\");\nassertEquals(songs.get(1).getVotes(), 4);\n}\n\
    void testMatchingArtistNames(MusicService service) {\nreset(service);\npopulateService(service);\n\
    List names = service.getMatchingArtistNames(\"Th\");\nassertEquals(names.size(),\
    \ 2);\nassertEquals(names.get(0), \"Therapy Zeppelin\");\nassertEquals(names.get(1),\
    \ \"Threadbare Loaf\");\n}\nvoid testMatchingSongNamesForArtist(MusicService service)\
    \ {\nreset(service);\npopulateService(service);\nList names = service.getMatchingSongNamesForArtist(\n\
    \"Threadbare Loaf\", \"W\"\n);\nassertEquals(names.size(), 1);\nassertEquals(names.get(0),\
    \ \"What Happened To Our First CD?\");\n}\n}\nListing 3-16\nchapter03/src/main/test/com/bsg6/chapter03/MusicServiceTests.java\n\
    ```\n\nThe first bit worth noticing in this class is the `Object[][] model`. This\
    \ may surprise some readers, but this is our starting data model for the tests.\
    \ Each row represents an artist’s song, and the number of times users have indicated\
    \ that this song is the artist’s ideal introductory song. Thus, we have three\
    \ artists represented, with four songs; two of the artists have “Th” at the beginning\
    \ of the names, and one of the artists has two songs represented. This allows\
    \ us to test name matching (for autocompletion) as well as allowing us to test\
    \ the sorting of songs based on votes.\n\nThe first method in the class is `iterateOverModel()`.\
    \ This method is designed to allow us to execute a simple method over every row\
    \ in the `model`; it accepts a `Consumer<Object[]>`, which means a lambda that\
    \ expects an `Object[]`, and calls the lambda for every row; nothing more, nothing\
    \ less. It can be seen being used in the next method in this class, `populateService()`.\n\
    \nThe next method – again, `populateService()` – creates a lambda that issues\
    \ a single vote for a song and calls that lambda multiple times for every row\
    \ in our `model`. The model has an `Integer` as the third “column,” and `populateService()`\
    \ calls `voteForSong()` for each song as many times as that column indicates.\
    \ In other words, if we have an artist of “Threadbare Loaf” and a song title of\
    \ “What Happened To Our First CD?” with a third column of 17 – and this may surprise\
    \ you, but we do have those things – `populateService` will call `voteForSong()`\
    \ seventeen times for that particular song. This method is primarily meant as\
    \ a utility method, not something to serve as a test itself."
  trans: "\n### 使用 **@Autowired** 连接组件\n\n在第一个配置中，我们只有一个组件（`MusicService`），测试仅确保组件扫描正常工作，并且该组件能够被注入到测试中。\n\
    \n在下一个配置中，我们将实际拥有两个组件，并将它们连接在一起。我们还将在此处添加大量代码，以便拥有一组可重复的测试，这些测试可以应用于多个配置；当本章结束时，我们可以使用这些测试来连续测试几乎所有实现。^(⁵¹)\n\
    \n我们将创建另一个 `MusicService` 实例，它看起来几乎与我们的 `MusicService1` 完全相同，不同之处在于它将重写 `transformArtist()`\
    \ 和 `transformSong()` 方法，使它们调用一个注入的 `Normalizer` 实例。我们还需要创建一个具体类型作为 `Normalizer`——因为我们将其声明为接口，所以它本身是不可实例化的。我们还需要另一个配置文件，以及另外两个类：一个将是我们的基础测试类（包含我们希望能够应用于*每个*\
    \ `MusicService` 的测试），另一个将是我们的实际可执行测试，它委托给我们的基础测试类。\n\n我们的 `MusicService2` 类非常简单：\n\
    \n```\npackage com.bsg6.chapter03.mem02;\nimport com.bsg6.chapter03.AbstractMusicService;\n\
    import com.bsg6.chapter03.Normalizer;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.stereotype.Component;\n@Component\npublic class MusicService2\
    \ extends AbstractMusicService {\n@Autowired\nNormalizer normalizer;\n@Override\n\
    protected String transformArtist(String input) {\nreturn normalizer.transform(input);\n\
    }\n@Override\nprotected String transformSong(String input) {\nreturn normalizer.transform(input);\n\
    }\n}\n清单 3-13\nchapter03/src/main/java/com/bsg6/chapter03/mem02/MusicService2.java\n\
    ```\n\n我们的 `Normalizer` 是 `Normalizer` 接口的一个简单具体实现；其主要价值在于它可以被标记为 `@Component`，并且可以被实例化。由于我们在\
    \ `Normalizer` 中有一个默认方法体，我们甚至不必在 `SimpleNormalizer` 中创建该方法，除非我们希望它执行比简单修剪空白更多的操作。（在应用程序的这个阶段，我们不关心实际功能；我们只是在演示组件连接）。\n\
    \n```\npackage com.bsg6.chapter03.mem02;\nimport com.bsg6.chapter03.Normalizer;\n\
    import org.springframework.stereotype.Component;\n@Component\npublic class SimpleNormalizer\
    \ implements Normalizer {\n/* 继承自接口的默认 transform() 方法 */\n}\n清单 3-14\nchapter03/src/main/java/com/bsg6/chapter03/mem02/SimpleNormalizer.java\n\
    ```\n\n最后，是我们的配置文件 `config-02.xml`。\n\n```\n\n清单 3-15\nchapter03/src/test/resources/config-02.xml\n\
    ```\n\n现在，我们进入代码的“有趣”部分。我们将构建一个测试类，其中包含一系列可供测试使用的方法。这些方法不会由 TestNG 直接调用，但它们被设计为由*被*测试框架调用的测试方法调用。\n\
    \n我们为什么要这样做？主要原因是，一个测试类只有一个应用程序上下文。^(⁵²) 我们希望做的是，最终能够按需加载一组配置，并在每个单独的配置上运行每个测试；这样，除了委托调用之外，我们几乎不需要重复其他内容。\n\
    \n这个类被设计为通过组合来使用——也就是说，它被设计为包含在一个实际的测试类中。这可能会让你认为它是成为 Spring bean 的绝佳候选——没错，确实如此。我们将在本章后面部分展示这一点。\n\
    \n让我们看看我们的 `MusicServiceTests` 类，然后逐步了解它提供的一些细节。之后，我们将展示一个实际使用这个类的测试——好消息是，实际的测试类比\
    \ `MusicServiceTests` 类要短得多。\n\n```\npackage com.bsg6.chapter03;\nimport com.bsg6.chapter03.model.Song;\n\
    import java.util.List;\nimport java.util.function.Consumer;\nimport static org.testng.Assert.assertEquals;\n\
    public class MusicServiceTests {\nprivate Object[][] model = new Object[][]{\n\
    {\"Threadbare Loaf\", \"Someone Stole the Flour\", 4},\n{\"Threadbare Loaf\",\
    \ \"What Happened To Our First CD?\", 17},\n{\"Therapy Zeppelin\", \"Medium\"\
    , 4},\n{\"Clancy in Silt\", \"Igneous\", 5}\n};\nvoid iterateOverModel(Consumer\
    \ consumer) {\nfor (Object[] data : model) {\nconsumer.accept(data);\n}\n}\nvoid\
    \ populateService(MusicService service) {\niterateOverModel(data -> {\nfor (int\
    \ i = 0; i \nassertEquals(\nservice.getSong((String) data[0],\n(String) data[1]).getVotes(),\n\
    ((Integer) data[2]).intValue()\n));\n}\nvoid testSongsForArtist(MusicService service)\
    \ {\nreset(service);\npopulateService(service);\nList songs = service.getSongsForArtist(\"\
    Threadbare Loaf\");\nassertEquals(songs.size(), 2);\nassertEquals(songs.get(0).getName(),\
    \ \"What Happened To Our First CD?\");\nassertEquals(songs.get(0).getVotes(),\
    \ 17);\nassertEquals(songs.get(1).getName(), \"Someone Stole the Flour\");\nassertEquals(songs.get(1).getVotes(),\
    \ 4);\n}\nvoid testMatchingArtistNames(MusicService service) {\nreset(service);\n\
    populateService(service);\nList names = service.getMatchingArtistNames(\"Th\"\
    );\nassertEquals(names.size(), 2);\nassertEquals(names.get(0), \"Therapy Zeppelin\"\
    );\nassertEquals(names.get(1), \"Threadbare Loaf\");\n}\nvoid testMatchingSongNamesForArtist(MusicService\
    \ service) {\nreset(service);\npopulateService(service);\nList names = service.getMatchingSongNamesForArtist(\n\
    \"Threadbare Loaf\", \"W\"\n);\nassertEquals(names.size(), 1);\nassertEquals(names.get(0),\
    \ \"What Happened To Our First CD?\");\n}\n}\n清单 3-16\nchapter03/src/main/test/com/bsg6/chapter03/MusicServiceTests.java\n\
    ```\n\n这个类中第一个值得注意的部分是 `Object[][] model`。这可能会让一些读者感到惊讶，但这是我们的测试起始数据模型。每一行代表一位艺术家的歌曲，以及用户表示这首歌是该艺术家理想入门歌曲的次数。因此，我们有三组艺术家，共四首歌曲；其中两位艺术家的名字以“Th”开头，一位艺术家有两首歌曲。这使我们能够测试名称匹配（用于自动补全），以及测试基于投票数的歌曲排序。\n\
    \n该类中的第一个方法是 `iterateOverModel()`。该方法旨在让我们对 `model` 中的每一行执行一个简单的方法；它接受一个 `Consumer<Object[]>`，这意味着一个期望接收\
    \ `Object[]` 的 lambda，并为每一行调用该 lambda；仅此而已。可以看到，它在该类的下一个方法 `populateService()`\
    \ 中被使用。\n\n下一个方法——同样是 `populateService()`——创建了一个 lambda，该 lambda 为一首歌投出一票，并对 `model`\
    \ 中的每一行多次调用该 lambda。模型将 `Integer` 作为第三“列”，而 `populateService()` 会为每首歌调用 `voteForSong()`，调用次数与该列指示的次数相同。换句话说，如果我们有一位艺术家“Threadbare\
    \ Loaf”和一首歌名“What Happened To Our First CD?”，且第三列为 17——这可能会让你惊讶，但我们确实有这些数据——`populateService`\
    \ 将为那首特定的歌调用 `voteForSong()` 十七次。此方法主要用作工具方法，而不是作为测试本身。\n"
- fmt: "在`populateService()`之后，我们有另一个实用方法`reset()`。该方法确保`Service`被标记为`Resettable`，如果不是，则抛出异常；在本章中，我们所有的服务**都是**可重置的，如果不是，我们希望知道原因。假设它们是可重置的，那么该方法只是委托给服务的`reset()`方法，该方法**应该**清空服务的数据模型。\n\
    \n之后，我们有四个设计用于委托的方法——`testSongVoting()`、`testSongsForArtist()`、`testMatchingArtistNames()`和`testMatchingSongsForArtist()`。这些方法都接受一个`Service`引用，并通常使用我们已知的模型数据来执行`Service`。`testSongVoting()`方法测试我们模型中每首歌曲的投票情况。\n\
    \n然而，正如我们所说，这个类实际上不能作为测试使用。我们希望编写一个测试，委托给`MusicServiceTests`的实例来实际执行代表我们测试的方法。\n\
    \n```java\npackage com.bsg6.chapter03;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.testng.AbstractTestNGSpringContextTests;\n\
    import org.testng.annotations.Test;\n@ContextConfiguration(locations = \"/config-02.xml\"\
    )\npublic class TestMusicService2 extends AbstractTestNGSpringContextTests {\n\
    @Autowired\nMusicService service;\nMusicServiceTests tests = new MusicServiceTests();\n\
    @Test\npublic void testSongVoting() {\ntests.testSongVoting(service);\n}\n@Test\n\
    public void testGetMatchingArtistNames() {\ntests.testMatchingArtistNames(service);\n\
    }\n@Test\npublic void testGetSongsForArtist() {\ntests.testSongsForArtist(service);\n\
    }\n@Test\npublic void testMatchingSongNamesForArtist() {\ntests.testMatchingSongNamesForArtist(service);\n\
    }\n}\nListing 3-17\nchapter03/src/main/test/com/bsg6/chapter03/TestMusicService2.java\n\
    ```\n\n最后，我们有了一个实际可执行的测试！^([^(53)](#fn53)) 这个测试与`TestMusicService1`具有相同的脚手架，只是配置文件不同。它使用注入的`MusicService`并实例化`MusicServiceTests`的本地副本；然后它有四个测试方法，每个方法都委托给`MusicServiceTests`中同名的方法。这非常简单。它**还**设法测试了`MusicService2`及其超类`AbstractMusicService`中的*每一行代码*，唯一的例外是`AbstractMusicService`中被`MusicService2`覆盖的方法。\n\
    \n> **注意**\n> \n> 每一行代码都被覆盖是件好事，尽管所有这些类都是测试类，代码本身并*不*重要，但不要错误地认为100%的代码覆盖率是“最终目标”。我们达到了100%的覆盖率，但我们没有测试任何边界情况，也没有测试任何失败条件。再次强调：100%的覆盖率是好的，但它是一个糟糕的目标；你应该致力于满足规范的所有要求。只是碰巧我们的“规范”中没有任何错误条件可言。\n\
    \n## 使用`@Qualifier`和Bean名称选择组件\n\n在上一节中，我们将一个标准化器注入到`MusicService2`中，并用它来标准化艺术家名称和歌曲名称。但这假设两组名称都以相同的方式标准化。如果它们不是呢？\n\
    \n在这种情况下，我们需要使用两种不同类型的标准化器。然后我们面临一个不同类型的问题：如何告诉Spring使用哪个标准化器，以及在哪里使用？\n\n事实证明，我们有几种不同的选择。由于注入是基于类型的，我们可以简单地创建新的标记接口，比如扩展`Normalizer`的`SongNameNormalizer`。然后我们会有类似`@Autowired\
    \ SongNameNormalizer songNameNormalizer`的声明，这样就完成了；Spring会查看它管理的组件，找到一个可以赋值给`songNameNormalizer`的组件，然后完成注入。\n\
    \n我们也可以使用组件名称，而不是组件的可赋值类型。`@Component`注解有一个可选的值，用作Spring的组件名称。默认的组件名称是类名本身，首字母小写（因此，`MusicService1`被赋予组件名称`musicService1`），但如果使用`@Component(\"\
    bluePin\")`，那么该组件就被命名为`bluePin`。\n\n如果自动装配的引用使用与Spring bean匹配的名称——也就是说，我们有`MusicService\
    \ bluePin`——那么Spring会注入一个具有该名称的bean。\n\n然而，当我们的代码中出现两种不同情况之一时，这并没有帮助。如果我们的变量引用与组件名称不匹配，*或者*我们要注入两个相同类型的实例，Spring仍然不知道如何选择要注入的实例。\n\
    \n我们可以通过使用`@Qualifier`注解来帮助Spring决定注入哪个组件，该注解需要一个与你想分配的Spring bean名称相对应的值。\n\n\
