    `songs`表的外键特意通过外键级联更新——因此如果我们更新`artist`记录的`id`字段，它应该会传播到`songs`表。我们有意不级联删除；想象一下，如果我们有一个艺术家录制了四十首歌曲。删除该艺术家也会删除他们所有的歌曲数据。不传播删除意味着我们必须**显式地**删除与该艺术家关联的`songs`记录，然后才能删除该艺术家的数据。


