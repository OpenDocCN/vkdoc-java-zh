- fmt: '# Adding a Spring Context for Our Servlets


    There are a few ways to use Spring in Servlets: we could use a Spring module like
    Spring Web (which has a Servlet that serves as a dispatcher to service objects
    written with Spring in mind, and which we’re actually including as a dependency
    here), or Spring Boot (which actually has its own Servlet engine embedded), or
    we could have a web application instantiate a Spring context and access it as
    a resource from within traditional Servlets. Most Spring experts would probably
    lean toward Spring Boot, with Boot’s trivial development and deployment model,
    but Spring Boot is a subject for Chapter 7, not Chapter 5, and Spring Web is a
    subject for later chapters (Chapter 6) as well… which means we get to get our
    feet wet with more basic approaches.


    When we look at Spring Boot and Spring Web (again, Chapters 6 and 7, respectively)
    we’ll find simpler ways to accomplish what we’ll see here – but this chapter will
    give us insight into what’s happening behind the scenes in the later chapters,
    too.


    So now that we’ve talked about this being a “basic approach,” and so forth – what
    **is** the approach?


    We’re going to add a `ServletContextListener` to our two web applications, and
    in this `ServletContextListener` we’ll instantiate a Spring `WebApplicationContext`
    and store it in the application scope for the entire web application. When we
    need resources from the Spring context, we’ll grab then from the `ServletContext`
    – somewhat like the traditional JNDI model in Jakarta EE, as we saw in our Servlets
    in the `common` module. (When we look at Spring Web and Spring Boot, we’ll see
    easy ways to autowire dependencies.)


    Let’s look at the `ServletContextListener`, which we’re going to name `AnnotationContextListener`.


    ```java

    package com.bsg6.chapter05;

    import jakarta.servlet.ServletContextEvent;

    import jakarta.servlet.ServletContextListener;

    import jakarta.servlet.annotation.WebListener;

    import org.springframework.context.ApplicationContext;

    import org.springframework.web.context.

    support.AnnotationConfigWebApplicationContext;

    @WebListener

    public class AnnotationContextListener implements ServletContextListener {

    @Override

    public void contextInitialized(ServletContextEvent event) {

    ApplicationContext context = buildAnnotationContext();

    event.getServletContext().setAttribute("context", context);

    }

    private ApplicationContext buildAnnotationContext() {

    AnnotationConfigWebApplicationContext context =

    new AnnotationConfigWebApplicationContext();

    context.scan("com.bsg6.chapter03.mem03");

    context.refresh();

    return context;

    }

    }

    ```


    For the most part, this class is very simple. It uses `@WebListener` on the entire
    class – which tells the Servlet container to use an instance of this class **where
    appropriate** – and, given that it implements `ServletContextListener`, it will
    receive context-related events. There are only two: `contextInitialized` (called
    when the application is started) and `contextDestroyed` (called when the application
    is destroyed, if possible).


    The `ServletContextListener` interface has default implementations for both `contextInitialized()`
    and `contextDestroyed()`, so we don’t have to implement anything unless we actually
    have operations to perform. We don’t have anything to do if the Servlet context
    stops, so we’re not going to bother with an implementation of `contextDestroyed()`.
    However, we want to create our Spring context in the `contextInitialized` event.


    The `AnnotationConfigWebApplicationContext`, as its name implies, provides us
    the ability to scan for available components, as with the `<context:component-scan
    />` tag we’ve seen in earlier chapters. With this class, we can programmatically
    tell the Spring context which packages to scan for available annotations, which
    is exactly what the `buildAnnotationContext()` method does. Once we have the `AnnotationConfigWebApplicationContext`,
    we need to tell it where to look to find candidate classes – and in this case,
    we’re reusing one of the Chapter 3 memory-based implementations, so we provide
    it a single package name, `com.bsg6.chapter03.mem03`. This method actually accepts
    an array of package names, and it actually takes a variable number of arguments;
    it just so happens that we only need to scan one package for our purposes here,
    but we could have provided a comma-delimited list of as many packages as we needed
    scanned.


    Note that this isn’t quite the same as a Java configuration. If we were using
    a Java configuration instead of building our configuration, we could have marked
    with it `@ComponentScan` – which would have done the same thing as we’re doing
    here with `AnnotationConfigWebApplicationContext` and `<context:component-scan
    />`. We’ll see it used in later chapters, when we actually do switch over to using
    Java-based configuration.


    It’s usually wise to scan *exactly* what you need, rather than adding entire trees
    of packages. Scanning is fairly slow; you won’t do it often (only on application
    startup), but it’s still fairly heavy on the Java runtime. If you don’t have a
    lot of classes you’re actually interested in, consider programmatic configuration
    with a class annotated with `@Configuration` rather than scanning packages. We’re
    scanning here mostly because it’s fewer lines of code than the Java configuration,
    which requires a class with its own boilerplate.


    However, simply telling the context where it **should** scan doesn’t make it actually
    perform the scan. That’s the role of `context.refresh()`. After we’ve done **that**,
    we get the `ServletContext` from the `ServletContextEvent`, and store the Spring
    context into the Servlet context as a named attribute; we name it “context” for
    simplicity. Once we’ve done that, any executable code in the entire web application
    can grab the Spring context from the Servlet context, by name.


    When we use the Spring context in this manner (with an explicit load of the Spring
    context into the Servlet context), we don’t get autowiring of Spring resources
    into our Servlets. We get them from the Spring context instead. (The beans that
    are retrieved **from** the Spring context, however, will have autowiring in place
    – and the particular `MusicService` we use requires and demonstrates this.) Since
    we have full control over instance lifecycle (see Chapter 4), we have fine-grained
    control over what gets created, and when.


    All that’s incredibly useful; we can now grab our `MusicService` from Spring,
    as shown in the Servlets from the `common` module, but how do we demonstrate it?


    By doing the same thing we did with our “Hello, World” Servlet, of course.


    Our `chapter05-anno` application includes the `chapter05-api` module, as we’ve
    shown (and mentioned multiple times, in case readers weren’t paying attention).
    When we include the `chapter05-api` module, those Servlets are automatically set
    to respond to the URL patterns specified by the `@WebServlet` annotation – which
    means `/vote` and `/songs`. That means when we run our `anno` application with
    `jetty:run`, those Servlets are already active – although they aren’t going to
    work correctly unless we have our `ServletContextListener` in place.


    We can test this by using a command line application such as `curl`. After starting
    the application, issue a `curl` command.'
  raw: '#### Adding a Spring Context for Our Servlets


    There are a few ways to use Spring in Servlets: we could use a Spring module like
    Spring Web (which has a Servlet that serves as a dispatcher to service objects
    written with Spring in mind,^([^(77)](#fn77)) and which we’re actually including
    as a dependency here), or Spring Boot (which actually has its own Servlet engine
    embedded), or we could have a web application instantiate a Spring context and
    access it as a resource from within traditional Servlets. Most Spring experts
    would probably lean toward Spring Boot, with Boot’s trivial development and deployment
    model, but Spring Boot is a subject for Chapter [7](#471370_2_En_7_Chapter.xhtml),
    not Chapter [5](#471370_2_En_5_Chapter.xhtml), and Spring Web is a subject for
    later chapters (Chapter [6](#471370_2_En_6_Chapter.xhtml)) as well…​ which means
    we get to get our feet wet with more basic approaches.


    When we look at Spring Boot and Spring Web (again, Chapters [6](#471370_2_En_6_Chapter.xhtml)
    and [7](#471370_2_En_7_Chapter.xhtml), respectively) we’ll find simpler ways to
    accomplish what we’ll see here – but this chapter will give us insight into what’s
    happening behind the scenes in the later chapters, too.


    So now that we’ve talked about this being a “basic approach,” and so forth – what
    **is** the approach?


    We’re going to add a `ServletContextListener` to our two web applications, and
    in this `ServletContextListener` we’ll instantiate a Spring `WebApplicationContext`
    and store it in the application scope for the entire web application. When we
    need resources from the Spring context, we’ll grab then from the `ServletContext`
    – somewhat like the traditional JNDI model in Jakarta EE, as we saw in our Servlets
    in the `common` module. (When we look at Spring Web and Spring Boot, we’ll see
    easy ways to autowire dependencies.)


    Let’s look at the `ServletContextListener`, which we’re going to name `AnnotationContextListener`.


    ```

    package com.bsg6.chapter05;

    import jakarta.servlet.ServletContextEvent;

    import jakarta.servlet.ServletContextListener;

    import jakarta.servlet.annotation.WebListener;

    import org.springframework.context.ApplicationContext;

    import org.springframework.web.context.

    support.AnnotationConfigWebApplicationContext;

    @WebListener

    public class AnnotationContextListener implements ServletContextListener {

    @Override

    public void contextInitialized(ServletContextEvent event) {

    ApplicationContext context = buildAnnotationContext();

    event.getServletContext().setAttribute("context", context);

    }

    private ApplicationContext buildAnnotationContext() {

    AnnotationConfigWebApplicationContext context =

    new AnnotationConfigWebApplicationContext();

    context.scan("com.bsg6.chapter03.mem03");

    context.refresh();

    return context;

    }

    }

    Listing 5-12

    chapter05-anno/src/main/java/com/bsg6/chapter05/AnnotationContextListener.java

    ```


    For the most part, this class is very simple. It uses `@WebListener` on the entire
    class – which tells the Servlet container to use an instance of this class **where
    appropriate** – and, given that it implements `ServletContextListener`, it will
    receive context-related events. There are only two: `contextInitialized` (called
    when the application is started) and `contextDestroyed` (called when the application
    is destroyed, if possible).


    The `ServletContextListener` interface has default implementations for both `contextInitialized()`
    and `contextDestroyed()`, so we don’t have to implement anything unless we actually
    have operations to perform. We don’t have anything to do if the Servlet context
    stops, so we’re not going to bother with an implementation of `contextDestroyed()`.
    However, we want to create our Spring context in the `contextInitialized` event.


    The `AnnotationConfigWebApplicationContext`, as its name implies, provides us
    the ability to scan for available components, as with the `<context:component-scan
    />` tag we’ve seen in earlier chapters. With this class, we can programmatically
    tell the Spring context which packages to scan for available annotations, which
    is exactly what the `buildAnnotationContext()` method does.^([^(78)](#fn78)) Once
    we have the `AnnotationConfigWebApplicationContext`, we need to tell it where
    to look to find candidate classes – and in this case, we’re reusing one of the
    Chapter [3](#471370_2_En_3_Chapter.xhtml) memory-based implementations, so we
    provide it a single package name, `com.bsg6.chapter03.mem03`. This method actually
    accepts an array of package names, and it actually takes a variable number of
    arguments; it just so happens that we only need to scan one package for our purposes
    here, but we could have provided a comma-delimited list of as many packages as
    we needed scanned.


    Note that this isn’t quite the same as a Java configuration. If we were using
    a Java configuration instead of building our configuration, we could have marked
    with it `@ComponentScan` – which would have done the same thing as we’re doing
    here with `@AnnotationConfigWebApplicationContext` and `<context:component-scan
    />`. We’ll see it used in later chapters, when we actually do switch over to using
    Java-based configuration.


    It’s usually wise to scan *exactly* what you need, rather than adding entire trees
    of packages. Scanning is fairly slow; you won’t do it often (only on application
    startup), but it’s still fairly heavy on the Java runtime. If you don’t have a
    lot of classes you’re actually interested in, consider programmatic configuration
    with a class annotated with `@Configuration` rather than scanning packages. We’re
    scanning here mostly because it’s fewer lines of code than the Java configuration,
    which requires a class with its own boilerplate.


    However, simply telling the context where it **should** scan doesn’t make it actually
    perform the scan. That’s the role of `context.refresh()`. After we’ve done **that**,
    we get the `ServletContext` from the `ServletContextEvent`, and store the Spring
    context into the Servlet context as a named attribute^([^(79)](#fn79)); we name
    it “context” for simplicity. Once we’ve done that, any executable code in the
    entire web application can grab the Spring context from the Servlet context, by
    name.


    When we use the Spring context in this manner (with an explicit load of the Spring
    context into the Servlet context), we don’t get autowiring of Spring resources
    into our Servlets. We get them from the Spring context instead. (The beans that
    are retrieved **from** the Spring context, however, will have autowiring in place
    – and the particular `MusicService` we use requires and demonstrates this.) Since
    we have full control over instance lifecycle (see Chapter [4](#471370_2_En_4_Chapter.xhtml)),
    we have fine-grained control over what gets created, and when.


    All that’s incredibly useful^([^(80)](#fn80)); we can now grab our `MusicService`
    from Spring, as shown in the Servlets from the `common` module, but how do we
    demonstrate it?


    By doing the same thing we did with our “Hello, World” Servlet, of course.


    Our `chapter05-anno` application includes the `chapter05-api` module, as we’ve
    shown (and mentioned multiple times, in case readers weren’t paying attention).
    When we include the `chapter05-api` module, those Servlets are automatically set
    to respond to the URL patterns specified by the `@WebServlet` annotation – which
    means `/vote` and `/songs`. That means when we run our `anno` application with
    `jetty:run`, those Servlets are already active – although they aren’t going to
    work correctly unless we have our `ServletContextListener` in place.


    We can test this by using a command line application such as `curl`. After starting
    the application, issue a curl command.'
  trans: '

    #### 为 Servlet 添加 Spring 上下文


    在 Servlet 中使用 Spring 有几种方式：我们可以使用 Spring 模块，例如 Spring Web（它包含一个 Servlet，作为调度器，用于处理为
    Spring 设计的服务对象^(⁷⁷)，我们实际上已将其作为依赖包含在此处）；或者使用 Spring Boot（它实际上嵌入了自己的 Servlet 引擎）；或者我们可以让
    Web 应用实例化一个 Spring 上下文，并从传统 Servlet 内部将其作为资源进行访问。大多数 Spring 专家可能倾向于使用 Spring Boot，因为
    Boot 的开发和部署模型非常简单，但 Spring Boot 是第 7 章的主题，而非第 5 章；而 Spring Web 也是后续章节（第 6 章）的主题……这意味着我们得先从更基础的方法入手。


    当我们研究 Spring Boot 和 Spring Web（再次说明，分别是第 6 章和第 7 章）时，我们会找到更简单的方法来实现我们即将看到的功能——但本章将让我们深入了解后续章节中幕后发生的事情。


    既然我们已经讨论了这是一种“基础方法”等等，那么**具体**方法是什么呢？


    我们将为两个 Web 应用添加一个 `ServletContextListener`，在这个 `ServletContextListener` 中，我们将实例化一个
    Spring `WebApplicationContext`，并将其存储在整个 Web 应用的应用程序作用域中。当我们需要 Spring 上下文中的资源时，我们将从
    `ServletContext` 中获取——这有点像 Jakarta EE 中的传统 JNDI 模型，正如我们在 `common` 模块的 Servlet
    中看到的那样。（当我们研究 Spring Web 和 Spring Boot 时，我们会看到自动注入依赖的简便方法。）


    让我们来看看这个 `ServletContextListener`，我们将其命名为 `AnnotationContextListener`。


    ```

    package com.bsg6.chapter05;

    import jakarta.servlet.ServletContextEvent;

    import jakarta.servlet.ServletContextListener;

    import jakarta.servlet.annotation.WebListener;

    import org.springframework.context.ApplicationContext;

    import org.springframework.web.context.

    support.AnnotationConfigWebApplicationContext;

    @WebListener

    public class AnnotationContextListener implements ServletContextListener {

    @Override

    public void contextInitialized(ServletContextEvent event) {

    ApplicationContext context = buildAnnotationContext();

    event.getServletContext().setAttribute("context", context);

    }

    private ApplicationContext buildAnnotationContext() {

    AnnotationConfigWebApplicationContext context =

    new AnnotationConfigWebApplicationContext();

    context.scan("com.bsg6.chapter03.mem03");

    context.refresh();

    return context;

    }

    }

    Listing 5-12

    chapter05-anno/src/main/java/com/bsg6/chapter05/AnnotationContextListener.java

    ```


    大部分情况下，这个类非常简单。它在整个类上使用了 `@WebListener`——这告诉 Servlet 容器在**适当的时候**使用此类的实例——并且，鉴于它实现了
    `ServletContextListener`，它将接收与上下文相关的事件。事件只有两个：`contextInitialized`（在应用启动时调用）和
    `contextDestroyed`（在应用销毁时调用，如果可能的话）。


    `ServletContextListener` 接口为 `contextInitialized()` 和 `contextDestroyed()` 都提供了默认实现，因此除非我们确实有操作要执行，否则无需实现任何内容。如果
    Servlet 上下文停止，我们没有任何操作需要执行，所以我们不会费心去实现 `contextDestroyed()`。然而，我们希望在 `contextInitialized`
    事件中创建我们的 Spring 上下文。


    顾名思义，`AnnotationConfigWebApplicationContext` 为我们提供了扫描可用组件的能力，就像我们在前几章中看到的 `<context:component-scan
    />` 标签一样。使用这个类，我们可以通过编程方式告诉 Spring 上下文要扫描哪些包以查找可用的注解，这正是 `buildAnnotationContext()`
    方法所做的。^(⁷⁸) 一旦我们有了 `AnnotationConfigWebApplicationContext`，就需要告诉它去哪里查找候选类——在这种情况下，我们复用了第
    3 章中一个基于内存的实现，因此我们提供了一个包名 `com.bsg6.chapter03.mem03`。这个方法实际上接受一个包名数组，并且它实际上接受可变数量的参数；只是碰巧我们这里只需要扫描一个包，但我们可以提供一个逗号分隔的列表，列出我们需要扫描的任意数量的包。


    请注意，这与 Java 配置并不完全相同。如果我们使用 Java 配置而不是构建配置，我们可以用 `@ComponentScan` 标记它——这将完成我们在这里使用
    `@AnnotationConfigWebApplicationContext` 和 `<context:component-scan />` 所做的相同事情。我们将在后续章节中看到它的使用，届时我们实际上会切换到基于
    Java 的配置。


    通常，明智的做法是**精确**扫描你所需的内容，而不是添加整个包树。扫描相当慢；你不会经常执行它（仅在应用程序启动时），但它对 Java 运行时来说仍然相当沉重。如果你实际感兴趣的类不多，请考虑使用带有
    `@Configuration` 注解的类进行编程配置，而不是扫描包。我们在这里进行扫描主要是因为它的代码行数比 Java 配置少，而 Java 配置需要一个带有自身样板代码的类。


    然而，仅仅告诉上下文它**应该**扫描的位置并不会让它实际执行扫描。这是 `context.refresh()` 的作用。在我们完成**那一步**之后，我们从
    `ServletContextEvent` 中获取 `ServletContext`，并将 Spring 上下文作为命名属性存储到 Servlet 上下文中^(⁷⁹)；为简单起见，我们将其命名为“context”。一旦完成，整个
    Web 应用中的任何可执行代码都可以通过名称从 Servlet 上下文中获取 Spring 上下文。


    当我们以这种方式使用 Spring 上下文（将 Spring 上下文显式加载到 Servlet 上下文中）时，我们无法将 Spring 资源自动注入到我们的
    Servlet 中。相反，我们从 Spring 上下文中获取它们。（然而，**从** Spring 上下文中检索到的 bean 将具有自动注入功能——我们使用的特定
    `MusicService` 需要并演示了这一点。）由于我们完全控制实例生命周期（参见第 4 章），我们可以精细地控制创建什么以及何时创建。


    所有这些都非常有用^(⁸⁰)；我们现在可以从 Spring 中获取我们的 `MusicService`，如 `common` 模块中的 Servlet 所示，但我们如何演示它呢？


    当然，通过执行与“Hello, World”Servlet 相同的操作。


    我们的 `chapter05-anno` 应用包含了 `chapter05-api` 模块，正如我们所示（并多次提及，以防读者没有注意）。当我们包含 `chapter05-api`
    模块时，这些 Servlet 会自动设置为响应由 `@WebServlet` 注解指定的 URL 模式——即 `/vote` 和 `/songs`。这意味着当我们使用
    `jetty:run` 运行 `anno` 应用时，这些 Servlet 已经处于活动状态——尽管除非我们放置了 `ServletContextListener`，否则它们无法正常工作。


    我们可以使用命令行应用程序（例如 `curl`）来测试这一点。启动应用程序后，发出一个 curl 命令。

    '
- fmt: "```bash\n$ curl \"http://localhost:8080/vote?artist=Therapy+Zeppelin&song=Medium\"\
    \n{\"name\":\"Medium\",\"votes\":1}\n$ curl \"http://localhost:8080/vote?artist=Therapy+Zeppelin&song=Medium\"\
    \n{\"name\":\"Medium\",\"votes\":2}\n$ curl \"http://localhost:8080/songs?artist=Therapy+Zeppelin\"\
    \n[{\"name\":\"Medium\",\"votes\":2}]\n```\nListing 5-13 Testing the application\
    \ manually\n\nWise readers might wonder why we’re not testing this automatically\
    \ (as part of the build process), as we’ve done elsewhere in the book. The answer\
    \ is pretty simple: it’s hard to do! Cranking up a compliant Servlet container\
    \ in a test is doable, but the best way to do it is with something like Arquillian\
    \ (`https://arquillian.org/`) – which is unfortunately not trivial to explain.\
    \ There’s a ton of plumbing that goes into recreating the proper infrastructure,\
    \ and it’s largely outside the scope of this book. Plus, this form of building\
    \ applications is, as already said multiple times, a bit archaic – our next chapter\
    \ will use Spring Web, which not only makes our endpoints far easier to write,\
    \ but it also makes them inherently *testable* without all of the effort we’d\
    \ have to go through for *this* chapter’s rather basic technique.\n\nWe promise,\
    \ we’re not trying to short-change you, readers! We’re actually just not wasting\
    \ effort showing you a testing process you’re not really going to need, but you\
    \ *will* want to have a basic understanding of what the Servlet API is and how\
    \ it works, in order to construct decent endpoints for your own applications.\
    \ Check out the next chapter. It touches on all of this, and does it properly,\
    \ and then in later chapters we do it *even better*.\n\n### The XML-Based Spring\
    \ Context Application\n\nHere, everything is **almost** identical to our annotation-based\
    \ application – which was, of course, the whole point of creating the `chapter05-api`\
    \ module. We’re not going to bother with the “Hello, World” Servlet, so this web\
    \ application will contain our `ServletContextListener` and an XML configuration\
    \ file (along with the Servlets we wrote in our `common` module). With our instructions\
    \ for `pom.xml`, we have four files.\n\nFirst, the directory structure, starting\
    \ from the `chapter05-xml` directory itself.\n\n```bash\nmkdir -p chapter05-xml/src/main/java/com/bsg6/chapter05\n\
    mkdir -p chapter05-xml/src/main/webapp/WEB-INF\n```\nListing 5-14 Creating the\
    \ directory structure with POSIX\n\nOur `pom.xml` is effectively identical to\
    \ the `pom.xml` from the `chapter05-anno` module, with the only real difference\
    \ being that we no longer need Mustache (as the “Hello, World” Servlet was the\
    \ only class where Mustache was used).\n\n```xml\n<project>\n    <modelVersion>4.0.0</modelVersion>\n\
    \    <parent>\n        <groupId>com.apress</groupId>\n        <artifactId>bsg6</artifactId>\n\
    \        <version>1.0</version>\n    </parent>\n    <artifactId>chapter05-xml</artifactId>\n\
    \    <version>1.0</version>\n    <packaging>war</packaging>\n    <dependencies>\n\
    \        <dependency>\n            <groupId>${project.parent.groupId}</groupId>\n\
    \            <artifactId>chapter05-api</artifactId>\n            <version>${project.parent.version}</version>\n\
    \        </dependency>\n        <dependency>\n            <groupId>jakarta.servlet</groupId>\n\
    \            <artifactId>jakarta.servlet-api</artifactId>\n            <version>6.0.0</version>\n\
    \            <scope>provided</scope>\n        </dependency>\n        <dependency>\n\
    \            <groupId>org.springframework</groupId>\n            <artifactId>spring-web</artifactId>\n\
    \        </dependency>\n    </dependencies>\n    <build>\n        <plugins>\n\
    \            <plugin>\n                <groupId>org.eclipse.jetty</groupId>\n\
    \                <artifactId>jetty-maven-plugin</artifactId>\n               \
    \ <version>11.0.15</version>\n            </plugin>\n        </plugins>\n    </build>\n\
    </project>\n```\nListing 5-15 `chapter05-xml/pom.xml`\n\nThe `ServletContextListener`\
    \ creates an `XmlWebApplicationContext` instead of an `AnnotationConfigWebApplicationContext`,\
    \ which means we’ll need to have an XML file in the application, but apart from\
    \ that, everything should be very familiar:\n\n```java\npackage com.bsg6.chapter05;\n\
    import jakarta.servlet.ServletContext;\nimport jakarta.servlet.ServletContextEvent;\n\
    import jakarta.servlet.ServletContextListener;\nimport jakarta.servlet.annotation.WebListener;\n\
    import org.springframework.context.ApplicationContext;\nimport org.springframework.web.context.support.XmlWebApplicationContext;\n\
    @WebListener\npublic class XMLContextListener implements ServletContextListener\
    \ {\n    @Override\n    public void contextInitialized(ServletContextEvent event)\
    \ {\n        ApplicationContext context =\n            buildXmlContext(event.getServletContext());\n\
    \        event.getServletContext().setAttribute(\"context\", context);\n    }\n\
    \    private ApplicationContext buildXmlContext(ServletContext sc) {\n       \
    \ XmlWebApplicationContext context = new XmlWebApplicationContext();\n       \
    \ context.setServletContext(sc);\n        context.refresh();\n        return context;\n\
    \    }\n    @Override\n    public void contextDestroyed(ServletContextEvent sce)\
    \ {\n    }\n}\n```\nListing 5-16 `chapter05-xml/src/main/java/com/bsg6/chapter05/XMLContextListener.java`\n\
    \nNote that when we build an `XmlWebApplicationContext`, we also set a reference\
    \ to the current `ServletContext`. This is primarily used in different environments\
    \ than the one we’re creating; it’s useful when Spring dispatches requests to\
    \ resources itself, which we’re not using here. When we get into Chapter 6, this\
    \ sort of thing will happen behind the scenes and we won’t have to worry about\
    \ it, but here it’s just making sure the Spring Context is set up as it expects.\n\
    \nAnd, of course, we need the configuration file itself.\n\n```xml\n<!-- Listing\
    \ 5-17 chapter05-xml/src/main/webapp/WEB-INF/applicationContext.xml -->\n```\n\
    Listing 5-17 `chapter05-xml/src/main/webapp/WEB-INF/applicationContext.xml`\n\n\
    This is a near-exact copy of one of the XML configurations from Chapter 3, just\
    \ renamed to match the default location searched by `XmlWebApplicationContext`.\
    \ (We can provide a resource to the context to read its configuration, but by\
    \ default it searches the web application’s local resources – in this case, `/WEB-INF/aplicationContext.xml`,\
    \ as shown.)\n\nIf we run the `xml` module with Maven, via `mvn -pl chapter05-xml\
    \ jetty:run`, we can exercise the application in the exact same technique we used\
    \ with the `chapter05-anno` version.\n\n```bash\n$ curl \"http://localhost:8080/vote?artist=Therapy+Zeppelin&song=Medium\"\
    \n{\"name\":\"Medium\",\"votes\":1}\n$ curl \"http://localhost:8080/vote?artist=Therapy+Zeppelin&song=Medium\"\
    \n{\"name\":\"Medium\",\"votes\":2}\n$ curl \"http://localhost:8080/songs?artist=Therapy+Zeppelin\"\
    \n[{\"name\":\"Medium\",\"votes\":2}]\n```\nListing 5-18 Testing the application\
    \ manually\n\nOur excitement should know no boundaries! But seriously, we’ve actually\
    \ done a lot so far in this chapter. It just so happens that Spring provides easier\
    \ ways to accomplish the same things, which we’ll see in the next chapter.\n\n\
    ## Next Steps\n\nIn this chapter, we saw what goes on behind the curtains in a\
    \ web application, with raw Servlets, template rendering with Mustache, and resource\
    \ requisition from manually populated Spring contexts. We also got to see how\
