    because solving it in the context of Chapter [7](#471370_2_En_7_Chapter.xhtml)
    would be more work than it was worth. Instead, we chose to model simpler things
    in Chapter [7](#471370_2_En_7_Chapter.xhtml), to defer proper database access
    to **this** chapter and the next.


    What do you think the “crucial problem” was in Chapter [7](#471370_2_En_7_Chapter.xhtml),
    besides the obvious answer of “There was no reference to a ‘Song’”? Spoiler in
    three…​ two…​ one…​.


    Chapter [7](#471370_2_En_7_Chapter.xhtml) didn’t manage transactions at all. There
    was no way to address coordination of database requests without introducing database
    abstractions that were out of scope for Chapter [7](#471370_2_En_7_Chapter.xhtml).
    Instead, we chose to keep things very simple, and lay the groundwork for Chapters
    [8](#471370_2_En_8_Chapter.xhtml) and [9](#471370_2_En_9_Chapter.xhtml), both
    of which address database access in far more elegant (and more correct) ways.


    In this chapter, we’re going to demonstrate the use of `JdbcTemplate`, which itself
    serves as a model for many of Spring’s simpler data access facilities. JdbcTemplate
    gives us a single, common workflow model, as well as providing easy mechanisms
    to map from relational data into classes as well as a simple model for exception
    handling and central logging. We’re also going to round out what should have been
    Chapter [7](#471370_2_En_7_Chapter.xhtml)’s feature set, by adding controllers
    to access all of our data, as well as tests for everything.


