    ## 引言


    我们通常倾向于从最简单的技术使用逐步过渡到更高级的技术，但本章将稍微颠倒一下顺序，从 JPA 开始；JDBC 和 SQL 是基础级别的技术（并且在 JPA
    的底层被使用），但 JDBC 的问题在于，嗯，它就是 JDBC——并且它严重依赖于一个实时的数据结构，这种结构你会在一个运行中的、拥有功能完备且已实现的模式的数据库中看到。这意味着，刚性数据访问的某些方面可能有效也可能无效，具体取决于数据库，因为它是“记录系统”，是数据样貌的权威描述。当我们编译应用程序时，我们不知道数据库是否存在，也不知道模式是什么样，这使得针对该数据库的自动化工具变得相当困难。


    然而，JPA 允许我们描述应用程序应该看到的数据模型。我们可以使用一个 JPA 数据模型，并随意更改底层结构（只要我们同时也告诉 JPA 底层结构是什么），但我们也可以在编译时就知道程序所看到的数据模型是什么。这意味着，当我们首次编译应用程序时，无论数据库是否存在，我们都能知道如何期望访问我们的数据（因为它在代码中描述了）——这意味着我们可以高度确信我们的应用程序将正确地访问数据，尽管可能效率不高。^(⁹⁸)


    为什么我们不知道数据访问是否高效？答案很简单：例如，我们可能以某种方式设计我们的对象模型，导致数据库使用了未索引的数据，或者使用了比实际需要更多的表，从而导致查询需要进行全表扫描等等。JPA
    并不是一颗神奇的子弹，无论你如何描述数据，它都能给你一个优秀的模式；它通常能帮助你创建一个**可运行**的模式，但你仍然需要理解关系型数据库的工作原理，才能真正微调数据模型。不过，要是能有神奇的性能配方就好了。


    我们将介绍 Spring Data 抽象层背后的几种不同的存储机制，但本章将回顾第 3 章和第 8 章以及它们对测试的使用。一旦服务正常工作，在服务前面添加
    REST 端点就是一件小事（正如我们在第 7 章和第 8 章中看到的那样），因此我们不会在此处通过添加一个支持 Web 的前端来分散注意力。


    ## 总体架构


    Spring Data 扩展了 `Repository<T,ID>` 的概念，这是一个针对给定数据存储和实体的通用访问层。我们已经见过 `@Repository`
    注解，但在这里我们将看到一个接口（也叫做 `Repository<T,ID>`，其中 `T` 是被存储的类型，`ID` 是主键类型，并通过 `CrudRepository<T,ID>`
    和 `PagingAndSortingRepository<T,ID>` 进行扩展），Spring 将通过代理（在很大程度上）**为你**实现这个接口。


    不幸的是，Java 中的代理并不真正属于本书的讨论范围。话虽如此，这里还是对一种方法做一个非常粗略的概述：你可以定义一个对象（称为 `Proxy`），它拦截方法调用，并在一个处理器对象中任意执行代码。由于代理可以访问调用的方法签名和被调用的实例，处理器可以在实际方法体之前或之后执行代码——或者它也可以从一开始就避免调用实际的方法体。


    对于实现 `Repository<T,ID>` 的类，该接口被用来（几乎）从无到有地制造方法体，其效果是我们定义一个简单的接口，然后 Spring 神奇地为我们实现这个接口。显然，这里没有*真正的*魔法——它只是一个
    `Proxy`——但这使得使用 Spring Data 比原本可能的方式容易得多。


    值得注意的是，Spring 中有多种代理机制。默认是使用 Java 原生的代理机制，但在某些情况下，Spring 会使用一个名为 CGLIB 的库，并用它构建一种不同类型的代理。


    你将用 Java 定义实体，然后创建一个接口（或一组接口）来描述如何在数据存储系统中操作该实体。`Repository<T,ID>` 接口本身只是一个标记；它没有方法，但向
    Spring 指示其实现以某种方式与数据库协同工作。


    如果 `Repository<T,ID>` 没有方法，那它有什么用呢？


    嗯，有时你想通过使用细粒度的接口来限制对方法的访问。例如，可能有一个 `Controller` 没有保存实体的能力；如果我们愿意，我们可以定义一个只定义读取数据方法的
    `Repository<T,ID>`，而实际的实例则拥有保存或更新实体的方法。`Controller` 可能会从 Spring 接收到这个只读接口的一个副本，因此**编译器**可以强制执行它永远不能保存实体的要求。


    `CrudRepository<T,ID>` 接口扩展了 `Repository<T,ID>`，定义了用于读取、写入、更新、删除**甚至**查询数据库的操作——并且
    Spring Data 应用了一些魔法，使得你甚至可以在**接口中**指定查询，而无需知道如何实际查询数据库本身。在第 7 章中，我们看到了像 `findAllArtistsByName()`
    这样的方法，它选择了所有名称匹配通配符的艺术家，且不区分大小写；使用 Spring Data，我们在仓库中定义一个方法**签名**，就能获得几乎相同的功能。（我们需要在外部构建通配符，尽管确实**有**方法可以通过接口本身来实现。）


    ```

    public interface ArtistRepository

    extends Repository {

    List findLikeNameIgnoreCase(String name);

    }

    清单 9-1

    Spring Data 中与第 7 章 findAllArtistsByName 等价的方法

    ```


    构建一个 `Repository<T,ID>` 涉及三个源文件。对于一个给定的仓库，你将拥有：


    1.  一个 Spring 配置（当然，它可以服务于多个仓库）

    2.  一个实体类型（代表数据的对象），带有某种主键

    3.  一个实现 `Repository<T,ID>`（或者实践中常用的 `CrudRepository<T,ID>` 或 `PagingAndSortingRepository<T,ID>`）的接口，并指定实体类型及其主键类型


    接口的创建也有多种变体，以允许不同级别的方法访问。我们将在本章中展示其中的一些。


    ### 关于需求的重要说明


    本章将演示访问两个数据库系统：一个嵌入式 H2 数据库（就像在第 7 章和第 8 章中一样）和一个 MongoDB 数据库。我们将使用一个允许我们嵌入 MongoDB
    的项目，因此你无需运行（或安装）MongoDB。

