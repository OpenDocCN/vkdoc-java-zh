    ### 集成 OAuth


    我们要处理的最后一个官方内容是，如何在你选择的情况下将 OAuth 2.0^(¹⁰⁶) 集成到你的安全流程中。由于本章已经涵盖了不少内容，我们将构建的示例会相当简单。我们将创建一个
    Web 应用，该应用将假定所有端点都必须由我们的 OAuth 提供程序（这里我们将使用 GitHub）保护。我们将创建另一个子项目来保持内容的良好分离。


