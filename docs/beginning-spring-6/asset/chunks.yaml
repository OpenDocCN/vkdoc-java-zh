  raw: 'Careful readers will note the use of `@NonNull`. This brings up an interesting
    point that’s been referenced before in some of our earlier chapters: Spring impacts
    your design and object models, but only as much as *you want it to*. That `@NonNull`
    means that when Spring itself constructs the model, or applies validation to the
    model (as when used from a `@Controller` or in some other similar cases), it can
    examine the validation and suggest whether the model is constructed properly or
    not.


    But when Spring is *not* involved – or when it’s only involved in certain ways
    – those annotations make no difference. Annotations are applied by code at runtime,
    after all, and unless something examines the annotated structure and takes action
    based on the annotations, *nothing happens*.


    So those annotations have value, but it’s important to note that their presence
    doesn’t mean anything for *ordinary code* – it’s informative more than anything
    else, and if we write vanilla Java code, those annotations have no bearing on
    anything. A `@NonNull` annotation, as used here, means that a validation mechanism
    can ensure that no `null` values pass through the *validation layer*, but the
    values can still be set to `null` by the JVM itself or by a determined programmer.


    Now let’s see what a `Song` looks like.


    ```

    package com.bsg6.chapter08;

    import org.springframework.lang.NonNull;

    import java.util.Objects;

    import java.util.StringJoiner;

    public class Song {

    Integer id;

    @NonNull

    Integer artistId;

    @NonNull

    String name;

    int votes;

    public Song() {

    }

    public Song(Integer id, @NonNull Integer artistId, @NonNull String name, int votes)
    {

    this.id = id;

    this.artistId = artistId;

    this.name = name;

    this.votes = votes;

    }

    public Integer getId() {

    return id;

    }

    public void setId(Integer id) {

    this.id = id;

    }

    @NonNull

    public Integer getArtistId() {

    return artistId;

    }

    public void setArtistId(@NonNull Integer artistId) {

    this.artistId = artistId;

    }

    @NonNull

    public String getName() {

    return name;

    }

    public void setName(@NonNull String name) {

    this.name = name;

    }

    public int getVotes() {

    return votes;

    }

    public void setVotes(int votes) {

    this.votes = votes;

    }

    @Override

    public boolean equals(Object o) {

    if (this == o) return true;

    if (!(o instanceof Song song)) return false;

    return getVotes() == song.getVotes()

    && Objects.equals(getId(), song.getId())

    && Objects.equals(getArtistId(), song.getArtistId())

    && Objects.equals(getName(), song.getName());

    }

    @Override

    public int hashCode() {

    return Objects.hash(getId(), getArtistId(), getName(), getVotes());

    }

    @Override

    public String toString() {

    return new StringJoiner(", ", Song.class.getSimpleName() + "[", "]")

    .add("id=" + id)

    .add("name=''" + name + "''")

    .add("votes=" + votes)

    .toString();

    }

    }

    Listing 8-4

    chapter08/src/main/java/com/bsg6/chapter08/Song.java

    ```


    There’s nothing magical here; we’re basically echoing our data model in Java source.


    We will want to manually create our database schema as described in Chapter [7](#471370_2_En_7_Chapter.xhtml),
    by creating a `schema.sql` file. These files don’t go in the same parts of the
    source tree, because the `application.properties` is going to apply only to our
    tests – we might want to use a different database in production, after all – but
    our `schema.sql` would be appropriate no matter what the H2 instance happens to
    be, whether in-memory (as in our tests) or as an external database, or whatever
    it might be.


    H2 can run as an embedded database or as a separate database server. In addition,
    it can create databases on disk or in-memory, so we could have one of four different
    configurations.


    | Embedded and in-memory | Useful for testing |

    | --- | --- |

    | Embedded and on-disk | Useful for applications that run in single containers
    and therefore don’t need to share access |

    | External and in-memory | Useful for creating side-caches, perhaps; this would
    be fairly rare in the real world |

    | External and on-disk | Useful for application where multiple processes use the
    database, and mirrors how most other databases are used |


    First, the simple (and blessedly short) `application.properties`, which we’re
    going to put in `chapter08/src/test/resources` – remember, this is for testing
    only, so we **want** it in the testing directory tree. (If we want a production
    version, we can create that in `chapter08/src/main/resources`, with specific properties
    for production use – like an explicit JDBC URL and so forth. The version in the
    `test` directory tree would have precedence for our tests.)


    The main purpose of this file is to make sure that Spring Boot knows what database
    platform we’re using, so it will use `schema.sql` to create our database tables.


    ```

    spring.sql.init.platform=h2

    Listing 8-5

    chapter08/src/test/resources/application.properties

    ```


    Our `schema.sql` file – which goes into our `chapter8/src/main/resources` directory,
    as it’s a schema that we would want in a production application (not just for
    tests) – is fairly simple as well, and models our entities in about as straightforward
    a fashion as can be done while representing our data model’s intent.


    ```

    CREATE TABLE IF NOT EXISTS artists

    (

    id   BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,

    name VARCHAR(64) NOT NULL

    );

    CREATE UNIQUE INDEX IF NOT EXISTS artist_name

    ON artists(name);

    CREATE TABLE IF NOT EXISTS songs

    (

    id        BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,

    artist_id INT,

    name      VARCHAR(64) NOT NULL,

    votes     INT DEFAULT 0,

    FOREIGN KEY (artist_id) REFERENCES artists (id)

    ON UPDATE CASCADE

    );

    CREATE UNIQUE INDEX IF NOT EXISTS song_artist

    ON SONGS (artist_id, name);

    Listing 8-6

    chapter08/src/main/resources/schema.sql

    ```


    The foreign key for `songs` deliberately cascades updates through the foreign
    key – so if we update an `artist` record’s `id` field, it should propagate to
    the `songs` table. We don’t cascade deletes quite on purpose; imagine if we had
    an artist with forty songs recorded. Deleting the artist would delete all of their
    song data as well. Not propagating deletions means that we’d have to **explicitly**
    delete the `songs` records associated with an artist before deleting the artist’s
    data as well.


    Lastly, it’d be nice to have some test data by default. Foreshadowing: we’re going
    to have three different test classes in this chapter, and two of them will create
    their own data, but one of them won’t. (`ArtistControllerTest` is a read-only
    test. As such, we need to make sure it has the data it needs in order to run properly.
    Thus, default data!) In anticipation of that one test, let’s go ahead and take
    a look at our default database content, which is located in `chapter8/src/test/resources/data.sql`.


    ```

    INSERT INTO ARTISTS (NAME)

    VALUES (''Threadbare Loaf'');

    INSERT INTO ARTISTS (NAME)

    VALUES (''Therapy Zeppelin'');

    INSERT INTO ARTISTS (NAME)

    VALUES (''Clancy In Silt'');

    INSERT INTO SONGS (ARTIST_ID, NAME, VOTES)

    VALUES ((select id from artists where name like ''Thre%''),

    ''Someone Stole the Flour'', 4);

    INSERT INTO SONGS (ARTIST_ID, NAME, VOTES)

    VALUES ((select id from artists where name like ''Thre%''),

    ''What Happened to Our First CD?'', 17);

    INSERT INTO SONGS (ARTIST_ID, NAME, VOTES)

    VALUES ((select id from artists where name like ''The%''),

    ''Medium'', 4);

    INSERT INTO SONGS (ARTIST_ID, NAME, VOTES)

    VALUES ((select id from artists where name like ''C%''),

    ''Igneous'', 5);

    Listing 8-7

    chapter08/src/test/resources/data.sql

    ```


