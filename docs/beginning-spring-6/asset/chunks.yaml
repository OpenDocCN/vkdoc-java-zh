    The other side of the read equation is obviously the writer. In the same way that
    Spring Boot helped us on the read side, it will do equally on the write side.
    All writers implement the `ItemWriter` interface. The writer can assume that it
    will get a list of items to write out to the preferred method and that each batch
    of data will be chunked according to rules in the job, and at the end of writing
    the list will be responsible for any flushing operation on the datasource in use.


    ```

    public interface ItemWriter {

    void write(Chunk chunk) throws Exception;

    }

    ```


    In our example we’ll use the `JdbcBatchItemWriterBuilder` for each of our types
    `Artist` and `Song` and craft a SQL prepared statement. We use the `dataSource`
    that is created from our `application.properties` setup here which is autowired
    into the method.


    ```

    @Bean

    public JdbcBatchItemWriter writer(DataSource dataSource) {

    return new JdbcBatchItemWriterBuilder()

    .itemSqlParameterSourceProvider(new BeanPropertyItemSqlParameterSourceProvider())

    .sql("INSERT INTO artist (id, name) VALUES (:id, :name)")

    .dataSource(dataSource)

    .build();

    }

    @Bean

    public JdbcBatchItemWriter songsWriter(DataSource dataSource) {

    return new JdbcBatchItemWriterBuilder()

    .itemSqlParameterSourceProvider(new BeanPropertyItemSqlParameterSourceProvider())

    .sql("INSERT INTO song (id, artist_id, name, votes) VALUES (:id, :artistId, :name,
    0)")

    .dataSource(dataSource)

    .build();

    }

