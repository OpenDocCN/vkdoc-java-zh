  trans: '

    ### J2EE Hello World，2005 年版本


    在 Spring 诞生的初期，一个 EJB 至少需要三个源文件：一个描述 EJB 契约的接口，一个提供 EJB 实际可执行代码的类，以及一个用于管理 EJB
    生命周期（例如 EJB 创建或销毁等生命周期阶段的操作）的“home 对象”。我们甚至不打算深入探讨实际部署的开发过程——这*仅仅*是*运行时*所需的 Java
    类结构。部署需要**至少**一个 XML 描述符，并且每个容器通常还需要另一个特定于容器的 XML 文件，用于连接容器 JNDI 树内的资源。即使在*最理想*的情况下，这也令人抓狂……而最理想的情况相当罕见。^(¹⁸)


    ```

    interface HelloWorldEJB extends EJBObject {

    String sayHello(String name)

    throws RemoteException;

    }

    清单 1-2

    EJB 接口

    ```


    在我们的 `HelloWorldEJB` 中，我们只是声明 EJB 提供了一个方法：`sayHello()`。由于这是一个 EJB，我们必须预见到由于 EJB
    可远程化的特性而可能发生的错误。值得指出的是，即使是我们的 EJB 的*接口*也受到了“嗯，它是一个 EJB”这一事实的影响；我们必须包含 `EJBObject`
    接口。如果我们不知道它是一个 EJB，我们甚至无法开发出 EJB 的这部分内容。这*不好*；它代表了 J2EE 的技术债务，而我们甚至还没做任何事情。


    ```

    public interface HelloWorldEJBHome  extends EJBHome {

    HelloWorldEJB create()

    throws RemoteException, CreateException;

    }

    清单 1-3

    EJB home 对象

    ```


    `HelloWorldEJBHome` 接口指定了如何创建 `HelloWorldEJB` 的具体实例。在我们的例子中，我们的接口展示了一个无状态服务（例如，我们创建它时没有默认的问候目标），因此创建过程没有什么特别之处，但我们仍然需要创建这个接口。


    ```

    class HelloWorldEJBImplementation implements SessionBean {

    public String sayHello(String name) {

    if(name==null) {

    name="world";

    }

    return "hello, "+name+".";

    }

    }

    清单 1-4

    EJB 实现

    ```


    至少，我们有有意义的代码了！这是一个简单的方法；如果参数是 `null`，则默认说“Hello, World”，否则问候提供给方法的名称。这里值得注意的是，它实际上并没有实现
    `HelloWorldEJB`——这确实是一种反模式的证据，因为我们无法确保它满足正确的规范，从而作为 `HelloWorldEJB` 的有效具体实例。


    ```

    ...

    try {

    Context ctx=new InitialContext();

    Object ref=ctx.lookup("java:comp/env/ejb/hello");

    HelloWorldEJBHome home= (HelloWorldEJBHome)

    PortableRemoteObject.narrow(

    ref, HelloWorldEJBHome.class);

    HelloWorldEJB greeter=home.create();

    System.out.println(greeter.sayHello("Andrew"));

    } catch(Throwable throwable) {

    /*

    向上冒泡到应用程序的下一层

    处理所有异常情况，因为我们无法

    *在此处*处理其中任何一个 - 请注意，我们

    用一个 catch 块处理 CreateException、RemoteException

    和 NamingException

    */

    throw new RuntimeException(

    throwable.getMessage(), throwable);

    }

    清单 1-5

    EJB 客户端代码

    ```


    这就是我们 EJB 的*调用者*必须做的最低限度的工作。这并没有*测试*我们的 EJB；它只是*调用*了它。如果我们想测试我们的 EJB，我们必须构建类似这样的东西，**部署**我们的
    EJB，并添加代码向其传递已知输入并与预期输出进行比较。^(¹⁹)


    我认为可以肯定地说，这听起来像是一种负担……但这就是每个 J2EE 开发者都必须忍受的。


    ### Spring 对 Hello World 的更优愿景


    现在让我们看看 Rod Johnson 鼓励开发者创建什么。我们将拥有我们的契约（接口）、该接口的实现，并展示将使用我们的 `HelloWorldBean`
    的客户端代码——然后稍微探讨一下这种实现更好的诸多原因。


    ```

    package com.bsg6.hello;

    interface HelloWorld

    {

    String sayHello(String name);

    }

    清单 1-6

    HelloWorld 接口

    ```


    请注意这个接口是多么简洁：它所做的并不比我们的 EJB 接口多（实际上 `HelloWorldEJB` 可以扩展这个接口，只添加 `EJBObject` 接口作为装饰）。这个类*没有任何地方*存在技术债务——既不是对
    Spring 的，也不是对 J2EE 的。


    ```

    package com.bsg6.hello;

    public class HelloWorldImplementation implements HelloWorld {

    public String sayHello(String name)

    {

    if(name==null) {

    name="world";

    }

    return "Hello, "+name+".";

    }

    }

    清单 1-7

    HelloWorld 实现

    ```


    我们在 `HelloWorldImplementation` 中看到了与 `HelloWorld` 相同的模式。当然，它依赖于 `HelloWorld` 接口，但也仅此而已。我们的类中没有任何内容不是专注于实际履行
    `HelloWorld` 接口的契约。`HelloWorldEJBImplementation` **接近**这个想法，但必须实现 `SessionBean`——并且*不应该*实现代表其契约的接口。我们只展示了两个示例类，但技术债务却少得多，而且我们的类符合惯用的
    Java 风格——甚至符合 2004 年左右（当时 J2EE 称王，恐龙统治地球）的惯用风格。


    ```

    package com.bsg6.client;

    public class Greeter

    {

    HelloWorld generator;

    void setGenerator(HelloWorld generator)

    {

    this.generator=generator;

    }

    public void displayHello(String name)

    {

    System.out.println(generator.sayHello(name));

    }

    }

    清单 1-8

    HelloWorld 客户端

    ```


    在这里，您看到 `generator` 引用指向一个 `HelloWorld` 实现。`Greeter` 并没有实例化一个 `HelloWorld`（尽管如果需要，它可以这样做）；然而，这里的想法是，`Greeter`
    *外部*的某个东西提供了一个 `HelloWorld`，而 `Greeter` 只是使用它。它不需要有任何获取代码，没有查找代码，它只是普通 Java 类上的一个属性。


    `HelloBean` 太简单了，实际上并不*需要*其他实现……但假设我们需要将一些其他功能包装到一个实现中用于测试或其他诊断呢？^(²⁰) 我们可以创建该功能，然后直接使用新的实现进行测试；我们的
    `Greeter` 类不必更改，并且除了使用新实现之外，我们无需做任何特殊的事情来切换到它。


    *这*就是依赖注入；我们在需要时注入 `HelloWorld` 依赖。


    Spring 不仅认识到了这种模式的力量，而且 Spring 框架还提供了使用它的工具；您可以定义一个 XML 文件，其中命名一个 `helloworld`
    bean（类型为 `com.bsg6.hello.HelloWorldImplementation`）以及一个 `Greeter` 实例，并自动将 `helloworld`
    引用注入到 `Greeter` 中，而无需任何对 Spring 的源代码级依赖。


    如果您使用框架的某些方面，Spring 会增加一些技术债务：例如，如果您愿意，您可以在 bean 中拥有生命周期钩子。（您仍然可以通过 XML 配置生命周期阶段，并避免源文件中的技术债务。）但
    Spring 过去是，现在也基本上是务实的；作为开发者，您有权选择想要承担多少债务，而不是像 J2EE 那样强制施加且常常令人难以承受的技术债务。

    '
- fmt: '# Spring Breaks Free and Fixes Java EE


    Sun, the original creators and maintainers of Java, created the Java Community
    Process back in 1998, but opened up membership a few years later. Spring, being
    an influential aspect *of* the community, participated in the creation of Java
    EE 6, with J2EE having been renamed to something less confusing.^([^(21)](#fn21))
    With Spring’s participation, Java EE 6 gained a new specification, “Context and
    Dependency Injection.” Standard annotations were added to support CDI and features
    related to it, and the world rejoiced publicly and privately.


    The funny thing is, as Spring became more influential on Java EE, Java EE itself
    became *less* influential. Spring never stopped innovating; now, you can deploy
    microcontainers using Spring, leveraging Jakarta EE API specifications, without
    bothering with Jakarta EE containers as such at all. You can still use a Jakarta
    EE application server, of course, but the need to do so has lessened.


    That represents a loss of control by the “old guard,” the system administrators
    who still think that 2005 represented the “good old days”^([^(22)](#fn22)) – but
    it means that programmers of today have more power and flexibility than they’ve
    ever had, and in Java it’s fair to say they owe a debt of gratitude to the Spring
    Framework for it.


    ## Spring 6 and Modern Java


    Java’s added a lot of really nice functionality in the last few years. After Oracle
    spun Java EE off and into Eclipse (giving us “Jakarta EE” instead of “Java EE”),
    the JVM itself was largely democratized. It’s still mostly controlled by Oracle,
    but the wider community has had more input into Java than it’s had since the early
    2000s, and Java’s been evolving rapidly as a result. We have new `record` types
    (intended to be immutable data structures) and modules, and we’re likely to see
    new multithreading models soon as well.


    Spring’s not kept still with all of this change. Spring 6 acknowledges the module
    infrastructure and supports it directly, and much of the Spring ecosystem has
    also shifted to the Jakarta EE naming structure (`jakarta` instead of `javax`,
    as a package name.) We’re going to look at some of this as we go through the book.


    **Warning**


    The shift from `javax` to `jakarta` for Jakarta EE is not seamless. The Java ecosystem
    is quite large, after all, and there are a lot of interdependencies in projects;
    some projects may still use the old `javax` packages where one would prefer they
    use `jakarta` instead. The only solutions for that are time and elbow grease,
    unfortunately. We’ll try to be careful and point out any issues with things like
    this as we proceed, but be aware that in real life, few things are as perfect
    as we’d like them to be.


    ## Next Steps


    In our next chapter, we’re going to take a look at “Hello, World” again – and
    go a lot deeper into the strengths of dependency injection, and Spring in particular.


