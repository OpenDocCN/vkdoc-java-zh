    Our `userDetailsService()` method does a similar thing to the previous `userDetailsService`
    override which we used in previous examples. We’re setting up two users using
    the `DelegatingPasswordEncoder` using the credentials of `user:user123` for the
    `USER` role and `admin:admin123` for a role with both `USER` and `ADMIN` privileges.


    Our second method is the `filterChain` method we’ve seen previously but are using
    a few new methods on `HttpSecurity`. Due to the usage of REST here, we don’t need
    to use `CSRF` – which is used to prevent cross-site request forgery with JavaScript.
    Other than those things, we’re securing all endpoints with role `USER` and can
    now use the simpler credentials already defined. When you’ve got this new class
    added, terminate the existing `bootRun` and re-run it with `mvn spring:bootRun`.
    We can copy the existing curl command above in Listing [10-33](#471370_2_En_10_Chapter.xhtml#PC38)
