    ### 使用注解进行构造器注入


    还有一种主要的 Bean 注入方式我们尚未涉及：构造器注入。如果你曾在 IDEA ([`https://jetbrains.com/idea`](https://jetbrains.com/idea))
    或 Eclipse ([`https://eclipse.org`](https://eclipse.org)) 这类 IDE 中查看过我们的示例代码，你可能会注意到
    IDE 正在提示关于 `@Autowired` 注解的一些警告信息，例如“不推荐使用字段注入。”


    另一种选择是使用*构造器注入*，即创建一个带有参数的构造器，并使用 `@Autowired` 标记，必要时还可使用 `@Qualifier`。原因很简单：字段默认是可变的，而使用构造器参数意味着我们可以将字段标记为
    `final`；*这*意味着我们不仅可以*要求*设置某个字段，还可以假定一旦设置，该字段将保持其被赋予的值。


    在实践中，启用构造器注入所需做的，就是创建一个有效的构造器，并将需要注入的参数标记好。构造器注入的规则与字段注入的规则相同；只是我们对其有了更多的控制权。


    为了在后续章节（以及小节）中避免无休止的重复，我们还想引入一个新的配置标签：`<import>`。


    注意


    如果你希望我们能在本章更早的地方就介绍这个标签……嗯，我们也是这么想的。然而，我们正刻意放慢引入新信息的节奏，以免让不熟悉我们讨论概念的读者感到不知所措，所以这是我们*最终*觉得有机会引入它的地方。我们发现，当新概念被逐步引入时，人们通常学得最好，因此我们选择了相当缓慢的节奏。


    `<import>` 的作用应该相当明显：它将一个独立的配置文件导入到另一个配置文件中。它允许我们创建模块化的配置。


    我们将创建两个“模块”——即具有特定用途的配置。一个将是一组来自 `com.bsg6.chapter03.mem03` 包的 `Normalizer` 实例；另一个将是我们的
    `MusicServiceTests` 类。当我们将这两个配置导入到*第三个*配置中时，每个配置中的 Bean 将能够互相访问。


    不过，有一个问题：`mem03` 包中也包含一个 `MusicService` 实现！因此，我们将为 `<context:component-scan />`
    引入一个额外的属性，名为 `resource-pattern`。


    让我们开始构建我们的模块。首先，是最简单的一个，即 `MusicServiceTests` 的纯 XML 配置。我们不会改变我们已经见过的那个类的代码，所以没有注解；我们将使用一个简单的
    XML `<bean />` 标签，就像我们在第 2 章中看到的那样。


    ```


    清单 3-24

    chapter03/src/test/resources/musicservicetest.xml

    ```


    这个配置非常简单：它声明了一个名为 `musicServiceTests` 的 Bean，类型为 `com.bsg6.chapter03.MusicServiceTests`。因此，在任何引用了*此*文件的上下文中，`MusicServiceTests`
    都是一个有效的注入候选，我们稍后会看到。


    ```


    清单 3-25

    chapter03/src/test/resources/normalizers.xml

    ```


    在这里，我们看到了 `<context:component-scan />` 的 `resource-pattern` 注解。这个标签是对被扫描类的一个过滤器。这里，我们使用了
    `resource-pattern="*Normalizer.class"`，这意味着扫描中包含的类仅限于那些*以* `Normalizer` *结尾*的类——因此，也就是我们的
    `SimpleNormalizer` 和 `CapLeadingNormalizer` 类。


    我们为什么在这里使用 `resource-pattern`？嗯，我们实际上是在告诉系统只扫描 `com.bsg6.chapter03.mem03` 包中的**特定**类。如果我们不将扫描范围限制在规范化类上，我们也会导入
    `MusicService3`，而我们不希望将那个类包含在一个本应仅限于规范化器的配置中。


    这里使用的表达式是一个 Java 正则表达式，并包含了*整个*资源名称——默认情况下是 `**/*.class`，意思是“从 `base-package`
    指定的包开始的整个包树中，任何以 `.class` 结尾的文件。”


    然而，在 `normalizers.xml` 配置中，它被限制为“当前包中任何以 `Normalizer.class` 结尾的文件”，包设置为 `com.bsg6.chapter03.mem03`，因此它只会获取到我们的两个
    `Normalizer` 实现。


    现在，我们来看看我们的“主配置”是如何使用的，它展示了两个 `<import />` 标签的用法。这会创建一个“扁平化的配置”，使得任何加载 `config-04.xml`
    的组件不仅能看到 `config-04.xml` 加载的所有组件，还能看到 `normalizers.xml` 和 `musicservicetest.xml`
    加载的所有组件。


    ```


    清单 3-26

    chapter03/src/test/resources/config-04.xml

    ```


    事实上，让我们通过编写一个快速测试来证明这一点，该测试验证我们期望在配置中拥有的 Bean 是否可用。像往常一样，我们将使用 `@DataProvider`
    为参数化测试提供灵活的数据集。我们会做一些稍微不同的事情，即将 `String` 实例和 `Class` 引用都放入数据提供器中——然后检查类型以确定使用哪个
    `ApplicationContext getBean()` 方法。（可能有更简洁的方法来实现这一点，但老实说，这是一个一次性测试。我们不需要它完美，只需要它能满足我们的目的即可。^(⁵⁷)）


    ```

