    Note the use of specific annotations for HTTP `GET` and `POST` methods. For the
    methods annotated with `@GetMapping`, the parameters are embedded as part of the
    URL mapping itself, and these are all fairly simple methods.


    The `saveArtist()` method uses `@PostMethod`, though, and has a parameter of `Artist`.
    This means that an `Artist` model is expected to be passed to the method in the
    HTTP content – which is fairly standard for REST services. We don’t have to worry
    about doing any conversions from JSON or XML to our `Artist` class, though, because
    Spring takes care of all of that for us, as discussed in Chapter [6](#471370_2_En_6_Chapter.xhtml).


    We also see a method, called `handleArtistNotFound()`, that returns a `ProblemDetail`
    to the caller. Our example here is rather pitifully underspecified; it merely
    converts the exception to a `ProblemDetail` and adds a title to the report. If
    we had more fine-grained `ArtistNotFoundException` instances that differentiated
    between artists not being found by `id` or by `name`, we could have more fine-grained
    problem handlers and give far more information to callers about what the actual
    error is.


