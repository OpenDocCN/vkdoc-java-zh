- fmt: "### What’s up with that `INSERT`?\nBecause of the way we’re relying on autogenerated\
    \ keys for `ARTISTS`, we don’t want to rely on the database’s sequence retention.\
    \ Those `INSERT` statements are looking up matching `ARTISTS` for the insertion\
    \ of data. If the database manufactures a sequence for the primary keys for `ARTISTS`,\
    \ the assumption of the primary key would likely be wrong – this futureproofs\
    \ the SQL, a lesson your authors have had to learn the hard way. Thankfully, this\
    \ is a problem usually limited to test data generation.\n\nThe last class we want\
    \ to include here is a configuration. As we’re using Spring Boot, this configuration\
    \ relies on sensible defaults (or defaults constructed from `application.properties`)\
    \ – so it’s nearly completely empty, with the annotations driving everything.\n\
    \n```java\npackage com.bsg6.chapter08;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    @SpringBootApplication\npublic class JdbcConfiguration {\n}\n```\n\nHere, we’re\
    \ telling Spring that it’s a Spring Boot configuration, to scan this package (and\
    \ packages whose names start with this one, so any class in the `com.bsg6.chapter08`\
    \ package hierarchy) for Spring components, and to enable Spring Web configuration.\n\
    \nNow we finally get to start **doing things**. All this was necessary to varying\
    \ degrees, and all of it’s relevant, but it’s mostly been *preparatory* for actually\
    \ working with data.\n\n## Accessing Data\n\nLet’s revisit our `MusicService`,\
    \ as we’ve seen in Chapter [3](#471370_2_En_3_Chapter.xhtml) and in subsequent\
    \ chapters. Our service has five primary operations:\n\n- Retrieve songs for an\
    \ artist, ordered by popularity (the most popular song is the better “hook”).\n\
    - Retrieve song names for an artist (for use in autocompletion operations, which\
    \ we’re anticipating a more full-featured application would use).\n- Retrieve\
    \ a list of artist names (for use in autocompletion operations).\n- Record that\
    \ a song exists.\n- Vote for a song as a hook for a given `Artist`.\n\nThe mechanism\
    \ to implement these with `JdbcTemplate` is really rather easy. What we want to\
    \ do is have a class, `MusicService`, that receives a `JdbcTemplate` as an autowired\
    \ attribute. It can then use `JdbcTemplate.query()` and `JdbcTemplate.update()`\
    \ to issue SQL against the database as needed. Let’s take a look at what an implementation\
    \ of `MusicService` might look like with only one method implemented.\n\nProbably\
    \ the simplest of the methods in our requirements is the one to retrieve matching\
    \ artist names, such that if we pass in a “T” we get a list of strings reflecting\
    \ artist names that, well, start with the letter “T.” For simplicity’s sake, we’ll\
    \ make articles like “the,” “a,” and “an”^([^(94)](#fn94)) significant – that\
    \ is, “The Who” and “Who” are different band names for the purpose of matching\
    \ artists. There are definitely ways of making the articles optional, and that\
    \ would actually be a good idea for an enhanced version of the API, but that’s\
    \ outside of the scope of this chapter.\n\nIf you’re interested, one way this\
    \ could be accomplished is by adding another field to the `Artist` table, a field\
    \ that contained the name with all of the articles stripped out. You might also\
    \ “stem” the remaining words – where “stemming” means translating the word to\
    \ its base, most simple form, so that a word like apply a translation phase called\
    \ “stemming” to the words to reduce them to their most rudimentary form; “improbably”\
    \ becomes “improb,” and “threadbare loaf” becomes `threadbar loaf`. Then you’d\
    \ use this artificial and internal-use-only content to do matches, perhaps in\
    \ combination with the actual band name. (After all, you would want a search for\
    \ “The Who” to work when typing `Th` and not just `Wh`.) This isn’t even beginning\
    \ to look at access patterns or machine learning for such purposes. As we said,\
    \ this is better left as an exercise for future enhancement, because this exercise\
    \ alone would fill a few chapters of a book.\n\nIf you’re interested, there are\
    \ some research papers on the topic, including:\n\n- “Algorithmic and user study\
    \ of an autocompletion algorithm on a large medical vocabulary”; [`www.sciencedirect.com/science/article/pii/S153204641100164X`](http://www.sciencedirect.com/science/article/pii/S153204641100164X).\n\
    - Apache Solr’s `Suggester` implementation, which can hide a lot of details from\
    \ you; [`https://lucene.apache.org/solr/guide/7_7/suggester.html`](https://lucene.apache.org/solr/guide/7_7/suggester.html).\n\
