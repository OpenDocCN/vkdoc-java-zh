    ### 在 Spring Boot 中处理异常


    我们创建自定义异常，是因为我们希望以不同的方式处理不同的路径。通用异常也能工作，但自定义异常允许我们为异常赋予语义含义，并精确地处理它。事实上，既然我们已经提到了异常，在查看
    `ArtistService.java` 的其余部分之前，我们应该先快速了解一下它。


    ```

    package com.bsg6.chapter07;

    import org.springframework.http.HttpStatus;

    import org.springframework.web.bind.annotation.ResponseStatus;

    @ResponseStatus(HttpStatus.NOT_FOUND)

    public class ArtistNotFoundException extends RuntimeException {

    public ArtistNotFoundException(String message) {

    super(message);

    }

    public ArtistNotFoundException(Exception e) {

    super(e);

    }

    }

    清单 7-16

    chapter07/src/main/java/com/bsg6/chapter07/ArtistNotFoundException.java

    ```


    这是一个非常普通的异常类，其中有一行我们真正需要关注：`@ResponseStatus(HttpStatus.NOT_FOUND)`。这告诉 Spring
    的 `@Controller`，此异常应映射到特定的 HTTP 状态码——在本例中，它是 404，对应“未找到”，正如其名称明确暗示的那样。如果我们没有设置显式的响应状态，这些异常将被视为服务错误，对应
    HTTP 状态码 500。使用精确的 HTTP 错误码意味着，如果此异常从 `Controller` 返回，它应被视为“资源未找到”——从名称来看，这**正是**它所代表的含义。（这似乎显而易见，但如果我们不指出来，就有些失职了。）


    同样值得指出的是，它继承自 `RuntimeException`。这在 Spring 的异常处理中很典型，因为这意味着我们不必在方法签名中指定抛出的异常，从而使代码更简洁。看待这种做法的方式有很多，但**大多数**语言都没有与
    Java 显式错误机制类似的东西，即使在 Java 虚拟机上也是如此，而且大多数程序员似乎也乐于编写更简洁的代码。


    现在我们可以查看 `ArtistRepository` 的其余部分了。一旦我们理解了所使用的方法重载，尽管类很长，但它实际上非常简单。另外值得注意的是：类上使用了
    `@Repository` 注解，并且通过 `DataSource` 进行构造。将其标记为 `@Repository` 描述了其特定的架构角色（它封装了与数据存储系统交互的行为），并使其能够参与转换某些异常类型（本章不介绍此功能）。


    ### `ArtistService` 及其小 `Controller` 的实际实现


    ```

    package com.bsg6.chapter07;

    import org.springframework.stereotype.Repository;

    import javax.sql.DataSource;

    import java.sql.Connection;

    import java.sql.PreparedStatement;

    import java.sql.ResultSet;

    import java.sql.Statement;

    import java.sql.SQLException;

    import java.util.ArrayList;

    import java.util.List;

    @Repository

    public class ArtistRepository {

    private DataSource dataSource;

    public ArtistRepository(DataSource dataSource) {

    this.dataSource = dataSource;

    }

    public Artist findArtistById(int id) throws SQLException {

    try (Connection conn = dataSource.getConnection()) {

    return findArtistById(conn, id);

    }

    }

    private Artist findArtistById(Connection conn, int id) {

    String sql = "SELECT * FROM artists WHERE id=?";

    try (PreparedStatement ps = conn.prepareStatement(sql)) {

    ps.setInt(1, id);

    try (ResultSet rs = ps.executeQuery()) {

    if (rs.next()) {

    return new Artist(id, rs.getString("name"));

    } else {

    throw new ArtistNotFoundException(id +

    " not found in artist database");

    }

    }

    } catch (SQLException e) {

    throw new ArtistNotFoundException(e);

    }

    }

    public Artist saveArtist(String name) throws SQLException {

    try (Connection conn = dataSource.getConnection()) {

    try {

    return saveArtist(conn, name);

    } catch (SQLException e) {

    e.printStackTrace();

    return findArtistByName(conn, name);

    }

    }

    }

    private Artist saveArtist(Connection conn, String name)

    throws SQLException {

    String sql = "INSERT INTO ARTISTS (NAME) VALUES (?)";

    try (PreparedStatement ps = conn.prepareStatement(sql, Statement.RETURN_GENERATED_KEYS))
    {

    ps.setString(1, name);

    ps.executeUpdate();

    try (ResultSet rs = ps.getGeneratedKeys()) {

    rs.next();

    int id = rs.getInt(1);

    return new Artist(id, name);

    }

    }

    }

    public Artist findArtistByName(String name) throws SQLException {

    try (Connection conn = dataSource.getConnection()) {

    return findArtistByName(conn, name);

    }

    }

    private Artist findArtistByName(

    Connection conn,

    String name

    ) throws SQLException {

    String sql = "SELECT * FROM artists WHERE LOWER(name)=LOWER(?)";

    try (PreparedStatement ps = conn.prepareStatement(sql)) {

    ps.setString(1, name);

    try (ResultSet rs = ps.executeQuery()) {

    if (rs.next()) {

    return new Artist(

    rs.getInt("id"),

    rs.getString("name")

    );

    } else {

    throw new ArtistNotFoundException(name +

    " not found in artist database");

    }

    }

    }

    }

    public List findAllArtistsByName(String name)

    throws SQLException {

    try (Connection conn = dataSource.getConnection()) {

    return findAllArtistsByName(conn, name);

    }

    }

    private List findAllArtistsByName(

    Connection conn,

    String name

    ) throws SQLException {

    String sql = "SELECT * FROM artists WHERE LOWER(name) LIKE LOWER(?)"

    + " ORDER BY name";

    List artists = new ArrayList();

    try (PreparedStatement ps = conn.prepareStatement(sql)) {

    ps.setString(1, name + "%");

    try (ResultSet rs = ps.executeQuery()) {

    while (rs.next()) {

    artists.add(new Artist(

    rs.getInt("id"),

    rs.getString("name")

    ));

    }

    }

    }

    return artists;

    }

    }

