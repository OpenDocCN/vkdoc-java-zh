    #### 标准化器接口


    这是一个简单的单访问方法接口，通过它我们可以以某种方式转换输入。默认的转换是去除输入字符串两端的空白字符，但实现类显然可以改变其行为。


    这只是一个*接口*。它有一个`transform`方法的默认实现；我们本可以将其做成一个基类，但我们选择将其做成接口，以便在本章后面用它来演示 Spring
