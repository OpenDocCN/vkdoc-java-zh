  raw: '### Handling Exceptions in Spring Boot


    We create custom exceptions because we want to handle the different paths in different
    ways. A generic exception would work, but a custom exception allows us to assign
    semantic meaning to the exception, and handle it precisely. In fact, now that
    we’ve mentioned the exception, we should take a quick look at it before looking
    at the rest of `ArtistService.java`.


    ```

    package com.bsg6.chapter07;

    import org.springframework.http.HttpStatus;

    import org.springframework.web.bind.annotation.ResponseStatus;

    @ResponseStatus(HttpStatus.NOT_FOUND)

    public class ArtistNotFoundException extends RuntimeException {

    public ArtistNotFoundException(String message) {

    super(message);

    }

    public ArtistNotFoundException(Exception e) {

    super(e);

    }

    }

    Listing 7-16

    chapter07/src/main/java/com/bsg6/chapter07/ArtistNotFoundException.java

    ```


    This is a very vanilla exception class, with one line that we really want to notice:
    `@ResponseStatus(HttpStatus.NOT_FOUND)`. This tells a Spring `@Controller` that
    this exception should map to a specific HTTP status code – in this case, it’s
    404, corresponding to “not found,” as the name clearly implies. If we don’t set
    an explicit response status, the exceptions will be considered service errors,
    which corresponds to HTTP status 500\. Using the precise HTTP error code means
    that if this exception gets returned from a `Controller`, it should be treated
    as a “resource not found” – which, from the name, is **exactly** what it represents.
    (This feels obvious, but we’d have been remiss if we didn’t point it out.)


    It’s also worth pointing out that it inherits from `RuntimeException`. This is
    typical for exceptions in Spring, as it means we don’t have to specify thrown
    exceptions in method signatures, keeping our code cleaner. There are many ways
    of looking at this practice, but **most** languages don’t have an analog to Java’s
    explicit error mechanisms, even on the Java Virtual Machine, and most programmers
    seem to be okay with writing less verbose code.


    Now we can look at the rest of the `ArtistRepository`. Once we understand the
    method overloading being used, it’s really pretty simple, despite the length of
    the class. Also worth noting: the use of `@Repository` on the class, and its construction
    with a `DataSource`. Marking it as a `@Repository` describes its specific architectural
    role (it encapsulates behavior that interacts with a data storage system) and
    enables its participation in translating some exception types (a feature we’re
    not going to describe in this chapter).


    ### The Actual Implementation of `ArtistService` and Its Little `Controller`,
    Too


    ```

    package com.bsg6.chapter07;

    import org.springframework.stereotype.Repository;

    import javax.sql.DataSource;

    import java.sql.Connection;

    import java.sql.PreparedStatement;

    import java.sql.ResultSet;

    import java.sql.Statement;

    import java.sql.SQLException;

    import java.util.ArrayList;

    import java.util.List;

    @Repository

    public class ArtistRepository {

    private DataSource dataSource;

    public ArtistRepository(DataSource dataSource) {

    this.dataSource = dataSource;

    }

    public Artist findArtistById(int id) throws SQLException {

    try (Connection conn = dataSource.getConnection()) {

    return findArtistById(conn, id);

    }

    }

    private Artist findArtistById(Connection conn, int id) {

    String sql = "SELECT * FROM artists WHERE id=?";

    try (PreparedStatement ps = conn.prepareStatement(sql)) {

    ps.setInt(1, id);

    try (ResultSet rs = ps.executeQuery()) {

    if (rs.next()) {

    return new Artist(id, rs.getString("name"));

    } else {

    throw new ArtistNotFoundException(id +

    " not found in artist database");

    }

    }

    } catch (SQLException e) {

    throw new ArtistNotFoundException(e);

    }

    }

    public Artist saveArtist(String name) throws SQLException {

    try (Connection conn = dataSource.getConnection()) {

    try {

    return saveArtist(conn, name);

    } catch (SQLException e) {

    e.printStackTrace();

    return findArtistByName(conn, name);

    }

    }

    }

    private Artist saveArtist(Connection conn, String name)

    throws SQLException {

    String sql = "INSERT INTO ARTISTS (NAME) VALUES (?)";

    try (PreparedStatement ps = conn.prepareStatement(sql, Statement.RETURN_GENERATED_KEYS))
    {

    ps.setString(1, name);

    ps.executeUpdate();

    try (ResultSet rs = ps.getGeneratedKeys()) {

    rs.next();

    int id = rs.getInt(1);

    return new Artist(id, name);

    }

    }

    }

    public Artist findArtistByName(String name) throws SQLException {

    try (Connection conn = dataSource.getConnection()) {

    return findArtistByName(conn, name);

    }

    }

    private Artist findArtistByName(

    Connection conn,

    String name

    ) throws SQLException {

    String sql = "SELECT * FROM artists WHERE LOWER(name)=LOWER(?)";

    try (PreparedStatement ps = conn.prepareStatement(sql)) {

    ps.setString(1, name);

    try (ResultSet rs = ps.executeQuery()) {

    if (rs.next()) {

    return new Artist(

    rs.getInt("id"),

    rs.getString("name")

    );

    } else {

    throw new ArtistNotFoundException(name +

    " not found in artist database");

    }

    }

    }

    }

    public List findAllArtistsByName(String name)

    throws SQLException {

    try (Connection conn = dataSource.getConnection()) {

    return findAllArtistsByName(conn, name);

    }

    }

    private List findAllArtistsByName(

    Connection conn,

    String name

    ) throws SQLException {

    String sql = "SELECT * FROM artists WHERE LOWER(name) LIKE LOWER(?)"

    + " ORDER BY name";

    List artists = new ArrayList();

    try (PreparedStatement ps = conn.prepareStatement(sql)) {

    ps.setString(1, name + "%");

    try (ResultSet rs = ps.executeQuery()) {

    while (rs.next()) {

    artists.add(new Artist(

    rs.getInt("id"),

    rs.getString("name")

    ));

    }

    }

    }

    return artists;

    }

    }

