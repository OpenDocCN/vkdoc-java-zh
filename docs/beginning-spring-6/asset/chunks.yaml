    matching artist names, such that if we pass in a “T” we get a list of strings
    reflecting artist names that, well, start with the letter “T.” For simplicity’s
    sake, we’ll make articles like “the,” “a,” and “an”^([^(94)](#fn94)) significant
    – that is, “The Who” and “Who” are different band names for the purpose of matching
    artists. There are definitely ways of making the articles optional, and that would
    actually be a good idea for an enhanced version of the API, but that’s outside
    of the scope of this chapter.


    If you’re interested, one way this could be accomplished is by adding another
    field to the `Artist` table, a field that contained the name with all of the articles
    stripped out. You might also “stem” the remaining words – where “stemming” means
    translating the word to its base, most simple form, so that a word like apply
    a translation phase called “stemming” to the words to reduce them to their most
    rudimentary form; “improbably” becomes “improb,” and “threadbare loaf” becomes
    `threadbar loaf`. Then you’d use this artificial and internal-use-only content
    to do matches, perhaps in combination with the actual band name. (After all, you
    would want a search for “The Who” to work when typing `Th` and not just `Wh`.)
    This isn’t even beginning to look at access patterns or machine learning for such
    purposes. As we said, this is better left as an exercise for future enhancement,
    because this exercise alone would fill a few chapters of a book.


    If you’re interested, there are some research papers on the topic, including


    *   “Algorithmic and user study of an autocompletion algorithm on a large medical
    vocabulary”; [`www.sciencedirect.com/science/article/pii/S153204641100164X`](http://www.sciencedirect.com/science/article/pii/S153204641100164X)`.`


    *   Apache Solr’s `Suggester` implementation, which can hide a lot of details
    from you; [`https://lucene.apache.org/solr/guide/7_7/suggester.html`](https://lucene.apache.org/solr/guide/7_7/suggester.html)`.`


    *   Naturally, with Java’s giant ecosystem, someone ported something from Python
    that can help quite a bit: Python’s `fuzzywuzzy` library. See [`https://github.com/xdrop/fuzzywuzzy`](https://github.com/xdrop/fuzzywuzzy)
    for more details.


    *   Lastly, a good overview that provides insight into autocomplete at Bing can
    be found at `https://`[`blogs.bing.com/search-quality-insights/September-2016/more-intelligent-autocomplete`](http://blogs.bing.com/search-quality-insights/September-2016/more-intelligent-autocomplete).^([^(95)](#fn95))


    Others can be found, although searching on Google (or Bing, or DuckDuckGo, or
    whatever search engine you prefer) will return a lot of user-interface-oriented
    autocompletion mechanisms and not so much server-side information. Good hunting!


    We’ll get to the full implementation of `MusicRepository` soon, but let’s look
    at an incomplete version just to get our feet wet with the API.


    ```

    @Repository

    public class MusicRepository {

    JdbcTemplate jdbcTemplate;

    MusicRepository(JdbcTemplate template) {

    jdbcTemplate=template;

    }

    @Transactional

    public List getMatchingArtistNames(String prefix) {

    String selectSQL = "SELECT name FROM artists WHERE " +

    "lower(name) like lower(?) " +

    "order by name asc";

    /*

    * Note use of Object[] for query arguments, and

    * the use of a lambda to map from a row to a String

    */

    return jdbcTemplate.query(

    selectSQL,

    new Object[]{prefix + "%"},

    (rs, rowNum) -> rs.getString("name"));

    }

    }

    Listing 8-9

    Part of chapter08/src/main/java/com/bsg6/chapter08/MusicRepository.java

    ```


    The core observations:


    *   `MusicRepository` is marked with `@Repository` and is therefore a Spring bean.


    *   We have a `JdbcTemplate` reference provided by the constructor; Spring will
    automatically provide this for us.


    *   We have a single method, annotated with `@Transactional`, that calls `JdbcTemplate.query()`.


    There are two things about `getMatchingArtistNames()` that we want to think about.
    The first is the `query()` call itself – what with this chapter centering on `JdbcTemplate`
    – and the other is about transaction support.'
  trans: "\n那个 `INSERT` 是怎么回事？由于我们依赖 `ARTISTS` 表的自动生成主键，因此不希望依赖数据库的序列保留机制。那些 `INSERT`\
    \ 语句在插入数据时会查找匹配的 `ARTISTS` 记录。如果数据库为 `ARTISTS` 的主键生成了序列，那么主键的假设很可能是错误的——这能让 SQL\
    \ 具备前瞻性，是作者们不得不通过惨痛教训才学到的一课。幸运的是，这个问题通常只限于测试数据生成。\n\n我们想在这里包含的最后一个类是配置类。由于我们使用的是\
    \ Spring Boot，该配置依赖于合理的默认值（或从 `application.properties` 构建的默认值）——因此它几乎完全是空的，所有功能都由注解驱动。\n\
    \n```\npackage com.bsg6.chapter08;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    @SpringBootApplication\npublic class JdbcConfiguration {\n}\n清单 8-8\nchapter8/src/main/java/com/bsg6/chapter08/JdbcConfiguration.java\n\
    ```\n\n在这里，我们告诉 Spring 这是一个 Spring Boot 配置，要扫描此包（以及包名以此开头的包，即 `com.bsg6.chapter08`\
    \ 包层级下的所有类）以查找 Spring 组件，并启用 Spring Web 配置。\n\n现在我们终于可以开始**做事情**了。所有这些在不同程度上都是必要的，并且都是相关的，但大部分只是*准备工作*，为的是真正处理数据。\n\
    \n## 访问数据\n\n让我们重新审视一下 `MusicService`，正如我们在第 3 章及后续章节中所见。我们的服务有五个主要操作：\n\n*  \
    \ 检索某个艺术家的歌曲，按流行度排序（最流行的歌曲是更好的“主打歌”）。\n\n*   检索某个艺术家的歌曲名称（用于自动补全操作，我们预计更完整的应用程序会用到此功能）。\n\
    \n*   检索艺术家名称列表（用于自动补全操作）。\n\n*   记录某首歌曲的存在。\n\n*   为某首歌曲投票，使其成为给定 `Artist` 的主打歌。\n\
    \n使用 `JdbcTemplate` 实现这些机制其实相当简单。我们要做的是创建一个类 `MusicService`，它将 `JdbcTemplate`\
    \ 作为自动注入的属性接收。然后，它可以根据需要使用 `JdbcTemplate.query()` 和 `JdbcTemplate.update()` 向数据库发出\
    \ SQL 语句。让我们看看仅实现了一个方法的 `MusicService` 可能是什么样子。\n\n我们需求中最简单的方法可能是检索匹配的艺术家名称，例如，如果我们传入一个“T”，就会得到一个字符串列表，反映的是以字母“T”开头的艺术家名称。为简单起见，我们将“the”、“a”和“an”^(⁹⁴)\
    \ 等冠词视为有效——也就是说，在匹配艺术家时，“The Who”和“Who”是不同的乐队名称。当然有办法让冠词成为可选项，这对于 API 的增强版本来说确实是个好主意，但这超出了本章的范围。\n\
    \n如果你感兴趣，实现这一点的一种方法是在 `Artist` 表中添加另一个字段，该字段包含去除所有冠词后的名称。你还可以对剩余单词进行“词干提取”——“词干提取”意味着将单词转换为其最基本的形式，以便对单词应用一个称为“词干提取”的转换阶段，将其简化为最原始的形式；“improbably”变成“improb”，“threadbare\
    \ loaf”变成“threadbar loaf”。然后，你可以使用这个人工的、仅供内部使用的内容来进行匹配，或许还可以结合实际的乐队名称。（毕竟，你希望当输入\
    \ `Th` 时，搜索“The Who”也能生效，而不仅仅是输入 `Wh` 时。）这甚至还没有开始考虑用于此类目的的访问模式或机器学习。正如我们所说，这最好留作未来增强的练习，因为仅此一项练习就足以写满一本书的好几章。\n\
    \n如果你感兴趣，有一些关于这个主题的研究论文，包括：\n\n*   “算法与用户研究：基于大型医学词汇表的自动补全算法”；[`www.sciencedirect.com/science/article/pii/S153204641100164X`](http://www.sciencedirect.com/science/article/pii/S153204641100164X)。\n\
    \n*   Apache Solr 的 `Suggester` 实现，它可以为你隐藏许多细节；[`https://lucene.apache.org/solr/guide/7_7/suggester.html`](https://lucene.apache.org/solr/guide/7_7/suggester.html)。\n\
    \n*   当然，借助 Java 庞大的生态系统，有人移植了 Python 中能提供很大帮助的工具：Python 的 `fuzzywuzzy` 库。更多详情请参见\
    \ [`https://github.com/xdrop/fuzzywuzzy`](https://github.com/xdrop/fuzzywuzzy)。\n\
    \n*   最后，可以在 `https://`[`blogs.bing.com/search-quality-insights/September-2016/more-intelligent-autocomplete`](http://blogs.bing.com/search-quality-insights/September-2016/more-intelligent-autocomplete)\
    \ 找到一篇关于 Bing 自动补全功能的优秀概述。^(⁹⁵)\n\n还可以找到其他资料，尽管在 Google（或 Bing、DuckDuckGo，或你喜欢的任何搜索引擎）上搜索会返回大量面向用户界面的自动补全机制，而服务器端的信息则不多。祝你好运！\n\
    \n我们很快就会介绍 `MusicRepository` 的完整实现，但先让我们看一个不完整的版本，以便初步了解这个 API。\n\n```\n@Repository\n\
    public class MusicRepository {\n    JdbcTemplate jdbcTemplate;\n    MusicRepository(JdbcTemplate\
    \ template) {\n        jdbcTemplate = template;\n    }\n    @Transactional\n \
    \   public List getMatchingArtistNames(String prefix) {\n        String selectSQL\
    \ = \"SELECT name FROM artists WHERE \" +\n                \"lower(name) like\
    \ lower(?) \" +\n                \"order by name asc\";\n        /*\n        \
    \ * 注意使用 Object[] 作为查询参数，\n         * 以及使用 lambda 将行映射为 String\n         */\n\
    \        return jdbcTemplate.query(\n            selectSQL,\n            new Object[]{prefix\
    \ + \"%\"},\n            (rs, rowNum) -> rs.getString(\"name\"));\n    }\n}\n\
    清单 8-9\nchapter8/src/main/java/com/bsg6/chapter08/MusicRepository.java 的一部分\n\
    ```\n\n核心观察点：\n\n*   `MusicRepository` 被标记为 `@Repository`，因此它是一个 Spring Bean。\n\
    \n*   我们有一个由构造函数提供的 `JdbcTemplate` 引用；Spring 会自动为我们提供这个引用。\n\n*   我们有一个方法，用 `@Transactional`\
    \ 注解，它调用了 `JdbcTemplate.query()`。\n\n关于 `getMatchingArtistNames()`，有两件事值得我们思考。第一是\
    \ `query()` 调用本身——鉴于本章以 `JdbcTemplate` 为核心——另一件事是关于事务支持。\n"
- fmt: "### `JdbcTemplate.query()`\n\nThere are nineteen variants of `query()` in\
    \ `JdbcTemplate`, and that’s not even counting query methods like `queryForMap`,\
    \ `queryForObject`, and `queryForList`, each of which has a series of overloaded\
    \ signatures available. (There are more than forty methods whose names start with\
    \ `query` in the `JdbcTemplate` class.) The one used in Listing [8-12](#471370_2_En_8_Chapter.xhtml#PC16)\
    \ is one of the simplest.\n\n```\npublic  List query(\nString sql,\n@Nullable\
    \ Object[] args,\nRowMapper rowMapper\n) throws DataAccessException\n```\n\nThe\
    \ first argument here is a SQL query. As with JDBC, an interrogative symbol –\
    \ `?`, the question mark – is used as a placeholder.\n\nThe second argument is\
    \ an array of `Object`. Each element of this array is placed into the SQL query,\
    \ corresponding with the ordinal position – which means that the first `?` is\
    \ replaced by the first element in the `Object[]`, the second `?` is replaced\
    \ by the second element in the `Object[]`, and so forth and so on.\n\nThis version\
    \ accepts a `RowMapper<T>` as a final argument. A `RowMapper<T>` is a simple interface\
    \ with one method (and returning a specific type, represented by `<T>`), making\
    \ it a “Single Access Method” class in Java – which means it can be represented\
    \ by a lambda. A `RowMapper<T>` is responsible for accepting a `ResultSet` and\
    \ a row number – an `int` – and mapping that row into a type of some kind; our\
    \ method for querying for artist names, then, is responsible for accepting a `ResultSet`\
    \ and returning an artist’s name from that `ResultSet`’s current row. In lambda\
    \ form, it looks like the following.\n\n```\n(rs, rowNum) -> rs.getString(\"name\"\
    )\n```\n\nIn “traditional Java” form, it would look a little longer.\n\n```\n\
    new RowMapper() {\n@Override\nString mapRow(ResultSet rs, int rowNum) throws SQLException\
    \ {\nreturn rs.getString(\"name\");\n}\n}\n```\n\nEither form is acceptable; they\
    \ both actually compile to nearly the same code in practice, and they accomplish\
    \ exactly the same thing.\n\nThis method, then, is horribly simple: it contains\
    \ a SQL statement, with a parameter placeholder, that retrieves artist names from\
    \ an `artists` table. The parameter is mangled to add a SQL wildcard character\
    \ (“%”) for use by the SQL `LIKE` operator, and the resulting data is translated\
    \ from a `ResultSet` into a single `String` for each row – and as `query()` returns\
    \ a typed `List`, we’re able to return the resulting `List<String>` to the caller.\
    \ (We could have used any Java type as the return type for a `RowMapper`; it just\
    \ so happens that here we’re working with simple `String` instances. We also don’t\
    \ need to worry about coercing the types, because the declarations give the compiler\
    \ enough information that the compiler knows what types are being returned.)\n\
    \nAs `query()` returns a `List`, we can then manipulate the `List`; however, we\
    \ like to get specific results. Consider a method where we might look an `Artist`\
    \ up by its `id`.\n\n```\n@Repository\npublic class MusicRepository {\n    JdbcTemplate\
    \ jdbcTemplate;\n    MusicRepository(JdbcTemplate template) {\n        jdbcTemplate\
    \ = template;\n    }\n    @Transactional\n    public Artist findArtistById(Integer\
    \ id) {\n        return jdbcTemplate.query(\n            \"SELECT id, name FROM\
    \ artists WHERE id=?\",\n            new Object[]{id},\n            (rs, rowNum)\
    \ ->\n                new Artist(\n                    rs.getInt(\"id\"),\n  \
    \                  rs.getString(\"name\")\n                )\n        )\n    \
    \    .stream()\n        .findFirst()\n        .orElse(null);\n    }\n}\n```\n\n\
    If you’re wondering about the lambda still, here’s the “traditional form.”\n\n\
    ```\nnew RowMapper() {\n    @Override\n    String mapRow(ResultSet rs, int rowNum)\
    \ throws SQLException {\n        return new Artist(\n            rs.getInt(\"\
    id\"),\n            rs.getString(\"name\")\n        );\n    }\n}\n```\n\nIn Listing\
    \ [8-10](#471370_2_En_8_Chapter.xhtml#PC13), we’re doing the same thing that we\
    \ saw in `getMatchingArtistNames()`, in structure. We have a simple SQL query\
    \ with a placeholder for the `id`, and we pass in an object array with the `id`\
    \ method parameter. We have a simple lambda (a one-liner, really, split apart\
    \ to respect page widths for print) just as we did in `getMatchingArtistNames()`,\
    \ except here we’re mapping the `ResultSet` to an `Artist` object.\n\nWe then\
    \ let Java’s Stream API grab the first result of the `List` – which will have\
    \ at most one entry. `Stream.findFirst()` returns an `Optional<T>`, so if the\
    \ `List<Artist>` is empty, we can convert that to a `null` with `Optional<T>.orElse()`.\
    \ We’ll see this pattern in other places of the `MusicRepository`, too, where\
    \ we search for data, and take action if it isn’t present.\n\nBefore we go too\
    \ much farther into `MusicRepository` – and before we see the actual full implementation\
    \ instead of snippets – let’s talk about `@Transactional` for a bit."
  raw: '### `JdbcTemplate.query()`


    There are **nineteen** variants of `query()` in `JdbcTemplate`, and that’s not
    even counting query methods like `queryForMap`, `queryForObject`, and `queryForList`,
    each of which has a series of overloaded signatures available. (There are more
    than forty methods whose names start with `query` in the `JdbcTemplate` class.)
    The one used in Listing [8-12](#471370_2_En_8_Chapter.xhtml#PC16) is one of the
    simplest.


    ```

    public  List query(

    String sql,

    @Nullable Object[] args,

    RowMapper rowMapper

    ) throws DataAccessException

    ```


    The first argument here is a SQL query. As with JDBC, an interrogative symbol
    – `?`, the question mark – is used as a placeholder.


    The second argument is an array of `Object`. Each element of this array is placed
    into the SQL query, corresponding with the ordinal position – which means that
    the first `?` is replaced by the first element in the `Object[]`, the second `?`
    is replaced by the second element in the `Object[]`, and so forth and so on.


    This version accepts a `RowMapper<T>` as a final argument. A `RowMapper<T>` is
    a simple interface with one method (and returning a specific type, represented
    by `<T>`), making it a “Single Access Method” class in Java – which means it can
    be represented by a lambda. A `RowMapper<T>` is responsible for accepting a `ResultSet`
    and a row number – an `int` – and mapping that row into a type of some kind; our
    method for querying for artist names, then, is responsible for accepting a `ResultSet`
    and returning an artist’s name from that ResultSet’s current row. In lambda form,
    it looks like the following.


    ```

    (rs, rowNum) -> rs.getString("name")

    ```


    In “traditional Java” form, it would look a little longer.


    ```

    new RowMapper() {

    @Override

    String mapRow(ResultSet rs, int rowNum) throws SQLException {

    return rs.getString("name");

    }

    }

    ```


    Either form is acceptable; they both actually compile to nearly the same code
    in practice, and they accomplish exactly the same thing.


    This method, then, is horribly simple: it contains a SQL statement, with a parameter
    placeholder, that retrieves artist names from an `artists` table. The parameter
    is mangled to add a SQL wildcard character (“%”) for use by the SQL `LIKE` operator,
    and the resulting data is translated from a `ResultSet` into a single `String`
    for each row – and as `query()` returns a typed `List`, we’re able to return the
    resulting `List<String>` to the caller. (We could have used any Java type as the
    return type for a `RowMapper`; it just so happens that here we’re working with
    simple `String` instances. We also don’t need to worry about coercing the types,
    because the declarations give the compiler enough information that the compiler
    knows what types are being returned.)


    As `query()` returns a `List`, we can then manipulate the `List;` however, we
    like to get specific results. Consider a method where we might look an `Artist`
    up by its `id`.


    ```

    @Repository

    public class MusicRepository {

    JdbcTemplate jdbcTemplate;

    MusicRepository(JdbcTemplate template) {

    jdbcTemplate=template;

    }

    @Transactional

    public Artist findArtistById(Integer id) {

    return jdbcTemplate.query(

    "SELECT id, name FROM artists WHERE id=?",

    new Object[]{id},

    (rs, rowNum) ->

    new Artist(

    rs.getInt("id"),

    rs.getString("name"

    )

    )

    )

    .stream()

    .findFirst()

    .orElse(null);

    }

    }

    Listing 8-10

    Part of chapter08/src/main/java/com/bsg6/chapter08/MusicRepository.java

    ```


    If you’re wondering about the lambda still, here’s the “traditional form.”


    ```

    new RowMapper() {

    @Override

    String mapRow(ResultSet rs, int rowNum) throws SQLException {

    return new Artist(

    rs.getInt("id"),

    rs.getString("name")

    );

    }

    }

    ```


    In Listing [8-10](#471370_2_En_8_Chapter.xhtml#PC13), we’re doing the same thing
    that we saw in `getMatchingArtistNames()`, in structure. We have a simple SQL
    query with a placeholder for the `id`, and we pass in an object array with the
    `id` method parameter. We have a simple lambda (a one-liner, really, split apart
    to respect page widths for print) just as we did in `getMatchingArtistNames()`,
    except here we’re mapping the `ResultSet` to an `Artist` object.


    We then let Java’s Stream API grab the first result of the `List` – which will
    have at most one entry. `Stream.findFirst()` returns an `Optional<T>`, so if the
    `List<Artist>` is empty, we can convert that to a `null` with `Optional<T>.orElse()`.
    We’ll see **this** pattern in other places of the `MusicRepository`, too, where
    we search for data, and take action if it isn’t present.


    Before we go too much farther into `MusicRepository` – and before we see the actual
    full implementation instead of snippets – let’s talk about `@Transactional` for
    a bit.'
  trans: '

    ### `JdbcTemplate.query()`


    `JdbcTemplate` 中的 `query()` 方法有**十九**种变体，这还不包括像 `queryForMap`、`queryForObject`
    和 `queryForList` 这样的查询方法，而每个方法又有一系列重载签名。（在 `JdbcTemplate` 类中，名称以 `query` 开头的方法有四十多个。）清单
    8-12 中使用的是其中最简单的一种。


    ```

    public  List query(

    String sql,

    @Nullable Object[] args,

    RowMapper rowMapper

    ) throws DataAccessException

    ```


    这里的第一个参数是一个 SQL 查询语句。与 JDBC 一样，使用问号 `?` 作为占位符。


    第二个参数是一个 `Object` 数组。该数组中的每个元素都会按顺序位置对应地填入 SQL 查询语句中——这意味着第一个 `?` 会被 `Object[]`
    中的第一个元素替换，第二个 `?` 会被第二个元素替换，以此类推。


    这个版本接受一个 `RowMapper<T>` 作为最后一个参数。`RowMapper<T>` 是一个简单的接口，只有一个方法（并返回由 `<T>` 表示的特定类型），因此它在
    Java 中属于“单一访问方法”类——这意味着它可以用 lambda 表达式来表示。`RowMapper<T>` 负责接收一个 `ResultSet` 和一个行号（`int`
    类型），并将该行映射为某种类型的对象；因此，我们用于查询艺术家姓名的方法负责接收一个 `ResultSet`，并从该 `ResultSet` 的当前行中返回艺术家的姓名。用
    lambda 形式表示如下：


    ```

    (rs, rowNum) -> rs.getString("name")

    ```


    如果用“传统 Java”形式表示，则会稍长一些：


    ```

    new RowMapper() {

    @Override

    String mapRow(ResultSet rs, int rowNum) throws SQLException {

    return rs.getString("name");

    }

    }

    ```


    两种形式都可以接受；实际上，它们在编译后生成的代码几乎相同，并且实现的功能完全一样。


    因此，这个方法非常简单：它包含一条 SQL 语句，带有一个参数占位符，用于从 `artists` 表中检索艺术家姓名。该参数会被处理，添加一个 SQL 通配符（“%”），供
    SQL 的 `LIKE` 运算符使用，然后将结果数据从 `ResultSet` 转换为每行一个单独的 `String` 对象——由于 `query()` 返回一个带类型的
    `List`，我们就能将得到的 `List<String>` 返回给调用者。（我们本可以使用任何 Java 类型作为 `RowMapper` 的返回类型；只是这里我们处理的是简单的
    `String` 实例。我们也不需要担心类型强制转换，因为声明给编译器提供了足够的信息，让编译器知道返回的是什么类型。）


    由于 `query()` 返回一个 `List`，我们可以对这个 `List` 进行操作；不过，我们更希望获得特定的结果。考虑一个通过 `id` 查找 `Artist`
    的方法：


    ```

    @Repository

    public class MusicRepository {

    JdbcTemplate jdbcTemplate;

    MusicRepository(JdbcTemplate template) {

    jdbcTemplate=template;

    }

    @Transactional

    public Artist findArtistById(Integer id) {

    return jdbcTemplate.query(

    "SELECT id, name FROM artists WHERE id=?",

    new Object[]{id},

    (rs, rowNum) ->

    new Artist(

    rs.getInt("id"),

    rs.getString("name"

    )

    )

    )

    .stream()

    .findFirst()

    .orElse(null);

    }

    }

    清单 8-10

    摘自 chapter08/src/main/java/com/bsg6/chapter08/MusicRepository.java

    ```


    如果你还对 lambda 表达式感到疑惑，这里是它的“传统形式”：


    ```

    new RowMapper() {

    @Override

    String mapRow(ResultSet rs, int rowNum) throws SQLException {

    return new Artist(

    rs.getInt("id"),

    rs.getString("name")

    );

    }

    }

    ```


    在清单 8-10 中，我们在结构上做的事情与 `getMatchingArtistNames()` 中看到的相同。我们有一个简单的 SQL 查询，其中包含一个用于
    `id` 的占位符，并传入一个包含 `id` 方法参数的对象数组。我们有一个简单的 lambda 表达式（实际上是一行代码，为了适应印刷页面宽度而拆分开来），就像在
    `getMatchingArtistNames()` 中一样，只不过这里我们将 `ResultSet` 映射为一个 `Artist` 对象。


    然后，我们让 Java 的 Stream API 获取 `List` 中的第一个结果——该列表最多只有一个条目。`Stream.findFirst()` 返回一个
    `Optional<T>`，因此如果 `List<Artist>` 为空，我们可以通过 `Optional<T>.orElse()` 将其转换为 `null`。我们还会在
    `MusicRepository` 的其他地方看到**这种**模式，即我们搜索数据，并在数据不存在时采取相应操作。


    在进一步深入探讨 `MusicRepository` 之前——以及在我们看到完整的实际实现而非代码片段之前——我们先来聊聊 `@Transactional`。

    '
- fmt: '# `@Transactional`


    If you recall Chapter [7](#471370_2_En_7_Chapter.xhtml)’s database interaction
    service, we only supported working with `Artist` entities, for a few reasons.


    One reason was that we knew that the code was going to be thrown away (in this
    chapter, in the section you’re reading **right now**), and adding support for
    `Song` wasn’t going to add any value to the service; the `Artist` support was
    enough to communicate the points we were trying to understand.


    The main reason, though, was that our code wasn’t structured in a way that made
    supporting transactions very easy. With Spring’s data access tools (like `JdbcTemplate`)
    in our toolbox, we can indicate that methods are expected to participate in a
    transaction very easily.


    What `@Transactional` means is that the method annotated needs to run in a *transaction
    context* of some sort, which might even include “no transaction at all.” A transaction
    context is referred to as its *propagation*. The default propagation is `REQUIRED`,
    which means that if a transaction has not yet been started, one *should* be started;
    you can also have `REQUIRES_NEW`, which says that a new transaction will be started
    for the method call even if a transaction has been started (which …​ may or may
    not work, depending on your datastore and configuration), and `SUPPORTS`, which
    says that transaction semantics will be respected if a transaction has already
    been started, but the method will execute non-transactionally if there is no transaction.


    | Propagation | Description |

    | --- | --- |

    | `REQUIRED` | This will participate in a transaction that’s already begun, or
    will create a transaction if none exists. |

    | `SUPPORTS` | This will participate in a transaction that’s already begun, or
    will execute non-transactionally if none exists. |

    | `REQUIRES_NEW` | This will suspend a transaction if one is already underway,
    and begin a new one; the old transaction will be resumed when the new transaction
    completes. This may not work in all contexts. |

    | `MANDATORY` | This will participate in a transaction if one currently exists,
    and will throw an exception if a transaction does **not** already exist. |

    | `NOT_SUPPORTED` | This will suspend a transaction if one is underway, and will
    execute outside of the context of a transaction. |

    | `NEVER` | This is the inverse of `MANDATORY`; it will throw an exception if
    a transaction is underway. If there’s no current transaction, it will execute
    non-transactionally. |

    | `NESTED` | This will create a new transaction **within** a currently running
    transaction (if one is underway). This may not work in all contexts, as the transaction
    manager being used needs to support nested transactions. |


    A `@Transaction` annotation can also specify that a transaction context is read-only
    (with the `readOnly` attribute, which accepts a `boolean`: therefore, it would
    look like `@Transaction(readOnly=true)` in use).


    Another attribute of a transaction is `isolation`, which affects the visibility
    of actions taken by the transaction before the transaction is committed. For example,
    imagine if a transaction that takes five seconds to run deletes a record in the
    first 50 milliseconds of the transaction; should *other* transactions be able
    to see the effect of the deletion before the transaction is complete? There are
    four specific isolation levels allowed, with an additional level of `DEFAULT`
    being provided, which means to use the underlying default isolation level for
    the datastore.


    | Isolation level | Description |

    | --- | --- |

    | `READ_UNCOMMITTED` | This allows a row changed by one transaction to be read
    by another transaction before any changes have been committed. If the transaction
    fails, the second transaction might have invalid data. |

    | `READ_COMMITTED` | This prevents transactions from reading data that has been
    changed by other transactions, until the other transactions'' changes have been
    committed. |

    | `REPEATABLE_READ` | This prevents rows from being read with changes in them
    (much like `READ_COMMITTED`) but also prevents situations where queries re-fetch
    data if it’s been changed. Databases are odd, but this still makes sense when
    you go far enough down the rabbit hole. |

    | `SERIALIZABLE` | This prevents a transaction from seeing changed data (as in
    `REPEATABLE_READ`) but also enforces that the transaction cannot see data from
    *any* other live transactions until *this* transaction is done; it’s as if the
    transaction has a snapshot view of the data as it was when the transaction was
    begun. |

    | `NEVER` | This means that if a transaction is in progress when the method is
    called, an exception will be thrown! (This one is fairly rare in the real world,
    as far as your authors can tell; they’ve never seen it used.) |


    There are other fields for the `@Transactional` annotation; two of them are particularly
    worth pointing out, even though we don’t use them in this chapter.


    The first is `timeout`. If this is provided (with something like `@Transactional(timeout=5)`),
    the transaction will end with an exception if the transaction lasts longer than
    the timeout value. (The default is `-1`, which means “no timeout.”) This is valuable
    if you have a long-running transaction – or if you encounter a deadlock situation.


    A deadlock can occur when transactions require resources that aren’t available.
    For example, imagine if transaction “X” - `tX` - acquires a lock on resource `A`,
    and at the same moment, transaction “Y” - `tY` = acquires a lock on resource `B`.
    There’s no deadlock here yet – unless in the **next** moment `tX` tries to acquire
    a lock on `B`, while `tY` tries to acquire a lock on `A`. Neither `tX` nor `tY`
    can proceed, because the resources they need are locked by the other transaction.


    A transaction timeout will end the transactions after the timeout period ends,
    giving the program a chance to recover and proceed – and hopefully informing the
    programmer of the problem.


    There are lots of ways to address locks like this, but they’re outside of the
    scope of this book; you’d really need to consider the exact situation that causes
    the deadlock and the transactional capabilities of the specific database you’re
    using.


    With that said, a quick and simple rule of thumb is to **always** acquire resources
    in the same order – so `tX` and `tY` would always try to acquire resources `A`
    and `B` *in that order* so that `tY` wouldn’t proceed until `tX` was done with
    both `A` and `B`. This is, as stated, a “quick and dirty” rule of thumb, and that’s
    said very seriously; your specific problem domain may not allow such simple solutions.


    The `@Transactional` annotation also supports a number of properties related to
    **rollback**. A rollback will cancel all changes created by a transaction; all
    locks, updates, or deletes are cancelled by a rollback. (It’s a cancellation of
    the transaction, and restores the database to its status before the transaction
    was begun.)


    With `@Transactional`, you can add `rollbackFor`, followed by an array of classes
    that extend `Throwable`, or `rollbackForClassName`, followed by an array of class
    **names** – as strings, for example. If these exceptions are thrown by the annotated
    method, the transaction is rolled back as part of the method exit. There’s also
    a `noRollback` and `noRollbackForClassName` that indicate that the transactions
    are **not** rolled back if the exceptions are thrown by the methods. The default
    is to rollback on exceptions thrown by a `@Transactional` method – but it’s fully
    tuneable.


    The defaults are actually quite enough for our `MusicRepository`. Speaking of
    `MusicRepository`, let’s get back to it and actually see what the real, live implementation
    looks like, all 150+ lines of it.'
