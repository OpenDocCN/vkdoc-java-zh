    Note the use of the `name` attribute in the `constructor-arg` directive – it maps
    to the actual parameter named `initialValue`.


    And now a test that utilizes that configuration.


    ```

    package com.bsg6.chapter04;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.context.ApplicationContext;

    import org.springframework.test.context.ContextConfiguration;

    import org.springframework.test.context.testng.AbstractTestNGSpringContextTests;

    import org.testng.annotations.Test;

    import static org.testng.Assert.assertEquals;

    class SecondObject extends HasData {

    SecondObject(String initialValue) {

    setDatum(initialValue);

    }

    }

    @ContextConfiguration(locations = "/config-02.xml")

    public class TestLifecycle02 extends AbstractTestNGSpringContextTests {

    @Autowired

    ApplicationContext context;

    @Test

    public void validateConstruction() {

    HasData o1 = context.getBean(HasData.class);

    assertEquals(o1.getDatum(), "Initial Value");

    }

    @Test

    public void validateSecondObjectScan() {

    // we can look for the instance with anything

    // unique in its hierarchy.

    SecondObject o2 = context.getBean(SecondObject.class);

    assertEquals(o2.getDatum(), "Initial Value");

    }

    }

    Listing 4-7

    chapter04/src/test/java/com/bsg6/chapter04/TestLifeCycle02.java

    ```


    Our test here is simpler, because all we need to do is make sure the object built
    by Spring has the expected data value.


    Note, too, how the `context.getBean()` looks for matching objects: we do two tests
    and look up the bean using `HasData` and `SecondObject`, and validate that the
    data referred to by the instance is the same (as the configuration specifies)
    in both cases.


    ### Calling Methods After Construction and Before Destruction


    We can also call methods after object construction and, oddly, before the context
    drops all references it is managing. This is done in XML with the `init-method`
    and `destroy-method` attributes.


    The `destroy-method` is not the same as a Java finalizer, although it can serve
    some of the same roles; if the `ApplicationContext` is able to be closed (through
    the well-named `close()` method, first seen in `ConfigurableApplicationContext`
    in the class hierarchy), the context will call these methods before the context
    closes. This is not the same as finalization; if the classes have finalizers or
    utilize Java 9’s `Cleaner` facility, those methods will be called before garbage
    collection occurs.


    Note that `destroy-method` only applies to Spring beans that are singletons. Prototypes
    are created by Spring and then are considered to be unmanaged, once retrieved;
    Spring will construct them and pass them to your code, and then forget such instances
    exist. Therefore, the method indicated by `destroy-method` will not be called
    on prototyped instances; this is probably all right because `destroy-method` should
    be rarely used in any event, as one rarely closes Spring contexts in the first
    place.


    In other words, `destroy-method` is present to allow you to finely control when
    something might happen to a Spring bean, but it’s unlikely to be useful in ordinary
    development. That won’t stop us from demonstrating it, though!


    For both methods, there’s a contract the methods need to follow. They can be named
    anything valid (since we specify which methods are to be called), but the methods
    must not have a return value (they have to be declared of type `void`) and they
    cannot have method parameters.


    Here’s a configuration that shows the methods being specified.


    ```

    Listing 4-8

    chapter04/src/test/resources/config-03.xml

    ```


    What this means is that when Spring creates the `ThirdObject`, it will call `init()`
    after all construction has been finished, just as if the following code snippet
    were run.


    ```

    ThirdObject foo=new ThirdObject();

    foo.init();

    Listing 4-9

    A code snippet replicating init-method

    ```


    Our test source will define `ThirdObject` and create a static reference, called
    `semaphore`. (It’s not truly a semaphore, but it… could be?) This reference is
    set only by the `init` method; therefore, we can verify that the proper initialization
    methods are being followed. We also define a `destroy` method that sets the `semaphore`
    reference to null; it’s not a true semaphore, but it’s sort of acting like one
    for our test.


    > **Note:** A semaphore, in programming terms, is an object used to control access
    to resources. You might use a semaphore to indicate that an object is being used
    by a particular thread, so other threads should wait until the object is “available”
    before accessing it, for example. Java has semaphores built into its standard
    library in various forms, but a sort of “manual semaphore” is being used here
    for example’s sake only.


    The actual test itself uses a `ConfigurableApplicationContext` instead of an `ApplicationContext`,
    because we want to explicitly close the context after we’ve retrieved an object
    from it. The `ApplicationContext` interface does not define `close()`, whereas
    the `ConfigurableApplicationContext` implements `Closeable` (as well as `ApplicationContext`
    and `Lifecycle`, for that matter). The method visibility is the only reason we’re
    using `ConfigurableApplicationContext` – if it weren’t for `close()` not being
    defined on `ApplicationContext`, it would serve well for this test.


    The test method grabs a bean from the application context and then runs two simple
    verifications: one is that the bean instance looks correct (i.e., it has data
    matching what we expect), and the other is that the `semaphore` is populated.


    We then close the context and check the `semaphore` reference again – which, if
    `dispose()` has been called, will be set to `null`.


    ```

    package com.bsg6.chapter04;

    import org.springframework.context.ConfigurableApplicationContext;

    import org.springframework.context.support.ClassPathXmlApplicationContext;

    import org.springframework.test.context.ContextConfiguration;

    import org.testng.annotations.Test;

    import static org.testng.Assert.*;

    class ThirdObject extends HasData {

    static Object semaphore = null;

    public void init() {

    semaphore = new Object();

    }

    public void dispose() {

    semaphore = null;

    }

    }

    @ContextConfiguration(locations = "/config-03.xml")

    public class TestLifecycle03 {

    @Test

    public void testInitDestroyMethods() {

    ConfigurableApplicationContext context

    =new ClassPathXmlApplicationContext("/config-03.xml");;

    ThirdObject o1 = context.getBean(ThirdObject.class);

    assertNotNull(ThirdObject.semaphore);

    assertEquals(o1.getDatum(), "default");

    context.close();

    assertNull(ThirdObject.semaphore);

    }

    }

    Listing 4-10

    chapter04/src/test/java/com/bsg6/chapter04/TestLifeCycle03.java

