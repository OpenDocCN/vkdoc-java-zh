    `Listing 7-19` `chapter07/src/test/java/com/bsg6/chapter07/TestArtistController.java`


    Naturally, it looks more difficult than it actually is; it has a series of tests
    that follow the same pattern that we saw in `TestGreetingController`, in that
    they build a request and issue it against the `ArtistController` endpoint, then
    check for the expected HTTP response and the expected HTTP entity content (i.e.,
    it makes sure that we get the right HTTP status, and then we check the data the
    response contained). Most of the code is built around making assertions based
    on the data we know our database will contain; `artistData()` (one of our data
    provider methods) contains the `Artist` names and identifiers, and `artistSearches()`
    keeps track of the number of responses matching the content supplied (if the request
    contains `"Th,"` then artists `Threadbare Loaf` and `Therapy Zeppelin` should
    be returned, for a record count of `2`).


    There’s one method that needs to take place **after** `testSearches()` – `testSaveArtist()`
    – because `testSaveArtist()` mutates the database and potentially changes the
    result of one of the searches. It really wouldn’t matter which one executes first,
    but the order should be deterministic. (Otherwise, the methods won’t be able to
    predict the database state, and that’s not a good thing.)


