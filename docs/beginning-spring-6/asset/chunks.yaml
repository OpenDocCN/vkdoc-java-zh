    ## Lifecycle with Java Configuration


    Annotated beans are all well and good, but annotating the beans makes their configuration
    *global* – if you set an annotated bean’s name, it’s set for every instance of
    that class in the current classpath; compare that to XML, where you can have multiple
    beans of the same class, with different names and different property values.


    We’ve demonstrated how to set beans to different scopes with XML and annotations;
    there’s also the ability to use a configuration class as well, and scope applies
    here just like it does elsewhere. The advantage of a configuration class is that
    you can have multiple configuration classes present on the classpath at any time,
    which gives you the power and cleanliness of the annotated approach, with the
    flexibility of the XML approach.


    Let’s take one more look at a test. This one will create another object type extending
    `HasData` – this time named `NinthObject` – but the configuration will be stored
    in a local class called `Config08`. In it, there are two methods declared, `foo()`
    and `bar()`, and these methods are both marked with `@Bean` – which means that
    `foo()` will describe how to create a bean named `foo`, and `bar()` will describe
    how to name a bean named `bar`. We could, of course, provide annotation directives
    to rename the beans instead of using the method names, but that’s something we’ve
    already seen in Chapter [3](#471370_2_En_3_Chapter.xhtml).


    Just as with our annotation example, we can add `@Scope("prototype")` to our methods,
    which tells Spring the appropriate scope to use for beans with that name.


    We’re also changing the `@ContextConfiguration` for the test class, to refer to
    `Config08.class` instead of a named configuration file. Past that, though, everything
    looks similar (and acts the same as) what we saw in `TestLifecycle05.java` – we
    have a data provider that tells the test whether the class should be a singleton
    or not, and validates the instance references and instance data appropriately.


    Here’s the test source.


    ```

    package com.bsg6.chapter04;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.context.ApplicationContext;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.context.annotation.Scope;

    import org.springframework.test.annotation.DirtiesContext;

    import org.springframework.test.context.ContextConfiguration;

    import org.springframework.test.context.testng.AbstractTestNGSpringContextTests;

    import org.testng.annotations.DataProvider;

    import org.testng.annotations.Test;

    import java.util.UUID;

    import static org.testng.Assert.*;

    class NinthObject extends HasData {

    }

    @Configuration

    class Config08 {

    @Bean

    public NinthObject foo() {

    return new NinthObject();

    }

    @Bean

    @Scope("prototype")

    public NinthObject bar() {

    return new NinthObject();

    }

    }

    @ContextConfiguration(classes=Config08.class)

    @DirtiesContext(classMode = DirtiesContext.ClassMode.AFTER_CLASS)

    public class TestLifecycle08 extends AbstractTestNGSpringContextTests {

    @Autowired

    ApplicationContext context;

    @DataProvider

    Object[][] getReferences() {

    return new Object[][]{

    {"foo", true},

    {"bar", false}

    };

    }

    @Test(dataProvider = "getReferences")

    public void testReferenceTypes(String reference, boolean singleton) {

    HasData o1 = context.getBean(reference, HasData.class);

    String defaultValue = o1.getDatum();

    o1.setDatum(UUID.randomUUID().toString());

    HasData o2 = context.getBean(reference, HasData.class);

    if (singleton) {

    assertSame(o1, o2);

    assertEquals(o1, o2);

    assertNotEquals(defaultValue, o2.getDatum());

    } else {

    assertNotSame(o1, o2);

    assertNotEquals(o1, o2);

    assertEquals(defaultValue, o2.getDatum());

    }

    }

    }

