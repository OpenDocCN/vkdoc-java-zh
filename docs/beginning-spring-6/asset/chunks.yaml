    # 11. Spring Batch and Modulith


    In this chapter, we’re going to talk about two recent but lesser known libraries
    in the Spring Framework ecosystem: Spring Batch and Spring Modulith. Both can
    aid in providing useful tooling around functions we all have to deal with in software
    development, and provide some guidance and needed structure as part of the framework
    we all love.


    ## Introduction to Batch


    Batch [`https://spring.io/projects/spring-batch`](https://spring.io/projects/spring-batch)
    is a set of lightweight functions built with the robustness to be integrated in
    an enterprise context. The features available in batch are


    *   Transaction management


    *   Chunk-based processing


    *   Declarative I/O


    *   Start/Stop/Restart


    *   Retry/Skip


    *   Web-based administration interface with Spring Cloud Data Flow [`https://dataflow.spring.io/`](https://dataflow.spring.io/)


