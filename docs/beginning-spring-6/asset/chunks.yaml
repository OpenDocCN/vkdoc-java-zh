    First, the configuration. This one will use `<constructor-arg />` instead of `<property
    />`. The `<constructor-arg />` node has the following attributes available.


    **Table 3-2** Attribute list


    | Attribute | Meaning | Description |

    | --- | --- | --- |

    | `type` | This is the type of the argument, if it cannot be derived from the
    value | Must match the type hierarchy |

    | `value` | This is the value of the argument, which must be easily coerced into
    the `type` | This cannot co-exist with `ref` |

    | `ref` | This is a reference to another named Spring bean, by name | This cannot
    co-exist with `value` |

    | `name` | This is the name of the argument, as in the constructor’s source code
    | This cannot co-exist with `index` |

    | `index` | This is the index of the argument being set | This cannot co-exist
    with `name` |


    So let’s take a look at our `config-06.xml`, which does the same thing as `config-05.xml`,
    except with the constructor-only version of the `MusicService`.


    ```

    Listing 3-34

