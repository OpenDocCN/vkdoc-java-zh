    Java 应运而生，它可以在性能平平的本地台式机上编译。突然之间，为大型机运行而开发的应用程序成本降低了，因为除了运行应用程序之外，大型机不再那么重要。更重要的是，Java
    足够强大，能够将大型机的理念（“真正的程序在这里运行”）带入小型机甚至个人电脑等更小的机器中。


    J2EE 被创建为一个应用程序框架，为企业级开发提供了一套标准。它包含表示层和计算层等，并规定了这些层之间通信的正式标准。它还采用了“容器”的概念，可以将
    J2EE 模块（如 Web 模块和其他此类组件）部署到其中，而容器则代表了系统管理员的一个控制点。例如，管理员可以控制一个给定容器可以连接到特定数据库的连接数。


    上一段中最重要的词是“正式”。次重要的词是“控制”，即“容器管理员所拥有的控制”。


    Java 有一个称为“Java Bean”的概念，它旨在成为一个可部署的功能单元；你可以有一个遵循特定标准并代表某种相关操作的“Bean”；例如，你可能有一个
    Bean，用于在提供样本数据时计算曲线上的点，或者一个执行矩阵计算的 Bean。


    同样，J2EE 也有“企业级 Java Bean”（简称“EJB”）的概念，它是一个具有额外限制和功能的 Java Bean，主要集中在事务和远程调用能力上。一个
    EJB 在被调用时，代表了一次进程间通信，即使它与调用者位于同一位置。


    在实践中，这意味着每个 J2EE 程序员从一开始就能够设计出可工作的分布式架构。这绝非易事；分布式架构很难做对，而 J2EE 使得在独立机器上调用进程变得轻而易举。


    当然，这一切都是有代价的。


    EJB 的本质，尤其是在 J2EE 生命周期的早期，意味着当每次调用都可能成为远程调用时，每次调用都必须被视为远程调用来处理，并遵循特定的部署和开发周期（早期，你需要一个名为
    `ejbc` 的独立打包编译器来构建 EJB 运行所需的支持类）。并且，由于要求即使 EJB 不是远程的也要被视为远程的，EJB 运行缓慢。


    EJB 开发慢、测试慢、部署慢、调用慢。而且它们无处不在。


    《无 EJB 的 J2EE 开发》一书正是对这种根深蒂固思维模式的逻辑性回应。Rod Johnson 和 Juergen Hoeller 审视了 EJB 的使用方式（以及滥用方式），以及它们对开发者生产力的实际成本——就其提供的价值而言，这个成本确实非常高。要使用一个
    EJB，你不仅需要经历一个特殊的开发和部署周期，还必须在运行时查找它们，并在它们不可用时处理异常。


    ```

    // 获取应用程序的 JNDI 上下文

    Context ctx=new InitialContext();

    // Inferencer 是 EJB 的 Java 接口

    // 首先，我们必须获取“Home”对象，该对象

    // 可以为调用者创建 EJB

    // 部署者应该已经设置了名称，使其指向 /

    // 一个实际部署的 EJB 工件

    Object ref=ctx.lookup("java:comp/env/ejb/inferencer");

    InferencerHome home=

    (InferencerHome) PortableRemoteObject.narrow(

    ref,

    InferencerHome.class

    );

    // 现在，我们使用 home 对象来实际获取 EJB

    Inferencer engine=home.create();

    // 假设，使用输入生成推理...

    engine.generate(input);

    清单 1-1

    在过去查找 EJB 的方式

    ```


    在清单 1-1 中，你不仅需要编写代码来从其他地方获取一个可以创建 EJB 的组件^(⁸)，还必须*配置*该引用，然后还需要经历一套语义来获得可以实际调用你的
    EJB 的东西。但是，当这些远程语义很少被需要或期望时，为什么还要经历开发和远程语义的麻烦呢？尽管这些语义对你的代码产生了灾难性的影响，但它们很少是重要的；在
    2000 年代初期的一次 Java 研讨会上，与会者被问及有多少人使用 EJB，大多数人都举手了；下一个问题是，这些 EJB 中有多少是实际被远程调用的。答案是：根据传闻，大约只有百分之二。^(⁹)


    正是*这种*思维模式驱动了《无 EJB 的 J2EE 开发》一书的诞生——渴望将自由归还给编码者，为必要的复杂性编程提供支持。如果你需要调用一个远程服务，好吧，没有什么能阻止你这样做，但实际编码的经验表明，这很少是必要的，反而成为了完成工作的障碍。


    Rod 的主要见解是，EJB 可能很强大，但它们有点像把 V6 发动机绑在儿童自行车上。大多数开发者不需要它们，也不想要它们；EJB 只是恰好成为了*当时流行*的语言特性，结果导致开发速度变慢，部署更加困难^(¹⁰)，测试困难，配置也晦涩难懂。大多数开发者没有使用“正确的技术”来查找
    EJB，因为他们不想花时间配置 EJB 容器。配置容器也意味着重现条件更加困难。


    这真是一团糟。有时，它也算是一种富有成效的混乱；毕竟，这项技术是为了响应实际用户需求而创建的。但是，即使开发者能够利用它很好地完成实际工作，它也给这些开发者带来了沉重的负担，而且现有的实践并没有改善这种情况。这项技术甚至根本没有*允许*更好的实践。

