    `USER` roles, and a second account with just access to the `USER` role. Since
    we’re still working on keeping this simple, we’ll use the `InMemoryUserDetailsManager`^([^(105)](#fn105))
    which will allow us to essentially hardcode the users and return this in-memory
    manager which would be replaced by an actual security provider. You’ll notice
    that we make use of the previously defined method `passwordEncoder` so we can
    have a common method of encoding passwords available to the `UserDetailsService`
    that we return.


    **GrantedAuthority and Roles**


    It may be confusing at first to see two different distinctions for a user, one
    being `GrantedAuthority` and the other being `Role`. A `GrantedAuthority` is a
    privilege which is finer grained than a role, something like `READ_AUTHORITY`
    or `WRITE_AUTHORITY` and is purely arbitrary and up to you how to name or handle.
    Spring Security offers a method for this to check the authority `hasAuthority`.
    On the other end we have `Role` which can be a more coarse-grained definition
    of what a User is within your system. A `Role` can be used with the `hasRole`
    method, and is usually represented like `ADMIN` or `USER` or `SUPERUSER` – again
    it is arbitrary and up to you.


