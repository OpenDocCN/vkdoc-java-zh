    # 6. Spring Web


    In previous chapters, we’ve looked mostly at dependency injection – easily the
    “secret sauce” that made Spring so popular and useful – as well as looking into
    the beginnings of what Spring can do for web development. In this chapter we will
    dive into the Spring MVC library within the framework and continue to build on
    our band gateway application using this frontend library. The application will
    become more full-featured and remove all manual invocations and conversions with
    automated testing.'
