    As with the other examples we’ve used in this chapter, we can always supersede
    the default config in favor of our own custom implementation. There are a lot
    of methods available from the object returned from the `oauth2Login()` method
    are varied, but some that are pretty useful to configure and not accept the defaults
    are as follows:


    *   `loginPage("/my_login")` – Allows you to configure an endpoint to serve the
    login screen rather than the Spring Boot default


    *   `defaultSuccessUrl()` – The redirect to use upon success


    *   `failureUrl()` – The redirect to use should the login fail (i.e., the user
    uses invalid credentials)


    *   `successHandler()` – Custom logic handler for a successful user authentication
    which must implement `AuthenticationSuccessHandler` that generally would be a
    redirect or forward to a success page


    *   `failureHandler()` – Custom logic handler for authentication failure which
    implements `AuthenticationFailureHandler` that usually redirects to the authentication
    page to try again


    There are certainly more options which you can view more of within the documentation.
    See [`https://spring.io/projects/spring-security-oauth`](https://spring.io/projects/spring-security-oauth).


    We’ve only scratched the very surface of the power that exists in Spring Security.
    The subproject has support for the simple like HTTP BASIC, Digest, and Form-based
    authentication to the more complex like OpenID, JOSSO, and SSO using Central Authentication
    Service (CAS). It has integrations which allow you to pull data from LDAP, Kerberos,
    and even Windows NTLM. Functionality that you would expect for a security framework
    to provide, it offers, and with configurability at its core to modify to your
    heart’s content.


    The most important thing to remember is if you’re using anything standard or best-practice
    in the industry, Spring Security likely has you covered. If not, it is fully pluggable
    and customizable to work with your particular custom authentication implementations.


    ## The Road to Spring Security 7


    Our goal is to always be prepared, and while we talk about Spring Security 6.x,
    a quick mention of some upcoming changes with the next version is appropriate.
    In the next version the non-lambda configuration style will be deprecated in favor
    of the Lambda DSL. In all of the code we’ve seen above, we’re intentionally using
    the Lambda-style DSL for forward compatibility. Let’s see an example from our
    codebase.


    ```

    @Bean

    public SecurityFilterChain filterChain(HttpSecurity http) throws Exception {

    http

    .authorizeHttpRequests(authorize -> authorize

    .requestMatchers("/login")

    .permitAll()

    .requestMatchers("/dashboard")

    .hasRole("USER")

    .requestMatchers("/admin_dashboard")

    .hasRole("ADMIN")

    .anyRequest()

    .authenticated()

    )

    .formLogin(formLogin -> formLogin

    .loginPage("/login")

    .permitAll()

    );

    return http.build();

    }

    Listing 10-45

    Lambda DSL style example chapter10-custom/src/main/java/com/bsg6/chapter10/GatewaySecurityConfig.java

    ```


    According to the developers, this was done in an effort to reduce confusion as
    the nested `.and()` and multiple return types were increasingly impossible to
    debug. The new method always returns an instance of the `HttpSecurity` object
    for further configuration and keeps the configuration style more in line with
    other packages like Spring Integration and Spring Cloud Gateway. The Lambda DSL
    style also works similarly and can be applied for WebFlux.


