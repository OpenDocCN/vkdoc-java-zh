    when we could make `Set` work.


    We want to have another interface for testing purposes – a `Resettable`.^([^(46)](#fn46))
    This allows us to mark a component as being able to be reset – something useful
    for us during testing.


    There are multiple ways to accomplish resetting a class. This just happens to
    use an interface to expose `reset()` to other classes, so it meets some object-oriented
    design requirements while really contributing fairly little value. It’s just convenient
    for testing, especially when we haven’t explored the scope of references we get
    from Spring – which we’ll do more in Chapter [4](#471370_2_En_4_Chapter.xhtml)
    when we introduce the `prototype`.


    ```

    package com.bsg6.chapter03;

    public interface Resettable {

    void reset();

    }

    Listing 3-7

    chapter03/src/main/java/com/bsg6/chapter03/Resettable.java

    ```


    There’s not a lot going on here – we just want implementations to be easily marked
    as being able to be reset, and we want to know the entry point for actually causing
    the reset. Since we’re not insane, we’re going to call the method `reset()`.


    We’re also going to build a base class that implements each of those methods in
    both `MusicService` and `Resettable` to varying degrees. This class is going to
    be a little more verbose than it really should be, because it has to anticipate
    conditions that normal implementations shouldn’t have to. Let’s take a look at
    it, and then we’ll discuss what it’s doing and why.


    ```

    package com.bsg6.chapter03;

    import com.bsg6.chapter03.model.Artist;

    import com.bsg6.chapter03.model.Song;

    import java.util.*;

    import java.util.function.Function;

    import java.util.stream.Collectors;

    public abstract class AbstractMusicService implements MusicService, Resettable
    {

    private Map bands = new HashMap();

    protected String transformArtist(String input) {

    return input;

    }

    protected String transformSong(String input) {

    return input;

    }

    @Override

    public void reset() {

    bands.clear();

    }

    private Artist getArtist(String name) {

    String normalizedName = transformArtist(name);

    return bands.computeIfAbsent(normalizedName,

    s -> new Artist(normalizedName));

    }

    @Override

    public Song getSong(String artistName, String name) {

    Artist artist = getArtist(artistName);

    String normalizedTitle = transformSong(name);

    return artist

    .getSongs()

    .computeIfAbsent(normalizedTitle, Song::new);

    }

    @Override

    public List getSongsForArtist(String artist) {

    List songs = new ArrayList(

    getArtist(artist)

    .getSongs()

    .values()

    );

    songs.sort(Song::compareTo);

    return songs;

    }

    @Override

    public List getMatchingSongNamesForArtist(String artist,

    String prefix) {

    String normalizedPrefix = transformSong(prefix)

    .toLowerCase();

    /**

    * This is a fun operation!

    *

    * We get the artist''s songs, which are in a map.

    * We then get only the keys of the map, which are all we care about.

    * Next, we want to process those keys in a stream...

    * We filter the names by looking for titles that start with

    *    our prefix..

    * Then sort them in alphabetical order

    * And return them in a list.

    */

    return getArtist(artist)

    .getSongs()

    .keySet()

    .stream()

    .map(this::transformSong)

    .filter(name -> name

    .toLowerCase()

    .startsWith(normalizedPrefix))

    .sorted(Comparator.comparing(Function.identity()))

    .collect(Collectors.toList());

    }

    @Override

    public List getMatchingArtistNames(String prefix) {

    String normalizedPrefix = transformArtist(prefix)

    .toLowerCase();

    return bands

    .keySet()

    .stream()

    .filter(name -> name

    .toLowerCase()

    .startsWith(normalizedPrefix))

    .sorted(Comparator.comparing(Function.identity()))

    .collect(Collectors.toList());

    }

    @Override

    public Song voteForSong(String artistName, String name) {

    Song song = getSong(artistName, name);

    song.setVotes(song.getVotes() + 1);

    return song;

    }

    }

    Listing 3-8

    chapter03/src/main/java/com/bsg6/chapter03/AbstractMusicService.java

    ```


    There’s quite a lot going on in this class.


    First, we have two methods (`transformSong()` and `transformArtist()`) that do
    nothing but return their input parameters. These are functional stubs, or hooks;
    classes that extend the `AbstractMusicService` can (and probably should) override
    their behavior, possibly by delegating to a `Normalizer` instance. These methods
    are meant to be called in order to make sure `Song` and `Artist` names are in
    some sort of consistent form before use.


    Next we have our humble `reset()` method – which, true to its name, simply clears
    out the in-memory data structure.


    After the normalization methods, we have a private method, `getArtist()`, which
    maps a `String` into a valid `Artist` reference. If the `Artist` does not exist,
    we create an instance for future use. We then see the same pattern replicated
    in `getSong()`, with the main difference between the methods being that `getSong()`
    is exposed as part of the external API. (It fulfills the specification requirement
    of being able to create a `Song` without voting for it as a hook for the artist.)'
