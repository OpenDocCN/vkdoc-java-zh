- fmt: '# Introduction


    We’ve tended to progress from the simplest use of technology to more advanced,
    but this chapter will invert things slightly, starting with JPA; JDBC and SQL
    are base-level technologies (and are used under the hood of JPA), but the problem
    with JDBC is that it is, well, JDBC – and it relies heavily on a live data structure,
    something you’d see in a running database with a fully functional, realized schema.
    That means that there are aspects of rigid data access that may or may not work,
    depending on the database, because it is the “system of record,” the canonical
    description of what the data looks like. When we compile our application, we don’t
    know if the database even exists, or what the schema looks like, which makes automatic
    tooling for that database rather difficult.


    JPA, however, allows us to describe what the application should see as a data
    model. We can use a JPA data model and change the underlying structure all we
    like (as long as we also tell JPA what the underlying structure is), but we can
    also know at compile-time what the program sees as the data model. That means
    that when we first compile our application, regardless of whether the database
    exists or not, we can know how to expect to access our data (because it’s described
    in code) – which means we can have a high degree of assurance that our application
    will access the data correctly, if perhaps not efficiently.^([^(98)](#fn98))


    Why don’t we know if the data access is efficient or not? The answer is simple:
    we might design our object model in such a way that the database uses unindexed
    data, or more tables than it needs, for example, such that queries require table
    scans and so forth. JPA isn’t a magic bullet that gives you an excellent schema
    no matter how you describe the data; it’ll generally help you create a **functioning**
    schema, but you still have to understand how relational databases work to really
    fine-tune the data model. It sure would be nice to have magic performance sauce,
    though.


    We’re going to cover a few different storage mechanisms behind the Spring Data
    abstraction layer, but this chapter will hearken back to Chapters [3](#471370_2_En_3_Chapter.xhtml)
    and [8](#471370_2_En_8_Chapter.xhtml) and their usage of tests. Once we have the
    services working, it’s a trivial matter to add REST endpoints in front of the
    services (as we saw in Chapters [7](#471370_2_En_7_Chapter.xhtml) and [8](#471370_2_En_8_Chapter.xhtml)),
    so we’re not going to distract ourselves here by adding a web-enabled front end
    in this chapter.


    # General Architecture


    Spring Data extends the concept of a `Repository<T,ID>`, a generalized access
    layer for a given datastore and entity. We’ve already seen the `@Repository` annotation,
    but here we’ll see an interface (also called `Repository<T,ID>`, where `T` is
    the type being stored and `ID` is a primary key type, extended with `CrudRepository<T,ID>`
    and `PagingAndSortingRepository<T,ID>`) that Spring will implement **for** you
    (for the most part) via proxies.


    Proxies in Java aren’t really in scope for this book, unfortunately. With that
    said, though, here’s a very cursory overview of one method: you can define an
    object (called a `Proxy`) that intercepts method calls, and arbitrarily execute
    code in a handler object. Since the proxy has access to the method signatures
    of the calls and the instance being called, the handler can execute code before
    or after the actual method bodies – or it can avoid calling the actual method
    bodies in the first place.


    With classes that implement `Repository<T,ID>`, the interface is used to manufacture
    method bodies out of (nearly) whole cloth, and the effect is that we define a
    simple interface and Spring magically implements the interface for us. There’s
    obviously no *real* magic – it’s just a `Proxy` – but it makes using Spring Data
    a lot easier than it might have otherwise been.


    It’s worth noting that there are multiple mechanisms for proxies in Spring. The
    default is to use Java’s innate proxy mechanisms, but under certain circumstances,
    Spring will use a library called CGLIB and build a different kind of proxy with
    it instead.


    You will define the entity with Java, and then create an interface (or set of
    interfaces) to describe how to manipulate that entity in the data storage system.
    The `Repository<T,ID>` interface is just a marker, in and of itself; it has no
    methods, but indicates to Spring that implementations work with databases somehow.


    What’s the use of `Repository<T,ID>` if it has no methods?


    Well, sometimes you want to limit access to methods through the use of fine-grained
    interfaces. For example, one might have a `Controller` that has no ability to
    save entities; if we wanted to, we could define a `Repository<T,ID>` that only
    defined methods to read data, while the actual instance had methods to save or
    update entities. The `Controller` might receive a copy of the read-only interface
    from Spring, and therefore the **compiler** can enforce the requirement that it
    never save entities.


    The `CrudRepository<T,ID>` interface, which extends `Repository<T,ID>`, defines
    operations for reading, writing, updating, removing, and **even** querying the
    database – and Spring Data applies some magic such that you can even specify queries
    **in the interface** without you having to know how to actually query the database
    itself. In Chapter [7](#471370_2_En_7_Chapter.xhtml) we saw methods like `findAllArtistsByName()`,
    which selected all artists whose names matched a wildcard, without being case-sensitive;
    with Spring Data, we define a method **signature** in the repository and get nearly
    the same functionality. (We’d want to build the wildcard externally, although
    there **are** ways to do it with the interface itself.)


    ```

    public interface ArtistRepository

    extends Repository {

    List findLikeNameIgnoreCase(String name);

    }

    Listing 9-1

    Spring Data’s equivalent to findAllArtistsByName from Chapter 7

    ```


    Building a `Repository<T,ID>` involves three source files. For a given repository,
    you will have


    1.  A Spring configuration (which can, of course, serve for multiple repositories)


    2.  An entity type (an object that represents data), with a primary key of some
    sort


    3.  An interface that implements `Repository<T,ID>` (or `CrudRepository<T,ID>`,
    or `PagingAndSortingRepository<T,ID>`, in practice), with the entity type and
    its primary key type


    There are also variations of interface creation, to allow for different levels
    of method access. We’ll show some of these as we go through the chapter.


    ## An Important Note About Requirements


    This chapter will demonstrate accessing two database systems: an embedded H2 database
    (just as in Chapters [7](#471370_2_En_7_Chapter.xhtml) and [8](#471370_2_En_8_Chapter.xhtml))
    and a MongoDB database. We’re going to use a project that allows us to embed MongoDB,
    so you don’t have to have MongoDB running (or installed).'
  raw: '## Introduction


    We’ve tended to progress from the simplest use of technology to more advanced,
    but this chapter will invert things slightly, starting with JPA; JDBC and SQL
    are base-level technologies (and are used under the hood of JPA), but the problem
    with JDBC is that it is, well, JDBC – and it relies heavily on a live data structure,
    something you’d see in a running database with a fully functional, realized schema.
    That means that there are aspects of rigid data access that may or may not work,
    depending on the database, because it is the “system of record,” the canonical
    description of what the data looks like. When we compile our application, we don’t
    know if the database even exists, or what the schema looks like, which makes automatic
    tooling for that database rather difficult.


    JPA, however, allows us to describe what the application should see as a data
    model. We can use a JPA data model and change the underlying structure all we
    like (as long as we also tell JPA what the underlying structure is), but we can
    also know at compile-time what the program sees as the data model. That means
    that when we first compile our application, regardless of whether the database
    exists or not, we can know how to expect to access our data (because it’s described
    in code) – which means we can have a high degree of assurance that our application
    will access the data correctly, if perhaps not efficiently.^([^(98)](#fn98))


    Why don’t we know if the data access is efficient or not? The answer is simple:
    we might design our object model in such a way that the database uses unindexed
    data, or more tables than it needs, for example, such that queries require table
    scans and so forth. JPA isn’t a magic bullet that gives you an excellent schema
    no matter how you describe the data; it’ll generally help you create a **functioning**
    schema, but you still have to understand how relational databases work to really
    fine-tune the data model. It sure would be nice to have magic performance sauce,
    though.


    We’re going to cover a few different storage mechanisms behind the Spring Data
    abstraction layer, but this chapter will hearken back to Chapters [3](#471370_2_En_3_Chapter.xhtml)
    and [8](#471370_2_En_8_Chapter.xhtml) and their usage of tests. Once we have the
    services working, it’s a trivial matter to add REST endpoints in front of the
    services (as we saw in Chapters [7](#471370_2_En_7_Chapter.xhtml) and [8](#471370_2_En_8_Chapter.xhtml)),
    so we’re not going to distract ourselves here by adding a web-enabled front end
    in this chapter.


    ## General Architecture


    Spring Data extends the concept of a `Repository<T,ID>`, a generalized access
    layer for a given datastore and entity. We’ve already seen the `@Repository` annotation,
    but here we’ll see an interface (also called `Repository<T,ID>`, where `T` is
    the type being stored and `ID` is a primary key type, extended with `CrudRepository<T,ID>`
    and `PagingAndSortingRepository<T,ID>`) that Spring will implement **for** you
    (for the most part) via proxies.


    Proxies in Java aren’t really in scope for this book, unfortunately. With that
    said, though, here’s a very cursory overview of one method: you can define an
    object (called a `Proxy`) that intercepts method calls, and arbitrarily execute
    code in a handler object. Since the proxy has access to the method signatures
    of the calls and the instance being called, the handler can execute code before
    or after the actual method bodies – or it can avoid calling the actual method
    bodies in the first place.


    With classes that implement `Repository<T,ID>`, the interface is used to manufacture
    method bodies out of (nearly) whole cloth, and the effect is that we define a
    simple interface and Spring magically implements the interface for us. There’s
    obviously no *real* magic – it’s just a `Proxy` – but it makes using Spring Data
    a lot easier than it might have otherwise been.


    It’s worth noting that there are multiple mechanisms for proxies in Spring. The
    default is to use Java’s innate proxy mechanisms, but under certain circumstances,
    Spring will use a library called CGLIB and build a different kind of proxy with
    it instead.


    You will define the entity with Java, and then create an interface (or set of
    interfaces) to describe how to manipulate that entity in the data storage system.
    The `Repository<T,ID>` interface is just a marker, in and of itself; it has no
    methods, but indicates to Spring that implementations work with databases somehow.


    What’s the use of `Repository<T,ID>` if it has no methods?


    Well, sometimes you want to limit access to methods through the use of fine-grained
    interfaces. For example, one might have a `Controller` that has no ability to
    save entities; if we wanted to, we could define a `Repository<T,ID>` that only
    defined methods to read data, while the actual instance had methods to save or
    update entities. The `Controller` might receive a copy of the read-only interface
    from Spring, and therefore the **compiler** can enforce the requirement that it
    never save entities.


    The `CrudRepository<T,ID>` interface, which extends `Repository<T,ID>`, defines
    operations for reading, writing, updating, removing, and **even** querying the
    database – and Spring Data applies some magic such that you can even specify queries
    **in the interface** without you having to know how to actually query the database
    itself. In Chapter [7](#471370_2_En_7_Chapter.xhtml) we saw methods like `findAllArtistsByName()`,
    which selected all artists whose names matched a wildcard, without being case-sensitive;
    with Spring Data, we define a method **signature** in the repository and get nearly
    the same functionality. (We’d want to build the wildcard externally, although
    there **are** ways to do it with the interface itself.)


    ```

    public interface ArtistRepository

    extends Repository {

    List findLikeNameIgnoreCase(String name);

    }

    Listing 9-1

    Spring Data’s equivalent to findAllArtistsByName from Chapter 7

    ```


    Building a `Repository<T,ID>` involves three source files. For a given repository,
    you will have


    1.  A Spring configuration (which can, of course, serve for multiple repositories)


    2.  An entity type (an object that represents data), with a primary key of some
    sort


    3.  An interface that implements `Repository<T,ID>` (or `CrudRepository<T,ID>`,
    or `PagingAndSortingRepository<T,ID>`, in practice), with the entity type and
    its primary key type


    There are also variations of interface creation, to allow for different levels
    of method access. We’ll show some of these as we go through the chapter.


    ### An Important Note About Requirements


    This chapter will demonstrate accessing two database systems: an embedded H2 database
    (just as in Chapters [7](#471370_2_En_7_Chapter.xhtml) and [8](#471370_2_En_8_Chapter.xhtml))
    and a MongoDB database. We’re going to use a project that allows us to embed MongoDB,
    so you don’t have to have MongoDB running (or installed).'
