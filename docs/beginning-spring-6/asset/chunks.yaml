  trans: '

    ## Rod 与 Juergen 改变（Java）世界


    在《无 EJB 的 J2EE 开发》一书中，Rod（还有 Juergen，不过为了简洁我简称为 Rod，希望 Juergen 不要介意！）勾勒出了一套 J2EE
    开发流程，该流程聚焦于六大主题：


    *   **简单性**

    *   **生产力**

    *   **面向对象的根本重要性**

    *   **业务需求的首要地位**

    *   **经验过程的重要性**

    *   **可测试性的重要性**^(¹¹)


    除了这些主题显然相当重要之外，认识到这些主题在典型的 J2EE 开发中属于*次要*关注点也同样重要。


    例如，EJB 旨在提供对远程服务的*通用*访问，因此开发一个 EJB 意味着要创建能通过复杂协议调用的东西，同时还要处理相当复杂的事务问题。如果这*确实是你需要的*，那么
    EJB 没问题……但大多数开发者*并不*需要担心 CORBA，^(¹²) 而且他们的事务需求通常非常简单。EJB 代表了*应用程序*本身并不需要的复杂性。


    如果应用程序不需要这种复杂性，但程序员却必须了解它，那么这种复杂性就代表了开发中直接且不可避免的沉没成本。


    此外，EJB 的工作方式往往不像 Java。它们代表的是功能端点，而非自包含的对象。设计 EJB 意味着要跳出最初使 Java 变得有用的那些范式。


    Spring 的设计初衷是改变企业级开发，使其优先考虑——嗯，所有这六大主题。它被设计得简单（因此高效，并且理所当然地专注于实际业务需求）、面向对象，并且**可测试**，后者的价值难以估量。^(¹³)


    随后，《无 EJB 的 J2EE 开发》一书大放异彩，展示了一个自包含的应用上下文，尽管使用了 XML，但开发者使用起来远比 J2EE 那种分层的开发者/部署者模型要容易得多。它将权力交还给了开发者，并在此过程中提供了简单的方法来创建仅用于测试的对象（这是
    EJB 提供但实现起来非常困难的功能），以及改变应用对象获取资源方式的方法，使其对大多数开发者来说都合情合理。


    > **注意**

    >

    > XML 是一个出色的规范，但它也是一个*正式*的规范，有时很难用好。像 JSON 和 YAML 这样的其他标记语言已在日常使用中很大程度上取代了它，因为它们编写起来容易得多，而且在可靠性方面的权衡通常被认为是值得的。


    毕竟，如果你在 `FooFram` 中需要一个 `Widget`，通常不会认为在普通 Java 中 `FooFram` 应该以某种方式请求远程服务来提供一个
    `Widget`；通常的做法是在 `FooFram` 对象中有一个 `setWidget(Widget widget)` 方法。


    Spring 在让 Java 重新看起来像 Java 方面功不可没。客观的采用率尚不清楚，但可以肯定地说，Java 开发者对使用 Spring 进行开发的热情远高于传统的
    J2EE。然而，Spring 并非 J2EE 开发格局的正式组成部分。


    Spring 采用了一种近乎颠覆性的方法；你使用 J2EE，同时将 Spring 与 J2EE 结合使用来实际完成工作。这是一种奇特但有效的模式。Spring
    逐渐成为许多人的标准依赖；它是一种标准习惯用法，却并非任何标准的实际组成部分。


    通过创建社区流程，使得 Java 应用设计不再由圣何塞那些与世隔绝的架构师决定，更好的方法才成为可能。


    ## 杠杆：依赖注入


    Spring 引入到更广泛 Java 世界的核心设计模式现在被称为“依赖注入”。^(¹⁴) 在“传统 J2EE 方法”中，需要资源的对象会以确定性的方式获取该资源，并指定一个名称。（我想，你可以*查找*你想要的名称，但随后你必须查找*特定的名称*，这也好不到哪去。）提供哪个资源的控制权被交给了
    J2EE 应用服务器的管理员。


    对于使用 J2EE 的开发者来说，他或她必须扮演管理员的角色，并以某种方式配置名称服务。借用芭比娃娃的一句话，名称服务很难；你必须确保拥有符合条件的类型（说实话，门槛不高，因为大多数你想用名称服务的东西，按设计都是符合条件的），你必须知道如何确保对象被正确构造，你必须知道如何*为你的特定应用服务器*设置名称和资源，然后你还必须知道如何设置特定于应用的、重定向后的名称——再次强调，是针对每个应用服务器，因为虽然大多数服务器相似，但它们并不完全相同。


    这是一个非常强大的想法，但它超出了大多数开发者想要做的范围——而且许多开发者只做了最低限度的工作，甚至懒得为资源设置本地名称。这也使得测试变得非常困难，因为你不能仅仅在测试中使用一个
    `Widget`，你必须**部署**一个 `Widget`，为它设置一个名称，然后让你的对象在测试中*查找*这个 `Widget`。这当然是可行的——程序员通常富有创造力和干劲——但这也很痛苦。


    然而，通过依赖注入，想要 `Widget` 的对象不再需要*查找* `Widget`。现在，当需要一个 `Widget` 的对象被构造时，依赖注入框架（在本书中，就是
    Spring！）会立即*提供*一个 `Widget`。^(¹⁵) 依赖注入框架通过几种不同的方式收集关于 `Widget` 的信息：最简单的方式（也是最早的方式）就是创建一个
    XML 文件，其中包含对 `Widget` 的引用以及需要它的类。在 Java 和 Spring 的后续版本中，可以*搜索*应用代码以查找可注入资源的可能实例，这使得简单应用的配置变得非常轻量。


    当程序员为 J2EE 设计代码时，他们受制于 J2EE 的思维模式；用 J2EE 做的每一件事都涉及大量的 J2EE 工作。你无法在不涉及 JNDI 配置的情况下测试使用了
    EJB 的代码——一个简单的测试可能必须启动一个 JNDI 容器（可能还有 EJB 容器），同时填充 JNDI 数据集并确保 EJB 能够被解析。这些实际上都不是在**测试服务**——它们只是为了让你能够*开始*测试服务而必须做的苦力活。这意味着要忍受容器的启动时间（即使在最好的情况下这也是浪费时间），以及花在测试配置上的时间，而且许多容器的启动时间很长。


    但如果*目标*是测试某些东西，实用主义会认为容器配置和启动时间*全部*都是浪费。


    通过依赖注入，你只需创建一个反映所需行为的 Java 类，并将其提供给你正在测试的类。你的测试甚至不必依赖于 Spring 或其他任何东西。举个例子，让我们考虑两种形式的“Hello,
    World”^(¹⁶)——EJB 版本（大约存在于 2005 年^(¹⁷)）和一种代表已准备好进行依赖注入的类结构的版本。

    '
- fmt: '### J2EE Hello World, As of 2005


    An EJB back in the first days of Spring needed at least three source files: an
    interface that described the contract for the EJB, a class that provided the actual
    executable code for the EJB, and a “home object” that was used to manage the EJB’s
    lifecycle (operations that took place when the EJB was created, or destroyed,
    among other lifecycle stages.) We’re not even going to go into the process of
    developing the actual deployment itself – this is *just* the Java class structure
    required at *runtime*. Deployment required **at least** one XML descriptor, with
    each container often requiring yet another container-specific XML file to connect
    resources inside the container’s JNDI tree. It was maddening, even in the *best*
    case…​ and the best cases were rather rare.^([^(18)](#fn18))


    ```

    interface HelloWorldEJB extends EJBObject {

    String sayHello(String name)

    throws RemoteException;

    }

    Listing 1-2

    The EJB interface

    ```


    In our `HelloWorldEJB`, we’re simply saying that we have one method that the EJB
    provides: `sayHello()`. Since this is an EJB, we have to anticipate the possibility
    of errors occurring due to the nature of EJBs being remoteable. It’s worth pointing
    out that even the *interface* of our EJB is affected by, well, being an EJB; we
    have to include the `EJBObject` interface. We can’t even develop this much of
    our EJB without being aware of the fact that it’s an EJB. This is *Not Good*;
    it represents technical debt to J2EE and we haven’t even done anything yet.


    ```

    public interface HelloWorldEJBHome  extends EJBHome {

    HelloWorldEJB create()

    throws RemoteException, CreateException;

    }

    Listing 1-3

    The EJB home object

    ```


    The `HelloWorldEJBHome` interface specifies how a concrete instance of `HelloWorldEJB`
    can be created. In our case, our interface demonstrates a stateless service (we
    don’t create it with a default target to greet, for example), so there’s nothing
    special for the creation process, yet we still need to create this interface.


    ```

    class HelloWorldEJBImplementation implements SessionBean {

    public String sayHello(String name) {

    if(name==null) {

    name="world";

    }

    return "hello, "+name+".";

    }

    }

    Listing 1-4

    The EJB implementation

    ```


    At least, we have meaningful code! It’s a simple method; if the argument is `null`,
    default to saying “Hello, World,” but otherwise greet the name provided to the
    method. It’s worth noting here that it doesn’t actually implement `HelloWorldEJB`
    – evidence of an antipattern, indeed, because we can’t ensure that it fulfills
    the correct specification to serve as a valid concrete instance of the `HelloWorldEJB`.


    ```

    ...

    try {

    Context ctx=new InitialContext();

    Object ref=ctx.lookup("java:comp/env/ejb/hello");

    HelloWorldEJBHome home= (HelloWorldEJBHome)

    PortableRemoteObject.narrow(

    ref, HelloWorldEJBHome.class);

    HelloWorldEJB greeter=home.create();

    System.out.println(greeter.sayHello("Andrew"));

    } catch(Throwable throwable) {

    /*

    bubble up to the next level of the application

    for all exception conditions, since we can

    handle none of them *here* - note that we''re

    handling CreateException, RemoteException,

    and NamingException with one catch block

    */

    throw new RuntimeException(

    throwable.getMessage(), throwable);

    }

    Listing 1-5

    The EJB client code

    ```


    This is what the *caller* of our EJB would have to do as a bare minimum. This
    doesn’t *test* our EJB; it only *calls* it. If we wanted to test our EJB out,
    we’d have to construct something similar to this, **deploy** our EJB, and add
    code to pass it known inputs and compare to expected outputs.^([^(19)](#fn19))


    I think it’s safe to say that this sounds like a burden…​ but this is what every
    J2EE developer had to endure.


    ### Spring’s Better Vision of Hello World


    Now let’s take a look at what Rod Johnson encouraged coders to create. We’ll have
    our contract (the interface), an implementation of that interface, and show client
    code that would use our `HelloWorldBean` – and then walk a little bit through
    some of the many reasons this implementation is better.


    ```

    package com.bsg6.hello;

    interface HelloWorld

    {

    String sayHello(String name);

    }

    Listing 1-6

    The HelloWorld interface

    ```


    Note how clean this interface is: it does nothing more than our EJB’s interface
    does (and in fact `HelloWorldEJB` could extend this interface, adding only the
    `EJBObject` interface as decoration). This class has no technical debt *anywhere*
    – not to Spring, not to J2EE.


    ```

    package com.bsg6.hello;

    public class HelloWorldImplementation implements HelloWorld {

    public String sayHello(String name)

    {

    if(name==null) {

    name="world";

    }

    return "Hello, "+name+".";

    }

    }

    Listing 1-7

    The HelloWorld implementation

    ```


    We see the same pattern with `HelloWorldImplementation` as we do with `HelloWorld`.
    It depends on the `HelloWorld` interface, of course, but that’s all. We have nothing
    in the class that’s not focused on actually fulfilling the contract of the `HelloWorld`
    interface. The `HelloWorldEJBImplementation` gets **close** to that idea, but
    has to implement `SessionBean` – and *is not supposed to* implement the interface
    that represents its contract. We’ve only displayed two example classes and we’ve
    got far less technical debt, and our classes conform to idiomatic Java – even
    the idioms of the day back in 2004 or so, when J2EE was king and dinosaurs ruled
    the Earth.


    ```

    package com.bsg6.client;

    public class Greeter

    {

    HelloWorld generator;

    void setGenerator(HelloWorld generator)

    {

    this.generator=generator;

    }

    public void displayHello(String name)

    {

    System.out.println(generator.sayHello(name));

    }

    }

    Listing 1-8

    The HelloWorld client

    ```


    Here, you see the `generator` reference points to a `HelloWorld` implementation.
    `Greeter` doesn’t instantiate a `HelloWorld` (although it could if it wanted);
    however, the idea here is that something *external* to `Greeter` provides a `HelloWorld`,
    and a `Greeter` just uses it. It doesn’t have to have any acquisition code, has
    no lookup code, it’s just an attribute on a regular Java class.


    `HelloBean` is too simple to actually *need* other implementations…​ but suppose
    we needed to wrap some other functionality into an implementation for testing
    or other diagnosis?^([^(20)](#fn20)) We could create the functionality and just
    use the new implementation for testing; our `Greeter` class doesn’t have to change,
    and we don’t have to do anything special to switch to our new implementation besides
    using it instead.


    *This* is dependency injection; we’re injecting the `HelloWorld` dependency when
    we need it.


    Spring not only recognized the power of this pattern, but the Spring framework
    provided tools to use it; you would define an XML file that named a `helloworld`
    bean (of type `com.bsg6.hello.HelloWorldImplementation`), as well as a `Greeter`
    instance, and would inject the `helloworld` reference into the `Greeter` automatically,
    with no source-level dependencies on Spring whatsoever.


    Spring added some technical debt, if you used certain aspects of the framework:
    you could have lifecycle hooks in your beans, for example, if you wanted them.
    (You could still configure lifecycle stages via XML, too, and avoid technical
    debt in the source files.) But Spring was, and is, largely pragmatic; you, as
    a developer, had the power to choose how much debt you wanted to incur, as opposed
    to J2EE’s mandated and often crushing technical debt.'
