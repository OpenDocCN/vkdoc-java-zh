  raw: 'Next, we have our `CapLeadingNormalizer`. The `transform()` method trims whitespace
    from the edges of the input, and then splits the string into words separated by
    whitespace and creates a `Stream`. It then filters out tokens that are blank and
    then (with `map()`) creates a word with a leading capitalized character and the
    rest of the word lowercased. It then joins the results into a single `String`
    as output. It looks (and sounds) more complicated than it is.


    ```

    package com.bsg6.chapter03.mem03;

    import com.bsg6.chapter03.Normalizer;

    import org.springframework.stereotype.Component;

    import java.util.StringJoiner;

    import java.util.stream.Stream;

    @Component("bar")

    public class CapLeadingNormalizer implements Normalizer {

    @Override

    public String transform(String input) {

    StringJoiner joiner = new StringJoiner(" ");

    Stream

    .of(input.trim().split("\\s"))

    .filter(s -> !s.isBlank())

    .map(s ->

    Character.toUpperCase(s.charAt(0)) +

    s.substring(1).toLowerCase()

    )

    .forEach(joiner::add);

    return joiner.toString();

    }

    }

    Listing 3-20

    chapter03/src/main/java/com/bsg6/chapter03/mem03/CapLeadingNormalizer.java

    ```


    Of course, now we have to wonder: will this code work? The simplest response is
    “of course it will,” but if you’re from Missouri like one of my favorite authors,
    that isn’t likely to fly. We had better cater to our readers from Missouri and
    demonstrate that this class does what it’s supposed to do, with a test.^([^(55)](#fn55))
    Our test can be really simple, simply feeding a set of inputs into our `Normalizer`
    and checking it against expected output.


    ```

    package com.bsg6.chapter03;

    import com.bsg6.chapter03.mem03.CapLeadingNormalizer;

    import org.testng.annotations.DataProvider;

