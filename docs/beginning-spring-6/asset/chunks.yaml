    \ does the work of interacting with a database – and we’ll call that one `com.bsg6.chapter07.ArtistRepository`.\
    \ Lastly, we’ll need something to connect the service to the web layer – a controller\
    \ – so, naturally, we’ll create a `com.bsg6.chapter07.ArtistController`.\n\n**Note**\n\
    \nIf you remember Chapter [3](#471370_2_En_3_Chapter.xhtml) well, you’ll recall\
    \ that we used a `MusicService` class there that handled all the things we needed\
    \ to do with our data model. Here, we’re splitting things out, as we said we were\
    \ going to do back in Chapter [3](#471370_2_En_3_Chapter.xhtml). The reason: expediency.\
    \ We chose to build the in-memory service in Chapter [3](#471370_2_En_3_Chapter.xhtml)\
    \ as we did because it was far easier to have a single point of control for our\
    \ data model, contained in a set of data structures. Here, we have an actual \"\
    system of record\" – the database – and it makes sense for us to split the interactions\
    \ out into smaller chunks, because we don’t have to worry about artists messing\
    \ around with songs, in terms of our data management.\n\nThe `Artist` class is\
    \ a simple POJO, with everything that implies: a no-argument constructor (a default\
    \ constructor), private fields, a constructor that will initialize the private\
    \ fields, accessors and mutators,^([^(92)](#fn92)) an implementation of `equals()`\
    \ and `hashCode()`, and a simple implementation of `toString()` as well. Almost\
    \ every bit of it was generated by an IDE once the fields were put into the class;\
    \ there’s nothing special or unique about this implementation at all. (The exceptions:\
    \ `compareTo()`, which ignores case for the artist names, and `equals()` was modified\
    \ to do the same thing.) It’s a long class, compared to what it does – it’s simply\
    \ a container for artist references, after all – but that’s the beauty (or “beauty”)\
    \ of Java.\n\n**Note**\n\nNaturally, we have options here. We chose a POJO for\
    \ `Artist` for simplicity’s sake; we could have used a Java `record` class, for\
    \ instance.\n\n```\npackage com.bsg6.chapter07;\nimport java.util.Objects;\nimport\
    \ java.util.StringJoiner;\npublic class Artist implements Comparable {\nprivate\
    \ int id;\nprivate String name;\npublic Artist() {\n}\npublic Artist(int id, String\
