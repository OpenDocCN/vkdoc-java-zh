- fmt: "### The Annotation-Based Web Application\n\nLet’s see how we can do two things:\
    \ one, build a working web application, and two, use a Spring context that programmatically\
    \ scans packages for Spring-annotated classes, for use by our Servlets. This application\
    \ is going to be called `anno`, not because we’re fond of Latin words for periods\
    \ of time, but because it’s much shorter to type than “annotation” or other variants\
    \ that might be more descriptive.\n\nLet’s write our “Hello, World” Servlet first,\
    \ because it allows us to get all of our pieces in place to integrate Spring for\
    \ our second and third Servlets.\n\nMaven has a package type that is designed\
    \ to create artifacts designed for web containers, called “web archives,” or –\
    \ more colloquially – “wars.” It also has a series of convenient plugins to run\
    \ a web application inside a container, which we’ll see in a few paragraphs.\n\
    \nFirst, we need to create the `chapter05-anno` directory itself.\n\n```\nmkdir\
    \ -p chapter05-anno/src/main/java/com/bsg6/chapter05\nmkdir -p chapter05-anno/src/main/resources\n\
    ```\n\n*Listing 5-5* Creating the directory structure with POSIX\n\nThe source\
    \ layout is nearly identical to our other projects’ source layouts.\n\nOur `pom.xml`\
    \ is where things start to get interesting. Note the addition of the extra things\
    \ in the `plugins` section, and note also the additional dependencies:\n\n- The\
    \ Servlet API itself, as in the `chapter05-api` module.\n- See also `spring-web`\
