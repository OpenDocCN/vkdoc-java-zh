- fmt: '# A Simple Application with Spring


    What have we done so far? We’ve built an “application” (in our test) that creates
    a `Greeter` and, after supplying it with instances of a `PrintStream` we can use
    to test, we exercise it. We are manually building the classes to inject into our
    `Greeter`, and we’re manually instantiating the actual `Greeter` implementation
    as well.


    Spring allows us to automate almost everything **but** the test itself – which
    we don’t really want to automate (although I suppose we could, given a scaffolding).
    We’re going to get Spring to do all of the object instantiation and injection
    for us; the power here is that if we should want to redirect to something different,
    all we need to do is change the actual objects being injected.


    Historically one of the most pervasive arguments for not using Spring was the
    configuration, which was written in namespaced XML.


    While there is definitely a programmatic way of implementing our Spring context,^([^(35)](#fn35))
    for purposes of this example, we’re going to stick with the XML file. Using the
    conventions from our build system, we can put the config file in `src/main/resources`
    and load it from the classpath.


    The header of our file below pulls in specifics that we’ll need from Spring which
    include the specs for beans.


    Note that most IDEs can generate Spring contexts, including most or all of this,
    for you.


    ```

    Listing 2-8

    applicationContext.xml XML header

    ```


    Let’s add our beans to the Spring config. In the section on testing, we checked
    the output of the `HelloWorldGreeter` by creating a String from a passed in `ByteArrayOutputStream`.
    When we wrote this out without using Spring, we were forced to create the `ByteArrayOutputStream`,
    `PrintStream`, and `HelloWorldGreeter` implementation like so.


    ```

    Greeter greeter = new HelloWorldGreeter();

    final ByteArrayOutputStream baos = new ByteArrayOutputStream();

    try (PrintStream ps = new PrintStream(baos,

    true,

    StandardCharsets.UTF_8)) {

    greeter.setPrintStream(ps);

    greeter.greet();

    }

    String data = baos.toString(StandardCharsets.UTF_8);

    assertEquals(data, "Hello, World!");

    Listing 2-9

    GreeterTest test to validate HelloWorldGreeter

    ```


    While the above is certainly fine, we can do the entire thing with the Spring
    context. We will create the `ByteArrayOutputStream` and `PrintStream` objects
    using the Spring context along with our `HelloWorldGreeter` which will take the
    `PrintStream` as a bean reference.


    Take a look at the following listing to see this in action.


    ```

    Listing 2-10

    chapter2/src/main/resources/applicationContext.xml

    ```


    With the above we can greatly simplify our test because Spring ends up doing all
    of the work by reading our configuration. We’re obviously (hopefully!) great proponents
    of testing so the way we’ll ensure everything is working is to spruce up our test
    with Spring.


    Lastly, we will look at our test class, with a focus on the new `testHelloWorld`
    method, and see how much it has simplified.


    The first thing is does is create an `ApplicationContext` reference, by instantiating
    a `ClassPathXmlApplicationContext`. This is a concrete instance of an `ApplicationContext`
    that loads a configuration file from the classpath. As you may (or may not) suspect,
    this is one of many possible concrete instances of `ApplicationContext`; for most
    simple uses, this is one that works quite well.


    Outside of the creation of the Spring context, the rest of the code is quite simple.
    With Spring injecting our `HelloWorldGreeter` into the test class, in our method
    we can simply call `greeter.greet()` and then convert the contents in the injected
    `ByteArrayOutputStream` into a `String` and assert that it equals what we expect.
    If all goes well, and it should, we’ll get a passing test now.


    ```

    package com.bsg6.chapter02;

    import org.springframework.context.ApplicationContext;

    import org.springframework.context.support.ClassPathXmlApplicationContext;

    import org.testng.annotations.Test;

    import java.io.ByteArrayOutputStream;

    import java.nio.charset.StandardCharsets;

    import static org.testng.Assert.assertEquals;

    public class SpringGreeterTest {

    @Test

    public void testHelloWorld() {

    ApplicationContext context =

    new ClassPathXmlApplicationContext(

    "/applicationContext.xml"

    );

    Greeter greeter = context.getBean("helloGreeter",

    Greeter.class);

    ByteArrayOutputStream baos = context

    .getBean("baos", ByteArrayOutputStream.class);

    greeter.greet();

    String data = baos.toString(StandardCharsets.UTF_8);

    assertEquals(data, "Hello, World!");

    }

    }

    Listing 2-11

    chapter02/src/test/java/com/bsg6/chapter02/SpringGreeterTest.java

    ```


    When we run this test – by running `mvn test`, in our top-level directory – we
    should see something equivalent to the following output.


    ```

    $ mvn test

    [INFO] -------------------------------------------------------

    [INFO]  T E S T S

    [INFO] -------------------------------------------------------

    [INFO] Running TestSuite

    SLF4J: No SLF4J providers were found.

    SLF4J: Defaulting to no-operation (NOP) logger implementation

    SLF4J: See https://www.slf4j.org/codes.html#noProviders for further details.

    [INFO] Tests run: 2, Failures: 0, Errors: 0, Skipped: 0, Time elapsed: 0.566 s
    - in TestSuite

    [INFO]

    Listing 2-12

    Truncated output of mvn test in root directory

    ```


    There’s no output for a successful test – only a successful build. Congratulations,
    programmer!


    One thing: it’s **very** important to note the class hierarchy of this test: it
    **must** extend `AbstractTestNGSpringContextTests` (or, if you’re using JUnit
    4, `AbstractJUnit4SpringContextTests`; JUnit 5 has a different extension mechanism,
    where you annotate a test class with `@ExtendWith(SpringExtension.class)` instead
    of altering the class hierarchy. The new base class of the test is where the context
    is loaded and any processing occurs, before the tests are run.^([^(36)](#fn36))


    If we ignore the extravagant lengths we went to do build a Hello, World app and
    think through the power that can come from loosely coupling our individual classes
    in a bigger application, the power of dependency injection really starts to shine.
    In this case we simply created and injected an `OutputStream` that gave us the
    ability to see what had been written into it; we could easily replace this with
    an `OutputStream` (or `Greeter`) that sent an email, or logged data, or performed
    a translation into different languages, or any other feature we can think of –
    and yet our client application doesn’t have to change, or even be aware of the
    differences.


    Since the configuration of the structure is **external** to the classes themselves,
    we can radically change the function of the program – while retaining a fairly
    high confidence that the program works as designed, because our object model is
    trivial to test, and our configuration is easily debugged.


    ## Next Steps


    In our next chapter, we’re going to shift gears a bit and dive into configuration
    and bean declaration with Spring.


    We’re going to expand on our small “Hello, World” example and start exercising
    more aspects that the Spring framework provides.^([^(37)](#fn37))


