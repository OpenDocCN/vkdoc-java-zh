  trans: "\n#### 测试 MusicRepository\n\n编写 `MusicRepository` 固然不错，但和往常一样，如果它实际上无法工作，那价值就不大。我们需要一个测试。幸运的是，我们早就写了一个——早在第\
    \ 3 章。这里展示的是对第 3 章（清单 3-16）中 `MusicServiceTests` 的修改，去掉了超类结构。\n\n第 3 章将 `MusicServiceTests`\
    \ 创建为一系列测试的抽象超类，这样我们就可以通过更改配置机制，针对 `MusicService` 的多个实现运行相同的测试。本章没有这个顾虑，因此这个测试在组织上稍微简单一些。执行测试的实际代码是相同的，尽管每个方法都略有不同，因为自第\
    \ 3 章以来，我们在工具箱中添加了诸如 `@BeforeMethod` 之类的东西。\n\n```\npackage com.bsg6.chapter08;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.boot.test.context.SpringBootTest;\n\
    import org.springframework.jdbc.core.JdbcTemplate;\nimport org.springframework.test.context.testng.AbstractTestNGSpringContextTests;\n\
    import org.testng.annotations.BeforeMethod;\nimport org.testng.annotations.Test;\n\
    import java.util.List;\nimport java.util.function.Consumer;\nimport static org.testng.Assert.assertEquals;\n\
    @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)\n\
    public class MusicRepositoryTest extends AbstractTestNGSpringContextTests {\n\
    @Autowired\nMusicRepository musicRepository;\n@Autowired\nJdbcTemplate jdbcTemplate;\n\
    private Object[][] model = new Object[][]{\n{\"Threadbare Loaf\", \"Someone Stole\
    \ the Flour\", 4},\n{\"Threadbare Loaf\", \"What Happened To Our First CD?\",\
    \ 17},\n{\"Therapy Zeppelin\", \"Medium\", 4},\n{\"Clancy in Silt\", \"Igneous\"\
    , 5}\n};\nvoid iterateOverModel(Consumer consumer) {\nfor (Object[] data : model)\
    \ {\nconsumer.accept(data);\n}\n}\nvoid populateData() {\niterateOverModel(data\
    \ -> {\nfor (int i = 0; i \nassertEquals(\nmusicRepository.getSong((String) data[0],\n\
    (String) data[1]).getVotes(),\n((Integer) data[2]).intValue()\n));\n}\n@Test\n\
    void testSongsForArtist() {\nList songs = musicRepository.getSongsForArtist(\"\
    Threadbare Loaf\");\nassertEquals(songs.size(), 2);\nassertEquals(songs.get(0).getName(),\
    \ \"What Happened To Our First CD?\");\nassertEquals(songs.get(0).getVotes(),\
    \ 17);\nassertEquals(songs.get(1).getName(), \"Someone Stole the Flour\");\nassertEquals(songs.get(1).getVotes(),\
    \ 4);\n}\n@Test\nvoid testMatchingArtistNames() {\nList names = musicRepository.getMatchingArtistNames(\"\
    Th\");\nassertEquals(names.size(), 2);\nassertEquals(names.get(0), \"Therapy Zeppelin\"\
    );\nassertEquals(names.get(1), \"Threadbare Loaf\");\n}\n@Test\nvoid testMatchingSongNamesForArtist()\
    \ {\nList names = musicRepository.getMatchingSongNamesForArtist(\n\"Threadbare\
    \ Loaf\", \"W\"\n);\nassertEquals(names.size(), 1);\nassertEquals(names.get(0),\
    \ \"What Happened To Our First CD?\");\n}\n}\n清单 8-12\nchapter08/src/test/java/com/bsg6/chapter08/MusicRepositoryTest.java\n\
    ```\n\n几点注意事项：\n\n首先，我们有一个用 `@BeforeMethod` 注解的方法。TestNG（以及其他测试框架）提供了在给定测试的不同阶段前后运行特定方法的机制；在这种情况下，我们希望在执行任何标记为\
    \ `@Test` 的方法之前运行 `clearDatabase()`（它会清空数据库，然后用已知数据填充它）。我们也可以在每次测试**之后**运行方法，使用\
    \ `@AfterMethod`，并且我们还有其他可用的注解，例如 `@BeforeClass` 和 `@BeforeTest`，每个都有其自身重要的行为。更多详情请参见\
    \ [`https://testng.org/doc/documentation-main.html#annotations`](https://testng.org/doc/documentation-main.html#annotations)。JUnit\
    \ 当然也有其对应的行为，即 `@BeforeEach` 和 `@BeforeAll`。\n\n其次，注意在类级别注解中使用了 `@SpringBootTest(webEnvironment\
    \ = SpringBootTest.WebEnvironment.RANDOM_PORT)`。在**这个**测试的上下文中，端口意义不大——但我们将在本章后面用到它，所以暂时请忍耐一下。我们在这里使用这个注解是因为配置本身（实际上，它是从本章其余部分的其它测试中复制过来的，因此成为了本书这一部分的标准做法）；这很简单，我们只是将其标记为支持\
    \ Web 的配置，因此为了正确运行完整的初始化，我们需要将此测试也标记为支持 Web。我们可以通过使用多个配置来避免这种情况，这些配置都绑定在一个“顶层”配置类中，但这除了避免需要一个注解以及在本书印刷时消耗更多纸张之外，几乎没有什么用处。\n\
    \n能够重用第 3 章的测试固然很好，但按原样编写基本上很困难——因为第 3 章测试的基类位于 `src/tests` 目录中，因此它不会被导出供其他项目使用。我们本可以创建一个\
    \ `testsupport` 项目，**确实**导出类供测试使用，但这对于这么早的章节来说会引入很多复杂性。我们将在第 9 章看到这种技术的应用，届时我们将希望为两个完全独立的持久层重用测试。\n\
    \n## 添加 REST 端点\n\n我们现在有了一个 `MusicService` 实现，它使用数据库通过 `JdbcTemplate` 存储数据——因此我们与数据库的交互相当安全、易于维护，并且对于任何稍微熟悉\
    \ SQL 的人来说都很清晰。是时候将所有内容整合到一个实际的 Web 应用程序中，以展示所有部分协同工作了。^(⁹⁷)\n"
- fmt: '### The `ArtistController`


    Let’s start small, by recreating our `ArtistController` from Chapter [7](#471370_2_En_7_Chapter.xhtml).
    (We can’t re-use the code because the underlying services have changed.) This
    is effectively the same code as in Chapter [7](#471370_2_En_7_Chapter.xhtml),
    except it adds a `decode()` method as mentioned briefly in Chapter [6](#471370_2_En_6_Chapter.xhtml)
    for completeness (we want to be able to handle band names with spaces, question
    marks, and other odd characters) and autowires the `MusicService` via the constructor.
    We’ll also need an `ArtistNotFoundException` just as in Chapter [7](#471370_2_En_7_Chapter.xhtml);
    we’re not including `ProblemDetail` because problem details are very important
    but they’re not in scope for *this* chapter.


    ```

    package com.bsg6.chapter08;

    import org.springframework.http.MediaType;

    import org.springframework.web.bind.annotation.*;

    import org.springframework.web.util.UriUtils;

    import java.nio.charset.Charset;

    import java.util.List;

    @RestController

    public class ArtistController {

    private MusicRepository service;

    ArtistController(MusicRepository service) {

    this.service = service;

    }

    String decode(Object data) {

    return UriUtils.decode(data.toString(), Charset.defaultCharset());

    }

    @GetMapping(value = "/artists/{id}",

    produces = MediaType.APPLICATION_JSON_VALUE)

    Artist findArtistById(@PathVariable int id) {

    Artist artist = service.findArtistById(id);

    if (artist != null) {

    return artist;

    } else {

    throw new ArtistNotFoundException();

    }

    }

    /*

    * if no artist name is provided, the exception path is

    * always chosen and an IllegalArgumentException is thrown.

    */

    @GetMapping(value = {"/artists/search/{name}", "/artists/search/"},

    produces = MediaType.APPLICATION_JSON_VALUE)

    Artist findArtistByName(

    @PathVariable(required = false) String name

    ) {

    if (name != null) {

    Artist artist = service.findArtistByNameNoUpdate(decode(name));

    if (artist != null) {

    return artist;

    } else {

    throw new ArtistNotFoundException();

    }

    } else {

    throw new NoArtistNameSubmittedException();

    }

    }

    @PostMapping(value="/artists",

    produces = MediaType.APPLICATION_JSON_VALUE)

    Artist saveArtist(@RequestBody Artist artist) {

    return service.findArtistByName(artist.getName());

    }

    @GetMapping(value={"/artists/match/{name}", "/artists/match/"},

    produces = MediaType.APPLICATION_JSON_VALUE)

    List findArtistByMatchingName(

    @PathVariable(required = false)

    String name

    ) {

    return service.getMatchingArtistNames(name != null ? decode(name) : "");

    }

    }

    Listing 8-13

    chapter08/src/main/java/com/bsg6/chapter08/ArtistController.java

    ```


    We can see in `findArtistByName()` the use of “traditional” (i.e., non-streamed)
    straightforward code to work with the result of `findArtistByName()`. We could
    have written this with streams; this next example includes a method to convert
    the `null` from `MusicService.findArtistByName()` into an `Optional<Artist>`.
    Let’s take a look and then work out what it all means:


    We’re still doing REST badly. When we create an `Artist` – or a `Song`, as we’ll
    see – we should be returning a `Location` header in the response that includes
    an endpoint that will return a newly created object.


    Why not?


    Well…​ one reason is that the web interface here isn’t really meant to be all
    that complete – the web layer of Spring is very thorough, and we’re barely skimming
    the surface of what it can do; we’re mostly showing code that **can** work, as
    opposed to code that works fantastically well. This chapter’s long enough as it
    is.


    ```

    /*

    * this method serves to migrate the MusicService'' findArtistByName()

    * to something that accepts and returns an Optional

    */

    Optional findArtistByName(Optional name, boolean update) {

    return Optional.of(service.findArtistByName(

    decode(

    name.orElseThrow(

    () -> new IllegalArgumentException("No artist name supplied")

    )

    )

    ));

    }

    @GetMapping({"/artist/search/{name}", "/artist/search/"})

    Artist findArtistByName(

    @PathVariable(required = false) Optional name

    ) {

    Optional artistOptional = findArtistByName(name, false);

    return artistOptional.orElseThrow(

    ArtistNotFoundException::new

    );

    }

    Listing 8-14

    A streamed version of findArtistByName

    ```


    The class-local `findArtistByName()` here exists for two reasons: one is to convert
    the result of `MusicService.findArtistByName()` into an `Optional<Artist>`. Obviously,
    if the service returned an `Optional` itself instead of returning `null` for “no
    artist found,” we wouldn’t need the conversion. The other reason is to make sure
    we call `decode()` if a valid-looking `name` is passed in, and to throw an exception
    otherwise.


    Do we **need** this functionality? Actually, no. We could always simply not map
    `"/artists/search/"` in the controller. However, this would mean that calling
    `/artists/search/` – with no artist name – would return an HTTP “not found” error
    instead of an “invalid invocation” error (a `404` instead of a `400`, in HTTP
    error code parlance). You could solve **that** by adding a specific mapping that
    returned the correct error code.


    Which way is best? Well…​ the one that works. There’s not really a “best” here,
    although arguments can be made for every aspect of the code. You should use the
    approach you find most sensible.


    The cyclomatic complexity of the “simple” version – the one in the actual sample
    code – is 3 (it has multiple branches and execution paths). The cyclomatic complexity
    of the streamed code – all of it, both methods – is **one**. In terms of code
    metrics, the streamed versions are actually **simpler** than the more straightforward
    code. That doesn’t mean that the streamed versions are better – and we’re not
    using them, since the API of `MusicService` doesn’t return an `Optional<Artist>`
    anyway. This example is just to illustrate the (ahem) options available to programmers.


    And now the exception class, which has an annotation to tell Spring to convert
    it to an HTTP error code just as in Chapter [7](#471370_2_En_7_Chapter.xhtml).
    Note that it’s part of our actual program code, so it’s in `src/main`:


    ```

    package com.bsg6.chapter08;

    import org.springframework.http.HttpStatus;

    import org.springframework.web.bind.annotation.ResponseStatus;

    @ResponseStatus(code = HttpStatus.NOT_FOUND, reason = "Artist not found")

    public class ArtistNotFoundException extends RuntimeException{

    }

    Listing 8-15

    chapter08/src/main/java/com/bsg6/chapter08/ArtistNotFoundException.java

    ```


    Now, we have a workable interface for working with `Artist` entities over HTTP.
    We can’t do anything with `Song` entities yet, but let’s get the simple things
    running first. (We can’t do anything with a `Song` if we can’t do anything with
    an `Artist`, after all.)


    Of course we can’t have an `ArtistController` without something to actually test
    it, so let’s take a look at `ArtistControllerTest` – again, a near analog to what
    we saw in Chapter [7](#471370_2_En_7_Chapter.xhtml), although it’s slightly different
    to account for the slight variances in configuration approaches. We’re not actually
    touching the `MusicService` directly here – everything is through the controller,
    using the form of actual HTTP requests; it’s possible (and likely) there are error
    conditions not being tested, but in general if these tests all pass, our ability
    to work with `Artist` records is guaranteed.'
