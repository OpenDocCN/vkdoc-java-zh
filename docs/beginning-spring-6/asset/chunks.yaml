    ## 使用 JSR-250 注解的生命周期


    注解提供了 XML 配置所提供的大部分（但并非**全部**）功能。主要区别在于构造过程；大多数其他生命周期功能要么是相同的（使用 `InitializingBean`
    和 `DisposableBean` 接口），要么有直接的对应项（例如，使用包含 `init-method` 方法名的注解）。让我们逐一介绍这些功能，从组件作用域开始。


    ### 带作用域的注解 Bean


    作用域可以通过注解来演示，这很合乎逻辑：只需添加带有正确作用域名称的 `@Scope` 注解即可。我们的示例会比 XML 示例稍微复杂一些，因为我们需要两种不同的类型，以便它们被不同地注解。不过，我们将只使用**一个**配置文件来进行所有注解生命周期测试，如下所示。


    ```


    清单 4-13

    chapter04/src/test/resources/annotated.xml

    ```


