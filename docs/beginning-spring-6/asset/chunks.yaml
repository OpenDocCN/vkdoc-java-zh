    ## 收尾工作


    到目前为止，我们已经看到 Spring Data 如何使数据存储的访问比原本容易得多，它允许我们使用两组相似性远大于差异性的类来访问关系型数据库和 MongoDB
    数据库——尽管底层数据模型**极其**不同。在访问 Spring Data 支持的任何数据库时，你都能看到类似的好处。


    值得注意的是，我们在本章中看到的接口实际上可以相当容易地嵌入到第 8 章展示的 Web 前端中。我们保持了事务性，并且实际上获得了简单性和灵活性；使用 JPA，我们可以获得对大多数（如果不是全部）关系型数据库的支持，而将代码改为
    MongoDB 也很简单。我们可以以同样小的代价迁移到其他数据库，如 Cassandra 或 Neo4J。


    ## 下一步


    在第 10 章中，我们将从数据管理转向 Spring Security，它为 Spring 应用程序提供身份验证和授权支持——特别侧重于通过 Web 管理访问。


