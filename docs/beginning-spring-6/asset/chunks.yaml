  trans: '

    #### 正确使用 HTTP 方法


    俗话说，吃 Reese''s 花生酱杯没有错误的方式^(⁸⁴)，使用 HTTP 方法也是如此。然而，确实存在一种**规定**的方式来使用 HTTP 方法，以遵循
    REST 架构风格。


    REST 将事物分为成员资源和集合资源。它自诩为一种范式，因为它并不适用于所有可能的 API，但在表示你能想到的大多数模式方面做得非常出色。下面我们将对此进行一些扩展，但如果你觉得你的
    API 需要一些不同的东西，那也没关系；它并非完美的抽象，所以专注于完成任务，而不是构建完美的 API。为了我们简单 API 的目的，我们将讨论资源和集合的单一层级，但请知晓，使用
    Spring MVC 实现嵌套是可能且相当简单的。如果你处理的是资源集合，你会看到像 [`http://api.bandgateway.com/songs/`](http://api.bandgateway.com/songs/)
    这样的 URL。对于成员资源，我们将指定某种标识符，因此你的 URL 结构会更像 [`http://api.bandgateway.com/songs/42`](http://api.bandgateway.com/songs/42)。


    警告：前方术语高能！


    HTTP 动词列表经常涉及“幂等性”的概念。当你使用完全相同的数据进行多次调用并产生**相同**的结果时，该调用就是“幂等的”。只读操作——比如 `GET`——本质上是幂等的；对于其他动词，情况可能会更复杂一些。如果一个调用改变了应用程序状态，但每次改变的方式一致，那么它被认为是幂等的，就像你多次将电灯开关拨到“开”位置会发生的情况一样——它只会保持开启状态。当然，在现实中，这要稍微复杂一些。


    抽象是好的，但并不完美。回到我们的正文！


    `GET` 用于检索资源。这种性质的请求通常不应有副作用，这意味着该请求是“安全的”，因为资源的状态从未改变。


    ![](img/471370_2_En_6_Figa_HTML.jpg)


    一张图表说明了通过请求和响应进行的客户端-服务器通信。客户端发送了 2 个针对 songs/1 的 GET 请求和 1 个针对 songs/3 的 GET
    请求。服务器针对 songs/1 响应了 200 状态码和数据，针对 songs/3 响应了 404 状态码。


    `POST` 用于创建新资源，并将使用集合资源的 URL 结构。它与 `PUT` 的主要区别在于它不是幂等的，因为多次调用 `POST` 会创建新资源，并且它使用集合资源的
    URL 结构。（它不是幂等的，因为每次调用都会创建新的对象状态，而新状态会有自己的标识符，等等。）


    ![](img/471370_2_En_6_Figb_HTML.jpg)


    一张图表说明了通过请求和响应进行的客户端-服务器通信。客户端发送了 2 个针对 songs 的 POST 请求，标题为 something。服务器针对第一个请求响应了
    id 1, title something，针对第二个请求响应了 id 2, title something。


    `PUT` 主要用于完整更新一个现有资源。如果资源不存在，源服务器必须使用 HTTP 201（已创建）响应码；如果是更新操作，则根据是否返回实体，使用 HTTP
    状态码 200（如果返回实体）或 HTTP 状态码 204（如果选择不返回实体）。`PUT` 请求应该是幂等的，这意味着使用相同的数据执行一次或多次应该产生相同的结果，这确保了重复/重试对
    `PUT` 的调用不会产生意外效果（因此，幂等性）。此外，`PUT` 请求是针对单个资源而非集合进行操作的，因为在大多数情况下它旨在进行更新。


    ![](img/471370_2_En_6_Figc_HTML.jpg)


    一张图表说明了通过请求和响应进行的客户端-服务器通信。客户端发送了 3 个针对 songs/1 的 PUT 请求，分别带有不同的标题。服务器针对第一个请求响应了
    201, id 1, title something，针对最后两个请求响应了 200, id 1, title something。


    `DELETE` 用于移除由请求 URI 标识的资源。与 `PUT` 一样，`DELETE` 操作是幂等的，这意味着重复调用该资源上的 `DELETE` 端点不会改变结果，但假设删除成功，第二次调用将返回
    404。


    ![](img/471370_2_En_6_Figd_HTML.jpg)


    一张图表说明了通过请求和响应进行的客户端-服务器通信。客户端发送了 2 个针对 songs/1 的 DELETE 请求。服务器针对第一个请求响应了 200
    状态码，针对第二个请求响应了 404 状态码。


    `OPTIONS` 通常用于 CORS 请求^(⁸⁵)。对 CORS 的深入探讨超出了本书的范围；它是一种通过 HTTP 头实现的安全机制，告诉浏览器允许在一个源上运行的应用程序拥有访问来自不同源的选定资源的权限。在现实世界中，一种常见的基于
    Web 的攻击媒介是注入恶意 JavaScript 代码，这些代码可能会攻击你拥有所需访问权限的其他域。因此，最佳实践是将允许访问你 API 的外部代码范围限制在一个批准的域名列表中。我们不打算为
    `OPTIONS` 包含序列图，即使是很小的一个，因为它超出了本章的范围。


    以上（希望）是关于 HTTP 和 REST 中有用方法的合适但简明的入门介绍，接下来让我们通过创建第一个 REST 端点将它们付诸实践。

    '
- fmt: '# Developing Our First Endpoint with MVC


    Now that we’ve explained a bit more about the concepts involved with REST, let’s
    start building out some endpoints. The easiest to explain is a simple `GET` request.
    The following snippet will handle any requests going to a URI like [`http://api.bandgateway.com/songs?artist=threadbare%20loaf`](http://api.bandgateway.com/songs?artist=threadbare%20loaf).
    When Spring returns the query parameter, it will be URL decoded so `threadbare%20loaf`
    will turn into `threadbare loaf` with an ASCII space in between. With a URI there
    are specific allowed characters to allow easier transport. These characters are
    defined by RFC 3986 Section 2 ([`https://tools.ietf.org/html/rfc3986`](https://tools.ietf.org/html/rfc3986))
    and generally include US-ASCII alphanumeric characters along with several reserved
    characters which have meaning in a URI string. If a character being represented
    doesn’t fall within the specification, they are percent-encoded with the US-ASCII
    code representing that character.


    ```

    package com.bsg6.chapter06;

    import com.bsg6.chapter03.MusicService;

    import com.bsg6.chapter03.model.Song;

    import org.springframework.http.HttpStatus;

    import org.springframework.http.ResponseEntity;

    import org.springframework.stereotype.Controller;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.PathVariable;

    import org.springframework.web.bind.annotation.RequestParam;

    import java.net.URLDecoder;

    import java.nio.charset.StandardCharsets;

    import java.util.List;

    @Controller

    public class GetSongsController {

    MusicService service;

    GetSongsController(MusicService service) {

    this.service = service;

    }

    @GetMapping("/artists/{artist}/songs/{name}")

    public ResponseEntity getSong(

    return new ResponseEntity(data, HttpStatus.OK);

    }

    }

    Listing 6-6

    chapter06/src/main/java/com/bsg6/chapter06/GetSongsController.java

    ```


    **Note**


    We’re going to be adding a method to this class shortly.


    In Listing [6-6](#471370_2_En_6_Chapter.xhtml#PC6), we have a class `GetSongsController`,
    and in order to tell Spring MVC that we intend this to be a class that will respond
    to HTTP requests of some fashion, we annotate it with `@Controller`. This annotation
    is basically a more specific form of `@Bean` or `@Component` that we’ve seen in
    earlier chapters and we’ll use a lot more throughout this chapter and the book.
    We want to be able to pull in our `MusicService`, so we use the annotation `@Autowired`
    on the declaration which we learned about back in Chapter [5](#471370_2_En_5_Chapter.xhtml).
    As we move through the chapters, we’ll continue to use services from previous
    chapters so we can expand on concepts building on what we already know.


    As in the `GreetingController` earlier in the chapter, we’ve annotated our `getSongsByArtist`
    method with a `@GetMapping` annotation which means any GET request to `/songs`
    will hit this method.


    Our `getSongsByArtist` method is set up to return a list of `Song` objects as
    a JSON array. In order to do this, we need to accept a query parameter `artist`.
    Since we’re down the road of annotations already, we preface our method parameter
    with `@RequestParam` which maps it to a web parameter.


    A `@RequestParam` maps to query parameters, form data, and parts in multipart
    requests. While not required, any of the `@*Mapping` annotations will accept a
    `params` attribute so you can be more explicit about which params map to your
    method. For the `@RequestParam`, it can have the following parameters, all of
    which are also optional.


    | Parameter | Description |

    | --- | --- |

    | `name` | This is the name of the query parameter in the URI |

    | `required` | Default is true, safe to ignore if that fits your requirements;
    otherwise specify the opposite |

    | `defaultValue` | Used in the event a value is not specified so you can operate
    on the default |


    We’re going to return a JSON array of `Song` types, so we’re going to implement
    a bit of magic and return a `ResponseEntity` object which is commonly used in
    Spring MVC as the return value for a `@Controller` method. When we construct the
    `ResponseEntity`, we include the list of songs – which will get represented in
    JSON as an array, as the list type in JSON – and the HTTP response code.


    The other method handling requests in `GetSongsController` is listed below. It
    shows use of another method of accepting user input. We don’t currently have any
    unique identifier to use as lookup, so we’re going to depend on two key pieces
    of information that make up a song, the artist and song name. If you’ll remember
    in Chapter [1](#471370_2_En_1_Chapter.xhtml), a song name is not enough to make
    up a unique identifier given that there have been examples of duplicate song names
    over the years.


    A `@PathVariable` maps to a pattern in the mapping definition annotation and can
    have the following optional parameters.


    | Parameter | Description |

    | --- | --- |

    | `name` | This is the name of the path parameter in the URI |

    | `required` | Default is true, safe to ignore if that fits your requirements;
    otherwise specify the opposite |


    Listing [6-7](#471370_2_En_6_Chapter.xhtml#PC7) shows what our `getSong` method
    looks like given the above information. We won’t bore you with re-explaining any
    detail on the annotations that we’ve previously explained above in the `@RequestParam`
    explanations.


    ```

    @PathVariable("artist") final String artist,

    @PathVariable("name") final String name

    ) {

    var artistDecoded = URLDecoder.decode(artist, StandardCharsets.UTF_8);

    var nameDecoded = URLDecoder.decode(name, StandardCharsets.UTF_8);

    var song = service.getSong(artistDecoded, nameDecoded);

    return new ResponseEntity(song, HttpStatus.OK);

    }

    @GetMapping("/songs")

    public ResponseEntity> getSongsByArtist(

    Listing 6-7

    chapter06/src/main/java/com/bsg6/chapter06/GetSongsController.java

    ```


    Our GET request here accepts two `@PathVariable` parameters and passes those into
    our method. The URI will look something like the following [`http://api.bandgateway.com/artists/threadbare+loaf/songs/someone+stole+the+flour`](http://api.bandgateway.com/artists/threadbare+loaf/songs/someone+stole+the+flour).
    In the case of path parameters unlike our query parameter above, this will NOT
    be automatically URL decoded by Spring. In our controller method, since we’re
    looking for “threadbare loaf,” and not “threadbare+loaf,” we will use the `URLDecoder`
    class available in the Java standard library to get a decoded version of the artist
    and name.


    Spring also has its own encoder and decoder. Which one should you use?


    It really doesn’t matter. Both libraries will do the same thing, and they’re both
    available to you. In the next chapter we’ll use the Spring encoder and decoder,
    and we won’t notice a difference.


    Now that we have these two endpoints, we need to test them just like we did for
    our `GreetingController`. We’ll do the same song and dance with our tests here,
    and show you how to mock and ensure that your endpoints are processing the inputs
    and delivering the outputs in the way you expect.'
  raw: '## Developing Our First Endpoint with MVC


    Now that we’ve explained a bit more about the concepts involved with REST, let’s
    start building out some endpoints. The easiest to explain is a simple `GET` request.
    The following snippet will handle any requests going to a URI like [`http://api.bandgateway.com/songs?artist=threadbare%20loaf`](http://api.bandgateway.com/songs?artist=threadbare%20loaf).
    When Spring returns the query parameter, it will be URL decoded so `threadbare%20loaf`
    will turn into `threadbare loaf` with an ASCII space in between. With a URI there
    are specific allowed characters to allow easier transport. These characters are
    defined by RFC 3986 Section 2 ([`https://tools.ietf.org/html/rfc3986`](https://tools.ietf.org/html/rfc3986))
    and generally include US-ASCII alphanumeric characters along with several reserved
    characters which have meaning in a URI string. If a character being represented
    doesn’t fall within the specification, they are percent-encoded with the US-ASCII
    code representing that character.


