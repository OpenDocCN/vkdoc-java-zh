    这非常简单，如果你在此处运行应用程序，Spring Boot 的 Spring Security 将默认使用常规表单登录，并像第一个示例一样生成一个安全密码。问题是我们还没有指定任何要集成的
    OAuth 提供程序。我们稍后会解决这个问题。我们首先需要做的是创建一个新的 GitHub 应用程序。


    1.  访问以下页面以创建一个新的 GitHub 应用程序：[`https://github.com/settings/developers`](https://github.com/settings/developers)。


    2.  点击“New OAuth App”按钮。


    3.  为应用程序命名，如果需要，还可以添加描述。


    4.  对于主页 URL，你可以输入 `http://localhost:8080`。


    5.  对于授权回调 URL，请使用：`http://localhost:8080/login/oauth2/code/github`。


    6.  接下来点击 **Register application**，你会看到一个页面，上面有一个你需要复制的客户端 ID，以及一个“Generate a
    new client secret”按钮。


    7.  记下客户端 ID 和客户端密钥，我们接下来会用到它们。


    我们将避免将任何密钥放入 `application.properties` 中，而是使用放置在 `chapter10-oauth` 模块目录中的 `.env`
    文件来保存我们的密钥。你在上述第 7 步中记下的内容应填入文件中的占位符。


    ```

    GITHUB_OAUTH_CLIENT_ID=

    GITHUB_OAUTH_CLIENT_SECRET=

    清单 10-41

    我们的秘密 .env 文件在运行中

    ```


    接下来，让我们在 `application.properties` 文件中使用上述内容。第 2 行包含一个特殊配置，允许我们在代码中利用 `.env` 文件，并从此文件中省略密钥。`optional`
    名称告诉 Spring，如果资源不存在，不要抛出错误，而 `[.properties]` 后缀表示文件名可以是 `.env` 或 `.env.properties`，并且都是有效的。第
    4 行和第 5 行是我们告诉 Spring Boot 的 OAuth 实现客户端 ID 和客户端密钥的位置。

