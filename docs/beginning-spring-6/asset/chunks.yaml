    # 7. Spring Boot


    So far, we’ve looked at dependency injection and various configuration approaches,
    and we’ve explored deploying some web services into Apache Tomcat. Along the way
    we’ve used a small set of Spring modules, picking and choosing as needed. It’s
    time for us to switch gears and look at Spring Boot, which is a project structure
    generally aimed at **microcontainers**; Spring Boot gives us an easier way to
    get larger feature sets out of Spring and offers an integrated set of services
    aimed at deploying running applications without having to rely on traditional
    Jakarta EE services like Apache Tomcat.


    **Microcontainers** have multiple definitions, but in context, it’s a self-contained
    application, representable as a single artifact, deployed in a virtual machine.
    That sounds a little odd in the context of Java, which runs in a virtual machine
    itself; wouldn’t every application qualify as a “microcontainer,” then?


    The answer is “…​ maybe.” However, the more common use of a “microcontainer” is
    an application with a single purpose, like “run the band gateway application,”
    running inside its own virtual machine (therefore, a virtual machine running inside
    another virtual machine) such as a Docker container.'
