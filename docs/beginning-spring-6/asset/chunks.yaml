    \ a `Connection` object to those parameters. We’ll do this because we want to\
    \ be able to compose our methods, and we want the composition to not require a\
    \ unique database connection for every call. For example, saving an artist might\
    \ look up the artist by name first; we want to use a single `Connection` for both\
    \ operations, because that gives us the ability to use one database transaction\
    \ instead of two. (We’ll see this done later on in this chapter.)\n\n**Warning**\n\
    \nAs with so many other things in this chapter, we’re …​ not actually using database\
    \ transactions explicitly. We’ll get more into transaction isolation features\
    \ in Chapter [8](#471370_2_En_8_Chapter.xhtml). In this chapter, though, maintaining\
    \ transaction state would be distracting.\n\nLet’s take a look at the first two\
