    **DelegatingPasswordEncoder**


    Migrating to a new encoding method for passwords because requirements changed
    or because you inherited a system that still used MD5 can be painful. From Spring
    Security 5 on brought the `DelegatingPasswordEncoder` which supports multiple
    password encoders using a prefix. If we use the factory method `PasswordEncoderFactories.createDelegatingPasswordEncoder(),`
    you will see if not specified it uses `{bcrypt}` as the default and provides a
    simple way to upgrade existing passwords not using your preferred method.


    For our example application, we will set up two user accounts, each having access
