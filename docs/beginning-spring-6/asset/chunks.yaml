    In Chapter [3](#471370_2_En_3_Chapter.xhtml) we saw how we can specify constructor
    arguments for Spring beans, either by naming arguments or using the argument index.
    (The most straightforward technique is to use named arguments, if many exist,
    although perhaps using `@Autowired` references is even simpler. But we’re sticking
    to XML in this section.) Chapter [3](#471370_2_En_3_Chapter.xhtml) walks through
    most of this fairly well, but we’ll offer a short example here just for completeness’
    sake.


    ```

    Listing 4-6

    chapter04/src/test/resources/config-02.xml

