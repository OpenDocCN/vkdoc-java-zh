    这里没有什么神奇之处；我们基本上是在Java源代码中复现我们的数据模型。


    我们将按照第[7](#471370_2_En_7_Chapter.xhtml)章所述，通过创建`schema.sql`文件来手动创建数据库模式。这些文件不会放在源代码树的相同位置，因为`application.properties`将仅应用于我们的测试——毕竟，我们可能在生产环境中使用不同的数据库——但无论H2实例是内存中的（如我们的测试中）、外部数据库还是其他任何形式，我们的`schema.sql`都是合适的。


    H2可以作为嵌入式数据库或单独的数据库服务器运行。此外，它可以在磁盘上或内存中创建数据库，因此我们可以有四种不同的配置。


    | 嵌入式且内存中 | 适用于测试 |

    | --- | --- |

    | 嵌入式且磁盘上 | 适用于在单个容器中运行且不需要共享访问的应用程序 |

    | 外部且内存中 | 可能适用于创建侧缓存；这在现实世界中相当罕见 |

    | 外部且磁盘上 | 适用于多个进程使用数据库的应用程序，并反映了大多数其他数据库的使用方式 |


    首先，简单（且幸运地简短）的`application.properties`，我们将把它放在`chapter08/src/test/resources`中——记住，这仅用于测试，所以我们**希望**它位于测试目录树中。（如果我们想要生产版本，可以在`chapter08/src/main/resources`中创建，其中包含用于生产环境的特定属性——例如显式的JDBC
    URL等。`test`目录树中的版本在我们的测试中具有优先权。）


    此文件的主要目的是确保Spring Boot知道我们使用的数据库平台，以便它使用`schema.sql`创建我们的数据库表。


    ```

    spring.sql.init.platform=h2

    Listing 8-5

    chapter08/src/test/resources/application.properties

    ```


    我们的`schema.sql`文件——它位于`chapter8/src/main/resources`目录中，因为这是我们希望在生产应用程序中使用的模式（而不仅仅用于测试）——也相当简单，并以尽可能直接的方式建模我们的实体，同时表达我们数据模型的意图。


    ```

    CREATE TABLE IF NOT EXISTS artists

    (

    id   BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,

    name VARCHAR(64) NOT NULL

    );

    CREATE UNIQUE INDEX IF NOT EXISTS artist_name

    ON artists(name);

    CREATE TABLE IF NOT EXISTS songs

    (

    id        BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,

    artist_id INT,

    name      VARCHAR(64) NOT NULL,

    votes     INT DEFAULT 0,

    FOREIGN KEY (artist_id) REFERENCES artists (id)

    ON UPDATE CASCADE

    );

    CREATE UNIQUE INDEX IF NOT EXISTS song_artist

    ON SONGS (artist_id, name);

    Listing 8-6

    chapter08/src/main/resources/schema.sql

    ```


    `songs`的外键特意通过外键级联更新——因此如果我们更新`artist`记录的`id`字段，它应该传播到`songs`表。我们特意不级联删除；想象一下，如果我们有一个艺术家录制了四十首歌曲。删除该艺术家也会删除他们所有的歌曲数据。不传播删除意味着我们必须**显式**删除与艺术家关联的`songs`记录，然后才能删除该艺术家的数据。


    最后，默认情况下有一些测试数据会很好。预告一下：本章我们将有三个不同的测试类，其中两个会创建自己的数据，但一个不会。（`ArtistControllerTest`是一个只读测试。因此，我们需要确保它拥有正常运行所需的数据。因此，默认数据！）为了那个测试，让我们继续看看我们的默认数据库内容，它位于`chapter8/src/test/resources/data.sql`中。


