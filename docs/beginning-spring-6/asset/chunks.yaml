  trans: '

    ## Spring Reactive


    响应式编程可以简单地概括为“使用异步数据流进行编程”。^(¹¹⁷)


    我们在之前的示例代码中已经看到，数据流比传统的循环和其他类似的迭代机制更受青睐（特别是在第 3、8 和 9 章中）。传统数据流与响应式数据流的主要区别在于，响应式代码通常拥有异步数据源，因此数据流通常没有明确的终点。


    在传统的流式模型中，存在一个数据收集阶段——你需要获取一个`Artist`或`Song`实例的列表——当你拥有所有这些实例时，**然后**才能处理它们。检索实例是一个**阻塞操作**，它代表代码中的一个位置，在该阻塞操作完成之前，代码无法继续执行。


    另一方面，正如我们所说，响应式编程是异步的：我们可能会指示想要获取一个实例列表，并**当它们可用时**，对它们执行某些操作。我们不会在等待数据源返回实例时阻塞代码的执行；而是设置好处理实例的机制，然后退出。


    在实践中，这往往会带来令人难以置信的性能提升，因为一次数据库调用（例如）可能意味着给定线程暂停十毫秒；而使用响应式编程，则完全没有暂停。该线程可以被用来做其他事情。


    当然，代价是你必须编写代码来使用响应式模型。在本书中，我们一直倾向于这种方向，强调 lambda 表达式和数据流，但对许多 Java 程序员来说，这仍然是一种相对较新的方法——尽管它早在
    2014 年就随 Java 8 一起引入了。


    在 Spring 5 中，Spring 提供了一个`spring-webflux`模块，它几乎可以作为 WebMVC 的直接替代品。^(¹¹⁸) Spring
    Web Reactive 适配了 Web MVC 中的概念，并将其迁移到响应式模型中，包括可以选择指定**不必**在输入或输出上阻塞的输入和输出；你可以利用这一点，在数据点可用时提供一系列数据点（如股票行情价格）——无论是作为输入**还是**输出——只需将类型从例如`Artist`更改为`Flux<Artist>`即可。


    如果第一次阅读时觉得这听起来很复杂，别担心——它确实不简单。然而，如果你能编写使用 WebMVC 的代码，那么迁移到 Spring Web Reactive
    并随着你理解如何利用响应式模型来添加功能和提升性能是相当容易的。


    甚至还有一个`spring-boot-starter-webflux`可以方便地与 Spring Boot 一起使用——如果你打算使用 Spring Reactive，这可能是你应该采用的方式。


    ## 消息队列与 Spring


    消息队列是一种异步的服务间通信形式。^(¹¹⁹) 在队列架构中，有三个基本组件：


    *   一个主机应用程序，如 RabbitMQ ([`www.rabbitmq.com`](http://www.rabbitmq.com))、ActiveMQ
    ([`https://activemq.apache.org/`](https://activemq.apache.org/)) 或 Artemis ([`https://activemq.apache.org/components/artemis/`](https://activemq.apache.org/components/artemis/)，它本身也是一个
    ActiveMQ 项目)


    *   一个生产者（向主机应用程序发送消息的组件）


    *   一个消费者（从主机应用程序检索消息的组件）


    请注意，一个给定的服务既可以作为生产者也可以作为消费者，这实际上非常常见；此外，生产者不限于一种生产类型，也不限于一种消费类型。


    在队列系统中有两种主要的消息模型：发布/订阅（或“pub/sub”）和点对点（或“PtP”）。


    这两种模型在消息传递方式上有所不同：


    *   在发布/订阅模型中，消息会立即传递给每个可用的消费者。这种消息流通常被称为“主题”（这确实是 Java 消息服务对发布/订阅队列的称呼方式）。


    *   在点对点模型中，无论有多少消费者在监听给定的消息流，消息都只会分发给一个且仅一个消费者；这种消息流也被称为“队列”，以区别于主题。消息如何分配给消费者由队列本身决定——但通常消息会按照“轮询”算法进行分发，这意味着消息**通常**会在可用的监听器之间均匀分配。


    聊天室是主题的一个很好的例子；一个人的消息会发送给消息发送时恰好在该房间内的其他所有人。


    异步日志服务是队列的一个很好的例子；生产者生成一条日志消息并将其发送到消息服务，在那里，多个可能的监听器中的一个会检索该消息并决定如何处理它。


    如前所述，Java 有一个用于处理消息队列的标准规范，称为 Java 消息服务（或“JMS”）。JMS 就像 JDBC：该规范涵盖了 API 的使用方式，但不涉及
    API 的工作原理。你需要为每个给定的消息队列主机使用一个 JMS 库；ActiveMQ 有一个，RabbitMQ 也有自己的一个。（对于 RabbitMQ，请参阅[`www.rabbitmq.com/jms-client.html`](http://www.rabbitmq.com/jms-client.html)了解如何通过
    JMS 访问 RabbitMQ。）


    Spring 也有一个用于处理 JMS 的模块，`spring-amqp`；特别是，它提供了`JmsTemplate`类，以及诸如`@JmsListener`之类的注解，使得组件能够以相当少的努力从队列或主题中检索消息（更多详情请参阅[`https://spring.io/guides/gs/messaging-jms/`](https://spring.io/guides/gs/messaging-jms/)）。你仍然需要配置主机连接，但之后，使用队列或主题就只是使用`JmsTemplate.send()`方法的问题了（尽管`JmsTemplate`类实际上**极其**灵活，而且你很可能永远不会单独使用`send()`，因为还有其他方法可能更完全地适合特定场景）。


    RabbitMQ 在这里实际上值得特别一提。


    大多数消息传递提供者使用高级消息队列协议 1.0 版本，即 AMQP ([`www.amqp.org`](http://www.amqp.org))。然而，RabbitMQ
    默认使用 AMQP 0.9，并且 RabbitMQ 的 JMS 客户端旨在与 RabbitMQ 的消息服务协同工作。


    不过，你是有选择的：你可以随时将 AMQP 1.0 作为插件安装到 RabbitMQ 中，或者你可以直接从 Spring 使用 AMQP 0.9，使用由`spring-rabbit`依赖提供的`RabbitTemplate`，这大致相当于由`spring-amqp`模块提供的`JmsTemplate`。


    为什么要使用消息队列？它们非常适合大规模扩展和事务性的异步操作；以银行交易为例。通常，当你对银行账户进行扣款时，银行会存储一组操作（取款和存款）并在特定时间过账；由于消息队列可以是事务性的，失败的操作可以被重新处理，直到成功处理为止。除了使复杂的架构变得相当易于使用（因为进程具有简单的输入和输出）之外，点对点场景中消费的事务性本质使得代码**安全**。^(¹²⁰)

    '
- fmt: '# GraphQL


    In Chapter [6](#471370_2_En_6_Chapter.xhtml), we mentioned REpresentational State
    Transfer, or REST, which is a common and popular way to work with data models
    over HTTP. REST is usually pretty simple; the hardest thing about REST is creating
    endpoints that make sense from an external API’s perspective. (Another thorny
    problem is how to handle versioning of endpoints, for when things change and yet
    you still need to support the “old way.”)


    For example, do we access `Song` instances through their `Artist` reference, or
    by title? It makes more sense to use song titles, because a given song title might
    be used by multiple artists…​ but how, then, do you refer to songs created by
    a specific artist? We have answers that satisfy us for the sake of this book,
    of course, but in more complex models, questions like these can be less easy to
    answer.


    Also, REST endpoints tend to be fairly coarse; if you request a `Song`, you’re
    typically going to get every attribute of that `Song`, whether the request needs
    it or not. You can obviously tune the output of a REST request such that it does
    not contain every attribute (as we do when we create the autocompletion services),
    but usually creating a projection^([^(121)](#fn121)) involves creating extra object
    classes to represent the projection and that ends up being a lot of work for most
    projects (even though projections can be far more efficient than returning large
    objects). It’s simpler just to return giant objects, even though that can impact
    processing speed and network transfer time.


    Is returning “giant objects” a bad thing? Well…​ as usual, it depends. If the
    objects can be represented in serialized form in relatively little space, it probably
    doesn’t matter, especially if it can be represented in a few thousand bytes.


    A network packet – or segment, actually – is usually sized around 1500 bytes,
    roughly 1400 of which are usable by applications; the remainder makes up headers
    and other metadata for the packet. If the serialized form of an object fits into
    one or two network packets, it’s probably not a big deal to not worry about the
    extra data being transmitted.


    Of course, if you’re handling millions of such requests and your data takes up
    two network packets and you only need to transfer some of that data…​ maybe it’d
    be cost-effective to trim the results down such that they’re slimmer.


    Or, of course, one could look into libraries like GraphQL.


    GraphQL (`https://graphql.org/`) is a query language and library designed to work
    with APIs such that clients can actually define what attributes are requested,
    and can also specify that a graph of the data is to be returned.


    In our music gateway example, we might have two endpoints to get an `Artist` and
    every `Song` for that artist, if we wanted all of the related data. With GraphQL,
    we could build a request that requested both sets of data (the `Artist` and related
    `Song` objects), possibly only including specific attributes from both object
    types instead of everything.


    Since it’s done with a query language, the API designer doesn’t even have to anticipate
    ahead of time what fields should be included, or what the resulting graph should
    look like. (The consumer of the API, of course, has to be aware of what is being
    returned; the consumer has to be aware of the data, but that’s why the consumer
    specifies the nature of the data in the first place.)


    The programmer simply defines what fields and objects might be available, and
    then uses the GraphQL library to handle the request’s inputs and outputs.


    Since the query language is actually separated from the object model, it’s trivial
    to add features to the endpoints without having to change client code; the clients
    would request the data they need, and the presence of additional data in the API
    wouldn’t matter.


    Does this mean, then, that programmers should toss out their musty and archaic
    REST endpoints in favor of GraphQL?


    Probably not. GraphQL is, like many other things, a useful tool; it implies that
    clients have a certain responsibility in knowing what data is to be requested,
    and that’s not always the case. In fact, one developer known by the authors has
    run into multiple environments where GraphQL was used as “magic sauce” – only
    to rip it out and see benefits across the projects. That doesn’t mean that GraphQL
    is bad – it only means that GraphQL is a tool, and like most other tools, needs
    to be used in the appropriate environment and conditions. Under those conditions,
    GraphQL can be very useful; when those conditions aren’t present, it’s like the
    proverbial bicycle to a fish.


    The Java library for GraphQL can be found at `https://github.com/graphql-java/graphql-java;`
    there’s also a Spring Boot starter for GraphQL, at `www.graphql-java-kickstart.com/spring-boot/`.


    ## Cloud Deployment


    This book has focused on deploying applications in a Java virtual machine. However,
    one thing it hasn’t touched is where that virtual machine actually runs; in tests,
    you’re running on a local JVM, but the reality of modern development is that many
    companies run their applications on someone else’s hardware.


    This creates enough complexity that each remote provider would justify its own
    book covering capabilities and concerns. It’s possible to abstract features from
    one to another (each one provides a way to run a virtual machine upon which you
    can install whatever services you’re willing to manage), but to really leverage
    Azure (`https://azure.microsoft.com/`), AWS (`https://aws.amazon.com/`), or GCP
    (`https://cloud.google.com/`), for example, you really would want to have those
    providers manage as much of your application as you can.


    For example, you could set up your own message queuing system with Artemis or
    RabbitMQ…​ but AWS has the Simple Queue Service^([^(122)](#fn122)) (among others),
    GCP has PubSub,^([^(123)](#fn123)) and Azure has Azure Messaging.^([^(124)](#fn124))


    Each one also provides different data storage, whether from Cloud-based relational
    databases like MySQL or Postgres, or other NoSQL- or SQL-related technologies
    like DynamoDB, MongoDB, or BigQuery.


    The list of features is very broad: this is barely scratching the surface of what
    one might look for first.


    Spring has a project, Spring Cloud (`https://spring.io/projects/spring-cloud`),
    to help coordinate these services, whether in consumption or deployment. Most
    of the project is focused on application-level concerns (“How would I consume
    content, or coordinate services”), but it may also help address concerns like
    manageability or deployment.'
  raw: '## GraphQL


    In Chapter [6](#471370_2_En_6_Chapter.xhtml), we mentioned REpresentational State
    Transfer, or REST, which is a common and popular way to work with data models
    over HTTP. REST is usually pretty simple; the hardest thing about REST is creating
    endpoints that make sense from an external API’s perspective. (Another thorny
    problem is how to handle versioning of endpoints, for when things change and yet
    you still need to support the “old way.”)


    For example, do we access `Song` instances through their `Artist` reference, or
    by title? It makes more sense to use song titles, because a given song title might
    be used by multiple artists…​ but how, then, do you refer to songs created by
    a specific artist? We have answers that satisfy us for the sake of this book,
    of course, but in more complex models, questions like these can be less easy to
    answer.


    Also, REST endpoints tend to be fairly coarse; if you request a `Song`, you’re
    typically going to get every attribute of that `Song`, whether the request needs
    it or not. You can obviously tune the output of a REST request such that it does
    not contain every attribute (as we do when we create the autocompletion services),
    but usually creating a projection^([^(121)](#fn121)) involves creating extra object
    classes to represent the projection and that ends up being a lot of work for most
    projects (even though projections can be far more efficient than returning large
    objects). It’s simpler just to return giant objects, even though that can impact
    processing speed and network transfer time.


    Is returning “giant objects” a bad thing? Well…​ as usual, it depends. If the
    objects can be represented in serialized form in relatively little space, it probably
    doesn’t matter, especially if it can be represented in a few thousand bytes.


    A network packet – or segment, actually – is usually sized around 1500 bytes,
    roughly 1400 of which are usable by applications; the remainder makes up headers
    and other metadata for the packet. If the serialized form of an object fits into
    one or two network packets, it’s **probably** not a big deal to not worry about
    the extra data being transmitted.


    Of course, if you’re handling millions of such requests and your data takes up
    **two** network packets and you only need to transfer **some** of that data…​
    maybe it’d be cost-effective to trim the results down such that they’re slimmer.


    Or, of course, one could look into libraries like GraphQL.


    GraphQL ([`https://graphql.org/`](https://graphql.org/)) is a query language and
    library designed to work with APIs such that clients can actually define what
    attributes are requested, and can also specify that a **graph** of the data is
    to be returned.


    In our music gateway example, we might have two endpoints to get an `Artist` and
    every `Song` for that artist, if we wanted all of the related data. With GraphQL,
    we could build a request that requested both sets of data (the `Artist` and related
    `Song` objects), possibly only including specific attributes from both object
    types instead of **everything**.


    Since it’s done with a **query language**, the API designer doesn’t even have
    to anticipate ahead of time what fields should be included, or what the resulting
    graph should look like. (The consumer of the API, of course, has to be aware of
    what is being returned; the **consumer** has to be aware of the data, but that’s
    why the consumer specifies the nature of the data in the first place.)


    The programmer simply defines what fields and objects **might** be available,
    and then uses the GraphQL library to handle the request’s inputs and outputs.


    Since the query language is actually separated from the object model, it’s trivial
    to add features to the endpoints without having to change client code; the clients
    would request the data they need, and the presence of **additional** data in the
    API wouldn’t matter.


    Does this mean, then, that programmers should toss out their musty and archaic
    REST endpoints in favor of GraphQL?


    Probably not. GraphQL is, like many other things, a useful tool; it implies that
    clients have a certain responsibility in knowing what data is to be requested,
    and that’s not always the case. In fact, one developer known by the authors has
    run into multiple environments where GraphQL was used as “magic sauce” – only
    to rip it out and see benefits across the projects. That doesn’t mean that GraphQL
    is **bad** – it only means that GraphQL is a tool, and like most other tools,
    needs to be used in the appropriate environment and conditions. Under those conditions,
    GraphQL can be **very** useful; when those conditions aren’t present, it’s like
    the proverbial bicycle to a fish.


    The Java library for GraphQL can be found at [`https://github.com/graphql-java/graphql-java;`](https://github.com/graphql-java/graphql-java%3B)
    there’s also a Spring Boot starter for GraphQL, at [`www.graphql-java-kickstart.com/spring-boot/`](http://www.graphql-java-kickstart.com/spring-boot/).


    ### Cloud Deployment


    This book has focused on deploying applications in a Java virtual machine. However,
    one thing it hasn’t touched is where that virtual machine actually runs; in tests,
    you’re running on a local JVM, but the reality of modern development is that many
    companies run their applications on someone else’s hardware.


    This creates enough complexity that *each remote provider* would justify its own
    book covering capabilities and concerns. It’s possible to abstract features from
    one to another (each one provides a way to run a virtual machine upon which you
    can install whatever services you’re willing to manage), but to really leverage
    Azure ([`https://azure.microsoft.com/`](https://azure.microsoft.com/)), AWS ([`https://aws.amazon.com/`](https://aws.amazon.com/)),
    or GCP ([`https://cloud.google.com/`](https://cloud.google.com/)), for example,
    you really would want to have those providers manage as much of your application
    as you can.


    For example, you could set up your own message queuing system with Artemis or
    RabbitMQ…​ but AWS has the Simple Queue Service^([^(122)](#fn122)) (among others),
    GCP has PubSub,^([^(123)](#fn123)) and Azure has Azure Messaging.^([^(124)](#fn124))


    Each one also provides different data storage, whether from Cloud-based relational
    databases like MySQL or Postgres, or other NoSQL- or SQL-related technologies
    like DynamoDB, MongoDB, or BigQuery.


    The list of features is *very* broad: this is barely scratching the surface of
    what one might look for *first*.


    Spring has a project, Spring Cloud ([`https://spring.io/projects/spring-cloud`](https://spring.io/projects/spring-cloud)),
    to help coordinate these services, whether in consumption or deployment. Most
    of the project is focused on application-level concerns (“How would I consume
    content, or coordinate services”), but it may also help address concerns like
