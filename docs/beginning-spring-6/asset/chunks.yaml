    ```


    There’s nothing spectacular in play in this particular implementation of `ArtistRepository`,
    including the SQL itself.


    However, `saveArtist` could use some explanation – it actually returns a valid
    `Artist`. It does this by first trying to save an `Artist` to the database – but
    what if the data is already there? We’d get an exception (a `SQLException`, indication
    a violation of a unique key constraint). This method, if it gets that `SQLException`,
    assumes the `Artist` is already in the database, and queries for that `Artist`
    data and returns that instead – so we always get a valid “saved” `Artist`, even
    if we didn’t actually create the `Artist` data in this specific call.


    Note


    We’re still cheating (slightly) for the sake of expediency; we’re not checking
    to make sure that the `SQLException` in question was caused by an index violation,
    which is the only case in which we’d want to follow this logic.'
