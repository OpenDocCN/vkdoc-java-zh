    configurations one through six. This is deliberate. This is the seventh configuration
    in this chapter, so rather than restarting the sequence, we just continued where
    we left off. Good eye, though, readers.


    This configuration would contribute one Spring bean to an `ApplicationContext`,
    whose name would be derived from the method – so create a reference to a `MusicService`
    called `musicService`, with an instance reference of type `MusicService1`. (We’ll
    show how you can name the references differently in a later example.)


    Let’s create another configuration class, one that creates a `MusicServiceTests`
    reference, which we’ll use in a test we’ll see after we walk through the other
    configuration possibilities.


