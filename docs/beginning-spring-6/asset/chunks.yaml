    In practice, this meant that every J2EE programmer was enabled right out of the
    gate to design working distributed architectures. This is not a small accomplishment
    at all; distributed architectures are difficult to get right, and J2EE made invoking
    processes on separate machines trivial.


    There’s a cost to all of this, of course.


    The nature of EJB, especially early in J2EE’s lifecycle, meant that when every
    call could be remote, every call had to be treated as if it were a remote call,
    with a specific deployment and development cycle (early on, you had a separate
    packaging compiler for EJB, called `ejbc`, to build the supporting classes for
    EJBs to run), and because of the requirement that EJBs be considered to be remote
    even when they weren’t, EJBs were slow.


    EJBs were slow to develop, slow to test, slow to deploy, slow to invoke. And they
    were everywhere.


    *J2EE Development without EJB* was written as a logical reaction to the entrenched
    mindset. Rod Johnson and Juergen Hoeller looked at how EJBs were being used (and
    misused), and their actual cost to developer productivity – which was really quite
    high, for the value they were providing. To use an EJB, not only did you have
    to go through a special development and deployment cycle, but then you had to
    look them up at runtime, and handle the exceptions when they weren’t available.​


    ```

    // get the JNDI context for the application

    Context ctx=new InitialContext();

    // Inferencer is the java interface for the EJB

    // First, we have to get the "Home" object, which

    // can create the EJB for the caller

    // The deployer should have set up the name to point to /

    // an actual deployed EJB artifact

    Object ref=ctx.lookup("java:comp/env/ejb/inferencer");

    InferencerHome home=

    (InferencerHome) PortableRemoteObject.narrow(

    ref,

    InferencerHome.class

    );

    // now, we use the home object to actually get the EJB

    Inferencer engine=home.create();

    // presumably, generate an inference using inputs...

    engine.generate(input);

    Listing 1-1

    Looking up an EJB in the olden days

    ```


    In Listing [1-1](#471370_2_En_1_Chapter.xhtml#PC1), not only did you have to write
    the code to grab a component that can create the EJB from somewhere else,^([⁸](#fn8))
    but you had to *configure* that reference, and then you had to go through a set
    of semantics to get something that can actually invoke your EJB. But why go through
    the development and remote semantics when they were rarely needed and desired?
    Those semantics were rarely important despite how much they catastrophically affected
    your code; at a Java Symposium in the early 2000s, attendees were asked how many
    used EJBs, and most hands went up; the next question was how many of those EJBs
    were actually invoked remotely. The answer: anecdotally, about two percent.^([⁹](#fn9))


    *That* mindset is what drove *J2EE Development without EJB* a desire to return
    freedom to the coders, to provide support for programming with necessary complexity.
    If you needed to call a remote service, well, nothing stops you from doing that,
    but experience with actual coding showed that it was rarely necessary and, instead,
    served as a barrier to just getting things done.


    Rod’s primary insight was that EJBs might be powerful, but they were a little
    like strapping a V6 engine into a child’s bicycle. Most developers didn’t need
    them, or want them; EJB just happened to be the language feature *du jour*, and
    as a result development was slowed down, deployment was more difficult,^([^(10)](#fn10))
    testing was difficult, and configuration was arcane. Most developers didn’t use
    the “correct techniques” for looking up EJBs because they didn’t want to take
    the time to configure the EJB container. Configuring the container meant that
    reproducing conditions was more difficult, as well.


    It was a mess. It was a productive mess, at times; after all, the technology was
    created as a response to actual user needs. But even if developers were able to
    use it to get real things done well, it created a lot of burden on those same
    developers, and the practices in place weren’t making it better. The technology
    didn’t even really *allow* better practices.'
