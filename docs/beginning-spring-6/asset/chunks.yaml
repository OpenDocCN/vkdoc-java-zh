- fmt: '# 10. Spring Security


    Security is critical in any application with access to live information – even
    public information.^([^(101)](#fn101)) Security means controlling access to features
    and information; unless Annie is specifically granted access to Frank’s information,
    Frank’s data should be **safe** and, from Annie’s perspective, invisible. Naturally,
    Spring has a powerful and capable security project – called, of all things, Spring
    Security – that allows you to control nearly every aspect of application security.


    In this chapter, we’re going to develop two modules – `chapter10` and `chapter10-custom`
    – and we’re going to use one of the simple web applications we built in Chapter
    [9](#471370_2_En_9_Chapter.xhtml) – the `chapter09-jpa` project – and layer on
    a simple interface to authenticate and control authorization to our resources.


    ## Introduction


    The Spring Security subproject was originally a separate project started in 2003
    named Acegi Security System.^([^(102)](#fn102)) After developing separately from
    Spring itself for 3 years, it was officially adopted in 2007 by Spring and renamed
    Spring Security. Today, the subproject is the standard for authentication and
    access control for Spring. It provides enough boilerplate to allow you to use
    it without any customization, and is extensible enough to allow any specific implementation
    details your particular authentication and authorization requirements might need.


    Like many other Spring projects (including Spring Data, as shown in Chapter [8](#471370_2_En_8_Chapter.xhtml)),
    the Spring Security subproject is further subdivided into many other subprojects
    based on features. At its most basic level, the three Spring Security libraries
    you’ll generally want to include by default are `spring-security-core`, `spring-security-config`,
    and `spring-security-web`.


    Below is a non-exhaustive list of the most prominent modules and the requirement
    they can help you achieve:


    | Library | Description |

    | --- | --- |

    | `spring-security-core` | The core library is required for all applications using
    Spring Security. It includes access control and authentication classes and interfaces
    and can be used for standalone or remote needs. |

    | `spring-security-config` | This is a core library as well – providing, of all
    things, configuration via Java or XML. |

    | `spring-security-web` | This library includes the necessary filters and web
    security infrastructure for using Spring Security in your web applications. |

    | `spring-security-test` | Provides support for testing a Spring Security application.
    It maps easiest with JUnit, but we’ll be able to do the same trickery with TestNG.
    |

    | `spring-security-acl` | Provides access control to specific operations on specific
    Java object instances in your application. With this, you can say that a specific
    user has the ability to execute specific methods on specific object instances,
    for example, although you can certainly rely on access control that isn’t quite
    **that** specific. (Usually, people rely on role access and not specific user
    access…​ but you have the ability to choose what features you require.) |

    | `spring-security-ldap` | This library provides access to LDAP, the “Lightweight
    Directory Access Protocol,” for authentication and provisioning. |


    There are plenty of other libraries to mention like OAuth (which has its own artifact
    group, `org.springframework.security.oauth`, with many artifacts to provide specific
    features) and JOSE.^([^(103)](#fn103)) Support also exists for CAS (a single-signon
    system; CAS stands for “Central Authentication Service”) and OpenID (a broad Internet
    authentication specification) and, well, `insert your security apparatus here`,
    whether in an official capacity or through one of the many open source integrations
    out there. There are libraries that focus on just the authentication aspect and
    those that integrate the different ideas surrounding authorization. As of this
    writing, there are 48 official packages available in Maven for the `org.springframework.security`
    namespace.


    **Authentication and Authorization**


    When we speak about authentication, we’re trying to correctly assert that the
    thing hitting our resources is what, or who, it claims to be. When we speak about
    this in regard to web-based authentication, we’re generally talking about a host
    of different methods, with the simplest being HTTP BASIC access, all the way to
    more involved mechanisms like OpenID or CAS.


    Authorization is a set of one or many rules that determine who, once authenticated,
    is allowed to do what. For example, if Jennifer authenticates as an ADMIN, then
    she may have Create/Read/Update/Delete access to all entities in the system, whereas
    John may have USER access and only be able to view and update items associated
    with their account.


    As you’ve seen in previous chapters, Spring Boot can massively reduce the amount
    of work needed to get started and get something complex running with less effort.
    We’ll take a look in the next section at how to start configuring a web application
    and a REST API using Spring Security.'
