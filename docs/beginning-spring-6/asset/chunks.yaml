    # 2. Hello, World!


    It seems appropriate to start learning about Spring by building out our first
    example as a simple “Hello, World!” application. In this chapter, we’re going
    to take a look at the tools and libraries we’re going to rely on – in particular,
    Maven and TestNG^([^(23)](#fn23)) – and build a simple application to demonstrate
    how we validate that our application works as designed. Then – at last – we’ll
    leverage Spring in our application. This way, we’ll establish the knowledge we’ll
    need to make sense of the rest of the book.


    ## A Simple Application


    Our goal in this chapter will be to take another look at the “Hello, World” application
    from Chapter [1](#471370_2_En_1_Chapter.xhtml), except this time we’re going to
    examine tooling and the mindset that drove the design.


    First, why “Hello, World?” Traditionally, programming languages (and frameworks)
    use this application because it’s very **simple** – and that means we have room
    to focus on things like overall syntax, how to design, how to build, and how to
    run the app. “Hello, World” allows us to do nothing but explore the lifecycle
    of a “full program.”^([^(24)](#fn24))


    Spring is going to be incredibly heavy for such a simple application, and we aren’t
    even going to use it for the first iteration, but that allows us to focus on tooling
    and process, including tests.^([^(25)](#fn25)) We’ll wire everything together
    with Spring as we continue – even though it will look a bit silly – because that
    will demonstrate how we can move configuration around as needed, a feature that’s
    necessary in real-world scenarios.'
