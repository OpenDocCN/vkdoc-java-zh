    ### Constructors with Annotated Classes


    Here’s where things diverge from the XML configuration: annotated classes will
    be invoked with as much information as is available, and the objects will be constructed
    in an order that satisfies dependencies as much as possible. This mirrors things
    we’ve seen in Chapter [3](#471370_2_En_3_Chapter.xhtml); if a constructor has
    a parameter marked with `@Autowired`, Spring will look for a class that matches
    the parameter’s type and qualifier, if any, and inject it into the constructor
    call, after building a graph of dependencies internally.


    In other words, if we have an object `A` that depends on an object `B` that itself
    requires an object `C`, Spring will first build `C`, and use it to construct `B`,
    and then use `B` to construct `A`.


    As such, there’s not really anything to show here that wouldn’t mirror what we’ve
    already seen in Chapter [3](#471370_2_En_3_Chapter.xhtml) (see 3.4 for a full
    discussion and example of constructor injection with annotations).'
  raw: '### Lifecycle Listeners


    There are more options for listening to lifecycle events, too: the `InitializingBean`
    and `DisposableBean` interfaces. These interfaces define `afterPropertiesSet()`
    and `destroy(),` respectively, and these methods will be called at the proper
    times (i.e., after construction and all properties are set, and before the context
    releases the reference to the bean). Functionally, it’s exactly the same as with
    the `init-method` and `destroy-method` attributes in the XML configuration; the
    main difference is that these interfaces bind you directly to Spring’s interfaces,
    whereas theoretically the `init-method` and `destroy-method` references do not.^([^(62)](#fn62))


    As with our other tests, here’s a configuration file describing a `FourthObject`.
    Note the lack of lifecycle methods being described.


    ```


    Listing 4-11

    chapter04/src/test/resources/config-04.xml

    ```


    Now, let’s see our test. The actual test itself is functionally equivalent to
    the `TestLifecycle03` test, with the main difference being the class type being
    used, which is `FourthObject` instead of `ThirdObject`. The `FourthObject` class
    itself implements both `InitializingBean` and `DisposeableBean`, and therefore
    replaces `ThirdObject’s init` and `dispose` methods with `afterPropertiesSet`
    and `destroy`, respectively.


    ```

    package com.bsg6.chapter04;

    import org.springframework.beans.factory.DisposableBean;

    import org.springframework.beans.factory.InitializingBean;

    import org.springframework.context.ConfigurableApplicationContext;

    import org.springframework.context.support.ClassPathXmlApplicationContext;

    import org.testng.annotations.Test;

    import static org.testng.Assert.*;

    class FourthObject extends HasData

    implements InitializingBean, DisposableBean {

    static Object semaphore = null;

    @Override

    public void afterPropertiesSet() throws Exception {

    semaphore = new Object();

    }

    @Override

    public void destroy() throws Exception {

    semaphore = null;

    }

    }

    public class TestLifecycle04 {

    @Test

    public void testLifecycleMethods() {

    ConfigurableApplicationContext context

    = new ClassPathXmlApplicationContext("/config-04.xml");

    FourthObject o1 = context.getBean(FourthObject.class);

    assertNotNull(FourthObject.semaphore);

    assertEquals(o1.getDatum(), "default");

    context.close();

    assertNull(FourthObject.semaphore);

    }

    }

