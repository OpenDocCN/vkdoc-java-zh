    We’re now going to take a look at a third way to configure an `ApplicationContext`:
    Java configuration.


    ## Configuration Through Java Config


    With programmatic configuration, you have a few options: one is to define a Java
    class and mark it as a `@Configuration`, providing methods to return Spring beans
    internally. This is (mostly) static configuration.


    Another way to configure Spring programmatically is to grab an `ApplicationContext`
    and manually register components in it. This is dynamic configuration. The latter
    is very flexible, but uncommon, so we’re going to focus on static configuration
    in this section.


    With static configuration, you declare a class with methods that return components;
    mark the methods that return Spring beans with `@Bean`, and mark the class with
    `@Configuration`, and you’re done, although of course you have the capability
    to fine-tune the annotations. If the methods have arguments, then Spring tries
    to use a resolution mechanism similar to constructor-based injection.


    ### Declaring Components with `@Bean`


    Let’s see a simple configuration in action. This configuration will mirror what
    we did with the `MusicService1` in Listing [3-9](#471370_2_En_3_Chapter.xhtml#PC9)
    – a simple component with no dependencies.


    ```

    package com.bsg6.chapter03;

    import com.bsg6.chapter03.mem01.MusicService1;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    @Configuration

    public class Configuration7 {

    @Bean

    MusicService musicService() {

    return new MusicService1();

    }

    }

    Listing 3-36

    chapter03/src/test/com/bsg6/chapter03/Configuration7.java

    ```


    Our eagle-eyed readers will notice that we have `Configuration7`, leaving out
    configurations one through six. This is deliberate. This is the seventh configuration
    in this chapter, so rather than restarting the sequence, we just continued where
    we left off. Good eye, though, readers.


    This configuration would contribute one Spring bean to an `ApplicationContext`,
    whose name would be derived from the method – so create a reference to a `MusicService`
    called `musicService`, with an instance reference of type `MusicService1`. (We’ll
    show how you can name the references differently in a later example.)


    Let’s create another configuration class, one that creates a `MusicServiceTests`
    reference, which we’ll use in a test we’ll see after we walk through the other
    configuration possibilities.


    ```

    package com.bsg6.chapter03;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    @Configuration

    public class TestConfiguration {

    @Bean

    MusicServiceTests musicServiceTests() {

    return new MusicServiceTests();

    }

    }

    Listing 3-37

    chapter03/src/test/com/bsg6/chapter03/TestConfiguration.java

    ```


    ### Using a Programmatic Configuration for `ApplicationContext`


    We’ve seen how to load configurations with `ClassPathXmlApplicationContext` (from
    Chapter [2](#471370_2_En_2_Chapter.xhtml)), but that class accepts XML file locations
    as arguments; here, we have no XML at all. In order to use this kind of configuration,
    we need to use `AnnotationConfigApplicationContext`, passing it a reference to
    the `Class<?>` that represents the configuration. We can pass in as many configuration
    classes as we need. In practice, a runnable application might look something like
    Listing [3-38](#471370_2_En_3_Chapter.xhtml#PC38), which loads our two configuration
    classes and dumps every managed Spring bean’s name to the console.


    ```

    package com.bsg6.chapter03;

    import org.springframework.context.ApplicationContext;

    import org.springframework.context.annotation.AnnotationConfigApplicationContext;

    public class MusicServiceRunner {

    public static void main(String[] args) {

    Class[] configurations = new Class[]

    {Configuration7.class, TestConfiguration.class

    };

    ApplicationContext context =

    new AnnotationConfigApplicationContext(configurations);

    for(String name:context.getBeanDefinitionNames()) {

    System.out.println(name);

    }

    }

    }

    Listing 3-38

    chapter03/src/test/com/bsg6/chapter03/MusicServiceRunner.java

    ```


    If it’s run without changes, the output looks like the following.


    ```

    org.springframework.context.annotation.internalConfigurationAnnotationProcessor

    org.springframework.context.annotation.internalAutowiredAnnotationProcessor

    org.springframework.context.event.internalEventListenerProcessor

    org.springframework.context.event.internalEventListenerFactory

    configuration7

    testConfiguration

    musicService

    musicServiceTests

    Listing 3-39

    Output of MusicServiceRunner

    ```


    You can see in this output how there’s a reference to `musicService` and `musicServiceTests`.
    (We’re going to walk through a few more configuration examples before using this
    – and the rest of our configurations, all of them, in a test.)'
