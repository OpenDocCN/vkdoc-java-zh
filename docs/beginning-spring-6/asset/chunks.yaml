    If our data model was actually being held in secondary storage – i.e., in a file,
    or in a database, or on punch cards, the persistence layer could have a step that
    had nothing do to with the references in memory, and therefore, the incorrect
    changes would propagate only to the scope of the instance. This problem is limited
    to the in-memory form of the data storage.


