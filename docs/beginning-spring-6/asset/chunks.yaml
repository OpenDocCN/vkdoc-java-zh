    (or rookie programmer) could get a song from `voteForSong()`, then call `setVotes(400)`
    – and the actual “database” would change the votes for that `Song` to 400\. This
    is not wise; you don’t want to propagate changes unintentionally. Here, though,
    we’ll allow it because this is a memory-only demonstration and the code’s complex
