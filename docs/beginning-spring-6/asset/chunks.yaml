    \ from their names, in a fairly specific grammar. The grammar can be thought of\
    \ like this:\n\n*   A query type, such as\n    *   `find`, which can return a\
    \ collection or a single entity; you can get a collection by having a return type\
    \ of `List`, for example; you can also return a `java.util.Stream` of the entity\
    \ type if the underlying data persistence mechanism supports it.\n\n*   `read`,\
    \ which operates in the same way as `find.`\n\n*   `query`, which operates in\
    \ the same way as `find.`\n\n*   `get`, which operates in the same way as `find`.\
    \ `get`, `read`, `query`, and `find` are all equivalent in application and meaning;\
    \ they’re just present to allow programmers to use whatever query semantics they\
    \ choose.\n\n*   `count`, which returns a count of entities matching the query.\n\
    \n*   A modifier, such as\n    *   `Top`, `First`, or `Bottom` followed by an\
    \ optional number (`1` is the default, so `Top1` and `Top` are the same).\n\n\
    *   `Distinct` to apply distinctiveness to the results; this would apply to queries\
    \ based on attributes other than the `id` or other unique fields.\n\n*   An optional\
    \ entity type (which is not necessary but might add human readability to the method\
    \ name.) You might say `findArtistByName` or `findByName` – which you prefer is\
    \ up to you."
  trans: "\n```\npackage com.bsg6.chapter09.common;\npublic interface BaseArtist\n\
    extends BaseEntity {\n/**\n* 获取艺术家名称\n*/\nString getName();\nvoid setName(String\
    \ name);\n}\n清单 9-7\nchapter09-api/src/main/java/com/bsg6/chapter09/common/BaseArtist.java\n\
    ```\n\n它有一个泛型参数，就像 `BaseEntity` 一样，但仅用它来将功能**委托**给 `BaseEntity`。\n\n注意\n\n这些都是接口，因为实际的实现需要比泛型接口所能提供的更多信息。例如，对于\
    \ JPA，每个属性（如 `name`）都会有一个关于 `name` 应如何在数据库中表示的描述，但这些表示会根据实际使用的数据存储而改变；例如，MongoDB\
    \ 会使用与 JPA 不同的信息。因此，我们只描述 `Artist` 应*呈现*的方式，而不描述艺术家在具体、实际意义上的真实表示方式。\n\n`BaseSong`\
    \ 稍微复杂一些，因为它需要提供对实现了 `BaseArtist` 的对象的访问。它有两个泛型参数：一个是实现了 `BaseArtist` 的类型，另一个是\
    \ `BaseEntity` 的标识符类型。\n\n```\npackage com.bsg6.chapter09.common;\npublic interface\
    \ BaseSong\n, ID>\nextends BaseEntity {\nT getArtist();\nvoid setArtist(T artist);\n\
    /**\n* 获取歌曲名称\n*/\nString getName();\nvoid setName(String name);\nint getVotes();\n\
    void setVotes(int votes);\n}\n清单 9-8\nchapter09-api/src/main/java/com/bsg6/chapter09/common/BaseSong.java\n\
    ```\n\n现在，我们开始进入有趣的部分；我们将查看 `BaseArtistRepository`，它实际上使用了 Spring Data 来提供功能，之后我们将查看\
    \ `BaseSongRepository`、`BaseMusicService` 和 `WildcardConverter`。一旦我们理解了 `BaseArtistRepository`，其他类就很容易理解了。\n\
    \n```\npackage com.bsg6.chapter09.common;\nimport java.util.List;\nimport java.util.Optional;\n\
    import org.springframework.data.repository.CrudRepository;\npublic interface BaseArtistRepository\n\
    , ID>\nextends CrudRepository {\nList findAllByNameIsLikeIgnoreCaseOrderByName(String\
    \ name);\nOptional findByNameIgnoreCase(String name);\n}\n清单 9-9\nchapter09-api/src/main/java/com/bsg6/chapter09/common/BaseArtistRepository.java\n\
    ```\n\n从表面上看，这个接口似乎相当简单。它有两个泛型参数：一个是实现了 `BaseArtist` 的类型，另一个是主键类型。它还实现了一个接口 `CrudRepository`，这是我们连接大量功能的桥梁。\n\
    \n`CrudRepository` 暴露了许多有用的标准方法，用于 CRUD 操作——即“创建”、“读取”、“更新”和“删除”。`ArtistRepository`\
    \ 的声明意味着这是一个 `CrudRepository` 的实现，适用于扩展了 `BaseArtist` 的类型，并使用 `ID` 表示的主键类型。`CrudRepository`\
    \ 接口本身暴露了以下方法。\n\n| 方法签名 | 描述 |\n| --- | --- |\n| `<S extends T> S save(S entity)`\
    \ | 保存一个实体，并返回一个可赋值给该实体类型的类型。（如果传入一个 `Artist`，返回的将等同于一个 `Artist`。）如果保存操作分配了可见的值（即，如果保存实体生成了一个主键），它也可能改变作为参数传入的实体。它可能不是相同的类型，因为某些持久化机制（如\
    \ Hibernate）返回的是可赋值给该类型的代理，而不是简单的类型本身。 |\n| `<S extends T> Iterable<S> saveAll(Iterable<S>\
    \ entities)` | 保存一组实体；你可以传入任何 JVM 可以迭代的集合。在某些有限的情况下，这可以模拟批量操作，尽管在服务层面进行事务性操作可能更好。\
    \ |\n| `Optional<T> findById(ID id)` | 根据传入的主键对实体类型进行主键查找。如果未找到，则返回 `Optional.empty()`。\
    \ |\n| `boolean existsByid(ID id)` | 指示数据库中是否存在具有传入 `id` 的正确类型的实体。 |\n| `Iterable<T>\
    \ findAll()` | 返回实体类型的 `Iterable`。 |\n| `Iterable<T> findAllById(Iterable<ID>\
    \ ids)` | 返回一个 `Iterable`，包含主键集合中具有匹配 `id` 的每个现有实体。 |\n| `long count()` | 返回仓库中所有正确类型实体的计数。（我们确信这并不意外。）\
    \ |\n| `void deleteById(ID id)` | 如果数据存储中存在具有此 `id` 的实体，则将其删除。 |\n| `void delete(T\
    \ entity)` | 如果实体与现有实体匹配，则将其从数据存储中删除。 |\n| `void deleteAll(Iterable<? extends\
    \ T> entities)` | 从数据存储中删除所有匹配的实体。 |\n| `void deleteAll()` | 从数据存储中删除此类型的所有现有实体。\
    \ |\n\n`PagingAndSortingRepository` 向 `CrudRepository` 添加了两个方法，以支持分页（和排序！），并作为其他可用方法的标记。这两个方法是\
    \ `findAll(Sort)`（其中 `Sort` 表示排序选项）和 `findAll(Pageable pageable)`（其中 `pageable`\
    \ 表示分页和排序选项）。它们都是相当简单的方法，但不在本章的讨论范围内。\n\n然而，`BaseArtistRepository` 还定义了另外两个方法：\n\
    \n```\nList findAllByNameIsLikeIgnoreCaseOrderByName(String name);\nOptional findByNameIgnoreCase(String\
    \ name);\n```\n\n这些方法由 Spring Data 通过动态代理实现，其功能源自方法名称，并遵循相当具体的语法。该语法可以这样理解：\n\n\
    *   查询类型，例如：\n    *   `find`，可以返回一个集合或单个实体；例如，通过将返回类型设为 `List`，你可以获得一个集合；如果底层数据持久化机制支持，你还可以返回实体类型的\
    \ `java.util.Stream`。\n\n*   `read`，其操作方式与 `find` 相同。\n\n*   `query`，其操作方式与 `find`\
    \ 相同。\n\n*   `get`，其操作方式与 `find` 相同。`get`、`read`、`query` 和 `find` 在应用和含义上都是等价的；它们的存在只是为了让程序员可以选择他们喜欢的查询语义。\n\
    \n*   `count`，返回匹配查询的实体数量。\n\n*   修饰符，例如：\n    *   `Top`、`First` 或 `Bottom`，后跟一个可选数字（`1`\
    \ 是默认值，因此 `Top1` 和 `Top` 相同）。\n\n*   `Distinct`，用于对结果应用去重；这适用于基于 `id` 或其他唯一字段之外的属性的查询。\n\
    \n*   可选的实体类型（不是必需的，但可能增加方法名称的可读性）。你可以使用 `findArtistByName` 或 `findByName`——选择哪种取决于你。\n"
- fmt: "`By`，表示查询条件的开始\n\n- 条件列表，包含：\n  - 实体的属性，例如`Name`（对应`Artist.name`）。支持遍历，例如有一个`Person`实体，它引用了`Address`，而`Address`本身包含`city`，则可以使用`findByAddressCity`将城市名称作为查询条件的一部分。\n\
    - `IgnoreCase`使查询不区分大小写，具体实现取决于数据存储——例如，JPA会对属性调用`UPPER()`。\n- 运算符，其可用性取决于具体的数据存储实现。示例包括：\n\
    \  - `Between`\n  - `LessThan`\n  - `GreaterThan`\n  - `Like`\n- 可选的排序，包含：\n \
    \ - `OrderBy`\n  - 属性名称，例如`Artist`或`Song`的`Name`\n  - 可选的排序方向`Asc`或`Desc`\n- 第一个条件与后续所有条件之间的分隔符`And`\n\
    \n这**并非**实际的语法——显然，如果那样做，我们会得到四五页的巴科斯-瑙尔范式图（用于说明形式语法）——但希望这能让命名系统更清晰。\n\n如果我们有一个`ArtistRepository<Artist,\
    \ Integer>`（确实会有！），并且想通过`name`查找`Artist`（此处用`<T>`表示，因为`T`继承自`BaseArtist`），而不必担心大小写精确匹配，那么查询名称应表示为`findByNameIgnoreCase(String\
    \ name)`。它可能返回`Optional<Artist>`或`Artist`引用；如果是`Artist`，当数据库中不存在该名称时（即条件失败），将返回`null`。如果是`Optional<Artist>`，则匹配失败时返回`Optional.empty()`——这种形式主要用于流式操作。\n\
    \n值得注意的是：虽然Spring Data的查询生成器功能强大，但它往往会产生相当复杂的方法名称，并且查询名称的验证有些……不足。这需要程序员自己确保正确性。不过，有一个名为“Querydsl”的库（[`http://querydsl.com/`](http://querydsl.com/)）可以在一定程度上解决这个问题，它为Spring\
    \ Data提供类型安全的查询。\n\n使用Querydsl时，您可以使用注解处理器生成“元模型”——实际上与JPA的条件建模非常相似——然后使用该模型生成可由编译器本身验证的查询。您将使用元模型的方法和属性来构建查询的程序化条件，而不是手动输入名称。这意味着您（希望）也能获得更易于输入的方法名称。\n\
    \n然而，Querydsl的集成仍处于变动之中。就**本书**而言，Querydsl值得关注，但不在讨论范围之内。\n\n让我们快速看一下`BaseSongRepository`。该接口与`BaseArtistRepository`实质相同，但声明更长，因为它需要引用一个继承自`BaseArtist`的类型（因为`BaseSong`声明也需要它）。这也是我们在声明中使用`A\
    \ extends BaseArtist<ID>`的原因；`Repository`本身并不使用`A`，但需要声明`A`来理解`BaseSong<A, ID>`是如何构造的。（还有其他构造方式，但这种方式涉及的嵌套类型更少。）\n\
    \n```\npackage com.bsg6.chapter09.common;\nimport org.springframework.data.repository.CrudRepository;\n\
    import java.util.List;\nimport java.util.Optional;\npublic interface BaseSongRepository\n\
    , S extends BaseSong, ID>\nextends CrudRepository {\nOptional findByArtistIdAndNameIgnoreCase(\n\
    ID artistId, String name\n);\nList findByArtistIdOrderByVotesDesc(ID artistId);\n\
    List findByArtistIdAndNameLikeIgnoreCaseOrderByNameDesc(\nID artistId, String\
    \ name\n);\n}\nListing 9-10\nchapter09-api/src/main/java/com/bsg6/chapter09/common/BaseSongRepository.java\n\
    ```\n\n接下来，让我们快速看一下`WildcardConverter`，它主要提供一个名为`convertToWildCard(String)`的方法。当然，它非常简单。这个类存在的原因是某些数据库使用特殊字符来匹配通配符；例如，SQL使用`%`，而Neo4J使用正则表达式（如`\"\
    .*\"`）。其他数据库可能使用不同的字符，或者像MongoDB那样根本不使用。通过这个类，我们可以让Spring配置为我们的数据库构建合适的`WildcardConverter`，而`BaseMusicService`完全不需要更改。\n\
    \n```\npackage com.bsg6.chapter09.common;\npublic class WildcardConverter {\n\
    private final String append;\npublic WildcardConverter(String append) {\nthis.append\
    \ = append;\n}\npublic String convertToWildCard(String data) {\nreturn data +\
    \ append;\n}\n}\nListing 9-11\nchapter09-api/src/main/java/com/bsg6/chapter09/common/WildcardConverter.java\n\
    ```\n\n现在，我们来看看`BaseMusicService`，它使用了实现`BaseSongRepository`和`BaseArtistRepository`的类。这是一个抽象类。继承`BaseMusicService`的类需要做四件事：\n\
    \n- 具有正确的类签名。\n- 委托给该类的构造函数。\n- 实现`createArtist(String)`，该方法创建实现`BaseArtist`的实例。\n\
    - 实现`createSong(Artist, String)`，该方法创建实现`BaseSong`的实例。\n\n除此之外——我们很快就会看到这个类是如何使用的，请放心！——这个类实现了第[3](#471370_2_En_3_Chapter.xhtml)章和第[8](#471370_2_En_8_Chapter.xhtml)章中音乐服务的所有功能需求，并额外提供了两个方法，用于通过`id`直接访问`Song`和`Artist`。（这对于REST服务来说是一个有用的特性，我们将在第[10](#471370_2_En_10_Chapter.xhtml)章中有限地看到。）实际上，它看起来比实际更复杂。我们知道代码很冗长——这是因为这个类是整章中最重要的类之一。\n\
    \n请注意，在大多数情况下，这是一个中心入口点，允许我们提供这四个特定方法，而不会影响整个对象设计。通常，当您需要适配多种数据存储服务时，您会根据这些数据仓库的优势来设计对象和访问方式，而在这里，我们试图避免这种情况（以防止在大量列表中重复非常相似的对象模型）。这个类允许我们根据需求，以非常狭窄的方式进行特化。"
  raw: "*   `By`, which indicates the beginning of the criteria for the query\n\n\
    *   A list of criteria, comprised of\n    *   An attribute of the entity, such\
    \ as `Name` (for `Artist.name`). Traversals are acceptable, so if you were to\
    \ have, say, a `Person` entity with a reference to an `Address` which itself contained\
    \ a `city`, it’s acceptable to say `findByAddressCity` to use the city name as\
    \ part of the query criteria.\n\n*   `IgnoreCase` will cause the query to be case-insensitive,\
    \ with the actual implementation depending on the data store – JPA will call `UPPER()`\
    \ on the attributes, for example.\n\n*   Operators, the availability of which\
    \ depends on the specific datastore implementation. Examples include\n       \
    \ *   Between\n\n*   LessThan\n\n*   GreaterThan\n\n*   Like\n\n*   Optional ordering,\
    \ comprised of\n        *   OrderBy\n\n*   An attribute name, like Name for an\
    \ Artist or Song\n\n*   An optional direction of either Asc or Desc\n\n*   A separator\
    \ of `And` between the first and all subsequent criteria\n\nThis is not the **actual**\
    \ grammar, obviously – for that we’d end up with four or five pages of Backus-Naur\
    \ diagrams, which are designed to illustrate formal grammars – but hopefully it\
    \ makes the naming system more clear.\n\nIf we have an `ArtistRepository<Artist,\
    \ Integer>` (and we will!), if we want to find an `Artist` – here denoted by `<T>`,\
    \ since `T` extends `BaseArtist` – by `name` without worrying about exact case\
    \ matches, our query name would be expressed as `findByNameIgnoreCase(String name)`.\
    \ It might return an `Optional<Artist>` or an `Artist` reference; if it’s `Artist`,\
    \ it will return `null` if the name doesn’t exist in the database (i.e., the criteria\
    \ failed). If it’s `Optional<Artist>,` then a failure to match the criteria will\
    \ return `Optional.empty()` – a form useful primarily for work with streams.\n\
    \nWorth noting: while Spring Data’s query generator is amazingly powerful, it\
    \ tends to yield rather complicated method names, and validation of the query\
    \ name is a little…​ lacking. This places the burden for getting it right on you,\
    \ the programmer. However, there’s a library called “Querydsl” ([`http://querydsl.com/`](http://querydsl.com/))\
    \ that can fix this somewhat, by providing typesafe queries for Spring Data.\n\
    \nWith Querydsl, you’d use an annotation processor to generate a “metamodel” –\
    \ much like JPA’s criteria modeling, actually – and use that model to generate\
    \ queries that can be validated by the compiler itself. You’d use the metamodel’s\
    \ methods and attributes to build programmatic criteria for the query, instead\
    \ of typing in names. This means you’d also (hopefully) have method names that\
    \ were much easier to type.\n\nHowever, Querydsl integration is still somewhat\
    \ in flux. For the purposes of **this** book, Querydsl is something to watch,\
    \ but it’s not quite in scope.\n\nLet’s take a quick look at `BaseSongRepository`.\
    \ This interface is substantively the same as `BaseArtistRepository`, although\
    \ the declaration is longer because it has to have a reference to something that\
    \ extends `BaseArtist` (because the `BaseSong` declaration needs it, too.) This\
    \ is also why we use `A extends BaseArtist<ID>` in the declaration; the `Repository`\
    \ itself doesn’t use `A`, but needs `A` declared to understand how a `BaseSong<A,\
    \ ID>` is constructed. (There are other ways we could have constructed this, but\
    \ this involved less nesting of types.)\n\n```\npackage com.bsg6.chapter09.common;\n\
    import org.springframework.data.repository.CrudRepository;\nimport java.util.List;\n\
    import java.util.Optional;\npublic interface BaseSongRepository\n, S extends BaseSong,\
    \ ID>\nextends CrudRepository {\nOptional findByArtistIdAndNameIgnoreCase(\nID\
    \ artistId, String name\n);\nList findByArtistIdOrderByVotesDesc(ID artistId);\n\
    List findByArtistIdAndNameLikeIgnoreCaseOrderByNameDesc(\nID artistId, String\
    \ name\n);\n}\nListing 9-10\nchapter09-api/src/main/java/com/bsg6/chapter09/common/BaseSongRepository.java\n\
    ```\n\nNext, let’s take a quick look at our `WildcardConverter`, which mainly\
    \ provides a single method, called `convertToWildCard(String)`. It’s very simple,\
    \ of course. The reason this class exists is because some databases use special\
    \ characters to match wildcards; SQL uses `%`, for example, while Neo4J uses a\
    \ regular expression (like `\".*\"`). Other databases might use different characters\
    \ or, as we’ll see with MongoDB, nothing at all. With this class, we can get our\
    \ Spring configuration to build our `WildcardConverter` appropriately for our\
    \ database, and our `BaseMusicService` doesn’t have to change at all.\n\n```\n\
    package com.bsg6.chapter09.common;\npublic class WildcardConverter {\nprivate\
    \ final String append;\npublic WildcardConverter(String append) {\nthis.append\
    \ = append;\n}\npublic String convertToWildCard(String data) {\nreturn data +\
    \ append;\n}\n}\nListing 9-11\nchapter09-api/src/main/java/com/bsg6/chapter09/common/WildcardConverter.java\n\
    ```\n\nIt’s time for us to look at `BaseMusicService`, which uses classes that\
    \ implement `BaseSongRepository` and `BaseArtistRepository`. This is an abstract\
    \ class. Classes that extend `BaseMusicService` will need to do four things:\n\
    \n*   Have the correct class signature.\n\n*   Delegate to this class’ constructor.\n\
    \n*   Implement `createArtist(String)`, which creates an instance of something\
    \ that implements `BaseArtist.`\n\n*   Implement `createSong(Artist, String)`,\
    \ which creates an instance of something that implements `BaseSong``.`\n\nApart\
    \ from that – and we’ll see how this class is used shortly, we promise! – this\
    \ class implements every functional requirement of our music service from Chapters\
    \ [3](#471370_2_En_3_Chapter.xhtml) and [8](#471370_2_En_8_Chapter.xhtml), along\
    \ with providing two extra methods to access a `Song` and an `Artist` directly,\
    \ by their `id`. (This is a useful feature for REST services, as we’ll see in\
    \ limited fashion in Chapter [10](#471370_2_En_10_Chapter.xhtml).) It actually\
    \ looks more daunting than it actually is. We know the code’s verbose – it’s a\
    \ factor of this class being one of the most important ones in the entire chapter.\n\
    \nNote that for the most part, this is a sort of central entry point that allows\
    \ us to provide those four specific methods without affecting our entire object\
    \ design. Ordinarily, when you cater to multiple data storage services, you design\
    \ your objects and access around what those data repositories do well, and here,\
    \ we’re trying to avoid that (to prevent repeating very similar object models\
    \ for pages and pages of listings). This class allows us to specialize in very\
    \ narrow ways, based on our requirements."
  trans: "\n*   `By`，表示查询条件的开始\n\n*   条件列表，由以下部分组成：\n    *   实体的属性，例如 `Name`（对应 `Artist.name`）。支持遍历，因此，如果你有一个\
    \ `Person` 实体，它引用了包含 `city` 的 `Address`，那么使用 `findByAddressCity` 将城市名称作为查询条件的一部分是可行的。\n\
    \n*   `IgnoreCase` 将使查询不区分大小写，具体实现取决于数据存储——例如，JPA 会对属性调用 `UPPER()`。\n\n*   运算符，其可用性取决于具体的数据存储实现。示例包括：\n\
    \        *   Between\n\n*   LessThan\n\n*   GreaterThan\n\n*   Like\n\n*   可选的排序，由以下部分组成：\n\
    \        *   OrderBy\n\n*   属性名称，例如 Artist 或 Song 的 Name\n\n*   可选的方向，Asc 或 Desc\n\
    \n*   第一个条件与所有后续条件之间的分隔符 `And`\n\n显然，这**并非**实际的语法——要描述实际语法，我们最终会得到四五页的巴科斯-瑙尔范式图，这些图旨在说明形式语法——但希望这能让命名系统更清晰。\n\
    \n如果我们有一个 `ArtistRepository<Artist, Integer>`（我们确实会有！），并且我们想通过 `name` 查找一个 `Artist`（此处用\
    \ `<T>` 表示，因为 `T` 继承自 `BaseArtist`），而不必担心精确的大小写匹配，那么我们的查询名称将表示为 `findByNameIgnoreCase(String\
    \ name)`。它可能返回一个 `Optional<Artist>` 或一个 `Artist` 引用；如果是 `Artist`，当数据库中不存在该名称时（即条件不满足），它将返回\
    \ `null`。如果是 `Optional<Artist>`，则条件匹配失败将返回 `Optional.empty()`——这种形式主要用于流式处理。\n\
    \n值得注意的是：虽然 Spring Data 的查询生成器非常强大，但它往往会产生相当复杂的方法名称，并且查询名称的验证有点……欠缺。这给程序员带来了正确命名的负担。然而，有一个名为“Querydsl”的库（[`http://querydsl.com/`](http://querydsl.com/)）可以在一定程度上解决这个问题，它为\
    \ Spring Data 提供了类型安全的查询。\n\n使用 Querydsl，您可以使用注解处理器生成一个“元模型”——实际上很像 JPA 的条件建模——然后使用该模型生成可由编译器本身验证的查询。您将使用元模型的方法和属性来构建查询的程序化条件，而不是手动输入名称。这意味着您（希望）也能拥有更容易输入的方法名称。\n\
    \n然而，Querydsl 的集成仍然有些变动。就**本书**而言，Querydsl 是一个值得关注的方向，但不在讨论范围之内。\n\n让我们快速看一下 `BaseSongRepository`。这个接口与\
    \ `BaseArtistRepository` 实质上是相同的，尽管声明更长，因为它必须引用一个继承自 `BaseArtist` 的类（因为 `BaseSong`\
    \ 声明也需要它）。这也是我们在声明中使用 `A extends BaseArtist<ID>` 的原因；`Repository` 本身并不使用 `A`，但需要声明\
    \ `A` 来理解 `BaseSong<A, ID>` 是如何构造的。（还有其他构造方式，但这种方式涉及的嵌套类型更少。）\n\n```\npackage\
    \ com.bsg6.chapter09.common;\nimport org.springframework.data.repository.CrudRepository;\n\
    import java.util.List;\nimport java.util.Optional;\npublic interface BaseSongRepository\n\
    , S extends BaseSong, ID>\nextends CrudRepository {\nOptional findByArtistIdAndNameIgnoreCase(\n\
    ID artistId, String name\n);\nList findByArtistIdOrderByVotesDesc(ID artistId);\n\
    List findByArtistIdAndNameLikeIgnoreCaseOrderByNameDesc(\nID artistId, String\
    \ name\n);\n}\n清单 9-10\nchapter09-api/src/main/java/com/bsg6/chapter09/common/BaseSongRepository.java\n\
    ```\n\n接下来，让我们快速看一下我们的 `WildcardConverter`，它主要提供了一个名为 `convertToWildCard(String)`\
    \ 的方法。当然，它非常简单。这个类存在的原因是一些数据库使用特殊字符来匹配通配符；例如，SQL 使用 `%`，而 Neo4J 使用正则表达式（如 `\"\
    .*\"`）。其他数据库可能使用不同的字符，或者像我们将在 MongoDB 中看到的那样，根本不使用任何字符。通过这个类，我们可以让 Spring 配置为我们的数据库构建合适的\
    \ `WildcardConverter`，而我们的 `BaseMusicService` 则完全不需要更改。\n\n```\npackage com.bsg6.chapter09.common;\n\
    public class WildcardConverter {\nprivate final String append;\npublic WildcardConverter(String\
