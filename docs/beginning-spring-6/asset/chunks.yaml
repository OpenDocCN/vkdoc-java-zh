    细心的读者会注意到`@NonNull`的使用。这引出了一个在前几章中已经提及的有趣观点：Spring 会影响你的设计和对象模型，但影响程度完全取决于*你的意愿*。`@NonNull`意味着当
    Spring 自身构建模型或对模型应用验证时（例如在`@Controller`中使用或在其他类似场景中），它可以检查验证结果并提示模型是否构建正确。


    但当 Spring*不参与*时——或者仅以特定方式参与时——这些注解就毫无作用。毕竟注解是在运行时由代码应用的，除非有东西检查被注解的结构并根据注解采取行动，否则*什么都不会发生*。


    因此这些注解是有价值的，但重要的是要注意，它们的存在对*普通代码*而言并不意味着什么——它更多是提供信息，如果我们编写普通的 Java 代码，这些注解对任何事情都没有影响。这里使用的`@NonNull`注解意味着验证机制可以确保没有`null`值通过*验证层*，但
    JVM 本身或执着的程序员仍然可以将值设置为`null`。


    现在让我们看看`Song`类是什么样的。


    ```

