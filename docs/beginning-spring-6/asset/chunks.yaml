    ### 通用模块


    我们的第一个模块将是一个简单的 API 模块。它将包含两个 Servlet，以及我们在音乐网关应用中所需的服务。^(⁷⁰)


    为了创建目录结构，我们需要创建 `chapter05-api/src/main/java/com/bsg6/chapter05`：


    ```

    mkdir -p chapter05-api/src/main/java/com/bsg6/chapter05

    清单 5-1

    使用 UNIX shell 创建目录结构

    ```


    我们还需要一个 `pom.xml`：


    ```


    4.0.0


    com.apress

    bsg6

    1.0


    chapter05-api

    1.0


    ${project.parent.groupId}

    chapter03

    ${project.parent.version}


    com.fasterxml.jackson.core

    jackson-databind


    jakarta.servlet

    jakarta.servlet-api

    6.0.0

    provided


    清单 5-2

    chapter05-api/pom.xml

    ```


    这一切都相当直接，不过我们为 Servlet API 添加了一个资源，并将其设置为 `provided`，这意味着它对编译器可用（我们可以使用 Servlet
    API 中的类进行编译，这在编译 Servlet 时相当重要），但它不是传递性依赖。记住，它*不应该*是传递性依赖；Servlet 运行在像 Jetty 或
    Tomcat 这样的容器中，这些容器有自己的 Servlet API 副本，因此我们的应用实际上应该确保它没有依赖关系会重复容器提供的内容。


    我们还有一个对 `chapter03` 模块的传递性依赖。传递性依赖意味着对 `chapter05-api` 的依赖会附带另一个对 `chapter03`
    的依赖——以及对 `chapter05-api` 或 `chapter03` 所依赖的任何其他内容的依赖。^(⁷¹) 我们将在一些示例中使用第 3 章中的
    `MusicService` 实现之一，因为当我们已经编写了完整可用的接口和实现时，我们不想重新构建一个工作示例。


    这样，我们就可以拥有模块间的依赖关系，而无需将模块输出复制到已知的仓库中。


    我们还有一个对 `jackson-databind` 的依赖；Jackson ([`https://github.com/FasterXML/jackson`](https://github.com/FasterXML/jackson))
    是一个流行的库，用于将 Java 对象转换为 XML、JSON、CSV 等各种格式。我们在这里显式地包含它，因为我们的基础 Servlet 将使用它；实际上，Spring
    已经对其有传递性依赖，所以我们本不必包含它，但这个库没有包含 Jackson 的依赖；因此，为了使用它，我们*确实*需要包含它。在实践中，这种方法相当原始，但对于学习实际工作原理很有用。


    现在让我们来看看我们的 Servlet。它们两个将具有完全相同的结构：


    1.  从 Servlet 上下文中获取 Spring 应用上下文。

    2.  从 Spring 应用上下文中获取 `MusicService`。

    3.  创建一个 `ObjectMapper` 以准备生成 JSON 输出。

    4.  从 `HttpServletRequest` 中获取 Servlet 参数。

    5.  验证参数。

    6.  使用 Jackson 的 `ObjectMapper.writeValueAsString()` 方法从 `MusicService` 生成输出，并转换为
    JSON。


    第一个 Servlet 是 `VoteForSongServlet`。在我们完成 `anno` 或 `xml` 模块之前，我们无法看到它的实际运行，但请注意
    `@WebServlet(urlPatterns="/vote")`，它告诉了我们这个 Servlet 将附加到的 URL 的一部分。（URL 的其他部分是协议、主机、服务器监听的端口以及应用名称本身——因此，当我们运行
    `anno` 项目时，默认情况下，此 Servlet 将在 `http://localhost:8080/anno/vote` 上可用。）


    ```

    package com.bsg6.chapter05;

    import com.bsg6.chapter03.MusicService;

    import com.fasterxml.jackson.databind.ObjectMapper;

    import jakarta.servlet.annotation.WebServlet;

    import jakarta.servlet.http.HttpServlet;

    import jakarta.servlet.http.HttpServletRequest;

    import jakarta.servlet.http.HttpServletResponse;

    import org.springframework.context.ApplicationContext;

    import java.io.IOException;

    @WebServlet(urlPatterns = "/vote")

    public class VoteForSongServlet extends HttpServlet {

    @Override

    public void doGet(HttpServletRequest req, HttpServletResponse resp)

    throws IOException {

    ApplicationContext context = (ApplicationContext) req

    .getServletContext()

    .getAttribute("context");

    MusicService service = context.getBean(MusicService.class);

    ObjectMapper mapper = new ObjectMapper();

    String artist = req.getParameter("artist");

    String song = req.getParameter("song");

    if (artist == null || song == null) {

    log("Missing data in request: requires artist and song parameters");

    resp.setStatus(500);

    } else {

    log("Voting for artist " + artist + ", song " + song);

    service.voteForSong(artist, song);

    resp.setStatus(200);

    resp.getWriter().println(

    mapper.writeValueAsString(service.getSong(artist, song))

    );

    }

    }

    }

    清单 5-3

    chapter05-api/src/main/java/com/bsg6/chapter05/VoteForSongServlet.java

    ```


    警告


    这种使用 `@WebServlet` 的方法，很大程度上是我们直接针对 Servlet API 进行编写。在 Spring 中，有更好的方法来实现这一点，我们很快就会在后续内容中看到。在实践中，像这样使用
    `@WebServlet` 对于应用程序开发者来说非常罕见。


    注意我们是如何获取 `ApplicationContext` 的。`ServletRequest` 有一个由容器关联的 `ServletContext`；我们将把对
