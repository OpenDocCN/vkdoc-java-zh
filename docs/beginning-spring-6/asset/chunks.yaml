    \ getId() == artist.getId() &&\nObjects.equals(\ngetName().toLowerCase(),\nartist.getName().toLowerCase()\n\
    );\n}\n@Override\npublic int hashCode() {\nreturn Objects.hash(getId(), getName());\n\
    }\n@Override\npublic int compareTo(Artist o) {\nreturn o.getName().toLowerCase().compareTo(getName().toLowerCase());\n\
    }\n}\n```\n\n**Listing 7-14**  \n`chapter07/src/main/java/com/bsg6/chapter07/Artist.java`\n\
    \nThe `ArtistService` needs a little more explanation.\n\nFirst, remember that\
    \ we’re trying to implement the following services, as listed in Chapter [3](#471370_2_En_3_Chapter.xhtml)\
    \ that relates to artists:\n\n*   Retrieve a list of artist names (for use in\
    \ autocompletion operations)\n\nThe implication is that the other four services\
    \ we listed in Chapter [3](#471370_2_En_3_Chapter.xhtml) are related to songs\
    \ instead, even though artists are involved, and this is indeed the case.\n\n\
