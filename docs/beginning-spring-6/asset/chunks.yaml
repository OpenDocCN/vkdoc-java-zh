    ### 测试


    在本快速入门指南中，我们将编写的大部分代码都集中在测试上。与之前的 Spring Boot 测试一样，我们需要为类添加一些注解，并准备必要的组件，以便与 TestNG
    正常协作。


    你会注意到，我们在测试中使用了 `MockMvc` 而非 `TestRestTemplate`。除了这些测试不涉及任何 REST API 之外，主要原因是这些测试模拟了来自
    `spring-test` 的请求和响应，无需运行中的 Servlet 容器。这足以让我们验证功能是否按预期工作。接下来，我们看看如何设置一个模拟的 `WebApplicationContext`，并确保对
    `MockMvcBuilders` 应用了 `.apply(springSecurity())`。


    ```

    @SpringBootTest(classes = GatewayApplication.class, webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)

    @AutoConfigureMockMvc

    public class GatewayApplicationTest extends AbstractTestNGSpringContextTests {

    @Autowired

    private WebApplicationContext webApplicationContext;

    private MockMvc mockMvc;

    @BeforeClass

    public void setup() {

    mockMvc = MockMvcBuilders.webAppContextSetup(webApplicationContext)

    .apply(springSecurity())

    .build();

    }

    代码清单 10-7

    摘自 chapter10/src/test/java/com/bsg6/chapter10/GatewayApplicationTest.java

    ```


    我们的第一个实际测试是确保访问 Web 应用根路径时返回 `HTTP 401`。第二个测试将模拟登录过程：当请求收到 `HTTP 401` 后，重定向到登录页面，我们使用一个
