  trans: '

    ### 替代 JVM 语言


    本书主要使用 Java，并借助 Maven 使用 XML 进行项目配置，还少量使用了一种通常被称为“Moustache”的模板语言。然而，JVM 上可用的语言*很多*，如果其他语言因某种原因更适合你，你完全*没有理由*将自己局限于
    Java。


    Spring 甚至通过针对自身进行调整的优化来支持其中大部分语言，因此你可以用 Groovy 或 Kotlin 等语言编写地道的代码，并实现我们用 Java
    演示的所有功能。


    推荐某种特定语言（当然，Java 除外）超出了本书的范围，但 Groovy 和 Kotlin 都是 Spring 的一等公民，你当然也可以利用 Scala
    或 Clojure 等语言。Spring 作用于 JVM 上的*类*；它并不关心这些类是如何创建的。


    这些语言各有优缺点。例如，Groovy 语法非常简洁，可以用很少的代码行添加大量功能，并且作为一种脚本语言，它往往表现力很强。Kotlin *感觉*很像 Java，但其语法通常也极具表现力（因为它旨在表示
    Java 的语法树，而非 Java 的*语法*）。这两种语言与 Java 之间的互操作性通常*非常*高。


    除了 Java 之外，你可能需要考虑的语言，按大致流行度排序如下：


    1.  Kotlin ([`https://kotlinlang.org/`](https://kotlinlang.org/))


    2.  Groovy ([`https://groovy-lang.org/`](https://groovy-lang.org/))


    3.  Ruby ([`www.ruby-lang.org/`](http://www.ruby-lang.org/) 以及 JVM 上的 [`www.jruby.org/`](http://www.jruby.org/))


    4.  Scala ([`www.scala-lang.org/`](http://www.scala-lang.org/))


    5.  Clojure ([`https://clojure.org/`](https://clojure.org/))


    ## Spring WebMVC.fn


    在第 6、7 和 10 章中，我们探讨了如何使用 WebMVC（Spring 用于创建 HTTP 端点的项目）。函数式端点 ([`https://docs.spring.io/spring-framework/reference/web/webmvc-functional.html`](https://docs.spring.io/spring-framework/reference/web/webmvc-functional.html))
    在 Spring 5 中作为 Spring WebMVC.fn 引入，并在版本 6 中与 Spring Web MVC 完全集成。


    函数式端点模型提供了一种使用函数来路由和处理请求的方法，并设计为不可变。它在 Spring 内部提供了一种“领域特定语言”方法，作为基于注解方法的替代方案，但仍运行在同一个
    `DispatcherServlet` 上。


    领域特定语言（简称 DSL）是一种专门针对特定应用领域的语言或语法子集。


    像 Java 这样的语言非常通用，但用 Java 编写的代码可以很容易地针对特定领域；例如，你可以创建一个 `Door` 的抽象，它知道如何 `open`
    或 `close` 自身。


    然而，你仍然在用 Java 表达这些操作。开关门是一个本质上简单的建模过程，但考虑一下模拟电子信号的例子；用 Java 代码表达具体的电子学概念很容易，但对工程师来说，Java
    代码会包含各种工程师不需要且可能不理解的多余信息。


    另一方面，DSL 通常被设计为紧密贴合其所描述的问题空间，理想情况下，工程师应该能够阅读“电子学 DSL”，而无需处理太多底层编程语言。


    JVM 上 DSL 的流行示例包括 Gradle（使用 DSL 在 Groovy 或 Kotlin 中构建项目）、JavaFX 和 Processing（参见
    [`https://processing.org/`](https://processing.org/)）。当然，还有很多很多——包括 `WebMVC.fn`
    本身。但你已经知道了，因为我们一开始就将 WebMVC.fn 描述为一种 DSL！


    不过，你无需在 `Component` 中映射端点，而是创建**另一个**类型为 `RouterFunction<ServerResponse>` 的 bean，它提供了一个便捷的流式
    API，用于创建处理 `GET` 请求、`POST` 请求、过滤等操作的端点。


    以下是一个代码示例片段。


    ```

    @Bean

    RouterFunction routes(PersonHandler ph) {

    return route()

    .GET("/people", ph::handleGetAllPeople)

    .GET("/people/{id}", ph::handleGetPersonById)

    .POST("/people", ph::handlePostPerson)

    .filter((serverRequest, handlerFunction) -> {

    try {

    log.info("entering HandlerFilterFunction");

    return handlerFunction.handle(serverRequest);

    }

    finally {

    log.info("exiting HandlerFilterFunction");

    }

    })

    .build();

    }

    列表 12-1

    WebMVC.fn 路由配置示例

    ```


    这需要一点时间来适应，部分原因是 Java 在创建领域特定语言方面不如 Scala、Kotlin 或 Groovy 等编程语言灵活，因此 DSL 并不像它可能达到的那样简洁——它会包含
    Java 特有的东西，如 lambda 表达式、方法引用和具体类型声明，正如你从列表 12-1 中看到的那样。


    然而，WebMVC.fn 确实允许你集中管理端点配置。如果你目前有 17 个不同的类充当 `Controller` 对象，WebMVC.fn 允许你将它们改回普通的
    `Component` 类——并拥有一个配置所有端点的位置，而不是迫使程序员去追踪这 17 个类中哪一个实际提供了特定端点。


    这是一个有价值的目标吗？老实说，是的（或者，嗯，“也许”）；一个好的设计能让你轻松地在端点和特定的 `Controller` 之间建立映射，但让 `Controller`
    对象自行处理其端点构建意味着它们对应用程序的整体设计和部署拥有比可能应有的更广泛的可见性。


    归根结底，这是一个次要的设计决策（毕竟，Web MVC 现在也能工作，你可以像 WebMVC.fn 那样手动注册端点，只是需要更多代码并且使用地道的 Java
    方式），但这仍然是一个巧妙的想法。即使没有 WebMVC.fn，你仍然可以实现类似的功能（通过在一个中心位置注册端点，但没有 WebMVC.fn 的 DSL），但
    DSL 使其比原本可能的方式方便得多。


    像往常一样，Spring 提供了灵活性，使你几乎可以按照任何你喜欢的方式设计应用程序。

    '
- fmt: '# Spring Reactive


    Reactive programming is easily summarized as “programming with asynchronous data
    streams.”^([^(117)](#fn117))


    We’ve seen example code where streams were preferred to traditional loops and
    other such iterative mechanisms (in particular, in Chapters [3](#471370_2_En_3_Chapter.xhtml),
    [8](#471370_2_En_8_Chapter.xhtml), and [9](#471370_2_En_9_Chapter.xhtml)) – the
    primary difference between traditional streams and reactive streams is that reactive
    code tends to have asynchronous datasources, so there’s typically not an explicit
    end to the stream.


    In a traditional streaming model, there’s a data collection phase – where you’re
    getting a list of `Artist` or `Song` instances – and when you have all of those
    instances, **then** you can process them. Retrieving the instances is a **blocking
    operation** and represents a place in your code that cannot progress until the
    blocking operation completes.


    On the other hand, reactive programming is asynchronous, as we stated: we might
    indicate that we want to get a list of instances, and **when they are available**,
    do something with them. We don’t block execution of the code while waiting for
    the instances to come back from a data source; we set up something to handle the
    instances when they arrive, and exit.


    In practice, this tends to yield some incredible performance gains, because a
    database call (for example) might mean a ten millisecond pause for a given thread;
    with reactive programming, there is no pause at all. The thread can be used to
    do other things instead.


    The cost, of course, is that you have to write your code to use reactive models.
    We’ve been leaning that direction throughout the book, with the emphasis on lambdas
    and streams, but for many Java programmers this is still a somewhat new approach
    – even though it was introduced with Java 8, in 2014.


    With Spring 5, Spring provided a `spring-webflux` module that serves as nearly
    a drop-in replacement for WebMVC.^([^(118)](#fn118)) Spring Web Reactive adapts
    the concepts in Web MVC and migrates them to a reactive model, including the option
    to specify inputs and outputs that don’t necessarily **have** to block on input
    or output; you could use this to provide a series of data points as they become
    available (like stock ticker prices) – both as input **and** output – simply by
    changing the types from `Artist`, for example, to `Flux<Artist>`.


    If this sounds complex on first read, don’t worry – it isn’t very simple. However,
    if you can write code to use WebMVC, it’s fairly easy to migrate to Spring Web
    Reactive and add features and performance gains as you understand how to leverage
    the reactive model.


    There’s even a `spring-boot-starter-webflux` to allow easy usage with Spring Boot
    – and if you’re going to work with Spring Reactive, this is probably the way you
    should go.


    # Message Queues and Spring


    A message queue is a form of asynchronous service-to-service communication.^([^(119)](#fn119))
    In a queue architecture, there are three basic components:


    *   A host application like RabbitMQ ([`www.rabbitmq.com`](http://www.rabbitmq.com)),
    ActiveMQ ([`https://activemq.apache.org/`](https://activemq.apache.org/)), or
    Artemis ([`https://activemq.apache.org/components/artemis/`](https://activemq.apache.org/components/artemis/),
    itself an ActiveMQ project)

    *   A producer (something that sends messages to the host application)

    *   A consumer (something that retrieves messages from the host application)


    Note that a given service can be both a producer and a consumer and that this
    is actually quite common; also, a producer isn’t limited to one type of production,
    nor is it limited to one type of consumption.


    There are two primary message models in queueing systems: publish/subscribe (or
    “pub/sub”) and point-to-point (or “PtP”).


    The two models are different in how messages are delivered:


    *   In a pub/sub model, a message is delivered immediately to every available
    consumer. This message stream is often referred to as being a “topic” (and this
    is indeed how the Java Message Service refers to pub/sub queues).

    *   In a PtP model, a message is distributed to one and only one consumer, no
    matter how many consumers might be listening on a given message stream; the message
    stream is also called a “queue” to differentiate it from a topic. How the messages
    are assigned to consumers is up to the queue itself – but usually messages are
    distributed in a “round robin” algorithm, meaning that messages are **usually**
    evenly distributed among available listeners.


    A chat room is a good example of a topic; a message from one person goes to every
    other person who happens to be in the room when the message is sent.


    An asynchronous logging service is a good example of a queue; a producer generates
    a log message and sends it to the message service, where one of multiple possible
    listeners retrieves the message and decides what to do with it.


    As referred to earlier, Java has a standard specification for working with message
    queues, called the Java Message Service (or “JMS”). JMS is like JDBC: the specification
    covers how the API is used, but not how the API works. You’d use a JMS library
    for each given message queue host; ActiveMQ has one, and RabbitMQ has one of its
    own. (For RabbitMQ, see [`www.rabbitmq.com/jms-client.html`](http://www.rabbitmq.com/jms-client.html)
    for how to access RabbitMQ over JMS.)


    Spring also has a module for working with JMS, `spring-amqp`; in particular, it
    provides the `JmsTemplate` class, as well as providing annotations like `@JmsListener`
    to allow components to retrieve messages from a queue or topic with fairly little
    effort (see [`https://spring.io/guides/gs/messaging-jms/`](https://spring.io/guides/gs/messaging-jms/)
    for more details). You still have to configure the host connection, but after
    that, using a queue or topic is a matter of using the `JmsTemplate.send()` method
    (although the `JmsTemplate` class is actually **extraordinarily** flexible, and
    it’s quite possible you’d never use `send()` by itself, as there are other methods
    that are likely to fit an exact scenario more completely).


    RabbitMQ actually deserves some special treatment here.


    Most messaging providers use version 1.0 of the Advanced Message Queueing Protocol,
    or AMQP ([`www.amqp.org`](http://www.amqp.org)). RabbitMQ, however, by default
    uses AMQP 0.9, and the JMS client for RabbitMQ is designed to work with RabbitMQ’s
    message service.


    You have options, though: you can always install AMQP 1.0 as a plugin for RabbitMQ,
    or you can use AMQP 0.9 directly from Spring, using a `RabbitTemplate` as provided
    by the `spring-rabbit` dependency, which would be a rough equivalent to the `JmsTemplate`
    as provided by the `spring-amqp` module.


    Why would you use a message queue? They’re ideal for massively scaled and transactional
    asynchronous operations; consider bank transactions as an example. Normally, when
    you create charges against your bank account, the bank stores a set of operations
    (withdrawals and deposits) and posts them at a specific time; since message queues
    can be transactional, failures can be reprocessed until they’re successfully handled.
    In addition to making a complex architecture fairly simple to work with (as processes
    have simple inputs and outputs), the transactional nature of consumption in PtP
    scenarios makes the code **safe**.^([^(120)](#fn120))'
