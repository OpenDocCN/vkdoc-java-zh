  trans: '

    最终选择哪种方法实际上取决于你*偏好*哪种方法。这里选择了最简单的方法之一——抽象方法，这些方法在给定数据后，会返回有效的实例。这种方法简单且不易出错。


    它违反了 DRY（“不要重复自己”）原则——尤其是当你考虑到每个被复制的方法签名看起来完全一样时。在这种情况下，为了简洁和简单，我们特意选择重新编写这些方法；如果我们将所有内容都抽象化，就需要再创建一整套类。


    如果我们愿意，可以像第 8 章中看到的那样，编写一个配置来运行 Spring Boot 应用程序；剩下的就是创建一个功能性的用户界面，这样我们就有了一个可用的音乐应用程序，并使用关系数据库进行数据存储。


    现在，让我们看看使用**不同**的数据提供者——MongoDB——需要做多少工作。


    ### `chapter09-mongo` 项目


    MongoDB（[`www.mongodb.com`](http://www.mongodb.com)）是一个开源数据库，它将数据表示为二进制 JSON 文档的集合。因此，它使用动态、灵活的模式。它大致被归为“NoSQL
    数据库”一类，这些数据管理系统不使用 SQL 来操作数据。它也是说明 NoSQL 优缺点的一个很好的例子：惊人的速度和可扩展性，偶尔晦涩的查询和建模，以及通常特定于提供者的事务方法。^(¹⁰⁰)


    幸运的是，Spring Data 使得使用 MongoDB 变得相当简单，并且它符合我们在 JPA 示例中看到的模式，即使用 Spring Data MongoDB
    模块。


    ### 获取 MongoDB


    我们将使用一个库，该库允许我们在测试中**嵌入** MongoDB，因此你无需安装 MongoDB。当然，你可能实际上*希望*在本地安装 MongoDB，而不是依赖嵌入式安装；毕竟，如果你使用
    MongoDB 构建应用程序，外部依赖项并不意外。以下是你可以选择安装 MongoDB 的方法；请注意，测试仍将使用嵌入式版本，但如果你愿意，运行 MongoDB
    也很容易。


    在 OSX 上，只需运行 `brew install mongo` 即可。


    在 Ubuntu 上，可以通过 `apt-get install mongodb` 安装 MongoDB。


    在 Windows 上，你可以通过访问其下载页面（[`www.mongodb.com/try/download/community`](http://www.mongodb.com/try/download/community)）并获取相应的
    MSI 文件来安装 MongoDB。


    你可以通过找到一个空目录并运行它来轻松启动 MongoDB。


    ```

    mkdir /var/tmp/musicdata

    mongod --noauth -dbpath /var/tmp/musicdata

    清单 9-28

    在 Linux 上启动 MongoDB

    ```


    如果这对你不起作用，请查阅 [`www.mongodb.com`](http://www.mongodb.com) 上针对你特定操作系统的说明。另请注意，这会以无身份验证方式启动
    MongoDB；这**仅**适用于运行测试和其他此类长期价值不大的操作。


    ### `chapter09-mongo` 项目的代码


    我们的 `pom.xml` 看起来与我们的 `chapter09-jpa pom.xml` 非常相似。它没有使用 `spring-boot-starter-data-jpa`，而是使用了
    `spring-boot-starter-data-``mongodb`，并且还包含一个额外的测试依赖项 `de.flapdoodle.embed.mongo`。这个依赖项将允许我们的测试实际下载并启动一个嵌入式的
    MongoDB 实例，这样我们就不必在执行任何测试之前确保 MongoDB 正在运行。


