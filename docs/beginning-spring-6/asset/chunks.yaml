    The most code we’re going to write for this quickstart is in the tests. As with
    previous Spring Boot tests, we’ll have some annotations for the class and necessary
    items to work properly with TestNG.


    The tests you’ll notice we’re using `MockMvc` instead of `TestRestTemplate`. The
    main reason aside from us not testing any REST API in these tests, is that the
    tests mock the request and response from `spring-test` and don’t require a running
    servlet container. It gives us what we need to ensure the functionality is working
    as expected. Let’s see how we can set up a mock `WebApplicationContext` and to
    also ensure we `.apply(springSecurity())` to the `MockMvcBuilders`.


    ```

    @SpringBootTest(classes = GatewayApplication.class, webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)

    @AutoConfigureMockMvc

    public class GatewayApplicationTest extends AbstractTestNGSpringContextTests {

    @Autowired

    private WebApplicationContext webApplicationContext;

    private MockMvc mockMvc;

    @BeforeClass

    public void setup() {

    mockMvc = MockMvcBuilders.webAppContextSetup(webApplicationContext)

    .apply(springSecurity())

    .build();

    }

    Listing 10-7

    Part of chapter10/src/test/java/com/bsg6/chapter10/GatewayApplicationTest.java

    ```


    Our first real test is to ensure that when we hit the root of our webapp we get
    an `HTTP 401` returned to us. Our second test is going to mock logging in to our
    tool, so after a request receives an `HTTP 401`, it redirects to login where we’re
    using a `RequestPostProcessor` which will handle anything needed like CSRF and
    the resulting cookie so we can check our expectations of an `HTTP 200` after logging
    in.


    ```

    @Test

    public void testDashboardRequiresLogin() throws Exception {

    this.mockMvc.perform(get("/"))

    .andExpect(status().isUnauthorized());

    }

    @Test

    public void testDashboardAfterLogin() throws Exception {

    this.mockMvc.perform(get("/")

    .with(SecurityMockMvcRequestPostProcessors

    .user("user")

    .password("password")))

    .andExpect(status().isOk());

    }

    Listing 10-8

    Part of chapter10/src/test/java/com/bsg6/chapter10/GatewayApplicationTest.java

    ```


    In order to run the tests in this module, we’ll use maven and specify the module
    and that we want to run `test`.


    ```

    mvn -pl chapter10 -am test

    ```


    ## Customizing Your Security


    Our quickstart is certainly fun for getting up and running fast, and will definitely
    not be sufficient for any real-world application. The convenient thing about using
    Spring Boot with Spring Security is that rather than disabling the auto-configuration
    it affords, we can just surpass it by adding the appropriate configuration classes
    to our application.


    Spring Security works over the Web by using the servlet filter mechanism to intercept
    HTTP calls, matching the calls’ contents to the security mappings. It does the
    same thing for method calls, except with a dynamic proxy instead of a servlet
    filter. Therefore, we need to make sure the security filter is registered with
    the servlet container, or the classloaders, for Security to work its magic.


    Spring Boot will take care of ensuring that the Servlet Filter `springSecurityFilterChain`
    is set up and registered with our application.


    Spring Security’s `springSecurityFilterChain` is a filter chain responsible for
    intercepting incoming HTTP requests and applying various configured security mechanisms
    including authentication and authorization. It is the core mechanism for controlling
    access to specific resources and endpoints and is essential part of Spring Security.


    Our custom security application will give us an application with defaults which
    we’ll customize at each step. Let’s create our custom directory structure for
    `chapter10-custom`.


    ```

    mkdir -p chapter10-custom/src/main/java/com/bsg6/chapter10

    mkdir -p chapter10-custom/src/main/resources/templates

    mkdir -p chapter10-custom/src/test/java/com/bsg6/chapter10

    mkdir -p chapter10-custom/src/test/java/resources/templates

    Listing 10-9

    Creating the chapter10-custom directory structure with POSIX

    ```


    Let’s start with the `pom.xml` and `application.properties` which we can copy
    from `chapter10` wholesale without any changes (and just change the `artifactId`
    to say `chapter10-custom` in the `pom.xml`) for good measure.


    ```

    cp ../chapter10/pom.xml .

    cp ../chapter10/src/main/resources/application.properties src/main/resources

    Listing 10-10

    Copying pom.xml and application.properties from chapter10

    ```


    They say there’s nothing new under the sun, and our starter applications are no
    exception here. We have just copied the main entry point and changed the class
    name for good measure.


    ```

    package com.bsg6.chapter10;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    @SpringBootApplication

    public class GatewayCustomApplication {

    public static void main(String[] args) {

    SpringApplication.run(GatewayCustomApplication.class, args);

    }

    }

    Listing 10-11

    chapter10-custom/src/main/java/com/bsg6/chapter10/GatewayCustomApplication.java

    ```


