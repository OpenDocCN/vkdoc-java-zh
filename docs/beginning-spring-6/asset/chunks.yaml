    Boot 的登录页面自定义处理的一个项目是 CSRF。我们在下面使用 `@ControllerAdvice` 设置了一个 Model 属性，这将允许我们将其注入到我们的
    Mustache 模板中。


    **跨站请求伪造 (CSRF)**


    由于 Web 天生开放的特性，它更容易受到恶意行为者的攻击。其中一种方法是跨站请求伪造 (CSRF 或 XSRF)。攻击者试图诱使无辜的受害者提交一个恶意构造的、受害者拥有特权访问权限的
    Web 请求。对抗这种攻击的一种方法是确保对于固有危险的操作，我们有一个服务器生成的令牌必须被传递，我们将使用 `@ControllerAdvice` 来确保它是一个可供我们所有页面使用的
    Model 属性。


    ```

    @ControllerAdvice

    public class CsrfTokenControllerAdvice {

    @ModelAttribute("csrf")

    public CsrfToken csrfToken(CsrfToken token) {

    return token;

    }

    }

    代码清单 10-16

    filterChain 的定义，位于 chapter10-custom/src/main/java/com/bsg6/chapter10/CsrfTokenControllerAdvice.java

    ```


    以下模板是我们精美的登录页面。它提交到端点 `/login`，并传递 `username` 和 `password`，并且感谢我们的 `CsrfTokenControllerAdvice`，我们还可以传入生成的
    CSRF 令牌，并将其作为隐藏字段传递。我们接下来将在 `NonSecureController` 类文件中看到的一个实现细节是，针对一个名为 `hasError`
    的布尔值的条件块。如果传递给登录处理程序的项目没有成功完成，我们将显示条件块中看到的非常通用的消息。


    ```


    登录页面


    {{ #hasError }}


    用户名或密码无效。


    {{ /hasError }}


    用户名


    密码


    登录


    代码清单 10-17

    登录模板，位于 chapter10-custom/src/main/resources/templates/login.html

    ```


    对于登录路由，我们的控制器将相当简单。唯一特别的地方是我们使用了一个非必需的 `@RequestParam`，名为 `error`，它将指示登录是否因任何原因失败。由于
    Mustache 是一个无逻辑的模板库，我们向模板传递一个名为 `hasError` 的布尔标志属性，如果该参数存在于 URL 查询参数中，则该属性为 true。


    ```

    package com.bsg6.chapter10;

    import org.springframework.stereotype.Controller;

    import org.springframework.ui.Model;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.RequestParam;

    @Controller

    public class NonSecureController {

    @GetMapping("/login")

    public String login(Model model, @RequestParam(required = false) String error)
    {

    model.addAttribute("hasError", error != null);

    return "login";

    }

    }

