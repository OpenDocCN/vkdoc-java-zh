    在这个 `ArtistRepository` 的特定实现中，包括 SQL 本身，并没有什么特别之处。


    然而，`saveArtist` 方法需要一些解释——它实际上返回一个有效的 `Artist`。它通过首先尝试将 `Artist` 保存到数据库来实现这一点——但如果数据已经存在了呢？我们会得到一个异常（`SQLException`，表示违反了唯一键约束）。此方法如果捕获到该
    `SQLException`，就会假设 `Artist` 已经在数据库中，然后查询该 `Artist` 数据并返回它——因此我们总能得到一个有效的“已保存”的
    `Artist`，即使我们并没有在此特定调用中实际创建 `Artist` 数据。


