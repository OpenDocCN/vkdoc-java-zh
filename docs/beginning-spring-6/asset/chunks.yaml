    ## Acknowledgments


    Joseph Ottinger would like to think the unthinkable – oh, wait, the itheberg already
    did that. Instead, he’d like to thank the concept of referring to oneself in the
    third person, as well as whoever thought to add frets to guitars – and remove
    them – long run-on sentences, whoever invented the footnote, beanbags, and Snarky
    Puppy, as well as friends like Andrew and Tracy Snell and Darren Thornton and
    eden Hudson and Todd Smith and – most importantly and seriously – his family for
    putting up with him in the first place, and much more for putting up with him
    during the book-writing process. I love all of you more than I know how to express.
    Really. I’ve tried lots of things out.


    ## About the Authors


    ## About the Technical Reviewer


    # 1. History and Justification


    Spring is an application framework providing dependency injection features for
    the Java Virtual Machine – features that enable testability, reliability, and
    flexibility to application developers. It changed how Java is developed, and here’s
    how and why.


    ## Setting the Stage for Better Development


    Spring, according to Wikipedia, is one of the four temperate seasons, following
    winter and…​ no, no, this isn’t a book about weather. Let’s try again.


    A spring is a mechanical device that stores kinetic energy, releasing it when
    tension stored in the…​ no, that doesn’t sound right either. This is supposed
    to be a book about programming.


    One more try:


    Spring, contextually speaking, is an application framework for the JVM. It uses
    a concept called “dependency injection” – described later in this chapter, we
    promise – as a general model for development, and it has changed how Java programs
    are written – even if the programs in question avoid the use of Spring itself.


    Spring is also an *ecosystem* – a galaxy of extensions and modules with a library
    called `spring-core` at its center. The extensions and modules add functionality
    and features to cover many, many possible use cases. In general, people don’t
    refer to `spring-core` much; instead they just use “Spring” and expect others
    to understand that the ecosystem as a whole is being referred to.


    The modules are, as mentioned, pretty extensive. Chances are, if you need to work
    with something in Java, there’s a Spring module for it…​ somewhere.


    Spring came from somewhere, first, of course; that “somewhere” was actually “someone,”
    Rod Johnson.


    In 2002, Rod wrote a book called *Expert One-on-One J2EE Design and Development*.^([¹](#fn1))
    It was written as a reaction to certain aspects of J2EE, which was the predominant
    framework for enterprise application design in Java, and as such represented a
    bit of a revolution – or a rebirth of joy and ease, if you will – for Java programming.
    In it, Rod included some example code that Juergen Hoeller and others asked him
    to make open source, which found its way into a project, called “Spring,” which
    itself later found its way into *another* book, *Expert One-on-One J2EE Development
    without EJB*.^([²](#fn2)) *This* is the book that really got things moving.^([³](#fn3))


    To understand the importance of J2EE^([⁴](#fn4)) (and Spring, really), we need
    to think about how programming was evolving at the time. “Real applications” tended
    to still be run on minicomputers or mainframes; managed resources were still king,
    and applications that managed to be relevant running on personal computers were
    surprising. Everyone knew of Lotus 1-2-3,^([⁵](#fn5)) of course, and dBase was
    a surprisingly functional database application, and sure, it was fine for students
    and others of similar low breeding to write documents on personal computers…​
    but to actually run *real applications* meant running on the corporate mainframe.


    Mainframe development would be horribly constraining for developers today; the
    concept of scheduling jobs to run – even as compilations, or tests – is foreign.
    We’re used to the power of being able to spin up a PostgreSQL^([⁶](#fn6)) instance
    in Docker,^([⁷](#fn7)) for instance, to which we connect our app for a quick integration
    test. Today, we think nothing of running an application for two seconds just to
    see if a function returns the right value…​ but in the mainframe days, that represented
    quite a considerable investment of time and money and disk space. You typically
    had a production database and one test database, both of which were valued more
    than gold, if only because they were very difficult to replace.


    In that kind of environment, the system administrator was king. The sysadmin told
    you where he or she had located the databases, and how to connect to them, and
    – more importantly – how much of the system resources were allocated to your program.
    Exceed those resources, and your program would be terminated, to prevent impacting
    every other program negatively.'
