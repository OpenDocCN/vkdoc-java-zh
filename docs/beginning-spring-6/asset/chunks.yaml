    ## Configuration


    We’re getting very used to annotation-based configuration, and so we’ll expand
    by showing some configuration classes and how they’re used.


    First up is the `GatewayAppInitializer` which requires us to override two of its
    methods, `getRootConfigClasses()` and `getServletConfigClasses()`. We’ll override
    a third, `getServletMappings()` which identifies what the root mappings will be
    for Spring’s `DispatcherServlet` to listen to. The one we care about the most
    is `getServletConfigClasses()`, which returns our `GatewayAppWebConfig` class.


    ```java

    package com.bsg6.chapter06;

    import org.springframework.web.servlet.support.AbstractAnnotationConfigDispatcherServletInitializer;

    public class GatewayAppInitializer extends AbstractAnnotationConfigDispatcherServletInitializer
    {

    @Override

    protected Class[] getRootConfigClasses() {

    return new Class[0];

    }

    @Override

    protected Class[] getServletConfigClasses() {

    return new Class[]{GatewayAppWebConfig.class};

    }

    @Override

    protected String[] getServletMappings() {

    return new String[]{"/"};

    }

    }

    ```

    `Listing 6-9` `chapter06/src/main/java/com/bsg6/chapter06/GatewayAppInitializer.java`


    Our `GatewayAppWebConfig` will start with two annotations which should make sense
    intrinsically, `@Configuration` and `@EnableWebMvc` as in, this is a configuration
    class, and we want to enable Spring MVC for the things that we’re configuring
    here.


    The next annotation – `@ComponentScan` – we’ve seen mentioned in Chapter [5](#471370_2_En_5_Chapter.xhtml).
    It pulls in all classes under the specified package structure – in this case,
    our service and model classes from Chapter [3](#471370_2_En_3_Chapter.xhtml) `com.bsg6.chapter03.mem03`
    and the classes for Chapter [6](#471370_2_En_6_Chapter.xhtml) under `com.bsg6.chapter06`.


    ```java

    package com.bsg6.chapter06;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.ComponentScan;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.web.servlet.ViewResolver;

    import org.springframework.web.servlet.config.annotation.EnableWebMvc;

    import org.springframework.web.servlet.config.annotation.ViewResolverRegistry;

    import org.springframework.web.servlet.config.annotation.WebMvcConfigurer;

    @Configuration

    @EnableWebMvc

    @ComponentScan(basePackages = {"com.bsg6.chapter06", "com.bsg6.chapter03.mem03"})

    public class GatewayAppWebConfig implements WebMvcConfigurer {

    @Override

    public void configureViewResolvers(ViewResolverRegistry registry) {

    registry.viewResolver(mustacheViewResolver());

    }

    @Bean

    public ViewResolver mustacheViewResolver() {

    var viewResolver = new MustacheViewResolver();

    viewResolver.setPrefix("/WEB-INF/templates/");

    viewResolver.setSuffix(".html");

    return viewResolver;

    }

    }

    ```

