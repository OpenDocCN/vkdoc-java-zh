    Wise readers might wonder why we’re not testing this automatically (as part of
    the build process), as we’ve done elsewhere in the book. The answer is pretty
    simple: it’s hard to do! Cranking up a compliant Servlet container in a test is
    doable, but the best way to do it is with something like Arquillian ([`https://arquillian.org/`](https://arquillian.org/))
    – which is unfortunately not trivial to explain. There’s a ton of plumbing that
    goes into recreating the proper infrastructure, and it’s largely outside the scope
    of this book. Plus, this form of building applications is, as already said multiple
    times, a bit archaic – our next chapter will use Spring Web, which not only makes
    our endpoints far easier to write, but it also makes them inherently *testable*
    without all of the effort we’d have to go through for *this* chapter’s rather
    basic technique.


    We promise, we’re not trying to short-change you, readers! We’re actually just
    not wasting effort showing you a testing process you’re not really going to need,
    but you *will* want to have a basic understanding of what the Servlet API is and
    how it works, in order to construct decent endpoints for your own applications.
    Check out the next chapter. It touches on all of this, and does it properly, and
    then in later chapters we do it *even better*.


    ### The XML-Based Spring Context Application


    Here, everything is **almost** identical to our annotation-based application –
    which was, of course, the whole point of creating the `chapter05-api` module.
    We’re not going to bother with the “Hello, World” Servlet, so this web application
    will contain our `ServletContextListener` and an XML configuration file (along
    with the Servlets we wrote in our `common` module). With our instructions for
    `pom.xml`, we have four files.


    First, the directory structure, starting from the `chapter05-xml` directory itself.


    ```

    mkdir -p chapter05-xml/src/main/java/com/bsg6/chapter05

    mkdir -p chapter05-xml/src/main/webapp/WEB-INF

    Listing 5-14

    Creating the directory structure with POSIX

    ```


    Our `pom.xml` is effectively identical to the `pom.xml` from the `chapter05-anno`
    module, with the only real difference being that we no longer need Mustache (as
    the “Hello, World” Servlet was the only class where Mustache was used).


    ```


    4.0.0


    com.apress

    bsg6

    1.0


    chapter05-xml

    1.0

    war


    ${project.parent.groupId}

    chapter05-api

    ${project.parent.version}


    jakarta.servlet

    jakarta.servlet-api

    6.0.0

    provided


    org.springframework

    spring-web


    org.eclipse.jetty

    jetty-maven-plugin

    11.0.15


    Listing 5-15

    chapter05-xml/pom.xml

    ```


    The `ServletContextListener` creates an `XmlWebApplicationContext` instead of
    an `AnnotationConfigWebApplicationContext`, which means we’ll need to have an
    XML file in the application, but apart from that, everything should be very familiar:


    ```

    package com.bsg6.chapter05;

    import jakarta.servlet.ServletContext;

    import jakarta.servlet.ServletContextEvent;

    import jakarta.servlet.ServletContextListener;

    import jakarta.servlet.annotation.WebListener;

    import org.springframework.context.ApplicationContext;

    import org.springframework.web.context.support.XmlWebApplicationContext;

    @WebListener

    public class XMLContextListener implements ServletContextListener {

    @Override

    public void contextInitialized(ServletContextEvent event) {

    ApplicationContext context =

    buildXmlContext(event.getServletContext());

    event.getServletContext().setAttribute("context", context);

    }

    private ApplicationContext buildXmlContext(ServletContext sc) {

    XmlWebApplicationContext context = new XmlWebApplicationContext();

    context.setServletContext(sc);

    context.refresh();

    return context;

    }

    @Override

    public void contextDestroyed(ServletContextEvent sce) {

    }

    }

    Listing 5-16

    chapter05-xml/src/main/java/com/bsg6/chapter05/XMLContextListener.java

    ```


    Note that when we build an `XmlWebApplicationContext,` we also set a reference
    to the current `ServletContext`. This is primarily used in different environments
    than the one we’re creating; it’s useful when Spring dispatches requests to resources
    itself, which we’re not using here. When we get into Chapter [6](#471370_2_En_6_Chapter.xhtml),
    this sort of thing will happen behind the scenes and we won’t have to worry about
    it, but here it’s just making sure the Spring Context is set up as it expects.


    And, of course, we need the configuration file itself.


    ```


    Listing 5-17

    chapter05-xml/src/main/webapp/WEB-INF/applicationContext.xml

    ```


    This is a near-exact copy of one of the XML configurations from Chapter [3](#471370_2_En_3_Chapter.xhtml),
    just renamed to match the default location searched by `XmlWebApplicationContext`.
    (We can provide a resource to the context to read its configuration, but by default
    it searches the web application’s local resources – in this case, `/WEB-INF/aplicationContext.xml`,
    as shown.)


    If we run the `xml` module with Maven, via `mvn -pl chapter05-xml jetty:run`,
    we can exercise the application in the exact same technique we used with the `chapter05-anno`
    version.


    ```

    $ curl "http://localhost:8080/vote?artist=Therapy+Zeppelin&song=Medium"

    {"name":"Medium","votes":1}

    $ curl "http://localhost:8080/vote?artist=Therapy+Zeppelin&song=Medium"

    {"name":"Medium","votes":2}

    $ curl "http://localhost:8080/songs?artist=Therapy+Zeppelin"

    [{"name":"Medium","votes":2}]

    Listing 5-18

    Testing the application manually

    ```


    Our excitement should know no boundaries! But seriously, we’ve actually done a
    lot so far in this chapter. It just so happens that Spring provides easier ways
    to accomplish the same things, which we’ll see in the next chapter.


    ## Next Steps


    In this chapter, we saw what goes on behind the curtains in a web application,
    with raw Servlets, template rendering with Mustache, and resource requisition
    from manually populated Spring contexts. We also got to see how modules in Maven
    can refer to each other. Chapter [6](#471370_2_En_6_Chapter.xhtml) will show us
    how to build a more fully featured band gateway application, by removing all of
    the manual invocations and conversions (and Servlets) from our application, leading
    us to a more streamlined and modern web application development process, including
    automated testing.


