  trans: '

    ## GraphQL


    在第 6 章中，我们提到了表述性状态传递（REST），这是一种通过 HTTP 处理数据模型的常见且流行的方法。REST 通常相当简单；其最困难之处在于创建从外部
    API 角度而言合理的端点。（另一个棘手的问题是如何处理端点的版本控制，以便在情况发生变化时，你仍需支持“旧方式”。）


    例如，我们是通过`Artist`引用还是按标题来访问`Song`实例？使用歌曲标题更有意义，因为同一歌曲标题可能被多位艺术家使用……但这样一来，如何引用特定艺术家创作的歌曲呢？当然，为了本书的写作目的，我们有令人满意的答案，但在更复杂的模型中，诸如此类的问题可能不那么容易回答。


    此外，REST 端点往往相当粗粒度；如果你请求一个`Song`，通常你会得到该`Song`的所有属性，无论请求是否需要。你显然可以调整 REST 请求的输出，使其不包含所有属性（就像我们在创建自动补全服务时那样），但通常创建投影^(¹²¹)需要创建额外的对象类来表示投影，这对大多数项目来说最终会变成大量工作（尽管投影可能比返回大型对象高效得多）。更简单的做法是直接返回庞大的对象，尽管这可能会影响处理速度和网络传输时间。


    返回“庞大对象”是坏事吗？嗯……和往常一样，这取决于具体情况。如果对象能以序列化形式用相对较小的空间表示，那可能没什么问题，尤其是当它只需几千字节就能表示时。


    一个网络数据包——实际上是数据段——的大小通常在 1500 字节左右，其中大约 1400 字节可供应用程序使用；其余部分构成数据包的头部和其他元数据。如果对象的序列化形式能放入一两个网络数据包，那么**可能**不必担心传输了额外数据。


    当然，如果你要处理数百万个这样的请求，而你的数据占用了**两个**网络数据包，但你只需要传输其中的**部分**数据……那么，将结果精简到更小规模或许更具成本效益。


    或者，当然，也可以考虑使用像 GraphQL 这样的库。


    GraphQL（[`https://graphql.org/`](https://graphql.org/)）是一种查询语言和库，旨在与 API 配合使用，使得客户端能够实际定义需要请求哪些属性，并且可以指定返回数据的**图**结构。


    在我们的音乐网关示例中，如果我们想要所有相关数据，可能需要两个端点来获取一个`Artist`以及该艺术家的每首`Song`。使用 GraphQL，我们可以构建一个请求，同时请求两组数据（`Artist`和相关的`Song`对象），并且可能只包含两种对象类型中的特定属性，而不是**所有**属性。


    由于这是通过**查询语言**完成的，API 设计者甚至不必预先预料应该包含哪些字段，或者结果图应该是什么样子。（当然，API 的消费者必须知道返回了什么；**消费者**必须了解数据，但这正是消费者首先指定数据性质的原因。）


    程序员只需定义哪些字段和对象**可能**可用，然后使用 GraphQL 库来处理请求的输入和输出。


    由于查询语言实际上与对象模型分离，因此在不更改客户端代码的情况下向端点添加功能变得轻而易举；客户端会请求它们需要的数据，而 API 中**额外**数据的存在不会造成影响。


    那么，这是否意味着程序员应该抛弃他们陈旧过时的 REST 端点，转而使用 GraphQL 呢？


    可能不是。GraphQL 和其他许多事物一样，是一个有用的工具；它意味着客户端在了解要请求哪些数据方面承担着一定的责任，但情况并非总是如此。事实上，作者认识的一位开发者在多个环境中遇到过将
    GraphQL 当作“魔法酱料”使用的情况——结果却不得不将其移除，并在项目中看到了好处。这并不意味着 GraphQL**不好**——这只意味着 GraphQL
    是一个工具，和大多数其他工具一样，需要在适当的环境和条件下使用。在那些条件下，GraphQL 可以**非常**有用；当这些条件不具备时，它就像给鱼配自行车一样不切实际。


    GraphQL 的 Java 库可以在[`https://github.com/graphql-java/graphql-java;`](https://github.com/graphql-java/graphql-java%3B)找到；还有一个用于
    GraphQL 的 Spring Boot 启动器，位于[`www.graphql-java-kickstart.com/spring-boot/`](http://www.graphql-java-kickstart.com/spring-boot/)。


    ### 云部署


    本书一直专注于在 Java 虚拟机中部署应用程序。然而，它没有涉及的一个问题是虚拟机实际运行在哪里；在测试中，你是在本地 JVM 上运行，但现代开发的现实是，许多公司在别人的硬件上运行他们的应用程序。


    这带来了足够的复杂性，以至于*每个远程提供商*都值得用一本专门的书籍来介绍其能力和注意事项。虽然可以将功能从一个提供商抽象到另一个（每个提供商都提供了一种运行虚拟机的方式，你可以在上面安装任何你愿意管理的服务），但要真正利用
    Azure（[`https://azure.microsoft.com/`](https://azure.microsoft.com/)）、AWS（[`https://aws.amazon.com/`](https://aws.amazon.com/)）或
    GCP（[`https://cloud.google.com/`](https://cloud.google.com/)），你实际上会希望这些提供商尽可能多地管理你的应用程序。


    例如，你可以使用 Artemis 或 RabbitMQ 设置自己的消息队列系统……但 AWS 有简单队列服务^(¹²²)（以及其他服务），GCP 有 PubSub，^(¹²³)而
    Azure 有 Azure Messaging。^(¹²⁴)


    每个提供商还提供不同的数据存储，无论是基于云的关系型数据库（如 MySQL 或 Postgres），还是其他 NoSQL 或 SQL 相关技术（如 DynamoDB、MongoDB
    或 BigQuery）。


    功能列表*非常*广泛：这仅仅是触及了人们可能*首先*寻找的内容的表面。


    Spring 有一个项目，Spring Cloud（[`https://spring.io/projects/spring-cloud`](https://spring.io/projects/spring-cloud)），旨在帮助协调这些服务，无论是在消费还是部署方面。该项目的大部分内容侧重于应用程序层面的问题（“我如何消费内容，或协调服务”），但也可能有助于解决可管理性或部署等问题。

    '
- fmt: '### Performance Metrics


    This book has been almost entirely focused on functional requirements, as we pointed
    out in the opening of this chapter: can a given service fulfill these tasks?


    What we have not asked is: “can a given service fulfill these tasks under a given
    load?” – in other words, how fast, or how scalable, is a given service?


    For us, there are two ways to measure scalability: “vertical” and “horizontal”
    scales. Different people will use different axes or terms, but the concepts travel
    well.


    Vertical scalability is, for us, “how fast is a service?” If a given method –
    `methodA()` – takes 400 milliseconds to execute, and another method (`methodB()`)
    takes 750 to execute, the first method (`methodA()`) has better “vertical scalability”
    than the second.


    Horizontal scalability is “how many of these calls can successfully execute at
    a given time?” If `methodA()` can only be invoked in *one thread* at a time, but
    `methodB()` can be invoked by four hundred threads at the same time, `methodB()`
    has much better horizontal scalability than `methodA()`.


    These two axes work in concert with each other. Let’s say we have four threads
    that call each method.


    The first thread calls `methodA()` – and takes 400ms to get a value back. The
    second thread’s call to `methodA()` *has to wait until the first thread’s call
    is finished* – so if they both start at the same time, the first thread will get
    a result in 400ms, but the second thread will get its result in 800ms, the time
    it takes for the first thread to get its data, plus the time it takes to get the
    second thread’s result. The third thread will have an elapsed clock time of 1200ms,
    and the fourth thread will have an elapsed clock time of 1600ms, assuming nothing
    else interferes with the execution times.


    Now, let’s run the same exercise with `methodB()`, which takes longer (750ms instead
    of 400ms), but now each thread can get its result concurrently – that is, the
    first, second, third, and fourth threads all get their response in 750 milliseconds.


    The `methodB()` call is slower but has much better horizontal scalability; `methodA()`
    is faster but has terrible horizontal scalability.


    We’ve tried to design code in this book such that horizontal scalability is preserved,
    but we’ve not tested it at all, largely because horizontal scalability is driven
    entirely by what kind of performance is required by an actual application. Does
    the application need to scale to dozens of users? Or millions? Code that’s designed
    for millions of simultaneous users would look *very* different from code that’s
    designed for ten users, and the testing harnesses would also be rather different.


    **Note**


    It’s fairly easy to find libraries that have tutorials that say, “Here’s how you’d
    build Twitter^([^(125)](#fn125)) with our technology,” and those tutorials can
    be very useful. But at the same time, Twitter’s performance requirements are not
    only *incredible*, but they’re incredibly difficult to *replicate*, and your authors
    know of very few tutorials that would hold up under Twitter’s actual deployment
    requirements, *in any way*. Very few tutorials address the horizontal scalability
    issues that big social media sites have to address.


    Testing frameworks like TestNG (`https://testng.org/`, used in this book) and
    JUnit5^([^(126)](#fn126)) can *help* test horizontal and vertical scalability,
    but you’d also at some point look at tools like Apache JMeter (`https://jmeter.apache.org/`)
    to generate testing scenarios that stress horizontal capabilities.


    ### Other Developers


    This book has been an attempt to have a conversation between your authors and
    you, largely one-sided because a book is a compilation of static information.
    That can be effective (books are how your authors learned first, too!), but it’s
    not the end of learning.


    We would encourage you to find other developers, in whatever forums you find convenient,
    and *communicate with them*. Whether it’s a local Java users group (`https://dev.java/community/jugs/`
    is a good starting point), or StackExchange, Quora, IRC, Google Groups, Facebook,
    or…​ well, *anything*, really, developers are often interested in the art and
    skill of programming, and most are willing to teach (and learn). The community
    around Java is *by far* its most powerful tool. The amount of knowledge is incredible,
    and it’s easy to find motivated developers to contribute to whatever you’re doing.^([^(127)](#fn127))


    Ask questions! Nobody is likely to blame you for not knowing something. (If they
    do, well, our apologies for their behavior in advance – not everyone behaves perfectly
    in every situation.)


    Also, offer answers, even if you lack confidence – one can learn from an expert
    saying why your answer might not be the right one, too, and as we said early in
    this book, working code is better than non-working code, even if your answer might
    not be perfect.


    Doing both of these things contributes to the sea of knowledge available for humanity
    – and that’s one of the highest callings that we can have.


    ## What’s Next?


    We hope you’ve enjoyed learning more about Spring (and, occasionally, *more* than
    Spring). We’ve covered the basics of Spring, including why it was written and
    why it still exists, and how it still affects Java developers today. We’ve also
    covered using Spring to serve content over the Web, and how to interact with multiple
    data sources; we’ve also addressed how to identify users and limit what they can
    do based on their identities and roles. Lastly, we’ve started gently peeking beyond
    the Web, persistence, and security to consider the wider Spring ecosystem.


    Now it’s your turn: develop fascinating applications with Spring! Change the world
    for the better, and tell the world what you’ve done and how you’ve done it. We’ll
    be watching and cheering you on.'
