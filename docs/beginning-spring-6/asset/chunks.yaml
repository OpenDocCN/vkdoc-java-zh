- fmt: '### Verification


    The ability to enforce the module rules we’ve set in place with `Modulith` is
    a pretty big benefit which we can take advantage of. Let’s take a look at an item
    we can add to one of our tests, so if a code path has gone outside its bounds,
    the test will fail.


    ```

    package com.bsg6.chapter11;

    import org.springframework.boot.test.context.SpringBootTest;

    import org.springframework.modulith.core.ApplicationModules;

    import org.springframework.test.context.testng.AbstractTestNGSpringContextTests;

    import org.testng.annotations.Test;

    @SpringBootTest(classes = GatewayApplication.class)

    public class GatewayApplicationTest extends AbstractTestNGSpringContextTests {

    @Test

    public void testModulesValid() {

    ApplicationModules.of(GatewayApplication.class).verify();

    }

    }

    ```


    The checks will include:


    - Dependencies between modules have to form directed, acyclic graph^([^(111)](#fn111))

    - All references to types that reside in application module internal packages
    are rejected

    - Explicitly allowed application module dependencies only if specified. If defined
    allowed dependencies are specifically configured any others will be rejected


    If we were to add a reference to `Artist` in the `SongService` and ran the tests
    with maven, we would see something like the following:


    ```

    [ERROR] Failures:

    [ERROR]   GatewayApplicationTest>AbstractTestNGSpringContextTests.run:154->testModulesValid:13
    » Violations - Module ''song'' depends on non-exposed type com.bsg6.chapter11.artist.internal.Artist
    within module ''artist''!

    Method  calls constructor ()> in (SongService.java:19)

    ```


    ### Documentation


    One of the other nice features of Spring Modulith is the ability to generate documentation
    for our modules. We can do this by running tests for the module using `mvn test`.


    ```

    package com.bsg6.chapter11;

    import org.springframework.modulith.core.ApplicationModules;

    import org.springframework.modulith.docs.Documenter;

    import org.testng.annotations.Test;

    public class DocumentationTests {

    ApplicationModules modules = ApplicationModules.of(GatewayApplication.class);

    @Test

    void writeDocumentationSnippets() {

    new Documenter(modules)

    .writeModulesAsPlantUml()

    .writeIndividualModulesAsPlantUml();

    }

    }

    ```


    The documentation this generates is available in `target/spring-modulith-docs`,
    and here’s an example of what it generates.


    ![](images/471370_2_En_11_Chapter/471370_2_En_11_Fig7_HTML.jpg)


    A diagram of a gateway application. It depicts a dashed container labeled gateway
    application, container. There are 2 components inside the container, namely song
    module and artist module. The song module uses the artist module.


    **Figure 11-7** Gateway application


    If you aren’t much for graphical representations of your component module relationships,
    you can opt for a `Documenter` that writes them out in a documented textual form.


    ```

    new Documenter(modules)

    .writeModuleCanvases();

    ```


    The example that follows is mapping the `artist` module and turning it into an
    `asciidoc` block for us.


    | **Base package** | `com.bsg6.chapter11.artist` |

    | **Spring components** | *Controllers* • `c.b.c.a.ArtistController` *Services*
    • `c.b.c.a.ArtistService` |


    Building things like this into the modular architecture is definitely a nice touch
    and useful for exploring the power of the Spring Modulith system even though it’s
    just barely reached 1.0.


    In this section we’ve gone over how to set up simple application modules and prevent
    internal code from being accessed from the other modules, keeping a nice separation
    of concerns. We’ve gone through verification checks to ensure everything looks
    good and seen what the documenting of application modules looks like in broad
    strokes. Within Spring Modulith, there are many other modules that we can utilize
    to help in the process, and we highly recommend you crack open the reference documentation:
    [`https://docs.spring.io/spring-modulith/docs/current/reference/html/`](https://docs.spring.io/spring-modulith/docs/current/reference/html/).


    ## Next Steps


    In the next chapter, we’ll look at what’s next in your Spring journey. We’ll touch
    on other interesting modules of Spring that we haven’t covered previously.


