    # 9. Persistence with Spring and Spring Data


    In Chapter [8](#471370_2_En_8_Chapter.xhtml) we finally stopped looking at configuration
    and presentation mechanisms, and we looked at accessing a relational database
    with `JdbcTemplate`. In this chapter, we’re going to look at accessing data again
    – with a Spring project called “Spring Data,” which can provide a mostly data-agnostic
    view of data access.


    Spring Data unifies data access for Spring, providing common access to not only
    different databases, but different APIs – like JPA (the Java Persistence API)
    and our old friend JDBC, but different **types** of databases like MongoDB, Neo4J,
    and others.'
