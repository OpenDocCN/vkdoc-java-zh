- fmt: '### Declaring a Bean with `<bean />`


    To declare a component in XML, one uses the `<bean />` tag, as shown in Listing
    [3-25](#471370_2_En_3_Chapter.xhtml#PC25).


    ```

    Listing 3-30

    chapter03/src/test/resources/musicservicetest.xml

    ```


    This is a simple and straightforward usage of `<bean/>`, but there are a *lot*
    of attributes that can be used here. We’re going to cover the most common ones
    in this chapter, with others covered in Chapter [4](#471370_2_En_4_Chapter.xhtml).
    There are more attributes than are being covered in this table, but the ones that
    aren’t included here are rare.


    Other attributes to look for, particularly in Chapter [4](#471370_2_En_4_Chapter.xhtml),
    include `init-method`, `destroy-method`, `factory-method`, and `factory-bean`.


    **Table 3-1** Attribute list


    | Attribute | Meaning | Description |

    | --- | --- | --- |

    | `name` | The qualified name of the bean | If no name is provided, the bean name
    is derived from the class name. |

    | `class` | The fully qualified class of the bean | There are cases where this
    is actually unnecessary, but they’re rare and not covered in a book for Spring
    beginners. |

    | `scope` | The lifetime of the bean component | This determines if `getBean()`
    will return the same instance on every invocation (thus keeping the component
    as a singleton) or if Spring will create a new instance on every call to `getBean()`.
    The default is the singleton mode (with the attribute value being `singleton`,
    if you can imagine.) If a prototype is desired, the attribute value is `prototype`.
    |

    | `lazy-init` | When in the context’s lifecycle, a bean should be created | If
    set to `true`, the bean will be instantiated when it’s requested, rather than
    on container startup. The default is `false` so the Spring beans are created immediately
    and eagerly. |

    | `autowire` | Controls the autowiring behavior for this bean | Spring will not
    autowire references created via XML by default; this setting allows programmers
    to fine-tune autowiring behavior. It can be set to `no`, which means "no autowiring,"
    `byName` and `byType` which means autowiring is based on the attribute name (so
    `foo` will match a component with the name `foo`) or by reference type, and `constructor`,
    which is like `byType` except for constructor arguments. |

    | `depends-on` | A list of beans that must be initialized before this one | This
    is a comma-separated list of dependency references that must be fully initialized
    before this one is initialized. This is not normally required; Spring can determine
    if bean `foo` depends on `bar` or not, so this is only if the default dependency
    mechanism fails thanks to static references or something like that. In general,
    if you need this, you’ve done something wrong. |


    So what we see in Listing [3-30](#471370_2_En_3_Chapter.xhtml#PC30) is a simple
    Spring bean, called `musicServiceTests`, of type `com.bsg6.chapter03.MusicServiceTests`.
    It will be created as soon as the configuration is loaded (since `lazy-init` is
    left to the default, which is `false`), and it will be a singleton (only one instance
    loaded per `ApplicationContext`), since we let the `scope` to its default value,
    which is `singleton`.


    This is, of course, the simplest type of bean to create, a bean that has no attributes
    to manage. It’s entirely self-contained. What happens if we want to set other
    attributes – as we do with our `Normalizer` instances? Well, first, let’s create
    a `normalizers-na.xml` configuration. We’re going to use `normalizers-na.xml`
    because `normalizers.xml` uses annotations for configuration, and we want to be
    explicit^([^(58)](#fn58)); our beans will still be named `foo` and `bar` but we
    want to create them explicitly. Note that the beans are the `Normalizer` classes
    from the `mem03` package – and we’re going to reuse `MusicService3` as well, just
    without the annotations being processed.


    ```

    Listing 3-31

    chapter03/src/test/resources/normalizers-na.xml

    ```


    ### Wiring Components Together with `<property />`


    Now that we’ve declared a set of configurations with, well, a set of Spring beans,
    we need to figure out how to use these beans in our `MusicService3`; if you paid
    any attention to Chapter [2](#471370_2_En_2_Chapter.xhtml), of course, you know:
    we’re going to use `<property />` to set the references.


    The `property` tag has the following attribute values and meanings:


    | Attribute | Meaning | Description |

    | --- | --- | --- |

    | `name` | This is the name of the property to set | This is required |

    | `value` | This is the value of the argument, which must be easily coerced into
    the `type` | This cannot co-exist with `ref` |

    | `ref` | This is a reference to another named Spring bean, by name | This cannot
    co-exist with `value` |


    In this case, we have two `Normalizer` references available, provided we import
    `normalizers-na.xml` – and we will – so we’re going to use `ref` to set the values.
