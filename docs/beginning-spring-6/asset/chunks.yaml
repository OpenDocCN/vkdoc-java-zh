- fmt: '# A Criticism of Books


    In your humble authors’ opinion, books are excellent resources for developers,
    but they’re far from perfect.


    The biggest problem books on tech have is that they tend to aim too low. Most
    of them present snippets of code, for one thing, which can work depending on what
    they’re trying to demonstrate, but for any real application, a ten-line sample
    of code just isn’t enough when your deployed codebase is made of thousands of
    lines of code and dozens of components.


    That’s why in this book, where possible, we’ve opted to show **complete** classes,
    including `package` and `import` statements, to remove the ambiguity about what
    code goes where. The intent was that you could use the book’s text as a workable
    reference; you don’t have to figure out if you’ve included everything (or the
    right thing) when you’re looking at a given snippet, if the code we show is meant
    to be executed.


    We’ve also preferred tests over running code and manually checking output. Tests
    are how you **know** code works; it’s easy to look at `"Hello, wor1d"` and miss
    that `"world"` has a number `1` instead of the *letter* `l`. If you look closely
    enough – and your font is clear enough – you can see it, but the human brain is
    fantastic at correcting what it sees to make sense, so there’s absolutely no blame
    for anyone if you read “Hello, world” when “world” has a number embedded in it.


    Tests don’t have a problem of autocorrecting results to be valid. The output has
    to be right. If your test uses a regex – `"Hello, wor[1l]d"` – which would pass,
    then you can see, in the test, that the matcher is using a regular expression
    that *probably* doesn’t make sense in the context of assuring that your output
    matches what you expect it to.


    Tests can be aggravating to write, but they’re tools that should be in everyone’s
    reach. We could have done **more** testing in this book, but what we strove for
    was a good balance of testing for intent: if a service is supposed to be able
    to write, read, update, and delete data that looked a certain way, we’ve tried
    to represent some sensible aspect of those requirements in tests.


    There are aspects of testing we’ve not touched upon, like performance (“Can the
    service handle one thousand updates from four hundred users in three seconds or
    less, with a memory impact of…​”), but that leads to another aspect of knowledge
    transfer that books suffer with: scope.


    A book like this has to be limited in scope, or else we’re covering too much.
    We chose to focus on aspects of the Spring Framework and its accompanying ecosystem
    that you’re likely to encounter in real development, such that you were able to
    work with some confidence in what to expect the framework to do and what a real
    project would look like. But to go too much farther in some directions would cover
    deployment scenarios that are simply too broad for a book on **Spring** to cover…​
    unless we had another few years, at least, to write, plus a few more volumes (leading
    to a version of Knuth’s *The Art of Computer Programming* a multi-volume set that’s
    still not finished, despite being started in 1968), and not only would our gentle
    publishers rebel at the thought, but your authors don’t have the talent to be
    Donald Knuth.


    We also purposefully stayed away from prescriptive decisions like “what IDE to
    use,” preferring instead to focus on build tools that are IDE-neutral. You could
    write this book’s code with Notepad++, vim, emacs, IDEA, Eclipse, NetBeans…​ anything
    that can save text in a format that the Java compiler can read. We used IDEA in
    writing (including writing the chapter contents, not just the code), but we could
    have done with *any* workable tool, because we felt that telling our readers to
    prefer one over the other was not helpful and covering *every* option wasn’t workable
    either.


    Imagine as you’re reading having to look at screenshot after screenshot of Eclipse
    running the tests…​ and then IDEA running the tests (as the display would be similar
    in intent but not the same)…​ and then NetBeans. It would have been too much to
    ask of you, our readers, to endure all of that, and it would have added very little
    to the value of the book.


    We’ve striven to deliver as much value as we were able to, outside of the footnotes.


    ## Spring Initializr


    A project you might consider is Spring Initializr, a web application found at
    `https://start.spring.io/`. This is an application that generates a Spring project
    with a set of dependencies that you can literally select from a list.


    Here’s what Initializr’s first page might look like, after you’ve selected a group
    id and Maven as your build system (much as we might have done for this book, although
    we didn’t).


    ![](images/471370_2_En_12_Chapter/471370_2_En_12_Fig1_HTML.jpg)


    A screenshot of the Spring Initializr interface at start dot spring dot io. It
    depicts various project settings, including project type, Spring Boot version,
    and project metadata. No dependencies are selected. Generate, explore, and share
    buttons are at the bottom.


    **Figure 12-1** Initializr’s first page


    Selecting dependencies will add everything those dependencies need such that your
    project is set up **properly** for those dependencies. For example, a typical
    application (as one might have found in Chapters 5 and 6) might have Spring Data
    JPA, as well as Spring Web and Mustache, and Initializr allows you to simply include
    all of these as straightforward dependencies in a simple dropdown.


    ![](images/471370_2_En_12_Chapter/471370_2_En_12_Fig2_HTML.jpg)


    A screenshot of the Spring Initializr interface at start dot spring dot i o. It
    depicts various project settings including project type, Spring Boot version,
    and project metadata. Dependencies section lists 3 options as follows. Spring
    web, web. Spring data J P A, S Q L. Mustache, template engines.


    **Figure 12-2** Selecting dependencies


    After your dependencies are selected, you can download a full compilable project
    using the “Generate” button; open that project with whatever tool you choose,
    and you now have a workable platform upon which to build the Next Big Thing the
    world’s been looking for.


    We didn’t use Initializr for this book, as we’ve already said, but we certainly
    could have. If you’re wondering what some of the offerings the Spring ecosystem
    might have, this is an excellent place to find many of them.


    There’s more to the Spring ecosystem than what Initializr has, of course: GitHub
    (`https://github.com`) has many projects that solve different problems than Spring
    has attempted, or in different ways. If you’re looking for something that Spring’s
    developers haven’t addressed, there’s a good chance someone else has made a workable
    attempt at it.'
