    ## 引言


    第 7 章是一章“总括性”章节，重点介绍了 Spring Boot。随后我们探讨了 Spring Boot 为我们处理的一些常见事务，例如处理依赖解析，以及为开发者常用的功能（如简单的
    Web 部署、便捷的可执行归档文件和近乎透明的数据库配置）提供便捷的起点。


    接着，我们介绍了数据库访问，大多数有经验的开发者——以及许多经验不足的开发者——可能会将其描述为“古雅”。我们还略微提到了数据库访问代码中的一个关键问题——该问题最终导致我们的服务只能处理两个数据库实体中的一个，因为在第
    7 章的上下文中解决该问题得不偿失。因此，我们在第 7 章中选择对更简单的内容进行建模，将合适的数据库访问推迟到**本章**和下一章进行。


    你认为第 7 章中的“关键问题”是什么？除了显而易见的答案“没有引用‘Song’”之外？剧透倒计时：三…​ 二…​ 一…​。


    第 7 章完全没有管理事务。如果不引入超出第 7 章范围的数据库抽象，就无法解决数据库请求的协调问题。相反，我们选择保持事情非常简单，并为第 8 章和第 9
