- fmt: '# Spring Boot and Database Connections


    It’s time for us to create a better version of our music gateway services. In
    previous chapters, we’ve been reusing a memory-only version of the services from
    Chapter [3](#471370_2_En_3_Chapter.xhtml), which was convenient because those
    services had no other dependencies; they didn’t use a database or anything that
    might require configuration. In the interest of demonstrating a more fully featured
    configuration, let’s create a `MusicService` backed by an embedded database (H2,
    in this case).


    We’re still showing you ways to do things that aren’t exactly “the most efficient.”
    That’s because this chapter is focused on Spring Boot and some of its features,
    not JDBC or other such technologies; we’re purposefully not leveraging some of
    the things we will cover in subsequent chapters. Some of those things, like Spring
    Boot itself, will make accomplishing some of these programming tasks much easier
    and with less code.


    First, of course, we need to make sure H2 is available to our project. We also
    will need to make sure that `spring-boot-starter-jdbc` is in our list of dependencies,
    in order to – spoiler alert – get Spring Boot to add connection pooling for our
    database.^([^(90)](#fn90))


    Why H2 and not HSQL or Derby? For one thing, H2 is probably the most popular of
    them; both it and HSQLDB are actively maintained forks of HSQL, but H2 is maintained
    by HSQL’s original author. Derby is actually surprisingly capable, being nearly
    a Java version of IBM’s DB2 and maintained by Apache, but it’s also heavier on
    system resources than H2 or HSQLDB.


    ```

    4.0.0


    com.apress

    bsg6

    1.0


    chapter07

    1.0

    war


    com.h2database

    h2

    runtime


    org.springframework.boot

    spring-boot-starter-web


    org.springframework.boot

    spring-boot-starter-jdbc


    org.springframework.boot

    spring-boot-starter-test

    test


    org.springframework.boot

    spring-boot-maven-plugin

    ${springBootVersion}


    repackage


    Listing 7-10

    chapter07/pom.xml with H2 included

    ```


    Note the use of the Spring Boot maven plugin, in the `build` node. This is what
    allows us to package the Spring Boot app in executable form, ready to deploy and
    run, along with some other (relatively minor) things.


    What’s neat here is that for three embedded databases for Java – H2, HSQLDB, and
    Derby – Spring Boot can autoconfigure our databases for us. All we have to do
    is include the dependencies, and Boot does the rest. That doesn’t mean we won’t
    want to configure the databases, but for early development and testing, it’s rather
    convenient, as are many of Spring Boot’s features. In the interest of best practices,
    however, we’re going to manually configure the database connection.


    ## Initializing Data with Spring Boot


    Spring Boot also runs SQL for us on application startup. It starts by executing
    the SQL commands contained in files named `schema.sql` and `data.sql` (in that
    order) from the classpath (so we can locate these files in our source tree at
    `src/main/resources`, for example). It also will run database-specific scripts
    based on a platform property – which we’ll show – so that we can have generalized
    schema set up and then fine-tune the configuration for whichever database we might
    choose, if we happen to use features that aren’t based on the SQL standard. (In
    other words, if our schema requires features for a specific database, using that
    database’s custom SQL, we can locate the custom SQL in a file named specifically
    for that database.)


    Note that our startup scripts are designed for our testing requirements, not for
    live deployment. We forcibly reset the data to match what our tests require, which
    is something a live application would not want to do.


    We’ve now mentioned autoconfiguration of the database connection pool and a “platform”
    property. These come from a simple property file in the classpath, called `application.properties`.
    In our case, we want to set up a simple database connection, with a JDBC URL,
    a username, a password, and a database driver name. We don’t actually need all
    of these – or any of them, really – but it’s good practice to set them for when
    you’ll want to change them to something more robust than an embedded database.^([^(91)](#fn91))


    Our `application.properties` file for now.


    ```

    spring.datasource.url=jdbc:h2:./chapter07;DB_CLOSE_ON_EXIT=FALSE

    spring.datasource.username=sa

    spring.datasource.password=

    spring.datasource.driver-class-name=org.h2.Driver

    spring.sql.init.platform=h2

    Listing 7-11

    chapter07/src/main/resources/application.properties

    ```


    With this, we’re creating a database in the user’s current directory when the
    application is run, with a database username of `sa` and an empty password (which
    happens to match the default H2 user profile); we are also explicitly setting
    the driver class name to `org.h2.Driver`. Lastly, we’re setting the platform to
    be `h2` as well, so Spring Boot will first attempt to run `schema.sql`, and then
    `schema-h2.sql`, after which it will run `data.sql` and `data-h2.sql`.


    Why would one have database-specific scripts? Well, SQL is generally going to
    be the same across every database platform, but not quite. Some databases will
    have nonstandard datatypes or ways to define primary keys, or table relationships;
    sadly, for as common and as powerful as SQL is, it’s terribly common to require
    database-specific scripting to accomplish certain tasks – and defining the schema
    is one of the areas that this is most true.


    If you recall our data model in Chapter [3](#471370_2_En_3_Chapter.xhtml), you’ll
    note that we have two entities to manage: `Artist` and `Song`. This sounds like
    a suggestion that we have two tables that correspond to those entity names, and
    we could do that, but we’re not going to.


    The reason is rather simple: this chapter is already covering a lot of ground,
    and covering both `Artist` and `Song` services would take too long and add relatively
    little (once you understand what’s going on with services related to `Artist`,
    the services related to `Song` wouldn’t make much difference – but it’d take a
    lot more room). We’re going to revise how we access data in the next chapter,
    so it makes more sense for us to focus on the full feature set of services in
    Chapter [8](#471370_2_En_8_Chapter.xhtml) and not here in Chapter [7](#471370_2_En_7_Chapter.xhtml).
    We’re going to include the data descriptions here – as SQL comments – just to
    show you where it would go, but then we’re going to pretend that `Song` doesn’t
    exist until we hit Chapter [8](#471370_2_En_8_Chapter.xhtml).


    ```

    DROP INDEX IF EXISTS artist_name;

    DROP TABLE IF EXISTS artists;

    CREATE TABLE IF NOT EXISTS ARTISTS

    (

    id   BIGINT NOT NULL GENERATED BY DEFAULT AS IDENTITY,

    name VARCHAR(64) NOT NULL

    );

    CREATE UNIQUE INDEX IF NOT EXISTS artist_name

    ON ARTISTS(name);

    Listing 7-12

    chapter07/src/main/resources/schema.sql

    ```


    We also want data in our database when our application starts. In testing, we
    might clear out the data (and often) so that we know in what condition the database
    is for a given test. Here’s our `data.sql` file. (If we happen to use a database
    for which this SQL does not work, we’d be better off creating a platform-specific
    file **for that database**.)


    ```

    INSERT INTO ARTISTS (NAME)

    VALUES (''Threadbare Loaf'');

    INSERT INTO ARTISTS (NAME)

    VALUES (''Therapy Zeppelin'');

    INSERT INTO ARTISTS (NAME)

    VALUES (''Clancy In Silt'');

    Listing 7-13

    chapter07/src/main/resources/data.sql

    ```'
