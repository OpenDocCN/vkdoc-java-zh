    我们看到的是一个相当简单的机制：如果我们调用 `findArtistById(int)`，我们会使用 Java 的 try-with-resources 分配一个
    `Connection`（这意味着当退出 `try` 块时，`Connection` 会被正确关闭，而无需我们编写显式代码），然后在 `try` 块内部，委托给同名的重载方法，并传入该
    `Connection`。


    重载方法简单地创建一个 `PreparedStatement`，并用它来查询数据库中匹配的 `Artist`。如果找到，它会用查询到的数据构造一个 `Artist`
    并返回。如果未找到，它会抛出一个自定义异常——`ArtistNotFoundException`。

