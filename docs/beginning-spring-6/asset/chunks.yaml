    ## 下一步


    在第 4 章中，我们将探索 Spring 中的一些生命周期选项，在那里我们可以对 Bean 的创建方式（通过构造函数，如本章所做，或工厂）以及当 Spring
    Bean 被创建或销毁时如何调用方法拥有更多控制权。我们还将了解如何创建新的 Spring Bean，使其不再是单例对象。


