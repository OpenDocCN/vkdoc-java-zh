- fmt: '# 3. Configuration and Declaration of Beans


    In this chapter, we’re going to explore a decent subset of Spring configuration,
    and we’re going to shift attention away from “Hello, World” into a simple application
    that will allow us to explore features and configuration. We’ll introduce the
    sample application first, then walk through a few different ways to configure
    it. There’s a lot of code here, much of it redundant on the surface, but we’ll
    use some base classes to help reduce the tendency to repeat ourselves.^([^(38)](#fn38))


    ## The Container


    Spring changed how Java developers thought about class structure and design in
    their applications,^([^(39)](#fn39)) and it’s entirely doable to design applications
    with dependency injection in mind – without using Spring – while reaping the benefits
    of the mindset. However, the central mechanism for using the dependency injection
    mindset, regardless of what framework you use, is the Container.


    The Container is responsible for managing instances of what are referred to as
    “managed objects.” Our `HelloWorldGreeter` from Chapter [2](#471370_2_En_2_Chapter.xhtml),
    for example, is a manageable object (as most objects would be) but *is* managed
    when it’s created and injected via the `ApplicationContext` – which is a Container.
    The `ApplicationContext` is the primary interaction point for Spring-managed classes,
    so when we refer to the “context,” this is usually what we’re referring to.


    Classes that are managed by a Spring container are referred to as “Spring beans,”
    in context.


    The Container not only creates instances – the Spring beans – but also provides
    references to those instances in various ways (through constructors, or mutators
    and accessors^([^(40)](#fn40))). The process as a whole is referred to as “wiring.”


    We’re going to step through an example application’s specification, and then we’re
    going to start showing how to wire the application together with Spring.


    ## The Sample Application


    This next section – the entire heading, actually – has nothing to do with Spring
    at all. No dependencies on Spring, no Spring references, no rites of Spring, absolutely
    nothing outside of a reference here and there to remind us that we’re in a book
    about Spring. However, we’re introducing an application that gives us enough functionality
    to explore Spring in some depth; without the application and an understanding
    of it, we’re going to end up saying “Hello, World” in eighty different ways. With
    the project, we’ll have a practical application to keep in mind as we walk through
    Spring features in some of our future chapters.


    Imagine you’re the fan of a band called “Threadbare Loaf.”^([^(41)](#fn41)) If
    you were trying to introduce a friend to Threadbare Loaf, they’d probably wonder
    what song (or songs) they should listen to, to get a sense of what Threadbare
    Loaf is about as an artist; you might suggest their first hit, “Someone Stole
    The Flour,” or perhaps the single from their second release, “What Happened to
    Our First Release?”


    These two songs might be considered the “hooks” for the artist. Most artists have
    a song or set of songs that exemplify the band’s direction and focus; for the
    Rolling Stones, it might be “Satisfaction” or “Jumpin’ Jack Flash”; for Pink Floyd
    it might be “Money” or “Comfortably Numb”; for The Beatles, it might be “Hey Jude”
    or “Let It Be,” and so forth and so on.


    It’s not that the artists’ *other* songs aren’t great, but that these are songs
    which a given person might think were perfect to entice someone else to enjoy
    the band as well.


    What we’re going to do is create an API for an application to allow users to suggest
    “hooks” for artists, and for other users to see what users suggested most. It’s
    a simple application, and we’re not going to construct a full user experience;
    we’re mostly going to focus on the core API for the application to illustrate
    Spring concepts.


    We’re also going to create many, many versions of the API, with each iteration
    being used to demonstrate different features of Spring. The API will likely improve
    as we continue, but the goal of the iterations will *usually* be demonstrative
    and not for the purpose of making the API more “mature” or full-featured.


    For the purposes of this book, the application will be called the “band gateway,”
    suggesting that the songs managed by the API are the “gateway songs” to appreciate
    the artists in question.


    We’re initially going to have two entities to consider as part of our data model:
    the `Artist` and the `Song`.


    An `Artist` is uniquely referred to by name.^([^(42)](#fn42)) We should expect
    to support only one `Artist` with a given name, as long as we’re working *only*
    with music.


    A `Song` is scoped to an `Artist` and does *not* have a unique name – it’s perfectly
    legitimate to have a song called “Come Together” recorded by both The Beatles
    and Aerosmith, for example, and users might consider these songs the ideal introductions
    to both bands.^([^(43)](#fn43)) We’re also aware that artists might have other
    types of media that serve as “hooks” for the band, such as videos or other artistic
    works; for the purposes of simplicity, we’re assuming that we are *only* managing
    audio recordings and not, say, videos or paintings that might be associated with
    a given `Artist`.


    Our application, in its initial form, needs to support a few basic read operations
    and two write operations.


    The operations related to *reading* data are as follows:


    - Retrieve songs for an artist, ordered by popularity (the most popular song is
    the better “hook”).

    - Retrieve song names for an artist (for use in autocompletion operations).

    - Retrieve a list of artist names (for use in autocompletion operations).


    Then, we also need to allow people to **contribute** to our database:


    - Record that a song exists.

    - Vote for a song as a hook for a given `Artist`.


    ### The Code for the Band Gateway


    We’re going to need at least five classes to begin to construct our API: our model
    consists of two classes (the `Artist` and `Song`), and we’re going to create an
    interface (called `Normalizer`) that represents a method by which we can transform
    (or “normalize”) names for our API, and lastly, an interface for our API (the
    `MusicService`) and a base class that contains an in-memory representation of
    our model (`BaseMusicService`).


    ![](images/471370_2_En_3_Chapter/471370_2_En_3_Fig1_HTML.jpg)


    A flowchart runs as follows. `Normalizer` leads to `BaseMusicService` which leads
    to `MusicService`. `MusicService` leads to `Artist` and `Song` which are interconnected.
    `Artist` lists `id` (integer) and `name` (string). `Song` lists `id` (integer),
    `artistId` (integer), `title` (string), and `votes` (integer).


    **Figure 3-1** API classes


    We’re also eventually going to build a base class for our tests, for the same
    reason (it will contain the basic tests we will want to run no matter what the
    actual implementation of the `MusicService` is), and our *actual* tests will extend
    this base class.


    Our model will be concrete, but the rest of the interfaces and abstract classes
    are chosen because we don’t want to have eight implementations of the same functionality.^([^(44)](#fn44))'
