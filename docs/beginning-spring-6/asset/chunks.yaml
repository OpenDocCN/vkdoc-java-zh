    \ whatever search engine you prefer) will return a lot of user-interface-oriented\
    \ autocompletion mechanisms and not so much server-side information. Good hunting!\n\
    \nWe’ll get to the full implementation of `MusicRepository` soon, but let’s look\
    \ at an incomplete version just to get our feet wet with the API.\n\n```java\n\
    @Repository\npublic class MusicRepository {\n    JdbcTemplate jdbcTemplate;\n\
    \    MusicRepository(JdbcTemplate template) {\n        jdbcTemplate = template;\n\
    \    }\n    @Transactional\n    public List getMatchingArtistNames(String prefix)\
    \ {\n        String selectSQL = \"SELECT name FROM artists WHERE \" +\n      \
    \          \"lower(name) like lower(?) \" +\n                \"order by name asc\"\
    ;\n        /*\n         * Note use of Object[] for query arguments, and\n    \
    \     * the use of a lambda to map from a row to a String\n         */\n     \
    \   return jdbcTemplate.query(\n                selectSQL,\n                new\
    \ Object[]{prefix + \"%\"},\n                (rs, rowNum) -> rs.getString(\"name\"\
    ));\n    }\n}\n```\n\nThe core observations:\n\n- `MusicRepository` is marked\
    \ with `@Repository` and is therefore a Spring bean.\n- We have a `JdbcTemplate`\
    \ reference provided by the constructor; Spring will automatically provide this\
    \ for us.\n- We have a single method, annotated with `@Transactional`, that calls\
    \ `JdbcTemplate.query()`.\n\nThere are two things about `getMatchingArtistNames()`\
    \ that we want to think about. The first is the `query()` call itself – what with\
    \ this chapter centering on `JdbcTemplate` – and the other is about transaction\
    \ support."
