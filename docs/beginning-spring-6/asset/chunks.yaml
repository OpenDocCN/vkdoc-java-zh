    \nThe last two things we will do to flesh out our OAuth example is the `@Controller`\
    \ which defines a single route at the root `/` and `/home` for good measure.\n\
    \n```java\npackage com.bsg6.chapter10;\nimport org.springframework.stereotype.Controller;\n\
    import org.springframework.web.bind.annotation.GetMapping;\n@Controller\npublic\
    \ class HomeController {\n@GetMapping(value={\"/\", \"/home\"})\npublic String\
    \ home() {\nreturn \"home\";\n}\n}\nListing 10-43\nchapter10-oauth/src/main/java/com/bsg6/chapter10/HomeController.java\n\
    ```\n\nLastly, we create a template which will show after we’ve successfully logged\
    \ in through our OAuth server GitHub.\n\n```html\n<!DOCTYPE html>\n<html xmlns:th=\"\
    http://www.thymeleaf.org\">\n<head>\n    <title>Home Page</title>\n</head>\n<body>\n\
    \    <h1>Home Page</h1>\n    <p>You've successfully logged in!</p>\n</body>\n\
    </html>\nListing 10-44\nchapter10-oauth/src/main/resources/templates/home.html\n\
    ```\n\nOpen up a terminal and run the application `mvn spring-boot:run`, and open\
    \ your browser to `http://localhost:8080`.\n\nYou will immediately be redirected\
    \ to a GitHub login screen.\n\n![](images/471370_2_En_10_Chapter/471370_2_En_10_Fig3_HTML.png)\n\
    \nA Git Hub login page on a web browser, with fields for username or email and\
    \ password. It includes options to sign in, create an account, and links for support\
    \ and password recovery.\n\n**Figure 10-3** Github login\n\nAfter successfully\
    \ logging in and authorizing the application you created, you will see the following.\n\
    \n![](images/471370_2_En_10_Chapter/471370_2_En_10_Fig4_HTML.png)\n\nA webpage\
    \ on a web browser indicating successful user login. It features a confirmation\
    \ message of successful authentication.\n\n**Figure 10-4** Home page\n\nAs with\
    \ the other examples we’ve used in this chapter, we can always supersede the default\
    \ config in favor of our own custom implementation. There are a lot of methods\
    \ available from the object returned from the `oauth2Login()` method are varied,\
    \ but some that are pretty useful to configure and not accept the defaults are\
    \ as follows:\n\n*   `loginPage(\"/my_login\")` – Allows you to configure an endpoint\
    \ to serve the login screen rather than the Spring Boot default\n*   `defaultSuccessUrl()`\
    \ – The redirect to use upon success\n*   `failureUrl()` – The redirect to use\
    \ should the login fail (i.e., the user uses invalid credentials)\n*   `successHandler()`\
    \ – Custom logic handler for a successful user authentication which must implement\
    \ `AuthenticationSuccessHandler` that generally would be a redirect or forward\
    \ to a success page\n*   `failureHandler()` – Custom logic handler for authentication\
    \ failure which implements `AuthenticationFailureHandler` that usually redirects\
    \ to the authentication page to try again\n\nThere are certainly more options\
    \ which you can view more of within the documentation. See [`https://spring.io/projects/spring-security-oauth`](https://spring.io/projects/spring-security-oauth).\n\
    \nWe’ve only scratched the very surface of the power that exists in Spring Security.\
    \ The subproject has support for the simple like HTTP BASIC, Digest, and Form-based\
    \ authentication to the more complex like OpenID, JOSSO, and SSO using Central\
    \ Authentication Service (CAS). It has integrations which allow you to pull data\
    \ from LDAP, Kerberos, and even Windows NTLM. Functionality that you would expect\
    \ for a security framework to provide, it offers, and with configurability at\
    \ its core to modify to your heart’s content.\n\nThe most important thing to remember\
    \ is if you’re using anything standard or best-practice in the industry, Spring\
    \ Security likely has you covered. If not, it is fully pluggable and customizable\
    \ to work with your particular custom authentication implementations.\n\n## The\
    \ Road to Spring Security 7\n\nOur goal is to always be prepared, and while we\
    \ talk about Spring Security 6.x, a quick mention of some upcoming changes with\
    \ the next version is appropriate. In the next version the non-lambda configuration\
    \ style will be deprecated in favor of the Lambda DSL. In all of the code we’ve\
    \ seen above, we’re intentionally using the Lambda-style DSL for forward compatibility.\
    \ Let’s see an example from our codebase.\n\n```java\n@Bean\npublic SecurityFilterChain\
    \ filterChain(HttpSecurity http) throws Exception {\nhttp\n.authorizeHttpRequests(authorize\
    \ -> authorize\n.requestMatchers(\"/login\")\n.permitAll()\n.requestMatchers(\"\
    /dashboard\")\n.hasRole(\"USER\")\n.requestMatchers(\"/admin_dashboard\")\n.hasRole(\"\
    ADMIN\")\n.anyRequest()\n.authenticated()\n)\n.formLogin(formLogin -> formLogin\n\
    .loginPage(\"/login\")\n.permitAll()\n);\nreturn http.build();\n}\nListing 10-45\n\
    Lambda DSL style example chapter10-custom/src/main/java/com/bsg6/chapter10/GatewaySecurityConfig.java\n\
    ```\n\nAccording to the developers, this was done in an effort to reduce confusion\
    \ as the nested `.and()` and multiple return types were increasingly impossible\
    \ to debug. The new method always returns an instance of the `HttpSecurity` object\
    \ for further configuration and keeps the configuration style more in line with\
    \ other packages like Spring Integration and Spring Cloud Gateway. The Lambda\
    \ DSL style also works similarly and can be applied for WebFlux.\n\n## Next Steps\n\
    \nIn Chapter 11, we’ll explore Spring Batch for data processing and Spring Modulith\
    \ for a better way of organizing your codebase. Together, we’ll learn how to set\
    \ up, configure, and run batch jobs at enterprise scale and how to structure your\
