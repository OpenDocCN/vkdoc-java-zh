    ## 通过注解进行配置


    通过注解在Spring中进行配置非常简单。主要记住一点：我们要**告诉Spring我们正在使用注解**。你可以通过多种方式实现这一点；我们将使用XML来配置注解，因为它很简单（并且反映了我们在第[2](#471370_2_En_2_Chapter.xhtml)章中学到的内容）。


    之后，我们必须记住Spring只对*受管理*的对象起作用：这意味着我们可以随意注解一个类，但如果我们不从Spring容器（`ApplicationContext`）中检索它，这些注解将毫无意义。


    Spring中的注解通常分为两类：组件声明和装配。组件声明意味着类由容器管理，而装配意味着类具有由容器注入（或“装配”）的资源。


    ### 使用`@Component`声明Spring Bean


    要启用组件扫描，我们需要告诉Spring扫描组件。让我们在`src/test/resources`中创建一系列配置文件中的第一个，名为`config-01.xml`。这是注解的基线Spring配置；通常这个文件中会有*更多*信息，但这足以满足我们最初的探索。


    这个文件中有一行重要的内容：`<context:component-scan base-package="com.bsg6.chapter03.mem01"
    />`。（严格来说，这并不完全正确：整个`<beans...>`内容也非常重要。大多数人，包括作者在内，都会复制粘贴该部分，除非你使用像Spring Tool
    Suite^([^(48)](#fn48))这样的工具，它可以为你构建头部。）这行代码的作用很简单：扫描该包及其子包，查找标记了有效组件注解（如`@Component`、`@Service`、`@Repository`等）的Bean。（具体含义将在后续章节讨论。）这些Bean将被注册到`ApplicationContext`中，并且可以被该`ApplicationContext`管理的任何其他Spring组件引用，无论它们是否通过`<component-scan
    />`扫描得到。^([^(49)](#fn49))


