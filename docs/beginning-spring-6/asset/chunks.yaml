    We need to walk through our `chapter09-api` and `chapter09-test` projects before
    actually getting into code we can actually execute, because these projects serve
    as the basis for our `chapter09-jpa` and `chapter09-mongo` projects. (They also
    contain more code than the `jpa` and `mongodb` projects do. The `chapter09-jpa`
    and `chapter09-mongo` projects’ source code is mostly made up of classes that
    extend or implement classes from `chapter09-api` or `chapter09-test`, with very
    little actual *source code*.)


    ### The Common Code


    The `chapter09-api` project contains five interfaces, one abstract class, and
    one class that will end up being a Spring component. They are


    *   `BaseEntity`, a generic interface that defines accessors and mutators for
    a generic identifier


    *   `BaseArtist`, an interface that defines access to a `name` field for an artist,
    and extends `BaseEntity`


    *   `BaseSong`, an interface that defines access to an implementation of `BaseArtist`,
    a song’s name, and the number of votes for a song, as well as extending `BaseEntity`


    *   `BaseArtistRepository`, an interface which defines how we will access entities
    that extend `BaseArtist`


    *   `BaseSongRepository`, an interface which defines how we will access entities
    that extend `BaseSong`


    *   `BaseMusicService`, an abstract class that orchestrates the various repository
    methods


    *   `WildcardConverter`, a class that provides a mechanism for constructing wildcards
    for services


    Here’s a class diagram, in UML, that purports to show the relationship between
    the various classes. When we implement concrete versions of this structure in
    `chapter09-jpa` and `chapter09-mongo,` we’ll basically be finalizing versions
    of the base classes.


    ![](images/471370_2_En_9_Chapter/471370_2_En_9_Fig1_HTML.jpg)


    A flowchart runs as follows. I base song repository and A base music service lead
    to I base song and I base artist. I base song and I base artist repository lead
    to I base artist. I base song and I base artist lead to I base entity. C wild
    card convertor is separate from the main flow.


    Figure 9-1


    Basic data design


    Most of these are really pretty simple. Because they’re generic, though, their
    class declarations tend to be rather long; the reason is that different databases
    might treat primary keys differently; therefore, we need to have a way to define
    primary keys on a case-by-case basis.


    We’re using “database” in the general sense of “application that stores data,”
    not in the “relational database” sense.


    For example, for relational databases, primary keys are often best generated as
    integers of some sort, but with document databases like MongoDB, the primary keys
    are generated as UUIDs represented as `String` instances. We could coerce the
    types to be common (therefore, using UUIDs everywhere, or integers) but that feels
    like we’re pouring optimizations down the drain for no good reason (unless, of
    course, you consider a simpler interface a “good reason,” which you very well
    might.)


