    ## 自定义安全配置


    我们的快速入门示例虽然能让你快速上手运行，但对于任何实际应用来说显然是不够的。将 Spring Boot 与 Spring Security 结合使用的便利之处在于，我们无需禁用其自动配置，只需在应用中添加相应的配置类即可覆盖默认行为。


    Spring Security 通过 Servlet 过滤器机制拦截 HTTP 调用来实现 Web 安全，并将调用内容与安全映射进行匹配。对于方法调用，它采用动态代理而非
    Servlet 过滤器来实现相同的功能。因此，我们需要确保安全过滤器已注册到 Servlet 容器或类加载器中，以便 Security 发挥其魔力。


    Spring Boot 会自动确保 `springSecurityFilterChain` 这个 Servlet 过滤器被设置并注册到我们的应用中。


    Spring Security 的 `springSecurityFilterChain` 是一个过滤器链，负责拦截传入的 HTTP 请求，并应用各种已配置的安全机制，包括身份验证和授权。它是控制对特定资源和端点访问的核心机制，也是
    Spring Security 的重要组成部分。


    我们的自定义安全应用将提供一个带有默认配置的应用，我们将在每一步中对其进行自定义。现在，让我们为 `chapter10-custom` 创建自定义目录结构。


