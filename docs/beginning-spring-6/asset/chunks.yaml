    我们的声明相当简单；现在我们应该有两个变量，其值来自 `application.properties`。这很好，因为我们接下来要定义两个 Bean，它们将读取输入文件中所需的数据。为了将数据读入
    Spring Batch，我们使用 `ItemReader` 的实现。输入类型多种多样，但最简单的是平面文件、XML 文件^(¹⁰⁸)或数据库。在大多数情况下，如果记录存在，读取器将返回一个有效且可用的领域对象，但
    `null` 也有效，表示没有底层结果。

    '
- fmt: "```java\npublic interface ItemReader {\n    T read() throws Exception, UnexpectedInputException,\
    \ ParseException, NonTransientResourceException;\n}\n```\n\n`FlatFileItemReaderBuilder`是Spring\
    \ Batch中`ItemReader`的一个实现，它帮助我们从给定的资源位置（这里我们使用类路径资源）获取数据，定义我们在文档中看到的字段，并将它们映射到我们的Bean（即`Artist`）。我们对`Song`也做了同样的处理，唯一的区别是我们包含了`artistId`，这样我们的歌曲就可以映射到目录中独特且多样的艺术家。\n\
    \n```java\n@Bean\npublic FlatFileItemReader artistReader() {\n    return new FlatFileItemReaderBuilder().name(\"\
    artistsReader\")\n        .resource(new ClassPathResource(artistsFileInput))\n\
    \        .delimited()\n        .names(new String[] { \"id\", \"name\" })\n   \
    \     .fieldSetMapper(new BeanWrapperFieldSetMapper() {{\n            setTargetType(Artist.class);\n\
    \        }})\n        .build();\n}\n\n@Bean\npublic FlatFileItemReader songReader()\
    \ {\n    return new FlatFileItemReaderBuilder().name(\"songsReader\")\n      \
    \  .resource(new ClassPathResource(songsFileInput))\n        .delimited()\n  \
    \      .names(new String[] { \"id\", \"name\", \"artistId\" })\n        .fieldSetMapper(new\
    \ BeanWrapperFieldSetMapper() {{\n            setTargetType(Song.class);\n   \
    \     }})\n        .build();\n}\n```\n*Listing 11-8*  \n*Readers in `chapter11-batch/src/main/java/com/bsg6/chapter11/GatewayConfiguration.java`*\n\
    \n读取方程的另一端显然是写入器。与Spring Boot在读取端帮助我们一样，它在写入端也同样如此。所有写入器都实现了`ItemWriter`接口。写入器可以假设它将获得一个要写入首选方法的项目列表，并且每批数据将根据作业中的规则进行分块，在写入列表结束时，将负责对正在使用的数据源执行任何刷新操作。\n\
    \n```java\npublic interface ItemWriter {\n    void write(Chunk chunk) throws Exception;\n\
    }\n```\n\n在我们的示例中，我们将为`Artist`和`Song`这两种类型使用`JdbcBatchItemWriterBuilder`，并编写一个SQL预处理语句。我们使用从`application.properties`设置中创建的`dataSource`，它被自动注入到方法中。\n\
    \n```java\n@Bean\npublic JdbcBatchItemWriter writer(DataSource dataSource) {\n\
    \    return new JdbcBatchItemWriterBuilder()\n        .itemSqlParameterSourceProvider(new\
    \ BeanPropertyItemSqlParameterSourceProvider())\n        .sql(\"INSERT INTO artist\
    \ (id, name) VALUES (:id, :name)\")\n        .dataSource(dataSource)\n       \
    \ .build();\n}\n\n@Bean\npublic JdbcBatchItemWriter songsWriter(DataSource dataSource)\
    \ {\n    return new JdbcBatchItemWriterBuilder()\n        .itemSqlParameterSourceProvider(new\
    \ BeanPropertyItemSqlParameterSourceProvider())\n        .sql(\"INSERT INTO song\
    \ (id, artist_id, name, votes) VALUES (:id, :artistId, :name, 0)\")\n        .dataSource(dataSource)\n\
