    The **view** is responsible for taking model data and showing it in some way to
    the front end. In this chapter we will show renderers for both HTML and JSON.
    With HTML we’ll be focused on rendering templates using a more human-readable
    format, and with JSON will be showing the result of an API call.


    The **controller** is used to interface with the user. In a web-based interaction,
    this consists of user requests, form submissions, and what view to show from a
    business logic perspective. It is also responsible for how the model gets passed
    around.


    ## Hello, World with MVC


    In this chapter we’re going to return to a simple module structure, with a dependency
    on Chapter [3](#471370_2_En_3_Chapter.xhtml).


    First, we need to create our directory structure, starting in the overall project
    directory.


    ```

    mkdir -p chapter06/src/main/java/com/bsg6/chapter06

    mkdir -p chapter06/src/main/webapp/WEB-INF/templates

    mkdir -p chapter06/src/test/java/com/bsg6/chapter06

    Listing 6-1

    Creating the directory structure with POSIX

    ```


    As with previous chapters, we will need our Maven configuration file, `pom.xml`.
    There’s nothing too special about it other than the addition in `dependencies`
    of our `spring-web` and `spring-webmvc`. The rest has been dutifully copied from
    previous incarnations in `chapter05` and earlier which gave us the ability to
    run a Jetty instance with a simple Maven target.


    ```


    4.0.0


    com.apress

    bsg6

    1.0


    chapter06

    1.0

    war


    ch.qos.logback

    logback-classic


    ${project.parent.groupId}

    chapter03

