    # 8. Spring Data Access with JdbcTemplate


    It’s time we started looking at how we actually access data. Spring has multiple
    ways of accessing data; here, we’re going to look at `JdbcTemplate`, a facade
    that provides trivial access to common operations, and we’re going to address
    some of Chapter [7](#471370_2_En_7_Chapter.xhtml)’s other issues with data access.'
