    在本章中，我们将演示 `JdbcTemplate` 的使用，它本身是 Spring 许多更简单的数据访问设施的模型。`JdbcTemplate` 为我们提供了一个单一的通用工作流模型，并提供了从关系数据映射到类的简单机制，以及用于异常处理和集中日志记录的简单模型。我们还将通过添加控制器来访问所有数据，并为所有内容编写测试，来完善本应是第
