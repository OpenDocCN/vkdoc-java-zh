- fmt: '# Error Handling


    Taking care of error cases when they come up is vital to the building of your
    web application. With that in mind let’s take a look at some ways in which you
    can let users of our application know when they have hit an error. Our first order
    of business is to build a custom exception which will simply extend `RuntimeException`
    and expose one of the methods. Let’s take a look at that now.


    ```

    package com.bsg6.chapter06;

    public class ArtistNotFoundException extends RuntimeException {

    public ArtistNotFoundException(String message) {

    super(message);

    }

    }

    Listing 6-15

    chapter06/src/main/java/com/bsg6/chapter06/ArtistNotFoundException.java

    ```


    The preceding code is pretty standard stuff, and you can definitely customize
    it to your heart’s content with error codes or other data should you feel it necessary.
    The way this comes into action, though, given that we’re firmly on the side of
    using annotations everywhere, is with the `@ExceptionHandler` annotation. In the
    following snippet, we’re showing a handler for our custom exception `ArtistNotFoundException`,
    and this is going to tell Spring that the view we’re looking for when something
    like that is thrown, should be handled here.


    Let’s take a look at some code to show how this is done.


    ```

    @Controller

    public class GetArtistsExceptionController {

    MusicService service;

    GetArtistsExceptionController(MusicService service) {

    throw new ArtistNotFoundException("Artist with name " + artist + " not found");

    }

    @ExceptionHandler(ArtistNotFoundException.class)

    public ModelAndView handleCustomException(ArtistNotFoundException ex) {

    var model = new ModelAndView("error");

    model.addObject("message", ex.getMessage());

    model.addObject("statusCode", 404);

    return model;

    }

    }

    Listing 6-16

    chapter06/src/main/java/com/bsg6/chapter06/GetArtistsExceptionController.java

    ```


    This will handle a very specific exception that can be thrown in a controller
    method. It uses the `ModelAndView` object that we learned about in the previous
    section, and pre-fills in the 404 status code since this is a “Not Found” exception.
    What happens when something else happens, though, and it’s an exception we haven’t
    accounted for? We can define a catch-all exception like the following code snippet.


    ```

    @Controller

    public class GetArtistsExceptionController {

    MusicService service;

    GetArtistsExceptionController(MusicService service) {

    }

    @ExceptionHandler(Exception.class)

    public ModelAndView handleAllExceptions(Exception ex) {

    var model = new ModelAndView("error");

    model.addObject("message", ex.getMessage());

    model.addObject("statusCode", 500);

    return model;

    }

    Listing 6-17

    chapter06/src/main/java/com/bsg6/chapter06/GetArtistsExceptionController.java

    ```


    This will default to returning a 500 since it may have been thrown somewhere outside
    of our code, and this is probably a legitimate server error that we can tell the
    user about.


    Our next method is going to be a little silly, since we’re using service methods
    from Chapter [3](#471370_2_En_3_Chapter.xhtml), and they don’t throw exceptions
    or return nulls, we’ve just got a controller method that will respond with any
    `GET /artists/{artist}` with the 404.


    ```

    @Controller

    public class GetArtistsExceptionController {

    MusicService service;

    GetArtistsExceptionController(MusicService service) {

    this.service = service;

    }

    @GetMapping("/artists/{artist}")

    @ResponseBody

    public ResponseEntity getSong(

    @PathVariable("artist") final String artist

    ) {

    throw new ArtistNotFoundException("Artist with name " + artist + " not found");

    }

    }

    Listing 6-18

    chapter06/src/main/java/com/bsg6/chapter06/GetArtistsExceptionController.java

    ```


    Our `ModelAndView` definitions in the two exception handler methods of our controller
    reference a view named “error.” Let’s take a look at our error template.


    ```


    Error {{ statusCode }}


    An error has occurred with status: {{ statusCode }} and message: {{ message }}


    Listing 6-19

    chapter06/src/main/webapp/WEB-INF/templates/error.html

    ```


    The preceding template is simple; it encapsulates a simple error page and pulls
    data from our controller in the event something goes wrong.


    **Warning**


    We’re leaving out some useful information in handling the exception, largely because
    we’re forwarding to a view, rendered on the server. There’s a “Problem Details
    for HTTP APIs” RFC (RFC 7807^([^(86)](#fn86))) that specifies information about
    the error that goes into greater, and more useful, detail than we’re showing here.
    We will show problem details in use in Chapter [7](#471370_2_En_7_Chapter.xhtml).


    # Next Steps


    In this chapter, we saw how to build a more fully featured band gateway application,
    by removing all of the manual invocations and conversions (and Servlets) from
    our application, leading us to a more streamlined and modern web application development
    process, including automated testing. The next chapter will integrate Spring Boot
    into our project, which gives us access to many more fully developed aspects of
    our deployment, saving us quite a bit of configuration and manual implementations
    of common classes like our `ViewResolver`.


