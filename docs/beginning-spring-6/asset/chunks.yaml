- fmt: '# What Is Spring Boot?


    Spring Boot (`https://spring.io/projects/spring-boot`) can be defined in many
    ways, just like Spring itself can be defined in many ways.


    At its heart, it’s a project that combines many of the most commonly used bits
    of Spring into a single cohesive ecosystem such that dependencies are easier to
    manage, as well as an executable environment to make deployment without a container
    quite doable.


    We haven’t really run into enough correlated dependencies to give ourselves a
    headache with trying to chase down problems in our dependencies, although as we’ve
    progressed we’ve added more and more modules to our chapter projects. So far we’ve
    been laser-focused on each chapter’s topics such that we’ve been able to keep
    dependency lists to a fair minimum. Even so, there are a few issues we’ve encountered
    – although we haven’t needed to address them, because they’re so minor, and our
    tools actually fix them for us.


    Imagine we have a dependency on a library – for the sake of argument, we’ll call
    it `spring-foobar`. This project name is entirely made up. Let’s imagine that
    library has its own transitive dependencies, on `guava`, `slf4j-api`, and `spring-webmvc`.
    The question is: *which* `spring-webmvc`? If we have our own dependency on `spring-webmvc`,
    it might be that there’s a conflict between the `spring-foobar` dependency – say,
    `spring-webmvc` 3.1^([^(87)](#fn87)) and our dependency, which might be `spring-webmvc`
    6.1.0.


    Our build scripts will “win,” in general, no matter what build system we use,
    and the build systems like Maven and Gradle have the ability to specifically exclude
    transitive dependencies at need should they get confused in any case. However,
    there’s another possibility: we can use bills of materials in our build that incorporate
    a host of related dependencies, instead of picking and choosing specific versions.


    The result is that we end up with a more cohesive, consistent build.


    With the Spring Boot parent project, we coalesce many of the Spring dependencies
    into one reference list – the bill of materials – and thus eliminate these potential
    problems in one fell swoop. This has implications for our library declarations
    and testing, since almost everything is made available by magic.^([^(88)](#fn88))


    But there’s more.


    Spring Boot is designed to give you the ability to make your projects executable
    *without* a container like Apache Tomcat. You can still write your controllers
    and Spring beans the exact same way, but instead of starting a Tomcat instance
    and deploying your web application into it (a process we are more or less pretending
    to do when we use `mvn jetty:run`), Spring Boot can be executed as a regular executable
    Jar file. It embeds a web container itself (Tomcat, by default) and manages it;
    it also manages logging, database connections (and database setup), configurations,
    metrics, and other things.


    It can be horribly convenient.


    # Setting Up a Project


    Actually setting up a Spring Boot project is rather easy. In Maven, it involves
    a single plugin and a single initial dependency (with the option of configuring
    an executable jar) – after which everything more or less works through convention,
    including a basic configuration. Let’s walk through yet another “Hello, World”
    application just to show the parts we need – and note that we’ll be adding pieces
    as we go through the chapter.


    First, of course, we need to create the source structure and `pom.xml` itself.
    The source structure mirrors every other chapter we’ve seen so far, with a `main`
    and `test` directory; our `main` contains a `java` directory and a `resources`
    directory. (We’ll be using `resources` later in the chapter to add static content
    just to illustrate how we can create a “user interface” – a term being applied
    very loosely in this book’s case.)


    ```

    mkdir -p chapter07/src/main/java/com/bsg6/chapter07

    mkdir -p chapter07/src/main/resources

    mkdir -p chapter07/src/test/java/com/bsg6/chapter07

    Listing 7-1

    Creating the directory structure with POSIX

    ```


    Our `pom.xml` is fairly bland – a good thing in a build script. Things to note
    are as follows:


    1.  We’re including a build plugin, `spring-boot-dependencies`, which provides
    version information for subsequent dependencies.


    2.  The `spring-boot-starter-web` dependency, whose version comes from the `boot`
    plugin – so we don’t have to (or want to, normally) specify anything (it’s pulled
    from the plugin).


    This structure is very, very common with Spring Boot applications – you could
    probably cut and paste this as a starter for Spring Boot projects if you wanted.
    (For the record, we’re going to alter this script later in the chapter to add
    some features our tests will need.)


    For the record, this isn’t special information or tribal knowledge of any kind
    – Spring Boot’s own documentation shows you nearly the exact same thing, as will
    nearly any other Spring Boot reference.


    ```

    4.0.0


    com.apress

    bsg6

    1.0


    chapter07

    1.0

    war


    org.springframework.boot

    spring-boot-starter-web


    org.springframework.boot

    spring-boot-starter-test

    test


    org.springframework.boot

    spring-boot-maven-plugin

    ${springBootVersion}


    Listing 7-2

    chapter07/pom.xml

    ```


    # Checking the Foundation


    Now that we have our project structure set up, we can create our entrypoint, which
    we’re going to call `Chapter7Application`. It will have no specific code to execute
    in and of itself – it will load a configuration (via the `@SpringBootApplication`
    annotation, which has special meanings as we’ll see in a few more paragraphs)
    – and crank up a web container as well as creating a lot of beans for us, for
    metrics and other services. What our application will do is simple: declare beans
    and controllers and make sure they’re visible to the application class (by virtue
    of being in the same package tree, so having a package that starts with `com.bsg6.chapter07`,
    including any packages under `com.bsg6.chapter07`.). Those services will be automatically
    made available to whatever needs them, as we’ll see.


    ## Building the Application


    ```

    package com.bsg6.chapter07;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    @SpringBootApplication

    public class Chapter7Application {

    public static void main(String[] args) {

    SpringApplication.run(Chapter7Application.class, args);

    }

    }

    Listing 7-3

    chapter07/src/main/java/com/bsg6/chapter07/Chapter7Application.java

    ```


    ## Building Our Transport Object


    Of course, this isn’t useful without an actual controller to serve as an HTTP
    endpoint somewhere, so let’s also create a simple greeting service, to make sure
    the parts all work together. First, we’ll create a `Greeting` – an object containing
    content – that we can serve from a REST endpoint.


    Note the use of methods like `Objects.equals()` and `Objects.hash()` – these are
    utility methods introduced way back in Java 1.7 to help generate hash codes and
    determine equality.


    If you skipped the ideas behind REST in Chapter [6](#471370_2_En_6_Chapter.xhtml),
    this might be a good time to go back and review. If you don’t want to do that,
    it’s okay – basically, we’re hosting a resource behind an HTTP `GET` request.


    ```

    package com.bsg6.chapter07;

    import java.util.Objects;

    public class Greeting {

    String message;

    public Greeting(String message) {

    this.message = message;

    }

    public Greeting() {

    }

    public String getMessage() {

    return message;

    }

    public void setMessage(String message) {

    this.message = message;

    }

    @Override

    public boolean equals(Object o) {

    if (this == o) {

    return true;

    }

    if (!(o instanceof Greeting)) {

    return false;

    }

    Greeting greeting = (Greeting) o;

    return Objects.equals(getMessage(), greeting.getMessage());

    }

    @Override

    public int hashCode() {

    return Objects.hash(getMessage());

    }

    }

    Listing 7-4

    chapter07/src/main/java/com/bsg6/chapter07/Greeting.java

    ```'
