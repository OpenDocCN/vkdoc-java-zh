    ### 生命周期监听器


    监听生命周期事件还有更多选项：`InitializingBean` 和 `DisposableBean` 接口。这些接口分别定义了 `afterPropertiesSet()`
    和 `destroy()` 方法，这些方法将在适当的时机被调用（即在构造完成且所有属性设置完毕后，以及在上下文释放对 bean 的引用之前）。从功能上讲，这与
    XML 配置中的 `init-method` 和 `destroy-method` 属性完全相同；主要区别在于，这些接口直接将你绑定到 Spring 的接口上，而理论上
    `init-method` 和 `destroy-method` 引用则不会。^(⁶²)


    与我们的其他测试一样，这里有一个描述 `FourthObject` 的配置文件。请注意，其中没有描述任何生命周期方法。


