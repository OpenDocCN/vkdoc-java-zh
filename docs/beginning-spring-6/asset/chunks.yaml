    ### 使用 `@Qualifier` 和 Bean 名称选择组件


    在上一节中，我们将一个标准化器注入到 `MusicService2` 中，并用它来标准化艺术家名称和歌曲名称。但这假设两组名称都以相同的方式标准化。如果不是呢？


    在这种情况下，我们需要使用两种不同类型的标准化器。然后我们面临一个不同的问题：如何告诉 Spring 使用哪个标准化器，以及在哪里使用？


    事实证明，我们有几种不同的选择。由于注入基于类型，我们可以简单地创建新的标记接口，例如 `SongNameNormalizer`，它仅扩展 `Normalizer`。然后我们会有类似
    `@Autowired SongNameNormalizer songNameNormalizer` 的声明，这样就完成了；Spring 会查看它管理的组件，找到一个可以分配给
    `songNameNormalizer` 的组件，然后完成注入。


    我们也可以使用组件名称，而不是组件的可分配类型。`@Component` 注解有一个可选值，用作 Spring 的组件名称。默认组件名称是类名本身，首字母小写（因此，`MusicService1`
    的组件名称为 `musicService1`），但如果使用 `@Component("bluePin")`，则该组件被命名为 `bluePin`。


    如果自动装配的引用使用与 Spring Bean 匹配的名称——即我们有 `MusicService bluePin`——那么 Spring 将注入具有该名称的
    Bean。


    然而，当我们的代码中出现两种不同情况之一时，这并不能帮助我们。如果我们的变量引用与组件名称不匹配，*或者*我们要注入两个相同类型的组件，Spring 仍然不知道如何选择要注入的实例。


