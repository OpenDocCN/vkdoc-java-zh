    # 5. Spring and Jakarta EE


    Spring can certainly be used in a standalone environment, but the most common
    environment for Spring has historically been in an enterprise environment, powering
    web applications and backend services in a managed server. This chapter will demonstrate
    some aspects of integration in a Jakarta EE container (formerly known as Java
    EE, or J2EE, or maybe even just “Tomcat” depending on your level of exposure,
    currency, and experience).


    Note


    Tomcat is a servlet container that represents a small part of what Jakarta EE
    can be – it’s actually an implementation of a specific profile of Jakarta EE.
    With that said, a lot of developers were (and are) unaware of the joys of Sun’s
    naming conventions, so they assumed Tomcat was the same as the Enterprise Edition
    of Java, as opposed to a useful implementation of some of its technologies.


    This chapter also introduces submodules to our projects, as well as intermodule
    dependencies. We’re going to create a `chapter05-api` module (where we will store
    some classes that will be the same through the other modules), a `chapter05-anno`
    module (which will use annotation-based configuration), and a `chapter05-xml`
    module (which will use, of all things, XML for configuration). We’re not going
    to use a Java configuration because we wouldn’t learn anything new through the
    process. (We’ll be shifting to using Java-based configurations heavily once we
    hit Chapter [6](#471370_2_En_6_Chapter.xhtml), though.)


    ## Introduction to Jakarta EE


    Jakarta EE is a set of specifications covering most, if not all, enterprise architectural
    patterns for applications written on the Java platform. For example, if you have
    a request/response interaction model for your application, there’s a specification
    that covers it – the Servlet specification. If you have a message-oriented architecture,
    there’s the Java Message Service. If you need a remote invocation architecture,
    Jakarta EE has a few specifications for that, too, starting with the Enterprise
    Java Bean specification. There’s even a Context and Dependency Injection (CDI)
    specification that looks an awful lot like Spring does.


    CDI looks a lot like Spring because the Spring framework authors contributed to
    the specification. This is part of what makes the Java ecosystem as strong as
    it is, and it also contributes to how maddening the Java specifications can be.
    The specification groups giveth, and they taketh away. Overall, it works out to
    everyone’s benefit, but sometimes yields decisions that are rather frustrating.


    There are, of course, reference implementations for the specifications. Glassfish
    ([`https://glassfish.org/`](https://glassfish.org/)) is the current implementation
    for the Servlet and the Java Message Service specifications, for example; Weld
    ([`http://weld.cdi-spec.org/`](http://weld.cdi-spec.org/)) is the reference implementation
    for CDI, even though it’s very arguable that Spring inspired the specification
    in the first place.


    Note


    These are “live specifications,” and information about them changes rapidly. Glassfish
    7 is listed as a designated compatible implementation for Servlet 6.0, but this
    information can be outdated rather quickly.


    Jakarta EE, incidentally, is a fairly recent name for what used to be called Java
    Enterprise Edition (“JavaEE”) and, before being known as “Java EE,” was “Java
    2, Enterprise Edition,” or “J2EE.” In 2018, Java EE was released by Oracle to
    the Eclipse Foundation to be managed by the open source community, which renamed
    it “Jakarta EE” because of copyright issues around the name “Java.” It’s yet more
    branding confusion around Java – which has suffered from branding, naming, and
    version confusion from Day Paisley (or, as humans refer to it, “day one”), but
    hopefully the management of Jakarta EE by an open source community will help stabilize
    names and versions for the future.^([^(65)](#fn65))


    What this chapter will do is show you how some basics around the most commonly
    used enterprise specification, the Servlet Specification, Jetty as a Servlet container.
    Be warned: Jakarta EE isn’t simple. Jakarta EE implementations run as nested applications
    inside of other applications, with consequences to classpaths and resource availability,
    and even *writing* about it can be confusing because there are so many different
    and successful approaches to solving each given problem.


    This chapter is actually going to serve mostly to introduce concepts that future
    chapters will rely on, and illustrate a fairly archaic way of integrating Spring
    into Jakarta EE – mostly serving as an easy on-ramp to more complex and complete
    solutions.'
