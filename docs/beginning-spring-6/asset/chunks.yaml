    ## 使用 Java 配置的生命周期


    带注解的 Bean 固然很好，但注解 Bean 会使其配置变为*全局*——如果你设置了带注解的 Bean 的名称，它将对当前类路径中该类的每个实例生效；相比之下，在
    XML 中，你可以拥有同一个类的多个 Bean，它们可以有不同的名称和不同的属性值。


    我们已经演示了如何使用 XML 和注解将 Bean 设置为不同的作用域；此外，还可以使用配置类，并且作用域在这里的应用方式与其他地方相同。配置类的优势在于，你可以在类路径上同时存在多个配置类，这既提供了注解方法的强大功能和清晰性，又兼具了
    XML 方法的灵活性。


    让我们再看一个测试。这个测试将创建另一个继承自 `HasData` 的对象类型——这次命名为 `NinthObject`——但配置将存储在一个名为 `Config08`
    的本地类中。在该类中，声明了两个方法 `foo()` 和 `bar()`，并且这两个方法都标记了 `@Bean`——这意味着 `foo()` 将描述如何创建名为
    `foo` 的 Bean，而 `bar()` 将描述如何创建名为 `bar` 的 Bean。当然，我们可以提供注解指令来重命名 Bean，而不是使用方法名，但这在第
    3 章中已经介绍过。


    与我们的注解示例一样，我们可以向方法添加 `@Scope("prototype")`，这告诉 Spring 为具有该名称的 Bean 使用适当的作用域。


    我们还将测试类的 `@ContextConfiguration` 改为引用 `Config08.class`，而不是命名的配置文件。除此之外，一切看起来都与我们在
    `TestLifecycle05.java` 中看到的相似（并且行为相同）——我们有一个数据提供器，它告诉测试该类是否应为单例，并相应地验证实例引用和实例数据。


    以下是测试源代码。


    ```

