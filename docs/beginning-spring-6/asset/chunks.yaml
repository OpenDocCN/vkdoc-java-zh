    When we build our `Job,` we use a `JobBuilder` to set up all the necessary pieces
    to make it work. A `Job` is plainly just a container for `Step` instances. Each
    `Step` in a given flow can be processed using chunks or Tasklets. A Tasklet is
    meant to perform one task within a step with possibly multiple steps depending
    on how things get processed. A chunk on the other hand will take a fixed amount
    of records (a chunk) and process through the `.reader()`, `.processor(),` and
    `writer()` flow until no more records exist. The builder takes two important pieces
    that will be used by the `JobLauncher` to support the execution of a batch: the
    job name and a `JobRepository`. The `JobRepository` that handles the CRUD operations
    for a `Job` has defaults that are likely fine for most situations you will run
    into, and the reference documentation has a full write-up available for different
    cases where you’re likely to want to customize.


    For our case, we’re going to configure the execution of two steps. One to import
    the artists, and the next to import the songs for previously imported artists.
    If we were building for a production application, we’d do more verifying and checking,
    and since there is only so much paper, we’ll keep this simple. One of the first
    things we’ll need to add is a `JobParametersIncrementer` for keeping the id’s
    rolling forward, and we’re not doing anything fancy so we’ll just use the implementation
    `RunIdIncrementer`.


    We’ll talk more about the `listener` in the next section, and it basically allows
    you to trigger code before and after a job execution with the `JobExecution` object.
    There are `*Listener` objects we can attach to each `Step` as well. They are all
    step scoped, and with the exception of the `StepExecutionListener` and `SkipListener,`
    all have handlers in the event of an error.


    *   `StepExecutionListener` – Notification before and after a step execution


    *   `ChunkListener` – Notification before a chunk and after a chunk


    *   `ItemReadListener` – Notification before and after each item read


    *   `ItemProcessListener` – Notification before and after each `ItemProcessor`
    run


    *   `ItemWriteListener` – Notification before and after each item write


    *   `SkipListener` – Notification upon a skip happening in the read, process,
    or write for further handling


    The different flows for a `Step` can be an entire chapter. For our needs, we are
    looking to do something sequential, first `step1`, then `step2,` and if any error
    occurs during the process, the job stops.


    ```

    @Bean

    public Job importJob(JobRepository jobRepository, Step step1, Step step2, JobNotificationListener
    listener) {

    return new JobBuilder("importJob", jobRepository)

    .incrementer(new RunIdIncrementer())

    .listener(listener)

    .start(step1)

    .next(step2)

    .build();

    }

    Listing 11-10

    Job definition in chapter11-batch/src/main/java/com/bsg6/chapter11/GatewayConfiguration.java

    ```


    Let’s say though, that upon a failure you wanted to instead of failing, move to
    a different step? We can use a combination of methods `on`, `from,` and `to` in
    the proper order to simulate our new flow chart. We don’t implement this flow
    in our own code but thought it would be great to include as an example of how
    you could configure to your need.


    ```

    return new JobBuilder("myJob", jobRepository)

    .start(step1)

    .on("*").to(step2)

    .from(step1).on("FAILED").to(stepError)

    .end()

    .build();

    ```


    Our flow basically says run `step1` and for all cases move on to `step2`. In the
    event from `step1` the exit status is `FAILED,` we move to `stepError`. One can
    imagine this can get fairly complex for any specific use case, so please refer
    to the reference documentation for Spring Batch for more details.


    For the two steps we’re working with, we’re going to create using the `StepBuilder`
    and name them very simply `step1` and `step2`. With a batch job, we will want
    to provide some reasonable split of data being processed, and the method `chunk`
    is how we get that done. For each step, we provide a reader and writer, and we’ll
    go into a bit more detail in the next section, but the song import step will have
    a `processor` running between so we can transform what is created by the reader
    before we write to the database.


    ```

    @Bean

    public Step step1(JobRepository jobRepository, PlatformTransactionManager transactionManager,
    JdbcBatchItemWriter writer) {

    return new StepBuilder("step1", jobRepository)

    . chunk(5, transactionManager)

    .reader(artistReader())

    .writer(writer)

    .build();

    }

    @Bean

    public Step step2(JobRepository jobRepository, PlatformTransactionManager transactionManager,
    JdbcBatchItemWriter songsWriter) {

    return new StepBuilder("step2", jobRepository)

    . chunk(10, transactionManager)

    .reader(songReader())

    .processor(processor())

    .writer(songsWriter)

    .build();

    }

