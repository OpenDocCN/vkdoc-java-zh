  trans: '

    ### Servlet API


    如前所述，Servlet API 专为遵循请求/响应生命周期的服务而设计：请求进入，响应发出。最终，请求会映射到实现已知接口 `javax.servlet.Servlet`
    的单个类，但 Servlet 可以链式调用（或 `forward` 转发）其他 Servlet。该 API 还定义了可在 Servlet 调用前后执行的过滤器，以及可监听容器发出的事件（例如应用程序启动或关闭）的监听器。


    Servlet 容器在特定端口上建立网络监听器；具体实现方式高度依赖于所使用的 Servlet 容器。它们通常使用 HTTP（超文本传输协议，其一个版本可在
    [`https://tools.ietf.org/html/rfc2616`](https://tools.ietf.org/html/rfc2616) 找到），但并非*必须*如此。


    Servlet 拥有一个 `service()` 方法、一个 Servlet 上下文^(⁶⁶)以及一些生命周期方法（包括 `init()` 和 `destroy()`）。`service()`
    方法接收 `ServletRequest` 和 `ServletResponse` 引用，这两个引用本身都是接口。`ServletRequest` 接口引用关于请求的信息（协议、请求属性、参数等），而
    `ServletResponse` 则提供了 Servlet 构建与请求匹配的响应的机制。


    过滤器的定义方式与 Servlet 类似；有一个通用的 `javax.servlet.Filter` 接口，它有一个主要的入口点（名为 `doFilter()`，尽管
    `Filter` 还有其他与过滤器生命周期相关的方法）；该方法接收 Servlet 容器创建的请求和响应对象，以及一个 `FilterChain` 引用。过滤器可以对请求和响应执行几乎任何操作，尽管通常过滤器要么为委托服务设置数据，要么装饰响应。


    同样，大多数 Servlet 都使用 HTTP。作为一种协议，HTTP 将统一资源定位符（URL）映射到数据。HTTP 还指定了与这些 URL 相关的动词，例如
    `GET`、`POST`、`DELETE` 和 `HEAD`。（还有其他动词；请查阅规范^(⁶⁷)获取完整列表。）


    每个 HTTP 动词都有隐含的语义含义。


    Roy T. Fielding 在 2000 年撰写了一篇题为“架构风格与基于网络的软件架构设计”的论文。你可以在 [`www.ics.uci.edu/~fielding/pubs/dissertation/top.htm;`](http://www.ics.uci.edu/~fielding/pubs/dissertation/top.htm%3B)
    找到它；它描述了一种称为“REST”（表述性状态转移）的架构方法。REST 在基于 HTTP 的应用程序中*至关重要*；它提取了 HTTP 协议的一些隐含含义并将其形式化。如果你**真的**想了解如何使用
    HTTP 动词以及 URL 在现代网络上的工作方式，请查阅 REST——我们将在第 6 章和第 7 章中使用它来创建我们的应用程序服务。


    *   `GET` 是对已知位置资源的请求，传统上，与 `GET` 一起使用的 URL 可以被收藏。这是迄今为止最常见的 HTTP 请求类型。

    *   `POST` 是将数据存储到已知位置的请求（尽管此位置的确定方式取决于具体实现）。

    *   `PUT` 是另一种存储请求类型，但 `POST` 表示“存储”，而 `PUT` 暗示“如果对象已存在则存储或更新”。

    *   `HEAD` 表示返回**关于**资源的数据，而不返回资源本身；例如，这可用于判断资源是否已更新。

    *   `DELETE` 请求以某种方式移除 URL 所引用的资源。


    人们通常会在 URL 的上下文中提及这些动词；因此，可能会说发出一个 `GET http://localhost/foo/bar` 请求——或者，在已指定特定主机的上下文中，可能会简单地说
    `GET /foo/bar`。


    在 `HttpServlet` 中，`service()` 方法被重写，以将请求类型分派到专门为每个动词命名的方法，并使用适合 HTTP^(⁶⁸) 的参数类型；因此，HTTP
    中的 `GET` 由 `doGet()` 方法处理，HTTP 中的 `POST` 由 `doPost()` 方法处理，依此类推。


    理解 Servlet 的工作原理及其实际功能，有助于更轻松地概念化未来的端点。我们最终将利用 Spring 本身提供的资源处理器，这些处理器会将请求分派到我们选择的方法中，参数由框架解析，而不是像本章中那样手动解析。


    ### 现代 Web 应用程序设计原则


    过去，Web 应用程序被构建为单体式或“完整”的：例如，它们会包含服务器端渲染内容所需的所有静态资源。然而，随着富客户端的使用成为常态，这种做法早已不再是首选。Web
    应用程序会引用诸如 JQuery 或 Vue.js 之类的 Javascript 库，这些库以 JSON 或 XML^(⁶⁹) 格式请求资源，并适当地渲染这些内容。


    没有什么能阻止编码人员使用较旧的单体方法，这种方法本身也没有固有的错误，尽管很难说渲染完整页面与将数据发送到客户端按需渲染相比是否有任何实际优势。服务器端渲染意味着在低功耗客户端上体验更好，只要它们有足够的带宽；客户端渲染在带宽方面更优，但会消耗浏览器所在机器的更多
    CPU 资源。（实际上，用户有闲置的 CPU 周期可用于客户端渲染，而繁忙的服务器是更有限的资源，因此这种方法在成本效益上很有意义，尽管某些应用程序的需求可能有所不同。）


    就本书而言，我们将采用现代方法，因为它使我们能够专注于所使用的服务器端技术，而不是富客户端的工作方式。我们将使用简单的命令行工具在必要时发出 HTTP 请求，而不是使用嵌入在网页中的
    Javascript。


    ## 模块结构


    在本章中，我们将创建三个模块：`chapter05-api`、`chapter05-anno` 和 `chapter05-xml`。在大多数构建中，它们会被分组在一个
    `chapter05` 模块下，该模块的唯一目的是包含其他模块，但这只会增加一个嵌套目录和一个 `pom.xml` 文件，因此没有实际好处。


    本书的先前版本使用了 Gradle，它倾向于更宽、更扁平的模块结构。Maven 比 Gradle 能更好地处理更深层次的嵌套模块，但在这种情况下，这样做毫无意义，进一步嵌套只会使文件系统路径引用变得更长。

