    org.eclipse.jetty

    jetty-maven-plugin

    11.0.15


    清单 6-2

    chapter06/pom.xml

    ```


    在前面的章节中，我们已经深入探讨了 XML 配置，因此在本章及后续章节中，我们将不再赘述，而是专注于使用注解来完成所有配置需求。


    为什么？


    基于 Java 的配置在 Java 生态系统中更加简单且更标准化，而且我们倾向于去除那些没有增加任何价值的冗余内容。XML 配置**很有用**，但根据我们在实际项目中的观察（以及我们个人的经验），*大多数*程序员更习惯于*编程*，而将配置作为代码的一部分意味着可以通过
    Java 类路径更轻松地选择配置。^(⁸¹)


    让我们来看一个简单的配置和 MVC 端点是什么样的。在下面的清单中，我们将创建一个简单的控制器，当端点被访问时，它会向最终用户输出一句常见的教程用语。


    ```

    package com.bsg6.chapter06;

    import org.springframework.http.HttpStatus;

    import org.springframework.http.MediaType;

    import org.springframework.http.ResponseEntity;

    import org.springframework.stereotype.Controller;

    import org.springframework.web.bind.annotation.GetMapping;

    @Controller

    public class GreetingController {

    @GetMapping(

    path = "/greeting",

    produces = {MediaType.TEXT_PLAIN_VALUE}

    )

    public ResponseEntity greeting() {

    return new ResponseEntity(

    "Hello, World!",

    HttpStatus.OK

    );

    }

    }

    清单 6-3

    chapter06/src/main/java/com/bsg6/chapter06/GreetingController.java

    ```


    这段代码片段中有不少我们尚未讨论的内容，让我们来解析一下。我们使用 `@GetMapping` 注解引入了一个 `GET` 请求映射。这个注解是基础注解 `@RequestMapping`
    的一种更具体的形式。我们将在涉及 REST 时更详细地讨论 HTTP 方法，但这里只需说明，对于你想要映射到控制器的每个 HTTP 方法，都有一个对应的注解。


    `String` 是一种简单类型，不需要转换；在更复杂的情况下，Spring MVC 会使用 Jackson（作为 Spring 本身的一部分，以传递依赖的方式包含在内）将实体转换为你的方法预期返回的任何类型。


    从我们的 `@GetMapping` 可以看出，它*生成*的是 `text/plain` 类型。我们的方法返回一个类型为 `String` 的 `ResponseEntity`，考虑到我们返回的是一个简单的纯文本项，这是合理的。简单的返回值是
    `Hello, World!`，状态为 `OK` 或 `HTTP 200`。Spring MVC 会在启动时进行检查，以确保没有冲突的映射。


    确保你的控制器确实能正常工作并达到预期效果总是一个好主意，因此让我们创建一个测试来验证我们的假设。

