    ## Tying Up Loose Ends


    So far, we’ve seen how Spring Data makes accessing data storage much easier than
    it might otherwise be, allowing us to access both relational database and a MongoDB
    database with two sets of classes that are far more similar than different – even
    though the underlying data models are incredibly different. You can see the same
    sort of benefit from accessing nearly any database that has support in Spring
    Data.


    It’s worth noting that the interfaces we’ve seen in this chapter could actually
    slide fairly easily into the web-enabled front end shown in Chapter [8](#471370_2_En_8_Chapter.xhtml).
    We’ve maintained transactionality, and actually gained simplicity and flexibility;
    with JPA, we get support for most (if not all) relational databases, and changing
    the code for MongoDB is trivial. We could migrate to other databases like Cassandra
    or Neo4J with just as little effort.


    ## Next Steps


    In Chapter [10](#471370_2_En_10_Chapter.xhtml), we shift away from data management
    and into Spring Security, which provides authentication and authorization support
    for Spring applications – with a particular focus on managing access via the Web.


