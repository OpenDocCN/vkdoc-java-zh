    在真正编写可执行的代码之前，我们需要先了解 `chapter09-api` 和 `chapter09-test` 项目，因为这两个项目是 `chapter09-jpa`
    和 `chapter09-mongo` 项目的基础。（它们包含的代码也比 `jpa` 和 `mongodb` 项目更多。`chapter09-jpa` 和
    `chapter09-mongo` 项目的源代码主要由扩展或实现 `chapter09-api` 或 `chapter09-test` 中类的类组成，实际的*源代码*非常少。）


    ### 公共代码


    `chapter09-api` 项目包含五个接口、一个抽象类和一个最终将成为 Spring 组件的类。它们分别是：


    *   `BaseEntity`，一个泛型接口，定义了通用标识符的访问器和修改器

    *   `BaseArtist`，一个接口，定义了访问艺术家 `name` 字段的方法，并扩展了 `BaseEntity`

    *   `BaseSong`，一个接口，定义了访问 `BaseArtist` 实现、歌曲名称和歌曲投票数的方法，同时扩展了 `BaseEntity`

    *   `BaseArtistRepository`，一个接口，定义了如何访问扩展 `BaseArtist` 的实体

    *   `BaseSongRepository`，一个接口，定义了如何访问扩展 `BaseSong` 的实体

    *   `BaseMusicService`，一个抽象类，用于协调各种仓库方法

    *   `WildcardConverter`，一个提供构建服务通配符机制的类


    以下是用 UML 绘制的类图，展示了各类之间的关系。当我们在 `chapter09-jpa` 和 `chapter09-mongo` 中实现该结构的具体版本时，基本上就是在最终确定这些基类的版本。


    ![](img/471370_2_En_9_Fig1_HTML.jpg)


    流程图如下：I BaseSongRepository 和 A BaseMusicService 指向 I BaseSong 和 I BaseArtist。I
    BaseSong 和 I BaseArtistRepository 指向 I BaseArtist。I BaseSong 和 I BaseArtist 指向
    I BaseEntity。C WildcardConverter 与主流程分离。


    图 9-1

    基本数据设计


    其中大部分都非常简单。但由于它们是泛型的，类声明往往相当冗长；原因是不同的数据库可能以不同方式处理主键；因此，我们需要一种方法来根据具体情况定义主键。


    我们在这里使用“数据库”一词，是取其“存储数据的应用程序”的广义含义，而非特指“关系型数据库”。


    例如，对于关系型数据库，主键通常最好生成为某种整数；但对于像 MongoDB 这样的文档数据库，主键则生成为以 `String` 实例表示的 UUID。我们可以强制类型统一（因此，要么到处使用
    UUID，要么使用整数），但这感觉像是在毫无理由地放弃优化（当然，除非你认为更简单的接口是一个“好理由”，这完全有可能）。


    首先，我们来看一下 `chapter09-api` 的构建脚本。它与我们之前的一些构建脚本有一些不同之处。


    ```


    4.0.0


    com.apress

    bsg6

    1.0


    chapter09-api

    1.0


    org.springframework.data

    spring-data-bom

    ${springDataBomVersion}

    import

    pom


    org.springframework.data

    spring-data-commons


    org.springframework

    spring-tx


    org.springframework

    spring-beans

    test


    org.springframework.boot

    spring-boot-maven-plugin

    ${springBootVersion}


    代码清单 9-5

    chapter09-api/pom.xml

    ```


    这里的一切都相当直接，不过我们需要注意在 `dependencyManagement` 块中特别包含了 `spring-data-bom`，这使我们能够访问
    Spring Data 的一组一致依赖项。


    那么，让我们先来看看实体接口；它们很简单（除了泛型声明，随着我们在 `chapter09-api` 项目中的深入，这些声明只会变得更复杂）。


    首先，我们有 `BaseEntity` 接口，它接受一个 `ID` 类型。


    ```

    package com.bsg6.chapter09.common;

    public interface BaseEntity {

    ID getId();

    void setId(ID id);

    }

    代码清单 9-6

    chapter09-api/src/main/java/com/bsg6/chapter09/common/BaseEntity.java

    ```


    这非常简单；它是一个接口，因此本身不包含任何状态（没有属性），但它表明任何实现 `BaseEntity` 的类都可以访问某种类型的 `Id` 属性，该类型以泛型
    `<ID>` 的形式传递给编译器。


    接下来，我们看看 `BaseArtist`，它使用了 `BaseEntity` 并添加了对自身属性的访问。

