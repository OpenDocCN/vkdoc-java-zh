    ## Our Entity and Data Models


    We’re using the same entity model we described in Chapter [3](#471370_2_En_3_Chapter.xhtml)
    and that we’ve used since then. However, we want to change the **data** model
    slightly, to make data management more efficient.


    What’s the difference between an “entity model” and a “data model”? Well, in concrete
    terms, they’re largely interchangeable. There’s not a formal definition that one
    would use to say “this is an entity model, that is a data model.” However, colloquially
    speaking – and as used here – an entity model describes the overall relationships
    between things we’re working with (the entities), and a data model is a more specific
    description of the actual managed elements.


    For example, in an **entity** model, an `Artist` exists (therefore, it’s an entity!),
    and it has a `name`. In a data model, we might include things that make working
    with an `Artist` more convenient – a generated primary key, or a count of the
    songs for that `Artist`, for example – things that might be relevant for an `Artist`
    from a programming standpoint, but that aren’t necessarily part of the definition
    of an `Artist` as a concept.


    Our entity model (again, chapter [3](#471370_2_En_3_Chapter.xhtml)) looks like
    this.


    ![](images/471370_2_En_8_Chapter/471370_2_En_8_Fig1_HTML.jpg)


    An entity-relationship model between artist and song. E artist with attribute
    I d integer is interconnected to E song with attributes title string and votes
    integer via one-to-many relationship, respectively.


    Figure 8-1


    Entity model


    Our **data** model adds a few attributes to the entities, to create relationships
    and make managing the objects much more efficient.


    ![](images/471370_2_En_8_Chapter/471370_2_En_8_Fig2_HTML.jpg)


    A data-relationship model between artist and song. E artist with attributes I
    d integer and name string is interconnected to E song with attributes I d integer,
    artist I d integer, title string, and votes integer via one-to-many relationship,
    respectively.


    Figure 8-2


    Data model


    This isn’t entirely descriptive – we’re not including nullability or sizes into
    our models, but we’re also not **quite** trying to build a formal entity model,
    either. We’re mostly thinking about how we design our class structure. This is
    the “right way” to model data when you’re proceeding from a SQL-first access model
    (i.e., when you anticipate using JDBC to access your data, as we are in this chapter);
    in our next chapter, when we look at Spring Data, we can actually design our classes
    first and then make sure they generate a workable database schema, rather than
    starting with the schema and building a workable class structure.


    Here’s a full implementation of the `Artist` class.


    ```

    package com.bsg6.chapter08;

    import org.springframework.lang.NonNull;

    import java.util.Objects;

    import java.util.StringJoiner;

    public class Artist {

    Integer id;

    @NonNull

    String name;

    public Artist() {}

    public Artist(@NonNull String name) {

    this.name=name;

    }

    public Artist(Integer id, @NonNull String name) {

    this.id = id;

    this.name = name;

    }

    public Integer getId() {

    return id;

    }

    public void setId(Integer id) {

    this.id = id;

    }

    @NonNull

    public String getName() {

    return name;

    }

    public void setName(@NonNull String name) {

    this.name = name;

    }

    @Override

    public String toString() {

    return new StringJoiner(", ", Artist.class.getSimpleName() + "[", "]")

    .add("id=" + id)

    .add("name=''" + name + "''")

    .toString();

    }

    @Override

    public boolean equals(Object o) {

    if (this == o) return true;

    if (!(o instanceof Artist artist)) return false;

    return Objects.equals(getId(), artist.getId()) && Objects.equals(getName(), artist.getName());

    }

    @Override

    public int hashCode() {

    return Objects.hash(getId(), getName());

    }

    }

