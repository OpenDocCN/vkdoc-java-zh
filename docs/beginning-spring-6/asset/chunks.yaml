- fmt: '### Processing and Listening


    The steps of processing are generally applied to a step in our batch process.
    The `ItemProcessor` is the transformation step of ETL processing, common in batch
    transactions. With a processor one can transform the object given into a new object,
    the same object, or return `null`. If the processor returns `null`, it is assumed
    that the processing and batch job itself should halt.


    For our example, we’ve got a `transient` variable defined in our `Song` entity
    for `artistId`, so given a non-null value for `artistId` we’re creating a fresh
    `Artist` object, setting its `id`, and attaching it to the `Song`. Given how we’re
    doing writing, this isn’t strictly necessary, but if we were using something like
    Hibernate or another ORM, the binding would help.


    ```

    package com.bsg6.chapter11;

    import org.springframework.batch.item.ItemProcessor;

    public class SongProcessor implements ItemProcessor {

    @Override

    public Song process(final Song song) {

    if (song.getArtistId() != null) {

    Artist artist = new Artist();

    artist.setId(song.getArtistId());

    song.setArtist(artist);

    }

    return song;

    }

    }

