    `testGetArtistsById()` 存在一个有趣的问题。在清单 8-7 中，我们初始化数据的方式不包含任何 `id` 字段——它让数据库通过内部序列生成
    `id`。这意味着我们的测试不知道用于查询特定 `Artist` 的 `id`；`testGetArtistsById()` 使用的 `@DataProvider`（即
    `artistData()` 方法）需要有一种方法来查询数据库并构建测试数据集。


    因此，我们编写了 `getArtists()` 方法，它使用 `JdbcTemplate` 根据数据库返回一个“有效艺术家”列表；而 `artistData()`
    方法则获取该列表，并向其中追加*无效*的 `Artist` 记录，这样我们既能测试命中情况，也能测试未命中情况。

