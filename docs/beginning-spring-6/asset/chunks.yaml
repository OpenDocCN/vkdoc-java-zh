    \ a convenient way to run Jetty as a Servlet container with our application deployed\
    \ in it.\n\n```\n<project>\n    <modelVersion>4.0.0</modelVersion>\n    <parent>\n\
    \        <groupId>com.apress</groupId>\n        <artifactId>bsg6</artifactId>\n\
