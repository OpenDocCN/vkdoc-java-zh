    References marked with `@Autowired` are still candidates for injection, of course.
    What’s more, the rules for injection hold even with programmatic configuration.
    In the second configuration (`config-02.xml`), we had a single `Normalizer` in
    the configuration, automatically wired into a `MusicService2`. Here’s what that
    same configuration looks like, using Java for configuration instead of XML.


    ```

    package com.bsg6.chapter03;

    import com.bsg6.chapter03.mem02.MusicService2;

    import com.bsg6.chapter03.mem02.SimpleNormalizer;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    @Configuration

    public class Configuration8 {

    @Bean

    Normalizer normalizer() {

    return new SimpleNormalizer();

    }

    @Bean

    MusicService musicService() {

    return new MusicService2();

    }

    }

    Listing 3-40

    chapter03/src/test/com/bsg6/chapter03/Configuration8.java

    ```


    ### Using `@Qualifier` to Select Specific Components for Wiring


    For `MusicService3`, we had multiple `Normalizer` references. Again, the resolution
    works out exactly the same; the injected reference is qualified by name if no
    other candidate exists, and in the programmatic configuration, the name of the
    bean defaults to the name of the method that returns a given class instance. (Thus,
    in Listing [3-40](#471370_2_En_3_Chapter.xhtml#PC40), the beans are named `musicService`
    and `normalizer`.)


    In our next example, we have two methods that produce `Normalizer` references:
    `foo()` and `capNormalizer()`. If they’re both marked solely with `@Bean`, the
    Spring beans’ names will be, logically enough, `foo` and `capNormalizer`, respectively,
    but that would yield a missing reference for the autowired attribute in `MusicService3`,
    which is looking for a component named `bar`.


    We can name references explicitly, by using the `name` attribute in the `@Bean`
    annotation. Our next configuration shows this in action.


    ```

    package com.bsg6.chapter03;

    import com.bsg6.chapter03.mem03.CapLeadingNormalizer;

    import com.bsg6.chapter03.mem03.SimpleNormalizer;

    import com.bsg6.chapter03.mem03.MusicService3;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    @Configuration

    public class Configuration9 {

    @Bean

    Normalizer foo() {

    return new SimpleNormalizer();

    }

    @Bean(name="bar")

    Normalizer capNormalizer() {

    return new CapLeadingNormalizer();

    }

    @Bean

    MusicService musicService() {

    return new MusicService3();

    }

    }

    Listing 3-41

    chapter03/src/test/com/bsg6/chapter03/Configuration9.java

    ```


    ### Constructor Injection with Static Configuration


    Our last example corresponds to our examples that leverage constructor injection.
    We have a few options here: we could construct the references manually (thus,
    `new MusicService4(new SimpleNormalizer(), new SimpleNormalizer())`), but this
    violates the principle of allowing Spring to manage the references.


    We can actually have the bean construction method *itself* accept arguments (with
    names that resolve to bean components, or set explicitly via `@Qualifier`). Spring
    will then do argument matching based on type or name, allowing us to use those
    references in the construction of the new component.


    Note


    This is probably the most useful and flexible of the configuration options for
    Spring, and we’ll likely use it quite often.


    ```

    package com.bsg6.chapter03;

    import com.bsg6.chapter03.mem03.CapLeadingNormalizer;

    import com.bsg6.chapter03.mem03.SimpleNormalizer;

    import com.bsg6.chapter03.mem04.MusicService4;

    import org.springframework.beans.factory.annotation.Qualifier;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    @Configuration

    public class Configuration10 {

    @Bean

    Normalizer foo() {

    return new SimpleNormalizer();

    }

    @Bean

    Normalizer bar() {

    return new CapLeadingNormalizer();

    }

    @Bean

    MusicService musicService(Normalizer bar,

    @Qualifier("foo")

    Normalizer baz) {

    return new MusicService4(bar, baz);

    }

    }

    Listing 3-42

    chapter03/src/test/com/bsg6/chapter03/Configuration10.java

    ```


    The advantage provided here is not only that of *flexibility* but *management*.
    Only one instance of a `SimpleNormalizer`, for example, is created; it’s a singleton.


    ### Testing Every Configuration with a DataProvider


    We haven’t seen most of these configurations in use, and the only use we’ve seen
    is that of a poor excuse for a test. Let’s write a test that actually exercises
    *every* configuration we’ve presented so far. This class has some fairly significant
    oddities to it, so we’ll present two methods it contains and explain what these
    methods do, then we’ll see the entire class, with the method in context.


    ```

    private void runMethod(Object config, Consumer method) {

    ApplicationContext context;

    if (config instanceof String) {

    context = new ClassPathXmlApplicationContext(config.toString());

    } else {

    if (config instanceof Class) {

    context = new AnnotationConfigApplicationContext((Class) config);

    } else {

    throw new RuntimeException("Invalid configuration argument: " + config);

    }

    }

    MusicService service = context.getBean(MusicService.class);

    method.accept(service);

    }

    @Test(expectedExceptions = RuntimeException.class)

    public void testRunMethod() {

    runMethod(Boolean.TRUE, tests::testSongVoting);

    }

    Listing 3-43

    chapter03/src/test/com/bsg6/chapter03/TestMusicService10.java

    ```


    The `runMethod()` method is internal to our test, and what it does is pretty simple
    but might seem odd to some readers: it accepts a configuration object of some
    kind as well as a method reference that accepts an `ApplicationContext`. The `config`
    object is looked into, to see if it’s a `Class` or a `String`; if it’s a `String`,
    the `ApplicationContext` is loaded from XML, and if it’s a `Class` it’s loaded
    from a programmatic configuration. (If it’s not one of those, an exception is
    thrown. Our other method tests this out.)


    Once the context is loaded, it grabs a `MusicService` from the context, and then
    invokes the method passed in as the second argument with the `MusicService`. A
    failure in the method being invoked – an exception or assertion failure – is bubbled
    up to the caller of `runMethod()`. Therefore, we can accept a configuration of
    some kind – either a `String` or a `Class` – and invoke a method with a properly
    constructed `ApplicationContext` at will.


    We’ve seen this in our `MusicServiceTests`, by the way – we’re just going one
    level higher and compositing method invocation twice instead of once.


    So let’s take a look at the *entire* test class, `TestMusicService10.java`. It’s
    going to use a data provider method (called `configurations()`) to create a list
    composed of references to *every* configuration this chapter contains, and in
    every method that refers to the data provider, it will call `runMethod()` with
    the provided configuration reference and a method reference from `MusicServiceTests`.
    Any failures will show up as test failures.'
