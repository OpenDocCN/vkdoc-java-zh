    ### 处理与监听


    处理步骤通常应用于批处理流程中的某个环节。`ItemProcessor` 是 ETL 处理中的转换步骤，^(¹⁰⁹) 这在批量事务中很常见。通过处理器，可以将传入的对象转换为新对象、保持原对象不变，或返回
    `null`。如果处理器返回 `null`，则意味着处理过程及批处理任务本身应停止。


    在我们的示例中，`Song` 实体中定义了一个 `transient` 变量 `artistId`，因此当 `artistId` 为非空值时，我们会创建一个新的
    `Artist` 对象，设置其 `id`，并将其关联到 `Song` 上。鉴于我们当前的写入方式，这并非严格必要，但如果使用 Hibernate 或其他 ORM，这种绑定会很有帮助。


    ```

    package com.bsg6.chapter11;

    import org.springframework.batch.item.ItemProcessor;

    public class SongProcessor implements ItemProcessor {

    @Override

    public Song process(final Song song) {

    if (song.getArtistId() != null) {

    Artist artist = new Artist();

    artist.setId(song.getArtistId());

    song.setArtist(artist);

    }

    return song;

    }

    }

    清单 11-12

    Processor 定义位于 chapter11-batch/src/main/java/com/bsg6/chapter11/SongProcessor.java

    ```


    我们的 `SongProcessor` 被注入到我们希望在其上执行的 `Step` 中（此处步骤为 `step2`），并在配置中定义如下。


    ```

    @Bean

    public SongProcessor processor() {

    return new SongProcessor();

    }

    清单 11-13

    Processor 定义位于 chapter11-batch/src/main/java/com/bsg6/chapter11/GatewayConfiguration.java

    ```


    一个带有 `@Component` 注解的 `JobExecutionListener` 实现类，它定义了 `beforeJob` 和 `afterJob`
    方法，这两个方法接收一个 `JobExecution` 实例，该实例代表即将运行或刚刚运行的任务。我们将在此处使用监听器对数据库进行验证性抽查，以确认预期数据已被添加。我们会注入一个
    `JdbcTemplate`，对 `artist` 和 `song` 表执行一些 `SELECT` 语句，并将结果输出到日志中。


    ```

    package com.bsg6.chapter11;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

