    ## Spring MVC 简介


    Spring Web 是一个框架，它提供了模型-视图-控制器（MVC）架构，用于使用 Spring 开发 Web 应用程序。这使开发者的注意力集中在应用程序需要通过
    HTTP 提供访问所需执行的操作上，而不是关注访问是*如何*提供的。例如，在上一章中，我们构建了几个在 Spring 框架内运行的 Servlet，但除了
    Spring 内置的 Bean 和其他管理功能外，我们仍然在使用常规的 Servlet。没有什么能阻止你这样做；然而，正如我们希望展示的那样，使用此模块将为你节省大量时间，因为它使用内置的
    Spring 调度器将请求映射到*控制器方法*，而无需自己编写端点。


    ## MVC


    Spring 的 Web 模块使用一种称为 MVC 的范式来组织组件——如前所述，MVC 是“模型-视图-控制器”的缩写。这种架构可用于开发比上一章中看到的更灵活、更松散耦合的应用程序。（我们也不必再那么仔细地管理配置了。）我们可以轻松地将业务逻辑、输入逻辑和前端逻辑分离到不同的组件中，并使用
    Spring 将它们连接起来。


    在 MVC 中，**模型**保存应用程序的数据，这使我们能够将业务逻辑与数据处理方式分离开来。在 Java 世界中，这是一个 POJO（Plain Old
    Java Object，普通旧式 Java 对象），到目前为止，我们都对此非常熟悉。


    **视图**负责获取模型数据，并以某种方式将其展示给前端。在本章中，我们将展示 HTML 和 JSON 的渲染器。对于 HTML，我们将专注于使用更易于人类阅读的格式渲染模板；对于
    JSON，我们将展示 API 调用的结果。


    **控制器**用于与用户交互。在基于 Web 的交互中，这包括用户请求、表单提交，以及从业务逻辑角度决定显示哪个视图。它还负责模型如何传递。


    ## 使用 MVC 实现 Hello, World


    在本章中，我们将回到一个简单的模块结构，并依赖于第 3 章。


    首先，我们需要创建目录结构，从整个项目目录开始。


    ```

    mkdir -p chapter06/src/main/java/com/bsg6/chapter06

    mkdir -p chapter06/src/main/webapp/WEB-INF/templates

    mkdir -p chapter06/src/test/java/com/bsg6/chapter06

    清单 6-1

    使用 POSIX 命令创建目录结构

    ```


    与之前的章节一样，我们需要 Maven 配置文件 `pom.xml`。除了在 `dependencies` 中添加了 `spring-web` 和 `spring-webmvc`
    之外，它并没有什么特别之处。其余部分忠实地从 `chapter05` 及更早版本的配置中复制而来，这些配置使我们能够通过一个简单的 Maven 目标运行 Jetty
    实例。


    ```


    4.0.0


    com.apress

    bsg6

    1.0


