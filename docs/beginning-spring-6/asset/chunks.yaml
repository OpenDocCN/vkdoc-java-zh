    do, well, our apologies for their behavior in advance – not everyone behaves perfectly
    in every situation.)


    Also, offer answers, even if you lack confidence – one can learn from an expert
    saying why your answer might not be the right one, too, and as we said early in
    this book, working code is better than non-working code, even if your answer might
    not be perfect.


    Doing both of these things contributes to the sea of knowledge available for humanity
    – and that’s one of the highest callings that we can have.


    ## What’s Next?


    We hope you’ve enjoyed learning more about Spring (and, occasionally, *more* than
    Spring). We’ve covered the basics of Spring, including why it was written and
    why it still exists, and how it still affects Java developers today. We’ve also
    covered using Spring to serve content over the Web, and how to interact with multiple
    data sources; we’ve also addressed how to identify users and limit what they can
    do based on their identities and roles. Lastly, we’ve started gently peeking beyond
    the Web, persistence, and security to consider the wider Spring ecosystem.


    Now it’s your turn: develop fascinating applications with Spring! Change the world
    for the better, and tell the world what you’ve done and how you’ve done it. We’ll
    be watching and cheering you on.'
