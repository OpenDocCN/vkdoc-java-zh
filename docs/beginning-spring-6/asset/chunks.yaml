    ```\n\n最后，我们来看最长的测试类 `BaseMusicServiceTests`。它在概念上与 `BaseSongRepositoryTests`\
    \ 相同，只是改为与 `BaseMusicService` 交互；其使用的机制与我们在 `BaseSongRepositoryTests` 中看到的几乎完全相同。\n\
    \n不过有一点需要注意：`abstract ID getNonexistentId()` 方法。基类不知道有效的 `ID` 是什么样，因此使用该方法的类需要实现此方法，希望提供一个不会自然出现的标识符，以便使用此方法的测试——`testFindArtistById()`\
    \ 和 `testFindSongById()`——能够成功检查一个不存在的对象。\n\n```\npackage com.bsg6.chapter09.test;\n\
    import com.bsg6.chapter09.common.*;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.test.context.testng.AbstractTestNGSpringContextTests;\n\
    import org.testng.annotations.BeforeMethod;\nimport org.testng.annotations.Test;\n\
    import java.util.List;\nimport java.util.function.Consumer;\nimport static org.testng.Assert.*;\n\
    public abstract class BaseMusicServiceTests,\nS extends BaseSong,\nID\n> extends\
    \ AbstractTestNGSpringContextTests {\n@Autowired\nBaseMusicService musicService;\n\
    @Autowired\nBaseArtistRepository artistRepository;\n@Autowired\nBaseSongRepository\
    \ songRepository;\nprivate Object[][] model = new Object[][]{\n{\"Threadbare Loaf\"\
    , \"Someone Stole the Flour\", 4},\n{\"Threadbare Loaf\", \"What Happened To Our\
    \ First CD?\", 17},\n{\"Therapy Zeppelin\", \"Medium\", 4},\n{\"Clancy in Silt\"\
    , \"Igneous\", 5}\n};\n@BeforeMethod\npublic void clearDatabase() {\nsongRepository.deleteAll();\n\
    artistRepository.deleteAll();\npopulateService();\n}\nprotected abstract ID getNonexistentId();\n\
    void iterateOverModel(Consumer consumer) {\nfor (Object[] data : model) {\nconsumer.accept(data);\n\
    }\n}\nvoid populateService() {\niterateOverModel(data -> {\nfor (int i = 0; i\
    \ \nassertEquals(\nmusicService.getSong(\ndata[0].toString(),\ndata[1].toString()\n\
    ).getVotes(),\n((Integer) data[2]).intValue()\n));\n}\n@Test\nvoid testSongsForArtist()\
    \ {\nList songs =\nmusicService.getSongsForArtist(\"Threadbare Loaf\");\nassertEquals(songs.size(),\
    \ 2);\nassertEquals(songs.get(0).getName(),\n\"What Happened To Our First CD?\"\
    );\nassertEquals(songs.get(0).getVotes(), 17);\nassertEquals(songs.get(1).getName(),\n\
    \"Someone Stole the Flour\");\nassertEquals(songs.get(1).getVotes(), 4);\n}\n\
    @Test\nvoid testMatchingArtistNames() {\nList names = musicService.getMatchingArtistNames(\"\
    Th\");\nassertEquals(names.size(), 2);\nassertEquals(names.get(0), \"Therapy Zeppelin\"\
    );\nassertEquals(names.get(1), \"Threadbare Loaf\");\n}\n@Test\nvoid testFindArtistById()\
    \ {\nA artist = musicService.getArtist(\"Threadbare Loaf\");\nassertNotNull(artist);\n\
    A searched = musicService.getArtistById(artist.getId());\nassertNotNull(searched);\n\
    assertEquals(artist.getName(), searched.getName());\nsearched = musicService.getArtistById(getNonexistentId());\n\
    assertNull(searched);\n}\n@Test\nvoid testFindSongById() {\nS song = musicService.getSong(\"\
    Therapy Zeppelin\",\n\"Medium\");\nassertNotNull(song);\nS searched = musicService.getSongById(song.getId());\n\
    assertNotNull(searched);\nassertEquals(song.getName(), searched.getName());\n\
    searched = musicService.getSongById(getNonexistentId());\nassertNull(searched);\n\
    }\n@Test\nvoid testMatchingSongNamesForArtist() {\nList names =\nmusicService.getMatchingSongNamesForArtist(\n\
    \"Threadbare Loaf\", \"W\"\n);\nassertEquals(names.size(), 1);\nassertEquals(names.get(0),\n\
    \"What Happened To Our First CD?\");\n}\n}\nListing 9-16\nchapter09-test/src/main/java/com/bsg6/chapter09/test/BaseMusicServiceTests.java\n\
    ```\n\n现在，我们终于要开始**使用** Spring Data，而不是为使用它做准备了。\n"
- fmt: '### The `chapter09-jpa` Project


    JPA – the Java Persistence API – is a specification that provides idiomatic object/relational
    mapping (or “ORM”) for Java. In other words, it’s designed to map data from a
    database table (or sets of tables), where data is stored in rows and columns,
    to a Java object model.


    We saw some of that in Chapter [8](#471370_2_En_8_Chapter.xhtml), except we were
    doing the conversion manually (and only when querying the database).


    There are a number of JPA implementations. Hibernate ([`https://hibernate.org`](https://hibernate.org))
    is *probably* the most influential object-relational mapper for Java, just as
    Spring is *probably* the most influential dependency injection library for Java.
    Alternatives to Hibernate include OpenJPA ([`https://openjpa.apache.org/`](https://openjpa.apache.org/)),
    EclipseLink ([`https://eclipse.dev/eclipselink//`](https://eclipse.dev/eclipselink//)),
    and DataNucleus ([`www.datanucleus.org`](http://www.datanucleus.org)) – among
    others – but in this chapter we’re going to use what Spring Data provides for
    us – which is Hibernate.


    Let’s take a quick look at our `pom.xml`. There are a few things to note:


    - It includes a test-time dependency on `chapter09-test`.

    - It has the same limited plugin configuration and dependency management that
    `chapter09-api` and `chapter09-test` have. This is because we’re going to use
    `chapter09-jpa` as a dependency in Chapter [10](#471370_2_En_10_Chapter.xhtml).

    - It has a dependency on `spring-boot-starter-data-jpa` and on `h2` as a sample
    database.

    - It imports `jackson-annotations` because we want to use an annotation in one
    of the entity classes – which we’ll see (and explain) when we look at the `Artist`
    implementation.


    ```

    4.0.0


    com.apress

    bsg6

    1.0


    chapter09-jpa

    1.0


    org.springframework.data

    spring-data-bom

    ${springDataBomVersion}

    import

    pom


    com.apress

    chapter09-api

    1.0


    com.apress

    chapter09-test

    1.0

    test


    org.springframework.boot

    spring-boot-starter-data-jpa


    com.h2database

    h2

    runtime


    com.fasterxml.jackson.core

    jackson-annotations


    org.springframework.boot

    spring-boot-maven-plugin

    ${springBootVersion}


    Listing 9-17

    chapter09-jpa/pom.xml

    ```


    The hard work for us is actually already done, in `chapter09-api`. What this project
    needs to do is verbose (because it’s in Java, and Java idiomatically puts classes
    in their own source files, which means a lot of repetitive boilerplate), but it’s
    still surprisingly simple:


    - Create concrete implementations of all the base classes.

    - Provide a Spring configuration.


    Let’s get to it. We have to implement `BaseArtist`, `BaseSong`, `BaseArtistRepository`,
    `BaseSongRepository`, and `BaseMusicService`; thankfully, all of them are very
    short, but we still have to have them. Then we’ll have to build a configuration,
    and then we’ll need to extend our test classes, too.


    First, the `Artist` class. This is a JPA entity; note that it extends `BaseArtist`
    and uses `Integer` as the identifier type. It also uses regular JPA annotations
    to define relationships between artists and songs.


    You’ll note the use of `@JsonIgnore` as an annotation on the `songs` reference;
    this is required in this case by our rather simple object structure, in which
    an `Artist` has a reference to a set of `Song` objects, and each of those `Song`
    objects has a reference back to the `Artist`. This has implications when serializing
    object structures – and since this module is used in Chapter [10](#471370_2_En_10_Chapter.xhtml),
    we have to account for serialization issues or else we’ll see stack overflows.


    ```

    package com.bsg6.chapter09.jpa;

    import com.bsg6.chapter09.common.BaseArtist;

    import com.fasterxml.jackson.annotation.JsonIgnore;

    import jakarta.persistence.*;

    import org.springframework.lang.NonNull;

    import java.util.ArrayList;

    import java.util.List;

    import java.util.Objects;

    import java.util.StringJoiner;

    @Entity

    public class Artist implements BaseArtist {

    @Id

    @GeneratedValue(strategy = GenerationType.AUTO)

    Integer id;

    @NonNull

    String name;

    @OneToMany(

    cascade = CascadeType.ALL,

    mappedBy = "artist",

    fetch = FetchType.EAGER

    )

    @OrderBy("votes DESC")

    @JsonIgnore

    List songs = new ArrayList();

    public Artist() {

    }

    public Artist(@NonNull String name) {

    this.name = name;

    }

    @Override

    public String getName() {

    return name;

    }

    @Override

    public void setName(String name) {

    this.name = name;

    }

    @Override

    public Integer getId() {

    return id;

    }

    @Override

    public void setId(Integer id) {

    this.id = id;

    }

    @Override

    public String toString() {

    return new StringJoiner(", ", Artist.class.getSimpleName() + "[", "]")

    .add("id=" + id)

    .add("name=''" + name + "''")

    .add("songs=" + songs)

    .toString();

    }

    @Override

    public boolean equals(Object o) {

    if (this == o) return true;

    if (!(o instanceof Artist artist)) return false;

    return Objects.equals(

    getId(),

    artist.getId()

    ) && Objects.equals(

    getName(),

    artist.getName()

    );

    }

    @Override

    public int hashCode() {

    return Objects.hash(getId(), getName());

    }

    }

    Listing 9-18

    chapter09-jpa/src/main/java/com/bsg6/chapter09/jpa/Artist.java

    ```


    **Note**


    The reference to `songs` uses `FetchType.EAGER`. This means that when the `Artist`
    is loaded, the artist’s `Song` references are loaded at the same time, which might
    mean that retrieving the `Artist` is slower than it could be. The reason for this
    is because of how entities are managed; if we used `FetchType.LAZY`, we have to
    manage when we access and populate this field more aggressively, and that’s a
    subject better suited to a book that is specifically addressing JPA topics.


    We can’t use this without a reference to `Song`.


    ```

    package com.bsg6.chapter09.jpa;

    import com.bsg6.chapter09.common.BaseSong;

    import org.springframework.lang.NonNull;

    import jakarta.persistence.*;

    import java.util.StringJoiner;

    @Entity

    @Table(indexes = {

    @Index(

    name = "artist_song",

    columnList = "artist_id,name",

    unique = true

    )

    })

    public class Song implements BaseSong {

    @Id

    @GeneratedValue(strategy = GenerationType.AUTO)

    Integer id;

    @ManyToOne

    @NonNull

    Artist artist;

    @NonNull

    String name;

    int votes;

    public Song() {

    }

    public Song(@NonNull Artist artist, @NonNull String name) {

    this.artist = artist;

    this.name = name;

    }

    @Override

    public Integer getId() {

    return id;

    }

    @Override

    public void setId(Integer id) {

    this.id = id;

    }

    @Override

    public Artist getArtist() {

    return artist;

    }

    @Override

    public void setArtist(Artist artist) {

    this.artist = artist;

    }

    @Override

    public String getName() {

    return name;

    }

    @Override

    public void setName(String name) {

    this.name = name;

    }

    @Override

    public int getVotes() {

    return votes;

    }

    @Override

    public void setVotes(int votes) {

    this.votes = votes;

    }

    @Override

    public String toString() {

    return new StringJoiner(", ", Song.class.getSimpleName() + "[", "]")

    .add("id=" + id)

    .add("artist=" + artist)

    .add("votes=" + votes)

    .toString();

    }

    }

    Listing 9-19

    chapter09-jpa/src/main/java/com/bsg6/chapter09/jpa/Song.java

    ```


    The `@Table` declaration includes an index, using `artist_id` and `name` – which
    means that we have a natural, database-enforced restriction on song titles for
    a given artist: they can only have one song with a given title. (We can’t use
    Songs’ `name` as a unique index, because more than one artist might release a
    song with a given song name. They might even be the same song, since artists can
    cover other musicians’ content: consider Jimi Hendrix’ “All Along the Watchtower,”
    a cover of a Bob Dylan song.)


    Again, this is a fairly standard (and probably naïve) implementation of a JPA
    entity.'
