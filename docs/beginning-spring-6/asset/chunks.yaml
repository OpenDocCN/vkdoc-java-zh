    ## 后续步骤


    本章我们经历了一段关于事务支持、`JdbcTemplate`使用以及集成服务测试的旅程。值得庆幸的是，核心概念相当容易总结：使用 Spring 的数据访问机制可以让你轻松获得事务支持，并且
    Spring 接口尽管提供了广泛的选择，但使用起来非常简单。不过，一个限制是，我们仍然需要手动编写用于关系数据库的 SQL。


    在下一章中，我们将了解 Spring 的另一个数据抽象，称为“Spring Data”。借助 Spring Data，我们可以编写接口来访问几乎**任何**数据库，无论是关系型还是非关系型，并且我们将看到如何使我们的查询在程序上可验证。


    脚注 1   2   3   4   5


    # 9. 使用 Spring 和 Spring Data 进行持久化


    在第 8 章中，我们终于不再关注配置和展示机制，而是研究了如何使用`JdbcTemplate`访问关系数据库。在本章中，我们将再次探讨数据访问——这次使用一个名为“Spring
    Data”的 Spring 项目，它可以提供一种基本与数据无关的数据访问视图。


    Spring Data 统一了 Spring 的数据访问，不仅为不同的数据库提供了通用访问，还为不同的 API（如 JPA（Java 持久化 API）和我们的老朋友
    JDBC）以及不同类型的数据库（如 MongoDB、Neo4J 等）提供了通用访问。

