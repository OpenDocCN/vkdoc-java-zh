- fmt: "# Creating Our Project Structure\n\nChapter [9](#471370_2_En_9_Chapter.xhtml)\
    \ is actually made up of four subprojects. They are:\n\n- `chapter09-api`, which\
    \ contains base classes and interfaces used by the other Chapter [9](#471370_2_En_9_Chapter.xhtml)\
    \ projects\n- `chapter09-test`, which contains tests that our Spring Data implementations\
    \ should be able to pass\n- `chapter09-jpa`, which contains an implementation\
    \ and configuration for JPA\n- `chapter09-mongo`, which contains an implementation\
    \ and configuration for MongoDB\n\nThe `chapter09-test` module has its test classes\
    \ in `src/main/java`, which means the classes are available to projects that import\
    \ `chapter09-test` – and we’ll be using them as dependencies for the testing phase.\n\
    \nNow let’s start creating our project structure – as there are four separate\
    \ projects, there’s a lot here, but it’s rather repetitive.\n\n```\nmkdir -p chapter09-api/src/main/java\n\
    mkdir -p chapter09-api/src/main/resources\nmkdir -p chapter09-api/src/test/java\n\
    mkdir -p chapter09-api/src/test/resources\nmkdir -p chapter09-test/src/main/java\n\
    mkdir -p chapter09-test/src/main/resources\nmkdir -p chapter09-test/src/test/java\n\
    mkdir -p chapter09-test/src/test/resources\nmkdir -p chapter09-jpa/src/main/java\n\
    mkdir -p chapter09-jpa/src/main/resources\nmkdir -p chapter09-jpa/src/test/java\n\
    mkdir -p chapter09-jpa/src/test/resources\nmkdir -p chapter09-mongo/src/main/java\n\
    mkdir -p chapter09-mongo/src/main/resources\nmkdir -p chapter09-mongo/src/test/java\n\
    mkdir -p chapter09-mongo/src/test/resources\n```\n\n*Listing 9-2: Creating the\
    \ directory structure with POSIX*\n\nThere’s an alternative to this, of course,\
    \ and since we’re programmers, it’s actually nicer and easier, using the `bash`\
    \ shell (or an equivalent) and a touch of scripting. (It’s also the way the project\
    \ was actually created when writing this chapter. Just don’t tell the editor!)\n\
    \n```\nfor i in api test jpa mongo; do\nfor j in main test; do\nfor k in java\
    \ resources; do\nmkdir -p chapter09-$i/src/$j/$k;\ndone;\ndone;\ndone\n```\n\n\
    *Listing 9-3: Creating the directory structure with POSIX, version two*\n\nOf\
    \ course, since we’ve gone down the capabilities of bash scripting, we can do\
    \ even nicer than that. This isn’t a book on shell scripting, but still, it’s\
    \ fun to learn as we go.\n\n```\nmkdir -p chapter09-{api,test,jpa,mongo}/src/{main,test}/{java,resources}\n\
    ```\n\n*Listing 9-4: Creating the directory structure with POSIX, version three*\n\
    \nWe need to walk through our `chapter09-api` and `chapter09-test` projects before\
    \ actually getting into code we can actually execute, because these projects serve\
    \ as the basis for our `chapter09-jpa` and `chapter09-mongo` projects. (They also\
    \ contain more code than the `jpa` and `mongodb` projects do. The `chapter09-jpa`\
    \ and `chapter09-mongo` projects’ source code is mostly made up of classes that\
    \ extend or implement classes from `chapter09-api` or `chapter09-test`, with very\
    \ little actual *source code*.)\n\n## The Common Code\n\nThe `chapter09-api` project\
    \ contains five interfaces, one abstract class, and one class that will end up\
    \ being a Spring component. They are:\n\n- `BaseEntity`, a generic interface that\
    \ defines accessors and mutators for a generic identifier\n- `BaseArtist`, an\
    \ interface that defines access to a `name` field for an artist, and extends `BaseEntity`\n\
    - `BaseSong`, an interface that defines access to an implementation of `BaseArtist`,\
    \ a song’s name, and the number of votes for a song, as well as extending `BaseEntity`\n\
    - `BaseArtistRepository`, an interface which defines how we will access entities\
    \ that extend `BaseArtist`\n- `BaseSongRepository`, an interface which defines\
    \ how we will access entities that extend `BaseSong`\n- `BaseMusicService`, an\
    \ abstract class that orchestrates the various repository methods\n- `WildcardConverter`,\
    \ a class that provides a mechanism for constructing wildcards for services\n\n\
    Here’s a class diagram, in UML, that purports to show the relationship between\
    \ the various classes. When we implement concrete versions of this structure in\
    \ `chapter09-jpa` and `chapter09-mongo`, we’ll basically be finalizing versions\
    \ of the base classes.\n\n![](images/471370_2_En_9_Chapter/471370_2_En_9_Fig1_HTML.jpg)\n\
    \nA flowchart runs as follows. I base song repository and A base music service\
    \ lead to I base song and I base artist. I base song and I base artist repository\
    \ lead to I base artist. I base song and I base artist lead to I base entity.\
    \ C wild card convertor is separate from the main flow.\n\n*Figure 9-1: Basic\
    \ data design*\n\nMost of these are really pretty simple. Because they’re generic,\
    \ though, their class declarations tend to be rather long; the reason is that\
    \ different databases might treat primary keys differently; therefore, we need\
    \ to have a way to define primary keys on a case-by-case basis.\n\nWe’re using\
    \ “database” in the general sense of “application that stores data,” not in the\
    \ “relational database” sense.\n\nFor example, for relational databases, primary\
    \ keys are often best generated as integers of some sort, but with document databases\
    \ like MongoDB, the primary keys are generated as UUIDs represented as `String`\
    \ instances. We could coerce the types to be common (therefore, using UUIDs everywhere,\
    \ or integers) but that feels like we’re pouring optimizations down the drain\
    \ for no good reason (unless, of course, you consider a simpler interface a “good\
    \ reason,” which you very well might.)\n\nFirst, let’s take a look at the build\
    \ script for `chapter09-api`. It has some variations on some of our prior build\
    \ scripts.\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<project xmlns=\"\
    http://maven.apache.org/POM/4.0.0\"\n         xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \n         xsi:schemaLocation=\"http://maven.apache.org/POM/4.0.0\n         http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
    >\n    <modelVersion>4.0.0</modelVersion>\n\n    <parent>\n        <groupId>com.apress</groupId>\n\
    \        <artifactId>bsg6</artifactId>\n        <version>1.0</version>\n    </parent>\n\
    \n    <artifactId>chapter09-api</artifactId>\n    <version>1.0</version>\n\n \
    \   <dependencyManagement>\n        <dependencies>\n            <dependency>\n\
    \                <groupId>org.springframework.data</groupId>\n               \
    \ <artifactId>spring-data-bom</artifactId>\n                <version>${springDataBomVersion}</version>\n\
    \                <type>pom</type>\n                <scope>import</scope>\n   \
    \         </dependency>\n        </dependencies>\n    </dependencyManagement>\n\
    \n    <dependencies>\n        <dependency>\n            <groupId>org.springframework.data</groupId>\n\
    \            <artifactId>spring-data-commons</artifactId>\n        </dependency>\n\
    \        <dependency>\n            <groupId>org.springframework</groupId>\n  \
    \          <artifactId>spring-tx</artifactId>\n        </dependency>\n       \
    \ <dependency>\n            <groupId>org.springframework</groupId>\n         \
    \   <artifactId>spring-beans</artifactId>\n            <scope>test</scope>\n \
    \       </dependency>\n    </dependencies>\n\n    <build>\n        <plugins>\n\
    \            <plugin>\n                <groupId>org.springframework.boot</groupId>\n\
    \                <artifactId>spring-boot-maven-plugin</artifactId>\n         \
    \       <version>${springBootVersion}</version>\n            </plugin>\n     \
    \   </plugins>\n    </build>\n</project>\n```\n\n*Listing 9-5: `chapter09-api/pom.xml`*\n\
    \nEverything here is fairly straightforward, although we should note the specific\
    \ inclusion of `spring-data-bom` in our `dependencyManagement` block, which gives\
    \ us access to a consistent set of dependencies for Spring Data.\n\nSo let’s take\
    \ a look at our entity interfaces, to start with; they’re simple (except for the\
    \ generic declarations, which are only going to get worse as we progress through\
    \ the `chapter09-api` project).\n\nFirst, we have the `BaseEntity` interface,\
    \ which accepts an `ID` type.\n\n```\npackage com.bsg6.chapter09.common;\n\npublic\
    \ interface BaseEntity<ID> {\n    ID getId();\n    void setId(ID id);\n}\n```\n\
    \n*Listing 9-6: `chapter09-api/src/main/java/com/bsg6/chapter09/common/BaseEntity.java`*\n\
    \nThis is simple enough; it’s an interface, so it contains no state itself (no\
    \ properties), but it does indicate that any class that implements `BaseEntity`\
    \ has access to an `Id` property of some kind, passed to the compiler as a generic\
    \ type, `<ID>`.\n\nLet’s take a look at `BaseArtist`, next, as it uses `BaseEntity`\
    \ and adds access to a property of its own."
