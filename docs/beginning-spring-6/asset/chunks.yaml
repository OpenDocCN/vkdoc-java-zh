    1 章，仅凭歌曲名称不足以构成唯一标识符，因为多年来存在重复歌曲名称的例子。


    `@PathVariable` 映射到映射定义注解中的模式，并且可以有以下可选参数。


    | 参数 | 描述 |

    | --- | --- |

    | `name` | 这是 URI 中路径参数的名称 |

    | `required` | 默认为 true，如果符合您的要求，可以忽略；否则指定相反值 |


