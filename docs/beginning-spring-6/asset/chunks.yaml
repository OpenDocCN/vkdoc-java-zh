    在数据库中查找该 ID。如果该 ID 不存在，我们将抛出一个 `SongNotFoundException`，这与我们在第 9 章中看到的 `ArtistNotFoundException`
    代码相同。


    第二个方法用于创建一个新的 `Song`。它将消费一个 JSON 对象（我们将在下面创建一个示例供你提交），并在响应中生成/返回新创建的对象。你可以使用以下
    `curl` 命令来查看保存操作的实际效果。


    ```

