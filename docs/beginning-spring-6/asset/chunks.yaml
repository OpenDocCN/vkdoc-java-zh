    # 10. Spring Security


    安全性在任何能够访问实时信息（即使是公开信息）的应用程序中都至关重要。^(¹⁰¹) 安全性意味着控制对功能和信息的访问权限；除非安妮被特别授权访问弗兰克的信息，否则弗兰克的数据应该是**安全**的，并且从安妮的角度来看是不可见的。自然而然地，Spring
    拥有一个强大且功能完备的安全项目——名为 Spring Security——它允许你控制应用程序安全的几乎每个方面。


    在本章中，我们将开发两个模块——`chapter10` 和 `chapter10-custom`——并且我们将使用我们在第 9 章中构建的一个简单 Web
    应用程序——`chapter09-jpa` 项目——并在其上添加一个简单的接口来验证用户身份并控制对资源的授权。


    ## 简介


    Spring Security 子项目最初是一个独立的项目，始于 2003 年，名为 Acegi Security System。^(¹⁰²) 在与 Spring
    本身分开开发了 3 年之后，它于 2007 年被 Spring 正式采纳并更名为 Spring Security。如今，该子项目已成为 Spring 进行身份验证和访问控制的标准。它提供了足够的样板代码，让你无需任何定制即可使用，同时也具有足够的可扩展性，以满足你特定身份验证和授权需求可能需要的任何具体实现细节。


    与许多其他 Spring 项目（包括第 8 章中介绍的 Spring Data）一样，Spring Security 子项目根据功能进一步细分为许多其他子项目。在最基本的层面上，你通常默认需要包含的三个
    Spring Security 库是 `spring-security-core`、`spring-security-config` 和 `spring-security-web`。


    以下是主要模块及其能帮助你实现的需求的非详尽列表：


    | 库 | 描述 |

    | --- | --- |

    | `spring-security-core` | 所有使用 Spring Security 的应用程序都需要核心库。它包含访问控制和身份验证的类及接口，可用于独立或远程需求。
    |

    | `spring-security-config` | 这也是一个核心库——提供通过 Java 或 XML 进行的配置。 |

    | `spring-security-web` | 该库包含在你的 Web 应用程序中使用 Spring Security 所需的必要过滤器和 Web 安全基础设施。
    |

    | `spring-security-test` | 为测试 Spring Security 应用程序提供支持。它与 JUnit 的映射最为简单，但我们也能使用
    TestNG 实现相同的技巧。 |

    | `spring-security-acl` | 提供对应用程序中特定 Java 对象实例上特定操作的访问控制。有了它，你可以指定某个特定用户有权在特定对象实例上执行特定方法，当然，你也可以依赖不那么**具体**的访问控制。（通常，人们依赖角色访问而非特定用户访问……但你可以选择所需的功能。）
    |

    | `spring-security-ldap` | 该库提供对 LDAP（轻量级目录访问协议）的访问，用于身份验证和用户配置。 |


    还有许多其他库值得一提，例如 OAuth（它有自己的工件组 `org.springframework.security.oauth`，包含许多提供特定功能的工件）和
    JOSE。^(¹⁰³) 此外，还支持 CAS（一种单点登录系统；CAS 代表“中央认证服务”）和 OpenID（一种广泛的互联网身份验证规范），以及，嗯，`在此处插入你的安全机制`，无论是官方支持还是通过众多开源集成之一。有些库只关注身份验证方面，而有些则整合了围绕授权的不同概念。在撰写本文时，Maven
    中为 `org.springframework.security` 命名空间提供了 48 个官方包。


    **身份验证与授权**


    当我们谈论身份验证时，我们试图正确断言访问我们资源的实体就是它所声称的实体或身份。当我们从基于 Web 的身份验证角度谈论这一点时，通常涉及多种不同的方法，最简单的是
    HTTP BASIC 访问，一直到更复杂的机制，如 OpenID 或 CAS。


    授权是一组或多条规则，用于确定一旦通过身份验证，谁被允许做什么。例如，如果 Jennifer 以 ADMIN 身份进行身份验证，那么她可能拥有对系统中所有实体的创建/读取/更新/删除权限，而
    John 可能拥有 USER 权限，只能查看和更新与其账户关联的项目。


    正如你在前几章中所见，Spring Boot 可以极大地减少入门所需的工作量，并以更少的精力让复杂的东西运行起来。在下一节中，我们将了解如何开始使用 Spring
    Security 配置一个 Web 应用程序和一个 REST API。

    '
- fmt: "# Quickstart\n\nIn this section we’ll get a very simple webapp secured with\
    \ Spring Security with a little help from the starters available with Spring Boot.\
    \ In later sections we will dive a bit deeper, but for now we’ll keep it simple\
    \ to get running quickly.\n\nFirst, we need to create our directory structure,\
    \ starting in the overall project directory.\n\n```\nmkdir -p chapter10/src/main/java/com/bsg6/chapter10\n\
    mkdir -p chapter10/src/main/resources/templates\nmkdir -p chapter10/src/test/java/com/bsg6/chapter10\n\
    ```\n\n*Listing 10-1* Creating the directory structure with POSIX\n\nWe will need\
    \ to set up our `pom.xml` – as in previous chapters. We’ll be using Spring Boot\
    \ so our setup time will be massively reduced. We’ll write the `pom.xml` we will\
    \ need for the quickstart and notice the only explicitly called out dependency\
    \ not part of Spring Boot is `spring-security-test` because it is not part of\
    \ the starter packages.\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<project\
    \ xmlns=\"http://maven.apache.org/POM/4.0.0\"\n         xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \n         xsi:schemaLocation=\"http://maven.apache.org/POM/4.0.0\n         http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
    >\n    <modelVersion>4.0.0</modelVersion>\n\n    <parent>\n        <groupId>com.apress</groupId>\n\
    \        <artifactId>bsg6</artifactId>\n        <version>1.0</version>\n    </parent>\n\
    \n    <artifactId>chapter10</artifactId>\n    <version>1.0</version>\n    <packaging>war</packaging>\n\
    \n    <dependencies>\n        <dependency>\n            <groupId>org.springframework.boot</groupId>\n\
    \            <artifactId>spring-boot-starter-web</artifactId>\n        </dependency>\n\
    \n        <dependency>\n            <groupId>org.yaml</groupId>\n            <artifactId>snakeyaml</artifactId>\n\
    \        </dependency>\n\n        <dependency>\n            <groupId>org.springframework.boot</groupId>\n\
    \            <artifactId>spring-boot-starter-test</artifactId>\n            <scope>test</scope>\n\
    \        </dependency>\n\n        <dependency>\n            <groupId>org.springframework.boot</groupId>\n\
    \            <artifactId>spring-boot-starter-security</artifactId>\n        </dependency>\n\
    \n        <dependency>\n            <groupId>org.springframework.boot</groupId>\n\
    \            <artifactId>spring-boot-starter-mustache</artifactId>\n        </dependency>\n\
    \n        <dependency>\n            <groupId>org.springframework.security</groupId>\n\
    \            <artifactId>spring-security-test</artifactId>\n            <scope>test</scope>\n\
    \        </dependency>\n    </dependencies>\n\n    <build>\n        <plugins>\n\
    \            <plugin>\n                <groupId>org.springframework.boot</groupId>\n\
    \                <artifactId>spring-boot-maven-plugin</artifactId>\n         \
    \       <version>${springBootVersion}</version>\n                <executions>\n\
    \                    <execution>\n                        <goals>\n          \
    \                  <goal>repackage</goal>\n                        </goals>\n\
    \                    </execution>\n                </executions>\n           \
    \ </plugin>\n        </plugins>\n    </build>\n</project>\n```\n\n*Listing 10-2*\
    \ `chapter10/pom.xml`\n\nThe first webapp we will build will simply present a\
    \ login challenge gating users before allowing them to see our super-secret dashboard\
    \ pages. With Spring Boot at the helm, we’ll make use of the following dependencies:\n\
    \n- `spring-boot-starter-web` for the Spring MVC starter\n- `spring-boot-starter-security`\
    \ for the easiest way to get started with Spring Security\n- `spring-boot-starter-mustache`\
    \ for rendering mustache templates\n- `spring-boot-starter-test` and `spring-security-test`\
    \ to pull in useful code for testing out what we’re doing\n\nSpring Security is\
    \ flexible enough that even without the multiple official subprojects, the ways\
    \ in which one can configure it are varied. For simplicity’s sake, we’re going\
    \ to focus on Java-only configuration; XML configuration is certainly doable,\
    \ but it’s rather verbose.\n\nLet’s see what steps we’ll need to secure our first\
    \ web application with Spring Boot and Spring Security. As we saw in Chapter 7\
    \ with our introduction to Spring Boot, getting started can be fairly simple.\
    \ Our first webapp will be no different.\n\n```\npackage com.bsg6.chapter10;\n\
    \nimport org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    \n@SpringBootApplication\npublic class GatewayApplication {\n    public static\
    \ void main(String[] args) {\n        SpringApplication.run(GatewayApplication.class,\
    \ args);\n    }\n}\n```\n\n*Listing 10-3* `chapter10/src/main/java/com/bsg6/chapter10/GatewayApplication.java`\n\
    \nThe sensible defaults are there to get you started fast, and with the addition\
    \ of the `spring-boot-starter-security` and lack of explicit instruction, any\
    \ requests to the webapp will be assumed to need to be behind a security challenge.\n\
    \nYou may be asking yourself, since we’re doing so much defaulting here, and we\
    \ haven’t specified credentials, how do we log in? The default username if not\
    \ specified with alternate configuration will be `user`, and the default password\
    \ in UUID format will be shown when you run the war like so:\n\n```\nUsing generated\
    \ security password: 33ccafac-5d13-4af5-ab48-ced789749669\n```\n\nThis generated\
    \ password is for development use only. Your security configuration must be updated\
    \ before running your application in production.\n\nWithout further ado, let’s\
    \ run the app and see the above in action (even though we have no actual endpoint\
    \ to hit yet).\n\n```\nmvn spring-boot:run\n```\n\nOpen up `http://localhost:8080`\
    \ in any browser and you will see the following.\n\n![](images/471370_2_En_10_Chapter/471370_2_En_10_Fig1_HTML.png)\n\
    \nA webpage interface requiring user authentication with two fields for inputting\
    \ credentials and a button for submission.\n\n*Figure 10-1* Sign in page\n\nAfter\
    \ entering the default username: `user` and the generated password you can find\
    \ in logs, you’ll get a 404 error message because we have no controllers yet defined.\n\
    \nThe blatantly obvious warning message in the logs should of course be heeded.\
    \ This is just a quickstart after all, but if we wanted to specify our own static\
    \ credentials, we could add the following to an `application.properties` in `src/main/resources`:\n\
    \n```\nspring.security.user.name=user\nspring.security.user.password=password123\n\
    ```\n\nLet’s finish off our quickstart by adding a dashboard controller and a\
    \ rendered template to our codebase.\n\n```\npackage com.bsg6.chapter10;\n\nimport\
    \ org.springframework.stereotype.Controller;\nimport org.springframework.web.bind.annotation.GetMapping;\n\
    \n@Controller\npublic class DashboardController {\n    @GetMapping(\"/\")\n  \
    \  public String dashboard() {\n        return \"dashboard\";\n    }\n}\n```\n\
    \n*Listing 10-4* `chapter10/src/main/java/com/bsg6/chapter10/DashboardController.java`\n\
    \nWe’ll continue with our usage of mustache as template engine and override the\
    \ default suffix of `.mustache` in favor of `.html` and define this suffix in\
    \ our `application.properties` so it can be mapped accurately by Spring.\n\n```\n\
    spring.mustache.suffix:.html\n```\n\n*Listing 10-5* `chapter10/src/main/resources/application.properties`\n\
    \nAnd our super fancy template with a `logout` action.\n\n```html\n<!DOCTYPE html>\n\
    <html>\n<head>\n    <title>Admin Dashboard Page</title>\n</head>\n<body>\n   \
    \ <h1>Hello Admin! Welcome to your dashboard!</h1>\n    <form action=\"/logout\"\
    \ method=\"post\">\n        <button type=\"submit\">Logout</button>\n    </form>\n\
    </body>\n</html>\n```\n\n*Listing 10-6* `chapter10/src/main/resources/templates/dashboard.html`\n\
    \nOpening up a browser and logging in will no longer show you an error message,\
    \ and instead you’ll get our rendered template.\n\n![](images/471370_2_En_10_Chapter/471370_2_En_10_Fig2_HTML.png)\n\
    \nAn interactive admin dashboard interface on a web browser presents a welcome\
    \ message and a logout option, indicating a platform for administrative tasks\
    \ and user management.\n\n*Figure 10-2* Admin dashboard"
  raw: '## Quickstart


    In this section we’ll get a very simple webapp secured with Spring Security with
    a little help from the starters available with Spring Boot. In later sections
    we will dive a bit deeper, but for now we’ll keep it simple to get running quickly.


    First, we need to create our directory structure, starting in the overall project
    directory.


