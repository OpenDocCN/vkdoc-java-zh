- fmt: '### Scope


    Spring provides two basic scopes for objects in the standard `ApplicationContext`:
    `singleton` and `prototype`.


    An object set to `singleton` scope – the default – is created and destroyed **once**
    in a given application context. If you retrieve an object multiple times, you
    will receive the same object reference each time.


    An object set to `prototype` scope is constructed on retrieval, and every time
    you get an object of this type from the context you will receive a unique object;
    Spring acts like a builder^([^(60)](#fn60)) in this case. You might use this scope
    if you have an object whose state is mutated but, once changed, the object isn’t
    useful for any other process.


    A builder is actually an excellent example of this kind of pattern. With many
    instances of the builder pattern, one creates the builder, then adds data to it.
    When the data is considered “complete,” you’d call the `build()` method – or some
    analog – that yields a completed object from the builder. The builder isn’t useful
    for building anything else once it’s delivered what it’s built, because it contains
    state that’s unique to the object being built; you’d then discard the builder,
    and if you needed another object, you’d create a new builder to create it. In
    Spring terms, builders would be ideal prototypes, if you needed them.


    There **are** actually other scopes available through Spring’s web module, but
    we’ll discuss them in Chapter [6](#471370_2_En_6_Chapter.xhtml), where they’re
    more appropriate.


    Let’s take a look at a trivial example showing the scopes in action. We’re going
    to create a project for this chapter (called `chapter04`, because we’re quite
    original in this book), and we’re going to write a quick test that demonstrates
    how we can define object scopes and also what the effect of those scopes might
    be.


    First, we need to create our directory structure, starting in the overall project
    directory.


    ```

    mkdir -p chapter04/src/main/java/com/bsg6/chapter04

    mkdir -p chapter04/src/test/java/com/bsg6/chapter04

    mkdir -p chapter04/src/test/resources

    Listing 4-1

    Creating the directory structure with POSIX

    ```


    We also need a `pom.xml` which will add a single dependency for this chapter –
    the `jakarta.annotation-api`, which contains an annotation or two that we’ll use
    to demonstrate things that can happen after object construction, later in this
    chapter.


    ```

    4.0.0


    com.apress

    bsg6

    1.0


    chapter04

    1.0


    jakarta.annotation

    jakarta.annotation-api

    2.1.1


    Listing 4-2

    chapter04/pom.xml

    ```


    Now it’s time to get more interesting. Let’s create an abstract class to hold
    a single piece of data – called `HasData` – and we’ll extend it with multiple
    classes embedded with our test code. We can get away with this because we’re not
    actually creating classes for the purpose of anything other than demonstrating
    lifecycle, and these aren’t public classes.^([^(61)](#fn61))


    ```

    package com.bsg6.chapter04;

    import java.util.Objects;

    abstract class  HasData {

    String datum = "default";

    public String getDatum() {

    return datum;

    }

    public void setDatum(String datum) {

    this.datum = datum;

    }

    @Override

    public boolean equals(Object o) {

    if (this == o) return true;

    if (!(o instanceof HasData)) return false;

    HasData hasData = (HasData) o;

    return Objects.equals(getDatum(), hasData.getDatum());

    }

    @Override

    public int hashCode() {

    return Objects.hash(getDatum());

    }

    }

    Listing 4-3

    chapter04/src/main/java/com/bsg6/chapter04/HasData.java

    ```


    The `equals()` method is slightly more complex than it might have been, because
    it has to accept subclasses of `HasData` (and, in fact, it has no choice; since
    `HasData` is abstract, you’ll never have an actual instance of `HasData`). It’s
    also worth noting that IDEs can (and did) generate these methods; every method
    was generated automatically by IDEA. (For what it’s worth, Eclipse would have
    generated equivalent code; it just so happens that your authors used IDEA here.)


    Why would `equals()` need to accept subclasses? Well, it really depends on the
    use case. Here, we have no choice but to accept things that aren’t the same class
    as `HasData`, because `HasData` is abstract – there will never be a valid instance
    of this type, unless the definition changes. However, if we’re talking about **concrete**
    types, then you still might want to accept subclasses – because many frameworks
    like Hibernate (`https://hibernate.org`) will generate proxies as subclasses for
    entities, such that they look exactly like the entity classes but have code to
    interact with the database as needed. `HasData` isn’t particularly likely to become
    an entity for Hibernate, but it’s good practice to do the right thing when you
    can.


    To set an object to be a prototype, we simply add the `scope` attribute to the
    configuration. (We’re going to show XML configuration first, as we found it to
    be more explicit than the annotations when it comes to fine-grained control of
    events.) The two values are – surprisingly – `prototype` and `singleton`, although
    `singleton` is the default and therefore isn’t necessary at all.


    We are defining two beans – `foo` and `bar` – both of the same type, because we
    can retrieve objects by name – with different scopes.


    ```

    Listing 4-4

    chapter04/src/test/resources/config-01.xml

    ```


    In our test, we have a data provider that refers to the reference names themselves,
    as well as a flag to tell the test whether the types are to be considered distinct
    or not. Our test grabs a single instance of the specified type by name, then mutates
    it from its original state. It then gets another instance with the same name.


    If the type is specified to be a singleton, the objects should be the same **instance**
    (i.e., `o1 == o2`), and setting the data in one should also be reflected in the
    other (in other words, there’s both instance equality and data equality).


    If the type is specified to be a *prototype* instead, then the objects should
    **not** be the same instance, and setting the data in one should leave the other
    in its default state.


    ```

    package com.bsg6.chapter04;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.context.ApplicationContext;

    import org.springframework.test.context.ContextConfiguration;

    import org.springframework.test.context.testng.AbstractTestNGSpringContextTests;

    import org.testng.annotations.DataProvider;

    import org.testng.annotations.Test;

    import java.util.UUID;

    import static org.testng.Assert.*;

    class FirstObject extends HasData {

    }

    @ContextConfiguration(locations = "/config-01.xml")

    public class TestLifecycle01 extends AbstractTestNGSpringContextTests {

    @Autowired

    ApplicationContext context;

    @DataProvider

    Object[][] getReferences() {

    return new Object[][]{

    {"foo", true},

    {"bar", false}

    };

    }

    @Test(dataProvider = "getReferences")

    public void testReferenceTypes(String name, boolean singleton) {

    HasData o1 = context.getBean(name, HasData.class);

    String defaultValue = o1.getDatum();

    o1.setDatum(UUID.randomUUID().toString());

    HasData o2 = context.getBean(name, HasData.class);

    if (singleton) {

    assertSame(o1, o2);

    assertEquals(o1, o2);

    assertNotEquals(defaultValue, o2.getDatum());

    } else {

    assertNotSame(o1, o2);

    assertNotEquals(o1, o2);

    assertEquals(defaultValue, o2.getDatum());

    }

    }

    }

    Listing 4-5

    chapter04/src/test/java/com/bsg6/chapter04/TestLifeCycle01.java

    ```'
