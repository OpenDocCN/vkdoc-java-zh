- fmt: '### Actually Saying “Hello”


    Now that we have an object to pass around, let’s create our `GreetingController`,
    in concept incredibly similar to the `GreetingController` from Chapter [6](#471370_2_En_6_Chapter.xhtml).^([^(89)](#fn89))
    We’ll add a special case or two: for one thing, we’ll have a generalized greeting
    in case no name is provided, and for another, we’ll have our controller not recognize
    the name of the Invisible Man (“Jack Griffin,” in the 1933 horror film.)


    ```

    package com.bsg6.chapter07;

    import org.springframework.web.bind.annotation.PathVariable;

    import org.springframework.web.bind.annotation.RequestMapping;

    import org.springframework.web.bind.annotation.RestController;

    @RestController

    public class GreetingController {

    @RequestMapping(value = {"/greeting/{name}", "/greeting/"})

    Greeting greeting(@PathVariable(required = false) String name) {

    String object = name != null ? name : "world";

    /* Jack Griffin is the name of the "Invisible Man." */

    if (object.equalsIgnoreCase("jack griffin")) {

    return new Greeting("I don''t know who you are.");

    } else {

    return new Greeting("Hello, " + object + "!");

    }

    }

    }

    Listing 7-5

    chapter07/src/main/java/com/bsg6/chapter07/GreetingController.java

    ```


    A few things to point out:


    *   `@RequestMapping` means that this endpoint will handle the responses for multiple
    HTTP methods, so we can issue a `POST` to this endpoint as well as a `GET` and
    it should respond the same. If we wanted to restrict the HTTP method, we could
    use `@GetMapping` or `@PostMapping`, for example.


    *   We have multiple locations specified – one with `{name}`, and one without.
    That’s to handle the situation where no name is provided, so we can respond to
    `/greeting/World` and `/greeting` with the same endpoint. This is not particularly
    wise, as `POST` accepts different kinds of data and we’re pretending all HTTP
    requests are treated the same.


    *   We map the parameter type with a `@PathVariable` annotation, where we specify
    that it’s not required (because being required is the default). If we didn’t tell
    Spring that it was optional, we’d get an exception when the value was not provided.


    ### Testing with Spring Boot


    Of course, there’s no point in having a controller or service if we don’t know
    that it works, so let’s create a test for it that runs a few sample inputs with
    their expected outputs. There are actually two approaches we can take here; one
    approach to testing is that we can test the controller directly, by issuing method
    calls directly against the endpoint method. However, that avoids a lot of the
    functionality of the endpoint itself. Let’s take a quick look at that code, just
    to see what we’re talking about.


    ```

    @Test(dataProvider = "greetingData")

    public void testDirectGreeting(String name, String greeting) {

    assertEquals(

    greetingController.greeting(name).getMessage(),

    greeting);

    }

    Listing 7-6

    chapter07/src/test/java/com/bsg6/chapter07/TestGreetingController.java

    ```


    This is fine code, I suppose, and it actually verifies that the Java code for
    the controller is doing what it’s supposed to. However, what we’d like to do is
    issue a call over HTTP, to make sure our parameter conversion and URL mappings
    are working properly, and that we’re getting our objects back in the right form.
    We can do this, provided we allow Spring Boot to wire in an object to issue REST
    calls in a test, along with building the actual endpoint. To issue the call, we
    use a `TestRestTemplate`, which will allow us to get a `ResponseEntity<Greeting>`
    back from our endpoint. The `ResponseEntity` allows us to check the actual results
    of the REST call – HTTP codes, and the like – as well as returning an object we
    can examine as in our prior test. It means that we have more code to actually
    validate the results of the call, but that’s okay; we’re actually interested in
    such things. (If we weren’t interested in the HTTP status, we could use `TestRestTemplate.getForObject()`
    instead, which would return the `Greeting` itself and ignore the `ResponseEntity`
    wrapper.) Here’s the complete, functioning `TestGreetingController` class, to
    show what’s going on.


    ```

    package com.bsg6.chapter07;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.context.SpringBootTest;

    import org.springframework.boot.test.web.client.TestRestTemplate;

    import org.springframework.boot.test.web.server.LocalServerPort;

    import org.springframework.http.HttpStatus;

    import org.springframework.http.ResponseEntity;

    import org.springframework.test.context.testng.AbstractTestNGSpringContextTests;

    import org.testng.annotations.DataProvider;

    import org.testng.annotations.Test;

    import static org.testng.Assert.assertEquals;

    @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)

    public class TestGreetingController extends AbstractTestNGSpringContextTests {

    @Autowired

    private GreetingController greetingController;

    @LocalServerPort

    private int port;

    @Autowired

    private TestRestTemplate restTemplate;

    @DataProvider

    Object[][] greetingData() {

    return new Object[][]{

    new Object[]{null, "Hello, world!"},

    new Object[]{"World", "Hello, World!"},

    new Object[]{"Andrew", "Hello, Andrew!"},

    new Object[]{"Jack Griffin", "I don''t know who you are."}

    };

    }

    @Test(dataProvider = "greetingData")

    public void testRestGreeting(String name, String greeting) {

    String url = "http://localhost:" + port + "/greeting/" +

    (name != null ? name : "");

    ResponseEntity result =

    restTemplate.getForEntity(url, Greeting.class);

    assertEquals(result.getStatusCode(), HttpStatus.OK);

    assertEquals(result.getBody().getMessage(), greeting);

    }

    @Test(dataProvider = "greetingData")

    public void testDirectGreeting(String name, String greeting) {

    assertEquals(

    greetingController.greeting(name).getMessage(),

    greeting);

    }

    }

    Listing 7-7

    chapter07/src/test/java/com/bsg6/chapter07/TestGreetingController.java

    ```


    We can actually run a test **now** and have the four tests run; now we know our
    controller is working properly.'
