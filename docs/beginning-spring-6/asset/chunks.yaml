- fmt: '### Configuration in Spring Boot


    To finish up, then, do we need to create any additional configuration of some
    kind?


    As it turns out, we don’t. (Not yet, at least.) The `@SpringBootApplication` annotation
    actually implies autoconfiguration (so wiring happens automatically, and a lot
    of infrastructure is generated for us), component scanning in the same package
    (and packages “under” the same package) as the class that has the annotation (so
    all classes in `com.bsg6.chapter07` are scanned to check whether they’re Spring
    beans or not), and implicitly includes a configuration reference as well – so
    unless we’re doing something out of the ordinary, Spring Boot will automatically
    see every bean that is referenced somewhere in the current package, including
    classes that contain a Java configuration. We’re actually done with our “Hello,
    World” web service itself.


    We’ve mentioned package trees a few times so far in this chapter, where we say
    that scanning happens in `com.bsg6.chapter07` and packages “under” that package,
    if we had any. It’s worth remembering, though, that packages are **named** hierarchically,
    and it’s convenient to think of them as a hierarchy, but they’re not actually
    hierarchical; you can’t `import` a package tree, but only a specific package.


    You’d have to import each package specifically.


    So when we write that scanning happens in a “package tree,” note that it’s actually
    walking through packages with a common prefix; it’s not actually a tree.


    If we tell Maven to package the war in our `pom.xml` with `mvn -pl chapter07 package`,
    Maven will build an executable archive that we can run directly. It’s not a `.jar`
    file as many executable packages are for Java, but it works anyway.


    ```

    mvn -pl chapter07

    java -jar chapter07/target/chapter07-1.0.war

    Listing 7-8

    Building and running our «Hello, World» container

    ```


    After a fairly large amount of logging information on startup (which should take
    only a few seconds), we can open `http://localhost:8080/greeting/Joe` in a browser,
    and be warmly (perhaps even “affectionately”) greeted by our application.


    ![](images/471370_2_En_7_Chapter/471370_2_En_7_Fig1_HTML.jpg)


    A screenshot of a web browser window displaying a webpage hosted on localhost
    colon 8080 slash greeting slash Joe. The main area of the page depicts the text
    left brace double quotes message double quotes colon double quotes hello, Joe
    exclamation mark double quotes right brace.


    **Figure 7-1** Running the application


    ### Static Content with Spring Boot


    It’s also worth noting that we can have Boot serve static content, as long as
    we locate it in `src/main/resources/static` in our build tree. (It’s actually
    more than that: static content can be served from `/static`, `/public`, `/resources`,
    or even `/META-INF/resources` by default – and yes, you can alter these as well,
    although it’s not advised. Having **four** “standard locations” is amusing in
    and of itself, without adding more confusion.)


    Let’s add a `hello-boot.html` page that will allow us to actually **make** a REST
    call from an HTML page, just to demonstrate an end-to-end process.


    This is not a recommendation for any kind of rich client programming practices.
    This is pretty much just about as simple a “rich client” as can be made, and readers
    are advised to read one of Apress’ many fine books on HTML user interfaces rather
    than take this primitive example as advice of proper design and practice.


    What our HTML page will have is fairly simple: an HTML form that submits data
    via a short Javascript function, the Javascript itself, and a placeholder to render
    results. The Javascript will use JQuery ([`https://jquery.com/`](https://jquery.com/))
    to issue a REST call against our endpoint, much like our test did, and it will
    alter the placeholder to render the data from our `GreetingController` verbatim.


    ```

    Hello, World


    function submitForm() {

    $.get(''http://localhost:8080/greeting/''+

    $(''#helloform input[name=name]'').val(),

    function(data) {

    $("#greeting").text(data.message);

    },

    ''json'');

    };


    p#greeting {

    font-family: "Andale Mono",monospace;

    }


    Hello, what is your name?


    Listing 7-9

    chapter07/src/main/resources/static/hello-boot.html

    ```


    If we run our application (after rebuilding it, and by running `java -jar chapter07/target/chapter07-1.0.war`
    again), we can interact with our HTML page by opening `http://localhost:8080/hello-boot.html`
    and entering various names. For this example, we’ll identify as the Invisible
    Man.


    ![](images/471370_2_En_7_Chapter/471370_2_En_7_Fig2_HTML.jpg)


    A screenshot of a web browser window displaying a webpage hosted on localhost
    colon 8080 slash hello-boot dot h t m l. The main area of the page depicts the
    text Hello, what is your name question mark, an entry field with Jack Griffin
    entered, and a submit button. I don’t know who you are.


    **Figure 7-2** Interacting with the page


    ### Summary of the “Hello, World” Boot Mechanism


    We’ve seen how to build our project structure and create a runnable class for
    Spring Boot, as well as how to create an executable jar file; we’ve also seen
    how to create a REST endpoint (using concepts we discussed in Chapter [6](#471370_2_En_6_Chapter.xhtml))
    with a working test, as well as how to embed static resources into our application.
    It’s time for us to go back to our music recommendation application, and show
    how more of this would tie together in a (slightly) more real-world application.'
