    Note


    We’re going to add some configuration to this class later in the chapter. It’s
    being included here just to enable `TestGreetingController` to run.


    If you’d like to run the web server and test it manually (always a fine idea),
    you can run the command line to start tomcat with `mvn -pl chapter06 jetty:run`,
    hit the endpoint `http://localhost:8080/chapter06/greeting,` and be greeted with
    a simple text string `Hello, World!`.


    So far we’ve introduced a simple GET request.


    In the examples that follow, we will continue showing off portions of Spring MVC
    and follow REST as closely as we can in each. Given that this is the first time
    we’re talking about REST in the book, it’s probably appropriate for us to discuss
    some of the architectural concepts inherent in using this paradigm which we’ll
    do in the next section.


    ### REST Concepts


    One of the guiding API design strategies of the last few decades has been REST,
    or Representational State Transfer.^([^(82)](#fn82)) It was developed by Roy T.
    Fielding in the late 1990s in parallel with the development of HTTP 1.1 and based
    on existing designs of the HTTP 1.0\. When comparing the SOAP protocol^([^(83)](#fn83))
    to the architectural principles specified by REST, we see a larger focus on reducing
    overall complexity and discoverability by using the concepts baked into the HTTP
    protocol.


    The following two things should be followed as a base implementation of a RESTful
    API. There are many others, but these are the most prevalent:


    *   A base URI – for example, [`http://api.bandgateway.com/songs/`](http://api.bandgateway.com/songs/),
    which specifies the collection (“songs,” in this case), which you’ll be operating
    under using the actions specified using HTTP methods.


    *   Use the HTTP methods appropriately, the most often used are `GET`, `POST`,
    `PUT,` and `DELETE`. Others like `PATCH`, `OPTIONS`, and `HEAD` are used less
    often but still can be important. In REST, they are used as actions operating
    on your collections or entities.


    We’re not suggesting that the other tenets of the REST architectural style aren’t
    useful – they are. But they’re also out of scope for **this** book.


    The above tenets should get you a good portion of the way toward a less complicated
    API. Let’s talk a bit about what we mean about using HTTP methods appropriately.'
