    There’s an interesting problem with `testGetArtistsById()`. The way we’re initializing
    data in Listing [8-7](#471370_2_En_8_Chapter.xhtml#PC7) doesn’t include any `id`
    fields – it’s letting the database generate the `id` via an internal sequence.
    That means our tests don’t know the `id` to use to query for a given `Artist`;
    the `@DataProvider` used by `testGetArtistsById()`, the `artistData()` method,
    needs to have a way to query the database and build a dataset for testing.


    Thus, we have `getArtists()`, which uses the `JdbcTemplate` to return a list of
    “valid artists” according to the database, and `artistData()` takes that list
    and appends to *invalid* `Artist` records to it, so we can test for misses as
    well as hits.'
