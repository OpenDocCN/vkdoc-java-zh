    `runMethod()` 方法是测试内部的，它的作用非常简单，但对某些读者来说可能看起来很奇怪：它接受某种类型的配置对象以及一个接受 `ApplicationContext`
    的方法引用。它会检查 `config` 对象，看它是 `Class` 还是 `String`；如果是 `String`，则从 XML 加载 `ApplicationContext`；如果是
    `Class`，则从编程式配置加载。（如果两者都不是，则抛出异常。我们的另一个方法测试了这一点。）


    一旦上下文加载完成，它会从上下文中获取一个 `MusicService`，然后使用该 `MusicService` 调用作为第二个参数传入的方法。被调用方法中的失败——异常或断言失败——会向上冒泡到
    `runMethod()` 的调用者。因此，我们可以接受某种类型的配置——`String` 或 `Class`——并随意使用正确构造的 `ApplicationContext`
    调用方法。


    顺便提一下，我们在 `MusicServiceTests` 中已经看到了这一点——我们只是再提高一个层次，将方法调用组合两次而不是一次。


    那么，让我们来看看*整个*测试类 `TestMusicService10.java`。它将使用一个数据提供者方法（称为 `configurations()`）来创建一个列表，该列表包含对本章中*每个*配置的引用，并且在每个引用该数据提供者的方法中，它将使用提供的配置引用和来自
    `MusicServiceTests` 的方法引用来调用 `runMethod()`。任何失败都将显示为测试失败。

