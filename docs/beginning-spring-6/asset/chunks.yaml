- fmt: '# Introduction to Spring MVC


    `Spring Web` is a framework that provides a Model-View-Controller (MVC) architecture
    to develop applications with `Spring` for the Web. This focuses developer attention
    on what their application needs to do to provide access over HTTP, as opposed
    to *how* access is provided. For example, in our previous chapter, we built out
    several `Servlets` running within the `Spring` framework, but aside from the beans
    and other management aspects you get baked into `Spring`, we were still using
    regular `Servlets`. Nothing stops you from doing this; however as we’ll hopefully
    be able to show, using this module will save you loads of time by using a built-in
    `Spring` dispatcher to *controller methods* instead of having to write your own
    endpoints.


    ## MVC


    The web module of `Spring` organizes components using a paradigm known as MVC
    – as already mentioned, an acronym that stands for “Model-View-Controller.” The
    architecture can be used to develop applications that are more flexible and loosely
    coupled than what we saw in the previous chapter. (We also get to stop managing
    the configuration so carefully.) We can easily separate the business logic, and
    input and frontend logic into separate components and use `Spring` to wire them
    together.


    In MVC, a **model** holds the data for our application which allows us to separate
    our business logic from how we deal with the data. In the Java world, this is
    a `POJO` or Plain Old Java Object, which we’re all pretty used to, at this point.


    The **view** is responsible for taking model data and showing it in some way to
    the front end. In this chapter we will show renderers for both HTML and JSON.
    With HTML we’ll be focused on rendering templates using a more human-readable
    format, and with JSON will be showing the result of an API call.


    The **controller** is used to interface with the user. In a web-based interaction,
    this consists of user requests, form submissions, and what view to show from a
    business logic perspective. It is also responsible for how the model gets passed
    around.


    ## Hello, World with MVC


    In this chapter we’re going to return to a simple module structure, with a dependency
    on Chapter [3](#471370_2_En_3_Chapter.xhtml).


    First, we need to create our directory structure, starting in the overall project
    directory.


    ```

    mkdir -p chapter06/src/main/java/com/bsg6/chapter06

    mkdir -p chapter06/src/main/webapp/WEB-INF/templates

    mkdir -p chapter06/src/test/java/com/bsg6/chapter06

    Listing 6-1

    Creating the directory structure with POSIX

    ```


    As with previous chapters, we will need our Maven configuration file, `pom.xml`.
    There’s nothing too special about it other than the addition in `dependencies`
    of our `spring-web` and `spring-webmvc`. The rest has been dutifully copied from
    previous incarnations in `chapter05` and earlier which gave us the ability to
    run a `Jetty` instance with a simple Maven target.


    ```

    4.0.0


    com.apress

    bsg6

    1.0


    chapter06

    1.0

    war


    ch.qos.logback

    logback-classic


    ${project.parent.groupId}

    chapter03

    ${project.parent.version}


    jakarta.servlet

    jakarta.servlet-api

    6.0.0

    provided


    org.springframework

    spring-web


    org.springframework

    spring-test


    org.springframework

    spring-webmvc


    com.samskivert

    jmustache

    1.15


    com.fasterxml.jackson.core

    jackson-databind


    org.hamcrest

    hamcrest

    2.2

    test


    org.eclipse.jetty

    jetty-maven-plugin

    11.0.15


    Listing 6-2

    chapter06/pom.xml

    ```


    In previous chapters we’ve gone into some depth on the XML configuration, so in
    this chapter and subsequent ones we’ll forego that and focus on annotations for
    all our instrumentation needs.


    Why?


    The Java-based configuration is much easier and more standard across the Java
    ecosystem, and we tend to like removing verbosity if it doesn’t add anything of
    value. The XML is **useful**, but what we’ve seen in the field (and what we’ve
    experienced, personally) is that *most* programmers are more comfortable *programming*,
    and the configuration being part of code means an easier selection of configuration
    via the Java classpath.^([^(81)](#fn81))


    Let’s take a look at what a simple configuration and MVC endpoint looks like.
    In the following listing, we’ll take a simple controller which will output a common
    tutorial phrase to the end user once the endpoint is hit.


    ```

    package com.bsg6.chapter06;

    import org.springframework.http.HttpStatus;

    import org.springframework.http.MediaType;

    import org.springframework.http.ResponseEntity;

    import org.springframework.stereotype.Controller;

    import org.springframework.web.bind.annotation.GetMapping;

    @Controller

    public class GreetingController {

    @GetMapping(

    path = "/greeting",

    produces = {MediaType.TEXT_PLAIN_VALUE}

    )

    public ResponseEntity greeting() {

    return new ResponseEntity(

    "Hello, World!",

    HttpStatus.OK

    );

    }

    }

    Listing 6-3

    chapter06/src/main/java/com/bsg6/chapter06/GreetingController.java

    ```


    There is a fair bit happening in the snippet that we haven’t talked about, so
    let’s unpack it. We’ve introduced a `GET` request mapping using the annotation
    `@GetMapping`. This annotation is a more specific form of the base `@RequestMapping`.
    We’ll talk more about HTTP methods when we touch on REST, but suffice to say that
    there is an annotation for each HTTP method you’d like to map to your controllers.


    A `String` is a simple type and requires no conversion, and in more complex cases,
    `Spring MVC` will use `Jackson` (included as a transitive dependency as part of
    `Spring` itself) to convert an entity to whatever type your method is expected
    to return.


    As we can see from our `@GetMapping`, it *produces* a type of `text/plain`. Our
    method returns a `ResponseEntity` of type `String`, which makes sense given that
    we’re returning a simple plain text item. The simple return is one of `Hello,
    World!` with a status of `OK` or `HTTP 200`. `Spring MVC` will do a check on start
    to ensure you don’t have any conflicting mappings.


    It’s always a good idea to ensure that your controller actually works and does
    the thing you expect, so let’s create a test to validate our assumptions.'
