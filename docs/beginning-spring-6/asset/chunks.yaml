    We’re now going to take a look at a *third* way to configure an `ApplicationContext`:
    Java configuration.


    ## Configuration Through Java Config


    With programmatic configuration, you have a few options: one is to define a Java
    class and mark it as a `@Configuration`, providing methods to return Spring beans
    internally. This is (mostly) *static* configuration.


    Another way to configure Spring programmatically is to grab an `ApplicationContext`
    and manually register components in it. This is *dynamic* configuration. The latter
    is very flexible, but uncommon, so we’re going to focus on static configuration
    in this section.


    With static configuration, you declare a class with methods that return components;
    mark the methods that return Spring beans with `@Bean`, and mark the *class* with
    `@Configuration`, and you’re done, although of course you have the capability
    to fine-tune the annotations. If the methods have arguments, then Spring tries
    to use a resolution mechanism similar to constructor-based injection.


    ### Declaring Components with **@Bean**


    Let’s see a simple configuration in action. This configuration will mirror what
    we did with the `MusicService1` in Listing [3-9](#471370_2_En_3_Chapter.xhtml#PC9)
    – a simple component with no dependencies.


    ```

    package com.bsg6.chapter03;

    import com.bsg6.chapter03.mem01.MusicService1;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    @Configuration

    public class Configuration7 {

    @Bean

    MusicService musicService() {

    return new MusicService1();

    }

    }

    Listing 3-36

    chapter03/src/test/com/bsg6/chapter03/Configuration7.java

    ```


