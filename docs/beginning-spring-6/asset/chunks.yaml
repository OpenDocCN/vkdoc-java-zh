    However, we need to grab the `id` that the database assigns to the `Artist`, too.
    The way we do that is fairly simple, but there are some moving parts to consider:


    1.  First, we create a `KeyHolder` (an interface with a concrete realization of
    `GeneratedKeyHolder`). This interface has a few access methods to get keys – but
    the most useful (and relevant in this case) is `getKey()`, which returns a `java.lang.Number`.


    2.  We then use a lambda as an instance of a `PreparedStatementCreator`. This
    is a single-access method class (with the method being `createPreparedStatement()`
    and accepting a `Connection`); you’re meant to, well, create a `PreparedStatement`
    with the proper placeholders populated. We only have one placeholder (as an `Artist`
    has only one attribute besides `id`) so that’s …​ rather simple.


    3.  We pass the `KeyHolder` as the final argument to the `JdbcTemplate.update()`
    method.


    Lastly, we pull out the key from the `KeyHolder` – with `keyHolder.getKey().intValue()`,
    which gets an integer from the `Number` abstraction – and use that to build an
    `Artist` reference.


    Could we have written this to be simpler, or at least to be more straightforward?
    Well…​ sort of. In this case, “straightforward” means “without streams or `Optional`,”
    and truthfully…​ it can be done, but involves a lot of temporary variables to
    contain local state. The “simpler” version is actually going to have a higher
    cyclomatic complexity^([^(96)](#fn96)) than the streaming version; the way it’s
    written now has a design complexity of 2 and a cyclomatic complexity of 2, and
    the old approach using `if` and checking `List.size()` for presence actually has
    complexity scores of 3 – where lower numbers are better.


    You see the same pattern in `getSong()`, with a `private internalGetSong()` method
    being used to avoid nesting transactional calls made from the same class. `voteForSong()`
    uses the `internalGetSong()` when it needs to, well, get a `Song` – the transaction
    semantics are applied at the public method layer only.


    In practice, you can get away (sort of) with nested transactional calls if you’re
    careful, but they’re generally bad practice (due to how transactions are applied
    by Spring) and can create some odd errors.'
