    ## 错误处理


    在构建 Web 应用程序时，妥善处理出现的错误情况至关重要。因此，让我们来看看一些方法，通过这些方法，你可以让应用程序的用户知道他们遇到了错误。我们的首要任务是构建一个自定义异常，该异常将简单地扩展
    `RuntimeException` 并公开其中一个方法。现在让我们来看一下。


    ```

    package com.bsg6.chapter06;

    public class ArtistNotFoundException extends RuntimeException {

    public ArtistNotFoundException(String message) {

    super(message);

    }

    }

    代码清单 6-15

    chapter06/src/main/java/com/bsg6/chapter06/ArtistNotFoundException.java

    ```


    上述代码是非常标准的写法，你完全可以随心所欲地使用错误代码或其他数据进行自定义，如果你觉得有必要的话。然而，鉴于我们坚定地站在全面使用注解的一边，这个自定义异常发挥作用的方式是通过
    `@ExceptionHandler` 注解。在下面的代码片段中，我们展示了针对自定义异常 `ArtistNotFoundException` 的一个处理器，这将告诉
    Spring，当抛出此类异常时，我们期望的视图应该在这里处理。


    让我们看一些代码来展示这是如何实现的。


    ```

    @Controller

    public class GetArtistsExceptionController {

    MusicService service;

    GetArtistsExceptionController(MusicService service) {

    throw new ArtistNotFoundException("未找到名为 " + artist + " 的艺术家");

    }

    @ExceptionHandler(ArtistNotFoundException.class)

    public ModelAndView handleCustomException(ArtistNotFoundException ex) {

    var model = new ModelAndView("error");

    model.addObject("message", ex.getMessage());

    model.addObject("statusCode", 404);

    return model;

    }

    }

    代码清单 6-16

    chapter06/src/main/java/com/bsg6/chapter06/GetArtistsExceptionController.java

    ```


    这将处理一个可以在控制器方法中抛出的非常具体的异常。它使用了我们在上一节中了解到的 `ModelAndView` 对象，并预先填充了 404 状态码，因为这是一个“未找到”异常。但是，如果发生了其他情况，并且是我们没有考虑到的异常，该怎么办？我们可以定义一个像下面代码片段这样的捕获所有异常的处理器。


    ```

    @Controller

    public class GetArtistsExceptionController {

    MusicService service;

    GetArtistsExceptionController(MusicService service) {

    }

    @ExceptionHandler(Exception.class)

    public ModelAndView handleAllExceptions(Exception ex) {

    var model = new ModelAndView("error");

    model.addObject("message", ex.getMessage());

    model.addObject("statusCode", 500);

    return model;

    }

    代码清单 6-17

    chapter06/src/main/java/com/bsg6/chapter06/GetArtistsExceptionController.java

    ```


    这将默认返回 500 状态码，因为它可能是在我们代码之外的某个地方抛出的，这很可能是一个我们可以告知用户的合法服务器错误。


    我们的下一个方法会有点傻，因为我们使用的是第 3 章中的服务方法，它们不会抛出异常或返回 null，我们只是有一个控制器方法，它会以 404 状态码响应任何
    `GET /artists/{artist}` 请求。


    ```

    @Controller

    public class GetArtistsExceptionController {

    MusicService service;

    GetArtistsExceptionController(MusicService service) {

    this.service = service;

    }

    @GetMapping("/artists/{artist}")

    @ResponseBody

    public ResponseEntity getSong(

    @PathVariable("artist") final String artist

    ) {

    throw new ArtistNotFoundException("未找到名为 " + artist + " 的艺术家");

    }

    }

    代码清单 6-18

    chapter06/src/main/java/com/bsg6/chapter06/GetArtistsExceptionController.java

    ```


    在我们的控制器的两个异常处理方法中，`ModelAndView` 定义引用了一个名为“error”的视图。让我们来看看我们的错误模板。


    ```


    错误 {{ statusCode }}


    发生了一个错误，状态码为：{{ statusCode }}，消息为：{{ message }}


    代码清单 6-19

    chapter06/src/main/webapp/WEB-INF/templates/error.html

    ```


    上面的模板很简单；它封装了一个简单的错误页面，并在出现问题时从我们的控制器中提取数据。


    警告


    我们在处理异常时遗漏了一些有用的信息，这主要是因为我们将请求转发到了服务器端渲染的视图。有一个“HTTP API 的问题详情”RFC（RFC 7807^(⁸⁶)）规定了关于错误的详细信息，其详细程度和实用性都超过了我们这里展示的内容。我们将在第
    7 章中展示问题详情的实际应用。


    ## 后续步骤


    在本章中，我们了解了如何构建一个功能更全面的乐队网关应用程序，方法是从我们的应用程序中移除所有的手动调用和转换（以及 Servlet），从而引导我们走向一个更精简、更现代的
    Web 应用程序开发流程，包括自动化测试。下一章将把 Spring Boot 集成到我们的项目中，这将使我们能够访问部署中许多更成熟的功能，从而为我们节省相当多的配置工作以及对诸如
    `ViewResolver` 等常见类的手动实现。


    脚注 1   2   3   4   5   6


    # 7. Spring Boot


    到目前为止，我们已经了解了依赖注入和各种配置方法，并探索了将一些 Web 服务部署到 Apache Tomcat 中。在此过程中，我们使用了一小部分 Spring
    模块，并根据需要进行了挑选。现在是时候转换思路，看看 Spring Boot 了，这是一个通常面向**微容器**的项目结构；Spring Boot 为我们提供了一种更简单的方法来获得
    Spring 更丰富的功能集，并提供了一套集成的服务，旨在部署正在运行的应用程序，而无需依赖传统的 Jakarta EE 服务（如 Apache Tomcat）。


    **微容器**有多种定义，但在上下文中，它是一个自包含的应用程序，可以表示为单个工件，部署在虚拟机中。这在 Java 的上下文中听起来有点奇怪，因为 Java
    本身就在虚拟机中运行；那么，难道每个应用程序不都符合“微容器”的条件吗？


    答案是“……​也许吧”。然而，“微容器”更常见的用法是指具有单一用途的应用程序，例如“运行乐队网关应用程序”，在其自己的虚拟机内运行（因此，是一个虚拟机在另一个虚拟机内运行），例如
    Docker 容器。

