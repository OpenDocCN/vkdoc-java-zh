    ### 构建项目


    Maven 遵循“约定优于配置”的原则进行构建。基本上，每个项目都被认为有一个构建模板：


    *   **验证阶段**，确保项目拥有构建所需的信息

    *   **编译阶段**，编译项目的“主源代码”

    *   **测试阶段**，编译并执行“测试源代码”

    *   **打包阶段**，将主源代码打包，以便在其他地方使用

    *   **验证阶段**，运行集成测试以确保质量

    *   **安装阶段**，将打包阶段的结果部署到本地环境以供使用

    *   **部署阶段**，将打包阶段的结果部署到远程环境，供他人使用


    一个 Maven 项目由一个 XML 文件（通常称为 `pom.xml`）表示，该文件告诉 Maven 如何调整每个阶段。通常，编译和测试阶段是修改最多的部分，会为相应阶段添加依赖项。当然，其他阶段也有可选项，并且
    Maven 还可以为需要它们的项目**添加**阶段。


    在本书中，我们主要关注编译和测试阶段。我们将把整本书表示为一个单一的 Maven 项目，但每一章都包含一个或多个*子项目*。


    因此，我们的顶层 `pom.xml` 将包含适用于每一章的通用元素的集中配置，同时也会包含对每一章的引用。


    由于这是第 2 章，我们将从两个 `pom.xml` 文件开始：一个用于整本书，另一个用于本章。每一章都将遵循相同的模式，只需在顶层 `pom.xml` 中添加一个“章节引用”即可。说到这个，让我们看看本章的顶层
    `pom.xml`：


    ```


    4.0.0

    com.apress

    bsg6

    1.0

    pom


    chapter02


    UTF-8


    7.8.0

    6.1.1

    3.1.1

    2023.0.1

    2.15.0

    2.1.214

    1.4.8


    org.springframework.boot

    spring-boot-dependencies

    ${springBootVersion}

    pom

    import


    org.testng

    testng

    ${testngVersion}


    org.springframework

    spring-core


    org.springframework

    spring-context


    org.testng

    testng

    test


    org.springframework

    spring-test

    test


    org.apache.maven.plugins

    maven-surefire-plugin

    3.1.2


    org.apache.maven.surefire

    surefire-testng

    3.1.2


    代码清单 2-1

    /pom.xml，本书的主项目文件

    ```


    这个 `pom.xml` 包含五个部分：首先是项目定义部分，它描述了整本书的信息：`groupId`、`artifactId`、项目版本，以及它是一个多模块项目（同时包含一个单一模块
    `chapter02`，这将在下一个文件中描述）。


    之后是 `<properties>` 部分，它描述了整个项目的核心值，例如 Java 版本（`17`）、Spring 框架版本以及其他集中管理的值。


    注意


    本书编写时使用的是此处显示的版本。然而，世界并不会因为一些作者在写书就停止运转，因此，虽然这些版本在*撰写本文时*是最新的，但可能已经有更新的版本可用。


    接下来是 `<dependencyManagement>` 部分，它**描述**了依赖项，但不会改变任何编译阶段的类路径；这允许我们指定，例如，如果某个项目需要
    `TestNG`（一个测试框架），它应该使用此处描述的特定版本。这里的 `spring-boot-dependencies` 依赖项很重要，因为它实际上是一个*伞状*依赖项，将*许多*
    Spring 依赖项描述为一个整体。这可以防止我们在 Spring 模块版本不同步时去追踪特定的 Spring 模块依赖项；我们引入 `spring-boot-dependencies`，之后无论何时引用
    Spring 依赖项，都会从这个依赖项列表中加载，而不管具体版本是什么。


    在 `<dependencyManagement>` 之后，是实际的 `<dependencies>` 部分，其中包含*每个子模块都将使用*的依赖项。在本书中，这意味着
    Spring 本身以及 TestNG。我们可以专门将 `TestNG` 和 `spring-test` 设置为仅在 `test` 作用域可用，这意味着它们仅在
    Maven 的 `test` 阶段可用，这正是我们想要的。


    最后，我们有一个 `<build>` 部分，我们在其中为测试阶段本身提供配置，指定我们希望使用 TestNG 作为测试框架，以防在某些情况下 TestNG
    无法被默认检测到。（大多数项目不需要这个。）


    现在，让我们看看本章的 `pom.xml`，了解一下我们大多数项目的结构。


    ```


    4.0.0


    com.apress

    bsg6

    1.0


    chapter02

    1.0


    代码清单 2-2

    /chapter02/pom.xml

    ```


    与代码清单 2-1 中的 `pom.xml` 相比，这个 `pom.xml` 看起来极其简洁。这是因为它继承了代码清单 2-1 中所需的一切；本章的构建只需要引用“父
    `pom.xml`”（使用 `<parent>` 标签），并指定自己的名称和版本即可。


    注意


    在本书中，我们将使用非常扁平的模块结构；每一章在“父目录”（代码清单 2-1 所在的位置）中都有一个（或多个）子目录。对于包含多个模块的章节，我们本可以使用嵌套目录，但扁平的目录结构更容易命名和描述。因此，在第
    5 章中，我们将有三个目录，分别命名为 `chapter05-api`、`chapter05-anno` 和 `chapter05-xml`，而不是在 `chapter05`
    目录下包含 `api`、`xml` 和 `anno` 子目录。^(³²)


    在下一节中，我们将更详细地介绍 TestNG，以及如何在接下来的众多示例中使用它。

