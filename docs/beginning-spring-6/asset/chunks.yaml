- fmt: "### Building the Project\n\nMaven builds by convention, over configuration.\
    \ Basically, every project is considered to have a template for construction:\n\
    \n- A validation phase, which makes sure the project has the information it needs\
    \ to be built\n- Compilation, where the “main source code” of the project is compiled\n\
    - Testing, where the “test source code” is compiled and executed\n- Packaging,\
    \ where the main source code is prepared for use elsewhere\n- Verification, which\
    \ runs any integration tests for quality\n- Installation, where the results of\
    \ the packaging phase are deployed for use locally\n- Deployment, where the results\
    \ of the packaging phase are deployed for use remotely, by others\n\nA Maven project\
    \ is represented by an XML file (normally called `pom.xml`) that tells Maven how\
    \ to tune each of these phases. In general, the compilation and testing phases\
    \ are the ones that get modified the most, adding dependencies for use in the\
    \ appropriate phase, although there are certainly options for the other phases\
    \ as well, and Maven can also add phases for projects that need them.\n\nIn this\
    \ book, we’ll mostly be concerned with compilation and testing. We’ll do so by\
    \ representing the entire book as a single Maven project, but with each chapter\
    \ having one or more subprojects.\n\nOur top-level `pom.xml`, then, will have\
    \ a centralized configuration for common elements that apply to each chapter,\
    \ as well as containing references to each chapter as we go.\n\nSince this is\
    \ Chapter [2](#471370_2_En_2_Chapter.xhtml), we’ll start off with two `pom.xml`\
    \ files, one for the book as a whole and one for this chapter. Every chapter will\
    \ follow this same model, only adding a “chapter reference” to the top-level `pom.xml`.\
    \ Speaking of, let’s take a look at it for this chapter:\n\n```\n4.0.0\ncom.apress\n\
    bsg6\n1.0\npom\n\nchapter02\n\nUTF-8\n\n7.8.0\n6.1.1\n3.1.1\n2023.0.1\n2.15.0\n\
    2.1.214\n1.4.8\n\norg.springframework.boot\nspring-boot-dependencies\n${springBootVersion}\n\
    pom\nimport\n\norg.testng\ntestng\n${testngVersion}\n\norg.springframework\nspring-core\n\
    \norg.springframework\nspring-context\n\norg.testng\ntestng\ntest\n\norg.springframework\n\
    spring-test\ntest\n\norg.apache.maven.plugins\nmaven-surefire-plugin\n3.1.2\n\n\
    org.apache.maven.surefire\nsurefire-testng\n3.1.2\n\nListing 2-1\n/pom.xml, the\
    \ main project file for the book\n```\n\nThere are five sections to this `pom.xml`:\
    \ a project definition section, first, which describes things for the whole book:\
    \ a `groupId`, an `artifactId`, a project version, and that it’s a multi-module\
    \ project (as well as a single module, `chapter02`, which will be described as\
    \ our next file).\n\nAfter that, there’s a `<properties>` section, which describes\
    \ values that will be central for the entire project, things like the Java version\
    \ (`17`), the Spring Framework version, and other centralized values.\n\n> **Note**\
    \  \n> This book was written using the versions shown here. However, the world\
    \ doesn’t stop turning just because some authors are writing a book, so while\
    \ these versions are current *as this content is written*, more recent versions\
    \ might be available.\n\nNext, there’s a `<dependencyManagement>` section, which\
    \ describes dependencies but doesn’t alter the classpath for any compilation phases;\
    \ this allows us to indicate, for example, that if a project should need `TestNG`\
    \ (a testing framework), it should use a specific version described here. The\
    \ `spring-boot-dependencies` dependency is important here, because it is actually\
    \ an *umbrella* dependency, describing *many* Spring dependencies as a single\
    \ unit. This prevents us from having to chase specific Spring module dependencies,\
    \ in case their versions aren’t synchronized; we include `spring-boot-dependencies`,\
    \ and any time we refer to a Spring dependency, it’s loaded from this list of\
    \ dependencies, no matter what the specific version is.\n\nAfter `<dependencyManagement>`,\
    \ there’s an actual `<dependencies>` section, which has dependencies that *every\
    \ submodule will use*. In this book, that means Spring itself, as well as `TestNG`.\
    \ We can specifically set `TestNG` and `spring-test` to be available only at `test`\
    \ scope, which means they are only available during Maven’s `test` phases, which\
    \ is what we want.\n\nLastly, we have a `<build>` section, where we provide configuration\
    \ for the testing phase itself, where we specify that we want to use `TestNG`\
    \ for the test framework, in case there are situations where `TestNG` isn’t detected\
    \ by default. (Most projects won’t need this.)\n\nIt’s time to take a look at\
    \ this chapter’s `pom.xml`, to see what most of our projects will look like.\n\
    \n```\n4.0.0\n\ncom.apress\nbsg6\n1.0\n\nchapter02\n1.0\n\nListing 2-2\n/chapter02/pom.xml\n\
    ```\n\nThis `pom.xml` looks incredibly sparse compared to the `pom.xml` from Listing\
    \ [2-1](#471370_2_En_2_Chapter.xhtml#PC3). That’s because it’s inheriting everything\
    \ it needs from Listing [2-1](#471370_2_En_2_Chapter.xhtml#PC3); all this chapter’s\
    \ build needs to do is refer to the “parent `pom.xml`” (with the `<parent>` tag),\
    \ and specify its own name and version.\n\n> **Note**  \n> We are going to use\
    \ a very flat module structure in this book; each chapter will have one (or more)\
    \ subdirectories in the “parent directory” (where Listing [2-1](#471370_2_En_2_Chapter.xhtml#PC3)\
    \ is). We could have used nested directories for chapters that contain more than\
    \ one module, but flatter directory structures are more easily named and described.\
    \ Thus, in Chapter [5](#471370_2_En_5_Chapter.xhtml), we’ll have three directories\
    \ named `chapter05-api`, `chapter05-anno`, and `chapter05-xml`, rather than having\
    \ `chapter05` with `api`, `xml`, and `anno` directories in it.^([^(32)](#fn32))\n\
    \nIn the next section, we’ll go into more detail about `TestNG` and how we’ll\
    \ be using it throughout the many examples in the pages ahead."
  raw: '### Building the Project


    Maven builds by convention, over configuration. Basically, every project is considered
    to have a template for construction:


    *   A validation phase, which makes sure the project has the information it needs
    to be built


    *   Compilation, where the “main source code” of the project is compiled


    *   Testing, where the “test source code” is compiled and executed


    *   Packaging, where the main source code is prepared for use elsewhere


    *   Verification, which runs any integration tests for quality


    *   Installation, where the results of the packaging phase are deployed for use
    locally


    *   Deployment, where the results of the packaging phase are deployed for use
    remotely, by others


    A Maven project is represented by an XML file (normally called `pom.xml`) that
    tells Maven how to tune each of these phases. In general, the compilation and
    testing phases are the ones that get modified the most, adding dependencies for
    use in the appropriate phase, although there are certainly options for the other
    phases as well, and Maven can also **add** phases for projects that need them.


    In this book, we’ll mostly be concerned with compilation and testing. We’ll do
    so by representing the entire book as a single Maven project, but with each chapter
    having one or more *subprojects*.


    Our top-level `pom.xml`, then, will have a centralized configuration for common
    elements that apply to each chapter, as well as containing references to each
    chapter as we go.


    Since this is Chapter [2](#471370_2_En_2_Chapter.xhtml), we’ll start off with
    two `pom.xml` files, one for the book as a whole and one for this chapter. Every
    chapter will follow this same model, only adding a “chapter reference” to the
    top-level `pom.xml`. Speaking of, let’s take a look at it for this chapter:


    ```


    4.0.0

    com.apress

    bsg6

    1.0

    pom


    chapter02


    UTF-8


    7.8.0

    6.1.1

    3.1.1

    2023.0.1

    2.15.0

    2.1.214

    1.4.8


    org.springframework.boot

    spring-boot-dependencies

    ${springBootVersion}

    pom

    import


    org.testng

    testng

    ${testngVersion}


    org.springframework

    spring-core


    org.springframework

    spring-context


    org.testng

    testng

    test


    org.springframework

    spring-test

    test


    org.apache.maven.plugins

    maven-surefire-plugin

    3.1.2


    org.apache.maven.surefire

    surefire-testng

    3.1.2


    Listing 2-1

    /pom.xml, the main project file for the book

    ```


    There are five sections to this `pom.xml`: a project definition section, first,
    which describes things for the whole book: a `groupId`, an `artifactId`, a project
    version, and that it’s a multi-module project (as well as a single module, `chapter02`,
    which will be described as our next file).


    After that, there’s a `<properties>` section, which describes values that will
    be central for the entire project, things like the Java version (`17`), the Spring
    Framework version, and other centralized values.


    Note


    This book was written using the versions shown here. However, the world doesn’t
    stop turning just because some authors are writing a book, so while these versions
    are current *as this content is written*, more recent versions might be available.


    Next, there’s a `<dependencyManagement>` section, which **describes** dependencies
    but doesn’t alter the classpath for any compilation phases; this allows us to
    indicate, for example, that if a project should need `TestNG` (a testing framework),
    it should use a specific version described here. The `spring-boot-dependencies`
    dependency is important here, because it is actually an *umbrella* dependency,
    describing *many* Spring dependencies as a single unit. This prevents us from
    having to chase specific Spring module dependencies, in case their versions aren’t
    synchronized; we include `spring-boot-dependencies`, and any time we refer to
    a Spring dependency, it’s loaded from this list of dependencies, no matter what
    the specific version is.


    After `<dependencyManagement>`, there’s an actual `<dependencies>` section, which
    has dependencies that *every submodule will use*. In this book, that means Spring
    itself, as well as TestNG. We can specifically set `TestNG` and `spring-test`
    to be available only at `test` scope, which means they are only available during
    Maven’s `test` phases, which is what we want.


    Lastly, we have a `<build>` section, where we provide configuration for the testing
    phase itself, where we specify that we want to use TestNG for the test framework,
    in case there are situations where TestNG isn’t detected by default. (Most projects
    won’t need this.)


    It’s time to take a look at this chapter’s `pom.xml`, to see what most of our
    projects will look like.


    ```


    4.0.0


    com.apress

    bsg6

    1.0


    chapter02

    1.0


    Listing 2-2

    /chapter02/pom.xml

    ```


    This `pom.xml` looks incredibly sparse compared to the `pom.xml` from Listing
    [2-1](#471370_2_En_2_Chapter.xhtml#PC3). That’s because it’s inheriting everything
    it needs from Listing [2-1](#471370_2_En_2_Chapter.xhtml#PC3); all this chapter’s
    build needs to do is refer to the “parent `pom.xml`” (with the `<parent>` tag),
    and specify its own name and version.


    Note


    We are going to use a very flat module structure in this book; each chapter will
    have one (or more) subdirectories in the “parent directory” (where Listing [2-1](#471370_2_En_2_Chapter.xhtml#PC3)
    is). We could have used nested directories for chapters that contain more than
    one module, but flatter directory structures are more easily named and described.
    Thus, in Chapter [5](#471370_2_En_5_Chapter.xhtml), we’ll have three directories
    named `chapter05-api`, `chapter05-anno`, and `chapter05-xml`, rather than having
    `chapter05` with `api`, `xml`, and `anno` directories in it.^([^(32)](#fn32))


    In the next section, we’ll go into more detail about TestNG and how we’ll be using
    it throughout the many examples in the pages ahead.'
