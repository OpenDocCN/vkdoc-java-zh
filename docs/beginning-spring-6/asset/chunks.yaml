    `Listing 9-13` `chapter09-test/pom.xml`


    Note that it has explicit dependencies on TestNG, `spring-boot-starter-test`,
    and `spring-test` – and they’re not set to `test` scope. When we import this project
    into `chapter09-jpa` and `chapter09-mongo`, we’ll do it at `test` scope, so the
    TestNG and `spring-boot-starter-test` dependencies will be at test scope for downstream
    dependencies, but we want them in the main compilation classpath for *this* project.
    Since we’re importing this project at `test` scope for *other* projects, any transitive
    dependencies will be imported at `test` scope as well. We’re not polluting our
    classpaths.


    There are three sets of tests in `chapter09-test`: `BaseArtistRepositoryTests`,
    `BaseSongRepositoryTests`, and `BaseMusicServiceTests`. Every one of them is fairly
    simple; the goal is to exercise the target of the tests, but with Spring injecting
    implementations of the services.


    Thus, when we **use** these tests, we’ll have a Spring configuration that references
    the necessary services, and these classes will use whatever is provided. As with
    `chapter09-api`, this makes for some odd declarations, but it’s nothing too complicated
    – just verbose.


