    the book, the code that is used to actually compile and run everything, so when
    (and if) you type it in or copy it, you’re getting something that actually worked
    when the book was written.


    The first of the things we want to examine now: `intFindArtistByName()`, an internal
    method with access points through two `public` methods. The first public method
    (`findArtistByName`) expects a `String` (the name of the artist). The second public
    method (`findArtistByNameNoUpdate()`) has the same argument – an artist’s name
    – but calls the internal method such that an update is not attempted.


    The private method is *not* annotated with `@Transactional` – it’s a private internal
    method and expects to be called from a public method, one that **has** been marked
    as `@Transactional`. This avoids problems with exception propagation; in this
    class, we have enough control over exception conditions that it’s *probably* not
    an issue, but we might as well *try* to do it right.


    Internally, the first part of `internalFindArtistByName()` mirrors the `findArtistById()`
    method from Listing [8-10](#471370_2_En_8_Chapter.xhtml#PC13); we have a query
    that returns a `List<Artist>`, and we convert it to a stream. The `.orElse()`
    code is a little more involved, though.


    This method might be used in two ways, you see: the first way implies that an
    `Artist` should be created, and the second does not. That’s because when we do
    a search for a list of songs, we don’t necessarily want to create an `Artist`;
    a search is a read-only operation, so there’s no need or requirement to try to
    write anything – in fact, there’s a desire **not** to write anything. The default
    “mode” of the method is to write an `Artist`, but we want access to a version
    that does not. Thus, the public version (`findArtistByName()`) assumes an update,
    and the internal version – the one that does all the work – checks to see what
    operations are desired.


    If it’s a read-only operation, we return `null` – our signal value for “nothing
    found.” We could have thrown an exception, or returned an `Optional`, but in context,
    `null` is simpler; plus, we’ve already used it in other places in our code (see
    `findArtistById()` – again, Listing [8-10](#471370_2_En_8_Chapter.xhtml#PC13)
    – as an example).


    If an update is required, then we have a few things to factor in. We need to return
    an `Artist` object, of course, and that object should be fully populated. The
    `name` is easy; we’re searching for the `Artist` by name, so that’s a logical
    value for the `name` attribute. (Does this even need to be said? …​ Probably not,
    but we’re aiming for some level of completeness here.)


    However, we need to grab the `id` that the database assigns to the `Artist`, too.
    The way we do that is fairly simple, but there are some moving parts to consider:


    1.  First, we create a `KeyHolder` (an interface with a concrete realization of
    `GeneratedKeyHolder`). This interface has a few access methods to get keys – but
    the most useful (and relevant in this case) is `getKey()`, which returns a `java.lang.Number`.


    2.  We then use a lambda as an instance of a `PreparedStatementCreator`. This
    is a single-access method class (with the method being `createPreparedStatement()`
    and accepting a `Connection`); you’re meant to, well, create a `PreparedStatement`
    with the proper placeholders populated. We only have one placeholder (as an `Artist`
    has only one attribute besides `id`) so that’s …​ rather simple.


    3.  We pass the `KeyHolder` as the final argument to the `JdbcTemplate.update()`
    method.


    Lastly, we pull out the key from the `KeyHolder` – with `keyHolder.getKey().intValue()`,
    which gets an integer from the `Number` abstraction – and use that to build an
    `Artist` reference.


    Could we have written this to be simpler, or at least to be more straightforward?
    Well…​ sort of. In this case, “straightforward” means “without streams or `Optional`,”
    and truthfully…​ it can be done, but involves a lot of temporary variables to
    contain local state. The “simpler” version is actually going to have a higher
    cyclomatic complexity^([^(96)](#fn96)) than the streaming version; the way it’s
    written now has a design complexity of 2 and a cyclomatic complexity of 2, and
    the old approach using `if` and checking `List.size()` for presence actually has
    complexity scores of 3 – where lower numbers are better.


    You see the same pattern in `getSong()`, with a `private internalGetSong()` method
    being used to avoid nesting transactional calls made from the same class. `voteForSong()`
    uses the `internalGetSong()` when it needs to, well, get a `Song` – the transaction
    semantics are applied at the public method layer only.


    In practice, you can get away (sort of) with nested transactional calls if you’re
    careful, but they’re generally bad practice (due to how transactions are applied
    by Spring) and can create some odd errors.'
