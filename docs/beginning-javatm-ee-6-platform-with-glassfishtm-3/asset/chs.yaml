  \n第 7 章 ■ 会话 Bean 与定时器服务\n\n**197**\n\nEJB 3.1 引入了全新的单例会话 Bean，它遵循单例设计模式。一旦实例化，容器会确保在应用程序运行期间只有一个单例实例。该实例在多个客户端之间共享，如图\
