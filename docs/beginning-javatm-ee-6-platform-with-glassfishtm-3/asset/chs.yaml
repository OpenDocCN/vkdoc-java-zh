  ObjectMessage message = session.createObjectMessage();\n\nmessage.setObject(order);\n\
  \n第 13 章 ■ 发送消息\n\n**389**\n\n**message.setFloatProperty(\"orderAmount\", totalAmount);**\n\
  \nproducer.send(message);\n\nconnection.close();\n\n} catch (Exception e) {\n\n\
  e.printStackTrace();\n\n}\n\n}\n\n}\n\n**编写 OrderMDB**\n\nOrderMDB 类（见清单 13-15）是一个使用\
  \ @MessageDriven 注解的 MDB，它监听 jms/javaee6/Queue 目的地。此 MDB 仅对金额大于 1000 美元的订单感兴趣，它使用消息选择器（orderAmount\
  \ > 1000）。当消息到达时，onMessage() 方法消费该消息，将其转换为 ObjectMessage，并获取消息体（msg.getObject()）。在本示例中，仅显示消息，但也可以进行其他处理。\n\
  \n**清单 13-15.** *OrderMDB 接收 ObjectMessage*\n\n\n\n@MessageDriven(mappedName = \"\
  \ **jms/javaee6/Queue**\", activationConfig = {\n\n@ActivationConfigProperty(propertyName\
  \ = \"acknowledgeMode\", ➥\n\npropertyValue = \"Auto-acknowledge\"),\n\n@ActivationConfigProperty(propertyName\
  \ = \"messageSelector\", ➥\n\npropertyValue = \" **orderAmount > 1000**\")\n\n})\n\
  \npublic class OrderMDB implements MessageListener {\n\npublic void onMessage(Message\
  \ message) {\n\ntry {\n\nObjectMessage msg = (ObjectMessage) message;\n\nOrderDTO\
  \ order = (OrderDTO) msg.getObject();\n\nSystem.out.println(\"Order received: \"\
  \ + order.toString());\n\n} catch (JMSException e) {\n\ne.printStackTrace();\n\n\
  }\n\n}\n\n}\n\n**使用 Maven 编译和打包**\n\n发送端和 MDB 应打包到不同的 jar 文件中，并使用不同的目录结构和不同的 pom.xml\
  \ 文件。OrderMDB 的 pom.xml（如清单 13-16 所示）与 OrderSender 的 pom.xml 几乎相同。\n\n由于 MDB 使用了\
