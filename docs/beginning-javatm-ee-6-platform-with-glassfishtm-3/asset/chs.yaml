  \n当你需要实现一个可以通过单个方法调用完成的任务时，无状态 Bean 是理想的选择。因此，如果你采用前面的代码并引入一个无状态组件，你需要创建一个 Book\
  \ 对象，设置一些值，然后使用一个无状态组件\n\n![Image 66](img/index-221_1.jpg)\n\n第 7 章 ■ 会话 Bean 与定时器服务\n\
