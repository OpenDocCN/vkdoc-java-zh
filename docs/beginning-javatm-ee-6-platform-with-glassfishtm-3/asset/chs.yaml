  \n**33**\n\n■**注意** OSGi 是一个用于动态组件管理和发现的标准。应用程序或组件可以在无需重启的情况下被远程安装、启动、停止、更新和卸载。组件还可以动态检测新服务的添加或移除并相应地进行调整。Apache\
  \ Felix、Equinox 和 Knopflerfish 都是 OSGi 的实现。\n\n这种模块化和可扩展性使得 GlassFish v3 能够从一个监听管理命令的简单\
  \ Web 服务器，通过简单地部署诸如 war 文件（加载并启动 Web 容器，然后部署应用程序）或 EJB jar 文件（将动态加载并启动 EJB 容器）之类的工件，成长为一个功能更强大的运行时。此外，精简版服务器只需几秒钟即可启动（在合理现代的硬件上不到\
  \ 5 秒），并且你只需为启动时间和内存消耗中实际使用的部分付费。动态启动 Web 容器大约需要 3 秒，而部署通常不到 1 秒。所有这些使得 GlassFish\
