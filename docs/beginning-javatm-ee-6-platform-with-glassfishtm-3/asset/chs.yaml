  </creditCard>\n\n编组是将对象转换为 XML 的操作。使用 JAXB 也可以进行反向操作。解组会将此 XML 文档作为输入，并使用文档中定义的值实例化一个\
  \ CreditCard 对象。JAXB 还可以自动生成用于验证信用卡 XML 结构的模式，以确保其具有正确的结构和数据类型。清单 14-6 展示了 CreditCard\
  \ 类的 XML 模式定义（XSD）。\n\n**清单 14-6.** *验证前述 XML 文档的 XML 模式*\n\n<?xml version=\"1.0\"\
  \ encoding=\"UTF-8\" standalone=\"yes\"?>\n\n<xs:schema version=\"1.0\" xmlns:**xs**[=\"\
  http://www.w3.org/2001/XMLSchema\">](http://www.w3.org/2001/XMLSchema)\n\n第 14 章\
  \ ■ SOAP Web 服务\n\n**401**\n\n<xs:element name=\"creditCard\" type=\"creditCard\"\
  />\n\n<xs:**complexType** name=\"creditCard\">\n\n<xs:sequence>\n\n<xs:**element**\
  \ name=\"controlNumber\" type=\"xs:int\" minOccurs=\"0\"/>\n\n<xs:element name=\"\
  expiryDate\" type=\"xs:string\" minOccurs=\"0\"/>\n\n<xs:element name=\"number\"\
  \ type=\"xs:string\" minOccurs=\"0\"/>\n\n<xs:element name=\"type\" type=\"xs:string\"\
  \ minOccurs=\"0\"/>\n\n</xs:sequence>\n\n</xs:complexType>\n\n</xs:schema>\n\n此模式由简单元素（controlNumber、expiryDate\
  \ 等）和一个复杂类型（creditCard）组成。复杂类型对元素内容进行建模，即它们决定了文档中可能使用的元素集合（此处为信用卡）。\n\n请注意，所有标签都使用了\
  \ xs 前缀（xs:element、xs:string 等）。此前缀称为*命名空间*，并在文档的 xmlns（XML 命名空间）头部标签中定义。\n\n<xs:schema\
  \ version=\"1.0\" xmlns:**xs**[=\"http://www.w3.org/2001/XMLSchema\">](http://www.w3.org/2001/XMLSchema)\n\
  \n\n\n命名空间为不同文档或应用程序中共同使用的元素创建唯一前缀。它们主要用于避免同一元素名称出现在多个文档中可能引发的冲突问题（例如，`<element>`标签可能出现在多个文档中并具有不同含义）。这对\
  \ Web 服务而言是一个重要问题，因为 Web 服务需要同时处理多个文档（如 SOAP 信封、WSDL 文档等）。命名空间在 Web 服务中非常重要。\n\n\
  **绑定**\n\n定义在`javax.xml.bind`包中的 JAXB API 提供了一组接口和类，用于生成 XML 文档和 Java 类；换句话说，它绑定了这两种模型。JAXB\
  \ 运行时框架实现了编组和解组操作。\n\n编组是将带有 JAXB 注解的类实例转换为 XML 表示的过程。同样，解组是将 XML 表示转换为对象树的过程。\n\
  \n编组后的 XML 数据可以通过 XML Schema 进行验证，JAXB 能够自动从一组类生成 Schema，反之亦然。图 14-3 展示了应用程序与 JAXB\
  \ 之间可能的交互方式。\n\n![Image 125](img/index-432_1.jpg)\n\n**402**\n\n第 14 章 ■ SOAP Web\
  \ 服务\n\n**图 14-3.** *JAXB 架构*\n\nJAXB API 的核心是`javax.xml.bind.JAXBContext`类。这个抽象类管理\
  \ XML 文档与 Java 对象之间的绑定，因为它提供了：\n\n• 一个`Unmarshaller`类，用于将 XML 文档转换为对象图，并可选择性地验证\
  \ XML\n• 一个`Marshaller`类，用于获取对象图并将其转换为 XML 文档\n\n例如，要将我们的`CreditCard`对象转换为 XML 文档（参见清单\
  \ 14-4），必须使用`Marshaller.marshal()`方法。该方法接受一个对象作为参数，并将其编组为多种输出形式（`StringWriter`用于获取\
  \ XML 文档的字符串表示，或`FileOutputStream`用于将其存储到文件中）。\n\n清单 14-7 中的代码通过使用静态方法`newInstance()`创建了一个`JAXBContext`实例，并向其传递了需要编组的根类（`CreditCard.class`）。然后，从创建的`Marshaller`对象中调用`marshal()`方法，该方法将信用卡对象的\
  \ XML 表示（如前文清单 14-5 所示）生成到`StringWriter`中并显示出来。同样的方法也可用于使用`Unmarshaller.unmarshal()`方法将\
  \ XML 文档解组为对象。\n\n第 14 章 ■ SOAP Web 服务\n\n**403**\n\n**清单 14-7.** *编组 CreditCard\
  \ 对象的主类*\n\npublic class Main {\n\npublic static void main(String[] args) {\n\n\
  CreditCard creditCard = new CreditCard(\"1234\", \"12/09\", 6398, \"Visa\"); StringWriter\
  \ writer = new StringWriter();\n\n**JAXBContext context = JAXBContext.newInstance(CreditCard.class);**\n\
  \n**Marshaller m = context.createMarshaller();**\n\n**m.marshal(creditCard, writer);**\n\
  \nSystem.out.println(writer.toString());\n\n}\n\n}\n\nJAXB 还有其他工具，特别是 Schema 编译器（`xjc`）和\
  \ Schema 生成器（`schemaGen`）；虽然编组/解组处理对象和 XML 文档，但 Schema 编译器和 Schema 生成器处理类和 XML Schema。这些工具可以在命令行中使用（它们随\
  \ Java SE 6 捆绑提供），也可以作为 Maven 目标使用。\n\n使用 JAXB 时，有两种可能产生绑定的场景：\n\n*   **从 Java 类开始**：Java\
  \ 类已存在，并用于生成 XML Schema。\n*   **从 XML Schema 开始**：在此场景中，Schema 已存在，并使用 Schema 编译器创建\
  \ Java 类。\n\n这两种场景对于 Web 服务非常重要。Web 服务可以生成其 WSDL 文件，基于该 WSDL，消费者可以生成一组 Java 类，整个过程透明且可移植。\n\
  \n**注解**\n\nJAXB 在许多方面与 JPA 相似。然而，JAXB 不是将对象映射到数据库，而是\n\n\n\n映射到 XML 文档。此外，与 JPA\
  \ 类似，JAXB 定义了一组注解（位于 `javax.xml.bind.annotation` 包中）来自定义此映射，并依靠异常配置来最大限度地减少开发人员的工作量。如果持久化对象必须使用\
  \ `@Entity` 注解，那么 JAXB 中对应的注解是 `@XmlRootElement`（参见清单 14-8）。\n\n**清单 14-8.** *一个自定义的\
