  mvn package\n\n转到 target 目录，你应该会看到 chapter13-MDB-1.0.jar 文件。如果打开它，你会看到它包含 OrderMDB\
  \ 的类文件。对于 OrderSender，你将获得另一个包含该类的 jar 文件：chapter13-Sender-1.0.jar。\n\n**创建受管对象**\n\
  \n发送和接收消息所需的受管对象需要由 JMS 创建。每个对象都有一个 JNDI 名称，允许客户端获取对象的引用（示例中使用了注入）：\n\n• 连接工厂名为\
  \ jms/javaee6/ConnectionFactory。\n\n• 队列名为 jms/javaee6/Queue。\n\n由于这些对象是通过管理方式创建的，因此需要确保\
  \ GlassFish 已启动并正在运行，因为 OpenMQ 运行在 GlassFish 内部。确认 asadmin 命令行工具已加入你的路径后，在 DOS 控制台中执行以下命令：\n\
  \nasadmin **create-jms-resource** --restype javax.jms.ConnectionFactory➥\n\n**jms/javaee6/ConnectionFactory**\n\
  \nasadmin **create-jms-resource** --restype javax.jms.Queue **jms/javaee6/Queue**\n\
  \n可以使用 GlassFish 的 Web 控制台来设置连接工厂和队列。但请注意，根据我的经验，管理 GlassFish 最简单快捷的方式是通过 asadmin\
  \ 脚本。使用另一个命令列出所有 JMS 资源，以确保受管对象已成功创建。\n\nasadmin **list-jms-resources**\n\njms/javaee6/Queue\n\
  \njms/javaee6/ConnectionFactory\n\n\n\n**在 GlassFish 上部署 MDB**\n\n将 MDB 打包成 jar\
  \ 文件后，需要将其部署到 GlassFish 中。这可以通过多种方式完成，包括通过 Web 管理控制台。不过，使用 asadmin 命令行可以轻松完成此操作：打开\
  \ DOS 控制台，进入目标目录，该目录下存放着\n\n`chapter13-MDB-1.0.jar` 文件，确保 GlassFish 仍在运行，然后输入以下命令：\n\
  \nasadmin deploy **chapter13-MDB-1.0.jar**\n\n如果部署成功，以下命令应返回已部署的\n\njar 文件名及其类型（示例中为\
