  \ . . . . . . . . . . . . . . . . 463\n\n前言\n\n\n\n**虽然**Java EE 5 被公认为最重要的企业级版本，但\
  \ Java EE 6 为每一位服务端 Java 开发者准备了更多惊喜。随着增强的 EJB 3.1、Java 持久化 API（JPA）2.0、崭新且已大获成功的用于\
  \ RESTful Web 服务的 Java API（JAX-RS），以及全面改造的 JavaServer Faces（JSF）2.0 规范的推出，编写企业级应用最广泛的技术变得更为出色。企业级\
  \ Java 平台现已成熟到既能保持完整，又能做到轻量级。\n\n现在，你本可以花大量时间使用你最喜欢的搜索引擎和博客阅读器，在众多博客、维基和文档中搜寻关于\
  \ Java EE 6 的全部或部分内容，但我建议你最好从这本书开始。它简洁、实用，并提供了一站式的学习体验。\n\n将开源的 GlassFish 应用服务器作为本书的基础平台，这非常合理，原因有二：首先，GlassFish\
  \ v3 是参考实现（RI），因此与 Java EE 6 保持一致；其次，使用参考实现并不意味着它无法取悦开发者或无法扩展至生产环境。通过 GlassFish\
  \ 结合最新技术所获得的技能，在企业环境中是可移植的。\n\nAntonio Goncalves 是一位罕见的结合体：他既是友善的 Java 爱好者，又是严谨务实的\
  \ Java EE 专家。他作为顾问的角色，加上他主持巴黎成功 Java 用户组的经历，当然，还有他作为多个关键 Java EE 6 专家组成员的身份，使他成为《*Beginning\
  \ Java™ EE 6 Platform with GlassFish™ 3*》一书的理想作者。\n\n当你读完这本书时，我想建议你，Java EE 的最大价值并非其功能的总和，而是创造它的社区，以及它作为一个标准，允许你随心所欲地选择或更改实现的本质。\n\
  \n自由不仅仅关乎开源，也关乎开放标准。\n\nAlexis Moussine-Pouchkine\n\n*GlassFish 团队，Sun Microsystems*\n\
  \n**xvii**\n\n![图片 4](img/index-21_1.jpg)\n\n关于作者\n\n■**安东尼奥·贡萨尔维斯**是一位居住在巴黎的高级软件架构师。自\
  \ 20 世纪 90 年代末起，他最初专注于 Java 开发，他的职业生涯将他带到了不同的国家和公司，现在他担任 Java EE 软件架构顾问。作为前 BEA\
  \ 顾问，他在 WebLogic、JBoss 以及当然还有 GlassFish 等应用服务器方面拥有丰富的专业知识。他特别热衷于开源，并且是 OOSGTP（巴黎开源聚会）的成员。他还是巴黎\
  \ Java 用户组的联合创始人和联合负责人。\n\n安东尼奥在 2007 年用法语撰写了他的第一本关于 Java EE 5 的书。此后，他加入了 JCP，并成为多个\
  \ JSR（Java EE 6、JPA 2.0 和 EJB 3.1）的专家成员。在过去的几年里，安东尼奥在国际会议上发表了主要关于 Java EE 的演讲，包括\
  \ JavaOne、The Server Side Symposium、Devoxx 和 Jazoon。他还为 IT 网站（DevX）和 IT 杂志（*Programmez*、*Linux\
  \ Magazine*）撰写了大量技术论文和文章。\n\n安东尼奥毕业于巴黎国立工艺美术学院（获得 IT 工程学位）和布莱顿大学（获得面向对象设计理学硕士学位）。\n\
  \n**xix**\n\n![图片 5](img/index-23_1.jpg)\n\n关于技术审校者\n\n■**吉姆·法利**是一位技术架构师、战略家、作家和管理者。他的职业生涯涉及广泛的领域，从商业到非营利组织，从金融到高等教育。除了日常工作，吉姆还在哈佛大学教授企业开发课程。吉姆是几本技术书籍的作者，并为各种在线和印刷出版物撰写文章和评论。\n\
  \n**xxi**\n\n致谢\n\n**撰**写一本关于像 Java EE 6 这样新规范的书是一项艰巨的任务，需要不同人才的通力合作。首先，我衷心感谢 Apress\
  \ 的 Steve Anglin 给我机会为 Apress 的《*Beginning*》系列丛书撰稿，作为读者我非常欣赏这个系列。在整个写作过程中，我与 Candace\
  \ English 和 Tom Welsh 保持着持续联系，他们审阅了本书，并在我对能否按时完成感到怀疑时给予我 reassurance。感谢技术审校者 Jim\
  \ Farley 和 Sumit Pal，他们出色地为我提供了很好的技术建议来改进本书。最后但同样重要的是，我钦佩 Ami Knox 所做的真正了不起的工作，她完成了最终的编辑工作。\n\
