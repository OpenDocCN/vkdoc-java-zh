  在我解释如何使用此组件之前，请回顾本章前面关于资源管理的讨论以及“例外配置”的概念。该组件必须保存在资源库内的文件中。例如，此示例的文件名为 `newItem.xhtml`，保存在\
  \ `/resources/apress` 目录下。如果保留所有默认设置，要使用此组件，您需要声明一个名为 `apress` 的库，并为其指定一个 XML 命名空间（如下代码中的\
  \ `ago`）：\n\n<html xmlns:**ago**[=\"http://java.sun.com/jsf/composite/**apress**\"\
