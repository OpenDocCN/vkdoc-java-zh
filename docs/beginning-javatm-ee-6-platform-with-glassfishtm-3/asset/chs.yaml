  \ 注解（或其 XML 等效项）来显式排除它们。\n\n在清单 5-4 中，你看到了一个定义了监听器的 `Customer` 实体，但一个监听器也可以被多个实体定义。这在监听器提供许多实体都能受益的更通用逻辑时非常有用。例如，你可以创建一个调试监听器，用于显示触发事件的名称，如清单\
