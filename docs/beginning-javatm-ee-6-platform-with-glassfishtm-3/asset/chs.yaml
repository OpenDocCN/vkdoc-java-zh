  \n**392**\n\n第 13 章 ■ 发送消息\n\n**运行示例**\n\nMDB 已部署在 GlassFish 上，并正在监听 `jms/javaee6/Queue`\
  \ 目标，等待消息到达。现在可以运行 OrderSender 客户端了。这是一个独立应用程序，在 GlassFish 外部执行，但需要向其中注入资源（连接工厂和队列）。可以使用\
  \ ACC 来执行它。ACC 会封装一个 jar 文件，并使其能够访问应用服务器资源。要执行 ACC，请使用 GlassFish 自带的 appclient 工具，并将\
  \ jar 文件作为参数传入，同时传入我们应用程序的参数（订单金额）。输入以下命令发送一笔 2000 美元的订单消息：\n\nappclient -client\
  \ chapter13-Sender-1.0.jar **2000**\n\n由于金额大于 1000 美元（选择器中定义的金额），OrderMDB 应接收并打印该消息。检查\
  \ GlassFish 日志以确认。如果传入的参数低于 1000 美元，MDB 将不会接收该消息。\n\nappclient -client chapter13-Sender-1.0.jar\
  \ **500**\n\n**总结**\n\n本章展示了与消息系统的集成是一种组件之间松散耦合、异步的通信形式。MOM 可以看作是系统之间的缓冲区，这些系统需要\n\
  \n按照自己的节奏生产和消费消息。这与 RPC 架构（如 RMI）不同，在 RPC 架构中，客户端需要了解可用服务的方法。\n\n本章的第一部分重点介绍了 JMS\
  \ API 及其术语。异步模型是一个非常强大的 API，可以在 Java SE 或 Java EE 环境中使用，它基于 P2P 和发布-订阅、连接工厂、目标、连接、会话、不同类型的消息（文本、对象、映射、流、字节）及其头部、属性和正文、选择器，以及其他可靠性机制（如确认或持久性）。\n\
  \nJava EE 有一个专门用于消费消息的企业组件：MDB。本章的\n\n第二部分展示了 MDB 如何作为异步消费者使用，以及它们如何依赖容器来处理多项服务（生命周期、拦截器、事务、安全性、并发性、消息确认等）。\n\
  \n本节还展示了如何将这些组件与 Maven、GlassFish 和 OpenMQ 整合在一起，并给出了一个独立发送者和 MDB 接收者的示例。\n\n接下来的章节将演示用于与外部系统互操作的其他技术：Web\
  \ 服务和 RESTful 服务。\n\n第 14 章\n\nSOAP Web 服务\n\n**曾**几何时，面向服务架构（SOA）被视为一个流行词，如今它已成为日常架构生活的一部分。然而，有时它会与\
  \ Web 服务混淆。SOA 是一种主要基于面向服务应用程序的架构，可以通过不同的技术（如 Web 服务）来实现。\n\nWeb 服务被认为是“松散耦合”的，因为\
  \ Web 服务的客户端无需了解其实现细节（例如开发所用的语言或方法签名）。消费者能够通过一个自解释的接口来调用 Web 服务，该接口描述了可用的业务方法（参数和返回值）。底层\n\
  \n实现可以用任何语言完成（Visual Basic、C#、C、C++、Java 等）。\n\n\n消费者与服务之间仍能以松散耦合的方式交换数据：即使用 XML\
  \ 文档。消费者以 XML 文档的形式向 Web 服务发送请求，并可选地接收同样以 XML 格式返回的回复。\n\nWeb 服务也涉及分布式计算。分布式软件已存在多年，但与现有分布式系统不同，Web\
  \ 服务是为 Web 量身定制的。其默认网络协议是 HTTP，这是一种广为人知且稳健的无状态协议。\n\nWeb 服务无处不在，它们可以运行在桌面端，也可用于企业对企业（B2B）集成，从而使以往需要人工干预的操作得以自动执行。Web\
  \ 服务通过互联网或同一公司内部（即企业应用集成，EAI）集成由不同组织运行的应用程序。在所有情况下，Web 服务都提供了一种连接不同软件组件的标准方式。\n\n\
  **理解 Web 服务**\n\n简而言之，Web 服务是一种通过服务接口暴露给客户端应用程序（即服务消费者）的业务逻辑。然而，与对象或 EJB 不同，Web\
  \ 服务使用 XML 提供松散耦合的接口。Web 服务标准规定，消息发送到的接口应定义消息请求和响应的格式，以及发布和发现 Web 服务接口（注册中心）的机制。\n\
  \n在图 14-1 中，您可以看到 Web 服务交互的高层示意图。Web 服务可以选择将其接口注册到注册中心（UDDI），以便消费者能够发现它。一旦消费者了解了服务的接口和消息格式，它就可以发送请求并接收响应。\n\
  \n**393**\n\n![Image 123](img/index-424_1.jpg)\n\n**394**\n\n第 14 章 ■ SOAP Web 服务\n\
  \n**图 14-1.** *消费者通过注册中心发现服务。*\n\nWeb 服务需要多种技术和协议，以标准方式将数据从消费者传输到服务。您最常遇到的几种如下：\n\
  \n• 统一描述、发现和集成（UDDI）是一种注册与发现机制，类似于黄页，用于存储和分类 Web 服务接口。\n\n• Web 服务描述语言（WSDL）定义了\
  \ Web 服务接口、数据和消息类型、交互方式及协议。\n\n• 简单对象访问协议（SOAP）是一种基于 XML 技术的消息编码协议，为 Web 服务通信定义了信封结构。\n\
  \n• 消息通过传输协议进行交换。虽然超文本传输协议（HTTP）是应用最广泛的传输协议，但也可以使用 SMTP 或 JMS 等其他协议。\n\n• 可扩展标记语言（XML）是构建和定义\
  \ Web 服务（SOAP、WSDL 和 UDDI）的基础。\n\n借助这些标准技术，Web 服务提供了几乎无限的潜力。客户端可以调用 Web 服务，该服务可映射到任何程序，并适应任何数据类型和结构，通过\
  \ XML 交换消息。\n\n**UDDI**\n\n通过 Web 相互交互的程序需要能够找到允许它们互联的信息。UDDI 提供了定位 Web 服务信息及其调用方式的标准方法。\n\
  \nUDDI 是一个基于 XML 的 Web 服务注册中心，类似于黄页目录，企业可以在此注册其服务。注册信息包括业务类型、地理位置、网站、电话号码等。其他企业随后可以搜索该注册中心，发现特定\
  \ Web 服务的信息。这些信息提供了关于服务的额外元数据，描述了其行为以及 Web 服务的实际位置。\n\n这些信息以 WSDL 文档的形式呈现。客户端随后可以消费该\
  \ WSDL 文档，该文档提供了绑定和调用服务所需的信息。\n\n![Image 124](img/index-425_1.jpg)\n\n第 14 章 ■ SOAP\
  \ Web 服务\n\n**395**\n\n**WSDL**\n\nUDDI 注册中心指向互联网上可用的公共 WSDL 文件，潜在消费者可以下载该文件。WSDL\
  \ 是定义消费者与 Web 服务之间交互的接口定义语言（IDL）（见图 14-2）。它对 Web 服务至关重要，因为它描述了消息类型、端口、通信协议、支持的操作、位置以及客户端应期望的返回内容。它定义了\
  \ Web 服务承诺遵守的契约。您可以将 WSDL 视为用 XML 编写的 Java 接口。\n\n**图 14-2.** *消费者与 Web 服务之间的 WSDL\
  \ 接口*\n\n为确保互操作性，消费者和提供者需要标准的 Web 服务接口来共享和理解消息。这正是 WSDL 的作用。SOAP 则定义了消息从一台计算机发送到另一台计算机的方式。\n\
  \n**SOAP**\n\nSOAP 是标准的 Web 服务应用协议。它提供了连接 Web 服务的通信机制，通过网络协议（通常是 HTTP）交换格式化的 XML\
  \ 数据。与 WSDL 类似，SOAP 高度依赖 XML，因为 SOAP 消息是一个包含多个元素（信封、标头、正文等）的 XML 文档。\n\nSOAP 旨在提供一种独立、抽象的通信协议，能够连接分布式服务。连接的服务可以使用支持给定传输协议的任何硬件和软件组合来构建。\n\
  \n**传输协议**\n\n为了使消费者与 Web 服务通信，需要一种相互发送消息的方式。SOAP 消息可以使用双方都支持的协议通过网络传输。鉴于 Web 服务主要应用于\
  \ Web，它们通常使用 HTTP，但也可以使用其他网络协议，如 HTTPS（安全 HTTP）、TCP/IP、SMTP（简单邮件传输协议）、FTP（文件传输协议）等。\n\
  \n**XML**\n\nXML 在 Java EE 平台中用于部署描述符、元数据信息等。对于 Web 服务，XML 也被用作一种集成技术，解决了数据独立性和互操作性问题。它不仅用作消息格式，还用于定义服务（WSDL）或交换消息（SOAP）。与这些\
  \ XML 文档相关联的模式（Schema）用于验证交换的数据。\n\n**396**\n\n第 14 章 ■ SOAP Web 服务\n\n**Web 服务规范概述**\n\
  \n持久化主要由一个规范涵盖：JPA。对于 Web 服务，情况更为复杂，因为您需要处理来自不同标准机构的众多规范。此外，由于 Web 服务被其他编程语言使用，这些规范并非都与\
  \ Java 社区流程（JCP）直接相关。\n\n**Web 服务简史**\n\nWeb 服务是企业通过网络进行通信的标准方式，在此之前已有一些前身：最初由 Unix\
  \ 系统使用的通用对象请求代理架构（CORBA），以及其微软竞争对手——分布式组件对象模型（DCOM）。在更底层，有远程过程调用（RPC），而更接近我们 Java\
  \ 世界的是远程方法调用（RMI）。\n\n在 Web 出现之前，很难让所有主要软件供应商就传输协议达成一致。当 HTTP 协议成为成熟标准后，它逐渐成为通用的业务通信媒介。大约在同一时间，当万维网联盟（W3C）宣布\
  \ XML 1.0 适合在应用程序中部署时，XML 正式成为标准。到 1998 年，HTTP 和 XML 这两个要素已准备好协同工作。\n\n\n\nSOAP\
  \ 1.0 由微软于 1998 年启动，最终于 1999 年底发布，并在 XML Schema 中建模了类型化引用和数组。到 2000 年，IBM 开始着手开发\
  \ SOAP 1.1，而 WSDL 于 2001 年提交给 W3C。UDDI 由结构化信息标准促进组织（OASIS）于 2000 年编写，旨在允许企业发布和发现\
  \ Web 服务。随着 SOAP、WSDL 和 UDDI 的到位，创建 Web 服务的事实标准已在主要 IT 公司的支持下诞生。\n\nJava 于 2002\
  \ 年 6 月通过基于 XML 的 RPC 1.0 的 Java API（JAX-RPC 1.0）引入了 Web 服务功能，并于 2003 年将 JAX-RPC\
  \ 1.1 添加到 J2EE 1.4 中。该规范非常冗长且不易使用。随着 Java EE 5 的到来，全新的基于 XML 的 Web 服务 2.0 的 Java\
  \ API（JAX-WS 2.0）规范被引入，作为首选的 Web 服务模型。如今，Java EE 6 随附了 JAX-WS 2.2。\n\n**Java EE\
  \ 规范**\n\n要掌握所有 Web 服务标准，您需要花些时间阅读来自 W3C、JCP 和 OASIS 的一系列规范。\n\nW3C 是一个开发和维护 Web\
  \ 技术（如 HTML、XHTML、RDF、CSS 等）的联盟，并且更有趣的是，它还负责 Web 服务相关的 XML、XML Schema、SOAP 和 WSDL。\n\
  \nOASIS 托管了多个 Web 服务相关标准，例如 UDDI、WS-Addressing、WS-Security、WS-Reliability 等。\n\n\
  回到 Java，JCP 拥有一系列属于 Java EE 6 和 Java SE 6 的规范。它们包括 JAX-WS（JSR 224）、Web Services\
  \ 1.2（JSR 109）、JAXB 2.2（JSR 222）、Web Services Metadata 2.0（JSR 181）和 JAXR 1.0（JSR\
  \ 93）。这些规范通常被非正式地统称为 Java Web 服务（JWS）。\n\n起初，这些规范列表可能会让您觉得用 Java 编写 Web 服务会很困难，尤其是在理解这些\
  \ API 方面。然而，\n\n第 14 章 ■ SOap WeB SerVICeS\n\n**397**\n\n其美妙之处在于，您无需担心底层技术（XML、WSDL、SOAP、HTTP\
  \ 等），因为仅需几个 JWS 标准就能为您完成工作。\n\n**JAX-WS 2.2**\n\nJAX-WS（JSR 224）是 JAX-RPC 的新名称。JAX-RPC\
  \ 已在 Java EE 6 中被精简，这意味着它提议从 Java EE 7 中移除。\n\nJAX-WS 2.2 定义了一组 API 和注解，允许您使用 Java\
  \ 构建和使用 Web 服务。它提供了消费者和服务设施，通过 SOAP 发送和接收 Web 服务请求，从而屏蔽了协议的复杂性。因此，消费者和服务都不需要生成或解析\
  \ SOAP 消息，因为 JAX-WS 处理了底层细节。JAX-WS 规范依赖于其他规范，例如用于 XML 绑定的 Java 架构（JAXB）。\n\n**Web\
  \ Services 1.2**\n\nJSR 109（“实现企业 Web 服务”）定义了 Java EE 容器中 Web 服务的编程模型和运行时行为。它还定义了打包方式，以确保\
  \ Web 服务在应用服务器实现之间的可移植性。\n\n**JAXB 2.2**\n\nWeb 服务通过交换 XML 消息来发送请求和响应。在 Java 中，有几种底层\
  \ API 用于处理 XML 文档和 XML Schema。JAXB 规范提供了一组 API 和注解，用于将 XML 文档表示为 Java 构件，允许开发人员使用代表\
  \ XML 文档的 Java 对象进行工作。JAXB（JSR 222）简化了将 XML 文档解组为对象以及将对象编组回 XML 文档的过程。即使 JAXB 可用于任何\
  \ XML 目的，它也与 JAX-WS 紧密集成。\n\n**WS-Metadata 2.0**\n\nWeb 服务元数据（WS-Metadata，规范 JSR\
  \ 181）提供了便于定义和部署 Web 服务的注解。JSR 181 的主要目标是简化 Web 服务的开发。它通过注解提供了 WSDL 与 Java 接口之间的映射功能，反之亦然。这些注解可以在简单的\
  \ Java 类或 EJB 中使用。\n\n\n\nJaXr 1.0\n\nJava XML 注册表 API（JAXR）规范定义了一套标准 API，允许 Java\
  \ 客户端访问 UDDI。与 JAX-RPC 类似，JAXR 是第二个被提议从下一版 Java EE 中移除的 Web 服务相关规范。如果该移除提议被采纳，JAXR\
  \ 仍将继续演进，但将脱离 Java EE 环境。\n\n**参考实现**\n\nMetro 并非 Java EE 规范，而是 Java Web 服务规范的开源参考实现。它包含\
  \ JAX-WS 和 JAXB，同时也支持\n\n**398**\n\n第 14 章 ■ SOAP Web 服务\n\n传统的 JAX-RPC API。它允许你创建和部署安全、可靠、支持事务且可互操作的\
  \ Web 服务及消费者。Metro 栈由 GlassFish 社区开发，但也可在 GlassFish 之外的 Java EE 或 Java SE 环境中使用。\n\
  \n**如何调用 Web 服务**\n\n尽管存在诸多规范、概念、标准和组织，编写和使用 Web 服务却非常简单。清单 14-1 展示了一个验证信用卡的 Web\
  \ 服务代码。\n\n**清单 14-1.** *CardValidator Web 服务*\n\n**@WebService**\n\npublic class\
  \ CardValidator {\n\npublic boolean validate(CreditCard creditCard) {\n\nString\
  \ lastDigit = creditCard.getNumber().substring(➥\n\ncreditCard.getNumber().length()\
  \ - 1, ➥\n\ncreditCard.getNumber().length());\n\nif (Integer.parseInt(lastDigit)\
  \ % 2 != 0) {\n\nreturn true;\n\n} else {\n\nreturn false;\n\n}\n\n}\n\n}\n\n与实体或\
  \ EJB 类似，Web 服务采用带“配置即异常”策略的注解式 POJO 模型。这意味着，如果所有默认设置都符合你的需求，Web 服务只需是一个标注了 @javax.jws.WebService\
  \ 的 Java 类。该 CardValidator Web 服务包含一个用于验证信用卡的方法。它接受一个信用卡对象作为参数，并根据卡是否有效返回 true 或\
  \ false。在此示例中，它假定奇数卡号有效，偶数卡号无效。\n\n消费者与 Web 服务之间交换的是 CreditCard 对象（见清单 14-2）。在描述\
