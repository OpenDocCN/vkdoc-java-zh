  \ 等）进行标注。该方法也可以提取到监听器类中，并被多个或所有实体使用（使用默认实体监听器）。通过回调方法，你可以看到实体不仅仅是贫血对象（没有业务逻辑，只有属性、getter\
  \ 和 setter 的对象）；实体可以包含业务逻辑，这些逻辑可以由应用程序中的其他对象调用，或者根据实体的生命周期由实体管理器自动调用。其他 Java EE\
  \ 6 组件，例如 EJB，也使用这类拦截器。\n\n第 6 章\n\n企业级 JavaBean\n\n\n\n**前**一章展示了如何使用 JPA 实现持久化对象以及如何用\
  \ JPQL 查询它们。持久化层是通过使用对象来开发的，这些对象借助注解封装其属性并将其映射到关系数据库。其理念是尽可能保持实体的透明性，避免将其与业务逻辑混杂在一起。实体可以拥有验证其属性的方法，但它们并非为表示复杂任务而设计，这些任务通常需要与其他组件（其他持久化对象、外部服务等）进行交互。\n\
  \n持久化层并非适合进行业务处理的层次。同样，用户界面也不应执行业务逻辑，尤其是在存在多种界面（Web、Swing、便携设备等）的情况下。为了将持久化层与表示层分离、实现业务逻辑、添加事务管理和安全性，应用程序需要一个业务层。在\
  \ Java EE 中，该层通过使用企业 JavaBean（EJB）来实现。\n\n对于大多数应用程序而言，分层至关重要。遵循自底向上的方法，之前关于 JPA\
  \ 的章节对领域类进行了建模，通常定义了名词（Artist、CD、Book、Customer 等）。在领域层之上，业务层对应用程序的动作（或动词）进行建模（创建一本书、购买一本书、打印订单、交付一本书等）。通常，这个业务层与外部\
  \ Web 服务（SOAP 或 RESTful Web 服务）交互，向其他系统发送异步消息（使用 JMS），或发送电子邮件；它协调从数据库到外部系统的多个组件，充当事务和安全划分的中心位置，以及任何类型客户端（如\
  \ Web 界面（servlet 或 JSF 托管 Bean）、批处理或外部系统）的入口点。\n\n本章是对 EJB 的介绍，接下来的三章将为你提供构建企业应用程序业务层所需的所有必要信息。将解释不同类型的\
  \ EJB；描述它们的生命周期，以及如何添加面向切面编程（AOP）功能并处理事务和安全性。\n\n**理解 EJB**\n\nEJB 是封装业务逻辑并处理事务和安全性的服务器端组件。它们还拥有用于消息传递、调度、远程访问、Web\
  \ 服务端点（SOAP 和 REST）、依赖注入、组件生命周期、带有拦截器的 AOP 等的集成栈。此外，EJB 与其他 Java SE 和 Java EE 技术无缝集成，例如\
  \ JDBC、JavaMail、JPA、Java 事务 API（JTA）、Java 消息服务（JMS）、Java 身份验证和授权服务（JAAS）、Java 命名和\n\
  \n**167**\n\n![Image 62](img/index-198_1.jpg)\n\n**168**\n\n第 6 章 ■ 企业 JavaBean\n\
  \n目录接口（JNDI）以及远程方法调用（RMI）。这就是为什么它们被用于构建业务层（见图 6-1），以位于持久化层之上，并作为表示层技术（如 JavaServer\
  \ Faces（JSF））的入口点。\n\n**图 6-1.** *架构分层*\n\nEJB 使用了一种非常强大的编程模型，它结合了易用性和健壮性。\n\n如今，EJB\
  \ 很可能是最简单的 Java 服务器端开发模型，在降低复杂性的同时，为关键任务型企业应用程序带来了可重用性和可扩展性。\n\n所有这些都源于对一个将被部署到容器中的普通\
  \ Java 对象（POJO）进行注解。EJB 容器是一个运行时环境，提供诸如事务管理、并发控制、池化和安全授权等服务。历史上，应用服务器还添加了其他功能，如集群、负载均衡和故障转移。\n\
  \nEJB 开发人员随后可以专注于实现业务逻辑，而容器则处理所有技术细节。\n\n如今，随着 3.1 版本的到来，EJB 比以往任何时候都更能做到一次编写，随处部署。\n\
  \n\n\n支持该规范的容器。标准 API、可移植的 JNDI 名称、轻量级组件以及异常配置，使得 EJB 能够轻松部署在开源及商业实现上。其底层技术诞生于 10\
  \ 多年前，这使得 EJB 应用程序受益于一个稳定、高质量的代码库，该代码库已在众多企业环境中长期使用。\n\n**EJB 的类型**\n\n由于企业应用程序可能很复杂，Java\
  \ EE 平台定义了多种类型的 EJB。从第 6 章到第 9 章，我将只关注会话 Bean 和定时器服务。\n\n会话 Bean 用于封装高级业务逻辑，这使其成为\
  \ EJB 技术中最重要的部分。一个会话 Bean 可能具有以下特征：\n\n• *无状态*：会话 Bean 在方法之间不包含会话状态，任何实例都可用于任何客户端。\n\
  \n第 6 章 ■ 企业 Java Bean\n\n**169**\n\n• *有状态*：会话 Bean 包含会话状态，该状态必须为单个用户跨方法保留。\n\n\
  • *单例*：单个会话 Bean 在客户端之间共享，并支持并发访问。\n\nEJB 定时器服务是 Java EE 中调度任务的标准方案。依赖基于日历通知的企业应用程序使用此服务来模拟工作流类型的业务流程。\n\
  \n消息驱动 Bean（MDB）用于通过使用 JMS 接收异步消息来与外部系统集成。尽管 MDB 是 EJB 规范的一部分，但我将单独处理它们（在第 13 章中），因为此组件模型主要用于与面向消息的中间件（MOM）集成系统。MDB\
  \ 通常将业务逻辑委托给会话 Bean。\n\nEJB 也可以用作 Web 服务端点。第 14 章和第 15 章演示了 SOAP 和 RESTful Web 服务，它们可以是部署在\
  \ Web 容器中的简单 POJO，也可以是部署在 EJB 容器中的会话 Bean。\n\n■**注意** 出于兼容性原因，EJB 3.1 规范仍然提及实体 Bean。这种持久化组件模型已被精简，并可能在\
  \ Java EE 7 中消失。JPA 是用于映射和查询关系数据库的首选技术。本书不涵盖实体 Bean。\n\n**EJB 的结构**\n\n会话 Bean 封装业务逻辑，支持事务，依赖于提供池化、多线程、安全等功能的容器。创建这样一个强大的组件需要哪些工件？一个\
  \ Java 类和一个注解，仅此而已。下一章将展示会话 Bean 可以更复杂；它们可以使用不同类型的接口、注解、XML 配置和拦截调用。清单 6-1 展示了容器识别一个类为会话\
  \ Bean 并应用所有企业服务是多么简单。\n\n**清单 6-1.** *一个简单的无状态 EJB*\n\n**@Stateless**\n\npublic\
  \ class BookEJB {\n\n@PersistenceContext(unitName = \"chapter06PU\")\n\nprivate\
  \ EntityManager em;\n\npublic Book findBookById(Long id) {\n\nreturn em.find(Book.class,\
  \ id);\n\n}\n\npublic Book createBook(Book book) {\n\nem.persist(book);\n\n**170**\n\
  \n第 6 章 ■ 企业 Java Bean\n\nreturn book;\n\n}\n\n}\n\nJ2EE 的早期版本要求开发人员创建多个工件才能创建一个会话\
  \ Bean：一个本地或远程接口（或两者）、一个本地 Home 或远程 Home 接口（或两者）以及一个部署描述符。Java EE 5 和 EJB 3.0 极大地简化了模型，以至于只需要一个类和一个或多个业务接口就足够了。EJB\
  \ 3.1 更进一步，它允许一个带注解的 POJO 成为会话 Bean。如清单 6-1 中的代码所示，该类没有实现任何接口，也不需要任何 XML 配置。只需一个注解就能将一个\
  \ Java 类转变为支持事务和安全的组件：@Stateless。然后，使用实体管理器（如前面章节所示），BookEJB 以简单而强大的方式从数据库创建和检索书籍。下一章将演示声明一个有状态\
  \ Bean 或单例 Bean 是多么容易。\n\n简单性也适用于客户端。调用此 BookEJB 上的方法只需要一个注解，即可使用依赖注入获得引用。依赖注入允许容器（客户端、Web\
  \ 或 EJB 容器）借助@EJB 注解自动注入对 EJB 的引用。在清单 6-2 中，Main 类通过使用@EJB 注解私有静态属性 bookEJB 来获取对\
  \ BookEJBRemote 的引用。如果 EJB 部署在容器中，则 Main 类需要远程访问该 EJB。为 EJB 添加一个简单的远程接口将赋予其远程访问能力。\n\
  \n**清单 6-2.** *一个调用无状态 EJB 的客户端类*\n\npublic class Main {\n\n**@EJB**\n\nprivate\
  \ static BookEJBRemote **bookEJB**;\n\npublic static void main(String[] args) {\n\
  \nBook book = new Book();\n\nbook.setTitle(\"银河系漫游指南\");\n\nbook.setPrice(12.5F);\n\
  \nbook.setDescription(\"道格拉斯·亚当斯创作的科幻小说\");\n\nbook.setIsbn(\"1-84023-742-2\");\n\
  \nbook.setNbOfPage(354);\n\n**bookEJB**.createBook(book);\n\n}\n\n}\n\n纯 Java 类与会话\
  \ Bean 之间的一个区别如清单 6-2 所示；即使代码相似，Main 类也不会使用 new 关键字创建 BookEJB 的实例；相反，该类在调用方法之前需要首先获取对\
  \ EJB 的引用，可以通过注入或 JNDI 查找。使用这种机制是因为 EJB 运行在托管环境中。它需要部署在容器中（嵌入式或非嵌入式）。\n\n与大多数 Java\
  \ EE 6 组件一样，EJB 需要元数据来通知容器所需操作（事务边界）或要注入的服务。元数据可以采用注解或 XML 的形式。EJB 可以使用可选的 ejb-jar.xml\
  \ 部署描述符进行部署，该描述符将覆盖注解。通过异常配置，单个注解就足以将 POJO 转变为 EJB，因为容器会应用所有默认行为。\n\n**EJB 容器**\n\
  \n如前所述，EJB 是服务器端组件，需要在容器中执行。此运行时环境提供了许多企业应用程序通用的核心功能，例如：\n\n• *远程客户端通信*：无需编写任何复杂代码，EJB\
  \ 客户端（另一个 EJB、用户界面、批处理进程等）即可通过标准协议远程调用方法。\n\n• *依赖注入*：容器可以将多种资源注入到 EJB 中（JMS 目标和工厂、数据源、其他\
  \ EJB、环境变量等）。\n\n• *状态管理*：对于有状态会话 Bean，容器透明地管理其状态。你可以为特定客户端维护状态，就像开发桌面应用程序一样。\n\n\
  • *池化*：对于无状态 Bean 和 MDB，容器会创建一个可由多个客户端共享的实例池。一旦被调用，EJB 会返回池中以备重用，而不是被销毁。\n\n• *组件生命周期*：容器负责管理每个组件的生命周期。\n\
  \n• *消息传递*：容器允许 MDB 监听目标并消费消息，而无需过多的 JMS 管道代码。\n\n• *事务管理*：通过声明式事务管理，EJB 可以使用注解通知容器它应使用的事务策略。容器负责提交或回滚。\n\
  \n• *安全性*：可以在 EJB 上指定类或方法级别的访问控制，以强制执行用户和角色身份验证。\n\n• *并发支持*：除了需要一些并发声明的单例 Bean\
  \ 外，所有其他类型的 EJB 本质上是线程安全的。你可以开发高性能应用程序，而无需担心线程问题。\n\n\n\n•   *拦截器*：横切关注点可以放入拦截器中，容器会自动调用它们。\n\
  •   *异步方法调用*：借助 EJB 3.1，现在无需涉及消息传递即可实现异步调用。\n\n一旦 EJB 部署完成，容器就会负责处理这些特性，让开发者能够专注于业务逻辑，同时无需添加任何系统级代码即可享受这些服务。\n\
  \nEJB 是受管理的对象。当客户端调用一个 EJB（如清单 6-2 所示）时，它并非直接与该 EJB 的实例交互，而是通过一个实例的代理进行交互。每次客户端调用\
  \ EJB 上的方法时，该调用实际上都会通过容器进行代理，容器会代表 Bean 实例提供服务。\n\n**172**\n\n第 6 章 ■ 企业级 Java Bean\n\
  \n当然，这对客户端来说是完全透明的；从创建到销毁，企业 Bean 都存在于容器之中。\n\n在 Java EE 应用程序中，EJB 容器通常会与其他容器交互：Servlet\
  \ 容器（负责管理 Servlet 和 JSF 页面的执行）、应用程序客户端容器（ACC，用于管理独立应用程序）、消息代理（用于发送、排队和接收消息）、持久化提供者等等。这些容器都将在应用服务器（如\
  \ GlassFish、JBoss、Weblogic 等）内部运行。应用服务器是特定于实现的，大多数都提供集群能力、可伸缩性、负载均衡、透明故障转移、管理、监控、缓存、池等功能。\n\
  \n**嵌入式容器**\n\n从创建的那一刻起，EJB 就必须在运行于独立 JVM 中的容器内执行。想想 GlassFish、JBoss、Weblogic 等，你会记得，在部署和使用你的\
  \ EJB 之前，需要先启动应用服务器。这在生产环境中是合适的，因为服务器需要持续运行，但在开发环境中却很耗时，例如，在开发环境中你经常需要为了调试目的而进行部署。服务器运行在不同进程中的另一个问题是，单元测试能力受限，并且如果不将\
  \ EJB 部署到正在运行的服务器中，就很难轻松运行单元测试。为了解决这些问题，一些应用服务器实现提供了嵌入式容器，但这些是特定于实现的。如今，EJB 3.1\
  \ 规范了一种可跨服务器移植的嵌入式容器。\n\n嵌入式容器的理念是能够在 Java SE 环境中执行 EJB 应用程序，允许客户端在同一个 JVM 和类加载器中运行。这为测试、离线处理（例如批处理）以及在桌面应用程序中使用\
  \ EJB 提供了更好的支持。可嵌入容器 API（在 `javax.ejb.embeddable` 中定义）提供了与 Java EE 运行时容器相同的受管理环境，并包含相同的服务：注入、组件环境访问、容器管理事务（CMT）等。\n\
  \n以下代码片段向你展示了如何创建可嵌入容器的实例、获取 JNDI 上下文、查找 EJB 以及调用方法：\n\n```java\nEJBContainer ec\
  \ = EJBContainer.createEJBContainer();\nContext ctx = ec.getContext();\nBookEJB\
  \ bookEJB = (BookEJB) ctx.lookup(\"java:global/BookEJB\");\nbookEJB.createBook(book);\n\
  ```\n\n在下一章中，你将看到如何使用引导 API 来启动容器并执行 EJB。\n\n**依赖注入与 JNDI**\n\nEJB 使用依赖注入来访问多种资源（其他\
  \ EJB、数据源、JMS 目的地、环境资源等）。在这种模型中，容器将数据推送到 Bean 中。如清单 6-2 所示，客户端通过 `@EJB` 注解注入一个 EJB\
  \ 的引用：\n\n```java\n@EJB\nprivate static BookEJB bookEJB;\n```\n\n第 6 章 ■ 企业级 Java\
  \ Bean\n\n**173**\n\n注入是在部署时进行的。如果数据有可能不会被使用，Bean 可以通过执行 JNDI 查找来避免资源注入的开销。JNDI\
  \ 是注入的一种替代方案；通过 JNDI，代码仅在需要时才拉取数据，而不是接受可能根本不需要的推送数据。\n\nJNDI 是一个用于访问不同类型目录服务的 API，允许客户端通过名称绑定和查找对象。JNDI\
  \ 在 Java SE 中定义，并且独立于底层实现，这意味着可以使用标准 API 在轻量级目录访问协议（LDAP）目录或域名系统（DNS）中查找对象。\n\n\
  上述代码的替代方案是使用 JNDI 的 `InitialContext` 并查找名为 `java:global/chapter06/BookEJB` 的已部署\
  \ EJB，如下所示：\n\n```java\nContext ctx = new InitialContext();\nBookEJB bookEJB = (BookEJB)\
  \ ctx.lookup(\"java:global/chapter06/BookEJB\");\n```\n\nJNDI 已经存在很长时间了。它的 API 是规范化的，并且可以跨应用服务器移植。但\
  \ JNDI 名称并非如此，它是特定于实现的。当在 GlassFish 或 JBoss 中部署 EJB 时，该 EJB 在目录服务中的名称是不同的，因此不可移植。客户端必须使用一个名称在\
  \ GlassFish 中查找 EJB，而使用另一个名称在 JBoss 中查找。借助 EJB 3.1，JNDI 名称已被规范化，因此代码可以移植。在前面的示例中，`java:global/chapter06/BookEJB`\
  \ 这个名称遵循新的命名约定：\n\n`java:global[/<app-name>]/<module-name>/<bean-name>[!<fully-qualified-interface-name>]`\n\
  \n下一章将展示如何使用这个可移植的名称来查找 EJB。\n\n**回调方法与拦截器**\n\n每种 EJB 类型（无状态、有状态、单例和 MDB）都有一个由容器管理的生命周期。EJB\
  \ 允许使用注解方法（`@PostConstruct`、`@PreDestroy` 等），类似于上一章中实体使用的回调方法，这些方法会在其生命周期的特定阶段由容器自动调用。这些方法可以初始化\
  \ Bean 上的状态信息、使用 JNDI 查找资源或释放数据库连接。\n\n对于任何横切关注点，开发者可以使用拦截器，它基于 AOP 模型，在该模型中，方法的调用会被自动包裹上额外的功能。\n\
  \nEJB 的生命周期、回调方法和拦截器将在第 8 章中解释（第 5 章侧重于 JPA 实体的生命周期）。\n\n**打包**\n\n与大多数 Java EE\
  \ 组件（Servlet、JSF 页面、Web 服务等）一样，EJB 在部署到运行时容器之前需要先进行打包。在同一个归档文件中，你通常会找到企业 Bean 类、其接口、拦截器、任何需要的超类或超接口、异常、辅助类以及可选的部署描述符（`ejb-jar.xml`）。\n\
  \n一旦这些工件被打包成一个 jar（Java 归档）文件，它们就可以直接部署到容器中。另一种选择是将 jar 文件嵌入到一个 ear（企业归档）文件中，然后部署该\
  \ ear 文件。\n\n![Image 63](img/index-204_1.jpg)\n\n**174**\n\n第 6 章 ■ 企业级 Java Bean\n\
  \nEar 文件用于将一个或多个模块（EJB 或 Web 应用程序）打包到单个归档文件中，以便能够同时且一致地部署到应用服务器中。例如，如图 6-2 所示，如果你需要部署一个\
  \ Web 应用程序，你可能希望将你的 EJB 和实体打包到单独的 jar 文件中，将你的 Servlet 打包到一个 war 文件中，然后将整个内容打包到一个\
  \ ear 文件中。将该 ear 文件部署到应用服务器中，你将能够使用 EJB 从 Servlet 操作实体。\n\n**图 6-2.** *打包 EJB*\n\
  \n\n\n自 EJB 3.1 起，EJB 也可以直接打包在 Web 模块（war 文件）中。在图 6-2 的右侧，Servlet、EJB 和实体都打包在同一个\
  \ war 文件中，并包含所有部署描述符。请注意，在 EJB 模块中，部署描述符存储在`META-INF/ejb-jar.xml`下，而在 Web 模块中则存储在`WEB-INF/ejb-jar.xml`下。\n\
  \n**EJB 规范概述**\n\nEJB 1.0 诞生于 1998 年，而 EJB 3.1 于 2009 年随 Java EE 6 一同发布。在这十年间，EJB\
  \ 规范经历了诸多变革，但依然保留了其成熟的基础。从重量级组件到带注解的 POJO，再到实体 Bean，又回归到 JPA，EJB 不断重塑自身以满足开发者和现代架构的需求。\n\
  \nEJB 3.1 规范比以往任何时候都更有助于避免供应商锁定，因为它提供了以前非标准化的功能（例如非标准的 JNDI 名称或嵌入式容器）。如今，EJB 3.1\
  \ 的便携性远超过去。\n\n**规范历史**\n\nJava 语言诞生后不久，业界就感到需要一种能够满足大规模应用程序需求的技术，该技术需融合 RMI 和 JTA。于是，创建分布式事务性业务组件框架的想法应运而生，IBM\
  \ 率先开始创建后来被称为 EJB 的技术。\n\nEJB 1.0 支持有状态和无状态会话 Bean，并可选择支持实体 Bean。其编程模型除了会话 Bean\
  \ 本身之外，还使用了 Home 接口和远程接口。EJB 通过一个提供远程访问（参数按值传递）的接口进行访问。\n\n■ 第 6 章 企业级 JavaBean\n\
  \n**175**\n\nEJB 1.1 强制要求支持实体 Bean，并引入了 XML 部署描述符来存储元数据（随后序列化为二进制文件）。该版本通过引入角色，为应用程序的组装和部署提供了更好的支持。\n\
  \n2001 年，EJB 2.0 成为首个由 JCP（作为 JSR 19）标准化的版本。它通过引入本地接口解决了按值传递参数的开销问题。在容器内运行的客户端通过本地接口（使用按引用传递的参数）访问\
  \ EJB，而在不同容器中运行的客户端则使用远程接口。该版本引入了 MDB，并且实体 Bean 获得了对关系以及查询语言（EJB QL）的支持。\n\n两年后，EJB\
  \ 2.1（JSR 153）增加了对 Web 服务的支持，允许通过 SOAP/HTTP 调用会话 Bean。还创建了一个定时器服务，允许在指定时间或时间间隔调用\
  \ EJB。\n\n从 EJB 2.1 到 EJB 3.0 相隔三年，这使得专家组得以重新设计整个架构。2006 年，EJB 3.0 规范（JSR 220）与之前的版本截然不同，它专注于易用性，使\
  \ EJB 看起来更像 POJO。实体 Bean 被一个全新的规范（JPA）所取代，会话 Bean 不再需要 Home 接口或特定于 EJB 的组件接口。依赖注入、拦截器和生命周期回调被引入。\n\
  \n2009 年，EJB 3.1 规范（JSR 318）随 Java EE 6 一同发布，它延续了上一版本的路线，进一步简化了编程模型并带来了新特性。\n\n\
  **EJB 3.1 的新特性**\n\nEJB 3.1 规范（JSR 318）带来了几项变化：JPA 不再是 EJB 规范的一部分，而是在一个独立的 JSR（JSR\
  \ 317）中演进；并且该规范本身被组织成两个不同的文档：\n\n•   *“EJB 核心契约与需求”*：规定 EJB 的主要文档\n•   *“拦截器需求”*：规定拦截器的文档\n\
  \n需要注意的是，该规范必须支持 EJB 2.*x*组件模型，这意味着规范中 600 页的内容涉及 Home 接口、实体 Bean、EJB QL 等。为了简化未来对该规范的采用，Java\
  \ EE 6 专家组编制了一份可能在将来移除的功能列表。以下功能实际上并未从 EJB 3.1 中移除，但下一个版本将不得不移除或保留其中一些：\n\n•   实体\
  \ Bean 2.*x*\n•   实体 Bean 2.*x*的客户端视图\n•   EJB QL（容器管理持久化的查询语言）\n•   基于 JAX-RPC\
  \ 的 Web 服务端点\n•   JAX-RPC Web 服务的客户端视图\n\n**176**\n\n■ 第 6 章 企业级 JavaBean\n\nEJB\
  \ 3.1 规范包含以下新功能和简化：\n\n•   *无接口视图*：具有本地视图的会话 Bean 可以在没有单独的本地业务接口的情况下被访问。\n•   *War\
  \ 部署*：现在可以直接在 war 文件中打包和部署 EJB 组件。\n•   *嵌入式容器*：提供了一种新的可嵌入 API，用于在 Java SE 环境中执行\
  \ EJB 组件（用于单元测试、批处理等）。\n•   *单例*：这种新型组件提供了对共享状态的便捷访问。\n•   *更丰富的定时器服务*：此功能允许自动创建\
  \ EJB 定时器和基于日历的表达式。\n•   *异步*：现在无需 MDB 即可进行异步调用。\n•   *EJB Lite*：此轻量级功能子集的定义可以在\
  \ Java EE Profile（例如 Java EE Web Profile）中提供。\n•   *可移植的 JNDI 名称*：现在指定了查找 EJB 组件的语法。\n\
  \n**EJB Lite**\n\n企业级 JavaBean 是 Java EE 6 中的主要组件模型，是进行事务性和安全性业务处理的最简单方法。然而，EJB\
  \ 3.1 仍然定义了旧的实体 Bean、Home 接口、EJB QL 等，这意味着任何实现 EJB 3.1 规范的新供应商都必须实现实体 Bean。刚开始接触\
  \ EJB 的开发人员也会被许多他们可能永远不会用到的技术所困扰。\n\n出于这些原因，该规范定义了完整 EJB API 的一个最小子集，称为 EJB Lite。它包含了一小部分强大且精选的\
  \ EJB 功能，适用于编写可移植的事务性和安全性业务逻辑。任何 EJB Lite 应用程序都可以部署在任何实现了 EJB 3.1 的 Java EE 产品上。EJB\
  \ Lite 由表 6-1 中列出的 EJB API 子集组成。\n\n**表 6-1.** *EJB Lite 与完整 EJB 的对比*\n\n**功能**\n\
