  \ `appclient` 实用程序，并将 jar 文件传递给它，如下所示：\n\n```bash\nappclient -client chapter14-consumer-1.0.jar\n\
  ```\n\n这将通过 HTTP 调用 Web 服务，并返回一个响应，告诉你信用卡是否有效。\n\n**总结**\n\n\n\nWeb 服务用于企业对企业（B2B）集成，是\
  \ SOA 的关键技术。亚马逊、eBay、谷歌、雅虎等众多公司都为其客户提供 Web 服务。许多组织也在内部大量使用 Web 服务。本章介绍了一些相关标准（UDDI、WSDL、SOAP、XML\
  \ 等），并重点介绍了涵盖这些标准的 Java EE 规范（JAX-WS、JAXB、WS-Metadata 等）。\n\nJava 架构用于 XML 绑定（JAXB）定义了一种将\
  \ Java 表示与 XML 相互绑定的标准。它基于注解，提供了高层次的抽象。\n\n即使 JAXB 可以用于任何类型的 Java 应用程序，它也非常适合 Web\
  \ 服务领域，因为任何交换的信息都是用 XML 编写的。\n\n在 JAXB 之后，我们研究了 WSDL 和 SOAP。这些规范对 Web 服务至关重要，因为它们分别描述了\
  \ Web 服务接口和交换的消息。\n\n抛开这些规范，JAX-WS 遵循一个简单的开发模型，并且\n\n仅使用一小部分注解来调整 Java 到 WSDL 的映射。因此，编写一个\
  \ Web 服务（Servlet 或 EJB 端点）或 Web 服务消费者，就如同编写带有可选部署描述符的简单注解 POJO 一样容易。\n\n本章以一个示例结尾，展示了如何编写一个\
  \ Web 服务，使用 Maven 编译和打包它，并使用`wsimport`工具生成消费者的构件。\n\n第 15 章\n\nRESTful Web 服务\n\n\
  **前**一章描述的 Web 服务栈（SOAP、WSDL、WS-*）在消息集成和 RPC 风格方面都提供了互操作性。随着 Web 2.0 的兴起，诸如 Rails\
  \ 之类的新 Web 框架涌现出来，一种新型的 Web 服务也日益流行：RESTful Web 服务。\n\n许多主要的 Web 参与者，如亚马逊、谷歌和雅虎，已经弃用了它们的\
  \ SOAP 服务，转而支持面向资源的 RESTful 服务。在 SOAP Web 服务和 RESTful Web 服务之间做出选择时，必须考虑许多因素。\n\n\
  表述性状态转移（REST）是一种基于 Web 工作原理创建的架构风格。将其应用于 Web 服务时，它试图将 Web 重新融入 Web 服务。要设计一个 RESTful\
  \ Web 服务，你需要了解超文本传输协议（HTTP）和统一资源标识符（URI），并遵循一些设计原则。你需要从资源的角度思考，以免违背 REST 的原则。\n\n\
  本章重点介绍 REST、其架构以及 HTTP 协议。在 Java EE 6 中，REST 已通过 Java API for RESTful Web Services（JAX-RS）进行了规范，本章将使用该规范。\n\
  \n**理解 RESTful Web 服务**\n\n在 REST 架构风格中，每条信息都是一个资源，这些资源通过统一资源标识符（URI）来寻址，通常是 Web\
  \ 上的链接。通过使用一组简单、定义良好的操作来对资源进行操作。REST 客户端-服务器架构风格旨在使用无状态通信协议，通常是 HTTP。在 REST 中，客户端和服务器使用定义的接口和协议交换资源的表示。这些原则促使\
  \ RESTful 应用程序简单、轻量且具有高性能。\n\n**资源**\n\n资源在 RESTful 架构中扮演着核心角色。资源是客户端可能想要引用或与之交互的任何事物，是任何值得在超链接中引用的信息片段。它可以存储在数据库、文件等中。尽可能避免将抽象概念暴露为资源；倾向于使用简单的对象。\n\
  \nCD-BookStore 应用程序中使用的一些资源可能是：\n\n*   Apress Java 书籍列表\n*   书籍 *The Definitive\
  \ Guide to Grails*\n*   Ola Bini 的简历\n\n**429**\n\n**430**\n\n第 15 章 ■ RESTful Web\
  \ 服务\n\n资源的其他示例可能是：\n\n*   2008 年里斯本的天气记录\n*   你的联系信息\n*   第 100 个斐波那契数\n*   事务管理器中当前正在运行的事务\n\
  *   Joe 和 Bill 共同拥有的朋友数量\n*   过去 24 小时内上传到 Flickr 的有趣照片\n*   2009 年 1 月 1 日上传到 Flickr\
  \ 的有趣照片\n\n**URI**\n\nWeb 上的资源由 URI 标识。URI 是资源的唯一标识符，由名称和指示资源所在位置的结构化地址组成。存在多种类型的\
  \ URI：WWW 地址、通用文档标识符、通用资源标识符，以及最终统一资源定位符（URL）和统一资源名称（URN）的组合。URI 的示例如下：\n\n*   [`www.apress.com/book/catalog`](http://www.apress.com/book/catalog)\n\
  *   [`www.apress.com/book/catalog/beginning-javaee6-cover.jpg`](http://www.apress.com/book/catalog/beginning-javaee6-cover.jpg)\n\
  *   [`www.apress.com/info/jobs`](http://www.apress.com/info/jobs)\n*   [`www.weather.com/weather/2008?location=Paris,France`](http://www.weather.com/weather/2008?location=Paris)\n\
  *   [`www.flickr.com/explore/interesting/2009/01/01`](http://www.flickr.com/explore/interesting/2009/01/01)\n\
  *   [`www.flickr.com/explore/interesting/24hours`](http://www.flickr.com/explore/interesting/24hours)\n\
  *   [`www.movies.com/catalog/titles/movies/123456`](http://www.movies.com/catalog/titles/movies/123456)\n\
  *   [`www.movies.com/categories/aventure`](http://www.movies.com/categories/aventure)\n\
  \nURI 应尽可能具有描述性，并应指向唯一的资源。请注意，标识不同资源的不同 URI 可能指向相同的数据。实际上，在某个时间点，2009 年 1 月 1 日上传到\
  \ Flickr 的有趣照片列表与过去 24 小时内上传的照片列表是相同的，但这两个相应 URI 所传达的信息并不相同。\n\n**表示**\n\n你可能希望以文本、XML、PDF\
  \ 文档或其他数据格式获取对象的表示。当客户端处理资源时，它总是通过其表示来进行；资源本身保留在服务器上。*表示*是关于资源状态的任何有用信息。例如，前面提到的\
  \ Java 书籍列表至少有两种表示：\n\n![Image 131](img/index-461_1.jpg)\n\n第 15 章 ■ RESTful Web\
  \ 服务\n\n**431**\n\n*   浏览器渲染的 HTML 页面：[`www.apress.com/book/`](http://www.apress.com/book/)catalog?category=32\n\
  *   下载用于计算书籍总数的逗号分隔值（CSV）文件：[`www.apress.com/resource/csv/bookcategory?cat=32`](http://www.apress.com/resource/csv/bookcategory?cat=32)\n\
  \n如何在给定资源的不同表示之间进行选择？有两种可能的解决方案。服务可以为每种表示公开一个 URI。Apress 网站对 Java 书籍列表就是这样做的。然而，这两个\
  \ URI 确实不同，并且似乎没有直接关联。以下是一组更简洁的 URI：\n\n*   [`www.apress.com/book/catalog/java`](http://www.apress.com/book/catalog/java)\n\
  *   [`www.apress.com/book/catalog/java.csv`](http://www.apress.com/book/catalog/java.csv)\n\
  *   [`www.apress.com/book/catalog/java.xml`](http://www.apress.com/book/catalog/java.xml)\n\
  \n第一个 URI 是资源的默认表示，其他表示则在其后附加格式扩展名：.csv（用于 text/csv）、.xml、.pdf 等。\n\n另一种解决方案是为所有表示公开一个单一的\
  \ URI（例如，[`www.`](http://www)apress.com/book/catalog/java），并依赖于一种称为*内容协商*的机制，我将在本章稍后更详细地讨论这一点。\n\
  \n**WADL**\n\n\n\n基于 SOAP 的服务依赖 WSDL 来描述特定 Web 服务可能请求的格式，而 Web 应用描述语言（WADL）则用于暴露与特定\
  \ RESTful Web 服务可能的交互方式。它简化了客户端开发，使客户端能够直接加载并与资源交互。本书不会涉及 WADL，因为它并非 REST 服务的强制要求，且并未被广泛使用。\n\
  \n**HTTP**\n\nHTTP 是一种用于分布式、协作式超媒体信息系统的协议，它与 URI、HTML 以及首批浏览器共同促成了万维网的建立。\n\nHTTP\
  \ 由万维网联盟（W3C）和互联网工程任务组（IETF）协调制定，是多个请求意见稿（RFC）的成果，特别是定义了 HTTP 1.1 的 RFC 216。HTTP\
  \ 基于客户端和服务器之间交换的请求和响应。\n\n请求与响应\n\n客户端向服务器发送请求，并期望得到应答（见图 15-1）。消息交换由信封和正文（也称为文档或表示）组成。\n\
  \n**图 15-1.** *HTTP 请求与响应*\n\n**432**\n\n第 15 章 ■ RESTful Web 服务\n\n例如，以下是发送给服务器的一种请求类型：\n\
  \n[$> curl -v http://www.apress.com/**book/catalog?category=32**](http://www.apress.com/book/catalog?category=32)\n\
  \n> **GET** /book/catalog?category=32 HTTP/1.1\n\n> User-Agent: curl/7.19.3 (i586-pc-mingw32msvc)\
  \ libcurl/7.19.3 zlib/1.2.3\n\n[> Host: www.apress.com](http://www.apress.com)\n\
  \n> Accept: */*\n\n此请求包含从客户端发送的几条信息：\n\n• HTTP 方法，此处为 GET\n• 路径，此处为/book/catalog?category=32\n\
  • 其他几个请求头\n\n请注意，此请求没有正文部分。实际上，GET 请求永远不会有正文。针对该请求，服务器将发送以下响应：\n\n< HTTP/1.1 **200\
  \ OK**\n< **Date**: Mon, 23 Feb 2009 07:28:09 GMT\n< **Server**: Apache/2.0.63 (Unix)\
  \ PHP/5.2.6\n< X-Powered-By: PHP/5.2.6\n< Set-Cookie: PHPSESSID=b9ae64b800781d9761670fcf6067a317;\
  \ path=/\n< Expires: Thu, 19 Nov 1981 08:52:00 GMT\n< Cache-Control: no-store, no-cache,\
  \ must-revalidate, post-check=0, pre-check=0\n< Pragma: no-cache\n< Transfer-Encoding:\
  \ chunked\n< **Content-Type**: text/html\n\n<!DOCTYPE HTML PUBLIC \"-//W3C//DTD\
  \ HTML 4.01 Transitional//EN\">\n<html>\n<head>\n<title>\n...\n\n此响应由以下部分组成：\n\n\
  • *响应码*：在此例中，响应码为 200 OK。\n• *多个响应头*：在上述代码中，响应头包括 Date、Server、Content-Type。此处内容类型为\
  \ text/html，但也可以是任何其他媒体类型，例如 XML（application/xml）或图像（image/jpeg）。\n• *实体正文或表示*：在此示例中，返回网页的内容即为实体正文（此处仅展示了\
  \ HTML 页面的一部分）。\n\n第 15 章 ■ RESTful Web 服务\n\n**433**\n\n■**注意** 此处我使用 cURL（[`curl.haxx.se/）作为客户端，但也可以使用\
  \ Firefox 或任何其他处理 HTTP 请求的 Web 客户端。cURL 是一个命令行工具，用于通过 URL 语法，经由 HTTP、FTP、Gopher、SFTP、FTPS、SCP、TFTP\
  \ 等多种协议传输文件。您可以发送 HTTP 命令、更改 HTTP 头等。它是模拟用户在 Web 浏览器中操作的良好工具。`](http://curl.haxx.se/)\n\
  \nHTTP 方法\n\nWeb 由标识清晰的资源组成，这些资源相互链接，并通过简单的 HTTP 请求进行访问。HTTP 中标准化的主要请求类型有 GET、POST、PUT、DELETE。这些被称为动词或方法。HTTP\
  \ 还定义了另外四种较少使用的动词：HEAD、TRACE、OPTIONS、CONNECT。\n\n**GET**\n\nGET 是一种简单的读取操作，用于请求资源的表示。GET\
  \ 应以安全的方式实现，这意味着它不应改变资源的状态。此外，GET 必须是幂等的，这意味着无论调用一次、两次还是更多次，它都必须使资源保持相同的状态。安全性和幂等性带来了更高的稳定性。当客户端未收到响应（例如，由于网络故障）时，它可能会重新发送请求，而这些新请求将期望得到原本应收到的相同应答，而不会破坏服务器上的资源状态。\n\
  \n**POST**\n\n给定一个表示（文本、XML 等），POST 会创建一个新资源，作为由请求 URI 标识的主资源的从属资源。POST 的示例可以是将消息追加到日志文件、向博客添加评论、向书单添加书籍等。因此，POST\
  \ 既不是安全的（资源状态被更新），也不是幂等的（发送两次请求将导致创建两个新的从属资源）。如果在源服务器上创建了资源，响应状态应为 201（已创建）。大多数现代浏览器仅生成\
  \ GET 和 POST 请求。\n\n**PUT**\n\nPUT 请求旨在更新存储在给定 URI 下的资源状态。如果请求 URI 指向一个不存在的资源，则将在同一\
  \ URI 下创建该资源。PUT 不是安全的（因为资源状态会被更新），但它是幂等的：您可以多次发送相同的 PUT 请求，最终资源状态将始终保持一致。\n\n**DELETE**\n\
  \nDELETE 请求用于删除资源。对 DELETE 的响应可以是正文中包含的状态消息，也可以完全没有状态。DELETE 也是幂等的，但不安全。\n\n**434**\n\
  \n第 15 章 ■ RESTful Web 服务\n\n**其他方法**\n\n如前所述，还存在其他 HTTP 动作，尽管它们使用较少：\n\n• HEAD\
  \ 与 GET 相同，只是服务器在响应中不返回消息正文。HEAD 可能有助于检查链接的有效性或实体的大小，而无需传输实体本身。\n• TRACE 会回显接收到的请求。\n\
  • OPTIONS 表示对由 URI 标识的请求/响应链上可用通信选项信息的请求。此方法允许客户端确定与资源关联的选项和/或要求，或服务器的能力，而无需执行资源操作或启动资源检索。\n\
  • CONNECT 与能够动态切换为隧道（一种 HTTP 协议作为各种网络协议包装器的技术）的代理结合使用。\n\n内容协商\n\n内容协商在 HTTP 标准第\
  \ 12 节中有所描述，被定义为“当存在多个可用表示时，为给定响应选择最佳表示的过程”。客户端的需求、期望和能力各不相同；对于日本移动设备用户的最佳表示，可能并非美国订阅源阅读器应用程序的最佳选择。\n\
  \n内容协商基于（但不限于）HTTP 请求头 Accept、Accept-Charset、Accept-Encoding、Accept-Language 和 User-Agent。例如，要获取\
  \ Apress Java 书籍的 CSV 表示，客户端应用程序（用户代理）将请求[`www.apress.com/book/catalog/java`](http://www.apress.com/book/catalog/java)，并将\
  \ Accept 头设置为 text/csv。您也可以想象，基于 Accept-Language 头，CSV 文档的内容可能会被服务器翻译成相应的语言。\n\n\
  内容类型\n\n\n\nHTTP 在 Content-Type 和 Accept 头部字段中使用互联网媒体类型（最初称为 MIME 类型），以提供开放且可扩展的数据类型定义和类型协商。互联网媒体类型分为五个独立的高级类别：文本（text）、图像（image）、音频（audio）、视频（video）和应用程序（application）。这些类型进一步细分为多个子类型（如\
  \ text/plain、text/xml、text/xhtml 等）。以下是一些最常见的公共内容类型：\n\n• text/html：HTML 自 1990\
  \ 年起便用于万维网信息基础设施，并在各种非正式文档中进行了规范。text/html 媒体类型于 1995 年由 IETF HTML 工作组首次正式定义。有关该媒体类型的完整定义，请参阅\
  \ RFC 2854。\n\n• text/plain：这是默认的内容类型，用于简单的文本消息。\n\n• image/gif、image/jpeg、image/png：此图像顶级媒体类型需要显示设备（例如图形显示器、图形打印机等）来查看信息。\n\
  \n第 15 章 ■ RESTful Web 服务\n\n**435**\n\n• text/xml、application/xml：W3C 于 1998 年\
  \ 2 月发布了可扩展标记语言（XML）1.0。有关该媒体类型的完整定义，请参阅 RFC 3023。\n\n• application/json：JavaScript\
  \ 对象表示法（JSON）是一种独立于编程语言的轻量级数据交换文本格式。\n\n状态码\n\n每次收到响应时，都会关联一个 HTTP 状态码。规范定义了大约 60\
  \ 个状态码。Status-Code 元素是一个三位整数，用于描述响应的上下文，并且是响应信封的一部分。第一位数字指定了五类响应之一：\n\n• *1xx*：信息性。请求已收到，处理正在进行中。\n\
  \n• *2xx*：成功。操作已成功接收、理解并接受。\n\n• *3xx*：重定向。需要采取进一步操作才能完成请求。\n\n• *4xx*：客户端错误。请求包含错误的语法或无法完成。\n\
  \n• *5xx*：服务器错误。服务器未能完成一个看似有效的请求。\n\n以下是一些您可能已经遇到过的状态码：\n\n• *200 OK*：请求已成功。实体主体（如果有）包含资源的表示形式。\n\
  \n• *301 Moved Permanently*：请求的资源已被分配一个新的永久 URI，并且将来对该资源的任何引用都应使用返回的 URI 之一。\n\n\
  • *404 Not Found*：服务器未找到与请求 URI 匹配的任何内容。\n\n• *500 Internal Server Error*：服务器遇到意外情况，导致无法完成请求。\n\
  \n缓存与条件请求\n\n在大多数分布式系统中，缓存至关重要。缓存旨在通过避免不必要的请求或减少响应中的数据量来提高性能。HTTP 提供了允许缓存并确保缓存数据正确的机制。但如果客户端决定不使用任何缓存机制，即使资源自上次请求以来未被修改，它也需要始终请求数据。\n\
  \n当发送对 GET 请求的响应时，它可以包含一个 Last-Modified 头部，指示资源最后被修改的时间。下次用户代理请求此资源时，它会在 If-Modified-Since\
  \ 头部中传递此日期。Web 服务器（或代理）会将此日期与最新的修改日期进行比较。如果用户代理发送的日期等于或更新，则返回一个 304 Not Modified\
  \ 状态码，且不带响应体。否则，执行或转发请求的操作。\n\n![Image 132](img/index-466_1.jpg)\n\n**436**\n\n\
  第 15 章 ■ RESTful Web 服务\n\n但是，日期可能难以操作，并且意味着所有交互的代理必须保持同步。ETag 响应头部解决了这个问题。理解 ETag\
  \ 最简单的方式是将其视为表示形式中所有字节的 MD5 或 SHA1 哈希值；如果表示形式中仅有一个字节发生变化，ETag 也会改变。在 GET 响应中收到的\
  \ ETag 值可以在后续的 If-Match 请求头部中设置。\n\n图 15-2 给出了如何使用 ETag 的示例。要获取图书资源，您使用 GET 操作并提供资源的\
  \ URI（GET /book/12345）。服务器将返回一个响应，其中包含图书的 XML 表示形式、200 OK 状态码以及生成的 ETag。当您第二次请求同一资源时，如果您在请求中传递了\
  \ ETag 值，服务器将不会发送资源的表示形式，而是返回一个 304 Not Modified 状态码，告知客户端自上次访问以来资源未发生变化。\n\n**图\
  \ 15-2.** *使用缓存和 304 Not Modified 状态码*\n\n使用 HTTP 头部 If-Modified-Since、If-Unmodified-Since、If-Match、If-None-Match\
  \ 和 If-Range 的请求被称为条件请求。条件请求可以通过避免不必要的往返或数据传输来节省带宽和 CPU（在服务器和客户端两侧）。If-* 头部最常用于\
  \ GET 和 PUT 请求。\n\n**RESTful Web 服务规范**\n\n与依赖 W3C 标准的 SOAP 和 WS-* 堆栈相反，REST 没有标准，只是一种具有设计准则的架构风格。REST\
  \ 应用程序在很大程度上依赖于许多其他标准：\n\n• HTTP\n\n• URI、URL\n\n• XML、JSON、HTML、GIF、JPEG 等（资源表示形式）\n\
  \nJava 方面已通过 JAX-RS 进行了规范，但 REST 更像是一种设计模式：一种可被多种语言实现的、针对常见问题的可重用解决方案。\n\n**REST\
  \ 简史**\n\nREST 一词最早由 Roy Thomas Fielding 在其博士论文《架构风格与基于网络的软件架构设计》（Architectural\
  \ Styles and the Design of Network-based Software Architectures）第五章中提出（加州大学尔湾分校，2000\
  \ 年，[`www.ics.uci.edu/~fielding/pubs/dissertation/top.htm）。`](http://www.ics.uci.edu/~fielding/pubs/dissertation/top.htm)\n\
  \n该论文是对用于开发 Web 的架构的回顾性解释。\n\n第 15 章 ■ RESTful Web 服务\n\n**437**\n\n在他的论文中，Fielding\
  \ 审视了万维网中运行良好的部分，并提取了设计原则，这些原则可以使任何其他分布式超媒体系统（无论是否与 Web 相关）同样高效。\n\n开发 REST 的最初动机是为\
  \ Web 创建一个架构模型。Roy T. Fielding 也是 HTTP 规范的作者之一，因此 HTTP 非常符合他在论文中描述的架构设计也就不足为奇了。\n\
  \n**JAX-RS 1.1**\n\n要编写 RESTful Web 服务，您只需要一个支持 HTTP 的客户端和服务器。任何浏览器和 HTTP Servlet\
  \ 容器都可以完成这项工作，但代价是需要一些 XML 配置和胶水代码的麻烦。最终，这些代码可能难以阅读和维护。这时，JAX-RS 就派上了用场。JAX-RS 规范的第一个版本于\
  \ 2008 年 10 月最终确定，它定义了一组促进 REST 架构风格的 API。它是 RESTful Web 服务的 JCP 标准（JSR 311）。通过注解，它简化了\
  \ RESTful Web 服务的实现并提高了生产力。该规范仅涵盖 REST 的服务器端方面。\n\n**JAX-RS 1.1 的新特性是什么？**\n\nJAX-RS\
  \ 1.1 是一个维护版本，专注于与 Java EE 6 及其新特性的集成。JAX-RS 1.1 的主要新特性如下：\n\n• 它提供了对无状态会话 Bean\
  \ 作为根资源的支持。\n\n• 允许将外部资源（持久化管理器、数据源、EJB 等）注入到 REST 资源中。\n\n• JAX-RS 注解可以应用于 Bean\
  \ 的本地接口，或直接应用于无接口 Bean。\n\n\n**参考实现**\n\nJersey 是 Sun 公司对 JAX-RS 的官方参考实现。它是一个采用\
  \ CDDL 和 GPL 双许可证的开源项目。Jersey 可通过其 API 进行扩展，并且还提供了一个客户端 API（该 API 不在规范覆盖范围内）。\n\n\
  JAX-RS 的其他实现也可用，例如 CXF（Apache）、RESTEasy（JBoss）以及 Restlet（一个在 JAX-RS 最终确定之前就已存在的资深项目）。\n\
  \n**REST 方法**\n\n如前所述，REST 是一套基于 HTTP 的通用设计约束。然而，本章重点讨论 Web 服务，由于 REST 源自 Web，在探讨驱动\
  \ Web 的原理之前，我将先从现实生活中的网页浏览体验开始。Web 已成为信息的主要来源，是我们日常工具集的一部分。你可能对它非常熟悉，这种熟悉感应该有助于你理解\
  \ REST 的概念和特性。\n\n**438**\n\n第 15 章 ■ RESTful Web 服务\n\n**从 Web 到 Web 服务**\n\n我们知道\
  \ Web 是如何工作的，那么为什么 Web 服务要表现得不同呢？毕竟，服务也经常交换唯一标识的资源，这些资源像超链接一样相互关联。Web 架构多年来已经证明了其可扩展性；为什么要重新发明轮子呢？\n\
  \n要创建、更新和删除一个图书资源，为什么不使用常见的 HTTP 动词呢？例如：\n\n*   使用 POST 方法向数据（XML、JSON 或文本格式）发送请求，以**创建**\
  \ URI 为 [`www.apress.com/books/`](http://www.apress.com/books/) 的图书资源。创建成功后，响应会返回新资源的\
  \ URI：[`www.apress.com/books/123456。`](http://www.apress.com/books/123456)\n*  \
  \ 使用 GET 方法**读取**位于 [`www.apress.com/books/123456`](http://www.apress.com/books/123456)\
  \ 的资源（以及实体主体中可能指向其他资源的链接）。\n*   使用 PUT 方法向数据发送请求，以**更新**位于 [`www.apress.com/books/123456`](http://www.apress.com/books/123456)\
  \ 的图书资源。\n*   使用 DELETE 方法**删除**位于 [`www.apress.com/books/123456`](http://www.apress.com/books/123456)\
  \ 的资源。\n\n通过使用 HTTP 动词，我们可以对一个资源执行所有可能的创建、读取、更新、删除（CRUD）操作。\n\n**一次网页浏览体验**\n\n\
  你如何操作才能找到 Apress 的 Java 技术书籍列表？你将浏览器指向 Apress 网站：[`www.apress.com。`](http://www.apress.com)\
  \ 尽管这个页面很可能不包含你正在寻找的确切信息，但你期望它能以某种方式让你访问到 Java 书籍列表。首页提供了一个搜索所有 Apress 书籍的搜索引擎，但还有一个按技术分类的书籍目录。点击\
  \ Java 节点，超媒体的魔力就显现了：这里是 Apress Java 书籍的完整列表。实际上，这是一个相当长的列表，虽然未提供具体数量，但指向 CSV 格式的链接以及你的命令行技能可以在几个时钟周期内完成计算（Java\
  \ 类别下有 144 本书）：\n\n[curl http://www.apress.com/resource/csv/bookcategory?cat=32\
  \ |](http://www.apress.com/resource/csv/bookcategory?cat=32) ➥\nsed -n 2~1p | wc\
  \ -l\n\n(..)\n\n假设你将链接保存在你最喜欢的书签管理器中，在浏览书籍列表时，Graeme Rocher 和 Jeff Brown 合著的 *《Grails\
  \ 权威指南，第二版》* 吸引了你的注意。书籍标题上的超链接将你带到书籍页面，在那里你可以阅读摘要、作者简介等，并且你注意到“相关书籍”部分列出的一本书可能对你当前的项目同样有价值。你想将\
  \ Graeme Rocher 的书与 Ola Bini 的 *《实用 JRuby on Rails Web 2.0 项目：将 Ruby on Rails 引入\
  \ Java》* 进行比较。Apress 的书籍页面以在线预览的形式让你能更具体地了解书籍内容：打开预览，浏览目录，然后做出选择。\n\n这就是我们日常使用浏览器所做的事情。REST\
  \ 将相同的原则应用于你的服务，其中书籍、搜索结果、目录或书籍封面都可以被定义为资源。\n\n第 15 章 ■ RESTful Web 服务\n\n**439**\n\
  \n**统一接口**\n\n使架构成为 RESTful 的主要约束之一，是使用统一接口来管理你的资源。选择任何适合你的接口，但在整个系统中，从资源到资源，从服务到服务，都要以相同的方式使用它。切勿偏离它或改变其原始含义。通过使用统一接口，“整体系统架构得以简化，交互的可见性得到提升”（Roy\
  \ Thomas Fielding，*《架构风格与基于网络的软件架构设计》*）。你的服务将成为使用完全相同语义的服务社区的一部分。\n\n事实上的 Web 协议是\
  \ HTTP，它是一种基于文档的、标准化的客户端与服务器之间的请求/响应协议。HTTP 是 RESTful Web 服务的统一接口。基于 SOAP、WSDL 和其他\
  \ WS-* 标准构建的 Web 服务也使用 HTTP 作为传输层，但它们只利用了 HTTP 的极少部分能力。你必须通过分析 WSDL 来发现服务的语义，然后调用正确的方法。RESTful\
  \ Web 服务拥有统一的接口（HTTP 动词和 URI），因此一旦你知道资源在哪里（URI），就可以调用 HTTP 动词（GET、POST 等）。\n\n除了熟悉性之外，统一接口还促进了应用程序之间的互操作性；HTTP\
  \ 被广泛支持，大量的 HTTP 客户端库保证了你无需处理通信问题。\n\n**可寻址性**\n\n设计 RESTful Web 服务时要遵循的第二个原则是可寻址性。你的\
  \ Web 服务应使你的应用程序尽可能可寻址，这意味着应用程序中每一个有价值的信息片段都应该是一个资源，并拥有一个 URI，使得该资源易于访问。这是你需要发布的唯一数据，以使资源可访问，这样你的业务伙伴就不需要为了访问该资源而进行猜测。\n\
  \n例如，你在处理应用程序中的一个 bug，你的调查将你引向类 `CreditCardValidator.java` 的第 42 行，认为这是 bug 发生的地方。由于你不负责应用程序的这个领域，你想提交一个问题，以便有资格的人来处理它。你如何向她指出有问题的代码行？你可以说“转到\
  \ `CreditCardValidator` 类的第 42 行”，或者，如果你的源代码可以通过仓库浏览器寻址，你可以在 bug 报告中保存该行本身的 URI。\n\
  \n这引出了在你的应用程序中定义 RESTful 资源粒度的问题：它可以是行级别、方法级别、类级别等等。\n\n唯一的 URI 使你的资源可链接，并且由于它们通过统一接口暴露，每个人都知道如何与它们交互，从而允许人们以你从未想象过的方式使用你的应用程序。\n\
  \n**连通性**\n\n在图论中，如果一个图中的每一对不同顶点都能通过某条路径连接起来，则该图被称为连通图。如果对于每一对顶点 u、v，都存在一条从 u 到\
  \ v 的直接路径和一条从 v 到 u 的直接路径，则称该图是强连通的。REST 主张资源应尽可能连通。正如现在著名的表述：“超媒体作为应用状态的引擎。”\n\n\
  **440**\n\n第 15 章 ■ RESTful Web 服务\n\n再次强调，这个令人生畏的表述源于对 Web 成功经验的审视。Web 页面嵌入链接，以逻辑流畅的方式在页面间导航。\n\
  \n\n\n因此，网络具有极佳的连通性。如果两个资源之间存在强关联，它们就应该被连接起来。REST 指出，Web 服务也应利用超媒体来告知客户端有哪些可用资源以及如何访问，从而提升服务的可发现性。从一个单一的\
  \ URI 出发，访问一个连接良好的 Web 服务的用户代理就能发现所有可用的操作、资源及其各种表现形式等。\n\n例如，当用户代理查找一张 CD 的表现形式（见清单\
  \ 15-1）时，该表现形式不仅可以包含艺术家的名字，还可以包含指向其传记的链接或 URI。是否实际获取该传记则由用户代理决定。该表现形式还可以链接到资源的其他表现形式或可用操作。\n\
  \n**清单 15-1.** *一个连接到其他服务的 CD 表现形式*\n\n<cd>\n\n<title>Ella and Louis</title>\n\n\
  [<year ref='http://music.com/year/1956'>1956</year>](http://music.com/year/1956)\n\
  \n[<artist ref='http://music.com/artists/123'>Ella Fitzgerald</artist>](http://music.com/artists/123)\n\
  \n[<artist ref='http://music.com/artists/456'>Louis Armstrong</artist>](http://music.com/artists/456)\n\
  \n<link rel=\"self\" type=\"text/json\"\n\n[href=\"http://music.com/album/789\"\
  />](http://music.com/album/789)\n\n<link rel=\"self\" type=\"text/xml\"\n\n[href=\"\
  http://music.com/album/789\"/>](http://music.com/album/789)\n\n[<link rel=\"http://music.com/album/comments\"\
  \ type=\"text/xml\"](http://music.com/album/comments)\n\n[href=\"http://music.com/album/789/comments\"\
  />](http://music.com/album/789/comments)\n\n</cd>\n\n超媒体原则的另一个关键方面是应用程序的状态，该状态必须由超媒体来引导。简而言之，Web\
  \ 服务提供一组链接这一事实，使得客户端只需通过点击链接，就能将应用程序从一个状态转移到下一个状态。\n\n在前面的 XML 片段中，客户端可以通过对专辑发表评论来改变应用程序的状态。专辑的评论列表是一个可通过\
  \ URI [`music.com/album/789/comments`](http://music.com/album/789/comments) 寻址的资源。由于此\
  \ Web 服务使用了统一接口，一旦客户端知道了 URI 格式、可用的内容类型和数据格式，它就会确切地知道如何与之交互：GET 请求将检索现有评论列表，POST\
  \ 请求将创建一条新评论，等等。从这个单一的初始请求开始，客户端可以执行许多操作：超媒体驱动着应用程序的状态。\n\n**无状态性**\n\nREST 的最后一个特性是无状态性，这意味着每个\
  \ HTTP 请求都是完全独立发生的，服务器绝不应跟踪已执行的请求。为清晰起见，通常将资源状态和应用程序状态区分开来。资源状态必须存在于服务器端，并由所有用户共享；而应用程序状态必须保留在客户端，是其专有财产。回到清单\
  \ 15-1 的例子，应用程序状态是客户端已获取了专辑 *Ella and Louis* 的一个表现形式，但服务器不应保留此信息。资源状态是专辑信息本身；服务器显然需要维护此信息。客户端可以更改资源状态。如果购物车是一个仅限单个客户端访问的资源，那么应用程序需要在客户端会话中跟踪购物车\
  \ ID。\n\n无状态性带来了许多优势，例如更好的可伸缩性：无需处理会话信息，无需将后续请求路由到同一台服务器，易于处理故障等。如果需要保持状态，客户端必须做额外的工作来存储它。\n\
  \n**用于 RESTful Web 服务的 Java API**\n\n一些底层概念（例如 HTTP 协议）可能会让你想知道在开发资源时代码会是什么样子；你无需编写管道代码来解析\
  \ HTTP 请求，也无需手动创建 HTTP 响应。JAX-RS 是一个非常优雅的 API，它允许你仅用几个注解就能描述一个资源。资源是至少有一个方法使用 `@javax.ws.rs.Path`\
  \ 注解的 POJO。清单 15-2 展示了一个典型的资源。\n\n**清单 15-2.** *一个简单的图书资源*\n\n**@Path**(\"/book\"\
  )\n\npublic class BookResource {\n\n**@GET**\n\n**@Produces**(\"text/plain\")\n\n\
  public String getBookTitle() {\n\nreturn \"H2G2\";\n\n}\n\n}\n\nBookResource 是一个使用\
  \ @Path 注解的 Java 类，表明该资源将托管在 URI 路径 /book 上。getBookTitle() 方法被标记为处理 HTTP GET 请求（使用\
  \ @GET 注解）并生成文本（内容由 MIME 媒体类型 text/plain 标识）。要访问此资源，你需要一个 HTTP 客户端（如浏览器）并使用 HTTP\
  \ GET 方法指向 URL [`www.myserver.com/book`](http://www.myserver.com/book)。\n\n由于使用\
  \ JAX-RS 编写资源很容易，让我们进一步探索 JAX-RS API。\n\n**JAX-RS 模型**\n\n从清单 15-2 可以看出，REST 服务既没有实现任何接口，也没有继承任何类；将\
  \ POJO 转变为 REST 服务唯一必需的注解是 @Path。JAX-RS 依赖于“例外配置”原则，因此它有一套注解来配置默认行为。以下是编写 REST 服务的要求：\n\
  \n*   类必须使用 @javax.ws.rs.Path 注解。\n*   要为 REST 服务添加 EJB 功能，类必须使用 @javax.ejb.Stateless\
  \ 注解。\n*   类必须定义为 public，并且不能是 final 或 abstract。\n*   根资源类（带有 @Path 注解的类）必须有一个默认的公共构造函数。非根资源类不需要这样的构造函数。\n\
  *   类不能定义 finalize() 方法。\n\nJAX-RS 本质上是围绕 HTTP 的，并有一套清晰定义的类和注解来处理 HTTP 和 URI。一个资源可以有多种表现形式，因此该\
  \ API 支持多种内容类型，并使用 JAXB 将 XML 和 JSON 表现形式编组和解组为对象。JAX-RS 也与容器无关，因此资源不仅可以部署在 GlassFish\
  \ 中，还可以部署在各种 Servlet 容器中。\n\n**如何编写 REST 服务**\n\nREST 服务可以是无状态会话 Bean，允许对持久层（JPA\
  \ 实体）进行事务性访问，如清单 15-3 所示。\n\n**清单 15-3.** *一个从数据库创建和检索图书的图书资源*\n\n@Path(\"books\"\
  )\n\n**@Stateless**\n\n**@Produces**({\"application/xml\", \"application/json\"\
  })\n\n**@Consumes**({\"application/xml\", \"application/json\"})\n\npublic class\
  \ BookResource {\n\n@Context\n\nprivate UriInfo uriInfo;\n\n@PersistenceContext(unitName\
  \ = \"chapter15PU\")\n\nprivate EntityManager em;\n\n**@GET**\n\npublic List<Book>\
  \ **getAllBooks**() {\n\nQuery query = em.createNamedQuery(\"findAllBooks\");\n\n\
  List<Book> books = query.getResultList();\n\nreturn books;\n\n}\n\n**@POST**\n\n\
  public Response **createNewBook**(JAXBElement<Book> bookJaxb) {\n\nBook book = bookJaxb.getValue();\n\
  \nem.persist(book);\n\nURI bookUri = uriInfo.getAbsolutePathBuilder().path(➥\n\n\
  book.getId().toString()).build();\n\nreturn Response.created(bookUri).build();\n\
  \n}\n\n}\n\n清单 15-3 中的代码代表了一个 REST 服务，它可以消费和生成图书的 XML 和 JSON 表现形式。getAllBooks()\
  \ 方法从数据库中检索图书列表，并返回该列表的 XML 或 JSON 表现形式（使用内容协商），可通过 GET 方法访问。createNewBook() 方法接收图书的\
  \ XML 或 JSON 表现形式，并将其持久化到数据库中。此方法通过 HTTP POST 调用，并返回新创建图书的 URI，遵循非常简单的 JAX-RS 模式。\n\
  \n\n\n模型和一组强大的注解。\n\n**URI 定义**\n\n@Path 注解的值是一个相对 URI 路径。当用于类时，这些类被称为*根资源*，提供资源树的根节点以及对子资源的访问。\n\
  \n**@Path**(\"/customers\")\n\npublic class CustomersResource {\n\n@GET\n\npublic\
  \ List getCustomers() {\n\n// ...\n\n}\n\n}\n\n你还可以使用 URI 路径模板，其中包含嵌入在 URI 语法中的变量。\n\
  \n这些变量在运行时被求值。@Path 注解的 Javadoc 描述了模板语法。\n\n@Path(\"/customers/{customername}\"\
  )\n\n@Path 也可以用于根资源的方法上，这对于将多个资源的通用功能分组在一起非常有用，如清单 15-4 所示（你可以暂时忽略清单中的 @GET、@POST\
  \ 和 @DELETE 注解，它们将在后面的“方法或统一接口”部分中描述）。\n\n**清单 15-4.** *一个带有多个 @Path 注解的 Item 资源*\n\
  \n**@Path**(\"/items\")\n\npublic class ItemsResource {\n\n@GET\n\npublic List<Item>\
  \ getListOfItems() {\n\n// ...\n\n}\n\n@GET\n\n**@Path**(\" **{itemid}**\")\n\n\
  public Item getItem(@PathParam(\" **itemid**\") String itemid) {\n\n// ...\n\n}\n\
  \n@PUT\n\n**@Path**(\" **{itemid}**\")\n\npublic void putItem(@PathParam(\" **itemid**\"\
  ) String itemid,➥\n\nItem item) {\n\n**444**\n\n第 15 章 ■ RESTful Web 服务\n\n// ...\n\
  \n}\n\n@DELETE\n\n**@Path(\"{itemid}**\")\n\npublic void deleteItem(@PathParam(\"\
  \ **itemid**\") String itemid) {\n\n// ...\n\n}\n\n@GET\n\n**@Path(\"/books/\")**\n\
  \npublic List<Book> getListOfBooks() {\n\n// ...\n\n}\n\n@GET\n\n**@Path(\"/books/{bookid}\"\
  )**\n\npublic Book getBook(@PathParam(\" **bookid**\") String bookid) {\n\n// ...\n\
  \n}\n\n}\n\n如果 @Path 同时存在于类和方法上，那么资源方法的相对路径是类路径和方法路径的拼接。例如，要通过 ID 获取一本书，路径将是\n\n\
  /items/books/1234。当请求根资源 /items 时，将选择唯一没有 @Path 的方法（getListOfItems()）。当请求 /items/books\
  \ 时，将调用 getListOfBooks() 方法。如果 @Path(\"/items\") 只存在于类上，而不存在于任何方法上，那么访问每个方法的路径将是相同的。区分它们的唯一方法是\
  \ HTTP 动词（GET、PUT 等）和内容协商（文本、XML 等）。\n\n**提取参数**\n\n在处理 URI 和请求时，你需要提取相关信息。清单 15-4\n\
  \n展示了如何使用 @javax.ws.rs.PathParam 从路径中获取参数。JAX-RS 提供了\n\n丰富的注解集来提取请求可能发送的不同参数（@QueryParam、@MatrixParam、@CookieParam、@HeaderParam\
