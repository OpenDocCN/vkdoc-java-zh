  \ CMP 2.*x*，一个常见的抱怨是持久化组件的单元测试很困难。JPA 的主要卖点之一是，你可以在不需要运行中的应用服务器或实时数据库的情况下轻松测试实体。但是，你可以测试什么呢？实体本身通常不需要隔离测试。实体上的大多数方法都是简单的\
  \ getter 或 setter，只有少数业务方法。验证 setter 为属性赋值并且相应的 getter 检索到相同的值，并不会带来任何额外价值（除非在 getter\
  \ 或 setter 中检测到了副作用）。\n\n那么测试数据库查询呢？一些开发者可能会争辩说这并非\n\n\n\n单元测试需要真实的数据库来运行这些测试。使用模拟对象来模拟数据库进行隔离测试可能会耗费大量工作。此外，在任何容器（EJB\
  \ 或 Servlet 容器）之外测试实体也会对代码产生影响，因为事务管理必须更改。使用内存数据库和非 JTA 事务是一个很好的折衷方案。CRUD 操作和 JPQL\
  \ 查询可以使用一个非常轻量级的数据库进行测试，该数据库无需在单独的进程中运行（只需将一个 jar 文件添加到类路径即可）。这就是你将如何通过使用 Derby\
  \ 的嵌入式模式来运行我们的 `BookTest` 类。\n\nMaven 使用两个不同的目录，一个用于存储主应用程序代码，另一个用于测试类。`BookTest`\
  \ 类（如清单 2-7 所示）位于 `src/test/java` 目录下，用于测试实体管理器能否持久化一本书并从数据库中检索它。\n\n**清单 2-7.**\
  \ *创建一本书并从数据库检索所有书籍的测试类*\n```java\npublic class BookTest {\n\n    private static\
  \ EntityManagerFactory emf;\n\n    private static EntityManager em;\n\n    private\
  \ static EntityTransaction tx;\n\n    @BeforeClass\n    public static void initEntityManager()\
  \ throws Exception {\n        emf = Persistence.createEntityManagerFactory(\"chapter02PU\"\
  );\n        em = emf.createEntityManager();\n    }\n\n    @AfterClass\n    public\
  \ static void closeEntityManager() throws SQLException {\n        em.close();\n\
  \        emf.close();\n    }\n\n    @Before\n    public void initTransaction() {\n\
  \        tx = em.getTransaction();\n    }\n\n    @Test\n    public void createBook()\
  \ throws Exception {\n        // 创建一个书籍实例\n        Book book = new Book();\n   \
  \     book.setTitle(\"The Hitchhiker's Guide to the Galaxy\");\n        book.setPrice(12.5F);\n\
  \        book.setDescription(\"Science fiction comedy book\");\n        book.setIsbn(\"\
  1-84023-742-2\");\n        book.setNbOfPage(354);\n        book.setIllustrations(false);\n\
  \n        // 将书籍持久化到数据库\n        tx.begin();\n        em.persist(book);\n      \
  \  tx.commit();\n        assertNotNull(\"ID should not be null\", book.getId());\n\
  \n        // 从数据库检索所有书籍\n        List<Book> books = em.createNamedQuery(\"findAllBooks\"\
  ).getResultList();\n        assertNotNull(books);\n    }\n}\n```\n\n与 `Main` 类类似，`BookTest`\
  \ 需要使用 `EntityManagerFactory` 创建一个 `EntityManager` 实例。要初始化这些组件，你可以使用 JUnit 4 的 fixtures。`@BeforeClass`\
  \ 和 `@AfterClass` 注解允许在类执行之前和之后仅执行一次某些代码。这是创建和关闭 `EntityManager` 实例的理想位置。`@Before`\
  \ 注解允许你在每个测试之前运行代码，这正是你获取事务的地方。\n\n`createBook()` 方法是测试用例，因为它使用了 JUnit 的 `@Test`\
  \ 注解进行标注。该方法持久化一本书（使用 `EntityManager.persist()` 方法），并检查 ID 是否已由 EclipseLink 自动生成（使用\
  \ `assertNotNull`）。如果是，则执行 `findAllBooks` 命名查询，并检查返回的列表是否为空。\n\n**BookTest 类的持久化单元**\n\
  \n现在测试类已经编写完成，你需要另一个 `persistence.xml` 文件来使用 Derby 嵌入式模式。之前的 `persistence.xml` 文件为\
  \ Derby Server 定义了一个 JDBC 驱动程序和 URL 连接，而 Derby Server 必须在单独的进程中启动。清单 2-8 中的 `src/test/resources/META-INF/persistence.xml`\
  \ 使用了嵌入式 JDBC 驱动程序。\n\n**清单 2-8.** *BookTest 类使用的 persistence.xml 文件*\n```xml\n\
  <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<persistence version=\"1.0\" xmlns=\"\
  http://java.sun.com/xml/ns/persistence\">\n    <persistence-unit name=\"chapter02PU\"\
  \ transaction-type=\"RESOURCE_LOCAL\">\n        <provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>\n\
  \        <class>com.apress.javaee6.chapter02.Book</class>\n        <properties>\n\
  \            <property name=\"eclipselink.target-database\" value=\"DERBY\"/>\n\
  \            <property name=\"eclipselink.jdbc.driver\" value=\"org.apache.derby.jdbc.EmbeddedDriver\"\
  />\n            <property name=\"eclipselink.jdbc.url\" value=\"jdbc:derby:chapter02DB;create=true\"\
  />\n            <property name=\"eclipselink.jdbc.user\" value=\"APP\"/>\n     \
  \       <property name=\"eclipselink.jdbc.password\" value=\"APP\"/>\n         \
  \   <property name=\"eclipselink.ddl-generation\" value=\"drop-and-create-tables\"\
  />\n            <property name=\"eclipselink.logging.level\" value=\"FINE\"/>\n\
