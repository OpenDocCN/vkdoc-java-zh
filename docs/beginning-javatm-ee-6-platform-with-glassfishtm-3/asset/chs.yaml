  \ JSON 对象的约定，以便在](http://badgerfish.ning.com/)\n\nJavaScript 中轻松操作。\n\n**实体提供者**\n\
  \n当在请求中接收实体或在响应中发送实体时，JAX-RS 实现需要一种将表示形式转换为 Java 类型（反之亦然）的方法。这正是实体提供者的作用，它们提供表示形式与其关联\
  \ Java 类型之间的映射服务。\n\n一个例子是 JAXB，它将对象映射为 XML 表示形式，反之亦然。实体提供者有两种类型：MessageBodyReader\
  \ 和 MessageBodyWriter。\n\n要将请求体映射为 Java 类型，类必须实现 `javax.ws.rs.ext.MessageBodyReader`\
  \ 接口，并使用 `@Provider` 注解。默认情况下，该实现被认为可以消费所有媒体类型（`*/*`）。可以使用 `@Consumes` 注解来限制支持的媒体类型。清单\
  \ 15-7 中的代码接收一个 XML 流（由 `javax.xml.bind.Element` 对象表示）并将其转换为一个 Customer 对象。\n\n\
  **清单 15-7.** *一个读取 XML 流并创建 Customer 实体的提供者*\n\n```java\n@Provider\n@Consumes(\"\
  application/xml\")\npublic class CustomerReader implements **MessageBodyReader<Element**>\
  \ {\n    public boolean isReadable(Class<?> type) {\n        return **Element**.class.isAssignableFrom(type);\n\
  \    }\n    public Element readFrom(Class< **Element**> customer, MediaType mediaType,\n\
  \                            MultivaluedMap<String, String> headers,\n         \
  \                   InputStream inputStream) throws IOException {\n        Document\
  \ doc = getParser().parse(inputStream);\n        Element node = doc.getDocumentElement();\n\
  \        if (node.getLocalName().equals(\"customer\")) {\n            return el;\n\
  \        } else {\n            throw new IOException(\"Unexpected payload!\");\n\
  \        }\n    }\n}\n```\n\n同样地，一个 Java 类型也可以映射为响应体。想要这样做的类必须实现 `javax.ws.rs.ext.MessageBodyWriter`\
  \ 接口，并使用 `@Provider` 注解。`@Produces` 注解指定了支持的媒体类型。清单 15-8 是一个片段，展示了如何将 Customer 实体转换为纯文本\
  \ HTTP 主体。\n\n第 15 章 ■ RESTful Web 服务\n\n**449**\n\n**清单 15-8.** *一个生成 Customer\
