  </html>\n\n第 11 章 ■ 页面与组件\n\n**325**\n\n**隐式对象**\n\n在创建复合组件时，你在实现中使用了`compositeComponent`对象。你无需在任何地方声明它；它直接可用，以便你能获取组件的属性。这类对象被称为*隐式对象*（或*隐式变量*）。隐式对象是映射到特定常用对象的特殊标识符。它们之所以是隐式的，是因为页面可以直接访问并使用它们，而无需显式声明或初始化。隐式对象在\
  \ EL 表达式中使用。\n\n表 11-19 列出了页面可以访问的所有隐式对象。\n\n**表 11-19.** *隐式对象*\n\n**隐式对象**\n\n\
  **描述**\n\n**返回类型**\n\napplication\n\n表示 Web 应用程序环境。\n\nObject\n\n用于获取应用程序级别的配置参数。\n\
  \napplicationScope\n\n将应用程序作用域的属性名称映射到其值。\n\nMap\n\ncomponent\n\n表示当前组件。\n\nUIComponent\n\
  \ncompositeComponent\n\n表示当前复合组件。\n\nUIComponent\n\ncookie\n\n指定一个包含 Cookie 名称（键）和\
  \ Cookie 对象的 Map。\n\nMap\n\nfacesContext\n\n表示当前请求的 FacesContext 实例。\n\nFacesContext\n\
  \nheader\n\n将 HTTP 标头名称映射到单个 String 标头值。\n\nMap\n\nheaderValues\n\n将 HTTP 标头名称映射到该标头所有值的\
  \ String[]。\n\nMap\n\ninitParam\n\n将上下文初始化参数名称映射到其 String 参数值。\n\nMap\n\nparam\n\
  \n将请求参数名称映射到单个 String 参数值。\n\nMap\n\nparamValues\n\n将请求参数名称映射到该参数所有值的 String[]。\n\
  \nMap\n\nrequest\n\n表示 HTTP 请求对象。\n\nObject\n\nrequestScope\n\n将请求作用域的属性名称映射到其值。\n\
  \nMap\n\nresource\n\n指定资源对象。\n\nObject\n\nsession\n\n表示 HTTP 会话对象。\n\nObject\n\n\
  sessionScope\n\n将会话作用域的属性名称映射到其值。\n\nMap\n\nview\n\n表示当前视图。\n\nUIViewRoot\n\nviewScope\n\
  \n将视图作用域的属性名称映射到其值。\n\nMap\n\n![Image 103](img/index-356_1.jpg)\n\n**326**\n\n第\
  \ 11 章 ■ 页面与组件\n\n所有这些隐式对象都是带有接口的实际对象，一旦你了解它们是什么（请参考规范），就可以使用 EL 访问它们的属性。例如，`#{view.locale}`将获取当前视图的区域设置（如\
  \ en_US、pt_PT 等）。如果你在会话作用域中存储了一个图书对象，可以这样访问它：`#{sessionScope.book}`。你甚至可以使用更丰富的算法来显示所有\
  \ HTTP 标头及其值，如下所示：\n\n<h3>headerValues</h3>\n\n<c:forEach var=\"parameter\" items=\"\
  \ **#{headerValues}**\">\n\n<h:outputText value=\"#{parameter.key}\"/> =\n\n<c:forEach\
  \ var=\"value\" items=\"#{parameter.value}\">\n\n<h:outputText value=\"#{value}\"\
  \ escape=\"false\"/><br/>\n\n</c:forEach>\n\n</c:forEach>\n\n如果执行此页面，你将得到一个显示所有\
  \ HTTP 标头的页面。\n\n**总结**\n\n本章解释了使用静态语言（如 HTML、XHTML 或 CSS）和动态语言（如 JavaScript 或服务器端技术）创建网页的不同方式。要使用\
  \ Java EE 6 创建动态 Web 界面，你可以从多种规范中进行选择。\n\nJSP 2.2、EL 2.2 和 JSTL 1.2 是为 Servlet 而创建的规范。页面由\
  \ HTML 数据和 Java 代码组成，这些代码被编译成 Servlet，用于响应给定的请求。\n\n尽管 JSP 可以作为 JSF PDL 使用，但最好使用\
  \ Facelets 来发挥 JSF 基于组件的架构和丰富生命周期的强大功能。JSF 提供了一套标准小部件（按钮、超链接、复选框等）和一个用于创建自定义小部件（复合组件）的新模型。JSF\
  \ 2.0 还提供了一种新的资源处理机制，使你可以轻松地对外部资源进行版本控制和本地化。\n\nJSF 2.0 使用丰富的 UI 组件架构，其组件可以进行转换和验证，并且可以与托管\
  \ Bean 交互。这将是下一章的主题。\n\n第 12 章\n\n处理与导航\n\n**在**上一章中，我向你展示了如何使用不同的技术（HTML、JSP、JSTL\
  \ 等）创建网页，同时了解到 JSF 是编写现代 Web 应用程序的首选 Java EE 规范。然而，仅使用图形组件绘制页面是不够的；这些页面需要与后端系统交互，在页面间导航，并验证和转换数据。JSF\
  \ 是一个丰富的规范：托管 Bean 允许你调用业务层并在应用程序中导航，一组类允许你将组件值转换为相应类型或从相应类型转换回来，或者验证它们以符合业务规则。通过使用注解，现在开发自定义转换器和验证器变得很容易。\n\
  \nJSF 2.0 在动态用户界面方面带来了简洁性和丰富性。它以简单的方式原生支持 Ajax 调用。该规范附带了一个 JavaScript 库，允许异步调用服务器并刷新页面的一小部分。\n\
  \n创建用户界面、控制整个应用程序中的导航以及同步或异步调用业务逻辑之所以成为可能，是因为 JSF 建立在模型-视图-控制器（MVC）设计模式之上。每个部分彼此分离，允许\
  \ UI 在不影响业务逻辑的情况下更改，反之亦然。\n\n本章将介绍所有这些概念，作为对前几章的补充。\n\n**MVC 模式**\n\nJSF 以及大多数 Web\
  \ 框架通过使用 MVC 设计模式的变体来鼓励关注点分离。MVC 是一种用于将业务逻辑与用户界面隔离的架构模式。业务逻辑与用户界面代码混合在一起效果不佳。当两者混合时，应用程序更难维护且可扩展性更差。在上一章的“JavaServer\
  \ Pages”部分，我向你展示了一个包含 Java 代码和 SQL 语句的 JSP。虽然技术上正确，但你可以想象随着时间的推移维护起来会有多困难。该页面混合了两种开发人员角色（图形设计师和业务逻辑开发人员），并且最终可能会使用更多的\
  \ API（数据库访问、EJB 调用等）、处理异常或处理复杂的业务逻辑。所有这些都会导致一个非常复杂的网页。当应用 MVC 时，会产生一个松散耦合的应用程序；对于这种类型的应用程序，修改应用程序的视觉外观或底层业务规则更容易，而不会相互影响。\n\
  \n在 MVC 中，模型代表应用程序的数据，视图对应于用户界面，控制器管理两者之间的通信（见图 12-1）。\n\n**327**\n\n![Image 104](img/index-358_1.jpg)\n\
  \n![Image 105](img/index-358_2.jpg)\n\n**328**\n\n第 12 章 ■ 处理与导航\n\n**图 12-1.**\
  \ *MVC 设计模式*\n\n模型由内容表示，这些内容通常存储在数据库中并在视图中显示。模型的构建不考虑其呈现给用户时的外观和感觉。在 JSF 中，它可以由支持\
  \ Bean、EJB 调用、JPA 实体等组成。\n\nJSF 中的视图是实际的 XHTML 页面（XHTML 用于 Web 界面，但这可能\n\n\n\n可以是其他不同的内容，例如用于无线设备的\
  \ WML。如前一章所述，视图为模型提供了图形化表示。一个模型也可以拥有多个视图，例如，以表单或列表形式展示一本书。\n\n当用户操作一个视图时，视图会通知控制器所需的变化。然后，控制器收集、转换并验证数据，调用业务逻辑，并以\
  \ XHTML 格式生成内容。在 JSF 中，控制器是 `FacesServlet`。\n\n**FacesServlet**\n\n`FacesServlet`\
  \ 是 `javax.servlet.Servlet` 的一个实现，充当中央控制器元素，所有用户请求都通过它传递。如图 12-2 所示，当事件发生时（例如，用户点击按钮），事件通知通过\
  \ HTTP 发送到服务器，并被 `javax.faces.webapp.FacesServlet` 拦截。它检查请求，并使用托管 Bean 在模型上调用各种操作。\n\
  \n**图 12-2.** *FacesServlet 的交互*\n\n第 12 章 ■ 处理与导航\n\n**329**\n\n在幕后，`FacesServlet`\
  \ 接受传入的请求，并将控制权移交给 `javax.faces.lifecycle.Lifecycle` 对象。它使用工厂创建一个 `javax.faces.context.FacesContext`\
  \ 类型的对象，该对象包含并处理所有每个请求的状态信息。`Lifecycle` 对象在渲染响应之前，在六个阶段（如前一章所述）中使用 `FacesContext`\
  \ 对象。\n\n为了请求能被 `FacesServlet` 处理，必须使用部署描述符中的 Servlet 映射进行重定向。网页、托管 Bean、转换器等必须与清单\
  \ 12-1 中所示的 `web.xml` 文件一起打包。\n\n**清单 12-1.** *定义 FacesServlet 的 web.xml*\n\n```xml\n\
  <?xml version='1.0' encoding='UTF-8'?>\n<web-app version=\"2.5\"\n    xsi:schemaLocation=\"\
  http://java.sun.com/xml/ns/javaee\n    http://java.sun.com/xml/ns/javaee/web-app_2_5.xsd\"\
  >\n    <servlet>\n        <servlet-name>Faces Servlet</servlet-name>\n        <servlet-class>javax.faces.webapp.FacesServlet</servlet-class>\n\
  \        <load-on-startup>1</load-on-startup>\n    </servlet>\n    <servlet-mapping>\n\
  \        <servlet-name>Faces Servlet</servlet-name>\n        <url-pattern>*.faces</url-pattern>\n\
  \    </servlet-mapping>\n    <context-param>\n        <param-name>javax.faces.PROJECT_STAGE</param-name>\n\
  \        <param-value>Development</param-value>\n    </context-param>\n</web-app>\n\
  ```\n\n这个 `web.xml` 文件通过为其指定名称（例如，Faces Servlet）和映射来定义 `javax.faces.webapp.FacesServlet`。在此示例中，所有具有\
  \ `.faces` 扩展名的请求都被映射到由该 Servlet 管理，并且任何诸如 `http://localhost:8080/chapter10-1.0/newBook.faces`\
  \ 的请求都将由 JSF 处理。\n\n您还可以在 `<context-param>` 元素中配置一些 JSF 特定的参数。表 12-1 列出了其中一些参数。\n\
  \n**330**\n\n第 12 章 ■ 处理与导航\n\n**表 12-1.** *JSF 特定配置参数*\n\n| 参数 | 描述 |\n| :--- |\
  \ :--- |\n| `javax.faces.CONFIG_FILES` | 定义一个逗号分隔的上下文相关资源路径列表，JSF 实现将在这些路径下查找资源。\
  \ |\n| `javax.faces.DEFAULT_SUFFIX` | 允许 Web 应用程序为包含 JSF 内容的页面定义一组替代后缀（例如，`.xhtml`）。\
  \ |\n| `javax.faces.LIFECYCLE_ID` | 标识在处理 JSF 请求时要使用的 `Lifecycle` 实例。 |\n| `javax.faces.STATE_SAVING_METHOD`\
  \ | 定义保存状态的位置。有效值为 `server`（默认值，通常保存在 `HttpSession` 中）和 `client`（作为隐藏字段保存在后续的表单提交中）。\
  \ |\n| `javax.faces.PROJECT_STAGE` | 描述此特定 JSF 应用程序在软件开发生命周期中所处的阶段（`Development`、`UnitTest`、`SystemTest`\
  \ 或 `Production`）。例如，JSF 实现可以使用此参数来缓存资源，以提高生产环境中的性能。 |\n| `javax.faces.DISABLE_FACELET_JSF_VIEWHANDLER`\
  \ | 如果设置为 `true`，则禁用 Facelets 作为默认页面声明语言 (PDL)。 |\n| `javax.faces.LIBRARIES` | |\n\
  \n\n\n将分号分隔的路径列表中的每个文件解释为 Facelets 标签库。\n\n**FacesContext**\n\nJSF 定义了 `javax.faces.context.FacesContext`\
  \ 抽象类，用于表示与处理传入请求和创建相应响应相关的上下文信息。该类允许与 UI 以及 JSF 环境的其余部分进行交互。\n\n要获取访问权限，您可以在页面中使用隐式的\
  \ `facesContext` 对象（有关隐式对象的讨论，请参阅前一章节），或者使用静态方法 `getCurrentInstance()` 在受管 Bean\
  \ 中获取引用。这将返回当前线程的 `FacesContext` 实例，然后您可以调用表 12-2 中列出的方法。\n\n**表 12-2.** *FacesContext\
  \ 的部分方法*\n\n**方法**\n\n**描述**\n\n`addMessage`\n\n追加一条错误消息。\n\n`getApplication`\n\n\
  返回与此 Web 应用程序关联的 `Application` 实例。\n\n`getAttributes`\n\n返回一个 `Map`，表示与 `FacesContext`\
  \ 实例关联的属性。\n\n**方法**\n\n**描述**\n\n`getCurrentInstance`\n\n返回当前线程正在处理的请求的 `FacesContext`\
  \ 实例。\n\n`getMaximumSeverity`\n\n返回已排队的任何 `FacesMessage` 上记录的最大严重级别。\n\n`getMessages`\n\
  \n返回一个 `FacesMessage` 集合。\n\n`getViewRoot`\n\n返回与请求关联的根组件。\n\n`release`\n\n释放与此\
  \ `FacesContext` 实例关联的所有资源。\n\n`renderResponse`\n\n向 JSF 实现发出信号，一旦请求处理生命周期的当前阶段完成，控制权应传递给*渲染响应*阶段，跳过任何尚未执行的阶段。\n\
  \n`responseComplete`\n\n向 JSF 实现发出信号，表明此请求的 HTTP 响应（例如 HTTP 重定向）已生成，并且一旦当前阶段完成，请求处理生命周期应立即终止。\n\
  \n**Faces Config**\n\n`FacesServlet` 是 JSF 实现的内部组件，虽然您无法访问其代码，但确实需要元数据来配置它。到目前为止，您可能已经习惯了\
  \ Java EE 6 中两种可能的元数据选择：注解和 XML 部署描述符（`/WEB-INF/faces-config.xml`）。在 JSF 2.0 之前，唯一的选择是\
  \ XML；如今，受管 Bean、转换器、事件监听器、渲染器和验证器都可以使用注解，因为使用 XML 配置文件已变为可选。\n\n我主要推荐使用注解，但为了展示\
  \ `faces-config.xml` 文件的内容片段，清单 12-2 中的示例定义了一个区域设置和一个用于国际化的消息包，以及一些导航规则。稍后您将看到如何在使用和不使用\
  \ `faces-config.xml` 的情况下进行导航。\n\n**清单 12-2.** *faces-config.xml 文件片段*\n\n```xml\n\
  <?xml version='1.0' encoding='UTF-8'?>\n<faces-config\n    xmlns=\"http://java.sun.com/xml/ns/javaee\"\
  \n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"\
  http://java.sun.com/xml/ns/javaee\n                        http://java.sun.com/xml/ns/javaee/web-facesconfig_2_0.xsd\"\
  \n    version=\"2.0\">\n    <application>\n        <locale-config>\n           \
  \ <default-locale>fr</default-locale>\n        </locale-config>\n        <resource-bundle>\n\
  \            <base-name>messages</base-name>\n            <var>msg</var>\n     \
  \   </resource-bundle>\n    </application>\n    <navigation-rule>\n        <from-view-id>*</from-view-id>\n\
  \        <navigation-case>\n            <from-outcome>doCreateBook-sucess</from-outcome>\n\
  \            <to-view-id>/listBooks.htm</to-view-id>\n        </navigation-case>\n\
  \    </navigation-rule>\n</faces-config>\n```\n\n**受管 Bean**\n\n如前所述，MVC 模式鼓励模型、视图和控制器之间的分离：JSF\
  \ 页面构成视图，`FacesServlet` 构成控制器。受管 Bean 是通往模型的网关。\n\n受管 Bean 是带有注解的 Java 类，对于 Web\
  \ 应用程序至关重要。它们可以\n\n\n\n执行业务逻辑（或委托给 EJB 等）、处理页面间的导航以及持有数据。一个典型的 JSF 应用程序包含一个或多个可由多个页面共享的受管\
  \ Bean。\n\n数据保存在受管 Bean（也称为后台 Bean）的属性中。后台 Bean 定义了 UI 组件所绑定的数据（例如表单的目标）。要将组件绑定到后台\
  \ Bean，你需要使用表达式语言。\n\n**如何编写受管 Bean**\n\n编写受管 Bean 就像编写 EJB 或 JPA 实体一样简单；它只是一个使用`@ManagedBean`注解的\
  \ Java 类（参见清单 12-3）。无需`faces-config.xml`条目、辅助类或继承。JSF 2.0 还使用了“异常配置”机制，只需一个注解，你就可以使用所有默认设置，并用这样的受管\
  \ Bean 部署你的 Web 应用程序。\n\n**清单 12-3.** *一个简单的受管 Bean*\n\n**@ManagedBean**\n\npublic\
  \ class BookController {\n\nprivate Book **book** = new Book();\n\npublic String\
  \ **doCreateBook()** {\n\ncreateBook(book);\n\nreturn \" **listBooks.xhtml**\";\n\
  \n}\n\n// 构造方法、getter、setter\n\n}\n\n第 12 章 ■ 处理与导航\n\n**333**\n\n清单 12-3 展示了受管\
  \ Bean 的编程模型：它持有状态（book 属性），定义了页面中引用的动作方法（`doCreateBook()`），并处理导航（返回`\"listBooks.xhtml\"\
  `）。\n\n**受管 Bean 模型**\n\n受管 Bean 是由`FacesServlet`管理的 Java 类。UI 组件绑定到受管 Bean（或后台\
  \ Bean）的属性，并且可以调用动作方法。受管 Bean 需要遵循以下要求：\n\n*   该类必须使用`@javax.faces.model.ManagedBean`注解或`faces-config.xml`部署描述符中的等效\
  \ XML 进行注解。\n*   该类必须有一个作用域（默认为`@RequestScoped`）。\n*   该类必须定义为`public`；不能是`final`或`abstract`。\n\
  *   该类必须有一个公共的无参构造方法，容器将使用它来创建实例。\n*   该类不能定义`finalize()`方法。\n*   属性必须有公共的 getter\
  \ 和 setter 方法才能绑定到组件。\n\n遵循 Java EE 6 的易用性模型，受管 Bean 可以简单地是一个带注解的 POJO，从而消除了大部分配置。但是，如果你仍然需要自定义，可以使用`@ManagedBean`和`@ManagedProperty`作用域注解（或等效\
  \ XML）的元素。\n\n**@ManagedBean**\n\n在类上存在`@javax.faces.model.ManagedBean`注解会自动将其注册为受管\
  \ Bean。此注解的 API 很简单，所有元素都是可选的（参见清单 12-4）。\n\n**清单 12-4.** *ManagedBean 注解 API*\n\
  \n@Target(TYPE) @Retention(RUNTIME)\n\npublic @interface **ManagedBean** {\n\nString\
  \ **name**() default \"\";\n\nboolean **eager**() default false;\n\n}\n\n`name`元素指定受管\
  \ Bean 的名称（默认情况下是类名，首字母小写）。如果`eager`元素的值为`true`，则在 Web 应用程序启动时实例化该受管 Bean。\n\nUI\
  \ 组件绑定到受管 Bean 的属性；更改受管 Bean 的默认名称会影响你调用属性或方法的方式。清单 12-4 中的代码将受管 Bean 重命名为`myManagedBean`。\n\
  \n**334**\n\n第 12 章 ■ 处理与导航\n\n**清单 12-5.** *一个重命名的受管 Bean*\n\n@ManagedBean(**name\
  \ = \"myManagedBean\"** )\n\npublic class BookController {\n\nprivate Book **book**\
  \ = new Book();\n\npublic String **doCreateBook()** {\n\ncreateBook(book);\n\nreturn\
  \ \" **listBooks.xhtml**\";\n\n}\n\n// 构造方法、getter、setter\n\n}\n\n要在页面中调用此受管 Bean\
  \ 的属性或方法，你必须使用重写后的名称，如下所示：\n\n<h:outputText value=\"#{**myManagedBean**.book.isbn}\"\
  />\n\n<h:form>\n\n<h:commandLink action=\"#{**myManagedBean**.doCreateBook}\">\n\
  \n创建一本新书\n\n</h:commandLink>\n\n</h:form>\n\n作用域\n\n\n\n作为托管 Bean 一部分创建的对象具有特定的生命周期，并且\
  \ Web 应用程序中的 UI 组件或其他对象可能可以访问它们，也可能无法访问。对象的生命周期和可访问性被称为*作用域*。你可以使用以下五种不同的注解来指定托管\
  \ Bean 的作用域：\n\n• @ApplicationScoped：这是限制最少的注解，生命周期最长。\n\n只要应用程序处于活动状态，所创建的对象对于使用该\
  \ Web 应用程序的所有客户端的所有请求/响应周期都是可用的。这些对象可以被并发调用，并且需要是线程安全的（使用 `synchronized` 关键字）。具有此作用域的对象可以使用无作用域或应用程序作用域的其他对象。\n\
  \n• @SessionScoped：对象对于属于客户端会话的任何请求/响应周期都是可用的。这些对象的状态在请求之间保持不变，并持续到会话失效。具有此作用域的对象可以使用无作用域、会话作用域或应用程序作用域的其他对象。\n\
  \n• @ViewScoped：对象在给定的视图中可用，直到视图发生更改，并且其状态会一直保持，直到用户导航到新视图，此时它们将被清除。具有此作用域的对象可以使用无作用域、视图作用域、会话作用域或应用程序作用域的其他对象。\n\
  \n第 12 章 ■ 处理与导航\n\n**335**\n\n• @RequestScoped：如果在托管 Bean 中未指定，则此为默认作用域。对象从请求开始到响应发送给客户端期间可用。一个客户端可以执行多个请求，但停留在同一个视图上。这就是为什么\
  \ @ViewScoped 的持续时间比 @RequestScoped 更长。具有此作用域的对象可以使用无作用域、请求作用域、视图作用域、会话作用域或应用程序作用域的其他对象。\n\
  \n• @NoneScoped：具有此作用域的托管 Bean 在任何 JSF 页面中都不可见，它们定义了供应用程序中其他托管 Bean 使用的对象。具有此作用域的对象可以使用具有相同作用域的其他对象。\n\
  \n在为托管 Bean 选择作用域时需要谨慎。你应该只给予它们所需的作用域。过度作用域的 Bean（例如 @ApplicationScoped）会增加内存使用量，并且持久化它们的潜在需求可能导致磁盘使用量增加。将应用程序作用域赋予一个仅在单个组件内使用的对象是没有意义的。同样，限制过多的对象将无法被应用程序的不同部分访问。\n\
  \n清单 12-6 中的代码定义了一个具有应用程序作用域的托管 Bean。它被急切地实例化（`eager = true`），并在构造完成后立即初始化 `defaultBook`\
  \ 属性（`@PostConstruct`）。这可能是初始化 Web 应用程序部分内容或被其他托管 Bean 属性引用的理想 Bean。\n\n**清单 12-6.**\
  \ *一个被急切实例化的应用程序作用域托管 Bean*\n\n```java\n@ManagedBean(eager = true)\n@ApplicationScoped\n\
  public class InitController {\n\n    private Book defaultBook;\n\n    @PostConstruct\n\
  \    private void init() {\n        defaultBook = new Book(\"default title\", 0,\
  \ \"default description\",\n                \"0000-000\", 100, true);\n    }\n\n\
  \    // 构造函数、getter、setter\n}\n```\n\n@ManagedProperty\n\n在托管 Bean 中，你可以通过使用 `faces-config.xml`\
  \ 文件或 `@javax.faces.model.ManagedProperty` 注解来指示系统向属性（具有 getter 和/或 setter 的属性）注入一个值。该注解有一个\
  \ `value` 属性，可以接受字面字符串或 EL 表达式。清单 12-7 给出了一些属性初始化的示例。\n\n![Image 106](img/index-366_1.jpg)\n\
  \n**336**\n\n第 12 章 ■ 处理与导航\n\n**清单 12-7.** *正在被初始化的托管 Bean 属性*\n\n```java\n@ManagedBean\n\
  public class BookController {\n\n    @ManagedProperty(value = \"#{initController.defaultBook}\"\
  )\n    private Book book;\n\n    @ManagedProperty(value = \"this is a title\")\n\
  \    private String aTitle;\n\n    @ManagedProperty(value = \"999\")\n}\n```\n\n\
  \nprivate Integer aPrice;\n\n// 构造方法、getter、setter 及其他方法\n\n}\n\n在清单 12-7 中，属性 aTitle\
  \ 和 aPrice 使用字符串值进行初始化。类型为 String 的属性 aTitle 将被初始化为 `this is a title`，而类型为 Integer\
  \ 的属性 aPrice 将被初始化为数字 999（尽管传入的是字符串 \"999\"，但会被转换为 Integer 类型）；由于属性在运行时（通常在视图渲染时）被求值，因此可以初始化引用其他受管\
  \ bean 的属性。book 的值通过一个表达式进行初始化，该表达式引用了你之前见过的 initController 受管 bean 的 defaultBook\
  \ 属性（`#{initController.defaultBook}`）。清单 12-6 显示 defaultBook 是由 InitController 受管\
  \ bean 初始化的 Book 类型属性，因此，当 BookController 被初始化时，JSF 实现会将 InitController 中的 defaultBook\
  \ 属性注入进来。在 `faces-config.xml` 中初始化字面量，并使用注解（配合表达式语言）进行跨受管 bean 的引用，是一种良好的实践。\n\n\
  生命周期与回调注解\n\n前一章解释了页面的生命周期（包含从接收请求到渲染响应的六个阶段）。受管 bean 也有自己的生命周期（见图 12-3），这与页面的生命周期完全不同。实际上，受管\
  \ bean 的生命周期与无状态会话 bean 类似；如果它们存在，其生命周期与所定义的作用域相同。\n\n**图 12-3.** *受管 bean 的生命周期*\n\
  \n![Image 107](img/index-367_1.jpg)\n\n第 12 章 ■ 处理与导航\n\n**337**\n\n在 Servlet 容器中运行的受管\
  \ bean 可以使用 `@PostConstruct` 和 `@PreDestroy` 注解。容器创建受管 bean 实例后，会调用 `@PostConstruct`\
  \ 回调方法（如果存在）。在此阶段之后，消息 bean 被绑定到某个作用域，并响应用户的请求。在移除受管 bean 之前，容器会调用 `@PreDestroy`\
  \ 方法。这些方法可用于初始化属性，或创建和释放任何外部资源。\n\n**导航**\n\nWeb 应用程序由多个需要导航的页面组成。根据应用程序的不同，你可以拥有不同复杂程度的页面流导航层级。你可以想象向导式流程（可以返回上一页或初始页面），或者根据特定规则跳转到特定页面的业务场景等。JSF\
  \ 提供了多种导航选项，允许你基于单个页面或整个应用程序全局控制流程。\n\n当你只想通过点击链接或按钮在页面间跳转，而不进行任何处理时，可以使用 UI 组件\
  \ `<h:commandButton>` 和 `<h:commandLink>`。\n\n它们的 action 属性接受你需要导航到的页面名称：\n\n`<h:commandButton\
  \ value=\"Create\" action=\"**listBooks.xhtml**\"/>`\n\n但大多数情况下这还不够，因为你需要访问业务层或数据库来检索或处理数据。这时就需要使用受管\
  \ bean。在第 10 章的“整合应用”部分，我们有一个用于创建图书的表单页面（newBook.xhtml）。点击 Create 按钮后，图书被创建，受管 bean\
  \ 导航到 listBooks.xhtml 页面，该页面将列出所有图书。当页面加载到浏览器后，页面底部的 Create a new book 链接允许你返回上一页（如图\
  \ 12-4 所示）。\n\n**图 12-4.** *在 newBook.xhtml 和 listBooks.xhtml 之间导航*\n\n**338**\n\
  \n第 12 章 ■ 处理与导航\n\n这个页面流很简单，但这两个页面需要一个受管 bean（BookController）来执行业务逻辑和导航。它们使用按钮和链接组件来与受管\
  \ bean 进行导航和交互。\n\nnewBook.xhtml 页面使用一个按钮来调用受管 bean 的 `doCreateBook()` 方法：\n\n\n\
  \n<h:commandButton value=\"创建\" action=\"#{bookController. **doCreateBook**}\"/>\
  \ listBooks.xhtml 页面使用一个链接来调用 doNewBookForm() 方法：\n\n<h:commandLink action=\"#{bookController.\
  \ **doNewBookForm**}\">\n\n创建新书\n\n</h:commandLink>\n\n按钮和链接组件并不直接调用它们需要跳转的页面。它们会调用托管\
  \ bean 中负责导航的方法，这些方法包含决定下一步加载哪个页面的代码。导航操作基于一组规则，这些规则定义了应用程序所有可能的导航路径。清单 12-8 中的托管\
  \ bean 代码使用了最简单的导航规则形式：每个方法都定义了它需要跳转到的页面。\n\n**清单 12-8.** *显式定义导航的托管 Bean*\n\n@ManagedBean\n\
  \npublic class BookController {\n\n@EJB\n\nprivate BookEJB bookEJB;\n\nprivate Book\
  \ book = new Book();\n\nprivate List<Book> bookList = new ArrayList<Book>();\n\n\
  public String **doNewBookForm**() {\n\nreturn \" **newBook.xhtml**\";\n\n}\n\npublic\
  \ String **doCreateBook**() {\n\nbook = bookEJB.createBook(book);\n\nbookList =\
  \ bookEJB.findBooks();\n\nreturn \" **listBooks.xhtml**\";\n\n}\n\n// 构造函数、getter、setter\n\
  \n}\n\n当 <h:commandButton> 调用 doCreateBook() 方法时，该方法会创建一本书（使用无状态会话 Bean）并返回要导航到的页面名称：listBooks.xhtml。然后\
  \ FacesServlet 会将页面流程重定向到目标页面。\n\n返回的字符串可以有多种形式。这里是最简单的一种：它返回页面名称。默认情况下，页面文件扩展名是\
  \ .xhtml；代码可以简化并去掉扩展名：\n\n第 12 章 ■ 处理与导航\n\n**339**\n\npublic String **doNewBookForm**()\
  \ {\n\nreturn \" **newBook**\";\n\n}\n\nFacesServlet 会理解目标页面实际上是 newBook.xhtml（而不是\
  \ newBook）。\n\n使用 JSF 时，页面流导航可以通过 faces-config.xml 在外部定义。在 faces-config.xml 中，导航在\
  \ <navigation-rule> 元素中指定。<navigation-rule> 元素标识起始页面、一个条件以及条件发生时需要导航到的目标页面。该条件基于逻辑名称而非页面名称。\n\
  \n前面托管 bean 的代码本可以使用逻辑名称 success，如清单 12-9 所示。\n\n**清单 12-9.** *使用逻辑名称的托管 Bean 代码片段*\n\
  \n@ManagedBean\n\npublic class BookController {\n\n// ...\n\npublic String **doNewBookForm**()\
  \ {\n\nreturn \" **sucess**\";\n\n}\n\npublic String **doCreateBook**() {\n\nbook\
  \ = bookEJB.createBook(book);\n\nbookList = bookEJB.findBooks();\n\nreturn \" **sucess**\"\
  ;\n\n}\n\n// 构造函数、getter、setter\n\n}\n\n两个方法都返回相同的逻辑名称。因此 faces-config.xml 必须进行结构化配置，以理解在一种情况下需要加载\
  \ newBook.xhtml 页面，而在另一种情况下需要加载 listBooks.xhtml 页面。清单 12-10 展示了 faces-config.xml\
  \ 文件的结构。<from-view-id> 标签定义了最初发起动作请求的页面。在第一种情况下，你在调用托管 bean 之前从 newBook.xhtml 页面开始。如果返回的逻辑名称是\
  \ success (<from-outcome>)，FacesServlet 会将调用转发到 listBooks.xhtml 页面 (<to-view-id>)。\n\
  \n**清单 12-10.** *定义导航的 faces-config.xml 文件*\n\n<?xml version='1.0' encoding='UTF-8'?>\n\
  \n[<faces-config](http://java.sun.com/xml/ns/javaee)\n\n[xsi:schemaLocation=\"http://java.sun.com/xml/ns/javaee](http://java.sun.com/xml/ns/javaee)\n\
  \n[`java.sun.com/xml/ns/javaee/web-facesconfig_2_0.xsd\"`](http://java.sun.com/xml/ns/javaee)\n\
  \nversion=\"2.0\">\n\n<navigation-rule>\n\n**340**\n\n第 12 章 ■ 处理与导航\n\n<from-view-id>\
  \ **newBook.xhtml**</from-view-id>\n\n<navigation-case>\n\n<from-outcome> **sucess**</from-outcome>\n\
  \n<to-view-id> **listBooks.xhtml**</to-view-id>\n\n</navigation-case>\n\n</navigation-rule>\n\
  \n<navigation-rule>\n\n<from-view-id> **listBooks.xhtml**</from-view-id>\n\n<navigation-case>\n\
  \n<from-outcome> **sucess**</from-outcome>\n\n<to-view-id> **newBook.xhtml**</to-view-id>\n\
  \n</navigation-case>\n\n</navigation-rule>\n\n</faces-config>\n\n\n\n导航可以直接在托管 Bean\
  \ 中完成，也可以通过 `faces-config.xml` 完成，但何时使用哪一种呢？在托管 Bean 中直接返回页面名称的第一个原因是简单性；Java 代码是显式的，并且没有需要处理的外部\
  \ XML 文件。如果 Web 应用程序有大量的页面流，您可能希望将其保存在一个地方，这样任何更改都可以在中心位置进行，而不是跨多个页面；同样，混合使用两者可能导致部分导航在\
  \ Bean 中，而另一部分在 `faces-config.xml` 文件中。\n\n有一种情况使用 XML 配置非常有用；当多个页面上存在全局链接时（例如，可以在整个应用程序中执行的登录或注销），因为您不想为每个单独的页面定义它们。全局导航规则可以在\
  \ XML 中使用（但托管 Bean 中无法实现相同的功能）：\n\n<navigation-rule>\n\n<from-view-id> *****</from-view-id>\n\
  \n<navigation-case>\n\n<from-outcome> **logout**</from-outcome>\n\n<to-view-id>\
  \ **logout.xhtml**</to-view-id>\n\n</navigation-case>\n\n</navigation-rule>\n\n\
  如果您有一个适用于应用程序中每个页面的操作，您可以使用一个没有 `<from-view-id>` 或使用通配符 (`*`) 的 `navigation-rule`\
  \ 元素。上述代码表明，对于用户所在的任何页面，如果托管 Bean 的方法返回逻辑名称 `logout`，则将用户转发到 `logout.xhtml` 页面。\n\
  \n前面的示例展示了简单的导航，其中一个页面只有一个导航规则，并且只跳转到一个页面。但情况通常并非如此，根据某些规则或异常，用户可能会被重定向到不同的页面。这在托管\
  \ Bean 和 `faces-config.xml` 文件中也是可行的。以下代码展示了一个 `switch` 分支，它重定向到三个不同的页面。请注意，当返回\
  \ `null` 值时，用户将回到他当前所在的页面。\n\npublic String doNewBookForm() {\n\nswitch (value)\
  \ {\n\nChapter 12 ■ 处理与导航\n\n**341**\n\ncase 1: return \"page1.xhtml\"; break;\n\
  \ncase 2: return \"page2.xhtml\"; break;\n\ncase 3: return \"page3.xhtml\"; break;\n\
  \ndefault: return **null**; break;\n\n}\n\n}\n\n**消息处理**\n\n托管 Bean 处理业务逻辑、调用 EJB\
  \ 和数据库等，有时可能会出错。在这种情况下，必须通过消息通知用户以采取行动。消息可以分为两类：应用程序错误（涉及业务逻辑、数据库或网络连接）和用户输入错误（无效的\
  \ ISBN 或空字段）。\n\n例如，应用程序错误可以生成一个完全不同的页面，要求用户稍后重试。输入错误可以在同一页面中显示，并附带描述错误的文本，消息也可以是信息性的，例如指示一本书已成功添加到数据库。\n\
  \n在上一章中，使用了标签在页面上显示消息（`<h:message>` 和 `<h:messages>`）。为了生成这些消息，JSF 允许您通过在托管 Bean\
  \ 中调用 `FacesContext.addMessage()` 方法来排队消息。该方法的签名如下：\n\nvoid addMessage(String **clientId**,\
  \ **FacesMessage** message)\n\n此方法将一个 `FacesMessage` 附加到要显示的消息集合中。此方法的第一个参数指定一个客户端标识符。此参数引用消息注册到的\
  \ UI 组件 ID。如果 `clientId` 为 `null`，则该消息不引用任何特定组件，并被称为全局消息，适用于所有页面。一条消息包含摘要文本、详细文本和严重性级别（致命、错误、警告和信息）。消息也可以使用消息包进行国际化。\n\
  \n**FacesMessage**(Severity severity, String summary, String detail)\n\n以下代码是一个创建图书的托管\
  \ Bean 的片段。如果创建成功，则会排队一条信息性消息。如果捕获到异常，则会向消息队列添加一条错误消息以供显示。请注意，这两条消息都是全局的，因为 `clientId`\
  \ 为 `null`：\n\nFacesContext ctx = FacesContext.getCurrentInstance();\n\ntry {\n\n\
  book = bookEJB.createBook(book);\n\nctx. **addMessage**(**null**, new **FacesMessage**(FacesMessage.\
  \ **SEVERITY_INFO**, ➥\n\n\"图书已创建\", \"图书\" + book.getTitle() + ➥\n\n\" 已创建，id=\"\
  \ + book.getId()));\n\n} catch (Exception e) {\n\nctx. **addMessage**(**null**,\
  \ new **FacesMessage**(FacesMessage. **SEVERITY_ERROR**,➥\n\n\"图书未创建\", e.getMessage()));\n\
  \n}\n\n![Image 108](img/index-372_1.jpg)\n\n**342**\n\nChapter 12 ■ 处理与导航\n\n这些消息是全局的，可以在页面中使用单个\
  \ `<h:messages>` 标签来显示。但您可能希望为特定组件在页面上的特定位置显示一条消息（验证或转换错误通常就是这种情况）。图 12-5 显示了一个页面，其中有一条专门针对价格输入字段的消息。\n\
  \n**图 12-5.** *为 UI 组件显示消息的页面*\n\n该页面将有一个带有标识符 (`id=\"priceId\"`) 的输入文本字段，并且 `<h:message>`\
  \ 标签将引用该组件 (`for=\"priceId\"`)。结果将是，这条特定消息将仅为此组件显示：\n\n<h:inputText id=\" **priceId**\"\
  \ value=\"#{bookController.book.price}\"/>\n\n<h:message for=\" **priceId**\"/>\n\
  \n如果价格字段未填写，价格输入文本字段旁边会出现一条消息，这时就可以使用 `clientId`，因为组件由其标识符标识。\n\n以下托管 Bean 的代码检查价格，如果无效，则创建一条警告消息，并将其与\
  \ `priceId` 组件 ID 关联：\n\nif (book.getPrice() == null || \"\".equals(book.getPrice()))\
  \ {\n\nctx.addMessage(\" **priceId**\", new FacesMessage(SEVERITY_WARN, ➥\n\n\"\
  请填写价格！\", \"输入一个数值\"));\n\nJSF 将这种消息传递机制用于转换器和验证器。\n\n**转换与验证**\n\n您刚刚了解了如何处理消息以通知最终用户需要采取的操作。一种可能的操作是更正无效的输入值（例如，无效的\
  \ ISBN）。JSF 提供了一种标准的转换和验证机制，可以处理用户输入以确保数据完整性。这样，当您调用业务方法进行处理时，可以安全地依赖有效数据。转换和验证允许开发人员专注于业务逻辑，而不是检查输入数据是否为空、是否在某个值范围内等。\n\
  \n![Image 109](img/index-373_1.jpg)\n\nChapter 12 ■ 处理与导航\n\n**343**\n\n当最终用户输入的数据需要从字符串转换为对象，反之亦然时，就会发生转换。它确保数据是正确类型的——例如，将字符串转换为\
  \ `java.util.Date`，将字符串转换为 `Integer`，或将美元价格转换为欧元。至于验证，它确保数据包含预期的内容（遵循 `dd/MM/yyyy`\
  \ 格式的日期，介于 3.14 和 3.15 之间的浮点数等）。\n\n转换和验证发生在页面生命周期的不同阶段（您在上一章中看到过），如图 12-6 所示。\n\
  \n**图 12-6.** *页面生命周期中的转换与验证*\n\n在图 12-6 的*应用请求值*阶段，UI 组件值被转换为目标对象，然后在*处理验证*阶段进行验证。转换和验证发生在组件数据绑定到支持\
  \ Bean 之前（这发生在*更新模型值*阶段），这是有道理的。如果发现任何错误，将导致添加错误消息并缩短生命周期，因此它会直接进入*渲染响应*阶段（并且消息将通过\
  \ `<h:messages/>` 显示在用户界面上）。在此阶段，支持 Bean 的属性被转换回字符串以进行显示。\n\n\n\nJSF 提供了一套标准的转换器和验证器，并允许你以非常简单的方式创建自己的转换器和验证器。\n\
  \n**转换器**\n\n当表单在浏览器中显示时，最终用户填写输入字段并点击按钮，这会导致数据以字符串格式通过 HTTP 请求传输到服务器。在更新托管 Bean\
  \ 上的模型之前，这些数据必须从字符串转换为目标对象（Float、Integer、BigDecimal 等）。当数据需要在响应中发送回客户端并在浏览器中渲染时，将执行反向操作。\n\
  \nJSF 内置了针对常见类型（如日期和数字）的转换器。当托管 Bean 属性是原始类型（Integer、int、Float、float 等）时，JSF 会自动将\
  \ UI 组件值转换为正确的类型，反之亦然。当属性是其他数据类型时，你需要提供自己的转换器。表 12-3 列出了 `javax.faces.convert` 包中的所有标准转换器。\n\
  \n**344**\n\n第 12 章 ■ 处理与导航\n\n**表 12-3.** *标准转换器*\n\n**转换器**\n\n**描述**\n\nBigDecimalConverter\n\
  \n将 String 转换为 java.math.BigDecimal，反之亦然\n\nBigIntegerConverter\n\n将 String 转换为\
  \ java.math.BigInteger，反之亦然\n\nBooleanConverter\n\n将 String 转换为 Boolean（以及 boolean\
  \ 原始类型），反之亦然\n\nByteConverter\n\n将 String 转换为 Byte（以及 byte 原始类型），反之亦然\n\nCharacterConverter\n\
  \n将 String 转换为 Character（以及 char 原始类型），反之亦然\n\nDateTimeConverter\n\n将 String 转换为\
  \ java.util.Date，反之亦然\n\nDoubleConverter\n\n将 String 转换为 Double（以及 double 原始类型），反之亦然\n\
  \nEnumConverter\n\n将 String 转换为 Enum（以及 enum 原始类型），反之亦然\n\nFloatConverter\n\n将 String\
  \ 转换为 Float（以及 float 原始类型），反之亦然\n\nIntegerConverter\n\n将 String 转换为 Integer（以及 int\
  \ 原始类型），反之亦然\n\nLongConverter\n\n将 String 转换为 Long（以及 long 原始类型），反之亦然\n\nNumberConverter\n\
  \n将 String 转换为抽象的 java.lang.Number 类，反之亦然\n\nShortConverter\n\n将 String 转换为 Short（以及\
  \ short 原始类型），反之亦然\n\n当托管 Bean 属性是某种原始数字类型时，JSF 会自动将输入值转换为数字；当属性是某种日期类型时，则自动转换为日期或时间。如果自动转换不适用，你可以通过标准的\
  \ `convertNumber` 和 `convertDateTime` 标签显式控制转换。要使用这些标签，你需要将转换器嵌套在任何输入或输出标签内。JSF\
  \ 将在生命周期期间调用该转换器。\n\n`convertNumber` 标签具有一些属性，允许将输入值转换为数字（默认）、货币或百分比。你可以指定货币符号或小数位数，以及确定数字应如何格式化和解析的格式模式。\n\
  \n```html\n<h:inputText value=\"#{bookController.book.price}\">\n    <f:**convertNumber**\
  \ currencySymbol=\"$\" type=\"currency\"/>\n</h:inputText>\n```\n\n`convertDateTime`\
  \ 标签可以转换各种格式的日期（日期、时间或两者）。它具有多个控制日期转换和时区的属性。`pattern` 属性允许标识将被转换的日期字符串的模式。\n\n```html\n\
  <h:inputText value=\"#{bookController.book.publishedDate}\">\n    <f:**convertDateTime**\
  \ pattern=\"MM/dd/yy\"/>\n</h:inputText>\n```\n\n**自定义转换器**\n\n有时，转换数字、日期、枚举等是不够的，你可能需要自定义转换。使用\
  \ JSF 开发自己的转换器并在页面中使用它们很容易。\n\n第 12 章 ■ 处理与导航\n\n**345**\n\n你只需编写一个实现 `javax.faces.convert.Converter`\
  \ 接口的类，并使用元数据注册它。该接口有两个方法：\n\n```java\nObject **getAsObject**(FacesContext ctx,\
  \ UIComponent component, String value)\nString **getAsString**(FacesContext ctx,\
  \ UIComponent component, Object value)\n```\n\n`getAsObject()` 方法将 UI 组件的字符串值转换为相应的支持类型，并返回新实例。如果转换失败，此方法会抛出\
  \ `ConverterException`。相反，`getAsString()` 方法将提供的类型转换为字符串，以便在标记语言（如 XHTML）中渲染。\n\n\
  开发自定义转换器后，必须注册它才能使其在 Web 应用程序中使用。一种方法是在 `faces-config.xml` 文件中声明转换器，另一种方法是使用 `@FacesConverter`\
  \ 注解。\n\n清单 12-11 展示了如何编写一个将价格从美元转换为欧元的自定义转换器。它首先使用 `@FacesConverter` 注解将此转换器与名称\
  \ `euroConverter`（`value = \"euroConverter\"`）关联，并实现 `Converter` 接口。此示例仅覆盖了 `getAsString()`\
  \ 方法，该方法返回给定价格以欧元表示的字符串形式。\n\n**清单 12-11.** *欧元转换器*\n\n```java\n**@FacesConverter(value\
  \ = \"euroConverter\")**\npublic class EuroConverter implements **Converter** {\n\
  \n    @Override\n    public Object **getAsObject**(FacesContext ctx, UIComponent\
  \ component,➥\n                                String value) {\n        return value;\n\
  \    }\n\n    @Override\n    public String **getAsString**(FacesContext ctx, UIComponent\
  \ component,➥\n                                Object value) {\n        float amountInDollars\
  \ = Float.parseFloat(value.toString());\n        double ammountInEuros = amountInDollars\
  \ * 0.8;\n        DecimalFormat df = new DecimalFormat(\"###,##0.##\");\n      \
  \  return df.format(ammountInEuros);\n    }\n}\n```\n\n要使用此转换器，可以使用标签的 `converter`\
  \ 属性或 `<f:converter>` 标签。在这两种情况下，都必须传递在 `@FacesConverter` 注解中定义的自定义转换器名称（`euroConverter`）。以下代码显示两个输出文本，一个表示美元价格，另一个将此价格转换为欧元：\n\
  \n```html\n<h:outputText value=\"#{book.price}\"/>\n<h:outputText value=\"#{book.price}\"\
  >\n    < **f:converter** converterId=\" **euroConverter**\"/>\n</h:outputText>\n\
  ```\n\n**346**\n\n第 12 章 ■ 处理与导航\n\n或者，你可以使用 `outputText` 标签的 `converter` 属性：\n\n\
  ```html\n<h:outputText value=\"#{book.price}\" **converter=\"euroConverter\"** />\n\
  ```\n\n**验证器**\n\n在处理 Web 应用程序时，必须确保用户输入数据的准确性。强制输入正确的值可以在客户端使用 JavaScript 完成，也可以在服务器端使用验证器完成。JSF\
  \ 通过使用标准和自定义的服务器端验证器简化了数据验证。验证器通过在 UI 组件值被托管 Bean 处理之前对其进行验证，充当第一级控制。\n\nUI 组件通常处理简单的验证，例如值是否为必填项。例如，以下标签将要求必须在文本字段中输入一个值：\n\
  \n```html\n<h:inputText value=\"#{bookController.book.title}\" **required=\"true\"\
  ** />\n```\n\n如果未输入值，JSF 会返回页面并显示一条消息，指示应输入一个值（页面必须包含 `<h:messages>` 标签）。这使用了之前描述过的相同消息机制。但是\
  \ JSF 附带了一组更丰富的验证器可供使用（在表 12-4 中描述），这些验证器定义在 `javax.faces.validator` 包中。\n\n**表\
  \ 12-4.** *标准验证器*\n\n**转换器**\n\n**描述**\n\nDoubleRangeValidator\n\n根据指定的最小和最大 double\
  \ 值检查相应组件的值\n\nLengthValidator\n\n检查关联组件字符串值的字符数\n\nLongRangeValidator\n\n根据指定的最小和最大\
  \ long 值检查相应组件的值\n\nRegexValidator\n\n根据正则表达式检查相应组件的值\n\n\n\n这些验证器适用于通用场景，例如字段长度或数字范围，并且可以像转换器一样轻松地与组件关联（两者可在同一组件上使用）。以下代码确保书籍标题长度在\
  \ 2 到 20 个字符之间，价格在 1 到 500 美元之间。\n\n<h:inputText value=\"#{bookController.book.title}\"\
  \ required=\"true\">\n\n<f:**validateLength** minimum=\"2\" maximum=\"20\"/>\n\n\
  </h:inputText>\n\n<h:inputText value=\"#{bookController.book.price}\">\n\n<f:**validateLongRange**\
  \ minimum=\"1\" maximum=\"500\"/>\n\n</h:inputText>\n\n第 12 章 ■ 处理与导航\n\n**347**\n\
  \n**自定义验证器**\n\n标准的 JSF 验证器可能无法满足您的需求；您可能需要处理必须遵循特定业务格式的数据，例如邮政编码、州名或电子邮件地址。您必须创建自己的自定义验证器来处理这些情况。与转换器类似，验证器是一个需要实现接口并重写某些方法的类。对于验证器而言，其接口是`javax.faces.validator.Validator`，它包含一个单一的`validate()`方法：\n\
  \nvoid **validate**(FacesContext context, UIComponent component, Object value)\n\
  \n在此方法中，`value`参数是需要根据某些业务逻辑进行检查的值。如果通过验证检查，您可以直接从该方法返回，页面的生命周期将继续。如果未通过，您可以抛出一个`ValidatorException`，并附带一个包含摘要和详细描述验证错误的`FacesMessage`，然后通过在`faces-config.xml`中注册或使用`@FacesValidator`注解来注册验证器。\n\
  \n例如，创建一个 ISBN 验证器，确保用户输入的书籍 ISBN 遵循特定格式。清单 12-12 展示了`IsbnValidator`的代码。\n\n**清单\
  \ 12-12.** *一个 ISBN 验证器*\n\n**@FacesValidator(value = \"isbnValidator\")**\n\npublic\
  \ class IsbnValidator implements **Validator** {\n\nprivate Pattern pattern;\n\n\
  private Matcher matcher;\n\n@Override\n\npublic void **validate**(FacesContext context,\
  \ UIComponent component, ➥\n\nObject value) throws ValidatorException {\n\nString\
  \ componentValue = value.toString();\n\npattern = Pattern.compile(\"(?=[-0-9xX]{13}$)\"\
  );\n\nmatcher = pattern.matcher(componentValue);\n\nif (!matcher.find()) {\n\nString\
  \ message = MessageFormat.format(➥\n\n\"{0} is not a valid isbn format\", componentValue);\n\
  \nFacesMessage facesMessage = new FacesMessage(SEVERITY_ERROR, ➥\n\nmessage, message);\n\
  \nthrow new ValidatorException(facesMessage);\n\n}\n\n}\n\n}\n\n清单 12-12 中的代码首先将验证器与名称`isbnValidator`关联，以便在页面中使用。它实现了`Validator`接口，并将验证逻辑添加到`validate()`方法中。它使用正则表达式检查\
  \ ISBN 格式是否正确。如果不正确，它会向上下文中添加一条消息并抛出一个异常。JSF 将\n\n**348**\n\n第 12 章 ■ 处理与导航\n\n\
  自动恢复页面的生命周期，重新调用页面，并显示错误消息。\n\n您可以在页面中使用`validator`属性或嵌入`<f:validator>`标签来使用此自定义验证器：\n\
  \n<h:inputText value=\"#{book.isbn}\" **validator**=\"isbnValidator\"/>\n\n// 或者\n\
  \n<h:inputText value=\"#{book.isbn}\">\n\n<f:**validator** validatorId=\"isbnValidator\"\
  \ />\n\n</h:inputText>\n\n**Ajax**\n\nHTTP 协议基于请求/响应机制：客户端需要某些内容，发送请求，并从服务器接收响应，通常是一个完整的网页。通信遵循此方向：客户端向服务器请求内容，反之则不然。然而，Web\
  \ 应用程序必须提供丰富且响应迅速的界面，并且必须对服务器事件做出反应、更新页面部分内容、聚合小部件等。在正常的请求/响应情况下，即使只有一小部分需要更改，服务器也必须发送整个网页。如果页面很大，将会占用过多带宽并导致响应缓慢，因为浏览器需要加载整个页面。\n\
  \n如果您想提高浏览器的响应速度并改善用户的浏览体验，您只需要更新页面的一小部分。而这可以通过 Ajax 实现。\n\nAjax（最初代表异步 JavaScript\
  \ 和 XML）是一组用于创建交互式 Web 应用程序的 Web 开发技术。Ajax 允许 Web 应用程序异步地从服务器检索部分数据，而不会干扰现有页面的显示和行为。一旦客户端接收到数据，只需使用页面的文档对象模型（DOM）和\
  \ JavaScript 更新需要更新的部分。还有一种称为*反向 Ajax*（或 Comet 编程）的机制，用于将数据从服务器推送到浏览器。这些机制在我们日常使用的大多数\
  \ Web 应用程序中都有应用，JSF 2.0 已引入对它们的支持。\n\n**一般概念**\n\n*Ajax*一词于 2005 年提出，指的是一组用于将异步数据加载到网页中的替代技术。早在\
  \ 1999 年，微软就在 Internet Explorer 5 中创建了`XMLHttpRequest`对象作为 ActiveX 控件。2006 年，万维网联盟（W3C）发布了`XMLHttpRequest`对象的第一个规范草案，该对象现在已得到大多数浏览器的支持。与此同时，几家公司集思广益，探讨如何确保\
  \ Ajax 能够成为基于开放技术的丰富应用程序平台的行业标准。这项工作的成果是创建了 OpenAjax 联盟，该联盟由供应商、开源项目和使用基于 Ajax 技术的公司组成。\n\
  \n如图 12-7 所示，在传统的 Web 应用程序中，浏览器必须向服务器请求完整的 HTML 文档。用户单击按钮发送或获取信息，等待服务器响应，然后接收浏览器加载的整个页面。另一方面，Ajax\
  \ 在浏览器和服务器之间使用异步数据传输（HTTP 请求），允许网页从服务器请求少量信息（JSON 或 XML 数据），而不是整个页面。用户停留在同一页面上，而一段\
  \ JavaScript\n\n![Image 110](img/index-379_1.jpg)\n\n第 12 章 ■ 处理与导航\n\n**349**\n\
  \n异步地向服务器请求或发送数据，并且只有部分页面被实际刷新，从而使 Web 应用程序更快、更用户友好。\n\n**图 12-7.** *普通 HTTP 调用与\
  \ Ajax HTTP 调用*\n\n原则上，Ajax 基于以下内容：\n\n• XHTML 和 CSS 用于呈现\n\n• DOM 用于动态显示和与数据交互\n\
  \n• XML 和 XSLT 用于 XML 数据的交换、操作和显示\n\n• `XMLHttpRequest`对象用于异步通信\n\n• JavaScript\
  \ 用于将这些技术整合在一起\n\n`XMLHttpRequest`是 Ajax 的重要组成部分，因为它是 JavaScript 用于将 XML 从浏览器传输到服务器的\
  \ DOM API。返回的数据必须在客户端获取，以便使用 JavaScript 动态更新页面部分内容。数据可以有多种格式，例如 XHTML、JSON，甚至纯文本。\n\
  \n从 JSF 2.0 开始，Ajax 得到原生支持，因此您无需开发 JavaScript 来处理`XMLHttpRequest`，但您需要使用一个已指定并随\
  \ JSF 实现一起提供的 JavaScript 库。\n\n**JSF 中的支持**\n\n\n\nJSF 的早期版本没有提供原生 Ajax 解决方案，因此必须使用第三方库来填补这一空白。有时这会以牺牲性能为代价，增加代码的复杂性。随着\
  \ JSF 2.0 的推出，事情变得简单多了，因为 Ajax 支持已被规范化，并内置于任何 JSF 实现中。\n\n首先，有一个用于执行 Ajax 交互的指定\
  \ JavaScript 库（`jsf.js`），这意味着你无需开发自己的脚本，也无需直接操作 `XMLHttpRequest` 对象。无需开发任何 JavaScript，你就可以使用一组标准化函数来发送异步请求并接收数据。为了在你的页面中使用这个库，你需要通过以下代码行添加\
  \ `jsf.js` 资源：\n\n<h:outputScript name=\"**jsf.js**\" library=\"**javax.faces**\"\
  \ target=\"head\"/>\n\n`<h:outputScript>` 标签会渲染一个 `<script>` 标记元素，该元素引用 `javax.faces`\
  \ 库中的 `jsf.js` JavaScript 文件。请注意，顶层的 `javax` 命名空间已在 OpenAjax 联盟中注册。此 JavaScript\
  \ API 用于启动与 JSF 的客户端交互，包括部分树遍历和部分页面更新。我们将在页面中直接使用的函数是 `request` 函数，因为它负责向服务器发送 Ajax\
  \ 请求。其签名如下：\n\njsf.ajax.request(ELEMENT, |event|, { |OPTIONS| });\n\n`ELEMENT` 是触发事件的任何\
  \ JSF 组件或 XHTML 元素。通常，对于提交表单，该元素会是一个按钮。`EVENT` 是该元素支持的任何 JavaScript 事件，例如 `onmousedown`、`onclick`、`onblur`\
  \ 等。`OPTIONS` 参数是一个数组，可能包含以下名称/值对：\n\n• `execute: '<以逗号分隔的 UI 组件 ID 列表>'`：将组件 ID\
  \ 列表发送到服务器，以便在请求的执行阶段进行处理。\n• `render: '<以逗号分隔的 UI 组件 ID 列表>'`：渲染在请求的渲染阶段已处理的组件\
  \ ID 列表。\n\n例如，以下代码显示了一个按钮，当用户点击该按钮时（`onclick` 事件），会调用 `jsf.ajax.request` 函数。`this`\
  \ 参数引用元素本身（按钮），而 `options` 引用组件 ID：\n\n<h:commandButton id=\"submit\" value=\"创建一本书\"\
  \n    onclick=\"**jsf.ajax.request**(**this**, event,\n        {**execute**:'isbn\
  \ title price description nbOfPage illustrations',\n         **render**:'booklist'});\
  \ return false;\"\n    actionListener=\"#{bookController.doCreateBook}\" />\n\n\
  当客户端发起 Ajax 请求时，服务器端的页面生命周期保持不变（它经历相同的六个阶段）。关键优势在于，响应只是返回一小块数据，而不是向浏览器返回一个大型 HTML\
  \ 页面。*应用请求*阶段确定当前请求是否为“部分请求”，并且 `PartialViewContext` 对象在整个页面生命周期中使用。它包含与部分请求处理和部分响应渲染相关的方法和属性。在生命周期结束时，Ajax\
  \ 响应（或者严格来说，部分响应）会在*渲染响应*阶段发送给客户端。它通常由 XHTML、XML 或 JSON 组成，客户端 JavaScript 将对其进行解析。\n\
  \n**综合应用**\n\n清单 12-13 中显示的示例说明了如何使用 Ajax 及其在 JSF 中的支持这一通用背景知识。第 10 章的“综合应用”部分展示了如何使用\
  \ `BookController` 托管 Bean 将新书插入数据库。导航很简单，因为一旦书籍创建完成，你就会被重定向到显示书籍列表的页面。通过点击链接，你可以从列表返回到书籍表单。让我们以这个示例为例，并添加一些\
  \ Ajax 功能。\n\n\n\n现在，你只需要一个页面，顶部有一个用于输入图书数据的表单，底部有一个图书列表（见图 12-8）。每次通过点击按钮创建新书时，列表都会刷新，显示新创建的图书。\n\
  \n**图 12-8.** *一个用于创建和列出图书的单页面*\n\n页面顶部的表单保持不变，只有列表部分需要刷新。清单 12-13 中的代码是页面的第一部分，代表表单。\n\
  \n首先，为了集成 Ajax，页面需要使用`<h:outputScript>`标签定义`jsf.js` JavaScript 库。与第 10 章的代码相比，实际上没有变化。`bookCtrl`变量引用的是`BookController`托管\
  \ Bean，它负责所有业务逻辑（调用 EJB 来持久化和检索图书）。`Book`是实体，其属性通过表达式语言访问（`#{bookCtrl.book.isbn}`绑定到\
  \ ISBN）。每个输入组件都有一个标识符（`id=\"isbn\"`、`id=\"title\"`等）。这一点非常重要，因为它为每个需要与服务器异步交互的 DOM\
  \ 节点提供了标识符。\n\n标识符在整个页面中必须是唯一的，因为应用程序必须能够将数据映射到特定的组件。\n\n**清单 12-13.** *newBook.xhtml\
  \ 页面的表单部分*\n\n```html\n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\
  \n    \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\">\n<html xmlns=\"\
  http://www.w3.org/1999/xhtml\"\n      xmlns:h=\"http://java.sun.com/jsf/core\">\n\
  <h:head>\n    <title>创建新书</title>\n</h:head>\n<h:body>\n    <h:outputScript name=\"\
  jsf.js\" library=\"javax.faces\" target=\"head\"/>\n    <h1>创建新书</h1>\n    <hr/>\n\
  \    <h:form id=\"form\" prependId=\"false\">\n        <table border=\"0\">\n  \
  \          <tr>\n                <td><h:outputLabel value=\"ISBN : \"/></td>\n \
  \               <td><h:inputText id=\"isbn\" value=\"#{bookCtrl.book.isbn}\"/></td>\n\
  \            </tr>\n            <tr>\n                <td><h:outputLabel value=\"\
  标题 :\"/></td>\n                <td><h:inputText id=\"title\" value=\"#{bookCtrl.book.title}\"\
  /></td>\n            </tr>\n            <tr>\n                <td><h:outputLabel\
  \ value=\"价格 : \"/></td>\n                <td><h:inputText id=\"price\" value=\"\
