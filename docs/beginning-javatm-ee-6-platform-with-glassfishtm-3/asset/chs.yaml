  \n**总结**\n\n当公司开发 Java 应用程序并需要添加事务管理、安全性、并发性或消息传递等企业级功能时，Java EE 是一个颇具吸引力的选择。\n\n\
  它是标准化的，组件部署到不同的容器中，从而为您提供众多服务，并且能与各种协议协同工作。Java EE 6 沿袭了其先前版本的路径，在 Web 层增加了易用性。该平台版本更轻量（得益于精简、配置文件和\
  \ EJB Lite）、更易用（无需 EJB 接口或 Web 层注解）、更丰富（包含新规范和新功能）且更具可移植性（包含标准化的嵌入式 EJB 容器并允许使用\
  \ JNDI 名称）。\n\n在本章的第二部分，我重点介绍了开发环境的搭建。本书包含多个代码片段和“综合实践”部分。您需要若干工具和框架来编译、部署、运行和测试代码：JDK\
  \ 1.6、Maven 2、JUnit 4、Derby 10.4 和 GlassFish v3。\n\n在本章中，我为您快速概述了 Java EE 6。后续章节将致力于深入研究\
  \ Java EE 6 规范。\n\n第 2 章\n\nJava 持久化\n\n**应**用程序由业务逻辑、与其他系统的交互、用户界面……以及持久化组成。我们的应用程序所操作的大部分数据都必须存储在数据库中，以便检索和分析。数据库很重要：它们存储业务数据，充当应用程序之间的中心点，并通过触发器或存储过程处理数据。\n\
  \n持久化数据无处不在，大多数情况下，它使用关系数据库作为底层持久化引擎。*关系数据库*将数据存储在由行和列组成的表中。\n\n数据通过*主键*进行标识，主键是具有唯一性约束（有时还有索引）的特殊列。表之间的关系使用*外键*和具有完整性约束的*连接表*。\n\
  \n所有这些术语在像 Java 这样的面向对象语言中是完全未知的。\n\n在 Java 中，我们操作的是类的实例对象。对象继承自其他对象，拥有对其他对象集合的引用，有时还会以递归方式指向自身。我们有具体类、抽象类、接口、枚举、注解、方法、属性等等。对象以良好的方式封装了状态和行为，但这种状态仅在\
  \ Java 虚拟机（JVM）运行时才可访问：如果 JVM 停止或垃圾回收器清理其内存内容，对象及其状态都会消失。某些对象需要持久化。所谓持久化数据，我指的是有意以永久形式存储在磁介质、闪存等上的数据。能够存储其状态以供后续重用的对象被称为持久化对象。\n\
  \n在 Java 中有多种持久化状态的方法。一种方法是通过序列化机制，即将对象转换为位序列的过程。对象可以序列化到磁盘上，或通过网络连接（包括互联网）传输，采用独立于操作系统的格式，以便在不同操作系统间重用。Java\
  \ 通过实现 `java.io.Serializable` 接口提供了一种简单、透明且标准的序列化机制。这种机制虽然非常简单，但功能较弱。它既没有查询语言，也没有支持高并发访问或集群的基础设施。\n\
  \n另一种持久化状态的方法是通过 Java 数据库连接（JDBC），它是访问关系数据库的标准 API。它可以连接到数据库，执行结构化查询语言（SQL）语句，并返回结果。自\
  \ 1.1 版本以来，该 API 一直是 Java 平台的一部分。尽管仍被广泛使用，但它有被更强大的对象关系映射（ORM）工具所取代的趋势。\n\nORM 的原理是将对关系数据库的访问委托给外部工具或框架，这些工具或框架反过来提供关系数据的面向对象视图，反之亦然。映射工具在数据库和对象之间建立双向对应关系。有几种\n\
  \n**42**\n\n第 2 章 ■ Java 持久化\n\n框架可以实现这一点，例如 Hibernate、TopLink 和 Java 数据对象（JDO），但\
  \ Java 持久化 API（JPA）是首选技术，因为它已被包含在 Java EE 6 中。\n\n**JPA 规范概述**\n\nJPA 1.0 随 Java\
  \ EE 5 一同创建，旨在解决数据持久化问题。它将面向对象模型和关系模型结合在一起。在 Java EE 6 中，JPA 2.0 遵循了同样的简洁性和健壮性路径，并增加了新功能。您可以使用此\
  \ API 从企业 Java Bean（EJB）、Web 组件和 Java SE 应用程序访问和操作关系数据。\n\nJPA 是 JDBC 之上的一个抽象层，使其能够独立于\
  \ SQL。此 API 的所有类和注解都位于 `javax.persistence` 包中。JPA 的主要组件如下：\n\n*   ORM，一种将对象映射到存储在关系数据库中的数据的机制。\n\
  *   实体管理器 API，用于执行与数据库相关的操作，例如创建、读取、更新、删除（CRUD）操作。此 API 允许您避免直接使用 JDBC API。\n* \
  \  Java 持久化查询语言（JPQL），允许您使用面向对象的查询语言检索数据。\n*   由 Java 事务 API（JTA）提供的并发访问数据时的事务和锁定机制。JPA\
  \ 也支持资源本地（非 JTA）事务。\n*   回调和监听器，用于将业务逻辑挂钩到持久化对象的生命周期中。\n\n**规范简史**\n\n\n\nORM 解决方案已经存在了很长时间，甚至早于\
  \ Java。像 TopLink 这样的产品最初于 1994 年使用 Smalltalk 开发，后来才转向 Java。自 Java 语言诞生之初，像 TopLink\
  \ 这样的商业 ORM 产品就已经可用。它们很成功，但从未在 Java 平台上实现标准化。一种类似 ORM 的方法以 JDO 的形式被标准化，但未能获得任何显著的市场份额。\n\
  \n1998 年，EJB 1.0 被创建，随后随 J2EE 1.2 一起发布。它是一个用于事务性业务逻辑的重量级分布式组件。实体容器管理持久化（CMP）在 EJB\
  \ 1.0 中被引入，并在直到 EJB 2.1（J2EE 1.4）的各个版本中得到了增强。持久化只能在容器内部通过使用 home、local 或 remote\
  \ 接口进行实例化的复杂机制来完成。ORM 功能也非常有限，因为继承关系很难映射。\n\n与 J2EE 世界并行的是一个流行的开源解决方案，它导致了持久化方向的一些令人惊讶的变化：Hibernate，它重新引入了一个轻量级的、面向对象的持久化模型。\n\
  \n在对实体 CMP 2.*x* 组件抱怨多年之后，并且认识到像 Hibernate 这样的开源框架的成功和简洁性，企业版的持久化模型在 Java EE 5 中被完全重新架构。JPA\
  \ 1.0 诞生了\n\n第 2 章 ■ Java 持久化\n\n**43**\n\n它采用了一种非常轻量级的方法，吸收了许多 Hibernate 的设计原则。JPA\
  \ 1.0 规范与 EJB 3.0（JSR 220）捆绑在一起。\n\n如今，随着 Java EE 6 的出现，第二版的 JPA 遵循了易于开发的路径，并带来了新特性。它已经通过其专用的规范\
  \ JSR 317 发展演变。\n\n**JPA 2.0 的新特性是什么？**\n\n如果说 JPA 1.0 是其前身实体 CMP 2.*x* 的一个全新的持久化模型，那么\
  \ JPA 2.0 则是 JPA 1.0 的延续。它保留了使用注解和可选 XML 映射文件的面向对象方法。这第二个版本带来了新的 API，扩展了 JPQL，并增加了以下新功能：\n\
  \n*   简单数据类型（String、Integer 等）和可嵌入对象的集合现在可以映射到单独的表中。以前，你只能映射实体的集合。\n*   对 Map 的支持已经扩展，使得\
  \ Map 可以拥有基本类型、实体或可嵌入对象的键和值。\n*   现在可以通过 `@OrderColumn` 注解来维护持久化的顺序。\n*   孤儿删除允许在父对象被删除时，从关系中移除子对象。\n\
  *   乐观锁定已经得到支持，但现在引入了悲观锁定。\n*   引入了一个全新的查询定义 API，允许以面向对象的方式构建查询。\n*   JPQL 语法更丰富（例如，现在允许\
  \ case 表达式）。\n*   可嵌入对象现在可以嵌套到其他可嵌入对象中，并且可以与实体建立关系。\n*   点（.）导航语法已扩展，以处理具有关系的可嵌入对象以及可嵌入对象的可嵌入对象。\n\
  *   添加了对新缓存 API 的支持。\n\n我将在第 3、4 和 5 章中详细讨论这些功能。\n\n**参考实现**\n\nEclipseLink 1.1\
  \ 是 JPA 2.0 的一个开源实现。它提供了一个强大而灵活的框架，用于将 Java 对象存储在关系数据库中。EclipseLink 是一个 JPA 实现，但它也通过\
  \ Java XML 绑定（JAXB）和其他方式（如服务数据对象（SDO））支持 XML 持久化。它不仅支持 ORM，还支持对象 XML 映射（OXM）、使用\
  \ Java EE 连接器架构（JCA）向企业信息系统（EIS）进行对象持久化，以及数据库 Web 服务。\n\nEclipseLink 源于 2006 年捐赠给\
  \ Eclipse 基金会的 Oracle TopLink 产品。EclipseLink 是 JPA 参考实现，也是本书中使用的持久化框架。它也被称为*持久化提供者*，或简称为*提供者*。\n\
  \n**44**\n\n第 2 章 ■ Java 持久化\n\n**理解实体**\n\n在讨论将对象映射到关系数据库、持久化对象或查询对象时，应该使用术语“实体”而不是“对象”。对象只是存在于内存中的实例。实体是短暂存在于内存中并持久存在于数据库中的对象。它们具有映射到数据库的能力；它们可以是具体的或抽象的；并且它们支持继承、关系等。这些实体一旦被映射，就可以由\
  \ JPA 管理。你可以将实体持久化到数据库中，删除它，并使用查询语言（Java 持久化查询语言，或 JPQL）查询它。ORM 允许你在底层访问数据库的同时操作实体。正如你将看到的，实体遵循一个定义好的生命周期。通过回调方法和监听器，JPA\
  \ 允许你将一些业务代码挂接到生命周期事件上。\n\n**对象-关系映射**\n\nORM 的原则是将创建对象和表之间对应关系的任务委托给外部工具或框架（在我们的例子中是\
  \ JPA）。然后，类、对象和属性的世界可以被映射到由包含行和列的表组成的关系数据库。映射为开发人员提供了一个面向对象的视图，他们可以透明地使用实体而不是表。那么\
  \ JPA 是如何将对象映射到数据库的呢？通过*元数据*。\n\n与每个实体相关联的是描述映射的元数据。这些元数据使持久化提供者能够识别实体并解释映射。这些元数据可以用两种不同的格式编写：\n\
  \n*   *注解*：实体的代码直接使用 `javax.persistence` 包中描述的各种注解进行注解。\n*   *XML 描述符*：作为注解的替代（或补充），你可以使用\
  \ XML 描述符。映射定义在一个外部的 XML 文件中，该文件将与实体一起部署。例如，当数据库配置因环境而异时，这会非常有用。\n\n为了使映射更容易，JPA（像许多其他\
  \ Java EE 6 规范一样）使用了*例外配置*（有时称为*例外编程*）的概念。其思想是 JPA 具有某些默认的映射规则（例如，表名与实体名相同）。如果你对这些规则满意，则无需使用额外的元数据（不需要注解或\
  \ XML），但如果你不希望提供者应用默认规则，则可以使用元数据根据你自己的需求自定义映射。换句话说，必须提供配置是规则的例外情况。\n\n那么，让我们看看这如何应用于一个实体。清单\
  \ 2-1 展示了一个带有一些属性的 Book 实体。如你所见，其中一些属性被注解了（id、title 和 description），而另一些则没有。\n\n\
  **清单 2-1.** *一个简单的 Book 实体*\n\n**@Entity**\n\npublic class Book {\n\n**@Id @GeneratedValue**\n\
  \nprivate Long id;\n\n![Image 25](img/index-75_1.jpg)\n\n第 2 章 ■ Java 持久化\n\n**45**\n\
  \n**@Column(nullable = false)**\n\nprivate String title;\n\nprivate Float price;\n\
  \n**@Column(length = 2000)**\n\nprivate String description;\n\nprivate String isbn;\n\
  \nprivate Integer nbOfPage;\n\nprivate Boolean illustrations;\n\n// 构造方法、getter、setter\n\
  \n}\n\n为了被识别为实体，Book 类必须使用 `@javax.persistence.Entity` 进行注解（或使用 XML 等效项）。`@javax.persistence.Id`\
  \ 注解用于表示标识符。\n\n\n\n主键，该标识符的值由持久化提供程序自动生成（@GeneratedValue）。@Column 注解用于某些属性，以自定义默认的列映射（title\
  \ 变为不可为空，description 的长度为 2000 个字符）。然后，持久化提供程序将能够把 Book 实体映射到 BOOK\n\n表（这是一个默认的映射规则），生成一个主键，并将属性的值同步到表的列中。图\
  \ 2-1 展示了实体与表之间的映射关系。\n\n**图 2-1.** *Book 实体被映射到 BOOK 表。*\n\n正如你将在第 3 章中看到的，映射功能非常丰富，允许你映射从对象到关系的各种内容。面向对象编程的世界充满了类以及类之间的关联（以及类的集合）。数据库也对关系进行建模，只是方式不同：使用外键或连接表。JPA\
  \ 有一套元数据来管理关系的映射。甚至继承也可以被映射。开发人员通常使用继承来重用代码，但这一概念在关系数据库中本身是未知的（因为它们必须使用外键和约束来模拟继承）。即使继承映射会带来一些复杂性，JPA\
  \ 也支持它，并为你提供了三种不同的策略可供选择。这些策略将在第 3 章中描述。\n\n**查询实体**\n\nJPA 允许你将实体映射到数据库，并且还可以使用不同的条件来查询它们。\n\
  \nJPA 的强大之处在于，它提供了以面向对象的方式查询实体及其关系的能力，而无需使用底层数据库的外键或列。负责编排实体的 API 核心部分是实体管理器。它的作用是管理实体，从给定的数据库中读取和写入数据，并允许对实体进行简单的\
  \ CRUD 操作\n\n![Image 26](img/index-76_1.jpg)\n\n**46**\n\n第 2 章 ■ Java 持久化\n\n以及使用\
  \ JPQL 进行复杂查询。从技术上讲，实体管理器只是一个接口，其实现由持久化提供程序 EclipseLink 完成。下面的代码片段向你展示了如何创建实体管理器并持久化一个\
  \ Book 实体：EntityManagerFactory emf = Persistence.createEntityManagerFactory(\"chapter02PU\"\
  ); EntityManager em = emf.createEntityManager();\n\nem.persist(book);\n\n在图 2-2\
  \ 中，你可以看到 EntityManager 接口如何被一个类（此处为 Main）用来操作实体（此处为 Book）。通过使用 persist() 和 find()\
  \ 等方法，实体管理器隐藏了对数据库的 JDBC 调用以及 INSERT 或 SELECT SQL 语句。\n\n**图 2-2.** *实体管理器与实体及底层数据库进行交互。*\n\
  \n实体管理器还允许你查询实体。此处的*查询*类似于数据库查询，不同之处在于 JPA 使用 JPQL 对实体进行查询，而不是使用 SQL。其语法使用了熟悉的对象点\
  \ (.) 表示法。要检索所有标题为 *H2G2* 的书籍，你可以编写以下语句：\n\nSELECT b FROM Book b WHERE b.title =\
  \ 'H2G2'\n\nJPQL 语句可以通过动态查询（在运行时动态创建）、静态查询（在编译时静态定义）甚至原生 SQL 语句来执行。\n\n静态查询，也称为命名查询，可以使用注解或\
  \ XML 元数据来定义。例如，上述 JPQL 语句可以定义为 Book 实体上的一个命名查询。\n\n清单 2-2 展示了一个 Book 实体，它使用 @NamedQuery\
  \ 注解定义了名为 findBookByTitle 的命名查询。\n\n**清单 2-2.** *一个名为 findBookByTitle 的命名查询*\n\n\
  @Entity\n\n**@NamedQuery(name = \"findBookByTitle\",** ➥\n\n**query = \"SELECT b\
  \ FROM Book b WHERE b.title ='H2G2'\")**\n\npublic class Book {\n\n![Image 27](img/index-77_1.jpg)\n\
  \n第 2 章 ■ Java 持久化\n\n**47**\n\n@Id @GeneratedValue\n\nprivate Long id;\n\n@Column(nullable\
  \ = false)\n\nprivate String title;\n\nprivate Float price;\n\n@Column(length =\
  \ 2000)\n\nprivate String description;\n\n\n\nprivate String isbn;\n\nprivate Integer\
  \ nbOfPage;\n\nprivate Boolean illustrations;\n\n// 构造方法、getter、setter\n\n}\n\n\
  正如你将在第 4 章中看到的，`EntityManager.createNamedQuery()` 方法用于执行查询并返回符合搜索条件的 Book 实体列表。\n\
  \n**回调和监听器**\n\n实体只是由实体管理器管理（或不管理）的普通 Java 对象（POJO）。当它们被管理时，它们具有持久化标识，并且其状态与数据库同步。当它们不被管理时（即与实体管理器分离），它们可以像任何其他\
  \ Java 类一样使用。这意味着实体具有生命周期，如图 2-3 所示。当你使用 `new` 运算符创建 Book 实体的实例时，该对象存在于内存中，而 JPA\
  \ 对此一无所知（它甚至可能最终被垃圾回收）。当它被实体管理器管理时，其状态会被映射并与 BOOK 表同步。调用 `EntityManager.remove()`\
  \ 方法会从数据库中删除数据，但 Java 对象会继续存在于内存中，直到被垃圾回收。\n\n**图 2-3.** *实体的生命周期*\n\n对实体执行的操作分为四类：持久化、更新、删除和加载，分别对应数据库的插入、更新、删除和选择操作。每个操作都有一个“前”和“后”事件（加载操作除外，它只有“后”事件），实体管理器可以拦截这些事件以调用业务方法。\n\
  \n**48**\n\n第 2 章 ■ Java 持久化\n\n如你将在第 5 章中看到的，你将看到 `@PrePersist` 和 `@PostPersist`\
  \ 等注解。JPA 允许你在这些事件发生时将业务逻辑挂接到实体上。这些注解可以设置在实体方法（即回调方法）或外部类（即监听器）上。你可以将回调方法和监听器视为关系数据库中的触发器。\n\
  \n**整合所有内容**\n\n现在你对 JPA、EclipseLink、实体、实体管理器和 JPQL 有了一些了解，让我们将它们整合在一起，编写一个将实体持久化到数据库的小型应用程序。\n\
  \n思路是编写一个简单的 Book 实体和一个持久化图书的 Main 类。然后你将使用 Maven 2 编译它，并使用 EclipseLink 和 Derby\
  \ 客户端数据库运行它。为了展示对实体进行单元测试是多么容易，我将向你展示如何使用 JUnit 4 测试用例编写一个测试类（BookTest），并使用 Derby\
  \ 的嵌入式模式通过内存数据库持久化数据。\n\n此示例遵循 Maven 目录结构，因此类和文件必须放置在以下目录中：\n\n• `src/main/java`：用于存放\
  \ Book 实体和 Main 类\n• `src/main/resources`：用于存放 Main 类使用的 `persistence.xml` 文件\n\
  • `src/test/java`：用于存放用于单元测试的 BookTest 类\n• `src/test/resources`：用于存放测试用例使用的 `persistence.xml`\
  \ 文件\n• `pom.xml`：用于存放 Maven 项目对象模型（POM），它描述了项目及其对其他外部模块和组件的依赖关系\n\n**编写 Book 实体**\n\
  \n清单 2-3 中所示的 Book 实体需要在 `src/main/java` 目录下开发。它有几个不同数据类型（String、Float、Integer 和\
  \ Boolean）的属性（标题、价格等）以及一些 JPA 注解：\n\n• `@Entity` 通知持久化提供者此类是一个实体，并且应该对其进行管理。\n•\
  \ `@Id` 将 `id` 属性定义为主键。\n• `@GeneratedValue` 注解通知持久化提供者使用底层数据库的 id 工具自动生成主键。\n•\
  \ `@Column` 注解用于指定 `title` 属性在持久化时必须非空，并更改列 `description` 的默认最大长度。\n• `@NamedQuery`\
  \ 注解定义了一个命名查询，该查询使用 JPQL 从数据库中检索所有图书。\n\n第 2 章 ■ Java 持久化\n\n**49**\n\n\n\n**清单\
  \ 2-3.** *包含命名查询的图书实体*\n\n**package com.apress.javaee6.chapter02;**\n\n**@Entity**\n\
  \n**@NamedQuery**(name = \"findAllBooks\", query = \"SELECT b FROM Book b\") public\
  \ class Book {\n\n**@Id @GeneratedValue**\n\nprivate Long id;\n\n**@Column(nullable\
  \ = false)**\n\nprivate String title;\n\nprivate Float price;\n\n**@Column(length\
  \ = 2000)**\n\nprivate String description;\n\nprivate String isbn;\n\nprivate Integer\
  \ nbOfPage;\n\nprivate Boolean illustrations;\n\n// 构造方法、getter、setter\n\n}\n\n\
  请注意，为了更好的可读性，我省略了该类的构造方法、getter 和 setter。如代码所示，除了一些注解外，Book 是一个简单的 POJO。现在让我们编写一个\
  \ Main 类，将图书持久化到数据库中。\n\n**编写 Main 类**\n\nMain 类（如清单 2-4 所示）与 Book 实体位于同一目录下。它首先创建\
  \ Book 实体的一个新实例（使用 Java 关键字 new），并为其属性设置一些值。这里没有什么特别的，只是纯 Java 代码。然后，它使用 Persistence\
  \ 类获取一个 EntityManagerFactory 实例，该实例引用一个名为 chapter02PU 的持久化单元，我将在后面的“Main 类的持久化单元”部分对此进行描述。该工厂创建一个\
  \ EntityManager 实例（em 变量）。如前所述，实体管理器是 JPA 的核心部分，因为它能够创建事务、使用 EntityManager.persist()\
  \ 方法持久化 Book 对象，然后提交事务。在 main() 方法的末尾，EntityManager 和 EntityManagerFactory 都会被关闭，以释放提供者的资源。\n\
  \n**清单 2-4.** *持久化图书实体的 Main 类*\n\npackage com.apress.javaee6.chapter02;\n\npublic\
  \ class Main {\n\npublic static void main(String[] args) {\n\n// 创建一个图书实例\n\n**Book\
  \ book = new Book();**\n\nbook.setTitle(\"The Hitchhiker's Guide to the Galaxy\"\
  );\n\nbook.setPrice(12.5F);\n\n**50**\n\n第 2 章 ■ Java 持久化\n\nbook.setDescription(\"\
  Science fiction comedy book\");\n\nbook.setIsbn(\"1-84023-742-2\");\n\nbook.setNbOfPage(354);\n\
  \nbook.setIllustrations(false);\n\n// 获取实体管理器和事务\n\n**EntityManagerFactory** emf\
  \ = ➥\n\nPersistence.createEntityManagerFactory(\" **chapter02PU**\");\n\n**EntityManager**\
  \ em = emf.createEntityManager();\n\n// 将图书持久化到数据库\n\n**EntityTransaction** tx =\
  \ em.getTransaction();\n\ntx.begin();\n\n**em.persist(book);**\n\ntx.commit();\n\
  \nem.close();\n\nemf.close();\n\n}\n\n}\n\n同样，为了可读性，我省略了异常处理。如果发生持久化异常，您需要回滚事务并记录一条消息。\n\
  \n**Main 类的持久化单元**\n\n正如您在 Main 类中所见，EntityManagerFactory 需要一个名为 chapter02PU 的持久化单元。该持久化单元必须在\
  \ src/main/resources/META-INF 目录下的 persistence.xml 文件中定义（参见清单 2-5）。这个文件是 JPA 规范所要求的，它非常重要，因为它将\
  \ JPA 提供者（本例中为 EclipseLink）与数据库（Derby）连接起来。它包含了连接到数据库所需的所有信息（目标、URL、JDBC 驱动程序、用户和密码），并告知提供者数据库生成模式（create-tables\
  \ 表示如果表不存在则创建表）。<provider> 元素定义了持久化提供者，在本例中为 EclipseLink。\n\n**清单 2-5.** *Main 类使用的\
  \ persistence.xml 文件*\n\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\n[<persistence\
  \ version=\"1.0\">](http://java.sun.com/xml/ns/persistence)\n\n<persistence-unit\
  \ name=\"chapter02PU\" transaction-type=\"RESOURCE_LOCAL\">\n\n<provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>\n\
  \n<class> **com.apress.javaee6.chapter02.Book**</class>\n\n<properties>\n\n<property\
  \ name=\"eclipselink.target-database\" value=\" **DERBY**\"/>\n\n<property name=\"\
  eclipselink.jdbc.driver\" ➥\n\nvalue=\" **org.apache.derby.jdbc.ClientDriver**\"\
  />\n\n<property name=\"eclipselink.jdbc.url\" ➥\n\n第 2 章 ■ Java 持久化\n\n**51**\n\n\
  \n\nvalue=\" **jdbc:derby://localhost:1527/chapter02DB;create=true**\"/>\n\n<property\
  \ name=\"eclipselink.jdbc.user\" value=\"APP\"/>\n\n<property name=\"eclipselink.jdbc.password\"\
  \ value=\"APP\"/>\n\n<property name=\"eclipselink.ddl-generation\" value=\" **create-tables**\"\
  />\n\n<property name=\"eclipselink.logging.level\" value=\" **INFO**\"/>\n\n</properties>\n\
  \n</persistence-unit>\n\n</persistence>\n\n该持久化单元列出了所有应由实体管理器管理的实体。\n\n此处，<class>\
  \ 标签指向 Book 实体。\n\n**使用 Maven 编译**\n\n现在你已经拥有了运行应用程序所需的所有要素：需要持久化的 Book 实体、使用实体管理器进行持久化操作的\
  \ Main 类，以及将实体绑定到 Derby 数据库的持久化单元。要编译这段代码，你将使用 Maven，而不是直接使用 javac 编译器命令。你首先需要创建一个\
  \ `pom.xml` 文件，该文件描述了项目及其依赖项（例如 JPA API）。你还需要通过配置 `maven-compiler-plugin` 来告知 Maven\
