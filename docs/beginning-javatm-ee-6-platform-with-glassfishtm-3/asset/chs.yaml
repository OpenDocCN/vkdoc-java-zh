  \nJersey 将使用内置的 MessageBodyReader 和 MessageBodyWriter（它们是实体提供者）为你将客户列表转换为 JSON。\n\
  \n\n\n■**注意**：Jersey 添加了一种将 JAXB XML 映射为 JSON 的 BadgerFish 映射方式。BadgerFish [*(*\
