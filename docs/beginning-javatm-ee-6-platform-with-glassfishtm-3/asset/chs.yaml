  \n<modelVersion>4.0.0</modelVersion>\n\n<groupId>com.apress.javaee6</groupId>\n\n\
  <artifactId>chapter10</artifactId>\n\n**<packaging>war</packaging>**\n\n<version>1.0</version>\n\
  \n<dependencies>\n\n<dependency>\n\n<groupId>javax.faces</groupId>\n\n<artifactId>\
  \ **jsf-api**</artifactId>\n\n<version>2.0.0</version>\n\n<scope>provided</scope>\n\
  \n</dependency>\n\n<dependency>\n\n<groupId>org.glassfish</groupId>\n\n<artifactId>\
  \ **javax.ejb**</artifactId>\n\n<version>3.0</version>\n\n<scope>provided</scope>\n\
  \n</dependency>\n\n<dependency>\n\n<groupId>org.eclipse.persistence</groupId>\n\n\
  <artifactId> **javax.persistence**</artifactId>\n\n<version>1.1.0</version>\n\n\
  <scope>provided</scope>\n\n**278**\n\n第 10 章 ■ JavaServer Faces\n\n</dependency>\n\
  \n</dependencies>\n\n<build>\n\n<plugins>\n\n<plugin>\n\n<groupId>org.apache.maven.plugins</groupId>\n\
  \n<artifactId>maven-compiler-plugin</artifactId>\n\n<inherited>true</inherited>\n\
  \n<configuration>\n\n<source> **1.6**</source>\n\n<target> **1.6**</target>\n\n\
  </configuration>\n\n</plugin>\n\n</plugins>\n\n</build>\n\n</project>\n\n要编译和打包这些类，请在包含\
  \ `pom.xml` 文件的目录中打开命令行解释器，并输入以下 Maven 命令：\n\nmvn package\n\n转到 `target` 目录，找到 `chapter10-1.0.war`\
  \ 文件。打开它，你会看到它包含了 `Book` 实体、`BookEJB`、`BookController` 受管 bean、两个部署描述符（`persistence.xml`\
  \ 和 `web.xml`）以及两个网页（`newBook.xhtml` 和 `listBooks.xhtml`）。\n\n**部署到 GlassFish**\n\
  \nWeb 应用打包完成后，需要将其部署到 GlassFish 中。确保 GlassFish 已启动并正在运行，并且由于应用将数据存储在数据库中，请检查 Derby\
  \ 是否正在运行并监听其默认端口。打开 DOS 控制台，转到 `chapter10-1.0.war` 文件所在的 `target` 目录，然后输入以下命令：\n\
  \nasadmin deploy **chapter10-1.0.war**\n\n如果部署成功，以下命令应返回已部署应用的名称及其类型。有两种类型：`web`，因为它是一个\
  \ Web 应用；以及 `ejb`，因为该应用包含一个 EJB：\n\nasadmin list-components\n\n**chapter10-1.0 <ejb,\
  \ web>**\n\n**运行示例**\n\n现在应用已部署，打开浏览器并访问以下 URL：\n\n[`localhost:8080/chapter10-1.0/newBook.faces`](http://localhost:8080/chapter10-1.0/newBook.faces)\n\
  \n第 10 章 ■ JavaServer Faces\n\n**279**\n\n浏览器指向的是 `newBook.faces`，而不是 `newBook.xhtml`，这是因为你为\
  \ `FacesServlet` 配置的映射。通过 `.faces` 扩展名，JSF 知道它必须在渲染页面之前处理该页面。当 `newBook` 页面出现后，输入一些数据，然后点击提交按钮，页面将被重定向到\
  \ `listBooks` 页面。\n\n**总结**\n\n如今，随着富桌面应用（RDA）、富互联网应用（RIA）、移动设备应用等的激增，用户界面之间的竞争仍在继续。几年前，JSF\
  \ 加入了这场竞争，而今天，凭借 JSF 2.0 的新特性，它已经站稳了脚跟。\n\nJSF 拥有基于组件的架构和丰富的 API，用于开发渲染器、转换器、验证器等。它可以渲染和转换多种语言，JSF\
  \ 2.0 的首选表示声明语言（PDL）是 Facelets。\n\n注解已在 JSF 2.0 中引入，并现在用于大多数 Java EE 6 规范中。第 11\
  \ 章重点介绍 Java EE 6 的表示层部分。它涵盖了 JSP 2.2、EL 2.2 和 JSTL 1.2 等规范，介绍了 Facelets，并主要集中于\
  \ JSF。第 12 章将讨论规范的所有动态方面。你将学习导航的工作原理、受管 bean，以及如何编写自己的转换器和验证器。\n\n第 11 章\n\n页面与组件\n\
  \n\n\n我们生活在一个互联网世界中。随着事务型后端处理数千个请求，并通过 Web 服务与异构系统通信，我们需要一个表示层来与最终用户交互，最好是一个能在浏览器中运行的表示层。浏览器无处不在，用户界面也变得更加丰富、动态且易于使用。富互联网应用程序（RIA）越来越受欢迎，因为用户对浏览体验的期望越来越高。他们需要在线查阅书籍和\
  \ CD 的目录，但也希望访问电子邮件和文档、接收邮件通知，或者在服务器事件发生时刷新浏览器的部分内容。再加上 Web 2.0 的理念——人们可以与朋友群分享任何信息并相互互动——结果就是\
  \ Web 界面的开发变得越来越复杂。\n\n在 Java 的早期，开发者直接通过 Servlet 输出 HTML 来处理 HTML。随后，我们从 Servlet\
  \ 转向了 Java Server Pages（JSP），再到自定义标签。如今，Java EE 6 带来了新版本的 JSF，简化了 Web 界面的开发。\n\n\
  在本章中，你将了解 Java EE 6 中用于创建网页的不同技术。\n\n首先，文本涵盖了一些基本概念，如 HTML、CSS 和 JavaScript，然后继续介绍\
  \ JSP、EL 和 JSTL。接着，我将向你介绍 Facelet，这是 JSF 中首选的页面声明语言（PDL）。本章的其余部分将重点介绍如何使用 JSF 或自定义组件创建\
  \ Web 界面。下一章将重点介绍如何在页面之间导航，以及如何与后端交互，以便显示动态数据。\n\n**网页**\n\n当我们创建 Web 应用程序时，我们真正关心的是显示动态内容：来自目录的项目列表（例如\
  \ CD 和书籍）、给定标识符的客户详细信息、包含客户想要购买的商品的购物车等等。相反，静态内容，例如图书公司的地址以及关于如何购买或发货的常见问题解答，很少或从不改变。静态内容也可以是构成页面的图像、视频或插图。\n\
  \n创建页面的最终目标是将其显示在浏览器中。页面必须使用浏览器能够理解的语言，其中有几种：HTML、XHTML、CSS 和 JavaScript。\n\n**281**\n\
  \n**282**\n\n第 11 章 ■ 页面与组件\n\n**HTML**\n\n超文本标记语言（HTML）是网页的主要语言。它基于标准通用标记语言（SGML），这是一种用于定义标记语言的标准元语言。HTML\
  \ 使用*标记*或*标签*将文本结构化为段落、列表、链接、按钮、文本区域等。\n\nHTML 页面是浏览器用来呈现文本和图形的文本文档。这些文档是文本文件，通常具有\
  \ .html 或 .htm 扩展名。一个网页由内容、用于改变内容某些方面的标签以及外部对象（如图像、视频、JavaScript 或 CSS 文件）组成。\n\n\
  在上一章中，“综合应用”*部分展示了一些 JSF 页面，其中一个页面显示了一个用于创建新书的表单。在纯 HTML 中，如果不使用任何 JSF 标签，这个页面可能看起来像清单\
  \ 11-1 中的代码。\n\n**清单 11-1.** *newBook.html 页面*\n\n<H1>创建一本新书</h1>\n\n**<hr>**\n\n\
  <TABLE **border=0**>\n\n**<TR>**\n\n<TD>ISBN :</TD>\n\n<TD><input type=text/></td>\n\
  \n</tr>\n\n<tr>\n\n<td>书名 :</td>\n\n<TD><input type=text/></td>\n\n</tr>\n\n<tr>\n\
  \n<td>价格 :</td>\n\n<TD><input type=text/></td>\n\n</tr>\n\n<tr>\n\n<td>描述 :\n\n\
  <td><textarea name=textarea cols=20 rows=5></textarea>\n\n</tr>\n\n<TR>\n\n<TD>页数\
  \ :\n\n<td><input type=text/>\n\n</tr>\n\n<tr>\n\n<td>插图 :\n\n<td><input type=checkbox/>\n\
  \n</tr>\n\n</table>\n\n<input type=submit value=创建>\n\n**<hr>**\n\n<i>APress - Beginning\
  \ Java EE 6</i>\n\n![Image 89](img/index-313_1.jpg)\n\n第 11 章 ■ 页面与组件\n\n**283**\n\
  \n通常，一个有效的 HTML 页面以 <html> 标签开头，该标签充当文档的容器。其后是 <head> 和 <body> 标签。<body> 包含可见内容，例如显示表格、标签、输入字段和按钮的\
  \ HTML 代码。正如你在清单 11-1 中所见，newBook.html 的标记并不遵循这些规则，但浏览器会在一定程度上显示无效的 HTML 页面。因此，可见结果将如图\
  \ 11-1 所示。\n\n**图 11-1.** *newBook.html 页面的图形表示*\n\n图 11-1 中显示的图形表示是预期的，因为清单 11-1\
  \ 在 XML 方面格式不正确：\n\n• 页面没有任何 <html>、<head> 或 <body> 标签。\n\n• <input type=submit\
  \ value=Create> 标签未闭合。\n\n• 标签中大小写混用（例如，清单中同时出现了 <TR> 和 </tr>）。\n\n大多数浏览器会允许此类错误并显示此表单。但是，如果你想用\
  \ XML 解析器处理此文档，例如，它会失败。为了揭示原因，让我们看一个使用严格 XML 结构的网页，即可扩展超文本标记语言（XHTML）。\n\n**XHTML**\n\
  \nXHTML 是在 HTML 4.01 之后不久创建的。它源于 HTML，但用严格的 XML 重新表述。这意味着 XHTML 文档是一个遵循特定模式并在浏览器上具有图形表示的\
  \ XML 文档。XHTML 文件（扩展名为 .xhtml）可以立即用作 XML 或在浏览器中显示。与 HTML 相比，其优势在于可以使用标准 XML 工具（XSL，即可扩展样式表语言；XSLT，即\
  \ XSL 转换等）提供文档验证。因此，XHTML 比 HTML 更加灵活和强大，因为它允许你定义任何你想要的标签集。\n\n清单 11-2 显示了用于创建书籍的网页的\
  \ XHTML 版本。\n\n**284**\n\n第 11 章 ■ 页面与组件\n\n**清单 11-2.** *newBook.xhtml 页面*\n\n\
  <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE html\nPUBLIC \"-//W3C//DTD\
  \ XHTML 1.0 Transitional//EN\"\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\
  >](http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd)\n**<html** [xml:lang=\"\
  en\" lang=\"en\">](http://www.w3.org/1999/xhtml)\n**<head>**\n<title>创建一本新书</title>\n\
  </head>\n**<body>**\n<h1>创建一本新书</h1>\n**<hr/>**\n<table **border=\"0\"** >\n**<tr>**\n\
  <td>ISBN :</td>\n<td><input type=\"text\"/></td>\n</tr>\n<tr>\n<td>书名 :</td>\n<td><input\
  \ type=\"text\"/></td>\n</tr>\n<tr>\n<td>价格 :</td>\n<td><input type=\"text\"/></td>\n\
  </tr>\n<tr>\n<td>描述 :**</td>**\n<td><textarea name=\"textarea\" cols=\"20\" rows=\"\
  5\"></textarea> **</td>**\n</tr>\n<tr>\n<td>页数 :**</td>**\n<td><input type=\"text\"\
  /> **</td>**\n</tr>\n<tr>\n<td>插图 :**</td>**\n<td><input type=\"checkbox\"/> **</td>**\n\
  </tr>\n</table>\n<input name=\"\" type=\"submit\" value=\"创建\"/>\n<hr/>\n<i>APress\
  \ - Beginning Java EE 6</i>\n</body>\n</html>\n\n清单 11-1 和清单 11-2 之间存在一些差异：清单 11-2\
  \ 中的文档遵循严格的结构，并具有 <html>、<head> 和 <body> 标签；所有标签都已闭合，即使是空元素也是如此（每个 <td> 都已闭合，并且使用了\
  \ <hr/> 而不是 <hr>）；属性\n\n第 11 章 ■ 页面与组件\n\n**285**\n\n出现在单引号或双引号之间（<table border=\"\
  0\"> 或 <table border='0'>，但不是 <table border=0>）；并且标签都是小写的（<tr> 而不是 <TR>）。将此与清单 11-1\
  \ 进行比较，如前所述，清单 11-1 显示了无效的 HTML，但浏览器无论如何都能显示。\n\nXML 语法规则和模式约束的严格验证使得 XHTML 比 HTML\
  \ 更易于维护和解析，因此它现在成为网页的首选语言。\n\n**CSS**\n\n浏览器存在于客户端语言的世界中，例如 HTML、XHTML、CSS 和 JavaScript。\n\
  \n\n\n层叠样式表（CSS）是一种用于描述用 HTML 或 XHTML 编写的文档呈现方式的样式语言。CSS 用于定义颜色、字体、布局以及文档呈现的其他方面。它允许将文档的内容（用\
  \ XHTML 编写）与其呈现方式（用 CSS 编写）分离开来。与 HTTP、HTML 和 XHTML 一样，CSS 规范由万维网联盟（W3C）维护。\n\n\
  例如，假设你想修改 newBook.xhtml 页面上的标签，使其变为\n\n斜体（font-style: italic;）、将颜色改为蓝色（color: #000099;）并增大字号（font-size:\
  \ 22px;）；你无需为每个标签重复这些修改。你可以定义一个 CSS 样式（在 `<style type=\"text/css\">` 标签内）并为其指定一个别名（例如\
  \ `.title` 和\n\n`.row`），然后页面（参见清单 11-3）将在所有需要改变呈现方式的元素上使用这个别名（`<h1 class=\"title\"\
  >`）。\n\n**清单 11-3.** *包含一些 CSS 样式的 newBook.xhtml 页面*\n\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n\n<!DOCTYPE html\n\nPUBLIC \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\
  \n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\">](http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd)\n\
  \n[<html xml:lang=\"en\" lang=\"en\">](http://www.w3.org/1999/xhtml)\n\n<head>\n\
  \n<title>创建一本新书</title>\n\n**<style type=\"text/css\">**\n\n**.title** {\n\nfont-family:\
  \ Arial, Helvetica, sans-serif;\n\nfont-size: 22px;\n\ncolor: #000099;\n\nfont-style:\
