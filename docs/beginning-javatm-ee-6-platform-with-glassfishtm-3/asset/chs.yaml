  \n</xs:schema>\n\n生命周期与回调\n\nWeb 服务也具有类似于无状态和消息驱动 Bean 的生命周期，如图 14-5 所示。这与不持有任何状态的组件的生命周期相同：它们要么存在，要么准备好处理请求。此生命周期由容器管理。\n\
  \n**图 14-5.** *Web 服务生命周期*\n\n第 14 章 ■ SOAP Web 服务\n\n**417**\n\nServlet 和 EJB 端点都支持依赖注入（因为它们在容器中运行）以及生命周期方法，例如\
  \ `@PostConstruct` 和 `@PreDestroy`。当容器创建 Web 服务实例时，它会调用 `@PostConstruct` 回调方法（如果存在）；当销毁实例时，则调用\
  \ `@PreDestroy` 回调。\n\nServlet 和 EJB 端点之间的一个区别是，EJB 可以使用拦截器。拦截器是第 8 章描述的面向切面编程（AOP）概念的\
  \ Java EE 实现。\n\nWeb 服务上下文\n\nWeb 服务拥有一个环境上下文，可以通过使用 `@Resource` 注解注入 `javax.xml.ws.WebServiceContext`\
  \ 的引用来访问它。在此上下文中，Web 服务可以获取运行时信息，例如端点实现类、消息上下文以及与正在服务的请求相关的安全信息。\n\n**@Resource**\n\
  \nprivate **WebServiceContext** context;\n\n表 14-2 列出了 `javax.xml.ws.WebServiceContext`\
  \ 接口中定义的方法。\n\n**表 14-2.** *WebServiceContext 接口的方法*\n\n**方法**\n\n**描述**\n\ngetMessageContext\n\
  \n返回调用此方法时正在服务的请求的 `MessageContext`。可用于访问 SOAP 消息头、正文等。\n\ngetUserPrincipal\n\n\
  返回标识当前正在服务的请求发送者的 `Principal`。\n\nisUserInRole\n\n返回一个布尔值，指示经过身份验证的用户是否包含在指定的逻辑角色中。\n\
  \ngetEndpointReference\n\n返回与此端点关联的 `EndpointReference`。\n\n**调用 Web 服务**\n\n有了\
  \ WSDL 和一些用于生成 Java 存根的工具，你就可以调用 Web 服务了。调用 Web 服务类似于使用 RMI 调用分布式对象。与 RMI 一样，JAX-WS\
  \ 使程序员能够使用本地方法调用来调用另一台主机上的服务。不同之处在于，在远程主机上，Web 服务可以用另一种编程语言编写（请注意，你可以使用 RMI-IIOP\
  \ 调用非 Java 代码）。WSDL 是消费者和服务之间的标准契约。Metro 提供了一个 WSDL 到 Java 的实用工具（`wsimport`），它可以从\
  \ WSDL 生成 Java 接口和类。此类接口称为服务端点接口（SEI），因为它是 Web 服务端点（Servlet 或 EJB）的 Java 表示。此 SEI\
  \ 充当代理，使用 HTTP 将本地 Java 调用路由到远程 Web 服务。\n\n当调用此代理上的方法时（见图 14-6），它会将方法的参数转换为 SOAP\
  \ 消息（请求）并将其发送到 Web 服务端点。为了获取结果，SOAP 响应会被转换回返回类型的实例。\n\n你不需要理解代理的内部工作原理，甚至不需要查看代码。在\n\
  \n![Image 128](img/index-448_1.jpg)\n\n**418**\n\n第 14 章 ■ SOAP Web 服务\n\n编译客户端消费者之前，你需要生成\
  \ SEI 以获取代理类，从而在你的代码中调用它。\n\n**图 14-6.** *消费者通过代理调用 Web 服务*\n\n消费者可以通过注入或编程方式创建来获取代理实例。要注入\
  \ Web 服务，你需要使用 `@javax.xml.ws.WebServiceRef` 注解。它遵循前面章节中展示的 `@Resource` 或 `@EJB`\
  \ 注解模式，但适用于 Web 服务。当此注解应用于属性（或 getter 方法）时，容器将在应用程序初始化时注入一个 Web 服务实例。代码如下所示：\n\n\
  @WebServiceRef\n\nprivate **CardValidatorService** cardValidatorService;\n\n// ...\n\
  \nCardValidator cardValidator = cardValidatorService.getCardValidatorPort();\n\n\
  cardValidator.validate(creditCard);\n\n\n\n请注意，`CardValidatorService` 类是 SEI（服务端点接口），而非\
  \ Web 服务本身。接着，我们需要获取代理类 `CardValidator` 来在本地调用业务方法。在代理的 `validate()` 方法上执行本地调用，该调用会依次调用远程\
  \ Web 服务、创建 SOAP 请求、编排消息等。\n\n要使此类注入生效，代码必须在容器（Servlet 容器、EJB 容器或应用客户端容器）内执行。如果不在容器内运行，则无法使用\
  \ `@WebServiceRef` 注解。`wsimport` 工具生成的类可以直接按如下方式使用：\n\n**CardValidatorService**\
  \ cardValidatorService = new CardValidatorService();\n\nCardValidator cardValidator\
  \ = cardValidatorService.getCardValidatorPort();\n\ncardValidator.validate(creditCard);\n\
  \n在这段代码中，使用 `new` 关键字创建了 `CardValidatorService` 的实例，其余代码与之类似。\n\n■**注意** `wsimport`\
  \ 和 `wsgen` 工具随 JDK 1.6 以及 GlassFish 一同提供。`wsimport` 接收 WSDL 作为输入，并生成 JAX-WS 工件，例如\
  \ SEI。`wsgen` 读取 Web 服务端点类并生成 WSDL。你可以通过 Java SE 6 安装直接访问这些工具，或者通过 GlassFish 命令行界面（CLI）、Ant\
  \ 任务或 Maven 插件来使用它们。\n\n第 14 章 ■ SOAP Web 服务\n\n**419**\n\n**整合所有内容**\n\n通过整合这些概念，你可以编写一个\
  \ Web 服务和一个 Web 服务消费者，并使用 GlassFish 进行部署和测试。你应该使用 JAXB 和 JAX-WS 注解，并通过 `wsimport`\
  \ Maven 目标生成服务端点接口。编写 Web 服务需要几个步骤。我将通过重新审视 `CardValidator` Web 服务来演示这些步骤。\n\n`CardValidator`\
  \ Web 服务用于检查信用卡是否有效。它有一个方法，该方法接受一个 `CreditCard` 对象作为参数，应用某种算法，如果卡有效则返回 `true`，否则返回\
  \ `false`。一旦此 Web 服务部署到 GlassFish 上，就会使用 `wsimport` 为消费者生成所有必要的工件。然后，消费者可以调用该 Web\
  \ 服务来验证信用卡。\n\n你将使用两个 Maven 项目：一个用于将 Web 服务打包成 war 文件（`chapter14-service-1.0.war`），另一个用于将消费者打包成\
  \ jar 文件（`chapter14-consumer-1.0.jar`）。\n\n**编写 CreditCard 类**\n\n`CreditCard` 类（如清单\
  \ 14-23 所示）是一个 POJO，用作 Web 服务 `validate()` 方法的参数。Web 服务交换的是 XML 消息，而非 Java 对象。`CreditCard`\
  \ 类使用 JAXB 的 `@XmlRootElement` 注解进行标注，以便编排成 XML，从而可以在 SOAP 请求中发送。`CreditCard` 对象具有一些基本属性，例如信用卡号、到期日期（格式为\
  \ MM/YY）、信用卡类型（Visa、Master Card、American Express 等）以及一个控制号码。\n\n**清单 14-23.** *带有\
  \ JAXB 注解的 CreditCard 类*\n\n**@XmlRootElement**\n\npublic class CreditCard {\n\n\
  private String number;\n\nprivate String expiryDate;\n\nprivate Integer controlNumber;\n\
  \nprivate String type;\n\n// 构造方法、getter、setter\n\n}\n\n**编写 CardValidator Web 服务**\n\
  \n`CardValidator`（参见清单 14-24）也是一个带有 JAX-WS `@WebService` 注解的 POJO。它不是一个 EJB 端点，因为它没有\
  \ `@Stateless` 注解。`CardValidator` Web 服务是一个 Servlet 端点，将部署在 war 文件（`chapter14-service-1.0.war`）中。它有一个\
  \ `validate()` 方法，该方法接受一个 `CreditCard` 对象作为参数。检查卡是否有效的算法基于卡号：奇数有效，偶数无效。该方法返回一个布尔值。\n\
