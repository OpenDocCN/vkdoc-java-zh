  是\n\n是\n\n可嵌入 API\n\n是\n\n是\n\n**参考实现**\n\nGlassFish 是一个由 Sun Microsystems 领导的开源应用服务器项目，用于\
  \ Java EE 平台。该项目于 2005 年启动，并于 2006 年成为 Java EE 5 的参考实现。如今，GlassFish v3 是 EJB 3.1\
  \ 的参考实现。在内部，该产品围绕模块化构建（基于 Apache Felix OSGi 运行时），允许非常快速的启动时间，并使用一组不同的应用程序容器（当然是\
  \ Java EE 6，也包括 Ruby、PHP 等）。\n\n本书将全程使用 GlassFish 作为主要应用服务器来部署和运行 EJB，以及 JSF 页面、SOAP\
  \ 和 RESTful Web 服务以及 JMS MDB。\n\n**总结**\n\n\n\n在第二章的“整合所有内容”部分中，我演示了一个映射到 Derby\
  \ 数据库的 Book 实体（如代码清单 2-3 所示）的开发过程。接着，我展示了一个 Main 类（如代码清单 2-4 所示），它使用实体管理器来持久化一本书，并从数据库中检索所有书籍（使用了显式的事务划分：`tx.begin()`\
  \ 和 `tx.commit()`）。本示例采用了相同的用例，但将第二章中使用的 Main 类替换为了一个无状态会话 Bean（BookEJB）。\n\nEJB\
  \ 本质上是事务性的，因此我们的无状态会话 Bean（BookEJB）将使用容器管理事务（CMT）来处理 Book 实体上的创建、读取、更新、删除（CRUD）操作。然后，BookEJB\
  \ 和 Book 实体将被打包并部署到 GlassFish 中。该 EJB 需要一个远程接口，因为外部客户端应用程序（Main 类）将使用应用客户端容器（ACC）远程调用\
  \ EJB 上的方法（见图 6-3）。\n\n![图 64](img/index-208_1.jpg)\n\n**178**\n\n第六章 ■ 企业级 Java\
  \ Beans\n\n**图 6-3.** *整合所有内容*\n\n为了使用事务，无状态会话 Bean 需要通过一个数据源（`jdbc/chapter06DS`）来访问数据库，该数据源需要在\
  \ GlassFish 中创建，并链接到 `chapter06DB` 数据库。\n\n项目的目录结构遵循 Maven 约定，因此类和文件必须放置在以下目录中：\n\
  \n*   `src/main/java`：用于存放 Book 实体、BookEJB、BookEJBRemote 接口和 Main 类\n*   `src/main/resources`：包含用于\
  \ Derby 数据库服务器的持久化单元（persistence unit）的 `persistence.xml` 文件\n*   `src/test/java`：用于单元测试的\
  \ BookTest 类\n*   `src/test/resources`：测试用例用于嵌入式 Derby 数据库的 `persistence.xml` 文件\n\
  *   `pom.xml`：描述项目、其对外部其他模块和组件的依赖关系的 Maven 项目对象模型（POM）\n\n**编写 Book 实体**\n\n代码清单\
  \ 6-3 引用了第二章（代码清单 2-3）中描述的同一个 Book 实体，因此我不会详细解释。请注意，该实体必须位于 `src/main/java` 目录下。\n\
  \n**代码清单 6-3.** *带有命名查询的 Book 实体*\n\n```java\n@Entity\n@NamedQuery(name = \"findAllBooks\"\
  , query = \"SELECT b FROM Book b\")\npublic class Book {\n    @Id @GeneratedValue\n\
  \    private Long id;\n```\n\n第六章 ■ 企业级 Java Beans\n\n**179**\n\n```java\n    @Column(nullable\
  \ = false)\n    private String title;\n    private Float price;\n    @Column(length\
  \ = 2000)\n    private String description;\n    private String isbn;\n    private\
  \ Integer nbOfPage;\n    private Boolean illustrations;\n    // 构造方法、getter、setter\n\
  }\n```\n\n**编写 BookEJB 无状态会话 Bean**\n\nBookEJB 是一个无状态会话 Bean，它充当外观（façade）角色，处理\
  \ Book 实体上的 CRUD 操作。代码清单 6-4 展示了需要用 `@javax.ejb.Stateless` 注解并实现 `BookEJBRemote`\
  \ 接口（见代码清单 6-5）的 Java 类。该 EJB 通过依赖注入获取实体管理器的引用，并在以下每个方法中使用：\n\n*   `findBooks`：此方法使用\
  \ Book 实体中定义的 `findAllBooks` 命名查询，从数据库中检索所有书籍实例。\n*   `findBookById`：给定一个 ID，此方法使用\
  \ `EntityManager.find()` 方法从数据库中检索一本书。\n*   `createBook`：此方法接受一个 Book 对象作为参数，并将其持久化到数据库中。\n\
  *   `updateBook`：此方法接受一个分离的（detached）Book 对象作为参数。通过使用 `merge()` 方法，该对象被附加到实体管理器并与数据库同步。\n\
  *   `deleteBook`：在从数据库中删除 Book 实体之前，此方法必须先将该对象重新附加到实体管理器，然后再将其删除。\n\n**代码清单 6-4.**\
  \ *充当 CRUD 操作外观的无状态会话 Bean*\n\n```java\n@Stateless\npublic class BookEJB implements\
  \ BookEJBRemote {\n    @PersistenceContext(unitName = \"chapter06PU\")\n    private\
  \ EntityManager em;\n\n    public List<Book> findBooks() {\n        Query query\
  \ = em.createNamedQuery(\"findAllBooks\");\n        return query.getResultList();\n\
  \    }\n\n    public Book findBookById(Long id) {\n```\n\n\n**180**\n\n第 6 章 ■ 企业级\
  \ Java Beans\n\nreturn em.find(Book.class, id);\n\n}\n\npublic Book **createBook**(Book\
  \ book) {\n\nem.persist(book);\n\nreturn book;\n\n}\n\npublic void **deleteBook**(Book\
  \ book) {\n\nem.remove(em.merge(book));\n\n}\n\npublic Book **updateBook**(Book\
  \ book) {\n\nreturn em.merge(book);\n\n}\n\n}\n\n第 2 章（清单 2-4）中定义的 Main 类与清单 6-4\
  \ 中的类之间的主要区别在于：EntityManager 的实例被直接注入到会话 Bean 中，而不是使用 EntityManagerFactory 来创建它。EJB\
  \ 容器负责管理 EntityManager 的生命周期，因此它会注入一个 EntityManager 实例，并在 EJB 被销毁时将其关闭。此外，JPA 调用不再需要包裹在\
  \ tx.begin()和 tx.commit()之间，因为会话 Bean 方法默认是事务性的。这种默认行为被称为 CMT（容器管理事务），将在第 9 章中讨论。\n\
  \n由于 BookEJB 被 Main 类远程调用，它需要实现一个远程接口。普通 Java 接口与远程接口的唯一区别在于是否存在@Remote 注解，如清单 6-5\
  \ 所示。\n\n**清单 6-5.** *远程接口*\n\n**@Remote**\n\npublic interface BookEJBRemote {\n\
  \npublic List<Book> findBooks();\n\npublic Book findBookById(Long id);\n\npublic\
  \ Book createBook(Book book);\n\npublic void deleteBook(Book book);\n\npublic Book\
  \ updateBook(Book book);\n\n}\n\n**BookEJB 的持久化单元**\n\n在第 2 章中，持久化单元（清单 2-5）必须定义\
  \ JDBC 驱动、JDBC URL、用户名和密码以连接 Derby 数据库，因为事务是由应用程序管理的（transaction-type=\"RESOURCE_LOCAL\"\
  ）。在 EJB 运行的容器管理环境中，事务由容器管理，而非应用程序，因此持久化单元（见清单 6-6）的 transaction-type 必须设置为 JTA。\n\
