  \n**可嵌入类**\n\n\n\n在本章前面的“复合主键”部分，你已快速了解到如何使用 `@EmbeddedId` 注解将一个类嵌入并用作主键。可嵌入对象（Embeddables）是自身没有持久化标识的对象；它们只能嵌入到所属实体中。所属实体可以拥有可嵌入对象的集合，也可以拥有单个可嵌入属性。它们作为所属实体的固有部分进行存储，并共享该实体的标识。这意味着嵌入对象的每个属性都映射到实体的表中。这是一种严格的所有权关系（即组合关系），因此如果实体被移除，嵌入对象也会被移除。\n\
  \n这种两个类之间的组合关系使用注解来实现。被包含的类使用 `@Embeddable` 注解，而包含该类的实体则使用 `@Embedded` 注解。我们以客户为例，客户拥有标识符、姓名、电子邮件地址和地址。\n\
  \n所有这些属性都可以放在一个 Customer 实体中（参见本章稍后的清单 3-34），但出于对象建模的原因，它们被拆分为两个类：Customer 和 Address。由于\
  \ Address 没有自己的标识，仅仅是 Customer 状态的一部分，因此它更适合作为可嵌入对象，而不是实体（参见清单 3-33）。\n\n**清单 3-33.**\
  \ *Address 类是一个可嵌入对象*\n\n**@Embeddable**\n\npublic class Address {\n\nprivate String\
  \ street1;\n\nprivate String street2;\n\nprivate String city;\n\nprivate String\
  \ state;\n\nprivate String zipcode;\n\nprivate String country;\n\n// 构造方法、getter、setter\n\
  \n}\n\n第 3 章 ■ 对象关系映射\n\n**85**\n\n如清单 3-33 所示，Address 类没有被注解为实体，而是被注解为可嵌入对象。`@Embeddable`\
  \ 注解指定了 Address 可以嵌入到另一个实体类（或另一个可嵌入对象）中。在组合关系的另一端，Customer 实体必须使用 `@Embedded` 注解来指定\
  \ Address 是一个持久化属性，它将作为固有部分存储并共享其标识（参见清单 3-34）。\n\n**清单 3-34.** *嵌入 Address 的 Customer\
  \ 实体*\n\n@Entity\n\npublic class Customer {\n\n@Id @GeneratedValue\n\nprivate Long\
  \ id;\n\nprivate String firstName;\n\nprivate String lastName;\n\nprivate String\
  \ email;\n\nprivate String phoneNumber;\n\n**@Embedded**\n\nprivate Address address;\n\
  \n// 构造方法、getter、setter\n\n}\n\nAddress 的每个属性都映射到所属实体 Customer 的表中。只会有一个表，其结构如清单\
  \ 3-35 所示。正如你将在后面的“复合主键”部分看到的，实体可以覆盖可嵌入对象的属性（使用 `@AttributeOverrides` 注解）。\n\n**清单\
  \ 3-35.** *包含所有 Address 属性的 CUSTOMER 表结构* create table CUSTOMER (\n\nID BIGINT not\
  \ null,\n\nLASTNAME VARCHAR(255),\n\nPHONENUMBER VARCHAR(255),\n\nEMAIL VARCHAR(255),\n\
  \nFIRSTNAME VARCHAR(255),\n\n**STREET2 VARCHAR(255),**\n\n**STREET1 VARCHAR(255),**\n\
  \n**ZIPCODE VARCHAR(255),**\n\n**STATE VARCHAR(255),**\n\n**COUNTRY VARCHAR(255),**\n\
  \n**CITY VARCHAR(255),**\n\nprimary key (ID)\n\n);\n\n**86**\n\n第 3 章 ■ 对象关系映射\n\
  \n**可嵌入类的访问类型**\n\n可嵌入类的访问类型由其所在实体类的访问类型决定。如果实体显式使用了属性访问类型，那么可嵌入对象也将隐式使用属性访问。可以通过\
  \ `@Access` 注解为可嵌入类指定不同的访问类型。\n\nCustomer 实体（参见清单 3-36）和 Address 实体（参见清单 3-37）使用了不同的访问类型。\n\
  \n**清单 3-36.** *使用字段访问类型的 Customer 实体*\n\n@Entity\n\n**@Access(AccessType.FIELD)**\n\
  \npublic class Customer {\n\n@Id @GeneratedValue\n\nprivate Long id;\n\n@Column(name\
  \ = \"first_name\", nullable = false, length = 50)\n\nprivate String firstName;\n\
  \n@Column(name = \"last_name\", nullable = false, length = 50)\n\nprivate String\
  \ lastName;\n\nprivate String email;\n\n@Column(name = \"phone_number\", length\
  \ = 15)\n\nprivate String phoneNumber;\n\n\n\n**@Embedded**\n\nprivate Address address;\n\
  \n// 构造方法、getter、setter\n\n}\n\n**清单 3-37.** *采用属性访问类型的可嵌入对象*\n\n@Embeddable\n\n\
  **@Access(AccessType.PROPERTY)**\n\npublic class Address {\n\nprivate String street1;\n\
  \nprivate String street2;\n\nprivate String city;\n\nprivate String state;\n\nprivate\
  \ String zipcode;\n\nprivate String country;\n\n// 构造方法\n\n**@Column(nullable =\
  \ false)**\n\npublic String getStreet1() {\n\nreturn street1;\n\n第 3 章 ■ 对象关系映射\n\
  \n**87**\n\n}\n\npublic void setStreet1(String street1) {\n\nthis.street1 = street1;\n\
  \n}\n\npublic String getStreet2() {\n\nreturn street2;\n\n}\n\npublic void setStreet2(String\
  \ street2) {\n\nthis.street2 = street2;\n\n}\n\n**@Column(nullable = false, length\
  \ = 50)**\n\npublic String getCity() {\n\nreturn city;\n\n}\n\npublic void setCity(String\
  \ city) {\n\nthis.city = city;\n\n}\n\n**@Column(length = 3)**\n\npublic String\
  \ getState() {\n\nreturn state;\n\n}\n\npublic void setState(String state) {\n\n\
  this.state = state;\n\n}\n\n**@Column(name = \"zip_code\", length = 10)**\n\npublic\
  \ String getZipcode() {\n\nreturn zipcode;\n\n}\n\npublic void setZipcode(String\
  \ zipcode) {\n\nthis.zipcode = zipcode;\n\n}\n\npublic String getCountry() {\n\n\
  return country;\n\n}\n\npublic void setCountry(String country) {\n\nthis.country\
  \ = country;\n\n}\n\n}\n\n强烈建议在可嵌入对象上显式设置访问类型，以避免当某个可嵌入对象被多个实体嵌入时出现映射错误。让我们通过添加一个\
  \ Order 实体来扩展模型，如图 3-5 所示。Address 现在被 Customer（客户的家庭地址）和 Order（送货地址）嵌入。\n\n![Image\
  \ 32](img/index-118_1.jpg)\n\n![Image 33](img/index-118_2.jpg)\n\n![Image 34](img/index-118_3.jpg)\n\
  \n**88**\n\n第 3 章 ■ 对象关系映射\n\n**图 3-5.** *Address 被 Customer 和 Order 嵌入。*\n\n每个实体定义了不同的访问类型：Customer\
  \ 使用字段访问，而 Order 使用属性访问。由于可嵌入对象的访问类型由其声明所在的实体类的访问类型决定，因此 Address 将以两种不同的方式被映射，这可能导致映射问题。为避免这种情况，应显式设置\
  \ Address 的访问类型。\n\n■**注意** 显式访问类型在继承中也很有帮助。默认情况下，叶子实体继承其根实体的访问类型。在实体层次结构中，每个实体都可以与层次结构中的其他类采用不同的访问方式。包含\
  \ `@Access` 注解将导致层次结构中生效的默认访问模式被局部覆盖。\n\n**关系映射**\n\n面向对象编程的世界充满了类以及类之间的关联。这些关联是结构性的，它们将一种类型的对象链接到另一种类型的对象，允许一个对象促使另一个对象代表其执行操作。类之间可以存在多种类型的关联。\n\
  \n首先，关联具有方向性。它可以是*单向的*（即一个对象可以导航到另一个对象），也可以是*双向的*（即一个对象可以导航到另一个对象，反之亦然）。在 Java 中，你使用点（.）语法来导航对象。例如，当你编写\
  \ `customer.getAddress().getCountry()` 时，你从 Customer 对象导航到 Address，然后再导航到 Country。\n\
  \n在统一建模语言（UML）中，为了表示两个类之间的单向关联，你使用箭头来指示方向。在图 3-6 中，Classe1（源）可以导航到 Classe2（目标），但反之则不行。\n\
  \n**图 3-6.** *两个类之间的单向关联*\n\n为了表示双向关联，不使用箭头。如图 3-7 所示，Class1 可以导航到 Classe2，反之亦然。在\
  \ Java 中，这表示为 Class1 拥有一个 Classe2 类型的属性，而 Class2 拥有一个 Class1 类型的属性。\n\n**图 3-7.**\
  \ *两个类之间的双向关联*\n\n![Image 35](img/index-119_1.jpg)\n\n![Image 36](img/index-119_2.jpg)\n\
  \n第 3 章 ■ 对象关系映射\n\n**89**\n\n关联还具有*多重性*（或*基数*）。关联的每一端都可以指定有多少个引用对象参与该关联。图 3-8 中的\
  \ UML 图显示一个 Class1 引用零个或多个 Class2 实例。\n\n**图 3-8.** *类关联上的多重性*\n\n在 UML 中，基数是一个介于最小数量和最大数量之间的范围。因此，`0..1`\
  \ 表示你至少会有零个对象，最多一个对象。`1` 表示你只有一个且仅有一个实例。`1..*` 表示你可以有一个或多个实例，而 `3..6` 表示你有一个介于三个和六个对象之间的范围。在\
  \ Java 中，表示多个对象的关联使用 `java.util.Collection`、`java.util.Set`、`java.util.List` 甚至\
  \ `java.util.Map` 等集合。\n\n关系具有所有权（即关系的所有者）。在单向关系中，所有权是隐含的：在图 3-6 中，毫无疑问所有者是 Class1，但在双向关系中，如图\
  \ 3-7 所示，必须显式指定所有者。然后，你展示拥有方（指定物理映射）和反向方（非拥有方）。\n\n在接下来的章节中，你将看到如何使用 JPA 注解映射对象集合。\n\
  \n**关系数据库中的关系**\n\n在关系世界中，情况有所不同，因为严格来说，关系数据库是*关系*（也称为*表*）的集合，这意味着你建模的任何东西都是表。\n\
  \n为了建模关联，你没有列表、集合或映射，你只有表。在 Java 中，当你有一个类与另一个类之间的关联时，在数据库中你将得到一个表引用。这个引用可以通过两种不同的方式建模：使用*外键*（*连接列*）或使用*连接表*。在数据库术语中，引用另一个表键的列称为*外键列*。\n\
  \n例如，考虑一个客户有一个地址，这是一个*一对一关系*。在 Java 中，你会有一个带有 Address 属性的 Customer 类。在关系世界中，你可以有一个\
  \ CUSTOMER 表，通过一个外键列（或连接列）指向 ADDRESS，如图 3-9 所述。\n\n**图 3-9.** *使用连接列的关系*\n\n还有第二种建模方式——使用连接表。图\
  \ 3-10 中的 CUSTOMER 表不再存储 ADDRESS 的外键。而是创建了一个中间表，通过存储两个表的外键来保存关系信息。\n\n![Image 37](img/index-120_1.jpg)\n\
  \n**90**\n\n第 3 章 ■ 对象关系映射\n\n**图 3-10.** *使用连接表的关系*\n\n你不会使用连接表来表示一对一关系，因为这可能会带来性能问题（你总是需要访问第三个表才能获取客户的地址）。连接表通常用于一对多或多对多基数的情况。正如你将在下一节中看到的，JPA\
  \ 使用这两种模式来映射对象关联。\n\n**实体关系**\n\n现在回到 JPA。大多数实体需要能够引用其他实体，或与其他实体建立关系。这就是产生业务应用程序中常见的领域模型图的原因。JPA\
  \ 使得映射关联成为可能，以便一个实体可以在关系模型中链接到另一个实体。就像你之前看到的基本映射注解一样，JPA 对关联采用“例外配置”方式。它有一种存储关系的默认方式，但如果这不适合你的数据库模型，你可以使用多个注解来自定义映射。\n\
  \n两个实体之间的基数可以是一对一、一对多、多对一、\n\n\n\n或多对多关系。每种映射关系都以源和目标的多重性命名：@OneToOne、@OneToMany、@ManyToOne\
  \ 或 @ManyToMany 注解。每个注解都可以用于单向或双向关联。表 3-1 展示了多重性与方向之间所有可能的组合。\n\n**表 3-1.** *所有可能的多重性-方向组合*\n\
  \n**多重性**\n\n**方向**\n\n一对一\n\n单向\n\n一对一\n\n双向\n\n一对多\n\n单向\n\n多对一/一对多\n\n双向\n\n\
  多对一\n\n单向\n\n多对多\n\n单向\n\n多对多\n\n双向\n\n![Image 38](img/index-121_1.jpg)\n\n![Image\
  \ 39](img/index-121_2.jpg)\n\n第 3 章 ■ 对象关系映射\n\n**91**\n\n你会看到，单向和双向是重复出现的概念，它们以相同的方式适用于所有多重性。接下来，你将了解单向和双向关系的区别，然后实现其中一些组合。我不会逐一讲解所有组合，而是只关注其中一部分。解释所有组合会显得重复。关键在于理解如何在关系中映射多重性和方向。\n\
  \n单向与双向\n\n从对象建模的角度来看，类之间的方向是自然的。在单向关联中，对象 A 仅指向对象 B；在双向关联中，两个对象相互引用。然而，在将双向关系映射到关系数据库时，需要进行一些额外工作，如下面涉及客户及其家庭住址的示例所示。\n\
  \n在单向关系中，Customer 实体有一个类型为 Address 的属性（见图 3-11）。这种关系是单向的，只能从一侧导航到另一侧。Customer 被称为关系的拥有方。就数据库而言，这意味着\
  \ CUSTOMER 表将有一个指向 ADDRESS 的外键（连接列），当你拥有关系时，你可以自定义此关系的映射。例如，如果需要更改外键的名称，映射将在 Customer\
  \ 实体（即拥有方）中完成。\n\n**图 3-11.** *Customer 与 Address 之间的单向关联*\n\n如前所述，关系也可以是双向的。为了能够在\
  \ Address 和 Customer 之间导航，你需要通过向 Address 实体添加一个 Customer 属性，将单向关系转换为双向关系（见图 3-12）。请注意，在\
  \ UML 类图中，表示关系的属性不会显示出来。\n\n**图 3-12.** *Customer 与 Address 之间的双向关联*\n\n就 Java 代码和注解而言，这类似于拥有两个独立的一对一映射，每个方向一个。你可以将双向关系视为一对单向关系，双向进行（见图\
  \ 3-13）。\n\n![Image 40](img/index-122_1.jpg)\n\n![Image 41](img/index-122_2.jpg)\n\
  \n**92**\n\n第 3 章 ■ 对象关系映射\n\n**图 3-13.** *用两个箭头表示的双向关联*\n\n如何映射它？谁是此双向关系的拥有方？谁拥有连接列或连接表的映射信息？如果单向关系有一个拥有方，那么双向关系则同时拥有一个拥有方和一个反向方，必须使用\
  \ @OneToOne、@OneToMany 和 @ManyToMany 注解的 mappedBy 元素显式指定。mappedBy 标识拥有关系的属性，并且是双向关系所必需的。\n\
  \n为了解释清楚，让我们比较一下 Java 代码（一侧）和数据库映射（另一侧）。如图 3-14 左侧所示，两个实体通过属性相互指向：Customer 有一个用\
  \ @OneToOne 注解的 address 属性，Address 实体也有一个带注解的 customer 属性。在右侧，数据库映射显示了一个 CUSTOMER\
  \ 表和一个 ADDRESS 表。CUSTOMER 是关系的拥有方，因为它包含 ADDRESS 外键。\n\n**图 3-14.** *Customer 和 Address\
  \ 代码及其数据库映射*\n\n![Image 42](img/index-123_1.jpg)\n\n第 3 章 ■ 对象关系映射\n\n**93**\n\n\
  Address 实体在其 @OneToOne 注解上使用了 mappedBy 元素。mappedBy 元素表示连接列（address）是在关系的另一端指定的。实际上，在另一端，Customer\
  \ 实体通过使用 @JoinColumn 注解定义了连接列，并将外键重命名为 address_fk。Customer 是关系的拥有方，作为拥有方，它负责定义连接列的映射。Address\
  \ 是反向方，拥有实体的表包含外键（CUSTOMER 表是包含 ADDRESS_FK 列的表）。\n\n@OneToOne、@OneToMany 和 @ManyToMany\
  \ 注解上都有 mappedBy 元素，但 @ManyToOne 注解上没有。\n\n■**注意** 如果你熟悉 Hibernate，可能会认为 JPA 的 mappedBy\
  \ 相当于 Hibernate 的 inverse 属性，后者指示关系中哪一端应被忽略。\n\n@OneToOne 单向\n\n实体之间的一对一单向关系具有多重性为\
  \ 1 的引用，并且只能在一个方向上访问。以客户及其地址为例，假设客户只有一个地址（多重性为 1）。从客户（源）导航到地址（目标）以了解客户的居住地非常重要。然而，出于某种原因，在我们的模型中（如图\
  \ 3-15 所示），你不需要能够反向导航（例如，你不需要知道哪个客户住在某个特定地址）。\n\n**图 3-15.** *一个客户拥有一个地址。*\n\n在\
  \ Java 中，这意味着 Customer 将有一个 Address 属性（参见清单 3-38 和 3-39）。\n\n**清单 3-38.** *带有一个地址的\
  \ Customer*\n\n@Entity\n\npublic class Customer {\n\n@Id @GeneratedValue\n\nprivate\
  \ Long id;\n\nprivate String firstName;\n\nprivate String lastName;\n\nprivate String\
  \ email;\n\n**94**\n\n第 3 章 ■ 对象关系映射\n\nprivate String phoneNumber;\n\n**private\
  \ Address address;**\n\n// 构造方法、getter、setter\n\n}\n\n**清单 3-39.** *Address 实体*\n\
  \n@Entity\n\npublic class Address {\n\n@Id @GeneratedValue\n\nprivate Long id;\n\
  \nprivate String street1;\n\nprivate String street2;\n\nprivate String city;\n\n\
  private String state;\n\nprivate String zipcode;\n\nprivate String country;\n\n\
  // 构造方法、getter、setter\n\n}\n\n如清单 3-38 和 3-39 所示，这两个实体拥有最低限度的必要注解：@Entity 加上用于主键的\
  \ @Id 和 @GeneratedValue，仅此而已。通过“例外配置”方式，持久化提供程序会将这两个实体映射到两个表，并为关系（从客户指向地址）创建一个外键。一对一映射是由以下事实触发的：Address\
  \ 被声明为一个实体，并作为属性包含在 Customer 实体中。不需要 @OneToOne 注解，因为它依赖于默认设置（参见清单 3-40 和 3-41）。\n\
  \n**清单 3-40.** *带有指向 Address 的外键的 CUSTOMER 表*\n\ncreate table CUSTOMER (\n\nID BIGINT\
  \ not null,\n\nFIRSTNAME VARCHAR(255),\n\nLASTNAME VARCHAR(255),\n\nEMAIL VARCHAR(255),\n\
  \nPHONENUMBER VARCHAR(255),\n\n**ADDRESS_ID BIGINT,**\n\nprimary key (ID),\n\n**foreign\
  \ key (ADDRESS_ID) references ADDRESS(ID)**\n\n);\n\n第 3 章 ■ 对象关系映射\n\n**95**\n\n\
  **清单 3-41.** *ADDRESS 表*\n\ncreate table ADDRESS (\n\nID BIGINT not null,\n\nSTREET1\
  \ VARCHAR(255),\n\nSTREET2 VARCHAR(255),\n\nCITY VARCHAR(255),\n\nSTATE VARCHAR(255),\n\
  \nZIPCODE VARCHAR(255),\n\nCOUNTRY VARCHAR(255),\n\nprimary key (ID)\n\n);\n\n\n\
  \n如你所知，在 JPA 中，如果某个属性没有注解，则会应用默认的映射规则。因此，默认情况下，外键列被命名为 ADDRESS_ID（参见清单 3-40），它是关系属性名称（此处为\
  \ address）、符号 _ 以及目标表主键列名称（此处为 ADDRESS 表的 ID 列）的拼接结果。另请注意，在 DDL 中，ADDRESS_ID 列默认可为空，这意味着默认情况下，一对一关联映射为零（空值）或一。\n\
  \n要自定义映射，你可以使用两个注解。第一个是 `@OneToOne`（这是因为关系的基数为 1），它可以修改关联本身的一些属性，例如其获取方式。`@OneToOne`\
  \ 注解的 API 在清单 3-42 中定义。\n\n**清单 3-42.** *@OneToOne 注解 API*\n\n@Target({METHOD, FIELD})\
  \ @Retention(RUNTIME)\n\npublic @interface **OneToOne** {\n\nClass targetEntity()\
  \ default void.class;\n\nCascadeType[] cascade() default {};\n\nFetchType fetch()\
  \ default EAGER;\n\nboolean optional() default true;\n\nString mappedBy() default\
  \ \"\";\n\nboolean orphanRemoval() default false;\n\n}\n\n另一个是 `@JoinColumn`（其 API\
  \ 与 `@Column` 非常相似）。它用于自定义拥有方（owning side）的连接列，即外键。清单 3-43 展示了如何使用这两个注解。\n\n**清单\
  \ 3-43.** *具有自定义关系映射的 Customer 实体*\n\n@Entity\n\npublic class Customer {\n\n@Id\
  \ @GeneratedValue\n\nprivate Long id;\n\nprivate String firstName;\n\nprivate String\
  \ lastName;\n\n![Image 43](img/index-126_1.jpg)\n\n**96**\n\n第 3 章 ■ 对象关系映射\n\n\
  private String email;\n\nprivate String phoneNumber;\n\n**@OneToOne (fetch = FetchType.LAZY)**\n\
  \n**@JoinColumn(name = \"add_fk\", nullable = false)**\n\nprivate Address address;\n\
  \n// 构造方法、getter、setter\n\n}\n\n在 JPA 中，外键列被称为连接列（join column）。`@JoinColumn` 注解允许你自定义外键的映射。在清单\
  \ 3-43 中，它被用来将外键列重命名为 ADD_FK，并通过拒绝空值（nullable=false）使关系成为强制性的。`@OneToOne` 注解则向持久化提供者（persistence\
  \ provider）提示以懒加载方式获取该关系。\n\n**@OneToMany 单向关联**\n\n一对多关系是指一个源对象引用一组目标对象。\n\n例如，一个采购订单由多个订单行组成（参见图\
  \ 3-16）。订单行可以通过相应的 `@ManyToOne` 注解来引用采购订单。Order 是“一”方，也是关系的源端，而 OrderLine 是“多”方，也是目标端。\n\
  \n**图 3-16.** *一个订单包含多个订单行*\n\n基数为多，并且导航仅从 Order 指向 OrderLine。\n\n在 Java 中，这种多重性通过\
  \ `java.util` 包中的 `Collection`、`List` 和 `Set` 接口来描述。清单 3-44 展示了 Order 实体的代码，它与 OrderLine\
  \ 具有单向的一对多关系（参见清单 3-45）。\n\n**清单 3-44.** *一个 Order 包含多个 OrderLine*\n\n@Entity\n\n\
  public class Order {\n\n@Id @GeneratedValue\n\nprivate Long id;\n\n@Temporal(TemporalType.TIMESTAMP)\n\
  \nprivate Date creationDate;\n\n**private List<OrderLine> orderLines;**\n\n// 构造方法、getter、setter\n\
  \n}\n\n![Image 44](img/index-127_1.jpg)\n\n第 3 章 ■ 对象关系映射\n\n**97**\n\n**清单 3-45.**\
  \ *一个 OrderLine*\n\n@Entity\n\n@Table(name = \" **order_line**\")\n\npublic class\
  \ OrderLine {\n\n@Id @GeneratedValue\n\nprivate Long id;\n\nprivate String item;\n\
  \nprivate Double unitPrice;\n\nprivate Integer quantity;\n\n// 构造方法、getter、setter\n\
  \n}\n\n清单 3-44 中的代码没有任何特殊注解，依赖于“通过异常进行配置”（configuration-by-exception）的范式。在此实体上使用实体类型的集合作为属性这一事实，会默认触发\
  \ OneToMany 关系映射。默认情况下，单向的一对多关系使用一个连接表（join table）来保存关系信息，该表包含两个外键列。一个外键列引用 ORDER\
  \ 表，其类型与 ORDER 表的主键相同；另一个外键列引用 ORDER_LINE 表。这个连接表的名称是两个实体名称的拼接，中间用符号 _ 分隔。连接表被命名为\
  \ ORDER_ORDER_LINE，并将产生如图 3-17 所示的模式结构。\n\n**图 3-17.** *ORDER 和 ORDER_LINE 之间的连接表*\n\
  \n如果你不喜欢连接表的名称和外键名称，或者你正在映射到一个已存在的表，你可以使用 JPA 注解来重新定义这些默认值。连接列的默认值是实体名称、符号 _ 以及被引用的主键名称的拼接结果。由于\
  \ `@JoinColumn` 注解可用于更改外键列，`@JoinTable` 注解也可以对连接表映射做同样的操作。你还可以使用 `@OneToMany` 注解（参见清单\
  \ 3-46），它像 `@OneToOne` 一样自定义关系本身（例如使用 fetch 模式等）。\n\n**清单 3-46.** *@JoinTable 注解\
  \ API*\n\n@Target({METHOD, FIELD}) @Retention(RUNTIME)\n\npublic @interface **JoinTable**\
  \ {\n\nString name() default \"\";\n\nString catalog() default \"\";\n\nString schema()\
  \ default \"\";\n\n**98**\n\n第 3 章 ■ 对象关系映射\n\nJoinColumn[] **joinColumns**() default\
  \ {};\n\nJoinColumn[] **inverseJoinColumns**() default {};\n\nUniqueConstraint[]\
  \ uniqueConstraints() default {};\n\n}\n\n在清单 3-46 的 `@JoinTable` 注解 API 中，你可以看到两个类型为\
  \ `@JoinColumn` 的属性：`joinColumns` 和 `inverseJoinColumns`。这两个属性通过拥有方（owning side）和反向方（inverse\
  \ side）来区分。拥有方（关系的所有者）在 `joinColumns` 元素中描述，在我们的示例中，它引用 ORDER 表。反向方，即关系的目标端，由 `inverseJoinColumns`\
  \ 元素指定，并引用 ORDER_LINE。\n\n使用 Order 实体（参见清单 3-47），你可以在 `orderLines` 属性上添加 `@OneToMany`\
  \ 和 `@JoinTable` 注解，将连接表重命名为 JND_ORD_LINE（而不是 ORDER_ORDER_LINE），并同时重命名两个外键列。\n\n\
  **清单 3-47.** *带有注解的一对多关系的 Order 实体*\n\n@Entity\n\npublic class Order {\n\n@Id @GeneratedValue\n\
  \nprivate Long id;\n\n@Temporal(TemporalType.TIMESTAMP)\n\nprivate Date creationDate;\n\
  \n**@OneToMany**\n\n**@JoinTable**(name = \" **jnd_ord_line**\",\n\n**joinColumns**\
  \ = @JoinColumn(name = \" **order_fk**\"),\n\n**inverseJoinColumns** = @JoinColumn(name\
  \ = \" **order_line_fk**\") )\n\nprivate List<OrderLine> orderLines;\n\n// 构造方法、getter、setter\n\
  \n}\n\n清单 3-47 中的 Order 实体将被映射到清单 3-48 中描述的连接表。\n\n**清单 3-48.** *连接表的结构*\n\ncreate\
  \ table **JND_ORD_LINE** (\n\n**ORDER_FK** BIGINT not null,\n\n**ORDER_LINE_FK**\
  \ BIGINT not null,\n\nprimary key (ORDER_FK, ORDER_LINE_FK),\n\nforeign key (ORDER_LINE_FK)\
  \ references ORDER_LINE(ID),\n\nforeign key (ORDER_FK) references ORDER(ID)\n\n\
  );\n\n单向一对多关系的默认规则是使用连接表，但将其改为使用外键也非常容易（并且对于遗留数据库很有用）。Order 实体需要提供一个 `@JoinColumn`\
  \ 注解来代替 `@JoinTable`，从而允许代码修改为如清单 3-49 所示。\n\n![Image 45](img/index-129_1.jpg)\n\
  \n第 3 章 ■ 对象关系映射\n\n**99**\n\n**清单 3-49.** *带有连接列的 Order 实体*\n\n@Entity\n\npublic\
  \ class Order {\n\n@Id @GeneratedValue\n\nprivate Long id;\n\n@Temporal(TemporalType.TIMESTAMP)\n\
  \nprivate Date creationDate;\n\n@OneToMany(fetch = FetchType.EAGER)\n\n**@JoinColumn(name\
  \ = \"order_fk\")**\n\nprivate List<OrderLine> orderLines;\n\n// 构造方法、getter、setter\n\
  \n}\n\n\n\nOrderLine 实体的代码（如前文清单 3-45 所示）保持不变。\n\n请注意，在清单 3-49 中，`@OneToMany` 注解覆盖了默认的抓取模式（将其从\
  \ LAZY 改为 EAGER）。通过使用 `@JoinColumn`，这种单向关联随后便采用了外键策略进行映射。该注解将外键重命名为 `ORDER_FK`，并存在于目标表（ORDER_LINE）中。最终得到的数据库结构如图\
  \ 3-18 所示。这里没有连接表，两个表之间的引用通过外键 `ORDER_FK` 实现。\n\n**图 3-18.** *Order 与 OrderLine\
  \ 之间的连接列*\n\n**@ManytoMany 双向关联**\n\n当一个源对象引用多个目标对象，并且一个目标对象也引用多个源对象时，就构成了多对多双向关系。例如，一张\
  \ CD 专辑由多位艺术家创作，而一位艺术家又出现在多张专辑中。在 Java 世界中，每个实体都会包含一个目标实体的集合。在关系型数据库世界中，映射多对多关系的唯一方法是使用连接表（连接列无法实现），并且正如你之前所见，在双向关系中，你需要显式地定义拥有方（使用\
  \ `mappedBy` 元素）。\n\n假设 Artist 实体是关系的拥有方，这意味着 CD 是反向拥有方（见清单 3-50），并且需要在其 `@ManyToMany`\
  \ 注解上使用 `mappedBy` 元素。`mappedBy` 告知持久化提供者，`appearsOnCDs` 是拥有方实体中对应属性的名称。\n\n**100**\n\
  \n第 3 章 ■ 对象关系映射\n\n**清单 3-50.** *一张 CD 由多位艺术家创作*\n\n```java\n@Entity\npublic class\
  \ CD {\n    @Id @GeneratedValue\n    private Long id;\n    private String title;\n\
  \    private Float price;\n    private String description;\n    @ManyToMany(mappedBy\
  \ = \"appearsOnCDs\")\n    private List<Artist> createdByArtists;\n    // 构造方法、getter、setter\n\
  }\n```\n\n因此，如果 Artist 是关系的拥有方，如清单 3-51 所示，那么它就需要通过 `@JoinTable` 和 `@JoinColumn`\
  \ 注解来自定义连接表的映射。\n\n**清单 3-51.** *一位艺术家出现在多张 CD 专辑上*\n\n```java\n@Entity\npublic\
  \ class Artist {\n    @Id @GeneratedValue\n    private Long id;\n    private String\
  \ firstName;\n    private String lastName;\n    @ManyToMany\n    @JoinTable(name\
  \ = \"jnd_art_cd\",\n               joinColumns = @JoinColumn(name = \"artist_fk\"\
  ),\n               inverseJoinColumns = @JoinColumn(name = \"cd_fk\"))\n    private\
  \ List<CD> appearsOnCDs;\n    // 构造方法、getter、setter\n}\n```\n\nArtist 和 CD 之间的连接表被重命名为\
  \ `JND_ART_CD`，每个连接列也都被重命名了。\n\n`joinColumns` 元素指向拥有方（Artist），而 `inverseJoinColumns`\
  \ 指向反向拥有方（CD）。数据库结构如图 3-19 所示。\n\n![Image 46](img/index-131_1.jpg)\n\n![Image 47](img/index-131_2.jpg)\n\
  \n![Image 48](img/index-131_3.jpg)\n\n第 3 章 ■ 对象关系映射\n\n**101**\n\n**图 3-19.** *Artist、CD\
  \ 以及连接表*\n\n请注意，在多对多和一对一的双向关系中，任何一方都可以被指定为拥有方。无论哪一方被指定为拥有者，另一方都应包含 `mappedBy` 元素。如果没有，持久化提供者会认为双方都是拥有者，并将其视为两个独立的一对多单向关系。这可能会导致产生四个表：ARTIST\
  \ 和 CD，再加上两个连接表，ARTIST_CD 和 CD_ARTIST。同时，在双方都使用 `mappedBy` 也是不合法的。\n\n**抓取关系**\n\
  \n你之前看到的所有注解（`@OneToOne`、`@OneToMany`、`@ManyToOne` 和 `@ManyToMany`）都定义了一个抓取属性，用于指定关联对象是立即加载（急切抓取）还是延迟加载（懒加载），这会对性能产生影响。根据你的应用程序，某些关系被访问的频率会高于其他关系。在这些情况下，你可以通过选择在实体首次读取时（急切地）或访问时（懒加载地）从数据库加载数据来优化性能。作为示例，让我们看一些极端情况。\n\
  \n\n\n假设有四个实体，它们之间通过不同的基数（一对一、一对多）相互关联。在第一种情况（见图 3-20）中，它们都具有**急加载**关系。这意味着，一旦你加载了\
  \ Class1（通过 ID 查找或查询），所有依赖的对象都会自动加载到内存中。这可能会影响系统的性能。\n\n**图 3-20.** *具有急加载关系的四个实体*\n\
  \n再看相反的情况，所有关系都使用**懒加载**模式（见图 3-21）。当你加载 Class1 时，不会加载其他任何内容（当然，除了 Class1 的直接属性）。你需要显式地访问\
  \ Class2（例如，通过 getter 方法）来告知持久化提供者从数据库加载数据，依此类推。如果你想操作整个对象图，你需要显式地调用每个实体：\n\nclass1.getClass2().getClass3().getClass4()\n\
  \n**图 3-21.** *具有懒加载关系的四个实体*\n\n**102**\n\n第 3 章 ■ 对象关系映射\n\n但不要认为 EAGER 是邪恶的，而\
  \ LAZY 是好的。EAGER 会通过少量的数据库访问将所有数据加载到内存中（持久化提供者可能会使用连接查询来连接表并提取数据）。使用 LAZY，你不会有填满内存的风险，因为你可以控制加载哪个对象。但每次都需要访问数据库。\n\
  \nfetch 参数非常重要，因为如果使用不当，可能会导致性能问题。每个注解都有一个默认的 fetch 值，你需要了解它，并在不适用时进行更改（见表 3-2）。\n\
  \n**表 3-2.** *默认抓取策略*\n\n**注解**\n\n**默认抓取策略**\n\n@OneToOne\n\nEAGER\n\n@ManyToOne\n\
  \nEAGER\n\n@OneToMany\n\nLAZY\n\n@ManyToMany\n\nLAZY\n\n当你在应用程序中加载一个采购订单时，你总是需要访问其订单行。因此，将\
  \ @OneToMany 注解的默认抓取模式更改为 EAGER 可能是高效的（见清单 3-52）。\n\n**清单 3-52.** *一个与 OrderLine\
  \ 具有急加载关系的 Order*\n\n@Entity\n\npublic class Order {\n\n@Id @GeneratedValue\n\n\
  private Long id;\n\n@Temporal(TemporalType.TIMESTAMP)\n\nprivate Date creationDate;\n\
  \n**@OneToMany(fetch = FetchType.EAGER)**\n\nprivate List<OrderLine> orderLines;\n\
  \n// 构造方法、getter、setter\n\n}\n\n**排序关系**\n\n对于一对多或多对多关系，你的实体处理的是对象集合。在 Java 端，这些集合通常是无序的。关系数据库也不会在其表中保留任何顺序。因此，如果你想要一个有序列表，要么以编程方式对集合进行排序，要么使用带有\
  \ Order By 子句的 JPQL 查询。JPA 提供了更简单的机制，基于注解来帮助排序关系。\n\n第 3 章 ■ 对象关系映射\n\n**103**\n\
  \n@OrderBy\n\n动态排序可以通过 @OrderBy 注解完成。“动态”意味着集合元素的排序是在检索关联时进行的。\n\nCD-BookStore 应用程序的例子允许用户撰写关于音乐和书籍的新闻。这些新闻是显示在网站上的文本。新闻发布后，人们可以添加评论（见清单\
  \ 3-53）。在网站上，你希望按时间顺序显示评论，因此排序就派上了用场。\n\n**清单 3-53.** *一个带有发布日期属性的 Comment 实体*\n\
  \n@Entity\n\npublic class Comment {\n\n@Id @GeneratedValue\n\nprivate Long id;\n\
  \nprivate String nickname;\n\nprivate String content;\n\nprivate Integer note;\n\
  \n@Column(name = \"posted_date\")\n\n@Temporal(TemporalType.TIMESTAMP)\n\nprivate\
  \ Date **postedDate**;\n\n// 构造方法、getter、setter\n\n}\n\n评论使用 Comment 实体建模，如清单 3-53\
  \ 所示。它包含内容，由匿名用户（通过昵称标识）发布，该用户在新闻上留下备注，并有一个由系统自动创建的 TIMESTAMP 类型的发布日期。\n\n在 News\
  \ 实体中，如清单 3-54 所示，你希望能够按发布日期降序排列评论列表。为此，你将 @OrderBy 注解与 @OneToMany 注解结合使用。\n\n**清单\
  \ 3-54.** *News 实体的评论按发布日期降序排列*\n\n@Entity\n\npublic class News {\n\n@Id @GeneratedValue\n\
  \nprivate Long id;\n\n@Column(nullable = false)\n\nprivate String content;\n\n@OneToMany(fetch\
  \ = FetchType.EAGER)\n\n**@OrderBy(\"postedDate desc\")**\n\nprivate List<Comment>\
  \ comments;\n\n// 构造方法、getter、setter\n\n}\n\n**104**\n\n第 3 章 ■ 对象关系映射\n\n@OrderBy\
  \ 注解将需要进行排序的属性名称（postedDate 属性）以及排序方式（升序或降序）作为参数。字符串 ASC 或 DESC 可分别用于升序或降序排序。你可以在\
  \ @OrderBy 注解中使用多个列。如果你需要按发布日期和备注排序，可以使用 OrderBy(\"postedDate desc, note asc\")。\n\
  \n@OrderBy 注解对数据库映射没有任何影响。持久化提供者仅仅被告知在检索集合时使用 order by 子句。\n\n@OrderColumn\n\nJPA\
  \ 1.0 支持使用 @OrderBy 注解进行动态排序，但不包括维护持久化排序的支持。JPA 2.0 通过添加一个新注解解决了这个问题：@OrderColumn（见清单\
  \ 3-55）。此注解告知持久化提供者，需要使用一个单独的列来存储索引，以维护有序列表。@OrderColumn 定义了此单独的列。\n\n**清单 3-55.**\
  \ *@OrderColumn API 与 @Column 类似*\n\n@Target({METHOD, FIELD}) @Retention(RUNTIME)\n\
  \npublic @interface **OrderColumn** {\n\nString name() default \"\";\n\nboolean\
  \ nullable() default true;\n\nboolean insertable() default true;\n\nboolean updatable()\
  \ default true;\n\nString columnDefinition() default \"\";\n\nboolean contiguous()\
  \ default true;\n\nint base() default 0;\n\nString table() default \"\";\n\n}\n\n\
  让我们使用新闻和评论的例子，并稍作修改。这次，Comment 实体（如清单 3-56 所示）没有 postedDate 属性，因此无法按时间顺序对新闻进行排序。\n\
  \n**清单 3-56.** *一个没有发布日期的 Comment 实体*\n\n@Entity\n\npublic class Comment {\n\n@Id\
  \ @GeneratedValue\n\nprivate Long id;\n\nprivate String nickname;\n\nprivate String\
  \ content;\n\nprivate Integer note;\n\n// 构造方法、getter、setter\n\n}\n\n第 3 章 ■ 对象关系映射\n\
  \n**105**\n\nNews 实体（如清单 3-57 所示）*可以*做的是用 @OrderColumn 注解该关系。然后，持久化提供者会将 News 实体映射到一个包含额外列的表，以存储排序顺序。\n\
  \n**清单 3-57.** *评论的排序被持久化*\n\n@Entity\n\npublic class News {\n\n@Id @GeneratedValue\n\
  \nprivate Long id;\n\n@Column(nullable = false)\n\nprivate String content;\n\n@OneToMany(fetch\
  \ = FetchType.EAGER)\n\n**@OrderColumn(\"posted_index\")**\n\nprivate List<Comment>\
  \ comments;\n\n// 构造方法、getter、setter\n\n}\n\n在清单 3-57 中，@OrderColumn 将额外的列重命名为 POSTED_INDEX。如果未覆盖名称，默认情况下，列名是引用实体名称与\
  \ _ORDER 字符串的拼接（在我们的例子中是 COMMENT_ORDER）。此列的类型必须是数值类型。\n\n需要注意性能影响；与 @OrderColumn\
  \ 注解一样，持久化提供者还必须跟踪索引的更改。它负责在插入、删除或重新排序时维护顺序。如果数据被插入到现有已排序信息列表的中间，持久化提供者将不得不重新排序整个索引。\n\
  \n\n\n可移植的应用程序不应期望数据库对列表进行排序，即便某些数据库引擎会自动优化索引以使数据表看起来已排序。相反，应使用 `@OrderColumn` 或\
  \ `@OrderBy` 构造。请注意，不能同时使用这两个注解。\n\n**继承映射**\n\n自诞生以来，面向对象语言一直使用继承范式。C++ 允许多重继承，而\
  \ Java 支持单类继承。在面向对象语言中，开发者通常通过继承根类的属性和行为来复用代码。\n\n你刚刚学习了关系，实体之间的关系可以非常直接地映射到关系型数据库。但继承并非如此。继承是一个完全未知的概念，在关系型世界中并未原生实现。\n\
  \n将对象保存到关系型数据库时，继承概念会带来几个棘手问题。\n\n如何将层次模型组织成扁平的关系模型？JPA 提供了三种可供选择的策略：\n\n• *单表每类层次结构策略*：整个实体层次结构的所有属性被扁平化到一张表中（这是默认策略）。\n\
  \n![Image 49](img/index-136_1.jpg)\n\n**106**\n\n第 3 章 ■ 对象关系映射\n\n• *连接子类策略*：在这种方法中，层次结构中的每个实体（无论是具体类还是抽象类）都映射到其专属表。\n\
  \n• *每具体类一张表策略*：此策略将每个具体实体层次结构映射到其独立的表。\n\n■**注意** 在 JPA 2.0 中，对每具体类一张表继承映射策略的支持仍是可选的。可移植的应用程序应避免使用它，直到该策略被正式强制要求。\n\
  \n利用注解的易用性，JPA 2.0 为定义和映射继承层次结构（包括实体、抽象实体、映射类和瞬态类）提供了声明式支持。`@Inheritance` 注解用于根实体，以指定其自身及叶子类的映射策略。JPA\
  \ 还将对象的重写概念转换到映射中，允许子类重写根类属性。在接下来的部分中，你还会看到访问类型如何与继承结合使用，以混合字段访问和属性访问。\n\n**继承策略**\n\
  \n在映射继承时，JPA 支持三种不同的策略。当存在实体层次结构时，它始终有一个实体作为根。根实体类可以通过使用 `@Inheritance` 注解来定义继承策略。如果未定义，则将应用默认的单表每类策略。为了探讨每种策略，我将讨论如何映射\
  \ CD 和 Book 实体，它们都继承自 Item 实体（见图 3-22）。\n\n**图 3-22.** *CD、Book 和 Item 之间的继承层次结构*\n\
  \nItem 实体是根实体，拥有一个标识符（将转换为主键），CD 和 Book 实体都继承自它。每个叶子类都添加了额外属性，例如 Book 实体的 ISBN 或\
  \ CD 实体的总时长。\n\n第 3 章 ■ 对象关系映射\n\n**107**\n\n单表策略\n\n默认的继承映射策略是单表策略，其中层次结构中的所有实体都映射到一张表。由于这是默认策略，你可以完全省略根实体上的\
  \ `@Inheritance` 注解（得益于“通过异常配置”），这正是 Item 实体所做的（见清单 3-58）。\n\n**清单 3-58.** *Item\
  \ 实体定义单表策略*\n\n@Entity\n\npublic class Item {\n\n@Id @GeneratedValue\n\nprotected\
  \ Long id;\n\n**@Column(nullable = false)**\n\nprotected String title;\n\n**@Column(nullable\
  \ = false)**\n\nprotected Float price;\n\nprotected String description;\n\n// 构造方法、getter、setter\n\
  \n}\n\nItem 是 Book 实体（见清单 3-59）和 CD 实体（见清单 3-60）的根类。\n\n\n\n这些实体继承了 Item 的属性以及默认的继承策略，因此无需使用\
  \ @Inheritance 注解。\n\n**清单 3-59.** *Book 继承 Item*\n\n@Entity\n\npublic class Book\
  \ **extends Item** {\n\nprivate String isbn;\n\nprivate String publisher;\n\nprivate\
  \ Integer nbOfPage;\n\nprivate Boolean illustrations;\n\n// 构造方法、getter 和 setter\
  \ 方法\n\n}\n\n**清单 3-60.** *CD 继承 Item*\n\n@Entity\n\npublic class CD **extends Item**\
  \ {\n\nprivate String musicCompany;\n\nprivate Integer numberOfCDs;\n\nprivate Float\
  \ totalDuration;\n\nprivate String gender;\n\n![Image 50](img/index-138_1.jpg)\n\
  \n![Image 51](img/index-138_2.jpg)\n\n**108**\n\n第 3 章 ■ 对象关系映射\n\n// 构造方法、getter\
  \ 和 setter 方法\n\n}\n\n根据目前所学，如果不使用继承，这三个实体会被映射到各自独立的表中，但使用继承后情况就不同了。采用单表策略时，它们最终都会映射到同一个数据库表中，该表默认以根类的名称命名：ITEM。图\
  \ 3-23 展示了 ITEM 表的结构。\n\n**图 3-23.** *ITEM 表结构*\n\n如图 3-23 所示，ITEM 表汇总了 Item、Book\
  \ 和 CD 实体的所有属性。但其中有一列与任何实体的属性都无关：即鉴别器列 DTYPE。\n\nITEM 表中将填充 items、books 和 CD albums\
  \ 的数据。在访问数据时，持久化提供程序需要知道哪一行属于哪个实体。这样，提供程序在读取 ITEM 表时，就会实例化相应的对象类型（Item、Book 或 CD）。这就是为什么使用鉴别器列来显式标记每一行的类型。\n\
  \n图 3-24 展示了 ITEM 表的部分数据片段。可以看到，单表策略存在一些空位；并非每一列都对每个实体有用。第一行是存储的 Item 实体数据（DTYPE\
  \ 列包含实体名称）。Item 只有标题、价格和描述（参见前面的清单 3-58）；它们没有音乐公司、ISBN 等属性。因此这些列将始终为空。\n\n**图 3-24.**\
  \ *填充了数据的 ITEM 表片段*\n\n默认情况下，鉴别器列名为 DTYPE，类型为 String（映射为 VARCHAR），并包含实体名称。如果默认设置不适用，可以使用\
  \ @DiscriminatorColumn 注解来更改名称和数据类型。第 3 章 ■ 对象关系映射\n\n**109**\n\n默认情况下，该列的值是其引用的实体名称，不过实体可以使用\
  \ @DiscriminatorValue 注解覆盖此值。\n\n在清单 3-61 中，我将鉴别器列重命名为 DISC（而不是 DTYPE），并将其数据类型改为\
  \ Char（而不是 String）；每个实体应将其鉴别器值改为：Item 为 I，Book 为 B（见清单 3-62），CD 为 C（见清单 3-63）。\n\
  \n**清单 3-61.** *Item 重新定义鉴别器列*\n\n@Entity\n\n@Inheritance(strategy = InheritanceType.SINGLE_TABLE)\n\
  \n**@DiscriminatorColumn (name=\"disc\",** ➥\n\n**discriminatorType = DiscriminatorType.CHAR)**\n\
  \n**@DiscriminatorValue(\"I\")**\n\npublic class Item {\n\n@Id @GeneratedValue\n\
  \nprivate Long id;\n\nprivate String title;\n\nprivate Float price;\n\nprivate String\
  \ description;\n\n// 构造方法、getter 和 setter 方法\n\n}\n\n根实体 Item 通过 @DiscriminatorColumn\
  \ 为整个层次结构定义了一次鉴别器列。然后，它通过 @DiscriminatorValue 注解将自己的默认值改为 I。子实体只需重新定义自己的鉴别器值。\n\n\
  **清单 3-62.** *Book 将鉴别器值重新定义为 B*\n\n@Entity\n\n**@DiscriminatorValue(\"B\")**\n\n\
  public class Book extends Item {\n\nprivate String isbn;\n\nprivate String publisher;\n\
  \nprivate Integer nbOfPage;\n\nprivate Boolean illustrations;\n\n// 构造方法、getter\
  \ 和 setter 方法\n\n}\n\n**清单 3-63.** *CD 将鉴别器值重新定义为 C*\n\n@Entity\n\n**@DiscriminatorValue(\"\
  C\")**\n\npublic class CD extends Item {\n\nprivate String musicCompany;\n\n![Image\
  \ 52](img/index-140_1.jpg)\n\n**110**\n\n第 3 章 ■ 对象关系映射\n\n\n\nprivate Integer numberOfCDs;\n\
  \nprivate Float totalDuration;\n\nprivate String gender;\n\n// 构造方法、getter、setter\n\
  \n}\n\n结果如图 3-25 所示。鉴别器列及其值与前面图 3-24 中显示的不同。\n\n**图 3-25.** *具有不同鉴别器名称和值的 ITEM 表*\n\
  \n单表策略是默认策略，最容易理解，并且在层次结构相对简单且稳定时效果良好。然而，它也有一些缺点：向层次结构中添加新实体，或向现有实体添加属性，都需要向表中添加新列、迁移数据并更改索引。这种策略还要求子实体的列可为空。如果\
  \ Book 实体的 ISBN 恰好是非空的，那么你就无法再插入 CD，因为 CD 实体没有 ISBN。\n\n**联合策略**\n\n在联合策略中，层次结构中的每个实体都映射到自己的表。根实体映射到一个表，该表定义了层次结构中所有表要使用的主键，以及鉴别器列。每个子类由一个单独的表表示，该表包含其自身的属性（不从根类继承）以及一个引用根表主键的主键。非根表不包含鉴别器列。\n\
  \n你可以通过使用 `@Inheritance` 注解来标注根实体，从而实现联合策略，如清单 3-64 所示（CD 和 Book 的代码保持不变，与之前相同）。\n\
  \n**清单 3-64.** *采用联合策略的 Item 实体*\n\n@Entity\n\n**@Inheritance(strategy = InheritanceType.JOINED)**\n\
  \npublic class Item {\n\n@Id @GeneratedValue\n\nprotected Long id;\n\nprotected\
  \ String title;\n\n![Image 53](img/index-141_1.jpg)\n\n第 3 章 ■ 对象关系映射\n\n**111**\n\
  \nprotected Float price;\n\nprotected String description;\n\n// 构造方法、getter、setter\n\
  \n}\n\n从开发者的角度来看，联合策略很自然，因为每个实体（无论是抽象的还是具体的）的状态都会映射到不同的表。图 3-26 展示了 Item、Book 和\
  \ CD 实体将如何映射。\n\n**图 3-26.** *使用联合策略映射继承关系*\n\n你仍然可以在根实体中使用 `@DiscriminatorColumn`\
  \ 和 `@DiscriminatorValue` 注解来自定义鉴别器列和值（DTYPE 列位于 ITEM 表中）。\n\n联合策略直观且接近你所了解的对象继承机制。但查询可能会影响性能。之所以称这种策略为“联合”，是因为要重新组装子类的实例，必须将子类表与根类表进行连接。层次结构越深，组装叶子实体所需的连接就越多。\n\
  \n**每类一表策略**\n\n在每类一表（或每个具体类一张表）策略中，每个实体都映射到其专用的表，这与联合策略类似。不同之处在于，根实体的所有属性也会映射到子实体表的列中。从数据库的角度来看，这种策略会使模型反规范化，并导致所有根实体的属性在继承自它的所有叶子实体的表中被重新定义。采用每类一表策略，没有共享的表、共享的列，也没有鉴别器列。唯一的要求是所有表必须共享一个公共主键，该主键在层次结构中的所有表中保持一致。\n\
  \n要将我们的示例映射到这种策略，只需在根实体（Item）的 `@Inheritance` 注解（见清单 3-65）上指定 `TABLE_PER_CLASS`\
  \ 即可。\n\n**清单 3-65.** *采用每类一表策略的 Item 实体*\n\n@Entity\n\n**@Inheritance(strategy\
  \ = InheritanceType.TABLE_PER_CLASS)**\n\npublic class Item {\n\n@Id @GeneratedValue\n\
  \nprotected Long id;\n\nprotected String title;\n\nprotected Float price;\n\nprotected\
  \ String description;\n\n![Image 54](img/index-142_1.jpg)\n\n**112**\n\n第 3 章 ■\
  \ 对象关系映射\n\n// 构造方法、getter、setter\n\n}\n\n\n\n图 3-27 展示了 ITEM、BOOK 和 CD 表。可以看到 BOOK\
  \ 和 CD 表重复了 ITEM 表中的 ID、TITLE、PRICE 和 DESCRIPTION 列。请注意这些表之间没有关联。\n\n**图 3-27.**\
  \ *BOOK 和 CD 表重复了 ITEM 表的列*\n\n每个表都可以通过使用`@Table`注解对每个实体进行标注来重新定义。\n\n逐表策略在查询单个实体的实例时性能良好，因为它类似于单表策略：查询仅限于单个表。其缺点在于，在类层次结构中进行多态查询时（例如，查找所有项目，包括\
  \ CD 和书籍），该策略比其他策略成本更高；它必须使用`UNION`操作查询所有子类表，当涉及大量数据时，这种操作代价高昂。\n\n**覆盖属性**\n\n\
  采用逐表策略时，根类的列会在叶子表中重复。它们保持相同的名称。但如果使用的是遗留数据库，且列名不同，该怎么办？JPA 使用`@AttributeOverride`注解来覆盖列映射，并使用`@AttributeOverrides`来覆盖多个列映射。\n\
  \n要重命名 BOOK 和 CD 表中的 ID、TITLE 和 DESCRIPTION 列，Item 实体的代码无需更改，但 Book 实体（见清单 3-66）和\
  \ CD 实体（见清单 3-67）必须使用`@AttributeOverride`注解。\n\n**清单 3-66.** *Book 覆盖了 Item 的部分列*\n\
  \n`@Entity`\n\n**`@AttributeOverrides({`**\n\n**`@AttributeOverride(name = \"id\"\
  ,`** ➥\n\n**`column = @Column(name = \"book_id\")),`**\n\n**`@AttributeOverride(name\
  \ = \"title\",`** ➥\n\n**`column = @Column(name = \"book_title\")),`**\n\n**`@AttributeOverride(name\
  \ = \"description\",`** ➥\n\n**`column = @Column(name = \"book_description\"))`**\n\
  \n**`})`**\n\n`public class Book extends Item {`\n\n`private String isbn;`\n\n`private\
  \ String publisher;`\n\n`private Integer nbOfPage;`\n\n`private Boolean illustrations;`\n\
  \n![Image 55](img/index-143_1.jpg)\n\n第 3 章 ■ 对象关系映射\n\n**113**\n\n`// 构造函数、getter、setter`\n\
  \n`}`\n\n**清单 3-67.** *CD 覆盖了 Item 的部分列*\n\n`@Entity`\n\n**`@AttributeOverrides({`**\n\
  \n**`@AttributeOverride(name = \"id\",`** ➥\n\n**`column = @Column(name = \"cd_id\"\
  )),`**\n\n**`@AttributeOverride(name = \"title\",`** ➥\n\n**`column = @Column(name\
  \ = \"cd_title\")),`**\n\n**`@AttributeOverride(name = \"description\",`** ➥\n\n\
  **`column = @Column(name = \"cd_description\"))`**\n\n**`})`**\n\n`public class\
  \ CD extends Item {`\n\n`private String musicCompany;`\n\n`private Integer numberOfCDs;`\n\
  \n`private Float totalDuration;`\n\n`private String gender;`\n\n`// 构造函数、getter、setter`\n\
  \n`}`\n\n由于需要覆盖多个属性，你必须使用`@AttributeOverrides`，它接受一个`@AttributeOverride`注解数组。每个注解指向\
  \ Item 实体的一个属性，并使用`@Column`注解重新定义列的映射。因此，`name = \"title\"`指的是 Item 实体的`title`属性，而`@Column(name\
  \ = \"cd_title\")`则告知持久化提供者，`title`必须映射到`CD_TITLE`列。结果如图 3-28 所示。\n\n**图 3-28.**\
  \ *BOOK 和 CD 表覆盖了 ITEM 表的列*\n\n■**注意** 在本章前面的“可嵌入类”部分，你了解到可嵌入对象可以被多个实体共享（Address\
  \ 被 Customer 和 Order 嵌入）。由于可嵌入对象是所属实体的固有部分，它们的列也会在每个实体的表中重复。如果需要覆盖可嵌入类的列，则可以使用`@AttributeOverrides`。\n\
  \n**114**\n\n第 3 章 ■ 对象关系映射\n\n**继承层次结构中的类类型**\n\n用于解释映射策略的示例仅使用了实体。Item 是一个实体，Book\
  \ 和 CD 也是。但实体并非只能继承自实体。一个类层次结构可以混合各种不同类型的类：实体以及非实体（或瞬态类）、抽象实体和映射超类。继承自这些不同类型的类会对映射产生影响。\n\
  \n抽象实体\n\n\n\n在前面的示例中，`Item` 实体是具体的。它使用了 `@Entity` 注解，并且没有 `abstract` 关键字，但抽象类同样可以被指定为实体。抽象实体与具体实体的唯一区别在于，它不能通过\
  \ `new` 关键字直接实例化。抽象实体为其叶子实体（`Book` 和 `CD`）提供了公共数据结构，并遵循映射策略。对于持久化提供者而言，抽象实体被映射为一个实体。唯一的区别在于\
  \ Java 层面，而非映射层面。\n\n非实体\n\n非实体也被称为瞬态类，即它们是 POJO。一个实体可以继承自非实体，也可以被非实体所继承。为什么要在层级结构中引入非实体呢？\n\
  \n对象建模和继承是共享状态和行为的手段。\n\n非实体可用于为叶子实体提供公共数据结构。非实体超类的状态不会被持久化，因为它不受持久化提供者的管理（请记住，一个类被持久化提供者管理的条件是存在\
  \ `@Entity` 注解）。\n\n例如，`Book` 是一个实体，如清单 3-68 所示，它继承自非实体 `Item`（`Item` 没有任何注解）。\n\
  \n**清单 3-68.** *Item 是一个没有 @Entity 注解的简单 POJO*\n\npublic class Item {\n\nprotected\
  \ String title;\n\nprotected Float price;\n\nprotected String description;\n\n//\
  \ 构造方法、getter、setter\n\n}\n\n如清单 3-69 所示的 `Book` 实体继承自 `Item`，因此 Java 代码可以以常规的面向对象方式访问\
  \ `title`、`price` 和 `description` 属性，以及任何其他已定义的方法。`Item` 可以是具体的或抽象的，并且对最终的映射没有影响。\n\
  \n**清单 3-69.** *Book 实体继承自一个 POJO*\n\n@Entity\n\npublic class Book extends Item\
  \ {\n\n第 3 章 ■ 对象关系映射\n\n**115**\n\n@Id @GeneratedValue\n\nprivate Long id;\n\n\
  private String isbn;\n\nprivate String publisher;\n\nprivate Integer nbOfPage;\n\
  \nprivate Boolean illustrations;\n\n// 构造方法、getter、setter\n\n}\n\n`Book` 是一个实体，并继承自\
  \ `Item`。但只有 `Book` 的属性会被映射到表中。`Item` 的任何属性都不会出现在清单 3-70 所定义的表结构中。要持久化一个 `Book`，你需要创建一个\
  \ `Book` 实例，为任何你想要的属性（`title`、`price`、`isbn`、`publisher` 等）设置值，但只有 `Book` 的属性（`id`、`isbn`\
  \ 等）会被持久化。\n\n**清单 3-70.** *BOOK 表不包含 Item 的任何属性*\n\ncreate table **BOOK** (\n\n\
  ID BIGINT not null,\n\nILLUSTRATIONS SMALLINT,\n\nISBN VARCHAR(255),\n\nNBOFPAGE\
  \ INTEGER,\n\nPUBLISHER VARCHAR(255),\n\nprimary key (ID)\n\n);\n\n映射超类\n\nJPA 定义了一种特殊的类，称为*映射超类*，用于共享状态和行为，以及实体继承的映射信息。然而，映射超类并不是实体。它们不受持久化提供者的管理，没有对应的映射表，不能被查询，也不能成为关系的一部分，但它们可以为任何继承自它们的实体提供持久化属性。它们类似于可嵌入类，区别在于它们可以用于继承。通过在类上使用\
  \ `@MappedSuperclass` 注解，可以将其标记为映射超类。\n\n如清单 3-71 所示，根类 `Item` 使用了 `@MappedSuperclass`\
  \ 注解，而非 `@Entity`。它定义了一个继承策略（`JOINED`），并为其部分属性添加了 `@Column` 注解，但由于映射超类不会被映射到表，因此不允许使用\
  \ `@Table` 注解。\n\n**清单 3-71.** *Item 是一个映射超类*\n\n**@MappedSuperclass**\n\n@Inheritance(strategy\
  \ = InheritanceType.JOINED)\n\npublic class Item {\n\n@Id @GeneratedValue\n\nprotected\
  \ Long id;\n\n**116**\n\n第 3 章 ■ 对象关系映射\n\n**@Column(length = 50, nullable = false)**\n\
  \nprotected String title;\n\nprotected Float price;\n\n**@Column(length = 2000)**\n\
  \nprotected String description;\n\n// 构造方法、getter、setter\n\n}\n\n\n\n如清单 3-71 所示，`title`\
  \ 和 `description` 属性都使用了 `@Column` 注解。清单 3-72 展示了 `Book` 实体继承自 `Item`。\n\n**清单 3-72.**\
  \ *Book 继承自映射超类*\n\n@Entity\n\npublic class Book **extends Item** {\n\nprivate String\
  \ isbn;\n\nprivate String publisher;\n\nprivate Integer nbOfPage;\n\nprivate Boolean\
  \ illustrations;\n\n// 构造方法、getter、setter\n\n}\n\n此层次结构将映射到仅一张表。`Item` 不是实体，也没有对应的表。`Item`\
  \ 和 `Book` 的属性将映射到 `BOOK` 表的列，但映射超类也会共享其映射信息。`Item` 中的 `@Column` 注解将被继承。然而，由于映射超类并非受管理的实体，你将无法对它们进行持久化或查询等操作。清单\
  \ 3-73 展示了带有自定义 `TITLE` 和 `DESCRIPTION` 列的 `BOOK` 表结构。\n\n**清单 3-73.** *BOOK 表不包含\
  \ Item 的属性*\n\ncreate table BOOK (\n\nID BIGINT not null,\n\n**TITLE VARCHAR(50)\
  \ not null,**\n\nPRICE DOUBLE(52, 0),\n\nILLUSTRATIONS SMALLINT,\n\n**DESCRIPTION\
  \ VARCHAR(2000),**\n\nISBN VARCHAR(255),\n\nNBOFPAGE INTEGER,\n\nPUBLISHER VARCHAR(255),\n\
  \nprimary key (ID)\n\n);\n\n第 3 章 ■ 对象关系映射\n\n**117**\n\n**总结**\n\n得益于“例外配置”原则，将实体映射到表所需的工作并不多：只需告知持久化提供者某个类是一个实体（使用\
  \ `@Entity`），以及某个属性是其标识符（使用 `@Id`），JPA 便会完成其余工作。如果只使用默认配置，本章本可以简短得多。JPA 提供了非常丰富的注解集，用于定制\
  \ ORM 的每一个微小细节。\n\n基础注解可用于属性（`@Basic`、`@Temporal` 等）或类，以定制映射。你可以更改表名或主键类型，甚至可以使用\
  \ `@Transient` 注解避免映射。借助 JPA 2.0，你现在可以映射基本类型或可嵌入类型的集合。根据你的业务模型，你可以映射不同方向和多重性的关系（`@OneToOne`、`@ManyToMany`\
  \ 等）。继承（`@Inheritance`、`@MappedSuperclass` 等）也是如此，你可以使用不同的策略来映射由实体和非实体混合构成的层次结构。\n\
  \n本章重点介绍了 JPA 的静态部分，即如何将实体映射到表。下一章将讨论动态方面：如何查询这些实体。\n\n第 4 章\n\n管理持久化对象\n\n**J**ava\
  \ 持久化 API 包含两个方面。第一个方面是将对象映射到关系数据库的能力。“例外配置”原则允许持久化提供者无需大量代码即可完成大部分工作，但 JPA 的丰富性也允许通过注解或\
  \ XML 描述符进行从对象到表的定制映射。从简单的映射（更改列名）到更复杂的映射（继承），JPA 提供了广泛的定制选项。因此，你几乎可以将任何对象模型映射到遗留数据库。\n\
  \nJPA 的另一个方面是查询这些映射对象的能力。在 JPA 中，以标准方式操作实体实例的集中式服务是实体管理器。它提供了一套 API，用于创建、查找、移除对象以及与数据库同步。它还允许对实体执行不同类型的\
  \ JPQL 查询，例如动态查询、静态查询或原生查询。实体管理器也支持锁定机制。\n\n数据库世界依赖于结构化查询语言（SQL）。这种编程语言专为管理关系数据（检索、插入、更新和删除）而设计，其语法以表为中心。你可以从由行组成的表中选择列，连接多个表，通过联合操作合并两个\
  \ SQL 查询的结果，等等。这里没有对象，只有行、列和表。在操作对象的 Java 世界中，一种为表设计的语言（SQL）必须经过改造，才能适应一种由对象构成的语言（Java）。\n\
  \n\n\n这就是 Java 持久化查询语言（JPQL）发挥作用的地方。\n\nJPQL 是 JPA 中定义的一种语言，用于查询存储在关系数据库中的实体。JPQL\
  \ 的语法类似于 SQL，但它是针对实体对象进行操作，而不是直接操作数据库表。JPQL 不关心底层数据库结构，也不处理表或列，而是处理对象和属性。为此，它使用了\
  \ Java 开发者熟悉的点（.）表示法。\n\n在本章中，你将学习如何管理持久化对象。这意味着你将学习如何使用实体管理器执行创建、读取、更新和删除（CRUD）操作，以及使用\
  \ JPQL 执行复杂查询。在本章末尾，你将看到 JPA 如何处理并发。\n\n**如何查询一个实体**\n\n让我们以第一个示例开始：一个简单的查询——通过标识符查找一本书。在清单\
  \ 4-1 中，你可以看到一个 Book 实体，它使用 `@Id` 注解来告知持久化提供者，`id` 属性必须映射为主键。\n\n**119**\n\n**120**\n\
  \n第 4 章 ■ 管理持久化对象\n\n**清单 4-1.** *一个简单的 Book 实体*\n\n**@Entity**\n\npublic class\
  \ Book {\n\n**@Id**\n\nprivate Long id;\n\nprivate String title;\n\nprivate Float\
  \ price;\n\nprivate String description;\n\nprivate String isbn;\n\nprivate Integer\
  \ nbOfPage;\n\nprivate Boolean illustrations;\n\n// 构造方法、getter、setter\n\n}\n\n\
  Book 实体保存了映射信息。在这个示例中，使用了大部分默认设置，数据将存储在一个名称与实体名称（BOOK）相同的表中，并且每个属性都会有对应的列映射。你可以使用一个单独的\
  \ Main 类（见清单 4-2），该类使用 `javax.persistence.EntityManager` 接口将一个 Book 实例存储到表中。\n\n\
  **清单 4-2.** *一个持久化和检索 Book 实体的 Main 类*\n\npublic class Main {\n\npublic static void\
  \ main(String[] args) {\n\n**// 1-创建 Book 实体的一个实例**\n\nBook book = new Book();\n\
  \nbook.setId(1234L);\n\nbook.setTitle(\"The Hitchhiker's Guide to the Galaxy\");\n\
  \nbook.setPrice(12.5F);\n\nbook.setDescription(\"Science fiction created by Douglas\
  \ Adams.\");\n\nbook.setIsbn(\"1-84023-742-2\");\n\nbook.setNbOfPage(354);\n\nbook.setIllustrations(false);\n\
  \n**// 2-获取一个实体管理器和一个事务**\n\nEntityManagerFactory emf = ➥\n\nPersistence.createEntityManagerFactory(\"\
  chapter04PU\");\n\nEntityManager em = emf.createEntityManager();\n\nEntityTransaction\
  \ tx = em.getTransaction();\n\n**// 3-将书持久化到数据库**\n\ntx.begin();\n\nem.persist(book);\n\
  \ntx.commit();\n\n![Image 56](img/index-151_1.jpg)\n\n第 4 章 ■ 管理持久化对象\n\n**121**\n\
  \n**// 4-通过标识符检索书**\n\nbook = em.find(Book.class, 1234L);\n\nSystem.out.println(book);\n\
  \nem.close();\n\nemf.close();\n\n}\n\n}\n\n清单 4-2 中的 Main 类使用了四个不同的步骤来持久化一本书并从数据库中检索它：\n\
  \n****1.** 创建 Book 实体的一个实例。实体是带有注解的 POJO，由持久化提供者管理。从 Java 的角度来看，类的实例需要像任何 POJO 一样通过\
  \ `new` 关键字创建。需要强调的是，在代码执行到这一步之前，持久化提供者并不知道这个 Book 对象。\n\n****2.** 获取一个实体管理器和一个事务。这是代码的重要部分，因为操作实体需要一个实体管理器。首先，为\
  \ chapter04PU 持久化单元创建一个实体管理器工厂。然后，使用这个工厂获取一个实体管理器（`em` 变量），在整个代码中用它来获取一个事务（`tx`\
  \ 变量），并持久化和检索 Book。\n\n****3.** 将书持久化到数据库。代码启动一个事务（`tx.begin()`），并使用 `EntityManager.persist()`\
  \ 方法来插入一个 Book 实例。当事务被提交（`tx.commit()`）时，数据会被刷新到数据库中。\n\n****4.** 通过标识符检索书。再次使用实体管理器，通过其标识符来检索书（`EntityManager.find()`）。\n\
  \n请注意，这段代码中没有 SQL 查询、JPQL 查询或 JDBC 调用。图 4-1 展示了这些组件之间的交互。Main 类通过 `EntityManager`\
  \ 接口与底层数据库交互，该接口提供了一组标准方法，允许你对 Book 实体执行操作。在幕后，`EntityManager` 依赖持久化提供者与数据库交互。当调用\
  \ `EntityManager` 方法时，持久化提供者会生成并通过相应的 JDBC 驱动程序执行一条 SQL 语句。\n\n**图 4-1.** *实体管理器与实体及底层数据库交互*\n\
  \n**122**\n\n第 4 章 ■ 管理持久化对象\n\n使用哪个 JDBC 驱动程序？如何连接到数据库？数据库名称是什么？这些信息在我们之前的代码中是缺失的。当\
  \ Main 类创建 `EntityManagerFactory` 时，它传递了一个持久化单元的名称作为参数；在这个例子中，它叫做 chapter04PU。持久化单元向实体管理器指示要使用的数据库类型和连接参数，这些参数定义在\
  \ `persistence.xml` 文件中，如清单 4-3 所示，该文件必须与类一起部署。\n\n**清单 4-3.** *定义持久化单元的 persistence.xml\
  \ 文件*\n\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\n[<persistence version=\"\
  1.0\">](http://java.sun.com/xml/ns/persistence)\n\n<persistence-unit name=\" **chapter04PU**\"\
  \ transaction-type=\"RESOURCE_LOCAL\">\n\n<provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>\n\
  \n<class>com.apress.javaee6.chapter04. **Book**</class>\n\n<properties>\n\n<property\
  \ name=\"eclipselink.target-database\" value=\" **DERBY**\"/>\n\n<property name=\"\
  eclipselink.jdbc.driver\" ➥\n\nvalue=\"org.apache.derby.jdbc.ClientDriver\"/>\n\n\
  <property name=\"eclipselink.jdbc.url\" ➥\n\nvalue=\"jdbc:derby://localhost:1527/**chapter04DB**\"\
  />\n\n<property name=\"eclipselink.jdbc.user\" value=\"APP\"/>\n\n<property name=\"\
  eclipselink.jdbc.password\" value=\"APP\"/>\n\n</properties>\n\n</persistence-unit>\n\
  \n</persistence>\n\nchapter04PU 持久化单元为 chapter04DB Derby 数据库定义了一个 JDBC 连接。它使用一个用户（APP）和密码（APP）在给定的\
  \ URL 上进行连接。`<class>` 标签告知持久化提供者管理 Book 类。\n\n为了使代码能够运行，除了需要在端口 1527 上运行一个 Derby\
  \ 数据库外，还需要将 Book 和 Main 类编译并与这个 `META-INF/persistence.xml` 文件一起部署。\n\n通过启用日志记录，你可能会看到一些\
  \ SQL 语句的踪迹，但你的代码是以面向对象的方式操作对象，没有使用 SQL 语句或直接的 JDBC 调用，而是使用了 `EntityManager` API。\n\
  \n**实体管理器**\n\n实体管理器是 JPA 中的核心部分。它管理实体的状态和生命周期，以及在持久化上下文中查询实体。实体管理器负责创建和移除持久化实体实例，并通过主键查找实体。它可以通过使用乐观锁或悲观锁来锁定实体以防止并发访问，并且可以使用\
  \ JPQL 查询来根据特定条件检索实体。\n\n当一个实体管理器获得对一个实体的引用时，该实体被称为处于*托管*状态。在此之前，该实体被视为一个普通的 POJO（即，处于游离状态）。JPA\
  \ 的强大之处在于，实体可以被应用程序的不同层用作普通对象，并在你需要将数据加载或插入数据库时，由实体管理器进行托管。当一个实体处于托管状态时，你可以执行持久化操作，实体管理器会自动将实体的状态与数据库同步。当实体处于游离状态（即，非托管状态）时，它会恢复为一个简单的\
  \ POJO，然后可以被其他层（例如，JSF 表示层）使用，而无需将其状态与数据库同步。\n\n**123**\n\n第 4 章 ■ 管理持久化对象\n\n\n\
  \n有了实体管理器，持久化的实际工作就开始了。`EntityManager` 是一个由持久化提供者实现的接口，它将生成并执行 SQL 语句。`javax.persistence.EntityManager`\
  \ 接口提供了清单 4-4 中所示的 API 来操作实体。\n\n**清单 4-4.** *EntityManager API*\n\npublic interface\
  \ **EntityManager** {\n\npublic EntityTransaction getTransaction();\n\npublic EntityManagerFactory\
  \ getEntityManagerFactory();\n\npublic void close();\n\npublic boolean isOpen();\n\
  \npublic void persist(Object entity);\n\npublic <T> T merge(T entity);\n\npublic\
  \ void remove(Object entity);\n\npublic <T> T find(Class<T> entityClass, Object\
  \ primaryKey);\n\npublic <T> T find(Class<T> entityClass, Object primaryKey,➥\n\n\
  LockModeType lockMode);\n\npublic <T> T find(Class<T> entityClass, Object primaryKey,➥\n\
  \nLockModeType lockMode, Map<String, Object> properties);\n\npublic <T> T getReference(Class<T>\
  \ entityClass, Object primaryKey);\n\npublic void flush();\n\npublic void setFlushMode(FlushModeType\
  \ flushMode);\n\npublic FlushModeType getFlushMode();\n\npublic void lock(Object\
  \ entity, LockModeType lockMode);\n\npublic void lock(Object entity, LockModeType\
  \ lockMode,➥\n\nMap<String, Object> properties);\n\npublic void refresh(Object entity);\n\
  \npublic void refresh(Object entity, LockModeType lockMode);\n\npublic void refresh(Object\
  \ entity, LockModeType lockMode,➥\n\nMap<String, Object> properties);\n\npublic\
  \ void clear();\n\npublic void detach(Object entity);\n\npublic boolean contains(Object\
  \ entity);\n\npublic Map<String, Object> getProperties();\n\npublic Set<String>\
  \ getSupportedProperties();\n\n**124**\n\n第 4 章 ■ 管理持久化对象\n\npublic Query createQuery(String\
  \ qlString);\n\npublic Query createQuery(QueryDefinition qdef);\n\npublic Query\
  \ createNamedQuery(String name);\n\npublic Query createNativeQuery(String sqlString);\n\
  \npublic Query createNativeQuery(String sqlString, Class resultClass);\n\npublic\
  \ Query createNativeQuery(String sqlString,➥\n\nString resultSetMapping);\n\npublic\
  \ void joinTransaction();\n\npublic <T> T unwrap(Class<T> cls);\n\npublic Object\
  \ getDelegate();\n\npublic QueryBuilder getQueryBuilder();\n\n}\n\n不要被清单 4-4 中的\
  \ API 吓到，本章将涵盖其中的大部分方法。\n\n在下一节中，我将解释如何获取 `EntityManager` 的实例。\n\n**获取实体管理器**\n\n\
  实体管理器是与实体交互的核心接口，但它首先需要由应用程序获取。根据是容器管理环境（例如你将在第 6 章中看到的 EJB 环境）还是应用程序管理环境，代码可能会有很大不同。例如，在容器管理环境中，事务由容器管理。这意味着你无需显式编写提交或回滚代码，而在应用程序管理环境中则必须这样做。\n\
  \n术语“应用程序管理”意味着应用程序负责显式获取 `EntityManager` 的实例并管理其生命周期（例如，在完成后关闭实体管理器）。前面展示的清单 4-2\
  \ 演示了在 Java SE 环境中运行的类如何获取实体管理器的实例。它使用 `Persistence` 类来引导一个与持久化单元（`chapter04PU`）关联的\
  \ `EntityManagerFactory`，然后使用该工厂创建实体管理器。使用工厂创建应用程序管理的实体管理器非常简单，但区分应用程序管理与容器管理的关键在于工厂的获取方式。\n\
  \n容器管理环境是指应用程序在 Servlet 或 EJB 容器中运行的情况。在 Java EE 环境中，获取实体管理器最常见的方式是通过 `@PersistenceContext`\
  \ 注解注入一个，或者通过 JNDI 查找。在容器（Servlet、EJB、Web 服务等）中运行的组件无需创建或关闭实体管理器，因为其生命周期由容器管理。清单\
  \ 4-5 展示了一个无状态会话 Bean 的代码，其中注入了 `chapter04PU` 持久化单元的引用。\n\n\n\n**清单 4-5.** *注入实体管理器引用的无状态\
  \ EJB*\n\n@Stateless\n\npublic class BookBean {\n\n**@PersistenceContext(unitName\
  \ = \"chapter04PU\")**\n\nprivate EntityManager em;\n\n第 4 章 ■ 管理持久化对象\n\n**125**\n\
  \npublic void createBook() {\n\n// 创建一个 Book 实例\n\nBook book = new Book();\n\nbook.setId(1234L);\n\
  \nbook.setTitle(\"银河系漫游指南\");\n\nbook.setPrice(12.5F);\n\nbook.setDescription(\"\
  道格拉斯·亚当斯创作的科幻小说。\");\n\nbook.setIsbn(\"1-84023-742-2\");\n\nbook.setNbOfPage(354);\n\
  \nbook.setIllustrations(false);\n\n// 将图书持久化到数据库\n\n**em.persist(book);**\n\n//\
  \ 通过标识符检索图书\n\nbook = **em.find**(Book.class, 1234L);\n\nSystem.out.println(book);\n\
  \n}\n\n}\n\n与清单 4-2 相比，清单 4-5 中的代码要简单得多。首先，由于实体管理器实例由容器注入，因此没有 `Persistence` 或 `EntityManagerFactory`。其次，因为无状态\
  \ Bean 管理事务，所以没有显式的提交或回滚。这种实体管理器的风格将在第 6 章中演示。\n\n**持久化上下文**\n\n在详细探讨 EntityManager\
  \ API 之前，你需要理解一个关键概念：*持久化上下文*。持久化上下文是某一时刻一组受管理的实体实例：在持久化上下文中，只能存在一个具有相同持久化标识的实体实例。例如，如果一个\
  \ ID 为 1234 的 Book 实例存在于持久化上下文中，那么在该持久化上下文中就不能存在其他具有此 ID 的图书。只有包含在持久化上下文中的实体才受实体管理器管理，这意味着对它们的更改将反映到数据库中。\n\
  \n每当调用 `javax.persistence.EntityManager` 接口的方法时，实体管理器都会更新或查询持久化上下文。例如，当调用 `persist()`\
  \ 方法时，如果作为参数传入的实体尚不存在，它将被添加到持久化上下文中。类似地，当通过主键查找实体时，实体管理器首先会检查请求的实体是否已存在于持久化上下文中。持久化上下文可以看作是一级缓存。它是一个短暂的、活跃的空间，实体管理器在将内容刷新到数据库之前，会将实体存储在其中。对象仅在事务持续期间存在于持久化上下文中。\n\
  \n实体管理器的配置与其创建它的工厂绑定。无论是应用程序管理还是容器管理，工厂都需要一个持久化单元来创建实体管理器。持久化单元规定了连接数据库的设置以及可在持久化上下文中管理的实体列表。持久化单元定义在位于\
  \ `META-INF` 目录下的 `persistence.xml` 文件中（参见清单 4-6）。它有一个名称（`chapter04PU`）和一组属性。\n\n\
  **126**\n\n第 4 章 ■ 管理持久化对象\n\n**清单 4-6.** *包含一组可管理实体的持久化单元*\n\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>\n\n[<persistence version=\"1.0\">](http://java.sun.com/xml/ns/persistence)\n\
  \n<persistence-unit name=\" **chapter04PU**\" transaction-type=\"RESOURCE_LOCAL\"\
  >\n\n<provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>\n\n<class>com.apress.javaee6.chapter04.\
  \ **Book**</class>\n\n<class>com.apress.javaee6.chapter04. **Customer**</class>\n\
  \n<class>com.apress.javaee6.chapter04. **Address**</class>\n\n<properties>\n\n<property\
  \ name=\"eclipselink.target-database\" value=\" **DERBY**\"/>\n\n<property name=\"\
  eclipselink.jdbc.driver\" ➥\n\nvalue=\"org.apache.derby.jdbc.ClientDriver\"/>\n\n\
  <property name=\"eclipselink.jdbc.url\" ➥\n\nvalue=\"jdbc:derby://localhost:1527/**chapter04DB**\"\
  />\n\n<property name=\"eclipselink.jdbc.user\" value=\"APP\"/>\n\n<property name=\"\
  eclipselink.jdbc.password\" value=\"APP\"/>\n\n</properties>\n\n</persistence-unit>\n\
  \n</persistence>\n\n\n\n持久化单元是持久化上下文与数据库之间的桥梁。一方面，`<class>`标签列出了所有可在持久化上下文中管理的实体；另一方面，它提供了物理连接数据库所需的所有信息。这是因为你处于应用程序管理环境（transaction-type=\"\
  RESOURCE_LOCAL\"）中。在容器管理环境中，`persistence.xml`会定义一个数据源，而非数据库连接属性，并将事务类型设置为 JTA（transaction-type=\"\
  JTA\"）。\n\n**操作实体**\n\n实体管理器也用于创建复杂的 JPQL 查询，以检索单个实体或实体列表。在操作单个实体时，`EntityManager`接口可被视为一个通用的数据访问对象（DAO），它允许对任何实体执行\
  \ CRUD 操作（见表 4-1）。\n\n**表 4-1.** *用于操作实体的 EntityManager 接口方法*\n\n| **方法** | **描述**\
  \ |\n| --- | --- |\n| void persist(Object entity) | 使实例成为受管状态并持久化 |\n| <T> T find(Class<T>\
  \ entityClass, Object primaryKey) | 根据指定类和主键搜索实体 |\n| <T> T getReference(Class<T>\
  \ entityClass, Object primaryKey) | 获取一个实例，其状态可能被延迟加载 |\n| void remove(Object entity)\
  \ | 从持久化上下文和底层数据库中移除实体实例 |\n| <T> T merge(T entity) | 将给定实体的状态合并到当前持久化上下文中 |\n|\
  \ void refresh(Object entity) | 从数据库刷新实例状态，覆盖对实体所做的任何更改 |\n| void flush() | 将持久化上下文同步到底层数据库\
  \ |\n| void clear() | 清除持久化上下文，导致所有受管实体变为脱管状态 |\n| void clear(Object entity) | 从持久化上下文中移除给定实体\
  \ |\n| boolean contains(Object entity) | 检查实例是否属于当前持久化上下文的受管实体实例 |\n\n为了更好地理解这些方法，我将使用一个简单的示例，即`Customer`和`Address`之间的单向一对一关系。两个实体都具有自动生成的标识符（得益于`@GeneratedValue`注解），并且`Customer`（见清单\
  \ 4-7）对`Address`（见清单 4-8）采用了延迟加载。\n\n**清单 4-7.** *具有单向一对一 Address 的 Customer 实体*\n\
  \n```java\n@Entity\npublic class **Customer** {\n    @Id @GeneratedValue\n    private\
  \ Long id;\n    private String firstName;\n    private String lastName;\n    private\
  \ String email;\n    @OneToOne (fetch = FetchType.LAZY)\n    @JoinColumn(name =\
  \ \"address_fk\")\n    private Address address;\n    // 构造方法、getter、setter\n}\n\
  ```\n\n**清单 4-8.** *Address 实体*\n\n```java\n@Entity\npublic class **Address** {\n\
  \    @Id @GeneratedValue\n    private Long id;\n    private String street1;\n  \
  \  private String city;\n    private String zipcode;\n    private String country;\n\
  \    // 构造方法、getter、setter\n}\n```\n\n这两个实体将被映射到图 4-2 所示的数据库结构中。注意，`ADDRESS_FK`列是指向`ADDRESS`表的外键。\n\
  \n**图 4-2.** *CUSTOMER 和 ADDRESS 表*\n\n为了提高可读性，后续章节中使用的代码片段假定`em`属性是`EntityManager`类型，`tx`是`EntityTransaction`类型。\n\
  \n**持久化实体**\n\n持久化实体意味着在数据尚不存在时将其插入数据库（否则会抛出异常）。为此，需要使用`new`运算符创建新的实体实例，设置属性值，在存在关联时将一个实体绑定到另一个实体，最后调用`EntityManager.persist()`方法，如清单\
  \ 4-9 中的 JUnit 测试用例所示。\n\n**清单 4-9.** *持久化一个带有 Address 的 Customer*\n\n```java\n\
  Customer customer = new Customer(\"Antony\", \"Balla\", \"tballa@mail.com\");\n\
  Address address = new Address(\"Ritherdon Rd\", \"London\", \"8QE\", \"UK\");\n\
  customer.setAddress(address);\n\ntx.begin();\nem.persist(customer);\nem.persist(address);\n\
  tx.commit();\n\nassertNotNull(customer.getId());\nassertNotNull(address.getId());\n\
  ```\n\n在清单 4-9 中，`customer`和`address`只是驻留在 JVM 内存中的两个对象。当实体管理器（变量`em`）通过持久化它们（`em.persist(customer)`）将其纳入管理时，两者都成为受管实体。此时，这两个对象都有资格被插入数据库。当事务提交（`tx.commit()`）时，数据被刷新到数据库，一条地址行被插入`ADDRESS`表，一条客户行被插入`CUSTOMER`表。由于`Customer`是关系拥有方，其表持有指向`ADDRESS`表的外键。通过`assertNotNull`表达式，得益于持久化提供程序和注解，两个实体都获得了生成的标识符。\n\
  \n注意`persist()`方法的顺序：先持久化客户，然后持久化地址。如果顺序相反，结果也是一样的。之前，实体管理器被描述为一级缓存。在事务提交之前，数据保留在内存中，不会访问数据库。实体管理器缓存数据，并在准备就绪时，按照底层数据库期望的顺序（遵守完整性约束）刷新数据。由于`CUSTOMER`表中的外键，`ADDRESS`的插入语句将首先执行，然后是`CUSTOMER`的插入语句。\n\
  \n■**注意** 本章中的大多数实体没有实现`Serializable`接口。这是因为实体不需要实现该接口即可持久化到数据库。它们通过引用从一个方法传递到另一个方法，当需要持久化时，会调用`EntityManager.persist()`方法。但是，如果你需要按值传递实体（远程调用、外部\
  \ EJB 容器等），则它们必须实现`java.io.Serializable`标记接口（无方法）。它向编译器指示必须强制实体类上的所有字段都是可序列化的，以便任何实例都可以序列化为字节流，并使用远程方法调用（RMI）进行传递。\n\
  \n**按 ID 查找**\n\n要按标识符查找实体，可以使用两种不同的方法。第一种是`EntityManager.find()`方法，它接受两个参数：实体类和唯一标识符（见清单\
  \ 4-10）。如果找到实体，则返回该实体；如果未找到，则返回`null`值。\n\n**清单 4-10.** *按 ID 查找 Customer*\n\n```java\n\
  Customer customer = em.find(Customer.class, 1234L)\nif (customer != null) {\n  \
  \  // 处理对象\n}\n```\n\n第二种方法是`getReference()`（见清单 4-11）。它与`find`操作非常相似，接受相同的参数，但它允许通过主键（而非数据）检索对实体的引用。它适用于需要受管实体实例，但除了可能访问实体的主键外，不需要任何数据的情况。使用`getReference()`时，状态数据是延迟加载的，这意味着如果在实体脱管之前未访问状态，数据可能不存在。如果未找到实体，则会抛出`EntityNotFoundException`。\n\
  \n**清单 4-11.** *通过引用查找 Customer*\n\n```java\ntry {\n    Customer customer = em.getReference(Customer.class,\
  \ 1234L)\n    // 处理对象\n} catch(EntityNotFoundException ex) {\n    // 实体未找到\n}\n\
  ```\n\n**移除实体**\n\n\n\n可以使用 `EntityManager.remove()` 方法移除实体。一旦被移除，该实体将从数据库中删除，与实体管理器分离，并且无法再与数据库同步。就\
  \ Java 对象而言，该实体在超出作用域并被垃圾回收器清理之前仍然可以访问。清单 4-12 中的代码展示了如何在创建对象后将其移除。\n\n**清单 4-12.**\
  \ *创建并移除 Customer 和 Address 实体*\n\nCustomer customer = new Customer(\"Antony\",\
  \ \"Balla\", \"tballa@mail.com\");\n\nAddress address = new Address(\"Ritherdon\
  \ Rd\", \"London\", \"8QE\", \"UK\"); customer.setAddress(address);\n\ntx.begin();\n\
  \n**em.persist(customer);**\n\n**em.persist(address);**\n\ntx.commit();\n\ntx.begin();\n\
  \n**em.remove(customer);**\n\ntx.commit();\n\n// 数据已从数据库中删除\n\n// 但对象仍然可以访问\n\n\
  assertNotNull(**customer**);\n\n清单 4-12 中的代码创建了 Customer 和 Address 的实例，将它们关联起来（customer.setAddress(address)），并进行了持久化。在数据库中，customer\
  \ 行通过外键与 address 关联；在后续代码中，仅删除了 Customer。\n\n根据级联配置方式的不同，Address 可能没有其他实体引用它。这个\
  \ address 行就变成了孤儿。\n\n**孤儿移除**\n\n为了数据一致性，孤儿是不受欢迎的，因为它们会导致数据库中存在未被任何其他表引用且无法访问的行。使用\
  \ JPA，你可以通知持久化提供程序自动移除孤儿，或者级联移除操作（稍后会看到）。如果目标实体（Address）由源实体（Customer）私有拥有，意味着一个目标绝不能同时被多个源拥有，并且该源被应用程序删除，那么提供程序也应该删除该目标。\n\
  \n被指定为一对一或一对多的关联支持使用孤儿移除选项。为了在示例中包含此选项，让我们看看如何将 `orphanRemoval=true` 元素添加到 `@OneToOne`\
  \ 注解中（参见清单 4-13）。\n\n第 4 章 ■ 管理持久化对象\n\n**131**\n\n**清单 4-13.** *处理孤儿 Address 移除的\
  \ Customer 实体*\n\n@Entity\n\npublic class Customer {\n\n@Id @GeneratedValue\n\n\
  private Long id;\n\nprivate String firstName;\n\nprivate String lastName;\n\nprivate\
  \ String email;\n\n@OneToOne (fetch = FetchType.LAZY, **orphanRemoval=true**)\n\n\
  private Address address;\n\n// 构造方法、getter、setter\n\n}\n\n使用此映射，清单 4-12 中的代码将在移除\
  \ customer 时自动移除 Address 实体。移除操作在刷新操作（事务提交）时执行。\n\n**与数据库同步**\n\n到目前为止，与数据库的同步都是在提交时完成的。实体管理器是一个一级缓存，等待事务提交以将数据刷新到数据库，但是当需要插入一个\
  \ customer 和一个 address 时会发生什么？\n\ntx.begin();\n\n**em.persist(customer);**\n\n**em.persist(address);**\n\
  \ntx.commit();\n\n所有待处理的更改都需要一条 SQL 语句，生成两条 insert 语句，并且只有在数据库事务提交时才会永久生效。对于大多数应用程序来说，这种自动数据同步就足够了。尽管无法确切知道提供程序在哪个时间点将更改刷新到数据库，但可以确定它发生在事务提交过程中。数据库与持久化上下文中的实体同步，但数据可以显式刷新到数据库（flush），或者实体可以从数据库刷新数据（refresh）。如果数据在某个时间点被刷新到数据库，并且稍后在代码中应用程序调用了\
  \ `rollback()` 方法，那么已刷新的数据将从数据库中撤出。\n\n**刷新数据**\n\n使用 `EntityManager.flush()` 方法，可以显式强制持久化提供程序刷新数据，允许开发者手动触发实体管理器内部用于刷新持久化上下文的相同过程。\n\
  \ntx.begin();\n\nem.persist(customer);\n\n**em.flush();**\n\n**132**\n\n第 4 章 ■\
  \ 管理持久化对象\n\nem.persist(address);\n\ntx.commit();\n\n上述代码中发生了两件有趣的事情。第一，`em.flush()`\
  \ 不会等待事务提交，而是强制提供程序刷新持久化上下文。在刷新时会生成并执行一条 insert 语句。第二，由于完整性约束，这段代码将无法工作。如果没有显式刷新，实体管理器会缓存所有更改，并以对数据库一致的方式排序和执行它们。使用显式刷新，针对\
  \ CUSTOMER 的 insert 语句将被执行，但会违反 address 外键的完整性约束（CUSTOMER 表中的 ADDRESS_FK 列）。这将导致事务回滚。已刷新的数据也会被回滚。应谨慎使用显式刷新，并且仅在需要时使用。\n\
  \n**刷新实体**\n\n`refresh()` 方法用于与 `flush` 方向相反的数据同步，这意味着它会用数据库中当前存在的数据覆盖托管实体的当前状态。一个典型的情况是使用\
  \ `EntityManager.refresh()` 方法来撤消仅对内存中的实体所做的更改。清单 4-14 中的测试类片段按 ID 查找 Customer，更改其名字，并使用\
  \ `refresh()` 方法撤消此更改。\n\n**清单 4-14.** *从数据库刷新 Customer 实体*\n\nCustomer customer\
  \ = em.find(Customer.class, 1234L)\n\nassertEquals(customer.getFirstName(), \" **Antony**\"\
  );\n\ncustomer.setFirstName(\" **William**\");\n\n**em.refresh(customer);**\n\n\
  assertEquals(customer.getFirstName(), \" **Antony**\");\n\n**持久化上下文的内容**\n\n持久化上下文保存着托管实体。使用\
  \ `EntityManager` 接口，你可以检查实体是否正在被管理，并从持久化上下文中清除所有实体。\n\n**包含**\n\n实体要么被实体管理器管理，要么不被管理。`EntityManager.contains()`\
  \ 方法返回一个布尔值，允许检查特定实体实例当前是否在当前持久化上下文中被实体管理器管理。在清单 4-15 的测试用例中，Customer 被持久化，你可以立即检查该实体是否被管理（`em.contains(customer)`）。答案是\
  \ true。之后，调用 `remove()` 方法，该实体从数据库和持久化上下文中被移除（`em.contains(customer)` 返回 false）。\n\
  \n第 4 章 ■ 管理持久化对象\n\n**133**\n\n**清单 4-15.** *测试 Customer 实体是否在持久化上下文中*\n\nCustomer\
  \ customer = new Customer(\"Antony\", \"Balla\", \"tballa@mail.com\");\n\ntx.begin();\n\
  \nem.persist(customer);\n\ntx.commit();\n\nassert**True**(**em.contains(customer)**);\n\
  \ntx.begin();\n\nem.remove(customer);\n\ntx.commit();\n\nassert**False**(**em.contains(customer)**);\n\
  \n**清除和分离**\n\n`clear()` 方法很直接：它清空持久化上下文，导致所有托管实体变为分离状态。`detach(Object entity)`\
  \ 方法从持久化上下文中移除给定的实体。在此类驱逐发生后，对实体所做的更改将不会同步到数据库。清单 4-16 创建了一个实体，检查它是否被管理，将其从持久化上下文中分离，并检查它是否已分离。\n\
  \n**清单 4-16.** *检查 Customer 实体是否在持久化上下文中*\n\nCustomer customer = new Customer(\"\
  Antony\", \"Balla\", \"tballa@mail.com\");\n\ntx.begin();\n\nem.persist(customer);\n\
  \ntx.commit();\n\n**assertTrue**(em.contains(customer));\n\n**em.detach(customer);**\n\
  \n**assertFalse**(em.contains(customer));\n\n\n\n请注意，`clear()` 方法可以作用于整个持久化上下文（`clear()`），也可以仅作用于单个实体（`clear(Object\
  \ entity)`）。\n\n**合并实体**\n\n一个游离实体不再与持久化上下文关联。如果你想管理它，就需要将其合并。我们以一个需要在 JSF 页面中显示的实体为例。该实体首先从数据库的持久层加载（此时为受管状态），然后通过调用本地\
  \ EJB 返回（由于事务上下文结束，变为游离状态），接着表示层将其显示（仍为游离状态），最后它返回并需要更新到数据库。然而，此时实体是游离的，需要重新附加（即合并），以使其状态与数据库同步。\n\
  \n清单 4-17 通过清除持久化上下文（`em.clear()`）来模拟这种情况，这会使实体变为游离状态。\n\n**清单 4-17.** *清除持久化上下文*\n\
  \nCustomer customer = new Customer(\"Antony\", \"Balla\", \"tballa@mail.com\");\n\
  \ntx.begin();\n\nem.persist(customer);\n\ntx.commit();\n\n**em.clear();**\n\n//\
  \ 为游离实体设置新值\n\ncustomer.setFirstName(\"William\");\n\ntx.begin();\n\n**em.merge(customer);**\n\
  \ntx.commit();\n\n在清单 4-17 中，创建并持久化了一个客户。调用 `em.clear()` 强制使客户实体变为游离状态，但游离实体仍可存在于其原本所在的持久化上下文之外，且其状态不再保证与数据库状态同步。这正是\
  \ `customer.setFirstName(\"William\");` 所发生的情况：该设置操作在游离实体上执行，数据并未更新到数据库。要将此更改复制到数据库，你需要使用\
  \ `em.merge(customer)` 重新附加（即合并）该实体。\n\n**更新实体**\n\n更新实体很简单，但同时也可能令人困惑。正如你刚刚看到的，你可以使用\
  \ `EntityManager.merge()` 来附加实体并使其状态与数据库同步。但如果实体当前是受管状态，对其所做的更改将自动反映到数据库中。如果不是，则需要显式调用\
  \ `merge()`。\n\n清单 4-18 演示了持久化一个名字设置为 Antony 的客户。当调用 `em.persist()` 方法时，实体处于受管状态，因此对实体所做的任何更改都将与数据库同步。当调用\
  \ `setFirstName()` 方法时，实体改变了状态。实体管理器会缓存从 `tx.begin()` 开始的任何操作，并在提交时同步它们。\n\n**清单\
  \ 4-18.** *更新客户的名字*\n\nCustomer customer = new Customer(\" **Antony**\", \"Balla\"\
  , \"tballa@mail.com\");\n\ntx.begin();\n\nem. **persist**(customer);\n\n**customer.setFirstName(\"\
  Williman\");**\n\ntx.commit();\n\n**级联事件**\n\n默认情况下，每个实体管理器操作仅适用于作为参数提供给该操作的实体。但有时，当对一个实体执行操作时，你可能希望将其传播到其关联实体。这被称为*级联事件*。到目前为止的示例都依赖于默认的级联行为，而非自定义行为。在清单\
  \ 4-19 中，为了创建一个客户，你实例化了一个 Customer 和一个 Address 实体，将它们关联起来（`customer.setAddress(address)`），然后持久化这两个实体。\n\
  \n**清单 4-19.** *持久化一个带地址的客户*\n\nCustomer customer = new Customer(\"Antony\", \"\
  Balla\", \"tballa@mail.com\");\n\nAddress address = new Address(\"Ritherdon Rd\"\
  , \"London\", \"8QE\", \"UK\"); customer.setAddress(address);\n\ntx.begin();\n\n\
  **em.persist(customer);**\n\n**em.persist(address);**\n\ntx.commit();\n\n由于 Customer\
  \ 和 Address 之间存在关系，你可以将持久化操作从客户级联到地址。这意味着调用\n\n\n\n`em.persist(customer)` 会级联持久化事件到\
  \ Address 实体（如果该实体允许传播此类事件）。这样你就可以精简代码，省去 `em.persist(address)` 的调用，如清单 4-20 所示。\n\
  \n**清单 4-20.** *将持久化事件级联到 Address*\n\nCustomer customer = new Customer(\"Antony\"\
  , \"Balla\", \"tballa@mail.com\");\n\nAddress address = new Address(\"Ritherdon\
  \ Rd\", \"London\", \"8QE\", \"UK\"); customer.setAddress(address);\n\ntx.begin();\n\
  \n**em.persist(customer);**\n\ntx.commit();\n\n如果没有级联，customer 会被持久化，但 address 不会。只有更改了关系的映射，才能实现事件的级联。注解\
  \ `@OneToOne`、`@OneToMany`、`@ManyToOne` 和 `@ManyToMany` 都有一个 `cascade` 属性，该属性接受一个要级联的事件数组，持久化事件和删除事件（通常用于执行删除级联）都可以被级联。为了实现这一点，必须更改\
  \ Customer 实体（参见清单 4-21）的映射，并在 Address 上的 `@OneToOne` 注解中添加一个 `cascade` 属性。\n\n\
  **136**\n\n第 4 章 ■ 管理持久化对象\n\n**清单 4-21.** *Customer 实体级联持久化和删除事件*\n\n@Entity\n\n\
  public class Customer {\n\n@Id @GeneratedValue\n\nprivate Long id;\n\nprivate String\
  \ firstName;\n\nprivate String lastName;\n\nprivate String email;\n\n@OneToOne (fetch\
  \ = FetchType.LAZY, ➥\n\n**cascade = {CascadeType.PERSIST, CascadeType.REMOVE}**)\n\
  \n@JoinColumn(name = \"address_fk\")\n\nprivate Address address;\n\n// 构造方法、getter、setter\n\
  \n}\n\n你可以从几个事件中选择要级联到目标关联的事件，这些事件列在表 4-2 中。你甚至可以使用 `CascadeType.ALL` 类型级联所有事件。\n\
  \n**表 4-2.** *可被级联的事件*\n\n**级联类型**\n\n**描述**\n\nPERSIST\n\n将持久化操作级联到关联的目标\n\nREMOVE\n\
  \n将删除操作级联到关联的目标\n\nMERGE\n\n将合并操作级联到关联的目标\n\nREFRESH\n\n将刷新操作级联到关联的目标\n\nCLEAR\n\
  \n将清除操作级联到关联的目标\n\nALL\n\n声明所有上述操作都应被级联\n\n**缓存 API**\n\n大多数规范（不仅仅是 Java EE）都高度关注功能性需求，而将性能、可伸缩性或集群等非功能性需求留作实现细节。实现必须严格遵守规范，但也可以添加特定功能。对于\
  \ JPA 来说，缓存就是一个完美的例子。\n\n在 JPA 2.0 之前，规范中并未提及缓存。实体管理器是一级缓存，用于以全面的方式处理数据库中的数据，并缓存短生命周期的实体。一级缓存基于每个事务使用，以减少给定事务内的\
  \ SQL 查询数量。例如，如果一个对象在同一事务中被多次修改，实体管理器将在事务结束时只生成一条 UPDATE 语句。一级缓存不是性能缓存。\n\n尽管如此，所有\
  \ JPA 实现都使用性能缓存（也称为二级缓存）来优化数据库访问、查询、连接等。二级缓存减少了数据库流量，因为它们将对象加载到内存中，并可供整个应用程序使用。每个实现都有自己缓存对象的方式，要么开发自己的机制，要么重用开源机制。缓存可以跨集群分布，也可以不分布——当规范忽略某个主题时，一切皆有可能。\n\
  \nJPA 2.0 承认需要二级缓存，并在标准 API 中添加了缓存操作。该 API 如清单 4-22 所示，非常精简（因为 JPA 的目标不是标准化一个功能完备的缓存），但它允许代码以标准方式查询二级缓存并从其中移除某些实体。与\
  \ EntityManager 类似，`javax.persistence.Cache` 是一个由持久化提供者缓存系统实现的接口。\n\n**清单 4-22.**\
  \ *缓存 API*\n\npublic interface Cache {\n\n// 缓存是否包含给定实体的数据。\n\npublic boolean contains(Class\
  \ cls, Object primaryKey);\n\n// 从缓存中移除给定实体的数据。\n\npublic void evict(Class cls,\
  \ Object primaryKey);\n\n// 从缓存中移除指定类实体的数据。\n\npublic void evict(Class cls);\n\n\
  // 清空缓存。\n\npublic void evictAll();\n\n}\n\n**JPQL**\n\n你刚刚了解了如何使用 EntityManager\
  \ API 单独操作实体。你知道如何通过 ID 查找实体、移除它、更新其属性等。但通过 ID 查找实体相当有限，因为你只能使用其唯一标识符检索单个实体。在实践中，你可能需要根据\
  \ ID 以外的条件（按名称、ISBN 等）检索实体，或者根据不同的条件（例如，所有居住在美国的客户）检索一组实体。这种可能性是关系数据库固有的，而 JPA 有一种允许这种交互的语言：JPQL。\n\
  \nJPQL 用于定义对持久化实体的搜索，与底层数据库无关。JPQL 是一种查询语言，其根源在于标准查询语言（SQL）的语法，SQL 是用于数据库查询的标准语言。但主要区别在于，SQL\
  \ 获得的结果是行和列（表）的形式，而 JPQL 使用一个实体或实体集合。JPQL 语法是面向对象的，因此对于经验仅限于面向对象语言的开发人员来说更容易理解。开发人员通过使用点符号（例如，`myClass.myAttribute`）来管理他们的实体领域模型，而不是表结构。\n\
  \n在底层，JPQL 使用映射机制将 JPQL 查询转换为 SQL 数据库可理解的语言。该查询通过 SQL 和 JDBC 调用在底层数据库上执行，然后实体实例的属性被设置并返回给应用程序——所有这些都通过丰富的查询语法以非常简单和强大的方式完成。\n\
  \n最简单的 JPQL 查询选择单个实体的所有实例：\n\nSELECT b\n\nFROM Book b\n\n如果你了解 SQL，这应该看起来很熟悉。JPQL\
  \ 不是从表中选择，而是选择实体，这里是 Book。`FROM` 子句也用于给实体起别名：`b` 是 Book 的别名。查询的 `SELECT` 子句指示查询的结果类型是\
  \ `b` 实体（Book）。执行此语句将产生一个包含零个或多个 Book 实例的列表。\n\n要限制结果，可以添加搜索条件，使用 `WHERE` 子句，如下所示：\n\
  \nSELECT b\n\nFROM Book b\n\nWHERE b.title = \"H2G2\"\n\n别名用于通过点运算符导航实体属性。由于 Book\
  \ 实体有一个名为 `title` 的 `String` 类型持久化属性，`b.title` 引用 Book 实体的 `title` 属性。执行此语句将产生一个包含零个或多个\
  \ Book 实例的列表，这些实例的标题等于 *H2G2*。\n\n最简单的 select 查询由两个必需部分组成：`SELECT` 和 `FROM` 子句。`SELECT`\
  \ 定义查询结果的格式。`FROM` 子句定义将从中获取结果的一个或多个实体，可选的 `WHERE`、`ORDER BY`、`GROUP BY` 和 `HAVING`\
  \ 子句可用于限制或排序查询结果。select 语法在下一节的清单 4-23 中定义。\n\n还有 `DELETE` 和 `UPDATE` 语句，可用于跨特定实体类的多个实例执行删除和更新操作。\n\
  \n**Select**\n\n\n\nSELECT 子句遵循路径表达式语法，其结果可以是以下形式之一：一个实体、一个实体属性、一个构造器表达式、一个聚合函数，或这些元素的某种序列。路径表达式是查询的基本构建块，用于通过点号\
  \ (.) 导航来遍历实体属性或跨越实体关系（或实体集合）。清单 4-23 定义了 SELECT 语句的语法。\n\n**清单 4-23.** *SELECT\
  \ 语句语法*\n\nSELECT <选择表达式>\n\nFROM <FROM 子句>\n\n[WHERE <条件表达式>]\n\n[ORDER BY <ORDER\
  \ BY 子句>]\n\n[GROUP BY <GROUP BY 子句>]\n\n[HAVING <HAVING 子句>]\n\n一个简单的 SELECT 返回一个实体。例如，如果一个\
  \ Customer 实体有一个别名 c，那么 SELECT c 将返回一个实体或一个实体列表。\n\n第 4 章 ■ 管理持久化对象\n\n**139**\n\
  \n**SELECT** c\n\nFROM Customer c\n\n但是，SELECT 子句也可以返回属性。如果 Customer 实体有一个名字属性，SELECT\
  \ c.firstName 将返回一个字符串或一个包含所有名字的字符串集合。\n\nSELECT c.firstName\n\nFROM Customer c\n\
  \n要检索客户的名字和姓氏，可以创建一个包含这两个属性的列表：\n\nSELECT c.firstName, c.lastName\n\nFROM Customer\
  \ c\n\n如果 Customer 实体与 Address 存在一对一关系，那么 c.address 指向客户的地址，以下查询的结果将返回一个地址列表，而不是客户列表：\n\
  \nSELECT c.address\n\nFROM Customer c\n\n导航表达式可以链接在一起，以遍历复杂的实体图。使用这种技术，可以构造诸如 c.address.country.code\
  \ 这样的路径表达式，它指向客户地址的国家代码。\n\nSELECT c.address.country.code\n\nFROM Customer c\n\n\
  可以在 SELECT 表达式中使用构造器，以返回一个用查询结果初始化的 Java 类实例。该类不必是实体，但构造器必须是完全限定名，并且其参数必须与属性匹配。\n\
  \nSELECT **NEW** com.apress.javaee6.CustomerDTO(c.firstName, c.lastName, ➥\n\nc.address.street1)\n\
  \nFROM Customer c\n\n此查询的结果是一个 CustomerDTO 对象列表，这些对象已使用 new 运算符实例化，并用客户的名字、姓氏和街道进行了初始化。\n\
  \n执行这些查询将返回单个值，或一个包含零个或多个实体（或属性）的集合（可能包含重复项）。要移除重复项，必须使用 DISTINCT 运算符：\n\nSELECT\
  \ **DISTINCT** c\n\nFROM Customer c\n\nSELECT **DISTINCT** c.firstName\n\nFROM Customer\
  \ c\n\n查询的结果可以是应用于路径表达式的聚合函数的结果。以下聚合函数可用于 SELECT 子句：AVG, COUNT, MAX, MIN, SUM。结果可以在\
  \ GROUP BY 子句中进行分组，并使用 HAVING 子句进行过滤。\n\n**140**\n\n第 4 章 ■ 管理持久化对象\n\nSELECT **COUNT**(c)\n\
  \nFROM Customer c\n\n标量表达式也可以在查询的 SELECT 子句以及 WHERE 和 HAVING 子句中使用。这些表达式可用于数值（ABS,\
  \ SQRT, MOD, SIZE, INDEX）、字符串（CONCAT, SUBSTRING, TRIM, LOWER, UPPER, LENGTH）和日期时间（CURRENT_DATE,\
  \ CURRENT_TIME, CURRENT_TIMESTAMP）值。\n\n**From**\n\n查询的 FROM 子句通过声明标识变量来定义实体。一个*标识变量*，或*别名*，是一个可以在其他子句（SELECT,\
  \ WHERE 等）中使用的标识符。FROM 子句的语法由一个实体和一个别名组成。在以下示例中，Customer 是实体，c 是标识变量：\n\nSELECT\
  \ c\n\n**FROM** Customer c\n\n**Where**\n\n查询的 WHERE 子句由一个条件表达式组成，用于限制 SELECT、UPDATE\
  \ 或 DELETE 语句的结果。WHERE 子句可以是一个简单的表达式，也可以是一组条件表达式，以复杂的方式过滤查询。\n\n限制查询结果的最简单方法是使用实体的属性。例如，以下查询选择所有名为\
  \ Vincent 的客户：\n\nSELECT c\n\nFROM Customer c\n\n**WHERE** c.firstName = 'Vincent'\n\
  \n你可以通过使用逻辑运算符 AND 和 OR 进一步限制查询。以下示例使用 AND 来选择所有名为 Vincent 且居住在法国的客户：\n\nSELECT\
  \ c\n\nFROM Customer c\n\nWHERE c.firstName = 'Vincent' **AND** c.address.country\
  \ = 'France'\n\nWHERE 子句还使用比较运算符：=, >, >=, <, <=, <>, [NOT] BETWEEN, [NOT] LIKE,\
  \ [NOT] IN, IS [NOT] NULL, IS [NOT] EMPTY, [NOT] MEMBER [OF]。以下展示了使用其中两个运算符的示例：\n\
  \nSELECT c\n\nFROM Customer c\n\nWHERE c.age **>** 18\n\nSELECT c\n\nFROM Customer\
  \ c\n\nWHERE c.age **NOT BETWEEN** 40 AND 50\n\n第 4 章 ■ 管理持久化对象\n\n**141**\n\nSELECT\
  \ c\n\nFROM Customer c\n\nWHERE c.address.country **IN** ('USA', 'Portugal')\n\n\
  LIKE 表达式由一个字符串和可选的转义字符组成，用于定义匹配条件：下划线 (_) 表示单字符通配符，百分号 (%) 表示多字符通配符。\n\nSELECT c\n\
  \nFROM Customer c\n\nWHERE c.email **LIKE** '%mail.com'\n\n绑定参数\n\n到目前为止，此处展示的 WHERE\
  \ 子句仅使用了固定值。在应用程序中，查询通常依赖于参数。JPQL 支持两种参数绑定语法，允许动态更改查询的限制子句：位置参数和命名参数。\n\n*位置参数*\
  \ 由问号 (?) 后跟一个整数（例如，?1）表示。执行查询时，需要指定应被替换的参数编号。\n\nSELECT c\n\nFROM Customer c\n\n\
  WHERE c.firstName = **?1** AND c.address.country = **?2**\n\n*命名参数* 也可以使用，并由一个以冒号\
  \ (:) 符号为前缀的字符串标识符表示。执行查询时，需要指定应被替换的参数名称。\n\nSELECT c\n\nFROM Customer c\n\nWHERE\
  \ c.firstName = **:fname** AND c.address.country = **:country**\n\n在本章后面的“查询”部分，你将看到应用程序如何绑定参数。\n\
  \n子查询\n\n子查询是嵌入在 WHERE 或 HAVING 子句的条件表达式中的 SELECT 查询。子查询的结果在主查询的条件表达式中进行评估和解释。要从数据库中检索最年轻的客户，首先执行一个带有\
  \ MIN(age) 的子查询，然后将其结果在主查询中进行评估。\n\nSELECT c\n\nFROM Customer c\n\nWHERE c.age =\
  \ (**SELECT MIN(c. age) FROM Customer c**)\n\n**142**\n\n第 4 章 ■ 管理持久化对象\n\n**Order\
  \ By**\n\nORDER BY 子句允许对 SELECT 查询返回的实体或值进行排序。排序应用于此子句中指定的实体属性，后跟 ASC 或 DESC 关键字。关键字\
  \ ASC 指定使用升序排序；DESC 则相反，指定使用降序排序。升序是默认值，可以省略。\n\nSELECT c\n\nFROM Customer c\n\n\
  WHERE c.age > 18\n\n**ORDER BY** c.age **DESC**\n\n也可以使用多个表达式来细化排序顺序。\n\nSELECT\
  \ c\n\nFROM Customer c\n\nWHERE c.age > 18\n\n**ORDER BY** c.age **DESC**, c.address.country\
  \ **ASC**\n\n**Group By 和 Having**\n\nGROUP BY 结构允许根据一组属性对结果值进行聚合。实体根据 GROUP BY\
  \ 子句中指定的实体字段的值被分成组。要按国家分组并统计客户数量，请使用以下查询：\n\nSELECT c.address.country, count(c)\n\
  \nFROM Customer c\n\n**GROUP BY** c.address.country\n\nGROUP BY 定义了分组表达式（c.address.country），结果将根据这些表达式进行聚合和计数（count(c)）。请注意，出现在\
  \ GROUP BY 子句中的表达式也必须出现在 SELECT 子句中。\n\n\nHAVING 子句用于在查询结果分组后定义适用的过滤条件，类似于对 GROUP\
  \ BY 结果进行二次过滤的 WHERE 子句。沿用之前的查询，通过添加 HAVING 子句，可以仅返回客户数量大于 1,000 的国家/地区结果。\n\nSELECT\
  \ c.address.country, count(c)\n\nFROM Customer c\n\nGROUP BY c.address.country\n\
  \n**HAVING** count(c) > 100\n\nGROUP BY 和 HAVING 只能用于 SELECT 子句中。\n\n**批量删除**\n\n\
  你已经知道如何使用 EntityManager.remove() 方法移除实体，以及如何查询数据库以检索符合特定条件的实体列表。要删除一组实体，你可以执行查询、遍历结果集并逐个移除每个实体。虽然这是一种有效的算法，但其性能极差（数据库访问次数过多）。\n\
  \n有一种更好的方法：批量删除。\n\n第 4 章 ■ 管理持久化对象\n\n**143**\n\nJPQL 可以对特定实体类的多个实例执行批量删除操作。这些操作用于在单个操作中删除大量实体。DELETE\
  \ 语句与 SELECT 语句类似，因为它可以包含限制性的 WHERE 子句并接受参数。\n\n操作完成后，会返回受影响的实体实例数量。清单 4-24 描述了\
  \ DELETE 语句的语法。\n\n**清单 4-24.** *DELETE 语句语法*\n\nDELETE FROM <实体名称> [[AS] <标识变量>]\n\
  \n[WHERE <条件表达式>]\n\n例如，要删除所有年龄小于 18 岁的客户，你可以通过 DELETE 语句进行批量删除：\n\n**DELETE** FROM\
  \ Customer c\n\nWHERE c.age < 18\n\n**批量更新**\n\n实体的批量更新通过 UPDATE 语句完成，该语句设置实体的一个或多个属性，并受\
  \ WHERE 子句中的条件约束。UPDATE 语句的语法如清单 4-25 所述。\n\n**清单 4-25.** *UPDATE 语句语法*\n\nUPDATE\
  \ <实体名称> [[AS] <标识变量>]\n\nSET <更新语句> {, <更新语句>}*\n\n[WHERE <条件表达式>]\n\n与其删除所有年轻客户，不如使用以下语句将其名字改为“too\
  \ young”：\n\n**UPDATE** Customer c\n\n**SET** c.firstName = 'TOO YOUNG'\n\nWHERE\
  \ c.age < 18\n\n**查询**\n\n你已经了解了 JPQL 语法以及如何使用不同子句（SELECT、FROM、WHERE 等）来描述语句。但是，如何将\
  \ JPQL 语句集成到你的应用程序中呢？答案是：通过查询。JPA 2.0 有四种不同类型的查询可用于代码中，每种都有不同的用途：\n\n• *动态查询*：这是最简单的查询形式，仅包含在运行时动态指定的\
  \ JPQL 查询字符串。\n\n• *命名查询*：命名查询是静态且不可更改的。\n\n• *原生查询*：此类型查询用于执行原生 SQL 语句而非 JPQL 语句。\n\
  \n• *Criteria API*：JPA 2.0 引入了这一新概念。\n\n**144**\n\n第 4 章 ■ 管理持久化对象\n\n选择这四种查询类型的核心在于\
  \ EntityManager 接口，该接口提供了多个工厂方法，如表 4-3 所示，这些方法都返回一个 Query 接口。\n\n**表 4-3.** *用于创建查询的\
  \ EntityManager 方法*\n\n**方法**\n\n**描述**\n\nQuery createQuery(String jpqlString)\n\
  \n创建 Query 实例，用于执行动态查询的 JPQL 语句\n\nQuery createQuery(QueryDefinition qdef)\n\n创建\
  \ Query 实例，用于执行条件查询\n\nQuery createNamedQuery(String name)\n\n创建 Query 实例，用于执行命名查询（JPQL\
  \ 或原生 SQL）\n\nQuery createNativeQuery(String sqlString)\n\n创建 Query 实例，用于执行原生 SQL\
  \ 语句\n\nQuery createNativeQuery(String sqlString,\n\n创建 Query 实例，用于执行原生 SQL 语句，并传递预期结果的类\n\
  \nClass resultClass)\n\n当通过其中一个工厂方法获得 Query 接口的实现后\n\n\n\nEntityManager 接口中的方法通过一个丰富的\
  \ API 进行控制。清单 4-26 所示的 Query API 用于静态查询（即命名查询）和使用 JPQL 的动态查询，以及 SQL 中的原生查询。Query\
  \ API 还支持参数绑定和分页控制。\n\n**清单 4-26.** *Query API*\n\npublic interface Query {\n\n\
  **// 执行查询并返回结果**\n\npublic List getResultList();\n\npublic Object getSingleResult();\n\
  \npublic int executeUpdate();\n\n**// 为查询设置参数**\n\npublic Query setParameter(String\
  \ name, Object value);\n\npublic Query setParameter(String name, Date value,➥\n\n\
  TemporalType temporalType);\n\npublic Query setParameter(String name, Calendar value,➥\n\
  \nTemporalType temporalType);\n\npublic Query setParameter(int position, Object\
  \ value);\n\npublic Query setParameter(int position, Date value,➥\n\nTemporalType\
  \ temporalType);\n\npublic Query setParameter(int position, Calendar value,➥\n\n\
  TemporalType temporalType);\n\npublic Map<String, Object> getNamedParameters();\n\
  \npublic List getPositionalParameters();\n\n**// 限制查询返回的结果数量**\n\npublic Query setMaxResults(int\
  \ maxResult);\n\n第 4 章 ■ 管理持久化对象\n\n**145**\n\npublic int getMaxResults();\n\npublic\
  \ Query setFirstResult(int startPosition);\n\npublic int getFirstResult();\n\n**//\
  \ 设置和获取查询提示**\n\npublic Query setHint(String hintName, Object value);\n\npublic\
  \ Map<String, Object> getHints();\n\npublic Set<String> getSupportedHints();\n\n\
  **// 设置用于查询执行的刷新模式类型**\n\npublic Query setFlushMode(FlushModeType flushMode);\n\n\
  public FlushModeType getFlushMode();\n\n**// 设置用于查询执行的锁定模式类型**\n\npublic Query setLockMode(LockModeType\
  \ lockMode);\n\npublic LockModeType getLockMode();\n\n**// 允许访问特定于提供商的 API**\n\n\
  public <T> T unwrap(Class<T> cls);\n\n}\n\n此 API 中最常用的方法是执行查询本身的方法。要执行 SELECT 查询，您需要根据所需结果在两种方法之间进行选择：\n\
  \n• `getResultList()` 方法执行查询并返回结果列表（实体、属性、表达式等）。\n\n• `getSingleResult()` 方法执行查询并返回单个结果。\n\
  \n要执行更新或删除，`executeUpdate()` 方法会执行批量查询，并返回受查询执行影响的实体数量。\n\n正如您之前在“JPQL”部分所见，查询可以接受命名参数（例如\
  \ `:myParam`）或位置参数（例如 `?1`）。Query API 定义了多个 `setParameter` 方法，用于在执行查询前设置参数。\n\n\
  当执行查询时，它可能返回大量结果。根据应用程序的不同，这些结果可以一起处理或分块处理（例如，Web 应用程序一次只显示十行）。为了控制分页，Query 接口定义了\
  \ `setFirstResult()` 和 `setMaxResults()` 方法，用于指定要接收的第一个结果（从零开始编号）以及相对于该点返回的最大结果数。\n\
  \n刷新模式向持久化提供程序指示如何处理待处理的更改和查询。有两种可能的刷新模式设置：`AUTO` 和 `COMMIT`。`AUTO`（默认值）意味着持久化提供程序负责确保待处理的更改对查询的处理可见。`COMMIT`\
  \ 则是指对实体所做的更新效果不会与持久化上下文中的已更改数据重叠。\n\n可以使用 `setLockMode(LockModeType)` 方法锁定查询。锁旨在提供一种机制，以启用可重复读取的效果，无论是乐观锁还是悲观锁。\n\
  \n**146**\n\n第 4 章 ■ 管理持久化对象\n\n以下各节将使用上述部分方法描述四种不同类型的查询。\n\n**动态查询**\n\n动态查询是根据应用程序的需要即时定义的。要创建动态查询，请使用\
  \ `EntityManager.createQuery()` 方法，该方法接受一个代表 JPQL 查询的字符串作为参数。\n\n\n\n在以下代码中，JPQL\
  \ 查询从数据库中检索所有客户。由于该查询的结果是一个列表，因此使用了 `getResultList()` 方法，并返回一个 `Customer` 实体列表（`List<Customer>`）。但是，如果你知道查询只返回单个实体，请使用\
  \ `getSingleResult()` 方法。它会返回单个实体，并避免从列表中提取实体的额外工作。\n\nQuery query = em. **createQuery**(\"\
  SELECT c FROM Customer c\");\n\nList<Customer> customers = query. **getResultList**();\n\
  \n这个查询字符串也可以由应用程序动态创建，从而能够在运行时指定事先未知的复杂查询。字符串拼接用于根据条件动态构建查询。\n\nString **jpqlQuery**\
  \ = \"SELECT c FROM Customer c\";\n\nif (someCriteria)\n\n**jpqlQuery** += \" WHERE\
  \ c.firstName = 'Vincent'\";\n\nquery = em.createQuery(**jpqlQuery**);\n\nList<Customer>\
  \ customers = query. **getResultList**();\n\n前面的查询检索名为 Vincent 的客户，但你可能想为名字引入一个参数。传递参数有两种选择：使用名称或位置。在以下示例中，查询中使用了一个名为\
  \ `:fname` 的命名参数（注意 `:` 符号），并通过 `setParameter` 方法进行绑定：\n\njpqlQuery = \"SELECT c\
  \ FROM Customer c\";\n\nif (someCriteria)\n\njpqlQuery += \" where c.firstName =\
  \ **:fname**\";\n\nquery = em.createQuery(jpqlQuery);\n\nquery.setParameter(\" **fname**\"\
  , \"Vincent\");\n\nList<Customer> customers = query. **getResultList**();\n\n请注意，参数名称\
  \ `fname` 不包含查询中使用的冒号。使用位置参数的代码如下所示：\n\njpqlQuery = \"SELECT c FROM Customer c\"\
  ;\n\nif (someCriteria)\n\njpqlQuery += \" where c.firstName = **?1**\";\n\nquery\
  \ = em.createQuery(jpqlQuery);\n\nquery.setParameter(**1**, \"Vincent\");\n\nList<Customer>\
  \ customers = query. **getResultList**();\n\n如果你需要分页显示客户列表（例如每页十个），可以按如下方式使用 `setMaxResults`\
  \ 方法：\n\n第 4 章 ■ 管理持久化对象\n\n**147**\n\nQuery query = em.createQuery(\"SELECT c FROM\
  \ Customer c\");\n\nquery. **setMaxResults**(10);\n\nList<Customer> customers =\
  \ query.getResultList();\n\n动态查询需要考虑的一个问题是在运行时将 JPQL 字符串转换为 SQL 语句的成本。由于查询是动态创建的且无法预测，持久化提供程序必须解析\
  \ JPQL 字符串、获取 ORM 元数据并生成等效的 SQL。处理每个动态查询的性能成本可能是一个问题，如果你有不可更改的静态查询，请改用命名查询。\n\n\
  **命名查询**\n\n命名查询与动态查询的不同之处在于它们是静态且不可更改的。除了其静态特性（不允许动态查询的灵活性）之外，命名查询的执行效率可能更高，因为持久化提供程序可以在应用程序启动时将\
  \ JPQL 字符串转换为 SQL，而不是每次执行查询时都进行转换。\n\n命名查询是在 `@NamedQuery` 注解或等效的 XML 中的元数据内表达的静态查询。要定义这些可重用的查询，请使用\
  \ `@NamedQuery` 注解对实体进行注解，该注解包含两个元素：查询的名称及其内容。\n\n因此，让我们修改 `Customer` 实体，并使用注解静态定义三个查询（参见清单\
  \ 4-27）。\n\n**清单 4-27.** *定义命名查询的 Customer 实体*\n\n@Entity\n\n**@NamedQueries**({\n\
  \n**@NamedQuery**(**name** = \"findAll\", **query**=\"select c from Customer c\"\
  ),\n\n@NamedQuery(name = \"findVincent\", ➥\n\nquery=\"select c from Customer c\
  \ where c.firstName = 'Vincent'\"),\n\n@NamedQuery(name = \"findWithParam\", ➥\n\
  \nquery=\"select c from Customer c where c.firstName = :fname\")\n\n})\n\npublic\
  \ class Customer {\n\n@Id @GeneratedValue\n\nprivate Long id;\n\nprivate String\
  \ firstName;\n\nprivate String lastName;\n\nprivate Integer age;\n\nprivate String\
  \ email;\n\n@OneToOne\n\n@JoinColumn(name = \"address_fk\")\n\nprivate Address address;\n\
  \n// 构造方法、getter、setter\n\n}\n\n由于 `Customer` 实体定义了多个命名查询，因此它使用了 `@NamedQueries`\
  \ 注解，该注解接受一个 `@NamedQuery` 数组。第一个查询名为 `findAll`，从数据库中检索所有客户，没有任何限制（没有 WHERE 子句）。`findWithParam`\
  \ 查询接受参数 `:fname`，以根据客户的名字进行限制。清单 4-27 展示了一个 `@NamedQueries` 数组，但如果 `Customer` 只有一个查询，则可以按如下方式定义：\n\
  \n@Entity\n\n**@NamedQuery**(**name** = \"findAll\", **query**=\"select c from Customer\
  \ c\") public class Customer {\n\n...\n\n}\n\n执行这些命名查询的方式类似于使用动态查询的方式。调用 `EntityManager.createNamedQuery()`\
  \ 方法，并传入注解定义的查询名称。该方法返回一个 `Query` 对象，可用于设置参数、最大结果数、获取模式等。要执行 `findAll` 查询，请编写以下代码：\n\
  \nQuery query = em. **createNamedQuery**(\" **findAll**\");\n\nList<Customer> customers\
  \ = query. **getResultList**();\n\n以下是调用 `findWithParam` 命名查询的代码片段，传递参数 `:fname`，并将最大结果数设置为\
  \ 3：\n\nQuery query = em. **createNamedQuery**(\" **findWithParam**\");\n\nquery.setParameter(\"\
  fname\", \"Vincent\");\n\nquery.setMaxResults(3);\n\nList<Customer> customers =\
  \ query. **getResultList**();\n\n由于 `Query` API 的大多数方法都返回一个 `Query` 对象，因此你可以使用以下优雅的简写方式来编写查询。你可以一个接一个地调用方法（`setParameter().setMaxResults()`\
  \ 等）。\n\nQuery query = em.createNamedQuery(\"findWithParam\").➥\n\nsetParameter(\"\
  fname\", \"Vincent\").setMaxResults(3);\n\nList<Customer> customers = query. **getResultList**();\n\
  \n命名查询对于组织查询定义和提高应用程序性能非常有用。组织性源于命名查询是在实体上静态定义的，并且通常放置在直接对应于查询结果的实体类上（此处 `findAll`\
  \ 查询返回客户，因此应在 `Customer` 实体中定义）。\n\n有一个限制：查询名称的作用域是持久化单元，并且在该作用域内必须是唯一的，这意味着只能存在一个\
  \ `findAll` 方法。客户的 `findAll` 查询和地址的 `findAll` 查询应使用不同的名称。一种常见的做法是在查询名称前加上实体名称作为前缀。例如，`Customer`\
  \ 实体的 `findAll` 查询可以命名为 `Customer.findAll`。\n\n另一个问题是，查询名称是一个字符串，如果出现拼写错误或重构代码，可能会抛出异常，指示查询不存在。为了降低风险，你可以将查询名称替换为常量。清单\
  \ 4-28 展示了如何重构 `Customer` 实体。\n\n第 4 章 ■ 管理持久化对象\n\n**149**\n\n**清单 4-28.** *使用常量定义命名查询的\
  \ Customer 实体*\n\n@Entity\n\n@NamedQuery(name = **Customer.FIND_ALL**, query=\"\
  select c from Customer c\"), public class Customer {\n\npublic static final String\
  \ **FIND_ALL** = \"Customer.findAll\";\n\n// 属性、构造方法、getter、setter\n\n}\n\n常量 `FIND_ALL`\
  \ 通过将查询名称前缀实体名称，以无歧义的方式标识了 `findAll` 查询。然后在 `@NamedQuery` 注解中使用相同的常量，并且你可以按如下方式使用此常量来执行查询：\n\
  \nQuery query = em. **createNamedQuery(Customer.FIND_ALL**);\n\nList<Customer> customers\
  \ = query. **getResultList**();\n\n**原生查询**\n\n\n\nJPQL 拥有非常丰富的语法，允许你以任何形式处理实体，并以可移植的方式跨数据库操作。JPA\
  \ 允许你通过使用原生查询来利用数据库的特定功能。原生查询将原生 SQL 语句（SELECT、UPDATE 或 DELETE）作为参数，并返回一个用于执行该 SQL\
  \ 语句的 `Query` 实例。然而，原生查询并不期望能够跨数据库移植。\n\n如果代码不可移植，为什么不使用 JDBC 调用呢？使用 JPA 原生查询而非\
  \ JDBC 调用的主要原因是，查询结果会自动转换回实体。如果你想使用 SQL 从数据库中检索所有客户实体，你需要使用 `EntityManager.createNativeQuery()`\
  \ 方法，该方法接受 SQL 查询和结果应映射到的实体类作为参数。\n\n```java\nQuery query = em. **createNativeQuery(\"\
  SELECT * FROM t_customer**\", ➥\n\n**Customer.class**);\n\nList<Customer> customers\
  \ = query.getResultList();\n```\n\n正如你在前面的代码片段中所见，SQL 查询是一个可以在运行时动态创建的字符串（就像 JPQL\
  \ 动态查询一样）。同样，查询可能很复杂，并且由于持久化提供程序无法预先知道，它每次都会重新解释该查询。与命名查询类似，原生查询可以使用注解来定义静态 SQL\
  \ 查询。命名原生查询使用 `@NamedNativeQuery` 注解定义，该注解必须放置在任意实体上（参见清单 4-29）。与 JPQL 命名查询一样，查询名称在持久化单元内必须是唯一的。\n\
  \n**清单 4-29.** *定义原生命名查询的 Customer 实体*\n\n```java\n@Entity\n\n**@NamedNativeQuery(name\
  \ = \"findAll\", query=\"select * from t_customer\")**\n\n@Table(name = \"t_customer\"\
  )\n\npublic class Customer {\n```\n\n![Image 58](img/index-180_1.jpg)\n\n**150**\n\
  \n第 4 章 ■ 管理持久化对象\n\n```java\n// 属性、构造方法、getter、setter\n}\n```\n\n**并发**\n\nJPA\
  \ 可用于更改持久化数据，而 JPQL 可用于根据特定条件检索数据，这些操作由运行在具有多个节点、多个线程和单个数据库的集群中的应用程序执行，因此实体被并发访问是非常常见的。在这种情况下，必须由应用程序使用锁定机制来控制同步。\n\
  \n无论应用程序是简单还是复杂，你都有可能在某处代码中使用锁定。\n\n为了说明并发数据库访问的问题，让我们看一个包含两个方法的应用程序示例，如图 4-3 所示。一个方法通过标识符查找一本书，并将该书的价格提高\
  \ 2 美元。另一个方法执行相同的操作，但将价格提高 5 美元。如果这两个方法在单独的事务中并发执行并操作同一本书，你将无法预测该书的最终价格。在此示例中，该书的初始价格为\
  \ 10 美元。根据哪个事务最后完成，价格可能是 12 美元或 15 美元。\n\n**图 4-3.** *事务一 (tx1) 和事务二 (tx2) 并发更新一本书的价格*\n\
  \n这种“最后提交者获胜”的并发问题并非 JPA 所独有。数据库长期以来一直需要处理这个问题，并找到了不同的解决方案来将一个事务与其他事务隔离。数据库使用的一种常见机制是锁定正在执行\
  \ SQL 语句的行。\n\nJPA 2.0 使用了两种不同的锁定机制（JPA 1.0 仅支持乐观锁定）：\n\n*   **乐观锁定** 基于大多数数据库事务不会与其他事务冲突的假设，允许在允许事务执行时尽可能宽松地实现并发。\n\
  *   **悲观锁定** 基于相反的假设，因此在对资源进行操作之前，会先获取该资源上的锁。\n\n第 4 章 ■ 管理持久化对象\n\n**151**\n\n\n\
  \n作为日常生活中强化这些概念的一个例子，可以想想“乐观过马路与悲观过马路”。在车流量很小的区域，你或许不用查看是否有来车就能过马路。但在繁忙的市中心可不行！\n\
  \nJPA 在 API 的不同层级使用了不同的锁定机制。悲观锁和乐观锁都可以通过 `EntityManager.find` 和 `EntityManager.refresh`\
  \ 方法（除了 `lock` 方法之外）以及通过 JPQL 查询来获取，这意味着可以在 `EntityManager` 级别和 `Query` 级别，使用表 4-4\
  \ 和表 4-5 中列出的方法来实现锁定。\n\n**表 4-4.** *用于锁定实体的 EntityManager 方法*\n\n**方法**\n\n**描述**\n\
  \n`<T> T find(Class<T> entityClass, Object primaryKey, LockModeType lockMode)`\n\
  \n查找指定类的主键为 `primaryKey` 的实体，并根据指定的锁定类型对其进行锁定\n\n`void lock(Object entity, LockModeType\
  \ lockMode)`\n\n使用指定的锁定模式类型，锁定持久化上下文中包含的实体实例\n\n`void refresh(Object entity, LockModeType\
  \ lockMode)`\n\n从数据库刷新实例的状态，覆盖对实体所做的任何更改（如果有），并根据给定的锁定模式类型对其进行锁定\n\n**表 4-5.** *用于锁定\
  \ JPQL 查询的 Query 方法*\n\n**方法**\n\n**描述**\n\n`Query setLockMode(LockModeType lockMode)`\n\
  \n设置用于查询执行的锁定模式类型\n\n这些方法中的每一个都将 `LockModeType` 作为参数，该参数可以取不同的值：\n\n• `OPTIMISTIC`：使用乐观锁定\n\
  • `OPTIMISTIC_FORCE_INCREMENT`：使用乐观锁定并强制递增实体的版本列（请参阅即将到来的“版本控制”部分。）\n• `PESSIMISTIC_READ`：使用悲观锁定，无需在事务结束时重新读取数据以获取锁\n\
  • `PESSIMISTIC_WRITE`：使用悲观锁定，并强制在尝试更新实体的事务之间进行序列化\n• `PESSIMISTIC_FORCE_INCREMENT`：使用悲观锁定并强制递增实体的版本列（请参阅即将到来的“版本控制”部分。）\n\
  • `NONE`：指定不应使用任何锁定机制\n\n你可以根据指定锁定的需要，在多个地方使用这些参数。你可以先读取*然后*锁定：\n\n**152**\n\n第\
  \ 4 章 ■ 管理持久化对象\n\n```java\nBook book = em.find(Book.class, 12);\n// 锁定以提价\n**em.lock(book,\
  \ LockModeType.PESSIMISTIC);**\nbook.raisePriceByTwoDollars();\n```\n\n或者你可以读取*并*锁定：\n\
  \n```java\nBook book = em.find(Book.class, 12, **LockModeType.PESSIMISTIC**);\n\
  // 该书已被锁定，提价\nbook.raisePriceByTwoDollars();\n```\n\n并发和锁定是版本控制的关键驱动因素。\n\n**版本控制**\n\
  \nJava 使用版本控制：Java SE 5.0、Java SE 6.0、EJB 3.1、JAX-RS 1.0 等等。当 JAX-RS 的新版本发布时，其版本号会增加，然后你升级到\
  \ JAX-RS 1.1。当你需要对实体进行版本控制时，JPA 就使用这种确切的机制。因此，当你首次将实体持久化到数据库时，它将获得版本号 1。之后，如果你更新了一个属性并将此更改提交到数据库，实体版本将变为\
  \ 2，依此类推。每次对实体进行更改时，此版本控制都会更新。\n\n为了实现这一点，实体必须有一个属性来存储版本号，并且必须使用 `@Version` 进行注解。然后，此版本号会映射到数据库中的一列。版本控制支持的属性类型可以是\
  \ `int`、`Integer`、`short`、`Short`、`long`、`Long` 或 `Timestamp`。清单 4-30 展示了如何向 `Book`\
  \ 实体添加版本属性。\n\n**清单 4-30.** *带有 @Version 注解的 Book 实体*\n\n```java\n@Entity\npublic\
  \ class Book {\n    @Id @GeneratedValue\n    private Long id;\n    **@Version**\n\
  \    **private Integer version;**\n    private String title;\n    private Float\
  \ price;\n    private String description;\n    private String isbn;\n    private\
  \ Integer nbOfPage;\n    private Boolean illustrations;\n    // 构造方法、getter、setter\n\
  }\n```\n\n实体可以访问其版本属性的值，但不得修改它。只有持久化提供程序才允许在将对象写入或更新到数据库时设置或更新版本属性的值。让我们看一个例子来说明此版本控制的行为。\n\
  \n第 4 章 ■ 管理持久化对象\n\n**153**\n\n在清单 4-31 中，一个新的 `Book` 实体被持久化到数据库。一旦事务提交，持久化提供程序将版本设置为\
  \ 1。之后，更新了书的价格，一旦数据刷新到数据库，版本号就会增加到 2。\n\n**清单 4-31.** *事务 tx1 和 tx2 并发更新一本书的价格*\n\
  \n```java\nBook book = new Book(\"H2G2\", 21f, \"Best IT book\", \"123-456\", 321,\
  \ false);\ntx.begin();\nem.persist(book);\ntx.commit();\nassertEquals(**1, book.getVersion()**);\n\
  \ntx.begin();\nbook.raisePriceByTwoDollars();\ntx.commit();\nassertEquals(**2, book.getVersion()**);\n\
  ```\n\n版本属性不是必需的，但当实体可能被多个进程或线程并发修改时，建议使用。版本控制是乐观锁定的核心，并为不频繁的并发实体修改提供保护。实际上，如果实体具有使用\
  \ `@Version` 注解映射的属性，则它会自动启用乐观锁定。\n\n**乐观锁定**\n\n顾名思义，乐观锁定基于数据库事务不会相互冲突这一事实。换句话说，更新实体的事务很有可能是在该时间段内实际更新该实体的唯一事务。因此，获取实体锁的决定实际上是在事务结束时做出的。这确保了对实体的更新与数据库的当前状态一致。会导致违反此约束的事务将抛出\
  \ `OptimisticLockException`，并且该事务会被标记为回滚。\n\n如何抛出 `OptimisticLockException`？要么通过显式锁定实体（使用你之前看到的传递\
  \ `LockModeType` 的 `lock` 或 `find` 方法），要么让持久化提供程序检查使用 `@Version` 注解的属性。在实体上使用专用的\
  \ `@Version` 注解，允许 `EntityManager` 通过简单地将实体实例中版本属性的值与数据库中的列值进行比较来执行乐观锁定。如果没有使用 `@Version`\
  \ 注解的属性，实体管理器将无法进行乐观锁定。\n\n事务 tx1 和 tx2 都获取了同一个 `Book` 实体的实例。此时，`Book` 实体的版本是 1。第一个事务将书的价格提高了\
  \ 2 美元并提交了此更改。当数据刷新到数据库时，持久化提供程序增加了版本号并将其设置为 2。此时，第二个事务将价格提高了 5 美元并提交了更改。tx2 的实体管理器意识到数据库中的版本号与实体的版本号不同。这意味着版本已被另一个事务更改，因此抛出了\
  \ `OptimisticLockException`，如图 4-4 所示。\n\n**图 4-4.** *在事务 tx2 上抛出的 OptimisticLockException*\n\
  \n这是使用 `@Version` 注解时的默认行为：当数据被刷新时（在提交时或通过显式调用 `em.flush()` 方法），会抛出 `OptimisticLockException`。你也可以控制在哪里添加乐观锁，使用先读取后锁定或读取并锁定。例如，读取并锁定的代码如下所示：\n\
  \n```java\nBook book = em.find(Book.class, 12);\n// 锁定以提价\n**em.lock(book, LockModeType.OPTIMISTIC);**\n\
  book.raisePriceByTwoDollars();\n```\n\n\n\n使用乐观锁时，作为参数传入的 `LockModeType` 可以取两个值：`OPTIMISTIC`\
  \ 和 `OPTIMISTIC_FORCE_INCREMENT`（或者分别对应 `READ` 和 `WRITE`，但这些值已弃用）。唯一的区别在于，`OPTIMISTIC_FORCE_INCREMENT`\
  \ 会强制更新（递增）实体的版本列。\n\n强烈建议应用程序为所有可能被并发访问的实体启用乐观锁。未能使用锁机制可能导致实体状态不一致、更新丢失以及其他状态异常。乐观锁是一种有用的性能优化手段，它将原本需要数据库承担的工作转移出去，是悲观锁的一种替代方案，后者需要低层次的数据库锁定。\n\
  \n**悲观锁**\n\n悲观锁基于与乐观锁相反的假设，因为在操作实体之前会急切地获取锁。这非常消耗资源，并会导致显著的性能下降，因为会使用 `SELECT ...\
  \ FOR UPDATE` SQL 语句来读取数据以持有数据库锁。\n\n第 4 章 ■ 管理持久化对象\n\n**155**\n\n数据库通常提供一种悲观锁服务，允许实体管理器锁定表中的一行，以防止另一个线程更新同一行。这是一种确保两个客户端不会同时修改同一行的有效机制，但需要在数据库内部进行昂贵的、低层次的检查。会导致违反此约束的事务会抛出\
  \ `PessimisticLockException` 异常，并且该事务会被标记为回滚。\n\n乐观锁适用于处理并发事务间的中等程度争用。但在某些争用风险较高的应用中，悲观锁可能更合适，因为数据库锁会立即获取，而不是像乐观事务那样常常在后期才失败。例如，在经济危机时期，股票市场会收到海量的卖出订单。如果\
  \ 1 亿美国人需要同时卖出他们的股票期权，系统就需要使用悲观锁来确保数据一致性。\n\n请注意，当前市场情绪相当悲观而非乐观，这与 JPA 无关。\n\n悲观锁可以应用于那些不包含\
  \ `@Version` 注解属性的实体。\n\n**总结**\n\n在本章中，你学习了如何查询实体。实体管理器是将实体与持久化关联起来的核心。它可以在持久化上下文（充当一级缓存）的帮助下，创建、更新、按\
  \ ID 查找、删除实体，并将实体与数据库同步。JPA 还附带了一种非常强大的查询语言 JPQL，它与数据库供应商无关。你可以使用包含 `WHERE`、`ORDER\
  \ BY` 或 `GROUP BY` 子句的丰富语法来检索实体。当你的实体发生并发访问时，你知道了如何使用版本控制，以及何时使用乐观锁或悲观锁。\n\n在下一章中，你将学习更多关于实体生命周期的知识，并了解如何使用回调注解或监听器将某些逻辑挂钩到该生命周期。\n\
  \n第 5 章\n\n回调和监听器\n\n**在**前一章中，你了解了如何查询映射的实体。现在你知道如何持久化、删除、更新以及通过标识符查找实体了。使用 JPQL，你可以通过动态查询、静态查询和原生查询，根据特定的搜索条件检索一个或多个实体。\n\
  \n所有这些操作都由实体管理器执行——它是操作实体并管理其生命周期的核心组件。\n\n我曾描述过实体生命周期，即实体由实体管理器管理（意味着它们具有持久化标识并与数据库同步），或者与数据库分离并作为普通\
  \ POJO 使用。但实体的生命周期要稍微丰富一些。重要的是，JPA 允许你在实体上发生某些事件时，插入你自己的业务逻辑。然后，持久化提供程序会使用回调方法自动调用此业务代码。\n\
  \n你可以将生命周期回调和监听器视为关系数据库中的触发器。触发器为表中的每一行执行业务逻辑。生命周期回调和监听器则针对实体的每个实例，响应于某个特定事件（更准确地说，是在事件发生之前或之后）被调用。你可以使用元数据注解或\
  \ XML 描述符来定义“前”和“后”回调方法。\n\n**实体生命周期**\n\n到目前为止，你已经了解了实体的大部分奥秘，现在让我们来看看它们的生命周期。当一个实体被实体管理器创建或持久化时，该实体被称为受管实体。在此之前，该实体在\
  \ JVM 看来只是一个普通的 POJO（即处于游离状态），可以被应用程序当作普通对象使用。当一个实体处于受管状态时，实体管理器会自动将其属性值与底层数据库同步。\n\
  \n为了更好地理解这一点，请看图 5-1，这是一个 UML 状态图，展示了 `Customer` 实体可能具有的状态以及各状态之间的转换。\n\n**157**\n\
  \n![Image 60](img/index-188_1.jpg)\n\n**158**\n\n第 5 章 ■ 回调和监听器\n\n**图 5-1.** *实体生命周期*\n\
  \n要创建 `Customer` 实体的实例，你需要使用 `new` 操作符。这个对象存在于内存中，尽管 JPA 对它一无所知。如果你不对这个对象做任何操作，它将超出作用域并最终被垃圾回收，其生命周期就此结束。接下来你可以做的是，使用\
  \ `EntityManager.persist()` 方法持久化一个 `Customer` 实例。\n\n此时，该实体变为受管状态，其状态与数据库同步。\n\n\
  在此受管状态下，你可以使用 setter 方法（例如 `customer.setFirstName()`）更新属性，或者使用 `EntityManager.refresh()`\
  \ 方法刷新内容。所有这些更改都将在实体和数据库之间同步。在此状态下，如果你调用 `EntityManager.contains(customer)` 方法，它将返回\
  \ `true`，因为 `customer` 包含在持久化上下文中（即受管状态）。\n\n实体变为受管状态的另一种方式是从数据库加载。当你使用 `EntityManager.find()`\
  \ 方法，或者创建 JPQL 查询来检索实体列表时，所有这些实体都会自动变为受管状态，然后你就可以开始更新或删除它们的属性了。\n\n在受管状态下，你可以调用\
  \ `EntityManager.remove()` 方法，该实体将从数据库中被删除，并且不再受管。但 Java 对象会继续存在于内存中，你可以继续使用它，直到垃圾回收器将其回收。\n\
  \n现在让我们看看游离状态。你在前一章已经看到，显式调用 `EntityManager.clear()` 方法会将实体从持久化上下文中清除；它变为游离状态。但还有另一种更微妙的方式会使实体游离：当它被序列化时。在本书的许多示例中，实体没有继承任何东西，但如果它们需要跨越网络进行远程调用，或者跨越层在表示层中显示，它们就需要实现\
  \ `java.io.Serializable` 接口。这不是 JPA 的限制，而是 Java 的限制。当一个受管实体被序列化、跨越网络并反序列化后，它被视为一个游离对象。要重新关联一个实体，你需要调用\
  \ `EntityManager.merge()` 方法。\n\n回调和监听器允许你在特定事件发生时添加自己的业务逻辑。\n\n\n\n生命周期事件发生在实体上，或者更广泛地说，发生在任何实体上。\n\
  \n![图片 61](img/index-189_1.jpg)\n\n第 5 章 ■ 回调与监听器\n\n**159**\n\n**回调**\n\n实体的生命周期分为四类：持久化、更新、移除和加载，分别对应数据库的插入、更新、删除和查询操作。每个生命周期都有“前”和“后”事件，实体管理器可以拦截这些事件来调用业务方法。这些业务方法必须使用表\
  \ 5-1 中描述的注解之一进行标注。\n\n**表 5-1.** *生命周期回调注解*\n\n**注解**\n\n**描述**\n\n@PrePersist\n\
  \n标记一个在 EntityManager.persist() 执行之前调用的方法。\n\n@PostPersist\n\n标记一个在实体被持久化之后调用的方法。如果实体自动生成其主键（使用\
  \ @GeneratedValue），则在该方法中该值可用。\n\n@PreUpdate\n\n标记一个在数据库更新操作执行之前调用的方法（调用实体 setter\
  \ 方法或 EntityManager.merge() 方法）。\n\n@PostUpdate\n\n标记一个在数据库更新操作执行之后调用的方法。\n\n@PreRemove\n\
  \n标记一个在 EntityManager.remove() 执行之前调用的方法。\n\n@PostRemove\n\n标记一个在实体被移除之后调用的方法。\n\
  \n@PostLoad\n\n标记一个在实体从底层数据库加载（通过 JPQL 查询或 EntityManager.find()）或刷新之后调用的方法。没有 @PreLoad\
  \ 注解，因为对尚未构建的实体预加载数据没有意义。\n\n将回调注解添加到之前图 5-1 所示的 UML 状态图中，就得到了图 5-2 所示的图表。\n\n**图\
  \ 5-2.** *带有回调注解的实体生命周期*\n\n在将实体插入数据库之前，实体管理器会调用标注了 @PrePersist 的方法。如果插入操作没有抛出异常，则实体被持久化，其标识被初始化，然后调用标注了\
  \ @PostPersist 的方法。更新（@PreUpdate, @PostUpdate）和删除（@PreRemove, @PostRemove）的行为与此相同。当从数据库加载实体时（通过\
  \ EntityManager.find() 或 JPQL 查询），会调用标注了 @PostLoad 的方法。当实体被分离并需要合并时，实体管理器首先必须检查与数据库是否存在差异（@PostLoad），如果存在，则更新数据（@PreUpdate,\
  \ @PostUpdate）。\n\n在代码中是如何体现的呢？实体不仅可以有属性、构造器、getter 和 setter 方法，还可以有用于验证其状态或计算其某些属性的业务逻辑。这些可以是普通的\
  \ Java 方法，由其他类调用，也可以是回调注解（也称为回调方法），如清单 5-1 所示。实体管理器会根据触发的事件自动调用它们。\n\n**清单 5-1.**\
  \ *带有回调注解的 Customer 实体*\n\n@Entity\n\npublic class Customer {\n\n@Id @GeneratedValue\n\
  \nprivate Long id;\n\nprivate String firstName;\n\nprivate String lastName;\n\n\
  private String email;\n\nprivate String phoneNumber;\n\n@Temporal(TemporalType.DATE)\n\
  \nprivate Date dateOfBirth;\n\n@Transient\n\nprivate Integer age;\n\n@Temporal(TemporalType.TIMESTAMP)\n\
  \nprivate Date creationDate;\n\n**@PrePersist**\n\n**@PreUpdate**\n\nprivate void\
  \ **validate**() {\n\nif (dateOfBirth.getTime() > new Date().getTime())\n\nthrow\
  \ new IllegalArgumentException(\"Invalid date of birth\");\n\nif (!phoneNumber.startsWith(\"\
  +\"))\n\nthrow new IllegalArgumentException(\"Invalid phone number\");\n\n}\n\n\
  **@PostLoad**\n\n**@PostPersist**\n\n**@PostUpdate**\n\npublic void **calculateAge**()\
  \ {\n\nif (dateOfBirth == null) {\n\nage = null;\n\nreturn;\n\n}\n\n第 5 章 ■ 回调与监听器\n\
  \n**161**\n\nCalendar birth = new GregorianCalendar();\n\nbirth.setTime(dateOfBirth);\n\
  \nCalendar now = new GregorianCalendar();\n\nnow.setTime(new Date());\n\nint adjust\
  \ = 0;\n\nif (now.get(DAY_OF_YEAR) - birth.get(DAY_OF_YEAR) < 0) {\n\nadjust = -1;\n\
  \n}\n\n\n\nage = now.get(YEAR) - birth.get(YEAR) + adjust;\n\n}\n\n// 构造函数、getter\
  \ 和 setter 方法\n\n}\n\n在清单 5-1 中，Customer 实体有一个用于验证其数据（检查 `dateOfBirth` 和 `phoneNumber`\
  \ 属性）的方法。该方法使用了 `@PrePersist` 和 `@PreUpdate` 注解，并将在向数据库插入数据或更新数据之前被调用。如果数据无效，则会抛出运行时异常，插入或更新操作将回滚，以确保插入或更新到数据库中的数据是有效的。\n\
  \n`calculateAge()` 方法用于计算客户的年龄。`age` 属性是瞬态的，不会映射到数据库中。在实体被加载、持久化或更新之后，`calculateAge()`\
  \ 方法会获取客户的出生日期，计算年龄，并设置该属性。\n\n以下规则适用于生命周期回调方法：\n\n• 方法可以具有 public、private、protected\
  \ 或包级访问权限，但不能是 static 或 final。请注意，在清单 5-1 中，`validate()` 方法是 private 的。\n\n• 一个方法可以使用多个生命周期事件注解进行标注（`validateData()`\
  \ 方法使用了 `@PrePersist` 和 `@PreUpdate` 注解）。但是，在一个实体类中，同一类型的生命周期注解只能出现一次（例如，你不能在同一个实体中有两个\
  \ `@PrePersist` 注解）。\n\n• 方法可以抛出非受检（运行时）异常，但不能抛出受检异常。如果存在事务，抛出运行时异常将回滚该事务。\n\n•\
  \ 方法可以调用 JNDI、JDBC、JMS 和 EJB，但不能调用任何 `EntityManager` 或 `Query` 操作。\n\n• 对于继承关系，如果在超类上指定了某个方法，它将在子类的方法之前被调用。例如，如果在清单\
  \ 5-1 中 Customer 继承自 Person 实体，那么 Person 的 `@PrePersist` 方法将在 Customer 的 `@PrePersist`\
  \ 方法之前被调用。\n\n• 如果在关系中使用事件级联，回调方法也会以级联方式被调用。例如，假设 Customer 有一个地址集合，并且在该关系上设置了级联删除。当你删除该客户时，`Address`\
  \ 的 `@PreRemove` 方法以及 `Customer` 的 `@PreRemove` 方法都会被调用。\n\n**162**\n\n第 5 章 ■ 回调和监听器\n\
  \n**监听器**\n\n当业务逻辑仅与某个实体相关时，实体中的回调方法效果很好。实体监听器用于将业务逻辑提取到单独的类中，并在其他实体之间共享。实体监听器只是一个\
  \ POJO，你可以在其上定义一个或多个生命周期回调方法。要注册监听器，实体需要使用 `@EntityListeners` 注解。\n\n使用客户示例，将 `calculateAge()`\
  \ 和 `validate()` 方法分别提取到单独的监听器类中：`AgeCalculationListener`（见清单 5-2）和 `DataValidationListener`（见清单\
  \ 5-3）。\n\n**清单 5-2.** *计算客户年龄的监听器*\n\npublic class AgeCalculationListener {\n\n\
  **@PostLoad**\n\n**@PostPersist**\n\n**@PostUpdate**\n\npublic void calculateAge(**Customer\
  \ customer**) {\n\nif (customer.getDateOfBirth() == null) {\n\ncustomer.setAge(null);\n\
  \nreturn;\n\n}\n\nCalendar birth = new GregorianCalendar();\n\nbirth.setTime(customer.getDateOfBirth());\n\
  \nCalendar now = new GregorianCalendar();\n\nnow.setTime(new Date());\n\nint adjust\
  \ = 0;\n\nif (now.get(DAY_OF_YEAR) - birth.get(DAY_OF_YEAR) < 0) {\n\nadjust = -1;\n\
  \n}\n\ncustomer.setAge(now.get(YEAR) - birth.get(YEAR) + adjust);\n\n}\n\n}\n\n\
  **清单 5-3.** *验证客户属性的监听器*\n\npublic class DataValidationListener {\n\n**@PrePersist**\n\
  \n**@PreUpdate**\n\nprivate void validate(**Customer customer**) {\n\nif (dateOfBirth.getTime()\
