  @javax.jws.WebResult 注解与 `@WebMethod` 配合使用，以控制在 WSDL 中生成的消息返回值的名称。在清单 14-17 中，`validate()`\
  \ 方法的返回结果被重命名为 `IsValid`。\n\n**清单 14-17.** *方法的返回结果被重命名*\n\n@WebService\n\npublic\
