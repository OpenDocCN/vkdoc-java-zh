  \n这个 WSDL 和模式通常使用工具生成，这些工具将 Web 服务元数据转换为 XML。JAX-WS 附带了自动生成这些工件的实用程序。\n\n**SOAP**\n\
  \nWSDL 描述了 Web 服务的抽象接口，而 SOAP 则提供了具体实现，定义了交换消息的 XML 结构。就 Web 而言，SOAP 是一种可以通过 HTTP（或其他通信协议）传递的\
  \ Web 服务消息结构，并且 SOAP 的 HTTP 绑定包含一些标准的 HTTP 扩展头。这种消息结构用 XML 描述。SOAP 不是使用 HTTP 从浏览器请求网页，而是通过\
  \ HTTP 请求发送 XML 消息，并通过 HTTP 响应接收回复。SOAP 消息是一个 XML 文档，包含以下元素：\n\n第 14 章 ■ SOAP Web\
  \ 服务\n\n**409**\n\n• <Envelope>：定义消息以及文档中使用的命名空间。这是一个必需的根元素。\n\n\n\n• <Header>：包含消息的可选属性或特定于应用程序的基础设施信息，例如安全信息或网络路由。\n\
  \n• <Body>：包含应用程序之间交换的消息。\n\n• <Fault>：提供消息处理过程中发生的错误信息。\n\n此元素为可选元素。\n\n只有信封和正文是必需的。以我们的示例为例，客户端应用程序调用\
  \ Web 服务来验证信用卡（一个用于请求的 SOAP 信封），并接收一个布尔值，告知该卡是否有效（另一个用于响应的 SOAP 信封）。\n\n清单 14-13\
  \ 和 14-14 展示了这两个 SOAP 消息的结构。\n\n**清单 14-13.** *用于请求的 SOAP 信封*\n\n[<soap:Envelope](http://schemas.xmlsoap.org/soap/envelope/)\
  \ ➥\n\n[>](http://chapter14.javaee6.org/)\n\n<soap:Header/>\n\n<soap:Body>\n\n<cc:validate>\n\
  \n<arg0>\n\n<controlNumber>1234</controlNumber>\n\n<expiryDate>10/10</expiryDate>\n\
  \n<number>9999</number>\n\n<type>VISA</type>\n\n</arg0>\n\n</cc:validate>\n\n</soap:Body>\n\
  \n</soap:Envelope>\n\n**清单 14-14.** *用于响应的 SOAP 信封*\n\n[<soap:Envelope >](http://schemas.xmlsoap.org/soap/envelope/)\n\
  \n<soap:Body>\n\n[<ns2:validateResponse >](http://chapter14.javaee6.org/)\n\n<return>true</return>\n\
  \n</ns2:validateResponse>\n\n</soap:Body>\n\n</soap:Envelope>\n\n**基于 XML 的 Web\
  \ 服务的 Java API**\n\n我们已经审查了一个简单的 WSDL 文档、一个 SOAP 请求和一个 SOAP 响应。当 Web 服务具有多个带有复杂参数的操作时，这些\
  \ XML 文档对 Java 开发人员来说可能显得令人生畏。好消息是，JAX-WS 通过隐藏这些 XML 文档的复杂性，使开发工作变得更加轻松。\n\n**410**\n\
  \n第 14 章 ■ SOAP Web 服务\n\n不幸的是，有时你需要深入研究 WSDL 结构。\n\n由于 WSDL 文档是消费者与服务之间的契约，因此它可以用于编写消费者和服务的\
  \ Java 代码。这就是*自顶向下方法*，也称为*契约优先*。这种方法从契约（WSDL）开始，通过定义操作、消息等。当消费者和提供者都同意该契约后，你就可以基于该契约实现\
  \ Java 类。Metro 提供了一些工具，可以从 WSDL 生成类。\n\n另一种方法称为*自底向上*，即实现类已经存在，只需要创建 WSDL。同样，Metro\
  \ 提供了从现有类生成 WSDL 的实用程序。在这两种情况下，有时需要调整代码以适应 WSDL，反之亦然。这时 JAX-WS 就能派上用场。通过简单的开发模型和少量注解，可以调整\
  \ Java 到 WSDL 的映射。自底向上方法可能导致应用程序效率非常低下，因为 Java 方法和类与跨网络传输的理想消息粒度无关。如果延迟高和/或带宽低，使用最少、最大的消息是值得的，而这只能通过使用契约优先方法来实现。\n\
  \n本章介绍了通用的 Web 服务概念和规范，然后讨论了用于 XML 绑定的 JAXB，以及 WSDL 和 SOAP 文档的表面内容。但 Web 服务遵循 Java\
  \ EE 6 的“易于开发”范式，并不要求你编写任何 WSDL 或 SOAP。Web 服务只是一个带有注解的 POJO，需要部署在 Web 服务容器中。然而，Web\
  \ 服务编程模型还有更多内容。\n\n**JAX-WS 模型**\n\n与大多数 Java EE 6 组件一样，Web 服务依赖于“异常配置”范式，该范式规定配置组件是一种例外情况。实际上，只需要一个注解就能将\
  \ POJO 转换为 Web 服务：@WebService。编写 Web 服务的要求如下：\n\n• 该类必须使用 @javax.jws.WebService\
  \ 或部署描述符中的等效 XML 进行注解。\n\n• 要将 Web 服务转换为 EJB 端点，该类必须使用 @javax.ejb.Stateless 进行注解（如第\
  \ 7 章所示）。\n\n\n\n• 该类必须定义为 public，且不能是 final 或 abstract。\n\n• 该类必须有一个默认的 public\
  \ 构造方法。\n\n• 该类不能定义 finalize() 方法。\n\n• 服务必须是一个无状态对象，并且不应在方法调用之间保存特定于客户端的状态。\n\n\
  WS-Metadata 规范（JSR 181）指出，只要满足这些要求，就可以使用 POJO 来实现部署到 Servlet 容器的 Web 服务。这通常被称为 *Servlet\
  \ 端点*。无状态会话 Bean 也可用于实现将部署在 EJB 容器中的 Web 服务（也称为 EJB 端点）。\n\n第 14 章 ■ SOAP Web 服务\n\
  \n**411**\n\nWeb 服务端点\n\nJAX-WS 2.2 允许将常规 Java 类和无状态 EJB 公开为 Web 服务。\n\n参考 POJO（清单\
  \ 14-1）和 EJB Web 服务（清单 14-18）的代码，几乎看不出任何差异，除了 EJB Web 服务多了一个 @Stateless 注解，尽管打包方式不同。POJO\
  \ Web 服务打包在 Web 模块中（在 war 文件中），称为 Servlet 端点；而 EJB Web 服务打包在 jar 文件中，称为 EJB 端点。一个部署在\
  \ Servlet 容器中，另一个部署在 EJB 容器中。\n\n两种端点的行为几乎相同，但使用 EJB 端点可以获得一些额外的好处。由于 Web 服务也是一个\
  \ EJB，因此由容器管理的事务和安全性的好处是自动的，并且可以使用拦截器，而 Servlet 端点则无法做到这一点。业务代码可以同时作为 Web 服务和 EJB\
  \ 公开，这意味着业务逻辑可以通过 SOAP 公开，也可以通过添加远程接口通过 RMI 公开。\n\n注解\n\n在服务层面，系统以 XML 消息、WSDL 操作和\
  \ SOAP 消息来定义。同时，在 Java 层面，应用程序以对象、接口和方法来定义。需要将 Java 对象转换为 WSDL 操作。JAXB 运行时使用注解来确定如何将类编组/解编组为/从\
  \ XML。这些注解通常对 Web 服务开发者是隐藏的。类似地，JWS 使用注解来确定如何将方法调用编组为 SOAP 请求消息，并将 SOAP 响应解编组为方法返回类型的实例。\n\
  \nWS-Metadata 规范（JSR 181）定义了两种不同类型的注解：\n\n• *WSDL 映射注解*：这些注解属于 javax.jws 包，允许你更改\
  \ WSDL/Java 映射。@WebMethod、@WebResult、@WebParam 和 @OneWay 注解用于 Web 服务，以自定义所公开方法的签名。\n\
  \n• *SOAP 绑定注解*：这些注解属于 javax.jws.soap 包，允许自定义 SOAP 绑定（@SOAPBinding 和 @SOAPMessageHandler）。\n\
  \n与所有其他 Java EE 6 规范一样，Web 服务注解可以被可选的 XML 部署描述符（webservices.xml）覆盖。让我们仔细看看 WSDL\
  \ 映射注解。\n\n**@WebService**\n\n@javax.jws.WebService 注解将 Java 类或接口标记为 Web 服务。\n\n\
  如果直接在类上使用（如到目前为止的所有示例所示），容器的注解处理器将生成接口，因此以下代码片段是等效的。以下是在类上的注解：\n\n**@WebService**\n\
  \npublic class CardValidator {\n\n**412**\n\n第 14 章 ■ SOAP Web 服务\n\n以下是在类实现的接口上的注解：\n\
  \n**@WebService**\n\npublic interface **CCValidator** {\n\npublic class CardValidator\
  \ implements **CCValidator** {\n\n@WebService 注解有一组属性（参见清单 14-15），允许你自定义 WSDL 文件中\
  \ Web 服务的名称（<wsdl:portType> 或\n\n\n\n`<wsdl:service>` 元素及其命名空间，以及更改 WSDL 本身的位置（`wsdlLocation`\
  \ 属性）。\n\n**清单 14-15.** *@WebService API*\n\n@Retention(RUNTIME) @Target(TYPE)\n\
  \npublic @interface **WebService** {\n\nString name() default \"\";\n\nString targetNamespace()\
  \ default \"\";\n\nString serviceName() default \"\";\n\nString portName() default\
