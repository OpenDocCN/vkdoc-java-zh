  **头部**\n\n正如你之前在使用 HTTP 时所见，信息不仅在实体主体中传输，也在头部（Date、Server、Content-Type 等）中传输。HTTP\
  \ 头部参与了统一接口，RESTful Web 服务按其原始含义使用它们。作为资源开发者，你可能需要访问 HTTP 头部；这正是 javax.ws.rs.core.HttpHeaders\
  \ 类的用途。可以使用 @Context 注解将 HttpHeaders 的实例注入到属性或方法参数中，因为 HttpHeaders 类是一个映射，并带有辅助方法，可以以不区分大小写的方式访问头部值。\n\
  \n如果服务提供本地化资源，可以按如下方式提取 Accept-Language 头部：\n\n@GET\n\n@Produces{\"text/plain\"\
  }\n\npublic String get(**@Context HttpHeaders** headers) {\n\nList<java.util.Locale>\
  \ locales = **headers**.getAcceptableLanguages()\n\n// 或 **headers**.getRequestHeader(\"\
  accept-language\")\n\n...\n\n}\n\n**构建 URI**\n\n超链接是 REST 应用程序的核心方面。为了在应用程序状态间演进，RESTful\
  \ Web 服务需要灵活地管理状态转换和 URI 构建。JAX-RS 提供了 javax.ws.rs.core.UriBuilder，旨在替代 java.net.URI，以便更安全、更轻松地构建\
  \ URI。UriBuilder 有一组方法，可用于构建新的 URI 或从现有 URI 构建。清单 15-11 中的代码返回一个 URI 数组。\n\n**452**\n\
  \n第 15 章 ■ RESTful Web 服务\n\n**清单 15-11.** *一个返回 URI 数组的方法*\n\n@Path(\"/customers/\"\
  )\n\npublic class CustomersResource {\n\n@Context **UriInfo** uriInfo;\n\n@GET\n\
  \n@Produces(\"application/json\")\n\npublic JSONArray getCustomersAsJsonArray()\
  \ {\n\nJSONArray uriArray = new JSONArray();\n\nfor (UserEntity userEntity : getUsers())\
  \ {\n\n**UriBuilder** ub = **uriInfo**.getAbsolutePathBuilder();\n\nURI userUri\
  \ = **ub**.path(userEntity.getUserid()).build();\n\nuriArray.put(userUri.toASCIIString());\n\
  \n}\n\nreturn uriArray;\n\n}\n\n}\n\n\n\nUriBuilder 也可用于轻松转换 URI 模板。例如，URI\n\n[`www.myserver.com/products/books?author=Goncalves\
  \ 可通过以下方式获得：`](http://www.myserver.com/products/books?author=Goncalves)\n\n**UriBuilder**[.fromUri(\"\
  http://www.myserver.com/\")](http://www.myserver.com/)\n\n.path(\"{a}/{b}\").queryParam(\"\
  author\", \"{value}\")\n\n.build(\"products\", \"books\", \"Goncalves\");\n\n**异常处理**\n\
  \n到目前为止，代码都在一个一切顺利、无需异常管理的理想世界中运行。不幸的是，现实并非如此完美，迟早你会遇到资源崩溃的情况，原因可能是接收到的数据无效，也可能是网络部分不可靠。\n\
  \n在资源提供者中，你随时可以抛出 `WebApplicationException` 或其子类（参见清单 15-12）。该异常将被 JAX-RS 实现捕获，并转换为\
  \ HTTP 响应。默认错误是带有空白消息的 500 错误，但 `javax.ws.rs.WebApplicationException` 类提供了多种构造方法，因此你可以选择特定的状态码（定义在枚举\
  \ `javax.ws.rs.core.Response.Status` 中）或一个实体。\n\n**清单 15-12.** *抛出异常的方法*\n\n@Path(\"\
  customers/{id}\")\n\npublic Customer getCustomer(@PathParam(\"id\") int id) {\n\n\
  if(id < 1)\n\nthrow new **WebApplicationException**(\n\n第 15 章 ■ reStFUL WeB SerVICeS\n\
  \n**453**\n\n**Response.status**(400).entity(\"Id must be a positive integer!\"\
  ));\n\nItem i = em.find(Item.class, id);\n\nif (i == null)\n\nthrow new **WebApplicationException**(Response.\
  \ **Status.NOT_FOUND**);\n\nreturn i;\n\n}\n\n为了保持代码 DRY（即 Don’t Repeat Yourself，不要重复自己），你可以提供异常映射提供者。异常映射提供者将异常映射到\
  \ `Response`。如果抛出此异常，JAX-RS 实现将捕获它并调用相应的异常映射提供者。异常映射提供者是 `ExceptionMapper<E extends\
  \ java.lang.Throwable>` 的实现，并使用 `@Provider` 注解（参见清单 15-13）。\n\n**清单 15-13.** *异常映射*\n\
  \n@Provider\n\npublic class EntityNotFoundMapper implements\n\n**ExceptionMapper**<javax.persistence.EntityNotFoundException>\
  \ {\n\npublic Response toResponse(javax.persistence.EntityNotFoundException ex){\n\
  \nreturn Response.status(404). entity(ex.getMessage()).➥\n\ntype(\"text/plain\"\
  ).build();\n\n}\n\n}\n\n不属于上述两种情况的非受检异常和错误，将像其他任何普通的 Java 非受检异常一样被重新抛出。\n\n**生命周期**\n\
  \n当请求到来时，目标资源被解析，并创建一个匹配的根资源类的新实例。因此，根资源类的生命周期是每次请求一个实例。因此，资源类无需担心并发问题，可以安全地使用实例变量。\n\
  \n如果部署在 Java EE 容器（Servlet 或 EJB）中，JAX-RS 资源类和提供者还可以使用 JSR 250 生命周期管理和安全注解：`@PostConstruct`、`@PreDestroy`、`@RunAs`、`@RolesAllowed`、`@PermitAll`、`@DenyAll`\
  \ 和 `@DeclareRoles`。\n\n资源的生命周期可以使用 `@PostConstruct` 和 `@PreDestroy` 在资源创建后或销毁前添加业务逻辑。图\
  \ 15-3 显示了与 Java EE 中所有无状态组件等效的生命周期。\n\n![Image 133](img/index-484_1.jpg)\n\n**454**\n\
  \n第 15 章 ■ reStFUL WeB SerVICeS\n\n**图 15-3.** *资源生命周期*\n\n**整合所有内容**\n\n让我们将这些概念整合起来，编写一个图书资源，将其打包并部署到\
  \ GlassFish 中，然后使用 cURL 进行测试。思路是创建一个映射到数据库的 `Book` 实体，以及一个提供图书 RESTful 表示的 `BookResource`。`BookResource`\
  \ 也是一个无状态会话 Bean，允许使用实体管理器进行 CRUD 操作的事务划分。部署完成后，你将能够使用 cURL 通过 HTTP 方法创建、检索或删除图书，并获得\
  \ XML 和 JSON 两种表示形式。\n\n\n\n该示例遵循 Maven 目录结构，并将所有类打包成一个 war 文件（chapter15-resource-1.0.war）。这些类必须放置在以下目录中：\n\
  \n• src/main/java：存放 Book 实体和 BookResource RESTful Web 服务的目录\n\n• src/main/resources：资源使用的\
  \ persistence.xml 文件，用于将 Book 实体映射到 Derby 数据库\n\n• src/webapp/WEB-INF：用于声明 Jersey\
  \ Servlet 的 web.xml 文件\n\n• pom.xml：描述项目及其依赖关系的 Maven 项目对象模型（POM）\n\n**编写 Book 实体**\n\
  \n到目前为止，你已经理解了 Book 实体的代码，但有一个非常重要的元素需要注意：该实体还使用了 JAXB 的 @XmlRootElement 注解（见清单\
  \ 15-14），这使得它能够拥有书籍的 XML 表示形式。\n\n**清单 15-14.** *带有 JAXB 注解的 Book 实体*\n\n@Entity\n\
  \n**@XmlRootElement**\n\n@NamedQuery(name = \"findAllBooks\", query = \"SELECT b\
  \ FROM Book b\")\n\npublic class **Book** {\n\n第 15 章 ■ RESTful Web 服务\n\n**455**\n\
  \n@Id @GeneratedValue\n\nprivate Long id;\n\n@Column(nullable = false)\n\nprivate\
  \ String title;\n\nprivate Float price;\n\n@Column(length = 2000)\n\nprivate String\
  \ description;\n\nprivate String isbn;\n\nprivate Integer nbOfPage;\n\nprivate Boolean\
  \ illustrations;\n\n// 构造方法、getter、setter\n\n}\n\n该实体还必须与 persistence.xml 文件（为简洁起见，此处未显示）一起打包。\n\
  \n**编写 BookResource**\n\nBookResource 是一个 RESTful Web 服务，实现为无状态会话 Bean，使用实体管理器来创建、删除和检索书籍。\n\
  \n头部\n\nBookResource 的头部很重要，因为它使用了多个元数据注解。在 JAX-RS 中，用户可以通过发布 URI 来访问资源。@Path(\"\
  books\") 注解指明了资源的路径（用于访问它的 URL）——在本例中，类似于 [`localhost:8080/books`](http://localhost:8080/books)。\n\
  \n@Produces 和 @Consumes 注解定义了该资源产生或使用的默认内容类型：XML 和 JSON。你可以在每个方法的基础上覆盖此内容类型。最后，我们看到了你在第\
  \ 7 章中见过的 @Stateless 注解，它告知容器该资源也应被视为 EJB，并允许在访问数据库时进行事务划分。该资源被注入了一个实体管理器的引用和一个\
  \ UriInfo。\n\n**@Path(\"books\")**\n\n**@Produces**({\"application/xml\", \"application/json\"\
  })\n\n**@Consumes**({\"application/xml\", \"application/json\"})\n\n**@Stateless**\n\
  \npublic class BookResource {\n\n@PersistenceContext(unitName = \"chapter15PU\"\
  )\n\nprivate EntityManager em;\n\n@Context\n\nprivate **UriInfo** uriInfo;\n\n创建新\
  \ Book\n\n遵循 REST 语义，我们使用 HTTP POST 方法以 XML 或 JSON 格式创建新资源，正如头部中通过 @Consumes 注解所指定的那样。默认情况下，每个方法都使用\
  \ XML 或 JSON，createNewBook() 方法也是如此。如清单 15-3 所示，该方法接受一个 JAXBElement 作为参数；请记住，Book\
  \ 实体也是一个 JAXB 对象，一旦 XML 被编组为 Book 对象（bookJaxb.getValue()），就会使用实体管理器来持久化该 book。\n\
  \n该方法返回一个 Response，即新创建 book 的 URI。我们可以返回状态码 200 OK，表示 book 创建成功，但遵循 REST 原则，该方法应返回\
  \ 201（或 204），表示请求已完成并导致创建了新资源。新创建的资源可以通过响应中返回的 URI 进行引用。\n\n**@POST**\n\npublic\
  \ **Response** createNewBook(**JAXBElement**<Book> bookJaxb) {\n\nBook book = bookJaxb.getValue();\n\
  \nem.persist(book);\n\nURI bookUri = uriInfo.getAbsolutePathBuilder().➥\n\npath(book.getId().toString()).build();\n\
  \nreturn Response.created(bookUri).build();\n\n}\n\n\n\n要使用上述代码创建资源，我们可以选择发送 XML\
  \ 或 JSON。JSON 更为简洁。cURL 命令行使用 POST 方法，并以 JSON 格式传递数据，该格式必须遵循 Jersey 中使用的 JSON/XML\
  \ 映射规则（请记住，XML\n\n又是根据 JAXB 规则从 Book 对象映射而来的）：\n\ncurl -X **POST** --data-binary\
  \ ➥\n\n\"{ \\\"title\\\":\\\"H2G2\\\", \\\"description\\\":\\\"Scifi IT book\\\"\
  , ➥\n\n\\\"illustrations\\\":\\\"false\\\",\\\"isbn\\\":\\\"134-234\\\",\\\"nbOfPage\\\
  \":\\\"241\\\",➥\n\n\\\"price\\\":\\\"24.0\\\" }\" -H \"Content-Type: **application/json**\"\
  \ ➥\n\n[`localhost:8080/chapter15-resource-1.0/rs/books –v`](http://localhost:8080/chapter15-resource-1.0/rs/books)\n\
  \ncURL 的详细模式（-v 参数）会显示 HTTP 请求和响应\n\n（如下输出所示）。你可以在响应中看到已创建书籍资源的 URI，其 ID 设置为 601：\n\
  \n> **POST** /chapter15-resource-1.0/rs/books HTTP/1.1\n\n> User-Agent: curl/7.19.0\
  \ (i586-pc-mingw32msvc) libcurl/7.19.0 zlib/1.2.3\n\n> Host: localhost:8080\n\n\
  > Accept: */*\n\n> Content-Type: **application/json**\n\n> Content-Length: 127\n\
  \n>\n\n< HTTP/1.1 **201 Created**\n\n< X-Powered-By: Servlet/3.0\n\n< Server: GlassFish/v3\n\
  \n[< Location: http://localhost:8080/chapter15-resource-1.0/rs/books/**601**](http://localhost:8080/chapter15-resource-1.0/rs/books/601)\n\
  \n< Content-Type: application/xml\n\n< Content-Length: 0\n\n第 15 章 ■ RESTful Web\
  \ 服务\n\n**457**\n\n按 ID 获取书籍\n\n要通过标识符检索书籍资源，请求必须采用 /books/{书籍的 id} 形式的 URL。该 id\
  \ 用作在数据库中查找书籍的参数。在向 /books/601 发送的 HTTP GET 请求中，getBookById() 方法将返回 ID 为 601 的书籍的\
  \ XML 或 JSON 表示形式。\n\n**@GET**\n\n@Path(\" **{id}**/\")\n\npublic Book getBookById(@PathParam(\"\
  \ **id**\") Long id) {\n\nBook book = em.find(Book.class, id);\n\nreturn book;\n\
  \n}\n\n@Path 注解指示了在类级别已指定路径内的子路径。使用 {id} 语法将 URL 元素绑定到方法参数。让我们使用 cURL 访问资源 601 并获取\
  \ JSON 表示形式：\n\ncurl -X **GET** -H \"Accept: **application/json**\" ➥\n\n[`localhost:8080/chapter15-resource-1.0/rs/**books/601**`](http://localhost:8080/chapter15-resource-1.0/rs/books/601)\n\
  \n{\"description\":\"Scifi IT book\",\"illustrations\":\"false\",➥\n\n\"isbn\":\"\
  1234-234\",\"nbOfPage\":\"241\",\"price\":\"24.0\",\"title\":\"H2G2\"}\n\n只需更改 Accept\
  \ 标头属性，相同的代码将返回书籍 601 的 XML 表示形式：\n\ncurl -X **GET** -H \"Accept: **application/xml**\"\
  \ ➥\n\n[`localhost:8080/chapter15-resource-1.0/rs/**books/601**`](http://localhost:8080/chapter15-resource-1.0/rs/books/601)\n\
  \n<?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"yes\"?>\n\n<book><description>Scifi\
  \ IT book</description>\n\n<illustrations>false</illustrations><isbn>1234-234</isbn>\n\
  \n<nbOfPage>241</nbOfPage><price>24.0</price><title>H2G2</title></book> 删除书籍\n\n\
  deleteBook() 方法遵循 getBookById() 方法的格式，因为它使用子路径和 ID 作为参数，唯一的区别在于所使用的 HTTP 请求。我们需要一个\
  \ HTTP DELETE 方法，它接受一个 URL 并删除与该 URL 关联的内容。\n\n**@DELETE**\n\n@Path(\" **{id}**/\"\
  )\n\npublic void deleteBook(@PathParam(\" **id**\") Long id) {\n\nBook book = em.find(Book.class,\
  \ id);\n\nem.remove(book);\n\n}\n\n**458**\n\n第 15 章 ■ RESTful Web 服务\n\n如果我们使用\
  \ cURL 的详细模式（-v 参数），我们将看到 DELETE 请求被发送，并且响应中出现 204 No Content 状态码，以指示该资源不再存在。\n\n\
  curl -X **DELETE** [`localhost:8080/chapter15-resource-1.0/rs/books/61 -v`](http://localhost:8080/chapter15-resource-1.0/rs/books/61)\n\
  \n> DELETE /chapter15-resource-1.0/rs/books/61 HTTP/1.1\n\n> User-Agent: curl/7.19.0\
  \ (i586-pc-mingw32msvc) libcurl/7.19.0 zlib/1.2.3\n\n> Host: localhost:8080\n\n\
  > Accept: */*\n\n>\n\n< HTTP/1.1 **204 No Content**\n\n< X-Powered-By: Servlet/3.0\n\
  \n< Server: GlassFish/v3\n\n**使用 web.xml 进行配置**\n\n\n\n在部署 BookResource 和 Book 实体之前，我们需要在\
  \ web.xml 文件中注册 Jersey（参见清单 15-15）。这样，发送到 /rs 路径的请求就会被 Jersey 拦截。\n\n同时，它还通过 `com.sun.jersey.config.property.packages`\
  \ 参数告诉 Jersey 在哪里查找带有 JAX-RS 注解的 Java 类。\n\n**清单 15-15.** *声明 Jersey 的 web.xml 文件*\n\
  \n<?xml version='1.0' encoding='UTF-8'?>\n\n<web-app version=\"2.5\"\n\n[xsi:schemaLocation=\"\
  http://java.sun.com/xml/ns/javaee](http://java.sun.com/xml/ns/javaee)\n\n[`java.sun.com/xml/ns/javaee/web-app_2_5.xsd\"\
  >`](http://java.sun.com/xml/ns/javaee)\n\n<servlet>\n\n<servlet-name>Jersey Web\
  \ Application</servlet-name>\n\n<servlet-class>\n\ncom.sun.jersey.spi.container.servlet.ServletContainer\n\
  \n</servlet-class>\n\n<init-param>\n\n<param-name>com.sun.jersey.config.property.packages</param-name>\n\
  \n<param-value>com.apress.javaee6.chapter15</param-value>\n\n</init-param>\n\n<load-on-startup>1</load-on-startup>\n\
  \n</servlet>\n\n<servlet-mapping>\n\n<servlet-name>Jersey Web Application</servlet-name>\n\
  \n<url-pattern> **/rs/***</url-pattern>\n\n</servlet-mapping>\n\n</web-app>\n\n\
  第 15 章 ■ RESTful Web 服务\n\n**459**\n\n部署描述符将请求映射到 /rs/* URL 模式。这意味着每当 URL 以 /rs/\
  \ 开头时，它都将由 Jersey 处理。事实上，在我使用 cURL 的示例中，所有资源 URL 都以 /rs 开头：\n\ncurl -X GET -H \"\
  Accept: application/json\" ➥\n\n[`localhost:8080/chapter15-resource-1.0/**rs**/books`](http://localhost:8080/chapter15-resource-1.0/rs/books)\n\
  \n[curl -X DELETE http://localhost:8080/chapter15-resource-1.0/**rs**/books/61](http://localhost:8080/chapter15-resource-1.0/rs/books/61)\n\
  \n**使用 Maven 编译和打包**\n\nWeb 应用程序需要被编译并打包成一个 war 文件（<packaging>war</packaging>）。清单\
  \ 15-16 中的 pom.xml 声明了编译代码所需的所有依赖项（jsr311-api、javax.ejb 和 javax.persistence）。请记住，JAXB\
  \ 是 Java SE 的一部分，因此我们不需要添加此依赖项。\n\n**清单 15-16.** *用于编译和打包 Web 应用程序的 Maven pom.xml\
  \ 文件*\n\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\n[<project](http://maven.apache.org/POM/4.0.0)\
