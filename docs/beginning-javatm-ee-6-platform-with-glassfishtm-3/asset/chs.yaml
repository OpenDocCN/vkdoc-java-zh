  mvn test\n```\n\n由于日志级别已设置为 `FINE`，你应该会看到关于 Derby 在内存中创建数据库和表的详细信息。然后执行 `BookTest`\
  \ 类，Maven 报告应通知你测试成功。\n\n```\nTests run: 1, Failures: 0, Errors: 0, Skipped: 0,\
  \ Time elapsed: 9.415 sec\n\nResults :\n\nTests run: 1, Failures: 0, Errors: 0,\
  \ Skipped: 0\n\n[INFO] ----------------------------------------------------------------\n\
  [INFO] BUILD SUCCESSFUL\n[INFO] ----------------------------------------------------------------\n\
  [INFO] Total time: 19 seconds\n[INFO] Finished\n[INFO] Final Memory: 4M/14M\n[INFO]\
  \ ----------------------------------------------------------------\n```\n\n**总结**\n\
  \n本章快速概述了 JPA 2.0。与大多数其他 Java EE 6 规范一样，JPA 专注于简单的对象架构，将其前身——重量级组件模型（即 EJB CMP 2.*x*）抛在身后。本章还涵盖了实体，这些实体是使用注解或\
  \ XML 的映射元数据的持久化对象。\n\n通过“综合应用”部分，你已经了解了如何使用 EclipseLink 和 Derby 运行 JPA 应用程序。单元测试是项目中的一个重要主题，借助\
  \ JPA 和诸如 Derby 之类的内存数据库，现在测试持久化变得非常容易。\n\n在接下来的章节中，你将学习更多关于 JPA 主要组件的知识。第 3 章将向你展示如何将实体、关系和继承映射到数据库。第\
  \ 4 章将重点介绍实体管理器 API、JPQL 语法以及如何使用查询和锁定机制。第 5 章，即 JPA 部分的最后一章，将解释实体的生命周期以及如何在实体和监听器的回调方法中挂接业务逻辑。\n\
  \n第 3 章\n对象关系映射\n\n在本章中，我将介绍对象关系映射（ORM）的基础知识，这基本上是将实体映射到表，将属性映射到列。然后，我将专注于更复杂的映射，例如关系、组合和继承。一个领域模型由相互交互的对象组成。对象和数据库有不同的方式来存储关系信息（通过指针或外键）。继承不是关系数据库天然具备的特性，因此映射并不那么直观。我将详细说明并展示一些示例，这些示例将演示属性、关系和继承如何从领域模型映射到数据库。\n\
  \n前面的章节已经展示了自 Java EE 5 以来注解如何在企业版中被广泛使用（主要在 EJB、JPA 和 Web 服务上）。JPA 2.0 遵循这一路径，并引入了新的映射注解及其\
  \ XML 等价物。我将主要使用注解来解释不同的映射概念，但我也会介绍 XML 映射。\n\n**如何映射实体**\n\n\n\n作为第一个示例，让我们从最简单的映射开始。在\
  \ JPA 持久化模型中，实体是一个普通的 Java 对象（POJO）。这意味着实体的声明、实例化和使用方式与任何其他 Java 类完全相同。实体拥有可通过 getter\
  \ 和 setter 操作的属性（即其状态）。每个属性都存储在数据库表的列中。清单 3-1 展示了一个简单的实体。\n\n**清单 3-1.** *Book 实体的简单示例*\n\
  \n**@Entity**\n\npublic class Book {\n\n**@Id**\n\nprivate Long id;\n\nprivate String\
  \ title;\n\nprivate Float price;\n\nprivate String description;\n\nprivate String\
  \ isbn;\n\nprivate Integer nbOfPage;\n\nprivate Boolean illustrations;\n\n**59**\n\
  \n**60**\n\n第 3 章 ■ 对象关系映射\n\npublic Book() {\n\n}\n\n// Getters, setters\n\n}\n\
  \n这段来自 CD-BookStore 应用程序的代码示例代表了一个 Book 实体，为了清晰起见，我省略了其中的 getter 和 setter。如你所见，除了一些注解之外，这个实体看起来与任何\
  \ Java 类完全一样：它拥有多个不同类型的属性（Long、String、Float、Integer 和 Boolean），一个默认构造函数，以及每个属性对应的\
  \ getter 和 setter。那么，它是如何映射到数据库表的呢？答案就在于注解。\n\n首先，该类使用了 @javax.persistence.Entity\
  \ 注解，这使得持久化提供程序能够将其识别为持久化类，而不仅仅是一个简单的 POJO。然后，@javax.persistence.Id 注解定义了该对象的唯一标识符。由于\
  \ JPA 的核心是将对象映射到关系表，因此对象需要一个 ID，该 ID 将被映射到主键。其他属性（title、price、description 等）没有注解，因此它们将通过应用默认映射而成为持久化属性。\n\
  \n这段代码示例只有属性，但正如你将在第 5 章中看到的，实体也可以拥有业务方法。请注意，这个 Book 实体是一个 Java 类，它没有实现任何接口，也没有继承任何类。实际上，要成为一个实体，一个类必须遵循以下规则：\n\
  \n*   实体类必须使用 @javax.persistence.Entity 注解（或在 XML 描述符中声明为实体）。\n*   必须使用 @javax.persistence.Id\
  \ 注解来表示简单的主键。\n*   实体类必须有一个无参构造函数，该构造函数必须是 public 或 protected 的。实体类也可以有其他构造函数。\n\
  *   实体类必须是顶层类。枚举或接口不能被指定为实体。\n*   实体类不能是 final 的。实体类的方法或持久化实例变量都不能是 final 的。\n*\
  \   如果实体实例需要作为分离对象按值传递（例如，通过远程接口），则实体类必须实现 Serializable 接口。\n\n由于 Book 实体（如前文清单\
  \ 3-1 所示）遵循这些简单规则，持久化提供程序可以在 Book 实体的属性与 BOOK 表的列之间同步数据。因此，如果应用程序修改了 isbn 属性，ISBN\
  \ 列也会同步更新（前提是实体处于托管状态、事务上下文已设置等）。\n\n如图 3-1 所示，Book 实体存储在 BOOK 表中，每一列都以类的属性命名（例如，String\
  \ 类型的 isbn 属性映射到名为 ISBN 的 VARCHAR 类型列）。这些默认映射规则是被称为*例外配置*原则的重要组成部分。\n\n![Image 28](img/index-91_1.jpg)\n\
  \n第 3 章 ■ 对象关系映射\n\n**61**\n\n**图 3-1.** *实体与表之间的数据同步*\n\n**例外配置**\n\nJava EE 5\
  \ 引入了例外配置的概念（有时也称为*例外编程*）。这意味着，除非另有指定，否则容器或提供程序应应用默认规则。换句话说，必须提供配置是规则的例外情况。这允许你编写最少的代码来运行应用程序，同时依赖容器和提供程序的默认设置。\n\
  \n让我们回到之前的代码示例（参见清单 3-1）。没有任何注解的情况下，Book 实体将被视为一个普通的 POJO，而不会被持久化。这就是规则：如果没有给出特殊配置，则应应用默认值，而\
  \ JVM 的默认值是 Book 类只是一个普通类。但是，由于你需要更改此默认行为，因此你使用 @Entity 注解该类。对于标识符也是如此。你需要一种方法来告诉持久化提供程序\
  \ id 属性必须映射到主键，因此你使用 @Id 注解它。这种决策类型是例外配置方法的特征，在这种方法中，对于更常见的情况不需要注解，仅在需要覆盖时才使用注解。这意味着对于所有其他属性，将应用以下默认映射规则：\n\
  \n*   实体名称映射到关系表名称（例如，Book 实体映射到 BOOK 表）。如果你想将其映射到另一个表，则需要使用 @Table 注解，稍后你将在“基本映射”部分中看到。\n\
  *   属性名称映射到列名称（例如，id 属性或 getId() 方法映射到 ID 列）。如果你想更改此默认映射，则需要使用 @Column 注解。\n\n**62**\n\
  \n第 3 章 ■ 对象关系映射\n\n*   JDBC 规则适用于将 Java 基本类型映射到关系数据类型。String 将映射到 VARCHAR，Long\
  \ 映射到 BIGINT，Boolean 映射到 SMALLINT，依此类推。从 String 映射的列的默认大小为 255（String 映射到 VARCHAR(255)）。\n\
  \n但请记住，默认映射规则因数据库而异。例如，在 Derby 中 String 映射到 VARCHAR，在 Oracle 中映射到 VARCHAR2。Integer\
  \ 在 Derby 中映射到 INTEGER，在 Oracle 中映射到 NUMBER。底层数据库的信息在 persistence.xml 文件中提供，你稍后将在第\
  \ 4 章的“持久化上下文”部分中看到。\n\n遵循这些规则，Book 实体将映射到一个 Derby 表，该表的结构如清单 3-2 所述。\n\n**清单 3-2.**\
  \ *BOOK 表的结构*\n\nCREATE TABLE **BOOK** (\n\nID BIGINT NOT NULL,\n\nTITLE VARCHAR(255),\n\
  \nPRICE DOUBLE(52, 0),\n\nDESCRIPTION VARCHAR(255),\n\nISBN VARCHAR(255),\n\nNBOFPAGE\
  \ INTEGER,\n\nILLUSTRATIONS SMALLINT,\n\nPRIMARY KEY (ID)\n\n);\n\n这是一个非常简单的映射示例。关系和继承也有默认映射，你稍后将在“关系映射”部分中看到。\n\
  \n包括 EclipseLink 在内的大多数持久化提供程序都允许你根据实体自动生成数据库。在开发模式下，此功能非常方便。通过使用所有默认设置，你只需使用 @Entity\
  \ 和 @Id 注解即可轻松映射数据。然而，大多数情况下，你需要连接到遗留数据库或遵循严格的数据库命名约定。为此，JPA 提供了丰富的注解集（或等效的 XML），允许你自定义映射的每个部分（表、列名、主键、列大小、是否允许为空等）。\n\
  \n**基本映射**\n\n\n\nJava 和关系型数据库在处理数据的方式上存在显著差异。在 Java 中，我们使用类来描述用于保存数据的属性以及访问和操作这些数据的方法。一旦定义了类，我们就可以使用\
  \ `new` 关键字创建任意数量的实例。而在关系型数据库中，只存储数据，不存储行为（触发器和存储过程除外），并且其存储结构（使用行和列）与使用对象的存储结构完全不同。有时，将\
  \ Java 对象映射到底层数据库可能很容易，并且可以应用默认规则。但在其他时候，这些规则无法满足你的需求，你必须自定义映射。基本的映射注解专注于自定义表、主键和列，它们允许你修改某些命名约定或类型（非空列、长度等）。\n\
  \n第 3 章 ■ 对象关系映射\n\n**63**\n\n**表**\n\n基于异常配置的映射规则规定，实体和表名相同（Book 实体映射到 BOOK 表，AncientBook\
  \ 实体映射到 ANCIENTBOOK 表，依此类推）。这在大多数情况下可能适合你，但你可能希望将数据映射到不同的表，甚至将单个实体映射到多个表。\n\n@Table\n\
  \n@javax.persistence.Table 注解可以更改与表相关的默认值。例如，你可以指定存储数据的表名、目录和数据库模式。如果省略此注解，表名将是实体的名称。如果你想将名称更改为\
  \ T_BOOK 而不是 BOOK，可以按照清单 3-3 所示进行操作。\n\n**清单 3-3.** *映射到 T_BOOK 表的 Book 实体*\n\n\
  @Entity\n\n**@Table(name = \"t_book\")**\n\npublic class Book {\n\n@Id\n\nprivate\
  \ Long id;\n\nprivate String title;\n\nprivate Float price;\n\nprivate String description;\n\
  \nprivate String isbn;\n\nprivate Integer nbOfPage;\n\nprivate Boolean illustrations;\n\
  \npublic Book() {\n\n}\n\n// Getters, setters\n\n}\n\n■**注意** 在 @Table 注解中，我使用了小写的表名\
  \ (t_book)。默认情况下，大多数数据库会将实体映射为大写的表名（Derby 就是这种情况），除非你配置它们区分大小写。\n\n@SecondaryTable\n\
  \n到目前为止，我假设一个实体映射到一个表，也称为*主表*。但有时当你拥有一个现有的数据模型时，你需要将数据分布到多个表，即*辅表*。为此，你需要使用 @SecondaryTable\
  \ 注解将辅表关联到一个实体，或者使用 @SecondaryTables（带“s”）关联多个辅表。你可以通过使用注解定义辅表，然后为每个属性指定它所在的表（使用\
  \ @Column 注解，我将在“属性”部分更详细地描述），从而将实体的数据分布到主表和辅表的列中。清单 3-4 显示了一个 Address 实体，其属性映射到一个主表和两个辅表中。\n\
  \n**清单 3-4.** *映射到三个不同表中的 Address 实体属性*\n\n@Entity\n\n**@SecondaryTables({**\n\n\
  **@SecondaryTable(name = \"city\"),**\n\n**@SecondaryTable(name = \"country\")**\n\
  \n**})**\n\npublic class Address {\n\n@Id\n\nprivate Long id;\n\nprivate String\
  \ street1;\n\nprivate String street2;\n\n**@Column(table = \"city\")**\n\nprivate\
  \ String city;\n\n**@Column(table = \"city\")**\n\nprivate String state;\n\n**@Column(table\
  \ = \"city\")**\n\nprivate String zipcode;\n\n**@Column(table = \"country\")**\n\
  \nprivate String country;\n\n// Constructors, getters, setters\n\n}\n\n默认情况下，Address\
  \ 实体的属性映射到主表（其默认名称是实体的名称，因此该表称为 ADDRESS）。@SecondaryTables 注解告诉你存在两个辅表：CITY 和 COUNTRY。然后，你需要指定哪个属性存储在哪个辅表中（使用\
  \ @Column(table=\"city\") 或 @Column(table=\"country\") 注解）。结果如图 3-2 所示，创建了三个包含不同属性但具有相同主键（用于连接这些表）的表。再次提醒，请记住\
  \ Derby 会将小写的表名 (city) 转换为大写 (CITY)。\n\n![Image 29](img/index-95_1.jpg)\n\n第 3 章\
  \ ■ 对象关系映射\n\n**65**\n\n**图 3-2.** *Address 实体被映射到三个表。*\n\n现在你可能已经明白，同一个实体中可以有多个注解。如果你想重命名主表，可以像清单\
  \ 3-5 所示那样添加 @Table 注解。\n\n**清单 3-5.** *主表被重命名为 T_ADDRESS*\n\n@Entity\n\n**@Table(name\
  \ = \"t_address\")**\n\n**@SecondaryTables({**\n\n**@SecondaryTable(name = \"t_city\"\
  ),**\n\n**@SecondaryTable(name = \"t_country\")**\n\n**})**\n\npublic class Address\
  \ {\n\n// Attributes, constructor, getters, setters\n\n}\n\n■**注意** 当你使用辅表时，必须考虑性能问题。每次访问一个实体时，持久化提供者都会访问多个表并需要将它们连接起来。另一方面，当你拥有昂贵的属性（例如二进制大对象\
  \ (BLOB)）并希望将其隔离在不同的表中时，辅表可能是一个好方法。\n\n**主键**\n\n在关系型数据库中，主键唯一标识表中的每一行。它由单个列或一组列组成。主键必须是唯一的，因为它们标识单行（不允许空值）。主键的示例包括客户标识符、电话号码、订单参考号和\
  \ ISBN。JPA 要求实体具有映射到主键的标识符，该标识符将遵循相同的规则：通过单个属性或一组属性（复合键）唯一标识一个实体。一旦分配，此实体的主键值就不能更新。\n\
  \n**66**\n\n第 3 章 ■ 对象关系映射\n\n@Id 和 @GeneratedValue\n\n一个简单（即非复合）的主键必须对应实体类的一个单一属性。你之前见过的\
  \ @Id 注解用于表示一个简单的主键。\n\n@javax.persistence.Id 将一个属性注解为唯一标识符。它可以是以下类型之一：\n\n*   *Java\
  \ 原始类型*：byte, int, short, long, char\n*   *Java 原始类型的包装类*：Byte, Integer, Short,\
  \ Long, Character\n*   *原始类型或包装类型的数组*：int[], Integer[] 等。\n*   *字符串、数字和日期*：java.lang.String,\
  \ java.math.BigInteger, java.util.Date, java.sql.Date\n\n创建实体时，此标识符的值可以由应用程序手动生成，也可以由持久化提供者使用\
  \ @GeneratedValue 注解自动生成。此注解可以有四种可能的值：\n\n*   SEQUENCE 和 IDENTITY 分别指定使用数据库的 SQL\
  \ 序列或标识列。\n*   TABLE 指示持久化提供者将序列名称及其当前值存储在一个表中，每次持久化实体的新实例时都会增加该值。例如，Derby 会创建一个\
  \ SEQUENCE 表，其中包含两列：序列名称（任意名称）和序列值（由 Derby 自动递增的整数）。\n*   键的生成由底层数据库自动完成 (AUTO)，它将为特定数据库选择合适的策略。AUTO\
  \ 是 @GeneratedValue 注解的默认值。\n\n如果未定义 @GeneratedValue 注解，则应用程序必须通过应用任何能返回唯一值的算法来创建自己的标识符。清单\
  \ 3-6 中的代码展示了如何拥有一个自动生成的标识符。GenerationType.AUTO 是\n\n\n默认情况下，我可以省略 strategy 元素。请注意，属性\
  \ id 使用了 `@Id` 和 `@GeneratedValue` 两个注解进行标注。\n\n**清单 3-6.** *具有自动生成标识符的 Book 实体*\n\
  \n@Entity\n\npublic class Book {\n\n**@Id**\n\n**@GeneratedValue(strategy = GenerationType.AUTO)**\n\
  \nprivate Long id;\n\nprivate String title;\n\nprivate Float price;\n\nprivate String\
  \ description;\n\nprivate String isbn;\n\nprivate Integer nbOfPage;\n\nprivate Boolean\
  \ illustrations;\n\n第 3 章 ■ 对象关系映射\n\n**67**\n\n// 构造方法、getter、setter\n\n}\n\n复合主键\n\
  \n在映射实体时，最佳实践是使用一个专用的单列作为主键。然而，在某些情况下需要使用复合主键（例如，必须映射到遗留数据库，或者主键必须遵循特定的业务规则，比如需要包含日期和值，或者国家代码和时间戳）。为此，必须定义一个主键类来表示复合键。然后，根据我们想要如何构建实体，有两种可用的注解来定义这个类：`@EmbeddedId`\
  \ 和 `@IdClass`。正如你将看到的，最终结果是相同的，并且最终会得到相同的数据库模式，但查询实体的方式略有不同。\n\n例如，CD-BookStore\
  \ 应用程序需要频繁地在主页上发布新闻，你可以在主页上看到关于书籍、音乐或艺术家的每日新闻。新闻包含内容、标题，并且由于它可以用多种语言编写，因此还包含一个语言代码（EN\
  \ 代表英语，PT 代表葡萄牙语，等等）。新闻的主键可以是标题和语言代码，因为一篇文章可以翻译成多种语言，但保留其原始标题。因此，主键类 `NewsId` 由两个\
  \ `String` 类型的属性组成：`title` 和 `language`。主键类必须包含 `equals()` 和 `hashCode()` 方法的定义，以便管理查询和内部集合，并且其属性必须属于前面列出的有效类型集合。它们还必须是\
  \ `public` 的，如果需要跨越架构层（例如，在持久层管理并在表示层使用），则必须实现 `Serializable`，并且必须有一个无参构造方法。\n\n\
  **@EmbeddedId**\n\n正如你将在本章后面看到的，JPA 使用了不同类型的嵌入对象。总结来说，嵌入对象没有自己的标识（没有自己的主键），其属性最终会成为包含它的实体的表中的列。\n\
  \n清单 3-7 展示了 `NewsId` 类作为一个可嵌入类。它只是一个嵌入对象（使用 `@Embeddable` 注解），恰好由两个属性（`title` 和\
  \ `language`）组成。这个类必须有无参构造方法、getter、setter、`equals()` 和 `hashCode()` 的实现。该类本身没有自己的标识（没有\
  \ `@Id` 注解）。这是可嵌入对象的一个特性。\n\n**清单 3-7.** *主键类使用 @Embeddable 注解*\n\n**@Embeddable**\n\
  \npublic class NewsId {\n\nprivate String title;\n\nprivate String language;\n\n\
  // 构造方法、getter、setter、**equals** 和 **hashcode**\n\n}\n\n**68**\n\n第 3 章 ■ 对象关系映射\n\
  \n然后，清单 3-8 中所示的 `News` 实体必须使用 `@EmbeddedId` 注解嵌入主键类 `NewsId`。每个 `@EmbeddedId` 都必须引用一个标记了\
  \ `@Embeddable` 的可嵌入类。\n\n**清单 3-8.** *实体使用 @EmbeddedId 嵌入主键类*\n\n@Entity\n\npublic\
  \ class News {\n\n**@EmbeddedId**\n\nprivate **NewsId** id;\n\nprivate String content;\n\
  \n// 构造方法、getter、setter\n\n}\n\n在下一章中，我将描述如何使用实体的主键来查找实体。作为初步了解，其工作原理如下：主键是一个带有构造方法的类。你需要使用构成唯一键的值来实例化这个类，并将此对象传递给实体管理器（`em`\
  \ 属性），如清单 3-9 所示。\n\n\n\n**列表 3-9.** *通过复合主键查找实体的简化代码* **NewsId pk** = new NewsId(\"\
  理查德·赖特去世\", \"EN\")\n\nNews news = em.find(News.class, **pk**);\n\n**@IdClass**\n\
  \n声明复合主键的另一种方法是通过 @IdClass 注解。这是一种不同的方式，要求主键类上的每个属性也必须在实体类上声明，并使用 @Id 进行注解。\n\n\
  列表 3-10 中示例 NewsId 的复合主键只是一个 POJO，不需要任何注解。\n\n**列表 3-10.** *主键类未加注解*\n\npublic class\
  \ NewsId {\n\nprivate String title;\n\nprivate String language;\n\n// 构造方法、getter、setter、**equals**\
  \ 和 **hashcode**\n\n}\n\n然后，列表 3-11 中所示的实体 News 必须使用 @IdClass 注解来定义主键，并使用 @Id 注解每个键。要持久化\
  \ News 实体，你需要为 title 和 language 属性设置值。\n\n第 3 章 ■ 对象关系映射\n\n**69**\n\n**列表 3-11.**\
  \ *实体使用 @IdClass 注解定义其主键类*\n\n@Entity\n\n**@IdClass(NewsId.class)**\n\npublic class\
  \ News {\n\n**@Id** private String title;\n\n**@Id** private String language;\n\n\
  private String content;\n\n// 构造方法、getter、setter、**equals** 和 **hashcode**\n\n}\n\
  \n@EmbeddedId 和 @IdClass 这两种方法都会映射到相同的表结构。该结构在列表 3-12 中使用数据定义语言（DDL）定义。实体和主键的属性最终会位于同一张表中，主键将由复合类的属性（title\
  \ 和 language）构成。\n\n**列表 3-12.** *具有复合主键的 NEWS 表的 DDL*\n\ncreate table NEWS (\n\n\
  CONTENT VARCHAR(255),\n\nTITLE VARCHAR(255) not null,\n\nLANGUAGE VARCHAR(255) not\
  \ null,\n\n**primary key (TITLE, LANGUAGE)**\n\n);\n\n@IdClass 方法更容易出错，因为你需要在 @IdClass\
  \ 和实体中都定义每个主键属性，并注意使用相同的名称和 Java 类型。\n\n其优点是你不需要更改主键类的代码。例如，你可以使用一个遗留类，由于法律原因不允许修改该类，但可以重用。\n\
  \n一个明显的区别在于你在 JPQL 中引用实体的方式。对于 @IdClass，你会这样做：\n\nselect n.title from News n\n\n\
  而对于 @EmbeddedId，你会这样做：\n\nselect n.newsId.title from News n\n\n**属性**\n\n实体必须有一个主键（简单或复合）才能在关系数据库中具有标识。它还具有构成其状态的各种不同属性，这些属性必须映射到表中。此状态包括几乎所有你可能想要映射的\
  \ Java 类型：\n\n• Java 原始类型（int、double、float 等）及其包装类（Integer、Double、Float 等）\n\n•\
  \ 字节和字符数组（byte[]、Byte[]、char[]、Character[]）\n\n**70**\n\n第 3 章 ■ 对象关系映射\n\n• String、大数值和时间类型（java.lang.String、java.math.BigInteger、\n\
  \njava.math.BigDecimal、java.util.Date、java.util.Calendar、java.sql.Date、java.sql.\n\
  \nTime、java.sql.Timestamp）\n\n• 枚举类型和实现 Serializable 接口的用户定义类型\n\n• 基本类型和可嵌入类型的集合\n\
  \n当然，实体也可以拥有实体属性、实体集合或可嵌入类。这需要引入实体之间的关系（将在“关系映射”部分介绍）。\n\n如你所见，通过异常配置，属性使用默认映射规则进行映射。然而，有时你需要自定义此映射的某些部分。这就是\
  \ JPA 注解（或其 XML 等价物）发挥作用的地方。\n\n@Basic\n\n@javax.persistence.Basic 注解（见列表 3-13）是映射到数据库列的最简单类型，因为它覆盖了基本的持久化选项。\n\
  \n**列表 3-13.** *@Basic 注解元素*\n\n\n\n@Target({METHOD, FIELD}) @Retention(RUNTIME)\n\
  \npublic @interface **Basic** {\n\nFetchType **fetch**() default EAGER;\n\nboolean\
  \ **optional**() default true;\n\n}\n\n该注解有两个参数：optional 和 fetch。optional 元素用于提示属性的值是否可以为\
  \ null。对于原始类型，该设置将被忽略。\n\nfetch 元素可以取两个值：LAZY 或 EAGER。它向持久化提供程序运行时提示数据应被延迟加载（仅在应用程序请求该属性时）还是立即加载（在提供程序初始加载实体时）。\n\
  \n例如，以清单 3-14 中所示的 Track 实体为例。一张 CD 专辑由多个音轨组成，每个音轨都有标题、描述以及一个可收听、具有一定时长的 WAV 文件。WAV\
  \ 文件是一个可能长达数兆字节的 BLOB。当访问 Track 实体时，你并不希望立即加载 WAV 文件；你可以使用 `@Basic(fetch = FetchType.LAZY)`\
  \ 对该属性进行注解，这样数据将从数据库中被延迟检索（例如，仅当你通过其 getter 方法访问 wav 属性时）。\n\n**清单 3-14.** *对 wav\
  \ 属性进行延迟加载的 Track 实体*\n\n@Entity\n\npublic class Track {\n\n@Id\n\n@GeneratedValue(strategy\
  \ = GenerationType.AUTO)\n\nprivate Long id;\n\nprivate String title;\n\nprivate\
  \ Float duration;\n\n第 3 章 ■ 对象关系映射\n\n**71**\n\n**@Basic(fetch = FetchType.LAZY)**\n\
  \n@Lob\n\nprivate byte[] wav;\n\n**@Basic(optional = true)**\n\nprivate String description;\n\
  \n// 构造方法、getter 方法、setter 方法\n\n}\n\n请注意，类型为 byte[] 的 wav 属性也使用了 @Lob 注解，以便将值存储为大对象（LOB）。能够存储这类大对象的数据库列需要特殊的\
  \ JDBC 调用才能从 Java 中访问。为了告知提供程序，必须在基本映射中添加一个额外的 @Lob 注解。\n\n@Column\n\n@javax.persistence.Column\
  \ 注解（如清单 3-15 所示）定义了列的属性。你可以更改列名（默认情况下映射为同名的属性）；指定大小；并授权（或不授权）该列允许 null 值、唯一性，或允许其值可更新或可插入。清单\
  \ 3-15 展示了 @Column 注解的 API，包括其元素及其默认值。\n\n**清单 3-15.** *@Column 注解元素*\n\n@Target({METHOD,\
  \ FIELD}) @Retention(RUNTIME)\n\npublic @interface **Column** {\n\nString name()\
  \ default \"\";\n\nboolean unique() default false;\n\nboolean nullable() default\
  \ true;\n\nboolean insertable() default true;\n\nboolean updatable() default true;\n\
  \nString columnDefinition() default \"\";\n\nString table() default \"\";\n\nint\
  \ length() default 255;\n\nint precision() default 0; // 十进制精度\n\nint scale() default\
  \ 0; // 十进制小数位数\n\n}\n\n要重新定义原始 Book 实体的默认映射，你可以以多种方式使用 @Column 注解（参见清单 3-16）。例如，你可以更改\
  \ title 和 nbOfPage 列的名称，或更改 description 的长度，并且不允许 null 值。\n\n**清单 3-16.** *自定义 Book\
  \ 实体的映射*\n\n@Entity\n\npublic class Book {\n\n@Id\n\n@GeneratedValue(strategy =\
  \ GenerationType.AUTO)\n\n**72**\n\n第 3 章 ■ 对象关系映射\n\nprivate Long id;\n\n**@Column(name\
  \ = \"book_title\", nullable = false, updatable = false)**\n\nprivate String title;\n\
  \nprivate Float price;\n\n**@Column(length = 2000)**\n\nprivate String description;\n\
  \nprivate String isbn;\n\n**@Column(name = \"nb_of_page\", nullable = false)**\n\
  \nprivate Integer nbOfPage;\n\nprivate Boolean illustrations;\n\n// 构造方法、getter\
  \ 方法、setter 方法\n\n}\n\n清单 3-16 中的 Book 实体将被映射到清单 3-17 中定义的表。\n\n**清单 3-17.** *BOOK\
  \ 表定义*\n\ncreate table BOOK (\n\nID BIGINT not null,\n\n**BOOK_TITLE** VARCHAR(255)\
  \ **not null**,\n\nPRICE DOUBLE(52, 0),\n\nDESCRIPTION VARCHAR(**2000**),\n\nISBN\
  \ VARCHAR(255),\n\n**NB_OF_PAGE** INTEGER **not null**,\n\nILLUSTRATIONS SMALLINT,\n\
  \nprimary key (ID)\n\n);\n\n@Column 注解的大多数元素都会影响映射。如果你将 description 属性的长度更改为 2000，则目标列的长度也将设置为\
  \ 2000。updatable 和 insertable 设置默认为 true，这意味着任何属性都可以在数据库中被插入或更新。当你希望持久化提供程序确保不会因实体中的更改而向表中插入或更新数据时，可以将它们设置为\
  \ false。请注意，这并不意味着实体属性在内存中不会更改。你仍然可以在内存中更改该值，但它不会与数据库同步。这是因为生成的 SQL 语句（INSERT 或\
  \ UPDATE）将不会包含这些列。\n\n@temporal\n\n在 Java 中，你可以使用 java.util.Date 和 java.util.Calendar\
  \ 来存储数据，然后可以有多种表示形式，例如日期、小时或毫秒。为了在 ORM 中指定这一点，你可以使用 @javax.persistence.Temporal\
  \ 注解。该注解有三个可能的值：DATE、TIME 或 TIMESTAMP。清单 3-18 定义了一个 Customer 实体，该实体有一个出生日期和一个存储其在系统中创建的确切时间的技术属性（这使用了\
  \ TIMESTAMP 值）。\n\n第 3 章 ■ 对象关系映射\n\n**73**\n\n**清单 3-18.** *具有两个 @Temporal 属性的\
  \ Customer 实体*\n\n@Entity\n\npublic class Customer {\n\n@Id\n\n@GeneratedValue\n\
  \nprivate Long id;\n\nprivate String firstName;\n\nprivate String lastName;\n\n\
  private String email;\n\nprivate String phoneNumber;\n\n**@Temporal(TemporalType.DATE)**\n\
  \nprivate Date dateOfBirth;\n\n**@Temporal(TemporalType.TIMESTAMP)**\n\nprivate\
  \ Date creationDate;\n\n// 构造方法、getter 方法、setter 方法\n\n}\n\n清单 3-18 中的 Customer\
  \ 实体将被映射到清单 3-19 中定义的表。dateOfBirth 属性映射到类型为 DATE 的列，creationDate 属性映射到类型为 TIMESTAMP\
  \ 的列。\n\n**清单 3-19.** *CUSTOMER 表定义*\n\ncreate table CUSTOMER (\n\nID BIGINT not\
  \ null,\n\nFIRSTNAME VARCHAR(255),\n\nLASTNAME VARCHAR(255),\n\nEMAIL VARCHAR(255),\n\
  \nPHONENUMBER VARCHAR(255),\n\nDATEOFBIRTH **DATE**,\n\nCREATIONDATE **TIMESTAMP**,\n\
  \nprimary key (ID)\n\n);\n\n@transient\n\n使用 JPA 时，一旦一个类被 @Entity 注解，其所有属性都会自动映射到一个表。如果你不需要映射某个属性，可以使用\
  \ @javax.persistence.Transient 注解。例如，让我们采用相同的 Customer 实体并添加一个 age 属性（参见清单 3-20）。由于年龄可以根据出生日期自动计算，因此\
  \ age 属性不需要映射，因此可以是瞬态的。\n\n**74**\n\n第 3 章 ■ 对象关系映射\n\n**清单 3-20.** *具有瞬态年龄属性的 Customer\
  \ 实体*\n\n@Entity\n\npublic class Customer {\n\n@Id\n\n@GeneratedValue\n\nprivate\
  \ Long id;\n\nprivate String firstName;\n\nprivate String lastName;\n\nprivate String\
  \ email;\n\nprivate String phoneNumber;\n\n@Temporal(TemporalType.DATE)\n\nprivate\
  \ Date dateOfBirth;\n\n**@Transient**\n\nprivate Integer age;\n\n@Temporal(TemporalType.TIMESTAMP)\n\
  \nprivate Date creationDate;\n\n// 构造方法、getter 方法、setter 方法\n\n}\n\n因此，age 属性不需要映射到任何\
  \ AGE 列。\n\n@enumerated\n\nJava SE 5 引入了枚举类型，现在它们使用得非常频繁，以至于已成为开发者日常工作中的常见部分。枚举的值是常量，并且具有隐式的序数分配，该分配由它们声明的顺序决定。此序数不能在运行时修改，但可用于将枚举类型的值存储在数据库中。清单\
  \ 3-21 显示了一个信用卡类型枚举。\n\n**清单 3-21.** *信用卡类型枚举*\n\npublic **enum** CreditCardType\
  \ {\n\nVISA,\n\nMASTER_CARD,\n\nAMERICAN_EXPRESS\n\n}\n\n\n\n在编译时，此枚举类型各值分配的序数分别为：VISA\
  \ 为 0，MASTER_CARD 为 1，AMERICAN_EXPRESS 为 2。默认情况下，持久化提供程序会假定数据库列类型为 Integer，从而将此枚举类型映射到数据库。查看清单\
  \ 3-22 中的代码，你会看到一个 `CreditCard` 实体，它使用了上述枚举类型并采用了默认映射。\n\n第 3 章 ■ 对象关系映射\n\n**75**\n\
  \n**清单 3-22.** *使用序数映射枚举类型*\n\n```java\n@Entity\n@Table(name = \"credit_card\")\n\
  public class CreditCard {\n    @Id\n    private String number;\n    private String\
  \ expiryDate;\n    private Integer controlNumber;\n    **private CreditCardType\
  \ creditCardType;**\n    // 构造方法、getter、setter\n}\n```\n\n由于应用了默认设置，该枚举将被映射到一个整数列，并且可以正常工作。但想象一下，如果在枚举的顶部引入一个新的常量。\n\
  \n由于序数的分配由值的声明顺序决定，数据库中已存储的值将不再与枚举匹配。更好的解决方案是将值的名称存储为字符串，而不是存储序数。你可以通过向属性添加 `@Enumerated`\
  \ 注解并指定值为 `STRING` 来实现这一点（`ORDINAL` 是默认值），如清单 3-23 所示。\n\n**清单 3-23.** *使用字符串映射枚举类型*\n\
  \n```java\n@Entity\n@Table(name = \"credit_card\")\npublic class CreditCard {\n\
  \    @Id\n    private String number;\n    private String expiryDate;\n    private\
  \ Integer controlNumber;\n    **@Enumerated(EnumType.STRING)**\n    private CreditCardType\
  \ creditCardType;\n    // 构造方法、getter、setter\n}\n```\n\n现在，`CreditCardType` 数据库列的类型将是\
  \ `VARCHAR`，并且 Visa 卡将以字符串 `\"VISA\"` 的形式存储。\n\n**访问类型**\n\n到目前为止，我向你展示了带注解的类（`@Entity`\
  \ 或 `@Table`）和属性（`@Basic`、`@Column`、`@Temporal` 等），但应用于属性（或字段访问）的注解也可以设置在相应的 getter\
  \ 方法（或属性访问）上。例如，`@Id` 注解可以设置在 `id` 属性上，也可以设置在 `getId()` 方法上。由于这很大程度上是个人偏好问题，我倾向于使用属性访问（在\
  \ getter 上添加注解），因为我觉得这样代码更易读。\n\n**76**\n\n第 3 章 ■ 对象关系映射\n\n这让我能够快速读取实体的属性，而不会被注解淹没。在本书中，为了便于阅读，我决定在属性上添加注解。但在某些情况下，例如涉及继承时，这不仅仅是个人品味问题，因为它可能会影响你的映射。\n\
  \n■**注意** Java 将字段定义为实例属性。属性是任何具有遵循 Java Bean 模式（以 `getXXX`、`setXXX` 开头，或对于布尔类型以\
  \ `isXXX` 开头）的访问器（getter 和 setter）方法的字段。\n\n在选择字段访问（getter）或属性访问（属性）时，你实际上是在指定*访问类型*。默认情况下，单个访问类型适用于一个实体：要么是字段访问，要么是属性访问，但不能两者兼用。规范指出，在未明确指定访问类型的情况下，混合在字段和属性上放置注解的应用程序行为是未定义的。\n\
  \n当使用基于字段的访问时（参见清单 3-24），持久化提供程序会映射这些属性。所有未使用 `@Transient` 注解的非瞬态实例变量都是持久的。\n\n\
  **清单 3-24.** *带有注解字段的 Customer 实体*\n\n```java\n@Entity\npublic class Customer {\n\
  \    **@Id @GeneratedValue**\n    private Long id;\n    **@Column(name = \"first_name\"\
  , nullable = false, length = 50)**\n    private String firstName;\n    **@Column(name\
  \ = \"last_name\", nullable = false, length = 50)**\n    private String lastName;\n\
  \    private String email;\n    **@Column(name = \"phone_number\", length = 15)**\n\
  \    private String phoneNumber;\n    // 构造方法、getter、setter\n}\n```\n\n当使用基于属性的访问时，如清单\
  \ 3-25 所示，持久化提供程序通过 getter 方法访问持久状态，并且映射基于 getter 而非属性。所有未使用 `@Transient` 注解的 getter\
  \ 都是持久的。\n\n**清单 3-25.** *带有注解属性的 Customer 实体*\n\n```java\n@Entity\npublic class\
  \ Customer {\n```\n\n第 3 章 ■ 对象关系映射\n\n**77**\n\n```java\n    private Long id;\n\
  \    private String firstName;\n    private String lastName;\n    private String\
  \ email;\n    private String phoneNumber;\n    // 构造方法\n    **@Id @GeneratedValue**\n\
  \    public Long getId() {\n        return id;\n    }\n    public void setId(Long\
  \ id) {\n        this.id = id;\n    }\n    **@Column(name = \"first_name\", nullable\
  \ = false, length = 50)**\n    public String getFirstName() {\n        return firstName;\n\
  \    }\n    public void setFirstName(String firstName) {\n        this.firstName\
  \ = firstName;\n    }\n    **@Column(name = \"last_name\", nullable = false, length\
  \ = 50)**\n    public String getLastName() {\n        return lastName;\n    }\n\
  \    public void setLastName(String lastName) {\n        this.lastName = lastName;\n\
  \    }\n    public String getEmail() {\n        return email;\n    }\n    public\
  \ void setEmail(String email) {\n        this.email = email;\n    }\n    **@Column(name\
  \ = \"phone_number\", length = 15)**\n    public String getPhoneNumber() {\n   \
  \     return phoneNumber;\n    }\n    public void setPhoneNumber(String phoneNumber)\
  \ {\n        this.phoneNumber = phoneNumber;\n    }\n}\n```\n\n**78**\n\n第 3 章 ■\
  \ 对象关系映射\n\n就映射而言，清单 3-24 和 3-25 中的两个实体是完全相同的，因为属性名称恰好与 getter 名称相同。但是，你可以不使用默认的访问类型，而是通过\
  \ `@javax.persistence.Access` 注解来显式指定类型。\n\n此注解接受两个可能的值：`FIELD` 或 `PROPERTY`，并且可以用于实体本身和/或每个属性或\
  \ getter。例如，当 `@Access(AccessType.FIELD)` 应用于实体时，持久化提供程序将只考虑放置在属性上的映射注解。然后，可以通过\
  \ `@Access(AccessType.PROPERTY)` 有选择地将单个 getter 指定为属性访问。\n\n显式访问类型可能非常有用（例如，对于可嵌入类和继承），但混合使用它们通常会导致错误。清单\
  \ 3-26 展示了一个混合访问类型时可能发生的情况的示例。\n\n**清单 3-26.** *显式混合访问类型的 Customer 实体*\n\n```java\n\
  @Entity\n**@Access(AccessType.FIELD)**\npublic class Customer {\n    @Id @GeneratedValue\n\
  \    private Long id;\n    @Column(name = \"first_name\", nullable = false, length\
  \ = 50)\n    private String firstName;\n    @Column(name = \"last_name\", nullable\
  \ = false, length = 50)\n    private String lastName;\n    private String email;\n\
  \    **@Column(name = \"phone_number\", length = 15)**\n    private String phoneNumber;\n\
  \    // 构造方法、getter、setter\n    **@Access(AccessType.PROPERTY)**\n    **@Column(name\
  \ = \"phone_number\", length = 555)**\n    public String getPhoneNumber() {\n  \
  \      return phoneNumber;\n    }\n    public void setPhoneNumber(String phoneNumber)\
  \ {\n        this.phoneNumber = phoneNumber;\n    }\n}\n```\n\n此示例在实体级别显式地将访问类型定义为\
  \ `FIELD`。这向持久化管理器表明，它只应处理属性上的注解。`phoneNumber` 属性使用 `@Column` 注解，将其长度限制为 15。阅读此代码，你期望数据库中最终得到一个\
  \ `VARCHAR(15)`，但实际情况并非如此。getter 方法显示 `getPhoneNumber()` 方法的访问类型已被显式更改，电话号码的长度也已更改（变为\
  \ 555）。在这种情况下，实体级别的\n\n第 3 章 ■ 对象关系映射\n\n**79**\n\n`AccessType.FIELD` 被 `AccessType.PROPERTY`\
  \ 覆盖。然后，你将在数据库中得到一个 `VARCHAR(555)`。\n\n**基本类型的集合**\n\n\n\n在 Java 中，对象的集合非常常见。在接下来的内容中，你将学习实体之间的关系（可以是实体的集合）。基本上，这意味着一个实体拥有其他实体或可嵌入对象的集合。在映射方面，每个实体都映射到自己的表，并在主键和外键之间创建引用。如你所知，实体是一个具有标识和许多其他属性的\
  \ Java 类。但是，如果你只需要存储诸如字符串或整数等 Java 类型的集合，该怎么办呢？从 JPA 2.0 开始，你可以轻松做到这一点，而无需通过创建单独类的麻烦，只需使用\n\
  \n`@ElementCollection` 和 `@CollectionTable` 注解。\n\n`@ElementCollection` 注解用于指示 `java.util.Collection`\
  \ 类型的属性包含 Java 类型。`@CollectionTable` 注解允许你自定义集合表的详细信息，例如其名称。如果缺少此注解，表名将是包含实体的名称和集合属性的名称的拼接，中间用下划线分隔。\n\
  \n再次以 Book 实体为例，让我们看看如何添加一个属性来存储标签。\n\n如今，标签和标签云无处不在；它们对于数据排序非常有用，所以假设在这个例子中，你想为一本书添加尽可能多的标签来描述它并快速找到它。标签只是一个字符串，因此\
  \ Book 实体可以有一个字符串集合来存储这些信息，如清单 3-27 所示。\n\n**清单 3-27.** *包含字符串集合的 Book 实体*\n\n```java\n\
  @Entity\npublic class Book {\n    @Id\n    @GeneratedValue(strategy = GenerationType.AUTO)\n\
  \    private Long id;\n    private String title;\n    private Float price;\n   \
  \ private String description;\n    private String isbn;\n    private Integer nbOfPage;\n\
  \    private Boolean illustrations;\n\n    @ElementCollection(fetch = FetchType.LAZY)\n\
  \    @CollectionTable(name = \"Tag\")\n    @Column(name = \"Value\")\n    private\
  \ ArrayList<String> tags;\n\n    // 构造方法、getter、setter\n}\n```\n\n`@ElementCollection`\
  \ 注解用于告知持久化提供者，`tags` 属性是一个字符串列表，并且应该被延迟加载。如果缺少 `@CollectionTable`，\n\n![Image 30](img/index-110_1.jpg)\n\
  \n**80**\n\n第 3 章 ■ 对象关系映射\n\n则表名默认为 `BOOK_TAGS`（包含实体的名称和集合属性的名称的拼接，中间用下划线分隔），而不是在\
  \ name 元素（`name = \"Tag\"`）中指定的 `TAG`。请注意，我添加了一个补充的 `@Column` 注解来将列重命名为 `VALUE`。结果如图\
  \ 3-3 所示。\n\n**图 3-3.** *BOOK 表和 TAG 表之间的关系*\n\n■**注意** 在 JPA 1.0 中，这些注解并不存在。但是，你仍然可以将基本类型列表作为\
  \ BLOB 存储在数据库中。为什么？因为 `java.util.ArrayList` 实现了 `Serializable`，而 JPA 可以自动将 `Serializable`\
  \ 对象映射到 BLOB。但是，如果你改用 `java.util.List`，则会抛出异常，因为它没有扩展 `Serializable`。`@ElementCollection`\
  \ 是一种更优雅、更有用的存储基本类型列表的方式。将列表存储在不可访问的二进制格式中会使其对查询不透明。\n\n**基本类型的 Map**\n\n与集合一样，Map\
  \ 对于存储数据非常有用。在 JPA 1.0 中，在 ORM 方面，你能对 Map 做的事情并不多。现在，Map 可以包含基本类型、可嵌入对象和实体的任意组合作为键或值，这为映射带来了极大的灵活性。但让我们专注于基本类型的\
  \ Map。\n\n当 Map 使用基本类型时，`@ElementCollection` 和 `@CollectionTable` 注解的使用方式与你之前看到的集合相同。然后使用集合表来存储\
  \ Map 的数据。\n\n让我们以一张包含曲目的 CD 专辑为例（见清单 3-28）。一个曲目可以看作是一个标题和一个位置（专辑的第一首曲目、第二首曲目等）。然后你可以有一个曲目的\
  \ Map，其中整数表示位置（Map 的键），字符串表示标题（Map 的值）。\n\n**清单 3-28.** *包含曲目 Map 的 CD 专辑*\n\n```java\n\
  @Entity\npublic class CD {\n    @Id\n    @GeneratedValue\n    private Long id;\n\
  \    private String title;\n    private Float price;\n    private String description;\n\
  \n    @Lob\n    private byte[] cover;\n\n    @ElementCollection\n    @CollectionTable(name=\"\
  track\")\n    @MapKeyColumn (name = \"position\")\n    @Column(name = \"title\"\
  )\n    private Map<Integer, String> tracks;\n\n    // 构造方法、getter、setter\n}\n```\n\
  \n如前所述，`@ElementCollection` 注解用于指示存储在集合表中的 Map 对象。`@CollectionTable` 注解将集合表的默认名称更改为\
  \ `TRACK`。\n\n与集合的不同之处在于引入了一个新的注解：`@MapKeyColumn`。此注解用于指定 Map 键列的映射。如果未指定，则列名使用引用关系属性的名称和\
  \ `_KEY` 的拼接。清单 3-28 显示该注解已从默认名称重命名为 `POSITION`，以便更清晰。\n\n`@Column` 注解指示包含 Map 值的列应重命名为\
  \ `TITLE`。结果如图 3-4 所示。\n\n**图 3-4.** *CD 表和 TRACK 表之间的关系*\n\n**使用 XML 进行映射**\n\n\
  既然你已经更熟悉使用注解进行基本映射，那么让我们来看看 XML 映射。如果你使用过像 Hibernate 这样的对象关系框架，你会熟悉如何在单独的 XML 部署描述符文件中映射实体。从本章开始，你还没有看到一行\
  \ XML，只有注解。JPA 也使用 XML 语法来映射实体。我不会深入探讨 XML 映射的细节，因为我决定专注于注解（因为它们在书中更容易使用，并且大多数开发者选择它们而不是\
  \ XML 映射）。请记住，你在本章中看到的每一个注解都有对应的 XML 元素，如果我要全部介绍，这一节会非常庞大。\n\n我鼓励你查看 JPA 2.0 规范的第\
  \ 11 章，其中更详细地介绍了所有 XML 标签。\n\nXML 部署描述符是使用注解的替代方案。然而，尽管每个注解都有对应的 XML 标签，反之亦然，但有一个区别是\
  \ XML 会覆盖注解。如果你用某个值注解了一个属性或实体，同时部署了一个具有不同值的 XML 描述符，那么 XML 将优先。\n\n**82**\n\n第 3\
  \ 章 ■ 对象关系映射\n\n问题是，何时使用注解而非 XML，以及为什么？首先，这取决于个人喜好，因为两者的行为完全相同。当元数据与代码紧密耦合时（例如，主键），使用注解是有意义的，因为元数据只是程序的另一个方面。其他类型的元数据，例如列长度或其他模式细节，可以根据部署环境而改变（例如，开发、测试或生产环境中的数据库模式不同）。这可能更适合在外部\
  \ XML 部署描述符（每个环境一个）中表达，这样代码就不必修改了。\n\n让我们再次回到 Book 实体示例。这次假设你有两个环境，并且你想在开发环境中将 Book\
  \ 实体映射到 `BOOK` 表，在测试环境中映射到 `BOOK_XML_MAPPING` 表。该类将仅使用注解。\n\n\n\n`@Entity`（参见清单\
  \ 3-29）不包含关于其应映射到的表的信息（即，它不会有 `@Table` 注解）。`@Id` 注解将主键定义为自动生成，而 `@Column` 注解将描述字段的大小设置为\
  \ 500 个字符。\n\n**清单 3-29.** *仅包含少量注解的 Book 实体*\n\n**@Entity**\n\npublic class Book\
  \ {\n\n**@Id**\n\n**@GeneratedValue(strategy = GenerationType.AUTO)**\n\nprivate\
  \ Long id;\n\nprivate String title;\n\nprivate Float price;\n\n**@Column(length\
  \ = 500)**\n\nprivate String description;\n\nprivate String isbn;\n\nprivate Integer\
  \ nbOfPage;\n\nprivate Boolean illustrations;\n\n// 构造方法、getter、setter\n\n}\n\n\
  在一个单独的 `book_mapping.xml` 文件（参见清单 3-30）中，遵循指定的 XML 模式，你可以更改实体任何数据的映射。`<table>` 标签允许你更改实体将映射到的表名（`BOOK_XML_MAPPING`\
  \ 替代默认的 `BOOK`）。在 `<attributes>` 标签内，你可以自定义属性，不仅指定它们的名称长度，还可以指定它们与其他实体的关系。例如，你可以更改\
  \ `title` 列和页数字段的映射。\n\n**清单 3-30.** *映射文件 META-INF/book_mapping.xml*\n\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>\n\n[<entity-mappings](http://java.sun.com/xml/ns/persistence/orm)\
  \ ➥\n\nversion=\"2.0\">\n\n第 3 章 ■ 对象关系映射\n\n**83**\n\n<entity class=\" com.apress.javaee6.chapter05.Book\"\
  >\n\n**<table name=\"book_xml_mapping\"/>**\n\n**<attributes>**\n\n<basic name=\"\
  title\">\n\n< **column** name=\"book_title\" nullable=\"false\" updatable=\"false\"\
  />\n\n</basic>\n\n<basic name=\"description\">\n\n< **column** length=\"2000\"/>\n\
  \n</basic>\n\n<basic name=\"nbOfPage\">\n\n< **column** name=\"nb_of_page\" nullable=\"\
  false\"/>\n\n</basic>\n\n</attributes>\n\n</entity>\n\n</entity-mappings>\n\n一个需要始终牢记的重要概念是，XML\
  \ 的优先级高于注解。即使 `description` 属性通过 `@Column(length = 500)` 进行了注解，实际使用的列长度也是 `book_mapping.xml`\
  \ 文件中定义的 2000。这可能会造成混淆，因为你在代码中看到的是 500，但检查 DDL 时看到的却是 2000；请始终记得检查 XML 部署描述符。\n\n\
  合并 XML 元数据和注解元数据的结果是，`Book` 实体将被映射到清单 3-31 中定义的 `BOOK_XML_MAPPING` 表结构。\n\n**清单\
  \ 3-31.** *BOOK_XML_MAPPING 表结构*\n\ncreate table **BOOK_XML_MAPPING** (\n\nID BIGINT\
  \ not null,\n\n**BOOK_TITLE** VARCHAR(255) not null,\n\nDESCRIPTION VARCHAR(**2000**),\n\
  \n**NB_OF_PAGE** INTEGER not null,\n\nPRICE DOUBLE(52, 0),\n\nISBN VARCHAR(255),\n\
  \nILLUSTRATIONS SMALLINT,\n\nprimary key (ID)\n\n);\n\n要使这一切生效，还缺少一条信息。在你的 `persistence.xml`\
  \ 文件中，你需要引用 `book_mapping.xml` 文件，为此你必须使用 `<mapping-file>` 标签。`persistence.xml`\
  \ 定义了实体持久化上下文及其应映射到的数据库。它是持久化提供者引用外部 XML 映射所需的核心信息。将 `Book` 实体与这两个 XML 文件一起部署到 `META-INF`\
  \ 目录中，就完成了（参见清单 3-32）。\n\n**84**\n\n第 3 章 ■ 对象关系映射\n\n**清单 3-32.** *引用外部映射文件的 persistence.xml\
