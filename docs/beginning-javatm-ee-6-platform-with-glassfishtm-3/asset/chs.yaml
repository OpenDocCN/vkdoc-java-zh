  \n购物车场景是使用有状态 Bean 的标准方式，容器会自动负责维护会话状态。唯一需要的注解是 `@javax.ejb.Stateful`，它与 `@Stateless`\
  \ 具有相同的参数，如清单 7-2 所述。\n\n请注意可选的 `@javax.ejb.StatefulTimeout` 和 `@javax.ejb.Remove`\
  \ 注解。`@Remove` 修饰了 `checkout()` 和 `empty()` 方法。调用这些方法中的任意一个都会导致 Bean 实例被永久地从内存中移除。`@StatefulTimeout`\
  \ 指定了一个超时值，即 Bean 在被容器移除之前允许保持空闲（不接收任何客户端调用）的毫秒数。或者，你也可以避免使用这些注解，而依赖容器在客户端会话结束或过期时自动移除实例。然而，确保有状态\
  \ Bean 在适当的时机被移除可能会减少内存消耗。这在高度并发的应用程序中可能至关重要。\n\n**单例 Bean**\n\n单例 Bean 是一种每个应用程序仅实例化一次的会话\
  \ Bean。它遵循著名的四人组（Gang of Four）设计模式，如 Erich Gamma、Richard Helm、Ralph Johnson 和 John\
  \ M. Vlissides 所著的《设计模式：可复用面向对象软件的基础》（Addison-Wesley, 1995）中所述，这可能是使用最广泛的设计模式之一。它确保在整个应用程序中只存在一个类的实例，并提供一个全局访问点。在许多情况下都需要单例对象，即你的应用程序只需要一个对象实例的情况：例如鼠标、窗口管理器、打印机后台处理程序、文件系统等。\n\
  \n另一个常见的用例是缓存系统，整个应用程序共享一个单一的缓存（例如一个 Hashmap）来存储对象。在应用程序管理的环境中，你需要稍微调整代码才能将一个类转变为单例，如清单\
