  \ JAXB 和 JAXW 注解，因为它们会编组 `CreditCard` 对象并连接到远程 Web 服务。你不必担心生成的代码。jar 文件可以编译和打包：\n\
  \n```bash\nmvn package\n```\n\n这将创建 `chapter14-consumer-1.0.jar` 文件，其中包含你编写的 `Main`\
  \ 类以及所有生成的类。这个 jar 是自包含的，现在可以运行以调用 Web 服务。\n\n**运行主类**\n\n请记住，消费者 `Main` 类使用 `@WebServiceRef`\
  \ 注解来注入 Web 服务端点接口的引用。这意味着代码需要在应用程序客户端容器（ACC）中执行。还要记住，`chapter14-consumer-1.0.jar`\
