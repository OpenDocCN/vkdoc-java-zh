  \ = \"14\", dayOfWeek = \"Wed\")\n\n})\n\npublic void generateReport() {\n\n// ...\n\
  \n}\n\n@Schedule(minute = \"*/10\", hour = \"*\", **persistent = false**)\n\npublic\
  \ void refreshCache() {\n\n// ...\n\n}\n\n}\n\n**编程式定时器创建**\n\n要以编程方式创建定时器，EJB 需要访问\
  \ `javax.ejb.TimerService` 接口，可以通过依赖注入、`EJBContext`（`EJBContext.getTimerService()`）或\
  \ JNDI 查找来实现。`TimerService` API 有几个方法允许你创建不同类型的定时器，分为四类：\n\n*   `createTimer`：基于日期、间隔或持续时间创建定时器。这些方法不使用基于日历的表达式。\n\
  *   `createSingleActionTimer`：创建一个单次动作定时器，该定时器在给定时间点或指定持续时间后过期。在成功调用超时回调方法后，容器会移除该定时器。\n\
  *   `createIntervalTimer`：创建一个间隔定时器，其首次过期发生在给定时间点，后续过期发生在指定间隔之后。\n*   `createCalendarTimer`：使用\
  \ `ScheduleExpression` 辅助类，基于日历表达式创建定时器。\n\n`ScheduleExpression` 辅助类允许你以编程方式创建基于日历的表达式。你将找到与表\
  \ 7-2 中定义的属性相关的方法，并且能够编写你在表 7-4 中看到的所有示例。以下是一些示例，供你参考：\n\nnew ScheduleExpression().dayOfMonth(\"\
  Mon\").month(\"Jan\");\n\nnew ScheduleExpression().second(\"10,30,50\").minute(\"\
  */5\").hour(\"10-14\"); new ScheduleExpression().dayOfWeek(\"1,5\").timezone(\"\
  Europe/Lisbon\");\n\n第 7 章 ■ 会话 Bean 与定时器服务\n\n**221**\n\n`TimerService` 的所有方法（`createSingleActionTimer`、`createCalendarTimer`\
  \ 等）都返回一个 `Timer` 对象，该对象包含有关已创建定时器的信息（创建时间、是否持久等）。`Timer` 还允许 EJB 在定时器过期前取消它。当定时器过期时，容器会调用\
  \ Bean 关联的 `@Timeout` 方法，并将 `Timer` 对象传递给它。一个 Bean 最多只能有一个 `@Timeout` 方法。\n\n当 `CustomerEJB`（参见清单\
  \ 7-21）在系统中创建一个新客户时\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\
  \n(`createCustomer()` 方法) 会根据客户的出生日期创建一个日历定时器。因此，每年容器都会触发一个 bean 来创建并向客户发送生日邮件。为此，无状态\
  \ bean 首先需要注入一个定时器服务的引用（使用 `@Resource`）。`createCustomer()` 方法将客户持久化到数据库中，并使用其出生的日和月来创建一个\
  \ `ScheduleExpression`。根据该表达式和客户对象，使用 `TimerConfig` 创建一个日历定时器。`new TimerConfig(customer,\
  \ true)` 配置了一个持久化定时器（由 `true` 参数指示），该定时器会传递客户对象。\n\n**清单 7-21.** *一个以编程方式创建定时器的\
  \ CustomerEJB*\n\n```java\n@Stateless\npublic class CustomerEJB {\n\n    @Resource\n\
  \    TimerService timerService;\n\n    @PersistenceContext(unitName = \"chapter07PU\"\
  )\n    private EntityManager em;\n\n    public void createCustomer(Customer customer)\
  \ {\n        em.persist(customer);\n\n        ScheduleExpression birthDay = new\
  \ ScheduleExpression().\n                dayOfMonth(customer.getBirthDay()).month(customer.getBirthMonth());\n\
  \n        timerService.createCalendarTimer(birthDay, new TimerConfig(customer, true));\n\
  \    }\n\n    @Timeout\n    public void sendBirthdayEmail(Timer timer) {\n     \
  \   Customer customer = (Customer) timer.getInfo();\n        // ...\n    }\n}\n\
  ```\n\n一旦定时器被创建，容器每年都会调用 `@Timeout` 方法（`sendBirthdayEmail()`），该方法会传递 `Timer` 对象。由于定时器已经与客户对象一起被序列化，该方法可以通过调用\
  \ `getInfo()` 方法来访问它。\n\n**222**\n\n第 7 章 ■ 会话 Bean 与定时器服务\n\n**本章小结**\n\n本章重点介绍了会话\
  \ Bean 和定时器服务（您将在第 13 章找到 MDB，在第 14 章找到 SOAP Web 服务，在第 15 章找到 RESTful Web 服务）。会话\
  \ Bean 是容器管理的组件，用于开发业务层。有三种不同类型的会话 Bean：无状态、有状态和单例。无状态 Bean 易于扩展，因为它们不保持状态，存在于池中，并处理可以在单个方法调用中完成的任务。有状态\
  \ Bean 与客户端具有一对一的关联，并且可以通过钝化和激活临时从内存中清除。单例 Bean 在多个客户端之间共享一个唯一实例，可以在启动时初始化，链接在一起，并在其并发访问中进行自定义。\n\
  \n尽管存在这些差异，但会话 Bean 共享一个通用的编程模型。它们可以具有本地、远程或无接口视图，使用注解，或使用部署描述符进行部署。会话 Bean 可以使用依赖注入来获取对多种资源（JDBC\
  \ 数据源、持久化上下文、环境条目等）的引用，以及它们的运行时环境上下文（`SessionContext` 对象）。自 EJB 3.1 起，您可以异步调用方法，使用可移植的\
  \ JNDI 名称查找 EJB，或在 Java SE 环境中使用可嵌入的 EJB 容器。EJB 3.1 还增强了定时器服务，现在它可以与其他调度工具有效竞争。\n\
  \n下一章将解释不同会话 Bean 的生命周期，以及如何与回调注解进行交互。还将讨论拦截器，它提供了一种使用会话 Bean 进行面向切面编程（AOP）的方法。\n\
  \n第 8 章\n\n回调和拦截器\n\n**在**上一章中，您了解到会话 Bean 是容器管理的组件。它们存在于 EJB 容器中，该容器在后台用多种服务（依赖注入、事务管理、安全性等）包装业务代码。其中两项服务是生命周期管理和拦截。\n\
  \n*生命周期*意味着会话 Bean 会经历一组预定义的状态转换。根据 Bean 的类型（无状态、有状态、单例），生命周期将由不同的状态组成。每次容器更改生命周期状态时，它都可以调用使用回调注解进行注解的方法。您可以使用这些注解来初始化会话\
  \ Bean 上的任何资源，或者在它们被销毁之前释放它们。\n\n*拦截器*允许您向 Bean 添加横切关注点。当客户端调用会话 Bean 上的方法时，容器能够在调用\
  \ Bean 的方法之前拦截该调用并处理业务逻辑。\n\n本章向您展示会话 Bean 使用的不同生命周期，以及您可以在特定阶段应用以处理业务逻辑的回调注解。您还将学习如何拦截方法调用并使用您自己的代码包装它们。\n\
  \n**会话 Bean 生命周期**\n\n正如您在上一章中所见，客户端不会使用 `new` 运算符创建会话 Bean 的实例。它通过依赖注入或 JNDI 查找获取对会话\
  \ Bean 的引用。容器负责创建和销毁实例。这意味着客户端和 Bean 都不负责确定何时创建 Bean 实例、何时注入依赖项或何时销毁实例。容器负责管理 Bean\
  \ 的生命周期。\n\n所有会话 Bean 在其生命周期中都有两个明显的阶段：创建和销毁。此外，有状态会话 Bean 会经历我在上一章中提到的钝化和激活阶段。\n\
  \n**无状态和单例**\n\n无状态和单例 Bean 的共同点是它们不与专用客户端维护会话状态。两种 Bean 类型都允许任何客户端访问——无状态 Bean\
  \ 在逐个实例的基础上串行执行此操作，而单例 Bean 提供对单个实例的并发访问。两者共享图 8-1 所示的相同生命周期，描述如下：\n\n**1.** 无状态或单例会话\
  \ Bean 的生命周期在客户端请求对 Bean 的引用（使用依赖注入或 JNDI 查找）时开始。容器创建一个新的会话 Bean 实例。\n\n**2.** 如果新创建的实例通过注解（`@Resource`、`@EJB`、`@PersistenceContext`\
  \ 等）或部署描述符使用依赖注入，则容器会注入所有需要的资源。\n\n**3.** 如果实例有一个使用 `@PostConstruct` 注解的方法，容器会调用它。\n\
  \n**4.** Bean 实例处理客户端调用的调用，并保持在就绪模式以处理未来的调用。无状态 Bean 保持在就绪模式，直到容器释放池中的一些空间。单例 Bean\
  \ 保持在就绪模式，直到容器关闭。\n\n**5.** 容器不再需要该实例。它会调用使用 `@PreDestroy` 注解的方法（如果有），并结束 Bean 实例的生命周期。\n\
  \n**图 8-1.** *无状态和单例 Bean 的生命周期*\n\n无状态和单例 Bean 共享相同的生命周期，但它们在创建和销毁的方式上存在一些差异。\n\
  \n当部署无状态会话 Bean 时，容器会创建多个实例并将它们添加到池中。当客户端调用无状态会话 Bean 上的方法时，容器从池中选择一个实例，将方法调用委托给该实例，然后将其返回到池中。当容器不再需要该实例时（通常当容器想要减少池中的实例数量时），它会销毁它。\n\
  \n■**注意** GlassFish 允许您自定义多个 EJB 池参数。您可以设置池大小（池中 Bean 的初始、最小和最大数量）、池空闲超时到期时要移除的\
  \ Bean 数量，以及池超时的毫秒数。\n\n\n\n对于单例会话 Bean，其创建方式取决于是否被急切实例化（`@Startup`），或者是否依赖于另一个已被急切创建的单例\
  \ Bean（`@DependsOn`）。如果是，则会在部署时创建实例；如果不是，则容器会在客户端调用业务方法时创建实例。由于单例 Bean 在应用程序运行期间持续存在，因此当容器关闭时，其实例会被销毁。\n\
  \n**有状态**\n\n有状态会话 Bean 在编程上与无状态或单例会话 Bean 差别不大：仅元数据不同（使用`@Stateful`而非`@Stateless`或`@Singleton`）。但真正的区别在于，有状态\
  \ Bean 会与其客户端维护会话状态，因此其生命周期略有不同。容器会生成一个实例，并将其仅分配给一个客户端。随后，该客户端的每个请求都会被传递到同一个实例。遵循这一原则，根据你的应用程序，客户端与有状态\
  \ Bean 之间可能会形成一对一的关系（例如，一千个并发用户可能会产生一千个有状态 Bean）。如果某个客户端长时间未调用其 Bean 实例，容器必须在 JVM\
  \ 内存耗尽前清除该实例，将实例状态保存到持久化存储中，并在需要时将其连同状态一起恢复。容器采用了钝化和激活技术。\n\n如第 7 章所述，钝化是指容器将 Bean\
  \ 实例序列化到持久化存储介质（磁盘文件、数据库等）中，而非将其保留在内存中。激活则相反，当客户端再次需要该 Bean 实例时执行。容器从持久化存储中反序列化\
  \ Bean，并将其激活回内存。这意味着 Bean 的属性必须是可序列化的（必须是 Java 基本类型或实现`java.io.Serializable`接口）。有状态\
  \ Bean 的生命周期如图 8-2 所示，描述如下：\n\n****1.** 有状态 Bean 的生命周期始于客户端请求对该 Bean 的引用（通过依赖注入或\
  \ JNDI 查找）。容器创建一个新的会话 Bean 实例并将其存储在内存中。\n\n****2.** 如果新创建的实例通过注解（`@Resource`、`@EJB`、`@PersistenceContext`等）或部署描述符使用依赖注入，容器会注入所有必需的资源。\n\
  \n****3.** 如果实例有一个用`@PostConstruct`注解的方法，容器会调用它。\n\n****4.** Bean 执行请求的调用并保留在内存中，等待后续客户端请求。\n\
  \n****5.** 如果客户端在一段时间内保持空闲，容器会调用带有`@PrePassivate`注解的方法（如果有），并将 Bean 实例钝化到持久化存储中。\n\
  \n****6.** 如果客户端调用了一个已钝化的 Bean，容器会将其激活回内存，并调用带有`@PostActivate`注解的方法（如果有）。\n\n****7.**\
  \ 如果客户端在会话超时时间内未调用已钝化的 Bean 实例，该实例将被容器销毁。\n\n****8.** 作为步骤 7 的替代方案，如果客户端调用了一个带有`@Remove`注解的方法，容器会调用带有`@PreDestroy`注解的方法（如果有），并结束该\
  \ Bean 实例的生命周期。\n\n![Image 73](img/index-256_1.jpg)\n\n**226**\n\n第 8 章 ■ 回调和拦截器\n\
  \n**图 8-2.** *有状态 Bean 生命周期*\n\n在某些情况下，有状态 Bean 包含开放资源，例如网络套接字或数据库连接。由于容器无法为每个 Bean\
  \ 保持这些资源开放，你需要在钝化前后关闭并重新打开资源。这正是生命周期回调方法可以发挥作用的地方。\n\n**回调**\n\n\n\n正如您刚刚所见，每个会话\
  \ Bean 都有其容器管理的生命周期。当 Bean 的状态发生变化时，容器允许您选择性地提供自己的业务代码。从一种状态到另一种状态的变更可以被容器拦截，以调用那些被表\
  \ 8-1 中列出的注解之一所标注的方法。\n\n**表 8-1.** *生命周期回调注解*\n\n**注解**\n\n**描述**\n\n@PostConstruct\n\
  \n标记一个方法，该方法在 Bean 实例被创建且容器完成依赖注入后立即被调用。此注解通常用于执行任何初始化操作。\n\n@PreDestroy\n\n标记一个方法，该方法在容器销毁\
  \ Bean 实例之前立即被调用。使用 @PreDestroy 注解的方法通常用于释放先前已初始化的资源。对于有状态 Bean，这发生在带有 @Remove 注解的方法执行完毕之后。\n\
  \n@PrePassivate\n\n标记一个方法，该方法在容器钝化实例之前被调用。它通常给 Bean 时间准备序列化，并释放无法序列化的资源（例如，关闭与数据库、消息代理、网络套接字等的连接）。\n\
  \n@PostActivate\n\n标记一个方法，该方法在容器重新激活实例后立即被调用。它给 Bean 一个机会来重新初始化在钝化期间被关闭的资源。\n\n\
  第 8 章 ■ 回调和拦截器\n\n**227**\n\n■**注意** @PrePassivate 和 @PostActivate 注解定义在 `javax.ejb`\
  \ 包和 EJB 3.1 规范（JSR 318）中。@PostConstruct 和 @PreDestroy 是通用注解 1.0 规范（JSR 250）的一部分，来自\
  \ `javax.annotation` 包（就像 @Resource 或你将在下一章看到的其他安全注解一样）。\n\n回调方法需要具有以下签名：\n\nvoid\
  \ <METHOD>();\n\n以下规则适用于回调方法：\n\n• 方法不能有任何参数，并且必须返回 void。\n\n• 方法不能抛出受检异常，但可以抛出运行时异常。抛出运行时异常将回滚事务（如果存在的话，如下一章所述）。\n\
  \n• 方法可以具有 public、private、protected 或包级访问权限，但不能是 static 或 final。\n\n• 一个方法可以用多个注解进行标注（稍后清单\
  \ 8-2 中显示的 `init()` 方法使用了 @PostConstruct 和 @PostActivate 注解）。但是，一个 Bean 上只能存在一个给定类型的注解（例如，你不能在同一个会话\
  \ Bean 中有两个 @PostConstruct 注解）。\n\n• 回调方法可以访问 Bean 的环境条目（参见第 7 章的“环境命名上下文”部分）。\n\
  \n这些回调通常用于分配和/或释放 Bean 的资源。例如，清单 8-1 展示了单例 Bean `CacheEJB` 使用 @PostConstruct 注解来初始化其缓存。在创建\
  \ `CacheEJB` 的单个实例后，容器立即调用 `initCache()` 方法。\n\n**清单 8-1.** *使用 @PostConstruct 注解初始化其缓存的单例\
  \ Bean*\n\n@Singleton\n\npublic class CacheEJB {\n\nprivate Map<Long, Object> cache\
  \ = new HashMap<Long, Object>();\n\n**@PostConstruct**\n\nprivate void initCache()\
  \ {\n\n// 初始化缓存\n\n}\n\n**228**\n\n第 8 章 ■ 回调和拦截器\n\npublic Object getFromCache(Long\
  \ id) {\n\nif (cache.containsKey(id))\n\nreturn cache.get(id);\n\nelse\n\nreturn\
  \ null;\n\n}\n\n}\n\n清单 8-2 展示了一个有状态 Bean 的代码片段。容器维护着会话状态，其中可能包含诸如数据库连接之类的重量级资源。由于打开数据库连接代价高昂，因此应在多次调用之间共享，但在\
  \ Bean 空闲（或钝化）时释放。\n\n创建有状态 Bean 实例后，容器将数据源的引用注入到 `ds` 属性中。注入完成后，容器将调用指定的 @PostConstruct\
  \ 方法（`init()`），该方法会创建一个数据库连接。如果容器碰巧钝化了该实例，则会调用 `close()` 方法（@PrePassivate）。这样做的目的是关闭\
  \ JDBC 连接，该连接持有原生资源，在钝化期间不再需要。当客户端调用 Bean 上的业务方法时，容器会激活它并再次调用 `init()` 方法（@PostActivate）。当客户端调用\
  \ `checkout()` 方法（带有 @Remove 注解）时，容器会移除该实例，但首先会再次调用 `close()` 方法（@PreDestroy）。\n\
  \n**清单 8-2.** *一个初始化和释放资源的有状态 Bean*\n\n@Stateful\n\npublic class ShoppingCartEJB\
  \ {\n\n@Resource\n\nprivate DataSource ds;\n\nprivate Connection connection;\n\n\
  private List<Item> cartItems = new ArrayList<Item>();\n\n**@PostConstruct**\n\n\
  **@PostActivate**\n\nprivate void init() {\n\nconnection = ds.getConnection();\n\
  \n}\n\n**@PreDestroy**\n\n**@PrePassivate**\n\nprivate void close() {\n\nconnection.close();\n\
  \n}\n\n![Image 74](img/index-259_1.jpg)\n\n第 8 章 ■ 回调和拦截器\n\n**229**\n\n// ...\n\
  \n@Remove\n\npublic void checkout() {\n\ncartItems.clear();\n\n}\n\n}\n\n为了更好的可读性，我省略了回调方法中的\
  \ SQL 异常处理。\n\n**拦截器**\n\n在讨论拦截器之前，我想简要讨论一下面向切面编程（AOP）。AOP 是一种编程范式，它将横切关注点（跨越应用程序的关注点）与业务代码分离开来。大多数应用程序都有跨组件重复的通用代码。这些可能是技术关注点（记录每个方法的进入和退出、记录方法调用的持续时间、存储方法使用统计信息等）或业务关注点（如果客户购买超过\
  \ 10,000 美元的商品则执行额外检查、当库存水平过低时发送补货订单等）。这些关注点可以通过 AOP 自动应用于整个应用程序或其子集。\n\nEJB 通过提供拦截器来拦截方法调用的能力，支持类似\
  \ AOP 的功能。当调用 EJB 方法时，容器会自动触发拦截器。如图 8-3 所示，拦截器可以链接起来，并在方法执行之前和/或之后被调用。\n\n■**注意**\
  \ 拦截器可以应用于会话 Bean 和消息驱动 Bean。在第 14 章和第 15 章中，你将看到 SOAP 或 RESTful Web 服务也可以实现为 EJB\
  \ 端点（通过添加 @Stateless 注解）。如果是这种情况，这些 Web 服务也可以使用拦截器。\n\n**图 8-3.** *容器拦截调用并调用拦截器*\n\
  \n图 8-3 向你展示了在客户端和 EJB 之间调用的多个拦截器。你可以将 EJB 容器本身视为一个拦截器链。当你开发会话 Bean 时，你只需专注于业务代码。但在幕后，当客户端调用你的\
  \ EJB 上的方法时，容器会拦截该调用并应用不同的服务（生命周期管理、事务、安全性等）。通过拦截器，你可以添加自己的横切机制，并将其透明地应用于业务代码。\n\
  \n**230**\n\n第 8 章 ■ 回调和拦截器\n\n拦截器分为三种类型（我将在下一节中解释）：\n\n• 环绕调用拦截器\n\n• 业务方法拦截器\n\
  \n• 生命周期回调拦截器\n\n■**注意** EJB 3.1 规范（JSR 318）由两个文档组成：核心 EJB 规范和拦截器需求文档。后者定义了拦截器的工作方式和使用方式。拦截器之所以定义在单独的文档中，是因为在未来的修订中，拦截器可能会独立于\
  \ EJB 进行开发。\n\n**环绕调用拦截器**\n\n定义业务方法拦截器有几种方法。最简单的方法是添加一个\n\n\n\n在 Bean 自身中使用 @javax.interceptor.AroundInvoke\
  \ 注解（或 <around-invoke> 部署描述符元素），如清单 8-3 所示。CustomerEJB 使用 @AroundInvoke 注解了 logMethod()\
  \ 方法。logMethod() 用于在进入方法时记录一条消息，并在退出方法时记录另一条消息。一旦此 EJB 被部署，任何客户端对 createCustomer()\
  \ 或 findCustomerById() 方法的调用都将被拦截，并应用 logMethod()。请注意，此拦截器的作用域仅限于此 Bean。环绕调用方法发生在与它们所拦截的方法相同的事务和安全上下文中。\n\
  \n**清单 8-3.** *CustomerEJB 使用一个拦截器*\n\n@Stateless\n\npublic class CustomerEJB {\n\
  \n@PersistenceContext(unitName = \"chapter08PU\")\n\nprivate EntityManager em;\n\
  \nprivate Logger logger = Logger.getLogger(\"com.apress.javaee6\");\n\npublic void\
  \ createCustomer(Customer customer) {\n\nem.persist(customer);\n\n}\n\npublic Customer\
  \ findCustomerById(Long id) {\n\nreturn em.find(Customer.class, id);\n\n}\n\n**@AroundInvoke**\n\
  \nprivate Object logMethod(InvocationContext ic) throws Exception {\n\n第 8 章 ■ 回调和拦截器\n\
  \n**231**\n\nlogger.entering(**ic**.getTarget().toString(), **ic**.getMethod().getName());\n\
  \ntry {\n\nreturn **ic**.proceed();\n\n} finally {\n\nlogger.exiting(**ic**.getTarget().toString(),\
  \ **ic**.getMethod().getName());\n\n}\n\n}\n\n}\n\n尽管使用了 @AroundInvoke 注解，logMethod()\
  \ 必须遵循特定的签名：\n\n@AroundInvoke\n\nObject <METHOD>(InvocationContext ic) throws Exception;\n\
  \n以下规则适用于环绕调用方法：\n\n• 该方法可以具有 public、private、protected 或包级访问权限，但不能是 static 或 final。\n\
  \n• 该方法必须有一个 javax.interceptor.InvocationContext 参数，并且必须返回 Object，即被调用目标方法的结果（如果方法返回\
  \ void，则返回 null）。\n\n• 该方法可以抛出受检异常。\n\nInvocationContext 对象允许拦截器控制调用链的行为。如果多个拦截器被链接在一起，同一个\
  \ InvocationContext 实例会被传递给每个拦截器，拦截器可以添加供其他拦截器处理的上下文数据。InvocationContext API 在表\
  \ 8-2 中描述。\n\n**表 8-2.** *InvocationContext 接口定义*\n\n**方法**\n\n**描述**\n\ngetContextData\n\
  \n允许使用 Map 在同一个 InvocationContext 实例中的拦截器方法之间传递值。\n\ngetMethod\n\n返回为其调用拦截器的 Bean\
  \ 类的方法。\n\ngetParameters\n\n返回将用于调用业务方法的参数。\n\ngetTarget\n\n返回被拦截方法所属的 Bean 实例。\n\
  \ngetTimer\n\n返回与 @Timeout 方法关联的定时器。\n\nproceed\n\n导致调用链中的下一个拦截器方法。它返回被调用的下一个方法的结果。如果方法是\
  \ void 类型，proceed 返回 null。\n\nsetParameters\n\n修改用于目标类方法调用的参数值。参数的类型和数量必须与 Bean\
  \ 的方法签名匹配，否则将抛出 IllegalArgumentException。\n\n![Image 75](img/index-262_1.jpg)\n\n\
  **232**\n\n第 8 章 ■ 回调和拦截器\n\n为了解释清单 8-3 中的代码如何工作，让我们看一下图 8-4 所示的时序图，了解当客户端调用 createCustomer()\
  \ 方法时会发生什么。首先，容器拦截该调用，并且不直接处理 createCustomer()，而是首先调用 logMethod() 方法。logMethod()\
  \ 使用 InvocationContext 接口获取被调用 Bean 的名称（ic.getTarget()）和被调用的方法（ic.getMethod()）来记录一条进入消息（logger.entering()）。然后，调用\
  \ proceed() 方法。调用 InvocationContext.proceed() 极其重要，因为它告诉容器应该继续执行下一个拦截器或调用 Bean 的业务方法。不调用\
  \ proceed() 将停止拦截器链，并避免调用业务方法。最终调用 createCustomer()，一旦它返回，拦截器通过记录一条退出消息（logger.exiting()）来完成其执行。如果客户端调用\
  \ findCustomerById() 方法，也会发生相同的序列。\n\n**图 8-4.** *链接不同类型的拦截器*\n\n**方法拦截器**\n\n清单\
  \ 8-3 定义了一个仅对 CustomerEJB 可用的拦截器。但大多数情况下，您希望将横切关注点隔离到一个单独的类中，并告诉容器拦截对多个会话 Bean 的调用。日志记录是一个典型场景，您希望所有\
  \ EJB 的所有方法都记录进入和退出消息。要指定一个拦截器，您需要开发一个单独的类，并指示容器将其应用于特定的 Bean 或 Bean 的方法。\n\n为了在多个\
  \ Bean 之间共享代码，让我们从清单 8-3 中取出 logMethod()，并将其隔离到一个单独的类中，如清单 8-4 所示。如您所见，LoggingInterceptor\
  \ 是一个简单的 POJO，它有一个使用 @AroundInvoke 注解的方法。\n\n**清单 8-4.** *一个在方法进入和退出时进行日志记录的拦截器类*\n\
  \npublic class LoggingInterceptor {\n\nprivate Logger logger = Logger.getLogger(\"\
  com.apress.javaee6\");\n\n**@AroundInvoke**\n\npublic Object logMethod(InvocationContext\
  \ ic) throws Exception {\n\n第 8 章 ■ 回调和拦截器\n\n**233**\n\nlogger.entering(**ic**.getTarget().toString(),\
  \ **ic**.getMethod().getName());\n\ntry {\n\nreturn **ic**.proceed();\n\n} finally\
  \ {\n\nlogger.exiting(**ic**.getTarget().toString(), **ic**.getMethod().getName());\n\
  \n}\n\n}\n\n}\n\n现在，任何对此拦截器感兴趣的 EJB 都可以透明地包装 LoggingInterceptor。为此，Bean 需要使用 @javax.interceptor.Interceptors\
  \ 注解通知容器。在清单 8-5 中，该注解设置在 createCustomer() 方法上。这意味着对该方法的任何调用都将被容器拦截，并且将调用 LoggingInterceptor\
  \ 类（在方法进入和退出时记录消息）。\n\n**清单 8-5.** *CustomerEJB 在一个方法上使用拦截器*\n\n@Stateless\n\npublic\
  \ class CustomerEJB {\n\n@PersistenceContext(unitName = \"chapter08PU\")\n\nprivate\
  \ EntityManager em;\n\n**@Interceptors(LoggingInterceptor.class)**\n\npublic void\
  \ createCustomer(Customer customer) {\n\nem.persist(customer);\n\n}\n\npublic Customer\
  \ findCustomerById(Long id) {\n\nreturn em.find(Customer.class, id);\n\n}\n\n}\n\
  \n在清单 8-5 中，@Interceptors 仅附加到 createCustomer() 方法。这意味着如果客户端调用 findCustomerById()，容器将不会拦截该调用。如果您希望两个方法的调用都被拦截，可以将\
  \ @Interceptors 注解添加到两个方法上，或者添加到 Bean 本身。当您这样做时，如果任一方法被调用，拦截器都会被触发：\n\n@Stateless\n\
  \n**@Interceptors(LoggingInterceptor.class)**\n\npublic class CustomerEJB {\n\n\
  public void createCustomer(Customer customer) { ... }\n\npublic Customer findCustomerById(Long\
  \ id) { ... }\n\n}\n\n如果您的 Bean 有多个方法，并且您希望将拦截器应用于整个 Bean，但排除特定方法，您可以使用 javax.interceptor.ExcludeClassInterceptors\n\
  \n**234**\n\n第 8 章 ■ 回调和拦截器\n\n注解来排除某个调用被拦截。在以下代码中，对 updateCustomer() 的调用将不会被拦截，但其他所有调用都会被拦截：\n\
  \n@Stateless\n\n**@Interceptors(LoggingInterceptor.class)**\n\npublic class CustomerEJB\
  \ {\n\npublic void createCustomer(Customer customer) { ... }\n\npublic Customer\
  \ findCustomerById(Long id) { ... }\n\npublic void removeCustomer(Customer customer)\
  \ { ... }\n\n**@ExcludeClassInterceptors**\n\npublic Customer updateCustomer(Customer\
  \ customer) { ... }\n\n}\n\n**生命周期拦截器**\n\n\n\n在本章的第一部分，你学习了如何在 EJB 中处理回调事件。通过使用回调注解，你可以告知容器在特定的生命周期阶段（如\
  \ `@PostConstruct`、`@PrePassivate`、`@PostActivate` 和 `@PreDestroy`）调用某个方法。例如，如果你希望在每次创建\
  \ Bean 实例时记录一条日志，只需在 Bean 的某个方法上添加 `@PostConstruct` 注解，并为其添加一些日志记录机制即可。但是，如果你需要捕获多种类型\
  \ Bean 的生命周期事件，又该如何处理呢？生命周期拦截器允许你将某些代码隔离到一个类中，并在生命周期事件被触发时调用它。\n\n生命周期拦截器实际上与你刚刚在清单\
  \ 8-4 中看到的内容非常相似。与 `@AroundInvoke` 不同，方法可以使用回调注解进行标注。清单 8-6 展示了 `ProfileInterceptor`\
  \ 类，它包含两个方法：`logMethod()`（用于构造后处理）和 `profile()`（用于销毁前处理）。\n\n**清单 8-6.** *定义了两个方法的生命周期拦截器*\n\
  \n```java\npublic class ProfileInterceptor {\n\n    private Logger logger = Logger.getLogger(\"\
  com.apress.javaee6\");\n\n    @PostConstruct\n    public void logMethod(InvocationContext\
  \ ic) {\n        logger.entering(ic.getTarget().toString(), ic.getMethod().getName());\n\
  \        try {\n            return ic.proceed();\n        } finally {\n        \
  \    logger.exiting(ic.getTarget().toString(), ic.getMethod().getName());\n    \
  \    }\n    }\n\n    @PreDestroy\n    public void profile(InvocationContext ic)\
  \ {\n        long initTime = System.currentTimeMillis();\n        try {\n      \
  \      return ic.proceed();\n        } finally {\n            long diffTime = System.currentTimeMillis()\
  \ - initTime;\n            logger.fine(ic.getMethod() + \" took \" + diffTime +\
  \ \" millis\");\n        }\n    }\n}\n```\n\n如清单 8-6 所示，生命周期拦截器方法接受一个 `InvocationContext`\
  \ 参数，返回 `void` 而非 `Object`（因为生命周期回调方法返回 `void`，正如前面“回调”部分所述），并且不能抛出受检异常。\n\n要应用清单\
  \ 8-6 中定义的拦截器，会话 Bean 需要使用 `@Interceptors` 注解。如清单 8-7 所示，`CustomerEJB` 定义了 `ProfileInterceptor`。当容器实例化该\
  \ EJB 时，拦截器的 `logMethod()` 方法将在 `init()` 方法之前被调用。之后，如果客户端调用 `createCustomer()` 或\
  \ `findCustomerById()`，则不会发生拦截。但在容器销毁 `CustomerEJB` 之前，`profile()` 方法将被调用。\n\n**清单\
  \ 8-7.** *使用回调拦截器的 CustomerEJB*\n\n```java\n@Stateless\n@Interceptors(ProfileInterceptor.class)\n\
  public class CustomerEJB {\n\n    @PersistenceContext(unitName = \"chapter08PU\"\
  )\n    private EntityManager em;\n\n    @PostConstruct\n    public void init() {\n\
  \        // ...\n    }\n\n    public void createCustomer(Customer customer) {\n\
  \        em.persist(customer);\n    }\n\n    public Customer findCustomerById(Long\
  \ id) {\n        return em.find(Customer.class, id);\n    }\n}\n```\n\n生命周期回调方法和\
  \ `@AroundInvoke` 方法可以定义在同一个拦截器类中。\n\n**拦截器的链式调用与排除**\n\n你已经了解了如何在单个 Bean 内部（使用\
  \ `@AroundInvoke`）以及跨多个 Bean（使用 `@Interceptors`）拦截调用。EJB 3.1 允许你将多个拦截器链接起来，并且可以设置默认拦截器，使其应用于所有会话\
  \ Bean。\n\n实际上，`@Interceptors` 注解能够附加多个拦截器，因为它接受一个以逗号分隔的拦截器列表作为参数。当定义了多个拦截器时，它们的调用顺序由它们在\
  \ `@Interceptors` 注解中指定的顺序决定。例如，清单 8-8 中的代码在 Bean 级别和方法级别都使用了 `@Interceptors`。\n\
  \n**清单 8-8.** *使用回调拦截器的 CustomerEJB*\n\n```java\n@Stateless\n@Interceptors({I1.class,\
  \ I2.class})\npublic class CustomerEJB {\n\n    public void createCustomer(Customer\
  \ customer) { ... }\n\n    @Interceptors({I3.class, I4.class})\n    public Customer\
  \ findCustomerById(Long id) { ... }\n\n    public void removeCustomer(Customer customer)\
  \ { ... }\n}\n```\n\n\n**@ExcludeClassInterceptors**\n\npublic Customer updateCustomer(Customer\
  \ customer) { ... }\n\n}\n\n当客户端调用 `updateCustomer()` 方法时，不会调用任何拦截器（该方法使用了 `@ExcludeClassInterceptors`\
  \ 注解）。当调用 `createCustomer()` 方法时，会先执行拦截器 I1，然后执行拦截器 I2。当调用 `findCustomerById()`\
  \ 方法时，会按顺序执行拦截器 I1、I2、I3 和 I4。\n\n除了指定方法和类级别的拦截器外，EJB 3.1 还允许你创建默认拦截器，这些拦截器将应用于应用中定义的所有\
  \ EJB 的所有方法。\n\n没有注解具有应用范围。如果你想在应用中应用默认拦截器，你需要在部署描述符（`ejb-jar.xml`）中定义它们。\n\n如果你想将默认拦截器\
  \ `ProfileInterceptor` 应用于所有 EJB，你需要将以下 XML 片段添加到部署描述符中：\n\n<assembly-descriptor>\n\
  \n<interceptor-binding>\n\n<ejb-name> *****</ejb-name>\n\n<interceptor-class>\n\n\
  com.apress.javaee6.ProfileInterceptor\n\n</interceptor-class>\n\n</interceptor-binding>\n\
  \n</assembly-descriptor>\n\n如你所见，`<ejb-name>` 中的通配符 `*` 表示每个 EJB 都应应用 `<interceptor-class>`\
  \ 元素中定义的拦截器。如果你将清单 8-7 中的 `CustomerEJB` 与此默认拦截器一起部署，那么 `ProfileInterceptor` 将在任何其他拦截器之前被调用。\n\
  \n如果为一个会话 Bean 定义了多种类型的拦截器，容器会从最大范围（默认拦截器）到最小范围（方法拦截器）依次应用它们。控制其调用顺序的规则如图 8-5 所示。\n\
  \n![图 76](img/index-267_1.jpg)\n\n第 8 章 ■ 回调和拦截器\n\n**237**\n\n**图 8-5.** *链接不同类型的拦截器*\n\
  \n如果你想为特定的 EJB 禁用默认拦截器，可以在类级别或方法级别应用 `@javax.interceptor.ExcludeDefaultInterceptors`\
  \ 注解，如清单 8-9 所示。\n\n**清单 8-9.** *排除默认拦截器的 EJB*\n\n@Stateless\n\n**@ExcludeDefaultInterceptors**\n\
  \n**@Interceptors(LoggingInterceptor.class)**\n\npublic class CustomerEJB {\n\n\
  public void createCustomer(Customer customer) { ... }\n\npublic Customer findCustomerById(Long\
  \ id) { ... }\n\npublic void removeCustomer(Customer customer) { ... }\n\n**@ExcludeClassInterceptors**\n\
  \npublic Customer updateCustomer(Customer customer) { ... }\n\n}\n\n**总结**\n\n在本章中，你了解到无状态和单例会话\
  \ Bean 共享相同的生命周期，而有状态 Bean 的生命周期略有不同。这是因为有状态 Bean 与客户端保持会话状态，并且需要将其状态临时序列化到持久存储中（钝化）。回调注解允许你在事件发生前后向\
  \ Bean 添加业务逻辑（`@PostConstruct`、`@PreDestroy` 等）。\n\n拦截器是 EJB 的 AOP 类似机制，允许容器在你的应用中调用横切关注点。拦截器易于使用、功能强大，并且可以链接在一起，为你的\
  \ Bean 应用多个关注点。你还可以指定默认拦截器，这些拦截器将应用于应用中每个 Bean 的每个方法。\n\nEJB 容器可以被视为一个拦截器链。方法调用会被容器拦截，然后容器会应用事务和安全管理等服务。下一章将重点介绍这两种容器管理服务。\n\
  \n第 9 章\n\n事务与安全\n\n**事**务和安全管理是企业的重要事项。它们使应用程序能够拥有一致的数据并保护对数据的访问。这两种服务都是业务开发人员不应自行编码的低级关注点。EJB\
  \ 以一种非常简单的方式提供这些服务：要么通过高级抽象以编程方式实现，要么使用元数据以声明方式实现。\n\n大多数企业应用程序的工作都涉及管理数据：存储数据（通常在数据库中）、检索数据、处理数据等。这通常由多个试图访问相同数据的应用程序同时完成。数据库具有低级机制来保护并发访问，例如悲观锁，并使用事务来确保数据保持一致状态。EJB\
  \ 利用了这些机制。\n\n保护数据也很重要。你希望你的业务层像防火墙一样工作，授权某些操作给特定用户组，并拒绝其他用户访问（例如，只有员工可以持久化数据，但用户和员工都被授权读取数据）。\n\
  \n本章的第一部分专门探讨 EJB 3.1 中的事务管理。我将整体介绍事务，然后讨论 EJB 支持的不同类型的事务划分。在本章的第二部分，我将重点介绍安全性。\n\
  \n**事务**\n\n数据对业务至关重要，无论你执行何种操作以及有多少应用程序并发访问它，数据都必须准确。*事务*用于确保数据保持一致状态。它代表一组逻辑操作，这些操作必须作为一个单一单元执行，也称为*工作单元*。这些操作可能涉及在一个或多个数据库中持久化数据、发送消息或调用\
  \ Web 服务。企业每天在银行和电子商务应用程序或与合作伙伴的业务交互中都依赖事务。\n\n这些不可分割的业务操作在相对较短的时间内顺序或并行执行。每个操作都必须成功，事务才能成功（我们说事务已提交）。如果其中一个操作失败，事务也会失败（事务回滚）。事务必须保证一定程度的可靠性和健壮性，并遵循\
  \ ACID 属性。\n\n**239**\n\n**240**\n\n第 9 章 ■ 事务与安全\n\n**ACID**\n\nACID 指的是定义可靠事务的四个属性：原子性、一致性、隔离性和持久性（如表\
  \ 9-1 所述）。为了解释这些属性，我将以银行转账的经典示例为例：你需要从储蓄账户中扣款，以存入你的活期账户。\n\n**表 9-1.** *ACID 属性*\n\
  \n**属性**\n\n**描述**\n\n原子性\n\n一个事务由一个或多个操作组成，这些操作被分组在一个工作单元中。在事务结束时，这些操作要么全部成功执行（提交），要么如果发生意外或不可恢复的情况，则全部不执行（回滚）。\n\
  \n一致性\n\n在事务结束时，数据保持一致状态。\n\n隔离性\n\n事务的中间状态对外部应用程序不可见。\n\n持久性\n\n一旦事务提交，对数据所做的更改对其他应用程序可见。\n\
  \n当你将资金从一个账户转移到另一个账户时，可以想象一系列数据库访问：使用 SQL 更新语句从储蓄账户扣款，使用另一条更新语句向活期账户存款，并在不同的表中创建一条日志以记录转账。这些操作必须在同一个工作单元中完成（原子性），因为你不希望发生扣款但未存款的情况。从查询账户的外部应用程序的角度来看，只有当两个操作都成功执行后，它们才可见（隔离性）。一致性是指事务操作（无论是提交还是回滚）都在数据库的约束（如主键、关系或字段）内完成。一旦转账完成，数据就可以被其他应用程序访问（持久性）。\n\
  \n**本地事务**\n\n\n\n要使事务正常工作并遵循 ACID 属性，必须部署多个组件。首先，我们来看一个最简单的例子：一个应用程序对单个资源（例如，一个数据库）执行多次更改。当只有一个事务性资源时，只需要一个本地事务。仍然可以使用分布式事务（如\
  \ JTA），但并非严格必要。图 9-1 展示了应用程序通过事务管理器和资源管理器与资源交互的过程。\n\n![Image 77](img/index-271_1.jpg)\n\
  \n第 9 章 ■ 事务与安全\n\n**241**\n\n**图 9-1.** *涉及单个资源的事务*\n\n图 9-1 中所示的组件将大部分事务特定的处理逻辑从应用程序中抽象出来：\n\
  \n*   **事务管理器** 是负责管理事务操作的核心组件。它代表应用程序创建事务，通知资源管理器它正在参与一个事务（此操作称为*登记*），并对资源管理器执行提交或回滚操作。\n\
  *   **资源管理器** 负责管理资源，并在事务管理器处注册这些资源。资源管理器的例子包括关系型数据库的驱动程序、JMS 资源或 Java 连接器。\n* \
  \  **资源** 是您进行读写操作的持久化存储（例如，数据库、消息目的地等）。\n\n维护 ACID 属性并非应用程序的责任。应用程序只需决定提交或回滚事务，而事务管理器则会准备好所有资源以确保成功执行。\n\
  \n在 Java EE 中，这些组件通过 JSR 907 定义的 Java 事务 API (JTA) 来处理事务。JTA 为应用程序定义了一组用于划定事务边界的接口，同时也定义了与事务管理器交互的\
  \ API。这些接口定义在 `javax.transaction` 包中，其中一些在表 9-2 中进行了描述。\n\n**表 9-2.** *主要的 JTA 接口*\n\
  \n| 接口 | 描述 |\n| :--- | :--- |\n| `UserTransaction` | 定义了应用程序可用于以编程方式控制事务边界的方法。它被使用\
  \ Bean 管理事务 (BMT) 的 EJB 用于开始、提交或回滚事务（如“Bean 管理的事务”部分所述）。 |\n| `TransactionManager`\
  \ | 允许 EJB 容器代表 EJB 划定事务边界。 |\n| *续* | |\n\n![Image 78](img/index-272_1.jpg)\n\n\
  **242**\n\n第 9 章 ■ 事务与安全\n\n**表 9-2.** *（续）*\n\n| 接口 | 描述 |\n| :--- | :--- |\n|\
  \ `Transaction` | 允许对目标 `Transaction` 对象中的事务执行操作。 |\n| `XAResource` | 作为行业标准 X/Open\
  \ XA 接口的 Java 映射（如下一节所述）。 |\n\n**XA 与分布式事务**\n\n正如您刚才所见，使用单个资源的事务（如前文图 9-1 所示）被称为本地事务。然而，许多企业级应用程序会使用多个资源。\n\
  \n回到资金转账的例子，储蓄账户和活期账户可能位于不同的数据库中。这时，您就需要跨多个资源或分布在网络上的资源进行事务管理。这种企业级事务需要涉及 XA 和 Java\
  \ 事务服务 (JTS) 的特殊协调。\n\n图 9-2 展示了一个跨多个资源使用事务划分的应用程序。这意味着，在同一个工作单元中，应用程序可以（例如）将数据持久化到数据库并发送一条\
  \ JMS 消息。\n\n**图 9-2.** *涉及两个资源的 XA 事务*\n\n为了在多个资源之间实现可靠的事务，事务管理器需要使用 XA 资源管理器接口。XA\
  \ 是由开放集团 ([`www.opengroup.org`](http://www.opengroup.org)) 为分布式事务处理 (DTP) 制定的标准，它维护了\
  \ ACID 属性。该标准受 JTA 支持，并允许来自不同供应商的异构资源管理器通过一个通用接口进行互操作。XA 使用两阶段提交 (2pc) 来确保所有资源同时提交或回滚任何特定事务。\n\
  \n在我们的资金转账示例中，假设储蓄账户在第一个数据库中被扣款，并且事务成功提交。然后，活期账户在第二个数据库中被贷记，但事务失败了。这时，我们必须回到第一个数据库并撤销已提交的更改。为了避免这种数据不一致的问题，两阶段提交在最终提交之前执行一个额外的准备步骤，如图\
  \ 9-3 所示。\n\n![Image 79](img/index-273_1.jpg)\n\n![Image 80](img/index-273_2.jpg)\n\
  \n第 9 章 ■ 事务与安全\n\n**243**\n\n在第一阶段，每个资源管理器都会通过一个“准备”命令被通知即将发出提交指令。这使得资源管理器能够声明它们是否可以应用其更改。如果它们都表示已准备好，则允许事务继续进行，并在第二阶段要求所有资源管理器进行提交。\n\
  \n**图 9-3.** *两阶段提交*\n\n大多数情况下，资源分布在网络上（见图 9-4）。这样的系统依赖于 JTS。JTS 实现了对象管理组织 (OMG)\
  \ 的对象事务服务 (OTS) 规范，允许事务管理器通过 Internet Inter-ORB 协议 (IIOP) 参与分布式事务。JTS 旨在为提供事务系统基础设施的供应商使用。作为\
  \ EJB 开发者，您无需担心这一点；只需使用 JTA 即可，它在更高层次上与 JTS 交互。\n\n**图 9-4.** *一个分布式 XA 事务*\n\n\
  **EJB 中的事务支持**\n\n当您使用 EJB 开发业务逻辑时，无需担心事务管理器或资源管理器的内部结构，因为 JTA 抽象了底层的大部分复杂性。使用 EJB，您可以非常轻松地开发事务性应用程序，\n\
  \n**244**\n\n第 9 章 ■ 事务与安全\n\n将底层事务协议（如两阶段提交或事务上下文传播）的实现留给容器处理。EJB 容器是一个事务管理器，它支持\
  \ JTA 和 JTS，以便参与涉及其他 EJB 容器的分布式事务。在典型的 Java EE 应用程序中，会话 Bean 建立事务的边界，调用实体与数据库交互，或在事务上下文中发送\
  \ JMS 消息。\n\n从诞生之初，EJB 模型就被设计用于管理事务。事实上，事务对于 EJB 来说是自然而然的，默认情况下每个方法都会被自动包装在一个事务中。这种默认行为被称为容器管理事务\
  \ (CMT)，因为事务由 EJB 容器管理（也称为声明式事务划分）。您也可以选择使用 BMT（也称为编程式事务划分）自行管理事务。事务划分决定了事务的起始和结束位置。\n\
  \n**容器管理的事务**\n\n当以声明方式管理事务时，您将划分策略委托给容器。您无需在代码中显式使用 JTA（即使底层使用了 JTA）；您可以基于元数据让容器通过自动开始和提交事务来划定事务边界。EJB\
  \ 容器为会话 Bean 和 MDB（更多关于 MDB 的信息请参见第 13 章）提供事务管理服务。\n\n\n在第 7 章中，你看到了几个会话 Bean、注解和接口的示例，但从未涉及任何与事务相关的内容。清单\
  \ 9-1 展示了一个使用 CMT 的无状态会话 Bean 的代码。如你所见，既没有添加额外的注解，也没有实现特殊的接口。EJB 本质上是支持事务的。通过“异常配置”方式，所有事务管理默认值都会被应用（REQUIRED\
  \ 是默认的事务属性，稍后将在本节中解释）。\n\n**清单 9-1.** *一个使用 CMT 的无状态 Bean*\n\n**@Stateless**\n\n\
  public class ItemEJB {\n\n@PersistenceContext(unitName = \"chapter09PU\")\n\nprivate\
  \ EntityManager **em**;\n\n**@EJB**\n\nprivate InventoryEJB **inventory**;\n\npublic\
  \ List<Book> findBooks() {\n\nQuery query = **em**.createNamedQuery(\"findAllBooks\"\
  );\n\nreturn query.getResultList();\n\n}\n\npublic Book createBook(Book book) {\n\
  \n**em.persist(book);**\n\n**inventory.addItem(book);**\n\nreturn book;\n\n}\n\n\
  }\n\n![Image 81](img/index-275_1.jpg)\n\n第 9 章 ■ 事务与安全\n\n**245**\n\n你可能会问，是什么让清单\
  \ 9-1 中的代码具有事务性？答案是容器。图 9-5 展示了当客户端调用`createBook()`方法时发生的情况。客户端调用被容器拦截，容器在调用方法之前立即检查是否有事务上下文与该调用关联。默认情况下，如果没有可用的事务上下文，容器会在进入方法之前开始一个新事务，然后调用`createBook()`方法。一旦方法退出，容器会自动提交事务或回滚事务（如果抛出了特定类型的异常，你将在后面的“异常处理”一节中看到）。\n\
  \n**图 9-5.** *容器处理事务。*\n\n有趣的是，在清单 9-1 和图 9-5 中，一个 Bean 的业务方法（`ItemEJB.createBook()`）可以是另一个\
  \ Bean 的业务方法（`InventoryEJB.addItem()`）的客户端。默认行为是，无论`createBook()`使用什么事务上下文（来自客户端或由容器创建），该上下文都会应用于`addItem()`。只有当两个方法都成功返回时，才会最终提交。这种行为可以通过元数据（注解或\
  \ XML 部署描述符）进行更改。根据你选择的事务属性（REQUIRED、REQUIRES_NEW、SUPPORTS、MANDATORY、NOT_SUPPORTED\
  \ 或 NEVER），你可以影响容器划分事务的方式：容器使用客户端的事务、在新事务中运行方法、在无事务状态下运行方法，或者抛出异常。表 9-3 定义了这些事务属性。\n\
  \n**表 9-3.** *CMT 属性*\n\n**属性**\n\n**描述**\n\nREQUIRED\n\n此属性为默认值，意味着方法必须始终在事务内被调用。如果方法是从非事务性客户端调用的，容器会创建一个新事务。如果客户端有事务上下文，则业务方法在客户端的事务内运行。如果你修改了任何数据，并且不知道客户端是否已启动事务，则应使用\
  \ REQUIRED。\n\nREQUIRES_NEW\n\n无论客户端是否在事务内执行，容器在执行方法之前总是创建一个新事务。如果客户端正在事务内运行，容器会暂时挂起该事务，创建第二个事务，提交它，然后恢复第一个事务。这意味着第二个事务的成功或失败对现有的客户端事务没有影响。当你不想让回滚影响客户端时，应使用\
  \ REQUIRES_NEW。\n\n*续*\n\n![Image 82](img/index-276_1.jpg)\n\n**246**\n\n第 9 章 ■\
  \ 事务与安全\n\n**表 9-3.** *续*\n\n**属性**\n\n**描述**\n\nSUPPORTS\n\nEJB 方法继承客户端的事务上下文。如果事务上下文可用，则方法使用它；如果不可用，容器则在无事务上下文的情况下调用该方法。当你对数据库表进行只读访问时，应使用\
  \ SUPPORTS。\n\nMANDATORY\n\n\n\n容器在调用业务方法前需要存在事务，但不应创建新事务。如果客户端已有事务上下文，则传播该事务；如果没有，则抛出\
  \ `javax.ejb.EJBTransactionRequiredException`。\n\nNOT_SUPPORTED\n\nEJB 方法不能在事务上下文中调用。如果客户端没有事务上下文，则无任何操作；如果存在事务上下文，容器会挂起客户端的事务，调用方法，然后在方法返回时恢复该事务。\n\
  \nNEVER\n\nEJB 方法绝不能从事务性客户端调用。如果客户端在事务上下文中运行，容器会抛出 `javax.ejb.EJBException`。\n\n\
  图 9-6 展示了 EJB 根据客户端是否存在事务上下文可能具有的所有行为。例如，如果 `createBook()` 方法没有事务上下文，并调用了具有 MANDATORY\
  \ 属性的 `addItem()` 方法，则会抛出异常。图 9-6 的下半部分展示了相同的组合，但此时客户端具有事务上下文。\n\n**图 9-6.** *使用不同事务策略对\
  \ InventoryEJB 的两次调用* 要将这六种事务划分属性之一应用于会话 Bean，你必须使用\n\n`@javax.ejb.TransactionAttribute`\
  \ 注解或部署描述符（在 `ejb-jar.xml` 中设置\n\n`<trans-attribute>` 元素）。此元数据可以应用于单个方法或整个 Bean。如果在\
  \ Bean 级别应用，所有业务方法都将继承该 Bean 的事务属性值。清单 9-2 展示了 ItemEJB 如何使用\n\n第 9 章 ■ 事务与安全\n\n\
  **247**\n\nSUPPORT 事务划分策略，并使用 REQUIRED 覆盖了 `createBook()` 方法。\n\n**清单 9-2.** *一个使用\
  \ CMT 的无状态 Bean*\n\n```java\n@Stateless\n@TransactionAttribute(TransactionAttributeType.SUPPORTS)\n\
  public class ItemEJB {\n\n    @PersistenceContext(unitName = \"chapter09PU\")\n\
  \    private EntityManager em;\n\n    @EJB\n    private InventoryEJB inventory;\n\
  \n    public List<Book> findBooks() {\n        Query query = em.createNamedQuery(\"\
  findAllBooks\");\n        return query.getResultList();\n    }\n\n    @TransactionAttribute(TransactionAttributeType.REQUIRED)\n\
  \    public Book createBook(Book book) {\n        em.persist(book);\n        inventory.addItem(book);\n\
  \        return book;\n    }\n}\n```\n\n■**注意** 客户端事务上下文不会随异步方法调用传播。如第 13 章所述，MDB\
  \ 仅支持 REQUIRED 和 NOT_SUPPORTED 属性。\n\n标记 CMT 进行回滚\n\n你已经看到，EJB 容器会自动划分事务，并代表你调用\
  \ begin、commit 和 rollback 操作。但作为开发者，如果遇到错误或业务条件，你可能希望阻止事务提交。\n\n需要强调的是，不允许 CMT Bean\
  \ 显式回滚事务。相反，你需要使用 EJB 上下文（参见第 7 章的“会话上下文”部分）来通知容器进行回滚。\n\n如清单 9-3 所示，InventoryEJB\
  \ 有一个 `oneItemSold()` 方法，该方法通过持久化管理器访问数据库，并发送一条 JMS 消息通知运输公司某商品已售出并需要配送。如果库存水平为零（意味着没有更多商品可用），该方法需要显式回滚事务。为此，无状态\
  \ Bean 首先需要通过依赖注入获取\n\n**248**\n\n第 9 章 ■ 事务与安全\n\n`SessionContext`，然后调用其 `setRollbackOnly()`\
  \ 方法。调用此方法不会立即回滚事务；而是设置一个标志，让容器在事务结束时执行实际回滚。\n\n**清单 9-3.** *一个无状态 Bean 标记事务进行回滚*\n\
  \n```java\n@Stateless\npublic class InventoryEJB {\n\n    @PersistenceContext(unitName\
  \ = \"chapter09PU\")\n    private EntityManager em;\n\n    @Resource\n    private\
  \ SessionContext ctx;\n\n    public void oneItemSold(Item item) {\n        em.merge(item);\n\
  ```\n\n\n\nitem.decreaseAvailableStock();\n\nsendShippingMessage();\n\nif (inventoryLevel(item)\
  \ == 0)\n\n**ctx.setRollbackOnly();**\n\n}\n\n}\n\n同样，Bean 可以调用 `SessionContext.getRollbackOnly()`\
  \ 方法，该方法返回一个布尔值，用于判断当前事务是否已被标记为回滚。\n\n另一种以编程方式告知容器进行回滚的方法是通过抛出特定类型的异常。\n\n异常处理\n\
  \n自 Java 语言诞生以来，异常处理就一直令人困惑（因为它同时涉及受检异常和非受检异常）。在 EJB 中将事务与异常关联起来也相当复杂。在深入探讨之前，我只想说：在业务方法中抛出异常并不一定会将事务标记为回滚。\n\
  \n这取决于异常的类型或定义异常的元数据。事实上，EJB 3.1 规范概述了两种类型的异常：\n\n• **应用程序异常**：与 EJB 处理的业务逻辑相关的异常。例如，如果向方法传递了无效参数、库存水平过低或信用卡号无效，则可能引发应用程序异常。抛出应用程序异常不会自动导致事务被标记为回滚。如本节后面的表\
  \ 9-4 所述，当抛出受检异常（继承自 `java.lang.Exception`）时，容器不会回滚，但对于非受检异常（继承自 `RuntimeException`），容器会进行回滚。\n\
  \n第 9 章 ■ 事务与安全\n\n**249**\n\n• **系统异常**：由系统级故障引起的异常，例如 JNDI 错误、JVM 错误、无法获取数据库连接等。系统异常必须是\
  \ `RuntimeException` 或 `java.rmi.RemoteException`（因此也是 `javax.ejb.EJBException`\
  \ 的子类）的子类。抛出系统异常会导致事务被标记为回滚。\n\n根据这一定义，我们现在知道，如果容器检测到系统异常，例如 `ArithmeticException`、`ClassCastException`、`IllegalArgumentException`\
  \ 或 `NullPointerException`，它将回滚事务。应用程序异常则取决于多种因素。例如，让我们修改清单 9-3 中的代码，并使用如清单 9-4\
  \ 所示的应用程序异常。\n\n**清单 9-4.** *抛出应用程序异常的无状态 Bean*\n\n@Stateless\n\npublic class InventoryEJB\
  \ {\n\n@PersistenceContext(unitName = \"chapter09PU\")\n\nprivate EntityManager\
  \ em;\n\npublic void oneItemSold(Item item) throws InventoryLevelTooLowException{\n\
  \nem.merge(item);\n\nitem.decreaseAvailableStock();\n\nsendShippingMessage();\n\n\
  if (inventoryLevel(item) == 0)\n\n**throw new InventoryLevelTooLowException();**\n\
  \n}\n\n}\n\n`InventoryLevelTooLowException` 是一个应用程序异常，因为它与 `oneItemSold()` 方法的业务逻辑相关。根据您是否希望回滚事务，您可以使其继承自受检异常或非受检异常，或者使用\
  \ `@javax.ejb.ApplicationException` 对其进行注解（或在部署描述符中使用等效的 XML）。此注解有一个 `rollback`\
  \ 元素，可以设置为 `true` 以显式回滚事务。清单 9-5 展示了 `InventoryLevelTooLowException` 作为一个带注解的受检异常。\n\
  \n**清单 9-5.** *一个 rollback = true 的应用程序异常*\n\n**@ApplicationException(rollback =\
  \ true)**\n\npublic class InventoryLevelTooLowException extends **Exception** {\n\
  \npublic InventoryLevelTooLowException() {\n\n}\n\npublic InventoryLevelTooLowException(String\
  \ message) {\n\nsuper(message);\n\n}\n\n}\n\n**250**\n\n第 9 章 ■ 事务与安全\n\n如果清单 9-4\
  \ 中的 `InventoryEJB` 抛出了清单 9-5 中定义的异常，它将把事务标记为回滚，并且容器将在事务结束时执行实际回滚。这是因为 `InventoryLevelTooLowException`\
  \ 使用了 `@ApplicationException(rollback = true)` 注解。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n`@ApplicationException(rollback = true)`。表 9-4 展示了应用异常的所有可能组合。表格的第一行可以解释为：“如果应用异常继承自`Exception`且没有`@ApplicationException`注解，抛出该异常不会标记事务为回滚。”\n\
  \n**表 9-4.** *应用异常的组合*\n\n**继承自**\n\n**@ApplicationException**\n\n**描述**\n\nException\n\
  \n无注解\n\n默认情况下，抛出受检异常不会标记事务为回滚。\n\nException\n\nrollback = true\n\n事务被标记为回滚。\n\n\
  Exception\n\nrollback = false\n\n事务不会被标记为回滚。\n\nRuntimeException\n\n无注解\n\n默认情况下，抛出非受检异常会标记事务为回滚。\n\
  \nRuntimeException\n\nrollback = true\n\n事务被标记为回滚。\n\nRuntimeException\n\nrollback\
  \ = false\n\n事务不会被标记为回滚。\n\n**Bean 管理的事务**\n\n使用 CMT 时，您只需指定一个事务属性，并使用会话上下文或异常来标记事务回滚，从而让容器来完成事务划分。在某些情况下，声明式\
  \ CMT 可能无法提供您所需的划分粒度（例如，一个方法不能生成多个事务）。为了解决这个问题，EJB 提供了一种使用 BMT 以编程方式管理事务划分的方法。BMT\
  \ 允许您使用 JTA 显式地管理事务边界（开始、提交、回滚）。\n\n要关闭默认的 CMT 划分并切换到 BMT 模式，Bean 只需使用`@javax.ejb.TransactionManagement`注解（或`ejb-jar.xml`文件中的等效\
  \ XML 配置），如下所示：\n\n@Stateless\n**@TransactionManagement(TransactionManagementType.BEAN)**\n\
  public class ItemEJB {\n    ...\n}\n\n使用 BMT 划分时，应用程序请求事务，EJB 容器创建物理事务并处理一些底层细节。此外，它不会将事务从一个\
  \ BMT 传播到另一个 BMT。\n\n执行 BMT 的主要接口是`javax.transaction.UserTransaction`。它允许 Bean 划分事务、获取其状态、设置超时等。`UserTransaction`由\
  \ EJB 容器实例化，并通过依赖注入、JNDI 查找或`SessionContext`（通过`SessionContext.getUserTransaction()`方法）提供。该\
  \ API 在表 9-5 中描述。\n\n**251**\n\n**表 9-5.** *javax.transaction.UserTransaction 接口的方法*\n\
  \n**接口**\n\n**描述**\n\nbegin\n\n开始一个新事务并将其与当前线程关联\n\ncommit\n\n提交与当前线程关联的事务\n\nrollback\n\
  \n回滚与当前线程关联的事务\n\nsetRollbackOnly\n\n标记当前事务为回滚\n\ngetStatus\n\n获取当前事务的状态\n\nsetTransactionTimeout\n\
  \n修改当前事务的超时时间\n\n清单 9-6 展示了如何开发一个 BMT Bean。首先，我们通过`@Resource`注解使用注入获取`UserTransaction`的引用。`oneItemSold()`方法开始事务，执行一些业务处理，然后根据某些业务逻辑提交或回滚事务。还要注意，在`catch`块中事务被标记为回滚（为了更好的可读性，我简化了异常处理）。\n\
  \n**清单 9-6.** *一个使用 BMT 的无状态 Bean*\n\n@Stateless\npublic class InventoryEJB {\n\
  \    @PersistenceContext(unitName = \"chapter09PU\")\n    private EntityManager\
  \ em;\n    @Resource\n    **private UserTransaction ut;**\n\n    public void oneItemSold(Item\
  \ item) {\n        try {\n            **ut.begin();**\n            em.merge(item);\n\
  \            item.decreaseAvailableStock();\n            sendShippingMessage();\n\
  \            if (inventoryLevel(item) == 0)\n                **ut.rollback();**\n\
  \            else\n                **ut.commit();**\n        } catch (Exception\
  \ e) {\n            **ut.rollback();**\n        }\n        sendInventoryAlert();\n\
  \    }\n}\n\n**252**\n\n与清单 9-3 中显示的 CMT 代码的区别在于，使用 CMT 时，容器在方法执行前启动事务，并在方法执行后立即提交。使用清单\
  \ 9-6 中显示的 BMT 代码，您可以在方法内部手动定义事务边界。\n\n**安全性**\n\n保护应用程序安全是（或应该是）公司的首要关注点。它可以涉及从保护网络安全、加密数据传输，到授予用户在系统上的特定权限。\n\
  \n在我们日常的互联网浏览中，我们会遇到许多需要输入用户名和密码才能访问应用程序某些部分的网站。安全性已成为网络中的普遍需求，因此，Java EE 定义了多种机制来保护应用程序安全。\n\
  \n在保护 Java EE 应用程序安全时，需要理解多个概念。其中之一是用户如何绑定到一个主体（principal）并可以拥有多个角色。每个角色将授予对一组资源的权限。但是，要在安全域中拥有身份，用户需要被认证。然后，平台将根据用户的角色授权资源，从而控制访问。\n\
  \n**主体和角色**\n\n主体和角色是软件安全中的一个重要概念。*主体*代表一个已被认证系统（例如，通过验证数据库中的用户名和密码）认证的用户。然后，您可以将主体组织成称为*角色*的组，允许主体共享一组通用的权限（例如，有权访问计费系统或能够向工作流发送消息）。\n\
  \n图 9-7 展示了用户如何在安全系统中被表示。如您所见，用户一旦通过认证，就绑定到一个主体。该主体具有唯一标识符，并且可以链接到多个角色。例如，用户 Frank\
  \ 有一个绑定到员工和管理员角色的主体（例如，由用户 ID 标识）。\n\n![Image 83](img/index-283_1.jpg)\n![Image\
  \ 84](img/index-283_2.jpg)\n\n**253**\n\n**图 9-7.** *主体和角色*\n\n**认证和授权**\n\n保护应用程序安全涉及两个功能：认证和授权。认证是向认证系统验证用户身份（用户\
  \ ID 和密码、OpenID、指纹检查等）并为用户分配主体的过程。授权是确定一个主体（已认证的用户）是否有权访问特定资源（例如，一本书）或功能（例如，删除一本书）的过程。根据其角色，用户可以访问所有资源、无资源或部分资源。\n\
  \n图 9-8 展示了一个常见的安全场景。系统要求用户通过客户端界面（Web 或 Swing）输入其用户名和密码。系统使用 Java 认证和授权服务（JAAS）针对底层认证系统检查其凭证。如果认证成功，用户将被授予一个主体。此时，该主体与一个或多个角色关联。当用户访问一个受保护的\
  \ EJB 时，该主体被透明地传递给 EJB，EJB 使用它来确定调用者的角色是否被允许访问其正在尝试执行的方法。\n\n**图 9-8.** *使用 JAAS\
  \ 的常见安全场景*\n\n**254**\n\n如图 9-8 所示，Java EE 安全性在很大程度上基于 JAAS API。实际上，JAAS 是 Web 和\
  \ EJB 层内部用于执行授权和认证的 API。它还访问底层认证系统，例如轻量级目录访问协议（LDAP）、微软 Active Directory 等。\n\n\
  **EJB 中的安全支持**\n\n\n\nEJB 安全模型的主要目的是控制对业务代码的访问。正如您刚刚所见，身份验证由 Web 层（或客户端应用程序）处理，主体及其角色随后被传递给\
  \ EJB 层，EJB 根据角色检查已认证用户是否被允许访问某个方法。与事务管理类似，授权可以通过声明式或编程式两种方式完成。\n\n采用声明式授权时，访问控制由\
  \ EJB 容器执行。采用编程式授权时，访问控制则通过代码中的 JAAS API 实现。\n\n**声明式安全**\n\n声明式安全策略可以在 Bean 中使用注解或\
  \ XML 部署描述符来定义。声明式授权涉及声明角色、为方法（或整个 Bean）分配权限，或临时更改安全身份。这些控制通过表 9-6 中描述的注解实现。每个注解可用于\
  \ Bean 和/或方法上。\n\n**表 9-6.** *安全注解*\n\n**注解**\n\n**Bean**\n\n**方法**\n\n**描述**\n\n\
  @PermitAll\n\nX\n\nX\n\n表示给定的方法（或整个 Bean）对所有人可访问（所有角色均被允许）\n\n@DenyAll\n\nX\n\n\
  表示不允许任何角色执行指定的方法（所有角色均被拒绝）\n\n@RolesAllowed\n\nX\n\nX\n\n表示允许一组角色执行给定的方法（或整个 Bean）\n\
  \n@DeclareRoles\n\nX\n\n定义用于安全检查的角色\n\n@RunAs\n\nX\n\n临时为主体分配一个新角色\n\n■**注意** 本章开头看到的@TransactionManagement\
  \ 和@TransactionAttribute 注解定义在 EJB 3.1 规范（JSR 318）的 javax.ejb 包中。\n\n安全注解（@RolesAllowed、@DenyAll\
  \ 等）是通用注解 1.0 规范（JSR 250）的一部分，来自 javax.annotation.security 包。\n\n第 9 章 ■ 事务与安全\n\
  \n**255**\n\n@RolesAllowed 注解用于授权一组角色访问某个方法。它可以应用于特定方法或整个 Bean（此时所有业务方法将继承 Bean\
  \ 的角色访问权限）。此注解可以接受单个字符串（仅一个角色可访问该方法）或字符串数组（其中任一角色均可访问该方法）。您将在本节后面看到的@DeclareRoles\
  \ 注解可用于声明其他角色。\n\n清单 9-7 展示了在 Bean 和方法级别使用@RolesAllowed 注解的 ItemEJB。此代码表明，任何与以下角色之一关联的主体均可访问任何方法：user、employee\
  \ 或 admin。deleteBook()方法覆盖了类级别的设置，仅允许 admin 角色访问。\n\n**清单 9-7.** *允许特定角色的无状态 Bean*\n\
  \n@Stateless\n**@RolesAllowed({\"user\", \"employee\", \"admin\"})**\npublic class\
  \ ItemEJB {\n    @PersistenceContext(unitName = \"chapter09PU\")\n    private EntityManager\
  \ em;\n\n    public Book findBookById(Long id) {\n        return em.find(Book.class,\
  \ id);\n    }\n\n    public Book createBook(Book book) {\n        em.persist(book);\n\
  \        return book;\n    }\n\n    **@RolesAllowed(\"admin\")**\n    public void\
  \ deleteBook(Book book) {\n        em.remove(em.merge(book));\n    }\n}\n\n@RolesAllowed\
  \ 定义了一组允许访问某个方法的角色。@PermitAll 和@DenyAll 注解则适用于任何角色。因此，您可以使用@PermitAll 注解标记一个 EJB\
  \ 或方法，使其可由任何角色调用。相反，@DenyAll 禁止任何角色访问某个方法。\n\n如清单 9-8 所示，findBookById()方法现在对任何角色都可访问，而不仅仅是\
  \ user、employee 和 admin。另一方面，findConfidentialBook()方法则完全不可访问。\n\n**清单 9-8.** *使用@PermitAll\
  \ 和@DenyAll 的无状态 Bean*\n\n@Stateless\n@RolesAllowed({\"user\", \"employee\", \"\
  admin\"})\npublic class ItemEJB {\n\n**256**\n第 9 章 ■ 事务与安全\n\n    @PersistenceContext(unitName\
  \ = \"chapter09PU\")\n    private EntityManager em;\n\n    **@PermitAll**\n    **public\
  \ Book findBookById(Long id) {**\n\n\n\nreturn em.find(Book.class, id);\n\n}\n\n\
  public Book createBook(Book book) {\n\nem.persist(book);\n\nreturn book;\n\n}\n\n\
  @RolesAllowed(\"admin\")\n\npublic void deleteBook(Book book) {\n\nem.remove(em.merge(book));\n\
  \n}\n\n**@DenyAll**\n\npublic Book findConfidentialBook(Long secureId){\n\nreturn\
  \ em.find(ConfidentialBook.class, id);\n\n}\n\n}\n\n@DeclareRoles 注解略有不同，它不用于允许或拒绝任何访问权限，而是为整个应用程序声明角色。当部署清单\
  \ 9-8 中的 EJB 时，容器会通过检查 @RolesAllowed 注解自动声明 user、employee 和 admin 角色。但你可能希望通过 @DeclareRoles\
  \ 注解在安全域中声明其他角色。此注解仅适用于类级别，它接受一个角色数组并在安全域中声明它们。实际上，你可以使用这两个注解中的任何一个或两者的组合来声明安全角色。如果同时使用这两个注解，则会声明\
  \ @DeclareRoles 和 @RolesAllowed 中角色的并集。我们通常为整个企业应用程序声明角色，因此在这种情况下，在部署描述符中声明角色比使用\
  \ @DeclareRoles 注解更有意义。\n\n当部署清单 9-9 中的 ItemEJB 时，会声明 HR、salesDpt、user、employee\
  \ 和 admin 这五个角色。然后，通过 @RolesAllowed 注解，这些角色中的某些角色被授予访问特定方法的权限（如前所述）。\n\n**清单 9-9.**\
  \ *一个声明角色的无状态 Bean*\n\n@Stateless\n\n**@DeclareRoles({\"HR\", \"salesDpt\"})**\n\
  \n**@RolesAllowed({\"user\", \"employee\", \"admin\"})**\n\npublic class ItemEJB\
  \ {\n\n@PersistenceContext(unitName = \"chapter09PU\")\n\nprivate EntityManager\
  \ em;\n\n第 9 章 ■ 事务与安全\n\n**257**\n\npublic Book findBookById(Long id) {\n\nreturn\
  \ em.find(Book.class, id);\n\n}\n\npublic Book createBook(Book book) {\n\nem.persist(book);\n\
  \nreturn book;\n\n}\n\n**@RolesAllowed(\"admin\")**\n\npublic void deleteBook(Book\
  \ book) {\n\nem.remove(em.merge(book));\n\n}\n\n}\n\n最后一个注解 @RunAs 在你需要临时为当前主体分配一个新角色时非常有用。例如，当你在方法内部调用另一个\
  \ EJB，但该 EJB 需要不同的角色时，你可能需要这样做。\n\n例如，清单 9-10 中的 ItemEJB 授权访问 user、employee 和 admin\
  \ 角色。当这些角色之一访问某个方法时，该方法将以临时的 inventoryDpt 角色运行（@RunAS(\"inventoryDpt\")）。这意味着当执行\
  \ createBook() 方法时，InventoryEJB.addItem() 方法将以 inventoryDpt 角色被调用。\n\n**清单 9-10.**\
  \ *一个以不同角色运行的无状态 Bean*\n\n@Stateless\n\n@RolesAllowed({\"user\", \"employee\", \"\
  admin\"})\n\n**@RunAS(\"inventoryDpt\")**\n\npublic class ItemEJB {\n\n@PersistenceContext(unitName\
  \ = \"chapter09PU\")\n\nprivate EntityManager **em**;\n\n**@EJB**\n\nprivate InventoryEJB\
  \ **inventory**;\n\npublic List<Book> findBooks() {\n\nQuery query = **em**.createNamedQuery(\"\
  findAllBooks\");\n\nreturn query.getResultList();\n\n}\n\npublic Book createBook(Book\
  \ book) {\n\nem.persist(book);\n\n**inventory.addItem(book);**\n\nreturn book;\n\
  \n}\n\n}\n\n**258**\n\n第 9 章 ■ 事务与安全\n\n如你所见，声明式安全让你轻松获得强大的身份验证策略。但是，如果你需要为单个用户提供安全设置，或者根据当前主体的角色应用某些业务逻辑，该怎么办？这时就需要用到编程式安全了。\n\
  \n**编程式安全**\n\n声明式安全涵盖了应用程序所需的大多数安全场景。但有时你需要更细粒度的授权访问方式（例如，允许执行代码块而非整个方法，允许或拒绝单个用户的访问等）。你可以使用编程式授权来选择性地允许或阻止对某个角色或主体的访问。这是因为你可以直接访问\
  \ JAAS 的 javax.security.Principal 接口以及 EJB 上下文，以便在代码中检查主体的角色。\n\nSessionContext\
  \ 接口中定义了以下与安全相关的方法：\n\n\n\n• `isCallerInRole()`：该方法返回一个布尔值，用于测试调用者是否具有给定的安全角色。\n\
  \n• `getCallerPrincipal()`：该方法返回标识调用者的 `java.security.Principal` 对象。\n\n为了演示如何使用这些方法，我们来看一个例子。清单\
  \ 9-11 中的 `ItemEJB` 没有使用任何声明式安全，但仍需通过编程方式进行某种检查。首先，Bean 需要获取其上下文的引用（使用 `@Resource`\
  \ 注解）。有了这个上下文，`deleteBook()` 方法就可以检查调用者是否具有管理员角色。如果没有，它会抛出一个 `java.lang.SecurityException`\
  \ 来通知用户授权违规。`createBook()` 方法则利用角色和主体执行一些业务逻辑。请注意，`getCallerPrincipal()` 方法返回一个包含名称的\
  \ `Principal` 对象。该方法会检查主体的名称是否为 `paul`，然后为图书实体设置特殊的用户值。\n\n**清单 9-11.** *使用编程式安全的\
  \ Bean*\n\n```java\n@Stateless\npublic class ItemEJB {\n\n    @PersistenceContext(unitName\
  \ = \"chapter09PU\")\n    private EntityManager em;\n\n    @Resource\n    private\
  \ SessionContext ctx;\n\n    public Book findBookById(Long id) {\n        return\
  \ em.find(Book.class, id);\n    }\n\n    public void deleteBook(Book book) {\n \
  \       if (!ctx.isCallerInRole(\"admin\"))\n            throw new SecurityException(\"\
  Only admins are allowed\");\n        em.remove(em.merge(book));\n    }\n\n    public\
  \ Book createBook(Book book) {\n        if (ctx.isCallerInRole(\"employee\") &&\
  \ !ctx.isCallerInRole(\"admin\")){\n            book.setCreatedBy(\"employee only\"\
  );\n        } else if (ctx.getCallerPrincipal().getName().equals(\"paul\")){\n \
  \           book.setCreatedBy(\"special user\");\n        }\n        em.persist(book);\n\
  \        return book;\n    }\n}\n```\n\n**总结**\n\n在与 EJB 相关的最后一章中，我向你展示了如何处理事务和安全管理。这两个非常重要的服务既可以通过声明式定义，也可以通过编程式定义。\n\
  \n事务允许业务层即使在多个应用程序并发访问时也能保持数据的准确状态。它们遵循 ACID 属性，并且可以分布在多个资源（数据库、JMS 目的地、Web 服务等）上。CMT\
  \ 允许你轻松地自定义 EJB 容器在事务划分方面的行为。你可以通过 EJB 上下文或异常将事务标记为回滚来影响此行为。如果你需要直接使用 JTA 对事务划分进行更精细的控制，你始终可以使用\
  \ BMT。\n\n对于安全性，你必须牢记，业务层不负责验证用户身份，而是授权角色访问方法。声明式安全通过相对较少的注解实现，并允许你覆盖企业应用可能需要的绝大多数情况。同样，你也可以切换到编程式安全并操作\
  \ JAAS API。\n\n接下来的三章将解释如何使用 JSF 开发表示层。JSF 页面使用受管 Bean 来调用 EJB 上的业务方法。\n\n第 10 章\n\
  \nJavaServer Faces\n\n**如**果来自后端的信息要以图形方式显示，则需要添加用户界面。这些界面可以有多种类型：桌面应用程序、在浏览器中运行的\
  \ Web 应用程序，或在便携式设备上运行并显示图形界面与最终用户交互的移动应用程序。第 10 章到第 12 章将重点介绍 Web 用户界面。\n\n万维网最初是作为一种共享用超文本标记语言（HTML）编写的文档的机制而诞生的。超文本传输协议（HTTP）用于提供这些文档，这些文档大多是静态的（其内容随时间变化不大）。静态页面由纯\
  \ HTML 组成，可选地包含一些静态图形（例如 JPG、PNG）。动态页面则在某种程度上是根据用户输入计算出的数据实时组装而成的。\n\n要创建动态内容，你需要解析\
  \ HTTP 请求，理解它们的含义。\n\n\n\n`mean` 一词，并以浏览器能够显示的合适格式创建响应。这正是 Servlet API 通过提供 HTTP\
  \ 世界的面向对象视图（`HttpRequest`、`HttpResponse` 等）所简化的内容。然而，Servlet 模型过于底层；JavaServer Pages（JSP）简化了动态页面的创建。在幕后，JSP\
  \ 本质上是一个 Servlet，只不过它主要使用 HTML 编写——但仍需少量 Java 代码进行处理。\n\n为了应对 JSP 的一些局限性，JavaServer\
  \ Faces（JSF，或简称 Faces）应运而生，它采用了一种新模型：将图形化组件引入 Web。受 Swing 组件模型及其他 GUI 框架的启发，JSF\
  \ 允许开发者从组件、事件、受管 bean 及其交互的角度进行思考，而不是请求、响应和标记语言。其目标是通过在快速应用开发（RAD）方法中支持用户界面组件（如文本框、列表框、选项卡面板和数据网格），使\
  \ Web 开发更快、更简单。\n\n第 10 章介绍 JSF，第 11 章和第 12 章展示 Java EE 6 中用于创建 Web 界面的不同技术（JSP、EL\
  \ 和 JSTL），并将主要关注更强大且是创建现代 Web 应用首选技术的 JSF 2.0。\n\n**理解 JSF**\n\n如果你熟悉 Web 框架，JSF\
  \ 的架构很容易理解（见图 10-1）。JSF 应用是标准的 Web 应用，它通过 Faces Servlet 拦截 HTTP 请求并生成 HTML。在底层，该架构允许你插入任何页面声明语言（PDL），在不同的设备（Web\
  \ 浏览器、便携式设备等）上渲染它，**261**\n\n![Image 85](img/index-292_1.jpg)\n\n**262**\n\n第 10\
  \ 章 ■ JavaServer Faces\n\n并使用事件、监听器和组件（类似 Swing 的方式）创建页面。Swing 是一个 Java 窗口工具包，自\
  \ Java SE 1.2 版本起就已成为其一部分。它是一个用于创建桌面应用（而非 Web 应用）的 GUI 框架，使用图形化组件和事件-监听器模型来处理用户输入。JSF\
  \ 还带来了一套标准的 UI 控件（按钮、超链接、复选框、文本字段等），并允许轻松插入第三方组件。从非常高的层面来看，JSF 架构如图 10-1 所示。\n\n\
  **图 10-1.** *JSF 架构*\n\n此图展示了 JSF 的几个重要组成部分，这些部分使其架构丰富且灵活：\n\n• *FacesServlet 和\
  \ faces-config.xml*：FacesServlet 是应用的主 Servlet，并且可以通过 `faces-config.xml` 描述符文件进行可选配置。\n\
  \n• *页面和组件*：JSF 支持多种 PDL，例如 JSP 或 Facelets。\n\n• *渲染器*：负责显示组件并将用户输入转换为组件的值。\n\n\
  • *转换器*：负责将组件的值（Date、Boolean 等）与标记值（String）进行相互转换。\n\n• *验证器*：负责确保用户输入的值是有效的。\n\n\
  • *受管 bean 和导航*：业务逻辑在受管 bean 中实现，这些 bean 也控制页面之间的导航。\n\n• *Ajax 支持*：JSF 2.0 内置了对\
  \ Ajax 的支持，如第 12 章所述。\n\n第 10 章 ■ JavaServer Faces\n\n**263**\n\n**FacesServlet\
  \ 和 faces-config.xml**\n\n大多数 Web 框架都使用模型-视图-控制器（MVC）设计模式，JSF 也是如此。MVC 模式用于解耦视图（页面）和模型（要在视图中显示的数据）。控制器处理可能导致模型更改和视图更新的用户操作。在\
  \ JSF 中，这个控制器是一个名为 FacesServlet 的 Servlet。所有用户请求都经过 FacesServlet，它检查请求并使用受管 bean\
  \ 调用模型上的各种操作。\n\n此 Servlet 是内部的，是 JSF 的一部分。配置它的唯一方法是使用外部元数据。直到 JSF 1.2，唯一的配置来源是\
  \ `faces-config.xml` 文件。如今，使用 JSF 2.0，此文件是可选的，大多数元数据可以通过注解（在受管 bean、转换器、组件、渲染器和验证器上）来定义。\n\
  \n**页面和组件**\n\nJSF 框架必须向客户端的输出设备（例如浏览器）发送一个页面，并且需要某种显示技术。这种显示技术就是 PDL。JSF 应用可以自由地为其\
  \ PDL 使用多种技术，例如 JSP 或 Facelets。声称符合规范的 JSF 2.0 实现必须包含一个完整的 JSP 实现。JSP 是 JSF 1.1\
  \ 和 JSF 1.2 中的默认 PDL，但 JSF 2.0 更倾向于使用 Facelets。\n\nJSP 和 Facelets 页面都由一个组件树（也称为控件或小部件）组成，这些组件提供与最终用户交互的特定功能（文本字段、按钮、列表框等）。JSF\
  \ 有一套标准的组件，并允许你轻松创建自己的组件。页面会经历一个复杂的生命周期来管理这个组件树（初始化、事件、渲染等）。\n\n清单 10-1 中的代码是一个使用\
  \ JSF 标签（`xmlns:h=\"http://java.sun.com/jsf/html\"`）的 Facelets XHTML 页面，用于显示一个包含两个输入字段（图书的\
  \ ISBN 和书名）和一个按钮的表单。此页面由几个 JSF 组件组成。其中一些没有视觉外观，例如用于声明头部（`<h:head>`）、主体（`<h:body>`）或表单（`<h:form>`）的组件。其他组件是可视的，代表标签（`<h:outputLabel>`）、文本字段（`<h:inputText>`）或按钮（`<h:commandButton>`）。请注意，纯\
  \ HTML 标签也可以混合在页面中（`<table>`、`<tr>`、`<hr/>` 等）。\n\n**清单 10-1.** *XHTML 页面片段*\n\n\
  <!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\
  >](http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd)\n[<html](http://www.w3.org/1999/xhtml)\n\
  [](http://java.sun.com/jsf/html)**>**\n****<h:head>**\n<title>创建一本新书</title>\n</h:head>\n\
  **<h:body>**\n<h1>创建一本新书</h1>\n<hr/>\n**<h:form>**\n<table border=\"0\">\n\n**264**\n\
  \n第 10 章 ■ JavaServer Faces\n\n<tr>\n<td> **<h:outputLabel value=\"ISBN : \"/>**\
  \ </td>\n**<td><h:inputText value=\"#{bookController.book.isbn}\"/></td>**\n</tr>\n\
  <tr>\n<td><h:outputLabel value=\"书名 :\"/></td>\n<td><h:inputText value=\"#{bookController.book.title}\"\
  /></td>\n</tr>\n</table>\n**<h:commandButton value=\"创建图书\"** ➥\n**action=\"#{bookController.doCreateBook}\"\
  \ styleClass=\"submit\"/>**\n</h:form>\n<hr/>\n<i>APress - Beginning Java EE 6</i>\n\
  </h:body>\n</html>\n\n**渲染器**\n\nJSF 支持两种用于显示组件的编程模型：直接实现和委托实现。当使用直接模型时，组件必须自行解码和编码为图形表示。当使用委托模型时，这些操作被委托给渲染器。这使得组件可以独立于渲染技术（浏览器、便携式设备等），并拥有多种图形表示。\n\
  \n渲染器负责显示组件并将用户输入转换为组件的值。可以将其视为客户端和服务器之间的翻译器：它解码用户请求以设置组件的值，并编码响应以创建客户端能够理解并显示的组件表示。\n\
  \n渲染器被组织成渲染套件，每个套件专注于特定类型的输出。为确保应用的可移植性，JSF 包含对标准渲染套件及其关联的 HTML 4.01 渲染器的支持。然后，JSF\
  \ 实现可以创建自己的渲染套件来生成无线标记语言（WML）、可缩放矢量图形（SVG）等。\n\n**转换器和验证器**\n\n\n\n页面渲染完成后，用户即可与之交互并输入数据。由于不存在类型约束，渲染器无法预先知道如何显示对象。此时就需要转换器发挥作用：它们将对象（如\
  \ Integer、Date、Enum、Boolean 等）转换为字符串以供显示，并将输入的字符串转换回对象。JSF 为常见类型提供了一组转换器（位于 javax.faces.convert\
  \ 包中），但您也可以自行开发或集成第三方类型。\n\n有时这些数据在后台处理之前还需要进行验证。\n\n验证器负责确保用户输入的值是可接受的。一个组件可以关联一个或多个验证器。JSF\
  \ 内置了一些验证器（如 LengthValidator、RegexValidator 等），并允许您使用注解类创建自定义验证器。当出现转换或验证错误时，会向响应返回一条消息以供显示。\n\
  \n**托管 Bean 与导航**\n\n到目前为止，所有概念都围绕单个页面展开：什么是页面、什么是组件、它们如何渲染、转换和验证。Web 应用程序由多个页面组成，并且需要执行业务逻辑（例如通过调用\
  \ EJB 层）。\n\n从一个页面跳转到另一个页面、调用 EJB 以及与组件同步数据，这些都由托管 Bean 处理。\n\n托管 Bean 是一种专门的 Java\
  \ 类，负责与组件同步值、处理业务逻辑以及管理页面间的导航。您可以使用表达式语言（EL）将组件与特定的托管 Bean 属性或操作关联起来。以下代码片段来自之前的示例：\n\
  \n<h:inputText value=\"#{bookController. **book.isbn**}\"/>\n\n<h:commandButton\
  \ value=\"Create\" action=\"#{bookController. **doCreateBook**}\"/> 第一行代码将输入文本的值直接绑定到名为\
  \ bookController 的托管 Bean 的 book.isbn 属性上。输入文本的值会与托管 Bean 的 book.isbn 属性同步。\n\n\
  托管 Bean 还负责处理事件。第二行代码显示了一个与操作关联的提交按钮。当点击提交按钮时，会向托管 Bean 触发一个事件，并执行事件监听器方法（此处为 doCreateBook()\
  \ 方法）。\n\n清单 10-2 展示了 BookController 托管 Bean。这个 Java 类使用了 @ManagedBean 注解，并包含一个与页面组件值同步的\
  \ book 属性。doCreateBook() 方法调用了一个无状态 EJB，然后返回一个字符串以实现页面间的导航。\n\n**清单 10-2.** *BookController\
  \ 托管 Bean*\n\n**@ManagedBean**\n\npublic class BookController {\n\n@EJB\n\nprivate\
  \ BookEJB bookEJB;\n\nprivate Book **book** = new Book();\n\npublic String **doCreateBook()**\
  \ {\n\nbook = bookEJB.createBook(book);\n\nreturn \"listBooks.xhtml\";\n\n}\n\n\
  // Getters, setters\n\n}\n\n■**注意** 托管 Bean 是充当控制器、实现页面间导航、调用 EJB 等的类。支持 Bean 则是持有绑定到组件的属性的对象。在本例中，我们可以说\
  \ BookController 是托管 Bean，而 book 属性是支持 Bean。\n\n**Ajax 支持**\n\nWeb 应用程序必须提供丰富且响应迅速的界面。这种响应性可以通过异步方式仅更新页面的一小部分来实现，这正是\
  \ Ajax 的核心。早期版本的 JSF 并未提供开箱即用的解决方案，因此 a4jsf 等第三方库填补了这一空白。从 JSF 2.0 开始，Ajax 支持以规范中定义的\
  \ JavaScript 库（jsf.js）的形式被加入。例如，您可以使用 request 函数以异步方式提交表单，如下代码所示：\n\n<h:commandButton\
  \ id=\"submit\" value=\"Create a book\"\n\n**onclick**=\" **jsf.ajax.request**(**this**,\
  \ event,\n\n{**execute**:'isbn title price description nbOfPage illustrations',\n\
  \n\n\n**render**:'booklist'}); return false;\"\n\nactionListener=\"#{bookController.doCreateBook}\"\
  \ />\n\n**Web 界面规范概述**\n\nJava 中的 Web 开发始于 1996 年的 Servlet API，这是一种创建动态 Web 内容的非常基础的方式。你必须在\
  \ Java 代码中操作底层 HTTP API（如 `HttpServletRequest`、`HttpServletResponse`、`HttpSession`\
  \ 等）来显示 HTML 标签。JSP 于 1999 年问世，提供了比 Servlet 更高层次的抽象。2004 年，JSF 的第一个版本诞生，其 1.2 版本于\
  \ 2006 年成为 Java EE 5 的一部分。JSF 2.0 现已随 Java EE 6 捆绑发布。\n\n**Web 界面简史**\n\n起初，网页是静态的。用户请求一个资源（网页、图片、视频等），服务器便返回该资源；这种方式虽然简单，但功能非常有限。随着\
  \ Web 上商业活动的增长，公司需要向客户提供动态内容。创建动态内容的第一个解决方案是通用网关接口（CGI）。通过使用 HTML 页面和用多种语言（从 Perl\
  \ 到 Visual Basic）编写的 CGI 脚本，应用程序可以访问数据库并提供动态内容，但很明显 CGI 过于底层（你必须处理 HTTP 头、调用 HTTP\
  \ 命令等），需要改进。\n\n1995 年，一种名为 Java 的新语言发布，并附带了一个名为抽象窗口工具包（AWT）的平台无关用户界面 API。后来，在 Java\
  \ SE 1.2 中，依赖于操作系统用户界面模块的 AWT 被 Swing API 所取代（Swing 使用 Java 2D 绘制自己的组件）。在 Java 的早期阶段，Netscape\
  \ 的 Navigator 浏览器提供了对这种新语言的支持，从而开启了小程序的时代。*小程序*是在客户端浏览器内运行的应用程序。这使得开发者能够用 AWT 或\
  \ Swing 编写应用程序，并将其嵌入网页中。然而，小程序从未真正流行起来。Netscape 还创建了一种名为 JavaScript 的脚本语言，它直接在浏览器中执行。尽管浏览器之间存在一些不兼容性，但\
  \ JavaScript 至今仍被广泛使用，并且是创建动态 Web 应用程序的强大方式。\n\n在小程序未能被广泛采用之后，Sun 引入了 Servlet，作为一种实现轻量级动态\
  \ Web 客户端的方式。Servlet 是 CGI 脚本的替代方案，因为它们提供了更高级别的 HTTP 处理库，可以完全访问 Java API（允许数据库访问、远程调用等），并且可以创建\
  \ HTML 作为响应内容供用户显示。\n\nSun 于 1999 年发布了 JSP，作为 Servlet 模型的增强。但由于 JSP 混合了 Java 和 HTML\
  \ 代码，2001 年一个开源框架的出现为一种新方法打开了大门：Struts。它扩展了 Servlet API，并鼓励开发者采用 MVC 架构。近年来涌现了许多其他\
  \ Web 框架，每个都试图填补前一个框架的空白（如 Tapestry、Wicket、WebWork、DWR 等）。如今，JSF 2.0 是 Java EE 6\
  \ 中首选的 Web 框架。它在 Java 领域与 Struts 和 Tapestry 竞争。从更宏观的角度看，Rails 和 Grails 与 JSF 竞争，正如\
  \ Java 与 Ruby 或 Groovy 竞争一样。Google Web Toolkit (GWT)、Flex 和 JavaFX 可以作为 JSF 的补充。\n\
  \n**JSP 2.2、EL 2.2 和 JSTL 1.2**\n\n从架构上讲，JSP 是 Servlet 的高层抽象，并作为 Servlet 2.1 的扩展来实现。JSP\
  \ 1.2 和 Servlet 2.3 在 JSR 53 中一同被规范。同时，JSP 标准标签库（JSTL）在 JSR 52 中被规范。\n\n自 2002 年起，JSP\
  \ 2.0 规范在 JSR 152 中与 Servlet 分开演进。2006 年，JSP 2.1 成为 Java EE 5 的一部分，并通过引入统一的表达式语言（EL）促进了\
  \ JSF 和 JSP 之间的集成。随着 Java EE 6 的发布，JSP 和 EL 规范都已更新到 2.2 版本。其中一个主要变化是能够使用 EL 调用方法（而不仅仅是属性）。\n\
  \n第 10 章 ■ JavaServer Faces\n\n**267**\n\n\n\n**JSF 2.0**\n\nJSF 是由 Java 社区流程（JCP）发布的一项规范，于\
  \ 2001 年以 JSR 127 之名创建。2004 年发布了 1.1 维护版本。直到 2006 年，JSF 1.2 才作为 JSR 252（随 Java EE\
  \ 5 一同发布）被引入 Java EE。该版本面临的最大挑战是既要保持向后兼容性，又要将 JSP 与统一的 EL 集成。尽管付出了这些努力，JSF 和 JSP\
  \ 的配合仍不理想，因此引入了 Facelets 等其他框架作为 JSP 的替代方案。\n\nJSF 2.0 是 JSR 314 演进过程中的一个主要版本，也是\
  \ Java EE 6 中 Web 开发的首选（JSP 在 Java EE 6 中仍被保留，但未进行重大改进）。JSF 2.0 的灵感来源于许多开源 Web 框架，如今带来了许多新特性。\n\
  \n**268**\n\n第 10 章 ■ JavaServer Faces\n\n**JSF 2.0 的新特性**\n\n凭借众多新特性，JSF 2.0 是从\
  \ 1.2 版本的演进，但也是一次进步——例如，在 PDL 方面，Facelets 比 JSP 更受青睐。JSF 2.0 的新特性包括以下内容：\n\n• 一种基于\
  \ Facelets 的替代 JSP 的视图技术\n\n• 一种新的资源处理机制（用于图像、CSS、JavaScript 文件等）\n\n• 额外的作用域（视图作用域和组件作用域）\n\
  \n• 通过注解轻松开发托管 Bean、渲染器、转换器、验证器等\n\n• 通过利用注解和异常配置减少 XML 配置（faces-config.xml 为可选）\n\
  \n• Ajax 支持\n\n• 易于组件开发\n\n**参考实现**\n\nMojarra，以南美和加勒比海岸发现的一种鱼命名，是 JSF 2.0 的开源参考实现。Mojarra\
  \ 可在 GlassFish V3 更新中心获取，允许开发调用 EJB 3.1 业务层和 JPA 2.0 持久层的 JSF 2.0 Web 应用程序。它将在接下来的示例中使用。\n\
  \n**整合所有内容**\n\n利用这些信息，你可以编写一个由两个网页组成的小型 Web 应用程序：一个显示表单，用于创建书籍（newBook.xhtml），另一个列出数据库中所有可用的书籍（listBooks.xhtml）。这两个页面使用\
  \ BookController 托管 Bean 来存储必要的属性并进行导航。通过使用 JPA 进行持久化和 EJB 处理业务逻辑，所有内容都可以整合在一起。托管\
  \ Bean 将所有业务逻辑委托给 BookEJB，后者包含两个方法：一个用于将书籍持久化到数据库（createBook()），另一个用于检索书籍（findBooks()）。这个无状态会话\
  \ Bean 使用 EntityManager API 来操作 Book 实体。导航非常简单：一旦创建了书籍，就会显示列表。列表页面上有一个链接，允许你返回 newBook.xhtml\
  \ 页面并创建另一本书。\n\n图 10-2 显示了此 Web 应用程序中的交互组件。它们被打包在一个 war 文件中，部署在正在运行的 GlassFish 实例和实时\
  \ Derby 数据库中。\n\n![Image 86](img/index-299_1.jpg)\n\n第 10 章 ■ JavaServer Faces\n\
  \n**269**\n\n**图 10-2.** *Web 应用程序中涉及的页面和类*\n\n此 Web 应用程序遵循 Maven 目录结构，因此类、文件和网页必须放置在以下目录中：\n\
  \n• src/main/java：包含 Book 实体、BookEJB 和 BookController 托管 Bean\n\n• src/main/resources：包含用于在数据库中映射实体的\
  \ persistence.xml 文件\n\n• src/webapp：包含两个网页 newBook.xhtml 和 listBooks.xhtml\n\n\
  • src/webapp/WEB-INF：包含用于声明 FacesServlet 的 web.xml 文件\n\n• pom.xml：表示描述项目、其依赖项和插件的\
  \ Maven 项目对象模型（POM）\n\n**编写 Book 实体**\n\n关于清单 10-3，我不会深入太多细节，因为你现在应该已经理解 Book 实体的代码了。除了映射注解之外，请注意名为\
  \ findAllBooks 的命名查询，它从数据库中检索书籍。\n\n**清单 10-3.** *带有命名查询的 Book 实体*\n\n**@Entity**\n\
  \n\n\n**@NamedQuery**(name = \"**findAllBooks**\", query = \"SELECT b FROM Book\
  \ b\") public class Book {\n\n**@Id @GeneratedValue**\n\nprivate Long id;\n\n**@Column(nullable\
  \ = false)**\n\nprivate String title;\n\nprivate Float price;\n\n**@Column(length\
  \ = 2000)**\n\nprivate String description;\n\nprivate String isbn;\n\n**270**\n\n\
  第 10 章 ■ JavaServer Faces\n\nprivate Integer nbOfPage;\n\nprivate Boolean illustrations;\n\
  \n// 构造方法、getter、setter\n\n}\n\n如你所知，这个实体还需要与一个`persistence.xml`文件打包在一起，但为简单起见，此处不再展示。\n\
  \n**编写 BookEJB**\n\n清单 10-4 展示了一个无状态会话 Bean，它暴露了一个无接口视图。这意味着客户端（即受管 Bean）不需要接口（本地或远程），可以直接调用该\
  \ EJB。该 EJB 被注入了一个实体管理器的引用，通过它来持久化`Book`实体（`createBook()`方法），并从数据库中检索所有书籍（使用`findAllBooks`命名查询）。该\
  \ EJB 不需要部署描述符。\n\n**清单 10-4.** *一个创建和检索书籍的无状态 EJB*\n\n**@Stateless**\n\npublic\
  \ class BookEJB {\n\n**@PersistenceContext**(unitName = \"chapter10PU\")\n\nprivate\
  \ EntityManager em;\n\npublic List<Book> findBooks() {\n\nQuery query = em.createNamedQuery(\"\
  **findAllBooks**\");\n\nreturn query.getResultList();\n\n}\n\npublic Book createBook(Book\
  \ book) {\n\nem.persist(book);\n\nreturn book;\n\n}\n\n}\n\n**编写 BookController\
  \ 受管 Bean**\n\n受管 Bean 的职责之一是与应用程序的其他层（例如 EJB 层）交互，或执行验证。清单 10-5 中的`BookController`是一个受管\
  \ Bean，因为它使用了`@ManagedBean`注解。第二个注解`@RequestScoped`定义了 Bean 的生命周期；它持续整个请求的时长（注意还有其他作用域可供选择）。这个受管\
  \ Bean 包含两个将被页面使用的属性：\n\n• `bookList`是从数据库中检索到的书籍列表，用于在`listBooks.xhtml`页面中显示。\n\
  \n第 10 章 ■ JavaServer Faces\n\n**271**\n\n• `book`是会被映射到表单（`newBook.xhtml`页面）并持久化到数据库的对象。\n\
  \n所有业务处理（创建和检索书籍）都通过`BookEJB`完成。受管 Bean 使用`@EJB`注解注入了一个 EJB 的引用，并有两个将被页面调用的方法：\n\
  \n• `doNew()`：此方法不执行任何处理。它允许导航到`newBook.xhtml`。页面间的导航可以通过多种方式实现（如第 12 章所述）。最简单的方式是返回目标页面的名称。\n\
  \n• `doCreateBook()`：此方法通过调用无状态 EJB 并传入`book`属性来创建书籍。然后它再次调用 EJB 以从数据库中获取所有书籍。这个列表存储在受管\
  \ Bean 的`bookList`属性中。接着，该方法返回它需要导航到的页面名称。\n\n清单 10-5 展示了`BookController`受管 Bean。为了更好的可读性，这段代码中所有的\
  \ getter 和 setter 已被省略，但每个属性（`book`和`bookList`）都需要它们。\n\n**清单 10-5.** *调用 EJB 的\
  \ BookController 受管 Bean*\n\n**@ManagedBean**\n\n**@RequestScoped**\n\npublic class\
  \ BookController {\n\n**@EJB**\n\nprivate BookEJB bookEJB;\n\nprivate Book **book**\
  \ = new Book();\n\nprivate List<Book> bookList = new ArrayList<Book>();\n\npublic\
  \ String **doNew()** {\n\nreturn \"**newBook.xhtml**\";\n\n}\n\npublic String **doCreateBook()**\
  \ {\n\nbook = bookEJB.createBook(**book**);\n\nbookList = bookEJB.findBooks();\n\
  \nreturn \"**listBooks.xhtml**\";\n\n}\n\n// Getter、setter\n\n}\n\n**编写 newBook.xhtml\
  \ 页面**\n\n清单 10-6 中的`newBook.xhtml`页面是一个表单，允许用户输入创建书籍所需的数据（ISBN、标题、价格、描述、页数和插图）。\n\
  \n**272**\n\n第 10 章 ■ JavaServer Faces\n\n**清单 10-6.** *newBook.xhtml 页面*\n\n<!DOCTYPE\
  \ html PUBLIC \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\n\n\n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\
