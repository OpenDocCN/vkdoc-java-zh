  @Resource private **MessageDrivenContext** context;\n\nMDB 上下文\n\nMessageDrivenContext\
  \ 接口提供了对容器为 MDB 实例提供的运行时上下文的访问。容器将 MessageDrivenContext 接口传递给该实例，该接口在 MDB 的整个生命周期内保持关联。这使得\
  \ MDB 能够显式回滚事务、获取用户主体等。\n\n![Image 122](img/index-413_1.jpg)\n\n第 13 章 ■ 发送消息\n\n\
