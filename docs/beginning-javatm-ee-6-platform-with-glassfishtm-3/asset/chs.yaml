  在这个例子中，CSS 代码被嵌入到 XHTML 页面中。在实际应用中，所有样式都会写在一个单独的文件中，然后将该文件导入到网页中。网站管理员可以为不同的页面组制定一套或多套\
  \ CSS，然后内容贡献者就可以编写或修改页面，而无需关心其外观和感觉。\n\n与图 11-1 相比，最终结果是所有标签都变为斜体，并且标题变为蓝色（参见图 11-2）。\n\
  \n![Image 90](img/index-317_1.jpg)\n\n![Image 91](img/index-317_2.jpg)\n\n第 11 章\
  \ ■ 页面与组件\n\n**287**\n\n**图 11-2.** *newBook.xhtml 页面的图形化表示*\n\n**DOM**\n\n一个 XHTML\
  \ 页面是一个 XML 文档，因此具有文档对象模型（DOM）表示。DOM 是 W3C 的一项规范，用于访问和修改 XML 文档的内容和结构，也是一个用于查询、遍历和操作此类文档的抽象\
  \ API。DOM 可以被视为文档结构的树形表示。\n\n图 11-3 展示了 newBook.xhtml 页面作为 DOM 表示的样子；根节点是 html 标签，同一层级有\
  \ head 和 body，而 body 下是一个包含一系列 tr 标签的表格。\n\n**图 11-3.** *newBook.xhtml 页面的树形表示*\n\
  \nDOM 提供了一种与 XML 文档交互的标准方式。你可以遍历树并编辑节点的内容（树的叶子节点）。借助一些 JavaScript，你可以为网页引入动态效果。正如你将在下一章中看到的，Ajax\
  \ 基于 JavaScript 与网页的 DOM 表示进行交互。\n\n**288**\n\n第 11 章 ■ 页面与组件\n\n**JavaScript**\n\
  \n\n\n到目前为止，你已经看到了用于表示网页静态内容和图形方面的不同语言。但通常，网页需要通过显示动态内容来与最终用户交互。正如你将看到的，动态内容可以通过服务器端技术（如\
  \ JSP 或 JSF）来处理，但浏览器也可以通过执行 JavaScript 来实现这一点。\n\nJavaScript 是一种用于客户端 Web 开发的脚本语言。尽管名称如此，它与\
  \ Java 编程语言无关，因为它是一种解释型的、弱类型语言。通过编写与页面 DOM 交互的函数，JavaScript 是创建动态 Web 应用程序的强大方式。W3C\
  \ 标准化了 DOM，而欧洲计算机制造商协会（ECMA）则将 JavaScript 标准化为 ECMAScript 规范。任何使用这些标准（XHTML、CSS\
  \ 和 JavaScript）编写的页面，在任何遵循这些指南的浏览器中，其外观和行为应该基本一致。\n\nJavaScript 与 DOM 交互的一个例子是清单\
  \ 11-4 中的 newBook.xhtml 页面。该页面显示了一个表单，你可以在其中输入关于一本书的信息。在提交到服务器之前，书籍的价格需要在客户端由用户填写。为了进行这样的验证，你可以创建一个\
  \ JavaScript 函数（`priceRequired()`），用于检查价格文本字段是否为空。\n\n**清单 11-4.** *包含一些 JavaScript\
  \ 的 newBook.xhtml 页面*\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE\
  \ html\nPUBLIC \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\
  >](http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd)\n[<html xml:lang=\"\
  en\" lang=\"en\">](http://www.w3.org/1999/xhtml)\n<head>\n<title>创建一本新书</title>\n\
  **<script type=\"text/javascript\">**\nfunction **priceRequired()** {\nif (document.getElementById(\"\
  \ **price**\").value == \"\") {\ndocument.getElementById(\" **priceError**\").innerHTML\
  \ = ➥\n\"请填写价格！\";\n}\n}\n</script>\n</head>\n<body>\n<h1>创建一本新书</h1>\n<hr/>\n<table\
  \ border=\"0\">\n<tr>\n<td>ISBN :</td>\n<td><input type=\"text\"/></td>\n</tr>\n\
  <tr>\n第 11 章 ■ 页面与组件\n**289**\n<td>标题 :</td>\n<td><input type=\"text\"/></td>\n\
  </tr>\n<tr>\n<td>价格 :</td>\n<td><input id=\" **price**\" type=\"text\" ➥\n**onblur**=\"\
  javascript:**priceRequired()**\"/>\n<span id=\" **priceError**\"/>\n</td>\n</tr>\n\
  <tr>\n<td>描述 :</td>\n<td><textarea name=\"textarea\" cols=\"20\" rows=\"5\"></textarea></td>\n\
  </tr>\n<tr>\n<td>页数 :</td>\n<td><input type=\"text\"/></td>\n</tr>\n<tr>\n<td>插图\
  \ :</td>\n<td><input type=\"checkbox\"/></td>\n</tr>\n</table>\n<input name=\"\"\
  \ type=\"submit\" value=\"创建\"/>\n<hr/>\n<i>APress - Beginning Java EE 6</i>\n</body>\n\
  </html>\n```\n\n在清单 11-4 中，`priceRequired()` JavaScript 函数通过 `<script>` 标签嵌入在页面中。当价格文本字段失去焦点时（这就是\
  \ `onblur` 事件的作用），会调用此函数。`priceRequired()` 函数使用代表 XHTML 文档 DOM 的隐式 `document` 对象。`getElementById(\"\
  price\")` 方法查找一个标识符为 `price` 的元素（`<input id=\"price\">`），并检查它是否为空。如果为空，该函数会查找另一个名为\
  \ `priceError` 的元素（`getElementById(\"priceError\")`），并将其值设置为“请填写价格！”。如果价格未填写，客户端验证将显示如图\
  \ 11-4 所示的消息。\n\n![图片 92](img/index-320_1.jpg)\n\n**290**\n\n第 11 章 ■ 页面与组件\n\n\
  **图 11-4.** *显示错误消息的 newBook.html 页面*\n\nJavaScript 是一门丰富的语言。以上内容仅涵盖了展示 JavaScript\
  \ 与 DOM 交互的一小部分。理解 JavaScript 函数可以获取页面中的节点（通过名称或 ID，例如 `getElementById()` 方法）并在客户端动态更改其内容，这一点很重要。有关详细信息，请参阅下一章的“Ajax”部分。\n\
  \n**Java Server Pages**\n\n你刚刚了解了诸如 XHTML 或 CSS 之类的技术和语言，它们代表了\n\n\n\n静态网页的内容和视觉呈现。要增加交互性并动态改变网页的某些部分，你可以使用在浏览器中运行的\
  \ JavaScript 函数。\n\n但大多数情况下，你需要调用 EJB 的业务层来显示数据库中的数据。这种动态内容可以通过 JSP（或 JSF 结合 JSP\
  \ 或 Facelets，稍后你会看到）来获取。\n\nJSP 于 1999 年作为 J2EE 1.2 的一部分引入，允许开发人员创建动态生成的网页以响应客户端请求。页面在服务器端处理并编译为\
  \ Servlet。JSP 看起来像 HTML 或 XHTML 页面，但具有特殊的标签来执行服务器端处理、显示值以及调用服务器端 Java 代码。\n\nJSP\
  \ 的大部分功能都基于 Servlet API。Servlet 的开发是为了扩展服务器的能力，以接受来自客户端的 HTTP 请求并创建对这些请求的动态响应。Servlet\
  \ 可以使用任何服务器端资源，例如 EJB、数据库、Web 服务和其他组件，JSP 也可以。JSP 是动态的，因为它们执行 Java 代码来根据请求定制响应。\n\
  \nJSP 在服务器上的 Servlet 容器中运行，并响应来自客户端（用户）的请求，这些用户通过 HTTP（浏览器用于从 Web 服务器获取 XHTML 页面的相同协议）经由\
  \ Web 浏览器访问 Web 应用程序。Servlet 容器通过以下方式管理 JSP 的生命周期：\n\n第 11 章 ■ 页面与组件\n\n**291**\n\
  \n• 将 JSP 代码编译成 Servlet\n• 加载并初始化 JSP\n• 处理客户端请求并将其分派给 JSP\n• 向客户端返回响应（响应仅包含要在浏览器中显示的\
  \ HTML 或 XHTML 标签）\n• 卸载 JSP 并停止向 JSP 发送请求（例如，当服务器关闭时）\n\nHTML 和 XHTML 页面之间的区别在于后者严格遵守\
  \ XML 规则。类似地，JSP 可以生成 HTML 或严格的 XHTML（例如，对于严格的 XML 格式，你可以使用不同的文件扩展名 `.jsp` 和 `.jspx`）。那么，既然你已经了解了\
  \ JSP 的工作原理，让我们来看一些代码。\n\n```html\n<html>\n<head><title>列出所有书籍</title></head>\n\
  <body>\n<h1>列出所有书籍</h1>\n<hr/>\n</body>\n</html>\n```\n\n如你所见，一个有效的 JSP 可以仅由 HTML\
  \ 标签组成。你可以将此代码保存到 `listBooks.jsp` 页面中，并将其部署到 Servlet 容器中，该容器将返回一个简单的 HTML 页面。关键在于，JSP\
  \ 看起来像 HTML，但带有一些额外的标签，允许你添加动态内容，从而使对客户端的响应根据请求而变化。JSP 规范定义了以下元素：\n\n• 指令元素\n• 脚本元素\n\
  • 动作元素\n\n正如你将看到的，对于所有这些元素，JSP 规范定义了两种语法：用于 XHTML 页面的 XML 语法（例如，`<jsp:directive\
  \ attributes/>`）和不符合 XML 规范的 JSP 语法（例如，`<%@ attributes %>`）。\n\n**指令元素**\n\n指令元素提供关于\
  \ JSP 的信息，并且不产生任何输出。有三种指令：`page`、`include` 和 `taglib`。指令有两种语法形式：\n\n`<%@ directive\
  \ attributes %>`\n`<jsp:directive attributes />`\n\n`page` 指令用于指定页面属性，例如页面中使用的编程语言（此处为\
  \ Java）、MIME 类型、JSP 响应的字符编码、当前 JSP 是否打算用作错误页面等。\n\n**292**\n\n第 11 章 ■ 页面与组件\n\n\
  `<%@ page contentType=\"text/html; ISO-8859-1\" language=\"java\" %>`\n`<jsp:directive.page\
  \ contentType=\"text/html; ISO-8859-1\" language=\"java\"/>`\n\n`include` 指令用于在当前页面中包含另一个页面（HTML、XHTML\
  \ 或 JSP）。当你有一个标准页面（例如页眉或页脚）想要包含在多个 JSP 中时，可以使用此指令。\n\n`<%@ include file=\"header.jsp\"\
  %>`\n`<jsp:directive.include file=\"header.jsp\" />`\n\n\n\n“JSP 标准标签库”一节展示了如何通过标签库扩展\
  \ JSP。JSP 中的 taglib 指令声明页面使用了某个特定的标签库，该标签库通过 URI 和前缀唯一标识。在 XML 中，它转换为给定 URI 下的唯一命名空间（xmlns）。在以下示例中，[`java.sun.com/jstl/core\
  \ 标签库通过前缀 c 提供给页面使用`](http://java.sun.com/jstl/core)：\n\n< **%@ taglib** [uri=\"\
  http://java.sun.com/jstl/core\" prefix=\"](http://java.sun.com/jstl/core) **c**\"\
  \ %>\n\n< **jsp:root xmlns:c**[=\"http://java.sun.com/jstl/core\">](http://java.sun.com/jstl/core)\n\
  \n**脚本元素**\n\n脚本元素用于操作对象，并通过包含 Java 代码来执行影响内容的计算。脚本元素分为三类：声明、脚本片段和表达式。它们可以通过两种不同的语法来定义。\n\
  \n< **%!** 这是一个声明 %>\n\n< **jsp:declaration**>这是一个声明</jsp:declaration>\n\n< **%**\
  \ 这是一个脚本片段 %>\n\n< **jsp:scriptlet**>这是一个脚本片段</jsp:scriptlet>\n\n< **%=** 这是一个表达式\
  \ %>\n\n< **jsp:expression**>这是一个表达式</jsp:expression>\n\n声明用于声明 Java 变量或方法，这些变量或方法可供页面的所有其他脚本元素使用。声明仅出现在翻译后的\
  \ JSP（即 Servlet）中，而不会出现在发送给客户端的输出中。在声明元素中声明的任何变量或方法都会成为 JSP 的实例方法，并且对整个页面是全局的。例如，你可以如下声明一个\
  \ ArrayList：\n\n< **%!** ArrayList books = new ArrayList(); %>\n\n< **jsp:declaration**>ArrayList\
  \ books = new ArrayList();</jsp:declaration>\n\n脚本片段包含用于描述响应请求而执行的操作的 Java 代码。它们可用于执行诸如迭代和条件执行\
  \ JSP 中其他元素等操作。与声明一样，脚本片段中的代码出现在翻译后的 JSP（Servlet）中，但不会出现在发送给客户端的输出中。例如，你向一个 ArrayList\
  \ 添加一个 Book 对象，如下所示：\n\n第 11 章 ■ 页面与组件\n\n**293**\n\n< **%**\n\nbooks.add(new Book(\"\
  H2G2\", 12f, \"Scifi IT book\", \"1234-234\", 241, true));\n\n%>\n\n< **jsp:scriptlet**>\n\
  \nbooks.add(new Book(\"H2G2\", 12f, \"Scifi IT book\", \"1234-234\", 241, true));\n\
  \n</jsp:scriptlet>\n\n表达式用于将 Java 表达式的值输出到客户端。它们在响应时被求值，结果被转换为字符串并插入到输出流中，以便在浏览器中显示。例如，以下代码片段将显示一本书的\
  \ ISBN：\n\n< **%=** book.getIsbn()%>\n\n< **jsp:expression**>book.getIsbn()</jsp:expression>\n\
  \n声明、脚本片段和表达式必须包含有效的 Java 代码。当你选择使用 XML 语法时，其内容必须是有效的 XML。例如，要使用泛型声明一个 ArrayList\
  \ 来存放书籍，你可以这样做：\n\n<%! ArrayList**<Book>** books = new ArrayList**<Book>** (); %>\
  \ 如果你以严格的 XML 格式声明这个数组列表，它将无效，因为你包含了 < 和 > 符号，而这些符号在 XML 中已经具有打开和关闭标签的含义。为了允许这样的声明，你必须使用\
  \ CDATA。术语 CDATA（代表字符数据）用于指示 XML 解析器不应解析的内容。\n\n<jsp:declaration> **<![CDATA[**\n\
  \nArrayList<Book> books = new ArrayList<Book>();\n\n**]]>** </jsp:declaration>\n\
  \n**动作元素**\n\n标准动作由 JSP 规范定义，它们使页面执行某些操作（包含外部资源、将请求转发到另一个页面，或使用 Java 对象的属性）。它们看起来类似于\
  \ HTML 标签，因为它们使用带有 jsp 前缀的 XML 元素表示（例如，<jsp:useBean>、<jsp:include> 等）。表 11-1 列出了所有可用的动作元素。\n\
  \n**表 11-1.** *JSP 动作元素*\n\n**动作**\n\n**描述**\n\nuseBean\n\n在给定作用域内关联一个对象实例，并通过给定\
  \ ID 使其可用。\n\nsetProperty\n\n设置 Bean 中属性的值。\n\ngetProperty\n\n显示 Bean 属性的值。\n\n\
  include\n\n允许在与当前页面相同的上下文中包含静态和动态资源。\n\n*续*\n\n![Image 93](img/index-324_1.jpg)\n\
  \n**294**\n\n第 11 章 ■ 页面与组件\n\n**表 11-1.** *续*\n\n**动作**\n\n**描述**\n\nforward\n\n\
  将当前请求分派给与当前页面相同上下文中的静态资源、JSP 或 Servlet。\n\nparam\n\n用于 include、forward 和 params\
  \ 元素中。被包含或转发的页面将看到原始请求对象，其原始参数会附加新参数。\n\nplugin\n\n使 JSP 能够生成包含适当浏览器相关结构（OBJECT\
  \ 或 EMBED）的 HTML，这些结构将导致下载插件。\n\nparams\n\n传递参数。这是 plugin 动作的一部分。\n\nelement\n\n\
  动态定义 XML 元素标签的值。\n\nattribute\n\n定义 XML 属性。这是 element 动作的一部分。\n\nbody\n\n定义 XML\
  \ 元素的主体。这是 element 动作的一部分。\n\n**综合运用**\n\n这些元素允许你调用 Java 代码和任何类型的组件（EJB、数据库、Web\
  \ 服务等）。作为示例，让我们编写一些 Java 代码。你想要创建的网页必须显示存储在 ArrayList 中的书籍列表。这里没有数据库访问，只有一个用固定数量的\
  \ Book 对象初始化的 ArrayList，JSP 遍历该列表并显示属性（ISBN、书名、描述等）。结果应如图 11-5 所示。\n\n**图 11-5.**\
  \ *listBooks.jsp 页面显示书籍列表*\n\n要构建此页面，你需要几个元素。如清单 11-5 所示，你需要使用指令元素（<%@ page import=\"\
  java.util.ArrayList\" %>）导入 java.util.ArrayList 和 Book 类。导入后，你需要声明类型为 ArrayList\
  \ 的 books 属性，以便在整个页面中访问它。为此，你需要一个类型为声明的脚本元素（<%! ArrayList<Book> books = new ArrayList<Book>();\
  \ %>）。一个脚本片段将 book 对象添加到 ArrayList 中，另一个脚本片段使用 for 语句遍历列表。为了显示每本书的属性，使用了表达式元素（<%=\
  \ book.getTitle()%>）。页面的完整代码如清单 11-5 所示。\n\n第 11 章 ■ 页面与组件\n\n**295**\n\n**清单 11-5.**\
  \ *listBooks.jsp 页面*\n\n**<%@ page import=\"com.apress.javaee6.chapter11.Book\"\
  \ %>**\n\n**<%@ page import=\"java.util.ArrayList\" %>**\n\n**<%!**\n\n**ArrayList<Book>\
  \ books = new ArrayList<Book>();**\n\n**%>**\n\n<html>\n\n<head>\n\n<title>列出所有书籍</title>\n\
  \n</head>\n\n<body>\n\n<h1>列出所有书籍</h1>\n\n<hr/>\n\n**<%**\n\nbooks.add(new Book(\"\
  H2G2\", 12f, \"Scifi IT book\", \"1234-234\", 241, true)); books.add(new Book(\"\
  Robots\", 18.5f, \"Best seller\", \"564-694\", 317, true)); books.add(new Book(\"\
  Dune\", 23.25f, \"The trilogy\", \"256-6-56\", 529, true));\n\n**%>**\n\n<table\
  \ border=\"1\">\n\n<tr>\n\n<td>ISBN</td>\n\n<td>标题</td>\n\n<td>价格</td>\n\n<td>描述</td>\n\
  \n<td>页数</td>\n\n<td>插图</td>\n\n</tr>\n\n**<%**\n\n**Book book;**\n\n**for (int\
  \ i = 0; i < books.size(); i++) {**\n\n**book = books.get(i);**\n\n**%>**\n\n<tr>\n\
  \n<td> **<%= book.getIsbn()%>** </td>\n\n<td><%= book.getTitle()%></td>\n\n<td><%=\
  \ book.getPrice()%></td>\n\n<td><%= book.getDescription()%></td>\n\n<td><%= book.getNbOfPage()%></td>\n\
  \n<td><%= book.getIllustrations()%></td>\n\n</tr>\n\n**<%**\n\n**} // for 语句结束**\n\
  \n**%>**\n\n</table>\n\n<hr/>\n\n<i>APress - Beginning Java EE 6</i>\n\n</body>\n\
  \n</html>\n\n**296**\n\n第 11 章 ■ 页面与组件\n\n\n\n你可以自由地混合使用 Java 代码、HTML 标签和文本。脚本元素（`<%`\
  \ 和 `%>`）之间的内容都是 Java 代码，这些代码将在服务器上执行；而之外的内容则是模板数据，会被写入响应页面。请注意，在清单 11-5 中，`for`\
  \ 语句块的开始和结束位于不同的脚本元素中。如果你开始混合大量 HTML 标签和 Java 代码，JSP 很快就会变得难以阅读。此外，业务逻辑与表示层之间没有分离，这使得页面难以维护。而且你正在混合两种为不同人群设计的语言：Java\
  \ 面向业务开发人员，而 XHTML/CSS 面向网页设计师。\n\nJSP 可以使用标签库和表达式语言（EL）来解决这个问题。JSP 标准标签库（JSTL）使用网页开发人员熟悉的标记语言标准化了许多常见操作，而\
  \ EL 则使用更简单的语法来执行 JSP 脚本元素的某些相同操作。\n\n**表达式语言**\n\n你刚刚了解了如何在 JSP 中使用嵌入 Java 代码的脚本元素。EL\
  \ 语句提供了更简单的语法来执行类似的操作，并且对于非 Java 程序员来说更容易使用。你可以使用 EL 语句在页面中打印变量的值或访问对象的属性。它还拥有一套丰富的数学、逻辑和关系运算符。EL\
  \ 语句的基本语法是：\n\n`${expr}`\n\n其中 `expr` 是一个有效的表达式，会被解析和解释。从 JSP 2.1 开始，你还可以使用以下语法：\n\
  \n`#{expr}`\n\n对于 JSP 来说，`${expr}` 和 `#{expr}` 语句的解析和求值方式完全相同。然而，对于 JSF 来说情况则不同，因为正如你将看到的，JSF\
  \ 页面的生命周期与 JSP 不同。你可以将 `${expr}` 用于立即求值的表达式（该表达式在 JSP 编译时被编译，并在 JSP 执行时求值一次），而将\
  \ `#{expr}` 用于延迟求值的表达式（该表达式直到需要其值时才被求值）。这两种 EL 已经统一，因此 JSP 和 JSF 页面都可以使用两者，但存在生命周期差异。\n\
  \nEL 表达式可以使用大多数常见的 Java 运算符：\n\n-   **算术**：+、-、*、/ (div)、% (mod)\n-   **关系**：==\
  \ (eq)、!= (ne)、< (lt)、> (gt)、<= (le)、>= (ge)\n-   **逻辑**：&& (and)、|| (or)、! (not)\n\
  -   **其他**：()、empty、[]、.\n\n请注意，某些运算符既有符号形式也有单词形式（`>` 可以是 `gt`，`/` 可以是 `div`，等等）。这些等效形式允许你使\
  \ JSP 符合 XML 规范，同时避免使用实体引用（例如用 `&lt;` 表示 `<`）。一个“小于”可以编码为 `#{2 lt 3}` 而不是 `#{2 <\
  \ 3}`。\n\n`empty` 运算符测试一个对象是否为 `null`，或者它是否引用了一个空的 `String`、`List`、`Map` 或数组。如果为空则返回\
  \ `true`；否则返回 `false`。例如，如果 JSP 使用声明元素定义了一个 `Book` 对象（`<%! Book book = new Book();\
  \ %>`），你可以检查该对象或其某个属性是否为 `null`。\n\n`#{empty book}`\n\n`#{empty book.isbn}`\n\n\
  点运算符用于访问 `book` 对象的 `isbn` 属性。另一种语法是使用 `[]` 运算符；`isbn` 属性可以使用任何一种表示法来访问，如下所示：\n\n\
  `#{book.isbn}`\n\n`#{book[isbn]}`\n\nEL 2.2 的一个增强功能是能够调用方法。以下代码片段展示了如何通过调用 `book.buy()`\
  \ 方法来购买一本书，以及如何传递一个参数（所使用的货币）。\n\n`#{book.buy}`\n\n`#{book.buy('EURO')}`\n\nEL 语句可以与\
  \ JSP 和 JSF 页面、`faces-config.xml`、脚本元素或 JSTL 结合使用。\n\n**JSP 标准标签库**\n\n有一组有用的标准标签称为\
  \ JSTL，它允许你避免混合 Java 代码和 XHTML 标签。JSP 中的动态数据可以使用 XML 标签来操作，而不是\n\n\n\nJava 代码。这些操作涵盖从轻松设置对象值到捕获异常、通过条件和迭代器控制流程结构以及访问数据库等各个方面。\n\
  \n标签库是一组可在 JSP 或 JSF 页面中使用的函数集合。表 11-2 列出了这些函数，以及用于引用这些库的 URI 和相关的常用前缀（这些前缀是常用的，但也可以更改）。\n\
  \n**表 11-2.** *JSTL 标签库*\n\n**功能领域**\n\n**URI**\n\n**常用前缀**\n\n核心\n\n[`java.sun.com/jsp/jstl/core`](http://java.sun.com/jsp/jstl/core)\n\
  \nc\n\nXML 处理\n\n[`java.sun.com/jsp/jstl/xml`](http://java.sun.com/jsp/jstl/xml)\n\
  \nx\n\n国际化与格式化\n\n[`java.sun.com/jsp/jstl/fmt`](http://java.sun.com/jsp/jstl/fmt)\n\
  \nfmt\n\n数据库访问\n\n[`java.sun.com/jsp/jstl/sql`](http://java.sun.com/jsp/jstl/sql)\n\
  \nsql\n\n函数\n\n[`java.sun.com/jsp/jstl/functions`](http://java.sun.com/jsp/jstl/functions)\n\
  \nfn\n\n在使用这些操作之前，JSP 需要导入标签库 URI 并设置一个前缀。这可以通过使用 JSP 标记方案或符合 XML 语法的 JSP 指令元素来完成。\n\
  \n<%@ taglib uri=\" [**http://java.sun.com/jsp/jstl/core**\" prefix=\"](http://java.sun.com/jsp/jstl/core)\
  \ **c**\" %>\n\n// 或者\n\n**298**\n\n第 11 章 ■ 页面与组件\n\n[<jsp:root](http://java.sun.com/JSP/Page)\n\
  \nxmlns:**c**=\" [**http://java.sun.com/jstl/core**\" version=\"1.2\">](http://java.sun.com/jstl/core)\n\
  \n通过这样的声明，你可以使用核心标签库的所有操作，只需在操作前加上字母 c，如下所示：\n\n< **c:set** var=\"upperLimit\" value=\"\
  20\"/>\n\n这段代码为名为 upperLimit 的变量设置值 20。每个标签库都有一组可在 JSP 或 JSF 页面中使用的操作。\n\n**核心操作**\n\
  \n核心操作提供了用于操作变量、处理错误、执行测试以及执行循环和迭代的标签。表 11-3 显示了核心库中包含的操作。\n\n**表 11-3.** *核心操作*\n\
  \n**操作**\n\n**描述**\n\n<c:out>\n\n计算表达式并输出计算结果\n\n<c:set>\n\n为对象设置值\n\n<c:remove>\n\
  \n移除一个变量\n\n<c:catch>\n\n捕获其任何嵌套操作抛出的 java.lang.Throwable\n\n<c:if>\n\n计算表达式是否为真\n\
  \n<c:choose>\n\n提供互斥的条件\n\n<c:when>\n\n表示 <c:choose> 操作中的一个备选分支\n\n<c:otherwise>\n\
  \n表示 <c:choose> 操作中的最后一个备选分支\n\n<c:forEach>\n\n对对象集合重复执行嵌套体内容，或固定次数重复执行\n\n<c:forTokens>\n\
  \n遍历由提供的分隔符分隔的标记\n\n<c:import>\n\n导入一个资源\n\n<c:url>\n\n编码一个 URL\n\n<c:param>\n\n\
  向 URL 添加请求参数\n\n<c:redirect>\n\n重定向到特定的 URL\n\n为了演示其中一些标签的实际使用，让我们编写一个 JSP，该 JSP\
  \ 从数字 3 循环到数字 15，测试每个数字是奇数还是偶数，并在每个数字前显示此信息（参见清单 11-6）。\n\n**清单 11-6.** *显示奇数和偶数列表的\
  \ JSP*\n\n[<jsp:root](http://java.sun.com/JSP/Page)\n\n[**version=\"1.2\">**](http://java.sun.com/jstl/core)\n\
  \n<html>\n\n<body>\n\n第 11 章 ■ 页面与组件\n\n**299**\n\n< **c:set** var=\"upperLimit\"\
  \ value=\"20\"/>\n\n< **c:forEach** var=\"i\" begin=\"3\" end=\" **${upperLimit\
  \ - 5}**\">\n\n< **c:choose**>\n\n<c:when test=\"${i%2 == 0}\">\n\n< **c:out** value=\"\
  ${i} is even\"/><br/>\n\n</c:when>\n\n<c:otherwise>\n\n<c:out value=\"${i} is odd\"\
  /><br/>\n\n</c:otherwise>\n\n</c:choose>\n\n</c:forEach>\n\n</body>\n\n</html>\n\
  \n要使用核心标签库，页面需要导入其 URI 并指定一个前缀（即 XML 命名空间），使用 <c:set> 标签将值 20 赋给 upperLimit 变量，然后从数字\
  \ 3 迭代到数字 15。你可以看到 EL 与算术表达式 ${upperLimit - 5} 的用法。在循环内部，测试索引（变量 i）的值是奇数还是偶数（<c:when\
  \ test=\"${i%2 == 0}\">）。<c:out> 标签显示索引的值及其对应的文本（\"${i} is even\"）。\n\n\n\n逻辑完全通过标签实现，此页面完全符合\
  \ XML 规范，使用一种非 Java 程序员也能轻松阅读和理解的标记语言。\n\n**格式化操作**\n\n格式化操作为日期、数字、货币和百分比的格式化提供支持，同时也支持国际化（i18n）。您可以获取或设置区域设置和时区，也可以获取网页的编码。表\
  \ 11-4 展示了格式化库中包含的操作。\n\n**表 11-4.** *格式化操作*\n\n**操作**\n\n**描述**\n\n<fmt:message>\n\
  \n通过从消息资源束中提取消息来实现 JSP 的国际化\n\n<fmt:param>\n\n为 <fmt:message> 提供参数\n\n<fmt:bundle>\n\
  \n确定资源束\n\n<fmt:setLocale>\n\n设置区域设置\n\n<fmt:requestEncoding>\n\n设置请求的字符编码\n\n<fmt:timeZone>\n\
  \n指定时间信息格式化时所使用的时区\n\n<fmt:setTimeZone>\n\n将指定的时区存储到一个变量中\n\n*续*\n\n**300**\n\n\
  第 11 章 ■ 页面与组件\n\n**表 11-4.** *续*\n\n**操作**\n\n**描述**\n\n<fmt:formatNumber>\n\n\
  以区域设置敏感的方式格式化数值（数字、货币、百分比）\n\n<fmt:parseNumber>\n\n解析数字、货币和百分比的字符串表示形式\n\n<fmt:formatDate>\n\
  \n以区域设置敏感的方式格式化日期和时间\n\n<fmt:parseDate>\n\n解析日期和时间的字符串表示形式\n\n要理解这些标签，请查看清单 11-7\
  \ 中所示的 JSP，它使用其中一些操作来格式化日期和数字，并实现货币的国际化。\n\n**清单 11-7.** *一个格式化日期和数字的 JSP*\n\n<%@\
  \ page contentType=\"text/html;charset=UTF-8\" language=\"java\" %>\n\n[**<%@ taglib\
  \ uri=\"http://java.sun.com/jsp/jstl/core\" prefix=\"c\" %>**](http://java.sun.com/jsp/jstl/core)\n\
  \n[**<%@ taglib uri=\"http://java.sun.com/jsp/jstl/fmt\" prefix=\"fmt\" %>**](http://java.sun.com/jsp/jstl/fmt)\n\
  \n<html>\n\n<body>\n\n日期\n\n<c:set var=\" **now**\" value=\"<%=new java.util.Date()%>\"\
  />\n\n<fmt:**formatDate** type=\"time\" value=\"${now}\"/>\n\n<fmt:formatDate type=\"\
  date\" value=\"${now}\"/>\n\n<fmt:formatDate type=\"both\" dateStyle=\"short\" timeStyle=\"\
  short\" ➥\n\nvalue=\"${now}\"/>\n\n<fmt:formatDate type=\"both\" dateStyle=\"long\"\
  \ timeStyle=\"long\" ➥\n\nvalue=\"${now}\"/>\n\n货币\n\n<fmt:**setLocale** value=\"\
  \ **en_us**\"/>\n\n<fmt:formatNumber value=\"20.50\" type=\" **currency**\"/>\n\n\
  <fmt:setLocale value=\" **en_gb**\"/>\n\n<fmt:**formatNumber** value=\"20.50\" type=\"\
  currency\"/>\n\n</body>\n\n</html>\n\n该页面使用 <%@ taglib> 指令元素导入核心标签库和格式化标签库。`<c:set\
  \ var=\"now\" value=\"<%=new java.util.Date()%>\"/>` 这行代码将当前日期设置到一个名为 `now` 的变量中。`<fmt:formatDate>`\
  \ 标签使用不同的模式来格式化这个日期：仅显示时间、仅显示日期、同时显示时间和日期。`<fmt:setLocale value=\"en_us\"/>` 这行代码将区域设置为美国并格式化货币，结果为\
  \ $20.50。然后，区域设置更改为英国，结果变为英镑。此 JSP 产生以下结果：\n\n第 11 章 ■ 页面与组件\n\n**301**\n\n日期\n\n\
  11:31:12\n\n2009 年 5 月 14 日\n\n09/02/14 11:31\n\n2009 年 5 月 14 日 11:31:12 CET\n\n\
  货币\n\n**$**20.50\n\n**£**20.50\n\n**SQL 操作**\n\nJSTL SQL 操作允许进行数据库查询（插入、更新和删除）、访问查询结果，甚至建立事务上下文。您已经了解了如何使用\
  \ EJB 和 JPA 实体访问数据库。有时，对于特定的应用程序，您需要从网页访问数据库（例如，用于一个非关键性的、偶尔由单个用户使用的管理型 Web 应用程序）。对于这类用例，SQL\
  \ 库及其丰富的标签集非常有用（参见表 11-5）。\n\n**表 11-5.** *SQL 操作*\n\n**操作**\n\n**描述**\n\n<sql:query>\n\
  \n查询数据库\n\n<sql:update>\n\n执行 SQL INSERT、UPDATE 或 DELETE 语句\n\n<sql:transaction>\n\
  \n为 <sql:query> 和 <sql:update> 子标签建立事务上下文\n\n<sql:setDataSource>\n\n设置数据源\n\n<sql:param>\n\
  \n设置 SQL 语句中参数标记 (?) 的值\n\n<sql:dateParam>\n\n\n\n设置 SQL 语句中参数标记（?）的值，用于 `java.util.Date`\
  \ 类型的值\n\n清单 11-8 所示的 JSP 访问数据库，检索 BOOK 表中包含的所有书籍行，并将其显示出来。\n\n**清单 11-8.** *一个访问数据库并检索所有书籍的\
  \ JSP*\n\n<%@ page contentType=\"text/html;charset=UTF-8\" language=\"java\" %>\n\
  \n[<%@ taglib uri=\"http://java.sun.com/jsp/jstl/core\" prefix=\"c\" %>](http://java.sun.com/jsp/jstl/core)\n\
  \n[**<%@ taglib uri=\"http://java.sun.com/jsp/jstl/sql\" prefix=\"sql\" %>**](http://java.sun.com/jsp/jstl/sql)\n\
  \n<html>\n\n<head>\n\n<title>列出所有书籍</title>\n\n</head>\n\n<body>\n\n<h1>列出所有书籍</h1>\n\
  \n<hr/>\n\n**302**\n\n第 11 章 ■ 页面与组件\n\n**<sql:setDataSource dataSource=\"jdbc/__default\"\
  />**\n\n**<sql:query var=\"books\">**\n\n**select * from book**\n\n**</sql:query>**\n\
  \n<table border=\"1\">\n\n<tr>\n\n<th>ISBN</th>\n\n<th>标题</th>\n\n<th>价格</th>\n\n\
  <th>描述</th>\n\n<th>页数</th>\n\n<th>插图</th>\n\n</tr>\n\n<c:forEach var=\"row\" items=\"\
  \ **${books.rows}**\">\n\n<tr>\n\n<td><c:out value=\"${row.isbn}\"/></td>\n\n<td><c:out\
  \ value=\"${row.title}\"/></td>\n\n<td><c:out value=\"${row.price}\"/></td>\n\n\
  <td><c:out value=\"${row.description}\"/></td>\n\n<td><c:out value=\"${row.nbOfPage}\"\
  /></td>\n\n<td><c:out value=\"${row.illustrations}\"/></td>\n\n</tr>\n\n</c:forEach>\n\
  \n</table>\n\n<hr/>\n\n<i>APress - Beginning Java EE 6</i>\n\n</body>\n\n</html>\n\
  \n这个 JSP 首先需要使用 <%@ taglib> 指令元素导入 sql 标签库，并设置数据源（在此示例中，是 GlassFish 自带的默认数据源 jdbc/__default）。执行查询\
  \ `select * from book`，结果存储在 `books` 变量中。可以通过 `books.rows` 访问结果，`<c:forEach>` 标签遍历这个行集合。结果与之前图\
  \ 11-5 所示相同。\n\n**XML 操作**\n\n在某些方面，XML 标签库与核心库类似；它拥有用于执行 XML 解析的核心标签、用于遍历元素集合的流程控制标签、基于\
  \ XPath 表达式的操作，以及使用 XSLT 文档进行 XML 转换。表 11-6 显示了 XML 库中包含的操作。\n\n第 11 章 ■ 页面与组件\n\
  \n**303**\n\n**表 11-6.** *XML 操作*\n\n**操作**\n\n**描述**\n\n<x:parse>\n\n解析一个 XML 文档。\n\
  \n<x:out>\n\n计算一个 XPath 表达式并输出结果。\n\n<x:set>\n\n计算一个 XPath 表达式并将结果存储到一个变量中。\n\n\
  <x:if>\n\n如果表达式计算结果为 true，则计算该 XPath 表达式。\n\n<x:choose>\n\n提供互斥的条件。\n\n<x:when>\n\
  \n表示 <x:choose> 操作中的一个备选分支。\n\n<x:otherwise>\n\n表示 <x:choose> 操作中的最后一个备选分支。\n\n\
  <x:forEach>\n\n计算一个 XPath 表达式并对其结果重复执行其内容。\n\n<x:transform>\n\n对 XML 文档应用 XSLT 样式表转换。\n\
  \n<x:param>\n\n设置转换参数。<x:transform> 的嵌套操作。\n\n要使用这些标签执行一些 XML 操作，首先需要创建一个 XML 文档。清单\
  \ 11-9 中的 `books.xml` 文件包含一个书籍列表，其中的数据存储在 XML 元素和 XML 属性中。\n\n**清单 11-9.** *books.xml\
  \ 文件*\n\n<?xml version='1.0' encoding='UTF-8'?>\n\n<books>\n\n<book isbn='1234-234'\
  \ price='12' nbOfPage='241' illustrations='true'>\n\n<title>H2G2</title>\n\n<description>科幻\
  \ IT 书籍</description>\n\n</book>\n\n<book isbn='564-694' price='18.5' nbOfPage='317'\
  \ illustrations='true'>\n\n<title>机器人</title>\n\n<description>畅销书</description>\n\
  \n</book>\n\n<book isbn='256-6-56' price='23.25' nbOfPage='529' ➥\n\nillustrations='false'>\n\
  \n<title>沙丘</title>\n\n<description>三部曲</description>\n\n</book>\n\n</books>\n\n\
  为了正常运行，这个 `books.xml` 文件必须与 JSP 一起部署，或者通过 URL 导入。\n\n清单 11-10 中的 JSP 解析该文件并在页面上显示所有书籍。\n\
  \n**304**\n\n第 11 章 ■ 页面与组件\n\n**清单 11-10.** *解析 books.xml 文件并显示其内容的 JSP*\n\n<%@\
  \ page contentType=\"text/html;charset=UTF-8\" language=\"java\" %>\n\n[<%@ taglib\
  \ uri=\"http://java.sun.com/jsp/jstl/core\" prefix=\"c\" %>](http://java.sun.com/jsp/jstl/core)\n\
  \n[**<%@ taglib uri=\"http://java.sun.com/jsp/jstl/xml\" prefix=\"x\" %>**](http://java.sun.com/jsp/jstl/xml)\n\
  \n<html>\n\n<body>\n\n<table border=\"1\">\n\n<tr>\n\n<th>ISBN</th>\n\n<th>标题</th>\n\
  \n<th>价格</th>\n\n<th>描述</th>\n\n<th>页数</th>\n\n<th>插图</th>\n\n</tr>\n\n**<c:import\
  \ url=\"books.xml\" var=\"bookUrl\"/>**\n\n**<x:parse xml=\"${bookUrl}\" var=\"\
  doc\"/>**\n\n**<x:forEach var=\"b\" select=\"$doc/books/book\">**\n\n<tr>\n\n<td><x:out\
  \ select=\" **$b/@isbn**\"/></td>\n\n<td><x:out select=\" **$b/title**\"/></td>\n\
  \n<td><x:out select=\" **$b/@price**\"/></td>\n\n<td><x:out select=\" **$b/description**\"\
  /></td>\n\n<td><x:out select=\" **$b/@nbOfPage**\"/></td>\n\n<td><x:out select=\"\
  \ **$b/@illustrations**\"/></td>\n\n</tr>\n\n**</x:forEach>**\n\n</table>\n\n</body>\n\
  \n</html>\n\n首先，这个 JSP 需要导入 XML 标签库（使用指令 <%@ taglib>），然后访问 `books.xml` 文件，该文件通过\
  \ `<c:import>` 标签加载到变量 `bookUrl` 中。`bookUrl` 包含原始文本，需要使用 `<x:parse>` 标签进行解析，生成的\
  \ DOM 存储在变量 `doc` 中。文档解析完成后，遍历它并使用 `<x:out>` 通过 XPath 表达式显示值（`/@isbn` 表示 XML 属性，`/title`\
  \ 表示 XML 元素）。结果与图 11-5 相同。\n\n**函数**\n\n函数不是标签，而是在 JSTL 规范中定义的。它们可以与 EL 一起使用，主要用于处理字符串操作。例如：\n\
  \n${fn:contains(\"H2G2\", \"H2\")}\n\n第 11 章 ■ 页面与组件\n\n**305**\n\n这段代码检查一个字符串是否包含子字符串。在此示例中，它将返回\
  \ true，因为 H2G2 包含 H2。以下函数返回字符串或集合的长度。结果将是 4。\n\n${fn:length(\"H2G2\")}\n\n这些函数可以在\
  \ JSP 中显示其结果（在 `<c:out>` 标签内），并且可以在测试或循环中使用。\n\n<%@ page contentType=\"text/html;charset=UTF-8\"\
  \ language=\"java\" %>\n\n[**<%@ taglib uri=\"http://java.sun.com/jsp/jstl/core\"\
  \ prefix=\"c\" %>**](http://java.sun.com/jsp/jstl/core)\n\n[**<%@ taglib uri=\"\
  http://java.sun.com/jsp/jstl/fn\" prefix=\"fn\" %>**](http://java.sun.com/jsp/jstl/fn)\n\
  \n<html>\n\n<body>\n\n<c:out value=\"${fn:toLowerCase(sentence)}\" />\n\n<c:if test=\"\
  ${fn:length('H2G2') == 4}\">\n\nH2G2 是四个字符长\n\n</c:if>\n\n</body>\n\n</html>\n\n\
  表 11-7 显示了库中包含的所有函数。\n\n**表 11-7.** *函数*\n\n**函数**\n\n**描述**\n\nfn:contains\n\n\
  测试一个字符串是否包含指定的子字符串\n\nfn:containsIgnoreCase\n\n测试一个字符串是否包含指定的子字符串（不区分大小写）\n\nfn:endsWith\n\
  \n测试一个字符串是否以指定的后缀结尾\n\nfn:escapeXml\n\n转义可能被解释为 XML 标记的字符\n\nfn:indexOf\n\n返回指定子字符串在字符串中第一次出现的位置索引\n\
  \nfn:join\n\n将数组的所有元素连接成一个字符串\n\nfn:length\n\n返回集合中的项目数或字符串中的字符数\n\nfn:replace\n\
  \n返回一个字符串，该字符串通过将输入字符串中所有出现的子字符串替换为另一个字符串得到\n\nfn:split\n\n将一个字符串分割成子字符串数组\n\nfn:startsWith\n\
  \n测试一个字符串是否以指定的前缀开头\n\nfn:substring\n\n返回一个字符串的子集\n\nfn:substringAfter\n\n返回一个字符串中特定子字符串之后的部分\n\
  \nfn:substringBefore\n\n返回一个字符串中特定子字符串之前的部分\n\nfn:toLowerCase\n\n将字符串中的所有字符转换为小写\n\
  \nfn:toUpperCase\n\n将字符串中的所有字符转换为大写\n\nfn:trim\n\n移除字符串两端的空白字符\n\n**306**\n\n第 11\
  \ 章 ■ 页面与组件\n\n**Facelets**\n\n\n\n当 JSF 被创建时，其初衷是复用 JSP 作为主要的页面描述语言（PDL），因为 JSP\
  \ 已是 Java EE 的一部分。JSP 使用 EL 和 JSTL，因此想法是在 JSF 中利用所有这些技术。JSP 是一种页面语言，而 JSF 是构建于其上的组件层。然而，JSP\
  \ 和 JSF 的生命周期并不契合。JSP 中的标签会从上到下一次性处理以生成响应。而 JSF 拥有更复杂的生命周期，其中组件树的生成和渲染发生在不同阶段。这正是\
  \ Facelets 发挥作用之处：为了适配 JSF 的生命周期。\n\nFacelets 是 JSP 的一个开源替代方案。与 JSP、EL 和 JSTL 不同，它没有对应的\
  \ JSR 规范，也不属于 Java EE。Facelets 替代了 JSP，并为基于 JSF 的应用程序页面提供了一种基于 XML 的替代方案（XHTML）。Facelets\
  \ 在设计时充分考虑了 JSF，因此它提供了比 JSP 更简单的编程模型。\n\nFacelets 附带了一个用于编写用户界面的标签库，并提供了对 JSTL 标签的部分支持。虽然函数标签库得到完全支持，但只有少数核心标签得到支持（c:if、c:forEach、c:catch\
  \ 和 c:set）。但 Facelets 的关键特性是其页面模板功能，这比 JSP 的模板更灵活。它还允许你创建自定义组件，用于 JSF 组件树模型。\n\n\
  [Facelets 标签库由 URI http://java.sun.com/jsf/facelets 定义](http://java.sun.com/jsf/facelets)，通常使用\
  \ ui 前缀。表 11-8 列出了所有可用的标签。\n\n**表 11-8.** *Facelets 标签*\n\n**标签**\n\n**描述**\n\n\
  <ui:composition>\n\n定义一个组合，该组合可选地使用一个模板。多个组合可以使用同一个模板。\n\n<ui:component>\n\n创建一个组件。\n\
  \n<ui:debug>\n\n捕获调试信息。\n\n<ui:define>\n\n定义由模板插入到页面中的内容。\n\n<ui:decorate>\n\n允许你装饰页面中的某些内容。\n\
  \n<ui:fragment>\n\n添加页面的一部分片段。\n\n<ui:include>\n\n封装并在多个 XHTML 页面间复用内容，类似于 JSP 的<jsp:include>。\n\
  \n<ui:insert>\n\n将内容插入到模板中。\n\n<ui:param>\n\n向包含的文件（使用<ui:include>）或模板传递参数。\n\n\
  <ui:repeat>\n\n作为<c:forEach>的替代方案。\n\n<ui:remove>\n\n从页面中移除内容。\n\nFacelets 页面使用\
  \ XHTML 编写，看起来就像你之前在清单 11-2 中看到的那样。在本章的“模板”部分，你将看到如何使用 Facelets 进行模板化。\n\n第 11 章\
  \ ■ 页面与组件\n\n**307**\n\n**JavaServer Faces**\n\n我在本章开始时介绍了 JSP、JSTL 和 Facelets，因为它们对于理解\
  \ JSF 2.0 至关重要。在编写 JSF 时，你需要选择一种 PDL。在 JSF 1.2 之前，JSP 是首选的 PDL。JSP 和 JSF 具有不同的页面生命周期；在\
  \ JSF 2.0 中，首选的 PDL 是 Facelets（XHTML 格式的页面）。这并不意味着你不能使用 JSP，但确实意味着你在标签和功能方面会受到限制。\n\
  \nJSP 的生命周期相对简单。JSP 源文件被编译成一个 Servlet，当 Web 容器收到 HTTP 请求时，它会将请求传递给该 Servlet。Servlet\
  \ 处理请求，然后将响应写回客户端。\n\nJSF 的生命周期更复杂，这就是为什么在“表达式语言”部分，我向你展示了两种不同的语法：一种使用美元符号（${expression}），另一种使用井号（#{expression}）。$用于可以立即执行的表达式（当你确定表达式中的对象可用时），而#用于延迟表达式（需要在生命周期后期进行评估）。\n\
  \n在 JSF 1.2 中，这两种语法被统一了，但这导致了许多混淆和错误。\n\n例如，如果你使用 JSP 作为 PDL，你将无法访问某些 JSF 标签（例如\
  \ Facelets 标签）。在本节中，我将使用 Facelets 作为 PDL。\n\n表 11-9 列出了 Facelets PDL 页面可以使用的所有标签库。\n\
  \n\n\nJSTL 部分中的函数和核心库、Facelets 标签（带有 ui 前缀）以及新标签（如 JSF 的核心标签和 HTML 标签，以及允许创建自定义组件的\
  \ composite 标签）均包含在内。其他 JSTL 标签（格式化、SQL 和 XML 操作）不受 Facelets 支持。\n\n**表 11-9.**\
  \ *Facelets PDL 允许使用的标签库*\n\n**URI**\n\n**常用前缀**\n\n**描述**\n\n[`java.sun.com/jsf/html`](http://java.sun.com/jsf/html)\n\
  \nh\n\n此标签库包含组件及其 HTML 渲染器（h:commandButton、h:commandLink、h:inputText 等）。\n\n[`java.sun.com/jsf/core`](http://java.sun.com/jsf/core)\n\
  \nf\n\n此标签库包含独立于任何特定渲染的自定义操作（f:selectItem、f:validateLength、f:convertNumber 等）。\n\
  \n[`java.sun.com/jsf/facelets`](http://java.sun.com/jsf/facelets)\n\nui\n\n此标签库中的标签用于添加模板支持。\n\
  \n[`java.sun.com/jsf/composite`](http://java.sun.com/jsf/composite)\n\ncomposite\n\
  \n此标签库用于声明和定义复合组件。\n\n[`java.sun.com/jsp/jstl/core`](http://java.sun.com/jsp/jstl/core)\n\
  \nc\n\nFacelets 页面可以使用部分核心 JSP 标签库（<c:if/>、<c:forEach/> 和 <c:catch/>）。\n\n[`java.sun.com/jsp/jstl/functions`](http://java.sun.com/jsp/jstl/functions)\n\
  \nfn\n\nFacelets 页面可以使用所有函数 JSP 标签库。\n\n![Image 94](img/index-338_1.jpg)\n\n**308**\n\
  \n第 11 章 ■ 页面与组件\n\n现在让我们聚焦于 JSF HTML 组件，它们将帮助你创建丰富的 Web 界面。第 12 章将展示包含转换器和验证器的大部分\
  \ JSF 核心库。但首先，让我们了解一下 JSF 页面的生命周期。\n\n**生命周期**\n\nJSF 页面是一个具有特定生命周期的组件树。你应该理解它，以便知道组件何时被验证或模型何时被更新。点击按钮会触发一个从你的\
  \ Web 浏览器发送到服务器的请求。这个请求被转换为一个事件，可以由服务器上的应用程序逻辑处理。用户输入的所有数据在模型更新和任何业务逻辑调用之前，都会进入一个验证阶段。然后，JSF\
  \ 负责确保每个图形组件（子组件和父组件）都能正确地渲染到浏览器。图 11-6 展示了 JSF 页面生命周期的不同阶段。\n\n**图 11-6.** *JSF\
  \ 生命周期*\n\nJSF 生命周期分为六个不同的阶段：\n\n****1.** *恢复视图*：JSF 找到目标视图并将用户的输入应用到该视图上。如果这是客户端首次访问该页面，JSF\
  \ 会创建一个 UIViewRoot 组件（构成特定页面的组件树的根）作为视图。如果这是后续请求，则会检索之前保存的 UIViewRoot 来处理当前的 HTTP\
  \ 请求。\n\n****2.** *应用请求值*：来自请求的值（来自 Web 表单的输入字段、Cookie 或请求头）会被应用到页面的各个组件上。请注意，只有\
  \ UI 组件会更新其状态——构成模型的业务对象不会更新。\n\n****3.** *处理验证*：在前述步骤之后，UI 组件已设置好值。在验证处理过程中，JSF\
  \ 遍历组件树，并要求每个组件确保其提交的值是可接受的。如果所有组件的转换和验证都成功，生命周期将继续进入下一阶段。否则，生命周期将进入*渲染响应*阶段，并附带相应的验证和转换错误消息。\n\
  \n第 11 章 ■ 页面与组件\n\n**309**\n\n****4.** *更新模型值*：在所有组件的值都已设置并验证通过后，你可以更新与它们关联的管理\
  \ Bean。\n\n****5.** *调用应用程序*：现在你可以执行一些业务逻辑。任何被触发的操作都将在管理 Bean 上执行，并且导航在此处生效，因为其返回值将决定渲染响应。\n\
  \n\n\n****6.** *渲染响应*：为了实现此阶段的主要目标，需将响应发送回用户。次要目标是保存视图状态，以便在用户再次请求时，能够在恢复视图阶段将其还原。\n\
  \n请求/响应周期的执行线程可以流经每个阶段，也可以不流经，具体取决于请求及其处理过程中发生的情况；如果发生错误，执行流程会立即转移到渲染响应阶段。请注意，其中四个阶段可以生成消息：应用请求值、处理验证、更新模型值和调用应用程序。无论是否有消息，都是渲染响应阶段将输出发送回用户。\n\
  \n**标准 HTML 组件**\n\nJSF 的架构设计独立于任何特定的协议或标记语言，并且它也用于编写通过 HTTP 通信的 HTML 客户端的应用程序。\n\
  \n特定网页的用户界面是通过组装组件来创建的。组件提供与最终用户交互的特定功能（标签、表格、复选框等）。\n\nJSF 提供了许多组件类，涵盖了大多数常见需求。\n\
  \n页面是一个类树，它扩展了 `javax.faces.component.UIComponent`，并具有属性、方法和事件。树中的组件与其他组件具有父子关系，从树的根元素（即\
  \ `UIViewRoot` 的实例）开始。\n\n让我们专注于在网页上使用这些组件。\n\n**命令**\n\n命令是用户可以点击以触发操作的控件。此类组件通常呈现为按钮或超链接。表\
  \ 11-10 列出了可以使用的两个命令标签。\n\n**表 11-10.** *命令标签*\n\n**标签**\n\n**描述**\n\n`<h:commandButton>`\n\
  \n表示类型为 submit 或 reset 的按钮的 HTML 输入元素。\n\n`<h:commandLink>`\n\n表示行为类似于提交按钮的超链接的\
  \ HTML 元素。此组件必须放置在表单内部。\n\n如果你需要在页面上添加提交按钮、重置按钮、可点击的图片或触发事件的超链接，请按如下方式操作：\n\n`<h:commandButton\
  \ value=\"一个提交按钮\"/>`\n\n`<h:commandButton **type=\"reset\"** value=\"一个重置按钮\"/>`\n\
  \n`<h:commandButton **image=\"javaee6.gif\"** title=\"带图片的按钮\"/>`\n\n`<h:commandLink>一个超链接</h:commandLink>`\n\
  \n![Image 95](img/index-340_1.jpg)\n\n**310**\n\n第 11 章 ■ 页面与组件\n\n默认情况下，commandButton\
  \ 的类型为 submit，但可以更改为 reset 类型（type=\"reset\"）。如果你想将按钮变成图片，请不要使用 value 属性（那是按钮的名称），而应使用\
  \ image 属性来指定要显示的图片路径。以下是上述代码的图形结果：\n\n按钮和链接都有一个 action 属性，用于调用受管 bean 上的方法。\n\n\
  要调用 bookController 的 doNew() 方法，请使用表达式语言在 action 属性中指定它，如下所示：\n\n`<h:commandLink\
  \ **action**=\" **#{bookController.doNew}**\">`\n\n创建一本新书\n\n`</h:commandLink>`\n\
  \n**输入**\n\n输入组件是向用户显示其当前值，并允许用户输入不同类型文本信息的组件。这些可以是文本字段、文本区域，或用于输入密码或隐藏数据的组件。输入标签列于表\
  \ 11-11 中。\n\n**表 11-11.** *输入标签*\n\n**标签**\n\n**描述**\n\n`<h:inputHidden>`\n\n表示类型为\
  \ hidden 的 HTML 输入元素。\n\n`<h:inputSecret>`\n\n表示类型为 password 的 HTML 输入元素。重新显示时，任何先前输入的值都不会被渲染（出于安全原因），除非\
  \ redisplay 属性设置为 true。\n\n`<h:inputText>`\n\n表示类型为 text 的 HTML 输入元素。\n\n`<h:inputTextarea>`\n\
  \n表示 HTML 文本区域元素。\n\n许多网页包含表单，用户必须在其中输入一些数据或使用密码登录。输入组件具有多个属性，允许你更改其长度、内容或外观，如下所示：\n\
  \n\n\n<h:inputHidden value=\"隐藏数据\"/>\n\n<h:inputSecret **maxlength=\"8\"** />\n\
  \n<h:inputText value=\"输入文本\"/>\n\n<h:inputText **size=\"40\"** value=\"较长的输入文本\"\
  />\n\n<h:inputTextarea **rows=\"4\" cols=\"20\"** value=\"文本区域\"/>\n\n![图片 96](img/index-341_1.jpg)\n\
  \n第 11 章 ■ 页面与组件\n\n**311**\n\n所有组件都有一个用于设置默认值的 value 属性。你可以使用\nmaxLength 属性来检查输入的文本是否超过特定长度，或者使用\
  \ size 属性来更改组件的默认大小。上述代码将呈现如下图形：\n\n输出\n\n输出组件用于显示值，该值可以来自受管 Bean、值表达式或固定文本。用户无法直接修改该值，因为它仅用于显示。表\
  \ 11-12 列出了可用的输出标签。\n\n**表 11-12.** *输出标签*\n\n**标签**\n\n**描述**\n\n<h:outputLabel>\n\
  \n渲染一个 HTML <label> 元素\n\n<h:outputLink>\n\n渲染一个 HTML <a> 锚点元素\n\n<h:outputText>\n\
  \n输出文本\n\n大多数网页都需要显示一些文本。你可以使用普通的 HTML 元素来实现，但 JSF 输出标签允许你使用 EL 显示绑定到受管 Bean 的变量内容。你可以使用\
  \ <h:outputText> 显示文本，使用 <h:outputLink> 显示超文本链接。请注意，<h:commandLink> 和 <h:outputLink>\
  \ 的区别在于，后者显示链接，但点击时不会调用任何方法。它只是创建一个外部链接或锚点。\n\n<h:outputLabel value=\" **#{bookController.book.title}**\"\
  />\n\n<h:outputText value=\"一段文本\"/>\n\n[<h:outputLink value=\"http://www.apress.com/\"\
  >一个链接</h:outputLink>](http://www.apress.com/)\n\n上述代码没有特殊的图形表示。以下是其 HTML 渲染结果：\n\
  \n<label>书的标题</label>\n\n一段文本\n\n[<a href=\"http://www.apress.com/\">一个链接</a>](http://www.apress.com/)\n\
  \n**312**\n\n第 11 章 ■ 页面与组件\n\n选择\n\n选择组件（见表 11-13）用于从列表中选择一个或多个值，表现形式为复选框、单选按钮、列表或组合框。它们允许用户在确定的可用选项集中进行选择。\n\
  \n**表 11-13.** *选择标签*\n\n**标签**\n\n**描述**\n\n<h:selectBooleanCheckbox>\n\n渲染一个表示单个布尔值的复选框。该复选框将根据属性的值决定是否被选中。\n\
  \n<h:selectManyCheckbox>\n\n渲染一个复选框列表。\n\n<h:selectManyListbox>\n\n渲染一个多选组件，其中可以选择一个或多个选项。\n\
  \n<h:selectManyMenu>\n\n渲染一个 HTML <select> 元素。\n\n<h:selectOneListbox>\n\n渲染一个单选组件，其中只能选择一个可用选项。\n\
  \n<h:selectOneMenu>\n\n渲染一个单选组件，其中只能选择一个可用选项。它一次只显示一个可用选项。\n\n<h:selectOneRadio>\n\
  \n渲染一个单选按钮列表。\n\n此表中列出的标签具有图形表示，但需要不同的标签来容纳可用选项：<f:selectItem> 或 <f:selectItems>。这些标签嵌套在图形组件内部，用于创建额外的可用选项。要表示一个包含书籍类型列表的组合框，你应该在\
  \ <h:selectOneMenu> 标签中嵌套一组 <f:selectItem> 标签。\n\n**<h:selectOneMenu>**\n< **f:selectItem**\
  \ itemLabel=\"历史\" />\n<f:selectItem itemLabel=\"传记\"/>\n<f:selectItem itemLabel=\"\
  文学\"/>\n<f:selectItem itemLabel=\"漫画\"/>\n<f:selectItem itemLabel=\"儿童\"/>\n<f:selectItem\
  \ itemLabel=\"科幻\"/>\n</h:selectOneMenu>\n\n图 11-7 展示了所有可能的表示形式。有些列表支持多选，有些则只支持单选。与所有其他组件一样，你可以将受管\
  \ Bean 的值（如 List、Set 等）直接绑定到其中一个列表。\n\n![图片 97](img/index-343_1.jpg)\n\n第 11 章 ■\
  \ 页面与组件\n\n**313**\n\n**图 11-7.** *列表的多种表示形式*\n\n图形\n\n\n\n用于显示图像的组件只有一个：<h:graphicImage>。它向用户显示一个无法操作的图形图像。此标签会被渲染为\
  \ HTML 的 `<img>` 元素。它拥有多个属性，允许你调整图像大小、将图形用作图像映射等。你可以显示一个绑定到受管 bean 属性且来自文件系统或数据库的图像。以下代码显示一张图像并调整其大小：\n\
  \n<h:graphicImage value=\"book.gif\" height=\"200\" width=\"320\"/> 网格与表格\n\n数据通常需要以表格格式显示（见表\
  \ 11-14）。JSF 拥有非常强大的 <h:dataTable> 标签，它可以遍历元素列表并创建表格（请回顾上一章清单 10-7 中 listBooks.xhtml\
  \ 页面的代码）。\n\n表格也可用于创建基于网格的用户界面布局。在这种情况下，你可以使用 <h:panelGrid> 和 <h:panelGroup> 标签来布局你的组件。\n\
  \n**表 11-14.** *网格与表格标签*\n\n**标签**\n\n**描述**\n\n<h:dataTable>\n\n表示一组重复数据，这些数据将被渲染到\
  \ HTML 的 `<table>` 元素中\n\n<h:column>\n\n在 <h:dataTable> 组件内渲染单列数据\n\n<h:panelGrid>\n\
  \n渲染一个 HTML 的 `<table>` 元素\n\n<h:panelGroup>\n\n是一个组件容器，可以嵌入到 <h:panelGrid> 中\n\n\
  **314**\n\n第 11 章 ■ 页面与组件\n\n与 <h:dataTable> 不同，<h:panelGrid> 标签不使用底层数据模型来渲染数据行。相反，此组件是一个布局容器，它在一个由行和列组成的网格中渲染其他\
  \ JSF 组件。你可以指定用于显示组件的列数，而 <h:panelGrid> 将确定需要多少行。`columns` 属性是在开始新行之前要渲染的列数。例如，在以下代码中，渲染结果将是三列两行：\n\
  \n<h:panelGrid **columns=\"3\"** border=\"1\">\n\n<h:outputLabel value=\"One\"/>\n\
  \n<h:outputLabel value=\"Two\"/>\n\n<h:outputLabel value=\"Three\"/>\n\n<h:outputLabel\
  \ value=\"Four\"/>\n\n<h:outputLabel value=\"Five\"/>\n\n<h:outputLabel value=\"\
  Six\"/>\n\n</h:panelGrid>\n\n如果你想将多个组件合并到一列中，可以使用 <h:panelGroup>，它会将其子组件渲染为单个组件。你还可以使用特殊的\
  \ <f:facet> 标签定义页眉和页脚。\n\n<h:panelGrid columns=\"3\" border=\"1\">\n\n**<f:facet\
  \ name=\"header\">**\n\n**<h:outputText value=\"Header\"/>**\n\n**</f:facet>**\n\
  \n<h:outputLabel value=\"One\"/>\n\n<h:outputLabel value=\"Two\"/>\n\n<h:outputLabel\
  \ value=\"Three\"/>\n\n<h:outputLabel value=\"Four\"/>\n\n<h:outputLabel value=\"\
  Five\"/>\n\n<h:outputLabel value=\"Six\"/>\n\n**<f:facet name=\"footer\">**\n\n\
  **<h:outputText value=\"Footer\"/>**\n\n**</f:facet>**\n\n</h:panelGrid>\n\n前面描述的两个表格将具有以下图形表示，一个带有页眉和页脚，另一个则两者皆无：\n\
  \n![Image 98](img/index-345_1.jpg)\n\n第 11 章 ■ 页面与组件\n\n**315**\n\n错误消息\n\n应用程序有时会因格式错误的数据或技术原因而抛出异常。但就用户而言，界面上应尽可能少地显示信息，以引导他们关注并纠正问题。管理错误消息的机制是在页面中包含\
  \ <h:message> 和 <h:messages> 标签（见表 11-15）。\n\n<h:message> 绑定到特定组件，而 <h:messages>\
  \ 可以为页面上的所有组件提供全局消息。\n\n**表 11-15.** *消息标签*\n\n**标签**\n\n**描述**\n\n<h:message>\n\
  \n渲染一条错误消息\n\n<h:messages>\n\n渲染所有已排队的错误消息\n\n消息可以具有不同的严重级别（INFO、WARN、ERROR 和 FATAL），每个级别对应一个\
  \ CSS 样式（infoStyle、warnStyle、errorStyle 和 fatalStyle）。这样，每种类型的消息都可以有不同的渲染样式。例如，以下代码将以红色显示所有消息：\n\
  \n< **h:messages** style=\"color:red\"/>\n\n<h:form>\n\n输入标题：\n\n\n\n<h:inputText\
  \ value=\"#{bookController.title}\" required=\"true\"/>\n\n<h:commandButton action=\"\
  #{bookController.save}\" value=\"保存\"/>\n\n</h:form>\n\n这将显示一个绑定到托管 Bean 属性的输入字段。该属性是\n\
  \n必填项，因此如果用户未填写就点击保存按钮，将显示一条错误消息。\n\n![图片 99](img/index-346_1.jpg)\n\n**316**\n\n\
  第 11 章 ■ 页面与组件\n\n杂项\n\n还有一些标签没有图形表示，但有对应的 HTML\n\n等效标签。可以使用原生 HTML 标签，并且它们也能正常工作。使用\
  \ JSF 标签时，可以利用额外的属性来简化开发。例如，你可以使用标准 HTML `<script type=\"text/javascript\">` 标签向页面添加\
  \ JavaScript 库。但使用 JSF 的 `<h:outputScript>` 标签，你可以使用新的资源管理功能，稍后将在“资源管理”部分看到。这些杂项标签如表\
  \ 11-16 所示。\n\n**表 11-16.** *杂项标签*\n\n**标签**\n\n**描述**\n\n<h:body>\n\n渲染一个 HTML\
  \ `<body>` 元素\n\n<h:head>\n\n渲染一个 HTML `<head>` 元素\n\n<h:form>\n\n渲染一个 HTML `<form>`\
  \ 元素\n\n<h:outputScript>\n\n渲染 `<script>` 的标记\n\n<h:outputStylesheet>\n\n渲染 `<link>`\
  \ 元素的标记\n\n模板化\n\n一个典型的 Web 应用程序包含多个共享外观和感觉的页面，例如页眉、页脚、菜单等。Facelets 允许你在一个模板文件中定义布局，该布局可用于\
  \ Web 应用程序中的所有页面。模板定义了内容可以被替换的区域（使用 `<ui:insert>` 标签）。客户端页面随后使用 `<ui:component>`、`<ui:composition>`、`<ui:fragment>`\
  \ 或 `<ui:decorate>` 标签将片段嵌入到模板中。\n\n表 11-17 列出了各种模板化标签。\n\n**表 11-17.** *模板化标签*\n\
  \n**标签**\n\n**描述**\n\n<ui:composition>\n\n定义一个可选地使用模板的组合。多个组合可以使用同一个模板。\n\n<ui:define>\n\
  \n定义一组内容，这些内容将被插入到模板中对应的 `<ui:insert>` 元素中。\n\n<ui:decorate>\n\n允许你装饰页面中的某些内容。\n\
  \n<ui:fragment>\n\n添加页面的一部分片段。\n\n<ui:insert>\n\n在模板中定义一个插入点，可以使用实际内容周围的 `<ui:define>`\
  \ 标签将内容插入其中。\n\n<ui:param>\n\n将参数传递给包含的文件（使用 `<ui:include>`）或模板。\n\n第 11 章 ■ 页面与组件\n\
  \n**317**\n\n举个例子，让我们重用表示创建新书表单的页面（请参考图 11-1）。你可以说标题是页面的页眉，而页脚将是底部的文本 *Apress -\
  \ Beginning Java EE 6*。因此，名为 layout.xml 的模板将如清单 11-11 中的代码所示。\n\n**清单 11-11.** *layout.xml\
  \ 文件是一个 Facelets 模板*\n\n[<html](http://www.w3.org/1999/xhtml)\n\n[](http://java.sun.com/jsf/facelets)\n\
  \n**xml:lang=\"en\" lang=\"en\">\n\n<head>\n\n<title> **<ui:insert name=\"title\"\
  >** 默认标题**</ui:insert>** </title>\n\n</head>\n\n<body>\n\n<h1> **<ui:insert name=\"\
  title\">** 默认标题**</ui:insert>** </h1>\n\n<hr/>\n\n**<ui:insert name=\"content\"\
  >** 默认内容**</ui:insert>**\n\n<hr/>\n\n<i>APress - Beginning Java EE 6</i>\n\n</body>\n\
  \n</html>\n\n我们的模板必须首先定义所需的标签库（[xmlns:ui=\"http://java.sun.com/](http://java.sun.com/jsf/facelets)\n\
  \n[jsf/facelets\"）。然后，它使用](http://java.sun.com/jsf/facelets) `<ui:insert>` 标签将一个标题属性插入到\
  \ `<title>` 和 `<h1>` 标签中。页面的主体内容将被插入到名为 content 的属性中。\n\n要使用此模板，我们的 newBook.xhtml\
  \ 页面（如清单 11-12 所示）需要声明\n\n它需要哪个模板（`<ui:composition template=\"layout.xhtml\">`）。然后，思路是将\
  \ `<ui:define>` 标签中定义的属性与模板中的 `<ui:insert>` 标签绑定。例如，页面的标题是“创建一本新书”。这段文本存储在 title\
  \ 变量中（通过 `<ui:define name=\"title\">`），该变量与匹配的 `<ui:insert name=\"title\">` 绑定。\n\
  \n\n\n页面其余部分也是如此，它们被插入到内容变量（<ui:define name=\"content\">）中。\n\n**清单 11-12.** *使用模板的\
