  \n**资源管理**\n\n大多数组件可能需要外部资源才能正确渲染。\n\n<h:graphicImage> 需要外部图片来显示，<h:commandButton>\
  \ 也可以将图片显示为按钮，<h:outputScript> 引用外部 JavaScript 文件，组件还可以应用 CSS 样式。在 JSF 中，资源是一种可以传输给组件的静态元素，以便浏览器能够显示（如图片）或处理（如\
  \ JavaScript、CSS）它们。\n\n早期版本的 JSF 没有提供资源服务功能。当你想提供资源时，必须将其放在 WEB-INF 目录下，以便客户端浏览器能够访问。问题在于，如果你想更新资源，必须替换目录中的文件，并且需要不同的目录来提供本地化资源（例如，包含英文或葡萄牙文文本的图片）。JSF\
  \ 2.0 支持此功能，因此你现在可以将资源直接打包到一个独立的 jar 包中，并附带版本和区域设置。打包后的资源可以放置在 Web 应用程序根目录下的路径：\n\
  \n**resources**/<resourceIdentifier>\n\n或 jar 包入口名称下：\n\nMETA-INF/**resources**/<resourceIdentifier>\n\
  \n<resourceIdentifier> 由几个子文件夹组成，具体如下：\n\n[localePrefix/][libraryName/][libVersion/]resourceName[/resourceVersion]\n\
  \n此资源标识符中 [] 内的项是可选的。区域前缀由语言代码和可选的国家代码组成（例如 en、en_US、pt、pt_BR）。如该行所示，你可以为库或资源本身添加版本控制。以下是你可能遇到的资源结构：\n\
  \n**320**\n\n第 11 章 ■ 页面与组件\n\nbook.gif\n\nen/book.gif\n\nen_us/book.gif\n\nen/myLibrary/book.gif\n\
  \nmyLibrary/book.gif\n\nmyLibrary/1_0/book.gif\n\nmyLibrary/1_0/book.gif/2_3.gif\n\
  \n然后，你可以直接在 <h:graphicImage> 组件中使用诸如 book.gif 这样的资源，或者通过指定库名称（library=\"myLibrary\"\
  ）来使用。系统会自动为你的客户端拉取具有正确区域设置的资源。\n\n<h:graphicImage value=\"book.gif\" />\n\n<h:graphicImage\
  \ value=\"book.gif\" library=\"myLibrary\" />\n\n<h:graphicImage value=\"#{resource['book.gif']}\"\
  \ />\n\n<h:graphicImage value=\"#{resource['myLibrary:book.gif']}\" />\n\n**复合组件**\n\
  \n前面讨论的所有组件都是 JSF 的一部分，并且随任何遵循规范的实现一起提供。由于 JSF 基于可重用组件，它提供了一种设计，允许你轻松创建并将自己的组件或第三方组件集成到应用程序中。\n\
  \n之前我提到过，你看到的所有组件都直接或间接地扩展了 javax.faces.component.UIComponent 类。在 JSF 2.0 之前，如果你想创建自己的组件，你必须扩展最接近你组件功能的组件类（如\
  \ UICommand、UIGraphic、UIOutput 等），在 faces-config.xml 文件中声明它，并提供标签处理器和渲染器。这些步骤很复杂，而其他\
  \ Web 框架（如 Facelets）表明，可以用更低的复杂度创建强大的组件。这就是复合组件的意义所在：使开发者能够编写真正的、可重用的 JSF UI 组件，而无需任何\
  \ Java 代码或 XML 配置。\n\n这种新方法涉及创建一个包含组件的 XHTML 页面，然后将此页面作为组件在其他页面中使用。这个 XHTML 页面随后被视为一个真正的组件，可以支持验证器、转换器和监听器。任何有效的标记都可以在复合组件内部使用，包括模板功能。复合组件作为资源处理，因此必须位于新的标准资源目录中。表\
  \ 11-18 列出了创建和定义复合组件所涉及的所有标签。\n\n第 11 章 ■ 页面与组件\n\n**321**\n\n**表 11-18.** *用于声明和定义复合组件的标签*\n\
  \n**标签**\n\n**描述**\n\n<composite:interface>\n\n声明组件的契约。\n\n<composite:implementation>\n\
  \n定义组件的实现。\n\n<composite:attribute>\n\n声明一个可以赋予组件实例的属性。在 <composite:interface> 部分内部可以有零个或多个此标签。\n\
  \n<composite:facet>\n\n声明此组件支持一个方面。\n\n<composite:insertFacet>\n\n在 <composite:implementation>\
  \ 部分中使用。插入的方面将在组件中渲染。\n\n<composite:insertChildren>\n\n在 <composite:implementation>\
  \ 部分中使用。组件内的任何子组件或模板都将被插入到渲染输出中。\n\n<composite:valueHolder>\n\n声明其契约由嵌套此元素的 <composite:interface>\
  \ 声明的组件暴露了一个 ValueHolder 的实现。\n\n<composite:editableValueHolder>\n\n声明其契约由嵌套此元素的\
  \ <composite:interface> 声明的组件暴露了一个 EditableValueHolder 的实现。\n\n<composite:actionSource>\n\
  \n声明其契约由嵌套此元素的 <composite:interface> 声明的组件暴露了一个 ActionSource 的实现。\n\n让我们探索一个示例，展示创建一个图形组件并在其他页面中使用它是多么容易。你可能还记得前面的章节，CD-BookStore\
  \ 应用程序销售两种不同的商品：书籍和 CD。在第 3 章中，我将它们表示为三个不同的对象：Book 和 CD 继承自 Item。Item 包含公共属性（标题、价格和描述），而\
  \ Book 和 CD 则具有专门的属性（Book 的 isbn、publisher、nbOfPage 和 illustrations；CD 的 musicCompany、numberOfCDs、totalDuration\
  \ 和 gender）。如果你希望你的 Web 应用程序能够创建新书和 CD，你需要两个不同的表单。但 Item 的公共属性可以放在一个单独的页面中，该页面将充当一个组件。图\
  \ 11-9 显示了这两个页面。\n\n![Image 101](img/index-352_1.jpg)\n\n![Image 102](img/index-352_2.jpg)\n\
  \n**322**\n\n第 11 章 ■ 页面与组件\n\n**图 11-9.** *两个表单，一个用于创建 CD，另一个用于创建书籍*\n\n那么，让我们创建一个包含两个输入文本框（用于标题和价格）和一个文本区域（用于描述）的复合组件。使用\
  \ JSF 2.0 编写组件的方法与你习惯的 Java 方法相对接近。你必须首先编写一个接口，\n\n\n\n<composite:interface>（参见清单\
  \ 11-13）作为组件的入口点，描述了组件使用的名称和参数。接下来是实现部分 <composite:implementation>，它是用 XHTML 编写的组件主体，并使用任何\
  \ JSF 标签或模板。接口和实现在同一个 XHTML 页面中。实现部分使用了 `<tr>` 和 `<td>` 标记，因为我假设它将被放置在一个预先存在的、包含两列的\
  \ `<table>` 中。\n\n**清单 11-13.** *newItem.xhtml 包含一个复合组件*\n\n<!DOCTYPE html PUBLIC\
  \ \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\n\n[\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\
  >](http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd)\n\n[<html](http://www.w3.org/1999/xhtml)\n\
  \n[>](http://java.sun.com/jsf/composite)\n\n**<composite:interface>**\n\n<composite:attribute\
  \ name=\" **item**\" required=\"true\"/>\n\n<composite:attribute name=\" **style**\"\
  \ required=\"false\"/>\n\n**</composite:interface>**\n\n**<composite:implementation>**\n\
  \n<tr style=\"#{compositeComponent.attrs. **style**}\">\n\n<td>标题 :</td>\n\n<td>\n\
  \n<h:inputText value=\"#{compositeComponent.attrs. **item**.title}\"/>\n\n</td>\n\
  \n第 11 章 ■ 页面与组件\n\n**323**\n\n</tr>\n\n<tr style=\"#{compositeComponent.attrs.style}\"\
  >\n\n<td>价格 :</td>\n\n<td>\n\n<h:inputText value=\"#{compositeComponent.attrs. **item**.price}\"\
  />\n\n</td>\n\n</tr>\n\n<tr style=\"#{compositeComponent.attrs.style}\">\n\n<td>描述\
