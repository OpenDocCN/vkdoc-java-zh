  \nasadmin list-components\n\nchapter15-resource-1.0 <ejb, web>\n\n第 15 章 ■ RESTful\
  \ Web 服务\n\n**461**\n\n**运行示例**\n\n应用程序部署完成后，你可以在命令行中使用 cURL 通过发送 POST 请求来创建图书资源，并通过\
  \ GET 请求获取所有资源或特定资源。DELETE 请求将删除图书资源。以下是一些你可以使用的命令：\n\n// 创建一本书\ncurl -X **POST**\
  \ --data-binary ➥\n\"{ \\\"title\\\":\\\"H2G2\\\", \\\"description\\\":\\\"科幻 IT\
  \ 书籍\\\", ➥\n\\\"illustrations\\\":\\\"false\\\",\\\"isbn\\\":\\\"134-234\\\",\\\
  \"nbOfPage\\\":\\\"241\\\",➥\n\\\"price\\\":\\\"24.0\\\" }\" -H \"Content-Type:\
  \ application/json\" ➥\n[`localhost:8080/chapter15-resource-1.0/**rs/books**`](http://localhost:8080/chapter15-resource-1.0/rs/books)\n\
  \n// 返回所有图书\ncurl -X **GET** -H \"Accept: **application/json**\" ➥\n[`localhost:8080/chapter15-resource-1.0/**rs/books**`](http://localhost:8080/chapter15-resource-1.0/rs/books)\n\
  \n// 以 JSON 格式返回 ID 为 601 的图书\ncurl -X **GET** -H \"Accept: **application/json**\"\
  \ ➥\n[`localhost:8080/chapter15-resource-1.0/**rs/books/601**`](http://localhost:8080/chapter15-resource-1.0/rs/books/601)\n\
  \n{\"description\":\"科幻 IT 书籍\",\"illustrations\":\"false\",➥\n\"isbn\":\"1234-234\"\
  ,\"nbOfPage\":\"241\",\"price\":\"24.0\",\"title\":\"H2G2\"}\n\n// 以 XML 格式返回 ID\
  \ 为 601 的图书\ncurl -X **GET** -H \"Accept: **application/xml**\" ➥\n[`localhost:8080/chapter15-resource-1.0/**rs/books/601**`](http://localhost:8080/chapter15-resource-1.0/rs/books/601)\n\
  \n<?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"yes\"?>\n<book><description>科幻\
  \ IT 书籍</description>\n<illustrations>false</illustrations><isbn>1234-234</isbn>\n\
  <nbOfPage>241</nbOfPage><price>24.0</price><title>H2G2</title></book>\n\n// 删除 ID\
  \ 为 601 的图书\ncurl -X **DELETE** [`localhost:8080/chapter15-resource-1.0/**rs/books/601**`](http://localhost:8080/chapter15-resource-1.0/rs/books/601)\n\
  \n**总结**\n\n前一章解释了 SOAP Web 服务。它们使用一种特殊的信封，通过 WSDL 进行描述，并且可以通过多种协议调用，HTTP 是其中之一。在本章中，我解释了\
  \ RESTful Web 服务，现在你应该了解 JAX-WS 和 JAX-RS 在实现上有何不同。\n\n本章首先对 REST 进行了总体介绍。通过简单的动词（GET、POST、PUT\
  \ 等）和统一的接口，你学会了如何访问部署在 Web 上的任何资源。随后，本章聚焦于 HTTP，这是一种基于请求/响应机制的协议，它使用内容协商从请求中选择合适的内容类型。\n\
  \n**462**\n\n第 15 章 ■ RESTful Web 服务\n\n可以使用缓存通过基于日期和 ETag 的条件请求来优化网络流量。由于 REST\
  \ 基于 HTTP，这种优化同样可以应用于 REST。\n\nJAX-RS 是一个随 Java EE 6 一起提供的 Java API，它简化了 RESTful\
  \ Web 服务的开发。通过一组注解，你可以定义资源的路径和子路径、提取不同类型的参数，或者映射到 HTTP 方法（@GET、@POST 等）。在开发 RESTful\
  \ Web 服务时，你必须考虑资源、它们如何相互链接，以及如何使用 HTTP 管理它们的状态。\n\n索引\n\n**符号**\n\nWeb 服务，411–416\n\
