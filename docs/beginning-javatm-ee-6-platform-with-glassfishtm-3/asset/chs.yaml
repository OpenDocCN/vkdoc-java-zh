  \ `DataValidationListener.validate()` 方法验证其数据，并使用监听器的 `AgeCalculationListener.calculateAge()`\
  \ 方法计算其年龄。\n\n实体监听器方法必须遵循的规则与实体回调方法类似，但有一些细节不同：\n\n*   只能抛出非受检异常。这会导致剩余监听器和回调方法不被调用，并且如果存在事务，则事务会被回滚。\n\
