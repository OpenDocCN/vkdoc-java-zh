  \ *设置 JDK 安装*\n\n安装完成后，需要将 `JAVA_HOME` 变量和 `%JAVA_HOME%\\bin` 目录设置到 `PATH` 变量中。通过输入\
  \ `java –version` 检查 Java 是否被系统识别（参见图 1-7）。\n\n**图 1-7.** *显示 JDK 版本*\n\n**Maven\
  \ 2**\n\n为了反映你在真实开发世界中会遇到的情况，我决定使用 Apache Maven ([`maven.apache.org`](http://maven.apache.org))\
  \ 来构建本书的示例。本书的目的不是解释 Maven。你可以在互联网或书店中找到大量关于 Maven 的资源。但我将介绍一些元素，以便你能够轻松理解和使用这些示例。\n\
  \n![Image 14](img/index-49_1.jpg)\n\n第 1 章 ■ Java EE 6 概览\n\n**19**\n\n一点历史\n\n\
  构建 Java EE 应用需要不同的操作：\n\n*   生成代码和资源\n*   编译 Java 类和测试类\n*   将代码打包成归档文件（jar、ear、war\
  \ 等），可能包含外部的 jar 库\n\n手动执行这些任务可能耗时且容易出错。因此，开发团队一直在寻找自动化这些任务的方法。\n\n2000 年，Java 开发者开始使用\
  \ [Apache Ant (http://ant.apache.org)](http://ant.apache.org)，这使他们能够创建用于构建应用的脚本。Ant\
  \ 本身是用 Java 编写的，并提供了一系列命令，与 Unix Make 工具不同，这些命令可以跨平台移植。开发\n\n\n\n团队开始编写自己的脚本来满足需求。然而，当项目必须开始涵盖复杂的异构系统时，Ant\
  \ 很快就达到了极限。公司在构建系统的工业化方面遇到了困难。当时没有真正的工具可以在不同项目之间轻松复用构建脚本（复制/粘贴是唯一的方法）。\n\n2002 年，Apache\
  \ Maven 诞生了，这个项目不仅解决了这些问题，还超越了一个简单构建工具的范畴。Maven 为项目提供了构建解决方案、共享库和一个插件平台，使你可以进行质量控制、文档编写、团队协作等。基于“约定优于配置”的原则，Maven\
  \ 带来了标准的项目描述和许多约定，例如标准目录结构（如图 1-8 所示）。凭借基于插件（也称为 mojos）的可扩展架构，Maven 可以提供许多不同的服务。\n\
  \n**图 1-8.** *标准 Maven 目录结构*\n\n项目描述符\n\nMaven 基于这样一个事实：大多数 Java 和 Java EE 项目在构建应用程序时都面临类似的需求。一个\
  \ Maven 项目需要遵循标准，并在项目描述符（即项目对象模型，POM）中定义特定功能。POM 是一个位于项目根目录的 XML 文件（pom.xml）。如清单\
  \ 1-5 所示，描述项目身份所需的最少信息包括 groupId、artifactId、version 和 packaging 类型。\n\n**20**\n\n\
  第 1 章 ■ 概览 Java EE 6\n\n**清单 1-5.** *最小化 pom.xml*\n\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n\n[<project](http://maven.apache.org/POM/4.0.0) ➥\n\n➥\n\n[xsi:schemaLocation=\"\
  http://maven.apache.org/POM/4.0.0 ➥](http://maven.apache.org/POM/4.0.0%E2%9E%A5)\n\
  \n[`maven.apache.org/xsd/maven-4.0.0.xsd\">`](http://maven.apache.org/POM/4.0.0%E2%9E%A5)\n\
  \n<modelVersion>4.0.0</modelVersion>\n\n< **groupId**>com.apress.javaee6</groupId>\n\
  \n< **artifactId**>chapter01</artifactId>\n\n< **version**>1.0-SNAPSHOT</version>\n\
  \n< **packaging**>jar</packaging>\n\n</project>\n\n一个项目通常被划分为不同的构件。这些构件被归在同一个 groupId（类似于\
  \ Java 中的包）下，并由 artifactId 唯一标识。packaging 允许 Maven 按照标准格式（jar、war、ear 等）生成构件。最后，version\
  \ 允许在其生命周期中标识一个构件（版本 1.1、1.2、1.2.1 等）。\n\nMaven 强制进行版本管理，以便团队能够管理其项目开发的生命周期。Maven\
  \ 还引入了 SNAPSHOT 版本的概念（版本号以字符串 -SNAPSHOT 结尾），用于标识正在开发中的构件。\n\nPOM 定义了关于项目的更多信息。有些是纯描述性的（名称、描述等），其他则涉及应用程序的执行，例如使用的外部库列表等。最后，pom.xml\
  \ 定义了构建项目所需的环境信息（版本控制工具、持续集成服务器、构件仓库）以及任何其他构建项目的特定流程。\n\n管理构件\n\nMaven 超越了构建构件的范畴；它还提供了一种真正的方法来归档和共享这些构件。Maven\
  \ 在你的硬盘上使用一个本地仓库（默认位于 %USER_HOME%/.m2/repository），用于存储项目描述符所操作的所有构件。\n\n本地仓库（见图\
  \ 1-9）由本地开发者的构件（例如 myProject-1.1.jar）或 Maven 从远程仓库下载的外部构件（例如 glassfish-3.0.jar）填充。默认情况下，Maven\
  \ 使用位于 [`repo1.maven.org/`](http://repo1.maven.org/) maven2 的主仓库来下载缺失的构件。\n\n![Image\
  \ 15](img/index-51_1.jpg)\n\n第 1 章 ■ 概览 Java EE 6\n\n**21**\n\n**图 1-9.** *本地仓库示例*\n\
  \n一个 Maven 项目以声明方式在 POM 中定义其依赖关系（groupId、\n\n\nartifactId、version、type），如清单 1-6\
  \ 所示。如有必要，Maven 会从远程仓库将它们下载到本地仓库。此外，利用这些外部构件的 POM 描述符，Maven 还会下载它们所需的构件，以此类推。因此，开发团队无需手动处理项目依赖关系。必要的库文件由\
  \ Maven 自动添加。\n\n**清单 1-6.** *pom.xml 中的依赖项*\n\n...\n\n<dependencies>\n\n<dependency>\n\
  \n<groupId>org.eclipse.persistence</groupId>\n\n<artifactId>javax.persistence</artifactId>\n\
  \n<version>1.1.0</version>\n\n**<scope>provided</scope>**\n\n</dependency>\n\n<dependency>\n\
  \n<groupId>org.glassfish</groupId>\n\n<artifactId>javax.ejb</artifactId>\n\n<version>3.0</version>\n\
  \n<scope>provided</scope>\n\n</dependency>\n\n</dependencies>\n\n...\n\n![图 16](img/index-52_1.jpg)\n\
  \n**22**\n\n第 1 章 ■ Java EE 6 概览\n\n依赖项可能具有有限的可视性（称为作用域）：\n\n• test：该库用于编译和运行测试类，但不会打包到生成的构件中。\n\
  \n• provided：该库由环境（持久化提供者、应用服务器等）提供，仅用于编译代码。\n\n• compile：编译和执行都需要该库。\n\n• runtime：该库仅在执行时需要，但编译时排除（例如，JSF\
  \ 组件、JSTL 标签库）。\n\n项目模块化\n\n为了实现项目模块化，Maven 提供了一种基于模块的机制。每个模块本身就是一个 Maven 项目。Maven\
  \ 能够通过计算模块之间的依赖关系来构建包含不同模块的项目（见图 1-10）。为了便于重用公共参数，POM 描述符可以继承自父 POM 项目。\n\n**图 1-10.**\
  \ *一个项目及其模块*\n\n插件与生命周期\n\nMaven 使用一个由多个阶段组成的生命周期（见图 1-11）：它清理资源、验证项目、生成所需的任何源代码、编译\
  \ Java 类、运行测试类、打包项目，并将其安装到本地仓库。这个生命周期是 Maven 插件（也称为 mojos）所依附的脊柱。根据你构建的项目类型，关联的\
  \ mojos 可能不同（一个 mojo 用于编译，另一个用于测试，再另一个用于构建等）。在项目描述中，你可以将新插件链接到生命周期的某个阶段，更改插件的配置等。例如，当你构建一个\
  \ Web 服务客户端时，你可能会添加一个 mojo，用于在 generate-sources 阶段生成 Web 服务构件。\n\n![图 17](img/index-53_1.jpg)\n\
  \n![图 18](img/index-53_2.jpg)\n\n第 1 章 ■ Java EE 6 概览\n\n**23**\n\n**图 1-11.** *项目生命周期*\n\
  \n安装\n\n本书中的示例均使用 Apache Maven 2.0.10 开发。安装 JDK 1.6 后，请确保设置了 JAVA_HOME 环境变量。然后从[`maven.apache.org/`](http://maven.apache.org/)下载\
  \ Maven，将文件解压到硬盘上，并将 apache-maven/bin 目录添加到 PATH 变量中。\n\n完成上述操作后，打开 DOS 命令行并输入`mvn\
  \ -version`以验证安装。Maven 应打印出其版本和 JDK 版本，如图 1-12 所示。\n\n**图 1-12.** *Maven 显示其版本*\n\
  \n请注意，Maven 需要访问互联网，以便从主仓库下载插件和项目依赖项。如果你位于代理服务器之后，请参阅文档以配置设置。\n\n**24**\n\n第 1 章\
  \ ■ Java EE 6 概览\n\n使用方法\n\n以下是一些你将用于运行本书示例的命令。它们都调用项目生命周期的不同阶段（clean、compile、install\
  \ 等），并使用 pom.xml 来添加库、自定义编译或通过插件扩展某些行为：\n\n• `mvn clean`：删除所有生成的文件（编译后的类、生成的代码、构件等）\n\
  \n• `mvn compile`：编译主要的 Java 类\n\n• `mvn test-compile`：编译测试类\n\n• `mvn test`：编译测试类并执行测试\n\
  \n\n\n• mvn package：编译并执行测试，然后将项目打包成归档文件\n\n• mvn install：构建并将构件安装到本地仓库中\n\n• mvn\
  \ clean install：清理并安装（注意，你可以添加多个命令，用空格分隔）\n\n■**注意** Maven 允许你编译、运行和打包本书中的示例。但要开发代码，你需要一个集成开发环境（IDE）。我使用的是\
  \ JetBrains 出品的 IntelliJ IDEA，你会在本书中看到一些它的截图。不过你可以使用任何你喜欢的 IDE，因为本书只依赖 Maven，而不依赖\
  \ IntelliJ IDEA 的特定功能。\n\n**JUnit 4**\n\nJUnit 是一个用于编写和运行可重复测试的开源框架。JUnit 的特性包括：\n\
  \n• 用于测试预期结果的断言\n\n• 用于共享通用测试数据的夹具\n\n• 用于运行测试的运行器\n\nJUnit 是 Java 语言事实上的标准单元测试库，它以一个[单一的\
  \ jar 文件形式存在，你可以从 http://www.junit.org/ 下载（或者使用 Maven 依赖管理](http://www.junit.org/)来获取）。该库包含一套完整的\
  \ API，帮助你编写单元测试，以及一个用于执行这些测试的工具。单元测试有助于让你的代码更健壮、更无缺陷、更可靠。\n\n一点历史\n\nJUnit 最初由 Erich\
  \ Gamma 和 Kent Beck 于 1998 年编写。它的灵感来源于同样由 Kent Beck 编写的 Smalltalk 的 SUnit 测试框架。它迅速成为\
  \ Java 世界中最流行的框架之一。\n\nJUnit 将单元测试的优势带到了多种语言中，并催生了一系列 *x* Unit 工具，例如 nUnit（.NET）、pyUnit（Python）、CppUnit（C++）、dUnit（Delphi）等。JUnit\
  \ 在实现测试驱动开发（TDD）方面占据了重要地位。\n\n第 1 章 ■ Java EE 6 概览\n\n**25**\n\n它是如何工作的？\n\n从 JUnit\
  \ 4 开始，通过使用注解、静态导入和其他 Java 特性，编写单元测试变得简化了。与 JUnit 的早期版本相比，它提供了一个更简单、更丰富、更易用的测试模型，并引入了更灵活的初始化、清理、超时和参数化测试用例。\n\
  \n让我们通过一个简单的例子来看看 JUnit 的一些特性。清单 1-7 展示了一个 Customer POJO。它包含一些属性，包括出生日期、构造方法、getter\
  \ 和 setter 方法。\n\n**清单 1-7.** *一个 Customer 类*\n\npublic class **Customer** {\n\n\
  private Long id;\n\nprivate String firstName;\n\nprivate String lastName;\n\nprivate\
  \ String email;\n\nprivate String phoneNumber;\n\nprivate Date dateOfBirth;\n\n\
  private Date creationDate;\n\n// 构造方法、getter、setter\n\n}\n\n清单 1-8 中展示的 CustomerHelper\
  \ 类提供了一个用于计算给定客户年龄的工具方法（calculateAge()）。\n\n**清单 1-8.** *CustomerHelper 类*\n\npublic\
  \ class **CustomerHelper** {\n\nprivate int ageCalcResult;\n\nprivate Customer customer;\n\
  \npublic void calculateAge() {\n\nDate dateOfBirth = customer.getDateOfBirth();\n\
  \nCalendar birth = new GregorianCalendar();\n\nbirth.setTime(dateOfBirth);\n\nCalendar\
  \ now = new GregorianCalendar(2001, 1, 1);\n\nageCalcResult = now.get(Calendar.YEAR)\
  \ - birth.get(Calendar.YEAR);\n\n}\n\n// 尚未实现\n\npublic Date getNextBirthDay() {\n\
  \nreturn null;\n\n}\n\npublic void clear() {\n\nageCalcResult=0;\n\ncustomer=null;\n\
  \n**26**\n\n第 1 章 ■ Java EE 6 概览\n\n}\n\n// Getter、Setter\n\n}\n\ncalculateAge()\
  \ 方法使用 dateOfBirth 属性来返回客户的年龄。\n\nclear() 方法重置 CustomerHelper 的状态，而 getNextBirthDay()\
  \ 方法尚未实现。这个辅助类存在一些缺陷：年龄计算中似乎有一个 bug。为了测试 calculateAge() 方法，我们可以使用清单 1-9 中描述的 JUnit\
  \ 类 CustomerHelperTest。\n\n**清单 1-9.** *一个用于 CustomerHelper 的测试类*\n\nimport org.junit.Before;\n\
  \nimport org.junit.Ignore;\n\nimport org.junit.Test;\n\nimport static org.junit.Assert.*;\n\
  \npublic class CustomerHelperTest {\n\nprivate static CustomerHelper customerHelper\
  \ = new CustomerHelper();\n\n**@Before**\n\npublic void clearCustomerHelper() {\n\
  \ncustomerHelper.clear();\n\n}\n\n**@Test**\n\npublic void notNegative() {\n\n\n\
  \nCustomer customer = new Customer();\n\ncustomer.setDateOfBirth(new GregorianCalendar(1975,\
  \ 5, 27).getTime());\n\ncustomerHelper.setCustomer(customer);\n\ncustomerHelper.calculateAge();\n\
  \nint calculatedAge = customerHelper.getAgeCalcResult();\n\nassert calculatedAge\
  \ >= 0;\n\n}\n\n**@Test**\n\npublic void expectedValue() {\n\nint expectedAge =\
  \ 33;\n\nCalendar birth = new GregorianCalendar();\n\nbirth.roll(Calendar.YEAR,\
  \ expectedAge * (-1));\n\nbirth.roll(Calendar.DAY_OF_YEAR, -1);\n\n第 1 章 ■ Java\
  \ EE 6 概览\n\n**27**\n\nCustomer customer = new Customer();\n\ncustomer.setDateOfBirth(birth.getTime());\n\
  \ncustomerHelper.setCustomer(customer);\n\ncustomerHelper.calculateAge();\n\nassertTrue(customerHelper.getAgeCalcResult()\
  \ == expectedAge);\n\n}\n\n**@Test(expected = NullPointerException.class)**\n\n\
  public void emptyCustomer() {\n\nCustomer customer = new Customer();\n\ncustomerHelper.setCustomer(customer);\n\
  \ncustomerHelper.calculateAge();\n\nassertEquals(customerHelper.getAgeCalcResult(),\
  \ -1);\n\n}\n\n**@Ignore(\"尚未就绪\")**\n\n**@Test**\n\npublic void nextBirthDay()\
  \ {\n\n// 还有一些工作要做\n\n}\n\n}\n\n清单 1-9 中的测试类包含四个测试方法。`expectedValue()` 方法会失败，因为\
  \ `CustomerHelper` 的年龄计算中存在一个错误。`nextBirthDay()` 方法被忽略，因为它尚未实现。另外两个测试方法将会成功。`emptyCustomer()`\
  \ 期望该方法抛出一个 `NullPointerException`。\n\n测试方法\n\n在 JUnit 4 中，测试类无需继承任何类。要作为测试用例执行，JUnit\
  \ 类至少需要一个使用 `@Test` 注解的方法。如果你编写的类没有至少一个 `@Test` 方法，尝试执行时会收到错误（`java.lang.Exception:\
  \ No runnable methods`）。\n\n测试方法必须使用 `@Test` 注解，返回 `void`，并且不接受任何参数。这在运行时进行检查，如果不满足条件则会抛出异常。`@Test`\
  \ 注解支持可选的 `expected` 参数，用于声明测试方法应抛出某个异常。如果未抛出异常，或抛出的异常与声明的不同，则测试失败。在此示例中，尝试计算一个空客户对象的年龄应抛出\
  \ `NullPointerException`。\n\n在清单 1-9 中，`nextBirthDay()` 方法尚未实现。然而，你并不希望测试失败；你只想忽略它。你可以在\
  \ `@Test` 之前或之后添加 `@Ignore` 注解。测试运行器会报告被忽略的测试数量，以及成功和失败的测试数量。\n\n**28**\n\n第 1 章\
  \ ■ Java EE 6 概览\n\n请注意，`@Ignore` 接受一个可选参数（一个字符串），用于记录测试被忽略的原因。\n\n断言方法\n\n测试用例必须断言对象符合预期结果。为此，JUnit\
  \ 提供了一个包含多个方法的 `Assert` 类。要使用它，你可以使用带前缀的语法（例如 `Assert.assertEquals()`），或者静态导入 `Assert`\
  \ 类（如清单 1-9 所示）。正如你在 `notNegative()` 方法中看到的，你也可以使用 Java 的 `assert` 关键字。\n\n夹具\n\n\
  夹具是在测试期间初始化和释放任何公共对象的方法。JUnit 使用 `@Before` 和 `@After` 注解在每个测试之前或之后执行代码。这些方法可以任意命名（本例中为\
  \ `clearCustomerHelper()`），并且一个测试类中可以有多个此类方法。JUnit 使用 `@BeforeClass` 和 `@AfterClass`\
  \ 注解来仅对每个类执行一次特定代码。这些方法必须是唯一的且为静态的。如果你需要分配和释放昂贵的资源，`@BeforeClass` 和 `@AfterClass`\
  \ 会非常有用。\n\n启动 JUnit\n\n要运行 JUnit 启动器，你必须将 JUnit jar 文件添加到你的 `CLASSPATH` 变量中（或添加\
  \ Maven 依赖）。之后，你可以通过 Java 启动器运行测试，如下代码所示。请注意，当使用 `assert` 时，你必须指定 `–ea` 参数；否则，断言将被忽略。\n\
  \njava **–ea** org.junit.runner.JUnitCore com.apress.javaee6.CustomerHelperTest\n\
  \n上述命令将提供以下结果：\n\nJUnit version 4.5\n\n**..E.I**\n\nTime: 0.016\n\n\n\n出现 1 个失败：\n\
  \n1) expectedValue(com.apress.javaee6.CustomerHelperTest)\n\njava.lang.AssertionError:\
  \ 位于 ➥\n\nCustomerHelperTest.expectedValue(CustomerHelperTest.java:52)\n\n失败!!!\n\
  \n测试运行数：3，失败数：1\n\n首先显示的信息是 JUnit 版本号（此处为 4.5）。接着 JUnit 会给出已执行的测试数量（此处为 3 个）和失败数量（本例中为\
  \ 1 个）。字母 **I** 表示某个测试已被忽略。\n\n第 1 章 ■ Java EE 6 概览\n\n**29**\n\nJUnit 集成\n\nJUnit\
  \ 目前与大多数 IDE（IntelliJ IDEA、Eclipse、NetBeans 等）集成得非常好。\n\n使用这些 IDE 时，在大多数情况下，JUnit\
  \ 会用绿色高亮表示测试成功，用红色高亮表示测试失败。大多数 IDE 还提供了创建测试类的功能。\n\nJUnit 还通过 Surefire 插件与 Maven\
  \ 集成，该插件在构建生命周期的测试阶段使用。它会执行应用程序的 JUnit 测试类，并生成 XML 和文本文件格式的报告。以下 Maven 命令通过该插件运行\
  \ JUnit 测试：\n\nmvn test\n\n**Derby 10.4**\n\nDerby 数据库最初名为 Cloudscape，采用 Java 开发，由\
  \ IBM 捐赠给 Apache 基金会并成为开源项目。Sun Microsystems 发布了其自有发行版，称为 JavaDB。Derby 体积小巧（2MB），是一个功能完备的关系型数据库，支持事务，可以轻松嵌入任何基于\
  \ Java 的解决方案中。\n\nDerby 提供两种不同的模式：嵌入模式和网络服务器模式。嵌入模式是指 Derby 由简单的单用户 Java 应用程序启动。使用此选项时，Derby\
  \ 与应用程序运行在同一个 JVM 中。在本书中，我将在单元测试期间使用此模式。\n\n网络服务器模式是指 Derby 作为独立进程启动，并提供多用户连接功能。在本书中运行应用程序时，我将全程使用此模式。\n\
  \n安装\n\n安装 Derby 非常简单；事实上，你可能会发现它已经安装好了，因为它与 JDK 1.6 捆绑在一起。在安装 JDK 1.6 时（请回顾图 1-6），安装向导会建议你安装\
  \ Java DB。默认情况下它会安装。如果你尚未安装，可以从 [`db.apache.org`](http://db.apache.org) 下载二进制文件。\n\
  \n安装完成后，将 DERBY_HOME 变量设置为 Derby 的安装路径，并将 %DERBY_HOME%\\bin 添加到你的 PATH 变量中。通过运行\
  \ %DERBY_HOME%\\bin\\startNetworkServer.bat 脚本来启动 Derby 网络服务器。Derby 会在控制台显示一些信息，例如它监听的端口号（默认为\
  \ 1527）。\n\nDerby 附带多个实用工具，其中之一是 sysinfo。打开 DOS 命令行，输入 sysinfo，你应该会看到关于 Java 和 Derby\
  \ 环境的信息，如图 1-13 所示。\n\n![Image 19](img/index-60_1.jpg)\n\n**30**\n\n第 1 章 ■ Java\
  \ EE 6 概览\n\n**图 1-13.** *安装 Derby 后的 sysinfo 输出*\n\n用法\n\nDerby 提供了多个工具（位于 bin\
  \ 子目录下）用于与数据库交互。最简单的工具可能是 ij，它允许你在命令提示符下输入 SQL 命令；以及 dblook，它允许你查看数据库的全部或部分数据定义语言（DDL）。\n\
  \n确保你已经启动了 Derby 网络服务器，然后输入命令 ij 进入命令提示符，对 Derby 数据库运行交互式查询。接着，输入以下命令来创建数据库和表、向表中插入数据并查询：\n\
  \nij> connect 'jdbc:derby://localhost:1527/Chapter01DB;create=true';\n\n这将连接到 Chapter01DB\
  \ 数据库。由于该数据库尚不存在，create=true 参数会强制创建它。\n\nij> create table customer (custId int\
  \ primary key, firstname varchar(20),\n\nlastname varchar(20));\n\n这将创建一个 customer\
  \ 表，包含一个主键列和两个用于存储名字和姓氏的 varchar(20) 列。你可以通过输入以下命令来显示该表的描述信息：\n\n\n\nij> describe\
  \ customer;\n\nCOLUMN_NAME |TYPE_NAME|DEC&|NUM&|COLUM&|COLUMN_DEF|CHAR_OCTE&|IS_NULL&\n\
  \nCUSTID |INTEGER |0 |10 |10 |NULL |NULL |NO\n\nFIRSTNAME |VARCHAR |NULL|NULL|20\
  \ |NULL |40 |YES\n\nLASTNAME |VARCHAR |NULL|NULL|20 |NULL |40 |YES\n\n现在表已创建，你可以使用如下所示的\
  \ insert SQL 语句添加数据：\n\n第 1 章 ■ Java EE 6 概览\n\n**31**\n\nij> insert into customer\
  \ values (1, 'Fred', 'Chene');\n\nij> insert into customer values (2, 'Sylvain',\
  \ 'Verin');\n\nij> insert into customer values (3, 'Robin', 'Riou');\n\n然后，你可以使用\
  \ SQL select 语句的全部功能来检索、排序或聚合数据。\n\nij> select count(*) from customer;\n\nij> select\
  \ * from customer where custid=3;\n\nCUSTID |FIRSTNAME |LASTNAME\n\n3 |Robin |Riou\n\
  \nij> exit;\n\n要获取已创建表的 DDL，你可以退出 ij 并针对 Chapter01DB 数据库运行 dblook。\n\nC:\\> **dblook**\
  \ -d 'jdbc:derby://localhost:1527/Chapter01DB'\n\n-- 源数据库为：Chapter01DB\n\n-- 连接\
  \ URL 为：jdbc:derby://localhost:1527/Chapter01DB\n\n-- appendLogs: false\n\n-- ----------------------------------------------\n\
  \n-- 表的 DDL 语句\n\n-- ----------------------------------------------\n\nCREATE TABLE\
  \ \"APP\".\"CUSTOMER\" (\"CUSTID\" INTEGER NOT NULL, \"FIRSTNAME\" ➥\n\nVARCHAR(20),\
  \ \"LASTNAME\" VARCHAR(20));\n\n-- ----------------------------------------------\n\
  \n-- 键的 DDL 语句\n\n-- ----------------------------------------------\n\n-- 主键\n\n\
  ALTER TABLE \"APP\".\"CUSTOMER\" ADD CONSTRAINT \"SQL0903154616250\" ➥\n\nPRIMARY\
  \ KEY (\"CUSTID\");\n\n**GlassFish v3**\n\n虽然是一个相当新的应用服务器，但 GlassFish 已被大量开发者和公司使用。它不仅是\
  \ Java EE 技术的参考实现，也是下载 Sun 的 Java EE SDK 时获得的产品。你还可以在 GlassFish 应用服务器上部署关键的生产应用程序。除了是一款产品，GlassFish\
  \ 还是一个围绕开源代码聚集起来的社区，[其社区位于 http://glassfish.org。该社区](http://glassfish.org) 在邮件列表和论坛上响应非常迅速。\n\
  \n**32**\n\n第 1 章 ■ Java EE 6 概览\n\n一点历史\n\nGlassFish 的起源可以追溯到早期的 Tomcat 时代，当时 Sun\
  \ 和 JServ 团队将这项技术捐赠给了 Apache。自那以后，Sun 一直在其各种产品中重用 Tomcat。2005 年，Sun 创建了 GlassFish\
  \ 项目。其目标是开发一个完全认证的 Java EE 应用服务器，其 1.0 版本于 2006 年 5 月发布。其核心部分，GlassFish 的 Web 容器组件继承了\
  \ Tomcat 的许多特性（事实上，在 Tomcat 上运行的应用程序应该可以在 GlassFish 上不加修改地运行）。\n\nGlassFish v2 于\
  \ 2007 年 9 月发布，此后进行了多次更新。这是迄今为止部署最广泛的版本。GlassFish 在主要版本之间通常能很好地保持相同的用户体验，不会破坏代码或改变开发者的习惯。此外，“社区版”和“支持版”的\
  \ GlassFish 之间没有质量差异。虽然付费客户可以获得补丁和额外的监控工具（GlassFish Enterprise Manager），但可从 [`glassfish.org\
  \ 获取的开源版本`](http://glassfish.org) 和可从 [`www.sun.com/appserver 获取的支持版本`](http://www.sun.com/appserver)\
  \ 经过了相同程度的测试，这使得在项目周期中的任何时候切换到支持版本都非常容易。\n\n为了本书的目的，我将使用 GlassFish v3，在撰写本文时，它尚未作为最终的\
  \ Java EE 认证产品发布，但已作为“Prelude”版本（主要是一个 Web 容器）提供；由于是开源的，每日构建和里程碑构建都已可用。\n\n这个新主要版本\
  \ GlassFish 的主要目标是通过引入基于 OSGi 的内核和对 Java EE 6 的全面支持来实现核心功能的模块化。\n\n■**注意** GlassFish\
  \ 团队投入了巨大的努力来提供丰富且最新的文档，提供了许多不同的指南：快速入门指南、安装指南、管理指南、管理参考、应用程序部署指南、开发者指南等。请访问 [`wiki.glassfish.java.net/Wiki.jsp?page=GlassFishDocs\
  \ 查看它们。`](http://wiki.glassfish.java.net/Wiki.jsp?page=GlassFishDocs) 同时，也请查看常见问题解答、操作指南和\
  \ GlassFish 论坛以获取更多信息。\n\nGlassFish v3 架构\n\n作为应用程序程序员（而不是 GlassFish 开发者），你不需要了解\
  \ GlassFish v3 的内部架构，但你可能对其主要的架构选择和指导原则感兴趣。从 GlassFish v3 Prelude 开始，应用服务器构建在一个由\
  \ OSGi 驱动的模块化内核之上。GlassFish 直接运行在 Apache Felix 实现之上，但它也应该能在 Equinox 或 Knopflerfish\
  \ OSGi 运行时上运行。HK2（百千字节内核）抽象了 OSGi 模块系统以提供组件，这些组件也可以被视为服务。这些服务可以在运行时被发现和注入。目前，OSGi\
