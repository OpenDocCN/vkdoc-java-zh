  \nprivate Map<Long, Object> **cache** = new HashMap<Long, Object>();\n\n**private**\
  \ CacheSingleton() {\n\n}\n\npublic **static** **synchronized** CacheSingleton **getInstance()**\
  \ {\n\nreturn instance;\n\n}\n\npublic void addToCache(Long id, Object object) {\n\
  \nif (!cache.containsKey(id))\n\n**cache**.put(id, object);\n\n}\n\npublic void\
