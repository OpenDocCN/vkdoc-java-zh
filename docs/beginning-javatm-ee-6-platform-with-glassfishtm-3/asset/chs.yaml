  \ Fontaine、Ago、Laure、La Grille、les Eeckman、Yaya、Rita、os Navalhas、La Commune Libre\
  \ d’Aligre 等）。\n\n谢谢大家！\n\n**xxiii**\n\n引言\n\n**在**当今的商业世界中，应用程序需要访问数据、应用业务逻辑、添加表示层并与外部系统通信。这正是企业在使用能够处理高负载的标准且稳健的技术的同时，力求降低成本所努力实现的目标。如果你的情况也是如此，那么你手中拿着的正是合适的书。\n\
  \nJava 企业版出现在 20 世纪 90 年代末，为 Java 语言带来了一个用于企业开发的稳健软件平台。在每个新版本中都面临挑战，被误解或误用，过度设计，并与开源框架竞争，J2EE\
  \ 曾被视为一种重量级技术。Java EE 从这些批评中受益并得以改进，如今专注于简洁性。\n\n\n\n如果你仍然认为“EJB 不好，EJB 是邪恶的”，那么请阅读本书，你将会改变想法。EJB（企业级\
  \ Java Bean）非常出色，整个 Java EE 6 技术栈也是如此。相反，如果你已经是 Java EE 的采用者，你将在这本书中看到该平台如何通过所有技术栈的易用性、新规范、更轻量的\
  \ EJB 组件模型、配置文件和精简功能，找到了平衡点。如果你是 Java EE 的初学者，这本书也同样适合你：它以非常易于理解的方式涵盖了最重要的规范，并配有大量代码和图表，便于你学习。\n\
  \n开放标准共同构成了 Java EE 的主要优势之一。如今，使用 JPA、EJB、JSF、JMS、SOAP Web 服务或 RESTful Web 服务编写的应用程序比以往任何时候都更易于跨应用服务器移植。开源是\
  \ Java EE 的另一大优势。正如你将在本书中看到的，大多数 Java EE 6 参考实现都采用开源许可（例如 GlassFish、EclipseLink、Mojarra、OpenMQ、Metro\
  \ 和 Jersey）。\n\n本书探讨了这个新版本的创新之处，并研究了各种规范以及如何将它们组合起来开发应用程序。Java EE 6 包含近 30 个规范，是企业层（EJB\
  \ 3.1、JPA 2.0）、Web 层（Servlet 3.0、JSF 2.0）以及互操作性（SOAP Web 服务和 RESTful 服务）的一个重要里程碑。本书涵盖了\
  \ Java EE 6 规范的很大一部分，并使用了 JDK 1.6 和一些知名的设计模式，以及 GlassFish 应用服务器、Derby 数据库、JUnit\
  \ 和 Maven。书中配有大量的 UML 图、Java 代码和屏幕截图。\n\n**本书结构如何？**\n\n本书并非旨在成为 Java EE 6 的详尽参考手册。它专注于最重要的规范，并重点介绍此版本的新特性。本书的结构遵循应用程序的架构分层：\n\
