  \n**无状态组件**.persistToDatabase(**book**);\n\n无状态会话 Bean 也是最高效的类型，因为它们可以被多个客户端共享和池化。这意味着对于每个无状态\
  \ EJB，容器会在内存中保留一定数量的实例（即一个池），并在客户端之间共享它们。由于无状态 Bean 没有客户端状态，所有实例都是等价的。当客户端调用无状态\
  \ Bean 上的方法时，容器会从池中选取一个实例并将其分配给该客户端。\n\n当客户端请求结束时，该实例会返回池中以供重用。这意味着只需要少量 Bean 就能处理多个客户端，如图\
  \ 7-2 所示。\n\n容器不保证同一客户端会获得同一个实例。\n\n**图 7-2.** *客户端访问池中的无状态 Bean*\n\n清单 7-1 展示了一个无状态\
  \ EJB 可能的样子：一个仅带有单个 `@Stateless` 注解的标准 Java 类。由于它存在于容器中，因此可以使用任何容器管理的服务，其中之一就是依赖注入。`@PersistenceContext`\
