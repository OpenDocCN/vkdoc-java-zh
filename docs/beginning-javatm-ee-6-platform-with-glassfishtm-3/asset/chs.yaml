  \n</h:body>\n\n</html>\n\n**使用 web.xml 进行配置**\n\nWeb 应用通常使用 `web.xml` 部署描述符进行配置。我之所以说“通常”，是因为根据新的\
  \ Servlet 3.0 规范，`web.xml` 文件已变为可选。但由于 JSF 2.0 基于 Servlet 2.5（而非 Servlet 3.0），你仍然需要使用描述符来部署你的\
  \ Web 应用。\n\nJSF 应用需要一个名为 `FacesServlet` 的 Servlet，它充当整个应用的前端控制器。该 Servlet 必须在 `web.xml`\
  \ 文件中定义，并添加映射，如清单 10-8 所示。\n\n**清单 10-8.** *声明 FacesServlet 的 web.xml 文件*\n\n<?xml\
  \ version='1.0' encoding='UTF-8'?>\n\n<web-app version=\"2.5\"\n\n[xsi:schemaLocation=\"\
  http://java.sun.com/xml/ns/javaee](http://java.sun.com/xml/ns/javaee)\n\n[`java.sun.com/xml/ns/javaee/web-app_2_5.xsd\"\
  >`](http://java.sun.com/xml/ns/javaee)\n\n<servlet>\n\n<servlet-name>Faces Servlet</servlet-name>\n\
  \n<servlet-class> **javax.faces.webapp.FacesServlet**</servlet-class>\n\n<load-on-startup>1</load-on-startup>\n\
  \n</servlet>\n\n<servlet-mapping>\n\n第 10 章 ■ JavaServer Faces\n\n**277**\n\n<servlet-name>Faces\
  \ Servlet</servlet-name>\n\n<url-pattern> ***.faces**</url-pattern>\n\n</servlet-mapping>\n\
  \n</web-app>\n\n该部署描述符将以 `.faces` 结尾的 URL 请求映射到该 Servlet，这意味着任何以 `.faces` 扩展名请求的页面都将由\
  \ `FacesServlet` 处理。\n\n**使用 Maven 编译和打包**\n\nWeb 应用需要被编译并打包成一个 war 文件（`<packaging>war</packaging>`）。清单\
  \ 10-9 所示的 `pom.xml` 声明了编译代码所需的所有依赖项（`jsf-api`、`javax.ejb` 和 `javax.persistence`），并使用\
  \ JDK 1.6 版本。在 JSF 2.0 中，`faces-config.xml` 文件已变为可选。\n\n**清单 10-9.** *用于编译和打包 Web\
  \ 应用的 Maven pom.xml 文件*\n\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\n[<project](http://maven.apache.org/POM/4.0.0)\
