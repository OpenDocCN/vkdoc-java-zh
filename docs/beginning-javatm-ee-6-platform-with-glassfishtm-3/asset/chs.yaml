  \n// ...\n\n}\n\n}\n\n当资源方法被调用时，使用之前看到的提取器注解进行注解的参数会被填充。未注解的参数（称为*实体参数*）的值会从请求实体主体映射，并由实体提供者进行转换。\n\
  \n方法可以返回 void、Response 或其他 Java 类型。当需要提供额外的元数据时，会使用 Response；例如，当你创建一个新客户时，可能需要返回该客户的\
  \ URI。\n\n**上下文信息**\n\n当处理请求时，资源提供者需要上下文信息来正确执行请求。@javax.ws.rs.core.Context 注解用于将以下类注入到属性或方法参数中：HttpHeaders、UriInfo、Request、SecurityContext\
  \ 和 Providers。例如，清单 15-10 展示了注入 UriInfo 以便构建 URI 的代码。\n\n第 15 章 ■ RESTful Web 服务\n\
  \n**451**\n\n**清单 15-10.** *一个获取 UriInfo 的客户资源*\n\n@Path(\"/customers\")\n\npublic\
  \ class CustomersResource {\n\n**@Context**\n\nUriInfo **uriInfo**;\n\n@GET\n\n\
