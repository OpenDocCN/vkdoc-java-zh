  \n**更易于使用**\n\n除了使平台更轻量，Java EE 6 的目标之一也是使其更易于使用。该版本采取的一个方向是将易用性范式应用于 Web 层。Java\
  \ EE\n\n组件需要元数据来指示容器关于组件的行为。在\n\nJava EE 5 之前，唯一可用的格式是 XML 部署描述符文件，但注解出现在 EJB、实体和\
  \ Web 服务中。由于需要编写的 XML 更少，组件将更易于打包和部署。在 Java EE 5 中，企业层被重新架构，组件转向 POJO 和接口。但 Web\
  \ 层并未从这些改进中受益。\n\n如今在 Java EE 6 中，Servlet、JSF 托管 Bean、JSF 转换器、验证器和渲染器也都是带有可选 XML\
  \ 部署描述符的注解类。清单 1-1 展示了一个 JSF 托管 Bean，它实际上是一个带有单个注解的 Java 类。如果你已经熟悉 JSF，你会很高兴地知道，在大多数情况下，`faces-config.xml`\
  \ 文件变为可选的（如果你不了解 JSF，你将在第 10 章到第 12 章中学习它）。\n\n**清单 1-1.** *一个 JSF 托管 Bean*\n\n\
  **@ManagedBean**\n\npublic class BookController {\n\n@EJB\n\nprivate BookEJB bookEJB;\n\
  \nprivate Book book = new Book();\n\nprivate List<Book> bookList = new ArrayList<Book>();\n\
  \npublic String doCreateBook() {\n\nbook = bookEJB.createBook(book);\n\nbookList\
  \ = bookEJB.findBooks();\n\nreturn \"listBooks.xhtml\";\n\n}\n\n**14**\n\n第 1 章\
  \ ■ Java EE 6 概览\n\n// Getters, setters\n\n}\n\nEJB 在 Java EE 6 中也变得更容易开发。如清单 1-2\
  \ 所示，如果你需要本地访问一个 EJB，一个简单的、没有接口的注解类就足够了。EJB 也可以直接部署在 war 文件中，而无需事先打包在 jar 文件中。这使得\
  \ EJB 成为最简单的、可用于从简单 Web 应用程序到\n\n\n\n复杂的企业级应用。\n\n**清单 1-2.** *一个无状态 EJB*\n\n**@Stateless**\n\
  \npublic class BookEJB {\n\n@PersistenceContext(unitName = \"chapter01PU\")\n\n\
  private EntityManager em;\n\npublic Book **findBookById**(Long id) {\n\nreturn em.find(Book.class,\
  \ id);\n\n}\n\npublic Book **createBook**(Book book) {\n\nem.persist(book);\n\n\
  return book;\n\n}\n\n}\n\n**更丰富**\n\n一方面，Java EE 6 通过引入配置文件（profiles）变得更轻量，另一方面，它也通过添加新规范和改进现有规范而变得更丰富。RESTful\
  \ Web 服务已逐渐进入现代应用。Java EE 6 通过添加新的 JAX-RS 规范来满足企业的需求。如清单 1-3 所示，RESTful Web 服务是一个带有注解的\
  \ Java 类，用于响应 HTTP 操作。你将在第 15 章中了解更多关于 JAX-RS 的内容。\n\n**清单 1-3.** *一个 RESTful Web\
  \ 服务*\n\n**@Path(\"books\")**\n\npublic class BookResource {\n\n@PersistenceContext(unitName\
  \ = \"chapter01PU\")\n\nprivate EntityManager em;\n\n**@GET**\n\n**@Produces**({\"\
  application/xml\", \"application/json\"})\n\npublic List<Book> **getAllBooks**()\
  \ {\n\n第 1 章 ■ Java EE 6 概览\n\n**15**\n\nQuery query = em.createNamedQuery(\"findAllBooks\"\
  );\n\nList<Book> books = query.getResultList();\n\nreturn books;\n\n}\n\n}\n\n新版本的持久化\
  \ API（JPA 2.0）通过添加简单数据类型（String、Integer 等）的集合、悲观锁、更丰富的 JPQL 语法、全新的查询定义 API 以及对缓存\
  \ API 的支持而得到改进。JPA 将在第 2 章至第 5 章中讨论。\n\nEJB 更易于开发（具有可选接口）和打包（在 war 文件中），但它们也具有新特性，例如使用异步调用或更丰富的定时器服务来调度任务的可能性。此外，还新增了单例会话\
  \ Bean 组件。如清单 1-4 所示，一个简单的注解就能将 Java 类转换为容器管理的单例（每个应用一个组件实例）。你将在第 6 章至第 9 章中了解更多关于这些新特性的内容。\n\
  \n**清单 1-4.** *一个单例会话 Bean*\n\n**@Singleton**\n\npublic class CacheEJB {\n\nprivate\
  \ Map<Long, Object> **cache** = new HashMap<Long, Object>();\n\npublic void addToCache(Long\
  \ id, Object object) {\n\nif (!cache.containsKey(id))\n\n**cache**.put(id, object);\n\
  \n}\n\npublic Object getFromCache(Long id) {\n\nif (cache.containsKey(id))\n\nreturn\
  \ **cache**.get(id);\n\nelse\n\nreturn null;\n\n}\n\n}\n\n表示层也变得更丰富。JSF 2.0 增加了对\
  \ Ajax 和 Facelets 的支持（参见第 10 章至第 12 章）。\n\n**更具可移植性**\n\n从诞生之初，Java EE 的目标就是支持开发一个应用，并将其部署到任何应用服务器上，而无需更改代码或配置文件。\n\
  \n但这从来都不像看起来那么容易。规范并未涵盖所有细节，最终实现往往提供了不可移植的解决方案。例如，JNDI 名称就是如此。如果你将 EJB 部署到 GlassFish、JBoss\
  \ 或 WebLogic，JNDI 名称会有所不同，因为它不属于规范的一部分，因此你必须根据所使用的应用服务器更改代码。\n\n![Image 11](img/index-46_1.jpg)\n\
  \n**16**\n\n第 1 章 ■ Java EE 6 概览\n\n这个问题现在已得到解决，因为 Java EE 6 规定了 JNDI 名称的语法，该语法在所有应用服务器上都是相同的（参见第\
  \ 7 章）。\n\nEJB 的另一个难点是测试它们或在 Java SE 环境中使用它们的能力。一些应用服务器（如 JBoss）有特定的实现来做到这一点。EJB\
  \ 3.1 规范了一个嵌入式容器，这是一个用于在 Java SE 环境中执行 EJB 的标准 API（参见第 7 章）。\n\n**CD-BookStore 应用**\n\
  \n在本书中，你将看到处理实体、EJB、JSF 页面、JMS 监听器以及 SOAP 或 RESTful Web 服务的代码片段。它们都属于 CD-BookStore\
  \ 应用。\n\n该应用是一个电子商务网站，允许客户浏览在售的书籍和 CD 目录。该应用与银行系统有外部交互，用于验证信用卡号。图 1-5 中的用例图描述了系统的参与者和功能。\n\
  \n**图 1-5.** *CD-BookStore 应用的用例图*\n\n与图 1-5 中描述的系统交互的参与者是：\n\n*   *员工*：公司员工，需要管理商品目录和客户详细信息。他们也可以浏览采购订单。\n\
  *   *用户*：匿名访问网站并浏览书籍和 CD 目录的人员。如果他们想购买商品，需要创建一个账户成为客户。\n\n第 1 章 ■ Java EE 6 概览\n\
  \n**17**\n\n*   *客户*：可以浏览目录、更新账户详情以及在线购买商品。\n*   *外部银行*：系统将信用卡验证委托给该银行。\n\n■**注意**\
