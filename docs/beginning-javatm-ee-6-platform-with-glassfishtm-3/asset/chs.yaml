  \n第 1 章\n\nJava EE 6 概览\n\n**当**今的企业生活在一个全球竞争的世界中。它们需要应用程序来满足其日益复杂的业务需求。在这个全球化时代，公司分布在各大陆，它们通过互联网\
  \ 24/7 全天候地在不同国家开展业务，其系统必须国际化，并准备好处理不同的货币和时区。所有这一切都必须在降低成本、缩短服务响应时间、将业务数据存储在可靠且安全的存储设备上，并为客户、员工和供应商提供多种图形用户界面的同时完成。\n\
  \n大多数公司必须将这些创新挑战与其现有的企业信息系统（EIS）相结合，同时开发企业对企业（B2B）应用程序以与合作伙伴通信。公司需要协调存储在不同地点、由多种编程语言处理并通过不同协议路由的内部数据，这也不罕见。当然，它必须在不亏损的情况下做到这一点，这意味着要防止系统崩溃，并保持高可用性、可扩展性和安全性。企业应用程序必须面对变化和复杂性，并且要健壮。这正是\
  \ Java 企业版（Java EE）被创建的原因。\n\nJava EE 的第一个版本（最初称为 J2EE）专注于公司在 1999 年面临的关注点：分布式组件。从那时起，软件应用程序不得不适应新的技术解决方案，如\
  \ SOAP 或 RESTful Web 服务。该平台已经发展，通过规范提供各种标准的工作方式来响应这些技术需求。多年来，Java EE 已经发生变化，变得更丰富、更简单、更易于使用，并且更具可移植性。\n\
  \n在本章中，我将向你概述 Java EE。在介绍其内部架构之后，我将介绍 Java EE 6 的新特性。本章的第二部分重点介绍如何设置你的开发环境，以便你可以通过跟随这些页面中列出的代码片段进行一些动手实践。\n\
  \n**理解 Java EE**\n\n当你想要处理对象集合时，你不会从头开始开发自己的哈希表；你会使用集合 API。类似地，如果你需要一个事务性、安全、可互操作且分布式的应用程序，你也不想开发所有底层\
  \ API：你会使用 Java 企业版。正如 Java 标准版（Java SE）提供了处理集合的 API 一样，Java EE 提供了处理事务（Java 事务\
  \ API，JTA）、消息传递（Java 消息服务，JMS）或持久化（Java 持久化 API）的标准方式。\n\n**1**\n\n![Image 7](img/index-32_1.jpg)\n\
  \n**2**\n\n第 1 章 ■ Java EE 6 概览\n\n(JPA)。Java EE 是一组面向企业应用程序的规范。它可以被视为 Java SE 的扩展，旨在促进分布式、健壮、强大且高可用性应用程序的开发。\n\
  \n\n\nJava EE 6 是一个重要的里程碑。它不仅延续了 Java EE 5 专注于简化开发模型的步伐，还增加了新的规范，并通过引入配置文件和精简机制使其更加轻量。Java\
  \ EE 6 的发布恰逢企业平台诞生十周年。它结合了 Java 语言的优势与过去十年积累的经验。此外，它还受益于开源社区的活力以及 JCP 的严谨性。如今，Java\
  \ EE 是一个文档完备的平台，拥有经验丰富的开发者、庞大的社区，以及众多部署在\n\n公司服务器上运行的应用。Java EE 是一套用于构建标准化的、基于组件的多层应用程序的\
  \ API 集合。这些组件部署在不同的容器中，这些容器提供一系列服务。\n\n**一点历史**\n\n十年是一个回顾 Java EE（见图 1-1）演变的良好时机，它以前被称为\
  \ J2EE。J2EE 1.2 最初由 Sun 公司开发，于 1999 年作为一项包含十个 Java 规范请求（JSR）的总括规范发布。当时人们还在谈论 CORBA，因此\
  \ J2EE 1.2 在设计时就考虑到了分布式系统。企业 JavaBeans（EJB）被引入，支持远程有状态和无状态服务对象，并可选择支持持久化对象（实体 Bean）。它们构建在事务性和分布式组件模型之上，使用\
  \ RMI-IIOP（远程方法调用-互联网\n\n内部 ORB 协议）作为底层协议。Web 层拥有 Servlet 和 JavaServer Pages（JSP），而\
  \ JMS 用于发送消息。\n\n**图 1-1.** *J2EE/Java EE 的历史*\n\n第 1 章 ■ 概览 Java EE 6\n\n**3**\n\
  \n■**注** CORBA 大约起源于 1988 年，正是因为企业系统开始走向分布式（例如，Tuxedo、CICS）。EJB 以及随后的 J2EE 都基于相同的假设，但那是十年之后的事了。\n\
  \n到 J2EE 起步时，CORBA 已经成熟且具备工业级强度，但公司开始寻求纯 Java 的解决方案。CORBA 的语言无关方法变得多余。\n\n从 J2EE\
  \ 1.3 开始，该规范由 Java 社区进程（JCP）根据 JSR 58 制定。对实体 Bean 的支持成为强制要求，并且 EJB 引入了 XML\n\n部署描述符来存储元数据（在\
  \ EJB 1.0 中，这些元数据被序列化到一个文件中）。此版本通过引入本地接口和按引用传递参数，解决了通过远程接口按值传递参数的开销问题。引入了 J2EE 连接器架构（JCA）来连接\
  \ Java EE 与企业信息系统（EIS）。\n\n■**注** JCP 是一个开放的组织，成立于 1998 年，参与定义 Java 平台的未来版本和特性。当确定需要新的组件或\
  \ API 时，发起人（也称为规范负责人）会创建一个 JSR 并组建一个专家组。该小组由公司代表、组织或个人组成，负责 JSR 的开发，并需要交付：1）一份解释细节并定义\
  \ JSR 基础的规范，2）一个参考实现（RI），即该规范的实际实现，以及 3）一个兼容性测试套件（也称为技术兼容性套件，或 TCK），这是一组测试，每个实现都需要通过才能声称符合规范。一旦获得执行委员会（EC）批准，该规范就会发布给社区进行实现。Java\
  \ EE 被称为总括 JSR 或平台版规范（例如配置文件），因为它将其他 JSR 联系在一起。\n\nJ2EE 1.4（JSR 151）在 2003 年包含了\
  \ 20 个规范，并增加了对 Web 服务的支持。\n\nEJB 2.1 允许通过 SOAP/HTTP 调用会话 Bean。创建了一个定时器服务，允许在指定时间或间隔调用\
  \ EJB。此版本为应用程序组装和部署提供了更好的支持。\n\n尽管其支持者预测它会有光明的未来，但 J2EE 的承诺并未全部实现。用它创建的系统过于复杂，开发时间常常与用户需求的复杂性完全不成比例。J2EE\
  \ 被视为一个重量级组件模型：难以测试、难以部署、难以运行。就在那时，像 Struts、Spring 或 Hibernate 这样的框架出现了，并展示了一种开发企业应用的新方式。幸运的是，在\
  \ 2006 年第二季度，Java EE 5（JSR 244）发布了，并带来了显著的改进。它从开源框架中汲取灵感，回归了简单的旧式 Java 对象（POJO）编程模型。\n\
  \n元数据可以通过注解定义，XML 描述符变为可选。从开发者的角度来看，EJB 3 和新的 JPA 更像是平台的一次量子飞跃，而非演进。JavaServer Faces（JSF）被引入作为标准的表示层框架，而\
  \ JAX-WS 2.0 取代了 JAX-RPC 成为 SOAP Web 服务 API。\n\n**4**\n\n第 1 章 ■ 概览 Java EE 6\n\n\
  如今，Java EE 6（JSR 316）遵循简化开发的路径，在整个平台（包括 Web 层）中拥抱注解、POJO 编程和异常配置机制的概念。它带来了一系列丰富的创新，例如全新的\
  \ JAX-RS 1.1，简化了像 EJB 3.1 这样的成熟 API，并丰富了其他 API，如 JPA 2.0 或定时器服务。但 Java EE 6 的主要主题是可移植性（例如，通过标准化全局\
  \ JNDI 命名）、弃用某些规范（通过精简），以及通过配置文件创建平台的子集。在本书中，我想向您展示这些改进，以及 Java 企业版变得多么简单和丰富。\n\n\
  **标准**\n\n如您所见，Java EE 基于标准。它是一个总括规范，捆绑了许多其他 JSR。您可能会问为什么标准如此重要，因为一些最成功的 Java 框架并未标准化（Struts、Spring\
  \ 等）。纵观历史，人类创建标准是为了简化沟通和交流。一些显著的\n\n例子包括语言、货币、时间、导航、度量衡、工具、铁路、电力、电报、电话、协议和编程语言。\n\
  \n在 Java 的早期，如果您从事任何类型的 Web 或企业开发，您都生活在一个专有的世界里，要么创建自己的框架，要么将自己锁定在专有的商业框架中。然后是开源框架的时代，这些框架并不总是基于开放标准。您可以使用开源并被锁定在单一实现上，或者使用实现标准的开源并保持可移植性。Java\
  \ EE\n\n提供了开放标准，这些标准由多个商业（WebLogic、Websphere、MQSeries 等）或开源（GlassFish、JBoss、Hibernate、Open\
  \ JPA、Jersey 等）框架实现，用于处理事务、安全性、有状态组件、对象持久化等。\n\n如今，在 Java EE 的历史上，您的应用程序比以往任何时候都更容易部署到任何兼容的应用服务器上，只需进行极少的更改。\n\
  \n**架构**\n\nJava EE 是一组由不同容器实现的规范。容器是 Java EE\n\n运行时环境，为它们托管的组件提供某些服务，例如生命周期管理、依赖注入等。这些组件使用定义良好的\n\
  \n契约与 Java EE 基础设施以及其他组件进行通信。它们需要以标准方式（通过归档文件）打包后才能部署。Java EE\n\n是 Java SE 平台的超集，这意味着任何\
  \ Java EE 组件都可以使用 Java SE API。\n\n\n\n图 1-2 展示了容器之间的逻辑关系。箭头表示一个容器访问另一个容器所使用的协议。例如，Web\
  \ 容器托管 Servlet，这些 Servlet 可以通过 RMI-IIOP 访问 EJB。\n\n![Image 8](img/index-35_1.jpg)\n\
  \n第 1 章 ■ Java EE 6 概览\n\n**5**\n\n**图 1-2.** *标准 Java EE 容器*\n\n组件\n\nJava EE 运行时环境定义了实现必须支持的四种组件类型：\n\
  \n• *Applet* 是在 Web 浏览器中执行的 GUI 应用程序。它们使用丰富的 Swing API 来提供强大的用户界面。\n\n• *应用程序* 是在客户端上执行的程序。它们通常是\
  \ GUI 或批处理程序，可以访问 Java EE 中间层的所有设施。\n\n• *Web 应用程序*（由 Servlet、Servlet 过滤器、Web 事件监听器、JSP\
  \ 页面和 JSF 组成）在 Web 容器中执行，并响应来自 Web 客户端的 HTTP 请求。Servlet 还支持 SOAP 和 RESTful Web 服务端点。\n\
  \n• *企业级 JavaBean* 是用于处理事务性业务逻辑的容器管理组件。它们可以通过 RMI（或通过 HTTP 用于 SOAP 和 RESTful Web\
  \ 服务）进行本地和远程访问。\n\n容器\n\nJava EE 基础设施被划分为称为容器的逻辑域（见图 1-2）。每个容器都有特定的角色，支持一组 API，并为组件提供服务（安全性、数据库访问、事务处理、命名目录、资源注入）。\n\
  \n容器隐藏了技术复杂性并增强了可移植性。根据你想要构建的应用程序类型，你需要了解每个容器的能力和限制，以便使用一个或多个容器。例如，如果你需要开发一个 Web\
  \ 表示层，你将开发一个 JSF 应用程序并将其部署到 Web 容器中，而不是 EJB 容器。但是，如果你希望一个 Web 应用程序调用业务层，则可能需要同时使用\
  \ Web 和 EJB 容器。\n\n**6**\n\n第 1 章 ■ Java EE 6 概览\n\n大多数 Web 浏览器提供 Applet 容器来执行 Applet\
  \ 组件。当你开发 Applet 时，你可以专注于应用程序的视觉方面，而容器则为你提供一个安全的环境。Applet 容器使用沙箱安全模型，其中在“沙箱”中执行的代码不允许“在沙箱外运行”。这意味着容器会阻止任何下载到本地计算机的代码访问本地系统资源，例如进程或文件。\n\
  \n应用程序客户端容器（ACC）包含一组 Java 类、库和其他文件，这些文件用于为 Java SE 应用程序（Swing、批处理或仅包含 main()方法的类）提供注入、安全管理和命名服务。ACC\
  \ 使用 RMI-IIOP 与 EJB 容器通信，并使用 HTTP（例如，用于 Web 服务）与 Web 容器通信。\n\nWeb 容器（也称为 Servlet\
  \ 容器）为管理和执行 Web 组件（Servlet、JSP、过滤器、监听器、JSF 页面和 Web 服务）提供底层服务。它负责实例化、初始化和调用 Servlet，并支持\
  \ HTTP 和 HTTPS 协议。它是用于向客户端浏览器提供网页的容器。\n\nEJB 容器负责管理包含 Java EE 应用程序业务逻辑层的企业级 Bean\
  \ 的执行。它创建 EJB 的新实例，管理其生命周期，并提供事务、安全性、并发性、分布、命名服务或异步调用的可能性等服务。\n\n服务\n\n容器为其部署的组件提供底层服务。作为开发人员，你可以专注于实现业务逻辑，而不是解决企业应用程序中面临的技术问题。图\
  \ 1-3 展示了每个容器提供的服务。例如，Web 和 EJB 容器提供用于访问 EIS 的连接器，但 Applet 容器或 ACC 不提供。Java EE 提供以下服务：\n\
  \n• *JTA*：此服务提供容器和应用程序使用的事务划分 API。它还在服务提供者接口（SPI）级别提供了事务管理器与资源管理器之间的接口。\n\n• *JPA*：用于对象关系映射（ORM）的标准\
  \ API。使用 Java 持久化查询语言（JPQL），你可以查询存储在底层数据库中的对象。\n\n• *JMS*：JMS 允许组件通过消息进行异步通信。它支持可靠的点对点（P2P）消息传递以及发布-订阅（pub-sub）模型。\n\
  \n• *Java 命名和目录接口（JNDI）*：此 API 包含在 Java SE 中，用于访问命名和目录系统。你的应用程序使用它将名称与对象关联（绑定），然后在目录中查找这些对象（查找）。你可以查找数据源、JMS\
  \ 工厂、EJB 和其他资源。在 J2EE 1.4 之前，JNDI 在你的代码中无处不在，现在通过注入以更透明的方式使用。\n\n• *JavaMail*：许多应用程序需要能够发送电子邮件，这可以通过使用\
  \ JavaMail API 来实现。\n\n• *JavaBeans 激活框架（JAF）*：JAF API 包含在 Java SE 中，提供了一个用于处理不同\
  \ MIME 类型数据的框架。它被 JavaMail 使用。\n\n![Image 9](img/index-37_1.jpg)\n\n第 1 章 ■ Java\
  \ EE 6 概览\n\n**7**\n\n• *XML 处理*：大多数 Java EE 组件可以使用可选的 XML 部署描述符进行部署，并且应用程序通常需要操作\
  \ XML 文档。用于 XML 处理的 Java API（JAXP）提供了使用 SAX 和 DOM API 解析文档以及 XSLT 的支持。用于 XML 的流式\
  \ API（StAX）提供了用于 XML 的拉解析 API。\n\n• *JCA*：连接器允许你从 Java EE 组件访问 EIS。这些可以是数据库、大型机或企业资源规划（ERP）程序。\n\
  \n• *安全服务*：Java 认证和授权服务（JAAS）使服务能够对用户进行身份验证并实施访问控制。用于容器的 Java 授权服务提供者合同（JACC）定义了\
  \ Java EE 应用服务器与授权服务提供者之间的合同，允许将自定义授权服务提供者插入任何 Java EE 产品。\n\n• *Web 服务*：Java EE\
  \ 支持 SOAP 和 RESTful Web 服务。用于 XML Web 服务的 Java API（JAX-WS）取代了用于基于 XML 的 RPC 的 Java\
  \ API（JAX-RPC），提供了对使用 SOAP/HTTP 协议的 Web 服务的支持。用于 RESTful Web 服务的 Java API（JAX-RS）提供了对使用\
  \ REST 风格的 Web 服务的支持。\n\n• *管理*：Java EE 定义了使用特殊管理企业级 Bean 来管理容器和服务器的 API。Java 管理扩展（JMX）API\
  \ 也用于提供一些管理支持。\n\n• *部署*：Java EE 部署规范定义了部署工具与 Java EE 产品之间的合同，以标准化应用程序部署。\n\n**图\
  \ 1-3.** *容器提供的服务*\n\n**8**\n\n第 1 章 ■ Java EE 6 概览\n\n网络协议\n\n如图 1-3 所示（参见 Java\
  \ EE 6 规范的“平台概述”部分），部署在容器中的组件可以通过不同的协议进行调用。例如，部署在 Web 容器中的 Servlet 可以通过 HTTP 调用，而部署在\
  \ EJB 容器中的具有 EJB 端点的 Web 服务也是如此。以下是 Java EE 支持的协议列表：\n\n\n\n• *HTTP*：HTTP 是 Web\
  \ 协议，在现代应用中无处不在。其客户端 API 由 Java SE 中的 `java.net` 包定义。HTTP 服务端 API 则由 Servlet、JSP、JSF\
  \ 接口以及 SOAP 和 RESTful Web 服务定义。HTTPS 是 HTTP 与安全套接层（SSL）协议的结合。\n\n• *RMI-IIOP*：远程方法调用（RMI）允许你独立于底层协议调用远程对象。Java\
  \ SE 原生 RMI 协议是 Java 远程方法协议（JRMP）。RMI-IIOP 是 RMI 的扩展，用于与 CORBA 集成。Java 接口定义语言（IDL）允许\
  \ Java EE 应用组件使用 IIOP 协议调用外部 CORBA 对象。CORBA 对象可以用多种语言（Ada、C、C++、Cobol 等）以及 Java\
  \ 编写。\n\n打包\n\n为了部署到容器中，组件必须首先打包成标准格式的归档文件。Java SE 定义了 Java 归档（jar）文件，用于将许多文件（Java\
  \ 类、部署描述符、资源或外部库）聚合到一个压缩文件（基于 ZIP 格式）中。Java EE 定义了不同类型的模块，这些模块基于这种通用的 jar 格式拥有自己的打包格式。\n\
  \n一个应用客户端模块包含打包在 jar 文件中的 Java 类和其他资源文件。这个 jar 文件可以在 Java SE 环境或应用客户端容器中执行。与任何其他归档格式一样，jar\
  \ 文件包含一个可选的 `META-INF` 目录，用于存放描述归档的元信息。`META-INF/MANIFEST.MF` 文件用于定义与扩展和包相关的数据。如果部署在\
  \ ACC 中，部署描述符可选地位于 `META-INF/application-client.xml`。\n\n一个 EJB 模块包含一个或多个会话和/或消息驱动\
  \ Bean（MDB），打包在 jar 文件（通常称为 EJB jar 文件）中。它包含一个可选的 `META-INF/ejb-jar.xml` 部署描述符，并且只能部署在\
  \ EJB 容器中。\n\n一个 Web 应用模块包含 Servlet、JSP、JSF 页面和 Web 服务，以及任何其他与 Web 相关的文件（HTML 和\
  \ XHTML 页面、层叠样式表（CSS）、JavaScript、图片、视频等）。自 Java EE 6 起，Web 应用模块还可以包含 EJB Lite Bean（第\
  \ 6 章描述的 EJB API 的子集）。所有这些工件都打包在扩展名为 `.war` 的 jar 文件中（通常称为 war 文件或 Web 归档）。可选的 Web\
  \ 部署描述符定义在 `WEB-INF/web.xml` 文件中。如果 war 包含 EJB Lite Bean，则可以在 `WEB-INF/ejb-jar.xml`\
  \ 设置可选的部署描述符。Java `.class` 文件放置在 `WEB-INF/classes` 目录下，依赖的 jar 文件放置在 `WEB-INF/lib`\
  \ 目录下。\n\n一个企业模块可以包含零个或多个 Web 应用模块、零个或多个 EJB 模块以及其他公共或外部库。所有这些被打包到一个企业归档（扩展名为 `.ear`\
  \ 的 jar 文件）中，以便这些不同模块的部署能够同时且一致地进行。可选的企业模块部署描述符定义在 `META-INF/application.xml` 文件中。特殊的\
  \ `lib` 目录用于在模块之间共享公共库。\n\nJava 标准版\n\n强调 Java EE 是 Java SE（Java 标准版）的超集这一点很重要。这意味着\
  \ Java 语言的所有特性以及 API 在 Java EE 中同样可用。\n\nJava SE 6 于 2006 年 12 月 11 日正式发布。它是在 JSR\
  \ 270 下开发的，带来了许多新特性，并延续了 Java SE 5 引入的易用性（自动装箱、注解、泛型、枚举等）。Java SE 6 提供了用于诊断、管理和监控应用程序的新工具。它改进了现有的\
  \ JMX API，并简化了在 Java 虚拟机（JVM）中执行脚本语言的过程。本书不明确涵盖 Java SE 6，因此如果你对此不熟悉，应参考现有的广泛 Java\
  \ 文献。一个不错的起点是 Jeff Friesen 所著的 *《Beginning Java™ SE 6 Platform: From Novice to Professional》*（Apress，2007\
  \ 年）。\n\n**Java EE 6 规范**\n\nJava EE 6 是由 JSR 316 定义的一个总括性规范，包含 28 个其他规范。旨在符合 Java\
  \ EE 6 的应用服务器必须实现所有这些规范。表 1-1 至 1-5 列出了所有这些规范及其版本和 JSR 编号。一些规范已被修剪，这意味着它们可能会从 Java\
  \ EE 7 中移除。\n\n**表 1-1.** *Java 企业版规范*\n\n**规范**\n\n**版本 JSR**\n\n**URL**\n\nJava\
