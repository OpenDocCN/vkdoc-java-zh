  <td>机器人</td>\n<td>18.5</td>\n<td>畅销书</td>\n<td>317</td>\n<td>true</td>\n</tr>\n\
  </table>\n</update>\n</changes>\n</partial-response>\n\n**总结**\n\n前一章探讨了 JSF 的图形化方面，而本章则聚焦于其动态特性。JSF\
  \ 遵循 MVC 设计模式，其规范涵盖了从使用组件创建用户界面到使用受管 Bean 处理数据的各个方面。\n\n受管 Bean 是 JSF 的核心，因为它们用于处理业务逻辑、调用\
  \ EJB、数据库等，以及在页面之间进行导航。它们具有作用域和生命周期（类似于无状态会话 Bean），并声明了通过表达式语言绑定到 UI 组件的方法和属性。注解和异常配置极大地简化了\
  \ JSF 2.0，因为现在大部分 XML 配置都是可选的。\n\n接着，我展示了如何在任何输入组件上处理转换和验证。JSF 为大多数常见情况定义了一组转换器和验证器，但也允许你轻松创建和注册自定义的转换器和验证器。\n\
  \n虽然 Ajax 技术已经存在多年，但 JSF 2.0 提供了标准支持，允许网页异步调用受管 Bean。它定义了一个标准的 JavaScript 库，开发者无需编写脚本，而是使用函数来刷新页面的部分内容。\n\
  \n接下来的三章将重点介绍如何通过消息传递、SOAP Web 服务和 RESTful Web 服务与系统进行互操作。\n\n第 13 章\n\n发送消息\n\n\
  到目前为止，你所看到的大多数组件间通信都是同步的：一个类调用另一个类，受管 Bean 调用 EJB，EJB 再调用实体，等等。在这种情况下，调用方和目标必须同时运行才能通信成功，并且调用方必须等待目标完成才能继续。除了\
  \ EJB 中的异步调用外，大多数 Java EE 组件都使用同步调用（本地或远程）。当我们谈论消息传递时，我们指的是组件之间松散耦合的异步通信。\n\n面向消息的中间件（MOM）是一种软件（提供者），它支持异构系统之间的异步消息传递。它可以看作是系统之间的缓冲区，这些系统以各自的速度生产和消费消息（例如，一个系统全天候运行，另一个系统仅在夜间运行）。它本质上是松散耦合的，因为发送方不知道通信通道另一端的谁会接收消息并执行操作。发送方和接收方不必同时在线才能通信。事实上，它们甚至不知道彼此的存在，因为它们使用中间缓冲区。在这方面，MOM\
  \ 与远程方法调用（RMI）等技术完全不同，后者要求应用程序知道远程应用程序方法的签名。\n\n如今，典型的企业拥有许多应用程序，这些应用程序通常用不同的语言编写，执行定义明确的任务。MOM\
  \ 允许这些应用程序独立工作，同时成为信息工作流过程的一部分。只要发送方和接收方就消息格式和中间目的地达成一致，消息传递就是以松散耦合、异步方式集成现有和新应用程序的良好解决方案。这种通信可以在组织内部本地进行，也可以分布在多个外部服务之间。\n\
  \n**理解消息**\n\nMOM 已经存在了一段时间，它使用一套特殊的词汇。当发送消息时，存储消息并分发它的软件称为*提供者*（有时也称为*代理*）。消息发送方称为*生产者*，消息存储的位置称为*目的地*。接收消息的组件称为*消费者*。任何对该特定目的地上的消息感兴趣的组件都可以消费它。图\
  \ 13-1 说明了这些概念。\n\n**357**\n\n![Image 112](img/index-388_1.jpg)\n\n**358**\n\n第\
  \ 13 章 ■ 发送消息\n\n**图 13-1.** *MOM 架构*\n\n在 Java EE 中，处理这些概念的 API 称为 Java 消息服务（JMS）。它拥有一组接口和类，允许你连接到提供者、创建消息、发送消息和接收消息。JMS\
  \ 实际上并不传输消息；它需要一个负责处理消息的提供者。在容器中运行时，可以使用消息驱动 Bean（MDB）以容器管理的方式接收消息。\n\n**JMS**\n\
  \nJMS 是一个标准的 Java API，允许应用程序异步地创建、发送、接收和读取消息。它定义了一组通用的接口和类，使程序能够与其他消息提供者通信。JMS 类似于\
  \ JDBC：后者连接到各种数据库（Derby、MySQL、Oracle、DB2 等），而 JMS 连接到各种提供者（OpenMQ、MQSeries、SonicMQ\
  \ 等）。\n\nJMS API 涵盖了消息传递所需的所有功能，即通过目的地发送和接收消息。它提供了：\n\n• *消息生产者*：JMS 为客户端生成消息提供了\
  \ API（也称为发送者和发布者）。\n\n• *消息消费者*：该 API 允许客户端应用程序消费消息（也称为接收者或订阅者）。\n\n• *消息*：消息由标头、属性和包含不同信息（文本、对象等）的消息体组成。\n\
  \n• *连接和目的地*：该 API 拥有多个工厂，可以从中获取与提供者的连接以及目的地（队列和主题）。\n\n**MDB**\n\nMDB 是在 EJB 容器内执行的异步消息消费者。正如你在第\
  \ 6 章到第 9 章中所看到的，容器负责处理多项服务（事务、安全性、并发性、消息确认等），而 MDB 则专注于消费 JMS 消息。MDB 是无状态的，这意味着\
  \ EJB 容器可以拥有大量\n\n\n\n实例并发执行，以处理来自各种 JMS 生产者的消息。即使它们看起来像无状态 Bean，客户端应用程序也无法直接访问\
  \ MDB；与 MDB 通信的唯一方式是将消息发送到 MDB 正在监听的**目标**。\n\n通常，MDB 会监听一个目标（队列或主题），当消息到达时，它们会消费并处理该消息。它们还可以以安全、事务性的方式将业务逻辑委托给其他无状态会话\
  \ Bean。由于是无状态的，MDB 不会在从一个接收到的消息到下一个消息的独立调用之间维护状态。MDB 响应容器接收到的 JMS 消息，\n\n第 13 章\
  \ ■ 发送消息\n\n**359**\n\n而无状态会话 Bean 则通过适当的接口（本地、远程或无接口）响应客户端请求。\n\n**消息传递规范概述**\n\
  \nJava 中的消息传递主要由 JMS 代表，它可用于在标准（Java SE）或企业（Java EE）环境中运行的应用程序。MDB 是 JMS 消费者的企业扩展，并绑定到\
  \ EJB 规范。\n\n**消息传递简史**\n\n直到 20 世纪 80 年代末，公司还没有任何简单的方法来连接不同的应用程序。\n\n开发人员必须为系统编写单独的软件适配器，以将数据从源应用程序转换为目标系统能够理解的格式（反之亦然）。\n\
  \n由于服务器处理能力和可用性的差异，创建了缓冲区来暂缓处理。缺乏统一的传输协议导致了低级协议适配器的出现。到 20 世纪 80 年代末，中间件开始出现，解决了这些集成问题。第一批\
  \ MOM 被创建为独立的软件，可以位于应用程序中间，管理系统之间的“管道”。它们能够管理不同的平台、不同的编程语言、各种网络协议以及多样化的硬件。\n\n**JMS\
  \ 1.1**\n\nJMS 规范于 1998 年 8 月首次发布。它由主要的中间件供应商创建，旨在将消息传递功能引入 Java。JSR 914 经历了微小的变更（JMS\
  \ 1.0.1、1.0.2 和 1.0.2b），最终于 2002 年 4 月达到了 1.1 版本。自那时起，该规范就没有再改变过。JMS 1.1 被集成到 J2EE\
  \ 1.2 中，并从此成为 Java EE 的一部分。然而，JMS 和 MDB 并不属于我在第一章中描述的 Web Profile 规范。这意味着它们将在实现完整\
  \ Java EE 6 平台的应用程序服务器上可用。\n\n尽管 JMS 是一个冗长且底层的 API，但它做得非常好。不幸的是，它在 Java EE 5 或 Java\
  \ EE 6 中都没有得到更改或改进。\n\n**EJB 3.1**\n\nMDB 是在 EJB 2.0 中引入的，并在 EJB 3.0 以及 Java EE\
  \ 5 的“易用性”范式下得到了改进。它们内部没有修改，因为它们仍然是消息消费者，但注解和例外配置的引入使它们更容易编写。新的 EJB 3.1 规范（JSR 318）对\
  \ MDB 没有显著的更改。\n\n正如你在第 7 章中所见，现在可以在无状态会话 Bean 中进行异步调用（使用 `@Asynchronous` 注解），并且\
  \ EJB 中不允许使用线程。在早期版本的 Java EE 中，EJB 之间不可能进行异步调用。因此，唯一可行的解决方案是使用 JMS 和 MDB——这代价高昂，因为仅仅为了异步调用一个方法，就必须使用许多资源（JMS\
  \ 目标、连接、工厂等）。\n\n如今，使用 EJB 3.1，会话 Bean 之间可以进行异步调用，这使得 MDB 能够用于它们最初被创建的目的：通过消息传递集成系统。\n\
  \n**360**\n\n第 13 章 ■ 发送消息\n\n**参考实现**\n\nOpen Message Queue (OpenMQ) 是 JMS 的参考实现。它已经开源\n\
  \n\n\n自 2006 年开源，既可用于独立的 JMS 应用程序，也可嵌入应用服务器中。OpenMQ 是 GlassFish 的默认消息提供者，在本书撰写之际，其版本已接近\
  \ 4.4。它遵循 JMS 规范，并增加了许多特性，例如通用消息服务（UMS）、通配符主题目标、XML\n\n消息验证、集群等。\n\n**如何发送和接收消息**\n\
  \n让我们通过一个简单示例来了解 JMS。JMS 使用生产者、消费者和目标。生产者将消息发送到目标，消费者则在目标处等待消息到达。目标分为两种：队列（用于点对点通信）和主题（用于发布-订阅通信）。在清单\
  \ 13-1 中，一个生产者向消费者正在监听的队列发送了一条文本消息。\n\n**清单 13-1.** *发送者类将消息生成到队列中*\n\npublic class\
  \ Sender {\n\npublic static void main(String[] args) {\n\n// 获取 JNDI 上下文\n\nContext\
  \ jndiContext = new InitialContext();\n\n// 查找受管对象\n\n**ConnectionFactory** connectionFactory\
  \ = (ConnectionFactory)➥\n\njndiContext.lookup(**\"jms/javaee6/ConnectionFactory\"\
  ** );\n\n**Queue** queue = (Queue) jndiContext.lookup(\" **jms/javaee6/Queue**\"\
  );\n\n// 创建连接到队列所需的工件\n\n**Connection** connection = connectionFactory.createConnection();\n\
  \n**Session** session = connection.createSession(false, ➥\n\nSession.AUTO_ACKNOWLEDGE);\n\
  \n**MessageProducer** producer = session.createProducer(queue);\n\n// 向队列发送一条文本消息\n\
  \n**TextMessage** message = session.createTextMessage();\n\nmessage.setText(\"This\
  \ is a text message\");\n\n**producer.send**(message);\n\nconnection.close();\n\n\
  }\n\n}\n\n清单 13-1 中的代码代表了一个仅包含 main()方法的 Sender 类。在该方法中，首先实例化一个 JNDI 上下文，并用于获取\n\
  \nConnectionFactory 和 Queue。连接工厂和目标（队列和主题）被称为受管对象；它们必须在消息提供者（本例中为 OpenMQ）中创建和声明。两者都有一个\
  \ JNDI 名称（例如，队列名为 jms/javaee6/Queue），并且需要在 JNDI 树中进行查找。\n\n获取这两个受管对象后，Sender 类使用\n\
  \nConnectionFactory 创建一个 Connection，并从中获取一个 Session。利用这个会话，在目标队列上创建一个 MessageProducer\
  \ 和一个消息（session.\n\ncreateProducer(queue)）。然后，生产者发送此消息（文本类型）。这段代码相当冗长，在示例中我特意省略了异常处理（捕获\
  \ JNDI 和 JMS 异常）。\n\n幸运的是，一旦你编写了发送消息的代码，接收消息的代码看起来几乎相同。实际上，清单 13-2 中 Receiver 类的前几行完全一样：创建\
  \ JNDI 上下文，查找连接工厂和队列，然后建立连接。唯一的区别是使用了 MessageConsumer 而不是\n\nMessageProducer，并且接收者进入一个无限循环来监听队列（稍后你会看到，通过使用更标准的消息监听器可以避免这个循环）。当消息到达时，它被消费并显示内容。\n\
  \n**清单 13-2.** *接收者类从队列中消费消息*\n\npublic class Receiver {\n\npublic static void main(String[]\
  \ args) {\n\n// 获取 JNDI 上下文\n\nContext jndiContext = new InitialContext();\n\n//\
  \ 查找受管对象\n\nConnectionFactory connectionFactory = (ConnectionFactory) ➥\n\njndiContext.lookup(\"\
  jms/javaee6/ConnectionFactory\");\n\nQueue queue = (Queue) jndiContext.lookup(\"\
  jms/javaee6/Queue\");\n\n// 创建连接到队列所需的工件\n\nConnection connection = connectionFactory.createConnection();\n\
  \nSession session = connection.createSession(false, ➥\n\nSession.AUTO_ACKNOWLEDGE);\n\
  \n**MessageConsumer** consumer = session.createConsumer(queue);\n\nconnection.start();\n\
  \n// 循环接收消息\n\nwhile (true) {\n\nTextMessage message = (TextMessage) **consumer.receive**();\n\
  \nSystem.out.println(\"Message received: \" + message.getText());\n\n}\n\n}\n\n\
  }\n\n![Image 113](img/index-392_1.jpg)\n\n**362**\n\n第 13 章 ■ 发送消息\n\n接下来，我们将聚焦于\
  \ JMS API，定义所有使用的受管对象和类，并了解这如何转化为 MDB。\n\n**Java 消息服务**\n\n从高层来看，JMS 架构由以下组件组成（见图\
  \ 13-2）：\n\n• *提供者*：JMS 只是一个规范，因此需要一个底层实现来路由消息，即提供者。提供者通过提供 JMS API 的实现来处理消息的缓冲和传递。\n\
  \n• *客户端*：客户端是任何使用 JMS API 消费或生产 JMS 消息的 Java 应用程序或组件。这样的客户端被称为 JMS 客户端，因为它是底层提供者的客户端。“客户端”是生产者、发送者、发布者、消费者、接收者或订阅者的通用术语。\n\
  \n• *消息*：这些是客户端发送给 JMS 提供者或从 JMS 提供者接收的对象。\n\n• *受管对象*：为了使提供者完全支持 JMS，受管对象（连接工厂和目标）必须放置在\
  \ JNDI 树中，并可通过 JNDI 查找使用。\n\n**图 13-2.** *JMS 架构*\n\n消息提供者通过提供一个可以保存消息直到消息能够传递给客户端的目标，来实现异步通信。有两种不同类型的目标，每种适用于特定的架构模型：\n\
  \n• *点对点（P2P）模型*：在此模型中，用于保存消息的目标称为*队列*。使用点对点消息传递时，一个客户端将消息放入队列，另一个客户端接收该消息。一旦消息被确认，消息提供者将从队列中移除该消息。\n\
  \n• *发布-订阅（pub-sub）模型*：目标称为*主题*。使用发布/订阅消息传递时，一个客户端将消息发布到主题，该主题的所有订阅者都会收到该消息。\n\n\
  JMS 规范提供了一组统一的接口，可用于 P2P 和 pub-sub 消息传递。表 13-1 显示了接口的通用名称（例如 Session）以及每种模型的具体名称（QueueSession,\
  \ TopicSession）。同时注意不同的术语；消费者在 P2P 中称为接收者，在 pub-sub 中称为订阅者。\n\n![Image 114](img/index-393_1.jpg)\n\
  \n![Image 115](img/index-393_2.jpg)\n\n第 13 章 ■ 发送消息\n\n**363**\n\n**表 13-1.** *根据目标类型使用的接口*\n\
  \n**通用**\n\n**点对点**\n\n**发布-订阅**\n\nDestination\n\nQueue\n\nTopic\n\nConnectionFactory\n\
  \nQueueConnectionFactory\n\nTopicConnectionFactory\n\nConnection\n\nQueueConnection\n\
  \nTopicConnection\n\nSession\n\nQueueSession\n\nTopicSession\n\nMessageConsumer\n\
  \nQueueReceiver\n\nTopicSubscriber\n\nMessageProducer\n\nQueueSender\n\nTopicPublisher\n\
  \n**点对点**\n\n在 P2P 模型中，一条消息从单个生产者（点 A）传送到单个消费者（点 B）。该模型围绕消息队列、发送者和接收者的概念构建（见图 13-3）。队列保留发送者发送的消息，直到它们被消费，并且发送者和接收者之间没有时间依赖关系。这意味着发送者可以随时生成消息并将其发送到队列中，接收者也可以随时消费它们。一旦接收者被创建，它将获取所有发送到该队列的消息，甚至包括在其创建之前发送的消息。\n\
  \n**图 13-3.** *P2P 模型*\n\n每条消息都被发送到一个特定的队列，接收者从队列中提取消息。队列会保留所有发送的消息，直到它们被消费或过期。\n\
  \n\n\n如果每条消息只有一个接收者，则使用 P2P 模型。请注意，一个队列可以有多个消费者，但一旦某个接收者从队列中消费了一条消息，该消息就会从队列中移除，其他消费者便无法再接收它。在图\
  \ 13-4 中，您可以看到一个发送者生成了三条消息。两个接收者各自消费一条消息，且该消息对另一方不可用。JMS 还确保每条消息仅被投递一次。\n\n**图 13-4.**\
  \ *多个接收者*\n\n请注意，P2P 不保证消息按任何特定顺序投递，并且如果\n\n一条消息存在多个接收者，则会随机选择一个接收者。\n\n![Image\
  \ 116](img/index-394_1.jpg)\n\n![Image 117](img/index-394_2.jpg)\n\n**364**\n\n\
  第 13 章 ■ 发送消息\n\n**发布-订阅**\n\n在发布-订阅模型中，单个生产者将一条消息发送给多个消费者。该模型围绕主题、发布者和订阅者的概念构建（图\
  \ 13-5）。消费者被称为*订阅者*，因为他们首先需要订阅一个主题。\n\n提供者会动态管理订阅/取消订阅机制。\n\n**图 13-5.** *发布-订阅模型*\n\
  \n主题会保留消息，直到它们被分发给所有订阅者。与 P2P\n\n模型不同，发布者和订阅者之间存在时间依赖性；订阅者不会收到在其订阅之前发送的消息，并且如果订阅者在指定时间段内处于非活动状态，则当其再次变为活动状态时，也不会收到过往消息。请注意，这种情况是可以避免的，因为\
  \ JMS API 支持持久订阅者的概念，您稍后会看到。\n\n多个订阅者可以消费同一条消息。发布-订阅模型可用于\n\n广播类型的应用程序，其中一条消息会被投递给多个消费者。在图\
  \ 13-6 中，发布者发送了三条消息，每个订阅者都会收到这些消息。\n\n**图 13-6.** *多个订阅者*\n\n**JMS API**\n\nJMS\
  \ API 位于 javax.jms 包下，为需要消息传递系统的应用程序提供类和接口（见图 13-7）。该 API 通过提供与提供者的连接以及一个会话（可在其中创建、发送或接收消息）来实现客户端之间的异步通信。这些消息可以包含文本或其他不同类型的对象。\n\
  \n![Image 118](img/index-395_1.jpg)\n\n第 13 章 ■ 发送消息\n\n**365**\n\n**图 13-7.** *JMS\
  \ API（源自 JMS 1.1 规范的图 2-1）*\n\n受管对象\n\n受管对象是通过管理方式而非编程方式配置的对象。消息提供者允许配置这些对象，并将其置于\
  \ JNDI 命名空间中。与 JDBC 数据源类似，受管对象仅创建一次。JMS 的两种受管对象类型是：\n\n• *连接工厂*：客户端用来创建到目标的连接。\n\
  \n• *目标*：消息分发点，负责接收、保存和分发消息。目标可以是队列（P2P）或主题（发布-订阅）。\n\nJMS 客户端通过可移植接口在 JNDI 命名空间中查找这些对象来访问它们。在\
  \ GlassFish 中，有多种创建这些对象的方法：使用管理控制台、asadmin 命令行或 REST 接口。\n\n**ConnectionFactory**\n\
  \n连接工厂是受管对象，允许应用程序通过编程方式创建 Connection 对象来连接到提供者。连接工厂封装了由管理员定义的配置参数。连接工厂有三种类型：\n\n\
  • javax.jms.ConnectionFactory 是一个接口，可用于 P2P 和发布-订阅通信。\n\n• javax.jms.QueueConnectionFactory\
  \ 是一个接口，它扩展了 ConnectionFactory，用于 P2P 通信。\n\n• javax.jms.TopicConnectionFactory\
  \ 是一个接口，它扩展了 ConnectionFactory，用于发布-订阅通信。\n\n**366**\n\n第 13 章 ■ 发送消息\n\n\n\n程序首先需要通过\
  \ JNDI 查找获取连接工厂。例如，以下代码片段获取了 JNDI 的 `InitialContext` 对象，并使用它通过 JNDI 名称查找 `QueueConnectionFactory`\
  \ 和 `TopicConnectionFactory`：\n\n```java\nContext ctx = new InitialContext();\n\
  QueueConnectionFactory queueConnectionFactory = \n    (QueueConnectionFactory) ctx.lookup(\"\
  QConnFactory\");\nTopicConnectionFactory topicConnectionFactory = \n    (TopicConnectionFactory)\
  \ ctx.lookup(\"TConnFactory\");\n```\n\n当你需要访问特定于这些消息传递模型的细节时，需要使用队列/主题工厂。如果不需要，你也可以直接获取一个通用的\
  \ `ConnectionFactory`，它可用于这两种情况：\n\n```java\nContext ctx = new InitialContext();\n\
  ConnectionFactory connectionFactory = \n    (ConnectionFactory) ctx.lookup(\"GenericConnFactory\"\
  );\n```\n\n这三个接口中唯一可用的方法是 `createConnection()` 方法，它们返回一个 `Connection` 对象。你可以使用默认用户身份创建连接，也可以通过指定用户名和密码来创建连接（参见清单\
  \ 13-3）。\n\n**清单 13-3.** *ConnectionFactory 接口*\n\n```java\npublic interface ConnectionFactory\
  \ {\n    Connection createConnection() throws JMSException;\n    Connection createConnection(String\
  \ userName, String password) throws JMSException;\n}\n```\n\n**Destination**\n\n\
  目标是一个受管对象，包含特定于提供者的配置信息，例如目标地址。但通过使用标准的 `javax.jms.Destination` 接口，这些配置对 JMS 客户端是隐藏的。有两种类型的目标，它们都是扩展了\
  \ `Destination` 的接口：\n\n• `javax.jms.Queue` 对象，用于 P2P 通信\n• `javax.jms.Topic` 对象，用于发布-订阅通信\n\
  \n这些接口除了一个返回目标名称的方法外，没有其他任何方法。与连接工厂一样，需要通过 JNDI 查找来返回此类对象。\n\n**注入**\n\n连接工厂和目标都是位于消息提供者中的受管对象，并且必须在\
  \ JNDI 命名空间中声明，这就是为什么你要使用 JNDI API 来查找它们。当客户端代码在容器内运行时，可以使用依赖注入来代替。Java EE 6 有多个容器：EJB、Servlet\
  \ 和应用程序客户端容器（ACC）。如果代码在这些容器之一中运行，则可以使用 `@Resource` 注解（参见第 7 章“依赖注入”部分）让容器注入对该资源的引用。使用\
  \ Java EE 6，使用资源要容易得多，因为你无需处理 JNDI 的复杂性，也无需在部署描述符中配置资源引用。你只需依赖容器的注入能力即可。\n\n表 13-2\
  \ 列出了属于 `@Resource` 注解的元素。\n\n**表 13-2.** *@javax.annotation.Resource 注解的 API*\n\
  \n| **元素** | **描述** |\n| --- | --- |\n| name | 资源的 JNDI 名称 |\n| type | 资源的 Java\
  \ 类型（例如 `javax.sql.DataSource` 或 `javax.jms.Topic`） |\n| authenticationType | 用于资源的身份验证类型（容器或应用程序）\
  \ |\n| shareable | 资源是否可共享 |\n| mappedName | 资源应映射到的产品特定名称 |\n| description | 资源的描述\
  \ |\n\n要使用此注解，一个带有 `main()` 方法的 `Receiver` 类会接收文本消息。在清单 13-2 中，连接工厂和队列都是使用 JNDI\
  \ 查找的。在清单 13-4 中，JNDI 名称位于 `@Resource` 注解上。当此 `Receiver` 类在容器中运行时，它会在初始化时获得 `ConnectionFactory`\
  \ 和 `Queue` 的引用。\n\n**清单 13-4.** *Receiver 类获得注入的 JMS 资源引用*\n\n```java\npublic class\
  \ Receiver {\n    @Resource(name = \"jms/javaee6/ConnectionFactory\")\n    private\
  \ static ConnectionFactory connectionFactory;\n    @Resource(name = \"jms/javaee6/Queue\"\
  )\n    private static Queue queue;\n    public static void main(String[] args) {\n\
  ```\n\n\n// 创建连接队列所需的工件\n\nConnection connection = connectionFactory.createConnection();\n\
  \nSession session = connection.createSession(false, ➥\n\nSession.AUTO_ACKNOWLEDGE);\n\
  \n**MessageConsumer** consumer = session.createConsumer(queue);\n\n**connection.start**();\n\
  \n// 循环接收消息\n\nwhile (true) {\n\nTextMessage message = (TextMessage) **consumer.receive**();\n\
  \nSystem.out.println(\"Message received: \" + message.getText());\n\n**368**\n\n\
  第 13 章 ■ 发送消息\n\n}\n\n}\n\n}\n\n为清晰起见，异常处理代码已省略。请注意，`@Resource`注解出现在私有属性上。资源的注入支持不同的可见性（私有、受保护、包内或公有）。\n\
  \nConnection\n\n`javax.jms.Connection`对象通过连接工厂的`createConnection()`方法创建，它封装了与 JMS\
  \ 提供者的连接。连接是线程安全的，并且设计为可共享的，因为打开新连接会消耗大量资源。\n\n然而，会话（`javax.jms.Session`）为发送和接收消息提供了单线程上下文，通过连接可以创建一个或多个会话。\n\
  \n与连接工厂类似，连接有三种形式：通用`Connection`接口、`QueueConnection`接口以及扩展它的`TopicConnection`接口。\n\
  \n根据你拥有的连接工厂对象，你可以使用它来创建连接：\n\nConnection connection = connFactory.createConnection();\n\
  \n**Queue**Connection connection = queueConnFactory.create**Queue**Connection();\n\
  \n**Topic**Connection connection = topicConnFactory.create**Topic**Connection();\n\
  \n在清单 13-4 中，接收者在消费消息之前必须调用`start()`方法。如果你需要在不关闭连接的情况下临时停止接收消息，可以调用`stop()`方法。\n\
  \n**connection.start**();\n\n**connection.stop**();\n\n当应用程序完成时，你需要关闭所有已创建的连接。关闭连接也会关闭其会话及其生产者或消费者。\n\
  \nconnection.close();\n\nSession\n\n你使用`createSession()`方法从连接创建会话。会话提供了一个事务上下文，在该上下文中，一组待发送或接收的消息被组合成一个原子工作单元，这意味着如果你在同一会话中发送多条消息，JMS\
  \ 将确保它们要么全部按发送顺序到达目的地，要么全部不送达。此行为在创建会话时设置：\n\nSession session = connection.createSession(true,\
  \ Session.AUTO_ACKNOWLEDGE);\n\n该方法的第一个参数指定会话是否为事务性。在上述代码中，参数设置为`true`，意味着发送消息的请求将不会被执行，直到调用会话的`commit()`方法或会话关闭。如果参数设置为`false`，则会话不是事务性的，消息将在调用`send()`方法后立即发送。第二个参数表示会话在成功接收消息后会自动确认。\n\
  \n会话是单线程的，用于创建消息、生产者和消费者。与你目前看到的所有对象一样，会话有两种不同的类型：`QueueSession`和`TopicSession`。更通用的`Session`允许你通过统一接口使用其中任何一种。\n\
  \nMessages\n\n为了通信，客户端交换消息；一个生产者将消息发送到目的地，一个消费者将接收它。消息是封装信息的对象，分为三个部分（见图 13-8）：\n\
  \n• 标头包含用于标识和路由消息的标准信息。\n\n• 属性是应用程序可以设置或读取的名称-值对。属性还允许目的地根据属性值过滤消息。\n\n\n\n• 消息体包含实际的消息内容，可以采用多种格式（文本、字节、对象等）。\n\
  \n**图 13-8.** *JMS 消息的结构*\n\n**消息头**\n\n消息头包含预定义的名称-值对，是所有消息共有的，客户端和提供者都使用它们来标识和路由消息。它们可以被视为消息元数据，因为它们提供了关于消息的信息。每个字段在\
  \ `javax.jms.Message` 接口中都定义了相应的 getter 和 setter 方法。某些消息头字段应由客户端设置，但许多字段由 `send()`\
  \ 或 `publish()` 方法自动设置。\n\n表 13-3 描述了每个 JMS 消息头字段。\n\n**370**\n\n第 13 章 ■ 发送消息\n\
  \n**表 13-3.** *消息头中包含的字段*\n\n| **字段** | **描述** | **设置者** |\n| :--- | :--- | :---\
  \ |\n| JMSDestination | 指示消息发送到的目的地。 | `send()` 或 `publish()` 方法 |\n| JMSDeliveryMode\
  \ | JMS 支持两种消息传递模式。PERSISTENT（持久）模式指示提供者确保消息在传输过程中不会因故障而丢失。NON_PERSISTENT（非持久）模式是开销最低的传递模式，因为它不需要将消息记录到持久化存储中。\
  \ | `send()` 或 `publish()` 方法 |\n| JMSMessageID | 提供一个唯一标识提供者发送的每条消息的值。 | `send()`\
  \ 或 `publish()` 方法 |\n| JMSTimestamp | 包含消息交给提供者发送的时间。 | `send()` 或 `publish()`\
  \ 方法 |\n| JMSCorrelationID | 客户端可以使用此字段将一条消息与另一条消息关联起来，例如将响应消息与其请求消息关联。 | 客户端 |\n\
  | JMSReplyTo | 包含应发送消息回复的目的地。 | 客户端 |\n| JMSRedelivered | 此布尔值由提供者设置，用于指示消息是否已被重新投递。\
  \ | 提供者 |\n| JMSType | 用作消息类型标识符。 | 客户端 |\n| JMSExpiration | 发送消息时，其过期时间根据 `send()`\
  \ 方法指定的生存时间值计算并设置。 | `send()` 或 `publish()` 方法 |\n| JMSPriority | JMS 定义了一个十级优先级值，0\
  \ 为最低优先级，9 为最高。 | `send()` 或 `publish()` 方法 |\n\n[** JMS 1.1 规范，“3.4：消息头字段，” (http://jcp.org/en/jsr/detail?id=914)*](http://jcp.org/en/jsr/detail?id=914)\n\
  \n你可以通过 `Message` 接口访问这些消息头字段，如下所示：\n\n```java\nmessage.getJMSCorrelationID();\n\
  message.getJMSMessageID();\nmessage.setJMSPriority(6);\n```\n\n**属性**\n\n除了消息头字段之外，`javax.jms.Message`\
  \ 接口还支持属性值，这些属性值类似于消息头，但由应用程序显式创建，而不是跨消息的标准属性。这提供了一种机制，可以向消息添加可选的标头字段，客户端可以通过选择器选择接收或不接收这些字段。属性值可以是布尔型、字节型、短整型、整型、长整型、浮点型、双精度浮点型和字符串。设置和获取属性的代码如下所示：\n\
  \n第 13 章 ■ 发送消息\n\n**371**\n\n```java\nmessage.setFloatProperty(\"orderAmount\"\
  , 1245.5f);\nmessage.getFloatProperty(\"orderAmount\");\n```\n\n**消息体**\n\n消息体是可选的，包含要发送或接收的数据。根据你使用的接口，它可以包含不同格式的数据，如表\
  \ 13-4 所列。\n\n**表 13-4.** *消息类型*\n\n| **接口** | **描述** |\n| :--- | :--- |\n| StreamMessage\
  \ | 消息体包含 Java 原始值流。它按顺序填充和读取。 |\n| MapMessage | 消息体包含一组名称-值对，其中名称是字符串，值是 Java 原始类型。\
  \ |\n| TextMessage | 消息体包含一个字符串（例如，它可以包含 XML）。 |\n| ObjectMessage | 包含可序列化对象或可序列化对象集合的消息。\
  \ |\n| BytesMessage | 包含字节流的消息。 |\n\n如果你扩展 `javax.jms.Message` 接口，则可以创建自己的消息格式。请注意，当接收到消息时，其消息体是只读的。根据消息类型，你有不同的方法来访问其内容。文本消息将有\
  \ `getText()` 和 `setText()` 方法，对象消息将有 `getObject()` 和 `setObject()` 方法，依此类推。\n\n\
  ```java\ntextMessage.setText(\"This is a text message\");\ntextMessage.getText();\n\
  bytesMessage.readByte();\nobjectMessage.getObject();\n```\n\n**消息生产者**\n\n消息生产者是由会话创建并用于向目的地发送消息的对象。通用的\
  \ `javax.jms.MessageProducer` 接口可用于通过统一接口获取特定的生产者。对于 P2P 模型，消息生产者称为发送者（sender）并实现\
  \ `QueueSender` 接口。对于发布-订阅模型，它称为发布者（publisher）并实现 `TopicPublisher`。创建消息后，根据你使用的接口，生产者可以发送（P2P）或发布（pub-sub）它：\n\
  \n```java\nmessageProducer.send(message);\nqueueSender.send(message);\ntopicPublisher.publish(message);\n\
  ```\n\n生产者可以为发送的消息指定默认的传递模式、优先级和生存时间。以下步骤说明如何创建向主题发送消息的发布者（参见清单 13-5）：\n\n**372**\n\
  \n第 13 章 ■ 发送消息\n\n****1.** 使用注入（或 JNDI 查找）获取连接工厂和主题。\n\n****2.** 使用连接工厂创建一个 `Connection`\
  \ 对象。\n\n****3.** 使用连接创建一个 `Session` 对象。\n\n****4.** 使用 `Session` 对象创建一个 `MessageProducer`（或者在这种情况下，它本可以是一个\
  \ `TopicPublisher`）。\n\n****5.** 使用 `Session` 对象创建一个或多个任意类型的消息（这里我使用了 `TextMessage`）。创建后，用所需数据填充消息（在此示例中，使用\
  \ `setText()` 方法完成）。\n\n****6.** 使用 `MessageProducer.send()` 方法（或 `TopicPublisher.publish()`\
  \ 方法）向主题发送一条或多条消息。\n\n**清单 13-5.** *发送者类向主题发送消息*\n\n```java\npublic class Sender\
  \ {\n\n    @Resource(mappedName = \"jms/javaee6/ConnectionFactory\")\n    private\
  \ static ConnectionFactory connectionFactory;\n\n    @Resource(mappedName = \"jms/javaee6/Topic\"\
  )\n    private static Topic topic;\n\n    public static void main(String[] args)\
  \ {\n        // 创建连接到队列所需的工件\n        Connection connection = connectionFactory.createConnection();\n\
  \        Session session = connection.createSession(false,\n                Session.AUTO_ACKNOWLEDGE);\n\
  \n        MessageProducer producer = session.createProducer(topic);\n\n        //\
  \ 向主题发送文本消息\n        TextMessage message = session.createTextMessage();\n      \
  \  message.setText(\"This is a text message\");\n\n        producer.send(message);\n\
  \n        connection.close();\n    }\n}\n```\n\n**消息消费者**\n\n客户端使用 `MessageConsumer`\
  \ 从目的地接收消息。通过将 `Queue` 或 `Topic` 传递给 `Session` 的 `createConsumer()` 方法来创建 `MessageConsumer`。对于\
  \ P2P 模型，消息消费者可以实现 `QueueReceiver` 接口；对于发布-订阅模型，它可以实现 `TopicSubscriber`。\n\n![Image\
  \ 120](img/index-403_1.jpg)\n\n第 13 章 ■ 发送消息\n\n**373**\n\n消息传递本质上是异步的，即生产者和消费者之间没有时间依赖性。然而，客户端本身可以通过两种方式消费消息：\n\
  \n*   ***同步***：接收者通过调用 `receive()` 方法显式地从目的地获取消息。前面的示例使用了一个无限循环，该循环会阻塞直到消息到达。\n\
  *   ***异步***：接收者决定注册到消息到达时触发的事件。它必须实现 `MessageListener` 接口，每当消息到达时，提供者通过调用 `onMessage()`\
  \ 方法传递消息。\n\n图 13-9 说明了这两种类型的消费者。\n\n**图 13-9.** *同步和异步消费者*\n\n**同步投递**\n\n\n\n\
  同步接收器需要使用其 `receive()` 方法之一来启动连接、循环等待消息到达，并请求已到达的消息。`receive()` 有几种变体，允许客户端轮询或等待下一条消息。以下步骤说明了如何创建一个从主题消费消息的同步接收器（参见清单\
  \ 13-6）：\n\n****1.** 使用注入（或 JNDI 查找）获取连接工厂和主题。\n\n****2.** 使用连接工厂创建 `Connection`\
  \ 对象。\n\n****3.** 使用连接创建 `Session` 对象。\n\n****4.** 使用 `Session` 对象创建 `MessageConsumer`（在本例中，也可以是\
  \ `TopicSubscriber`）。\n\n****5.** 启动连接。\n\n****6.** 循环并在消费者对象上调用 `receive()` 方法。如果队列为空，`receive()`\
  \ 方法会阻塞并等待消息到达。此处，无限循环等待其他消息到达。\n\n****7.** 使用 `TextMessage.getText()` 方法处理 `receive()`\
  \ 方法返回的消息（如果是文本消息）。\n\n**374**\n\n第 13 章 ■ 发送消息\n\n**清单 13-6.** *接收器以同步方式消费消息*\n\
  \n```java\npublic class Receiver {\n\n    @Resource(mappedName = \"jms/javaee6/ConnectionFactory\"\
  )\n    private static ConnectionFactory connectionFactory;\n\n    @Resource(mappedName\
  \ = \"jms/javaee6/Topic\")\n    private static Topic topic;\n\n    public static\
  \ void main(String[] args) {\n        // 创建连接到队列所需的工件\n        Connection connection\
  \ = connectionFactory.createConnection();\n        Session session = connection.createSession(false,\
  \ Session.AUTO_ACKNOWLEDGE);\n        MessageConsumer consumer = session.createConsumer(topic);\n\
  \        connection.start();\n\n        // 循环接收消息\n        while (true) {\n    \
  \        TextMessage message = (TextMessage) consumer.receive();\n            System.out.println(\"\
  Message received: \" + message.getText());\n        }\n    }\n}\n```\n\n**异步投递**\n\
  \n异步消费基于事件处理。客户端可以注册一个实现了 `MessageListener` 接口的对象（包括自身）。*消息监听器* 是一个充当消息异步事件处理程序的对象。当消息到达时，提供者通过调用监听器的\
  \ `onMessage()` 方法来投递消息，该方法接受一个 `Message` 类型的参数。使用这种事件模型，消费者无需无限循环来接收消息。MDB 使用这种事件模型。\n\
  \n以下步骤描述了创建异步消息监听器的过程（参见清单 13-7）：\n\n****1.** 该类实现 `javax.jms.MessageListener` 接口，该接口定义了一个名为\
  \ `onMessage()` 的方法。\n\n****2.** 使用注入（或 JNDI 查找）获取连接工厂和目的地。\n\n****3.** 使用连接工厂创建\
  \ `Connection` 对象，使用连接创建 `Session` 对象，并使用 `Session` 对象创建 `MessageConsumer`。\n\n\
  ****4.** 调用 `setMessageListener()` 方法，传入一个 `MessageListener` 接口的实例（在清单 13-7 中，`Listener`\
  \ 类本身实现了 `MessageListener` 接口）。\n\n第 13 章 ■ 发送消息\n\n**375**\n\n****5.** 注册消息监听器后，调用\
  \ `start()` 方法开始监听消息到达。如果在注册监听器之前调用 `start()`，你很可能会错过消息。\n\n****6.** 实现 `onMessage()`\
  \ 方法并处理接收到的消息。每次消息到达时，提供者都会调用此方法，并传入消息。\n\n**清单 13-7.** *消费者是一个消息监听器*\n\n```java\n\
  public class Listener implements MessageListener {\n\n    @Resource(mappedName =\
  \ \"jms/javaee6/ConnectionFactory\")\n    private static ConnectionFactory connectionFactory;\n\
  \n    @Resource(mappedName = \"jms/javaee6/Topic\")\n    private static Topic topic;\n\
  \n    public static void main(String[] args) {\n        // 创建连接到队列所需的工件\n      \
  \  Connection connection = connectionFactory.createConnection();\n        Session\
  \ session = connection.createSession(false, Session.AUTO_ACKNOWLEDGE);\n       \
  \ MessageConsumer consumer = session.createConsumer(topic);\n        consumer.setMessageListener(new\
  \ Listener());\n        connection.start();\n    }\n\n    public void onMessage(Message\
  \ message) {\n        System.out.println(\"Message received: \" + ((TextMessage)\
  \ message).getText());\n    }\n}\n```\n\n**选择器**\n\n某些消息传递应用程序需要过滤它们接收的消息。当消息广播给多个客户端时，设置条件以便只有特定的接收者才能消费消息就变得很有用。这消除了提供者将消息传输给不需要它们的客户端所浪费的时间和带宽。\n\
  \n你已经看到消息由三部分组成：消息头、属性和消息体。消息头包含固定数量的字段（消息元数据），而属性是一组自定义的名称-值对，应用程序可以使用它们来设置任何值。可以在这两个区域上进行选择。发送者设置一个或多个属性值或消息头字段，接收者使用选择器表达式指定消息选择标准。只有与选择器匹配的消息才会被投递。消息选择器将过滤消息的工作分配给\
  \ JMS 提供者，而不是应用程序。\n\n**376**\n\n第 13 章 ■ 发送消息\n\n消息选择器是一个包含表达式的字符串。该表达式的语法基于 SQL92\
  \ 条件表达式语法的一个子集，如下所示：\n\n```java\nsession.createConsumer(topic, \"JMSPriority < 6\"\
  );\nsession.createConsumer(topic, \"JMSPriority < 6 AND orderAmount < 200\");\n\
  session.createConsumer(topic, \"orderAmount BETWEEN 1000 AND 2000\");\n```\n\n在前面的代码中，创建了一个消费者，并传入了一个选择器字符串。该字符串可以使用消息头字段（`JMSPriority\
  \ < 6`）或自定义属性（`orderAmount < 200`）。生产者按如下方式将这些属性设置到消息中：\n\n```java\nmessage.setIntProperty(\"\
  orderAmount\", 1530);\nmessage.setJMSPriority(5);\n```\n\n选择器表达式可以使用逻辑运算符（NOT、AND、OR）、比较运算符（=、>、>=、<、<=、<>）、算术运算符（+、-、*、/）、表达式（[NOT]\
  \ BETWEEN、[NOT] IN、[NOT] LIKE、IS [NOT] NULL）等。\n\n**可靠性机制**\n\n你已经了解了如何连接到提供者、创建不同类型的消息、将它们发送到队列或主题、接收全部消息或使用选择器进行过滤。但是，如果你严重依赖\
  \ JMS 并需要确保可靠性，该怎么办？JMS 定义了多个可靠性级别，以确保你的消息能够被投递，即使提供者崩溃、负载过高，或者目的地中充满了本应过期的消息。实现可靠消息投递的机制如下：\n\
  \n*   *设置消息生存时间*：为消息设置过期时间，以便在消息过时时不被投递。\n*   *指定消息持久性*：指定消息在提供者发生故障时是持久的。\n*  \
  \ *控制确认*：指定不同级别的消息确认。\n*   *创建持久订阅者*：确保在发布-订阅模型中，消息能够投递给不可用的订阅者。\n*   *设置优先级*：设置投递消息的优先级。\n\
  \n**设置消息生存时间**\n\n在高负载下，可以为消息设置生存时间，以确保提供者在消息过时时将其从目的地中移除，可以通过使用 `MessageProducer`\
  \ API 或设置 `JMSExpiration` 消息头字段来实现。\n\n`MessageProducer` 有一个 `setTimeToLive()` 方法，该方法接受毫秒数，或者对每条消息使用\
  \ `send()` 方法：\n\n```java\nMessageProducer producer = session.createProducer(topic);\n\
  producer.setTimeToLive(1000);\n// 或者\nproducer.send(message, DeliveryMode.NON_PERSISTENT,\
  \ 2, 1000);\n```\n\n![Image 121](img/index-407_1.jpg)\n\n第 13 章 ■ 发送消息\n\n**377**\n\
  \n\n\n第一次调用为生产者整体及其传递的所有消息设置了 TTL，而第二次调用仅为单条消息设置。第二次调用发送消息时指定了传递模式、优先级和生存时间（1000）。消息发送时，其过期时间计算为生存时间值的总和。在`JMSExpiration`头字段中设置此值将导致过时消息不被传递。\n\
  \n`message.setJMSExpiration(1000);`\n\n**指定消息持久性**\n\nJMS 支持两种消息传递模式：持久性和非持久性。*持久性传递*确保消息仅传递给消费者一次，而*非持久性传递*要求消息最多传递一次。持久性传递（默认模式）更可靠，但会牺牲性能，因为它能防止在提供者发生故障时丢失消息。\n\
  \n传递模式可以通过两种方式指定：使用`MessageProducer`接口的`setDeliveryMode()`方法，或向`send()`方法传递参数：\n\
  \n`MessageProducer producer = session.createProducer(topic);`\n\n`producer.setDeliveryMode(**DeliveryMode.NON_PERSISTENT**);`\n\
  \n// 或\n\n`producer.send(message, **DeliveryMode.NON_PERSISTENT**, 2, 1000);`\n\n\
  第一次调用为生产者整体及其传递的所有消息设置了传递模式，而第二次调用仅为单条消息设置。\n\n**控制确认**\n\n到目前为止，我们探讨的场景都假设消息在发送和接收时无需任何确认。但有时，您会希望接收方确认消息已收到（见图\
  \ 13-10）。确认阶段可以由 JMS 提供者或客户端发起，具体取决于确认模式。\n\n**图 13-10.** *接收方确认消息*\n\n在事务性会话中，当事务提交时，确认会自动发生。如果事务回滚，所有已消费的消息将被重新传递。但在非事务性会话中，必须指定确认模式：\n\
  \n• `AUTO_ACKNOWLEDGE`：会话自动确认消息的接收。\n\n• `CLIENT_ACKNOWLEDGE`：客户端通过显式调用`Message.acknowledge()`方法来确认消息。\n\
  \n**378**\n\n第 13 章 ■ 发送消息\n\n• `DUPS_OK_ACKNOWLEDGE`：此选项指示会话延迟确认消息的传递。如果 JMS 提供者发生故障，这可能会导致传递一些重复消息，因此仅应由能够容忍重复消息的消费者使用。如果消息被重新传递，提供者会将`JMSRedelivered`头字段的值设置为`true`。\n\
  \n以下代码通过调用`acknowledge()`方法使用显式客户端确认模式：\n\n// 生产者\n\n`connection.createSession(false,\
  \ **Session.CLIENT_ACKNOWLEDGE**);`\n\n`producer = session.createProducer(topic);`\n\
  \n`message = session.createTextMessage();`\n\n`producer.send(message);`\n\n// 消费者\n\
  \n`message.**acknowledge()**;`\n\n**创建持久订阅者**\n\n使用发布-订阅模型的缺点在于，消息发送到主题时，消息消费者必须处于运行状态；否则将无法接收消息。通过使用持久订阅者，JMS\
  \ API 提供了一种方法，可以将消息保留在主题中，直到所有已订阅的消费者都接收到它们。使用持久订阅时，接收方可以离线一段时间，但当它重新连接时，会收到其断开连接期间到达的消息。为此，客户端使用会话创建一个持久订阅者。\n\
  \n`session.**createDurableSubscriber**(topic,\"javaee6DurableSubscription\");`\n\
  \n此时，客户端程序启动连接并接收消息。名称`javaee6DurableSubscription`用作持久订阅的标识符。每个持久订阅者必须具有唯一的 ID，因此需要为每个潜在的持久订阅者声明一个唯一的连接工厂。\n\
  \n**设置优先级**\n\n\n\n您可以使用消息优先级级别来指示 JMS 提供程序优先传递紧急消息。JMS 定义了十个优先级值，其中 0 为最低，9 为最高。您可以通过使用\
  \ `setPriority()` 方法或将其作为参数传递给 `send()` 方法来指定优先级值：\n\nMessageProducer producer =\
  \ session.createProducer(topic);\n\nproducer. setPriority(**2**);\n\n// 或\n\nproducer.send(message,\
  \ **DeliveryMode.NON_PERSISTENT**, 2, 1000);\n\n第 13 章 ■ 发送消息\n\n**379**\n\n**消息驱动\
  \ Bean**\n\n本章展示了如何使用 JMS API 在独立环境中，通过主类、JNDI 查找或使用 ACC 的资源注入，使异步消息传递在系统之间提供松散耦合和更高的灵活性。MDB\
  \ 为在 EJB 容器中运行的企业应用程序提供了这种标准的异步消息传递模型。\n\nMDB 是一个异步消费者，由容器在消息到达时调用。对于消息生产者而言，MDB\
  \ 只是一个消息消费者，隐藏在其监听的**目标**之后。\n\nMDB 是 EJB 规范的一部分，其模型接近于无状态会话 Bean，因为它们没有任何状态并在 EJB\
  \ 容器内运行。容器监听一个目标，并在消息到达时将调用委托给 MDB。与任何其他 EJB 一样，MDB 可以访问由容器管理的资源（其他 EJB、JDBC 连接、JMS\
  \ 资源等）。\n\n既然您之前已经看到可以使用独立的 JMS 客户端，为什么还要使用 MDB 呢？因为容器管理着多线程、安全性和事务，从而大大简化了 JMS\
  \ 消费者的代码。它还管理着传入的消息，这些消息在多个 MDB 实例（在池中可用）之间分配，而这些实例本身没有特殊的多线程代码。一旦新消息到达目标，就会从池中检索一个\
  \ MDB 实例来处理该消息。\n\n**如何编写 MDB**\n\nMDB 可以是事务性的、多线程的，并且自然地消费 JMS 消息。到目前为止，使用 JMS\
  \ API，您可能会期望工厂、连接、会话、消费者、用户事务等。然而，令人惊讶的是，一个简单的 MDB 可以像清单 13-8 所示。\n\n**清单 13-8.**\
  \ *一个简单的 MDB*\n\n**@MessageDriven(mappedName = \"jms/javaee6/Topic\")**\n\npublic\
  \ class BillingMDB implements MessageListener {\n\npublic void **onMessage**(Message\
  \ message) {\n\nTextMessage msg = (TextMessage)message;\n\nSystem.out.println(\"\
  Message received: \" + msg.getText());\n\n}\n\n}\n\n清单 13-8 中的代码（为清晰起见省略了异常处理）显示，MDB\
  \ 使程序员摆脱了处理迄今为止所解释的各种消息类型的所有机械性工作。MDB 实现了 `MessageListener` 接口和 `onMessage()` 方法，但不需要其他代码来连接到提供程序或启动消息消费。MDB\
  \ 还依赖于“异常配置”机制，只需要少量注解即可使其工作（参见 `@MessageDriven` 注解）。\n\n**380**\n\n第 13 章 ■ 发送消息\n\
  \n**MDB 模型**\n\nMDB 与会话 Bean 不同，因为它们不实现本地或远程业务接口，而是实现 `javax.jms.MessageListener`。客户端不能直接调用\
  \ MDB 上的方法；然而，与会话 Bean 一样，MDB 拥有丰富的编程模型，包括生命周期、回调注解、拦截器、注入和事务。利用此模型可以为应用程序提供高水平的功能。\n\
  \n重要的是要意识到 MDB 不属于新的 EJB Lite 模型，这意味着它们不能部署在简单的 Web 应用程序（war 文件中），但仍然需要企业级打包（ear\
  \ 归档）。\n\n开发 MDB 类的要求如下：\n\n-   该类必须使用 @javax.ejb.MessageDriven 或其 XML 等效项 在部署描述符中进行注解。\n\
  -   该类必须直接或间接实现 `MessageListener` 接口。\n\n\n\n• 该类必须定义为 public，且不能是 final 或 abstract。\n\
  \n• 该类必须有一个公共的无参构造函数，容器将使用该构造函数来创建 MDB 的实例。\n\n• 该类不得定义 finalize() 方法。\n\nMDB 类允许实现其他方法、调用其他资源等。MDB\
  \ 部署在容器中，并可以选择性地与 `ejb-jar.xml` 文件打包在一起。遵循 Java EE 6 的“易用性”模型，MDB 可以简单地是一个带有注解的\
  \ POJO，从而消除了大部分配置。然而，如果你仍然需要自定义 JMS 配置，可以使用 `@MessageDriven` 和 `@ActivationConfigProperty`\
  \ 注解（或等效的 XML）中的元素。\n\n@MessageDriven\n\nMDB 是开发起来最简单的 EJB 类型之一，因为它们支持的注解数量最少。`@MessageDriven`\
  \ 注解（或等效的 XML）是强制性的，因为它是容器用来识别 Java 类实际上是 MDB 所需的元数据片段。\n\n`@MessageDriven` 注解的\
  \ API 如清单 13-9 所示，非常简单，所有元素都是可选的。\n\n**清单 13-9.** *@MessageDriven 注解 API*\n\n@Target(TYPE)\
  \ @Retention(RUNTIME)\n\npublic @interface **MessageDriven** {\n\nString name()\
  \ default \"\";\n\nClass messageListenerInterface default Object.class;\n\nActivationConfigProperty[]\
  \ activationConfig() default {};\n\nString mappedName();\n\nString description();\n\
  \n}\n\n第 13 章 ■ 发送消息\n\n**381**\n\n`name` 元素指定 MDB 的名称（默认情况下是类的名称）。`messageListenerInterface`\
  \ 指定 MDB 实现了哪个消息监听器（如果 MDB 实现了多个接口，它会告诉 EJB 容器哪个是 MessageListener 接口）。`mappedName`\
  \ 元素是 MDB 应监听的目标的 JNDI 名称。`description` 只是一个字符串，用于在部署后提供 MDB 的描述。`activationConfig`\
  \ 元素用于指定配置属性，并接受一个 `@ActivationConfigProperty` 注解数组。\n\n@ActivationConfigProperty\n\
  \nJMS 允许配置某些属性，例如消息选择器、确认模式、持久订阅者等。在 MDB 中，这些属性可以使用 `@ActivationConfigProperty`\
  \ 注解进行设置。这个可选注解可以作为 `@MessageDriven` 注解的参数之一提供，与 JMS 等效项相比，`@ActivationConfigProperty`\
  \ 非常基础，由一个名称-值对组成（参见清单 13-10）。\n\n**清单 13-10.** *ActivationConfigProperty 注解 API*\n\
  \n@Target({}) @Retention(RUNTIME)\n\npublic @interface **ActivationConfigProperty**\
