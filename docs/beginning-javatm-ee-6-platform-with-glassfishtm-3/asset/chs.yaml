  \n**@WebMethod**\n\n默认情况下，Web 服务的所有公共方法都会在 WSDL 中暴露，并使用所有默认的映射规则。要自定义此映射的某些元素，你可以在方法上应用\
  \ @javax.jws.WebMethod 注解。该注解的 API 相当简单，因为它允许重命名方法或将其从 WSDL 中排除。清单 14-16 展示了 `CardValidator`\
  \ Web 服务如何将第一个方法重命名为 `ValidateCreditCard`，并排除第二个方法。\n\n**清单 14-16.** *一个方法被重命名，另一个被排除*\n\
  \n@WebService\n\npublic class CardValidator {\n\n**@WebMethod(operationName = \"\
