  \ order = new OrderDTO(1234l, new Date(), ➥\n\n\"Serge Gainsbourg\", **totalAmount**);\n\
  \ntry {\n\n// 创建连接到队列所需的构件\n\nConnection connection = connectionFactory.createConnection();\n\
  \nSession session = connection.createSession(false, ➥\n\nSession.AUTO_ACKNOWLEDGE);\n\
