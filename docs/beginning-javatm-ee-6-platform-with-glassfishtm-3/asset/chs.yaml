  \n**cache**.put(id, object);\n\n}\n\npublic void removeFromCache(Long id) {\n\n\
  if (cache.containsKey(id))\n\n**cache**.remove(id);\n\n}\n\npublic Object getFromCache(Long\
  \ id) {\n\nif (cache.containsKey(id))\n\nreturn **cache**.get(id);\n\nelse\n\n**198**\n\
  \n第 7 章 ■ 会话 Bean 与定时器服务\n\nreturn null;\n\n}\n\n}\n\n如你所见，无状态、有状态和单例会话 Bean 的开发都非常简单：只需一个注解即可。不过，单例\
  \ Bean 还有更多特性。它们可以在启动时初始化、可以链接在一起，并且可以自定义其并发访问方式。\n\n初始化\n\n当客户端类需要访问单例会话 Bean 上的方法时，容器会确保要么实例化该\
  \ Bean，要么使用容器中已有的实例。然而，有时初始化单例可能很耗时。想象一下，如果 CacheEJB（如前面清单 7-5 所示）需要访问数据库以加载包含数千个对象的缓存，那么对该\
  \ Bean 的第一次调用将非常昂贵，第一个客户端必须等待初始化完成。\n\n为了避免这种延迟，你可以要求容器在启动时初始化单例 Bean。如果 Bean 类上出现了\
  \ `@Startup` 注解，容器会在应用程序启动期间初始化它，而不是在客户端调用时。以下代码展示了如何使用该注解：\n\n@Singleton\n\n**@Startup**\n\
  \npublic class CacheEJB {\n\n// ...\n\n}\n\n链接单例\n\n在某些情况下，当你拥有多个单例 Bean 时，显式的初始化顺序可能很重要。想象一下，如果\
  \ CacheEJB 需要存储来自另一个单例 Bean（比如一个返回所有 ISO 国家代码的 CountryCodeEJB）的数据。CountryCodeEJB\n\
  \n\n\n需要在 CacheEJB 之前进行初始化。多个单例之间可能存在依赖关系，而 @javax.ejb.DependsOn 注解正是用来表达这种依赖关系的。以下示例说明了该注解的用法：\n\
  \n@Singleton\n\npublic class CountryCodeEJB {\n\n...\n\n}\n\n**@DependsOn**(\"CountryCodeEJB\"\
  )\n\n@Singleton\n\npublic class CacheEJB {\n\n...\n\n}\n\n@DependsOn 包含一个或多个字符串，每个字符串指定目标单例\
  \ Bean 的名称。以下代码展示了 CacheEJB 如何依赖于 CountryCodeEJB 和 ZipCodeEJB 的初始化。@DependsOn(\"\
  CountryCodeEJB\", \"ZipCodeEJB\") 告知\n\n第 7 章 ■ 会话 Bean 与定时器服务\n\n**199**\n\n容器确保单例\
  \ CountryCodeEJB 和 ZipCodeEJB 在 CacheEJB 之前完成初始化。\n\n@Singleton\n\npublic class\
  \ CountryCodeEJB {\n\n...\n\n}\n\n@Singleton\n\npublic class ZipCodeEJB {\n\n...\n\
  \n}\n\n**@DependsOn**(\"CountryCodeEJB\", \"ZipCodeEJB\")\n\n**@Startup**\n\n@Singleton\n\
  \npublic class CacheEJB {\n\n...\n\n}\n\n如这段代码所示，你甚至可以将依赖关系与启动初始化结合起来。CacheEJB 会在启动时被急切地初始化（因为它带有\
  \ @Startup 注解），因此 CountryCodeEJB 和 ZipCodeEJB 也会在启动时、在 CacheEJB 之前完成初始化。\n\n并发\n\
  \n到目前为止你应该已经理解，单例会话 Bean 只有一个实例，由多个客户端共享。因此，允许客户端并发访问，并且可以通过 @ConcurrencyManagement\
  \ 注解以三种不同方式进行控制：\n\n• *容器管理并发 (CMC)*：容器根据元数据（注解或等效的 XML）控制对 Bean 实例的并发访问。\n\n• *Bean\
  \ 管理并发 (BMC)*：容器允许完全并发访问，并将同步责任委托给 Bean。\n\n• *不允许并发*：如果某个客户端调用的业务方法正被另一个客户端使用，则并发调用将导致\
  \ ConcurrentAccessException。\n\n如果未指定并发管理方式，则默认使用 CMC 划分。\n\n单例 Bean 可以设计为使用 CMC\
  \ 或 BMC，但不能同时使用两者。\n\n**容器管理并发**\n\n对于默认划分方式 CMC，容器负责控制对单例 Bean 实例的并发访问。然后，你可以使用\
  \ @Lock 注解来指定当客户端调用方法时，容器应如何管理并发。该注解可以取值为 READ（共享）或 WRITE（独占）：\n\n**200**\n\n第 7\
  \ 章 ■ 会话 Bean 与定时器服务\n\n• @Lock(LockType.WRITE)：与独占锁关联的方法在方法处理完成之前，不允许并发调用。例如，如果客户端\
  \ C1 调用了一个带有独占锁的方法，那么客户端 C2 将无法调用该方法，直到 C1 完成。\n\n• @Lock(LockType.READ)：与共享锁关联的方法允许任意数量的其他并发调用访问\
  \ Bean 实例。例如，两个客户端 C1 和 C2 可以同时访问一个带有共享锁的方法。\n\n@Lock 注解可以指定在类上、方法上，或两者都指定。指定在类上意味着它适用于所有方法。如果未指定并发锁定属性，则默认假定为\
  \ @Lock(WRITE)。清单 7-6 中的代码展示了 CacheEJB 在 Bean 类上使用了 READ 锁。这意味着所有方法都将具有 READ 并发级别，但\
  \ getFromCache() 方法被覆盖为 WRITE。\n\n**清单 7-6.** *一个使用 CMC 的单例会话 Bean*\n\n@Singleton\n\
  \n**@Lock(LockType.READ)**\n\npublic class CacheEJB {\n\nprivate Map<Long, Object>\
  \ cache = new HashMap<Long, Object>();\n\npublic void addToCache(Long id, Object\
  \ object) {\n\nif (!cache.containsKey(id))\n\ncache.put(id, object);\n\n}\n\npublic\
  \ void removeFromCache(Long id) {\n\nif (cache.containsKey(id))\n\ncache.remove(id);\n\
  \n}\n\n**@AccessTimeout(2000)**\n\n**@Lock(LockType.WRITE)**\n\npublic Object getFromCache(Long\
  \ id) {\n\nif (cache.containsKey(id))\n\nreturn cache.get(id);\n\nelse\n\nreturn\
  \ null;\n\n}\n\n}\n\n\n\n在清单 7-6 中，`getFromCache()`方法使用了`@AccessTimeout`注解。当并发访问被阻塞时，可以指定一个超时时间，如果在特定时间内未获取到锁，则拒绝该请求。如果`getFromCache()`调用被锁定超过\
  \ 2000 毫秒，客户端将收到`ConcurrentAccessTimeoutException`异常。\n\n第 7 章 ■ 会话 Bean 与定时器服务\n\
  \n**201**\n\n**Bean 管理的并发**\n\n使用 BMC 边界划分时，容器允许对单例 Bean 实例进行完全并发访问。您需要负责保护其状态，防止因并发访问导致的同步错误。在这种情况下，您可以使用\
  \ Java 同步原语，例如`synchronized`和`volatile`。清单 7-7 中的代码展示了使用 BMC（`@ConcurrencyManagement(BEAN)`）的`CacheEJB`，并在`addToCache()`方法上使用了`synchronized`关键字。\n\
  \n**清单 7-7.** *一个使用 BMC 的单例会话 Bean*\n\n```java\n@Singleton\n@ConcurrencyManagement(ConcurrencyManagementType.BEAN)\n\
  public class CacheEJB {\n    private Map<Long, Object> cache = new HashMap<Long,\
  \ Object>();\n\n    public synchronized void addToCache(Long id, Object object)\
  \ {\n        if (!cache.containsKey(id))\n            cache.put(id, object);\n \
  \   }\n\n    public void removeFromCache(Long id) {\n        if (cache.containsKey(id))\n\
  \            cache.remove(id);\n    }\n\n    public synchronized Object getFromCache(Long\
  \ id) {\n        if (cache.containsKey(id))\n            return cache.get(id);\n\
  \        else\n            return null;\n    }\n}\n```\n\n**不允许并发**\n\n您还可以禁止对某个方法或整个\
  \ Bean 的并发访问。如果客户端调用当前正在使用的方法，这将导致抛出`ConcurrentAccessException`异常。这可能会带来性能问题，因为客户端可能需要处理异常、重试访问\
  \ Bean、可能再次收到异常、再次重试，等等。在清单 7-8 中，`CacheEJB`禁止了`addToCache()`方法的并发。另外两个方法默认使用 CMC，并带有`@Lock(WRITE)`注解。\n\
  \n**清单 7-8.** *一个不允许并发的单例会话 Bean*\n\n```java\n@Singleton\n@Lock(LockType.READ)\n\
  public class CacheEJB {\n```\n\n**202**\n\n第 7 章 ■ 会话 Bean 与定时器服务\n\n```java\n \
  \   private Map<Long, Object> cache = new HashMap<Long, Object>();\n\n    @ConcurrencyManagement(ConcurrencyManagementType.CONCURRENCY_NOT_ALLOWED)\n\
  \    public void addToCache(Long id, Object object) {\n        if (!cache.containsKey(id))\n\
  \            cache.put(id, object);\n    }\n\n    public void removeFromCache(Long\
  \ id) {\n        if (cache.containsKey(id))\n            cache.remove(id);\n   \
  \ }\n\n    @AccessTimeout(2000)\n    @Lock(LockType.WRITE)\n    public Object getFromCache(Long\
  \ id) {\n        if (cache.containsKey(id))\n            return cache.get(id);\n\
  \        else\n            return null;\n    }\n}\n```\n\n**会话 Bean 模型**\n\n到目前为止，您看到的代码示例都使用了最简单的会话\
  \ Bean 编程模型：一个带有注解的无接口 POJO。但根据您的需求，会话 Bean 可以提供更丰富的模型，允许您执行远程调用、依赖注入或异步调用。\n\n\
  接口与 Bean 类\n\n到目前为止，您看到的会话 Bean 仅由 Bean 类组成。实际上，它们可以更丰富，并由以下元素组成：\n\n*   **业务接口**：这些接口包含业务方法的声明，这些方法对客户端可见，并由\
  \ Bean 类实现。会话 Bean 可以拥有本地接口、远程接口，或者根本没有接口（仅限本地访问的无接口视图）。\n*   **Bean 类**：Bean 类包含业务方法的实现，并且可以实现零个或多个业务接口。会话\
  \ Bean 必须根据其类型使用`@Stateless`、`@Stateful`或`@Singleton`进行注解。\n\n如图 7-5 所示，客户端应用程序可以通过其接口（本地或远程）之一访问会话\
  \ Bean，或者直接调用 Bean 类本身。\n\n![Image 69](img/index-233_1.jpg)\n\n![Image 70](img/index-233_2.jpg)\n\
  \n第 7 章 ■ 会话 Bean 与定时器服务\n\n**203**\n\n**图 7-5.** *会话 Bean 有几种类型的接口。*\n\n**远程、本地和无接口视图**\n\
  \n\n\n客户端调用会话 Bean 的方式取决于其所在位置，Bean 类需要实现远程接口、本地接口，或者不实现任何接口。如果你的架构中有客户端位于 EJB 容器的\
  \ JVM 实例之外，则必须使用远程接口。如图 7-6 所示，这适用于运行在独立 JVM（例如，富客户端）、应用客户端容器（ACC）或外部 Web 或 EJB\
  \ 容器中的客户端。在这种情况下，客户端必须通过远程方法调用（RMI）来调用会话 Bean 的方法。当 Bean 和客户端运行在同一个 JVM 中时，你可以使用本地调用。这可以是调用另一个\
  \ EJB 的 EJB，也可以是运行在同一 JVM 的 Web 容器中的 Web 组件（Servlet、JSF）。\n\n你的应用程序也可以对同一个会话 Bean\
  \ 同时使用远程调用和本地调用。\n\n**图 7-6.** *被多个客户端调用的会话 Bean*\n\n一个会话 Bean 可以实现多个接口，也可以不实现任何接口。业务接口是一个标准的\
  \ Java 接口，它不扩展任何 EJB 特定的接口。与任何 Java 接口一样，业务接口定义了客户端应用程序可用的方法列表。\n\n它们可以使用以下注解：\n\
  \n• `@Remote`：表示一个远程业务接口。方法参数通过值传递，并且需要作为 RMI 协议的一部分进行序列化。\n\n• `@Local`：表示一个本地业务接口。方法参数通过引用从客户端传递到\
  \ Bean。\n\n你不能用多个注解标记同一个接口。到目前为止，你在本章中看到的会话 Bean 都没有接口。无接口视图是本地视图的一种变体，它无需使用单独的业务接口，即可在本地暴露\
  \ Bean 类的所有公有业务方法。\n\n**204**\n\n第 7 章 ■ 会话 Bean 与定时器服务\n\n清单 7-9 展示了由 `ItemEJB`\
  \ 无状态会话 Bean 实现的本地接口（`ItemLocal`）和远程接口（`ItemRemote`）。使用此代码，客户端将能够本地或远程调用 `findCDs()`\
  \ 方法，因为它在两个接口中都有定义。`createCd()` 方法将只能通过 RMI 远程访问。\n\n**清单 7-9.** *实现远程和本地接口的无状态会话\
  \ Bean*\n\n**@Local**\npublic interface **ItemLocal** {\n    List<Book> findBooks();\n\
  \    List<CD> **findCDs**();\n}\n\n**@Remote**\npublic interface **ItemRemote**\
  \ {\n    List<Book> findBooks();\n    List<CD> **findCDs**();\n    Book createBook(Book\
  \ book);\n    CD **createCD**(CD cd);\n}\n\n**@Stateless**\npublic class ItemEJB\
  \ implements **ItemLocal**, **ItemRemote** {\n    ...\n}\n\n作为清单 7-9 中代码的替代方案，你可以在\
  \ Bean 的类中指定接口。在这种情况下，你需要在 `@Local` 和 `@Remote` 注解中包含接口的名称，如清单 7-10 所示。当你拥有遗留接口并需要在会话\
  \ Bean 中使用它们时，这非常方便。\n\n**清单 7-10.** *定义远程和本地接口的 Bean 类*\n\npublic interface **ItemLocal**\
  \ {\n    List<Book> findBooks();\n    List<CD> **findCDs**();\n}\n\npublic interface\
  \ **ItemRemote** {\n    List<Book> findBooks();\n    List<CD> **findCDs**();\n \
  \   Book createBook(Book book);\n    CD **createCD**(CD cd);\n}\n\n**@Stateless**\n\
  **@Remote (ItemRemote)**\n**@Local (ItemLocal)**\npublic class ItemEJB implements\
  \ **ItemLocal**, **ItemRemote** {\n    ...\n}\n\n第 7 章 ■ 会话 Bean 与定时器服务\n\n**205**\n\
  \n**Web 服务接口**\n\n除了通过 RMI 进行远程调用之外，无状态 Bean 还可以作为 SOAP Web 服务或 RESTful Web 服务进行远程调用。第\
  \ 14 章和第 15 章专门介绍 Web 服务，因此我在此不再赘述。我只想向你展示，一个无状态会话 Bean 如何通过实现不同的带注解接口，以多种形式被访问。清单\
  \ 7-11 展示了一个具有本地接口、SOAP Web 服务端点（`@WebService`）和 RESTful Web 服务端点（`@Path`）的无状态 Bean。\n\
  \n**清单 7-11.** *实现 Web 服务接口的无状态会话 Bean*\n\n**@Local**\npublic interface **ItemLocal**\
  \ {\n\n\n\n`List<Book> findBooks();`\n\n`List<CD> **findCDs**();`\n\n}\n\n**@WebService**\n\
  \npublic interface **ItemWeb** {\n\n`List<Book> findBooks();`\n\n`List<CD> **findCDs**();`\n\
  \n`Book createBook(Book book);`\n\n`CD **createCD**(CD cd);`\n\n}\n\n**@Path(/items)**\n\
  \npublic interface **ItemRest** {\n\n`List<Book> findBooks();`\n\n}\n\n**@Stateless**\n\
  \npublic class ItemEJB implements **ItemLocal**, **ItemWeb**, **ItemRest** {\n\n\
  ...\n\n}\n\n**Bean 类**\n\n无状态会话 Bean 类是一个实现业务逻辑的标准 Java 类。开发会话 Bean 类的要求如下：\n\n\
  • 该类必须使用 `@Stateless`、`@Stateful`、`@Singleton` 注解，或在部署描述符中使用等效的 XML 配置。\n\n• 如果存在接口，它必须实现其接口的方法。\n\
  \n• 该类必须定义为 `public`，并且不能是 `final` 或 `abstract`。\n\n• 该类必须有一个公共的无参构造函数，容器将使用该构造函数来创建实例。\n\
  \n• 该类不能定义 `finalize()` 方法。\n\n**206**\n\n第 7 章 ■ 会话 Bean 与定时器服务\n\n• 业务方法名称不能以\
  \ `ejb` 开头，并且不能是 `final` 或 `static`。\n\n• 远程方法的参数和返回值必须是合法的 RMI 类型。\n\n**客户端视图**\n\
  \n现在你已经看到了会话 Bean 及其不同接口的示例，你可能想了解客户端如何调用这些 Bean。会话 Bean 的客户端可以是任何类型的组件：POJO、图形界面（Swing）、Servlet、JSF\
  \ 托管 Bean、Web 服务（SOAP 或 REST），或者另一个 EJB（部署在相同或不同的容器中）。\n\n要调用会话 Bean 上的方法，客户端不会直接实例化该\
  \ Bean（使用 `new` 操作符）。它需要获取对该 Bean（或其接口）的引用。它可以通过依赖注入（使用 `@EJB` 注解）或通过 JNDI 查找来获取该引用。除非特别指定，客户端会同步调用会话\
  \ Bean。正如你稍后将看到的，EJB 3.1 现在也允许异步方法调用。\n\n**@EJB**\n\nJava EE 使用多个注解来注入资源引用（`@Resource`）、实体管理器（`@PersistenceContext`）、Web\
  \ 服务（`@WebServiceRef`）等。但 `@javax.ejb.EJB` 注解专门用于将会话 Bean 引用注入到客户端代码中。\n\n依赖注入仅在受管环境中可行，例如\
  \ EJB 容器、Web 容器和应用程序客户端容器。\n\n让我们以最初的示例为例，其中会话 Bean 没有接口。对于客户端来说，要调用会话 Bean 的无接口视图，它需要获取对\
  \ Bean 类本身的引用。\n\n例如，在以下代码中，客户端使用 `@EJB` 注解获取对 `ItemEJB` 类的引用：\n\n`@Stateless`\n\
  \npublic class **ItemEJB** {\n\n...\n\n}\n\n// 客户端代码\n\n**@EJB ItemEJB** itemEJB;\n\
  \n如果会话 Bean 实现了多个接口，客户端必须指定它想要引用哪一个。在以下代码中，`ItemEJB` 实现了两个接口。客户端可以通过其本地接口或远程接口调用该\
  \ EJB，但不能再通过无接口视图调用。\n\n`@Stateless`\n\n`@Remote` (**ItemRemote**)\n\n`@Local` (**ItemLocal**)\n\
  \npublic class ItemEJB implements **ItemLocal**, **ItemRemote** {\n\n...\n\n}\n\n\
  // 客户端代码\n\n`@EJB ItemEJB` itemEJB; **// 不可行**\n\n**@EJB ItemLocal** itemEJBLocal;\n\
  \n**@EJB ItemRemote** itemEJBRemote;\n\n第 7 章 ■ 会话 Bean 与定时器服务\n\n**207**\n\n如果\
  \ Bean 暴露了至少一个接口，它需要通过在该 Bean 类上使用 `@LocalBean` 注解来指定它暴露了一个无接口视图。正如你在以下代码中所见，客户端现在可以通过其本地接口、远程接口和无接口视图来调用该\
  \ Bean。\n\n`@Stateless`\n\n`@Remote` (**ItemRemote**)\n\n`@Local` (**ItemLocal**)\n\
  \n**@LocalBean**\n\npublic class **ItemEJB** implements **ItemLocal**, **ItemRemote**\
  \ {\n\n...\n\n}\n\n// 客户端代码\n\n`@EJB ItemEJB` itemEJB;\n\n`@EJB ItemLocal` itemEJBLocal;\n\
  \n`@EJB ItemRemote` itemEJBRemote;\n\n根据你的客户端环境，你可能无法使用注入（如果\n\n\n\n组件不由容器管理）。在这种情况下，你可以使用\
  \ JNDI 通过其可移植的 JNDI 名称来查找会话 Bean。\n\n**全局 JNDI 访问**\n\n会话 Bean 也可以使用 JNDI 进行查找。当客户端不由容器管理且无法使用依赖注入时，JNDI\
  \ 主要用于远程访问。但本地客户端也可以使用 JNDI，即使依赖注入能产生更简洁的代码。要查找会话 Bean，客户端应用程序需要 JNDI API 来与目录命名服务通信。\n\
  \n一旦会话 Bean 部署到容器中，它就会自动绑定到一个 JNDI 名称。在 Java EE 6 之前，这个名称并未标准化，因此部署在不同容器（如 GlassFish、JBoss、WebLogic\
  \ 等）中的会话 Bean 会有不同的名称。Java EE 6 规范定义了具有以下语法的可移植 JNDI 名称：\n\njava:global[/<app-name>]/<module-name>/<bean-name>\
  \ ➥\n\n[!<fully-qualified-interface-name>]\n\nJNDI 名称的每个部分含义如下：\n\n• `<app-name>`\
  \ 是可选的，因为它仅适用于会话 Bean 打包在 ear 文件中的情况。如果是这种情况，`<app-name>` 默认为 ear 文件的名称（不带 `.ear`\
  \ 文件扩展名）。\n\n• `<module-name>` 是会话 Bean 所在模块的名称。它可以是独立 jar 文件中的 EJB 模块，也可以是 war\
  \ 文件中的 Web 模块。`<module-name>` 默认为归档文件的基本名称，不带文件扩展名。\n\n• `<bean-name>` 是会话 Bean\
  \ 的名称。\n\n• `<fully-qualified-interface-name>` 是每个已定义业务接口的完全限定名称。对于无接口视图，该名称是完全限定的\
  \ Bean 类名称。\n\n**208**\n\n第 7 章 ■ 会话 Bean 与定时器服务\n\n为了说明这种命名约定，我们以 ItemEJB 为例。ItemEJB\
  \ 是 `<bean-name>`，并被打包在 `cdbookstore.jar`（即 `<module-name>`）中。该 EJB 有一个远程接口和一个无接口视图（使用\
  \ `@LocalBean` 注解）。部署后，容器将创建以下 JNDI 名称：\n\npackage com.apress.javaee6;\n\n@Stateless\n\
  \n**@LocalBean**\n\n@Remote (**ItemRemote**)\n\npublic class ItemEJB implements\
  \ **ItemRemote** {\n\n...\n\n}\n\n// JNDI 名称\n\njava:global/cdbookstore/**ItemEJB**!com.apress.javaee6.\
  \ **ItemEJB**\n\njava:global/cdbookstore/**ItemEJB**!com.apress.javaee6. **ItemRemote**\n\
  \n除了上述命名约定之外，如果 Bean 只暴露一个客户端接口（或仅有一个无接口视图），容器会使用以下语法为该视图注册一个 JNDI 条目：\n\njava:global[/<app-name>]/<module-name>/<bean-name>\n\
  \n以下代码表示仅具有无接口视图的 ItemEJB Bean。此时 JNDI 名称仅由模块名称（cdbookstore）和 Bean 名称组成。\n\npackage\
  \ com.apress.javaee6;\n\n@Stateless\n\npublic class **ItemEJB** {\n\n...\n\n}\n\n\
  // JNDI 名称\n\njava:global/cdbookstore/**ItemEJB**\n\n会话上下文\n\n会话 Bean 是存在于容器中的业务组件。通常，它们不直接访问容器或使用容器服务（事务、安全、依赖注入等）。这些服务旨在由容器代表\
  \ Bean 透明地处理。然而，有时 Bean 需要在代码中显式使用容器服务（例如，显式标记要回滚的事务）。这可以通过 `javax.ejb.SessionContext`\
  \ 接口实现。`SessionContext` 允许以编程方式访问为会话 Bean 实例提供的运行时上下文。`SessionContext` 扩展了 `javax.ejb.EJBContext`\
  \ 接口。`SessionContext` API 的一些方法在表 7-1 中描述。\n\n第 7 章 ■ 会话 Bean 与定时器服务\n\n**209**\n\
  \n**表 7-1.** *SessionContext 接口的部分方法*\n\n**方法**\n\n**描述**\n\ngetCallerPrincipal\n\
  \n返回与调用关联的 `java.security.Principal`。\n\ngetRollbackOnly\n\n测试当前事务是否已被标记为回滚。\n\n\
  getTimerService\n\n返回 `javax.ejb.TimerService` 接口。只有无状态 Bean 和单例 Bean 可以使用此方法。有状态会话\
  \ Bean 不能作为定时对象。\n\ngetUserTransaction\n\n返回 `javax.transaction.UserTransaction`\
  \ 接口以划分事务。只有使用 Bean 管理事务（BMT）的会话 Bean 才能使用此方法。\n\nisCallerInRole\n\n测试调用者是否具有给定的安全角色。\n\
  \nlookup\n\n使会话 Bean 能够在 JNDI 命名上下文中查找其环境条目。\n\nsetRollbackOnly\n\n允许 Bean 将当前事务标记为回滚。只有使用\
  \ BMT 的会话 Bean 才能使用此方法。\n\nwasCancelCalled\n\n检查客户端是否在对应于当前正在执行的异步业务方法的客户端 `Future`\
  \ 对象上调用了 `cancel()` 方法。\n\n会话 Bean 可以通过使用 `@Resource` 注解注入 `SessionContext` 的引用来访问其环境上下文。\n\
  \n@Stateless\n\npublic class **ItemEJB** {\n\n**@Resource**\n\nprivate **SessionContext**\
  \ context;\n\n...\n\npublic Book createBook(Book book) {\n\n...\n\nif (cantFindAuthor())\n\
  \n**context**.setRollbackOnly();\n\n}\n\n}\n\n部署描述符\n\nJava EE 6 组件使用“例外配置”原则，这意味着容器、持久化提供者或消息代理将对该组件应用一组默认服务。配置这些默认服务是例外情况。如果需要非默认行为，则需要显式指定注解或其对应的\
  \ XML。这与你已经在 JPA 实体中看到的情况相同，其中一组注解允许你自定义默认映射。同样的原则也适用于会话 Bean。单个注解（`@Stateless`、`@Stateful`\
  \ 等）就足以通知容器应用某些服务（事务、生命周期、安全、拦截器、并发、异步等），但如果你需要更改它们，则使用注解或 XML。注解将附加信息附加到类、接口、方法或变量上，XML\
  \ 部署描述符也是如此。\n\n**210**\n\n第 7 章 ■ 会话 Bean 与定时器服务\n\nXML 部署描述符是注解的替代方案，这意味着任何注解都有对应的\
  \ XML 标签。如果同时使用了注解和部署描述符，则在部署过程中，部署描述符中的设置将覆盖注解。我不会过多地描述 XML 部署描述符（称为 `ejb-jar.xml`）的结构，因为它是可选的，并且最终可能会变得非常冗长。作为示例，清单\
  \ 7-12 展示了 ItemEJB（先前在清单 7-9 中展示）的 `ejb-jar.xml` 文件可能的样子。它定义了 Bean 类、远程和本地接口、其类型（Stateless）以及它使用容器管理事务（CMT）（Container）。`<env-entry>`\
  \ 定义了会话 Bean 的环境条目。我将在“环境命名上下文”部分中很快解释这些内容。\n\n**清单 7-12.** *ejb-jar.xml 文件*\n\n\
  <ejb-jar>\n\n<enterprise-beans>\n\n<session>\n\n<ejb-name>ItemEJB</ejb-name>\n\n\
  <ejb-class>com.apress.javaee6.ItemEJB</ejb-class>\n\n<local>com.apress.javaee6.ItemLocal</local>\n\
  \n<remote>com.apress.javaee6.ItemLocal</remote>\n\n<session-type>Stateless</session-type>\n\
  \n<transaction-type>Container</transaction-type>\n\n<env-entry>\n\n<env-entry-name>aBookTitle</env-entry-name>\n\
  \n<env-entry-type>java.lang.String</env-entry-type>\n\n<env-entry-value>Beginning\
  \ Java EE 6</env-entry-value>\n\n</env-entry>\n\n</session>\n\n</enterprise-beans>\n\
  \n</ejb-jar>\n\n如果会话 Bean 部署在 jar 文件中，则部署描述符需要存储在 `META-INF/ejb-jar.xml` 文件中。如果部署在\
  \ war 文件中，则需要存储在 `WEB-INF/ejb-jar.xml` 文件中。\n\n依赖注入\n\n\n\n我在本书中已经讨论过依赖注入，在接下来的几章中你还会多次遇到这种机制。这是\
  \ Java EE 6 使用的一种简单而强大的机制，用于将资源引用注入到属性中。资源不再由应用程序在 JNDI 中查找，而是由容器注入。\n\n容器可以使用不同的注解（或部署描述符）将各种类型的资源注入到会话\
  \ Bean 中：\n\n• `@EJB`：将 EJB 的本地、远程或无接口视图的引用注入到被注解的变量中。\n\n• `@PersistenceContext`\
  \ 和 `@PersistenceUnit`：分别表示对 `EntityManager` 和 `EntityManagerFactory` 的依赖。\n\n第\
  \ 7 章 ■ 会话 Bean 与定时器服务\n\n**211**\n\n• `@WebServiceRef`：注入对 Web 服务的引用。\n\n• `@Resource`：注入多种资源，例如\
  \ JDBC 数据源、会话上下文、用户事务、JMS 连接工厂和目的地、环境条目、定时器服务等。\n\n清单 7-13 展示了一个无状态会话 Bean 的片段，它使用各种注解将不同的资源注入到属性中。请注意，这些注解可以设置在实例变量上，也可以设置在\
  \ setter 方法上。\n\n**清单 7-13.** *一个使用注入的无状态 Bean*\n\n```java\n@Stateless\npublic class\
  \ ItemEJB {\n\n    @PersistenceContext(unitName = \"chapter07PU\")\n    private\
  \ EntityManager em;\n\n    @EJB\n    private CustomerEJB customerEJB;\n\n    @WebServiceRef\n\
  \    private ArtistWebService artistWebService;\n\n    private SessionContext context;\n\
  \n    @Resource\n    public void setCtx(SessionContext ctx) {\n        this.ctx\
  \ = ctx;\n    }\n\n    // ...\n}\n```\n\n环境命名上下文\n\n在处理企业应用程序时，有时会遇到应用程序参数因部署环境不同而变化的情况（取决于部署的国家、应用程序版本等）。例如，在\
  \ CD-BookStore 应用程序中，`ItemConverterEJB`（见清单 7-14）将商品价格转换为部署所在国家的货币（基于美元应用汇率）。如果你将这个无状态\
  \ Bean 部署在欧洲某个地方，就需要将商品价格乘以 0.80，并将货币改为欧元。\n\n**清单 7-14.** *一个将价格转换为欧元的无状态会话 Bean*\n\
  \n```java\n@Stateless\npublic class ItemConverterEJB {\n\n    public Item convertPrice(Item\
  \ item) {\n        item.setPrice(item.getPrice() * 0.80);\n        item.setCurrency(\"\
  Euros\");\n        return item;\n    }\n}\n```\n\n可以理解，硬编码这些参数的问题在于，每当货币发生变化的国家/地区，你都必须更改代码、重新编译并重新部署组件。另一种选择是每次调用\
  \ `convertPrice()` 方法时都访问数据库，但这会浪费资源。你真正想要的是将这些参数存储在某个可以在部署时更改的地方。部署描述符是设置这些参数的理想场所。\n\
  \n在 EJB 3.1 中，部署描述符（`ejb-jar.xml`）可能是可选的，但将其与环境条目一起使用是合理的。环境条目在部署描述符中指定，并且可以通过依赖注入（或通过\
  \ JNDI）访问。它们支持以下 Java 类型：`String`、`Character`、`Byte`、`Short`、`Integer`、`Long`、`Boolean`、`Double`\
  \ 和 `Float`。清单 7-15 展示了 `ItemConverterEJB` 的 `ejb-jar.xml` 文件，其中定义了两个条目：类型为 `String`、值为\
  \ `Euros` 的 `currencyEntry`，以及类型为 `Float`、值为 `0.80` 的 `changeRateEntry`。\n\n**清单\
  \ 7-15.** *ejb-jar.xml 中的 ItemConverterEJB 环境条目*\n\n```xml\n<ejb-jar>\n    <enterprise-beans>\n\
  \        <session>\n            <ejb-name>ItemConverterEJB</ejb-name>\n        \
  \    <ejb-class>com.apress.javaee6.ItemConverterEJB</ejb-class>\n            <env-entry>\n\
  \                <env-entry-name>currencyEntry</env-entry-name>\n              \
  \  <env-entry-type>java.lang.String</env-entry-type>\n                <env-entry-value>Euros</env-entry-value>\n\
  \            </env-entry>\n            <env-entry>\n                <env-entry-name>changeRateEntry</env-entry-name>\n\
  \                <env-entry-type>java.lang.Float</env-entry-type>\n            \
  \    <env-entry-value>0.80</env-entry-value>\n            </env-entry>\n       \
  \ </session>\n    </enterprise-beans>\n</ejb-jar>\n```\n\n现在，应用程序的参数已外部化到部署描述符中，`ItemConverterEJB`\
  \ 可以使用依赖注入来获取每个环境条目的值。在清单 7-16 中，`@Resource(name = \"currencyEntry\")` 将 `currencyEntry`\
  \ 的值注入到 `currency` 属性中。请注意，环境条目和注入变量的数据类型必须兼容；否则，容器会抛出异常。\n\n第 7 章 ■ 会话 Bean 与定时器服务\n\
  \n**213**\n\n**清单 7-16.** *使用环境条目的 ItemConverterEJB*\n\n```java\n@Stateless\npublic\
  \ class ItemConverterEJB {\n\n    @Resource(name = \"currencyEntry\")\n    private\
  \ String currency;\n\n    @Resource(name = \"changeRateEntry\")\n    private Float\
  \ changeRate;\n\n    public Item convertPrice(Item item) {\n        item.setPrice(item.getPrice()\
  \ * changeRate);\n        item.setCurrency(currency);\n        return item;\n  \
  \  }\n}\n```\n\n**异步调用**\n\n默认情况下，通过远程、本地和无接口视图进行的会话 Bean 调用是同步的：客户端调用一个方法，在调用期间会被阻塞，直到处理完成、返回结果，客户端才能继续其工作。\n\
  \n但是，异步处理是许多处理长时间运行任务的应用程序中的常见需求。例如，打印订单可能是一个非常耗时的任务，具体取决于打印机是否在线、纸张是否充足，或者打印机后台处理程序中是否已有数十个文档在等待打印。当客户端调用一个方法来打印文档时，它希望触发一个“即发即忘”的过程来打印文档，这样客户端就可以继续其处理。\n\
  \n在 EJB 3.1 之前，异步处理可以通过 JMS 和 MDB 来处理（见第 13 章）。你必须创建管理对象（JMS 工厂和目的地），使用底层的 JMS API\
  \ 将消息发送到目的地，然后开发一个 MDB 来消费和处理消息。这种方法可行，但对于许多用例来说过于重量级，因为当你只是想异步调用一个方法时，却需要设置一个 MOM\
  \ 系统。\n\n从 EJB 3.1 开始，你可以简单地通过使用 `@javax.ejb.Asynchronous` 注解会话 Bean 的方法来异步调用方法。清单\
  \ 7-17 展示了 `OrderEJB`，它有一个向客户发送电子邮件的方法，另一个是打印订单的方法。由于这两个方法都很耗时，因此它们都使用了 `@Asynchronous`\
  \ 注解。\n\n**清单 7-17.** *一个声明了两个异步方法的 OrderEJB*\n\n```java\n@Stateless\npublic class\
  \ OrderEJB {\n\n    @Asynchronous\n    private void sendEmailOrderComplete(Order\
  \ order, Customer customer) {\n        // 发送电子邮件\n    }\n\n    @Asynchronous\n \
  \   private void printOrder(Order order) {\n        // 打印订单\n    }\n}\n```\n\n当客户端调用\
  \ `printOrder()` 或 `sendEmailOrderComplete()` 方法时，容器会立即将控制权返回给客户端，并在一个单独的线程中继续处理调用。如清单\
  \ 7-17 所示，这两个异步方法的返回类型是 `void`。这在绝大多数用例中可能都适用，但有时你需要一个方法返回一个值。异步方法可以返回 `void`，也可以返回一个\
  \ `java.util.concurrent.Future<V>` 对象，其中 `V` 代表结果值。`Future` 对象允许你从在单独线程中执行的方法获取返回值。然后，客户端可以使用\
  \ `Future` API 来获取结果，甚至取消调用。\n\n清单 7-18 展示了一个返回 `Future<Integer>` 的方法示例。\n\n\n\n\
  `sendOrderToWorkflow()` 方法使用工作流来处理一个 Order 对象。假设它调用了多个企业级组件（消息、Web 服务等），并且每一步都会返回一个状态（整数）。当客户端异步调用\
  \ `sendOrderToWorkflow()` 方法时，它期望收到工作流的状态。客户端可以使用 `Future.get()` 方法检索结果，或者如果出于任何原因想要取消调用，则可以使用\
  \ `Future.cancel()`。如果客户端调用了 `Future.cancel()`，容器将仅在调用尚未开始时尝试取消该异步调用。请注意，`sendOrderToWorkflow()`\
  \ 方法使用 `SessionContext.wasCancelCalled()` 方法来检查客户端是否已请求取消调用。因此，该方法返回 `javax.ejb.AsyncResult<V>`，这是\
  \ `Future<V>` 的一个便捷实现。请记住，`AsyncResult` 用于将结果值传递给容器，而不是直接传递给调用者。\n\n**清单 7-18.**\
  \ *一个声明了两个异步方法的 OrderEJB*\n\n@Stateless\n\n**@Asynchronous**\n\npublic class OrderEJB\
  \ {\n\n@Resource\n\nSessionContext **ctx**;\n\nprivate void sendEmailOrderComplete(Order\
  \ order, Customer customer) {\n\n// 发送电子邮件\n\n}\n\nprivate void printOrder(Order\
  \ order) {\n\n// 打印订单\n\n}\n\nprivate **Future<Integer>** sendOrderToWorkflow(Order\
  \ order) {\n\nInteger status = 0;\n\n// 处理中\n\nstatus = 1;\n\n第 7 章 ■ 会话 Bean 与定时器服务\n\
  \n**215**\n\nif (**ctx.wasCancelCalled()**) {\n\nreturn new **AsyncResult<Integer>**\
  \ (2);\n\n}\n\n// 处理中\n\nreturn new **AsyncResult<Integer>** (status);\n\n}\n\n\
  }\n\n请注意，在清单 7-18 中，`@Asynchronous` 注解也可以应用于类级别。这将定义所有方法为异步方法。当客户端调用 `sendOrderToWorkflow()`\
  \ 方法时，它需要调用 `Future.get()` 来检索结果值。\n\nFuture<Integer> **status** = orderEJB.sendOrderToWorkflow\
  \ (order);\n\nInteger statusValue = status. **get()**;\n\n**可嵌入用法**\n\n会话 Bean 是容器管理的组件，这是它们的优势。容器处理各种服务（事务、生命周期、异步、拦截器等），这使您可以专注于业务代码。缺点在于，即使您只是想测试它们，也始终需要在容器中执行您的\
  \ EJB。为了解决这个问题，您最终不得不调整业务代码以便能够测试它：当您的 EJB 只需要本地访问时添加远程接口，创建一个将调用委托给真实 EJB 的远程 TestEJB\
  \ 外观，或者使用供应商的特定功能——但无论如何，您都需要有一个运行着已部署 EJB 的容器。\n\n这个问题在 EJB 3.1 中通过创建可嵌入的 EJB 容器得到了解决。EJB\
  \ 3.1 引入了一个标准 API，用于在 Java SE 环境中执行 EJB。可嵌入 API（包 `javax.ejb.embeddable`）允许客户端实例化一个在其自身\
  \ JVM 中运行的 EJB 容器。可嵌入容器提供了一个托管环境，支持 Java EE 容器中存在的相同基本服务：注入、事务、生命周期等。可嵌入 EJB 容器仅适用于\
  \ EJB Lite 子集 API（没有 MDB，没有 Entity Beans 2.x 等）。\n\n清单 7-19 展示了一个 JUnit 测试类，它使用引导\
  \ API 来启动容器（`javax.ejb.embeddable.EJBContainer` 抽象类）、查找 EJB 并调用其方法。\n\n**清单 7-19.**\
  \ *一个使用可嵌入容器的测试类*\n\npublic class ItemEJBTest {\n\nprivate static **EJBContainer**\
  \ ec;\n\nprivate static **Context** ctx;\n\n@BeforeClass\n\npublic static void initContainer()\
  \ throws Exception {\n\n**ec = EJBContainer.createEJBContainer();**\n\n**ctx = ec.getContext();**\n\
  \n}\n\n**216**\n\n第 7 章 ■ 会话 Bean 与定时器服务\n\n@AfterClass\n\npublic static void closeContainer()\
  \ throws Exception {\n\n**ec.close();**\n\n}\n\n@Test\n\npublic void **createBook()**\
  \ throws Exception {\n\n// 创建一个 Book 实例\n\nBook book = new Book();\n\nbook.setTitle(\"\
  The Hitchhiker's Guide to the Galaxy\");\n\nbook.setPrice(12.5F);\n\nbook.setDescription(\"\
  Science fiction comedy book\");\n\nbook.setIsbn(\"1-84023-742-2\");\n\nbook.setNbOfPage(354);\n\
  \nbook.setIllustrations(false);\n\n// 查找 EJB\n\nItemEJB bookEJB = (ItemEJB) ➥\n\n\
  **ctx.lookup(\"java:global/chapter07/ItemEJB\")**;\n\n// 将图书持久化到数据库\n\nbook = itemEJB.createBook(book);\n\
  \nassertNotNull(\"ID should not be null\", book.getId());\n\n// 从数据库中检索所有图书\n\n\
  List<Book> books = itemEJB.findBooks();\n\nassertNotNull(books);\n\n}\n\n}\n\n如您在清单\
  \ 7-19 的 `initContainer()` 方法中所见，`EJBContainer` 包含一个用于创建容器实例的工厂方法（`createEJBContainer()`）。默认情况下，可嵌入容器会搜索客户端的类路径以找到用于初始化的\
  \ EJB 集合。一旦容器初始化完成，该方法会获取容器上下文（`EJBContainer.getContext()`，返回一个 `javax.naming.Context`）来查找\
  \ `ItemEJB`（使用可移植的全局 JNDI 名称语法）。\n\n请注意，`ItemEJB`（前面在清单 7-1 中展示过）是一个无状态会话 Bean，通过无接口视图暴露业务方法。它使用了注入、容器管理的事务和一个\
  \ JPA Book 实体。可嵌入容器负责注入实体管理器以及提交或回滚任何事务。`closeContainer()` 方法调用 `EJBContainer.close()`\
  \ 方法来关闭可嵌入容器实例。\n\n在这个例子中，我使用了一个测试类来向您展示如何使用可嵌入的 EJB 容器。但请记住，EJB 现在可以用于任何类型的 Java\
  \ SE 环境：从测试类到 Swing 应用程序，甚至只是一个带有 `public static void main()` 的 Main 类。\n\n![Image\
  \ 71](img/index-247_1.jpg)\n\n第 7 章 ■ 会话 Bean 与定时器服务\n\n**217**\n\n**定时器服务**\n\n\
  某些 Java EE 应用程序需要安排任务，以便在特定时间收到通知。例如，CD-BookStore 应用程序需要每年向客户发送生日电子邮件，打印每月售出商品的统计数据，生成关于库存水平的夜间报告，并每\
  \ 30 秒刷新一次技术缓存。\n\n因此，EJB 2.1 引入了一种称为定时器服务的调度工具，因为客户端不能直接使用 Thread API。与其他专有工具或框架（Unix\
  \ cron 工具、Quartz 等）相比，定时器服务的功能不够丰富。EJB 规范不得不等到 3.1 版本才看到定时器服务的重大改进。它从 Unix cron\
  \ 和其他成功工具中汲取灵感，如今能够与其它产品竞争，因为它能满足大多数调度用例。\n\nEJB 定时器服务是一种容器服务，允许 EJB 注册以进行回调调用。EJB\
  \ 通知可以安排为基于日历的调度、在特定时间、在特定持续时间之后或在特定的重复间隔发生。容器会记录所有定时器，并在定时器到期时调用相应的 Bean 实例方法。图\
  \ 7-7 展示了涉及定时器服务的两个步骤。首先，EJB 需要创建一个定时器（自动或编程方式）并注册以进行回调调用，然后定时器服务在 EJB 实例上触发已注册的方法。\n\
  \n**图 7-7.** *定时器服务与会话 Bean 之间的交互*\n\n定时器旨在用于长期运行的业务流程，并且默认是持久的。这意味着它们能在服务器关闭后存活，一旦服务器再次启动，定时器会像从未发生过关闭一样执行。您也可以选择将定时器指定为非持久的。\n\
  \n■**注意** 无状态 Bean、单例 Bean 和 MDB 可以由定时器服务注册，但有状态 Bean 不能也不应该使用调度 API。\n\n\n\n如果\
  \ Bean 的方法带有 `@Schedule` 注解，容器可以在部署时自动创建定时器。但定时器也可以通过编程方式创建，并且必须提供一个带有 `@Timeout`\
  \ 注解的回调方法。\n\n**基于日历的表达式**\n\n定时器服务使用一种基于日历的语法，该语法源自 Unix 的 cron 工具。\n\n此语法用于编程式定时器创建（使用\
  \ `ScheduleExpression` 类）和自动定时器创建（通过 `@Schedule` 注解或部署描述符）。用于创建基于日历表达式的属性在表 7-2\
  \ 中定义。\n\n**218**\n\n第 7 章 ■ 会话 Bean 与定时器服务\n\n**表 7-2.** *基于日历表达式的属性*\n\n**属性**\n\
  \n**描述**\n\n**可能的值**\n\n**默认值**\n\nsecond\n\n一分钟内的一秒或多秒\n\n[0,59]\n\n*\n\nminute\n\
  \n一小时内的一分钟或多分钟\n\n[0,59]\n\n*\n\nhour\n\n一天内的一小时或多小时\n\n[0,23]\n\n*\n\ndayOfMonth\n\
  \n一个月内的一天或多天\n\n[1,31] 或 {\"1st\", \"2nd\", \"3rd\", . . . ,\n\n*\n\n\"30th\", \"\
  31st\"} 或 {\"Sun\", \"Mon\",\n\n\"Tue\", \"Wed\", \"Thu\", \"Fri\", \"Sat\"}\n\n\
  或 \"Last\" (该月的最后一天)\n\n或 -x (表示该月最后一天前的 x 天)\n\nmonth\n\n一年内的一个月或多个月\n\n[1,12]\
  \ 或 {\"Jan\", \"Feb\", \"Mar\", \"Apr\",\n\n*\n\n\"May\", \"Jun\", \"Jul\", \"Aug\"\
