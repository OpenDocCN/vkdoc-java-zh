  好的，作为一名高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n监听器类只需遵循简单的规则。首先，该类必须有一个公共的无参构造器。其次，回调方法的签名与清单\
  \ 5-1 中的略有不同。当在监听器上调用回调方法时，该方法需要能够访问实体状态（例如，需要验证的客户的名字和姓氏）。这些方法必须有一个与实体类型兼容的参数类型，因为与事件相关的实体将被传入回调。在实体上定义的回调方法具有以下无参数签名：\n\
  \n`void <METHOD>();`\n\n在实体监听器上定义的回调方法可以有两种不同类型的签名。\n\n如果该方法需要在多个实体上使用，则它必须有一个 `Object`\
  \ 参数：\n\n`void <METHOD>(**Object** anyEntity)`\n\n如果它仅用于一个实体或其子类（当存在继承关系时），则参数可以是该实体类型：\n\
  \n`void <METHOD>(**Customer** customerOrSubclasses)`\n\n为了指定这两个监听器会收到 `Customer`\
  \ 实体生命周期事件的通知，你需要使用 `@EntityListeners` 注解（参见清单 5-4）。此注解可以接受一个实体监听器或一个监听器数组作为参数。当定义了多个监听器并且生命周期事件发生时，持久化提供者会按照它们列出的顺序遍历每个监听器，并调用回调方法，同时传入事件所应用实体的引用。然后，它会在实体本身上调用回调方法（如果有的话）。\n\
  \n**清单 5-4.** *定义了两个监听器的 Customer 实体*\n\n**@EntityListeners({DataValidationListener.class,**\
  \ ➥\n\n**AgeCalculationListener.class})**\n\n@Entity\n\npublic class Customer {\n\
