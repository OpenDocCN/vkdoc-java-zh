  \n**总结**\n\n本章介绍了 EJB 3.1。从 EJB 2.*x*开始，EJB 规范在过去十年中从一个需要将 home 接口和远程/本地接口与大量 XML\
  \ 打包在一起的重量级模型，演变为一个无需接口、仅需一个注解的简单 Java 类。其底层功能始终如一：事务性和安全性的业务逻辑。\n\nEJB 3.1 带来了许多新特性，简化了编程模型（无接口视图、war\
  \ 部署），使其更丰富（嵌入式容器、单例、定时服务、异步调用），并使其在应用服务器之间更具可移植性（标准全局 JNDI 名称）。一个主要的简化是创建了 EJB\
  \ Lite，它是完整 EJB API 的一个子集，为新手提供了一个更简单但功能依然强大的 EJB 版本，可用于 Java EE Web Profile。嵌入式\
  \ EJB 容器也使单元测试更简单，且在不同实现之间具有可移植性。EJB 3.1 遵循其前身 EJB 3.0 的发展轨迹。\n\n展望后续章节，第 7 章将重点描述无状态、有状态和单例会话\
  \ Bean 以及定时服务。第 8 章将解释回调方法和拦截器，第 9 章将探讨事务和安全性。\n\n第 7 章\n\n会话 Bean 与定时服务\n\n**从**第\
  \ 2 章到第 5 章，我重点介绍了使用 JPA 实体的持久化对象。实体封装了数据、关系映射，有时还包括验证逻辑。现在我将向你展示如何使用会话 Bean 开发处理这些持久化对象的业务层。\n\
  \n会话 Bean 处理需要与其他组件（实体、Web 服务、消息传递等）交互的复杂任务。实体与会话 Bean 之间的这种逻辑分离遵循了“关注点分离”范式，即应用程序被拆分为功能重叠尽可能少的独立组件。\n\
  \n\n\n在本章中，你将学习三种不同类型的会话 Bean：无状态、有状态和单例。无状态 Bean 是三者中可扩展性最强的，因为它们不保持状态，并在单个方法调用中完成业务逻辑。有状态\
  \ Bean 与一个客户端维护会话状态。单例会话 Bean（每个应用程序一个实例）是 EJB 3.1 引入的新模型。\n\n本章最后一节将展示如何使用增强的定时器服务来\n\
  \n调度任务。\n\n消息驱动 Bean 是 EJB 规范的一部分，将在第 13 章中与\n\nJava 消息服务（JMS）一起讨论。正如你将在第 14 章和第\
  \ 15 章中看到的，无状态会话 Bean 可以转变为 SOAP Web 服务或 RESTful Web 服务。更准确地说，这些 Web 服务可以利用一些 EJB\
  \ 特性，例如事务、安全性、拦截器等。\n\n**会话 Bean**\n\n会话 Bean 非常适合实现业务逻辑、流程和工作流。但在使用它们之前，你需要选择使用哪种类型的会话\
  \ Bean：\n\n• *无状态*：这种类型的会话 Bean 不会代表客户端应用程序维护任何会话状态。它用于处理可以通过单个方法调用完成的任务。\n\n• *有状态*：这种类型的\
  \ Bean 维护状态，并与特定客户端关联。它对于需要分多个步骤完成的任务非常有用。\n\n**189**\n\n![Image 65](img/index-220_1.jpg)\n\
  \n**190**\n\n第 7 章 ■ 会话 Bean 与定时器服务\n\n• *单例*：这种类型的 Bean 遵循单例设计模式。容器将确保整个应用程序中只存在一个实例。\n\
  \n当然，这三种类型的会话 Bean 都有其特定功能，但它们也有很多共同点。首先，它们具有相同的编程模型。稍后你将看到，会话 Bean 可以有本地或远程接口，也可以没有接口。会话\
  \ Bean 是容器管理的组件，因此它们需要打包在归档文件（jar、war 或 ear 文件）中并部署到容器中。容器负责管理其会话 Bean 的生命周期（你将在下一章中看到）、事务、拦截器等等。图\
  \ 7-1 展示了 EJB 容器中会话 Bean 和定时器服务的高层视图。\n\n**图 7-1.** *EJB 容器中的会话 Bean 和定时器服务*\n\n\
  **无状态 Bean**\n\n在 Java EE 应用程序中，无状态 Bean 是最流行的会话 Bean 组件。它们简单、强大且高效，能够响应执行无状态业务处理的常见任务。无状态是什么意思？这意味着任务必须在单个方法调用中完成。\n\
  \n举个例子，我们可以回到面向对象编程的根源，其中\n\n对象封装了其状态和行为。要仅使用一个对象将一本书持久化到数据库，你可以这样做：创建一个 Book 对象的实例，设置一些值，然后调用一个方法使其将自身持久化到数据库（book.persistToDatabase()）。在下面的代码中，你可以看到从第一行到最后一行，book\
  \ 对象被多次调用并保持其状态。\n\nBook book = new Book();\n\nbook.setTitle(\"The Hitchhiker's\
