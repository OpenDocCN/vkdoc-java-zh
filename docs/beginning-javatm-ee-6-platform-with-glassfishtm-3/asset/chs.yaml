  \ 方法依赖于所维护的状态，可以结账这两本书。\n\n当客户端在服务器上调用有状态会话 Bean 时，EJB 容器需要为每次后续方法调用提供同一个实例。有状态\
  \ Bean 不能被其他客户端重用。图 7-3 显示了 Bean 实例与客户端之间的一对一关联。就开发人员而言，不需要额外的代码，因为这种一对一关联由 EJB\
  \ 容器自动管理。\n\n![Image 67](img/index-224_1.jpg)\n\n**194**\n\n第 7 章 ■ 会话 Bean 与定时器服务\n\
  \n**图 7-3.** *客户端访问有状态 Bean*\n\n这种一对一关联是有代价的，因为正如你可能猜到的，如果你有一百万个客户端，内存中就会有一百万个有状态\
  \ Bean。为了避免如此大的内存占用，有状态 Bean 必须在客户端的下一个请求将其带回之前，暂时从内存中清除。这种技术称为*钝化和激活*。\n\n钝化是将实例从内存中移除并保存到持久化位置（磁盘上的文件、数据库等）的过程。它有助于释放内存和资源（数据库或\
  \ JMS 连接等）。激活是恢复状态并将其应用于实例的逆过程。钝化和激活由容器自动完成；你不必担心自己去做，因为这是一项容器服务。你应该担心的是在 Bean 被钝化之前释放任何资源（例如，数据库连接、JMS\
