  \ type) {\n        return **Customer**.class.isAssignableFrom(type);\n    }\n  \
  \  public void writeTo(**Customer** customer, MediaType mediaType,\n           \
  \            MultivaluedMap<String, Object> headers,\n                       OutputStream\
  \ outputStream) throws IOException {\n        outputStream.write(customer.get(id).getBytes());\n\
  \        // ...\n    }\n}\n```\n\n如果 `MessageBodyReader` 和 `MessageBodyWriter` 的实现无法生成任何表示形式，它们可能会抛出\
  \ `WebApplicationException`。对于常见情况，JAX-RS 实现附带了一组默认的实体提供者（见表 15-1）。\n\n**表 15-1.**\
  \ *JAX-RS 实现的默认提供者*\n\n| **类型** | **描述** |\n| :--- | :--- |\n| `byte[]` | 所有媒体类型（`*/*`）。\
