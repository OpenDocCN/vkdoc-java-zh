  返回用于划分事务边界的 javax.transaction.UserTransaction 接口。只有使用 Bean 管理事务（BMT）的 MDB 才能使用此方法。\n\
  \nisCallerInRole\n测试调用者是否具有给定的安全角色。\n\nLookup\n使 MDB 能够在 JNDI 命名上下文中查找其环境条目。\n\n\
  setRollbackOnly\n允许实例将当前事务标记为回滚。只有使用 BMT 的 MDB 才能使用此方法。\n\n生命周期和回调注解\n\nMDB 的生命周期（见图\
  \ 13-11）与无状态会话 Bean 相同：要么 MDB 存在并准备好消费消息，要么不存在。在退出之前，容器首先创建 MDB 的一个实例，并在适用时注入元数据注解（@Resource、@Ejb\
  \ 等）或部署描述符指定的必要资源。然后，容器调用 Bean 的 @PostConstruct 回调方法（如果有）。之后，MDB 进入就绪状态，等待消费任何传入消息。当\
  \ MDB 从池中移除或销毁时，会触发 @PreDestroy 回调。\n\n**图 13-11.** *MDB 生命周期*\n\n此行为与无状态会话 Bean\
  \ 相同（有关回调方法和拦截器的更多详细信息，请参见第 8 章），并且与其他 EJB 一样，你可以使用 @javax.ejb.AroundInvoke 注解添加拦截器。\n\
  \n**384**\n\n第 13 章 ■ 发送消息\n\n**MDB 作为消费者**\n\n\n\n正如本章前面“JMS API”部分所述，消费者可以通过循环等待消息到达来同步接收消息，也可以通过实现\
  \ `MessageListener` 接口来异步接收消息。本质上，MDB 被设计为异步消息消费者。MDB 实现了一个消息监听器接口，当消息到达时，该接口由容器触发。\n\
  \nMDB 能否进行同步消费？可以，但不推荐。同步消息消费者会阻塞并占用服务器资源（EJB 将陷入循环而不执行任何工作，容器也无法释放它们）。与无状态会话 Bean\
  \ 类似，MDB 存在于一个特定大小的池中。当容器需要一个实例时，它会从池中取出一个并使用。如果每个实例都进入无限循环，池最终将变空，所有可用的实例都将忙于循环。EJB\
  \ 容器还可能开始生成更多 MDB 实例，从而扩大池并消耗越来越多的内存。因此，会话 Bean 和 MDB 不应被用作同步消息消费者。表 13-7 展示了 MDB\
  \ 和会话 Bean 的不同接收模式。\n\n**表 13-7.** *MDB 与会话 Bean 的比较*\n\n**企业 Bean**\n\n**生产者**\n\
  \n**同步接收者**\n\n**异步接收者**\n\n会话 Bean\n\n是\n\n不推荐\n\n不可能\n\nMDB\n\n是\n\n不推荐\n\n是\n\
  \n**MDB 作为生产者**\n\nMDB 能够成为消息生产者，这通常发生在它们参与工作流时，因为它们从一个目标接收消息，处理消息，然后将其发送到另一个目标。要添加此功能，必须使用\
  \ JMS API。\n\n可以通过使用 `@Resource` 注解或通过 JNDI 查找来注入目标和连接工厂，然后调用 `javax.jms.Session`\
  \ 对象上的方法来创建和发送消息。`BillingMDB` 的代码（见清单 13-12）监听一个主题（`jms/javaee6/Topic`），接收消息（`onMessage()`\
  \ 方法），并向一个队列（`jms/javaee6/Queue`）发送新消息。\n\n**清单 13-12.** *一个消费和生成消息的 MDB*\n\n```java\n\
  @MessageDriven(mappedName = \"jms/javaee6/Topic\", activationConfig = {\n    @ActivationConfigProperty(propertyName\
  \ = \"acknowledgeMode\", \n        propertyValue = \"Auto-acknowledge\"),\n    @ActivationConfigProperty(propertyName\
  \ = \"messageSelector\", \n        propertyValue = \"orderAmount < 3000\")\n})\n\
  public class BillingMDB implements MessageListener {\n\n    @Resource(name = \"\
  jms/javaee6/Queue\")\n    private Destination printingQueue;\n\n    @Resource(name\
  \ = \"jms/javaee6/ConnectionFactory\")\n    private ConnectionFactory connectionFactory;\n\
  \n    private Connection connection;\n\n    @PostConstruct\n    private void initConnection()\
  \ {\n        connection = connectionFactory.createConnection();\n    }\n\n    @PreDestroy\n\
  \    private void closeConnection() {\n        connection.close();\n    }\n\n  \
  \  public void onMessage(Message message) {\n        TextMessage msg = (TextMessage)message;\n\
  \        System.out.println(\"Message received: \" + msg.getText());\n        sendPrintingMessage();\n\
  \    }\n\n    private void sendPrintingMessage() throws JMSException {\n       \
  \ Session session = connection.createSession(true, \n            Session.AUTO_ACKNOWLEDGE);\n\
  \        MessageProducer producer = session.createProducer(printingQueue);\n   \
  \     TextMessage message = session.createTextMessage();\n        message.setText(\"\
  This message has been received and sent again\");\n        producer.send(message);\n\
  \        session.close();\n    }\n}\n```\n\n这个 MDB 使用了到目前为止介绍的大部分概念。首先，它使用 `@MessageDriven`\
  \ 注解来定义其监听的主题的 JNDI 名称（`mappedName = \"jms/javaee6/Topic\"`）。在同一个注解中，它使用 `@ActivationConfigProperty`\
  \ 注解数组定义了一组属性，例如确认模式和消息选择器，并且它实现了 `MessageListener` 及其 `onMessage()` 方法。\n\n这个 MDB\
  \ 还需要生成一条消息。因此，它被注入了两个所需的管理对象：一个连接工厂和一个目标（名为 `jms/javaee6/Queue` 的队列）。\n\n\n\njavaee6/Queue）。然后，它可以使用生命周期回调创建并关闭一个共享的\
  \ `javax.jms.Connection` 实例；尽管创建连接的开销很大，但将这段代码放在 `@PostConstruct` 和 `@PreDestroy`\
  \ 注解的方法中，可以确保它仅在 MDB 创建和销毁时执行。\n\n最后，发送消息的业务方法（`sendPrintingMessage()` 方法）看起来与你之前看到的类似：创建一个\
  \ JMS 会话，并用它来创建文本消息和生产者，然后发送消息。为了提高可读性，整个类中省略了异常处理。\n\n**386**\n\n第 13 章 ■ 发送消息\n\
  \n**事务**\n\nMDB 是 EJB（更多信息请参见第 9 章）。MDB 可以使用 BMT 或容器管理事务（CMT），它们可以通过使用 `MessageDrivenContext.setRollbackOnly()`\
  \ 方法显式回滚事务等。关于 MDB 有一些特殊性值得解释。\n\n当我们谈论事务时，我们总是想到关系数据库。然而，其他资源也具有事务性，例如消息系统。如果两个或多个操作必须同时成功或同时失败，它们就构成一个事务。对于消息传递，如果发送了两条或多条消息，它们必须同时成功（提交）或同时失败（回滚）。这在实践中是如何工作的？答案是，消息在事务提交之前不会释放给消费者。容器将在调用\
  \ `onMessage()` 方法之前启动一个事务，并在该方法返回时提交该事务（除非该事务已通过 `setRollbackOnly()` 标记为回滚）。\n\n\
  尽管 MDB 具有事务性，但它们不能在客户端的事务上下文中执行，因为它们没有客户端。没有人显式调用 MDB 上的方法，它们只是监听目标并消费消息。没有上下文从客户端传递到\
  \ MDB，客户端事务上下文也无法传递到 `onMessage()` 方法。\n\n表 13-8 比较了 CMT 与会话 Bean 和 MDB。\n\n**表\
  \ 13-8.** *MDB 事务与会话 Bean 的比较*\n\n**事务属性**\n\n**会话 Bean**\n\n**MDB**\n\nNOT_SUPPORTED\n\
  \n是\n\n是\n\nREQUIRED\n\n是\n\n是\n\nMANDATORY\n\n是\n\n否\n\nREQUIRES_NEW\n\n是\n\n否\n\
  \nSUPPORTS\n\n是\n\n否\n\nNEVER\n\n是\n\n否\n\n在 CMT 中，MDB 可以在业务方法上使用 @javax.ejb.TransactionAttribute\
  \ 注解，并带有以下两个属性：\n\n• REQUIRED *（默认值）*：如果 MDB 调用其他企业 Bean，容器会将事务上下文随调用一起传递。当消息监听器方法完成时，容器尝试提交事务。\n\
  \n• NOT_SUPPORTED：如果 MDB 调用其他企业 Bean，容器不会随调用传递任何事务上下文。\n\n**处理异常**\n\n在本章的代码片段中，由于\
  \ JMS API 在处理异常时非常冗长，因此省略了异常处理。该 API 定义了 12 种不同的异常，全部继承自 `javax.jms.JMSException`。对连接、会话、消费者、消息或生产者的任何方法调用都会抛出\
  \ `JMSException` 或其子类之一。\n\n第 13 章 ■ 发送消息\n\n**387**\n\n需要注意的是，`JMSException` 是一个受检异常。EJB\
  \ 规范概述了两种类型的异常：\n\n*   *应用程序异常*：扩展 `Exception` 的受检异常不会导致容器回滚。\n*   *系统异常*：扩展 `RuntimeException`\
  \ 的非受检异常会导致容器回滚。\n\n抛出 `JMSException` 不会导致容器回滚。如果需要回滚，必须显式调用 `setRollBackOnly()`\
  \ 或重新抛出系统异常（例如 `EJBException`）：\n\npublic void onMessage(Message message) {\n\n\
  TextMessage msg = (TextMessage)message;\n\ntry {\n\nSystem.out.println(\"Message\
  \ received: \" + msg.getText());\n\nsendPrintingMessage();\n\n} catch (JMSException\
  \ e) {\n\n**context.setRollBackOnly();**\n\n}\n\n}\n\n**整合所有内容**\n\n\n\n消息传递最重要的概念包括点对点（P2P）和发布-订阅（pub-sub）模型、受管对象（连接工厂和目的地）、如何连接提供者并生产或消费消息、JMS\
  \ 使用的一些可靠性机制，以及如何使用容器管理组件（MDB）监听目的地。现在，让我们通过一个示例来看看这些概念如何协同工作，使用 Maven 编译并打包，然后部署到\
  \ GlassFish 中。\n\n该示例使用一个独立类（OrderSender）向队列（名为 jms/javaee6/Queue）发送消息。这些消息是代表客户订购书籍和\
  \ CD 订单的对象。该对象（OrderDTO）具有多个属性，包括订单总金额。在队列的另一端，一个 MDB（OrderMDB）仅消费总金额大于 1000 美元的订单。该金额作为参数传递给\
  \ OrderSender 类。\n\n由于 Maven 需要根据最终的打包构件来组织代码，OrderSender 将部署在一个 jar 文件中，OrderMDB\
  \ 部署在另一个 jar 文件中，而 OrderDTO 类将同时被这两个 jar 文件共用。\n\n**编写 OrderDTO**\n\n将在 JMS 消息中发送的对象是一个需要实现\
  \ Serializable 接口的 POJO。OrderDTO 类（如清单 13-13 所示）提供了订单的一些信息，包括其总金额；该对象将被设置到 JMS ObjectMessage\
  \ 中，并从 OrderSender 发送到 OrderMDB。\n\n**388**\n\n第 13 章 ■ 发送消息\n\n**清单 13-13.** *OrderDTO\
  \ 在 JMS ObjectMessage 中传递*\n\npublic class OrderDTO implements Serializable {\n\n\
  private Long orderId;\n\nprivate Date creationDate;\n\nprivate String customerName;\n\
  \nprivate Float **totalAmount**;\n\n// 构造方法、getter、setter\n\n}\n\n**编写 OrderSender**\n\
  \nOrderSender（如清单 13-14 所示）是一个独立客户端，它使用 JMS API 向 jms/javaee6/Queue 队列发送 ObjectMessage。它通过注入获取必要的连接工厂和目的地，并在\
