    named query (in JPQL or in native SQL)


    Query createNativeQuery(String sqlString)


    Creates an instance of Query for executing a


    native SQL statement


    Query createNativeQuery(String sqlString,


    Creates an instance of Query for executing a


    Class resultClass)


    native SQL statement passing the class of the


    expected results


