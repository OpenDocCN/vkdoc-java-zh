    because clients couldn’t use the Thread API directly. Compared with other proprietary
    tools or frameworks (the Unix cron utility, Quartz, etc.), the timer service was
    less feature-rich. The EJB specification had to wait until the 3.1 version to
    see a drastic improvement of the timer service. It took inspiration from Unix
    cron and other successful tools, and today competes with the other products as
    it responds to most scheduling use cases.


    The EJB timer service is a container service that allows EJBs to be registered
    for callback invocation. EJB notifications may be scheduled to occur according
    to a calendar-based schedule, at a specific time, after a specific elapsed duration,
    or at specific recurring intervals. The container keeps a record of all the timers,
    and invokes the appropriate bean instance method when a timer has expired. Figure
    7-7 shows the two steps involving the timer service. First, the EJB needs to create
    a timer (automatically or programmatically) and get registered for callback invocation,
    and then the timer service triggers the registered method on the EJB instance.


    **Figure 7-7.** *Interaction between the timer service and the session bean*


    Timers are intended for long-lived business processes and are by default persistent.
    This means they survive server shutdowns, and once the server starts again, the
    timers are executed as if no shutdown had happened. Optionally, you can specify
    timers to be nonpersistent.


    ■**Note** Stateless beans, singletons, and MDBs can be registered by the timer
    service, but stateful beans can’t and shouldn’t use the scheduling API.'
