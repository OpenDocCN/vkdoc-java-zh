- fmt: '# Java EE 6 at a Glance


    ## HTTP


    `HTTP` is the Web protocol and is ubiquitous in modern applications. The client-side
    API is defined by the `java.net` package in Java SE. The HTTP server-side API
    is defined by servlets, JSPs, and JSF interfaces, as well as SOAP and RESTful
    web services. `HTTPS` is a combination of `HTTP` and the Secure Sockets Layer
    (`SSL`) protocol.


    ## RMI-IIOP


    Remote Method Invocation (`RMI`) allows you to invoke remote objects independently
    of the underlying protocol. The Java SE native RMI protocol is Java Remote Method
    Protocol (`JRMP`). `RMI-IIOP` is an extension of `RMI` used to integrate with
    `CORBA`. Java interface description language (`IDL`) allows Java EE application
    components to invoke external `CORBA` objects using the `IIOP` protocol. `CORBA`
    objects can be written in many languages (Ada, C, C++, Cobol, etc.) as well as
    Java.


    ## Packaging


    To be deployed in a container, components have first to be packaged in a standard
    formatted archive. Java SE defines Java Archive (`jar`) files, which are used
    to aggregate many files (Java classes, deployment descriptors, resources, or external
    libraries) into one compressed file (based on the ZIP format). Java EE defines
    different types of modules that have their own packaging format based on this
    common `jar` format.


    An application client module contains Java classes and other resource files packaged
    in a `jar` file. This `jar` file can be executed in a Java SE environment or in
    an application client container. Like any other archive format, the `jar` file
    contains an optional `META-INF` directory for meta information describing the
    archive. The `META-INF/MANIFEST.MF` file is used to define extension- and package-related
    data. If deployed in an `ACC`, the deployment descriptor can optionally be located
    at `META-INF/application-client.xml`.


    An EJB module contains one or more session and/or message-driven beans (`MDBs`)
    packaged in a `jar` file (often called an EJB `jar` file). It contains an optional
    `META-INF/ejb-jar.xml` deployment descriptor and can be deployed only in an EJB
    container.


    A web application module contains servlets, JSPs, JSF pages, and web services,
    as well as any other web-related files (HTML and XHTML pages, Cascading Style
    Sheets (`CSS`), JavaScripts, images, videos, and so on). Since Java EE 6, a web
    application module can also contain EJB Lite beans (a subset of the EJB API described
    in Chapter 6). All these artifacts are packaged in a `jar` file with a `.war`
    extension (commonly referred to as a war file, or a Web Archive). The optional
    web deployment descriptor is defined in the `WEB-INF/web.xml` file. If the war
    contains EJB Lite beans, an optional deployment descriptor can be set at `WEB-INF/ejb-jar.xml`.
    Java `.class` files are placed under the `WEB-INF/classes` directory and dependent
    `jar` files in the `WEB-INF/lib` directory.


    An enterprise module can contain zero or more web application modules, zero or
    more EJB modules, and other common or external libraries. All this is packaged
    into an enterprise archive (a `jar` file with an `.ear` extension) so that the
    deployment of these various modules happens simultaneously and coherently. The
    optional enterprise module deployment descriptor is defined in the `META-INF/application.xml`
    file. The special `lib` directory is used to share common libraries between the
    modules.


    ## Java Standard Edition


    It’s important to stress that Java EE is a superset of Java SE (Java Standard
    Edition). This means that all the features of the Java language are available
    in Java EE as well as the APIs.


    Java SE 6 was officially released on December 11, 2006. It was developed under
    JSR 270 and brought many new features as well as continuing the ease of development
    introduced by Java SE 5 (autoboxing, annotations, generics, enumeration, etc.).
    Java SE 6 provides new tools for diagnosing, managing, and monitoring applications.
    It improves the existing JMX API and simplifies execution of scripting languages
    in the Java Virtual Machine (`JVM`). This book does not explicitly cover Java
    SE 6, so you should refer to the extensive Java literature available if you are
    not comfortable with it. A good starting point would be *Beginning Java™ SE 6
    Platform: From Novice to Professional* by Jeff Friesen (Apress, 2007).


    ## Java EE 6 Specifications


    Java EE 6 is an umbrella specification defined by JSR 316 that contains 28 other
    specifications. An application server that aims to be Java EE 6 compliant has
    to implement all these specifications. Tables 1-1 to 1-5 list them all with their
    version and JSR numbers. Some specifications have been pruned, which means that
    they will possibly be removed from Java EE 7.


