    too large. Profiles are designed precisely to address this issue. As shown in
    Figure 1-4, profiles are subsets of the platform or supersets of it, and may overlap
    with the platform


    or with other profiles.


    **Figure 1-4.** *Profiles in the Java EE platform*


    Java EE 6 defines a single profile called the Web Profile. Its aim is to allow
    developers to create web applications with the appropriate set of technologies.
    Web Profile 1.0 is specified in a separate JSR and is the first profile of the
    Java EE 6 platform. Others might be created in the future (you could think of
    a minimal profile or a portal profile). The Web Profile will evolve at its own
    pace, and we might end up with a Web Profile 1.1 or 1.2 before Java EE 7 is released.


    Also, we will see application servers being Web Profile 1.0 compliant as opposed
    to fully Java EE 6 compliant. Table 1-6 lists the specifications that are included
    in the Web Profile.


