    not newBook).


    With JSF, the page flow navigation can be defined externally via faces-config.xml.
    In


    faces-config.xml, navigation is specified in <navigation-rule> elements. A <navigation-rule>
    element identifies the start page, a condition, and the target page to navigate
    to when the condition occurs. The condition is based on a logical name rather
    than the name of the page.


