    book = em.find(Book.class, 1234L);


    System.out.println(book);


    em.close();


    emf.close();


    }


    }


    The Main class in Listing 4-2 uses four different steps to persist a Book and
    retrieve it from the database:


    ****1.** Create an instance of the Book entity. Entities are annotated POJOs,
    managed by the persistence provider. From a Java viewpoint, an instance of a class
    needs to be created through the new keyword as any POJO. It is important to emphasize
    that up to this


    point in the code, the persistence provider is not aware of the Book object.


    ****2.** Obtain an entity manager and a transaction. This is the important part
    of the code, as an entity manager is needed to manipulate entities. First, an
    entity manager factory is created for the chapter04PU persistence unit. This factory
    is then employed to obtain an entity manager (the em variable), used throughout
    the code to get a transaction (tx variable), and persist and retrieve a Book.


    ****3.** Persist the book to the database. The code starts a transaction (tx.begin())
    and uses the EntityManager.persist() method to insert a Book instance. When the
    transaction is


    committed (tx.commit()), the data is flushed into the database.


    ****4.** Retrieve the book by its identifier. Again, the entity manager is used
    to retrieve the book using its identifier (EntityManager.find()).


    Note in this code the absence of SQL queries, JPQL queries, or JDBC calls. Figure
    4-1


    shows the interaction between these components. The Main class interacts with
    the underlying database through the EntityManager interface, which provides a
    set of standard methods that allow you to perform operations on the Book entity.
    Behind the scenes, the EntityManager relies on the persistence provider to interact
    with the databases. When an EntityManager method is invoked, the persistence provider
    generates and executes a SQL statement through the corresponding JDBC driver.


    **Figure 4-1.** *The entity manager interacts with the entity and the underlying
    database*


    **122**


    Chapter 4 ■ MaNaGING perSISteNt OBJeCtS


    Which JDBC driver to use? How to connect to the database? What’s the database


    name? This information is missing from our previous code. When the Main class
    creates an EntityManagerFactory, it passes the name of a persistence unit as a
    parameter; in this case, it’s called chapter04PU. The persistence unit indicates
    to the entity manager the type of database to use and the connection parameters,
    which are defined in the persistence.xml file, shown in Listing 4-3, that has
    to be deployed with the classes.


    **Listing 4-3.** *The persistence.xml File Defining the Persistence Unit*


    <?xml version="1.0" encoding="UTF-8"?>


    [<persistence version="1.0">](http://java.sun.com/xml/ns/persistence)


    <persistence-unit name=" **chapter04PU**" transaction-type="RESOURCE_LOCAL">


    <provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>


    <class>com.apress.javaee6.chapter04. **Book**</class>


    <properties>


    <property name="eclipselink.target-database" value=" **DERBY**"/>


    <property name="eclipselink.jdbc.driver" ➥


    value="org.apache.derby.jdbc.ClientDriver"/>


    <property name="eclipselink.jdbc.url" ➥


    [value="jdbc:derby://localhost:1527/**chapter04DB**"/>](derby://localhost:1527/chapter04DB)


    <property name="eclipselink.jdbc.user" value="APP"/>


    <property name="eclipselink.jdbc.password" value="APP"/>


    </properties>


    </persistence-unit>


    </persistence>


    The chapter04PU persistence unit defines a JDBC connection for the chapter04DB
    Derby


    database. It connects with a user (APP) and a password (APP) at a given URL. The
    <class> tag tells the persistence provider to manage the Book class.


    To make the code work, in addition to a Derby database running on port 1527, both
    a Book and Main class need to be compiled and deployed with this META-INF/persistence.xml
    file.


    By enabling logging, you might see some traces of SQL statements, but your code
    manipu-


    lates objects, in an object-friendly way, with no SQL statement or JDBC direct
    calls using the EntityManager API.


    **Entity Manager**


    The entity manager is a central piece in JPA. It manages the state and life cycle
    of entities as well as querying entities within a persistence context. The entity
    manager is responsible for creating and removing persistent entity instances and
    finding entities by their primary key. It can lock entities for protecting against
    concurrent access by using optimistic or pessimistic locking and can use JPQL
    queries to retrieve entities following certain criteria.


    When an entity manager obtains a reference to an entity, it is said to be *managed*.
    Until that point, the entity is seen as a regular POJO (i.e., detached). The strength
    of JPA is that entities can be used as regular objects by different layers of
    an application and become managed by the entity manager when you need to load
    or insert data into the database. When an entity is managed, you can carry out
    persistence operations, and the entity manager


    Chapter 4 ■ MaNaGING perSISteNt OBJeCtS


    **123**


    will automatically synchronize the state of the entity with the database. When
    the entity is detached (i.e., not managed), it returns to a simple POJO and can
    then be used by other layers (e.g., a JSF presentation layer) without synchronizing
    its state with the database.'
