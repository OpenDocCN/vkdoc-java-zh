    依赖注入


    与你在第 6 章中看到的所有其他 EJB 一样，MDB 可以使用依赖注入来获取对 JDBC 数据源、EJB 或其他对象等资源的引用。*注入*是容器自动为带注解的属性插入对象引用的方式。这些资源必须在容器或环境上下文中可用，因此
