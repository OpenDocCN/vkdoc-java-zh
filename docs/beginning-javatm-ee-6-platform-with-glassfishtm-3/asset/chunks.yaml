- fmt: "# Note\nJersey adds a BadgerFish mapping of JAXB XML to JSON. BadgerFish (http://badgerfish.ning.com/)\
    \ is a convention for translating an XML document into a JSON object so it’s easy\
    \ to manipulate within JavaScript.\n\n## Entity Provider\nWhen entities are received\
    \ in requests or sent in responses, the JAX-RS implementation needs a way to convert\
    \ the representations to a Java type and vice versa. This is the role of entity\
    \ providers that supply mapping services between representations and their associated\
    \ Java types.\n\nAn example is JAXB, which maps an object to an XML representation\
    \ and vice versa. Entity providers come in two flavors: `MessageBodyReader` and\
    \ `MessageBodyWriter`.\n\nTo map a request body to a Java type, a class must implement\
    \ the `javax.ws.rs.ext.MessageBodyReader` interface and be annotated with `@Provider`.\
    \ By default, the implementation is assumed to consume all media types (`*/*`).\
    \ The annotation `@Consumes` might be used to restrict the supported media types.\
    \ The code in Listing 15-7 takes an XML stream (represented by a `javax.xml.bind.Element`\
    \ object) and converts it into a `Customer` object.\n\n### Listing 15-7. A Provider\
    \ Reading an XML Stream and Creating a Customer Entity\n```java\n@Provider\n@Consumes(\"\
    application/xml\")\npublic class CustomerReader implements MessageBodyReader<Element>\
    \ {\n    public boolean isReadable(Class<?> type) {\n        return Element.class.isAssignableFrom(type);\n\
    \    }\n\n    public Element readFrom(Class<Element> customer, MediaType mediaType,\n\
    \                            MultivaluedMap<String, String> headers,\n       \
    \                     InputStream inputStream) throws IOException {\n        Document\
    \ doc = getParser().parse(inputStream);\n        Element node = doc.getDocumentElement();\n\
    \        if (node.getLocalName().equals(\"customer\")) {\n            return el;\n\
    \        } else {\n            throw new IOException(\"Unexpected payload!\");\n\
    \        }\n    }\n}\n```\n\nIn the same way, a Java type could be mapped to a\
    \ response body. A class willing to do that must implement the `javax.ws.rs.ext.MessageBodyWriter`\
    \ interface and be annotated with `@Provider`. The annotation `@Produces` specifies\
    \ the supported media types. Listing 15-8 is a snippet showing how to convert\
    \ a `Customer` entity into a plain text HTTP body.\n\n### Listing 15-8. A Provider\
    \ Producing a Text Representation of a Customer Entity\n```java\n@Provider\n@Produces(\"\
    text/plain\")\npublic class CustomerWriter implements MessageBodyWriter<Customer>\
    \ {\n    public boolean isWriteable(Class<?> type) {\n        return Customer.class.isAssignableFrom(type);\n\
    \    }\n\n    public void writeTo(Customer customer, MediaType mediaType,\n  \
    \                      MultivaluedMap<String, Object> headers,\n             \
    \           OutputStream outputStream) throws IOException {\n        outputStream.write(customer.get(id).getBytes());\n\
    \        // ...\n    }\n}\n```\n\n`MessageBodyReader` and `MessageBodyWriter`\
    \ implementations may throw a `WebApplicationException` if they can’t produce\
    \ any representation. For common cases, the JAX-RS implementation comes with a\
    \ set of default entity providers (see Table 15-1).\n\n### Table 15-1. Default\
    \ Providers of the JAX-RS Implementation\n\n| Type | Description |\n|------|-------------|\n\
    | `byte[]` | All media types (`*/*`). |\n| `java.lang.String` | All media types\
    \ (`*/*`). |\n| `java.io.InputStream` | All media types (`*/*`). |\n| `java.io.Reader`\
    \ | All media types (`*/*`). |\n| `java.io.File` | All media types (`*/*`). |\n\
    | `javax.activation.DataSource` | All media types (`*/*`). |\n| `javax.xml.transform.Source`\
    \ | XML types (`text/xml`, `application/xml`, and `application/*+xml`). |\n| `javax.xml.bind.JAXBElement`\
    \ | JAXB class XML media types (`text/xml`, `application/xml`, and `application/*+xml`).\
    \ |\n| `MultivaluedMap<String,String>` | Form content (`application/x-www-form-urlencoded`).\
    \ |\n| `javax.ws.rs.core.StreamingOutput` | All media types (`*/*`), `MessageBodyWriter`\
    \ only. |\n\n## Methods or the Uniform Interface\nYou’ve seen how the HTTP protocol\
    \ works with its requests, responses, and action methods (GET, POST, PUT, etc.).\
    \ JAX-RS defines these common HTTP methods using annotations: `@GET`, `@POST`,\
    \ `@PUT`, `@DELETE`, `@HEAD`, and `@OPTIONS`. Only public methods may be exposed\
    \ as resource methods. Listing 15-9 shows a customer resource exposing CRUD methods."
