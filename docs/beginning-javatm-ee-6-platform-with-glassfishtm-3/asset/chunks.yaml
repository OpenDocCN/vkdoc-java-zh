    **缓存 API**


    大多数规范（不仅仅是 Java EE）都高度关注功能性需求，而将性能、可伸缩性或集群等非功能性需求留作实现细节。实现必须严格遵守规范，但也可以添加特定功能。对于
    JPA 来说，缓存就是一个完美的例子。


    在 JPA 2.0 之前，规范中并未提及缓存。实体管理器是一级缓存，用于以全面的方式处理数据库中的数据，并缓存短生命周期的实体。一级缓存基于每个事务使用，以减少给定事务内的
    SQL 查询数量。例如，如果一个对象在同一事务中被多次修改，实体管理器将在事务结束时只生成一条 UPDATE 语句。一级缓存不是性能缓存。


    尽管如此，所有 JPA 实现都使用性能缓存（也称为二级缓存）来优化数据库访问、查询、连接等。二级缓存减少了数据库流量，因为它们将对象加载到内存中，并可供整个应用程序使用。每个实现都有自己缓存对象的方式，要么开发自己的机制，要么重用开源机制。缓存可以跨集群分布，也可以不分布——当规范忽略某个主题时，一切皆有可能。


    JPA 2.0 承认需要二级缓存，并在标准 API 中添加了缓存操作。该 API 如清单 4-22 所示，非常精简（因为 JPA 的目标不是标准化一个功能完备的缓存），但它允许代码以标准方式查询二级缓存并从其中移除某些实体。与
    EntityManager 类似，`javax.persistence.Cache` 是一个由持久化提供者缓存系统实现的接口。


    **清单 4-22.** *缓存 API*


    public interface Cache {


    // 缓存是否包含给定实体的数据。


    public boolean contains(Class cls, Object primaryKey);


    // 从缓存中移除给定实体的数据。


    public void evict(Class cls, Object primaryKey);


    // 从缓存中移除指定类实体的数据。


    public void evict(Class cls);


    // 清空缓存。


    public void evictAll();


    }


