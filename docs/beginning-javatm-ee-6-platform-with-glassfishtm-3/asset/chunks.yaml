    本章首先对 REST 进行了总体介绍。通过简单的动词（GET、POST、PUT 等）和统一的接口，你学会了如何访问部署在 Web 上的任何资源。随后，本章聚焦于
    HTTP，这是一种基于请求/响应机制的协议，它使用内容协商从请求中选择合适的内容类型。


