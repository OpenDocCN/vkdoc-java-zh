  trans: "\nOrderLine 实体的代码（如前文清单 3-45 所示）保持不变。\n\n请注意，在清单 3-49 中，`@OneToMany` 注解覆盖了默认的抓取模式（将其从\
    \ LAZY 改为 EAGER）。通过使用 `@JoinColumn`，这种单向关联随后便采用了外键策略进行映射。该注解将外键重命名为 `ORDER_FK`，并存在于目标表（ORDER_LINE）中。最终得到的数据库结构如图\
    \ 3-18 所示。这里没有连接表，两个表之间的引用通过外键 `ORDER_FK` 实现。\n\n**图 3-18.** *Order 与 OrderLine\
    \ 之间的连接列*\n\n**@ManytoMany 双向关联**\n\n当一个源对象引用多个目标对象，并且一个目标对象也引用多个源对象时，就构成了多对多双向关系。例如，一张\
    \ CD 专辑由多位艺术家创作，而一位艺术家又出现在多张专辑中。在 Java 世界中，每个实体都会包含一个目标实体的集合。在关系型数据库世界中，映射多对多关系的唯一方法是使用连接表（连接列无法实现），并且正如你之前所见，在双向关系中，你需要显式地定义拥有方（使用\
    \ `mappedBy` 元素）。\n\n假设 Artist 实体是关系的拥有方，这意味着 CD 是反向拥有方（见清单 3-50），并且需要在其 `@ManyToMany`\
    \ 注解上使用 `mappedBy` 元素。`mappedBy` 告知持久化提供者，`appearsOnCDs` 是拥有方实体中对应属性的名称。\n\n**100**\n\
    \n第 3 章 ■ 对象关系映射\n\n**清单 3-50.** *一张 CD 由多位艺术家创作*\n\n```java\n@Entity\npublic\
    \ class CD {\n    @Id @GeneratedValue\n    private Long id;\n    private String\
    \ title;\n    private Float price;\n    private String description;\n    @ManyToMany(mappedBy\
    \ = \"appearsOnCDs\")\n    private List<Artist> createdByArtists;\n    // 构造方法、getter、setter\n\
    }\n```\n\n因此，如果 Artist 是关系的拥有方，如清单 3-51 所示，那么它就需要通过 `@JoinTable` 和 `@JoinColumn`\
    \ 注解来自定义连接表的映射。\n\n**清单 3-51.** *一位艺术家出现在多张 CD 专辑上*\n\n```java\n@Entity\npublic\
    \ class Artist {\n    @Id @GeneratedValue\n    private Long id;\n    private String\
    \ firstName;\n    private String lastName;\n    @ManyToMany\n    @JoinTable(name\
    \ = \"jnd_art_cd\",\n               joinColumns = @JoinColumn(name = \"artist_fk\"\
    ),\n               inverseJoinColumns = @JoinColumn(name = \"cd_fk\"))\n    private\
    \ List<CD> appearsOnCDs;\n    // 构造方法、getter、setter\n}\n```\n\nArtist 和 CD 之间的连接表被重命名为\
    \ `JND_ART_CD`，每个连接列也都被重命名了。\n\n`joinColumns` 元素指向拥有方（Artist），而 `inverseJoinColumns`\
    \ 指向反向拥有方（CD）。数据库结构如图 3-19 所示。\n\n![Image 46](img/index-131_1.jpg)\n\n![Image\
    \ 47](img/index-131_2.jpg)\n\n![Image 48](img/index-131_3.jpg)\n\n第 3 章 ■ 对象关系映射\n\
    \n**101**\n\n**图 3-19.** *Artist、CD 以及连接表*\n\n请注意，在多对多和一对一的双向关系中，任何一方都可以被指定为拥有方。无论哪一方被指定为拥有者，另一方都应包含\
    \ `mappedBy` 元素。如果没有，持久化提供者会认为双方都是拥有者，并将其视为两个独立的一对多单向关系。这可能会导致产生四个表：ARTIST 和 CD，再加上两个连接表，ARTIST_CD\
    \ 和 CD_ARTIST。同时，在双方都使用 `mappedBy` 也是不合法的。\n\n**抓取关系**\n\n你之前看到的所有注解（`@OneToOne`、`@OneToMany`、`@ManyToOne`\
    \ 和 `@ManyToMany`）都定义了一个抓取属性，用于指定关联对象是立即加载（急切抓取）还是延迟加载（懒加载），这会对性能产生影响。根据你的应用程序，某些关系被访问的频率会高于其他关系。在这些情况下，你可以通过选择在实体首次读取时（急切地）或访问时（懒加载地）从数据库加载数据来优化性能。作为示例，让我们看一些极端情况。\n"
- fmt: "# 实体关系中的抓取策略与排序\n\n想象四个实体，它们之间通过不同的基数（一对一、一对多）相互关联。在第一种情况（见图3-20）中，它们都具有`EAGER`关系。这意味着一旦你加载`Class1`（通过ID查找或查询），所有依赖对象都会自动加载到内存中。这可能会对系统性能产生影响。\n\
    \n**图3-20.** *具有`EAGER`关系的四个实体*\n\n再看相反的场景，所有关系都使用`LAZY`抓取模式（见图3-21）。当你加载`Class1`时，其他任何内容都不会被加载（当然，除了`Class1`的直接属性）。你需要显式访问`Class2`（例如，通过`getter`方法）来告知持久化提供者从数据库加载数据，以此类推。如果你想操作整个对象图，你需要显式调用每个实体：\n\
    \n`class1.getClass2().getClass3().getClass4()`\n\n**图3-21.** *具有`LAZY`关系的四个实体*\n\
    \n但不要认为`EAGER`是邪恶的而`LAZY`是好的。`EAGER`会通过少量的数据库访问将所有数据加载到内存中（持久化提供者可能会使用`JOIN`查询来连接表并提取数据）。使用`LAZY`，你不会有填满内存的风险，因为你可以控制加载哪个对象。但你需要每次都访问数据库。\n\
    \n`fetch`参数非常重要，因为如果使用不当，它可能会导致性能问题。每个注解都有一个默认的`fetch`值，你需要了解它，并在不适当的情况下进行更改（见表3-2）。\n\
    \n**表3-2.** *默认抓取策略*\n\n| 注解 | 默认抓取策略 |\n| --- | --- |\n| `@OneToOne` | `EAGER`\
    \ |\n| `@ManyToOne` | `EAGER` |\n| `@OneToMany` | `LAZY` |\n| `@ManyToMany` |\
    \ `LAZY` |\n\n当你在应用程序中加载一个采购订单时，你总是需要访问其订单行。因此，将`@OneToMany`注解的默认抓取模式更改为`EAGER`可能是高效的（见清单3-52）。\n\
    \n**清单3-52.** *一个与`OrderLine`具有`EAGER`关系的`Order`*\n\n```java\n@Entity\npublic\
    \ class Order {\n    @Id @GeneratedValue\n    private Long id;\n\n    @Temporal(TemporalType.TIMESTAMP)\n\
    \    private Date creationDate;\n\n    @OneToMany(fetch = FetchType.EAGER)\n \
    \   private List<OrderLine> orderLines;\n\n    // Constructors, getters, setters\n\
    }\n```\n\n## 关系排序\n\n对于一对多或多对多关系，你的实体处理的是对象集合。在Java端，这些集合通常是无序的。关系数据库也不会在其表中保留任何顺序。因此，如果你想要一个有序列表，有必要以编程方式对集合进行排序，或者使用带有`Order\
    \ By`子句的JPQL查询。JPA提供了更简单的机制，基于注解来帮助排序关系。\n\n### `@OrderBy`\n\n动态排序可以通过`@OrderBy`注解完成。“动态”意味着集合元素的排序是在关联被检索时进行的。\n\
    \nCD-BookStore应用程序的例子允许用户撰写关于音乐和书籍的新闻。这些新闻是显示在网站上的文本。一旦新闻发布，人们可以添加评论（见清单3-53）。在网站上，你希望按时间顺序显示评论，因此排序就派上了用场。\n\
    \n**清单3-53.** *一个带有发布日期属性的`Comment`实体*\n\n```java\n@Entity\npublic class Comment\
    \ {\n    @Id @GeneratedValue\n    private Long id;\n\n    private String nickname;\n\
    \    private String content;\n    private Integer note;\n\n    @Column(name =\
    \ \"posted_date\")\n    @Temporal(TemporalType.TIMESTAMP)\n    private Date postedDate;\n\
    \n    // Constructors, getters, setters\n}\n```\n\n评论使用`Comment`实体建模，如清单3-53所示。它包含内容，由匿名用户（通过昵称标识）发布，该用户对新闻留下评分，并且有一个由系统自动创建的`TIMESTAMP`类型的发布日期。\n\
    \n在`News`实体中，如清单3-54所示，你希望能够按发布日期降序排列评论列表。为了实现这一点，你将`@OrderBy`注解与`@OneToMany`注解结合使用。\n\
    \n**清单3-54.** *`News`实体的评论按发布日期降序排列*\n\n```java\n@Entity\npublic class News {\n\
    \    @Id @GeneratedValue\n    private Long id;\n\n    @Column(nullable = false)\n\
    \    private String content;\n\n    @OneToMany(fetch = FetchType.EAGER)\n    @OrderBy(\"\
    postedDate desc\")\n    private List<Comment> comments;\n\n    // Constructors,\
    \ getters, setters\n}\n```\n\n`@OrderBy`注解接受排序所依据的属性名称（`postedDate`属性）以及排序方式（升序或降序）作为参数。可以使用字符串`ASC`或`DESC`分别进行升序或降序排序。你可以在`@OrderBy`注解中使用多个列。如果你需要按发布日期和评分排序，可以使用`@OrderBy(\"\
    postedDate desc, note asc\")`。\n\n`@OrderBy`注解对数据库映射没有任何影响。持久化提供者只是被告知在检索集合时使用`order\
    \ by`子句。\n\n### `@OrderColumn`\n\nJPA 1.0 支持使用`@OrderBy`注解进行动态排序，但不包括维护持久化排序的支持。JPA\
    \ 2.0 通过添加一个新注解`@OrderColumn`（见清单3-55）解决了这个问题。该注解告知持久化提供者需要使用一个单独的列来存储索引，以维护有序列表。`@OrderColumn`定义了此单独的列。\n\
    \n**清单3-55.** *`@OrderColumn` API 与`@Column`类似*\n\n```java\n@Target({METHOD, FIELD})\
    \ @Retention(RUNTIME)\npublic @interface OrderColumn {\n    String name() default\
    \ \"\";\n    boolean nullable() default true;\n    boolean insertable() default\
    \ true;\n    boolean updatable() default true;\n    String columnDefinition()\
    \ default \"\";\n    boolean contiguous() default true;\n    int base() default\
    \ 0;\n    String table() default \"\";\n}\n```\n\n让我们使用新闻和评论的例子并稍作修改。这次，`Comment`实体（如清单3-56所示）没有`postedDate`属性，因此无法按时间顺序对新闻进行排序。\n\
    \n**清单3-56.** *一个没有发布日期的`Comment`实体*\n\n```java\n@Entity\npublic class Comment\
    \ {\n    @Id @GeneratedValue\n    private Long id;\n\n    private String nickname;\n\
    \    private String content;\n    private Integer note;\n\n    // Constructors,\
    \ getters, setters\n}\n```\n\n`News`实体（如清单3-57所示）*可以*做的是用`@OrderColumn`注解该关系。持久化提供者随后会将`News`实体映射到一个带有额外列来存储排序顺序的表中。\n\
    \n**清单3-57.** *评论的排序被持久化*\n\n```java\n@Entity\npublic class News {\n    @Id @GeneratedValue\n\
    \    private Long id;\n\n    @Column(nullable = false)\n    private String content;\n\
    \n    @OneToMany(fetch = FetchType.EAGER)\n    @OrderColumn(\"posted_index\")\n\
    \    private List<Comment> comments;\n\n    // Constructors, getters, setters\n\
    }\n```\n\n在清单3-57中，`@OrderColumn`将额外的列重命名为`POSTED_INDEX`。如果名称未被覆盖，默认情况下列名是引用实体名称与`_ORDER`字符串的拼接（在我们的例子中是`COMMENT_ORDER`）。此列的类型必须是数值类型。\n\
    \n需要注意性能影响；与`@OrderColumn`注解一样，持久化提供者还必须跟踪索引的更改。它负责在插入、删除或重新排序时维护顺序。如果数据被插入到现有已排序信息列表的中间，持久化提供者将不得不重新排序整个索引。"
  raw: 'Imagine four entities all linked to each other with different cardinalities
    (one-to-one, one-to-many). In the first case (see Figure 3-20), they all have
    eager relationships. This means that as soon as you load Class1 (by a find by
    ID or a query), all the dependent objects are automatically loaded in memory.
    This can have an impact on the performance of your system.


    **Figure 3-20.** *Four entities with eager relationships*


    Looking at the opposite scenario, all the relationships use a lazy fetch mode
    (see Figure 3-21). When you load Class1, nothing else is loaded (except the direct
    attributes of Class1, of course). You need to explicitly access Class2 (by using
    the getter method, for example) to tell the persistence provider to load the data
    from the database, and so on. If you want to manipulate the entire object graph,
    you need to explicitly call each entity:


    class1.getClass2().getClass3().getClass4()


    **Figure 3-21.** *Four entities with lazy relationships*


    **102**


    Chapter 3 ■ OBJeCt-reLatIONaL MappING


    But don’t think that EAGER is evil and LAZY is good. EAGER will bring all the
    data into memory using a small amount of database access (the persistence provider
    will probably use join queries to join the tables together and extract the data).
    With LAZY, you don’t take the risk of filling up your memory because you control
    which object is loaded. But you have to access the database every time.


    The fetch parameter is very important because, if it is misused, it can cause
    performance problems. Each annotation has a default fetch value that you have
    to be aware of and, if not appropriate, change (see Table 3-2).


    **Table 3-2.** *Default Fetching Strategies*


    **Annotation**


    **Default Fetching Strategy**


    @OneToOne


    EAGER


    @ManyToOne


    EAGER


    @OneToMany


    LAZY


    @ManyToMany


    LAZY


    When you load a purchase order in your application, you always need to access
    its order lines. Therefore, it may be efficient to change the default fetch mode
    of the @OneToMany annotation to EAGER (see Listing 3-52).


    **Listing 3-52.** *An Order with an Eager Relationship to OrderLine*


    @Entity


    public class Order {


    @Id @GeneratedValue


    private Long id;


    @Temporal(TemporalType.TIMESTAMP)


    private Date creationDate;


    **@OneToMany(fetch = FetchType.EAGER)**


    private List<OrderLine> orderLines;


    // Constructors, getters, setters


    }


    **Ordering Relationships**


    With one-to-many or many-to-many relationships, your entities deal with collections
    of


    objects. On the Java side, these collections are usually unordered. Neither do
    relational databases preserve any order in their tables. Therefore, if you want
    an ordered list it is necessary to either sort your collection programmatically
    or use a JPQL query with an Order By clause. JPA has easier mechanisms, based
    on annotations that can help in ordering relationships.


    Chapter 3 ■ OBJeCt-reLatIONaL MappING


    **103**


    @OrderBy


    Dynamic ordering can be done with the @OrderBy annotation. “Dynamically” means
    that the ordering of the elements of a collection is made when the association
    is retrieved.


    The example of the CD-BookStore application allows a user to write news about
    music


    and books. This news is text that is displayed on the web site. Once the news
    is published, people are allowed to add comments (see Listing 3-53). On the web
    site you want to display the comments chronologically, so ordering comes into
    account.


    **Listing 3-53.** *A Comment Entity with a Posted Date*


    @Entity


    public class Comment {


    @Id @GeneratedValue


    private Long id;


    private String nickname;


    private String content;


    private Integer note;


    @Column(name = "posted_date")


    @Temporal(TemporalType.TIMESTAMP)


    private Date **postedDate**;


    // Constructors, getters, setters


    }


    The comments are modelled using the Comment entity, shown in Listing 3-53\. It
    has con-


    tent, is posted by an anonymous user (identified by a nickname) who leaves a note
    on the news, and has a posted date of type TIMESTAMP that is automatically created
    by the system.


    In the News entity, shown in Listing 3-54, you want to be able to arrange the
    list of comments ordered by posted date in descending order. To achieve this,
    you use the @OrderBy annotation in conjunction with the @OneToMany annotation.


    **Listing 3-54.** *The Comments of a News Entity Are Ordered by Descending Posted
    Date*


    @Entity


    public class News {


    @Id @GeneratedValue


    private Long id;


    @Column(nullable = false)


    private String content;


    @OneToMany(fetch = FetchType.EAGER)


    **@OrderBy("postedDate desc")**


    private List<Comment> comments;


    // Constructors, getters, setters


    }


    **104**


    Chapter 3 ■ OBJeCt-reLatIONaL MappING


    The @OrderBy annotation takes as parameters the names of the attributes on which


    the sorting has to be made (the postedDate attribute), as well as the method (ascending
    or descending). The string ASC or DESC can be used for sorting in either an ascending
    or descending manner, respectively. You can have several columns used in the @OrderBy
    annotation. If you need to order by posted date and note, you can use OrderBy("postedDate
    desc, note asc").


    The @OrderBy annotation doesn’t have any impact on the database mapping. The persist-


    ence provider is simply informed to use an order by clause when the collection
    is retrieved.


    @OrderColumn


    JPA 1.0 supported dynamic ordering using the @OrderBy annotation but did not include
    support for maintaining a persistent ordering. JPA 2.0 addresses this by adding
    a new annotation:


    @OrderColumn (see Listing 3-55). This annotation informs the persistence provider
    that it is required to maintain the ordered list using a separate column where
    the index is stored. The


    @OrderColumn defines this separate column.


    **Listing 3-55.** *The @OrderColumn API Is Similar to @Column*


    @Target({METHOD, FIELD}) @Retention(RUNTIME)


    public @interface **OrderColumn** {


    String name() default "";


    boolean nullable() default true;


    boolean insertable() default true;


    boolean updatable() default true;


    String columnDefinition() default "";


    boolean contiguous() default true;


    int base() default 0;


    String table() default "";


    }


    Let’s use the news and comments example and change it slightly. This time the
    Comment


    entity, shown in Listing 3-56, has no postedDate attribute, and therefore there
    is no way to chronologically sort the news.


    **Listing 3-56.** *A Comment Entity with No Posted Date*


    @Entity


    public class Comment {


    @Id @GeneratedValue


    private Long id;


    private String nickname;


    private String content;


    private Integer note;


    // Constructors, getters, setters


    }


    Chapter 3 ■ OBJeCt-reLatIONaL MappING


    **105**


    What the News entity, shown in Listing 3-57, *can* do is annotate the relationship
    with


    @OrderColumn. The persistence provider will then map the News entity to a table
    with an additional column to store the ordering.


    **Listing 3-57.** *The Ordering of Comments Is Persisted*


    @Entity


    public class News {


    @Id @GeneratedValue


    private Long id;


    @Column(nullable = false)


    private String content;


    @OneToMany(fetch = FetchType.EAGER)


    **@OrderColumn("posted_index")**


    private List<Comment> comments;


    // Constructors, getters, setters


    }


    In Listing 3-57, the @OrderColumn renames the additional column to POSTED_INDEX.
    If the name is not overridden, by default the column name is the concatenation
    of the referencing entity and the _ORDER string (COMMENT_ORDER in our example).
    The type of this column must be a numerical type.


    There are performance impacts to be aware of; as with the @OrderColumn annotation,
    the


    persistence provider must also track changes to the index. It is responsible for
    maintaining the order upon insertion, deletion, or reordering. If data is inserted
    in the middle of an existing, sorted list of information, the persistence provider
    will have to reorder the entire index.'
