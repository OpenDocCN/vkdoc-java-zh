    这就是 Java 持久化查询语言（JPQL）发挥作用的地方。


    JPQL 是 JPA 中定义的一种语言，用于查询存储在关系数据库中的实体。JPQL 的语法类似于 SQL，但它是针对实体对象进行操作，而不是直接操作数据库表。JPQL
    不关心底层数据库结构，也不处理表或列，而是处理对象和属性。为此，它使用了 Java 开发者熟悉的点（.）表示法。


    在本章中，你将学习如何管理持久化对象。这意味着你将学习如何使用实体管理器执行创建、读取、更新和删除（CRUD）操作，以及使用 JPQL 执行复杂查询。在本章末尾，你将看到
    JPA 如何处理并发。


    **如何查询一个实体**


    让我们以第一个示例开始：一个简单的查询——通过标识符查找一本书。在清单 4-1 中，你可以看到一个 Book 实体，它使用 `@Id` 注解来告知持久化提供者，`id`
    属性必须映射为主键。


    **119**


    **120**


    第 4 章 ■ 管理持久化对象


    **清单 4-1.** *一个简单的 Book 实体*


    **@Entity**


    public class Book {


    **@Id**


    private Long id;


    private String title;


    private Float price;


    private String description;


    private String isbn;


    private Integer nbOfPage;


    private Boolean illustrations;


    // 构造方法、getter、setter


    }


    Book 实体保存了映射信息。在这个示例中，使用了大部分默认设置，数据将存储在一个名称与实体名称（BOOK）相同的表中，并且每个属性都会有对应的列映射。你可以使用一个单独的
    Main 类（见清单 4-2），该类使用 `javax.persistence.EntityManager` 接口将一个 Book 实例存储到表中。


    **清单 4-2.** *一个持久化和检索 Book 实体的 Main 类*


    public class Main {


    public static void main(String[] args) {


    **// 1-创建 Book 实体的一个实例**


    Book book = new Book();


    book.setId(1234L);


    book.setTitle("The Hitchhiker''s Guide to the Galaxy");


    book.setPrice(12.5F);


    book.setDescription("Science fiction created by Douglas Adams.");


    book.setIsbn("1-84023-742-2");


    book.setNbOfPage(354);


    book.setIllustrations(false);


    **// 2-获取一个实体管理器和一个事务**


    EntityManagerFactory emf = ➥


    Persistence.createEntityManagerFactory("chapter04PU");


    EntityManager em = emf.createEntityManager();


    EntityTransaction tx = em.getTransaction();


    **// 3-将书持久化到数据库**


    tx.begin();


    em.persist(book);


    tx.commit();


    ![Image 56](img/index-151_1.jpg)


    第 4 章 ■ 管理持久化对象


    **121**


    **// 4-通过标识符检索书**


    book = em.find(Book.class, 1234L);


    System.out.println(book);


    em.close();


    emf.close();


    }


    }


    清单 4-2 中的 Main 类使用了四个不同的步骤来持久化一本书并从数据库中检索它：


    ****1.** 创建 Book 实体的一个实例。实体是带有注解的 POJO，由持久化提供者管理。从 Java 的角度来看，类的实例需要像任何 POJO 一样通过
    `new` 关键字创建。需要强调的是，在代码执行到这一步之前，持久化提供者并不知道这个 Book 对象。


    ****2.** 获取一个实体管理器和一个事务。这是代码的重要部分，因为操作实体需要一个实体管理器。首先，为 chapter04PU 持久化单元创建一个实体管理器工厂。然后，使用这个工厂获取一个实体管理器（`em`
    变量），在整个代码中用它来获取一个事务（`tx` 变量），并持久化和检索 Book。


    ****3.** 将书持久化到数据库。代码启动一个事务（`tx.begin()`），并使用 `EntityManager.persist()` 方法来插入一个
    Book 实例。当事务被提交（`tx.commit()`）时，数据会被刷新到数据库中。


    ****4.** 通过标识符检索书。再次使用实体管理器，通过其标识符来检索书（`EntityManager.find()`）。


    请注意，这段代码中没有 SQL 查询、JPQL 查询或 JDBC 调用。图 4-1 展示了这些组件之间的交互。Main 类通过 `EntityManager`
    接口与底层数据库交互，该接口提供了一组标准方法，允许你对 Book 实体执行操作。在幕后，`EntityManager` 依赖持久化提供者与数据库交互。当调用
    `EntityManager` 方法时，持久化提供者会生成并通过相应的 JDBC 驱动程序执行一条 SQL 语句。


    **图 4-1.** *实体管理器与实体及底层数据库交互*


    **122**


    第 4 章 ■ 管理持久化对象


    使用哪个 JDBC 驱动程序？如何连接到数据库？数据库名称是什么？这些信息在我们之前的代码中是缺失的。当 Main 类创建 `EntityManagerFactory`
    时，它传递了一个持久化单元的名称作为参数；在这个例子中，它叫做 chapter04PU。持久化单元向实体管理器指示要使用的数据库类型和连接参数，这些参数定义在
    `persistence.xml` 文件中，如清单 4-3 所示，该文件必须与类一起部署。


    **清单 4-3.** *定义持久化单元的 persistence.xml 文件*


    <?xml version="1.0" encoding="UTF-8"?>


    [<persistence version="1.0">](http://java.sun.com/xml/ns/persistence)


    <persistence-unit name=" **chapter04PU**" transaction-type="RESOURCE_LOCAL">


    <provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>


    <class>com.apress.javaee6.chapter04. **Book**</class>


    <properties>


    <property name="eclipselink.target-database" value=" **DERBY**"/>


    <property name="eclipselink.jdbc.driver" ➥


    value="org.apache.derby.jdbc.ClientDriver"/>


    <property name="eclipselink.jdbc.url" ➥


    value="jdbc:derby://localhost:1527/**chapter04DB**"/>


    <property name="eclipselink.jdbc.user" value="APP"/>


    <property name="eclipselink.jdbc.password" value="APP"/>


    </properties>


    </persistence-unit>


    </persistence>


    chapter04PU 持久化单元为 chapter04DB Derby 数据库定义了一个 JDBC 连接。它使用一个用户（APP）和密码（APP）在给定的
    URL 上进行连接。`<class>` 标签告知持久化提供者管理 Book 类。


    为了使代码能够运行，除了需要在端口 1527 上运行一个 Derby 数据库外，还需要将 Book 和 Main 类编译并与这个 `META-INF/persistence.xml`
    文件一起部署。


    通过启用日志记录，你可能会看到一些 SQL 语句的踪迹，但你的代码是以面向对象的方式操作对象，没有使用 SQL 语句或直接的 JDBC 调用，而是使用了 `EntityManager`
    API。


    **实体管理器**


    实体管理器是 JPA 中的核心部分。它管理实体的状态和生命周期，以及在持久化上下文中查询实体。实体管理器负责创建和移除持久化实体实例，并通过主键查找实体。它可以通过使用乐观锁或悲观锁来锁定实体以防止并发访问，并且可以使用
    JPQL 查询来根据特定条件检索实体。


    当一个实体管理器获得对一个实体的引用时，该实体被称为处于*托管*状态。在此之前，该实体被视为一个普通的 POJO（即，处于游离状态）。JPA 的强大之处在于，实体可以被应用程序的不同层用作普通对象，并在你需要将数据加载或插入数据库时，由实体管理器进行托管。当一个实体处于托管状态时，你可以执行持久化操作，实体管理器会自动将实体的状态与数据库同步。当实体处于游离状态（即，非托管状态）时，它会恢复为一个简单的
    POJO，然后可以被其他层（例如，JSF 表示层）使用，而无需将其状态与数据库同步。


    **123**


    第 4 章 ■ 管理持久化对象

