    到目前为止，你已经看到了用于表示网页静态内容和图形方面的不同语言。但通常，网页需要通过显示动态内容来与最终用户交互。正如你将看到的，动态内容可以通过服务器端技术（如
    JSP 或 JSF）来处理，但浏览器也可以通过执行 JavaScript 来实现这一点。


    JavaScript 是一种用于客户端 Web 开发的脚本语言。尽管名称如此，它与 Java 编程语言无关，因为它是一种解释型的、弱类型语言。通过编写与页面
    DOM 交互的函数，JavaScript 是创建动态 Web 应用程序的强大方式。W3C 标准化了 DOM，而欧洲计算机制造商协会（ECMA）则将 JavaScript
    标准化为 ECMAScript 规范。任何使用这些标准（XHTML、CSS 和 JavaScript）编写的页面，在任何遵循这些指南的浏览器中，其外观和行为应该基本一致。


    JavaScript 与 DOM 交互的一个例子是清单 11-4 中的 newBook.xhtml 页面。该页面显示了一个表单，你可以在其中输入关于一本书的信息。在提交到服务器之前，书籍的价格需要在客户端由用户填写。为了进行这样的验证，你可以创建一个
    JavaScript 函数（`priceRequired()`），用于检查价格文本字段是否为空。


    **清单 11-4.** *包含一些 JavaScript 的 newBook.xhtml 页面*


    ```xml

    <?xml version="1.0" encoding="UTF-8"?>

    <!DOCTYPE html

    PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"

    ["http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">](http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd)

    [<html xml:lang="en" lang="en">](http://www.w3.org/1999/xhtml)

    <head>

    <title>创建一本新书</title>

    **<script type="text/javascript">**

    function **priceRequired()** {

    if (document.getElementById(" **price**").value == "") {

    document.getElementById(" **priceError**").innerHTML = ➥

    "请填写价格！";

    }

    }

    </script>

    </head>

    <body>

    <h1>创建一本新书</h1>

    <hr/>

    <table border="0">

    <tr>

    <td>ISBN :</td>

    <td><input type="text"/></td>

    </tr>

    <tr>

    第 11 章 ■ 页面与组件

