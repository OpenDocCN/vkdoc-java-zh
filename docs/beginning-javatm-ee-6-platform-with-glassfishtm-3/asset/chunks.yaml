    如你所知，在 JPA 中，如果某个属性没有注解，则会应用默认的映射规则。因此，默认情况下，外键列被命名为 ADDRESS_ID（参见清单 3-40），它是关系属性名称（此处为
    address）、符号 _ 以及目标表主键列名称（此处为 ADDRESS 表的 ID 列）的拼接结果。另请注意，在 DDL 中，ADDRESS_ID 列默认可为空，这意味着默认情况下，一对一关联映射为零（空值）或一。


    要自定义映射，你可以使用两个注解。第一个是 `@OneToOne`（这是因为关系的基数为 1），它可以修改关联本身的一些属性，例如其获取方式。`@OneToOne`
    注解的 API 在清单 3-42 中定义。


    **清单 3-42.** *@OneToOne 注解 API*


