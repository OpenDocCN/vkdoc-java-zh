    \ and `CD` duplicate the `ID`, `TITLE`, `PRICE`, and `DESCRIPTION` columns of\
    \ the `ITEM` table. Note that the tables are not linked.\n\n**Figure 3-27.** *BOOK\
    \ and CD tables duplicating ITEM columns*\n\nEach table can be redefined by annotating\
    \ each entity with the `@Table` annotation.\n\nThe table-per-class strategy performs\
    \ well when querying instances of one entity, as it is similar to using the single-table\
    \ strategy: the query is confined to a single table. The downside is that it makes\
    \ polymorphic queries across a class hierarchy more expensive than the other strategies\
    \ (e.g., finding all the items, including CDs and books); it must query all subclass\
    \ tables using a `UNION` operation, which is expensive when a large amount of\
    \ data is involved.\n\n**Overriding Attributes**\n\nWith the table-per-class strategy,\
    \ the columns of the root class are duplicated on the leaf tables. They keep the\
    \ same name. But what if a legacy database is being used and the columns have\
    \ a different name? JPA uses the `@AttributeOverride` annotation to override the\
    \ column mapping and `@AttributeOverrides` to override several.\n\nTo rename the\
    \ `ID`, `TITLE`, and `DESCRIPTION` columns in the `BOOK` and `CD` tables, the\
    \ code of the `Item` entity doesn’t change, but the `Book` entity (see Listing\
    \ 3-66) and `CD` entity (see Listing 3-67) have to use the `@AttributeOverride`\
    \ annotation.\n\n**Listing 3-66.** *Book Overrides Some Item Columns*\n\n```java\n\
    @Entity\n@AttributeOverrides({\n    @AttributeOverride(name = \"id\",\n      \
    \  column = @Column(name = \"book_id\")),\n    @AttributeOverride(name = \"title\"\
    ,\n        column = @Column(name = \"book_title\")),\n    @AttributeOverride(name\
    \ = \"description\",\n        column = @Column(name = \"book_description\"))\n\
    })\npublic class Book extends Item {\n    private String isbn;\n    private String\
    \ publisher;\n    private Integer nbOfPage;\n    private Boolean illustrations;\n\
    \    // Constructors, getters, setters\n}\n```\n\n**Listing 3-67.** *CD Overrides\
    \ Some Item Columns*\n\n```java\n@Entity\n@AttributeOverrides({\n    @AttributeOverride(name\
    \ = \"id\",\n        column = @Column(name = \"cd_id\")),\n    @AttributeOverride(name\
    \ = \"title\",\n        column = @Column(name = \"cd_title\")),\n    @AttributeOverride(name\
    \ = \"description\",\n        column = @Column(name = \"cd_description\"))\n})\n\
    public class CD extends Item {\n    private String musicCompany;\n    private\
    \ Integer numberOfCDs;\n    private Float totalDuration;\n    private String gender;\n\
    \    // Constructors, getters, setters\n}\n```\n\nBecause there is more than one\
    \ attribute to override, you need to use `@AttributeOverrides`, which takes an\
    \ array of `@AttributeOverride` annotations. Each annotation then points to an\
    \ attribute of the `Item` entity and redefines the mapping of the column using\
    \ the `@Column` annotation. So `name = \"title\"` refers to the `title` attribute\
    \ of the `Item` entity, and `@Column(name = \"cd_title\")` informs the persistence\
    \ provider that the title has to be mapped to a `CD_TITLE` column. The result\
    \ is shown in Figure 3-28.\n\n**Figure 3-28.** *BOOK and CD tables overriding\
    \ ITEM columns*\n\n> **Note** In the “Embeddables” section earlier in the chapter,\
    \ you saw that an embeddable object could be shared by several entities (`Address`\
    \ was embedded by `Customer` and `Order`). Because embeddable objects are an intrinsic\
    \ part of an owning entity, their columns are also duplicated in each entity’s\
    \ table. The `@AttributeOverrides` could then be used if you need to override\
    \ the embeddable columns.\n\n**Type of Classes in the Inheritance Hierarchy**\n\
    \nThe example used to explain the mapping strategies only uses entities. `Item`\
    \ is an entity as well as `Book` and `CD`. But entities don’t have to inherit\
    \ from entities alone. A hierarchy of classes can mix all sorts of different classes:\
    \ entities and also nonentities (or transient classes), abstract entities, and\
    \ mapped superclasses. Inheriting from these different types of classes will have\
    \ an impact on the mapping.\n\nabstract entity"
