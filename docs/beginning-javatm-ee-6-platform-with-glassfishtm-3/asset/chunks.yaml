    在前面的示例中，`Item` 实体是具体的。它使用了 `@Entity` 注解，并且没有 `abstract` 关键字，但抽象类同样可以被指定为实体。抽象实体与具体实体的唯一区别在于，它不能通过
    `new` 关键字直接实例化。抽象实体为其叶子实体（`Book` 和 `CD`）提供了公共数据结构，并遵循映射策略。对于持久化提供者而言，抽象实体被映射为一个实体。唯一的区别在于
    Java 层面，而非映射层面。


    非实体


    非实体也被称为瞬态类，即它们是 POJO。一个实体可以继承自非实体，也可以被非实体所继承。为什么要在层级结构中引入非实体呢？


    对象建模和继承是共享状态和行为的手段。


    非实体可用于为叶子实体提供公共数据结构。非实体超类的状态不会被持久化，因为它不受持久化提供者的管理（请记住，一个类被持久化提供者管理的条件是存在 `@Entity`
    注解）。


    例如，`Book` 是一个实体，如清单 3-68 所示，它继承自非实体 `Item`（`Item` 没有任何注解）。


    **清单 3-68.** *Item 是一个没有 @Entity 注解的简单 POJO*


