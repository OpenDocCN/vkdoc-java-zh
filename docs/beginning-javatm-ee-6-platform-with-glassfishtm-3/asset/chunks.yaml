  trans: "\n将分号分隔的路径列表中的每个文件解释为 Facelets 标签库。\n\n**FacesContext**\n\nJSF 定义了 `javax.faces.context.FacesContext`\
    \ 抽象类，用于表示与处理传入请求和创建相应响应相关的上下文信息。该类允许与 UI 以及 JSF 环境的其余部分进行交互。\n\n要获取访问权限，您可以在页面中使用隐式的\
    \ `facesContext` 对象（有关隐式对象的讨论，请参阅前一章节），或者使用静态方法 `getCurrentInstance()` 在受管 Bean\
    \ 中获取引用。这将返回当前线程的 `FacesContext` 实例，然后您可以调用表 12-2 中列出的方法。\n\n**表 12-2.** *FacesContext\
    \ 的部分方法*\n\n**方法**\n\n**描述**\n\n`addMessage`\n\n追加一条错误消息。\n\n`getApplication`\n\
    \n返回与此 Web 应用程序关联的 `Application` 实例。\n\n`getAttributes`\n\n返回一个 `Map`，表示与 `FacesContext`\
    \ 实例关联的属性。\n\n**方法**\n\n**描述**\n\n`getCurrentInstance`\n\n返回当前线程正在处理的请求的 `FacesContext`\
    \ 实例。\n\n`getMaximumSeverity`\n\n返回已排队的任何 `FacesMessage` 上记录的最大严重级别。\n\n`getMessages`\n\
    \n返回一个 `FacesMessage` 集合。\n\n`getViewRoot`\n\n返回与请求关联的根组件。\n\n`release`\n\n释放与此\
    \ `FacesContext` 实例关联的所有资源。\n\n`renderResponse`\n\n向 JSF 实现发出信号，一旦请求处理生命周期的当前阶段完成，控制权应传递给*渲染响应*阶段，跳过任何尚未执行的阶段。\n\
    \n`responseComplete`\n\n向 JSF 实现发出信号，表明此请求的 HTTP 响应（例如 HTTP 重定向）已生成，并且一旦当前阶段完成，请求处理生命周期应立即终止。\n\
    \n**Faces Config**\n\n`FacesServlet` 是 JSF 实现的内部组件，虽然您无法访问其代码，但确实需要元数据来配置它。到目前为止，您可能已经习惯了\
    \ Java EE 6 中两种可能的元数据选择：注解和 XML 部署描述符（`/WEB-INF/faces-config.xml`）。在 JSF 2.0 之前，唯一的选择是\
    \ XML；如今，受管 Bean、转换器、事件监听器、渲染器和验证器都可以使用注解，因为使用 XML 配置文件已变为可选。\n\n我主要推荐使用注解，但为了展示\
    \ `faces-config.xml` 文件的内容片段，清单 12-2 中的示例定义了一个区域设置和一个用于国际化的消息包，以及一些导航规则。稍后您将看到如何在使用和不使用\
    \ `faces-config.xml` 的情况下进行导航。\n\n**清单 12-2.** *faces-config.xml 文件片段*\n\n```xml\n\
    <?xml version='1.0' encoding='UTF-8'?>\n<faces-config\n    xmlns=\"http://java.sun.com/xml/ns/javaee\"\
    \n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"\
    http://java.sun.com/xml/ns/javaee\n                        http://java.sun.com/xml/ns/javaee/web-facesconfig_2_0.xsd\"\
    \n    version=\"2.0\">\n    <application>\n        <locale-config>\n         \
