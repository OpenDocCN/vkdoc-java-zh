    和 @OneWay 注解用于 Web 服务，以自定义所公开方法的签名。


    • *SOAP 绑定注解*：这些注解属于 javax.jws.soap 包，允许自定义 SOAP 绑定（@SOAPBinding 和 @SOAPMessageHandler）。


