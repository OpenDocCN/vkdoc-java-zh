    生命周期和回调注解


    MDB 的生命周期（见图 13-11）与无状态会话 Bean 相同：要么 MDB 存在并准备好消费消息，要么不存在。在退出之前，容器首先创建 MDB 的一个实例，并在适用时注入元数据注解（@Resource、@Ejb
    等）或部署描述符指定的必要资源。然后，容器调用 Bean 的 @PostConstruct 回调方法（如果有）。之后，MDB 进入就绪状态，等待消费任何传入消息。当
    MDB 从池中移除或销毁时，会触发 @PreDestroy 回调。


    **图 13-11.** *MDB 生命周期*


