    The P2P model is used if there is only one receiver for each message. Note that
    a queue can have multiple consumers, but once a receiver consumes a message from
    the queue, it is taken out of the queue, and no other consumer can receive it.
    In Figure 13-4, you can see one sender producing three messages. Two receivers
    consume a message that will not be available to the other. JMS also ensures that
    a message is delivered only once.


    **Figure 13-4.** *Multiple receivers*


    Note that P2P doesn’t guarantee messages are delivered in any particular order,
    and if more than one receiver exists for a message, a receiver is chosen randomly.


    ![Image 116](index-394_1.jpg)


    ![Image 117](index-394_2.jpg)


    **364**


    Chapter 13 ■ SENDING Messages


    # Publish-Subscribe


    In the pub-sub model, a single message is sent by a single producer to potentially
    several consumers. The model is built around the concept of topics, publishers,
    and subscribers (Figure 13-5). Consumers are called *subscribers* because they
    first need to subscribe to a topic.


    The provider manages the subscribing/unsubscribing mechanism as it occurs dynamically.


    **Figure 13-5.** *Pub-sub model*


    The topic retains messages until they are distributed to all subscribers. Unlike
    the P2P model, there is a timing dependency between publishers and subscribers;
    subscribers do not receive messages sent prior to their subscription, and if the
    subscriber is inactive for a specified period, it will not receive past messages
    when it becomes active again. Note that this can be avoided, because the JMS API
    supports the concept of a durable subscriber, as you’ll later see.


    Multiple subscribers can consume the same message. The pub-sub model can be used
    for broadcast-type applications, in which a single message is delivered to several
    consumers. In Figure 13-6, the publisher sends three messages that each subscriber
    will receive.


    **Figure 13-6.** *Multiple subscribers*


    # JMS API


    The JMS API is located under the `javax.jms` package and provides classes and
    interfaces for applications that require a messaging system (see Figure 13-7).
    This API enables asynchronous communication between clients by providing a connection
    to the provider, and a session where messages can be created and sent or received.
    These messages can contain text or other different kinds of objects.


    ![Image 118](index-395_1.jpg)


    Chapter 13 ■ SENDING Messages


    **365**


    **Figure 13-7.** *JMS API (derived from Figure 2-1 of the JMS 1.1 specification)*


    ## Administered Objects


    Administered objects are objects that are configured administratively, as opposed
    to programmatically. The message provider allows these objects to be configured,
    and makes them available in the JNDI namespace. Like JDBC datasources, administered
    objects are created only once. The two types of administered objects for JMS are:


    - *Connection factories*: Used by clients to create a connection to a destination.

    - *Destinations*: Message distribution points that receive, hold, and distribute
    messages. Destinations can be queues (P2P) or topics (pub-sub).


    JMS clients access these objects through portable interfaces by looking them up
    in the JNDI namespace. In GlassFish, there are several ways to create these objects:
    by using the administration console, the `asadmin` command line, or the REST interface.


    ## ConnectionFactory


    Connection factories are administered objects that allow an application to connect
    to a provider by creating a `Connection` object programmatically. A connection
    factory encapsulates the configuration parameters that have been defined by an
    administrator. There are three types of connection factories:


    - `javax.jms.ConnectionFactory` is an interface that can be used for both P2P
    and pub-sub communications.

    - `javax.jms.QueueConnectionFactory` is an interface that extends `ConnectionFactory`
    and is used for P2P communication.

    - `javax.jms.TopicConnectionFactory` is an interface that extends `ConnectionFactory`
    and is used for pub-sub communication.


