- fmt: "# Enterprise Java Beans (EJB)\n\n`container` that supports the specification.\
    \ Standard APIs, portable JNDI names, lightweight components, and configuration\
    \ by exception allow easy deployment of EJBs on open source as well as commercial\
    \ implementations. The underlying technology was created more than 10 years ago,\
    \ resulting in EJB applications that benefit from a stable, high-quality code\
    \ base that has been used by many enterprise environments over a long period of\
    \ time.\n\n## Types of EJBs\n\nBecause enterprise applications can be complex,\
    \ the Java EE platform defines several types of EJBs. From Chapter 6 to Chapter\
    \ 9, I will only focus on session beans and the timer service.\n\nSession beans\
    \ are used to encapsulate high-level business logic, which makes them the most\
    \ important part of the EJB technology. A session bean may have the following\
    \ traits:\n\n- **Stateless**: The session bean contains no conversational state\
    \ between methods, and any instance can be used for any client.\n- **Stateful**:\
    \ The session bean contains conversational state, which must be retained across\
    \ methods for a single user.\n- **Singleton**: A single session bean is shared\
    \ between clients and supports concurrent access.\n\nThe EJB timer service is\
    \ the standard Java EE answer to scheduling tasks. Enterprise applications dependent\
    \ on calendar-based notifications use this service to model workflow-type business\
    \ processes.\n\nMessage-driven beans (MDBs) are used for integrating with external\
    \ systems by receiving asynchronous messages using JMS. Even though MDBs are part\
    \ of the EJB specification, I shall deal with them separately (in Chapter 13)\
    \ because this component model is mainly used to integrate systems with message-oriented\
    \ middleware (MOM). MDBs usually delegate the business logic to session beans.\n\
    \nEJBs can also be used as web service endpoints. Chapters 14 and 15 demonstrate\
    \ SOAP and RESTful web services that can be either simple POJOs deployed in a\
    \ web container or session beans deployed in an EJB container.\n\n> **Note**:\
    \ For compatibility reasons, the EJB 3.1 specification still mentions entity beans.\
    \ This persistent component model has been pruned and may disappear in Java EE\
    \ 7. JPA is the preferred technology for mapping and querying relational databases.\
    \ This book does not cover entity beans.\n\n## Anatomy of an EJB\n\nSession beans\
    \ encapsulate business logic, are transactional, rely on a container that does\
    \ pooling, multithreading, security, and so on. What artifacts are needed to create\
    \ such a powerful component? One Java class and one annotation, that’s all. The\
    \ next chapter shows that session beans can be more complex; they can use different\
    \ types of interfaces, annotations, XML configuration, and intercept calls. Listing\
    \ 6-1 shows how simple it is for a container to recognize that a class is a session\
    \ bean and apply all the enterprise services.\n\n**Listing 6-1.** *A Simple Stateless\
    \ EJB*\n\n```java\n@Stateless\npublic class BookEJB {\n\n    @PersistenceContext(unitName\
    \ = \"chapter06PU\")\n    private EntityManager em;\n\n    public Book findBookById(Long\
    \ id) {\n        return em.find(Book.class, id);\n    }\n\n    public Book createBook(Book\
    \ book) {\n        em.persist(book);\n        return book;\n    }\n}\n```\n\n\
    Previous versions of J2EE required developers to create several artifacts in order\
    \ to create a session bean: a local or remote interface (or both), a local home\
    \ or a remote home interface (or both), and a deployment descriptor. Java EE 5\
    \ and EJB 3.0 drastically simplified the model to the point where only one class\
    \ and one or more business interfaces are sufficient. EJB 3.1 goes further as\
    \ it allows an annotated POJO to be a session bean. As the code in Listing 6-1\
    \ shows, the class doesn’t implement any interface, and no XML configuration is\
    \ needed. Only one annotation is used to turn a Java class into a transactional\
    \ and secure component: `@Stateless`. Then, using the entity manager (as seen\
    \ in the previous chapters), the `BookEJB` creates and retrieves books from the\
    \ database in a simple yet powerful manner. The next chapter will demonstrate\
    \ how easy it is to declare a stateful bean or a singleton.\n\nSimplicity also\
    \ is applied to the client side. Invoking a method on this `BookEJB` requires\
    \ only one annotation to obtain a reference using dependency injection. Dependency\
    \ injection allows a container (client, web, or EJB container) to automatically\
    \ inject a reference on an EJB with the help of the `@EJB` annotation. In Listing\
    \ 6-2, the `Main` class acquires a reference to the `BookEJBRemote` by annotating\
    \ the private, static `bookEJB` attribute with `@EJB`. If the EJB is deployed\
    \ in a container, the `Main` class needs to access that EJB remotely. Adding a\
    \ simple remote interface to the EJB will give it remote access capabilities.\n\
    \n**Listing 6-2.** *A Client Class Invoking the Stateless EJB*\n\n```java\npublic\
    \ class Main {\n\n    @EJB\n    private static BookEJBRemote bookEJB;\n\n    public\
    \ static void main(String[] args) {\n        Book book = new Book();\n       \
    \ book.setTitle(\"The Hitchhiker's Guide to the Galaxy\");\n        book.setPrice(12.5F);\n\
    \        book.setDescription(\"Scifi book created by Douglas Adams\");\n     \
    \   book.setIsbn(\"1-84023-742-2\");\n        book.setNbOfPage(354);\n       \
    \ bookEJB.createBook(book);\n    }\n}\n```\n\nOne of the differences between a\
    \ pure Java class and a session bean is shown in Listing 6-2; even if the code\
    \ is similar, the `Main` class doesn’t create an instance of the `BookEJB` using\
    \ the `new` keyword; instead, the class needs to first obtain a reference to the\
    \ EJB, either by injection or by JNDI lookup, before calling a method. This mechanism\
    \ is used because the EJB runs in a managed environment. It needs to be deployed\
    \ in a container (embedded or not).\n\nLike most Java EE 6 components, EJBs need\
    \ metadata to inform the container of required actions (transaction demarcation)\
    \ or services to inject. Metadata can take the form of either annotations or XML.\
    \ EJBs can be deployed with the optional `ejb-jar.xml` deployment descriptor,\
    \ which will override annotations. With configuration by exception, a single annotation\
    \ is enough to turn a POJO into an EJB because the container applies all the default\
    \ behavior.\n\n## EJB Container\n\nAs mentioned, an EJB is a server-side component\
    \ and needs to be executed in a container. This runtime environment provides core\
    \ features common to many enterprise applications such as the following:\n\n-\
    \ **Remote client communication**: Without writing any complex code, an EJB client\
    \ (another EJB, a user interface, a batch process, etc.) can invoke methods remotely\
    \ via standard protocols.\n- **Dependency injection**: The container can inject\
    \ several resources into an EJB (JMS destinations and factories, datasources,\
    \ other EJBs, environment variables, and so on).\n- **State management**: For\
    \ stateful session beans, the container manages their state transparently. You\
    \ can maintain state for a particular client, as if you were developing a desktop\
    \ application.\n- **Pooling**: For stateless beans and MDBs, the container creates\
    \ a pool of instances that can be shared by multiple clients. Once invoked, an\
    \ EJB returns to the pool to be reused instead of being destroyed.\n- **Component\
    \ life cycle**: The container is responsible for managing the life cycle of each\
    \ component.\n- **Messaging**: The container allows MDBs to listen to destinations\
    \ and consume messages without too much JMS plumbing.\n- **Transaction management**:\
    \ With declarative transaction management, an EJB can use annotations to inform\
    \ the container about the transaction policy it should use. The container takes\
    \ care of the commit or the rollback.\n- **Security**: Class or method-level access\
    \ control can be specified on EJBs to enforce user and role authentication.\n\
    - **Concurrency support**: Except for singletons, where some concurrency declaration\
    \ is needed, all the other types of EJB are thread-safe by nature. You can develop\
    \ high-performance applications without worrying about thread issues."
