    在清单 11-4 中，`priceRequired()` JavaScript 函数通过 `<script>` 标签嵌入在页面中。当价格文本字段失去焦点时（这就是
    `onblur` 事件的作用），会调用此函数。`priceRequired()` 函数使用代表 XHTML 文档 DOM 的隐式 `document` 对象。`getElementById("price")`
    方法查找一个标识符为 `price` 的元素（`<input id="price">`），并检查它是否为空。如果为空，该函数会查找另一个名为 `priceError`
    的元素（`getElementById("priceError")`），并将其值设置为“请填写价格！”。如果价格未填写，客户端验证将显示如图 11-4 所示的消息。


