    ## Richer\n\nOn one hand, Java EE 6 is becoming lighter by introducing profiles,\
    \ and on the other it’s also becoming richer by adding new specifications and\
    \ improving existing ones. RESTful web services have been making their way into\
    \ modern applications. Java EE 6 follows the needs of enterprises by adding the\
    \ new JAX-RS specification. As shown in Listing 1-3, a RESTful web service is\
    \ an annotated Java class that responds to HTTP actions. You will learn more about\
    \ JAX-RS in Chapter 15.\n\n**Listing 1-3.** *A RESTful Web Service*\n\n```java\n\
    @Path(\"books\")\npublic class BookResource {\n\n    @PersistenceContext(unitName\
    \ = \"chapter01PU\")\n    private EntityManager em;\n\n    @GET\n    @Produces({\"\
    application/xml\", \"application/json\"})\n    public List<Book> getAllBooks()\
    \ {\n        Query query = em.createNamedQuery(\"findAllBooks\");\n        List<Book>\
    \ books = query.getResultList();\n        return books;\n    }\n}\n```\n\nThe\
    \ new version of the persistence API (JPA 2.0) is improved by adding collections\
    \ of simple data types (`String`, `Integer`, etc.), pessimistic locking, a richer\
    \ JPQL syntax, a brand-new Query Definition API, and support for a caching API.\
    \ JPA is discussed in Chapter 2 through Chapter 5.\n\nEJBs are easier to develop\
    \ (with optional interfaces) and to package (in a war file), but they also have\
    \ new features, such as the possibility to use asynchronous calls or a richer\
    \ timer service for scheduling tasks. There is also a new singleton session bean\
    \ component. As shown in Listing 1-4, a single annotation can turn a Java class\
    \ into a container-managed singleton (one instance of the component per application).\
    \ You will learn more about these new features in Chapter 6 through Chapter 9.\n\
    \n**Listing 1-4.** *A Singleton Session Bean*\n\n```java\n@Singleton\npublic class\
    \ CacheEJB {\n\n    private Map<Long, Object> cache = new HashMap<Long, Object>();\n\
    \n    public void addToCache(Long id, Object object) {\n        if (!cache.containsKey(id))\n\
    \            cache.put(id, object);\n    }\n\n    public Object getFromCache(Long\
    \ id) {\n        if (cache.containsKey(id))\n            return cache.get(id);\n\
    \        else\n            return null;\n    }\n}\n```\n\nThe presentation tier\
    \ also gets richer. JSF 2.0 adds support for Ajax and for Facelets (see Chapter\
    \ 10 through Chapter 12).\n\n## More Portable\n\nFrom its creation, the aim of\
    \ Java EE was to enable the development of an application and its deployment to\
    \ any application server without changing the code or the configuration files.\
    \ This was never as easy as it seemed. Specifications don’t cover all the details,\
    \ and implementations end up providing nonportable solutions. That’s what happened\
    \ with JNDI names, for example. If you deployed an EJB to GlassFish, JBoss, or\
    \ WebLogic, the JNDI name was different because it wasn’t part of the specification,\
    \ so you had to change your code depending on the application server you used.\
    \ That particular problem has now been fixed, because Java EE 6 specifies a syntax\
    \ for JNDI names that is the same across application servers (see Chapter 7).\n\
    \nAnother difficult point with EJBs was the ability to test them, or use them\
    \ in a Java SE environment. Some application servers (such as JBoss) had specific\
    \ implementations to do it. EJB 3.1 specifies an embedded container that is a\
    \ standard API for executing EJBs within a Java SE environment (see Chapter 7).\n\
    \n## The CD-BookStore Application\n\nThroughout the book, you will see snippets\
    \ of code dealing with entities, EJBs, JSF pages, JMS listeners, and SOAP or RESTful\
    \ web services. They all belong to the CD-BookStore application. This application\
    \ is an e-commerce web site that allows customers to browse a catalog of books\
    \ and CDs on sale. The application has external interactions with a bank system\
    \ to validate credit card numbers. The use case diagram in Figure 1-5 describes\
    \ the system’s actors and functionalities.\n\n**Figure 1-5.** *Use case diagram\
    \ of the CD-BookStore application*\n\nThe actors interacting with the system described\
    \ in Figure 1-5 are:\n\n- *Employees* of the company who need to manage both the\
    \ catalog of items and the customers’ details. They can also browse the purchase\
    \ orders.\n- *Users* who are anonymous persons visiting the web site and consulting\
    \ the catalog of books and CDs. If they want to buy an item, they need to create\
    \ an account to become customers.\n- *Customers* who can browse the catalog, update\
    \ their account details, and buy items online.\n- The *external bank* to which\
    \ the system delegates credit card validations.\n\n> **Note** You can download\
    \ the code examples of this book from the Apress web site ([http://www.apress.com](http://www.apress.com)).\n\
    \n## Setting Up Your Environment\n\nThis book shows you lots of code, and most\
    \ of the chapters have a “Putting It All Together” section. These sections provide\
    \ step-by-step examples showing you how to develop, compile, deploy, execute,\
    \ and unit test a component. To run these examples, you need to install the required\
    \ software:\n\n- JDK 1.6\n- Maven 2\n- JUnit 4\n- Derby 10.4 database (a.k.a.\
    \ Java DB)\n- GlassFish v3 application server\n\n### JDK 1.6\n\nEssential for\
    \ the development and the execution of the examples in the book is the Java Development\
    \ Kit (JDK). It includes several tools such as a compiler (`javac`), a virtual\
    \ machine, a documentation generator (`javadoc`), monitoring tools (Visual VM),\
    \ and so on. To install the JDK 1.6, go to the official Sun web site ([http://java.sun.com/javase/downloads](http://java.sun.com/javase/downloads)),\
    \ select the appropriate platform and language, and download the distribution.\n\
    \nIf you are running on Windows (Linux and OS X are not supported in this book),\
    \ double-click the `jdk-6u12-windows-i586-p.exe` file. The first screen invites\
    \ you to accept the license of the software, and then the second screen, shown\
    \ in Figure 1-6, lists the modules of the JDK you can choose to install (JDK,\
    \ JRE, Derby database, sources).\n\n**Figure 1-6.** *Setting up the JDK installation*\n\
    \nOnce the installation is complete, it is necessary to set the `JAVA_HOME` variable\
    \ and the `%JAVA_HOME%\\bin` directory to the `PATH` variable. Check that Java\
    \ is recognized by your system by entering `java –version` (see Figure 1-7).\n\
    \n**Figure 1-7.** *Displaying the JDK version*\n\n### Maven 2\n\nTo reflect what\
    \ you’ll find in the real development world, I’ve decided to use Apache Maven\
    \ ([http://maven.apache.org](http://maven.apache.org)) to build the examples of\
    \ this book. The purpose of this book is not to explain Maven. You will find plenty\
    \ of resources for Maven on the Internet or in bookstores. But I will introduce\
    \ some elements so that you can easily understand and use the examples.\n\n####\
    \ A Bit of History\n\nBuilding a Java EE application requires different operations:\n\
    \n- Generating code and resources\n- Compiling Java classes and test classes\n\
    - Packaging the code in an archive (jar, ear, war, etc.) with potentially external\
    \ jar libraries\n\nDoing these tasks manually can be time consuming and can generate\
    \ errors. Thus, development teams have looked for ways of automating these tasks.\n\
    \nIn 2000, Java developers started to use [Apache Ant](http://ant.apache.org),\
    \ allowing them to create scripts for building applications. Ant itself is written\
    \ in Java and offers a range of commands that, unlike a Unix Make tool, are portable\
    \ across platforms."
