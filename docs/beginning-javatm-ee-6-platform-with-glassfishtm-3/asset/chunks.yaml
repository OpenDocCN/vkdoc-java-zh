- fmt: "# The Persistence Unit and Entity Management\n\nThe persistence unit is the\
    \ bridge between the persistence context and the database. On one hand, the `<class>`\
    \ tag lists all the entities that could be managed in the persistence context,\
    \ and on the other, it gives all the information to physically connect to the\
    \ database. This is because you are in an application-managed environment (`transaction-type=\"\
    RESOURCE_LOCAL\"`). In a container-managed environment, the `persistence.xml`\
    \ would define a datasource instead of the database connection properties and\
    \ set the transaction type to JTA (`transaction-type=\"JTA\"`).\n\n## Manipulating\
    \ Entities\n\nThe entity manager is also used to create complex JPQL queries to\
    \ retrieve an entity or a list of entities. When manipulating single entities,\
    \ the `EntityManager` interface can be seen as a generic Data Access Object (DAO),\
    \ which allows CRUD operations on any entity (see Table 4-1).\n\n**Table 4-1.**\
    \ *EntityManager Interface Methods to Manipulate Entities*\n\n| Method | Description\
    \ |\n|--------|-------------|\n| `void persist(Object entity)` | Makes an instance\
    \ managed and persistent |\n| `<T> T find(Class<T> entityClass, Object primaryKey)`\
    \ | Searches for an entity of the specified class and primary key |\n| `<T> T\
    \ getReference(Class<T> entityClass, Object primaryKey)` | Gets an instance, whose\
    \ state may be lazily fetched |\n| `void remove(Object entity)` | Removes the\
    \ entity instance from the persistence context and from the underlying database\
    \ |\n| `<T> T merge(T entity)` | Merges the state of the given entity into the\
    \ current persistence context |\n| `void refresh(Object entity)` | Refreshes the\
    \ state of the instance from the database, overwriting changes made to the entity,\
    \ if any |\n| `void flush()` | Synchronizes the persistence context to the underlying\
    \ database |\n| `void clear()` | Clears the persistence context, causing all managed\
    \ entities to become detached |\n| `void clear(Object entity)` | Removes the given\
    \ entity from the persistence context |\n| `boolean contains(Object entity)` |\
    \ Checks whether the instance is a managed entity instance belonging to the current\
    \ persistence context |\n\nTo gain a better understanding of these methods, I\
    \ will use a simple example of a one-way, one-to-one relationship between a `Customer`\
    \ and an `Address`. Both entities have automatically generated identifiers (thanks\
    \ to the `@GeneratedValue` annotation), and `Customer` (see Listing 4-7) has a\
    \ lazy fetch to `Address` (see Listing 4-8).\n\n**Listing 4-7.** *The Customer\
    \ Entity with a One-Way, One-to-One Address*\n\n```java\n@Entity\npublic class\
    \ Customer {\n    @Id @GeneratedValue\n    private Long id;\n    private String\
    \ firstName;\n    private String lastName;\n    private String email;\n    @OneToOne\
    \ (fetch = FetchType.LAZY)\n    @JoinColumn(name = \"address_fk\")\n    private\
    \ Address address;\n    // Constructors, getters, setters\n}\n```\n\n**Listing\
    \ 4-8.** *The Address Entity*\n\n```java\n@Entity\npublic class Address {\n  \
    \  @Id @GeneratedValue\n    private Long id;\n    private String street1;\n  \
    \  private String city;\n    private String zipcode;\n    private String country;\n\
    \    // Constructors, getters, setters\n}\n```\n\nThese two entities will get\
    \ mapped into the database structure shown in Figure 4-2. Note the `ADDRESS_FK`\
    \ column is the foreign key to `ADDRESS`.\n\n**Figure 4-2.** *CUSTOMER and ADDRESS\
    \ tables*\n\nFor better readability, the fragments of code used in the upcoming\
    \ section assume that the `em` attribute is of type `EntityManager` and `tx` of\
    \ type `EntityTransaction`.\n\n## Persisting an Entity\n\nPersisting an entity\
    \ means inserting data into the database when the data doesn't already exist (otherwise\
    \ an exception is thrown). To do so, it's necessary to create a new entity instance\
    \ using the `new` operator, set the values of the attributes, bind one entity\
    \ to another when there are associations, and finally call the `EntityManager.persist()`\
    \ method as shown in the JUnit test case in Listing 4-9.\n\n**Listing 4-9.** *Persisting\
    \ a Customer with an Address*\n\n```java\nCustomer customer = new Customer(\"\
    Antony\", \"Balla\", \"tballa@mail.com\");\nAddress address = new Address(\"Ritherdon\
    \ Rd\", \"London\", \"8QE\", \"UK\");\ncustomer.setAddress(address);\n\ntx.begin();\n\
    em.persist(customer);\nem.persist(address);\ntx.commit();\n\nassertNotNull(customer.getId());\n\
    assertNotNull(address.getId());\n```\n\nIn Listing 4-9, `customer` and `address`\
    \ are just two objects that reside in the JVM memory. Both become managed entities\
    \ when the entity manager (variable `em`) takes them into account by persisting\
    \ them (`em.persist(customer)`). At this time, both objects become eligible to\
    \ be inserted in the database. When the transaction is committed (`tx.commit()`),\
    \ the data is flushed to the database, and an address row is inserted into the\
    \ `ADDRESS` table and a customer row into the `CUSTOMER` table. As the `Customer`\
    \ is the owner of the relationship, its table holds the foreign key to `ADDRESS`.\
    \ With the `assertNotNull` expressions, both entities receive a generated identifier\
    \ thanks to the persistence provider and the annotations.\n\nNote the ordering\
    \ of the `persist()` methods: a customer is persisted and then an address. If\
    \ it were the other way round, the result would be the same. Earlier, the entity\
    \ manager was described as a first-level cache. Until the transaction is committed,\
    \ the data stays in memory and there is no access to the database. The entity\
    \ manager caches data and, when ready, flushes the data in the order that the\
    \ underlying database is expecting (respecting integrity constraints). Because\
    \ of the foreign key in the `CUSTOMER` table, the insert statement for `ADDRESS`\
    \ will be executed first, followed by that for `CUSTOMER`.\n\n> **Note:** Most\
    \ of the entities in this chapter do not implement the `Serializable` interface.\
    \ That's because entities don't have to in order to get persisted in the database.\
    \ They are passed by reference from one method to the other, and when they have\
    \ to be persisted, the `EntityManager.persist()` method is invoked. But if you\
    \ need to pass entities by value (remote invocation, external EJB container, etc.),\
    \ they must implement the `java.io.Serializable` marker (no method) interface.\
    \ It indicates to the compiler that it must enforce all fields on the entity class\
    \ to be serializable, so that any instance can be serialized to a byte stream\
    \ and passed using Remote Method Invocation (RMI).\n\n## Finding by ID\n\nTo find\
    \ an entity by its identifier, you can use two different methods. The first is\
    \ the `EntityManager.find()` method, which takes two parameters: the entity class\
    \ and the unique identifier (see Listing 4-10). If the entity is found, it is\
    \ returned; if it is not found, a `null` value is returned.\n\n**Listing 4-10.**\
    \ *Finding a Customer by ID*\n\n```java\nCustomer customer = em.find(Customer.class,\
    \ 1234L);\nif (customer != null) {\n    // Process the object\n}\n```\n\nThe second\
    \ method is `getReference()` (see Listing 4-11). It is very similar to the `find`\
    \ operation, as it takes the same parameters, but it allows retrieval of a reference\
    \ to an entity via its primary key, not its data. It is intended for situations\
    \ where a managed entity instance is needed, but no data, other than potentially\
    \ the entity's primary key being accessed. With `getReference()`, the state data\
    \ is fetched lazily, which means that if you don't access state before the entity\
    \ is detached, the data might not be there. If the entity is not found, an `EntityNotFoundException`\
    \ is thrown.\n\n**Listing 4-11.** *Finding a Customer by Reference*\n\n```java\n\
    try {\n    Customer customer = em.getReference(Customer.class, 1234L);\n    //\
    \ Process the object\n} catch(EntityNotFoundException ex) {\n    // Entity not\
    \ found\n}\n```\n\n## Removing an Entity"
