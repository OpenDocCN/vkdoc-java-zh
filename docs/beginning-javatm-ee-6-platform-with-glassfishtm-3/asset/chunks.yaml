    **Bean-Managed Concurrency**


    With BMC demarcation, the container allows full concurrent access to the singleton
    bean instance. You are then responsible for guarding its state against synchronization
    errors due to concurrent access. In this case, you are allowed to use Java synchronization
    primitives such as synchronized and volatile. The code in Listing 7-7 shows CacheEJB
    with BMC


    (@ConcurrencyManagement(BEAN)) using the synchronized keyword on the addToCache()


    method.


    **Listing 7-7.** *A Singleton Session Bean with BMC*


    @Singleton


    **@ConcurrencyManagement(ConcurrencyManagementType.BEAN)**


    public class CacheEJB {


    private Map<Long, Object> cache = new HashMap<Long, Object>();


    public **synchronized** void addToCache(Long id, Object object) {


    if (!cache.containsKey(id))


    cache.put(id, object);


    }


    public void removeFromCache(Long id) {


    if (cache.containsKey(id))


    cache.remove(id);


    }


    public synchronized Object getFromCache(Long id) {


    if (cache.containsKey(id))


    return cache.get(id);


    else


    return null;


    }


    }


    **Concurrency Not Allowed**


    You can also disallow concurrent access on a method or to the entire bean. This
    will result in throwing a ConcurrentAccessException if a client invokes a method
    that is currently being used. This can have performance issues as clients might
    have to handle the exception, retry to access the bean, potentially receive another
    exception, try again, and so on. In Listing 7-8, CacheEJB disallows concurrency
    on the addToCache() method. The other two methods are, by default, CMC with a
    @Lock(WRITE).


    **Listing 7-8.** *A Singleton Session Bean Not Allowing Concurrency*


