    ![Image 8](img/index-35_1.jpg)


    第 1 章 ■ Java EE 6 概览


    **5**


    **图 1-2.** *标准 Java EE 容器*


    组件


    Java EE 运行时环境定义了实现必须支持的四种组件类型：


    • *Applet* 是在 Web 浏览器中执行的 GUI 应用程序。它们使用丰富的 Swing API 来提供强大的用户界面。


    • *应用程序* 是在客户端上执行的程序。它们通常是 GUI 或批处理程序，可以访问 Java EE 中间层的所有设施。


    • *Web 应用程序*（由 Servlet、Servlet 过滤器、Web 事件监听器、JSP 页面和 JSF 组成）在 Web 容器中执行，并响应来自
    Web 客户端的 HTTP 请求。Servlet 还支持 SOAP 和 RESTful Web 服务端点。


    • *企业级 JavaBean* 是用于处理事务性业务逻辑的容器管理组件。它们可以通过 RMI（或通过 HTTP 用于 SOAP 和 RESTful Web
    服务）进行本地和远程访问。


    容器


    Java EE 基础设施被划分为称为容器的逻辑域（见图 1-2）。每个容器都有特定的角色，支持一组 API，并为组件提供服务（安全性、数据库访问、事务处理、命名目录、资源注入）。


    容器隐藏了技术复杂性并增强了可移植性。根据你想要构建的应用程序类型，你需要了解每个容器的能力和限制，以便使用一个或多个容器。例如，如果你需要开发一个 Web
    表示层，你将开发一个 JSF 应用程序并将其部署到 Web 容器中，而不是 EJB 容器。但是，如果你希望一个 Web 应用程序调用业务层，则可能需要同时使用
    Web 和 EJB 容器。


    **6**


    第 1 章 ■ Java EE 6 概览


    大多数 Web 浏览器提供 Applet 容器来执行 Applet 组件。当你开发 Applet 时，你可以专注于应用程序的视觉方面，而容器则为你提供一个安全的环境。Applet
    容器使用沙箱安全模型，其中在“沙箱”中执行的代码不允许“在沙箱外运行”。这意味着容器会阻止任何下载到本地计算机的代码访问本地系统资源，例如进程或文件。


    应用程序客户端容器（ACC）包含一组 Java 类、库和其他文件，这些文件用于为 Java SE 应用程序（Swing、批处理或仅包含 main()方法的类）提供注入、安全管理和命名服务。ACC
    使用 RMI-IIOP 与 EJB 容器通信，并使用 HTTP（例如，用于 Web 服务）与 Web 容器通信。


    Web 容器（也称为 Servlet 容器）为管理和执行 Web 组件（Servlet、JSP、过滤器、监听器、JSF 页面和 Web 服务）提供底层服务。它负责实例化、初始化和调用
    Servlet，并支持 HTTP 和 HTTPS 协议。它是用于向客户端浏览器提供网页的容器。


    EJB 容器负责管理包含 Java EE 应用程序业务逻辑层的企业级 Bean 的执行。它创建 EJB 的新实例，管理其生命周期，并提供事务、安全性、并发性、分布、命名服务或异步调用的可能性等服务。


    服务


    容器为其部署的组件提供底层服务。作为开发人员，你可以专注于实现业务逻辑，而不是解决企业应用程序中面临的技术问题。图 1-3 展示了每个容器提供的服务。例如，Web
    和 EJB 容器提供用于访问 EIS 的连接器，但 Applet 容器或 ACC 不提供。Java EE 提供以下服务：


    • *JTA*：此服务提供容器和应用程序使用的事务划分 API。它还在服务提供者接口（SPI）级别提供了事务管理器与资源管理器之间的接口。


    • *JPA*：用于对象关系映射（ORM）的标准 API。使用 Java 持久化查询语言（JPQL），你可以查询存储在底层数据库中的对象。


    • *JMS*：JMS 允许组件通过消息进行异步通信。它支持可靠的点对点（P2P）消息传递以及发布-订阅（pub-sub）模型。


    • *Java 命名和目录接口（JNDI）*：此 API 包含在 Java SE 中，用于访问命名和目录系统。你的应用程序使用它将名称与对象关联（绑定），然后在目录中查找这些对象（查找）。你可以查找数据源、JMS
    工厂、EJB 和其他资源。在 J2EE 1.4 之前，JNDI 在你的代码中无处不在，现在通过注入以更透明的方式使用。


    • *JavaMail*：许多应用程序需要能够发送电子邮件，这可以通过使用 JavaMail API 来实现。


    • *JavaBeans 激活框架（JAF）*：JAF API 包含在 Java SE 中，提供了一个用于处理不同 MIME 类型数据的框架。它被 JavaMail
    使用。


    ![Image 9](img/index-37_1.jpg)


    第 1 章 ■ Java EE 6 概览


    **7**


    • *XML 处理*：大多数 Java EE 组件可以使用可选的 XML 部署描述符进行部署，并且应用程序通常需要操作 XML 文档。用于 XML 处理的
    Java API（JAXP）提供了使用 SAX 和 DOM API 解析文档以及 XSLT 的支持。用于 XML 的流式 API（StAX）提供了用于 XML
    的拉解析 API。


    • *JCA*：连接器允许你从 Java EE 组件访问 EIS。这些可以是数据库、大型机或企业资源规划（ERP）程序。


    • *安全服务*：Java 认证和授权服务（JAAS）使服务能够对用户进行身份验证并实施访问控制。用于容器的 Java 授权服务提供者合同（JACC）定义了
    Java EE 应用服务器与授权服务提供者之间的合同，允许将自定义授权服务提供者插入任何 Java EE 产品。


    • *Web 服务*：Java EE 支持 SOAP 和 RESTful Web 服务。用于 XML Web 服务的 Java API（JAX-WS）取代了用于基于
    XML 的 RPC 的 Java API（JAX-RPC），提供了对使用 SOAP/HTTP 协议的 Web 服务的支持。用于 RESTful Web 服务的
    Java API（JAX-RS）提供了对使用 REST 风格的 Web 服务的支持。


    • *管理*：Java EE 定义了使用特殊管理企业级 Bean 来管理容器和服务器的 API。Java 管理扩展（JMX）API 也用于提供一些管理支持。


    • *部署*：Java EE 部署规范定义了部署工具与 Java EE 产品之间的合同，以标准化应用程序部署。


    **图 1-3.** *容器提供的服务*


    **8**


    第 1 章 ■ Java EE 6 概览


    网络协议


    如图 1-3 所示（参见 Java EE 6 规范的“平台概述”部分），部署在容器中的组件可以通过不同的协议进行调用。例如，部署在 Web 容器中的 Servlet
    可以通过 HTTP 调用，而部署在 EJB 容器中的具有 EJB 端点的 Web 服务也是如此。以下是 Java EE 支持的协议列表：

