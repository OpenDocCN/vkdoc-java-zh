    \n**358**\n\nChapter 13 ■ SENDING MESSAGES\n\n**Figure 13-1.** *MOM architecture*\n\
    \nIn Java EE, the API that deals with these concepts is called Java Message Service\
    \ (JMS). It has a set of interfaces and classes that allow you to connect to a\
