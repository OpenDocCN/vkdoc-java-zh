    \        <class>com.apress.javaee6.chapter04.Address</class>\n        <properties>\n\
    \            <property name=\"eclipselink.target-database\" value=\"DERBY\"/>\n\
    \            <property name=\"eclipselink.jdbc.driver\" value=\"org.apache.derby.jdbc.ClientDriver\"\
