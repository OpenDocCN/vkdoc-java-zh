    中被引用，并与应用程序一起部署。然后，`DebugListener` 将自动为每个实体调用。


    当声明了一个默认实体监听器列表时，每个监听器都会按照它们在 XML 映射文件中列出的顺序被调用。默认实体监听器总是在 `@EntityListeners`
    注解中列出的任何实体监听器之前被调用。如果一个实体不希望应用默认实体监听器，它可以使用 `@ExcludeDefaultListeners` 注解，如清单
    5-7 所示。


    **166**


    第 5 章 ■ 回调和监听器


    **清单 5-7.** *排除默认监听器的 Customer 实体*


    **@ExcludeDefaultListeners**


    @Entity


    public class Customer {


    @Id @GeneratedValue


    private Long id;


    private String firstName;


    private String lastName;


    private String email;


    private String phoneNumber;


    @Temporal(TemporalType.DATE)


    private Date dateOfBirth;


    @Transient


    private Integer age;


    @Temporal(TemporalType.TIMESTAMP)


    private Date creationDate;


    // 构造器、getter、setter


    }


    **总结**


    本章描述了实体生命周期以及实体管理器如何捕获事件来调用回调方法。回调方法可以在单个实体上定义，并通过多个注解（`@PrePersist`、`@PostPersist`
    等）进行标注。该方法也可以提取到监听器类中，并被多个或所有实体使用（使用默认实体监听器）。通过回调方法，你可以看到实体不仅仅是贫血对象（没有业务逻辑，只有属性、getter
    和 setter 的对象）；实体可以包含业务逻辑，这些逻辑可以由应用程序中的其他对象调用，或者根据实体的生命周期由实体管理器自动调用。其他 Java EE
    6 组件，例如 EJB，也使用这类拦截器。


    第 6 章


    企业级 JavaBean

