    **Cache API**


    Most specifications (not just Java EE) focus heavily on functional requirements,
    leaving nonfunctional ones like performance, scalability, or clustering as implementation
    details.


    Implementations have to strictly follow the specification but may also add specific
    features. A perfect example for JPA would be caching.


    Until JPA 2.0, caching wasn’t mentioned in the specification. The entity manager
    is a first-level cache used to treat data in a comprehensive way for the database
    and to cache short, live entities. The first-level cache is used on a per-transaction
    basis to reduce the number of SQL


    queries within a given transaction. For example, if an object is modified several
    times within the same transaction, the entity manager will generate only one UPDATE
    statement at the end of the transaction. A first-level cache is not a performance
    cache.


    Nevertheless, all JPA implementations use a performance cache (a.k.a. a second-level


    cache) to optimize database access, queries, joins, and so on. Second-level caches
    reduce


    Chapter 4 ■ MaNaGING perSISteNt OBJeCtS


    **137**


    database traffic because they keep objects loaded in memory and available to the
    whole application. Each implementation has its own way of caching objects, either
    by developing their own mechanism or by reusing open source ones. Caching can
    be distributed across a cluster or not—anything is possible when the specification
    ignores a topic.


    JPA 2.0 acknowledges that second-level cache is needed and has added caching opera-


    tions to the standard API. The API, shown in Listing 4-22, is very minimalist
    (because the goal of JPA is not to standardize a fully functional cache), but
    it allows code to query and remove some entities from the second-level cache in
    a standard way. Like EntityManager, javax.


    persistence.Cache is an interface implemented by the persistence provider caching
    system.


    **Listing 4-22.** *Cache API*


    public interface Cache {


    // Whether the cache contains data for the given entity.


    public boolean contains(Class cls, Object primaryKey);


    // Remove the data for the given entity from the cache.


    public void evict(Class cls, Object primaryKey);


    // Remove the data for entities of the specified class from the cache.


    public void evict(Class cls);


    // Clear the cache.


    public void evictAll();


    }


    **JPQL**


    You just saw how to manipulate entities individually with the EntityManager API.
    You know how to find an entity by ID, remove it, update its attributes, and so
    on. But finding an entity by ID is quite limiting, as you only retrieve a single
    entity using its unique identifier. In practice, you may need to retrieve an entity
    by criteria other than the ID (by name, ISBN, etc.) or retrieve a set of entities
    based on different criteria (e.g., all customers living in the USA). This possibility
    is inherent to relational databases, and JPA has a language that allows this interaction:
    JPQL.


    JPQL is used to define searches against persistent entities independent of the
    underly-


    ing database. JPQL is a query language that takes its roots in the syntax of Standard
    Query Language (SQL), which is the standard language for database interrogation.
    But the main difference is that in SQL the results obtained are in the form of
    rows and columns (tables), whereas JPQL uses an entity or a collection of entities.
    JPQL syntax is object oriented and therefore more easily understood by developers
    whose experience is limited to object-oriented languages. Developers manage their
    entity domain model, not a table structure, by using the dot notation (e.g., myClass.myAttribute).


    Under the hood, JPQL uses the mechanism of mapping to transform a JPQL query into


    language comprehensible by a SQL database. The query is executed on the underlying
    database with SQL and JDBC calls, and then entity instances have their attributes
    set and are


    **138**


    Chapter 4 ■ MaNaGING perSISteNt OBJeCtS


    returned to the application—all in a very simple and powerful manner using a rich
    query syntax.


    The simplest JPQL query selects all the instances of a single entity:


    SELECT b


    FROM Book b


    If you know SQL, this should look familiar to you. Instead of selecting from a
    table, JPQL


    selects entities, here Book. The FROM clause is also used to give an alias to
    the entity: b is an alias for Book. The SELECT clause of the query indicates that
    the result type of the query is the b entity (the Book). Executing this statement
    will result in a list of zero or more Book instances.


    To restrict the result, add search criteria where you can use the WHERE clause
    as follows: SELECT b


    FROM Book b


    WHERE b.title = "H2G2"


    The alias is used to navigate across entity attributes through the dot operator.
    Since the Book entity has a persistent attribute named title of type String, b.title
    refers to the title attribute of the Book entity. Executing this statement will
    result in a list of zero or more Book instances that have a title equal to *H2G2*.


    The simplest select query consists of two mandatory parts: the SELECT and the
    FROM clause.


    SELECT defines the format of the query results. The FROM clause defines the entity
    or entities from which the results will be obtained, and optional WHERE, ORDER
    BY, GROUP BY, and HAVING


    clauses can be used to restrict or order the result of a query. The select syntax
    is defined in Listing 4-23 in the next section.


    There are also DELETE and UPDATE statements that can be used to delete and update
    operations across multiple instances of a specific entity class.


