- fmt: "# Java Persistence Query Language (JPQL)\n\nThis is where Java Persistence\
    \ Query Language (JPQL) comes into play.\n\n`JPQL` is the language defined in\
    \ JPA to query entities stored in a relational database. `JPQL` syntax resembles\
    \ SQL but operates against entity objects rather than directly with database tables.\
    \ `JPQL` does not see the underlying database structure nor deal with tables or\
    \ columns, but rather objects and attributes. And for that, it uses the dot (`.`)\
    \ notation that Java developers are familiar with.\n\nIn this chapter, you will\
    \ learn how to manage persistent objects. This means you will learn how to do\
    \ Create, Read, Update, and Delete (CRUD) operations with the entity manager as\
    \ well as complex queries using `JPQL`. At the end of the chapter, you will see\
    \ how concurrency is handled by JPA.\n\n## How to Query an Entity\n\nLet’s take\
    \ as our first example a simple query: finding a book by its identifier. In Listing\
    \ 4-1 you can see a `Book` entity that uses the `@Id` annotation to inform the\
    \ persistence provider that the `id` attribute has to be mapped as a primary key.\n\
    \n**Listing 4-1.** *A Simple Book Entity*\n\n```java\n@Entity\npublic class Book\
    \ {\n\n    @Id\n    private Long id;\n\n    private String title;\n    private\
    \ Float price;\n    private String description;\n    private String isbn;\n  \
    \  private Integer nbOfPage;\n    private Boolean illustrations;\n\n    // Constructors,\
    \ getters, setters\n}\n```\n\nThe `Book` entity holds the mapping information.\
    \ In this example, using most of the defaults, the data will be stored in a table\
    \ whose name equals the name of the entity (`BOOK`), and each attribute will have\
    \ an equivalent column mapping. You can use a separate `Main` class (see Listing\
    \ 4-2) that uses the `javax.persistence.EntityManager` interface to store a `Book`\
    \ instance in the table.\n\n**Listing 4-2.** *A Main Class Persisting and Retrieving\
    \ a Book Entity*\n\n```java\npublic class Main {\n\n    public static void main(String[]\
    \ args) {\n\n        // 1-Create an instance of the Book entity\n        Book\
    \ book = new Book();\n        book.setId(1234L);\n        book.setTitle(\"The\
    \ Hitchhiker's Guide to the Galaxy\");\n        book.setPrice(12.5F);\n      \
    \  book.setDescription(\"Science fiction created by Douglas Adams.\");\n     \
    \   book.setIsbn(\"1-84023-742-2\");\n        book.setNbOfPage(354);\n       \
    \ book.setIllustrations(false);\n\n        // 2-Get an entity manager and a transaction\n\
    \        EntityManagerFactory emf =\n                Persistence.createEntityManagerFactory(\"\
    chapter04PU\");\n        EntityManager em = emf.createEntityManager();\n     \
    \   EntityTransaction tx = em.getTransaction();\n\n        // 3-Persist the book\
    \ to the database\n        tx.begin();\n        em.persist(book);\n        tx.commit();\n\
    \n        // 4-Retrieve the book by its identifier\n        book = em.find(Book.class,\
    \ 1234L);\n        System.out.println(book);\n\n        em.close();\n        emf.close();\n\
    \    }\n}\n```\n\nThe `Main` class in Listing 4-2 uses four different steps to\
    \ persist a `Book` and retrieve it from the database:\n\n1. **Create an instance\
    \ of the `Book` entity.** Entities are annotated POJOs, managed by the persistence\
    \ provider. From a Java viewpoint, an instance of a class needs to be created\
    \ through the `new` keyword as any POJO. It is important to emphasize that up\
    \ to this point in the code, the persistence provider is not aware of the `Book`\
    \ object.\n\n2. **Obtain an entity manager and a transaction.** This is the important\
    \ part of the code, as an entity manager is needed to manipulate entities. First,\
    \ an entity manager factory is created for the `chapter04PU` persistence unit.\
    \ This factory is then employed to obtain an entity manager (the `em` variable),\
    \ used throughout the code to get a transaction (`tx` variable), and persist and\
    \ retrieve a `Book`.\n\n3. **Persist the book to the database.** The code starts\
    \ a transaction (`tx.begin()`) and uses the `EntityManager.persist()` method to\
    \ insert a `Book` instance. When the transaction is committed (`tx.commit()`),\
    \ the data is flushed into the database.\n\n4. **Retrieve the book by its identifier.**\
    \ Again, the entity manager is used to retrieve the book using its identifier\
    \ (`EntityManager.find()`).\n\nNote in this code the absence of SQL queries, JPQL\
    \ queries, or JDBC calls. Figure 4-1 shows the interaction between these components.\
    \ The `Main` class interacts with the underlying database through the `EntityManager`\
    \ interface, which provides a set of standard methods that allow you to perform\
    \ operations on the `Book` entity. Behind the scenes, the `EntityManager` relies\
    \ on the persistence provider to interact with the databases. When an `EntityManager`\
    \ method is invoked, the persistence provider generates and executes a SQL statement\
    \ through the corresponding JDBC driver.\n\n**Figure 4-1.** *The entity manager\
    \ interacts with the entity and the underlying database*\n\nWhich JDBC driver\
    \ to use? How to connect to the database? What’s the database name? This information\
    \ is missing from our previous code. When the `Main` class creates an `EntityManagerFactory`,\
    \ it passes the name of a persistence unit as a parameter; in this case, it’s\
    \ called `chapter04PU`. The persistence unit indicates to the entity manager the\
    \ type of database to use and the connection parameters, which are defined in\
    \ the `persistence.xml` file, shown in Listing 4-3, that has to be deployed with\
    \ the classes.\n\n**Listing 4-3.** *The persistence.xml File Defining the Persistence\
    \ Unit*\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<persistence version=\"\
    1.0\" xmlns=\"http://java.sun.com/xml/ns/persistence\">\n    <persistence-unit\
    \ name=\"chapter04PU\" transaction-type=\"RESOURCE_LOCAL\">\n        <provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>\n\
    \        <class>com.apress.javaee6.chapter04.Book</class>\n        <properties>\n\
    \            <property name=\"eclipselink.target-database\" value=\"DERBY\"/>\n\
    \            <property name=\"eclipselink.jdbc.driver\"\n                    \
    \  value=\"org.apache.derby.jdbc.ClientDriver\"/>\n            <property name=\"\
    eclipselink.jdbc.url\"\n                      value=\"jdbc:derby://localhost:1527/chapter04DB\"\
    />\n            <property name=\"eclipselink.jdbc.user\" value=\"APP\"/>\n   \
    \         <property name=\"eclipselink.jdbc.password\" value=\"APP\"/>\n     \
    \   </properties>\n    </persistence-unit>\n</persistence>\n```\n\nThe `chapter04PU`\
    \ persistence unit defines a JDBC connection for the `chapter04DB` Derby database.\
    \ It connects with a user (`APP`) and a password (`APP`) at a given URL. The `<class>`\
    \ tag tells the persistence provider to manage the `Book` class.\n\nTo make the\
    \ code work, in addition to a Derby database running on port 1527, both a `Book`\
    \ and `Main` class need to be compiled and deployed with this `META-INF/persistence.xml`\
    \ file.\n\nBy enabling logging, you might see some traces of SQL statements, but\
    \ your code manipulates objects, in an object-friendly way, with no SQL statement\
    \ or JDBC direct calls using the `EntityManager` API.\n\n## Entity Manager\n\n\
    The entity manager is a central piece in JPA. It manages the state and life cycle\
    \ of entities as well as querying entities within a persistence context. The entity\
    \ manager is responsible for creating and removing persistent entity instances\
    \ and finding entities by their primary key. It can lock entities for protecting\
    \ against concurrent access by using optimistic or pessimistic locking and can\
    \ use JPQL queries to retrieve entities following certain criteria.\n\nWhen an\
    \ entity manager obtains a reference to an entity, it is said to be *managed*.\
    \ Until that point, the entity is seen as a regular POJO (i.e., detached). The\
    \ strength of JPA is that entities can be used as regular objects by different\
    \ layers of an application and become managed by the entity manager when you need\
    \ to load or insert data into the database. When an entity is managed, you can\
    \ carry out persistence operations, and the entity manager will automatically\
    \ synchronize the state of the entity with the database. When the entity is detached\
    \ (i.e., not managed), it returns to a simple POJO and can then be used by other\
    \ layers (e.g., a JSF presentation layer) without synchronizing its state with\
    \ the database."
