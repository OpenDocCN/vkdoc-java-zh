- fmt: '# GlassFish Update Center and Administration


    In practice, with GlassFish v3, the update center can be accessed via the admin
    console, the graphical client available at `%GLASSFISH_HOME%\bin\updatetool`,
    or the `pkg` command line.


    All three allow you to list, add, and remove components available from a set of
    multiple repositories. In the case of `pkg` (also located in `%GLASSFISH_HOME%\bin`),
    the most common commands are `pkg list`, `pkg install`, `pkg uninstall`, and `pkg
    image-update`.


    ## GlassFish Subprojects


    There are many different parts to the GlassFish application server, so the project
    was broken up into subprojects. This helps you to further understand not only
    the different pieces, but also the adoption of individual features outside of
    the GlassFish environment, in stand-alone mode or within another container. Figure
    1-15 shows a high-level architecture of the functional parts of the application
    server.


    **Figure 1-15.** *Functional parts of GlassFish*


    `OpenMQ`, for instance, is a production-quality open source implementation of
    JMS.


    Although it is often used stand-alone for message-oriented architectures, `OpenMQ`
    can also be integrated in various ways with GlassFish (in-process, out-of-process,
    or remote). The administration of `OpenMQ` can be done via the GlassFish admin
    console or the `asadmin` command-line interface (see the upcoming “The `asadmin`
    CLI” section). The community web site is at [http://openmq.dev.java.net](http://openmq.dev.java.net).


    `Metro` is the one-stop shop for web services. This complete stack builds on the
    JAX-WS development paradigm and augments it with advanced features such as trusted,
    end-to-end security; optimized transport (MTOM, FastInfoset); reliable messaging;
    and transactional behavior for SOAP web services. Such quality of service (QoS)
    for web services is based on standards (OASIS, W3C), is expressed in the form
    of policies, and does not require the use of a new API in addition to JAX-WS.
    `Metro` is also regularly tested with Microsoft against .NET implementations to
    ensure interoperability between the two technologies. The community web site is
    at [http://metro.dev.java.net](http://metro.dev.java.net).


    `Mojarra` is the name of the JSF implementation in GlassFish and is available
    at [http://mojarra.dev.java.net](http://mojarra.dev.java.net). `Jersey` is the
    production-quality RI for the new JAX-RS specification. Both the specification
    and the implementation were the early comers to Java EE 6 and GlassFish. In fact,
    `Jersey` 1.0 has been available in the update center for GlassFish v2 and v3 since
    it was released in 2008.


    ## Administration


    Obviously, being a complete application server means that GlassFish implements
    100 percent of the Java EE 6 specifications, but it also has additional features
    that make it a polished product such as its administrative capabilities, be it
    through the admin console or via a powerful `asadmin` command-line interface.
    Almost all the configuration is stored in a file called `domain.xml` (located
    in `domains\domain1\config`), which can be useful for troubleshooting, but this
    file should not be edited by hand; instead one of these two administration tools
    should be used. Both of them rely on the extensive JMX instrumentation provided
    by GlassFish.


    ### Admin Console


    The admin console is a browser-based administration user interface (see Figure
    1-16) for the application server. This tool is for both administrators and developers.
    It provides graphical representation of the objects under management, enhanced
    log file viewing, system status, and monitoring data. At a minimum, the console
    manages the creation and modification of configurations (JVM tuning, log level,
    pool and cache tuning, etc.), JDBC, JNDI, JavaMail, JMS, and connector resources,
    as well as applications (deployment). In the cluster profile of GlassFish, the
    admin console is enhanced to let the user manage clusters, instances, node agents,
    and load-balancing configurations. At any time in the navigation of the tool,
    contextual help is available via the top-right Help button. With a default installation,
    the admin console is available upon GlassFish startup at [http://localhost:4848](http://localhost:4848).
    Starting with GlassFish v3, an anonymous user can be set up, removing the need
    to log in. If this is not the case, a typical installation will have `admin` as
    the user name and `adminadmin` as the default password.


    ![Image 22](index-66_1.jpg)


    **Figure 1-16.** *Web administration console*


    ### The `asadmin` CLI


    The `asadmin` command-line interface (CLI) is quite powerful and often what people
    use in production, as it can be scripted to create instances and resources, deploy
    applications, and provide monitoring data on a running system. The command is
    located under the `bin` subdirectory of GlassFish and can manage multiple local
    or remote application server domains.


    `asadmin` offers several hundred commands, but you should get away with using
    only a small subset of these. If you are curious about the commands, try `asadmin
    help`. Useful commands in a simple developer profile include `asadmin start-domain`,
    `asadmin stop-domain`, `asadmin deploy`, `asadmin deploydir`, and `asadmin undeploy`.
    In case of a typo, `asadmin` will give you a choice of the closest matching command.
    Try `asadmin resource`, for instance, and `asadmin` will give you the related
    commands as shown on Figure 1-17. With GlassFish v3, `asadmin` is set to implement
    command history and completion.


    ![Image 23](index-67_1.jpg)


    **Figure 1-17.** *`asadmin` CLI*


    ## Installing GlassFish


    GlassFish v2 can be installed in various profiles (each profile is a set of features
    and configurations). The most common for you will be the developer profile. If
    you want to start using the clustering capabilities of GlassFish, you can either
    install using the cluster profile or update an existing installation using the
    Add Cluster Support choice in the admin console. In the case of GlassFish v3 (required
    for running Java EE 6 applications), there is only the developer profile for the
    moment.


    GlassFish can be downloaded via multiple distribution mechanisms. The most obvious
    choices are to get it from [http://glassfish.org](http://glassfish.org), or with
    the Java EE SDK or the NetBeans IDE. I’ll document here how to download and install
    GlassFish from the community web site.


    Go to the main download page, [https://glassfish.dev.java.net/public/downloadsindex.html](https://glassfish.dev.java.net/public/downloadsindex.html),
    and select GlassFish Server v3 *(not v3 Prelude)*. At the time of writing, only
    milestone and promoted builds were available. Once GlassFish v3 is released in
    final form, it will certainly be highlighted appropriately on the main [http://glassfish.org](http://glassfish.org)
    home page. Note that GlassFish v3 offers a web and a regular download. Select
    the appropriate archive for your platform and application requirements (the Unix
    distribution will work on Linux, Solaris, and Mac OS X).


    Executing the shell will start the graphical installer, which will:


    - Ask you to agree to the license.

    - Request an install location.

    - Let you configure an admin username and password (or default to an anonymous
    user).

    - Let you configure HTTP and admin ports (while checking that they’re not already
    in use).

    - Install and enable the update tool (`pkg` and `updatetool` clients).


    ![Image 24](index-68_1.jpg)'
