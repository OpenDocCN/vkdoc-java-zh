    “JSP 标准标签库”一节展示了如何通过标签库扩展 JSP。JSP 中的 taglib 指令声明页面使用了某个特定的标签库，该标签库通过 URI 和前缀唯一标识。在
    XML 中，它转换为给定 URI 下的唯一命名空间（xmlns）。在以下示例中，[`java.sun.com/jstl/core 标签库通过前缀 c 提供给页面使用`](http://java.sun.com/jstl/core)：


    < **%@ taglib** [uri="http://java.sun.com/jstl/core" prefix="](http://java.sun.com/jstl/core)
    **c**" %>


    < **jsp:root xmlns:c**[="http://java.sun.com/jstl/core">](http://java.sun.com/jstl/core)


    **脚本元素**


    脚本元素用于操作对象，并通过包含 Java 代码来执行影响内容的计算。脚本元素分为三类：声明、脚本片段和表达式。它们可以通过两种不同的语法来定义。


    < **%!** 这是一个声明 %>


    < **jsp:declaration**>这是一个声明</jsp:declaration>


    < **%** 这是一个脚本片段 %>


    < **jsp:scriptlet**>这是一个脚本片段</jsp:scriptlet>


    < **%=** 这是一个表达式 %>


    < **jsp:expression**>这是一个表达式</jsp:expression>


    声明用于声明 Java 变量或方法，这些变量或方法可供页面的所有其他脚本元素使用。声明仅出现在翻译后的 JSP（即 Servlet）中，而不会出现在发送给客户端的输出中。在声明元素中声明的任何变量或方法都会成为
    JSP 的实例方法，并且对整个页面是全局的。例如，你可以如下声明一个 ArrayList：


    < **%!** ArrayList books = new ArrayList(); %>


    < **jsp:declaration**>ArrayList books = new ArrayList();</jsp:declaration>


    脚本片段包含用于描述响应请求而执行的操作的 Java 代码。它们可用于执行诸如迭代和条件执行 JSP 中其他元素等操作。与声明一样，脚本片段中的代码出现在翻译后的
    JSP（Servlet）中，但不会出现在发送给客户端的输出中。例如，你向一个 ArrayList 添加一个 Book 对象，如下所示：


    第 11 章 ■ 页面与组件


    **293**


    < **%**


    books.add(new Book("H2G2", 12f, "Scifi IT book", "1234-234", 241, true));


    %>


    < **jsp:scriptlet**>


    books.add(new Book("H2G2", 12f, "Scifi IT book", "1234-234", 241, true));


    </jsp:scriptlet>


    表达式用于将 Java 表达式的值输出到客户端。它们在响应时被求值，结果被转换为字符串并插入到输出流中，以便在浏览器中显示。例如，以下代码片段将显示一本书的
    ISBN：


    < **%=** book.getIsbn()%>


    < **jsp:expression**>book.getIsbn()</jsp:expression>


    声明、脚本片段和表达式必须包含有效的 Java 代码。当你选择使用 XML 语法时，其内容必须是有效的 XML。例如，要使用泛型声明一个 ArrayList
    来存放书籍，你可以这样做：


    <%! ArrayList**<Book>** books = new ArrayList**<Book>** (); %> 如果你以严格的 XML 格式声明这个数组列表，它将无效，因为你包含了
    < 和 > 符号，而这些符号在 XML 中已经具有打开和关闭标签的含义。为了允许这样的声明，你必须使用 CDATA。术语 CDATA（代表字符数据）用于指示
    XML 解析器不应解析的内容。


    <jsp:declaration> **<![CDATA[**


    ArrayList<Book> books = new ArrayList<Book>();


    **]]>** </jsp:declaration>


    **动作元素**


    标准动作由 JSP 规范定义，它们使页面执行某些操作（包含外部资源、将请求转发到另一个页面，或使用 Java 对象的属性）。它们看起来类似于 HTML 标签，因为它们使用带有
    jsp 前缀的 XML 元素表示（例如，<jsp:useBean>、<jsp:include> 等）。表 11-1 列出了所有可用的动作元素。


    **表 11-1.** *JSP 动作元素*


    **动作**


    **描述**


    useBean


    在给定作用域内关联一个对象实例，并通过给定 ID 使其可用。


    setProperty


    设置 Bean 中属性的值。


    getProperty


    显示 Bean 属性的值。


    include


    允许在与当前页面相同的上下文中包含静态和动态资源。


    *续*


    ![Image 93](img/index-324_1.jpg)


    **294**


    第 11 章 ■ 页面与组件


    **表 11-1.** *续*


    **动作**


    **描述**


    forward


    将当前请求分派给与当前页面相同上下文中的静态资源、JSP 或 Servlet。


    param


    用于 include、forward 和 params 元素中。被包含或转发的页面将看到原始请求对象，其原始参数会附加新参数。


    plugin


    使 JSP 能够生成包含适当浏览器相关结构（OBJECT 或 EMBED）的 HTML，这些结构将导致下载插件。


    params


    传递参数。这是 plugin 动作的一部分。


    element


    动态定义 XML 元素标签的值。


    attribute


    定义 XML 属性。这是 element 动作的一部分。


    body


    定义 XML 元素的主体。这是 element 动作的一部分。


    **综合运用**


    这些元素允许你调用 Java 代码和任何类型的组件（EJB、数据库、Web 服务等）。作为示例，让我们编写一些 Java 代码。你想要创建的网页必须显示存储在
    ArrayList 中的书籍列表。这里没有数据库访问，只有一个用固定数量的 Book 对象初始化的 ArrayList，JSP 遍历该列表并显示属性（ISBN、书名、描述等）。结果应如图
    11-5 所示。


    **图 11-5.** *listBooks.jsp 页面显示书籍列表*


    要构建此页面，你需要几个元素。如清单 11-5 所示，你需要使用指令元素（<%@ page import="java.util.ArrayList" %>）导入
    java.util.ArrayList 和 Book 类。导入后，你需要声明类型为 ArrayList 的 books 属性，以便在整个页面中访问它。为此，你需要一个类型为声明的脚本元素（<%!
    ArrayList<Book> books = new ArrayList<Book>(); %>）。一个脚本片段将 book 对象添加到 ArrayList
    中，另一个脚本片段使用 for 语句遍历列表。为了显示每本书的属性，使用了表达式元素（<%= book.getTitle()%>）。页面的完整代码如清单 11-5
    所示。


    第 11 章 ■ 页面与组件


    **295**


    **清单 11-5.** *listBooks.jsp 页面*


    **<%@ page import="com.apress.javaee6.chapter11.Book" %>**


    **<%@ page import="java.util.ArrayList" %>**


    **<%!**


    **ArrayList<Book> books = new ArrayList<Book>();**


    **%>**


    <html>


    <head>


    <title>列出所有书籍</title>


    </head>


    <body>


    <h1>列出所有书籍</h1>


    <hr/>


    **<%**


    books.add(new Book("H2G2", 12f, "Scifi IT book", "1234-234", 241, true)); books.add(new
    Book("Robots", 18.5f, "Best seller", "564-694", 317, true)); books.add(new Book("Dune",
    23.25f, "The trilogy", "256-6-56", 529, true));


    **%>**


    <table border="1">


    <tr>


    <td>ISBN</td>


    <td>标题</td>


    <td>价格</td>


    <td>描述</td>


    <td>页数</td>


    <td>插图</td>


    </tr>


    **<%**


    **Book book;**


    **for (int i = 0; i < books.size(); i++) {**


    **book = books.get(i);**


    **%>**


    <tr>


    <td> **<%= book.getIsbn()%>** </td>


    <td><%= book.getTitle()%></td>


    <td><%= book.getPrice()%></td>


    <td><%= book.getDescription()%></td>


    <td><%= book.getNbOfPage()%></td>


    <td><%= book.getIllustrations()%></td>


    </tr>


    **<%**


    **} // for 语句结束**


    **%>**


    </table>


    <hr/>


    <i>APress - Beginning Java EE 6</i>


    </body>


    </html>


