    **总结**


    前一章探讨了 JSF 的图形化方面，而本章则聚焦于其动态特性。JSF 遵循 MVC 设计模式，其规范涵盖了从使用组件创建用户界面到使用受管 Bean 处理数据的各个方面。


    受管 Bean 是 JSF 的核心，因为它们用于处理业务逻辑、调用 EJB、数据库等，以及在页面之间进行导航。它们具有作用域和生命周期（类似于无状态会话 Bean），并声明了通过表达式语言绑定到
    UI 组件的方法和属性。注解和异常配置极大地简化了 JSF 2.0，因为现在大部分 XML 配置都是可选的。


    接着，我展示了如何在任何输入组件上处理转换和验证。JSF 为大多数常见情况定义了一组转换器和验证器，但也允许你轻松创建和注册自定义的转换器和验证器。


    虽然 Ajax 技术已经存在多年，但 JSF 2.0 提供了标准支持，允许网页异步调用受管 Bean。它定义了一个标准的 JavaScript 库，开发者无需编写脚本，而是使用函数来刷新页面的部分内容。


    接下来的三章将重点介绍如何通过消息传递、SOAP Web 服务和 RESTful Web 服务与系统进行互操作。


    第 13 章


    发送消息


    到目前为止，你所看到的大多数组件间通信都是同步的：一个类调用另一个类，受管 Bean 调用 EJB，EJB 再调用实体，等等。在这种情况下，调用方和目标必须同时运行才能通信成功，并且调用方必须等待目标完成才能继续。除了
    EJB 中的异步调用外，大多数 Java EE 组件都使用同步调用（本地或远程）。当我们谈论消息传递时，我们指的是组件之间松散耦合的异步通信。


    面向消息的中间件（MOM）是一种软件（提供者），它支持异构系统之间的异步消息传递。它可以看作是系统之间的缓冲区，这些系统以各自的速度生产和消费消息（例如，一个系统全天候运行，另一个系统仅在夜间运行）。它本质上是松散耦合的，因为发送方不知道通信通道另一端的谁会接收消息并执行操作。发送方和接收方不必同时在线才能通信。事实上，它们甚至不知道彼此的存在，因为它们使用中间缓冲区。在这方面，MOM
    与远程方法调用（RMI）等技术完全不同，后者要求应用程序知道远程应用程序方法的签名。


    如今，典型的企业拥有许多应用程序，这些应用程序通常用不同的语言编写，执行定义明确的任务。MOM 允许这些应用程序独立工作，同时成为信息工作流过程的一部分。只要发送方和接收方就消息格式和中间目的地达成一致，消息传递就是以松散耦合、异步方式集成现有和新应用程序的良好解决方案。这种通信可以在组织内部本地进行，也可以分布在多个外部服务之间。


    **理解消息**


    MOM 已经存在了一段时间，它使用一套特殊的词汇。当发送消息时，存储消息并分发它的软件称为*提供者*（有时也称为*代理*）。消息发送方称为*生产者*，消息存储的位置称为*目的地*。接收消息的组件称为*消费者*。任何对该特定目的地上的消息感兴趣的组件都可以消费它。图
    13-1 说明了这些概念。


    **357**


    ![Image 112](img/index-388_1.jpg)


    **358**


    第 13 章 ■ 发送消息


    **图 13-1.** *MOM 架构*


    在 Java EE 中，处理这些概念的 API 称为 Java 消息服务（JMS）。它拥有一组接口和类，允许你连接到提供者、创建消息、发送消息和接收消息。JMS
    实际上并不传输消息；它需要一个负责处理消息的提供者。在容器中运行时，可以使用消息驱动 Bean（MDB）以容器管理的方式接收消息。


    **JMS**


    JMS 是一个标准的 Java API，允许应用程序异步地创建、发送、接收和读取消息。它定义了一组通用的接口和类，使程序能够与其他消息提供者通信。JMS 类似于
    JDBC：后者连接到各种数据库（Derby、MySQL、Oracle、DB2 等），而 JMS 连接到各种提供者（OpenMQ、MQSeries、SonicMQ
    等）。


    JMS API 涵盖了消息传递所需的所有功能，即通过目的地发送和接收消息。它提供了：


    • *消息生产者*：JMS 为客户端生成消息提供了 API（也称为发送者和发布者）。


    • *消息消费者*：该 API 允许客户端应用程序消费消息（也称为接收者或订阅者）。


    • *消息*：消息由标头、属性和包含不同信息（文本、对象等）的消息体组成。


    • *连接和目的地*：该 API 拥有多个工厂，可以从中获取与提供者的连接以及目的地（队列和主题）。


    **MDB**


    MDB 是在 EJB 容器内执行的异步消息消费者。正如你在第 6 章到第 9 章中所看到的，容器负责处理多项服务（事务、安全性、并发性、消息确认等），而 MDB
    则专注于消费 JMS 消息。MDB 是无状态的，这意味着 EJB 容器可以拥有大量

