    假设有四个实体，它们之间通过不同的基数（一对一、一对多）相互关联。在第一种情况（见图 3-20）中，它们都具有**急加载**关系。这意味着，一旦你加载了 Class1（通过
    ID 查找或查询），所有依赖的对象都会自动加载到内存中。这可能会影响系统的性能。


    **图 3-20.** *具有急加载关系的四个实体*


    再看相反的情况，所有关系都使用**懒加载**模式（见图 3-21）。当你加载 Class1 时，不会加载其他任何内容（当然，除了 Class1 的直接属性）。你需要显式地访问
    Class2（例如，通过 getter 方法）来告知持久化提供者从数据库加载数据，依此类推。如果你想操作整个对象图，你需要显式地调用每个实体：


    class1.getClass2().getClass3().getClass4()


    **图 3-21.** *具有懒加载关系的四个实体*


    **102**


    第 3 章 ■ 对象关系映射


    但不要认为 EAGER 是邪恶的，而 LAZY 是好的。EAGER 会通过少量的数据库访问将所有数据加载到内存中（持久化提供者可能会使用连接查询来连接表并提取数据）。使用
    LAZY，你不会有填满内存的风险，因为你可以控制加载哪个对象。但每次都需要访问数据库。


    fetch 参数非常重要，因为如果使用不当，可能会导致性能问题。每个注解都有一个默认的 fetch 值，你需要了解它，并在不适用时进行更改（见表 3-2）。


    **表 3-2.** *默认抓取策略*


    **注解**


    **默认抓取策略**


    @OneToOne


    EAGER


    @ManyToOne


    EAGER


    @OneToMany


    LAZY


    @ManyToMany


    LAZY


    当你在应用程序中加载一个采购订单时，你总是需要访问其订单行。因此，将 @OneToMany 注解的默认抓取模式更改为 EAGER 可能是高效的（见清单 3-52）。


    **清单 3-52.** *一个与 OrderLine 具有急加载关系的 Order*


    @Entity


    public class Order {


    @Id @GeneratedValue


    private Long id;


    @Temporal(TemporalType.TIMESTAMP)


    private Date creationDate;


    **@OneToMany(fetch = FetchType.EAGER)**


    private List<OrderLine> orderLines;


    // 构造方法、getter、setter


    }


    **排序关系**


    对于一对多或多对多关系，你的实体处理的是对象集合。在 Java 端，这些集合通常是无序的。关系数据库也不会在其表中保留任何顺序。因此，如果你想要一个有序列表，要么以编程方式对集合进行排序，要么使用带有
    Order By 子句的 JPQL 查询。JPA 提供了更简单的机制，基于注解来帮助排序关系。


    第 3 章 ■ 对象关系映射


    **103**


    @OrderBy


    动态排序可以通过 @OrderBy 注解完成。“动态”意味着集合元素的排序是在检索关联时进行的。


    CD-BookStore 应用程序的例子允许用户撰写关于音乐和书籍的新闻。这些新闻是显示在网站上的文本。新闻发布后，人们可以添加评论（见清单 3-53）。在网站上，你希望按时间顺序显示评论，因此排序就派上了用场。


    **清单 3-53.** *一个带有发布日期属性的 Comment 实体*


    @Entity


    public class Comment {


    @Id @GeneratedValue


    private Long id;


    private String nickname;


    private String content;


    private Integer note;


    @Column(name = "posted_date")


    @Temporal(TemporalType.TIMESTAMP)


    private Date **postedDate**;


    // 构造方法、getter、setter


    }


    评论使用 Comment 实体建模，如清单 3-53 所示。它包含内容，由匿名用户（通过昵称标识）发布，该用户在新闻上留下备注，并有一个由系统自动创建的 TIMESTAMP
    类型的发布日期。


    在 News 实体中，如清单 3-54 所示，你希望能够按发布日期降序排列评论列表。为此，你将 @OrderBy 注解与 @OneToMany 注解结合使用。


    **清单 3-54.** *News 实体的评论按发布日期降序排列*


    @Entity


    public class News {


    @Id @GeneratedValue


    private Long id;


    @Column(nullable = false)


    private String content;


    @OneToMany(fetch = FetchType.EAGER)


    **@OrderBy("postedDate desc")**


    private List<Comment> comments;


    // 构造方法、getter、setter


    }


    **104**


    第 3 章 ■ 对象关系映射


    @OrderBy 注解将需要进行排序的属性名称（postedDate 属性）以及排序方式（升序或降序）作为参数。字符串 ASC 或 DESC 可分别用于升序或降序排序。你可以在
    @OrderBy 注解中使用多个列。如果你需要按发布日期和备注排序，可以使用 OrderBy("postedDate desc, note asc")。


    @OrderBy 注解对数据库映射没有任何影响。持久化提供者仅仅被告知在检索集合时使用 order by 子句。


    @OrderColumn


    JPA 1.0 支持使用 @OrderBy 注解进行动态排序，但不包括维护持久化排序的支持。JPA 2.0 通过添加一个新注解解决了这个问题：@OrderColumn（见清单
    3-55）。此注解告知持久化提供者，需要使用一个单独的列来存储索引，以维护有序列表。@OrderColumn 定义了此单独的列。


    **清单 3-55.** *@OrderColumn API 与 @Column 类似*


    @Target({METHOD, FIELD}) @Retention(RUNTIME)


    public @interface **OrderColumn** {


    String name() default "";


    boolean nullable() default true;


    boolean insertable() default true;


    boolean updatable() default true;


    String columnDefinition() default "";


    boolean contiguous() default true;


    int base() default 0;


    String table() default "";


    }


    让我们使用新闻和评论的例子，并稍作修改。这次，Comment 实体（如清单 3-56 所示）没有 postedDate 属性，因此无法按时间顺序对新闻进行排序。


    **清单 3-56.** *一个没有发布日期的 Comment 实体*


    @Entity


    public class Comment {


    @Id @GeneratedValue


    private Long id;


    private String nickname;


    private String content;


    private Integer note;


    // 构造方法、getter、setter


    }


    第 3 章 ■ 对象关系映射


    **105**


    News 实体（如清单 3-57 所示）*可以*做的是用 @OrderColumn 注解该关系。然后，持久化提供者会将 News 实体映射到一个包含额外列的表，以存储排序顺序。


    **清单 3-57.** *评论的排序被持久化*


    @Entity


    public class News {


    @Id @GeneratedValue


    private Long id;


    @Column(nullable = false)


    private String content;


    @OneToMany(fetch = FetchType.EAGER)


    **@OrderColumn("posted_index")**


    private List<Comment> comments;


    // 构造方法、getter、setter


    }


    在清单 3-57 中，@OrderColumn 将额外的列重命名为 POSTED_INDEX。如果未覆盖名称，默认情况下，列名是引用实体名称与 _ORDER
    字符串的拼接（在我们的例子中是 COMMENT_ORDER）。此列的类型必须是数值类型。


    需要注意性能影响；与 @OrderColumn 注解一样，持久化提供者还必须跟踪索引的更改。它负责在插入、删除或重新排序时维护顺序。如果数据被插入到现有已排序信息列表的中间，持久化提供者将不得不重新排序整个索引。

