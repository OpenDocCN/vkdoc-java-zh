  raw: '• The class must be defined as public, and must not be final or abstract.


    • The class must have a public no-arg constructor that the container will use
    to create instances of the MDB.


    • The class must not define the finalize() method.


    The MDB class is allowed to implement other methods, invoke other resources, and
    so


    on. MDBs are deployed in a container and can be optionally packaged with an ejb-jar.xml
    file. Following the “ease of use” model of Java EE 6, an MDB can be simply an
    annotated POJO, eliminating most of the configuration. However, if you still need
    to customize the JMS configuration, you can use the elements of the @MessageDriven
    and @ActivationConfigProperty annotations (or XML equivalent).


    @MessageDriven


    MDBs are one of the simplest kinds of EJBs to develop, as they support the smallest
    number of annotations. The @MessageDriven annotation (or XML equivalent) is mandatory,
    as it is the piece of metadata the container requires to recognize that the Java
    class is actually an MDB.


    The API of the @MessageDriven annotation, shown in Listing 13-9, is very simple,
    and all elements are optional.


    **Listing 13-9.** *@MessageDriven Annotation API*


    @Target(TYPE) @Retention(RUNTIME)


    public @interface **MessageDriven** {


    String name() default "";


    Class messageListenerInterface default Object.class;


    ActivationConfigProperty[] activationConfig() default {};


    String mappedName();


    String description();


    }


    Chapter 13 ■ SeNDING MeSSaGeS


    **381**


    The name element specifies the name of the MDB (which by default is the name of
    the


    class). messageListenerInterface specifies which message listener the MDB implements


    (if the MDB implements multiple interfaces, it tells the EJB container which one
    is the MessageListener interface). The mappedName element is the JNDI name of
    the destination that the MDB should be listening to. description is just a string,
    used to give a description of the MDB once deployed. The activationConfig element
    is used to specify configuration properties and takes an array of @ActivationConfigProperty
    annotations.


    @activationConfigproperty


    JMS allows configuration of certain properties such as message selectors, acknowledgement
    mode, durable subscribers, and so on. In an MDB, these properties can be set using
    the


    @ActivationConfigProperty annotation. This optional annotation can be provided
    as one of the parameters for the @MessageDriven annotation, and compared to the
    JMS equivalent, the


    @ActivationConfigProperty is very basic, consisting of a name-value pair (see
    Listing 13-10).


    **Listing 13-10.** *ActivationConfigProperty Annotation API*


    @Target({}) @Retention(RUNTIME)


    public @interface **ActivationConfigProperty** {


    String propertyName();


    String propertyValue();


    }


    The activationConfig property allows you to provide messaging system–specific
    configu-


    ration, meaning that properties are not portable across JMS providers. For OpenMQ,
    the code in Listing 13-11 sets the acknowledge mode and the message selector.


    **Listing 13-11.** *Setting Properties on MDBs*


    @MessageDriven(mappedName = "jms/javaee6/Topic", activationConfig = {


    **@ActivationConfigProperty**(propertyName = " **acknowledgeMode**", ➥


    propertyValue = "Auto-acknowledge"),


    **@ActivationConfigProperty**(propertyName = " **messageSelector**", ➥


    propertyValue = "orderAmount < 3000")


    })


    public class BillingMDB implements MessageListener {


    public void onMessage(Message message) {


    TextMessage msg = (TextMessage)message;


    System.out.println("Message received: " + msg.getText());


    }


    }


    Each activation property is a name-value pair that the underlying messaging provider


    understands and uses to set up the MDB. Table 13-5 lists some properties used
    by OpenMQ


    (you should consult the documentation if you use a different JMS provider).


