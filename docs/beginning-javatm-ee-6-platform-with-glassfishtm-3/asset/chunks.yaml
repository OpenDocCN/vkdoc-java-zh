    **Easier to Use**


    Besides making the platform lighter, one aim of Java EE 6 was also to make it
    easier to use. A direction taken by this version was to apply the ease-of-use
    paradigm to the web tier. Java EE


    components need metadata to instruct the container about components’ behavior.
    Before


    Java EE 5, the only format you could use was the XML deployment descriptor file,
    but annotations appeared in EJBs, entities, and web services. With less XML to
    write, components would be easier to package and deploy. In Java EE 5, the enterprise
    tier was rearchitected, and the components moved toward POJOs and interfaces.
    But the web tier didn’t benefit from these improvements.


    Today in Java EE 6, servlets, JSF managed beans, JSF converters, validators, and
    renderers are also annotated classes with optional XML deployment descriptors.
    Listing 1-1 shows a JSF managed bean that turns out to be a Java class with a
    single annotation. If you are already familiar with JSF, you will be pleased to
    know that in most cases, the faces-config.xml file becomes optional (if you don’t
    know JSF, you will learn about it in Chapters 10 through 12).


