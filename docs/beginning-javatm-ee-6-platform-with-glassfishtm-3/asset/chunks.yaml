    可以使用 `EntityManager.remove()` 方法移除实体。一旦被移除，该实体将从数据库中删除，与实体管理器分离，并且无法再与数据库同步。就
    Java 对象而言，该实体在超出作用域并被垃圾回收器清理之前仍然可以访问。清单 4-12 中的代码展示了如何在创建对象后将其移除。


    **清单 4-12.** *创建并移除 Customer 和 Address 实体*


    Customer customer = new Customer("Antony", "Balla", "tballa@mail.com");


    Address address = new Address("Ritherdon Rd", "London", "8QE", "UK"); customer.setAddress(address);


    tx.begin();


    **em.persist(customer);**


    **em.persist(address);**


    tx.commit();


    tx.begin();


    **em.remove(customer);**


    tx.commit();


    // 数据已从数据库中删除


    // 但对象仍然可以访问


    assertNotNull(**customer**);


    清单 4-12 中的代码创建了 Customer 和 Address 的实例，将它们关联起来（customer.setAddress(address)），并进行了持久化。在数据库中，customer
    行通过外键与 address 关联；在后续代码中，仅删除了 Customer。


    根据级联配置方式的不同，Address 可能没有其他实体引用它。这个 address 行就变成了孤儿。


    **孤儿移除**


    为了数据一致性，孤儿是不受欢迎的，因为它们会导致数据库中存在未被任何其他表引用且无法访问的行。使用 JPA，你可以通知持久化提供程序自动移除孤儿，或者级联移除操作（稍后会看到）。如果目标实体（Address）由源实体（Customer）私有拥有，意味着一个目标绝不能同时被多个源拥有，并且该源被应用程序删除，那么提供程序也应该删除该目标。


    被指定为一对一或一对多的关联支持使用孤儿移除选项。为了在示例中包含此选项，让我们看看如何将 `orphanRemoval=true` 元素添加到 `@OneToOne`
    注解中（参见清单 4-13）。


    第 4 章 ■ 管理持久化对象


    **131**


    **清单 4-13.** *处理孤儿 Address 移除的 Customer 实体*


    @Entity


    public class Customer {


    @Id @GeneratedValue


    private Long id;


    private String firstName;


    private String lastName;


    private String email;


    @OneToOne (fetch = FetchType.LAZY, **orphanRemoval=true**)


    private Address address;


    // 构造方法、getter、setter


    }


    使用此映射，清单 4-12 中的代码将在移除 customer 时自动移除 Address 实体。移除操作在刷新操作（事务提交）时执行。


    **与数据库同步**


    到目前为止，与数据库的同步都是在提交时完成的。实体管理器是一个一级缓存，等待事务提交以将数据刷新到数据库，但是当需要插入一个 customer 和一个 address
    时会发生什么？


    tx.begin();


    **em.persist(customer);**


    **em.persist(address);**


    tx.commit();


    所有待处理的更改都需要一条 SQL 语句，生成两条 insert 语句，并且只有在数据库事务提交时才会永久生效。对于大多数应用程序来说，这种自动数据同步就足够了。尽管无法确切知道提供程序在哪个时间点将更改刷新到数据库，但可以确定它发生在事务提交过程中。数据库与持久化上下文中的实体同步，但数据可以显式刷新到数据库（flush），或者实体可以从数据库刷新数据（refresh）。如果数据在某个时间点被刷新到数据库，并且稍后在代码中应用程序调用了
    `rollback()` 方法，那么已刷新的数据将从数据库中撤出。


    **刷新数据**


    使用 `EntityManager.flush()` 方法，可以显式强制持久化提供程序刷新数据，允许开发者手动触发实体管理器内部用于刷新持久化上下文的相同过程。


    tx.begin();


    em.persist(customer);


    **em.flush();**


    **132**


    第 4 章 ■ 管理持久化对象


    em.persist(address);


    tx.commit();


    上述代码中发生了两件有趣的事情。第一，`em.flush()` 不会等待事务提交，而是强制提供程序刷新持久化上下文。在刷新时会生成并执行一条 insert
    语句。第二，由于完整性约束，这段代码将无法工作。如果没有显式刷新，实体管理器会缓存所有更改，并以对数据库一致的方式排序和执行它们。使用显式刷新，针对 CUSTOMER
    的 insert 语句将被执行，但会违反 address 外键的完整性约束（CUSTOMER 表中的 ADDRESS_FK 列）。这将导致事务回滚。已刷新的数据也会被回滚。应谨慎使用显式刷新，并且仅在需要时使用。


    **刷新实体**


    `refresh()` 方法用于与 `flush` 方向相反的数据同步，这意味着它会用数据库中当前存在的数据覆盖托管实体的当前状态。一个典型的情况是使用 `EntityManager.refresh()`
    方法来撤消仅对内存中的实体所做的更改。清单 4-14 中的测试类片段按 ID 查找 Customer，更改其名字，并使用 `refresh()` 方法撤消此更改。


    **清单 4-14.** *从数据库刷新 Customer 实体*


    Customer customer = em.find(Customer.class, 1234L)


    assertEquals(customer.getFirstName(), " **Antony**");


    customer.setFirstName(" **William**");


    **em.refresh(customer);**


    assertEquals(customer.getFirstName(), " **Antony**");


    **持久化上下文的内容**


    持久化上下文保存着托管实体。使用 `EntityManager` 接口，你可以检查实体是否正在被管理，并从持久化上下文中清除所有实体。


    **包含**


    实体要么被实体管理器管理，要么不被管理。`EntityManager.contains()` 方法返回一个布尔值，允许检查特定实体实例当前是否在当前持久化上下文中被实体管理器管理。在清单
    4-15 的测试用例中，Customer 被持久化，你可以立即检查该实体是否被管理（`em.contains(customer)`）。答案是 true。之后，调用
    `remove()` 方法，该实体从数据库和持久化上下文中被移除（`em.contains(customer)` 返回 false）。


    第 4 章 ■ 管理持久化对象


    **133**


    **清单 4-15.** *测试 Customer 实体是否在持久化上下文中*


    Customer customer = new Customer("Antony", "Balla", "tballa@mail.com");


    tx.begin();


    em.persist(customer);


    tx.commit();


    assert**True**(**em.contains(customer)**);


    tx.begin();


    em.remove(customer);


    tx.commit();


    assert**False**(**em.contains(customer)**);


    **清除和分离**


    `clear()` 方法很直接：它清空持久化上下文，导致所有托管实体变为分离状态。`detach(Object entity)` 方法从持久化上下文中移除给定的实体。在此类驱逐发生后，对实体所做的更改将不会同步到数据库。清单
    4-16 创建了一个实体，检查它是否被管理，将其从持久化上下文中分离，并检查它是否已分离。


    **清单 4-16.** *检查 Customer 实体是否在持久化上下文中*


    Customer customer = new Customer("Antony", "Balla", "tballa@mail.com");


    tx.begin();


    em.persist(customer);


    tx.commit();


    **assertTrue**(em.contains(customer));


    **em.detach(customer);**


    **assertFalse**(em.contains(customer));

