    在第 7 章中，你看到了几个会话 Bean、注解和接口的示例，但从未涉及任何与事务相关的内容。清单 9-1 展示了一个使用 CMT 的无状态会话 Bean
    的代码。如你所见，既没有添加额外的注解，也没有实现特殊的接口。EJB 本质上是支持事务的。通过“异常配置”方式，所有事务管理默认值都会被应用（REQUIRED
    是默认的事务属性，稍后将在本节中解释）。


    **清单 9-1.** *一个使用 CMT 的无状态 Bean*


    **@Stateless**


    public class ItemEJB {


    @PersistenceContext(unitName = "chapter09PU")


    private EntityManager **em**;


    **@EJB**


    private InventoryEJB **inventory**;


    public List<Book> findBooks() {


    Query query = **em**.createNamedQuery("findAllBooks");


    return query.getResultList();


    }


    public Book createBook(Book book) {


    **em.persist(book);**


    **inventory.addItem(book);**


    return book;


    }


    }


    ![Image 81](img/index-275_1.jpg)


    第 9 章 ■ 事务与安全


    **245**


    你可能会问，是什么让清单 9-1 中的代码具有事务性？答案是容器。图 9-5 展示了当客户端调用`createBook()`方法时发生的情况。客户端调用被容器拦截，容器在调用方法之前立即检查是否有事务上下文与该调用关联。默认情况下，如果没有可用的事务上下文，容器会在进入方法之前开始一个新事务，然后调用`createBook()`方法。一旦方法退出，容器会自动提交事务或回滚事务（如果抛出了特定类型的异常，你将在后面的“异常处理”一节中看到）。


    **图 9-5.** *容器处理事务。*


    有趣的是，在清单 9-1 和图 9-5 中，一个 Bean 的业务方法（`ItemEJB.createBook()`）可以是另一个 Bean 的业务方法（`InventoryEJB.addItem()`）的客户端。默认行为是，无论`createBook()`使用什么事务上下文（来自客户端或由容器创建），该上下文都会应用于`addItem()`。只有当两个方法都成功返回时，才会最终提交。这种行为可以通过元数据（注解或
    XML 部署描述符）进行更改。根据你选择的事务属性（REQUIRED、REQUIRES_NEW、SUPPORTS、MANDATORY、NOT_SUPPORTED
    或 NEVER），你可以影响容器划分事务的方式：容器使用客户端的事务、在新事务中运行方法、在无事务状态下运行方法，或者抛出异常。表 9-3 定义了这些事务属性。


    **表 9-3.** *CMT 属性*


    **属性**


    **描述**


    REQUIRED


    此属性为默认值，意味着方法必须始终在事务内被调用。如果方法是从非事务性客户端调用的，容器会创建一个新事务。如果客户端有事务上下文，则业务方法在客户端的事务内运行。如果你修改了任何数据，并且不知道客户端是否已启动事务，则应使用
    REQUIRED。


    REQUIRES_NEW


    无论客户端是否在事务内执行，容器在执行方法之前总是创建一个新事务。如果客户端正在事务内运行，容器会暂时挂起该事务，创建第二个事务，提交它，然后恢复第一个事务。这意味着第二个事务的成功或失败对现有的客户端事务没有影响。当你不想让回滚影响客户端时，应使用
    REQUIRES_NEW。


    *续*


    ![Image 82](img/index-276_1.jpg)


    **246**


    第 9 章 ■ 事务与安全


    **表 9-3.** *续*


    **属性**


    **描述**


    SUPPORTS


    EJB 方法继承客户端的事务上下文。如果事务上下文可用，则方法使用它；如果不可用，容器则在无事务上下文的情况下调用该方法。当你对数据库表进行只读访问时，应使用
    SUPPORTS。


    MANDATORY

    '
- fmt: "# Transaction Attributes in EJB\n\nThe container requires a transaction before\
    \ invoking the business method but should not create a new one. If the client\
    \ has a transaction context, it is propagated; if not, a `javax.ejb.EJBTransactionRequiredException`\
    \ is thrown.\n\n## NOT_SUPPORTED\n\nThe EJB method cannot be invoked in a transaction\
    \ context. If the client has no transaction context, nothing happens; if it does,\
    \ the container suspends the client’s transaction, invokes the method, and then\
    \ resumes the transaction when the method returns.\n\n## NEVER\n\nThe EJB method\
    \ must not be invoked from a transactional client. If the client is running within\
    \ a transaction context, the container throws a `javax.ejb.EJBException`.\n\n\
    Figure 9-6 illustrates all the possible behaviors that an EJB can have depending\
    \ on the presence or not of a client’s transaction context. For example, if the\
    \ `createBook()` method doesn’t have a transaction context and invokes `addItem()`\
    \ with a `MANDATORY` attribute, an exception is thrown. The bottom part of Figure\
    \ 9-6 shows the same combinations but with a client that has a transaction context.\n\
    \n**Figure 9-6.** *Two calls made to `InventoryEJB` with different transaction\
    \ policies*\n\nTo apply one of these six demarcation attributes to your session\
    \ bean, you have to use the `@javax.ejb.TransactionAttribute` annotation or the\
    \ deployment descriptor (setting the `<trans-attribute>` element in the `ejb-jar.xml`).\
    \ This metadata can be applied either to individual methods or to the entire bean.\
    \ If applied at the bean level, all business methods will inherit the bean’s transaction\
    \ attribute value. Listing 9-2 shows how the `ItemEJB` uses a `SUPPORT` transaction\
    \ demarcation policy and overrides the `createBook()` method with `REQUIRED`.\n\
    \n**Listing 9-2.** *A Stateless Bean with CMT*\n\n```java\n@Stateless\n@TransactionAttribute(TransactionAttributeType.SUPPORTS)\n\
    public class ItemEJB {\n    @PersistenceContext(unitName = \"chapter09PU\")\n\
    \    private EntityManager em;\n\n    @EJB\n    private InventoryEJB inventory;\n\
    \n    public List<Book> findBooks() {\n        Query query = em.createNamedQuery(\"\
    findAllBooks\");\n        return query.getResultList();\n    }\n\n    @TransactionAttribute(TransactionAttributeType.REQUIRED)\n\
    \    public Book createBook(Book book) {\n        em.persist(book);\n        inventory.addItem(book);\n\
    \        return book;\n    }\n}\n```\n\n> **Note:** Client transaction context\
    \ does not propagate with asynchronous method invocation. MDBs support only the\
    \ `REQUIRED` and `NOT_SUPPORTED` attributes as explained in Chapter 13.\n\n##\
    \ Marking a CMT for Rollback\n\nYou’ve seen that the EJB container demarcates\
    \ transactions automatically and invokes `begin`, `commit`, and `rollback` operations\
    \ on your behalf. But as a developer, you might want to prevent the transaction\
    \ from being committed if some error or business condition is encountered.\n\n\
    It is important to stress that a CMT bean is not allowed to roll back the transaction\
    \ explicitly. Instead, you need to use the EJB context (see the “Session Context”\
    \ section in Chapter 7) to inform the container to roll back.\n\nAs you can see\
    \ in Listing 9-3, the `InventoryEJB` has a `oneItemSold()` method that accesses\
    \ the database through the persistence manager, and sends a JMS message to inform\
    \ the shipping company that an item has been sold and should be delivered. If\
    \ the inventory level is equal to zero (which means no more items are available),\
    \ the method needs to explicitly roll back the transaction. To do so, the stateless\
    \ bean first needs to obtain the `SessionContext` through dependency injection\
    \ and then call its `setRollbackOnly()` method. Calling this method doesn’t roll\
    \ back the transaction immediately; instead a flag is set for the container to\
    \ do the actual rollback when it is time to end the transaction.\n\n**Listing\
    \ 9-3.** *A Stateless Bean Marks the Transaction for Rollback*\n\n```java\n@Stateless\n\
    public class InventoryEJB {\n    @PersistenceContext(unitName = \"chapter09PU\"\
    )\n    private EntityManager em;\n\n    @Resource\n    private SessionContext\
    \ ctx;\n\n    public void oneItemSold(Item item) {\n        em.merge(item);\n\
    \    }\n}\n```"
