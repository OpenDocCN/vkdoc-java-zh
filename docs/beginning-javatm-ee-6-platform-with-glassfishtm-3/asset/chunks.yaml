    \ and that’s what you do when you use the `maven-jar-plugin`. You add a `Main-Class`\
    \ element to the `MANIFEST` pointing to the consumer `Main` class. This will allow\
    \ execution of the `jar` file.\n\n**Listing 14-27.** *The pom.xml File Generates\
    \ the Consumer Artifacts and Packages*\n\n```xml\n<project xmlns=\"http://maven.apache.org/POM/4.0.0\"\
    \n         xsi:schemaLocation=\"http://maven.apache.org/POM/4.0.0\n         http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
    >\n    <modelVersion>4.0.0</modelVersion>\n    <groupId>com.apress.javaee6</groupId>\n\
    \    <artifactId>chapter14-consumer</artifactId>\n    <packaging>jar</packaging>\n\
    \    <version>1.0</version>\n    <dependencies>\n        <dependency>\n      \
    \      <groupId>com.sun.xml.ws</groupId>\n            <artifactId>jaxws-rt</artifactId>\n\
    \            <version>2.2</version>\n            <scope>provided</scope>\n   \
    \     </dependency>\n    </dependencies>\n    <build>\n        <plugins>\n   \
    \         <plugin>\n                <groupId>org.apache.maven.plugins</groupId>\n\
    \                <artifactId>maven-jar-plugin</artifactId>\n                <version>2.2</version>\n\
    \                <configuration>\n                    <archive>\n            \
    \            <manifest>\n                            <mainClass>com.apress.javaee6.chapter14.Main</mainClass>\n\
    \                        </manifest>\n                    </archive>\n       \
    \         </configuration>\n            </plugin>\n            <plugin>\n    \
    \            <groupId>org.codehaus.mojo</groupId>\n                <artifactId>jaxws-maven-plugin</artifactId>\n\
    \                <executions>\n                    <execution>\n             \
    \           <goals>\n                            <goal>wsimport</goal>\n     \
    \                   </goals>\n                        <configuration>\n      \
    \                      <wsdlUrls>\n                                <wsdlUrl>\n\
    \                                    http://localhost:8080/chapter14-service-1.0/CardValidatorService?wsdl\n\
    \                                </wsdlUrl>\n                            </wsdlUrls>\n\
    \                            <keep>true</keep>\n                        </configuration>\n\
    \                    </execution>\n                </executions>\n           \
    \ </plugin>\n            <plugin>\n                <groupId>org.apache.maven.plugins</groupId>\n\
    \                <artifactId>maven-compiler-plugin</artifactId>\n            \
    \    <inherited>true</inherited>\n                <configuration>\n          \
    \          <source>1.6</source>\n                    <target>1.6</target>\n  \
    \              </configuration>\n            </plugin>\n        </plugins>\n \
    \   </build>\n</project>\n```\n\nTo have a better understanding of what happens\
    \ behind the scenes, first generate the artifacts by entering the following Maven\
    \ command:\n\n```\nmvn clean generate-sources\n```\n\nThis command executes the\
    \ Maven `generate-sources` life-cycle phase, and thus the `wsimport` goal that\
    \ is defined with it. `wsimport` connects to the web service WSDL URL, downloads\
    \ it, and generates all the artifacts. Here is the output of the Maven command:\n\
    \n```\n[INFO] [clean:clean]\n[INFO] [jaxws:wsimport {execution: default}]\n[INFO]\
    \ Processing: http://localhost:8080/chapter14-service-1.0/CardValidatorService?wsdl\n\
    [INFO] jaxws:wsimport args: [-s, D:\\Chapter14-Consumer\\target\\jaxws\\wsimport\\\
    java, -d, D:\\Chapter14-Consumer\\target\\classes, -Xnocompile, http://localhost:8080/chapter14-service-1.0/CardValidatorService?wsdl]\n\
    parsing WSDL...\ngenerating code...\n[INFO]----------------------------------------\n\
    [INFO] BUILD SUCCESSFUL\n[INFO]----------------------------------------\n```\n\
    \nIf you are curious, you can go to the `target\\jaxws\\wsimport\\java` directory\
    \ and check the classes that have been generated. You will find the `CardValidator`,\
    \ `CardValidatorService`, and `CreditCard` classes, of course, but also one class\
    \ for the SOAP request (`Validate`) and another one for the response (`ValidateResponse`).\
    \ These classes are full of JAXB and JAXW annotations as they marshall the `CreditCard`\
    \ object and connect to the remote web service. You don’t have to worry about\
    \ the generated code. The `jar` file can be compiled and packaged:\n\n```\nmvn\
    \ package\n```\n\nThis creates the `chapter14-consumer-1.0.jar` file, which contains\
    \ the `Main` class that you wrote plus all the generated classes. This `jar` is\
    \ self-contained and can now be run to invoke the web service.\n\n## Running the\
    \ Main Class\n\nRemember that the consumer `Main` class uses the `@WebServiceRef`\
    \ annotation to get a reference of the web service endpoint interface injected.\
    \ This means that the code needs to be executed in the application client container\
    \ (ACC). Also remember that the `chapter14-consumer-1.0.jar` file is executable,\
    \ as you’ve added a `Main-Class` element to the `MANIFEST.MF` file. The only thing\
    \ that you have to do is to invoke the `appclient` utility that comes with GlassFish\
    \ and pass it the `jar` file as follows:\n\n```\nappclient -client chapter14-consumer-1.0.jar\n\
    ```\n\nThis will invoke the web service through HTTP and get a response back telling\
    \ you whether the credit card is valid or not.\n\n## Summary"
