- fmt: '# EJB Features and Concepts


    ## Interceptors

    Cross-cutting concerns can be put into interceptors, which will be invoked automatically
    by the container.


    ## Asynchronous Method Invocation

    With EJB 3.1, it’s now possible to have asynchronous calls without involving messaging.


    Once the EJB is deployed, the container takes care of these features, leaving
    the developer to focus on business logic while benefiting from these services
    without adding any system-level code.


    EJBs are managed objects. When a client invokes an EJB (as in Listing 6-2), it
    doesn’t work directly with an instance of that EJB but rather with a proxy on
    an instance. Each time a client invokes a method on an EJB, the call is actually
    proxied through the container, which provides services on behalf of the bean instance.
    Of course, this is completely transparent to the client; from its creation to
    its destruction, an enterprise bean lives in a container.


    In a Java EE application, the EJB container will usually interact with other containers:
    the servlet container (responsible for managing the execution of servlets and
    JSF pages), the application client container, or ACC (for managing stand-alone
    applications), the message broker (for sending, queuing, and receiving messages),
    the persistence provider, and so on. These containers will all run inside an application
    server (GlassFish, JBoss, Weblogic, etc.). Application servers are implementation
    specific, and most provide clustering capabilities, scalability, load balancing,
    transparent failover, administration, monitoring, caching, pools, and so forth.


    ## Embedded Container


    Right from the moment when they are created, EJBs have to be executed in a container
    that runs in a separate JVM. Think of GlassFish, JBoss, Weblogic, and so on, and
    you’ll remember that the application server first needs to be started before deploying
    and using your EJB. This is appropriate in a production environment, where the
    server runs continuously, but it is time consuming in a development environment,
    where you frequently need to deploy for debugging purposes, for example. Another
    issue with servers running in a different process is that unit-testing capabilities
    are limited, and unit tests cannot be easily run without deploying the EJB in
    a live server. To solve these problems, some application server implementations
    came with embedded containers, but these were implementation specific. Today EJB
    3.1 has specified an embedded container that is portable across servers.


    The idea of an embedded container is to be able to execute EJB applications within
    a Java SE environment allowing clients to run within the same JVM and class loader.
    This provides better support for testing, offline processing (e.g., batch processing),
    and the use of the EJB in desktop applications. The embeddable container API (defined
    in `javax.ejb.embeddable`) provides the same managed environment as the Java EE
    runtime container and includes the same services: injection, access to a component
    environment, container-managed transactions (CMTs), and so forth.


    The following code snippet shows you how to create an instance of an embeddable
    container, get a JNDI context, get a lookup for an EJB, and invoke a method:


    ```

    EJBContainer ec = EJBContainer.createEJBContainer();

    Context ctx = ec.getContext();

    BookEJB bookEJB = (BookEJB) ctx.lookup("java:global/BookEJB");

    bookEJB.createBook(book);

    ```


    In the next chapter, you’ll see how to use the bootstrapping API to start the
    container and execute EJBs.


    ## Dependency Injection and JNDI


    EJBs use dependency injection to access several kinds of resources (other EJBs,
    datasources, JMS destinations, environment resources, etc.). In this model, the
    container pushes data into the bean. As shown in Listing 6-2, a client gets injected
    a reference to an EJB using the `@EJB` annotation:


    ```

    @EJB

    private static BookEJB bookEJB;

    ```


    Injection is made at deployment time. If there is a chance that the data will
    not be used, the bean can avoid the cost of resource injection by performing a
    JNDI lookup. JNDI is an alternative to injection; through JNDI, the code pulls
    data only if it is needed, instead of accepting pushed data that may not be needed
    at all.


    JNDI is an API for accessing different kinds of directory services, allowing clients
    to bind and look up objects via a name. JNDI is defined in Java SE and is independent
    of the underlying implementation, which means that objects can be looked up in
    a Lightweight Directory Access Protocol (LDAP) directory or a Domain Name System
    (DNS) using a standard API.


    The alternative to the preceding code is to use the `InitialContext` of JNDI and
    look up a deployed EJB named `java:global/chapter06/BookEJB` as follows:


    ```

    Context ctx = new InitialContext();

    BookEJB bookEJB = (BookEJB) ctx.lookup("java:global/chapter06/BookEJB");

    ```


    JNDI has been around for a long time. Its API is specified and is portable across
    application servers. But this wasn’t the case with the JNDI name, which was implementation
    specific. When an EJB in GlassFish or JBoss was deployed, the name of the EJB
    in the directory service was different and thus not portable. A client would have
    to look up an EJB using one name for GlassFish, and another name for JBoss. With
    EJB 3.1, JNDI names have been specified so the code could be portable. In the
    preceding example, the `java:global/chapter06/BookEJB` name respects the new naming
    convention:


    ```

    java:global[/<app-name>]/<module-name>/<bean-name>[!<fully-qualified-interface-name>]

    ```


    The following chapter shows how to use this portable name to look up EJBs.


    ## Callback Methods and Interceptors


    Each EJB type (stateless, stateful, singleton, and MDB) has a life cycle managed
    by the container. EJBs allow annotated methods (`@PostConstruct`, `@PreDestroy`,
    etc.), similar to the callback methods used in entities in the previous chapter,
    that will automatically be invoked by the container during certain phases of its
    life. These methods may initialize state information on the bean, look up resources
    using JNDI, or release database connections.


    For any cross-cutting concerns, developers can use interceptors, which are based
    on the AOP model, in which the invocation of a method is wrapped by extra functionality
    automatically.


    EJBs’ life cycles, callback methods, and interceptors will be explained in Chapter
    8 (Chapter 5 focused on the life cycle of JPA entities).


    ## Packaging


    Like most Java EE components (servlets, JSF pages, web services, etc.), EJBs need
    to be packaged before they are deployed into a runtime container. In the same
    archive, you will usually find the enterprise bean class, its interfaces, interceptors,
    any needed superclasses or super-interfaces, exceptions, helper classes, and an
    optional deployment descriptor (`ejb-jar.xml`).


    Once these artifacts are packaged in a jar (Java archive) file, they can be deployed
    directly into a container. Another option is also to embed the jar file into an
    ear (enterprise archive) file and deploy the ear file.


    ![Image 63](index-204_1.jpg)


    An ear file is used to package one or more modules (EJBs or web applications)
    into a single archive so that deployment into an application server happens simultaneously
    and coherently. For example, as shown in Figure 6-2, if you need to deploy a web
    application, you might want to package your EJBs and entities into separate jar
    files, your servlets into a war file, and the whole thing into an ear file. Deploy
    the ear file into an application server, and you will be able to manipulate entities
    from the servlet using the EJB.


    **Figure 6-2.** *Packaging EJBs*'
