  trans: "\n持久化单元是持久化上下文与数据库之间的桥梁。一方面，`<class>`标签列出了所有可在持久化上下文中管理的实体；另一方面，它提供了物理连接数据库所需的所有信息。这是因为你处于应用程序管理环境（transaction-type=\"\
    RESOURCE_LOCAL\"）中。在容器管理环境中，`persistence.xml`会定义一个数据源，而非数据库连接属性，并将事务类型设置为 JTA（transaction-type=\"\
    JTA\"）。\n\n**操作实体**\n\n实体管理器也用于创建复杂的 JPQL 查询，以检索单个实体或实体列表。在操作单个实体时，`EntityManager`接口可被视为一个通用的数据访问对象（DAO），它允许对任何实体执行\
    \ CRUD 操作（见表 4-1）。\n\n**表 4-1.** *用于操作实体的 EntityManager 接口方法*\n\n| **方法** | **描述**\
    \ |\n| --- | --- |\n| void persist(Object entity) | 使实例成为受管状态并持久化 |\n| <T> T find(Class<T>\
    \ entityClass, Object primaryKey) | 根据指定类和主键搜索实体 |\n| <T> T getReference(Class<T>\
    \ entityClass, Object primaryKey) | 获取一个实例，其状态可能被延迟加载 |\n| void remove(Object\
    \ entity) | 从持久化上下文和底层数据库中移除实体实例 |\n| <T> T merge(T entity) | 将给定实体的状态合并到当前持久化上下文中\
    \ |\n| void refresh(Object entity) | 从数据库刷新实例状态，覆盖对实体所做的任何更改 |\n| void flush()\
    \ | 将持久化上下文同步到底层数据库 |\n| void clear() | 清除持久化上下文，导致所有受管实体变为脱管状态 |\n| void clear(Object\
    \ entity) | 从持久化上下文中移除给定实体 |\n| boolean contains(Object entity) | 检查实例是否属于当前持久化上下文的受管实体实例\
    \ |\n\n为了更好地理解这些方法，我将使用一个简单的示例，即`Customer`和`Address`之间的单向一对一关系。两个实体都具有自动生成的标识符（得益于`@GeneratedValue`注解），并且`Customer`（见清单\
    \ 4-7）对`Address`（见清单 4-8）采用了延迟加载。\n\n**清单 4-7.** *具有单向一对一 Address 的 Customer 实体*\n\
    \n```java\n@Entity\npublic class **Customer** {\n    @Id @GeneratedValue\n   \
    \ private Long id;\n    private String firstName;\n    private String lastName;\n\
    \    private String email;\n    @OneToOne (fetch = FetchType.LAZY)\n    @JoinColumn(name\
    \ = \"address_fk\")\n    private Address address;\n    // 构造方法、getter、setter\n\
    }\n```\n\n**清单 4-8.** *Address 实体*\n\n```java\n@Entity\npublic class **Address**\
    \ {\n    @Id @GeneratedValue\n    private Long id;\n    private String street1;\n\
    \    private String city;\n    private String zipcode;\n    private String country;\n\
    \    // 构造方法、getter、setter\n}\n```\n\n这两个实体将被映射到图 4-2 所示的数据库结构中。注意，`ADDRESS_FK`列是指向`ADDRESS`表的外键。\n\
    \n**图 4-2.** *CUSTOMER 和 ADDRESS 表*\n\n为了提高可读性，后续章节中使用的代码片段假定`em`属性是`EntityManager`类型，`tx`是`EntityTransaction`类型。\n\
    \n**持久化实体**\n\n持久化实体意味着在数据尚不存在时将其插入数据库（否则会抛出异常）。为此，需要使用`new`运算符创建新的实体实例，设置属性值，在存在关联时将一个实体绑定到另一个实体，最后调用`EntityManager.persist()`方法，如清单\
    \ 4-9 中的 JUnit 测试用例所示。\n\n**清单 4-9.** *持久化一个带有 Address 的 Customer*\n\n```java\n\
    Customer customer = new Customer(\"Antony\", \"Balla\", \"tballa@mail.com\");\n\
    Address address = new Address(\"Ritherdon Rd\", \"London\", \"8QE\", \"UK\");\n\
    customer.setAddress(address);\n\ntx.begin();\nem.persist(customer);\nem.persist(address);\n\
    tx.commit();\n\nassertNotNull(customer.getId());\nassertNotNull(address.getId());\n\
    ```\n\n在清单 4-9 中，`customer`和`address`只是驻留在 JVM 内存中的两个对象。当实体管理器（变量`em`）通过持久化它们（`em.persist(customer)`）将其纳入管理时，两者都成为受管实体。此时，这两个对象都有资格被插入数据库。当事务提交（`tx.commit()`）时，数据被刷新到数据库，一条地址行被插入`ADDRESS`表，一条客户行被插入`CUSTOMER`表。由于`Customer`是关系拥有方，其表持有指向`ADDRESS`表的外键。通过`assertNotNull`表达式，得益于持久化提供程序和注解，两个实体都获得了生成的标识符。\n\
    \n注意`persist()`方法的顺序：先持久化客户，然后持久化地址。如果顺序相反，结果也是一样的。之前，实体管理器被描述为一级缓存。在事务提交之前，数据保留在内存中，不会访问数据库。实体管理器缓存数据，并在准备就绪时，按照底层数据库期望的顺序（遵守完整性约束）刷新数据。由于`CUSTOMER`表中的外键，`ADDRESS`的插入语句将首先执行，然后是`CUSTOMER`的插入语句。\n\
    \n■**注意** 本章中的大多数实体没有实现`Serializable`接口。这是因为实体不需要实现该接口即可持久化到数据库。它们通过引用从一个方法传递到另一个方法，当需要持久化时，会调用`EntityManager.persist()`方法。但是，如果你需要按值传递实体（远程调用、外部\
    \ EJB 容器等），则它们必须实现`java.io.Serializable`标记接口（无方法）。它向编译器指示必须强制实体类上的所有字段都是可序列化的，以便任何实例都可以序列化为字节流，并使用远程方法调用（RMI）进行传递。\n\
    \n**按 ID 查找**\n\n要按标识符查找实体，可以使用两种不同的方法。第一种是`EntityManager.find()`方法，它接受两个参数：实体类和唯一标识符（见清单\
    \ 4-10）。如果找到实体，则返回该实体；如果未找到，则返回`null`值。\n\n**清单 4-10.** *按 ID 查找 Customer*\n\n\
    ```java\nCustomer customer = em.find(Customer.class, 1234L)\nif (customer != null)\
    \ {\n    // 处理对象\n}\n```\n\n第二种方法是`getReference()`（见清单 4-11）。它与`find`操作非常相似，接受相同的参数，但它允许通过主键（而非数据）检索对实体的引用。它适用于需要受管实体实例，但除了可能访问实体的主键外，不需要任何数据的情况。使用`getReference()`时，状态数据是延迟加载的，这意味着如果在实体脱管之前未访问状态，数据可能不存在。如果未找到实体，则会抛出`EntityNotFoundException`。\n\
    \n**清单 4-11.** *通过引用查找 Customer*\n\n```java\ntry {\n    Customer customer = em.getReference(Customer.class,\
    \ 1234L)\n    // 处理对象\n} catch(EntityNotFoundException ex) {\n    // 实体未找到\n}\n\
    ```\n\n**移除实体**\n"
- fmt: "# 实体管理操作\n\n## 移除实体\n\n可以使用`EntityManager.remove()`方法移除实体。一旦被移除，该实体将从数据库中删除，与实体管理器分离，并且无法再与数据库同步。就Java对象而言，该实体仍然可访问，直到它超出作用域并被垃圾回收器清理。清单4-12中的代码展示了如何在创建对象后将其移除。\n\
    \n**清单4-12.** *创建和移除Customer与Address实体*\n\n```java\nCustomer customer = new Customer(\"\
    Antony\", \"Balla\", \"tballa@mail.com\");\nAddress address = new Address(\"Ritherdon\
    \ Rd\", \"London\", \"8QE\", \"UK\");\ncustomer.setAddress(address);\n\ntx.begin();\n\
    em.persist(customer);\nem.persist(address);\ntx.commit();\n\ntx.begin();\nem.remove(customer);\n\
    tx.commit();\n\n// 数据已从数据库中删除\n// 但对象仍然可访问\nassertNotNull(customer);\n```\n\n\
    清单4-12中的代码创建了`Customer`和`Address`的实例，将它们关联起来（`customer.setAddress(address)`），并持久化它们。在数据库中，`customer`行通过外键与`address`关联；在后续代码中，仅删除了`Customer`。\n\
    \n根据级联配置的不同，`Address`可能成为没有其他实体引用的孤立实体。`address`行变成了孤儿。\n\n## 孤儿移除\n\n为了数据一致性，孤儿是不受欢迎的，因为它们会导致数据库中存在未被任何其他表引用且无法访问的行。使用JPA，您可以通知持久化提供程序自动移除孤儿，或级联移除操作（稍后将看到）。如果目标实体（`Address`）由源实体（`Customer`）私有拥有（意味着目标绝不能由多个源拥有），并且该源被应用程序删除，则提供程序也应删除目标。\n\
    \n指定为`@OneToOne`或`@OneToMany`的关联支持使用孤儿移除选项。为了在示例中包含此选项，让我们看看如何将`orphanRemoval=true`元素添加到`@OneToOne`注解中（参见清单4-13）。\n\
    \n**清单4-13.** *处理孤儿Address移除的Customer实体*\n\n```java\n@Entity\npublic class Customer\
    \ {\n    @Id @GeneratedValue\n    private Long id;\n    private String firstName;\n\
    \    private String lastName;\n    private String email;\n\n    @OneToOne(fetch\
    \ = FetchType.LAZY, orphanRemoval=true)\n    private Address address;\n\n    //\
    \ 构造方法、getter、setter\n}\n```\n\n使用此映射，清单4-12中的代码将在移除`Customer`时自动移除`Address`实体。移除操作在刷新操作（事务提交）时执行。\n\
    \n## 与数据库同步\n\n到目前为止，与数据库的同步都是在提交时完成的。实体管理器是一级缓存，等待事务提交以将数据刷新到数据库。但是，当需要插入`customer`和`address`时会发生什么？\n\
    \n```java\ntx.begin();\nem.persist(customer);\nem.persist(address);\ntx.commit();\n\
    ```\n\n所有待处理的更改都需要SQL语句，生成两条插入语句，并且仅在数据库事务提交时才永久生效。对于大多数应用程序来说，这种自动数据同步已经足够。尽管无法确切知道提供程序在哪个时间点将更改刷新到数据库，但可以确定它发生在事务提交过程中。数据库与持久化上下文中的实体同步，但可以显式地将数据刷新到数据库（`flush`），或使用数据库中的数据刷新实体（`refresh`）。如果数据在某个时间点被刷新到数据库，并且稍后在代码中应用程序调用了`rollback()`方法，则已刷新的数据将从数据库中撤消。\n\
    \n### 刷新数据\n\n使用`EntityManager.flush()`方法，可以显式强制持久化提供程序刷新数据，允许开发人员手动触发实体管理器内部用于刷新持久化上下文的相同过程。\n\
    \n```java\ntx.begin();\nem.persist(customer);\nem.flush();\nem.persist(address);\n\
    tx.commit();\n```\n\n上述代码中发生了两件有趣的事情。首先，`em.flush()`不会等待事务提交，而是强制提供程序刷新持久化上下文。在刷新时将生成并执行一条插入语句。其次，由于完整性约束，这段代码将无法工作。如果没有显式刷新，实体管理器会缓存所有更改，并以对数据库一致的方式排序和执行它们。使用显式刷新时，将执行对`CUSTOMER`表的插入语句，但地址外键的完整性约束（`CUSTOMER`表中的`ADDRESS_FK`列）将被违反。这将导致事务回滚。已刷新的数据也将被回滚。应谨慎使用显式刷新，并且仅在需要时使用。\n\
    \n### 刷新实体\n\n`refresh()`方法用于与`flush`相反方向的数据同步，即它用数据库中当前存在的数据覆盖托管实体的当前状态。一个典型的情况是使用`EntityManager.refresh()`方法撤消仅在内存中对实体所做的更改。清单4-14中的测试类片段按ID查找`Customer`，更改其名字，并使用`refresh()`方法撤消此更改。\n\
    \n**清单4-14.** *从数据库刷新Customer实体*\n\n```java\nCustomer customer = em.find(Customer.class,\
    \ 1234L);\nassertEquals(customer.getFirstName(), \"Antony\");\ncustomer.setFirstName(\"\
    William\");\nem.refresh(customer);\nassertEquals(customer.getFirstName(), \"Antony\"\
    );\n```\n\n## 持久化上下文的内容\n\n持久化上下文保存着托管实体。通过`EntityManager`接口，您可以检查实体是否被管理，以及清除持久化上下文中的所有实体。\n\
    \n### 包含检查\n\n实体要么被实体管理器管理，要么不被管理。`EntityManager.contains()`方法返回一个布尔值，允许检查特定实体实例当前是否在当前持久化上下文中被实体管理器管理。在清单4-15的测试用例中，`Customer`被持久化，您可以立即检查该实体是否被管理（`em.contains(customer)`）。答案是`true`。之后，调用`remove()`方法，实体从数据库和持久化上下文中被移除（`em.contains(customer)`返回`false`）。\n\
    \n**清单4-15.** *测试Customer实体是否在持久化上下文中*\n\n```java\nCustomer customer = new Customer(\"\
    Antony\", \"Balla\", \"tballa@mail.com\");\ntx.begin();\nem.persist(customer);\n\
    tx.commit();\nassertTrue(em.contains(customer));\n\ntx.begin();\nem.remove(customer);\n\
    tx.commit();\nassertFalse(em.contains(customer));\n```\n\n### 清除与分离\n\n`clear()`方法很直接：它清空持久化上下文，导致所有托管实体变为分离状态。`detach(Object\
    \ entity)`方法从持久化上下文中移除给定实体。在此类驱逐发生后，对实体所做的更改将不会同步到数据库。清单4-16创建了一个实体，检查它是否被管理，将其从持久化上下文中分离，并检查它是否已分离。\n\
    \n**清单4-16.** *检查Customer实体是否在持久化上下文中*\n\n```java\nCustomer customer = new Customer(\"\
    Antony\", \"Balla\", \"tballa@mail.com\");\ntx.begin();\nem.persist(customer);\n\
    tx.commit();\nassertTrue(em.contains(customer));\nem.detach(customer);\nassertFalse(em.contains(customer));\n\
    ```"
  raw: 'An entity can be removed with the EntityManager.remove() method. Once removed,
    the entity is deleted from the database, is detached from the entity manager,
    and cannot be synchronized with the database anymore. In terms of Java objects,
    the entity is still accessible until it goes out of scope and the garbage collector
    cleans it up. The code in Listing 4-12 shows how to remove an object after it
    has been created.


    **Listing 4-12.** *Creating and Removing Customer and Address Entities*


    [Customer customer = new Customer("Antony", "Balla", "tballa@mail.com");](mailto:tballa@mail.com)


    Address address = new Address("Ritherdon Rd", "London", "8QE", "UK"); customer.setAddress(address);


    tx.begin();


    **em.persist(customer);**


    **em.persist(address);**


    tx.commit();


    tx.begin();


    **em.remove(customer);**


    tx.commit();


    // The data is removed from the database


    // but the object is still accessible


    assertNotNull(**customer**);


    The code in Listing 4-12 creates an instance of Customer and Address, links them
    together (customer.setAddress(address)), and persists them. In the database, the
    customer row is linked to the address through a foreign key; later on in the code,
    only the Customer is deleted.


    Depending on how the cascading is configured, the Address could be left with no
    other entity referencing it. The address row becomes an orphan.


    Orphan removal


    For data consistency, orphans are not desirable, as they result in having rows
    in a database that are not referenced by any other table, without means of access.
    With JPA you can inform the persistence provider to automatically remove orphans
    or cascade a remove operation as you’ll see later. If a target entity (Address)
    is privately owned by a source (Customer), meaning a target must never be owned
    by more than one source, and that source is deleted by the application, the provider
    should also delete the target.


    Associations that are specified as one-to-one or one-to-many support the use of


    the orphan removal option. To include this option in the example, let’s look at
    how the orphanRemoval=true element to the @OneToOne annotation should be added
    (see Listing 4-13).


    Chapter 4 ■ MaNaGING perSISteNt OBJeCtS


    **131**


    **Listing 4-13.** *The Customer Entity Dealing with Orphan Address Removal*


    @Entity


    public class Customer {


    @Id @GeneratedValue


    private Long id;


    private String firstName;


    private String lastName;


    private String email;


    @OneToOne (fetch = FetchType.LAZY, **orphanRemoval=true**)


    private Address address;


    // Constructors, getters, setters


    }


    With this mapping, the code in Listing 4-12 will automatically remove the Address
    entity when the customer is removed. The remove operation is applied at the time
    of the flush operation (transaction committed).


    Synchronizing with the Database


    Until now the synchronization with the database has been done at commit time.
    The entity manager is a first-level cache, waiting for the transaction to be committed
    to flush the data to the database, but what happens when a customer and an address
    need to be inserted?


    tx.begin();


    **em.persist(customer);**


    **em.persist(address);**


    tx.commit();


    All pending changes require an SQL statement, with two insert statements produced


    and made permanent only when the database transaction commits. For most applications,


    this automatic data synchronization is sufficient. Although at exactly which point
    in time the provider actually flushes the changes to the database is not known,
    you can be sure it happens inside the commit of the transaction. The database
    is synchronized with the entities in the persistence context, but data to the
    database can be explicitly flushed (flush), or entities refreshed with data from
    the database (refresh). If the data is flushed to the database at one point, and
    if later in the code the application calls the rollback() method, the flushed
    data will be taken out of the database.


    **Flushing Data**


    With the EntityManager.flush() method, the persistence provider can be explicitly
    forced to flush the data, allowing a developer to manually trigger the same process
    used by the entity manager internally to flush the persistence context.


    tx.begin();


    em.persist(customer);


    **em.flush();**


    **132**


    Chapter 4 ■ MaNaGING perSISteNt OBJeCtS


    em.persist(address);


    tx.commit();


    Two interesting things happen in the preceding code. The first is that em.flush()
    will not wait for the transaction to commit and will force the provider to flush
    the persistence context.


    An insert statement will be generated and executed at the flush. The second is
    that this code will not work because of integrity constraint. Without an explicit
    flush, the entity manager caches all changes, and orders and executes them in
    a coherent way for the database. With an explicit flush, the insert statement
    to CUSTOMER will be executed, but the integrity constraint on the address foreign
    key will be violated (the ADDRESS_FK column in CUSTOMER). That will lead the transaction
    to roll back. Data that has been flushed will also get rolled back. Explicit flushes
    should be carefully used and only when needed.


    **Refreshing an Entity**


    The refresh() method is used for data synchronization in the opposite direction
    of the flush, meaning it overwrites the current state of a managed entity with
    data as it is present in the database. A typical case is where the EntityManager.refresh()
    method is used to undo changes that have been done to the entity in memory only.
    The test class snippet in Listing 4-14 finds a Customer by ID, changes its first
    name, and undoes this change using the refresh() method.


    **Listing 4-14.** *Refreshing the Customer Entity from the Database*


    Customer customer = em.find(Customer.class, 1234L)


    assertEquals(customer.getFirstName(), " **Antony**");


    customer.setFirstName(" **William**");


    **em.refresh(customer);**


    assertEquals(customer.getFirstName(), " **Antony**");


    Content of the persistence Context


    The persistence context holds the managed entities. With the EntityManager interface,
    you can check whether an entity is being managed, and clear all entities from
    the persistence context.


    **Contains**


    Entities are either managed or not by the entity manager. The EntityManager.contains()


    method returns a Boolean and allows checking of whether a particular entity instance
    is currently managed by the entity manager within the current persistence context.
    In the test case in Listing 4-15, a Customer is persisted, and you can immediately
    check whether the entity is managed (em.contains(customer)). The answer is true.
    Afterward, the remove() method is


    called, and the entity is removed from the database and from the persistence context


    (em.contains(customer) returns false).


    Chapter 4 ■ MaNaGING perSISteNt OBJeCtS


    **133**


    **Listing 4-15.** *Test Case for Whether the Customer Entity Is in the Persistence
    Context*


