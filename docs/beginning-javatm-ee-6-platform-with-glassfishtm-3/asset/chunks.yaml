  trans: '

    使用乐观锁时，作为参数传入的 `LockModeType` 可以取两个值：`OPTIMISTIC` 和 `OPTIMISTIC_FORCE_INCREMENT`（或者分别对应
    `READ` 和 `WRITE`，但这些值已弃用）。唯一的区别在于，`OPTIMISTIC_FORCE_INCREMENT` 会强制更新（递增）实体的版本列。


    强烈建议应用程序为所有可能被并发访问的实体启用乐观锁。未能使用锁机制可能导致实体状态不一致、更新丢失以及其他状态异常。乐观锁是一种有用的性能优化手段，它将原本需要数据库承担的工作转移出去，是悲观锁的一种替代方案，后者需要低层次的数据库锁定。


    **悲观锁**


    悲观锁基于与乐观锁相反的假设，因为在操作实体之前会急切地获取锁。这非常消耗资源，并会导致显著的性能下降，因为会使用 `SELECT ... FOR UPDATE`
    SQL 语句来读取数据以持有数据库锁。


    第 4 章 ■ 管理持久化对象


    **155**


    数据库通常提供一种悲观锁服务，允许实体管理器锁定表中的一行，以防止另一个线程更新同一行。这是一种确保两个客户端不会同时修改同一行的有效机制，但需要在数据库内部进行昂贵的、低层次的检查。会导致违反此约束的事务会抛出
    `PessimisticLockException` 异常，并且该事务会被标记为回滚。


    乐观锁适用于处理并发事务间的中等程度争用。但在某些争用风险较高的应用中，悲观锁可能更合适，因为数据库锁会立即获取，而不是像乐观事务那样常常在后期才失败。例如，在经济危机时期，股票市场会收到海量的卖出订单。如果
    1 亿美国人需要同时卖出他们的股票期权，系统就需要使用悲观锁来确保数据一致性。


    请注意，当前市场情绪相当悲观而非乐观，这与 JPA 无关。


    悲观锁可以应用于那些不包含 `@Version` 注解属性的实体。


    **总结**


    在本章中，你学习了如何查询实体。实体管理器是将实体与持久化关联起来的核心。它可以在持久化上下文（充当一级缓存）的帮助下，创建、更新、按 ID 查找、删除实体，并将实体与数据库同步。JPA
    还附带了一种非常强大的查询语言 JPQL，它与数据库供应商无关。你可以使用包含 `WHERE`、`ORDER BY` 或 `GROUP BY` 子句的丰富语法来检索实体。当你的实体发生并发访问时，你知道了如何使用版本控制，以及何时使用乐观锁或悲观锁。


    在下一章中，你将学习更多关于实体生命周期的知识，并了解如何使用回调注解或监听器将某些逻辑挂钩到该生命周期。


    第 5 章


    回调和监听器


    **在**前一章中，你了解了如何查询映射的实体。现在你知道如何持久化、删除、更新以及通过标识符查找实体了。使用 JPQL，你可以通过动态查询、静态查询和原生查询，根据特定的搜索条件检索一个或多个实体。


    所有这些操作都由实体管理器执行——它是操作实体并管理其生命周期的核心组件。


    我曾描述过实体生命周期，即实体由实体管理器管理（意味着它们具有持久化标识并与数据库同步），或者与数据库分离并作为普通 POJO 使用。但实体的生命周期要稍微丰富一些。重要的是，JPA
    允许你在实体上发生某些事件时，插入你自己的业务逻辑。然后，持久化提供程序会使用回调方法自动调用此业务代码。


    你可以将生命周期回调和监听器视为关系数据库中的触发器。触发器为表中的每一行执行业务逻辑。生命周期回调和监听器则针对实体的每个实例，响应于某个特定事件（更准确地说，是在事件发生之前或之后）被调用。你可以使用元数据注解或
    XML 描述符来定义“前”和“后”回调方法。


    **实体生命周期**


    到目前为止，你已经了解了实体的大部分奥秘，现在让我们来看看它们的生命周期。当一个实体被实体管理器创建或持久化时，该实体被称为受管实体。在此之前，该实体在 JVM
    看来只是一个普通的 POJO（即处于游离状态），可以被应用程序当作普通对象使用。当一个实体处于受管状态时，实体管理器会自动将其属性值与底层数据库同步。


    为了更好地理解这一点，请看图 5-1，这是一个 UML 状态图，展示了 `Customer` 实体可能具有的状态以及各状态之间的转换。


    **157**


    ![Image 60](img/index-188_1.jpg)


    **158**


    第 5 章 ■ 回调和监听器


    **图 5-1.** *实体生命周期*


    要创建 `Customer` 实体的实例，你需要使用 `new` 操作符。这个对象存在于内存中，尽管 JPA 对它一无所知。如果你不对这个对象做任何操作，它将超出作用域并最终被垃圾回收，其生命周期就此结束。接下来你可以做的是，使用
    `EntityManager.persist()` 方法持久化一个 `Customer` 实例。


    此时，该实体变为受管状态，其状态与数据库同步。


    在此受管状态下，你可以使用 setter 方法（例如 `customer.setFirstName()`）更新属性，或者使用 `EntityManager.refresh()`
    方法刷新内容。所有这些更改都将在实体和数据库之间同步。在此状态下，如果你调用 `EntityManager.contains(customer)` 方法，它将返回
    `true`，因为 `customer` 包含在持久化上下文中（即受管状态）。


    实体变为受管状态的另一种方式是从数据库加载。当你使用 `EntityManager.find()` 方法，或者创建 JPQL 查询来检索实体列表时，所有这些实体都会自动变为受管状态，然后你就可以开始更新或删除它们的属性了。


    在受管状态下，你可以调用 `EntityManager.remove()` 方法，该实体将从数据库中被删除，并且不再受管。但 Java 对象会继续存在于内存中，你可以继续使用它，直到垃圾回收器将其回收。


    现在让我们看看游离状态。你在前一章已经看到，显式调用 `EntityManager.clear()` 方法会将实体从持久化上下文中清除；它变为游离状态。但还有另一种更微妙的方式会使实体游离：当它被序列化时。在本书的许多示例中，实体没有继承任何东西，但如果它们需要跨越网络进行远程调用，或者跨越层在表示层中显示，它们就需要实现
    `java.io.Serializable` 接口。这不是 JPA 的限制，而是 Java 的限制。当一个受管实体被序列化、跨越网络并反序列化后，它被视为一个游离对象。要重新关联一个实体，你需要调用
    `EntityManager.merge()` 方法。


    回调和监听器允许你在特定事件发生时添加自己的业务逻辑。

