    myLibrary/1_0/book.gif/2_3.gif


    然后，你可以直接在 <h:graphicImage> 组件中使用诸如 book.gif 这样的资源，或者通过指定库名称（library="myLibrary"）来使用。系统会自动为你的客户端拉取具有正确区域设置的资源。


    <h:graphicImage value="book.gif" />


