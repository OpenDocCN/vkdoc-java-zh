    As you can see, declarative security gives you easy access to a powerful authentication
    policy. But what if you need to provide security settings to an individual, or
    apply some business logic based on the current principal’s role? This is where
    programmatic security comes into play.


    **Programmatic Security**


    Declarative security covers most security cases needed by an application. But
    sometimes you need means of a finer grain for authorizing access (allowing a block
    of code instead of the entire method, permitting or denying access to an individual,
    etc.). You can use programmatic authorization to selectively permit or block access
    to a role or a principal. That’s because you have direct access to the JAAS javax.security.Principal
    interface, as well as the EJB context to check the principal’s role in the code.


