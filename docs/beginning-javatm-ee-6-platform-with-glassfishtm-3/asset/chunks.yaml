    mvn test\n```\n\n由于日志级别已设置为 `FINE`，你应该会看到关于 Derby 在内存中创建数据库和表的详细信息。然后执行 `BookTest`\
    \ 类，Maven 报告应通知你测试成功。\n\n```\nTests run: 1, Failures: 0, Errors: 0, Skipped: 0,\
    \ Time elapsed: 9.415 sec\n\nResults :\n\nTests run: 1, Failures: 0, Errors: 0,\
    \ Skipped: 0\n\n[INFO] ----------------------------------------------------------------\n\
    [INFO] BUILD SUCCESSFUL\n[INFO] ----------------------------------------------------------------\n\
    [INFO] Total time: 19 seconds\n[INFO] Finished\n[INFO] Final Memory: 4M/14M\n\
    [INFO] ----------------------------------------------------------------\n```\n\
    \n**总结**\n\n本章快速概述了 JPA 2.0。与大多数其他 Java EE 6 规范一样，JPA 专注于简单的对象架构，将其前身——重量级组件模型（即\
    \ EJB CMP 2.*x*）抛在身后。本章还涵盖了实体，这些实体是使用注解或 XML 的映射元数据的持久化对象。\n\n通过“综合应用”部分，你已经了解了如何使用\
    \ EclipseLink 和 Derby 运行 JPA 应用程序。单元测试是项目中的一个重要主题，借助 JPA 和诸如 Derby 之类的内存数据库，现在测试持久化变得非常容易。\n\
    \n在接下来的章节中，你将学习更多关于 JPA 主要组件的知识。第 3 章将向你展示如何将实体、关系和继承映射到数据库。第 4 章将重点介绍实体管理器 API、JPQL\
    \ 语法以及如何使用查询和锁定机制。第 5 章，即 JPA 部分的最后一章，将解释实体的生命周期以及如何在实体和监听器的回调方法中挂接业务逻辑。\n\n第\
    \ 3 章\n对象关系映射\n\n在本章中，我将介绍对象关系映射（ORM）的基础知识，这基本上是将实体映射到表，将属性映射到列。然后，我将专注于更复杂的映射，例如关系、组合和继承。一个领域模型由相互交互的对象组成。对象和数据库有不同的方式来存储关系信息（通过指针或外键）。继承不是关系数据库天然具备的特性，因此映射并不那么直观。我将详细说明并展示一些示例，这些示例将演示属性、关系和继承如何从领域模型映射到数据库。\n\
    \n前面的章节已经展示了自 Java EE 5 以来注解如何在企业版中被广泛使用（主要在 EJB、JPA 和 Web 服务上）。JPA 2.0 遵循这一路径，并引入了新的映射注解及其\
    \ XML 等价物。我将主要使用注解来解释不同的映射概念，但我也会介绍 XML 映射。\n\n**如何映射实体**\n"
- fmt: "# JPA Entity Mapping Basics\n\nAs a first example, let’s start with the simplest\
    \ mapping that we can possibly have. In the JPA persistence model, an entity is\
    \ a plain old Java object (POJO). This means an entity is declared, instantiated,\
    \ and used just like any other Java class. An entity has attributes (its state)\
    \ that can be manipulated via getters and setters. Each attribute is stored in\
    \ a table column. Listing 3-1 shows a simple entity.\n\n**Listing 3-1.** *Simple\
    \ Example of a Book Entity*\n\n```java\n@Entity\npublic class Book {\n\n    @Id\n\
    \    private Long id;\n\n    private String title;\n    private Float price;\n\
    \    private String description;\n    private String isbn;\n    private Integer\
    \ nbOfPage;\n    private Boolean illustrations;\n\n    public Book() {\n    }\n\
    \n    // Getters, setters\n}\n```\n\nThis example of code from the CD-BookStore\
    \ application represents a `Book` entity from which I’ve omitted the getters and\
    \ the setters for clarity. As you can see, except for some annotations, this entity\
    \ looks exactly like any Java class: it has several attributes (`id`, `title`,\
    \ `price`, etc.) of different types (`Long`, `String`, `Float`, `Integer`, and\
    \ `Boolean`), a default constructor, and getters and setters for each attribute.\
    \ So how does this map to a table? The answer is thanks to annotations.\n\nFirst\
    \ of all, the class is annotated with `@javax.persistence.Entity`, which allows\
    \ the persistence provider to recognize it as a persistent class and not just\
    \ as a simple POJO. Then, the annotation `@javax.persistence.Id` defines the unique\
    \ identifier of this object. Because JPA is about mapping objects to relational\
    \ tables, objects need an ID that will be mapped to a primary key. The other attributes\
    \ (`title`, `price`, `description`, etc.) are not annotated, so they will be made\
    \ persistent by applying a default mapping.\n\nThis example of code has only attributes,\
    \ but, as you will see in Chapter 5, an entity can also have business methods.\
    \ Note that this `Book` entity is a Java class that does not implement any interface\
    \ or extend any class. In fact, to be an entity, a class must follow these rules:\n\
    \n- The entity class must be annotated with `@javax.persistence.Entity` (or denoted\
    \ in the XML descriptor as an entity).\n- The `@javax.persistence.Id` annotation\
    \ must be used to denote a simple primary key.\n- The entity class must have a\
    \ no-arg constructor that has to be public or protected. The entity class may\
    \ have other constructors as well.\n- The entity class must be a top-level class.\
    \ An enum or interface cannot be designated as an entity.\n- The entity class\
    \ must not be final. No methods or persistent instance variables of the entity\
    \ class may be final.\n- If an entity instance has to be passed by value as a\
    \ detached object (e.g., through a remote interface), the entity class must implement\
    \ the `Serializable` interface.\n\nSince the `Book` entity (shown previously in\
    \ Listing 3-1) follows these simple rules, the persistence provider can synchronize\
    \ the data between the attributes of the `Book` entity and the columns of the\
    \ `BOOK` table. Therefore, if the attribute `isbn` is modified by the application,\
    \ the `ISBN` column will be synchronized (if the entity is managed, if the transaction\
    \ context is set, etc.).\n\nAs Figure 3-1 shows, the `Book` entity is stored in\
    \ a `BOOK` table, and each column is named after the attribute of the class (e.g.,\
    \ the `isbn` attribute of type `String` is mapped to a column named `ISBN` of\
    \ type `VARCHAR`). These default mapping rules are an important part of the principle\
    \ known as *configuration by exception*.\n\n![Image 28](index-91_1.jpg)\n\n**Figure\
    \ 3-1.** *Data synchronization between the entity and the table*\n\n## Configuration\
    \ by Exception\n\nJava EE 5 introduced the idea of configuration by exception\
    \ (sometimes referred to as *programming by exception*). This means, unless specified\
    \ differently, the container or provider should apply the default rules. In other\
    \ words, having to supply a configuration is the exception to the rule. This allows\
    \ you to write the minimum amount of code to get your application running, relying\
    \ on the container and provider defaults.\n\nLet’s return to the previous code\
    \ example (see Listing 3-1). Without any annotation, the `Book` entity would be\
    \ treated just like a POJO and not be persisted. That is the rule: if no special\
    \ configuration is given, the default should be applied, and the default for the\
    \ JVM is that the `Book` class is just another class. But because you need to\
    \ change this default behavior, you annotate the class with `@Entity`. It is the\
    \ same for the identifier. You need a way to tell the persistence provider that\
    \ the `id` attribute has to be mapped to a primary key, so you annotate it with\
    \ `@Id`. This type of decision characterizes the configuration-by-exception approach,\
    \ in which annotations are not required for the more common cases and are only\
    \ used when an override is needed. This means that for all the other attributes,\
    \ the following default mapping rules will apply:\n\n- The entity name is mapped\
    \ to a relational table name (e.g., the `Book` entity is mapped to a `BOOK` table).\
    \ If you want to map it to another table, you will need to use the `@Table` annotation,\
    \ as you’ll see later in the “Elementary Mapping” section.\n- Attribute names\
    \ are mapped to a column name (e.g., the `id` attribute, or the `getId()` method,\
    \ is mapped to an `ID` column). If you want to change this default mapping, you\
    \ will need to use the `@Column` annotation.\n- JDBC rules apply for mapping Java\
    \ primitives to relational data types. A `String` will be mapped to `VARCHAR`,\
    \ a `Long` to `BIGINT`, a `Boolean` to `SMALLINT`, and so on. The default size\
    \ of a column mapped from a `String` is 255 (a `String` is mapped to a `VARCHAR(255)`).\
    \ But keep in mind that the default mapping rules are different from one database\
    \ to another. For example, a `String` is mapped to a `VARCHAR` in Derby and a\
    \ `VARCHAR2` in Oracle. An `Integer` is mapped to an `INTEGER` in Derby and a\
    \ `NUMBER` in Oracle. The information of the underlying database is provided in\
    \ the `persistence.xml` file, which you’ll see later in Chapter 4 in the “Persistence\
    \ Context” section.\n\nFollowing these rules, the `Book` entity will be mapped\
    \ to a Derby table that has the structure described in Listing 3-2.\n\n**Listing\
    \ 3-2.** *Structure of the BOOK Table*\n\n```sql\nCREATE TABLE BOOK (\n    ID\
    \ BIGINT NOT NULL,\n    TITLE VARCHAR(255),\n    PRICE DOUBLE(52, 0),\n    DESCRIPTION\
    \ VARCHAR(255),\n    ISBN VARCHAR(255),\n    NBOFPAGE INTEGER,\n    ILLUSTRATIONS\
    \ SMALLINT,\n    PRIMARY KEY (ID)\n);\n```\n\nThis is an example of a very simple\
    \ mapping. Relationships and inheritance also have default mapping, as you’ll\
    \ see later in the “Relationship Mapping” section.\n\nMost persistence providers,\
    \ including EclipseLink, allow you to generate the database automatically from\
    \ the entities. This feature is very convenient when you are in developing mode.\
    \ By using all the defaults, you can map your data easily with only the `@Entity`\
    \ and `@Id` annotations. However, most of the time you need to connect to a legacy\
    \ database or follow strict database naming conventions. To do this, JPA gives\
    \ you a rich set of annotations (or the XML equivalent) that allows you to customize\
    \ each part of the mapping (table, column names, primary keys, column size, null\
    \ or not null, and so on).\n\n## Elementary Mapping"
