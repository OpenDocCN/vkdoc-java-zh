    Life Cycle and Callback annotations


    The previous chapter explained the life cycle of a page (with six phases from
    receiving the request to rendering the response). Managed beans also have a life
    cycle (see Figure 12-3), which is completely different from that of the page.
    In fact, managed beans have a similar life cycle to stateless session beans; if
    they do exist, it is for the lifetime of the defined scope.


    **Figure 12-3.** *The managed bean life cycle*


    ![Image 107](index-367_1.jpg)


    Chapter 12 ■ prOCeSSING aND NaVIGatION


    **337**


    Managed beans running in a servlet container can use the @PostConstruct and


    @PreDestroy annotations. After the container creates an instance of a managed
    bean, it calls the @PostConstruct callback method, if any. After this stage the
    message bean is bound to a scope and responds to any user’s request. Before removing
    the managed bean, the container calls the @PreDestroy method. These methods can
    be used to initialize attributes, or to create and release any external resource.


    **Navigation**


    Web applications are made of multiple pages that you need to navigate through.
    Depending on the application, you can have various levels of navigation with page
    flows that are more or less sophisticated. You can think of wizards, where you
    can go back to the previous or initial page, business cases where you go to a
    particular page depending on a certain rule, and so on. JSF has multiple options
    for navigation and allows you to control the flow, based on single pages or globally
    for the entire application.


    When you just want to go from page to page by clicking a link or a button without
    doing any processing, you can use the UI components <h:commandButton> and <h:commandLink>.


    Their action attribute takes the name of the page you need to navigate to:


    <h:commandButton value="Create" action=" **listBooks.xhtml**"/> But most of the
