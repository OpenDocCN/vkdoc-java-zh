  trans: "\n同步接收器需要使用其 `receive()` 方法之一来启动连接、循环等待消息到达，并请求已到达的消息。`receive()` 有几种变体，允许客户端轮询或等待下一条消息。以下步骤说明了如何创建一个从主题消费消息的同步接收器（参见清单\
    \ 13-6）：\n\n****1.** 使用注入（或 JNDI 查找）获取连接工厂和主题。\n\n****2.** 使用连接工厂创建 `Connection`\
    \ 对象。\n\n****3.** 使用连接创建 `Session` 对象。\n\n****4.** 使用 `Session` 对象创建 `MessageConsumer`（在本例中，也可以是\
    \ `TopicSubscriber`）。\n\n****5.** 启动连接。\n\n****6.** 循环并在消费者对象上调用 `receive()` 方法。如果队列为空，`receive()`\
    \ 方法会阻塞并等待消息到达。此处，无限循环等待其他消息到达。\n\n****7.** 使用 `TextMessage.getText()` 方法处理 `receive()`\
    \ 方法返回的消息（如果是文本消息）。\n\n**374**\n\n第 13 章 ■ 发送消息\n\n**清单 13-6.** *接收器以同步方式消费消息*\n\
    \n```java\npublic class Receiver {\n\n    @Resource(mappedName = \"jms/javaee6/ConnectionFactory\"\
    )\n    private static ConnectionFactory connectionFactory;\n\n    @Resource(mappedName\
    \ = \"jms/javaee6/Topic\")\n    private static Topic topic;\n\n    public static\
    \ void main(String[] args) {\n        // 创建连接到队列所需的工件\n        Connection connection\
    \ = connectionFactory.createConnection();\n        Session session = connection.createSession(false,\
    \ Session.AUTO_ACKNOWLEDGE);\n        MessageConsumer consumer = session.createConsumer(topic);\n\
    \        connection.start();\n\n        // 循环接收消息\n        while (true) {\n  \
    \          TextMessage message = (TextMessage) consumer.receive();\n         \
    \   System.out.println(\"Message received: \" + message.getText());\n        }\n\
    \    }\n}\n```\n\n**异步投递**\n\n异步消费基于事件处理。客户端可以注册一个实现了 `MessageListener` 接口的对象（包括自身）。*消息监听器*\
    \ 是一个充当消息异步事件处理程序的对象。当消息到达时，提供者通过调用监听器的 `onMessage()` 方法来投递消息，该方法接受一个 `Message`\
    \ 类型的参数。使用这种事件模型，消费者无需无限循环来接收消息。MDB 使用这种事件模型。\n\n以下步骤描述了创建异步消息监听器的过程（参见清单 13-7）：\n\
    \n****1.** 该类实现 `javax.jms.MessageListener` 接口，该接口定义了一个名为 `onMessage()` 的方法。\n\
    \n****2.** 使用注入（或 JNDI 查找）获取连接工厂和目的地。\n\n****3.** 使用连接工厂创建 `Connection` 对象，使用连接创建\
    \ `Session` 对象，并使用 `Session` 对象创建 `MessageConsumer`。\n\n****4.** 调用 `setMessageListener()`\
    \ 方法，传入一个 `MessageListener` 接口的实例（在清单 13-7 中，`Listener` 类本身实现了 `MessageListener`\
    \ 接口）。\n\n第 13 章 ■ 发送消息\n\n**375**\n\n****5.** 注册消息监听器后，调用 `start()` 方法开始监听消息到达。如果在注册监听器之前调用\
    \ `start()`，你很可能会错过消息。\n\n****6.** 实现 `onMessage()` 方法并处理接收到的消息。每次消息到达时，提供者都会调用此方法，并传入消息。\n\
    \n**清单 13-7.** *消费者是一个消息监听器*\n\n```java\npublic class Listener implements MessageListener\
    \ {\n\n    @Resource(mappedName = \"jms/javaee6/ConnectionFactory\")\n    private\
    \ static ConnectionFactory connectionFactory;\n\n    @Resource(mappedName = \"\
    jms/javaee6/Topic\")\n    private static Topic topic;\n\n    public static void\
    \ main(String[] args) {\n        // 创建连接到队列所需的工件\n        Connection connection\
    \ = connectionFactory.createConnection();\n        Session session = connection.createSession(false,\
    \ Session.AUTO_ACKNOWLEDGE);\n        MessageConsumer consumer = session.createConsumer(topic);\n\
    \        consumer.setMessageListener(new Listener());\n        connection.start();\n\
    \    }\n\n    public void onMessage(Message message) {\n        System.out.println(\"\
    Message received: \" + ((TextMessage) message).getText());\n    }\n}\n```\n\n\
    **选择器**\n\n某些消息传递应用程序需要过滤它们接收的消息。当消息广播给多个客户端时，设置条件以便只有特定的接收者才能消费消息就变得很有用。这消除了提供者将消息传输给不需要它们的客户端所浪费的时间和带宽。\n\
    \n你已经看到消息由三部分组成：消息头、属性和消息体。消息头包含固定数量的字段（消息元数据），而属性是一组自定义的名称-值对，应用程序可以使用它们来设置任何值。可以在这两个区域上进行选择。发送者设置一个或多个属性值或消息头字段，接收者使用选择器表达式指定消息选择标准。只有与选择器匹配的消息才会被投递。消息选择器将过滤消息的工作分配给\
    \ JMS 提供者，而不是应用程序。\n\n**376**\n\n第 13 章 ■ 发送消息\n\n消息选择器是一个包含表达式的字符串。该表达式的语法基于\
    \ SQL92 条件表达式语法的一个子集，如下所示：\n\n```java\nsession.createConsumer(topic, \"JMSPriority\
    \ < 6\");\nsession.createConsumer(topic, \"JMSPriority < 6 AND orderAmount < 200\"\
    );\nsession.createConsumer(topic, \"orderAmount BETWEEN 1000 AND 2000\");\n```\n\
    \n在前面的代码中，创建了一个消费者，并传入了一个选择器字符串。该字符串可以使用消息头字段（`JMSPriority < 6`）或自定义属性（`orderAmount\
    \ < 200`）。生产者按如下方式将这些属性设置到消息中：\n\n```java\nmessage.setIntProperty(\"orderAmount\"\
    , 1530);\nmessage.setJMSPriority(5);\n```\n\n选择器表达式可以使用逻辑运算符（NOT、AND、OR）、比较运算符（=、>、>=、<、<=、<>）、算术运算符（+、-、*、/）、表达式（[NOT]\
    \ BETWEEN、[NOT] IN、[NOT] LIKE、IS [NOT] NULL）等。\n\n**可靠性机制**\n\n你已经了解了如何连接到提供者、创建不同类型的消息、将它们发送到队列或主题、接收全部消息或使用选择器进行过滤。但是，如果你严重依赖\
    \ JMS 并需要确保可靠性，该怎么办？JMS 定义了多个可靠性级别，以确保你的消息能够被投递，即使提供者崩溃、负载过高，或者目的地中充满了本应过期的消息。实现可靠消息投递的机制如下：\n\
    \n*   *设置消息生存时间*：为消息设置过期时间，以便在消息过时时不被投递。\n*   *指定消息持久性*：指定消息在提供者发生故障时是持久的。\n*\
    \   *控制确认*：指定不同级别的消息确认。\n*   *创建持久订阅者*：确保在发布-订阅模型中，消息能够投递给不可用的订阅者。\n*   *设置优先级*：设置投递消息的优先级。\n\
    \n**设置消息生存时间**\n\n在高负载下，可以为消息设置生存时间，以确保提供者在消息过时时将其从目的地中移除，可以通过使用 `MessageProducer`\
    \ API 或设置 `JMSExpiration` 消息头字段来实现。\n\n`MessageProducer` 有一个 `setTimeToLive()`\
    \ 方法，该方法接受毫秒数，或者对每条消息使用 `send()` 方法：\n\n```java\nMessageProducer producer = session.createProducer(topic);\n\
    producer.setTimeToLive(1000);\n// 或者\nproducer.send(message, DeliveryMode.NON_PERSISTENT,\
    \ 2, 1000);\n```\n\n![Image 121](img/index-407_1.jpg)\n\n第 13 章 ■ 发送消息\n\n**377**\n"
- fmt: '# 设置消息的生存时间


    第一次调用为生产者整体及其传递的所有消息设置 TTL，而第二次调用仅为一条消息设置 TTL。第二次调用发送一条消息，指定了传递模式、优先级和生存时间（1000）。当消息被发送时，其过期时间计算为生存时间值的总和。在`JMSExpiration`头字段中设置此值将导致过期的消息不被传递。


    ```

    message.setJMSExpiration(1000);

    ```


    # 指定消息持久性


    JMS 支持两种消息传递模式：持久性和非持久性。*持久性传递*确保消息仅被传递给消费者一次，而*非持久性传递*要求消息最多被传递一次。持久性传递（默认模式）更可靠，但会带来性能成本，因为它可以防止在提供者发生故障时丢失消息。


    传递模式可以通过两种方式指定：使用`MessageProducer`接口的`setDeliveryMode()`方法，或者向`send()`方法传递参数：


    ```

    MessageProducer producer = session.createProducer(topic);

    producer.setDeliveryMode(DeliveryMode.NON_PERSISTENT);


    // 或者


    producer.send(message, DeliveryMode.NON_PERSISTENT, 2, 1000);

    ```


    第一次调用为生产者整体及其传递的所有消息设置传递模式，而第二次调用仅为一条消息设置传递模式。


    # 控制确认


    到目前为止，我们探讨的场景都假设消息在发送和接收时没有任何确认。但有时，您会希望接收者确认消息已被接收（见图 13-10）。确认阶段可以由 JMS 提供者或客户端发起，具体取决于确认模式。


    **图 13-10.** *接收者确认消息*


    在事务性会话中，确认在事务提交时自动发生。如果事务回滚，所有已消费的消息将被重新传递。但在非事务性会话中，必须指定确认模式：


    *   `AUTO_ACKNOWLEDGE`：会话自动确认消息的接收。

    *   `CLIENT_ACKNOWLEDGE`：客户端通过显式调用`Message.acknowledge()`方法来确认消息。

    *   `DUPS_OK_ACKNOWLEDGE`：此选项指示会话延迟确认消息的传递。如果 JMS 提供者发生故障，这很可能会导致传递一些重复消息，因此应仅由能够容忍重复消息的消费者使用。如果消息被重新传递，提供者会将`JMSRedelivered`头字段的值设置为`true`。


    以下代码通过调用`acknowledge()`方法使用了显式客户端确认模式：


    ```

    // 生产者

    connection.createSession(false, Session.CLIENT_ACKNOWLEDGE);

    producer = session.createProducer(topic);

    message = session.createTextMessage();

    producer.send(message);


    // 消费者

    message.acknowledge();

    ```


    # 创建持久订阅者


    使用发布-订阅模型的缺点是，消息消费者必须在消息发送到主题时处于运行状态；否则它将无法接收消息。通过使用持久订阅者，JMS API 提供了一种将消息保留在主题中，直到所有订阅的消费者都收到它们的方法。使用持久订阅，接收者可以离线一段时间，但当它重新连接时，它会收到在其断开连接期间到达的消息。为了实现这一点，客户端使用会话创建一个持久订阅者。


    ```

    session.createDurableSubscriber(topic, "javaee6DurableSubscription");

    ```


    此时，客户端程序启动连接并接收消息。名称`javaee6DurableSubscription`用作持久订阅的标识符。每个持久订阅者必须有一个唯一的 ID，这导致需要为每个潜在的持久订阅者声明一个唯一的连接工厂。


