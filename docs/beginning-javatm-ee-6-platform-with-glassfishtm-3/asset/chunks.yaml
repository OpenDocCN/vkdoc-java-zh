    映射超类


    JPA 定义了一种特殊的类，称为*映射超类*，用于共享状态和行为，以及实体继承的映射信息。然而，映射超类并不是实体。它们不受持久化提供者的管理，没有对应的映射表，不能被查询，也不能成为关系的一部分，但它们可以为任何继承自它们的实体提供持久化属性。它们类似于可嵌入类，区别在于它们可以用于继承。通过在类上使用
    `@MappedSuperclass` 注解，可以将其标记为映射超类。


