- fmt: 'Several components have to be in place for transactions to work and follow
    the ACID properties. Let’s first take the simplest example of an application performing
    several changes to a single resource (e.g., a database). When there is only one
    transactional resource, all that is needed is a local transaction. Distributed
    transactions (à la JTA) can still be used, but are not strictly necessary. Figure
    9-1 shows the application interacting with a resource through a transaction manager
    and a resource manager.


    ![Image 77](index-271_1.jpg)


    **Figure 9-1.** *A transaction involving one resource*


    The components shown in Figure 9-1 abstract most of the transaction-specific processing
    from the application:


    - The *transaction manager* is the core component responsible for managing the
    transactional operations. It creates the transactions on the behalf of the application,
    informs the resource manager that it is participating in a transaction (an operation
    known as *enlistment*), and conducts the commit or rollback on the resource manager.

    - The *resource manager* is responsible for managing resources and registering
    them with the transaction manager. An example of a resource manager is a driver
    for a relational database, a JMS resource, or a Java connector.

    - The *resource* is persistent storage from which you read or write (a database,
    a message destination, etc.).


    It is not the application’s responsibility to preserve ACID properties. The application
    just decides to either commit or roll back the transaction, and the transaction
    manager prepares all the resources to successfully make it happen.


    In Java EE, these components handle transactions through the Java Transaction
    API (JTA) specified by JSR 907. JTA defines a set of interfaces for the application
    to demarcate transactions’ boundaries, and it also defines APIs to deal with the
    transaction manager. These interfaces are defined in the `javax.transaction` package,
    and some of them are described in Table 9-2.


    **Table 9-2.** *Main JTA Interfaces*


    | Interface | Description |

    | --- | --- |

    | `UserTransaction` | Defines the methods that an application can use to control
    transaction boundaries programmatically. It is used by EJBs with bean-managed
    transaction (BMT) to begin, commit, or roll back a transaction (as discussed in
    the “Bean-Managed Transaction” section). |

    | `TransactionManager` | Allows the EJB container to demarcate transaction boundaries
    on behalf of the EJB. |

    | `Transaction` | Allows operations to be performed against the transaction in
    the target `Transaction` object. |

    | `XAResource` | Serves as Java mapping of the industry standard X/Open XA interface
    (as discussed in the next section). |


    ## XA and Distributed Transactions


    As you’ve just seen, a transaction using a single resource (shown previously in
    Figure 9-1) is called a local transaction. However, many enterprise applications
    use more than one resource. Returning to the example of the fund transfer, the
    savings account and the current account could be in separate databases. You would
    then need transaction management across several resources, or resources that are
    distributed across the network. Such enterprise-wide transactions require special
    coordination involving XA and Java Transaction Service (JTS).


    Figure 9-2 shows an application that uses transaction demarcation across several
    resources. This means that in the same unit of work, the application can persist
    data in a database and send a JMS message, for example.


    **Figure 9-2.** *An XA transaction involving two resources*


    To have a reliable transaction across several resources, the transaction manager
    needs to use an XA resource manager interface. XA is a standard specified by the
    Open Group ([http://www.opengroup.org](http://www.opengroup.org)) for distributed
    transaction processing (DTP) that preserves the ACID properties. It is supported
    by JTA and allows heterogeneous resource managers from different vendors to interoperate
    through a common interface. XA uses a two-phase commit (2pc) to ensure that all
    resources either commit or roll back any particular transaction simultaneously.


    In our fund transfer example, suppose that the savings account is debited on a
    first database, and the transaction commits successfully. Then the current account
    is credited on a second database, but the transaction fails. We would have to
    go back to the first database and undo the committed changes. To avoid this data
    inconsistency problem, the two-phase commit performs an additional preparatory
    step before the final commit as shown in Figure 9-3.


    ![Image 79](index-273_1.jpg)


    ![Image 80](index-273_2.jpg)


    During phase 1, each resource manager is notified through a “prepare” command
    that a commit is about to be issued. This allows the resource managers to declare
    whether they can apply their changes or not. If they all indicate that they are
    prepared, the transaction is allowed to proceed, and all resource managers are
    asked to commit in the second phase.


    **Figure 9-3.** *Two-phase commit*


    Most of the time, the resources are distributed across the network (see Figure
    9-4). Such a system relies on JTS. JTS implements the Object Management Group
    (OMG) Object Transaction Service (OTS) specification, allowing transaction managers
    to participate in distributed transactions through Internet Inter-ORB Protocol
    (IIOP). JTS is intended for vendors who provide the transaction system infrastructure.
    As an EJB developer, you don’t have to worry about this; just use JTA, which interfaces
    with JTS at a higher-level.


    **Figure 9-4.** *A distributed XA transaction*


    ## Transaction Support in EJB


    When you develop business logic with EJBs, you don’t have to worry about the internal
    structure of transaction managers or resource managers because JTA abstracts most
    of the underlying complexity. With EJBs, you can develop a transactional application
    very easily, leaving the container to implement the low-level transaction protocols,
    such as the two-phase commit or the transaction context propagation. An EJB container
    is a transaction manager that supports JTA as well as JTS to participate in distributed
    transactions involving other EJB containers. In a typical Java EE application,
    session beans establish the boundaries of a transaction, call entities to interact
    with the database, or send JMS messages in a transaction context.


    From its creation, the EJB model was designed to manage transactions. In fact,
    transactions are natural to EJBs, and by default each method is automatically
    wrapped in a transaction. This default behavior is known as a container-managed
    transaction (CMT), because transactions are managed by the EJB container (a.k.a.
    declarative transaction demarcation). You can also choose to manage transactions
    yourself using BMTs, also called programmatic transaction demarcation. Transaction
    demarcation determines where transactions begin and end.


    ### Container-Managed Transactions


    When managing transactions declaratively, you delegate the demarcation policy
    to the container. You don’t have to explicitly use JTA in your code (even if JTA
    is used underneath); you can leave the container to demarcate transaction boundaries
    by automatically beginning and committing transactions based on metadata. The
    EJB container provides transaction management services to session beans and MDBs
    (see Chapter 13 for more on MDBs).'
