    支持该规范的容器。标准 API、可移植的 JNDI 名称、轻量级组件以及异常配置，使得 EJB 能够轻松部署在开源及商业实现上。其底层技术诞生于 10 多年前，这使得
    EJB 应用程序受益于一个稳定、高质量的代码库，该代码库已在众多企业环境中长期使用。


    **EJB 的类型**


    由于企业应用程序可能很复杂，Java EE 平台定义了多种类型的 EJB。从第 6 章到第 9 章，我将只关注会话 Bean 和定时器服务。


    会话 Bean 用于封装高级业务逻辑，这使其成为 EJB 技术中最重要的部分。一个会话 Bean 可能具有以下特征：


    • *无状态*：会话 Bean 在方法之间不包含会话状态，任何实例都可用于任何客户端。


    第 6 章 ■ 企业 Java Bean


    **169**


    • *有状态*：会话 Bean 包含会话状态，该状态必须为单个用户跨方法保留。


    • *单例*：单个会话 Bean 在客户端之间共享，并支持并发访问。


    EJB 定时器服务是 Java EE 中调度任务的标准方案。依赖基于日历通知的企业应用程序使用此服务来模拟工作流类型的业务流程。


    消息驱动 Bean（MDB）用于通过使用 JMS 接收异步消息来与外部系统集成。尽管 MDB 是 EJB 规范的一部分，但我将单独处理它们（在第 13 章中），因为此组件模型主要用于与面向消息的中间件（MOM）集成系统。MDB
    通常将业务逻辑委托给会话 Bean。


    EJB 也可以用作 Web 服务端点。第 14 章和第 15 章演示了 SOAP 和 RESTful Web 服务，它们可以是部署在 Web 容器中的简单
    POJO，也可以是部署在 EJB 容器中的会话 Bean。


    ■**注意** 出于兼容性原因，EJB 3.1 规范仍然提及实体 Bean。这种持久化组件模型已被精简，并可能在 Java EE 7 中消失。JPA 是用于映射和查询关系数据库的首选技术。本书不涵盖实体
    Bean。


    **EJB 的结构**


    会话 Bean 封装业务逻辑，支持事务，依赖于提供池化、多线程、安全等功能的容器。创建这样一个强大的组件需要哪些工件？一个 Java 类和一个注解，仅此而已。下一章将展示会话
    Bean 可以更复杂；它们可以使用不同类型的接口、注解、XML 配置和拦截调用。清单 6-1 展示了容器识别一个类为会话 Bean 并应用所有企业服务是多么简单。


    **清单 6-1.** *一个简单的无状态 EJB*


    **@Stateless**


    public class BookEJB {


    @PersistenceContext(unitName = "chapter06PU")


    private EntityManager em;


    public Book findBookById(Long id) {


    return em.find(Book.class, id);


    }


    public Book createBook(Book book) {


    em.persist(book);


    **170**


    第 6 章 ■ 企业 Java Bean


    return book;


    }


    }


    J2EE 的早期版本要求开发人员创建多个工件才能创建一个会话 Bean：一个本地或远程接口（或两者）、一个本地 Home 或远程 Home 接口（或两者）以及一个部署描述符。Java
    EE 5 和 EJB 3.0 极大地简化了模型，以至于只需要一个类和一个或多个业务接口就足够了。EJB 3.1 更进一步，它允许一个带注解的 POJO 成为会话
    Bean。如清单 6-1 中的代码所示，该类没有实现任何接口，也不需要任何 XML 配置。只需一个注解就能将一个 Java 类转变为支持事务和安全的组件：@Stateless。然后，使用实体管理器（如前面章节所示），BookEJB
    以简单而强大的方式从数据库创建和检索书籍。下一章将演示声明一个有状态 Bean 或单例 Bean 是多么容易。


    简单性也适用于客户端。调用此 BookEJB 上的方法只需要一个注解，即可使用依赖注入获得引用。依赖注入允许容器（客户端、Web 或 EJB 容器）借助@EJB
    注解自动注入对 EJB 的引用。在清单 6-2 中，Main 类通过使用@EJB 注解私有静态属性 bookEJB 来获取对 BookEJBRemote 的引用。如果
    EJB 部署在容器中，则 Main 类需要远程访问该 EJB。为 EJB 添加一个简单的远程接口将赋予其远程访问能力。


    **清单 6-2.** *一个调用无状态 EJB 的客户端类*


    public class Main {


    **@EJB**


    private static BookEJBRemote **bookEJB**;


    public static void main(String[] args) {


    Book book = new Book();


    book.setTitle("银河系漫游指南");


    book.setPrice(12.5F);


    book.setDescription("道格拉斯·亚当斯创作的科幻小说");


    book.setIsbn("1-84023-742-2");


    book.setNbOfPage(354);


    **bookEJB**.createBook(book);


    }


    }


    纯 Java 类与会话 Bean 之间的一个区别如清单 6-2 所示；即使代码相似，Main 类也不会使用 new 关键字创建 BookEJB 的实例；相反，该类在调用方法之前需要首先获取对
    EJB 的引用，可以通过注入或 JNDI 查找。使用这种机制是因为 EJB 运行在托管环境中。它需要部署在容器中（嵌入式或非嵌入式）。


    与大多数 Java EE 6 组件一样，EJB 需要元数据来通知容器所需操作（事务边界）或要注入的服务。元数据可以采用注解或 XML 的形式。EJB 可以使用可选的
    ejb-jar.xml 部署描述符进行部署，该描述符将覆盖注解。通过异常配置，单个注解就足以将 POJO 转变为 EJB，因为容器会应用所有默认行为。


    **EJB 容器**


    如前所述，EJB 是服务器端组件，需要在容器中执行。此运行时环境提供了许多企业应用程序通用的核心功能，例如：


    • *远程客户端通信*：无需编写任何复杂代码，EJB 客户端（另一个 EJB、用户界面、批处理进程等）即可通过标准协议远程调用方法。


    • *依赖注入*：容器可以将多种资源注入到 EJB 中（JMS 目标和工厂、数据源、其他 EJB、环境变量等）。


    • *状态管理*：对于有状态会话 Bean，容器透明地管理其状态。你可以为特定客户端维护状态，就像开发桌面应用程序一样。


    • *池化*：对于无状态 Bean 和 MDB，容器会创建一个可由多个客户端共享的实例池。一旦被调用，EJB 会返回池中以备重用，而不是被销毁。


    • *组件生命周期*：容器负责管理每个组件的生命周期。


    • *消息传递*：容器允许 MDB 监听目标并消费消息，而无需过多的 JMS 管道代码。


    • *事务管理*：通过声明式事务管理，EJB 可以使用注解通知容器它应使用的事务策略。容器负责提交或回滚。


    • *安全性*：可以在 EJB 上指定类或方法级别的访问控制，以强制执行用户和角色身份验证。


    • *并发支持*：除了需要一些并发声明的单例 Bean 外，所有其他类型的 EJB 本质上是线程安全的。你可以开发高性能应用程序，而无需担心线程问题。

