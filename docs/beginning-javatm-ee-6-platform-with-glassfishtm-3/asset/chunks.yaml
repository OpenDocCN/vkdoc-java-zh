    **433**


    ■**Note** Here I am using cURL ([http://curl.haxx.se/) as a client, but I could
    have used Firefox or any](http://curl.haxx.se/)


    other web client that deals with HTTP requests. cURL is a command-line tool for
    transferring files with URL


    syntax via protocols such as HTTP, FTP, Gopher, SFTP, FTPS, SCP, TFTP, and many
    more. You can send HTTP commands, change HTTP headers, and so on. It is a good
    tool for simulating a user’s actions at a web browser.


    http Methods


    The Web consists of well-identified resources linked together and accessed through
    simple HTTP requests. The main types of requests standardized in HTTP are GET,
    POST, PUT, DELETE.


    These are called verbs, or methods. HTTP defines four other verbs that are less
    frequently used: HEAD, TRACE, OPTIONS, CONNECT.


    **GET**


    GET is a simple read that requests a representation of a resource. GET should
    be implemented in a safe way, meaning it shouldn’t change the state of the resource.
    In addition, GET must be idempotent, which means it must leave the resource in
    the same state when called once, twice, or more. Safety and idempotence bring
    greater stability. When a client does not get a response (e.g., due to a network
    failure), it might renew its requests, and those new requests will expect the
    same answer it should have received originally, without corrupting the resource
    state on the server.


    **POST**


    Given a representation (text, XML, etc.), POST creates a new resource as a subordinate
    of a main resource identified by the requested URI. Examples of POST could be
    appending a message to a log file, a comment to a blog, a book to a booklist,
    and so on. Consequently, POST is not safe (the resource state is updated) nor
    idempotent (sending the request twice will result in two new subordinates). If
    a resource has been created on the origin server, the response should be status
    201 (Created). Most modern browsers generate only GET and POST.


    **PUT**


    A PUT request is intended to update the state of the resource stored under a given
    URI. If the request URI refers to a nonexistent resource, the resource will be
    created under this same URI.


    PUT is not safe (because the state of the resource gets updated), but it is idempotent:
    you can send the same PUT request many times, and the final resource state will
    always be the same.


    **DELETE**


    A DELETE request deletes the resource. The response to a DELETE may be a status
    message as part of the body or no status at all. DELETE is also idempotent but
    not safe.


    **434**


    Chapter 15 ■ reStFUL WeB SerVICeS


    **Others**


    As mentioned previously, other HTTP actions exist, even if they are less used:


    • HEAD is identical to GET except that the server doesn’t return a message body
    in the response. HEAD might be useful for checking the validity of a link or the
    size of an entity without transferring it.


    • TRACE echoes back the received request.


    • OPTIONS represents a request for information about the communication options
    availa-


    ble on the request/response chain identified by the URI. This method allows the
    client


    to determine the options and/or requirements associated with a resource, or the
    capa-


    bilities of a server, without implying a resource action or initiating resource
    retrieval.


    • CONNECT is used in conjunction with a proxy that can dynamically switch to being
    a


    tunnel (a technique by which the HTTP protocol acts as a wrapper for various network


    protocols).


    Content Negotiation


    Content negotiation, described in section 12 of the HTTP standard, is defined
    as “the process of selecting the best representation for a given response when
    there are multiple representations available.” Clients’ needs, desires, and capabilities
    vary; the best representation for a mobile-device user in Japan might not be the
    best for a feed-reader application in the US.


    Content negotiation is based on, but not limited to, the HTTP request headers
    Accept,


    Accept-Charset, Accept-Encoding, Accept-Language, and User-Agent. For example,
    to get the CSV representation of Apress Java books, the client application (the
    user agent) will request


    [http://www.apress.com/book/catalog/java with a header](http://www.apress.com/book/catalog/java)
    Accept set to text/csv. You could also imagine that, based on the Accept-Language
    header, the content of the CSV document might be translated by the server into
    the corresponding language.


