  trans: '

    作为第一个示例，让我们从最简单的映射开始。在 JPA 持久化模型中，实体是一个普通的 Java 对象（POJO）。这意味着实体的声明、实例化和使用方式与任何其他
    Java 类完全相同。实体拥有可通过 getter 和 setter 操作的属性（即其状态）。每个属性都存储在数据库表的列中。清单 3-1 展示了一个简单的实体。


    **清单 3-1.** *Book 实体的简单示例*


    **@Entity**


    public class Book {


    **@Id**


    private Long id;


    private String title;


    private Float price;


    private String description;


    private String isbn;


    private Integer nbOfPage;


    private Boolean illustrations;


    **59**


    **60**


    第 3 章 ■ 对象关系映射


    public Book() {


    }


    // Getters, setters


    }


    这段来自 CD-BookStore 应用程序的代码示例代表了一个 Book 实体，为了清晰起见，我省略了其中的 getter 和 setter。如你所见，除了一些注解之外，这个实体看起来与任何
    Java 类完全一样：它拥有多个不同类型的属性（Long、String、Float、Integer 和 Boolean），一个默认构造函数，以及每个属性对应的
    getter 和 setter。那么，它是如何映射到数据库表的呢？答案就在于注解。


    首先，该类使用了 @javax.persistence.Entity 注解，这使得持久化提供程序能够将其识别为持久化类，而不仅仅是一个简单的 POJO。然后，@javax.persistence.Id
    注解定义了该对象的唯一标识符。由于 JPA 的核心是将对象映射到关系表，因此对象需要一个 ID，该 ID 将被映射到主键。其他属性（title、price、description
    等）没有注解，因此它们将通过应用默认映射而成为持久化属性。


    这段代码示例只有属性，但正如你将在第 5 章中看到的，实体也可以拥有业务方法。请注意，这个 Book 实体是一个 Java 类，它没有实现任何接口，也没有继承任何类。实际上，要成为一个实体，一个类必须遵循以下规则：


    *   实体类必须使用 @javax.persistence.Entity 注解（或在 XML 描述符中声明为实体）。

    *   必须使用 @javax.persistence.Id 注解来表示简单的主键。

    *   实体类必须有一个无参构造函数，该构造函数必须是 public 或 protected 的。实体类也可以有其他构造函数。

    *   实体类必须是顶层类。枚举或接口不能被指定为实体。

    *   实体类不能是 final 的。实体类的方法或持久化实例变量都不能是 final 的。

    *   如果实体实例需要作为分离对象按值传递（例如，通过远程接口），则实体类必须实现 Serializable 接口。


    由于 Book 实体（如前文清单 3-1 所示）遵循这些简单规则，持久化提供程序可以在 Book 实体的属性与 BOOK 表的列之间同步数据。因此，如果应用程序修改了
    isbn 属性，ISBN 列也会同步更新（前提是实体处于托管状态、事务上下文已设置等）。


    如图 3-1 所示，Book 实体存储在 BOOK 表中，每一列都以类的属性命名（例如，String 类型的 isbn 属性映射到名为 ISBN 的 VARCHAR
    类型列）。这些默认映射规则是被称为*例外配置*原则的重要组成部分。


    ![Image 28](img/index-91_1.jpg)


    第 3 章 ■ 对象关系映射


    **61**


    **图 3-1.** *实体与表之间的数据同步*


    **例外配置**


    Java EE 5 引入了例外配置的概念（有时也称为*例外编程*）。这意味着，除非另有指定，否则容器或提供程序应应用默认规则。换句话说，必须提供配置是规则的例外情况。这允许你编写最少的代码来运行应用程序，同时依赖容器和提供程序的默认设置。


    让我们回到之前的代码示例（参见清单 3-1）。没有任何注解的情况下，Book 实体将被视为一个普通的 POJO，而不会被持久化。这就是规则：如果没有给出特殊配置，则应应用默认值，而
    JVM 的默认值是 Book 类只是一个普通类。但是，由于你需要更改此默认行为，因此你使用 @Entity 注解该类。对于标识符也是如此。你需要一种方法来告诉持久化提供程序
    id 属性必须映射到主键，因此你使用 @Id 注解它。这种决策类型是例外配置方法的特征，在这种方法中，对于更常见的情况不需要注解，仅在需要覆盖时才使用注解。这意味着对于所有其他属性，将应用以下默认映射规则：


    *   实体名称映射到关系表名称（例如，Book 实体映射到 BOOK 表）。如果你想将其映射到另一个表，则需要使用 @Table 注解，稍后你将在“基本映射”部分中看到。

    *   属性名称映射到列名称（例如，id 属性或 getId() 方法映射到 ID 列）。如果你想更改此默认映射，则需要使用 @Column 注解。


    **62**


    第 3 章 ■ 对象关系映射


    *   JDBC 规则适用于将 Java 基本类型映射到关系数据类型。String 将映射到 VARCHAR，Long 映射到 BIGINT，Boolean
    映射到 SMALLINT，依此类推。从 String 映射的列的默认大小为 255（String 映射到 VARCHAR(255)）。


    但请记住，默认映射规则因数据库而异。例如，在 Derby 中 String 映射到 VARCHAR，在 Oracle 中映射到 VARCHAR2。Integer
    在 Derby 中映射到 INTEGER，在 Oracle 中映射到 NUMBER。底层数据库的信息在 persistence.xml 文件中提供，你稍后将在第
    4 章的“持久化上下文”部分中看到。


    遵循这些规则，Book 实体将映射到一个 Derby 表，该表的结构如清单 3-2 所述。


    **清单 3-2.** *BOOK 表的结构*


    CREATE TABLE **BOOK** (


    ID BIGINT NOT NULL,


    TITLE VARCHAR(255),


    PRICE DOUBLE(52, 0),


    DESCRIPTION VARCHAR(255),


    ISBN VARCHAR(255),


    NBOFPAGE INTEGER,


    ILLUSTRATIONS SMALLINT,


    PRIMARY KEY (ID)


    );


    这是一个非常简单的映射示例。关系和继承也有默认映射，你稍后将在“关系映射”部分中看到。


    包括 EclipseLink 在内的大多数持久化提供程序都允许你根据实体自动生成数据库。在开发模式下，此功能非常方便。通过使用所有默认设置，你只需使用 @Entity
    和 @Id 注解即可轻松映射数据。然而，大多数情况下，你需要连接到遗留数据库或遵循严格的数据库命名约定。为此，JPA 提供了丰富的注解集（或等效的 XML），允许你自定义映射的每个部分（表、列名、主键、列大小、是否允许为空等）。


    **基本映射**

