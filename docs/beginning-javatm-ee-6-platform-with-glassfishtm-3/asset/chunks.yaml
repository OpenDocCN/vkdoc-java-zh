    **172**


    第 6 章 ■ 企业级 Java Bean


    当然，这对客户端来说是完全透明的；从创建到销毁，企业 Bean 都存在于容器之中。


    在 Java EE 应用程序中，EJB 容器通常会与其他容器交互：Servlet 容器（负责管理 Servlet 和 JSF 页面的执行）、应用程序客户端容器（ACC，用于管理独立应用程序）、消息代理（用于发送、排队和接收消息）、持久化提供者等等。这些容器都将在应用服务器（如
    GlassFish、JBoss、Weblogic 等）内部运行。应用服务器是特定于实现的，大多数都提供集群能力、可伸缩性、负载均衡、透明故障转移、管理、监控、缓存、池等功能。


    **嵌入式容器**


    从创建的那一刻起，EJB 就必须在运行于独立 JVM 中的容器内执行。想想 GlassFish、JBoss、Weblogic 等，你会记得，在部署和使用你的
    EJB 之前，需要先启动应用服务器。这在生产环境中是合适的，因为服务器需要持续运行，但在开发环境中却很耗时，例如，在开发环境中你经常需要为了调试目的而进行部署。服务器运行在不同进程中的另一个问题是，单元测试能力受限，并且如果不将
    EJB 部署到正在运行的服务器中，就很难轻松运行单元测试。为了解决这些问题，一些应用服务器实现提供了嵌入式容器，但这些是特定于实现的。如今，EJB 3.1
    规范了一种可跨服务器移植的嵌入式容器。


    嵌入式容器的理念是能够在 Java SE 环境中执行 EJB 应用程序，允许客户端在同一个 JVM 和类加载器中运行。这为测试、离线处理（例如批处理）以及在桌面应用程序中使用
    EJB 提供了更好的支持。可嵌入容器 API（在 `javax.ejb.embeddable` 中定义）提供了与 Java EE 运行时容器相同的受管理环境，并包含相同的服务：注入、组件环境访问、容器管理事务（CMT）等。


    以下代码片段向你展示了如何创建可嵌入容器的实例、获取 JNDI 上下文、查找 EJB 以及调用方法：


    ```java

    EJBContainer ec = EJBContainer.createEJBContainer();

    Context ctx = ec.getContext();

    BookEJB bookEJB = (BookEJB) ctx.lookup("java:global/BookEJB");

    bookEJB.createBook(book);

    ```


    在下一章中，你将看到如何使用引导 API 来启动容器并执行 EJB。


    **依赖注入与 JNDI**


    EJB 使用依赖注入来访问多种资源（其他 EJB、数据源、JMS 目的地、环境资源等）。在这种模型中，容器将数据推送到 Bean 中。如清单 6-2 所示，客户端通过
    `@EJB` 注解注入一个 EJB 的引用：


    ```java

    @EJB

    private static BookEJB bookEJB;

    ```


    第 6 章 ■ 企业级 Java Bean


    **173**


    注入是在部署时进行的。如果数据有可能不会被使用，Bean 可以通过执行 JNDI 查找来避免资源注入的开销。JNDI 是注入的一种替代方案；通过 JNDI，代码仅在需要时才拉取数据，而不是接受可能根本不需要的推送数据。


    JNDI 是一个用于访问不同类型目录服务的 API，允许客户端通过名称绑定和查找对象。JNDI 在 Java SE 中定义，并且独立于底层实现，这意味着可以使用标准
    API 在轻量级目录访问协议（LDAP）目录或域名系统（DNS）中查找对象。


    上述代码的替代方案是使用 JNDI 的 `InitialContext` 并查找名为 `java:global/chapter06/BookEJB` 的已部署
    EJB，如下所示：


    ```java

    Context ctx = new InitialContext();

    BookEJB bookEJB = (BookEJB) ctx.lookup("java:global/chapter06/BookEJB");

    ```


    JNDI 已经存在很长时间了。它的 API 是规范化的，并且可以跨应用服务器移植。但 JNDI 名称并非如此，它是特定于实现的。当在 GlassFish 或
    JBoss 中部署 EJB 时，该 EJB 在目录服务中的名称是不同的，因此不可移植。客户端必须使用一个名称在 GlassFish 中查找 EJB，而使用另一个名称在
    JBoss 中查找。借助 EJB 3.1，JNDI 名称已被规范化，因此代码可以移植。在前面的示例中，`java:global/chapter06/BookEJB`
    这个名称遵循新的命名约定：


    `java:global[/<app-name>]/<module-name>/<bean-name>[!<fully-qualified-interface-name>]`


    下一章将展示如何使用这个可移植的名称来查找 EJB。


    **回调方法与拦截器**


    每种 EJB 类型（无状态、有状态、单例和 MDB）都有一个由容器管理的生命周期。EJB 允许使用注解方法（`@PostConstruct`、`@PreDestroy`
    等），类似于上一章中实体使用的回调方法，这些方法会在其生命周期的特定阶段由容器自动调用。这些方法可以初始化 Bean 上的状态信息、使用 JNDI 查找资源或释放数据库连接。


    对于任何横切关注点，开发者可以使用拦截器，它基于 AOP 模型，在该模型中，方法的调用会被自动包裹上额外的功能。


    EJB 的生命周期、回调方法和拦截器将在第 8 章中解释（第 5 章侧重于 JPA 实体的生命周期）。


    **打包**


    与大多数 Java EE 组件（Servlet、JSF 页面、Web 服务等）一样，EJB 在部署到运行时容器之前需要先进行打包。在同一个归档文件中，你通常会找到企业
    Bean 类、其接口、拦截器、任何需要的超类或超接口、异常、辅助类以及可选的部署描述符（`ejb-jar.xml`）。


    一旦这些工件被打包成一个 jar（Java 归档）文件，它们就可以直接部署到容器中。另一种选择是将 jar 文件嵌入到一个 ear（企业归档）文件中，然后部署该
    ear 文件。


    ![Image 63](img/index-204_1.jpg)


    **174**


    第 6 章 ■ 企业级 Java Bean


    Ear 文件用于将一个或多个模块（EJB 或 Web 应用程序）打包到单个归档文件中，以便能够同时且一致地部署到应用服务器中。例如，如图 6-2 所示，如果你需要部署一个
    Web 应用程序，你可能希望将你的 EJB 和实体打包到单独的 jar 文件中，将你的 Servlet 打包到一个 war 文件中，然后将整个内容打包到一个
    ear 文件中。将该 ear 文件部署到应用服务器中，你将能够使用 EJB 从 Servlet 操作实体。


    **图 6-2.** *打包 EJB*

