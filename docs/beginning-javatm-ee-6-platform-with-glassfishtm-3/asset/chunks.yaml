  trans: '

    因此，网络具有极佳的连通性。如果两个资源之间存在强关联，它们就应该被连接起来。REST 指出，Web 服务也应利用超媒体来告知客户端有哪些可用资源以及如何访问，从而提升服务的可发现性。从一个单一的
    URI 出发，访问一个连接良好的 Web 服务的用户代理就能发现所有可用的操作、资源及其各种表现形式等。


    例如，当用户代理查找一张 CD 的表现形式（见清单 15-1）时，该表现形式不仅可以包含艺术家的名字，还可以包含指向其传记的链接或 URI。是否实际获取该传记则由用户代理决定。该表现形式还可以链接到资源的其他表现形式或可用操作。


    **清单 15-1.** *一个连接到其他服务的 CD 表现形式*


    <cd>


    <title>Ella and Louis</title>


    [<year ref=''http://music.com/year/1956''>1956</year>](http://music.com/year/1956)


    [<artist ref=''http://music.com/artists/123''>Ella Fitzgerald</artist>](http://music.com/artists/123)


    [<artist ref=''http://music.com/artists/456''>Louis Armstrong</artist>](http://music.com/artists/456)


    <link rel="self" type="text/json"


    [href="http://music.com/album/789"/>](http://music.com/album/789)


    <link rel="self" type="text/xml"


    [href="http://music.com/album/789"/>](http://music.com/album/789)


    [<link rel="http://music.com/album/comments" type="text/xml"](http://music.com/album/comments)


    [href="http://music.com/album/789/comments"/>](http://music.com/album/789/comments)


    </cd>


    超媒体原则的另一个关键方面是应用程序的状态，该状态必须由超媒体来引导。简而言之，Web 服务提供一组链接这一事实，使得客户端只需通过点击链接，就能将应用程序从一个状态转移到下一个状态。


    在前面的 XML 片段中，客户端可以通过对专辑发表评论来改变应用程序的状态。专辑的评论列表是一个可通过 URI [`music.com/album/789/comments`](http://music.com/album/789/comments)
    寻址的资源。由于此 Web 服务使用了统一接口，一旦客户端知道了 URI 格式、可用的内容类型和数据格式，它就会确切地知道如何与之交互：GET 请求将检索现有评论列表，POST
    请求将创建一条新评论，等等。从这个单一的初始请求开始，客户端可以执行许多操作：超媒体驱动着应用程序的状态。


    **无状态性**


    REST 的最后一个特性是无状态性，这意味着每个 HTTP 请求都是完全独立发生的，服务器绝不应跟踪已执行的请求。为清晰起见，通常将资源状态和应用程序状态区分开来。资源状态必须存在于服务器端，并由所有用户共享；而应用程序状态必须保留在客户端，是其专有财产。回到清单
    15-1 的例子，应用程序状态是客户端已获取了专辑 *Ella and Louis* 的一个表现形式，但服务器不应保留此信息。资源状态是专辑信息本身；服务器显然需要维护此信息。客户端可以更改资源状态。如果购物车是一个仅限单个客户端访问的资源，那么应用程序需要在客户端会话中跟踪购物车
    ID。


    无状态性带来了许多优势，例如更好的可伸缩性：无需处理会话信息，无需将后续请求路由到同一台服务器，易于处理故障等。如果需要保持状态，客户端必须做额外的工作来存储它。


    **用于 RESTful Web 服务的 Java API**


    一些底层概念（例如 HTTP 协议）可能会让你想知道在开发资源时代码会是什么样子；你无需编写管道代码来解析 HTTP 请求，也无需手动创建 HTTP 响应。JAX-RS
    是一个非常优雅的 API，它允许你仅用几个注解就能描述一个资源。资源是至少有一个方法使用 `@javax.ws.rs.Path` 注解的 POJO。清单 15-2
    展示了一个典型的资源。


    **清单 15-2.** *一个简单的图书资源*


    **@Path**("/book")


    public class BookResource {


    **@GET**


    **@Produces**("text/plain")


    public String getBookTitle() {


    return "H2G2";


    }


    }


    BookResource 是一个使用 @Path 注解的 Java 类，表明该资源将托管在 URI 路径 /book 上。getBookTitle() 方法被标记为处理
    HTTP GET 请求（使用 @GET 注解）并生成文本（内容由 MIME 媒体类型 text/plain 标识）。要访问此资源，你需要一个 HTTP 客户端（如浏览器）并使用
    HTTP GET 方法指向 URL [`www.myserver.com/book`](http://www.myserver.com/book)。


    由于使用 JAX-RS 编写资源很容易，让我们进一步探索 JAX-RS API。


    **JAX-RS 模型**


    从清单 15-2 可以看出，REST 服务既没有实现任何接口，也没有继承任何类；将 POJO 转变为 REST 服务唯一必需的注解是 @Path。JAX-RS
    依赖于“例外配置”原则，因此它有一套注解来配置默认行为。以下是编写 REST 服务的要求：


    *   类必须使用 @javax.ws.rs.Path 注解。

    *   要为 REST 服务添加 EJB 功能，类必须使用 @javax.ejb.Stateless 注解。

    *   类必须定义为 public，并且不能是 final 或 abstract。

    *   根资源类（带有 @Path 注解的类）必须有一个默认的公共构造函数。非根资源类不需要这样的构造函数。

    *   类不能定义 finalize() 方法。


    JAX-RS 本质上是围绕 HTTP 的，并有一套清晰定义的类和注解来处理 HTTP 和 URI。一个资源可以有多种表现形式，因此该 API 支持多种内容类型，并使用
    JAXB 将 XML 和 JSON 表现形式编组和解组为对象。JAX-RS 也与容器无关，因此资源不仅可以部署在 GlassFish 中，还可以部署在各种
    Servlet 容器中。


    **如何编写 REST 服务**


    REST 服务可以是无状态会话 Bean，允许对持久层（JPA 实体）进行事务性访问，如清单 15-3 所示。


    **清单 15-3.** *一个从数据库创建和检索图书的图书资源*


    @Path("books")


    **@Stateless**


    **@Produces**({"application/xml", "application/json"})


    **@Consumes**({"application/xml", "application/json"})


    public class BookResource {


    @Context


    private UriInfo uriInfo;


    @PersistenceContext(unitName = "chapter15PU")


    private EntityManager em;


    **@GET**


    public List<Book> **getAllBooks**() {


    Query query = em.createNamedQuery("findAllBooks");


    List<Book> books = query.getResultList();


    return books;


    }


    **@POST**


    public Response **createNewBook**(JAXBElement<Book> bookJaxb) {


    Book book = bookJaxb.getValue();


    em.persist(book);


    URI bookUri = uriInfo.getAbsolutePathBuilder().path(➥


    book.getId().toString()).build();


    return Response.created(bookUri).build();


    }


    }


    清单 15-3 中的代码代表了一个 REST 服务，它可以消费和生成图书的 XML 和 JSON 表现形式。getAllBooks() 方法从数据库中检索图书列表，并返回该列表的
    XML 或 JSON 表现形式（使用内容协商），可通过 GET 方法访问。createNewBook() 方法接收图书的 XML 或 JSON 表现形式，并将其持久化到数据库中。此方法通过
    HTTP POST 调用，并返回新创建图书的 URI，遵循非常简单的 JAX-RS 模式。

