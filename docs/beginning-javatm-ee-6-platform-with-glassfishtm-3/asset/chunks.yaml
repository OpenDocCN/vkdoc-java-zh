    <td><input id=" **price**" type="text" ➥

    **onblur**="javascript:**priceRequired()**"/>

    <span id=" **priceError**"/>

    </td>

    </tr>

    <tr>

    <td>描述 :</td>

    <td><textarea name="textarea" cols="20" rows="5"></textarea></td>

