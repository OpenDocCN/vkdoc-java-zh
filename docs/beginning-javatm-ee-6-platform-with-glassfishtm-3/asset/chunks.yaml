- fmt: "在部署`BookResource`和`Book`实体之前，我们需要在`web.xml`文件中注册`Jersey`（参见清单15-15）。这样，发送到`/rs`路径的请求将被`Jersey`拦截。\n\
    \n它还通过`com.sun.jersey.config.property.packages`参数告诉`Jersey`在哪里查找带有注解的JAX-RS Java类。\n\
    \n**清单15-15.** 声明`Jersey`的`web.xml`文件\n\n```xml\n<?xml version='1.0' encoding='UTF-8'?>\n\
    <web-app version=\"2.5\"\n    xsi:schemaLocation=\"http://java.sun.com/xml/ns/javaee\n\
    \    http://java.sun.com/xml/ns/javaee/web-app_2_5.xsd\">\n    <servlet>\n   \
    \     <servlet-name>Jersey Web Application</servlet-name>\n        <servlet-class>\n\
    \            com.sun.jersey.spi.container.servlet.ServletContainer\n        </servlet-class>\n\
    \        <init-param>\n            <param-name>com.sun.jersey.config.property.packages</param-name>\n\
    \            <param-value>com.apress.javaee6.chapter15</param-value>\n       \
    \ </init-param>\n        <load-on-startup>1</load-on-startup>\n    </servlet>\n\
    \    <servlet-mapping>\n        <servlet-name>Jersey Web Application</servlet-name>\n\
    \        <url-pattern>/rs/*</url-pattern>\n    </servlet-mapping>\n</web-app>\n\
    ```\n\n部署描述符将请求映射到`/rs/*` URL模式。这意味着每当URL以`/rs/`开头时，它都将由`Jersey`处理。事实上，在我使用`cURL`的示例中，所有资源URL都以`/rs`开头：\n\
    \n```bash\ncurl -X GET -H \"Accept: application/json\" \\\n    http://localhost:8080/chapter15-resource-1.0/rs/books\n\
    curl -X DELETE http://localhost:8080/chapter15-resource-1.0/rs/books/61\n```\n\
    \n**使用Maven编译和打包**\n\nWeb应用程序需要被编译并打包成一个`war`文件（`<packaging>war</packaging>`）。清单15-16中的`pom.xml`声明了编译代码所需的所有依赖项（`jsr311-api`、`javax.ejb`和`javax.persistence`）。请记住，JAXB是Java\
    \ SE的一部分，因此我们不需要添加此依赖项。\n\n**清单15-16.** 用于编译和打包Web应用程序的Maven `pom.xml`文件\n\n```xml\n\
    <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<project xmlns=\"http://maven.apache.org/POM/4.0.0\"\
    \n    xsi:schemaLocation=\"http://maven.apache.org/POM/4.0.0\n    http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
    >\n    <modelVersion>4.0.0</modelVersion>\n    <groupId>com.apress.javaee6</groupId>\n\
    \    <artifactId>chapter15-resource</artifactId>\n    <packaging>war</packaging>\n\
    \    <version>1.0</version>\n    <name>Chapter 15 - REST Resource</name>\n   \
    \ <parent>\n        <groupId>com.apress.javaee6</groupId>\n        <artifactId>chapters</artifactId>\n\
    \        <version>1.0</version>\n    </parent>\n    <dependencies>\n        <dependency>\n\
    \            <groupId>javax.ws.rs</groupId>\n            <artifactId>jsr311-api</artifactId>\n\
    \            <version>1.1</version>\n            <scope>provided</scope>\n   \
    \     </dependency>\n        <dependency>\n            <groupId>org.glassfish</groupId>\n\
    \            <artifactId>javax.ejb</artifactId>\n            <version>3.0</version>\n\
    \            <scope>provided</scope>\n        </dependency>\n        <dependency>\n\
    \            <groupId>org.eclipse.persistence</groupId>\n            <artifactId>javax.persistence</artifactId>\n\
    \            <version>1.1</version>\n            <scope>provided</scope>\n   \
    \     </dependency>\n    </dependencies>\n    <build>\n        <plugins>\n   \
    \         <plugin>\n                <groupId>org.apache.maven.plugins</groupId>\n\
    \                <artifactId>maven-compiler-plugin</artifactId>\n            \
    \    <inherited>true</inherited>\n                <configuration>\n          \
    \          <source>1.6</source>\n                    <target>1.6</target>\n  \
    \              </configuration>\n            </plugin>\n        </plugins>\n \
    \   </build>\n</project>\n```\n\n要编译和打包这些类，请在包含`pom.xml`文件的根目录中打开一个DOS命令行，并输入以下Maven命令：\n\
    \n```bash\nmvn package\n```\n\n转到`target`目录，查找名为`chapter15-resource-1.0.war`的文件并打开它。请注意，`Book.class`和`BookResource.class`都位于`WEB-INF\\\
    classes`目录下。`web.xml`和`persistence.xml`文件也打包在`war`中。\n\n**在GlassFish上部署**\n\n\
    代码打包完成后，确保GlassFish和Derby已启动并正在运行，然后进行部署。"
  raw: 'Before deploying the BookResource and Book entity, we need to register Jersey
    in the web.xml file (see Listing 15-15). This way the requests sent to the /rs
    path will get intercepted by Jersey.


    It also tells Jersey where to look for annotated JAX-RS java classes via the com.sun.jersey.


    config.property.packages parameter.


    **Listing 15-15.** *The web.xml File Declaring Jersey*


    <?xml version=''1.0'' encoding=''UTF-8''?>


    <web-app version="2.5"


    [xsi:schemaLocation="http://java.sun.com/xml/ns/javaee](http://java.sun.com/xml/ns/javaee)


    [http://java.sun.com/xml/ns/javaee/web-app_2_5.xsd">](http://java.sun.com/xml/ns/javaee)


    <servlet>


    <servlet-name>Jersey Web Application</servlet-name>


    <servlet-class>


    com.sun.jersey.spi.container.servlet.ServletContainer


    </servlet-class>


    <init-param>


    <param-name>com.sun.jersey.config.property.packages</param-name>


    <param-value>com.apress.javaee6.chapter15</param-value>


    </init-param>


    <load-on-startup>1</load-on-startup>


    </servlet>


    <servlet-mapping>


    <servlet-name>Jersey Web Application</servlet-name>


    <url-pattern> **/rs/***</url-pattern>


    </servlet-mapping>


    </web-app>


    Chapter 15 ■ reStFUL WeB SerVICeS


    **459**


    The deployment descriptor maps the requests to the /rs/* URL pattern. This means
    each


    time a URL starts with /rs/, it will be handled by Jersey. And indeed, in the
    examples that I have used with cURL, all the resource URLs start with /rs:


    curl -X GET -H "Accept: application/json" ➥


    [http://localhost:8080/chapter15-resource-1.0/**rs**/books](http://localhost:8080/chapter15-resource-1.0/rs/books)


    [curl -X DELETE http://localhost:8080/chapter15-resource-1.0/**rs**/books/61](http://localhost:8080/chapter15-resource-1.0/rs/books/61)


    **Compiling and Packaging with Maven**


    The web application needs to be compiled and packaged in a war file (<packaging>war</


    packaging>). The pom.xml in Listing 15-16 declares all necessary dependencies
    to compile code (jsr311-api, javax.ejb, and javax.persistence). Remember that
    JAXB is part of Java SE, so we don’t need to add this dependency.


    **Listing 15-16.** *The Maven pom.xml File for Compiling and Packaging the Web
    Application*


    <?xml version="1.0" encoding="UTF-8"?>


    [<project](http://maven.apache.org/POM/4.0.0) ➥


    ➥


    [xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 ➥](http://maven.apache.org/POM/4.0.0%E2%9E%A5)


    [http://maven.apache.org/xsd/maven-4.0.0.xsd">](http://maven.apache.org/POM/4.0.0%E2%9E%A5)


    <modelVersion>4.0.0</modelVersion>


    <groupId>com.apress.javaee6</groupId>


    <artifactId>chapter15-resource</artifactId>


    <packaging> **war**</packaging>


    <version>1.0</version>


    <name>Chapter 15 - REST Resource</name>


    <parent>


    <groupId>com.apress.javaee6</groupId>


    <artifactId>chapters</artifactId>


    <version>1.0</version>


    </parent>


    <dependency>


    <groupId>javax.ws.rs</groupId>


    <artifactId> **jsr311-api**</artifactId>


    <version>1.1</version>


    <scope>provided</scope>


    </dependency>


    <dependency>


    <groupId>org.glassfish</groupId>


    <artifactId> **javax.ejb**</artifactId>


    <version3.0</version>


    <scope>provided</scope>


    </dependency>


    **460**


    Chapter 15 ■ reStFUL WeB SerVICeS


    <dependency>


    <groupId>org.eclipse.persistence</groupId>


    <artifactId> **javax.persistence**</artifactId>


    <version>1.1</version>


    <scope>provided</scope>


    </dependency>


    </dependencies>


    <build>


    <plugins>


    <plugin>


    <groupId>org.apache.maven.plugins</groupId>


    <artifactId>maven-compiler-plugin</artifactId>


    <inherited>true</inherited>


    <configuration>


    <source> **1.6**</source>


    <target>1.6</target>


    </configuration>


    </plugin>


    </plugins>


    </build>


    </project>


    To compile and package the classes, open a DOS command line in the root directory
    con-


    taining the pom.xml file and enter the following Maven command:


    mvn package


    Go to the target directory, look for a file named chapter15-resource-1.0.war,
    and open it.


    Notice that both Book.class and BookResource.class are under the WEB-INF\classes
    directory.


    The web.xml and persistence.xml files are also packaged in the war.


    **Deploying on GlassFish**


    Once the code is packaged, make sure GlassFish and Derby are up and running and
    deploy'
  trans: '

    在部署 BookResource 和 Book 实体之前，我们需要在 web.xml 文件中注册 Jersey（参见清单 15-15）。这样，发送到 /rs
    路径的请求就会被 Jersey 拦截。


    同时，它还通过 `com.sun.jersey.config.property.packages` 参数告诉 Jersey 在哪里查找带有 JAX-RS 注解的
    Java 类。


    **清单 15-15.** *声明 Jersey 的 web.xml 文件*


    <?xml version=''1.0'' encoding=''UTF-8''?>


    <web-app version="2.5"


    [xsi:schemaLocation="http://java.sun.com/xml/ns/javaee](http://java.sun.com/xml/ns/javaee)


    [`java.sun.com/xml/ns/javaee/web-app_2_5.xsd">`](http://java.sun.com/xml/ns/javaee)


    <servlet>


    <servlet-name>Jersey Web Application</servlet-name>


    <servlet-class>


    com.sun.jersey.spi.container.servlet.ServletContainer


    </servlet-class>


    <init-param>


    <param-name>com.sun.jersey.config.property.packages</param-name>


    <param-value>com.apress.javaee6.chapter15</param-value>


    </init-param>


    <load-on-startup>1</load-on-startup>


    </servlet>


