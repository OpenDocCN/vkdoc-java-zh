    \ 方法) 会根据客户的出生日期创建一个日历定时器。因此，每年容器都会触发一个 bean 来创建并向客户发送生日邮件。为此，无状态 bean 首先需要注入一个定时器服务的引用（使用\
    \ `@Resource`）。`createCustomer()` 方法将客户持久化到数据库中，并使用其出生的日和月来创建一个 `ScheduleExpression`。根据该表达式和客户对象，使用\
    \ `TimerConfig` 创建一个日历定时器。`new TimerConfig(customer, true)` 配置了一个持久化定时器（由 `true`\
    \ 参数指示），该定时器会传递客户对象。\n\n**清单 7-21.** *一个以编程方式创建定时器的 CustomerEJB*\n\n```java\n\
    @Stateless\npublic class CustomerEJB {\n\n    @Resource\n    TimerService timerService;\n\
    \n    @PersistenceContext(unitName = \"chapter07PU\")\n    private EntityManager\
    \ em;\n\n    public void createCustomer(Customer customer) {\n        em.persist(customer);\n\
    \n        ScheduleExpression birthDay = new ScheduleExpression().\n          \
    \      dayOfMonth(customer.getBirthDay()).month(customer.getBirthMonth());\n\n\
    \        timerService.createCalendarTimer(birthDay, new TimerConfig(customer,\
    \ true));\n    }\n\n    @Timeout\n    public void sendBirthdayEmail(Timer timer)\
    \ {\n        Customer customer = (Customer) timer.getInfo();\n        // ...\n\
    \    }\n}\n```\n\n一旦定时器被创建，容器每年都会调用 `@Timeout` 方法（`sendBirthdayEmail()`），该方法会传递\
    \ `Timer` 对象。由于定时器已经与客户对象一起被序列化，该方法可以通过调用 `getInfo()` 方法来访问它。\n\n**222**\n\n第\
    \ 7 章 ■ 会话 Bean 与定时器服务\n\n**本章小结**\n\n本章重点介绍了会话 Bean 和定时器服务（您将在第 13 章找到 MDB，在第\
    \ 14 章找到 SOAP Web 服务，在第 15 章找到 RESTful Web 服务）。会话 Bean 是容器管理的组件，用于开发业务层。有三种不同类型的会话\
    \ Bean：无状态、有状态和单例。无状态 Bean 易于扩展，因为它们不保持状态，存在于池中，并处理可以在单个方法调用中完成的任务。有状态 Bean 与客户端具有一对一的关联，并且可以通过钝化和激活临时从内存中清除。单例\
    \ Bean 在多个客户端之间共享一个唯一实例，可以在启动时初始化，链接在一起，并在其并发访问中进行自定义。\n\n尽管存在这些差异，但会话 Bean 共享一个通用的编程模型。它们可以具有本地、远程或无接口视图，使用注解，或使用部署描述符进行部署。会话\
    \ Bean 可以使用依赖注入来获取对多种资源（JDBC 数据源、持久化上下文、环境条目等）的引用，以及它们的运行时环境上下文（`SessionContext`\
    \ 对象）。自 EJB 3.1 起，您可以异步调用方法，使用可移植的 JNDI 名称查找 EJB，或在 Java SE 环境中使用可嵌入的 EJB 容器。EJB\
    \ 3.1 还增强了定时器服务，现在它可以与其他调度工具有效竞争。\n\n下一章将解释不同会话 Bean 的生命周期，以及如何与回调注解进行交互。还将讨论拦截器，它提供了一种使用会话\
    \ Bean 进行面向切面编程（AOP）的方法。\n\n第 8 章\n\n回调和拦截器\n\n**在**上一章中，您了解到会话 Bean 是容器管理的组件。它们存在于\
    \ EJB 容器中，该容器在后台用多种服务（依赖注入、事务管理、安全性等）包装业务代码。其中两项服务是生命周期管理和拦截。\n\n*生命周期*意味着会话 Bean\
    \ 会经历一组预定义的状态转换。根据 Bean 的类型（无状态、有状态、单例），生命周期将由不同的状态组成。每次容器更改生命周期状态时，它都可以调用使用回调注解进行注解的方法。您可以使用这些注解来初始化会话\
    \ Bean 上的任何资源，或者在它们被销毁之前释放它们。\n\n*拦截器*允许您向 Bean 添加横切关注点。当客户端调用会话 Bean 上的方法时，容器能够在调用\
    \ Bean 的方法之前拦截该调用并处理业务逻辑。\n\n本章向您展示会话 Bean 使用的不同生命周期，以及您可以在特定阶段应用以处理业务逻辑的回调注解。您还将学习如何拦截方法调用并使用您自己的代码包装它们。\n\
    \n**会话 Bean 生命周期**\n\n正如您在上一章中所见，客户端不会使用 `new` 运算符创建会话 Bean 的实例。它通过依赖注入或 JNDI\
    \ 查找获取对会话 Bean 的引用。容器负责创建和销毁实例。这意味着客户端和 Bean 都不负责确定何时创建 Bean 实例、何时注入依赖项或何时销毁实例。容器负责管理\
    \ Bean 的生命周期。\n\n所有会话 Bean 在其生命周期中都有两个明显的阶段：创建和销毁。此外，有状态会话 Bean 会经历我在上一章中提到的钝化和激活阶段。\n\
    \n**无状态和单例**\n\n无状态和单例 Bean 的共同点是它们不与专用客户端维护会话状态。两种 Bean 类型都允许任何客户端访问——无状态 Bean\
    \ 在逐个实例的基础上串行执行此操作，而单例 Bean 提供对单个实例的并发访问。两者共享图 8-1 所示的相同生命周期，描述如下：\n\n**1.** 无状态或单例会话\
    \ Bean 的生命周期在客户端请求对 Bean 的引用（使用依赖注入或 JNDI 查找）时开始。容器创建一个新的会话 Bean 实例。\n\n**2.**\
    \ 如果新创建的实例通过注解（`@Resource`、`@EJB`、`@PersistenceContext` 等）或部署描述符使用依赖注入，则容器会注入所有需要的资源。\n\
    \n**3.** 如果实例有一个使用 `@PostConstruct` 注解的方法，容器会调用它。\n\n**4.** Bean 实例处理客户端调用的调用，并保持在就绪模式以处理未来的调用。无状态\
    \ Bean 保持在就绪模式，直到容器释放池中的一些空间。单例 Bean 保持在就绪模式，直到容器关闭。\n\n**5.** 容器不再需要该实例。它会调用使用\
    \ `@PreDestroy` 注解的方法（如果有），并结束 Bean 实例的生命周期。\n\n**图 8-1.** *无状态和单例 Bean 的生命周期*\n\
    \n无状态和单例 Bean 共享相同的生命周期，但它们在创建和销毁的方式上存在一些差异。\n\n当部署无状态会话 Bean 时，容器会创建多个实例并将它们添加到池中。当客户端调用无状态会话\
    \ Bean 上的方法时，容器从池中选择一个实例，将方法调用委托给该实例，然后将其返回到池中。当容器不再需要该实例时（通常当容器想要减少池中的实例数量时），它会销毁它。\n\
    \n■**注意** GlassFish 允许您自定义多个 EJB 池参数。您可以设置池大小（池中 Bean 的初始、最小和最大数量）、池空闲超时到期时要移除的\
    \ Bean 数量，以及池超时的毫秒数。\n"
- fmt: '# For Singleton Session Beans


    For singleton session beans, creation depends on whether they are instantiated
    eagerly (`@Startup`) or not, or whether they depend (`@DependsOn`) on another
    singleton that had been eagerly created. If the answer is yes, an instance will
    be created at deployment time. If not, the container will create an instance when
    a business method is invoked by a client. Because singletons last for the duration
    of the application, the instance is destroyed when the container shuts down.


    ## Stateful


    Stateful session beans are programmatically not very different from stateless
    or singleton session beans: only the metadata changes (`@Stateful` instead of
    `@Stateless` or `@Singleton`). But the real difference is that stateful beans
    maintain conversational state with their client, and therefore have a slightly
    different life cycle. The container generates an instance and assigns it only
    to one client. Then, each request from that client is passed to the same instance.
    Following this principle and depending on your application, you might end up with
    a one-to-one relationship between a client and a stateful bean (e.g., a thousand
    simultaneous users might produce a thousand stateful beans). If one client doesn’t
    invoke its bean’s instance for a long enough time, the container has to clear
    it before the JVM runs out of memory, preserve the instance state to a permanent
    storage, and then bring back the instance with its state when it’s needed. The
    container employs the technique of passivation and activation.


    As discussed in Chapter 7, passivation is when the container serializes the bean
    instance to a permanent storage medium (file on a disk, database, etc.) instead
    of holding it in memory. Activation, which is the opposite, is done when the bean
    instance is needed again by the client. The container deserializes the bean from
    permanent storage and activates it back into memory. This means the bean’s attributes
    have to be serializable (it must either be a Java primitive or implement the `java.io.Serializable`
    interface). The stateful bean life cycle is shown in Figure 8-2 and described
    as follows:


    1. The life cycle of a stateful bean starts when a client requests a reference
    to the bean (either using dependency injection or JNDI lookup). The container
    creates a new session bean instance and stores it in memory.

    2. If the newly created instance uses dependency injection through annotations
    (`@Resource`, `@EJB`, `@PersistenceContext`, etc.) or deployment descriptors,
    the container injects all the needed resources.

    3. If the instance has a method annotated with `@PostConstruct`, the container
    invokes it.

    4. The bean executes the requested call and stays in memory, waiting for subsequent
    client requests.

    5. If the client remains idle for a period of time, the container invokes the
    method annotated with `@PrePassivate`, if any, and passivates the bean instance
    into a permanent storage.

    6. If the client invokes a passivated bean, the container activates it back to
    memory and invokes the method annotated with `@PostActivate`, if any.

    7. If the client does not invoke a passivated bean instance for the session timeout
    period, it is destroyed by the container.

    8. Alternatively to step 7, if the client calls a method annotated by `@Remove`,
    the container then invokes the method annotated with `@PreDestroy`, if any, and
    ends the life of the bean instance.


    ![Image 73](index-256_1.jpg)


    **Figure 8-2.** *Stateful bean life cycle*


    In some cases, a stateful bean contains open resources such as network sockets
    or database connections. Because a container cannot keep these resources open
    for each bean, you will have to close and reopen the resources before and after
    passivation. That’s when life-cycle callback methods can be used.


    ## Callbacks'
