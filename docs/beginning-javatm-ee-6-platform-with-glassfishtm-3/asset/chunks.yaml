    saw how a class could be embedded and used as a primary key with the @EmbeddedId
    annotation. Embeddables are objects that don’t have a persistent identity on their
    own; they can be embedded only within owning entities. The owning entity can have
    collections of embeddables as well as a single embeddable attribute. They are
    stored as an intrinsic part of an owning entity and share the identity of this
    entity. This means each attribute of the embedded object is mapped to the table
    of the entity. It is a strict ownership relationship (a.k.a. composition), so
    that if the entity is removed, the embedded object is also.


    This composition between two classes uses annotations. The included class uses
    the


    @Embeddable annotation, whereas the entity that includes the class uses @Embedded.
    Let’s take the example of a customer that has an identifier, a name, an e-mail
    address, and an address.


    All these attributes could be in a Customer entity (see Listing 3-34 a little
    later in the chapter), but for object-modeling reasons, they are split into two
    classes: Customer and Address. Because Address has no identity of its own, but
    is merely part of the Customer state, it is a good candi-date to become an embeddable
    object instead of an entity (see Listing 3-33).


    **Listing 3-33.** *The Address Class Is an Embeddable*


    **@Embeddable**


    public class Address {


    private String street1;


    private String street2;


    private String city;


    private String state;


    private String zipcode;


    private String country;


    // Constructors, getters, setters


    }


    Chapter 3 ■ OBJeCt-reLatIONaL MappING


    **85**


    As you can see in Listing 3-33, the Address class is not annotated as being an
    entity but as an embeddable. The @Embeddable annotation specifies that Address
    can be embedded


    in another entity class (or another embeddable). On the other side of the composition,
    the Customer entity has to use the @Embedded annotation to specify that Address
    is a persistent attribute that will be stored as an intrinsic part and share its
    identity (see Listing 3-34).


    **Listing 3-34.** *The Customer Entity Embedding an Address*


    @Entity


    public class Customer {


    @Id @GeneratedValue


    private Long id;


    private String firstName;


    private String lastName;


    private String email;


    private String phoneNumber;


    **@Embedded**


    private Address address;


    // Constructors, getters, setters


