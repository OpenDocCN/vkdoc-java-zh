- fmt: "Several artifacts have been generated to make this work: a WSDL file and client\
    \ stubs, which contain all the information to connect to the URL where the web\
    \ service is located, marshall the `CreditCard` object into XML, invoke the web\
    \ service, and obtain a result.\n\nThe visible part of web services in Java doesn't\
    \ deal directly with XML, SOAP, or WSDL and is very easy to understand. However,\
    \ there are some invisible parts that are very important for interoperability.\n\
    \n### Java Architecture for XML Binding\n\nAs you will understand by now, XML\
    \ is used to exchange data and to define web services through WSDL and SOAP envelopes.\
    \ But in Listing 14-3, which shows a consumer invoking a web service, there is\
    \ no XML at all. That's because the consumer only manipulates Java interfaces\
    \ and stubs, which in turn deal with all the XML plumbing and network wiring.\
    \ At one point in the chain, you manipulate Java classes, and at another XML documents,\
    \ with JAXB facilitating this bidirectional correspondence.\n\nJava offers various\
    \ ways to manipulate XML, from common APIs (`javax.xml.stream.XmlStreamWriter`\
    \ and `java.beans.XMLEncoder`) to more complex and low-level models such as Simple\
    \ API for XML (SAX), Document Object Model (DOM), or Java API for XML Processing\
    \ (JAXP). JAXB provides a higher level of abstraction than SAX or DOM and is based\
    \ on annotations.\n\nJAXB defines a standard to bind Java representations to XML\
    \ and vice versa. It manages XML documents and XML Schema Definitions (XSD) in\
    \ a transparent, object-oriented way that hides the complexity of the XSD language.\n\
    \nExcept for the `@XmlRootElement` annotation, Listing 14-4 shows the code of\
    \ a normal Java class. With this annotation and a marshalling mechanism, JAXB\
    \ is able to create an XML representation of a `CreditCard` instance, as shown\
    \ in Listing 14-5.\n\n**Listing 14-4.** *The CreditCard Class with a JAXB Annotation*\n\
    \n```java\n@XmlRootElement\npublic class CreditCard {\n    private String number;\n\
    \    private String expiryDate;\n    private Integer controlNumber;\n    private\
    \ String type;\n    // Constructors, getters, setters\n}\n```\n\n**Listing 14-5.**\
    \ *An XML Document Representing Credit Card Data*\n\n```xml\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\" standalone=\"yes\"?>\n<creditCard>\n    <controlNumber>6398</controlNumber>\n\
    \    <expiryDate>12/09</expiryDate>\n    <number>1234</number>\n    <type>Visa</type>\n\
    </creditCard>\n```\n\nMarshalling is the action of transforming an object into\
    \ XML. The inverse is also possible with JAXB. Unmarshalling would take this XML\
    \ document as an input and instantiate a `CreditCard` object with the values defined\
    \ in the document. JAXB can also automatically generate the schema that would\
    \ validate the credit card XML structure to ensure that it would have the correct\
    \ structure and data types. Listing 14-6 shows the XML Schema Definition (XSD)\
    \ of the `CreditCard` class.\n\n**Listing 14-6.** *XML Schema Validating the Previous\
    \ XML Document*\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"\
    yes\"?>\n<xs:schema version=\"1.0\" xmlns:xs=\"http://www.w3.org/2001/XMLSchema\"\
    >\n    <xs:element name=\"creditCard\" type=\"creditCard\"/>\n    <xs:complexType\
    \ name=\"creditCard\">\n        <xs:sequence>\n            <xs:element name=\"\
    controlNumber\" type=\"xs:int\" minOccurs=\"0\"/>\n            <xs:element name=\"\
    expiryDate\" type=\"xs:string\" minOccurs=\"0\"/>\n            <xs:element name=\"\
    number\" type=\"xs:string\" minOccurs=\"0\"/>\n            <xs:element name=\"\
    type\" type=\"xs:string\" minOccurs=\"0\"/>\n        </xs:sequence>\n    </xs:complexType>\n\
    </xs:schema>\n```\n\nThis schema is made of simple elements (`controlNumber`,\
    \ `expiryDate`, etc.) and a complex type (`creditCard`). Complex types model element\
    \ content, that is, they determine the possible set of elements used in a document\
    \ (here, a credit card).\n\nNotice that all the tags use the `xs` prefix (`xs:element`,\
    \ `xs:string`, etc.). This prefix is called a *namespace* and is defined in the\
    \ `xmlns` (XML namespace) header tag of the document.\n\n```xml\n<xs:schema version=\"\
    1.0\" xmlns:xs=\"http://www.w3.org/2001/XMLSchema\">\n```"
