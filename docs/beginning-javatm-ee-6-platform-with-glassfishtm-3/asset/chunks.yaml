    In the snippets of code in this chapter, exception handling has been omitted as
    the JMS API is very verbose in dealing with exceptions. The API defines 12 different
    exceptions, all inheriting from javax.jms.JMSException. Any method invocation
    on connections, sessions, consumers, messages, or producers will throw a JMSException
    or one of the subclasses.


    Chapter 13 ■ SeNDING MeSSaGeS


