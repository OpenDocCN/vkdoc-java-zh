    **Programmatic Timer Creation**


    To create a timer programmatically, the EJB needs to access the javax.ejb.TimerService
    interface using either dependency injection or the EJBContext (EJBContext.getTimerService()),
    or through JNDI lookup. The TimerService API has several methods that allow you
    to create different kinds of timers divided into four categories:


    • createTimer: Creates a timer based on dates, intervals, or durations. These
    methods do not use calendar-based expressions.


    • createSingleActionTimer: Creates a single-action timer that expires at a given
    point in time or after a specified duration. The container removes the timer after
    the timeout


    callback method has been successfully invoked.


    • createIntervalTimer: Creates an interval timer whose first expiration occurs
    at a given point in time and whose subsequent expirations occur after specified
    intervals.


    • createCalendarTimer: Creates a timer using a calendar-based expression with
    the


    ScheduleExpression helper class.


    The ScheduleExpression helper class allows you to create calendar-based expressions
    programmatically. You will find methods related to the attributes defined in Table
    7-2, and you will be able to program all the examples that you saw in Table 7-4\.
    Here are some examples to give you an idea:


    new ScheduleExpression().dayOfMonth("Mon").month("Jan");


    new ScheduleExpression().second("10,30,50").minute("*/5").hour("10-14"); new ScheduleExpression().dayOfWeek("1,5").timezone("Europe/Lisbon");


