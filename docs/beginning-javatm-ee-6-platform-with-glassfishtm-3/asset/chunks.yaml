    无状态会话 Bean 通常包含几个紧密相关的业务方法。例如，清单 7-1 中的 `ItemEJB` Bean 定义了与 CD-BookStore 应用程序销售的商品相关的方法。因此，你会看到用于创建、更新或查找图书和
    CD 的方法，以及其他相关的业务逻辑。


    `@Stateless` 注解将 `ItemEJB` POJO 标记为无状态会话 Bean，从而将一个简单的 Java 类转变为容器感知的组件。`@javax.ejb.Stateless`
    注解的规范在清单 7-2 中进行了描述。


    **清单 7-2.** *@Stateless 注解 API*


    @Target({TYPE}) @Retention(RUNTIME)


    public @interface **Stateless** {


    String **name**() default "";


    String **mappedName**() default "";


    String **description**() default "";


    }


    `name` 参数指定 Bean 的名称，默认情况下是类名（在清单 7-1 的示例中为 `ItemEJB`）。例如，此参数可用于通过 JNDI 查找 EJB。`description`
    参数是一个字符串，可用于描述 EJB。`mappedName` 属性是容器分配的全局 JNDI 名称。请注意，此 JNDI 名称是特定于供应商的，因此不可移植。`mappedName`
    与*可移植的*全局 JNDI 名称没有关系，我在上一章中介绍了可移植的全局 JNDI 名称，并将在后面的“全局 JNDI 访问”部分详细描述。


    第 7 章 ■ 会话 Bean 与定时器服务


    **193**


    无状态会话 Bean 可以支持大量客户端，从而最大限度地减少所需的任何资源。这就是为什么使用无状态 EJB 编写的应用程序更具可伸缩性。而有状态会话 Bean
    则仅与一个且唯一一个客户端相关联。


    **有状态 Bean**


    无状态 Bean 为其客户端提供业务方法，但不与它们维护会话状态。另一方面，有状态会话 Bean 则保留会话状态。它们对于必须分多个步骤完成的任务非常有用，每个步骤都依赖于前一个步骤中维护的状态。让我们以电子商务网站中的购物车为例。客户登录（他的会话开始），选择第一本书，将其添加到购物车，选择第二本书，并将其添加到购物车。最后，客户结账购买这些书，付款，然后注销（会话结束）。在整个交互过程中（可能需要一些时间，具体取决于客户端的会话时长），购物车会保存客户选择了多少本书的状态。


    Book book = new Book();


    book.setTitle("The Hitchhiker''s Guide to the Galaxy");


    book.setPrice(12.5F);


    book.setDescription("Science fiction comedy series created by Douglas Adams.");
    book.setIsbn("1-84023-742-2");


    book.setNbOfPage(354);


    book.setIllustrations(false);


    **有状态组件**.addBookToShoppingCart(**book**);


    book.setTitle("The Robots of Dawn");


    book.setPrice(18.25F);


    book.setDescription("Isaac Asimov''s Robot Series");


    book.setIsbn("0-553-29949-2");


    book.setNbOfPage(276);


    book.setIllustrations(false);


    **有状态组件**.addBookToShoppingCart(**book**);


    **有状态组件**.checkOutShoppingCart();


    上面的代码精确地展示了有状态会话 Bean 的工作原理。创建了两本书，并将它们添加到有状态组件的购物车中。最后，`checkOutShoppingCart()`
    方法依赖于所维护的状态，可以结账这两本书。


    当客户端在服务器上调用有状态会话 Bean 时，EJB 容器需要为每次后续方法调用提供同一个实例。有状态 Bean 不能被其他客户端重用。图 7-3 显示了
    Bean 实例与客户端之间的一对一关联。就开发人员而言，不需要额外的代码，因为这种一对一关联由 EJB 容器自动管理。


    ![Image 67](img/index-224_1.jpg)


    **194**


    第 7 章 ■ 会话 Bean 与定时器服务


    **图 7-3.** *客户端访问有状态 Bean*


    这种一对一关联是有代价的，因为正如你可能猜到的，如果你有一百万个客户端，内存中就会有一百万个有状态 Bean。为了避免如此大的内存占用，有状态 Bean 必须在客户端的下一个请求将其带回之前，暂时从内存中清除。这种技术称为*钝化和激活*。


    钝化是将实例从内存中移除并保存到持久化位置（磁盘上的文件、数据库等）的过程。它有助于释放内存和资源（数据库或 JMS 连接等）。激活是恢复状态并将其应用于实例的逆过程。钝化和激活由容器自动完成；你不必担心自己去做，因为这是一项容器服务。你应该担心的是在
    Bean 被钝化之前释放任何资源（例如，数据库连接、JMS 工厂连接等），正如你将在下一章中看到的那样。


    让我们回到购物车示例，并将其应用于有状态 Bean（参见清单 7-3）。客户登录网站，浏览商品目录，并将两本书添加到购物车（`addItem()` 方法）。`cartItems`
    属性保存购物车的内容。

