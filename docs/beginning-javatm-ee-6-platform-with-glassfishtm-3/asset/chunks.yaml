    **418**


    Chapter 14 ■ SOap WeB SerVICeS


    compiling your client consumer, you need to generate the SEI to get the proxy
    class to call it in your code.


    **Figure 14-6.** *A consumer invoking a web service through a proxy*


    The consumer can get an instance of the proxy either through injection or by program-


    matically creating it. To inject a web service, you need to use the [@javax.xml.ws.WebServiceRef](mailto:@javax.xml.ws.WebServiceRef)


    annotation. It follows the @Resource or @EJB annotation pattern shown in previous
    chapters, but for the web service. When this annotation is applied on an attribute
    (or a getter method), the container will inject an instance of the web service
    when the application is initialized. The code would look like this:


    @WebServiceRef


    private **CardValidatorService** cardValidatorService;


    // ...


    CardValidator cardValidator = cardValidatorService.getCardValidatorPort();


    cardValidator.validate(creditCard);'
