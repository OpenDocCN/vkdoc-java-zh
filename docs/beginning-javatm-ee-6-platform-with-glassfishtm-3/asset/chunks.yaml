  raw: 'Depending from where a client invokes a session bean, the bean class will
    have to implement remote or local interfaces, or no interface at all. If your
    architecture has clients residing outside the EJB container’s JVM instance, they
    must use a remote interface. As shown in Figure 7-6, this applies for clients
    running in a separate JVM (e.g., a rich client), in an application client container
    (ACC), or in an external web or EJB container. In this case, clients will have
    to invoke session bean methods through Remote Method Invocation (RMI). You can
    use local invocation when the bean and the client are running in the same JVM.
    That can be an EJB invoking another EJB or a web component (servlet, JSF) running
    in a web container in the same JVM.


    It is also possible for your application to use both remote and local calls on
    the same session bean.


    **Figure 7-6.** *Session beans invoked by several clients*


    A session bean can implement several interfaces or none. A business interface
    is a standard Java interface that does not extend any EJB-specific interfaces.
    Like any Java interface, business interfaces define a list of methods that will
    be available for the client application.


    They can use the following annotations:


    • @Remote: Denotes a remote business interface. Method parameters are passed by
    value


    and need to be serializable as part of the RMI protocol.


    • @Local: Denotes a local business interface. Method parameters are passed by
    reference from the client to the bean.


    You cannot mark the same interface with more than one annotation. The session
    beans


    that you have seen so far in this chapter have no interface. The no-interface
    view is a variation of the local view that exposes all public business methods
    of the bean class locally without the use of a separate business interface.


    **204**


    Chapter 7 ■ SeSSION BeaNS aND the tIMer SerVICe


