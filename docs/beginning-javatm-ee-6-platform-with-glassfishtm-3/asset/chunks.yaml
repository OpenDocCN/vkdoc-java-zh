    使用 REST，一个资源可以有多种表示形式；一本书可以表示为网页、XML 数据或显示专辑封面的图片。@javax.ws.rs.Consumes 和 @javax.ws.rs.Produces
    注解可以应用于存在多种表示形式的资源。它定义了客户端和服务器之间交换的表示的媒体类型。在资源方法上使用这些注解会覆盖资源类上针对方法参数或返回类型的任何注解。如果缺少这两个注解，则假定支持任何媒体类型
    (*/*)。默认情况下，CustomerResource 生成纯文本表示，但在某些方法中会被覆盖（参见清单 15-5）。


    **清单 15-5.** *具有多种表示形式的客户资源*


