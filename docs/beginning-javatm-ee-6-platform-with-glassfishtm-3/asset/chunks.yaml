    请注意，`clear()` 方法可以作用于整个持久化上下文（`clear()`），也可以仅作用于单个实体（`clear(Object entity)`）。


    **合并实体**


    一个游离实体不再与持久化上下文关联。如果你想管理它，就需要将其合并。我们以一个需要在 JSF 页面中显示的实体为例。该实体首先从数据库的持久层加载（此时为受管状态），然后通过调用本地
    EJB 返回（由于事务上下文结束，变为游离状态），接着表示层将其显示（仍为游离状态），最后它返回并需要更新到数据库。然而，此时实体是游离的，需要重新附加（即合并），以使其状态与数据库同步。


    清单 4-17 通过清除持久化上下文（`em.clear()`）来模拟这种情况，这会使实体变为游离状态。


    **清单 4-17.** *清除持久化上下文*


    Customer customer = new Customer("Antony", "Balla", "tballa@mail.com");


    tx.begin();


    em.persist(customer);


    tx.commit();


    **em.clear();**


    // 为游离实体设置新值


    customer.setFirstName("William");


    tx.begin();


    **em.merge(customer);**


    tx.commit();


    在清单 4-17 中，创建并持久化了一个客户。调用 `em.clear()` 强制使客户实体变为游离状态，但游离实体仍可存在于其原本所在的持久化上下文之外，且其状态不再保证与数据库状态同步。这正是
    `customer.setFirstName("William");` 所发生的情况：该设置操作在游离实体上执行，数据并未更新到数据库。要将此更改复制到数据库，你需要使用
    `em.merge(customer)` 重新附加（即合并）该实体。


    **更新实体**


    更新实体很简单，但同时也可能令人困惑。正如你刚刚看到的，你可以使用 `EntityManager.merge()` 来附加实体并使其状态与数据库同步。但如果实体当前是受管状态，对其所做的更改将自动反映到数据库中。如果不是，则需要显式调用
    `merge()`。


    清单 4-18 演示了持久化一个名字设置为 Antony 的客户。当调用 `em.persist()` 方法时，实体处于受管状态，因此对实体所做的任何更改都将与数据库同步。当调用
    `setFirstName()` 方法时，实体改变了状态。实体管理器会缓存从 `tx.begin()` 开始的任何操作，并在提交时同步它们。


    **清单 4-18.** *更新客户的名字*


    Customer customer = new Customer(" **Antony**", "Balla", "tballa@mail.com");


    tx.begin();


    em. **persist**(customer);


    **customer.setFirstName("Williman");**


    tx.commit();


