    部署描述符


    Java EE 6 组件使用“例外配置”原则，这意味着容器、持久化提供者或消息代理将对该组件应用一组默认服务。配置这些默认服务是例外情况。如果需要非默认行为，则需要显式指定注解或其对应的
    XML。这与你已经在 JPA 实体中看到的情况相同，其中一组注解允许你自定义默认映射。同样的原则也适用于会话 Bean。单个注解（`@Stateless`、`@Stateful`
    等）就足以通知容器应用某些服务（事务、生命周期、安全、拦截器、并发、异步等），但如果你需要更改它们，则使用注解或 XML。注解将附加信息附加到类、接口、方法或变量上，XML
    部署描述符也是如此。


    **210**


    第 7 章 ■ 会话 Bean 与定时器服务


    XML 部署描述符是注解的替代方案，这意味着任何注解都有对应的 XML 标签。如果同时使用了注解和部署描述符，则在部署过程中，部署描述符中的设置将覆盖注解。我不会过多地描述
    XML 部署描述符（称为 `ejb-jar.xml`）的结构，因为它是可选的，并且最终可能会变得非常冗长。作为示例，清单 7-12 展示了 ItemEJB（先前在清单
    7-9 中展示）的 `ejb-jar.xml` 文件可能的样子。它定义了 Bean 类、远程和本地接口、其类型（Stateless）以及它使用容器管理事务（CMT）（Container）。`<env-entry>`
    定义了会话 Bean 的环境条目。我将在“环境命名上下文”部分中很快解释这些内容。


    **清单 7-12.** *ejb-jar.xml 文件*


    <ejb-jar>


    <enterprise-beans>


    <session>


    <ejb-name>ItemEJB</ejb-name>


    <ejb-class>com.apress.javaee6.ItemEJB</ejb-class>


    <local>com.apress.javaee6.ItemLocal</local>


    <remote>com.apress.javaee6.ItemLocal</remote>


    <session-type>Stateless</session-type>


    <transaction-type>Container</transaction-type>


    <env-entry>


    <env-entry-name>aBookTitle</env-entry-name>


    <env-entry-type>java.lang.String</env-entry-type>


    <env-entry-value>Beginning Java EE 6</env-entry-value>


    </env-entry>


    </session>


    </enterprise-beans>


    </ejb-jar>


    如果会话 Bean 部署在 jar 文件中，则部署描述符需要存储在 `META-INF/ejb-jar.xml` 文件中。如果部署在 war 文件中，则需要存储在
    `WEB-INF/ejb-jar.xml` 文件中。


