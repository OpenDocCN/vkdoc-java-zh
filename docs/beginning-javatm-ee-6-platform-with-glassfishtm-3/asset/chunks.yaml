- fmt: "在以下代码中，JPQL 查询从数据库中检索所有客户。由于此查询的结果是一个列表，因此使用了`getResultList()`方法，并返回`Customer`实体列表（`List<Customer>`）。但是，如果你知道查询只返回单个实体，请使用`getSingleResult()`方法。它会返回单个实体，并避免从列表中提取它的工作。\n\
    \n```\nQuery query = em.createQuery(\"SELECT c FROM Customer c\");\nList<Customer>\
    \ customers = query.getResultList();\n```\n\n此查询字符串也可以由应用程序动态创建，然后可以在运行时指定事先未知的复杂查询。字符串拼接用于根据条件动态构建查询。\n\
    \n```\nString jpqlQuery = \"SELECT c FROM Customer c\";\nif (someCriteria)\n \
    \   jpqlQuery += \" WHERE c.firstName = 'Vincent'\";\nquery = em.createQuery(jpqlQuery);\n\
    List<Customer> customers = query.getResultList();\n```\n\n上一个查询检索名为 Vincent 的客户，但你可能想为名字引入一个参数。传递参数有两种选择：使用名称或位置。在以下示例中，查询中使用了名为`:fname`（注意`:`符号）的命名参数，并通过`setParameter`方法进行绑定：\n\
    \n```\njpqlQuery = \"SELECT c FROM Customer c\";\nif (someCriteria)\n    jpqlQuery\
    \ += \" where c.firstName = :fname\";\nquery = em.createQuery(jpqlQuery);\nquery.setParameter(\"\
    fname\", \"Vincent\");\nList<Customer> customers = query.getResultList();\n```\n\
    \n请注意，参数名称`fname`不包含查询中使用的冒号。使用位置参数的代码如下所示：\n\n```\njpqlQuery = \"SELECT c FROM\
    \ Customer c\";\nif (someCriteria)\n    jpqlQuery += \" where c.firstName = ?1\"\
    ;\nquery = em.createQuery(jpqlQuery);\nquery.setParameter(1, \"Vincent\");\nList<Customer>\
    \ customers = query.getResultList();\n```\n\n如果你需要使用分页以每十个客户为一组显示客户列表，可以按如下方式使用`setMaxResults`方法：\n\
    \n```\nQuery query = em.createQuery(\"SELECT c FROM Customer c\");\nquery.setMaxResults(10);\n\
    List<Customer> customers = query.getResultList();\n```\n\n动态查询需要考虑的一个问题是在运行时将\
    \ JPQL 字符串转换为 SQL 语句的成本。由于查询是动态创建的且无法预测，持久化提供程序必须解析 JPQL 字符串、获取 ORM 元数据并生成等效的\
    \ SQL。处理每个动态查询的性能成本可能是一个问题，如果你有不可更改的静态查询，请改用命名查询。\n\n## 命名查询\n\n命名查询与动态查询的不同之处在于它们是静态且不可更改的。除了其静态特性（不允许动态查询的灵活性）之外，命名查询可以更高效地执行，因为持久化提供程序可以在应用程序启动时将\
    \ JPQL 字符串转换为 SQL，而不是每次执行查询时都进行转换。\n\n命名查询是在`@NamedQuery`注解或 XML 等效项中的元数据内表达的静态查询。要定义这些可重用的查询，请使用`@NamedQuery`注解标注实体，该注解包含两个元素：查询的名称及其内容。\n\
    \n因此，让我们修改`Customer`实体并使用注解静态定义三个查询（参见清单 4-27）。\n\n**清单 4-27.** *定义命名查询的 Customer\
    \ 实体*\n\n```\n@Entity\n@NamedQueries({\n    @NamedQuery(name = \"findAll\", query=\"\
    select c from Customer c\"),\n    @NamedQuery(name = \"findVincent\",\n      \
    \          query=\"select c from Customer c where c.firstName = 'Vincent'\"),\n\
    \    @NamedQuery(name = \"findWithParam\",\n                query=\"select c from\
    \ Customer c where c.firstName = :fname\")\n})\npublic class Customer {\n    @Id\
    \ @GeneratedValue\n    private Long id;\n    private String firstName;\n    private\
