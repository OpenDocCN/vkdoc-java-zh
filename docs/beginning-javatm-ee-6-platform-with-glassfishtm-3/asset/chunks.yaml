    {"description":"Scifi IT book","illustrations":"false",➥


    "isbn":"1234-234","nbOfPage":"241","price":"24.0","title":"H2G2"}


    By just changing the Accept header property, the same code will return the XML
    representation of book 601:


    curl -X **GET** -H "Accept: **application/xml**" ➥


    [http://localhost:8080/chapter15-resource-1.0/rs/**books/601**](http://localhost:8080/chapter15-resource-1.0/rs/books/601)


    <?xml version="1.0" encoding="UTF-8" standalone="yes"?>


    <book><description>Scifi IT book</description>


    <illustrations>false</illustrations><isbn>1234-234</isbn>


    <nbOfPage>241</nbOfPage><price>24.0</price><title>H2G2</title></book> Deleting
    a Book


    The deleteBook() method follows the format of the getBookById() method because
    it uses a subpath and an ID as a parameter, with the only difference being the
    HTTP request used. We need an HTTP DELETE method that takes a URL and deletes
    the content associated with that URL.


    **@DELETE**


    @Path(" **{id}**/")


    public void deleteBook(@PathParam(" **id**") Long id) {


    Book book = em.find(Book.class, id);


    em.remove(book);


    }


    **458**


    Chapter 15 ■ reStFUL WeB SerVICeS


    If we use the verbose mode of cURL (-v argument), we’ll see the DELETE request
    is sent, and the 204 No Content status code appears in the response to indicate
    that the resource doesn’t exist anymore.


    curl -X **DELETE** [http://localhost:8080/chapter15-resource-1.0/rs/books/61 -v](http://localhost:8080/chapter15-resource-1.0/rs/books/61)


    > DELETE /chapter15-resource-1.0/rs/books/61 HTTP/1.1


    > User-Agent: curl/7.19.0 (i586-pc-mingw32msvc) libcurl/7.19.0 zlib/1.2.3


    > Host: localhost:8080


    > Accept: */*


    >


    < HTTP/1.1 **204 No Content**


    < X-Powered-By: Servlet/3.0


    < Server: GlassFish/v3


