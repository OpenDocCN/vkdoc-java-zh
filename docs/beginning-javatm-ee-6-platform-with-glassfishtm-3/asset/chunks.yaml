    **Resource Management**


    Most of the components may need external resources in order to be rendered properly.


    <h:graphicImage> needs an external image to display, <h:commandButton> can also
    display an image as a button, <h:outputScript> references an external JavaScript
    file, and components can apply CSS styles. In JSF, a resource is a static element
    that can be transmitted to components so they can be displayed (images) or processed
    (JavaScript, CSS) by the browser.


    Previous versions of JSF had no facility for serving resources. When you wanted
    to provide a resource, you had to put it in the WEB-INF directory so that the
    client’s browser could access it. The problem was that if you wanted to update
    it, you had to replace the file in the directory and have different directories
    to render localized resources (for example, an image with English or Portuguese
    text). JSF 2.0 has support for this functionality, so you can now package your
    resources directly into a separate jar with a version and a locale. The packaged
    resource can then be placed in the web application root under the path:


    **resources**/<resourceIdentifier>


    or under the jar entry name:


    META-INF/**resources**/<resourceIdentifier>


    <resourceIdentifier> consists of several subfolders, specified as follows:


    [localePrefix/][libraryName/][libVersion/]resourceName[/resourceVersion]


    Items in this resource identifier in [] are optional. The local prefix consists
    of the language code followed by an optional country code (en, en_US, pt, pt_BR).
    As this line indicates, you can add versioning to the library or the resource
    itself. Following are resource structures you might end up with:


    **320**


    Chapter 11 ■ paGeS aND COMpONeNtS


    book.gif


    en/book.gif


    en_us/book.gif


    en/myLibrary/book.gif


    myLibrary/book.gif


    myLibrary/1_0/book.gif


    myLibrary/1_0/book.gif/2_3.gif


    You can then use a resource, such as this book.gif image, directly in the <h:graphicImage>
    component or by specifying the library name (library="myLibrary"). The resource
    with the right locale for your client will get pulled automatically.


    <h:graphicImage value="book.gif" />


    <h:graphicImage value="book.gif" library="myLibrary" />


    <h:graphicImage value="#{resource[''book.gif'']}" />


    <h:graphicImage value="#{resource[''myLibrary:book.gif'']}" />


    **Composite Components**


    All the previously discussed components are part of JSF and come with any implementation
    that follows the specification. Because JSF is based on reusable components, it
    provides a design that allows you to easily create and integrate your own components
    or third-party components into your applications.


    Earlier I mentioned that all components you’ve seen extend, directly or indirectly,
    the javax.faces.component.UIComponent class. Before JSF 2.0, if you wanted to
    create your own component, you had to extend the component class that most closely
    represented your


    component (UICommand, UIGraphic, UIOutput, etc.), declare it in the faces-config.xml
    file, and provide a tag handler and a renderer. These steps were complex, and
    other web frameworks such as Facelets showed that it was possible to create powerful
    components with less complexity. This is the point of composite components: to
    enable developers to write real, reusable, JSF UI components without any Java
    code or configuration XML.


    This new approach involves creating an XHTML page that contains components, and


    then using this page as a component in other pages. This XHTML page is then seen
    as a real component that can support validators, converters, and listeners. Any
    valid markup can be used inside of a composite component, including the templating
    features. Composite components are handled as resources and therefore must reside
    within the new standard resource directories. Table 11-18 lists all the tags involved
    in the creation and definition of a composite component.


