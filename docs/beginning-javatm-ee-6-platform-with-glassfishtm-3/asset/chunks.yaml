    \ 9-6 中显示的 BMT 代码，你可以在方法内部手动定义事务边界。\n\n## 安全性\n\n保护应用程序的安全是（或应该是）企业的首要关注点。它可以涵盖从保护网络安全、加密数据传输，到授予用户在系统上的特定权限。\n\
    \n在我们日常的互联网浏览中，我们会遇到许多需要输入用户名和密码才能访问应用程序某些部分的网站。安全性已成为网络中的常见需求，因此，Java EE 定义了多种机制来保护应用程序。\n\
    \n在保护 Java EE 应用程序时，需要理解多个概念。其中之一是用户如何绑定到主体（principal）并可以拥有多个角色。每个角色将授予对一组资源的权限。但是，要在安全域中拥有身份，用户需要经过身份验证。然后，平台将根据用户的角色通过授权资源来控制访问。\n\
    \n### 主体与角色\n\n主体和角色是软件安全中的一个重要概念。*主体*代表一个已通过身份验证系统（例如，通过验证数据库中的用户名和密码）认证的用户。然后，你可以将主体组织成称为*角色*的组，允许主体共享一组公共权限（例如，有权访问计费系统或能够向工作流发送消息）。\n\
    \n图 9-7 展示了用户如何在安全系统中被表示。如你所见，用户一旦通过身份验证，就会绑定到一个主体。该主体具有唯一标识符，并且可以链接到多个角色。例如，用户\
