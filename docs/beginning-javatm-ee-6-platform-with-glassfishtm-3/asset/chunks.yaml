    **Web 界面规范概述**


    Java 中的 Web 开发始于 1996 年的 Servlet API，这是一种创建动态 Web 内容的非常基础的方式。你必须在 Java 代码中操作底层
    HTTP API（如 `HttpServletRequest`、`HttpServletResponse`、`HttpSession` 等）来显示 HTML
    标签。JSP 于 1999 年问世，提供了比 Servlet 更高层次的抽象。2004 年，JSF 的第一个版本诞生，其 1.2 版本于 2006 年成为
    Java EE 5 的一部分。JSF 2.0 现已随 Java EE 6 捆绑发布。


    **Web 界面简史**


    起初，网页是静态的。用户请求一个资源（网页、图片、视频等），服务器便返回该资源；这种方式虽然简单，但功能非常有限。随着 Web 上商业活动的增长，公司需要向客户提供动态内容。创建动态内容的第一个解决方案是通用网关接口（CGI）。通过使用
    HTML 页面和用多种语言（从 Perl 到 Visual Basic）编写的 CGI 脚本，应用程序可以访问数据库并提供动态内容，但很明显 CGI 过于底层（你必须处理
    HTTP 头、调用 HTTP 命令等），需要改进。


    1995 年，一种名为 Java 的新语言发布，并附带了一个名为抽象窗口工具包（AWT）的平台无关用户界面 API。后来，在 Java SE 1.2 中，依赖于操作系统用户界面模块的
    AWT 被 Swing API 所取代（Swing 使用 Java 2D 绘制自己的组件）。在 Java 的早期阶段，Netscape 的 Navigator
    浏览器提供了对这种新语言的支持，从而开启了小程序的时代。*小程序*是在客户端浏览器内运行的应用程序。这使得开发者能够用 AWT 或 Swing 编写应用程序，并将其嵌入网页中。然而，小程序从未真正流行起来。Netscape
    还创建了一种名为 JavaScript 的脚本语言，它直接在浏览器中执行。尽管浏览器之间存在一些不兼容性，但 JavaScript 至今仍被广泛使用，并且是创建动态
    Web 应用程序的强大方式。


    在小程序未能被广泛采用之后，Sun 引入了 Servlet，作为一种实现轻量级动态 Web 客户端的方式。Servlet 是 CGI 脚本的替代方案，因为它们提供了更高级别的
    HTTP 处理库，可以完全访问 Java API（允许数据库访问、远程调用等），并且可以创建 HTML 作为响应内容供用户显示。


    Sun 于 1999 年发布了 JSP，作为 Servlet 模型的增强。但由于 JSP 混合了 Java 和 HTML 代码，2001 年一个开源框架的出现为一种新方法打开了大门：Struts。它扩展了
    Servlet API，并鼓励开发者采用 MVC 架构。近年来涌现了许多其他 Web 框架，每个都试图填补前一个框架的空白（如 Tapestry、Wicket、WebWork、DWR
    等）。如今，JSF 2.0 是 Java EE 6 中首选的 Web 框架。它在 Java 领域与 Struts 和 Tapestry 竞争。从更宏观的角度看，Rails
    和 Grails 与 JSF 竞争，正如 Java 与 Ruby 或 Groovy 竞争一样。Google Web Toolkit (GWT)、Flex 和
    JavaFX 可以作为 JSF 的补充。


    **JSP 2.2、EL 2.2 和 JSTL 1.2**


    从架构上讲，JSP 是 Servlet 的高层抽象，并作为 Servlet 2.1 的扩展来实现。JSP 1.2 和 Servlet 2.3 在 JSR 53
    中一同被规范。同时，JSP 标准标签库（JSTL）在 JSR 52 中被规范。


    自 2002 年起，JSP 2.0 规范在 JSR 152 中与 Servlet 分开演进。2006 年，JSP 2.1 成为 Java EE 5 的一部分，并通过引入统一的表达式语言（EL）促进了
    JSF 和 JSP 之间的集成。随着 Java EE 6 的发布，JSP 和 EL 规范都已更新到 2.2 版本。其中一个主要变化是能够使用 EL 调用方法（而不仅仅是属性）。


    第 10 章 ■ JavaServer Faces


