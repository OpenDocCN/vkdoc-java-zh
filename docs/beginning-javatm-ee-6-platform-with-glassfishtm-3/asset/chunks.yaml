    **可嵌入用法**


    会话 Bean 是容器管理的组件，这是它们的优势。容器处理各种服务（事务、生命周期、异步、拦截器等），这使您可以专注于业务代码。缺点在于，即使您只是想测试它们，也始终需要在容器中执行您的
    EJB。为了解决这个问题，您最终不得不调整业务代码以便能够测试它：当您的 EJB 只需要本地访问时添加远程接口，创建一个将调用委托给真实 EJB 的远程 TestEJB
    外观，或者使用供应商的特定功能——但无论如何，您都需要有一个运行着已部署 EJB 的容器。


    这个问题在 EJB 3.1 中通过创建可嵌入的 EJB 容器得到了解决。EJB 3.1 引入了一个标准 API，用于在 Java SE 环境中执行 EJB。可嵌入
    API（包 `javax.ejb.embeddable`）允许客户端实例化一个在其自身 JVM 中运行的 EJB 容器。可嵌入容器提供了一个托管环境，支持
    Java EE 容器中存在的相同基本服务：注入、事务、生命周期等。可嵌入 EJB 容器仅适用于 EJB Lite 子集 API（没有 MDB，没有 Entity
    Beans 2.x 等）。


    清单 7-19 展示了一个 JUnit 测试类，它使用引导 API 来启动容器（`javax.ejb.embeddable.EJBContainer` 抽象类）、查找
    EJB 并调用其方法。


    **清单 7-19.** *一个使用可嵌入容器的测试类*


    public class ItemEJBTest {


    private static **EJBContainer** ec;


    private static **Context** ctx;


    @BeforeClass


    public static void initContainer() throws Exception {


    **ec = EJBContainer.createEJBContainer();**


    **ctx = ec.getContext();**


    }


