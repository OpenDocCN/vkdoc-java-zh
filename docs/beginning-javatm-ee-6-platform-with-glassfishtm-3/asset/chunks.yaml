    \ use the `@Column` annotation in various ways (see Listing 3-16). For example,\
    \ you can change the name of the `title` and `nbOfPage` column or the length of\
    \ the `description`, and not allow null values.\n\n**Listing 3-16.** *Customizing\
    \ Mapping for the Book Entity*\n\n```java\n@Entity\npublic class Book {\n\n  \
    \  @Id\n    @GeneratedValue(strategy = GenerationType.AUTO)\n    private Long\
    \ id;\n\n    @Column(name = \"book_title\", nullable = false, updatable = false)\n\
    \    private String title;\n\n    private Float price;\n\n    @Column(length =\
