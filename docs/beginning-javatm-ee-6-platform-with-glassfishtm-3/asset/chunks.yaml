- fmt: '# Enterprise Java Beans


    The previous chapter showed how to implement persistent objects using JPA and
    how to query them with JPQL. The persistence layer is developed using objects
    that encapsulate and map their attributes to a relational database, thanks to
    annotations. The idea is to keep the entities as transparent as possible and not
    intermingle them with business logic. Entities can have methods to validate their
    attributes, but they are not made to represent complex tasks, which often require
    an interaction with other components (other persistent objects, external services,
    etc.).


    The persistence layer is not the appropriate layer for business processing. Similarly,
    the user interface should not perform business logic, especially when there are
    multiple interfaces (Web, Swing, portable devices, etc.). To separate the persistence
    layer from the presentation layer, to implement business logic, to add transaction
    management and security, applications need a business layer. In Java EE, this
    layer is implemented using Enterprise Java Beans (EJBs).


    For most applications, layering is important. Following a bottom-up approach,
    the previous chapters on JPA modelled domain classes, usually defining nouns (`Artist`,
    `CD`, `Book`, `Customer`, and so on). On top of the domain layer, the business
    layer models the actions (or verbs) of the application (create a book, buy a book,
    print an order, deliver a book, etc.). Often, this business layer interacts with
    external web services (SOAP or RESTful web services), sends asynchronous messages
    to other systems (using JMS), or posts e-mails; it orchestrates several components
    from databases to external systems, and serves as the central place for transaction
    and security demarcation as well as the entry point to any kind of client such
    as web interfaces (servlets or JSF managed beans), batch processing, or external
    systems.


    This chapter is an introduction to EJBs, and the three following chapters give
    you all the necessary information to build the business layer of an enterprise
    application. The different types of EJBs are explained; their life cycle and how
    to add Aspect-Oriented Programming (AOP) capabilities and deal with transactions
    and security are also described.


    ## Understanding EJBs


    EJBs are server-side components that encapsulate business logic and take care
    of transactions and security. They also have an integrated stack for messaging,
    scheduling, remote access, web service endpoints (SOAP and REST), dependency injection,
    component life cycle, AOP with interceptors, and so on. In addition, EJBs seamlessly
    integrate with other Java SE and Java EE technologies, such as `JDBC`, `JavaMail`,
    `JPA`, `Java Transaction API (JTA)`, `Java Messaging Service (JMS)`, `Java Authentication
    and Authorization Service (JAAS)`, `Java Naming and Directory Interface (JNDI)`,
    and `Remote Method Invocation (RMI)`. This is why they are used to build business
    layers (see Figure 6-1) to sit on top of the persistence layer and as an entry
    point for presentation-tier technologies like `JavaServer Faces (JSF)`.


    **Figure 6-1.** *Architecture layering*


    EJBs use a very powerful programming model that combines ease of use and robustness.
    Today EJBs are most likely the simplest Java server-side development model, reducing
    complexity while bringing reusability and scalability to mission-critical enterprise
    applications.


    All this comes from annotating a single plain old Java object (POJO) that will
    be deployed into a container. An EJB container is a runtime environment that provides
    services, such as transaction management, concurrency control, pooling, and security
    authorization. Historically, application servers have added other features such
    as clustering, load balancing, and failover. EJB developers can then concentrate
    on implementing business logic while the container deals with all the technical
    plumbing.


    Today more than ever, with version 3.1, EJBs can be written once and deployed
    on any application server.'
