- fmt: "# Message Priority Levels\n\nYou can use message priority levels to instruct\
    \ the JMS provider to deliver urgent messages first. JMS defines ten priority\
    \ values, with `0` as the lowest and `9` as the highest. You can specify the priority\
    \ value by either using the `setPriority()` method or passing it as a parameter\
    \ to the `send()` method:\n\n```\nMessageProducer producer = session.createProducer(topic);\n\
    \nproducer.setPriority(2);\n\n// or\n\nproducer.send(message, DeliveryMode.NON_PERSISTENT,\
    \ 2, 1000);\n```\n\n# Message-Driven Beans\n\nThis chapter shows how asynchronous\
    \ messaging provides loose coupling and increased flexibility between systems,\
    \ using the JMS API in a stand-alone environment with main classes, JNDI lookup,\
    \ or resource injection using the ACC. MDBs provide this standard asynchronous\
    \ messaging model for enterprise applications running in an EJB container.\n\n\
    An MDB is an asynchronous consumer that is invoked by the container as a result\
    \ of the arrival of a message. To a message producer, an MDB is simply a message\
    \ consumer, hidden behind a destination to which it listens.\n\nMDBs are part\
    \ of the EJB specification, and their model is close to stateless session beans\
    \ as they do not have any state and run inside an EJB container. The container\
    \ listens to a destination and delegates the call to the MDB upon message arrival.\
    \ Like any other EJB, MDBs can access resources managed by the container (other\
    \ EJBs, JDBC connections, JMS resources, etc.).\n\nWhy use MDBs when you can use\
    \ stand-alone JMS clients, as you’ve seen previously? Because of the container,\
    \ which manages multithreading, security, and transactions, thereby greatly simplifying\
    \ the code of your JMS consumer. It also manages incoming messages among multiple\
    \ instances of MDBs (available in a pool) that have no special multithreading\
    \ code themselves. As soon as a new message reaches the destination, an MDB instance\
    \ is retrieved from the pool to handle the message.\n\n## How to Write an MDB\n\
    \nMDBs can be transactional, multithreaded, and naturally consume JMS messages.\
    \ With the JMS API thus far, you might expect factories, connections, sessions,\
    \ consumers, user transactions, and so on. However, it is surprising to see that\
    \ a simple MDB can look like Listing 13-8.\n\n**Listing 13-8.** *A Simple MDB*\n\
    \n```\n@MessageDriven(mappedName = \"jms/javaee6/Topic\")\npublic class BillingMDB\
    \ implements MessageListener {\n    public void onMessage(Message message) {\n\
    \        TextMessage msg = (TextMessage)message;\n        System.out.println(\"\
    Message received: \" + msg.getText());\n    }\n}\n```\n\nThe code in Listing 13-8\
    \ (omitting exception handling for clarity) shows that MDBs relieve the programmer\
    \ of all mechanical aspects of processing the types of messages explained so far.\
    \ An MDB implements the `MessageListener` interface and the `onMessage()` method,\
    \ but no other code is needed to connect to the provider or start message consumption.\
    \ MDBs also rely on the configuration-by-exception mechanism, and only a few annotations\
