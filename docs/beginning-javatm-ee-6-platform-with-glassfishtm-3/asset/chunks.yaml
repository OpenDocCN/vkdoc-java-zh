    **Relationship Mapping**


    The world of object-oriented programming abounds with classes and associations
    between


    classes. These associations are structural in that they link objects of one kind
    to objects of another, allowing one object to cause another to perform an action
    on its behalf. Several types of associations can exist between classes.


    First of all, an association has a direction. It can be *unidirectional* (i.e.,
    one object can navigate toward another) or *bidirectional* (i.e., one object can
    navigate toward another and vice versa). In Java, you use the dot (.) syntax to
    navigate through objects. For example, when you write customer.getAddress().getCountry(),
    you navigate from the object Customer to Address and then to Country.


    In Unified Modeling Language (UML), to represent a unidirectional association
    between


    two classes, you use an arrow to indicate the orientation. In Figure 3-6, Classe1
    (the source) can navigate to Classe2 (the target), but not the inverse.


    **Figure 3-6.** *A unidirectional association between two classes*


    To indicate a bidirectional association, no arrows are used. As demonstrated in
    Figure 3-7, Class1 can navigate to Classe2 and vice versa. In Java, this is represented
    as Class1 having an attribute of type Classe2 and Class2 having an attribute of
    type Class1.


    **Figure 3-7.** *A bidirectional association between two classes*


    ![Image 35](index-119_1.jpg)


    ![Image 36](index-119_2.jpg)


    Chapter 3 ■ OBJeCt-reLatIONaL MappING


    **89**


    An association also has a *multiplicity* (or *cardinality*). Each end of an association
    can specify how many referring objects are involved in the association. The UML
    diagram in Figure 3-8 shows that one Class1 refers to zero or more instances of
    Class2.


    **Figure 3-8.** *Multiplicity on class associations*


    In UML, a cardinality is a range between a minimum and a maximum number. So 0..1


    means that you will have at minimum zero objects and at maximum one object. 1
    means that you have one and only one instance. 1..* means that you can have one
    or many instances, and 3..6 means that you have a range of between three and six
    objects. In Java, an association that represents more than one object uses collections
    of java.util.Collection, java.util.Set, java.util.List, or even java.util.Map.


    A relationship has an ownership (i.e., the owner of the relationship). In a unidirectional
    relationship, ownership is implied: in Figure 3-6, no doubt the owner is Class1,
    but in a bidirectional relationship, as depicted in Figure 3-7, the owner has
    to be specified explicitly. You then show the owning side, which specifies the
    physical mapping, and the inverse side (the non-owning side).


    In the next sections, you’ll see how to map collections of objects with JPA annotations.


    **Relationships in Relational Databases**


    In the relational world, things are different because, strictly speaking, a relational
    database is a collection of *relations* (also called *tables*), which means anything
    you model is a table.


    To model an association, you don’t have lists, sets, or maps, you have tables.
    In Java, when you have an association between one class and another, in the database
    you will get a table reference. This reference can be modelled in two different
    ways: by using a *foreign key* (a *join* *column*) or by using a *join table*.
    In database terms, a column that refers to a key of another table is a *foreign
    key column*.


    As an example, consider that a customer has one address, which is a *one-to-one
    relation*.


    In Java, you would have a Customer class with an Address attribute. In a relational
    world, you could have a CUSTOMER table pointing to an ADDRESS through a foreign
    key column (or join column), as described in Figure 3-9.


    **Figure 3-9.** *A relationship using a join column*


    There is a second way of modeling—using a join table. The CUSTOMER table in Figure
    3-10


    doesn’t store the foreign key of the ADDRESS anymore. An intermediate table is
    created to hold the relationship information by storing the foreign keys of both
    tables.


    ![Image 37](index-120_1.jpg)


