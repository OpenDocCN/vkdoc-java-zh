    \ \"H2G2\"\n```\n\n别名用于通过点运算符导航实体属性。由于`Book`实体有一个名为`title`的`String`类型持久化属性，`b.title`引用`Book`实体的`title`属性。执行此语句将产生零个或多个`Book`实例的列表，这些实例的标题等于*H2G2*。\n\
    \n最简单的`SELECT`查询由两个必需部分组成：`SELECT`和`FROM`子句。`SELECT`定义查询结果的格式。`FROM`子句定义将从中获取结果的实体，可选的`WHERE`、`ORDER\
