    Metro 是 Web 服务的一站式解决方案。这个完整的堆栈建立在 JAX-WS 开发范式之上，并通过高级功能对其进行了增强，例如可信的端到端安全性、优化的传输（MTOM、FastInfoset）、可靠消息传递以及
    SOAP Web 服务的事务行为。此类 Web 服务质量（QoS）基于标准（OASIS、W3C），以策略形式表达，并且除了 JAX-WS 之外，无需使用新的
    API。Metro 还会定期与 Microsoft 针对 .NET 实现进行测试，以确保两种技术之间的互操作性。社区网站位于 [`metro.dev.java.net。`](http://metro.dev.java.net)


    Mojarra 是 GlassFish 中 JSF 实现的名称，可在 [`mojarra.dev.java.net`](http://mojarra.dev.java.net)
    获取。Jersey 是新的 JAX-RS 规范的生产级 RI。


    该规范及其实现都是 Java EE 6 和 GlassFish 的早期参与者。事实上，自 2008 年发布以来，Jersey 1.0 就已在 GlassFish
    v2 和 v3 的更新中心中提供。


    管理


    显然，作为一个完整的应用服务器，GlassFish 实现了 100% 的 Java EE 6 规范，但它还具有其他功能，使其成为一个完善的产品，例如其管理能力，无论是通过管理控制台还是通过强大的
    asadmin 命令行界面。几乎所有配置都存储在一个名为 domain.xml 的文件中（位于 domains\domain1\config），该文件可用于故障排除，但不应手动编辑此文件；而应使用这两个管理工具之一。两者都依赖于
    GlassFish 提供的广泛 JMX 检测。


    **管理控制台**


    管理控制台是一个基于浏览器的管理用户界面（见图 1-16），用于应用服务器。此工具适用于管理员和开发人员。它提供受管理对象的图形表示、增强的日志文件查看、系统状态和监控数据。至少，控制台管理配置的创建和修改（JVM
    调优、日志级别、池和缓存调优等）、JDBC、JNDI、JavaMail、JMS 和连接器资源，以及应用程序（部署）。在 GlassFish 的集群配置文件中，管理控制台得到增强，允许用户管理集群、实例、节点代理和负载均衡配置。在导航工具的任何时候，都可以通过右上角的“帮助”按钮获得上下文帮助。在默认安装中，管理控制台在
    GlassFish 启动后即可在 [`localhost:4848`](http://localhost:4848) 访问。从 GlassFish v3 开始，可以设置匿名用户，从而无需登录。如果不是这种情况，典型安装将使用
    admin 作为用户名，adminadmin 作为默认密码。


    ![Image 22](img/index-66_1.jpg)


    **36**


    第 1 章 ■ Java EE 6 概览


    **图 1-16.** *Web 管理控制台*


    **asadmin CLI**


    asadmin 命令行界面（CLI）非常强大，通常是生产环境中使用的工具，因为它可以通过脚本创建实例和资源、部署应用程序，并在运行的系统上提供监控数据。该命令位于
    GlassFish 的 bin 子目录下，可以管理多个本地或远程的应用服务器域。


    asadmin 提供了数百个命令，但您可能只需要使用其中的一小部分。如果您对这些命令感到好奇，可以尝试 asadmin help。在简单的开发人员配置文件中，有用的命令包括
    asadmin start-domain、asadmin stop-domain、asadmin deploy、asadmin deploydir 和 asadmin
    undeploy。如果出现拼写错误，asadmin 会为您提供最接近的匹配命令。例如，尝试 asadmin resource，asadmin 将为您提供相关命令，如图
    1-17 所示。在 GlassFish v3 中，asadmin 实现了命令历史和自动补全功能。


    ![Image 23](img/index-67_1.jpg)


