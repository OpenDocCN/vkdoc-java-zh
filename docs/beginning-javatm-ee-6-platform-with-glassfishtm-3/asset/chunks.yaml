  trans: '

    消费者与服务之间仍能以松散耦合的方式交换数据：即使用 XML 文档。消费者以 XML 文档的形式向 Web 服务发送请求，并可选地接收同样以 XML 格式返回的回复。


    Web 服务也涉及分布式计算。分布式软件已存在多年，但与现有分布式系统不同，Web 服务是为 Web 量身定制的。其默认网络协议是 HTTP，这是一种广为人知且稳健的无状态协议。


    Web 服务无处不在，它们可以运行在桌面端，也可用于企业对企业（B2B）集成，从而使以往需要人工干预的操作得以自动执行。Web 服务通过互联网或同一公司内部（即企业应用集成，EAI）集成由不同组织运行的应用程序。在所有情况下，Web
    服务都提供了一种连接不同软件组件的标准方式。


    **理解 Web 服务**


    简而言之，Web 服务是一种通过服务接口暴露给客户端应用程序（即服务消费者）的业务逻辑。然而，与对象或 EJB 不同，Web 服务使用 XML 提供松散耦合的接口。Web
    服务标准规定，消息发送到的接口应定义消息请求和响应的格式，以及发布和发现 Web 服务接口（注册中心）的机制。


    在图 14-1 中，您可以看到 Web 服务交互的高层示意图。Web 服务可以选择将其接口注册到注册中心（UDDI），以便消费者能够发现它。一旦消费者了解了服务的接口和消息格式，它就可以发送请求并接收响应。


    **393**


    ![Image 123](img/index-424_1.jpg)


    **394**


    第 14 章 ■ SOAP Web 服务


    **图 14-1.** *消费者通过注册中心发现服务。*


    Web 服务需要多种技术和协议，以标准方式将数据从消费者传输到服务。您最常遇到的几种如下：


    • 统一描述、发现和集成（UDDI）是一种注册与发现机制，类似于黄页，用于存储和分类 Web 服务接口。


    • Web 服务描述语言（WSDL）定义了 Web 服务接口、数据和消息类型、交互方式及协议。


    • 简单对象访问协议（SOAP）是一种基于 XML 技术的消息编码协议，为 Web 服务通信定义了信封结构。


    • 消息通过传输协议进行交换。虽然超文本传输协议（HTTP）是应用最广泛的传输协议，但也可以使用 SMTP 或 JMS 等其他协议。


    • 可扩展标记语言（XML）是构建和定义 Web 服务（SOAP、WSDL 和 UDDI）的基础。


    借助这些标准技术，Web 服务提供了几乎无限的潜力。客户端可以调用 Web 服务，该服务可映射到任何程序，并适应任何数据类型和结构，通过 XML 交换消息。


    **UDDI**


    通过 Web 相互交互的程序需要能够找到允许它们互联的信息。UDDI 提供了定位 Web 服务信息及其调用方式的标准方法。


    UDDI 是一个基于 XML 的 Web 服务注册中心，类似于黄页目录，企业可以在此注册其服务。注册信息包括业务类型、地理位置、网站、电话号码等。其他企业随后可以搜索该注册中心，发现特定
    Web 服务的信息。这些信息提供了关于服务的额外元数据，描述了其行为以及 Web 服务的实际位置。


    这些信息以 WSDL 文档的形式呈现。客户端随后可以消费该 WSDL 文档，该文档提供了绑定和调用服务所需的信息。


    ![Image 124](img/index-425_1.jpg)


    第 14 章 ■ SOAP Web 服务


    **395**


    **WSDL**


    UDDI 注册中心指向互联网上可用的公共 WSDL 文件，潜在消费者可以下载该文件。WSDL 是定义消费者与 Web 服务之间交互的接口定义语言（IDL）（见图
    14-2）。它对 Web 服务至关重要，因为它描述了消息类型、端口、通信协议、支持的操作、位置以及客户端应期望的返回内容。它定义了 Web 服务承诺遵守的契约。您可以将
    WSDL 视为用 XML 编写的 Java 接口。


    **图 14-2.** *消费者与 Web 服务之间的 WSDL 接口*


    为确保互操作性，消费者和提供者需要标准的 Web 服务接口来共享和理解消息。这正是 WSDL 的作用。SOAP 则定义了消息从一台计算机发送到另一台计算机的方式。


    **SOAP**


    SOAP 是标准的 Web 服务应用协议。它提供了连接 Web 服务的通信机制，通过网络协议（通常是 HTTP）交换格式化的 XML 数据。与 WSDL 类似，SOAP
    高度依赖 XML，因为 SOAP 消息是一个包含多个元素（信封、标头、正文等）的 XML 文档。


    SOAP 旨在提供一种独立、抽象的通信协议，能够连接分布式服务。连接的服务可以使用支持给定传输协议的任何硬件和软件组合来构建。


    **传输协议**


    为了使消费者与 Web 服务通信，需要一种相互发送消息的方式。SOAP 消息可以使用双方都支持的协议通过网络传输。鉴于 Web 服务主要应用于 Web，它们通常使用
    HTTP，但也可以使用其他网络协议，如 HTTPS（安全 HTTP）、TCP/IP、SMTP（简单邮件传输协议）、FTP（文件传输协议）等。


    **XML**


    XML 在 Java EE 平台中用于部署描述符、元数据信息等。对于 Web 服务，XML 也被用作一种集成技术，解决了数据独立性和互操作性问题。它不仅用作消息格式，还用于定义服务（WSDL）或交换消息（SOAP）。与这些
    XML 文档相关联的模式（Schema）用于验证交换的数据。


    **396**


    第 14 章 ■ SOAP Web 服务


    **Web 服务规范概述**


    持久化主要由一个规范涵盖：JPA。对于 Web 服务，情况更为复杂，因为您需要处理来自不同标准机构的众多规范。此外，由于 Web 服务被其他编程语言使用，这些规范并非都与
    Java 社区流程（JCP）直接相关。


    **Web 服务简史**


    Web 服务是企业通过网络进行通信的标准方式，在此之前已有一些前身：最初由 Unix 系统使用的通用对象请求代理架构（CORBA），以及其微软竞争对手——分布式组件对象模型（DCOM）。在更底层，有远程过程调用（RPC），而更接近我们
    Java 世界的是远程方法调用（RMI）。


    在 Web 出现之前，很难让所有主要软件供应商就传输协议达成一致。当 HTTP 协议成为成熟标准后，它逐渐成为通用的业务通信媒介。大约在同一时间，当万维网联盟（W3C）宣布
    XML 1.0 适合在应用程序中部署时，XML 正式成为标准。到 1998 年，HTTP 和 XML 这两个要素已准备好协同工作。

    '
- fmt: 'SOAP 1.0，始于1998年由微软发起，最终于1999年底发布，并在XML Schema中建模了类型化引用和数组。到2000年，IBM开始开发SOAP
    1.1，而WSDL于2001年提交给W3C。UDDI由结构化信息标准促进组织（OASIS）于2000年编写，旨在允许企业发布和发现Web服务。随着SOAP、WSDL和UDDI的到位，创建Web服务的事实标准已在主要IT公司的支持下形成。


    Java于2002年6月通过基于XML的RPC 1.0的Java API（`JAX-RPC 1.0`）引入了Web服务功能，并于2003年在`J2EE 1.4`中增加了`JAX-RPC
    1.1`。该规范非常冗长且不易使用。随着Java EE 5的到来，全新的基于XML的Web服务2.0的Java API（`JAX-WS 2.0`）规范被引入，作为首选的Web服务模型。如今，Java
    EE 6随附了`JAX-WS 2.2`。


    ## Java EE 规范


    要掌握所有Web服务标准，您需要花时间阅读来自W3C、JCP和OASIS的一系列规范。


    W3C是一个开发和维护Web技术（如HTML、XHTML、RDF、CSS等）的联盟，并且更值得注意的是，对于Web服务，它还涉及XML、XML Schema、SOAP和WSDL。


    OASIS托管了多个与Web服务相关的标准，例如UDDI、WS-Addressing、WS-Security、WS-Reliability等。


    回到Java，JCP拥有一组属于Java EE 6和Java SE 6的规范。它们包括`JAX-WS`（JSR 224）、`Web Services 1.2`（JSR
    109）、`JAXB 2.2`（JSR 222）、`Web Services Metadata 2.0`（JSR 181）和`JAXR 1.0`（JSR 93）。这些规范通常被统称为非正式术语“Java
    Web服务（JWS）”。


    起初，这些规范列表可能会让您认为在Java中编写Web服务会很困难，尤其是在理解API方面。然而，其美妙之处在于，您无需担心底层技术（XML、WSDL、SOAP、HTTP等），因为仅需几个JWS标准就能为您完成工作。


    ## JAX-WS 2.2


    `JAX-WS`（JSR 224）是`JAX-RPC`的新名称。`JAX-RPC`已在Java EE 6中被精简，这意味着它提议从Java EE 7中移除。


    `JAX-WS 2.2`定义了一组API和注解，允许您使用Java构建和使用Web服务。它提供了消费者和服务设施，通过SOAP发送和接收Web服务请求，从而屏蔽了协议的复杂性。因此，消费者和服务都不需要生成或解析SOAP消息，因为`JAX-WS`处理底层处理。`JAX-WS`规范依赖于其他规范，例如用于XML绑定的Java架构（JAXB）。


    ## Web Services 1.2


    JSR 109（“实现企业Web服务”）定义了Java EE容器中Web服务的编程模型和运行时行为。它还定义了打包方式，以确保Web服务在不同应用服务器实现之间的可移植性。


    ## JAXB 2.2


    Web服务通过交换XML消息来发送请求和响应。在Java中，有几种底层API用于处理XML文档和XML Schema。`JAXB`规范提供了一组API和注解，用于将XML文档表示为Java构件，允许开发人员使用代表XML文档的Java对象。`JAXB`（JSR
    222）便于将XML文档解组为对象，并将对象编组回XML文档。即使`JAXB`可用于任何XML目的，它也与`JAX-WS`紧密集成。


    ## WS-Metadata 2.0


    Web服务元数据（WS-Metadata，规范JSR 181）提供了便于定义和部署Web服务的注解。JSR 181的主要目标是简化Web服务的开发。它通过注解提供了WSDL与Java接口之间的映射功能，反之亦然。这些注解可以在简单的Java类或EJB中使用。'
  raw: 'SOAP 1.0, started in 1998 by Microsoft, was finally shipped at the end of
    1999, and modeled typed references and arrays in XML Schema. By 2000, IBM started
    working on SOAP 1.1, and WSDL was submitted to the W3C in 2001\. UDDI was written
    in 2000 by the Organization for the Advancement of Structured Information Standards
    (OASIS) to allow businesses to publish and discover web services. With SOAP, WSDL,
    and UDDI in place, the de facto standards to create web services had arrived with
    the support of major IT companies.


    Java introduced web services capabilities with the Java API for XML-based RPC
    1.0


    (JAX-RPC 1.0) in June 2002 and added JAX-RPC 1.1 to J2EE 1.4 in 2003. This specification
    was very verbose and not easy to use. With the arrival of Java EE 5, the brand-new
    Java API for XML-based Web Services 2.0 (JAX-WS 2.0) specification was introduced
    as the preferred web service model. Today Java EE 6 is shipped with JAX-WS 2.2.


    **Java EE Specifications**


    To master all web services standards, you would have to spend some time reading
    a bunch of specifications coming from the W3C, the JCP, and OASIS.


    The W3C is a consortium that develops and maintains web technologies such as HTML,


    XHTML, RDF, CSS, and so forth and, more interestingly, for web services, XML,
    XML Schemas, SOAP, and WSDL.


    OASIS hosts several web service–related standards such as UDDI, WS-Addressing,


    WS-Security, WS-Reliability, and many others.


    Coming back to Java, the JCP has a set of specifications that are part of Java
    EE 6 and Java SE 6\. They include JAX-WS (JSR 224), Web Services 1.2 (JSR 109),
    JAXB 2.2 (JSR 222), Web Services Metadata 2.0 (JSR 181), and JAXR 1.0 (JSR 93).
    Taken together, these specifications are usually referred to by the informal term
    Java Web Services (JWS).


    At first, these lists of specifications may make you think that writing a web
    service in Java would be difficult, especially when it comes to getting your head
    around the APIs. However,


    Chapter 14 ■ SOap WeB SerVICeS


    **397**


    the beauty of it is that you don’t need to worry about the underlying technologies
    (XML, WSDL, SOAP, HTTP, etc.), as just a few JWS standards will do the work for
    you.


    JaX-WS 2.2


    JAX-WS (JSR 224) is the new name of JAX-RPC. JAX-RPC has been pruned in Java EE
    6, meaning that it is proposed to be removed from Java EE 7.


    JAX-WS 2.2 defines a set of APIs and annotations that allow you to build and consume


    web services with Java. It provides the consumer and service facilities to send
    and receive web service requests via SOAP, masking the complexity of the protocol.
    Therefore, neither the consumer nor the service has to generate or parse SOAP
    messages, as JAX-WS deals with the low-level processing. The JAX-WS specification
    depends on other specifications such as Java Architecture for XML Binding (JAXB).


    Web Services 1.2


    JSR 109 (“Implementing Enterprise Web Services”) defines the programming model
    and run-


    time behavior of web services in the Java EE container. It also defines packaging
    to ensure portability of web services across application server implementations.


    JaXB 2.2


    Web services send requests and responses exchanging XML messages. In Java, there
    are several low-level APIs to process XML documents and XML Schemas. The JAXB
    specification


    provides a set of APIs and annotations for representing XML documents as Java
    artifacts, allowing developers to work with Java objects representing XML documents.
    JAXB (JSR 222) facilitates unmarshalling XML documents into objects and marshalling
    objects back into


    XML documents. Even if JAXB can be used for any XML purpose, it is tightly integrated
    with JAX-WS.


    WS-Metadata 2.0


    Web Services Metadata (WS-Metadata, specification JSR 181) provides annotations
    that facilitate the definition and deployment of web services. The primary goal
    of JSR 181 is to simplify the development of web services. It provides mapping
    facilities between WSDL and Java interfaces, and vice versa, through annotations.
    These annotations can be used within simple Java classes or EJBs.'
