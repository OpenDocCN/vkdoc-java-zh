    **图 1-17.** *asadmin CLI*


    安装 GlassFish


    GlassFish v2 可以以多种配置文件安装（每个配置文件是一组功能和配置）。对您来说，最常见的是开发人员配置文件。如果您想开始使用 GlassFish
    的集群功能，您可以使用集群配置文件进行安装，或者通过管理控制台中的“添加集群支持”选项更新现有安装。对于 GlassFish v3（运行 Java EE 6
    应用程序所需），目前只有开发人员配置文件。


    GlassFish 可以通过多种分发机制下载。最直接的选择是从 [`glassfish.org`](http://glassfish.org) 获取，或者通过
    Java EE SDK 或 NetBeans IDE 获取。


