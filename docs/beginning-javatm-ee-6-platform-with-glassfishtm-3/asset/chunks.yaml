- fmt: "As you just saw, each session bean has its own container-managed life cycle.\
    \ The container lets you optionally provide your own business code when the state\
    \ of the bean changes. The change from one state to another can be intercepted\
    \ by the container to invoke methods annotated by one of the annotations listed\
    \ in Table 8-1.\n\n**Table 8-1.** *Life-Cycle Callback Annotations*\n\n| **Annotation**\
    \ | **Description** |\n| :--- | :--- |\n| `@PostConstruct` | Marks a method to\
    \ be invoked immediately after a bean instance is created and dependency injection\
    \ is done by the container. This annotation is often used to perform any initialization.\
    \ |\n| `@PreDestroy` | Marks a method to be invoked immediately before the bean\
    \ instance is destroyed by the container. The method annotated with `@PreDestroy`\
    \ is often used to release resources that had been previously initialized. With\
    \ stateful beans this happens after a method annotated with `@Remove` has been\
    \ completed. |\n| `@PrePassivate` | Marks a method to be invoked before the container\
    \ passivates the instance. It usually gives the bean the time to prepare for serialization\
    \ and to release resources that cannot be serialized (e.g., it closes connections\
    \ to a database, a message broker, a network socket, etc.). |\n| `@PostActivate`\
    \ | Marks a method to be invoked immediately after the container reactivates the\
    \ instance. Gives the bean a chance to reinitialize resources that had been closed\
    \ during passivation. |\n\n> **Note:** `@PrePassivate` and `@PostActivate` annotations\
    \ are defined in the `javax.ejb` package and the EJB 3.1 specification (JSR 318).\
    \ `@PostConstruct` and `@PreDestroy` are part of the Common Annotations 1.0 specification\
    \ (JSR 250) and come from the `javax.annotation` package (like `@Resource` or\
    \ other security annotations that you’ll see in the next chapter).\n\nA callback\
    \ method is required to have the following signature:\n\n`void <METHOD>();`\n\n\
    The following rules apply to a callback method:\n\n- The method must not have\
    \ any parameters and must return `void`.\n- The method must not throw a checked\
    \ exception but can throw runtime exceptions. Throwing a runtime exception will\
    \ roll back the transaction if one exists (as explained in the next chapter).\n\
    - The method can have `public`, `private`, `protected`, or package-level access,\
    \ but must not be `static` or `final`.\n- A method may be annotated with multiple\
    \ annotations (the `init()` method shown later in Listing 8-2 is annotated with\
    \ `@PostConstruct` and `@PostActivate`). However, only one annotation of a given\
    \ type may be present on a bean (you can’t have two `@PostConstruct` annotations\
    \ in the same session bean, for example).\n- A callback method can access the\
    \ beans’ environment entries (see the “Environment Naming Context” section in\
    \ Chapter 7).\n\nThese callbacks are typically used to allocate and/or release\
    \ the bean’s resources. As an example, Listing 8-1 shows the singleton bean `CacheEJB`\
    \ using a `@PostConstruct` annotation to initialize its cache. Straight after\
    \ creating the single instance of the `CacheEJB`, the container invokes the `initCache()`\
    \ method.\n\n**Listing 8-1.** *A Singleton Initializing Its Cache with the `@PostConstruct`\
    \ Annotation*\n\n```java\n@Singleton\npublic class CacheEJB {\n    private Map<Long,\
    \ Object> cache = new HashMap<Long, Object>();\n\n    @PostConstruct\n    private\
    \ void initCache() {\n        // Initializes the cache\n    }\n\n    public Object\
    \ getFromCache(Long id) {\n        if (cache.containsKey(id))\n            return\
    \ cache.get(id);\n        else\n            return null;\n    }\n}\n```\n\nListing\
    \ 8-2 shows a snippet of code for a stateful bean. The container maintains conversational\
    \ state, which can include heavy-duty resources such as a database connection.\
    \ Because it is expensive to open a database connection, it should be shared across\
    \ calls but released when the bean is idle (or passivated).\n\nAfter creating\
    \ an instance of a stateful bean, the container injects the reference of a datasource\
    \ to the `ds` attribute. Once the injection is done, the container will call the\
    \ designated `@PostConstruct` method (`init()`), which creates a database connection.\
    \ If the container happens to passivate the instance, the `close()` method will\
    \ be invoked (`@PrePassivate`). The purpose of this is to close the JDBC connection,\
    \ which holds native resources and is no longer needed during passivation. When\
    \ the client invokes a business method on the bean, the container activates it\
    \ and calls the `init()` method again (`@PostActivate`). When the client invokes\
    \ the `checkout()` method (annotated with the `@Remove` annotation), the container\
    \ removes the instance but first will call the `close()` method again (`@PreDestroy`).\n\
    \n**Listing 8-2.** *A Stateful Bean Initializing and Releasing Resources*\n\n\
    ```java\n@Stateful\npublic class ShoppingCartEJB {\n    @Resource\n    private\
    \ DataSource ds;\n\n    private Connection connection;\n    private List<Item>\
    \ cartItems = new ArrayList<Item>();\n\n    @PostConstruct\n    @PostActivate\n\
    \    private void init() {\n        connection = ds.getConnection();\n    }\n\n\
    \    @PreDestroy\n    @PrePassivate\n    private void close() {\n        connection.close();\n\
    \    }\n\n    // ...\n\n    @Remove\n    public void checkout() {\n        cartItems.clear();\n\
    \    }\n}\n```\n\nFor better readability, I’ve omitted the SQL exception handling\
