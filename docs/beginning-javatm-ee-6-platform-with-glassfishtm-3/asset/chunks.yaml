    \ Manager*\n\n```java\n@Stateless\npublic class BookBean {\n\n    @PersistenceContext(unitName\
    \ = \"chapter04PU\")\n    private EntityManager em;\n\n    public void createBook()\
    \ {\n        // Create an instance of book\n        Book book = new Book();\n\
    \        book.setId(1234L);\n        book.setTitle(\"The Hitchhiker's Guide to\
    \ the Galaxy\");\n        book.setPrice(12.5F);\n        book.setDescription(\"\
    Science fiction created by Douglas Adams.\");\n        book.setIsbn(\"1-84023-742-2\"\
    );\n        book.setNbOfPage(354);\n        book.setIllustrations(false);\n\n\
    \        // Persist the book to the database\n        em.persist(book);\n\n  \
    \      // Retrieve the book by its identifier\n        book = em.find(Book.class,\
    \ 1234L);\n        System.out.println(book);\n    }\n}\n```\n\nCompared with Listing\
    \ 4-2, the code in Listing 4-5 is much simpler. First, there is no `Persistence`\
    \ or `EntityManagerFactory` as the entity manager instance is injected by the\
    \ container. Second, because stateless beans manage the transactions, there is\
    \ no explicit commit or rollback. This style of entity manager will be demonstrated\
    \ in Chapter 6.\n\n### **Persistence Context**\n\nBefore exploring the `EntityManager`\
    \ API in detail, you need to understand a crucial concept: the *persistence context*.\
    \ A persistence context is a set of managed entity instances at a given time:\
    \ only one entity instance with the same persistent identity can exist in a persistence\
    \ context. For example, if a `Book` instance with an ID of `1234` exists in the\
    \ persistence context, no other book with this ID can exist within that same persistence\
    \ context. Only entities that are contained in the persistence context are managed\
    \ by the entity manager, meaning that changes will be reflected in the database.\n\
    \nThe entity manager updates or consults the persistence context whenever a method\
    \ of the `javax.persistence.EntityManager` interface is called. For example, when\
    \ a `persist()` method is called, the entity passed as an argument will be added\
    \ to the persistence context if it doesn’t already exist. Similarly, when an entity\
    \ is found by its primary key, the entity manager first checks whether the requested\
    \ entity is already present in the persistence context. The persistence context\
    \ can be seen as a first-level cache. It’s a short, live space where the entity\
    \ manager stores entities before flushing the content to the database. Objects\
    \ just live in the persistent context for the duration of the transaction.\n\n\
    The configuration for an entity manager is bound to the factory that created it.\
    \ Whether application or container managed, the factory needs a persistence unit\
    \ from which to create an entity manager. A persistence unit dictates the settings\
    \ to connect to the database and the list of entities that can be managed in a\
