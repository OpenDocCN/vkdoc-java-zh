- fmt: '# JAXB Annotations and Web Services


    ## JAXB Annotations Overview


    `@XmlIDREF` - Used when referring back to an element using the `@XmlIDREF` annotation
    (XML Schema ID and IDREF concepts)


    `@XmlIDREF` - Maps a property to an Xml IDREF in the schema


    `@XmlList` - Maps a property to a list


    `@XmlMimeType` - Identifies a textual representation of the MIME type for a property


    `@XmlNs` - Identifies an XML namespace


    `@XmlRootElement` - Represents an annotation required by any class that is to
    be bound as the root XML element


    `@XmlSchema` - Maps a package name to an XML namespace


    `@XmlTransient` - Informs JAXB not to bind an attribute (analogous to the Java
    `transient` keyword or `@Transient` annotation in JPA)


    `@XmlType` - Annotates a class as being a complex type in XML Schema


    `@XmlValue` - Allows the mapping of a class to a simple schema content or type


    When using these annotations, you can map objects to a specific XML Schema. And
    sometimes you need this flexibility with legacy web services. Referring to JPA,
    when you need to map entities to a legacy database, there is a set of annotations
    that allows customizing every part of the mapping (columns, table, foreign keys,
    etc.). With web services, it’s a bit the same: web services are described in a
    WSDL file written in XML. If it’s a legacy web service, its WSDL cannot change.
    Instead, a mechanism to map it to objects must be used, which is why JAXB is used
    with web services.


    ![Image 126](index-436_1.jpg)


    **406** Chapter 14 ■ SOAP Web Services


    > **Note** In this section, I’ve mentioned JPA several times because both JPA
    and JAXB technologies heavily rely on annotations and are used to map objects
    to a different media (database or XML). In terms of architecture, entities should
    only be used to map data to a database, and JAXB classes to map data to XML. But
    sometimes you may want the same object to have a database representation as well
    as an XML one. It is technically possible to annotate the same class with `@Entity`
    and `@XmlRootElement` even if it’s not really recommended.


    ## The Invisible Part of the Iceberg


    Even if you don’t explicitly manipulate SOAP and WSDL documents when you develop
    with JAX-WS, it is important to have some understanding of their structure.


    When developing web services, you can use WSDL to define their interface: the
    input and output parameters of the web service in terms of XML Schema. SOAP messages
    are used to carry the input and output parameters specified by the WSDL. Web services
    provide two key ingredients: an interface definition language (WSDL) and a messaging
    standard (SOAP).


    When a consumer wants to invoke the `CardValidator` web service (see Figure 14-4),
    it gets its WSDL to know the interface it can use, asks to validate a credit card
    (the `validate` SOAP message), and receives a response (the `validateResponse`
    SOAP message).


    **Figure 14-4.** *A consumer invoking a web service*


    ## WSDL


    WSDL documents are hosted in the web service container and use XML to describe
    what a service does, how to invoke its operations, and where to find it. The XML
    document follows a fixed structure containing several parts (see Listing 14-11).
    The `CardValidator` web service is the example used to introduce the elements
    listed here:


    - `<definitions>` is the root element of the WSDL, and it specifies the global
    declarations of namespaces that are visible through the document.

    - `<types>` defines the data types to be used in the messages. In this example,
    it is the XML Schema Definition (`CardValidatorService?xsd=1`) that describes
    the parameters passed to the web service request (the `CreditCard` object) and
    the response (a `Boolean`).

    - `<message>` defines the format of data exchanged between a web service consumer
    and the web service itself. Here you have the request (the `validate` method)
    and the response (`validateResponse`).


    **407** Chapter 14 ■ SOAP Web Services


    - `<portType>` specifies the operations of the web service (the `validate` method).

    - `<binding>` describes the concrete protocol (here SOAP) and data formats for
    the operations and messages defined for a particular port type.'
