    Life Cycle and Callback


    Web services also have a life cycle that resembles the stateless and message-driven
    bean, as you can see in Figure 14-5\. It is the same life cycle found for components
    that do not hold any state: either they exist or they are ready to process a request.
    This life cycle is managed by the container.


    **Figure 14-5.** *Web service life cycle*


    Chapter 14 ■ SOap WeB SerVICeS


    **417**


    Both the servlet and EJB endpoint support dependency injection (because they run
    in


    a container) and life-cycle methods such as @PostConstruct and @PreDestroy. The
    container calls the @PostConstruct callback method, if any, when it creates an
    instance of a web service, and calls the @PreDestroy callback when it destroys
    it.


    One difference between servlet and EJB endpoints is that EJBs can use interceptors.
    Interceptors are the Java EE implementation of the Aspect-Oriented Programming
    (AOP) concept described in Chapter 8.


    Web Service Context


    A web service has an environment context and can access it by injecting a reference
    of javax.


    xml.ws.WebServiceContext with a @Resource annotation. Within this context, the
    web service can obtain runtime information such as the endpoint implementation
    class, the message context, and security information relative to a request being
    served.


    **@Resource**


    private **WebServiceContext** context;


    Table 14-2 lists the methods defined in the javax.xml.ws.WebServiceContext interface.


    **Table 14-2.** *Methods of the WebServiceContext Interface*


    **Method**


    **Description**


    getMessageContext


    Returns the MessageContext for the request being served at the time this


    method is called. It can be used to access the SOAP message headers,


    body, and so on.


    getUserPrincipal


    Returns the Principal that identifies the sender of the request


    currently being serviced.


    isUserInRole


    Returns a Boolean indicating whether the authenticated user is in-


    cluded in the specified logical role.


    getEndpointReference


    Returns the EndpointReference associated with this endpoint.


    **Invoking a Web Service**


    With the WSDL and some tools to generate the Java stubs, you can invoke a web
    service.


    Invoking a web service is similar to invoking a distributed object with RMI. Like
    RMI, JAX-WS


    enables the programmer to use a local method call to invoke a service on another
    host. The difference is that on the remote host, the web service can be written
    in another programming language (note that you can invoke non-Java code using
    RMI-IIOP). The WSDL is the standard contract between the consumer and the service.
    Metro provides a WSDL-to-Java utility tool (wsimport) that generates Java interfaces
    and classes from a WSDL. Such interfaces are called service endpoint interfaces
    (SEI) because it is a Java representation of a web service endpoint (servlet or
    EJB). This SEI acts like a proxy that routes the local Java call to the remote
    web service using HTTP.


    When a method on this proxy is invoked (see Figure 14-6), it converts the parameters
    of the method into a SOAP message (the request) and sends it to the web service
    endpoint. To obtain the result, the SOAP response is converted back into an instance
    of the returned type.


    You don’t need to understand the internal work of the proxy nor even look at the
    code. Before


