  trans: '

    要使事务正常工作并遵循 ACID 属性，必须部署多个组件。首先，我们来看一个最简单的例子：一个应用程序对单个资源（例如，一个数据库）执行多次更改。当只有一个事务性资源时，只需要一个本地事务。仍然可以使用分布式事务（如
    JTA），但并非严格必要。图 9-1 展示了应用程序通过事务管理器和资源管理器与资源交互的过程。


    ![Image 77](img/index-271_1.jpg)


    第 9 章 ■ 事务与安全


    **241**


    **图 9-1.** *涉及单个资源的事务*


    图 9-1 中所示的组件将大部分事务特定的处理逻辑从应用程序中抽象出来：


    *   **事务管理器** 是负责管理事务操作的核心组件。它代表应用程序创建事务，通知资源管理器它正在参与一个事务（此操作称为*登记*），并对资源管理器执行提交或回滚操作。

    *   **资源管理器** 负责管理资源，并在事务管理器处注册这些资源。资源管理器的例子包括关系型数据库的驱动程序、JMS 资源或 Java 连接器。

    *   **资源** 是您进行读写操作的持久化存储（例如，数据库、消息目的地等）。


    维护 ACID 属性并非应用程序的责任。应用程序只需决定提交或回滚事务，而事务管理器则会准备好所有资源以确保成功执行。


    在 Java EE 中，这些组件通过 JSR 907 定义的 Java 事务 API (JTA) 来处理事务。JTA 为应用程序定义了一组用于划定事务边界的接口，同时也定义了与事务管理器交互的
    API。这些接口定义在 `javax.transaction` 包中，其中一些在表 9-2 中进行了描述。


    **表 9-2.** *主要的 JTA 接口*


    | 接口 | 描述 |

    | :--- | :--- |

    | `UserTransaction` | 定义了应用程序可用于以编程方式控制事务边界的方法。它被使用 Bean 管理事务 (BMT) 的 EJB 用于开始、提交或回滚事务（如“Bean
    管理的事务”部分所述）。 |

    | `TransactionManager` | 允许 EJB 容器代表 EJB 划定事务边界。 |

    | *续* | |


    ![Image 78](img/index-272_1.jpg)


    **242**


    第 9 章 ■ 事务与安全


    **表 9-2.** *（续）*


    | 接口 | 描述 |

    | :--- | :--- |

    | `Transaction` | 允许对目标 `Transaction` 对象中的事务执行操作。 |

    | `XAResource` | 作为行业标准 X/Open XA 接口的 Java 映射（如下一节所述）。 |


    **XA 与分布式事务**


    正如您刚才所见，使用单个资源的事务（如前文图 9-1 所示）被称为本地事务。然而，许多企业级应用程序会使用多个资源。


    回到资金转账的例子，储蓄账户和活期账户可能位于不同的数据库中。这时，您就需要跨多个资源或分布在网络上的资源进行事务管理。这种企业级事务需要涉及 XA 和 Java
    事务服务 (JTS) 的特殊协调。


    图 9-2 展示了一个跨多个资源使用事务划分的应用程序。这意味着，在同一个工作单元中，应用程序可以（例如）将数据持久化到数据库并发送一条 JMS 消息。


    **图 9-2.** *涉及两个资源的 XA 事务*


    为了在多个资源之间实现可靠的事务，事务管理器需要使用 XA 资源管理器接口。XA 是由开放集团 ([`www.opengroup.org`](http://www.opengroup.org))
    为分布式事务处理 (DTP) 制定的标准，它维护了 ACID 属性。该标准受 JTA 支持，并允许来自不同供应商的异构资源管理器通过一个通用接口进行互操作。XA
    使用两阶段提交 (2pc) 来确保所有资源同时提交或回滚任何特定事务。


    在我们的资金转账示例中，假设储蓄账户在第一个数据库中被扣款，并且事务成功提交。然后，活期账户在第二个数据库中被贷记，但事务失败了。这时，我们必须回到第一个数据库并撤销已提交的更改。为了避免这种数据不一致的问题，两阶段提交在最终提交之前执行一个额外的准备步骤，如图
    9-3 所示。


    ![Image 79](img/index-273_1.jpg)


    ![Image 80](img/index-273_2.jpg)


    第 9 章 ■ 事务与安全


    **243**


    在第一阶段，每个资源管理器都会通过一个“准备”命令被通知即将发出提交指令。这使得资源管理器能够声明它们是否可以应用其更改。如果它们都表示已准备好，则允许事务继续进行，并在第二阶段要求所有资源管理器进行提交。


    **图 9-3.** *两阶段提交*


    大多数情况下，资源分布在网络上（见图 9-4）。这样的系统依赖于 JTS。JTS 实现了对象管理组织 (OMG) 的对象事务服务 (OTS) 规范，允许事务管理器通过
    Internet Inter-ORB 协议 (IIOP) 参与分布式事务。JTS 旨在为提供事务系统基础设施的供应商使用。作为 EJB 开发者，您无需担心这一点；只需使用
    JTA 即可，它在更高层次上与 JTS 交互。


    **图 9-4.** *一个分布式 XA 事务*


    **EJB 中的事务支持**


    当您使用 EJB 开发业务逻辑时，无需担心事务管理器或资源管理器的内部结构，因为 JTA 抽象了底层的大部分复杂性。使用 EJB，您可以非常轻松地开发事务性应用程序，


    **244**


    第 9 章 ■ 事务与安全


    将底层事务协议（如两阶段提交或事务上下文传播）的实现留给容器处理。EJB 容器是一个事务管理器，它支持 JTA 和 JTS，以便参与涉及其他 EJB 容器的分布式事务。在典型的
    Java EE 应用程序中，会话 Bean 建立事务的边界，调用实体与数据库交互，或在事务上下文中发送 JMS 消息。


    从诞生之初，EJB 模型就被设计用于管理事务。事实上，事务对于 EJB 来说是自然而然的，默认情况下每个方法都会被自动包装在一个事务中。这种默认行为被称为容器管理事务
    (CMT)，因为事务由 EJB 容器管理（也称为声明式事务划分）。您也可以选择使用 BMT（也称为编程式事务划分）自行管理事务。事务划分决定了事务的起始和结束位置。


    **容器管理的事务**


    当以声明方式管理事务时，您将划分策略委托给容器。您无需在代码中显式使用 JTA（即使底层使用了 JTA）；您可以基于元数据让容器通过自动开始和提交事务来划定事务边界。EJB
    容器为会话 Bean 和 MDB（更多关于 MDB 的信息请参见第 13 章）提供事务管理服务。'
- fmt: "# Chapter 9: Transactions and Security\n\nIn Chapter 7, you saw several examples\
    \ of session beans, annotations, and interfaces, but never anything specific to\
    \ transactions. Listing 9-1 shows the code of a stateless session bean using CMT.\
    \ As you can see, there is no extra annotation added nor special interface to\
    \ implement. EJBs are by nature transactional. With configuration by exception,\
    \ all the transaction management defaults are applied (`REQUIRED` is the default\
    \ transaction attribute as explained later in this section).\n\n**Listing 9-1.**\
    \ *A Stateless Bean with CMT*\n\n```java\n@Stateless\npublic class ItemEJB {\n\
    \n    @PersistenceContext(unitName = \"chapter09PU\")\n    private EntityManager\
    \ em;\n\n    @EJB\n    private InventoryEJB inventory;\n\n    public List<Book>\
    \ findBooks() {\n        Query query = em.createNamedQuery(\"findAllBooks\");\n\
    \        return query.getResultList();\n    }\n\n    public Book createBook(Book\
    \ book) {\n        em.persist(book);\n        inventory.addItem(book);\n     \
    \   return book;\n    }\n}\n```\n\n![Image 81](index-275_1.jpg)\n\nYou might ask\
    \ what makes the code in Listing 9-1 transactional. The answer is the container.\
    \ Figure 9-5 shows what happens when a client invokes the `createBook()` method.\
    \ The client call is intercepted by the container, which checks immediately before\
    \ invoking the method whether a transaction context is associated with the call.\
    \ By default, if no transaction context is available, the container begins a new\
    \ transaction before entering the method and then invokes the `createBook()` method.\
    \ Once the method exits, the container automatically commits the transaction or\
    \ rolls it back (if a particular type of exception is thrown, as you’ll see later\
    \ in the “Exception Handling” section).\n\n**Figure 9-5.** *The container handles\
    \ the transaction.*\n\nIt’s interesting to note in Listing 9-1 and Figure 9-5\
    \ that a business method of a bean (`ItemEJB.createBook()`) can be a client of\
    \ a business method of another bean (`InventoryEJB.addItem()`). The default behavior\
    \ is that whatever transaction context is used for `createBook()` (from the client\
    \ or created by the container) is applied to `addItem()`. The final commit happens\
    \ if both methods have returned successfully. This behavior can be changed using\
    \ metadata (annotation or XML deployment descriptor). Depending on the transaction\
    \ attribute you choose (`REQUIRED`, `REQUIRES_NEW`, `SUPPORTS`, `MANDATORY`, `NOT_SUPPORTED`,\
    \ or `NEVER`), you can affect the way the container demarcates transactions: the\
    \ container uses the client’s transaction, runs the method in a new transaction,\
    \ runs the method with no transaction, or throws an exception. Table 9-3 defines\
    \ the transaction attributes.\n\n**Table 9-3.** *CMT Attributes*\n\n| Attribute\
    \ | Description |\n|-----------|-------------|\n| `REQUIRED` | This attribute,\
    \ the default value, means that a method must always be invoked within a transaction.\
    \ The container creates a new transaction if the method is invoked from a nontransactional\
    \ client. If the client has a transaction context, the business method runs within\
    \ the client’s transaction. You should use `REQUIRED` if you modify any data and\
    \ you don’t know whether the client has started a transaction or not. |\n| `REQUIRES_NEW`\
    \ | The container always creates a new transaction before executing a method,\
    \ regardless of whether the client is executed within a transaction. If the client\
    \ is running within a transaction, the container suspends that transaction temporarily,\
    \ creates a second one, commits it, and then resumes the first transaction. This\
    \ means that the success or failure of the second transaction has no effect on\
    \ the existing client transaction. You should use `REQUIRES_NEW` when you don’t\
    \ want a rollback to affect the client. |\n| `SUPPORTS` | The EJB method inherits\
    \ the client’s transaction context. If a transaction context is available, it\
    \ is used by the method; if not, the container invokes the method with no transaction\
    \ context. You should use `SUPPORTS` when you have read-only access to the database\
    \ table. |\n| `MANDATORY` | *Continued* |\n\n![Image 82](index-276_1.jpg)"
