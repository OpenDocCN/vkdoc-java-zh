    **图 3-25.** *具有不同鉴别器名称和值的 ITEM 表*


    单表策略是默认策略，最容易理解，并且在层次结构相对简单且稳定时效果良好。然而，它也有一些缺点：向层次结构中添加新实体，或向现有实体添加属性，都需要向表中添加新列、迁移数据并更改索引。这种策略还要求子实体的列可为空。如果
    Book 实体的 ISBN 恰好是非空的，那么你就无法再插入 CD，因为 CD 实体没有 ISBN。


    **联合策略**


    在联合策略中，层次结构中的每个实体都映射到自己的表。根实体映射到一个表，该表定义了层次结构中所有表要使用的主键，以及鉴别器列。每个子类由一个单独的表表示，该表包含其自身的属性（不从根类继承）以及一个引用根表主键的主键。非根表不包含鉴别器列。


    你可以通过使用 `@Inheritance` 注解来标注根实体，从而实现联合策略，如清单 3-64 所示（CD 和 Book 的代码保持不变，与之前相同）。


    **清单 3-64.** *采用联合策略的 Item 实体*


    @Entity


    **@Inheritance(strategy = InheritanceType.JOINED)**


    public class Item {


    @Id @GeneratedValue


    protected Long id;


    protected String title;


    ![Image 53](img/index-141_1.jpg)


