    \n图 9-8 展示了一个常见的安全场景。系统要求用户通过客户端界面（Web 或 Swing）输入其用户名和密码。系统使用 Java 认证和授权服务（JAAS）针对底层认证系统检查其凭证。如果认证成功，用户将被授予一个主体。此时，该主体与一个或多个角色关联。当用户访问一个受保护的\
    \ EJB 时，该主体被透明地传递给 EJB，EJB 使用它来确定调用者的角色是否被允许访问其正在尝试执行的方法。\n\n**图 9-8.** *使用 JAAS\
