    **Summary**


    This chapter explained the different ways of creating web pages using static languages
    such as HTML, XHTML, or CSS and dynamic ones such as JavaScript or server-side
    technologies. To create dynamic web interfaces with Java EE 6, you can choose
    from several specifications.


    JSP 2.2, EL 2.2, and JSTL 1.2 are specifications that were created with servlets
    in mind. Pages consist of HTML data and Java code compiled into servlets that
    send back a response to a given request.


    Even though JSP can serve as a JSF PDL, it is better to use Facelets to achieve
    the power of the JSF component-based architecture and rich life cycle. JSF provides
    a set of standard widgets (buttons, hyperlinks, check boxes, etc.) and a new model
    for creating your own


    widgets (composite components). JSF 2.0 also provides a new resource-handling
    mechanism, allowing you to easily version and localize you external resources.


    JSF 2.0 uses a rich UI component architecture, and its components can be converted
    and


    validated, and can interact with managed beans. This will be the topic of the
    next chapter.


