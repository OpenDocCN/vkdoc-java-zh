- fmt: '# Java EE 6 at a Glance


    Java EE 6 is an important milestone. Not only does it follow the steps of Java
    EE 5 by focusing on an easier development model, it also adds new specifications
    and brings profiles and pruning to make it lighter. The release of Java EE 6 coincides
    closely with the tenth anniversary of the enterprise platform. It combines the
    advantages of the Java language with experience gained over the last ten years.
    Moreover, it profits from the dynamism of open source communities as well as the
    rigor of the JCP. Today Java EE is a well-documented platform with experienced
    developers, a large community, and many deployed applications running on companies’
    servers. Java EE is a suite of APIs to build standard component-based multitier
    applications. These components are deployed in different containers offering a
    series of services.


    ## A Bit of History


    Ten years is a good time to look back at the evolution of Java EE (see Figure
    1-1), which was formerly called J2EE. J2EE 1.2, first developed by Sun, was released
    in 1999 as an umbrella specification containing ten Java Specification Requests
    (JSRs). At that time people were talking about CORBA, so J2EE 1.2 was created
    with distributed systems in mind. Enterprise Java Beans (EJBs) were introduced
    with support for remote stateful and stateless service objects, and optional support
    for persistent objects (entity beans). They were built on a transactional and
    distributed component model using RMI-IIOP (Remote Method Invocation–Internet
    Inter-ORB Protocol) as the underlying protocol. The web tier had servlets and
    JavaServer Pages (JSPs), and JMS was used for sending messages.


    **Figure 1-1.** *History of J2EE/Java EE*


    > **Note:** CORBA originated about 1988 precisely because enterprise systems were
    beginning to be distributed (e.g., Tuxedo, CICS). EJBs and then J2EE followed
    on with the same assumptions, but ten years after. By the time J2EE was begun,
    CORBA was fully baked and industrial strength, but companies started having all-Java
    solutions. CORBA’s language-neutral approach became redundant.


    Starting with J2EE 1.3, the specification was developed by the Java Community
    Process (JCP) under JSR 58. Support for entity beans was made mandatory, and EJBs
    introduced XML deployment descriptors to store metadata (which was serialized
    in a file in EJB 1.0). This version addressed the overhead of passing arguments
    by value with remote interfaces, by introducing local interfaces and passing arguments
    by reference. J2EE Connector Architecture (JCA) was introduced to connect Java
    EE to EIS.


    > **Note:** The JCP is an open organization, created in 1998, that is involved
    in the definition of future versions and features of the Java platform. When the
    need for a new component or API is identified, the initiator (a.k.a. specification
    lead) creates a JSR and forms a group of experts. This group, made of companies’
    representatives, organizations, or private individuals, is responsible for the
    development of the JSR and has to deliver 1) a specification that explains the
    details and defines the fundamentals of the JSR, 2) a Reference Implementation
    (RI), which is an actual implementation of the specification, and 3) a Compatibility
    Test Kit (a.k.a. Technology Compatibility Kit, or TCK), which is a set of tests
    every implementation needs to pass before claiming to conform to the specification.
    Once approved by the Executive Committee (EC), the specification is released to
    the community for implementation. Java EE is called an Umbrella JSR, or a Platform
    Edition Specification (such as Profiles), because it ties together other JSRs.


    J2EE 1.4 (JSR 151) included 20 specifications in 2003 and added support for web
    services. EJB 2.1 allowed session beans to be invoked over SOAP/HTTP. A timer
    service was created to allow EJBs to be invoked at designated times or intervals.
    This version provided better support for application assembly and deployment.


    Although its supporters predicted a great future for it, not all of J2EE’s promise
    materialized. The systems created with it were too complicated, and development
    time was frequently out of all proportion to the complexity of the user’s requirements.
    J2EE was seen as a heavyweight component model: difficult to test, difficult to
    deploy, difficult to run. That’s when frameworks such as Struts, Spring, or Hibernate
    emerged and showed a new way of developing enterprise application. Fortunately,
    in the second quarter of 2006, Java EE 5 (JSR 244) was released and turned out
    to be a remarkable improvement. It took some inspiration from open source frameworks
    by bringing back a plain old java object (POJO) programming model. Metadata could
    be defined with annotations, and XML descriptors became optional. From a developer’s
    point of view, EJB 3 and the new JPA were more of a quantum leap than an evolution
    of the platform. JavaServer Faces (JSF) was introduced as the standard presentation
    tier framework, and JAX-WS 2.0 replaced JAX-RPC as the SOAP web services API.


    Today, Java EE 6 (JSR 316) follows the path of ease of development by embracing
    the concepts of annotations, POJO programming, and the configuration-by-exception
    mechanism throughout the platform, including the web tier. It comes with a rich
    set of innovations such as the brand-new JAX-RS 1.1, it simplifies mature APIs
    like EJB 3.1, and enriches others such as JPA 2.0 or the timer service. But the
    major themes for Java EE 6 are portability (through standardizing global JNDI
    naming, for example), deprecation of some specifications (via pruning), and creating
    subsets of the platform through profiles. In this book, I want to show you these
    improvements and how much easier and richer Java Enterprise Edition has become.


    ## Standards


    As you can see, Java EE is based on standards. It is an umbrella specification
    that bundles together a number of other JSRs. You might ask why standards are
    so important, as some of the most successful Java frameworks are not standardized
    (Struts, Spring, etc.). Throughout history humans have created standards to ease
    communication and exchange. Some notable examples are language, currency, time,
    navigation, measurements, tools, railways, electricity, telegraphs, telephones,
    protocols, and programming languages.


    In the early days of Java, if you were doing any kind of web or enterprise development,
    you were living in a proprietary world by creating your own frameworks or locking
    yourself to a proprietary commercial framework. Then came the days of open source
    frameworks, which are not always based on open standards. You can use open source
    and be locked to a single implementation, or use open source that implements standards
    and be portable. Java EE provides open standards that are implemented by several
    commercial (WebLogic, Websphere, MQSeries, etc.) or open source (GlassFish, JBoss,
    Hibernate, Open JPA, Jersey, etc.) frameworks for handling transactions, security,
    stateful components, object persistence, and so on. Today, more than ever in the
    history of Java EE, your application is deployable to any compliant application
    server with very few changes.


    ## Architecture


    Java EE is a set of specifications implemented by different containers. Containers
    are Java EE runtime environments that provide certain services to the components
    they host such as lifecycle management, dependency injection, and so on. These
    components use well-defined contracts to communicate with the Java EE infrastructure
    and with the other components. They need to be packaged in a standard way (via
    archive files) before being deployed. Java EE is a superset of the Java SE platform,
    which means Java SE APIs can be used by any Java EE components.'
