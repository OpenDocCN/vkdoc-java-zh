    # Chapter 1 ■ Java EE 6 at a Glance


    **11**


    ## What’s New in Java EE 6?


    Now that you’ve seen the internal architecture of Java EE, you might be wondering
    what the novelties are in Java EE 6. The main goal of this release is to continue
    the improved ease of development introduced with Java EE 5. In Java EE 5, EJBs,
    persistent entities, and web services were remodeled to follow a more object-oriented
    approach (Java classes implementing Java interfaces) and to use annotations as
    a new way of defining metadata (XML deployment descriptors becoming optional).
    Java EE 6 follows this path and applies the same paradigms to the web tier. Today,
    a JSF managed bean is an annotated Java class with an optional XML descriptor.


    Java EE 6 focuses also on bringing simplicity to the platform by introducing profiles,
    and pruning some outdated technologies. It adds more features to the existing
    specification (e.g., standardizing singleton session beans) while adding new ones
    (such as JAX-RS). More than before, Java EE 6 applications are portable across
    containers with standard JNDI names and a specified embedded EJB container.


    ### Lighter


    The Java EE 6 expert group had to face an interesting challenge: how to make the
    platform lighter while adding more specifications? Today an application server
    has to implement 28 specifications in order to be compliant with Java EE 6. A
    developer has to know thousands of APIs, some not even relevant anymore because
    they are being pruned. To make the platform more lightweight, the group introduced
    profiles, pruning, and EJB Lite (a subset of the full EJB features focusing on
    local interfaces, interceptors, transactions, and security only). EJB Lite is
    explained in greater detail in Chapter 6.


    ### Pruning


    Java EE was first released in 1999, and ever since new specifications have been
    added at each release (as shown previously in Figure 1-1). This became a problem
    in terms of size, implementation, and adoption. Some features were not well supported
    or not widely deployed because they were technologically outdated or other alternatives
    were made available in the meantime. So the expert group decided to propose the
    removal of some features through pruning.


    Java EE 6 has adopted the pruning process (also known as marked for deletion)
    already adopted by the Java SE group. It consists of proposing a list of features
    for possible removal in Java EE 7. Note that none of the proposed removal items
    will actually be removed during this release. Some features will be replaced by
    newer specifications (such as entity beans being replaced by JPA), and others
    will just leave the Java EE 7 umbrella and keep on evolving as individual JSRs
    (e.g., JSRs 88 and 77). But Java EE 6 still includes the following list of pruned
    features:


    - **EJB 2.x Entity Beans CMP (part of JSR 318)**: The complex and heavyweight
    persistent component model of EJB 2.x entity beans has been replaced by JPA.

    - **JAX-RPC (JSR 101)**: This was the first attempt to model SOAP web services
    as RPC calls. It has now been replaced by the much easier to use and robust JAX-WS.


    ![Image 10](index-42_1.jpg)


    **12**


    - **JAXR (JSR 93)**: JAXR is the API dedicated to communicating with UDDI registries.
    Because UDDI is not widely used, JAXR would leave Java EE and evolve as a separate
    JSR.

    - **Java EE Application Deployment (JSR 88)**: JSR 88 is a specification that
    tool developers can use for deployment across application servers. This API hasn’t
    gained much vendor support, so it would leave Java EE and evolve as a separate
    JSR.

    - **Java EE Management (JSR 77)**: Similar to JSR 88, JSR 77 was an attempt at
    creating application server management tools that work across servers.


