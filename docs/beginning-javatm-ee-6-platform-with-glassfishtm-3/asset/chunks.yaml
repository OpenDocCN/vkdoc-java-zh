    在本章前面的“复合主键”部分，你已快速了解到如何使用 `@EmbeddedId` 注解将一个类嵌入并用作主键。可嵌入对象（Embeddables）是自身没有持久化标识的对象；它们只能嵌入到所属实体中。所属实体可以拥有可嵌入对象的集合，也可以拥有单个可嵌入属性。它们作为所属实体的固有部分进行存储，并共享该实体的标识。这意味着嵌入对象的每个属性都映射到实体的表中。这是一种严格的所有权关系（即组合关系），因此如果实体被移除，嵌入对象也会被移除。


    这种两个类之间的组合关系使用注解来实现。被包含的类使用 `@Embeddable` 注解，而包含该类的实体则使用 `@Embedded` 注解。我们以客户为例，客户拥有标识符、姓名、电子邮件地址和地址。


    所有这些属性都可以放在一个 Customer 实体中（参见本章稍后的清单 3-34），但出于对象建模的原因，它们被拆分为两个类：Customer 和 Address。由于
    Address 没有自己的标识，仅仅是 Customer 状态的一部分，因此它更适合作为可嵌入对象，而不是实体（参见清单 3-33）。


    **清单 3-33.** *Address 类是一个可嵌入对象*


    **@Embeddable**


    public class Address {


    private String street1;


    private String street2;


    private String city;


    private String state;


    private String zipcode;


    private String country;


    // 构造方法、getter、setter


    }


    第 3 章 ■ 对象关系映射


    **85**


    如清单 3-33 所示，Address 类没有被注解为实体，而是被注解为可嵌入对象。`@Embeddable` 注解指定了 Address 可以嵌入到另一个实体类（或另一个可嵌入对象）中。在组合关系的另一端，Customer
    实体必须使用 `@Embedded` 注解来指定 Address 是一个持久化属性，它将作为固有部分存储并共享其标识（参见清单 3-34）。


    **清单 3-34.** *嵌入 Address 的 Customer 实体*


    @Entity


    public class Customer {


    @Id @GeneratedValue


    private Long id;


    private String firstName;


    private String lastName;


    private String email;


    private String phoneNumber;


    **@Embedded**


    private Address address;


    // 构造方法、getter、setter


    }


    Address 的每个属性都映射到所属实体 Customer 的表中。只会有一个表，其结构如清单 3-35 所示。正如你将在后面的“复合主键”部分看到的，实体可以覆盖可嵌入对象的属性（使用
    `@AttributeOverrides` 注解）。


    **清单 3-35.** *包含所有 Address 属性的 CUSTOMER 表结构* create table CUSTOMER (


    ID BIGINT not null,


    LASTNAME VARCHAR(255),


    PHONENUMBER VARCHAR(255),


    EMAIL VARCHAR(255),


    FIRSTNAME VARCHAR(255),


    **STREET2 VARCHAR(255),**


    **STREET1 VARCHAR(255),**


    **ZIPCODE VARCHAR(255),**


    **STATE VARCHAR(255),**


    **COUNTRY VARCHAR(255),**


    **CITY VARCHAR(255),**


    primary key (ID)


    );


    **86**


    第 3 章 ■ 对象关系映射


    **可嵌入类的访问类型**


    可嵌入类的访问类型由其所在实体类的访问类型决定。如果实体显式使用了属性访问类型，那么可嵌入对象也将隐式使用属性访问。可以通过 `@Access` 注解为可嵌入类指定不同的访问类型。


    Customer 实体（参见清单 3-36）和 Address 实体（参见清单 3-37）使用了不同的访问类型。


    **清单 3-36.** *使用字段访问类型的 Customer 实体*


    @Entity


    **@Access(AccessType.FIELD)**


    public class Customer {


    @Id @GeneratedValue


    private Long id;


    @Column(name = "first_name", nullable = false, length = 50)


    private String firstName;


    @Column(name = "last_name", nullable = false, length = 50)


    private String lastName;


    private String email;


    @Column(name = "phone_number", length = 15)


    private String phoneNumber;

