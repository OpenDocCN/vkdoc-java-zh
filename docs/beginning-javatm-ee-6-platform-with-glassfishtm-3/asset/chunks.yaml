    \ />\n\n当客户端发起 Ajax 请求时，服务器端的页面生命周期保持不变（它经历相同的六个阶段）。关键优势在于，响应只是返回一小块数据，而不是向浏览器返回一个大型\
    \ HTML 页面。*应用请求*阶段确定当前请求是否为“部分请求”，并且 `PartialViewContext` 对象在整个页面生命周期中使用。它包含与部分请求处理和部分响应渲染相关的方法和属性。在生命周期结束时，Ajax\
