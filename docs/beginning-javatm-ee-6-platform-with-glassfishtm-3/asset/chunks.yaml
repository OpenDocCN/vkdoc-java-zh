  trans: '

    对于单例会话 Bean，其创建方式取决于是否被急切实例化（`@Startup`），或者是否依赖于另一个已被急切创建的单例 Bean（`@DependsOn`）。如果是，则会在部署时创建实例；如果不是，则容器会在客户端调用业务方法时创建实例。由于单例
    Bean 在应用程序运行期间持续存在，因此当容器关闭时，其实例会被销毁。


    **有状态**


    有状态会话 Bean 在编程上与无状态或单例会话 Bean 差别不大：仅元数据不同（使用`@Stateful`而非`@Stateless`或`@Singleton`）。但真正的区别在于，有状态
    Bean 会与其客户端维护会话状态，因此其生命周期略有不同。容器会生成一个实例，并将其仅分配给一个客户端。随后，该客户端的每个请求都会被传递到同一个实例。遵循这一原则，根据你的应用程序，客户端与有状态
    Bean 之间可能会形成一对一的关系（例如，一千个并发用户可能会产生一千个有状态 Bean）。如果某个客户端长时间未调用其 Bean 实例，容器必须在 JVM
    内存耗尽前清除该实例，将实例状态保存到持久化存储中，并在需要时将其连同状态一起恢复。容器采用了钝化和激活技术。


    如第 7 章所述，钝化是指容器将 Bean 实例序列化到持久化存储介质（磁盘文件、数据库等）中，而非将其保留在内存中。激活则相反，当客户端再次需要该 Bean
    实例时执行。容器从持久化存储中反序列化 Bean，并将其激活回内存。这意味着 Bean 的属性必须是可序列化的（必须是 Java 基本类型或实现`java.io.Serializable`接口）。有状态
    Bean 的生命周期如图 8-2 所示，描述如下：


    ****1.** 有状态 Bean 的生命周期始于客户端请求对该 Bean 的引用（通过依赖注入或 JNDI 查找）。容器创建一个新的会话 Bean 实例并将其存储在内存中。


    ****2.** 如果新创建的实例通过注解（`@Resource`、`@EJB`、`@PersistenceContext`等）或部署描述符使用依赖注入，容器会注入所有必需的资源。


    ****3.** 如果实例有一个用`@PostConstruct`注解的方法，容器会调用它。


    ****4.** Bean 执行请求的调用并保留在内存中，等待后续客户端请求。


    ****5.** 如果客户端在一段时间内保持空闲，容器会调用带有`@PrePassivate`注解的方法（如果有），并将 Bean 实例钝化到持久化存储中。


    ****6.** 如果客户端调用了一个已钝化的 Bean，容器会将其激活回内存，并调用带有`@PostActivate`注解的方法（如果有）。


    ****7.** 如果客户端在会话超时时间内未调用已钝化的 Bean 实例，该实例将被容器销毁。


    ****8.** 作为步骤 7 的替代方案，如果客户端调用了一个带有`@Remove`注解的方法，容器会调用带有`@PreDestroy`注解的方法（如果有），并结束该
    Bean 实例的生命周期。


    ![Image 73](img/index-256_1.jpg)


    **226**


    第 8 章 ■ 回调和拦截器


    **图 8-2.** *有状态 Bean 生命周期*


    在某些情况下，有状态 Bean 包含开放资源，例如网络套接字或数据库连接。由于容器无法为每个 Bean 保持这些资源开放，你需要在钝化前后关闭并重新打开资源。这正是生命周期回调方法可以发挥作用的地方。


    **回调**

