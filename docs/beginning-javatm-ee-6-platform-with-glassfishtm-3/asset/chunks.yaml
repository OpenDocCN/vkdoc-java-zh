    **Publish-Subscribe**


    In the pub-sub model, a single message is sent by a single producer to potentially
    several consumers. The model is built around the concept of topics, publishers,
    and subscribers (Figure 13-5). Consumers are called *subscribers* because they
    first need to subscribe to a topic.


    The provider manages the subscribing/unsubscribing mechanism as it occurs dynamically.


    **Figure 13-5.** *Pub-sub model*


    The topic retains messages until they are distributed to all subscribers. Unlike
    the P2P


    model, there is a timing dependency between publishers and subscribers; subscribers
    do not receive messages sent prior to their subscription, and if the subscriber
    is inactive for a specified period, it will not receive past messages when it
    becomes active again. Note that this can be avoided, because the JMS API supports
    the concept of a durable subscriber, as you’ll later see.


    Multiple subscribers can consume the same message. The pub-sub model can be used
    for


    broadcast-type applications, in which a single message is delivered to several
    consumers. In Figure 13-6, the publisher sends three messages that each subscriber
    will receive.


