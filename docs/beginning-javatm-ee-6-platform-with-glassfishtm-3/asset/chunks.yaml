    ## DOM


    An XHTML page is an XML document and thus has a Document Object Model (DOM) representation.
    DOM is a W3C specification for accessing and modifying the content and structure
    of XML documents as well as an abstract API for querying, traversing, and manipulating
    such documents. DOM can be thought of as a tree representation of the structure
    of a document.


    Figure 11-3 shows how the `newBook.xhtml` page might look as a DOM representation;
    at the root there’s the `html` tag, at the same level, `head` and `body`, and
    under `body` a table with a list of `tr` tags.


    **Figure 11-3.** *Tree representation of the `newBook.xhtml` page*


    DOM provides a standard way to interact with XML documents. You can traverse the
    tree and edit the content of a node (a leaf of the tree). With some JavaScript,
    you can introduce dynamism into your web pages. As you will see in the next chapter,
    Ajax is based on JavaScript interacting with the DOM representation of a web page.


    ## JavaScript'
