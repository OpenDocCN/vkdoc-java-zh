    **JSF 2.0**


    JSF 是由 Java 社区流程（JCP）发布的一项规范，于 2001 年以 JSR 127 之名创建。2004 年发布了 1.1 维护版本。直到 2006
    年，JSF 1.2 才作为 JSR 252（随 Java EE 5 一同发布）被引入 Java EE。该版本面临的最大挑战是既要保持向后兼容性，又要将 JSP
    与统一的 EL 集成。尽管付出了这些努力，JSF 和 JSP 的配合仍不理想，因此引入了 Facelets 等其他框架作为 JSP 的替代方案。


    JSF 2.0 是 JSR 314 演进过程中的一个主要版本，也是 Java EE 6 中 Web 开发的首选（JSP 在 Java EE 6 中仍被保留，但未进行重大改进）。JSF
    2.0 的灵感来源于许多开源 Web 框架，如今带来了许多新特性。


    **268**


    第 10 章 ■ JavaServer Faces


    **JSF 2.0 的新特性**


    凭借众多新特性，JSF 2.0 是从 1.2 版本的演进，但也是一次进步——例如，在 PDL 方面，Facelets 比 JSP 更受青睐。JSF 2.0
    的新特性包括以下内容：


    • 一种基于 Facelets 的替代 JSP 的视图技术


    • 一种新的资源处理机制（用于图像、CSS、JavaScript 文件等）


    • 额外的作用域（视图作用域和组件作用域）


    • 通过注解轻松开发托管 Bean、渲染器、转换器、验证器等


    • 通过利用注解和异常配置减少 XML 配置（faces-config.xml 为可选）


    • Ajax 支持


    • 易于组件开发


    **参考实现**


    Mojarra，以南美和加勒比海岸发现的一种鱼命名，是 JSF 2.0 的开源参考实现。Mojarra 可在 GlassFish V3 更新中心获取，允许开发调用
    EJB 3.1 业务层和 JPA 2.0 持久层的 JSF 2.0 Web 应用程序。它将在接下来的示例中使用。


    **整合所有内容**


    利用这些信息，你可以编写一个由两个网页组成的小型 Web 应用程序：一个显示表单，用于创建书籍（newBook.xhtml），另一个列出数据库中所有可用的书籍（listBooks.xhtml）。这两个页面使用
    BookController 托管 Bean 来存储必要的属性并进行导航。通过使用 JPA 进行持久化和 EJB 处理业务逻辑，所有内容都可以整合在一起。托管
    Bean 将所有业务逻辑委托给 BookEJB，后者包含两个方法：一个用于将书籍持久化到数据库（createBook()），另一个用于检索书籍（findBooks()）。这个无状态会话
    Bean 使用 EntityManager API 来操作 Book 实体。导航非常简单：一旦创建了书籍，就会显示列表。列表页面上有一个链接，允许你返回 newBook.xhtml
    页面并创建另一本书。


    图 10-2 显示了此 Web 应用程序中的交互组件。它们被打包在一个 war 文件中，部署在正在运行的 GlassFish 实例和实时 Derby 数据库中。


    ![Image 86](img/index-299_1.jpg)


    第 10 章 ■ JavaServer Faces


    **269**


    **图 10-2.** *Web 应用程序中涉及的页面和类*


    此 Web 应用程序遵循 Maven 目录结构，因此类、文件和网页必须放置在以下目录中：


    • src/main/java：包含 Book 实体、BookEJB 和 BookController 托管 Bean


    • src/main/resources：包含用于在数据库中映射实体的 persistence.xml 文件


    • src/webapp：包含两个网页 newBook.xhtml 和 listBooks.xhtml


    • src/webapp/WEB-INF：包含用于声明 FacesServlet 的 web.xml 文件


    • pom.xml：表示描述项目、其依赖项和插件的 Maven 项目对象模型（POM）


    **编写 Book 实体**


    关于清单 10-3，我不会深入太多细节，因为你现在应该已经理解 Book 实体的代码了。除了映射注解之外，请注意名为 findAllBooks 的命名查询，它从数据库中检索书籍。


    **清单 10-3.** *带有命名查询的 Book 实体*


    **@Entity**

