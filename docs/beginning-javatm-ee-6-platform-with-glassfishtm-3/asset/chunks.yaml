    测试方法


    在 JUnit 4 中，测试类无需继承任何类。要作为测试用例执行，JUnit 类至少需要一个使用 `@Test` 注解的方法。如果你编写的类没有至少一个 `@Test`
    方法，尝试执行时会收到错误（`java.lang.Exception: No runnable methods`）。


    测试方法必须使用 `@Test` 注解，返回 `void`，并且不接受任何参数。这在运行时进行检查，如果不满足条件则会抛出异常。`@Test` 注解支持可选的
    `expected` 参数，用于声明测试方法应抛出某个异常。如果未抛出异常，或抛出的异常与声明的不同，则测试失败。在此示例中，尝试计算一个空客户对象的年龄应抛出
    `NullPointerException`。


    在清单 1-9 中，`nextBirthDay()` 方法尚未实现。然而，你并不希望测试失败；你只想忽略它。你可以在 `@Test` 之前或之后添加 `@Ignore`
    注解。测试运行器会报告被忽略的测试数量，以及成功和失败的测试数量。


