    ```

    asadmin start-domain domain1

    ```


    **Figure 1-18.** *Starting GlassFish*


    You can then go to the admin console (shown earlier in Figure 1-16) [at `http://localhost:4848`](http://localhost:4848)
    or to the default web server at [`http://localhost:8080`](http://localhost:8080).


    **Tip** If you only have one domain, you can omit the default domain name and
    start GlassFish with only `asadmin start-domain`. If you’d like to have the log
    file appear inline rather than checking the content of the dedicated log file
    (`domains/domain1/logs/server.log`), you can use `asadmin start-domain --verbose`.


    Chapter 1 ■ Java EE 6 at a Glance


    **39**


    There are many more things that GlassFish has to offer; I’ll show you some of
    them in this book, but I’ll leave it to you to explore its support for dynamic
    languages (JRuby on Rails, Groovy and Grails, etc.), diagnostic services, management
    rules, system properties, monitoring, call flow, and the various security configurations.


    ## Summary


    When a company develops a Java application and needs to add enterprise features
    such as transaction management, security, concurrency, or messaging, Java EE is
    an attractive choice.


    It is standard, components are deployed to different containers, which gives you
    many services, and it works with various protocols. Java EE 6 follows the path
    of its previous version by adding ease of use to the web tier. This version of
    the platform is lighter (thanks to pruning, profiles, and EJB Lite), easier to
    use (no need for interfaces on EJBs or annotations on the web tier), richer (it
    includes new specifications and new features), and more portable (it includes
    standardized embedded EJB container and allows for JNDI names).


    In the second part of this chapter, I concentrated in setting up the development
    environment. The book has several snippets of code and “Putting It All Together”
    sections. You need several tools and frameworks to compile, deploy, run, and test
    the code: JDK 1.6, Maven 2, JUnit 4, Derby 10.4, and GlassFish v3.


    In this chapter, I gave you a very quick overview of Java EE 6. The remaining
    chapters will be dedicated to a closer study of the Java EE 6 specifications.


    # Chapter 2


    ## Java Persistence


    Applications are made up of business logic, interaction with other systems, user
    interfaces... and persistence. Most of the data that our applications manipulate
    has to be stored in databases, retrieved, and analyzed. Databases are important:
    they store business data, act as a central point between applications, and process
    data through triggers or stored procedures.


    Persistent data is everywhere, and most of the time it uses relational databases
