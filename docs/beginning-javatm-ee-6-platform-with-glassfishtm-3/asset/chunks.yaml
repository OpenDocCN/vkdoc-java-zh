    ## Connection


    The `javax.jms.Connection` object, which you create using the `createConnection()`
    method of the connection factory, encapsulates a connection to the JMS provider.
    Connections are thread-safe and designed to be shareable, as opening a new connection
    is resource intensive. However, a session (`javax.jms.Session`) provides a single-threaded
    context for sending and receiving messages, using a connection to create one or
    more sessions.


    Like connection factories, connections come in three forms: the generic `Connection`
    interface, the `QueueConnection` interface, and the `TopicConnection` interface
    that extends it. Depending on the connection factory object that you have, you
    can use it to create a connection:


    ```java

    Connection connection = connFactory.createConnection();

    QueueConnection connection = queueConnFactory.createQueueConnection();

    TopicConnection connection = topicConnFactory.createTopicConnection();

    ```


    In Listing 13-4, before the receiver can consume messages, it must call the `start()`
    method. If you need to stop receiving messages temporarily without closing the
    connection, you can call the `stop()` method.


    ```java

    connection.start();

    connection.stop();

    ```


    When the application completes, you need to close any connections created. Closing
    a connection also closes its sessions and its producers or consumers.


    ```java

    connection.close();

    ```


    ## Session


    You create a session from the connection using the `createSession()` method. A
    session provides a transactional context in which a set of messages to be sent
    or received is grouped in an atomic unit of work, meaning that if you send several
    messages during the same session, JMS will ensure that they either all arrive
    in the order they’ve been sent at the destination or none at all. This behavior
    is set at the creation of the session:


    ```java

    Session session = connection.createSession(true, Session.AUTO_ACKNOWLEDGE);

    ```


    The first parameter of the method specifies whether or not the session is transactional.
