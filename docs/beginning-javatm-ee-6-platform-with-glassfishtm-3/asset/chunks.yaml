- fmt: '# 静态网页的内容与视觉呈现


    为了增加交互性并动态改变网页的部分内容，你可以使用在浏览器中运行的 JavaScript 函数。


    但在大多数情况下，你需要调用 EJB 的业务层来显示数据库中的数据。这种动态内容可以通过 JSP（或 JSF 结合 JSP 或 Facelets，稍后会看到）来获取。


    JSP 于 1999 年作为 J2EE 1.2 的一部分引入，允许开发人员根据客户端请求动态生成网页。页面在服务器端处理并编译为 Servlet。JSP 看起来像
    HTML 或 XHTML 页面，但具有特殊的标签来执行服务器端处理、显示值以及调用服务器端 Java 代码。


    JSP 的大部分功能都基于 Servlet API。Servlet 的开发是为了扩展服务器的能力，以接受来自客户端的 HTTP 请求并创建对这些请求的动态响应。Servlet
    可以使用任何服务器端资源，例如 EJB、数据库、Web 服务和其他组件，JSP 也可以。JSP 是动态的，因为它们执行 Java 代码来根据请求定制响应。


    JSP 在服务器上的 Servlet 容器中运行，并响应来自客户端（用户）的请求，这些用户通过 HTTP（浏览器用于从 Web 服务器获取 XHTML 页面的相同协议）访问
    Web 应用程序。Servlet 容器通过以下方式管理 JSP 的生命周期：


    - 将 JSP 代码编译为 Servlet

    - 加载并初始化 JSP

    - 处理客户端请求并将其分派给 JSP

    - 向客户端返回响应（响应仅由要在浏览器中显示的 HTML 或 XHTML 标签组成）

    - 卸载 JSP 并停止向 JSP 发送请求（例如，当服务器关闭时）


    HTML 和 XHTML 页面之间的区别在于后者严格遵守 XML 规则。类似地，JSP 可以生成 HTML 或严格的 XHTML（例如，对于严格的 XML
    格式，你可以使用不同的文件扩展名 `.jsp` 和 `.jspx`）。现在你已经了解了 JSP 的工作原理，让我们看一些代码。


    ```html

    <html>

    <head><title>Lists all the books</title></head>

    <body>

    <h1>Lists all the books</h1>

    <hr/>

    </body>

    </html>

    ```


    如你所见，一个有效的 JSP 可以仅由 HTML 标签组成。你可以将此代码保存到 `listBooks.jsp` 页面中，并将其部署到 Servlet 容器中，该容器将返回一个简单的
    HTML 页面。关键在于，JSP 看起来像 HTML，但具有一些额外的标签，允许你添加动态内容，以便对客户端的响应根据请求而变化。JSP 规范定义了以下元素：


    - 指令元素

    - 脚本元素

    - 动作元素


    正如你将看到的，对于所有这些元素，JSP 规范定义了两种语法：用于 XHTML 页面的 XML 语法（例如，`<jsp:directive attributes/>`）和不符合
    XML 规范的 JSP 语法（例如，`<%@ attributes %>`）。


    ## 指令元素


    指令元素提供有关 JSP 的信息，并且不产生任何输出。有三种指令：`page`、`include` 和 `taglib`。指令有两种语法形式：


    ```

    <%@ directive attributes %>

    <jsp:directive attributes />

    ```


    `page` 指令用于指定页面属性，例如页面中使用的编程语言（此处为 Java）、MIME 类型、JSP 响应的字符编码、当前 JSP 是否打算用作错误页面等。


    ```

    <%@ page contentType="text/html; ISO-8859-1" language="java" %>

    <jsp:directive.page contentType="text/html; ISO-8859-1" language="java"/>

    ```


    `include` 指令用于在当前页面中包含另一个页面（HTML、XHTML 或 JSP）。当你有一个标准页面（例如页眉或页脚）想要包含在多个 JSP 中时，可以使用此指令。


    ```

    <%@ include file="header.jsp"%>

    <jsp:directive.include file="header.jsp" />

    ```'
  raw: 'content and the visual aspect of a static web page. To add some interaction
    and to change dynamically parts of the web page, you can use JavaScript functions
    that run on the browser.


    But most of the time, you need to invoke a business layer of EJBs to display data
    from the database. This dynamic content can be obtained using JSP (or JSF with
    JSP or Facelets, as you’ll see later).


    JSP, introduced in 1999 as part of J2EE 1.2, allows developers to create dynamically
    generated web pages in response to a client request. Pages are processed on the
    server side and compiled as servlets. JSPs look like HTML or XHTML pages, but
    have special tags to perform server-side processing, display values, and invoke
    server-side Java code.


    Much of what a JSP does is based on the servlet API. Servlets were developed to
    extend


    the server’s capabilities to accept HTTP requests from clients and create dynamic
    responses to those requests. Servlets can use any server-side resources such as
    EJBs, databases, web services, and other components, as can JSPs. JSPs are dynamic
    because they execute Java code to tailor a response based on the request.


    JSPs run on a server in a servlet container and respond to requests from clients
    who are users, accessing a web application through a web browser via HTTP, the
    same protocol used by browsers to get XHTML pages from a web server. The servlet
    container manages the life cycle of a JSP by


    Chapter 11 ■ paGeS aND COMpONeNtS


    **291**


    • Compiling the JSP code into a servlet


    • Loading and initializing the JSP


    • Processing clients’ requests and dispatching them to the JSP


    • Returning responses to clients (Responses consist solely of HTML or XHTML tags
    to be displayed in a browser.)


    • Unloading the JSP and stopping sending requests to the JSP (when the server
    shuts


    down, for example)


    The difference between an HTML and XHTML page is that the latter complies strictly
    with XML rules. Similarly, JSPs can produce HTML or strict XHTML (as an example,
    you can use different file extensions, .jsp and .jspx, for strict XML format).
    So, now that you’ve seen how JSPs work, let’s look at some code.


    <html>


    <head><title>Lists all the books</title></head>


    <body>


    <h1>Lists all the books</h1>


    <hr/>


    </body>


    </html>


    As you can see, a valid JSP can be formed of only HTML tags. You could save this
    code


    into a listBooks.jsp page and deploy it into a servlet container that would return
    a simple HTML page. The point is that a JSP looks like HTML, but with some extra
    tags allowing you to add dynamic content so the response to the client changes
    depending on the request. The JSP


    specification defines the following elements:


    • Directive elements


    • Scripting elements


    • Action elements


    As you’ll see, for all these elements the JSP specification defines two syntaxes:
    the XML


    syntax to use in XHTML pages (e.g., <jsp:directive attributes/>) and the JSP syntax,
    which is not XML compliant (e.g., <%@ attributes %>).


    **Directive Elements**


    Directive elements provide information about the JSP and do not produce any output.
    There are three directives: page, include, and taglib. Directives have two syntactic
    forms:


    < **%@ directive** attributes %>


    < **jsp:directive** attributes />


    The page directive is used to specify page attributes such as the programming
    language


    used in the page (Java in this case), the MIME type, and the character encoding
    for the response of the JSP, whether the current JSP is intended to be an error
    page, and so on.


    **292**


    Chapter 11 ■ paGeS aND COMpONeNtS


    < **%@ page** contentType=" text/html; ISO-8859-1" language="java" %>


    < **jsp:directive.page** contentType="text/html; ISO-8859-1" language="java"/>
    The include directive is used to include another page (HTML, XHTML, or JSP) within
    the


    current page. You use this directive when you have a standard page (such as a
    header or a footer) you want included in multiple JSPs.


    < **%@ include** file="header.jsp"%>


    < **jsp:directive.include** file="header.jsp" />'
