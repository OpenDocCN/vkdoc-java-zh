- fmt: "现在，你只需要一个页面，顶部有一个用于输入图书数据的表单，底部有一个图书列表（见图12-8）。每次通过点击按钮创建新书时，列表都会刷新，显示新创建的图书。\n\
    \n**图12-8.** 创建和列出图书的单个页面\n\n页面顶部的表单保持不变，只有页面的列表部分需要刷新。清单12-13中的代码是页面的第一部分，代表表单。\n\
    \n首先，为了集成Ajax，页面需要使用`<h:outputScript>`标签定义`jsf.js`JavaScript库。与第10章的代码相比，实际上没有任何变化。`bookCtrl`变量引用的是`BookController`托管Bean，它负责所有业务逻辑（调用EJB来持久化和检索图书）。`Book`是实体，其属性通过表达式语言访问（`#{bookCtrl.book.isbn}`绑定到ISBN）。每个输入组件都有一个标识符（`id=\"\
    isbn\"`、`id=\"title\"`等）。这一点非常重要，因为它为每个需要与服务器异步交互的DOM节点提供了标识符。\n\n标识符在整个页面中必须是唯一的，因为应用程序必须能够将数据映射到特定的组件。\n\
    \n**清单12-13.** `newBook.xhtml`页面的表单部分\n\n```html\n<!DOCTYPE html PUBLIC \"-//W3C//DTD\
    \ XHTML 1.0 Transitional//EN\"\n \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\
    >\n<html xmlns=\"http://www.w3.org/1999/xhtml\"\n      xmlns:h=\"http://java.sun.com/jsf/core\"\
    >\n<h:head>\n    <title>Create a new book</title>\n</h:head>\n<h:body>\n    <h:outputScript\
    \ name=\"jsf.js\" library=\"javax.faces\" target=\"head\"/>\n    <h1>Create a\
    \ new book</h1>\n    <hr/>\n    <h:form id=\"form\" prependId=\"false\">\n   \
    \     <table border=\"0\">\n            <tr>\n                <td><h:outputLabel\
    \ value=\"ISBN : \"/></td>\n                <td><h:inputText id=\"isbn\" value=\"\
    #{bookCtrl.book.isbn}\"/></td>\n            </tr>\n            <tr>\n        \
    \        <td><h:outputLabel value=\"Title :\"/></td>\n                <td><h:inputText\
    \ id=\"title\" value=\"#{bookCtrl.book.title}\"/></td>\n            </tr>\n  \
    \          <tr>\n                <td><h:outputLabel value=\"Price : \"/></td>\n\
    \                <td><h:inputText id=\"price\" value=\"#{bookCtrl.book.price}\"\
    /></td>\n            </tr>\n            <tr>\n                <td><h:outputLabel\
    \ value=\"Description : \"/></td>\n                <td><h:inputTextarea id=\"\
    description\"\n                                     value=\"#{bookCtrl.book.description}\"\
    \ cols=\"20\" rows=\"5\"/></td>\n            </tr>\n            <tr>\n       \
    \         <td><h:outputLabel value=\"Number of pages : \"/></td>\n           \
    \     <td><h:inputText id=\"nbOfPage\"\n                                 value=\"\
    #{bookCtrl.book.nbOfPage}\"/></td>\n            </tr>\n            <tr>\n    \
    \            <td><h:outputLabel value=\"Illustrations : \"/></td>\n          \
    \      <td><h:selectBooleanCheckbox id=\"illustrations\"\n                   \
    \                          value=\"#{bookCtrl.book.illustrations}\"/></td>\n \
    \           </tr>\n        </table>\n        <h:commandButton id=\"submit\" value=\"\
    Create a book\"\n                         onclick=\"jsf.ajax.request(this, event,\n\
    \                         {execute:'isbn title price description nbOfPage illustrations',\n\
    \                          render:'booklist'}); return false;\"\n            \
