    **Concurrency**


    JPA can be used to change persistent data, and JPQL can be used to retrieve data
    following certain criteria, by an application running in a cluster with multiple
    nodes, multiple threads, and one single database, so it is quite common for entities
    to be accessed concurrently. When this is the case, synchronization must be controlled
    by the application using a locking mechanism.


    Whether the application is simple or complex, chances are that you will make use
    of locking somewhere in your code.


    To illustrate the problem of concurrent database access, let’s see an example
    of an application with two methods, shown in Figure 4-3\. One method finds a book
    by its identifier and raises the price of the book by $2\. The other does the
    same thing but raises the price by $5\. If these two methods are executed concurrently
    in separate transactions and manipulate the same book, you can’t predict the final
    price of the book. In this example, the initial price of the book is $10\. Depending
    on which transaction finishes last, the price can be $12 or $15.


    **Figure 4-3.** *Transactions one (tx1) and two (tx2) updating the price of a
    book concurrently* This problem of concurrency, where the “winner” is the last
    one to commit, is not specific to JPA. Databases have had to deal with this for
    a long time and have found different solutions to isolate one transaction from
    others. One common mechanism that databases use is to lock the row on which the
    SQL statement is being executed.


    There are two different locking mechanisms that JPA 2.0 uses (JPA 1.0 only had
    support for optimistic locking):


    • *Optimistic locking* is based on the assumption that most database transactions
    don’t conflict with other transactions, allowing concurrency to be as permissive
    as possible


    when allowing transactions to execute.


    • *Pessimistic locking* is based in the opposite assumption, so a lock will be
    obtained on the resource before operating on it.


