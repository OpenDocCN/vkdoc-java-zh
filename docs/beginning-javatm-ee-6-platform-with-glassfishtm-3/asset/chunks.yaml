    与清单 4-2 相比，清单 4-5 中的代码要简单得多。首先，由于实体管理器实例由容器注入，因此没有 `Persistence` 或 `EntityManagerFactory`。其次，因为无状态
    Bean 管理事务，所以没有显式的提交或回滚。这种实体管理器的风格将在第 6 章中演示。


    **持久化上下文**


    在详细探讨 EntityManager API 之前，你需要理解一个关键概念：*持久化上下文*。持久化上下文是某一时刻一组受管理的实体实例：在持久化上下文中，只能存在一个具有相同持久化标识的实体实例。例如，如果一个
    ID 为 1234 的 Book 实例存在于持久化上下文中，那么在该持久化上下文中就不能存在其他具有此 ID 的图书。只有包含在持久化上下文中的实体才受实体管理器管理，这意味着对它们的更改将反映到数据库中。


    每当调用 `javax.persistence.EntityManager` 接口的方法时，实体管理器都会更新或查询持久化上下文。例如，当调用 `persist()`
    方法时，如果作为参数传入的实体尚不存在，它将被添加到持久化上下文中。类似地，当通过主键查找实体时，实体管理器首先会检查请求的实体是否已存在于持久化上下文中。持久化上下文可以看作是一级缓存。它是一个短暂的、活跃的空间，实体管理器在将内容刷新到数据库之前，会将实体存储在其中。对象仅在事务持续期间存在于持久化上下文中。


