- fmt: "JPQL has a very rich syntax that allows you to handle entities in any form\
    \ and in a portable way across databases. JPA enables you to use specific features\
    \ of a database by using native queries. Native queries take a native SQL statement\
    \ (`SELECT`, `UPDATE`, or `DELETE`) as the parameter and return a `Query` instance\
    \ for executing that SQL statement. However, native queries are not expected to\
    \ be portable across databases.\n\nIf the code is not portable, why not use JDBC\
    \ calls? The main reason to use JPA native queries rather than JDBC calls is because\
    \ the result of the query will get automatically converted back to entities. If\
    \ you want to retrieve all the customer entities from the database using SQL,\
    \ you need to use the `EntityManager.createNativeQuery()` method that takes in\
    \ parameters the SQL query and the entity class that the result should be mapped\
    \ to.\n\n```\nQuery query = em.createNativeQuery(\"SELECT * FROM t_customer\"\
    , Customer.class);\nList<Customer> customers = query.getResultList();\n```\n\n\
    As you can see in the preceding code fragment, the SQL query is a string that\
    \ can be dynamically created at runtime (just like JPQL dynamic queries). Again,\
    \ the query could be complex, and because the persistence provider doesn’t know\
    \ in advance, it will interpret it each time. Like named queries, native queries\
    \ can use annotations to define static SQL queries. Named, native queries are\
    \ defined using the `@NamedNativeQuery` annotation, which must be placed on any\
    \ entity (see Listing 4-29). Like JPQL named queries, the name of the query must\
    \ be unique within the persistence unit.\n\n**Listing 4-29.** *The Customer Entity\
    \ Defining a Native Named Query*\n\n```\n@Entity\n@NamedNativeQuery(name = \"\
    findAll\", query=\"select * from t_customer\")\n@Table(name = \"t_customer\")\n\
    public class Customer {\n    // Attributes, constructors, getters, setters\n}\n\
    ```\n\n## Concurrency\n\nJPA can be used to change persistent data, and JPQL can\
    \ be used to retrieve data following certain criteria, by an application running\
    \ in a cluster with multiple nodes, multiple threads, and one single database,\
    \ so it is quite common for entities to be accessed concurrently. When this is\
    \ the case, synchronization must be controlled by the application using a locking\
    \ mechanism.\n\nWhether the application is simple or complex, chances are that\
    \ you will make use of locking somewhere in your code.\n\nTo illustrate the problem\
    \ of concurrent database access, let’s see an example of an application with two\
    \ methods, shown in Figure 4-3. One method finds a book by its identifier and\
    \ raises the price of the book by $2. The other does the same thing but raises\
    \ the price by $5. If these two methods are executed concurrently in separate\
    \ transactions and manipulate the same book, you can’t predict the final price\
    \ of the book. In this example, the initial price of the book is $10. Depending\
    \ on which transaction finishes last, the price can be $12 or $15.\n\n**Figure\
    \ 4-3.** *Transactions one (tx1) and two (tx2) updating the price of a book concurrently*\n\
    \nThis problem of concurrency, where the “winner” is the last one to commit, is\
    \ not specific to JPA. Databases have had to deal with this for a long time and\
    \ have found different solutions to isolate one transaction from others. One common\
    \ mechanism that databases use is to lock the row on which the SQL statement is\
    \ being executed.\n\nThere are two different locking mechanisms that JPA 2.0 uses\
    \ (JPA 1.0 only had support for optimistic locking):\n\n- **Optimistic locking**\
    \ is based on the assumption that most database transactions don’t conflict with\
    \ other transactions, allowing concurrency to be as permissive as possible when\
    \ allowing transactions to execute.\n- **Pessimistic locking** is based in the\
    \ opposite assumption, so a lock will be obtained on the resource before operating\
    \ on it."
