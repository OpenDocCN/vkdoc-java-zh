    \ ItemRest {\n    ...\n}\n```\n\n## Bean Class\n\nA stateless session bean class\
    \ is any standard Java class that implements business logic. The requirements\
    \ to develop a session bean class are as follows:\n\n- The class must be annotated\
    \ with `@Stateless`, `@Stateful`, `@Singleton`, or the XML equivalent in a deployment\
    \ descriptor.\n- It must implement the methods of its interfaces, if any.\n- The\
    \ class must be defined as `public`, and must not be `final` or `abstract`.\n\
    - The class must have a public no-arg constructor that the container will use\
    \ to create instances.\n- The class must not define the `finalize()` method.\n\
    - Business method names must not start with `ejb`, and they cannot be `final`\
