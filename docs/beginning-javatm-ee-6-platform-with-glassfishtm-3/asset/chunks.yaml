  trans: '

    **前**一章展示了如何使用 JPA 实现持久化对象以及如何用 JPQL 查询它们。持久化层是通过使用对象来开发的，这些对象借助注解封装其属性并将其映射到关系数据库。其理念是尽可能保持实体的透明性，避免将其与业务逻辑混杂在一起。实体可以拥有验证其属性的方法，但它们并非为表示复杂任务而设计，这些任务通常需要与其他组件（其他持久化对象、外部服务等）进行交互。


    持久化层并非适合进行业务处理的层次。同样，用户界面也不应执行业务逻辑，尤其是在存在多种界面（Web、Swing、便携设备等）的情况下。为了将持久化层与表示层分离、实现业务逻辑、添加事务管理和安全性，应用程序需要一个业务层。在
    Java EE 中，该层通过使用企业 JavaBean（EJB）来实现。


    对于大多数应用程序而言，分层至关重要。遵循自底向上的方法，之前关于 JPA 的章节对领域类进行了建模，通常定义了名词（Artist、CD、Book、Customer
    等）。在领域层之上，业务层对应用程序的动作（或动词）进行建模（创建一本书、购买一本书、打印订单、交付一本书等）。通常，这个业务层与外部 Web 服务（SOAP
    或 RESTful Web 服务）交互，向其他系统发送异步消息（使用 JMS），或发送电子邮件；它协调从数据库到外部系统的多个组件，充当事务和安全划分的中心位置，以及任何类型客户端（如
    Web 界面（servlet 或 JSF 托管 Bean）、批处理或外部系统）的入口点。


    本章是对 EJB 的介绍，接下来的三章将为你提供构建企业应用程序业务层所需的所有必要信息。将解释不同类型的 EJB；描述它们的生命周期，以及如何添加面向切面编程（AOP）功能并处理事务和安全性。


    **理解 EJB**


    EJB 是封装业务逻辑并处理事务和安全性的服务器端组件。它们还拥有用于消息传递、调度、远程访问、Web 服务端点（SOAP 和 REST）、依赖注入、组件生命周期、带有拦截器的
    AOP 等的集成栈。此外，EJB 与其他 Java SE 和 Java EE 技术无缝集成，例如 JDBC、JavaMail、JPA、Java 事务 API（JTA）、Java
    消息服务（JMS）、Java 身份验证和授权服务（JAAS）、Java 命名和


    **167**


    ![Image 62](img/index-198_1.jpg)


    **168**


    第 6 章 ■ 企业 JavaBean


    目录接口（JNDI）以及远程方法调用（RMI）。这就是为什么它们被用于构建业务层（见图 6-1），以位于持久化层之上，并作为表示层技术（如 JavaServer
    Faces（JSF））的入口点。


    **图 6-1.** *架构分层*


    EJB 使用了一种非常强大的编程模型，它结合了易用性和健壮性。


    如今，EJB 很可能是最简单的 Java 服务器端开发模型，在降低复杂性的同时，为关键任务型企业应用程序带来了可重用性和可扩展性。


    所有这些都源于对一个将被部署到容器中的普通 Java 对象（POJO）进行注解。EJB 容器是一个运行时环境，提供诸如事务管理、并发控制、池化和安全授权等服务。历史上，应用服务器还添加了其他功能，如集群、负载均衡和故障转移。


    EJB 开发人员随后可以专注于实现业务逻辑，而容器则处理所有技术细节。


    如今，随着 3.1 版本的到来，EJB 比以往任何时候都更能做到一次编写，随处部署。

