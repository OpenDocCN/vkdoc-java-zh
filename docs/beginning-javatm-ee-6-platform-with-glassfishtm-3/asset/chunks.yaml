- fmt: 'Web services are used for business-to-business (B2B) integration and are crucial
    technology for SOA. Amazon, eBay, Google, Yahoo!, and many others provide web
    services for the use of their customers. And many organizations use web services
    heavily in house. This chapter has introduced some relevant standards (UDDI, WSDL,
    SOAP, XML, etc.) and focused on the Java EE specifications that cover these standards
    (JAX-WS, JAXB, WS-Metadata, etc.).


    `Java Architecture for XML Binding (JAXB)` defines a standard to bind Java representations
    to XML and vice versa. It provides a high level of abstraction, as it is based
    on annotations.


    Even if `JAXB` can be used in any kind of Java application, it fits well in the
    web service space because any information exchanged is written in XML.


    After `JAXB`, we looked at `WSDL` and `SOAP`. These specifications are vital to
    web services as they describe the web service interface and the messages exchanged,
    respectively.


    Leaving these specifications behind, `JAX-WS` follows a simple development model
    and uses only a small set of annotations to adjust the Java-to-WSDL mapping. It
    is then easy to write a web service (servlet or EJB endpoint) or a web service
    consumer as simple annotated POJOs with optional deployment descriptors.


    This chapter ended with an example of how to write a web service, compile and
    package it with Maven, and generate the consumer’s artifact with the `wsimport`
    utility.


    ## Chapter 15: RESTful Web Services


    The web services stack (SOAP, WSDL, WS-*) described in the previous chapter delivers
    interoperability in both message integration and RPC style. With the rise of Web
    2.0, new web frameworks such as Rails have emerged, and a new kind of web service
    has gained in popularity: the RESTful web service.


    Many key web players like Amazon, Google, and Yahoo! have deprecated their SOAP
    services in favor of RESTful resource-oriented services. Many factors must be
    taken into account when making a choice between SOAP web services and RESTful
    web services.


    `Representational State Transfer (REST)` is an architectural style created based
    on how the web works. Applied to web services, it tries to put the Web back into
    web services. To design a RESTful web service, you need to know `Hypertext Transfer
    Protocol (HTTP)` and `Uniform Resource Identifiers (URIs)` and to observe a few
    design principles. You need to think in terms of resources so as not to betray
    the principles of REST.


    This chapter focuses on REST, its architecture, and the HTTP protocol. In Java
    EE 6, REST has been specified through `Java API for RESTful Web Services (JAX-RS)`,
    used in this chapter.


    ### Understanding RESTful Web Services


    In the REST architectural style, every piece of information is a resource, and
    these resources are addressed using `Uniform Resource Identifiers (URIs)`, typically
    links on the Web. The resources are acted upon by using a set of simple, well-defined
    operations. The REST client-server architectural style is designed to use a stateless
    communication protocol, typically HTTP. In REST, clients and servers exchange
    representations of resources using a defined interface and protocol. These principles
    encourage RESTful applications to be simple and lightweight, and have high performance.


    #### Resources


    Resources are given a central role in RESTful architectures. A resource is anything
    the client might want to reference or interact with, any piece of information
    that might be worthwhile referencing in a hyperlink. It can be stored in a database,
    a file, and so forth. Avoid as much as possible exposing abstract concepts as
    a resource; favor simple objects.


    Some resources used in the CD-BookStore application could be:


    - A list of Apress Java books

    - The book *The Definitive Guide to Grails*

    - Ola Bini’s résumé


    Other examples of resources could be:


    - The weather records in Lisbon for 2008

    - Your contact information

    - The hundredth Fibonacci number

    - A transaction currently running in a transaction manager

    - The number of friends Joe and Bill have in common

    - Interesting photos uploaded to Flickr in the last 24 hours

    - Interesting photos uploaded to Flickr on 01/01/2009


    #### URI


    Resources on the Web are identified by a URI. A URI is a unique identifier for
    a resource, made of a name and a structured address indicating where to find this
    resource. Various types of URIs exist: WWW addresses, Universal Document Identifiers,
    Universal Resource Identifiers, and finally the combination of `Uniform Resource
    Locators (URLs)` and `Uniform Resource Names (URNs)`. Examples of URIs are:


    - `http://www.apress.com/book/catalog`

    - `http://www.apress.com/book/catalog/beginning-javaee6-cover.jpg`

    - `http://www.apress.com/info/jobs`

    - `http://www.weather.com/weather/2008?location=Paris,France`

    - `http://www.flickr.com/explore/interesting/2009/01/01`

    - `http://www.flickr.com/explore/interesting/24hours`

    - `http://www.movies.com/catalog/titles/movies/123456`

    - `http://www.movies.com/categories/aventure`


    URIs should be as descriptive as possible and should target a unique resource.
    Note that different URIs identifying different resources may lead to the same
    data. Actually, at some point in time, the list of the interesting photos uploaded
    to Flickr on 01/01/2009 was the same as the list of the uploaded photos in the
    last 24 hours, but the information conveyed by the two corresponding URIs is not
    the same.


    #### Representations


    You might want to get the representation of an object as text, XML, a PDF document,
    or another data format. When the client deals with a resource, it is always through
    its representation; the resource itself remains on the server. *Representation*
    is any useful information about the state of a resource. For example, the list
    of Java books mentioned previously has at least two representations:


    - The HTML page rendered by your browser: `http://www.apress.com/book/catalog?category=32`

    - The comma-separated value (CSV) file downloaded to compute the total number
    of books: `http://www.apress.com/resource/csv/bookcategory?cat=32`


    How do you choose between the different representations of a given resource? Two
    solutions are possible. The service could expose one URI per representation. That’s
    what the Apress web site does for the list of Java books. However, the two URIs
    are really different and do not seem directly related. Following is a neater set
    of URIs:


    - `http://www.apress.com/book/catalog/java`

    - `http://www.apress.com/book/catalog/java.csv`

    - `http://www.apress.com/book/catalog/java.xml`


    The first URI is the default representation of the resource, and additional representations
    append their format extension to it: `.csv` (for text/csv), `.xml`, `.pdf`, and
    so on.


    Another solution is to expose one single URI for all representations (e.g., `http://www.apress.com/book/catalog/java`)
    and to rely on the mechanism called *content negotiation*, which I’ll discuss
    in more detail a little later in this chapter.


    #### WADL'
