    ## JUnit Integration


    JUnit is currently very well integrated with most IDEs (IntelliJ IDEA, Eclipse,
    NetBeans, etc.). When working with these IDEs, in most cases JUnit highlights
    in green to indicate successful tests and in red to indicate failures. Most IDEs
    also provide facilities to create test classes.


    JUnit is also integrated to Maven through the Surefire plug-in used during the
    test phase of the build life cycle. It executes the JUnit test classes of an application
    and generates reports in XML and text file formats. The following Maven command
    runs the JUnit tests through the plug-in:


    `mvn test`


    ## Derby 10.4


    Initially called Cloudscape, the Derby database developed in Java was given to
    the Apache foundation by IBM and became open source. Sun Microsystems has released
    its own distribution called JavaDB. Of small footprint (2MB), Derby is a fully
    functional relational database, supporting transactions, that can easily be embedded
    in any Java-based solution.


    Derby provides two different modes: embedded and network server. The embedded
    mode refers to Derby being started by a simple single-user Java application. With
    this option, Derby runs in the same JVM as the application. In this book, I will
    use this mode during unit testing.


    The network server mode refers to Derby being started as a separate process and
    providing multiuser connectivity. I will use this mode throughout the book when
    running applications.


    ### Installation


    Installing Derby is very easy; in fact, you may find it is already installed because
    it is bundled with the JDK 1.6. During the installation of JDK 1.6 (refer back
    to Figure 1-6), the wizard proposed you install Java DB. And by default it does.
    If you don’t have it installed, you can download the binaries from [http://db.apache.org](http://db.apache.org).


    Once installed, set the `DERBY_HOME` variable to the path where you’ve installed
    it, and add `%DERBY_HOME%\bin` to your `PATH` variable. Start the Derby network
    server by launching the `%DERBY_HOME%\bin\startNetworkServer.bat` script. Derby
    displays some information to the console such as the port number it listens to
    (1527 by default).


    Derby comes with several utilities, one of them being `sysinfo`. Open a DOS command
    line, enter `sysinfo`, and you should see information about your Java and Derby
    environment, as shown in Figure 1-13.


    ![Image 19](index-60_1.jpg)


    **Figure 1-13.** *sysinfo output after installing Derby*


    ### Usage


    Derby provides several tools (located under the `bin` subdirectory) to interact
    with the database. The simplest are probably `ij`, which allows you to enter SQL
    commands at a command prompt, and `dblook`, which lets you view all or part of
    a database’s data definition language (DDL).


    Make sure you’ve started the Derby network server, and type the command `ij` to
    enter the command prompt and run interactive queries against a Derby database.
    Then, enter the following commands to create a database and a table, insert data
    into the table, and query it:


    ```

    ij> connect ''jdbc:derby://localhost:1527/Chapter01DB;create=true'';

    ```


    This connects to the `Chapter01DB` database. Because it doesn’t exist already,
    the `create=true` parameter forces its creation.


    ```

    ij> create table customer (custId int primary key, firstname varchar(20), lastname
    varchar(20));

    ```


    This creates a `customer` table with a primary key column and two `varchar(20)`
    columns for the first name and last name. You can display the description of the
    table by entering the following command:'
