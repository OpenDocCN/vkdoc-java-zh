    而且非常容易理解。然而，存在一些对互操作性至关重要的不可见部分。


    **用于 XML 绑定的 Java 架构**


    到目前为止，您应该已经理解，XML 用于交换数据，并通过 WSDL 和 SOAP 信封来定义 Web 服务。但在清单 14-3 中，展示了一个消费者调用 Web
    服务的例子，其中完全没有 XML。这是因为消费者只操作 Java 接口和存根，


    **400**


    第 14 章 ■ SOAP Web 服务


    而这些接口和存根则负责处理所有 XML 底层细节和网络连接。在调用链的某处，您操作的是 Java 类，而在另一处则是 XML 文档，JAXB 则负责促进这种双向对应关系。


    Java 提供了多种操作 XML 的方式，从通用 API（`javax.xml.stream.XmlStreamWriter` 和 `java.beans.XMLEncoder`）到更复杂、更底层的模型，例如用于
    XML 的简单 API（SAX）、文档对象模型（DOM）或用于 XML 处理的 Java API（JAXP）。JAXB 提供了比 SAX 或 DOM 更高层次的抽象，并且基于注解。


    JAXB 定义了一个将 Java 表示绑定到 XML 以及反向绑定的标准。它以透明、面向对象的方式管理 XML 文档和 XML 模式定义（XSD），从而隐藏了
    XSD 语言的复杂性。


