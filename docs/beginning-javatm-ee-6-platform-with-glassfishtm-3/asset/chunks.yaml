- fmt: "# Singleton Session Beans and the Timer Service\n\n## Dependencies Between\
    \ Singletons\n\nA singleton needs to be initialized before the `CacheEJB`. Dependencies\
    \ can exist between multiple singletons, and the `@javax.ejb.DependsOn` annotation\
    \ is there to express it. The following example illustrates the use of the annotation:\n\
    \n```java\n@Singleton\npublic class CountryCodeEJB {\n    ...\n}\n```\n\n```java\n\
    @DependsOn(\"CountryCodeEJB\")\n@Singleton\npublic class CacheEJB {\n    ...\n\
    }\n```\n\n`@DependsOn` holds one or more strings, where each specifies the name\
    \ of the target singleton bean. The following code shows how `CacheEJB` depends\
    \ on the initialization of `CountryCodeEJB` and `ZipCodeEJB`. `@DependsOn(\"CountryCodeEJB\"\
    , \"ZipCodeEJB\")` tells the container to guarantee that singleton `CountryCodeEJB`\
    \ and `ZipCodeEJB` are initialized before `CacheEJB`.\n\n```java\n@Singleton\n\
    public class CountryCodeEJB {\n    ...\n}\n\n@Singleton\npublic class ZipCodeEJB\
    \ {\n    ...\n}\n\n@DependsOn(\"CountryCodeEJB\", \"ZipCodeEJB\")\n@Startup\n\
    @Singleton\npublic class CacheEJB {\n    ...\n}\n```\n\nAs you can see in this\
    \ code, you can even combine dependencies with startup initialization. `CacheEJB`\
    \ is eagerly initialized at startup (because it holds the `@Startup` annotation),\
    \ and therefore `CountryCodeEJB` and `ZipCodeEJB` will also be initialized at\
    \ startup before `CacheEJB`.\n\n## Concurrency\n\nAs you understand by now, there\
    \ is only one instance of a singleton session bean shared by multiple clients.\
    \ So concurrent access by clients is allowed and can be controlled with the `@ConcurrencyManagement`\
    \ annotation in three different ways:\n\n- **Container-managed concurrency (CMC)**:\
    \ The container controls concurrent access to the bean instance based on metadata\
    \ (annotation or the XML equivalent).\n- **Bean-managed concurrency (BMC)**: The\
    \ container allows full concurrent access and defers the synchronization responsibility\
    \ to the bean.\n- **Concurrency not allowed**: If a client invokes a business\
    \ method that is being used by another client, the concurrent invocation will\
    \ result in a `ConcurrentAccessException`.\n\nIf no concurrency management is\
    \ specified, the CMC demarcation is used by default. A singleton bean can be designed\
    \ to use either CMC or BMC, but not both.\n\n### Container-Managed Concurrency\n\
    \nWith CMC, the default demarcation, the container is responsible for controlling\
    \ concurrent access to the singleton bean instance. You can then use the `@Lock`\
    \ annotation to specify how the container must manage concurrency when a client\
    \ invokes a method. The annotation can take the values `READ` (shared) or `WRITE`\
    \ (exclusive):\n\n- `@Lock(LockType.WRITE)`: A method associated with an exclusive\
    \ lock will not allow concurrent invocations until the method's processing is\
    \ completed. For example, if a client C1 invokes a method with an exclusive lock,\
    \ client C2 will not be able to invoke the method until C1 has finished.\n- `@Lock(LockType.READ)`:\
    \ A method associated with a shared lock will allow any number of other concurrent\
    \ invocations to the bean's instance. For example, two clients, C1 and C2, can\
    \ access simultaneously a method with a shared lock.\n\nThe `@Lock` annotation\
    \ can be specified on the class, the methods, or both. Specifying on the class\
    \ means that it applies to all methods. If the concurrency locking attribute is\
    \ not specified, it is assumed to be `@Lock(WRITE)` by default. The code in Listing\
    \ 7-6 shows `CacheEJB` with a `READ` lock in the bean class. This implies that\
    \ all methods will have `READ` concurrency except `getFromCache()`, which is overridden\
    \ by `WRITE`.\n\n**Listing 7-6.** *A Singleton Session Bean with CMC*\n\n```java\n\
    @Singleton\n@Lock(LockType.READ)\npublic class CacheEJB {\n    private Map<Long,\
    \ Object> cache = new HashMap<Long, Object>();\n\n    public void addToCache(Long\
    \ id, Object object) {\n        if (!cache.containsKey(id))\n            cache.put(id,\
    \ object);\n    }\n\n    public void removeFromCache(Long id) {\n        if (cache.containsKey(id))\n\
    \            cache.remove(id);\n    }\n\n    @AccessTimeout(2000)\n    @Lock(LockType.WRITE)\n\
    \    public Object getFromCache(Long id) {\n        if (cache.containsKey(id))\n\
    \            return cache.get(id);\n        else\n            return null;\n \
    \   }\n}\n```"
