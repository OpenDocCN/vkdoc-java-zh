- fmt: "```java\n@Target({METHOD, FIELD}) @Retention(RUNTIME)\n\npublic @interface\
    \ Basic {\n\n    FetchType fetch() default EAGER;\n\n    boolean optional() default\
    \ true;\n\n}\n```\n\nThis annotation has two parameters: `optional` and `fetch`.\
    \ The `optional` element gives a hint as to whether the value of the attribute\
    \ may be null. It is disregarded for primitive types. The `fetch` element can\
    \ take two values: `LAZY` or `EAGER`. It gives a hint to the persistence provider\
    \ runtime that data should be fetched lazily (only when the application asks for\
    \ the property) or eagerly (when the entity is initially loaded by the provider).\n\
    \nFor example, take the `Track` entity shown in Listing 3-14. A CD album is made\
