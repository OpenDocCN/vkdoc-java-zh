- fmt: '# When JSF Was Created


    When JSF was created, the intention was to reuse JSP as the main PDL, as it was
    already part of Java EE. JSP was using EL and JSTL, so the idea was to make use
    of all these technologies within JSF. JSP is a page language, and JSF is a component
    layer on top of it. However, JSP and JSF life cycles don’t fit together well.
    Tags in JSPs are processed once from top to bottom in order to produce a response.
    JSF has a more complex life cycle where the component tree generation and the
    rendering occur at different phases. This is where Facelets comes into play: to
    fit the JSF life cycle.


    Facelets is an open source alternative to JSP. Unlike JSP, EL, and JSTL, it doesn’t
    have a JSR and is not part of Java EE. Facelets is a replacement for JSP and provides
    an XML-based alternative (XHTML) for pages in a JSF-based application. Facelets
    was designed with JSF in mind, and this is why it provides a simpler programming
    model than JSP’s.


    Facelets comes with a tag library for writing the user interface and provides
    partial support for JSTL tags. While the function tag library is fully supported,
    only a few core tags are (`c:if`, `c:forEach`, `c:catch`, and `c:set`). But the
    key feature of Facelets is its page templating, which is more flexible than the
    JSP one. It also allows you to create custom components to be used in the JSF
    component tree model.


    The Facelets tag library is defined by the `http://java.sun.com/jsf/facelets`
    URI and usually uses the `ui` prefix. Table 11-8 lists all the available tags.


    **Table 11-8.** Facelets Tags


    | Tag | Description |

    | --- | --- |

    | `<ui:composition>` | Defines a composition that optionally uses a template.
    Multiple compositions can use the same template. |

    | `<ui:component>` | Creates a component. |

    | `<ui:debug>` | Captures debugging information. |

    | `<ui:define>` | Defines content that is inserted into a page by a template.
    |

    | `<ui:decorate>` | Allows you to decorate some content in a page. |

    | `<ui:fragment>` | Adds a fragment of a page. |

    | `<ui:include>` | Encapsulates and reuses content among multiple XHTML pages,
    similar to JSP’s `<jsp:include>`. |

    | `<ui:insert>` | Inserts content into a template. |

    | `<ui:param>` | Passes parameters to an included file (using `<ui:include>`)
    or a template. |

    | `<ui:repeat>` | Serves as an alternative to `<c:forEach>`. |

    | `<ui:remove>` | Removes content from a page. |


    Facelets pages are written in XHTML and look like what you saw earlier in Listing
    11-2. In the “Templating” section of this chapter, you will see how to use templating
    with Facelets.


    ## JavaServer Faces


    I began this chapter by introducing JSP, JSTL, and Facelets, as they are essential
    for an understanding of JSF 2.0. You need to choose a PDL to use when writing
    JSF. JSP was the preferred PDL until JSF 1.2. JSP and JSF have different page
    life cycles; with JSF 2.0, the preferred PDL is Facelets (XHTML formatted pages).
    This does not mean that you cannot use JSP, but it does mean that you will be
    limited in terms of tags and functionality.


    JSPs have a relatively simple life cycle. A JSP source is compiled into a servlet,
    and when a web container receives an HTTP request, it passes it to the servlet.
    The servlet processes the request, and then writes the response back to the client.


    JSF has a more complex life cycle, and this is why in the “Expression Language”
    section, I showed you two different syntaxes: one using the dollar symbol (`${expression}`)
    and the other using the hash (`#{expression}`). `$` is for expressions that can
    be executed immediately (when you know that the objects in the expression are
    available), and `#` is for deferred expressions (which have to be evaluated later
    in the life cycle).


    With JSF 1.2, both syntaxes were unified, but this led to much confusion and many
    errors.


    For example, if you use JSP as the PDL, you won’t have access to some JSF tags
    (such as the Facelets tags for example). In this section, I will use Facelets
    as the PDL.


    Table 11-9 lists all the tag libraries that a Facelets PDL page can use.'
