    HTTP 在 Content-Type 和 Accept 头部字段中使用互联网媒体类型（最初称为 MIME 类型），以提供开放且可扩展的数据类型定义和类型协商。互联网媒体类型分为五个独立的高级类别：文本（text）、图像（image）、音频（audio）、视频（video）和应用程序（application）。这些类型进一步细分为多个子类型（如
    text/plain、text/xml、text/xhtml 等）。以下是一些最常见的公共内容类型：


    • text/html：HTML 自 1990 年起便用于万维网信息基础设施，并在各种非正式文档中进行了规范。text/html 媒体类型于 1995 年由
    IETF HTML 工作组首次正式定义。有关该媒体类型的完整定义，请参阅 RFC 2854。


    • text/plain：这是默认的内容类型，用于简单的文本消息。


    • image/gif、image/jpeg、image/png：此图像顶级媒体类型需要显示设备（例如图形显示器、图形打印机等）来查看信息。


    第 15 章 ■ RESTful Web 服务


    **435**


    • text/xml、application/xml：W3C 于 1998 年 2 月发布了可扩展标记语言（XML）1.0。有关该媒体类型的完整定义，请参阅
    RFC 3023。


    • application/json：JavaScript 对象表示法（JSON）是一种独立于编程语言的轻量级数据交换文本格式。


    状态码


    每次收到响应时，都会关联一个 HTTP 状态码。规范定义了大约 60 个状态码。Status-Code 元素是一个三位整数，用于描述响应的上下文，并且是响应信封的一部分。第一位数字指定了五类响应之一：


    • *1xx*：信息性。请求已收到，处理正在进行中。


    • *2xx*：成功。操作已成功接收、理解并接受。


    • *3xx*：重定向。需要采取进一步操作才能完成请求。


    • *4xx*：客户端错误。请求包含错误的语法或无法完成。


    • *5xx*：服务器错误。服务器未能完成一个看似有效的请求。


    以下是一些您可能已经遇到过的状态码：


    • *200 OK*：请求已成功。实体主体（如果有）包含资源的表示形式。


    • *301 Moved Permanently*：请求的资源已被分配一个新的永久 URI，并且将来对该资源的任何引用都应使用返回的 URI 之一。


    • *404 Not Found*：服务器未找到与请求 URI 匹配的任何内容。


    • *500 Internal Server Error*：服务器遇到意外情况，导致无法完成请求。


    缓存与条件请求


    在大多数分布式系统中，缓存至关重要。缓存旨在通过避免不必要的请求或减少响应中的数据量来提高性能。HTTP 提供了允许缓存并确保缓存数据正确的机制。但如果客户端决定不使用任何缓存机制，即使资源自上次请求以来未被修改，它也需要始终请求数据。


    当发送对 GET 请求的响应时，它可以包含一个 Last-Modified 头部，指示资源最后被修改的时间。下次用户代理请求此资源时，它会在 If-Modified-Since
    头部中传递此日期。Web 服务器（或代理）会将此日期与最新的修改日期进行比较。如果用户代理发送的日期等于或更新，则返回一个 304 Not Modified
    状态码，且不带响应体。否则，执行或转发请求的操作。


    ![Image 132](img/index-466_1.jpg)


    **436**


    第 15 章 ■ RESTful Web 服务


    但是，日期可能难以操作，并且意味着所有交互的代理必须保持同步。ETag 响应头部解决了这个问题。理解 ETag 最简单的方式是将其视为表示形式中所有字节的
    MD5 或 SHA1 哈希值；如果表示形式中仅有一个字节发生变化，ETag 也会改变。在 GET 响应中收到的 ETag 值可以在后续的 If-Match
    请求头部中设置。


    图 15-2 给出了如何使用 ETag 的示例。要获取图书资源，您使用 GET 操作并提供资源的 URI（GET /book/12345）。服务器将返回一个响应，其中包含图书的
    XML 表示形式、200 OK 状态码以及生成的 ETag。当您第二次请求同一资源时，如果您在请求中传递了 ETag 值，服务器将不会发送资源的表示形式，而是返回一个
    304 Not Modified 状态码，告知客户端自上次访问以来资源未发生变化。


    **图 15-2.** *使用缓存和 304 Not Modified 状态码*


    使用 HTTP 头部 If-Modified-Since、If-Unmodified-Since、If-Match、If-None-Match 和 If-Range
    的请求被称为条件请求。条件请求可以通过避免不必要的往返或数据传输来节省带宽和 CPU（在服务器和客户端两侧）。If-* 头部最常用于 GET 和 PUT 请求。


    **RESTful Web 服务规范**


    与依赖 W3C 标准的 SOAP 和 WS-* 堆栈相反，REST 没有标准，只是一种具有设计准则的架构风格。REST 应用程序在很大程度上依赖于许多其他标准：


    • HTTP


    • URI、URL


    • XML、JSON、HTML、GIF、JPEG 等（资源表示形式）


    Java 方面已通过 JAX-RS 进行了规范，但 REST 更像是一种设计模式：一种可被多种语言实现的、针对常见问题的可重用解决方案。


    **REST 简史**


    REST 一词最早由 Roy Thomas Fielding 在其博士论文《架构风格与基于网络的软件架构设计》（Architectural Styles and
    the Design of Network-based Software Architectures）第五章中提出（加州大学尔湾分校，2000 年，[`www.ics.uci.edu/~fielding/pubs/dissertation/top.htm）。`](http://www.ics.uci.edu/~fielding/pubs/dissertation/top.htm)


    该论文是对用于开发 Web 的架构的回顾性解释。


    第 15 章 ■ RESTful Web 服务


    **437**


    在他的论文中，Fielding 审视了万维网中运行良好的部分，并提取了设计原则，这些原则可以使任何其他分布式超媒体系统（无论是否与 Web 相关）同样高效。


    开发 REST 的最初动机是为 Web 创建一个架构模型。Roy T. Fielding 也是 HTTP 规范的作者之一，因此 HTTP 非常符合他在论文中描述的架构设计也就不足为奇了。


    **JAX-RS 1.1**


    要编写 RESTful Web 服务，您只需要一个支持 HTTP 的客户端和服务器。任何浏览器和 HTTP Servlet 容器都可以完成这项工作，但代价是需要一些
    XML 配置和胶水代码的麻烦。最终，这些代码可能难以阅读和维护。这时，JAX-RS 就派上了用场。JAX-RS 规范的第一个版本于 2008 年 10 月最终确定，它定义了一组促进
    REST 架构风格的 API。它是 RESTful Web 服务的 JCP 标准（JSR 311）。通过注解，它简化了 RESTful Web 服务的实现并提高了生产力。该规范仅涵盖
    REST 的服务器端方面。


    **JAX-RS 1.1 的新特性是什么？**


    JAX-RS 1.1 是一个维护版本，专注于与 Java EE 6 及其新特性的集成。JAX-RS 1.1 的主要新特性如下：


    • 它提供了对无状态会话 Bean 作为根资源的支持。


    • 允许将外部资源（持久化管理器、数据源、EJB 等）注入到 REST 资源中。


    • JAX-RS 注解可以应用于 Bean 的本地接口，或直接应用于无接口 Bean。'
- fmt: '# Reference Implementation


    Jersey is Sun’s official reference implementation of JAX-RS. It is an open source
    project under dual CDDL and GPL licenses. Jersey is extensible through its API
    and also provides a client API (which is not covered by the specification).


    Other implementations of JAX-RS are also available such as CXF (Apache), RESTEasy
    (JBoss), and Restlet (a senior project that existed even before JAX-RS was finalized).


    # The REST Approach


    As I mentioned before, REST is a set of general design constraints based on HTTP.
    However, this chapter focuses on web services, and since REST is derived from
    the Web, I’ll start with a real-life web-browsing experience before going over
    the principles that drive the Web. The Web has become a main source of information
    and is part of our everyday tool set. You are probably very familiar with it,
    and this familiarity should help you in understanding REST concepts and properties.


    ## From the Web to Web Services


    We know how the Web works, so why should web services behave differently? After
    all, services also often exchange uniquely identified resources, linked with others
    like hyperlinks. Web architecture has proven its scalability for years; why reinvent
    the wheel?


    To create, update, and delete a book resource, why not use the common HTTP verbs?
    For example:


    - Use `POST` on data (in XML, JSON, or text format) to **create** the book resource
    with the URI `http://www.apress.com/books/`. Once created, the response sends
    back the URI of the new resource: `http://www.apress.com/books/123456`.

    - Use `GET` to **read** the resource (and possible links to other resources from
    the entity body) at `http://www.apress.com/books/123456`.

    - Use `PUT` on data to **update** the book resource at `http://www.apress.com/books/123456`.

    - Use `DELETE` to **delete** the resource at `http://www.apress.com/books/123456`.


    By using HTTP verbs, we have access to all possible Create, Read, Update, Delete
    (CRUD) actions on a resource.


    ## A Web-Browsing Experience


    How would you proceed to reach the list of Java technology books at Apress? You
    point your browser to the Apress web site: `http://www.apress.com`. Although it
    is likely that this page will not contain the exact information you’re seeking,
    you’re expecting it to give you access in one way or another to the Java book
    list. The home page offers a search engine on all Apress books, but there is also
    a book directory sorted by technologies. Click the Java node, and the hypermedia
    magic happens: here is the full list of Apress Java books. Quite a long list actually,
    and although the number is not provided, the link to the CSV format and your command-line
    skills will do the math in a few clock cycles (there are 144 books under the Java
    category):


    ```

    curl http://www.apress.com/resource/csv/bookcategory?cat=32 | sed -n 2~1p | wc
    -l

    ```


    Say that you save the link in your favorite bookmark manager, and in going through
    the book list, *The Definitive Guide to Grails, Second Edition* by Graeme Rocher
    and Jeff Brown captures your attention. The hyperlink on the book title takes
    you to the book page where you can read the abstract, author biography, and so
    on, and you notice one of the books listed in the Related titles section might
    be as valuable for your current project. You would like to compare Graeme Rocher’s
    book with *Practical JRuby on Rails Web 2.0 Projects: Bringing Ruby on Rails to
    Java* by Ola Bini. Apress book pages give you access to a more concrete representation
    of its books in the form of online previews: open a preview, go through the table
    of contents, and make your choice.


    Here is what we do on a day-to-day basis with our browsers. REST applies the same
    principles to your services where books, search results, a table of contents,
    or a book’s cover can be defined as resources.


    ## Uniform Interface


    One of the main constraints that makes an architecture RESTful is the use of a
    uniform interface to manage your resources. Pick whatever interface suits you,
    but use it in the same way all across the board, from resource to resource, from
    service to service. Never stray from it or alter the original meaning. By using
    a uniform interface, “the overall system architecture is simplified and the visibility
    of interactions is improved” (Roy Thomas Fielding, *Architectural Styles and the
    Design of Network-based Software Architectures*). Your services become part of
    a community of services using the exact same semantic.


    The de facto web protocol is HTTP, which is a document-based standardized request/response
    protocol between a client and a server. HTTP is the uniform interface of RESTful
    web services. Web services built on SOAP, WSDL, and other WS-* standards also
    use HTTP as the transport layer, but they leverage only a very few of its capabilities.
    You have to discover the semantic of the service by analyzing the WSDL and then
    invoke the right methods. RESTful web services have a uniform interface (HTTP
    verbs and URIs), so once you know where the resource is (URI), you can invoke
    the HTTP verbs (`GET`, `POST`, etc.).


    In addition to familiarity, a uniform interface promotes interoperability between
    applications; HTTP is widely supported, and the number of HTTP client libraries
    guarantees that you won’t have to deal with communication issues.


    ## Addressability


    The second tenet to follow when designing RESTful web services is addressability.
    Your web service should make your application as addressable as possible, which
    means that every valuable piece of information of your application should be a
    resource and have a URI, making that resource easily reachable. It is the only
    piece of data you need to publish to make the resource accessible, so your business
    partner won’t have some guesswork to do in order to reach the resource.


    For example, you’re dealing with a bug in your application, and your investigations
    lead you to line 42 of the class `CreditCardValidator.java` as the place where
    the bug occurs. Because you’re not responsible for this domain of the application,
    you want to file an issue so a qualified person will take care of it. How would
    you point her to the incriminating line? You could say “Go to line 42 of the class
    `CreditCardValidator`,” or, if your source code is addressable through a repository
    browser, you could save the URI of the line itself in the bug report.


    This raises the issue of defining the granularity of your RESTful resources in
    your application: it could be at the line, method, or class level, and so forth.


    Unique URIs make your resources linkable, and because they are exposed through
    a uniform interface, everyone knows exactly how to interact with them, allowing
    people to use your application in ways you would have never imagined.


    ## Connectedness


    In graph theory, a graph is called connected if every pair of distinct vertices
    in the graph can be connected through some path. It is said to be strongly connected
    if it contains a direct path from `u` to `v` and a direct path from `v` to `u`
    for every pair of vertices `u`, `v`. REST advocates that resources should be as
    connected as possible. As the now famous formulation goes: “Hypermedia as the
    engine of application state.”


    Once again, this daunting statement resulted from an examination of the success
    of the Web. Web pages embed links to navigate through pages in a logical and smooth
    manner.'
