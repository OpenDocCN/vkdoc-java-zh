- fmt: "# OpenMQ Overview\n\n`OpenMQ` has been available since 2006 and can be used\
    \ in stand-alone JMS applications or embedded in an application server. `OpenMQ`\
    \ is the default messaging provider for GlassFish and, as this book is being written,\
    \ is reaching version 4.4. It follows the JMS specification and adds many more\
    \ features such as the Universal Message Service (UMS), wildcard topic destinations,\
    \ XML message validation, clustering, and more.\n\n## How to Send and Receive\
    \ a Message\n\nLet’s take a look at a simple example to get an idea of JMS. JMS\
    \ employs producers, consumers, and destinations. The producer sends a message\
    \ to the destination, where the consumer is waiting for the message to arrive.\
    \ Destinations can be of two kinds: queues (for point-to-point communication)\
