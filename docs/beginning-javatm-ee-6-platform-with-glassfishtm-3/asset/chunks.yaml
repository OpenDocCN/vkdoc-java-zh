    \ applications. However, drawing pages with graphical components is not enough;\
    \ these pages need to interact with a back-end system, navigate through pages,\
    \ and validate and convert data. JSF is a rich specification: managed beans allow\
    \ you to invoke the business tier and to navigate in your application, and a set\
    \ of classes allow you to convert component values to and from a corresponding\
    \ type or validate them to conform to business rules. With the use of annotations,\
    \ it is now easy to develop custom converters and validators.\n\nJSF 2.0 brings\
    \ simplicity and richness in terms of dynamic user interfaces. It natively supports\
    \ Ajax calls in a simple manner. The specification comes with a JavaScript library,\
    \ allowing asynchronous calls to the server and refreshing small portions of the\
