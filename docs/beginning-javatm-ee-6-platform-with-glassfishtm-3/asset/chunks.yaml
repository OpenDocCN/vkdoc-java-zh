    **Configuration with web.xml**


    Web applications are usually configured with a web.xml deployment descriptor.
    I say “usually”


    because with the new Servlet 3.0 specification, the web.xml file has become optional.
    But because JSF 2.0 is based on Servlet 2.5 (and not Servlet 3.0), you still need
    to deploy your web application with a descriptor.


    JSF applications require a servlet, called FacesServlet, which acts as a front
    controller for the entire application. This servlet must be defined in the web.xml
    file with mapping added, as shown in Listing 10-8.


    **Listing 10-8.** *The web.xml File Declaring the FacesServlet*


    <?xml version=''1.0'' encoding=''UTF-8''?>


    <web-app version="2.5"


    [xsi:schemaLocation="http://java.sun.com/xml/ns/javaee](http://java.sun.com/xml/ns/javaee)


    [http://java.sun.com/xml/ns/javaee/web-app_2_5.xsd">](http://java.sun.com/xml/ns/javaee)


    <servlet>


    <servlet-name>Faces Servlet</servlet-name>


    <servlet-class> **javax.faces.webapp.FacesServlet**</servlet-class>


    <load-on-startup>1</load-on-startup>


    </servlet>


    <servlet-mapping>


    Chapter 10 ■ JaVaSerVer FaCeS


    **277**


    <servlet-name>Faces Servlet</servlet-name>


    <url-pattern> ***.faces**</url-pattern>


    </servlet-mapping>


    </web-app>


    The deployment descriptor maps the requests to a URL finished with .faces to the


    servlet, meaning that any page requested with the extension .faces will be handled
    by the FacesServlet.


