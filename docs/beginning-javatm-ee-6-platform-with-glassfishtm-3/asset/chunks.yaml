    \ describes the template syntax.\n\n```\n@Path(\"/customers/{customername}\")\n\
    ```\n\n`@Path` may also be used on methods of root resources, which can be useful\
    \ to group together common functionalities for several resources as shown in Listing\
    \ 15-4 (you may ignore for the moment the `@GET`, `@POST`, and `@DELETE` annotations\
    \ in the listing, as they will be described later in the “Methods or the Uniform\
    \ Interface” section).\n\n**Listing 15-4.** *An Item Resource with Several @Path\
    \ Annotations*\n\n```\n@Path(\"/items\")\npublic class ItemsResource {\n    @GET\n\
    \    public List<Item> getListOfItems() {\n        // ...\n    }\n\n    @GET\n\
    \    @Path(\"{itemid}\")\n    public Item getItem(@PathParam(\"itemid\") String\
    \ itemid) {\n        // ...\n    }\n\n    @PUT\n    @Path(\"{itemid}\")\n    public\
    \ void putItem(@PathParam(\"itemid\") String itemid, Item item) {\n        //\
