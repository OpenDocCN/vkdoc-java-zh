    The life cycle of an entity falls into four categories: persisting, updating,
    removing, and loading, which correspond to the database operations of inserting,
    updating, deleting, and selecting, respectively. Each life cycle has a “Pre” and
    “Post” event that can be intercepted by the entity manager to invoke a business
    method. These business methods have to be annotated by one of the annotations
    described in Table 5-1.


    **Table 5-1.** *Life-Cycle Callback Annotations*


    **Annotation**


    **Description**


    @PrePersist


    Marks a method to be invoked before EntityManager.persist() is executed.


    @PostPersist


    Marks a method to be invoked after the entity has been persisted. If the entity


    autogenerates its primary key (with @GeneratedValue), the value is available in
    the


    method.


    @PreUpdate


    Marks a method to be invoked before a database update operation is performed


    (calling the entity setters or the EntityManager.merge() method).


    @PostUpdate


    Marks a method to be invoked after a database update operation is performed.


    @PreRemove


    Marks a method to be invoked before EntityManager.remove() is executed.


    @PostRemove


    Marks a method to be invoked after the entity has been removed.


    @PostLoad


    Marks a method to be invoked after an entity is loaded (with a JPQL query or an


    EntityManager.find()) or refreshed from the underlying database. There is no


    @PreLoad annotation, as it doesn’t make sense to preload data on an entity that
    is


    not built yet.


