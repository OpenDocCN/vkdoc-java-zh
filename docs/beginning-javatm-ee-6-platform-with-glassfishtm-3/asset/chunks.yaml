    One of the differences between a pure Java class and a session bean is shown in
    Listing 6-2; even if the code is similar, the Main class doesn’t create an instance
    of the BookEJB using the new keyword; instead, the class needs to first obtain
    a reference to the EJB, either by injection or by JNDI lookup, before calling
    a method. This mechanism is used because the EJB runs in a managed environment.
    It needs to be deployed in a container (embedded or not).


    Like most Java EE 6 components, EJBs need metadata to inform the container of
    required


    actions (transaction demarcation) or services to inject. Metadata can take the
    form of either


    Chapter 6 ■ eNterprISe JaVa BeaNS


    **171**


    annotations or XML. EJBs can be deployed with the optional ejb-jar.xml deployment
    descriptor, which will override annotations. With configuration by exception,
    a single annotation is enough to turn a POJO into an EJB because the container
    applies all the default behavior.


    **EJB Container**


    As mentioned, an EJB is a server-side component and needs to be executed in a
    container.


    This runtime environment provides core features common to many enterprise applications


    such as the following:


    • *Remote client communication*: Without writing any complex code, an EJB client
    (another EJB, a user interface, a batch process, etc.) can invoke methods remotely
    via


    standard protocols.


    • *Dependency injection*: The container can inject several resources into an EJB
    (JMS destinations and factories, datasources, other EJBs, environment variables,
    and so on).


    • *State management*: For stateful session beans, the container manages their
    state transparently. You can maintain state for a particular client, as if you
    were developing a


    desktop application.


    • *Pooling*: For stateless beans and MDBs, the container creates a pool of instances
    that can be shared by multiple clients. Once invoked, an EJB returns to the pool
    to be


    reused instead of being destroyed.


    • *Component life cycle*: The container is responsible for managing the life cycle
    of each component.


    • *Messaging*: The container allows MDBs to listen to destinations and consume
    messages without too much JMS plumbing.


    • *Transaction management*: With declarative transaction management, an EJB can
    use annotations to inform the container about the transaction policy it should
    use. The


    container takes care of the commit or the rollback.


    • *Security*: Class or method-level access control can be specified on EJBs to
    enforce user and role authentication.


    • *Concurrency support*: Except for singletons, where some concurrency declaration
    is needed, all the other types of EJB are thread-safe by nature. You can develop
    high-performance applications without worrying about thread issues.'
