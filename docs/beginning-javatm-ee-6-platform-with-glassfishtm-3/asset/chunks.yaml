- fmt: '# HTTP 媒体类型


    `HTTP` 使用互联网媒体类型（最初称为 `MIME` 类型）在 `Content-Type` 和 `Accept` 头部字段中，以提供开放且可扩展的数据类型定义和类型协商。互联网媒体类型分为五个离散的顶级类别：`text`、`image`、`audio`、`video`
    和 `application`。这些类型进一步细分为多个子类型（如 `text/plain`、`text/xml`、`text/xhtml` 等）。以下是一些最常见的公共内容类型：


    - `text/html`：`HTML` 自 1990 年起就在万维网信息基础设施中使用，并在各种非正式文档中进行了规范。`text/html` 媒体类型于
    1995 年由 `IETF HTML` 工作组首次正式定义。有关该媒体类型的完整定义，请参阅 `RFC 2854`。

    - `text/plain`：这是默认的内容类型，用于简单的文本消息。

    - `image/gif`、`image/jpeg`、`image/png`：此图像顶级媒体类型需要显示设备（如图形显示器、图形打印机等）来查看信息。

    - `text/xml`、`application/xml`：`W3C` 于 1998 年 2 月发布了可扩展标记语言（`XML`）1.0。有关该媒体类型的完整定义，请参阅
    `RFC 3023`。

    - `application/json`：`JavaScript` 对象表示法（`JSON`）是一种独立于编程语言的轻量级数据交换文本格式。


    # 状态码


    每次收到响应时，都会关联一个 `HTTP` 状态码。规范定义了大约 60 个状态码。`Status-Code` 元素是一个三位整数，用于描述响应的上下文，并且是响应信封的一部分。第一位数字指定了五类响应之一：


    - `1xx`：信息性。请求已收到，处理正在进行中。

    - `2xx`：成功。操作已成功接收、理解并接受。

    - `3xx`：重定向。需要采取进一步操作才能完成请求。

    - `4xx`：客户端错误。请求包含错误的语法或无法完成。

    - `5xx`：服务器错误。服务器未能完成一个看似有效的请求。


    以下是一些您可能已经遇到过的状态码：


    - `200 OK`：请求已成功。实体主体（如果有）包含资源的表示。

    - `301 Moved Permanently`：请求的资源已被分配一个新的永久 `URI`，并且将来对此资源的任何引用都应使用返回的 `URI` 之一。

    - `404 Not Found`：服务器未找到与请求 `URI` 匹配的任何内容。

    - `500 Internal Server Error`：服务器遇到意外情况，导致无法完成请求。


    # 缓存与条件请求


    在大多数分布式系统中，缓存至关重要。缓存旨在通过避免不必要的请求或减少响应中的数据量来提高性能。`HTTP` 提供了允许缓存并确保缓存数据正确的机制。但如果客户端决定不使用任何缓存机制，即使资源自上次请求以来未被修改，它也需要始终请求数据。


    当发送对 `GET` 请求的响应时，它可以包含一个 `Last-Modified` 头部，指示资源最后被修改的时间。下次用户代理请求此资源时，它将在 `If-Modified-Since`
    头部中传递此日期。`Web` 服务器（或代理）会将此日期与最新的修改日期进行比较。如果用户代理发送的日期等于或更新，则返回一个 `304 Not Modified`
    状态码，且无响应主体。否则，执行或转发请求的操作。


    但日期可能难以处理，并且意味着所有交互的代理必须保持同步。`ETag` 响应头部解决了这个问题。将 `ETag` 视为表示中所有字节的 `MD5` 或 `SHA1`
    哈希是最简单的理解方式；如果表示中只有一个字节发生变化，`ETag` 就会改变。在 `GET` 响应中接收到的 `ETag` 值可以在后续的 `If-Match`
    请求头部中设置。


    图 15-2 给出了如何使用 `ETag` 的示例。要获取图书资源，您使用 `GET` 操作并提供资源的 `URI`（`GET /book/12345`）。服务器将返回一个响应，其中包含图书的
    `XML` 表示、`200 OK` 状态码以及生成的 `ETag`。第二次请求同一资源时，如果您在请求中传递了 `ETag` 值，服务器将不会发送资源的表示，而是返回一个
    `304 Not Modified` 状态码，告知客户端自上次访问以来资源未发生变化。


    **图 15-2.** *使用缓存和 304 Not Modified 状态码*


    使用 `HTTP` 头部 `If-Modified-Since`、`If-Unmodified-Since`、`If-Match`、`If-None-Match`
    和 `If-Range` 的请求被称为条件请求。条件请求可以通过避免不必要的往返或数据传输来节省带宽和 `CPU`（在服务器和客户端两侧）。`If-*` 头部最常用于
    `GET` 和 `PUT` 请求。


    # RESTful Web 服务规范


    与依赖 `W3C` 标准的 `SOAP` 和 `WS-*` 堆栈相反，`REST` 没有标准，只是一种具有设计准则的架构风格。`REST` 应用程序严重依赖许多其他标准：


    - `HTTP`

    - `URI`、`URL`

    - `XML`、`JSON`、`HTML`、`GIF`、`JPEG` 等（资源表示）


    `Java` 方面已通过 `JAX-RS` 进行了规范，但 `REST` 更像是一种设计模式：一种可重用的解决方案，用于解决可由多种语言实现的常见问题。


    ## REST 简史


    术语 `REST` 最早由 Roy Thomas Fielding 在其博士论文第 5 章中提出，论文标题为 *Architectural Styles and
    the Design of Network-based Software Architectures*（加州大学尔湾分校，2000 年，[http://www.ics.uci.edu/~fielding/pubs/dissertation/top.htm](http://www.ics.uci.edu/~fielding/pubs/dissertation/top.htm)）。


    该论文是对开发 `Web` 所选架构的回顾性解释。


    在他的论文中，Fielding 审视了万维网中运行良好的部分，并提取了设计原则，这些原则可以使任何其他分布式超媒体系统——无论是否与 `Web` 相关——同样高效。


    开发 `REST` 的最初动机是为 `Web` 创建一个架构模型。Roy T. Fielding 也是 `HTTP` 规范的作者之一，因此 `HTTP` 非常符合他在论文中描述的架构设计也就不足为奇了。


    ## JAX-RS 1.1


    要编写 `RESTful Web` 服务，您只需要一个支持 `HTTP` 的客户端和服务器。任何浏览器和 `HTTP Servlet` 容器都可以完成这项工作，但代价是需要一些
    `XML` 配置和粘合代码的麻烦。最终，这些代码可能难以阅读和维护。这时，`JAX-RS` 就派上了用场。`JAX-RS` 规范的第一个版本于 2008 年
    10 月最终确定，它定义了一组促进 `REST` 架构风格的 `API`。它是 `RESTful Web` 服务的 `JCP` 标准（`JSR 311`）。通过注解，它简化了
    `RESTful Web` 服务的实现并提高了生产力。该规范仅涵盖 `REST` 的服务器端方面。


    ### JAX-RS 1.1 的新特性


    `JAX-RS 1.1` 是一个维护版本，专注于与 `Java EE 6` 及其新特性的集成。`JAX-RS 1.1` 的主要新特性如下：


    - 它提供了对无状态会话 Bean 作为根资源的支持。

    - 允许将外部资源（持久化管理器、数据源、`EJB` 等）注入到 `REST` 资源中。

    - `JAX-RS` 注解可以应用于 Bean 的本地接口或直接应用于无接口 Bean。'
  raw: 'HTTP uses Internet media types (originally called MIME types) in the Content-Type
    and Accept header fields in order to provide open and extensible data typing and
    type negotiation. Internet media types are divided into five discrete, top-level
    categories: text, image, audio, video, and application. These types are further
    divided into several subtypes (text/plain, text/xml, text/xhtml, etc.). Some of
    the most common public content types are as follows:


    • text/html: HTML has been in use in the World Wide Web information infrastructure


    since 1990 and specified in various informal documents. The text/html media type
    was


    first officially defined by the IETF HTML working group in 1995\. For a complete
    defini-


    tion of the media type, refer to RFC 2854.


    • text/plain: This is the default content type, as it’s used for simple text messages.


    • image/gif, image/jpeg, image/png: This image top-level media type requires a
    display device (such as a graphical display, a graphics printer, etc.) to view
    the information.


    Chapter 15 ■ reStFUL WeB SerVICeS


    **435**


    • text/xml, application/xml: The W3C issued Extensible Markup Language (XML) 1.0
    in


    February 1998\. For a complete definition of the media type, refer to RFC 3023.


    • application/json: JavaScript Object Notation (JSON) is a lightweight data-interchange
    text format independent of the programming language.


    Status Codes


    Each time a response is received, an HTTP code is associated with it. The specification
    defines around 60 status codes. The Status-Code element is a three-digit integer
    that describes the context of a response and is part of the response envelope.
    The first digit specifies one of five classes of response:


    • *1xx*: Informational. The request was received, and the process is continuing.


    • *2xx*: Success. The action was successfully received, understood, and accepted.


    • *3xx*: Redirection. Further action must be taken in order to complete the request.


    • *4xx*: Client Error. The request contains bad syntax or cannot be fulfilled.


    • *5xx*: Server Error. The server failed to fulfill an apparently valid request.


    Following are some status codes you might have already come across:


    • *200 OK*: The request has succeeded. The entity body, if any, contains the representation
    of the resource.


    • *301 Moved Permanently*: The requested resource has been assigned a new, permanent
    URI and any future reference to this resource should use one of the returned URIs.


    • *404 Not Found*: The server has not found anything matching the request URI.


    • *500 Internal Server Error*: The server encountered an unexpected condition
    that prevented it from fulfilling the request.


    Caching and Conditional requests


    In most distributed systems, caching is crucial. Caching aims at improving performance
    by avoiding unnecessary requests or by reducing the amount of data in responses.
    HTTP provides mechanisms to allow caching and make sure cached data is correct.
    But if the client decides not to use any caching mechanism, it will always need
    to request data even if it hasn’t been modified since the last request.


    When a response to a GET is sent, it could include a Last-Modified header indicating
    the time that the resource was last modified. The next time the user agent requests
    this resource, it will pass this date in the If-Modified-Since header. The web
    server (or a proxy) will compare this date with the latest modification date.
    If the date sent by the user agent is equal or newer, a 304 Not Modified status
    code with no response body is returned. Otherwise, the requested operation is
    performed or forwarded.


    ![Image 132](index-466_1.jpg)


    **436**


    Chapter 15 ■ reStFUL WeB SerVICeS


    But dates can be difficult to manipulate and imply that all the interacting agents
    are, and stay, synchronized. The ETag response header solves this issue. The easiest
    way to think of an ETag is as an MD5 or SHA1 hash of all the bytes in a representation;
    if just one byte in the representation changes, the ETag will change. The ETag
    value received in a GET response can be set later, on an If-Match request header.


    Figure 15-2 gives an example of how to use ETags. To get a book resource, you
    use the GET


    action and give it the URI of the resource (GET /book/12345). The server will
    return a response with the XML representation of the book, a 200 OK status code,
    and a generated ETag. The second time you ask for the same resource, if you pass
    the ETag value in the request, the server will not send the representation of
    the resource, returning instead a 304 Not Modified status code informing the client
    that the resource hasn’t changed since last access.


    **Figure 15-2.** *Using caching and the 304 Not Modified status code*


    Requests using the HTTP headers If-Modified-Since, If-Unmodified-Since, If-Match,


    If-None-Match, and If-Range are said to be conditional. Conditional requests can
    save bandwidth and CPU (on both the server and client side) by avoiding unnecessary
    round-trips or data transmissions. The If-* headers are most often used for GET
    and PUT requests.


    **RESTful Web Services Specification**


    Contrary to SOAP and the WS-* stack, which rely on W3C standards, REST has no
    standard and is just a style of architecture with design criteria. REST applications
    rely heavily on many other standards:


    • HTTP


    • URI, URL


    • XML, JSON, HTML, GIF, JPEG, and so forth (resource representations)


    The Java side has been specified through JAX-RS, but REST is like a design pattern:
    a


    reusable solution to a common problem that can be implemented by several languages.


    **A Brief History of REST**


    The term REST was first introduced by Roy Thomas Fielding in Chapter 5 of his
    PhD thesis, *Architectural Styles and the Design of Network-based Software Architectures*
    (University of California, Irvine, 2000, [http://www.ics.uci.edu/~fielding/pubs/dissertation/top.htm).](http://www.ics.uci.edu/~fielding/pubs/dissertation/top.htm)


    The dissertation is a retrospective explanation of the architecture chosen to
    develop the Web.


    Chapter 15 ■ reStFUL WeB SerVICeS


    **437**


    In his thesis, Fielding takes a look at the parts of the World Wide Web that work
    very well and extracts design principles that could make any other distributed
    hypermedia system—whether related to the Web or not—as efficient.


    The original motivation for developing REST was to create an architectural model
    of the Web. Roy T. Fielding is also one of the authors of the HTTP specification,
    so it’s not surprising that HTTP fits quite well the architectural design he described
    in his dissertation.


    **JAX-RS 1.1**


    To write RESTful web services, you only need a client and a server supporting
    HTTP. Any browser and an HTTP servlet container will do the job at the cost of
    some XML configuration and glue-code pain. At the end, this code may be barely
    readable and maintainable. This is when JAX-RS comes to the rescue. The first
    version of the JAX-RS specification, finalized in October 2008, defines a set
    of APIs that promotes the REST architecture style. It is the JCP


    standard for RESTful web services (JSR 311). Through annotations, it simplifies
    the implementation of RESTful web services and brings about productivity. The
    specification only covers the server-side aspect of REST.


    **What’s New in JAX-RS 1.1?**


    JAX-RS 1.1 is a maintenance release focusing on integration with Java EE 6 and
    its new features. The major novelties of JAX-RS 1.1 are as follows:


    • It provides support for stateless session beans as root resources.


    • External resources (persistence manager, data sources, EJBs, etc.) are allowed
    to be injected into a REST resource.


    • JAX-RS annotations can be applied to a bean’s local interface or directly to
    a


    no-interface bean.'
