    jaxws-rt version (2.2), as well as the JDK version (1.6). The Main class is packaged
    in a jar file, and like every jar file, it has a META-INF\MANIFEST.MF file. This
    file can be used to define some metadata about the jar, and that’s what you do
    when you use the maven-jar-plugin. You add a Main-Class element to the MANIFEST
    pointing to the consumer Main class. This will allow execution of the jar file.


