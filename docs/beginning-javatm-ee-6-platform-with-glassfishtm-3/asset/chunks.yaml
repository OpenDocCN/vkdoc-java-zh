    第 14 章 ■ SOAP Web 服务


    不幸的是，有时你需要深入研究 WSDL 结构。


    由于 WSDL 文档是消费者与服务之间的契约，因此它可以用于编写消费者和服务的 Java 代码。这就是*自顶向下方法*，也称为*契约优先*。这种方法从契约（WSDL）开始，通过定义操作、消息等。当消费者和提供者都同意该契约后，你就可以基于该契约实现
    Java 类。Metro 提供了一些工具，可以从 WSDL 生成类。


    另一种方法称为*自底向上*，即实现类已经存在，只需要创建 WSDL。同样，Metro 提供了从现有类生成 WSDL 的实用程序。在这两种情况下，有时需要调整代码以适应
    WSDL，反之亦然。这时 JAX-WS 就能派上用场。通过简单的开发模型和少量注解，可以调整 Java 到 WSDL 的映射。自底向上方法可能导致应用程序效率非常低下，因为
    Java 方法和类与跨网络传输的理想消息粒度无关。如果延迟高和/或带宽低，使用最少、最大的消息是值得的，而这只能通过使用契约优先方法来实现。


    本章介绍了通用的 Web 服务概念和规范，然后讨论了用于 XML 绑定的 JAXB，以及 WSDL 和 SOAP 文档的表面内容。但 Web 服务遵循 Java
    EE 6 的“易于开发”范式，并不要求你编写任何 WSDL 或 SOAP。Web 服务只是一个带有注解的 POJO，需要部署在 Web 服务容器中。然而，Web
    服务编程模型还有更多内容。


    **JAX-WS 模型**


    与大多数 Java EE 6 组件一样，Web 服务依赖于“异常配置”范式，该范式规定配置组件是一种例外情况。实际上，只需要一个注解就能将 POJO 转换为
    Web 服务：@WebService。编写 Web 服务的要求如下：


    • 该类必须使用 @javax.jws.WebService 或部署描述符中的等效 XML 进行注解。


    • 要将 Web 服务转换为 EJB 端点，该类必须使用 @javax.ejb.Stateless 进行注解（如第 7 章所示）。

