- fmt: "# Messaging Concepts and Example\n\nThe most important concepts of messaging\
    \ are P2P and pub-sub models, administered objects (`connection factories` and\
    \ `destinations`), how to connect to a provider and produce or consume messages,\
    \ some reliability mechanisms used by JMS, and how to use container-managed components\
    \ (`MDBs`) to listen to destinations. So now let’s see how these concepts work\
    \ together through an example, compile and package it with Maven, and deploy it\
    \ in GlassFish.\n\nThe example uses a stand-alone class (`OrderSender`) that sends\
    \ messages to a queue (called `jms/javaee6/Queue`). These messages are objects\
    \ representing a customer order of books and CDs. This object (`OrderDTO`) has\
    \ several attributes, including the total amount of the order. On the other side\
    \ of the queue, an MDB (`OrderMDB`) consumes only orders that have a total amount\
    \ greater than $1,000. This amount is passed as a parameter to the `OrderSender`\
    \ class.\n\nBecause Maven needs to structure the code based on the final packaging\
    \ artifacts, the `OrderSender` will get deployed in one jar file, the `OrderMDB`\
    \ in another one, and the `OrderDTO` class will be common to both jar files.\n\
    \n## Writing the OrderDTO\n\nThe object that will be sent in the JMS message is\
    \ a POJO that needs to implement the `Serializable` interface. The `OrderDTO`\
    \ class, shown in Listing 13-13, gives some information about the order, including\
    \ its total amount; it is the object that will be set into a JMS `ObjectMessage`\
    \ and sent from the `OrderSender` to the `OrderMDB`.\n\n**Listing 13-13.** *The\
    \ OrderDTO Is Passed in a JMS ObjectMessage*\n\n```\npublic class OrderDTO implements\
    \ Serializable {\n\n    private Long orderId;\n    private Date creationDate;\n\
    \    private String customerName;\n    private Float totalAmount;\n\n    // Constructors,\
    \ getters, setters\n}\n```\n\n## Writing the OrderSender\n\nThe `OrderSender`,\
    \ shown in Listing 13-14, is a stand-alone client that uses the JMS API to send\
    \ an `ObjectMessage` to the `jms/javaee6/Queue` queue. It gets injected with the\
    \ necessary connection factory and destination, and in the `main()` method creates\
    \ an instance of an `OrderDTO` class. Note that the `totalAmount` of the order\
    \ is an argument passed to the class (`args[0]`). An `ObjectMessage` is created\
    \ from the `Session`, and with the `message.setObject(order)` method, the order\
    \ is set into the body of the message. Note that the total amount is set into\
    \ a property (`message.setFloatProperty()`) for selection later.\n\n**Listing\
    \ 13-14.** *The OrderSender Sends an OrderDTO in a Message*\n\n```\npublic class\
    \ OrderSender {\n\n    @Resource(mappedName = \"jms/javaee6/ConnectionFactory\"\
    )\n    private static ConnectionFactory connectionFactory;\n\n    @Resource(mappedName\
    \ = \"jms/javaee6/Queue\")\n    private static Queue queue;\n\n    public static\
    \ void main(String[] args) {\n        // Creates an orderDto with a total amount\
    \ parameter\n        Float totalAmount = Float.valueOf(args[0]);\n        OrderDTO\
    \ order = new OrderDTO(1234l, new Date(),\n                \"Serge Gainsbourg\"\
    , totalAmount);\n\n        try {\n            // Creates the needed artifacts\
    \ to connect to the queue\n            Connection connection = connectionFactory.createConnection();\n\
    \            Session session = connection.createSession(false,\n             \
    \       Session.AUTO_ACKNOWLEDGE);\n            MessageProducer producer = session.createProducer(queue);\n\
    \n            // Sends a text message to the queue\n            ObjectMessage\
    \ message = session.createObjectMessage();\n            message.setObject(order);\n\
    \            message.setFloatProperty(\"orderAmount\", totalAmount);\n       \
    \     producer.send(message);\n\n            connection.close();\n        } catch\
    \ (Exception e) {\n            e.printStackTrace();\n        }\n    }\n}\n```\n\
    \n## Writing the OrderMDB\n\nThe `OrderMDB` class (see Listing 13-15) is an MDB\
    \ annotated with `@MessageDriven` that listens to the `jms/javaee6/Queue` destination.\
    \ This MDB is only interested in orders greater than $1,000, using a message selector\
    \ (`orderAmount > 1000`). At message arrival, the `onMessage()` method consumes\
    \ it, casts it to an `ObjectMessage`, and gets the body of the message (`msg.getObject()`).\
    \ For this example, only the message is displayed, but other processing could\
    \ have also been done.\n\n**Listing 13-15.** *The OrderMDB Receives an ObjectMessage*"
