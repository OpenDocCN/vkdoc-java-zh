    不要被清单 4-4 中的 API 吓到，本章将涵盖其中的大部分方法。


    在下一节中，我将解释如何获取 `EntityManager` 的实例。


    **获取实体管理器**


    实体管理器是与实体交互的核心接口，但它首先需要由应用程序获取。根据是容器管理环境（例如你将在第 6 章中看到的 EJB 环境）还是应用程序管理环境，代码可能会有很大不同。例如，在容器管理环境中，事务由容器管理。这意味着你无需显式编写提交或回滚代码，而在应用程序管理环境中则必须这样做。


    术语“应用程序管理”意味着应用程序负责显式获取 `EntityManager` 的实例并管理其生命周期（例如，在完成后关闭实体管理器）。前面展示的清单 4-2
    演示了在 Java SE 环境中运行的类如何获取实体管理器的实例。它使用 `Persistence` 类来引导一个与持久化单元（`chapter04PU`）关联的
    `EntityManagerFactory`，然后使用该工厂创建实体管理器。使用工厂创建应用程序管理的实体管理器非常简单，但区分应用程序管理与容器管理的关键在于工厂的获取方式。


    容器管理环境是指应用程序在 Servlet 或 EJB 容器中运行的情况。在 Java EE 环境中，获取实体管理器最常见的方式是通过 `@PersistenceContext`
    注解注入一个，或者通过 JNDI 查找。在容器（Servlet、EJB、Web 服务等）中运行的组件无需创建或关闭实体管理器，因为其生命周期由容器管理。清单
