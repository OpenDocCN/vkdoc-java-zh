    gets injected a reference of the web service, invokes the validate() method, and
    displays the result (true or false depending on whether the credit card is valid).
    The interesting thing is that the consumer does not have any of these classes.
    The CardValidatorService, CardValidator, and


    CreditCard are totally unknown to the consumer. This code will not compile until
    all these classes are generated.


