- fmt: '# The logic is only done via tags, and this page is totally XML compliant,
    using a markup language easy for non-Java programmers to read and understand.


    ## Formatting Actions


    Formatting actions provide support for formatting dates, numbers, currencies,
    and percentages, and also support internationalization (i18n). You can get or
    set locales and time zones, or get the encoding of the web page. Table 11-4 shows
    the actions contained in the format library.


    **Table 11-4.** *Formatting Actions*


    | Action | Description |

    |--------|-------------|

    | `<fmt:message>` | Internationalizes a JSP by pulling a message from a message
    bundle |

    | `<fmt:param>` | Supplies a parameter for `<fmt:message>` |

    | `<fmt:bundle>` | Determines the resource bundle |

    | `<fmt:setLocale>` | Sets the locale |

    | `<fmt:requestEncoding>` | Sets the request’s character encoding |

    | `<fmt:timeZone>` | Specifies the time zone in which time information is to be
    formatted |

    | `<fmt:setTimeZone>` | Stores the specified time zone on a variable |

    | `<fmt:formatNumber>` | Formats a numeric value (number, currency, percentage)
    in a locale-sensitive manner |

    | `<fmt:parseNumber>` | Parses the string representation of numbers, currencies,
    and percentages |

    | `<fmt:formatDate>` | Formats dates and times in a locale-sensitive manner |

    | `<fmt:parseDate>` | Parses the string representation of dates and times |


    For an understanding of these tags, take a look at the JSP shown in Listing 11-7,
    which uses some of these actions to format dates and numbers, and internationalize
    currencies.


    **Listing 11-7.** *A JSP Formatting Dates and Numbers*


    ```

    <%@ page contentType="text/html;charset=UTF-8" language="java" %>

    <%@ taglib uri="http://java.sun.com/jsp/jstl/core" prefix="c" %>

    <%@ taglib uri="http://java.sun.com/jsp/jstl/fmt" prefix="fmt" %>

    <html>

    <body>

    Dates

    <c:set var="now" value="<%=new java.util.Date()%>"/>

    <fmt:formatDate type="time" value="${now}"/>

    <fmt:formatDate type="date" value="${now}"/>

    <fmt:formatDate type="both" dateStyle="short" timeStyle="short" value="${now}"/>

    <fmt:formatDate type="both" dateStyle="long" timeStyle="long" value="${now}"/>

    Currency

    <fmt:setLocale value="en_us"/>

    <fmt:formatNumber value="20.50" type="currency"/>

    <fmt:setLocale value="en_gb"/>

    <fmt:formatNumber value="20.50" type="currency"/>

    </body>

    </html>

    ```


    The page imports the core and format tag libraries using the `<%@ taglib>` directive
    element. The `<c:set var="now" value="<%=new java.util.Date()%>"/>` line sets
    the current date to a variable named `now`. The `<fmt:formatDate>` tag formats
    this date using different patterns: shows only the time, only the date, both time
    and date. The `<fmt:setLocale value="en_us"/>` line sets the locale to USA and
    formats currency so the result is `$20.50`. Then, the locale is changed to Great
    Britain and the result is changed to pounds sterling. This JSP produces the following
    result:


    ```

    Dates

    11:31:12

    14 may 2009

    14/02/09 11:31

    14 may 2009 11:31:12 CET

    Currency

    $20.50

    £20.50

    ```


    ## SQL Actions


    The JSTL SQL actions allow database queries (inserts, updates, and deletes), access
    query results, and even establish a transaction context. You have seen how to
    access a database using EJBs and JPA entities. Sometimes, for specific applications,
    you need to access the database from the web page (for example, for a noncritical
    administrative web application used once in a while by a single user). For this
    kind of use case, the SQL library and its rich set of tags can be useful (see
    Table 11-5).


    **Table 11-5.** *SQL Actions*


    | Action | Description |

    |--------|-------------|

    | `<sql:query>` | Queries a database |

    | `<sql:update>` | Executes a SQL INSERT, UPDATE, or DELETE statement |

    | `<sql:transaction>` | Establishes a transaction context for `<sql:query>` and
    `<sql:update>` subtags |

    | `<sql:setDataSource>` | Sets the datasource |

    | `<sql:param>` | Sets the values of parameter markers (?) in a SQL statement
    |

    | `<sql:dateParam>` | (Description not provided in original text) |'
