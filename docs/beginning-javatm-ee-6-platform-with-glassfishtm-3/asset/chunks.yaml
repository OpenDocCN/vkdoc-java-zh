    \n**图14-5.** *Web服务生命周期*\n\nServlet和EJB端点都支持依赖注入（因为它们运行在容器中）以及生命周期方法，例如`@PostConstruct`和`@PreDestroy`。当容器创建Web服务实例时，会调用`@PostConstruct`回调方法（如果存在）；当销毁实例时，会调用`@PreDestroy`回调。\n\
    \nServlet和EJB端点的一个区别是EJB可以使用拦截器。拦截器是第8章描述的面向切面编程（AOP）概念的Java EE实现。\n\n## Web服务上下文\n\
    \nWeb服务拥有一个环境上下文，可以通过使用`@Resource`注解注入`javax.xml.ws.WebServiceContext`引用来访问它。在此上下文中，Web服务可以获取运行时信息，例如端点实现类、消息上下文以及与被服务的请求相关的安全信息。\n\
    \n```java\n@Resource\nprivate WebServiceContext context;\n```\n\n表14-2列出了`javax.xml.ws.WebServiceContext`接口中定义的方法。\n\
