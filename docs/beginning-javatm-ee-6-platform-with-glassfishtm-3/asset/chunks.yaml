  raw: 'As you now know, with JPA, if an attribute is not annotated, the default mapping
    rules are applied. So by default, the foreign key column is named ADDRESS_ID (see
    Listing 3-40), which is the concatenation of the name of the relationship attribute
    (here address), the symbol _, and the name of the primary key column of the destination
    table (here it will be the column ID of the ADDRESS table). Also notice that in
    the DDL, the ADDRESS_ID column is nullable by default, meaning that by default,
    a one-to-one association is mapped to a zero (null value) or one.


    To customize the mapping, you can use two annotations. The first one is @OneToOne
    (that’s because the cardinality of the relation is one), and it can modify some
    attributes of the association itself such as the way is has to be fetched. The
    API of the @OneToOne annotation is defined in Listing 3-42.


    **Listing 3-42.** *@OneToOne Annotation API*


    @Target({METHOD, FIELD}) @Retention(RUNTIME)


    public @interface **OneToOne** {


    Class targetEntity() default void.class;


    CascadeType[] cascade() default {};


    FetchType fetch() default EAGER;


    boolean optional() default true;


    String mappedBy() default "";


    boolean orphanRemoval() default false;


    }


    The other is @JoinColumn (its API is very similar to @Column). It is used to customize
    the join column, meaning the foreign key, of the owning side. Listing 3-43 shows
    how you would use these two annotations.


    **Listing 3-43.** *The Customer Entity with Customized Relationship Mapping*


    @Entity


    public class Customer {


    @Id @GeneratedValue


    private Long id;


    private String firstName;


    private String lastName;


    ![Image 43](index-126_1.jpg)


    **96**


    Chapter 3 ■ OBJeCt-reLatIONaL MappING


    private String email;


    private String phoneNumber;


    **@OneToOne (fetch = FetchType.LAZY)**


    **@JoinColumn(name = "add_fk", nullable = false)**


    private Address address;


    // Constructors, getters, setters


    }


    In JPA, a foreign key column is called a join column. The @JoinColumn annotation
    allows you to customize the mapping of a foreign key. It is used in Listing 3-43
    to rename the foreign key column to ADD_FK and make the relationship obligatory
    by refusing the null value (nullable=false). The @OneToOne annotation gives the
    persistence provider a hint to fetch the relationship lazily.


    @OnetoMany Unidirectional


    A one-to-many relationship is when one source object refers to an ensemble of
    target objects.


    For example, a purchase order is composed of several order lines (see Figure 3-16).
    The order line could refer to the purchase order with a corresponding @ManyToOne
    annotation. Order is the “one” side and the source of the relationship, and OrderLine
    is the “many” side and the target.


    **Figure 3-16.** *One order has several lines.*


    The cardinality is multiple, and the navigation is done only from Order toward
    OrderLine.


    In Java, this multiplicity is described by the Collection, List, and Set interfaces
    of the java.


    util package. Listing 3-44 shows the code of the Order entity with a one-way,
    one-to-many relationship toward OrderLine (see Listing 3-45).


    **Listing 3-44.** *An Order Contains OrderLines*


    @Entity


    public class Order {


    @Id @GeneratedValue


    private Long id;


    @Temporal(TemporalType.TIMESTAMP)


    private Date creationDate;


    **private List<OrderLine> orderLines;**


    // Constructors, getters, setters


    }


    ![Image 44](index-127_1.jpg)


    Chapter 3 ■ OBJeCt-reLatIONaL MappING


    **97**


    **Listing 3-45.** *An OrderLine*


    @Entity


    @Table(name = " **order_line**")


    public class OrderLine {


    @Id @GeneratedValue


    private Long id;


    private String item;


    private Double unitPrice;


    private Integer quantity;


    // Constructors, getters, setters


    }


    The code in Listing 3-44 doesn’t have any special annotation and relies on the
    configu-


    ration-by-exception paradigm. The fact that a collection of an entity type is
    being used as an attribute on this entity triggers a OneToMany relationship mapping
    by default. By default, one-to-many unidirectional relationships use a join table
    to keep the relationship information, with two foreign key columns. One foreign
    key column refers to the table ORDER and has the same type as its primary key,
    and the other refers to ORDER_LINE. The name of this joined table is the name
    of both entities, separated by the _ symbol. The join table is named ORDER_ORDER_


    LINE and will result in the schema structure illustrated in Figure 3-17.


    **Figure 3-17.** *Join table between ORDER and ORDER_LINE*


    If you don’t like the join table name and foreign key names, or if you are mapping
    to an existing table, you can use JPA annotations to redefine these default values.
    The default value for a join column is the concatenation of the name of the entity,
    the symbol _, and the name of the referenced primary key. As the @JoinColumn annotation
    can be used to change the foreign key columns, the @JoinTable annotation can do
    the same for the join table mapping. You can also use the @OneToMany annotation
    (see Listing 3-46), which like @OneToOne customizes the relationship itself (using
    fetch mode and so on).


    **Listing 3-46.** *@JoinTable Annotation API*


    @Target({METHOD, FIELD}) @Retention(RUNTIME)


    public @interface **JoinTable** {


    String name() default "";


    String catalog() default "";


    String schema() default "";


    **98**


    Chapter 3 ■ OBJeCt-reLatIONaL MappING


    JoinColumn[] **joinColumns**() default {};


    JoinColumn[] **inverseJoinColumns**() default {};


    UniqueConstraint[] uniqueConstraints() default {};


    }


    On the API of the @JoinTable annotation in Listing 3-46, you can see two attributes
    that are of type @JoinColumn: joinColumns and inverseJoinColumns. These two attributes
    are distinguished by means of the owning side and the inverse side. The owning
    side (the owner of the relationship) is described in the joinColumns element and,
    in our example, refers to the ORDER


    table. The inverse side, the target of the relationship, is specified by the inverseJoinColumns
    element and refers to ORDER_LINE.


    Using the Order entity (see Listing 3-47), you can add the @OneToMany and @JoinTable


    annotations on the orderLines attribute by renaming the join table to JND_ORD_LINE
    (instead of ORDER_ORDER_LINE), as well as the two foreign key columns.


    **Listing 3-47.** *The Order Entity with Annotated One-to-Many Relationship*


    @Entity


    public class Order {


    @Id @GeneratedValue


    private Long id;


    @Temporal(TemporalType.TIMESTAMP)


    private Date creationDate;


    **@OneToMany**


    **@JoinTable**(name = " **jnd_ord_line**",


    **joinColumns** = @JoinColumn(name = " **order_fk**"),


    **inverseJoinColumns** = @JoinColumn(name = " **order_line_fk**") )


    private List<OrderLine> orderLines;


    // Constructors, getters, setters


    }


    The Order entity in Listing 3-47 will get mapped to the join table described in
    Listing 3-48.


    **Listing 3-48.** *Structure of the Join Table*


    create table **JND_ORD_LINE** (


    **ORDER_FK** BIGINT not null,


    **ORDER_LINE_FK** BIGINT not null,


    primary key (ORDER_FK, ORDER_LINE_FK),


    foreign key (ORDER_LINE_FK) references ORDER_LINE(ID),


    foreign key (ORDER_FK) references ORDER(ID)


    );


    The default rule for a one-to-many unidirectional relationship is to use a join
    table, but it is very easy (and useful for legacy databases) to change to using
    foreign keys. The Order entity has to provide a @JoinColumn annotation instead
    of a @JoinTable, allowing the code to be changed as shown in Listing 3-49.


    ![Image 45](index-129_1.jpg)


    Chapter 3 ■ OBJeCt-reLatIONaL MappING


    **99**


    **Listing 3-49.** *The Order Entity with a Join Column*


    @Entity


    public class Order {


    @Id @GeneratedValue


    private Long id;


    @Temporal(TemporalType.TIMESTAMP)


    private Date creationDate;


    @OneToMany(fetch = FetchType.EAGER)


    **@JoinColumn(name = "order_fk")**


    private List<OrderLine> orderLines;


    // Constructors, getters, setters


