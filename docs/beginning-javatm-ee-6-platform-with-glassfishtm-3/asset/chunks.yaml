    **拦截器**


    在讨论拦截器之前，我想简要讨论一下面向切面编程（AOP）。AOP 是一种编程范式，它将横切关注点（跨越应用程序的关注点）与业务代码分离开来。大多数应用程序都有跨组件重复的通用代码。这些可能是技术关注点（记录每个方法的进入和退出、记录方法调用的持续时间、存储方法使用统计信息等）或业务关注点（如果客户购买超过
    10,000 美元的商品则执行额外检查、当库存水平过低时发送补货订单等）。这些关注点可以通过 AOP 自动应用于整个应用程序或其子集。


    EJB 通过提供拦截器来拦截方法调用的能力，支持类似 AOP 的功能。当调用 EJB 方法时，容器会自动触发拦截器。如图 8-3 所示，拦截器可以链接起来，并在方法执行之前和/或之后被调用。


    ■**注意** 拦截器可以应用于会话 Bean 和消息驱动 Bean。在第 14 章和第 15 章中，你将看到 SOAP 或 RESTful Web 服务也可以实现为
    EJB 端点（通过添加 @Stateless 注解）。如果是这种情况，这些 Web 服务也可以使用拦截器。


    **图 8-3.** *容器拦截调用并调用拦截器*


    图 8-3 向你展示了在客户端和 EJB 之间调用的多个拦截器。你可以将 EJB 容器本身视为一个拦截器链。当你开发会话 Bean 时，你只需专注于业务代码。但在幕后，当客户端调用你的
    EJB 上的方法时，容器会拦截该调用并应用不同的服务（生命周期管理、事务、安全性等）。通过拦截器，你可以添加自己的横切机制，并将其透明地应用于业务代码。


