    Chapter 3 ■ OBJeCt-reLatIONaL MappING


    **117**


    **Summary**


    Thanks to configuration by exception, not much is required to map entities to
    tables; inform the persistence provider that a class is actually an entity (using
    @Entity) and an attribute is its identifier (using @Id), and JPA does the rest.
    This chapter could have been much shorter if it stuck to the defaults. JPA has
    a very rich set of annotations to customize every little detail of ORM.


    Elementary annotations can be used on attributes (@Basic, @Temporal, etc.) or
    classes to customize the mapping. You can change the table’s name or the primary
    key type, or even avoid mapping with the @Transient annotation. With JPA 2.0,
    you can now map collections of basic types or embeddables. Depending on your business
    model, you can map relationships (@OneToOne, @ManyToMany, etc.) of different directions
    and multiplicity. Same thing with inheritance (@Inheritance, @MappedSuperclass,
    etc.) where you can use different strategies to map a hierarchy of entities and
    nonentities mixed together.


    This chapter focused on the static part of JPA, or how to map entities to tables.
    The next chapter will deal with the dynamic aspects: how to query these entities.


    C h a p t e r 4


    Managing persistent Objects


    **J**ava Persistence API has two sides. The first is the ability to map objects
    to a relational database. Configuration by exception allows persistence providers
    to do most of the work without much code, but the richness of JPA also allows
    customized mapping from objects to tables using either annotation or XML descriptors.
    From simple mapping (changing the name of a column) to more complex mapping (inheritance),
    JPA offers a wide spectrum of customiza-tions. As a result, you can map almost
    any object model to a legacy database.


    The other aspect of JPA is the ability to query these mapped objects. In JPA,
    the centralized service to manipulate instances of entities in a standard way
    is the entity manager. It provides an API to create, find, remove, and synchronize
    objects with the database. It also allows execution of different sorts of JPQL
    queries against entities such as dynamic, static, or native queries. Locking mechanisms
    are also possible with the entity manager.


    The database world relies on Structured Query Language (SQL). This programming
    lan-


    guage is designed for managing relational data (retrieval, insertion, updating,
    and deletion), and its syntax is table oriented. You can select columns from tables
    made of rows, join tables together, combine the results of two SQL queries through
    unions, and so on. There are no objects here, only rows, columns, and tables.
    In the Java world, where we manipulate objects, a language made for tables (SQL)
    has to be twisted to suit a language made of objects (Java).'
