- fmt: "`@HeaderParam` extracts the value of a header field. The following code extracts\
    \ the session ID from the cookie:\n\n```\n@Path(\"/products\")\npublic class ItemsResource\
    \ {\n    @GET\n    public Book getBook(@CookieParam(\"sessionid\") int sessionid)\
    \ {\n        // ...\n    }\n}\n```\n\nThe `@FormParam` annotation specifies that\
    \ the value of a parameter is to be extracted from a form in a request entity\
    \ body. `@FormParam` is not required to be supported on fields or properties.\n\
    \nWith all these annotations you can add a `@DefaultValue` annotation to define\
    \ the default value for a parameter you’re expecting. The default value is used\
    \ if the corresponding metadata is not present in the request. In the following\
    \ code, if the query parameter `age` is not in the request, the default value\
    \ `50` is set:\n\n```\n@Path(\"/customers\")\npublic class CustomersResource {\n\
    \    @GET\n    public Response getCustomers(@DefaultValue(\"50\") @QueryParam(\"\
    age\") int age) {\n        // ...\n    }\n}\n```\n\n## Consuming and Producing\
    \ Content Types\n\nWith REST, a resource can have several representations; a book\
    \ can be represented as a web page, XML data, or an image showing the album cover.\
    \ The `@javax.ws.rs.Consumes` and `@javax.ws.rs.Produces` annotations may be applied\
    \ to a resource where several representations are possible. It defines the media\
    \ types of the representation exchanged between the client and the server. Use\
    \ of these annotations on a resource method overrides any on the resource class\
    \ for a method argument or return type. In the absence of either of these annotations,\
    \ support for any media type (`*/*`) is assumed. By default, `CustomerResource`\
    \ produces plain text representations that are overridden in some methods (see\
    \ Listing 15-5).\n\n**Listing 15-5.** *A Customer Resource with Several Representations*\n\
    \n```\n@Path(\"/customers\")\n@Produces(\"text/plain\")\npublic class CustomersResource\
    \ {\n    @GET\n    public String getAsPlainText() {\n        // ...\n    }\n\n\
    \    @GET\n    @Produces(\"text/html\")\n    public String getAsHtml() {\n   \
    \     // ...\n    }\n\n    @GET\n    @Produces(\"application/json\")\n    public\
    \ List<Customer> getAsJson() {\n        // ...\n    }\n\n    @PUT\n    @Consumes(\"\
    text/plain\")\n    public void putBasic(String customer) {\n        // ...\n \
    \   }\n\n    @POST\n    @Consumes(\"application/xml\")\n    public Response createCustomer(InputStream\
    \ is) {\n        // ...\n    }\n}\n```\n\nIf a resource is capable of producing\
    \ more than one Internet media type, the resource method chosen will correspond\
    \ to the most acceptable media type, as declared by the client in the `Accept`\
    \ header of the HTTP request. For example, if the `Accept` header is `Accept:\
    \ text/plain` and the URI is `/customers`, the `getAsPlainText()` method will\
    \ be invoked. The client could have used the following HTTP header:\n\n```\nAccept:\
    \ text/plain; q=0.8, text/html\n```\n\nThis header declares that the client can\
    \ accept media types of `text/plain` and `text/html` but prefers the latter using\
    \ the quality factor of `0.8` (“I prefer `text/html`, but send me `text/plain`\
    \ if it is the best available after an 80% markdown in quality”). By including\
    \ such a header and pointing at the `/customers` URI, the `getAsHtml()` method\
    \ will be invoked.\n\nIn Listing 15-5, the `getAsJson()` method returns a representation\
    \ of type `application/json`. JSON is a lightweight data-interchange format that\
    \ is less verbose and more readable than XML. Listing 15-6 shows a list of customers\
    \ in JSON.\n\n**Listing 15-6.** *A JSON Representation of Customers*\n\n```\n\
    {\"customers\": {\n    \"id\": \"0\",\n    \"version\": \"1\",\n    \"customer\"\
    : [\n        {\n            \"firstName\": \"Alexis\",\n            \"lastName\"\
    : \"Midon\",\n            \"address\": {\n                \"streetAddress\": \"\
    21 2nd Street\",\n                \"city\": \"New York\",\n                \"\
