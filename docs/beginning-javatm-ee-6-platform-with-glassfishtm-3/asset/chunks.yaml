- fmt: "# JPA Locking Mechanisms\n\nAs an example from everyday life that reinforces\
    \ these concepts, consider “optimistic and pessimistic street crossing.” In an\
    \ area with very light traffic, you might be able to cross the street without\
    \ checking for approaching cars. But not in a busy city center!\n\n`JPA` uses\
    \ different locking mechanism at different levels of the API. Both pessimistic\
    \ and optimistic locks can be obtained via the `EntityManager.find` and `EntityManager.refresh`\
    \ methods (in addition to the `lock` method), as well as through `JPQL` queries,\
    \ meaning locking can be achieved at the `EntityManager` level and at the `Query`\
    \ level with the methods listed in Tables 4-4 and 4-5.\n\n**Table 4-4.** *EntityManager\
    \ Methods to Lock Entities*\n\n| Method | Description |\n|--------|-------------|\n\
    | `<T> T find(Class<T> entityClass, Object primaryKey, LockModeType lockMode)`\
    \ | Searches for an entity of the specified class and primary key and locks it\
    \ with respect to the specified lock type |\n| `void lock(Object entity, LockModeType\
    \ lockMode)` | Locks an entity instance that is contained in the persistence context\
    \ with the specified lock mode type |\n| `void refresh(Object entity, LockModeType\
    \ lockMode)` | Refreshes the state of the instance from the database, overwriting\
    \ changes made to the entity, if any, and locks it with respect to the given lock\
    \ mode type |\n\n**Table 4-5.** *Query Method to Lock JPQL Queries*\n\n| Method\
    \ | Description |\n|--------|-------------|\n| `Query setLockMode(LockModeType\
    \ lockMode)` | Sets the lock mode type to be used for the query execution |\n\n\
    Each of these methods takes a `LockModeType` as a parameter that can take different\
    \ values:\n\n- `OPTIMISTIC`: Uses optimistic locking\n- `OPTIMISTIC_FORCE_INCREMENT`:\
    \ Uses optimistic locking and forces an increment to the entity’s version column\
    \ (See the upcoming “Versioning” section.)\n- `PESSIMISTIC_READ`: Uses pessimistic\
    \ locking without the need to reread the data at the end of the transaction to\
    \ obtain a lock\n- `PESSIMISTIC_WRITE`: Uses pessimistic locking and forces serialization\
    \ among transactions attempting to update the entity\n- `PESSIMISTIC_FORCE_INCREMENT`:\
    \ Uses pessimistic locking and forces an increment to the entity’s version column\
    \ (See the upcoming “Versioning” section.)\n- `NONE`: Specifies no locking mechanism\
    \ should be used\n\nYou can use these parameters on multiple places depending\
    \ how you need to specify locks. You can read *then* lock:\n\n```java\nBook book\
    \ = em.find(Book.class, 12);\n// Lock to raise the price\nem.lock(book, LockModeType.PESSIMISTIC);\n\
    book.raisePriceByTwoDollars();\n```\n\nOr you can read *and* lock:\n\n```java\n\
    Book book = em.find(Book.class, 12, LockModeType.PESSIMISTIC);\n// The book is\
    \ already locked, raise the price\nbook.raisePriceByTwoDollars();\n```\n\nConcurrency\
    \ and locking are key motivators for versioning.\n\n## Versioning\n\nJava uses\
    \ versioning: Java SE 5.0, Java SE 6.0, EJB 3.1, JAX-RS 1.0, and so on. When a\
    \ new version of JAX-RS is released, its version number is increased, and you\
    \ upgrade to JAX-RS 1.1. JPA uses this exact mechanism when you need to version\
    \ entities. So, when you persist an entity for the first time in the database,\
    \ it will get the version number 1. Later, if you update an attribute and commit\
    \ this change to the database, the entity version will get the number 2, and so\
    \ on. This versioning will evolve each time a change is made to the entity.\n\n\
    In order for this to happen, the entity must have an attribute to store the version\
    \ number, and it has to be annotated by `@Version`. This version number is then\
    \ mapped to a column in the database. The attribute types supported for versioning\
    \ can be `int`, `Integer`, `short`, `Short`, `long`, `Long`, or `Timestamp`. Listing\
    \ 4-30 shows how to add a version attribute to the `Book` entity.\n\n**Listing\
    \ 4-30.** *The Book Entity with a @Version Annotation*\n\n```java\n@Entity\npublic\
    \ class Book {\n    @Id @GeneratedValue\n    private Long id;\n    @Version\n\
    \    private Integer version;\n    private String title;\n    private Float price;\n\
    \    private String description;\n    private String isbn;\n    private Integer\
    \ nbOfPage;\n    private Boolean illustrations;\n    // Constructors, getters,\
    \ setters\n}\n```\n\nThe entity can access the value of its version property but\
    \ must not modify it. Only the persistence provider is permitted to set or update\
    \ the value of the version attribute when the object is written or updated to\
    \ the database. Let’s look at an example to illustrate the behavior of this versioning.\
    \ In Listing 4-31, a new `Book` entity is persisted to the database. Once the\
    \ transaction is committed, the persistence provider sets the version to 1. Later,\
    \ the price of the book is updated, and once the data is flushed to the database,\
    \ the version number is incremented to 2.\n\n**Listing 4-31.** *Transactions tx1\
    \ and tx2 Updating the Price of a Book Concurrently*\n\n```java\nBook book = new\
    \ Book(\"H2G2\", 21f, \"Best IT book\", \"123-456\", 321, false);\ntx.begin();\n\
    em.persist(book);\ntx.commit();\nassertEquals(1, book.getVersion());\ntx.begin();\n\
    book.raisePriceByTwoDollars();\ntx.commit();\nassertEquals(2, book.getVersion());\n\
    ```\n\nThe version attribute is not required but is recommended when the entity\
    \ can be concurrently modified by more than one process or thread. Versioning\
    \ is the core of optimistic locking and provides protection for infrequent concurrent\
    \ entity modification. In fact, an entity is automatically enabled for optimistic\
    \ locking if it has a property mapped with a `@Version` annotation.\n\n## Optimistic\
    \ Locking\n\nAs its name indicates, optimistic locking is based on the fact that\
    \ database transactions don’t conflict with one other. In other words, there is\
    \ a good chance that the transaction updating an entity will be the only one that\
    \ actually updates the entity during that interval. Therefore, the decision to\
    \ acquire a lock on the entity is actually made at the end of the transaction.\
    \ This ensures that updates to an entity are consistent with the current state\
    \ of the database. Transactions that would cause this constraint to be violated\
    \ result in an `OptimisticLockException` being thrown and the transaction marked\
    \ for rollback.\n\nHow would you throw an `OptimisticLockException`? Either by\
    \ explicitly locking the entity (with the `lock` or the `find` methods that you\
    \ saw passing a `LockModeType`) or by letting the persistence provider check the\
    \ attribute annotated with `@Version`. The use of a dedicated `@Version` annotation\
    \ on an entity allows the `EntityManager` to perform optimistic locking simply\
    \ by comparing the value of the version attribute in the entity instance with\
    \ the value of the column in the database. Without an attributed annotated with\
    \ `@Version`, the entity manager will not be able to do optimistic locking.\n\n\
    Transactions `tx1` and `tx2` both get an instance of the same `Book` entity. At\
    \ that moment, the version of the `Book` entity is 1. The first transaction raises\
    \ the price of the book by $2 and commits this change. When the data is flushed\
    \ to the database, the persistence provider increases the version number and sets\
    \ it to 2. At that moment, the second transaction raises the price by $5 and commits\
    \ the change. The entity manager for `tx2` realizes that the version number in\
    \ the database is different from that of the entity. This means the version has\
    \ been changed by a different transaction, so an `OptimisticLockException` is\
    \ thrown, as shown in Figure 4-4.\n\n**Figure 4-4.** *OptimisticLockException\
    \ thrown on transaction tx2*\n\nThis is the default behavior when the `@Version`\
    \ annotation is used: an `OptimisticLockException` is thrown when the data is\
    \ flushed (at commit time or by explicitly calling the `em.flush()` method). You\
    \ can also control where you want to add the optimistic lock using read then lock\
    \ or read and lock. The code of read and lock, for example, would look like this:\n\
    \n```java\nBook book = em.find(Book.class, 12);\n// Lock to raise the price\n\
    em.lock(book, LockModeType.OPTIMISTIC);\nbook.raisePriceByTwoDollars();\n```"
