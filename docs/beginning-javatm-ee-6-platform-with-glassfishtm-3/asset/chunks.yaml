- fmt: "# ORM Solutions and the Evolution of JPA\n\nORM solutions have been around\
    \ for a long time, even before Java. Products such as `TopLink` originally started\
    \ with Smalltalk in 1994 before switching to Java. Commercial ORM products like\
    \ `TopLink` have been available since the earliest days of the Java language.\
    \ They were successful, but were never standardized for the Java platform. A similar\
    \ approach to ORM was standardized in the form of `JDO`, which failed to gain\
    \ any significant market penetration.\n\nIn 1998, `EJB 1.0` was created and later\
    \ shipped with `J2EE 1.2`. It was a heavyweight, distributed component used for\
    \ transactional business logic. Entity Container Managed Persistence (CMP) was\
    \ introduced in `EJB 1.0`, enhanced through versions up to `EJB 2.1` (`J2EE 1.4`).\
    \ Persistence could only be done inside the container through a complex mechanism\
    \ of instantiation using home, local, or remote interfaces. The ORM capabilities\
    \ were also very limited, as inheritance was difficult to map.\n\nParallel to\
    \ the `J2EE` world was a popular open source solution that led to some surprising\
    \ changes in the direction of persistence: `Hibernate`, which brought back a lightweight,\
    \ object-oriented persistent model.\n\nAfter years of complaints about Entity\
    \ CMP 2.*x* components and in acknowledgment of the success and simplicity of\
    \ open source frameworks such as `Hibernate`, the persistence model of the Enterprise\
    \ Edition was completely rearchitected in `Java EE 5`. `JPA 1.0` was born with\
    \ a very lightweight approach that adopted many `Hibernate` design principles.\
    \ The `JPA 1.0` specification was bundled with `EJB 3.0` (`JSR 220`).\n\nToday,\
    \ with `Java EE 6`, `JPA` in its second version follows the path of ease of development\
    \ and brings new features. It has evolved with its own dedicated specification,\
    \ `JSR 317`.\n\n## What’s New in JPA 2.0?\n\nIf `JPA 1.0` was a completely new\
    \ persistence model from its Entity CMP 2.*x* ancestor, `JPA 2.0` is a continuation\
    \ of `JPA 1.0`. It keeps the object-oriented approach with annotation and optional\
    \ XML mapping files. This second version brings new APIs, extends `JPQL`, and\
    \ adds these new functionalities:\n\n- Collections of simple data types (`String`,\
    \ `Integer`, etc.) and of embeddable objects can now be mapped in separate tables.\
    \ Previously, you could only map collections of entities.\n- Map support has been\
    \ extended so that maps can have keys and values of basic types, entities, or\
    \ embeddables.\n- Maintaining a persistent ordering is now possible with the `@OrderColumn`\
    \ annotation.\n- Orphan removal allows child objects to be removed from a relationship\
    \ if the parent object is removed.\n- Optimistic locking was already supported,\
    \ but now pessimistic locking has been introduced.\n- A brand-new Query Definition\
    \ API has been introduced to allow queries to be constructed in an object-oriented\
    \ manner.\n- `JPQL` syntax is richer (e.g., it now allows case expressions).\n\
    - Embeddable objects can now be nested into other embeddable objects and have\
    \ relationships to entities.\n- The dot (`.`) navigation syntax has been extended\
    \ to handle embeddables with relationships and embeddables of embeddables.\n-\
    \ Support for a new caching API has been added.\n\nI will discuss these functionalities\
    \ in detail in Chapters 3, 4, and 5.\n\n## Reference Implementation\n\n`EclipseLink\
    \ 1.1` is an open source implementation of `JPA 2.0`. It provides a powerful and\
    \ flexible framework for storing Java objects in a relational database. `EclipseLink`\
    \ is a `JPA` implementation, but it also supports XML persistence through Java\
    \ XML Binding (`JAXB`) and other means such as Service Data Objects (`SDO`). It\
    \ provides support not only for ORM, but also for object XML mapping (OXM), object\
    \ persistence to Enterprise Information Systems (EIS) using Java EE Connector\
    \ Architecture (`JCA`), and database web services.\n\n`EclipseLink`’s origins\
    \ stem from the Oracle `TopLink` product given to the Eclipse Foundation in 2006.\
    \ `EclipseLink` is the `JPA` reference implementation and is the persistence framework\
    \ used in this book. It is also referred to as the *persistence provider*, or\
    \ simply the *provider*.\n\n## Understanding Entities\n\nWhen talking about mapping\
    \ objects to a relational database, persisting objects, or querying objects, the\
    \ term “entity” should be used rather than “objects.” Objects are instances that\
    \ just live in memory. Entities are objects that live shortly in memory and persistently\
    \ in a database. They have the ability to be mapped to a database; they can be\
    \ concrete or abstract; and they support inheritance, relationships, and so on.\
    \ These entities, once mapped, can be managed by `JPA`. You can persist an entity\
    \ in the database, remove it, and query it using a query language (Java Persistence\
    \ Query Language, or `JPQL`). ORM lets you manipulate entities while under the\
    \ covers the database is being accessed. And as you will see, an entity follows\
    \ a defined life cycle. With callback methods and listeners, `JPA` lets you hook\
    \ some business code to life-cycle events.\n\n## Object-Relational Mapping\n\n\
    The principle of ORM is to delegate to external tools or frameworks (in our case\
    \ `JPA`) the task of creating a correspondence between objects and tables. The\
    \ world of classes, objects, and attributes can then be mapped to relational databases\
    \ made of tables containing rows and columns. Mapping gives an object-oriented\
    \ view to developers who can transparently use entities instead of tables. And\
    \ how does `JPA` map objects to a database? Through *metadata*.\n\nAssociated\
    \ with every entity is metadata that describes the mapping. This metadata enables\
    \ the persistence provider to recognize an entity and to interpret the mapping.\
    \ This metadata can be written in two different formats:\n\n- *Annotations*: The\
    \ code of the entity is directly annotated with all sorts of annotations that\
    \ are described in the `javax.persistence` package.\n- *XML descriptors*: Instead\
    \ of (or in addition to) annotations, you can use XML descriptors. The mapping\
    \ is defined in an external XML file that will be deployed with the entities.\
    \ This can be very useful when database configuration changes depending on the\
    \ environment, for example.\n\nTo make the mapping easier, `JPA` (like many other\
    \ `Java EE 6` specifications) uses the concept of *configuration by exception*\
    \ (sometimes referred as *programming by exception*). The idea is that `JPA` has\
    \ certain default mapping rules (e.g., the table name is the same as the entity\
    \ name). If you are happy with them, you don’t need to use extra metadata (no\
    \ annotation or XML is needed), but if you don’t want the provider to apply the\
    \ default rules, you can customize the mapping to your own needs using metadata.\
    \ In other words, having to supply a configuration is the exception to the rule.\n\
    \nSo let’s see how this applies to an entity. Listing 2-1 shows a `Book` entity\
    \ with some attributes. As you can see, some of them are annotated (`id`, `title`,\
    \ and `description`), and some are not.\n\n**Listing 2-1.** *A Simple Book Entity*\n\
    \n```java\n@Entity\npublic class Book {\n\n    @Id @GeneratedValue\n    private\
    \ Long id;\n\n    @Column(nullable = false)\n    private String title;\n\n   \
    \ private Float price;\n\n    @Column(length = 2000)\n    private String description;\n\
    \n    private String isbn;\n\n    private Integer nbOfPage;\n\n    private Boolean\
    \ illustrations;\n\n    // Constructors, getters, setters\n}\n```\n\nTo be recognized\
    \ as an entity, the `Book` class must be annotated with `@javax.persistence.Entity`\
    \ (or the XML equivalent). The `@javax.persistence.Id` annotation is used to denote\
    \ the primary key of the entity."
