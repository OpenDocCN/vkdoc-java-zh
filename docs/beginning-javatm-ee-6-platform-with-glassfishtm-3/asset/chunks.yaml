    第 7 章 ■ 会话 Bean 与定时器服务


    **217**


    **定时器服务**


    某些 Java EE 应用程序需要安排任务，以便在特定时间收到通知。例如，CD-BookStore 应用程序需要每年向客户发送生日电子邮件，打印每月售出商品的统计数据，生成关于库存水平的夜间报告，并每
    30 秒刷新一次技术缓存。


    因此，EJB 2.1 引入了一种称为定时器服务的调度工具，因为客户端不能直接使用 Thread API。与其他专有工具或框架（Unix cron 工具、Quartz
    等）相比，定时器服务的功能不够丰富。EJB 规范不得不等到 3.1 版本才看到定时器服务的重大改进。它从 Unix cron 和其他成功工具中汲取灵感，如今能够与其它产品竞争，因为它能满足大多数调度用例。


    EJB 定时器服务是一种容器服务，允许 EJB 注册以进行回调调用。EJB 通知可以安排为基于日历的调度、在特定时间、在特定持续时间之后或在特定的重复间隔发生。容器会记录所有定时器，并在定时器到期时调用相应的
    Bean 实例方法。图 7-7 展示了涉及定时器服务的两个步骤。首先，EJB 需要创建一个定时器（自动或编程方式）并注册以进行回调调用，然后定时器服务在 EJB
    实例上触发已注册的方法。


    **图 7-7.** *定时器服务与会话 Bean 之间的交互*


    定时器旨在用于长期运行的业务流程，并且默认是持久的。这意味着它们能在服务器关闭后存活，一旦服务器再次启动，定时器会像从未发生过关闭一样执行。您也可以选择将定时器指定为非持久的。


    ■**注意** 无状态 Bean、单例 Bean 和 MDB 可以由定时器服务注册，但有状态 Bean 不能也不应该使用调度 API。

