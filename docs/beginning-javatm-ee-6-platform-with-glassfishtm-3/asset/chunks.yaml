    **消息驱动 Bean**


    本章展示了如何使用 JMS API 在独立环境中，通过主类、JNDI 查找或使用 ACC 的资源注入，使异步消息传递在系统之间提供松散耦合和更高的灵活性。MDB
    为在 EJB 容器中运行的企业应用程序提供了这种标准的异步消息传递模型。


    MDB 是一个异步消费者，由容器在消息到达时调用。对于消息生产者而言，MDB 只是一个消息消费者，隐藏在其监听的**目标**之后。


    MDB 是 EJB 规范的一部分，其模型接近于无状态会话 Bean，因为它们没有任何状态并在 EJB 容器内运行。容器监听一个目标，并在消息到达时将调用委托给
    MDB。与任何其他 EJB 一样，MDB 可以访问由容器管理的资源（其他 EJB、JDBC 连接、JMS 资源等）。


    既然您之前已经看到可以使用独立的 JMS 客户端，为什么还要使用 MDB 呢？因为容器管理着多线程、安全性和事务，从而大大简化了 JMS 消费者的代码。它还管理着传入的消息，这些消息在多个
    MDB 实例（在池中可用）之间分配，而这些实例本身没有特殊的多线程代码。一旦新消息到达目标，就会从池中检索一个 MDB 实例来处理该消息。


    **如何编写 MDB**


    MDB 可以是事务性的、多线程的，并且自然地消费 JMS 消息。到目前为止，使用 JMS API，您可能会期望工厂、连接、会话、消费者、用户事务等。然而，令人惊讶的是，一个简单的
    MDB 可以像清单 13-8 所示。


    **清单 13-8.** *一个简单的 MDB*


    **@MessageDriven(mappedName = "jms/javaee6/Topic")**


    public class BillingMDB implements MessageListener {


    public void **onMessage**(Message message) {


    TextMessage msg = (TextMessage)message;


    System.out.println("Message received: " + msg.getText());


    }


    }


    清单 13-8 中的代码（为清晰起见省略了异常处理）显示，MDB 使程序员摆脱了处理迄今为止所解释的各种消息类型的所有机械性工作。MDB 实现了 `MessageListener`
    接口和 `onMessage()` 方法，但不需要其他代码来连接到提供程序或启动消息消费。MDB 还依赖于“异常配置”机制，只需要少量注解即可使其工作（参见
    `@MessageDriven` 注解）。


