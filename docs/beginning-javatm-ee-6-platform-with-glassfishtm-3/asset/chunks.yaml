    如你所知，这个实体还需要与一个`persistence.xml`文件打包在一起，但为简单起见，此处不再展示。


    **编写 BookEJB**


    清单 10-4 展示了一个无状态会话 Bean，它暴露了一个无接口视图。这意味着客户端（即受管 Bean）不需要接口（本地或远程），可以直接调用该 EJB。该
    EJB 被注入了一个实体管理器的引用，通过它来持久化`Book`实体（`createBook()`方法），并从数据库中检索所有书籍（使用`findAllBooks`命名查询）。该
    EJB 不需要部署描述符。


    **清单 10-4.** *一个创建和检索书籍的无状态 EJB*


    **@Stateless**


    public class BookEJB {


    **@PersistenceContext**(unitName = "chapter10PU")


    private EntityManager em;


    public List<Book> findBooks() {


    Query query = em.createNamedQuery("**findAllBooks**");


    return query.getResultList();


    }


    public Book createBook(Book book) {


    em.persist(book);


    return book;


    }


    }


    **编写 BookController 受管 Bean**


    受管 Bean 的职责之一是与应用程序的其他层（例如 EJB 层）交互，或执行验证。清单 10-5 中的`BookController`是一个受管 Bean，因为它使用了`@ManagedBean`注解。第二个注解`@RequestScoped`定义了
    Bean 的生命周期；它持续整个请求的时长（注意还有其他作用域可供选择）。这个受管 Bean 包含两个将被页面使用的属性：


    • `bookList`是从数据库中检索到的书籍列表，用于在`listBooks.xhtml`页面中显示。


    第 10 章 ■ JavaServer Faces


    **271**


    • `book`是会被映射到表单（`newBook.xhtml`页面）并持久化到数据库的对象。


    所有业务处理（创建和检索书籍）都通过`BookEJB`完成。受管 Bean 使用`@EJB`注解注入了一个 EJB 的引用，并有两个将被页面调用的方法：


    • `doNew()`：此方法不执行任何处理。它允许导航到`newBook.xhtml`。页面间的导航可以通过多种方式实现（如第 12 章所述）。最简单的方式是返回目标页面的名称。


    • `doCreateBook()`：此方法通过调用无状态 EJB 并传入`book`属性来创建书籍。然后它再次调用 EJB 以从数据库中获取所有书籍。这个列表存储在受管
    Bean 的`bookList`属性中。接着，该方法返回它需要导航到的页面名称。


    清单 10-5 展示了`BookController`受管 Bean。为了更好的可读性，这段代码中所有的 getter 和 setter 已被省略，但每个属性（`book`和`bookList`）都需要它们。


    **清单 10-5.** *调用 EJB 的 BookController 受管 Bean*


    **@ManagedBean**


    **@RequestScoped**


    public class BookController {


    **@EJB**


    private BookEJB bookEJB;


    private Book **book** = new Book();


    private List<Book> bookList = new ArrayList<Book>();


    public String **doNew()** {


    return "**newBook.xhtml**";


    }


    public String **doCreateBook()** {


    book = bookEJB.createBook(**book**);


    bookList = bookEJB.findBooks();


    return "**listBooks.xhtml**";


    }


    // Getter、setter


    }


