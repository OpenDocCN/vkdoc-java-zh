- fmt: "# 托管 Bean 的作用域\n\n作为托管 Bean 一部分创建的对象具有特定的生命周期，并且可能对 Web 应用程序中的 UI 组件或其他对象可访问或不可访问。对象的生命周期和可访问性称为*作用域*。你可以使用以下五种不同的注解来指定托管\
    \ Bean 的作用域：\n\n- `@ApplicationScoped`：这是限制最少的注解，生命周期最长。创建的对象在应用程序处于活动状态期间，对所有客户端的所有请求/响应周期都可用。这些对象可以并发调用，并且需要是线程安全的（使用\
    \ `synchronized` 关键字）。具有此作用域的对象可以使用无作用域或应用程序作用域的其他对象。\n\n- `@SessionScoped`：对象在属于客户端会话的任何请求/响应周期内都可用。这些对象的状态在请求之间持久化，并持续到会话失效。具有此作用域的对象可以使用无作用域、会话作用域或应用程序作用域的其他对象。\n\
    \n- `@ViewScoped`：对象在给定视图内可用，直到视图发生更改，并且其状态会持久化，直到用户导航到新视图，此时它们将被清除。具有此作用域的对象可以使用无作用域、视图作用域、会话作用域或应用程序作用域的其他对象。\n\
    \n- `@RequestScoped`：如果在托管 Bean 中未指定，这是默认作用域。对象从请求开始到响应发送给客户端期间可用。一个客户端可以执行多个请求，但停留在同一视图上。这就是为什么\
    \ `@ViewScoped` 的持续时间比 `@RequestScoped` 更长。具有此作用域的对象可以使用无作用域、请求作用域、视图作用域、会话作用域或应用程序作用域的其他对象。\n\
    \n- `@NoneScoped`：具有此作用域的托管 Bean 在任何 JSF 页面中都不可见，并且定义了供应用程序中其他托管 Bean 使用的对象。具有此作用域的对象可以使用具有相同作用域的其他对象。\n\
    \n在为托管 Bean 选择作用域时需要谨慎。你应该只给予它们所需的作用域。过度作用域的 Bean（例如 `@ApplicationScoped`）会增加内存使用量，并且持久化它们的潜在需求可能导致磁盘使用量增加。将应用程序作用域赋予仅在单个组件内使用的对象是没有意义的。同样，限制过多的对象将无法被应用程序的不同部分访问。\n\
    \n## 代码示例\n\n`Listing 12-6` 定义了一个具有应用程序作用域的托管 Bean。它被急切地实例化（`eager = true`），并在构造后立即初始化\
    \ `defaultBook` 属性（`@PostConstruct`）。这可能是初始化 Web 应用程序部分内容或被其他托管 Bean 属性引用的理想 Bean。\n\
    \n**Listing 12-6.** 一个急切实例化的应用程序作用域托管 Bean\n\n```java\n@ManagedBean(eager = true)\n\
    @ApplicationScoped\npublic class InitController {\n\n    private Book defaultBook;\n\
    \n    @PostConstruct\n    private void init() {\n        defaultBook = new Book(\"\
    default title\", 0, \"default descritpion\",\n                \"0000-000\", 100,\
    \ true);\n    }\n\n    // Constructors, getters, setters\n}\n```\n\n## `@ManagedProperty`\n\
    \n在托管 Bean 中，你可以通过使用 `faces-config.xml` 文件或 `@javax.faces.model.ManagedProperty`\
    \ 注解来指示系统将值注入到属性（具有 getter 和/或 setter 的属性）中。该注解具有一个 `value` 属性，可以接受字面字符串或 EL 表达式。`Listing\
    \ 12-7` 给出了一些属性初始化的示例。\n\n**Listing 12-7.** 正在初始化的托管 Bean 属性\n\n```java\n@ManagedBean\n\
    public class BookController {\n\n    @ManagedProperty(value = \"#{initController.defaultBook}\"\
    )\n    private Book book;\n\n    @ManagedProperty(value = \"this is a title\"\
    )\n    private String aTitle;\n\n    @ManagedProperty(value = \"999\")\n    //\
    \ ...\n}\n```"
  raw: 'Objects that are created as part of a managed bean have a certain lifetime
    and may or may not be accessible to UI components or objects in the web application.
    The lifetime and acces-sibility of an object is known as *scope*. You can specify
    the scope of a managed bean using five different annotations:


    • @ApplicationScoped: This is the least restrictive annotation, with the longest
    life span.


    Objects that are created are available in all request/response cycles for all
    clients using the web application, for as long as the application is active. These
    objects can be called concurrently and need to be thread-safe (using the synchronized
    keyword). Objects


    with this scope can use other objects with no scope or application scope.


    • @SessionScoped: Objects are available for any request/response cycles that belong
    to the client’s session. These objects have their state persisted between requests
    and last until the session is invalidated. Objects with this scope can use other
    objects with no scope, session scope, or application scope.


    • @ViewScoped: Objects are available within a given view until the view is changed,
    and have their state persisted until the user navigates to a new view, at which
    point they


    will be cleared out. Objects with this scope can use other objects with no scope,
    view


    scope, session scope, or application scope.


    Chapter 12 ■ prOCeSSING aND NaVIGatION


    **335**


    • @RequestScoped: If not specified in the managed bean, this is the default scope.
    Objects are available from the beginning of a request until the response has been
    sent to the


    client. A client can execute several requests but stay on the same view. That’s
    why the


