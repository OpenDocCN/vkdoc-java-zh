    < **c:set** var="upperLimit" value="20"/>


    This code sets the value 20 for a variable called upperLimit. Each tag library
    has a set of actions that can be used in a JSP or JSF page.


    **Core Actions**


    The core actions provide tags for manipulating variables, dealing with errors,
    performing tests, and executing loops and iterations. Table 11-3 shows the actions
    contained in the core library.


    **Table 11-3.** *Core Actions*


    **Action**


    **Description**


