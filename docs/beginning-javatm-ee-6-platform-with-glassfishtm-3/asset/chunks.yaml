  trans: "\n正如本章前面“JMS API”部分所述，消费者可以通过循环等待消息到达来同步接收消息，也可以通过实现 `MessageListener` 接口来异步接收消息。本质上，MDB\
    \ 被设计为异步消息消费者。MDB 实现了一个消息监听器接口，当消息到达时，该接口由容器触发。\n\nMDB 能否进行同步消费？可以，但不推荐。同步消息消费者会阻塞并占用服务器资源（EJB\
    \ 将陷入循环而不执行任何工作，容器也无法释放它们）。与无状态会话 Bean 类似，MDB 存在于一个特定大小的池中。当容器需要一个实例时，它会从池中取出一个并使用。如果每个实例都进入无限循环，池最终将变空，所有可用的实例都将忙于循环。EJB\
    \ 容器还可能开始生成更多 MDB 实例，从而扩大池并消耗越来越多的内存。因此，会话 Bean 和 MDB 不应被用作同步消息消费者。表 13-7 展示了\
    \ MDB 和会话 Bean 的不同接收模式。\n\n**表 13-7.** *MDB 与会话 Bean 的比较*\n\n**企业 Bean**\n\n**生产者**\n\
    \n**同步接收者**\n\n**异步接收者**\n\n会话 Bean\n\n是\n\n不推荐\n\n不可能\n\nMDB\n\n是\n\n不推荐\n\n\
    是\n\n**MDB 作为生产者**\n\nMDB 能够成为消息生产者，这通常发生在它们参与工作流时，因为它们从一个目标接收消息，处理消息，然后将其发送到另一个目标。要添加此功能，必须使用\
    \ JMS API。\n\n可以通过使用 `@Resource` 注解或通过 JNDI 查找来注入目标和连接工厂，然后调用 `javax.jms.Session`\
    \ 对象上的方法来创建和发送消息。`BillingMDB` 的代码（见清单 13-12）监听一个主题（`jms/javaee6/Topic`），接收消息（`onMessage()`\
    \ 方法），并向一个队列（`jms/javaee6/Queue`）发送新消息。\n\n**清单 13-12.** *一个消费和生成消息的 MDB*\n\n\
    ```java\n@MessageDriven(mappedName = \"jms/javaee6/Topic\", activationConfig =\
    \ {\n    @ActivationConfigProperty(propertyName = \"acknowledgeMode\", \n    \
    \    propertyValue = \"Auto-acknowledge\"),\n    @ActivationConfigProperty(propertyName\
    \ = \"messageSelector\", \n        propertyValue = \"orderAmount < 3000\")\n})\n\
    public class BillingMDB implements MessageListener {\n\n    @Resource(name = \"\
    jms/javaee6/Queue\")\n    private Destination printingQueue;\n\n    @Resource(name\
    \ = \"jms/javaee6/ConnectionFactory\")\n    private ConnectionFactory connectionFactory;\n\
    \n    private Connection connection;\n\n    @PostConstruct\n    private void initConnection()\
    \ {\n        connection = connectionFactory.createConnection();\n    }\n\n   \
    \ @PreDestroy\n    private void closeConnection() {\n        connection.close();\n\
    \    }\n\n    public void onMessage(Message message) {\n        TextMessage msg\
    \ = (TextMessage)message;\n        System.out.println(\"Message received: \" +\
    \ msg.getText());\n        sendPrintingMessage();\n    }\n\n    private void sendPrintingMessage()\
    \ throws JMSException {\n        Session session = connection.createSession(true,\
    \ \n            Session.AUTO_ACKNOWLEDGE);\n        MessageProducer producer =\
    \ session.createProducer(printingQueue);\n        TextMessage message = session.createTextMessage();\n\
    \        message.setText(\"This message has been received and sent again\");\n\
    \        producer.send(message);\n        session.close();\n    }\n}\n```\n\n\
    这个 MDB 使用了到目前为止介绍的大部分概念。首先，它使用 `@MessageDriven` 注解来定义其监听的主题的 JNDI 名称（`mappedName\
    \ = \"jms/javaee6/Topic\"`）。在同一个注解中，它使用 `@ActivationConfigProperty` 注解数组定义了一组属性，例如确认模式和消息选择器，并且它实现了\
    \ `MessageListener` 及其 `onMessage()` 方法。\n\n这个 MDB 还需要生成一条消息。因此，它被注入了两个所需的管理对象：一个连接工厂和一个目标（名为\
    \ `jms/javaee6/Queue` 的队列）。\n"
- fmt: "# Java EE 6 Queue\n\n它可以利用生命周期回调创建并关闭一个共享的`javax.jms.Connection`实例；尽管创建连接的开销很大，但将这段代码放在`@PostConstruct`和`@PreDestroy`注解的方法中，可以确保它仅在MDB创建和销毁时执行。\n\
    \n最后，发送消息的业务方法（`sendPrintingMessage()`方法）看起来与之前所见类似：创建JMS会话，用于创建文本消息和生产者，然后发送消息。为提升可读性，整个类中省略了异常处理。\n\
    \n---\n\n# 第13章 发送消息\n\n## 事务\n\nMDB是EJB（更多信息请参见第9章）。MDB可以使用BMT或容器管理事务（CMT），可以通过`MessageDrivenContext.setRollbackOnly()`方法显式回滚事务等。关于MDB有一些值得解释的特殊性。\n\
    \n谈到事务时，我们通常想到关系型数据库。然而，其他资源也具有事务性，例如消息系统。如果两个或多个操作必须同时成功或失败，它们就构成一个事务。在消息传递中，如果发送了两条或多条消息，它们必须同时成功（提交）或同时失败（回滚）。这在实践中如何实现？答案是：消息在事务提交之前不会释放给消费者。容器会在调用`onMessage()`方法之前启动事务，并在方法返回时提交事务（除非事务已通过`setRollbackOnly()`标记为回滚）。\n\
    \n尽管MDB具有事务性，但它们不能在客户端的事务上下文中执行，因为它们没有客户端。没有人显式调用MDB的方法，它们只是监听目标并消费消息。没有上下文从客户端传递到MDB，因此客户端事务上下文无法传递给`onMessage()`方法。\n\
    \n表13-8比较了会话Bean和MDB的CMT。\n\n**表13-8.** *MDB事务与会话Bean的比较*\n\n| 事务属性 | 会话Bean |\
    \ MDB |\n|----------|----------|-----|\n| `NOT_SUPPORTED` | 是 | 是 |\n| `REQUIRED`\
    \ | 是 | 是 |\n| `MANDATORY` | 是 | 否 |\n| `REQUIRES_NEW` | 是 | 否 |\n| `SUPPORTS`\
    \ | 是 | 否 |\n| `NEVER` | 是 | 否 |\n\n在CMT中，MDB可以在业务方法上使用`@javax.ejb.TransactionAttribute`注解，支持以下两个属性：\n\
    \n- `REQUIRED`（默认值）：如果MDB调用其他企业Bean，容器会将事务上下文传递给该调用。当消息监听器方法完成时，容器尝试提交事务。\n- `NOT_SUPPORTED`：如果MDB调用其他企业Bean，容器不会传递事务上下文。\n\
    \n## 异常处理\n\n本章的代码片段中省略了异常处理，因为JMS API在异常处理方面非常冗长。该API定义了12种不同的异常，全部继承自`javax.jms.JMSException`。对连接、会话、消费者、消息或生产者的任何方法调用都会抛出`JMSException`或其子类。\n\
    \n需要注意的是，`JMSException`是受检异常。EJB规范概述了两种类型的异常：\n\n- **应用程序异常**：继承自`Exception`的受检异常不会导致容器回滚。\n\
