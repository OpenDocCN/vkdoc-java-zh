    **参考实现**


    Jersey 是 Sun 公司对 JAX-RS 的官方参考实现。它是一个采用 CDDL 和 GPL 双许可证的开源项目。Jersey 可通过其 API 进行扩展，并且还提供了一个客户端
    API（该 API 不在规范覆盖范围内）。


    JAX-RS 的其他实现也可用，例如 CXF（Apache）、RESTEasy（JBoss）以及 Restlet（一个在 JAX-RS 最终确定之前就已存在的资深项目）。


    **REST 方法**


    如前所述，REST 是一套基于 HTTP 的通用设计约束。然而，本章重点讨论 Web 服务，由于 REST 源自 Web，在探讨驱动 Web 的原理之前，我将先从现实生活中的网页浏览体验开始。Web
    已成为信息的主要来源，是我们日常工具集的一部分。你可能对它非常熟悉，这种熟悉感应该有助于你理解 REST 的概念和特性。


    **438**


    第 15 章 ■ RESTful Web 服务


    **从 Web 到 Web 服务**


    我们知道 Web 是如何工作的，那么为什么 Web 服务要表现得不同呢？毕竟，服务也经常交换唯一标识的资源，这些资源像超链接一样相互关联。Web 架构多年来已经证明了其可扩展性；为什么要重新发明轮子呢？


    要创建、更新和删除一个图书资源，为什么不使用常见的 HTTP 动词呢？例如：


    *   使用 POST 方法向数据（XML、JSON 或文本格式）发送请求，以**创建** URI 为 [`www.apress.com/books/`](http://www.apress.com/books/)
    的图书资源。创建成功后，响应会返回新资源的 URI：[`www.apress.com/books/123456。`](http://www.apress.com/books/123456)

    *   使用 GET 方法**读取**位于 [`www.apress.com/books/123456`](http://www.apress.com/books/123456)
    的资源（以及实体主体中可能指向其他资源的链接）。

    *   使用 PUT 方法向数据发送请求，以**更新**位于 [`www.apress.com/books/123456`](http://www.apress.com/books/123456)
    的图书资源。

    *   使用 DELETE 方法**删除**位于 [`www.apress.com/books/123456`](http://www.apress.com/books/123456)
    的资源。


    通过使用 HTTP 动词，我们可以对一个资源执行所有可能的创建、读取、更新、删除（CRUD）操作。


    **一次网页浏览体验**


    你如何操作才能找到 Apress 的 Java 技术书籍列表？你将浏览器指向 Apress 网站：[`www.apress.com。`](http://www.apress.com)
    尽管这个页面很可能不包含你正在寻找的确切信息，但你期望它能以某种方式让你访问到 Java 书籍列表。首页提供了一个搜索所有 Apress 书籍的搜索引擎，但还有一个按技术分类的书籍目录。点击
    Java 节点，超媒体的魔力就显现了：这里是 Apress Java 书籍的完整列表。实际上，这是一个相当长的列表，虽然未提供具体数量，但指向 CSV 格式的链接以及你的命令行技能可以在几个时钟周期内完成计算（Java
    类别下有 144 本书）：


    [curl http://www.apress.com/resource/csv/bookcategory?cat=32 |](http://www.apress.com/resource/csv/bookcategory?cat=32)
    ➥

    sed -n 2~1p | wc -l


    (..)


    假设你将链接保存在你最喜欢的书签管理器中，在浏览书籍列表时，Graeme Rocher 和 Jeff Brown 合著的 *《Grails 权威指南，第二版》*
    吸引了你的注意。书籍标题上的超链接将你带到书籍页面，在那里你可以阅读摘要、作者简介等，并且你注意到“相关书籍”部分列出的一本书可能对你当前的项目同样有价值。你想将
    Graeme Rocher 的书与 Ola Bini 的 *《实用 JRuby on Rails Web 2.0 项目：将 Ruby on Rails 引入
    Java》* 进行比较。Apress 的书籍页面以在线预览的形式让你能更具体地了解书籍内容：打开预览，浏览目录，然后做出选择。


    这就是我们日常使用浏览器所做的事情。REST 将相同的原则应用于你的服务，其中书籍、搜索结果、目录或书籍封面都可以被定义为资源。


    第 15 章 ■ RESTful Web 服务


    **439**


    **统一接口**


    使架构成为 RESTful 的主要约束之一，是使用统一接口来管理你的资源。选择任何适合你的接口，但在整个系统中，从资源到资源，从服务到服务，都要以相同的方式使用它。切勿偏离它或改变其原始含义。通过使用统一接口，“整体系统架构得以简化，交互的可见性得到提升”（Roy
    Thomas Fielding，*《架构风格与基于网络的软件架构设计》*）。你的服务将成为使用完全相同语义的服务社区的一部分。


    事实上的 Web 协议是 HTTP，它是一种基于文档的、标准化的客户端与服务器之间的请求/响应协议。HTTP 是 RESTful Web 服务的统一接口。基于
    SOAP、WSDL 和其他 WS-* 标准构建的 Web 服务也使用 HTTP 作为传输层，但它们只利用了 HTTP 的极少部分能力。你必须通过分析 WSDL
    来发现服务的语义，然后调用正确的方法。RESTful Web 服务拥有统一的接口（HTTP 动词和 URI），因此一旦你知道资源在哪里（URI），就可以调用
    HTTP 动词（GET、POST 等）。


    除了熟悉性之外，统一接口还促进了应用程序之间的互操作性；HTTP 被广泛支持，大量的 HTTP 客户端库保证了你无需处理通信问题。


    **可寻址性**


    设计 RESTful Web 服务时要遵循的第二个原则是可寻址性。你的 Web 服务应使你的应用程序尽可能可寻址，这意味着应用程序中每一个有价值的信息片段都应该是一个资源，并拥有一个
    URI，使得该资源易于访问。这是你需要发布的唯一数据，以使资源可访问，这样你的业务伙伴就不需要为了访问该资源而进行猜测。


    例如，你在处理应用程序中的一个 bug，你的调查将你引向类 `CreditCardValidator.java` 的第 42 行，认为这是 bug 发生的地方。由于你不负责应用程序的这个领域，你想提交一个问题，以便有资格的人来处理它。你如何向她指出有问题的代码行？你可以说“转到
    `CreditCardValidator` 类的第 42 行”，或者，如果你的源代码可以通过仓库浏览器寻址，你可以在 bug 报告中保存该行本身的 URI。


    这引出了在你的应用程序中定义 RESTful 资源粒度的问题：它可以是行级别、方法级别、类级别等等。


    唯一的 URI 使你的资源可链接，并且由于它们通过统一接口暴露，每个人都知道如何与它们交互，从而允许人们以你从未想象过的方式使用你的应用程序。


    **连通性**


    在图论中，如果一个图中的每一对不同顶点都能通过某条路径连接起来，则该图被称为连通图。如果对于每一对顶点 u、v，都存在一条从 u 到 v 的直接路径和一条从
    v 到 u 的直接路径，则称该图是强连通的。REST 主张资源应尽可能连通。正如现在著名的表述：“超媒体作为应用状态的引擎。”


    **440**


    第 15 章 ■ RESTful Web 服务


    再次强调，这个令人生畏的表述源于对 Web 成功经验的审视。Web 页面嵌入链接，以逻辑流畅的方式在页面间导航。

