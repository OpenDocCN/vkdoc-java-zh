    **Summary**


    Today, the race between user interfaces continues, with the proliferation of Rich
    Desktop Application (RDAs), Rich Internet Application (RIAs), mobile device applications,
    and so forth.


    A few years ago, JSF entered this race, and today, with the new features of JSF
    2.0, it is holding its own.


    JSF has an architecture based on components and a rich API for developing renderers,


    converters, validators, and more. It can render and convert several languages,
    and the preferred presentation declaration language (PDL) of JSF 2.0 is Facelets.


    Annotations have been introduced in JSF 2.0 and are now used in most Java EE 6
    specifi-


    cations. Chapter 11 focuses on the presentation part of Java EE 6\. It covers
    specifications like JSP 2.2, EL 2.2, and JSTL 1.2, introduces Facelets, and concentrates
    mostly on JSF. Chapter 12


    deals with all the dynamic aspects of the specification. You will learn how navigation
    works, about managed beans, and also how to write your own converter and validator.


