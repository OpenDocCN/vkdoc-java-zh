    \               \"+33 555-1234\"\n            ]\n        }\n    ]\n}}\n```\n\n\
    Jersey will convert the list of customers into JSON for you, using the built-in\
    \ `MessageBodyReader` and `MessageBodyWriter`, which are entity providers."
