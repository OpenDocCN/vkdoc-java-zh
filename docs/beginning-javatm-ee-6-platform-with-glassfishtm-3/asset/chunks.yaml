- fmt: 'be something different, such as WML for wireless devices). As in the previous
    chapter, a view provides a graphical representation for a model. A model can also
    have several views, showing a book as a form or as a list, for example.


    When a user manipulates a view, the view informs a controller of the desired changes.
    The controller then gathers, converts, and validates the data, invokes business
    logic, and generates the content in XHTML. In JSF, the controller is the `FacesServlet`.


    ### `FacesServlet`


    The `FacesServlet` is an implementation of `javax.servlet.Servlet` and acts as
    the central controller element, through which all user requests pass. As shown
    in Figure 12-2, when an event occurs (e.g., when the user clicks a button), the
    event notification is sent via HTTP to the server and is intercepted by `javax.faces.webapp.FacesServlet`.
    It examines the request and calls various actions on the model using managed beans.


    **Figure 12-2.** *The FacesServlet interactions*


    Behind the scenes, the `FacesServlet` accepts incoming requests and hands control
    over to the `javax.faces.lifecycle.Lifecycle` object. Using a factory, it creates
    an object of type `javax.faces.context.FacesContext`, which contains and processes
    all the per-request state information. The `Lifecycle` object uses the `FacesContext`
    object in six phases (described in the previous chapter) before rendering the
    response.


    For requests to be processed by the `FacesServlet`, they must be redirected using
    a servlet mapping in the deployment descriptor. The web pages, managed beans,
    converters, and so on have to be packaged with the `web.xml` file shown in Listing
    12-1.


    **Listing 12-1.** *web.xml Defining the FacesServlet*


    ```xml

    <?xml version=''1.0'' encoding=''UTF-8''?>

    <web-app version="2.5"

    xsi:schemaLocation="http://java.sun.com/xml/ns/javaee

    http://java.sun.com/xml/ns/javaee/web-app_2_5.xsd">

    <servlet>

    <servlet-name>Faces Servlet</servlet-name>

    <servlet-class>javax.faces.webapp.FacesServlet</servlet-class>

    <load-on-startup>1</load-on-startup>

    </servlet>

    <servlet-mapping>

    <servlet-name>Faces Servlet</servlet-name>

    <url-pattern>*.faces</url-pattern>

    </servlet-mapping>

    <context-param>

    <param-name>javax.faces.PROJECT_STAGE</param-name>

    <param-value>Development</param-value>

    </context-param>

    </web-app>

    ```


    This `web.xml` file defines the `javax.faces.webapp.FacesServlet` by giving it
    a name (e.g., Faces Servlet) and a mapping. In this example, all requests that
    have the `.faces` extension are mapped to be managed by the servlet, and any request
    such as `http://localhost:8080/chapter10-1.0/newBook.faces` will be handled by
    JSF.


    You can also configure a few JSF-specific parameters in the `<context-param>`
    element. Table 12-1 lists some of these parameters.


    **Table 12-1.** *JSF-Specific Configuration Parameters*


    | Parameter | Description |

    | --- | --- |

    | `javax.faces.CONFIG_FILES` | Defines a comma-delimited list of context-relative
    resource paths under which the JSF implementation will look for resources. |

    | `javax.faces.DEFAULT_SUFFIX` | Allows the web application to define a list of
    alternative suffixes for pages containing JSF content (e.g., `.xhtml`). |

    | `javax.faces.LIFECYCLE_ID` | Identifies the `Lifecycle` instance to be used
    when processing JSF requests. |

    | `javax.faces.STATE_SAVING_METHOD` | Defines the location where state is saved.
    Valid values are `server`, which is the default (typically saved in `HttpSession`)
    and `client` (saved as a hidden field in the subsequent form submit). |

    | `javax.faces.PROJECT_STAGE` | Describes where this particular JSF application
    is in the software development life cycle (`Development`, `UnitTest`, `SystemTest`,
    or `Production`). This could be used by a JSF implementation to cache resources
    in order to improve performance in production, for example. |

    | `javax.faces.DISABLE_FACELET_JSF_VIEWHANDLER` | Disables Facelets as the default
    page declaration language (PDL) if set to `true`. |

    | `javax.faces.LIBRARIES` | |'
