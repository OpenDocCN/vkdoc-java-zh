- fmt: '# The acknowledgement mode (default is `AUTO_ACKNOWLEDGE`)


    ## `subscriptionDurability`


    The subscription durability (default is `NON_DURABLE`)


    ## `subscriptionName`


    The subscription name of the consumer


    As in the API of the `javax.jms.Session` class, acknowledgement can take three
    different modes, but only two can be used with MDBs:


    - `AUTO_ACKNOWLEDGE`: The session automatically acknowledges the reception of
    a message.

    - `DUPS_OK_ACKNOWLEDGE`: This mode instructs the session to lazily acknowledge
    the delivery of messages (sometimes resulting in the delivery of duplicate messages).

    - `CLIENT_ACKNOWLEDGE`: This mode is not permitted, as MDBs should not attempt
    to use the JMS API directly for message acknowledgment. Acknowledgment is handled
    automatically by the container.


    ## Dependencies Injection


    Like all the other EJBs that you’ve seen in Chapter 6, MDBs can use dependency
    injection to acquire references to resources such as JDBC datasources, EJBs, or
    other objects. *Injection* is the means by which the container inserts an object
    reference automatically for annotated attributes. These resources have to be available
    in the container or environment context, so the following code is allowed in an
    MDB:


    ```

    @PersistenceContext

    private EntityManager em;


    @EJB

    private InvoiceBean invoice;


    @Resource(name = "jms/javaee6/ConnectionFactory")

    private ConnectionFactory connectionFactory;

    ```


    The MDB context can also be injected using the `@Resource` annotation:


    ```

    @Resource

    private MessageDrivenContext context;

    ```


    ## MDB Context


    The `MessageDrivenContext` interface provides access to the runtime context that
    the container provides for an MDB instance. The container passes the `MessageDrivenContext`
    interface to this instance, which remains associated for the lifetime of the MDB.
    This gives the MDB the possibility to explicitly roll back a transaction, get
    the user principal, and so on. The `MessageDrivenContext` interface extends the
    `javax.ejb.EJBContext` interface without adding any extra methods.


    If the MDB injects a reference to its context, it will be able to invoke the methods
    listed in Table 13-6.


    **Table 13-6.** *Methods of the `MessageDrivenContext` Interface*


    | Method | Description |

    |--------|-------------|

    | `getCallerPrincipal` | Returns the `java.security.Principal` associated with
    the invocation. |

    | `getRollbackOnly` | Tests whether the current transaction has been marked for
    rollback. |

    | `getTimerService` | Returns the `javax.ejb.TimerService` interface. |

    | `getUserTransaction` | Returns the `javax.transaction.UserTransaction` interface
    to use to demarcate transactions. Only MDBs with bean-managed transaction (BMT)
    can use this method. |

    | `isCallerInRole` | Tests whether the caller has a given security role. |

    | `Lookup` | Enables the MDB to look up its environment entries in the JNDI naming
    context. |

    | `setRollbackOnly` | Allows the instance to mark the current transaction as rollback.
    Only MDBs with BMT can use this method. |


    ## Life Cycle and Callback annotations


    The MDB life cycle (see Figure 13-11) is identical to the stateless session bean:
    either the MDB exists and is ready to consume messages or it doesn’t exist. Before
    exiting, the container first creates an instance of the MDB and, if applicable,
    injects the necessary resources as specified by metadata annotations (`@Resource`,
    `@Ejb`, etc.) or deployment descriptor. The container then calls the bean’s `@PostConstruct`
    callback method, if any. After this, the MDB is in the ready state and waits to
    consume any incoming message. The `@PreDestroy` callback occurs when the MDB is
    removed from the pool or destroyed.


    **Figure 13-11.** *MDB life cycle*


    This behavior is identical to stateless session beans (see Chapter 8 for more
    details about callback methods and interceptors), and with other EJBs you can
    add interceptors with the `@javax.ejb.AroundInvoke` annotation.


    ## MDB As a Consumer'
  raw: 'The acknowledgement mode (default is AUTO_ACKNOWLEDGE)


    subscriptionDurability


    The subscription durability (default is NON_DURABLE)


    subscriptionName


    The subscription name of the consumer


    As in the API of the javax.jms.Session class, acknowledgement can take three different


    modes, but only two can be used with MDBs:


    • AUTO_ACKNOWLEDGE: The session automatically acknowledges the reception of a
    message.


    • DUPS_OK_ACKNOWLEDGE: This mode instructs the session to lazily acknowledge the
    delivery of messages (sometimes resulting in the delivery of duplicate messages).


    • CLIENT_ACKNOWLEDGE: This mode is not permitted, as MDBs should not attempt to
    use


    the JMS API directly for message acknowledgment. Acknowledgment is handled auto-


    matically by the container.


    Dependencies Injection


    Like all the other EJBs that you’ve seen in Chapter 6, MDBs can use dependency
    injection to acquire references to resources such as JDBC datasources, EJBs, or
    other objects. *Injection* is the means by which the container inserts an object
    reference automatically for annotated attributes. These resources have to be available
    in the container or environment context, so the following code is allowed in an
    MDB:


    **@PersistenceContext**


    private EntityManager em;


    **@EJB**


    private InvoiceBean invoice;


    **@Resource**(name = "jms/javaee6/ConnectionFactory")


    private ConnectionFactory connectionFactory;


    The MDB context can also be injected using the @Resource annotation:


    @Resource private **MessageDrivenContext** context;


    MDB Context


    The MessageDrivenContext interface provides access to the runtime context that
    the container provides for an MDB instance. The container passes the MessageDrivenContext
    interface


    to this instance, which remains associated for the lifetime of the MDB. This gives
    the MDB


    the possibility to explicitly roll back a transaction, get the user principal,
    and so on. The


    ![Image 122](index-413_1.jpg)


    Chapter 13 ■ SeNDING MeSSaGeS


    **383**


    MessageDrivenContext interface extends the javax.ejb.EJBContext interface without
    adding any extra methods.


    If the MDB injects a reference to its context, it will be able to invoke the methods
    listed in Table 13-6.


    **Table 13-6.** *Methods of the MessageDrivenContext Interface*


    **Method**


    **Description**


    getCallerPrincipal


    Returns the java.security.Principal associated with the invocation.


    getRollbackOnly


    Tests whether the current transaction has been marked for rollback.


    getTimerService


    Returns the javax.ejb.TimerService interface.


    getUserTransaction


    Returns the javax.transaction.UserTransaction interface to use to


    demarcate transactions. Only MDBs with bean-managed transaction


    (BMT) can use this method.


    isCallerInRole


    Tests whether the caller has a given security role.


    Lookup


    Enables the MDB to look up its environment entries in the JNDI naming


    context.


    setRollbackOnly


    Allows the instance to mark the current transaction as rollback. Only MDBs


    with BMT can use this method.


    Life Cycle and Callback annotations


    The MDB life cycle (see Figure 13-11) is identical to the stateless session bean:
    either the MDB


    exists and is ready to consume messages or it doesn’t exist. Before exiting, the
    container first creates an instance of the MDB and, if applicable, injects the
    necessary resources as specified by metadata annotations (@Resource, @Ejb, etc.)
    or deployment descriptor. The container then calls the bean’s @PostConstruct callback
    method, if any. After this, the MDB is in the ready state and waits to consume
    any incoming message. The @PreDestroy callback occurs when the MDB is removed
    from the pool or destroyed.


    **Figure 13-11.** *MDB life cycle*


    This behavior is identical to stateless session beans (see Chapter 8 for more
    details about callback methods and interceptors), and with other EJBs you can
    add interceptors with the


    [@javax.ejb.AroundInvoke annotation.](mailto:@javax.ejb.AroundInvoke)


