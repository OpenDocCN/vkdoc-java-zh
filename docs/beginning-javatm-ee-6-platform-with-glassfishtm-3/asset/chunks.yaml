    请注意，`@Ignore` 接受一个可选参数（一个字符串），用于记录测试被忽略的原因。


    断言方法


    测试用例必须断言对象符合预期结果。为此，JUnit 提供了一个包含多个方法的 `Assert` 类。要使用它，你可以使用带前缀的语法（例如 `Assert.assertEquals()`），或者静态导入
    `Assert` 类（如清单 1-9 所示）。正如你在 `notNegative()` 方法中看到的，你也可以使用 Java 的 `assert` 关键字。


    夹具


    夹具是在测试期间初始化和释放任何公共对象的方法。JUnit 使用 `@Before` 和 `@After` 注解在每个测试之前或之后执行代码。这些方法可以任意命名（本例中为
    `clearCustomerHelper()`），并且一个测试类中可以有多个此类方法。JUnit 使用 `@BeforeClass` 和 `@AfterClass`
    注解来仅对每个类执行一次特定代码。这些方法必须是唯一的且为静态的。如果你需要分配和释放昂贵的资源，`@BeforeClass` 和 `@AfterClass`
    会非常有用。


    启动 JUnit


    要运行 JUnit 启动器，你必须将 JUnit jar 文件添加到你的 `CLASSPATH` 变量中（或添加 Maven 依赖）。之后，你可以通过 Java
    启动器运行测试，如下代码所示。请注意，当使用 `assert` 时，你必须指定 `–ea` 参数；否则，断言将被忽略。


    java **–ea** org.junit.runner.JUnitCore com.apress.javaee6.CustomerHelperTest


