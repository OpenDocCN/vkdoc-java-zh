    Websphere, MQSeries, etc.) or open source (GlassFish, JBoss, Hibernate, Open JPA,
    Jersey, etc.) frameworks for handling transactions, security, stateful components,
    object persistence, and so on.


    Today, more than ever in the history of Java EE, your application is deployable
    to any compliant application server with very few changes.


    **Architecture**


    Java EE is a set of specifications implemented by different containers. Containers
    are Java EE


    runtime environments that provide certain services to the components they host
    such as lifecycle management, dependency injection, and so on. These components
    use well-defined


    contracts to communicate with the Java EE infrastructure and with the other components.


    They need to be packaged in a standard way (via archive files) before being deployed.
    Java EE


    is a superset of the Java SE platform, which means Java SE APIs can be used by
    any Java EE


    components.'
  trans: '

    Java EE 6 是一个重要的里程碑。它不仅延续了 Java EE 5 专注于简化开发模型的步伐，还增加了新的规范，并通过引入配置文件和精简机制使其更加轻量。Java
    EE 6 的发布恰逢企业平台诞生十周年。它结合了 Java 语言的优势与过去十年积累的经验。此外，它还受益于开源社区的活力以及 JCP 的严谨性。如今，Java
    EE 是一个文档完备的平台，拥有经验丰富的开发者、庞大的社区，以及众多部署在


    公司服务器上运行的应用。Java EE 是一套用于构建标准化的、基于组件的多层应用程序的 API 集合。这些组件部署在不同的容器中，这些容器提供一系列服务。


    **一点历史**


    十年是一个回顾 Java EE（见图 1-1）演变的良好时机，它以前被称为 J2EE。J2EE 1.2 最初由 Sun 公司开发，于 1999 年作为一项包含十个
    Java 规范请求（JSR）的总括规范发布。当时人们还在谈论 CORBA，因此 J2EE 1.2 在设计时就考虑到了分布式系统。企业 JavaBeans（EJB）被引入，支持远程有状态和无状态服务对象，并可选择支持持久化对象（实体
    Bean）。它们构建在事务性和分布式组件模型之上，使用 RMI-IIOP（远程方法调用-互联网


    内部 ORB 协议）作为底层协议。Web 层拥有 Servlet 和 JavaServer Pages（JSP），而 JMS 用于发送消息。


    **图 1-1.** *J2EE/Java EE 的历史*


    第 1 章 ■ 概览 Java EE 6


    **3**


    ■**注** CORBA 大约起源于 1988 年，正是因为企业系统开始走向分布式（例如，Tuxedo、CICS）。EJB 以及随后的 J2EE 都基于相同的假设，但那是十年之后的事了。


    到 J2EE 起步时，CORBA 已经成熟且具备工业级强度，但公司开始寻求纯 Java 的解决方案。CORBA 的语言无关方法变得多余。


    从 J2EE 1.3 开始，该规范由 Java 社区进程（JCP）根据 JSR 58 制定。对实体 Bean 的支持成为强制要求，并且 EJB 引入了 XML


    部署描述符来存储元数据（在 EJB 1.0 中，这些元数据被序列化到一个文件中）。此版本通过引入本地接口和按引用传递参数，解决了通过远程接口按值传递参数的开销问题。引入了
    J2EE 连接器架构（JCA）来连接 Java EE 与企业信息系统（EIS）。


    ■**注** JCP 是一个开放的组织，成立于 1998 年，参与定义 Java 平台的未来版本和特性。当确定需要新的组件或 API 时，发起人（也称为规范负责人）会创建一个
    JSR 并组建一个专家组。该小组由公司代表、组织或个人组成，负责 JSR 的开发，并需要交付：1）一份解释细节并定义 JSR 基础的规范，2）一个参考实现（RI），即该规范的实际实现，以及
    3）一个兼容性测试套件（也称为技术兼容性套件，或 TCK），这是一组测试，每个实现都需要通过才能声称符合规范。一旦获得执行委员会（EC）批准，该规范就会发布给社区进行实现。Java
    EE 被称为总括 JSR 或平台版规范（例如配置文件），因为它将其他 JSR 联系在一起。


    J2EE 1.4（JSR 151）在 2003 年包含了 20 个规范，并增加了对 Web 服务的支持。


    EJB 2.1 允许通过 SOAP/HTTP 调用会话 Bean。创建了一个定时器服务，允许在指定时间或间隔调用 EJB。此版本为应用程序组装和部署提供了更好的支持。


    尽管其支持者预测它会有光明的未来，但 J2EE 的承诺并未全部实现。用它创建的系统过于复杂，开发时间常常与用户需求的复杂性完全不成比例。J2EE 被视为一个重量级组件模型：难以测试、难以部署、难以运行。就在那时，像
    Struts、Spring 或 Hibernate 这样的框架出现了，并展示了一种开发企业应用的新方式。幸运的是，在 2006 年第二季度，Java EE
    5（JSR 244）发布了，并带来了显著的改进。它从开源框架中汲取灵感，回归了简单的旧式 Java 对象（POJO）编程模型。


    元数据可以通过注解定义，XML 描述符变为可选。从开发者的角度来看，EJB 3 和新的 JPA 更像是平台的一次量子飞跃，而非演进。JavaServer Faces（JSF）被引入作为标准的表示层框架，而
    JAX-WS 2.0 取代了 JAX-RPC 成为 SOAP Web 服务 API。


    **4**


    第 1 章 ■ 概览 Java EE 6


    如今，Java EE 6（JSR 316）遵循简化开发的路径，在整个平台（包括 Web 层）中拥抱注解、POJO 编程和异常配置机制的概念。它带来了一系列丰富的创新，例如全新的
    JAX-RS 1.1，简化了像 EJB 3.1 这样的成熟 API，并丰富了其他 API，如 JPA 2.0 或定时器服务。但 Java EE 6 的主要主题是可移植性（例如，通过标准化全局
    JNDI 命名）、弃用某些规范（通过精简），以及通过配置文件创建平台的子集。在本书中，我想向您展示这些改进，以及 Java 企业版变得多么简单和丰富。


    **标准**


    如您所见，Java EE 基于标准。它是一个总括规范，捆绑了许多其他 JSR。您可能会问为什么标准如此重要，因为一些最成功的 Java 框架并未标准化（Struts、Spring
    等）。纵观历史，人类创建标准是为了简化沟通和交流。一些显著的


    例子包括语言、货币、时间、导航、度量衡、工具、铁路、电力、电报、电话、协议和编程语言。


    在 Java 的早期，如果您从事任何类型的 Web 或企业开发，您都生活在一个专有的世界里，要么创建自己的框架，要么将自己锁定在专有的商业框架中。然后是开源框架的时代，这些框架并不总是基于开放标准。您可以使用开源并被锁定在单一实现上，或者使用实现标准的开源并保持可移植性。Java
    EE


    提供了开放标准，这些标准由多个商业（WebLogic、Websphere、MQSeries 等）或开源（GlassFish、JBoss、Hibernate、Open
    JPA、Jersey 等）框架实现，用于处理事务、安全性、有状态组件、对象持久化等。


    如今，在 Java EE 的历史上，您的应用程序比以往任何时候都更容易部署到任何兼容的应用服务器上，只需进行极少的更改。


    **架构**


    Java EE 是一组由不同容器实现的规范。容器是 Java EE


    运行时环境，为它们托管的组件提供某些服务，例如生命周期管理、依赖注入等。这些组件使用定义良好的


    契约与 Java EE 基础设施以及其他组件进行通信。它们需要以标准方式（通过归档文件）打包后才能部署。Java EE


    是 Java SE 平台的超集，这意味着任何 Java EE 组件都可以使用 Java SE API。

