- fmt: '# RESTful Web Services


    ## HTTP


    HTTP, a protocol for distributed, collaborative, hypermedia information systems,
    led to the establishment of the World Wide Web together with URIs, HTML, and the
    first browsers.


    Coordinated by the World Wide Web Consortium (W3C) and Internet Engineering Task
    Force (IETF), HTTP is the result of several Requests For Comment (RFC), notably
    RFC 216, which defines HTTP 1.1. HTTP is based on requests and responses exchanged
    between a client and a server.


    ### Request and Response


    A client sends a request to a server, expecting an answer (see Figure 15-1). The
    message exchanges are made of an envelope and a body, also called a document or
    representation.


    **Figure 15-1.** *HTTP request and response*


    For instance, here is a type of request sent to a server:


    ```

    $ curl -v http://www.apress.com/book/catalog?category=32

    ```


    > **GET** /book/catalog?category=32 HTTP/1.1

    > User-Agent: curl/7.19.3 (i586-pc-mingw32msvc) libcurl/7.19.3 zlib/1.2.3

    > Host: www.apress.com

    > Accept: */*


    This request has several pieces of information sent from the client:


    - The HTTP method, here `GET`

    - The path, here `/book/catalog?category=32`

    - Several other request headers


    Notice that there is no body as part of the request. Actually a `GET` never has
    a body. To the request, the server will send the following response:


    ```

    < HTTP/1.1 200 OK

    < Date: Mon, 23 Feb 2009 07:28:09 GMT

    < Server: Apache/2.0.63 (Unix) PHP/5.2.6

    < X-Powered-By: PHP/5.2.6

    < Set-Cookie: PHPSESSID=b9ae64b800781d9761670fcf6067a317; path=/

    < Expires: Thu, 19 Nov 1981 08:52:00 GMT

    < Cache-Control: no-store, no-cache, must-revalidate, post-check=0, pre-check=0

    < Pragma: no-cache

    < Transfer-Encoding: chunked

    < Content-Type: text/html

    ```


    ```

    <!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">

    <html>

    <head>

    <title>

    ...

    ```


    This response is made up of the following:


    - *A response code*: In this case, the response code is `200 OK`.

    - *Several response headers*: In the preceding code, the response headers are
    `Date`, `Server`, `Content-Type`. Here the content type is `text/html`, but it
    could be any other media such as XML (`application/xml`) or images (`image/jpeg`).

    - *Entity body, or representation*: The content of the returned web page is the
    entity body in this example (here I just showed a fragment of an HTML page).


    > **Note:** Here I am using cURL (http://curl.haxx.se/) as a client, but I could
    have used Firefox or any other web client that deals with HTTP requests. cURL
    is a command-line tool for transferring files with URL syntax via protocols such
    as HTTP, FTP, Gopher, SFTP, FTPS, SCP, TFTP, and many more. You can send HTTP
    commands, change HTTP headers, and so on. It is a good tool for simulating a user''s
    actions at a web browser.


    ## HTTP Methods


    The Web consists of well-identified resources linked together and accessed through
    simple HTTP requests. The main types of requests standardized in HTTP are `GET`,
    `POST`, `PUT`, `DELETE`. These are called verbs, or methods. HTTP defines four
    other verbs that are less frequently used: `HEAD`, `TRACE`, `OPTIONS`, `CONNECT`.


    ### GET


    `GET` is a simple read that requests a representation of a resource. `GET` should
    be implemented in a safe way, meaning it shouldn''t change the state of the resource.
    In addition, `GET` must be idempotent, which means it must leave the resource
    in the same state when called once, twice, or more. Safety and idempotence bring
    greater stability. When a client does not get a response (e.g., due to a network
    failure), it might renew its requests, and those new requests will expect the
    same answer it should have received originally, without corrupting the resource
    state on the server.


    ### POST


    Given a representation (text, XML, etc.), `POST` creates a new resource as a subordinate
    of a main resource identified by the requested URI. Examples of `POST` could be
    appending a message to a log file, a comment to a blog, a book to a booklist,
    and so on. Consequently, `POST` is not safe (the resource state is updated) nor
    idempotent (sending the request twice will result in two new subordinates). If
    a resource has been created on the origin server, the response should be status
    `201` (Created). Most modern browsers generate only `GET` and `POST`.


    ### PUT


    A `PUT` request is intended to update the state of the resource stored under a
    given URI. If the request URI refers to a nonexistent resource, the resource will
    be created under this same URI. `PUT` is not safe (because the state of the resource
    gets updated), but it is idempotent: you can send the same `PUT` request many
    times, and the final resource state will always be the same.


    ### DELETE


    A `DELETE` request deletes the resource. The response to a `DELETE` may be a status
    message as part of the body or no status at all. `DELETE` is also idempotent but
    not safe.


    ### Others


    As mentioned previously, other HTTP actions exist, even if they are less used:


    - `HEAD` is identical to `GET` except that the server doesn''t return a message
    body in the response. `HEAD` might be useful for checking the validity of a link
    or the size of an entity without transferring it.

    - `TRACE` echoes back the received request.

    - `OPTIONS` represents a request for information about the communication options
    available on the request/response chain identified by the URI. This method allows
    the client to determine the options and/or requirements associated with a resource,
    or the capabilities of a server, without implying a resource action or initiating
    resource retrieval.

    - `CONNECT` is used in conjunction with a proxy that can dynamically switch to
    being a tunnel (a technique by which the HTTP protocol acts as a wrapper for various
    network protocols).


    ## Content Negotiation


    Content negotiation, described in section 12 of the HTTP standard, is defined
    as "the process of selecting the best representation for a given response when
    there are multiple representations available." Clients'' needs, desires, and capabilities
    vary; the best representation for a mobile-device user in Japan might not be the
    best for a feed-reader application in the US.


    Content negotiation is based on, but not limited to, the HTTP request headers
    `Accept`, `Accept-Charset`, `Accept-Encoding`, `Accept-Language`, and `User-Agent`.
    For example, to get the CSV representation of Apress Java books, the client application
    (the user agent) will request `http://www.apress.com/book/catalog/java` with a
    header `Accept` set to `text/csv`. You could also imagine that, based on the `Accept-Language`
    header, the content of the CSV document might be translated by the server into
    the corresponding language.


    ## Content Types


    While SOAP-based services rely on WSDL to describe the format of possible requests
    for a given web service, Web Application Description Language (WADL) is used to
    expose the possible interactions with a given RESTful web service. It eases client
    development, which can load and interact directly with the resources. This book
    will not cover WADL, as it is not mandatory for REST services and is not widely
    used.'
