    \ that are used for all methods of all the EJBs defined in the application. There\
    \ is no annotation that has an application scope. If you want to apply default\
    \ interceptors in your application, you need to define them in the deployment\
    \ descriptor (`ejb-jar.xml`).\n\nIf you want to apply the default interceptor\
    \ `ProfileInterceptor` to all your EJBs, this is the portion of XML you need to\
    \ add to the deployment descriptor:\n\n```\n<assembly-descriptor>\n    <interceptor-binding>\n\
    \        <ejb-name>*</ejb-name>\n        <interceptor-class>\n            com.apress.javaee6.ProfileInterceptor\n\
    \        </interceptor-class>\n    </interceptor-binding>\n</assembly-descriptor>\n\
    ```\n\nAs you can see, the wildcard `*` in `<ejb-name>` means that every EJB should\
