- fmt: "# JMS Message Structure\n\nA body contains the actual message and can take\
    \ several formats (text, bytes, object, etc.).\n\n**Figure 13-8.** *Structure\
    \ of a JMS message*\n\n## Header\n\nThe header has predefined name-value pairs,\
    \ common to all messages that both clients and providers use to identify and route\
    \ messages. They can be seen as message metadata as they give information about\
    \ the message. Each field has associated getter and setter methods defined in\
    \ the `javax.jms.Message` interface. Some header fields are intended to be set\
    \ by a client, but many are set automatically by the `send()` or the `publish()`\
    \ method.\n\nTable 13-3 describes each JMS message header field.\n\n**Table 13-3.**\
    \ *Fields Contained in the Header*\n\n| Field | Description | Set By |\n|-------|-------------|--------|\n\
    | `JMSDestination` | This indicates the destination to which the message is being\
    \ sent. | `send()` or `publish()` method |\n| `JMSDeliveryMode` | JMS supports\
    \ two modes of message delivery. `PERSISTENT` mode instructs the provider to ensure\
    \ the message is not lost in transit due to a failure. `NON_PERSISTENT` mode is\
    \ the lowest-overhead delivery mode because it does not require the message to\
    \ be logged to a persistent storage. | `send()` or `publish()` method |\n| `JMSMessageID`\
    \ | This provides a value that uniquely identifies each message sent by a provider.\
    \ | `send()` or `publish()` method |\n| `JMSTimestamp` | This contains the time\
    \ a message was handed off to a provider to be sent. | `send()` or `publish()`\
    \ method |\n| `JMSCorrelationID` | A client can use this field to link one message\
    \ with another such as linking a response message with its request message. |\
    \ Client |\n| `JMSReplyTo` | This contains the destination where a reply to the\
    \ message should be sent. | Client |\n| `JMSRedelivered` | This Boolean value\
    \ is set by the provider to indicate whether a message has been redelivered. |\
    \ Provider |\n| `JMSType` | This serves as a message type identifier. | Client\
    \ |\n| `JMSExpiration` | When a message is sent, its expiration time is calculated\
    \ and set based on the time-to-live value specified on the `send()` method. |\
    \ `send()` or `publish()` method |\n| `JMSPriority` | JMS defines a ten-level\
    \ priority value, with 0 as the lowest priority and 9 as the highest. | `send()`\
    \ or `publish()` method |\n\n[*JMS 1.1 Specification, “3.4: Message Header Fields,”*](http://jcp.org/en/jsr/detail?id=914)\n\
    \nYou can access these header fields through the `Message` interface as follows:\n\
    \n```\nmessage.getJMSCorrelationID();\nmessage.getJMSMessageID();\nmessage.setJMSPriority(6);\n\
    ```\n\n## Properties\n\nIn addition to the header fields, the `javax.jms.Message`\
    \ interface supports property values, which are just like headers, but explicitly\
    \ created by the application, instead of being standard across messages. This\
    \ provides a mechanism for adding optional header fields to a message that a client\
    \ will choose to receive or not via selectors. Property values can be `boolean`,\
    \ `byte`, `short`, `int`, `long`, `float`, `double`, and `String`. The code to\
    \ set and get properties looks like this:\n\n```\nmessage.setFloatProperty(\"\
    orderAmount\", 1245.5f);\nmessage.getFloatProperty(\"orderAmount\");\n```\n\n\
    ## Body\n\nThe body of a message is optional, and contains the data to send or\
    \ receive. Depending on the interface that you use, it can contain different formats\
    \ of data, as listed in Table 13-4.\n\n**Table 13-4.** *Types of Messages*\n\n\
    | Interface | Description |\n|-----------|-------------|\n| `StreamMessage` |\
    \ A message whose body contains a stream of Java primitive values. It is filled\
    \ and read sequentially. |\n| `MapMessage` | A message whose body contains a set\
    \ of name-value pairs where names are strings and values are Java primitive types.\
    \ |\n| `TextMessage` | A message whose body contains a string (for example, it\
    \ can contain XML). |\n| `ObjectMessage` | A message that contains a serializable\
    \ object or a collection of serializable objects. |\n| `BytesMessage` | A message\
    \ that contains a stream of bytes. |\n\nIt is possible to create your own message\
    \ format, if you extend the `javax.jms.Message` interface. Note that when a message\
    \ is received, its body is read-only. Depending on the message type, you have\
    \ different methods to access its content. A text message will have a `getText()`\
    \ and `setText()` method, an object message will have a `getObject()` and `setObject()`,\
    \ and so forth.\n\n```\ntextMessage.setText(\"This is a text message\");\ntextMessage.getText();\n\
    bytesMessage.readByte();\nobjectMessage.getObject();\n```\n\n## MessageProducer\n\
    \nA message producer is an object created by a session and used to send messages\
    \ to a destination. The generic `javax.jms.MessageProducer` interface can be used\
    \ to get a specific producer with a unified interface. For the P2P model, a message\
    \ producer is called a sender and implements the `QueueSender` interface. For\
    \ the pub-sub model, it is called a publisher and implements `TopicPublisher`.\
    \ Once you have created a message, depending on the interface you use, the producer\
    \ can send it (P2P) or publish it (pub-sub):\n\n```\nmessageProducer.send(message);\n\
    queueSender.send(message);\ntopicPublisher.publish(message);\n```\n\nA producer\
    \ can specify a default delivery mode, priority, and time-to-live for messages\
    \ sent. The following steps explain how to create a publisher that sends a message\
    \ to a topic (see Listing 13-5):\n\n1. Obtain a connection factory and a topic\
    \ using injection (or JNDI lookup).\n2. Create a `Connection` object using the\
    \ connection factory.\n3. Create a `Session` object using the connection.\n4.\
    \ Create a `MessageProducer` (or in this case it could have been a `TopicPublisher`)\
    \ using the `Session` object.\n5. Create one or more messages of any type (here\
    \ I used a `TextMessage`) using the `Session` object. After creation, populate\
    \ the message with the required data (this is done with the `setText()` method\
    \ in this example).\n6. Send one or more messages to the topic using the `MessageProducer.send()`\
    \ method (or the `TopicPublisher.publish()` method).\n\n**Listing 13-5.** *The\
    \ Sender Class Sends a Message to a Topic*\n\n```java\npublic class Sender {\n\
    \n    @Resource(mappedName = \"jms/javaee6/ConnectionFactory\")\n    private static\
    \ ConnectionFactory connectionFactory;\n\n    @Resource(mappedName = \"jms/javaee6/Topic\"\
    )\n    private static Topic topic;\n\n    public static void main(String[] args)\
    \ {\n        // Creates the needed artifacts to connect to the queue\n       \
    \ Connection connection = connectionFactory.createConnection();\n        Session\
    \ session = connection.createSession(false, Session.AUTO_ACKNOWLEDGE);\n\n   \
    \     MessageProducer producer = session.createProducer(topic);\n\n        //\
    \ Sends a text message to the topic\n        TextMessage message = session.createTextMessage();\n\
    \        message.setText(\"This is a text message\");\n\n        producer.send(message);\n\
    \n        connection.close();\n    }\n}\n```\n\n## MessageConsumer\n\nA client\
    \ uses a `MessageConsumer` to receive messages from a destination. A `MessageConsumer`\
    \ is created by passing a `Queue` or `Topic` to the `Session`'s `createConsumer()`\
    \ method. For the P2P model, a message consumer can implement the `QueueReceiver`\
    \ interface, and for the pub-sub model, it can implement `TopicSubscriber`.\n\n\
    Messaging is inherently asynchronous, in that there is no timing dependency between\
    \ producers and consumers. However, the client itself can consume messages in\
    \ two ways:\n\n- **Synchronously**: A receiver explicitly fetches the message\
    \ from the destination by calling the `receive()` method. Previous examples use\
    \ an infinite loop that blocks until the message arrives.\n- **Asynchronously**:\
    \ A receiver decides to register to an event that is triggered when the message\
    \ arrives. It has to implement the `MessageListener` interface, and whenever a\
    \ message arrives, the provider delivers it by calling the `onMessage()` method.\n\
    \nFigure 13-9 illustrates these two types of consumer.\n\n**Figure 13-9.** *Synchronous\
    \ and asynchronous consumers*\n\n### Synchronous Delivery"
