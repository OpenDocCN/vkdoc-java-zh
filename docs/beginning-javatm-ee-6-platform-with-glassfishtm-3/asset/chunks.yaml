    code to digest HTTP requests, nor create HTTP responses by hand. JAX-RS is a very
    elegant API allowing you to describe a resource with only a few annotations. Resources
    are POJOs that have at


    [least one method annotated with @javax.ws.rs.Path.](mailto:@javax.ws.rs.Path)
    Listing 15-2 shows a typical resource.


    **Listing 15-2.** *A Simple Book Resource*


    **@Path**("/book")


    public class BookResource {


    **@GET**


    **@Produces**("text/plain")


    public String getBookTitle() {


    return "H2G2";


    }


    }


    The BookResource is a Java class annotated with @Path, indicating that the resource
    will be hosted at the URI path /book. The getBookTitle() method is marked to process
    HTTP GET


    requests (using @GET annotation) and produces text (the content is identified
    by the MIME


    Media text/plain). To access this resource, you need an HTTP client such as a
    browser and an HTTP GET method to point to the URL [http://www.myserver.com/book.](http://www.myserver.com/book)


    As writing a resource with JAX-RS is easy, let’s explore further the JAX-RS API.


    **The JAX-RS Model**


    From Listing 15-2, you can see that the REST service doesn’t implement any interface
    nor extend any class; the only mandatory annotation to turn a POJO into a REST
    service is @Path.


    JAX-RS relies on configuration by exception, so it has a set of annotations to
    configure the default behavior. Following are the requirements to write a REST
    service:


    • The class must be annotated with [@javax.ws.rs.Path.](mailto:@javax.ws.rs.Path)


    • To add EJB capabilities to a REST service, the class has to be annotated with
    @javax.


    ejb.Stateless.


    • The class must be defined as public, and it must not be final or abstract.


    **442**


    Chapter 15 ■ reStFUL WeB SerVICeS


    • Root resource classes (classes with a @Path annotation) must have a default
    public constructor. Nonroot resource classes do not require such a constructor.


    • The class must not define the finalize() method.


    JAX-RS is HTTP-centric by nature and has a set of clearly defined classes and
    annotations to deal with HTTP and URIs. A resource can have several representations,
    so the API provides support for a variety of content types and uses JAXB to marshall
    and unmarshall XML and JSON representations into objects. JAX-RS is also independent
    on the container, so resources can be deployed in GlassFish, of course, but also
    in a variety of servlet containers.


    **How to Write a REST Service**


    REST services can be stateless session beans, allowing transactional access to
    a persistent layer (JPA entities), as shown in Listing 15-3.


    **Listing 15-3.** *A Book Resource Creating and Retrieving Books from the Database*


    @Path("books")


    **@Stateless**


    **@Produces**({"application/xml", "application/json"})


    **@Consumes**({"application/xml", "application/json"})


    public class BookResource {


    @Context


    private UriInfo uriInfo;


    @PersistenceContext(unitName = "chapter15PU")


    private EntityManager em;


