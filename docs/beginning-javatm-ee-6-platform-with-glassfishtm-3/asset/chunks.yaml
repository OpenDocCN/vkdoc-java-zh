    ## Web Interface Specifications Overview


    Web development in Java started in 1996 with the servlet API, a very rudimentary
    way to create dynamic web content. You had to manipulate a low-level HTTP API
    (`HttpServletRequest`, `HttpServletResponse`, `HttpSession`, etc.) to display
    HTML tags inside your Java code. JSPs arrived in 1999 and provided a higher level
    of abstraction than servlets. In 2004, the first version of JSF arrived, with
    version 1.2 becoming part of Java EE 5 in 2006. JSF 2.0 is now bundled with Java
    EE 6.


    ## A Brief History of Web Interfaces


    At first, web pages were static. A user would request a resource (a web page,
    an image, a video, etc.), and the server would return it; simple, but very limited.
    With the growth of commercial activity on the Web, companies had to deliver dynamic
    content to their customers. The first solution for creating dynamic content was
    the Common Gateway Interface (CGI). By using HTML pages and CGI scripts written
    in any number of languages (from Perl to Visual Basic), an application could access
    databases and serve dynamic content, but it was clear that CGI was too low level
    (you had to handle HTTP headers, call HTTP commands, etc.) and needed to be improved.


    In 1995, a new language called Java was released with a platform-independent user
    interface API called Abstract Window Toolkit (AWT). Later on, in Java SE 1.2,
    AWT, which relies on the operating system''s user interface module, was superseded
    by the Swing API (which draws its own widgets by using Java 2D). During these
    early days of Java, Netscape''s Navigator browser offered support for this new
    language, which opened the era of applets. *Applets* are applications that run
    on the client side, inside a browser. This allowed developers to write applications
    in AWT or Swing and embed them on a web page. However, applets never really took
    off. Netscape also created a scripting language called JavaScript that executes
    directly in the browser. Despite some incompatibilities between browsers, JavaScript
    is still heavily used today and is a powerful way to create dynamic web applications.


    After the failure of applets to become widely adopted, Sun introduced servlets
    as a way to have thin, dynamic web clients. Servlets were an alternative to CGI
    scripts because they would offer a higher-level library for handling HTTP, had
    full access to the Java API (allowing database access, remote invocation, etc.),
    and could create HTML as a response to be displayed for the user.


    Sun released JSP in 1999 as an enhancement of the servlet model. But because JSPs
    were mixing Java and HTML code, in 2001 an open source framework arrived and opened
    doors to a new approach: Struts. This extended the servlet API and encouraged
    developers to adopt an MVC architecture. Recent history is full of other web frameworks,
    each trying to fill the gaps of the last (Tapestry, Wicket, WebWork, DWR, etc.).
    Today, JSF 2.0 is the preferred web framework in Java EE 6. It competes with Struts
    and Tapestry within the Java space. Rails and Grails compete with JSF overall,
    in the sense that Java competes with Ruby or Groovy. Google Web Toolkit (GWT),
    Flex, and JavaFX can be complementary to JSF.


    ## JSP 2.2, EL 2.2, and JSTL 1.2


    Architecturally, JSPs are a high-level abstraction of servlets and were implemented
    as an extension of Servlet 2.1. JSP 1.2 and Servlet 2.3 were specified together
    in JSR 53. At the same time, the JSP Standard Tag Library (JSTL) was specified
    in JSR 52.


    Since 2002, the JSP 2.0 specification has evolved separately from servlets in
    JSR 152. In 2006, JSP 2.1 was part of Java EE 5 and facilitated the integration
    between JSF and JSP by introducing a unified EL. With Java EE 6, both JSP and
    EL specifications have been updated to a 2.2 version. One of the major changes
    is the possibility of invoking a method with EL (instead of just properties).'
