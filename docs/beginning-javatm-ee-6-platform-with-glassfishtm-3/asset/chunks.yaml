    key in the CUSTOMER table, the insert statement for ADDRESS


    will be executed first, followed by that for CUSTOMER.


    ■**Note** Most of the entities in this chapter do not implement the Serializable
    interface. That’s because entities don’t have to in order to get persisted in
    the database. They are passed by reference from one method to the other, and when
    they have to be persisted, the EntityManager.persist() method is invoked. But
    if you need to pass entities by value (remote invocation, external EJB container,
    etc.), they must implement the java.io.Serializable marker (no method) interface.
    It indicates to the compiler that it must enforce all fields on the entity class
    to be serializable, so that any instance can be serialized to a byte stream and
    passed using Remote Method Invocation (RMI).


    Finding by ID


    To find an entity by its identifier, you can use two different methods. The first
    is the EntityManager.find() method, which takes two parameters: the entity class
    and the unique identifier (see Listing 4-10). If the entity is found, it is returned;
    if it is not found, a null value is returned.


    **Listing 4-10.** *Finding a Customer by ID*


    Customer customer = **em.find**(Customer.class, 1234L)


    if (customer!= null) {


    // Process the object


    }


    The second method is getReference() (see Listing 4-11). It is very similar to
    the find


    operation, as it takes the same parameters, but it allows retrieval of a reference
    to an entity via its primary key, not its data. It is intended for situations
    where a managed entity instance is needed, but no data, other than potentially
    the entity’s primary key being accessed. With getReference(), the state data is
    fetched lazily, which means that if you don’t access state before the entity is
    detached, the data might not be there. If the entity is not found, an EntityNotFoundException
    is thrown.


    **Listing 4-11.** *Finding a Customer by Reference*


    try {


    Customer customer = **em.getReference**(Customer.class, 1234L)


    // Process the object


    **130**


    Chapter 4 ■ MaNaGING perSISteNt OBJeCtS


    } catch(EntityNotFoundException ex) {


    // Entity not found


    }


