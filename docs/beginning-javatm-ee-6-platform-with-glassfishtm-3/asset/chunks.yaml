    **参考实现**


    GlassFish 是一个由 Sun Microsystems 领导的开源应用服务器项目，用于 Java EE 平台。该项目于 2005 年启动，并于 2006
    年成为 Java EE 5 的参考实现。如今，GlassFish v3 是 EJB 3.1 的参考实现。在内部，该产品围绕模块化构建（基于 Apache Felix
    OSGi 运行时），允许非常快速的启动时间，并使用一组不同的应用程序容器（当然是 Java EE 6，也包括 Ruby、PHP 等）。


    本书将全程使用 GlassFish 作为主要应用服务器来部署和运行 EJB，以及 JSF 页面、SOAP 和 RESTful Web 服务以及 JMS MDB。


