  trans: '

    执行业务逻辑（或委托给 EJB 等）、处理页面间的导航以及持有数据。一个典型的 JSF 应用程序包含一个或多个可由多个页面共享的受管 Bean。


    数据保存在受管 Bean（也称为后台 Bean）的属性中。后台 Bean 定义了 UI 组件所绑定的数据（例如表单的目标）。要将组件绑定到后台 Bean，你需要使用表达式语言。


    **如何编写受管 Bean**


    编写受管 Bean 就像编写 EJB 或 JPA 实体一样简单；它只是一个使用`@ManagedBean`注解的 Java 类（参见清单 12-3）。无需`faces-config.xml`条目、辅助类或继承。JSF
    2.0 还使用了“异常配置”机制，只需一个注解，你就可以使用所有默认设置，并用这样的受管 Bean 部署你的 Web 应用程序。


    **清单 12-3.** *一个简单的受管 Bean*


    **@ManagedBean**


    public class BookController {


    private Book **book** = new Book();


    public String **doCreateBook()** {


    createBook(book);


    return " **listBooks.xhtml**";


    }


    // 构造方法、getter、setter


    }


    第 12 章 ■ 处理与导航


    **333**


    清单 12-3 展示了受管 Bean 的编程模型：它持有状态（book 属性），定义了页面中引用的动作方法（`doCreateBook()`），并处理导航（返回`"listBooks.xhtml"`）。


    **受管 Bean 模型**


    受管 Bean 是由`FacesServlet`管理的 Java 类。UI 组件绑定到受管 Bean（或后台 Bean）的属性，并且可以调用动作方法。受管
    Bean 需要遵循以下要求：


    *   该类必须使用`@javax.faces.model.ManagedBean`注解或`faces-config.xml`部署描述符中的等效 XML 进行注解。

    *   该类必须有一个作用域（默认为`@RequestScoped`）。

    *   该类必须定义为`public`；不能是`final`或`abstract`。

    *   该类必须有一个公共的无参构造方法，容器将使用它来创建实例。

    *   该类不能定义`finalize()`方法。

    *   属性必须有公共的 getter 和 setter 方法才能绑定到组件。


    遵循 Java EE 6 的易用性模型，受管 Bean 可以简单地是一个带注解的 POJO，从而消除了大部分配置。但是，如果你仍然需要自定义，可以使用`@ManagedBean`和`@ManagedProperty`作用域注解（或等效
    XML）的元素。


    **@ManagedBean**


    在类上存在`@javax.faces.model.ManagedBean`注解会自动将其注册为受管 Bean。此注解的 API 很简单，所有元素都是可选的（参见清单
    12-4）。


    **清单 12-4.** *ManagedBean 注解 API*


    @Target(TYPE) @Retention(RUNTIME)


    public @interface **ManagedBean** {


    String **name**() default "";


    boolean **eager**() default false;


    }


    `name`元素指定受管 Bean 的名称（默认情况下是类名，首字母小写）。如果`eager`元素的值为`true`，则在 Web 应用程序启动时实例化该受管
    Bean。


    UI 组件绑定到受管 Bean 的属性；更改受管 Bean 的默认名称会影响你调用属性或方法的方式。清单 12-4 中的代码将受管 Bean 重命名为`myManagedBean`。


    **334**


    第 12 章 ■ 处理与导航


    **清单 12-5.** *一个重命名的受管 Bean*


    @ManagedBean(**name = "myManagedBean"** )


    public class BookController {


    private Book **book** = new Book();


    public String **doCreateBook()** {


    createBook(book);


    return " **listBooks.xhtml**";


    }


    // 构造方法、getter、setter


    }


    要在页面中调用此受管 Bean 的属性或方法，你必须使用重写后的名称，如下所示：


    <h:outputText value="#{**myManagedBean**.book.isbn}"/>


    <h:form>


    <h:commandLink action="#{**myManagedBean**.doCreateBook}">


    创建一本新书


    </h:commandLink>


    </h:form>


    作用域

