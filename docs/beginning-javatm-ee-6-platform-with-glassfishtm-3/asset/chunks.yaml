    < **packaging**>jar</packaging>


    </project>


    A project is often divided into different artifacts. These artifacts are then
    grouped under the same groupId (similar to packages in Java) and uniquely identified
    by the artifactId.


    Packaging allows Maven to produce the artifact following a standard format (jar,
    war, ear, etc.).


    Finally, the version allows identifying an artifact during its lifetime (version
    1.1, 1.2, 1.2.1, etc.).


    Maven imposes versioning so a team can manage the life of its project development.
    Maven also introduces the concept of SNAPSHOT versions (the version number ends
    with the string


    -SNAPSHOT) to identify an artifact when it’s being developed.


    The POM defines much more information about your project. Some is purely descriptive


    (name, description, etc.), other concerns the application execution such as the
    list of external libraries used, and so on. Finally, the pom.xml defines environmental
    information to build the project (versioning tool, continuous integration server,
    artifacts repositories) and any other specific process to build your project.


    Managing artifacts


    Maven goes beyond building artifacts; it also offers a genuine approach to archive
    and share these artifacts. Maven uses a local repository on your hard drive (by
    default in %USER_HOME%/


    .m2/repository) where it stores all the artifacts that the project’s descriptor
    manipulates.


    The local repository (see Figure 1-9) is filled either by the local developer’s
    artifacts (e.g., myProject-1.1.jar) or by external ones (e.g., glassfish-3.0.jar)
    that Maven downloads from remote repositories. By default, Maven uses a main repository
    at [http://repo1.maven.org/](http://repo1.maven.org/)


    maven2 to download the missing artifacts.


