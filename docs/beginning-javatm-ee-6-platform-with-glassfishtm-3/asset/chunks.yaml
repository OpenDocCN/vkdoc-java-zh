    **Figure 3-13.** *A bidirectional association represented with two arrows*


    How do you map that? Who is the owner of this bidirectional relationship? Who
    owns the


    mapping information of the join column or the join table? If unidirectional relationships
    have an owning side, bidirectional ones have both an owning and an inverse side,
    which have to be explicitly specified with the mappedBy element of the @OneToOne,
    @OneToMany, and @ManyToMany annotations. mappedBy identifies the attribute that
    owns the relationship and is required for bidirectional relationships.


    By way of explanation, let’s compare the Java code (on one side) and the database
    map-


    ping (on the other). As you can see on the left side of Figure 3-14, both entities
    point to each other through attributes: Customer has an address attribute annotated
    with @OneToOne, and the Address entity has a customer attribute also with an annotation.
    On the right side, the database mapping shows a CUSTOMER and an ADDRESS table.
    CUSTOMER is the owner of the relationship because it contains the ADDRESS foreign
    key.


    **Figure 3-14.** *Customer and Address code with database mapping*


    ![Image 42](index-123_1.jpg)


    Chapter 3 ■ OBJeCt-reLatIONaL MappING


    **93**


    The Address entity uses the mappedBy element on its @OneToOne annotation. The
    mappedBy


    element indicates that the join column (address) is specified at the other end
    of the relationship. In fact, at the other end, the Customer entity defines the
    join column by using the


    @JoinColumn annotation and renames the foreign key to address_fk. Customer is
    the owning side of the relationship, and as the owner, it is the one to define
    the join column mapping.


    Address is the inverse side where the table of the owning entity contains the
    foreign key (the CUSTOMER table is the one with the ADDRESS_FK column).


    There is a mappedBy element on the @OneToOne, @OneToMany, and @ManyToMany annotations,


    but not on the @ManyToOne annotation.


    ■**Note** If you are familiar with Hibernate, you might think of the JPA mappedBy
    as the equivalent of the Hibernate inverse attribute, which indicates which end
    of a relationship should be ignored.


