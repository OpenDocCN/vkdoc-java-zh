    The @DeclareRoles annotation is slightly different as it doesn’t permit or deny
    any access.


    It declares roles for the entire application. When the EJB in Listing 9-8 is deployed,
    the container will automatically declare the user, employee, and admin roles by
    inspecting the


    @RolesAllowed annotation. But you might want to declare other roles in the security
    domain through the @DeclareRoles annotation. This annotation, which only applies
    at the class level, takes an array of roles and declares them in the security
    domain. In fact, you declare security roles using either of these two annotations
    or a combination of both. If both annotations are used, the aggregation of the
    roles in @DeclareRoles and @RolesAllowed are declared. We usually declare roles
    for the entire enterprise application, so in this case it makes more sense to
    declare roles in the deployment descriptor than with the @DeclareRoles annotation.


    When the ItemEJB in Listing 9-9 is deployed, the five roles HR, salesDpt, user,
    employee, and admin are declared. Then, with the @RolesAllowed annotation, certain
    of these roles are given access to certain methods (as previously explained).


