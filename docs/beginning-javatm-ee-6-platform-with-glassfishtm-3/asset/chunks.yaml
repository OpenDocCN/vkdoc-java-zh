    **Message-Driven Beans**


    This chapter shows how asynchronous messaging provides loose coupling and increased
    flexibility between systems, using the JMS API in a stand-alone environment with
    main classes, JNDI lookup, or resource injection using the ACC. MDBs provide this
    standard asynchronous messaging model for enterprise applications running in an
    EJB container.


    An MDB is an asynchronous consumer that is invoked by the container as a result
    of the


    arrival of a message. To a message producer, an MDB is simply a message consumer,
    hidden behind a destination to which it listens.


    MDBs are part of the EJB specification, and their model is close to stateless
    session beans as they do not have any state and run inside an EJB container. The
    container listens to a destination and delegates the call to the MDB upon message
    arrival. Like any other EJB, MDBs can access resources managed by the container
    (other EJBs, JDBC connections, JMS resources, etc.).


    Why use MDBs when you can use stand-alone JMS clients, as you’ve seen previously?


    Because of the container, which manages multithreading, security, and transactions,
    thereby greatly simplifying the code of your JMS consumer. It also manages incoming
    messages


    among multiple instances of MDBs (available in a pool) that have no special multithreading
    code themselves. As soon as a new message reaches the destination, an MDB instance
    is retrieved from the pool to handle the message.


    **How to Write an MDB**


    MDBs can be transactional, multithreaded, and naturally consume JMS messages.
    With the


    JMS API thus far, you might expect factories, connections, sessions, consumers,
    user transactions, and so on. However, it is surprising to see that a simple MDB
    can look like Listing 13-8.


    **Listing 13-8.** *A Simple MDB*


    **@MessageDriven(mappedName = "jms/javaee6/Topic")**


    public class BillingMDB implements MessageListener {


    public void **onMessage**(Message message) {


    TextMessage msg = (TextMessage)message;


    System.out.println("Message received: " + msg.getText());


    }


    }


    The code in Listing 13-8 (omitting exception handling for clarity) shows that
    MDBs relieve the programmer of all mechanical aspects of processing the types
    of messages explained so far. An MDB implements the MessageListener interface
    and the onMessage() method, but no other code is needed to connect to the provider
    or start message consumption. MDBs also rely on the configuration-by-exception
    mechanism, and only a few annotations are needed to make it work (see the @MessageDriven
    annotation).


    **380**


    Chapter 13 ■ SeNDING MeSSaGeS


    **MDB Model**


    MDBs are different from session beans as they do not implement a local or remote
    business interface, instead implementing javax.jms.MessageListener. Clients cannot
    invoke methods directly on MDBs; however, like session beans, MDBs have a rich
    programming model that


    includes a life cycle, callback annotations, interceptors, injection, and transactions.
    Taking advantage of this model provides applications with a high level of functionality.


    It is important to be aware that MDBs are not part of the new EJB Lite model,
    meaning


    they cannot be deployed in a simple web application (in a war file), but still
    need an enterprise packaging (ear archive).


    The requirements to develop an MDB class are as follows:


    • The class must be annotated with [@javax.ejb.MessageDriven or its XML equivalent
    in a](mailto:@javax.ejb.MessageDriven)


    deployment descriptor.


    • The class must implement, directly or indirectly, the MessageListener interface.'
