    ## Java API for XML-Based Web Services


    We have reviewed a simple WSDL document, a SOAP request, and a SOAP response.
    When web services have several operations with complex parameters, these XML documents
    can look daunting to a Java developer. The good news is that JAX-WS makes life
    easier by hiding the complexity of these XML documents. Unfortunately, sometimes
    you need to dive into the WSDL structure.


    Because the WSDL document is the contract between the consumer and the service,
    it can be used to write the Java code for the consumer and the service. This is
    the *top-down approach*, also known as *contract first*. This approach starts
    with the contract (the WSDL) by defining operations, messages, and so forth. When
    both the consumer and provider agree on the contract, you can then implement the
    Java classes based on that contract. Metro provides some tools that generate classes
    from a WSDL.


    With the other approach, called *bottom-up*, the implementation class already
    exists, and all that is needed is to create the WSDL. Again, Metro provides utilities
    to generate a WSDL from existing classes. In both cases, at times the code has
    to be adjusted to fit the WSDL or vice versa. That is when JAX-WS comes to your
    aid. With a simple development model and a few annotations, Java-to-WSDL mapping
    can be adjusted. The bottom-up approach can result in very inefficient applications,
    as the Java methods and classes have no bearing on the ideal granularity of messages
    crossing the network. If latency is high and/or bandwidth low, it pays to use
    the fewest, largest messages, and this can only be done by using the contract-first
    approach.


    This chapter presented the general web services concepts and specifications, and
    then discussed JAXB, used for XML binding, and the surface of WSDL and SOAP documents.
    But web services follow the "ease of development" paradigm of Java EE 6 and do
    not require you to write any WSDL or SOAP. The web service is just an annotated
    POJO that needs to be deployed in a web service container. However, there is more
    to the web service programming model.


    ## JAX-WS Model


    Like most of the Java EE 6 components, web services rely on the configuration-by-exception
    paradigm, which specifies that configuring a component is the exception. Only
    one annotation is actually needed to turn a POJO into a web service: `@WebService`.
    The requirements to write a web service are as follows:


    - The class must be annotated with `@javax.jws.WebService` or the XML equivalent
    in a deployment descriptor.

    - To turn a web service into an EJB endpoint, the class has to be annotated with
    `@javax.ejb.Stateless` (as demonstrated in Chapter 7).'
