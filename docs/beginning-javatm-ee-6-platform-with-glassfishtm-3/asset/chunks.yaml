    **继承层次结构中的类类型**


    用于解释映射策略的示例仅使用了实体。Item 是一个实体，Book 和 CD 也是。但实体并非只能继承自实体。一个类层次结构可以混合各种不同类型的类：实体以及非实体（或瞬态类）、抽象实体和映射超类。继承自这些不同类型的类会对映射产生影响。


