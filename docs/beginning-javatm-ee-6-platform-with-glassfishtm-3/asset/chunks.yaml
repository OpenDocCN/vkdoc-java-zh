    **Transaction**


    MDBs are EJBs (see Chapter 9 for more information). MDBs can use BMTs or container-


    managed transactions (CMTs), they can explicitly roll back a transaction by using
    the


    MessageDrivenContext.setRollbackOnly() method, etc. There is some specificity
    about


    MDBs that is worth explaining.


    When we talk about transactions, we always think of relational databases. However,


    other resources are also transactional, such as messaging systems. If two or more
    operations have to succeed or fail together, they form a transaction. With messaging,
    if two or more messages are sent, they have to succeed (commit) or fail (roll
    back) together. How does this work in practice? The answer is that messages are
    not released to consumers until the transaction commits. The container will start
    a transaction before the onMessage() method is invoked and will commit the transaction
    when the method returns (unless the transaction was marked for rollback with setRollbackOnly()).


    Even though MDBs are transactional, they cannot execute in the client’s transaction
    context, as they don’t have a client. Nobody explicitly invokes methods on MDBs,
    they just listen to a destination and consume messages. There is no context passed
    from a client to an MDB, and client transaction context to the onMessage() method
    cannot be passed.


