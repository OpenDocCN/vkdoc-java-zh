- fmt: '# JSP 与表达式语言


    你可以自由地混合使用 Java 代码、HTML 标签和文本。脚本元素（`<%` 和 `%>`）之间的所有内容都是 Java 代码，这些代码将在服务器上执行；而脚本元素之外的所有内容都是模板数据，这些数据将被写入响应页面。请注意，在清单
    11-5 中，`for` 语句块的开始和结束位于不同的脚本元素中。如果你开始混合大量 HTML 标签和 Java 代码，JSP 很快就会变得难以阅读。此外，业务逻辑与表示层之间没有分离，这使得页面难以维护。而且你混合了两种为不同人群设计的语言：Java
    面向业务开发人员，XHTML/CSS 面向网页设计师。


    JSP 可以使用标签库和表达式语言（EL）来解决这个问题。JSP 标准标签库（JSTL）使用网页开发人员熟悉的标记语言标准化了许多常见操作，而 EL 则使用更简单的语法来执行
    JSP 脚本元素的一些相同操作。


    ## 表达式语言


    你已经了解了如何在 JSP 中使用嵌入 Java 代码的脚本元素。EL 语句提供了更简单的语法来执行类似的操作，并且对于非 Java 程序员来说更容易使用。你可以使用
    EL 语句来打印变量的值或访问页面中对象的属性。它还拥有一套丰富的数学、逻辑和关系运算符。EL 语句的基本语法是：


    ```

    ${expr}

    ```


    其中 `expr` 是一个有效的表达式，会被解析和解释。从 JSP 2.1 开始，你还可以使用以下语法：


    ```

    #{expr}

    ```


    对于 JSP 来说，`${expr}` 和 `#{expr}` 语句将以完全相同的方式被解析和求值。然而，对于 JSF 来说情况则不同，因为正如你将看到的，JSF
    页面的生命周期与 JSP 不同。你可以使用 `${expr}` 表示立即求值的表达式（该表达式在 JSP 编译时被编译，并在 JSP 执行时求值一次），使用
    `#{expr}` 表示延迟求值的表达式（该表达式直到需要其值时才被求值）。这两种 EL 已经统一，因此 JSP 和 JSF 页面都可以使用两者，但存在生命周期差异。


    EL 表达式可以使用大多数常用的 Java 运算符：


    - **算术**：`+`、`-`、`*`、`/`（`div`）、`%`（`mod`）

    - **关系**：`==`（`eq`）、`!=`（`ne`）、`<`（`lt`）、`>`（`gt`）、`<=`（`le`）、`>=`（`ge`）

    - **逻辑**：`&&`（`and`）、`||`（`or`）、`!`（`not`）

    - **其他**：`()`、`empty`、`[]`、`.`


    请注意，某些运算符既有符号形式也有单词形式（`>` 可以是 `gt`，`/` 可以是 `div`，等等）。这些等价形式允许你使 JSP 符合 XML 规范，同时避免使用实体引用（例如
    `&lt;` 表示 `<`）。"小于"可以编码为 `#{2 lt 3}` 而不是 `#{2 < 3}`。


    `empty` 运算符测试一个对象是否为 `null`，或者它是否引用了一个空的 `String`、`List`、`Map` 或数组。如果为空则返回 `true`，否则返回
    `false`。例如，如果 JSP 使用声明元素定义了一个 `Book` 对象（`<%! Book book = new Book(); %>`），你可以检查该对象或其某个属性是否为
    `null`。


    ```

    #{empty book}

    #{empty book.isbn}

    ```


    点运算符用于访问 `book` 对象的 `isbn` 属性。另一种语法是使用 `[]` 运算符；`isbn` 属性可以使用任何一种表示法来访问，如下所示：


    ```

    #{book.isbn}

    #{book[isbn]}

    ```


    EL 2.2 的一个增强功能是能够调用方法。以下代码片段展示了如何通过调用 `book.buy()` 方法来购买一本书，以及如何传递一个参数（所使用的货币）。


    ```

    #{book.buy}

    #{book.buy(''EURO'')}

    ```


    EL 语句可以与 JSP 和 JSF 页面、`faces-config.xml`、脚本元素或 JSTL 结合使用。


    ## JSP 标准标签库


    有一组有用的标准标签称为 JSTL，它允许你避免混合 Java 代码和 XHTML 标签。JSP 中的动态数据可以使用 XML 标签来操作，而不是'
  raw: 'You can freely interleave Java code, HTML tags, and text. Everything between
    the scriptlet (<% and %>) is Java code, which will be executed on the server,
    and everything outside is template data, which will be written to the response
    page. Notice in Listing 11-5 that the for statement block begins and ends in different
    scriptlets. A JSP can quickly get difficult to read if you start mixing a lot
    of HTML tags and Java code. Also, there is no separation between the business
    logic and the presentation, which makes the page difficult to maintain. And you
    are mixing two languages made for two different categories of people: Java for
    the business developer and XHTML/CSS for the web designer.


    JSPs can use tag libraries and expression language (EL) to solve this problem.
    The JSP


    Standard Tag Library (JSTL) standardizes a number of common actions using a markup
    lan-


    guage familiar to web developers, while EL uses a simpler syntax for performing
    some of the same actions of JSP scripting elements.


    **Expression Language**


    You have just seen how to use scripting elements that embed Java code in the JSP.
    EL statements provide a simpler syntax to perform similar actions and are easier
    for non-Java


    programmers to use. You can use EL statements to print the value of variables
    or access objects’ attributes in a page. It also has a rich set of mathematical,
    logical, and relational operators. The basic syntax for an EL statement is


    ${expr}


    where expr is a valid expression that is parsed and interpreted. As of JSP 2.1,
    you can also use the following syntax:


    #{expr}


    The ${expr} and #{expr} statements will be parsed and evaluated in exactly the
    same


    manner for JSPs. However, for JSF it is a different matter because, as you’ll
    see, JSF pages have a life cycle different from that of JSPs. You can use ${expr}
    for expressions that are evaluated immediately (the expression is compiled when
    the JSP is compiled and is evaluated once, when the JSP executes) and #{expr}
    for expressions with a deferred evaluation (the expression is not evaluated until
    its value is needed). These two ELs have been unified, so a JSP and a JSF


    page can use both, but with the life-cycle difference.


    EL expressions can use most of the usual Java operators:


    • *Arithmetic*: +, -, *, / (div), % (mod)


    • *Relational*: == (eq), != (ne), < (lt), > (gt), <= (le), >= (ge)


    • *Logical*: && (and), || (or), ! (not)


    • *Other*: (), empty, [], .


    Note that some operators have both symbolic and word variants (> can be gt, /
    can be div, and so on). These equivalents allow you to make your JSP XML compliant
    while avoiding


    using entity references (such as &lt; for <). A “less than” could be coded #{2
    lt 3} rather than


    #{2 < 3}.


    The empty operator tests whether an object is null or whether it references an
    empty


    String, List, Map, or array. It returns true if empty; otherwise it returns false.
    For example, if a


    Chapter 11 ■ paGeS aND COMpONeNtS


    **297**


    JSP uses a declaration element to define a Book object (<%! Book book = new Book();
    %>), you could check whether the object or one of its attributes is null.


    #{empty book}


    #{empty book.isbn}


    The dot operator is used to access the attribute isbn of the book object. Another
    syntax is possible by using the [] operator; the isbn attribute can be accessed
    using either notation, like this:


    #{book.isbn}


    #{book[isbn]}


    An enhancement in EL 2.2 is its ability to invoke methods. The following code
    fragment


    shows how to buy a book by calling the book.buy() method and how to pass a parameter
    (the currency used).


    #{book.buy}


    #{book.buy(''EURO'')}


    EL statements can be used in conjunction with JSP and JSF pages, faces-config.xml,


    scriplets, or JSTL.


    **JSP Standard Tag Library**


    There’s a useful set of standard tags called JSTL that allow you to avoid mixing
    Java code and XHTML tags. The dynamic data within a JSP can be manipulated using
    XML tags instead of'
