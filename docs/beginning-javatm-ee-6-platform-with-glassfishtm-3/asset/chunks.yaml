    You know how to remove an entity with the EntityManager.remove() method and query
    a


    database to retrieve a list of entities that correspond to certain criteria. To
    remove a list of entities, you can execute a query, iterate through it, and remove
    each entity individually. Although this is a valid algorithm, it is terrible in
    terms of performance (too many database accesses).


    There is a better way to do it: bulk deletes.


    Chapter 4 ■ MaNaGING perSISteNt OBJeCtS


    **143**


    JPQL performs bulk delete operations across multiple instances of a specific entity
    class.


    These are used to delete a large number of entities in a single operation. The
    DELETE statement looks like the SELECT statement, as it can have a restricting
    WHERE clause and take parameters.


    As a result, the number of entity instances affected by the operation is returned.
    Listing 4-24


    describes the DELETE statement syntax.


    **Listing 4-24.** *DELETE Statement Syntax*


    DELETE FROM <entity name> [[AS] <identification variable>]


    [WHERE <conditional expression>]


    As an example, to delete all customers younger than 18, you can use a bulk removal
    via a DELETE statement:


    **DELETE** FROM Customer c


    WHERE c.age < 18


    **Bulk Update**


    Bulk updates of entities are accomplished with the UPDATE statement, setting one
    or more attributes of the entity subject to conditions in the WHERE clause. The
    UPDATE statement syntax is described in Listing 4-25.


    **Listing 4-25.** *UPDATE Statement Syntax*


    UPDATE <entity name> [[AS] <identification variable>]


    SET <update statement> {, <update statement>}*


    [WHERE <conditional expression>]


    Rather than deleting all the young customers, their first name can be changed
    to “too


    young” with the following statement:


    **UPDATE** Customer c


    **SET** c.firstName = ''TOO YOUNG''


    WHERE c.age < 18


    **Queries**


    You’ve seen the JPQL syntax and how to describe statements using different clauses
    (SELECT, FROM, WHERE, etc.). But how do you integrate a JPQL statement to your
    application? The answer: through queries. JPA 2.0 has four different types of
    queries that can be used in code, each with a different purpose:


    • *Dynamic queries*: This is the simplest form of queries, consisting of nothing
    more than a JPQL query string dynamically specified at runtime.


    • *Named queries*: Named queries are static and unchangeable.


    • *Native queries*: This type of query is useful to execute a native SQL statement
    instead of a JPQL statement.


    • *Criteria API*: JPA 2.0 introduces this new concept.


    **144**


    Chapter 4 ■ MaNaGING perSISteNt OBJeCtS


    The central point for choosing from these four types of queries is the EntityManager
    interface, which has several factory methods, listed in Table 4-3, all returning
    a Query interface.


