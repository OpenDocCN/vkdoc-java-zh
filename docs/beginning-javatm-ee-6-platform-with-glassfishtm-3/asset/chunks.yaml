    Unidirectional and Bidirectional


    In an object modeling point of view, direction between classes is natural. In
    a unidirectional association, object A points only to object B; in a bidirectional
    association, both objects refer to each other. However, some work is necessary
    when mapping a bidirectional relationship to a relational database, as is illustrated
    by the following example involving a customer who has a home address.


    In a unidirectional relationship, a Customer entity has an attribute of type Address
    (see Figure 3-11). The relationship is one-way, navigating from one side to the
    other. Customer is said to be the owner of the relationship. In terms of the database,
    this means the CUSTOMER table will have a foreign key (join column) pointing to
    ADDRESS, and when you own a relationship, you are able to customize the mapping
    of this relationship. For example, if you need to change the name of the foreign
    key, the mapping will be done in the Customer entity (i.e., the owner).


    **Figure 3-11.** *A unidirectional association between Customer and Address*


    As mentioned previously, relationships can also be bidirectional. To be able to
    navigate between Address and Customer, you need to transform a unidirectional
    relationship into a bidirectional one by adding a Customer attribute to the Address
    entity (see Figure 3-12). Note that in UML class diagrams, attributes representing
    a relationship are not shown.


    **Figure 3-12.** *A bidirectional association between Customer and Address*


    In terms of Java code and annotations, it is similar to having two separate one-to-one


    mappings, one in each direction. You can think of a bidirectional relationship
    as a pair of unidirectional relationships, going both ways (see Figure 3-13).


    ![Image 40](index-122_1.jpg)


    ![Image 41](index-122_2.jpg)


