    The JSP shown in Listing 11-8 accesses a database, retrieves all the book rows
    contained in the `BOOK` table, and displays them.


    **Listing 11-8.** *A JSP Accessing a Database and Retrieving All the Books*


    ```

    <%@ page contentType="text/html;charset=UTF-8" language="java" %>

    <%@ taglib uri="http://java.sun.com/jsp/jstl/core" prefix="c" %>

    <%@ taglib uri="http://java.sun.com/jsp/jstl/sql" prefix="sql" %>

    <html>

    <head>

    <title>Lists all the books</title>

    </head>

    <body>

    <h1>Lists all the books</h1>

    <hr/>

    <sql:setDataSource dataSource="jdbc/__default"/>

    <sql:query var="books">

    select * from book

    </sql:query>

    <table border="1">

    <tr>

    <th>ISBN</th>

    <th>Title</th>

    <th>Price</th>

    <th>Description</th>

    <th>Number of pages</th>

    <th>Illustrations</th>

    </tr>

    <c:forEach var="row" items="${books.rows}">

    <tr>

    <td><c:out value="${row.isbn}"/></td>

    <td><c:out value="${row.title}"/></td>

    <td><c:out value="${row.price}"/></td>

    <td><c:out value="${row.description}"/></td>

    <td><c:out value="${row.nbOfPage}"/></td>

    <td><c:out value="${row.illustrations}"/></td>

    </tr>

    </c:forEach>

    </table>

    <hr/>

    <i>APress - Beginning Java EE 6</i>

    </body>

    </html>

    ```


    This JSP first needs to import the `sql` taglib with the `<%@ taglib>` directive
    element and set the datasource (in this example, the default datasource `jdbc/__default`
    bundled with GlassFish). The query `select * from book` is executed, and the result
    is set in the `books` variable. The results can be accessed by `books.rows`, and
    the `<c:forEach>` tag iterates over this collection of rows. The result is the
    same one shown previously in Figure 11-5.


    ## XML Actions


    In certain aspects, the XML tag library is similar to the core library; it has
    core tags to perform XML parsing, flow control tags to iterate over element collections,
    operations based on XPath expressions, and XML transformation using XSLT documents.
    Table 11-6 shows the actions contained in the XML library.


    **Table 11-6.** *XML Actions*


    | Action | Description |

    | --- | --- |

    | `<x:parse>` | Parses an XML document. |

    | `<x:out>` | Evaluates an XPath expression and outputs the result. |

    | `<x:set>` | Evaluates an XPath expression and stores the result into a variable.
    |

    | `<x:if>` | Evaluates the XPath expression if the expression evaluates to true.
    |

    | `<x:choose>` | Provides mutually exclusive conditions. |

    | `<x:when>` | Represents an alternative within an `<x:choose>` action. |

    | `<x:otherwise>` | Represents the last alternative within an `<x:choose>` action.
    |

    | `<x:forEach>` | Evaluates an XPath expression and repeats its content over the
    result. |

    | `<x:transform>` | Applies an XSLT style sheet transformation to an XML document.
    |

    | `<x:param>` | Set transformation parameters. Nested action of `<x:transform>`.
    |


    To perform some XML manipulation with these tags, first create an XML document.
    The `books.xml` file in Listing 11-9 contains a list of books where the data is
    stored in XML elements and XML attributes.


    **Listing 11-9.** *The `books.xml` File*


    ```

    <?xml version=''1.0'' encoding=''UTF-8''?>

    <books>

    <book isbn=''1234-234'' price=''12'' nbOfPage=''241'' illustrations=''true''>

    <title>H2G2</title>

    <description>Scifi IT book</description>

    </book>

    <book isbn=''564-694'' price=''18.5'' nbOfPage=''317'' illustrations=''true''>

    <title>Robots</title>

    <description>Best seller</description>

    </book>

    <book isbn=''256-6-56'' price=''23.25'' nbOfPage=''529'' illustrations=''false''>

    <title>Dune</title>

    <description>The trilogy</description>

    </book>

    </books>

    ```


    To function, this `books.xml` file has to be deployed with the JSP or be imported
    by a URL. The JSP in Listing 11-10 parses the file and displays all the books
    on the page.


    **Listing 11-10.** *The JSP Parses the `books.xml` File and Displays Its Content*


    ```

    <%@ page contentType="text/html;charset=UTF-8" language="java" %>

    <%@ taglib uri="http://java.sun.com/jsp/jstl/core" prefix="c" %>

    <%@ taglib uri="http://java.sun.com/jsp/jstl/xml" prefix="x" %>

    <html>

    <body>

    <table border="1">

    <tr>

    <th>ISBN</th>

    <th>Title</th>

    <th>Price</th>

    <th>Description</th>

    <th>Number of pages</th>

    <th>Illustrations</th>

    </tr>

    <c:import url="books.xml" var="bookUrl"/>

    <x:parse xml="${bookUrl}" var="doc"/>

    <x:forEach var="b" select="$doc/books/book">

    <tr>

    <td><x:out select="$b/@isbn"/></td>

    <td><x:out select="$b/title"/></td>

    <td><x:out select="$b/@price"/></td>

    <td><x:out select="$b/description"/></td>

    <td><x:out select="$b/@nbOfPage"/></td>

    <td><x:out select="$b/@illustrations"/></td>

    </tr>

    </x:forEach>

    </table>

    </body>

    </html>

    ```


    To commence, this JSP needs to import the XML taglib (with the directive `<%@
    taglib>`) and then access the `books.xml` file, which is loaded into the variable
    `bookUrl` using the `<c:import>` tag. `bookUrl` contains the raw text that needs
    to be parsed using the `<x:parse>` tag, and the resulting DOM is stored in the
    variable `doc`. Now that the document is parsed, you iterate through it and display
    the values by using XPath expressions with `<x:out>` (`/@isbn` represents an XML
    attribute and `/title` an XML element). The result is the same as that in Figure
    11-5.


    ## Functions


    Functions are not tags but are defined in the JSTL specification. They can be
    used with EL and are mostly employed to deal with string manipulation. For example:


    ```

    ${fn:contains("H2G2", "H2")}

    ```


    This code checks whether a string contains a substring. In this example, it will
    return `true` because `H2G2` contains `H2`. The following function returns the
    length of a string or a collection. The result will be `4`.


    ```

    ${fn:length("H2G2")}

    ```


    These functions can display their result in a JSP (within a `<c:out>` tag) and
    can be used in a test or in a loop.


    ```

    <%@ page contentType="text/html;charset=UTF-8" language="java" %>

    <%@ taglib uri="http://java.sun.com/jsp/jstl/core" prefix="c" %>

    <%@ taglib uri="http://java.sun.com/jsp/jstl/fn" prefix="fn" %>

    <html>

    <body>

    <c:out value="${fn:toLowerCase(sentence)}" />

    <c:if test="${fn:length(''H2G2'') == 4}">

    H2G2 is four caracters long

    </c:if>

    </body>

    </html>

    ```


    Table 11-7 shows all the functions contained in the library.


    **Table 11-7.** *Functions*


    | Function | Description |

    | --- | --- |

    | `fn:contains` | Tests whether a string contains the specified substring |

    | `fn:containsIgnoreCase` | Tests whether a string contains the specified substring
    in a case-insensitive way |

    | `fn:endsWith` | Tests whether a string ends with the specified suffix |

    | `fn:escapeXml` | Escapes characters that could be interpreted as XML markup
    |

    | `fn:indexOf` | Returns the index within a string of the first occurrence of
    a specified substring |

    | `fn:join` | Joins all elements of an array into a string |

    | `fn:length` | Returns the number of items in a collection or the number of characters
    in a string |

    | `fn:replace` | Returns a string resulting from replacing an input string with
    all occurrences of a substring |

    | `fn:split` | Splits a string into an array of substrings |

    | `fn:startsWith` | Tests whether a string starts with the specified prefix |

    | `fn:substring` | Returns a subset of a string |

    | `fn:substringAfter` | Returns a subset of a string following a specific substring
    |

    | `fn:substringBefore` | Returns a subset of a string before a specific substring
    |

    | `fn:toLowerCase` | Converts all of the characters of a string to lowercase |

    | `fn:toUpperCase` | Converts all of the characters of a string to uppercase |

    | `fn:trim` | Removes white space from both ends of a string |


