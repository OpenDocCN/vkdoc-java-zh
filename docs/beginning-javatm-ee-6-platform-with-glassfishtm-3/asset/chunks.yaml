    ## EJB Specification Overview


    EJB 1.0 was created back in 1998, and EJB 3.1 was released in 2009 with Java EE
    6. During these ten years, the EJB specification went through many changes, but
    it still retains its mature foundations. From heavyweight components, to annotated
    POJOs, to entity beans, back to JPA, EJBs have reinvented themselves to meet the
    needs of developers and modern architectures.


    More than ever the EJB 3.1 specification helps to avoid vendor lock-in by providing
    features that were previously nonstandard (such as nonstandard JNDI names or embedded
    containers, for example). Today, EJB 3.1 is much more portable than in the past.


    ## History of the Specification


    Soon after the creation of the Java language, the industry felt the need for a
    technology that could address the requirements of large-scale applications, embracing
    RMI and JTA. The idea of creating a distributed and transactional business component
    framework arose, and as a result IBM first started creating what eventually became
    known as EJBs.


    EJB 1.0 supported stateful and stateless session beans, with optional support
    for entity beans. The programming model used home and remote interfaces in addition
    to the session bean itself. EJBs were made accessible through an interface that
    offered remote access with arguments passed by value.


    EJB 1.1 mandated support for entity beans and introduced the XML deployment descriptor
    to store metadata (which was then serialized as binary in a file). This version
    provided better support for application assembly and deployment by introducing
    roles.


    In 2001, EJB 2.0 was the first version to be standardized by the JCP (as JSR 19).
    It addressed the overhead of passing arguments by value by introducing local interfaces.
    Clients running inside the container would access EJBs through their local interface
    (using arguments passed by reference), and clients running in a different container
    would use the remote interface. This version introduced MDBs, and entity beans
    gained support for relationships and a query language (EJB QL).


    Two years later, EJB 2.1 (JSR 153) added support for web services, allowing session
    beans to be invoked through SOAP/HTTP. A timer service was created to allow EJBs
    to be invoked at designated times or intervals.


    Three years passed between EJB 2.1 and EJB 3.0, which allowed the expert group
    to remodel the entire design. In 2006, the EJB 3.0 specification (JSR 220) broke
    with previous versions as it focused on ease of use, with EJBs looking more like
    POJOs. The entity beans were replaced by a brand-new specification (JPA), and
    session beans no longer required home or EJB-specific component interfaces. Dependency
    injection, interceptors, and life cycle callbacks were introduced.


    In 2009, the EJB 3.1 specification (JSR 318) ships with Java EE 6, following the
    path of the previous version by simplifying the programming model even further
    and bringing new features.


    ## What’s New in EJB 3.1


    The EJB 3.1 specification (JSR 318) brings several changes: JPA is no longer part
    of the EJB specification and evolves in a separate JSR (JSR 317), and the specification
    itself is organized into two different documents:


    - *“EJB Core Contracts and Requirements”*: The main document that specifies EJBs

    - *“Interceptor Requirements”*: The document that specifies interceptors


    It is necessary to be mindful that the specification must support the EJB 2.*x*
    component model, meaning that the 600 pages of the specification deal with home
    interfaces, entity beans, EJB QL, and so on. To simplify future adoption of the
    specification, the Java EE 6 expert group has compiled a list of features for
    possible future removal. None of the following features are actually removed from
    EJB 3.1, but the next version will have to either remove or retain some of them:


    - Entity bean 2.*x*

    - Client view of an entity bean 2.*x*

    - EJB QL (query language for container-managed persistence)

    - JAX-RPC-based web service endpoints

    - Client view of a JAX-RPC web service


    The EJB 3.1 specification includes the following new functionalities and simplifications:


    - *No-interface view*: Session beans with a local view can be accessed without
    a separate local business interface.

    - *War deployment*: Packaging and deployment of EJB components directly in a `.war`
    file is now possible.

    - *Embedded container*: A new embeddable API is available for executing EJB components
    within a Java SE environment (for unit testing, batch processing, etc.).

    - *Singleton*: This new type of component provides easy access to shared state.

    - *Richer timer service*: This feature allows automatic creation of EJB timers
    and calendar-based expressions.

    - *Asynchrony*: Asynchronous invocations are now possible without MDBs.

    - *EJB Lite*: This definition of a lightweight subset of functionalities can be
    provided within Java EE Profiles (such as the Java EE Web Profile).

    - *Portable JNDI name*: The syntax for looking up EJB components is now specified.


    ## EJB Lite


    Enterprise Java Beans are the predominant component model in Java EE 6, being
    the simplest method for transactional and secure business processing. However,
    EJB 3.1 still defines the old entity beans, home interfaces, EJB QL, and so on,
    meaning that any new vendor implementing the EJB 3.1 specification has to implement
    entity beans. Developers getting started with EJBs would also be weighed down
    by many technologies that they would never use otherwise.


    For these reasons, the specification defines a minimal subset of the full EJB
    API known as EJB Lite. It includes a small, powerful selection of EJB features
    suitable for writing portable transactional and secure business logic. Any EJB
    Lite application can be deployed on any Java EE product that implements EJB 3.1.
    EJB Lite is composed of the subset of the EJB API listed in Table 6-1.


    **Table 6-1.** *Comparison Between EJB Lite and Full EJB*


    | Feature | EJB Lite | Full EJB 3.1 |

    | --- | --- | --- |

    | Session beans (stateless, stateful, singleton) | Yes | Yes |

    | MDBs | No | Yes |

    | Entity beans 1.*x*/2.*x* | No | Yes (proposed for pruning) |

    | No-interface view | Yes | Yes |

    | Local interface | Yes | Yes |

    | Remote interface | No | Yes |

    | 2.*x* interfaces | No | Yes (proposed for pruning) |

    | JAX-WS web services | No | Yes |

    | JAX-RS web services | No | Yes |

    | JAX-RPC web services | No | Yes (proposed for pruning) |

    | Timer service | No | Yes |

    | Asynchronous calls | No | Yes |

    | Interceptors | Yes | Yes |

    | RMI/IIOP interoperability | No | Yes |

    | Transaction support | Yes | Yes |

    | Security | Yes | Yes |

    | Embeddable API | Yes | Yes |


    ## Reference Implementation


    GlassFish is an open source application server project led by Sun Microsystems
    for the Java EE platform. The project was launched in 2005 and became the reference
    implementation of Java EE 5 in 2006. Today, GlassFish v3 is the reference implementation
    for EJB 3.1. Internally, the product is built around modularity (based on the
    Apache Felix OSGi runtime), allowing a very fast startup time and use of a set
    of various application containers (Java EE 6, of course, but also Ruby, PHP, and
    so on).


    GlassFish will be used throughout this book as the main application server to
    deploy and run EJBs, as well as JSF pages, SOAP and RESTful web services, and
    JMS MDBs.


