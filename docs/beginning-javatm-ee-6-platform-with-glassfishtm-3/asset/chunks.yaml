    WHERE c.age **>** 18


    SELECT c


    FROM Customer c


    WHERE c.age **NOT BETWEEN** 40 AND 50


    Chapter 4 ■ MaNaGING perSISteNt OBJeCtS


    **141**


    SELECT c


    FROM Customer c


    WHERE c.address.country **IN** (''USA'', ''Portugal'')


    The LIKE expression consists of a string and an optional escape characters that
    define the match conditions: the underscore (_) for single-character wildcards
    and the percent sign (%) for multicharacter wildcards.


    SELECT c


    FROM Customer c


    WHERE c.email **LIKE** ''%mail.com''


    Binding parameters


    Until now, the WHERE clauses shown herein only used fixed values. In an application,
    queries frequently depend on parameters. JPQL supports two types of parameter-binding
    syntax, allowing dynamic changes to the restriction clause of a query: positional
    and named parameters.


    *Positional parameters* are designated by the question mark (?) followed by an
