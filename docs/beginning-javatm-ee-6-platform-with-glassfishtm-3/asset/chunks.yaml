    The WHERE clause also uses comparison operators: =, >, >=, <, <=, <>, [NOT] BETWEEN,
    [NOT]


    LIKE, [NOT] IN, IS [NOT] NULL, IS [NOT] EMPTY, [NOT] MEMBER [OF]. The following
    shows an example using two of these operators:


    SELECT c


