- fmt: '# The SELECT Clause


    The `SELECT` clause follows the path expressions syntax and results in one of
    the following forms: an entity, an entity attribute, a constructor expression,
    an aggregate function, or some sequence of these. Path expressions are the building
    blocks of queries and are used to navigate on entity attributes or across entity
    relationships (or a collection of entities) via the dot (`.`) navigation. Listing
    4-23 defines the `SELECT` statement syntax.


    **Listing 4-23.** *SELECT Statement Syntax*


    ```

    SELECT <select expression>

    FROM <from clause>

    [WHERE <conditional expression>]

    [ORDER BY <order by clause>]

    [GROUP BY <group by clause>]

    [HAVING <having clause>]

    ```


    A simple `SELECT` returns an entity. For example, if a `Customer` entity has an
    alias called `c`, `SELECT c` will return an entity or a list of entities.


    ```

    SELECT c

    FROM Customer c

    ```


    But a `SELECT` clause can also return attributes. If the `Customer` entity has
    a first name, `SELECT c.firstName` will return a `String` or a collection of `String`s
    with the first names.


    ```

    SELECT c.firstName

    FROM Customer c

    ```


    To retrieve the first name and the last name of a customer, you create a list
    containing the two attributes:


    ```

    SELECT c.firstName, c.lastName

    FROM Customer c

    ```


    If a `Customer` entity has a one-to-one relationship with `Address`, `c.address`
    refers to the address of the customer, and the result of the following query will
    return not a list of customers, but a list of addresses:


    ```

    SELECT c.address

    FROM Customer c

    ```


    Navigation expressions can be chained together to traverse complex entity graphs.
    Using this technique, path expressions such as `c.address.country.code` can be
    constructed, referring to the country code of the customer’s address.


    ```

    SELECT c.address.country.code

    FROM Customer c

    ```


    A constructor may be used in the `SELECT` expression to return an instance of
    a Java class initialized with the result of the query. The class doesn’t have
    to be an entity, but the constructor must be fully qualified and match the attributes.


    ```

    SELECT NEW com.apress.javaee6.CustomerDTO(c.firstName, c.lastName, c.address.street1)

    FROM Customer c

    ```


    The result of this query is a list of `CustomerDTO` objects that have been instantiated
    with the `new` operator and initialized with the first name, last name, and street
    of the customers.


    Executing these queries will return either a single value or a collection of zero
    or more entities (or attributes) including duplicates. To remove the duplicates,
    the `DISTINCT` operator must be used:


    ```

    SELECT DISTINCT c

    FROM Customer c


    SELECT DISTINCT c.firstName

    FROM Customer c

    ```


    The result of a query may be the result of an aggregate function applied to a
    path expression. The following aggregate functions can be used in the `SELECT`
    clause: `AVG`, `COUNT`, `MAX`, `MIN`, `SUM`. The results may be grouped in the
    `GROUP BY` clause and filtered using the `HAVING` clause.


    ```

    SELECT COUNT(c)

    FROM Customer c

    ```


    Scalar expressions also can be used in the `SELECT` clause of a query as well
    as in the `WHERE` and `HAVING` clauses. These expressions can be used on numeric
    (`ABS`, `SQRT`, `MOD`, `SIZE`, `INDEX`), string (`CONCAT`, `SUBSTRING`, `TRIM`,
    `LOWER`, `UPPER`, `LENGTH`), and date-time (`CURRENT_DATE`, `CURRENT_TIME`, `CURRENT_TIMESTAMP`)
    values.


    ## From


    The `FROM` clause of a query defines entities by declaring identification variables.
    An *identification variable*, or *alias*, is an identifier that can be used in
    the other clauses (`SELECT`, `WHERE`, etc.). The syntax of the `FROM` clause consists
    of an entity and an alias. In the following example, `Customer` is the entity
    and `c` the identification variable:


    ```

    SELECT c

    FROM Customer c

    ```


    ## Where


    The `WHERE` clause of a query consists of a conditional expression used to restrict
    the result of a `SELECT`, `UPDATE`, or `DELETE` statement. The `WHERE` clause
    can be a simple expression or set of conditional expressions to filter the query
    in a sophisticated way.


    The simplest way to restrict the result of a query is to use the attribute of
    an entity. For example, the following query selects all customers named Vincent:


    ```

    SELECT c

    FROM Customer c

    WHERE c.firstName = ''Vincent''

    ```


    You can further restrict queries by using the logical operators `AND` and `OR`.
    The following example uses `AND` to select all customers named Vincent, living
    in France:


    ```

    SELECT c

    FROM Customer c

    WHERE c.firstName = ''Vincent'' AND c.address.country = ''France''

    ```


    The `WHERE` clause also uses comparison operators: `=`, `>`, `>=`, `<`, `<=`,
    `<>`, `[NOT] BETWEEN`, `[NOT] LIKE`, `[NOT] IN`, `IS [NOT] NULL`, `IS [NOT] EMPTY`,
    `[NOT] MEMBER [OF]`. The following shows an example using two of these operators:


    ```

    SELECT c

    FROM Customer c

    WHERE c.age > 18


    SELECT c

    FROM Customer c

    WHERE c.age NOT BETWEEN 40 AND 50


    SELECT c

    FROM Customer c

    WHERE c.address.country IN (''USA'', ''Portugal'')

    ```


    The `LIKE` expression consists of a string and an optional escape characters that
    define the match conditions: the underscore (`_`) for single-character wildcards
    and the percent sign (`%`) for multicharacter wildcards.


    ```

    SELECT c

    FROM Customer c

    WHERE c.email LIKE ''%mail.com''

    ```


    ### Binding Parameters


    Until now, the `WHERE` clauses shown herein only used fixed values. In an application,
    queries frequently depend on parameters. JPQL supports two types of parameter-binding
    syntax, allowing dynamic changes to the restriction clause of a query: positional
    and named parameters.


    *Positional parameters* are designated by the question mark (`?`) followed by
    an integer (e.g., `?1`). When the query is executed, the parameter numbers that
    should be replaced need to be specified.


    ```

    SELECT c

    FROM Customer c

    WHERE c.firstName = ?1 AND c.address.country = ?2

    ```


    *Named parameters* can also be used and are designated by a `String` identifier
    that is prefixed by the colon (`:`) symbol. When the query is executed, the parameter
    names that should be replaced need to be specified.


    ```

    SELECT c

    FROM Customer c

    WHERE c.firstName = :fname AND c.address.country = :country

    ```


    In the “Queries” section later in this chapter, you will see how an application
    binds parameters.


    ### Subqueries


    A subquery is a `SELECT` query that is embedded within a conditional expression
    of a `WHERE` or `HAVING` clause. The results of the subquery are evaluated and
    interpreted in the conditional expression of the main query. To retrieve the youngest
    customers from the database, a subquery with a `MIN(age)` is first executed and
    its result evaluated in the main query.


    ```

    SELECT c

    FROM Customer c

    WHERE c.age = (SELECT MIN(c.age) FROM Customer c)

    ```


    ## Order By


    The `ORDER BY` clause allows the entities or values that are returned by a `SELECT`
    query to be ordered. The ordering applies to the entity attribute specified in
    this clause followed by the `ASC` or `DESC` keyword. The keyword `ASC` specifies
    that ascending ordering be used; `DESC`, the inverse, specifies that descending
    ordering be used. Ascending is the default and can be omitted.


    ```

    SELECT c

    FROM Customer c

    WHERE c.age > 18

    ORDER BY c.age DESC

    ```


    Multiple expressions may also be used to refine the sort order.


    ```

    SELECT c

    FROM Customer c

    WHERE c.age > 18

    ORDER BY c.age DESC, c.address.country ASC

    ```


    ## Group By and Having


    The `GROUP BY` construct enables the aggregation of result values according to
    a set of properties. The entities are divided into groups based on the values
    of the entity field specified in the `GROUP BY` clause. To group customers by
    country and count them, use the following query:


    ```

    SELECT c.address.country, count(c)

    FROM Customer c

    GROUP BY c.address.country

    ```


    The `GROUP BY` defines the grouping expressions (`c.address.country`) over which
    the results will be aggregated and counted (`count(c)`). Note that expressions
    that appear in the `GROUP BY` clause must also appear in the `SELECT` clause.'
