    It is important to note that JMSException is a checked exception. The EJB specification
    outlines two types of exceptions:


    • *Application exceptions*: Checked exceptions that extend Exception do not cause
    the container to roll back.


    • *System exceptions*: Unchecked exceptions that extend RuntimeException cause
    the container to roll back.


