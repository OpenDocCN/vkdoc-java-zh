    <h:inputText value="#{bookController.book.title}" required="true">


    <f:**validateLength** minimum="2" maximum="20"/>


    </h:inputText>


    <h:inputText value="#{bookController.book.price}">


    <f:**validateLongRange** minimum="1" maximum="500"/>


    </h:inputText>


    第 12 章 ■ 处理与导航


    **347**


    **自定义验证器**


    标准的 JSF 验证器可能无法满足您的需求；您可能需要处理必须遵循特定业务格式的数据，例如邮政编码、州名或电子邮件地址。您必须创建自己的自定义验证器来处理这些情况。与转换器类似，验证器是一个需要实现接口并重写某些方法的类。对于验证器而言，其接口是`javax.faces.validator.Validator`，它包含一个单一的`validate()`方法：


    void **validate**(FacesContext context, UIComponent component, Object value)


    在此方法中，`value`参数是需要根据某些业务逻辑进行检查的值。如果通过验证检查，您可以直接从该方法返回，页面的生命周期将继续。如果未通过，您可以抛出一个`ValidatorException`，并附带一个包含摘要和详细描述验证错误的`FacesMessage`，然后通过在`faces-config.xml`中注册或使用`@FacesValidator`注解来注册验证器。


    例如，创建一个 ISBN 验证器，确保用户输入的书籍 ISBN 遵循特定格式。清单 12-12 展示了`IsbnValidator`的代码。


    **清单 12-12.** *一个 ISBN 验证器*


    **@FacesValidator(value = "isbnValidator")**


    public class IsbnValidator implements **Validator** {


    private Pattern pattern;


    private Matcher matcher;


    @Override


    public void **validate**(FacesContext context, UIComponent component, ➥


    Object value) throws ValidatorException {


    String componentValue = value.toString();


    pattern = Pattern.compile("(?=[-0-9xX]{13}$)");


    matcher = pattern.matcher(componentValue);


    if (!matcher.find()) {


    String message = MessageFormat.format(➥


    "{0} is not a valid isbn format", componentValue);


    FacesMessage facesMessage = new FacesMessage(SEVERITY_ERROR, ➥


    message, message);


    throw new ValidatorException(facesMessage);


    }


    }


    }


    清单 12-12 中的代码首先将验证器与名称`isbnValidator`关联，以便在页面中使用。它实现了`Validator`接口，并将验证逻辑添加到`validate()`方法中。它使用正则表达式检查
    ISBN 格式是否正确。如果不正确，它会向上下文中添加一条消息并抛出一个异常。JSF 将


    **348**


    第 12 章 ■ 处理与导航


    自动恢复页面的生命周期，重新调用页面，并显示错误消息。


    您可以在页面中使用`validator`属性或嵌入`<f:validator>`标签来使用此自定义验证器：


    <h:inputText value="#{book.isbn}" **validator**="isbnValidator"/>


    // 或者


    <h:inputText value="#{book.isbn}">


    <f:**validator** validatorId="isbnValidator" />


    </h:inputText>


    **Ajax**


    HTTP 协议基于请求/响应机制：客户端需要某些内容，发送请求，并从服务器接收响应，通常是一个完整的网页。通信遵循此方向：客户端向服务器请求内容，反之则不然。然而，Web
    应用程序必须提供丰富且响应迅速的界面，并且必须对服务器事件做出反应、更新页面部分内容、聚合小部件等。在正常的请求/响应情况下，即使只有一小部分需要更改，服务器也必须发送整个网页。如果页面很大，将会占用过多带宽并导致响应缓慢，因为浏览器需要加载整个页面。


    如果您想提高浏览器的响应速度并改善用户的浏览体验，您只需要更新页面的一小部分。而这可以通过 Ajax 实现。


    Ajax（最初代表异步 JavaScript 和 XML）是一组用于创建交互式 Web 应用程序的 Web 开发技术。Ajax 允许 Web 应用程序异步地从服务器检索部分数据，而不会干扰现有页面的显示和行为。一旦客户端接收到数据，只需使用页面的文档对象模型（DOM）和
    JavaScript 更新需要更新的部分。还有一种称为*反向 Ajax*（或 Comet 编程）的机制，用于将数据从服务器推送到浏览器。这些机制在我们日常使用的大多数
    Web 应用程序中都有应用，JSF 2.0 已引入对它们的支持。


    **一般概念**


    *Ajax*一词于 2005 年提出，指的是一组用于将异步数据加载到网页中的替代技术。早在 1999 年，微软就在 Internet Explorer 5
    中创建了`XMLHttpRequest`对象作为 ActiveX 控件。2006 年，万维网联盟（W3C）发布了`XMLHttpRequest`对象的第一个规范草案，该对象现在已得到大多数浏览器的支持。与此同时，几家公司集思广益，探讨如何确保
    Ajax 能够成为基于开放技术的丰富应用程序平台的行业标准。这项工作的成果是创建了 OpenAjax 联盟，该联盟由供应商、开源项目和使用基于 Ajax 技术的公司组成。


    如图 12-7 所示，在传统的 Web 应用程序中，浏览器必须向服务器请求完整的 HTML 文档。用户单击按钮发送或获取信息，等待服务器响应，然后接收浏览器加载的整个页面。另一方面，Ajax
    在浏览器和服务器之间使用异步数据传输（HTTP 请求），允许网页从服务器请求少量信息（JSON 或 XML 数据），而不是整个页面。用户停留在同一页面上，而一段
    JavaScript


    ![Image 110](img/index-379_1.jpg)


    第 12 章 ■ 处理与导航


    **349**


    异步地向服务器请求或发送数据，并且只有部分页面被实际刷新，从而使 Web 应用程序更快、更用户友好。


    **图 12-7.** *普通 HTTP 调用与 Ajax HTTP 调用*


    原则上，Ajax 基于以下内容：


    • XHTML 和 CSS 用于呈现


    • DOM 用于动态显示和与数据交互


    • XML 和 XSLT 用于 XML 数据的交换、操作和显示


    • `XMLHttpRequest`对象用于异步通信


    • JavaScript 用于将这些技术整合在一起


    `XMLHttpRequest`是 Ajax 的重要组成部分，因为它是 JavaScript 用于将 XML 从浏览器传输到服务器的 DOM API。返回的数据必须在客户端获取，以便使用
    JavaScript 动态更新页面部分内容。数据可以有多种格式，例如 XHTML、JSON，甚至纯文本。


    从 JSF 2.0 开始，Ajax 得到原生支持，因此您无需开发 JavaScript 来处理`XMLHttpRequest`，但您需要使用一个已指定并随
    JSF 实现一起提供的 JavaScript 库。


    **JSF 中的支持**

    '
- fmt: "# JSF 2.0 中的 Ajax 支持\n\n早期版本的 JSF 没有提供原生 Ajax 解决方案，因此必须使用第三方库来填补这一空白。有时这会增加代码的复杂性，并以牺牲性能为代价。随着\
    \ JSF 2.0 的推出，情况变得简单得多，因为 Ajax 支持已被规范化，并内置于任何 JSF 实现中。\n\n首先，有一个用于执行 Ajax 交互的标准化\
    \ JavaScript 库（`jsf.js`），这意味着你无需开发自己的脚本，也无需直接操作 `XMLHttpRequest` 对象。无需开发任何 JavaScript，你就可以使用一组标准化函数来发送异步请求并接收数据。为了在页面中使用这个库，你需要通过以下代码行添加\
    \ `jsf.js` 资源：\n\n```html\n<h:outputScript name=\"jsf.js\" library=\"javax.faces\"\
    \ target=\"head\"/>\n```\n\n`<h:outputScript>` 标签会渲染一个 `<script>` 标记元素，该元素引用 `javax.faces`\
    \ 库中的 `jsf.js` JavaScript 文件。请注意，顶级命名空间 `javax` 已在 OpenAjax 联盟中注册。此 JavaScript\
    \ API 用于启动与 JSF 的客户端交互，包括部分树遍历和部分页面更新。我们将在页面中直接使用的函数是 `request` 函数，因为它负责向服务器发送\
    \ Ajax 请求。其签名如下：\n\n```javascript\njsf.ajax.request(ELEMENT, [event], { [OPTIONS]\
    \ });\n```\n\n`ELEMENT` 是触发事件的任何 JSF 组件或 XHTML 元素。通常，对于提交表单，该元素是一个按钮。`EVENT` 是该元素支持的任何\
    \ JavaScript 事件，例如 `onmousedown`、`onclick`、`onblur` 等。`OPTIONS` 参数是一个数组，可能包含以下名称/值对：\n\
    \n- `execute: '<comma-separated list of UI component IDs>'`：将组件 ID 列表发送到服务器，以便在请求的执行阶段进行处理。\n\
    - `render: '<comma-separated list of UI component IDs>'`：渲染已在请求的渲染阶段处理过的组件 ID\
    \ 列表。\n\n例如，以下代码显示了一个按钮，当用户点击该按钮时（`onclick` 事件），会调用 `jsf.ajax.request` 函数。`this`\
    \ 参数引用元素本身（按钮），`options` 参数引用组件 ID：\n\n```html\n<h:commandButton id=\"submit\"\
    \ value=\"Create a book\"\n    onclick=\"jsf.ajax.request(this, event,\n     \
    \   {execute:'isbn title price description nbOfPage illustrations',\n        \
    \ render:'booklist'}); return false;\"\n    actionListener=\"#{bookController.doCreateBook}\"\
    \ />\n```\n\n当客户端发起 Ajax 请求时，服务器端的页面生命周期保持不变（它仍然经历相同的六个阶段）。关键优势在于，响应只是返回一小块数据，而不是向浏览器返回一个大型\
    \ HTML 页面。*应用请求*阶段确定当前请求是否为“部分请求”，并且 `PartialViewContext` 对象在整个页面生命周期中被使用。它包含与部分请求处理和部分响应渲染相关的方法和属性。在生命周期结束时，Ajax\
    \ 响应（或者严格来说，部分响应）在*渲染响应*阶段被发送到客户端。它通常由 XHTML、XML 或 JSON 组成，客户端 JavaScript 将对其进行解析。\n\
    \n## 综合应用\n\n清单 12-13 中显示的示例说明了如何使用关于 Ajax 及其在 JSF 中支持的这些通用背景知识。第 10 章的“综合应用”部分展示了如何使用\
    \ `BookController` 托管 Bean 将新书插入数据库。导航很简单，一旦书籍创建完成，你就会被重定向到显示书籍列表的页面。通过点击链接，你可以从列表返回到书籍表单。让我们以这个示例为例，并添加一些\
    \ Ajax 功能。"
  raw: 'Previous versions of JSF offered no native Ajax solution, so third-party libraries
    had to be used to fill the gap. Sometimes this increased the complexity of the
    code at the expense of performance. With JSF 2.0, things are much easier, as Ajax
    support has been specified and is built into any JSF implementation.


    First of all, there is a specified JavaScript library (jsf.js) for performing
    Ajax interaction, which means you don’t have to develop your own scripts nor manipulate
    the XMLHttpRequest


    **350**


    Chapter 12 ■ prOCeSSING aND NaVIGatION


    objects directly. Without developing any JavaScript, you can use a set of standardized
    functions to send asynchronous requests and receive data. In order to use this
    library in your pages, you need to add the jsf.js resource with the following
    line of code:


    <h:outputScript name=" **jsf.js**" library=" **javax.faces**" target="head"/>
    The <h:outputScript> tag renders a <script> markup element referring to the jsf.js
    JavaScript file in the javax.faces library. Note that the top-level javax namespace
    is registered within the OpenAjax Alliance. This JavaScript API is used to initiate
    client-side interactions with JSF including partial tree traversal and partial
    page update. The function that we will be directly using in our pages is the request
    function, as it is responsible for sending an Ajax request to the server. Its
    signature follows:


    jsf.ajax.request(ELEMENT, |event|, { |OPTIONS| });


    ELEMENT is any JSF component or XHTML element from which you trigger the event.
    Typi-


    cally, for submitting a form, the element would be a button. EVENT is any JavaScript
    event supported by that element, such as onmousedown, onclick, onblur, and so
    forth. The OPTIONS


    argument is an array that may contain the following name/value pairs:


    • execute: ''<comma-separated list of UI component IDs>'': Sends the list of component
    IDs to the server in order to be processed during the execute phase of the request


    • render:''<comma-separated list of UI component IDs>'': Renders the list of component
    IDs that have been processed during the render phase of the request


    As an example, the following code shows a button that calls the jsf.ajax.request
    func-


    tion when the user clicks the button (onclick event). The this argument refers
    to the element itself (the button), and the options refer to components IDs:


    <h:commandButton id="submit" value="Create a book"


    onclick=" **jsf.ajax.request**(**this**, event,


    {**execute**:''isbn title price description nbOfPage illustrations'',


    **render**:''booklist''}); return false;"


    actionListener="#{bookController.doCreateBook}" />


    When the client makes an Ajax request, the page life cycle on the server side
    stays the same (it goes through the same six phases). The key benefit is that
    the response is simply the return of a small chunk of data rather than a large
    HTML page to the browser. The *Apply* *request* phase determines whether the current
    request is a “partial request” or not, and the PartialViewContext object is used
    throughout the page’s life cycle. It contains methods and properties that pertain
    to partial request processing and partial response rendering. At the end of the
    life cycle, the Ajax response (or, strictly speaking, partial response) is sent
    to the client during the *Render response* phase. It usually consists of XHTML,
    XML, or JSON that the client-side JavaScript will parse.


    **Putting It All Together**


    The example shown in Listing 12-13 illustrates how to use this general background
    on Ajax and its support in JSF. The “Putting It All Together” section of Chapter
    10 showed how to insert new books into the database using a BookController managed
    bean. The navigation was simple, as once the book was created, you were redirected
    to the page displaying the list of


    ![Image 111](index-381_1.jpg)


    Chapter 12 ■ prOCeSSING aND NaVIGatION


    **351**


    the books. By clicking a link, you would go from the list back to the book form.
    Let’s take this example and add some Ajax capabilities.'
  trans: "\nJSF 的早期版本没有提供原生 Ajax 解决方案，因此必须使用第三方库来填补这一空白。有时这会以牺牲性能为代价，增加代码的复杂性。随着 JSF\
    \ 2.0 的推出，事情变得简单多了，因为 Ajax 支持已被规范化，并内置于任何 JSF 实现中。\n\n首先，有一个用于执行 Ajax 交互的指定 JavaScript\
