    \ change.\n\nNotice that in Listing 3-49 the `@OneToMany` annotation is overriding\
    \ the default fetch mode (turning it to `EAGER` instead of `LAZY`). By using `@JoinColumn`,\
    \ the unidirectional association is then mapped using the foreign key strategy.\
    \ The foreign key is renamed to `ORDER_FK` by the annotation and exists in the\
    \ target table (`ORDER_LINE`). The result is the database structure shown in Figure\
    \ 3-18. There is no join table, and the reference between both tables is through\
    \ the foreign key `ORDER_FK`.\n\n**Figure 3-18.** *Join column between Order and\
    \ OrderLine*\n\n## `@ManytoMany` Bidirectional\n\nA many-to-many bidirectional\
    \ relationship exists when one source object refers to many targets, and when\
    \ a target refers to many sources. For example, a CD album is created by several\
    \ artists, and an artist appears on several albums. In the Java world, each entity\
    \ will have a collection of target entities. In the relational world, the only\
    \ way to map a many-to-many relationship is to use a join table (a join column\
    \ would not work), and as you’ve seen previously, in a bidirectional relationship\
    \ you need to explicitly define the owner (with the `mappedBy` element).\n\nAssuming\
    \ the `Artist` entity is the owner of the relationship means that the `CD` is\
    \ the reverse owner (see Listing 3-50) and needs to use the `mappedBy` element\
    \ on its `@ManyToMany` annotation. `mappedBy` tells the persistence provider that\
    \ `appearsOnCDs` is the name of the corresponding attribute of the owning entity.\n\
    \n**Listing 3-50.** *One CD is Created by Several Artists*\n\n```java\n@Entity\n\
    public class CD {\n    @Id @GeneratedValue\n    private Long id;\n    private\
    \ String title;\n    private Float price;\n    private String description;\n\n\
    \    @ManyToMany(mappedBy = \"appearsOnCDs\")\n    private List<Artist> createdByArtists;\n\
    \n    // Constructors, getters, setters\n}\n```\n\nSo, if the `Artist` is the\
