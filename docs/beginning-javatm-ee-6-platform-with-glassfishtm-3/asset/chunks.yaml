    **总结**


    本章介绍了 EJB 3.1。从 EJB 2.*x*开始，EJB 规范在过去十年中从一个需要将 home 接口和远程/本地接口与大量 XML 打包在一起的重量级模型，演变为一个无需接口、仅需一个注解的简单
    Java 类。其底层功能始终如一：事务性和安全性的业务逻辑。


    EJB 3.1 带来了许多新特性，简化了编程模型（无接口视图、war 部署），使其更丰富（嵌入式容器、单例、定时服务、异步调用），并使其在应用服务器之间更具可移植性（标准全局
    JNDI 名称）。一个主要的简化是创建了 EJB Lite，它是完整 EJB API 的一个子集，为新手提供了一个更简单但功能依然强大的 EJB 版本，可用于
    Java EE Web Profile。嵌入式 EJB 容器也使单元测试更简单，且在不同实现之间具有可移植性。EJB 3.1 遵循其前身 EJB 3.0 的发展轨迹。


    展望后续章节，第 7 章将重点描述无状态、有状态和单例会话 Bean 以及定时服务。第 8 章将解释回调方法和拦截器，第 9 章将探讨事务和安全性。


    第 7 章


    会话 Bean 与定时服务


    **从**第 2 章到第 5 章，我重点介绍了使用 JPA 实体的持久化对象。实体封装了数据、关系映射，有时还包括验证逻辑。现在我将向你展示如何使用会话 Bean
    开发处理这些持久化对象的业务层。


    会话 Bean 处理需要与其他组件（实体、Web 服务、消息传递等）交互的复杂任务。实体与会话 Bean 之间的这种逻辑分离遵循了“关注点分离”范式，即应用程序被拆分为功能重叠尽可能少的独立组件。

