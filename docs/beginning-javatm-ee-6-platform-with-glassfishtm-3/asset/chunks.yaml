- fmt: "# As Explained in the “JMS API” Section\n\nAs explained in the “JMS API” section\
    \ earlier in the chapter, consumers can receive a message either synchronously,\
    \ by looping and waiting for a message to arrive, or asynchronously, by implementing\
    \ the `MessageListener` interface. By nature, MDBs are designed to function as\
    \ asynchronous message consumers. MDBs implement a message listener interface,\
    \ which is triggered by the container when a message arrives.\n\nCan an MDB do\
    \ synchronous consuming? Yes, but this is not recommended. Synchronous message\
    \ consumers block and tie up server resources (the EJBs will be stuck looping\
    \ without performing any work, and the container will not be able to free them).\
    \ MDBs, like stateless session beans, live in a pool of a certain size. When the\
    \ container needs an instance, it takes one out of the pool and uses it. If each\
    \ instance goes into an infinite loop, the pool will eventually empty, and all\
    \ the available instances will be busy looping. The EJB container can also start\
    \ generating more MDB instances, growing the pool and eating up more and more\
    \ memory. For this reason, session beans and MDBs should not be used as synchronous\
    \ message consumers. Table 13-7 shows you the different receiving modes for MDBs\
    \ and session beans.\n\n**Table 13-7.** *MDB Compared with Session Beans*\n\n\
    | Enterprise Beans | Producer | Synchronous Receiver | Asynchronous Receiver |\n\
    |------------------|----------|----------------------|------------------------|\n\
    | Session beans    | Yes      | Not recommended      | Not possible          \
    \ |\n| MDB              | Yes      | Not recommended      | Yes              \
    \      |\n\n## MDB As a Producer\n\nMDBs are capable of becoming message producers,\
    \ something that often occurs when they are involved in a workflow, as they receive\
    \ a message from one destination, process it, and send it to another destination.\
    \ To add this capability, the JMS API must be used.\n\nA destination and a connection\
    \ factory can be injected by using the `@Resource` annotation or via JNDI lookup\
    \ and then invoking methods on the `javax.jms.Session` object to create and send\
    \ a message. The code of the `BillingMDB` (see Listing 13-12) listens to a topic\
    \ (`jms/javaee6/Topic`), receives messages (`onMessage()` method), and sends a\
    \ new message to a queue (`jms/javaee6/Queue`).\n\n**Listing 13-12.** *A MDB Consuming\
    \ and Producing Messages*\n\n```java\n@MessageDriven(mappedName = \"jms/javaee6/Topic\"\
    , activationConfig = {\n    @ActivationConfigProperty(propertyName = \"acknowledgeMode\"\
    ,\n            propertyValue = \"Auto-acknowledge\"),\n    @ActivationConfigProperty(propertyName\
    \ = \"messageSelector\",\n            propertyValue = \"orderAmount < 3000\")\n\
    })\npublic class BillingMDB implements MessageListener {\n\n    @Resource(name\
    \ = \"jms/javaee6/Queue\")\n    private Destination printingQueue;\n\n    @Resource(name\
    \ = \"jms/javaee6/ConnectionFactory\")\n    private ConnectionFactory connectionFactory;\n\
    \n    private Connection connection;\n\n    @PostConstruct\n    private void initConnection()\
    \ {\n        connection = connectionFactory.createConnection();\n    }\n\n   \
    \ @PreDestroy\n    private void closeConnection() {\n        connection.close();\n\
    \    }\n\n    public void onMessage(Message message) {\n        TextMessage msg\
    \ = (TextMessage) message;\n        System.out.println(\"Message received: \"\
    \ + msg.getText());\n        sendPrintingMessage();\n    }\n\n    private void\
    \ sendPrintingMessage() throws JMSException {\n        Session session = connection.createSession(true,\n\
    \                Session.AUTO_ACKNOWLEDGE);\n        MessageProducer producer\
    \ = session.createProducer(printingQueue);\n        TextMessage message = session.createTextMessage();\n\
    \        message.setText(\"This message has been received and sent again\");\n\
    \        producer.send(message);\n        session.close();\n    }\n}\n```\n\n\
    This MDB uses most of the concepts introduced thus far. First, it uses the `@MessageDriven`\
    \ annotation to define the JNDI name of the topic it is listening to (`mappedName\
    \ = \"jms/javaee6/Topic\"`). In this same annotation, it defines a set of properties,\
    \ such as the acknowledge mode and a message selector using an array of `@ActivationConfigProperty`\
    \ annotations, and it implements `MessageListener` and its `onMessage()` method.\n\
    \nThis MDB also needs to produce a message. Therefore it gets injected with the\
    \ two administered objects required: a connection factory and a destination (the\
    \ queue named `jms/javaee6/Queue`)."
