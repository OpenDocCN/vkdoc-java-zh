    **HTTP**


    HTTP 是一种用于分布式、协作式超媒体信息系统的协议，它与 URI、HTML 以及首批浏览器共同促成了万维网的建立。


    HTTP 由万维网联盟（W3C）和互联网工程任务组（IETF）协调制定，是多个请求意见稿（RFC）的成果，特别是定义了 HTTP 1.1 的 RFC 216。HTTP
    基于客户端和服务器之间交换的请求和响应。


    请求与响应


    客户端向服务器发送请求，并期望得到应答（见图 15-1）。消息交换由信封和正文（也称为文档或表示）组成。


    **图 15-1.** *HTTP 请求与响应*


