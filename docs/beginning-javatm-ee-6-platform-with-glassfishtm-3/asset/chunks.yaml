    自 EJB 3.1 起，EJB 也可以直接打包在 Web 模块（war 文件）中。在图 6-2 的右侧，Servlet、EJB 和实体都打包在同一个 war
    文件中，并包含所有部署描述符。请注意，在 EJB 模块中，部署描述符存储在`META-INF/ejb-jar.xml`下，而在 Web 模块中则存储在`WEB-INF/ejb-jar.xml`下。


    **EJB 规范概述**


    EJB 1.0 诞生于 1998 年，而 EJB 3.1 于 2009 年随 Java EE 6 一同发布。在这十年间，EJB 规范经历了诸多变革，但依然保留了其成熟的基础。从重量级组件到带注解的
    POJO，再到实体 Bean，又回归到 JPA，EJB 不断重塑自身以满足开发者和现代架构的需求。


    EJB 3.1 规范比以往任何时候都更有助于避免供应商锁定，因为它提供了以前非标准化的功能（例如非标准的 JNDI 名称或嵌入式容器）。如今，EJB 3.1
    的便携性远超过去。


    **规范历史**


    Java 语言诞生后不久，业界就感到需要一种能够满足大规模应用程序需求的技术，该技术需融合 RMI 和 JTA。于是，创建分布式事务性业务组件框架的想法应运而生，IBM
    率先开始创建后来被称为 EJB 的技术。


    EJB 1.0 支持有状态和无状态会话 Bean，并可选择支持实体 Bean。其编程模型除了会话 Bean 本身之外，还使用了 Home 接口和远程接口。EJB
    通过一个提供远程访问（参数按值传递）的接口进行访问。


    ■ 第 6 章 企业级 JavaBean


    **175**


    EJB 1.1 强制要求支持实体 Bean，并引入了 XML 部署描述符来存储元数据（随后序列化为二进制文件）。该版本通过引入角色，为应用程序的组装和部署提供了更好的支持。


    2001 年，EJB 2.0 成为首个由 JCP（作为 JSR 19）标准化的版本。它通过引入本地接口解决了按值传递参数的开销问题。在容器内运行的客户端通过本地接口（使用按引用传递的参数）访问
    EJB，而在不同容器中运行的客户端则使用远程接口。该版本引入了 MDB，并且实体 Bean 获得了对关系以及查询语言（EJB QL）的支持。


    两年后，EJB 2.1（JSR 153）增加了对 Web 服务的支持，允许通过 SOAP/HTTP 调用会话 Bean。还创建了一个定时器服务，允许在指定时间或时间间隔调用
    EJB。


    从 EJB 2.1 到 EJB 3.0 相隔三年，这使得专家组得以重新设计整个架构。2006 年，EJB 3.0 规范（JSR 220）与之前的版本截然不同，它专注于易用性，使
    EJB 看起来更像 POJO。实体 Bean 被一个全新的规范（JPA）所取代，会话 Bean 不再需要 Home 接口或特定于 EJB 的组件接口。依赖注入、拦截器和生命周期回调被引入。


    2009 年，EJB 3.1 规范（JSR 318）随 Java EE 6 一同发布，它延续了上一版本的路线，进一步简化了编程模型并带来了新特性。


    **EJB 3.1 的新特性**


    EJB 3.1 规范（JSR 318）带来了几项变化：JPA 不再是 EJB 规范的一部分，而是在一个独立的 JSR（JSR 317）中演进；并且该规范本身被组织成两个不同的文档：


    •   *“EJB 核心契约与需求”*：规定 EJB 的主要文档

    •   *“拦截器需求”*：规定拦截器的文档


    需要注意的是，该规范必须支持 EJB 2.*x*组件模型，这意味着规范中 600 页的内容涉及 Home 接口、实体 Bean、EJB QL 等。为了简化未来对该规范的采用，Java
    EE 6 专家组编制了一份可能在将来移除的功能列表。以下功能实际上并未从 EJB 3.1 中移除，但下一个版本将不得不移除或保留其中一些：


    •   实体 Bean 2.*x*

    •   实体 Bean 2.*x*的客户端视图

    •   EJB QL（容器管理持久化的查询语言）

    •   基于 JAX-RPC 的 Web 服务端点

    •   JAX-RPC Web 服务的客户端视图


    **176**


    ■ 第 6 章 企业级 JavaBean


    EJB 3.1 规范包含以下新功能和简化：


    •   *无接口视图*：具有本地视图的会话 Bean 可以在没有单独的本地业务接口的情况下被访问。

    •   *War 部署*：现在可以直接在 war 文件中打包和部署 EJB 组件。

    •   *嵌入式容器*：提供了一种新的可嵌入 API，用于在 Java SE 环境中执行 EJB 组件（用于单元测试、批处理等）。

    •   *单例*：这种新型组件提供了对共享状态的便捷访问。

    •   *更丰富的定时器服务*：此功能允许自动创建 EJB 定时器和基于日历的表达式。

    •   *异步*：现在无需 MDB 即可进行异步调用。

    •   *EJB Lite*：此轻量级功能子集的定义可以在 Java EE Profile（例如 Java EE Web Profile）中提供。

    •   *可移植的 JNDI 名称*：现在指定了查找 EJB 组件的语法。


    **EJB Lite**


    企业级 JavaBean 是 Java EE 6 中的主要组件模型，是进行事务性和安全性业务处理的最简单方法。然而，EJB 3.1 仍然定义了旧的实体 Bean、Home
    接口、EJB QL 等，这意味着任何实现 EJB 3.1 规范的新供应商都必须实现实体 Bean。刚开始接触 EJB 的开发人员也会被许多他们可能永远不会用到的技术所困扰。


    出于这些原因，该规范定义了完整 EJB API 的一个最小子集，称为 EJB Lite。它包含了一小部分强大且精选的 EJB 功能，适用于编写可移植的事务性和安全性业务逻辑。任何
    EJB Lite 应用程序都可以部署在任何实现了 EJB 3.1 的 Java EE 产品上。EJB Lite 由表 6-1 中列出的 EJB API 子集组成。


