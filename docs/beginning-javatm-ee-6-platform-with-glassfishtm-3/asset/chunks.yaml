    • *HTTP*：HTTP 是 Web 协议，在现代应用中无处不在。其客户端 API 由 Java SE 中的 `java.net` 包定义。HTTP 服务端
    API 则由 Servlet、JSP、JSF 接口以及 SOAP 和 RESTful Web 服务定义。HTTPS 是 HTTP 与安全套接层（SSL）协议的结合。


    • *RMI-IIOP*：远程方法调用（RMI）允许你独立于底层协议调用远程对象。Java SE 原生 RMI 协议是 Java 远程方法协议（JRMP）。RMI-IIOP
    是 RMI 的扩展，用于与 CORBA 集成。Java 接口定义语言（IDL）允许 Java EE 应用组件使用 IIOP 协议调用外部 CORBA 对象。CORBA
    对象可以用多种语言（Ada、C、C++、Cobol 等）以及 Java 编写。


    打包


    为了部署到容器中，组件必须首先打包成标准格式的归档文件。Java SE 定义了 Java 归档（jar）文件，用于将许多文件（Java 类、部署描述符、资源或外部库）聚合到一个压缩文件（基于
    ZIP 格式）中。Java EE 定义了不同类型的模块，这些模块基于这种通用的 jar 格式拥有自己的打包格式。


    一个应用客户端模块包含打包在 jar 文件中的 Java 类和其他资源文件。这个 jar 文件可以在 Java SE 环境或应用客户端容器中执行。与任何其他归档格式一样，jar
    文件包含一个可选的 `META-INF` 目录，用于存放描述归档的元信息。`META-INF/MANIFEST.MF` 文件用于定义与扩展和包相关的数据。如果部署在
    ACC 中，部署描述符可选地位于 `META-INF/application-client.xml`。


    一个 EJB 模块包含一个或多个会话和/或消息驱动 Bean（MDB），打包在 jar 文件（通常称为 EJB jar 文件）中。它包含一个可选的 `META-INF/ejb-jar.xml`
    部署描述符，并且只能部署在 EJB 容器中。


    一个 Web 应用模块包含 Servlet、JSP、JSF 页面和 Web 服务，以及任何其他与 Web 相关的文件（HTML 和 XHTML 页面、层叠样式表（CSS）、JavaScript、图片、视频等）。自
    Java EE 6 起，Web 应用模块还可以包含 EJB Lite Bean（第 6 章描述的 EJB API 的子集）。所有这些工件都打包在扩展名为 `.war`
    的 jar 文件中（通常称为 war 文件或 Web 归档）。可选的 Web 部署描述符定义在 `WEB-INF/web.xml` 文件中。如果 war 包含
    EJB Lite Bean，则可以在 `WEB-INF/ejb-jar.xml` 设置可选的部署描述符。Java `.class` 文件放置在 `WEB-INF/classes`
    目录下，依赖的 jar 文件放置在 `WEB-INF/lib` 目录下。


    一个企业模块可以包含零个或多个 Web 应用模块、零个或多个 EJB 模块以及其他公共或外部库。所有这些被打包到一个企业归档（扩展名为 `.ear` 的 jar
    文件）中，以便这些不同模块的部署能够同时且一致地进行。可选的企业模块部署描述符定义在 `META-INF/application.xml` 文件中。特殊的
    `lib` 目录用于在模块之间共享公共库。


    Java 标准版


    强调 Java EE 是 Java SE（Java 标准版）的超集这一点很重要。这意味着 Java 语言的所有特性以及 API 在 Java EE 中同样可用。


    Java SE 6 于 2006 年 12 月 11 日正式发布。它是在 JSR 270 下开发的，带来了许多新特性，并延续了 Java SE 5 引入的易用性（自动装箱、注解、泛型、枚举等）。Java
    SE 6 提供了用于诊断、管理和监控应用程序的新工具。它改进了现有的 JMX API，并简化了在 Java 虚拟机（JVM）中执行脚本语言的过程。本书不明确涵盖
    Java SE 6，因此如果你对此不熟悉，应参考现有的广泛 Java 文献。一个不错的起点是 Jeff Friesen 所著的 *《Beginning Java™
    SE 6 Platform: From Novice to Professional》*（Apress，2007 年）。


    **Java EE 6 规范**


    Java EE 6 是由 JSR 316 定义的一个总括性规范，包含 28 个其他规范。旨在符合 Java EE 6 的应用服务器必须实现所有这些规范。表
    1-1 至 1-5 列出了所有这些规范及其版本和 JSR 编号。一些规范已被修剪，这意味着它们可能会从 Java EE 7 中移除。


