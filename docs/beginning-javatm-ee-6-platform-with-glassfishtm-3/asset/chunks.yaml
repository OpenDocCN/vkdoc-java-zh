    **Messaging Specification Overview**


    Messaging in Java is mostly represented by JMS, which can be used in applications
    running in a standard (Java SE) or an enterprise (Java EE) environment. MDB is
    the enterprise extension of a JMS consumer and is bound to the EJB specification.


    **A Brief History of Messaging**


    Up until the late 1980s, companies did not have any easy way to link different
    applications.


    Developers had to write separate software adapters for systems to translate data
    from source applications into a format that the destination system could understand
    (and vice versa).


    Because of the disparity of servers’ processing capabilities and availabilities,
    buffers were created to temporize processing. A lack of homogeneous transport
    protocols created low-level protocol adapters. Toward the end of the 1980s, middleware
    began to emerge, which solved these integration issues. The first MOMs were created
    as separate pieces of software that could sit in the middle of applications and
    manage the “plumbing” between systems. They were able to manage different platforms,
    different programming languages, various network protocols, and diverse hardware.


    **JMS 1.1**


    The JMS specification was first published in August 1998\. It was created by the
    major middleware vendors to bring messaging capabilities to Java. JSR 914 went
    through minor changes (JMS 1.0.1, 1.0.2, and 1.0.2b) to finally reach the 1.1
    version in April 2002\. Since then, the specification hasn’t changed. JMS 1.1
    was integrated into J2EE 1.2 and has been a part of Java EE


    since. However, JMS and MDBs are not part of the Web Profile specification I described
    in the first chapter. This means they will be available on application servers
    implementing the full Java EE 6 platform.


    Although JMS is a verbose and low-level API, it does a very good job. Unfortunately,
    it has not been changed or improved in Java EE 5, nor in Java EE 6.


    **EJB 3.1**


    MDBs were introduced in EJB 2.0 and were improved with EJB 3.0 and the general
    Java EE 5


    paradigm of “ease of use.” They were not internally modified as they continued
    to be message consumers, but the introduction of annotations and configuration
    by exception made them much easier to write. The new EJB 3.1 specification (JSR
    318) has no notable changes to MDBs.


    As you’ve seen in Chapter 7, asynchronous calls are now possible within stateless
    session beans (using the @Asynchronous annotation), and threads are not allowed
    in EJBs. In previous versions of Java EE, it was impossible to have asynchronous
    calls between EJBs. Therefore, the only possible solution was to use JMS and MDBs—expensive,
    as many resources had to


    be used (JMS destinations, connections, factories, etc.) just to call a method
    asynchronously.


    Today, with EJB 3.1, asynchronous calls are possible between session beans, allowing
    MDBs to be used for what they were initially created: integrating systems through
    messaging.


