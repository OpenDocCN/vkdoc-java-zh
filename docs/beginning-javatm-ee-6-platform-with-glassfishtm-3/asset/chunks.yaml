    第11章 ■ 页面与组件


    让我们聚焦于JSF HTML组件，它们将帮助你创建丰富的Web界面。第12章展示了大部分JSF核心库及其转换器和验证器。但首先，让我们看一下JSF页面的生命周期。


    **生命周期**


    一个JSF页面是一个具有特定生命周期的组件树。你应该理解它，以便知道何时验证组件或更新模型。点击按钮会导致一个请求从你的Web浏览器发送到服务器。此请求被转换为一个事件，可以由服务器上的应用程序逻辑处理。用户输入的所有数据在模型更新和任何业务逻辑调用之前，都会进入一个验证阶段。然后，JSF负责确保每个图形组件（子组件和父组件）都能正确地渲染到浏览器。图11-6展示了JSF页面生命周期的不同阶段。


    **图11-6.** *JSF生命周期*


    JSF生命周期分为六个不同的阶段：


    **1.** *恢复视图*：JSF找到目标视图并将用户的输入应用到该视图。如果这是客户端首次访问该页面，JSF会创建一个`UIViewRoot`组件（构成特定页面的组件树的根）作为视图。如果这是后续请求，则会检索之前保存的`UIViewRoot`以处理当前的HTTP请求。


    **2.** *应用请求值*：来自请求的值（来自Web表单的输入字段、Cookie或请求头）被应用到页面的各个组件。请注意，只有UI组件会更新其状态，而构成模型业务对象不会更新。


    **3.** *处理验证*：在前述步骤之后，UI组件已设置了一个值。在验证处理中，JSF遍历组件树并要求每个组件确保其提交的值是可接受的。如果所有组件的转换和验证都成功，生命周期将继续到下一阶段。否则，生命周期将进入*渲染响应*阶段，并附带相应的验证和转换错误消息。


    第11章 ■ 页面与组件


    **309**


    **4.** *更新模型值*：在设置并验证了所有组件的值之后，你可以更新与它们关联的托管Bean。


    **5.** *调用应用程序*：现在你可以执行一些业务逻辑。任何被触发的操作都将在托管Bean上执行，并且导航在此处生效，因为其返回值将决定渲染响应。'
