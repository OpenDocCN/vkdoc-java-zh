    In the next section, I explain how to get an instance of an `EntityManager`.


    ## Obtaining an Entity Manager


    The entity manager is the central interface to interact with entities, but it
    first has to be obtained by an application. Depending on whether it is a container-managed
    environment (like what you’ll see in Chapter 6 with EJBs) or application-managed
    environment, the code can be quite different. For example, in a container-managed
    environment, the transactions are managed by the container. That means you don’t
    need to explicitly write the commit or rollback, which you have to do in an application-managed
    environment.


    The term “application-managed” means an application is responsible for explicitly
    obtaining an instance of `EntityManager` and managing its life cycle (it closes
    the entity manager when finished, for example). Listing 4-2, shown earlier, demonstrates
    how a class running in a Java SE environment gets an instance of an entity manager.
    It uses the `Persistence` class to bootstrap an `EntityManagerFactory` associated
    with a persistence unit (`chapter04PU`), which is then used to create an entity
    manager. Creating an application-managed entity manager is simple enough using
    a factory, but what differentiates application-managed from container-managed
    is how the factory is acquired.


    A container-managed environment is when the application evolves in a servlet or
    an EJB container. In a Java EE environment, the most common way to acquire an
    entity manager is by the `@PersistenceContext` annotation to inject one, or by
    JNDI lookup. The component running in a container (servlet, EJB, web service,
    etc.) doesn’t need to create or close the entity manager, as its life cycle is
    managed by the container. Listing 4-5 shows the code of a stateless session bean
    into which is injected a reference of the `chapter04PU` persistence unit.'
