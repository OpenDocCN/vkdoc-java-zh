    ## 生命周期与回调注解


    前一章解释了页面的生命周期（从接收请求到渲染响应的六个阶段）。托管Bean也有自己的生命周期（见图12-3），这与页面的生命周期完全不同。实际上，托管Bean的生命周期与无状态会话Bean类似；如果它们存在，其生命周期与定义的作用域相同。


    **图12-3.** *托管Bean生命周期*


    ![Image 107](index-367_1.jpg)


    第12章 ■ 处理与导航


    **337**


    在Servlet容器中运行的托管Bean可以使用`@PostConstruct`和`@PreDestroy`注解。容器创建托管Bean实例后，会调用`@PostConstruct`回调方法（如果存在）。在此阶段之后，消息Bean被绑定到一个作用域，并响应用户的请求。在移除托管Bean之前，容器会调用`@PreDestroy`方法。这些方法可用于初始化属性，或创建和释放任何外部资源。


    ## 导航


    Web应用程序由多个需要导航的页面组成。根据应用程序的不同，你可以拥有各种级别的导航，以及或简单或复杂的页面流。你可以想象向导（可以返回上一页或初始页面）、业务场景（根据特定规则跳转到特定页面）等。JSF提供了多种导航选项，允许你基于单个页面或整个应用程序全局控制流程。


    当你只想通过点击链接或按钮在页面之间跳转而不进行任何处理时，可以使用UI组件`<h:commandButton>`和`<h:commandLink>`。


    它们的`action`属性接受你需要导航到的页面名称：


    `<h:commandButton value="Create" action="listBooks.xhtml"/>`


    但大多数情况下这还不够，因为你需要访问业务层或数据库来检索或处理数据。这时就需要托管Bean。在第10章的“整合所有内容”部分，我们有一个第一页（`newBook.xhtml`），它显示了一个用于创建书籍的表单。一旦你点击“Create”按钮，书籍被创建，托管Bean会导航到`listBooks.xhtml`页面，该页面将列出所有书籍。当页面加载到浏览器后，页面底部的“Create
    a new book”链接允许你返回上一页（如图12-4所示）。


