    表示任何需要作为根 XML 元素进行绑定的类所需的注解


    @XmlSchema


    将包名映射到 XML 命名空间


    @XmlTransient


    告知 JAXB 不要绑定某个属性（类似于 Java 的 transient 关键字或 JPA 中的 @Transient 注解）


    @XmlType


    将类注解为 XML Schema 中的复杂类型


    @XmlValue


    允许将类映射到简单的 Schema 内容或类型


    使用这些注解时，你可以将对象映射到特定的 XML Schema。有时，在处理遗留 Web 服务时，你需要这种灵活性。参考 JPA，当你需要将实体映射到遗留数据库时，有一组注解允许自定义映射的每个部分（列、表、外键等）。对于
    Web 服务，情况也类似：Web 服务在 WSDL 文件中描述，该文件用 XML 编写。如果是遗留 Web 服务，其 WSDL 无法更改。相反，必须使用一种机制将其映射到对象，这就是为什么
    JAXB 会与 Web 服务一起使用的原因。


    ![Image 126](img/index-436_1.jpg)


    **406**


    第 14 章 ■ SOAP Web 服务


    ■**注意** 在本节中，我多次提到 JPA，因为 JPA 和 JAXB 技术都严重依赖注解，并用于将对象映射到不同的媒介（数据库或 XML）。在架构方面，实体应仅用于将数据映射到数据库，而
    JAXB 类用于将数据映射到 XML。但有时你可能希望同一个对象既有数据库表示形式，又有 XML 表示形式。从技术上讲，即使不推荐，也可以使用 @Entity
    和 @XmlRootElement 同时注解同一个类。


    **冰山水下部分**


    即使在使用 JAX-WS 开发时你不显式操作 SOAP 和 WSDL 文档，了解它们的一些结构也很重要。


    在开发 Web 服务时，你可以使用 WSDL 来定义其接口：即 Web 服务在 XML Schema 方面的输入和输出参数。SOAP 消息用于承载 WSDL
    指定的输入和输出参数。Web 服务提供两个关键要素：接口定义语言（WSDL）和消息传递标准（SOAP）。


    当消费者想要调用 CardValidator Web 服务（见图 14-4）时，它会获取其 WSDL 以了解可用的接口，请求验证信用卡（validate SOAP
    消息），并接收响应（validateResponse SOAP 消息）。


    **图 14-4.** *消费者调用 Web 服务*


    **WSDL**


    WSDL 文档托管在 Web 服务容器中，并使用 XML 来描述服务做什么、如何调用其操作以及在哪里找到它。该 XML 文档遵循一个包含多个部分的固定结构（见清单
    14-11）。这里以 CardValidator Web 服务为例来介绍下面列出的元素：


    • <definitions> 是 WSDL 的根元素，它指定了文档中可见的命名空间的全局声明。


    • <types> 定义消息中要使用的数据类型。在此示例中，它是 XML Schema 定义（CardValidatorService?xsd=1），描述了传递给
    Web 服务请求的参数（CreditCard 对象）和响应（一个布尔值）。


    • <message> 定义了 Web 服务消费者与 Web 服务本身之间交换的数据格式。这里你有请求（validate 方法）和响应（validateResponse）。


    第 14 章 ■ SOAP Web 服务


    **407**


    • <portType> 指定 Web 服务的操作（validate 方法）。


    • <binding> 描述了针对特定端口类型定义的操作和消息的具体协议（此处为 SOAP）和数据格式。

