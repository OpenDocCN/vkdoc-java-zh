- fmt: '# Session Beans and the Timer Service


    In this chapter, you will learn about the three different types of session beans:
    stateless, stateful, and singleton. Stateless beans are the most scalable of the
    three, as they keep no state and complete business logic in a single method call.
    Stateful beans maintain a conversational state with one client. The singleton
    session bean (one instance per application) is the new model brought about by
    EJB 3.1.


    The last section of the chapter will show you how to use the enhanced timer service
    to schedule tasks.


    Message-driven beans, which are part of the EJB specification, are discussed in
    Chapter 13 along with Java Message Service (JMS). As you will see in Chapters
    14 and 15, a stateless session bean can be turned into a SOAP web service or a
    RESTful web service. Or more precisely, these web services can profit from some
    EJB features such as transactions, security, interceptors, and so on.


    ## Session Beans


    Session beans are great for implementing business logic, processes, and workflow.
    But before using them, you need to choose which type of session bean to use:


    - **Stateless**: This type of session bean does not maintain any conversational
    state on behalf of a client application. It is used to handle tasks that can be
    concluded with a single method call.

    - **Stateful**: This type of bean maintains state and is associated with a specific
    client. It is useful for tasks that have to be done in several steps.

    - **Singleton**: This type of bean follows the singleton design pattern. The container
    will make sure that only one instance exists for the entire application.


    The three types of session beans all have their specific features, of course,
    but they also have a lot in common. First of all, they have the same programming
    model. As you’ll see later on, a session bean can have a local or remote interface,
    or no interface at all. Session beans are container-managed components, so they
    need to be packaged in an archive (jar, war, or ear file) and deployed in a container.
    The container is responsible for managing its session beans’ life cycle (as you’ll
    see in the next chapter), transactions, interceptors, and much more. Figure 7-1
    shows a very high-level picture of session beans and the timer service in an EJB
    container.


    **Figure 7-1.** *Session beans and the timer service in an EJB container*


    ## Stateless Beans


    In Java EE applications, stateless beans are the most popular session bean components.
    They are simple, powerful, and efficient, and respond to the common task of doing
    stateless business processing. What does stateless mean? It means that a task
    has to be completed in a single method call.


    As an example, we can go back to the roots of object-oriented programming where
    an object encapsulates its state and behavior. To persist a book to a database
    using only one object, you would do something like this: create an instance of
    a `Book` object, set some values, and call a method so it could persist itself
    to a database (`book.persistToDatabase()`). In the following code, you can see
    that from the very first line to the last one, the book object is called several
    times and keeps its state.


    ```

    Book book = new Book();

    book.setTitle("The Hitchhiker''s Guide to the Galaxy");

    book.setPrice(12.5F);

    book.setDescription("Science fiction comedy series created by Douglas Adams.");

    book.setIsbn("1-84023-742-2");

    book.setNbOfPage(354);

    book.setIllustrations(false);

    book.persistToDatabase();

    ```


    Stateless beans are ideal when you need to implement a task that can be concluded
    with a single method call. So if you take the preceding code and introduce a stateless
    component, you need to create a `Book` object, set some values, and then use a
    stateless component to invoke a method that will persist the book on its behalf,
    in a single call. The state is maintained by `Book`, but not by the stateless
    component.'
