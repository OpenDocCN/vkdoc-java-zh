    The following sections describe the four different types of queries using some
    of the methods just described.


    **Dynamic Queries**


    Dynamic queries are defined on the fly as needed by the application. To create
    a dynamic query, use the EntityManager.createQuery() method, which takes a String
    as a parameter that represents a JPQL query.'
