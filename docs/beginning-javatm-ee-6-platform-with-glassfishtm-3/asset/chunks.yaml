    自 2006 年开源，既可用于独立的 JMS 应用程序，也可嵌入应用服务器中。OpenMQ 是 GlassFish 的默认消息提供者，在本书撰写之际，其版本已接近
    4.4。它遵循 JMS 规范，并增加了许多特性，例如通用消息服务（UMS）、通配符主题目标、XML


    消息验证、集群等。


    **如何发送和接收消息**


    让我们通过一个简单示例来了解 JMS。JMS 使用生产者、消费者和目标。生产者将消息发送到目标，消费者则在目标处等待消息到达。目标分为两种：队列（用于点对点通信）和主题（用于发布-订阅通信）。在清单
    13-1 中，一个生产者向消费者正在监听的队列发送了一条文本消息。


    **清单 13-1.** *发送者类将消息生成到队列中*


    public class Sender {


    public static void main(String[] args) {


    // 获取 JNDI 上下文


    Context jndiContext = new InitialContext();


    // 查找受管对象


    **ConnectionFactory** connectionFactory = (ConnectionFactory)➥


    jndiContext.lookup(**"jms/javaee6/ConnectionFactory"** );


    **Queue** queue = (Queue) jndiContext.lookup(" **jms/javaee6/Queue**");


    // 创建连接到队列所需的工件


    **Connection** connection = connectionFactory.createConnection();


    **Session** session = connection.createSession(false, ➥


    Session.AUTO_ACKNOWLEDGE);


    **MessageProducer** producer = session.createProducer(queue);


    // 向队列发送一条文本消息


    **TextMessage** message = session.createTextMessage();


    message.setText("This is a text message");


    **producer.send**(message);


    connection.close();


    }


    }


    清单 13-1 中的代码代表了一个仅包含 main()方法的 Sender 类。在该方法中，首先实例化一个 JNDI 上下文，并用于获取


    ConnectionFactory 和 Queue。连接工厂和目标（队列和主题）被称为受管对象；它们必须在消息提供者（本例中为 OpenMQ）中创建和声明。两者都有一个
    JNDI 名称（例如，队列名为 jms/javaee6/Queue），并且需要在 JNDI 树中进行查找。


    获取这两个受管对象后，Sender 类使用


    ConnectionFactory 创建一个 Connection，并从中获取一个 Session。利用这个会话，在目标队列上创建一个 MessageProducer
    和一个消息（session.


    createProducer(queue)）。然后，生产者发送此消息（文本类型）。这段代码相当冗长，在示例中我特意省略了异常处理（捕获 JNDI 和 JMS
    异常）。


    幸运的是，一旦你编写了发送消息的代码，接收消息的代码看起来几乎相同。实际上，清单 13-2 中 Receiver 类的前几行完全一样：创建 JNDI 上下文，查找连接工厂和队列，然后建立连接。唯一的区别是使用了
    MessageConsumer 而不是


    MessageProducer，并且接收者进入一个无限循环来监听队列（稍后你会看到，通过使用更标准的消息监听器可以避免这个循环）。当消息到达时，它被消费并显示内容。


    **清单 13-2.** *接收者类从队列中消费消息*


    public class Receiver {


    public static void main(String[] args) {


    // 获取 JNDI 上下文


    Context jndiContext = new InitialContext();


    // 查找受管对象


    ConnectionFactory connectionFactory = (ConnectionFactory) ➥


    jndiContext.lookup("jms/javaee6/ConnectionFactory");


    Queue queue = (Queue) jndiContext.lookup("jms/javaee6/Queue");


    // 创建连接到队列所需的工件


    Connection connection = connectionFactory.createConnection();


    Session session = connection.createSession(false, ➥


    Session.AUTO_ACKNOWLEDGE);


    **MessageConsumer** consumer = session.createConsumer(queue);


    connection.start();


    // 循环接收消息


    while (true) {


    TextMessage message = (TextMessage) **consumer.receive**();


    System.out.println("Message received: " + message.getText());


    }


    }


    }


    ![Image 113](img/index-392_1.jpg)


    **362**


    第 13 章 ■ 发送消息


    接下来，我们将聚焦于 JMS API，定义所有使用的受管对象和类，并了解这如何转化为 MDB。


    **Java 消息服务**


    从高层来看，JMS 架构由以下组件组成（见图 13-2）：


    • *提供者*：JMS 只是一个规范，因此需要一个底层实现来路由消息，即提供者。提供者通过提供 JMS API 的实现来处理消息的缓冲和传递。


    • *客户端*：客户端是任何使用 JMS API 消费或生产 JMS 消息的 Java 应用程序或组件。这样的客户端被称为 JMS 客户端，因为它是底层提供者的客户端。“客户端”是生产者、发送者、发布者、消费者、接收者或订阅者的通用术语。


    • *消息*：这些是客户端发送给 JMS 提供者或从 JMS 提供者接收的对象。


    • *受管对象*：为了使提供者完全支持 JMS，受管对象（连接工厂和目标）必须放置在 JNDI 树中，并可通过 JNDI 查找使用。


    **图 13-2.** *JMS 架构*


    消息提供者通过提供一个可以保存消息直到消息能够传递给客户端的目标，来实现异步通信。有两种不同类型的目标，每种适用于特定的架构模型：


    • *点对点（P2P）模型*：在此模型中，用于保存消息的目标称为*队列*。使用点对点消息传递时，一个客户端将消息放入队列，另一个客户端接收该消息。一旦消息被确认，消息提供者将从队列中移除该消息。


    • *发布-订阅（pub-sub）模型*：目标称为*主题*。使用发布/订阅消息传递时，一个客户端将消息发布到主题，该主题的所有订阅者都会收到该消息。


    JMS 规范提供了一组统一的接口，可用于 P2P 和 pub-sub 消息传递。表 13-1 显示了接口的通用名称（例如 Session）以及每种模型的具体名称（QueueSession,
    TopicSession）。同时注意不同的术语；消费者在 P2P 中称为接收者，在 pub-sub 中称为订阅者。


    ![Image 114](img/index-393_1.jpg)


    ![Image 115](img/index-393_2.jpg)


    第 13 章 ■ 发送消息


    **363**


    **表 13-1.** *根据目标类型使用的接口*


    **通用**


    **点对点**


    **发布-订阅**


    Destination


    Queue


    Topic


    ConnectionFactory


    QueueConnectionFactory


    TopicConnectionFactory


    Connection


    QueueConnection


    TopicConnection


    Session


    QueueSession


    TopicSession


    MessageConsumer


    QueueReceiver


    TopicSubscriber


    MessageProducer


    QueueSender


    TopicPublisher


    **点对点**


    在 P2P 模型中，一条消息从单个生产者（点 A）传送到单个消费者（点 B）。该模型围绕消息队列、发送者和接收者的概念构建（见图 13-3）。队列保留发送者发送的消息，直到它们被消费，并且发送者和接收者之间没有时间依赖关系。这意味着发送者可以随时生成消息并将其发送到队列中，接收者也可以随时消费它们。一旦接收者被创建，它将获取所有发送到该队列的消息，甚至包括在其创建之前发送的消息。


    **图 13-3.** *P2P 模型*


    每条消息都被发送到一个特定的队列，接收者从队列中提取消息。队列会保留所有发送的消息，直到它们被消费或过期。

