    Web 服务拥有一个环境上下文，可以通过使用 `@Resource` 注解注入 `javax.xml.ws.WebServiceContext` 的引用来访问它。在此上下文中，Web
    服务可以获取运行时信息，例如端点实现类、消息上下文以及与正在服务的请求相关的安全信息。


    **@Resource**


    private **WebServiceContext** context;


