- fmt: '# Deploying the MDB on GlassFish


    Once the MDB is packaged in a jar, it needs to be deployed into GlassFish. This
    can be done in several ways, including via the web administration console. However,
    the `asadmin` command line does the job simply: open a DOS console and go to the
    target directory where the `chapter13-MDB-1.0.jar` file is, make sure that GlassFish
    is still running, and enter the following:


    ```

    asadmin deploy chapter13-MDB-1.0.jar

    ```


    If the deployment is successful, the following command should return the name
    of the deployed jar and its type (`ejb-module` in the example):


    ```

    asadmin list-components

    ```


    `chapter13-MDB-1.0` `<ejb-module>`


    ## Running the Example


    The MDB is deployed on GlassFish and is listening to the `jms/javaee6/Queue` destination,
    waiting for a message to arrive. It’s time to run the `OrderSender` client. This
    is a stand-alone application and executes outside GlassFish, yet resources need
    to be injected into it (connection factory and queue). The ACC can be used to
    execute it. The ACC wraps a jar file and gives it access to the application server
    resources. To execute the ACC, use the `appclient` utility that comes with GlassFish,
    and pass the jar file as a parameter along with the parameters of our application
    (the order amount). Enter the following command to send a message with an order
    of $2,000:


    ```

    appclient -client chapter13-Sender-1.0.jar 2000

    ```


    Because the amount is greater than $1,000 (the amount defined in the selector
    message), the `OrderMDB` should receive and print the message. Check the GlassFish
    logs to confirm. If you pass a parameter lower than $1,000, the MDB will not receive
    the message.


    ```

    appclient -client chapter13-Sender-1.0.jar 500

    ```


    ## Summary


    This chapter showed that integration with messaging is a loosely coupled, asynchronous
    form of communication between components. MOM can be seen as a buffer between
    systems that need to produce and consume messages at their own pace. This is different
    from the RPC architecture (such as RMI) where clients need to know the methods
    of an available service.


    The first section of this chapter concentrated on the JMS API and its vocabulary.
    The asynchronous model is a very powerful API that can be used in a Java SE or
    Java EE environment, and is based on P2P and pub-sub, connection factories, destinations,
    connections, sessions, messages (header, properties, body) of different types
    (text, object, map, stream, bytes), selectors, and other reliability mechanisms
    such as acknowledgement or durability.


    Java EE has a special enterprise component to consume messages: MDBs. The second
    section of this chapter showed how MDBs could be used as asynchronous consumers
    and how they rely on their container to take care of several services (life cycle,
    interceptors, transactions, security, concurrency, message acknowledgement, etc.).


    This section also showed how to put these pieces together with Maven, GlassFish,
    and OpenMQ, and gave an example with a stand-alone sender and an MDB receiver.


    The following chapters will demonstrate other technologies used to interoperate
    with external systems: web services and RESTful services.


    # SOAP Web Services


    Formerly considered a buzzword, Service-Oriented Architecture (SOA) today forms
    part of day-to-day architectural life. However, sometimes it is confused with
    web services. SOA is an architecture principally based upon service-oriented applications
    that can be implemented with different technologies such as web services.


    Web services are said to be “loosely coupled” because the client of a web service
    doesn’t have to know its implementation details (such as the language used to
    develop it or the method signature). The consumer is able to invoke a web service
    using a self-explanatory interface describing the available business methods (parameters
    and return value). The underlying implementation can be done in any language (Visual
    Basic, C#, C, C++, Java, etc.).'
