    \ messages; it requires a provider that is in charge of handling messages. When\
    \ running in a container, Message-Driven Beans (MDBs) can be used to receive messages\
    \ in a container-managed way.\n\n## JMS\n\nJMS is a standard Java API that allows\
    \ applications to create, send, receive, and read messages asynchronously. It\
    \ defines a common set of interfaces and classes that allows programs to communicate\
    \ with other message providers. JMS is analogous to JDBC: the latter connects\
