    The difference with the CMT code shown in Listing 9-3 is that with CMT the container


    starts the transaction before the method execution and commits it immediately
    after. With the BMT code shown in Listing 9-6, you manually define transaction
    boundaries inside the method itself.


    **Security**


    Securing applications is (or should be) a primary concern for companies. It can
    go from securing a network, to encrypting data transfer, to granting users certain
    permissions on a system.


    In our day-to-day Internet browsing, we cross many web sites where we need to
    enter a username and a password to have access to certain parts of an application.
    Security has become a common necessity in the Web, and consequently, Java EE has
    defined several mechanisms to secure applications.


    Various concepts have to be understood when securing a Java EE application. One
    of


    them is the way users are bound to a principal and can have several roles. Each
    of these roles will give permission to a set of resources. But to have an identity
    in the security domain, a user needs to be authenticated. Then the platform will
    control the access by authorizing resources depending on the user’s role.


    **Principals and Roles**


    Principals and roles are an important notion in software security. A *principal*
    represents a user who has been authenticated by an authentication system (e.g.,
    by verifying a username and password in the database). You can then organize principals
    into groups, known as *roles*, allowing principals to share a common set of permissions
    (e.g., having access to the billing system or being able to send messages to a
    workflow).


    Figure 9-7 shows you how users can be represented in a secure system. As you can
    see, a user, once authenticated, is bound to a principal. The principal has a
    unique identifier and can be linked to several roles. For example, the user Frank
    has a principal (identified by a user ID, for example) bound to the employee and
    admin roles.


    ![Image 83](index-283_1.jpg)


    ![Image 84](index-283_2.jpg)


    Chapter 9 ■ traNSaCtIONS aND SeCUrItY


    **253**


    **Figure 9-7.** *Principals and roles*


    **Authentication and Authorization**


    Securing an application involves two functions: authentication and authorization.
    Authentication is the process of verifying the user’s identity (user ID and password,
    OpenID, fingerprint check, and so on) against an authentication system, and assigning
    a principal to the user.


    Authorization is the process of determining whether a principal (an authenticated
    user) has access to a particular resource (e.g., a book) or a function (e.g.,
    removing a book). Depending on his role, the user can have access to all resources,
    none, or a subset.


    Figure 9-8 shows a common security scenario. A user is asked to enter her username
    and


    password through a client interface (web or Swing). Her credentials are checked
    using Java Authentication and Authorization Service (JAAS) against an underlying
    authentication system.


    If the authentication succeeds, the user is given a principal. At this point,
    the principal is associated with one or more roles. When the user accesses a secured
    EJB, the principal is passed transparently to the EJB, which uses it to determine
    whether the caller’s role is allowed to access the method she is trying to execute.


    **Figure 9-8.** *Common security scenario using JAAS*


    **254**


    Chapter 9 ■ traNSaCtIONS aND SeCUrItY


    As shown in Figure 9-8, Java EE security is largely based on the JAAS API. In
    fact, JAAS is the API used internally by the web and EJB tier to perform authorization
    and authentication.


    It also accesses the underlying authentication systems such as the Lightweight
    Directory Access Protocol (LDAP), Microsoft Active Directory, and so on.


