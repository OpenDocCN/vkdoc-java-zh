    第 1 章 ■ Java EE 6 概览


    **11**


    **Java EE 6 的新特性是什么？**


    现在你已经了解了 Java EE 的内部架构，可能想知道 Java EE 6 有哪些新特性。此版本的主要目标是延续 Java EE 5 引入的易用性改进。在
    Java EE 5 中，EJB、持久化实体和 Web 服务被重新设计，以遵循更面向对象的方法（实现 Java 接口的 Java 类），并使用注解作为定义元数据的新方式（XML
    部署描述符变为可选）。Java EE 6 沿袭了这一路径，并将相同的范式应用于 Web 层。如今，JSF 托管 Bean 是一个带有可选 XML 描述符的注解
    Java 类。


    Java EE 6 还专注于通过引入配置文件（profiles）和淘汰一些过时技术来简化平台。它在现有规范中增加了更多特性（例如，标准化单例会话 Bean），同时添加了新规范（如
    JAX-RS）。与以往相比，Java EE 6 应用程序通过标准 JNDI 名称和指定的嵌入式 EJB 容器，在容器之间更具可移植性。


    **更轻量**


    Java EE 6 专家组面临一个有趣的挑战：如何在添加更多规范的同时让平台变得更轻量？如今，一个应用服务器必须实现 28 个规范才能符合 Java EE
    6 标准。开发者需要了解数千个 API，其中一些甚至因为已被淘汰而不再相关。为了使平台更轻量，专家组引入了配置文件（profiles）、淘汰机制（pruning）和
    EJB Lite（完整 EJB 功能的一个子集，仅专注于本地接口、拦截器、事务和安全性）。EJB Lite 将在第 6 章中详细说明。


    淘汰机制


    Java EE 于 1999 年首次发布，此后每个版本都添加了新的规范（如前文图 1-1 所示）。这在规模、实现和采用方面都成了问题。一些特性由于技术过时或在此期间出现了其他替代方案，而未得到良好支持或广泛部署。因此，专家组决定通过淘汰机制提议移除一些特性。


    Java EE 6 采用了 Java SE 组已经采用的淘汰流程（也称为标记为删除）。该流程包括提出一份可能在 Java EE 7 中移除的特性列表。请注意，在此版本中，提议移除的项目实际上都不会被移除。一些特性将被更新的规范取代（例如，实体
    Bean 被 JPA 取代），另一些则将离开 Java EE 7 的范畴，作为独立的 JSR 继续演进（例如 JSR 88 和 JSR 77）。但 Java
    EE 6 仍然包含以下已淘汰的特性列表：


    • *EJB 2.x 实体 Bean CMP（JSR 318 的一部分）*：EJB 2.x 实体 Bean 复杂且重量级的持久化组件模型已被 JPA 取代。


    • *JAX-RPC（JSR 101）*：这是将 SOAP Web 服务建模为 RPC 调用的首次尝试。它现在已被更易用且更健壮的 JAX-WS 取代。


    ![Image 10](img/index-42_1.jpg)


    **12**


    第 1 章 ■ Java EE 6 概览


    • *JAXR（JSR 93）*：JAXR 是专用于与 UDDI 注册中心通信的 API。由于 UDDI 并未广泛使用，JAXR 将离开 Java EE 并作为独立的
    JSR 演进。


    • *Java EE 应用程序部署（JSR 88）*：JSR 88 是一个规范，工具开发者可将其用于跨应用服务器的部署。该 API 并未获得太多供应商支持，因此将离开
    Java EE 并作为独立的 JSR 演进。


    • *Java EE 管理（JSR 77）*：与 JSR 88 类似，JSR 77 是创建跨服务器工作的应用服务器管理工具的一次尝试。


