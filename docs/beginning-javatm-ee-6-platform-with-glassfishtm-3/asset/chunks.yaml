    **参考实现**


    Metro 并非 Java EE 规范，而是 Java Web 服务规范的开源参考实现。它包含 JAX-WS 和 JAXB，同时也支持


    **398**


    第 14 章 ■ SOAP Web 服务


    传统的 JAX-RPC API。它允许你创建和部署安全、可靠、支持事务且可互操作的 Web 服务及消费者。Metro 栈由 GlassFish 社区开发，但也可在
    GlassFish 之外的 Java EE 或 Java SE 环境中使用。


    **如何调用 Web 服务**


    尽管存在诸多规范、概念、标准和组织，编写和使用 Web 服务却非常简单。清单 14-1 展示了一个验证信用卡的 Web 服务代码。


