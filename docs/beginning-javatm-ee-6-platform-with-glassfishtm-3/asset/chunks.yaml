- fmt: '通过`asadmin`命令行界面部署WAR文件。打开DOS控制台，进入`chapter15-resource-1.0.war`文件所在的`target`目录，然后输入：


    ```

    asadmin deploy chapter15-resource-1.0.war

    ```


    如果部署成功，以下命令应返回已部署组件的名称及其类型：


    ```

    asadmin list-components

    ```


    ```

    chapter15-resource-1.0 <ejb, web>

    ```


    ## 运行示例


    应用部署完成后，您可以在命令行中使用`cURL`通过发送`POST`请求来创建图书资源，通过`GET`请求获取所有或特定资源，`DELETE`请求将删除图书资源。以下是一些可用的命令：


    ```

    // 创建一本书

    curl -X POST --data-binary ➥

    "{ \"title\":\"H2G2\", \"description\":\"Scifi IT book\", ➥

    \"illustrations\":\"false\",\"isbn\":\"134-234\",\"nbOfPage\":\"241\",➥

    \"price\":\"24.0\" }" -H "Content-Type: application/json" ➥

    http://localhost:8080/chapter15-resource-1.0/rs/books


    // 返回所有图书

    curl -X GET -H "Accept: application/json" ➥

    http://localhost:8080/chapter15-resource-1.0/rs/books


    // 以JSON格式返回ID为601的图书

    curl -X GET -H "Accept: application/json" ➥

    http://localhost:8080/chapter15-resource-1.0/rs/books/601


    {"description":"Scifi IT book","illustrations":"false",➥

    "isbn":"1234-234","nbOfPage":"241","price":"24.0","title":"H2G2"}


    // 以XML格式返回ID为601的图书

    curl -X GET -H "Accept: application/xml" ➥

    http://localhost:8080/chapter15-resource-1.0/rs/books/601


    <?xml version="1.0" encoding="UTF-8" standalone="yes"?>

    <book><description>Scifi IT book</description>

    <illustrations>false</illustrations><isbn>1234-234</isbn>

    <nbOfPage>241</nbOfPage><price>24.0</price><title>H2G2</title></book>


    // 删除ID为601的图书

    curl -X DELETE http://localhost:8080/chapter15-resource-1.0/rs/books/601

    ```


    ## 总结


    前一章解释了SOAP Web服务。它们使用特殊的信封，通过WSDL进行描述，并可以通过多种协议调用，HTTP是其中之一。在本章中，我解释了RESTful Web服务，您现在应该了解JAX-WS和JAX-RS在实现上有何不同。


    本章从REST的一般介绍开始。通过简单的动词（`GET`、`POST`、`PUT`等）和统一的接口，您学习了如何访问部署在Web上的任何资源。然后，本章聚焦于HTTP，这是一种基于请求/响应机制的协议，使用内容协商从请求中选择合适的内容类型。可以使用基于日期和`ETag`的条件请求来优化网络流量，从而实现缓存。由于REST基于HTTP，这种优化也可以与REST一起使用。


    JAX-RS是一个Java API，随Java EE 6一起提供，它简化了RESTful Web服务的开发。通过一组注解，您可以定义资源的路径和子路径，提取不同类型的参数，或映射到HTTP方法（`@GET`、`@POST`等）。在开发RESTful
    Web服务时，您必须考虑资源、它们如何相互链接以及如何使用HTTP管理它们的状态。


