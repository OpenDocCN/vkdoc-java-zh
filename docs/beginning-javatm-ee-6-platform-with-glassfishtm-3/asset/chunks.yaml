  trans: '

    我们生活在一个互联网世界中。随着事务型后端处理数千个请求，并通过 Web 服务与异构系统通信，我们需要一个表示层来与最终用户交互，最好是一个能在浏览器中运行的表示层。浏览器无处不在，用户界面也变得更加丰富、动态且易于使用。富互联网应用程序（RIA）越来越受欢迎，因为用户对浏览体验的期望越来越高。他们需要在线查阅书籍和
    CD 的目录，但也希望访问电子邮件和文档、接收邮件通知，或者在服务器事件发生时刷新浏览器的部分内容。再加上 Web 2.0 的理念——人们可以与朋友群分享任何信息并相互互动——结果就是
    Web 界面的开发变得越来越复杂。


    在 Java 的早期，开发者直接通过 Servlet 输出 HTML 来处理 HTML。随后，我们从 Servlet 转向了 Java Server Pages（JSP），再到自定义标签。如今，Java
    EE 6 带来了新版本的 JSF，简化了 Web 界面的开发。


    在本章中，你将了解 Java EE 6 中用于创建网页的不同技术。


    首先，文本涵盖了一些基本概念，如 HTML、CSS 和 JavaScript，然后继续介绍 JSP、EL 和 JSTL。接着，我将向你介绍 Facelet，这是
    JSF 中首选的页面声明语言（PDL）。本章的其余部分将重点介绍如何使用 JSF 或自定义组件创建 Web 界面。下一章将重点介绍如何在页面之间导航，以及如何与后端交互，以便显示动态数据。


    **网页**


    当我们创建 Web 应用程序时，我们真正关心的是显示动态内容：来自目录的项目列表（例如 CD 和书籍）、给定标识符的客户详细信息、包含客户想要购买的商品的购物车等等。相反，静态内容，例如图书公司的地址以及关于如何购买或发货的常见问题解答，很少或从不改变。静态内容也可以是构成页面的图像、视频或插图。


    创建页面的最终目标是将其显示在浏览器中。页面必须使用浏览器能够理解的语言，其中有几种：HTML、XHTML、CSS 和 JavaScript。


    **281**


    **282**


    第 11 章 ■ 页面与组件


    **HTML**


    超文本标记语言（HTML）是网页的主要语言。它基于标准通用标记语言（SGML），这是一种用于定义标记语言的标准元语言。HTML 使用*标记*或*标签*将文本结构化为段落、列表、链接、按钮、文本区域等。


    HTML 页面是浏览器用来呈现文本和图形的文本文档。这些文档是文本文件，通常具有 .html 或 .htm 扩展名。一个网页由内容、用于改变内容某些方面的标签以及外部对象（如图像、视频、JavaScript
    或 CSS 文件）组成。


    在上一章中，“综合应用”*部分展示了一些 JSF 页面，其中一个页面显示了一个用于创建新书的表单。在纯 HTML 中，如果不使用任何 JSF 标签，这个页面可能看起来像清单
    11-1 中的代码。


    **清单 11-1.** *newBook.html 页面*


    <H1>创建一本新书</h1>


    **<hr>**


    <TABLE **border=0**>


    **<TR>**


    <TD>ISBN :</TD>


    <TD><input type=text/></td>


    </tr>


    <tr>


    <td>书名 :</td>


    <TD><input type=text/></td>


    </tr>


    <tr>


    <td>价格 :</td>


    <TD><input type=text/></td>


    </tr>


    <tr>


    <td>描述 :


    <td><textarea name=textarea cols=20 rows=5></textarea>


    </tr>


    <TR>


    <TD>页数 :


    <td><input type=text/>


    </tr>


    <tr>


    <td>插图 :


    <td><input type=checkbox/>


    </tr>


    </table>


    <input type=submit value=创建>


    **<hr>**


    <i>APress - Beginning Java EE 6</i>


    ![Image 89](img/index-313_1.jpg)


    第 11 章 ■ 页面与组件


    **283**


    通常，一个有效的 HTML 页面以 <html> 标签开头，该标签充当文档的容器。其后是 <head> 和 <body> 标签。<body> 包含可见内容，例如显示表格、标签、输入字段和按钮的
    HTML 代码。正如你在清单 11-1 中所见，newBook.html 的标记并不遵循这些规则，但浏览器会在一定程度上显示无效的 HTML 页面。因此，可见结果将如图
    11-1 所示。


    **图 11-1.** *newBook.html 页面的图形表示*


    图 11-1 中显示的图形表示是预期的，因为清单 11-1 在 XML 方面格式不正确：


    • 页面没有任何 <html>、<head> 或 <body> 标签。


    • <input type=submit value=Create> 标签未闭合。


    • 标签中大小写混用（例如，清单中同时出现了 <TR> 和 </tr>）。


    大多数浏览器会允许此类错误并显示此表单。但是，如果你想用 XML 解析器处理此文档，例如，它会失败。为了揭示原因，让我们看一个使用严格 XML 结构的网页，即可扩展超文本标记语言（XHTML）。


    **XHTML**


    XHTML 是在 HTML 4.01 之后不久创建的。它源于 HTML，但用严格的 XML 重新表述。这意味着 XHTML 文档是一个遵循特定模式并在浏览器上具有图形表示的
    XML 文档。XHTML 文件（扩展名为 .xhtml）可以立即用作 XML 或在浏览器中显示。与 HTML 相比，其优势在于可以使用标准 XML 工具（XSL，即可扩展样式表语言；XSLT，即
    XSL 转换等）提供文档验证。因此，XHTML 比 HTML 更加灵活和强大，因为它允许你定义任何你想要的标签集。


    清单 11-2 显示了用于创建书籍的网页的 XHTML 版本。


    **284**


    第 11 章 ■ 页面与组件


    **清单 11-2.** *newBook.xhtml 页面*


    <?xml version="1.0" encoding="UTF-8"?>

    <!DOCTYPE html

    PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"

    ["http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">](http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd)

    **<html** [xml:lang="en" lang="en">](http://www.w3.org/1999/xhtml)

    **<head>**

    <title>创建一本新书</title>

    </head>

    **<body>**

    <h1>创建一本新书</h1>

    **<hr/>**

    <table **border="0"** >

    **<tr>**

    <td>ISBN :</td>

    <td><input type="text"/></td>

    </tr>

    <tr>

    <td>书名 :</td>

    <td><input type="text"/></td>

    </tr>

    <tr>

    <td>价格 :</td>

    <td><input type="text"/></td>

    </tr>

    <tr>

    <td>描述 :**</td>**

    <td><textarea name="textarea" cols="20" rows="5"></textarea> **</td>**

    </tr>

    <tr>

    <td>页数 :**</td>**

    <td><input type="text"/> **</td>**

    </tr>

    <tr>

    <td>插图 :**</td>**

    <td><input type="checkbox"/> **</td>**

    </tr>

    </table>

    <input name="" type="submit" value="创建"/>

    <hr/>

    <i>APress - Beginning Java EE 6</i>

    </body>

    </html>


    清单 11-1 和清单 11-2 之间存在一些差异：清单 11-2 中的文档遵循严格的结构，并具有 <html>、<head> 和 <body> 标签；所有标签都已闭合，即使是空元素也是如此（每个
    <td> 都已闭合，并且使用了 <hr/> 而不是 <hr>）；属性


    第 11 章 ■ 页面与组件


    **285**


    出现在单引号或双引号之间（<table border="0"> 或 <table border=''0''>，但不是 <table border=0>）；并且标签都是小写的（<tr>
    而不是 <TR>）。将此与清单 11-1 进行比较，如前所述，清单 11-1 显示了无效的 HTML，但浏览器无论如何都能显示。


    XML 语法规则和模式约束的严格验证使得 XHTML 比 HTML 更易于维护和解析，因此它现在成为网页的首选语言。


    **CSS**


    浏览器存在于客户端语言的世界中，例如 HTML、XHTML、CSS 和 JavaScript。

