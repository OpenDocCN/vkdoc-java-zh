    **Figure 3-10.** *A relationship using a join table*


    You wouldn’t use a join table to represent a one-to-one relationship, as this
    could have performance issues (you always need to access a third table to get
    the address of a customer).


    Join tables are generally used when you have one-to-many or many-to-many cardinalities.
    As you will see in the following section, JPA uses these two modes to map object
    associations.


    **Entity Relationships**


    Now back to JPA. Most entities need to be able to reference, or have relationships
    with, other entities. This is what produces the domain model graphs that are common
    in business applications. JPA makes it possible to map associations so that an
    entity can be linked to another in a relational model. Like the elementary mapping
    annotations that you saw previously, JPA uses configuration by exception for associations.
    It has a default way of storing a relation, but if this doesn’t suit your database
    model, you have several annotations you can use to customize the mapping.


