    After years of complaints about Entity CMP 2\. *x* components and in acknowledgment
    of the success and simplicity of open source frameworks such as Hibernate, the
    persistence model of the Enterprise Edition was completely rearchitected in Java
    EE 5\. JPA 1.0 was born


    Chapter 2 ■ JaVa perSISteNCe


    **43**


    with a very lightweight approach that adopted many Hibernate design principles.
    The JPA 1.0


    specification was bundled with EJB 3.0 (JSR 220).


    Today, with Java EE 6, JPA in its second version follows the path of ease of development
    and brings new features. It has evolved with its own dedicated specification,
    JSR 317.


    **What’s New in JPA 2.0?**


    If JPA 1.0 was a completely new persistence model from its Entity CMP 2\. *x*
    ancestor, JPA 2.0 is a continuation of JPA 1.0\. It keeps the object-oriented
    approach with annotation and optional XML mapping files. This second version brings
    new APIs, extends JPQL, and adds these new functionalities:


    • Collections of simple data types (String, Integer, etc.) and of embeddable objects


    can now be mapped in separate tables. Previously, you could only map collections
    of


    entities.


    • Map support has been extended so that maps can have keys and values of basic
    types,


    entities, or embeddables.


    • Maintaining a persistent ordering is now possible with the @OrderColumn annotation.


    • Orphan removal allows child objects to be removed from a relationship if the
    parent


    object is removed.


    • Optimistic locking was already supported, but now pessimistic locking has been


    introduced.


    • A brand-new Query Definition API has been introduced to allow queries to be
    con-


    structed in an object-oriented manner.


    • JPQL syntax is richer (e.g., it now allows case expressions).


    • Embeddable objects can now be nested into other embeddable objects and have
    rela-


    tionships to entities.


    • The dot (.) navigation syntax has been extended to handle embeddables with relation-


    ships and embeddables of embeddables.


    • Support for a new caching API has been added.


    I will discuss these functionalities in detail in Chapters 3, 4, and 5.


    **Reference Implementation**


    EclipseLink 1.1 is an open source implementation of JPA 2.0\. It provides a powerful
    and flexible framework for storing Java objects in a relational database. EclipseLink
    is a JPA implementation, but it also supports XML persistence through Java XML
    Binding (JAXB) and other means such as Service Data Objects (SDO). It provides
    support not only for ORM, but also for object XML mapping (OXM), object persistence
    to Enterprise Information Systems (EIS) using Java EE Connector Architecture (JCA),
    and database web services.


    EclipseLink’s origins stem from the Oracle TopLink product given to the Eclipse
    Founda-


    tion in 2006\. EclipseLink is the JPA reference implementation and is the persistence
    framework used in this book. It is also referred to as the *persistence provider*,
    or simply the *provider*.


