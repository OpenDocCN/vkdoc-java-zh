- fmt: "# Listener Classes and Callback Methods\n\nOnly simple rules apply to a listener\
    \ class. The first is that the class must have a public no-arg constructor. Second,\
    \ the signatures of the callback methods are slightly different from the ones\
    \ in Listing 5-1. When the callback method is invoked on a listener, the method\
    \ needs to have access to the entity state (e.g., the customer’s first name and\
    \ last name, which need to be validated). The methods must have a parameter of\
    \ a type that is compatible with the entity type as the entity related to the\
    \ event is being passed into the callback. A callback method defined on an entity\
    \ has the following signature with no parameter:\n\n`void <METHOD>();`\n\nCallback\
    \ methods defined on an entity listener can have two different types of signatures.\n\
    \nIf the method has to be used on several entities, it must have an `Object` argument:\n\
    \n`void <METHOD>(Object anyEntity)`\n\nIf it is only for one entity or its subclasses\
    \ (when there’s inheritance), the parameter can be of the entity type:\n\n`void\
    \ <METHOD>(Customer customerOrSubclasses)`\n\nTo designate that these two listeners\
    \ are notified of life-cycle events on the `Customer` entity, you need to use\
    \ the `@EntityListeners` annotation (see Listing 5-4). This annotation can take\
    \ one entity listener as a parameter or an array of listeners. When several listeners\
    \ are defined and the life-cycle event occurs, the persistence provider iterates\
    \ through each listener in the order in which they are listed and will invoke\
    \ the callback method, passing a reference of the entity to which the event applies.\
    \ It will then invoke the callback methods on the entity itself (if there are\
    \ any).\n\n**Listing 5-4.** *The Customer Entity Defining Two Listeners*\n\n```\n\
    @EntityListeners({DataValidationListener.class,\nAgeCalculationListener.class})\n\
    @Entity\npublic class Customer {\n    @Id @GeneratedValue\n    private Long id;\n\
    \    private String firstName;\n    private String lastName;\n    private String\
    \ email;\n    private String phoneNumber;\n    @Temporal(TemporalType.DATE)\n\
    \    private Date dateOfBirth;\n    @Transient\n    private Integer age;\n   \
    \ @Temporal(TemporalType.TIMESTAMP)\n    private Date creationDate;\n    // Constructors,\
    \ getters, setters\n}\n```\n\nThe result of this code is exactly the same as that\
    \ of the previous example (shown earlier in Listing 5-1). The `Customer` entity\
    \ validates its data before an insert or an update using the `DataValidationListener.validate()`\
    \ method and calculates its age with the listener’s `AgeValidationListener.calculateAge()`\
    \ method.\n\nThe rules that an entity listener’s methods have to follow are similar\
    \ to the entity callback methods except for a few details:\n\n- Only unchecked\
    \ exceptions can be thrown. This causes the remaining listeners and callback methods\
    \ to not be invoked and the transaction to be rolled back if one exists.\n- In\
    \ an inheritance hierarchy, if multiple entities define listeners, the listeners\
    \ defined on the superclass are invoked before the listeners defined on the subclasses.\
    \ If an entity doesn’t want to inherit the superclass listeners, it can explicitly\
    \ exclude them by using the `@ExcludeSuperclassListeners` annotation (or its XML\
    \ equivalent).\n\nIn Listing 5-4, you saw a `Customer` entity defining two listeners,\
    \ but a listener can also be defined by more than one entity. This can be useful\
    \ in cases where the listener provides more general logic that many entities can\
    \ benefit from. For example, you could create a debug listener that displays the\
    \ name of the triggered events, as shown in Listing 5-5.\n\n**Listing 5-5.** *A\
    \ Debug Listener Usable by Any Entity*\n\n```\npublic class DebugListener {\n\
    \    @PrePersist\n    void prePersist(Object object) {\n        System.out.println(\"\
    prePersist\");\n    }\n    @PostPersist\n    void postPersist(Object object) {\n\
    \        System.out.println(\"postPersist\");\n    }\n    @PreUpdate\n    void\
    \ preUpdate(Object object) {\n        System.out.println(\"preUpdate\");\n   \
    \ }\n    @PostUpdate\n    void postUpdate(Object object) {\n        System.out.println(\"\
    postUpdate\");\n    }\n    @PreRemove\n    void preRemove(Object object) {\n \
    \       System.out.println(\"preRemove\");\n    }\n    @PostRemove\n    void postRemove(Object\
    \ object) {\n        System.out.println(\"postRemove\");\n    }\n    @PostLoad\n\
    \    void postLoad(Object object) {\n        System.out.println(\"postLoad\");\n\
    \    }\n}\n```\n\nNote that each method takes an `Object` as a parameter, meaning\
    \ that any type of entity could use this listener by adding the `DebugListener`\
    \ class to its `@EntityListeners` annotation.\n\nTo have every single entity of\
    \ your application use this listener, you would have to go through each one and\
    \ add it manually to the annotation. For this case, JPA has a notion of default\
    \ listeners that can cover all entities in a persistence unit. As there is no\
    \ annotation targeted for the entire scope of the persistence unit, the default\
    \ listeners can only be declared in an XML mapping file.\n\nIn Chapter 3, you\
    \ saw how to use XML mapping files instead of annotations. The same steps have\
    \ to be followed to define the `DebugListener` as a default listener. A mapping\
    \ file with the XML defined in Listing 5-6 needs to be created and deployed with\
    \ the application.\n\n**Listing 5-6.** *A Debug Listener Defined As the Default\
    \ Listener*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<entity-mappings\
    \ xmlns=\"http://java.sun.com/xml/ns/persistence/orm\"\n                 version=\"\
    2.0\">\n    <persistence-unit-metadata>\n        <persistence-unit-defaults>\n\
    \            <entity-listeners>\n                <entity-listener class=\"com.apress.javaee6.DebugListener\"\
    />\n            </entity-listeners>\n        </persistence-unit-defaults>\n  \
    \  </persistence-unit-metadata>\n</entity-mappings>\n```\n\nIn this file, the\
    \ `<persistence-unit-metadata>` tag is used to define all the metadata that doesn’t\
    \ have any annotation equivalent. The `<persistence-unit-defaults>` tag defines\
    \ all the defaults of the persistence unit, and the `<entity-listener>` tag is\
    \ where the default listener is defined. This file needs to be referred in the\
    \ `persistence.xml` and deployed with the application. The `DebugListener` will\
    \ then be automatically invoked for every single entity.\n\nWhen a list of default\
    \ entity listeners is declared, each listener gets called in the order in which\
    \ it is listed in the XML mapping file. Default entity listeners always get invoked\
    \ before any of the entity listeners listed in the `@EntityListeners` annotation.\
    \ If an entity doesn’t want to have the default entity listeners applied to it,\
    \ it can use the `@ExcludeDefaultListeners` annotation, as shown in Listing 5-7.\n\
    \n**Listing 5-7.** *The Customer Entity Excluding Default Listeners*\n\n```\n\
    @ExcludeDefaultListeners\n@Entity\npublic class Customer {\n    @Id @GeneratedValue\n\
    \    private Long id;\n    private String firstName;\n    private String lastName;\n\
    \    private String email;\n    private String phoneNumber;\n    @Temporal(TemporalType.DATE)\n\
    \    private Date dateOfBirth;\n    @Transient\n    private Integer age;\n   \
    \ @Temporal(TemporalType.TIMESTAMP)\n    private Date creationDate;\n    // Constructors,\
    \ getters, setters\n}\n```\n\n## Summary\n\nThis chapter described the entity\
    \ life cycle and how the entity manager catches events to invoke callback methods.\
    \ Callback methods can be defined on a single entity and annotated by several\
    \ annotations (`@PrePersist`, `@PostPersist`, etc.). The method can also be extracted\
    \ to listener classes and used by several or all entities (using default entity\
    \ listeners). With callback methods, you see that entities are not just anemic\
    \ objects (objects with no business logic, just attributes, getters, and setters);\
    \ entities can have business logic that can be invoked by other objects in the\
    \ application, or invoked automatically by the entity manager, depending on the\
    \ life cycle of the entity. Other Java EE 6 components, such as EJBs, also use\
    \ these kinds of interceptors.\n\n# Enterprise Java Beans"
