    \n`@MessageDriven`\n\nMDB是最容易开发的EJB之一，因为它们支持的注解数量最少。`@MessageDriven`注解（或XML等效项）是必需的，因为它是容器识别Java类实际上是MDB所需的元数据片段。\n\
    \n`@MessageDriven`注解的API（如清单13-9所示）非常简单，所有元素都是可选的。\n\n**清单13-9.** `@MessageDriven`注解API\n\
    \n```java\n@Target(TYPE) @Retention(RUNTIME)\npublic @interface MessageDriven\
