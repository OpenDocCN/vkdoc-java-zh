    **运行示例**


    MDB 已部署在 GlassFish 上，并正在监听 `jms/javaee6/Queue` 目标，等待消息到达。现在可以运行 OrderSender 客户端了。这是一个独立应用程序，在
    GlassFish 外部执行，但需要向其中注入资源（连接工厂和队列）。可以使用 ACC 来执行它。ACC 会封装一个 jar 文件，并使其能够访问应用服务器资源。要执行
    ACC，请使用 GlassFish 自带的 appclient 工具，并将 jar 文件作为参数传入，同时传入我们应用程序的参数（订单金额）。输入以下命令发送一笔
    2000 美元的订单消息：


    appclient -client chapter13-Sender-1.0.jar **2000**


    由于金额大于 1000 美元（选择器中定义的金额），OrderMDB 应接收并打印该消息。检查 GlassFish 日志以确认。如果传入的参数低于 1000
    美元，MDB 将不会接收该消息。


    appclient -client chapter13-Sender-1.0.jar **500**


    **总结**


    本章展示了与消息系统的集成是一种组件之间松散耦合、异步的通信形式。MOM 可以看作是系统之间的缓冲区，这些系统需要


    按照自己的节奏生产和消费消息。这与 RPC 架构（如 RMI）不同，在 RPC 架构中，客户端需要了解可用服务的方法。


    本章的第一部分重点介绍了 JMS API 及其术语。异步模型是一个非常强大的 API，可以在 Java SE 或 Java EE 环境中使用，它基于 P2P
    和发布-订阅、连接工厂、目标、连接、会话、不同类型的消息（文本、对象、映射、流、字节）及其头部、属性和正文、选择器，以及其他可靠性机制（如确认或持久性）。


    Java EE 有一个专门用于消费消息的企业组件：MDB。本章的


    第二部分展示了 MDB 如何作为异步消费者使用，以及它们如何依赖容器来处理多项服务（生命周期、拦截器、事务、安全性、并发性、消息确认等）。


    本节还展示了如何将这些组件与 Maven、GlassFish 和 OpenMQ 整合在一起，并给出了一个独立发送者和 MDB 接收者的示例。


    接下来的章节将演示用于与外部系统互操作的其他技术：Web 服务和 RESTful 服务。


    第 14 章


    SOAP Web 服务


    **曾**几何时，面向服务架构（SOA）被视为一个流行词，如今它已成为日常架构生活的一部分。然而，有时它会与 Web 服务混淆。SOA 是一种主要基于面向服务应用程序的架构，可以通过不同的技术（如
    Web 服务）来实现。


    Web 服务被认为是“松散耦合”的，因为 Web 服务的客户端无需了解其实现细节（例如开发所用的语言或方法签名）。消费者能够通过一个自解释的接口来调用 Web
    服务，该接口描述了可用的业务方法（参数和返回值）。底层


    实现可以用任何语言完成（Visual Basic、C#、C、C++、Java 等）。'
- fmt: '# Web Services Overview


    A consumer and a service will still be able to exchange data in a loosely coupled
    way: using XML documents. A consumer sends a request to a web service in the form
    of an XML document, and, optionally, receives a reply, also in XML.


    Web services are also about distribution. Distributed software has been around
    for a long time, but unlike existing distributed systems, web services are adapted
    to the Web. The default network protocol is HTTP, a well-known and robust stateless
    protocol.


    Web services are everywhere, and they can run on desktops or be used for business-to-business
    (B2B) integration so that operations that previously required manual intervention
    are performed automatically. Web services integrate applications run by various
    organizations through the Internet or within the same company (which is known
    as Enterprise Application Integration, or EAI). In all cases, web services provide
    a standard way to connect diverse pieces of software.


    ## Understanding Web Services


    Simply put, web services constitute a kind of business logic exposed via a service
    interface to a client application (i.e., a service consumer). However, unlike
    objects or EJBs, web services provide a loosely coupled interface using XML. Web
    service standards specify that the interface to which a message is sent should
    define the format of the message request and response, and mechanisms to publish
    and to discover web service interfaces (a registry).


    In the Figure 14-1, you can see a high-level picture of a web service interaction.
    The web service can optionally register its interface into a registry (UDDI) so
    a consumer can discover it. Once the consumer knows the interface of the service
    and the message format, it can send a request and receive a response.


    ![Image 123](index-424_1.jpg)


    **Chapter 14 ■ SOAP Web Services**


    **Figure 14-1.** *The consumer discovers the service through a registry.*


    Web services require several technologies and protocols to transport and to transform
    data from a consumer to a service in a standard way. The ones that you will come
    across more often are the following:


    - **Universal Description Discovery, and Integration (UDDI)** is a registry and
    discovery mechanism, similar to the Yellow Pages, that is used for storing and
    categorizing web services interfaces.

    - **Web Services Description Language (WSDL)** defines the web service interface,
    data and message types, interactions, and protocols.

    - **Simple Object Access Protocol (SOAP)** is a message-encoding protocol based
    on XML technologies, defining an envelope for web services communication.

    - Messages are exchanged using a transport protocol. Although **Hypertext Transfer
    Protocol (HTTP)** is the most widely adopted transport protocol, others such as
    SMTP or JMS can also be used.

    - **Extensible Markup Language (XML)** is the basic foundation on which web services
    are built and defined (SOAP, WSDL, and UDDI).


    With these standard technologies, web services provide almost unlimited potential.
    Clients can call a web service, which can be mapped to any program and accommodate
    any data type and structure to exchange messages through XML.


    ## UDDI


    Programs that interact with one another over the Web need to be able to find information
    that allows them to interconnect. UDDI provides this standard approach of locating
    information about a web service and how to invoke it.


    UDDI is an XML-based registry of web services, similar to a Yellow Pages directory,
    where businesses can register their services. This registration includes the business
    type, geographical location, web site, phone number, and so on. Other businesses
    can then search the registry and discover information about specific web services.
    This information provides additional metadata about the service, describing its
    behavior and the actual location of the web service.


    It is in the form of a WSDL document. The client can then consume the WSDL document,
    which provides the information to bind and invoke the service.


    ![Image 124](index-425_1.jpg)


    **Chapter 14 ■ SOAP Web Services**


    ## WSDL


    The UDDI registry points to a public WSDL file available on the Internet that
    can be downloaded by potential consumers. WSDL is the interface definition language
    (IDL) that defines the interactions between consumers and web services (see Figure
    14-2). It is central to a web service as it describes the message type, port,
    communication protocol, supported operations, location, and what the client should
    expect in return. It defines the contract to which the web service guarantees
    it will conform. You can think of WSDL as a Java interface but written in XML.


    **Figure 14-2.** *WSDL interface between the consumer and the web service*


    To ensure interoperability, a standard web service interface is needed for a consumer
    and a producer to share and understand a message. That’s the role of WSDL. SOAP
    defines the way in which the message will be sent from one computer to another.


    ## SOAP


    SOAP is the standard web services application protocol. It provides the communication
    mechanism to connect web services exchanging formatted XML data across a network
    protocol, commonly HTTP. Like WSDL, SOAP heavily relies on XML because a SOAP
    message is an XML document containing several elements (an envelope, a header,
    a body, etc.).


    SOAP is designed to provide an independent, abstract communication protocol capable
    of connecting distributed services. The connected services can be built using
    any combination of hardware and software that supports a given transport protocol.


    ## Transport Protocol


    For a consumer to communicate with a web service, a way to send messages to each
    other is needed. SOAP messages can be transported over a network using a protocol
    that both parties can support. Given that web services are used mostly on the
    Web, they usually use HTTP, but they can also use other network protocols such
    as HTTPS (Secure HTTP), TCP/IP, SMTP (Simple Mail Transport Protocol), FTP (File
    Transfer Protocol), and so on.


    ## XML


    XML is used in the Java EE platform for deployment descriptors, metadata information,
    and so on. For web services, XML is also used as an integration technology that
    solves the problem of data independence and interoperability. It is used not only
    as the message format, but also as the way the services are defined (WSDL) or
    exchanged (SOAP). Associated with these XML documents, schemas are used to validate
    exchanged data.


    ## Web Services Specification Overview


    Persistence is mostly covered by one specification: JPA. For web services, the
    situation is more complex, as you have to deal with many specifications from different
    standards bodies. Moreover, because web services are used by other programming
    languages, these specifications are not all directly related to the Java Community
    Process (JCP).


    ### A Brief History of Web Services


    Web services are a standard way for businesses to communicate over a network,
    and there were precursors before them: Common Object Request Broker Architecture
    (CORBA), initially used by Unix systems, and Distributed Component Object Model
    (DCOM), its Microsoft competitor. On a lower level, there is Remote Procedure
    Call (RPC) and closer to our Java world, Remote Method Invocation (RMI).


    Before the Web, it was difficult to get all major software vendors to agree on
    a transport protocol. When the HTTP protocol became a mature standard, it gradually
    became a universal business medium of communication. At about the same time, XML
    officially became a standard when the World Wide Web Consortium (W3C) announced
    that XML 1.0 was suitable for deployment in applications. By 1998, both ingredients,
    HTTP and XML, were ready to work together.'
