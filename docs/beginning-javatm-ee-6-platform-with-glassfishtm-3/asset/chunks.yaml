- fmt: "在前面的示例中，`Item`实体是具体的。它使用`@Entity`注解，并且没有`abstract`关键字，但抽象类也可以被指定为实体。抽象实体与具体实体的区别仅在于它不能直接使用`new`关键字实例化。它为叶子实体（`Book`和`CD`）提供公共数据结构，并遵循映射策略。对于持久化提供者来说，抽象实体被映射为一个实体。唯一的区别在于Java层面，而不是映射层面。\n\
    \n### 非实体\n\n非实体也称为瞬态类，意味着它们是POJO。一个实体可以继承一个非实体，也可以被一个非实体扩展。为什么要在层次结构中包含非实体呢？\n\
    \n对象建模和继承是共享状态和行为的手段。\n\n非实体可用于为叶子实体提供公共数据结构。非实体超类的状态不是持久的，因为它不受持久化提供者管理（请记住，类受持久化提供者管理的条件是存在`@Entity`注解）。\n\
    \n例如，`Book`是一个实体，如清单3-68所示，它继承自一个非实体`Item`（`Item`没有任何注解）。\n\n**清单3-68.** `Item`是一个没有`@Entity`的简单POJO\n\
    \n```\npublic class Item {\n\n    protected String title;\n\n    protected Float\
    \ price;\n\n    protected String description;\n\n    // 构造方法、getter、setter\n\n\
    }\n```\n\n如清单3-69所示的`Book`实体继承自`Item`，因此Java代码可以以正常的面向对象方式访问`title`、`price`和`description`属性，以及任何其他定义的方法。`Item`可以是具体的或抽象的，并且对最终的映射没有影响。\n\
    \n**清单3-69.** `Book`实体继承自一个POJO\n\n```\n@Entity\npublic class Book extends Item\
    \ {\n\n    @Id @GeneratedValue\n    private Long id;\n\n    private String isbn;\n\
    \n    private String publisher;\n\n    private Integer nbOfPage;\n\n    private\
    \ Boolean illustrations;\n\n    // 构造方法、getter、setter\n\n}\n```\n\n`Book`是一个实体并继承自`Item`。但只有`Book`的属性会被映射到表中。`Item`的任何属性都不会出现在清单3-70定义的表结构中。要持久化一个`Book`，你需要创建一个`Book`实例，为任何你想要的属性（`title`、`price`、`isbn`、`publisher`等）设置值，但只有`Book`的属性（`id`、`isbn`等）会被持久化。\n\
    \n**清单3-70.** `BOOK`表没有来自`Item`的属性\n\n```\ncreate table BOOK (\n    ID BIGINT\
    \ not null,\n    ILLUSTRATIONS SMALLINT,\n    ISBN VARCHAR(255),\n    NBOFPAGE\
    \ INTEGER,\n    PUBLISHER VARCHAR(255),\n    primary key (ID)\n);\n```\n\n###\
    \ 映射超类\n\nJPA定义了一种特殊的类，称为*映射超类*，用于共享状态和行为，以及实体继承的映射信息。然而，映射超类不是实体。它们不受持久化提供者管理，没有要映射的表，不能被查询或成为关系的一部分，但它们可以为任何扩展它们的实体提供持久化属性。它们类似于可嵌入类，但可以与继承一起使用。通过使用`@MappedSuperclass`注解来指示一个类是映射超类。\n\
    \n使用根类`Item`，如清单3-71所示，它使用`@MappedSuperclass`注解，而不是`@Entity`。它定义了一个继承策略（`JOINED`），并用`@Column`注解了它的一些属性，但由于映射超类不映射到表，因此不允许使用`@Table`注解。\n\
    \n**清单3-71.** `Item`是一个映射超类\n\n```\n@MappedSuperclass\n@Inheritance(strategy =\
    \ InheritanceType.JOINED)\npublic class Item {\n\n    @Id @GeneratedValue\n  \
    \  protected Long id;\n\n    @Column(length = 50, nullable = false)\n    protected\
    \ String title;\n\n    protected Float price;\n\n    @Column(length = 2000)\n\
    \    protected String description;\n\n    // 构造方法、getter、setter\n\n}\n```"
  raw: 'In the previous examples, the Item entity was concrete. It was annotated with
    @Entity and didn’t have an abstract keyword, but an abstract class can also be
    specified as an entity. An abstract entity differs from a concrete entity only
    in that it cannot be directly instantiated with the new keyword. It provides a
    common data structure for its leaf entities (Book and CD) and follows the mapping
    strategies. For the persistence provider, an abstract entity is mapped as an entity.
    The only difference is in the Java space, not in the mapping.


    Nonentity


    Nonentities are also called transient classes, meaning they are POJOs. An entity
    may subclass a nonentity or may be extended by a nonentity. Why would you have
    nonentities in a hierarchy?


    Object modeling and inheritance are the means through which state and behavior
    are shared.


    Nonentities can be used to provide a common data structure to leaf entities. The
    state of a nonentity superclass is not persistent because it is not managed by
    the persistence provider (remember that the condition for a class to be managed
    by the persistence provider is the presence of an @Entity annotation).


    For example, Book is an entity and, as shown in Listing 3-68, extends from an
    Item nonentity (Item doesn’t have any annotation).


    **Listing 3-68.** *Item Is a Simple POJO with No @Entity*


    public class Item {


    protected String title;


    protected Float price;


    protected String description;


    // Constructors, getters, setters


    }


    The Book entity, shown in Listing 3-69, inherits from Item, so the Java code can
    access the title, price, and description attributes, plus any other method that
    is defined, in a normal, object-oriented way. Item can be concrete or abstract
    and does not have any impact on the final mapping.


    **Listing 3-69.** *The Book Entity Extends from a POJO*


    @Entity


    public class Book extends Item {


    Chapter 3 ■ OBJeCt-reLatIONaL MappING


    **115**


    @Id @GeneratedValue


    private Long id;


    private String isbn;


    private String publisher;


    private Integer nbOfPage;


    private Boolean illustrations;


    // Constructors, getters, setters


    }


    Book is an entity and extends Item. But only the attributes of Book would be mapped
    to a table. No attributes from Item appear in the table structure defined in Listing
    3-70\. To persist a Book, you need to create an instance of Book, set values to
    any attributes you want (title, price, isbn, publisher, etc.), but only the Book’s
    attributes (id, isbn, etc.) will get persisted.


    **Listing 3-70.** *The BOOK Table Has No Attributes from Item*


    create table **BOOK** (


    ID BIGINT not null,


    ILLUSTRATIONS SMALLINT,


    ISBN VARCHAR(255),


    NBOFPAGE INTEGER,


    PUBLISHER VARCHAR(255),


    primary key (ID)


    );


    Mapped Superclass


    JPA defines a special kind of class, called a *mapped superclass*, to share state
    and behavior, as well as mapping information entities inherit from. However, mapped
    superclasses are


    not entities. They are not managed by the persistence provider, do not have any
    table to be mapped to, and cannot be queried or be part of a relationship, but
    they may provide persistent properties to any entities that extend it. They are
    similar to embeddable classes except they can be used with inheritance. A class
    is indicated as being a mapped superclass by annotating it with the @MappedSuperclass
    annotation.


    Using the root class, Item is annotated with @MappedSuperclass, not @Entity, as
    shown in Listing 3-71\. It defines an inheritance strategy (JOINED) and annotates
    some of its attributes with @Column, but because mapped superclasses are not mapped
    to tables, the @Table annotation is not permitted.


    **Listing 3-71.** *Item Is a Mapped Superclass*


    **@MappedSuperclass**


    @Inheritance(strategy = InheritanceType.JOINED)


    public class Item {


    @Id @GeneratedValue


    protected Long id;


    **116**


