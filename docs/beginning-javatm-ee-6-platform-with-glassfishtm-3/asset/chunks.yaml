    • @Lock(LockType.WRITE)：与独占锁关联的方法在方法处理完成之前，不允许并发调用。例如，如果客户端 C1 调用了一个带有独占锁的方法，那么客户端
    C2 将无法调用该方法，直到 C1 完成。


    • @Lock(LockType.READ)：与共享锁关联的方法允许任意数量的其他并发调用访问 Bean 实例。例如，两个客户端 C1 和 C2 可以同时访问一个带有共享锁的方法。


    @Lock 注解可以指定在类上、方法上，或两者都指定。指定在类上意味着它适用于所有方法。如果未指定并发锁定属性，则默认假定为 @Lock(WRITE)。清单
    7-6 中的代码展示了 CacheEJB 在 Bean 类上使用了 READ 锁。这意味着所有方法都将具有 READ 并发级别，但 getFromCache()
    方法被覆盖为 WRITE。


