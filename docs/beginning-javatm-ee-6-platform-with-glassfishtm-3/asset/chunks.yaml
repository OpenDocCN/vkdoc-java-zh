    </web-app>


    第 15 章 ■ RESTful Web 服务


    **459**


    部署描述符将请求映射到 /rs/* URL 模式。这意味着每当 URL 以 /rs/ 开头时，它都将由 Jersey 处理。事实上，在我使用 cURL 的示例中，所有资源
    URL 都以 /rs 开头：


    curl -X GET -H "Accept: application/json" ➥


    [`localhost:8080/chapter15-resource-1.0/**rs**/books`](http://localhost:8080/chapter15-resource-1.0/rs/books)


    [curl -X DELETE http://localhost:8080/chapter15-resource-1.0/**rs**/books/61](http://localhost:8080/chapter15-resource-1.0/rs/books/61)


    **使用 Maven 编译和打包**


    Web 应用程序需要被编译并打包成一个 war 文件（<packaging>war</packaging>）。清单 15-16 中的 pom.xml 声明了编译代码所需的所有依赖项（jsr311-api、javax.ejb
    和 javax.persistence）。请记住，JAXB 是 Java SE 的一部分，因此我们不需要添加此依赖项。


    **清单 15-16.** *用于编译和打包 Web 应用程序的 Maven pom.xml 文件*


    <?xml version="1.0" encoding="UTF-8"?>


    [<project](http://maven.apache.org/POM/4.0.0) ➥


    ➥


    [xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 ➥](http://maven.apache.org/POM/4.0.0%E2%9E%A5)


    [`maven.apache.org/xsd/maven-4.0.0.xsd">`](http://maven.apache.org/POM/4.0.0%E2%9E%A5)


    <modelVersion>4.0.0</modelVersion>


    <groupId>com.apress.javaee6</groupId>


    <artifactId>chapter15-resource</artifactId>


    <packaging> **war**</packaging>


    <version>1.0</version>


    <name>Chapter 15 - REST Resource</name>


    <parent>


    <groupId>com.apress.javaee6</groupId>


    <artifactId>chapters</artifactId>


    <version>1.0</version>


    </parent>


    <dependency>


    <groupId>javax.ws.rs</groupId>


    <artifactId> **jsr311-api**</artifactId>


    <version>1.1</version>


    <scope>provided</scope>


    </dependency>


    <dependency>


    <groupId>org.glassfish</groupId>


    <artifactId> **javax.ejb**</artifactId>


    <version3.0</version>


    <scope>provided</scope>


    </dependency>


    **460**


    第 15 章 ■ RESTful Web 服务


    <dependency>


    <groupId>org.eclipse.persistence</groupId>


    <artifactId> **javax.persistence**</artifactId>


    <version>1.1</version>


    <scope>provided</scope>


    </dependency>


    </dependencies>


    <build>


    <plugins>


    <plugin>


    <groupId>org.apache.maven.plugins</groupId>


    <artifactId>maven-compiler-plugin</artifactId>


    <inherited>true</inherited>


    <configuration>


    <source> **1.6**</source>


    <target>1.6</target>


    </configuration>


    </plugin>


    </plugins>


    </build>


    </project>


    要编译和打包这些类，请在包含 pom.xml 文件的根目录中打开 DOS 命令行，并输入以下 Maven 命令：


    mvn package


    转到 target 目录，查找名为 chapter15-resource-1.0.war 的文件并打开它。请注意，Book.class 和 BookResource.class
    都位于 WEB-INF\classes 目录下。web.xml 和 persistence.xml 文件也打包在 war 文件中。


    **在 GlassFish 上部署**


    代码打包完成后，确保 GlassFish 和 Derby 已启动并正在运行，然后进行部署。

