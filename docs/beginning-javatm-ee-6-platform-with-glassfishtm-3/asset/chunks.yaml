    **Session Bean Model**


    So far you’ve seen examples of code using the easiest programming model for session
    beans: an annotated POJO with no interface. But depending on your needs, session
    beans can give you a much richer model, allowing you to perform remote calls,
    dependency injection, or asynchronous calls.


    Interfaces and Bean Class


    Until now you’ve seen session beans composed only of a bean class. In fact, they
    can be richer and made of the following elements:


    • *Business interfaces*: These interfaces contain the declaration of business
    methods that are visible to the client and implemented by the bean class. A session
    bean can have


    local interfaces, remote interfaces, or no interface at all (a no-interface view
    with local access only).


    • *A bean class*: The bean class contains the business method implementation and
    can implement zero or several business interfaces. The session bean must be annotated


    with @Stateless, @Stateful, or @Singleton depending on its type.


    As shown in Figure 7-5, a client application can access a session bean by one
    of its interfaces (local or remote) or directly by invoking the bean class itself.


