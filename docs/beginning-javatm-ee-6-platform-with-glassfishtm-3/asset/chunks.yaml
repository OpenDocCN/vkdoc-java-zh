    ## Merging an entity


    A detached entity is no longer associated with a persistence context. If you want
    to manage it, you need to merge it. Let’s take the example of an entity that needs
    to be displayed in a JSF page. The entity is first loaded from the database in
    the persistent layer (it is managed), it is returned from an invocation of a local
    EJB (it is detached because the transaction context ends), the presentation layer
    displays it (it is still detached), and then it returns to be updated to the database.
    However, at that moment the entity is detached and needs to be attached again,
    or merged, to synchronize its state with the database.


    Listing 4-17 simulates this case by clearing the persistence context (`em.clear()`),
    which detaches the entity.


    **Listing 4-17.** *Clearing the Persistence Context*


    ```

    Customer customer = new Customer("Antony", "Balla", "tballa@mail.com");

    tx.begin();

    em.persist(customer);

    tx.commit();

    em.clear();

    // Sets a new value to a detached entity

    customer.setFirstName("William");

    tx.begin();

    em.merge(customer);

    tx.commit();

    ```


    In Listing 4-17, a customer is created and persisted. The call to `em.clear()`
    forces the detachment of the customer entity, but detached entities continue to
    live outside of the persistence context in which they were, and their state is
    no longer guaranteed to be synchronized with the database state. That’s what happens
    with `customer.setFirstName("William");` set is executed on a detached entity,
    and the data is not updated in the database. To replicate this change to the database,
    you need to reattach the entity (i.e., merge it) with `em.merge(customer)`.


    ## Updating an entity


    Updating an entity is simple, yet at the same time it can be confusing to understand.
    As you’ve just seen, you can use the `EntityManager.merge()` to attach an entity
    and synchronize its state with the database. But if an entity is currently managed,
    changes to it will be reflected in the database automatically. If not, you will
    need to explicitly call `merge()`.


    Listing 4-18 demonstrates persisting a customer with a first name set to Antony.
    When the `em.persist()` method is called, the entity is managed, so any changes
    made to the entity will be synchronized with the database. When the `setFirstName()`
    method is called, the entity changes its state. The entity manager caches any
    action starting at `tx.begin()` and synchronizes them when committed.


