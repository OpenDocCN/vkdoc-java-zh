- fmt: "# Composite Primary Keys and Embeddables\n\nIn the section “Composite Primary\
    \ Keys” earlier in the chapter, you quickly saw how a class could be embedded\
    \ and used as a primary key with the `@EmbeddedId` annotation. Embeddables are\
    \ objects that don’t have a persistent identity on their own; they can be embedded\
    \ only within owning entities. The owning entity can have collections of embeddables\
    \ as well as a single embeddable attribute. They are stored as an intrinsic part\
    \ of an owning entity and share the identity of this entity. This means each attribute\
    \ of the embedded object is mapped to the table of the entity. It is a strict\
    \ ownership relationship (a.k.a. composition), so that if the entity is removed,\
    \ the embedded object is also.\n\nThis composition between two classes uses annotations.\
    \ The included class uses the `@Embeddable` annotation, whereas the entity that\
    \ includes the class uses `@Embedded`. Let’s take the example of a customer that\
    \ has an identifier, a name, an e-mail address, and an address.\n\nAll these attributes\
    \ could be in a `Customer` entity (see Listing 3-34 a little later in the chapter),\
    \ but for object-modeling reasons, they are split into two classes: `Customer`\
    \ and `Address`. Because `Address` has no identity of its own, but is merely part\
    \ of the `Customer` state, it is a good candidate to become an embeddable object\
    \ instead of an entity (see Listing 3-33).\n\n**Listing 3-33.** *The Address Class\
    \ Is an Embeddable*\n\n```\n@Embeddable\npublic class Address {\n    private String\
    \ street1;\n    private String street2;\n    private String city;\n    private\
    \ String state;\n    private String zipcode;\n    private String country;\n  \
    \  // Constructors, getters, setters\n}\n```\n\nAs you can see in Listing 3-33,\
    \ the `Address` class is not annotated as being an entity but as an embeddable.\
    \ The `@Embeddable` annotation specifies that `Address` can be embedded in another\
    \ entity class (or another embeddable). On the other side of the composition,\
    \ the `Customer` entity has to use the `@Embedded` annotation to specify that\
    \ `Address` is a persistent attribute that will be stored as an intrinsic part\
    \ and share its identity (see Listing 3-34).\n\n**Listing 3-34.** *The Customer\
    \ Entity Embedding an Address*\n\n```\n@Entity\npublic class Customer {\n    @Id\
    \ @GeneratedValue\n    private Long id;\n    private String firstName;\n    private\
    \ String lastName;\n    private String email;\n    private String phoneNumber;\n\
    \    @Embedded\n    private Address address;\n    // Constructors, getters, setters\n\
    }\n```\n\nEach attribute of `Address` is mapped to the table of the owning entity\
    \ `Customer`. There will only be one table with the structure defined in Listing\
    \ 3-35. As you’ll see later in the section “Composite Primary Keys,” entities\
    \ can override the attributes of embeddables (using the `@AttributeOverrides`\
    \ annotation).\n\n**Listing 3-35.** *Structure of the CUSTOMER Table with All\
    \ the Address Attributes*\n\n```\ncreate table CUSTOMER (\n    ID BIGINT not null,\n\
    \    LASTNAME VARCHAR(255),\n    PHONENUMBER VARCHAR(255),\n    EMAIL VARCHAR(255),\n\
    \    FIRSTNAME VARCHAR(255),\n    STREET2 VARCHAR(255),\n    STREET1 VARCHAR(255),\n\
    \    ZIPCODE VARCHAR(255),\n    STATE VARCHAR(255),\n    COUNTRY VARCHAR(255),\n\
    \    CITY VARCHAR(255),\n    primary key (ID)\n);\n```\n\n## Access Type of an\
    \ Embeddable Class\n\nThe access type of an embeddable class is determined by\
    \ the access type of the entity class in which it exists. If the entity explicitly\
    \ uses a property access type, an embeddable object will implicitly use property\
    \ access as well. A different access type for an embeddable class can be specified\
    \ by means of the `@Access` annotation.\n\nThe `Customer` entity (see Listing\
    \ 3-36) and `Address` entity (see Listing 3-37) use different access types.\n\n\
    **Listing 3-36.** *The Customer Entity with Field Access Type*\n\n```\n@Entity\n\
    @Access(AccessType.FIELD)\npublic class Customer {\n    @Id @GeneratedValue\n\
    \    private Long id;\n    @Column(name = \"first_name\", nullable = false, length\
    \ = 50)\n    private String firstName;\n    @Column(name = \"last_name\", nullable\
    \ = false, length = 50)\n    private String lastName;\n    private String email;\n\
    \    @Column(name = \"phone_number\", length = 15)\n    private String phoneNumber;\n\
    }\n```"
