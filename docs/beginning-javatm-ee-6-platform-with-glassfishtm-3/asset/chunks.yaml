- fmt: "# Managed Beans in JSF\n\nManaged beans perform business logic (or delegate\
    \ to EJBs, for example), handle navigation between pages, and hold data. A typical\
    \ JSF application includes one or more managed beans that can be shared by several\
    \ pages.\n\nThe data is held within attributes of the managed bean, also called\
    \ a backing bean. A backing bean defines the data that a UI component is bound\
    \ to (the target of a form, for example). To bind components to a backing bean,\
    \ you need to use the expression language.\n\n## How to Write a Managed Bean\n\
    \nWriting a managed bean is as easy as writing an EJB or a JPA entity; it’s simply\
    \ a Java class annotated with `@ManagedBean` (see Listing 12-3). There are no\
    \ `faces-config.xml` entries, no helper classes, nor inheritance. JSF 2.0 also\
    \ uses the configuration-by-exception mechanism, whereby with only one annotation,\
    \ you can use all defaults and deploy your web application with such a managed\
    \ bean.\n\n**Listing 12-3.** *A Simple Managed Bean*\n\n```java\n@ManagedBean\n\
    public class BookController {\n    private Book book = new Book();\n    \n   \
    \ public String doCreateBook() {\n        createBook(book);\n        return \"\
    listBooks.xhtml\";\n    }\n    // Constructors, getters, setters\n}\n```\n\nListing\
    \ 12-3 shows the programming model of a managed bean: it holds state (the `book`\
    \ attribute), defines action methods (`doCreateBook()`) that are referenced in\
    \ a page, and handles navigation (return `\"listBooks.xhtml\"`).\n\n## Managed\
    \ Bean Model\n\nManaged beans are Java classes that are managed by the `FacesServlet`.\
    \ The UI components are bound to the managed bean’s properties (or backing bean)\
    \ and can invoke action methods. A managed bean needs to follow these requirements:\n\
    \n- The class must be annotated with `@javax.faces.model.ManagedBean` or the XML\
    \ equivalent in the `faces-config.xml` deployment descriptor.\n- The class must\
    \ have a scope (which defaults to `@RequestScoped`).\n- The class must be defined\
    \ as `public`; it must not be `final` or `abstract`.\n- The class must have a\
    \ public no-arg constructor that the container will use to create instances.\n\
    - The class must not define the `finalize()` method.\n- Attributes must have public\
    \ getters and setters to be bound to a component.\n\nFollowing the ease-of-use\
    \ model of Java EE 6, a managed bean can simply be an annotated POJO, eliminating\
    \ most of the configuration. However, if you still need customization, you can\
    \ use the elements of the `@ManagedBean` and `@ManagedProperty` scope annotations\
    \ (or XML equivalent).\n\n### `@ManagedBean`\n\nThe presence of the `@javax.faces.model.ManagedBean`\
    \ annotation on a class automatically registers it as a managed bean. The API\
    \ of this annotation is simple, and all elements are optional (see Listing 12-4).\n\
    \n**Listing 12-4.** *The ManagedBean Annotation API*\n\n```java\n@Target(TYPE)\
    \ @Retention(RUNTIME)\npublic @interface ManagedBean {\n    String name() default\
    \ \"\";\n    boolean eager() default false;\n}\n```\n\nThe `name` element specifies\
    \ the name of the managed bean (which by default is the name of the class starting\
    \ with a lowercase letter). If the value of the `eager` element is `true`, the\
    \ managed bean is instantiated when the web application starts.\n\nUI components\
    \ are bound to managed bean properties; changing the default name of a managed\
    \ bean has an impact on how you invoke a property or a method. The code in Listing\
    \ 12-5 renames the managed bean to `myManagedBean`.\n\n**Listing 12-5.** *A Renamed\
    \ Managed Bean*\n\n```java\n@ManagedBean(name = \"myManagedBean\")\npublic class\
    \ BookController {\n    private Book book = new Book();\n    \n    public String\
    \ doCreateBook() {\n        createBook(book);\n        return \"listBooks.xhtml\"\
    ;\n    }\n    // Constructors, getters, setters\n}\n```\n\nTo invoke attributes\
    \ or methods of this managed bean in your pages, you must use the overridden name\
    \ as follows:\n\n```xhtml\n<h:outputText value=\"#{myManagedBean.book.isbn}\"\
    />\n<h:form>\n    <h:commandLink action=\"#{myManagedBean.doCreateBook}\">\n \
    \       Create a new book\n    </h:commandLink>\n</h:form>\n```\n\n## Scopes"
