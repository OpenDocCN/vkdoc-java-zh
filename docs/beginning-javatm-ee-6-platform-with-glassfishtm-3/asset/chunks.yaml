    processing and Navigation


    **I**n the previous chapter, I showed you how to create web pages using different
    technologies (HTML, JSP, JSTL, etc.), knowing that JSF is the preferred Java EE
    specification for writing modern web applications. However, drawing pages with
    graphical components is not enough; these pages need to interact with a back-end
    system, navigate through pages, and validate and convert data. JSF is a rich specification:
    managed beans allow you to invoke the business tier and to navigate in your application,
    and a set of classes allow you to convert component values to and from a corresponding
    type or validate them to conform to business rules. With the use of annotations,
    it is now easy to develop custom converters and validators.


    JSF 2.0 brings simplicity and richness in terms of dynamic user interfaces. It
    natively supports Ajax calls in a simple manner. The specification comes with
    a JavaScript library, allowing asynchronous calls to the server and refreshing
    small portions of the page.


    Creating user interfaces, controlling navigation in the entire application, and
    calling business logic synchronously or asynchronously are possible because JSF
    is built on the Model-View-Controller (MVC) design pattern. Each part is separate
    from the other, allowing the UI to change without impacting the business logic
    and vice versa.


    This chapter will present all these concepts, complementing the previous chapters.


    **The MVC Pattern**


    JSF, and most web frameworks, encourage separation of concerns by using variations
    of the MVC design pattern. MVC is an architectural pattern used to isolate business
    logic from user interface. Business logic doesn’t mix well with user interface
    code. When the two are mixed, applications are much harder to maintain and less
    scalable. In the previous chapter, in the


    “JavaServer Pages” section, I showed you a JSP with Java code and SQL statements.
    Though technically correct, you can imagine how difficult it would get to maintain
    with time. The page mixes two developer roles (graphic designer and business logic
    developer), and it could end up using many more APIs (database access, EJB invocation,
    and so on), handling exceptions, or processing complex business logic. All that
    would result in a very complex web page. When MVC is applied, it results in a
    loosely coupled application; with this type of application, it is easier to modify
    either the visual appearance of the application or the underlying business rules
    without one affecting the other.


    In MVC, the model represents the data of the application, the view corresponds
    to the


    user interface, and the controller manages the communication between both (see
    Figure 12-1).


