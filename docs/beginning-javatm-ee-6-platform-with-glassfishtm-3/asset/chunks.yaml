    **托管 Bean 与导航**


    到目前为止，所有概念都围绕单个页面展开：什么是页面、什么是组件、它们如何渲染、转换和验证。Web 应用程序由多个页面组成，并且需要执行业务逻辑（例如通过调用
    EJB 层）。


    从一个页面跳转到另一个页面、调用 EJB 以及与组件同步数据，这些都由托管 Bean 处理。


    托管 Bean 是一种专门的 Java 类，负责与组件同步值、处理业务逻辑以及管理页面间的导航。您可以使用表达式语言（EL）将组件与特定的托管 Bean 属性或操作关联起来。以下代码片段来自之前的示例：


    <h:inputText value="#{bookController. **book.isbn**}"/>


    <h:commandButton value="Create" action="#{bookController. **doCreateBook**}"/>
    第一行代码将输入文本的值直接绑定到名为 bookController 的托管 Bean 的 book.isbn 属性上。输入文本的值会与托管 Bean 的
    book.isbn 属性同步。


    托管 Bean 还负责处理事件。第二行代码显示了一个与操作关联的提交按钮。当点击提交按钮时，会向托管 Bean 触发一个事件，并执行事件监听器方法（此处为
    doCreateBook() 方法）。


    清单 10-2 展示了 BookController 托管 Bean。这个 Java 类使用了 @ManagedBean 注解，并包含一个与页面组件值同步的
    book 属性。doCreateBook() 方法调用了一个无状态 EJB，然后返回一个字符串以实现页面间的导航。


    **清单 10-2.** *BookController 托管 Bean*


    **@ManagedBean**


    public class BookController {


    @EJB


    private BookEJB bookEJB;


    private Book **book** = new Book();


    public String **doCreateBook()** {


    book = bookEJB.createBook(book);


    return "listBooks.xhtml";


    }


    // Getters, setters


    }


    ■**注意** 托管 Bean 是充当控制器、实现页面间导航、调用 EJB 等的类。支持 Bean 则是持有绑定到组件的属性的对象。在本例中，我们可以说 BookController
    是托管 Bean，而 book 属性是支持 Bean。


