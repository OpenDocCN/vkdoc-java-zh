    **基于 XML 的 Web 服务的 Java API**


    我们已经审查了一个简单的 WSDL 文档、一个 SOAP 请求和一个 SOAP 响应。当 Web 服务具有多个带有复杂参数的操作时，这些 XML 文档对 Java
    开发人员来说可能显得令人生畏。好消息是，JAX-WS 通过隐藏这些 XML 文档的复杂性，使开发工作变得更加轻松。


