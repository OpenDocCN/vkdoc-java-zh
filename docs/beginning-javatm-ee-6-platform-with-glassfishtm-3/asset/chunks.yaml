    发布了其自有发行版，称为 JavaDB。Derby 体积小巧（2MB），是一个功能完备的关系型数据库，支持事务，可以轻松嵌入任何基于 Java 的解决方案中。


    Derby 提供两种不同的模式：嵌入模式和网络服务器模式。嵌入模式是指 Derby 由简单的单用户 Java 应用程序启动。使用此选项时，Derby 与应用程序运行在同一个
    JVM 中。在本书中，我将在单元测试期间使用此模式。


    网络服务器模式是指 Derby 作为独立进程启动，并提供多用户连接功能。在本书中运行应用程序时，我将全程使用此模式。


    安装


    安装 Derby 非常简单；事实上，你可能会发现它已经安装好了，因为它与 JDK 1.6 捆绑在一起。在安装 JDK 1.6 时（请回顾图 1-6），安装向导会建议你安装
    Java DB。默认情况下它会安装。如果你尚未安装，可以从 [`db.apache.org`](http://db.apache.org) 下载二进制文件。


    安装完成后，将 DERBY_HOME 变量设置为 Derby 的安装路径，并将 %DERBY_HOME%\bin 添加到你的 PATH 变量中。通过运行 %DERBY_HOME%\bin\startNetworkServer.bat
    脚本来启动 Derby 网络服务器。Derby 会在控制台显示一些信息，例如它监听的端口号（默认为 1527）。


    Derby 附带多个实用工具，其中之一是 sysinfo。打开 DOS 命令行，输入 sysinfo，你应该会看到关于 Java 和 Derby 环境的信息，如图
    1-13 所示。


    ![Image 19](img/index-60_1.jpg)


