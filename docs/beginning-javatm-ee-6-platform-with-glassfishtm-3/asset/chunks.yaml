    Book 实体。可嵌入容器负责注入实体管理器以及提交或回滚任何事务。`closeContainer()` 方法调用 `EJBContainer.close()`
    方法来关闭可嵌入容器实例。


    在这个例子中，我使用了一个测试类来向您展示如何使用可嵌入的 EJB 容器。但请记住，EJB 现在可以用于任何类型的 Java SE 环境：从测试类到 Swing
    应用程序，甚至只是一个带有 `public static void main()` 的 Main 类。


