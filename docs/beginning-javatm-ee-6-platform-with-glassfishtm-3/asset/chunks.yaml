    test Methods


    In JUnit 4, test classes do not have to extend anything. To be executed as a test
    case, a JUnit class needs at least one method annotated with @Test. If you write
    a class without at least one @Test method, you will get an error when trying to
    execute it (java.lang.Exception: No runnable methods).


    A test method must use the @Test annotation, return void, and take no parameters.
    This


    is controlled at runtime and throws an exception if not respected. The @Test annotation
    supports the optional expected parameter, which declares that a test method should
    throw an exception. If it doesn’t or if it throws a different exception than the
    one declared, the test fails. In this example, trying to calculate the age of
    an empty customer object should throw a NullPointerException.


    In Listing 1-9, the nextBirthDay() method is not implemented. However, you don’t
    want


    the test to fail; you just want to ignore it. You can add the @Ignore annotation
    in front or after


    @Test. Test runners will report the number of ignored tests, along with the number
    of tests that


    **28**


    Chapter 1 ■ JaVa ee 6 at a GLaNCe


    succeeded and failed. Note that @Ignore takes an optional parameter (a String)
    in case you want to record why a test is being ignored.


    assert Methods


    Test cases must assert that objects conform to an expected result. For that, JUnit
    has an Assert class that contains several methods. In order to use it, you can
    either use the prefixed syntax (e.g., Assert.assertEquals()) or import statically
    the Assert class (shown in Listing 1-9). As you can see in the notNegative() method,
    you can also use the Java assert keyword.


    Fixtures


    Fixtures are methods to initialize and release any common object during tests.
    JUnit uses


    @Before and @After annotations to execute code before or after each test. These
    methods can be given any name (clearCustomerHelper() in this example), and you
    can have multiple methods in one test class. JUnit uses @BeforeClass and @AfterClass
    annotations to execute specific code only once per class. These methods must be
    unique and static. @BeforeClass and @AfterClass can be very useful if you need
    to allocate and release expensive resources.


    Launching JUnit


    To run the JUnit launcher, you must add the JUnit jar file to your CLASSPATH variable
    (or add a Maven dependency). After that, you can run your tests through the Java
    launcher as shown in the following code. Note that when using assert, you must
    specify the –ea parameter; if you don’t, assertions are ignored.


    java **–ea** org.junit.runner.JUnitCore com.apress.javaee6.CustomerHelperTest


