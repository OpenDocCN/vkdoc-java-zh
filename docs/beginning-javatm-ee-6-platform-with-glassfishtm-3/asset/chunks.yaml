    \n**Bean-Managed Concurrency**\n\n使用BMC划分时，容器允许对单例Bean实例进行完全并发访问。您需要负责保护其状态免受并发访问导致的同步错误。在这种情况下，您可以使用Java同步原语，例如`synchronized`和`volatile`。`Listing\
    \ 7-7`中的代码展示了使用BMC（`@ConcurrencyManagement(BEAN)`）的`CacheEJB`，并在`addToCache()`方法上使用了`synchronized`关键字。\n\
    \n**Listing 7-7.** *一个使用BMC的单例会话Bean*\n\n```java\n@Singleton\n@ConcurrencyManagement(ConcurrencyManagementType.BEAN)\n\
    public class CacheEJB {\n    private Map<Long, Object> cache = new HashMap<Long,\
    \ Object>();\n\n    public synchronized void addToCache(Long id, Object object)\
    \ {\n        if (!cache.containsKey(id))\n            cache.put(id, object);\n\
    \    }\n\n    public void removeFromCache(Long id) {\n        if (cache.containsKey(id))\n\
    \            cache.remove(id);\n    }\n\n    public synchronized Object getFromCache(Long\
    \ id) {\n        if (cache.containsKey(id))\n            return cache.get(id);\n\
    \        else\n            return null;\n    }\n}\n```\n\n**不允许并发**\n\n您还可以禁止对某个方法或整个Bean的并发访问。如果客户端调用当前正在使用的方法，这将导致抛出`ConcurrentAccessException`。这可能会带来性能问题，因为客户端可能需要处理异常、重试访问Bean、可能再次收到异常、再次尝试，等等。在`Listing\
    \ 7-8`中，`CacheEJB`禁止了`addToCache()`方法上的并发。另外两个方法默认是CMC，并带有`@Lock(WRITE)`。\n\n\
    **Listing 7-8.** *一个不允许并发的单例会话Bean*\n\n```java\n@Singleton\n@Lock(LockType.READ)\n\
    public class CacheEJB {\n    private Map<Long, Object> cache = new HashMap<Long,\
    \ Object>();\n\n    @ConcurrencyManagement(ConcurrencyManagementType.CONCURRENCY_NOT_ALLOWED)\n\
    \    public void addToCache(Long id, Object object) {\n        if (!cache.containsKey(id))\n\
    \            cache.put(id, object);\n    }\n\n    public void removeFromCache(Long\
    \ id) {\n        if (cache.containsKey(id))\n            cache.remove(id);\n \
    \   }\n\n    @AccessTimeout(2000)\n    @Lock(LockType.WRITE)\n    public Object\
    \ getFromCache(Long id) {\n        if (cache.containsKey(id))\n            return\
    \ cache.get(id);\n        else\n            return null;\n    }\n}\n```\n\n**会话Bean模型**\n\
    \n到目前为止，您看到的代码示例使用了最简单的会话Bean编程模型：一个带有注解的POJO，没有接口。但根据您的需求，会话Bean可以提供更丰富的模型，允许您执行远程调用、依赖注入或异步调用。\n\
