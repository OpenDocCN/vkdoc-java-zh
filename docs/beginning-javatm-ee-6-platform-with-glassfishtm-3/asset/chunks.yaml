- fmt: "# JSF 标准转换器与验证器\n\nJSF 拥有一套标准的转换器和验证器，并允许你以非常简单的方式创建自己的转换器和验证器。\n\n## 转换器\n\
    \n当表单在浏览器中显示时，最终用户填写输入字段并点击按钮，结果数据以字符串格式通过 HTTP 请求传输到服务器。在更新托管 Bean 上的模型之前，这些数据必须从字符串转换为目标对象（`Float`、`Integer`、`BigDecimal`\
    \ 等）。当数据需要在响应中发送回客户端并在浏览器中渲染时，将执行反向操作。\n\nJSF 内置了针对常见类型（如日期和数字）的转换器。当托管 Bean 属性是原始类型（`Integer`、`int`、`Float`、`float`\
    \ 等）时，JSF 会自动将 UI 组件值转换为正确的类型并转换回来。当属性是其他数据类型时，你需要提供自己的转换器。表 12-3 列出了 `javax.faces.convert`\
    \ 包中的所有标准转换器。\n\n**表 12-3.** *标准转换器*\n\n| 转换器 | 描述 |\n| --- | --- |\n| `BigDecimalConverter`\
    \ | 将 `String` 转换为 `java.math.BigDecimal` 并反向转换 |\n| `BigIntegerConverter` | 将\
    \ `String` 转换为 `java.math.BigInteger` 并反向转换 |\n| `BooleanConverter` | 将 `String`\
    \ 转换为 `Boolean`（以及 `boolean` 原始类型）并反向转换 |\n| `ByteConverter` | 将 `String` 转换为\
    \ `Byte`（以及 `byte` 原始类型）并反向转换 |\n| `CharacterConverter` | 将 `String` 转换为 `Character`（以及\
    \ `char` 原始类型）并反向转换 |\n| `DateTimeConverter` | 将 `String` 转换为 `java.util.Date`\
    \ 并反向转换 |\n| `DoubleConverter` | 将 `String` 转换为 `Double`（以及 `double` 原始类型）并反向转换\
    \ |\n| `EnumConverter` | 将 `String` 转换为 `Enum`（以及 `enum` 原始类型）并反向转换 |\n| `FloatConverter`\
    \ | 将 `String` 转换为 `Float`（以及 `float` 原始类型）并反向转换 |\n| `IntegerConverter` | 将 `String`\
    \ 转换为 `Integer`（以及 `int` 原始类型）并反向转换 |\n| `LongConverter` | 将 `String` 转换为 `Long`（以及\
    \ `long` 原始类型）并反向转换 |\n| `NumberConverter` | 将 `String` 转换为抽象的 `java.lang.Number`\
    \ 类并反向转换 |\n| `ShortConverter` | 将 `String` 转换为 `Short`（以及 `short` 原始类型）并反向转换\
    \ |\n\n当托管 Bean 属性是某种原始数字类型时，JSF 会自动将输入值转换为数字；当属性是某种日期类型时，则转换为日期或时间。如果自动转换不适用，你可以通过标准的\
    \ `convertNumber` 和 `convertDateTime` 标签显式控制转换。要使用这些标签，你需要将转换器嵌套在任何输入或输出标签内。JSF\
    \ 将在生命周期期间调用该转换器。\n\n`convertNumber` 标签具有允许将输入值转换为数字（默认）、货币或百分比的属性。你可以指定货币符号或小数位数，以及确定数字应如何格式化和解析的格式模式。\n\
    \n```xml\n<h:inputText value=\"#{bookController.book.price}\">\n    <f:convertNumber\
    \ currencySymbol=\"$\" type=\"currency\"/>\n</h:inputText>\n```\n\n`convertDateTime`\
    \ 标签可以转换各种格式的日期（日期、时间或两者）。它具有控制日期转换和时区的多个属性。`pattern` 属性允许标识将被转换的日期字符串的模式。\n\n\
    ```xml\n<h:inputText value=\"#{bookController.book.publishedDate}\">\n    <f:convertDateTime\
    \ pattern=\"MM/dd/yy\"/>\n</h:inputText>\n```\n\n## 自定义转换器\n\n有时转换数字、日期、枚举等是不够的，你可能需要自定义转换。使用\
    \ JSF 开发自己的转换器并在页面中使用它们很容易。你只需编写一个实现 `javax.faces.convert.Converter` 接口的类，并使用元数据注册它。该接口有两个方法：\n\
    \n```java\nObject getAsObject(FacesContext ctx, UIComponent component, String\
    \ value)\nString getAsString(FacesContext ctx, UIComponent component, Object value)\n\
    ```\n\n`getAsObject()` 方法将 UI 组件的字符串值转换为相应的支持类型并返回新实例。如果转换失败，此方法会抛出 `ConverterException`。相反，`getAsString()`\
    \ 方法将提供的类型转换为字符串，以便在标记语言（如 XHTML）中渲染。\n\n一旦开发了自定义转换器，就必须注册它以便在 Web 应用程序中使用。一种方法是在\
    \ `faces-config.xml` 文件中声明转换器，另一种方法是使用 `@FacesConverter` 注解。\n\n清单 12-11 展示了如何编写一个将价格从美元转换为欧元的自定义转换器。它首先使用\
    \ `@FacesConverter` 注解将此转换器与名称 `euroConverter`（`value = \"euroConverter\"`）关联，并实现\
    \ `Converter` 接口。此示例仅覆盖了 `getAsString()` 方法，该方法返回给定价格以欧元表示的字符串表示形式。\n\n**清单 12-11.**\
    \ *欧元转换器*\n\n```java\n@FacesConverter(value = \"euroConverter\")\npublic class\
    \ EuroConverter implements Converter {\n    @Override\n    public Object getAsObject(FacesContext\
    \ ctx, UIComponent component,\n                              String value) {\n\
    \        return value;\n    }\n\n    @Override\n    public String getAsString(FacesContext\
    \ ctx, UIComponent component,\n                              Object value) {\n\
    \        float amountInDollars = Float.parseFloat(value.toString());\n       \
    \ double ammountInEuros = amountInDollars * 0.8;\n        DecimalFormat df = new\
    \ DecimalFormat(\"###,##0.##\");\n        return df.format(ammountInEuros);\n\
    \    }\n}\n```\n\n要使用此转换器，请使用标签的 `converter` 属性或 `<f:converter>` 标签。在这两种情况下，都必须传递在\
    \ `@FacesConverter` 注解中定义的自定义转换器名称（`euroConverter`）。以下代码显示两个输出文本，一个表示美元价格，另一个将此价格转换为欧元：\n\
    \n```xml\n<h:outputText value=\"#{book.price}\"/>\n<h:outputText value=\"#{book.price}\"\
    >\n    <f:converter converterId=\"euroConverter\"/>\n</h:outputText>\n```\n\n\
    或者你可以使用 `outputText` 标签的 `converter` 属性：\n\n```xml\n<h:outputText value=\"#{book.price}\"\
    \ converter=\"euroConverter\"/>\n```\n\n## 验证器\n\n在处理 Web 应用程序时，必须确保用户输入数据的准确性。强制输入正确的值可以在客户端使用\
    \ JavaScript 完成，也可以在服务器端使用验证器完成。JSF 通过使用标准和自定义的服务器端验证器简化了数据验证。验证器通过在托管 Bean 处理之前验证\
    \ UI 组件的值，充当第一级控制。\n\nUI 组件通常处理简单的验证，例如值是否为必填项。例如，以下标签将要求文本字段中输入一个值：\n\n```xml\n\
    <h:inputText value=\"#{bookController.book.title}\" required=\"true\"/>\n```\n\
    \n如果未输入值，JSF 会返回页面并显示一条消息，指示应输入一个值（页面必须有一个 `<h:messages>` 标签）。这使用了与我之前描述的相同的消息机制。但是\
    \ JSF 附带了一组更丰富的验证器可供使用（在表 12-4 中描述），这些验证器定义在 `javax.faces.validator` 包中。\n\n**表\
    \ 12-4.** *标准验证器*\n\n| 转换器 | 描述 |\n| --- | --- |\n| `DoubleRangeValidator` | 根据指定的最小和最大双精度值检查相应组件的值\
    \ |\n| `LengthValidator` | 检查关联组件字符串值中的字符数 |\n| `LongRangeValidator` | 根据指定的最小和最大长整型值检查相应组件的值\
    \ |\n| `RegexValidator` | 根据正则表达式检查相应组件的值 |"
  raw: 'JSF has a set of standard converters and validators and allows you to create
    your own in a very easy way.


    **Converters**


    When a form is displayed on a browser, the end user fills the input fields and
    hits a button, resulting in transporting the data to the server in an HTTP request
    using string formats. Before updating the model on the managed bean, this data
    has to be converted from strings to the target objects (Float, Integer, BigDecimal,
    etc.). The reverse action will take place when the data has to be sent back to
    the client in the response and be rendered in the browser.


    JSF ships with converters for common types like dates and numbers. In cases where
    the


    managed bean property is a primitive type (Integer, int, Float, float, and so
    on), JSF will automatically convert the UI component value to the correct type
    and back. When the property is some other data type, you need to provide your
    own converter. Table 12-3 lists all the standard converters that are in the javax.faces.convert
    package.


    **344**


    Chapter 12 ■ prOCeSSING aND NaVIGatION


    **Table 12-3.** *Standard Converters*


    **Converter**


    **Description**


    BigDecimalConverter


    Converts a String to a java.math.BigDecimal and vice versa


    BigIntegerConverter


    Converts a String to a java.math.BigInteger and vice versa


    BooleanConverter


    Converts a String to a Boolean (and boolean primitive) and vice versa


    ByteConverter


    Converts a String to a Byte (and byte primitive) and vice versa


    CharacterConverter


    Converts a String to a Character (and char primitive) and vice versa


    DateTimeConverter


    Converts a String to a java.util.Date and vice versa


    DoubleConverter


    Converts a String to a Double (and double primitive) and vice versa


    EnumConverter


    Converts a String to an Enum (and enum primitive) and vice versa


    FloatConverter


    Converts a String to a Float (and float primitive) and vice versa


    IntegerConverter


    Converts a String to an Integer (and int primitive) and vice versa


    LongConverter


    Converts a String to a Long (and long primitive) and vice versa


    NumberConverter


    Converts a String to an abstract java.lang.Number class and vice versa


    ShortConverter


    Converts a String to a Short (and short primitive) and vice versa


    JSF will automatically convert input values to numbers when the managed bean property


    is some primitive numeric type and to date or time when the property is some date
    type. If automatic conversion doesn’t suit, you can explicitly control it through
    the standard


    convertNumber and convertDateTime tags. To use these tags, you need to nest the
    converter inside any of the input or output tags. The converter will be called
    by JSF during the life cycle.


    The convertNumber tag has attributes that allow conversion of the input value
    to a number (default), a currency, or a percentage. You can specify a currency
    symbol or a number of frac-tion digits, as well as a formatting pattern determining
    how the number should be formatted and parsed.


    <h:inputText value="#{bookController.book.price}">


    <f:**convertNumber** currencySymbol="$" type="currency"/>


    </h:inputText>


    The convertDateTime tag can convert dates in various formats (date, time, or both).
    It has several attributes that control the date conversion and time zones. A pattern
    attribute allows identification of the pattern of the date string that will be
    converted.


    <h:inputText value="#{bookController.book.publishedDate}">


    <f:**convertDateTime** pattern="MM/dd/yy"/>


    </h:inputText>


    **Custom Converters**


    Sometimes converting numbers, dates, enums, and so on is insufficient, and you
    may require custom conversion. It is easy to develop your own converters and use
    them in pages with JSF.


    Chapter 12 ■ prOCeSSING aND NaVIGatION


    **345**


    You simply have to write a class that implements the javax.faces.convert.Converter
    interface and register it with metadata. This interface has two methods:


    Object **getAsObject**(FacesContext ctx, UIComponent component, String value)


    String **getAsString**(FacesContext ctx, UIComponent component, Object value)


    The getAsObject() method converts the string value of a UI component into the
    corre-


    sponding supported type and returns the new instance. This method throws a


    ConverterException if the conversion fails. Conversely, the getAsString() method
    converts the provided type to a string, to be rendered in markup language (such
    as XHTML).


    Once the custom converter is developed, it must be registered to allow it to be
    used in the web application. One method is by declaring the converter in the faces-config.xml
    file, the other is to use the @FacesConverter annotation.


    Listing 12-11 shows how to write a custom converter that converts a price from
    dollars


    to euros. It starts by associating this converter with the name euroConverter
    (value =


    "euroConverter") using the @FacesConverter annotation, and implements the Converter
    interface. This example only overrides the getAsString() method, which returns
    a string representation of a given price in euros.


    **Listing 12-11.** *A Euro Converter*


    **@FacesConverter(value = "euroConverter")**


    public class EuroConverter implements **Converter** {


    @Override


    public Object **getAsObject**(FacesContext ctx, UIComponent component,➥


    String value) {


    return value;


    }


    @Override


    public String **getAsString**(FacesContext ctx, UIComponent component,➥


    Object value) {


    float amountInDollars = Float.parseFloat(value.toString());


    double ammountInEuros = amountInDollars * 0.8;


    DecimalFormat df = new DecimalFormat("###,##0.##");


    return df.format(ammountInEuros);


    }


    }


    To use this converter, use either the converter attribute of a tag or the <f:converter>
    tag.


    In both cases, you must pass the name of the custom converter defined in the @FacesConverter
    annotation (euroConverter). The following code displays two output texts, one
    representing the price in dollars and the other converting this price to euros:


    <h:outputText value="#{book.price}"/>


    <h:outputText value="#{book.price}">


    < **f:converter** converterId=" **euroConverter**"/>


    </h:outputText>


    **346**


    Chapter 12 ■ prOCeSSING aND NaVIGatION


    Or you can use the converter attribute of the outputText tag:


    <h:outputText value="#{book.price}" **converter="euroConverter"** /> **Validators**


    When working with web applications, the accuracy of the user-entered data must
    be ensured.


    Enforcing the right values are entered can be done on the client side using JavaScript
    or on the server side using validators. JSF simplifies data validation through
    the use of standard and custom server-side validators. Validators act as a first
    level of control by validating the value of UI components before being processed
    by the managed bean.


    UI components generally handle simple validation, such as whether or not a value
    is


    required. For example, the following tag would require that a value in the text
    field be entered:


    <h:inputText value="#{bookController.book.title}" **required="true"** /> If a
    value is not entered, JSF returns the page with a message indicating that a value


    should be entered (the page must have a <h:messages> tag). This uses the same
    message mechanism that I described before. But JSF comes with a set of richer
    validators that can be used (described in Table 12-4), which are defined in the
    javax.faces.validator package.


    **Table 12-4.** *Standard Validators*


    **Converter**


    **Description**


    DoubleRangeValidator


    Checks the value of the corresponding component against specified


    minimum and maximum double values


    LengthValidator


    Checks the number of characters in the string value of the associated


    component


    LongRangeValidator


    Checks the value of the corresponding component against specified


    minimum and maximum long values


    RegexValidator


    Checks the value of the corresponding component against a regular


    expression'
  trans: "\nJSF 提供了一套标准的转换器和验证器，并允许你以非常简单的方式创建自己的转换器和验证器。\n\n**转换器**\n\n当表单在浏览器中显示时，最终用户填写输入字段并点击按钮，这会导致数据以字符串格式通过\
    \ HTTP 请求传输到服务器。在更新托管 Bean 上的模型之前，这些数据必须从字符串转换为目标对象（Float、Integer、BigDecimal 等）。当数据需要在响应中发送回客户端并在浏览器中渲染时，将执行反向操作。\n\
    \nJSF 内置了针对常见类型（如日期和数字）的转换器。当托管 Bean 属性是原始类型（Integer、int、Float、float 等）时，JSF 会自动将\
    \ UI 组件值转换为正确的类型，反之亦然。当属性是其他数据类型时，你需要提供自己的转换器。表 12-3 列出了 `javax.faces.convert`\
    \ 包中的所有标准转换器。\n\n**344**\n\n第 12 章 ■ 处理与导航\n\n**表 12-3.** *标准转换器*\n\n**转换器**\n\
    \n**描述**\n\nBigDecimalConverter\n\n将 String 转换为 java.math.BigDecimal，反之亦然\n\n\
    BigIntegerConverter\n\n将 String 转换为 java.math.BigInteger，反之亦然\n\nBooleanConverter\n\
    \n将 String 转换为 Boolean（以及 boolean 原始类型），反之亦然\n\nByteConverter\n\n将 String 转换为\
    \ Byte（以及 byte 原始类型），反之亦然\n\nCharacterConverter\n\n将 String 转换为 Character（以及 char\
    \ 原始类型），反之亦然\n\nDateTimeConverter\n\n将 String 转换为 java.util.Date，反之亦然\n\nDoubleConverter\n\
    \n将 String 转换为 Double（以及 double 原始类型），反之亦然\n\nEnumConverter\n\n将 String 转换为 Enum（以及\
    \ enum 原始类型），反之亦然\n\nFloatConverter\n\n将 String 转换为 Float（以及 float 原始类型），反之亦然\n\
    \nIntegerConverter\n\n将 String 转换为 Integer（以及 int 原始类型），反之亦然\n\nLongConverter\n\
    \n将 String 转换为 Long（以及 long 原始类型），反之亦然\n\nNumberConverter\n\n将 String 转换为抽象的 java.lang.Number\
    \ 类，反之亦然\n\nShortConverter\n\n将 String 转换为 Short（以及 short 原始类型），反之亦然\n\n当托管 Bean\
    \ 属性是某种原始数字类型时，JSF 会自动将输入值转换为数字；当属性是某种日期类型时，则自动转换为日期或时间。如果自动转换不适用，你可以通过标准的 `convertNumber`\
    \ 和 `convertDateTime` 标签显式控制转换。要使用这些标签，你需要将转换器嵌套在任何输入或输出标签内。JSF 将在生命周期期间调用该转换器。\n\
    \n`convertNumber` 标签具有一些属性，允许将输入值转换为数字（默认）、货币或百分比。你可以指定货币符号或小数位数，以及确定数字应如何格式化和解析的格式模式。\n\
    \n```html\n<h:inputText value=\"#{bookController.book.price}\">\n    <f:**convertNumber**\
    \ currencySymbol=\"$\" type=\"currency\"/>\n</h:inputText>\n```\n\n`convertDateTime`\
    \ 标签可以转换各种格式的日期（日期、时间或两者）。它具有多个控制日期转换和时区的属性。`pattern` 属性允许标识将被转换的日期字符串的模式。\n\n\
    ```html\n<h:inputText value=\"#{bookController.book.publishedDate}\">\n    <f:**convertDateTime**\
    \ pattern=\"MM/dd/yy\"/>\n</h:inputText>\n```\n\n**自定义转换器**\n\n有时，转换数字、日期、枚举等是不够的，你可能需要自定义转换。使用\
    \ JSF 开发自己的转换器并在页面中使用它们很容易。\n\n第 12 章 ■ 处理与导航\n\n**345**\n\n你只需编写一个实现 `javax.faces.convert.Converter`\
    \ 接口的类，并使用元数据注册它。该接口有两个方法：\n\n```java\nObject **getAsObject**(FacesContext ctx,\
    \ UIComponent component, String value)\nString **getAsString**(FacesContext ctx,\
    \ UIComponent component, Object value)\n```\n\n`getAsObject()` 方法将 UI 组件的字符串值转换为相应的支持类型，并返回新实例。如果转换失败，此方法会抛出\
    \ `ConverterException`。相反，`getAsString()` 方法将提供的类型转换为字符串，以便在标记语言（如 XHTML）中渲染。\n\
    \n开发自定义转换器后，必须注册它才能使其在 Web 应用程序中使用。一种方法是在 `faces-config.xml` 文件中声明转换器，另一种方法是使用\
    \ `@FacesConverter` 注解。\n\n清单 12-11 展示了如何编写一个将价格从美元转换为欧元的自定义转换器。它首先使用 `@FacesConverter`\
    \ 注解将此转换器与名称 `euroConverter`（`value = \"euroConverter\"`）关联，并实现 `Converter` 接口。此示例仅覆盖了\
    \ `getAsString()` 方法，该方法返回给定价格以欧元表示的字符串形式。\n\n**清单 12-11.** *欧元转换器*\n\n```java\n\
    **@FacesConverter(value = \"euroConverter\")**\npublic class EuroConverter implements\
    \ **Converter** {\n\n    @Override\n    public Object **getAsObject**(FacesContext\
    \ ctx, UIComponent component,➥\n                                String value)\
    \ {\n        return value;\n    }\n\n    @Override\n    public String **getAsString**(FacesContext\
    \ ctx, UIComponent component,➥\n                                Object value)\
    \ {\n        float amountInDollars = Float.parseFloat(value.toString());\n   \
    \     double ammountInEuros = amountInDollars * 0.8;\n        DecimalFormat df\
    \ = new DecimalFormat(\"###,##0.##\");\n        return df.format(ammountInEuros);\n\
    \    }\n}\n```\n\n要使用此转换器，可以使用标签的 `converter` 属性或 `<f:converter>` 标签。在这两种情况下，都必须传递在\
    \ `@FacesConverter` 注解中定义的自定义转换器名称（`euroConverter`）。以下代码显示两个输出文本，一个表示美元价格，另一个将此价格转换为欧元：\n\
    \n```html\n<h:outputText value=\"#{book.price}\"/>\n<h:outputText value=\"#{book.price}\"\
    >\n    < **f:converter** converterId=\" **euroConverter**\"/>\n</h:outputText>\n\
    ```\n\n**346**\n\n第 12 章 ■ 处理与导航\n\n或者，你可以使用 `outputText` 标签的 `converter` 属性：\n\
    \n```html\n<h:outputText value=\"#{book.price}\" **converter=\"euroConverter\"\
    ** />\n```\n\n**验证器**\n\n在处理 Web 应用程序时，必须确保用户输入数据的准确性。强制输入正确的值可以在客户端使用 JavaScript\
    \ 完成，也可以在服务器端使用验证器完成。JSF 通过使用标准和自定义的服务器端验证器简化了数据验证。验证器通过在 UI 组件值被托管 Bean 处理之前对其进行验证，充当第一级控制。\n\
    \nUI 组件通常处理简单的验证，例如值是否为必填项。例如，以下标签将要求必须在文本字段中输入一个值：\n\n```html\n<h:inputText value=\"\
    #{bookController.book.title}\" **required=\"true\"** />\n```\n\n如果未输入值，JSF 会返回页面并显示一条消息，指示应输入一个值（页面必须包含\
    \ `<h:messages>` 标签）。这使用了之前描述过的相同消息机制。但是 JSF 附带了一组更丰富的验证器可供使用（在表 12-4 中描述），这些验证器定义在\
    \ `javax.faces.validator` 包中。\n\n**表 12-4.** *标准验证器*\n\n**转换器**\n\n**描述**\n\n\
    DoubleRangeValidator\n\n根据指定的最小和最大 double 值检查相应组件的值\n\nLengthValidator\n\n检查关联组件字符串值的字符数\n\
    \nLongRangeValidator\n\n根据指定的最小和最大 long 值检查相应组件的值\n\nRegexValidator\n\n根据正则表达式检查相应组件的值\n"
- fmt: "# These validators are useful for generic cases like the length of a field\
    \ or a number range and can be easily associated within a component, in the same\
    \ way as converters are (both can be used on the same component). The following\
    \ code ensures the book’s title is between 2 and 20 characters in length and its\
    \ price is from 1 to 500 dollars.\n\n```\n<h:inputText value=\"#{bookController.book.title}\"\
    \ required=\"true\">\n    <f:validateLength minimum=\"2\" maximum=\"20\"/>\n</h:inputText>\n\
    \n<h:inputText value=\"#{bookController.book.price}\">\n    <f:validateLongRange\
    \ minimum=\"1\" maximum=\"500\"/>\n</h:inputText>\n```\n\n## Custom Validators\n\
    \nPerhaps the standard JSF validators might not suit your needs; you may have\
    \ data that has to follow certain business formats such as a ZIP code, a state,\
    \ or an e-mail address. You must create your own custom validator to address these\
    \ cases. Like converters, a validator is a class that needs to implement an interface\
    \ and override some method. In the case of a validator, the interface is `javax.faces.validator.Validator`,\
    \ which has a single `validate()` method:\n\n```\nvoid validate(FacesContext context,\
    \ UIComponent component, Object value)\n```\n\nIn this method the `value` argument\
    \ is the one that has to be checked, based on some business logic. If it passes\
    \ the validation check, you can simply return from the method, and the life cycle\
    \ of the page will continue. If not, you can throw a `ValidatorException` and\
    \ include a `FacesMessage` with a summary and a detail message describing the\
    \ validation error, and register the validator either in the `faces-config.xml`\
    \ or by using the `@FacesValidator` annotation.\n\nAs an example, create an ISBN\
    \ validator that ensures the ISBN entered by the user for the book follows a certain\
    \ format. Listing 12-12 shows the code for the `IsbnValidator`.\n\n**Listing 12-12.**\
    \ *An ISBN Validator*\n\n```\n@FacesValidator(value = \"isbnValidator\")\npublic\
    \ class IsbnValidator implements Validator {\n\n    private Pattern pattern;\n\
    \    private Matcher matcher;\n\n    @Override\n    public void validate(FacesContext\
    \ context, UIComponent component,\n                         Object value) throws\
    \ ValidatorException {\n        String componentValue = value.toString();\n  \
    \      pattern = Pattern.compile(\"(?=[-0-9xX]{13}$)\");\n        matcher = pattern.matcher(componentValue);\n\
    \        if (!matcher.find()) {\n            String message = MessageFormat.format(\n\
    \                    \"{0} is not a valid isbn format\", componentValue);\n  \
    \          FacesMessage facesMessage = new FacesMessage(SEVERITY_ERROR,\n    \
    \                message, message);\n            throw new ValidatorException(facesMessage);\n\
    \        }\n    }\n}\n```\n\nThe code in Listing 12-12 starts by associating the\
    \ validator with the name `isbnValidator`, to allow it to be used in a page. It\
    \ implements the `Validator` interface and adds the validation logic to the `validate()`\
    \ method. It checks, with a regular expression, that the ISBN has the right format.\
    \ If not, it adds a message to the context and throws an exception. JSF will automatically\
    \ resume the life cycle of the page, recall the page, and display the error message.\n\
    \nYou can employ this custom validator in your pages using the `validator` attribute\
    \ or embedding a `<f:validator>` tag:\n\n```\n<h:inputText value=\"#{book.isbn}\"\
    \ validator=\"isbnValidator\"/>\n// or\n<h:inputText value=\"#{book.isbn}\">\n\
    \    <f:validator validatorId=\"isbnValidator\" />\n</h:inputText>\n```\n\n##\
    \ Ajax\n\nThe HTTP protocol is based on a request/response mechanism: a client\
    \ needs something, sends a request, and receives a response from the server, usually\
    \ an entire web page. The communication follows this direction: a client requests\
    \ something from the server, and not the other way around. However, web applications\
    \ must provide rich and responsive interfaces and must react to server events,\
    \ update parts of the page, aggregate widgets, and so on. In a normal request/response\
    \ situation, the server would have to send the entire web page back even if only\
    \ a small portion had to change. If the page has a significant size, you’ll overload\
    \ the bandwidth and have poor responsiveness as the browser would need to load\
    \ the entire page.\n\nIf you want to increase the browser’s responsiveness and\
    \ improve the user’s browsing experience, you need to update only small portions\
    \ of the page. And this can be done with Ajax.\n\nAjax (originally standing for\
    \ Asynchronous JavaScript and XML) is a set of web development techniques used\
    \ to create interactive web applications. Ajax allows web applications to retrieve\
    \ portions of data from the server asynchronously without interfering with the\
    \ display and behavior of the existing page. Once the data is received by the\
    \ client, only the portions requiring updating using the Document Object Model\
    \ (DOM) of the page and JavaScript are needed. There is also a mechanism called\
    \ *Reverse Ajax* (or Comet programming) for pushing data from the server back\
    \ to the browser. These mechanisms are used in most of our daily web applications,\
    \ and JSF 2.0 has introduced support for them.\n\n### General Concepts\n\nThe\
    \ term *Ajax* was coined in 2005 as a set of alternative techniques for loading\
    \ asynchronous data into web pages. Back in 1999, Microsoft created the `XMLHttpRequest`\
    \ object as an ActiveX control in Internet Explorer 5. In 2006, the World Wide\
    \ Web Consortium (W3C) released the first specification draft for the `XMLHttpRequest`\
    \ object, which is now supported by most browsers. At the same time, several companies\
    \ brainstormed about how to ensure that Ajax could be the industry standard for\
    \ a rich application platform based on open technologies. The result of this work\
    \ was the creation of the OpenAjax Alliance, which consists of vendors, open source\
    \ projects, and companies using Ajax-based technologies.\n\nAs shown in Figure\
    \ 12-7, in traditional web applications, the browser has to ask for the full HTML\
    \ documents from the server. The user clicks a button to send or get the information,\
    \ waits for the server to respond, and then receives the entire page that the\
    \ browser loads. Ajax, on the other hand, uses asynchronous data transfer (HTTP\
    \ requests) between the browser and the server, allowing web pages to request\
    \ small bits of information (JSON or XML data) from the server instead of whole\
    \ pages. The user stays on the same page while a piece of JavaScript requests\
    \ or sends data to a server asynchronously, and only portions of the page are\
    \ actually refreshed, making web application faster and more user friendly.\n\n\
    **Figure 12-7.** *Plain HTTP calls vs. Ajax HTTP calls*\n\nIn principle, Ajax\
    \ is based on the following:\n\n- XHTML and CSS for presentation\n- DOM for dynamic\
    \ display and interaction with data\n- XML and XSLT for the interchange, manipulation,\
    \ and display of XML data\n- The `XMLHttpRequest` object for asynchronous communication\n\
    - JavaScript to bring these technologies together\n\n`XMLHttpRequest` is an important\
    \ part of Ajax, as it’s a DOM API used by JavaScript to transfer XML from the\
    \ browser to the server. The data returned has to be fetched on the client side\
    \ to update portions of the page dynamically with JavaScript. The data can have\
    \ several formats such as XHTML, JSON, or even plain text.\n\nSince JSF 2.0, Ajax\
    \ is supported natively, so you don’t have to develop JavaScript to handle the\
    \ `XMLHttpRequest`, but you do need to use a JavaScript library that has been\
    \ specified and shipped with JSF implementations.\n\n### Support in JSF"
