- fmt: '# We live in an Internet world


    With our transactional back end processing thousands of requests, communicating
    with heterogeneous systems with web services, we need a presentation layer to
    interact with end users, preferably one that runs in a browser. Browsers are everywhere,
    and user interfaces are richer, more dynamic, and easier to use. Rich Internet
    Applications (RIAs) are gaining in popularity as users expect more from their
    browsing experience. They need to consult catalogs of books and CDs online, but
    they also want to access e-mail and documents, receive e-mail notification, or
    have parts of their browser refreshed when a server event occurs. Add to that
    the Web 2.0 philosophy whereby people can share any kind of information with groups
    of friends and interact with each other, and the result is web interfaces that
    are getting more and more complex to develop.


    In the early days of Java, developers dealt in HTML directly, by emitting HTML
    from servlets. We then moved from servlets to Java Server Pages (JSP) to custom
    tags. Today, Java EE 6 brings with it a new version of JSF, simplifying web interface
    development.


    In this chapter, you will see different technologies used in Java EE 6 to create
    web pages. First, the text covers some basic concepts such as HTML, CSS, and JavaScript,
    and then moves on to JSP, EL, and JSTL. I then introduce you to Facelet, the preferred
    page declaration language (PDL) in JSF. The remainder of the chapter focuses on
    how to create web interfaces using JSF or custom components. The next chapter
    will focus on how to navigate between pages and how to interact with a back end
    so that dynamic data can be displayed.


    ## Web Pages


    When we create a web application, we are really interested in displaying dynamic
    content: a list of items from a catalog (CDs and books, for instance), the customer
    details for a given identifier, a shopping cart containing the items the customer
    wants to buy, and so on. Conversely, static content, such as the address of a
    book company and FAQs with information on how to buy or ship items, rarely or
    never changes. Static content can also be the images, videos, or artwork that
    make up a page.


    The final goal of creating a page is to display it in a browser. The page has
    to use languages that the browser can understand, of which there are several:
    HTML, XHTML, CSS, and JavaScript.


    ## HTML


    Hypertext Markup Language (HTML) is the predominant language for web pages. It
    is based on Standard Generalized Markup Language (SGML), which is a standard metalanguage
    to define markup languages. HTML uses *markups*, or *tags*, to structure text
    into paragraphs, lists, links, buttons, text areas, and so on.


    An HTML page is a text document used by browsers to present text and graphics.
    These documents are text files that often have an `.html` or `.htm` extension.
    A web page is made of content, tags to change some aspects of the content, and
    external objects such as images, videos, JavaScript, or CSS files.


    In the previous chapter, the "Putting It All Together" section showed a couple
    of JSF pages, with one displaying a form to create a new book. In pure HTML, without
    using any JSF tags, this page could look like the code in Listing 11-1.


    **Listing 11-1.** The `newBook.html` Page


    ```

    <H1>Create a new book</h1>

    <hr>

    <TABLE border=0>

    <TR>

    <TD>ISBN :</TD>

    <TD><input type=text/></td>

    </tr>

    <tr>

    <td>Title :</td>

    <TD><input type=text/></td>

    </tr>

    <tr>

    <td>Price :</td>

    <TD><input type=text/></td>

    </tr>

    <tr>

    <td>Description :

    <td><textarea name=textarea cols=20 rows=5></textarea>

    </tr>

    <TR>

    <TD>Number of pages :

    <td><input type=text/>

    </tr>

    <tr>

    <td>Illustrations :

    <td><input type=checkbox/>

    </tr>

    </table>

    <input type=submit value=Create>

    <hr>

    <i>APress - Beginning Java EE 6</i>

    ```


    ![Image 89](index-313_1.jpg)


    Normally, a valid HTML page starts with an `<html>` tag that acts like a container
    for the document. It is followed by a `<head>` and `<body>` tag. `<body>` contains
    the visible content such as the HTML code displaying a table, labels, input fields,
    and a button. As you can see in Listing 11-1, the `newBook.html` markup doesn''t
    follow these rules, but browsers will display nonvalid HTML pages to a certain
    extent. So the visible result would look like Figure 11-1.


    **Figure 11-1.** Graphical representation of the `newBook.html` page


    The graphical representation shown in Figure 11-1 is the one expected because
    Listing 11-1 is not well formatted in terms of XML:


    - The page does not have any `<html>`, `<head>`, or `<body>` tags.

    - The `<input type=submit value=Create>` tag is not closed.

    - Uppercase and lowercase are mixed in tags (e.g., `<TR>` and `</tr>` both appear
    in the listing).


    Most browsers will permit such mistakes and display this form. However, if you
    want to process this document with XML parsers, for example, it would fail. To
    uncover why this is, let''s look at a web page that uses a strict XML structure
    with Extensible Hypertext Markup Language, or XHTML.


    ## XHTML


    XHTML was created shortly after HTML 4.01. It takes its roots in HTML but is reformulated
    in strict XML. This means an XHTML document is an XML document that follows a
    certain schema and has a graphical representation on browsers. An XHTML file (which
    has the extension `.xhtml`) can be used as XML right away or displayed in a browser.
    In contrast to HTML, this has the advantage of providing document validation using
    standard XML tools (XSL, or Extensible Stylesheet Language; XSLT, or XSL Transformations;
    etc.). Hence XHTML is much more flexible and powerful than HTML, because it allows
    you to define any set of tags you wish.


    Listing 11-2 shows how the XHTML version of the web page to create a book would
    look.


    **Listing 11-2.** The `newBook.xhtml` Page


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <!DOCTYPE html

    PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"

    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

    <html xml:lang="en" lang="en" xmlns="http://www.w3.org/1999/xhtml">

    <head>

    <title>Creates a new book</title>

    </head>

    <body>

    <h1>Create a new book</h1>

    <hr/>

    <table border="0">

    <tr>

    <td>ISBN :</td>

    <td><input type="text"/></td>

    </tr>

    <tr>

    <td>Title :</td>

    <td><input type="text"/></td>

    </tr>

    <tr>

    <td>Price :</td>

    <td><input type="text"/></td>

    </tr>

    <tr>

    <td>Description :</td>

    <td><textarea name="textarea" cols="20" rows="5"></textarea></td>

    </tr>

    <tr>

    <td>Number of pages :</td>

    <td><input type="text"/></td>

    </tr>

    <tr>

    <td>Illustrations :</td>

    <td><input type="checkbox"/></td>

    </tr>

    </table>

    <input name="" type="submit" value="Create"/>

    <hr/>

    <i>APress - Beginning Java EE 6</i>

    </body>

    </html>

    ```


    Some differences exist between Listing 11-1 and Listing 11-2: the document in
    Listing 11-2 follows a strict structure and has `<html>`, `<head>`, and `<body>`
    tags; all the tags are closed, even ones with empty elements (each `<td>` is closed,
    and `<hr/>` is used instead of `<hr>`); attributes appear between single or double
    quotes (`<table border="0">` or `<table border=''0''>`, but not `<table border=0>`);
    and tags are all lowercase (`<tr>` instead of `<TR>`). Compare this to Listing
    11-1, which as mentioned previously shows invalid HTML that browsers will be able
    to display anyway.


    The strict validation of XML syntax rules and schema constraints makes XHTML easier
    to maintain and to parse than HTML, and as a result it is now the preferred language
    for web pages.


    ## CSS


    Browsers live in a world of client-side languages such as HTML, XHTML, CSS, and
    JavaScript.'
  raw: '**W**e live in an Internet world. With our transactional back end processing
    thousands of requests, communicating with heterogeneous systems with web services,
    we need a presentation layer to interact with end users, preferably one that runs
    in a browser. Browsers are everywhere, and user interfaces are richer, more dynamic,
    and easier to use. Rich Internet Applications (RIAs) are gaining in popularity
    as users expect more from their browsing experience. They need to consult catalogs
    of books and CDs online, but they also want to access e-mail and documents, receive
    e-mail notification, or have parts of their browser refreshed when a server event
    occurs. Add to that the Web 2.0 philosophy whereby people can share any kind of
    information with groups of friends and interact with each other, and the result
    is web interfaces that are getting more and more complex to develop.


    In the early days of Java, developers dealt in HTML directly, by emitting HTML
    from servlets. We then moved from servlets to Java Server Pages (JSP) to custom
    tags. Today, Java EE 6


    brings with it a new version of JSF, simplifying web interface development.


    In this chapter, you will see different technologies used in Java EE 6 to create
    web pages.


    First, the text covers some basic concepts such as HTML, CSS, and JavaScript,
    and then moves on to JSP, EL, and JSTL. I then introduce you to Facelet, the preferred
    page declaration language (PDL) in JSF. The remainder of the chapter focuses on
    how to create web interfaces using JSF or custom components. The next chapter
    will focus on how to navigate between


    pages and how to interact with a back end so that dynamic data can be displayed.


    **Web Pages**


    When we create a web application, we are really interested in displaying dynamic
    content: a list of items from a catalog (CDs and books, for instance), the customer
    details for a given identifier, a shopping cart containing the items the customer
    wants to buy, and so on. Conversely, static content, such as the address of a
    book company and FAQs with information on how to buy or ship items, rarely or
    never changes. Static content can also be the images, videos, or artwork that
    make up a page.


    The final goal of creating a page is to display it in a browser. The page has
    to use languages that the browser can understand, of which there are several:
    HTML, XHTML, CSS, and


    JavaScript.


