    \ | `send()` 或 `publish()` 方法 |\n| JMSMessageID | 提供一个唯一标识提供者发送的每条消息的值。 | `send()`\
    \ 或 `publish()` 方法 |\n| JMSTimestamp | 包含消息交给提供者发送的时间。 | `send()` 或 `publish()`\
    \ 方法 |\n| JMSCorrelationID | 客户端可以使用此字段将一条消息与另一条消息关联起来，例如将响应消息与其请求消息关联。 | 客户端\
    \ |\n| JMSReplyTo | 包含应发送消息回复的目的地。 | 客户端 |\n| JMSRedelivered | 此布尔值由提供者设置，用于指示消息是否已被重新投递。\
    \ | 提供者 |\n| JMSType | 用作消息类型标识符。 | 客户端 |\n| JMSExpiration | 发送消息时，其过期时间根据 `send()`\
    \ 方法指定的生存时间值计算并设置。 | `send()` 或 `publish()` 方法 |\n| JMSPriority | JMS 定义了一个十级优先级值，0\
    \ 为最低优先级，9 为最高。 | `send()` 或 `publish()` 方法 |\n\n[** JMS 1.1 规范，“3.4：消息头字段，” (http://jcp.org/en/jsr/detail?id=914)*](http://jcp.org/en/jsr/detail?id=914)\n\
    \n你可以通过 `Message` 接口访问这些消息头字段，如下所示：\n\n```java\nmessage.getJMSCorrelationID();\n\
    message.getJMSMessageID();\nmessage.setJMSPriority(6);\n```\n\n**属性**\n\n除了消息头字段之外，`javax.jms.Message`\
    \ 接口还支持属性值，这些属性值类似于消息头，但由应用程序显式创建，而不是跨消息的标准属性。这提供了一种机制，可以向消息添加可选的标头字段，客户端可以通过选择器选择接收或不接收这些字段。属性值可以是布尔型、字节型、短整型、整型、长整型、浮点型、双精度浮点型和字符串。设置和获取属性的代码如下所示：\n\
    \n第 13 章 ■ 发送消息\n\n**371**\n\n```java\nmessage.setFloatProperty(\"orderAmount\"\
    , 1245.5f);\nmessage.getFloatProperty(\"orderAmount\");\n```\n\n**消息体**\n\n消息体是可选的，包含要发送或接收的数据。根据你使用的接口，它可以包含不同格式的数据，如表\
    \ 13-4 所列。\n\n**表 13-4.** *消息类型*\n\n| **接口** | **描述** |\n| :--- | :--- |\n| StreamMessage\
    \ | 消息体包含 Java 原始值流。它按顺序填充和读取。 |\n| MapMessage | 消息体包含一组名称-值对，其中名称是字符串，值是 Java\
    \ 原始类型。 |\n| TextMessage | 消息体包含一个字符串（例如，它可以包含 XML）。 |\n| ObjectMessage | 包含可序列化对象或可序列化对象集合的消息。\
    \ |\n| BytesMessage | 包含字节流的消息。 |\n\n如果你扩展 `javax.jms.Message` 接口，则可以创建自己的消息格式。请注意，当接收到消息时，其消息体是只读的。根据消息类型，你有不同的方法来访问其内容。文本消息将有\
    \ `getText()` 和 `setText()` 方法，对象消息将有 `getObject()` 和 `setObject()` 方法，依此类推。\n\
    \n```java\ntextMessage.setText(\"This is a text message\");\ntextMessage.getText();\n\
    bytesMessage.readByte();\nobjectMessage.getObject();\n```\n\n**消息生产者**\n\n消息生产者是由会话创建并用于向目的地发送消息的对象。通用的\
    \ `javax.jms.MessageProducer` 接口可用于通过统一接口获取特定的生产者。对于 P2P 模型，消息生产者称为发送者（sender）并实现\
    \ `QueueSender` 接口。对于发布-订阅模型，它称为发布者（publisher）并实现 `TopicPublisher`。创建消息后，根据你使用的接口，生产者可以发送（P2P）或发布（pub-sub）它：\n\
    \n```java\nmessageProducer.send(message);\nqueueSender.send(message);\ntopicPublisher.publish(message);\n\
    ```\n\n生产者可以为发送的消息指定默认的传递模式、优先级和生存时间。以下步骤说明如何创建向主题发送消息的发布者（参见清单 13-5）：\n\n**372**\n\
    \n第 13 章 ■ 发送消息\n\n****1.** 使用注入（或 JNDI 查找）获取连接工厂和主题。\n\n****2.** 使用连接工厂创建一个 `Connection`\
    \ 对象。\n\n****3.** 使用连接创建一个 `Session` 对象。\n\n****4.** 使用 `Session` 对象创建一个 `MessageProducer`（或者在这种情况下，它本可以是一个\
    \ `TopicPublisher`）。\n\n****5.** 使用 `Session` 对象创建一个或多个任意类型的消息（这里我使用了 `TextMessage`）。创建后，用所需数据填充消息（在此示例中，使用\
    \ `setText()` 方法完成）。\n\n****6.** 使用 `MessageProducer.send()` 方法（或 `TopicPublisher.publish()`\
    \ 方法）向主题发送一条或多条消息。\n\n**清单 13-5.** *发送者类向主题发送消息*\n\n```java\npublic class Sender\
    \ {\n\n    @Resource(mappedName = \"jms/javaee6/ConnectionFactory\")\n    private\
    \ static ConnectionFactory connectionFactory;\n\n    @Resource(mappedName = \"\
    jms/javaee6/Topic\")\n    private static Topic topic;\n\n    public static void\
    \ main(String[] args) {\n        // 创建连接到队列所需的工件\n        Connection connection\
    \ = connectionFactory.createConnection();\n        Session session = connection.createSession(false,\n\
    \                Session.AUTO_ACKNOWLEDGE);\n\n        MessageProducer producer\
    \ = session.createProducer(topic);\n\n        // 向主题发送文本消息\n        TextMessage\
    \ message = session.createTextMessage();\n        message.setText(\"This is a\
    \ text message\");\n\n        producer.send(message);\n\n        connection.close();\n\
    \    }\n}\n```\n\n**消息消费者**\n\n客户端使用 `MessageConsumer` 从目的地接收消息。通过将 `Queue` 或\
    \ `Topic` 传递给 `Session` 的 `createConsumer()` 方法来创建 `MessageConsumer`。对于 P2P 模型，消息消费者可以实现\
    \ `QueueReceiver` 接口；对于发布-订阅模型，它可以实现 `TopicSubscriber`。\n\n![Image 120](img/index-403_1.jpg)\n\
    \n第 13 章 ■ 发送消息\n\n**373**\n\n消息传递本质上是异步的，即生产者和消费者之间没有时间依赖性。然而，客户端本身可以通过两种方式消费消息：\n\
    \n*   ***同步***：接收者通过调用 `receive()` 方法显式地从目的地获取消息。前面的示例使用了一个无限循环，该循环会阻塞直到消息到达。\n\
    *   ***异步***：接收者决定注册到消息到达时触发的事件。它必须实现 `MessageListener` 接口，每当消息到达时，提供者通过调用 `onMessage()`\
    \ 方法传递消息。\n\n图 13-9 说明了这两种类型的消费者。\n\n**图 13-9.** *同步和异步消费者*\n\n**同步投递**\n"
- fmt: "# 同步与异步消息接收\n\n## 同步接收\n\n同步接收者需要启动连接，循环等待消息到达，并使用其`receive()`方法请求到达的消息。`receive()`有几种变体，允许客户端轮询或等待下一条消息。以下步骤说明如何创建从主题消费消息的同步接收者（参见清单13-6）：\n\
    \n1. 使用注入（或JNDI查找）获取连接工厂和主题。\n2. 使用连接工厂创建`Connection`对象。\n3. 使用连接创建`Session`对象。\n\
    4. 使用`Session`对象创建`MessageConsumer`（在本例中也可以是`TopicSubscriber`）。\n5. 启动连接。\n6.\
    \ 循环并在消费者对象上调用`receive()`方法。如果队列为空，`receive()`方法会阻塞并等待消息到达。此处，无限循环等待其他消息到达。\n\
    7. 使用`TextMessage.getText()`方法处理`receive()`方法返回的消息（如果是文本消息）。\n\n**清单13-6.** *接收者以同步方式消费消息*\n\
    \n```java\npublic class Receiver {\n\n    @Resource(mappedName = \"jms/javaee6/ConnectionFactory\"\
    )\n    private static ConnectionFactory connectionFactory;\n\n    @Resource(mappedName\
    \ = \"jms/javaee6/Topic\")\n    private static Topic topic;\n\n    public static\
    \ void main(String[] args) {\n        // 创建连接到队列所需的工件\n        Connection connection\
    \ = connectionFactory.createConnection();\n        Session session = connection.createSession(false,\
    \ Session.AUTO_ACKNOWLEDGE);\n        MessageConsumer consumer = session.createConsumer(topic);\n\
    \        connection.start();\n\n        // 循环接收消息\n        while (true) {\n  \
    \          TextMessage message = (TextMessage) consumer.receive();\n         \
    \   System.out.println(\"Message received: \" + message.getText());\n        }\n\
    \    }\n}\n```\n\n## 异步传递\n\n异步消费基于事件处理。客户端可以注册一个实现`MessageListener`接口的对象（包括自身）。*消息监听器*是一个充当消息异步事件处理程序的对象。当消息到达时，提供者通过调用监听器的`onMessage()`方法来传递消息，该方法接受一个`Message`类型的参数。使用此事件模型，消费者无需无限循环来接收消息。MDB使用此事件模型。\n\
    \n以下步骤描述了创建异步消息监听器的过程（参见清单13-7）：\n\n1. 类实现`javax.jms.MessageListener`接口，该接口定义了一个名为`onMessage()`的方法。\n\
    2. 使用注入（或JNDI查找）获取连接工厂和目的地。\n3. 使用连接工厂创建`Connection`对象，使用连接创建`Session`对象，并使用`Session`对象创建`MessageConsumer`。\n\
    4. 调用`setMessageListener()`方法，传入`MessageListener`接口的实例（在清单13-7中，`Listener`类本身实现了`MessageListener`接口）。\n\
    5. 注册消息监听器后，调用`start()`方法开始监听消息到达。如果在注册监听器之前调用`start()`，则可能会丢失消息。\n6. 实现`onMessage()`方法并处理接收到的消息。每次消息到达时，提供者将调用此方法，并传入消息。\n\
    \n**清单13-7.** *消费者是一个消息监听器*\n\n```java\npublic class Listener implements MessageListener\
    \ {\n\n    @Resource(mappedName = \"jms/javaee6/ConnectionFactory\")\n    private\
    \ static ConnectionFactory connectionFactory;\n\n    @Resource(mappedName = \"\
    jms/javaee6/Topic\")\n    private static Topic topic;\n\n    public static void\
    \ main(String[] args) {\n        // 创建连接到队列所需的工件\n        Connection connection\
    \ = connectionFactory.createConnection();\n        Session session = connection.createSession(false,\
    \ Session.AUTO_ACKNOWLEDGE);\n        MessageConsumer consumer = session.createConsumer(topic);\n\
    \        consumer.setMessageListener(new Listener());\n        connection.start();\n\
    \    }\n\n    public void onMessage(Message message) {\n        System.out.println(\"\
    Message received: \" + ((TextMessage) message).getText());\n    }\n}\n```\n\n\
    ## 选择器\n\n某些消息传递应用程序需要过滤它们接收的消息。当消息广播给多个客户端时，设置条件以便仅由某些接收者消费变得非常有用。这消除了提供者将消息传输给不需要它们的客户端所浪费的时间和带宽。\n\
    \n您已经看到消息由三部分组成：标头、属性和正文。标头包含固定数量的字段（消息元数据），属性是一组自定义名称-值对，应用程序可以使用它们设置任何值。可以在这两个区域上进行选择。发送者设置一个或多个属性值或标头字段，接收者使用选择器表达式指定消息选择条件。只有匹配选择器的消息才会被传递。消息选择器将过滤消息的工作分配给JMS提供者，而不是应用程序。\n\
    \n消息选择器是一个包含表达式的字符串。表达式的语法基于SQL92条件表达式语法的子集，如下所示：\n\n```java\nsession.createConsumer(topic,\
    \ \"JMSPriority < 6\");\nsession.createConsumer(topic, \"JMSPriority < 6 AND orderAmount\
    \ < 200\");\nsession.createConsumer(topic, \"orderAmount BETWEEN 1000 AND 2000\"\
    );\n```\n\n在前面的代码中，创建了一个消费者，并传入了一个选择器字符串。此字符串可以使用标头字段（`JMSPriority < 6`）或自定义属性（`orderAmount\
    \ < 200`）。生产者按如下方式将这些属性设置到消息中：\n\n```java\nmessage.setIntProperty(\"orderAmount\"\
    , 1530);\nmessage.setJMSPriority(5);\n```\n\n选择器表达式可以使用逻辑运算符（`NOT`、`AND`、`OR`）、比较运算符（`=`、`>`、`>=`、`<`、`<=`、`<>`）、算术运算符（`+`、`-`、`*`、`/`）、表达式（`[NOT]\
    \ BETWEEN`、`[NOT] IN`、`[NOT] LIKE`、`IS [NOT] NULL`）等。\n\n## 可靠性机制\n\n您已经了解了如何连接到提供者、创建不同类型的消息、将它们发送到队列或主题、接收全部消息或使用选择器过滤它们。但是，如果您严重依赖JMS并需要确保可靠性，该怎么办？JMS定义了多个可靠性级别，以确保您的消息被传递，即使提供者崩溃或处于负载下，或者目的地充满了本应过期的消息。实现可靠消息传递的机制如下：\n\
    \n- *设置消息生存时间*：为消息设置过期时间，以便在消息过时时不传递它们。\n- *指定消息持久性*：指定消息在提供者故障时是持久的。\n- *控制确认*：指定各种级别的消息确认。\n\
    - *创建持久订阅者*：确保在发布-订阅模型中向不可用的订阅者传递消息。\n- *设置优先级*：设置传递消息的优先级。\n\n### 设置消息生存时间\n\n\
    在高负载下，可以为消息设置生存时间，以确保提供者在消息过时时将其从目的地中移除，可以通过使用`MessageProducer` API或设置`JMSExpiration`标头字段来实现。\n\
    \n`MessageProducer`有一个`setTimeToLive()`方法，该方法接受毫秒数，或者对每条消息使用`send()`方法：\n\n```java\n\
    MessageProducer producer = session.createProducer(topic);\nproducer.setTimeToLive(1000);\n\
    \n// 或者\nproducer.send(message, DeliveryMode.NON_PERSISTENT, 2, 1000);\n```"
  raw: 'A synchronous receiver needs to start a connection, loop to wait until a message
    arrives, and request the arrived message, using one of its receive() methods.
    There are several variations of receive() that allow a client to poll or wait
    for the next message. The following steps explain how you can create a synchronous
    receiver that consumes a message from a topic (see Listing 13-6):


    ****1.** Obtain a connection factory and a topic using injection (or JNDI lookup).


    ****2.** Create a Connection object using the connection factory.


    ****3.** Create a Session object using the connection.


    ****4.** Create a MessageConsumer (or in this case it could have been a TopicSubscriber)
    using the Session object.


    ****5.** Start the connection.


    ****6.** Loop and call the receive() method on the consumer object. The receive()
    method is blocked if the queue is empty and waits for a message to arrive. Here,
    the infinite loop waits for other messages to arrive.


    ****7.** Process the message returned by the receive() method using the TextMessage.


    getText() method (if it’s a text message).


    **374**


    Chapter 13 ■ SeNDING MeSSaGeS


    **Listing 13-6.** *The Receiver Consumes Messages in a Synchronous Manner*


    public class Receiver {


    @Resource(mappedName = "jms/javaee6/ConnectionFactory")


    private static ConnectionFactory connectionFactory;


    @Resource(mappedName = "jms/javaee6/Topic")


    private static Topic topic;


    public static void main(String[] args) {


    // Creates the needed artifacts to connect to the queue


    Connection connection = connectionFactory.createConnection();


    Session session = connection.createSession(false, ➥


    Session.AUTO_ACKNOWLEDGE);


    **MessageConsumer consumer = session.createConsumer(topic);**


    **connection.start();**


    // Loops to receive the messages


    while (true) {


    TextMessage message = (TextMessage) **consumer.receive()**;


    System.out.println("Message received: " + message.getText());


    }


    }


    }


    **Asynchronous Delivery**


    Asynchronous consumption is based on event handling. A client can register an
    object


    (including itself) that implements the MessageListener interface. A *message listener*
    is an object that acts as an asynchronous event handler for messages. As messages
    arrive, the provider delivers them by calling the listener’s onMessage() method,
    which takes one argument of type Message. With this event model, the consumer
    doesn’t need to loop indefinitely to receive a message. MDBs use this event model.


    The following steps describe the process used to create an asynchronous message
    listener (see Listing 13-7):


    ****1.** The class implements the javax.jms.MessageListener interface, which defines
    a single method called onMessage().


    ****2.** Obtain a connection factory and a destination using injection (or JNDI
    lookup).


    ****3.** Create a Connection object using the connection factory, create a Session
    object using the connection, and create a MessageConsumer using the Session object.


    ****4.** Call the setMessageListener() method, passing an instance of a MessageListener
    interface (in Listing 13-7, the Listener class itself implements the MessageListener


    interface).


    Chapter 13 ■ SeNDING MeSSaGeS


    **375**


    ****5.** After registering the message listener, call the start() method to start
    listening for message arrival. If you call start() before registering the listener,
    you are likely to miss messages.


    ****6.** Implement the onMessage() method and process the received message. Each
    time a message arrives, the provider will invoke this method, passing the message.


    **Listing 13-7.** *The Consumer Is a Message Listener*


    public class **Listener** implements **MessageListener** {


    @Resource(mappedName = "jms/javaee6/ConnectionFactory")


    private static ConnectionFactory connectionFactory;


    @Resource(mappedName = "jms/javaee6/Topic")


    private static Topic topic;


    public static void main(String[] args) {


    // Creates the needed artifacts to connect to the queue


    Connection connection = connectionFactory.createConnection();


    Session session = connection.createSession(false, ➥


    Session.AUTO_ACKNOWLEDGE);


    MessageConsumer consumer = session.createConsumer(topic);


    consumer. **setMessageListener(new Listener())**;


    connection.start();


    }


    public void **onMessage**(Message message) {


    System.out.println("Message received: " + ➥


    ((TextMessage) message).getText());


    }


    }


    **Selectors**


    Some messaging applications need to filter the messages they receive. When a message
    is broadcast to many clients, it becomes useful to set criteria so that it is
    only consumed by certain receivers. This eliminates both time and bandwidth the
    provider would waste transporting messages to clients that don’t need them.


    You’ve seen that messages are composed of three parts: header, properties, and
    body.


    The header contains a fixed number of fields (the message metadata), and the properties
    are a set of custom name-value pairs that the application can use to set any values.
    Selection can be done on those two areas. Senders set one or several property
    values or header fields, and the receiver specifies message selection criteria
    using selector expressions. Only messages that match the selector are delivered.
    Message selectors assign the work of filtering messages to the JMS provider, rather
    than to the application.


    **376**


    Chapter 13 ■ SeNDING MeSSaGeS


    A message selector is a string that contains an expression. The syntax of the
    expression is based on a subset of the SQL92 conditional expression syntax and
    looks like this:


    session.createConsumer(topic, " **JMSPriority < 6**");


    session.createConsumer(topic, " **JMSPriority < 6 AND orderAmount < 200**"); session.createConsumer(topic,
    " **orderAmount BETWEEN 1000 AND 2000**");


    In the preceding code, a consumer is created, passing a selector string. This
    string can use header fields (JMSPriority < 6) or custom properties (orderAmount
    < 200). The producer sets these properties into the message as follows:


    message.setIntProperty(" **orderAmount**", 1530);


    message.setJMSPriority(5);


    Selector expression can use logical operators (NOT, AND, OR), comparison operators
    (=, >,


    >=, <, <=, <>), arithmetic operators (+, -, *, /), expressions ([NOT] BETWEEN,
    [NOT] IN, [NOT] LIKE, IS


    [NOT] NULL), and so on.


    **Reliability Mechanisms**


    You’ve seen how to connect to a provider, create different types of messages,
    send them to queues or topics, and receive them all or filter them with selectors.
    But what if you rely heavily on JMS and need to ensure reliability? JMS defines
    several levels of reliability to ensure your message is delivered, even if the
    provider crashes or is under load, or if destinations are filled with messages
    that should have expired. The mechanisms for achieving reliable message delivery
    are as follows:


    • *Setting message time-to-live*: Set an expiration time on messages so they are
    not delivered if they are obsolete.


    • *Specifying message persistence*: Specify that messages are persistent in the
    event of a provider failure.


    • *Controlling acknowledgment*: Specify various levels of message acknowledgment.


    • *Creating durable subscribers*: Ensure messages are delivered to an unavailable
    subscriber in a pub-sub model.


    • *Setting priorities*: Set the priority for delivering a message.


    Setting Message time-to-Live


    Under heavy load, a time-to-live can be set on messages to ensure that the provider


    will remove them from the destination when they become obsolete, by either using
    the


    MessageProducer API or setting the JMSExpiration header field.


    The MessageProducer has a setTimeToLive() method that takes a number of milliseconds,


    or use the send() method for each message:


    MessageProducer producer = session.createProducer(topic);


    producer.setTimeToLive(**1000**);


    // or


    producer.send(message, DeliveryMode.NON_PERSISTENT, 2, **1000**);


