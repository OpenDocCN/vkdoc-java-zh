    Bean 中，而另一部分在 `faces-config.xml` 文件中。


    有一种情况使用 XML 配置非常有用；当多个页面上存在全局链接时（例如，可以在整个应用程序中执行的登录或注销），因为您不想为每个单独的页面定义它们。全局导航规则可以在
    XML 中使用（但托管 Bean 中无法实现相同的功能）：


    <navigation-rule>


    <from-view-id> *****</from-view-id>


    <navigation-case>


