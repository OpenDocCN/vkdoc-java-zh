    **MDB 模型**


    MDB 与会话 Bean 不同，因为它们不实现本地或远程业务接口，而是实现 `javax.jms.MessageListener`。客户端不能直接调用 MDB
    上的方法；然而，与会话 Bean 一样，MDB 拥有丰富的编程模型，包括生命周期、回调注解、拦截器、注入和事务。利用此模型可以为应用程序提供高水平的功能。


    重要的是要意识到 MDB 不属于新的 EJB Lite 模型，这意味着它们不能部署在简单的 Web 应用程序（war 文件中），但仍然需要企业级打包（ear
    归档）。


    开发 MDB 类的要求如下：


    -   该类必须使用 @javax.ejb.MessageDriven 或其 XML 等效项 在部署描述符中进行注解。

    -   该类必须直接或间接实现 `MessageListener` 接口。

