    em.persist(customer);\ntx.commit();\n```\n\n如果没有级联，客户会被持久化，但地址不会。只有当关系映射被修改时，才能实现事件的级联。注解`@OneToOne`、`@OneToMany`、`@ManyToOne`和`@ManyToMany`都有一个`cascade`属性，它接受一个要级联的事件数组，持久化事件可以被级联，也可以被移除（通常用于执行删除级联）。为此，必须修改`Customer`实体的映射（见清单4-21），并在`Address`上的`@OneToOne`注解中添加`cascade`属性。\n\
