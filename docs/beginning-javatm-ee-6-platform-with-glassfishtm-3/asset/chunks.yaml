- fmt: "# Unit Testing with JPA\n\nUnit testing, as a real database is needed to run\
    \ these tests. Testing in isolation with mock objects to simulate a database could\
    \ be a lot of work. Also, testing an entity outside of any container (EJB or servlet\
    \ container) would have an impact on the code, since transaction management has\
    \ to be changed. Using an in-memory database and non-JTA transactions are a good\
    \ compromise. CRUD operations and JPQL queries can be tested with a very lightweight\
    \ database that doesn’t need to run in a separated process (just by adding a jar\
    \ file to the classpath). This is how you will run our `BookTest` class, by using\
    \ the embedded mode of Derby.\n\nMaven uses two different directories, one to\
    \ store the main application code and another for the test classes. The `BookTest`\
    \ class, shown in Listing 2-7, goes under the `src/test/java` directory and tests\
    \ that the entity manager can persist a book and retrieve it from the database.\n\
    \n**Listing 2-7.** *Test Class That Creates a Book and Retrieves All the Books\
    \ from the Database*\n\n```java\npublic class BookTest {\n\n    private static\
    \ EntityManagerFactory emf;\n\n    private static EntityManager em;\n\n    private\
    \ static EntityTransaction tx;\n\n    @BeforeClass\n    public static void initEntityManager()\
    \ throws Exception {\n        emf = Persistence.createEntityManagerFactory(\"\
    chapter02PU\");\n        em = emf.createEntityManager();\n    }\n\n    @AfterClass\n\
    \    public static void closeEntityManager() throws SQLException {\n        em.close();\n\
    \        emf.close();\n    }\n\n    @Before\n    public void initTransaction()\
    \ {\n        tx = em.getTransaction();\n    }\n\n    @Test\n    public void createBook()\
    \ throws Exception {\n        // Creates an instance of book\n        Book book\
    \ = new Book();\n        book.setTitle(\"The Hitchhiker's Guide to the Galaxy\"\
    );\n        book.setPrice(12.5F);\n        book.setDescription(\"Science fiction\
    \ comedy book\");\n        book.setIsbn(\"1-84023-742-2\");\n        book.setNbOfPage(354);\n\
    \        book.setIllustrations(false);\n\n        // Persists the book to the\
    \ database\n        tx.begin();\n        em.persist(book);\n        tx.commit();\n\
    \n        assertNotNull(\"ID should not be null\", book.getId());\n\n        //\
    \ Retrieves all the books from the database\n        List<Book> books = em.createNamedQuery(\"\
    findAllBooks\").getResultList();\n        assertNotNull(books);\n    }\n}\n```\n\
    \nLike the `Main` class, `BookTest` needs to create an `EntityManager` instance\
    \ using an `EntityManagerFactory`. To initialize these components, you can use\
    \ the JUnit 4 fixtures. The `@BeforeClass` and `@AfterClass` annotations allow\
    \ executions of some code only once, before and after the class is executed. That’s\
    \ the perfect place to create and close an `EntityManager` instance. The `@Before`\
    \ annotation allows you to run code before each test, which is where you get a\
    \ transaction.\n\nThe `createBook()` method is the test case, as it is annotated\
    \ with the JUnit `@Test` annotation. This method persists a book (using the `EntityManager.persist()`\
    \ method) and checks whether the id has been automatically generated by EclipseLink\
    \ (with `assertNotNull`). If so, the `findAllBooks` named query is executed and\
    \ checks whether the returned list is null.\n\n## Persistence Unit for the BookTest\
    \ Class\n\nNow that the test class is written, you need another `persistence.xml`\
    \ file to use Derby embedded. The previous `persistence.xml` file defines a JDBC\
    \ driver and a URL connection for Derby Server, which has to be started in a separate\
    \ process. The `src/test/resources/META-INF/persistence.xml` in Listing 2-8 uses\
    \ an embedded JDBC driver.\n\n**Listing 2-8.** *persistence.xml File Used by the\
    \ BookTest Class*\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<persistence\
    \ version=\"1.0\" xmlns=\"http://java.sun.com/xml/ns/persistence\">\n    <persistence-unit\
    \ name=\"chapter02PU\" transaction-type=\"RESOURCE_LOCAL\">\n        <provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>\n\
    \        <class>com.apress.javaee6.chapter02.Book</class>\n        <properties>\n\
    \            <property name=\"eclipselink.target-database\" value=\"DERBY\"/>\n\
    \            <property name=\"eclipselink.jdbc.driver\" value=\"org.apache.derby.jdbc.EmbeddedDriver\"\
    />\n            <property name=\"eclipselink.jdbc.url\" value=\"jdbc:derby:chapter02DB;create=true\"\
    />\n            <property name=\"eclipselink.jdbc.user\" value=\"APP\"/>\n   \
    \         <property name=\"eclipselink.jdbc.password\" value=\"APP\"/>\n     \
    \       <property name=\"eclipselink.ddl-generation\" value=\"drop-and-create-tables\"\
    />\n            <property name=\"eclipselink.logging.level\" value=\"FINE\"/>\n\
    \        </properties>\n    </persistence-unit>\n</persistence>\n```\n\nThere\
    \ are other changes between the `persistence.xml` files. For example, the DDL\
    \ generation is `drop-and-create-tables` instead of `create-tables`, because before\
    \ testing you need the tables to be dropped and re-created so you have a fresh\
    \ database structure. Also note that the logging level is `FINE` instead of `INFO`.\
    \ Again, this is good for testing as you can obtain more information in case something\
    \ goes wrong.\n\n## Running the BookTest Class with Embedded Derby\n\nNothing\
    \ is easier than running the test: you rely on Maven. Open a console in the directory\
    \ where the `pom.xml` file is located and enter the following command:\n\n```\n\
    mvn test\n```\n\nBecause the logging level has been set to `FINE`, you should\
    \ see verbose information about Derby creating a database and tables in memory.\
    \ The `BookTest` class is then executed, and a Maven report should inform you\
    \ that the test is successful.\n\n```\nTests run: 1, Failures: 0, Errors: 0, Skipped:\
    \ 0, Time elapsed: 9.415 sec\n\nResults :\n\nTests run: 1, Failures: 0, Errors:\
    \ 0, Skipped: 0\n\n[INFO] ----------------------------------------------------------------\n\
    [INFO] BUILD SUCCESSFUL\n[INFO] ----------------------------------------------------------------\n\
    [INFO] Total time: 19 seconds\n[INFO] Finished\n[INFO] Final Memory: 4M/14M\n\
    [INFO] ----------------------------------------------------------------\n```\n\
    \n## Summary\n\nThis chapter contains a quick overview of JPA 2.0. Like most of\
    \ the other Java EE 6 specifications, JPA focuses on a simple object architecture,\
    \ leaving its ancestor, a heavyweight component model (a.k.a. EJB CMP 2.*x*),\
    \ behind. The chapter also covered entities, which are persistent objects that\
    \ use mapping metadata through annotations or XML.\n\nThanks to the “Putting It\
    \ All Together” section, you have seen how to run a JPA application with EclipseLink\
    \ and Derby. Unit testing is an important topic in projects, and with JPA and\
    \ in memory databases such as Derby, it is now very easy to test persistence.\n\
    \nIn the following chapters, you will learn more about the main JPA components.\
    \ Chapter 3 will show you how to map entities, relationships, and inheritance\
    \ to a database. Chapter 4 will focus on the entity manager API, the JQPL syntax,\
    \ and how to use queries and locking mechanisms. Chapter 5, the last chapter of\
    \ this JPA section, will explain the life cycle of entities and how to hook business\
    \ logic in callback methods in entities and listeners.\n\n---\n\n# Chapter 3:\
    \ Object-relational Mapping\n\nIn this chapter, I will go through the basics of\
    \ object-relational mapping (ORM), which is basically mapping entities to tables\
    \ and attributes to columns. I will then concentrate on more complex mappings\
    \ such as relationships, composition, and inheritance. A domain model is made\
    \ of objects interacting with each other. Objects and databases have different\
    \ ways to store relationship information (through pointers or foreign keys). Inheritance\
    \ is not a feature that relational databases naturally have, and therefore the\
    \ mapping is not as obvious. I will go into some detail and show examples that\
    \ will demonstrate how attributes, relationships, and inheritance are mapped from\
    \ a domain model to a database.\n\nPrevious chapters have shown how annotations\
    \ have been used extensively in the Enterprise Edition since Java EE 5 (mostly\
    \ on EJBs, JPA, and web services). JPA 2.0 follows this path and introduces new\
    \ mapping annotations as well as their XML equivalent. I will mostly use annotations\
    \ to explain the different mapping concepts, but I will also introduce XML mapping.\n\
    \n## How to Map an Entity"
