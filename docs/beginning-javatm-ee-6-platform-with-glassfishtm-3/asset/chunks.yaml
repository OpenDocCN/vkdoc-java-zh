    In Java EE, the API that deals with these concepts is called Java Message Service
    (JMS). It has a set of interfaces and classes that allow you to connect to a provider,
    create a message, send it, and receive it. JMS doesn’t actually carry messages;
    it requires a provider that is in charge of handling messages. When running in
    a container, Message-Driven Beans (MDBs)


    can be used to receive messages in a container-managed way.


    **JMS**


    JMS is a standard Java API that allows applications to create, send, receive,
    and read messages asynchronously. It defines a common set of interfaces and classes
    that allows programs to communicate with other message providers. JMS is analogous
    to JDBC: the latter connects to several databases (Derby, MySQL, Oracle, DB2,
    etc.), and JMS connects to several providers (OpenMQ, MQSeries, SonicMQ, etc.).


    The JMS API covers all the required functionality for messaging, that is, sending
    and


    receiving a message through destinations. It provides


    • *Message producers*: JMS provides the API for clients to generate the message
    (a.k.a.


    senders and publishers).


    • *Message consumers*: The API allows clients’ applications to consume messages
    (a.k.a.


    receivers or subscribers).


    • *Messages*: A message consists of a header, properties, and a body that contains
    different information (text, objects, etc.).


    • *Connections and destinations*: The API has several factories where connections
    to providers can be obtained, as well as destinations (queues and topics).


