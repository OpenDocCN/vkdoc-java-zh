    **关系映射**


    面向对象编程的世界充满了类以及类之间的关联。这些关联是结构性的，它们将一种类型的对象链接到另一种类型的对象，允许一个对象促使另一个对象代表其执行操作。类之间可以存在多种类型的关联。


    首先，关联具有方向性。它可以是*单向的*（即一个对象可以导航到另一个对象），也可以是*双向的*（即一个对象可以导航到另一个对象，反之亦然）。在 Java 中，你使用点（.）语法来导航对象。例如，当你编写
    `customer.getAddress().getCountry()` 时，你从 Customer 对象导航到 Address，然后再导航到 Country。


    在统一建模语言（UML）中，为了表示两个类之间的单向关联，你使用箭头来指示方向。在图 3-6 中，Classe1（源）可以导航到 Classe2（目标），但反之则不行。


    **图 3-6.** *两个类之间的单向关联*


    为了表示双向关联，不使用箭头。如图 3-7 所示，Class1 可以导航到 Classe2，反之亦然。在 Java 中，这表示为 Class1 拥有一个 Classe2
    类型的属性，而 Class2 拥有一个 Class1 类型的属性。


    **图 3-7.** *两个类之间的双向关联*


    ![Image 35](img/index-119_1.jpg)


    ![Image 36](img/index-119_2.jpg)


    第 3 章 ■ 对象关系映射


    **89**


    关联还具有*多重性*（或*基数*）。关联的每一端都可以指定有多少个引用对象参与该关联。图 3-8 中的 UML 图显示一个 Class1 引用零个或多个 Class2
    实例。


    **图 3-8.** *类关联上的多重性*


    在 UML 中，基数是一个介于最小数量和最大数量之间的范围。因此，`0..1` 表示你至少会有零个对象，最多一个对象。`1` 表示你只有一个且仅有一个实例。`1..*`
    表示你可以有一个或多个实例，而 `3..6` 表示你有一个介于三个和六个对象之间的范围。在 Java 中，表示多个对象的关联使用 `java.util.Collection`、`java.util.Set`、`java.util.List`
    甚至 `java.util.Map` 等集合。


    关系具有所有权（即关系的所有者）。在单向关系中，所有权是隐含的：在图 3-6 中，毫无疑问所有者是 Class1，但在双向关系中，如图 3-7 所示，必须显式指定所有者。然后，你展示拥有方（指定物理映射）和反向方（非拥有方）。


