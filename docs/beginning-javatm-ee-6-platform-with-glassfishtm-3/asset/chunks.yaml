    \n### 使用`web.xml`进行配置\n\nWeb应用程序通常使用`web.xml`部署描述符进行配置。之所以说“通常”，是因为随着新的Servlet\
    \ 3.0规范的出现，`web.xml`文件已变为可选。但由于JSF 2.0基于Servlet 2.5（而非Servlet 3.0），你仍然需要使用描述符来部署你的Web应用程序。\n\
    \nJSF应用程序需要一个名为`FacesServlet`的Servlet，它充当整个应用程序的前端控制器。此Servlet必须在`web.xml`文件中定义并添加映射，如清单10-8所示。\n\
    \n**清单10-8.** *声明`FacesServlet`的`web.xml`文件*\n\n```xml\n<?xml version='1.0' encoding='UTF-8'?>\n\
    <web-app version=\"2.5\"\n         xmlns=\"http://java.sun.com/xml/ns/javaee\"\
    \n         xsi:schemaLocation=\"http://java.sun.com/xml/ns/javaee\n         http://java.sun.com/xml/ns/javaee/web-app_2_5.xsd\"\
    >\n<servlet>\n<servlet-name>Faces Servlet</servlet-name>\n<servlet-class>javax.faces.webapp.FacesServlet</servlet-class>\n\
    <load-on-startup>1</load-on-startup>\n</servlet>\n<servlet-mapping>\n<servlet-name>Faces\
    \ Servlet</servlet-name>\n<url-pattern>*.faces</url-pattern>\n</servlet-mapping>\n\
    </web-app>\n```\n\n部署描述符将以`.faces`结尾的URL请求映射到该Servlet，这意味着任何以`.faces`扩展名请求的页面都将由`FacesServlet`处理。\n\
    \n### 使用Maven编译和打包\n\nWeb应用程序需要被编译并打包成一个`war`文件（`<packaging>war</packaging>`）。清单10-9中所示的`pom.xml`声明了编译代码所需的所有依赖项（`jsf-api`、`javax.ejb`和`javax.persistence`），并使用JDK\
    \ 1.6版本。在JSF 2.0中，`faces-config.xml`文件已变为可选。\n\n**清单10-9.** *用于编译和打包Web应用程序的Maven\
    \ `pom.xml`文件*\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<project\
    \ xmlns=\"http://maven.apache.org/POM/4.0.0\"\n         xsi:schemaLocation=\"\
    http://maven.apache.org/POM/4.0.0\n         http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
    >\n<modelVersion>4.0.0</modelVersion>\n<groupId>com.apress.javaee6</groupId>\n\
    <artifactId>chapter10</artifactId>\n<packaging>war</packaging>\n<version>1.0</version>\n\
    <dependencies>\n<dependency>\n<groupId>javax.faces</groupId>\n<artifactId>jsf-api</artifactId>\n\
    <version>2.0.0</version>\n<scope>provided</scope>\n</dependency>\n<dependency>\n\
    <groupId>org.glassfish</groupId>\n<artifactId>javax.ejb</artifactId>\n<version>3.0</version>\n\
    <scope>provided</scope>\n</dependency>\n<dependency>\n<groupId>org.eclipse.persistence</groupId>\n\
    <artifactId>javax.persistence</artifactId>\n<version>1.1.0</version>\n<scope>provided</scope>\n\
    </dependency>\n</dependencies>\n<build>\n<plugins>\n<plugin>\n<groupId>org.apache.maven.plugins</groupId>\n\
    <artifactId>maven-compiler-plugin</artifactId>\n<inherited>true</inherited>\n\
    <configuration>\n<source>1.6</source>\n<target>1.6</target>\n</configuration>\n\
    </plugin>\n</plugins>\n</build>\n</project>\n```\n\n要编译和打包这些类，请在包含`pom.xml`文件的目录中打开命令行解释器，并输入以下Maven命令：\n\
    \n```\nmvn package\n```\n\n转到`target`目录，找到`chapter10-1.0.war`文件。打开它，你会看到它包含`Book`实体、`BookEJB`、`BookController`托管bean、两个部署描述符（`persistence.xml`和`web.xml`）以及两个网页（`newBook.xhtml`和`listBooks.xhtml`）。\n\
    \n### 部署到GlassFish\n\nWeb应用程序打包后，需要部署到GlassFish。确保GlassFish已启动并正在运行，并且由于应用程序将数据存储在数据库中，请检查Derby是否正在运行并监听其默认端口。打开DOS控制台，转到`chapter10-1.0.war`文件所在的`target`目录，然后输入以下命令：\n\
    \n```\nasadmin deploy chapter10-1.0.war\n```\n\n如果部署成功，以下命令应返回已部署应用程序的名称及其类型。有两种类型：`web`，因为它是一个Web应用程序；以及`ejb`，因为该应用程序包含一个EJB：\n\
    \n```\nasadmin list-components\nchapter10-1.0 <ejb, web>\n```\n\n### 运行示例\n\n\
    现在应用程序已部署，打开浏览器并访问以下URL：\n\n```\nhttp://localhost:8080/chapter10-1.0/newBook.faces\n\
    ```\n\n浏览器指向的是`newBook.faces`，而不是`newBook.xhtml`，这是因为你为`FacesServlet`使用了映射。通过`.faces`扩展名，JSF知道它必须在渲染页面之前处理该页面。当`newBook`页面显示后，输入一些数据，然后点击提交按钮，将被重定向到`listBooks`页面。\n\
    \n### 总结\n\n如今，随着富桌面应用程序（RDA）、富互联网应用程序（RIA）、移动设备应用程序等的激增，用户界面之间的竞争仍在继续。几年前，JSF加入了这场竞争，而今天，凭借JSF\
    \ 2.0的新特性，它已经站稳了脚跟。\n\nJSF拥有基于组件的架构和丰富的API，用于开发渲染器、转换器、验证器等。它可以渲染和转换多种语言，JSF 2.0的首选表示声明语言（PDL）是Facelets。\n\
