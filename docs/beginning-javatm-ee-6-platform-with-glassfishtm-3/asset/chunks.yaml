- fmt: "# Interprets each file found in the semicolon-separated list of paths as a\
    \ Facelets tag library.\n\n## `FacesContext`\n\nJSF defines the `javax.faces.context.FacesContext`\
    \ abstract class for representing the contextual information associated with processing\
    \ an incoming request and creating the corresponding response. This is the class\
    \ that allows interaction with the UI and the rest of the JSF environment.\n\n\
    To gain access, you can either use the implicit `facesContext` object in your\
    \ pages (see the previous chapter for discussion of implicit objects) or obtain\
    \ a reference in your managed beans using the static method `getCurrentInstance()`.\
    \ This will return the `FacesContext` instance for the current thread, and then\
    \ you can invoke the methods listed in Table 12-2.\n\n**Table 12-2.** *Some Methods\
    \ of the `FacesContext`*\n\n| Method | Description |\n| --- | --- |\n| `addMessage`\
    \ | Appends an error message. |\n| `getApplication` | Returns the `Application`\
    \ instance associated with this web application. |\n| `getAttributes` | Returns\
    \ a `Map` representing the attributes associated with the `FacesContext` instance.\
    \ |\n| `getCurrentInstance` | Returns the `FacesContext` instance for the request\
    \ that is being processed by the current thread. |\n| `getMaximumSeverity` | Returns\
    \ the maximum severity level recorded on any `FacesMessage` that has been queued.\
    \ |\n| `getMessages` | Returns a collection of `FacesMessage`. |\n| `getViewRoot`\
    \ | Returns the root component that is associated with the request. |\n| `release`\
    \ | Releases any resources associated with this `FacesContext` instance. |\n|\
    \ `renderResponse` | Signals the JSF implementation that, as soon as the current\
    \ phase of the request-processing life cycle has been completed, control should\
    \ be passed to the *Render response* phase, bypassing any phases that have not\
    \ been executed yet. |\n| `responseComplete` | Signals the JSF implementation\
    \ that the HTTP response for this request has already been generated (such as\
    \ an HTTP redirect), and that the request-processing life cycle should be terminated\
    \ as soon as the current phase is completed. |\n\n## `FacesConfig`\n\nThe `FacesServlet`\
    \ is internal to JSF implementations, and though you don’t have access to its\
    \ code, you do require metadata to configure it. By now, you may be accustomed\
    \ to the two possible choices of metadata in Java EE 6: annotations and XML deployment\
    \ descriptors (`/WEB-INF/faces-config.xml`). Before JSF 2.0, the only choice was\
    \ XML; today managed beans, converters, event listeners, renderers, and validators\
    \ can have annotations, as using XML configuration files has become optional.\n\
    \nI mostly recommended annotations, but to show an extract of what a `faces-config.xml`\
    \ file looks like, the example in Listing 12-2 defines a locale and a message\
    \ bundle for internationalization and some navigation rules. Soon you will see\
    \ how to navigate with and without `faces-config.xml`.\n\n**Listing 12-2.** *Snippet\
    \ of a `faces-config.xml` File*\n\n```xml\n<?xml version='1.0' encoding='UTF-8'?>\n\
    <faces-config\n    xmlns=\"http://java.sun.com/xml/ns/javaee\"\n    xsi:schemaLocation=\"\
    http://java.sun.com/xml/ns/javaee\n                        http://java.sun.com/xml/ns/javaee/web-facesconfig_2_0.xsd\"\
    \n    version=\"2.0\">\n    <application>\n        <locale-config>\n         \
    \   <default-locale>fr</default-locale>\n        </locale-config>\n        <resource-bundle>\n\
    \            <base-name>messages</base-name>\n            <var>msg</var>\n   \
    \     </resource-bundle>\n    </application>\n    <navigation-rule>\n        <from-view-id>*</from-view-id>\n\
    \        <navigation-case>\n            <from-outcome>doCreateBook-sucess</from-outcome>\n\
    \            <to-view-id>/listBooks.htm</to-view-id>\n        </navigation-case>\n\
    \    </navigation-rule>\n</faces-config>\n```\n\n## Managed Beans\n\nAs noted\
    \ earlier in this chapter, the MVC pattern encourages separation between the model,\
    \ the view, and the controller: JSF pages form the view and the `FacesServlet`\
    \ the controller. Managed beans are the gateway to the model.\n\nManaged beans\
    \ are annotated Java classes and are central to web applications. They can"
