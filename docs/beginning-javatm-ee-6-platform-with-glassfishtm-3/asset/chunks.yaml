    \ the persistence providers will map this enumerated type to the database assuming\
    \ that the column is of type `Integer`. Looking at the code in Listing 3-22, you\
    \ see a `CreditCard` entity that uses the previous enumeration with the default\
    \ mapping.\n\n## Listing 3-22. Mapping an Enumerated Type with Ordinals\n\n```java\n\
    @Entity\n@Table(name = \"credit_card\")\npublic class CreditCard {\n    @Id\n\
    \    private String number;\n    private String expiryDate;\n    private Integer\
    \ controlNumber;\n    private CreditCardType creditCardType;\n    // Constructors,\
    \ getters, setters\n}\n```\n\nBecause the defaults are applied, the enumeration\
    \ will get mapped to an integer column, and it will work fine. But imagine introducing\
    \ a new constant to the top of the enumeration.\n\nBecause ordinal assignment\
    \ is determined by the order in which values are declared, the values already\
    \ stored in the database will no longer match the enumeration. A better solution\
    \ would be to store the name of the value as a string instead of storing the ordinal.\
    \ You can do this by adding an `@Enumerated` annotation to the attribute and specifying\
    \ a value of `STRING` (`ORDINAL` is the default value), as shown in Listing 3-23.\n\
    \n## Listing 3-23. Mapping an Enumerated Type with String\n\n```java\n@Entity\n\
    @Table(name = \"credit_card\")\npublic class CreditCard {\n    @Id\n    private\
    \ String number;\n    private String expiryDate;\n    private Integer controlNumber;\n\
    \    @Enumerated(EnumType.STRING)\n    private CreditCardType creditCardType;\n\
    \    // Constructors, getters, setters\n}\n```\n\nNow the `CreditCardType` database\
    \ column will be of type `VARCHAR` and a Visa card will be stored with the string\
    \ `\"VISA\"`.\n\n## Access Type\n\nUntil now I have shown you annotated classes\
    \ (`@Entity` or `@Table`) and attributes (`@Basic`, `@Column`, `@Temporal`, etc.),\
    \ but the annotations applied on an attribute (or field access) can also be set\
    \ on the corresponding getter method (or property access). For example, the annotation\
    \ `@Id` can be set on the `id` attribute or on the `getId()` method. As this is\
    \ largely a matter of personal preference, I tend to use property access (annotate\
    \ the getters), as I find the code more readable. This allows me to quickly read\
    \ the attributes of an entity without drowning in annotations. In this book, for\
    \ easy readability, I’ve decided to annotate the attributes. But in some cases,\
    \ for example, with inheritance, it is not simply a matter of personal taste,\
    \ as it can have an impact upon your mapping.\n\n> **Note:** Java defines a field\
    \ as an instance attribute. A property is any field with accessor (getter and\
    \ setter) methods that follow the Java bean pattern (starts with `getXXX`, `setXXX`,\
    \ or `isXXX` for a `Boolean`).\n\nWhen choosing between field access (getters)\
    \ or property access (attributes), you are specifying *access type*. By default,\
    \ a single access type applies to an entity: it is either field access or property\
    \ access, but not both. The specification states that the behavior of an application\
    \ that mixes the placement of annotations on fields and properties without explicitly\
    \ specifying the access type is undefined.\n\nWhen field-based access is used\
    \ (see Listing 3-24), the persistence provider maps the attributes. All nontransient\
    \ instance variables that are not annotated with the `@Transient` annotation are\
    \ persistent.\n\n## Listing 3-24. The Customer Entity with Annotated Fields\n\n\
    ```java\n@Entity\npublic class Customer {\n    @Id @GeneratedValue\n    private\
    \ Long id;\n    @Column(name = \"first_name\", nullable = false, length = 50)\n\
    \    private String firstName;\n    @Column(name = \"last_name\", nullable = false,\
    \ length = 50)\n    private String lastName;\n    private String email;\n    @Column(name\
    \ = \"phone_number\", length = 15)\n    private String phoneNumber;\n    // Constructors,\
    \ getters, setters\n}\n```\n\nWhen property-based access is used, as shown in\
    \ Listing 3-25, the persistence provider accesses persistent state via the getter\
    \ methods, and the mapping is based on the getters rather than the attributes.\
    \ All getters not annotated with the `@Transient` annotation are persistent.\n\
    \n## Listing 3-25. The Customer Entity with Annotated Properties\n\n```java\n\
    @Entity\npublic class Customer {\n    private Long id;\n    private String firstName;\n\
    \    private String lastName;\n    private String email;\n    private String phoneNumber;\n\
    \    // Constructors\n    @Id @GeneratedValue\n    public Long getId() {\n   \
    \     return id;\n    }\n    public void setId(Long id) {\n        this.id = id;\n\
    \    }\n    @Column(name = \"first_name\", nullable = false, length = 50)\n  \
    \  public String getFirstName() {\n        return firstName;\n    }\n    public\
    \ void setFirstName(String firstName) {\n        this.firstName = firstName;\n\
    \    }\n    @Column(name = \"last_name\", nullable = false, length = 50)\n   \
    \ public String getLastName() {\n        return lastName;\n    }\n    public void\
    \ setLastName(String lastName) {\n        this.lastName = lastName;\n    }\n \
    \   public String getEmail() {\n        return email;\n    }\n    public void\
    \ setEmail(String email) {\n        this.email = email;\n    }\n    @Column(name\
    \ = \"phone_number\", length = 15)\n    public String getPhoneNumber() {\n   \
    \     return phoneNumber;\n    }\n    public void setPhoneNumber(String phoneNumber)\
    \ {\n        this.phoneNumber = phoneNumber;\n    }\n}\n```\n\nIn terms of mapping,\
    \ the two entities in Listings 3-24 and 3-25 are completely identical because\
    \ the attribute names happen to be the same as the getter names. But instead of\
    \ using the default access type, you can explicitly specify the type by means\
    \ of the `@javax.persistence.Access` annotation.\n\nThis annotation takes two\
    \ possible values, `FIELD` or `PROPERTY`, and can be used on the entity itself\
    \ and/or on each attribute or getter. For example, when an `@Access(AccessType.FIELD)`\
    \ is applied to the entity, only mapping annotations placed on the attributes\
    \ will be taken into account by the persistence provider. It is then possible\
    \ to selectively designate individual getters for property access with `@Access(AccessType.PROPERTY)`.\n\
    \nExplicit access types can be very useful (for example, with embeddables and\
    \ inheritance) but mixing them often results in errors. Listing 3-26 shows an\
    \ example of what might happen when you mix access types.\n\n## Listing 3-26.\
    \ The Customer Entity That Explicitly Mixes Access Types\n\n```java\n@Entity\n\
    @Access(AccessType.FIELD)\npublic class Customer {\n    @Id @GeneratedValue\n\
    \    private Long id;\n    @Column(name = \"first_name\", nullable = false, length\
    \ = 50)\n    private String firstName;\n    @Column(name = \"last_name\", nullable\
    \ = false, length = 50)\n    private String lastName;\n    private String email;\n\
    \    @Column(name = \"phone_number\", length = 15)\n    private String phoneNumber;\n\
    \    // Constructors, getters, setters\n    @Access(AccessType.PROPERTY)\n   \
    \ @Column(name = \"phone_number\", length = 555)\n    public String getPhoneNumber()\
    \ {\n        return phoneNumber;\n    }\n    public void setPhoneNumber(String\
    \ phoneNumber) {\n        this.phoneNumber = phoneNumber;\n    }\n}\n```\n\nThis\
    \ example explicitly defines the access type as being `FIELD` at the entity level.\
    \ This indicates to the persistence manager that it should only process annotations\
    \ on attributes. The `phoneNumber` attribute is annotated with `@Column`, which\
    \ restricts its length to 15. Reading this code, you expect to end up with a `VARCHAR(15)`\
    \ in the database, but this is not what happens. The getter method shows the access\
    \ type for the `getPhoneNumber()` method has been explicitly changed, and so has\
    \ the length of the phone number (to 555). In this case, the entity `AccessType.FIELD`\
    \ is overwritten by `AccessType.PROPERTY`. You will then get a `VARCHAR(555)`\
    \ in the database.\n\n## Collection of Basic Types"
