    \ type=\"text\" \nonblur=\"javascript:priceRequired()\"/>\n<span id=\"priceError\"\
    />\n</td>\n</tr>\n<tr>\n<td>Description :</td>\n<td><textarea name=\"textarea\"\
    \ cols=\"20\" rows=\"5\"></textarea></td>\n</tr>\n<tr>\n<td>Number of pages :</td>\n\
    <td><input type=\"text\"/></td>\n</tr>\n<tr>\n<td>Illustrations :</td>\n<td><input\
    \ type=\"checkbox\"/></td>\n</tr>\n</table>\n<input name=\"\" type=\"submit\"\
    \ value=\"Create\"/>\n<hr/>\n<i>APress - Beginning Java EE 6</i>\n</body>\n</html>\n\
    ```\n\nIn Listing 11-4, the `priceRequired()` `JavaScript` function is embedded\
