    EJB 3.1 introduces the brand-new singleton session bean, which follows the singleton
    design pattern. Once instantiated, the container makes sure there is only one
    instance of a singleton for the duration of the application. An instance is shared
    between several clients, as shown in Figure 7-4. Singletons maintain their state
    between client invocations.


    **Figure 7-4.** *Clients accessing a singleton bean*


    > **Note** Singletons are not cluster-aware. A cluster is a group of containers
    that work together closely (sharing the same resources, EJBs, and so on). So,
    in cases where there are several distributed containers clustered together over
    several machines, each container will have its own instance of the singleton.


    To turn the code in Listing 7-4 from a singleton Java class to a singleton session
    bean (see Listing 7-5), there is not much to do. In fact, you just need to annotate
    a class with `@Singleton` and not worry about the private constructor or the static
    `getInstance()` method. The container will make sure only one instance is created.
    The `@javax.ejb.Singleton` annotation has the same API as the `@Stateless` annotation
    described earlier in Listing 7-2.


    **Listing 7-5.** *Singleton Session Bean*


    ```java

    @Singleton

    public class CacheEJB {


    private Map<Long, Object> cache = new HashMap<Long, Object>();


    public void addToCache(Long id, Object object) {

    if (!cache.containsKey(id))

    cache.put(id, object);

    }


    public void removeFromCache(Long id) {

    if (cache.containsKey(id))

    cache.remove(id);

    }


    public Object getFromCache(Long id) {

    if (cache.containsKey(id))

    return cache.get(id);

    else

    return null;

    }

    }

    ```


    **198**


    Chapter 7 ■ SeSSION BeaNS aND the tIMer SerVICe


    As you can see, stateless, stateful, and singleton session beans are very easy
    to develop: you just need one annotation. Singletons though have a bit more to
    them. They can be initialized at startup, be chained together, and have their
    concurrency access customized.


    ## Initialization


    When a client class needs to access a method on a singleton session bean, the
    container makes sure to either instantiate it or use the one already living in
    the container. However, sometimes initializing a singleton can be time consuming.
    Imagine if `CacheEJB` (shown previously in Listing 7-5) needs to access a database
    to load its cache with thousands of objects. The first call to the bean will be
    expensive, and the first client will have to wait for initialization to be completed.


    To avoid such latency, you can ask the container to initialize a singleton bean
    at startup. If the `@Startup` annotation appears on the bean class, the container
    initializes it during the application startup, not when a client invokes it. The
    following code shows you how to use the annotation:


    ```java

    @Singleton

    @Startup

    public class CacheEJB {

    // ...

    }

    ```


    ## Chaining Singletons


    In some cases, when you have several singleton beans, explicit initialization
    ordering can be important. Imagine if the `CacheEJB` needs to store data that
    comes from another singleton bean (let’s say a `CountryCodeEJB` that returns all
    the ISO country codes). The `CountryCodeEJB`'
