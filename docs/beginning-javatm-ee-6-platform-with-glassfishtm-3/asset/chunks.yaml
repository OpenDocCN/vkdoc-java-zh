    SOAP 1.0 由微软于 1998 年启动，最终于 1999 年底发布，并在 XML Schema 中建模了类型化引用和数组。到 2000 年，IBM 开始着手开发
    SOAP 1.1，而 WSDL 于 2001 年提交给 W3C。UDDI 由结构化信息标准促进组织（OASIS）于 2000 年编写，旨在允许企业发布和发现
    Web 服务。随着 SOAP、WSDL 和 UDDI 的到位，创建 Web 服务的事实标准已在主要 IT 公司的支持下诞生。


    Java 于 2002 年 6 月通过基于 XML 的 RPC 1.0 的 Java API（JAX-RPC 1.0）引入了 Web 服务功能，并于 2003
    年将 JAX-RPC 1.1 添加到 J2EE 1.4 中。该规范非常冗长且不易使用。随着 Java EE 5 的到来，全新的基于 XML 的 Web 服务
    2.0 的 Java API（JAX-WS 2.0）规范被引入，作为首选的 Web 服务模型。如今，Java EE 6 随附了 JAX-WS 2.2。


    **Java EE 规范**


    要掌握所有 Web 服务标准，您需要花些时间阅读来自 W3C、JCP 和 OASIS 的一系列规范。


    W3C 是一个开发和维护 Web 技术（如 HTML、XHTML、RDF、CSS 等）的联盟，并且更有趣的是，它还负责 Web 服务相关的 XML、XML
    Schema、SOAP 和 WSDL。


    OASIS 托管了多个 Web 服务相关标准，例如 UDDI、WS-Addressing、WS-Security、WS-Reliability 等。


    回到 Java，JCP 拥有一系列属于 Java EE 6 和 Java SE 6 的规范。它们包括 JAX-WS（JSR 224）、Web Services
    1.2（JSR 109）、JAXB 2.2（JSR 222）、Web Services Metadata 2.0（JSR 181）和 JAXR 1.0（JSR
    93）。这些规范通常被非正式地统称为 Java Web 服务（JWS）。


    起初，这些规范列表可能会让您觉得用 Java 编写 Web 服务会很困难，尤其是在理解这些 API 方面。然而，


    第 14 章 ■ SOap WeB SerVICeS


    **397**


    其美妙之处在于，您无需担心底层技术（XML、WSDL、SOAP、HTTP 等），因为仅需几个 JWS 标准就能为您完成工作。


    **JAX-WS 2.2**


    JAX-WS（JSR 224）是 JAX-RPC 的新名称。JAX-RPC 已在 Java EE 6 中被精简，这意味着它提议从 Java EE 7 中移除。


    JAX-WS 2.2 定义了一组 API 和注解，允许您使用 Java 构建和使用 Web 服务。它提供了消费者和服务设施，通过 SOAP 发送和接收 Web
    服务请求，从而屏蔽了协议的复杂性。因此，消费者和服务都不需要生成或解析 SOAP 消息，因为 JAX-WS 处理了底层细节。JAX-WS 规范依赖于其他规范，例如用于
    XML 绑定的 Java 架构（JAXB）。


    **Web Services 1.2**


    JSR 109（“实现企业 Web 服务”）定义了 Java EE 容器中 Web 服务的编程模型和运行时行为。它还定义了打包方式，以确保 Web 服务在应用服务器实现之间的可移植性。


    **JAXB 2.2**


    Web 服务通过交换 XML 消息来发送请求和响应。在 Java 中，有几种底层 API 用于处理 XML 文档和 XML Schema。JAXB 规范提供了一组
    API 和注解，用于将 XML 文档表示为 Java 构件，允许开发人员使用代表 XML 文档的 Java 对象进行工作。JAXB（JSR 222）简化了将
    XML 文档解组为对象以及将对象编组回 XML 文档的过程。即使 JAXB 可用于任何 XML 目的，它也与 JAX-WS 紧密集成。


    **WS-Metadata 2.0**


    Web 服务元数据（WS-Metadata，规范 JSR 181）提供了便于定义和部署 Web 服务的注解。JSR 181 的主要目标是简化 Web 服务的开发。它通过注解提供了
    WSDL 与 Java 接口之间的映射功能，反之亦然。这些注解可以在简单的 Java 类或 EJB 中使用。

