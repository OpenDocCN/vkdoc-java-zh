    ## 消息传递规范概述


    Java中的消息传递主要由JMS代表，JMS可用于在标准（Java SE）或企业（Java EE）环境中运行的应用程序。MDB是JMS消费者的企业扩展，并绑定到EJB规范。


    ### 消息传递简史


    直到20世纪80年代末，公司还没有简单的方法来连接不同的应用程序。开发人员必须为系统编写单独的软件适配器，以将数据从源应用程序转换为目标系统能够理解的格式（反之亦然）。


    由于服务器处理能力和可用性的差异，创建了缓冲区来暂缓处理。缺乏统一的传输协议导致了低级协议适配器的出现。到20世纪80年代末，中间件开始出现，解决了这些集成问题。第一批MOM被创建为独立的软件，可以位于应用程序中间，管理系统之间的“管道”。它们能够管理不同的平台、不同的编程语言、各种网络协议和多样化的硬件。


    ### JMS 1.1


    JMS规范于1998年8月首次发布。它由主要的中间件供应商创建，旨在将消息传递功能引入Java。JSR 914经历了一些小改动（JMS 1.0.1、1.0.2和1.0.2b），最终于2002年4月达到1.1版本。自那时起，该规范没有发生变化。JMS
    1.1被集成到J2EE 1.2中，并从此成为Java EE的一部分。然而，JMS和MDB不属于我在第一章中描述的Web Profile规范。这意味着它们将在实现完整Java
    EE 6平台的应用程序服务器上可用。


    尽管JMS是一个冗长且低级的API，但它做得非常好。不幸的是，它在Java EE 5和Java EE 6中都没有得到更改或改进。


    ### EJB 3.1


    MDB在EJB 2.0中被引入，并在EJB 3.0和Java EE 5的“易用性”范式中得到改进。它们内部没有修改，因为它们仍然是消息消费者，但注解和通过异常进行配置的引入使它们更容易编写。新的EJB
    3.1规范（JSR 318）对MDB没有显著变化。


    如你在第7章中所见，无状态会话Bean现在可以实现异步调用（使用`@Asynchronous`注解），并且EJB中不允许使用线程。在Java EE的早期版本中，EJB之间不可能进行异步调用。因此，唯一可行的解决方案是使用JMS和MDB——这代价高昂，因为仅仅为了异步调用一个方法，就必须使用大量资源（JMS目的地、连接、工厂等）。


    如今，使用EJB 3.1，会话Bean之间可以进行异步调用，这使得MDB能够用于它们最初创建的目的：通过消息传递集成系统。


