    - The class must be defined as `public`, and it must not be `final` nor `abstract`.

    - The class must have a default public constructor.

    - The class must not define the `finalize()` method.

    - A service must be a stateless object and should not save client-specific state
    across method calls.


    The WS-Metadata specification (JSR 181) says that, as long as it meets these requirements,
    a POJO can be used to implement a web service deployed to the servlet container.
    This is commonly referred to as a *servlet endpoint*. A stateless session bean
    can also be used to implement a web service that will be deployed in an EJB container
    (a.k.a. an EJB endpoint).


    ## Web Service Endpoints


    JAX-WS 2.2 allows both regular Java classes and stateless EJBs to be exposed as
    web services.


    Referring to the code for a POJO (Listing 14-1) and for an EJB web service (Listing
    14-18) reveals hardly any differences, with the exception that the EJB web service
    has the extra annotation, `@Stateless`, although the packaging is different. A
    POJO web service is packaged in a web module (in a `war` file) and is called a
    servlet endpoint, whereas an EJB web service is packaged in a `jar` file and is
    called an EJB endpoint. One is deployed in a servlet container and the other in
    an EJB container.


    Both endpoints have almost identical behavior, but a few extra benefits are gained
    from using EJB endpoints. As the web service is also an EJB, the benefits of transaction
    and security managed by the container are automatic, and interceptors can be used,
    which is not possible with servlet endpoints. The business code can be exposed
    as a web service and as an EJB at the same time, meaning that the business logic
    can be exposed through SOAP and also through RMI by adding a remote interface.


    ## Annotations


    At the service level, systems are defined in terms of XML messages, WSDL operations,
    and SOAP messages. Meanwhile, at the Java level, applications are defined in terms
    of objects, interfaces, and methods. A translation from Java objects to WSDL operations
    is needed. The JAXB runtime uses annotations to determine how to marshall/unmarshall
    a class to/from XML. These annotations are typically hidden from the web service
    developer. Analogously, JWS uses annotations to determine how to marshall a method
    invocation to a SOAP request message and unmarshall a SOAP response into an instance
    of the method''s return type.


    The WS-Metadata specification (JSR 181) defines two different kinds of annotations:


    - **WSDL mapping annotations**: These annotations belong to the `javax.jws` package
    and allow you to change the WSDL/Java mapping. The `@WebMethod`, `@WebResult`,
    `@WebParam`, and `@OneWay` annotations are used on the web service to customize
    the signature of the exposed methods.

    - **SOAP binding annotations**: These annotations belong to the `javax.jws.soap`
    package and allow customizing of the SOAP binding (`@SOAPBinding` and `@SOAPMessageHandler`).


    Like all the other Java EE 6 specifications, web services annotations can be overridden
    by an XML deployment descriptor (`webservices.xml`), which is optional. Let''s
    take a closer look at the WSDL mapping annotations.


    ### `@WebService`


    The `@javax.jws.WebService` annotation marks a Java class or interface as being
    a web service.


    If used directly on the class (as in all examples so far), the annotation processor
    of the container will generate the interface, so the following snippets of code
    are equivalent. Following is the annotation on the class:


    ```java

    @WebService

    public class CardValidator {

    ```


    And this shows the annotation on an interface implemented by a class:


    ```java

    @WebService

    public interface CCValidator {

    }


    public class CardValidator implements CCValidator {

    ```


    The `@WebService` annotation has a set of attributes (see Listing 14-15) that
    allow you to customize the name of the web service in the WSDL file (the `<wsdl:portType>`
    or ...).'
