    生命周期与回调


    Web 服务也具有类似于无状态和消息驱动 Bean 的生命周期，如图 14-5 所示。这与不持有任何状态的组件的生命周期相同：它们要么存在，要么准备好处理请求。此生命周期由容器管理。


    **图 14-5.** *Web 服务生命周期*


    第 14 章 ■ SOAP Web 服务


    **417**


    Servlet 和 EJB 端点都支持依赖注入（因为它们在容器中运行）以及生命周期方法，例如 `@PostConstruct` 和 `@PreDestroy`。当容器创建
    Web 服务实例时，它会调用 `@PostConstruct` 回调方法（如果存在）；当销毁实例时，则调用 `@PreDestroy` 回调。


    Servlet 和 EJB 端点之间的一个区别是，EJB 可以使用拦截器。拦截器是第 8 章描述的面向切面编程（AOP）概念的 Java EE 实现。


