    \ `Java` programming language, as it is an interpreted, weakly typed language.\
    \ `JavaScript` is a powerful way to create dynamic web applications by writing\
    \ functions that interact with the `DOM` of a page. `W3C` standardized `DOM`,\
    \ whereas the European Computer Manufacturers Association (`ECMA`) standardized\
    \ `JavaScript` as the `ECMAScript` specification. Any page written with these\
    \ standards (`XHTML`, `CSS`, and `JavaScript`) should look and behave mostly identically\
    \ in any browser that adheres to these guidelines.\n\nAn example of `JavaScript`\
    \ interacting with `DOM` is the `newBook.xhtml` page in Listing 11-4. This page\
    \ displays a form where you can enter information about a book. The price of the\
    \ book needs to be completed by the user on the client side before hitting the\
    \ server. To do such a validation, you can create a `JavaScript` function (`priceRequired()`)\
    \ that checks whether the price text field is empty or not.\n\n**Listing 11-4.**\
    \ *The `newBook.xhtml` Page with Some `JavaScript`*\n\n```xml\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE html\nPUBLIC \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\
