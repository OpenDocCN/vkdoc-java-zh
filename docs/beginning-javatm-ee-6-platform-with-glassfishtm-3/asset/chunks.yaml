- fmt: "# RESTful Web Services\n\n## Hypermedia and Connectedness\n\nThe Web is very\
    \ well connected. If there is a strong relationship between two resources, they\
    \ should be connected. `REST` states that web services should also take advantage\
    \ of hypermedia to inform the client of what is available and where to go. It\
    \ promotes the discoverability of services. From a single `URI`, a user agent\
    \ accessing a well-connected web service could discover all available actions,\
    \ resources, their various representations, and so forth.\n\nFor instance, when\
    \ a user agent looks up the representation of a CD (see Listing 15-1), this representation\
    \ could have not only the names of the artist, but also a link, or a `URI`, to\
    \ the biography. It’s up to the user agent to actually retrieve it or not. The\
    \ representation could also link to other representations of the resource or available\
    \ actions.\n\n**Listing 15-1.** *A CD Representation Connected to Other Services*\n\
    \n```xml\n<cd>\n  <title>Ella and Louis</title>\n  [<year ref='http://music.com/year/1956'>1956</year>](http://music.com/year/1956)\n\
    \  [<artist ref='http://music.com/artists/123'>Ella Fitzgerald</artist>](http://music.com/artists/123)\n\
    \  [<artist ref='http://music.com/artists/456'>Louis Armstrong</artist>](http://music.com/artists/456)\n\
    \  <link rel=\"self\" type=\"text/json\" href=\"http://music.com/album/789\"/>\n\
    \  <link rel=\"self\" type=\"text/xml\" href=\"http://music.com/album/789\"/>\n\
    \  [<link rel=\"http://music.com/album/comments\" type=\"text/xml\" href=\"http://music.com/album/789/comments\"\
    />](http://music.com/album/comments)\n</cd>\n```\n\nAnother crucial aspect of\
    \ the hypermedia principle is the state of the application, which must be led\
    \ by the hypermedia. In short, the fact that the web service provides a set of\
    \ links enables the client to move the application from one state to the next\
    \ by simply following a link.\n\nIn the preceding XML snippet, the client could\
    \ change the state of the application by commenting on the album. The list of\
    \ comments on the album is a resource addressable with the `URI` `http://music.com/album/789/comments`.\
    \ Because this web service uses a uniform interface, once the client knows the\
    \ `URI` format, the available content types and the data format, it will know\
    \ exactly how to interact with it: a `GET` will retrieve the list of existing\
    \ comments, a `POST` will create a new comment, and so on. From this single initial\
    \ request, the client can take many actions: the hypermedia drives the state of\
    \ the application.\n\n## Statelessness\n\nThe last feature of `REST` is statelessness,\
    \ which means that every HTTP request happens in complete isolation, as the server\
    \ should never keep track of requests that were executed. For the sake of clarity,\
    \ resource state and application state are usually distinguished. The resource\
    \ state must live on the server and is shared by everybody, while the application\
    \ state must remain on the client and is its sole property. Going back to the\
    \ example in Listing 15-1, the application state is that the client has fetched\
    \ a representation of the album *Ella and Louis*, but the server should not hold\
    \ onto this information. The resource state is the album information itself; the\
    \ server should obviously maintain this information. The client may change the\
    \ resource state. If the shopping cart is a resource with restricted access to\
    \ just one client, the application needs to keep track of the shopping cart ID\
    \ in the client session.\n\nStatelessness comes with many advantages such as better\
    \ scalability: no session information to handle, no need to route subsequent requests\
    \ to the same server, failure handling, and so on. If you need to keep state,\
    \ the client has to do extra work to store it.\n\n## Java API for RESTful Web\
    \ Services\n\nSome of the low-level concepts (such as the HTTP protocol) might\
    \ have you wondering how the code would look when developing a resource; you don’t\
    \ have to write plumbing code to digest HTTP requests, nor create HTTP responses\
    \ by hand. `JAX-RS` is a very elegant API allowing you to describe a resource\
    \ with only a few annotations. Resources are `POJOs` that have at least one method\
    \ annotated with `@javax.ws.rs.Path`. Listing 15-2 shows a typical resource.\n\
    \n**Listing 15-2.** *A Simple Book Resource*\n\n```java\n@Path(\"/book\")\npublic\
    \ class BookResource {\n\n    @GET\n    @Produces(\"text/plain\")\n    public\
    \ String getBookTitle() {\n        return \"H2G2\";\n    }\n}\n```\n\nThe `BookResource`\
    \ is a Java class annotated with `@Path`, indicating that the resource will be\
    \ hosted at the `URI` path `/book`. The `getBookTitle()` method is marked to process\
    \ HTTP `GET` requests (using `@GET` annotation) and produces text (the content\
    \ is identified by the MIME Media `text/plain`). To access this resource, you\
    \ need an HTTP client such as a browser and an HTTP `GET` method to point to the\
    \ URL `http://www.myserver.com/book`.\n\nAs writing a resource with `JAX-RS` is\
    \ easy, let’s explore further the `JAX-RS` API.\n\n### The JAX-RS Model\n\nFrom\
    \ Listing 15-2, you can see that the REST service doesn’t implement any interface\
    \ nor extend any class; the only mandatory annotation to turn a `POJO` into a\
    \ REST service is `@Path`. `JAX-RS` relies on configuration by exception, so it\
    \ has a set of annotations to configure the default behavior. Following are the\
    \ requirements to write a REST service:\n\n- The class must be annotated with\
    \ `@javax.ws.rs.Path`.\n- To add EJB capabilities to a REST service, the class\
    \ has to be annotated with `@javax.ejb.Stateless`.\n- The class must be defined\
    \ as `public`, and it must not be `final` or `abstract`.\n- Root resource classes\
    \ (classes with a `@Path` annotation) must have a default public constructor.\
    \ Nonroot resource classes do not require such a constructor.\n- The class must\
    \ not define the `finalize()` method.\n\n`JAX-RS` is HTTP-centric by nature and\
    \ has a set of clearly defined classes and annotations to deal with HTTP and URIs.\
    \ A resource can have several representations, so the API provides support for\
    \ a variety of content types and uses `JAXB` to marshall and unmarshall XML and\
    \ JSON representations into objects. `JAX-RS` is also independent on the container,\
    \ so resources can be deployed in GlassFish, of course, but also in a variety\
    \ of servlet containers.\n\n### How to Write a REST Service\n\nREST services can\
    \ be stateless session beans, allowing transactional access to a persistent layer\
    \ (JPA entities), as shown in Listing 15-3.\n\n**Listing 15-3.** *A Book Resource\
    \ Creating and Retrieving Books from the Database*\n\n```java\n@Path(\"books\"\
    )\n@Stateless\n@Produces({\"application/xml\", \"application/json\"})\n@Consumes({\"\
    application/xml\", \"application/json\"})\npublic class BookResource {\n\n   \
    \ @Context\n    private UriInfo uriInfo;\n\n    @PersistenceContext(unitName =\
    \ \"chapter15PU\")\n    private EntityManager em;\n\n    @GET\n    public List<Book>\
    \ getAllBooks() {\n        Query query = em.createNamedQuery(\"findAllBooks\"\
    );\n        List<Book> books = query.getResultList();\n        return books;\n\
    \    }\n\n    @POST\n    public Response createNewBook(JAXBElement<Book> bookJaxb)\
    \ {\n        Book book = bookJaxb.getValue();\n        em.persist(book);\n   \
    \     URI bookUri = uriInfo.getAbsolutePathBuilder().path(book.getId().toString()).build();\n\
    \        return Response.created(bookUri).build();\n    }\n}\n```\n\nThe code\
    \ in Listing 15-3 represents a REST service that can consume and produce XML and\
    \ JSON representations of a book. The `getAllBooks()` method retrieves the list\
    \ of books from the database and returns an XML or a JSON representation (using\
    \ content negotiation) of this list, accessible through a `GET` method. The `createNewBook()`\
    \ method takes an XML or a JSON representation of a book and persists it to the\
    \ database. This method is invoked with an HTTP `POST` and returns the `URI` of\
    \ the newly created book, following a very simple `JAX-RS` pattern."
