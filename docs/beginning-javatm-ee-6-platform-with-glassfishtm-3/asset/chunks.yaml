  raw: 'teams started to create their own scripts to fulfill their needs. Yet Ant
    was quickly pushed to its limits when projects had to start encompassing complex
    heterogeneous systems. Companies faced difficulties to industrialize their build
    system. There was no real tool to easily reuse a build script between different
    projects (copy/paste was the only way).


    In 2002, Apache Maven was born, and this project not only addressed these issues,
    but


    also went beyond being a simple building tool. Maven offers projects a building
    solution, shared libraries, and a plug-in platform, allowing you to do quality
    of control, documentation, teamwork, and so forth. Based on the “convention over
    configuration” principle, Maven brings a standard project description and a number
    of conventions such as a standard directory structure (as shown in Figure 1-8).
    With an extensible architecture based on plug-ins (a.k.a. mojos), Maven can offer
    many different services.


    **Figure 1-8.** *Standard Maven directory structure*


    project Descriptor


    Maven is based on the fact that a majority of Java and Java EE projects face similar
    needs when building applications. A Maven project needs to follow standards as
    well as define specific features in a project descriptor, or Project Object Model
    (POM). The POM is an XML file (pom.xml) placed at the root of the project. As
    shown in Listing 1-5, the minimum required information to describe the identity
    of the project is the groupId, the artifactId, the version, and the packaging
    type.


