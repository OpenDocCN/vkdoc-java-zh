    Dependencies may have limited visibility (called scope):


    • test: The library is used to compile and run test classes but is not packaged
    in the produced artifact.


    • provided: The library is provided by the environment (persistence provider,
    application server, etc.) and is only used to compile the code.


    • compile: The library is necessary for compilation and execution.


    • runtime: The library is only required for execution but is excluded from the
    compilation (e.g., JSF components, JSTL tag libraries).


    project Modularity


    To address project modularity, Maven provides a mechanism based on modules. Each
    module is a Maven project in its own right. Maven is able to build a project with
    different modules by calculating the dependencies they have between them (see
    Figure 1-10). To facilitate reusing common parameters, POM descriptors can inherit
    from parent POM projects.


    **Figure 1-10.** *A project and its modules*


    plug-ins and Life Cycle


    Maven uses a life cycle made of several phases (see Figure 1-11): it cleans the
    resources, validates the project, generates any needed sources, compiles Java
    classes, runs test classes, packages the project, and installs it to the local
    repository. This life cycle is the vertebral column on which Maven plug-ins (a.k.a.
    mojos) hang. Depending on the type of project you


    build, the associated mojos can be different (a mojo to compile, another to test,
    another to build, etc.). In the project description, you can link new plug-ins
    to a life-cycle phase, change the configuration of a plug-in, and so on. For example,
    when you build a web service client, you might add a mojo that generates web service
    artifacts during the generate-sources phase.


