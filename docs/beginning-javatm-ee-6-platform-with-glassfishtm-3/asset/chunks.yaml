    method. It can be applied to a particular method or to the entire bean (then all
    business methods will inherit the bean’s role access). This annotation can take
    either a single String (only one role can access the method) or an array of String
    (any of the roles can access the method). The


    @DeclareRoles annotation that you’ll see later in this section can be used to
    declare other roles.


