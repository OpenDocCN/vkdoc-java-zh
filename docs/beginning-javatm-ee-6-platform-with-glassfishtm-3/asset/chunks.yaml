  trans: "\n作为日常生活中强化这些概念的一个例子，可以想想“乐观过马路与悲观过马路”。在车流量很小的区域，你或许不用查看是否有来车就能过马路。但在繁忙的市中心可不行！\n\
    \nJPA 在 API 的不同层级使用了不同的锁定机制。悲观锁和乐观锁都可以通过 `EntityManager.find` 和 `EntityManager.refresh`\
    \ 方法（除了 `lock` 方法之外）以及通过 JPQL 查询来获取，这意味着可以在 `EntityManager` 级别和 `Query` 级别，使用表\
    \ 4-4 和表 4-5 中列出的方法来实现锁定。\n\n**表 4-4.** *用于锁定实体的 EntityManager 方法*\n\n**方法**\n\
    \n**描述**\n\n`<T> T find(Class<T> entityClass, Object primaryKey, LockModeType\
    \ lockMode)`\n\n查找指定类的主键为 `primaryKey` 的实体，并根据指定的锁定类型对其进行锁定\n\n`void lock(Object\
    \ entity, LockModeType lockMode)`\n\n使用指定的锁定模式类型，锁定持久化上下文中包含的实体实例\n\n`void refresh(Object\
    \ entity, LockModeType lockMode)`\n\n从数据库刷新实例的状态，覆盖对实体所做的任何更改（如果有），并根据给定的锁定模式类型对其进行锁定\n\
    \n**表 4-5.** *用于锁定 JPQL 查询的 Query 方法*\n\n**方法**\n\n**描述**\n\n`Query setLockMode(LockModeType\
    \ lockMode)`\n\n设置用于查询执行的锁定模式类型\n\n这些方法中的每一个都将 `LockModeType` 作为参数，该参数可以取不同的值：\n\
    \n• `OPTIMISTIC`：使用乐观锁定\n• `OPTIMISTIC_FORCE_INCREMENT`：使用乐观锁定并强制递增实体的版本列（请参阅即将到来的“版本控制”部分。）\n\
    • `PESSIMISTIC_READ`：使用悲观锁定，无需在事务结束时重新读取数据以获取锁\n• `PESSIMISTIC_WRITE`：使用悲观锁定，并强制在尝试更新实体的事务之间进行序列化\n\
    • `PESSIMISTIC_FORCE_INCREMENT`：使用悲观锁定并强制递增实体的版本列（请参阅即将到来的“版本控制”部分。）\n• `NONE`：指定不应使用任何锁定机制\n\
    \n你可以根据指定锁定的需要，在多个地方使用这些参数。你可以先读取*然后*锁定：\n\n**152**\n\n第 4 章 ■ 管理持久化对象\n\n```java\n\
    Book book = em.find(Book.class, 12);\n// 锁定以提价\n**em.lock(book, LockModeType.PESSIMISTIC);**\n\
    book.raisePriceByTwoDollars();\n```\n\n或者你可以读取*并*锁定：\n\n```java\nBook book = em.find(Book.class,\
    \ 12, **LockModeType.PESSIMISTIC**);\n// 该书已被锁定，提价\nbook.raisePriceByTwoDollars();\n\
    ```\n\n并发和锁定是版本控制的关键驱动因素。\n\n**版本控制**\n\nJava 使用版本控制：Java SE 5.0、Java SE 6.0、EJB\
    \ 3.1、JAX-RS 1.0 等等。当 JAX-RS 的新版本发布时，其版本号会增加，然后你升级到 JAX-RS 1.1。当你需要对实体进行版本控制时，JPA\
    \ 就使用这种确切的机制。因此，当你首次将实体持久化到数据库时，它将获得版本号 1。之后，如果你更新了一个属性并将此更改提交到数据库，实体版本将变为 2，依此类推。每次对实体进行更改时，此版本控制都会更新。\n\
    \n为了实现这一点，实体必须有一个属性来存储版本号，并且必须使用 `@Version` 进行注解。然后，此版本号会映射到数据库中的一列。版本控制支持的属性类型可以是\
    \ `int`、`Integer`、`short`、`Short`、`long`、`Long` 或 `Timestamp`。清单 4-30 展示了如何向 `Book`\
    \ 实体添加版本属性。\n\n**清单 4-30.** *带有 @Version 注解的 Book 实体*\n\n```java\n@Entity\npublic\
    \ class Book {\n    @Id @GeneratedValue\n    private Long id;\n    **@Version**\n\
    \    **private Integer version;**\n    private String title;\n    private Float\
    \ price;\n    private String description;\n    private String isbn;\n    private\
    \ Integer nbOfPage;\n    private Boolean illustrations;\n    // 构造方法、getter、setter\n\
    }\n```\n\n实体可以访问其版本属性的值，但不得修改它。只有持久化提供程序才允许在将对象写入或更新到数据库时设置或更新版本属性的值。让我们看一个例子来说明此版本控制的行为。\n\
    \n第 4 章 ■ 管理持久化对象\n\n**153**\n\n在清单 4-31 中，一个新的 `Book` 实体被持久化到数据库。一旦事务提交，持久化提供程序将版本设置为\
    \ 1。之后，更新了书的价格，一旦数据刷新到数据库，版本号就会增加到 2。\n\n**清单 4-31.** *事务 tx1 和 tx2 并发更新一本书的价格*\n\
    \n```java\nBook book = new Book(\"H2G2\", 21f, \"Best IT book\", \"123-456\",\
    \ 321, false);\ntx.begin();\nem.persist(book);\ntx.commit();\nassertEquals(**1,\
    \ book.getVersion()**);\n\ntx.begin();\nbook.raisePriceByTwoDollars();\ntx.commit();\n\
    assertEquals(**2, book.getVersion()**);\n```\n\n版本属性不是必需的，但当实体可能被多个进程或线程并发修改时，建议使用。版本控制是乐观锁定的核心，并为不频繁的并发实体修改提供保护。实际上，如果实体具有使用\
    \ `@Version` 注解映射的属性，则它会自动启用乐观锁定。\n\n**乐观锁定**\n\n顾名思义，乐观锁定基于数据库事务不会相互冲突这一事实。换句话说，更新实体的事务很有可能是在该时间段内实际更新该实体的唯一事务。因此，获取实体锁的决定实际上是在事务结束时做出的。这确保了对实体的更新与数据库的当前状态一致。会导致违反此约束的事务将抛出\
    \ `OptimisticLockException`，并且该事务会被标记为回滚。\n\n如何抛出 `OptimisticLockException`？要么通过显式锁定实体（使用你之前看到的传递\
    \ `LockModeType` 的 `lock` 或 `find` 方法），要么让持久化提供程序检查使用 `@Version` 注解的属性。在实体上使用专用的\
    \ `@Version` 注解，允许 `EntityManager` 通过简单地将实体实例中版本属性的值与数据库中的列值进行比较来执行乐观锁定。如果没有使用\
    \ `@Version` 注解的属性，实体管理器将无法进行乐观锁定。\n\n事务 tx1 和 tx2 都获取了同一个 `Book` 实体的实例。此时，`Book`\
    \ 实体的版本是 1。第一个事务将书的价格提高了 2 美元并提交了此更改。当数据刷新到数据库时，持久化提供程序增加了版本号并将其设置为 2。此时，第二个事务将价格提高了\
    \ 5 美元并提交了更改。tx2 的实体管理器意识到数据库中的版本号与实体的版本号不同。这意味着版本已被另一个事务更改，因此抛出了 `OptimisticLockException`，如图\
    \ 4-4 所示。\n\n**图 4-4.** *在事务 tx2 上抛出的 OptimisticLockException*\n\n这是使用 `@Version`\
    \ 注解时的默认行为：当数据被刷新时（在提交时或通过显式调用 `em.flush()` 方法），会抛出 `OptimisticLockException`。你也可以控制在哪里添加乐观锁，使用先读取后锁定或读取并锁定。例如，读取并锁定的代码如下所示：\n\
    \n```java\nBook book = em.find(Book.class, 12);\n// 锁定以提价\n**em.lock(book, LockModeType.OPTIMISTIC);**\n\
    book.raisePriceByTwoDollars();\n```\n"
- fmt: '# Optimistic Locking


    With optimistic locking, the `LockModeType` that you pass as a parameter can take
    two values: `OPTIMISTIC` and `OPTIMISTIC_FORCE_INCREMENT` (or `READ` and `WRITE`,
    respectively, but these values are deprecated). The only difference is that `OPTIMISTIC_FORCE_INCREMENT`
    will force an update (increment) to the entity’s version column.


    Applications are strongly encouraged to enable optimistic locking for all entities
    that may be concurrently accessed. Failure to use a locking mechanism may lead
    to inconsistent entity state, lost updates, and other state irregularities. Optimistic
    locking is a useful performance optimization that offloads work that would otherwise
    be required of the database and is an alternative to pessimistic locking, which
    requires low-level database locking.


    ## Pessimistic Locking


    Pessimistic locking is based on an assumption that is the opposite of that for
    optimistic locking, because a lock is eagerly obtained on the entity before operating
    on it. This is very resource restrictive and results in significant performance
    degradation, as a database lock is held using a `SELECT ... FOR UPDATE` SQL statement
    to read data.


    Databases typically offer a pessimistic locking service that allows the entity
    manager to lock a row in a table to prevent another thread from updating the same
    row. This is an effective mechanism to ensure that two clients do not modify the
    same row at the same time, but requires expensive, low-level checks inside the
    database. Transactions that would cause this constraint to be violated result
    in a `PessimisticLockException` being thrown and the transaction marked for rollback.


    Optimistic locking is appropriate in dealing with moderate contention among concurrent
    transactions. But in some applications with a higher risk of contentions, pessimistic
    locking may be more appropriate, as the database lock is immediately obtained
    as opposed to the often late failure of optimistic transactions. For example,
    in times of economic crises, stock markets receive huge numbers of selling orders.
    If 100 million Americans need to sell their stock options at the same time, the
    system needs to use pessimistic locks to ensure data consistency.


    Note that at the moment the market is rather pessimistic instead of optimistic,
    and that has nothing to do with JPA.


    Pessimistic locking may be applied to entities that do not contain the annotated
    `@Version` attribute.


    ## Summary


    In this chapter, you learned how to query entities. The entity manager is central
    to articulating entities with persistence. It can create, update, find by ID,
    remove, and synchronize entities with the database with the help of the persistence
    context, which acts as a level-one cache. JPA also comes with a very powerful
    query language, JPQL, which is database vendor–independent. You can retrieve entities
    with a rich syntax using `WHERE`, `ORDER BY`, or `GROUP BY` clauses, and when
    concurrent access occurs to your entities, you know how to use versioning and
    when to use optimistic or pessimistic locking.


    In the next chapter, you’ll learn more about the life cycle of entities and will
    see how to hook some logic to this life cycle using callback annotations or listeners.


    # Chapter 5: Callbacks and Listeners


    In the previous chapter, you saw how to query mapped entities. Now you know how
    to persist, remove, update, and find an entity by its identifier. With JPQL, you
    can retrieve one or more entities according to certain search criteria with dynamic,
    static, and native queries.


    All these actions are carried out by the entity manager—the central piece that
    manipulates entities and manages their life cycle.


    I described the entity life cycle by saying that entities are managed by the entity
    manager (meaning that they have a persistence identity and are synchronized with
    the database) or are detached from the database and used as normal POJOs. But
    the life cycle of an entity is slightly richer. Importantly, JPA allows you to
    hook in your own business logic when certain events occur on the entity. This
    business code is then automatically called by the persistence provider using callback
    methods.


    You can think of life-cycle callback methods and listeners as triggers in a relational
    database. A trigger executes business logic for each row in a table. Life-cycle
    callback methods and listeners are invoked for each instance of an entity in response
    to a certain event, or more precisely, before or after the event occurs. You can
    use metadata annotations or XML descriptors to define “Pre” and “Post” callback
    methods.


    ## Entity Life Cycle


    By now, you know most of the mysteries of entities, so let’s look at their life
    cycle. When an entity is created or persisted by the entity manager, that entity
    is said to be managed. Until that point, the entity is just seen as a regular
    POJO by the JVM (i.e., detached) and can be used as a regular object by the application.
    When an entity is managed, the entity manager will automatically synchronize the
    value of its attributes with the underlying database.


    To have a better understanding of this, take a look at Figure 5-1, a UML state
    diagram of the states that a `Customer` entity can have and the transitions between
    each state.


    ![Image 60](index-188_1.jpg)


    **Figure 5-1.** *Entity life cycle*


    To create an instance of the `Customer` entity, you use the `new` operator. This
    object exists in memory, although JPA knows nothing about it. If you do nothing
    with this object, it will go out of scope and will end up being garbage collected,
    and that will be the end of its life cycle. What you can do next is persist an
    instance of `Customer` with the `EntityManager.persist()` method.


    At that moment, the entity becomes managed, and its state is synchronized with
    the database.


    During this managed state, you can update attributes using the setter methods
    (e.g., `customer.setFirstName()`) or refresh the content with an `EntityManager.refresh()`
    method. All these changes will be synchronized between the entity and the database.
    During this state, if you call the `EntityManager.contains(customer)` method,
    it will return `true` because `customer` is contained in the persistence context
    (i.e., managed).


    Another way for an entity to be managed is when it is loaded from the database.
    When you use the `EntityManager.find()` method, or create a JPQL query to retrieve
    a list of entities, all are automatically managed, and you can start updating
    or removing their attributes.


    In the managed state, you can call the `EntityManager.remove()` method, and the
    entity is deleted from the database and not managed anymore. But the Java object
    continues living in memory, and you can still use it until the garbage collector
    gets rid of it.


    Now let’s look at the detached state. You’ve seen in the previous chapter how
    explicitly calling the `EntityManager.clear()` method will clear the entity from
    the persistence context; it becomes detached, but there is also another, more
    subtle, way to detach an entity: when it’s serialized. In many examples in this
    book, entities don’t extend anything, but if they need to cross a network to be
    invoked remotely or cross layers to be displayed in a presentation tier, they
    need to implement the `java.io.Serializable` interface. This is not a JPA restriction
    but a Java restriction. When a managed entity is serialized, crosses the network,
    and gets deserialized, it is seen as a detached object. To reattach an entity,
    you need to call the `EntityManager.merge()` method.


    Callback methods and listeners allow you to add your own business logic when certain
    events occur.'
