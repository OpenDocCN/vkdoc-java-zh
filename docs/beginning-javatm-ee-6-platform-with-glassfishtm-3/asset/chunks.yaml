    用于通过 @XmlIDREF 注解引用某个元素时


    （XML Schema 的 ID 和 IDREF 概念）


    @XmlIDREF


    将属性映射到 Schema 中的 XML IDREF


    @XmlList


    将属性映射到一个列表


    @XmlMimeType


    标识属性的 MIME 类型的文本表示形式


    @XmlNs


    标识一个 XML 命名空间


