- fmt: '# Cascading Style Sheets (CSS)


    Cascading Style Sheets (CSS) is a styling language used to describe the presentation
    of a document written in HTML or XHTML. CSS is used to define colors, fonts, layout,
    and other aspects of document presentation. It allows separation of a document’s
    content (written in XHTML) from its presentation (written in CSS). Like HTTP,
    HTML, and XHTML, the CSS specifications are maintained by the World Wide Web Consortium
    (W3C).


    For example, say you want to alter the labels on the `newBook.xhtml` page by making
    them italic (`font-style: italic;`), changing the color to blue (`color: #000099;`),
    and increasing the font size (`font-size: 22px;`); you do not have to repeat these
    changes for each tag. You can define a CSS style (in a `<style type="text/css">`
    tag) and give it an alias (e.g., `.title` and `.row`), and the page (see Listing
    11-3) will use this alias on all elements to be changed in the presentation (`<h1
    class="title">`).


    **Listing 11-3.** *The `newBook.xhtml` Page with Some CSS Styles*


    ```xml

    <?xml version="1.0" encoding="UTF-8"?>

    <!DOCTYPE html

    PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"

    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

    <html xml:lang="en" lang="en" xmlns="http://www.w3.org/1999/xhtml">

    <head>

    <title>Creates a new book</title>

    <style type="text/css">

    .title {

    font-family: Arial, Helvetica, sans-serif;

    font-size: 22px;

    color: #000099;

    font-style: italic;

    }

    .row {

    font-family: Arial, Helvetica, sans-serif;

    color: #000000;

    font-style: italic;

    }

    </style>

    </head>

    <body>

    <h1 class="title">Create a new book</h1>

    <hr/>

    <table border="0">

    <tr>

    <td class="row">ISBN :</td>

    <td><input type="text"/></td>

    </tr>

    <tr>

    <td class="row">Title :</td>

    <td><input type="text"/></td>

    </tr>

    <tr>

    <td class="row">Price :</td>

    <td><input type="text"/></td>

    </tr>

    <tr>

    <td class="row">Description :</td>

    <td><textarea name="textarea" cols="20" rows="5"></textarea></td>

    </tr>

    <tr>

    <td class="row">Number of pages :</td>

    <td><input type="text"/></td>

    </tr>

    <tr>

    <td class="row">Illustrations :</td>

    <td><input type="checkbox"/></td>

    </tr>

    </table>

    <input name="" type="submit" value="Create"/>

    <hr/>

    <i>APress - Beginning Java EE 6</i>

    </body>

    </html>

    ```


    In this example, the CSS code is embedded in the XHTML page. In a real application,
    all the styles would be written in a separate file and this file imported into
    the web page. The webmaster can draw up one or more sets of CSS for various groups
    of pages, and then content contributors can write or change pages without needing
    to be concerned about the look and feel.


    Compared with Figure 11-1, the end result is that all the labels are in italic
    and the title is blue (see Figure 11-2).


    ![Image 90](index-317_1.jpg)

