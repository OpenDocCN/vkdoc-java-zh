- fmt: "# 180\n\n## Chapter 6 ■ Enterprise Java Beans\n\n```java\nreturn em.find(Book.class,\
    \ id);\n}\n\npublic Book createBook(Book book) {\n    em.persist(book);\n    return\
    \ book;\n}\n\npublic void deleteBook(Book book) {\n    em.remove(em.merge(book));\n\
    }\n\npublic Book updateBook(Book book) {\n    return em.merge(book);\n}\n```\n\
    \nThe main differences between the `Main` class defined in Chapter 2 (Listing\
    \ 2-4) and the class in Listing 6-4 is that an instance of `EntityManager` is\
    \ directly injected into the session bean instead of using the `EntityManagerFactory`\
    \ to create it. The EJB container deals with the `EntityManager` life cycle, so\
    \ it injects an instance of it and then closes it when the EJB is destroyed. Also,\
    \ JPA calls are not wrapped between `tx.begin()` and `tx.commit()` anymore, as\
    \ session bean methods are implicitly transactional. This default behavior is\
    \ known as a CMT and is discussed in Chapter 9.\n\nBecause the `BookEJB` is invoked\
    \ remotely by the `Main` class, it needs to implement a remote interface. The\
    \ only difference between a normal Java interface and a remote interface is the\
    \ presence of the `@Remote` annotation as shown in Listing 6-5.\n\n**Listing 6-5.**\
    \ *A Remote Interface*\n\n```java\n@Remote\npublic interface BookEJBRemote {\n\
    \    public List<Book> findBooks();\n    public Book findBookById(Long id);\n\
    \    public Book createBook(Book book);\n    public void deleteBook(Book book);\n\
    \    public Book updateBook(Book book);\n}\n```\n\n## Persistence Unit for the\
    \ BookEJB\n\nIn Chapter 2, the persistence unit (Listing 2-5) had to define the\
    \ JDBC driver, the JDBC URL, the user, and the password to connect to the Derby\
    \ database because the transactions were managed by the application (`transaction-type\
    \ =\"RESOURCE_LOCAL\"`). In a container-managed environment where EJBs evolve,\
    \ transactions are managed by the container, not by the application, so `transaction-type`\
    \ of the persistent unit (see Listing 6-6) has to be set to `JTA`.\n\n# 181\n\n\
    **Listing 6-6.** *A Persistence Unit Using the chapter06DS Datasource*\n\n```xml\n\
    <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<persistence version=\"1.0\" xmlns=\"\
    http://java.sun.com/xml/ns/persistence\">\n    <persistence-unit name=\"chapter06PU\"\
    \ transaction-type=\"JTA\">\n        <provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>\n\
    \        <jta-data-source>jdbc/chapter06DS</jta-data-source>\n        <class>com.apress.javaee6.chapter06.Book</class>\n\
    \        <properties>\n            <property name=\"eclipselink.ddl-generation\"\
    \ value=\"drop-and-create-tables\"/>\n            <property name=\"eclipselink.logging.level\"\
    \ value=\"INFO\"/>\n        </properties>\n    </persistence-unit>\n</persistence>\n\
    ```\n\nIn Listing 6-4, the `BookEJB` gets injected with a reference of an `EntityManager`\
    \ associated with the `chapter06PU` persistence unit. This persistence unit (defined\
    \ in Listing 6-6) needs to define the name of the datasource to connect to (`jdbc/chapter06DS`)\
    \ without specifying any access properties (URL, JDBC driver, etc.). This information\
    \ is held by the datasource, to be created later in GlassFish.\n\n## Writing the\
    \ Main Class\n\nFrequently, Java EE applications consist of web applications acting\
    \ as clients for EJBs, as described in Chapter 10, where JSF managed beans will\
    \ invoke EJBs. For now, let's use a plain Java class.\n\nThe `Main` class (see\
    \ Listing 6-7) declares an instance of the `BookEJBRemote` interface and decorates\
    \ it with the `@EJB` annotation so a reference can be injected. Remember that\
