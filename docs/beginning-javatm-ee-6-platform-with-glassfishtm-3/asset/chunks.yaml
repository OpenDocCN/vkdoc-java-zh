    The methods that are mostly used in this API are ones that execute the query itself.
    To execute a SELECT query, you have to choose between two methods depending on
    the required result:


    • The method getResultList() executes the query and returns a list of results
    (entities, attributes, expressions, etc.).


    • The getSingleResult() method executes the query and returns a single result.


    To execute an update or a delete, the executeUpdate() method executes the bulk
    query


    and returns the number of entities affected by the execution of the query.


    As you saw in the “JPQL” section earlier, a query can take parameters that are
    either


    named (e.g., :myParam) or positional (e.g., ?1). The Query API defines several
    setParameter methods to set parameters before executing a query.


    When a query is executed, it can return a large number of results. Depending on
    the application, these can be processed together or in chunks (e.g., a web application
    only displays ten rows at one time). To control the pagination, the Query interface
    defines setFirstResult() and setMaxResults() methods to specify the first result
    to be received (numbered from zero) and the maximum number of results to return
    relative to that point.


    The flush mode indicates to the persistence provider how to handle pending changes
    and


    queries. There are two possible flush mode settings: AUTO and COMMIT. AUTO (the
    default) means that the persistence provider is responsible for ensuring pending
    changes are visible to the processing of the query. COMMIT is when the effect
    of updates made to entities do not overlap with changed data in the persistence
    context.


    Queries can be locked using the setLockMode(LockModeType) method. Locks are intended


    to provide a facility that enables the effect of repeatable read whether optimistically
    or pessimistically.


    **146**


