    Chapter 11 ■ paGeS aND COMpONeNtS


    Let’s focus on the JSF HTML components that will allow you to create rich web
    interfaces.


    Chapter 12 shows most of the JSF core library with converters and validators.
    But first let’s take a look at the JSF page life cycle.


    **Life Cycle**


    A JSF page is a component tree with a specific life cycle. You should understand
    it so you know when components are validated or the model is updated. Clicking
    a button causes a request to be sent from your web browser to the server. This
    request is translated into an event that can be processed by your application
    logic on the server. All data entered by the user enters a phase of validation
    before the model is updated and any business logic invoked. JSF is then responsible
    for making sure that every graphical component (child and parent components) is
    properly rendered to the browser. Figure 11-6 shows the different phases of a
    JSF page life cycle.


    **Figure 11-6.** *The JSF life cyle*


    The JSF life cycle is divided into six distinct phases:


    ****1.** *Restore view*: JSF finds the target view and applies the user’s input
    to it. If this is the client’s first visit to the page, JSF creates the view as
    a UIViewRoot component (root of the component tree that makes up a particular
    page). If this is a subsequent request, the


    previously saved UIViewRoot is retrieved for processing the current HTTP request.


    ****2.** *Apply request values*: Values that have come from the request (from
    input fields in a web form, from cookies, or from request headers) are applied
    to the various components of the page. Note that only UI components update their
    state—not the business


    objects that compose the model.


    ****3.** *Process validations*: After the preceding steps, the UI components have
    a value set. In the validation processing, JSF traverses the component tree and
    asks each component


    to ensure its submitted value is acceptable. If both conversion and validation
    are suc-


    cessful for all components, the life cycle continues to its next phase. Otherwise,
    the life cycle goes to the *Render response* phase with the appropriate validation
    and conversion error messages.


    Chapter 11 ■ paGeS aND COMpONeNtS


    **309**


    ****4.** *Update model values*: With all values of the components set and validated,
    you can update the managed beans associated with them.


    ****5.** *Invoke application*: Now you can perform some business logic. Whatever
    action has been triggered will be executed on the managed bean, and this is where
    the navigation


    comes into effect, as its return will determine the render response.'
