    **Renderer**


    JSF supports two programming models for displaying components: the direct implementation
    and the delegated implementation. When the direct model is used, components must
    decode themselves from, and encode themselves to, a graphical representation.
    When the delegated model is used, these operations are delegated to a renderer.
    This allows a component to be independent of a rendering technology (browser,
    portable device, etc.) and to have several graphical representations.


    A renderer is responsible for displaying a component and translating user input
    into the component’s value. Think of it as a translator between the client and
    the server: it decodes the user request to set values to the component, and encodes
    the response to create a representation of a component that the client understands
    and can display.


