    `#{expr}`


    对于 JSP 来说，`${expr}` 和 `#{expr}` 语句的解析和求值方式完全相同。然而，对于 JSF 来说情况则不同，因为正如你将看到的，JSF
    页面的生命周期与 JSP 不同。你可以将 `${expr}` 用于立即求值的表达式（该表达式在 JSP 编译时被编译，并在 JSP 执行时求值一次），而将
    `#{expr}` 用于延迟求值的表达式（该表达式直到需要其值时才被求值）。这两种 EL 已经统一，因此 JSP 和 JSF 页面都可以使用两者，但存在生命周期差异。


    EL 表达式可以使用大多数常见的 Java 运算符：


    -   **算术**：+、-、*、/ (div)、% (mod)

    -   **关系**：== (eq)、!= (ne)、< (lt)、> (gt)、<= (le)、>= (ge)

    -   **逻辑**：&& (and)、|| (or)、! (not)

    -   **其他**：()、empty、[]、.


    请注意，某些运算符既有符号形式也有单词形式（`>` 可以是 `gt`，`/` 可以是 `div`，等等）。这些等效形式允许你使 JSP 符合 XML 规范，同时避免使用实体引用（例如用
    `&lt;` 表示 `<`）。一个“小于”可以编码为 `#{2 lt 3}` 而不是 `#{2 < 3}`。


    `empty` 运算符测试一个对象是否为 `null`，或者它是否引用了一个空的 `String`、`List`、`Map` 或数组。如果为空则返回 `true`；否则返回
    `false`。例如，如果 JSP 使用声明元素定义了一个 `Book` 对象（`<%! Book book = new Book(); %>`），你可以检查该对象或其某个属性是否为
    `null`。


    `#{empty book}`


    `#{empty book.isbn}`


    点运算符用于访问 `book` 对象的 `isbn` 属性。另一种语法是使用 `[]` 运算符；`isbn` 属性可以使用任何一种表示法来访问，如下所示：


    `#{book.isbn}`


    `#{book[isbn]}`


    EL 2.2 的一个增强功能是能够调用方法。以下代码片段展示了如何通过调用 `book.buy()` 方法来购买一本书，以及如何传递一个参数（所使用的货币）。


    `#{book.buy}`


    `#{book.buy(''EURO'')}`


    EL 语句可以与 JSP 和 JSF 页面、`faces-config.xml`、脚本元素或 JSTL 结合使用。


    **JSP 标准标签库**


    有一组有用的标准标签称为 JSTL，它允许你避免混合 Java 代码和 XHTML 标签。JSP 中的动态数据可以使用 XML 标签来操作，而不是

    '
