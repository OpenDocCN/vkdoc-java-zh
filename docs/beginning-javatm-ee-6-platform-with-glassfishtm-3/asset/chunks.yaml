- fmt: "# Collections of Things in Java\n\nCollections of things are extremely common\
    \ in Java. In the upcoming text, you will learn about relationships between entities\
    \ (which can be collections of entities). Basically, this means that one entity\
    \ has a collection of other entities or embeddables. In terms of mapping, each\
    \ entity is mapped to its own table, and references between primary and foreign\
    \ keys are created. As you know, an entity is a Java class with an identity and\
    \ many other attributes. But what if you need to store only a collection of Java\
    \ types such as `String`s or `Integer`s? Since JPA 2.0, you can easily do this\
    \ without having to go through the trouble of creating a separate class by using\
    \ the `@ElementCollection` and `@CollectionTable` annotations.\n\nThe `@ElementCollection`\
    \ annotation is used to indicate that an attribute of type `java.util.Collection`\
    \ contains Java types. The `@CollectionTable` annotation allows you to customize\
    \ details of the collection table such as its name. If this annotation is missing,\
    \ the table name will be the concatenation of the name of the containing entity\
    \ and the name of the collection attribute, separated by an underscore.\n\nOnce\
    \ again, using the example `Book` entity, let’s see how to add an attribute to\
    \ store tags.\n\nToday, tags and tag clouds are everywhere; these tend to be very\
    \ useful for sorting data, so imagine for this example you want to add as many\
    \ tags as you can to a book to describe it and to find it quickly. A tag is just\
    \ a string, so the `Book` entity could have a collection of strings to store this\
    \ information, as shown in Listing 3-27.\n\n**Listing 3-27.** *The Book Entity\
    \ with a Collection of Strings*\n\n```java\n@Entity\npublic class Book {\n   \
    \ @Id\n    @GeneratedValue(strategy = GenerationType.AUTO)\n    private Long id;\n\
    \    private String title;\n    private Float price;\n    private String description;\n\
    \    private String isbn;\n    private Integer nbOfPage;\n    private Boolean\
    \ illustrations;\n\n    @ElementCollection(fetch = FetchType.LAZY)\n    @CollectionTable(name\
    \ = \"Tag\")\n    @Column(name = \"Value\")\n    private ArrayList<String> tags;\n\
    \n    // Constructors, getters, setters\n}\n```\n\nThe `@ElementCollection` annotation\
    \ is used to inform the persistence provider that the `tags` attribute is a list\
    \ of strings and should be fetched lazily. If `@CollectionTable` is missing, the\
    \ table name defaults to `BOOK_TAGS` (a concatenation of the name of the containing\
    \ entity and the name of the collection attribute, separated by an underscore)\
    \ instead of `TAG` as specified in the `name` element (`name = \"Tag\"`). Notice\
    \ that I’ve added a complementary `@Column` annotation to rename the column to\
    \ `VALUE`. The result is shown in Figure 3-3.\n\n**Figure 3-3.** *Relationship\
    \ between the BOOK and the TAG tables*\n\n> **Note** In JPA 1.0, these annotations\
    \ didn’t exist. However, you were still able to store a list of primitive types\
    \ as a BLOB in the database. Why? Because `java.util.ArrayList` implements `Serializable`,\
    \ and JPA can map `Serializable` objects to BLOBs automatically. However, if you\
    \ used `java.util.List` instead, you would have an exception as it doesn’t extend\
    \ `Serializable`. The `@ElementCollection` is a more elegant and useful way of\
    \ storing lists of basic types. Storing lists in an inaccessible binary format\
    \ makes it opaque to queries.\n\n## Map of Basic Types\n\nLike collections, maps\
    \ are very useful to store data. In JPA 1.0, there was not much you could do with\
    \ maps in terms of ORM. Now, maps can contain any combination of basic types,\
    \ embeddable objects, and entities as keys or values, which brings significant\
    \ flexibility to the mapping. But let’s focus on maps of basic types.\n\nWhen\
    \ the map employs basic types, the `@ElementCollection` and `@CollectionTable`\
    \ annotations can be used in the same way as you saw previously with collections.\
    \ A collection table is then used to store the data of the map.\n\nLet’s take\
    \ an example with a CD album that contains tracks (see Listing 3-28). A track\
    \ can be seen as a title and a position (the first track of the album, the second\
    \ track of the album, etc.). You could then have a map of tracks with an integer\
    \ for the position (the key of the map) and a string for the title (the value\
    \ of the map).\n\n**Listing 3-28.** *A CD Album with a Map of Tracks*\n\n```java\n\
    @Entity\npublic class CD {\n    @Id\n    @GeneratedValue\n    private Long id;\n\
    \    private String title;\n    private Float price;\n    private String description;\n\
    \    @Lob\n    private byte[] cover;\n\n    @ElementCollection\n    @CollectionTable(name=\"\
    track\")\n    @MapKeyColumn (name = \"position\")\n    @Column(name = \"title\"\
    )\n    private Map<Integer, String> tracks;\n\n    // Constructors, getters, setters\n\
    }\n```\n\nAs discussed previously, the `@ElementCollection` annotation is used\
