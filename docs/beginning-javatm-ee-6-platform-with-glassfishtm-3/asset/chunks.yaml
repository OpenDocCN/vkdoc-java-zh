    ■**Note** @PrePassivate and @PostActivate annotations are defined in the javax.ejb
    package and the EJB 3.1 specification (JSR 318). @PostConstruct and @PreDestroy
    are part of the Common Annotations 1.0 specification (JSR 250) and come from the
    javax.annotation package (like @Resource or other security annotations that you’ll
    see in the next chapter).


    A callback method is required to have the following signature:


    void <METHOD>();


    The following rules apply to a callback method:


    • The method must not have any parameters and must return void.


    • The method must not throw a checked exception but can throw runtime exceptions.


    Throwing a runtime exception will roll back the transaction if one exists (as
    explained in the next chapter).


    • The method can have public, private, protected, or package-level access, but
    must not be static or final.


    • A method may be annotated with multiple annotations (the init() method shown


    later in Listing 8-2 is annotated with @PostConstruct and @PostActivate). However,


    only one annotation of a given type may be present on a bean (you can’t have two


    @PostConstruct annotations in the same session bean, for example).


    • A callback method can access the beans’ environment entries (see the “Environment


    Naming Context” section in Chapter 7).


