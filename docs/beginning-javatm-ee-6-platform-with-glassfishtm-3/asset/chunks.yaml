  raw: 'The first call sets the TTL for the producer overall and all messages it delivers,
    while the second call sets it for one message only. The second call sends a message
    specifying the delivery mode, the priority, and time-to-live (1000). When a message
    is sent, its expiration time is calculated as the sum of the time-to-live value.
    Setting this value in the JMSExpiration header field will cause obsolete messages
    not to be delivered.


    message.setJMSExpiration(1000);


    Specifying Message persistence


    JMS supports two modes of message delivery: persistent and nonpersistent. *Persistent
    delivery* ensures that a message is delivered only once to a consumer, whereas
    *nonpersistent delivery* requires a message be delivered once at most. Persistent
    delivery (which is the default) is more reliable, but at a performance cost, as
    it prevents losing a message if a provider failure occurs.


    The delivery mode can be specified in two ways: by using the setDeliveryMode()
    method


    of the MessageProducer interface, or passing a parameter to the send() method:


    MessageProducer producer = session.createProducer(topic);


    producer.setDeliveryMode(**DeliveryMode.NON_PERSISTENT**);


    // or


    producer.send(message, **DeliveryMode.NON_PERSISTENT**, 2, 1000);


    The first call sets the delivery mode for the producer overall and all messages
    it delivers, while the second call sets it for one message only.


    Controlling acknowledgment


    So far, the scenarios we’ve explored have assumed that a message is sent and received
    without any acknowledgment. But sometimes, you will want a receiver to acknowledge
    the message


    has been received (see Figure 13-10). An acknowledgment phase can be initiated
    either by the JMS provider or by the client, depending on the acknowledgment mode.


    **Figure 13-10.** *A receiver acknowledging a message*


    In transactional sessions, acknowledgment happens automatically when a transaction
    is


    committed. If a transaction is rolled back, all consumed messages are redelivered.
    But in nontransactional sessions, an acknowledgment mode must be specified:


    • AUTO_ACKNOWLEDGE: The session automatically acknowledges the reception of a
    message.


    • CLIENT_ACKNOWLEDGE: A client acknowledges a message by explicitly calling the
    Message.


    acknowledge() method.


    **378**


    Chapter 13 ■ SeNDING MeSSaGeS


    • DUPS_OK_ACKNOWLEDGE: This option instructs the session to lazily acknowledge
    the


    delivery of messages. This is likely to result in the delivery of some duplicate
    mes-


    sages if the JMS provider fails, so it should be used only by consumers that can
    tolerate duplicate messages. If the message is redelivered, the provider sets
    the value of the


    JMSRedelivered header field to true.


    The following code uses the explicit client acknowledgment mode by calling the


    acknowledge() method:


    // Producer


    connection.createSession(false, **Session.CLIENT_ACKNOWLEDGE**);


    producer = session.createProducer(topic);


    message = session.createTextMessage();


    producer.send(message);


    // Consumer


    message. **acknowledge()**;


    Creating Durable Subscribers


    The disadvantage of using the pub-sub model is that a message consumer must be
    running


    when the messages are sent to the topic; otherwise it will not receive them. By
    using durable subscribers, the JMS API provides a way to keep messages in the
    topic until all subscribed consumers receive them. With durable subscription,
    the receiver can be offline for some time, but when it reconnects, it receives
    the messages that arrived during its disconnection. To achieve this, the client
    creates a durable subscriber using the session.


    session. **createDurableSubscriber**(topic,"javaee6DurableSubscription");


    At this point, the client program starts the connection and receives messages.
    The name javaee6DurableSubscription is used as an identifier of the durable subscription.
    Each durable subscriber must have a unique ID, resulting in the declaration of
    a unique connection factory for each potential, durable subscriber.


