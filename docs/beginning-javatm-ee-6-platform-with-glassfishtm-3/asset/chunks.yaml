- fmt: "# `sendOrderToWorkflow()` Method and Asynchronous Processing\n\n`sendOrderToWorkflow()`\
    \ method uses a workflow to process an `Order` object. Let’s imagine that it calls\
    \ several enterprise components (messages, web services, etc.), and each step\
    \ returns a status (an integer). When the client invokes the `sendOrderToWorkflow()`\
    \ method asynchronously, it expects to receive the status of the workflow. The\
    \ client can retrieve the result using the `Future.get()` method, or if for any\
    \ reason it wants to cancel the call, it can use `Future.cancel()`. If a client\
    \ invokes `Future.cancel()`, the container will attempt to cancel the asynchronous\
    \ call only if that call has not already started. Notice that the `sendOrderToWorkflow()`\
    \ method uses the `SessionContext.wasCancelCalled()` method to check whether the\
    \ client has requested to cancel the call or not. As a result, the method returns\
    \ `javax.ejb.AsyncResult<V>`, which is a convenient implementation of `Future<V>`.\
    \ Bear in mind that `AsyncResult` is used as a way to pass the result value to\
    \ the container, not directly to the caller.\n\n**Listing 7-18.** *An OrderEJB\
    \ Declares Two Asynchronous Methods*\n\n```\n@Stateless\n@Asynchronous\npublic\
    \ class OrderEJB {\n    @Resource\n    SessionContext ctx;\n\n    private void\
    \ sendEmailOrderComplete(Order order, Customer customer) {\n        // Send e-mail\n\
    \    }\n\n    private void printOrder(Order order) {\n        // Print order\n\
    \    }\n\n    private Future<Integer> sendOrderToWorkflow(Order order) {\n   \
    \     Integer status = 0;\n        // processing\n        status = 1;\n      \
    \  if (ctx.wasCancelCalled()) {\n            return new AsyncResult<Integer>(2);\n\
    \        }\n        // processing\n        return new AsyncResult<Integer>(status);\n\
    \    }\n}\n```\n\nNotice in Listing 7-18 that the `@Asynchronous` annotation can\
    \ also be applied at the class level. This defines all methods as being asynchronous.\
    \ When the client invokes the `sendOrderToWorkflow()` method, it needs to call\
    \ `Future.get()` in order to retrieve the result value.\n\n```\nFuture<Integer>\
    \ status = orderEJB.sendOrderToWorkflow(order);\nInteger statusValue = status.get();\n\
    ```\n\n## Embeddable Usage\n\nSession beans are container-managed components,\
    \ and that’s their advantage. The container deals with all sorts of services (transaction,\
    \ life cycle, asynchrony, interceptors, etc.), which leaves you to concentrate\
    \ on business code. The downside is that you always need to execute your EJBs\
    \ in a container, even if you just want to test them. To solve this problem, you\
    \ end up having to tweak your business code to be able to test it: adding remote\
    \ interfaces when your EJB only needs local access, creating a remote `TestEJB`\
    \ façade that delegates the calls to your real EJBs, or using a vendor’s specific\
    \ features—but one way or another, you need to have a container running with your\
    \ deployed EJBs.\n\nThis problem has been solved in EJB 3.1 with the creation\
    \ of an embeddable EJB container. EJB 3.1 brings a standard API to execute EJBs\
    \ in a Java SE environment. The embeddable API (package `javax.ejb.embeddable`)\
    \ allows a client to instantiate an EJB container that runs within its own JVM.\
    \ The embeddable container provides a managed environment with support for the\
    \ same basic services that exist within a Java EE container: injection, transactions,\
    \ life cycle, and so forth. Embeddable EJB containers only work with the EJB Lite\
    \ subset API (no MDBs, no Entity Beans 2.x, etc.).\n\nListing 7-19 shows a JUnit\
    \ test class that uses the bootstrapping API to start the container (the `javax.ejb.embeddable.EJBContainer`\
    \ abstract class), look up an EJB, and invoke methods on it.\n\n**Listing 7-19.**\
    \ *A Test Class Using the Embeddable Container*\n\n```\npublic class ItemEJBTest\
    \ {\n    private static EJBContainer ec;\n    private static Context ctx;\n\n\
    \    @BeforeClass\n    public static void initContainer() throws Exception {\n\
    \        ec = EJBContainer.createEJBContainer();\n        ctx = ec.getContext();\n\
    \    }\n\n    @AfterClass\n    public static void closeContainer() throws Exception\
    \ {\n        ec.close();\n    }\n\n    @Test\n    public void createBook() throws\
    \ Exception {\n        // Creates an instance of book\n        Book book = new\
    \ Book();\n        book.setTitle(\"The Hitchhiker's Guide to the Galaxy\");\n\
    \        book.setPrice(12.5F);\n        book.setDescription(\"Science fiction\
    \ comedy book\");\n        book.setIsbn(\"1-84023-742-2\");\n        book.setNbOfPage(354);\n\
    \        book.setIllustrations(false);\n\n        // Looks up for the EJB\n  \
    \      ItemEJB bookEJB = (ItemEJB) ctx.lookup(\"java:global/chapter07/ItemEJB\"\
    );\n\n        // Persists the book to the database\n        book = itemEJB.createBook(book);\n\
    \        assertNotNull(\"ID should not be null\", book.getId());\n\n        //\
    \ Retrieves all the books from the database\n        List<Book> books = itemEJB.findBooks();\n\
    \        assertNotNull(books);\n    }\n}\n```\n\nAs you can see in the `initContainer()`\
    \ method in Listing 7-19, `EJBContainer` contains a factory method (`createEJBContainer()`)\
    \ for creating a container instance. By default, the embeddable container searches\
    \ the client’s classpath to find the set of EJBs for initialization. Once the\
    \ container has been initialized, the method gets the container context (`EJBContainer.getContext()`,\
    \ which returns a `javax.naming.Context`) to look up the `ItemEJB` (using the\
    \ portable global JNDI name syntax).\n\nNote that `ItemEJB` (shown earlier in\
    \ Listing 7-1) is a stateless session bean exposing business methods through a\
    \ no-interface view. It uses injection, container-managed transactions, and a\
    \ JPA `Book` entity. The embeddable container takes care of injecting an entity\
    \ manager and committing or rolling back any transaction. The `closeContainer()`\
    \ method invokes the `EJBContainer.close()` method to shut down the embeddable\
    \ container instance.\n\nI’ve used a test class in this example to show you how\
    \ to use an embeddable EJB container. But bear in mind that EJBs can now be used\
    \ in any kind of Java SE environment: from test classes to Swing applications,\
    \ or even just a `Main` class with a `public static void main()`.\n\n## The Timer\
    \ Service\n\nSome Java EE applications need to schedule tasks in order to get\
    \ notified at certain times. For example, the CD-BookStore application needs to\
    \ send a birthday e-mail to its customers every year, print monthly statistics\
    \ about the items sold, generate nightly reports about inventory levels, and refresh\
    \ a technical cache every 30 seconds.\n\nAs a result, EJB 2.1 introduced a scheduling\
    \ facility called the timer service because clients couldn’t use the `Thread`\
    \ API directly. Compared with other proprietary tools or frameworks (the Unix\
    \ `cron` utility, Quartz, etc.), the timer service was less feature-rich. The\
    \ EJB specification had to wait until the 3.1 version to see a drastic improvement\
    \ of the timer service. It took inspiration from Unix `cron` and other successful\
    \ tools, and today competes with the other products as it responds to most scheduling\
    \ use cases.\n\nThe EJB timer service is a container service that allows EJBs\
    \ to be registered for callback invocation. EJB notifications may be scheduled\
    \ to occur according to a calendar-based schedule, at a specific time, after a\
    \ specific elapsed duration, or at specific recurring intervals. The container\
    \ keeps a record of all the timers, and invokes the appropriate bean instance\
    \ method when a timer has expired. Figure 7-7 shows the two steps involving the\
    \ timer service. First, the EJB needs to create a timer (automatically or programmatically)\
    \ and get registered for callback invocation, and then the timer service triggers\
    \ the registered method on the EJB instance.\n\n**Figure 7-7.** *Interaction between\
    \ the timer service and the session bean*\n\nTimers are intended for long-lived\
    \ business processes and are by default persistent. This means they survive server\
    \ shutdowns, and once the server starts again, the timers are executed as if no\
    \ shutdown had happened. Optionally, you can specify timers to be nonpersistent.\n\
    \n> **Note** Stateless beans, singletons, and MDBs can be registered by the timer\
    \ service, but stateful beans can’t and shouldn’t use the scheduling API."
