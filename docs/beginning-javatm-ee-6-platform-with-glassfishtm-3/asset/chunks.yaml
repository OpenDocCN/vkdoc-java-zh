  trans: '

    当 JSF 被创建时，其初衷是复用 JSP 作为主要的页面描述语言（PDL），因为 JSP 已是 Java EE 的一部分。JSP 使用 EL 和 JSTL，因此想法是在
    JSF 中利用所有这些技术。JSP 是一种页面语言，而 JSF 是构建于其上的组件层。然而，JSP 和 JSF 的生命周期并不契合。JSP 中的标签会从上到下一次性处理以生成响应。而
    JSF 拥有更复杂的生命周期，其中组件树的生成和渲染发生在不同阶段。这正是 Facelets 发挥作用之处：为了适配 JSF 的生命周期。


    Facelets 是 JSP 的一个开源替代方案。与 JSP、EL 和 JSTL 不同，它没有对应的 JSR 规范，也不属于 Java EE。Facelets
    替代了 JSP，并为基于 JSF 的应用程序页面提供了一种基于 XML 的替代方案（XHTML）。Facelets 在设计时充分考虑了 JSF，因此它提供了比
    JSP 更简单的编程模型。


    Facelets 附带了一个用于编写用户界面的标签库，并提供了对 JSTL 标签的部分支持。虽然函数标签库得到完全支持，但只有少数核心标签得到支持（c:if、c:forEach、c:catch
    和 c:set）。但 Facelets 的关键特性是其页面模板功能，这比 JSP 的模板更灵活。它还允许你创建自定义组件，用于 JSF 组件树模型。


    [Facelets 标签库由 URI http://java.sun.com/jsf/facelets 定义](http://java.sun.com/jsf/facelets)，通常使用
    ui 前缀。表 11-8 列出了所有可用的标签。


    **表 11-8.** *Facelets 标签*


    **标签**


    **描述**


    <ui:composition>


    定义一个组合，该组合可选地使用一个模板。多个组合可以使用同一个模板。


    <ui:component>


    创建一个组件。


    <ui:debug>


    捕获调试信息。


    <ui:define>


    定义由模板插入到页面中的内容。


    <ui:decorate>


    允许你装饰页面中的某些内容。


    <ui:fragment>


    添加页面的一部分片段。


    <ui:include>


    封装并在多个 XHTML 页面间复用内容，类似于 JSP 的<jsp:include>。


    <ui:insert>


    将内容插入到模板中。


    <ui:param>


    向包含的文件（使用<ui:include>）或模板传递参数。


    <ui:repeat>


    作为<c:forEach>的替代方案。


    <ui:remove>


    从页面中移除内容。


    Facelets 页面使用 XHTML 编写，看起来就像你之前在清单 11-2 中看到的那样。在本章的“模板”部分，你将看到如何使用 Facelets 进行模板化。


    第 11 章 ■ 页面与组件


    **307**


    **JavaServer Faces**


    我在本章开始时介绍了 JSP、JSTL 和 Facelets，因为它们对于理解 JSF 2.0 至关重要。在编写 JSF 时，你需要选择一种 PDL。在 JSF
    1.2 之前，JSP 是首选的 PDL。JSP 和 JSF 具有不同的页面生命周期；在 JSF 2.0 中，首选的 PDL 是 Facelets（XHTML
    格式的页面）。这并不意味着你不能使用 JSP，但确实意味着你在标签和功能方面会受到限制。


    JSP 的生命周期相对简单。JSP 源文件被编译成一个 Servlet，当 Web 容器收到 HTTP 请求时，它会将请求传递给该 Servlet。Servlet
    处理请求，然后将响应写回客户端。


    JSF 的生命周期更复杂，这就是为什么在“表达式语言”部分，我向你展示了两种不同的语法：一种使用美元符号（${expression}），另一种使用井号（#{expression}）。$用于可以立即执行的表达式（当你确定表达式中的对象可用时），而#用于延迟表达式（需要在生命周期后期进行评估）。


    在 JSF 1.2 中，这两种语法被统一了，但这导致了许多混淆和错误。


    例如，如果你使用 JSP 作为 PDL，你将无法访问某些 JSF 标签（例如 Facelets 标签）。在本节中，我将使用 Facelets 作为 PDL。


    表 11-9 列出了 Facelets PDL 页面可以使用的所有标签库。

    '
- fmt: '`functions`和核心库原本位于JSTL部分，包括`Facelets`标签（带有`ui`前缀）以及新标签，例如JSF的核心标签、HTML标签和`composite`标签，后者允许你创建自定义组件。其他JSTL标签（格式化、SQL和XML操作）不受`Facelets`支持。


    **表11-9.** *Facelets PDL允许使用的标签库*


    | **URI** | **常用前缀** | **描述** |

    | --- | --- | --- |

    | `http://java.sun.com/jsf/html` | `h` | 此标签库包含组件及其HTML渲染器（`h:commandButton`、`h:commandLink`、`h:inputText`等）。
    |

    | `http://java.sun.com/jsf/core` | `f` | 此库包含独立于任何特定渲染的自定义操作（`f:selectItem`、`f:validateLength`、`f:convertNumber`等）。
    |

