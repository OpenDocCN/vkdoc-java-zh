    ■INTRODUCTION


    Chapter 1 briefly presents Java EE 6 essentials and the tools used throughout
    the book


    (JDK, Maven, JUnit, Derby, and GlassFish).


    The persistent tier is described from Chapter 2 to Chapter 5 and focuses on JPA
    2.0\. After a general overview with some hands-on examples in Chapter 2, Chapter
    3 dives into object-relational mapping (mapping attributes, relationships, and
    inheritance). Chapter 4 shows you how to manage and query entities, while Chapter
    5 presents their life cycle, callback methods, and listeners.


    To develop a transaction business logic layer with Java EE 6, you can naturally
    use EJBs.


    This will be described from Chapter 6 to Chapter 9\. After an overview of the
    specification, its history, and a hands-on example in Chapter 6, Chapter 7 will
    concentrate on session beans and their programming model, as well as the new timer
    service. Chapter 8 focuses on the life cycle of EJBs and interceptors, while Chapter
    9 explains transactions and security.


    From Chapter 10 to Chapter 12, you will learn how to develop a presentation layer
    with


    JSF 2.0\. After an overview of the specification in Chapter 10, Chapter 11 will
    focus on how to build a web page with JSF and Facelets components. Chapter 12
    will show you how to interact with an EJB back end and navigate through pages.


    Finally, the last chapters will present different ways to interoperate with other
    systems.


    Chapter 13 will show you how to exchange asynchronous messages with Java Message
    Service (JMS) and Message-Driven Beans (MDBs). Chapter 14 focuses on SOAP web
    services, while


    Chapter 15 covers RESTful web services.


    **downloading and running the Code**


    The examples used in this book are designed to be compiled with the JDK 1.6, deployed
    to the GlassFish V3 application server, and stored in Derby. Chapter 1 shows you
    how to install all these software programs, and each chapter explains how to build,
    deploy, run, and test components depending on the technology used. The code has
    been tested on the Windows


    platform, but not on Linux nor on OS X. The source code of the examples in the
    book is available from the Source Code page of the Apress web site at [http://www.apress.com.](http://www.apress.com)


    ■INTRODUCTION


    **xxvii**


    **Contacting the Author**


    If you have any questions about the content of this book, the code, or any other
    topic, please contact me at [antonio.goncalves@gmail.com. You can also visit my
    web site at](mailto:antonio.goncalves@gmail.com) [http://www.](http://www)


    antoniogoncalves.org.


    C h a p t e r 1


    Java ee 6 at a Glance


    **E**nterprises today live in a global competitive world. They need applications
    to fulfill their business needs, which are getting more and more complex. In this
    age of globalization, companies are distributed over continents, they do business
    24/7 over the Internet and across different countries, and their systems have
    to be internationalized and ready to deal with different currencies and time zones.
    All that while reducing their costs, lowering the response times of their services,
    storing business data on reliable and safe storage, and offering several graphical
    user interfaces to their customers, employees, and suppliers.


    Most companies have to combine these innovative challenges with their existing
    Enter-


    prise Information Systems (EIS) while at the same time developing business-to-business


    applications to communicate with partners. It is also not rare that a company
    has to coordinate in-house data stored in different locations, processed by multiple
    programming


    languages, and routed through different protocols. And of course, it has to do
    this without losing money, which means preventing system crashes and being highly
    available, scalable, and secure. Enterprise applications have to face change and
    complexity, and be robust. That’s precisely why Java Enterprise Edition (Java
    EE) was created.


    The first version of Java EE (originally known as J2EE) focused on the concerns
    that companies were facing back in 1999: distributed components. Since then, software
    applications have had to adapt to new technical solutions like SOAP or RESTful
    web services. The platform has evolved to respond to these technical needs by
    providing various standard ways of working through specifications. Throughout
    the years, Java EE has changed and become richer, simpler, easier to use, and
    more portable.


    In this chapter I’ll give you an overview of Java EE. After an introduction of
    its internal architecture, I’ll cover what’s new in Java EE 6\. The second part
    of this chapter focuses on setting up your development environment so you can
    do some hands-on work by following


    the code snippets listed in these pages.


    **Understanding Java EE**


    When you want to handle collections of objects, you don’t start by developing
    your own


    hashtable; you use the collection API. Similarly, if you need a transactional,
    secure, interoperable, and distributed application, you don’t want to develop
    all the low-level APIs: you use the Enterprise Edition of Java. Just as Java Standard
    Edition (Java SE) provides an API to handle collections, Java EE provides a standard
    way to handle transactions with Java Transaction API (JTA), messaging with Java
    Message Service (JMS), or persistence with Java Persistence API **1**


    ![Image 7](index-32_1.jpg)


    **2**


    Chapter 1 ■ JaVa ee 6 at a GLaNCe


    (JPA). Java EE is a set of specifications intended for enterprise applications.
    It can be seen as an extension of Java SE to facilitate the development of distributed,
    robust, powerful, and highly available applications.'
