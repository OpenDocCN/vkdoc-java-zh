    \n## Chapter 11 ■ Pages and Components\n\n**325**\n\n### Implicit Objects\n\n\
    When you created your composite component, in the implementation you used a `compositeComponent`\
    \ object. You didn’t declare it anywhere; it was simply available so you could\
    \ get the attributes of the component. These kinds of objects are called *implicit\
    \ objects* (or *implicit variables*). Implicit objects are special identifiers\
    \ that map to specific commonly used objects. They are implicit because a page\
    \ has access to them and can use them without needing to explicitly declare or\
    \ initialize them. Implicit objects are used within EL expressions.\n\nTable 11-19\
    \ lists all the implicit objects that a page can have access to.\n\n**Table 11-19.**\
    \ *Implicit Objects*\n\n| Implicit Object | Description | Returns |\n|-----------------|-------------|--------|\n\
    | `application` | Represents the web application environment. Used to get application-level\
    \ configuration parameters. | `Object` |\n| `applicationScope` | Maps application-scoped\
    \ attribute names to their values. | `Map` |\n| `component` | Indicates the current\
    \ component. | `UIComponent` |\n| `compositeComponent` | Indicates the current\
    \ composite component. | `UIComponent` |\n| `cookie` | Specifies a `Map` containing\
    \ cookie names (the key) and `Cookie` objects. | `Map` |\n| `facesContext` | Indicates\
    \ the `FacesContext` instance of this request. | `FacesContext` |\n| `header`\
    \ | Maps HTTP header names to a single `String` header value. | `Map` |\n| `headerValues`\
    \ | Maps HTTP header names to a `String[]` of all values for that header. | `Map`\
    \ |\n| `initParam` | Maps context initialization parameter names to their `String`\
    \ parameter values. | `Map` |\n| `param` | Maps request parameter names to a single\
    \ `String` parameter value. | `Map` |\n| `paramValues` | Maps request parameter\
    \ names to a `String[]` of all values for that parameter. | `Map` |\n| `request`\
    \ | Represents the HTTP request object. | `Object` |\n| `requestScope` | Maps\
    \ request-scoped attribute names to their values. | `Map` |\n| `resource` | Specifies\
    \ the resource object. | `Object` |\n| `session` | Represents the HTTP session\
    \ object. | `Object` |\n| `sessionScope` | Maps session-scoped attribute names\
    \ to their values. | `Map` |\n| `view` | Represents the current view. | `UIViewRoot`\
    \ |\n| `viewScope` | Maps view-scoped attribute names to their values. | `Map`\
    \ |\n\n![Image 103](index-356_1.jpg)\n\n**326**\n\nAll these implicit objects\
