    如果你仍然认为“EJB 不好，EJB 是邪恶的”，那么请阅读本书，你将会改变想法。EJB（企业级 Java Bean）非常出色，整个 Java EE 6 技术栈也是如此。相反，如果你已经是
    Java EE 的采用者，你将在这本书中看到该平台如何通过所有技术栈的易用性、新规范、更轻量的 EJB 组件模型、配置文件和精简功能，找到了平衡点。如果你是
    Java EE 的初学者，这本书也同样适合你：它以非常易于理解的方式涵盖了最重要的规范，并配有大量代码和图表，便于你学习。


    开放标准共同构成了 Java EE 的主要优势之一。如今，使用 JPA、EJB、JSF、JMS、SOAP Web 服务或 RESTful Web 服务编写的应用程序比以往任何时候都更易于跨应用服务器移植。开源是
    Java EE 的另一大优势。正如你将在本书中看到的，大多数 Java EE 6 参考实现都采用开源许可（例如 GlassFish、EclipseLink、Mojarra、OpenMQ、Metro
    和 Jersey）。


    本书探讨了这个新版本的创新之处，并研究了各种规范以及如何将它们组合起来开发应用程序。Java EE 6 包含近 30 个规范，是企业层（EJB 3.1、JPA
    2.0）、Web 层（Servlet 3.0、JSF 2.0）以及互操作性（SOAP Web 服务和 RESTful 服务）的一个重要里程碑。本书涵盖了 Java
    EE 6 规范的很大一部分，并使用了 JDK 1.6 和一些知名的设计模式，以及 GlassFish 应用服务器、Derby 数据库、JUnit 和 Maven。书中配有大量的
    UML 图、Java 代码和屏幕截图。


    **本书结构如何？**


    本书并非旨在成为 Java EE 6 的详尽参考手册。它专注于最重要的规范，并重点介绍此版本的新特性。本书的结构遵循应用程序的架构分层：


    **xxv**


    ![Image 6](img/index-28_1.jpg)


    **xxvi**


    ■ 引言


    第 1 章简要介绍了 Java EE 6 的基本概念以及本书中使用的工具（JDK、Maven、JUnit、Derby 和 GlassFish）。


    持久层从第 2 章到第 5 章进行描述，重点介绍 JPA 2.0。在第 2 章通过一些动手示例进行总体概述之后，第 3 章深入探讨对象-关系映射（映射属性、关系和继承）。第
    4 章向你展示如何管理和查询实体，而第 5 章则介绍它们的生命周期、回调方法和监听器。


    要使用 Java EE 6 开发事务性业务逻辑层，你可以自然地使用 EJB。这将在第 6 章到第 9 章中描述。在第 6 章对规范、其历史以及一个动手示例进行概述之后，第
    7 章将重点介绍会话 Bean 及其编程模型，以及新的定时器服务。第 8 章重点介绍 EJB 的生命周期和拦截器，而第 9 章则解释事务和安全性。


    从第 10 章到第 12 章，你将学习如何使用 JSF 2.0 开发表示层。在第 10 章对规范进行概述之后，第 11 章将重点介绍如何使用 JSF 和 Facelets
    组件构建网页。第 12 章将向你展示如何与 EJB 后端交互并在页面之间导航。


    最后，最后几章将介绍与其他系统进行互操作的不同方式。第 13 章将向你展示如何使用 Java 消息服务（JMS）和消息驱动 Bean（MDB）交换异步消息。第
    14 章重点介绍 SOAP Web 服务，而第 15 章则涵盖 RESTful Web 服务。


    **下载和运行代码**


    本书中使用的示例设计为使用 JDK 1.6 编译，部署到 GlassFish V3 应用服务器，并存储在 Derby 中。第 1 章向你展示如何安装所有这些软件，并且每章都根据所使用的技术解释了如何构建、部署、运行和测试组件。这些代码已在
    Windows 平台上测试过，但未在 Linux 或 OS X 上测试。本书示例的源代码可从 Apress 网站的源代码页面获取，网址为 [`www.apress.com。`](http://www.apress.com)


    ■ 引言


    **xxvii**


    **联系作者**


    如果你对本书内容、代码或任何其他主题有任何疑问，请通过 antonio.goncalves@gmail.com 与我联系。你也可以访问我的网站 [`www.antoniogoncalves.org。`](http://www.antoniogoncalves.org)


    第 1 章


    Java EE 6 概览


    **当**今的企业生活在一个全球竞争的世界中。它们需要应用程序来满足其日益复杂的业务需求。在这个全球化时代，公司分布在各大陆，它们通过互联网 24/7 全天候地在不同国家开展业务，其系统必须国际化，并准备好处理不同的货币和时区。所有这一切都必须在降低成本、缩短服务响应时间、将业务数据存储在可靠且安全的存储设备上，并为客户、员工和供应商提供多种图形用户界面的同时完成。


    大多数公司必须将这些创新挑战与其现有的企业信息系统（EIS）相结合，同时开发企业对企业（B2B）应用程序以与合作伙伴通信。公司需要协调存储在不同地点、由多种编程语言处理并通过不同协议路由的内部数据，这也不罕见。当然，它必须在不亏损的情况下做到这一点，这意味着要防止系统崩溃，并保持高可用性、可扩展性和安全性。企业应用程序必须面对变化和复杂性，并且要健壮。这正是
    Java 企业版（Java EE）被创建的原因。


    Java EE 的第一个版本（最初称为 J2EE）专注于公司在 1999 年面临的关注点：分布式组件。从那时起，软件应用程序不得不适应新的技术解决方案，如
    SOAP 或 RESTful Web 服务。该平台已经发展，通过规范提供各种标准的工作方式来响应这些技术需求。多年来，Java EE 已经发生变化，变得更丰富、更简单、更易于使用，并且更具可移植性。


    在本章中，我将向你概述 Java EE。在介绍其内部架构之后，我将介绍 Java EE 6 的新特性。本章的第二部分重点介绍如何设置你的开发环境，以便你可以通过跟随这些页面中列出的代码片段进行一些动手实践。


    **理解 Java EE**


    当你想要处理对象集合时，你不会从头开始开发自己的哈希表；你会使用集合 API。类似地，如果你需要一个事务性、安全、可互操作且分布式的应用程序，你也不想开发所有底层
    API：你会使用 Java 企业版。正如 Java 标准版（Java SE）提供了处理集合的 API 一样，Java EE 提供了处理事务（Java 事务
    API，JTA）、消息传递（Java 消息服务，JMS）或持久化（Java 持久化 API）的标准方式。


    **1**


    ![Image 7](img/index-32_1.jpg)


    **2**


    第 1 章 ■ Java EE 6 概览


    (JPA)。Java EE 是一组面向企业应用程序的规范。它可以被视为 Java SE 的扩展，旨在促进分布式、健壮、强大且高可用性应用程序的开发。

