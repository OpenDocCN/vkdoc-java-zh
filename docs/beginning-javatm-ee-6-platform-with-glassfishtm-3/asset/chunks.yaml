    JPQL 拥有非常丰富的语法，允许你以任何形式处理实体，并以可移植的方式跨数据库操作。JPA 允许你通过使用原生查询来利用数据库的特定功能。原生查询将原生
    SQL 语句（SELECT、UPDATE 或 DELETE）作为参数，并返回一个用于执行该 SQL 语句的 `Query` 实例。然而，原生查询并不期望能够跨数据库移植。


    如果代码不可移植，为什么不使用 JDBC 调用呢？使用 JPA 原生查询而非 JDBC 调用的主要原因是，查询结果会自动转换回实体。如果你想使用 SQL 从数据库中检索所有客户实体，你需要使用
    `EntityManager.createNativeQuery()` 方法，该方法接受 SQL 查询和结果应映射到的实体类作为参数。


    ```java

    Query query = em. **createNativeQuery("SELECT * FROM t_customer**", ➥


    **Customer.class**);


    List<Customer> customers = query.getResultList();

    ```


    正如你在前面的代码片段中所见，SQL 查询是一个可以在运行时动态创建的字符串（就像 JPQL 动态查询一样）。同样，查询可能很复杂，并且由于持久化提供程序无法预先知道，它每次都会重新解释该查询。与命名查询类似，原生查询可以使用注解来定义静态
