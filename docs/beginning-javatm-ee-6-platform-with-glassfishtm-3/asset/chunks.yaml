    ## GlassFish v3


    While a fairly new application server, GlassFish is already used by a large number
    of developers and corporations. Not only is it the RI for the Java EE technology,
    it is also what you get when downloading Sun''s Java EE SDK. You can also deploy
    critical production applications on the GlassFish application server. Besides
    being a product, GlassFish is also a community that has gathered around the open
    source code and lives on [http://glassfish.org](http://glassfish.org). The community
    is quite responsive on mailing lists and forums.


    ### A Bit of History


    The origins of GlassFish take us back to the early Tomcat days when Sun and the
    JServ group donated this technology to Apache. Ever since, Sun has been reusing
    Tomcat in its various products. In 2005, Sun created the GlassFish project. This
    had as its goal the development of a fully certified Java EE application server
    whose version 1.0 shipped in May 2006. At its core, the web container part of
    GlassFish has a lot of Tomcat heritage (in fact, an application running on Tomcat
    should run unmodified on GlassFish).


    GlassFish v2 was released in September 2007 and has since had several updates.
    This is the most widely deployed version to date. GlassFish tends to be pretty
    good at maintaining the same user experience across major releases, not breaking
    code nor changing developers'' habits. Also, there is no quality difference between
    the "community" and "supported" versions of GlassFish. While paying customers
    have access to patches and additional monitoring tools (GlassFish Enterprise Manager),
    the open source version available from [http://glassfish.org](http://glassfish.org)
    and the supported version available from [http://www.sun.com/appserver](http://www.sun.com/appserver)
    have undergone the same amount of testing, making it easy to switch to a supported
    version at any time in the project cycle.


    For the purpose of this book, I''ll be using GlassFish v3, which at the time of
    writing has not yet shipped as a final Java EE-certified product but is available
    as a "Prelude" version (mainly a web container); being open source, daily promoted
    and milestone builds are made available.


    The main goals of this new major version of GlassFish are modularization of the
    core features with the introduction of an OSGi-based kernel and full support for
    Java EE 6.


    > **Note** The GlassFish team has put a tremendous effort toward having rich and
    up-to-date documentation, making available many different guides: Quick Start
    Guide, Installation Guide, Administration Guide, Administration Reference, Application
    Deployment Guide, Developer''s Guide, and more. Check them out at [http://wiki.glassfish.java.net/Wiki.jsp?page=GlassFishDocs](http://wiki.glassfish.java.net/Wiki.jsp?page=GlassFishDocs).
    Also check the FAQs, how-tos, and the GlassFish forum for more information.


    ### GlassFish v3 Architecture


    As an application programmer (and not one of the GlassFish developers), you do
    not need to understand the internal architecture of GlassFish v3, but you might
    be interested in the main architectural choices and guiding principles. Starting
    with GlassFish v3 Prelude, the application server is built on a modular kernel
    powered by OSGi. GlassFish ships and runs straight on top of the Apache Felix
    implementation, but it should also run with Equinox or Knopflerfish OSGi runtimes.
    `HK2` (the Hundred-Kilobyte Kernel) abstracts the OSGi module system to provide
    components, which can also be viewed as services. Such services can be discovered
    and injected at runtime. OSGi is not exposed to Java EE developers for the time
    being.


    ![Image 20](index-63_1.jpg)


    > **Note** OSGi is a standard for dynamic component management and discovery.
    Applications or components can be remotely installed, started, stopped, updated,
    and uninstalled without requiring a reboot. Components can also detect the addition
    or removal of new services dynamically and adapt accordingly. Apache Felix, Equinox,
    and Knopflerfish are OSGi implementations.


    This modularity and extensibility is how GlassFish v3 can grow from a simple web
    server listening to administrative commands to a more capable runtime by simply
    deploying artifacts such as `war` files (a web container is loaded and started,
    and the application deployed) or EJB `jar` files (which will dynamically load
    and start the EJB container). Additionally, the bare-bones server starts in just
    a few seconds (less than 5 seconds on reasonably modern hardware), and you only
    pay for what you use in terms of startup time and memory consumption. Starting
    the web container on the fly takes about 3 more seconds, and deployments are often
    less than 1 second. This all makes GlassFish v3 a very developer-friendly environment.


    No matter how many modules GlassFish v3 dynamically loads, the administration
    console, the command-line interface, and the centralized configuration file are
    all extensible, and each remains unique. Also worth mentioning is the Grizzly
    framework, which started out as a nonblocking, I/O-based HTTP server to become
    one of the key elements in GlassFish as shown in Figure 1-14.


    **Figure 1-14.** *GlassFish v3 architecture*


    ### Update Center


    Once you''re given a modular application server, you can start to mix and match
    various modules to build your own environment just like you would with IDEs and
    Linux distributions, or similar to the way Firefox lets you manage your extensions.
    The GlassFish Update Center is a set of graphical and command-line tools to manage
    your runtime. The technology behind this is the Image Packaging System (IPS, also
    known as `pkg`), which is what the OpenSolaris project uses for package management.
    Beyond the default set of modules GlassFish is shipped with, a user can connect
    to various repositories to update the existing features, add new features (Grails
    support, a portlet container, etc.) or even new third-party applications. In a
    corporate environment, you can set up your own repository and use the `update
    center pkg` command-line tool to bootstrap the installation of GlassFish-based
    software.


