  raw: 'The primary purpose of the EJB security model is to control access to business
    code. As you’ve just seen, authentication is handled by the web tier (or a client
    application), the principal and its roles are then passed to the EJB tier, and
    the EJB checks whether the authenticated user is allowed to access a method based
    on its role. Like transaction management, authorization can be done either in
    a declarative or a programmatic way.


    With declarative authorization, access control is made by the EJB container. With
    pro-


    grammatic authorization, access control is made in the code using the JAAS API.


    **Declarative Security**


    The declarative security policy can be defined in the bean using annotations or
    in the XML


    deployment descriptor. Declarative authorization involves declaring roles, assigning
    permission to methods (or to the entire bean), or changing temporarily a security
    identity. These controls are made by the annotations described in Table 9-6\.
    Each annotation can be used on the bean and/or on the method.


    **Table 9-6.** *Security Annotations*


    **Annotation**


    **Bean**


    **Method**


    **Description**


    @PermitAll


    X


    X


    Indicates that the given method (or the entire


    bean) is accessible by everyone (all roles are per-


    mitted)


    @DenyAll


    X


    Indicates that no role is permitted to execute the


    specified method (all roles are denied)


    @RolesAllowed


    X


    X


    Indicates that a list of roles is allowed to execute


    the given method (or the entire bean)


    @DeclareRoles


    X


    Defines roles for security checking


    @RunAs


    X


    Temporarily assigns a new role to a principal


    ■**Note** The @TransactionManagement and @TransactionAttribute annotations that
    you saw at the beginning of this chapter are defined in the javax.ejb package
    in the EJB 3.1 specification (JSR 318).


    Security annotations (@RollesAllowed, @DenyAll, etc.) are part of the Common Annotations
    1.0 specification (JSR 250) and come from the javax.annotation.security package.


