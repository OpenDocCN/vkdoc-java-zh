    \n![Cover](cover.jpeg)\n\n![Image 1](index-1_1.png)\n![Image 2](index-1_2.jpg)\n\
    ![Image 3](index-1_3.png)\n\ncyan  \nyelloW  \nMagenTa  \nBlack  \npanTone 123\
    \ c\n\nBooks for professionals By Professionals®  \nThe eXperT’s Voice® in Java™\
    \ Technology\n\n**Companion eBook Available**\n\n**Beginning Java**™ **EE 6 Platform\
    \ with GlassFish**™ **3: From Novice to Professional**\n\nDear Reader,\n\nThis\
    \ book tells you all you need to know about Java™ EE 6, the latest version of\
    \ the Java Enterprise platform. Java EE 6 is richer in features yet more lightweight\
    \ than its predecessors because it introduces profiles (subsets of the full platform).\
    \ Java EE 6 has become more portable by standardizing more components. And Java\
    \ EE 6 is easier to use, because development has been streamlined across the entire\
    \ stack.\n\nI wrote this book to share my experience of Java EE—I’ve been working\
    \ with it since its creation. Like many others, I tried other programming models\
    \ when it put on too much weight. With the arrival of Java EE 5, I recognized\
    \ a major improvement. So I decided to participate in the creative process and\
    \ joined the JCP**SM** expert group for Java EE 6. Now I want to share the benefits\
    \ of this new and exciting release with you.\n\n*Beginning Java*™ *EE 6 Platform\
    \ with GlassFish*™ *3: From Novice to Professional* takes you through all the\
    \ most important innovations in Java EE’s many constituent specifications. You\
    \ will learn how to map objects to relational databases with `JPA 2.0`, write\
    \ a transactional business layer with `EJB`™ `3.1`, add a presentation layer with\
    \ `JSF`™ `2.0`, and interoperate with other diverse systems through `JMS`™, `SOAP`,\
    \ and `RESTful` web services. And all the code examples are specifically written\
    \ to work with GlassFish™ 3, the very latest version of the Reference Implementation\
    \ for the Java EE platform.\n\nAntonio Goncalves  \nExpert member of the `JSR-316`\
    \ (Java EE 6), `JSR-317` (JPA 2.0), and `JSR-318` (EJB 3.1) groups\n\n*Learn the\
    \ new Java™ EE 6 platform from an expert enterprise developer and participant\
    \ in the Java Community Process**SM** Java™ EE 6 expert group.*\n\nTHE APRESS\
    \ ROADMAP  \nCompanion eBook  \nBeginning JSF™ 2 APIs and JBoss® Seam  \nBeginning\
    \ Java™ EE 6 Platform with GlassFish™ 3  \nPro JPA 2\n\nSee last page for details\
    \ on $10 eBook version\n\n**SOURCE CODE ONLINE**\n\nISBN 978-1-4302-1954-5  \n\
    Antonio Goncalves  \nExpert member of the `JSR-316` (Java™ EE 6), `JSR-317` (JPA\
