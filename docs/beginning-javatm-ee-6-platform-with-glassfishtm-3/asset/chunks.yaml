- fmt: "# 排版后的内容\n\nPortable applications should not expect a list to be ordered by\
    \ the database, under the pretext that some database engines automatically optimize\
    \ their indexes so that the data table appears as sorted. Instead, it should use\
    \ either the `@OrderColumn` or `@OrderBy` construct. Note that you can’t use both\
    \ annotations at the same time.\n\n## Inheritance Mapping\n\nSince their creation,\
    \ object-oriented languages have used the inheritance paradigm. C++ allows multiple\
    \ inheritance, and Java supports single-class inheritance. In object-oriented\
    \ languages, developers commonly reuse code by inheriting attributes and behavior\
    \ of root classes.\n\nYou have just studied relationships, and relationships between\
    \ entities have a very straightforward mapping to a relational database. This\
    \ is not the case with inheritance. Inheritance is a completely unknown concept\
    \ and not natively implemented in a relational world.\n\nThe concept of inheritance\
    \ throws in several twists when saving objects into a relational database.\n\n\
    How do you organize a hierarchical model into a flat relational one? JPA has three\
    \ different strategies you can choose from:\n\n- **A single-table-per-class hierarchy\
    \ strategy**: The sum of the attributes of the entire entity hierarchy is flattened\
    \ down to a single table (this is the default strategy).\n\n![Image 49](index-136_1.jpg)\n\
    \n- **A joined-subclass strategy**: In this approach, each entity in the hierarchy,\
    \ concrete or abstract, is mapped to its own dedicated table.\n\n- **A table-per-concrete-class\
    \ strategy**: This strategy maps each concrete entity hierarchy to its own separate\
    \ table.\n\n> **Note**: Support for the table-per-concrete-class inheritance mapping\
    \ strategy is still optional in JPA 2.0. Portable applications should avoid using\
    \ it until officially mandated.\n\nLeveraging the easy use of annotations, JPA\
    \ 2.0 delivers declarative support for defining and mapping inheritance hierarchies,\
    \ including entities, abstract entities, mapped classes, and transient classes.\
    \ The `@Inheritance` annotation is used on the root entity to dictate the mapping\
    \ strategy to itself and to the leaf classes. JPA also transposes the object notion\
    \ of overriding to the mapping, which allows root class attributes be overridden\
    \ by child classes. In the upcoming section, you will also see how the access\
    \ type can be used with inheritance to mix field access and property access.\n\
    \n## Inheritance Strategies\n\nWhen it comes to mapping inheritance, JPA supports\
    \ three different strategies. When an entity hierarchy exists, it always has an\
    \ entity as its root. The root entity class can define the inheritance strategy\
    \ by using the `@Inheritance` annotation. If it doesn’t, the default single-table-per-class\
    \ strategy will be applied. To explore each strategy, I will discuss how to map\
    \ a `CD` and a `Book` entity, both inheriting from the `Item` entity (see Figure\
    \ 3-22).\n\n**Figure 3-22.** *Inheritance hierarchy between CD, Book, and Item*\n\
    \nThe `Item` entity is the root entity and has an identifier, which will turn\
    \ into a primary key, from which both the `CD` and `Book` entities inherit. Each\
    \ of these leaf classes adds extra attributes such as an ISBN for the `Book` entity\
    \ or a total time duration for the `CD` entity.\n\n### Single-table Strategy\n\
    \nThe default inheritance mapping strategy is the single-table strategy, in which\
    \ all the entities in the hierarchy are mapped to a single table. As it is the\
    \ default, you can completely omit the `@Inheritance` annotation on the root entity\
    \ (thanks to configuration by exception), and that’s what the `Item` entity does\
    \ (see Listing 3-58).\n\n**Listing 3-58.** *The Item Entity Defines a Single-Table\
    \ Strategy*\n\n```java\n@Entity\npublic class Item {\n    @Id @GeneratedValue\n\
    \    protected Long id;\n\n    @Column(nullable = false)\n    protected String\
    \ title;\n\n    @Column(nullable = false)\n    protected Float price;\n\n    protected\
    \ String description;\n\n    // Constructors, getters, setters\n}\n```\n\n`Item`\
    \ is the root class for the `Book` entity (see Listing 3-59) and `CD` entity (see\
    \ Listing 3-60)."
  raw: 'Portable applications should not expect a list to be ordered by the database,
    under the pretext that some database engines automatically optimize their indexes
    so that the data table appears as sorted. Instead, it should use either the @OrderColumn
    or @OrderBy construct. Note that you can’t use both annotations at the same time.


    **Inheritance Mapping**


    Since their creation, object-oriented languages have used the inheritance paradigm.
    C++


    allows multiple inheritance, and Java supports single-class inheritance. In object-oriented
    languages, developers commonly reuse code by inheriting attributes and behavior
    of root classes.


    You have just studied relationships, and relationships between entities have a
    very


    straightforward mapping to a relational database. This is not the case with inheritance.
    Inheritance is a completely unknown concept and not natively implemented in a
    relational world.


    The concept of inheritance throws in several twists when saving objects into a
    relational database.


    How do you organize a hierarchical model into a flat relational one? JPA has three
    different strategies you can choose from:


    • *A single-table-per-class hierarchy strategy*: The sum of the attributes of
    the entire entity hierarchy is flattened down to a single table (this is the default
    strategy).


    ![Image 49](index-136_1.jpg)


    **106**


    Chapter 3 ■ OBJeCt-reLatIONaL MappING


    • *A joined-subclass strategy*: In this approach, each entity in the hierarchy,
    concrete or abstract, is mapped to its own dedicated table.


    • *A table-per-concrete-class strategy*: This strategy maps each concrete entity
    hierarchy to its own separate table.


    ■**Note** Support for the table-per-concrete-class inheritance mapping strategy
    is still optional in JPA 2.0.


    Portable applications should avoid using it until officially mandated.


    Leveraging the easy use of annotations, JPA 2.0 delivers declarative support for
    defining and mapping inheritance hierarchies, including entities, abstract entities,
    mapped classes, and transient classes. The @Inheritance annotation is used on
    the root entity to dictate the mapping strategy to itself and to the leaf classes.
    JPA also transposes the object notion of overriding to the mapping, which allows
    root class attributes be overridden by child classes. In the upcoming section,
    you will also see how the access type can be used with inheritance to mix field
    access and property access.


    **Inheritance Strategies**


    When it comes to mapping inheritance, JPA supports three different strategies.
    When an


    entity hierarchy exists, it always has an entity as its root. The root entity
    class can define the inheritance strategy by using the @Inheritance annotation.
    If it doesn’t, the default single-table-per-class strategy will be applied. To
    explore each strategy, I will discuss how to map a CD and a Book entity, both
    inheriting from the Item entity (see Figure 3-22).


    **Figure 3-22.** *Inheritance hierarchy between CD, Book, and Item*


    The Item entity is the root entity and has an identifier, which will turn into
    a primary key, from which both the CD and Book entities inherit. Each of these
    leaf classes adds extra attributes such as an ISBN for the Book entity or a total
    time duration for the CD entity.


    Chapter 3 ■ OBJeCt-reLatIONaL MappING


    **107**


    Single-table Strategy


    The default inheritance mapping strategy is the single-table strategy, in which
    all the entities in the hierarchy are mapped to a single table. As it is the default,
    you can completely omit the


    @Inheritance annotation on the root entity (thanks to configuration by exception),
    and that’s what the Item entity does (see Listing 3-58).


    **Listing 3-58.** *The Item Entity Defines a Single-Table Strategy*


    @Entity


    public class Item {


    @Id @GeneratedValue


    protected Long id;


    **@Column(nullable = false)**


    protected String title;


    **@Column(nullable = false)**


    protected Float price;


    protected String description;


    // Constructors, getters, setters


    }


    Item is the root class for the Book entity (see Listing 3-59) and CD entity (see
    Listing 3-60).'
