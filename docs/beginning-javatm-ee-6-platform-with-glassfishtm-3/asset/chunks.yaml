    **Summary**


    The previous chapter explained SOAP web services. They use a special envelope,
    are described using WSDL, and can be invoked by several protocols, HTTP being
    one of them. In this chapter, I’ve explained RESTful web services, and you should
    now know how different JAX-WS and JAX-RS are to implement.


    This chapter commenced with a general introduction to REST. With simple verbs
    (GET,


    POST, PUT, etc.) and a unified interface, you learned how you can access any resource
    deployed on the Web. The chapter then zoomed in on HTTP, a protocol based on a
    request/response


    mechanism using content negotiation to choose appropriate content type from a
    request.


    **462**


    Chapter 15 ■ reStFUL WeB SerVICeS


    Caching can be employed to optimize network traffic with conditional requests
    using dates and ETags. This optimization can also be used with REST as it is based
    on HTTP.


    JAX-RS is a Java API, shipped with Java EE 6, that simplifies RESTful web service
    development. With a set of annotations, you can define the path and subpaths of
    your resource, extract different kinds of parameters, or map to HTTP methods (@GET,
    @POST, etc.). When developing RESTful web services, you must think about resources,
    how they are linked together, and how to manage their state using HTTP.


