    Composite primary Keys


    When mapping entities, it is good practice to designate a single dedicated column
    as the primary key. However, there are cases where a composite primary key is
    required (such as having to map to a legacy database or when the primary keys
    have to follow certain business rules, for example a date and a value or a country
    code and a time stamp need to be included). To do this, a primary key class must
    be defined to represent the composite key. Then, we have two available annotations
    for defining this class, depending on how we want to structure the entity: @EmbeddedId
    and @IdClass. As you’ll see, the final result is the same, and you will end up
    having the same database schema, but the way to query the entity is slightly different.


    For example, the CD-BookStore application needs to post news frequently on the
    main


    page where you can see daily news about books, music, or artists. The news has
    content, a title, and, because it can be written in several languages, a language
    code (EN for English, PT


    for Portuguese, and so on). The primary key of the news could then be the title
    and the language code because an article can be translated into multiple languages
    but keep its original title. So the primary key class NewsId is composed of two
    attributes of type String: title and language. Primary key classes must include
    method definitions for equals() and hashCode() in order to manage queries and
    internal collections, and their attributes must be in the set of valid types listed
    previously. They must also be public, implement Serializable if they need to cross
    architectural layers (e.g., they will be managed in the persistent layer and used
    in the presentation layer), and have a no-arg constructor.


    **@EmbeddedId**


    As you will see later in this chapter, JPA uses different sorts of embedded objects.
    To sum-marize, an embedded object doesn’t have any identity (no primary key of
    its own), and its attributes will end up as columns in the table of the entity
    that contains it.


    Listing 3-7 shows the NewsId class as an embeddable class. It is just an embedded
    object (annotated with @Embeddable) that happens to be composed of two attributes
    (title and


    language). This class must have no-arg constructor, getter, setter, equals(),
    and hashCode() implementations. The class itself doesn’t have an identity of its
    own (no @Id annotation).


    That’s a characteristic of an embeddable.


    **Listing 3-7.** *The Primary Key Class Is Annotated with @Embeddable*


    **@Embeddable**


    public class NewsId {


    private String title;


    private String language;


    // Constructors, getters, setters, **equals**, and **hashcode**


    }


    **68**


    Chapter 3 ■ OBJeCt-reLatIONaL MappING


    The News entity, shown in Listing 3-8, then has to embed the primary key class
    NewsId with the @EmbeddedId annotation. Every @EmbeddedId must refer to an embeddable
    class marked


    with @Embeddable.


    **Listing 3-8.** *The Entity Embeds the Primary Key Class with @EmbeddedId*


    @Entity


    public class News {


    **@EmbeddedId**


    private **NewsId** id;


    private String content;


    // Constructors, getters, setters


    }


