    return true;


    } else {


    return false;


    }


    }


    }


    与实体或 EJB 类似，Web 服务采用带“配置即异常”策略的注解式 POJO 模型。这意味着，如果所有默认设置都符合你的需求，Web 服务只需是一个标注了
    @javax.jws.WebService 的 Java 类。该 CardValidator Web 服务包含一个用于验证信用卡的方法。它接受一个信用卡对象作为参数，并根据卡是否有效返回
    true 或 false。在此示例中，它假定奇数卡号有效，偶数卡号无效。


    消费者与 Web 服务之间交换的是 CreditCard 对象（见清单 14-2）。在描述 Web 服务架构时，交换的数据必须是 XML 文档，因此需要一种将
