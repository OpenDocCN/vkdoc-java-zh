  trans: '

    SELECT 子句遵循路径表达式语法，其结果可以是以下形式之一：一个实体、一个实体属性、一个构造器表达式、一个聚合函数，或这些元素的某种序列。路径表达式是查询的基本构建块，用于通过点号
    (.) 导航来遍历实体属性或跨越实体关系（或实体集合）。清单 4-23 定义了 SELECT 语句的语法。


    **清单 4-23.** *SELECT 语句语法*


    SELECT <选择表达式>


    FROM <FROM 子句>


    [WHERE <条件表达式>]


    [ORDER BY <ORDER BY 子句>]


    [GROUP BY <GROUP BY 子句>]


    [HAVING <HAVING 子句>]


    一个简单的 SELECT 返回一个实体。例如，如果一个 Customer 实体有一个别名 c，那么 SELECT c 将返回一个实体或一个实体列表。


    第 4 章 ■ 管理持久化对象


    **139**


    **SELECT** c


    FROM Customer c


    但是，SELECT 子句也可以返回属性。如果 Customer 实体有一个名字属性，SELECT c.firstName 将返回一个字符串或一个包含所有名字的字符串集合。


    SELECT c.firstName


    FROM Customer c


    要检索客户的名字和姓氏，可以创建一个包含这两个属性的列表：


    SELECT c.firstName, c.lastName


    FROM Customer c


    如果 Customer 实体与 Address 存在一对一关系，那么 c.address 指向客户的地址，以下查询的结果将返回一个地址列表，而不是客户列表：


    SELECT c.address


    FROM Customer c


    导航表达式可以链接在一起，以遍历复杂的实体图。使用这种技术，可以构造诸如 c.address.country.code 这样的路径表达式，它指向客户地址的国家代码。


    SELECT c.address.country.code


    FROM Customer c


    可以在 SELECT 表达式中使用构造器，以返回一个用查询结果初始化的 Java 类实例。该类不必是实体，但构造器必须是完全限定名，并且其参数必须与属性匹配。


    SELECT **NEW** com.apress.javaee6.CustomerDTO(c.firstName, c.lastName, ➥


    c.address.street1)


    FROM Customer c


    此查询的结果是一个 CustomerDTO 对象列表，这些对象已使用 new 运算符实例化，并用客户的名字、姓氏和街道进行了初始化。


    执行这些查询将返回单个值，或一个包含零个或多个实体（或属性）的集合（可能包含重复项）。要移除重复项，必须使用 DISTINCT 运算符：


    SELECT **DISTINCT** c


    FROM Customer c


    SELECT **DISTINCT** c.firstName


    FROM Customer c


    查询的结果可以是应用于路径表达式的聚合函数的结果。以下聚合函数可用于 SELECT 子句：AVG, COUNT, MAX, MIN, SUM。结果可以在 GROUP
    BY 子句中进行分组，并使用 HAVING 子句进行过滤。


    **140**


    第 4 章 ■ 管理持久化对象


    SELECT **COUNT**(c)


    FROM Customer c


    标量表达式也可以在查询的 SELECT 子句以及 WHERE 和 HAVING 子句中使用。这些表达式可用于数值（ABS, SQRT, MOD, SIZE,
    INDEX）、字符串（CONCAT, SUBSTRING, TRIM, LOWER, UPPER, LENGTH）和日期时间（CURRENT_DATE, CURRENT_TIME,
    CURRENT_TIMESTAMP）值。


    **From**


    查询的 FROM 子句通过声明标识变量来定义实体。一个*标识变量*，或*别名*，是一个可以在其他子句（SELECT, WHERE 等）中使用的标识符。FROM
    子句的语法由一个实体和一个别名组成。在以下示例中，Customer 是实体，c 是标识变量：


    SELECT c


    **FROM** Customer c


    **Where**


    查询的 WHERE 子句由一个条件表达式组成，用于限制 SELECT、UPDATE 或 DELETE 语句的结果。WHERE 子句可以是一个简单的表达式，也可以是一组条件表达式，以复杂的方式过滤查询。


    限制查询结果的最简单方法是使用实体的属性。例如，以下查询选择所有名为 Vincent 的客户：


    SELECT c


    FROM Customer c


    **WHERE** c.firstName = ''Vincent''


    你可以通过使用逻辑运算符 AND 和 OR 进一步限制查询。以下示例使用 AND 来选择所有名为 Vincent 且居住在法国的客户：


    SELECT c


    FROM Customer c


    WHERE c.firstName = ''Vincent'' **AND** c.address.country = ''France''


    WHERE 子句还使用比较运算符：=, >, >=, <, <=, <>, [NOT] BETWEEN, [NOT] LIKE, [NOT] IN, IS
    [NOT] NULL, IS [NOT] EMPTY, [NOT] MEMBER [OF]。以下展示了使用其中两个运算符的示例：


    SELECT c


    FROM Customer c


    WHERE c.age **>** 18


    SELECT c


    FROM Customer c


    WHERE c.age **NOT BETWEEN** 40 AND 50


    第 4 章 ■ 管理持久化对象


    **141**


    SELECT c


    FROM Customer c


    WHERE c.address.country **IN** (''USA'', ''Portugal'')


    LIKE 表达式由一个字符串和可选的转义字符组成，用于定义匹配条件：下划线 (_) 表示单字符通配符，百分号 (%) 表示多字符通配符。


    SELECT c


    FROM Customer c


    WHERE c.email **LIKE** ''%mail.com''


    绑定参数


    到目前为止，此处展示的 WHERE 子句仅使用了固定值。在应用程序中，查询通常依赖于参数。JPQL 支持两种参数绑定语法，允许动态更改查询的限制子句：位置参数和命名参数。


    *位置参数* 由问号 (?) 后跟一个整数（例如，?1）表示。执行查询时，需要指定应被替换的参数编号。


    SELECT c


    FROM Customer c


    WHERE c.firstName = **?1** AND c.address.country = **?2**


    *命名参数* 也可以使用，并由一个以冒号 (:) 符号为前缀的字符串标识符表示。执行查询时，需要指定应被替换的参数名称。


    SELECT c


    FROM Customer c


    WHERE c.firstName = **:fname** AND c.address.country = **:country**


    在本章后面的“查询”部分，你将看到应用程序如何绑定参数。


    子查询


    子查询是嵌入在 WHERE 或 HAVING 子句的条件表达式中的 SELECT 查询。子查询的结果在主查询的条件表达式中进行评估和解释。要从数据库中检索最年轻的客户，首先执行一个带有
    MIN(age) 的子查询，然后将其结果在主查询中进行评估。


    SELECT c


    FROM Customer c


    WHERE c.age = (**SELECT MIN(c. age) FROM Customer c**)


    **142**


    第 4 章 ■ 管理持久化对象


    **Order By**


    ORDER BY 子句允许对 SELECT 查询返回的实体或值进行排序。排序应用于此子句中指定的实体属性，后跟 ASC 或 DESC 关键字。关键字 ASC
    指定使用升序排序；DESC 则相反，指定使用降序排序。升序是默认值，可以省略。


    SELECT c


    FROM Customer c


    WHERE c.age > 18


    **ORDER BY** c.age **DESC**


    也可以使用多个表达式来细化排序顺序。


    SELECT c


    FROM Customer c


    WHERE c.age > 18


    **ORDER BY** c.age **DESC**, c.address.country **ASC**


    **Group By 和 Having**


    GROUP BY 结构允许根据一组属性对结果值进行聚合。实体根据 GROUP BY 子句中指定的实体字段的值被分成组。要按国家分组并统计客户数量，请使用以下查询：


    SELECT c.address.country, count(c)


    FROM Customer c


    **GROUP BY** c.address.country


    GROUP BY 定义了分组表达式（c.address.country），结果将根据这些表达式进行聚合和计数（count(c)）。请注意，出现在 GROUP
    BY 子句中的表达式也必须出现在 SELECT 子句中。'
- fmt: '# HAVING 子句


    `HAVING`子句定义了在查询结果分组后应用的过滤器，类似于对`GROUP BY`结果进行二次过滤的`WHERE`子句。使用前面的查询，通过添加`HAVING`子句，可以只返回客户数量大于1000的国家。


    ```

    SELECT c.address.country, count(c)

    FROM Customer c

    GROUP BY c.address.country

    HAVING count(c) > 100

    ```


    `GROUP BY`和`HAVING`只能在`SELECT`子句中使用。


    # 批量删除


    您知道如何使用`EntityManager.remove()`方法删除实体，以及如何查询数据库以检索符合特定条件的实体列表。要删除实体列表，您可以执行查询、遍历结果并逐个删除实体。虽然这是一个有效的算法，但性能极差（数据库访问次数过多）。


    有一种更好的方法：批量删除。


    JPQL支持跨特定实体类的多个实例执行批量删除操作。这些操作用于在单个操作中删除大量实体。`DELETE`语句看起来与`SELECT`语句类似，因为它可以包含限制性的`WHERE`子句和参数。


    操作完成后，会返回受影响的实体实例数量。清单4-24描述了`DELETE`语句的语法。


    **清单4-24.** `DELETE`语句语法


    ```

    DELETE FROM <entity name> [[AS] <identification variable>]

    [WHERE <conditional expression>]

    ```


    例如，要删除所有年龄小于18岁的客户，可以使用`DELETE`语句进行批量删除：


    ```

    DELETE FROM Customer c

    WHERE c.age < 18

    ```


    # 批量更新


    实体的批量更新通过`UPDATE`语句完成，根据`WHERE`子句中的条件设置实体的一个或多个属性。`UPDATE`语句的语法如清单4-25所示。


    **清单4-25.** `UPDATE`语句语法


    ```

    UPDATE <entity name> [[AS] <identification variable>]

    SET <update statement> {, <update statement>}*

    [WHERE <conditional expression>]

    ```


    与其删除所有年轻客户，不如使用以下语句将其名字改为"too young"：


    ```

    UPDATE Customer c

    SET c.firstName = ''TOO YOUNG''

    WHERE c.age < 18

    ```


    # 查询


    您已经了解了JPQL语法以及如何使用不同的子句（`SELECT`、`FROM`、`WHERE`等）描述语句。但是如何将JPQL语句集成到您的应用程序中呢？答案是通过查询。JPA
    2.0有四种不同类型的查询可用于代码中，每种都有不同的用途：


    - **动态查询**：这是最简单的查询形式，仅包含在运行时动态指定的JPQL查询字符串。

    - **命名查询**：命名查询是静态且不可更改的。

    - **原生查询**：这种查询类型用于执行原生SQL语句而不是JPQL语句。

    - **Criteria API**：JPA 2.0引入了这一新概念。


    选择这四种查询类型的核心是`EntityManager`接口，它提供了多个工厂方法，如表4-3所示，这些方法都返回`Query`接口。


    **表4-3.** `EntityManager`创建查询的方法


    | 方法 | 描述 |

    |------|------|

    | `Query createQuery(String jpqlString)` | 创建用于执行JPQL语句的`Query`实例，用于动态查询 |

    | `Query createQuery(QueryDefinition qdef)` | 创建用于执行条件查询的`Query`实例 |

    | `Query createNamedQuery(String name)` | 创建用于执行命名查询（JPQL或原生SQL）的`Query`实例 |

    | `Query createNativeQuery(String sqlString)` | 创建用于执行原生SQL语句的`Query`实例 |

    | `Query createNativeQuery(String sqlString, Class resultClass)` | 创建用于执行原生SQL语句的`Query`实例，并传递预期结果的类
    |


