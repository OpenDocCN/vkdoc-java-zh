- fmt: "# Navigation and Message Handling in JSF\n\nNavigation can be done directly\
    \ in the managed beans or by `faces-config.xml`, but when to use one over the\
    \ other? The first reason to directly return the page name in managed beans is\
    \ simplicity; the Java code is explicit, and there is no external XML file to\
    \ work with. If the web application has an extensive page flow, you might want\
    \ to keep it in a single place, so that any changes can be made in a central location\
    \ instead of across several pages; and again, using a mix of both can result in\
    \ having part of your navigation in your beans and another in the `faces-config.xml`\
    \ file.\n\nThere is one case where using XML configuration is very useful; when\
    \ there are global links on several pages (for example, login or logout that can\
    \ be done in an entire application), as you do not want to define them for every\
    \ single page. Global navigation rules can be used in XML (but the same feature\
    \ is not possible within managed beans):\n\n```xml\n<navigation-rule>\n  <from-view-id>*</from-view-id>\n\
    \  <navigation-case>\n    <from-outcome>logout</from-outcome>\n    <to-view-id>logout.xhtml</to-view-id>\n\
    \  </navigation-case>\n</navigation-rule>\n```\n\nIf you have an action that applies\
    \ to every page in the application, you can use a `navigation-rule` element without\
    \ a `<from-view-id>` or using a wildcard (`*`). The preceding code indicates that\
    \ for any page the user is on, if the method of the managed bean returns the logical\
    \ name `logout`, forward the user to the `logout.xhtml` page.\n\nThe previous\
    \ examples showed simple navigation where one page has only one navigation rule\
    \ and only one page to go to. This is not often the case, and depending on certain\
    \ rules or exceptions, users can be redirected to different pages. This is also\
    \ possible with managed beans and with the `faces-config.xml` file. The following\
    \ code shows a switch case that redirects to three different pages. Note that\
    \ when the `null` value is returned, the user goes back to the page he is already\
    \ on.\n\n```java\npublic String doNewBookForm() {\n  switch (value) {\n    case\
    \ 1: return \"page1.xhtml\"; break;\n    case 2: return \"page2.xhtml\"; break;\n\
    \    case 3: return \"page3.xhtml\"; break;\n    default: return null; break;\n\
    \  }\n}\n```\n\n## Message Handling\n\nManaged beans process business logic, call\
    \ EJBs and databases, and so on, and sometimes things can go wrong. In this case,\
    \ the user has to be informed through a message to take action. Messages can be\
    \ split into two categories: application errors (involving business logic or database\
    \ or network connection) and user input errors (invalid ISBN or empty fields).\n\
    \nApplication errors can generate a completely different page asking the user\
    \ to retry in a few moments, for example. Input errors can be displayed in the\
    \ same page, with text describing the error, and messages can also be informational,\
    \ such as one indicating that a book was successfully added to the database.\n\
    \nIn the previous chapter, tags were used to display messages on pages (`<h:message>`\
    \ and `<h:messages>`). To produce these messages, JSF allows you to queue messages\
    \ by calling the `FacesContext.addMessage()` method in your managed beans. The\
    \ signature of the method is as follows:\n\n```java\nvoid addMessage(String clientId,\
    \ FacesMessage message)\n```\n\nThis method appends a `FacesMessage` to the set\
    \ of messages to be displayed. The first parameter of this method specifies a\
    \ client identifier. This parameter refers to the UI component ID the message\
    \ is registered to. If `clientId` is `null`, the message doesn’t refer to any\
    \ special component and is said to be global to all pages. A message consists\
    \ of a summary text, a detailed text, and a severity level (fatal, error, warning,\
    \ and info). Messages can also be internationalized using message bundles.\n\n\
    ```java\nFacesMessage(Severity severity, String summary, String detail)\n```\n\
    \nThe following code is a snippet of a managed bean that creates a book. If the\
    \ creation succeeds, an informational message is queued. If an exception is caught,\
    \ an error message is added to the messages queue to be displayed. Note that both\
    \ messages are global because the `clientId` is `null`:\n\n```java\nFacesContext\
    \ ctx = FacesContext.getCurrentInstance();\ntry {\n  book = bookEJB.createBook(book);\n\
    \  ctx.addMessage(null, new FacesMessage(FacesMessage.SEVERITY_INFO,\n    \"Book\
    \ has been created\", \"The book\" + book.getTitle() +\n    \" has been created\
    \ with id=\" + book.getId()));\n} catch (Exception e) {\n  ctx.addMessage(null,\
    \ new FacesMessage(FacesMessage.SEVERITY_ERROR,\n    \"Book hasn't been created\"\
    , e.getMessage()));\n}\n```\n\n![Image 108](index-372_1.jpg)\n\nThese messages\
    \ being global, they can be displayed in a page using a single `<h:messages>`\
    \ tag. But you might want to display a message at a specific place on the page\
    \ for a specific component (as is usually the case with validation or conversion\
    \ errors). Figure 12-5 shows a page with a message specifically aimed at the price\
    \ input field.\n\n**Figure 12-5.** *A page displaying a message for a UI component*\n\
    \nThe page will have an input text field with an identifier (`id=\"priceId\"`),\
    \ and the `<h:message>` tag will refer to that component (`for=\"priceId\"`).\
    \ The result will be that this specific message will only be displayed for this\
    \ component:\n\n```xml\n<h:inputText id=\"priceId\" value=\"#{bookController.book.price}\"\
    />\n<h:message for=\"priceId\"/>\n```\n\nIf the price field has not been completed,\
    \ a message appears next to the price input text field, which is when the `clientId`\
    \ can be used, as components are identified by their identifier.\n\nThe code of\
    \ the managed bean that follows checks the price and, if not valid, creates a\
    \ warning message associating it with the `priceId` component ID:\n\n```java\n\
    if (book.getPrice() == null || \"\".equals(book.getPrice())) {\n  ctx.addMessage(\"\
    priceId\", new FacesMessage(SEVERITY_WARN,\n    \"Please, fill the price !\",\
    \ \"Enter a number value\"));\n}\n```\n\nJSF uses this messaging mechanism for\
    \ converters and validators.\n\n## Conversion and Validation\n\nYou’ve just seen\
    \ how to handle messages to inform the end user about actions to be taken. One\
    \ possible action is to correct an invalid input value (e.g., invalid ISBN). JSF\
    \ provides a standard conversion and validation mechanism that can process user\
    \ inputs to ensure data integrity. In this way, when you invoke business methods\
    \ to process, you can safely rely on valid data. Conversion and validation allow\
    \ the developer to focus on business logic rather than checking whether the input\
    \ data is not null, fits a range of values, and so on.\n\n![Image 109](index-373_1.jpg)\n\
    \nConversion takes place when data input by the end user has to be converted from\
    \ a `String` to an object and vice versa. It ensures that data is of the right\
    \ type—for example, in converting a `String` to a `java.util.Date`, a `String`\
    \ to an `Integer`, or a price in dollars to euros. As for validation, it ensures\
    \ data contains the expected content (a date following the `dd/MM/yyyy` format,\
    \ a float between 3.14 and 3.15, etc.).\n\nConversion and validation occur during\
    \ different phases of the page life cycle (which you saw in the previous chapter)\
    \ as shown in Figure 12-6.\n\n**Figure 12-6.** *Conversation and validation during\
    \ page life cycle*\n\nDuring the *Apply request values* phase in Figure 12-6,\
    \ the UI component value is converted to the targeted object and then validated\
    \ during the *Process validation* phase. It makes sense that conversion and validation\
    \ occur before component data is bound to the backing bean (which happens during\
    \ the *Update model values* phase). If any error is found, it will result in adding\
    \ error messages and shortening the life cycle, so it goes straight to *Render\
    \ response* (and messages will be displayed on the user interface with `<h:messages/>`).\
    \ During this phase, the backing bean properties are converted back to a string\
    \ to be displayed."
