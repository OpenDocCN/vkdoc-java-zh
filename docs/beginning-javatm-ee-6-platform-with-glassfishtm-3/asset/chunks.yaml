    **Understanding Entities**


    When talking about mapping objects to a relational database, persisting objects,
    or querying objects, the term “entity” should be used rather than “objects.” Objects
    are instances that just live in memory. Entities are objects that live shortly
    in memory and persistently in a database. They have the ability to be mapped to
    a database; they can be concrete or abstract; and they support inheritance, relationships,
    and so on. These entities, once mapped, can be managed by JPA. You can persist
    an entity in the database, remove it, and query it using a query language (Java
    Persistence Query Language, or JQPL). ORM lets you manipulate entities while under
    the covers the database is being accessed. And as you will see, an entity follows
    a defined life cycle. With callback methods and listeners, JPA lets you hook some
    business code to life-cycle events.


    **Object-Relational Mapping**


    The principle of ORM is to delegate to external tools or frameworks (in our case
    JPA) the task of creating a correspondence between objects and tables. The world
    of classes, objects, and attributes can then be mapped to relational databases
    made of tables containing rows and columns. Mapping gives an object-oriented view
    to developers who can transparently use entities instead of tables. And how does
    JPA map objects to a database? Through *metadata*.


    Associated with every entity is metadata that describes the mapping. This metadata


    enables the persistence provider to recognize an entity and to interpret the mapping.
    This metadata can be written in two different formats:


    • *Annotations*: The code of the entity is directly annotated with all sorts of
    annotations that are described in the javax.persistence package.


    • *XML descriptors*: Instead of (or in addition to) annotations, you can use XML
    descriptors. The mapping is defined in an external XML file that will be deployed
    with the


    entities. This can be very useful when database configuration changes depending
    on


    the environment, for example.


    To make the mapping easier, JPA (like many other Java EE 6 specifications) uses
    the


    concept of *configuration by exception* (sometimes referred as *programming by
    exception*).


    The idea is that JPA has certain default mapping rules (e.g., the table name is
    the same as the entity name). If you are happy with them, you don’t need to use
    extra metadata (no annotation or XML is needed), but if you don’t want the provider
    to apply the default rules, you can customize the mapping to your own needs using
    metadata. In other words, having to supply a configuration is the exception to
    the rule.


