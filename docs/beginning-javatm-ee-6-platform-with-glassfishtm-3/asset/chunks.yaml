    ## Callbacks and Listeners


    Entities are just Plain Old Java Objects (POJOs) that are managed, or not, by
    the entity manager. When they are managed, they have a persistence identity, and
    their state is synchronized with the database. When they are not managed (i.e.,
    they are detached from the entity manager), they can be used like any other Java
    class. This means that entities have a life cycle, as shown in Figure 2-3. When
    you create an instance of the `Book` entity with the `new` operator, the object
    exists in memory, and JPA knows nothing about it (it can even end up being garbage
    collected). When it becomes managed by the entity manager, its state is mapped
    and synchronized with the `BOOK` table. Calling the `EntityManager.remove()` method
    deletes the data from the database, but the Java object continues living in memory
    until it gets garbage collected.


    **Figure 2-3.** *The life cycle of an entity*


    The operations made to entities fall into four categories: persisting, updating,
    removing, and loading, which correspond to the database operations of inserting,
    updating, deleting, and selecting, respectively. Each operation has a “Pre” and
    “Post” event (except for loading, which only has a “Post” event) that can be intercepted
    by the entity manager to invoke a business method. As you will see in Chapter
    5, you will have `@PrePersist` and `@PostPersist` annotations, and so on. JPA
    allows you to hook business logic to the entity when these events occur. These
    annotations can be set on entity methods (a.k.a. callback methods) or in external
    classes (a.k.a. listeners). You can think of callback methods and listeners as
    analogous triggers in a relational database.


    ## Putting It All Together


    Now that you know a little bit about JPA, EclipseLink, entities, the entity manager,
    and JPQL, let’s put them all together and write a small application that persists
    an entity to a database.


    The idea is to write a simple `Book` entity and a `Main` class that persists a
    book. You’ll then compile it with Maven 2 and run it with EclipseLink and a Derby
    client database. To show how easy it is to unit test an entity, I will show you
    how to write a test class (`BookTest`) with a JUnit 4 test case and use the embedded
    mode of Derby for persisting data using an in-memory database.


    This example follows the Maven directory structure, so classes and files have
    to be placed in the following directories:


    - `src/main/java`: For the `Book` entity and the `Main` class

    - `src/main/resources`: For the `persistence.xml` file used by the `Main` class

    - `src/test/java`: For the `BookTest` class, which is used for unit testing

    - `src/test/resources`: For the `persistence.xml` file used by the test cases

    - `pom.xml`: For the Maven Project Object Model (POM), which describes the project
    and its dependencies on other external modules and components


    ### Writing the Book Entity


    The `Book` entity, shown in Listing 2-3, needs to be developed under the `src/main/java`
    directory. It has several attributes (a title, a price, etc.) of different data
    types (`String`, `Float`, `Integer`, and `Boolean`) and some JPA annotations:


    - `@Entity` informs the persistence provider that this class is an entity and
    that it should manage it.

    - `@Id` defines the `id` attribute as being the primary key.

    - The `@GeneratedValue` annotation informs the persistence provider to autogenerate
    the primary key using the underlying database id utility.

    - The `@Column` annotation is used to specify that the `title` property must be
    nonnull when persisted and to change the default maximum length of the column
    description.

    - The `@NamedQuery` annotation defines a named query that uses JPQL to retrieve
    all the books from the database.'
