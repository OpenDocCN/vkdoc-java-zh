- fmt: "# Object-Relational Mapping\n\nThere are significant differences in the way\
    \ data is handled in Java and in a relational database. In Java, we use classes\
    \ to describe both attributes for holding data and methods to access and manipulate\
    \ that data. Once a class is defined, we can create as many instances as we need\
    \ with the `new` keyword. In a relational database, only data is stored, not behavior\
    \ (except for triggers or stored procedures), and the storage structure is completely\
    \ different from one using objects, as it uses rows and columns. Sometimes mapping\
    \ Java objects to the underlying database can be easy, and the default rules can\
    \ be applied. At other times, these rules do not meet your needs, and you must\
    \ customize the mapping. Elementary mapping annotations focus on customizing the\
    \ table, the primary key, and the columns, and they let you modify certain naming\
    \ conventions or typing (not-null column, length, etc.).\n\n## Tables\n\nRules\
    \ for configuration-by-exception mapping state that the entity and the table name\
    \ are the same (a `Book` entity is mapped to a `BOOK` table, an `AncientBook`\
    \ entity is mapped to an `ANCIENTBOOK` table, and so on). This might suit you\
    \ in most cases, but you may want to map your data to a different table, or even\
    \ map a single entity to several tables.\n\n### `@Table`\n\nThe `@javax.persistence.Table`\
    \ annotation makes it possible to change the default values related to the table.\
    \ For example, you can specify the name of the table in which the data will be\
    \ stored, the catalog, and the database schema. If this annotation is omitted,\
    \ the name of the table will be the name of the entity. If you want to change\
    \ the name to `T_BOOK` instead of `BOOK`, you would do as shown in Listing 3-3.\n\
    \n**Listing 3-3.** *The Book Entity Being Mapped to a T_BOOK Table*\n\n```java\n\
    @Entity\n@Table(name = \"t_book\")\npublic class Book {\n    @Id\n    private\
    \ Long id;\n    private String title;\n    private Float price;\n    private String\
    \ description;\n    private String isbn;\n    private Integer nbOfPage;\n    private\
    \ Boolean illustrations;\n\n    public Book() {\n    }\n\n    // Getters, setters\n\
    }\n```\n\n> **Note:** In the `@Table` annotation, I include a lowercase table\
    \ name (`t_book`). By default, most databases will map the entity to an uppercase\
    \ table name (and that's the case with Derby) except if you configure them to\
    \ honor case.\n\n### `@SecondaryTable`\n\nUp to now, I have assumed that an entity\
    \ gets mapped to a single table, also known as a *primary table*. But sometimes\
    \ when you have an existing data model, you need to spread the data across multiple\
    \ tables, or *secondary tables*. To do this, you need to use the annotation `@SecondaryTable`\
    \ to associate a secondary table to an entity or `@SecondaryTables` (with an \"\
    s\") for several secondary tables. You can distribute the data of an entity across\
    \ columns in both the primary table and the secondary tables simply by defining\
    \ the secondary tables with annotations and then specifying for each attribute\
    \ which table it is in (with the `@Column` annotation, which I'll describe in\
    \ the \"Attributes\" section in more detail). Listing 3-4 shows an `Address` entity\
    \ mapping its attributes in one primary table and two secondary tables.\n\n**Listing\
    \ 3-4.** *Attributes of the Address Entity Mapped in Three Different Tables*\n\
    \n```java\n@Entity\n@SecondaryTables({\n    @SecondaryTable(name = \"city\"),\n\
    \    @SecondaryTable(name = \"country\")\n})\npublic class Address {\n    @Id\n\
    \    private Long id;\n    private String street1;\n    private String street2;\n\
    \n    @Column(table = \"city\")\n    private String city;\n\n    @Column(table\
    \ = \"city\")\n    private String state;\n\n    @Column(table = \"city\")\n  \
    \  private String zipcode;\n\n    @Column(table = \"country\")\n    private String\
    \ country;\n\n    // Constructors, getters, setters\n}\n```\n\nBy default, the\
    \ attributes of the `Address` entity are mapped to the primary table (which has\
    \ the default name of the entity, so the table is called `ADDRESS`). The annotation\
    \ `@SecondaryTables` informs you that there are two secondary tables: `CITY` and\
    \ `COUNTRY`. You then need to specify which attribute is stored in which secondary\
    \ table (using the annotation `@Column(table=\"city\")` or `@Column(table=\"country\"\
    )`). The result, shown in Figure 3-2, is the creation of three tables containing\
    \ different attributes, but with the same primary key (to join the tables together).\
    \ Again, remember that Derby translates lowercase table names (`city`) into uppercase\
    \ (`CITY`).\n\n![Image 29](index-95_1.jpg)\n\n**Figure 3-2.** *The Address entity\
    \ is mapped to three tables.*\n\nAs you probably understand by now, you can have\
    \ several annotations in the same entity. If you want to rename the primary table,\
    \ you can add the `@Table` annotation as demonstrated in Listing 3-5.\n\n**Listing\
    \ 3-5.** *The Primary Table Is Renamed to T_ADDRESS*\n\n```java\n@Entity\n@Table(name\
    \ = \"t_address\")\n@SecondaryTables({\n    @SecondaryTable(name = \"t_city\"\
    ),\n    @SecondaryTable(name = \"t_country\")\n})\npublic class Address {\n  \
    \  // Attributes, constructor, getters, setters\n}\n```\n\n> **Note:** When you\
    \ use secondary tables, you must consider the issue of performance. Every time\
    \ you access an entity, the persistence provider accesses several tables and has\
    \ to join them. On the other hand, secondary tables can be a good thing when you\
    \ have expensive attributes such as binary large objects (BLOBs) that you want\
    \ to isolate in a different table.\n\n## Primary Keys\n\nIn relational databases,\
    \ a primary key uniquely identifies each row in a table. It comprises either a\
    \ single column or set of columns. Primary keys must be unique, as they identify\
    \ a single row (a null value is not allowed). Examples of primary keys are a customer\
    \ identifier, a telephone number, an order reference, and an ISBN. JPA requires\
    \ entities to have an identifier mapped to a primary key, which will follow the\
    \ same rule: uniquely identify an entity by either a single attribute or a set\
    \ of attributes (composite key). This entity's primary key value cannot be updated\
    \ once it has been assigned.\n\n### `@Id` and `@GeneratedValue`\n\nA simple (i.e.,\
    \ noncomposite) primary key must correspond to a single attribute of the entity\
    \ class. The `@Id` annotation that you've seen before is used to denote a simple\
    \ primary key. `@javax.persistence.Id` annotates an attribute as being a unique\
    \ identifier. It can be one of the following types:\n\n- *Primitive Java types*:\
    \ `byte`, `int`, `short`, `long`, `char`\n- *Wrapper classes of primitive Java\
    \ types*: `Byte`, `Integer`, `Short`, `Long`, `Character`\n- *Arrays of primitive\
    \ or wrapper types*: `int[]`, `Integer[]`, etc.\n- *Strings, numbers, and dates*:\
    \ `java.lang.String`, `java.math.BigInteger`, `java.util.Date`, `java.sql.Date`\n\
    \nWhen creating an entity, the value of this identifier can be generated either\
    \ manually by the application or automatically by the persistence provider using\
    \ the `@GeneratedValue` annotation. This annotation can have four possible values:\n\
    \n- `SEQUENCE` and `IDENTITY` specify use of a database SQL sequence or identity\
    \ column, respectively.\n- `TABLE` instructs the persistence provider to store\
    \ the sequence name and its current value in a table, increasing the value each\
    \ time a new instance of the entity is persisted. As an example, Derby creates\
    \ a `SEQUENCE` table with two columns: the sequence name (which is an arbitrary\
    \ name) and the sequence value (an integer automatically incremented by Derby).\n\
    - The generation of a key is done automatically (`AUTO`) by the underlying database,\
    \ which will pick an appropriate strategy for a particular database. `AUTO` is\
    \ the default value of the `@GeneratedValue` annotation.\n\nIf the `@GeneratedValue`\
    \ annotation is not defined, the application has to create its own identifier\
    \ by applying any algorithm that will return a unique value. The code in Listing\
    \ 3-6 shows how to have an automatically generated identifier. `GenerationType.AUTO`\
    \ being the default value."
