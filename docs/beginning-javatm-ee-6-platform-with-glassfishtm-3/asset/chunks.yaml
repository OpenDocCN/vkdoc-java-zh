    可移植的应用程序不应期望数据库对列表进行排序，即便某些数据库引擎会自动优化索引以使数据表看起来已排序。相反，应使用 `@OrderColumn` 或 `@OrderBy`
    构造。请注意，不能同时使用这两个注解。


    **继承映射**


    自诞生以来，面向对象语言一直使用继承范式。C++ 允许多重继承，而 Java 支持单类继承。在面向对象语言中，开发者通常通过继承根类的属性和行为来复用代码。


    你刚刚学习了关系，实体之间的关系可以非常直接地映射到关系型数据库。但继承并非如此。继承是一个完全未知的概念，在关系型世界中并未原生实现。


    将对象保存到关系型数据库时，继承概念会带来几个棘手问题。


    如何将层次模型组织成扁平的关系模型？JPA 提供了三种可供选择的策略：


    • *单表每类层次结构策略*：整个实体层次结构的所有属性被扁平化到一张表中（这是默认策略）。


    ![Image 49](img/index-136_1.jpg)


    **106**


    第 3 章 ■ 对象关系映射


    • *连接子类策略*：在这种方法中，层次结构中的每个实体（无论是具体类还是抽象类）都映射到其专属表。


    • *每具体类一张表策略*：此策略将每个具体实体层次结构映射到其独立的表。


    ■**注意** 在 JPA 2.0 中，对每具体类一张表继承映射策略的支持仍是可选的。可移植的应用程序应避免使用它，直到该策略被正式强制要求。


    利用注解的易用性，JPA 2.0 为定义和映射继承层次结构（包括实体、抽象实体、映射类和瞬态类）提供了声明式支持。`@Inheritance` 注解用于根实体，以指定其自身及叶子类的映射策略。JPA
    还将对象的重写概念转换到映射中，允许子类重写根类属性。在接下来的部分中，你还会看到访问类型如何与继承结合使用，以混合字段访问和属性访问。


    **继承策略**


    在映射继承时，JPA 支持三种不同的策略。当存在实体层次结构时，它始终有一个实体作为根。根实体类可以通过使用 `@Inheritance` 注解来定义继承策略。如果未定义，则将应用默认的单表每类策略。为了探讨每种策略，我将讨论如何映射
    CD 和 Book 实体，它们都继承自 Item 实体（见图 3-22）。


    **图 3-22.** *CD、Book 和 Item 之间的继承层次结构*


    Item 实体是根实体，拥有一个标识符（将转换为主键），CD 和 Book 实体都继承自它。每个叶子类都添加了额外属性，例如 Book 实体的 ISBN 或
    CD 实体的总时长。


    第 3 章 ■ 对象关系映射


    **107**


    单表策略


    默认的继承映射策略是单表策略，其中层次结构中的所有实体都映射到一张表。由于这是默认策略，你可以完全省略根实体上的 `@Inheritance` 注解（得益于“通过异常配置”），这正是
    Item 实体所做的（见清单 3-58）。


    **清单 3-58.** *Item 实体定义单表策略*


    @Entity


    public class Item {


    @Id @GeneratedValue


    protected Long id;


    **@Column(nullable = false)**


    protected String title;


    **@Column(nullable = false)**


    protected Float price;


    protected String description;


    // 构造方法、getter、setter


    }


    Item 是 Book 实体（见清单 3-59）和 CD 实体（见清单 3-60）的根类。

    '
- fmt: "这些实体继承了`Item`的属性以及默认的继承策略，因此不需要使用`@Inheritance`注解。\n\n**清单 3-59.** *Book 继承\
    \ Item*\n\n```java\n@Entity\npublic class Book extends Item {\n    private String\
    \ isbn;\n    private String publisher;\n    private Integer nbOfPage;\n    private\
    \ Boolean illustrations;\n    // Constructors, getters, setters\n}\n```\n\n**清单\
    \ 3-60.** *CD 继承 Item*\n\n```java\n@Entity\npublic class CD extends Item {\n \
