    Before talking about interceptors, I want to briefly discuss Aspect-Oriented Programming
    (AOP). AOP is a programming paradigm that separates cross-cutting concerns (concerns
    that cut across the application) from your business code. Most applications have
    common code that is repeated across components. These could be technical concerns
    (log the entry and exit from each method, log the duration of a method invocation,
    store statistics of method usage, etc.) or business concerns (perform additional
    checks if a customer buys more than $10,000


    of items, send a refill order when the inventory level is too low, etc.). These
    concerns can be applied automatically through AOP to your entire application or
    to a subset of it.


    EJBs support AOP-like functionality by providing the ability to intercept method
    invocation through interceptors. Interceptors are automatically triggered by the
    container when an EJB method is invoked. As shown in Figure 8-3, interceptors
    can be chained and are called before and/or after the execution of a method.


