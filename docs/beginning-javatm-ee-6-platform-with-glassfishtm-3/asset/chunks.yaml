- fmt: "# JaXr 1.0\n\nThe Java API for XML Registries (JAXR) specification defines\
    \ a standard set of APIs that allow Java clients to access UDDI. Like `JAX-RPC`,\
    \ `JAXR` is the second web service–related specification to be pruned, with its\
    \ removal proposed in the next version of Java EE. If the pruning is accepted,\
    \ `JAXR` will still keep on evolving, but outside Java EE.\n\n## Reference Implementation\n\
    \n`Metro` is not a Java EE specification, but rather the open source reference\
    \ implementation of the Java web service specifications. It consists of `JAX-WS`\
    \ and `JAXB`, and also supports the legacy `JAX-RPC` APIs. It allows you to create\
    \ and deploy secure, reliable, transactional, interoperable web services and consumers.\
    \ The `Metro` stack is produced by the `GlassFish` community, but it can also\
    \ be used outside `GlassFish` in a Java EE or Java SE environment.\n\n## How to\
    \ Invoke a Web Service\n\nDespite all these specifications, concepts, standards,\
    \ and organizations, writing and consuming a web service is very easy. Listing\
    \ 14-1 shows you the code of a web service that validates a credit card.\n\n**Listing\
    \ 14-1.** *The `CardValidator` Web Service*\n\n```java\n@WebService\npublic class\
    \ CardValidator {\n    public boolean validate(CreditCard creditCard) {\n    \
    \    String lastDigit = creditCard.getNumber().substring(\n            creditCard.getNumber().length()\
    \ - 1,\n            creditCard.getNumber().length());\n        if (Integer.parseInt(lastDigit)\
    \ % 2 != 0) {\n            return true;\n        } else {\n            return\
    \ false;\n        }\n    }\n}\n```\n\nLike entities or EJBs, a web service uses\
    \ the annotated POJO model with the configuration-by-exception policy. This means\
    \ that a web service can just be a Java class annotated with `@javax.jws.WebService`\
    \ if all the defaults suit you. This `CardValidator` web service has one method\
    \ to validate a credit card. It takes a credit card as a parameter and returns\
    \ `true` or `false` according to whether the card is valid or not. In this instance,\
    \ it assumes that credit cards with an odd number are valid, and those with an\
    \ even number are not.\n\nA `CreditCard` object (see Listing 14-2) is exchanged\
    \ between the consumer and the web service. When describing the web service architecture,\
    \ the data exchanged needs to be an XML document, so a method to transform a Java\
    \ object into an XML document is needed. This is where `JAXB` comes into play\
    \ with its simple annotations and powerful API. The `CreditCard` object just has\
    \ to be annotated with `@javax.xml.bind.annotation.XmlRootElement`, and `JAXB`\
    \ will transform it back and forth from XML to Java.\n\n**Listing 14-2.** *The\
    \ `CreditCard` Class with a JAXB Annotation*\n\n```java\n@XmlRootElement\npublic\
    \ class CreditCard {\n    private String number;\n    private String expiryDate;\n\
    \    private Integer controlNumber;\n    private String type;\n    // Constructors,\
    \ getters, setters\n}\n```\n\nWith `JAXB` annotations, you avoid developing all\
    \ the low-level XML parsing, as it happens behind the scenes. The web service\
    \ manipulates a Java object, and the same is true for the consumer. The consumer\
    \ can be a main class, as shown in Listing 14-3, that creates an instance of `CreditCard`\
    \ and then invokes the web service.\n\n**Listing 14-3.** *A Consumer Invoking\
    \ the Web Service*\n\n```java\npublic class Main {\n    public static void main(String[]\
    \ args) {\n        CreditCard creditCard = new CreditCard();\n        creditCard.setNumber(\"\
    12341234\");\n        creditCard.setExpiryDate(\"10/10\");\n        creditCard.setType(\"\
    VISA\");\n        creditCard.setControlNumber(1234);\n\n        CardValidator\
    \ cardValidator =\n            new CardValidatorService().getCardValidatorPort();\n\
    \        cardValidator.validate(creditCard);\n    }\n}\n```\n\nThe `CardValidator`\
    \ web service is not directly invoked. The consumer uses a `CardValidatorService`\
    \ class and calls the `getCardValidatorPort()` method to get a reference to a\
    \ `CardValidator`. With this reference, the consumer can then call the `validate()`\
    \ method and pass a credit card.\n\nAlthough this code is straightforward, there’s\
    \ a lot of magic happening behind the scenes."
