- fmt: "# Dependency Injection and Asynchronous Calls in Session Beans\n\nI’ve already\
    \ talked about dependency injection in this book, and you will come across this\
    \ mechanism several times in the next chapters. It is a simple yet powerful mechanism\
    \ used by Java EE 6 to inject references of resources into attributes. Instead\
    \ of the application looking up resources in JNDI, they are injected by the container.\n\
    \nThe containers can inject various types of resources into session beans using\
    \ different annotations (or deployment descriptors):\n\n- `@EJB`: Injects a reference\
    \ of the local, remote, or no-interface view of an EJB into the annotated variable.\n\
    - `@PersistenceContext` and `@PersistenceUnit`: Expresses a dependency on an `EntityManager`\
    \ and on an `EntityManagerFactory`, respectively.\n- `@WebServiceRef`: Injects\
    \ a reference to a web service.\n- `@Resource`: Injects several resources such\
    \ as JDBC datasources, session context, user transactions, JMS connection factories\
    \ and destinations, environment entries, the timer service, and so on.\n\nListing\
    \ 7-13 shows a snippet of a stateless session bean using various annotations to\
    \ inject different resources into attributes. Note that these annotations can\
    \ be set on instance variables as well as on setter methods.\n\n**Listing 7-13.**\
    \ *A Stateless Bean Using Injection*\n\n```java\n@Stateless\npublic class ItemEJB\
    \ {\n\n    @PersistenceContext(unitName = \"chapter07PU\")\n    private EntityManager\
    \ em;\n\n    @EJB\n    private CustomerEJB customerEJB;\n\n    @WebServiceRef\n\
    \    private ArtistWebService artistWebService;\n\n    private SessionContext\
    \ context;\n\n    @Resource\n    public void setCtx(SessionContext ctx) {\n  \
    \      this.ctx = ctx;\n    }\n\n    ...\n}\n```\n\n## Environment Naming Context\n\
    \nWhen you work with enterprise applications, there are some situations where\
    \ parameters of your application change from one deployment to another (depending\
    \ on the country you are deploying in, the version of the application, etc.).\
    \ For example, in the CD-BookStore application, `ItemConverterEJB` (see Listing\
    \ 7-14) converts the price of an item to the currency of the country where the\
    \ application is deployed (applying a change rate based on the dollar). If you\
    \ deploy this stateless bean somewhere in Europe, you need to multiply the price\
    \ of the item by 0.80 and change the currency to euros.\n\n**Listing 7-14.** *A\
    \ Stateless Session Bean Converting Prices to Euros*\n\n```java\n@Stateless\n\
    public class ItemConverterEJB {\n\n    public Item convertPrice(Item item) {\n\
    \        item.setPrice(item.getPrice() * 0.80);\n        item.setCurrency(\"Euros\"\
    );\n        return item;\n    }\n}\n```\n\nAs you can understand, the problem\
    \ of hard-coding these parameters is that you have to change your code, recompile\
    \ it, and redeploy the component for each country where the currency changes.\
    \ The other option is to access a database each time you invoke the `convertPrice()`\
    \ method. That’s wasting resources. What you really want is to store these parameters\
    \ somewhere you can change them at deployment time. The deployment descriptor\
    \ is the perfect place to set these parameters.\n\nThe deployment descriptor (`ejb-jar.xml`)\
    \ might be optional in EJB 3.1, but its use is legitimate with environment entries.\
    \ Environment entries are specified in the deployment descriptor and are accessible\
    \ via dependency injection (or via JNDI). They support the following Java types:\
    \ `String`, `Character`, `Byte`, `Short`, `Integer`, `Long`, `Boolean`, `Double`,\
    \ and `Float`. Listing 7-15 shows the `ejb-jar.xml` file of `ItemConverterEJB`\
    \ defining two entries: `currencyEntry` of type `String` with the value `Euros`\
    \ and a `changeRateEntry` of type `Float` with the value `0.80`.\n\n**Listing\
    \ 7-15.** *ItemConverterEJB Environment Entries in ejb-jar.xml*\n\n```xml\n<ejb-jar>\n\
    \    <enterprise-beans>\n        <session>\n            <ejb-name>ItemConverterEJB</ejb-name>\n\
    \            <ejb-class>com.apress.javaee6.ItemConverterEJB</ejb-class>\n    \
    \        <env-entry>\n                <env-entry-name>currencyEntry</env-entry-name>\n\
    \                <env-entry-type>java.lang.String</env-entry-type>\n         \
    \       <env-entry-value>Euros</env-entry-value>\n            </env-entry>\n \
    \           <env-entry>\n                <env-entry-name>changeRateEntry</env-entry-name>\n\
    \                <env-entry-type>java.lang.Float</env-entry-type>\n          \
    \      <env-entry-value>0.80</env-entry-value>\n            </env-entry>\n   \
    \     </session>\n    </enterprise-beans>\n</ejb-jar>\n```\n\nNow that the parameters\
    \ of the application are externalized in the deployment descriptor, `ItemConverterEJB`\
    \ can use dependency injection to get the value of each environment entry. In\
    \ Listing 7-16, `@Resource(name = \"currencyEntry\")` injects the value of the\
    \ `currencyEntry` into the `currency` attribute. Note that the data types of the\
    \ environment entry and the injected variable must be compatible; otherwise, the\
    \ container throws an exception.\n\n**Listing 7-16.** *An ItemConverterEJB Using\
    \ Environment Entries*\n\n```java\n@Stateless\npublic class ItemConverterEJB {\n\
    \n    @Resource(name = \"currencyEntry\")\n    private String currency;\n\n  \
    \  @Resource(name = \"changeRateEntry\")\n    private Float changeRate;\n\n  \
    \  public Item convertPrice(Item item) {\n        item.setPrice(item.getPrice()\
    \ * changeRate);\n        item.setCurrency(currency);\n        return item;\n\
    \    }\n}\n```\n\n## Asynchronous Calls\n\nBy default, session bean invocations\
    \ through remote, local, and no-interface views are synchronous: a client invokes\
    \ a method, and it gets blocked for the duration of the invocation until the processing\
    \ has completed, the result is returned, and the client can carry on its work.\n\
    \nBut asynchronous processing is a common requirement in many applications handling\
    \ long-running tasks. For example, printing an order can be a very long task depending\
    \ on whether the printer is online, there is enough paper, or dozens of documents\
    \ are already waiting to be printed in the printer’s spool. When a client calls\
    \ a method to print a document, it wants to trigger a fire-and-forget process\
    \ that will print the document so the client can carry on its processing.\n\n\
    Before EJB 3.1, asynchronous processing could be handled by JMS and MDBs (see\
    \ Chapter 13). You had to create administrated objects (JMS factories and destinations),\
    \ deal with the low-level JMS API to send a message to a destination, and then\
    \ develop an MDB that would consume and process the message. This works, but it\
    \ is heavyweight for many use cases, as you have to set up a MOM system when what\
    \ you want is just to call a method asynchronously.\n\nSince EJB 3.1, you can\
    \ call methods asynchronously simply by annotating a session bean method with\
    \ `@javax.ejb.Asynchronous`. Listing 7-17 shows `OrderEJB`, which has one method\
    \ for sending an e-mail to a customer and another for printing the order. Since\
    \ these two methods are time consuming, they are both annotated with `@Asynchronous`.\n\
    \n**Listing 7-17.** *An OrderEJB That Declares Two Asynchronous Methods*\n\n```java\n\
    @Stateless\npublic class OrderEJB {\n\n    @Asynchronous\n    private void sendEmailOrderComplete(Order\
    \ order, Customer customer) {\n        // Send e-mail\n    }\n\n    @Asynchronous\n\
    \    private void printOrder(Order order) {\n        // Print order\n    }\n}\n\
    ```\n\nWhen a client invokes either the `printOrder()` or `sendEmailOrderComplete()`\
    \ method, the container returns control to the client immediately and continues\
    \ processing the invocation on a separate thread of execution. As you can see\
    \ in Listing 7-17, the return type of the two asynchronous methods is `void`.\
    \ This might be suitable in a vast majority of use cases, but sometimes you need\
    \ a method to return a value. An asynchronous method can return `void` as well\
    \ as a `java.util.concurrent.Future<V>` object, where `V` represents the result\
    \ value. `Future` objects allow you to obtain a return value from a method executed\
    \ in a separate thread. The client can then use the `Future` API to get the result\
    \ or even cancel the call.\n\nListing 7-18 shows an example of a method that returns\
    \ a `Future<Integer>`."
