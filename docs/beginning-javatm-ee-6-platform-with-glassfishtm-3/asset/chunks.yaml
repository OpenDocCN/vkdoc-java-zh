    The container lets you optionally provide your own business code when the state
    of the bean changes. The change from one state to another can be intercepted by
    the container to invoke methods


    annotated by one of the annotations listed in Table 8-1.


    **Table 8-1.** *Life-Cycle Callback Annotations*


    **Annotation**


    **Description**


    @PostConstruct


    Marks a method to be invoked immediately after a bean instance is


    created and dependency injection is done by the container. This an-


    notation is often used to perform any initialization.


    @PreDestroy


    Marks a method to be invoked immediately before the bean instance


    is destroyed by the container. The method annotated with @PreDestroy


    is often used to release resources that had been previously initialized.


    With stateful beans this happens after a method annotated with


    @Remove has been completed.


    @PrePassivate


    Marks a method to be invoked before the container passivates the in-


    stance. It usually gives the bean the time to prepare for serialization and


    to release resources that cannot be serialized (e.g., it closes connections


    to a database, a message broker, a network socket, etc.).


    @PostActivate


    Marks a method to be invoked immediately after the container reacti-


    vates the instance. Gives the bean a chance to reinitialize resources that


    had been closed during passivation.


