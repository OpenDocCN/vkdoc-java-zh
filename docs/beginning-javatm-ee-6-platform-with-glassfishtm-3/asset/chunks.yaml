- fmt: '# JSP Standard Tag Library


    The “JSP Standard Tag Library” section shows that JSPs can be extended through
    a tag library. The `taglib` directive in a JSP declares the page uses a certain
    tag library, uniquely identified by a URI and a prefix. In XML, it translates
    into a unique namespace (`xmlns`) at a given URI. In the following example, the
    `http://java.sun.com/jstl/core` tag library is made available to a page using
    the prefix `c`:


    ```

    <%@ taglib uri="http://java.sun.com/jstl/core" prefix="c" %>

    ```


    ```

    <jsp:root xmlns:c="http://java.sun.com/jstl/core">

    ```


    ## Scripting Elements


    Scripting elements are used to manipulate objects and to perform computation that
    affects the content by including Java code. There are three categories of scripting
    elements: declarations, scriptlets, and expressions. These can be defined following
    two different syntaxes.


    ```

    <%! this is a declaration %>

    ```


    ```

    <jsp:declaration>this is a declaration</jsp:declaration>

    ```


    ```

    <% this is a scriptlet %>

    ```


    ```

    <jsp:scriptlet>this is a scriptlet</jsp:scriptlet>

    ```


    ```

    <%= this is an expression %>

    ```


    ```

    <jsp:expression>this is an expression</jsp:expression>

    ```


    Declarations are used to declare Java variables or methods that are available
    to all other scripting elements of the page. The declaration appears only within
    the translated JSP (i.e., the servlet) but not in the output to the client. Any
    variable or method declared within a declaration element becomes an instance method
    of the JSP and is global to the entire page. For example, you declare an `ArrayList`
    as follows:


    ```

    <%! ArrayList books = new ArrayList(); %>

    ```


    ```

    <jsp:declaration>ArrayList books = new ArrayList();</jsp:declaration>

    ```


    Scriptlets contain Java code used to describe actions to be performed in response
    to requests. They can be employed to do things like iterations and conditional
    execution of other elements in the JSP. Like declarations, the code in the scriptlet
    appears in the translated JSP (the servlet), but not in the output to the client.
    For example, you add a `Book` object to an `ArrayList` as follows:


    ```

    <%

    books.add(new Book("H2G2", 12f, "Scifi IT book", "1234-234", 241, true));

    %>

    ```


    ```

    <jsp:scriptlet>

    books.add(new Book("H2G2", 12f, "Scifi IT book", "1234-234", 241, true));

    </jsp:scriptlet>

    ```


    Expressions are used to output the value of a Java expression to the client. They
    get evaluated at response time, and the result is converted into a string and
    inserted into the output stream to be displayed in the browser. For example, the
    following code fragment would result in displaying the ISBN of a book:


    ```

    <%= book.getIsbn()%>

    ```


    ```

    <jsp:expression>book.getIsbn()</jsp:expression>

    ```


    Declarations, scriptlets, and expressions must contain valid Java code. And when
    you choose to use the XML syntax, the content must be valid XML. For example,
    to declare an `ArrayList` of books using generics, you would do the following:


    ```

    <%! ArrayList<Book> books = new ArrayList<Book>(); %>

    ```


    If you declare this array list in a strict XML format, it will not be valid because
    you include the `<` and `>` symbols, which already have the meaning of opening
    and closing a tag in XML. To allow such a declaration, you must use CDATA. The
    term CDATA (which stands for character data) is used to indicate something that
    should not be parsed by the XML parser.


    ```

    <jsp:declaration><![CDATA[

    ArrayList<Book> books = new ArrayList<Book>();

    ]]></jsp:declaration>

    ```


    ## Action Elements


    Standard actions are defined by the JSP specification and cause the page to perform
    some actions (include external resources, forward a request to another page, or
    use Java objects’ properties). They look similar to HTML tags, as they are represented
    using XML elements with a prefix of `jsp` (e.g., `<jsp:useBean>`, `<jsp:include>`,
    etc.). Table 11-1 lists all the available action elements.


    **Table 11-1.** *JSP Action Elements*


    | Action | Description |

    |--------|-------------|

    | `useBean` | Associates an instance of an object within a given scope and available
    with a given ID. |

    | `setProperty` | Sets the value of a property in a bean. |

    | `getProperty` | Displays the value of a bean property. |

    | `include` | Allows the inclusion of static and dynamic resources in the same
    context as the current page. |

    | `forward` | Dispatches the current request to a static resource, a JSP, or a
    servlet in the same context as the current page. |

    | `param` | Is used in the `include`, `forward`, and `params` elements. The included
    or forwarded page will see the original request object with the original parameters
    augmented with the new parameters. |

    | `plugin` | Enables a JSP to generate HTML that contains the appropriate browser-dependent
    constructs (`OBJECT` or `EMBED`) that will result in the download of a plug-in.
    |

    | `params` | Passes parameters. This is part of the `plugin` action. |

    | `element` | Dynamically defines the value of the tag of an XML element. |

    | `attribute` | Defines an XML attribute. This is part of the `element` action.
    |

    | `body` | Defines the body of an XML element. This is part of the `element` action.
    |


    ## Putting It All Together


    These elements allow you to invoke Java code and any kind of component (EJBs,
    databases, web services, etc.). As an example, let’s write some Java code. The
    web page that you want to create has to display a list of books stored in an `ArrayList`.
    There is no database access, just an `ArrayList` initialized with a fixed number
    of `Book` objects through which the JSP iterates and displays the attributes (ISBN,
    title of the book, description, and so on). The result should look like Figure
    11-5.


    **Figure 11-5.** *The listBooks.jsp page displays a list of books*


    To construct this page, you need several elements. As shown in Listing 11-5, you
    need to import the `java.util.ArrayList` and `Book` class using a directive element
    (`<%@ page import="java.util.ArrayList" %>`). Once imported, you need to declare
    the `books` attribute of type `ArrayList` so it is accessible in the entire page.
    For this, you need a scripting element of type declaration (`<%! ArrayList<Book>
    books = new ArrayList<Book>(); %>`). One scriplet adds `Book` objects into an
    `ArrayList`, and another scriptlet loops through the list with a `for` statement.
    To display the attributes of each book, expression elements are used (`<%= book.getTitle()%>`).
    The full code of the page is shown in Listing 11-5.


    **Listing 11-5.** *The listBooks.jsp Page*


    ```

    <%@ page import="com.apress.javaee6.chapter11.Book" %>

    <%@ page import="java.util.ArrayList" %>

    <%!

    ArrayList<Book> books = new ArrayList<Book>();

    %>

    <html>

    <head>

    <title>List all the books</title>

    </head>

    <body>

    <h1>Lists all the books</h1>

    <hr/>

    <%

    books.add(new Book("H2G2", 12f, "Scifi IT book", "1234-234", 241, true));

    books.add(new Book("Robots", 18.5f, "Best seller", "564-694", 317, true));

    books.add(new Book("Dune", 23.25f, "The trilogy", "256-6-56", 529, true));

    %>

    <table border="1">

    <tr>

    <td>ISBN</td>

    <td>Title</td>

    <td>Price</td>

    <td>Description</td>

    <td>Number of pages</td>

    <td>Illustrations</td>

    </tr>

    <%

    Book book;

    for (int i = 0; i < books.size(); i++) {

    book = books.get(i);

    %>

    <tr>

    <td><%= book.getIsbn()%></td>

    <td><%= book.getTitle()%></td>

    <td><%= book.getPrice()%></td>

    <td><%= book.getDescription()%></td>

    <td><%= book.getNbOfPage()%></td>

    <td><%= book.getIllustrations()%></td>

    </tr>

    <%

    } // End of the for statement

    %>

    </table>

    <hr/>

    <i>APress - Beginning Java EE 6</i>

    </body>

    </html>

    ```'
