- fmt: "There is only one component for displaying images: `<h:graphicImage>`. It\
    \ displays a graphical image to users that they cannot manipulate. This tag is\
    \ rendered as an HTML `<img>` element. It has several attributes that allow you\
    \ to resize the image, use a graphic as an image map, and so on. You can display\
    \ an image that is bound to a property in a managed bean and comes from a file\
    \ system or a database. The following code displays an image and resizes it:\n\
    \n```\n<h:graphicImage value=\"book.gif\" height=\"200\" width=\"320\"/>\n```\n\
    \n## Grid and tables\n\nVery often data needs to be displayed in a table format\
    \ (see Table 11-14). JSF has the very powerful `<h:dataTable>` tag that iterates\
    \ through a list of elements and creates a table (refer back to the code of the\
    \ `listBooks.xhtml` page that appears in Listing 10-7 of the previous chapter).\n\
    \nTables can also be used to create a layout for a grid-based user interface.\
    \ In this case, you can employ the `<h:panelGrid>` and `<h:panelGroup>` tags to\
    \ lay out your components.\n\n**Table 11-14.** *Grid and Table Tags*\n\n| **Tag**\
    \ | **Description** |\n| :--- | :--- |\n| `<h:dataTable>` | Represents a set of\
    \ repeating data that will be rendered in an HTML `<table>` element |\n| `<h:column>`\
    \ | Renders a single column of data within an `<h:dataTable>` component |\n| `<h:panelGrid>`\
    \ | Renders an HTML `<table>` element |\n| `<h:panelGroup>` | Is a container of\
    \ components that can be embedded in an `<h:panelGrid>` |\n\nUnlike `<h:dataTable>`,\
    \ the `<h:panelGrid>` tag does not use an underlying data model to render rows\
    \ of data. Rather, this component is a layout container that renders other JSF\
    \ components in a grid of rows and columns. You can specify how many columns are\
    \ used to display the components, and the `<h:panelGrid>` will determine how many\
    \ rows are needed. The `columns` attribute is the number of columns to render\
    \ before starting a new row. For example, in the following code, the rendering\
    \ will be three columns and two rows:\n\n```\n<h:panelGrid columns=\"3\" border=\"\
    1\">\n    <h:outputLabel value=\"One\"/>\n    <h:outputLabel value=\"Two\"/>\n\
    \    <h:outputLabel value=\"Three\"/>\n    <h:outputLabel value=\"Four\"/>\n \
    \   <h:outputLabel value=\"Five\"/>\n    <h:outputLabel value=\"Six\"/>\n</h:panelGrid>\n\
    ```\n\nIf you want to combine several components into a single column, you can\
    \ use an `<h:panelGroup>` that will render its children as only one component.\
    \ You can also define a header and a footer using the special `<f:facet>` tag.\n\
    \n```\n<h:panelGrid columns=\"3\" border=\"1\">\n    <f:facet name=\"header\"\
    >\n        <h:outputText value=\"Header\"/>\n    </f:facet>\n    <h:outputLabel\
    \ value=\"One\"/>\n    <h:outputLabel value=\"Two\"/>\n    <h:outputLabel value=\"\
    Three\"/>\n    <h:outputLabel value=\"Four\"/>\n    <h:outputLabel value=\"Five\"\
    />\n    <h:outputLabel value=\"Six\"/>\n    <f:facet name=\"footer\">\n      \
    \  <h:outputText value=\"Footer\"/>\n    </f:facet>\n</h:panelGrid>\n```\n\nThe\
    \ two tables previously described will have the following graphical representation,\
    \ one with a header and a footer, and the other with neither:\n\n![Image 98](index-345_1.jpg)\n\
    \n## Error Messages\n\nApplications can sometimes throw exceptions due to incorrectly\
    \ formatted data or technical reasons. But as far as users are concerned, as little\
    \ information as possible should be displayed on the interface to draw their attention\
    \ to correct the problem. The mechanism for managing error messages is to include\
    \ `<h:message>` and `<h:messages>` tags in a page (see Table 11-15).\n\n`<h:message>`\
    \ is tied to a particular component, while `<h:messages>` can provide global messaging\
    \ for all components on the page.\n\n**Table 11-15.** *Message Tags*\n\n| **Tag**\
    \ | **Description** |\n| :--- | :--- |\n| `<h:message>` | Renders one error message\
    \ |\n| `<h:messages>` | Renders all the enqueued error messages |\n\nMessages\
    \ can have different severities (INFO, WARN, ERROR, and FATAL), each of which\
    \ corresponds to a CSS style (`infoStyle`, `warnStyle`, `errorStyle`, and `fatalStyle`).\
    \ In this way, each type of message can have a different rendering style. For\
    \ example, the following code will display all messages in red:\n\n```\n<h:messages\
    \ style=\"color:red\"/>\n```\n\n```\n<h:form>\n    Enter a title:\n```"
