- fmt: '# JSF 2.0


    `JSF` is a specification published by the Java Community Process (JCP) and was
    created in 2001 as JSR 127. In 2004, a 1.1 maintenance version was released. Only
    in 2006 was `JSF 1.2` introduced into Java EE as JSR 252 (with Java EE 5). The
    biggest challenge in this version was to preserve backward compatibility as well
    as integrate JSP with a unified EL. Despite these efforts, `JSF` and `JSP` didn’t
    fit well, so other frameworks such as `Facelets` were introduced as alternatives
    to `JSPs`.


    `JSF 2.0` is a major release evolving in JSR 314 and is the preferred choice for
    web development in Java EE 6 (`JSP` is still maintained in Java EE 6, but no major
    improvements have been made). `JSF 2.0` was inspired by many open source web frameworks
    and today brings many new features.


    ## What’s New in JSF 2.0


    With many new features, `JSF 2.0` is an evolution from 1.2, but it’s also a step
    forward—for example, in terms of PDL, where `Facelets` is preferred to `JSP`.
    New features of `JSF 2.0` include the following:


    - An alternative viewing technology to `JSP` based on `Facelets`

    - A new resource-handling mechanism (for images, CSS, JavaScript files, and so
    on)

    - Additional scopes (view scope and component scope)

    - Easy development with annotations for managed beans, renderers, converters,
    validators, and so on

    - Reducing XML configuration by exploiting annotations and configuration by exception
    (`faces-config.xml` is optional)

    - Ajax support

    - Easy component development


    ## Reference Implementation


    `Mojarra`, named after a fish that is found on the South American and Caribbean
    coast, is the open source reference implementation of `JSF 2.0`. `Mojarra`, available
    in the GlassFish V3 update center, allows development of `JSF 2.0` web applications
    invoking an `EJB 3.1` business tier and a `JPA 2.0` persistence tier. It is used
    in the example presented next.


    ## Putting It All Together


    Using this information, you can write a small web application consisting of two
    web pages: one that displays a form, letting you create a book (`newBook.xhtml`),
    and the other listing all books available in the database (`listBooks.xhtml`).
    These two pages use the `BookController` managed bean to store the necessary properties
    and for navigation. Using persistence with `JPA` and business logic with `EJB`,
    everything can be plugged together. The managed bean delegates all the business
    logic to the `BookEJB`, which contains two methods: one to persist a book into
    a database (`createBook()`) and another to retrieve the books (`findBooks()`).
    This stateless session bean uses the `EntityManager` API to manipulate a `Book`
    entity. The navigation is quite simple: once a book is created, the list is shown.
    A link on the list page allows you to go back to the `newBook.xhtml` page and
    create another book.


    Figure 10-2 shows the interacting components in this web application. They are
    packaged in a war file, deployed in a running instance of GlassFish and a live
    Derby database.


    ![Image 86](index-299_1.jpg)


    **Figure 10-2.** *Pages and classes involved in the web application*


    This web application follows the Maven directory structure, so classes, files,
    and web pages have to be placed in the following directories:


    - `src/main/java`: Contains the `Book` entity, the `BookEJB`, and the `BookController`
    managed bean

    - `src/main/resources`: Contains the `persistence.xml` file used to map the entity
    in the database

    - `src/webapp`: Contains the two web pages `newBook.xhtml` and `listBooks.xhtml`

    - `src/webapp/WEB-INF`: Contains the `web.xml` file used to declare the `FacesServlet`

    - `pom.xml`: Represents the Maven Project Object Model (POM) describing the project,
    its dependencies, and plug-ins


    ## Writing the Book Entity


    I will not go into too much detail about Listing 10-3, as you should by now understand
    the code of the `Book` entity. Despite the mapping annotations, notice the named
    query, `findAllBooks`, that retrieves books from the database.


    **Listing 10-3.** *A Book Entity with a Named Query*


    ```

    @Entity

    ```'
