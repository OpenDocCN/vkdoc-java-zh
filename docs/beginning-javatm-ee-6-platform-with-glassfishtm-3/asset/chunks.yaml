    \ not the credit. From the perspective of an external application querying the\
    \ accounts, only when both operations have been successfully performed are they\
    \ visible (Isolation). Consistency is when transaction operations (either with\
    \ a commit or a rollback) are done within the constraints of the database (such\
    \ as primary keys, relationships, or fields). Once the transfer is completed,\
    \ the data can be accessed from other applications (Durability).\n\n### Local\
    \ Transactions"
