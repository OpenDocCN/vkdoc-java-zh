    Web 服务端点


    JAX-WS 2.2 允许将常规 Java 类和无状态 EJB 公开为 Web 服务。


    参考 POJO（清单 14-1）和 EJB Web 服务（清单 14-18）的代码，几乎看不出任何差异，除了 EJB Web 服务多了一个 @Stateless
    注解，尽管打包方式不同。POJO Web 服务打包在 Web 模块中（在 war 文件中），称为 Servlet 端点；而 EJB Web 服务打包在 jar
    文件中，称为 EJB 端点。一个部署在 Servlet 容器中，另一个部署在 EJB 容器中。


    两种端点的行为几乎相同，但使用 EJB 端点可以获得一些额外的好处。由于 Web 服务也是一个 EJB，因此由容器管理的事务和安全性的好处是自动的，并且可以使用拦截器，而
    Servlet 端点则无法做到这一点。业务代码可以同时作为 Web 服务和 EJB 公开，这意味着业务逻辑可以通过 SOAP 公开，也可以通过添加远程接口通过
    RMI 公开。


    注解


    在服务层面，系统以 XML 消息、WSDL 操作和 SOAP 消息来定义。同时，在 Java 层面，应用程序以对象、接口和方法来定义。需要将 Java 对象转换为
    WSDL 操作。JAXB 运行时使用注解来确定如何将类编组/解编组为/从 XML。这些注解通常对 Web 服务开发者是隐藏的。类似地，JWS 使用注解来确定如何将方法调用编组为
    SOAP 请求消息，并将 SOAP 响应解编组为方法返回类型的实例。


