    **全局 JNDI 访问**


    会话 Bean 也可以使用 JNDI 进行查找。当客户端不由容器管理且无法使用依赖注入时，JNDI 主要用于远程访问。但本地客户端也可以使用 JNDI，即使依赖注入能产生更简洁的代码。要查找会话
    Bean，客户端应用程序需要 JNDI API 来与目录命名服务通信。


    一旦会话 Bean 部署到容器中，它就会自动绑定到一个 JNDI 名称。在 Java EE 6 之前，这个名称并未标准化，因此部署在不同容器（如 GlassFish、JBoss、WebLogic
    等）中的会话 Bean 会有不同的名称。Java EE 6 规范定义了具有以下语法的可移植 JNDI 名称：


    java:global[/<app-name>]/<module-name>/<bean-name> ➥


    [!<fully-qualified-interface-name>]


    JNDI 名称的每个部分含义如下：


    • `<app-name>` 是可选的，因为它仅适用于会话 Bean 打包在 ear 文件中的情况。如果是这种情况，`<app-name>` 默认为 ear
    文件的名称（不带 `.ear` 文件扩展名）。


    • `<module-name>` 是会话 Bean 所在模块的名称。它可以是独立 jar 文件中的 EJB 模块，也可以是 war 文件中的 Web 模块。`<module-name>`
    默认为归档文件的基本名称，不带文件扩展名。


    • `<bean-name>` 是会话 Bean 的名称。


    • `<fully-qualified-interface-name>` 是每个已定义业务接口的完全限定名称。对于无接口视图，该名称是完全限定的 Bean
    类名称。


    **208**


    第 7 章 ■ 会话 Bean 与定时器服务


    为了说明这种命名约定，我们以 ItemEJB 为例。ItemEJB 是 `<bean-name>`，并被打包在 `cdbookstore.jar`（即 `<module-name>`）中。该
    EJB 有一个远程接口和一个无接口视图（使用 `@LocalBean` 注解）。部署后，容器将创建以下 JNDI 名称：


    package com.apress.javaee6;


    @Stateless


    **@LocalBean**


    @Remote (**ItemRemote**)


    public class ItemEJB implements **ItemRemote** {


    ...


    }


    // JNDI 名称


    java:global/cdbookstore/**ItemEJB**!com.apress.javaee6. **ItemEJB**


    java:global/cdbookstore/**ItemEJB**!com.apress.javaee6. **ItemRemote**


    除了上述命名约定之外，如果 Bean 只暴露一个客户端接口（或仅有一个无接口视图），容器会使用以下语法为该视图注册一个 JNDI 条目：


    java:global[/<app-name>]/<module-name>/<bean-name>


    以下代码表示仅具有无接口视图的 ItemEJB Bean。此时 JNDI 名称仅由模块名称（cdbookstore）和 Bean 名称组成。


    package com.apress.javaee6;


    @Stateless


    public class **ItemEJB** {


    ...


    }


    // JNDI 名称


    java:global/cdbookstore/**ItemEJB**


    会话上下文


    会话 Bean 是存在于容器中的业务组件。通常，它们不直接访问容器或使用容器服务（事务、安全、依赖注入等）。这些服务旨在由容器代表 Bean 透明地处理。然而，有时
    Bean 需要在代码中显式使用容器服务（例如，显式标记要回滚的事务）。这可以通过 `javax.ejb.SessionContext` 接口实现。`SessionContext`
    允许以编程方式访问为会话 Bean 实例提供的运行时上下文。`SessionContext` 扩展了 `javax.ejb.EJBContext` 接口。`SessionContext`
    API 的一些方法在表 7-1 中描述。


    第 7 章 ■ 会话 Bean 与定时器服务


