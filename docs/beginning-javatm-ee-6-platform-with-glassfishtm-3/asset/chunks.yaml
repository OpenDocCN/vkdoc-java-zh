    Chapter 15 ■ reStFUL WeB SerVICeS


    **439**


    **Uniform Interface**


    One of the main constraints that makes an architecture RESTful is the use of a
    uniform interface to manage your resources. Pick whatever interface suits you,
    but use it in the same way all across the board, from resource to resource, from
    service to service. Never stray from it or alter the original meaning. By using
    a uniform interface, “the overall system architecture is simplified and the visibility
    of interactions is improved” (Roy Thomas Fielding, *Architectural Styles* *and
    the Design of Network-based Software Architectures*). Your services become part
    of a community of services using the exact same semantic.


    The de facto web protocol is HTTP, which is a document-based standardized request/


    response protocol between a client and a server. HTTP is the uniform interface
    of RESTful web services. Web services built on SOAP, WSDL, and other WS-* standards
    also use HTTP as the transport layer, but they leverage only a very few of its
    capabilities. You have to discover the semantic of the service by analyzing the
    WSDL and then invoke the right methods. RESTful web services have a uniform interface
    (HTTP verbs and URIs), so once you know where the resource is (URI), you can invoke
    the HTTP verbs (GET, POST, etc.).


    In addition to familiarity, a uniform interface promotes interoperability between
    applications; HTTP is widely supported, and the number of HTTP client libraries
    guarantees that you won’t have to deal with communication issues.


    **Addressability**


    The second tenet to follow when designing RESTful web services is addressability.
    Your web service should make your application as addressable as possible, which
    means that every valuable piece of information of your application should be a
    resource and have a URI, making that resource easily reachable. It is the only
    piece of data you need to publish to make the resource accessible, so your business
    partner won’t have some guesswork to do in order to reach the resource.


    For example, you’re dealing with a bug in your application, and your investigations


    lead you to line 42 of the class CreditCardValidator.java as the place where the
    bug occurs.


    Because you’re not responsible for this domain of the application, you want to
    file an issue so a qualified person will take care of it. How would you point
    her to the incriminating line? You could say “Go to line 42 of the class CreditCardValidator,”
    or, if your source code is addressable through a repository browser, you could
    save the URI of the line itself in the bug report.


    This raises the issue of defining the granularity of your RESTful resources in
    your application: it could be at the line, method, or class level, and so forth.


    Unique URIs make your resources linkable, and because they are exposed through
    a uni-


    form interface, everyone knows exactly how to interact with them, allowing people
    to use your application in ways you would have never imagined.


    **Connectedness**


    In graph theory, a graph is called connected if every pair of distinct vertices
    in the graph can be connected through some path. It is said to be strongly connected
    if it contains a direct path from u to v and a direct path from v to u for every
    pair of vertices u,v. REST advocates that resources should be as connected as
    possible. As the now famous formulation goes: “Hypermedia as the engine of application
    state.”


