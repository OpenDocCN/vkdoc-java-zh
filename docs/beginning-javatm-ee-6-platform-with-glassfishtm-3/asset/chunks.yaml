    \n图 9-8 展示了一个常见的安全场景。用户被要求通过客户端界面（Web 或 Swing）输入其用户名和密码。系统使用 Java 身份验证和授权服务（JAAS）针对底层身份验证系统检查其凭据。如果身份验证成功，用户将获得一个主体。此时，该主体与一个或多个角色关联。当用户访问受保护的\
