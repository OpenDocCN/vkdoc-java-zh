    **总结**


    本章解释了使用静态语言（如 HTML、XHTML 或 CSS）和动态语言（如 JavaScript 或服务器端技术）创建网页的不同方式。要使用 Java EE
    6 创建动态 Web 界面，你可以从多种规范中进行选择。


    JSP 2.2、EL 2.2 和 JSTL 1.2 是为 Servlet 而创建的规范。页面由 HTML 数据和 Java 代码组成，这些代码被编译成 Servlet，用于响应给定的请求。


    尽管 JSP 可以作为 JSF PDL 使用，但最好使用 Facelets 来发挥 JSF 基于组件的架构和丰富生命周期的强大功能。JSF 提供了一套标准小部件（按钮、超链接、复选框等）和一个用于创建自定义小部件（复合组件）的新模型。JSF
    2.0 还提供了一种新的资源处理机制，使你可以轻松地对外部资源进行版本控制和本地化。


    JSF 2.0 使用丰富的 UI 组件架构，其组件可以进行转换和验证，并且可以与托管 Bean 交互。这将是下一章的主题。


    第 12 章


    处理与导航


    **在**上一章中，我向你展示了如何使用不同的技术（HTML、JSP、JSTL 等）创建网页，同时了解到 JSF 是编写现代 Web 应用程序的首选 Java
    EE 规范。然而，仅使用图形组件绘制页面是不够的；这些页面需要与后端系统交互，在页面间导航，并验证和转换数据。JSF 是一个丰富的规范：托管 Bean 允许你调用业务层并在应用程序中导航，一组类允许你将组件值转换为相应类型或从相应类型转换回来，或者验证它们以符合业务规则。通过使用注解，现在开发自定义转换器和验证器变得很容易。


    JSF 2.0 在动态用户界面方面带来了简洁性和丰富性。它以简单的方式原生支持 Ajax 调用。该规范附带了一个 JavaScript 库，允许异步调用服务器并刷新页面的一小部分。


    创建用户界面、控制整个应用程序中的导航以及同步或异步调用业务逻辑之所以成为可能，是因为 JSF 建立在模型-视图-控制器（MVC）设计模式之上。每个部分彼此分离，允许
    UI 在不影响业务逻辑的情况下更改，反之亦然。


    本章将介绍所有这些概念，作为对前几章的补充。


    **MVC 模式**


    JSF 以及大多数 Web 框架通过使用 MVC 设计模式的变体来鼓励关注点分离。MVC 是一种用于将业务逻辑与用户界面隔离的架构模式。业务逻辑与用户界面代码混合在一起效果不佳。当两者混合时，应用程序更难维护且可扩展性更差。在上一章的“JavaServer
    Pages”部分，我向你展示了一个包含 Java 代码和 SQL 语句的 JSP。虽然技术上正确，但你可以想象随着时间的推移维护起来会有多困难。该页面混合了两种开发人员角色（图形设计师和业务逻辑开发人员），并且最终可能会使用更多的
    API（数据库访问、EJB 调用等）、处理异常或处理复杂的业务逻辑。所有这些都会导致一个非常复杂的网页。当应用 MVC 时，会产生一个松散耦合的应用程序；对于这种类型的应用程序，修改应用程序的视觉外观或底层业务规则更容易，而不会相互影响。


    在 MVC 中，模型代表应用程序的数据，视图对应于用户界面，控制器管理两者之间的通信（见图 12-1）。


