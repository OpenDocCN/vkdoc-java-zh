    **消息处理**


    托管 Bean 处理业务逻辑、调用 EJB 和数据库等，有时可能会出错。在这种情况下，必须通过消息通知用户以采取行动。消息可以分为两类：应用程序错误（涉及业务逻辑、数据库或网络连接）和用户输入错误（无效的
    ISBN 或空字段）。


    例如，应用程序错误可以生成一个完全不同的页面，要求用户稍后重试。输入错误可以在同一页面中显示，并附带描述错误的文本，消息也可以是信息性的，例如指示一本书已成功添加到数据库。


    在上一章中，使用了标签在页面上显示消息（`<h:message>` 和 `<h:messages>`）。为了生成这些消息，JSF 允许您通过在托管 Bean
    中调用 `FacesContext.addMessage()` 方法来排队消息。该方法的签名如下：


    void addMessage(String **clientId**, **FacesMessage** message)


    此方法将一个 `FacesMessage` 附加到要显示的消息集合中。此方法的第一个参数指定一个客户端标识符。此参数引用消息注册到的 UI 组件 ID。如果
    `clientId` 为 `null`，则该消息不引用任何特定组件，并被称为全局消息，适用于所有页面。一条消息包含摘要文本、详细文本和严重性级别（致命、错误、警告和信息）。消息也可以使用消息包进行国际化。


    **FacesMessage**(Severity severity, String summary, String detail)


    以下代码是一个创建图书的托管 Bean 的片段。如果创建成功，则会排队一条信息性消息。如果捕获到异常，则会向消息队列添加一条错误消息以供显示。请注意，这两条消息都是全局的，因为
    `clientId` 为 `null`：


    FacesContext ctx = FacesContext.getCurrentInstance();


    try {


    book = bookEJB.createBook(book);


    ctx. **addMessage**(**null**, new **FacesMessage**(FacesMessage. **SEVERITY_INFO**,
    ➥


    "图书已创建", "图书" + book.getTitle() + ➥


    " 已创建，id=" + book.getId()));


    } catch (Exception e) {


    ctx. **addMessage**(**null**, new **FacesMessage**(FacesMessage. **SEVERITY_ERROR**,➥


    "图书未创建", e.getMessage()));


    }


    ![Image 108](img/index-372_1.jpg)


    **342**


    Chapter 12 ■ 处理与导航


    这些消息是全局的，可以在页面中使用单个 `<h:messages>` 标签来显示。但您可能希望为特定组件在页面上的特定位置显示一条消息（验证或转换错误通常就是这种情况）。图
    12-5 显示了一个页面，其中有一条专门针对价格输入字段的消息。


    **图 12-5.** *为 UI 组件显示消息的页面*


    该页面将有一个带有标识符 (`id="priceId"`) 的输入文本字段，并且 `<h:message>` 标签将引用该组件 (`for="priceId"`)。结果将是，这条特定消息将仅为此组件显示：


    <h:inputText id=" **priceId**" value="#{bookController.book.price}"/>


    <h:message for=" **priceId**"/>


    如果价格字段未填写，价格输入文本字段旁边会出现一条消息，这时就可以使用 `clientId`，因为组件由其标识符标识。


    以下托管 Bean 的代码检查价格，如果无效，则创建一条警告消息，并将其与 `priceId` 组件 ID 关联：


    if (book.getPrice() == null || "".equals(book.getPrice())) {


    ctx.addMessage(" **priceId**", new FacesMessage(SEVERITY_WARN, ➥


    "请填写价格！", "输入一个数值"));


    JSF 将这种消息传递机制用于转换器和验证器。


    **转换与验证**


    您刚刚了解了如何处理消息以通知最终用户需要采取的操作。一种可能的操作是更正无效的输入值（例如，无效的 ISBN）。JSF 提供了一种标准的转换和验证机制，可以处理用户输入以确保数据完整性。这样，当您调用业务方法进行处理时，可以安全地依赖有效数据。转换和验证允许开发人员专注于业务逻辑，而不是检查输入数据是否为空、是否在某个值范围内等。


    ![Image 109](img/index-373_1.jpg)


    Chapter 12 ■ 处理与导航


    **343**


    当最终用户输入的数据需要从字符串转换为对象，反之亦然时，就会发生转换。它确保数据是正确类型的——例如，将字符串转换为 `java.util.Date`，将字符串转换为
    `Integer`，或将美元价格转换为欧元。至于验证，它确保数据包含预期的内容（遵循 `dd/MM/yyyy` 格式的日期，介于 3.14 和 3.15 之间的浮点数等）。


    转换和验证发生在页面生命周期的不同阶段（您在上一章中看到过），如图 12-6 所示。


    **图 12-6.** *页面生命周期中的转换与验证*


    在图 12-6 的*应用请求值*阶段，UI 组件值被转换为目标对象，然后在*处理验证*阶段进行验证。转换和验证发生在组件数据绑定到支持 Bean 之前（这发生在*更新模型值*阶段），这是有道理的。如果发现任何错误，将导致添加错误消息并缩短生命周期，因此它会直接进入*渲染响应*阶段（并且消息将通过
    `<h:messages/>` 显示在用户界面上）。在此阶段，支持 Bean 的属性被转换回字符串以进行显示。

