    \ annotation either at the class or at the method level as shown in Listing 8-9.\n\
    \n**Listing 8-9.** *EJB Excluding Default Interceptors*\n\n```\n@Stateless\n@ExcludeDefaultInterceptors\n\
    @Interceptors(LoggingInterceptor.class)\npublic class CustomerEJB {\n    public\
    \ void createCustomer(Customer customer) { ... }\n    public Customer findCustomerById(Long\
    \ id) { ... }\n    public void removeCustomer(Customer customer) { ... }\n   \
    \ @ExcludeClassInterceptors\n    public Customer updateCustomer(Customer customer)\
    \ { ... }\n}\n```\n\n## Summary\n\nIn this chapter, you learned that stateless\
    \ and singleton session beans share the same life cycle and that stateful beans\
    \ have a slightly different one. That’s because stateful beans keep a conversational\
    \ state with the client and need to temporarily serialize their state to a permanent\
    \ storage (passivation). Callback annotations allow you to add business logic\
    \ to your bean before or after an event occurs (`@PostConstruct`, `@PreDestroy`,\
    \ etc.).\n\nInterceptors are the AOP-like mechanism of EJBs, allowing the container\
    \ to invoke cross-cutting concerns on your application. Interceptors are easy\
    \ to use, powerful, and can be chained together to apply several concerns to your\
    \ beans. You can also specify default interceptors that are applied to every method\
    \ of every bean of your application.\n\nAn EJB container can be seen as a chain\
    \ of interceptors. Method invocations are intercepted by the container, which\
    \ then applies several services such as transaction and security management. The\
    \ next chapter will focus on these two container-managed services.\n\n# Chapter\
    \ 9: Transactions and Security\n\nTransaction and security management are important\
    \ matters for enterprises. They allow applications to have consistent data and\
    \ secure the access to it. Both services are low-level concerns that a business\
    \ developer shouldn’t have to code himself. EJBs provide these services in a very\
    \ simple way: either programmatically with a high-level of abstraction or declaratively\
    \ using metadata.\n\nMost of an enterprise application’s work is about managing\
    \ data: storing it (typically in a database), retrieving it, processing it, and\
    \ so on. Often this is done simultaneously by several applications attempting\
    \ to access the same data. A database has low-level mechanisms to preserve concurrent\
    \ access, such as pessimistic locking, and uses transactions to ensure that data\
    \ stays in a consistent state. EJBs make usage of these mechanisms.\n\nSecuring\
    \ data is also important. You want your business tier to act like a firewall and\
    \ authorize some actions to certain groups of users and deny access to others\
    \ (e.g., only employees are allowed to persist data, but users and employees are\
    \ authorized to read data).\n\nThe first part of this chapter is devoted to exploring\
    \ transaction management in EJB 3.1. I’ll introduce transactions as a whole, and\
    \ then discuss the different types of transaction demarcation supported by EJBs.\
    \ In the second part of the chapter, I’ll focus on security.\n\n## Transactions\n\
    \nData is crucial for business, and it must be accurate regardless of the operations\
    \ you perform and the number of applications concurrently accessing it. A *transaction*\
    \ is used to ensure that the data is kept in a consistent state. It represents\
    \ a logical group of operations that must be performed as a single unit, also\
    \ known as a *unit of work*. These operations can involve persisting data in one\
    \ or several databases, sending messages, or invoking web services. Companies\
    \ rely on transactions every day for their banking and e-commerce applications\
    \ or business-to-business interactions with partners.\n\nThese indivisible business\
    \ operations are performed either sequentially or in parallel over a relatively\
    \ short period of time. Every operation must succeed in order for the transaction\
    \ to succeed (we say that the transaction is committed). If one of the operations\
    \ fails, the transaction fails as well (the transaction is rolled back). Transactions\
    \ must guarantee a degree of reliability and robustness and follow the ACID properties.\n\
    \n### ACID\n\nACID refers to the four properties that define a reliable transaction:\
    \ Atomicity, Consistency, Isolation, and Durability (described in Table 9-1).\
    \ To explain these properties, I’ll take the classical example of a banking transfer:\
    \ you need to debit your savings account to credit your current account.\n\n**Table\
    \ 9-1.** *ACID Properties*\n\n| Property | Description |\n|----------|-------------|\n\
    | Atomicity | A transaction is composed of one or more operations grouped in a\
    \ unit of work. At the conclusion of the transaction, these operations are either\
    \ all performed successfully (commit), or none of them are performed at all (rollback)\
    \ if something unexpected or irrecoverable happens. |\n| Consistency | At the\
    \ conclusion of the transaction, the data is left in a consistent state. |\n|\
    \ Isolation | The intermediate state of a transaction is not visible to external\
    \ applications. |\n| Durability | Once the transaction is committed, the changes\
    \ made to the data are visible to other applications. |\n\nWhen you transfer money\
    \ from one account to the other, you can imagine a sequence of database accesses:\
