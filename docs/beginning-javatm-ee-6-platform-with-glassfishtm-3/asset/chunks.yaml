    一点历史


    GlassFish 的起源可以追溯到早期的 Tomcat 时代，当时 Sun 和 JServ 团队将这项技术捐赠给了 Apache。自那以后，Sun 一直在其各种产品中重用
    Tomcat。2005 年，Sun 创建了 GlassFish 项目。其目标是开发一个完全认证的 Java EE 应用服务器，其 1.0 版本于 2006
    年 5 月发布。其核心部分，GlassFish 的 Web 容器组件继承了 Tomcat 的许多特性（事实上，在 Tomcat 上运行的应用程序应该可以在
    GlassFish 上不加修改地运行）。


    GlassFish v2 于 2007 年 9 月发布，此后进行了多次更新。这是迄今为止部署最广泛的版本。GlassFish 在主要版本之间通常能很好地保持相同的用户体验，不会破坏代码或改变开发者的习惯。此外，“社区版”和“支持版”的
    GlassFish 之间没有质量差异。虽然付费客户可以获得补丁和额外的监控工具（GlassFish Enterprise Manager），但可从 [`glassfish.org
    获取的开源版本`](http://glassfish.org) 和可从 [`www.sun.com/appserver 获取的支持版本`](http://www.sun.com/appserver)
    经过了相同程度的测试，这使得在项目周期中的任何时候切换到支持版本都非常容易。


    为了本书的目的，我将使用 GlassFish v3，在撰写本文时，它尚未作为最终的 Java EE 认证产品发布，但已作为“Prelude”版本（主要是一个
    Web 容器）提供；由于是开源的，每日构建和里程碑构建都已可用。


    这个新主要版本 GlassFish 的主要目标是通过引入基于 OSGi 的内核和对 Java EE 6 的全面支持来实现核心功能的模块化。


    ■**注意** GlassFish 团队投入了巨大的努力来提供丰富且最新的文档，提供了许多不同的指南：快速入门指南、安装指南、管理指南、管理参考、应用程序部署指南、开发者指南等。请访问
    [`wiki.glassfish.java.net/Wiki.jsp?page=GlassFishDocs 查看它们。`](http://wiki.glassfish.java.net/Wiki.jsp?page=GlassFishDocs)
    同时，也请查看常见问题解答、操作指南和 GlassFish 论坛以获取更多信息。


    GlassFish v3 架构


    作为应用程序程序员（而不是 GlassFish 开发者），你不需要了解 GlassFish v3 的内部架构，但你可能对其主要的架构选择和指导原则感兴趣。从
    GlassFish v3 Prelude 开始，应用服务器构建在一个由 OSGi 驱动的模块化内核之上。GlassFish 直接运行在 Apache Felix
    实现之上，但它也应该能在 Equinox 或 Knopflerfish OSGi 运行时上运行。HK2（百千字节内核）抽象了 OSGi 模块系统以提供组件，这些组件也可以被视为服务。这些服务可以在运行时被发现和注入。目前，OSGi
    并未向 Java EE 开发者公开。


    ![Image 20](img/index-63_1.jpg)


    第 1 章 ■ Java EE 6 概览


    **33**


    ■**注意** OSGi 是一个用于动态组件管理和发现的标准。应用程序或组件可以在无需重启的情况下被远程安装、启动、停止、更新和卸载。组件还可以动态检测新服务的添加或移除并相应地进行调整。Apache
    Felix、Equinox 和 Knopflerfish 都是 OSGi 的实现。


    这种模块化和可扩展性使得 GlassFish v3 能够从一个监听管理命令的简单 Web 服务器，通过简单地部署诸如 war 文件（加载并启动 Web 容器，然后部署应用程序）或
    EJB jar 文件（将动态加载并启动 EJB 容器）之类的工件，成长为一个功能更强大的运行时。此外，精简版服务器只需几秒钟即可启动（在合理现代的硬件上不到
    5 秒），并且你只需为启动时间和内存消耗中实际使用的部分付费。动态启动 Web 容器大约需要 3 秒，而部署通常不到 1 秒。所有这些使得 GlassFish
    v3 成为一个非常对开发者友好的环境。


    无论 GlassFish v3 动态加载了多少模块，管理控制台、命令行界面和集中式配置文件都是可扩展的，并且每个都是唯一的。同样值得一提的是 Grizzly
    框架，它最初是一个基于非阻塞 I/O 的 HTTP 服务器，后来成为 GlassFish 中的关键元素之一，如图 1-14 所示。


    **图 1-14.** *GlassFish v3 架构*


    更新中心


    一旦你拥有了一个模块化的应用服务器，你就可以开始混合搭配各种模块来构建自己的环境，就像使用 IDE 和 Linux 发行版一样，或者类似于 Firefox
    管理扩展的方式。GlassFish 更新中心是一组用于管理运行时的图形化和命令行工具。其背后的技术是映像包管理系统（IPS，也称为 pkg），这是 OpenSolaris
    项目


