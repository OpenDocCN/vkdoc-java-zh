    Chapter 3 ■ OBJeCt-reLatIONaL MappING


    **Access Type of an Embeddable Class**


    The access type of an embeddable class is determined by the access type of the
    entity class in which it exists. If the entity explicitly uses a property access
    type, an embeddable object will implicitly use property access as well. A different
    access type for an embeddable class can be specified by means of the @Access annotation.


    The Customer entity (see Listing 3-36) and Address entity (see Listing 3-37) use
    different access types.


    **Listing 3-36.** *The Customer Entity with Field Access Type*


    @Entity


    **@Access(AccessType.FIELD)**


    public class Customer {


    @Id @GeneratedValue


    private Long id;


    @Column(name = "first_name", nullable = false, length = 50)


    private String firstName;


    @Column(name = "last_name", nullable = false, length = 50)


    private String lastName;


    private String email;


    @Column(name = "phone_number", length = 15)


    private String phoneNumber;'
