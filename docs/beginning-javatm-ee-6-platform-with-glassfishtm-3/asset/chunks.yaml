    **Bean-Managed Transactions**


    With CMT, you leave the container to do the transaction demarcation just by specifying
    a transaction attribute and using the session context or exceptions to mark a
    transaction for rollback. In some cases, the declarative CMT may not provide the
    demarcation granularity that you require (for example, a method cannot generate
    more than one transaction). To address this, EJBs offer a programmatic way to
    manage transaction demarcations with BMT. BMT


    allows you to explicitly manage transaction boundaries (begin, commit, rollback)
    using JTA.


    To turn off the default CMT demarcation and switch to BMT mode, a bean simply
    has to


    [use the @javax.ejb.TransactionManagement annotation (or the XML equivalent in
    the](mailto:@javax.ejb.TransactionManagement) ejb-jar.


    xml file) as follows:


    @Stateless


    **@TransactionManagement(TransactionManagementType.BEAN)**


    public class ItemEJB {


    ...


    }


    With BMT demarcation, the application requests the transaction, and the EJB container


    creates the physical transaction and takes care of a few low-level details. Also,
    it does not propagate transactions from one BMT to another.


    The main interface used to carry out BMT is javax.transaction.UserTransaction.
    It


    allows the bean to demarcate a transaction, get its status, set a timeout, and
    so on. The UserTransaction is instantiated by the EJB container and made available
    through dependency injection, JNDI lookup, or the SessionContext (with the SessionContext.getUserTransaction()
    method). The API is described in Table 9-5.


