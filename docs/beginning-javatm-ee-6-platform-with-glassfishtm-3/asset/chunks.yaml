- fmt: '# Java EE 6 at a Glance


    Figure 1-2 shows the logical relationships between containers. The arrows represent
    the protocols used by one container to access another. For example, the web container
    hosts servlets, which can access EJBs through `RMI-IIOP`.


    ![Image 8](index-35_1.jpg)


    **Figure 1-2.** *Standard Java EE containers*


    ## Components


    The Java EE runtime environment defines four types of components that an implementation
    must support:


    - *Applets* are GUI applications that are executed in a web browser. They use
    the rich `Swing` API to provide powerful user interfaces.

    - *Applications* are programs that are executed on a client. They are typically
    GUIs or batch-processing programs that have access to all the facilities of the
    Java EE middle tier.

    - *Web applications* (made of servlets, servlet filters, web event listeners,
    JSP pages, and JSF) are executed in a web container and respond to HTTP requests
    from web clients. Servlets also support SOAP and RESTful web service endpoints.

    - *Enterprise Java Beans* are container-managed components for processing transactional
    business logic. They can be accessed locally and remotely through `RMI` (or HTTP
    for SOAP and RESTful web services).


    ## Containers


    The Java EE infrastructure is partitioned into logical domains called containers
    (see Figure 1-2). Each container has a specific role, supports a set of APIs,
    and offers services to components (security, database access, transaction handling,
    naming directory, resource injection).


    Containers hide technical complexity and enhance portability. Depending on the
    kind of application you want to build, you will have to understand the capabilities
    and constraints of each container in order to use one or more. For example, if
    you need to develop a web presentation layer, you will develop a JSF application
    and deploy it into a web container, not an EJB container. But if you want a web
    application to invoke a business tier, you might need both the web and EJB containers.


    Applet containers are provided by most web browsers to execute applet components.
    When you develop applets, you can concentrate on the visual aspect of the application
    while the container gives you a secure environment. The applet container uses
    a sandbox security model where code executed in the “sandbox” is not allowed to
    “play outside the sandbox.” This means that the container prevents any code downloaded
    to your local computer from accessing local system resources, such as processes
    or files.


    The application client container (ACC) includes a set of Java classes, libraries,
    and other files required to bring injection, security management, and naming service
    to Java SE applications (Swing, batch processing, or just a class with a `main()`
    method). ACC communicates with the EJB container using `RMI-IIOP` and the web
    container with HTTP (e.g., for web services).


    The web container (a.k.a. servlet container) provides the underlying services
    for managing and executing web components (servlets, JSPs, filters, listeners,
    JSF pages, and web services). It is responsible for instantiating, initializing,
    and invoking servlets and supporting the HTTP and HTTPS protocols. It is the container
    used to feed web pages to client browsers.


    The EJB container is responsible for managing the execution of the enterprise
    beans containing the business logic tier of your Java EE application. It creates
    new instances of EJBs, manages their life cycle, and provides services such as
    transaction, security, concurrency, distribution, naming service, or the possibility
    to be invoked asynchronously.


    ## Services


    Containers provide underlying services to their deployed components. As a developer,
    you can concentrate on implementing business logic rather than solving technical
    problems faced in enterprise applications. Figure 1-3 shows you the services provided
    by each container. For example, web and EJB containers provide connectors to access
    EIS, but not the applet container or the ACCs. Java EE offers the following services:


    - *JTA*: This service offers a transaction demarcation API used by the container
    and the application. It also provides an interface between the transaction manager
    and a resource manager at the Service Provider Interface (SPI) level.

    - *JPA*: Standard API for object-relational mapping (ORM). With its Java Persistence
    Query Language (JPQL), you can query objects stored in the underlying database.

    - *JMS*: JMS allows components to communicate asynchronously through messages.
    It supports reliable point-to-point (P2P) messaging as well as the publish-subscribe
    (pub-sub) model.

    - *Java Naming and Directory Interface (JNDI)*: This API, included in Java SE,
    is used to access naming and directory systems. Your application uses it to associate
    (bind) names to objects and then to find these objects (lookup) in a directory.
    You can look up datasources, JMS factories, EJBs, and other resources. Omnipresent
    in your code until J2EE 1.4, JNDI is used in a more transparent way through injection.

    - *JavaMail*: Many applications require the ability to send e-mails, which can
    be implemented through use of the JavaMail API.

    - *JavaBeans Activation Framework (JAF)*: The JAF API, included in Java SE, provides
    a framework for handling data in different MIME types. It is used by JavaMail.


    ![Image 9](index-37_1.jpg)


    - *XML processing*: Most Java EE components can be deployed with optional XML
    deployment descriptors, and applications often have to manipulate XML documents.
    The Java API for XML Processing (JAXP) provides support for parsing documents
    with SAX and DOM APIs, as well as for XSLT. The Streaming API for XML (StAX) provides
    a pull-parsing API for XML.

    - *JCA*: Connectors allow you to access EIS from a Java EE component. These could
    be databases, mainframes, or Enterprise Resource Planning (ERP) programs.

    - *Security services*: Java Authentication and Authorization Service (JAAS) enables
    services to authenticate and enforce access controls upon users. The Java Authorization
    Service Provider Contract for Containers (JACC) defines a contract between a Java
    EE application server and an authorization service provider, allowing custom authorization
    service providers to be plugged into any Java EE product.

    - *Web services*: Java EE provides support for SOAP and RESTful web services.
    The Java API for XML Web Services (JAX-WS), replacing the Java API for XML-based
    RPC (JAX-RPC), provides support for web services using the SOAP/HTTP protocol.
    The Java API for RESTful Web Services (JAX-RS) provides support for web services
    using the REST style.

    - *Management*: Java EE defines APIs for managing containers and servers using
    a special management enterprise bean. The Java Management Extensions (JMX) API
    is also used to provide some management support.

    - *Deployment*: The Java EE Deployment Specification defines a contract between
    deployment tools and Java EE products to standardize application deployment.


    **Figure 1-3.** *Services provided by containers*


    ## Network protocols


    As shown in Figure 1-3 (see the “Platform Overview” section of the Java EE 6 specification),
    components deployed in containers can be invoked through different protocols.
    For example, a servlet deployed in a web container can be called with HTTP as
    well as a web service with an EJB endpoint deployed in an EJB container. Here
    is the list of protocols supported by Java EE:'
