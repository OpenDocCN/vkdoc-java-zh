    Before compiling the consumer Main class, you need to generate the artifacts with
    the wsimport tool. The good news is that Maven has a wsimport goal, and this goal
    is executed automatically during the generate-sources life-cycle phase. As described
    in Chapter 1, Maven uses a rich life cycle to build applications. The generate-sources
    phase is used to generate code and is executed before compilation. The only thing
    to do is tell this wsimport goal where to find the WSDL document. You know this
    information because you’ve deployed the web service into


    GlassFish, and you have displayed the content of the WSDL. Its location is at


