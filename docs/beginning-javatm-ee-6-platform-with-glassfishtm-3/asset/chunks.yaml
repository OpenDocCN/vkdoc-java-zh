    \ `address`）、符号 `_` 以及目标表主键列名称（此处为 `ADDRESS` 表的 `ID` 列）的拼接结果。另请注意，在 DDL 中，`ADDRESS_ID`\
    \ 列默认可为空，这意味着默认情况下，一对一关联映射为零（空值）或一。\n\n要自定义映射，你可以使用两个注解。第一个是 `@OneToOne`（这是因为关系的基数为\
    \ 1），它可以修改关联本身的某些属性，例如其获取方式。`@OneToOne` 注解的 API 定义在清单 3-42 中。\n\n**清单 3-42.**\
    \ `@OneToOne` 注解 API\n\n```java\n@Target({METHOD, FIELD}) @Retention(RUNTIME)\n\
    public @interface OneToOne {\n    Class targetEntity() default void.class;\n \
    \   CascadeType[] cascade() default {};\n    FetchType fetch() default EAGER;\n\
    \    boolean optional() default true;\n    String mappedBy() default \"\";\n \
    \   boolean orphanRemoval() default false;\n}\n```\n\n另一个是 `@JoinColumn`（其 API\
    \ 与 `@Column` 非常相似）。它用于自定义拥有方的连接列，即外键。清单 3-43 展示了如何使用这两个注解。\n\n**清单 3-43.** 具有自定义关系映射的\
    \ `Customer` 实体\n\n```java\n@Entity\npublic class Customer {\n    @Id @GeneratedValue\n\
    \    private Long id;\n    private String firstName;\n    private String lastName;\n\
    \    private String email;\n    private String phoneNumber;\n\n    @OneToOne(fetch\
    \ = FetchType.LAZY)\n    @JoinColumn(name = \"add_fk\", nullable = false)\n  \
    \  private Address address;\n    // Constructors, getters, setters\n}\n```\n\n\
    在 JPA 中，外键列被称为连接列。`@JoinColumn` 注解允许你自定义外键的映射。它在清单 3-43 中用于将外键列重命名为 `ADD_FK`，并通过拒绝空值（`nullable=false`）使关系成为强制性的。`@OneToOne`\
