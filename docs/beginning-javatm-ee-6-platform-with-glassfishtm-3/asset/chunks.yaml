- fmt: "# 关系映射\n\n对于多对多关系，每种映射都以源和目标的多重性命名：`@OneToOne`、`@OneToMany`、`@ManyToOne`或`@ManyToMany`注解。每个注解可以用于单向或双向方式。表3-1展示了多重性与方向之间所有可能的组合。\n\
    \n**表3-1.** *所有可能的多重性-方向组合*\n\n| 多重性 | 方向 |\n|--------|------|\n| 一对一 | 单向 |\n\
    | 一对一 | 双向 |\n| 一对多 | 单向 |\n| 多对一/一对多 | 双向 |\n| 多对一 | 单向 |\n| 多对多 | 单向 |\n| 多对多\
    \ | 双向 |\n\n![Image 38](index-121_1.jpg)\n![Image 39](index-121_2.jpg)\n\n你会看到单向和双向是重复的概念，适用于所有多重性。接下来，你将了解单向和双向关系的区别，然后实现其中一些组合。我不会完整介绍所有组合，只关注一个子集。解释所有组合会变得重复。重点是让你理解如何在关系中映射多重性和方向。\n\
    \n## 单向与双向\n\n从对象建模的角度来看，类之间的方向是自然的。在单向关联中，对象A只指向对象B；在双向关联中，两个对象相互引用。然而，在将双向关系映射到关系数据库时，需要做一些工作，如下面涉及拥有家庭地址的客户的示例所示。\n\
    \n在单向关系中，`Customer`实体有一个`Address`类型的属性（见图3-11）。这种关系是单向的，从一侧导航到另一侧。`Customer`被称为关系的拥有方。就数据库而言，这意味着`CUSTOMER`表将有一个指向`ADDRESS`的外键（连接列），当你拥有一个关系时，你可以自定义此关系的映射。例如，如果需要更改外键的名称，映射将在`Customer`实体（即拥有方）中完成。\n\
