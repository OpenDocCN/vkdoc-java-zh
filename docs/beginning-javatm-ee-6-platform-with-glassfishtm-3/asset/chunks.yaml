    ## Introduction


    In today’s business world, applications need to access data, apply business logic,
    add presentation layers, and communicate with external systems. That’s what companies
    are trying to achieve while minimizing costs, using standard and robust technologies
    that can handle heavy loads. If that’s your case, you have the right book in your
    hands.


    `Java Enterprise Edition` appeared at the end of the 1990s and brought to the
    Java language a robust software platform for enterprise development. Challenged
    at each new version, badly understood or misused, overengineered, and competing
    with open source frameworks, `J2EE` was seen as a heavyweight technology. Java
    EE benefited from these criticisms to improve and is today focused on simplicity.'
  raw: '**W**hile Java EE 5 is considered by everyone to be the most important enterprise
    release, Java EE 6 has a lot in store for you and every server-side Java developer.
    The most widely spread technology to write enterprise-class applications just
    got better with enhanced EJB 3.1, Java Persistence API (JPA) 2.0, the new, yet
    already very successful, Java API for RESTful web services (JAX-RS), and the made-over
    JavaServer Faces (JSF) 2.0 specification. The enterprise Java platform has now
    matured to a degree where it can be both complete and lightweight.


    Now you could spend quality time with your favorite search engine and blog reader
    to


    navigate through the numerous blogs, wikis, and documentation covering all or
    parts of Java EE 6, but I’d like to suggest that you’d be better off starting
    with this book. It is concise, pragmatic, and offers an all-in-one experience.


    Having the open source GlassFish application server as the underlying platform
    for this book makes a lot of sense for two reasons: first, GlassFish v3 is the
    Reference Implementation (RI) and thus is aligned with Java EE 6, and second,
    using an RI does not mean you can’t please developers and scale to production
    deployments. The skills acquired with GlassFish in conjunction with those of the
    most recent technologies are portable in the enterprise.


    Antonio Goncalves is a rare combination of friendly Java enthusiast and precise
    yet


    no-nonsense Java EE expert. His role as a consultant combined with his involvement
    chairing the successful Java User Group in Paris and, of course, his role as a
    member of several key Java EE 6 expert groups makes him the ideal author for *Beginning
    Java™ EE 6 Platform* *with GlassFish™ 3*.


    When you are done reading this book, I’d like to suggest that the greatest value
    of Java EE is not the sum of its features but rather the community that created
    it, as well as the very nature of it being a standard that lets you choose or
    change your implementation as you wish.


    Freedom is not simply about open source but also about open standards.


    Alexis Moussine-Pouchkine


    *GlassFish Team, Sun Microsystems*


    **xvii**


    ![Image 4](index-21_1.jpg)


    About the Author


    ■**ANtONIO GONCALvES** is a senior software architect living in Paris. Initially


    focused on Java development since the late 1990s, his career has taken


    him to different countries and companies where he works now as a Java


    EE consultant in software architecture. As a former BEA consultant, he


    has great expertise in application servers such as WebLogic, JBoss, and, of


    course, GlassFish. He is particularly fond of open source and is a member


    of the OOSGTP (Open Source Get Together Paris). He is also the cocreator


    and coleader of the Paris Java User Group.


    Antonio wrote his first book on Java EE 5, in French, back in 2007.


    Since then he has joined the JCP and is an Expert Member of various JSRs (Java
    EE 6, JPA 2.0, and EJB 3.1). For the last few years, Antonio has given talks at
    international conferences mainly about Java EE, including JavaOne, The Server
    Side Symposium, Devoxx, and Jazoon. He has also written numerous technical papers
    and articles for IT web sites (DevX) and IT magazines ( *Programmez*, *Linux Magazine*).


    Antonio is a graduate of the Conservatoire National des Arts et Métiers in Paris
    (with an engineering degree in IT) and the Brighton University (with an MSc in
    object-oriented design).


    **xix**


    ![Image 5](index-23_1.jpg)


    About the Technical Reviewer


    ■**JIM FArLEy** is a technology architect, strategist, writer, and manager. His


    career has touched a wide array of domains, from commercial to non-


    profit, finance to higher education. In addition to his day job, Jim teaches


    enterprise development at Harvard University. Jim is the author of several


    books on technology, and contributes articles and commentary to various


    online and print publications.


    **xxi**


    Acknowledgments


    **W**riting a book about a new specification such as Java EE 6 is an enormous
    task that requires the talent of different people. First of all, I really want
    to thank Steve Anglin from Apress for giving me the opportunity to contribute
    to the Apress *Beginning* series, which I greatly appre-ciated as a reader. Throughout
    the writing process, I was constantly in contact with Candace English and Tom
    Welsh, who reviewed the book as well as reassured me when I had doubt


    about finishing on time. Thanks to technical reviewers Jim Farley and Sumit Pal,
    who did an excellent job of giving me good technical advice to improve the book.
    Last but not least, I admired the truly amazing work of Ami Knox, who did the
    final edit.


    I also need to thank Alexis Midon and Sebastien Auvray, who coauthored the RESTful
    web


    services chapter (Chapter 15). Alexis is a passionate software engineer and a
    REST enthusiast, and Sebastien is a talented developer and a pragmatic adopter
    of REST. Thanks, guys, for your precious help.


    A special thanks to Alexis Moussine-Pouchkine, who kindly agreed to write the
    foreword


    of this book as well as the section on GlassFish. He was also a big help in contacting
    the right person to give me a hand on a particular topic. I’m thinking of Ryan
    Lubke for JSF 2.0, Paul Sandoz for JAX-RS 1.1, and François Orsini for Derby.


    Thanks to Damien Gouyette for his help on JSF 2.0\. Damien has great experience
    in web


    development as a whole and JSF in particular (oh, and thanks to the Subversion
    repository guy). Thanks to Arnaud Heritier, who wrote the section on Maven and
    helped me in debugging some Maven issues, as well as Nicolas de Loof, who did
    a last proofreading on the topic.


    Sebastien Moreno helped me on JUnit as well as reviewing the entire manuscript
    with


    David Dewalle and Pascal Graffion. They had to put up with a tight schedule. Thank
    you very much for the hard work.


    Thanks to the proofreaders, Denise Green and Stefano Costa, who tried to add a
    Shake-


    spearean touch to the book.


    The diagrams of this book were made using the Visual Paradigm plug-in for IntelliJ
    IDEA.


    I would like to thank both Visual Paradigm and JetBrains for providing me with
    a free license for their excellent products.


    I could not have written this book without the help and support of the Java community:


    people who gave a bit of their time to help me through e-mails, mailing lists,
    or forums. Of course, the mailing lists of the JCP expert groups are the first
    that come to mind; thanks to the expert members and the spec leads (Roberto Chinnici,
    Bill Shannon, Kenneth Saks, Linda DeMichiel, Michael Keith, Reza Rahman, Adam
    Bien, etc.).


    And a big kiss to my daughter Eloïse, who gave me some playful interruptions that
    helped me while I was writing on the weekends.


    A book is conceived with the help of a never-ending list of people you want to
    thank for having contributed, in one way or another: technical advice, a beer
    at the bar, an idea, or a piece of code (Jean-Louis Dewez, Frédéric Drouet, the
    Paris JUG geeks, T. Express, the


    OSSGTP guys, les Cast Codeurs, FIP, Marion, Les Connards, Vitalizen, La Fontaine,
    Ago, Laure, La Grille, les Eeckman, Yaya, Rita, os Navalhas, La Commune Libre
    d’Aligre, etc.).


    Thank you all!


    **xxiii**


    Introduction


    **I**n today’s business world, applications need to access data, apply business
    logic, add presentation layers, and communicate with external systems. That’s
    what companies are trying to achieve while minimizing costs, using standard and
    robust technologies that can handle heavy loads. If that’s your case, you have
    the right book in your hands.


    Java Enterprise Edition appeared at the end of the 1990s and brought to the Java
    language a robust software platform for enterprise development. Challenged at
    each new version, badly understood or misused, overengineered, and competing with
    open source frameworks, J2EE


    was seen as a heavyweight technology. Java EE benefited from these criticisms
    to improve and is today focused on simplicity.'
  trans: '

    **虽然**Java EE 5 被公认为最重要的企业级版本，但 Java EE 6 为每一位服务端 Java 开发者准备了更多惊喜。随着增强的 EJB 3.1、Java
    持久化 API（JPA）2.0、崭新且已大获成功的用于 RESTful Web 服务的 Java API（JAX-RS），以及全面改造的 JavaServer
    Faces（JSF）2.0 规范的推出，编写企业级应用最广泛的技术变得更为出色。企业级 Java 平台现已成熟到既能保持完整，又能做到轻量级。


    现在，你本可以花大量时间使用你最喜欢的搜索引擎和博客阅读器，在众多博客、维基和文档中搜寻关于 Java EE 6 的全部或部分内容，但我建议你最好从这本书开始。它简洁、实用，并提供了一站式的学习体验。


    将开源的 GlassFish 应用服务器作为本书的基础平台，这非常合理，原因有二：首先，GlassFish v3 是参考实现（RI），因此与 Java EE
    6 保持一致；其次，使用参考实现并不意味着它无法取悦开发者或无法扩展至生产环境。通过 GlassFish 结合最新技术所获得的技能，在企业环境中是可移植的。


    Antonio Goncalves 是一位罕见的结合体：他既是友善的 Java 爱好者，又是严谨务实的 Java EE 专家。他作为顾问的角色，加上他主持巴黎成功
    Java 用户组的经历，当然，还有他作为多个关键 Java EE 6 专家组成员的身份，使他成为《*Beginning Java™ EE 6 Platform
    with GlassFish™ 3*》一书的理想作者。


    当你读完这本书时，我想建议你，Java EE 的最大价值并非其功能的总和，而是创造它的社区，以及它作为一个标准，允许你随心所欲地选择或更改实现的本质。


    自由不仅仅关乎开源，也关乎开放标准。


    Alexis Moussine-Pouchkine


    *GlassFish 团队，Sun Microsystems*


