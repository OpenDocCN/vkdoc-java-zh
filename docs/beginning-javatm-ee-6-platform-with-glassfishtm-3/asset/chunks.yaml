    \    private String lastName;\n    private String email;\n    \n    @OneToOne(fetch\
    \ = FetchType.LAZY, cascade = {CascadeType.PERSIST, CascadeType.REMOVE})\n   \
    \ @JoinColumn(name = \"address_fk\")\n    private Address address;\n    \n   \
    \ // 构造方法、getter、setter\n}\n```\n\n你可以选择多种事件级联到目标关联，这些事件列在表4-2中。你甚至可以使用`CascadeType.ALL`类型级联所有事件。\n\
    \n**表4-2.** *可级联的事件*\n\n| 级联类型 | 描述 |\n|---------|------|\n| `PERSIST` | 将持久化操作级联到关联的目标\
    \ |\n| `REMOVE` | 将移除操作级联到关联的目标 |\n| `MERGE` | 将合并操作级联到关联的目标 |\n| `REFRESH` |\
    \ 将刷新操作级联到关联的目标 |\n| `CLEAR` | 将清除操作级联到关联的目标 |\n| `ALL` | 声明所有上述操作都应被级联 |\n\n\
    ## 缓存API\n\n大多数规范（不仅仅是Java EE）都高度关注功能需求，而将性能、可伸缩性或集群等非功能需求留作实现细节。实现必须严格遵循规范，但也可以添加特定功能。JPA的一个典型例子就是缓存。\n\
    \n在JPA 2.0之前，规范中并未提及缓存。实体管理器是一级缓存，用于以全面的方式处理数据库数据，并缓存短生命周期的活动实体。一级缓存基于每个事务使用，以减少给定事务内的SQL查询数量。例如，如果同一个对象在同一个事务中被多次修改，实体管理器将在事务结束时只生成一条`UPDATE`语句。一级缓存不是性能缓存。\n\
    \n尽管如此，所有JPA实现都使用性能缓存（也称为二级缓存）来优化数据库访问、查询、连接等。二级缓存减少了数据库流量，因为它将对象加载到内存中，并可供整个应用程序使用。每个实现都有自己缓存对象的方式，要么开发自己的机制，要么重用开源机制。缓存可以分布在集群中，也可以不分布——当规范忽略某个主题时，一切皆有可能。\n\
    \nJPA 2.0承认二级缓存是必需的，并在标准API中添加了缓存操作。该API（如清单4-22所示）非常简约（因为JPA的目标不是标准化一个功能完整的缓存），但它允许以标准方式查询和从二级缓存中移除某些实体。与`EntityManager`一样，`javax.persistence.Cache`是由持久化提供者的缓存系统实现的接口。\n\
    \n**清单4-22.** *缓存API*\n\n```\npublic interface Cache {\n    // 检查缓存是否包含给定实体的数据。\n\
    \    public boolean contains(Class cls, Object primaryKey);\n    \n    // 从缓存中移除给定实体的数据。\n\
    \    public void evict(Class cls, Object primaryKey);\n    \n    // 从缓存中移除指定类的所有实体的数据。\n\
    \    public void evict(Class cls);\n    \n    // 清空缓存。\n    public void evictAll();\n\
    }\n```\n\n## JPQL\n\n你刚刚了解了如何使用`EntityManager` API单独操作实体。你知道如何通过ID查找实体、移除它、更新其属性等。但通过ID查找实体相当有限，因为你只能使用唯一标识符检索单个实体。在实践中，你可能需要根据ID以外的条件（按名称、ISBN等）检索实体，或者基于不同条件检索一组实体（例如，所有居住在美国的客户）。这种可能性是关系数据库固有的，而JPA有一种允许这种交互的语言：JPQL。\n\
    \nJPQL用于定义针对持久化实体的搜索，独立于底层数据库。JPQL是一种查询语言，其语法源于标准查询语言（SQL），SQL是数据库查询的标准语言。但主要区别在于，SQL获得的结果是行和列（表）的形式，而JPQL使用实体或实体集合。JPQL语法是面向对象的，因此对于经验仅限于面向对象语言的开发人员来说更容易理解。开发人员通过使用点符号（例如，`myClass.myAttribute`）来管理他们的实体领域模型，而不是表结构。\n\
    \n在底层，JPQL使用映射机制将JPQL查询转换为SQL数据库可理解的语言。查询在底层数据库上通过SQL和JDBC调用执行，然后实体实例的属性被设置并返回给应用程序——这一切都通过丰富的查询语法以非常简单和强大的方式完成。\n\
    \n最简单的JPQL查询选择单个实体的所有实例：\n\n```\nSELECT b\nFROM Book b\n```\n\n如果你了解SQL，这应该看起来很熟悉。JPQL不是从表中选择，而是选择实体，这里是`Book`。`FROM`子句也用于给实体起别名：`b`是`Book`的别名。查询的`SELECT`子句指示查询的结果类型是`b`实体（即`Book`）。执行此语句将产生零个或多个`Book`实例的列表。\n\
