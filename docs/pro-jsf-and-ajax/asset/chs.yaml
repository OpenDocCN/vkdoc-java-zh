  \ 实例。自定义操作的语法既包含行为属性，也包含特定于渲染器的属性。因此，每个此类自定义操作都与特定的组件系列和渲染器类型组合绑定。例如，JSF 实现提供的标准\
  \ HTML RenderKit 支持 UIInput 组件的三种渲染器类型（Text、TextArea 和 Secret），这需要三个独立的自定义操作（inputText、inputTextArea\
