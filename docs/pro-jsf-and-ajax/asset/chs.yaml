  \n</f:view>\n\n</jsp:root>\n\n除了明显的命名空间之外，该示例包含一个映射到自定义组件库的命名空间（）和一个自定义组件（<pro:inputDate\
  \ ...\"/>）。请耐心等待——你将在接下来的章节中看到实际的 JSF 实现。\n\n**总结**\n\n本章让你深入了解了市场上三种领先的 RIA 视图技术：XUL、HTC\
  \ 和 Ajax。这些技术已证明它们完全能够为用户提供丰富且响应迅速的界面。本章还触及了这些技术存在的问题，例如缺乏标准、平台支持和维护。\n\n展望未来，JSF\
  \ 作为一种技术的潜力是无限的。组件开发者可以为社区提供广泛的组件，支持从 HTML 到 XUL 的各种技术，包括无线甚至基于字符的解决方案；你的想象力是唯一的限制。\n\
  \n\n\n本章展示了如何使用 XBL 和 HTC 构建可复用组件，以及如何实现事件处理、封装，并利用不同技术提供的支持实现（CSS 和 import）在页面中嵌入自定义组件。你还了解了\
  \ Ajax 及其关键角色 XMLHttpRequest 对象。有关这些技术的更多信息，请访问 Mozilla 网站 (http://www.mozilla.org)、Microsoft\
  \ MSDN 网站 (http://msdn.microsoft.com/) 和 Wikipedia.org (http://en.wikipedia.org/wiki/AJAX)。\n\
  \n5807ch04.qxd 1/13/06 2:50 PM Page 212\n\n5807ch05.qxd 1/13/06 2:56 PM Page 213\n\
  \n第 5 章\n\n■ ■ ■\n\n使用 Weblets 加载资源\n\n*如果说我们从发明和发现的历史中学到了一件事，那就是从长远来看——通常也是在短期内——最大胆的预言似乎都保守得可笑。*\n\
  \n——阿瑟·C·克拉克（1917–），《太空探索》，1951 年\n\nWeb 应用程序通常使用许多不同的资源文件，例如图像、样式表或脚本，以改善用户界面的呈现和交互性。希望呈现吸引人用户界面的\
  \ JSF 组件库也会利用资源文件。\n\n为 JSF 组件库提供资源文件的标准方法是直接从 Web 应用程序根文件系统提供这些文件。这些资源通常打包在归档文件（例如\
  \ ZIP 文件）中，并与 JSF 组件库分开分发。\n\n本章将介绍一个新的开源项目——Weblets。该项目（位于 http://weblets.dev.java.net）的目标是为组件编写者提供从\
  \ Java 归档文件（JAR）提供资源文件的能力，而不是从 Web 应用程序根文件系统提供。与在 web.xml 中定义静态配置 URL 映射的传统 Web\
  \ 应用程序不同，JSF 应用程序需要基于组件库 JAR 文件的存在来动态配置 URL 映射。\n\n阅读本章后，你应该理解什么是 weblets、如何使用 weblets\
  \ 加载资源，以及如何在你自己的 JSF 组件库中利用 weblets。我们将展示如何为自定义 JSF 组件库打包资源，以确保你为应用程序开发者提供一种简单的方法来成功安装你的自定义\
  \ JSF 组件库，包括组件库所需的任何资源。\n\n**介绍资源加载**\n\n你可能还记得第 2 章和第 3 章，我们创建了两个组件——ProShowOneDeck\
  \ 和 ProInputDate——它们需要向客户端提供资源。我们将在本章中使用这两个组件来说明如何使用 weblets。\n\n**213**\n\n5807ch05.qxd\
  \ 1/13/06 2:56 PM Page 214\n\n**214**\n\n第 5 章 ■ 使用 Weblets 加载资源\n\n在此示例中，HtmlShowOneDeckRenderer\
  \ 组件使用一个 JavaScript 文件 showOneDeck.js，当用户点击渲染后的组件时，该文件用于展开 UIShowItem。如第 3 章所述，此\
  \ JavaScript 文件传统上由 Web 应用程序通过硬编码到实际 HtmlShowOneDeckRenderer 代码中的相对路径来提供。这要求应用程序开发者部署额外的资源，这些资源以单独的归档文件（例如\
  \ ZIP 文件）交付和打包，通常称为 *installables* 归档文件。\n\n■**注意** JSF HTML Basic RenderKit 没有任何图像、样式或脚本，因此对于\
  \ JSF 资源打包问题，没有标准的解决方案。\n\n代码示例 5-1 展示了 HtmlShowOneDeckRenderer 类中的 encodeResources()\
  \ 方法，该方法说明了可安装的 JavaScript 资源文件——/projsf-ch3/showOneDeck.js 和 /projsf-ch3/showOneDeck.css——是从\
  \ Web 应用程序根文件系统提供的。\n\n**代码示例 5-1.** *HtmlShowOneDeckRenderer 代码中的* encodeResources()\
  \ *方法*\n\n/**\n\n* 写出 ProShowOneDeck 资源。\n\n*\n\n* @param context Faces 上下文\n\n\n\
  \n* @param component  Faces 组件\n\n*/\n\nprotected void encodeResources(\n\nFacesContext\
  \ context,\n\nUIComponent component) throws IOException\n\n{\n\n**writeScriptResource(context,\
  \ \"/projsf-ch3/showOneDeck.js\");** **writeStyleResource(context, \"/projsf-ch3/showOneDeck.css\"\
  );**\n\n}\n\n尽管这种可安装的方法对 JSF 组件编写者来说很方便，但它增加了应用程序开发者的安装负担，开发者必须记得在每次组件库升级到新版本时解压可安装归档文件。因此，你需要一种方法将额外的资源打包到包含\
  \ Renderer 类的同一个 JAR 文件中，从而为使用你的组件库的应用程序开发者简化部署。\n\n**使用现有解决方案**\n\n目前一些更高级的 JSF\
  \ 组件库，例如 Apache MyFaces 和 Oracle ADF Faces，提供了自定义的 servlet 或 filter 解决方案，用于提供其特定渲染器所需的资源。然而，每个组件库往往以略微不同的方式解决同一个问题。因此，缺乏任何官方的标准解决方案会导致每个组件库都需要额外的配置和安装负担。\n\
  \n5807ch05.qxd 1/13/06 2:56 PM 第 215 页\n\n第 5 章 ■ 使用 WEBLET 加载资源\n\n**215**\n\n\
  **使用 Weblets**\n\n开源 Weblets 项目旨在以一种通用且可扩展的方式解决资源打包问题，以便所有 JSF 组件编写者都能利用它，并且不会给应用程序开发者增加额外的安装负担。\n\
  \n*weblet* 充当一个中介，拦截来自客户端的请求，并使用短 URL 从 JAR 文件中提供资源。与 servlet 或 filter 方法不同，weblet\
  \ 可以在 JAR 文件内部注册和配置，因此组件库的 Renderer、它们的资源文件以及 weblet 配置文件（weblets-config.xml）都可以打包在同一个\
  \ JAR 文件中。当组件库升级到新版本时，你无需单独部署额外的可安装文件。对于应用程序开发者来说，也无需任何配置步骤。\n\n需要注意的是，所有由 weblets\
  \ 提供的资源都是*内部*资源，仅供 Renderer 使用。任何由应用程序提供的资源（如图像）都作为组件属性值提供，并从上下文根目录作为*外部*资源加载。\n\
  \n**探索 Weblet 架构**\n\n尽管 weblets 被设计为可供任何 Web 客户端使用，但 weblet 实现已通过一个名为 WebletsViewHandler\
  \ 的自定义 ViewHandler 与 JSF 集成，如图 5-1 所示。在渲染主 JSF 页面期间，WebletsViewHandler 负责将 weblet\
  \ 特定的资源 URL 转换为浏览器用于请求 weblet 管理资源的实际 URL。\n\n**图 5-1.** *weblet 架构的高级概述*\n\n5807ch05.qxd\
  \ 1/13/06 2:56 PM 第 216 页\n\n**216**\n\n第 5 章 ■ 使用 WEBLET 加载资源\n\n在接收到主页面渲染后的标记后，浏览器使用单独的请求下载每个额外的资源。每个对\
  \ weblet 管理资源的请求都会被 WebletsPhaseListener 拦截，然后它要求 WebletContainer 从组件库 JAR 文件中流式传输\
  \ weblet 管理的资源文件。\n\nweblet 容器被设计为尽可能利用浏览器缓存。这通过最小化对 weblet 管理资源文件的请求总数来提高整体渲染性能。\n\
  \n为了确保灵活性、优化性能并避免与现有 Web 应用程序资源冲突，应用程序开发者可以配置 weblets 来覆盖组件编写者提供的任何默认设置。\n\n**在你的组件库中使用\
  \ Weblets**\n\n你可以使用 weblets-config.xml 文件配置 weblets，该文件必须存储在组件库 JAR 文件的 /META-INF\
  \ 目录中。配置 weblet 类似于配置 servlet 或 filter。weblets-config.xml 文件中的每个 weblet 条目都有一个 weblet\
  \ 名称、一个实现类和初始化参数。weblet 映射将特定的 URL 模式与特定的 weblet 名称关联起来，例如 com.apress.projsf.ch5。weblet\
  \ 名称和默认 URL 模式定义了 weblet 管理资源的公共 API，并且为了保持向后兼容性，在组件库的不同版本之间不应修改。\n\n如代码示例 5-2 所示，示例组件库将资源打包在\
  \ com.apress.projsf.ch5.renderer.html.basic.resources Java 包中，并使用默认的 URL 映射 /projsf-ch5/*\
  \ 使其对浏览器可用。\n\n**代码示例 5-2.** *Weblets 配置文件——* weblets-config.xml\n\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\" ?>\n\n<weblets-config >\n\n<weblet>\n\n**<weblet-name>com.apress.projsf.ch5</weblet-name>**\n\
  \n**<weblet-class>**\n\n**net.java.dev.weblets.packaged.PackagedWeblet**\n\n**</weblet-class>**\n\
  \n<init-param>\n\n**<param-name>package</param-name>**\n\n**<param-value>com.apress.projsf.ch5.render.html.basic.resources</param-value>**\n\
  \n</init-param>\n\n</weblet>\n\n<weblet-mapping>\n\n<weblet-name>com.apress.projsf.ch5</weblet-name>\n\
  \n**<url-pattern>/projsf-ch5/*</url-pattern>**\n\n</weblet-mapping>\n\n</weblets-config>\n\
  \nPackagedWeblet 是一个内置的 weblet 实现，它可以使用 ClassLoader 从特定的 Java 包中读取数据，然后将结果流式传输到浏览器。package\
  \ 初始化参数告诉 PackagedWeblet 在解析 weblet 管理的资源请求时，将哪个 Java 包用作根目录。\n\n5807ch05.qxd 1/13/06\
  \ 2:56 PM 第 217 页\n\n第 5 章 ■ 使用 WEBLET 加载资源\n\n**217**\n\n指定 Weblet MIME 类型\n\n\
  当使用 weblets 提供 JSF 组件资源文件时，重要的是让浏览器正确获知相应的 MIME 类型，以便资源文件能被正确处理。默认情况下，weblets 内置了许多常见\
  \ MIME 类型的知识，例如对于常见的文件扩展名（如 .txt）使用 text/plain。然而，在某些情况下，JSF 组件可能需要打包 weblets 先前未知的资源，或者必须使用不同的扩展名来提供资源，这导致\
  \ weblets 无法自动识别要使用的正确 MIME 类型。\n\n代码示例 5-3 展示了如何为 weblet 提供的资源定义自定义 MIME 类型映射。\n\
  \n**代码示例 5-3.** *定义自定义 MIME 类型的 Weblets 配置文件*\n\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\" ?>\n\n<weblets-config >\n\n<weblet>\n\n<weblet-name>com.apress.projsf.ch5</weblet-name>\n\
  \n<weblet-class>\n\nnet.java.dev.weblets.packaged.PackagedWeblet\n\n</weblet-class>\n\
  \n<init-param>\n\n<param-name>package</param-name>\n\n<param-value>com.apress.projsf.ch5.render.html.basic.resources</param-value>\n\
  \n</init-param>\n\n**<mime-mapping>**\n\n**<extension>htc</extension>**\n\n**<mime-type>text/x-component</mime-type>**\n\
  \n**</mime-mapping>**\n\n</weblet>\n\n<weblet-mapping>\n\n<weblet-name>com.apress.projsf.ch5</weblet-name>\n\
  \n<url-pattern>/projsf-ch5/*</url-pattern>\n\n</weblet-mapping>\n\n</weblets-config>\n\
  \n代码示例 5-3 为由此 weblet 提供的所有具有 .htc 扩展名的资源定义了一个自定义 MIME 类型映射 text/x-component。\n\n\
  指定 Weblet 版本控制\n\nWeblets 还内置了对组件库版本控制的支持。这允许浏览器在可能的情况下缓存打包的资源（例如 showOneDeck.js），从而防止不必要的往返\
  \ Web 服务器。\n\n5807ch05.qxd 1/13/06 2:56 PM 第 218 页\n\n**218**\n\n第 5 章 ■ 使用 WEBLET\
  \ 加载资源\n\n\n\n每次浏览器渲染页面时，都会确保该页面使用的所有资源均可用。在页面初次渲染期间，浏览器会从 Web 服务器下载每个资源 URL 的新副本，从而用这些资源内容填充其缓存。在此过程中，浏览器会记录响应头中的\
  \ Last-Modified 和 Expires 时间戳。如果当前时间晚于过期时间戳，或者不存在过期时间戳信息，则称缓存内容已过期。\n\n在下次渲染同一页面时，浏览器会检查本地缓存的资源是否已过期。如果未过期，则直接重用本地缓存的副本。否则，会向\
  \ Web 服务器发起新请求，并在请求头 If-Modified-Since 中包含上次修改信息。Web 服务器的响应要么指示浏览器缓存仍然是最新的，要么将新的资源内容流式传输给浏览器，并在响应头中附带更新后的\
  \ Last-Modified 和 Expires 时间戳。\n\nWeblets 利用版本控制来充分利用浏览器缓存行为，从而尽可能高效地下载和缓存打包资源。只有当缓存被清空，或者\
  \ Web 服务器上的组件库已升级时，浏览器才需要检查新的更新。\n\n代码示例 5-4 通过向 `com.apress.projsf.ch5` weblet\
  \ 添加 1.0 版本，展示了此版本控制功能。\n\n**代码示例 5-4.** *用于生产环境的 Weblets 配置文件，使用* 1.0 *版本控制*\n\n\
  <?xml version=\"1.0\" encoding=\"UTF-8\" ?>\n\n<weblets-config >\n\n<weblet>\n\n\
  <weblet-name>com.apress.projsf.ch5</weblet-name>\n\n<weblet-class>net.java.dev.weblets.packaged.PackagedWeblet</weblet-class>\n\
  \n**<weblet-version>1.0</weblet-version>**\n\n<init-param>\n\n<param-name>package</param-name>\n\
  \n<param-value>com.apress.projsf.ch5.render.html.basic.resources</param-value>\n\
  \n</init-param>\n\n</weblet>\n\n<weblet-mapping>\n\n<weblet-name>com.apress.projsf.ch5</weblet-name>\n\
  \n<url-pattern>/projsf-ch5/*</url-pattern>\n\n</weblet-mapping>\n\n</weblets-config>\n\
  \n通过指定 weblet 版本，你表明打包资源在版本号更改之前不会发生变化。因此，版本号会作为资源 URL 的一部分，该 URL 由 WebletsViewHandler\
  \ 在运行时确定（例如，`/projsf-ch5$1.0/showOneDeck.js`）。当 WebletContainer 处理此请求时，它会从 URL 中提取版本号，并确定该资源应被缓存且永不过期。一旦新版本的组件库部署到\
  \ Web 应用程序，由 WebletsViewHandler 在运行时创建的资源 URL 就会发生变化（例如，`/projsf-ch5$2.0/showOneDeck.js`）；因此，浏览器缓存的\
  \ 1.0 版本的 `showOneDeck.js` 副本将不再有效，因为 URL 已经不同了。\n\n5807ch05.qxd 1/13/06 2:56 PM\
  \ 第 219 页\n\n第 5 章 ■ 使用 WEBLETS 加载资源\n\n**219**\n\n在开发过程中，打包资源的内容可能会频繁更改，因此浏览器需要持续与\
  \ Web 服务器核对，以检测最新的资源 URL 内容，这一点至关重要。如果在 `weblets-config.xml` 中省略了 weblet 版本，则每次渲染主\
  \ Web 页面时，默认都会进行此检查。\n\n或者，weblet 配置允许组件编写者将 `-SNAPSHOT` 附加到版本号后面。例如，如代码示例 5-5 所示，`1.0-SNAPSHOT`\
  \ 表示此文件正在开发中，其行为应与省略版本号时相同。\n\n**代码示例 5-5.** *用于开发环境的 Weblets 配置文件，使用* SNAPSHOT\
  \ *版本控制*\n\n<?xml version=\"1.0\" encoding=\"UTF-8\" ?>\n\n<weblets-config >\n\n\
  <weblet>\n\n<weblet-name>com.apress.projsf.ch5</weblet-name>\n\n<weblet-class>net.java.dev.weblets.packaged.PackagedWeblet</weblet-class>\n\
  \n**<weblet-version>1.0-SNAPSHOT</weblet-version>**\n\n...\n\n</weblet>\n\n...\n\
  \n</weblets-config>\n\n设置安全性\n\n从 JAR 文件提供打包资源时，必须格外小心，确保 Java 类文件或其他敏感信息不能通过 URL\
  \ 访问。在桌面 Java 应用程序中，资源文件通常存储在 Java 实现类下方的 `resources` 子包中，这些实现类会使用这些资源文件。同样的策略也适用于\
  \ JSF 组件库中的打包资源，其安全优势在于确保只有资源文件可以通过 URL 访问。JAR 文件中的所有其他内容，包括 Java 实现类，都无法通过 URL\
  \ 访问，因为 `resources` 包或其任何子包中都不存在 Java 类。\n\n使用 Weblet 协议\n\n了解了如何配置 weblets 之后，现在来看看如何在两个自定义渲染器（`HtmlInputDateRenderer`\
  \ 和 `HtmlShowOneDeckRenderer`）中引用由 weblet 定义的资源。代码示例 5-6 展示了由 weblet 契约定义的语法，用于向\
  \ JSF 页面返回正确的 URL。\n\n**代码示例 5-6.** *Weblet 协议语法* weblet://<weblet 名称><资源>\n\n`weblet://`\
  \ 前缀表示这是一个由 weblet 管理的资源，其后跟随着 weblet 名称和请求的资源。\n\n5807ch05.qxd 1/13/06 2:56 PM\
  \ 第 220 页\n\n**220**\n\n第 5 章 ■ 使用 WEBLETS 加载资源\n\n在 HtmlInputDateRenderer 中使用 Weblets\n\
  \n之前，在 `HtmlInputDateRenderer` 类中，你看到了如何将 URL `/projsf-ch2/inputDate.css` 作为参数传递给\
  \ `writeStyleResource()` 方法。在代码示例 5-7 中，你将看到如何修改此代码以改用 weblet 协议。\n\n**代码示例 5-7.**\
  \ *使用 Weblet 协议提供资源*\n\n/**\n\n* 写出 HtmlInputDate 资源。\n\n*\n\n* @param context Faces\
  \ 上下文\n\n* @param component Faces 组件\n\n*/\n\nprotected void encodeResources(\n\n\
  FacesContext context,\n\nUIComponent component) throws IOException\n\n{\n\n**writeStyleResource(context,\
  \ \"weblet://com.apress.projsf.ch5/inputDate.css\");**\n\n}\n\nweblet 协议语法方便且易于理解。该语法以\
  \ `weblet://` 开头，后跟 weblet 名称（例如 `com.apress.projsf.ch5`），最后是路径信息或资源文件（例如 `/inputDate.css`）。\n\
  \n■**注意** 尽管 Weblets 项目使用类似协议的语法以公开方式描述资源，但这并非真正的协议处理器，因此 `new URL(\"weblet:://...\"\
  ).openStream()` 在 Java 代码中无法工作。不过，你也不需要它工作，因为客户端并非 Java 代码。\n\n在 HtmlShowOneDeckRenderer\
  \ 中使用 Weblets\n\n与 `HtmlInputDateRenderer` 类似，在 `HtmlShowOneDeckRenderer` 类中，你看到我们将\
  \ URL `/projsf-ch3/showOneDeck.js` 和 `/projsf-ch3/showOneDeck.css` 作为参数传递给 `writeStyleResource()`\
  \ 方法（参见代码示例 5-1）。在代码示例 5-8 中，你将看到如何修改此代码以改用 weblet 协议。\n\n**代码示例 5-8.** *使用 Weblet\
  \ 协议提供资源*\n\n/**\n\n* 写出 HtmlShowOneDeck 资源。\n\n*\n\n* @param context Faces 上下文\n\
  \n* @param component Faces 组件\n\n*/\n\n5807ch05.qxd 1/13/06 2:56 PM 第 221 页\n\n\
  第 5 章 ■ 使用 WEBLETS 加载资源\n\n**221**\n\nprotected void encodeResources(\n\nFacesContext\
  \ context,\n\nUIComponent component) throws IOException\n\n{\n\n**writeScriptResource(context,\
  \ \"weblet://com.apress.projsf.ch5/showOneDeck.js\");** **writeStyleResource(context,\
  \ \"weblet://com.apress.projsf.ch5/showOneDeck.css\");**\n\n}\n\n请注意，URL 映射和版本号都未包含在\
  \ weblet 资源语法中。WebletsViewHandler 会使用 weblet URL 映射和版本号来创建 weblet 将服务的资源 URL。\n\n\
  \n\n当您未使用 weblets 时，则不会使用 `weblet://` 资源路径语法，而是分发一个独立的可安装 ZIP 文件。当您迁移到 weblets 后，您将在渲染器（Renderer）中开始使用\
  \ `weblet://` 资源路径语法，并将资源包含在 JAR 文件中。在同一组件库的同一版本中混合使用这两种方法处理资源，不会带来任何好处。\n\n**在\
  \ JSF 应用程序中使用 Weblets**\n\n为简化应用程序开发人员的设置，组件编写者应为其组件库选择一个默认的 URL 映射。应用程序开发人员无需在\
  \ `web.xml` 文件中添加*任何* weblet 特定的配置，因为 `WebletsPhaseListener` 将自动被调用来处理针对 weblet\
  \ 管理资源的传入请求。\n\n**使用 Weblet 过滤器优化 Weblets**\n\n（可选）应用程序开发人员可以在 `/WEB-INF/web.xml`\
  \ 文件中注册 `WebletsFilter`。\n\n通过执行这一简单步骤，他们可以确保基于 weblet 的 URL 更短，例如 `/projsf-ch5/showOneDeck.js`\
  \ 而非 `/faces/weblets/projsf-ch5/showOneDeck.js`。\n\n使用 `WebletsFilter` 还能减少处理请求的开销，因为不再需要调用\
  \ JSF 生命周期来通过 `WebletsPhaseListener` 服务 weblet 管理的资源。\n\n代码示例 5-9 将 weblet 容器映射到以\
  \ `/projsf-ch5` 为前缀的过滤器 URL，该前缀位于上下文根目录下。为 `WebletsFilter` 映射使用此特定 URL 模式，可以防止 weblet\
  \ 容器为非 weblet 请求引入不必要的开销。如果一个 weblet 服务于特定模式，例如 `/projsf-ch5/*`，那么它将服务于所有 `/projsf-ch5/*`\
  \ 的请求，而不会回退到上下文根目录。\n\n**代码示例 5-9.** *web.xml 文件中的 Weblet 容器配置*\n\n<web-app>\n\n\
  <filter>\n\n<filter-name>Weblet Container</filter-name>\n\n**<filter-class>net.java.dev.weblets.WebletsFilter</filter-class>**\n\
  \n</filter>\n\n<filter-mapping>\n\n<filter-name>Weblet Container</filter-name>\n\
  \n**<url-pattern>/projsf-ch5/*</url-pattern>**\n\n5807ch05.qxd 1/13/06 2:56 PM Page\
  \ 222\n\n**222**\n\n第 5 章 ■ 使用 Weblets 加载资源\n\n</filter-mapping>\n\n...\n\n</web-app>\n\
  \nweblet 容器负责解析所有 weblet 配置文件（`weblet-config.xml`）。它定位这些文件的方式与 JSF 定位 `faces-config.xml`\
  \ 文件的方式相同。\n\nweblet 容器首先搜索存储在每个组件库 `META-INF/` 目录中的配置文件，然后在 Web 应用程序根目录中搜索 `/WEB-INF/weblets-config.xml`。\n\
  \n这种设计允许应用程序开发人员在 URL 模式已被 Web 应用程序资源（如 Servlet 或过滤器）占用时，覆盖组件编写者定义的默认 URL 映射。例如，代码示例\
  \ 5-10 覆盖了组件库中打包的默认 `<url-pattern>`，并定义了一个自定义映射（例如 `/projsf-chapter5-resources/*`）。\n\
  \n**代码示例 5-10.** *覆盖 Weblets 映射*\n\n<?xml version=\"1.0\" encoding=\"UTF-8\" ?>\n\
  \n<weblets-config >\n\n<weblet-mapping>\n\n<weblet-name>com.apress.projsf.ch5</weblet-name>\n\
  \n**<url-pattern>/projsf-chapter5-resources/*</url-pattern>**\n\n</weblet-mapping>\n\
  \n</weblets-config>\n\n渲染器会自动适应此 URL 映射的更改，无需任何代码更改或重新编译。\n\n**总结**\n\n作为一个新的开源项目，Weblets\
  \ 拥有巨大潜力，有望成为事实上的标准，为 Web 客户端和 JSF 组件社区提供通用且可配置的资源加载功能。与可安装方法的关键区别在于，它简化了 JSF 组件及其资源的打包，并最大程度地减少了为特定\
  \ Web 应用程序项目安装和设置 JSF 组件库的开销。\n\n本章探讨了一种将资源与 JSF 组件打包的新方法。现在，您应该能够通过包含合适的 `weblets-config.xml`\
  \ 文件并使用 `weblet://` 协议风格的语法来引用 weblet 管理的资源，从而在自己的组件库中利用 weblets。\n\n您现在应该理解 weblets\
  \ 如何与 JSF 集成，理解用于打包额外资源的概念，并知道如何设置和优化应用程序以使用这些资源。\n\n5807ch06.qxd 1/13/06 11:18\
  \ AM Page 223\n\n第 6 章\n\n■ ■ ■\n\n为 Deck 组件启用 Ajax\n\n*今天，能让我快乐或不快乐的，不是事件，而是我自己。我可以选择成为哪一种。昨天已逝，明天未至。我只有一天，就是今天，我要在今天过得快乐。*\n\
  \n——朱利叶斯·亨利·马克思，人称格劳乔·马克思\n\n**在**本章和第 7 章中，我们将探讨如何在 JSF Web 应用程序中与组件交互时，实现更流畅、更丰富的用户体验。按照当前的设计，您的组件在传统的\
  \ HTML Web 应用程序中可以完美运行，并执行传统的有效表单 POST。您可能已经注意到，这种构建 Web 应用程序的传统方式有一个不良副作用：当响应返回客户端浏览器时，表单\
  \ POST 会导致 Web 应用程序执行全页刷新。页面重新加载时产生的额外闪烁不仅令人烦恼，还会影响应用程序的性能。其他副作用可能包括数据丢失、滚动位置丢失和焦点丢失。\n\
  \n正是在这里，Ajax 挺身而出，它提供了与底层服务器以及 Web 应用程序使用的任何业务服务进行异步通信的功能，而无需强制重新加载页面及其资源。这反过来减少了闪烁，并允许页面保持滚动位置和焦点。通过利用\
  \ JavaScript 中名为 `XMLHttpRequest` 的通信通道，开发人员可以超越在浏览器中调整 DOM 表示，提供一些动态的丰富功能。实现 Ajax\
  \ 技术的优秀应用示例包括 Google Gmail、Oracle Collaboration Suite 和 Google Suggest；这些应用证明了 Ajax\
  \ 是为当前互联网平台提供丰富功能的可行解决方案。\n\n随着消费者对 RIA 解决方案可能性的认识不断提高，对更流畅、更丰富交互的需求已不再是可选项。\n\n\
  **Deck 组件 Ajax 实现的需求**\n\n首先，您需要确保您的 deck 组件的 Ajax 实现能够在回传时执行完整的 JSF 生命周期（从而利用 JSF\
  \ 的所有优势）。您还 **223**\n\n5807ch06.qxd 1/13/06 11:18 AM Page 224\n\n**224**\n\n第 6\
  \ 章 ■ 为 Deck 组件启用 Ajax\n\n需要弄清楚在 JSF 生命周期期间发生了什么变化，并仅用这些变化更新客户端 DOM 表示。\n\n其次，您需要防止客户端事件不必要地返回服务器，确保只有影响业务逻辑的事件才执行到服务器的往返。这意味着您需要在浏览器本地短路用户界面交互性，以便诸如分割器、表格列重排、日期选择器和颜色弹出窗口等潜在组件不会往返到服务器。\n\
  \n最后，也是最重要的，您希望通过抽象化呈现细节（例如 HTML、JavaScript、XUL 和 HTC），让应用程序开发人员的工作变得简单。\n\n**启用\
  \ Ajax 的 Deck 组件**\n\n\n\n在本章中，你将学习如何为你的 ProShowOneDeck 组件启用 Ajax 功能，从而改善用户与该组件交互时的体验。如第\
  \ 2 章所述，如果所需行为已经存在，则无需创建新的 UIComponents。在本例中，你已经在 UIShowOne 组件中实现了 ProShowOneDeck\
