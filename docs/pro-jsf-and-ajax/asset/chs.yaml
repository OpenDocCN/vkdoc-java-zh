  \n■**注意** 前缀 `javax.faces` 保留给 JSF 规范中定义的组件类型使用。本书中的所有示例都使用 `com.apress.projsf`\
  \ 前缀作为自定义组件类型。\n\n**转换器、验证器、事件和监听器**\n\n除了提供 UIComponent 之外，JSF 实现还为这些 UIComponent\
  \ 提供了辅助类。这些辅助类分为转换器、验证器以及事件和监听器模型。转换器在组件的提交值与模型层中对应的强类型对象之间提供双向类型转换。验证器对强类型对象执行验证；例如，它们可以确保日期不是过去的日期。代码示例\
  \ 1-11 展示了一个带有日期转换器的 `inputText` 组件。\n\n**代码示例 1-11.** inputText *组件与附加的日期转换器*\n\
  \n<h:inputText value=\"#{sample.date}\" >\n\n**<f:convertDateTime pattern=\"yyyy-MMM-dd\"\
  \ />**\n\n</h:inputText>\n\n5807ch01.qxd 1/3/06 4:47 PM Page 23\n\n第 1 章 ■ JSF 的基础：组件\n\
  \n**23**\n\nJSF 还提供了一种将监听器附加到组件并向这些监听器广播事件的方法，其工作方式与 AWT 和 Swing 非常相似。例如，`commandButton`\
  \ 是 `ActionEvent` 的来源。当点击 `commandButton` 时，会发生回发，并且一个新的 `ActionEvent` 被存储到事件队列中。任何在\
  \ `commandButton` 上注册的事件监听器都会收到此事件的通知。代码示例 1-12 展示了一个带有附加监听器的 `commandButton`。\n\
  \n■**注意** JSF 关于注册监听器和广播事件的规范基于 JavaBean 规范 1.0.1 版的设计模式。\n\n**代码示例 1-12.** commandButton\
  \ *与附加的监听器*\n\n<h:commandButton value=\"Login\"\n\n**action=\"success\"**\n\n**actionListener=\"\
  #{sample.onLogin}\" />**\n\n在代码示例 1-12 中，一个 `commandButton` 组件有两个属性——`action` 和\
  \ `actionListener`。这两个属性都使用方法绑定表达式，区别在于 `action` 属性需要一个返回 `String` 对象的方法，而 `actionListener`\
  \ 属性需要一个接受 `ActionEvent` 且返回类型为 `void` 的方法。`action` 属性的字符串值用于导航目的。\n\n当排队等待的 `ActionEvent`\
  \ 被处理时，这些方法绑定表达式将被用来执行由 `action` 和 `actionListener` 引用的后台 bean 方法。\n\n**Facets**\n\
  \n一个 JSF 视图由组件层次结构组成，通过索引提供对每个父组件子组件的访问。有时，还需要提供一种替代方式来添加不属于此有序列表的子组件。\n\n\n\n一个示例是\
  \ `dataTable` 组件，其子元素代表要在表格中渲染的列。在某些情况下，识别出代表整个表格页眉和/或页脚的组件可能会很有用，这些组件与代表各列的子元素集合是分开的。这些页眉和页脚子组件被称为*片段*，仅通过名称引用，且没有特定顺序。片段的名称代表了嵌套组件在父组件中将扮演的角色。需要注意的是，每个命名的片段，父组件只能包含一个子组件，但同一个父组件可以包含多个带索引的子组件。\n\
  \n代码示例 1-13 展示了如何为 `dataTable` 组件和 `column` 组件添加页眉片段。\n\n**代码示例 1-13.** *`dataTable`\
  \ 组件中的片段*\n\n<h:dataTable value=\"#{sample.tableList}\" var=\"rows\" >\n\n**<f:facet\
  \ name=\"header\" >**\n\n<h:outputText value=\"Contact Information\" />\n\n</f:facet>\n\
