  \    serviceURL,\n    selectId,\n    category)\n{\n    var xmlhttp = createHttpRequest();\n\
  \n    // 你可以使用任何类型的数据源，但在此示例中，\n    // 我们将使用一个包含数据的简单 JSON 文件。\n    var requestURL\
  \ = serviceURL + '/booklist-' + category.toLowerCase() + '.json';\n    xmlhttp.open(\"\
