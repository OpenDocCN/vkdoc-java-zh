  \n进行更智能的开发\n\n**JavaServer Faces (JSF) 是一个用于 Java 2 企业版 (J2EE) Web 应用程序的用户界面 (UI)\
  \ 组件框架。一旦采用，它允许组织从旧技术（例如基于字符的虚拟终端 (VT) 平台）迁移到更现代的、基于标准的技术和平台，例如 JSF 和 Java。在过去的\
  \ 15 年中，软件行业见证了众多技术和平台的兴衰。通常，特定技术的使用会因多种原因而减少，包括时尚潮流和竞争。某些技术衰落的另一个常见原因是，如果它们由一家公司设计和维护，那么这些技术的消费者将被迫依赖仅由创建者提供的支持。每当创建者决定弃用一种技术以支持更先进的解决方案时，消费者就会面临一个过时且不受支持的平台。JSF\
  \ 允许组织和消费者在新技术出现时加以利用，同时对现有 JSF 应用程序的影响最小。JSF 还为软件行业带来了功能性和视觉外观的极致复用。本书的第 1 部分将教你\
  \ JSF 是什么，描述如何通过开发自己的组件来利用 JSF，并为你打开一扇通往新视野的大门。**\n\n5807ch01.qxd 1/3/06 4:47 PM\
  \ 第 2 页\n\n5807ch01.qxd 1/3/06 4:47 PM 第 3 页\n\n第 1 章\n\n■ ■ ■\n\nJSF 的基础：\n\n组件\n\
  \n*JavaServer Faces (JSF) 是一个用于 Java Web 应用程序的用户界面 (UI) 框架。它旨在显著减轻编写和维护在 Java 应用服务器上运行并将其\
  \ UI 呈现给目标客户端的应用程序的负担。*\n\n—JavaServer Faces 规范\n\n**对**于那些在阅读本书之前还没有机会了解 JSF 的读者，本章将快速介绍其核心功能。如果你已经熟悉\
  \ JSF，你仍然可能会发现关于组件和生命周期架构的讨论很有价值，因为这些主题是理解本书其余内容的基础。本章将涵盖应用程序开发，概述 JSF 及其与其他类似框架的关系，并深入探讨\
  \ JSF 架构及其组件模型。到本章结束时，你应该理解 JSF 架构、其构建块及其请求生命周期。\n\n在深入探讨 JSF 架构之前，我们先来定义 JSF（以及最终本书）的目标受众。JSF\
  \ 规范定义了构成核心受众的开发者类型：页面作者、应用程序开发者、组件编写者、工具提供者和 JSF 实现者，如表 1-1 所示。\n\n**表 1-1.** *JSF\
  \ 开发者类型**\n\n**类型**\n\n**描述**\n\n页面作者\n\n\n\n页面作者负责创建用户界面，并掌握标记语言、脚本语言以及渲染技术（如 JavaServer\
  \ Pages (JSP)）。根据 JSF 规范，这类开发者通常不熟悉 Java 或 Visual Basic 等编程语言。\n\n**应用程序开发者**\n\n\
  根据 JSF 规范，应用程序开发者负责应用程序的服务器端功能，这些功能可能与用户界面相关，也可能不相关。应用程序开发者的技术技能通常包括 Java、Enterprise\
  \ JavaBeans (EJB) 或其他服务器技术。\n\n*续*\n\n**3**\n\n5807ch01.qxd 1/3/06 4:47 PM 第 4 页\n\
  \n**4**\n\n第 1 章 ■ JSF 基础：组件\n\n**表 1-1.** *续*\n\n**类型**\n\n**描述**\n\n组件编写者\n\n\
  组件编写者是可重用组件的主要提供者。该开发者负责创建可供他人（如页面作者）使用的组件库。\n\n工具提供者\n\n顾名思义，工具提供者提供能够支持使用 JSF\
  \ 构建应用程序的开发者的工具。\n\nJSF 实现者\n\nJSF 实现者是为此前定义的所有开发者提供运行时（或 JSF 规范的实现）的开发者。现有实现的例子包括\
  \ Sun 参考实现 (RI) (http://java.sun.com/j2ee/javaserverfaces/) 和 Apache MyFaces (http://myfaces.apache.org)。\n\
  \n**来源：JavaServer Faces 1.1 规范*\n\n根据我们的经验，页面作者和应用程序开发者通常是同一个人，因此他们既精通 UI 设计，也熟悉\
  \ Java 或 Visual Basic 等编程语言。在本书中，我们将主要关注组件编写者。\n\n**应用程序开发技术概述**\n\n在计算机和软件相对短暂的历史中，应用程序开发经历了几个重大的演进阶段，每个阶段都承诺提高开发者的生产力和灵活性。自计算机首次问世以来，这些技术改进呈指数级增长，并且看起来计算机和软件技术在未来仍将以同样惊人的速度持续演进。\n\
  \n*没有指数增长是永恒的……但我们可以延缓“永恒”的到来。*\n\n——戈登·摩尔（以摩尔定律闻名），\n\n飞兆半导体与仪器公司\n\n在这些演进过程中，应用程序的部署模式以及用于开发此类应用程序的计算机和软件技术都发生了变化。\n\
  \n**单层架构**\n\n在 1970 年代末和 1980 年代初，发生了一个根本性的转变，从大型集中式计算机转向个人电脑 (PC)，这将控制权从少数人手中转移到了多数人（任何拥有\
  \ PC 的人）手中。尽管这一时期发布的大多数应用程序比以往开发的任何程序都更强大，但它们是为单用户任务而开发和设计的，\n\n5807ch01.qxd 1/3/06\
  \ 4:47 PM 第 5 页\n\n第 1 章 ■ JSF 基础：组件\n\n**5**\n\n并且缺乏对公共数据的协作；当时，还没有中央数据库或电子邮件系统。以这种方式部署或安装的应用程序被称为*单层*应用程序。\n\
  \n从维护的角度来看，这种单层解决方案是一种驻留在个人机器上并控制与业务逻辑交互的应用程序。这些单层应用程序都集成了三个应用层（表示层、业务逻辑层和数据层），这使得维护变得困难，并且几乎无法共享和扩展信息。\n\
  \n**双层架构：客户端-服务器**\n\n*双层*或*客户端-服务器*解决方案在 1980 年代占据了中心舞台，并将单层解决方案推入了历史档案。双层架构实现了数据共享，改变了应用程序的开发和部署方式。双层应用程序直接与最终用户交互；业务逻辑和表示逻辑存储在客户端，而数据驻留在远程服务器上。这种架构允许多个用户通过桌面电子邮件客户端（如\
  \ Microsoft Outlook 或 Mozilla Thunderbird）等应用程序访问集中式数据。\n\n尽管双层解决方案解决了多个用户访问同一数据源的问题，但它也有其局限性，例如设计缺乏灵活性，难以进行后续修改或移植，这反过来又增加了维护成本。\n\
  \n**多层架构：Web 应用程序**\n\n应用程序开发的下一阶段随着互联网和 Web 浏览器的出现而到来，并引入了*三层*或*多层*架构。在单层解决方案中，表示层、业务逻辑层和数据层都集成在一个单一的应用程序中。多层架构将这种类型的应用程序分解为三个层，允许开发者专注于特定的领域——模型（数据访问）、视图（表示）和控制器（逻辑）。这种代表各层分离的编程范式被称为模型-视图-控制器\
  \ (MVC) 架构，最初在 SmallTalk 中引入，并在 1980 年代传播到开发者社区。\n\n将单层应用程序分解为多个层——结合标准客户端（例如 Web\
  \ 浏览器）和标准通信协议（例如超文本传输协议 [HTTP]）——突然让用户能够普遍访问集中式且熟悉的应用程序，例如通过浏览器使用电子邮件（例如 Google\
  \ 基于浏览器的 Gmail）。应用程序不再只是来自 CD 或下载的东西。多层解决方案为应用程序所有者提供了集中维护和管理的能力，这使得应用程序所有者能够为所有使用该应用程序的用户提供即时升级。\n\
  \n**探索当今的应用程序开发**\n\n在这个多层应用程序的新世界中，开发者需要跟上通过万维网联盟 (W3C) 和 Java 社区进程 (JCP) 等组织提供的新兴技术和标准。行业正在发展，这是好事，但这也给应用程序开发者带来了压力，要求他们始终构建\n\
  \n5807ch01.qxd 1/3/06 4:47 PM 第 6 页\n\n**6**\n\n第 1 章 ■ JSF 基础：组件\n\n具有竞争力的多层应用程序。如果你看一个典型的多层软件解决方案——例如，服务于一家零售公司——它可能包括对多种代理的支持，如\
  \ Web 浏览器、移动设备和基于字符的视频终端（VT，例如 VT100）。\n\n图 1-1 展示了此类多层应用程序架构的简化示意图。\n\n**图 1-1.**\
  \ *服务于零售公司的典型多层软件解决方案的常见 J2EE 架构*\n\n在这种场景下，应用程序开发者被迫提供三个应用程序，而不是一个。这种架构包含一个用于 Web\
  \ 界面的应用程序，一个用于移动设备的应用程序，以及最后一个用于 Telnet 设备（例如 VT 终端或手持式基于字符的设备）的应用程序。这三个应用程序都使用自己的技术栈，对于管理员或应用程序开发者来说，这将是一场维护噩梦，并可能引发安全性和可扩展性问题。对于应用程序开发者来说，这一切都归结为一个问题：“为了成功地为我的项目构建一个完整的解决方案，我需要学习多少种技术？”\n\
  \n5807ch01.qxd 1/3/06 4:47 PM 第 7 页\n\n第 1 章 ■ JSF 基础：组件\n\n**7**\n\n**框架**\n\n\n\
  \n与十年前相比，如今客户对新的 Web 应用程序项目提出了更高且更具体的要求。他们需要更丰富、更友好的 Web 应用程序，这些程序需内置安全性、可访问性、国际化、可移植性等特性。多层应用程序必须成功交付所有这些功能，尽管额外的故障场景增加了复杂性，并且可扩展性和安全性要求也更高了。\n\
  \n构建应用程序日益增长的复杂性催生了对简洁性的需求。到目前为止，在 J2EE 领域，Web 应用程序还没有一个明确的技术选择。传统的应用程序编程接口（API），如\
  \ JSP 和 Servlet，并未真正提供足够的抽象来摆脱实现多层应用程序的底层繁重工作。为了满足这些需求并提供一定程度的简洁性，行业的发展方向是，开源社区和软件公司为应用程序开发者提供框架，以保护他们免受多层应用程序带来的复杂性影响。\n\
  \n**Tapestry、Struts、Tiles、TopLink、Hibernate、ADF UIX……**\n\n许多框架具有相同的基本思想，但在解决问题的方式上略有不同，并且作用于多层应用程序的不同层（视图层、控制器层和模型层）。框架的例子包括\
  \ Struts（一个开源控制器框架）；TopLink 和 Hibernate（模型框架）；以及 Tiles、Tapestry、XUL 和 ADF UIX（所谓的视图框架）。\n\
  \n应用程序框架的好处在于它们为开发者提供的模块化、可重用性和控制反转（IoC）。通过封装实现细节，框架增强了模块化，并通过集中设计和实现细节的影响来提高软件质量。得益于框架提供的稳定环境，它们还允许开发者创建可在新应用程序中重用的通用组件，从而增强了可重用性。这种框架组件的重用提高了应用程序开发者的生产力和应用软件的质量。通过利用\
  \ IoC，框架管理哪些特定于应用程序的方法被调用来响应用户事件。\n\n■**注意** IoC 意味着你已将代码的某些部分注册到框架中，当客户端请求时，框架将调用此代码。这也被称为*好莱坞原则*。（“别打电话给我们。我们会打给你。”）\n\
  \n在之前的零售软件场景中（参见图 1-1），框架可以帮助提高开发者的生产力和易于维护性，但这些框架彼此之间也不兼容，这使得集成难以处理。相比之下，JSF 是一个旨在解决不兼容性问题的标准框架。\n\
  \n5807ch01.qxd 1/3/06 4:47 PM 第 8 页\n\n**8**\n\n第 1 章 ■ JSF 的基础：组件\n\n**介绍 JSF**\n\
  \n简而言之，JSF 是一个用于 J2EE 应用程序的 UI 组件框架。在我们开始介绍 UI 组件（*UI 组件* 指的是应用程序开发者的构建块，而非框架本身的组件）之前，有必要详细说明为什么你还需要另一个框架。毕竟，JSF\
  \ 试图解决与上述 Apache Tapestry 或 Oracle ADF UIX 相同的问题，这些框架已经存在相当长一段时间，并且已被证明是成功的。\n\n\
  JSF 带来的、其他类似框架所没有的差异化优势，是标准规范（JSR-127）的支持。由于 JSF 是 J2EE 标准规范的一部分，因此市场上每个主要的 J2EE\
  \ 工具供应商（包括 Oracle、IBM、Borland 和 Sun）都优先支持它，这反过来将保证其广泛采用和良好的工具支持。\n\n大多数 Web 应用程序仍停留在\
  \ 1990 年代，那时太多精力投入在基础管道工程上，而不是高级组件上。基本上，当对标记语言缺乏抽象或没有抽象时，Web 应用程序的开发就会变得繁琐且难以维护。你可以投入大量时间，使用各种技术（如\
  \ applet、插件（Flex）、动态 HTML（DHTML）和 JavaScript）来使应用程序变得丰富和交互。这些技术结合使用，可以构建一个交互式且功能强大的\
  \ Web 应用程序，但你如何维护这样的应用程序？你如何重用已经构建好的内容？\n\n组件模型\n\nJSF 提供了一个一流的 J2EE 框架。JSF 旨在简化应用程序开发者的生活，使他们能够专注于视图，而无需了解底层的标记或脚本。他们将看到使用\
  \ JSF 的生产力提升，因为 UI 组件隐藏了将更丰富功能集成到 Web 应用程序中的大部分繁重工作。其目标是提供一种从一组可重用的 UI 组件构建 UI 的简便方法。\n\
  \n这些可重用组件具有不同的形状和功能，从布局组件（例如整个页面的布局）到简单的按钮。应用程序开发者可以使用这些组件来构建页面，并将 UI 组件相互嵌套以获得所需效果；例如，将文本字段和按钮嵌套在行布局组件中，将在客户端上以单行形式呈现嵌套的\
  \ UI 组件。这种嵌套组件的结构通常被称为*父子*关系，并可视化为 UI 组件层次结构。此 UI 组件层次结构在运行时表示一个 JSF 页面描述。\n\n导航模型\n\
  \nJSF 提供了一个声明式导航模型，允许应用程序开发者设置导航规则，以定义 Web 应用程序中从一个视图到另一个视图的导航。JSF 中的导航规则在 JSF 配置文件\
  \ `faces-config.xml` 中定义，并且是基于页面的。代码示例 1-1 显示了在 `faces-config.xml` 中配置的导航规则。\n\n\
  5807ch01.qxd 1/3/06 4:47 PM 第 9 页\n\n第 1 章 ■ JSF 的基础：组件\n\n**9**\n\n**代码示例 1-1.**\
  \ *在* faces-config.xml *中配置的导航规则*\n\n<navigation-rule>\n\n**<from-view-id>/login.jspx</from-view-id>**\n\
  \n<navigation-case>\n\n**<from-outcome>success</from-outcome>**\n\n**<to-view-id>/result.jspx</to-view-id>**\n\
  \n</navigation-case>\n\n</navigation-rule>\n\n在代码示例 1-1 中，设置了一个导航规则，使得从视图 `login.jspx`\
  \ 出发，在结果为 `success` 时，用户将被发送到名为 `result.jspx` 的页面。结果是应用程序中执行的操作（例如点击按钮）的返回值。在 JSF\
  \ 中，操作附加到 `UIComponent` 上，这允许对页面进行细粒度控制。这些操作可以有自己的导航规则，也可以共享相同的导航规则。\n\n应用程序生命周期\n\
  \n应用程序开发者在使用 JSF 时会发现的另一个好处是，该框架有助于跨服务器请求管理 UI 状态。无需处理用户选择并在页面之间传递这些选择，框架会为你处理这些。JSF\
  \ 框架在生命周期中还有内置流程，用于辅助验证、转换和模型更新。作为额外的好处，JSF 提供了一个简单的模型，用于将客户端生成的事件传递给服务器端应用程序代码。\n\
  \n**使用 JSF 进行应用程序开发**\n\n\n\nJSF 的一个关键差异化特性在于其架构设计独立于特定协议和标记语言，因此允许开发者将任意渲染技术附加到\
  \ JSF 应用程序中。在 JSF 中，**RenderKit** 负责通过向客户端渲染标记来呈现 JSF 应用程序。你可以为任何类型的标记（HTML、DHTML、Telnet/字符模式，以及最终的\
  \ SVG、Flash、XUL 等）定义 RenderKit，并用它来显示 JSF 页面。\n\n页面描述（UI 组件层次结构）与标记渲染之间的这种分离是一个关键差异化特性，它为组件开发者提供了灵活性，同时保护应用程序开发者免受渲染层变更的影响。应用程序开发者无需为了解决常见问题（例如不同浏览器之间的可移植性，如\
  \ Netscape 与 Internet Explorer 的对比）而学习和实现不同的渲染技术，而是可以使用自定义 JSF 组件，通过统一的编程模型——JSF\
  \ 和 Java——来构建针对不同浏览器、个人数字助理（PDA）等设备的应用程序。\n\n将这一关于 JSF 的新知识应用于图 1-1 中的先前示例（零售解决方案），其架构可能类似于图\
  \ 1-2。\n\n5807ch01.qxd 1/3/06 4:47 PM 第 10 页\n\n**10**\n\n第 1 章 ■ JSF 的基础：组件\n\n\
  **图 1-2.** *使用 JSF 的 J2EE 架构，适用于典型的面向零售公司的多层软件解决方案*\n\n在此架构中，只有一个应用程序通过三种不同的 RenderKit——超文本标记语言（HTML）、无线标记语言（WML）和\
  \ Telnet——服务于三种不同的代理。在实践中，该应用程序可能仍然包含三个不同的页面，但有一个主要区别：它们都将基于相同的技术——JSF 和 Java 构建。这将既节省开发时间，又减少维护成本。此外，或许最重要的是，JSF\
  \ 建立了标准，这些标准旨在被工具（例如 Oracle JDeveloper、Sun Studio Creator 以及 Exadel Studio 等 Eclipse\
  \ 插件）利用，从而为开发者提供 J2EE 开发者社区长期寻求的易用性。\n\n**JSF 架构**\n\n从宏观视角来看，JSF 实现了所谓的 Model 2\
  \ 模式，该模式基于 MVC 架构。如果你观察 Model 2 模式在 JSF 应用程序中是如何应用的，可以看到它由三个元素组成——视图、导航模型和应用程序逻辑，如图\
  \ 1-3 所示。\n\n5807ch01.qxd 1/3/06 4:47 PM 第 11 页\n\n第 1 章 ■ JSF 的基础：组件\n\n**11**\n\
  \n**图 1-3.** *使用 JSF 的 MVC 架构（Model 2）* 模型\n\n在 JSF 中，引入了托管 bean 的概念。托管 bean 是连接应用程序逻辑的粘合剂——即后端代码或后端\
  \ bean。托管 bean 在 `faces-config.xml` 文件中定义，并为应用程序开发者提供对所有映射后端 bean 方法的完全访问权限。这种 IoC\
  \ 概念已成功应用于 Spring、Hive-Mind 和 Oracle ADF 模型绑定（JSR-227）等框架中。托管 bean 设施负责创建后端 bean\
  \ 或其他 bean，例如数据访问对象（DAO）。在 JSF 中，后端 bean 是一个普通的旧 Java 对象（POJO），不依赖于特定实现的接口或类。前述的\
  \ JSF 控制器——`FacesServlet`——并不知晓已执行了哪个操作；它只知晓特定操作的结果，并将使用该结果来决定导航方向。在 JSF 中，是组件知晓在特定用户事件上调用哪个操作或方法。代码示例\
  \ 1-2 展示了在 `faces-config.xml` 文件中定义的托管 bean。\n\n**代码示例 1-2.** *在* faces-config.xml\
  \ *文件中定义的托管 Bean*\n\n<managed-bean>\n\n**<managed-bean-name>sample</managed-bean-name>**\n\
  \n**<managed-bean-class>**\n\n\n\n**com.apress.projsf.ch1.application.SampleBean**\n\
  \n**</managed-bean-class>**\n\n**<managed-bean-scope>session</managed-bean-scope>**\n\
  \n</managed-bean>\n\n5807ch01.qxd 1/3/06 4:47 PM 第 12 页\n\n**12**\n\n第 1 章 ■ JSF\
  \ 基础：组件\n\n代码示例 1-2 定义了一个名为 sample 的后台 bean，它指向一个名为 com.apress.projsf.ch1.applictaion.SampleBean\
  \ 的类。<managed-bean-scope>指示该 bean 的实例在创建后将被存储在哪里——请求、会话或应用程序作用域。该代码示例还提供了一个选项，可以将作用域设置为\
  \ none，用于不应存储在任何作用域中，而是在每次访问时实例化的 bean。表 1-2 列出了所有可用的作用域。\n\n**表 1-2.** *托管 Bean\
  \ 作用域*\n\n**托管 Bean 作用域**\n\n**描述**\n\n无\n\n每次方法调用时创建实例\n\n请求\n\n每次请求时创建实例\n\n会话\n\
  \n在初始请求时创建并存储在会话中\n\n应用程序\n\n在初始请求时创建并存储在 Web 应用程序中\n\n视图\n\nJSF 视图层描述了应用程序的预期布局、行为和渲染。\n\
  \nJSF 应用程序的基石之一是 UIComponent。UIComponent 是 JSF 视图层的基础，代表了应用程序的行为和结构。开发者可以通过将组件相互嵌套来构建应用程序。这种嵌套结构在运行时将表现为一个组件层次结构，如图\
  \ 1-4 所示，该层次结构进而代表了视图或 UI，这与开发基于 Swing 的应用程序非常相似。\n\n**图 1-4.** *从页面描述到 JSF 组件层次结构*\
  \ JSF 规范定义的默认页面描述是 JSP，但 JSF 规范中没有任何内容阻止实现者提供替代的页面描述，例如基于可扩展标记语言（XML）、基于 WML 或基于纯\
  \ HTML 的页面描述。使用 JSP 作为页面描述有其优点和缺点。从好的方面来看，它是一种众所周知且广泛使用的解决方案；因此，对于大多数 J2EE 开发者来说，学习如何使用\
  \ JSF 和 JSP 构建应用程序的学习曲线相当平缓。此外，\n\n5807ch01.qxd 1/3/06 4:47 PM 第 13 页\n\n第 1 章 ■\
  \ JSF 基础：组件\n\n**13**\n\n作为额外的好处，JSF 被广泛采用为新的 Web 应用程序的首选视图技术。其结果是 JSF 依赖于 JSP，因此它需要处理部分基于\
  \ JSP、部分基于 JSF 的应用程序的不同生命周期。在本章后面（请参考“JSF 与 JSP”一节），我们将介绍这些差异以及它们对使用 JSP 语法和 JSF\
  \ 组件构建的应用程序的影响。\n\n控制器\n\nJSF 附带了一个简单的控制器——FacesServlet。FacesServlet 充当看门人的角色，控制导航流程并将请求分派到适当的\
  \ JSF 页面。\n\n**基于组件的 UI 框架**\n\n我们已经为本书奠定了基础，现在是时候关注 JSF 与其他技术的区别所在了：UIComponent。JSF\
  \ 是一个基于组件的 UI 框架，其中的组件（如 HtmlDataTable 和 HtmlPanelGrid）可以被视为预制模块，允许应用程序开发者使用可重用组件高效地构建复杂的应用程序。它还允许应用程序开发者专注于应用程序逻辑，而不是自己构建动态/丰富的功能。\n\
  \n■**注意** JSF 的核心就是组件——而且是可重用的组件！JSF 最初于 2004 年 3 月发布，随后在 2004 年 8 月发布了小版本 1.1。最初的\
  \ JSR（JSR-127）已被 JSR-252 取代，后者提供了 JSF 1.2 版本。\n\n一个 JSF 组件由五个构建块组成：\n\n• *UIComponent*：UIComponent\
  \ 负责行为以及访问数据模型。\n\n\n\n• *渲染器*：渲染器负责为特定组件族生成发送至客户端的标记语言。\n• *渲染工具包*：这是一个采用通用渲染技术（例如\
  \ HTML）的渲染器库。\n• *渲染器特定组件子类*：渲染器特定组件子类是一个便捷类，用于表示渲染器特有的方面和属性。\n• *JSP 标签*：默认的页面描述语言是\
  \ JSP，因此 JSF 需要遵循 JSP 的约定，并提供代表每个 JSF 组件的 JSP 标签。\n\nJSF 通过将 UI 与底层数据模型严格分离，实现了应用逻辑与视觉呈现清晰分离的理念。渲染器负责生成发送至客户端的标记语言，而\
  \ UIComponent 负责行为逻辑及数据模型访问。图 1-5 展示了 UI、行为和数据模型之间的分离关系。\n\n5807ch01.qxd 1/3/06\
  \ 4:47 PM 第 14 页\n\n**14**\n\n第 1 章 ■ JSF 基础：组件\n\n**图 1-5.** *UI 与行为及数据模型的分离*\n\
  为了说明分离 UI 和数据模型的好处，我们来看一个常见 HTML 表单元素 `<select>` 的示例。该列表元素具有一个 `multiple` 属性，该属性可将行为从允许单选改为允许多选。这种模型没有将渲染和行为分离。对于应用开发者而言，要将元素行为从单选改为多选，只需进行微小调整——设置\
  \ `multiple` 属性即可。然而，这会对底层应用逻辑产生更大影响，因为从客户端传递的值现在将结构化为键值对列表，而不再是单个键值对。\n\nUISelectOne\
  \ 和 UISelectMany UI 组件是行为与外观清晰分离的典型示例。例如，UISelectOne 组件具有从多个可用选项中选择单个值的独特行为，而 UISelectMany\
  \ 组件则具有从可用选项列表中选择多个值的行为。UISelectOne 组件有三种渲染器类型：列表框、单选按钮和菜单。将外观从单选按钮改为菜单不会影响底层行为。\n\
  \n但是，如果应用开发者想将行为改为多选组件，则必须将整个 UISelectOne JSF 组件替换为 UISelectMany JSF 组件，而不能像直接使用\
  \ `<select>` 元素时那样，仅通过设置页面标记中的属性来实现。这种改变 JSF 组件行为与改变其外观之间的清晰分离，使应用开发者在修改页面定义时能更清楚地了解变更带来的影响。图\
  \ 1-6 展示了 UIComponent 及其三种不同外观的渲染器。\n\n图 1-6 展示了 JSF 规范中的一个组件——UISelectOne——它附带了三种不同的渲染器：列表框、菜单和单选按钮。在某些情况下，可能需要创建新的\
  \ UIComponent 或渲染器。\n\n应用逻辑\n\n客户端\n\n**图 1-6.** UISelectOne *及其渲染器*\n\n5807ch01.qxd\
  \ 1/3/06 4:47 PM 第 15 页\n\n第 1 章 ■ JSF 基础：组件\n\n**15**\n\n一个值得遵循的良好准则是：在启动组件项目之前，先在网络上搜索已有的组件。大多数情况下，你或许只需为现有组件编写一个新的渲染器即可，而且已有相当数量的组件可供使用。如果找不到所需的组件，那么就该自行构建了。要构建新组件，应确保它引入了新的行为、功能或定义，并且该组件具有独特的服务器端行为。如果组件已存在，而你只需要新的外观，那么你需要创建一个新的渲染器（例如，为了启用\
  \ Ajax 或增强现有输入组件）。\n\n\n现在让我们来看看构成 JSF 组件的各个部分。\n\n**UIComponent**\n\n所有 JSF 组件的基础是抽象的\
  \ UIComponent 和 UIComponentBase 类。UIComponent 类（javax.faces.component.UIComponent）定义了所有组件的行为协议和状态信息，而\
  \ UIComponentBase 类（javax.faces.component.UIComponentBase）是一个便捷子类，它实现了 UIComponent\
  \ 类的几乎所有方法。对 UIComponent 的简化描述是：它是一个带有属性、事件和监听器的常规 JavaBean。\n\nJSF 规范定义了一组标准的 UIComponent\
  \ 子类，或称为行为*超类*（例如 UISelectOne 和 UISelectMany），它们都继承自 UIComponentBase 类。在大多数情况下，组件编写者会扩展这些标准的\
  \ UIComponent 子类。\n\n不过，他们也可以直接继承 UIComponentBase 类。一个 JSF 组件由一个 UIComponent 和一个或多个渲染器组成。理解标准\
  \ UIComponent 子类仅定义非渲染器特定的行为（例如 UISelectOne）这一点非常重要。\n\n表 1-3 概述了可用的标准行为 UIComponent，并列出了它们相关的便捷子类、渲染器类型和\
