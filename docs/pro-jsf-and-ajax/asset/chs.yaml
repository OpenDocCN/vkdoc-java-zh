  \ *取值*\n\n**PhaseId 取值**\n\n**描述**\n\nPhaseId.ANY_PHASE\n\n如果组件作者未进行任何设置，此为默认值。事件将在其被排入队列的阶段进行传递。\n\
  \nPhaseId.APPLY_REQUEST_VALUES\n\n在“应用请求值”阶段结束时传递事件。\n\nPhaseId.PROCESS_VALIDATIONS\n\
  \n在“处理验证”阶段结束时传递事件。\n\nPhaseId.UPDATE_MODEL_VALUES\n\n在“更新模型值”阶段结束时传递事件。\n\nPhaseId.INVOKE_APPLICATION\n\
  \n在“调用应用程序”阶段结束时传递事件。\n\nPhaseId.RENDER_RESPONSE\n\n在“渲染响应”阶段结束时传递事件。\n\n在每个阶段结束时，`UIViewRoot`\
  \ 组件将遍历队列中的所有事件，首先处理 `phaseId` 设置为 `ANY_PHASE` 的事件，然后处理 `phaseId` 设置为该特定阶段的事件。\n\
  \n**广播事件**\n\n如前所述，在每个阶段结束时，`UIViewRoot` 组件将遍历已排入队列的事件列表，并将事件“广播”给为该特定事件注册的所有监听器。实际上，这意味着\
  \ `UIViewRoot` 将调用传递事件的 `UIComponent` 实例上的一个方法——`broadcast()`，如代码示例 3-4 所示。\n\n\
