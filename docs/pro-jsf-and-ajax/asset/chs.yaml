  \n在你持续探索富互联网组件框架的过程中，本章的重点现在转向了微软的解决方案。微软通过 DHTML 和 HTC 提供了与 Mozilla XUL 技术类似的方案。这些技术依赖于底层平台（即\
  \ Internet Explorer）来为扩展 HTML 元素提供基础。\n\n\n\n使用这些微软技术构建的应用程序可通过网络部署和下载。微软的 DHTML\
  \ 旨在提供一种简便的标记语言，用于构建富互联网应用程序。\n\n使用 DHTML 构建应用程序时，开发者将使用常规 HTML 页面来描述其 Web 应用程序，但能够动态更改\
  \ HTML 页面的渲染和内容。HTC 文件可以创建封装动态行为的可重用组件，其工作方式与 XUL 中的 XBL 类似。以下章节将为您概述微软的 DHTML 解决方案，并展示如何使用\
  \ HTC 构建可重用组件。\n\n**为何选择 HTC 而非 XAML？**\n\n不选择 XAML 有几个原因。原因之一是 XAML 需要 .NET 2.0/Avalon，该框架随微软的\
