  **114**\n\n第 3 章 ■ 定义 DECK 组件\n\n**图 3-4.** *显示事件和监听器实现所需所有类的类图*\n事件处理概述\n\n在您看到\
  \ Deck 组件的事件和监听器实现的代码之前，本节将涵盖有关 JSF 事件模型的一些主题。\n\n如果您有使用 Swing 工具包或 Oracle 的 ADF\
  \ Swing 框架开发应用程序的经验，您会注意到 JSF 实现的事件模型与之类似。实际上，JSF 基于 JavaBeans 规范 1.0.1 版中的命名约定，实现了一个用于事件通知和监听器注册的模型。这基本上意味着应用程序开发人员可以编写应用程序代码并将其注册以监听特定事件。`UIComponent`\
  \ 自身会传递事件（例如，当用户点击按钮时，这与其他 UI 工具包采用的方法类似）。应用程序开发人员会立即认识到这种模型的好处，因为它已被证明易于维护和开发。它允许应用程序开发人员为特定事件编写定义良好的代码块中的应用程序代码，就像\
  \ Microsoft Visual Basic 中使用的那样。\n\nSwing 框架和 JSF 之间的主要区别在于，Swing 在有状态模式下运行，并且始终监听客户端触发的事件；相比之下，JSF\
  \ 在无状态环境中工作。由于客户端和后端服务器之间没有永久连接，JSF 无法始终监听事件，必须依赖回传来获知客户端上可能导致事件传递的任何更改。HTTP 的这个限制\n\
  \n5807ch03.qxd 1/13/06 11:06 AM 第 115 页\n\n第 3 章 ■ 定义 DECK 组件\n\n**115**\n\n迫使 JSF\
  \ 实现一个严格的事件模型来处理客户端生成的事件，该模型基于第 1 章中描述的 JSF 请求处理生命周期。\n\n在回传期间，JSF 请求生命周期的所有六个阶段都会被调用（除非在某个地方调用了\
  \ `renderResponse()`，在这种情况下，生命周期将直接跳转到渲染响应阶段）。当执行恢复视图阶段时，它会恢复来自先前请求的任何可用状态。在应用请求值阶段（见图\
  \ 3-5），会建立来自请求参数的提交值并将其添加到每个输入组件，同时任何事件都会被排队。\n\n应用程序作用域\n\n***ART1***\n\n**生命周期**\n\
  \n**2\\. 应用**\n\n**请求**\n\n**execute()**\n\n**值**\n\nrender()\n\n**FacesServlet**\n\
  \n请求作用域\n\n**FacesContext**\n\n**UIViewRoot**\n\nrenderResponse()\n\n**HtmlForm**\n\
  \n**ProShowOneDeck**\n\n**ProShowItem**\n\n**ProShowItem**\n\n**ProShowItem**\n\n\
  **图 3-5.** *将请求中传递的新值应用于组件*\n默认情况下，在每个阶段结束时，适当的 `UIViewRoot` 生命周期管理方法（`processDecodes()`、`processValidators()`、`processUpdates()`\
  \ 和 `processApplication()`）将循环处理该阶段中排队的事件，并通知排队事件的组件上的任何已注册监听器（例如，`ProShowOneDeck`）。这些监听器中的应用程序逻辑也可以排队事件，并且\
  \ `UIViewRoot` 生命周期管理方法将继续循环处理排队的事件列表，直到列表为空，然后再继续下一个阶段。\n\n■**注意** 理解事件可以在以下任何请求生命周期阶段中排队和传递非常重要：应用请求值、处理验证、更新模型值和调用应用程序。\n\
  \n5807ch03.qxd 1/13/06 11:06 AM 第 116 页\n\n**116**\n\n第 3 章 ■ 定义 DECK 组件\n\n事件\n\
  \n应用程序开发人员可以使用事件实例来获知 UI 或底层模型的更改。JSF 规范定义了两种默认事件类型——`javax.faces.event.ActionEvent`\
  \ 和 `javax.faces.event.ValueChangeEvent`。`ActionEvent` 通常在用户激活 `UICommand` 组件时传递，而\
  \ `ValueChangeEvent` 表示任何 `UIInput` 组件中的值已更改。\n\n**FacesEvent 基类**\n\n`javax.faces.event.FacesEvent`\
  \ 类是 JSF 中可由 `UIComponent` 传递的 UI 和应用程序事件的抽象基类。`FacesEvent` 构造函数接受一个参数——`UIComponent`\
  \ 事件源实例，它标识了事件将从哪个组件广播给感兴趣的监听器。JSF 中的所有组件事件类——默认的或自定义的——都必须扩展 `FacesEvent` 类，才能得到请求处理生命周期的支持。`FacesEvent`\
  \ 扩展了 `java.util.EventObject`，后者是 Java 标准版中所有事件的基类。表 3-2 描述了 `FacesEvent` 基类的结构。\n\
  \n**表 3-2.** *FacesEvent 基类的方法摘要*\n\n**方法**\n\n**返回类型**\n\n**描述**\n\ngetComponent()\n\
  \njavax.faces.component.UIComponent\n\n返回传递此事件的源 UIComponent 实例\n\ngetPhaseId()\n\
  \njavax.faces.event.PhaseId\n\n返回此事件将在哪个阶段传递的标识符——phaseId\n\nsetPhaseId\n\nvoid\n\
  \n设置此事件将在哪个 PhaseId 期间传递\n\nisAppropriateListener()\n\nboolean\n\n检查此监听器是否为此事件支持的监听器实例\n\
  \nprocessListener()\n\nvoid\n\n将此事件广播给指定的监听器\n\nqueue()\n\nvoid\n\n便捷方法，将此事件排队，以便在当前请求处理生命周期阶段结束时广播\n\
