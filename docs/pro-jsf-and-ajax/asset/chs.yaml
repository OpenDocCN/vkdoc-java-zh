  \ JavaServer Faces 作为构建基于 Java 的 Web 应用的新标准登上互联网技术舞台以来，它便受到了 Java EE Web 开发社区的广泛关注。许多开发者兴奋地发现，他们可以使用标准的\
  \ JavaServer Faces HTML Basic RenderKit 来创建基于 HTML 的 Web 应用，就像过去使用 Apache Struts\
  \ 等其他技术一样。然而，这只是冰山一角——JavaServer Faces 的真正力量在于其可扩展的组件模型，它允许你远远超越那些初级的 HTML 起点。\n\
  \n基于近期对提升 Web 应用可用性需求的激增，当前最热门的话题无疑是富互联网应用（RIA），以及它们如何提供具有丰富界面和桌面应用交互能力的分布式、基于服务器的\
  \ Web 应用，这完全可以理解。尽管 RIA 前景广阔，但它们仍然存在兼容性、可移植性、可用性和可重用性方面的问题。许多 Web 应用开发者正努力跟上市场上不断涌现的新\
  \ RIA 框架，无论是开源的还是厂商专有的。我们需要一种标准的方式来定义 RIA，无论使用的是哪种 RIA 框架。\n\n关于开发和部署 RIA 最佳方式的争论不会因本书而终结，但纵观当今软件行业，越来越多的开发者正在使用\
  \ Web 来部署他们的应用。\n\n这些 Web 应用的用户界面通常使用 HTML、CSS、JavaScript 和 DOM 等技术构建。这些技术并非为企业级应用而设计，随着消费者对提供这些技术无法完全描述或支持的功能的应用施加越来越大的压力，开发者们正在寻找替代解决方案或扩展这些标准。\n\
