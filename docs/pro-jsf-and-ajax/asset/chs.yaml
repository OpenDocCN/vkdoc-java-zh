  \n*这里原本什么都没有。那是一个巨大的空间，里面有生物，它们在咆哮，我听到一个声音说“zuul”。它就在这里！*\n\n——达娜·巴雷特，《捉鬼敢死队》\n\n\
  **随**着 Web 应用变得越来越高级，它们在外观和体验上也越来越像桌面应用。随着互联网技术的飞速发展，我们很快将面临一种新型的互联网应用——单页面界面（SPIF）应用。这些\
  \ RIA 应用的行为类似于桌面应用，使得传统的页面流转成为过去。传统页面流转应用的一个例子是购物车。在 SPIF 应用中，用户在浏览在线商店时无需导航到新页面。SPIF\
  \ 应用的典型例子包括 Mozilla Amazon 浏览器（http://www.faser.net/mab/）和 OpenLaszlo 的 Amazon 商店（http://www.laszlosystems.com/lps/sample-apps/amazon/）\n\
  \n\n\namazon2.lzx?lzt=html）。两者都为用户提供了丰富、直观的用户界面，并且无需强制用户逐页导航。\n\n除非你是一位资深的 JavaScript\
  \ 或 Ajax 黑客，否则在选择 Ajax 构建 SPIF 应用程序之前，你应该三思。在上下文中，基于纯 Ajax 解决方案构建的 SPIF 应用程序无疑意味着更多的客户端代码。更多的客户端代码意味着浏览器端的工作量更大，这也意味着代码密集型的\
  \ SPIF 应用程序需要强大的处理器才能为用户提供所需的响应速度。尽管计算机已经变得更快，但过去 JavaScript 功能中的处理器问题并未完全消失——更不用说维护所有这些\
  \ JavaScript 代码绝非易事！\n\n如果你将 Ajax 提供的异步通信通道与功能丰富的客户端组件模型结合起来，那将非常完美。正如你在第 4 章中学到的，RIT、Mozilla\
  \ XUL 和 Microsoft HTC 为开发者提供了构建可重用组件的良好封闭环境。借助 JSF，可以提供一种结合 Ajax 和 XUL，或结合 Ajax\
  \ 和 HTC 的解决方案，从而使组件编写者能够两全其美，并为应用程序开发者提供一个轻量级且响应迅速的框架。\n\n本章将重点介绍如何使用 XUL，并展示如何利用\
  \ XUL 的可扩展性和声明式组件模型来增强你的 JSF 组件。你将为此前创建的 ProInputDate 和 ProShowOneDeck 组件提供一个新的\
  \ XUL RenderKit。\n\n**303**\n\n5807ch08.qxd 1/19/06 7:21 PM 第 304 页\n\n**304**\n\
  \n第 8 章 ■ 提供 Mozilla XUL 渲染器\n\n**Deck 和 Date 组件的 XUL 实现需求**\n\n本章中 ProInputDate\
  \ 和 ProShowOneDeck 组件的需求很简单——你需要利用 Mozilla GRE 提供的声明式组件模型。为了支持这一点，你需要为 deck 和 date\
  \ 组件提供特定于 XUL 的 Renderer 类。与第 6 章和第 7 章创建的 deck 和 date 组件所提供的功能相比，支持此客户端特定组件模型不应有任何功能损失。\n\
  \n**Mozilla XUL 为 JSF 带来的优势**\n\n由于 XUL 组件是 Mozilla GRE 的一部分，因此在将标记发送到客户端之前，无需在服务器端将\
  \ JSF 页面结构“展开”为适当的标记。这反过来将减少网络负载，因为渲染由客户端负责，而不是由实际的服务器实现负责。\n\nXUL 的另一个伟大特性是其可扩展性，它提供了一种声明式的方式来创建新组件和扩展现有的\
  \ XUL 组件。为了实现这一特性，XUL 使用了 XBL。你可以使用 CSS 选择器将这些行为化的 XBL 组件附加到标记上。\n\n当然，XUL 提供了开箱即用的丰富客户端交互性，而无需强制组件作者在诸如\
  \ JavaScript 之类的替代方案中实现这一点。\n\n我们将展示如何将 Ajax 异步通信通道——XMLHttpRequest——与 XUL 提供的高度交互式组件结合起来，基于\
  \ JSF 标准设计可重用且极具交互性的组件。\n\n**JSF 为 XUL 带来的优势**\n\nJSF 为 XUL 带来的一个要素是通用的编程模型——JSP\
  \ 和 Java。你可能会争辩说，对 XUL 感兴趣的开发者可以直接使用 XUL，但我们在此要指出的是，JSF 不仅提供了熟悉的编程模型（至少对大多数 J2EE\
  \ 开发者而言），还提供了一个服务器端组件模型，该模型隐藏了 XUL 的细节，而应用程序开发者无需知道或需要了解这些实现细节。\n\nJSF 带来的另一个要素是标准的请求生命周期，包括自动状态保存和状态恢复、验证、数据模型和事件处理。\n\
  \n**Deck 和 Date 组件的 XUL 实现**\n\n\n使用诸如 XUL 这类组件模型配合标准 JSF 组件的一个显著优势在于，它提供了一套 HTML\
  \ 所不具备的 UI 控件，例如菜单、工具栏、弹出窗口和树形控件。这意味着组件编写者无需使用传统的浏览器技术来“创建”这些控件，而这并非一项简单的任务。这些 XUL\
  \ 控件可通过 Mozilla GRE 获得，因此它们具有无需下载组件即可在浏览器中绘制应用程序的优势。您还可以使用 XUL 设计自己的\n\n![图 68](img/index-330_1.png)\n\
  \n5807ch08.qxd 1/19/06 7:21 PM 第 305 页\n\n第 8 章 ■ 提供 Mozilla XUL 渲染器\n\n**305**\n\
  \n组件；浏览器会在首次请求时下载这些组件，并将其缓存在浏览器中。\n\n以下是本章涉及的主要技术：XUL、XBL、Ajax、Dojo Toolkit、D2 和\
  \ Mabon。虽然这份技术列表相当广泛，但我们在前面的章节中已经介绍了其中的大部分技术；此外，在本章中，它们将更多地扮演辅助角色，类似于 weblets（在第\
  \ 5 章中介绍过）。学完本章后，您应该能够使用 Mozilla XUL 和 XBL 技术创建丰富的用户界面组件。\n\n图 8-1 展示了您将在本章中创建的九个类。\n\
