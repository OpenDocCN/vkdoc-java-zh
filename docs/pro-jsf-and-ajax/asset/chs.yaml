  \ `Map`。在 JavaScript 函数中，你将代表 `UIShowOne` 组件的隐藏输入表单字段的值设置为所选 `UIShowItem` 组件的 ID。因此，通过使用\
  \ `UIShowOne` 组件的 `clientId`，你可以检索请求中传递的隐藏输入表单字段中存储的值——`String newShowItemId = (String)requestParams.get(clientId)`。该值代表在渲染响应阶段要展开的\
  \ `UIShowItem` 组件的新标识符。\n\n需求规定，应用开发者应该能够向页面添加任意数量的 `UIShowOneDeck` 组件。潜在情况下，应用开发者可以在一个页面中拥有任意数量的包含\
  \ `UIShowOneDeck` 组件的表单，或者在同一个表单中拥有多个 `UIShowOneDeck` 组件。当你将第二个 deck 放入一个表单并点击其中一个项目标题时，第一个\
  \ `UIShowOneDeck` 将没有隐藏字段；因此，`newShowItemId` 将包含 `null`，并且根据需要会跳过 `newShowItemId\
  \ != null` 的代码路径。当任何其他组件导致同一表单提交时，你会得到 `\"\"`（一个空字符串），并且通过额外的非空字符串检查 `(newShowItemId.length()\
  \ > 0)`，即使在单个表单中也能正常工作。如果该值为 `null` 或空字符串 `\"\"`，则不会执行任何操作。\n\n通过这个控制，你将新 ID——`newShowItemId`——与存储在\
  \ `showItemId` 属性中的值进行比较；如果匹配，则用户点击了已经展开的同一项目，除了返回之外你无需做任何事。如果请求中传递的值是一个新 ID，则将\
  \ `UIShowOne` 组件上的 `showItemId` 属性设置为这个新值，以存储当前打开的 `UIShowItem` 组件。设置新标识符后，你创建一个新的\
  \ `ShowEvent` 事件实例，传递 `UIShowOne` 组件实例、旧的 `UIShowItem` ID 和新的 `UIShowItem` ID。最后，你将\
  \ `ShowEvent` 事件实例排队，以便在调用应用阶段稍后处理。如果应用开发者使用了 `ShowListener`，他们将能够基于此用户操作调用一些应用逻辑。\n\
