  \n什么是 Mabon？\n\n\n\nMabon 是一个托管于 http://mabon.dev.java.net 网站的开源项目。Mabon 提供了一种便捷的方式来接入一个专门设计的生命周期，该生命周期非常适合那些需要直接从后台\
