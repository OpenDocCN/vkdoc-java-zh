  \n**410**\n\n第 10 章 ■ 动态切换 RenderKit\n\n/**\n\n* DynamicRenderKitViewHandler 为 faces-config.xml\
  \ 中的\n\n* <default-render-kit-id> 元素提供 EL 支持。\n\n*/\n\npublic class DynamicRenderKitViewHandler\
  \ extends ViewHandlerWrapper\n\n{\n\npublic DynamicRenderKitViewHandler(\n\nViewHandler\
  \ handler)\n\n{\n\nsuper(handler);\n\n}\n\npublic String calculateRenderKitId(\n\
  \nFacesContext context)\n\n{\n\n**String renderKitId = super.calculateRenderKitId(context);**\
  \ **Matcher matcher = _DYNAMIC_RENDER_KIT_ID.matcher(renderKitId);** if (matcher.matches())\n\
  \n{\n\nString expression = matcher.group(1);\n\nApplication application = context.getApplication();\n\
  \n**ValueBinding binding = application.createValueBinding(expression);** if (binding.getType(context)\
  \ == String.class)\n\n**renderKitId = (String)binding.getValue(context);**\n\n}\n\
  \n// 返回计算出的或动态的 RenderKit ID\n\n**return renderKitId;**\n\n}\n\n// 匹配形如 \"#{...}\"\
  \ 的 RenderKit 标识符\n\nstatic private final Pattern _DYNAMIC_RENDER_KIT_ID =\n\nPattern.compile(\"\
  (\\\\Q#{\\\\E[^\\\\}]+\\\\Q}\\\\E)\");\n\n}\n\n\n\nDynamicRenderKitViewHandler 仅重写了一个方法：calculateRenderKitId()，该方法用于计算当前请求应使用的\
  \ RenderKit 标识符。首先，通过调用父类方法计算 RenderKit 标识符。然后，检测该标识符是否为一个可用于评估动态 RenderKit 标识符的表达式。如果它符合类似\
  \ EL 的语法，则使用该表达式创建一个 ValueBinding，该绑定返回代表当前请求 renderKitId 的值。实际上，这将通过遵循 ApplicationBean\
  \ 中的动态 RenderKit 选择逻辑，为访问应用程序的浏览器选择正确的 RenderKit。\n\n5807ch10.qxd 1/19/06 6:16 PM\
  \ 第 411 页\n\n第 10 章 ■ 动态切换 RenderKit\n\n**411**\n\n**注册动态 RenderKit 解决方案**\n\n你需要将\
  \ DynamicRenderKitViewHandler 和受管 Bean ApplicationBean 注册到组件库中，以便动态切换能够正常工作（参见代码示例\
  \ 10-7）。\n\n**代码示例 10-7.** *注册动态* RenderKit *实现*\n\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\" ?>\n\n<!DOCTYPE faces-config\n\nPUBLIC \"-//Sun Microsystems, Inc.//DTD\
  \ JavaServer Faces Config 1.1//EN\"\n\n\"http://java.sun.com/dtd/web-facesconfig_1_1.dtd\"\
  >\n\n<faces-config >\n\n<factory>\n\n...\n\n</factory>\n\n<application>\n\n**<view-handler>**\n\
  \n**com.apress.projsf.ch10.application.DynamicRenderKitViewHandler**\n\n**</view-handler>**\n\
  \n</application>\n\n<managed-bean>\n\n<managed-bean-name>projsf</managed-bean-name>\n\
  \n<managed-bean-class>\n\n**com.apress.projsf.ch10.application.ApplicationBean**\n\
  \n</managed-bean-class>\n\n**<managed-bean-scope>application</managed-bean-scope>**\n\
  \n</managed-bean>\n\n...\n\n<faces-config>\n\n首先，将 <view-handler> 设置为指向自定义的 ViewHandler——DynamicRenderKitViewHandler。然后，以大多数应用程序开发者定义自己受管\
  \ Bean 的相同方式定义 ApplicationBean。请注意，你将受管 Bean 设置为应用程序作用域，这样所有 Web 应用程序将只有一个实例。\n\n\
  至此，你已经到达本章的结尾——也是本书的结尾。现在，你应该能够在运行时动态切换 RenderKit。这种切换 RenderKit 的解决方案并非专属于本书创建的组件；任何组件库都可以使用相同的技术配合多个\
