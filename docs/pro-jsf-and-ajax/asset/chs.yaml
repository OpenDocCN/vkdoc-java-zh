  \ 属性**\n\n前面提到的方法——`encodeChildren()`——依赖于一个名为`rendersChildren`的只读`UIComponent`属性。如果组件有渲染器，则组件委托给渲染器来确定`rendersChildren`是否为`true`。如果渲染器需要访问其子组件以正确地向客户端渲染输出，则渲染器对`rendersChildren`返回`true`。JSF\
  \ 标准中的一个例子是`h:dataTable`，其中需要预先知道列子组件的数量才能正确渲染 HTML 标记。\n\n如果`rendersChildren`为`true`，则渲染器控制其整个组件子树的渲染。\n\
  \n这意味着当 JSP 引擎执行一个管理组件的标签且该组件的`rendersChildren`设置为`true`时，它不会继续遍历组件层次结构并请求每个组件进行渲染，而是必须先创建组件层次结构，以便子组件层次结构可供父组件及其渲染器使用。\n\
