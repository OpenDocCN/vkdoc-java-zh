  \ 标签内的各个组件标签必须定位其已存在于组件层次结构中的对应组件。这发生在 JSP 页面执行期间，通过向上遍历标签树以找到最近的封闭父组件标签。从父组件标签，子组件标签可以通过组件标识符或\
  \ facet 名称找到其对应的组件（参见“Facets”一节）。\n\n5807ch01.qxd 1/3/06 4:47 PM 第 45 页\n\n第 1 章\
  \ ■ JSF 的基础：组件\n\n**45**\n\n\n\n除了将组件映射到组件标签而非创建新的组件实例外，处理过程与初始请求相同——将组件渲染到`<f:view>`主体内容缓冲区，将状态存储在客户端或服务器端的会话中，最后将缓冲的标记刷新到父级\
  \ JSP 容器进行渲染（参见图 1-15）。\n\nJSF 与 JSP\n\n在 JSF 中，组件编写者可以在组件上设置一个名为`rendersChildren`的布尔属性。该属性决定组件是否应渲染其子组件。对于\
  \ JSF 实现中的组件，`rendersChildren`的值设置为`false`。这意味着每个组件负责将正确的输出渲染到`ResponseWriter`并在`<f:view>`中缓冲，而不关心其子组件如何渲染。如果组件上的`rendersChildren`设置为`true`，则`encodeBegin()`方法将在结束标签中调用，而不是在开始标签中调用（参见图\
  \ 1-14），以确保在父组件完成对其子组件的循环之前，没有子组件被渲染到缓冲区。一旦父组件了解其子组件，它们将被渲染到`<f:view>`主体内容缓冲区。使用此特性的一个组件是`dataTable`组件，因为它需要在生成任何渲染输出之前访问其所有子组件。\n\
  \n考虑到某些组件可能要求将`rendersChildren`设置为`true`，这将影响你构建页面描述的方式。还记得登录页面吗？让我们为输入字段添加一些标签，并调整布局，使组件垂直对齐而不是水平对齐，如代码示例\
