  \ Ajax 和两个开源框架——Delta DOM (D2) 和 Dojo 工具包：\n\n*Ajax*：Ajax 是一个新术语，描述了一种 Web 开发技术，它使用已有的技术套件——DOM、JavaScript\
  \ 和 XMLHttpRequest——来创建更丰富、更友好的 Web 应用程序。\n\n*D2*：D2（发音为 *D-squared*）是一个托管在 Java.net（http://d2.dev.java.net/）上的开源项目。Delta\
  \ DOM 在将 DOM 差异合并到 DOM 树中时非常有用。\n\n*Dojo 工具包*：Dojo 是一个由 Alex Russel（http://www.dojotoolkit.org）用\
