  \ 和 RenderResponsePhase。MabonLifecycle 负责执行这三个阶段。此外，它还负责处理任何附加到 MabonLifecycle 上的\
  \ PhaseListener。\n\n**LifecyclePhase 类**\n\nMabon LifecyclePhase 是所有生命周期阶段的基类。\n\
  \n**ApplyRequestValuesPhase、InvokeApplicationPhase 和 RenderResponsePhase 类**\n\n\
  由于您只是获取数据，而不以任何方式修改组件层次结构或底层模型，因此您不需要包含 Restore View、Process Validations 和 Update\
  \ Model 阶段。Mabon 的阶段执行与默认生命周期等效阶段类似的操作，例如解码传入请求、调用应用程序逻辑和渲染响应。稍后我们将更详细地介绍这三个阶段。\n\
  \n**FacesLifecycleServlet 类**\n\n这是一个可重用的 Servlet，它将在其第一个请求中初始化 `FacesContextFactory`\
  \ 并查找 `MabonLifecycle`。它将创建 `FacesContext`，然后调用属于 `MabonLifecycle` 的三个生命周期阶段。Web\
  \ 应用程序定义的 Servlet 映射将把 Mabon 请求定向到此 `FacesLifecycleServlet`。\n\n5807ch07.qxd 1/19/06\
