  ```\n\n组件系列和渲染器类型与第 3 章中为常规 HTML 版本的 `ProShowOneDeck` 组件定义的相同。这允许您重用第 3 章中定义的 `ProShowOneDeckTag`\
  \ 处理器和 TLD。\n\n**步骤 8：创建 RenderKit 和 ResponseWriter**\n\n如前所述，希望在 JSF 应用程序中包含 Ajax\
  \ 支持的开发者有多种策略可供选择。我们在本章中决定采用的策略——D2R——不仅仅需要一个新的渲染器来提供 Ajax 功能。正如在“提供文件上传功能”一节中所讨论的，您需要控制输出到客户端的内容，以便在初始请求或常规表单回发时，以\
  \ `contentType` 设置为 `text/html` 的方式写出请求的文档，并在任何后续的 Ajax 回发时，以 `contentType` 设置为\
  \ `text/plain` 的方式进行响应。\n\n写入客户端的标记由 `ResponseWriter` 控制，而 `ResponseWriter` 又由 `RenderKit`\
  \ 创建。JSF 实现提供的默认 `RenderKit` 是标准的 HTML `RenderKit`，它附带一个默认的 `ResponseWriter`，仅支持\
  \ `text/html` 类型的内容。为了能够支持您的 Ajax 渲染器所需的 `text/plain` 内容类型，您必须使用一个功能来装饰默认的 `ResponseWriter`，以便在\
  \ Ajax 请求的情况下修正 `contentType`——即 `FixedContentTypeResponseWriter`。使用这个新的 `ResponseWriter`，您还必须提供一个自定义的\
  \ `RenderKit`——`HtmlAjaxRenderKit`——它可以动态地选择默认的 `ResponseWriter` 或自定义的 `FixedContentTypeResponseWriter`。图\
  \ 6-5 展示了如何创建正确的 `ResponseWriter`。\n\n**图 6-5.** *创建正确的* ResponseWriter\n这就够了吗？不，创建您自己的\
  \ `RenderKit` 时的一个问题是，应用程序开发者每个 Web 应用程序只允许设置一个默认的 `RenderKit`。因此，除非您想重新实现所有标准的\
  \ HTML `RenderKit` 渲染器（或者更糟，重新实现应用程序开发者可能使用的每个组件库），否则您必须找到一种方法，从您的自定义 `RenderKit`\
  \ 提供对 `HTML_BASIC` 渲染器的访问。这也是大多数组件作者避免创建新的 `RenderKit` 而默认使用标准 HTML `RenderKit`\
  \ 的原因之一。但是，为了实现此策略，您需要一个能够处理 `text/plain` 的新 `ResponseWriter`，因此您也需要一个新的 `RenderKit`。\n\
  \n您需要一种方法，将您的自定义 `RenderKit` 包装在标准 HTML `RenderKit` 周围，以避免实现应用程序开发者可能使用的所有渲染器。\n\
  \n**注册要包装的 RenderKit**\n\n每个 JSF 应用程序都必须有一个默认的 `RenderKit`，这意味着您需要想出一种注册您的 `RenderKit`\
  \ 的方法，以便您可以在应用程序启动时识别要包装哪个 `RenderKit`。\n\n代码示例 6-8 提供了一个示例，展示了您将用于注册您的 `RenderKit`（`your.render.kit.id`）和您将要包装的\
  \ `RenderKit` 的标识符（`[wrapped.render.kit.id]`）的语法。\n\n**代码示例 6-8.** *替代的* RenderKit\
  \ *注册*\n\n```xml\n<render-kit>\n    **<render-kit-id>your.render.kit.id[wrapped.render.kit.id]</render-kit-id>**\n\
  \    <render-kit-class>your.render.kit.Class</render-kit-class>\n    <renderer>\n\
  \        ...\n    </renderer>\n</render-kit>\n```\n\n图 6-6 展示了 `ExtendedRenderKitFactory`\
  \ 如何包装标准 HTML `RenderKit`。`RenderKitFactory` 负责根据此 JSF Web 应用程序的 `RenderKit` ID\
  \ 返回一个 `RenderKit` 实例。\n\n**图 6-6.** *扩展* RenderKitFactory *并包装标准 HTML* RenderKit\n\
  现在，当您有一种方法可以识别涉及哪些 `RenderKit` 时，您需要用过滤功能来装饰默认的 `RenderKitFactory` 类，以处理与您的语法匹配的\
  \ `RenderKit` ID。任何在 `faces-config.xml` 中定义但与您的语法不匹配的 `RenderKit` ID 都将被委托给标准的 `RenderKitFactory`。如果\
  \ `RenderKit` ID 与您的语法匹配——`your.render.kit.id[wrapped.render.kit.id]`——您就将由实现的第一部分（`your.render.kit.id`）定义的\
  \ `RenderKit` 包装在由方括号（`[wrapped.render.kit.id]`）内定义的 `RenderKit` 周围。\n\n**ExtendedRenderKitFactory\
  \ 类**\n\n\n\n为确保您的解决方案与应用程序开发者所使用的 JSF 实现无关，您需要为应用程序开发者以及组件作者提供通用 API。为此，我们决定提供一个`RenderKitFactoryWrapper`，它扩展了\
  \ JSF 实现的抽象`RenderKitFactory`类，使您能够与底层 JSF 实现实现松散耦合。\n\n在图 6-7 中，您可以看到 JSF 实现提供的默认`RenderKitFactory`、您的`RenderKitFactoryWrapper`以及装饰类`ExtendedRenderKitFactory`之间的关系。`RenderKitFactoryWrapper`的唯一目的是通过委托给底层的`RenderKitFactory`实现，为您提供所需的与底层实现的松散耦合。\n\
  \n**图 6-7.** *DecoratingRenderKitFactory 的类图* `ExtendedRenderKitFactory`是您装饰 JSF\
  \ 实现提供的`RenderKitFactory`的类，其功能是将一个`RenderKit`包装在另一个`RenderKit`周围，前提是组件作者提供的`RenderKit`\
  \ ID 符合先前定义的语法——\n\n`your.render.kit.id[wrapped.render.kit.id]`，如代码示例 6-9 所示。\n\n\
  **代码示例 6-9.** *ExtendedRenderKitFactory 类* `package com.apress.projsf.ch6.render;`\n\
  \n`import java.util.regex.Matcher;`\n\n`import java.util.regex.Pattern;`\n\n`import\
  \ javax.faces.render.RenderKit;`\n\n`import javax.faces.render.RenderKitFactory;`\n\
  \n`/**`\n\n`* ExtendedRenderKitFactory 支持动态扩展`\n`* RenderKit，而无需重新注册基础 RenderKit\
  \ 中的所有渲染器。`\n`*`\n`* 必须使用以下语法来注册扩展的 RenderKit。`\n`*`\n`* <render-kit-id>extended-render-kit-id[base-render-kit-id]</render-kit-id>`\n\
  `*`\n`* 并且 RenderKit 实现类必须是 ExtendedRenderKit 类型。`\n`*/`\n\n`**public class ExtendedRenderKitFactory\
  \ extends RenderKitFactoryWrapper**`\n\n`{`\n\n`/**`\n`* 创建一个新的 ExtendedRenderKitFactory。`\n\
  `*`\n`* @param delegate RenderKitFactory 委托对象`\n`*/`\n\n`public ExtendedRenderKitFactory\
  \ (`\n\n`RenderKitFactory delegate)`\n\n`{`\n\n`**super(delegate);**`\n\n`}`\n\n\
  `/**`\n`* 向此 RenderKitFactory 添加一个新的 RenderKit。`\n`*`\n`* 如果 renderKitId 语法格式为`\n\
  `* extended-render-kit-id[base-render-kit-id]且 RenderKit 是`\n`* ExtendedRenderKit\
  \ 的实例，则使用 extended-render-kit-id`\n`* 注册 RenderKit，并使用 base-render-kit-id`\n`* 作为\
  \ ExtendedRenderKit 的基础 RenderKit。`\n`*`\n`* @param renderKitId RenderKit 标识符`\n\
  `* @param renderKit RenderKit 实现`\n`*/`\n\n`public void addRenderKit(`\n\n`String\
  \ renderKitId,`\n\n`RenderKit renderKit)`\n\n`{`\n\n`**Matcher matcher = _EXTENDED_RENDERKIT_ID.matcher(renderKitId);**`\
  \ `if (matcher.matches() &&`\n\n`renderKit instanceof ExtendedRenderKit)`\n\n`{`\n\
  \n`**renderKitId = matcher.group(1);**`\n\n`**String baseRenderKitId = matcher.group(2);**`\n\
  \n`**ExtendedRenderKit extension = (ExtendedRenderKit)renderKit;**` `**RenderKit\
  \ base = getRenderKit(null, baseRenderKitId);**` `**extension.setRenderKit(base);**`\n\
  \n`}`\n\n`![Image 44](img/index-268_1.png)`\n\n`**super.addRenderKit(renderKitId,\
  \ renderKit);**`\n\n`}`\n\n`static final private Pattern _EXTENDED_RENDERKIT_ID\
  \ =`\n\n`Pattern.compile(\"([^\\\\[]+)\\\\[([^\\\\]]+)\\\\]\");`\n\n`}`\n\n如果组件作者提供的语法与您为标识扩展`RenderKit`而定义的模式匹配，那么您将表示`RenderKit`\
  \ ID 的字符串分成两组。组 1 表示您将用于注册`RenderKit`的`RenderKit` ID，组 2 是基础`RenderKit`的 ID。如果`RenderKit`\
  \ ID 语法与用于定义扩展`RenderKit`的模式不匹配，则 ID 不会被修改，并且仍然会传递给被包装的`RenderKitFactory`来注册`RenderKit`——`super.addRenderKit(renderKitId,\
  \ renderKit)`。\n\n■**注意** 我们实现了一个仅包装一个`RenderKit`的解决方案，但这个装饰性的`RenderKitFactory`类理论上可以支持包装多个`RenderKit`。为简单起见，我们决定只包装一个`RenderKit`（例如，`HTML_BASIC`）。\n\
  \n### ExtendedRenderKit 类\n\n`ExtendedRenderKit`类提供了与`RenderKitFactoryWrapper`类相同的好处（即与底层\
  \ JSF 实现的`RenderKit`类松散耦合）。如前所述，`RenderKit`负责在请求时提供`ResponseWriter`，并且还代表一组`Renderer`实例，这些实例共同知道如何为特定的客户端用户代理渲染`UIComponent`实例。\n\
  \n在图 6-8 中，您可以看到默认的`RenderKit`类与`ExtendedRenderKit`以及代码示例 6-10 中显示的自定义`HtmlAjaxRenderKit`类之间的关系。\n\
  \n**图 6-8.** *HtmlAjaxRenderKit 的类图*\n\n**代码示例 6-10.** *ExtendedRenderKit 类* `package\
  \ com.apress.projsf.ch6.render;`\n\n`import java.io.OutputStream;`\n\n`import java.io.Writer;`\n\
  \n`import java.util.Map;`\n\n`import java.util.TreeMap;`\n\n`import javax.faces.context.ResponseStream;`\n\
  \n`import javax.faces.context.ResponseWriter;`\n\n`import javax.faces.render.RenderKit;`\n\
