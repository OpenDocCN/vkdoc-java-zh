  **图 10-4.** *ProShowOneDeck* 在多个客户端上运行，使用客户端特定的标记\n\n**总结**\n\n在本章中，我们向你展示了使用 JSF\
  \ 提供动态 RenderKit 切换是多么简单。通过采用组件驱动的设计，应用程序开发者可以为任何类型的用户代理构建应用程序，而不会受到底层客户端标记的影响。\n\
  \n在前面的章节中，我们演示了如何编写支持常规 HTML、Ajax、XUL 和 HTC 的 Renderer。一些组件编写者已经在关注更多的客户端技术，以便为应用程序开发者提供通用的编程模型，无论用户代理是什么。Oracle\
  \ ADF Faces 组件库就是一个很好的例子。它内置了对 HTML、RIA、基于字符的解决方案、即时通讯客户端（如 Gaim 和 Yahoo）、PDA 等的支持。MyFaces\
  \ 开源项目也提供了另一种替代 HTML 的 RenderKit——WML RenderKit。\n\n既然你已经知道如何使用 JSF 创建可重用的富互联网组件以及如何使用多个\
  \ RenderKit，我们希望你能运用本书中学到的技术，创建自己的自定义组件，并使用 JSF 构建 RIA。\n\n5807index.qxd 1/22/06\
