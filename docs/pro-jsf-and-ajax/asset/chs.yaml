  \n5807ch06.qxd 1/13/06 11:18 AM Page 230\n\n**230**\n\n第 6 章 ■ 为 Deck 组件启用 Ajax\n\
  \n如你所见，代码与最初的 JSF 实现（参见第 3 章）相比没有太大区别，但当用户点击某个未展开的节点时，你将向服务器发送一个 `XMLHttpRequest`，而不是常规的表单回传。\n\
  \n请注意与常规表单提交的区别。这种 JSF 组件的实现将防止不必要地重新加载那些不应受用户展开 deck 组件节点操作影响的页面内容。它还消除了在展开新节点及其内容并折叠先前打开节点时页面的任何闪烁。\n\
  \n应用开发者启用 Ajax 的唯一步骤是设置正确的 `contentType`，在本例中为 `application/x-javaserver-faces`。你需要以不同于后续\
  \ Ajax 回传的方式处理初始请求，以便在初始请求中使用 `text/html` 作为 `contentType`，而在后续请求中使用 `text/plain`。通过像代码示例\
  \ 6-2 那样指定一个自定义的 `contentType`，你可以拦截它，并让 JSF 决定在响应中设置什么 `contentType`。请放心，我们稍后会讨论\
  \ `contentType` 及其对组件开发的影响。目前，你只需要了解这些。\n\n**FIREFOX 中的 DOM 突变支持**\n\n如果你是 Mozilla\
  \ Firefox 用户，并且当前使用的版本低于 Mozilla Firefox 1.5，那么在使用启用 Ajax 的 ShowOneDeck 组件时，可能会遇到一些闪烁现象。这是\
  \ Mozilla Firefox 浏览器实现中的一个 bug。更多信息，请参阅 https://bugzilla.mozilla.org/show_bug.cgi?id=238493。你可以从\
  \ http://www.mozilla.org/projects/firefox/ 下载更新版本的 Mozilla Firefox。\n\n**第 4 步：创建客户端特定的渲染器**\n\
  \n在你的 UIShowOne 组件解决方案中，大部分工作已经在第 3 章完成，因此你只需要扩展 `HtmlShowOneDeckRenderer`。由于本章没有引入任何新行为，你可以跳过蓝图中的第\
  \ 2 步和第 3 步，直接进入第 4 步——创建客户端特定的渲染器。\n\nAjax 与 JSF 架构\n\n在客户端-服务器环境（例如 JSF）中，存在多种架构可能性来提供\
  \ Ajax 支持。在所有情况下，Ajax 的一个部分会影响架构决策，那就是 Ajax 解决方案在处理 Ajax 响应时如何管理对 DOM 的更新。\n\n你必须在当前\
  \ HTML 文档和基于用户交互从服务器返回的内容之间应用更改，以便在不重新加载页面的情况下将更改应用到当前 HTML 文档。以下是两种可能的架构解决方案：\n\
  \n*部分页面渲染 (PPR)*：这是 Ajax 在 JSF 中的首次成功实现，目前被一个名为 ADF Faces 的组件库所使用。这种架构依赖于常规的表单提交。响应以片段形式包含有关更改所需内容的信息。然后，PPR\
  \ 处理器会确定将这些更改插入到何处。这种方法给应用开发者带来了负担，需要他们弄清楚哪些内容发生了变化（例如，应用开发者必须设置部分目标来定义哪些组件参与了这次部分更新）。在这种架构中，更新的单位是一个\
  \ `UIComponent` 子树，因此每个部分目标的 `UIComponent` 子树的标记都会被替换。PPR 还依赖 `iframes`（而不是 `XMLHttpRequest`）来提供异步通信，其好处是支持旧版本的浏览器。\n\
  \n*Delta DOM 渲染 (D2R)*：这种方法不会给应用开发者带来额外负担，更新的单位是增量数据（例如，元素节点上的属性）。D2R 模拟常规的 `form\
  \ POST`，并使用 `XMLHttpRequest` 对象向服务器发送表单数据集。服务器不会注意到这个 `POST` 与常规 `POST` 之间的任何区别，并将返回一个完整的页面响应。一个\
  \ Ajax 处理器将处理该响应，将其与当前 HTML 文档进行比较，然后将任何更改合并到 HTML 文档中。你可以通过两种方式实现 D2R——在客户端或服务器端。在客户端实现中，Ajax\
  \ 处理器将在客户端检测并应用 DOM 增量。在服务器端实现中，在 `ResponseWriter` 将标记写入客户端之前，标记会被缓存在服务器上。在后续回传时，在\
  \ `ResponseWriter` 将新标记写入客户端之前，服务器端实现会将缓存的版本与新的页面响应进行比较，并将差异作为增量数据发送到客户端，在那里 Ajax\
  \ 处理器会将其与 HTML 文档合并。\n\n**DOM 突变**\n\n\n\n使用 DR2 客户端实现时，依赖修改 DOM 的 Ajax 组件会丢失自上次表单\
  \ POST 以来所做的任何更改，但这些 DOM 更改在完整页面刷新时也会丢失。在应用请求值阶段，任何未由组件层次结构表示的额外信息都将被丢弃，当页面渲染时，客户端\
  \ Ajax 处理器会执行 DOM 差异比较，替换响应中与 DOM 不匹配的任何内容。这具有提供额外安全性的好处，并防止通过修改浏览器中的 DOM 表示来恶意篡改应用程序。\n\
  \n使用服务器端实现时，安全性仍然在 JSF 组件级别应用，但在这种情况下，恶意脚本不会作为响应的一部分在客户端被移除。这是因为服务器拥有攻击发生前的页面缓存版本，因此服务器不知道\
  \ DOM 被篡改。当合并缓存标记和新标记时，你只将增量数据发送回服务器，而不会隐式地“移除”客户端上的任何恶意代码。\n\n**选择 Ajax 架构**\n\n\
  尽管 PPR 为组件作者减少了工作量，并为应用程序开发者提供了一些控制，但本书将重点介绍 D2R 方法。在不深入比较客户端和服务器端 D2R 解决方案细节的情况下，两种实现是相似的。基本上，你需要计算初始\
  \ HTML 文档与目标 HTML 文档之间的差异。在页面提交之前，起点仅在客户端已知；提交之后，终点仅在服务器已知。因此，需要传输某些信息，以便将起点和终点都置于服务器端或都置于客户端。\n\
  \n我们决定使用客户端 D2R，因为它提供了最大的灵活性。此解决方案在客户端应用初始 HTML 文档与目标 HTML 文档之间的差异\n\n![Image 39](img/index-257_1.png)\n\
  \n5807ch06.qxd 1/13/06 11:18 AM Page 232\n\n**232**\n\n第 6 章 ■ 为 DECK 组件启用 AJAX\n\
  \n，并允许客户端 JavaScript 在客户端执行任何修改。\n\n如果其他组件不允许修改，那么可以通过记住先前渲染的内容，并将该内容用作下次提交的起点，将差异比较移至服务器端。\n\
  \n使用客户端 D2R 解决方案，你可以利用 `XMLHttpRequest` 对象的 `responseXML` 属性或 `responseText` 属性（见图\
  \ 6-3）。`responseText` 属性返回一个表示从服务器发送的文档的字符串。`responseXML` 属性返回一个表示文档的、正确的 XML DOM\
  \ 对象。它是一个完全可访问的 DOM，可以像操作 HTML 文档一样对其进行操作和遍历。\n\n**图 6-3.** *Ajax 回发实现的时序图*\n当用户点击一个设计为使用\
  \ Ajax 的组件（例如，提交按钮）时，常规的表单提交将被覆盖，并创建一个新的 `XMLHttpRequest` 对象实例。然后，你可以使用此 `XMLHttpRequest`\
  \ 对象打开一个到服务器的通道，并将编码后的数据作为 URL 表单编码流发送回服务器（HTTP POST）。\n\n由于 Web 服务器不会检测到你的 Ajax\
  \ 回发与常规回发之间的区别，因此这不会影响你的服务器端代码。\n\n你的实现是让改变状态的交互式 UIComponent 始终执行 `XMLHttpRequest`，并让\
  \ UICommand 组件在页面上存在文件上传时执行表单回发。\n\n5807ch06.qxd 1/13/06 11:18 AM Page 233\n\n第\
  \ 6 章 ■ 为 DECK 组件启用 AJAX\n\n**233**\n\n提供文件上传功能\n\n出于安全原因，开发者能够提供允许用户从客户端文件系统上传文件的实现的唯一标准方式是使用表单元素或\
  \ `form.submit()`。这意味着在 Ajax 中，文件上传需要使用 `form.submit()` 和一个隐藏的 `<iframe>`，而不是 `XMLHttpRequest`。通常，JSF\
  \ 的 `ResponseWriter` 会提供完整页面（HTML）响应，但接收 HTML 或 XHTML 的隐藏 `<iframe>` 也会接收 `<script>`\
  \ 元素。这些 `<script>` 元素会立即执行！同样重要的是要理解，这些 `<script>` 元素将在隐藏的 `<iframe>` 的上下文中执行，而不是在完整页面响应时通常执行的主页面中。\n\
  \n我们选择使用 `XMLHttpRequest` 对象上的 `responseText` 属性，其有效负载包含纯文本格式的 HTML 文档，这有一个积极的副作用：在存在文件上传的情况下，返回的文档不会作为\
  \ HTML 或 XHTML 执行。这也会阻止任何 `<script>` 元素在错误的上下文中执行。另一方面，这要求你处理这些 `<script>` 元素，以便脚本的预期行为在正确的上下文中执行，而不是在隐藏的\
  \ `<iframe>` 中。\n\n因此，如果你解决了之前提到的文件上传和 `<iframe>` 响应问题，你还有一件事要做。在初始请求中，你仍然期望内容类型是\
  \ `text/html`。使用刚刚概述的解决方案，你需要支持动态内容类型（例如，在初始请求或常规表单回发时，提供 `text/html`；在由你的 Ajax\
  \ 组件执行的任何后续请求时，提供 `text/plain`）。\n\n**使用 DOJO 工具包进行文件上传**\n\n不幸的是，提供的实现往往只涵盖了基本用法，而难以实现的部分则留给了消费应用程序开发者去解决。经过一些研究，我们发现\
  \ Dojo 工具包为大多数提到的 Ajax 不良副作用——后退按钮支持、书签和文件上传——提供了开箱即用的优秀解决方案。\n\nAjax 资源\n\n正如你现在所知，在任何\
  \ Web 应用程序中实现 Ajax 都意味着编写 JavaScript，这可能很可怕，尤其是在跨浏览器支持和可访问性方面。\n\n另一方面，借助 Ajax，开发者可以构建更具吸引力的\
  \ JavaScript 应用程序，例如 Google 地图，但通常这意味着需要在客户端编写更多代码来实现这种丰富性。作为组件作者，你可以自由选择任何方向，要么提供你自己的客户端\
  \ Ajax JavaScript，要么（正如我们推荐的）寻找已有的 Ajax JavaScript 库。有几个开源和商业 JavaScript 库可以帮助你处理核心的\
  \ JavaScript/Ajax 实现，让你专注于重要的部分——设计你的 JSF 组件。\n\n我们决定使用名为 Dojo 的开源 JavaScript 工具包来处理\
  \ `XMLHttpRequest` 传输机制，并使用 D2 开源项目来解析和合并源文档与目标文档。\n\n5807ch06.qxd 1/13/06 11:18\
  \ AM Page 234\n\n**234**\n\n第 6 章 ■ 为 DECK 组件启用 AJAX\n\n**介绍 DOJO 工具包**\n\n\n\n\
  Dojo 开源项目提供了一个现代化、功能强大、“符合 Web 特性”且易于使用的 DHTML 工具包。其部分工作包括平滑 DHTML 编程和用户体验中的许多尖锐问题。在\
  \ Google Maps 和 Google Suggest 等成功案例的推动下，Ajax 和 XMLHttpRequest 对象获得了大量关注。尽管备受瞩目，但应用开发者在解决\
  \ Ajax 带来的可用性问题时，仍需独自摸索。Dojo 开源项目提供了一个用 JavaScript 编写的 DHTML 工具包，旨在解决 DHTML 中长期存在的一些历史问题，这些问题曾阻碍了动态\
  \ Web 应用开发的广泛采用。\n\nDojo 工具包允许你在 Web 应用以及任何支持 JavaScript 的环境中构建动态功能。使用 Dojo 工具包，你可以让\
  \ Web 应用更易用、响应更迅速、功能更强大。该工具包的其他优点和特性还包括：提供底层 API 和兼容层，用于编写可移植的 JavaScript 并简化复杂脚本、事件系统、I/O\
  \ API 以及通用语言增强功能。\n\nDojo 工具包通过在一个仅提供包系统而几乎不包含其他功能的小型核心上分层添加功能，来提供所有这些特性。当你使用 Dojo\
  \ 工具包编写脚本时，可以根据需要包含尽可能少或尽可能多的可用 API。\n\n**介绍 D2 开源项目**\n\nD2 是一个托管在 d2.dev.java.net\
  \ 上的开源项目。D2 项目提供了“分层结构信息中的变更检测”研究项目（有关此项目的更多信息，请参见侧边栏）的一个实现。该研究项目专注于寻找一种最小成本的编辑脚本，用于将一个数据树转换为另一个数据树，并包含计算此类编辑脚本的高效算法。D2\
  \ 项目包含两个实现——一个客户端 JavaScript 实现和一个服务器端 Java 实现——它们都是基于这项研究构建的。这支持通过在客户端或服务器上执行算法，对任何由\
  \ JSF 渲染的 HTML DOM 进行增量转换。\n\n**分层结构信息中的变更检测¹**\n\n检测和表示数据变更对于主动数据库、数据仓库、视图维护以及版本和配置管理至关重要。以往变更管理方面的工作大多处理平面文件和关系型数据；而我们则专注于分层结构数据。由于在许多情况下，必须根据数据的旧版本和新版本计算变更，我们将分层变更检测问题定义为寻找一个“最小成本编辑脚本”的问题，该脚本将一个数据树转换为另一个数据树，并提出了计算此类编辑脚本的高效算法。我们的算法利用了一些关键领域特征，从而实现了比以往通用算法显著更好的性能。我们从分析和经验两方面研究了算法的性能，并描述了我们的技术在分层结构文档中的应用。\n\
  \n1. 来源：“分层结构信息中的变更检测”，作者：Sudarshan S. Chawathe、Anand Rajaraman、Hector Garcia-Molina\
  \ 和 Jennifer Widom；斯坦福大学计算机科学系。\n\n5807ch06.qxd 1/13/06 11:18 AM 第 235 页\n\n第 6\
  \ 章 ■ 使用 AJAX 启用 DECK 组件\n\n**235**\n\nd2.js 库还包含传递用户选择信息、提交表单以及处理来自服务器响应所需的函数。d2.js\
  \ 库反过来利用 Dojo 工具包内置的 Ajax 支持，使用 XMLHttpRequest 对象提交表单，而不是常规的表单 POST，如代码示例 6-3 所示。\n\
  \n**代码示例 6-3.** *来自* d2.js *库的摘录* var d2 = new Object();\n\n**d2.submit = function\
  \ (form, content)**\n\n{\n\nvar targetDocument = form.ownerDocument;\n\nvar contentType\
  \ = targetDocument.contentType;\n\n// IE 不支持 document.contentType\n\nif (contentType\
  \ == null)\n\ncontentType = 'text/html';\n\n**dojo.io.bind(**\n\n{\n\n**formNode:\
  \ form,**\n\n**headers: { 'X-D2-Content-Type': contentType },**\n\ncontent: content,\n\
  \n**mimetype: \"text/plain\",**\n\n**load: d2._loadtext,**\n\nerror: d2._error\n\
  \n});\n\n}\n\n代码示例 6-3 是 d2.js 库的一个摘录，展示了你将在 Ajax 实现中使用的 submit 函数。如你所见，d2.js 库引用了\
  \ dojo.io 包，该包为 XMLHttpRequest 和其他更复杂的传输机制提供了可移植代码。dojo.io 包的大部分魔力通过 bind() 方法展现出来。dojo.io.bind()\
  \ 方法是一个通用的异步请求 API，它封装了多个传输层（iframe 队列、XMLHttpRequest、mod_pubsub、LivePage 等）。\n\n\
  Dojo 会尝试为当前请求选择最佳可用的传输方式，默认情况下，由于没有集成其他传输方式，只会选择 XMLHttpRequest。\n\nd2.submit()\
  \ 函数调用 dojo.io.bind() 方法，传递关于要提交哪个表单、内容（将作为请求参数发送到服务器的名称/值对映射）、接受的请求头以及此请求的 MIME\
  \ 类型等信息。\n\nD2 库还定义了一个回调函数——d2._loadtext——用于从服务器获取响应数据。d2._loadtext 函数用响应返回文档中的\
  \ inner HTML 替换目标文档的 inner HTML。\n\n■**注意** D2 开源项目还提供了一个出色的工具，用于比较和合并两个 DOM 文档。\n\
