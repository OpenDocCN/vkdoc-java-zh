  text/html\"/>\n\n<f:view>\n\n...\n\n<h:form id=\"form\" >\n\n<pro:inputDate id=\"\
  dateField\"\n\ntitle=\"日期字段组件\"\n\nvalue=\"#{backingBean.date}\" >\n\n**<f:convertDateTime\
  \ pattern=\"d MMMMM yyyy\" />**\n\n**<pro:validateDate availability=\"#{backingBean.getAvailability}\"\
  \ />**\n\n</pro:inputDate>\n\n<br/>\n\n<h:message for=\"theDate\" />\n\n<br/>\n\n\
  **<h:commandButton value=\"提交\" />**\n\n</h:form>\n\n...\n\n</f:view>\n\n</jsp:root>\n\
  \n如你所见，JSF 页面的源码中没有 Ajax “代码”，这意味着应用开发者无需额外负担即可在页面中启用 Ajax 元素。我们之前说过，现在再说一遍——让应用开发者的工作变得简单！\n\
  \n此页面与第 2 章创建的页面唯一的不同是增加了一个验证器——`<pro:validateDate .. />`。该验证器将在常规回传期间使用，以将输入字段中输入的日期与后台\
  \ bean 中的可用信息进行比较。这个后台 bean 还将用于设置弹出日历中可选或不可选的日期。还记得第 2 章中的 `<f:convertDateTime\
  \ pattern=\"d MMMMM yyyy\" >` 转换器吗？这个转换器确保用户输入的任何内容都遵循一种你可以将其转换为服务器端 Date 对象的格式。\n\
  \n使用 Ajax 获取数据\n\n在第 6 章中，你已经熟悉了处理事件时常规回传与 Ajax 回传之间的区别。传统方式获取数据与使用 Ajax 获取数据有类似的区别，只是它不应有改变周围组件状态的副作用。\n\
  \n图 7-3 与第 6 章中的 Ajax 时序图（图 6-3）唯一的区别在于 HTTP 方法。W3C 建议，当用户请求没有副作用时（例如 Google Suggest），应使用\
  \ HTTP GET 方法获取数据。\n\n![图片 56](img/index-299_1.png)\n\n5807ch07.qxd 1/19/06 7:24\
  \ PM Page 274\n\n**274**\n\n第 7 章 ■ 使用 AJAX 增强日期字段组件\n\n**图 7-3.** *使用 HTTP* GET\
  \ *方法的* XMLHttpRequest *时序图* 不同的 JSF Ajax 方法\n\n如果没有副作用，那么 JSF 组件层次结构就不会发生变化；因此，无需经历\
  \ JSF 生命周期。但是，如果你想重用验证器引用的托管 bean，访问它的唯一途径是通过 JSF 的 MethodBinding 机制。有三种解决方案可以满足你的需求——向渲染器添加功能、使用\
  \ PhaseListener，以及提供一个新的 JSF 生命周期。\n\n**渲染器方法**\n\n\n\n这种方法为渲染器增加了检测 Ajax 请求的功能。JSF\
  \ 默认生命周期首先在恢复视图阶段恢复组件层次结构，而渲染器在应用请求值阶段接管控制。Ajax 请求处理完毕后，渲染器会在 `FacesContext` 上调用\
  \ `responseComplete()` 方法，以终止生命周期中剩余阶段的处理。表面上看，这似乎是首选方法，但它存在一些严重缺陷。\n\n需要组件层次结构，这会给每个请求带来额外开销，尤其是在使用客户端状态保存时。调用\
  \ `responseComplete()` 方法仅在该阶段处理完成后才会生效。应用请求值阶段会调用视图中所有渲染器的 `decode()` 方法，这可能导致你无法控制的意外副作用，例如应用程序开发者将\
  \ `commandButton` 设置为 `immediate=\"true\"`。这会导致在应用请求值阶段完成之前就调用应用程序逻辑。\n\n此外，这种方法通常需要\
  \ HTTP POST 将状态字符串发送回服务器。\n\n5807ch07.qxd 1/19/06 7:24 PM 第 275 页\n\n第 7 章 ■ 为日期字段组件启用\
  \ Ajax\n\n**275**\n\n**PhaseListener 方法**\n\n这种方法添加了一个 PhaseListener（`PhaseId.RESTORE_VIEW`），它会短路生命周期，并在\
  \ PhaseListener 自身内部完成所有处理。处理完成后，它会在 `FacesContext` 上调用 `responseComplete()` 方法。\n\
  \n要使这种方法生效，它必须在初始请求中渲染一个引用，该引用包含验证器所使用的受管 Bean 的信息。PhaseListener 在回传期间使用此信息创建一个\
  \ `MethodBinding`，然后可以调用验证器背后的逻辑并将数据返回给客户端。由于没有创建组件层次结构，因此也没有渲染器，所以不存在将 `immediate`\
  \ 设置为 `true` 的命令组件导致任何副作用的风险。\n\n但是，这种方法有一个问题：无法阻止应用程序开发者在同一阶段附加额外的 PhaseListener，这可能会导致意外的副作用。\n\
  \n此外，你无法知道这些 PhaseListener 的执行顺序。\n\n**Lifecycle 方法**\n\n这种方法添加了一个新的 Lifecycle，它映射到\
  \ Ajax 请求，仅包含处理请求所需的生命周期阶段，调用由 `MethodBinding` 定义的应用程序逻辑，并渲染响应。这消除了创建和恢复组件树的额外开销，因此也不需要渲染器。你也不会遇到\
  \ `immediate=\"true\"` 带来的任何问题。\n\n使用自定义 Lifecycle 的另一个积极副作用是，应用程序开发者添加的任何 PhaseListener\
  \ 都不会影响此解决方案；应用程序开发者甚至可以向这个自定义 Lifecycle 添加 PhaseListener。但是，如果使用自定义 PhaseListener\
  \ 将额外的受管 Bean 放入请求中，你可能会遇到问题，除非这些 PhaseListener 也注册到了自定义 Lifecycle 上。\n\n选择 JSF\
  \ Ajax 方法\n\n在本书中，我们决定采用 Lifecycle 方法，因为它没有应用程序逻辑副作用且开销较低。正是基于此，Mabon 开源项目可以帮助你专注于\
  \ Ajax 日历组件的设计。\n\n**相对变量的问题**\n\n定义 `MethodBinding` 的一种有效方法是在 `MethodBinding` 表达式中使用相对变量。这会对\
  \ PhaseListener 方法和 Lifecycle 方法都产生不利影响。要使数据获取与这两种方法配合使用，你需要在 `MethodBinding` 表达式中使用绝对变量（例如，`#{\
  \ backingBean.getValidDates}`）。\n\n使用相对变量的 `MethodBinding` 表达式的一个例子是 `UIData` 组件（例如\
  \ `<h:dataTable ...>`），它正在输出关于员工的信息。\n\n\n\n每个标记行代表一个 Employee 对象。对于每个 Employee\
  \ 对象，可以使用可用日期列表来验证所选日期。每个标记组件都有一个 EL 表达式，该表达式以父级 `<h:dataTable ...>` 定义的相对变量开头（例如\
  \ `var=\"row\"`），如代码示例 7-3 所示。\n\n5807ch07.qxd 1/19/06 7:24 PM 第 276 页\n\n**276**\n\
  \n第 7 章 ■ 使用 AJAX 增强日期字段组件\n\n**代码示例 7-3.** *数据绑定表组件*\n\n<h:dataTable var=\"row\"\
  \ value=\"#{managedBean.employeeList}\">\n\n<h:column>\n\n<pro:inputDate id=\"dateField\"\
  \n\ntitle=\"日期字段组件\"\n\nvalue=\"#{row.date}\" >\n\n<pro:validateDate availability=\"\
  #{row.getValidDates}\" />\n\n</pro:inputDate>\n\n</h:column>\n\n`var` 属性定义了一个相对变量\
  \ `row`，每个标记组件都使用该变量来检索每行的唯一数据。只要在回传期间能够访问组件层次结构，这种方法就能正常工作。在客户端，每行的表达式看起来都一样，因此任何依赖此表达式来调用底层托管\
  \ Bean 方法的客户端 Ajax 实现都无法正常工作。任何附加的托管 Bean 在常规回传期间都能正常工作，但使用 PhaseListener 或 Lifecycle\
  \ 方法的 Ajax 请求将无法定位到正确的数据行。因此，当使用相对变量设置时，依赖托管 Bean 提供数据（例如，获取特定员工的可用日期）的 Ajax 组件将无法正常工作。\n\
  \n**相对变量的可能解决方案**\n\n你可以尝试通过实现对 UIData 组件的支持来解决此问题，但无法保证父组件是 UIData 类型，因为组件作者完全可以在不继承\
  \ UIData 组件的情况下提供用于标记对象的组件。此类组件的示例包括 Oracle 的 ADF Faces 表格和 treeTable 组件。\n\n最好的解决方案是让\
  \ JSF 规范支持将相对表达式转换为绝对表达式。这样，组件编写者就可以在初始渲染期间将相对变量转换为绝对变量。渲染后的表达式可以采用以下形式：\n\n#{managedBean.employeeList[1].getValidDates}，表示这是标记集合中的第一行。\n\
  \n**第 4 步：创建转换器和验证器**\n\n如第 1 章所述，JSF 实现为任何类型的 UIComponent 提供了辅助类。这些辅助类分为转换器、验证器以及事件和监听器模型，每个类都有其专长领域。在本节中，你将构建自己的验证器，对强类型的\
  \ Date 对象执行验证，以确保所选日期确实可用（例如，不是周末或节假日）。\n\n代码示例 7-4 使用了你将设计的验证器。其目的是验证输入的值，并将其与标记为“不可用”的日期列表进行比较。提供给应用程序开发人员支持\
  \ Bean 的约定是返回一个布尔数组——`#{managedBean.getValidDates}`。该数组指示某个日期是否可用（true）或不可用（false）。支持\
  \ Bean 提供的这个数组也用于浏览器，以显示哪些日期可供选择。\n\n![图片 57](img/index-302_1.png)\n\n5807ch07.qxd\
  \ 1/19/06 7:24 PM 第 277 页\n\n第 7 章 ■ 使用 AJAX 增强日期字段组件\n\n**277**\n\n**代码示例 7-4.**\
  \ *带有附加日期验证器的 ProInputDate 组件*\n\n<pro:inputDate id=\"dateField\"\n\ntitle=\"日期字段组件\"\
  \n\nvalue=\"#{managedBean.date}\" >\n\n**<pro:validateDate availability=\"#{managedBean.getValidDates}\"\
  \ />**\n\n</pro:inputDate>\n\n图 7-4 显示了 DateValidator 类。\n\n**图 7-4.** *显示 DateValidator\
  \ 的类图* DateValidator 类\n\nDateValidator 类（见代码示例 7-5）根据应用程序开发人员定义的支持 Bean 中的某些规则，检查\
  \ Date 值是否可用。\n\n\n\n**代码示例 7-5.** *validate()* 方法  \npackage com.apress.projsf.ch7.validate;\n\
  \nimport java.util.Date;\n\nimport javax.faces.application.FacesMessage;\n\nimport\
  \ javax.faces.component.UIComponent;\n\nimport javax.faces.context.FacesContext;\n\
  \nimport javax.faces.el.MethodBinding;\n\nimport javax.faces.validator.Validator;\n\
