  \ XUL 元素集中添加“自定义”组件。在 XUL 中，开发者可以使用 CSS 更改外观和感觉，并可以附加皮肤，但他们无法在 XUL 本身中更改 XUL 元素的行为。\n\
  \n为此，开发者必须使用另一种语言——XBL。开发者可以将 XUL 视为附带一组基础组件的“实现”，或视为可用于构建用户界面的标签库，这与 JSF 参考实现非常相似。XBL\
