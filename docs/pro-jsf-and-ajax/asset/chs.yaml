  \ 章 ■ 使用富互联网技术\n\n**比较 XBL 和 HTC**\n\n到目前为止，我们了解到，尽管几种技术的实现方式完全不同，但它们提供了几乎相同的功能。如果你查看\
  \ XBL 和 HTC 的语义，会发现许多相似之处：\n\n• 两者都使用 CSS 将组件或行为附加到 HTML 元素上。\n• 两者都提供了组件内文档树的封装，不暴露内部实现细节。\n\
  • 两者都依赖于底层浏览器平台。\n\n关键区别如下：\n\n• XBL 基于 XML，而 HTC 基于 HTML。\n• 它们支持不同的平台——XBL 需要\
  \ Mozilla GRE，而 HTC 需要 Microsoft 的 Internet Explorer。\n\n如果你比较创建和使用组件所必需的部分，它们将分为以下几类——定义组件、实现事件处理、添加内容以及将组件附加到页面。\n\
  \n**定义组件**\n\n尽管两者相似，但它们定义组件的方式不同。在 HTC 中，规则是一个 HTC 文件对应一个组件，而在 XBL 中，建议将所有相关的自定义组件放在一个文件中。这影响了组件的定义方式。在\
  \ HTC 的情况下，开发者在 `<public:component tagName=\"welcome\" >` 上设置 `tagName` 属性，以指定该特定\
  \ HTC 组件的标签名称。\n\n在 XBL 文件中，绑定 ID 将标识要与特定元素一起使用的组件——`<binding id=\"welcome\" >`。然后，通过在\
  \ CSS 文件中使用锚点将元素与正确的 XBL 绑定/组件耦合起来，从而定义该元素。\n\n**添加内容**\n\n在 HTC 中，组件内容封装在 `<body>`\
  \ 元素中；在 XBL 中，内容封装在 `<content>` 元素中。\n\n**事件处理**\n\n这两种技术都支持 DOM，尽管同样存在一些细微差别。\n\
  \nXBL 支持 DOM Level 2（以及部分 Level 3），而 HTC 仅支持 DOM Level 1，因此仅支持事件冒泡和取消，不支持捕获或目标阶段。（这是因为在过去四年中没有发布新版本的\
  \ Internet Explorer。）\n\n■**注意** 当前版本的 Internet Explorer 是 6.0。Microsoft 目前正在开发其浏览器\
  \ Internet Explorer 的 7.0 版本，代号为 Rincon。当它最终上市时，距离上次发布已超过四年。\n\n5807ch04.qxd 1/13/06\
  \ 2:50 PM 第 207 页\n\n第 4 章 ■ 使用富互联网技术\n\n**207**\n\n如果你查看 HTC 和 XBL 中事件处理的方式，会发现一些更明显的区别：\n\
  \n• HTC 有三种不同的事件处理方法——开发者可以使用 `<public:attach>` 为组件声明一个全局事件处理器，使用 HTML 元素 `<script\
  \ for=\"proButton\" event=\"onclick\">` 定义一个函数并将其分配给特定元素和事件，最后声明一个事件处理函数并分配对该函数的调用（例如，`onclick=\"\
  proButton()\"`）。\n• XBL 有两种定义事件处理器的方式——一种是在元素上使用预定义的事件处理器，如 `onclick` 或 `onmouseover`，另一种是使用\
  \ `<handler>` 元素为组件全局定义事件处理器。要添加自定义方法，开发者可以使用 `<method>` 元素为组件定义自定义事件处理器。\n\n**附加组件**\n\
  \n两种技术都利用 CSS 将行为附加到元素上。使用 XBL 将组件附加到 HTML 页面时，开发者必须使用 `-moz-binding: url()` 属性；使用\
  \ HTC 时，他们必须使用 `behavior: url()` 属性。这两种方法看起来相似，但最终结果却大相径庭。在 XBL 中，样式类名（例如 `pro\\\
  :welcome`）将成为标签 `<pro:welcome>`，并在 DOM 树中被解释为一等元素，从而隐藏任何内部实现。\n\nHTC 则不同，因为 CSS\
  \ 方法用于将行为附加到已有的 HTML 元素上（例如，`H1 {behavior:url(projsf.htc)}`），这不会在 DOM 中声明一等元素，因此会暴露该组件的内部实现。要创建一等元素，开发者必须使用\
  \ `<?import namespace=\"pro\" implementation=\"pro.htc\" ?>` 元素和命名空间 `<html xmlns:pro\
  \ >` 来唯一标识导入的组件，并且如前所述，标签的名称在 HTC 文件中使用 `tagName` 属性声明。\n\n**JSF——有史以来最伟大的发明！**\n\
  \n在本章描述的技术中，只有 XUL 和 HTC 允许开发者在 Web 应用程序中重用组件。它们允许将 HTML、CSS 和脚本封装到组件中，供应用程序开发者重用。另一方面，Ajax\
  \ 提供了与服务器的异步通信，可用于为用户提供响应式 UI。\n\n这些技术解决了消费者的大部分需求，但它们仍然缺乏对应用程序开发者的支持。\n\n市场需要一种标准的方式来定义\
  \ RIA，使其能够部署在 Web 上而无需受限于特定供应商。一个名为 Web 超文本应用技术工作组（WHAT）的工作组正试图通过利用 Mozilla 的 XBL\
  \ 等技术，创建一套适用于所有浏览器的 HTML 扩展标准标签库来实现这一目标。像 Mozilla 的 XBL 这样的技术允许将 HTML、CSS 和脚本封装到组件中，供应用程序开发者重用，但这些并非标准。\n\
  \n5807ch04.qxd 1/13/06 2:50 PM 第 208 页\n\n**208**\n\n第 4 章 ■ 使用富互联网技术\n\n■**注意**\
  \ WHAT 工作组（http://www.whatwg.org/）正在解决对扩展标准 HTML 元素的合理且理性的开发环境的需求。这将通过一套技术规范来实现，这些规范可以在\
  \ Firefox、Mozilla 和 Internet Explorer 等 Web 浏览器中使用和实现。\n\n\n\n与此同时，开发者们正退回到最低公分母——HTML——并使用\
  \ Ajax 等技术来构建动态 Web 应用。这种开发 Web 应用的方法有一个严重缺陷——它缺乏良好的复用模型。目前，这种方法没有标准方式让开发者定义可复用且易于集成的\
  \ HTML 组件，这些组件需具备丰富的功能并能与现有服务器端逻辑协同工作。当前开发者使用 JSP 标签库来创建可访问服务器端逻辑的可复用 HTML 组件，但这仍然处于低级且繁琐的层面。\n\
  \n我们需要的是一个标准，它能够使用组件而非标记语言，以一种有效的模型封装这些 RIT（富互联网技术），让应用开发者能够使用预制功能块构建 Web 应用，而无需关心实现细节。预制功能块，即组件，允许应用开发者使用可复用组件构建复杂应用。这也让应用开发者能够专注于实际的应用结构，而非自行构建动态功能。\n\
  \nJSF 正是关于这类可复用组件的！\n\n**跨平台支持**\n\n开发者和他们的管理者在构建应用时需要考虑的一个重要方面是跨平台支持。消费者需求日益支持手持设备、Telnet\
  \ 客户端、桌面电脑等。对于能完全控制消费者群体和基础设施的开发者来说，这可能并不重要，但在大多数情况下，它至关重要。\n\n最初，*跨平台*一词指的是应用运行的操作系统（例如\
  \ Windows、Linux、Mac OS、Unix 等），但随着支持互联网的设备的进步，跨平台支持矩阵已变得复杂得多。\n\n有几种跨平台解决方案可用，例如\
  \ Java。\n\n在大多数情况下，应用需要被设计为利用特定平台的功能，而这反过来又耗时且成本高昂。对于开发者来说，要在一个平台上完全支持一个应用，需要漫长的编译和调试生命周期。如果加入更多平台，开发跨平台应用所花费的时间可能会呈指数级增长。\n\
  \n对于本章中使用的技术——Ajax、XUL 和 HTC——Mozilla 的 XUL 声称具有跨平台支持。这在一定程度上是正确的；你可以将 XUL 应用部署到\
  \ Mozilla 平台（GRE）支持的任何操作系统上。\n\n■**注意** XBL 已可用于 Mac 上的 Firefox，并且即将支持 Safari 1.3/2.0。\n\
  \n![图片 35](img/index-234_1.png)\n\n5807ch04.qxd 1/13/06 2:50 PM 第 209 页\n\n第 4 章\
  \ ■ 使用富互联网技术\n\n**209**\n\n你也可以说 Ajax 提供了跨平台支持，但需要 Ajax 解决方案的提供者确保支持每个浏览器特有的怪癖。\n\
  \n因此，尽管你有许多部署环境，但没有一个真正的解决方案能提供完全的跨平台支持。\n\n**想象力是唯一的限制**\n\nJSF 为应用开发者标准化了服务器端，但你仍需等待浏览器中的表示层为组件开发者实现标准化。JSF\
  \ 通过将用户界面与应用分离，为应用开发者带来了平台独立性，这使得组件作者能够在不篡改应用的情况下更改表示层。\n\n这并没有解决浏览器不一致性问题、维护难题，或前述技术的跨平台问题，但它将帮助应用开发者以标准方式构建\
  \ RIA。\n\n本章描述的三种技术——Ajax、XUL 和 HTC——各有优缺点，那么，如果你能将它们的优点结合到一个可复用的标准组件中，岂不是很好？\n\n\
  JSF 组件开发者可以使用 XUL 或 HTC 进行表示，使用 Ajax 进行通信，然后在客户端不支持这三种技术中的任何一种时，动态回退到传统的 HTML 解决方案。应用开发者将能够使用一个通用的编程模型——JSP\
  \ 和 Java——构建一个支持多种渲染技术的应用。\n\n**一个支持 Ajax、XUL 和 HTC 的 JSF 应用**\n\n为了结束本章并回顾之前介绍的技术，图\
  \ 4-11 中展示的 JSF 示例展示了一个包含你的 JSF 输入日期组件的页面。在后续章节中，你将实现本节中展示的支持。此版本的组件已扩展为包含一个弹出式日历，用户可以从其中选择日期。\n\
  \n这个改进后的组件利用 Ajax 进行通信，并利用 XUL 和 HTC 作为渲染技术。\n\n**图 4-11.** *一个使用 XUL 作为渲染技术、由 JSF\
  \ 组件构建的页面*\n\n![图片 36](img/index-235_1.png)\n\n5807ch04.qxd 1/13/06 2:50 PM 第 210\
  \ 页\n\n**210**\n\n第 4 章 ■ 使用富互联网技术\n\n图 4-11 显示了一个 JSF 页面——inputDate.jspx——它包含你的\
