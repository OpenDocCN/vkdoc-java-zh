  ■ ■ ■\n\n为日期字段组件启用 Ajax\n\n*当你创新时，你必须准备好让每个人都告诉你你疯了。*\n\n——拉里·埃里森，甲骨文公司创始人兼首席执行官\n\
  \n**第**6 章介绍了使用 Ajax 和 `XMLHttpRequest` 与 Web 服务器进行异步通信的概念，而 Web 服务器无需知道常规回发和 Ajax\
  \ 回发之间的区别。其直接好处是它保持 JSF 生命周期不变，从而允许应用程序开发者将启用 Ajax 的组件与常规的 JSF 事件和监听器一起使用。\n\n本章将解决使用\
  \ Ajax 获取数据的需求。使用 Ajax 获取数据最常见的用例是填充下拉列表和在文本字段中添加输入提示功能。与使用 Ajax 回发处理事件相比，获取数据不应影响页面上的其他组件。并且，如果获取数据不影响\
  \ DOM 树的其他部分，那么你就不需要仅仅为了获取数据而经历 JSF 的完整生命周期，对吧？\n\n当今网络上有大量示例展示了获取数据如何提高 Web 应用程序的可用性。异步数据传输最突出的例子是\
  \ Google Suggest 的自动建议功能和 Google Gmail 的文件上传功能。\n\n**日期组件 Ajax 实现的需求**\n\n`ProInputDate`\
  \ 组件的需求是提供一个可用于选择日期的可视化日历。为了支持这个可视化日历，你需要提供一个用于实际日历的弹出窗口，并异步获取代表可显示日期的数据。\n\n该可视化日历将允许用户仅选择可用日期（例如，工作日）。所有其他日期（例如，节假日和周末）应显示但不可选择。当选择一个日期时，应使用正确的日期格式将其复制到输入字段。当值被提交回服务器时，仅当它是可用日期（例如，工作日）时，它才能成功通过验证。\n\
  \n**267**\n\n![Image 54](img/index-293_1.png)\n\n5807ch07.qxd 1/19/06 7:24 PM 第\
  \ 268 页\n\n**268**\n\n第 7 章 ■ 为日期字段组件启用 Ajax\n\n**启用 Ajax 的日期组件**\n\n在本章中，你将增强在第\
  \ 2 章中创建的 `ProInputDate` 组件。基于新的需求，你需要在本章中实现三个目标。首先，你需要为 `ProInputDate` 组件提供一个可视化日历。其次，你需要创建一个验证器，应用程序开发者可以使用它来提供可用日期列表。\n\
  \n\n\n这些日期随后可以与 ProInputDate 文本字段中的用户输入进行验证。第三，如果验证器已附加到 ProInputDate 组件，你希望能够重用为验证器定义的同一个托管\
  \ Bean，以获取可视化日历中的可用日期列表。\n\n为此，你将使用 Ajax、两个开源框架（Dojo 工具包和 Mabon）以及 JSON 数据交换格式。你之前已经使用过\
  \ Ajax 和 Dojo 工具包，但以下是新的内容：\n\n*JSON*：JSON 是一种轻量级的数据交换格式。它基于 JavaScript 编程语言（标准\
  \ ECMA-262，第三版）的一个子集。JSON 是一种完全与语言无关的文本格式，但使用了 C 语言家族（包括 C、C++、C#、Java、JavaScript、Perl、Python\
  \ 等）程序员所熟悉的约定。\n\n*Mabon*：Mabon 是一个托管在 Java.net 网站（http://mabon.dev.java.net）上的开源项目，代表托管\
  \ Bean 对象符号。Mabon 允许支持 Ajax 的组件作者通过使用 JSON 语法通信通道，在标准 JSF 生命周期范围之外访问 JSF 托管 Bean。\n\
  \n在本章中，你将了解如何利用 Ajax、Mabon、JSON 和 Dojo 工具包来提供一个可视化日历，并为 ProInputDate 组件异步获取数据。\n\
