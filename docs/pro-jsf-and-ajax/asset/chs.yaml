  \ Warren, SCOUG, 1999\n\n**本**章将扩展前一章概述的构建组件蓝图。在本章中，我们将展示如何创建一个可充当手风琴式面板或 *deck*\
  \ 的组件，这种组件常用于应用程序和集成开发环境（IDE）中，用于显示和隐藏信息，例如文件资源管理器中选中文件的信息，或组件面板中的 JSF 组件。图 3-1\
  \ 展示了 Microsoft Windows 资源管理器中使用的一个可展开 deck。\n\n**图 3-1.** *Microsoft Windows 资源管理器中使用的可展开\
  \ deck* Deck 组件具有可堆叠的优势，并且能够比传统 HTML 页面中同等空间存储更多信息。从组件编写者的角度来看，这类组件引入了组件设计的几个关键领域，例如处理事件、渲染子组件以及加载外部资源。\n\
  \n**105**\n\n![Image 17](img/index-131_1.png)\n\n5807ch03.qxd 1/13/06 11:06 AM Page\
  \ 106\n\n**106**\n\n第 3 章 ■ 定义 Deck 组件\n\n**Deck 组件的需求**\n\nDeck 组件的设计将允许用户通过点击某个显示的\
  \ deck，来暴露当前隐藏的特定信息，并显示与该点击 deck 关联的一组项目。这些子项目可以是任何内容，包括链接、文本，甚至图形。\n\n该组件应足够智能，能够检测到已打开的\
  \ deck，并在打开用户请求的 deck 之前将其关闭。从应用程序开发者的角度来看，该组件需要是可扩展的，这意味着应用程序开发者可以根据需要添加任意数量的 deck，并在这些\
  \ deck 中包含任意数量的子项。应用程序开发者还应能够向页面添加任意数量的 deck 组。\n\n**Deck 组件**\n\n正如你在第一章中记得的，创建新的行为超类的唯一原因是该行为和定义之前未被引入过。根据上一节的需求，deck\
  \ 组件应能够根据用户选择，有选择地显示嵌套组件或组件组，并且任何时候只显示一个组。为实现这一点，你必须创建一个新的渲染器来处理选择性显示，以及一个新的事件类型来处理用户选择，并附带一个针对该特定事件类型的监听器接口。由于显示和隐藏子组件的行为尚未被引入，我们将涵盖两个新的行为超类来处理“显示一项”的行为（参见第\
  \ 2 章的表 2-1）。\n\n完成本章后，你应该理解 JSF 事件模型，并知道如何创建新的行为超类以及你自己的事件类型和相应的监听器接口。图 3-2 展示了你将在本章中创建的\
  \ 11 个类。\n\n**图 3-2.** *展示本章所创建类的类图*\n\n5807ch03.qxd 1/13/06 11:06 AM Page 107\n\
  \n第 3 章 ■ 定义 Deck 组件\n\n**107**\n\n这些类如下：\n\n• `ProShowOneDeckTag` 类代表 `ProShowOneDeck`\
  \ 组件。\n\n• `ShowItemTag` 类代表 deck 组件的叶子节点。\n\n• `ShowListenerTag` 类代表一个自定义动作，应用程序开发者将使用它向\
  \ `UIShowOne` 组件注册一个 `ShowListener` 实例。\n\n• `HtmlShowOneDeckRenderer` 是新的自定义渲染器，负责渲染到客户端的标记。\n\
  \n• `ShowListener` 是一个监听器接口。\n\n• `ShowAdapter` 支持将 `MethodBinding` 添加为 `ShowListener`。\n\
  \n• `ShowEvent` 是自定义事件类。\n\n• `UIShowItem` 是一个行为超类，代表 `UIShowOne` 组件的每个子组件。\n\n\
