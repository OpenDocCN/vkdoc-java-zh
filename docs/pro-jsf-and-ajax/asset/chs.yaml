  \n<button>\n\n一个可由用户点击的按钮。可以使用事件处理程序来捕获鼠标、键盘和其他事件。按钮通常呈现为灰色的凸起矩形。你可以使用 label 属性或通过在按钮内部放置内容来指定按钮的标签。\n\
  \n<window>\n\n描述顶级窗口的结构。它是 XUL 文档的根节点，默认是一个水平方向的盒子。因为它是一个盒子，所以它接受所有盒子属性。默认情况下，窗口周围会有一个特定于平台的边框。\n\
  \n<menubar>\n\n一个通常包含 menu 元素的容器。在 Mac 上，菜单栏显示在屏幕顶部，菜单栏内所有与菜单无关的元素都将被忽略。\n\n<menu>\n\
  \n一个类似于按钮的元素，放置在菜单栏上。当用户点击 <menu> 元素时，该菜单的子元素 <menupopup> 将会显示。此元素也用于创建子菜单。\n\n\
  <menupopup>\n\n用于显示菜单的容器。它应放置在 menu、menu list 或 menu-type button 元素内部。它可以包含任何元素，但通常包含\
  \ <menuitem> 元素。它是一种默认方向为垂直的盒子。\n\n<menuitem>\n\n<menupopup> 元素中的一个单项选择。它的行为很像一个按钮，但它在菜单上呈现。\n\
  \n<radio>\n\n\n\n一种可以打开和关闭的元素。单选按钮几乎总是成组出现。同一 `<radiogroup>` 中一次只能选中一个单选按钮。用户可以通过鼠标或键盘选择来切换哪个单选按钮被打开。同一组中的其他单选按钮会被关闭。可以使用\
  \ `label` 属性指定一个标签，放在单选按钮旁边，向用户指示其功能。\n\n<radiogroup>\n\n一组单选按钮。该组内一次只能选中一个单选按钮。这些单选按钮可以是\
  \ `<radiogroup>` 的直接子元素，也可以是其后代元素。如果你希望为该组添加边框或标题，请将 `<radiogroup>` 放在 `<groupbox>`\
  \ 内部。\n\n`<radiogroup>` 默认为垂直方向。\n\n<checkbox>\n\n一种可以打开和关闭的元素。用户可以通过鼠标点击复选框来切换其状态。可以使用\
  \ `label` 属性指定一个标签，放在复选框旁边，向用户指示其功能。\n\n<box>\n\n一个容器元素，可以包含任意数量的子元素。\n\n如果该 box\
  \ 的 `orient` 属性设置为 `horizontal`，则子元素按照它们在 box 中出现的顺序从左到右排列。如果 `orient` 设置为 `vertical`，则子元素从上到下排列。子元素之间不会重叠。默认方向为水平。\n\
