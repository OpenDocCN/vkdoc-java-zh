  \ HTML 基础 RenderKit 中。\n\n**自定义动作标签处理器**\n\n由于默认的页面描述语言是 JSP，大多数 JSF 组件都会有一个 JSP\
  \ 自定义动作。当 JSP 容器遇到自定义动作时，它会请求与该动作关联的 JSF 标签处理器。JSF 标签处理器的主要目的是使用特定于渲染器的子类创建组件实例，并在首次页面请求时将组件与渲染器关联起来。\n\
  \n**请求处理生命周期**\n\n作为组件编写者，清晰理解 JSF 的生命周期至关重要。由 JSF 组件构建的页面会经历一个定义明确的请求处理生命周期。该生命周期包含六个阶段——恢复视图、应用请求值、处理验证、更新模型值、调用应用程序和渲染响应，如图\
  \ 1-8 所示。\n\n**图 1-8.** *JSF 的正式生命周期*\n\n5807ch01.qxd 1/3/06 4:47 PM 第 28 页\n\n\
  **28**\n\n第 1 章 ■ JSF 的基础：组件\n\n以下是分解后的流程：\n\n**1.** *恢复视图*：此阶段负责从上一个请求中恢复组件层次结构，并将其附加到\
  \ FacesContext。如果没有可用的保存状态，则恢复视图阶段负责创建一个新的 UIViewRoot（组件层次结构中的根节点），并将其存储在 FacesContext\
  \ 上。\n\n**2.** *应用请求值*：在此阶段，每个组件都有机会使用当前请求中包含的信息来更新其当前状态。\n\n**3.** *处理验证*：此阶段负责处理组件层次结构中附加到组件上的任何验证器或转换器。\n\
  \n**4.** *更新模型值*：在此阶段，所有合适的模型数据对象的值将被更新，以匹配相应组件的本地值，并且组件的本地值将被清除。\n\n**5.** *调用应用程序*：在此阶段，需要执行广播到应用程序的任何剩余事件（例如，由\
  \ HtmlCommandButton 执行的操作）。\n\n**6.** *渲染响应*：此阶段负责向客户端渲染响应，并存储新状态以供处理后续请求。\n\n为了将这些阶段置于实际场景中，我们将使用一个简单的示例，其中用户将访问一个使用\
  \ JSF 和 JSP 构建的应用程序。该应用程序包含一个简单的登录页面，带有用于输入用户名和密码的输入字段以及一个登录按钮。登录成功后，用户将被重定向到第二个页面，该页面将显示用户的用户名。\n\
