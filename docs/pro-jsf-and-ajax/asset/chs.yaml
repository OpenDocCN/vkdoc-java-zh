  \ 文件中注册你的新 UIComponent 和 Renderer。\n\n创建 JSP 标签处理器和 TLD\n\n如果你使用 JSP 作为默认视图处理器，则需要此步骤。另一种解决方案是使用\
  \ Facelets (http://facelets.dev.java.net/)。\n\n表 2-1 中的第一步可能是最重要的一步，因为在此你将进行原型设计和测试，以查看你的想法是否能在预期的客户端中生效。当原型工作正常后，你的下一个目标是在\
  \ JSF 中实现你的解决方案，在这种情况下，这意味着你需要提供一个新渲染器来向客户端写入预期的标记，并提供一个渲染器特定的子类，以便于应用程序开发者使用。最后，你必须注册自定义组件并提供一个\
  \ JSP 标签处理器。\n\n你将按照蓝图的第一步开始定义新组件，用最终将发送给客户端的预期标记来实现它。\n\n**步骤 1：创建 UI 原型**\n\n\
  在开发新组件时，一个好的实践是首先创建需要渲染到客户端的预期标记的原型。通过这样做，你不仅能找出组件需要生成哪些元素，还能确定需要哪些渲染器特定的属性来参数化生成的标记。\n\
  \n如代码示例 2-1 所示，原型标记包含一个 HTML 表单 `<input>` 元素、一个 `<img>` 元素、一个 `<div>` 元素和一个 `<style>`\
