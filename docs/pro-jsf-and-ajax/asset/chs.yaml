  \ 7:24 PM 第 280 页\n\n**280**\n\n第 7 章 ■ 使日期字段组件支持 AJAX\n\nMabon 与 JSON\n\n如您所知，`XMLHttpRequest`\
  \ 提供了两种响应类型——`responseText` 和 `responseXML`——可用于获取数据。需要问的问题是，何时应该使用哪一种？这个问题的答案可能因人而异，但我们推荐一条规则：问问自己是否控制响应的语法。\n\
  \n`responseXML` 类型返回一个完整的 DOM 对象（这为您提供了多种遍历 DOM 树的方式），允许您找到所需的信息，并对当前文档应用更改。当您的组件会影响周围元素，并且您不控制响应时（例如，当您与\
  \ Web 服务通信时），这非常有用。\n\n对于日期组件，您确实控制响应，并且您只关注为您的组件获取数据，而不是修改整个页面的 DOM 结构。\n\n`responseText`\
  \ 类型返回纯文本，这允许您利用 JSON 语法来处理响应。对于利用 Ajax 的组件来说，JSON 是一种极其有用的数据交换格式，因为它可以通过 `eval()`\
  \ 函数轻松解析。\n\n`eval()` 函数接受一个参数（一个 JavaScript 代码字符串），并一次性解析和执行该字符串，而不是尝试分别处理每个部分。这比任何其他类型的解析（例如\
  \ XML DOM 解析）都要快得多。\n\n这就是 Mabon 实现 JSON 的原因——您控制响应，并且 JSON 语法易于解析且解析速度快。\n\n■**注意**\
  \ 组件编写者向应用程序开发者明确说明，连接到组件的任何受管 Bean 都需要返回 JSON 支持的数据类型，这一点也很重要。\n\n**JSON 中的有效数据类型**\n\
  \nJSON (http://www.json.org) 具有简单的数据结构——对象和数组。对象是名称/值对的集合，数组是值的有序列表。在 JSON 中，它们采用以下形式：\n\
  \n*   对象是一个无序的名称/值对集合。对象以左花括号 (`{`) 开头，以右花括号 (`}`) 结尾。每个名称后面跟一个冒号 (`:`)，名称/值对之间用逗号\
  \ (`,`) 分隔。\n*   数组是一个有序的值集合。数组以左方括号 (`[`) 开头，以右方括号 (`]`) 结尾。逗号 (`,`) 分隔值。\n*  \
  \ 值可以是双引号括起来的字符串、数字、`true`、`false`、`null`、对象或数组。\n\n这些结构可以嵌套。\n\n![图片 59](img/index-306_1.png)\n\
