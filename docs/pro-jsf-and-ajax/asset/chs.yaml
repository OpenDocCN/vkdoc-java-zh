  \n因此，关于底层数据模型的所有信息都会丢失，导致 JSF 组件无法将值回传到数据模型。\n\n因此，需要一种不同风格的表达式，即 JSF 的 `#{}` 语法。这种语法会被\
  \ JSP 引擎忽略，并作为字符串字面量传递给标签属性。JSF 标签处理程序有机会解析该表达式，并保留对底层数据模型的了解，以便在回传期间使用。如果该值是字面量，例如\
  \ `true`，那么 JSF 标签处理程序会将其转换为强类型的字面量值，例如 `Boolean.TRUE`，然后再将其存储为组件属性值。`<rtexprvalue>`（运行时表达式值）元数据始终设置为\
