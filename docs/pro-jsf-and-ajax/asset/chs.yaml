  \n—微软开发者网络（MSDN）\n\n**在**第一章介绍了 JSF 之后，本章将探讨组件设计的概念及其在 JSF 中的适用性。\n\n本章的主要重点是让你快速掌握设计和创建可重用\
  \ JSF 组件所需的构建块。创建 JSF 组件并不难；你只需要遵循一个明确定义的蓝图，我们将在本章中提供。具体来说，我们将介绍如何创建`Renderer`，如何创建特定于渲染器的子类，如何创建\
  \ JSP 标签处理器，以及如何注册你的自定义 JSF 组件。\n\n为了说明这个过程，我们将展示如何创建一个简单的日期字段组件，你将在本书中一直使用它。在后续章节中，我们将展示如何增强这个日期字段组件，直到你得到一个支持\
  \ Ajax、XUL 和 HTC 的丰富、成熟的 JSF 组件。尽管如此，在本章结束时，你应该拥有第一个功能组件，可以向你的朋友和开发者同行展示。\n\n**日期字段组件的需求**\n\
  \n\n\n你可以通过多种方式构建自己的可复用组件，但对于 JSF 而言，最常见的方法是找到一个已具备所需行为的组件，并在此基础上进行扩展。那么，本章要构建的组件需要具备哪种类型的行为呢？例如，它是用于输入值、选择单个值、选择多个值，还是用于导航？\n\
  \n实际上，你将构建一个能够接收值、处理该值，然后将其作为强类型的 Date 对象推送回底层模型的组件。该组件应允许应用程序开发者附加一个转换器，以便设置最终用户必须遵循的所需日期格式（例如\
  \ mm/dd/yyyy）。基本上，你将构建一个简单的输入组件，该组件能够转换和验证用户输入的日期。\n\n**49**\n\n5807ch02.qxd 12/30/05\
  \ 4:27 PM 第 50 页\n\n**50**\n\n第 2 章 ■ 定义日期字段组件\n\n确认这就是你所需的功能后，很容易在现有组件中搜索这种特定行为。表\
  \ 2-1 列出了 JSF 规范中所有可用的行为超类。\n\n**表 2-1.** *JSF 规范：行为超类*\n\n**名称****\n\n**描述**\n\n\
  UIColumn\n\nUIColumn（继承自 UIComponentBase）是一个组件，代表父组件 UIData 中的单列数据。UIColumn 的子组件将针对父组件\
  \ UIData 所管理数据中的每一行处理一次。\n\nUICommand\n\nUICommand（继承自 UIComponentBase；实现 ActionSource）是一个控件，当用户激活它时，会触发特定于应用程序的“命令”或“操作”。此类组件通常呈现为按钮、菜单项或超链接。\n\
  \nUIData\n\nUIData（继承自 UIComponentBase；实现 NamingContainer）是一个组件，代表与 DataModel 实例所表示的数据对象集合的数据绑定。只有类型为\
  \ UIColumn 的子组件才应由与此组件关联的渲染器处理。\n\nUIForm\n\nUIForm（继承自 UIComponentBase；实现 NamingContainer）是一个组件，代表呈现给用户的输入表单，其子组件（以及其他内容）代表表单提交时要包含的输入字段。UIForm\
  \ 的渲染器的 encodeEnd() 方法必须在写出表单结束标签的标记之前调用 ViewHandler.writeState()。这允许保存多个表单的状态。\n\
  \nUIGraphic\n\nUIGraphic（继承自 UIComponentBase）是一个向用户显示图形图像的组件。用户无法操作此组件；它仅用于显示目的。\n\
  \nUIInput\n\nUIInput（继承自 UIOutput；实现 EditableValueHolder）是一个组件，它既向用户显示组件的当前值（如 UIOutput\
  \ 组件所做的那样），又在后续需要解码的请求中处理请求参数。\n\nUIMessage\n\nUIMessage（继承自 UIComponentBase）封装了与指定输入组件相关的错误消息的渲染。\n\
  \nUIMessages\n\nUIMessages（继承自 UIComponentBase）封装了与指定输入组件无关的错误消息或所有排队消息的渲染。\n\n\
  UIOutput\n\nUIOutput（继承自 UIComponentBase；实现 ValueHolder）是一个具有值的组件，该值可选地通过值绑定表达式从模型层\
  \ bean 中检索，并显示给用户。用户无法直接修改渲染后的值；它仅用于显示目的。\n\nUIPanel\n\nUIPanel（继承自 UIComponentBase）是一个管理其子组件布局的组件。\n\
  \nUIParameter\n\nUIParameter（继承自 UIComponentBase）是一个组件，代表一个可选的命名配置参数，该参数会影响其父组件的渲染。UIParameter\
  \ 组件通常没有自己的渲染行为。\n\nUISelectBoolean\n\nUISelectBoolean（继承自 UIInput）是一个代表单个布尔值（true\
  \ 或 false）的组件。它最常呈现为复选框。\n\n\n\n5807ch02.qxd 12/30/05 4:27 PM 第 51 页\n\n**第 2 章\
  \ ■ 定义日期字段组件**\n\n**51**\n\n**名称****\n\n**描述**\n\nUISelectItem\n\nUISelectItem（继承自\
  \ UIComponentBase）是一个可嵌套在 UISelectMany 或 UISelectOne 组件内部的组件，代表该父组件可用选项列表中的一个 SelectItem\
  \ 实例。\n\nUISelectItems\n\nUISelectItems（继承自 UIComponentBase）是一个可嵌套在 UISelectMany\
  \ 或 UISelectOne 组件内部的组件，代表零个或多个 SelectItem 实例，用于向该父组件的可用选项列表中添加选择项。\n\nUISelectMany\n\
  \nUISelectMany（继承自 UIInput）是一个代表从可用选项列表中进行一项或多项选择的组件。它通常呈现为多选列表或一组复选框。\n\nUISelectOne\n\
  \nUISelectOne（继承自 UIInput）是一个代表从可用选项列表中进行零项或一项选择的组件。它通常呈现为组合框或一组单选按钮。\n\n** 来源：JSF\
  \ 1.1 规范*\n\n*** 该组件的完整类名为* javax.faces.component *.*\n\n本章将要创建的日期字段组件的关键行为是让用户输入新日期。查看表\
  \ 2-1，你会发现有一个组件描述了日期字段组件所需的行为——行为超类 UIInput。\n\n无需创建引入现有行为的新组件，你可以直接使用 JSF 规范中的\
  \ UIInput 组件。因此，这个新组件将被称为*输入日期组件*，并遵循与标准 JSF 组件（如输入文本组件）相同的命名约定。\n\n**使用 UIINPUT**\n\
  \nUIInput 组件定义了应用程序如何与你的组件或任何继承自该超类的组件进行交互的契约。UIInput 组件自带一个默认渲染器，该渲染器在运行时会将组件显示为一个文本输入字段，用户可在其中输入数据。其组件类型为\
  \ javax.faces.Input，默认渲染器类型为 javax.faces.Text。\n\nUIInput 组件向客户端显示值的方式与 UIOutput\
  \ 组件大致相同。事实上，UIInput 组件继承自 UIOutput 组件。UIInput 组件还会在回传时处理需要解码和管理的请求参数。如果请求中传递的值与之前的值不同，组件会触发一个\
  \ ValueChangeEvent 事件。你可以附加一个 ValueChangeListener，以便在 UIInput 组件广播 ValueChangeEvent\
  \ 时接收通知。\n\n**输入日期组件**\n\n该输入日期组件的目的是为本书后续更高级的 JSF 工作打下坚实基础。在视觉上，该组件将是一个简单的输入文本字段，带有一个图标覆盖层以指示其为日期字段，并具备一些有用的类型转换和日期验证功能。\n\
