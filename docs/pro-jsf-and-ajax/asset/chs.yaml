  \ XUL 设计自己的组件；这些组件*将*需要按需下载并缓存在浏览器中。\n\n**MOZILLA XUL 的 CHROME 系统**\n\n除了从本地文件系统或\
  \ Web 服务器加载文件外，Mozilla 引擎还有一种特殊的方式，可以将应用程序安装并注册为其 *chrome 系统*的一部分。chrome 系统允许开发者打包应用程序，并将其作为插件安装到支持\
  \ Mozilla GRE 的客户端中。以这种方式部署的 XUL 应用程序可以获得对本地文件系统的读写权限等。在传统的 Web 应用程序中，这种访问权限很难实现，除非应用程序已使用数字证书签名，并且最终用户授予了访问权限。\n\
