  </tag>\n\n</taglib>\n\n**JSP 2.1 延迟值和延迟方法**\n\nJSF 1.2 现在直接利用 JSP 2.1 中的 JSP EL。JSP\
  \ EL 原生支持即时 ${} 语法表达式和延迟 #{} 语法表达式。JSF 1.2 标签库现在可以利用 JSP 2.1 标签库描述符中可用的 <deferred-value>\
  \ 语法，例如以下内容，以指示此 JSP 2.1 标签属性支持 #{} 语法，并定义评估类型为 Boolean：\n\n<deferred-value>\n\n\
  <type>java.lang.Boolean</type>\n\n</deferred-value>\n\n这将导致一个 ValueExpression 作为参数传递给此属性的\
  \ JSP 2.1 标签处理器的 setter 方法。你还可以对方法调用使用 <deferred-method> 语法，如下所示，以指示此 JSP 2.1 标签属性支持\
  \ #{} 语法，并定义延迟方法的签名：\n\n<deferred-method>\n\n<method-signature>\n\nvoid doAction(javax.faces.event.ActionEvent)\n\
  \n</method-signature>\n\n</deferred-method>\n\n这将导致一个 MethodExpression 作为参数传递给此属性的\
  \ JSP 2.1 标签处理器的 setter 方法。\n\n这种方法取代了 JSP 2.0 中经典的 JSF 1.1 <rtexprvalue>false</rtexprvalue>\
  \ 和默认的 java.lang.String 标签属性类型。\n\n![图片 15](img/index-128_1.png)\n\n5807ch02.qxd\
