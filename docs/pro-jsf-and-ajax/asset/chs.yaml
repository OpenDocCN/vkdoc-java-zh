  \ RenderKit，而不会影响应用程序开发人员或实际的应用程序逻辑。\n\n现在，你拥有了一套支持多种客户端技术的富互联网组件，只剩下一个问题：如何自动选择\
  \ RenderKit 以向任何用户代理传递正确的标记？\n\n本章涵盖的主要技术是 Oracle ADF Faces，它是一套于 2004 年秋季推出的丰富的标准\
  \ JSF 组件。Oracle ADF Faces 组件库提供了各种具有内置功能的用户界面组件，例如数据表、分层表以及颜色和日期选择器。ADF Faces 还包含当今\
  \ JSF 开发人员最需要的许多框架特性。\n\n阅读本章后，你应该能够动态切换 RenderKit，并知道如何设置它们以检测不同的用户代理，例如 Mozilla\
