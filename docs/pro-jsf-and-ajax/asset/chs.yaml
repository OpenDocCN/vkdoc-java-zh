  \ . . . . . . . . . . . . . . . . . . . . . . . . .\n\n\n我曾相当确信，答案只能是响亮的“不！”毕竟，如今市面上已有整整半打由众多网络名人撰写的书籍，而我甚至亲自担任了其中一半书籍的技术审阅人。那么，关于这个主题，还能有什么更多可说的呢？\n\
  \n但当我再仔细思考一番后，情况变得明朗起来：所有这些书籍都只触及了表面。它们会向你展示如何使用 JSF 开箱即用的功能，为你编写自己的组件和渲染器提供一些帮助，甚至可能再多给一点。但我所见过的书中，没有一本能触及\
  \ JSF 为何真正是一项酷炫且重要技术的核心；它们让 JSF 看起来就像是 HTML 领域的 YAMVCF（又一个模型-视图-控制器框架）——在某些地方更强大，在许多地方更容易使用，在其他地方则稍显困难，但本质上并无重大突破。当然，也没有任何内容能带领我们超越构建普通外观\
  \ Web 应用的那些枯燥基础。\n\n本书则深入得多。它当然涵盖了基础知识，并向你展示了如何构建组件，但随后它继续深入：涉及 Ajax、HTC、XUL——以及如何将这些字母汤包裹在\
  \ JSF 的核心（即其组件模型）之下，以及如何利用它最终开发出无需在客户端技术风向转变时进行彻底重构的 Web 应用。在此过程中，你将学习到一系列开源工具包，即使你不是\
  \ JavaScript 专家，也能让 Web 魔法变得切实可行。\n\n所以，见鬼，我被说服了。这个世界*确实*需要另一本 JSF 书。\n\nAdam Winer\n\
