  \n**来源：JavaServer Faces 规范 1.1*\n\n***此组件没有关联的渲染器。*\n\n对于每个 UIComponent 和渲染器的组合，都有一个渲染器特定的子类，或称便捷类。一个标准的\
  \ JSF 实现，例如 Sun RI 或 MyFaces 运行时，都附带一组 HTML 渲染器（通过标准 HTML RenderKit 提供）和一组 HTML\
  \ 渲染器特定的子类，例如 HtmlSelectOneRadio。\n\n渲染器特定组件子类\n\n在大多数情况下，此子类在运行时创建组件的实例。顾名思义，此子类提供了对\
  \ JSF 组件上渲染器特定属性（例如 style、disabled、tooltip 等）的访问——为所有这些组件属性提供属性的 getter 和 setter\
  \ 方法。结合 JSF JSP 标签上的 binding 属性，此子类允许应用程序开发人员使用 JavaBean 属性 setter 在运行时更改组件上的渲染器特定属性。\n\
  \n\n\n尽管这种方法确实可行，并且是原型开发的有用工具，但我们建议应用程序开发者在可能的情况下，避免直接从后台 Bean 应用逻辑修改特定于渲染器的属性，而应使用组件的行为超类。如果应用程序开发者使用父类而非便捷子类，那么当\
  \ JSF 组件在页面定义中更改为使用不同的特定于渲染器的组件时（例如从 `HtmlSelectOneRadio` 更改为 `HtmlSelectOneListbox`），他们无需修改后台\
  \ Bean 代码。只有当行为超类也发生更改时（例如从 `HtmlSelectOneRadio` 更改为 `HtmlSelectManyList`），后台 Bean\
  \ 代码才需要更改。\n\n此子类是可选的，但为 JSF 组件提供此子类是一种良好实践，因为有时应用程序开发者可能为了方便而使用它，并且对于组件编写者来说，很难知道应用程序开发者是否会尝试使用它。\n\
