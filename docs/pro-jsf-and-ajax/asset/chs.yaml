  \n保存和恢复状态\n\n\n\n构建 Web 应用的一个关键部分是状态保存。以传统的基于 HTML 的购物车为例，应用开发者必须存储用户选择的商品，并在用户完成购物前持续保存这些信息。大多数情况下，购物车应用由多个页面构成，因此每个页面的状态都必须保存，直到买家完成购物。状态被存储在隐藏表单字段、会话中，或作为请求传递给下一个页面。处理过这类问题的人都知道，这并非一项简单的任务。\n\
  \n状态管理是使用 JSF 构建应用的主要优势之一。\n\nJSF 通过一个名为 `StateManager` 的类提供自动的 UI 状态处理，该类在服务器上的请求之间保存和恢复特定视图（UIComponent\
  \ 层次结构）的状态。当 `StateManager` 请求时，每个 `UIComponent` 都会保存和恢复其自身的内部状态；`StateManager`\
  \ 本身则保存和恢复与 `UIComponent` 层次结构相关的状态。如果某个 `UIComponent` 被标记为瞬态，则 `StateManager` 会将其从结构中排除，导致它在请求结束时从\
  \ `UIComponent` 树中移除。\n\n存储视图状态有两种选择——客户端和服务器端。\n\n默认情况下，状态保存在服务器端。服务器端实现由 JSP 和\
  \ Servlet 规范支持，但 JSF 隐藏了其所有工作细节。一个名为 `ResponseStateManager` 的类（由 `RenderKit` 创建和管理）负责管理客户端状态保存。客户端状态保存不仅依赖于\
  \ JSF 实现，还很大程度上取决于渲染给客户端的标记语言以及该客户端管理状态的方式。当使用 HTML 作为标记语言时，状态通常存储在隐藏表单字段中。\n\n\
  5807ch01.qxd 1/3/06 4:47 PM Page 21\n\n第 1 章 ■ JSF 的基础：组件\n\n**21**\n\n■**注意** 虽然\
