  \ 1/19/06 6:16 PM 第 404 页\n\n**404**\n\n第 10 章 ■ 动态切换渲染套件\n\n**动态切换渲染套件的需求**\n\n\
  需求很明确——应用程序开发者希望能够在运行时根据用户代理动态切换渲染套件。例如，如果请求页面的是 Firefox 浏览器，解决方案应向客户端提供 XUL 标记。\n\
  \n渲染套件的功能是协助将渲染器委托给 UIComponent。渲染套件将相似标记类型的渲染器实例分组，在本书中，你为 HTML Ajax、微软的 DHTML/HTC\
  \ 以及 Mozilla 的 XUL/XBL 技术创建了渲染套件。\n\n每个渲染套件在运行时作为 UIViewRoot 属性与视图（组件层次结构）关联。如果应用程序开发者希望向应用程序添加带有自定义渲染器的渲染套件，则必须将渲染套件\
  \ ID 添加到应用程序的 JSF 配置文件中，如代码示例 10-1 所示。\n\n**代码示例 10-1.** *设置默认* RenderKit *ID*\n\
  \n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n\n<!DOCTYPE faces-config PUBLIC\n\n\
  \"-//Sun Microsystems, Inc.//DTD JavaServer Faces Config 1.1//EN\"\n\n\"http://java.sun.com/dtd/web-facesconfig_1_1.dtd\"\
  >\n\n<faces-config >\n\n<application>\n\n**<default-render-kit-id>com.apress.projsf.xul.ajax</default-render-kit-id>**\n\
  \n</application>\n\n...\n\n</faces-config>\n\n此代码示例展示了 faces-config.xml 文件，其中 <default-render-kit-id>\
  \ 设置为你的自定义 XUL 渲染套件。faces-config.xml 文件在 Web 应用程序创建时被读取一次，并存储在 Application 实例中。ViewHandler\
  \ 负责为当前及后续来自客户端的请求返回 renderKitId。理解每个 Web 应用程序只能有一个默认渲染套件这一点很重要，该渲染套件通过字符串（例如 com.apress.projsf.xul.ajax）标识。\n\
  \n为了满足允许任何浏览器访问应用程序并为每个浏览器提供不同渲染套件实现的需求，本章你需要完成三项任务。首先，你需要在 faces-config.xml 文件中以能够在运行时动态设置的方式定义默认渲染套件\
  \ ID。其次，你需要检测请求应用程序的用户代理。第三，你需要使用 ViewHandler 设置渲染套件 ID。如果你希望为同一应用程序拥有多个渲染套件实例，则需要自定义\
  \ ViewHandler。\n\n■**注意** JSF 1.1 应用程序需要自定义 javax.faces.application.ViewHandler\
  \ 实例来动态选择渲染套件。然而，JSF 1.2 增加了对直接在 Web 应用程序中单个页面的 <f:view> 标签上指定渲染套件 ID 的支持。\n\n![Image\
  \ 97](img/index-430_1.png)\n\n5807ch10.qxd 1/19/06 6:16 PM 第 405 页\n\n第 10 章 ■ 动态切换渲染套件\n\
  \n**405**\n\n**动态渲染套件实现**\n\n图 10-1 展示了动态渲染套件解决方案。\n\n**图 10-1.** *动态* RenderKit\
  \ *实现的结构* 动态渲染套件解决方案包含三个类：\n\n• ViewHandlerWrapper 是一个包装类，提供解决方案与 JSF 实现之间的松散耦合。\n\
