  \n**@IMPORT 规则**\n\n你可能已经注意到，我们在原型中使用了这条规则来导入样式表。与 `<link>` 元素类似，`@import` 规则将外部样式表链接到文档。不同之处在于，`<link>`\
  \ 元素定义在页面的 head 部分，并通过其 `href` 属性指定要导入的样式表名称。在实践中，你可以在文档 body 中使用 `@import` 规则，这允许你将样式封装在样式表中，并在渲染页面的任何\
  \ `<style>` 元素中导入它们。\n\n在创建你的输入日期组件之前，先看看最终结果以及它如何在 JSP 页面中使用。代码示例 7-2 展示了如何将输入日期组件与\
  \ Ajax 渲染器一起使用。\n\n**代码示例 7-2.** *JSF 页面源码*\n\n<?xml version = '1.0' encoding =\
  \ 'windows-1252'?>\n\n<jsp:root version=\"1.2\"\n\n5807ch07.qxd 1/19/06 7:24 PM\
