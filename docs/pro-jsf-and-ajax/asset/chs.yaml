  \n感受到你所选技术影响的永远是用户，任何 Web 或桌面应用程序开发者的首要任务都应是用户体验。用户不关心使用了什么技术，也不关心应用程序是传统的桌面应用还是\
  \ Web 应用。用户需要的是功能丰富且具有交互性的界面。\n\n传统上，桌面应用能够提供满足用户需求的丰富性，但越来越多的桌面应用正在迁移到 Web 上。因此，Web\
  \ 应用开发者必须提供更丰富的 Web 界面。\n\n为了让您充分理解 JSF 及其为互联网社区带来的价值，您需要了解富互联网应用的当前状况。如今的 Web 应用开发者面临着使用\
  \ HTML、CSS、JavaScript 和 DOM 等技术实现更丰富功能的需求。然而，这些技术在设计之初并未考虑企业级应用。消费者对具备这些技术无法完全支持的功能的应用需求日益增长，正推动\
  \ Web 应用开发者探索替代方案。\n\n从这些消费者需求中，演变出了增强传统 Web 应用静态内容的新型 Web 技术。这些技术通常被称为*富互联网技术*（RITs）。\n\
  \n由于缺乏标准定义，且传统 Web 技术可扩展性不足，涌现出了诸如 Mozilla 的 XUL、微软的 HTC、Java applets、Flex 和 OpenLaszlo\
  \ 等新技术。这些技术在利用将应用部署到中央服务器的优势的同时，支持对传统 HTML 标记进行特定于应用的扩展。另一个以新品牌名回归的解决方案是 Ajax（最近成为异步\
  \ JavaScript 和 XML 的缩写，以前称为 XMLHTTP）。使用这些技术构建的应用通常被称为*富互联网应用*（RIAs）。\n\n**173**\n\
  \n5807ch04.qxd 1/13/06 2:50 PM 第 174 页\n\n**174**\n\n第 4 章 ■ 使用富互联网技术\n\n在本章中，我们将介绍三种\
  \ RIT：Ajax、Mozilla XUL 和微软 HTC。本章将对这些技术进行高层概述，并通过一些简单示例来突出每种技术的核心特性。在后续章节中，您将深入了解每种技术的细节，以改进两个\
  \ JSF 组件——ProInputDate 和 ProShowOneDeck 的用户体验。\n\n以下是本章涉及的四个主要角色：*Ajax1*：Ajax 是一套已有技术套件（DOM、JavaScript\
  \ 和 XMLHttpRequest）的新名称。Ajax 用于创建动态网站，并实现客户端与服务器之间的异步通信。\n\n*XUL*：XML 用户界面语言（XUL），发音为*zuul*，由\
  \ Mozilla 组织（Mozilla.org）于 1998 年作为开源项目创建。使用 XUL，开发者可以构建丰富的用户界面，这些界面既可以作为“瘦客户端”Web\
  \ 应用部署，也可以在桌面上本地部署，或作为支持互联网的“胖客户端”桌面应用部署。\n\n*XBL*：可扩展绑定语言（XBL）是 XUL 用于定义新组件的语言。XBL\
  \ 还用于弥合 XUL 与 HTML 之间的差距，使得将行为附加到传统 HTML 标记变得容易。\n\n*HTC*：在微软 Internet Explorer\
  \ 5 中引入，HTC 提供了一种机制，将组件作为 DHTML 行为在脚本中实现。HTC 文件以.htc 扩展名保存，是一个包含脚本和一组定义组件的 HTC 特定元素的\
  \ HTML 文件。\n\n阅读本章后，您应理解这些 RIT 是什么、它们提供了什么，以及如何使用它们创建丰富的用户界面组件。\n\n**介绍 Ajax**\n\
  \n*Ajax*已被定义为一个术语，用于描述一种创建更丰富、更友好的 Web 应用的 Web 开发技术。本章将为您概述 Ajax。Ajax 一词最早于 2005\
  \ 年 2 月被提出，此后迅速席卷了软件行业。\n\nAjax 获得动力和普及的原因之一是 XMLHttpRequest 对象，以及该对象使开发者能够与底层服务器和\
  \ Web 应用使用的任何业务服务进行异步通信的方式。像 Google GMail 和 Google Suggest 这样的流行网站正在使用 Ajax 技术为用户提供丰富的界面，这提高了人们对\
  \ Ajax 的认识。\n\n尽管*Ajax*这个名称是新的，但作为该技术基础的技术——JavaScript、XMLHttpRequest 和 DOM——已经存在了一段时间。事实上，这套技术套件的最新成员——XMLHttpRequest\
  \ 对象——是由微软于 1999 年随 Internet Explorer 5.0 的发布而引入的，并作为 ActiveX 组件实现。\n\nXMLHttpRequest\
  \ 对象虽然被广泛使用，但并非标准；它最多只能被称为“事实上的”标准，因为大多数现代浏览器，包括 Firefox、Internet Explorer、1 该术语最早由\
  \ Adaptive Path 的 James Garrett 在一篇文章中提出。\n\n5807ch04.qxd 1/13/06 2:50 PM 第 175\
  \ 页\n\n第 4 章 ■ 使用富互联网技术\n\n**175**\n\nOpera 和 Safari，都支持它。然而，已经有一个标准提案涵盖了 XMLHttpRequest\
  \ 对象提供的部分功能——DOM Level 3 加载和保存规范。\n\n■**注意** XMLHttpRequest 对象并非 W3C 标准。W3C DOM\
  \ Level 3 加载和保存规范包含一些类似的功能，但尚未在任何浏览器中实现。因此，目前，如果您需要从浏览器发送 HTTP 请求，则必须使用 XMLHttpRequest\
  \ 对象。\n\n借助 XMLHttpRequest 对象，开发者现在可以向 Web 服务器发送请求以检索特定数据，并使用 JavaScript 处理响应。这种在客户端和\
  \ Web 服务器之间发送数据的能力将带宽降至最低，并节省了服务器上的时间，因为更新用户界面的大部分处理工作是在客户端使用 JavaScript 完成的。\n\n\
  **XMLHttpRequest 对象**\n\n\n\n由于 `XMLHttpRequest` 对象并非标准，每个浏览器对其支持的方式可能略有不同；因此，其行为在不同浏览器间可能存在差异。在本章创建示例应用程序时，你会注意到微软的\
  \ Internet Explorer 将 `XMLHttpRequest` 对象实现为 ActiveX 对象，而 Mozilla Firefox 则将其视为原生\
  \ JavaScript 对象。不过，大多数实现都支持相同的方法和属性集。这减轻了应用程序开发人员的负担，因为唯一的区别在于创建 `XMLHttpRequest`\
  \ 对象的实例。创建 `XMLHttpRequest` 对象的实例可以如代码示例 4-1 或代码示例 4-2 所示。\n\n**代码示例 4-1.** *创建*\
  \ XMLHttpRequest *对象的实例* var xmlhttp = new XMLHttpRequest();\n\n**代码示例 4-2.** *使用*\
  \ ActiveXObject *创建* XMLHttpRequest *对象的实例* var xmlhttp = new ActiveXObject(\"Microsoft.XMLHTTP\"\
  ); 同样值得注意的是，`XMLHttpRequest` 对象并非标准 HTML 所独有。\n\n`XMLHttpRequest` 对象可能被任何基于 HTML/XML\
  \ 的 Web 技术（如 XUL 或 HTC）使用。\n\n方法\n\n`XMLHttpRequest` 对象实例提供了可用于与 Web 服务器异步通信的方法（见表\
  \ 4-1）。\n\n5807ch04.qxd 1/13/06 2:50 PM 第 176 页\n\n**176**\n\n第 4 章 ■ 使用富互联网技术\n\
  \n**表 4-1.** XMLHttpRequest *对象方法*\n\n**方法**\n\n**描述**\n\nopen(\"method\", \"URL\"\
  )\n\n为待处理请求分配目标 URL、方法及其他可选属性\n\nsend(content)\n\n发送请求，可选地附带一个可被提交的字符串或 DOM 对象数据\n\
  \nabort()\n\n停止当前请求\n\ngetResponseHeader(\"headerLabel\")\n\n返回单个标头标签的字符串值\n\ngetAllResponseHeaders()\n\
  \n返回一组完整的标头（标签和值）作为字符串\n\nsetRequestHeader(\"label\", \"value\") 为将要随请求发送的标头分配一个标签/值对\n\
  \n在表 4-1 中，`open()` 和 `send()` 方法是最常用的。`open(\"method\", \"URL\"[, \"asynch\"[,\
  \ \"username\"[, \"password\"]]])` 方法为请求和即将进行的操作做好准备。需要两个参数：一个是请求的 HTTP 方法（GET 或\
  \ POST），另一个是连接的 URL。可选的 `asynch` 参数定义了此请求的性质——`true` 为默认值，表示这是一个异步请求。另外两个可选参数——`username`\
  \ 和 `password`——允许应用程序开发人员在需要时提供用户名和密码。\n\n`send()` 方法向服务器发出请求，并在你通过调用 `open()`\
  \ 方法设置好阶段后调用。传递给此方法的任何内容都将作为请求体的一部分发送。\n\n属性\n\n一旦 `XMLHttpRequest` 被发送，脚本可以查看所有实现共有的几个属性（见表\
  \ 4-2）。\n\n**表 4-2.** XMLHttpRequest *对象属性* **属性**\n\n**描述**\n\nonreadystatechange\n\
  \n每次状态改变时触发的事件的事件处理程序 readyState\n\n对象状态整数：0 = 未初始化，1 = 加载中，2 = 已加载，3 = 交互中，4 =\
  \ 完成\n\nresponseText\n\n从服务器进程返回的数据的字符串版本\n\nresponseXML\n\n从服务器进程返回的数据的 DOM 兼容文档对象\n\
  \nstatus\n\n服务器返回的数字代码，例如 404 表示“未找到”或 200 表示“成功”\n\nstatusText\n\n伴随状态代码的字符串消息\n\
  \n5807ch04.qxd 1/13/06 2:50 PM 第 177 页\n\n第 4 章 ■ 使用富互联网技术\n\n**177**\n\n与 `XMLHttpRequest`\
  \ 对象方法一样，有两个属性会比其他的更常用——`responseText` 和 `responseXML`。你可以使用这两个属性来访问随响应返回的数据。`responseText`\
  \ 属性提供数据的字符串表示形式，这在请求的数据以纯文本或 HTML 形式返回时非常有用。根据上下文，`responseXML` 属性提供了更广泛的数据表示形式。\n\
  \n`responseXML` 属性将返回一个 XML 文档对象，可以使用 W3C DOM 节点树方法和属性进行检查。\n\n**传统 Web 应用程序开发**\n\
  \n在深入了解 Ajax 的细节之前，你需要首先了解传统 Web 应用程序是如何工作的，以及当 Web 应用程序包含表单元素时，用户和应用程序开发人员面临哪些问题。HTML\
  \ 表单用于将数据传递到底层 Web 服务器。你可能遇到过带有表单的 Web 应用程序，例如当你填写调查问卷、从 eBay (http://www.ebay.com)\
  \ 等网站在线订购产品，或使用公司的人力资源应用程序填写费用报告时。\n\n传统 Web 应用程序中的表单由一个特殊的 HTML 标签（`<form>`）定义，该标签具有一组参数——`action`、`method`、`enctype`\
  \ 和 `target`。`action` 参数定义传递表单数据的目标 URL，`method` 参数定义用于表单回发的 HTTP 方法，`enctype` 参数定义用于编码数据的内容类型，`target`\
  \ 参数定义应接收响应的框架。\n\n常规回发\n\n提交表单时可以使用两种方法——POST 和 GET。使用 HTTP GET 方法时，表单数据集会附加到由\
  \ `action` 属性指定的 URL 上（例如，http://forums.oracle.com/forums/forum.jspa?forumID=83），然后将这个新\
  \ URL 发送到服务器。在 JSF 中，`action` 属性的值在渲染期间由 `ViewHandler.getActionURL(viewId)` 提供。\n\
  \n■**注意** JSF 规范定义的 `<h:form>` 标签没有 `method` 和 `action` 属性。\n\n使用 HTTP POST 方法时，表单数据集包含在发送到服务器的请求体中。GET\
  \ 方法便于添加书签，但仅应在你不期望表单提交产生副作用（如 W3C HTTP 规范 (http://www.w3.org/Protocols/) 中所定义）时使用。如果与表单处理相关的服务会产生副作用（例如，如果表单修改了数据库行或订阅了服务），则应使用\
  \ POST 方法。\n\n选择 POST 方法而非 GET 方法的另一个原因是，它允许浏览器通过将数据作为 HTTP 请求中请求标头之后的消息体添加，向 Web\
  \ 服务器发送无限量的数据。GET 方法受限于 URL 长度，不能超过 2,048 个字符。POST 方法消除了对传输数据长度的任何限制。\n\n![Image\
  \ 25](img/index-203_1.png)\n\n5807ch04.qxd 1/13/06 2:50 PM 第 178 页\n\n**178**\n\n\
  第 4 章 ■ 使用富互联网技术\n\n■**注意** GET 方法将表单数据集的值限制为 ASCII 字符。只有 POST 方法（使用 `enctype=\"\
  multipart/form-data\"`）被指定为覆盖整个 [ISO10646] 字符集。\n\n当用户提交表单时（例如，通过单击提交按钮），如图 4-1\
  \ 所示，浏览器会处理提交表单中的控件并构建一个表单数据集。表单数据集是由表单中的控件构建的一系列控件名称/当前值对。然后，根据 `<form>` 元素的 `enctype`\
  \ 属性指定的内容类型（例如，`application/x-www-form-urlencoded`）对表单数据集进行编码。\n\n**图 4-1.** *常规回发的序列图*\
  \ 编码后的数据随后作为 url-formencoded 流发送回服务器（HTTP\n\n\n\nPOST）。服务器响应包含指示请求已成功的状态信息（HTTP\
  \ 状态码 200 “OK”），并发送一个完整页面响应。浏览器随后会将响应中发送的 HTML 解析为 HTML DOM，并在浏览器窗口中渲染页面。页面所需的任何资源都将被重新验证，并可能再次从服务器下载。HTML\
  \ 文档在浏览器窗口中被替换后，浏览器地址栏中的 URL 也会被修改，以反映来自上一页面表单操作的页面。\n\n或者，服务器响应可以包含指示请求失败的信息（例如，HTTP\
  \ 状态码 404 “Not Found”）。\n\n常规回发的副作用\n\n常规回发一个明显的副作用是，当页面在浏览器窗口中重新加载时会导致页面闪烁，最糟糕的情况下，用户将不得不等待页面再次将所有所需资源下载到客户端浏览器。其他不太明显但仍然令人烦恼的副作用包括滚动位置和光标焦点的丢失。\n\
  \n■**注意** 如今大多数浏览器都拥有出色的客户端缓存功能，可以很好地防止页面从 Web 服务器重新加载资源，除非缓存被关闭，或者应用程序使用 HTTPS，在这种情况下，内容可能无法在客户端缓存。\n\
  \n作为页面设计的一部分，可能需要在页面上包含多个表单。当页面上有多个表单时，回发期间只会处理其中一个表单，而其他表单中输入的数据将被丢弃。\n\n一个好处是，使用常规回发可以添加书签。然而，用户常常被地址栏中设置的\
  \ URL 所迷惑，因为它反映的是最后请求的内容，而不是响应返回的内容。当用户选择书签时，它将返回到之前提交的页面。常规回发还允许用户点击浏览器后退按钮返回到上一页面，唯一的副作用是会出现表单提交警告。\n\
  \n**Ajax Web 应用程序开发**\n\n开发复杂的支持 Ajax 的应用程序并非普通应用程序开发人员所能胜任，正如特洛伊人在战场上畏惧 Ajax 一样，即使是最有经验的\
  \ Web 设计师也对攻克 Ajax 感到畏惧。Ajax 框架的一个主要部分是客户端脚本语言 JavaScript。正如许多 Web 设计师所经历的那样，JavaScript\
  \ 并非一种工业级语言，许多人声称它在专业开发工具中缺乏支持。\n\n然而，在我们看来，至少有两种真正优秀的 JavaScript 工具可用——微软的 Visual\
  \ Studio 和 Mozilla 的 Venkman。不过，事实是，维护 Ajax 应用程序很困难；JavaScript 实现中缺乏浏览器一致性，使得维护特定于浏览器的代码成为一项挑战。\n\
  \n**MOZILLA 的 VENKMAN 调试器**\n\nVenkman 是 Mozilla 的 JavaScript 调试器的代号（http://www.mozilla.org/projects/venkman/）。Venkman\
  \ 旨在为基于 Mozilla 的浏览器（包括 Netscape 7.*x* 系列浏览器和 Mozilla 里程碑版本）提供强大的 JavaScript 调试环境。它不包括仅支持\
  \ Gecko 的浏览器，如 K-Meleon 和 Galeon。该调试器以 XPI 格式的附加组件包形式提供，自 2001 年 10 月 3 日起已成为 Mozilla\
  \ 安装发行版的一部分。\n\n![图片 26](img/index-205_1.png)\n\n**180**\n\n第 4 章 ■ 使用富互联网技术\n\n\
  Ajax 回发\n\n现在你已经熟悉了常规回发，是时候看看 Ajax 了。本节将概述如何使用 Ajax 回发来处理事件。你可以使用 Ajax 来控制表单提交操作，而不是使用常规的表单提交操作，而是使用\
  \ `XMLHttpRequest` 对象异步地将你的请求提交到 Web 服务器。一个副作用是，当用户提交表单时（例如，通过点击提交按钮），没有浏览器会帮助你处理提交表单中的控件。你现在需要处理任何需要作为回发一部分的表单字段，并使用它们构建一个表单数据集——控件名称/当前值对。然后，你获取该表单数据集并模拟编码（url-formencoded），以提供与常规回发相同的语法（见图\
  \ 4-2）。\n\n**图 4-2.** *一个* XMLHttpRequest *回发的序列图* 创建 `XMLHttpRequest` 对象后，你使用 `open()`\
  \ 方法设置请求的 HTTP 方法——GET 或 POST——以及连接的 URL。为 `XMLHttpRequest` 操作设置好阶段后，你使用 `XMLHttpRequest`\
  \ 对象将编码后的数据作为 url-formencoded 流发送回服务器（HTTP POST）。对于 Web 服务器而言，该请求将看起来像传统的 HTTP POST，这意味着\
  \ Web 服务器无法区分常规回发和你的 Ajax 回发。对于 JSF 解决方案，这意味着 Ajax 请求可以像常规回发请求一样被接收，从而允许服务器代码（例如，JSF\
  \ 请求生命周期）不受影响。\n\n如果请求成功，你的 `XMLHttpRequest` 对象上的就绪状态将设置为 4，表示响应加载完成。然后，你可以使用两个属性来访问随响应返回的数据——`responseText`\
  \ 和 `responseXML`。\n\n`responseText` 属性提供数据的字符串表示形式，这在请求数据以纯文本或 HTML 形式出现时非常有用。根据上下文，`responseXML`\
  \ 属性提供更广泛的数据表示形式。\n\n`responseXML` 属性将返回一个 XML 文档对象，这是一个完整的文档节点对象（DOM nodeType 为\
  \ 9），可以使用 W3C DOM 节点树方法和属性进行检查。在这种传统的 Ajax 方法中，Ajax 处理程序负责发送数据、管理响应以及修改 `HTMLDocument`\
  \ 对象节点树。\n\n■**注意** DOM 元素可以是不同类型。元素的类型存储在 `nodeType` 的整数字段中（例如，`COMMENT_NODE =\
  \ 8` 和 `DOCUMENT_NODE = 9`）。有关不同 nodeType 的更多信息，请访问 http://www.w3.org/。\n\nAjax\
  \ 回发的副作用\n\n与常规回发一样，使用 Ajax 进行回发时也存在期望和不期望的副作用。最显著且期望的副作用是 `XMLHttpRequest` 对象的能力，它可以设置或获取页面的部分内容。这将消除数据重新加载时的闪烁，并提高应用程序的性能，因为无需重新加载整个页面及其所有资源。这种做法的副作用是，用户通常将无法再为页面添加书签，或使用后退按钮导航到上一页面/状态。\n\
  \n在应用程序中使用 `XMLHttpRequest` 的另一个重要但不太明显的含义是，诸如手机、PDA、屏幕阅读器和即时通讯客户端等客户端缺乏对此技术的支持。此外，Ajax\
  \ 需要额外的工作才能使应用程序可访问；例如，屏幕阅读器期望完整的页面刷新才能正常工作。\n\n\n\n■**注意** 使用 XMLHttpRequest 时，应用程序中不需要表单元素，但有一个功能无论采用常规回发还是\
  \ Ajax 回发都需要表单——文件上传。如果应用程序需要文件上传功能，则必须使用 form.submit()。在 Ajax 环境中，可以通过使用隐藏的 `<iframe>`\
  \ 标签、form.submit() 函数并设置 target 来实现。\n\nAjax 并非万能魔杖\n\n如你所知，XMLHttpRequest 对象是 Ajax\
  \ 中的重要角色，因为它能在客户端和服务器之间异步传输数据。需要理解的是，XMLHttpRequest 并非能自动解决所有问题的万能魔杖。使用 XMLHttpRequest\
  \ 对象时，仍需密切关注性能和可扩展性。如果你意识到这一点，就很容易理解：真正影响性能的是你在请求中发送的内容、响应中接收的内容以及在客户端管理的内容。\n\n\
