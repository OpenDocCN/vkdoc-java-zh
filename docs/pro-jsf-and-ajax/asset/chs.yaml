  \ Mozilla XUL 及其子组件的高层概述。1998 年，Mozilla 组织（Mozilla.org）创建了一个名为 XUL 的开源项目，它是一种基于\
  \ XML 的可扩展 UI 语言，因此可以利用现有标准，包括 XSLT、XPath、DOM，甚至 Web 服务（SOAP）。\n\n使用 XUL，开发人员可以构建丰富的用户界面，这些界面可以部署为\
  \ Web 应用程序、本地桌面应用程序，或部署在其他支持互联网的设备上的桌面应用程序。XUL 利用 Mozilla Gecko 运行时环境（GRE）的支持，以便为用户提供丰富的用户界面。Firefox\
  \ 浏览器和 Thunderbird 电子邮件客户端，以及众多插件，都是基于 XUL 和 Mozilla GRE 的应用程序的两个很好的例子。\n\nXUL 的一大特性是其可扩展性。通过使用\
  \ XBL，XUL 提供了一种声明式方法来创建新的 XUL 组件并扩展现有的 XUL 组件。XBL 还可以弥合 XUL 与 HTML 之间的差距，因为无法将 XUL\
