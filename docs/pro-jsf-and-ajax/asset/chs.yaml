  \ JSF 的美妙之处！在不影响应用程序开发者的前提下，你可以更改 RenderKit ID，以使用其他支持客户端特定标记（本例中为 XUL）的渲染器，从而在\
  \ Mozilla 浏览器中获得优化的性能和响应速度。\n\n**总结**\n\nMozilla 网站说得最好：XUL 很酷！我们强烈建议组件开发者将 XUL\
  \ 视为富 Web 客户端的替代渲染技术。虽然最初使用 XUL 创建 JSF 组件可能看起来令人望而生畏，但只要遵循一个定义明确的蓝图，实际上是非常直接的。\n\
  \n使用 XUL 的一个直接好处是你拥有声明式组件模型。XUL 还提高了性能，并减少了需要创建和维护的 JavaScript 代码量。\n\n我们希望本章能让你清楚地认识到，HTML\
  \ 并非终点，而我们在 J2EE 框架中能做的事情的局限性，有时只存在于我们自己的头脑中！\n\n5807ch08.qxd 1/19/06 7:21 PM Page\
  \ 360\n\n5807ch09.qxd 1/19/06 6:02 PM Page 361\n\n第 9 章\n\n■ ■ ■\n\n提供 Microsoft\
  \ HTC\n\n渲染器\n\n*如果我们珍视对知识的追求，就必须自由地追随探索的指引。自由的思想不是一条拴在十英尺链条上的吠犬。*\n\n——阿德莱·E·史蒂文森二世（1900–1965）\n\
  \n**在**上一章中，我们介绍了 SPIF 应用程序的概念，以及组件编写者如何利用 XUL 快速轻松地为任何支持 Mozilla GRE 的浏览器（如 Firefox\
  \ 和 Netscape）构建标准 JSF 组件。这提供了一个极好的解决方案；然而，Firefox 在浏览器市场中的份额不到 20%1，而该市场由微软 Internet\
  \ Explorer 主导。\n\n\n\n微软在非微软开发者中常被视为邪恶帝国，但你应该认识到，微软曾向 W3C 等标准组织贡献过若干卓越创意。微软还引入了如今广为人知的\
  \ XMLHttpRequest 对象。Ajax 的所有组成部分——DHTML、JavaScript 和 XMLHttpRequest——在微软 Internet\
  \ Explorer 中均可使用，而微软 Outlook Web Access 解决方案自 1998 年起就已运用这些技术来提供更丰富的浏览器体验。\n\n为了让应用程序开发者能够自由地在两大浏览器平台（微软和\
  \ Mozilla）上部署，你必须同时提供对微软 Internet Explorer 的支持。\n\n当然，你可能会辩称，之前创建的 HTML Ajax 解决方案已经提供了对\
  \ Internet Explorer 的支持，但该方案仍未充分发挥 Internet Explorer 作为客户端平台的潜力。\n\n在本章中，你将利用微软的组件模型，该模型与\
  \ Mozilla XUL 提供的模型类似。微软的组件模型被称为 DHTML *行为*，它允许开发者将常规 DHTML 封装到一种独立的文件类型中：即 HTC\
  \ 文件。这种文件类型使开发者能够创建封装动态行为的可重用组件，其工作方式与 XBL 之于 XUL 非常相似。需要注意的是，每个 HTC 文件仅定义一个元素行为。\n\
  \n1\\. 这是本书撰写时浏览器市场占有率的近似百分比。\n\n**361**\n\n5807ch09.qxd 1/19/06 6:02 PM 第 362 页\n\
  \n**362**\n\n第 9 章 ■ 提供微软 HTC 渲染器\n\n**Deck 和 Date 组件的 HTC 实现需求**\n\n本章中 ProInputDate\
  \ 和 ProShowOneDeck 组件的需求很简单——你需要利用微软 Internet Explorer 提供的声明式组件模型。为此，你需要为 deck 和\
  \ date 组件提供特定于 HTC 的 Renderer 类。与第 6 章和第 7 章创建的 deck 和 date 组件所提供的功能相比，支持这种特定于客户端的组件模型不应有任何功能损失。\n\
  \n学完本章后，你应该理解 DHTML 行为与 HTC 之间的区别，了解使用这些技术创建丰富用户界面组件时能获得哪些好处，以及可能遇到哪些问题。\n\n**HTC\
  \ 为 JSF 带来的价值**\n\nHTC 为组件编写者带来的好处与 XUL 类似。然而，Internet Explorer 并未提供任何内置的 HTC 可视化组件。HTC\
  \ 组件模型是 Internet Explorer 运行时引擎的一部分，因此无需在将 JSF 页面结构发送到客户端之前，在服务器上将其“展开”为适当的标记。这反过来会减少网络负载，因为渲染是由客户端而非实际的服务器实现来完成的。\n\
  \n当然，HTC 还提供了开箱即用的丰富客户端交互性，例如弹出功能，从而消除了组件编写者通过 Ajax 等替代方案来实现此功能的需求。\n\n在本章中，你将学习如何将\
  \ Ajax 异步通信通道——XMLHttpRequest——与 HTC 提供的组件模型相结合，以设计可重用且高度交互的标准 JSF 组件。\n\n**JSF\
  \ 为 HTC 带来的价值**\n\nJSF 为 HTC 带来的好处与它为 XUL 带来的好处相同：即 JSP 和 Java 的通用应用程序编程模型。而且，你可以将关于\
  \ XUL 的相同论点应用于 HTC；对 HTC 感兴趣的开发者可以直接使用 HTC，但关键在于，JSF 提供了一种熟悉的编程模型和一个标准的请求生命周期，其中包括自动状态保存与恢复、验证、数据模型和事件处理。\n\
  \n**Deck 和 Date 组件的 HTC 实现**\n\n对于 JSF 组件编写者而言，微软在其 HTC 组件模型中利用 HTML 标记这一事实，为他们提供了一种简单的封装技术——一个扩展名为.htc\
  \ 的常规 HTML 文件。因此，本章的主角是 HTC。\n\n![图片 85](img/index-388_1.png)\n\n5807ch09.qxd 1/19/06\
  \ 6:02 PM 第 363 页\n\n第 9 章 ■ 提供微软 HTC 渲染器\n\n**363**\n\nHTC 在微软 Internet Explorer\
  \ 5 中引入，它提供了一种机制，可以在脚本中将组件实现为 DHTML 行为。HTC 文件以.htc 扩展名保存，是一个包含脚本和一组特定于 HTC 的元素的\
  \ HTML 文件，这些元素将 HTML 文档发布为一个组件。\n\n学完本章后，你应该能够使用微软的 DHTML 行为技术创建丰富的用户界面组件。\n\n图\
  \ 9-1 显示了本章将要创建的三个类。\n\n**图 9-1.** *显示本章创建的所有类的类图* 这些类如下：\n\n• HtmlDocumentRenderer\
  \ 是负责在 HTML 文档中写入根元素的 Renderer。\n• HtcAjaxInputDateRenderer 是 date 组件的一个新的自定义 Renderer，它扩展了第\
  \ 2 章创建的 HtmlInputDateRenderer，并添加了资源以包含 HTC 和 Ajax 支持。\n• HtcAjaxShowOneDeckRenderer\
  \ 是 deck 组件的一个新的自定义 Renderer，它扩展了第 2 章创建的 HtmlRenderer 超类，并添加了资源以包含 HTC 和 Ajax 支持。\n\
  \n**使用蓝图设计 JSF HTC 组件**\n\n蓝图，蓝图，还是蓝图！创建 JSF 组件的蓝图设计方式使其适用于任何标记语言。由于 HTC 利用了 HTML\
  \ 标记，因此它可以使用 JSF 实现提供的默认 HTML RenderKit。或者，你也可以利用第 6 章创建的 HtmlAjaxRenderKit。使用 HtmlAjaxRenderKit\
  \ 的原因是它已经为 HTML 设计并支持 Ajax 回发。在本章中，你将简单地遵循第 7 章最终确定的相同蓝图，特别是步骤 1、5、7、11 和 12。\n\n\
  我们将展示如何通过将新组件实现为最终将发送到客户端的预期标记来定义它。\n\n**步骤 1：创建 UI 原型**\n\n为了能够在本章中对你想要实现的目标进行原型设计，你必须使用\
  \ HTML、DHTML 行为和 HTC 文件类型，以找出需要哪些元素、渲染器特定属性以及其他资源（例如 JavaScript、图像等）。\n\n![图片 86](img/index-389_1.png)\n\
  \n5807ch09.qxd 1/19/06 6:02 PM 第 364 页\n\n**364**\n\n第 9 章 ■ 提供微软 HTC 渲染器\n\n■**注意**\
  \ 有关 DHTML 行为和 HTC 的更多信息，请访问微软 MSDN 网站：http://msdn.microsoft.com。\n\nHTML Date 实现原型\n\
  \n图 9-2 显示了包含在 HTC 中实现的<pro:inputDate>原型的页面。\n\n**图 9-2.** *在 HTML 和 HTC 中实现的* <pro:inputDate>\
  \ *组件*\n\n代码示例 9-1 显示了使用图 9-2 所示的 HTC <pro:inputDate>原型创建页面所需的标记。\n\n**代码示例 9-1.**\
  \ *<pro:inputDate> HTC 实现所需的 HTML 标记*\n\n**<html >**\n\n<head>\n\n<title>Pro JSF\
  \ : ProInputDate</title>\n\n</head>\n\n<body>\n\n<form method=\"post\">\n\n请输入符合模式\
  \ \"d MMMMM yyyy\" 的日期。\n<br></br>\n\n**<script type=\"text/javascript\"**\n\n**src=\"\
  /.../faces/weblets/mabon/mabon.js\" >**\n\n**</script>**\n\n5807ch09.qxd 1/19/06\
  \ 6:02 PM 第 365 页\n\n第 9 章 ■ 提供微软 HTC 渲染器\n\n**365**\n\n**<script type=\"text/javascript\"\
  **\n\n**src=\"/.../faces/weblets/dojo/dojo.js\" >**\n\n**</script>**\n\n**<?import\
  \ namespace=\"pro\"**\n\n**implementation=\"/.../projsf-ch9/inputDate.htc\" ?>**\n\
  \n**<pro:inputDate id=\"dateField\"**\n\n**value=\"2006 年 1 月 26 日\"**\n\n**pattern=\"\
  d MMMMM yyyy\"**\n\n**targetURL=\"/.../projsf-ch9/sample-availability.json\">**\n\
  \n**</pro:inputDate>**\n\n</form>\n\n</body>\n\n</html>\n\n\n\n与 XUL 相比，HTC 最显著的变化是使用\
  \ HTML 而非 XML 作为交付载体。你还需要在 `<html>` 元素中定义命名空间前缀 `pro`。然后，你可以导入并绑定 HTC 组件（即所谓的*元素行为*）到\
  \ `pro` 命名空间中的特定标签名。你在 HTC 组件内部定义标签名，一旦导入该 HTC 组件，就可以在页面中使用带有前缀 `pro` 的元素行为（例如 `<pro:inputDate>`）。\n\
  \n当 HTC 仅需一个元素 `<pro:inputDate>` 时，你也能看到使用 HTC 相比传统 HTML 的优势。HTML 会显得冗长得多。这意味着渲染器只需提供\
  \ `<pro:inputDate>` HTC 元素及其附带属性：`id`、`value`、`pattern` 和 `targetURL`。\n\n■**注意**\
  \ 在代码示例 9-1 中，`<pro:inputDate>` 元素代表一个 HTC 组件，而非 JSF 组件。\n\n为了在 `<pro:inputDate>`\
