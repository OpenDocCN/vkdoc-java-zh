  • DynamicRenderKitViewHandler 重写默认 ViewHandler 的 calculateRenderKitId() 方法，以便从 ApplicationBean\
  \ 获取正确的 ID。\n\n**动态渲染套件 ID 的语法**\n\n\n\nJSF 中一个常被低估的功能是托管 Bean 机制。该机制不仅可用于提供应用程序逻辑，还能在实际应用启动前初始化设置。在此场景下，你可以在\
  \ `faces-config.xml` 文件中使用 JSF EL 语法设置指向托管 Bean（例如 `ApplicationBean`）的指针，该 Bean\
  \ 将被调用并返回正确的 `renderKitId` 给 `ViewHandler`（参见代码示例 10-2）。\n\n**代码示例 10-2.** *设置默认*\
  \ RenderKit *ID*\n\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n\n<!DOCTYPE faces-config\
