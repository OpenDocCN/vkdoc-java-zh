  \n}\n\nWeb 应用程序启动\n\n在接收到 JSF 请求时，JSF 实现必须*启动*或获取对多个进程/服务的引用，这些进程/服务对于在 Servlet\
  \ 或 Portlet 环境中运行的 JSF Web 应用程序必须是可用的。为了访问这些引用，JSF 实现将调用多个工厂，这些工厂负责创建启动 JSF 应用程序所需的实例。\n\
  \n当 JSF Web 应用程序启动时，会实例化四个工厂；每个工厂负责 JSF Web 应用程序中的不同领域：*ApplicationFactory*：`ApplicationFactory`\
  \ 类负责创建 `Application` 实例，该实例可被视为一项服务，例如，它允许 `Lifecycle` 实例为传入请求创建和恢复 JSF 视图（组件层次结构），并存储\
  \ JSF 视图的状态。\n\n5807ch01.qxd 1/3/06 4:47 PM Page 32\n\n**32**\n\n第 1 章 ■ JSF 基础：组件\n\
  \n\n\n*LifecycleFactory*：LifecycleFactory 负责为生命周期标识符返回一个 Lifecycle 实例。默认的 Lifecycle\
  \ 实例负责调用处理逻辑，以实现 JSF 请求处理生命周期中每个阶段所需的功能。\n\n*RenderKitFactory*：RenderKitFactory\
  \ 负责为 JSF Web 应用程序返回一个 RenderKit。RenderKit 是一个包含采用通用渲染技术的多个 Renderer 的库。\n\n*FacesContextFactory*：FacesContextFactory\
  \ 为 JSF 实现提供了一种创建 FacesContext 实例的方法，该实例用于表示与传入请求以及最终响应相关联的上下文信息。\n\n图 1-10 展示了应用程序启动时涉及的角色。\n\
  \n**图 1-10.** *应用程序创建*\n\n每个 JSF Web 应用程序都有一个 ApplicationFactory。这个工厂类负责创建和替换所有使用\
  \ JSF 的应用程序所需的 Application 实例。然后，Application 实例将利用该实例支持的服务为其他进程提供服务。同样，JSF 配置文件——`faces-config.xml`——在\
  \ Web 应用程序创建期间被读取一次，并存储在 Application 实例中。\n\nRenderKitFactory 负责根据此 JSF Web 应用程序的\
  \ RenderKit 标识符返回一个 RenderKit 实例。对于每个 JSF 实现，必须有一个默认的 RenderKit——即由字符串常量 `RenderKitFactory.HTML_BASIC_RENDER_KIT`\
  \ 标识的 HTML RenderKit。LifecycleFactory 负责创建（如果需要）并返回一个 Lifecycle。此 Lifecycle 实例负责调用处理逻辑，以实现请求处理生命周期中每个阶段（参见图\
  \ 1-8）所需的功能。\n\n5807ch01.qxd 1/3/06 4:47 PM 第 33 页\n\n第 1 章 ■ JSF 基础：组件\n\n**33**\n\
