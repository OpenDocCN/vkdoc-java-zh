  \ Ajax）能更轻松地与 JSF 生命周期集成。\n\n在服务器上的用户会话中保存状态的缺点之一是内存消耗。如果可扩展性对应用开发者来说是个问题，那么客户端实现将防止内存消耗失控，并且在集群环境中具有优势。但是，由于状态现在必须在客户端和服务器之间来回发送，响应时间可能会增加。你可以配置状态保存方法，如代码示例\
  \ 1-8 所示，在应用部署描述文件 `WEB-INF/web.xml` 中，通过将参数 `STATE_SAVING_METHOD` 设置为 `client`\
  \ 或 `server`。\n\n**代码示例 1-8.** *在部署描述文件中将状态保存方法设置为服务器端*\n\n<context param>\n\n<param-name>javax.faces.STATE_SAVING_METHOD</param-name>\n\
