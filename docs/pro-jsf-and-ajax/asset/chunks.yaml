  trans: '

    使用 DR2 客户端实现时，依赖修改 DOM 的 Ajax 组件会丢失自上次表单 POST 以来所做的任何更改，但这些 DOM 更改在完整页面刷新时也会丢失。在应用请求值阶段，任何未由组件层次结构表示的额外信息都将被丢弃，当页面渲染时，客户端
    Ajax 处理器会执行 DOM 差异比较，替换响应中与 DOM 不匹配的任何内容。这具有提供额外安全性的好处，并防止通过修改浏览器中的 DOM 表示来恶意篡改应用程序。


    使用服务器端实现时，安全性仍然在 JSF 组件级别应用，但在这种情况下，恶意脚本不会作为响应的一部分在客户端被移除。这是因为服务器拥有攻击发生前的页面缓存版本，因此服务器不知道
    DOM 被篡改。当合并缓存标记和新标记时，你只将增量数据发送回服务器，而不会隐式地“移除”客户端上的任何恶意代码。


    **选择 Ajax 架构**


    尽管 PPR 为组件作者减少了工作量，并为应用程序开发者提供了一些控制，但本书将重点介绍 D2R 方法。在不深入比较客户端和服务器端 D2R 解决方案细节的情况下，两种实现是相似的。基本上，你需要计算初始
    HTML 文档与目标 HTML 文档之间的差异。在页面提交之前，起点仅在客户端已知；提交之后，终点仅在服务器已知。因此，需要传输某些信息，以便将起点和终点都置于服务器端或都置于客户端。


    我们决定使用客户端 D2R，因为它提供了最大的灵活性。此解决方案在客户端应用初始 HTML 文档与目标 HTML 文档之间的差异


    ![Image 39](img/index-257_1.png)


    5807ch06.qxd 1/13/06 11:18 AM Page 232


    **232**


    第 6 章 ■ 为 DECK 组件启用 AJAX


    ，并允许客户端 JavaScript 在客户端执行任何修改。


    如果其他组件不允许修改，那么可以通过记住先前渲染的内容，并将该内容用作下次提交的起点，将差异比较移至服务器端。


    使用客户端 D2R 解决方案，你可以利用 `XMLHttpRequest` 对象的 `responseXML` 属性或 `responseText` 属性（见图
    6-3）。`responseText` 属性返回一个表示从服务器发送的文档的字符串。`responseXML` 属性返回一个表示文档的、正确的 XML DOM
    对象。它是一个完全可访问的 DOM，可以像操作 HTML 文档一样对其进行操作和遍历。


    **图 6-3.** *Ajax 回发实现的时序图*

    当用户点击一个设计为使用 Ajax 的组件（例如，提交按钮）时，常规的表单提交将被覆盖，并创建一个新的 `XMLHttpRequest` 对象实例。然后，你可以使用此
    `XMLHttpRequest` 对象打开一个到服务器的通道，并将编码后的数据作为 URL 表单编码流发送回服务器（HTTP POST）。


    由于 Web 服务器不会检测到你的 Ajax 回发与常规回发之间的区别，因此这不会影响你的服务器端代码。


    你的实现是让改变状态的交互式 UIComponent 始终执行 `XMLHttpRequest`，并让 UICommand 组件在页面上存在文件上传时执行表单回发。


    5807ch06.qxd 1/13/06 11:18 AM Page 233


    第 6 章 ■ 为 DECK 组件启用 AJAX


    **233**


    提供文件上传功能


    出于安全原因，开发者能够提供允许用户从客户端文件系统上传文件的实现的唯一标准方式是使用表单元素或 `form.submit()`。这意味着在 Ajax 中，文件上传需要使用
    `form.submit()` 和一个隐藏的 `<iframe>`，而不是 `XMLHttpRequest`。通常，JSF 的 `ResponseWriter`
    会提供完整页面（HTML）响应，但接收 HTML 或 XHTML 的隐藏 `<iframe>` 也会接收 `<script>` 元素。这些 `<script>`
    元素会立即执行！同样重要的是要理解，这些 `<script>` 元素将在隐藏的 `<iframe>` 的上下文中执行，而不是在完整页面响应时通常执行的主页面中。


    我们选择使用 `XMLHttpRequest` 对象上的 `responseText` 属性，其有效负载包含纯文本格式的 HTML 文档，这有一个积极的副作用：在存在文件上传的情况下，返回的文档不会作为
    HTML 或 XHTML 执行。这也会阻止任何 `<script>` 元素在错误的上下文中执行。另一方面，这要求你处理这些 `<script>` 元素，以便脚本的预期行为在正确的上下文中执行，而不是在隐藏的
    `<iframe>` 中。


    因此，如果你解决了之前提到的文件上传和 `<iframe>` 响应问题，你还有一件事要做。在初始请求中，你仍然期望内容类型是 `text/html`。使用刚刚概述的解决方案，你需要支持动态内容类型（例如，在初始请求或常规表单回发时，提供
    `text/html`；在由你的 Ajax 组件执行的任何后续请求时，提供 `text/plain`）。


    **使用 DOJO 工具包进行文件上传**


    不幸的是，提供的实现往往只涵盖了基本用法，而难以实现的部分则留给了消费应用程序开发者去解决。经过一些研究，我们发现 Dojo 工具包为大多数提到的 Ajax
    不良副作用——后退按钮支持、书签和文件上传——提供了开箱即用的优秀解决方案。


    Ajax 资源


    正如你现在所知，在任何 Web 应用程序中实现 Ajax 都意味着编写 JavaScript，这可能很可怕，尤其是在跨浏览器支持和可访问性方面。


    另一方面，借助 Ajax，开发者可以构建更具吸引力的 JavaScript 应用程序，例如 Google 地图，但通常这意味着需要在客户端编写更多代码来实现这种丰富性。作为组件作者，你可以自由选择任何方向，要么提供你自己的客户端
    Ajax JavaScript，要么（正如我们推荐的）寻找已有的 Ajax JavaScript 库。有几个开源和商业 JavaScript 库可以帮助你处理核心的
    JavaScript/Ajax 实现，让你专注于重要的部分——设计你的 JSF 组件。


    我们决定使用名为 Dojo 的开源 JavaScript 工具包来处理 `XMLHttpRequest` 传输机制，并使用 D2 开源项目来解析和合并源文档与目标文档。


    5807ch06.qxd 1/13/06 11:18 AM Page 234


    **234**


    第 6 章 ■ 为 DECK 组件启用 AJAX


    **介绍 DOJO 工具包**

