    One of the great features of XUL is its extensive component library that is part
    of the Mozilla GRE. As with many good frameworks, XUL also provides a model for
    extending the component set whenever a need for it arises. As discussed in Chapter
    4, the language that developers can use to extend XUL is XBL. XBL allows developers
    to add “custom” components to the extensive set of existing XUL elements. In this
    case, the functionality you are looking for is not available out of the box, so
    you will have to create your own custom XUL component (for example, <pro:inputDate
    ...>) using XBL.


    The XBL Date Component Prototype


    Like XUL, XBL is an XML language, so it has similar syntax rules. The <bindings>
