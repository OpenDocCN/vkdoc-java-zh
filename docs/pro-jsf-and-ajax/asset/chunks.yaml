    在本章中，我们讨论了如何以通用方式以及作为 JSF 的一部分使用 Ajax，并探讨了它带来的优缺点。我们还介绍了在 JSF 中实现 Ajax 支持的不同架构方法——PPR
    和 D2R。此外，我们讨论了 Ajax 的潜在陷阱，例如文件上传支持，以及如何在 JSF 上下文中解决这些问题。


    我们探索了如何使用两个开源项目——Dojo 工具包和 D2 项目——为你的 `ProShowOneDeck` 组件启用 Ajax，并证明了在定义良好且易于使用的
    JSF 组件中提供更丰富的功能并不困难。通过使用像 Dojo 和 D2 这样丰富的工具包，资源文件的数量正在增加，而 weblet 功能提供了一种简单的方法，可以将你的额外资源打包到与组件相同的库中。


