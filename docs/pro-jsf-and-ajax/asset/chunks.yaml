- fmt: "# When you are not using weblets\n\nWhen you are not using weblets, then you\
    \ would not be using the `weblet://` resource path syntax, and you would distribute\
    \ a separate installable ZIP file. When you move to weblets, you would start using\
    \ the `weblet://` resource path syntax in the `Renderer` and include the resources\
    \ in the JAR file. You get no benefit from using a mixture of these approaches\
    \ for resources in the same version of the same component library.\n\n## Using\
    \ Weblets in a JSF Application\n\nTo simplify setup for the application developer,\
    \ component writers should select a default URL mapping for their component libraries.\
    \ The application developer does not need to add *any* weblet-specific configuration\
    \ to the `web.xml` file, since the `WebletsPhaseListener` will be invoked automatically\
    \ to service incoming requests for weblet-managed resources.\n\n## Optimizing\
    \ Weblets Using a Weblet Filter\n\nOptionally, application developers can register\
    \ the `WebletsFilter` in the `/WEB-INF/web.xml` file.\n\nBy performing this simple\
    \ step, they ensure that the weblet-based URLs are much shorter, such as `/projsf-ch5/showOneDeck.js`\
    \ rather than `/faces/weblets/projsf-ch5/showOneDeck.js`.\n\nUsing the `WebletsFilter`\
    \ also reduces the overhead in processing the request because the JSF lifecycle\
    \ is no longer invoked to service the weblet-managed resources via the `WebletsPhaseListener`.\n\
    \nCode Sample 5-9 maps the weblet container to filter URLs beginning with the\
    \ `/projsf-ch5` prefix on the context root. Using this specific URL pattern for\
    \ the `WebletsFilter` mapping prevents unnecessary overhead from being introduced\
    \ by the weblet container for non-weblet requests. If a weblet services a particular\
    \ pattern, such as `/projsf-ch5/*`, then it services all of `/projsf-ch5/*`, with\
    \ no fallback to the context root.\n\n**Code Sample 5-9.** *Weblet Container Configuration\
    \ in the* web.xml *File*\n\n```\n<web-app>\n  <filter>\n    <filter-name>Weblet\
    \ Container</filter-name>\n    <filter-class>net.java.dev.weblets.WebletsFilter</filter-class>\n\
    \  </filter>\n  <filter-mapping>\n    <filter-name>Weblet Container</filter-name>\n\
    \    <url-pattern>/projsf-ch5/*</url-pattern>\n  </filter-mapping>\n  ...\n</web-app>\n\
    ```\n\nThe weblet container is responsible for parsing all weblet configuration\
    \ files (`weblet-config.xml`). It locates them in the same way as JSF locates\
    \ `faces-config.xml` files.\n\nThe weblet container first searches for configuration\
    \ files stored in the `META-INF/` directory of each component library and then\
    \ searches for `/WEB-INF/weblets-config.xml` in the web application root.\n\n\
    This design allows application developers to override the default URL mapping\
    \ defined by the component writer in cases where the URL pattern is already used\
    \ by a web application resource, such as a servlet or filter. For example, Code\
    \ Sample 5-10 overrides the default `<url-pattern>` packaged with the component\
    \ library and instead defines a custom mapping (for example, `/projsf-chapter5-resources/*`).\n\
    \n**Code Sample 5-10.** *Overriding Weblets Mapping*\n\n```\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\" ?>\n<weblets-config >\n  <weblet-mapping>\n    <weblet-name>com.apress.projsf.ch5</weblet-name>\n\
    \    <url-pattern>/projsf-chapter5-resources/*</url-pattern>\n  </weblet-mapping>\n\
    </weblets-config>\n```\n\nThe `Renderer`s automatically consume this URL mapping\
    \ change without the need for any code changes or recompilation.\n\n## Summary\n\
    \nAs a new open source project, Weblets has tremendous potential to become a de\
    \ facto standard that provides a generic and configurable resource-loading facility\
    \ for web clients and the JSF component community. The key differentiators from\
    \ the installables approach are the simplified packaging of JSF components and\
    \ their resources and a minimal overhead of installing and setting up JSF component\
    \ libraries for a particular web application project.\n\nThis chapter explored\
    \ a new way of packaging resources with JSF components. You should now be able\
    \ to leverage weblets in your own component library by including a suitable `weblets-config.xml`\
    \ file and using the `weblet://` protocol-style syntax to reference weblet-managed\
    \ resources.\n\nYou should now understand how weblets integrate with JSF, understand\
    \ the concepts used to package additional resources, and know how to set up and\
    \ optimize an application to use these resources.\n\n# Ajax Enabling the Deck\
    \ Component\n\n*I, not events, have the power to make me happy or unhappy today.\
    \ I can choose which it shall be. Yesterday is dead, tomorrow hasn’t arrived yet.\
    \ I have just one day, today, and I’m going to be happy in it.*\n—Julius Henry\
    \ Marx, known as Groucho Marx\n\nIn this and Chapter 7, we will address the need\
    \ for a smoother and richer user experience when interacting with your components\
    \ in a JSF Web application. As they are currently designed, your components will\
    \ work perfectly well in a traditional HTML Web application and will perform a\
    \ traditional valid form POST. As you have probably noticed, an undesired side\
    \ effect of this traditional way of building Web applications is that a form POST\
    \ will cause the Web application to perform a full-page refresh when the response\
    \ returns to the client browser. This extra flicker when the page reloads is not\
    \ just annoying but also affects the performance of the application. Other side\
    \ effects might be lost data, lost scroll position, and lost focus.\n\nIt is here\
    \ that Ajax comes to the rescue, providing functionality to asynchronously communicate\
    \ with underlying servers and any business services used by the Web application,\
    \ without forcing a reload of the page and its resources. This, in turn, reduces\
    \ flicker and allows the page to maintain scroll position and focus. By leveraging\
    \ a communication channel in JavaScript called `XMLHttpRequest`, developers can\
    \ go beyond tweaking the DOM representation in the browser to provide some dynamic\
    \ rich features. Excellent examples of applications implementing Ajax technology\
    \ are Google GMail, Oracle Collaboration Suite, and Google Suggest; these applications\
    \ prove Ajax is a valid solution for delivering rich features for current Internet\
    \ platforms.\n\nWith increasing consumer awareness about the possibilities of\
    \ RIA solutions, the demand for a smoother and richer interaction is no longer\
    \ optional.\n\n## Requirements for the Deck Component’s Ajax Implementation\n\n\
    First, you need to ensure that your deck component’s Ajax implementation can execute\
    \ a complete JSF lifecycle on a postback (and therefore utilize all the benefits\
    \ of JSF). You also need to figure out what has changed during the JSF lifecycle\
    \ and update the client-side DOM representation with just those changes.\n\nSecond,\
    \ you need to prevent client-side events from going back to the server unnecessarily,\
    \ making sure that only events affecting business logic perform round-trips to\
    \ the server. That means you need to short-circuit the user interface interactivity\
    \ locally at the browser so that potential components such as splitters, table\
    \ column reorders, date pickers, and color pop-ups are not round-tripping to the\
    \ server.\n\nFinally, and most important, you want to make it easy on the application\
    \ developer by abstracting the presentation specifics (for example, HTML, JavaScript,\
    \ XUL, and HTC).\n\n## The Ajax-Enabled Deck Component"
