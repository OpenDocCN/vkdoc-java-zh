  trans: "\n如您所见，您扩展了 `com.apress.projsf.ch3.render.html.HtmlShowOneDeckRenderer`\
    \ 及其 `encodeResources()` 方法，新增了对 `dojo.js` 工具包库、`d2.js` 库以及您为此新渲染器更新的 `showOneDeck.js`\
    \ 的三个调用。应用程序开发者可能会在页面中添加两个或更多 `ProShowOneDeck` 组件，但由您的渲染器实现提供并在第 3 章中描述的 `writeScriptResource()`\
    \ 方法背后的语义，将确保这些资源仅被写入一次。\n\n**ShowOneDeck Ajax 实现**\n\n`showOneDeck.js` 库首次在第\
    \ 3 章中引入，本章将对此库进行一些修改，以完成您的客户端 Ajax 实现。代码示例 6-5 展示了该库的 HTML 版本，代码示例 6-6 展示了其 Ajax\
    \ 版本。\n\n**代码示例 6-5.** *ShowOneDeck.js 库的 HTML 版本*\n```javascript\nfunction _showOneDeck_click(formClientId,\
    \ clientId, itemId)\n{\n    var form = document.forms[formClientId];\n    var\
    \ input = form[clientId];\n    if (!input)\n    {\n        input = document.createElement(\"\
    input\");\n        input.name = clientId;\n        form.appendChild(input);\n\
    \    }\n    input.value = itemId;\n    **form.submit();**\n}\n```\n\n**代码示例 6-6.**\
    \ *ShowOneDeck.js 库的 Ajax 版本*\n```javascript\nfunction _showOneDeck_click(formClientId,\
    \ clientId, itemId)\n{\n    var form = document.forms[formClientId];\n    var\
    \ content = new Object();\n    content[clientId] = itemId;\n    **d2.submit(form,\
    \ content);**\n}\n```\n\n如您所见，`_showOneDeck_click()` 函数（代码示例 6-5）与用于传统 HTML 渲染器（代码示例\
    \ 6-6）的函数类似，但有一个例外。您现在调用的是 `d2.submit()` 函数，而不是传统的 `form.submit()` 函数。在这种情况下，您将激活的表单\
    \ ID 和所选节点的 ID 传递给 `d2.submit()` 函数。`d2.submit()` 函数调用底层的 `dojo.io.bind()` 方法，传递关于要提交哪个表单、内容（即所选组件的\
    \ ID）、接受的请求头（`'X-D2-Content-Type': 'text/html'`）以及此请求的 MIME 类型（`text/plain`）的信息。这些信息将决定展开哪个项目以及为此请求使用哪个\
    \ `ResponseWriter`。\n\n**步骤 6：注册 UIComponent 和 Renderer**\n\n本章不包含任何行为超类，但您仍然需要注册您特定于客户端的渲染器。`HtmlAjaxShowOneDeckRenderer`\
    \ 在 `faces-config.xml` 中注册，如代码示例 6-7 所示。\n\n**代码示例 6-7.** *注册支持 Ajax 的* Renderer\
    \ *和* RenderKit\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\" ?>\n<!DOCTYPE\
    \ faces-config\n    PUBLIC \"-//Sun Microsystems, Inc.//DTD JavaServer Faces Config\
    \ 1.1//EN\"\n    \"http://java.sun.com/dtd/web-facesconfig_1_1.dtd\">\n<faces-config\
    \ >\n    ...\n    <render-kit>\n        <render-kit-id> ... </render-kit-id>\n\
    \        <render-kit-class> ... </render-kit-class>\n        <renderer>\n    \
    \        <component-family>com.apress.projsf.ShowOne</component-family>\n    \
    \        <renderer-type>com.apress.projsf.Deck</renderer-type>\n            <renderer-class>\n\
    \                **com.apress.projsf.ch6.render.html.ajax.HtmlAjaxShowOneDeckRenderer**\n\
    \            </renderer-class>\n        </renderer>\n    </render-kit>\n</faces-config>\n\
    ```\n\n组件系列和渲染器类型与第 3 章中为常规 HTML 版本的 `ProShowOneDeck` 组件定义的相同。这允许您重用第 3 章中定义的\
    \ `ProShowOneDeckTag` 处理器和 TLD。\n\n**步骤 8：创建 RenderKit 和 ResponseWriter**\n\n\
    如前所述，希望在 JSF 应用程序中包含 Ajax 支持的开发者有多种策略可供选择。我们在本章中决定采用的策略——D2R——不仅仅需要一个新的渲染器来提供\
    \ Ajax 功能。正如在“提供文件上传功能”一节中所讨论的，您需要控制输出到客户端的内容，以便在初始请求或常规表单回发时，以 `contentType`\
    \ 设置为 `text/html` 的方式写出请求的文档，并在任何后续的 Ajax 回发时，以 `contentType` 设置为 `text/plain`\
    \ 的方式进行响应。\n\n写入客户端的标记由 `ResponseWriter` 控制，而 `ResponseWriter` 又由 `RenderKit`\
    \ 创建。JSF 实现提供的默认 `RenderKit` 是标准的 HTML `RenderKit`，它附带一个默认的 `ResponseWriter`，仅支持\
    \ `text/html` 类型的内容。为了能够支持您的 Ajax 渲染器所需的 `text/plain` 内容类型，您必须使用一个功能来装饰默认的 `ResponseWriter`，以便在\
    \ Ajax 请求的情况下修正 `contentType`——即 `FixedContentTypeResponseWriter`。使用这个新的 `ResponseWriter`，您还必须提供一个自定义的\
    \ `RenderKit`——`HtmlAjaxRenderKit`——它可以动态地选择默认的 `ResponseWriter` 或自定义的 `FixedContentTypeResponseWriter`。图\
    \ 6-5 展示了如何创建正确的 `ResponseWriter`。\n\n**图 6-5.** *创建正确的* ResponseWriter\n这就够了吗？不，创建您自己的\
    \ `RenderKit` 时的一个问题是，应用程序开发者每个 Web 应用程序只允许设置一个默认的 `RenderKit`。因此，除非您想重新实现所有标准的\
    \ HTML `RenderKit` 渲染器（或者更糟，重新实现应用程序开发者可能使用的每个组件库），否则您必须找到一种方法，从您的自定义 `RenderKit`\
    \ 提供对 `HTML_BASIC` 渲染器的访问。这也是大多数组件作者避免创建新的 `RenderKit` 而默认使用标准 HTML `RenderKit`\
    \ 的原因之一。但是，为了实现此策略，您需要一个能够处理 `text/plain` 的新 `ResponseWriter`，因此您也需要一个新的 `RenderKit`。\n\
    \n您需要一种方法，将您的自定义 `RenderKit` 包装在标准 HTML `RenderKit` 周围，以避免实现应用程序开发者可能使用的所有渲染器。\n\
    \n**注册要包装的 RenderKit**\n\n每个 JSF 应用程序都必须有一个默认的 `RenderKit`，这意味着您需要想出一种注册您的 `RenderKit`\
    \ 的方法，以便您可以在应用程序启动时识别要包装哪个 `RenderKit`。\n\n代码示例 6-8 提供了一个示例，展示了您将用于注册您的 `RenderKit`（`your.render.kit.id`）和您将要包装的\
    \ `RenderKit` 的标识符（`[wrapped.render.kit.id]`）的语法。\n\n**代码示例 6-8.** *替代的* RenderKit\
    \ *注册*\n\n```xml\n<render-kit>\n    **<render-kit-id>your.render.kit.id[wrapped.render.kit.id]</render-kit-id>**\n\
    \    <render-kit-class>your.render.kit.Class</render-kit-class>\n    <renderer>\n\
    \        ...\n    </renderer>\n</render-kit>\n```\n\n图 6-6 展示了 `ExtendedRenderKitFactory`\
    \ 如何包装标准 HTML `RenderKit`。`RenderKitFactory` 负责根据此 JSF Web 应用程序的 `RenderKit` ID\
    \ 返回一个 `RenderKit` 实例。\n\n**图 6-6.** *扩展* RenderKitFactory *并包装标准 HTML* RenderKit\n\
    现在，当您有一种方法可以识别涉及哪些 `RenderKit` 时，您需要用过滤功能来装饰默认的 `RenderKitFactory` 类，以处理与您的语法匹配的\
    \ `RenderKit` ID。任何在 `faces-config.xml` 中定义但与您的语法不匹配的 `RenderKit` ID 都将被委托给标准的\
    \ `RenderKitFactory`。如果 `RenderKit` ID 与您的语法匹配——`your.render.kit.id[wrapped.render.kit.id]`——您就将由实现的第一部分（`your.render.kit.id`）定义的\
    \ `RenderKit` 包装在由方括号（`[wrapped.render.kit.id]`）内定义的 `RenderKit` 周围。\n\n**ExtendedRenderKitFactory\
    \ 类**\n"
- fmt: "为了确保您的解决方案与应用程序开发者使用的 JSF 实现无关，您需要为应用程序开发者以及组件作者提供通用的 API。为此，我们决定提供一个`RenderKitFactoryWrapper`，它扩展了\
    \ JSF 实现的抽象`RenderKitFactory`类，从而为您提供与底层 JSF 实现的松散耦合。\n\n在图 6-7 中，您可以看到 JSF 实现提供的默认`RenderKitFactory`、您的`RenderKitFactoryWrapper`以及装饰性的`ExtendedRenderKitFactory`类之间的关系。`RenderKitFactoryWrapper`的唯一目的是通过委托给底层的`RenderKitFactory`实现，为您提供所需的与底层实现的松散耦合。\n\
    \n**图 6-7.** *`DecoratingRenderKitFactory`的类图*\n\n`ExtendedRenderKitFactory`是您装饰\
    \ JSF 实现提供的`RenderKitFactory`的类，其功能是将一个`RenderKit`包装在另一个`RenderKit`周围，前提是组件作者提供的`RenderKit`\
    \ ID 符合之前定义的语法——`your.render.kit.id[wrapped.render.kit.id]`，如代码示例 6-9 所示。\n\n\
    **代码示例 6-9.** *`ExtendedRenderKitFactory`类*\n\n```java\npackage com.apress.projsf.ch6.render;\n\
    \nimport java.util.regex.Matcher;\n\nimport java.util.regex.Pattern;\n\nimport\
    \ javax.faces.render.RenderKit;\n\nimport javax.faces.render.RenderKitFactory;\n\
    \n/**\n* The ExtendedRenderKitFactory supports dynamic extension of\n* RenderKits\
    \ without needing to reregister all the renderers from the base\n* RenderKit.\n\
    *\n* The following syntax must be used to register the extended RenderKit.\n*\n\
    * <render-kit-id>extended-render-kit-id[base-render-kit-id]</render-kit-id>\n\
    *\n* and the RenderKit implementation class must be of type ExtendedRenderKit.\n\
    */\npublic class ExtendedRenderKitFactory extends RenderKitFactoryWrapper\n{\n\
    \    /**\n     * Creates a new ExtendedRenderKitFactory.\n     *\n     * @param\
    \ delegate the RenderKitFactory delegate\n     */\n    public ExtendedRenderKitFactory\
    \ (\n        RenderKitFactory delegate)\n    {\n        super(delegate);\n   \
    \ }\n\n    /**\n     * Adds a new RenderKit to this RenderKitFactory.\n     *\n\
    \     * If the renderKitId syntax is of the form\n     * extended-render-kit-id[base-render-kit-id]\
    \ and the RenderKit is\n     * and instance of ExtendedRenderKit, then the extended-render-kit-id\n\
    \     * is used to register the RenderKit, and the base-render-kit-id is used\n\
    \     * as the base RenderKit for the ExtendedRenderKit.\n     *\n     * @param\
    \ renderKitId the RenderKit identifier\n     * @param renderKit the RenderKit\
    \ implementation\n     */\n    public void addRenderKit(\n        String renderKitId,\n\
    \        RenderKit renderKit)\n    {\n        Matcher matcher = _EXTENDED_RENDERKIT_ID.matcher(renderKitId);\n\
    \        if (matcher.matches() &&\n            renderKit instanceof ExtendedRenderKit)\n\
    \        {\n            renderKitId = matcher.group(1);\n            String baseRenderKitId\
    \ = matcher.group(2);\n            ExtendedRenderKit extension = (ExtendedRenderKit)renderKit;\n\
    \            RenderKit base = getRenderKit(null, baseRenderKitId);\n         \
    \   extension.setRenderKit(base);\n        }\n        super.addRenderKit(renderKitId,\
    \ renderKit);\n    }\n\n    static final private Pattern _EXTENDED_RENDERKIT_ID\
    \ =\n        Pattern.compile(\"([^\\\\[]+)\\\\[([^\\\\]]+)\\\\]\");\n}\n```\n\n\
    如果组件作者提供的语法与您定义的用于标识扩展`RenderKit`的模式匹配，那么您将代表`RenderKit` ID 的字符串分成两组。组 1 代表您将用于注册`RenderKit`的`RenderKit`\
    \ ID，组 2 是基础`RenderKit`的 ID。如果`RenderKit` ID 语法与用于定义扩展`RenderKit`的模式不匹配，则 ID 不会被修改，并且仍然会传递给被包装的`RenderKitFactory`来注册`RenderKit`——`super.addRenderKit(renderKitId,\
    \ renderKit)`。\n\n> **注意** 我们实现了一个仅包装一个`RenderKit`的解决方案，但这个装饰性的`RenderKitFactory`类理论上可以支持包装多个`RenderKit`。为简单起见，我们决定只包装一个`RenderKit`（例如，`HTML_BASIC`）。\n\
    \n## `ExtendedRenderKit`类\n\n`ExtendedRenderKit`类提供了与`RenderKitFactoryWrapper`类相同的好处（即与底层\
