    **206**


    第 4 章 ■ 使用富互联网技术


    **比较 XBL 和 HTC**


    到目前为止，我们了解到，尽管几种技术的实现方式完全不同，但它们提供了几乎相同的功能。如果你查看 XBL 和 HTC 的语义，会发现许多相似之处：


    • 两者都使用 CSS 将组件或行为附加到 HTML 元素上。

    • 两者都提供了组件内文档树的封装，不暴露内部实现细节。

    • 两者都依赖于底层浏览器平台。


    关键区别如下：


    • XBL 基于 XML，而 HTC 基于 HTML。

    • 它们支持不同的平台——XBL 需要 Mozilla GRE，而 HTC 需要 Microsoft 的 Internet Explorer。


    如果你比较创建和使用组件所必需的部分，它们将分为以下几类——定义组件、实现事件处理、添加内容以及将组件附加到页面。


    **定义组件**


    尽管两者相似，但它们定义组件的方式不同。在 HTC 中，规则是一个 HTC 文件对应一个组件，而在 XBL 中，建议将所有相关的自定义组件放在一个文件中。这影响了组件的定义方式。在
    HTC 的情况下，开发者在 `<public:component tagName="welcome" >` 上设置 `tagName` 属性，以指定该特定
    HTC 组件的标签名称。


    在 XBL 文件中，绑定 ID 将标识要与特定元素一起使用的组件——`<binding id="welcome" >`。然后，通过在 CSS 文件中使用锚点将元素与正确的
    XBL 绑定/组件耦合起来，从而定义该元素。


    **添加内容**


    在 HTC 中，组件内容封装在 `<body>` 元素中；在 XBL 中，内容封装在 `<content>` 元素中。


    **事件处理**


    这两种技术都支持 DOM，尽管同样存在一些细微差别。


    XBL 支持 DOM Level 2（以及部分 Level 3），而 HTC 仅支持 DOM Level 1，因此仅支持事件冒泡和取消，不支持捕获或目标阶段。（这是因为在过去四年中没有发布新版本的
    Internet Explorer。）


    ■**注意** 当前版本的 Internet Explorer 是 6.0。Microsoft 目前正在开发其浏览器 Internet Explorer 的
    7.0 版本，代号为 Rincon。当它最终上市时，距离上次发布已超过四年。


    5807ch04.qxd 1/13/06 2:50 PM 第 207 页


    第 4 章 ■ 使用富互联网技术


    **207**


    如果你查看 HTC 和 XBL 中事件处理的方式，会发现一些更明显的区别：


    • HTC 有三种不同的事件处理方法——开发者可以使用 `<public:attach>` 为组件声明一个全局事件处理器，使用 HTML 元素 `<script
    for="proButton" event="onclick">` 定义一个函数并将其分配给特定元素和事件，最后声明一个事件处理函数并分配对该函数的调用（例如，`onclick="proButton()"`）。

    • XBL 有两种定义事件处理器的方式——一种是在元素上使用预定义的事件处理器，如 `onclick` 或 `onmouseover`，另一种是使用 `<handler>`
    元素为组件全局定义事件处理器。要添加自定义方法，开发者可以使用 `<method>` 元素为组件定义自定义事件处理器。


    **附加组件**


    两种技术都利用 CSS 将行为附加到元素上。使用 XBL 将组件附加到 HTML 页面时，开发者必须使用 `-moz-binding: url()` 属性；使用
    HTC 时，他们必须使用 `behavior: url()` 属性。这两种方法看起来相似，但最终结果却大相径庭。在 XBL 中，样式类名（例如 `pro\:welcome`）将成为标签
    `<pro:welcome>`，并在 DOM 树中被解释为一等元素，从而隐藏任何内部实现。


    HTC 则不同，因为 CSS 方法用于将行为附加到已有的 HTML 元素上（例如，`H1 {behavior:url(projsf.htc)}`），这不会在
    DOM 中声明一等元素，因此会暴露该组件的内部实现。要创建一等元素，开发者必须使用 `<?import namespace="pro" implementation="pro.htc"
    ?>` 元素和命名空间 `<html xmlns:pro >` 来唯一标识导入的组件，并且如前所述，标签的名称在 HTC 文件中使用 `tagName` 属性声明。


    **JSF——有史以来最伟大的发明！**


    在本章描述的技术中，只有 XUL 和 HTC 允许开发者在 Web 应用程序中重用组件。它们允许将 HTML、CSS 和脚本封装到组件中，供应用程序开发者重用。另一方面，Ajax
    提供了与服务器的异步通信，可用于为用户提供响应式 UI。


    这些技术解决了消费者的大部分需求，但它们仍然缺乏对应用程序开发者的支持。


    市场需要一种标准的方式来定义 RIA，使其能够部署在 Web 上而无需受限于特定供应商。一个名为 Web 超文本应用技术工作组（WHAT）的工作组正试图通过利用
    Mozilla 的 XBL 等技术，创建一套适用于所有浏览器的 HTML 扩展标准标签库来实现这一目标。像 Mozilla 的 XBL 这样的技术允许将 HTML、CSS
    和脚本封装到组件中，供应用程序开发者重用，但这些并非标准。


    5807ch04.qxd 1/13/06 2:50 PM 第 208 页


    **208**


    第 4 章 ■ 使用富互联网技术


    ■**注意** WHAT 工作组（http://www.whatwg.org/）正在解决对扩展标准 HTML 元素的合理且理性的开发环境的需求。这将通过一套技术规范来实现，这些规范可以在
    Firefox、Mozilla 和 Internet Explorer 等 Web 浏览器中使用和实现。

