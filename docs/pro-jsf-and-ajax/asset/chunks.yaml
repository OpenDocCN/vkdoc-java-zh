- fmt: 'I was fairly well convinced the answer could only be a resounding “no!” After
    all, there are a good half-dozen books out in stores today, by a whole host of
    Web luminaries, and I’ve even personally helped as a technical reviewer on half
    of those. So what more could really be said on the subject?


    But when I thought about this a bit more, it became clear that all of these books
    go only so far. They’ll show you how to use what JSF gives you out of the box,
    throw you a bone for writing your own components and renderers, and give you maybe
    even a bit more. But none that I’ve seen get to the heart of why JSF is really
    and truly a cool and important technology; they make JSF look like YAMVCF (Yet
    Another Model-View-Controller Framework) for HTML—more powerful here and there,
    easier to use in many places, a bit harder to use in others, but really nothing
    major. And certainly nothing that takes us beyond the dull basics of building
    ordinary-looking Web applications.


    This book goes a lot further. It covers the basics, of course, and shows you how
    to build components, but then it keeps going: on to Ajax, on to HTC, on to XUL—and
    how you can wrap up this alphabet soup underneath the heart of JSF, its component
    model, and how you can leverage it to finally develop Web applications that don’t
    need radical rearchitecting every time the winds of client technologies blow in
    a different direction. Along the way, you’ll learn a wide array of open source
    toolkits that make Web magic practical even when you’re not a JavaScript guru.


    So, heck, I’m convinced. The world *does* need another JSF book.


    Adam Winer


    JSF Expert Group Member and Java Champion


