    \ 之间的一个主要区别是，您不仅需要提供方法表达式，还需要为方法表达式指定的方法提供签名。对于 `valueChangeListener` 方法，这意味着您需要将签名作为一个类数组传递，其中包含一个类——`ValueChangeEvent.class`。\n\
    \n5807ch02.qxd 12/30/05 4:27 PM 第 92 页\n\n**92**\n\n第 2 章 ■ 定义日期字段组件\n\n**METHODBINDING**\n\
    \n`UICommand` 组件使用方法绑定表达式来引用，例如，一个 `Action` 方法或 `ActionListener` 方法。`MethodBinding`\
    \ 类封装了方法绑定的实际求值过程。您可以通过调用 `createMethodBinding()` 方法从 `Application` 实例中获取特定引用的\
    \ `MethodBinding` 实例。请注意，`MethodBinding` 的实例是不可变的，并且不包含对 `FacesContext` 的引用（`FacesContext`\
    \ 在评估引用绑定时作为参数传入）。\n\n为了完善 `UIComponentTagSupport` 类，您需要添加两个方法，用于创建并返回 `ValueBinding`\
    \ 和 `MethodBinding`。代码示例 2-36 展示了 `createValueBinding()` 和 `createMethodBinding()`\
    \ 方法。\n\n**代码示例 2-36.** *`createValueBinding()` 和 `createMethodBinding()` 方法*\n\
    \n```java\n/**\n * 为字符串值返回一个 ValueBinding。\n *\n * @param value 属性字符串值\n *\n *\
    \ @return 解析后的 ValueBinding\n */\nprotected ValueBinding createValueBinding(\n\
    \    String value)\n{\n    FacesContext context = FacesContext.getCurrentInstance();\n\
    \    Application application = context.getApplication();\n    return application.createValueBinding(value);\n\
    }\n\n/**\n * 为字符串值返回一个 MethodBinding。\n *\n * @param value     属性字符串值\n * @param\
    \ signature 方法绑定签名\n *\n * @return 解析后的 MethodBinding\n */\nprotected MethodBinding\
    \ createMethodBinding(\n    String value,\n    Class[] signature)\n{\n    FacesContext\
    \ context = FacesContext.getCurrentInstance();\n    Application application =\
    \ context.getApplication();\n    return application.createMethodBinding(value,\
    \ signature);\n}\n```\n\n5807ch02.qxd 12/30/05 4:27 PM 第 93 页\n\n第 2 章 ■ 定义日期字段组件\n\
    \n**93**\n\n`createMethodBinding()` 方法会评估指定的方法绑定表达式并创建一个 `MethodBinding` 实例。当\
    \ `MethodBinding` 被执行时，会调用表达式引用的方法。当方法被调用时，某些参数会传递给后台 bean 方法，例如，对于附加到 `valueChangeListener`\
    \ 属性的 `MethodBinding`，会传递一个 `ValueChangedEvent`。`MethodBinding` 必须动态查找正确的方法签名，以确保调用正确的方法。\n\
