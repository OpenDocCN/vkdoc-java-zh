- fmt: 'Using the DR2 client-side implementation, Ajax-enabled components that rely
    on modifying the DOM will lose any changes made since the last form POST, but
    those DOM changes would be lost on a full-page refresh as well. At the Apply Request
    Values phase, any additional information not represented by the component hierarchy
    will be dropped, and when the page is rendered, the client-side Ajax handler will
    perform a DOM diff, replacing anything that does not match the DOM on the response.
    This has the benefit of providing additional security and preventing any malicious
    tampering with the application by modifying the DOM representation in the browser.


    With the server-side implementation, the security is still applied at the JSF
    component level, but in this scenario the malicious script is not removed on the
    client as part of the response. This is because the server has a cached version
    of the page dating from before the attack, so the server is not aware of the tampering
    of the DOM. When the merge of the cached and new markup is done, you are sending
    only delta data back to the server and are not implicitly "removing" any malicious
    code on the client.


    ## Selecting Ajax Architecture


    Although PPR provides less work for the component author and some control for
    the application developer, we will focus on the D2R approach for this book. Without
    getting into the details of comparing the client and server-side D2R solutions,
    both implementations are similar. Basically, you need to calculate the difference
    between the initial HTML document and the targeted HTML document. Before the page
    is submitted, the start point is known only on the client; after submit, the end
    point is known only on the server. So, something needs to be transmitted to get
    the start point and end point both on the server or both on the client.


    We have decided to use the client-side D2R since it offers maximum flexibility.
    This solution applies the diff between the initial HTML document and the targeted
    HTML document


    ![Image 39](index-257_1.png)


    on the client and also allows client-side JavaScript to perform any modifications
    at the client.


    If no modifications are permitted by other components, then the diff could be
    moved to the server by remembering what was previously rendered and be used as
    the start point on the next submit.


    With the client-side D2R solution, you can leverage either the `responseXML` property
    or the `responseText` property of the `XMLHttpRequest` object (see Figure 6-3).
    The `responseText` property returns a string representing the document sent from
    the server. The `responseXML` property returns a proper XML DOM object representing
    the document. It is a completely accessible DOM that can be manipulated and traversed
    in the same way as you would do with an HTML document.


    **Figure 6-3.** *Sequence diagram over your Ajax postback implementation*


    When the user clicks a component (for example, a submit button) that has been
    designed to use Ajax, the regular form submit will be overridden, and a new instance
    of the `XMLHttpRequest` object will be created. You can then use this `XMLHttpRequest`
    object to open a channel to the server and send the encoded data as a url-formencoded
    stream back to the server (HTTP POST).


    Since the Web server will not detect the difference between your Ajax postback
    and a regular postback, this will not affect your server code.


    Your implementation is to have interactive UIComponents that change their states
    always perform `XMLHttpRequests` and to have UICommand components perform form
    postbacks when a file upload is present on the page.


    ## Providing File Upload Functionality


    For security reasons, the only standard way a developer can provide an implementation
    that gives the user access to upload files from the client file system is to use
    a form element or `form.submit()`. This means that in Ajax a file upload requires
    using a `form.submit()` and a hidden `<iframe>`, instead of `XMLHttpRequest`.
    Normally, the JSF `ResponseWriter` will deliver a full-page (HTML) response, but
    a hidden `<iframe>` that receives HTML or XHTML will also receive `<script>` elements.
    These `<script>` elements will be executed immediately! It is also important to
    understand that these `<script>` elements will be executed in the context of the
    hidden `<iframe>`, not in the main page where they would normally be executed
    on a full-page response.


    We have chosen to use the `responseText` property on the `XMLHttpRequest` object,
    whose payload contains the HTML document in plain-text format, which has the positive
    side effect that, in the presence of file upload, the returned document will not
    be executed as HTML or XHTML. This will also prevent any `<script>` elements from
    being executed in the wrong context. This, on the other hand, requires that you
    handle these `<script>` elements so the intended behavior of the script gets executed
    in the right context and not in the hidden `<iframe>`.


    So, if you solve the previous issue with file upload and the response for the
    `<iframe>`, you still have one more thing to do. On the initial request, you are
    still expecting the content type to be `text/html`. With the solution just outlined,
    you need to support dynamic content types (for example, on the initial request
    or a regular form postback), serve up `text/html`, and (on any subsequent request
    performed by your Ajax-enabled components) serve up `text/plain`.


    ### File Upload with the Dojo Toolkit


    Unfortunately, too often the implementation provided just covers the basic usage,
    and the hard parts to implement have been left to the consuming application developer
    to work around. After some research, we found that the Dojo toolkit provides excellent
    solutions to most of the Ajax undesired side effects mentioned—back button support,
    bookmarking, and file upload—out of the box.


    ## Ajax Resources


    As you know by now, implementing Ajax in any Web application means writing JavaScript,
    which can be dreadful, especially when it comes to cross-browser support and accessibility.


    On the other hand, with Ajax, developers can build more appealing JavaScript applications
    such as Google Maps, but quite often it means more code on the client side to
    achieve this richness. As a component author, you are free to choose any direction
    by either providing your own client-side Ajax JavaScript or, as we recommend,
    searching for already available Ajax JavaScript libraries. Several open source
    and commercial JavaScript libraries can help you with the hard-core JavaScript/Ajax
    implementations and let you focus on the important part—designing your JSF component.


    We have decided to go with the open source JavaScript toolkit called Dojo for
    the `XMLHttpRequest` transport mechanisms and the D2 open source project for parsing
    and merging the source document with the target document.


    ## Introducing the DOJO Toolkit'
