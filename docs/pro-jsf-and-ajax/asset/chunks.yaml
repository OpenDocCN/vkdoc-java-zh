    the action attribute requires a method that returns a String object and the actionListener
    attribute requires a method that accepts an ActionEvent that has a void return
    type. The action attribute’s string value is used for navigation purposes.


    When the queued ActionEvent is processed, these method-binding expressions will
    be used to execute the backing bean methods referenced by action and actionListener.


