    第 1 章 ■ JSF 基础：组件


    如果返回值为 `null`，恢复视图阶段将在此请求的 FacesContext 上调用 `renderResponse()`。`renderResponse()`
    方法将指示，当此阶段完成时，将调用 `render()` 方法来执行阶段 6——渲染响应——而不继续执行阶段 2 到阶段 5。随后，恢复视图阶段将调用 `ViewHandler.createView()`
    方法来创建组件层次结构的根——`UIViewRoot`——并将其附加到 FacesContext。`UIViewRoot` 组件不执行渲染，但在回发请求期间的事件传递中扮演重要角色。


    **渲染响应阶段**


    当在恢复视图阶段调用 `renderResponse()` 方法时，生命周期直接跳转到 `render()` 方法，该方法负责执行渲染响应阶段，如图 1-12
    所示。


    **图 1-12.** *初始请求期间的渲染响应阶段* 在此阶段，调用 `ViewHandler.renderView()` 方法来执行 JSP 文档。`renderView()`
