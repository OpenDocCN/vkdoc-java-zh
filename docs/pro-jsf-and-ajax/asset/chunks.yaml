    **图 1-18.** *将请求中传递的新值应用于组件* 此时，提交的值仅作为“已提交”状态存储在组件上，尚未推入底层模型。当“应用请求”阶段完成时，渲染器不再需要观察请求参数，因为所有值都已在每个组件上更新。


    **处理验证阶段**


    在处理验证阶段，通过调用 `UIViewRoot` 上的 `processValidators()` 方法来执行转换和验证。图 1-19 展示了转换和验证过程。


    5807ch01.qxd 1/3/06 4:47 PM 第 41 页


    第 1 章 ■ JSF 的基础：组件


    **41**


    **图 1-19.** *执行转换和验证* 此过程将继续递归调用组件层次结构中每个组件上的 `processValidators()` 方法。在每个 `HtmlInputText`
    组件的验证过程中，首先会对组件的提交值进行类型转换（例如，将字符串转换为强类型对象）。新对象被设置为组件上的本地值，并清除提交值。然后验证新的强类型对象。如果没有错误，下一步是将一个
    `ValueChangeEvent` 加入队列，该事件将在“应用请求值”阶段结束时传递。


    如果发生转换或验证错误，则会使用组件客户端 ID 将相应的 JSF 消息附加到 `FacesContext`，然后调用 `renderResponse()`
    方法，以指示生命周期在处理验证阶段完成后应直接跳转到“渲染响应”阶段。


    **更新模型阶段**


    在生命周期的这个阶段，所有提交的值都已成功转换和验证，因此可以安全地将它们推入底层数据模型。在更新模型阶段，JSF 生命周期遍历组件层次结构，在每个组件上调用
    `processUpdates()` 方法。图 1-20 展示了更新模型阶段更新底层模型的过程。


    为了确定新值的存储位置，`processUpdates()` 方法将使用值绑定，该绑定在组件的 `value` 属性中定义（例如，`#{credentials.username}`）。值绑定指向托管
    Bean 上的一个属性（例如，`username`）。使用值绑定，组件上本地存储的值被推入数据模型，并且组件上本地存储的值被清除。


    模型上的任何 JSF 消息和错误（例如，由模型实现的验证）都会使用组件的客户端 ID 附加到 `FacesContext`。然后调用 `renderResponse()`
    方法，以指示生命周期在更新模型阶段完成后应直接跳转到“渲染响应”阶段。


