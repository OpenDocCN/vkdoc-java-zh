    `var` 属性定义了一个相对变量 `row`，每个标记组件都使用该变量来检索每行的唯一数据。只要在回传期间能够访问组件层次结构，这种方法就能正常工作。在客户端，每行的表达式看起来都一样，因此任何依赖此表达式来调用底层托管
    Bean 方法的客户端 Ajax 实现都无法正常工作。任何附加的托管 Bean 在常规回传期间都能正常工作，但使用 PhaseListener 或 Lifecycle
    方法的 Ajax 请求将无法定位到正确的数据行。因此，当使用相对变量设置时，依赖托管 Bean 提供数据（例如，获取特定员工的可用日期）的 Ajax 组件将无法正常工作。


    **相对变量的可能解决方案**


    你可以尝试通过实现对 UIData 组件的支持来解决此问题，但无法保证父组件是 UIData 类型，因为组件作者完全可以在不继承 UIData 组件的情况下提供用于标记对象的组件。此类组件的示例包括
    Oracle 的 ADF Faces 表格和 treeTable 组件。


    最好的解决方案是让 JSF 规范支持将相对表达式转换为绝对表达式。这样，组件编写者就可以在初始渲染期间将相对变量转换为绝对变量。渲染后的表达式可以采用以下形式：


    #{managedBean.employeeList[1].getValidDates}，表示这是标记集合中的第一行。


    **第 4 步：创建转换器和验证器**


    如第 1 章所述，JSF 实现为任何类型的 UIComponent 提供了辅助类。这些辅助类分为转换器、验证器以及事件和监听器模型，每个类都有其专长领域。在本节中，你将构建自己的验证器，对强类型的
    Date 对象执行验证，以确保所选日期确实可用（例如，不是周末或节假日）。


    代码示例 7-4 使用了你将设计的验证器。其目的是验证输入的值，并将其与标记为“不可用”的日期列表进行比较。提供给应用程序开发人员支持 Bean 的约定是返回一个布尔数组——`#{managedBean.getValidDates}`。该数组指示某个日期是否可用（true）或不可用（false）。支持
    Bean 提供的这个数组也用于浏览器，以显示哪些日期可供选择。


