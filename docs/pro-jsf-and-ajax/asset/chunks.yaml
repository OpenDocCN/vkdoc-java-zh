  raw: 'The ProInputDateTag uses the Application to create the component by defining
    the component type—com.apress.projsf.ProInputDate. This will create a ProInputDate
    instance, which has a default renderer type of com.apress.projsf.Date. However,
    it is possible for the local Web application faces-config.xml to override the
    component class that should be created for this component type. Therefore, the
    tag handler must explicitly set the renderer type on the newly created component
    instance and not rely on the default renderer type specified in the ProInputDate
    constructor. This will guarantee your HtmlProInputDateRenderer is used for the
    component instance created by the ProInputDateTag when using the default HTML


    basic RenderKit.


    The ProInputDateTag class extends your UIComponentTagSupport, which is the helper
    class for all your JSP custom actions that correspond to UI components in a page
    that is rendered by JSF. As shown in Code Sample 2-37, the ProInputDateTag manages
    all other behavioral properties and the renderer-specific attributes for your
    component, and you must ensure this tag handler uses the right component type
    and renderer type.


    **Code Sample 2-37.** *The* ProInputDateTag *Class* package com.apress.projsf.ch2.taglib.pro;


    import javax.faces.component.UIComponent;


