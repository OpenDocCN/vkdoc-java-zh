- fmt: "# 排版后的内容\n\nAn application developer will use a custom action (a.k.a. *tag*)\
    \ in a JSP page description to indicate which `JSF UIComponent` is needed for\
    \ the application. The custom action has a corresponding tag handler class, which\
    \ is responsible for creating the `UIComponent` and transferring each declarative\
    \ JSP tag attribute to the `UIComponent` instance. The syntax of the custom action\
    \ has both behavioral attributes and renderer-specific attributes. Therefore,\
    \ each such custom action is tied to a particular component family and renderer\
    \ type combination. For example, the standard HTML `RenderKit` provided by the\
    \ JSF implementation supports three `Renderer` types for the `UIInput` component\
    \ (`Text`, `TextArea`, and `Secret`), which require three separate custom actions\
    \ (`inputText`, `inputTextArea`, and `inputSecret`). You are extending the `UIInput`\
    \ component and adding a new `Renderer` type—`com.apress.projsf.Date`—and you\
    \ must therefore also provide a new JSP custom action, `inputDate`.\n\nFigure\
    \ 2-11 shows a class diagram over the tag handler and its support class that you\
    \ will create.\n\n**Figure 2-11.** *Class diagram over the* `ProInputDate` *tag\
    \ handler and its support class*\n\n## The `UIComponentTagSupport` Class\n\nBefore\
    \ you start with the actual tag handler for your custom action, you’ll learn about\
    \ your abstract `UIComponentTagSupport` tag handler class. If you planned to just\
    \ create one component, you would not need the support tag handler class shown\
    \ in Code Sample 2-31, but since you are planning on adding more components to\
    \ your JSF component library, it makes sense to separate what functionality is\
    \ common among all components into a support tag handler superclass.\n\n**Code\
    \ Sample 2-31.** *The* `UIComponentTagSupport` *Class*\n\n```\npackage com.apress.projsf.ch2.taglib;\n\
    \nimport java.util.Map;\n\nimport javax.faces.application.Application;\n\nimport\
    \ javax.faces.component.UIComponent;\n\nimport javax.faces.context.FacesContext;\n\
    \nimport javax.faces.el.MethodBinding;\n\nimport javax.faces.el.ValueBinding;\n\
    \nimport javax.faces.webapp.UIComponentTag;\n\n/**\n * UIComponentTagSupport provides\
    \ common helper methods for\n * JavaServer Faces UIComponent tag handlers.\n */\n\
    \nabstract public class UIComponentTagSupport extends UIComponentTag\n\n{\n```\n\
    \nThe `UIComponentTagSupport` class extends the `UIComponentTag`, which is the\
    \ base class for all JSP custom actions that correspond to UI components in a\
    \ page that is rendered by JSF. The `UIComponentTag` handler base class manages\
    \ component properties supported by all `UIComponents` (for example, `id`, `rendered`,\
    \ and `binding`). The `UIComponentTagSupport` class provides helper methods to\
    \ your tag handler classes that will be registered in the TLD as custom actions.\n\
    \nFor each of the attributes available on a `UIComponent`, an application developer\
    \ can set either a static value or a JSF Expression Language (EL) expression of\
    \ type value binding or method binding. To ensure that you can handle the attributes\
    \ for your components, you can implement four utility methods—`setStringProperty()`,\
    \ `setBooleanProperty()`, `setValueBindingProperty()`, and `setMethodBindingProperty()`.\n\
    \nCode Sample 2-32 shows the `setStringProperty()` method that is handling `String`\
    \ attributes and properties.\n\n**Code Sample 2-32.** *Method Handling String\
    \ Attributes and Properties*\n\n```\n/**\n * Sets a component string property\
    \ as a value binding, or string literal.\n *\n * @param component the Faces component\n\
    \ * @param attrName the attribute name\n * @param value the attribute value\n\
    \ */\nprotected void setStringProperty(\n    UIComponent component,\n    String\
    \ attrName,\n    String value)\n{\n    if (value == null)\n        return;\n\n\
    \    if (isValueReference(value))\n    {\n        component.setValueBinding(attrName,\
    \ createValueBinding(value));\n    }\n    else\n    {\n        component.getAttributes().put(attrName,\
    \ value);\n    }\n}\n```"
