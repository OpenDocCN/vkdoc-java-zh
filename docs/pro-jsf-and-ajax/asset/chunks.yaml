    the custom action element is defined in the nested `<name>` element (for example,
    `<name>document</name>`), and the tag handler class is defined in the `<tag-class>`
    element. The `<body-content>` element describes how this tag should be processed.
    If the custom action has attributes, they have to be defined with the `<attribute>`
    element. For each attribute in the TLD, the `<rtexprvalue>` element must be set
    to `false`, and the attribute class must be left unspecified, allowing it to default
    to `String`. For more information about the `<rtexprvalue>` element, see Chapter
    2.


    ### Step 9: Creating a RenderKit and ResponseWriter


    For the solution to work, you need to control the output to the client so that
    you write out the requested XML document with the `contentType` set to `application/vnd.mozilla.xul+xml`
    on initial request and on regular form postback; on any subsequent Ajax postback,
    you respond with the `contentType` set to `application/xml`.


    To be able to support the content type `application/vnd.mozilla.xul+xml` as required
    by the XUL Renderer classes, you have to extend the default `ResponseWriter`—`XMLResponseWriter`—with
    support for XML documents. This `XMLResponseWriter` will be used during the initial
    request and regular form postback.


