    <f:convertDateTime pattern="dd MMMMM yyyy" />


    </h:outputText>


    The code in bold is the input date component you will create in this chapter.


    **Step 2: Creating a Client-Specific Renderer**


    As discussed in Chapter 1, a Renderer is responsible for the output (presentation)
    to the client, whether that is WML markup for a mobile device or traditional HTML
    markup for a browser client. A Renderer also provides client-side attributes that
    are not supported by the behavioral UIComponent class, such as style, width, height,
    and disabled.


    In cases where no new behavior is needed, only a Renderer is required to create
    a “new”


    component. The renderer-specific component subclass described later in this chapter
    (see the “Step 3: Creating a Renderer-Specific Subclass” section) is merely a
    convenience class for application developers. Although not strictly necessary,
    it is common practice to implement the client-specific component subclass to make
    some aspects of application development easier.


    For this input date component, you’ll reuse the UIInput component superclass because
    it provides the component behavior you need. Now it is time to focus on providing
    the UIInput component with a custom input date Renderer. Based on the earlier
    blueprint, you have now reached the second step, and it is time to start looking
    at the code that comprises the Renderer.


    Figure 2-3 shows the custom Renderer, HtmlInputDateRenderer, that you will create
    in this chapter. The custom Renderer extends the HtmlRenderer utility superclass,
    which extends the standard Renderer class (javax.faces.render.Renderer).


    ![Image 12](index-81_1.png)


    5807ch02.qxd 12/30/05 4:27 PM Page 56


    **56**


    C H A P T E R 2 ■ D E F I N I N G T H E D AT E F I E L D C O M P O N E N T


    **Figure 2-3.** *Class diagram over the* HtmlInputDateRenderer *class created
    in this chapter* The HtmlRenderer Superclass


    The HtmlRenderer superclass provides some convenience methods for encoding resources
    needed by the HTML Renderer. An application developer might add two or more input
    date components to the page; therefore, if not taken care of, any resource (for
    example, a style sheet) used by the input date component will be written to the
    client multiple times.


    The semantics behind the methods provided by the HtmlRenderer implementation will
