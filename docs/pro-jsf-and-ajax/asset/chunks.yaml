    of application software. By leveraging IoC, the framework manages which application-specific
    methods are called in response to user events.


    ■**Note** IoC means you have registered some part of your code with the framework,
    and the framework will call this code when the client requests it. This is also
    referred to as the *Hollywood principle*. (“Don’t call us.


    We’ll call you.”)


    In the previous retail software scenario (refer to Figure 1-1), frameworks can
    help increase developer productivity and ease of maintenance, but the frameworks
    are also incompatible with each other, which makes integration hard to handle.
    In contrast, JSF is a standard framework that aims to solve incompatibility.


    5807ch01.qxd 1/3/06 4:47 PM Page 8


    **8**


    C H A P T E R 1 ■ T H E F O U N D AT I O N O F J S F : C O M P O N E N T S


    **Introducing JSF**


    In short, JSF is a UI component framework for J2EE applications. Before we start
    covering UI components (and by *UI components* we mean building blocks for application
    developers, not components of the framework itself), it is worthwhile to elaborate
    on why you need yet another framework. JSF is, after all, attempting to solve
    the same problems as the aforementioned Apache Tapestry or Oracle ADF UIX, frameworks
    that have been around for quite some time and have proved to be successful.


    The differentiator that JSF brings, which other similar frameworks do not have,
    is the backing of a standard specification (JSR-127). Because JSF is part of the
    J2EE standard specification, it is a top priority for every major J2EE tools vendor
    in the market (including Oracle, IBM, Borland, and Sun) to support it, which in
    turn will guarantee a wide adoption and good tools support.


    Most Web applications are stuck in the 1990s where too much effort was put into
    basic plumbing and not into high-level components. Basically, when there is limited
    abstraction or no abstraction over the markup, the development of Web applications
    becomes cumbersome and hard to maintain. You can invest a lot of time into the
    application to make it rich and interactive using various technologies from applets,
    plug-ins (Flex), Dynamic HTML


    (DHTML), and JavaScript. Used together, these technologies can make up an interactive
    and powerful Web application, but how do you maintain such an application? How
    do you reuse what you have built?


    Component Model


    JSF brings to the table a best-of-breed J2EE framework. JSF is here to simplify
    life for application developers, making it possible for them to focus on the view
    without needing to know the underlying markup or scripts. They will see an improvement
    in productivity with JSF using UI components that hide most of the grunt work
    of integrating richer functionality into Web applications. The goal is to provide
    an easy way to construct UIs from a set of reusable UI components.


    These reusable components come in various shapes with different functionality,
    from layout components (such as the layout of an entire page) to simple buttons.
    Application developers can use these components to construct a page and nest UI
    components within each other to get the desired effect; for example, nesting text
    fields and buttons within a row layout component will render the nested UI components
    in a single row on the client. This structure of nested components is often referred
    to as a *parent-to-child* relationship and visualized as a UI component hierarchy.
    This UI component hierarchy represents a JSF page description at runtime.


    Navigation Model


    JSF provides a declarative navigation model, which allows application developers
    to set navigation rules to define the navigation from one view to another in a
    Web application. Navigation rules in JSF are defined inside the JSF configuration
    file, faces-config.xml, and are page-based. Code Sample 1-1 shows a navigation
    rule configured in faces-config.xml.


    5807ch01.qxd 1/3/06 4:47 PM Page 9


    C H A P T E R 1 ■ T H E F O U N D AT I O N O F J S F : C O M P O N E N T S


    **9**


    **Code Sample 1-1.** *Navigation Rule Configured in* faces-config.xml


    <navigation-rule>


    **<from-view-id>/login.jspx</from-view-id>**


    <navigation-case>


    **<from-outcome>success</from-outcome>**


    **<to-view-id>/result.jspx</to-view-id>**


    </navigation-case>


    </navigation-rule>


    In Code Sample 1-1, a navigation rule is set so that from a view, login.jspx,
    on an outcome of success, the user will be sent to a page called result.jspx.
    The outcome is the return value from an action performed in the application such
    as a button being clicked. In JSF, an action is attached to the UIComponent, which
    allows for fine-grained control on the page. These actions can either have their
    own navigation rule or share the same navigation rule.


    Application Lifecycle


    Another benefit that application developers will discover when using JSF is that
    the framework helps manage UI state across server requests. Instead of having
    to take care of user selections and passing these selections from page to page,
    the framework will handle this for you. The JSF framework also has built-in processes
    in the lifecycle to assist with validation, conversion, and model updates. As
    a side bonus, JSF provides a simple model for delivering client-generated events
    to server-side application code.


    **Application Development with JSF**'
  trans: '

    与十年前相比，如今客户对新的 Web 应用程序项目提出了更高且更具体的要求。他们需要更丰富、更友好的 Web 应用程序，这些程序需内置安全性、可访问性、国际化、可移植性等特性。多层应用程序必须成功交付所有这些功能，尽管额外的故障场景增加了复杂性，并且可扩展性和安全性要求也更高了。


    构建应用程序日益增长的复杂性催生了对简洁性的需求。到目前为止，在 J2EE 领域，Web 应用程序还没有一个明确的技术选择。传统的应用程序编程接口（API），如
    JSP 和 Servlet，并未真正提供足够的抽象来摆脱实现多层应用程序的底层繁重工作。为了满足这些需求并提供一定程度的简洁性，行业的发展方向是，开源社区和软件公司为应用程序开发者提供框架，以保护他们免受多层应用程序带来的复杂性影响。


    **Tapestry、Struts、Tiles、TopLink、Hibernate、ADF UIX……**


    许多框架具有相同的基本思想，但在解决问题的方式上略有不同，并且作用于多层应用程序的不同层（视图层、控制器层和模型层）。框架的例子包括 Struts（一个开源控制器框架）；TopLink
    和 Hibernate（模型框架）；以及 Tiles、Tapestry、XUL 和 ADF UIX（所谓的视图框架）。


    应用程序框架的好处在于它们为开发者提供的模块化、可重用性和控制反转（IoC）。通过封装实现细节，框架增强了模块化，并通过集中设计和实现细节的影响来提高软件质量。得益于框架提供的稳定环境，它们还允许开发者创建可在新应用程序中重用的通用组件，从而增强了可重用性。这种框架组件的重用提高了应用程序开发者的生产力和应用软件的质量。通过利用
    IoC，框架管理哪些特定于应用程序的方法被调用来响应用户事件。


    ■**注意** IoC 意味着你已将代码的某些部分注册到框架中，当客户端请求时，框架将调用此代码。这也被称为*好莱坞原则*。（“别打电话给我们。我们会打给你。”）


    在之前的零售软件场景中（参见图 1-1），框架可以帮助提高开发者的生产力和易于维护性，但这些框架彼此之间也不兼容，这使得集成难以处理。相比之下，JSF 是一个旨在解决不兼容性问题的标准框架。


    5807ch01.qxd 1/3/06 4:47 PM 第 8 页


    **8**


    第 1 章 ■ JSF 的基础：组件


    **介绍 JSF**


    简而言之，JSF 是一个用于 J2EE 应用程序的 UI 组件框架。在我们开始介绍 UI 组件（*UI 组件* 指的是应用程序开发者的构建块，而非框架本身的组件）之前，有必要详细说明为什么你还需要另一个框架。毕竟，JSF
    试图解决与上述 Apache Tapestry 或 Oracle ADF UIX 相同的问题，这些框架已经存在相当长一段时间，并且已被证明是成功的。


    JSF 带来的、其他类似框架所没有的差异化优势，是标准规范（JSR-127）的支持。由于 JSF 是 J2EE 标准规范的一部分，因此市场上每个主要的 J2EE
    工具供应商（包括 Oracle、IBM、Borland 和 Sun）都优先支持它，这反过来将保证其广泛采用和良好的工具支持。


    大多数 Web 应用程序仍停留在 1990 年代，那时太多精力投入在基础管道工程上，而不是高级组件上。基本上，当对标记语言缺乏抽象或没有抽象时，Web 应用程序的开发就会变得繁琐且难以维护。你可以投入大量时间，使用各种技术（如
    applet、插件（Flex）、动态 HTML（DHTML）和 JavaScript）来使应用程序变得丰富和交互。这些技术结合使用，可以构建一个交互式且功能强大的
    Web 应用程序，但你如何维护这样的应用程序？你如何重用已经构建好的内容？


    组件模型


    JSF 提供了一个一流的 J2EE 框架。JSF 旨在简化应用程序开发者的生活，使他们能够专注于视图，而无需了解底层的标记或脚本。他们将看到使用 JSF 的生产力提升，因为
    UI 组件隐藏了将更丰富功能集成到 Web 应用程序中的大部分繁重工作。其目标是提供一种从一组可重用的 UI 组件构建 UI 的简便方法。


    这些可重用组件具有不同的形状和功能，从布局组件（例如整个页面的布局）到简单的按钮。应用程序开发者可以使用这些组件来构建页面，并将 UI 组件相互嵌套以获得所需效果；例如，将文本字段和按钮嵌套在行布局组件中，将在客户端上以单行形式呈现嵌套的
    UI 组件。这种嵌套组件的结构通常被称为*父子*关系，并可视化为 UI 组件层次结构。此 UI 组件层次结构在运行时表示一个 JSF 页面描述。


    导航模型


    JSF 提供了一个声明式导航模型，允许应用程序开发者设置导航规则，以定义 Web 应用程序中从一个视图到另一个视图的导航。JSF 中的导航规则在 JSF 配置文件
    `faces-config.xml` 中定义，并且是基于页面的。代码示例 1-1 显示了在 `faces-config.xml` 中配置的导航规则。


    5807ch01.qxd 1/3/06 4:47 PM 第 9 页


    第 1 章 ■ JSF 的基础：组件


    **9**


    **代码示例 1-1.** *在* faces-config.xml *中配置的导航规则*


    <navigation-rule>


    **<from-view-id>/login.jspx</from-view-id>**


    <navigation-case>


    **<from-outcome>success</from-outcome>**


    **<to-view-id>/result.jspx</to-view-id>**


    </navigation-case>


    </navigation-rule>


    在代码示例 1-1 中，设置了一个导航规则，使得从视图 `login.jspx` 出发，在结果为 `success` 时，用户将被发送到名为 `result.jspx`
    的页面。结果是应用程序中执行的操作（例如点击按钮）的返回值。在 JSF 中，操作附加到 `UIComponent` 上，这允许对页面进行细粒度控制。这些操作可以有自己的导航规则，也可以共享相同的导航规则。


    应用程序生命周期


    应用程序开发者在使用 JSF 时会发现的另一个好处是，该框架有助于跨服务器请求管理 UI 状态。无需处理用户选择并在页面之间传递这些选择，框架会为你处理这些。JSF
    框架在生命周期中还有内置流程，用于辅助验证、转换和模型更新。作为额外的好处，JSF 提供了一个简单的模型，用于将客户端生成的事件传递给服务器端应用程序代码。


    **使用 JSF 进行应用程序开发**

