    **JSP 2.1 延迟值和延迟方法**


    JSF 1.2 现在直接利用 JSP 2.1 中的 JSP EL。JSP EL 原生支持即时 ${} 语法表达式和延迟 #{} 语法表达式。JSF 1.2
    标签库现在可以利用 JSP 2.1 标签库描述符中可用的 <deferred-value> 语法，例如以下内容，以指示此 JSP 2.1 标签属性支持 #{}
    语法，并定义评估类型为 Boolean：


    <deferred-value>


    <type>java.lang.Boolean</type>


    </deferred-value>


    这将导致一个 ValueExpression 作为参数传递给此属性的 JSP 2.1 标签处理器的 setter 方法。你还可以对方法调用使用 <deferred-method>
    语法，如下所示，以指示此 JSP 2.1 标签属性支持 #{} 语法，并定义延迟方法的签名：


    <deferred-method>


    <method-signature>


    void doAction(javax.faces.event.ActionEvent)


    </method-signature>


    </deferred-method>


    这将导致一个 MethodExpression 作为参数传递给此属性的 JSP 2.1 标签处理器的 setter 方法。


    这种方法取代了 JSP 2.0 中经典的 JSF 1.1 <rtexprvalue>false</rtexprvalue> 和默认的 java.lang.String
    标签属性类型。


