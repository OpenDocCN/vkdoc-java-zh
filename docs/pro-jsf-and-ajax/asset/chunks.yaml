- fmt: 'Apart from mapping components to component tags rather than creating new component
    instances, the processing proceeds in the same way as the initial request—rendering
    components to the `<f:view>` body content buffer, storing the state either at
    the client or in the session at the server, and finally flushing the buffered
    markup to the parent JSP container for rendering (refer to Figure 1-15).


    ## JSF and JSP


    In JSF, a component writer can set a boolean property called `rendersChildren`
    on a component. This property decides whether a component should render its children.
    For components in the JSF implementation, the value of `rendersChildren` is set
    to `false`. This means each component is responsible for rendering the right output
    to the `ResponseWriter` and buffering in the `<f:view>`, not caring how its children
    are rendered. If `rendersChildren` is set to `true` on a component, then the `encodeBegin()`
    method is called in the closing tag instead of the start tag (refer to Figure
    1-14) to ensure that no children are rendered to the buffer until the parent has
    closed the loop on its children. Once the parent knows about its children, they
    will be rendered to the `<f:view>` body content buffer. One component that uses
    this is the `dataTable` component, because it needs to have access to all its
    child components before any rendered output is generated.


    Considering that some components may require that `rendersChildren` is set to
    `true`, this will have an impact on how you can construct your page description.
    Remember the login page? Let’s add some labels to the input fields and adjust
    the layout a bit so the components will be aligned vertically instead of horizontally,
    as shown in Code Sample 1-20.


    **Code Sample 1-20.** *The Login Page Modified with Some JSP Tags*


    ```

    <?xml version=''1.0'' encoding=''windows-1252''?>


    <jsp:root version="2.0"


    >


    <jsp:output omit-xml-declaration="true" doctype-root-element="HTML"


    doctype-system="http://www.w3.org/TR/html4/loose.dtd"


    doctype-public="-//W3C//DTD HTML 4.01 Transitional//EN"/>


    <jsp:directive.page contentType="text/html;charset=windows-1252"/>


    <f:view>


    <html>


    <body>


    <h:form>


    <h:outputText value="Application Login" />


    <h:panelGrid columns="2">


    <jsp:text>Username</jsp:text>


    <h:inputText value="#{sample.username}" />


    <jsp:text>Password</jsp:text>


    <h:inputText value="#{sample.password}" />


    </h:panelGrid>


    <h:commandButton value="Submit" action="#{credentials.onLogin}" />


    </h:form>


    </body>


    </html>


    </f:view>


    </jsp:root>

    ```


    This sample wraps the components with a `<h:panelGrid>` tag. The component created
    by this tag renders its children in a two-dimensional grid, with two columns.
    The `HtmlPanelGrid` component has `rendersChildren` set to `true`, so it can observe
    all the children before rendering the markup for each column. It also adds two
    non-JSF tags—`<jsp:text>`—that will add a label to each input field. At runtime
    the page looks like Figure 1-24.


    **Figure 1-24.** *Rendering of non-JSF content with* `rendersChildren` *set to*
    `true`


    As you can see, the Username and Password labels have been incorrectly placed
    at the top of the page. During execution of this page, any JSF component within
    the `HtmlPanelGrid` component will be delayed from rendering to the buffer until
    the closing tag of the `HtmlPanelGrid` (for example, `</h:panelGrid>`). Note that
    no other arbitrary tags or text nested within the `HtmlPanelGrid` component will
    be delayed. Therefore, `<jsp:text>` is rendered to the buffer immediately. You
    can circumvent this behavior by wrapping an `<f:verbatim>` tag around non-JSF
    content, as shown in Code Sample 1-21.


    **Code Sample 1-21.** *The Login Page with* `<f:verbatim>` *Tag Wrapped Around
    Non-JSF Content*


    ```

    <h:form>


    <h:outputText value="Application Login"/>


    <h:panelGrid columns="2">


    <f:verbatim><jsp:text>Username</jsp:text></f:verbatim>


    <h:inputText value="#{credentials.username}" />


    <f:verbatim><jsp:text>Password</jsp:text></f:verbatim>


    <h:inputText value="#{credentials.password}" />


    </h:panelGrid>


    <h:commandButton value="Submit" action="#{credentials.onLogin}" />


    </h:form>

    ```


    The `<f:verbatim>` tag takes non-JSF content and adds it to the component hierarchy
    as a `UIOutput` component. At runtime the updated page looks like Figure 1-25.


    **Figure 1-25.** *Rendering of non-JSF content using the* `<f:verbatim>` *tag*


    > **Note** The issue with `rendersChildren` has been resolved by the JSF Expert
    Group (EG) in the JSF 1.2 release. The new content-interweaving feature accommodates
    the differences between JSF and JSP rendering strategies, making it no longer
    necessary to add the `<f:verbatim>` wrapper tags.


    ## Summary


    This chapter acts as a mini-guide for the rest of the book; it also gives you
    a foundation for your continued journey into the world of JSF beyond this book.


    One of the key differentiators JSF has over other view technologies is its openness
    and ability to adopt newly emerging technologies such as XUL, HTC, and Ajax, as
    well as other future view technologies. JSF has clear benefits over other technologies
    because an application built with JSF can continue to live while the surrounding
    technologies pass away and new ones arise. JSF can reduce maintenance costs for
    application development since there is only one programming model needed—JSF and
    Java—even though the systems may require different user agents such as Telnet,
    instant messaging, mobile agents, browsers, and other types of agents such as
    barcode readers.


    This chapter touched on details that make up a JSF application—JSF components,
    navigation model, and backend logic via managed beans. We also explored the ins
    and outs of the JSF component model and its clear separation between presentation
    and behavior, and we discussed the structure of JSF components—`UIComponent`,
    `Renderer`, the renderer-specific subclass `RenderKit`, and the JSP tag handler.
    The chapter also detailed the JSF request lifecycle on initial request and postback,
    including navigation.


    It is crucial to understand the separation between presentation and behavior in
    order to grasp the full potential of JSF components.


    # Chapter 2


    ## Defining the Date Field Component


    *By allowing the developer to separate the functionality of a solution into components,
    located where it is most logical for the solution, component-based design removes
    many of the constraints that used to hinder the deployment and maintenance of
    the solution.*

    —Microsoft Developer Network (MSDN)


    Having introduced JSF in Chapter 1, this chapter will explore the concepts of
    component design and its applicability in JSF.


    The main focus for this chapter is to get you up to speed with the building blocks
    needed to design and create a reusable JSF component. Creating JSF components
    is not hard; you just need to follow a well-defined blueprint, which we will provide
    in this chapter. Specifically, we will cover how to create a `Renderer`, how to
    create a renderer-specific subclass, how to create a JSP tag handler, and how
    to register your custom JSF component.


    To illustrate this process, we will show how to create a simple date field component
    that you will use throughout the book. In subsequent chapters, we will show how
    to enhance this date field component until you arrive at a rich, full-fledged
    JSF component that supports Ajax, XUL, and HTC. Nevertheless, at the end of this
    chapter, you should have your first functional component to show to your friends
    and developer peers.


