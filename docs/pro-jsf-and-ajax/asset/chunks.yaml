    **Step 8: Creating a JSP Tag Handler and TLD**


    The UIDocument component needs a new custom action, <pro:document>, with a corresponding
    tag handler class, ProDocumentTag. On initial render, the ProDocumentTag is responsible
    for transferring all JSP custom action attributes from the tag handler to the
    component instance.


    The ProDocumentTag Class


