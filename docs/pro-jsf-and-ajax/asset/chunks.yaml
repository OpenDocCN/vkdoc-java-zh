    \ Explorer`和`Safari`的用户代理头中。鉴于准确解析各种可能的`User-Agent`头的复杂性，最好复用通用实现，而不是每次需要时重复编写代理检测代码。\n\
    \n`Oracle ADF Faces`提供了`User-Agent`抽象来处理这种情况，在`Code Sample 10-5`中，我们通过利用一些`Oracle\
    \ ADF Faces`公共API来获取用户代理，从而简化了`ApplicationBean`。\n\n**Code Sample 10-5.** `getRenderKitId()`方法\n\
    \n```\npackage com.apress.projsf.ch10.application;\n\nimport javax.faces.render.RenderKitFactory;\n\
    \nimport oracle.adf.view.faces.context.AdfFacesContext;\nimport oracle.adf.view.faces.context.Agent;\n\
    \n/**\n * The ApplicationBean returns a dynamic RenderKit identifier, based on\n\
    \ * the ADF Faces Agent name.\n */\npublic class ApplicationBean\n{\n  public\
    \ String getRenderKitId()\n  {\n    AdfFacesContext afc = AdfFacesContext.getCurrentInstance();\n\
    \    Agent agent = afc.getAgent();\n\n    if (Agent.AGENT_GECKO.equals(agent.getAgentName()))\n\
    \    {\n      return \"com.apress.projsf.xul.ajax\";\n    }\n    else if (Agent.AGENT_IE.equals(agent.getAgentName())\
    \ && Agent.TYPE_DESKTOP.equals(agent.getType()))\n    {\n      return \"com.apress.projsf.htc.ajax\"\
    ;\n    }\n    else if (Agent.AGENT_WEBKIT.equals(agent.getAgentName()))\n    {\n\
    \      return \"com.apress.projsf.html.ajax\";\n    }\n    else\n    {\n     \
    \ // default to standard HTML Basic for PDAs, etc.\n      return RenderKitFactory.HTML_BASIC_RENDER_KIT;\n\
    \    }\n  }\n}\n```\n\n通过`AdfFacesContext`，你可以调用`getAgent()`方法来获取用户代理。`ADF Faces`还为每个可用的Web客户端（例如，`Microsoft\
    \ Internet Explorer`、`Mozilla GRE`等）提供了一组预定义键。通过将代理名称与这些键进行比较，你可以确定要返回哪个`renderKitId`。\n\
    \n## `DynamicRenderKitViewHandler`类\n\n现在让我们来看`DynamicRenderKitViewHandler`类。图10-3展示了`DynamicRenderKitViewHandler`的类图，在`Code\
    \ Sample 10-6`中，你可以看到它如何使用默认的`RenderKit`标识符作为基础，为传入请求定位特定于代理的`RenderKit`。\n\n\
    **Figure 10-3.** 展示`DynamicRenderKitViewHandler`实现的类图\n\n**Code Sample 10-6.**\
    \ `DynamicRenderKitViewHandler`类\n\n```\npackage com.apress.projsf.ch10.application;\n\
    \nimport java.util.regex.Matcher;\nimport java.util.regex.Pattern;\n\nimport javax.faces.application.Application;\n\
    import javax.faces.application.ViewHandler;\nimport javax.faces.context.FacesContext;\n\
    import javax.faces.el.ValueBinding;\n\n/**\n * The DynamicRenderKitViewHandler\
    \ provides EL support\n * for the <default-render-kit-id> element in faces-config.xml.\n\
    \ */\npublic class DynamicRenderKitViewHandler extends ViewHandlerWrapper\n{\n\
    \  public DynamicRenderKitViewHandler(\n    ViewHandler handler)\n  {\n    super(handler);\n\
    \  }\n\n  public String calculateRenderKitId(\n    FacesContext context)\n  {\n\
    \    String renderKitId = super.calculateRenderKitId(context);\n    Matcher matcher\
    \ = _DYNAMIC_RENDER_KIT_ID.matcher(renderKitId);\n    if (matcher.matches())\n\
    \    {\n      String expression = matcher.group(1);\n      Application application\
    \ = context.getApplication();\n      ValueBinding binding = application.createValueBinding(expression);\n\
