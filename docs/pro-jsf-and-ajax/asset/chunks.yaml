    (see Chapter 3), but when the user clicks one of the unexpanded nodes, you will
    send an `XMLHttpRequest` to the server, instead of a regular form postback.


    Note the differences from a regular form submit. This implementation of your JSF
    component will prevent an unnecessary reload of page content that should not be
    affected by the user action expanding nodes in your deck component. It also removes
    any flickering of the page when expanding the new node with its content and collapsing
    the previously opened node.


    The only step for the application developer to Ajax enable the application is
    to set the right `contentType`, which in this case is `application/x-javaserver-faces`.
    You needed to handle the initial request differently than subsequent postbacks
    with Ajax so that on the initial request you have `text/html` as the `contentType`
