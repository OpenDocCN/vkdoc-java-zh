    第 4 章


    ■ ■ ■


    使用富互联网技术


    *Ajax——在希腊神话中，Ajax 是一位在特洛伊战争中作战的强大勇士，据称其战斗力仅次于希腊最优秀的战士阿喀琉斯。尽管被描述为反应迟钝，但 Ajax 是希腊人中最出色的战士之一，并以面对逆境时坚定不移的勇气而闻名。*


    ——弗拉斯卡蒂国家实验室 (http://www.lnf.infn.it)


    感受到你所选技术影响的永远是用户，任何 Web 或桌面应用程序开发者的首要任务都应是用户体验。用户不关心使用了什么技术，也不关心应用程序是传统的桌面应用还是
    Web 应用。用户需要的是功能丰富且具有交互性的界面。


    传统上，桌面应用能够提供满足用户需求的丰富性，但越来越多的桌面应用正在迁移到 Web 上。因此，Web 应用开发者必须提供更丰富的 Web 界面。


    为了让您充分理解 JSF 及其为互联网社区带来的价值，您需要了解富互联网应用的当前状况。如今的 Web 应用开发者面临着使用 HTML、CSS、JavaScript
    和 DOM 等技术实现更丰富功能的需求。然而，这些技术在设计之初并未考虑企业级应用。消费者对具备这些技术无法完全支持的功能的应用需求日益增长，正推动 Web
    应用开发者探索替代方案。


    从这些消费者需求中，演变出了增强传统 Web 应用静态内容的新型 Web 技术。这些技术通常被称为*富互联网技术*（RITs）。


    由于缺乏标准定义，且传统 Web 技术可扩展性不足，涌现出了诸如 Mozilla 的 XUL、微软的 HTC、Java applets、Flex 和 OpenLaszlo
    等新技术。这些技术在利用将应用部署到中央服务器的优势的同时，支持对传统 HTML 标记进行特定于应用的扩展。另一个以新品牌名回归的解决方案是 Ajax（最近成为异步
    JavaScript 和 XML 的缩写，以前称为 XMLHTTP）。使用这些技术构建的应用通常被称为*富互联网应用*（RIAs）。


