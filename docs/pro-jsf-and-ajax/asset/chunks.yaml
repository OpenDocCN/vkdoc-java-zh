    **JSP 2.0 ${} EXPRESSIONS AND JSF 1.1 #{} EXPRESSIONS**


    JSP already has an expression language to provide dynamic values for tag attributes
    using the ${}-syntax expressions. These expressions are fully evaluated to literal
    values before the tag handler can observe them.


    As a result, all information about the underlying data model is lost, preventing
    the JSF component from being able to post back values to the data model.


    Therefore, a different style of expression is required, the JSF #{}-syntax. This
    syntax is ignored by the JSP engine and passed as a String literal to the tag
    attribute. The JSF tag handler has an opportunity to parse the expression and
    retain knowledge of the underlying data model for use during postback. If the
    value is a literal, such as true, then the JSF tag handler converts this to a
    strongly typed literal value, such as Boolean.TRUE, before storing it as the component
    attribute value. The <rtexprvalue>, or runtime expression value, metadata is always
    set to false because JSP expression syntax is not supported by JSF


    tag handlers, and this will cause the JSP runtime to enforce that requirement.


    If the custom action has attributes, the attributes have to be defined with the
    <attribute> element. For each attribute in the TLD, as shown in Code Sample 2-43,
    the <rtexprvalue> element must be set to false, and the attribute class must be
    left unspecified, allowing it to default to String.


