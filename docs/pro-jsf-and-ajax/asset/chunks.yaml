    第 4 章 ■ 使用富互联网技术


    在本章中，我们将介绍三种 RIT：Ajax、Mozilla XUL 和微软 HTC。本章将对这些技术进行高层概述，并通过一些简单示例来突出每种技术的核心特性。在后续章节中，您将深入了解每种技术的细节，以改进两个
    JSF 组件——ProInputDate 和 ProShowOneDeck 的用户体验。


    以下是本章涉及的四个主要角色：*Ajax1*：Ajax 是一套已有技术套件（DOM、JavaScript 和 XMLHttpRequest）的新名称。Ajax
    用于创建动态网站，并实现客户端与服务器之间的异步通信。


    *XUL*：XML 用户界面语言（XUL），发音为*zuul*，由 Mozilla 组织（Mozilla.org）于 1998 年作为开源项目创建。使用 XUL，开发者可以构建丰富的用户界面，这些界面既可以作为“瘦客户端”Web
    应用部署，也可以在桌面上本地部署，或作为支持互联网的“胖客户端”桌面应用部署。


    *XBL*：可扩展绑定语言（XBL）是 XUL 用于定义新组件的语言。XBL 还用于弥合 XUL 与 HTML 之间的差距，使得将行为附加到传统 HTML
    标记变得容易。


    *HTC*：在微软 Internet Explorer 5 中引入，HTC 提供了一种机制，将组件作为 DHTML 行为在脚本中实现。HTC 文件以.htc
    扩展名保存，是一个包含脚本和一组定义组件的 HTC 特定元素的 HTML 文件。


    阅读本章后，您应理解这些 RIT 是什么、它们提供了什么，以及如何使用它们创建丰富的用户界面组件。


    **介绍 Ajax**


    *Ajax*已被定义为一个术语，用于描述一种创建更丰富、更友好的 Web 应用的 Web 开发技术。本章将为您概述 Ajax。Ajax 一词最早于 2005
    年 2 月被提出，此后迅速席卷了软件行业。


    Ajax 获得动力和普及的原因之一是 XMLHttpRequest 对象，以及该对象使开发者能够与底层服务器和 Web 应用使用的任何业务服务进行异步通信的方式。像
    Google GMail 和 Google Suggest 这样的流行网站正在使用 Ajax 技术为用户提供丰富的界面，这提高了人们对 Ajax 的认识。


    尽管*Ajax*这个名称是新的，但作为该技术基础的技术——JavaScript、XMLHttpRequest 和 DOM——已经存在了一段时间。事实上，这套技术套件的最新成员——XMLHttpRequest
    对象——是由微软于 1999 年随 Internet Explorer 5.0 的发布而引入的，并作为 ActiveX 组件实现。


    XMLHttpRequest 对象虽然被广泛使用，但并非标准；它最多只能被称为“事实上的”标准，因为大多数现代浏览器，包括 Firefox、Internet
    Explorer、1 该术语最早由 Adaptive Path 的 James Garrett 在一篇文章中提出。


    5807ch04.qxd 1/13/06 2:50 PM 第 175 页


    第 4 章 ■ 使用富互联网技术


    **175**


    Opera 和 Safari，都支持它。然而，已经有一个标准提案涵盖了 XMLHttpRequest 对象提供的部分功能——DOM Level 3 加载和保存规范。


    ■**注意** XMLHttpRequest 对象并非 W3C 标准。W3C DOM Level 3 加载和保存规范包含一些类似的功能，但尚未在任何浏览器中实现。因此，目前，如果您需要从浏览器发送
    HTTP 请求，则必须使用 XMLHttpRequest 对象。


    借助 XMLHttpRequest 对象，开发者现在可以向 Web 服务器发送请求以检索特定数据，并使用 JavaScript 处理响应。这种在客户端和 Web
    服务器之间发送数据的能力将带宽降至最低，并节省了服务器上的时间，因为更新用户界面的大部分处理工作是在客户端使用 JavaScript 完成的。


