  raw: 'The Dojo open source project provides a modern, capable, “Webish,” and easy-to-use
    DHTML toolkit. Part of that effort includes smoothing out many of the sharp edges
    of the DHTML programming and user experiences. On the back of high-profile success
    stories such as Google Maps and Google Suggest, Ajax and the XMLHttpRequest object
    have been getting a lot of attention. In spite of all the publicity, application
    developers have been on their own when it comes to solving the usability problems
    that come along with Ajax. The Dojo open source project provides a DHTML toolkit
    written in JavaScript and aims to solve some long-standing historical problems
    with DHTML, which have prevented the mass adoption of dynamic Web application
    development.


    The Dojo toolkit allows you to build dynamic capabilities into Web applications
    and any other environment that supports JavaScript. With the Dojo toolkit, you
    can make Web applications more usable, responsive, and functional. Other benefits
    and features of the toolkit are the lower-level APIs and compatibility layers
    to write portable JavaScript and simplify complex scripts, event systems, I/O
    APIs, and generic language enhancements.


    The Dojo toolkit provides all these features by layering capabilities onto a small
    core that provides the package system and little else. When you write scripts
    using the Dojo toolkit, you can include as little or as much of the available
    APIs as you want to suit your needs.


    **Introducing the D2 Open Source Project**


    D2 is an open source project hosted on d2.dev.java.net. The D2 project provides
    an implementation from the Change Detection in Hierarchically Structured Information
    research project (see sidebar for more information about this project). The research
    project focuses on finding a minimum-cost edit script that transforms one data
    tree to another and includes efficient algorithms for computing such an edit script.
    The D2 project contains two implementations—one client-side JavaScript implementation
    and one server-side Java implementation—that are built based on this research.
    This supports an incremental transformation of any JSF-rendered HTML DOM by executing
    the algorithm either on the client or on the server.


    **CHANGE DETECTION IN HIERARCHICALLY STRUCTURED INFORMATION1**


    Detecting and representing changes to data is important for active databases,
    data warehousing, view maintenance, and version and configuration management.
    Most previous work in change management has dealt with flat-file and relational
    data; we focus on hierarchically structured data. Since in many cases changes
    must be computed from old and new versions of the data, we define the hierarchical
    change detection problem as the problem of finding a “minimum-cost edit script”
    that transforms one data tree to another, and we present efficient algorithms
    for computing such an edit script. Our algorithms make use of some key domain
    characteristics to achieve substantially better performance than previous, general-purpose
    algorithms. We study the performance of our algorithms both analytically and empirically,
    and we describe the application of our techniques to hierarchically structured
    documents.


    1\. Source: “Change Detection in Hierarchically Structured Information” by Sudarshan
    S. Chawathe, Anand Rajaraman, Hector Garcia-Molina, and Jennifer Widom; Department
    of Computer Science, Stanford University.


