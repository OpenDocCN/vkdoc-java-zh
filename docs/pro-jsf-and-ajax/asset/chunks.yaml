    使用 DHTML 构建应用程序时，开发者将使用常规 HTML 页面来描述其 Web 应用程序，但能够动态更改 HTML 页面的渲染和内容。HTC 文件可以创建封装动态行为的可重用组件，其工作方式与
    XUL 中的 XBL 类似。以下章节将为您概述微软的 DHTML 解决方案，并展示如何使用 HTC 构建可重用组件。


    **为何选择 HTC 而非 XAML？**


    不选择 XAML 有几个原因。原因之一是 XAML 需要 .NET 2.0/Avalon，该框架随微软的 Vista 版本一同发布，并计划于 2006 年底推出。另一个项目
