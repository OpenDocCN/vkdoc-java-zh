- fmt: '在`Code Sample 4-15`中，添加了一个XUL按钮，用于触发`oncommand`事件处理器。`oncommand`事件处理器将执行封装的脚本——`var
    duke = document.getElementById(''duke''); duke.greeting = ''Howdy, '';`。这会将绑定中定义的标识符为`greeting`的XUL元素的值设置为`"Howdy,
