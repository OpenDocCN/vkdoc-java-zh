    渲染器特定组件子类


    在大多数情况下，此子类在运行时创建组件的实例。顾名思义，此子类提供了对 JSF 组件上渲染器特定属性（例如 style、disabled、tooltip 等）的访问——为所有这些组件属性提供属性的
    getter 和 setter 方法。结合 JSF JSP 标签上的 binding 属性，此子类允许应用程序开发人员使用 JavaBean 属性 setter
