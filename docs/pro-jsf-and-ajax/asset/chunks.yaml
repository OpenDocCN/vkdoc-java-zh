- fmt: '# Building XUL Applications


    **Tip:** An excellent sample to look at to get a feel for what is possible with
    XUL is the Mozilla Amazon Browser (MAB) at `http://www.faser.net/mab/`.


    The idea behind XUL is to provide a markup for building user interfaces, much
    like HTML, while leveraging technologies such as CSS for the look and feel and
    JavaScript for the event and behavior. Also, APIs are available to give developers
    access to read from and write to file systems over the network and give them access
    to Web Services. As an XML-based language, developers can also use XUL in combination
    with other XML languages such as XHTML and SVG. You can load an application built
    with XUL in three ways:


    - You can load the XUL page the traditional way from the local file system.

    - You can load it remotely using an HTTP URL to access content on a Web server.

    - You can load it using the chrome URL provided by the Mozilla GRE.


    ## XUL Components


    XUL comes with a base set of components (see Table 4-3) that are available through
    the Mozilla GRE, and as such, XUL does not need to download components to draw
    an application in the browser. You can also design your own components with XUL;
    these *will* need to be downloaded upon request and cached in the browser.


    ## Mozilla XUL''s Chrome System


    In addition to loading files from the local file system or from a Web server,
    the Mozilla engine has a special way of installing and registering applications
    as a part of its *chrome system*. The chrome system allows developers to package
    applications and install them as plug-ins to clients supporting the Mozilla GRE.
    XUL applications deployed in this way gain read and write access to the local
    file system, and so on. This type of access can be hard to achieve in a traditional
    Web application unless the application has been signed with a digital certificate,
    and the end-user grants access permission.


    An important distinction exists between accessing an application via an HTTP URL
    (`http://`) and accessing it via a chrome URL (`chrome://`). The chrome URL always
    refers to packages or extensions that are installed in the chrome system of the
    Mozilla engine. An example of an application that can be reached by a chrome URL
    is `chrome://browser/content/bookmarks/bookmarksManager.xul`. This chrome URL
    will open the Bookmarks Manager available in the Firefox browser.


    **Table 4-3.** *Subset of Available XUL Components*


    | Component Name | Description |

    |---|---|

    | `<button>` | A button that can be clicked by the user. Event handlers can be
    used to trap mouse, keyboard, and other events. A button is typically rendered
    as a gray outset rectangle. You can specify the label of the button by using the
    `label` attribute or by placing content inside the button. |

    | `<window>` | Describes the structure of a top-level window. It is the root node
    of a XUL document, and it is by default a horizontally oriented box. Because it
    is a box, it takes all the box attributes. By default, the window will have a
    platform-specific frame around it. |

    | `<menubar>` | A container that usually contains `menu` elements. On a Mac, the
    menu bar is displayed along the top of the screen, and all non-menu-related elements
    inside the menu bar will be ignored. |

    | `<menu>` | An element, much like a button, that is placed on a menu bar. When
    the user clicks the `<menu>` element, the child `<menupopup>` of the menu will
    be displayed. This element is also used to create submenus. |

    | `<menupopup>` | A container used to display menus. It should be placed inside
    a menu, menu list, or menu-type button element. It can contain any element but
    usually will contain `<menuitem>` elements. It is a type of box that defaults
    to vertical orientation. |

    | `<menuitem>` | A single choice in a `<menupopup>` element. It acts much like
    a button, but it is rendered on a menu. |

    | `<radio>` | |'
