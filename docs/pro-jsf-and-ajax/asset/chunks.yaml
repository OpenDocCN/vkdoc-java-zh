    \ availability=\"#{row.getValidDates}\" />\n        </pro:inputDate>\n    </h:column>\n\
    ```\n\nThe `var` attribute defines a relative variable `row`, which is used by\
    \ each stamped component to retrieve the unique data for each row. This works\
    \ fine as long as you have access to the component hierarchy during postback.\
    \ On the client, each row’s expression looks the same, so any client-side Ajax\
    \ implementation depending on this expression to invoke an underlying managed\
    \ bean method is out of luck. Any attached managed beans will work during regular\
    \ postback, but an Ajax request using the `PhaseListener` or `Lifecycle` approach\
    \ will not be able to locate the right row of data. Therefore, Ajax components\
    \ relying on managed beans to provide them with data (for example, to fetch available\
    \ dates for a specific employee) are not going to work properly when set up with\
    \ a relative variable.\n\n## Possible Solutions to Relative Variables\n\nYou could\
    \ try to solve this by implementing support for the `UIData` component, but you\
    \ have no guarantee that the parent component is of type `UIData`, since it is\
    \ perfectly legal for component authors to provide components that stamp out objects\
    \ without subclassing the `UIData` component. Examples of such components are\
    \ the Oracle’s ADF Faces table and `treeTable` components.\n\nThe best solution\
    \ would be if the JSF specification provided support for converting relative expressions\
    \ to absolute expressions. Component writers could then convert relative variables\
    \ to absolute during initial render. The rendered expression could take the form\
    \ of `#{managedBean.employeeList[1].getValidDates}`, indicating this to be row\
    \ one in the stamped collection.\n\n## Step 4: Creating Converters and Validators\n\
    \nAs discussed in Chapter 1, the JSF implementation provides helper classes for\
    \ any type of `UIComponent`. These helper classes are divided into converters,\
    \ validators, and an event and listener model, each of them with its own area\
    \ of expertise. In this section, you will build your own `Validator` to perform\
    \ validation on the strongly typed `Date` object to make sure a selected date\
    \ is actually available (for example, is not a weekend or a holiday).\n\nCode\
    \ Sample 7-4 uses the `Validator` you will design. Its purpose is to validate\
    \ the entered value and compare it with a list of dates that are flagged as “not\
    \ available.” The contract for the application developer’s backing bean provided\
    \ is to return an array of booleans—`#{managedBean.getValidDates}`. The array\
    \ indicates whether a date is available (`true`) or not (`false`). This array\
    \ provided by the backing bean is also used at the browser to show which dates\
    \ are available for selection.\n\n**Code Sample 7-4.** `ProInputDate` *Component\
    \ with Attached Date Validator*\n\n```\n<pro:inputDate id=\"dateField\"\n    \
    \           title=\"Date Field Component\"\n               value=\"#{managedBean.date}\"\
    \ >\n    <pro:validateDate availability=\"#{managedBean.getValidDates}\" />\n\
    </pro:inputDate>\n```\n\nFigure 7-4 shows the `DateValidator` class.\n\n**Figure\
    \ 7-4.** *Class diagram showing the* `DateValidator`\n\n### The `DateValidator`\
    \ Class\n\nThe `DateValidator` class (see Code Sample 7-5) checks to see whether\
    \ the `Date` value is available, according to some rules, in a backing bean defined\
    \ by an application developer."
