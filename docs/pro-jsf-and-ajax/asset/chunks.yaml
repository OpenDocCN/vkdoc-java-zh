    C H A P T E R 1 ■ T H E F O U N D AT I O N O F J S F : C O M P O N E N T S


    **33**


    request-processing lifecycle. The last factory class—FacesContextFactory—is providing
    the JSF implementation with a way to create an instance of FacesContext that is
    used to represent contextual information associated with the incoming request
    and eventually creating the response.


    Initial Request


    When the user accesses the application for the first time, an initial request
    is sent to the FacesServlet, which dispatches the request to the JSF Lifecycle
    instance (refer to Figure 1-10).


    **Restore View Phase**


    The first phase of the JSF lifecycle is the Restore View phase (see Figure 1-11)
    whose responsibility it is to check whether this page has been requested earlier
    or if this is a new request.


    **Figure 1-11.** *Restore View phase during initial request* In Figure 1-11, you
    are looking at the process for an incoming request and how the first phase—Restore
    View—in the JSF lifecycle is responsible for restoring a view from the server
    and client state. During the first request for this view, the ViewHandler.restoreView()
    method will return null, since there is no stored state.


    ■**Note** The JSF lifecycle phase identifiers are part of the JSF public API in
    the PhaseId class.


    5807ch01.qxd 1/3/06 4:47 PM Page 34


    **34**


    C H A P T E R 1 ■ T H E F O U N D AT I O N O F J S F : C O M P O N E N T S


    If the return value is null, the Restore View phase will call renderResponse()
    on the FacesContext for this request. The renderResponse() method will indicate
    that when this phase is done, the render() method is called to execute phase 6—Render
    Response—without proceeding with phases 2 through 5\. Subsequently, the Restore
    View phase will call the ViewHandler.createView() method to create the component
    hierarchy root—UIViewRoot—


    and attach it to the FacesContext. The UIViewRoot component performs no rendering
    but plays an important role in event delivery during a postback request.


    **Render Response Phase**


    When the renderResponse() method is called during the Restore View phase, the
    lifecycle skips directly to the render() method, which is responsible for performing
    the Render Response phase, as shown in Figure 1-12.


    **Figure 1-12.** *Render Response phase during initial request* During this phase,
    the ViewHandler.renderView() method is called to execute the JSP document. The
    renderView() method will pass the value of the viewId property acquired from the
    UIViewRoot node as a context-relative path to the dispatch() method of the ExternalContext
    associated with this request. The dispatch() method will forward the value of
    viewId property (for example, /login.jspx as a context-relative path) to the Web
    container.


    Since the JSF-specific mapping is not part of the forwarded request, the request
    is ignored by the FacesServlet and passed to the JSP container, which in turn
    will locate the JSP based on the context-relative path and execute the JSP page
    matching the viewId (for example, /login.jspx). Figure 1-13 shows the processing
    of the JSF JSP document.


