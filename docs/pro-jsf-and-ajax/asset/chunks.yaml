    contents. The reason for choosing `<div>` elements instead of anchor elements
    (`<a href>`) is so you can more easily control the look and feel of the deck nodes.
    If you implemented this using anchor elements, you would have to deal with browser-specific
    behaviors to handle links, such as the look of visited links, not visited links,
