- fmt: 'Since there is only one `Renderer` instance per `Renderer` class (singleton),
    you need to make sure that during postback you decode the request and apply values
    entered by the user to the right component. To achieve this, you must include
    a unique identifier in the generated component markup. So, on encoding, before
    you start writing markup to the client, you need to determine which `UIComponent`
    in the component hierarchy you are encoding. The `clientId` is a globally unique
    identifier for the component markup that remains consistent across postback.


    In Code Sample 2-13, you calculate the `clientId` of a component.


    **Code Sample 2-13.** `UIComponent` `clientId` *Lookup*

    ```

    String clientId = input.getClientId(context);

    ```


    The `getClientId()` method calculates the `clientId` of a component by walking
    up the component hierarchy to the first `NamingContainer` parent component (for
    example, `UIForm`).


    The `getClientId()` method obtains the `clientId` from the `UIComponent` that
    implements `NamingContainer`. The `clientId` of this parent component is then
    appended as a prefix to the child component’s ID (for example, `[NamingContainer
    clientId]:[id]`).


    > **Note** If the application developer has not defined an ID on a component,
    the `getClientId()` method will call the `createUniqueId()` method on the `UIViewRoot`
    to create a unique `clientId`. By default, JSF will generate `clientId`s that
    start with `_` to help to avoid conflicts with IDs specified by the application
    developer (for example, `_id1`, `_id2`, and so on).


    Figure 2-4 illustrates a simplified version of the page description shown in Figure
    2-1.


    **Figure 2-4.** *Unique IDs within* `NamingContainer`


    The identifier written to the client for the `inputDate` component, based on Figure
    2-4, will be `form:dateField`. Since the other components do not contain any user-defined
    IDs, a component ID will be generated by the `createUniqueId()` method on `UIViewRoot`
    (for example, `_id1`).


    ## JSF NAMINGCONTAINER


    To ensure each component’s uniqueness, JSF provides a `NamingContainer` marker
    interface. Within a component implementing `NamingContainer`, each child component
    is required to have a locally unique identifier. This is enforced by the `renderView()`
    method on `ViewHandler`, and in JSP-based applications it is also enforced by
    the `UIComponentTag`. The only time it would be useful to implement `NamingContainer`
    for your own component would be if your component stamped out its children in
    a similar fashion to the `HtmlDataTable` component.


    In case the JSF default-generated client ID (for example, `_id1`, `_id2`, and
    so on) is not understood by the client markup, the component writer can decide
    to override a method called `convertClientId()`.


    If the `UIComponent` has a `Renderer`, the last call made by the `getClientId()`
    method is to the `convertClientId()` method. This ensures the `Renderer` can make
    the final call about which client ID gets sent to the client. For example, the
    XHTML rules for fragment identifiers are much stricter than HTML because XHTML
    does not allow identifiers to start with underscores or colons. (See the XHTML
    1.0 specification at http://www.w3.org/TR/xhtml1/#C_8).


    > **Note** As good practice, always set IDs on `<h:form>` components in the JSP
    page description.


    ## Writing Output to the Client


    You have now verified the value, the client ID, and the additional renderer-specific
    attributes, so it is time to write the necessary markup and resources back to
    the browser via the JSP buffered body tag. Using the `ResponseWriter` class, you
    can leverage some convenience methods to generate proper markup. In this sample,
    you will use the `startElement()`, `writeAttribute()`, and `endElement()` methods.
    However, these are not the only methods implemented by the `ResponseWriter` class.
    Table 2-3 lists useful methods provided by the JSF `ResponseWriter` class.'
