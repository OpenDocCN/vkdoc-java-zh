    **JSP 2.0 ${} 表达式与 JSF 1.1 #{} 表达式**


    JSP 已经拥有一种表达式语言，可以使用 `${}` 语法表达式为标签属性提供动态值。这些表达式在标签处理程序能够观察到它们之前，会被完全求值为字面量值。


    因此，关于底层数据模型的所有信息都会丢失，导致 JSF 组件无法将值回传到数据模型。


    因此，需要一种不同风格的表达式，即 JSF 的 `#{}` 语法。这种语法会被 JSP 引擎忽略，并作为字符串字面量传递给标签属性。JSF 标签处理程序有机会解析该表达式，并保留对底层数据模型的了解，以便在回传期间使用。如果该值是字面量，例如
    `true`，那么 JSF 标签处理程序会将其转换为强类型的字面量值，例如 `Boolean.TRUE`，然后再将其存储为组件属性值。`<rtexprvalue>`（运行时表达式值）元数据始终设置为
    `false`，因为 JSF 标签处理程序不支持 JSP 表达式语法，这将导致 JSP 运行时强制执行该要求。


    如果自定义操作有属性，则必须使用 `<attribute>` 元素来定义这些属性。对于 TLD 中的每个属性，如代码示例 2-43 所示，`<rtexprvalue>`
