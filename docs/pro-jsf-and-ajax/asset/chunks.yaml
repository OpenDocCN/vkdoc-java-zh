- fmt: "# Code Sample 7-5. The `validate()` Method\n\n```java\npackage com.apress.projsf.ch7.validate;\n\
    \nimport java.util.Date;\n\nimport javax.faces.application.FacesMessage;\n\nimport\
    \ javax.faces.component.UIComponent;\n\nimport javax.faces.context.FacesContext;\n\
    \nimport javax.faces.el.MethodBinding;\n\nimport javax.faces.validator.Validator;\n\
    \nimport javax.faces.validator.ValidatorException;\n\n/**\n* DateValidator checks\
    \ to see whether a Date value is available, according\n* to a managed bean method\
    \ binding.\n*/\npublic class DateValidator implements Validator\n{\n    /**\n\
    \    * Validates the object value to make sure it is a Date and available.\n \
    \   *\n    * @param context the Faces context\n    * @param component the Faces\
    \ component\n    * @param object the object to validate\n    */\n    public void\
    \ validate(\n        FacesContext context,\n        UIComponent component,\n \
    \       Object object)\n    {\n        if (_availability != null)\n        {\n\
    \            Date date = (Date)object;\n            long millis = date.getTime();\n\
    \            long millisPerDay = 1000 * 60 * 60 * 24;\n            Integer days\
    \ = new Integer((int)(millis / millisPerDay));\n            Object[] args = new\
    \ Object[] {days, days};\n            boolean[] result = (boolean[])_availability.invoke(context,\
    \ args);\n            if (!result[0])\n            {\n                FacesMessage\
    \ message = new FacesMessage(\"Date is unavailable\");\n                throw\
    \ new ValidatorException(message);\n            }\n        }\n    }\n}\n```\n\n\
    The `validate()` method is called after the conversion of the entered string to\
    \ `Date` is successful. The reason for passing a new `Object[]{days, days}` is\
    \ to be able to reuse it later. The `Validator` has only one value, so the range\
    \ is over a single day (from `days` to `days`, inclusive). It will then call the\
    \ backing bean passing the arguments needed, `context` and `args`. The backing\
    \ bean returns a `boolean[]` array, indicating availability for each day in the\
    \ range (inclusive) since January 1, 1970.\n\n# Code Sample 7-6. The `setAvailability()`\
    \ and `getAvailability()` Methods\n\n```java\npublic void setAvailability(\n \
    \   MethodBinding availability)\n{\n    _availability = availability;\n}\n\npublic\
    \ MethodBinding getAvailability()\n{\n    return _availability;\n}\n\nprivate\
    \ MethodBinding _availability;\n}\n```\n\n![Image 58](index-304_1.png)\n\nAlthough\
    \ you have designed this `Validator` with your Ajax-enabled component in mind,\
    \ it is also fully functional with the basic HTML RenderKit.\n\n## Step 5: Creating\
    \ a Client-Specific Renderer\n\nYou now know how to create your new Ajax-enabled\
    \ `ProInputDate` component. Since you already have an `HtmlInputDateRenderer`\
    \ for this component, it makes sense to extend it to add rich functionality. One\
    \ of the benefits of extending a component's client-side functionality is that\
    \ you need only to override the `encodeBegin()` method of the `Renderer`. Everything\
    \ else stays the same.\n\nIn the previous chapter, you added *only* Ajax functionality\
    \ to your `HtmlShowOneDeckRenderer`, since the markup was already there. In this\
    \ case, you have to provide some additional markup to support the pop-up calendar.\n\
    \nYou also need to determine the date format pattern that is used by the `DateTimeConverter`\
    \ and the target URL for the validator managed bean, if any. One of the positive\
    \ side effects of a component model is that a component author can extend the\
    \ initial functionality of a component. For the application developer, there is\
    \ no difference between using the \"simple\" `HtmlInputDateRenderer` and using\
    \ the Ajax-enabled `HtmlAjaxInputDateRenderer`.\n\nFigure 7-5 shows a class diagram\
    \ with the `HtmlAjaxInputDateRenderer`.\n\n**Figure 7-5.** *Class diagram showing\
    \ the* `HtmlAjaxInputDateRenderer`\n\nBefore you venture into the fun stuff, working\
    \ on your new Ajax Renderer, you need to understand what Mabon is and what it\
    \ can provide for component writers who are interested in Ajax data fetch.\n\n\
    ## What Is Mabon?"
  raw: '**Code Sample 7-5.** *The* validate() *Method* package com.apress.projsf.ch7.validate;


    import java.util.Date;


    import javax.faces.application.FacesMessage;


    import javax.faces.component.UIComponent;


    import javax.faces.context.FacesContext;


    import javax.faces.el.MethodBinding;


    import javax.faces.validator.Validator;


    import javax.faces.validator.ValidatorException;


    /**


    * DateValidator checks to see whether a Date value is available, according


    * to a managed bean method binding.


    */


    public class DateValidator implements Validator


    {


    /**


    * Validates the object value to make sure it is a Date and available.


