    As with the XMLHttpRequest object methods, two properties will be used more frequently
    than the others—responseText and responseXML. You can use these two properties
    to access data returned with the response. The responseText property provides
    a string representation of the data, which is useful in case the requested data
    comes in as plain text or HTML. Depending on the context, the responseXML property
    offers a more extensive representation of the data.


    The responseXML property will return an XML document object, which can be examined
    using W3C DOM node tree methods and properties.


    **Traditional Web Application Development**


    Before getting into the details of Ajax, you need to first understand how a traditional
    Web application works and what issues users, and application developers, face
    when a Web application contains form elements. HTML forms are used to pass data
    to an underlying Web server. You have probably encountered Web applications with
    forms, such as when you have filled in a survey, ordered products online from
    Web sites such as eBay (http://www.ebay.com), or filled in an expense report with
    a company’s HR application.


    A form in a traditional Web application is defined by a special HTML tag (<form>)
    that has a set of parameters—action, method, enctype, and target. The action parameter
    defines the destination URL to pass the form data, the method parameter defines
    the HTTP method used for the form postback, the enctype parameter defines the
    content type to be used for encoding the data, and the target parameter defines
    the frame that should receive the response.


    Regular Postback


    You can use two methods when submitting a form—POST and GET. With the HTTP GET
    method, the form data set is appended to the URL specified by the action attribute
    (for example, http://forums.oracle.com/forums/forum.jspa?forumID=83), and this
    new URL is sent to the server. In JSF the value of the action attribute is provided
    by ViewHandler.getActionURL(viewId) during rendering.


    ■**Note** The <h:form> tag defined by the JSF specification does not have the
    method and action attributes.


    With the HTTP POST method, the form data set is included in the body of the request
    sent to the server. The GET method is convenient for bookmarking, but should be
    used only when you do not expect form submission side effects as defined in the
    W3C HTTP specification (http://www.w3.org/Protocols/). If the service associated
    with the processing of a form causes side effects (for example, if the form modifies
    a database row or subscribes to a service), you should use the POST method.


    Another reason for choosing the POST method over the GET method is that it allows
    browsers to send an unlimited amount of data to a Web server by adding data as
    the message body after the request headers on an HTTP request. The GET method
    is restricted to the URL


    length, which cannot be more than 2,048 characters. POST removes any limitations
    from the transmitted data length.


