    markup* **Summary**


    In this chapter, we showed you how easy it is to provide dynamic RenderKit switching
    with JSF.


    By using a component-driven design, application developers can build applications
    for any type of user agent without being impacted by the underlying client markup.


    In the previous chapters, we demonstrated how you can write Renderers that support
    regular HTML, Ajax, XUL, and HTC. Some component writers are already looking at
    even more client technologies to provide application developers with a common
    programming model regardless of the user agent. A good example of this is the
    Oracle ADF Faces component library. It has built-in support for HTML, RIAs, character-based
    solutions, instant messenger clients such as Gaim and Yahoo, PDAs, and so on.
    The MyFaces open source project also provides an alternative RenderKit to HTML—the
    WML RenderKit.


    Now that you know how to create reusable rich Internet components with JSF and
    how to use multiple RenderKits, we hope you will apply the techniques you have
    learned in this book to create your own custom components and build RIAs with
    JSF.


