    一个值得遵循的良好准则是：在启动组件项目之前，先在网络上搜索已有的组件。大多数情况下，你或许只需为现有组件编写一个新的渲染器即可，而且已有相当数量的组件可供使用。如果找不到所需的组件，那么就该自行构建了。要构建新组件，应确保它引入了新的行为、功能或定义，并且该组件具有独特的服务器端行为。如果组件已存在，而你只需要新的外观，那么你需要创建一个新的渲染器（例如，为了启用
