    Mabon 是一个托管于 http://mabon.dev.java.net 网站的开源项目。Mabon 提供了一种便捷的方式来接入一个专门设计的生命周期，该生命周期非常适合那些需要直接从后台
    Bean 获取数据、且无需完整 JSF 生命周期开销的 Ajax 组件。它还提供了一个 Mabon 协议——`mabon:/`——用于引用后台 Bean，以及一个
    JavaScript 便捷函数，用于发送目标 URL 和所需的任何参数，然后从受管 Bean 异步接收数据。


    5807ch07.qxd 1/19/06 7:24 PM 第 280 页


    **280**


    第 7 章 ■ 使日期字段组件支持 AJAX


    Mabon 与 JSON


    如您所知，`XMLHttpRequest` 提供了两种响应类型——`responseText` 和 `responseXML`——可用于获取数据。需要问的问题是，何时应该使用哪一种？这个问题的答案可能因人而异，但我们推荐一条规则：问问自己是否控制响应的语法。


    `responseXML` 类型返回一个完整的 DOM 对象（这为您提供了多种遍历 DOM 树的方式），允许您找到所需的信息，并对当前文档应用更改。当您的组件会影响周围元素，并且您不控制响应时（例如，当您与
    Web 服务通信时），这非常有用。


    对于日期组件，您确实控制响应，并且您只关注为您的组件获取数据，而不是修改整个页面的 DOM 结构。


    `responseText` 类型返回纯文本，这允许您利用 JSON 语法来处理响应。对于利用 Ajax 的组件来说，JSON 是一种极其有用的数据交换格式，因为它可以通过
    `eval()` 函数轻松解析。


    `eval()` 函数接受一个参数（一个 JavaScript 代码字符串），并一次性解析和执行该字符串，而不是尝试分别处理每个部分。这比任何其他类型的解析（例如
    XML DOM 解析）都要快得多。


    这就是 Mabon 实现 JSON 的原因——您控制响应，并且 JSON 语法易于解析且解析速度快。


    ■**注意** 组件编写者向应用程序开发者明确说明，连接到组件的任何受管 Bean 都需要返回 JSON 支持的数据类型，这一点也很重要。


    **JSON 中的有效数据类型**


    JSON (http://www.json.org) 具有简单的数据结构——对象和数组。对象是名称/值对的集合，数组是值的有序列表。在 JSON 中，它们采用以下形式：


    *   对象是一个无序的名称/值对集合。对象以左花括号 (`{`) 开头，以右花括号 (`}`) 结尾。每个名称后面跟一个冒号 (`:`)，名称/值对之间用逗号
    (`,`) 分隔。

    *   数组是一个有序的值集合。数组以左方括号 (`[`) 开头，以右方括号 (`]`) 结尾。逗号 (`,`) 分隔值。

    *   值可以是双引号括起来的字符串、数字、`true`、`false`、`null`、对象或数组。


    这些结构可以嵌套。


    ![图片 59](img/index-306_1.png)


    5807ch07.qxd 1/19/06 7:24 PM 第 281 页


    第 7 章 ■ 使日期字段组件支持 AJAX


    **281**


    Mabon 的结构


    Mabon 包含一个用于处理 Ajax 数据获取请求的自定义 JSF 生命周期，以及一个用于写出数据获取 URL 的自定义 JSF ViewHandler（见图
    7-6）。


    **图 7-6.** *Mabon 的类图*


    **MabonLifecycle 类**


    MabonLifecycle 包含三个阶段——ApplyRequestValuesPhase、InvokeApplicationPhase 和 RenderResponsePhase。MabonLifecycle
    负责执行这三个阶段。此外，它还负责处理任何附加到 MabonLifecycle 上的 PhaseListener。


    **LifecyclePhase 类**


    Mabon LifecyclePhase 是所有生命周期阶段的基类。


    **ApplyRequestValuesPhase、InvokeApplicationPhase 和 RenderResponsePhase 类**


    由于您只是获取数据，而不以任何方式修改组件层次结构或底层模型，因此您不需要包含 Restore View、Process Validations 和 Update
    Model 阶段。Mabon 的阶段执行与默认生命周期等效阶段类似的操作，例如解码传入请求、调用应用程序逻辑和渲染响应。稍后我们将更详细地介绍这三个阶段。


    **FacesLifecycleServlet 类**


    这是一个可重用的 Servlet，它将在其第一个请求中初始化 `FacesContextFactory` 并查找 `MabonLifecycle`。它将创建
    `FacesContext`，然后调用属于 `MabonLifecycle` 的三个生命周期阶段。Web 应用程序定义的 Servlet 映射将把 Mabon
    请求定向到此 `FacesLifecycleServlet`。


