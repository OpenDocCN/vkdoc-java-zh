- fmt: "# JSF 中常被低估的功能：托管 Bean 设施\n\nJSF 中一个常被低估的功能是托管 Bean 设施。该设施不仅可用于提供应用程序逻辑，还可以在启动实际应用程序之前初始化设置。在本例中，你将在`faces-config.xml`文件中使用\
    \ JSF EL 语法来设置指向托管 Bean（例如`ApplicationBean`）的指针，该 Bean 将被调用并返回正确的`renderKitId`给`ViewHandler`（参见代码示例\
    \ 10-2）。\n\n**代码示例 10-2.** 设置默认的`RenderKit` ID\n\n```xml\n<?xml version=\"1.0\"\
    \ encoding=\"utf-8\"?>\n\n<!DOCTYPE faces-config PUBLIC\n\"-//Sun Microsystems,\
    \ Inc.//DTD JavaServer Faces Config 1.1//EN\"\n\"http://java.sun.com/dtd/web-facesconfig_1_1.dtd\"\
    >\n\n<faces-config >\n<application>\n<default-render-kit-id>#{[managedBean].[property]}</default-render-kit-id>\n\
