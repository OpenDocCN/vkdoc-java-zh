    ## Acknowledgments


    After completing this book, we found ourselves wondering if we would do it again,
    and sure, we would! However, anyone who believes a book project is a simple single-author
    or small-team effort has never written a book. No first-time author, or authors,
    would be anything without guidance and tremendous support from family, friends,
    and colleagues.


    Peter Zadrozny, thank you, thank you, and thank you! You introduced us to Apress,
    convinced Apress that this would be the book of the year, and then guided us through
    everything that newbie authors, like ourselves, needed to know. Without you and
    your guidance, we would never have taken the first steps toward becoming full-feathered
    authors.


    We thank Apress and Tony Davis for giving us the opportunity to write this book
    and trusting Peter Zadrozny’s instincts.


    Peter Lubbers worked tirelessly to help us make this a better book. We owe you
    *big* time!


    Kito D. Mann, although he has an extremely busy schedule, took time from his family
    to provide us with his technical knowledge. Matthias Wessendorf was there from
    the very first draft to the final product, educating us about MyFaces and providing
    encouragement when it felt like we would never reach the end. Adam Winer, our
    ADF Faces colleague and a Java Champion, answered our questions on JSF 1.2 and
    made sure we kept our edge.'
