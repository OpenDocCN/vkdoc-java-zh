- fmt: '# XMLHttpRequest 对象


    由于`XMLHttpRequest`对象并非标准，每个浏览器对其支持可能略有不同；因此，其行为在不同浏览器间可能存在差异。在创建本章示例应用程序时，您会注意到微软的
    Internet Explorer 将`XMLHttpRequest`对象实现为`ActiveX`对象，而 Mozilla Firefox 则将其视为原生
    JavaScript 对象。然而，大多数实现都支持相同的方法和属性集。这减轻了应用程序开发人员的负担，因为唯一的区别在于创建`XMLHttpRequest`对象的实例。创建`XMLHttpRequest`对象的实例可以如代码示例
    4-1 或代码示例 4-2 所示。


    **代码示例 4-1.** *创建* `XMLHttpRequest` *对象的实例*

    ```

    var xmlhttp = new XMLHttpRequest();

    ```


    **代码示例 4-2.** *使用* `ActiveXObject` *创建* `XMLHttpRequest` *对象的实例*

    ```

    var xmlhttp = new ActiveXObject("Microsoft.XMLHTTP");

    ```


    同样值得注意的是，`XMLHttpRequest`对象并非标准 HTML 所独有。`XMLHttpRequest`对象可能被任何基于 HTML/XML 的
    Web 技术（如 XUL 或 HTC）使用。


    ## 方法


    `XMLHttpRequest`对象实例提供了可用于与 Web 服务器异步通信的方法（见表 4-1）。


    **表 4-1.** `XMLHttpRequest` *对象方法*


    | 方法 | 描述 |

    | --- | --- |

    | `open("method", "URL")` | 分配待处理请求的目标 URL、方法及其他可选属性 |

    | `send(content)` | 发送请求，可选地附带可发布的字符串或 DOM 对象数据 |

    | `abort()` | 停止当前请求 |

    | `getResponseHeader("headerLabel")` | 返回单个标头标签的字符串值 |

    | `getAllResponseHeaders()` | 返回完整的标头集（标签和值）作为字符串 |

    | `setRequestHeader("label", "value")` | 为要随请求发送的标头分配标签/值对 |


    在表 4-1 中，`open()`和`send()`方法是最常用的。`open("method", "URL"[, "asynch"[, "username"[,
    "password"]]])`方法为请求和即将进行的操作做好准备。需要两个参数：一个是请求的 HTTP 方法（`GET`或`POST`），另一个是连接的 URL。可选的`asynch`参数定义了此请求的性质——`true`为默认值，表示这是一个异步请求。另外两个可选参数——`username`和`password`——允许应用程序开发人员在需要时提供用户名和密码。


    `send()`方法向服务器发出请求，并在您通过调用`open()`方法设置好阶段后调用。传递给此方法的任何内容都将作为请求体的一部分发送。


    ## 属性


    一旦`XMLHttpRequest`被发送，脚本可以查看所有实现共有的几个属性（见表 4-2）。


    **表 4-2.** `XMLHttpRequest` *对象属性*


    | 属性 | 描述 |

    | --- | --- |

    | `onreadystatechange` | 每次状态更改时触发的事件的事件处理程序 |

    | `readyState` | 对象状态整数：0 = 未初始化，1 = 加载中，2 = 已加载，3 = 交互中，4 = 完成 |

    | `responseText` | 从服务器进程返回的数据的字符串版本 |

    | `responseXML` | 从服务器进程返回的数据的 DOM 兼容文档对象 |

    | `status` | 服务器返回的数字代码，例如 404 表示“未找到”或 200 表示“OK” |

    | `statusText` | 伴随状态代码的字符串消息 |


    与`XMLHttpRequest`对象方法一样，有两个属性将比其他属性更频繁地使用——`responseText`和`responseXML`。您可以使用这两个属性来访问随响应返回的数据。`responseText`属性提供数据的字符串表示形式，这在请求的数据以纯文本或
    HTML 形式返回时非常有用。根据上下文，`responseXML`属性提供了更广泛的数据表示形式。`responseXML`属性将返回一个 XML 文档对象，可以使用
    W3C DOM 节点树方法和属性进行检查。


    # 传统 Web 应用程序开发


    在深入了解 Ajax 的细节之前，您需要首先了解传统 Web 应用程序的工作原理，以及当 Web 应用程序包含表单元素时用户和应用程序开发人员面临的问题。HTML
    表单用于将数据传递到底层 Web 服务器。您可能遇到过带有表单的 Web 应用程序，例如当您填写调查问卷、从 eBay（http://www.ebay.com）等网站在线订购产品或使用公司的人力资源应用程序填写费用报告时。


    传统 Web 应用程序中的表单由特殊的 HTML 标签（`<form>`）定义，该标签具有一组参数——`action`、`method`、`enctype`和`target`。`action`参数定义传递表单数据的目标
    URL，`method`参数定义用于表单回发的 HTTP 方法，`enctype`参数定义用于编码数据的 Content-Type，`target`参数定义应接收响应的框架。


    ## 常规回发


    提交表单时可以使用两种方法——`POST`和`GET`。使用 HTTP `GET`方法时，表单数据集会附加到由`action`属性指定的 URL 上（例如，`http://forums.oracle.com/forums/forum.jspa?forumID=83`），并且此新
    URL 会发送到服务器。在 JSF 中，`action`属性的值在渲染期间由`ViewHandler.getActionURL(viewId)`提供。


    > **注意** JSF 规范定义的`<h:form>`标签没有`method`和`action`属性。


    使用 HTTP `POST`方法时，表单数据集包含在发送到服务器的请求体中。`GET`方法便于添加书签，但仅应在您不期望表单提交产生副作用（如 W3C HTTP
    规范（http://www.w3.org/Protocols/）中所定义）时使用。如果与表单处理相关的服务会导致副作用（例如，如果表单修改了数据库行或订阅了服务），则应使用`POST`方法。


    选择`POST`方法而非`GET`方法的另一个原因是，它允许浏览器通过将数据作为 HTTP 请求中请求标头之后的消息体添加，向 Web 服务器发送无限量的数据。`GET`方法受限于
    URL 长度，不能超过 2,048 个字符。`POST`方法消除了对传输数据长度的任何限制。


    ![Image 25](index-203_1.png)


    > **注意** `GET`方法将表单数据集值限制为 ASCII 字符。只有`POST`方法（使用`enctype="multipart/form-data"`）被指定为覆盖整个
    [ISO10646] 字符集。


    当用户提交表单时（例如，通过单击提交按钮），如图 4-1 所示，浏览器处理提交表单中的控件并构建表单数据集。表单数据集是由表单内控件构建的一系列控件名称/当前值对。然后，根据`<form>`元素的`enctype`属性（例如，`application/x-www-form-urlencoded`）指定的
    Content-Type 对表单数据集进行编码。


    **图 4-1.** *常规回发的序列图*


    编码后的数据随后作为 URL 编码的流发送回服务器（HTTP 请求）。'
