    C H A P T E R 1 ■ T H E F O U N D AT I O N O F J S F : C O M P O N E N T S


    **35**


    **Figure 1-13.** *Setting the* ResponseWriter *on the* FacesContext **THE JSF
    VIEW IDENTIFIER: VIEW ID**


    Depending on which mapping is used—prefix or suffix—the UIViewRoot view identifier
    is derived slightly differently from the request uniform resource identifier (URI).
    If prefix mapping is used, such as /faces/*


    (which is the most common) for the FacesServlet, the viewId property is set from
    the path information coming after the mapping; for example, /context-rootfaces/login.jspx
    will set a view identifier equal to /login.jspx. If suffix mapping is used, such
    as *.jsf, the viewId property is set from the servlet path information of the
    request URI, after replacing the suffix with the value of the context initialization
    parameter named by the symbolic constant ViewHandler.DEFAULT_SUFFIX_NAME. For
    example, /context-root/


    login.jsf will set a view identifier equal to /login.jsp by default but can leverage
    the context initialization parameter to use .jspx as the default suffix instead.


    Before processing and executing the JSF JSP document, the JSP runtime first determines
    the content type and character encoding to use. For JSF to work in harmony with
    the JSP lifecycle, the <f:view> tag needs to be present. The <f:view> tag is a
    JSP body tag that buffers all the rendered output from the nested JSF components.
    Simply put, the <f:view> tag serves as a container for all other JSF components.
    The <f:view> tag is responsible for creating and storing an instance of the ResponseWriter
    on the FacesContext.


    The createResponseWriter() method creates a new instance of the ResponseWriter
    for the specified content type and character encoding. The ResponseWriter is responsible
    for writing the generated markup to the requesting client, in this case the <f:view>
    body content buffer.


