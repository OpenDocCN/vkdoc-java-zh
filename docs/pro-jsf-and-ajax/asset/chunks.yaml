    \ to list any recommended components using metadata defined by `JSR-276`.\n\n\
    After rendering the header facet, you use the `isActive` flag to determine whether\
    \ this is the currently expanded `UIShowItem` component. If it is, you use the\
    \ `_encodeAll()` method to render each of the `UIShowItem`'s child components.\n\
    \n**Encode End**\n\nWith the input date component implementation, it did not make\
    \ sense to handle children, so you could combine all the rendered output into\
    \ a single `encodeEnd()` method, as shown in Code Sample 3-24. With the `UIShowOne`\
    \ component, the `Renderer` is in charge of rendering its children using the `encodeChildren()`\
    \ method. This has the consequence that you also need to implement the `encodeEnd()`\
    \ method to write out the closing element of the component.\n\n**Code Sample 3-24.**\
    \ *The* `HtmlShowOneDeckRenderer encodeEnd()` *Method*\n\n```\npublic void encodeEnd(\n\
    \    FacesContext context,\n    UIComponent component) throws IOException\n{\n\
    \    ResponseWriter out = context.getResponseWriter();\n    out.endElement(\"\
    div\");\n}\n```\n\nIf you take a close look at the actual output required by the\
    \ deck component, you will see that all the children that were added are at the\
    \ end of the generated markup. Therefore, not much is required for the `UIShowOne`\
    \ component's `Renderer` but to close the generated markup.\n\n**Renders Children**\n\
    \nIn the JSF 1.1 specification, the default value of the `rendersChildren` property\
    \ is `false`.\n\nFor the `UIShowOne` component, the `Renderer` is responsible\
    \ for rendering its children, and thus this flag needs to be set to `true`, as\
