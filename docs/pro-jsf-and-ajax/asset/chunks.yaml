    则用于说明标识符。


    此外，你需要一种方法来跟踪每个项目，并确保在任何时候只有一个项目被展开。


    为了实现这一点，你需要一个父容器，它可以监听识别已激活项目的事件，然后展开该项目并关闭之前打开的项目。该原型使用 `<div class=[showOne.styleClass]>`
    元素作为逻辑父容器。这种为多个项目设置逻辑容器的设计，是仿照 JSF 规范中的 `HtmlDataTable` 和 `UIColumn` 实现的。原型中的属性与这些组件之一（即父容器
    `showOne`）或其子组件之一（`showItem`）相关联。


