- fmt: "# Chapter 5: Loading Resources with Weblets\n\nThe chapter showed how to build\
    \ reusable components with `XBL` and `HTC`, as well as how to implement event\
    \ handling, how to implement encapsulation, and how to embed custom components\
    \ in a page using the supported implementations (`CSS` and `import`) provided\
    \ by the different technologies. You also gained knowledge about Ajax and its\
    \ key player, the `XMLHttpRequest` object. For more information about these technologies,\
    \ please visit the Mozilla Web site (http://www.mozilla.org), the Microsoft MSDN\
    \ Web site (http://msdn.microsoft.com/), and Wikipedia.org (http://en.wikipedia.org/wiki/AJAX).\n\
    \n*If we have learned one thing from the history of invention and discovery, it\
    \ is that in the long run—and often in the short one—the most daring prophecies\
    \ seem laughably conservative.*\n—Arthur C. Clarke (1917–), *The Exploration of\
    \ Space*, 1951\n\nWeb applications often use many different resource files, such\
    \ as images, style sheets, or scripts, to improve the presentation and interactivity\
    \ of the user interface. JSF component libraries that want to render attractive\
    \ user interfaces will also leverage resource files.\n\nThe standard approach\
    \ to providing resource files for a JSF component library is to serve them directly\
    \ from the Web application root file system. These resources are usually packaged\
    \ in an archive (such as a ZIP file) and are shipped separately from the JSF component\
    \ library.\n\nThis chapter will introduce a new open source project—Weblets. The\
    \ goal of this project (located at http://weblets.dev.java.net) is to provide\
    \ component writers with the ability to serve resource files from a Java archive\
    \ (JAR), rather than serving them from the Web application root file system. Unlike\
    \ traditional Web applications, which have statically configured URL mappings\
    \ defined in `web.xml`, JSF applications need dynamically configured URL mappings,\
    \ based on the presence of a component library JAR file.\n\nAfter reading this\
    \ chapter, you should understand what weblets are, how resource loading with weblets\
    \ works, and how to leverage weblets in your own JSF component library. We will\
    \ show how to package the resources for a custom JSF component library to ensure\
    \ you provide application developers with an easy way of successfully installing\
    \ your custom JSF component library, including any resources needed by your component\
    \ library.\n\n## Introducing Resource Loading\n\nAs you may remember from Chapters\
    \ 2 and 3, we created two components—`ProShowOneDeck` and `ProInputDate`—that\
    \ need resources served to the client. We will use both components in this chapter\
    \ to illustrate how to use weblets.\n\nFor this example, the `HtmlShowOneDeckRenderer`\
    \ component uses a JavaScript file, `showOneDeck.js`, to expand a `UIShowItem`\
    \ when a user clicks the rendered component. As described in Chapter 3, this JavaScript\
    \ file is traditionally served by the Web application via a relative path that\
    \ is hard-coded into the actual `HtmlShowOneDeckRenderer` code. This requires\
    \ the application developer to deploy additional resources that are delivered\
    \ and packaged in a separate archive file (for example, a ZIP file), often referred\
    \ to as an *installables* archive.\n\n> **Note** The JSF HTML Basic RenderKit\
    \ does not have any images, styles, or scripts, so no standard solution exists\
    \ for the JSF resource-packaging problem.\n\nCode Sample 5-1 shows the `encodeResources()`\
    \ method from the `HtmlShowOneDeckRenderer` class, which illustrates that the\
    \ installable JavaScript resource files—`/projsf-ch3/showOneDeck.js` and `/projsf-ch3/showOneDeck.css`—are\
    \ served from the Web application root file system.\n\n**Code Sample 5-1.** *The*\
    \ `encodeResources()` *Method in the* `HtmlShowOneDeckRenderer` *Code*\n\n```java\n\
    /**\n * Write out the ProShowOneDeck resources.\n *\n * @param context the Faces\
    \ context\n */\n```"
