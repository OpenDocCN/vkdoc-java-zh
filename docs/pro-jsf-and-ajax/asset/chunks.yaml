    \ is also delivered to the backing bean via a `MethodBinding` stored in the `UIInput`'s\
    \ `valueChangeListener` attribute. The `valueChangeListener` attribute is exposed\
    \ as a tag attribute on the standard input tags, such as `<h:inputText valueChangeListener=\"\
    #{backingBean.doValueChange}\" >`. In JSF 1.2, the `valueChangeListener` attribute\
    \ is deprecated on the `UIInput` component but is still present on the JSP tag\
    \ as a JSP 2.1 `MethodExpression`, so an adapter class is needed to adapt the\
    \ `MethodExpression` into a `ValueChangeListener` instance. This allows the backing\
    \ bean to still be called when a `ValueChangeEvent` occurs but without needing\
    \ a separate `valueChangeListener` attribute on the `UIInput` component. This\
    \ simplifies and clarifies component development by more closely following the\
    \ JavaBeans specification while preserving `MethodBinding` support for application\
    \ development.\n\nWe will show how to follow this design pattern to adapt a JSF\
    \ 1.1 `MethodBinding` into a `ShowListener` instance. Code Sample 3-7 shows the\
    \ implementation of this design pattern, `ShowAdapter`.\n\n### Code Sample 3-7.\
