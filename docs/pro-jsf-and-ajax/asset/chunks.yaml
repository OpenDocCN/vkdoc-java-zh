    \ To emphasize, any method binding defined has to follow the contract set up by\
    \ the `DateValidator`.\n\n## Step 12: Registering Your Ajax Resources with Weblets\n\
    \nFor the `HtmlAjaxInputDateRenderer`, you need to register two files—`inputDate.js`\
    \ and `inputDate.css`—as weblets, which will enable you to package them as part\
    \ of your custom JSF component library (see Code Sample 7-25).\n\n> **Note:**\
    \ For more information about weblets, please see Chapter 5, or visit the Weblets\
    \ project’s site at http://weblets.dev.java.net.\n\n**Code Sample 7-25.** *Weblet\
    \ Configuration for the* `HtmlAjaxInputDateRenderer` *Resources*\n\n```xml\n<?xml\
