    ### The XulAjaxRenderKit Class


    With the XUL Ajax postback, you face the same `contentType` issues discussed in
    Chapter 6.


    The good thing is that you took care of the problem in Chapter 6 by providing
    the `FixedContentTypeResponseWriter`, and since there is nothing special about
    using Ajax in XUL, you can reuse this `FixedContentTypeResponseWriter` for the
    XUL Ajax solution. The only requirement is that the application developer needs
    to set the correct content type, so that the `ResponseWriter` gets a chance to
    define the content type for the response.


    With the new `XMLResponseWriter`, you also have to provide a custom `RenderKit`—`XulAjaxRenderKit`—that
    can dynamically pick either the `XMLResponseWriter` or the custom `FixedContentTypeResponseWriter`
    (see Figure 8-13).


    **Figure 8-13.** *Sequence diagram of creating the right* `ResponseWriter` *for
    the response*


    You are probably asking yourself, do I have to reimplement every component library
    that an application developer might use? The answer is no! You use the strategy
    you used in Chapter 6, wrapping the `XulAjaxRenderKit` around the standard HTML
    `RenderKit` to avoid all that extra work.


    Figure 8-14 shows the `XulAjaxRenderKit` in a class diagram.


    **Figure 8-14.** *Class diagram showing the* `XulAjaxRenderKit` *class*


    In the `XulAjaxRenderKit` class, as shown in Code Sample 8-42, you set the `CONTENT_TYPE`
    variable to the accepted XUL `contentType`—`application/vnd.mozilla.xul+xml`.
    To find out which `ResponseWriter` to select, you need to know whether this is
    an initial request, a regular form postback, or an Ajax postback. If the user
    clicks the `pro:showOneDeck` component, the `d2.submit` function passes a custom
    header to the `XMLHttpRequest`—`X-D2-Content-Type`.


