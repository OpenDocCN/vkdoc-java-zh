    ### Event Handling and HTC


    Microsoft’s implementation of the DOM is not standard, but it provides an implementation
    that is similar to DOM Level 2 event handling that includes, for example, event
    bubbling and cancellations. The following scripting languages are supported by
    HTC: Visual Basic Scripting Edition (VBScript), Microsoft JScript, JavaScript,
    and third-party scripting languages that support the Microsoft ActiveX Scripting
    interfaces.


    Scripts are encapsulated in `<script>` elements the same way as in a regular HTML
    page.


    From these scripts, developers can access each HTC element as a script object,
    using the value of the HTC element''s `id` attribute as the name of the script
    variable. This allows all attributes and methods of HTC elements to be dynamically
    modified as properties and methods of these objects.


    In the DHTML object model, developers can declare an event handler function and
    assign a call to that function or do the reverse and declare event handling code
    to associate the function with the event.


    A developer can assign a call to a function with HTC in three ways. Code Sample
    4-20 and Code Sample 4-21 illustrate traditional HTML and JavaScript assignments,
    and Code Sample 4-22 illustrates an alternative solution in HTC.


    **Code Sample 4-20.** *Assigning a Call to Function*


    ```html

    <script>

    function onColor()

    {

    ...

    }

    </script>

    ...

    <input type="button" value="Press me!" onclick="onColor();" />

    ```


    In Code Sample 4-20 the assignment has been done by the actual button using the
    `onclick` event handler. Code Sample 4-21 assigns the function in the `<script>`
    element to the `proButton` button.


    **Code Sample 4-21.** *Associating Function with an Event*


    ```html

    <script for="proButton" event="onclick" >

    function onColor()

    {

    ...

    }

    </script>

    ...

    <input id="proButton" type="button" value="Press me!" />

    ```


    Developers can also use the `<public:attach>` element to associate an event globally
    in the component and assign it to a function, as shown in Code Sample 4-22.


    **Code Sample 4-22.** *A Globally Assigned Event Handler*


    ```html

    <public:attach event="onclick" onevent="onColors()" />

    ```


    This event handler will fire on all click events within this component.


    ### Building DHTML Applications


    In 1999, Netscape and Microsoft made a submission to the W3C to add behavioral
    extensions to the CSS specification. These proposals have not yet been rolled
    into the CSS standard (and are still a working draft for CSS 3), so Microsoft
    and Mozilla have implemented their own proposed solutions to add behavior to an
    HTML element—Microsoft via HTC and Mozilla via XBL.


    When Microsoft introduced the concept of DHTML with Internet Explorer 5.0, it
    used CSS to attach a behavior directly to an existing HTML element. This way of
    attaching behavior to an HTML element is referred to as an *attached behavior*
    and can be changed programmatically.


    With the release of Internet Explorer 5.5, Microsoft introduced something called
    *element behavior*. With element behavior, developers can build custom components
    that can be used the same way as regular HTML elements but with the ability to
    add richer functionality via script. The default way of defining element behaviors
    is by using HTC files. It is important to not confuse the DHTML behavior—attached
    behavior—introduced in Internet Explorer 5.0 with element behaviors. Element behavior
    uses a different approach to bind to elements and has other distinctive characteristics.


    Looking at the HTC solution, the element behavior is applied to a bound element
    using the import processing instruction. The import processing instruction imports
    a tag definition from an element behavior. Code Sample 4-23 illustrates how a
    behavior is bound to an element using this instruction.


    **Code Sample 4-23.** *A Simple HTML File with Attached Behavior*


    ```html

    <!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" >

    <html xmlns:pro >

    <?import namespace="pro" implementation="pro.htc" ?>

    <head>

    <title>Pro JSF : Microsoft HTC</title>

    </head>

    <body>

    <div><pro:welcome name="Duke" /></div>

    <div><pro:welcome/></div>

    </body>

    </html>

    ```


    An element behavior defines a custom tag, which can be used in a Web page like
    a standard HTML tag. By setting the `tagName` attribute on the `<public:component>`
    element, developers can turn an HTC file into a custom tag. The `<?import namespace="pro"
    implementation="pro.htc" ?>` element imports the `pro.htc` implementation and
    sets the identifier or prefix for the custom tags provided in the `.htc` file
    to the declared namespace—`pro`.


    As shown in Code Sample 4-24, the `tagName` attribute specifies the name of the
    custom tag, which is defined in the HTC file.


    **Code Sample 4-24.** *Defining Element Behavior*


    ```html

    <html>

    <head>

    <public:component tagName="welcome" >

    <public:property name="name" value="Guest" />

    <public:attach event="oncontentready" handler="_constructor" />

    </public:component>

    <script type="text/javascript" >

    function _constuctor()

    {

    nameSpan.innerText = element.name;

    }

    </script>

    </head>

    <body>

    Welcome, <span id="nameSpan"

    onclick="if (element.name != ''Guest'')

    {

    alert(''Nice to see you again, '' + element.name);

    }" ></span>!

    </body>

    </html>

    ```


    Figure 4-10 shows the page running in the Internet Explorer, and you can see that
    it is only when the user clicks on Duke''s greeting that the additional message
    is displayed.


    **Figure 4-10.** *A page using the welcome HTC component*


    Importing HTC element behavior into an HTML page makes the custom element a first-class
    member in the DOM hierarchy and the element behavior permanently bound to the
    custom element. One of the key differentiators between element behavior and attached
    behavior is that an attached behavior is asynchronously bound to an element, allowing
    it to be attached and detached programmatically, whereas the element behavior
    is bound synchronously to a custom element, is seen as a regular HTML element,
    and cannot be detached from its custom element.


