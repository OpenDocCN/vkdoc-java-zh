- fmt: '# Mabon


    Mabon is an open source project hosted on the `http://mabon.dev.java.net` Web
    site. Mabon offers a convenient way to hook in a specially designed lifecycle
    that is ideal for Ajax-enabled components that need to fetch data directly from
    a backing bean, without the overhead of a full JSF lifecycle. It also provides
    a Mabon protocol—`mabon:/`—that is used to reference the backing bean and a JavaScript
    convenience function that is used to send the target URL and any arguments needed
    and then asynchronously receive data from the managed bean.


    ## Mabon and JSON


    As you know, the `XMLHttpRequest` provides two response types—`responseText` and
    `responseXML`—that can be used to fetch data. The question to ask is, when should
    I use each? Answers to this question can differ depending on whom you ask, but
    we can recommend one rule. Ask yourself whether you control the syntax of the
    response.


    The `responseXML` type returns a complete DOM object (which gives you ample ways
    of walking the DOM tree), allowing you to find the information needed, and apply
    changes to the current document. This is useful when your component will impact
    surrounding elements, and you don’t control the response (for example, when you
    are communicating with a Web Service).


    For the date component, you do control the response, and you are looking at only
    fetching data for your component, not modifying the whole page’s DOM structure.


    The `responseText` type returns plain text, which allows you to leverage JSON
    syntax for the response. For components leveraging Ajax, JSON is an extremely
    useful data-interchange format, since it can be easily parsed with the `eval()`
    function.


    The `eval()` function takes one argument, a string of JavaScript code, and parses
    and executes this string in one go rather than trying to process each part separately.
    This is significantly faster than any other type of parsing, such as XML DOM parsing.


    This is the reason why Mabon implements JSON—you control the response, and JSON
    syntax is easy and fast to parse.


    > **Note** It is also important that component writers make it clear to the application
    developer that any managed beans attached to the component need to return data
    types supported by JSON.


    ### Valid Data Types in JSON


    JSON (`http://www.json.org`) has a simple data structure—objects and arrays. Objects
    are collections of name/value pairs, and arrays are ordered lists of values. In
    JSON, they take on these forms:


    - An object is an unordered set of name/value pairs. An object begins with a left
    brace (`{`) and ends with a right brace (`}`). Each name is followed by a colon
    (`:`) and the name/value pairs are separated by a comma (`,`).

    - An array is an ordered collection of values. An array begins with a left bracket
    (`[`) and ends with a right bracket (`]`). Commas (`,`) separate values.

    - A value can be a string in double quotes, a number, `true` or `false` or `null`,
    or an object, or an array.


    These structures can be nested.


    ## Structure of Mabon


    Mabon consists of a custom JSF Lifecycle to process Ajax data fetch requests and
    a custom JSF ViewHandler used to write out the data fetch URLs (see Figure 7-6).


    **Figure 7-6.** *Class diagram of Mabon*


    ### The `MabonLifecycle` Class


    The `MabonLifecycle` consists of three phases—`ApplyRequestValuesPhase`, `InvokeApplicationPhase`,
    and `RenderResponsePhase`. The `MabonLifecycle` is responsible for executing these
    three phases. Additionally, it is also responsible for handling any `PhaseListeners`
    attached to the `MabonLifecycle`.


    ### The `LifecyclePhase` Class


    The Mabon `LifecyclePhase` is the base class for all lifecycle phases.


    ### The `ApplyRequestValuesPhase`, `InvokeApplicationPhase`, and `RenderResponsePhase`
    Classes


    Since you are only fetching data and not modifying the component hierarchy or
    the underlying model in any way, you do not need to include the Restore View,
    Process Validations, and Update Model phases. The Mabon phases are performing
    similar operations to the default lifecycle equivalents, such as decoding an incoming
    request, invoking application logic, and rendering the response. We will cover
    these three in more detail shortly.


    ### The `FacesLifecycleServlet` Class


    This is a reusable servlet that will initialize the `FacesContextFactory` and
    look up the `MabonLifecycle` in its first request. It will create the `FacesContext`
    and then invoke the three lifecycle phases that are part of the `MabonLifecycle`.
    The servlet mapping defined by the Web application will direct Mabon requests
    to this `FacesLifecycleServlet`.


    ### JSF 1.2 Specification


    After the release of the JSF 1.2 specification, the Mabon `FacesLifecycleServlet`
    will no longer be needed. A component developer using the Mabon project to serve
    data to Ajax-enabled components can change the servlet entry for Mabon to use
    the JSF 1.2 `javax.faces.webapp.FacesServlet` class instead of the `net.java.dev.mabon.webapp.FacesLifecycleServlet`
    class. The `FacesLifecycleServlet` provided by Mabon uses the same syntax as JSF
    1.2 `FacesServlet` to customize the Lifecycle, simplifying the upgrade path to
    JSF 1.2 for the application developer.


    ### The `LifecycleFactoryImpl` Class


    This class’s only purpose is to add a second lifecycle—the `MabonLifecycle`.


    ### The `MabonViewHandler` Class


    During the initial rendering, a custom `Renderer` needs to provide a path to the
    backing bean that can be intercepted by the `FacesLifecycleServlet` and used during
    `InvokeApplicationPhase` to call the referenced backing bean. By using the Mabon
    protocol, a component author can get a unique path from the `MabonViewHandler`
    that can be rendered to the client. If the component writer passes the string
    shown in Code Sample 7-7 with the path argument of the `ViewHandler.getResourceURL()`
    method, the `MabonViewHandler` will return the string shown in Code Sample 7-8
    that can be written to the client.


    **Code Sample 7-7.** *The Mabon Protocol*


    ```

    mabon:/managedBean.getValidDates

    ```


    **Code Sample 7-8.** *String Returned After Mabon Has Evaluated the Mabon Protocol*


    ```

    /<context-root>/<mabon-servlet-mapping>/managedBean.getValidDates

    ```


    During an Ajax request, this URL is sent on the request and intercepted by the
    `FacesLifecycleServlet`.


    ## Mabon: Initial Request


    The Mabon implementation is designed specifically for Ajax requests and implements
    a communication channel using JSON syntax. This solution allows Ajax components
    that use managed beans to fetch data and to communicate with the server without
    having to go through a full JSF lifecycle. So how does it work? At application
    start-up (see Figure 7-7), Mabon will add the `MabonLifecycle` as part of the
    JSF `LifecycleFactory` context.


    **Figure 7-7.** *Sequence diagram of Mabon at application start-up*


    On the initial request (as shown in Figure 7-8), Mabon is just delegating through
    to the underlying JSF implementation and is active only during the Render Response
    phase, if needed.'
