    第 1 章 ■ JSF 基础：组件


    **表 1-1.** *续*


    **类型**


    **描述**


    组件编写者


    组件编写者是可重用组件的主要提供者。该开发者负责创建可供他人（如页面作者）使用的组件库。


    工具提供者


    顾名思义，工具提供者提供能够支持使用 JSF 构建应用程序的开发者的工具。


    JSF 实现者


    JSF 实现者是为此前定义的所有开发者提供运行时（或 JSF 规范的实现）的开发者。现有实现的例子包括 Sun 参考实现 (RI) (http://java.sun.com/j2ee/javaserverfaces/)
    和 Apache MyFaces (http://myfaces.apache.org)。


    **来源：JavaServer Faces 1.1 规范*


    根据我们的经验，页面作者和应用程序开发者通常是同一个人，因此他们既精通 UI 设计，也熟悉 Java 或 Visual Basic 等编程语言。在本书中，我们将主要关注组件编写者。


    **应用程序开发技术概述**


    在计算机和软件相对短暂的历史中，应用程序开发经历了几个重大的演进阶段，每个阶段都承诺提高开发者的生产力和灵活性。自计算机首次问世以来，这些技术改进呈指数级增长，并且看起来计算机和软件技术在未来仍将以同样惊人的速度持续演进。


    *没有指数增长是永恒的……但我们可以延缓“永恒”的到来。*


    ——戈登·摩尔（以摩尔定律闻名），


    飞兆半导体与仪器公司


    在这些演进过程中，应用程序的部署模式以及用于开发此类应用程序的计算机和软件技术都发生了变化。


    **单层架构**


    在 1970 年代末和 1980 年代初，发生了一个根本性的转变，从大型集中式计算机转向个人电脑 (PC)，这将控制权从少数人手中转移到了多数人（任何拥有
    PC 的人）手中。尽管这一时期发布的大多数应用程序比以往开发的任何程序都更强大，但它们是为单用户任务而开发和设计的，


    5807ch01.qxd 1/3/06 4:47 PM 第 5 页


    第 1 章 ■ JSF 基础：组件


    **5**


    并且缺乏对公共数据的协作；当时，还没有中央数据库或电子邮件系统。以这种方式部署或安装的应用程序被称为*单层*应用程序。


    从维护的角度来看，这种单层解决方案是一种驻留在个人机器上并控制与业务逻辑交互的应用程序。这些单层应用程序都集成了三个应用层（表示层、业务逻辑层和数据层），这使得维护变得困难，并且几乎无法共享和扩展信息。


    **双层架构：客户端-服务器**


    *双层*或*客户端-服务器*解决方案在 1980 年代占据了中心舞台，并将单层解决方案推入了历史档案。双层架构实现了数据共享，改变了应用程序的开发和部署方式。双层应用程序直接与最终用户交互；业务逻辑和表示逻辑存储在客户端，而数据驻留在远程服务器上。这种架构允许多个用户通过桌面电子邮件客户端（如
    Microsoft Outlook 或 Mozilla Thunderbird）等应用程序访问集中式数据。


    尽管双层解决方案解决了多个用户访问同一数据源的问题，但它也有其局限性，例如设计缺乏灵活性，难以进行后续修改或移植，这反过来又增加了维护成本。


    **多层架构：Web 应用程序**


    应用程序开发的下一阶段随着互联网和 Web 浏览器的出现而到来，并引入了*三层*或*多层*架构。在单层解决方案中，表示层、业务逻辑层和数据层都集成在一个单一的应用程序中。多层架构将这种类型的应用程序分解为三个层，允许开发者专注于特定的领域——模型（数据访问）、视图（表示）和控制器（逻辑）。这种代表各层分离的编程范式被称为模型-视图-控制器
    (MVC) 架构，最初在 SmallTalk 中引入，并在 1980 年代传播到开发者社区。


    将单层应用程序分解为多个层——结合标准客户端（例如 Web 浏览器）和标准通信协议（例如超文本传输协议 [HTTP]）——突然让用户能够普遍访问集中式且熟悉的应用程序，例如通过浏览器使用电子邮件（例如
    Google 基于浏览器的 Gmail）。应用程序不再只是来自 CD 或下载的东西。多层解决方案为应用程序所有者提供了集中维护和管理的能力，这使得应用程序所有者能够为所有使用该应用程序的用户提供即时升级。


    **探索当今的应用程序开发**


    在这个多层应用程序的新世界中，开发者需要跟上通过万维网联盟 (W3C) 和 Java 社区进程 (JCP) 等组织提供的新兴技术和标准。行业正在发展，这是好事，但这也给应用程序开发者带来了压力，要求他们始终构建


    5807ch01.qxd 1/3/06 4:47 PM 第 6 页


    **6**


    第 1 章 ■ JSF 基础：组件


    具有竞争力的多层应用程序。如果你看一个典型的多层软件解决方案——例如，服务于一家零售公司——它可能包括对多种代理的支持，如 Web 浏览器、移动设备和基于字符的视频终端（VT，例如
    VT100）。


    图 1-1 展示了此类多层应用程序架构的简化示意图。


    **图 1-1.** *服务于零售公司的典型多层软件解决方案的常见 J2EE 架构*


    在这种场景下，应用程序开发者被迫提供三个应用程序，而不是一个。这种架构包含一个用于 Web 界面的应用程序，一个用于移动设备的应用程序，以及最后一个用于 Telnet
    设备（例如 VT 终端或手持式基于字符的设备）的应用程序。这三个应用程序都使用自己的技术栈，对于管理员或应用程序开发者来说，这将是一场维护噩梦，并可能引发安全性和可扩展性问题。对于应用程序开发者来说，这一切都归结为一个问题：“为了成功地为我的项目构建一个完整的解决方案，我需要学习多少种技术？”


