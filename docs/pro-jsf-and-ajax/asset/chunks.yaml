    **基于组件的 UI 框架**


    我们已经为本书奠定了基础，现在是时候关注 JSF 与其他技术的区别所在了：UIComponent。JSF 是一个基于组件的 UI 框架，其中的组件（如 HtmlDataTable
    和 HtmlPanelGrid）可以被视为预制模块，允许应用程序开发者使用可重用组件高效地构建复杂的应用程序。它还允许应用程序开发者专注于应用程序逻辑，而不是自己构建动态/丰富的功能。


