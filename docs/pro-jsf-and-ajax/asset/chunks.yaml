    ### The HtmlDocumentRenderer Class


    The `HtmlDocumentRenderer` class (see Figure 9-8) is basically a port of the `XulDocumentRenderer`
    you created in Chapter 8. By porting the `XulDocumentRenderer` code to an HTML
    version, you can now provide application developers with one complete solution,
    allowing the component writer to switch the `RenderKit` without any changes to
    the actual application page description.


    **Figure 9-8.** *Class diagram showing the* `HtmlDocumentRenderer` *class*


    Another freebie is the "at-most-once" semantics for script resources you get when
    extending the `HtmlRenderer`.


    The only requirement that the HTML document Renderer has is to support running
    applications on different clients, without forcing application developers to provide
    different solutions for each client. The `HtmlDocumentRenderer`, a top-level component
    that controls the root element rendered to the client, provides enormous possibilities
    and provides total control over the markup for the component writer.


    You can use `HtmlDocumentRenderer` as the root component by any Renderer (for
    example, `HtmlInputDateRenderer`, `HtmlAjaxInputDateRenderer`, and `HtcAjaxInputDateRenderer`)
    that is targeting HTML as the default markup. Code Sample 9-14 shows the `encodeBegin()`
    method of the `HtmlDocumentRenderer`.


    **Code Sample 9-14.** *The* `HtmlDocumentRenderer` `encodeBegin()` *Method*


    ```

    package com.apress.projsf.ch9.render.html.basic;


    import java.io.IOException;


    import java.util.Map;


    import javax.faces.application.Application;


    import javax.faces.application.ViewHandler;


    import javax.faces.component.UIComponent;


    import javax.faces.context.FacesContext;


    import javax.faces.context.ResponseWriter;


    import com.apress.projsf.ch2.render.html.HtmlRenderer;


