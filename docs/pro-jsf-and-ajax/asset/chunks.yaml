    \ 中的每个自定义操作，都需要一个 `<tag>` 元素。代码示例 2-42 展示了如何在嵌套的 `<name>` 元素中定义自定义操作元素的名称（例如 `<name>inputDate</name>`），以及如何在\
    \ `<tag-class>` 元素中定义标签处理程序类。\n\n`<body-content>` 元素描述了应如何处理此标签。\n\n**代码示例 2-42.**\
    \ *自定义操作*\n\n```\n<tag>\n  <name>inputDate</name>\n  <tag-class>com.apress.projsf.ch2.taglib.pro.ProInputDateTag</tag-class>\n\
    \  <body-content>JSP</body-content>\n  <description>\n    ProJSF Input Date component\
    \ tag.\n  </description>\n</tag>\n```\n\n**JSP 2.0 `${}` 表达式和 JSF 1.1 `#{}` 表达式**\n\
    \nJSP 已经拥有一种表达式语言，可以使用 `${}` 语法表达式为标签属性提供动态值。这些表达式在标签处理程序能够观察到它们之前，会被完全求值为字面量值。\n\
    \n因此，关于底层数据模型的所有信息都会丢失，从而阻止 JSF 组件将值回传到数据模型。\n\n因此，需要一种不同风格的表达式，即 JSF 的 `#{}`\
    \ 语法。JSP 引擎会忽略此语法，并将其作为字符串字面量传递给标签属性。JSF 标签处理程序有机会解析该表达式，并保留对底层数据模型的了解，以便在回传期间使用。如果该值是字面量（例如\
    \ `true`），则 JSF 标签处理程序会将其转换为强类型的字面量值（例如 `Boolean.TRUE`），然后再将其存储为组件属性值。`<rtexprvalue>`（运行时表达式值）元数据始终设置为\
    \ `false`，因为 JSF 标签处理程序不支持 JSP 表达式语法，这将导致 JSP 运行时强制执行该要求。\n\n如果自定义操作具有属性，则必须使用\
    \ `<attribute>` 元素定义这些属性。对于 TLD 中的每个属性，如代码示例 2-43 所示，`<rtexprvalue>` 元素必须设置为 `false`，并且属性类必须保持未指定状态，使其默认为\
    \ `String`。\n\n**代码示例 2-43.** `UIComponent` *属性*\n\n```\n<!-- UIComponent attributes\
    \ -->\n<attribute>\n  <name>id</name>\n  <required>false</required>\n  <rtexprvalue>false</rtexprvalue>\n\
