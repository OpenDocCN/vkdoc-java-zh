    To be able to achieve this, you first render the beginning of the current state
    of this UIComponent to the response contained in the specified FacesContext. You
    then check whether the component is responsible for rendering its children. If
    it is, you call encodeChildren() on the component to start rendering its children.
    If the component is not responsible for rendering its children, you call getChildren()
    on the component. The getChildren() method returns a List over all children of
    this UIComponent. If this component has no children, an empty List is returned,
    and you close the generated markup by calling the encodeEnd() method on the component.
    If it has children, you recursively call the _encodeAll() until all children have
    been rendered.


    ■**Note** A new method, UIComponent.encodeAll(FacesContext), has been added to
    the JSF 1.2


    release and implements equivalent functionality to the _encodeAll(FacesContext,
    UIComponent) method shown in Code Sample 8-35.


    Code Sample 8-36 is identical to the decode() method in the first HtmlShowOneDeckRenderer
    introduced in Chapter 3\. During the Apply Request Values phase, the method—processDecodes()—


    will be called on the UIViewRoot at the top of the component tree. The processDecodes()
    method on the UIViewRoot will recursively call processDecodes() for each UIComponent
    in the component tree. If a Renderer is present for any of these components, the
    UIComponent will delegate the responsibility of decoding to the Renderer. For
    more information about processDecodes(), please refer to Chapter 2.


