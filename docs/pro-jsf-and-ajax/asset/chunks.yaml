    Unless you are a serious JavaScript or Ajax hacker, you should think twice before
    choosing Ajax to build a SPIF application. In context, a SPIF application built
    on top of a pure Ajax solution definitely means more client-side code. More client-side
    code means more work at the browser, which means that code-intensive SPIF applications
    will need powerful processors to give the user the responsiveness desired. Although
    computers have become faster, the processor problem with JavaScript functionality
    in the past has not completely disappeared—not to mention that maintaining all
    that JavaScript code is not a task for the faint of heart!


    If you combined the asynchronous communication channel provided by Ajax with a
    feature-rich, client-side component model, you would be golden. As you learned
    in Chapter 4, RITs, Mozilla XUL, and Microsoft HTC provide developers with well-confined
    environments for building reusable components. With JSF, it is possible to provide
    a solution that combines Ajax and XUL or combines Ajax and HTC and therefore gives
    the component writer the best of both worlds and gives the application developer
    a lightweight and responsive framework.


    This chapter will focus on using XUL and show how you can leverage XUL’s extensibility
    and the declarative component model to enhance your JSF components. You will provide
    a new XUL RenderKit for the ProInputDate and ProShowOneDeck components.


