    />\n    <h:panelGrid columns=\"2\">\n\n![Image 9](img/index-72_1.png)\n\n5807ch01.qxd\
    \ 1/3/06 4:47 PM Page 47\n\nC H A P T E R 1 ■ T H E F O U N D AT I O N O F J S\
    \ F : C O M P O N E N T S\n\n**47**\n\n        <f:verbatim><jsp:text>Username</jsp:text></f:verbatim>\n\
    \        <h:inputText value=\"#{credentials.username}\" />\n        <f:verbatim><jsp:text>Password</jsp:text></f:verbatim>\n\
    \        <h:inputText value=\"#{credentials.password}\" />\n    </h:panelGrid>\n\
    \    <h:commandButton value=\"Submit\" action=\"#{credentials.onLogin}\" />\n\
    </h:form>\n```\n\n`<f:verbatim>`标签获取非 JSF 内容并将其作为`UIOutput`组件添加到组件层次结构中。在运行时，更新后的页面看起来如图\
    \ 1-25 所示。\n\n**图 1-25.** *使用`<f:verbatim>`标签渲染非 JSF 内容*\n\n■**注意** `rendersChildren`的问题已在\
    \ JSF 1.2 版本中由 JSF 专家组（EG）解决。新的内容交织特性适应了 JSF 和 JSP 渲染策略之间的差异，使得不再需要添加`<f:verbatim>`包装标签。\n\
    \n**总结**\n\n本章作为本书其余部分的迷你指南；它也为你继续深入 JSF 世界提供了基础。\n\nJSF 相对于其他视图技术的一个关键区别在于其开放性和采用新兴技术的能力，例如\
    \ XUL、HTC 和 Ajax，以及其他未来的视图技术。JSF 相对于其他技术具有明显的优势，因为使用 JSF 构建的应用程序可以在周围技术消亡和新技术出现时继续存在。JSF\
    \ 可以降低应用程序开发的维护成本，因为只需要一种编程模型——JSF 和 Java——即使系统可能需要不同的用户代理，如 Telnet、即时消息、移动代理、浏览器和其他类型的代理（如条形码阅读器）。\n\
    \n5807ch01.qxd 1/3/06 4:47 PM Page 48\n\n**48**\n\nC H A P T E R 1 ■ T H E F O\
    \ U N D AT I O N O F J S F : C O M P O N E N T S\n\n本章涉及了构成 JSF 应用程序的细节——JSF 组件、导航模型以及通过托管\
    \ Bean 实现的后端逻辑。我们还探讨了 JSF 组件模型的来龙去脉及其在表示和行为之间的清晰分离，并讨论了 JSF 组件的结构——`UIComponent`、`Renderer`、特定于渲染器的子类`RenderKit`以及\
    \ JSP 标签处理器。本章还详细介绍了初始请求和回发时的 JSF 请求生命周期，包括导航。\n\n理解表示和行为之间的分离对于掌握 JSF 组件的全部潜力至关重要。\n\
    \n5807ch02.qxd 12/30/05 4:27 PM Page 49\n\nC H A P T E R 2\n\n■ ■ ■\n\n定义日期\n\n\
    字段组件\n\n*通过允许开发者将解决方案的功能分离到组件中，* *并将其放置在解决方案最合理的位置，基于组件的设计消除了许多* *曾经阻碍解决方案部署和维护的约束。*\n\
    \n—微软开发者网络（MSDN）\n\n**在**第一章介绍了 JSF 之后，本章将探讨组件设计的概念及其在 JSF 中的适用性。\n\n本章的主要重点是让你快速掌握设计和创建可重用\
    \ JSF 组件所需的构建块。创建 JSF 组件并不难；你只需要遵循一个明确定义的蓝图，我们将在本章中提供。具体来说，我们将介绍如何创建`Renderer`，如何创建特定于渲染器的子类，如何创建\
    \ JSP 标签处理器，以及如何注册你的自定义 JSF 组件。\n\n为了说明这个过程，我们将展示如何创建一个简单的日期字段组件，你将在本书中一直使用它。在后续章节中，我们将展示如何增强这个日期字段组件，直到你得到一个支持\
    \ Ajax、XUL 和 HTC 的丰富、成熟的 JSF 组件。尽管如此，在本章结束时，你应该拥有第一个功能组件，可以向你的朋友和开发者同行展示。\n\n\
    **日期字段组件的需求**\n"
- fmt: 'You can build your own reusable component in many ways, but for JSF the most
    common approach is to locate a component that already has the behavior you need
    and expand upon it. So, what type of behavior is required of the component you
    will build in this chapter? For example, is it for inputting values, selecting
    one value, selecting many values, or navigating?


    Well, you’ll build a component that can take a value, process that value, and
    then push it back to the underlying model as a strongly typed `Date` object. The
    component should allow an application developer to attach a converter in order
    to set the desired date format (such as `mm/dd/yyyy`) for which the end user has
    to comply. Basically, you’ll build a simple input component that can convert and
    validate the date entered by users.


    Having confirmed that this is what you need, it is easy to search existing components
    for this particular behavior. Table 2-1 lists all the behavioral superclasses
    available in the JSF specification.


    **Table 2-1.** JSF Specification: Behavioral Superclasses


    | Name | Description |

    |------|-------------|

    | `UIColumn` | `UIColumn` (extends `UIComponentBase`) is a component that represents
    a single column of data with a parent `UIData` component. The child components
    of a `UIColumn` will be processed once for each row in the data managed by the
    parent `UIData`. |

    | `UICommand` | `UICommand` (extends `UIComponentBase`; implements `ActionSource`)
    is a control that, when activated by the user, triggers an application-specific
    “command” or “action.” Such a component is typically rendered as a button, a menu
    item, or a hyperlink. |

    | `UIData` | `UIData` (extends `UIComponentBase`; implements `NamingContainer`)
    is a component that represents a data binding to a collection of data objects
    represented by a `DataModel` instance. Only children of type `UIColumn` should
    be processed by renderers associated with this component. |

    | `UIForm` | `UIForm` (extends `UIComponentBase`; implements `NamingContainer`)
    is a component that represents an input form to be presented to the user and whose
    child components (among other things) represent the input fields to be included
    when the form is submitted. The `encodeEnd()` method of the renderer for `UIForm`
    must call `ViewHandler.writeState()` before writing out the markup for the closing
    tag of the form. This allows the state for multiple forms to be saved. |

    | `UIGraphic` | `UIGraphic` (extends `UIComponentBase`) is a component that displays
    a graphical image to the user. The user cannot manipulate this component; it is
    for display purposes only. |

    | `UIInput` | `UIInput` (extends `UIOutput`, implements `EditableValueHolder`)
    is a component that both displays the current value of the component to the user
    (as `UIOutput` components do) and processes request parameters on the subsequent
    request that needs to be decoded. |

    | `UIMessage` | `UIMessage` (extends `UIComponentBase`) encapsulates the rendering
    of error message(s) related to a specified input component. |

    | `UIMessages` | `UIMessages` (extends `UIComponentBase`) encapsulates the rendering
    of error message(s) not related to a specified input component or all queued messages.
    |

    | `UIOutput` | `UIOutput` (extends `UIComponentBase`; implements `ValueHolder`)
    is a component that has a value, optionally retrieved from a model tier bean via
    a value-binding expression that is displayed to the user. The user cannot directly
    modify the rendered value; it is for display purposes only. |

    | `UIPanel` | `UIPanel` (extends `UIComponentBase`) is a component that manages
    the layout of its child components. |

    | `UIParameter` | `UIParameter` (extends `UIComponentBase`) is a component that
    represents an optionally named configuration parameter that affects the rendering
    of its parent component. `UIParameter` components do not generally have rendering
    behavior of their own. |

    | `UISelectBoolean` | `UISelectBoolean` (extends `UIInput`) is a component that
    represents a single boolean (`true` or `false`) value. It is most commonly rendered
    as a checkbox. |'
