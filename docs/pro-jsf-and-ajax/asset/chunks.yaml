    XAML 技术的机会。XAML 的 XAMLON 预览实现有两个主要缺点。首先，它需要 Internet Explorer 的 .NET 1.1 运行时插件。其次，它无法（很好地）与
    HTML 页面集成。如果您想要一个插件，您会选择像 Macromedia Flash 这样成熟且可跨平台工作的方案，然后就此了事。


