    \      this.currentMonth = month;\n      this.currentYear = year;\n      this.scroll(0);\n\
    \      if (parsedDate != null)\n        this.select(parsedDate.getDate());\n \
    \   ]]>\n  </body>\n</method>\n```\n\nThe `popup` method will first read the user-defined\
    \ date string from the input field and then parse that date string into a `Date`\
    \ object. If parsing is successful, it uses the `Date` object; otherwise, it uses\
    \ today’s `Date`. Next it ensures there is no previous selection, before calling\
    \ the `scroll` method, by passing zero as an argument to ensure fully populated\
    \ calendar day cells but staying on the current month (zero navigation). Finally,\
    \ the `popup` method will select an initial date (if possible).\n\nThe `scroll`\
    \ method, as shown in Code Sample 8-7, allows the user to navigate plus or minus\
    \ one month using arrow controls in the calendar. You can use Mabon to determine\
    \ the availability of dates defined by the managed bean attached to the enhanced\
    \ `DateValidator`.\n\n**Code Sample 8-7.** *The* `scroll` *Method in the* `bindings.xml`\
    \ *File*\n\n```\n<method name=\"scroll\">\n  <parameter name=\"offset\"/>\n  <body>\n\
    \    <![CDATA[\n      var gridNode = document.getElementById('grid');\n      var\
