- fmt: 'Part of the design of the component is that it should allow the user to expand
    only one item at a time. For this you need to first identify the item activated
    by the user; this takes place with the `alert()` function attached to each item,
    and `[showItem.id]` illustrates the identifier.


    In addition, you need a way to keep track of each item and to ensure that only
    one is expanded at any time.


    To achieve this, you need a parent container that can listen for the event identifying
    the activated item and then expand it and close the previously opened item. The
    prototype uses the `<div class=[showOne.styleClass]>` element as the logical parent
    container. This design of having a logical container for multiple items is modeled
    after `HtmlDataTable` and `UIColumn` in the JSF specification. The attributes
    in the prototype are associated with one of these components (in other words,
    the parent container, `showOne`) or one of its children (`showItem`).


    It is important to note that although the prototype describes the user interface
    requirements, some attributes and functionality still might not be visible or
    make sense in the actual prototype. For the HTML source in Code Sample 3-2, one
    attribute is not visible but still needed by the implementation—`showOne.showItemId`.
    It will be used to set the default expanded item on the initial request. Additionally,
    you need to let application developers listen for events on the component `showOne.showListener`
    and invoke application logic when an item has been activated.


    Before you start creating the deck component, take a sneak peak at the final result
    and how it will be used in a JSP page, as shown in Code Sample 3-3.


