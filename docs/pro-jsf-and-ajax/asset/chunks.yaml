- fmt: '# The Deck Component: Events and Listeners


    The tags highlighted in bold represent the JSF components you will learn how to
    create in this chapter. As you can see, the sample is a fairly simple application
    with one parent component—`<pro:showOneDeck ... >`—that keeps track of which item
    is currently open and which node is set to be expanded by default. In the page
    the parent component has three children—`<pro:showItem ... >`. Each `<pro:showItem
    ... >` child component has its own unique identifier (for example, `first`, `second`,
    and `third`). Each `<pro:showItem ... >` has a facet—`<f:facet name="header">`—associated
    with it representing the "header" of the clickable area of the item (see Chapter
    1 for more about facets).


    Part of the deck component''s requirements is to allow application developers
    to use any component to represent the actual clickable header, and as examples
    we have used regular `<h:outputText>` and `<h:panelGroup>` components. Nested
    within each `<pro:showItem ... >` is a set of children, which will be displayed
    when the user selects an item. When the user selects any of the `<pro:showItem
    ... >` components, an event will be delivered to the event queue for processing
    in the Invoke Application phase.


    To be able to react to this event, a new listener—`<pro:showListener ... />`—listens
    for the aforementioned event.


    ## Step 2: Creating Events and Listeners


    To be able to create the component, you need to understand two new behavioral
    superclasses—`UIShowOne` and `UIShowItem`. The `UIShowOne` behavioral superclass
    keeps track of which node the user has selected, and the `UIShowItem` acts as
    a clickable parent container that will either show or hide its children. For these
    new `UIComponents`, you also need a new event type, `ShowEvent`, with a corresponding
    event listener interface, `ShowListener`, to notify application developers and
    to attach application code to the component. The new event instance needs to keep
    track of which item the user has selected. On top of this, you need to create
    a new `Renderer` to handle the selective rendering with accompanying renderer-specific
    subclasses and JSP tag handlers.


    Figure 3-4 shows the classes needed for the event and listener implementation
    that you will learn how to create in this chapter.


    ![Image 19](index-139_1.png)


    **Figure 3-4.** *Class diagram showing all classes needed for the event and listener
    implementation*


    ## Event Handling Overview


    This section will cover a few topics regarding the JSF event model before you
    see the code for the event and listener implementation for the deck component.


    If you have experience developing applications with the Swing toolkit or Oracle''s
    ADF Swing framework, you will notice that the event model implemented by JSF is
    similar. In fact, JSF implements a model for event notification and listener registration
    based on the naming convention in the JavaBeans specification, version 1.0.1.
    Essentially, this means an application developer can write application code and
    register it to listen for a specific event. A `UIComponent` delivers the event
    itself (for example, when a user clicks a button, which is similar to the approach
    taken in other UI toolkits). Application developers will immediately recognize
    the benefits of such a model, since it has proven to be easy to maintain and develop.
    It allows application developers to write application code for specific events
    in well-defined blocks of code like the ones used in Microsoft Visual Basic.


    The main difference between the Swing framework and JSF is that Swing operates
    in a stateful mode and is always listening for events fired by the client; by
    contrast, JSF works in a stateless environment. With no permanent connection between
    the client and the backend server, JSF cannot always listen to events and has
    to rely on postbacks to be notified about any changes on the client that might
    cause an event to be delivered. This limitation of HTTP has forced JSF to implement
    a strict event model to handle client-generated events, based on the JSF request-processing
    lifecycle described in Chapter 1.


    During postback, all six phases of the JSF request lifecycle are called (unless
    somewhere in the process `renderResponse()` is called, in which case the lifecycle
    will directly jump to the Render Response phase). When the Restore View phase
    is executed, it restores any state available from the previous request. During
    the Apply Request Values phase (see Figure 3-5), the submitted value from the
    request parameters is established and added to each input component, and any events
    are queued.


    **Figure 3-5.** *Applying new values passed on the request to the components*


    By default, at the end of each one of these phases, the appropriate `UIViewRoot`
    lifecycle management method (`processDecodes()`, `processValidators()`, `processUpdates()`,
    and `processApplication()`) will loop over events queued in the phase and notify
    any registered listeners on the component that queued the event (for example,
    a `ProShowOneDeck`). Application logic in these listeners can also queue events,
    and the `UIViewRoot` lifecycle management method will continue looping through
    the queued list of events until it is empty before continuing to the next phase.


    > **Note** It is important to understand that events can be queued and delivered
    during any of the following request lifecycle phases: Apply Request Values, Process
    Validations, Update Model Values, and Invoke Application.


    ## Events


    Application developers can use event instances to be notified about changes to
    the UI or underlying model. The JSF specification defines two default event types—`javax.faces.event.ActionEvent`
    and `javax.faces.event.ValueChangeEvent`. The `ActionEvent` is usually delivered
    when a user activates a `UICommand` component, and the `ValueChangeEvent` indicates
    that a value has changed in any of the `UIInput` components.


    ### The `FacesEvent` Base Class


    The `javax.faces.event.FacesEvent` class is the abstract base class for UI and
    application events within JSF that can be delivered by `UIComponents`. The `FacesEvent`
    constructor takes one argument—the `UIComponent` event source instance, which
    identifies the component from which the event will be broadcast to interested
    listeners. All component event classes within JSF—default or custom—must extend
    the `FacesEvent` class in order to be supported by the request-processing lifecycle.
    The `FacesEvent` extends `java.util.EventObject`, which is the base class for
    all events in the Java Standard Edition. Table 3-2 describes the structure of
    the `FacesEvent` base class.


    **Table 3-2.** *Method Summary of the `FacesEvent` Base Class*


    | Method | Return Type | Description |

    |--------|-------------|-------------|

    | `getComponent()` | `javax.faces.component.UIComponent` | Returns the source
    `UIComponent` instance that delivered this event |

    | `getPhaseId()` | `javax.faces.event.PhaseId` | Returns the identifier—`phaseId`—for
    which phase this event is going to be delivered |

    | `setPhaseId` | `void` | Sets the `PhaseId` during which this event will be delivered
    |

    | `isApproriateListener()` | `boolean` | Checks whether this listener is of a
    listener instance that this event supports |

    | `processListener()` | `void` | Broadcasts this event to the specified listener
    |

    | `queue()` | `void` | Convenience method that queues this event for broadcast
    at the end of the current request-processing lifecycle phase |


    *Source: The API Java documentation for the JSF specification*


    ### The `phaseId` Property'
