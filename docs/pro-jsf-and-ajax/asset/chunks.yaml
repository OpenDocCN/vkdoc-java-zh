    Mabon APIs


    The following sections cover the available APIs and how to register Mabon with
    an application.


    **Mabon Servlet Configuration**


    If you are planning on using Mabon for your Ajax-enabled components, you should
    be aware that it adds an extra step for the application developer using your JSF
    component library. The application developer needs to add the entry shown in Code
    Sample 7-9 to the Web application configuration file—web.xml.


    **Code Sample 7-9.** *Mabon Servlet Configuration*


    <servlet>


    <servlet-name>Mabon Servlet</servlet-name>


    **<servlet-class>net.java.dev.mabon.webapp.FacesLifecycleServlet</servlet-class>**


    <init-param>


    **<param-name>javax.faces.LIFECYCLE_ID</param-name>**


    **<param-value>net.java.dev.mabon</param-value>**


    </init-param>


    </servlet>


    ...


    <servlet-mapping>


    <servlet-name>Mabon Servlet</servlet-name>


    **<url-pattern>/mabon/*</url-pattern>**


    </servlet-mapping>


    The servlet class—net.java.dev.mabon.webapp.FacesLifecycleServlet—and the initialization
    parameter (for example, net.java.dev.mabon) is part of the Mabon contract.


    The application developer can decide to set the mapping to the same url-pattern(s)
    as defined by default (for example, /mabon/*) or override the default URL mapping
    in case it is colliding with resources used by the Web application. Mabon automatically
    consumes this URL mapping change without requiring any code changes.


    **Mabon JavaScript APIs**'
