    应用程序开发人员会在 JSP 页面描述中使用自定义操作（也称为*标签*）来指示应用程序所需的 JSF UIComponent。该自定义操作对应一个标签处理类，负责创建
    UIComponent 并将每个声明式 JSP 标签属性传递给 UIComponent 实例。自定义操作的语法既包含行为属性，也包含特定于渲染器的属性。因此，每个此类自定义操作都与特定的组件系列和渲染器类型组合绑定。例如，JSF
    实现提供的标准 HTML RenderKit 支持 UIInput 组件的三种渲染器类型（Text、TextArea 和 Secret），这需要三个独立的自定义操作（inputText、inputTextArea
    和 inputSecret）。您正在扩展 UIInput 组件并添加一个新的渲染器类型——com.apress.projsf.Date，因此还必须提供一个新的
    JSP 自定义操作 inputDate。


    图 2-11 展示了您将要创建的标签处理程序及其支持类的类图。


    **图 2-11.** *ProInputDate 标签处理程序及其支持类的类图* UIComponentTagSupport 类


