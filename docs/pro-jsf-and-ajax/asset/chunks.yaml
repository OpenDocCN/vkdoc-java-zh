- fmt: "# 排版后的内容\n\n导入`com.apress.projsf.ch2.render.html.HtmlRenderer`。`UIComponent`类和`Renderer`类都是编写客户端特定渲染器时契约的一部分。`FacesContext`是创建`decode()`、`encodeBegin()`、`encodeChildren()`和`encodeEnd()`方法时契约的一部分，所有标记都使用`ResponseWriter`写入客户端。`FacesContext`包含与JSF请求处理过程及相应渲染响应相关的所有每请求状态信息。\n\
    \n`UIInput`类是你将为其提供新渲染器的行为超类。你还需要访问`ExternalContext`来获取请求参数。`ExternalContext`类允许基于JSF的应用程序在Servlet或Portlet环境中运行，并让你能够访问（例如）会话实例、响应对象和路径信息。\n\
    \n对于输入日期组件，你还希望使用`Converter`将请求中传递的实际`String`转换为强类型的`Date`对象，并可能为无效输入值抛出`ConverterException`。如果应用程序开发者未指定转换器，你必须提供默认的`DateTimeConverter`。\n\
    \n当你拥有输入日期组件所需的所有类时，就可以开始编码了。在本章中，你将创建一个特定于HTML的渲染器，其组件类型设置为`Input`，并指定其接受`Date`类型的值，因此该类的合适名称是`HtmlInputDateRenderer`。\n\
    \n## 编码开始与编码结束\n\n在初始请求期间，只有两个阶段在工作——恢复视图和渲染响应——因此渲染器的`decode()`方法不会被调用，因为它是在应用请求值阶段调用的。唯一被调用的方法是`encodeBegin()`、`getRendersChildren()`、`encodeChildren()`和`encodeEnd()`：\n\
    \n- `encodeBegin()`通常用于为`UIComponent`编写开头的客户端标记元素（例如，`<table>`）。\n- `encodeEnd()`通常用于为`UIComponent`编写结尾的客户端标记元素（例如，`</table>`）。\n\
    - `getRendersChildren()`用作一个标志，指示`UIComponent`/`Renderer`是否负责渲染其子组件。\n- `encodeChildren()`仅在`rendersChildren`属性返回`true`时被调用。在这种情况下，`UIComponent`（或其`Renderer`，如果存在）负责渲染其子组件。\n\
    \n## RENDERSCHILDREN属性\n\n前面提到的方法——`encodeChildren()`——依赖于一个名为`rendersChildren`的只读`UIComponent`属性。如果组件有渲染器，则组件委托给`Renderer`来确定`rendersChildren`是否为`true`。如果`Renderer`需要访问其子组件以正确地向客户端渲染输出，则它返回`true`。JSF标准中的一个例子是`h:dataTable`，其中需要预先知道列子组件的数量才能正确渲染HTML标记。\n\
    \n如果`rendersChildren`为`true`，则`Renderer`控制其整个组件子树的渲染。这意味着当JSP引擎执行管理一个`rendersChildren`设置为`true`的组件的标签时，它不会继续遍历组件层次结构并请求每个组件进行渲染，而是必须先创建组件层次结构，以便子组件层次结构对父组件及其`Renderer`可用。\n\
    \n应用程序开发者可以在JSP文档中向输入组件附加自定义的`Converter`或`Validator`。重要的是，在渲染期间直到`encodeEnd()`之前，不要引用`Converter`或`Validator`，因为自定义的`Converter`或`Validator`在`encodeBegin()`完成之前不会附加到组件上。因此，你将避免为你的`HtmlInputDateRenderer`使用`encodeBegin()`，而是将大部分渲染工作放在`encodeEnd()`中。代码示例2-11展示了`encodeEnd()`方法的两个参数。\n\
    \n**代码示例2-11.** `encodeEnd()`方法的参数\n\n```\npublic class HtmlInputDateRenderer\
    \ extends HtmlRenderer\n{\n    public void encodeEnd(\n        FacesContext context,\n\
    \        UIComponent component) throws IOException\n    {\n```\n\n`encodeEnd()`方法接受两个参数——`FacesContext\
    \ context`和`UIComponent component`。渲染响应阶段将在`UIComponent`上调用`encodeEnd()`方法，该方法又会委托给`Renderer`上的`encodeEnd()`方法，传递`FacesContext`和`UIComponent`实例。在这种情况下，你保证会收到一个`UIInput`实例，但也可能收到一个特定于渲染器的`UIInput`子类。如果需要强制转换，你总是强制转换为行为超类，而不是特定于渲染器的子类。\n\
    \n## 查找属性值\n\n像你正在创建的这样的组件通常包含一组特定于渲染器的属性，例如`title`、`width`和`height`。对于`inputDate`组件，你之前确定需要HTML属性——`value`、`title`和`name`。\n\
    \n这些HTML属性使用行为组件的`clientId`和转换后的`value`属性进行渲染。你还必须渲染特定于标记的属性，因此在代码示例2-12中，你在`UIComponent`属性的`Map`中查找特定于渲染器的`title`属性。\n\
    \n## 为什么不在渲染器中强制转换为特定于渲染器的子类？\n\n可选地，你可以将组件强制转换为特定于渲染器的子类，并直接使用getter来查找特定于渲染器的属性。然而，出于与第1章中描述的类似原因，你需要确保你的`Renderer`即使在应用程序开发者以编程方式创建新的`UIInput`、设置渲染器类型并将其添加到组件层次结构时也能正常工作。\n\
    \n以下代码摘自一个示例支持bean，说明了应用程序开发者如何以编程方式将`UIInput`组件添加到组件层次结构中：\n\n```\npublic void\
    \ setBinding(\n    UIPanel panel)\n{\n    UIInput input = new UIInput();\n   \
    \ input.setRendererType(\"com.apress.projsf.Date\");\n    Map attrs = input.getAttributes();\n\
    \    attrs.put(\"title\", \"Programmatic Date Field\");\n    panel.getChildren().add(input);\n\
    }\n```\n\n如果你在`Renderer`中总是强制转换为特定于渲染器的组件子类，而不是强制转换为`UIInput`行为超类，则此示例会导致`ClassCastException`。\n\
    \n**代码示例2-12.** 从`UIComponent`获取属性值\n\n```\nMap attrs = component.getAttributes();\n\
    String title = (String)attrs.get(TITLE_ATTR);\nString valueString = getValueAsString(context,\
    \ component);\n```\n\n`getAttributes()`方法返回与此`UIComponent`关联的可变`Map`（包含属性和属性），以属性名称为键。然后你可以在该`Map`上查找指定属性的值（例如，`title`）。在代码示例2-12中，你使用了值为`title`的`TITLE_ATTR`常量。`getValueAsString()`方法由`HtmlInputDateRenderer`定义，并返回组件的`submittedValue`属性（在先前不成功的回发之后）或组件的`value`属性，格式化为字符串。\n\
    \n## 标识组件"
  raw: 'import com.apress.projsf.ch2.render.html.HtmlRenderer; The UIComponent class
    and the Renderer class are both part of the contract when writing client-specific
    Renderers. The FacesContext is part of the contract when creating the decode(),
    encodeBegin(), encodeChildren(), and encodeEnd() methods, and all markup is written
    to the client using a ResponseWriter. The FacesContext contains all information
    about the per-request state related to a JSF request process and the corresponding
    render response.


    The UIInput class is the behavioral superclass you’ll provide with a new Renderer.
    You also need access to the ExternalContext to access request parameters. The
    ExternalContext class allows JSF-based applications to run in either a servlet
    or a portlet environment and gives you access to (for example) session instance,
    response object, and path information.


    For the input date component, you also want to convert to a strongly typed Date
    object the actual String passed on the request using a Converter and possibly
    throw a ConverterException for invalid input values. In case the application developer
    does not specify a converter, you must provide a default DateTimeConverter.


    When you have access to all the classes needed for the input date component, it
    is time to code. In this chapter, you will create an HTML-specific renderer that
    has the component type set to Input and that is designated to take a value of
    type Date, so an appropriate name of this class is HtmlInputDateRenderer.


    **Encode Begin and Encode End**


    During the initial request, only two phases are at work—Restore View and Render
    Response—


    so the decode() method of the renderer will not be called since it is called in
    the Apply Request Value phase. The only methods called are encodeBegin(), getRendersChildren(),
    encodeChildren(), and encodeEnd():


    • encodeBegin() is generally used to write the opening client markup element(s)
    for the UIComponent (for example, <table>).


    • encodeEnd() is generally used to write the closing client markup element(s)
    for the UIComponent (for example, </table>).


    • getRendersChildren() is used as a flag to indicate whether a UIComponent/Renderer
    is responsible for rendering its children.


    • encodeChildren() is called only if the rendersChildren property returns true.
    In that case, the UIComponent (or its Renderer, if present) is responsible for
    rendering its child components.


    5807ch02.qxd 12/30/05 4:27 PM Page 62


    **62**


    C H A P T E R 2 ■ D E F I N I N G T H E D AT E F I E L D C O M P O N E N T


    **THE RENDERSCHILDREN PROPERTY**


    The previously mentioned method—encodeChildren()—depends on a read-only UIComponent
    property called rendersChildren. If the component has a renderer, then the component
    delegates to the Renderer to determine whether rendersChildren is true. A Renderer
    returns true for rendersChildren if it needs access to its children components
    to correctly render the output to the client. One example from the JSF standard
    is h:dataTable, where the number of column children is needed in advance to correctly
    render the HTML markup.


    If rendersChildren is true, the Renderer controls rendering for its entire subtree
    of components.


    This means when the JSP engine executes a tag that manages a component with rendersChildren
    set to true, instead of continuing to iterate through the component hierarchy,
    asking each component to render, it has to first create the component hierarchy
    so that the child component hierarchy is available to the parent component and
    its Renderer.


    An application developer can attach a custom Converter or Validator to an input
    component in the JSP document. It is important not to reference either the Converter
    or the Validator during rendering until encodeEnd() because a custom Converter
    or Validator will not be attached to the component until after encodeBegin() has
    completed. Therefore, you will avoid using encodeBegin() for your HtmlInputDateRenderer
    and instead do the majority of the rendering in encodeEnd(). Code Sample 2-11
    shows the endcodeEnd() method’s two arguments.


    **Code Sample 2-11.** *The* encodeEnd() *Method’s Arguments* public class HtmlInputDateRenderer
    extends HtmlRenderer


    {


    **public void encodeEnd(**


    **FacesContext context,**


    **UIComponent component) throws IOException**


    **{**


    The encodeEnd() method takes two arguments—FacesContext context and UIComponent
    component. The Render Response phase will call the encodeEnd() method on the UIComponent,
    which in turn will delegate to the encodeEnd() method on the Renderer, passing
    the FacesContext and the UIComponent instance. In this case, you are guaranteed
    to be passed an instance of UIInput, but you might also be passed a renderer-specific
    subclass of UIInput. If a cast is needed, you always cast to the behavioral superclass,
    rather than to a renderer-specific subclass.


    **Looking Up Attribute Values**


    A component such as the one you are creating usually contains a set of renderer-specific
    attributes, such as title, width, and height. For the inputDate component, you
    previously determined that you needed HTML attributes—value, title, and name.


    These HTML attributes are rendered using the behavioral component’s clientId and
    converted value attribute. You must also render the markup-specific attributes,
    so in Code Sample 2-12, you look up the renderer-specific title attribute in the
    UIComponent attribute’s Map.


    5807ch02.qxd 12/30/05 4:27 PM Page 63


    C H A P T E R 2 ■ D E F I N I N G T H E D AT E F I E L D C O M P O N E N T


    **63**


    **WHY NOT CAST TO A RENDERER-SPECIFIC SUBCLASS IN THE RENDERER?**


    Optionally, you can cast the component to a renderer-specific subclass and use
    the getters directly to look up the renderer-specific attributes. However, for
    similar reasons as those described in Chapter 1, you need to make sure your Renderer
    works even if an application developer creates a new UIInput programmatically,
    sets the renderer type, and adds it to the component hierarchy.


    The following code is an extract from a sample backing bean and illustrates how
    an application developer would add a UIInput component to the component hierarchy
    programmatically: public void setBinding(


    UIPanel panel)


    {


    UIInput input = new UIInput();


    input.setRendererType("com.apress.projsf.Date"); Map attrs = input.getAttributes();


    attrs.put("title", "Programmatic Date Field"); panel.getChildren().add(input);


    }


    This sample would cause a ClassCastException to occur if you always cast to the
    renderer-specific component subclass in your Renderer, instead of casting to the
    UIInput behavioral superclass.


    **Code Sample 2-12.** *Getting Attribute Values from the* UIComponent Map attrs
    = component.getAttributes();


    String title = (String)attrs.get(TITLE_ATTR);


    String valueString = getValueAsString(context, component); The getAttributes()
    method returns a mutable Map of attributes (and properties) associated with this
    UIComponent, keyed by attribute name. On the Map you can then look up the values
    of the attribute specified (for example, title). In Code Sample 2-12, you are
    using the TITLE_ATTR constant with the value title. The getValueAsString() method
    is defined by the HtmlInputDateRenderer and returns either the component’s submittedValue
    attribute after a previously unsuccessful postback or the component’s value attribute,
    formatted as a string.


