    **XUL Summary**


    After reading the previous sections, you should understand the relationship between
    XUL and XBL. You should also know how to create custom XUL components using XBL
    and how to use them in the context of building XUL applications. In the next chapters,
    you will see how to build a new RenderKit for your JSF components by leveraging
    the component model provided by XUL and XBL.


    **Introducing Microsoft Dynamic HTML and HTC**


    In your continuing quest for a rich Internet component framework, the focus of
    this chapter now switches to Microsoft’s offering. Microsoft has a similar offering
    to the Mozilla XUL technology through DHTML and HTC. These technologies rely on
    an underlying platform (in other words, Internet Explorer) to provide a foundation
    for extending HTML elements.'
