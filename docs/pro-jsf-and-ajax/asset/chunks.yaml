    ■**注意** 您可以添加代码来限制哪些组件可以在 facet 内渲染，但最佳实践是允许应用程序开发人员在 facet 中嵌套任何组件（无论是标准组件还是自定义组件）。如果您需要向应用程序开发人员推荐特定类型的组件，可以使用
