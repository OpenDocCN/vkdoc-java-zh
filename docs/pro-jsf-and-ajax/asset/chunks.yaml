    \n`5807index.qxd 1/22/06 4:50 PM Page 440`\n\n`forums.apress.com`\n\nFOR PROFESSIONALS\
    \ BY PROFESSIONALS™\n\nJOIN THE APRESS FORUMS AND BE PART OF OUR COMMUNITY. You’ll\
    \ find discussions that cover topics of interest to IT professionals, programmers,\
    \ and enthusiasts just like you. If you post a query to one of our forums, you\
    \ can expect that some of the best minds in the business—especially Apress authors,\
    \ who all write with *The Expert’s Voice*™—will chime in to help you. Why not\
    \ aim to become one of our most valuable participants (MVPs) and win cool stuff?\
    \ Here’s a sampling of what you’ll find:\n\n**DATABASES**\n\n**PROGRAMMING/BUSINESS**\n\
    \nData drives everything.\n\nUnfortunately, it is.\n\nShare information, exchange\
    \ ideas, and discuss any database Talk about the Apress line of books that cover\
    \ software programming or administration issues.\n\nmethodology, best practices,\
    \ and how programmers interact with the “suits.”\n\n**INTERNET TECHNOLOGIES AND\
    \ NETWORKING**\n\n**WEB DEVELOPMENT/DESIGN**\n\nTry living without plumbing (and\
    \ eventually IPv6).\n\nUgly doesn’t cut it anymore, and CGI is absurd.\n\nTalk\
    \ about networking topics including protocols, design, Help is in sight for your\
    \ site. Find design solutions for your administration, wireless, wired, storage,\
    \ backup, certifications, projects and get ideas for building an interactive Web\
    \ site.\n\ntrends, and new technologies.\n\n**JAVA**\n\n**SECURITY**\n\nWe’ve\
    \ come a long way from the old Oak tree.\n\nLots of bad guys out there—the good\
    \ guys need help.\n\nHang out and discuss Java in whatever flavor you choose:\
    \ Discuss computer and network security issues here. Just don’t let J2SE, J2EE,\
    \ J2ME, Jakarta, and so on.\n\nanyone else know the answers!\n\n**MAC OS X**\n\
    \n**TECHNOLOGY IN ACTION**\n\nAll about the Zen of OS X.\n\nCool things. Fun things.\n\
    \nOS X is both the present and the future for Mac apps. Make It’s after hours.\
    \ It’s time to play. Whether you’re into LEGO®\n\nsuggestions, offer up ideas,\
    \ or boast about your new hardware.\n\nMINDSTORMS™ or turning an old PC into a\
    \ DVR, this is where technology turns into fun.\n\n**OPEN SOURCE**\n\n**WINDOWS**\n\
    \nSource code is good; understanding (open) source is better.\n\nNo defenestration\
    \ here.\n\nDiscuss open source technologies and related topics such as Ask questions\
    \ about all aspects of Windows programming, get PHP, MySQL, Linux, Perl, Apache,\
    \ Python, and more.\n\nhelp on Microsoft technologies covered in Apress books,\
    \ or provide feedback on any Apress Windows book.\n\nHOW TO PARTICIPATE:\n\nGo\
    \ to the Apress Forums site at `http://forums.apress.com/`.\n\nClick the New User\
    \ link.\n\n# Document Outline\n\n*   [Pro JSF and Ajax: Building Rich Internet\
    \ Components](#index_split_000.html#p1)\n    *   [Table of Content](#index_split_000.html#p8)\n\
    \    *   [PART 1 Developing Smarter with JavaServerTM Faces](#index_split_000.html#p26)\n\
    \        *   [Chapter 1 The Foundation of JSF: Components](#index_split_000.html#p28)\n\
    \        *   [Chapter 2 Defining the Date Field Component](#index_split_000.html#p74)\n\
    \        *   [Chapter 3 Defining the Deck Component](#index_split_001.html#p130)\n\
    \    *   [PART 2 Designing Rich Internet Components](#index_split_002.html#p196)\n\
    \        *   [Chapter 4 Using Rich Internet Technologies](#index_split_002.html#p198)\n\
    \        *   [Chapter 5 Loading Resources with Weblets](#index_split_003.html#p238)\n\
    \        *   [Chapter 6 Ajax Enabling the Deck Component](#index_split_003.html#p248)\n\
    \        *   [Chapter 7 Ajax Enabling the Date Field Component](#index_split_004.html#p292)\n\
    \        *   [Chapter 8 Providing Mozilla XUL Renderers](#index_split_004.html#p328)\n\
    \        *   [Chapter 9 Providing Microsoft HTC Renderers](#index_split_005.html#p386)\n\
    \        *   [Chapter 10 Switching RenderKits Dynamically](#index_split_006.html#p428)\n\
    \    *   [Index](#index_split_006.html#p438)"
