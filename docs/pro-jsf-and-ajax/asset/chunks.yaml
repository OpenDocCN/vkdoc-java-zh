    ■**注意** 使用 XMLHttpRequest 时，应用程序中不需要表单元素，但有一个功能无论采用常规回发还是 Ajax 回发都需要表单——文件上传。如果应用程序需要文件上传功能，则必须使用
    form.submit()。在 Ajax 环境中，可以通过使用隐藏的 `<iframe>` 标签、form.submit() 函数并设置 target 来实现。


    Ajax 并非万能魔杖


    如你所知，XMLHttpRequest 对象是 Ajax 中的重要角色，因为它能在客户端和服务器之间异步传输数据。需要理解的是，XMLHttpRequest
    并非能自动解决所有问题的万能魔杖。使用 XMLHttpRequest 对象时，仍需密切关注性能和可扩展性。如果你意识到这一点，就很容易理解：真正影响性能的是你在请求中发送的内容、响应中接收的内容以及在客户端管理的内容。


    **构建 Ajax 应用程序**


    传统 Web 应用程序在大多数情况下比桌面应用程序慢。借助 Ajax，你现在可以向 Web 服务器发送请求，仅检索所需数据，并使用 JavaScript 处理响应，从而创建响应更快的
