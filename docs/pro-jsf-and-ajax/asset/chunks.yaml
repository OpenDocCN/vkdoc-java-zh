    configuration file—faces-config.xml—at application start-up. The JSF implementation
    processes any configuration files available accordingly to the following rules—first
    by searching for all resources named META-INF/faces-config.xml in the ClassLoader
    resource paths for this web application.


    Then, it checks for the existence of a context initialization parameter named
    javax.


    faces.CONFIG_FILES. If this parameter exists, it will be treated as a comma-delimited
    list of ServletContext relative resource paths (starting with /) and load each
    of the specified resources into the Application instance. Finally, the JSF implementation
    will check for the existence of a Web application configuration resource named
    /WEB-INF/faces-config.xml and load it if the resource exists. JSF then merges
    the metadata definitions found in these faces-config.xml files.


    The benefit of this aggregated approach is that it allows developers to package
    a faces-config.xml file with their custom component library, which in turn has
    the benefit of simpler installation of custom component libraries as a single
    JAR file. It also allows application developers to override component-specific
    configurations in the application-specific WEB-INF/faces-config.xml file since
    it takes precedence over all other faces-config.xml files.


