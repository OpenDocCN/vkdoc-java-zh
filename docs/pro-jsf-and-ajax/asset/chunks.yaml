    在 JSF 1.2 规范发布后，将不再需要 Mabon FacesLifecycleServlet。使用 Mabon 项目为支持 Ajax 的组件提供数据的组件开发者，可以将
    Mabon 的 Servlet 条目更改为使用 JSF 1.2 的 `javax.faces.webapp.FacesServlet` 类，而不是 `net.java.dev.mabon.webapp.FacesLifecycleServlet`
    类。Mabon 提供的 `FacesLifecycleServlet` 使用与 JSF 1.2 `FacesServlet` 相同的语法来自定义 Lifecycle，从而简化了应用程序开发者向
    JSF 1.2 的升级路径。


    **LifecycleFactoryImpl 类**


    此类的唯一目的是添加第二个生命周期——MabonLifecycle。


    **MabonViewHandler 类**


    在初始渲染期间，自定义 Renderer 需要提供一个指向后台 Bean 的路径，该路径可以被 `FacesLifecycleServlet` 拦截，并在
    `InvokeApplicationPhase` 期间用于调用引用的后台 Bean。通过使用 Mabon 协议，组件作者可以从 `MabonViewHandler`
