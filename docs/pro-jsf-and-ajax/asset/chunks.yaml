- fmt: "# Facets\n\nOne example is the `dataTable` component, where the children represent\
    \ the columns to be rendered in the table. In some cases it might be useful to\
    \ identify a component that represents the header and/or footer of the entire\
    \ table, separate from the usual child collection that represents the individual\
    \ columns. These header and footer child components are called *facets*, referenced\
    \ only by name, with no specific order. The name of a facet represents the role\
    \ that the nested component will play in the parent component. It is important\
    \ to note that a parent component can contain only one child component per named\
    \ facet, but the same parent component can contain many indexed child components.\n\
    \nCode Sample 1-13 shows how to add a header facet to both the `dataTable` component\
    \ and the `column` component.\n\n**Code Sample 1-13.** *Facets Within a* `dataTable`\
    \ *Component*\n\n```\n<h:dataTable value=\"#{sample.tableList}\" var=\"rows\"\
    \ >\n    <f:facet name=\"header\" >\n        <h:outputText value=\"Contact Information\"\
    \ />\n    </f:facet>\n    <h:column>\n        <f:facet name=\"header\" >\n   \
    \         <h:outputText value=\"Firstname\" />\n        </f:facet>\n        <h:outputText\
    \ value=\"#{rows.firstname}\" />\n    </h:column>\n    …\n</h:dataTable>\n```\n\
    \n# Renderers\n\nThe JSF specification outlines two models for how a JSF component\
    \ can handle values from incoming requests (*decode*) and outgoing response (*encode*).\
    \ These two models—direct implementation and delegated implementation—have two\
    \ distinct approaches; the direct implementation relies on the `UIComponent` instance\
    \ to handle decode and encode, and the delegate implementation delegates these\
    \ responsibilities to a `Renderer`. As you have seen in Figure 1-5, the delegate\
    \ approach allows application developers to work with the `UIComponent` independently\
    \ from what will be rendered on the client. In this book, we will discuss only\
    \ the delegate implementation approach, since our goal is to provide multiple\
    \ `Renderer`s for each behavioral component. This approach is also what makes\
    \ JSF such a powerful UI framework.\n\n> **Note** The direct implementation approach\
    \ provides slightly better performance since there is no need to delegate to a\
    \ `Renderer`, but it also severely limits extensibility and portability across\
    \ clients.\n\n`Renderer`s are responsible for the presentation of a JSF component\
    \ and must generate the appropriate client-side markup, such as HTML and JavaScript,\
    \ or XUL. `Renderer`s are also in charge of converting information coming from\
    \ the client to something understandable for the component (for example, a string\
    \ value from an HTML form POST converted to a strongly typed `Date` object).\n\
    \nAlthough a `Renderer` introduces client-side attributes such as `style`, `disabled`,\
    \ `tooltip`, and so on, these attributes are actually exposed in the renderer-specific\
    \ component subclass (for example, `HtmlSelectOneRadio`).\n\nOne major difference\
    \ between `UIComponent`s and `Renderer`s is the way they are defined at runtime.\
    \ `Renderer`s are defined as singletons, so there is only one `Renderer` for all\
    \ instances of a `UIComponent` for each particular renderer type.\n\n> **Caution**\
    \ Since individual `Renderer` instances will be instantiated as requested during\
    \ the rendering process and used throughout the life of a Web application, it\
    \ is important to understand that each instance may be invoked from more than\
    \ one request-processing thread simultaneously. This requires that `Renderer`s\
    \ are programmed in a thread-safe manner.\n\n## Renderer Types\n\nThe renderer\
    \ type is an identifier that is defined by the component, and in combination with\
    \ the component family, it uniquely identifies which `Renderer` class to use with\
    \ the component.\n\nCombining the renderer type and the component family is extremely\
    \ powerful since it allows the reuse of the renderer type for multiple behavioral\
    \ components."
