  trans: '

    每次浏览器渲染页面时，都会确保该页面使用的所有资源均可用。在页面初次渲染期间，浏览器会从 Web 服务器下载每个资源 URL 的新副本，从而用这些资源内容填充其缓存。在此过程中，浏览器会记录响应头中的
    Last-Modified 和 Expires 时间戳。如果当前时间晚于过期时间戳，或者不存在过期时间戳信息，则称缓存内容已过期。


    在下次渲染同一页面时，浏览器会检查本地缓存的资源是否已过期。如果未过期，则直接重用本地缓存的副本。否则，会向 Web 服务器发起新请求，并在请求头 If-Modified-Since
    中包含上次修改信息。Web 服务器的响应要么指示浏览器缓存仍然是最新的，要么将新的资源内容流式传输给浏览器，并在响应头中附带更新后的 Last-Modified
    和 Expires 时间戳。


    Weblets 利用版本控制来充分利用浏览器缓存行为，从而尽可能高效地下载和缓存打包资源。只有当缓存被清空，或者 Web 服务器上的组件库已升级时，浏览器才需要检查新的更新。


    代码示例 5-4 通过向 `com.apress.projsf.ch5` weblet 添加 1.0 版本，展示了此版本控制功能。


    **代码示例 5-4.** *用于生产环境的 Weblets 配置文件，使用* 1.0 *版本控制*


    <?xml version="1.0" encoding="UTF-8" ?>


    <weblets-config >


    <weblet>


    <weblet-name>com.apress.projsf.ch5</weblet-name>


    <weblet-class>net.java.dev.weblets.packaged.PackagedWeblet</weblet-class>


    **<weblet-version>1.0</weblet-version>**


    <init-param>


    <param-name>package</param-name>


    <param-value>com.apress.projsf.ch5.render.html.basic.resources</param-value>


    </init-param>


    </weblet>


    <weblet-mapping>


    <weblet-name>com.apress.projsf.ch5</weblet-name>


    <url-pattern>/projsf-ch5/*</url-pattern>


    </weblet-mapping>


    </weblets-config>


    通过指定 weblet 版本，你表明打包资源在版本号更改之前不会发生变化。因此，版本号会作为资源 URL 的一部分，该 URL 由 WebletsViewHandler
    在运行时确定（例如，`/projsf-ch5$1.0/showOneDeck.js`）。当 WebletContainer 处理此请求时，它会从 URL 中提取版本号，并确定该资源应被缓存且永不过期。一旦新版本的组件库部署到
    Web 应用程序，由 WebletsViewHandler 在运行时创建的资源 URL 就会发生变化（例如，`/projsf-ch5$2.0/showOneDeck.js`）；因此，浏览器缓存的
    1.0 版本的 `showOneDeck.js` 副本将不再有效，因为 URL 已经不同了。


    5807ch05.qxd 1/13/06 2:56 PM 第 219 页


    第 5 章 ■ 使用 WEBLETS 加载资源


    **219**


    在开发过程中，打包资源的内容可能会频繁更改，因此浏览器需要持续与 Web 服务器核对，以检测最新的资源 URL 内容，这一点至关重要。如果在 `weblets-config.xml`
    中省略了 weblet 版本，则每次渲染主 Web 页面时，默认都会进行此检查。


    或者，weblet 配置允许组件编写者将 `-SNAPSHOT` 附加到版本号后面。例如，如代码示例 5-5 所示，`1.0-SNAPSHOT` 表示此文件正在开发中，其行为应与省略版本号时相同。


    **代码示例 5-5.** *用于开发环境的 Weblets 配置文件，使用* SNAPSHOT *版本控制*


    <?xml version="1.0" encoding="UTF-8" ?>


    <weblets-config >


    <weblet>


    <weblet-name>com.apress.projsf.ch5</weblet-name>


    <weblet-class>net.java.dev.weblets.packaged.PackagedWeblet</weblet-class>


    **<weblet-version>1.0-SNAPSHOT</weblet-version>**


    ...


    </weblet>


    ...


    </weblets-config>


    设置安全性


    从 JAR 文件提供打包资源时，必须格外小心，确保 Java 类文件或其他敏感信息不能通过 URL 访问。在桌面 Java 应用程序中，资源文件通常存储在
    Java 实现类下方的 `resources` 子包中，这些实现类会使用这些资源文件。同样的策略也适用于 JSF 组件库中的打包资源，其安全优势在于确保只有资源文件可以通过
    URL 访问。JAR 文件中的所有其他内容，包括 Java 实现类，都无法通过 URL 访问，因为 `resources` 包或其任何子包中都不存在 Java
    类。


    使用 Weblet 协议


    了解了如何配置 weblets 之后，现在来看看如何在两个自定义渲染器（`HtmlInputDateRenderer` 和 `HtmlShowOneDeckRenderer`）中引用由
    weblet 定义的资源。代码示例 5-6 展示了由 weblet 契约定义的语法，用于向 JSF 页面返回正确的 URL。


    **代码示例 5-6.** *Weblet 协议语法* weblet://<weblet 名称><资源>


    `weblet://` 前缀表示这是一个由 weblet 管理的资源，其后跟随着 weblet 名称和请求的资源。


