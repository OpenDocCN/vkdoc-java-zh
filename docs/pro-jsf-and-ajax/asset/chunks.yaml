- fmt: 'JSF 的一个关键区别在于其架构设计独立于特定协议和标记，因此允许开发者将任何渲染技术附加到 JSF 应用程序。在 JSF 中，`RenderKit`
    负责通过向客户端渲染标记来呈现 JSF 应用程序。你可以为任何类型的标记（如 HTML、DHTML、Telnet/字符模式，以及未来的 SVG、Flash、XUL
    等）定义 `RenderKit`，并用它来显示 JSF 页面。


    页面描述（UI 组件层次结构）与标记渲染之间的这种分离是一个关键区别，它为组件开发者提供了灵活性，同时保护应用程序开发者免受渲染层变化的影响。应用程序开发者无需为了解决常见问题（例如不同浏览器如
    Netscape 与 Internet Explorer 之间的可移植性）而学习和实现不同的渲染技术，而是可以使用自定义 JSF 组件，通过统一的编程模型（JSF
    和 Java）来构建针对不同浏览器、个人数字助理（PDA）等设备的应用程序。


    将这一关于 JSF 的新知识应用于图 1-1 中的先前示例（零售解决方案），其架构可能类似于图 1-2。


    `5807ch01.qxd 1/3/06 4:47 PM Page 10`


    **10**


    C H A P T E R 1 ■ T H E F O U N D AT I O N O F J S F : C O M P O N E N T S


    **图 1-2.** *使用 JSF 的 J2EE 架构，适用于典型的面向零售公司的多层软件解决方案*


    在此架构中，只有一个应用程序通过三种不同的 `RenderKit`（超文本标记语言 HTML、无线标记语言 WML 和 Telnet）为三种不同的代理提供服务。在实践中，该应用程序可能仍然是三个不同的页面，但有一个主要区别：它们都将基于相同的技术——JSF
    和 Java 构建。这将既节省开发时间又减少维护成本。此外，也许最重要的是，JSF 建立了标准，这些标准旨在被工具（如 Oracle JDeveloper、Sun
    Studio Creator 和 Eclipse 插件如 Exadel Studio）利用，为开发者提供 J2EE 开发者社区长期寻求的易用性。


    ## JSF 架构


    从宏观角度看，JSF 实现了所谓的 Model 2 模式，该模式基于 MVC 架构。如果你观察 Model 2 模式在 JSF 应用程序中的应用方式，可以看到它由三个元素组成——视图、导航模型和应用程序逻辑，如图
    1-3 所示。


    `5807ch01.qxd 1/3/06 4:47 PM Page 11`


    C H A P T E R 1 ■ T H E F O U N D AT I O N O F J S F : C O M P O N E N T S


    **11**


    **图 1-3.** *使用 JSF 的 MVC 架构（Model 2）*


    ### 模型


    JSF 引入了托管 bean（`managed bean`）的概念。托管 bean 是连接应用程序逻辑的粘合剂——即后台代码或后台 bean。托管 bean
    在 `faces-config.xml` 文件中定义，并为应用程序开发者提供对所有映射的后台 bean 方法的完全访问权限。这种 IoC（控制反转）概念已成功用于
    Spring、Hive-Mind 和 Oracle ADF 模型绑定（JSR-227）等框架中。托管 bean 设施负责创建后台 bean 或其他 bean，例如数据访问对象（DAO）。在
    JSF 中，后台 bean 是一个普通的旧 Java 对象（POJO），不依赖于任何特定于实现的接口或类。前面提到的 JSF 控制器——`FacesServlet`——并不知晓已执行了哪个操作；它只知道特定操作的结果，并将使用该结果来决定导航到何处。在
    JSF 中，是组件知晓在特定用户事件上调用哪个操作或方法。代码示例 1-2 显示了在 `faces-config.xml` 文件中定义的托管 bean。


    **代码示例 1-2.** *在 `faces-config.xml` 文件中定义的托管 Bean*


    ```

    <managed-bean>

    <managed-bean-name>sample</managed-bean-name>

    <managed-bean-class>

    ```'
  raw: 'One of the key differentiators with JSF is that its architecture is designed
    to be independent of specific protocols and markup, and as such it allows developers
    to attach any rendering technology to the JSF application. In JSF it is the RenderKit
    that is responsible for the presentation of the JSF application by rendering the
    markup to the client. You can define a RenderKit for any type of markup (HTML,
    DHTML, Telnet/character mode, and eventually SVG, Flash, XUL, and so on) and use
    it to display a JSF page.


    This separation between the page description (UI component hierarchy) and the
    rendering of markup is a key differentiator that provides flexibility to the component
    developer while protecting the application developer from changes isolated at
    the rendering layer. Instead of having to learn and implement different rendering
    technologies to solve a common problem, such as portability between different
    browsers (such as Netscape vs. Internet Explorer), application developers can
    use custom JSF components to build applications targeted for different browsers,
    personal digital assistants (PDAs), and so on, with a common programming model—JSF
    and Java.


    Applying this new knowledge about JSF to the previous sample in Figure 1-1, the
    retail solution, the architecture could look similar to Figure 1-2.


    5807ch01.qxd 1/3/06 4:47 PM Page 10


    **10**


    C H A P T E R 1 ■ T H E F O U N D AT I O N O F J S F : C O M P O N E N T S


    **Figure 1-2.** *J2EE architecture using JSF for a typical multitier software
    solution, serving a retail* *company*


    In this architecture, only one application is serving three different agents using
    three different RenderKits—Hypertext Markup Language (HTML), Wireless Markup Language
    (WML), and Telnet. In practice, the application would probably still be three
    different pages but with a main difference; they will all be built on the same
    technology—JSF and Java. This will both save development time and reduce maintenance.
    Furthermore, and perhaps most important, JSF establishes standards, which are
    designed to be leveraged by tools (such as Oracle JDeveloper, Sun Studio Creator,
    and Eclipse plug-ins such as Exadel Studio) to provide developers with the ease
    of use that has long been sought in the J2EE developer community.


    **JSF Architecture**


    From a satellite view, JSF implements what is known as the Model 2 pattern, which
    is based on the MVC architecture. If you look at how the Model 2 pattern is applied
    in a JSF application, you can see it consists of three elements—the view, the
    navigation model, and the application logic, as shown in Figure 1-3.


    5807ch01.qxd 1/3/06 4:47 PM Page 11


    C H A P T E R 1 ■ T H E F O U N D AT I O N O F J S F : C O M P O N E N T S


    **11**


    **Figure 1-3.** *MVC architecture with JSF (Model 2)* Model


    With JSF, the concept of a managed bean has been introduced. The managed bean
    is the glue to the application logic—backing code or backing bean. Managed beans
    are defined in the faces-config.xml file and give the application developer full
    access to all the mapped backing bean’s methods. This concept of IoC is successfully
    used in frameworks such as Spring, Hive-Mind, and Oracle ADF model binding (JSR-227).
    The managed bean facility is responsible for creating the backing beans or other
    beans such as Data Access Objects (DAO). In JSF, a backing bean is a plain old
    Java object (POJO) with no dependency on implementation-specific interfaces or
    classes. The aforementioned JSF controller—the FacesServlet—is not aware of what
    action has been taken; it is aware only of the outcome of a particular action
    and will use that outcome to decide where to navigate. In JSF it is the component
    that is aware of which action, or method, to call on a particular user event.
    Code Sample 1-2 shows a managed bean defined in the faces-config.xml file.


    **Code Sample 1-2.** *Managed Bean Defined in the* faces-config.xml *File*


    <managed-bean>


    **<managed-bean-name>sample</managed-bean-name>**


    **<managed-bean-class>**'
