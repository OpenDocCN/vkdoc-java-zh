    **第 9 步：创建 RenderKit 和 ResponseWriter**


    为了使解决方案生效，你需要控制发送给客户端的输出，以便在初始请求和常规表单回发时，以 `contentType` 设置为 `application/vnd.mozilla.xul+xml`
    的方式写出请求的 XML 文档；在任何后续的 Ajax 回发中，则以 `contentType` 设置为 `application/xml` 的方式进行响应。


    为了能够支持 XUL 渲染器类所需的 `application/vnd.mozilla.xul+xml` 内容类型，你必须扩展默认的 `ResponseWriter`——`XMLResponseWriter`——以支持
    XML 文档。这个 `XMLResponseWriter` 将在初始请求和常规表单回发期间使用。


