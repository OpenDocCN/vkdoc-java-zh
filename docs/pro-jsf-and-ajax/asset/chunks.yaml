    渲染 header facet 后，您使用 `isActive` 标志来确定这是否是当前展开的 `UIShowItem` 组件。如果是，则使用 `_encodeAll()`
    方法渲染每个 `UIShowItem` 的子组件。


    **编码结束**


    对于输入日期组件的实现，处理子组件没有意义，因此您可以将所有渲染输出合并到一个 `encodeEnd()` 方法中，如代码示例 3-24 所示。对于 `UIShowOne`
    组件，Renderer 负责使用 `encodeChildren()` 方法渲染其子组件。这带来的后果是，您还需要实现 `encodeEnd()` 方法来写出组件的闭合元素。


    **代码示例 3-24.** *`HtmlShowOneDeckRenderer` 的 `encodeEnd()` 方法* public void encodeEnd(


    FacesContext context,


    UIComponent component) throws IOException


    {


    ResponseWriter out = context.getResponseWriter();


    **out.endElement("div");**


    }


