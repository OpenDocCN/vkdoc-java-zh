  raw: 'Let’s now look at the different pieces making up a JSF component.


    **UIComponent**


    The foundations of all JSF components are the abstract UIComponent and UIComponentBase
    classes. The UIComponent class (javax.faces.component.UIComponent) defines the
    behavioral agreement and state information for all components, and the UIComponentBase
    class (javax.


    faces.component.UIComponentBase) is a convenience subclass that implements almost
    all methods of the UIComponent class. A simplified description of a UIComponent
    is that it is a regular JavaBean with properties, events, and listeners.


    The JSF specification defines a set of standard UIComponent subclasses, or behavioral
    *superclasses* (for example, UISelectOne and UISelectMany), which all extend the
    UIComponentBase class. In most cases, component writers will extend these standard
    UIComponent subclasses.


    However, they can subclass the UIComponentBase class as well. A JSF component
    consists of a UIComponent and one or more Renderers. It is important to understand
    that the standard UIComponent subclasses define only non-renderer-specific behaviors,
    such as UISelectOne.


