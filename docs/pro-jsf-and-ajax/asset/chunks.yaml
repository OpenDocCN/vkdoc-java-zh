    POST）。服务器响应包含指示请求已成功的状态信息（HTTP 状态码 200 “OK”），并发送一个完整页面响应。浏览器随后会将响应中发送的 HTML 解析为
    HTML DOM，并在浏览器窗口中渲染页面。页面所需的任何资源都将被重新验证，并可能再次从服务器下载。HTML 文档在浏览器窗口中被替换后，浏览器地址栏中的
    URL 也会被修改，以反映来自上一页面表单操作的页面。


    或者，服务器响应可以包含指示请求失败的信息（例如，HTTP 状态码 404 “Not Found”）。


    常规回发的副作用


    常规回发一个明显的副作用是，当页面在浏览器窗口中重新加载时会导致页面闪烁，最糟糕的情况下，用户将不得不等待页面再次将所有所需资源下载到客户端浏览器。其他不太明显但仍然令人烦恼的副作用包括滚动位置和光标焦点的丢失。


    ■**注意** 如今大多数浏览器都拥有出色的客户端缓存功能，可以很好地防止页面从 Web 服务器重新加载资源，除非缓存被关闭，或者应用程序使用 HTTPS，在这种情况下，内容可能无法在客户端缓存。


    作为页面设计的一部分，可能需要在页面上包含多个表单。当页面上有多个表单时，回发期间只会处理其中一个表单，而其他表单中输入的数据将被丢弃。


    一个好处是，使用常规回发可以添加书签。然而，用户常常被地址栏中设置的 URL 所迷惑，因为它反映的是最后请求的内容，而不是响应返回的内容。当用户选择书签时，它将返回到之前提交的页面。常规回发还允许用户点击浏览器后退按钮返回到上一页面，唯一的副作用是会出现表单提交警告。


    **Ajax Web 应用程序开发**


    开发复杂的支持 Ajax 的应用程序并非普通应用程序开发人员所能胜任，正如特洛伊人在战场上畏惧 Ajax 一样，即使是最有经验的 Web 设计师也对攻克 Ajax
    感到畏惧。Ajax 框架的一个主要部分是客户端脚本语言 JavaScript。正如许多 Web 设计师所经历的那样，JavaScript 并非一种工业级语言，许多人声称它在专业开发工具中缺乏支持。


    然而，在我们看来，至少有两种真正优秀的 JavaScript 工具可用——微软的 Visual Studio 和 Mozilla 的 Venkman。不过，事实是，维护
    Ajax 应用程序很困难；JavaScript 实现中缺乏浏览器一致性，使得维护特定于浏览器的代码成为一项挑战。


    **MOZILLA 的 VENKMAN 调试器**


