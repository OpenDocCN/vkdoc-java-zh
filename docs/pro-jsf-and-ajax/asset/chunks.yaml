- fmt: "# XUL 元素参考\n\n## `<popupset>`\n\n一个用于容纳 `<popup>` 元素的容器。你应该将所有 `<popup>` 元素声明为\
    \ `<popupset>` 的子元素。此元素不会直接显示在屏幕上。子弹出窗口将在其他元素要求显示时被显示。\n\n## `<popup>`\n\n一个出现在子窗口中的容器。弹出窗口没有任何特殊边框。当某个元素被点击时，可以通过将该元素的\
    \ `popup`、`context` 或 `tooltip` 属性设置为 `<popup>` 元素的 `ID` 来显示弹出窗口。弹出窗口是一种默认方向为垂直的盒子（`box`）。\n\
    \n## `<grid>`\n\n一个 `<grid>` 元素同时包含 `<rows>` 和 `<columns>` 元素。\n\n它用于创建一个元素网格。行和列会同时显示，尽管通常只有一个会包含内容，而另一个可能提供尺寸信息。在网格中最后出现的元素会显示在最上层。\n\
    \n### `<columns>`\n\n定义网格的列。`<columns>` 元素的每个子元素都应该是 `<column>` 元素。\n\n#### `<column>`\n\
    \n`<columns>` 元素中的单个列。`<column>` 元素的每个子元素都会被放置在网格的每个连续单元格中。拥有最多子元素的列决定了每列的行数。\n\
    \n### `<rows>`\n\n定义网格的行。`<rows>` 元素的每个子元素都应该是 `<row>` 元素。\n\n#### `<row>`\n\n\
    `<rows>` 元素中的单行。`<row>` 元素的每个子元素都会被放置在网格的每个连续单元格中。拥有最多子元素的行决定了每行的列数。\n\n**来源：XULPlanet\
    \ (http://www.xulplanet.com)**\n\n能够组合 XUL 组件（和 HTML 元素）对于简化开发极为有用，因为你可以创建单一、复杂且可复用的组件。\n\
    \n使用 XUL 组件模型的另一个巧妙特性是内置的弹出窗口支持。\n\n无需编写客户端脚本来支持弹出窗口，你可以简单地在 XBL 绑定中创建一组弹出窗口，如代码示例\
    \ 8-3 所示，并使用通用的 XUL `popup` 属性在 Mozilla 浏览器中启动一个弹出窗口。在你的场景中，这个弹出功能将用于 `<pro:inputDate>`\
    \ 组件的日历。\n\n`<popup>` 元素有一组预定义的事件处理器（例如 `onpopupshowing`），你可以使用它们在用户请求显示日历时动态设置内容。在这个例子中，你调用了一个名为\
    \ `popup()` 的方法。\n\n你使用 `<vbox>` 元素作为父容器，并使用一个 `<hbox>` 元素来容纳工具栏，从而构建弹出日历，如代码示例\
    \ 8-3 所示。工具栏包含两个用于导航到上一个月和下个月的 `<text>` 元素。\n\n**代码示例 8-3.** `bindings.xml` 文件\n\
    \n```xml\n<xul:popupset>\n  <xul:popup id=\"calendar\" position=\"after_end\"\n\
    \    onpopupshowing=\"document.popupNode.parentNode.parentNode.popup()\">\n  \
    \  <xul:vbox class=\"calendar\" >\n      <xul:hbox class=\"toolbar\" >\n     \
    \   <xul:text value=\"&lt;\"\n          onclick=\"document.popupNode.parentNode.parentNode.scroll(-1)\"\
    \ />\n        <xul:label id=\"title\" flex=\"1\"\n          style=\"text-align:center;padding:\
    \ 1px;\" />\n        <xul:text value=\"&gt;\"\n          onclick=\"document.popupNode.parentNode.parentNode.scroll(1)\"\
    \ />\n      </xul:hbox>\n      <xul:grid id=\"grid\"\n        onclick=\"document.popupNode.parentNode.parentNode.clickCell(event)\"\
    \ >\n        <xul:columns>\n          <xul:column/>\n          <xul:column/>\n\
    \          <xul:column/>\n          <xul:column/>\n          <xul:column/>\n \
    \         <xul:column/>\n          <xul:column/>\n        </xul:columns>\n   \
    \     <xul:rows>\n          <xul:row class=\"headings\" >\n            <xul:label\
    \ value=\"Sun\" />\n            <xul:label value=\"Mon\" />\n            <xul:label\
    \ value=\"Tue\" />\n            <xul:label value=\"Wed\" />\n            <xul:label\
    \ value=\"Thu\" />\n            <xul:label value=\"Fri\" />\n            <xul:label\
    \ value=\"Sat\" />\n          </xul:row>\n          <xul:row class=\"cells\" >\n\
    \            <xul:label/>\n            ... //Six empty rows with seven empty labels.\n\
    \            <xul:label/>\n          </xul:row>\n        </xul:rows>\n      </xul:grid>\n\
    \    </xul:vbox>\n  </xul:popup>\n</xul:popupset>\n```\n\n日历还包含一个 XUL `<grid>`\
    \ 元素，用于在浏览器中显示日历时展示当月的所有日期。此实现还支持通过点击单元格来选择日期（例如 `onclick=\"... clickCell(event)\"\
    `）。\n\n该原型还包含一组 XBL 元素，如表 8-3 所示。\n\n**表 8-3.** `<pro:inputDate>` 组件中使用的 XBL 元素\n\
    \n| XBL 元素 | 描述 |\n| :--- | :--- |\n| `children` | `<children>` 元素选择特定的子元素，将其包含在\
    \ XBL 组件标记中的预定义位置，类似于 JSF 中的 facets。 |\n| `implementation` | 在 `<implementation>`\
    \ 元素内，你可以定义单独的 `<field>`、`<property>` 和 `<method>` 元素，每个元素对应你需要的功能。 |\n| `field`\
    \ | `<field>` 元素是值的简单持有者。 |\n| `property` | `<property>` 元素声明一个添加到元素对象的 JavaScript\
    \ 属性。`<property>` 元素可以有一个 `<getter>` 子元素和一个 `<setter>` 子元素，分别用于获取和设置属性的值。 |\n\
    | `method` | 声明一个添加到元素对象的 JavaScript 方法。该方法可以接受参数，参数通过 `<parameter>` 元素声明。 |\n\
    | `constructor` | 当绑定被附加到一个元素时，会调用此元素内的代码。你可以用它来初始化绑定使用的内容。`<constructor>` 元素应放置在\
    \ `<implementation>` 元素内部。 |\n| `parameter` | 声明一个方法的参数。每个参数都有一个 `name` 属性，该属性成为方法体中声明的一个变量，其值为传入方法的值。\
    \ |\n| `body` | `<body>` 元素的内容应为调用方法时执行的 JavaScript 代码。 |\n\n**来源：XULPlanet (http://www.xulplanet.com)**\n\
    \n你在 `<implementation>` 元素中定义任何特定于组件的逻辑，例如日期选择和滚动到上/下个月。`<implementation>` 元素包含所有日历逻辑，包括字段（`field`）、构造函数（`constructor`）以及\
    \ `inputDate` 绑定的方法。`<field>` 是值的简单容器，代码示例 8-4 定义了四个字段：`currentMonth`、`currentYear`、`selectedMillis`\
    \ 和 `monthNames`。\n\n**代码示例 8-4.** `bindings.xml` 文件中的 `<implementation>` 元素\n\
    \n```xml\n<implementation>\n  <field name=\"currentMonth\"/>\n  <field name=\"\
    currentYear\"/>\n  <field name=\"selectedMillis\"/>\n  <field name=\"monthNames\"\
    />\n```\n\n`<constructor>` 元素内的脚本（如代码示例 8-5 所示）在绑定被附加到一个元素时被调用。通过在 `<implementation>`\
    \ 元素中使用 `<constructor>`，你可以初始化绑定使用的内容。在这个例子中，你预填充了 `monthNames` 字段，其中包含月份的名称。\n\
    \n**代码示例 8-5.** `bindings.xml` 文件的构造函数\n\n```xml\n<constructor>\n  <![CDATA[\n\
    \    this.monthNames = ['January','February', 'March', 'April', 'May',\n     \
    \ 'June', 'July', 'August', 'September',\n      'October', 'November', 'December'];\n\
    \    var currentNode = this;\n    while (currentNode != null)\n    {\n      if\
    \ (currentNode.localName == 'form' &&\n        currentNode.namespaceURI == 'http://www.w3.org/1999/xhtml')\n\
    \      {\n        var formNode = currentNode;\n        var clientId = this.getAttribute('id');\n\
    \        var inputNode = formNode.elements[clientId];\n        if (inputNode ==\
    \ null)\n        {\n          inputNode = document.createElementNS('http://www.w3.org/1999/xhtml',\n\
    \            'input');\n          inputNode.type = 'hidden';\n          inputNode.name\
    \ = clientId;\n          formNode.appendChild(inputNode);\n        }\n       \
    \ this.inputNode = inputNode;\n        break;\n      }\n      currentNode = currentNode.parentNode;\n\
    \    }\n  ]]>\n</constructor>\n```"
  raw: 'A container for <popup> elements. You should declare all <popup> elements
    as children of a <popupset>. This element does not directly display on-screen.
    Child pop-ups will be displayed when asked to be displayed by other elements.


    popup


    A container that appears in a child window. The pop-up window does not have any
    special frame. Pop-ups can be displayed when an element is clicked by assigning
    the ID of the <popup> element to either the popup, context, or tooltip attribute
    of the element. A pop-up is a type of box that defaults to vertical orientation.


    grid


    A <grid> element contains both <rows> and <columns> elements.


    It is used to create a grid of elements. Both the rows and columns are displayed
    at once, although only one will typically contain content, while the other may
    provide size information. Whichever is last in the grid is displayed on top.


    columns


    Defines the columns of a grid. Each child of a <columns> element should be a <column>
    element.


    column


    A single column in a <columns> element. Each child of the <column> element is
    placed in each successive cell of the grid. The column with the most child elements
    determines the number of rows in each column.


    rows


    Defines the rows of a grid. Each child of a <rows> element should be a


    <row> element.


    row


    A single row in a <rows> element. Each child of the <row> element is placed in
    each successive cell of the grid. The row with the most child elements determines
    the number of columns in each row.


    **Source: XULPlanet (* http://www.xulplanet.com *)* Being able to combine XUL
    components (and HTML elements) is extremely useful to simplify development because
    you can create a single, complex, and reusable component.


    Another neat feature of using the XUL component model is the built-in pop-up support.


    Instead of having to write client-side script to support a pop-up window, you
    can simply create a set of pop-up windows in the XBL binding, as shown in Code
    Sample 8-3, and use the common XUL popup attribute to launch a pop-up window in
    the Mozilla browser. In your case, this pop-up functionality will be used for
    the <pro:inputDate> component’s calendar.


    The XUL popup element has a set of predefined event handlers (for example, onpopupshowing)
    that you can use to dynamically set the contents when the user requests to display
