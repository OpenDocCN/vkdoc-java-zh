- fmt: '# XUL 与 XBL 组件开发


    使用 XUL 而非传统 HTML 的一个优势在于，渲染器（Renderer）无需提供所有标记，XUL 只关注一个元素——`<pro:inputDate>`。


    你还可以看到，该原型在语法上与 JSF 组件实现类似。


    从源代码可以看出，渲染器必须提供的 XUL 元素是 `<pro:inputDate>` 元素，它至少包含两个属性——`pattern` 和 `targetURL`。


