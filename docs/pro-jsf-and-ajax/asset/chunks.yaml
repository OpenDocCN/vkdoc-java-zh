- fmt: '# Using Rich Internet Technologies


    Although the Web has gained widespread adoption as the default deployment solution
    for enterprise-class applications, users increasingly demand a more interactive
    browser experience and broader support for the vast array of Internet-enabled
    devices. This part of the book will teach you how to deliver reusable, rich Internet
    components using JSF. These are components that provide application developers
    with a set of building blocks for creating rich Internet applications with JSF
    without sacrificing productivity, and they can be deployed to any platform.


    *Ajax—in Greek mythology Ajax was a powerful warrior who fought in the Trojan
    War and supposedly was second only to Achilles, the Greeks’ best warrior. Although
    characterized as slow-witted, Ajax was one of the best fighters among the Greeks
    and was famed for his steadfast courage in the face of adversity.*

    —Laboratori Nazionali di Frascati (http://www.lnf.infn.it)


    It will always be the user who will feel the effect of the technology you choose,
    and the first priority of any Web or desktop application developer should be the
    user experience. Users are not interested in what technology is being used or
    whether the application is a traditional desktop application or a Web application.
    Users demand a feature-rich and interactive interface.


    Traditionally, desktop applications have been able to provide users with the richness
    required to fulfill their demands, but an increasing number of desktop applications
    are migrating to the Web. Therefore, Web application developers have to provide
    richer Web interfaces.


    To make you fully appreciate JSF and what it brings to the Internet community,
    you need to understand the current status of rich Internet applications. Web application
    developers today are faced with a demand for richer functionality using technologies
    such as HTML, CSS, JavaScript, and the DOM. However, these technologies were not
    developed with enterprise applications in mind. The increasing demand from consumers
    for applications with features not fully supported by these technologies is pushing
    Web application developers to explore alternative solutions.


    New breeds of Web technologies that enhance the traditionally static content provided
    by Web applications have evolved from these consumer requirements. These technologies
    are often referred to as *Rich Internet Technologies* (RITs).


    In the absence of a standard definition and with the lack of extensibility of
    the traditional Web technologies, new technologies have emerged, such as Mozilla’s
    XUL, Microsoft’s HTC, Java applets, Flex, and OpenLaszlo. These technologies support
    application-specific extensions to traditional HTML markup while still leveraging
    the benefits of deploying an application to a central server. Another solution
    that has returned under a newly branded name is Ajax (recently an acronym for
    Asynchronous JavaScript and XML and formerly known as XMLHTTP). Applications built
    with these technologies are often referred to as *Rich Internet Applications*
    (RIAs).


    In this chapter, we will introduce three RITs: Ajax, Mozilla XUL, and Microsoft
    HTC. This chapter will give a high-level overview of these technologies, and it
    will show some simple examples to highlight the core feature of each technology.
    In later chapters, you will get into the details of each technology to improve
    the user experience of two JSF components—`ProInputDate` and `ProShowOneDeck`.


    The following are the four main players in this chapter:


    - **Ajax**: Ajax is the new name of an already established technology suite—the
    DOM, JavaScript, and `XMLHttpRequest`. Ajax is used to create dynamic Web sites
    and to asynchronously communicate between the client and server.

    - **XUL**: XML User Interface Language (XUL) which, pronounced *zuul*, was created
    by the Mozilla organization (Mozilla.org) as an open source project in 1998. With
    XUL, developers can build rich user interfaces that may be deployed either as
    “thin client” Web applications, locally on a desktop or as Internet-enabled “thick
    client” desktop applications.

    - **XBL**: Extensible Binding Language (XBL) is a language used by XUL to define
    new components. XBL is also used to bridge the gap between XUL and HTML, making
    it easy to attach behavior to traditional HTML markup.

    - **HTC**: Introduced in Microsoft Internet Explorer 5, HTCs provide a mechanism
    to implement components in script as DHTML behaviors. Saved with an `.htc` extension,
    an HTC file is an HTML file that contains script and a set of HTC-specific elements
    that define the component.


    After reading this chapter, you should understand what these RITs are, what they
    provide, and how you can create rich user interface components with them.


    ## Introducing Ajax


    *Ajax* has been minted as a term describing a Web development technique for creating
    richer and user-friendlier Web applications. In this chapter, we will give you
    an overview of Ajax.


    Ajax was first coined in February 2005 and has since taken the software industry
    by storm. One of the reasons Ajax has gained momentum and popularity is the `XMLHttpRequest`
    object and the way this object makes it possible for developers to asynchronously
    communicate with underlying servers and any business services used by Web applications.
    Popular sites such as Google GMail and Google Suggest are using Ajax techniques
    to provide users with rich interfaces that have increased the awareness of Ajax.


    Although the name *Ajax* is new, the technologies listed as the foundation of
    this technique—JavaScript, `XMLHttpRequest`, and the DOM—have been around for
    some time. In fact, the latest addition to this suite of technologies—the `XMLHttpRequest`
    object—was introduced by Microsoft in 1999 with the release of Internet Explorer
    5.0 and was implemented as an ActiveX component.


    The `XMLHttpRequest` object, although widely used, is not a standard; it could
    at best be called a “de facto” standard, since most modern browsers, including
    Firefox, Internet Explorer, Opera, and Safari, support it. However, a standard
    has been proposed that covers some of the functionality provided by the `XMLHttpRequest`
    object—the DOM Level 3 Load and Save specification.


    > **Note**: The `XMLHttpRequest` object is not a W3C standard. The W3C DOM Level
    3 Load and Save specification contains some similar functionality, but this is
    not implemented in any browsers yet. So, at the moment, if you need to send an
    HTTP request from a browser, you will have to use the `XMLHttpRequest` object.


    With the `XMLHttpRequest` object, developers can now send requests to the Web
    server to retrieve specific data and use JavaScript to process the response. This
    ability to send data between the client and the Web server reduces the bandwidth
    to a minimum and saves time on the server since most of the processing to update
    the user interfaces takes place on the client using JavaScript.


    ### The XMLHttpRequest Object'
