    第 1 章 ■ JSF 的基础：组件


    导航规则在 `faces-config.xml` 中定义，该文件在启动时被读取，所有信息都存储在 `Application` 对象中（参见“导航模型”一节）。`NavigationHandler`
    做的第一件事是检查是否存在与 `fromViewId`（它将从 `FacesContext` 获取）、`fromAction` 和结果组合匹配的导航规则。


    您可以通过两种方式处理导航。重定向意味着一个新的请求（并且作为额外的好处，您可以收藏新页面），并重新开始 JSF 请求生命周期；您也可以让 `handleNavigation()`
    方法创建一个新的 `UIViewRoot`，在 `FacesContext` 上设置新的 `UIViewRoot`，并让默认的 `ActionListener`
    调用 `renderResponse()` 来启动渲染响应阶段。此解决方案复制了渲染响应阶段中初始请求的行为，但使用了新的视图标识符。图 1-23 展示了回传期间的
    JSP 执行过程。


    **图 1-23.** *回传时的渲染响应*


    在回传期间，渲染响应阶段的第一部分与初始请求直到 `dispatch()` 方法调用之前的部分相同，不同之处在于您现在拥有一个完整的组件层次结构，而不仅仅是
    `UIViewRoot`（参见图 1-13）。在调度之后，JSP 页面被执行，`<f:view>` 开始标签执行与初始请求时相同的操作——在 `FacesContext`
    上创建并存储一个 `ResponseWriter` 实例，并充当组件渲染输出的缓冲区（参见图 1-14）。


    与初始请求中创建新组件并将其附加到 `UIViewRoot` 不同，嵌套在 `<f:view>` 标签内的各个组件标签必须定位其已存在于组件层次结构中的对应组件。这发生在
    JSP 页面执行期间，通过向上遍历标签树以找到最近的封闭父组件标签。从父组件标签，子组件标签可以通过组件标识符或 facet 名称找到其对应的组件（参见“Facets”一节）。


