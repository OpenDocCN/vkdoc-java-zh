    **Custom Action Tag Handlers**


    Since the default page description language is JSP, most JSF components will have
    a JSP custom action. When the JSP container encounters a custom action, it asks
    for the JSF tag handler associated with this action. The main purpose of the JSF
    tag handler is to create an instance of the component, using the renderer-specific
    subclass, and associate the component with a Renderer at the first page request.


    **Request-Processing Lifecycle**


    As a component writer, it is essential you have a clear understanding about the
    lifecycle of JSF. A page constructed with JSF components will go through a well-defined
    request-processing lifecycle. This lifecycle consists of six phases—Restore View,
    Apply Request Values, Process Validations, Update Model Values, Invoke Application,
    and Render Response, as shown in Figure 1-8.


    **Figure 1-8.** *Formal lifecycle of JSF*


    5807ch01.qxd 1/3/06 4:47 PM Page 28


    **28**


    C H A P T E R 1 ■ T H E F O U N D AT I O N O F J S F : C O M P O N E N T S


    Here’s the process broken down:


    **1.** *Restore View*: This phase is responsible for restoring the component hierarchy
    from the previous request and attaching it to the FacesContext. If no saved state
    is available, then the Restore View phase is responsible for creating a new UIViewRoot,
    which is the root node in the component hierarchy, and storing it on the FacesContext.


    **2.** *Apply Request Values*: In this phase, each component has the opportunity
    to update its current state with information included in the current request.


    **3.** *Process Validations*: This phase is in charge of processing any validators
    or converters attached to components in the component hierarchy.


    **4.** *Update Model Values*: During this phase, all suitable model data objects
    will have their values updated to match the local value of the matching component,
    and the component local values will be cleared.


    **5.** *Invoke Application*: At this phase, any remaining events broadcast to
    the application need to be performed (for example, actions performed by an HtmlCommandButton).


    **6.** *Render Response*: This phase is responsible for rendering the response
    to the client and storing the new state for processing of any subsequent requests.


    To put these phases into a real-life context, we’ll use a simple example where
    the user will access an application built with JSF and JSP. This application contains
    a simple login page with some input fields for a username and password and a button
    to log in. On successful login, the user is redirected to a second page that will
    display the user’s username.


