    C H A P T E R 6 ■ A J A X E N A B L I N G T H E D E C K C O M P O N E N T


    **239**


    that on the initial request, or regular form postback, you write out the requested
    document with the contentType set to text/html and on any subsequent Ajax postback
    respond with the contentType set to text/plain.


    What markup is written to the client is controlled by the ResponseWriter, which
    in turn is created by the RenderKit. The default RenderKit provided by a JSF implementation
    is the standard HTML RenderKit, which comes with a default ResponseWriter that
    supports only content of type text/html. To be able to support the content type
    text/plain as required by your Ajax Renderer, you have to decorate the default
    ResponseWriter with functionality to fix the contentType in the case of an Ajax
    request—FixedContentTypeResponseWriter. With this new ResponseWriter, you also
    have to provide a custom RenderKit—HtmlAjaxRenderKit—that can dynamically pick
    either the default ResponseWriter or the custom FixedContentTypeResponseWriter.
    Figure 6-5


    shows how to create the right ResponseWriter.


    **Figure 6-5.** *Creating the right* ResponseWriter Is this all? No, one issue
    when creating your own RenderKit is that application developers are allowed to
    set only one default RenderKit per Web application. So, unless you want to reimplement
    all the standard HTML RenderKit Renderers (or even worse, reimplement every component
    library the application developer might use), you have to figure out a way to
    provide access to HTML_BASIC renderers from your custom RenderKit. This is also
    one of the reasons most component authors avoid creating a new RenderKit and default
    to the standard HTML RenderKit. But, to implement this strategy, you need a new
    ResponseWriter that can handle text/plain, and thus you also need a new RenderKit.


    What you need is a way to wrap your custom RenderKit around the standard HTML


    RenderKit to avoid having to implement all renderers an application developer
    might use.


    Registering RenderKits to Wrap


    Each JSF application has to have one default RenderKit, which means you need to
    come up with a way to register your RenderKit so you can identify what RenderKit
    is to be wrapped at application start-up.


