    All the examples in this book are freely available from the Source Code section
    of the Apress Web site. Point your browser to `http://www.apress.com`, click the
    Source Code link, and find the *Pro JSF and Ajax: Building Rich Internet Components*
    book. You can download the source as a zip file from this book’s home page. All
