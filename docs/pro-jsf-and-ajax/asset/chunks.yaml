    ■**注意** 在 JSF 1.2 中，`<f:view>` 标签不再负责缓冲输出。相反，缓冲是通过使用 `ServletResponse` 包装器来实现的。此外，组件层次结构不再在渲染期间内联创建。相反，在
    JSF 1.2 的“渲染响应”阶段，首先创建组件层次结构，然后进行渲染。因此，在渲染期间，完整的组件层次结构是可用的，所以状态被直接写入缓冲的响应中，而不需要使用占位符令牌，然后在
    `</f:view>` 中被真实状态替换。


    回传请求


    到目前为止，用户所看到的只是第一个请求页面的初始渲染。收到页面后，用户输入用户名和密码并点击登录按钮。此时执行回传，现在你将了解 JSF 如何处理回传。某些部分与我们在初始请求中已经介绍的内容相似，但显然存在差异和新增内容，尤其是在
    JSF 请求生命周期中。在回传时，JSF 请求生命周期的所有六个阶段都会被调用（除非在过程中的某处调用了 `FacesContext.renderResponse()`
    方法，导致生命周期直接跳转到“渲染响应”阶段）。这与初始请求不同，初始请求只调用第一个和最后一个阶段。


    **恢复视图阶段**


    回传的第一部分与初始请求相同：“恢复视图”阶段执行，并调用 `ViewHandler` 上的 `restoreView()` 方法来恢复前一个请求中可用的任何状态。图
