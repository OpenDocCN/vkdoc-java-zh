    \ HTML 链接元素——`<a href=\"...\">some text</a>`。\n\n## RenderKits\n\n`RenderKit`的功能是支持使用委托实现方法的`UIComponent`，将`Renderer`的委托给`UIComponent`。`RenderKit`将具有相似标记类型的`Renderer`实例分组，所有\
