    **图 1-13.** *在 FacesContext 上设置* ResponseWriter **JSF 视图标识符：VIEW ID**


    根据使用的映射类型——前缀或后缀——`UIViewRoot` 视图标识符的派生方式与请求统一资源标识符 (URI) 略有不同。如果对 FacesServlet
    使用前缀映射，例如 `/faces/*`（这是最常见的），则 `viewId` 属性根据映射后的路径信息设置；例如，`/context-root/faces/login.jspx`
    将设置一个等于 `/login.jspx` 的视图标识符。如果使用后缀映射，例如 `*.jsf`，则 `viewId` 属性根据请求 URI 的 servlet
    路径信息设置，方法是将后缀替换为由符号常量 `ViewHandler.DEFAULT_SUFFIX_NAME` 命名的上下文初始化参数的值。例如，`/context-root/login.jsf`
    默认将设置一个等于 `/login.jsp` 的视图标识符，但可以利用上下文初始化参数改用 `.jspx` 作为默认后缀。


    在处理和执行 JSF JSP 文档之前，JSP 运行时首先确定要使用的内容类型和字符编码。为了使 JSF 与 JSP 生命周期协调工作，必须存在 `<f:view>`
    标签。`<f:view>` 标签是一个 JSP 主体标签，它缓冲来自嵌套 JSF 组件的所有渲染输出。简而言之，`<f:view>` 标签充当所有其他 JSF
    组件的容器。`<f:view>` 标签负责在 FacesContext 上创建并存储一个 `ResponseWriter` 实例。


