- fmt: '# Microsoft’s Role in Web Technologies


    Microsoft has often been seen as the evil empire among non-Microsoft developers,
    but you should recognize that Microsoft has contributed several bright ideas to
    standards organizations such as the W3C. Microsoft also introduced the now widely
    known `XMLHttpRequest` object. All of the pieces of Ajax—DHTML, JavaScript, and
    `XMLHttpRequest`—are available in Microsoft Internet Explorer, and the Microsoft
    Outlook Web Access solution has used these technologies to deliver a richer browser
    solution since 1998.


    To be able to give application developers the freedom to deploy to both browser
    platforms (Microsoft’s and Mozilla’s), you have to include support for Microsoft
    Internet Explorer as well.


    You could, of course, argue that you have already provided support for Internet
    Explorer with the HTML Ajax solution you created earlier, but that solution is
    still not leveraging Internet Explorer’s full potential as a client platform.


    In this chapter, you will leverage Microsoft’s component model, which is similar
    to the one provided by Mozilla XUL. Microsoft’s component model is called DHTML
    *behaviors* and allows developers to encapsulate regular DHTML in a separate file
    type: an HTC file. This file type allows developers to create reusable components
    that encapsulate dynamic behaviors, much the same way as XBL works for XUL. You
    should note that HTC defines only one element behavior per HTC file.


    1\. This is an approximate percentage of browser market at the time this book
    was written.


    **361**


