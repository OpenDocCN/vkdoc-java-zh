    **第 5 步：创建 JSP 标签处理器和 TLD**


    在初始蓝图中的最后一步是创建一个 JSP 标签处理器。要构建一个 JSF 应用程序，你需要某种方式来描述应用程序的结构，而任何 JSF 实现都必须提供的页面描述默认视图技术是
    JSP。将 JSP 作为默认语言的好处之一是它在 Web 应用程序开发者中被广泛采用，通过利用开发者对 JSP 的广泛了解，使用 JSP 作为页面描述来构建
    JSF 应用程序正在迅速增长。


    ■**注意** JSF 实现必须支持（尽管基于 JSF 的应用程序不需要使用）JSP 作为 JSF 页面的页面描述语言。你可以通过提供自定义操作来启用此 JSP
    支持，以便通过在 JSP 页面中添加与 JSF UI 组件对应的标签来轻松定义 JSF 用户界面。对于 JSP 2.0 及更高版本，文件扩展名 `.jsf`
    被保留，并且可以选择使用（通常由工具）来表示包含 JSF 内容的 JSP 页面。在 JSP 1.2 环境中运行时，根据 JSF 1.2 规范，JSP 作者必须将包含
    JSF 内容的 JSP 页面命名为以 `.jsp` 结尾的文件名。


