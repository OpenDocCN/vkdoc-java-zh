- fmt: '**Table 2-3.** *Useful* `ResponseWriter` *Methods*


    **Method Name** | **Description**

    --- | ---

    `getContentType()` | Returns the content type used to create this `ResponseWriter`.

    `getCharacterEncoding()` | Returns the character encoding used to create this
    `ResponseWriter`.

    `startDocument()` | Writes appropriate characters at the beginning of the current
    response.

    `endDocument()` | Writes appropriate characters at the end of the current response.

    `startElement()` | Writes the beginning of a markup element, such as the `<` character,
    followed by the element name such as `table`, which causes the `ResponseWriter`
    implementation to note internally that the element is open. This can be followed
    by zero or more calls to `writeAttribute()` or `writeURIAttribute()` to append
    an attribute name and value to the currently open element. The element will be
    closed with the trailing `>` character added on any subsequent call to `startElement()`,
    `writeComment()`, or `writeText()`.

    `endElement()` | Closes the specified element. The element name must match the
    previous call to `startElement()`.

    `writeComment()` | Writes a comment string wrapped in appropriate comment delimiters,
    after converting the comment object to a `String` first. Any currently opened
    element is closed first.

    `writeAttribute()` | Adds an attribute name-value pair to an element that was
    opened with a previous call to `startElement()`. The `writeAttribute()` method
    causes character encoding to be performed in the same manner as that performed
    by the `writeText()` methods.

    `writeURIAttribute()` | Assumes that the attribute value is a URI and performs
    URI encoding (such as percent encoding for HTML).

    `writeText()` | Writes text (converting from `Object` to `String` first, if necessary),
    performing appropriate character encoding and escaping. Any currently open element
    created by a call to `startElement()` is closed first.


    **Source:** The JSF 1.1 specification. For more detailed information about these
    methods, please refer to the JSF specification.


    From the context you can get the `ResponseWriter`—`getResponseWriter()`—for this
    request.


    The `ResponseWriter` class extends the `java.io.Writer` class and adds methods
    that generate markup elements, such as start and end elements for HTML and XML.


    You could ignore these convenience methods provided by the `ResponseWriter` and
    instead control the output of the markup directly. However, this is not a recommended
    approach for several reasons. First, you will get better performance if you don’t
    have to keep your own objects in memory to handle what gets written, and when,
    to the client. Second, you will also get better portability of your code between
    markup languages that have only subtle differences, such as between HTML and XHTML.
    Finally, by using the `startElement()` and `endElement()` API, it is easier to
    detect and debug the generated markup by verifying that all `startElement()` and
    `endElement()` calls are balanced. You can do this by using a decorating `ResponseWriter`
    class.


    **Note:** Depending on the supported content type of the client browser, JSF 1.2
    will create a content-specific `ResponseWriter` that will format markup such as
    XHTML. By using the `startElement()` method and the `endElement()` method, a component
    writer will not need to provide multiple solutions for HTML and XHTML content
    types; the `ResponseWriter` will handle this.


    It is usually good practice to create helper classes for client-specific elements
    and attributes. For example, the MyFaces project has a utility class—`org.apache.myfaces.renderkit.html.HTML`—that
    contains public constants, such as `HTML.INPUT_ELEM` for the `input` element.
    For clarity you will be entering the element name directly as shown in Code Sample
    2-14.'
