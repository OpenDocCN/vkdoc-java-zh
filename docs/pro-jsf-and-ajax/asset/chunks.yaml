    \ then Internet Explorer will produce a blank page with an \"Operation Aborted\"\
    \ error dialog box. We found that having more than one HTC component on the same\
    \ page, where one of the HTC components manipulates the private HTC viewLink DOM\
    \ in response to `oncontentready`, produces the same \"Operation Aborted\" error\
    \ dialog box. Changing the HTC behavior to use `ondocumentready` provides a workaround\
    \ for this problem.\n\n## Table 9-2. HTC-Specific Events\n\n| Name | Description\
