    微软在非微软开发者中常被视为邪恶帝国，但你应该认识到，微软曾向 W3C 等标准组织贡献过若干卓越创意。微软还引入了如今广为人知的 XMLHttpRequest
    对象。Ajax 的所有组成部分——DHTML、JavaScript 和 XMLHttpRequest——在微软 Internet Explorer 中均可使用，而微软
    Outlook Web Access 解决方案自 1998 年起就已运用这些技术来提供更丰富的浏览器体验。


    为了让应用程序开发者能够自由地在两大浏览器平台（微软和 Mozilla）上部署，你必须同时提供对微软 Internet Explorer 的支持。


    当然，你可能会辩称，之前创建的 HTML Ajax 解决方案已经提供了对 Internet Explorer 的支持，但该方案仍未充分发挥 Internet
    Explorer 作为客户端平台的潜力。


    在本章中，你将利用微软的组件模型，该模型与 Mozilla XUL 提供的模型类似。微软的组件模型被称为 DHTML *行为*，它允许开发者将常规 DHTML
    封装到一种独立的文件类型中：即 HTC 文件。这种文件类型使开发者能够创建封装动态行为的可重用组件，其工作方式与 XBL 之于 XUL 非常相似。需要注意的是，每个
    HTC 文件仅定义一个元素行为。


    1\. 这是本书撰写时浏览器市场占有率的近似百分比。


    **361**


