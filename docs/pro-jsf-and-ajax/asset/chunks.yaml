- fmt: "`ShowAdapter`实现了`processShow`方法，使用指定的`MethodBinding`和`ShowEvent`参数进行调用。传递给`ShowAdapter`构造函数的`MethodBinding`必须与`processShow`方法的签名匹配。因此，`ProShowOneDeckTag`使用`SIGNATURE`常量来创建具有正确签名的`MethodBinding`。\n\
    \n在此适配器类上实现`StateHolder`接口非常重要，这样当实例作为组件层次结构中某个组件的监听器注册时，状态可以被正确保存和恢复。\n\n你必须提供`saveState()`方法的实现，将`MethodBinding`状态存储为`UIShowAdapter`状态，因此需要使用`UIComponentBase`中的静态方法`saveAttachedState()`。这个便捷方法负责保存可能实现也可能未实现`StateHolder`接口的附加对象的状态。\n\
    \n你还必须提供`restoreState()`方法的实现，该方法接受`FacesContext`和状态对象作为参数。请注意，使用`saveAttachedState()`方法保存`MethodBinding`状态意味着你需要使用`restoreAttachedState()`方法来恢复`MethodBinding`状态。\n\
    \n## 实践中的事件传递\n\n让我们使用与代码示例3-3相同的页面，逐步了解JSF提供的事件传递机制。现在我们将展示如何使用相同的代码深入JSF事件和监听器模型。该页面包含代码示例3-8中的源代码。\n\
    \n**代码示例3-8.** 包含`showListener`标签的页面源代码\n\n```\n<h:form>\n  ...\n  <pro:showOneDeck\
    \ showItemId=\"first\"\n    showListener=\"#{backingBean.doShow}\" >\n    <pro:showItem\
    \ id=\"first\" >\n      ...\n    </pro:showItem>\n    <pro:showListener\n    \
    \  type=\"com.apress.projsf.ch3.application.MyShowListener\" />\n  </pro:showOneDeck>\n\
    \  ...\n</h:form>\n```\n\n`<pro:showOneDeck ...>`包含一个与`ShowEvent`事件类型（`ShowListener`）关联的属性。此示例将`<pro:showOneDeck>`的属性`showListener`设置为`#{backingBean.doShow}`。这是一种通过属性将监听器分配给组件的常见方法。`MethodBinding`指向一个方法——`doShow()`——该方法遵循`ShowListener`接口的签名，但未直接实现该接口。代码示例3-9展示了`ShowListener`方法——`doShow()`的源代码。\n\
    \n**代码示例3-9.** `ShowListener`方法——`doShow()`\n\n```java\npackage com.apress.projsf.ch3.application;\n\
    \nimport com.apress.projsf.ch3.event.ShowEvent;\n\n/**\n * ShowOneDeckBean is\
    \ a backing bean for the showOneDeck.jspx document.\n */\npublic class ShowOneDeckBean\n\
    {\n  /**\n   * The ShowListener method binding.\n   *\n   * @param event the show\
    \ event\n   */\n  public void doShow(\n    ShowEvent event)\n  {\n    String oldShowItemId\
    \ = event.getOldShowItemId();\n    String newShowItemId = event.getNewShowItemId();\n\
    \    System.out.println(\"BackingBean [oldShowItemId=\" + oldShowItemId + \",\"\
    \ +\n      \"newShowItemId=\" + newShowItemId + \"]\");\n  }\n}\n```\n\n这种实现监听器的方式为应用程序开发者提供了便利。然而，它也有局限性，因为`<pro:showOneDeck\
    \ />`上的`showListener`属性只接受一个方法绑定；相比之下，使用特定的监听器标签（例如`<pro:showListener ...>`）关联监听器，允许应用程序开发者关联任意数量的监听器（例如，记录事件信息），并关联一个监听器来实际处理事件。从应用程序开发者的角度来看，`ShowListener`的实现可能类似于代码示例3-10。\n\
    \n**代码示例3-10.** `ShowListener`接口的实现\n\n```java\npackage com.apress.projsf.ch3.application;\n\
    \nimport com.apress.projsf.ch3.event.ShowEvent;\nimport com.apress.projsf.ch3.event.ShowListener;\n\
