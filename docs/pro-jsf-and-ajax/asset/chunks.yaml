    需要组件层次结构，这会给每个请求带来额外开销，尤其是在使用客户端状态保存时。调用 `responseComplete()` 方法仅在该阶段处理完成后才会生效。应用请求值阶段会调用视图中所有渲染器的
    `decode()` 方法，这可能导致你无法控制的意外副作用，例如应用程序开发者将 `commandButton` 设置为 `immediate="true"`。这会导致在应用请求值阶段完成之前就调用应用程序逻辑。


