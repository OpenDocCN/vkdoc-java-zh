    动态切换 RenderKit


    *习惯于只使用组件和组件，你的代码将经得起未来考验。*


    *坚持使用 JSF 加 HTML 的混合体，五年内就会有人讨厌你……*


    ——Duncan Mills，Java 布道师，Oracle


    欢迎来到《Pro JSF and Ajax: Building Rich Internet Components》的最后一章。本书涵盖了 JSF 如何让组件编写者混合搭配技术，以简化打包并增加其组件的丰富性和用户交互性。我们已经证明，JSF
    的组件模型可以在底层特定于客户端的标记之上提供一个抽象层，从而提高应用程序开发人员的生产力。我们还向你展示了组件编写者可以*手动*切换 RenderKit，而不会影响应用程序开发人员或实际的应用程序逻辑。


    现在，你拥有了一套支持多种客户端技术的富互联网组件，只剩下一个问题：如何自动选择 RenderKit 以向任何用户代理传递正确的标记？


    本章涵盖的主要技术是 Oracle ADF Faces，它是一套于 2004 年秋季推出的丰富的标准 JSF 组件。Oracle ADF Faces 组件库提供了各种具有内置功能的用户界面组件，例如数据表、分层表以及颜色和日期选择器。ADF
    Faces 还包含当今 JSF 开发人员最需要的许多框架特性。


    阅读本章后，你应该能够动态切换 RenderKit，并知道如何设置它们以检测不同的用户代理，例如 Mozilla GRE 和 Microsoft Internet
    Explorer。

