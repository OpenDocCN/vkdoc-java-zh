- fmt: "# 排版后的内容\n\nAs you can see, it is a simple prototype containing an input field\
    \ that will be used to enter a date and a regular button that will be used to\
    \ launch the calendar pop-up. Finally, a table represents your calendar pop-up\
    \ as it will look when implemented in your new Ajax Renderer.\n\nAt the top of\
    \ the code listing, you can see that we have referenced the `inputDate.css` file.\
    \ This style sheet contains information that will be used to display the availability\
    \ of each date presented by the calendar.\n\n## The `@import` Rule\n\nAs you may\
    \ have noticed, we used this rule in the prototype to import a style sheet. Like\
    \ the `<link>` element, the `@import` rule links an external style sheet to a\
    \ document. The difference is that the `<link>` element is defined in the head\
    \ section of a page and specifies the name of the style sheet to import using\
    \ its `href` attribute. In practice, you can use the `@import` rule in the document\
    \ body, which allows you to encapsulate styles in a style sheet and import them\
    \ inside any `<style>` element on the rendered page.\n\nBefore creating your input\
    \ date component, look at the final result and how it will be used in a JSP page.\
    \ Code Sample 7-2 uses the input date component with the Ajax Renderer.\n\n**Code\
    \ Sample 7-2.** *JSF Page Source*\n\n```\n<?xml version = '1.0' encoding = 'windows-1252'?>\n\
    \n<jsp:root version=\"1.2\"\n          xmlns:jsp=\"http://java.sun.com/JSP/Page\"\
    \n          xmlns:h=\"http://java.sun.com/jsf/html\"\n          xmlns:f=\"http://java.sun.com/jsf/core\"\
    \n          xmlns:pro=\"http://your.components/inputDate\">\n>\n<jsp:directive.page\
    \ contentType=\"text/html\"/>\n<f:view>\n...\n<h:form id=\"form\" >\n    <pro:inputDate\
    \ id=\"dateField\"\n                   title=\"Date Field Component\"\n      \
    \             value=\"#{backingBean.date}\" >\n        <f:convertDateTime pattern=\"\
    d MMMMM yyyy\" />\n        <pro:validateDate availability=\"#{backingBean.getAvailability}\"\
    \ />\n    </pro:inputDate>\n    <br/>\n    <h:message for=\"theDate\" />\n   \
    \ <br/>\n    <h:commandButton value=\"Submit\" />\n</h:form>\n...\n</f:view>\n\
    </jsp:root>\n```\n\nAs you can see, the JSF page has no Ajax \"code\" in the page\
    \ source, which means no extra burden is put on the application developer to Ajax\
    \ enable elements in the page. We have said it before, and we will say it again—make\
    \ it easy for the application developer!\n\nThe only thing that is different in\
    \ this page from the page created in Chapter 2 is the addition of a Validator—`<pro:validateDate\
    \ .. />`. The Validator will be used during regular postback to compare dates\
    \ entered in the input field against information available in the backing bean.\
    \ This backing bean will also be used to set dates that are selectable or not\
    \ in the pop-up calendar. Remember the `<f:convertDateTime pattern=\"d MMMMM yyyy\"\
    \ >` Converter from Chapter 2? This converter makes sure that whatever the user\
    \ enters follows a format you can convert to a `Date` object on the server.\n\n\
    ## Fetching Data with Ajax\n\nIn Chapter 6, you got familiar with the difference\
    \ between a regular postback and an Ajax postback to handle events. Fetching data\
    \ the conventional way versus using Ajax has similar differences, except that\
    \ it should not have the side effect of changing the state of surrounding components.\n\
    \nThe only difference between Figure 7-3 and the Ajax sequence diagram in Chapter\
    \ 6 (Figure 6-3) is the HTTP method. The W3C recommends you use the HTTP `GET`\
    \ method to fetch data when there are no side effects requested by the user (for\
    \ example, Google Suggest).\n\n![Image 56](index-299_1.png)\n\n**Figure 7-3.**\
    \ *Sequence diagram of an* `XMLHttpRequest` *using the HTTP* `GET` *method*\n\n\
    ## Different JSF Ajax Approaches\n\nIf you get no side effects, then there is\
    \ no change to the JSF component hierarchy; thus, there is no need to go through\
    \ the JSF lifecycle. But, if you want to reuse the managed bean referenced by\
    \ the validator, the only way to get to it is via the JSF `MethodBinding` facility.\
    \ Three solutions exist to support your requirements—adding functionality to the\
    \ Renderer, using a `PhaseListener`, and providing a new JSF Lifecycle.\n\n###\
    \ The Renderer Approach"
