    C H A P T E R 1 0 ■ S W I T C H I N G R E N D E R K I T S DY N A M I C A L LY


    **Requirements for Dynamically Switching**


    **RenderKits**


    The requirement is clear—the application developer wants to be able to dynamically
    change RenderKits, at runtime, based on the user agent. For example, if it is
    the Firefox browser requesting the page, the solution should serve XUL markup
    to the client.


    A RenderKit’s function is to help out with the delegation of Renderer to the UIComponent.
    A RenderKit groups instances of renderers of similar markup types, and in this
    book, you created RenderKits for HTML Ajax, Microsoft’s DHTML/HTC, and Mozilla’s
    XUL/XBL technologies.


    Each RenderKit is associated with a view (component hierarchy) as a UIViewRoot
    property at runtime. If an application developer wants to add a RenderKit with
    custom Renderers to the application, a RenderKit ID must be added to the application’s
    JSF configuration file, as shown in Code Sample 10-1.


    **Code Sample 10-1.** *Setting the Default* RenderKit *ID*


    <?xml version="1.0" encoding="utf-8"?>


    <!DOCTYPE faces-config PUBLIC


    "-//Sun Microsystems, Inc.//DTD JavaServer Faces Config 1.1//EN"


    "http://java.sun.com/dtd/web-facesconfig_1_1.dtd">


    <faces-config >


    <application>


    **<default-render-kit-id>com.apress.projsf.xul.ajax</default-render-kit-id>**


    </application>


    ...


    </faces-config>


    This code sample shows the faces-config.xml file with the <default-render-kit-id>
    set to your custom XUL RenderKit. The faces-config.xml file is read once when
    the Web application is created and stored in the Application instance. The ViewHandler
    is responsible for returning the renderKitId for the current and subsequent requests
    from the client. It is important to understand that there can be only one default
    RenderKit per Web application, which is identified by a string (for example, com.apress.projsf.xul.ajax).


    To solve the requirement of enabling access to the application with any browser
    and to provide a different RenderKit implementation for each browser, you have
    three tasks to complete in this chapter. First, you need to define the default
    RenderKit ID in the faces-config.xml file in such a way that you can dynamically
    set it at runtime. Second, you need to detect the user agent requesting the application.
    Third, you need to set the RenderKit ID using a ViewHandler. The custom ViewHandler
    is required if you want to have multiple RenderKit instances for the same application.


    ■**Note** JSF 1.1 applications require a custom javax.faces.application.ViewHandler
    instance to dynamically select a RenderKit. However, JSF 1.2 adds support for
    directly specifying the RenderKit ID


    on the <f:view> tag of individual pages in a Web application.


