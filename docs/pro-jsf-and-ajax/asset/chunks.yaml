    第 8 章 ■ 提供 Mozilla XUL 渲染器


    **Deck 和 Date 组件 XUL 实现的需求**


    本章中 `ProInputDate` 和 `ProShowOneDeck` 组件的需求很简单——你需要利用 Mozilla 的 GRE 提供的声明式组件模型。为此，你需要为
    deck 和 date 组件提供特定于 XUL 的 Renderer 类。与第 6 章和第 7 章中创建的 deck 和 date 组件所提供的功能相比，支持此特定于客户端的组件模型不应有任何功能损失。


    **Mozilla XUL 为 JSF 带来的优势**


    由于 XUL 组件是 Mozilla GRE 的一部分，因此无需在将标记发送到客户端之前，在服务器端将 JSF 页面结构“展开”为适当的标记。这反过来将减少网络负载，因为渲染由客户端负责，而不是由实际的服务器实现负责。


    XUL 的另一个重要特性是其可扩展性，它提供了一种声明式的方式来创建新组件并扩展现有的 XUL 组件。为了实现此特性，XUL 使用了 XBL。你可以使用 CSS
    选择器将这些行为化的 XBL 组件附加到标记上。


    当然，XUL 提供了开箱即用的丰富客户端交互性，而无需组件作者在诸如 JavaScript 之类的替代方案中实现这一点。


    我们将展示如何将 Ajax 异步通信通道——`XMLHttpRequest`——与 XUL 提供的高度交互式组件结合起来，以设计基于 JSF 标准的可重用且极具交互性的组件。


    **JSF 为 XUL 带来的优势**


    JSF 为 XUL 带来的一个要素是通用的编程模型——JSP 和 Java。你可能会争辩说，对 XUL 感兴趣的开发者可以直接使用 XUL，但我们在这里要指出的是，JSF
    不仅提供了熟悉的编程模型（至少对大多数 J2EE 开发者而言），还提供了一个服务器端组件模型，该模型隐藏了 XUL 的细节，而应用程序开发者无需知道或了解这些实现细节。


    JSF 带来的另一个要素是标准的请求生命周期，包括自动状态保存和状态恢复、验证、数据模型和事件处理。


