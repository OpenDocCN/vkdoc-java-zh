- fmt: "# The Requirement for the Deck Component\n\nThe requirement for the deck component\
    \ is to make it flexible enough to handle any type of child component added to\
    \ the `UIShowItem` component by the application developer. The `UIShowItem` component\
    \ itself is not responsible for rendering its children, but sometimes an application\
    \ developer has added a child container component for rendering its children (for\
    \ example, an `HtmlPanelGrid` component).\n\nTo be able to achieve this, you first\
    \ call `encodeBegin()` to start rendering the generated markup for the current\
    \ component. You then check whether the component is responsible for rendering\
    \ its children. If it is, you call `encodeChildren()` on the component to render\
    \ all of its children. However, if the component is not responsible for rendering\
    \ its children, then you iterate over the child components and recursively call\
    \ `_encodeAll()` for each one. Finally, you complete the generated markup by calling\
    \ the `encodeEnd()` method on the component.\n\n> **Note:** A new method, `UIComponent.encodeAll(FacesContext)`,\
    \ has been added to the JSF 1.2 release and implements equivalent functionality\
    \ to the `_encodeAll(FacesContext, UIComponent)` method shown in Code Sample 3-27.\n\
    \n## Decode\n\nDuring the Apply Request Values phase, a method—`processDecodes()`—will\
    \ be called on the `UIViewRoot` at the top of the component hierarchy. The `processDecodes()`\
    \ method on the `UIViewRoot` will recursively call `processDecodes()` on each\
    \ `UIComponent` in the component hierarchy. If a `Renderer` is present for any\
    \ of these components, then the `UIComponent` will delegate the responsibility\
    \ of decoding to the `Renderer`. For more information about `processDecodes()`,\
    \ please refer to Chapter 2. Code Sample 3-28 shows how you can manage information\
    \ passed on the request during decode.\n\n**Code Sample 3-28.** *Decoding the\
    \ Request*\n\n```java\npublic void decode(\n  FacesContext context,\n  UIComponent\
    \ component)\n{\n  ExternalContext external = context.getExternalContext();\n\
    \  Map requestParams = external.getRequestParameterMap();\n  String clientId =\
    \ component.getClientId(context);\n  String newShowItemId = (String)requestParams.get(clientId);\n\
    \  if (newShowItemId != null && newShowItemId.length() > 0)\n  {\n    UIShowOne\
    \ showOne = (UIShowOne)component;\n    String oldShowItemId = showOne.getShowItemId();\n\
    \    if (!newShowItemId.equals(oldShowItemId))\n    {\n      showOne.setShowItemId(newShowItemId);\n\
    \      ShowEvent event = new ShowEvent(showOne, oldShowItemId, newShowItemId);\n\
    \      event.queue();\n    }\n  }\n}\n```\n\nFrom the external context, you can\
    \ get hold of the `Map` containing all the parameters passed on this request.\
    \ In the JavaScript function, you set the value of the hidden input form field,\
    \ representing the `UIShowOne` component, to the ID of the selected `UIShowItem`\
    \ component. So, by using the `clientId` of the `UIShowOne` component, you can\
    \ retrieve the value stored in the hidden input form field passed on the request—`String\
    \ newShowItemId = (String)requestParams.get(clientId)`. This value represents\
    \ the new identifier of the `UIShowItem` component to be expanded during the Render\
    \ Response phase.\n\nThe requirements stated that an application developer should\
    \ be able to add any number of `UIShowOneDeck` components to a page. Potentially,\
    \ an application developer can have any number of forms with a `UIShowOneDeck`\
    \ component or have multiple `UIShowOneDeck` components within the same form.\
    \ When you put a second deck into a form and click one of the item headers, there\
    \ will be no hidden field for the first `UIShowOneDeck`; therefore, the `newShowItemId`\
    \ will contain `null`, and the `newShowItemId != null` code path is skipped as\
    \ desired. When any other component causes a form submission for the same form,\
    \ you get back `\"\"` (an empty string), and with the additional check for nonempty\
    \ string, `(newShowItemId.length() > 0)`, this works even in a single form. If\
    \ the value is either `null` or the empty string `\"\"`, it will do nothing.\n\
    \nPassing this control, you compare the new ID—`newShowItemId`—with the value\
    \ stored in the `showItemId` property; if it matches, the user clicked the same\
    \ item that was already expanded, and there is nothing for you to do except to\
    \ return. If the value passed on the request is a new ID, you set the `showItemId`\
