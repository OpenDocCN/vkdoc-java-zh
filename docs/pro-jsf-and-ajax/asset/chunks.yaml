    **内容类型和字符编码**


    当服务器向 HTTP 浏览器客户端发送文档时，它还会在 Content-Type HTTP 标头中传递关于多用途互联网邮件扩展 (MIME) 类型（例如 `text/html`）和字符集（例如
    `UTF-8` 或 `ISO-8859-1`）的信息。客户端使用此信息来正确处理来自服务器的传入字节。


    可接受的内容类型和字符编码列表在 Accept HTTP 标头中从客户端发送到服务器。这可用于动态选择响应的适当内容类型，或者应用程序开发人员可以为文档指定静态内容类型。

    '
- fmt: '在 JSF 中，`<f:view>`标签将`null`传递给`RenderKitFactory`作为可接受的内容类型列表，尽管 JSP 容器知道请求浏览器接受的完整列表。因此，默认的`RenderKit`——标准
    HTML Basic RenderKit——必须假定内容类型已设置为`text/html`，因为它只渲染 HTML。`RenderKit`使用有关内容类型和字符编码的信息来创建一个`ResponseWriter`，该`ResponseWriter`可以生成格式正确的标记并发送给客户端。


    在初始渲染期间，对于`<f:view>`内的每个 JSF JSP 标签，都会创建一个 JSF 组件并将其附加到组件层次结构中。如你所记，`UIViewRoot`在第一阶段被创建并附加到`FacesContext`，因此你可以安全地假设这些组件将被附加到组件层次结构中。图
    1-14 展示了`<h:form>`开始标签的执行过程。


    **图 1-14.** *将* `<form>` *开始元素写入* `<f:view>` *主体内容缓冲区*


    在登录 JSP 文档中，下一个要执行的 JSF JSP 标签是`<h:form>`标签。JSF JSP 标签调用`Application.createComponent()`方法，该方法接受一个表示组件类型的字符串，例如`javax.faces.HtmlForm`（参见“组件家族和组件类型”一节）。该组件类型映射到`faces-config.xml`文件中定义的类，并创建`HtmlForm`组件的一个实例，将其附加到`UIViewRoot`。


    接下来，需要找到新创建组件的`Renderer`。`Renderer`通过组件家族和渲染器类型来定位，这两者共同定义了`Renderer`的唯一标识符（参见“渲染器类型”一节）。


    > **注意** 让我们使用`HtmlInputText`组件来说明组件家族和渲染器类型之间的关系。`HtmlInputText`组件的组件家族是`javax.faces.Input`，渲染器类型是`javax.faces.Text`。它们共同在
    HTML Basic RenderKit 中唯一标识了适当的`Renderer`类——`javax.faces.renderer.html.HtmlInputText`。


    渲染器类型已由`<h:form>`标签知晓，而组件家族可以在组件的超类`UIForm`中找到。然后，该标签在组件上调用名为`encodeBegin()`的方法，该方法进而调用`HtmlForm`渲染器上的`encodeBegin()`方法。


    `Renderer`上的`encodeBegin()`方法调用`ResponseWriter`上的方法来编写 HTML 表单元素的标记——`<form method=""
    action="">`。所有来自`ResponseWriter`的标记输出最终都进入`<f:view>`主体内容缓冲区。图 1-15 展示了`<h:form>`标签的关闭过程。


    **图 1-15.** *输出令牌并关闭* `</form>` *元素*


    该过程继续进行，`HtmlForm`组件内的所有嵌套组件都被渲染并添加到`<f:view>`主体内容缓冲区中。然后，执行`<h:form>`标签的结束标签。`<h:form>`标签调用`Renderer`（`HtmlFormRenderer`）上的`encodeEnd()`方法，该方法进而调用`ViewHandler`上的`writeState()`方法。`writeState()`方法将一个令牌传递给`ResponseWriter`，该令牌被添加到`<f:view>`主体内容缓冲区中。然后，`encodeEnd()`方法调用`ResponseWriter`上的方法来编写
    HTML 表单元素的结束标签——`</form>`。图 1-16 展示了`<f:view>`标签的关闭过程。


    > **注意** `ViewHandler`代表视图技术，在本例中视图技术是 JSP。JSF 规范并不阻止任何人实现用于其他视图技术（例如 XML）的替代`ViewHandler`。


    **图 1-16.** *用序列化状态替换令牌并关闭* `</f:view>`


    当到达`</f:view>`结束标签时，整个组件层次结构已经可用。只有在拥有完整的树之后，才能存储代表应用程序此页面的组件层次结构的状态。`</f:view>`结束标签调用`StateManager`上的`writeState()`方法。根据用于状态保存的初始化参数`STATE_SAVING_METHOD`（参见“保存和恢复状态”一节），`StateManager`将状态存储在服务器上的会话中，或者委托给`ResponseStateManager`将状态保存在客户端，并用序列化状态替换令牌。状态保存后，缓冲区被刷新到客户端，并执行任何剩余的、非
    JSF 的 JSP 标签。登录页面现在在浏览器中渲染完成。


    > **注意** 在 JSF 1.2 中，`<f:view>`标签不再负责缓冲输出。相反，缓冲是通过使用`ServletResponse`包装器来实现的。此外，组件层次结构不再在渲染期间内联创建。相反，在
    JSF 1.2 的“渲染响应”阶段，首先创建组件层次结构，然后进行渲染。因此，在渲染期间，完整的组件层次结构是可用的，因此状态被直接写入缓冲的响应中，而不需要使用占位符令牌在`</f:view>`中被真实状态替换。


    ### 回传请求


    到目前为止，用户看到的只是第一个请求页面的初始渲染。收到页面后，用户输入用户名和密码并点击登录按钮。执行回传，现在你将看到 JSF 如何处理回传。某些部分与我们已经在初始请求中介绍的内容相似，但显然存在差异和新增内容，尤其是在
    JSF 请求生命周期中。在回传时，JSF 请求生命周期的所有六个阶段都会被调用（除非在过程中的某处调用了`FacesContext.renderResponse()`方法，导致生命周期直接跳转到“渲染响应”阶段）。这与初始请求不同，初始请求只调用第一个和最后一个阶段。


    #### 恢复视图阶段


    回传的第一部分与初始请求相同；“恢复视图”阶段执行，并调用`ViewHandler`上的`restoreView()`方法来恢复前一个请求中可用的任何状态。图
    1-17 展示了恢复组件层次结构的已保存状态。


    **图 1-17.** *恢复组件层次结构的已保存状态*


    相似之处到此为止；`restoreView()`方法不会返回`null`，而是从`StateManager`返回与特定`viewId`和`FacesContext`关联的组件层次结构的当前状态，并且如果初始化参数`STATE_SAVING_METHOD`设置为客户端状态保存，则调用`ResponseStateManager`从当前请求中检索状态。恢复后的组件层次结构随后由“恢复视图”阶段传递给`FacesContext`。


    #### 应用请求值阶段


    在“应用请求值”阶段，每个输入组件从请求参数中建立提交的值，每个命令组件将一个事件排队，以便在“调用应用程序”阶段交付。图 1-18 展示了“应用请求值”阶段如何将新值传递给组件。'
  raw: 'In JSF, the <f:view> tag passes null to the RenderKitFactory as the list of
    acceptable content types, even though the JSP container is aware of the complete
    list accepted by the requesting browser. So, the default RenderKit—the standard
    HTML Basic RenderKit—must assume the content type has already been set to text/html
    since it is rendering only HTML. The RenderKit uses information about the content
    type and character encoding to create a ResponseWriter that can produce correctly
    formatted markup to the client.


    For each JSF JSP tag within <f:view> during the initial render, a JSF component
    is created and attached to the component hierarchy. As you remember, the UIViewRoot
    was created in the first phase and attached to the FacesContext, so you can safely
    assume that the components will be attached to the component hierarchy. Figure
    1-14 shows execution of the


    <h:form> start tag.


    **Figure 1-14.** *Writing* <form> *start element to the* <f:view> *body content
    buffer*


    5807ch01.qxd 1/3/06 4:47 PM Page 37


    C H A P T E R 1 ■ T H E F O U N D AT I O N O F J S F : C O M P O N E N T S


    **37**


    In the login JSP document, the next JSF JSP tag to be executed is the <h:form>
    tag. The JSF


    JSP tag calls the Application.createComponent() method that takes a string representing
    the component type, for example javax.faces.HtmlForm (see the section “Component
    Family and Component Type”). The component type is mapped to a class defined in
    the faces-config.xml file, and an instance of the HtmlForm component is created
    and attached to the UIViewRoot.


    Next, a Renderer for the newly created component needs to be found. A Renderer
    is located by component family and renderer type, which together define a unique
    identifier for the Renderer (see the section “Renderer Types”).


    ■**Note** Let’s use the HtmlInputText component to illustrate the relationship
    between the component family and renderer type. The HtmlInputText component has
    the component family javax.faces.Input and the renderer type javax.faces.Text.
    Together, they uniquely identify the appropriate Renderer class within the HTML
    Basic RenderKit—javax.faces.renderer.html.HtmlInputText.


    The renderer type is already known by the <h:form> tag, and the component family
    can be located in the component’s superclass, UIForm. The tag then calls a method
    called encodeBegin() on the component, which in turn calls the encodeBegin() method
    on the HtmlForm renderer.


    The encodeBegin() method on the Renderer calls methods on the ResponseWriter to
    write the markup for the HTML form element—<form method="" action="">. All markup
    output from the ResponseWriter ends up in the <f:view> body content buffer. Figure
    1-15 shows the closing process of the <h:form> tag.


    **Figure 1-15.** *Output token and closing the* </form> *element*


    5807ch01.qxd 1/3/06 4:47 PM Page 38


    **38**


    C H A P T E R 1 ■ T H E F O U N D AT I O N O F J S F : C O M P O N E N T S


    The process continues, and all nested components within the HtmlForm component
    are rendered and added to the <f:view> body content buffer. Then, the closing
    tag for the


    <h:form> tag is executed. The <h:form> tag calls the encodeEnd() method on the
    Renderer, HtmlFormRenderer, which in turn calls the writeState() method on the
    ViewHandler. The writeState() method passes a token to the ResponseWriter, which
    is added to the <f:view> body content buffer. The encodeEnd() method then calls
    methods on the ResponseWriter to write the closing tag for the HTML form element—</form>.
    Figure 1-16 shows the closing of the <f:view> tag.


    ■**Note** The ViewHandler represents the view technology, and in this case the
    view technology is JSP.


    Nothing in the JSF specification prevents anyone from implementing an alternate
    ViewHandler for another view technology, such as XML.


    **Figure 1-16.** *Replacing token with serialized state and closing* </f:view>
    By the time you get to the </f:view> closing tag, the entire component hierarchy
    is available. It is not until you have the complete tree that you can store the
    state of the component hierarchy representing this page of the application. The
    </f:view> end tag calls the writeState() method on the StateManager. Depending
    on the init parameter—STATE_SAVING_METHOD—for state saving (see the section “Saving
    and Restoring State”), the StateManager stores the state in the session on the
    server or delegates to the ResponseStateManager to save state on the client replacing
    the token with the serialized state. After the state has been saved, the buffer
    is flushed out to the client, and execution of any remaining non-JSF JSP tags
    will take place. The login page is now rendered in the browser.


    5807ch01.qxd 1/3/06 4:47 PM Page 39


    C H A P T E R 1 ■ T H E F O U N D AT I O N O F J S F : C O M P O N E N T S


    **39**


    ■**Note** In JSF 1.2, the <f:view> tag is no longer responsible for buffering
    the output. Instead, buffering is achieved by using a ServletResponse wrapper.
    In addition, the component hierarchy is no longer created inline during rendering.
    Instead, during the Render Response phase of JSF 1.2, the component hierarchy
    is created first and rendered next. Therefore, during rendering, the full component
    hierarchy is available, so the state is written directly into the buffered response,
    rather than needing to use a placeholder token to be replaced by the real state
    in </f:view>.


    Postback Request


    So far, the only thing the user has seen is the initial rendering of the first
    requested page.


    After receiving the page, the user enters a username and password and clicks the
    login button. A postback is performed, and you will now look at how JSF handles
    postback. Some parts are similar to what we have already been covering in the
    initial request, but there are obviously differences and additions, especially
    in the JSF request lifecycle. At postback, all six phases of the JSF request lifecycle
    get called (unless somewhere in the process the FacesContext.renderResponse()
    method is called causing the lifecycle to jump directly to the Render Response
    phase). This is different from the initial request where only the first and last
    phases are called.


    **Restore View Phase**


    The first part of a postback is the same as for the initial request; the Restore
    View phase executes and calls the restoreView() method on the ViewHandler to restore
