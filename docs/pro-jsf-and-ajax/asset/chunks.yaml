    ## Registering the `HtmlShowOneDeckRenderer`


    The `HtmlShowOneDeckRenderer` class is registered in `faces-config.xml`, as shown
    in Code Sample 3-31.


    **Code Sample 3-31.** *Registering* `HtmlShowOneDeckRenderer`


    ```xml

    <?xml version="1.0" encoding="UTF-8" ?>


    <!DOCTYPE faces-config


    PUBLIC "-//Sun Microsystems, Inc.//DTD JavaServer Faces Config 1.1//EN"


    "http://java.sun.com/dtd/web-facesconfig_1_1.dtd">


    <faces-config>


    <render-kit>


    <!-- no renderkit-id, so these renderers are added to the default renderkit -->


    <renderer>


    <component-family>


    com.apress.projsf.ShowOne


    </component-family>


    <renderer-type>


    com.apress.projsf.Deck


    </renderer-type>


    <renderer-class>


    com.apress.projsf.ch3.render.html.basic.HtmlShowOneDeckRenderer


    </renderer-class>


    </renderer>


    </render-kit>


    </faces-config>

    ```


    To register the new `HtmlShowOneDeckRenderer` class as a `Renderer` for JSF, you
    need to add the metadata shown in bold to the same `faces-config.xml` file you
    used to register the `UIShowOne` and `UIShowItem` components. Code Sample 3-31
    also omits the `<render-kit-id>` element, which will make the client-specific
    `Renderer` use the default `RenderKit` (with the identifier `RenderKitFactory.HTML_BASIC_RENDER_KIT`)
    provided by the JSF implementation.


    You also set `<component-family>` to `com.apress.projsf.ShowOne`, which represents
    the behavior of the `UIShowOne` component, and set `<renderer-type>` to `com.apress.projsf.Deck`,
    which represents the presentation of the `UIShowOne` component. The combination
    of component family and render type uniquely identifies which `Renderer` class
    to use with the component—`com.apress.projsf.ch3.render.html.basic.HtmlShowOneDeckRenderer`.
    For more information about this, please refer to Chapter 1.


