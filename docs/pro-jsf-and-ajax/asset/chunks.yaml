    ... >。每个 <pro:showItem ... > 子组件都有其唯一的标识符（例如，first、second 和 third）。每个 <pro:showItem
    ... > 都有一个与之关联的 facet——<f:facet name="header">——代表该项目可点击区域的“标题”（有关 facet 的更多信息，请参见第
    1 章）。


    Deck 组件的部分要求是允许应用程序开发人员使用任何组件来表示实际的可点击标题，作为示例，我们使用了常规的


    <h:outputText> 和 <h:panelGroup> 组件。嵌套在每个 <pro:showItem ... > 内部是一组子组件，当用户选择一个项目时，这些子组件将被显示。当用户选择任何
    <pro:showItem ... > 组件时，一个事件将被传递到事件队列，以便在调用应用程序阶段进行处理。


    为了能够响应此事件，一个新的监听器——<pro:showListener ... />——会监听前述事件。


    **第 2 步：创建事件和监听器**


    为了能够创建该组件，您需要理解两个新的行为超类——


    `UIShowOne` 和 `UIShowItem`。`UIShowOne` 行为超类跟踪用户选择了哪个节点，而 `UIShowItem` 充当一个可点击的父容器，它将显示或隐藏其子组件。对于这些新的
    `UIComponent`，您还需要一个新的事件类型 `ShowEvent`，以及相应的事件监听器接口 `ShowListener`，以便通知应用程序开发人员并将应用程序代码附加到组件上。新的事件实例需要跟踪用户选择了哪个项目。除此之外，您还需要创建一个新的
    `Renderer` 来处理选择性渲染，并附带特定于渲染器的子类和 JSP 标签处理器。


