- fmt: '# Chapter 2


    `Chapter 2` introduces the first JSF component: the date field component. We played
    with the idea of having a component comprised of three input fields representing
    *day*, *month*, and *year*, but this did not provide us with enough material to
    work with when moving forward through the book. So instead, we focused this chapter
    on the essentials of building a component, such as creating prototypes, managing
    resources, creating renderers, controlling rendering of children, handling conversion,
    and figuring out what’s going on during postback. To be able to keep track of
    all the tasks associated with creating JSF components, this chapter introduces
    the first steps in a JSF component design blueprint. The date field component
    created in this chapter also introduces you to some new concepts and open source
    projects when you improve its user interactivity in `Chapter 7`.


    # Chapter 3


    `Chapter 3` introduces the second component: the deck component. The deck component
    works like an accordion to show and hide information. This chapter discusses the
    JSF event model and teaches you how to create new behavioral superclasses and
    new event types with corresponding listener interfaces. By the time you finish
    `Chapter 3`, you will have enough knowledge to start writing your own basic HTML
    components. During the course of this book, you will be enhancing the deck and
    date field components, and you will be providing them with extremely rich user
    interactivity that leverages RITs.


    # Chapter 4


    `Chapter 4` introduces you to three RITs (Ajax, Mozilla XUL, and Microsoft HTC)
    and gives you a high-level overview of these technologies. You will use these
    technologies in `Chapters 6`, `7`, `8`, and `9` to build rich interactivity into
    the date field and deck components. Of course, some simple applications in this
    chapter will highlight the core features of each technology.


    # Chapter 5


    As promised, to be able to successfully build and package JSF components, and
    especially RICs, you need a solution that can easily package resources, such as
    JavaScript libraries, CSS, and images, into the same component library as your
    JSF infrastructure (renderers, behavioral superclasses, and so on) and then serve
    them out from the same JAR. `Chapter 5` introduces a new open source project—Weblets—that
    makes resource file management and versioning as easy for Web development as it
    already is for desktop-based Java development.


    # Chapters 6, 7, 8, and 9


    `Chapters 6`, `7`, `8`, and `9` address the need for a smoother and richer user
    experience when users interact with your components in a JSF Web application.
    These four chapters leverage everything you have learned so far and guide you
    through the gotchas of building Ajax-enabled JSF components with HTML, XUL, and
    HTC. These chapters also introduce you to one established and two new open source
    projects: the Dojo toolkit, Mabon, and D2.


    # Chapter 10


    Finally, `Chapter 10` pulls it all together. In this chapter, you will learn how
    to leverage all of the aforementioned techniques to provide your Web application
    developers (and users) with enterprise-class JSF components that support multiple
    clients.


