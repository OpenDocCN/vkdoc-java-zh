    **注意**：有关HTML元素及其所有支持属性的更多信息，请访问W3C网站：`http://www.w3.org/MarkUp/`。


    `Figure 2-2`显示了你的原型结果，该原型展示了一个带有输入字段的简单页面，该输入字段带有一个图标，表明这是一个日期字段。


    **Figure 2-2.** *使用图标叠加的HTML日期字段组件原型*


    在创建输入日期组件之前，你将先预览最终结果以及如何在JSP页面中使用它。`Code Sample 2-3`使用了输入日期组件`<pro:inputDate>`，并应用了一个JSF核心转换器`<f:convertDateTime>`，该转换器将用户输入的字符串转换为强类型的`Date`对象。另一个`<f:convertDateTime>`在提交按钮下方显示格式化后的日期。


    **Code Sample 2-3.** *包含日期字段组件的示例页面*


    ```

    <pro:inputDate id="dateField"

    title="Date Field Component"

    value="#{backingBean.date}" >

    <f:convertDateTime pattern="dd MMMMM yyyy" />

    </pro:inputDate>

    <br></br>

    <h:message for="dateField" />

    <br></br>

    <h:commandButton value="Submit" />

    <br></br>

    <h:outputText value="#{backingBean.date}" >

    <f:convertDateTime pattern="dd MMMMM yyyy" />

    </h:outputText>

    ```


    加粗的代码是你在本章中将创建的输入日期组件。


    **步骤2：创建客户端特定的渲染器**


    如第1章所述，`Renderer`负责向客户端输出（呈现），无论是移动设备的WML标记还是浏览器客户端的传统HTML标记。`Renderer`还提供行为类`UIComponent`不支持的客户端属性，例如`style`、`width`、`height`和`disabled`。


    在不需要新行为的情况下，只需一个`Renderer`即可创建一个“新”组件。本章后面描述的渲染器特定组件子类（参见“步骤3：创建渲染器特定子类”部分）仅仅是应用程序开发人员的便利类。虽然并非严格必要，但实现客户端特定的组件子类是常见做法，以使应用程序开发的某些方面更简单。


    对于这个输入日期组件，你将重用`UIInput`组件超类，因为它提供了你所需的组件行为。现在，是时候专注于为`UIInput`组件提供一个自定义的输入日期`Renderer`了。基于之前的蓝图，你现在已进入第二步，是时候开始查看构成`Renderer`的代码了。


    `Figure 2-3`显示了你在本章中将创建的自定义渲染器`HtmlInputDateRenderer`。该自定义渲染器扩展了`HtmlRenderer`工具超类，而`HtmlRenderer`又扩展了标准的`Renderer`类（`javax.faces.render.Renderer`）。


    ![Image 12](index-81_1.png)


    **Figure 2-3.** *本章创建的`HtmlInputDateRenderer`类的类图*


    **`HtmlRenderer`超类**


    `HtmlRenderer`超类提供了一些便利方法，用于编码HTML渲染器所需的资源。应用程序开发人员可能会在页面中添加两个或更多输入日期组件；因此，如果不加以处理，输入日期组件使用的任何资源（例如样式表）将被多次写入客户端。


    `HtmlRenderer`实现提供的方法背后的语义将确保这些资源只被写入一次。在本章中，你将创建这些语义，以保证样式和脚本资源在渲染期间只被写入一次。


    `Code Sample 2-4`显示了子类用于写出其资源的便利方法。'
