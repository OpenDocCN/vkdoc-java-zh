    自我们首次引入 deck 组件以来，需求并未改变。它必须足够灵活，能够处理应用程序开发者添加到 UIShowItem 组件的任何类型的子组件。UIShowItem
    组件本身不负责渲染其子元素，但应用程序开发者可以添加一个负责渲染其子元素的子容器组件（例如，一个 HtmlPanelGroup 组件）。


    为了实现这一点，你首先需要将此 UIComponent 当前状态的起始部分渲染到附加到指定 FacesContext 的 ResponseWriter 上。然后，检查该组件是否负责渲染其子元素。如果是，则调用组件上的
    encodeChildren() 方法开始渲染其子元素。如果该组件不负责渲染其子元素，则调用组件上的 getChildren() 方法。getChildren()
    方法返回一个包含 UIComponent 所有子元素的 List。如果该组件没有子元素，则返回一个空的 List，然后通过调用组件上的 encodeEnd()
    方法来关闭生成的标记。如果它有子元素，则递归调用 _encodeAll() 方法，如代码示例 9-29 所示，直到所有子元素都被渲染完毕，然后通过调用组件上的
    encodeEnd() 方法来关闭生成的标记。


    **代码示例 9-29.** *_encodeAll()* 方法 private void _encodeAll(


    FacesContext context,


    UIComponent component) throws IOException


    {


    component.encodeBegin(context);


    if (component.getRendersChildren())


    {


    component.encodeChildren(context);


    }


    else


    {


    List kids = component.getChildren();


    Iterator it = kids.iterator();


    while (it.hasNext())


    {


    UIComponent kid = (UIComponent)it.next();


    _encodeAll(context, kid);


    }


    }


    component.encodeEnd(context);


    }


