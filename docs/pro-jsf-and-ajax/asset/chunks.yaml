    \ `ProInputDateTag`。在初始渲染时，`ProInputDateTag` 负责创建您新的特定于渲染器的组件子类——`ProInputDate`——并将所有\
    \ JSP 自定义操作属性从标签处理器传输到组件实例。\n"
