    **235**


    d2.js 库还包含传递用户选择信息、提交表单以及处理来自服务器响应所需的函数。d2.js 库反过来利用 Dojo 工具包内置的 Ajax 支持，使用 XMLHttpRequest
    对象提交表单，而不是常规的表单 POST，如代码示例 6-3 所示。


    **代码示例 6-3.** *来自* d2.js *库的摘录* var d2 = new Object();


    **d2.submit = function (form, content)**


    {


    var targetDocument = form.ownerDocument;


    var contentType = targetDocument.contentType;


    // IE 不支持 document.contentType


    if (contentType == null)


    contentType = ''text/html'';


    **dojo.io.bind(**


    {


    **formNode: form,**


    **headers: { ''X-D2-Content-Type'': contentType },**


    content: content,


    **mimetype: "text/plain",**


    **load: d2._loadtext,**


    error: d2._error


    });


    }


    代码示例 6-3 是 d2.js 库的一个摘录，展示了你将在 Ajax 实现中使用的 submit 函数。如你所见，d2.js 库引用了 dojo.io 包，该包为
    XMLHttpRequest 和其他更复杂的传输机制提供了可移植代码。dojo.io 包的大部分魔力通过 bind() 方法展现出来。dojo.io.bind()
    方法是一个通用的异步请求 API，它封装了多个传输层（iframe 队列、XMLHttpRequest、mod_pubsub、LivePage 等）。


    Dojo 会尝试为当前请求选择最佳可用的传输方式，默认情况下，由于没有集成其他传输方式，只会选择 XMLHttpRequest。


    d2.submit() 函数调用 dojo.io.bind() 方法，传递关于要提交哪个表单、内容（将作为请求参数发送到服务器的名称/值对映射）、接受的请求头以及此请求的
    MIME 类型等信息。


    D2 库还定义了一个回调函数——d2._loadtext——用于从服务器获取响应数据。d2._loadtext 函数用响应返回文档中的 inner HTML
    替换目标文档的 inner HTML。


    ■**注意** D2 开源项目还提供了一个出色的工具，用于比较和合并两个 DOM 文档。


