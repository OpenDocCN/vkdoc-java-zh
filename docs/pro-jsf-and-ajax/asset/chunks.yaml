- fmt: "### Step 6: Creating a Renderer-Specific Subclass\n\nTo follow best practices,\
    \ you will create a renderer-specific subclass for the document component—`com.apress.projsf.ch8.component.pro.ProDocument`.\
    \ This class provides getters and setters for three renderer-specific attributes\
    \ on the JSF component—`stylesheetURI`, `styleClass`, and `title`. Figure 8-11\
    \ shows a class diagram with the `ProDocument` class.\n\n**Figure 8-11.** Class\
    \ diagram showing the `ProDocument` class\n\nAs you can see, you are using the\
    \ same pattern to build this component; for example, Code Sample 8-38 follows\
    \ the same design as the `ProInputDate` subclass you created in Chapter 2.\n\n\
    **Code Sample 8-38.** The `ProDocument` Class\n\n```\npackage com.apress.projsf.ch8.component.pro;\n\
    \nimport javax.faces.context.FacesContext;\n\nimport javax.faces.el.ValueBinding;\n\
    \nimport com.apress.projsf.ch8.component.UIDocument;\n\npublic class ProDocument\
    \ extends UIDocument\n{\n\n    /**\n     * The component type for this component.\n\
    \     */\n    public static final String COMPONENT_TYPE = \"com.apress.projsf.ProDocument\"\
    ;\n\n    /**\n     * The renderer type for this component.\n     */\n    public\
    \ static final String RENDERER_TYPE = \"com.apress.projsf.Document\";\n\n    public\
    \ ProDocument()\n    {\n        setRendererType(RENDERER_TYPE);\n    }\n\n   \
    \ public void setStyleClass(\n            String styleClass)\n    {\n        _styleClass\
    \ = styleClass;\n    }\n\n    public String getStyleClass()\n    {\n        if\
    \ (_styleClass != null)\n            return _styleClass;\n\n        ValueBinding\
    \ binding = getValueBinding(\"styleClass\");\n        if (binding != null)\n \
