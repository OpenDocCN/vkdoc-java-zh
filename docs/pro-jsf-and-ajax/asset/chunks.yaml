    **使用 Weblets**


    开源 Weblets 项目旨在以一种通用且可扩展的方式解决资源打包问题，以便所有 JSF 组件编写者都能利用它，并且不会给应用程序开发者增加额外的安装负担。


    *weblet* 充当一个中介，拦截来自客户端的请求，并使用短 URL 从 JAR 文件中提供资源。与 servlet 或 filter 方法不同，weblet
    可以在 JAR 文件内部注册和配置，因此组件库的 Renderer、它们的资源文件以及 weblet 配置文件（weblets-config.xml）都可以打包在同一个
    JAR 文件中。当组件库升级到新版本时，你无需单独部署额外的可安装文件。对于应用程序开发者来说，也无需任何配置步骤。


    需要注意的是，所有由 weblets 提供的资源都是*内部*资源，仅供 Renderer 使用。任何由应用程序提供的资源（如图像）都作为组件属性值提供，并从上下文根目录作为*外部*资源加载。


    **探索 Weblet 架构**


    尽管 weblets 被设计为可供任何 Web 客户端使用，但 weblet 实现已通过一个名为 WebletsViewHandler 的自定义 ViewHandler
    与 JSF 集成，如图 5-1 所示。在渲染主 JSF 页面期间，WebletsViewHandler 负责将 weblet 特定的资源 URL 转换为浏览器用于请求
    weblet 管理资源的实际 URL。


    **图 5-1.** *weblet 架构的高级概述*


    5807ch05.qxd 1/13/06 2:56 PM 第 216 页


    **216**


    第 5 章 ■ 使用 WEBLET 加载资源


    在接收到主页面渲染后的标记后，浏览器使用单独的请求下载每个额外的资源。每个对 weblet 管理资源的请求都会被 WebletsPhaseListener
    拦截，然后它要求 WebletContainer 从组件库 JAR 文件中流式传输 weblet 管理的资源文件。


    weblet 容器被设计为尽可能利用浏览器缓存。这通过最小化对 weblet 管理资源文件的请求总数来提高整体渲染性能。


    为了确保灵活性、优化性能并避免与现有 Web 应用程序资源冲突，应用程序开发者可以配置 weblets 来覆盖组件编写者提供的任何默认设置。


    **在你的组件库中使用 Weblets**


    你可以使用 weblets-config.xml 文件配置 weblets，该文件必须存储在组件库 JAR 文件的 /META-INF 目录中。配置 weblet
    类似于配置 servlet 或 filter。weblets-config.xml 文件中的每个 weblet 条目都有一个 weblet 名称、一个实现类和初始化参数。weblet
    映射将特定的 URL 模式与特定的 weblet 名称关联起来，例如 com.apress.projsf.ch5。weblet 名称和默认 URL 模式定义了
    weblet 管理资源的公共 API，并且为了保持向后兼容性，在组件库的不同版本之间不应修改。


    如代码示例 5-2 所示，示例组件库将资源打包在 com.apress.projsf.ch5.renderer.html.basic.resources Java
    包中，并使用默认的 URL 映射 /projsf-ch5/* 使其对浏览器可用。


    **代码示例 5-2.** *Weblets 配置文件——* weblets-config.xml


    <?xml version="1.0" encoding="UTF-8" ?>


    <weblets-config >


    <weblet>


    **<weblet-name>com.apress.projsf.ch5</weblet-name>**


    **<weblet-class>**


    **net.java.dev.weblets.packaged.PackagedWeblet**


    **</weblet-class>**


    <init-param>


    **<param-name>package</param-name>**


    **<param-value>com.apress.projsf.ch5.render.html.basic.resources</param-value>**


    </init-param>


    </weblet>


    <weblet-mapping>


    <weblet-name>com.apress.projsf.ch5</weblet-name>


    **<url-pattern>/projsf-ch5/*</url-pattern>**


    </weblet-mapping>


    </weblets-config>


    PackagedWeblet 是一个内置的 weblet 实现，它可以使用 ClassLoader 从特定的 Java 包中读取数据，然后将结果流式传输到浏览器。package
    初始化参数告诉 PackagedWeblet 在解析 weblet 管理的资源请求时，将哪个 Java 包用作根目录。


    5807ch05.qxd 1/13/06 2:56 PM 第 217 页


    第 5 章 ■ 使用 WEBLET 加载资源


    **217**


    指定 Weblet MIME 类型


    当使用 weblets 提供 JSF 组件资源文件时，重要的是让浏览器正确获知相应的 MIME 类型，以便资源文件能被正确处理。默认情况下，weblets
    内置了许多常见 MIME 类型的知识，例如对于常见的文件扩展名（如 .txt）使用 text/plain。然而，在某些情况下，JSF 组件可能需要打包 weblets
    先前未知的资源，或者必须使用不同的扩展名来提供资源，这导致 weblets 无法自动识别要使用的正确 MIME 类型。


    代码示例 5-3 展示了如何为 weblet 提供的资源定义自定义 MIME 类型映射。


    **代码示例 5-3.** *定义自定义 MIME 类型的 Weblets 配置文件*


    <?xml version="1.0" encoding="UTF-8" ?>


    <weblets-config >


    <weblet>


    <weblet-name>com.apress.projsf.ch5</weblet-name>


    <weblet-class>


    net.java.dev.weblets.packaged.PackagedWeblet


    </weblet-class>


    <init-param>


    <param-name>package</param-name>


    <param-value>com.apress.projsf.ch5.render.html.basic.resources</param-value>


    </init-param>


    **<mime-mapping>**


    **<extension>htc</extension>**


    **<mime-type>text/x-component</mime-type>**


    **</mime-mapping>**


    </weblet>


    <weblet-mapping>


    <weblet-name>com.apress.projsf.ch5</weblet-name>


    <url-pattern>/projsf-ch5/*</url-pattern>


    </weblet-mapping>


    </weblets-config>


    代码示例 5-3 为由此 weblet 提供的所有具有 .htc 扩展名的资源定义了一个自定义 MIME 类型映射 text/x-component。


    指定 Weblet 版本控制


    Weblets 还内置了对组件库版本控制的支持。这允许浏览器在可能的情况下缓存打包的资源（例如 showOneDeck.js），从而防止不必要的往返 Web
    服务器。


