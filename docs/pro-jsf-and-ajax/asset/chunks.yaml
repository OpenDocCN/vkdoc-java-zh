- fmt: "# 排版后的内容\n\nMeanwhile, developers are falling back to the lowest common denominator—`HTML`—and\
    \ using technologies such as `Ajax` to build dynamic Web applications. This approach\
    \ of developing Web applications has one severe drawback—it has no good reuse\
    \ model. Currently, this approach has no standard way for a developer to define\
    \ reusable and easy-to-integrate `HTML` components that have rich functionality\
    \ with existing server-side logic. Currently developers use `JSP` tag libraries\
    \ to create reusable `HTML` components that access server-side logic, but this\
    \ is still low-level and cumbersome.\n\nWhat is needed is a standard that can\
    \ encapsulate these `RITs` using components instead of markup in an effective\
    \ model that allows application developers to build Web applications with prefabricated\
    \ blocks of functionality without concern for implementation details. Prefabricated\
    \ blocks, or components, allow application developers to build complex applications\
    \ with reusable components. This also allows application developers to focus on\
    \ the actual application structure rather than building the actual dynamic functionality\
    \ themselves.\n\n`JSF` is all about these kinds of reusable components!\n\n##\
    \ Cross-Platform Support\n\nAn important aspect that developers and their managers\
    \ need to take into account when building applications is cross-platform support.\
    \ Consumer requirements are increasingly supporting handheld devices, `Telnet`\
    \ clients, desktops, and so on. For developers with complete control over the\
    \ consumer base and infrastructure, this may not be important, but in most cases\
    \ it is.\n\nInitially the term *cross-platform* meant the operating system the\
    \ application runs on (for example, `Windows`, `Linux`, `Mac OS`, `Unix`, and\
    \ so on), but the advancement of Internet-enabled devices means the cross-platform\
    \ support matrix has become far more complex.\n\nSeveral cross-platform solutions\
    \ such as `Java` are available.\n\nIn most cases, applications need to be designed\
    \ to use features of a specific platform, which in turn is time-consuming and\
    \ costly. For a developer to fully support an application on only one platform\
    \ requires lengthy lifecycles for compiling and debugging. Adding more platforms\
    \ to the mix, the time spent on developing a cross-platform application can grow\
    \ exponentially.\n\nFor the technologies used in this chapter—`Ajax`, `XUL`, and\
    \ `HTC`—Mozilla’s `XUL` claims that it has cross-platform support. That is partially\
    \ true; you can deploy a `XUL` application to any operating system that the Mozilla\
    \ platform (`GRE`) supports.\n\n> **Note** `XBL` is already available for `Firefox`\
    \ on the `Mac`, and it is coming to `Safari 1.3/2.0`.\n\n![Image 35](index-234_1.png)\n\
    \n`5807ch04.qxd 1/13/06 2:50 PM Page 209`\n\n`C H A P T E R 4 ■ U S I N G R I\
    \ C H I N T E R N E T T E C H N O L O G I E S`\n\n**209**\n\nYou could also argue\
    \ that `Ajax` provides cross-platform support, but it is the provider of the `Ajax`\
    \ solution that needs to ensure that every browser-specific quirk is supported.\n\
    \nSo, although you have plenty of environments to deploy to, no true solution\
    \ has full cross-platform support.\n\n## Imagination As the Only Limit\n\n`JSF`\
    \ standardizes the server side for the application developer, but you still have\
    \ to wait for the presentation layer in the browser to standardize for component\
    \ developers. `JSF` brings platform independence to the application developer\
    \ by separating the user interface from the application, which makes it possible\
    \ for the component author to change the presentation layer without tampering\
    \ with the application.\n\nThis is not solving the browser inconsistency issue,\
    \ the maintenance difficulties, or the cross-platform issue of the previously\
    \ mentioned technologies, but it will help application developers build `RIAs`\
    \ in a standard way.\n\nThe three technologies described in this chapter—`Ajax`,\
    \ `XUL`, and `HTC`—have their advantages and drawbacks, so wouldn’t it be great\
    \ if you could combine the advantages into one reusable standard component?\n\n\
    A `JSF` component developer can use `XUL` or `HTC` for presentation and `Ajax`\
    \ for communication and then dynamically fall back to a traditional `HTML` solution\
    \ if the client does not support any of the three technologies. The application\
    \ developer will be able to build one application supporting multiple rendering\
    \ technologies with one common programming model—`JSP` and `Java`.\n\n## A JSF\
    \ Application Supporting Ajax, XUL, and HTC\n\nTo finish this chapter and map\
    \ back to the previously covered technologies, the `JSF` sample shown in Figure\
    \ 4-11 illustrates a page containing your `JSF` input date component. In later\
    \ chapters, you will implement the support shown in this section. This version\
    \ of your component has been extended to include a pop-up calendar from which\
    \ the user can pick a date.\n\nThis improved component leverages `Ajax` for communication\
    \ and `XUL` and `HTC` as rendering technologies.\n\n**Figure 4-11.** *A page built\
    \ with JSF components using XUL as the rendering technology*\n\n![Image 36](index-235_1.png)\n\
    \n`5807ch04.qxd 1/13/06 2:50 PM Page 210`\n\n**210**\n\n`C H A P T E R 4 ■ U S\
    \ I N G R I C H I N T E R N E T T E C H N O L O G I E S`\n\nFigure 4-11 shows\
    \ a `JSF` page—`inputDate.jspx`—that contains your `ProInputDate` component, which\
    \ is rendering `XUL` content to the `Mozilla Firefox` browser.\n\nFigure 4-12\
    \ shows the same page—`inputDate.jspx`—running in `Internet Explorer`. The interesting\
    \ part with this simple application is that you are using the best rendering technology\
    \ for each browser, and although not visible, the `ProInputDate` component is\
    \ using `Ajax` to asynchronously communicate with the server to receive dates\
    \ that are selectable.\n\n**Figure 4-12.** *The same page in Internet Explorer\
    \ using HTC as the rendering technology*\n\nThe source of the page (see Code Sample\
    \ 4-26) is not that different from what you have seen with `XUL` and `HTC`, but\
    \ the main difference is that the application developer will not need to learn\
    \ two, or even three, ways of supporting `RIAs` in today’s browsers.\n\n**Code\
    \ Sample 4-26.** *JSF Page Matching the XUL and HTC Samples*\n\n```\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\" ?>\n<jsp:root version=\"1.2\"\n          xmlns:jsp=\"\
    http://java.sun.com/JSP/Page\"\n          xmlns:f=\"http://java.sun.com/jsf/core\"\
    \n          xmlns:h=\"http://java.sun.com/jsf/html\"\n          xmlns:pro=\"http://www.projsf.com/components\"\
    >\n  <jsp:directive.page contentType=\"application/x-javaserver-faces\" />\n \
    \ <f:view>\n    <pro:document title=\"ProJSF : ProInputDate\" >\n      <h:form>\n\
    \        Please enter a date with the pattern \"d MMMMM yyyy\".\n        <br/>\n\
    \        <pro:inputDate id=\"dateField\"\n                       title=\"Date\
    \ Field Component\"\n                       value=\"#{inputDateBean.date}\" >\n\
    \          <f:convertDateTime pattern=\"d MMMMM yyyy\" />\n          <pro:validateDate\
    \ availability=\"#{inputDateBean.getAvailability}\" />\n        </pro:inputDate>\n\
    \        <br/>\n        <h:message for=\"theDate\" />\n        <br/>\n       \
    \ <h:commandButton value=\"Submit\" />\n        <br/>\n        <h:outputText value=\"\
    #{inputDateBean.date}\" >\n          <f:convertDateTime pattern=\"d MMMMM yyyy\"\
    \ />\n        </h:outputText>\n      </h:form>\n    </pro:document>\n  </f:view>\n\
    </jsp:root>\n```\n\nApart from the obvious namespaces, the sample contains one\
    \ namespace that maps to a custom component library (`pro`) and a custom component\
    \ (`<pro:inputDate .../>`). Be patient—you will see the actual `JSF` implementation\
    \ in the coming chapters.\n\n## Summary\n\nThis chapter gave you some insight\
    \ into three of the market’s leading view technologies for `RIAs`: `XUL`, `HTC`,\
