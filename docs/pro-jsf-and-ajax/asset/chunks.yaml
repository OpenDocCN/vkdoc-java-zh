- fmt: "# The Ajax Book Filter Implementation\n\nThe Ajax book filter implementation\
    \ consists of three JavaScript functions—`populateBookList()`, `createHttpRequest()`,\
    \ and `transferListItems()`—and a data source containing information about the\
    \ books. As soon as the cursor leaves the Book Category field, the `getBookList()`\
    \ function is invoked (see Figure 4-5).\n\n**Figure 4-5.** *Sequence diagram over\
    \ the book filter* `XMLHttpRequest`\n\nThe `populateBookList()` function will\
    \ call the `createHttpRequest()` function, which will create a new instance of\
    \ the `XMLHttpRequest` object. You then use this `XMLHttpRequest` object to set\
    \ the stage for your request and send the encoded data as a url-formencoded stream\
    \ back to the server (HTTP GET). If the request is successful, the `XMLHttpRequest`\
    \ object calls your callback function. This function will get the response text\
    \ from the `XMLHttpRequest` object and use the content passed (for example, a\
    \ list of books) to modify the HTML document and populate the `<select>` element\
    \ with data. Code Sample 4-4 shows the actual code behind this book filter.\n\n\
    **Code Sample 4-4.** *The* `populateBookList()` *Function*\n\n```javascript\n\
    /**\n * Populates the select element with a list of books in a specific book category.\n\
    \ *\n * @param serviceURL the service URL for retrieving JSON data files\n * @param\
    \ selectId the id of the target select element to populate\n * @param category\
    \ the book category for the populated books\n */\nfunction populateBookList(\n\
    \    serviceURL,\n    selectId,\n    category)\n{\n    var xmlhttp = createHttpRequest();\n\
    \    // You can use any type of data source, but for the sample\n    // you are\
    \ going to use a simple JSON file that contains your data.\n    var requestURL\
    \ = serviceURL + '/booklist-' + category.toLowerCase() + '.json';\n    xmlhttp.open(\"\
    GET\", requestURL);\n    xmlhttp.onreadystatechange=function()\n    {\n      \
    \  if (xmlhttp.readyState == 4)\n        {\n            if (xmlhttp.state == 200)\n\
    \            {\n                transferListItems(selectId, eval(xmlhttp.responseText));\n\
    \            };\n        };\n    };\n    xmlhttp.send(null);\n};\n```\n\nWith\
    \ this code, you first create a new instance of the `XMLHttpRequest` object by\
    \ calling a function called `createHttpRequest()`. You initiate your request by\
    \ calling the `open(\"GET\", requestURL)` method on the `XMLHttpRequest` object\
    \ instance and passing two arguments. The `GET` string indicates the HTTP method\
    \ for this request, and the `requestURL` variable represents the URL to your data\
    \ source, which in this case is a simple text file. If a request is successful,\
    \ the `readyState` on your `XMLHttpRequest` object is set to 4, and the `state`\
    \ is set to 200. You use the `onreadystatechange` event handler to invoke the\
    \ `transferListItems()` function when `readyState` is set to 4, passing the `responseText`\
    \ property from the `XMLHttpRequest` object. The `transferListItems()` function\
    \ will take the returned string and populate the `<select>` element with data.\n\
    \nCreating an instance of the `XMLHttpRequest` object is simple, although as shown\
    \ in Code Sample 4-5, you have a few things to consider.\n\n**Code Sample 4-5.**\
    \ *The* `createHttpRequest()` *Function That Creates the* `XMLHttpRequest` *Object*\n\
    \n```javascript\n/**\n * Creates a new XMLHttpRequest object.\n */\nfunction createHttpRequest()\n\
    {\n    var xmlhttp = null;\n    if (window.ActiveXObject)\n    {\n        xmlhttp\
    \ = new ActiveXObject(\"Microsoft.XMLHTTP\");\n    }\n    else if (window.XMLHttpRequest)\n\
    \    {\n        xmlhttp = new XMLHttpRequest();\n    }\n    return xmlhttp;\n\
    };\n```\n\nCode Sample 4-5 creates the `XMLHttpRequest` object, and as in many\
    \ browsers with JavaScript support, different browsers support the `XMLHttpRequest`\
    \ object slightly differently. This means you need to implement support for different\
    \ browsers in your `createHttpRequest()` function. For Microsoft Internet Explorer,\
    \ you have to create the `XMLHttpRequest` object using `new ActiveXObject(\"Microsoft.XMLHTTP\"\
    )`. With any browser supporting the Mozilla GRE, you can use a native call—`new\
    \ XMLHttpRequest()`—to create an instance of the `XMLHttpRequest` object."
