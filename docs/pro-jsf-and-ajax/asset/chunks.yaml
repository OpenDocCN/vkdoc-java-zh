- fmt: "# Although this does work and is a useful tool for prototyping, we recommend\
    \ that, where possible, application developers avoid modifying the renderer-specific\
    \ attributes directly from the backing bean application logic and instead use\
    \ the behavioral superclass of the component. If application developers use the\
    \ parent class instead of the convenience subclass, they have no need to modify\
    \ the backing bean code when the JSF component changes to use a different renderer-specific\
    \ component in the page definition, such as from `HtmlSelectOneRadio` to `HtmlSelectOneListbox`.\
    \ The backing bean code needs to change only when the behavioral superclass also\
    \ changes, such as changing from `HtmlSelectOneRadio` to `HtmlSelectManyList`.\n\
    \nThis subclass is optional, but it is good practice to provide this subclass\
    \ with the JSF component, since sometimes application developers may like to use\
    \ it for convenience, and for component writers it is hard to know whether application\
    \ developers will try to use this.\n\nSince this convenience class extends the\
    \ `UIComponent` and the behavioral subclass (for example, `UISelectOne`) at runtime,\
    \ the component instance will not only contain information available in this convenience\
    \ class but also contain information from the extended `UIComponent` classes.\
    \ If you look at the inheritance model that is used by JSF to create an instance\
    \ of a component, it will look something like Figure 1-7.\n\n**Figure 1-7.** `UIComponent`\
    \ *inheritance*\n\nThis model allows programmatic access to all properties and\
    \ attributes defined by the different classes that build up the component. As\
    \ mentioned earlier, the `UIComponentBase` class contains behavioral agreements\
    \ for all components, the `UISelectOne` subclass contains properties and methods\
    \ specific to its behavior (for example, select one), and the renderer-specific\
    \ subclass (for example, `HtmlSelectOneListbox`) contains getters and setters\
    \ for all renderer-specific attributes as well as the `rendererType` for that\
    \ particular component.\n\n## Using a Renderer-Specific Component Subclass\n\n\
    Code Sample 1-3 illustrates the benefit of using the behavioral superclass instead\
    \ of the convenience class to manipulate the page at runtime. The first bit of\
    \ code illustrates a page with a simple `selectOneRadio` component with three\
    \ options and a `commandButton`.\n\n**Code Sample 1-3.** *JSF* `selectOneRadio`\
    \ *Bound to a Renderer-Specific Subclass*\n\n```\n<h:form>\n  <h:selectOneRadio\
    \ binding=\"#{sample.selectOneRadio}\" >\n    <f:selectItem itemLabel=\"Jonas\"\
    \ itemValue=\"jonas.jacobi\" />\n    <f:selectItem itemLabel=\"John\" itemValue=\"\
    john.fallows\" />\n    <f:selectItem itemLabel=\"Duke\" itemValue=\"java.dude\"\
    \ />\n  </h:selectOneRadio>\n  <h:commandButton value=\"Select Duke\"\n      \
    \             actionListener=\"#{sample.onAction}\" />\n</h:form>\n```\n\nIn the\
    \ `selectOneRadio` JSP tag, or custom action, the `binding` attribute is set to\
    \ a value-binding expression—`#{sample.selectOneRadio}`. This expression points\
    \ to a backend JavaBean property—`selectOneRadio`—that in turn is wired to the\
    \ component instance for the `UIComponent` created by this JSP tag. Code Sample\
    \ 1-4 shows the backend JavaBean, or the managed bean, that contains the page\
    \ logic that at runtime will set the default option on the `selectOneRadio` component\
    \ to `java.dude` at runtime, whenever the user clicks the command button.\n\n\
    **Code Sample 1-4.** *Backing Bean Using the* `HtmlSelectOneRadio` *Subclass*\n\
    \n```\npackage com.apress.projsf.ch1.application;\n\nimport javax.faces.event.ActionEvent;\n\
    import javax.faces.component.html.HtmlSelectOneRadio;\n\npublic class SampleBean\n\
    {\n  public void onAction(\n    ActionEvent event)\n  {\n    _selectOneRadio.setValue(\"\
    java.dude\");\n  }\n\n  public void setSelectOneRadio(\n    HtmlSelectOneRadio\
    \ selectOneRadio)\n  {\n    _selectOneRadio = selectOneRadio;\n  }\n\n  public\
    \ HtmlSelectOneRadio getSelectOneRadio()\n  {\n    return _selectOneRadio;\n \
    \ }\n\n  private HtmlSelectOneRadio _selectOneRadio;\n}\n```\n\nIn Code Sample\
    \ 1-4, the managed bean is using the renderer-specific subclass `HtmlSelectOneRadio`.\
    \ If application developers want to change the UI and replace the `selectOneRadio`\
    \ component with a `selectOneMenu` component in the page, a class cast exception\
    \ is thrown at runtime. The application developer can avoid this by instead using\
    \ the parent class of the `selectOneRadio` component—`UISelectOne`. Code Sample\
    \ 1-5 shows how the page and the managed bean source look with the recommended\
    \ approach.\n\n**Code Sample 1-5.** *JSF* `selectOneRadio` *Bound to a Behavioral\
    \ Superclass*\n\n```\n<body>\n  <h:form>\n    <h:selectOneRadio binding=\"#{sample.selectOne}\"\
    \ >\n      <f:selectItem itemLabel=\"Jonas\" itemValue=\"jonas.jacobi\" />\n \
    \     <f:selectItem itemLabel=\"John\" itemValue=\"john.fallows\" />\n      <f:selectItem\
    \ itemLabel=\"Duke\" itemValue=\"java.dude\" />\n    </h:selectOneRadio>\n   \
    \ <h:commandButton value=\"Select Duke\"\n                     actionListener=\"\
    #{sample.onAction}\" />\n  </h:form>\n</body>\n```\n\nCode Sample 1-5 contains\
    \ the same page description except for one minor adjustment to the value-binding\
    \ expression. To be more generic, the method name in the managed bean has been\
    \ changed to `selectOne` instead of `selectOneRadio`, so the expression in the\
    \ page description has to change to reference the more generic backing bean property\
    \ name, as shown in Code Sample 1-6.\n\n**Code Sample 1-6.** *New Backing Bean\
    \ Using the* `UISelectOne` *Class*\n\n```\npackage com.apress.projsf.ch1.application;\n\
    \nimport javax.faces.event.ActionEvent;\nimport javax.faces.component.UISelectOne;\n\
    \npublic class SampleBean\n{\n  public void onAction(\n    ActionEvent event)\n\
    \  {\n    _selectOne.setValue(\"java.dude\");\n  }\n\n  public void setSelectOne(\n\
    \    UISelectOne selectOne)\n  {\n    _selectOne = selectOne;\n  }\n\n  public\
    \ UISelectOne getSelectOne()\n  {\n    return _selectOne;\n  }\n\n  private UISelectOne\
    \ _selectOne;\n}\n```\n\nThe new managed bean is now leveraging the inheritance\
    \ of the components to make it more agnostic to changes in the UI. Instead of\
    \ the convenience class `HtmlSelectOneRadio`, the behavioral superclass `UISelectOne`\
    \ is used. Application developers can now change to another component within the\
    \ same component family without fear of breaking the application logic.\n\n##\
    \ Accessing Renderer-Specific Attributes\n\nIn the previous example, we programmatically\
    \ set the `value` property on the `UISelectOne` component, which is a property\
    \ defined by the behavioral superclass. But how does an application developer\
    \ get access to the renderer-specific attributes if a renderer-specific subclass\
    \ is not provided or (as in Code Sample 1-6) is not used? All attributes and properties\
    \ are accessed via a centralized `Map` that can be accessible from any of the\
    \ `UIComponent` classes and subclasses through a property called `attributes`,\
    \ as shown in Code Sample 1-7.\n\n**Code Sample 1-7.** *Using the Component Attributes\
    \ Map to Update a Render-Specific Attribute*\n\n```\n// Renderer-specific attribute\
    \ example\nMap attrs = selectOne.getAttributes();\nattrs.put(\"style\", \"font-face:bold\"\
    );\n```\n\nCode Sample 1-7 shows how a developer can access attributes without\
    \ using a renderer-specific subclass. Component writers can also introduce an\
    \ interface for renderer-specific attribute methods, implemented by each renderer-specific\
    \ subclass.\n\n## Saving and Restoring State"
