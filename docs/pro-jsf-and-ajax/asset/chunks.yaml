    为 Deck 组件启用 Ajax


    *今天，能让我快乐或不快乐的，不是事件，而是我自己。我可以选择成为哪一种。昨天已逝，明天未至。我只有一天，就是今天，我要在今天过得快乐。*


    ——朱利叶斯·亨利·马克思，人称格劳乔·马克思


    **在**本章和第 7 章中，我们将探讨如何在 JSF Web 应用程序中与组件交互时，实现更流畅、更丰富的用户体验。按照当前的设计，您的组件在传统的 HTML
    Web 应用程序中可以完美运行，并执行传统的有效表单 POST。您可能已经注意到，这种构建 Web 应用程序的传统方式有一个不良副作用：当响应返回客户端浏览器时，表单
    POST 会导致 Web 应用程序执行全页刷新。页面重新加载时产生的额外闪烁不仅令人烦恼，还会影响应用程序的性能。其他副作用可能包括数据丢失、滚动位置丢失和焦点丢失。


    正是在这里，Ajax 挺身而出，它提供了与底层服务器以及 Web 应用程序使用的任何业务服务进行异步通信的功能，而无需强制重新加载页面及其资源。这反过来减少了闪烁，并允许页面保持滚动位置和焦点。通过利用
    JavaScript 中名为 `XMLHttpRequest` 的通信通道，开发人员可以超越在浏览器中调整 DOM 表示，提供一些动态的丰富功能。实现 Ajax
    技术的优秀应用示例包括 Google Gmail、Oracle Collaboration Suite 和 Google Suggest；这些应用证明了 Ajax
    是为当前互联网平台提供丰富功能的可行解决方案。


    随着消费者对 RIA 解决方案可能性的认识不断提高，对更流畅、更丰富交互的需求已不再是可选项。


    **Deck 组件 Ajax 实现的需求**


    首先，您需要确保您的 deck 组件的 Ajax 实现能够在回传时执行完整的 JSF 生命周期（从而利用 JSF 的所有优势）。您还 **223**


