    may be added beside the check box to indicate to the user its function.


    <box>


    A container element that can contain any number of child elements.


    If the box has an orient attribute that is set to horizontal, the child elements
    are laid out from left to right in the order they appear in the box. If orient
    is set to vertical, the child elements are laid out from top to bottom. Child
    elements do not overlap. The default orientation is horizontal.


    <splitter>


    An element that should appear before or after an element inside a container. When
    the splitter is dragged, the sibling elements of the splitter are resized.


