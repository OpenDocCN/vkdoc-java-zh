    \n## Summary\n\nIn this chapter, we discussed how to use Ajax in general terms\
    \ and as part of JSF, and we also talked about what pros and cons it brings to\
    \ the plate. We also covered different architectural approaches implementing Ajax\
    \ support in JSF—PPR and D2R. In addition, we discussed potential pitfalls of\
    \ Ajax, such as file upload support, and how to solve them in the context of JSF.\n\
    \nWe explored how to use two open source projects—the Dojo toolkit and D2 project—to\
    \ Ajax enable your `ProShowOneDeck` component and prove that providing richer\
    \ functionality in well-defined and easy-to-use JSF components is not hard. With\
    \ the use of rich toolkits such as Dojo and D2, the number of resource files is\
    \ increasing, and weblet functionality provides an easy way to package your additional\
    \ resources into the same library as your components.\n\nFrom this chapter, you\
    \ gained an understanding of how to Ajax enable JSF components using available\
    \ resources and now have a deeper understanding of the `contentType` issue between\
    \ JSP and JSF. You also gained knowledge about how you solve the `contentType`\
    \ issue and allow JSF to control the `contentType`, which will give you the opportunity\
    \ to support multiple content types when needed.\n\n---\n\n# Chapter 7\n\n## Ajax\
    \ Enabling the Date Field Component\n\n*When you innovate, you’ve got to be prepared\
    \ for everyone telling you you’re nuts.*\n—Larry Ellison, founder and CEO, Oracle\n\
    \nChapter 6 introduced the concept of using Ajax and `XMLHttpRequest` to asynchronously\
    \ communicate with the Web server without the Web server knowing the difference\
    \ between a regular postback and an Ajax postback. The direct benefit is that\
    \ it leaves the JSF lifecycle untouched, which allows the application developer\
    \ to use Ajax-enabled components with regular JSF Events and Listeners.\n\nThis\
    \ chapter will address the need to fetch data using Ajax. The most common use\
    \ cases for fetching data using Ajax are to populate drop-down lists and add type-ahead\
    \ functionality in text fields. In contrast to using Ajax postback for events,\
    \ fetching data should not affect the surrounding components on the page. And\
    \ if fetching data is not affecting other parts of the DOM tree, then you do not\
    \ need to go through the full lifecycle of JSF just to get the data, right?\n\n\
    Plenty of examples are available on the Web today where fetching data is improving\
    \ the usability of a Web application. The most prominent examples of asynchronous\
    \ data transfer are Google Suggest’s autosuggest feature and Google Gmail’s file\
    \ upload feature.\n\n## Requirements for the Date Component’s Ajax Implementation\n\
    \nThe requirement for the `ProInputDate` component is to provide a visual calendar\
    \ that can be used to select a date. To support this visual calendar, you need\
    \ to provide a pop-up window for the actual calendar and asynchronously fetch\
    \ data representing dates that can be displayed.\n\nThe visual calendar will allow\
    \ the user to select only the available dates (for example, working days). All\
    \ other days (for example, holidays and weekends) should be displayed but not\
    \ be selectable. When a date is selected, it should be copied to the input field\
    \ using the correct date format. When a value is submitted back to the server,\
    \ it should successfully pass validation only if it is an available date (for\
    \ example, a working day).\n\n## The Ajax-Enabled Date Component\n\nIn this chapter,\
    \ you will enhance the `ProInputDate` component created in Chapter 2. Based on\
    \ the new requirements, you have three goals to achieve in this chapter. First,\
    \ you need to provide the `ProInputDate` component with a visual calendar. Second,\
    \ you need to create a `Validator` that can be used by the application developer\
    \ to provide a list of available dates."
