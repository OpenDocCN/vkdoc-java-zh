    伊丽莎白·西摩耐心地回答了我们所有关于书籍相关及非书籍相关的问题。金·温普塞特在全书语法、拼写和一致性方面给予了我们帮助，对此我们永远心怀感激。劳拉·邱耐心地让我们对文本、代码和图表进行了一次又一次的修改，并耐心地指导我们完成了
    Apress 出版社的定稿流程。没有你们，我们可能还在第四章上打转。


    我们还要感谢 Oracle 服务器技术部的同事们，感谢他们这一年来的支持，并鼓励我们做到最好。


