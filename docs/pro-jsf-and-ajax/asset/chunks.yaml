    The XulDocumentRenderer Class


    A XUL document requires two entities to be valid: an XML processing instruction
    on the first line that identifies the file as XML and a window element that defines
    the XUL Web page. The window element is the root element in a XUL document and
    includes all other elements. The XML processing instruction belongs to the ResponseWriter,
    since it is not specific to XUL. The window element, on the other hand, is specific
    to XUL and belongs to a XUL RenderKit and its components. Figure 8-8 shows the
