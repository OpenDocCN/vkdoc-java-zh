    **</xbl:constructor>**


    **<xbl:property name="greeting"**


    **onget="return this._greetingNode.getAttribute(''value'');"**


    **onset="this._greetingNode.setAttribute(''value'', val);" />**


    **</xbl:implementation>**


    </xbl:binding>


    </xbl:bindings>


