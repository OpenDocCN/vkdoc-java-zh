    indicating that the request has succeeded (HTTP status code 200 "OK") and sends
    a full-page response. The browser will then parse the HTML sent on the response
    to the HTML DOM and render the page in the browser window. Any resources required
    by the page will be reverified and possibly downloaded again from the server.
    After the HTML document has been replaced in the browser window, the URL in the
    browser location bar is also modified to reflect the page from the previous page
    form action.


    Alternatively, the server response can contain information indicating that the
    request has failed (for example, HTTP status code 404 "Not Found").


    ## Side Effects of Regular Postback


    The obvious undesired side effect of regular postback is that it will cause the
    page to flicker when the page is reloaded in the browser window, and at worst
    the user will have to wait while the page downloads all the required resources
    to the client browser again. Other less prominent, but still annoying, side effects
    are the loss of scroll position and cursor focus.


    > **Note** Most browsers today have excellent client-side caching functionalities
    that work well to prevent pages from reloading resources from the Web server,
    unless caching is turned off or the application is using HTTPS, in which case
    content may be prevented from being cached on the client.


    As part of a page design, it might be required to have multiple forms on a page.
    When multiple forms are available on a page, only one form will be processed during
    postback, and the data entered in other forms will be discarded.


    One benefit is that bookmarking is possible with regular postbacks. However, the
    user is often fooled by the URL set in the location bar, since it reflects what
    was last requested and not what is returned on the response. When the user selects
    the bookmark, it will return to the previously submitted page. A regular postback
    also allows the user to click the browser back button to return to the previous
    page with the only side effect that a form post warning will occur.


    ## Ajax Web Application Development


    Developing sophisticated Ajax-enabled applications is not something for the everyday
    application developer, and just as the Trojans feared Ajax on the battlefield,
    even the most experienced Web designer dreads to attack Ajax. A major part of
    the Ajax framework is the client-side scripting language JavaScript. As many Web
    designers have experienced, JavaScript is not an industrial-strength language
    and is claimed by many to lack support in professional development tools.


    However, in our opinion, at least two really good JavaScript tools are available—Microsoft''s
    Visual Studio and Mozilla''s Venkman. What is true, though, is that maintaining
    Ajax applications is difficult; the lack of browser consistency in JavaScript
    implementations makes maintaining browser-specific code a challenge.


    ### Mozilla''s Venkman Debugger


    Venkman is the code name for Mozilla''s JavaScript debugger (`http://www.mozilla.org/projects/venkman/`).
    Venkman aims to provide a powerful JavaScript debugging environment for Mozilla-based
    browsers, including the Netscape 7.*x* series of browsers and Mozilla milestone
    builds. It does not include Gecko-only browsers such as K-Meleon and Galeon. The
    debugger is available as an add-on package in XPI format and has been provided
    as part of the Mozilla install distribution since October 3, 2001.


    ![Image 26](index-205_1.png)


    ## Ajax Postback


    Now that you have familiarized yourself with regular postbacks, it is time to
    look at Ajax. This section will give you an overview of how to use Ajax postbacks
    to handle events. You can use Ajax to take control of the form submit action,
    and instead of using the regular form submit action, you use an `XMLHttpRequest`
    object to asynchronously submit your request to the Web server. As a side effect,
    when the user submits a form (for example, by clicking a submit button), no browser
    helps you process the controls within the submitted form. You now need to handle
    any form fields that need to be part of the postback and use them to build a form
    data set—control-name/current-value pairs. You then take the form data set and
    simulate the encoding (url-formencoded) to provide the same syntax as a regular
    postback (see Figure 4-2).


    **Figure 4-2.** *Sequence diagram over an* `XMLHttpRequest` *postback*


    After you have created the `XMLHttpRequest` object, you use the `open()` method
    to set the HTTP method—GET or POST—intended for the request and the URL for the
    connection. After you have set the stage for your `XMLHttpRequest` operation,
    you send the encoded data, using the `XMLHttpRequest` object, as a url-formencoded
    stream back to the server (HTTP POST). For the Web server, the request will appear
    as a traditional HTTP POST, meaning that the Web server cannot tell the difference
    between a regular postback and your Ajax postback. For a JSF solution, this means
    an Ajax request can be picked up the same way as a regular postback request, allowing
    server code (for example, JSF request lifecycle) to be unaffected.


    If the request is successful, the ready state on your `XMLHttpRequest` object
    is set to 4, which indicates that the loading of the response is complete. You
    can then use two properties to access data returned with the response—`responseText`
    and `responseXML`.


    The `responseText` property provides a string representation of the data, which
    is useful in case the requested data comes in the shape of plain text or HTML.
    Depending on the context, the `responseXML` property offers a more extensive representation
    of the data.


    The `responseXML` property will return an XML document object, which is a full-fledged
    document node object (a DOM `nodeType` of 9) that can be examined using the W3C
    DOM node tree methods and properties. In this traditional Ajax approach, the Ajax
    handler is in charge of sending the data, managing the response, and modifying
    the `HTMLDocument` object node tree.


    > **Note** DOM elements can be different types. An element''s type is stored in
    an integer field of `nodeType` (for example, `COMMENT_NODE = 8` and `DOCUMENT_NODE
    = 9`). For more information about the different `nodeTypes`, please visit `http://www.w3.org/`.


    ## Side Effects of Ajax Postback


    As with the regular postback, desired and undesired side effects exist when using
    Ajax for postback. The most prominent and desired side effect is the `XMLHttpRequest`
    object''s strength and ability to set or retrieve parts of a page. This will remove
    flickering when data is reloaded and increase performance of the application,
    since there is no need to reload the entire page and all its resources. The undesired
    side effect of this is that users will typically no longer be able to bookmark
    a page or use the back button to navigate to the previous page/state.


    Another important, but less immediately obvious, implication of using `XMLHttpRequest`
    in your application is that clients such as mobile phones, PDAs, screen readers,
    and IM clients lack support for this technology. Also, Ajax requires additional
    work to make applications accessible; for example, screen readers expect a full-page
    refresh to work properly.'
