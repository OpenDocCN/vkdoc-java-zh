    a New Servlet Response—`DeferredContentTypeResponse`


    ## Designing the Ajax-Enabled Deck Component Using a Blueprint


    The blueprint for creating a custom JSF component, from Chapter 3, contained seven
    steps. Those seven steps cover most of the common use cases for designing components.
    However, as you will see in Table 6-1, sometimes you will need to do more than
    what is covered by those seven steps.


    **Table 6-1.** *Steps in the Blueprint for Creating a New JSF Component*


    | # | Step | Description |

    |---|---|---|

    | 1 | Creating a UI prototype | Create a prototype of the UI and intended behavior
    for your component using the appropriate markup. |

    | 2 | Creating events and listeners | (Optional) Create custom events and listeners
    in the case your specific needs are not covered by the JSF specification. |

    | 3 | Creating a behavioral superclass | (Optional) If the component behavior
    is not to be found, create a new behavioral superclass (for example, `UIShowOne`).
    |

    | 4 | Creating a client-specific `Renderer` | Create the `Renderer` you need that
    will write out the client-side markup for your JSF component. |

    | 5 | Creating a renderer-specific subclass | (Optional) Create a renderer-specific
    subclass. Although this is an optional step, it is good practice to implement
    it. |

    | 6 | Registering a `UIComponent` and `Renderer` | Register your new `UIComponent`
    and `Renderer` in the `faces-config.xml` file. |

    | 7 | Creating a JSP tag handler and TLD | This step is needed in the case you
    are using JSP as your default view handler. An alternative solution is to use
    Facelets (`http://facelets.dev.java.net/`). |

    | 8 | Creating a `RenderKit` and `ResponseWriter` | (Optional) If you plan to
    support alternative markup such as Mozilla XUL, then you need to create a new
    `RenderKit` with an associating `ResponseWriter`. The default `RenderKit` is `HTML_BASIC`
    with the `contentType` set to `text/html`. |

    | 9 | Extending the JSF implementation | (Optional) This step is needed in the
    case you have to provide extensions to the JSF implementation (for example, extending
    JSF factory classes or providing a custom JSF lifecycle implementation). |

    | 10 | Registering a `RenderKit` and JSF extension | (Optional) Register your
    custom `RenderKit` and/or extensions to the JSF implementation. |

    | 11 | Registering resources with Weblets | (Optional) Register your resources
    such as images, JavaScript libraries, and CSS files with Weblets so that they
    can be packaged and loaded directly out of the component library JAR file. |


    This chapter adds four more steps—creating a `RenderKit`, extending the JSF implementation,
    registering a `RenderKit` and JSF extension, and registering resources with Weblets—to
    the blueprint. Fortunately, JSF is sufficiently extensible to find a way to achieve
    your goal, even if not part of the standard implementation.


    Before you get to steps 8, 9, 10, and 11, you need to go through the other steps
    to ensure you have not missed anything; again, according to the first step, you
    need to define the new component implementing it in the intended markup that will
    eventually be sent to the client, so let’s look at what you want to achieve.


    ## Step 1: Creating a UI Prototype


    True to the blueprint, you first need to create a prototype of the intended markup.
    Remember that creating a prototype will help you find out what elements your `Renderer`
    has to generate, what renderer-specific attributes the application developer will
    need, and what resources (for example, JavaScript, images, and so on) are needed.


    Figure 6-2 shows the end result of your deck component implemented in HTML.


    **Figure 6-2.** *Decks implemented in HTML*


    Code Sample 6-1 shows the HTML needed to create the page shown in Figure 6-2 with
    your new DHTML/Ajax deck component.'
