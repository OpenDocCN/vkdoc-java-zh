    **Code Sample 9-15.** *The* `encodeEnd()` *Method*


    ```

    public void encodeEnd(


    FacesContext context,


    UIComponent component) throws IOException


    {


    ResponseWriter out = context.getResponseWriter();


    out.endElement("body");


    out.endElement("html");


    }

    ```


    The `encodeHead()` method, as shown in Code Sample 9-16, is responsible for writing
    out the `<head>` element. The `<head>` element contains information about the
    document, and in this case it is the title and style sheet.


    **Code Sample 9-16.** *The* `encodeHead()` *Method*


    ```

    protected void encodeHead(


    FacesContext context,


    ResponseWriter out,


    Map attrs) throws IOException


    {


    String title = getTitle(attrs);


    String stylesheetURI = getStylesheetURI(context, attrs); if (title != null)


    {


    out.startElement("title", null);


    out.writeText(title, TITLE_ATTR);


    out.endElement("title");


    }


    if (stylesheetURI != null)


    {


    out.startElement("link", null);


    out.writeAttribute("rel", "stylesheet", null);


    out.writeAttribute("href", stylesheetURI, STYLESHEET_URI_ATTR);


    out.endElement("link");


    }


    }

    ```


    The `getTitle()` and `getStylesheetURI()` methods, as shown in Code Sample 9-17,
    return the values of the `title` and `stylesheetURI` attributes.


    **Code Sample 9-17.** *The Getters for the* `UIDocument` *Attributes*


    ```

    protected String getTitle(


    Map attrs)


    {


    return (String)attrs.get(TITLE_ATTR);


    }


    protected String getStyleClass(


    Map attrs)


    {


    return (String)attrs.get(STYLE_CLASS_ATTR);


    }


    protected String getStylesheetURI(


    FacesContext context,


    Map attrs)


    {


    String stylesheetURI = (String)attrs.get(STYLESHEET_URI_ATTR); if (stylesheetURI
    != null)


    {


    Application application = context.getApplication();


    ViewHandler handler = application.getViewHandler();


    stylesheetURI = handler.getResourceURL(context, stylesheetURI);


    }


    return stylesheetURI;


    }

    ```


