    ### DOM Mutation Support in Firefox


    If you are a user of Mozilla Firefox and are currently using a version older than
    Mozilla Firefox 1.5, you might experience some flickering when using the Ajax-enabled
    `ShowOneDeck` component. This is a bug in the Mozilla Firefox browser implementation.
    For more information, please see `https://bugzilla.mozilla.org/show_bug.cgi?id=238493`.
    You can download a more recent version of Mozilla Firefox from `http://www.mozilla.org/projects/firefox/`.


    ### Step 4: Creating a Client-Specific Renderer


    In your solution for the `UIShowOne` component, you have done most of the work
    already in Chapter 3, so you will need only to extend the `HtmlShowOneDeckRenderer`,
    and since this chapter does not introduce any new behavior, you can skip steps
    2 and 3 in your blueprint and go straight to step 4—creating a client-specific
    renderer.


    ### Ajax and JSF Architectures


    Several architectural possibilities exist to provide Ajax support in a client-server
    environment (for example, in JSF). In all cases, one part of Ajax will impact
    the architectural decision, and that is how the Ajax solution manages updates
    to the DOM when processing the Ajax response.


    Somewhere you have to apply changes between the current HTML document and what
    has been returned from the server based on user interaction, so that you can apply
    changes to the current HTML document without reloading the page. The following
    are two possible architectural solutions:


    - **Partial-Page Rendering (PPR)**: This is the first successful implementation
    of Ajax in JSF and is currently used by a component library called ADF Faces.
    This type of architecture relies on a regular form submit. The response is in
    fragments that contain information of what is needed for the change. The PPR handler
    will then figure out where to slot in these changes. This approach puts a burden
    on the application developer to figure out what changed (for example, the application
    developer has to set partial targets to define what components are involved in
    this partial update). In this architecture, the unit of update is a `UIComponent`
    subtree, so the markup for each `UIComponent` subtree is replaced for each partial
    target. PPR is also relying on `iframes`, not `XMLHttpRequest`, to provide asynchronous
    communication, which has the benefit of supporting older versions of browsers.


    - **Delta DOM Rendering (D2R)**: This approach puts no extra burden on the application
    developer, and the unit of update is delta data (for example, attributes on the
    element nodes). D2R simulates a regular form POST and sends a form data set to
    the server using the `XMLHttpRequest` object. The server will not notice any difference
    between this POST and a regular POST and will deliver with a full-page response.
    An Ajax handler will handle the response, compare it with the current HTML document,
    and then merge in any changes to the HTML document. You can implement D2R in two
    ways—on the client or on the server side. In the client-side implementation, the
    Ajax handler will detect and apply DOM deltas on the client. In the server-side
    implementation, before the `ResponseWriter` writes out the markup to the client,
    the markup will be cached on the server. On subsequent postback, before the `ResponseWriter`
    writes out the new markup to the client, the server-side implementation will compare
    the cached version with the new page response and send the differences as delta
    data over to the client where the Ajax handler will merge it with the HTML document.


