    **代码示例 4-11.** *包含一个绑定的 XBL 文件——* projsf-bindings.xml


    <?xml version="1.0"?>


    **<xbl:bindings**


    >


    **<xbl:binding id="welcome" >**


    <xbl:content>


    <xul:text value="欢迎, " />


    <xul:text value="访客" xbl:inherits="value=name" />


    <xul:text value="!" />


    </xbl:content>


    </xbl:binding>


    </xbl:bindings>


    一个`<bindings>`元素可以包含无限数量的`<binding>`元素。`<bindings>`元素中的命名空间定义了将使用的语法，在代码示例 4-11
    中，它是 XBL——xmlns=http://www.mozilla.org/xbl。该文件还包含一些 XUL 元素：`<xul:text/>`。这对于通过封装多个组件（这些组件之后可以作为一个组件引用）来简化开发非常有用。


    其中一个`<xul:text>`元素上的`xbl:inherits`属性允许`<xul:text>`元素通过定义一个变量名（在此例中，将其赋值给`value`属性）来从绑定元素继承值。如果使用此组件的页面中的绑定元素未定义任何值，则文本字段将默认为“访客”。


    `<xbl:binding>`元素上的`id`属性（在代码示例 4-11 中为 welcome）将标识该绑定。


    使用 XBL 绑定


    要将 XBL 组件或行为附加到 XUL 应用程序，XUL 使用 CSS。使用 CSS，开发者可以通过将`-moz-binding`属性设置为指向 XBL 文档的
    URI 来为元素分配绑定。


    ■**注意** Netscape 已向 W3C 提交了一份提案，旨在“为 XML 和 HTML 定义行为的模块化方式”（http://www.w3.org/TR/NOTE-AS）中定义如何将自定义行为附加到
    HTML 元素。


    代码示例 4-12 展示了一个 CSS 文件，该文件将一个绑定附加到`<pro:welcome>`元素。


