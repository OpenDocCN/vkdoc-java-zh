    3-3, the deck has three labels—Java, Open Source, and .NET. Each label represents
    an expandable region, and in Figure 3-3 the Java region is currently expanded
    and shows its content. These labels are containers, since they can hold more than
    just text (for example, a combination of images and text). Within the expanded
    Java region is a mix of plain text and links. Styles control the actual look and
    feel. Code Sample 3-1 shows the HTML needed to create the deck component.


