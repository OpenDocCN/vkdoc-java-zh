    \ takes two arguments—the `FacesContext` for the current request and the `UIComponent`\
    \ to render.\n\n**Code Sample 3-27.** *The* `_encodeAll()` *Method*\n\n```\n/**\n\
    \ * Encodes a component and all of its children.\n *\n * @param context the Faces\
    \ context\n * @param component the Faces component\n *\n * @throws IOException\
    \ if an I/O error occurs during rendering\n */\nprivate void _encodeAll(\n   \
