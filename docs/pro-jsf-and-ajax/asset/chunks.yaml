    在 `<public:defaults>` 声明上设置 viewlink 属性（不展开）后，初始页面解析的浏览器性能应更快，但由于间接引用，与组件的一般交互可能会稍慢。如果交互性能可接受，我们建议使用
    viewlink 属性，因为它可以实现封装并带来相关好处。


    在代码示例 4-25 中，`viewLinkContent` 已被添加到 defaults 声明中，因此 welcome 组件的内容将不会展开到主 HTML
    页面中。


    **代码示例 4-25.** *设置了* viewlink *的 HTC 文件*


    <html>


    <head>


    <public:component tagName="welcome" >


    **<public:defaults viewlinkcontent="true" />**


    <public:property name="name" value="Guest" />


    <public:attach event="oncontentready" handler="_constuctor" />


    </public:component>


    <script type="text/javascript" >


    function _constuctor()


    {


    nameSpan.innerText = element.name;


    }


    </script>


    </head>


    <body>


    Welcome, <span id="nameSpan"


    onclick="if (element.name != ''Guest'')


    {


    alert(''Nice to see you again, '' + element.name);


    }" ></span>!


    </body>


    </html>


    ■**注意** 部署 Microsoft DHTML 应用程序除了依赖 Microsoft 的浏览器 Internet Explorer 5.0 及以上版本外，没有特殊要求。


    **HTC 总结**


    与 XUL 一样，HTC 拥有定义良好的组件模型，允许应用程序开发者将行为封装到可重用的实体中。通过前面关于 Microsoft DHTML 和 HTC 的章节，你现在已经了解了
    HTC 的结构、元素和事件处理。你知道了元素行为和附加行为之间的区别。在本书的后续章节（参见第 9 章）中，你将利用这些知识为支持 HTC 的 JSF 组件构建一组渲染器。


