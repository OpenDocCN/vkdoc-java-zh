- fmt: "# State Management in JSF\n\nOne crucial part of building Web applications\
    \ is state saving. Take the traditional HTML-based shopping cart as an example.\
    \ Here the application developer has to store the user product selections and\
    \ persist this information until the user finishes shopping. In most cases, a\
    \ shopping cart application is built up with multiple pages so the state of each\
    \ page has to be saved until the buyer has finished shopping. The state is stored\
    \ in hidden form fields, stored in the session, or passed on as a request to the\
    \ next page. Those who have dealt with this know this is not a trivial task to\
    \ accomplish.\n\nState management is one of the primary benefits of using JSF\
    \ to build applications.\n\nJSF provides automatic UI state handling through a\
    \ class called `StateManager`, which saves and restores state for a particular\
    \ view (hierarchy of `UIComponent`s) between requests on the server. Each `UIComponent`\
    \ saves and restores its own internal state when requested by the `StateManager`;\
    \ the `StateManager` itself saves and restores the state associated with the structure\
    \ of the `UIComponent` hierarchy. If a `UIComponent` is marked as being transient,\
    \ then it is omitted from the structure by the `StateManager`, causing it to be\
    \ removed from the `UIComponent` tree at the end of the request.\n\nTwo alternatives\
    \ exist for storing the state of a view—on the client side and server side.\n\n\
    By default state is saved on the server. The server-side implementation is supported\
    \ by the JSP and Servlet specifications, but JSF conceals all the details of how\
    \ this works. A class called `ResponseStateManager`, which is created and managed\
    \ by a `RenderKit`, manages the client-side state saving. Client-side state saving\
    \ depends not only on the JSF implementation but also heavily on the markup language\
    \ rendered to the client and on how state can be managed by that client. With\
    \ HTML as markup, the state is typically stored in a hidden form field.\n\n> **Note**\
    \ Although JSF 1.1 kept the name of the view state in a hidden form field as a\
    \ private implementation detail, JSF 1.2 now standardizes the name as `javax.faces.ViewState`\
    \ so that alternative postback mechanisms, such as Ajax, can more easily be integrated\
    \ with the JSF lifecycle.\n\nOne of the drawbacks of saving state in the user\
    \ session on the server is memory consumption. If scalability is an issue for\
    \ application developers, the client-side implementation will prevent memory consumption\
    \ from shooting through the roof and will have an advantage in clustered environments.\
    \ But, since state will now have to be sent back and forth between the client\
    \ and the server, response time might increase. You can configure the state-saving\
    \ method, as shown in Code Sample 1-8, in the application deployment descriptor\
    \ file—`WEB-INF/web.xml`—by setting the parameter `STATE_SAVING_METHOD` to `client`\
    \ or `server`.\n\n**Code Sample 1-8.** *Setting the Method of Saving State to\
    \ the Server Side in the Deployment Descriptor*\n\n```\n<context param>\n  <param-name>javax.faces.STATE_SAVING_METHOD</param-name>\n\
    \  <param-value>server</param-value>\n</context param>\n```\n\n## Component Family\
    \ and Component Type\n\nThe component family is a string that represents the behavior\
    \ of the component (for example, an input component or command component). The\
    \ component family is declared in the JSF configuration file—`faces-config.xml`—and\
    \ used to select a `Renderer` for a particular component. Code Sample 1-9 shows\
    \ how you associate a `Renderer` with a particular component family.\n\n**Code\
    \ Sample 1-9.** *Associating a Renderer to a Particular Component Family*\n\n\
    ```\n<render-kit>\n  <renderer>\n    <component-family>\n      javax.faces.Input\n\
    \    </component-family>\n    <renderer-type>\n      com.apress.projsf.Date\n\
    \    </renderer-type>\n    <renderer-class>\n      com.apress.projsf.ch2.render.html.basic.HtmlInputDateRenderer\n\
    \    </renderer-class>\n  </renderer>\n</render-kit>\n```\n\n> **Note** The prefix\
    \ `javax.faces` is reserved for use by component families defined in the JSF specification.\
    \ All samples in this book use the `com.apress.projsf` prefix for custom component\
    \ families.\n\nThe component type is a string that is used as an identifier for\
    \ the `UIComponent` subclass. You can find information about the relationship\
    \ between the component type and `UIComponent` subclass in the JSF configuration\
    \ file, as shown in Code Sample 1-10.\n\n**Code Sample 1-10.** *Mapping of Component\
    \ Type and `UIComponent` Subclass*\n\n```\n<component>\n  <component-type>\n \
    \   com.apress.projsf.ProInputDate\n  </component-type>\n  <component-class>\n\
    \    com.apress.projsf.ch2.component.pro.ProInputDate\n  </component-class>\n\
    </component>\n```\n\nIn Code Sample 1-10, a `UIComponent` subclass—`com.apress.projsf.component.pro.ProInputDate`—has\
    \ been assigned `com.projsf.ProInputDate` as the component type. By convention,\
    \ the component type is also declared in the `UIComponent` subclass as a constant—`COMPONENT_TYPE`.\
    \ This simplifies life for developers so they don't need to remember the component\
    \ type for every component.\n\n> **Note** The prefix `javax.faces` is reserved\
    \ for use by component types defined in the JSF specification. All samples in\
    \ this book use the `com.apress.projsf` prefix for custom component types.\n\n\
    ## Converters, Validators, Events, and Listeners\n\nApart from providing `UIComponent`s,\
    \ a JSF implementation also provides helper classes for these `UIComponent`s.\
    \ These helper classes are divided into converters, validators, and an event and\
    \ listener model. The converters provide a bidirectional type conversion between\
    \ the submitted value of a component and the corresponding strongly typed object\
    \ in the model tier. The validators perform validation on the strongly typed object;\
    \ for example, they can ensure that a date is not in the past. Code Sample 1-11\
    \ shows an `inputText` component with attached date converter.\n\n**Code Sample\
    \ 1-11.** `inputText` *Component with Attached Date Converter*\n\n```\n<h:inputText\
    \ value=\"#{sample.date}\" >\n  <f:convertDateTime pattern=\"yyyy-MMM-dd\" />\n\
    </h:inputText>\n```\n\nJSF also provides a way to attach listeners to components\
    \ and broadcast events to those listeners, much the same way it works in AWT and\
    \ Swing. For example, a `commandButton` is a source of `ActionEvent`s. When a\
    \ `commandButton` is clicked, a postback occurs, and a new `ActionEvent` is stored\
    \ in an event queue. Any event listeners registered with the `commandButton` are\
    \ notified of this event. Code Sample 1-12 shows a `commandButton` with an attached\
    \ Listener.\n\n> **Note** The JSF specification for registering listeners and\
    \ broadcasting events is based on the design patterns of the JavaBean specification,\
    \ version 1.0.1.\n\n**Code Sample 1-12.** `commandButton` *with Attached Listener*\n\
    \n```\n<h:commandButton value=\"Login\"\n  action=\"success\"\n  actionListener=\"\
    #{sample.onLogin}\" />\n```\n\nIn Code Sample 1-12, a `commandButton` component\
    \ has two properties—`action` and `actionListener`. Both attributes take method-binding\
    \ expressions, and the differences are that the `action` attribute requires a\
    \ method that returns a `String` object and the `actionListener` attribute requires\
    \ a method that accepts an `ActionEvent` that has a `void` return type. The `action`\
    \ attribute's string value is used for navigation purposes.\n\nWhen the queued\
    \ `ActionEvent` is processed, these method-binding expressions will be used to\
    \ execute the backing bean methods referenced by `action` and `actionListener`.\n\
    \n## Facets\n\nA JSF view is comprised of a component hierarchy, providing access\
    \ to each parent component's children by index. Sometimes it is also necessary\
    \ to provide an alternative way of adding subordinate components that are not\
    \ part of this ordered list."
