    **调用应用程序阶段**


    在调用应用程序阶段，无需遍历组件层次结构，因为此阶段仅处理来自先前阶段排队的事件，并根据结果，要么继续到最后一个阶段——渲染响应，要么重定向到另一个页面。图
    1-21 展示了为此阶段排队的事件的广播以及操作方法绑定的处理。


