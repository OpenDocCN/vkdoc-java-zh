    \n**优惠有效期至 2006 年 8 月 20 日。**\n\n5807index.qxd 1/22/06 4:50 PM 第 440 页\n\nforums.apress.com\n\
    \n由专业人士为专业人士打造™\n\n加入 APRESS 论坛，成为我们社区的一员。您将找到涵盖 IT 专业人士、程序员和爱好者（如您一样）感兴趣话题的讨论。如果您在我们的某个论坛上发布问题，可以期待业内最优秀的人才——尤其是\
    \ Apress 的作者，他们均以 *专家之声*™ 写作——会为您提供帮助。何不努力成为我们最有价值的参与者（MVP）并赢取酷炫奖品？以下是您将发现的部分内容示例：**数据库**\n\
    \n**编程/商业**\n\n数据驱动一切。\n\n不幸的是，确实如此。\n\n分享信息、交流想法，并讨论任何数据库管理问题。讨论 Apress 系列中涵盖软件编程或管理问题的书籍。\n\
    \n方法论、最佳实践，以及程序员如何与“管理层”互动。\n\n**互联网技术与网络**\n\n**Web 开发/设计**\n\n尝试没有管道的生活（以及最终的\
    \ IPv6）。\n\n丑陋已不再适用，CGI 也显得荒谬。\n\n讨论网络相关主题，包括协议、设计、管理、无线、有线、存储、备份、认证、趋势和新技术。为您的网站提供帮助。为您的项目寻找设计方案，并获取构建交互式网站的想法。\n\
    \n**JAVA**\n\n**安全**\n\n我们从古老的 Oak 树时代已走了很长的路。\n\n外面坏人很多——好人需要帮助。\n\n畅谈您选择的任何\
    \ Java 版本：J2SE、J2EE、J2ME、Jakarta 等。在此讨论计算机和网络安全问题。只是别让其他人知道答案！\n\n**MAC OS X**\n\
    \n**技术实战**\n\n关于 OS X 的禅意。\n\n酷炫的事物。有趣的事物。\n\nOS X 既是 Mac 应用的现在，也是未来。提出建议、分享想法，或炫耀您的新硬件。这是下班后的时间。这是玩乐的时间。无论您是喜欢\
