    ## 事件处理与XBL绑定


    在XBL中，开发者可以直接将事件处理器添加到作为`content`元素子元素的XUL元素中（例如，`<xul:button label="Press me!"
    oncommand="alert(''welcome'')" />`）。有时开发者需要为`content`元素中的所有子元素添加事件处理器。


    在XBL中，可以通过添加`<handler>`元素来实现这一点。`<handler>`元素是`<handlers>`元素的子元素，它可以包含一个或多个事件处理器。每个处理器定义了在其定义的绑定范围内针对特定事件所采取的操作。如果某个事件未被捕获，它将直接传递给内部元素。


