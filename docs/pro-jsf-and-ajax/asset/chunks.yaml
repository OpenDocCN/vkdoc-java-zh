    Although the installable approach is convenient for the JSF component writer,
    it increases the installation burden on the application developer, who must remember
    to extract the installables archive each time the component library is upgraded
    to a new version. Therefore, you need a way to package the additional resources
    into the same JAR file that contains the Renderer classes, thus simplifying deployment
    for application developers using your component library.


    **Using Existing Solutions**


    Some of the more advanced JSF component libraries available today, such as Apache
    MyFaces and Oracle ADF Faces, provide a custom servlet or filter solution for
    serving the resources needed by their specific renderers. However, each component
    library tends to solve the same problem in a slightly different way. The lack
    of any official standard solution therefore leads to an additional configuration
    and installation burden for each component library.


