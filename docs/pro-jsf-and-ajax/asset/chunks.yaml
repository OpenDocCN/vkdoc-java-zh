- fmt: '# 组件标识符


    此组件的组件标识符。该值必须在作为命名容器的最近父组件内唯一。


    ## `rendered` 属性


    - **名称**：`rendered`

    - **是否必需**：否

    - **运行时表达式值**：否

    - **描述**：指示此组件是否应在渲染响应阶段渲染，或在后续任何表单提交时处理的标志。


    ## `binding` 属性


    - **名称**：`binding`

    - **是否必需**：否

    - **运行时表达式值**：否

    - **描述**：将此组件链接到支持 bean 中属性的值绑定表达式。


    ## `showListener` 标签


    - **名称**：`showListener`

    - **标签类**：`com.apress.projsf.ch3.taglib.ShowListenerTag`

    - **主体内容**：`JSP`

    - **描述**：`ShowListener` 标签处理器。


    ### `type` 属性


    - **名称**：`type`

    - **是否必需**：否

    - **运行时表达式值**：否

    - **描述**：显示监听器的完全限定类名。


    回顾第 2 章，TLD 中的每个自定义操作都需要一个 `<tag>` 元素。自定义操作元素的名称在嵌套的 `<name>` 元素中定义（例如，`<name>showListener</name>`），标签处理器类在
    `<tag-class>` 元素中定义。如果自定义操作有属性，则必须使用 `<attribute>` 元素定义。还要记住，运行时表达式值（`<rtexprvalue>`）必须设置为
    `false`，并且属性类必须保持未指定，以避免与 Java 或 JSP EL 表达式发生任何冲突，并允许标签处理器将表达式转换为 `ValueBinding`
    或 `MethodBinding`。


    这是 deck 组件 HTML 版本的最终定稿。我们意识到此 deck 组件的复杂性，但我们认为有必要展示从零开始设计新可重用组件的所有方面，从新事件 `ShowEvent`
    及其对应的监听器接口 `ShowListener` 开始，接着是两个新的行为超类 `UIShowOne` 和 `UIShowItem`。我们还引入了 facet
    的概念，并利用 JavaScript 让您了解 JSF 的强大功能和灵活性。


    您可以重用为此组件所做的大部分工作（例如，`UIShowOne`、`UIShowItem`、`ShowListener` 和 `ShowEvent`）。接下来，我们将展示如何使用新的
    `Renderer` 扩展这些行为超类，以便支持更丰富的功能。


    ## 总结


    本章扩展了第 2 章中给出的蓝图。该蓝图现在包含七个步骤，涵盖从分析 UI 原型到编写 JSP TLD 的所有内容。请记住，在大多数情况下，您只需要使用这七个步骤中的五个，因为最常见的场景是扩展现有的行为
    `UIComponent`，而不是创建新的组件。


    作为蓝图的一部分，您还创建了一个特定于客户端的 `Renderer`（`HtmlShowOneDeckRenderer`），其中包含组件所需的所有属性以及一个特定于渲染器的子类（`ProShowOneDeck`）。最后，您实现了对所选页面描述（JSP）的支持。所有这些都遵循了第
    2 章中引入的相同模式；正如您可能注意到的，如果有蓝图可循，创建组件并不困难，尽管存在一定程度的重复。


    通过本章，您还了解了 JSF 事件模型，以及如何在您自己的 JSF 标签处理器中实现自定义事件和监听器的支持。


    ---


