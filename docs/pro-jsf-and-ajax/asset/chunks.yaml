    # Part 1


    ## Developing Smarter with JavaServer™ Faces


    **JavaServer Faces (JSF)** is a user interface (UI) component framework for Java
    2 Enterprise Edition (J2EE) Web applications that, once adopted, allows organizations
    to migrate from old technologies, such as character-based platforms for virtual
    terminals (VTs), to more up-to-date standard-based platforms and technologies,
    such as JSF and Java. Over the past 15 years, the software industry has seen many
    technologies and platforms rise and fall. Usually, the use of a particular technology
    declines for several reasons, including fashion and competition. Another common
    reason for the fall of certain technologies is that if they are designed and maintained
    by one company, then the consumers of these technologies are forced to rely on
    support provided solely by the creators. Whenever a creator decides to deprecate
    a technology in favor of a more advanced solution, the consumer is left with an
    outdated, unsupported platform. JSF allows organizations and consumers to leverage
    the latest technology as it emerges, with minimal impact on existing JSF applications.
    JSF also brings extreme reuse of functionality and visual appearance to the software
    industry. Part 1 of this book will teach you what JSF is all about, describe how
    to leverage JSF by developing your own components, and open your eyes to a new
    horizon.


