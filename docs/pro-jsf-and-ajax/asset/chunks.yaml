    **Introducing Mozilla XUL**


    What is Mozilla XUL? Is it a crossbreed between a dinosaur and an evil Ghostbuster
    spirit?


    No, Mozilla XUL is an open source project that is known as the development platform
    for the Mozilla Firefox browser and Mozilla Thunderbird email client. In the following
    sections of this chapter, you will get a high-level overview of Mozilla XUL and
    its subcomponents. In 1998 the Mozilla organization (Mozilla.org) created an open
    source project called XUL, which is an extensible UI language based on XML and,
    as such, can leverage existing standards including XSLT, XPath, the DOM, and even
    Web Services (SOAP).


    Using XUL, developers can build rich user interfaces that can be deployed as Web
    applications, as desktop applications locally, or as desktop applications on other
    Internet-enabled devices. XUL leverages the support of the Mozilla Gecko Runtime
    Environment (GRE) in order to fully provide the consumer with a rich user interface.
    The Firefox browser and the Thunderbird email client, as well as numerous plug-ins,
    are available for these clients and are two good examples of applications based
    on XUL and the Mozilla GRE.


    One of the great features of XUL is its extensibility. Using XBL, XUL provides
    a declarative way to create new and extend existing XUL components. XBL can also
    bridge the gap between XUL and HTML, since it is not possible to embed XUL components
    directly into an HTML


