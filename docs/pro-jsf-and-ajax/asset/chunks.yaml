    \ class\n   */\n  public String getStyleClass()\n  {\n    if (_styleClass != null)\n\
    \      return _styleClass;\n\n    ValueBinding binding = getValueBinding(\"styleClass\"\
    );\n    if (binding != null)\n    {\n      FacesContext context = FacesContext.getCurrentInstance();\n\
    \      return (String)binding.getValue(context);\n    }\n\n    return null;\n\
