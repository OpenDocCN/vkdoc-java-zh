  trans: "\nAjax 图书筛选器的实现包含三个 JavaScript 函数——\n`populateBookList()`、`createHttpRequest()`\
    \ 和 `transferListItems()`——以及一个包含图书信息的数据源。当光标离开图书类别字段时，会立即调用 `getBookList()` 函数（参见图\
    \ 4-5）。\n\n**图 4-5.** *图书筛选器的时序图* XMLHttpRequest `populateBookList()` 函数将调用 `createHttpRequest()`\
    \ 函数，该函数会创建一个新的 `XMLHttpRequest` 对象实例。然后，你使用这个 `XMLHttpRequest` 对象来为你的请求做好准备，并将编码后的数据以\
    \ URL 表单编码流的形式发送回服务器（HTTP GET）。如果请求成功，`XMLHttpRequest` 对象会调用你的回调函数。该函数将从 `XMLHttpRequest`\
    \ 对象获取响应文本，并使用传递的内容（例如，图书列表）来修改 HTML 文档，并用数据填充 `<select>` 元素。代码示例 4-4 展示了这个图书筛选器背后的实际代码。\n\
    \n**代码示例 4-4.** *`populateBookList()` 函数*\n\n```javascript\n/**\n * 用特定图书类别中的图书列表填充\
    \ select 元素。\n *\n * @param serviceURL 用于检索 JSON 数据文件的服务 URL\n * @param selectId\
    \ 要填充的目标 select 元素的 id\n * @param category 用于填充的图书类别\n */\nfunction populateBookList(\n\
    \    serviceURL,\n    selectId,\n    category)\n{\n    var xmlhttp = createHttpRequest();\n\
    \n    // 你可以使用任何类型的数据源，但在此示例中，\n    // 我们将使用一个包含数据的简单 JSON 文件。\n    var requestURL\
    \ = serviceURL + '/booklist-' + category.toLowerCase() + '.json';\n    xmlhttp.open(\"\
    GET\", requestURL);\n    xmlhttp.onreadystatechange = function()\n    {\n    \
    \    if (xmlhttp.readyState == 4)\n        {\n            if (xmlhttp.status ==\
    \ 200)\n            {\n                transferListItems(selectId, eval(xmlhttp.responseText));\n\
    \            };\n        };\n    };\n    xmlhttp.send(null);\n};\n```\n\n使用这段代码，你首先通过调用名为\
    \ `createHttpRequest()` 的函数来创建一个新的 `XMLHttpRequest` 对象实例。然后，你通过在 `XMLHttpRequest`\
    \ 对象实例上调用 `open(\"GET\", requestURL)` 方法并传递两个参数来发起请求。字符串 `GET` 指明了该请求的 HTTP 方法，而\
    \ `requestURL` 变量代表你的数据源的 URL，在本例中是一个简单的文本文件。如果请求成功，`XMLHttpRequest` 对象的 `readyState`\
    \ 会被设置为 4，`status` 被设置为 200。你使用 `onreadystatechange` 事件处理器，在 `readyState` 被设置为\
    \ 4 时调用 `transferListItems()` 函数，并将 `XMLHttpRequest` 对象的 `responseText` 属性传递给它。`transferListItems()`\
    \ 函数将获取返回的字符串，并用数据填充 `<select>` 元素。\n\n创建 `XMLHttpRequest` 对象的实例很简单，尽管如代码示例 4-5\
    \ 所示，你需要注意一些事项。\n\n**代码示例 4-5.** *创建 `XMLHttpRequest` 对象的 `createHttpRequest()`\
    \ 函数*\n\n```javascript\n/**\n * 创建一个新的 XMLHttpRequest 对象。\n */\nfunction createHttpRequest()\n\
    {\n    var xmlhttp = null;\n    if (window.ActiveXObject)\n    {\n        xmlhttp\
    \ = new ActiveXObject(\"Microsoft.XMLHTTP\");\n    }\n    else if (window.XMLHttpRequest)\n\
    \    {\n        xmlhttp = new XMLHttpRequest();\n    }\n    return xmlhttp;\n\
    };\n```\n\n代码示例 4-5 创建了 `XMLHttpRequest` 对象，并且与许多支持 JavaScript 的浏览器一样，不同的浏览器对\
    \ `XMLHttpRequest` 对象的支持略有不同。这意味着你需要在你的 `createHttpRequest()` 函数中实现对不同浏览器的支持。对于\
    \ Microsoft Internet Explorer，你必须使用 `new ActiveXObject(\"Microsoft.XMLHTTP\")`\
    \ 来创建 `XMLHttpRequest` 对象。对于任何支持 Mozilla GRE 的浏览器，你可以使用原生调用 `new XMLHttpRequest()`\
    \ 来创建 `XMLHttpRequest` 对象的实例。\n"
- fmt: "`transferListItems()`函数，如代码示例4-6所示，返回用户请求的数据，并将数据填充到`<select>`元素中。\n\n**代码示例4-6.**\
    \ `transferListItems()`函数——填充`<select>`元素\n\n```\n/**\n * Transfers the list items\
    \ from the JSON array\n * to options in the select element.\n *\n * @param selectId\
    \ the id of the target select element to populate\n * @param listArray the retrieved\
    \ list of books\n */\nfunction transferListItems (\n    selectId,\n    listArray)\n\
    {\n    var select = document.getElementById(selectId);\n    // reset the select\
    \ options\n    select.length = 0;\n    select.options[0] = new Option('[select]');\n\
    \    // transfer the book list items\n    for(var i=0; i < listArray.length; i++)\n\
    \    {\n        // create the new Option\n        var option = new Option(listArray[i]);\n\
    \        // add the Option onto the end of the select options list\n        select.options[select.length]\
    \ = option;\n    };\n};\n```\n\n`transferListItems()`函数接受两个参数——`selectId`和`listArray`。`listArray`表示请求返回的数据，`selectId`表示将要被填充数据的`<select>`元素。代码示例4-7仅展示了简单的数据源（采用JavaScript对象表示法JSON语法），以便你可以复制该示例应用程序。\n\
    \n**代码示例4-7.** Ajax标题的数据源——`ajax.json`\n\n```\n['Pro JSF and Ajax: Building Rich\
    \ Internet Components',\n'Foundations of Ajax',\n'Ajax Patterns and Best Practices']\n\
    ```\n\n该文件包含一个JavaScript表达式，定义了一个与Ajax相关的新书籍数组。\n\n> **注意** JSON是一种轻量级的数据交换格式。它基于JavaScript编程语言的一个子集（标准ECMA-262第三版）。JSON是一种完全与语言无关的文本格式，但采用了C语言家族（包括C、C++、C#、Java、JavaScript、Perl、Python等）程序员熟悉的约定。\n\
    \n**Ajax总结**\n\n现在你应该理解什么是Ajax，并熟悉`XMLHttpRequest`对象（Ajax技术的核心部分）以及常规`XMLHttpRequest`的生命周期。你还应具备足够的知识来创建简单的Ajax解决方案。在接下来的章节中，你将更深入地学习Ajax。\n\
    \n**介绍Mozilla XUL**\n\n什么是Mozilla XUL？它是恐龙与邪恶的捉鬼敢死队精神的杂交产物吗？\n\n不，Mozilla XUL是一个开源项目，被称为Mozilla\
    \ Firefox浏览器和Mozilla Thunderbird电子邮件客户端的开发平台。在本章的以下部分，你将获得关于Mozilla XUL及其子组件的高层概述。1998年，Mozilla组织（`Mozilla.org`）创建了一个名为XUL的开源项目，它是一种基于XML的可扩展UI语言，因此可以利用现有标准，包括XSLT、XPath、DOM甚至Web服务（SOAP）。\n\
