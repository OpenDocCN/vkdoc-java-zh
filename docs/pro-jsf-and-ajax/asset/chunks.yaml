- fmt: '# JSF 工厂类与生命周期


    ## 工厂类概述


    `LifecycleFactory`：`LifecycleFactory`负责根据生命周期标识符返回`Lifecycle`实例。默认的`Lifecycle`实例负责调用处理逻辑，以实现JSF请求处理生命周期中每个阶段所需的功能。


    `RenderKitFactory`：`RenderKitFactory`负责为JSF Web应用程序返回`RenderKit`。`RenderKit`是一个具有通用渲染技术的`Renderer`库。


    `FacesContextFactory`：`FacesContextFactory`为JSF实现提供了一种创建`FacesContext`实例的方式，该实例用于表示与传入请求以及最终响应相关的上下文信息。


    图1-10展示了应用程序启动时涉及的参与者。


    **图1-10.** *应用程序创建*


    每个JSF Web应用程序都有一个`ApplicationFactory`。该工厂类负责创建和替换所有使用JSF的应用程序所需的`Application`实例。`Application`实例随后将利用该实例支持的服务为其他进程提供服务。同样，JSF配置文件`faces-config.xml`在Web应用程序创建期间被读取一次，并存储在`Application`实例中。


    `RenderKitFactory`负责根据此JSF Web应用程序的`RenderKit`标识符返回`RenderKit`实例。对于每个JSF实现，必须有一个默认的`RenderKit`——即由字符串常量`RenderKitFactory.HTML_BASIC_RENDER_KIT`标识的HTML
    `RenderKit`。`LifecycleFactory`负责创建（如果需要）并返回`Lifecycle`。此`Lifecycle`实例负责调用处理逻辑，以实现请求处理生命周期中每个阶段所需的功能（参见图1-8）。最后一个工厂类`FacesContextFactory`为JSF实现提供了一种创建`FacesContext`实例的方式，该实例用于表示与传入请求相关的上下文信息，并最终创建响应。


    ## 初始请求


    当用户首次访问应用程序时，初始请求被发送到`FacesServlet`，后者将请求分派给JSF `Lifecycle`实例（参见图1-10）。


    ### 恢复视图阶段


    JSF生命周期的第一个阶段是恢复视图阶段（见图1-11），其职责是检查此页面之前是否已被请求过，或者这是一个新请求。


    **图1-11.** *初始请求期间的恢复视图阶段*


    在图1-11中，您看到的是传入请求的处理过程，以及JSF生命周期中的第一个阶段——恢复视图——如何负责从服务器和客户端状态恢复视图。在此视图的第一次请求期间，`ViewHandler.restoreView()`方法将返回`null`，因为没有存储的状态。


    > **注意**：JSF生命周期阶段标识符是`PhaseId`类中JSF公共API的一部分。


    如果返回值为`null`，恢复视图阶段将在此请求的`FacesContext`上调用`renderResponse()`方法。`renderResponse()`方法将指示：当此阶段完成时，将调用`render()`方法执行阶段6——渲染响应——而不继续执行阶段2到阶段5。随后，恢复视图阶段将调用`ViewHandler.createView()`方法创建组件层次结构根节点`UIViewRoot`，并将其附加到`FacesContext`。`UIViewRoot`组件不执行渲染，但在回发请求期间的事件传递中扮演重要角色。


    ### 渲染响应阶段


    当在恢复视图阶段调用`renderResponse()`方法时，生命周期直接跳转到`render()`方法，该方法负责执行渲染响应阶段，如图1-12所示。


    **图1-12.** *初始请求期间的渲染响应阶段*


    在此阶段，调用`ViewHandler.renderView()`方法来执行JSP文档。`renderView()`方法将从`UIViewRoot`节点获取的`viewId`属性值作为上下文相关路径，传递给与此请求关联的`ExternalContext`的`dispatch()`方法。`dispatch()`方法将`viewId`属性的值（例如，作为上下文相关路径的`/login.jspx`）转发给Web容器。


    由于JSF特定的映射不是转发请求的一部分，因此该请求被`FacesServlet`忽略，并传递给JSP容器，JSP容器将根据上下文相关路径定位JSP，并执行与`viewId`匹配的JSP页面（例如，`/login.jspx`）。图1-13展示了JSF
    JSP文档的处理过程。


    **图1-13.** *在`FacesContext`上设置`ResponseWriter`*


    ## JSF视图标识符：视图ID


    根据使用的映射类型（前缀或后缀），`UIViewRoot`视图标识符的派生方式与请求统一资源标识符（URI）略有不同。如果使用前缀映射，例如`FacesServlet`的`/faces/*`（这是最常见的），`viewId`属性根据映射后的路径信息设置；例如，`/context-root/faces/login.jspx`将设置视图标识符为`/login.jspx`。如果使用后缀映射，例如`*.jsf`，`viewId`属性根据请求URI的servlet路径信息设置，方法是将后缀替换为由符号常量`ViewHandler.DEFAULT_SUFFIX_NAME`命名的上下文初始化参数的值。例如，`/context-root/login.jsf`默认将设置视图标识符为`/login.jsp`，但可以利用上下文初始化参数改用`.jspx`作为默认后缀。


    在处理和执行JSF JSP文档之前，JSP运行时首先确定要使用的内容类型和字符编码。为了使JSF与JSP生命周期协调工作，必须存在`<f:view>`标签。`<f:view>`标签是一个JSP主体标签，它缓冲来自嵌套JSF组件的所有渲染输出。简而言之，`<f:view>`标签充当所有其他JSF组件的容器。`<f:view>`标签负责在`FacesContext`上创建并存储`ResponseWriter`实例。


    `createResponseWriter()`方法为指定的内容类型和字符编码创建`ResponseWriter`的新实例。`ResponseWriter`负责将生成的标记写入请求客户端，在本例中为`<f:view>`主体内容缓冲区。


    ## 内容类型与字符编码


    当服务器向HTTP浏览器客户端发送文档时，它还会在`Content-Type` HTTP标头中传递关于多用途互联网邮件扩展（MIME）类型（例如`text/html`）和字符集（例如`UTF-8`或`ISO-8859-1`）的信息。客户端使用这些信息正确处理来自服务器的传入字节。


    可接受的内容类型和字符编码列表在从客户端发送到服务器的`Accept` HTTP标头中传递。这可用于动态选择响应的适当内容类型，或者应用程序开发人员可以为文档指定静态内容类型。'
  raw: '*LifecycleFactory*: The LifecycleFactory is in charge of returning a Lifecycle
    instance for a lifecycle identifier. The default Lifecycle instance is in charge
    of invoking processing logic to implement the required functionality for each
    phase of the JSF request-processing lifecycle.


    *RenderKitFactory*: The RenderKitFactory is responsible for returning a RenderKit
    for the JSF Web application. A RenderKit is a library of Renderers with a common
    rendering technology.


    *FacesContextFactory*: The FacesContextFactory provides the JSF implementation
    with a way to create an instance of FacesContext that is used to represent contextual
    information associated with the incoming request and eventually with the response.


    Figure 1-10 shows the players involved at application start-up.


    **Figure 1-10.** *Application creation*


    Each JSF Web application has one ApplicationFactory. This factory class is responsible
    for creating and replacing the Application instance that is required by all applications
    utilizing JSF. The Application instance will then serve other processes with services
    supported by this instance. Likewise, the JSF configuration file—faces-config.xml—is
    read once during the creation of the Web application and stored in the Application
    instance.


    The RenderKitFactory is responsible for returning a RenderKit instance based on
    the RenderKit identifier for this JSF Web application. For each JSF implementation,
    there has to be one default RenderKit—the HTML RenderKit that is identified by
    a string constant—


    RenderKitFactory.HTML_BASIC_RENDER_KIT. The LifecycleFactory is in charge of creating
    (if needed) and returning a Lifecycle. This Lifecycle instance is in charge of
    invoking processing logic to implement the required functionality for each phase
    (refer to Figure 1-8) of the


