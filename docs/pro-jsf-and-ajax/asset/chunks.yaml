    SelectItem 实例，用于向该父组件的可用选项列表中添加选择项。


    UISelectMany


    UISelectMany（继承自 UIInput）是一个代表从可用选项列表中进行一项或多项选择的组件。它通常呈现为多选列表或一组复选框。


    UISelectOne


    UISelectOne（继承自 UIInput）是一个代表从可用选项列表中进行零项或一项选择的组件。它通常呈现为组合框或一组单选按钮。


    ** 来源：JSF 1.1 规范*


    *** 该组件的完整类名为* javax.faces.component *.*


    本章将要创建的日期字段组件的关键行为是让用户输入新日期。查看表 2-1，你会发现有一个组件描述了日期字段组件所需的行为——行为超类 UIInput。


    无需创建引入现有行为的新组件，你可以直接使用 JSF 规范中的 UIInput 组件。因此，这个新组件将被称为*输入日期组件*，并遵循与标准 JSF 组件（如输入文本组件）相同的命名约定。


    **使用 UIINPUT**


    UIInput 组件定义了应用程序如何与你的组件或任何继承自该超类的组件进行交互的契约。UIInput 组件自带一个默认渲染器，该渲染器在运行时会将组件显示为一个文本输入字段，用户可在其中输入数据。其组件类型为
    javax.faces.Input，默认渲染器类型为 javax.faces.Text。


    UIInput 组件向客户端显示值的方式与 UIOutput 组件大致相同。事实上，UIInput 组件继承自 UIOutput 组件。UIInput 组件还会在回传时处理需要解码和管理的请求参数。如果请求中传递的值与之前的值不同，组件会触发一个
    ValueChangeEvent 事件。你可以附加一个 ValueChangeListener，以便在 UIInput 组件广播 ValueChangeEvent
    时接收通知。


    **输入日期组件**


    该输入日期组件的目的是为本书后续更高级的 JSF 工作打下坚实基础。在视觉上，该组件将是一个简单的输入文本字段，带有一个图标覆盖层以指示其为日期字段，并具备一些有用的类型转换和日期验证功能。


