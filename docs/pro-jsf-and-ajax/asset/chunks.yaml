  raw: 'A feature in JSF that is often underutilized is the managed bean facility.
    This facility is not only useful for providing application logic, but you can
    also use it to initialize settings before launching the actual application. In
    this case, you will use the JSF EL syntax in the faces-config.xml file to set
    a pointer to the managed bean (for example, the ApplicationBean), which will be
    invoked and will return the correct renderKitId to the ViewHandler (see Code Sample
    10-2).


    **Code Sample 10-2.** *Setting the Default* RenderKit *ID*


    <?xml version="1.0" encoding="utf-8"?>


    <!DOCTYPE faces-config PUBLIC


    "-//Sun Microsystems, Inc.//DTD JavaServer Faces Config 1.1//EN"


    "http://java.sun.com/dtd/web-facesconfig_1_1.dtd">


    <faces-config >


