- fmt: "# Chapter 4: Using Rich Internet Technologies\n\n<xul:window title=\"Pro JSF\
    \ and AJAX : Mozilla XUL\" align=\"start\">\n  <xul:groupbox>\n    <xul:caption\
    \ label=\"Search\" />\n    <xul:hbox>\n      <html:input id=\"find-text\" />\n\
    \      <xul:button label=\"Search\"\n        oncommand=\"alert('Book choice: '\
    \ + document.getElementById('find-text').value)\" />\n    </xul:hbox>\n  </xul:groupbox>\n\
    </xul:window>\n\nFigure 4-6 shows the aforementioned code running in Mozilla Firefox.\n\
    \n**Figure 4-6.** *A simple XUL file rendered in the Firefox browser*\n\nAs in\
    \ HTML, developers can use JavaScript functions located in external files of the\
    \ form `myScript.js`. You can access these methods and functions by using the\
    \ `src` attribute on the `<script>` element or by embedding them in the page.\
    \ Developers can refer to a remote server using the `http://` URL, as shown in\
    \ Code Sample 4-10.\n\n**Code Sample 4-10.** *Script Reference Using* `http://`\n\
    \n```html\n<script type=\"text/javascript\" src=\"http://www.apress.com/projsf/js/myScript.js\"\
    >\n```\n\nA large set of event handler attributes is available, and some of them\
    \ work only on specific XUL/HTML elements. An example is the XUL `<window>` element\
    \ that listens for DOM events (for example, `load`). Table 4-4 lists a subset\
    \ of the available predefined event handlers.\n\n**Table 4-4.** *Listing of Predefined\
    \ Event Handlers Provided by the GRE DOM Implementation*\n\n| Event Handler |\
    \ Description |\n|---------------|-------------|\n| `onload` | An event handler\
    \ property for window loading. This event is being sent when the `window` element\
    \ is finished loading and when all objects in the document are available in the\
    \ DOM tree. This event handler can also be used on `image` elements. |\n| `oncommand`\
    \ | This event replaces the `onclick` event handler and is called when an element\
    \ is activated. The activation can vary from element to element, but essentially\
    \ it can be called from different user interactions such as clicking and hitting\
    \ the Enter key or shortcut keys, which is not the case for the `onclick` event\
    \ handler. |\n| `onblur` | The `blur` event is raised when an element loses focus.\
    \ |\n| `onfocus` | The opposite of the `onblur` event. This event is raised when\
    \ an element gets focus. |\n\n**Source:** http://www.xulplanet.com\n\n## Creating\
    \ Custom XUL Components Using XBL\n\nTo fully understand how Mozilla XUL can provide\
    \ a mechanism for JSF to use XUL as a rendering technology, you have to understand\
    \ XBL. XBL is an XML-based language that allows developers to extend XUL and add\
    \ \"custom\" components to the already extensive set of XUL elements. In XUL,\
    \ developers can change the look and feel using CSS and can attach skins, but\
    \ they have no way to change the behavior of XUL elements in XUL itself.\n\nTo\
    \ do this, developers have to use another language—XBL. Developers can look at\
    \ XUL as the \"implementation\" that comes with a set of base components or as\
    \ tag libraries that can be used to build a user interface, much like the JSF\
    \ Reference Implementation. XBL is the language developers use to extend XUL components\
    \ and enable integration with HTML, similar to how Java is used to extend JSF\
    \ components.\n\n### Creating XBL Bindings\n\nXBL is an XML language, and a file\
    \ created with XBL contains a set of bindings. These bindings each describe the\
    \ behavior of a XUL component. Besides describing the behavior, these bindings\
    \ also describe the XUL elements that make up the component along with properties\
    \ and methods of the component. In Code Sample 4-11, the root shows that the `<bindings>`\
    \ element contains one `<binding>` element.\n\n**Code Sample 4-11.** *An XBL File\
    \ Containing One Binding—* `projsf-bindings.xml`\n\n```xml\n<?xml version=\"1.0\"\
    ?>\n<xbl:bindings>\n  <xbl:binding id=\"welcome\">\n    <xbl:content>\n      <xul:text\
    \ value=\"Welcome, \" />\n      <xul:text value=\"Guest\" xbl:inherits=\"value=name\"\
    \ />\n      <xul:text value=\"!\" />\n    </xbl:content>\n  </xbl:binding>\n</xbl:bindings>\n\
    ```\n\nA `<bindings>` element can contain an infinite number of `<binding>` elements.\
    \ The namespace in the `<bindings>` element defines what syntax will be used,\
    \ and in Code Sample 4-11 it is XBL—`xmlns=http://www.mozilla.org/xbl`. The file\
    \ also contains some XUL elements: `<xul:text/>`. This is extremely useful to\
    \ simplify development by encapsulating several components that later can be referred\
    \ to as one component.\n\nThe `xbl:inherits` attribute on one of the `<xul:text>`\
    \ elements allows the `<xul:text>` element to inherit values from the bound element\
    \ by defining a variable name and, in this case, assigning it to the `value` attribute.\
    \ If no value is defined in the bound element in the page using this component,\
    \ the text field will default to `Guest`.\n\nThe `id` attribute on the `<xbl:binding>`\
    \ element (in Code Sample 4-11, `welcome`) will identify the binding.\n\n### Using\
    \ the XBL Bindings\n\nTo attach an XBL component or behavior to a XUL application,\
    \ XUL uses CSS. Using CSS, a developer can assign a binding to an element by setting\
    \ the `-moz-binding` property to a URI pointing to the XBL document.\n\n> **Note:**\
    \ Netscape has submitted a proposal to the W3C to define how to attach custom\
    \ behavior to an HTML element in \"A Modular Way of Defining Behavior for XML\
    \ and HTML\" (http://www.w3.org/TR/NOTE-AS).\n\nCode Sample 4-12 illustrates a\
    \ CSS file that attaches a binding to the `<pro:welcome>` element.\n\n**Code Sample\
    \ 4-12.** *A Sample CSS File That Has the* `-moz-binding` *Property Set—* `projsf.css`\n\
    \n```css\n@namespace pro url('http://projsf.apress.com/tags');\npro|welcome {\n\
    \  -moz-binding: url('projsf-bindings.xml#welcome');\n}\n```\n\nIn Code Sample\
    \ 4-12, the selector has the `-moz-binding` set to point to an XBL file named\
    \ `projsf-bindings.xml` and uses `#welcome` to refer to a specific binding in\
    \ the XBL file. This is similar to how anchors are referenced in HTML files.\n\
    \n> **Note:** To provide a consistent sample tag throughout the chapter's samples,\
    \ Code Sample 4-12 uses CSS3 standard syntax to simulate the sample element—`<pro:welcome>`.\n\
    \nIf the binding `id` is omitted when assigned to an element, XUL will default\
    \ to the first binding listed. In Code Sample 4-12, the `welcome` binding has\
    \ been declared as the `id`, and the element that has been assigned this binding\
    \ is `<pro:welcome>`.\n\nIn Code Sample 4-13, the `projsf-bindings.css` style\
    \ sheet has been attached to the XUL document, and two elements (`<pro:welcome\
    \ id=\"guest\" />` and `<pro:welcome id=\"duke\" name=\"Duke\" />`) are inserted\
    \ in the page. The first element displays a welcoming greeting for the specified\
    \ user, \"Duke\". The second element displays the \"Welcome, \" string defined\
    \ in the XBL file plus a default value user, \"Guest\". One of the cool features\
    \ of using encapsulation of behavior, as provided by XBL, is that it creates a\
    \ document tree within the scope of the custom component that is separate from\
    \ the XUL page. What this means is that the content of the XBL component is not\
    \ \"exploded\" into the main document, losing encapsulation. Figure 4-7 shows\
    \ the DOM using a DOM inspector.\n\n**Code Sample 4-13.** *A Sample HTML File\
    \ with XUL Components—* `prototype-ch4.xul`\n\n```xml\n<?xml version=\"1.0\"?>\n\
    <?xml-stylesheet href=\"chrome://global/skin/\" type=\"text/css\" ?>\n<?xml-stylesheet\
    \ href=\"projsf-bindings.css\" type=\"text/css\" ?>\n<xul:window title=\"Pro JSF\
    \ : Mozilla XBL\" align=\"start\">\n  <xul:groupbox>\n    <xul:caption label=\"\
    Greeting\" />\n    <pro:welcome id=\"duke\" name=\"Duke\" />\n    <pro:welcome\
    \ id=\"guest\" />\n  </xul:groupbox>\n</xul:window>\n```\n\n![Image 31](index-220_1.png)"
