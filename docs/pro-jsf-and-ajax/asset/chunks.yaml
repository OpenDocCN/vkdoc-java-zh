    ## About the Technical Reviewers


    **PETER LUBBERS** is an information architect at Oracle. A native of the Netherlands,
    Peter served as a Special Forces commando in the Royal Dutch Green Berets. Prior
    to joining Oracle, Peter architected and developed the internationalized Microsoft
    Office User Specialist (MOUS) testing framework. At Oracle, Peter develops automated
    help-authoring solutions.


    Three of these solutions are currently patent pending. He is also the author of
    the award-winning *Oracle Application Server Portal Configuration Guide* (Oracle,
    2005).


    **KITO D. MANN** is the editor-in-chief of JSF Central (http://www.jsfcentral.com)
    and the author of *JavaServer Faces in Action* (Manning, 2005). He is also a member
    of the JSF 1.2 and JSP 2.1 expert groups and principal consultant at Virtua, specializing
    in enterprise application architecture, development, mentoring, and JSF product
    strategy. Kito has consulted with several Fortune 500 clients, including Prudential
    Financial and J.P. Morgan Chase & Company, and he was recently the chief architect
    of an educational application service provider. He has a bachelor’s degree in
    computer science from Johns Hopkins University.


    **MATTHIAS WESSENDORF** is a PMC member of the Apache MyFaces project, a well-known
    JavaServer Faces implementation. Matthias is currently working as a Java Web developer
    in Germany, focusing on Web technologies such as JSF, Struts, Ajax, and XUL.


    Matthias is the author of two developer handbooks, *Struts: Websites mit Struts
    1.2 & 1.3 und Ajax effizient entwickeln* and *Web Services und mobile Clients:
    SOAP, WSDL, UDDI, J2ME, MIDlet, WAP & JSF*, and he has written numerous articles
    about JavaServer Faces for leading IT magazines in Germany.


    Matthias is a frequent speaker at international conferences such as ApacheCon
    and JAX and also lectures in the Department of Computer Science at the University
    of Applied Sciences in Dortmund, Germany. During his limited spare time, he enjoys
    listening to electronic dance music and reading a good book.


