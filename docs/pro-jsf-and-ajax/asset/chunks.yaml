    方法。`dispatch()` 方法会将 `viewId` 属性的值（例如，作为上下文相关路径的 `/login.jspx`）转发给 Web 容器。


    由于 JSF 特定的映射不是转发请求的一部分，因此该请求被 FacesServlet 忽略，并传递给 JSP 容器，JSP 容器随后将根据上下文相关路径定位
    JSP，并执行与 `viewId` 匹配的 JSP 页面（例如，`/login.jspx`）。图 1-13 展示了 JSF JSP 文档的处理过程。


