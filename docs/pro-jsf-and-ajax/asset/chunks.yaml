    To be able to achieve this, you first render the beginning of the current state
    of this UIComponent to the ResponseWriter attached to the specified FacesContext.
    You then check whether the component is responsible for rendering its children.
    If it is, you call encodeChildren() on the component to start rendering its children.
    If the component is not responsible for rendering its children, you call getChildren()
    on the component. The getChildren() method returns a List of all children of the
    UIComponent. If this component has no children, an empty List is returned, and
    you close the generated markup by calling the encodeEnd() method on the component.
    If it has children, you recursively call the _encodeAll(), as shown in Code Sample
    9-29, until all children have been rendered, and then you close the generated
    markup by calling the encodeEnd() method on the component.


