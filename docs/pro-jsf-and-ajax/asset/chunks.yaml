    **CONTENT TYPE AND CHARACTER ENCODING**


    When a server sends a document to an HTTP browser client, it also passes information
    in the Content-Type HTTP header about the Multipurpose Internet Mail Extensions
    (MIME) type, such as text/html, and the character set, such as UTF-8 or ISO-8859-1\.
    The client uses this information to correctly process the incoming bytes from
    the server.


    A list of acceptable content types and character encodings is sent in the Accept
    HTTP header from the client to the server. This can be used to dynamically select
    an appropriate content type for the response, or the application developer can
    specify a static content type for the document.'
