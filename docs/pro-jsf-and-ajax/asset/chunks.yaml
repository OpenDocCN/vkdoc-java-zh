    but one function requires a form regardless of regular postbacks or Ajax postbacks—file
    upload. If you need file-upload functionality in your application, you have to
    use form.submit(). In the context of Ajax, you can do this by using a hidden <iframe>
    tag and the form.submit() function and setting target.


    Ajax Is Not a Magic Wand


    As you know, the XMLHttpRequest object is an important player in Ajax, since it
    transports data asynchronously between the client and the server. It is important
    to understand that the XMLHttpRequest is not a magic wand that automatically solves
    all your problems. You still need to watch performance and scalability carefully
    using the XMLHttpRequest object. If you are aware of this, it is easy to understand
    that it is what you send on the request, receive upon the response, and manage
    on the client that will affect your performance.


    **Building Ajax Applications**


    Traditional Web applications are in most cases slower than their desktop application
    counterparts. With Ajax, you can now send requests to the Web server to retrieve
    only the data needed using JavaScript to process the response, which creates a
    more responsive Web application.


