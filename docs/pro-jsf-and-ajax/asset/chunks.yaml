    **C**hapter 6 introduced the concept of using Ajax and XMLHttpRequestto asynchronously
    communicate with the Web server without the Web server knowing the difference
    between a regular postback and an Ajax postback. The direct benefit is that it
    leaves the JSF lifecycle untouched, which allows the application developer to
    use Ajax-enabled components with regular JSF


    Events and Listeners.


    This chapter will address the need to fetch data using Ajax. The most common use
    cases for fetching data using Ajax are to populate drop-down lists and add type-ahead
    functionality in text fields. In contrast to using Ajax postback for events, fetching
    data should not affect the surrounding components on the page. And if fetching
    data is not affecting other parts of the DOM tree, then you do not need to go
    through the full lifecycle of JSF just to get the data, right?


    Plenty of examples are available on the Web today where fetching data is improving
    the usability of a Web application. The most prominent examples of asynchronous
    data transfer are Google Suggest’s autosuggest feature and Google Gmail’s file
    upload feature.


