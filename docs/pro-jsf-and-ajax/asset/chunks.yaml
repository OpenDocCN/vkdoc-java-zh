    除了提供 UIComponent 之外，JSF 实现还为这些 UIComponent 提供了辅助类。这些辅助类分为转换器、验证器以及事件和监听器模型。转换器在组件的提交值与模型层中对应的强类型对象之间提供双向类型转换。验证器对强类型对象执行验证；例如，它们可以确保日期不是过去的日期。代码示例
