    为此，你将使用 Ajax 和两个开源框架——Delta DOM (D2) 和 Dojo 工具包：


    *Ajax*：Ajax 是一个新术语，描述了一种 Web 开发技术，它使用已有的技术套件——DOM、JavaScript 和 XMLHttpRequest——来创建更丰富、更友好的
    Web 应用程序。


