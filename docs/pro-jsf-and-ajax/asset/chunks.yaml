- fmt: '# Browser Performance and HTC Components


    Browser performance of the initial page parse should be faster with the property
    `viewlink` set on the `<public:defaults>` declaration (no exploding), but general
    interaction with the component might be a little slower because of the indirection.
    We recommend using the `viewlink` property if the interactivity performance is
    acceptable, since it allows for encapsulation and attendant benefits.


    In Code Sample 4-25, `viewLinkContent` has been added to the `defaults` declaration,
    and as such the content of the `welcome` component will not be exploded into the
    main HTML page.


    **Code Sample 4-25.** *HTC File with* `viewlink` *Set*


    ```html

    <html>

    <head>

    <public:component tagName="welcome" >

    <public:defaults viewlinkcontent="true" />

    <public:property name="name" value="Guest" />

    <public:attach event="oncontentready" handler="_constuctor" />

    </public:component>

    <script type="text/javascript" >

    function _constuctor()

    {

    nameSpan.innerText = element.name;

    }

    </script>

    </head>

    <body>

    Welcome, <span id="nameSpan"

    onclick="if (element.name != ''Guest'')

    {

    alert(''Nice to see you again, '' + element.name);

    }" ></span>!

    </body>

    </html>

    ```


    > **Note:** Deploying Microsoft DHTML applications has no specific requirements
    except the dependency on Microsoft’s browser Internet Explorer 5.0 and above.


    ## HTC Summary


    As with XUL, HTC comes with a well-defined component model allowing application
    developers to encapsulate behavior into a reusable entity. From the previous sections
    about Microsoft’s DHTML and HTC, you now know about the HTC structure and about
    elements and event handling. You know the difference between element behavior
    and attached behavior. Later in this book (see Chapter 9), you will leverage this
    knowledge to build a set of Renderers for your JSF components that support HTC.


    ## Comparing XBL and HTC


    The lesson learned so far is that several technologies provide almost identical
    functionality although they are implemented completely differently. If you look
    at the semantics of XBL and HTC, you will see many similarities:


    - Both use CSS to attach components or behavior to an HTML element.

    - Both provide encapsulation of a document tree within the component, not exposing
    internal implementation details.

    - Both depend on the underlying browser platform.


    The critical differences are as follow:


    - XBL is based on XML, whereas HTC is based on HTML.

    - They support different platforms—XBL needs Mozilla GRE, and HTC needs Microsoft’s
    Internet Explorer.


    If you compare the pieces essential to creating a component and using it, they
    will fall into these categories—defining a component, implementing event handling,
    adding content, and attaching the component to the page.


    ### Defining a Component


    Although the two are similar, the way they define a component is different. In
    HTC the rule is one component per HTC file, whereas in XBL the recommendation
    is to have all related custom components in one file. This impacts how to define
    the component. In the HTC case, a developer sets the `tagName` attribute on `<public:component
    tagName="welcome">` to specify the name of the tag for that particular HTC component.


    In the XBL file, the binding ID will identify the component to be used with a
    specific element—`<binding id="welcome">`. The element is then defined in a CSS
    file by using an anchor to couple the element to the right XBL binding/component.


    ### Adding Content


    In HTC the component content is encapsulated in the `<body>` element, and in XBL
    the content is encapsulated in the `<content>` element.


    ### Event Handling


    The two technologies both support DOM, although, once again, with some slight
    differences.


    XBL supports DOM Level 2 (and some Level 3), and HTC supports only DOM Level 1
    and as such supports only bubbling of events and cancellation, not capturing or
    at target. (This is because no new version of Internet Explorer has been released
    over the past four years.)


    > **Note:** The current version of Internet Explorer is 6.0. Microsoft is currently
    working on version 7.0 of its browser Internet Explorer, which is code-named Rincon.
    When it finally hits the shelves, it will be more than four years since the last
    release.


    If you look at how event handling takes place in HTC and XBL, you will see some
    more distinct differences:


    - HTC has three different approaches to event handling—a developer can use `<public:attach>`
    to declare a global event handler for the component, define a function using the
    HTML element `<script for="proButton" event="onclick">`, assign it to a specific
    element and event, and finally declare an event handler function and assign a
    call to that function (for example, `onclick="proButton()"`).

    - XBL has two ways of defining event handlers—one is using a predefined event
    handler such as `onclick` or `onmouseover` on an element, and the other is defining
    an event handler globally for the component using the `<handler>` element. To
    add custom methods, a developer can use the `<method>` element to define a custom
    event handler for the component.


    ### Attaching Components


    Both technologies leverage CSS to attach behavior to an element. Attaching a component
    to the HTML page using XBL, developers have to use the `-moz-binding: url()` attribute;
    using HTC they have to use the `behavior: url()` attribute. Both of these approaches
    seem comparable, but the end result is poles apart. In XBL the style class name
    (for example, `pro:welcome`) will become the tag `<pro:welcome>` and be interpreted
    as a first class element in the DOM tree, obscuring any internal implementations.


    With HTC it is different, since the CSS approach is used to attach a behavior
    to an already existing HTML element (for example, `H1 {behavior:url(projsf.htc)}`)
    that is not declaring a first-class element in the DOM, and therefore it will
    expose internal implementations of that component. To create a first-class element,
    developers have to use the `<?import namespace="pro" implementation="pro.htc"
    ?>` element and the namespace `<html xmlns:pro>` to uniquely identify the imported
    component, and as mentioned earlier, the name of the tag is declared in the HTC
    file using the `tagName` attribute.


    ## JSF—The Greatest Thing Since Sliced Bread!


    Of the technologies described in this chapter, it is only XUL and HTC that allow
    developers to reuse components in Web applications. They allow the encapsulation
    of HTML, CSS, and script into components that application developers can reuse.
    Ajax, on the other hand, delivers asynchronous communication to the server that
    can be used to provide users with a responsive UI.


    These technologies solve most of the requirements coming from consumers, but they
    are still lacking in support for the application developer.


    What the market needs is a standard way of defining an RIA that can be deployed
    over the Web without vendor lock-in. A working group, called Web Hypertext Applications
    Technology (WHAT), is trying to create a standard tag library for extensions to
    HTML that work across all browsers by leveraging technologies such as Mozilla’s
    XBL to achieve this. Technologies such as Mozilla’s XBL allow for encapsulation
    of HTML, CSS, and script into components that application developers can reuse
    but that are not standards.


    > **Note:** The WHAT working group (http://www.whatwg.org/) is addressing the
    need for a sound and rational development environment extending the standard HTML
    elements. This will take place through a set of technical specifications that
    can be used and implemented in Web browsers such as Firefox, Mozilla, and Internet
    Explorer.'
