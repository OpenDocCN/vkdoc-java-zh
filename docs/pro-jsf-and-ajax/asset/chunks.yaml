- fmt: "# XUL Elements Reference\n\n## `<radio>` (Radio Button)\n\nAn element that\
    \ can be turned on and off. Radio buttons are almost always grouped together in\
    \ clusters. Only one radio button within the same `<radiogroup>` can be selected\
    \ at a time. The user can switch which radio button is turned on by selecting\
    \ it with the mouse or keyboard. Other radio buttons in the same group are turned\
    \ off. A label, specified with the `label` attribute, can be added beside the\
    \ radio button to indicate its function to the user.\n\n## `<radiogroup>`\n\n\
    A group of radio buttons. Only one radio button inside the group can be selected\
    \ at a time. The radio buttons can be either children of the `<radiogroup>` or\
    \ descendants. Place the `<radiogroup>` inside a `<groupbox>` if you would like\
    \ a border or caption around the group. The `<radiogroup>` defaults to vertical\
    \ orientation.\n\n## `<checkbox>`\n\nAn element that can be turned on and off.\
    \ The user can switch the state of the check box by selecting it with the mouse.\
    \ A label, specified with the `label` attribute, may be added beside the check\
    \ box to indicate to the user its function.\n\n## `<box>`\n\nA container element\
    \ that can contain any number of child elements. If the box has an `orient` attribute\
    \ that is set to `horizontal`, the child elements are laid out from left to right\
    \ in the order they appear in the box. If `orient` is set to `vertical`, the child\
    \ elements are laid out from top to bottom. Child elements do not overlap. The\
    \ default orientation is horizontal.\n\n## `<splitter>`\n\nAn element that should\
    \ appear before or after an element inside a container. When the splitter is dragged,\
    \ the sibling elements of the splitter are resized.\n\n## `<image>`\n\nAn element\
    \ that displays an image, much like the HTML `<img>` element. The `src` attribute\
    \ can be used to specify the URL of the image.\n\n**Source:** http://xulplanet.com/references/elemref/\n\
    \n---\n\n5807ch04.qxd 1/13/06 2:50 PM Page 190\n\n**190** C H A P T E R 4 ■ U\
    \ S I N G R I C H I N T E R N E T T E C H N O L O G I E S\n\nWe will cover the\
    \ details of XBL shortly, but the sample XUL file in Code Sample 4-8 demonstrates\
    \ how to embed standard, namespaced HTML elements into base XUL controls.\n\n\
    **Code Sample 4-8.** *A Simple XUL File with Embedded HTML Elements*\n\n```xml\n\
    <?xml version=\"1.0\"?>\n<?xml-stylesheet href=\"chrome://global/skin/\" type=\"\
    text/css\" ?>\n<xul:window title=\"Pro JSF and AJAX: Mozilla XUL\" align=\"start\"\
    >\n  <xul:groupbox>\n    <xul:caption label=\"Search\" />\n    <xul:hbox>\n  \
    \    <html:input id=\"find-text\" />\n      <xul:button label=\"Search\" />\n\
    \    </xul:hbox>\n  </xul:groupbox>\n</xul:window>\n```\n\nCode Sample 4-8 shows\
    \ how to use a namespaced HTML input element—`<html:input id=\"find-text\"/>`—embedded\
    \ in a XUL page and mixed with regular XUL components.\n\nTo be able to deploy\
    \ and run a XUL application on a remote server, the Web server needs to be configured\
    \ to send files with the content type of `application/vnd.mozilla.xul+xml`. A\
    \ browser that uses the Mozilla GRE (Netscape and Firefox, in other words) will\
