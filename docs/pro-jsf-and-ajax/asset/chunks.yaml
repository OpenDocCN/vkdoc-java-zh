    \ 属性提供支持，因此需要处理方法绑定表达式，如代码示例 2-35 所示。\n\n**代码示例 2-35.** *处理* MethodBinding *属性和属性的方法*\n\
    \n```java\n/**\n * 将组件属性设置为方法绑定。\n *\n * @param component Faces 组件\n * @param\
