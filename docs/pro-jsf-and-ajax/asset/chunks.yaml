- fmt: "# Browser Caching and Weblets\n\nEach time the browser renders a page, the\
    \ browser ensures that all resources used by that page are available. During the\
    \ initial rendering of the page, the browser populates its cache with the contents\
    \ of each resource URL by downloading a fresh copy from the Web server. As it\
    \ does so, the browser records the `Last-Modified` and `Expires` time stamps from\
    \ the response headers. The cached content is said to have expired if the current\
    \ time is later than the expiration time stamp or if no expiration time stamp\
    \ information exists.\n\nOn the next render of the same page, the browser checks\
    \ to see whether the locally cached resource has expired. The locally cached copy\
    \ is reused if it has not expired. Otherwise, a new request is made to the web\
    \ server, including the last-modified information in the `If-Modified-Since` request\
    \ header. The web server responds either by indicating that the browser cache\
    \ is still up-to-date or by streaming the new resource contents to the browser\
    \ with updated `Last-Modified` and `Expires` time stamps in the response headers.\n\
    \n`Weblets` use versioning to leverage the browser cache behavior so that packaged\
    \ resources can be downloaded and cached as efficiently as possible. The browser\
    \ needs to check for new updates only when the cache has been emptied or when\
    \ the component library has been upgraded at the web server.\n\nCode Sample 5-4\
    \ illustrates this versioning feature by adding a `1.0` version to the `com.apress.projsf.ch5`\
    \ weblet.\n\n**Code Sample 5-4.** *Weblets Configuration File Using* `1.0` *Versioning\
    \ for Production*\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\" ?>\n\n<weblets-config\
    \ >\n\n<weblet>\n\n<weblet-name>com.apress.projsf.ch5</weblet-name>\n\n<weblet-class>net.java.dev.weblets.packaged.PackagedWeblet</weblet-class>\n\
    \n<weblet-version>1.0</weblet-version>\n\n<init-param>\n\n<param-name>package</param-name>\n\
    \n<param-value>com.apress.projsf.ch5.render.html.basic.resources</param-value>\n\
    \n</init-param>\n\n</weblet>\n\n<weblet-mapping>\n\n<weblet-name>com.apress.projsf.ch5</weblet-name>\n\
    \n<url-pattern>/projsf-ch5/*</url-pattern>\n\n</weblet-mapping>\n\n</weblets-config>\n\
    ```\n\nBy specifying a weblet version, you indicate that the packaged resource\
    \ will not change until the version number changes. Therefore, the version number\
    \ is included as part of the resource URL determined at runtime by the `WebletsViewHandler`\
    \ (for example, `/projsf-ch5$1.0/showOneDeck.js`). When the `WebletContainer`\
    \ services this request, it extracts the version number from the URL and determines\
    \ that the resource should be cached and should never expire. As soon as a new\
    \ version of the component library is deployed to the web application, the resource\
    \ URL created at runtime by the `WebletsViewHandler` changes (for example, `/projsf-ch5$2.0/showOneDeck.js`);\
    \ thus, the browser's cached copy of `showOneDeck.js` for version `1.0` is no\
    \ longer valid because the URL is different.\n\nDuring development, the contents\
    \ of packaged resources can change frequently, so it is important for the browser\
    \ to keep checking with the web server to detect the latest resource URL contents.\
    \ This check happens by default every time the main Web page is rendered if the\
    \ weblet version is omitted from `weblets-config.xml`.\n\nAlternatively, the weblet\
    \ configuration allows component writers to append `-SNAPSHOT` to the version\
    \ number. For example, `1.0-SNAPSHOT`, as shown in Code Sample 5-5, indicates\
    \ that this file is under development and should behave as though the version\
    \ number has been omitted.\n\n**Code Sample 5-5.** *Weblets Configuration File\
    \ Using* `SNAPSHOT` *Versioning for Development*\n\n```xml\n<?xml version=\"1.0\"\
    \ encoding=\"UTF-8\" ?>\n\n<weblets-config >\n\n<weblet>\n\n<weblet-name>com.apress.projsf.ch5</weblet-name>\n\
    \n<weblet-class>net.java.dev.weblets.packaged.PackagedWeblet</weblet-class>\n\n\
    <weblet-version>1.0-SNAPSHOT</weblet-version>\n\n...\n\n</weblet>\n\n...\n\n</weblets-config>\n\
    ```\n\n## Setting Up Security\n\nWhen serving packaged resources from a JAR file,\
    \ you must take extra care not to make Java class files or other sensitive information\
    \ accessible by URL. In desktop Java applications, resource files are often stored\
    \ in a subpackage called `resources` underneath the Java implementation classes\
    \ that use the resource files. The same strategy is also appropriate for packaged\
    \ resources in JSF component libraries, and this has the security benefit of ensuring\
    \ that only the resource files are accessible by URL. All the other contents of\
    \ the JAR file, including Java implementation classes, are not URL accessible\
    \ because no Java classes exist either in the `resources` package or in any subpackage\
    \ of `resources`.\n\n## Using the Weblet Protocol\n\nHaving learned how to configure\
    \ weblets, it is time to look at how you can reference resources defined by the\
    \ weblet in the two custom `Renderers`—`HtmlInputDateRenderer` and `HtmlShowOneDeckRenderer`.\
    \ Code Sample 5-6 shows the syntax, defined by the weblet contract, for returning\
    \ a proper URL to the JSF page.\n\n**Code Sample 5-6.** *The Weblet Protocol Syntax*\
    \ `weblet://<weblet name><resource>`\n\nThe `weblet://` prefix indicates that\
    \ this is a weblet-managed resource, and this is followed by the weblet name and\
    \ the resource requested.\n\n## Using Weblets in the `HtmlInputDateRenderer`\n\
    \nPreviously, in the `HtmlInputDateRenderer` class, you saw how to pass the URL\
    \ `/projsf-ch2/inputDate.css` as an argument to the `writeStyleResource()` method.\
    \ In Code Sample 5-7, you will see how to amend this to use the weblet protocol\
    \ instead.\n\n**Code Sample 5-7.** *Using the Weblet Protocol to Serve Up Resources*\n\
    \n```java\n/**\n * Write out the HtmlInputDate resources.\n *\n * @param context\
    \ the Faces context\n * @param component the Faces component\n */\nprotected void\
    \ encodeResources(\n    FacesContext context,\n    UIComponent component) throws\
    \ IOException\n{\n    writeStyleResource(context, \"weblet://com.apress.projsf.ch5/inputDate.css\"\
    );\n}\n```\n\nThe weblet protocol syntax is convenient and easy to understand.\
    \ The syntax starts with `weblet://` followed by the weblet name (for example,\
    \ `com.apress.projsf.ch5`) and finally the path information or resource file (for\
    \ example, `/inputDate.css`).\n\n> **Note** Although the Weblets project uses\
    \ a protocol-like syntax to describe resources in a public way, this is not a\
    \ real protocol handler, so the `new URL(\"weblet:://...\").openStream()` would\
    \ not work from Java code. However, you don't need it to, since the client is\
    \ not Java code.\n\n## Using Weblets in the `HtmlShowOneDeckRenderer`\n\nAs with\
    \ the `HtmlInputDateRenderer`, in the `HtmlShowOneDeckRenderer` class you saw\
    \ that we passed the URLs `/projsf-ch3/showOneDeck.js` and `/projsf-ch3/showOneDeck.css`\
    \ as arguments to the `writeStyleResource()` method (see Code Sample 5-1). In\
    \ Code Sample 5-8, you will see how to amend this to use the weblet protocol instead.\n\
    \n**Code Sample 5-8.** *Using the Weblet Protocol to Serve Up Resources*\n\n```java\n\
    /**\n * Write out the HtmlShowOneDeck resources.\n *\n * @param context the Faces\
    \ context\n * @param component the Faces component\n */\nprotected void encodeResources(\n\
    \    FacesContext context,\n    UIComponent component) throws IOException\n{\n\
    \    writeScriptResource(context, \"weblet://com.apress.projsf.ch5/showOneDeck.js\"\
    );\n    writeStyleResource(context, \"weblet://com.apress.projsf.ch5/showOneDeck.css\"\
    );\n}\n```\n\nNotice that neither the URL mapping nor the version number is included\
    \ in the weblet resource syntax. The `WebletsViewHandler` uses the weblet URL\
    \ mapping and version number to create a resource URL that the weblet will service."
