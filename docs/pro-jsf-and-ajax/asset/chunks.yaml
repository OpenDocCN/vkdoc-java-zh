    和 `javax.faces.event.ValueChangeEvent`。`ActionEvent` 通常在用户激活 `UICommand` 组件时传递，而
    `ValueChangeEvent` 表示任何 `UIInput` 组件中的值已更改。


    **FacesEvent 基类**


    `javax.faces.event.FacesEvent` 类是 JSF 中可由 `UIComponent` 传递的 UI 和应用程序事件的抽象基类。`FacesEvent`
    构造函数接受一个参数——`UIComponent` 事件源实例，它标识了事件将从哪个组件广播给感兴趣的监听器。JSF 中的所有组件事件类——默认的或自定义的——都必须扩展
    `FacesEvent` 类，才能得到请求处理生命周期的支持。`FacesEvent` 扩展了 `java.util.EventObject`，后者是 Java
    标准版中所有事件的基类。表 3-2 描述了 `FacesEvent` 基类的结构。


