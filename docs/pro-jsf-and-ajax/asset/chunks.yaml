    **自**从 JavaServer Faces 作为构建基于 Java 的 Web 应用的新标准登上互联网技术舞台以来，它便受到了 Java EE Web
    开发社区的广泛关注。许多开发者兴奋地发现，他们可以使用标准的 JavaServer Faces HTML Basic RenderKit 来创建基于 HTML
    的 Web 应用，就像过去使用 Apache Struts 等其他技术一样。然而，这只是冰山一角——JavaServer Faces 的真正力量在于其可扩展的组件模型，它允许你远远超越那些初级的
    HTML 起点。


    基于近期对提升 Web 应用可用性需求的激增，当前最热门的话题无疑是富互联网应用（RIA），以及它们如何提供具有丰富界面和桌面应用交互能力的分布式、基于服务器的
    Web 应用，这完全可以理解。尽管 RIA 前景广阔，但它们仍然存在兼容性、可移植性、可用性和可重用性方面的问题。许多 Web 应用开发者正努力跟上市场上不断涌现的新
    RIA 框架，无论是开源的还是厂商专有的。我们需要一种标准的方式来定义 RIA，无论使用的是哪种 RIA 框架。


    关于开发和部署 RIA 最佳方式的争论不会因本书而终结，但纵观当今软件行业，越来越多的开发者正在使用 Web 来部署他们的应用。


    这些 Web 应用的用户界面通常使用 HTML、CSS、JavaScript 和 DOM 等技术构建。这些技术并非为企业级应用而设计，随着消费者对提供这些技术无法完全描述或支持的功能的应用施加越来越大的压力，开发者们正在寻找替代解决方案或扩展这些标准。


    JSF 不仅让你可以选择单一的 RIA 技术，如 Ajax、Mozilla XUL、Microsoft HTC、Macromedia Flash 等；它还允许你挑选并组合任何你想要的
    RIA 技术，并在最合适的地方使用它们。与任何技术一样，每种 RIA 技术都有其自身的优缺点，但作为 JSF 组件编写者，你有机会利用每种 RIA 技术的最佳功能，为应用开发者提供一个极其强大的
    RIA 解决方案。


    在过去的五年里，我们深度参与了基于组件的框架的开发和使用，从 Oracle 自己的 UI 组件框架 ADF UIX 开始，到最近 Oracle 的 JSF
    组件库 ADF Faces。


    有一天，一位好友问我们：“你们为什么不分享一些经验，写一本关于这个的书呢？”令我们惊讶的是，竟然没有一本书是针对那些和我们有相同兴趣的开发者——即如何为 RIA
    开发可重用的、基于标准的 JSF 组件。


    所以，我们在这里，希望你们能像我们享受写作过程一样，享受阅读这本书。


    **xxi**


    5807fm.qxd 1/20/06 4:11 PM 第 xxii 页 **xxii**


    ■引言


    **本书概述**


    *《Pro JSF 与 Ajax：构建富互联网组件》* 旨在为你提供所有必要的方法，以便为你的 Web 应用开发者提供易于使用的富互联网组件（RIC）。


    我们很早就决定，将重点放在建立一个清晰的蓝图，让你作为开发者可以遵循，从而在你自己的 JSF 组件开发中取得成功。我们还决定，本书不会局限于“仅仅”JSF
    组件，而是会涵盖你在开发、打包和部署自己的 RIC 时所需了解的一切。


    本书不是，我们想强调这一点，*不是*一本关于 JSF 或编写简单 JSF 组件的入门级书籍。当然，本书会介绍 JSF 并涵盖编写 JSF 组件的基础知识，但如果你在阅读本书之前尚未熟悉
    JSF，我们强烈建议你参考几本优秀的书籍，它们将向你介绍 JSF，并为你充分理解本书提供必要的基础。我们推荐 Kito D. Mann 所著的《*JSF 实战*》（Manning
    出版社，2005 年），这是一本关于 JSF 的出色且非常全面的书籍；以及 David Geary 和 Cay Horstmann 合著的《*核心 JavaServer
    Faces*》（Prentice 出版社，2004 年）。我们也期待 Ed Burns 和 Chris Schalk 合著的《*Java Server Faces：完全参考手册*》（McGraw-Hill
    Osborne 出版社，2006 年）在书店上架。


    *《Pro JSF 与 Ajax：构建富互联网组件》* 包含十个章节，专注于编写 JSF 组件。书中的示例相当广泛，因此我们建议你从 Apress 网站下载示例源代码，以便更好地了解所讨论的示例（更多信息请参见下一节）。我们假设，作为一名经验丰富的
    Web 开发者和 JSF 开发者，你能够将所演示的主题推广到你自己的环境中；因此，我们避免用用处不大的信息来充斥文本和示例。


    第 1 章快速而深入地介绍了 JSF、其组件模型及其生命周期。你可能已经遵循了我们的建议，在购买本书之前阅读了关于 JSF 的资料，或者你已经是有经验的 JSF
    开发者；无论哪种情况，本章都包含了关于 JSF 及其生命周期的关键信息，这些信息对于成功构建可扩展和可重用的 JSF 组件是必需的。

