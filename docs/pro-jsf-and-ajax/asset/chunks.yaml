    ## Defining the Binding Element Using a Style Sheet


    The `id` attribute on the `binding` element (`#inpuDate`) identifies the binding.
    Using CSS, a developer can assign a binding to an element by setting the `-moz-binding`
    URI property to reference the binding inside the XBL document, as shown in Code
    Sample 8-14.


    **Code Sample 8-14.** *The* pro.css *File*


    ```

    @namespace pro url(http://projsf.apress.com/tags);

    pro|inputDate

    {

    -moz-binding: url(''bindings.xml#inputDate'');

    }

    pro|showOneDeck

    {

    -moz-binding: url(''bindings.xml#showOneDeck'');

    display: -moz-box;

    -moz-box-orient: vertical;

    }

    pro|showItem

    {

    -moz-binding: url(''bindings.xml#showItem'');

    display: -moz-box;

    }

    pro|showItem[active=''true'']

    {

    -moz-binding: url(''bindings.xml#showItemActive'');

    display: -moz-box;

    }

    pro|showItemHeader

    {

    -moz-binding: url(''bindings.xml#showItemHeader'');

    display: -moz-box;

    }

    ```


    In Code Sample 8-14, the CSS selector for the `<pro:inputDate>` element has the
    `-moz-binding` set to point to the XBL prototype file `bindings.xml` and refers
    to a specific binding with the ID `inputDate` in the XBL file. This is similar
    to how anchors are used in HTML files. You also have two `pro|showItem` selectors
    in the CSS. One of them has `[active=''true'']` attached to it, which means any
    `<pro:showItem>` element that has an `active` attribute set to `true` should use
    this XBL binding. This way, you can have one XUL element and provide multiple
    bindings.


    ## Step 3: Creating a Behavioral Superclass


    We need to cover one important fact before we show how to design the first JSF
    XUL component—XUL is not HTML. Although much of the functionality is shared between
    HTML and XUL, it is important to understand that they are different document objects.
    XUL is an XML language, and the XUL document is a subtype of the more generic
    XML document. This distinction between the two document objects is important.


    A regular HTML document is usually structured as shown in Code Sample 8-15.


    **Code Sample 8-15.** *HTML Document Structure*


    ```

    <html>

