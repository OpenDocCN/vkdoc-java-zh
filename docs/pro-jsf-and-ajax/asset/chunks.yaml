    C H A P T E R 9 ■ P R OV I D I N G M I C R O S O F T H T C R E N D E R E R S


    A typical HTC file is usually structured as an HTML document with <html>, <head>,
    and


    <body> elements. It also contains scripts and HTC-specific elements (see Table
    9-1) that define the component.


    **Table 9-1.** *HTC-Specific Elements**


    **Name**


    **Description**


    document


    Represents the HTML document in a given browser window element


    Returns a reference to the tag in the primary document to which the element behavior
    is attached


    public:component


    Identifies the content of the file as an HTC component public:property


    Defines a property of the HTC component to be exposed to the containing document


    public:default


    Sets the default properties for an HTC component


    public:attach


    Binds a function to an event so that the function is called whenever the event
    fires on the specified object


    public:method


    Defines an HTC component method to be exposed to the containing document


    public:event


    Defines an HTC component event to be exposed to the containing document


    ** Source:* http://msdn.microsoft.com/workshop/author/behaviors/behaviors_node_entry.asp
    When you create an element behavior, it usually contains an enclosing <public:component>
    element and scripts in the <head> element and contains a <body> element that defines
    the actual markup for the element behavior. The file itself is saved with an .htc
    extension. Code Sample 9-2


    shows the <body> section of the HTC file, inputDate.htc, since that will give
    you an understanding of how this component is constructed.


    **Code Sample 9-2.** *The* <body> *Element of the* <pro:inputDate> *HTC Component*


    <html>


    ...


    <body>


    **<input id="input" type="text" style="margin:0px"**


    **onchange="_flushChanges()" >**


    **<button type="button" style="margin:0px;width:2em;"**


    **onclick="_popup()" >**


    **<img src="/.../projsf-ch9/inputDateButton.gif" >**


    **</button>**


    The <body> element defines two form elements: <input> and <button>. Since Internet
    Explorer parses the HTC file as an encapsulated HTML document, any input fields
    in the HTC


    document will not participate in the parent document’s form submit. This means
    you need to provide a way to transfer the value of the input field to a placeholder
    on the parent document (for example, _flushChanges()). The button is responsible
    for launching the actual pop-up calendar.


