    旨在为基于 Mozilla 的浏览器（包括 Netscape 7.*x* 系列浏览器和 Mozilla 里程碑版本）提供强大的 JavaScript 调试环境。它不包括仅支持
    Gecko 的浏览器，如 K-Meleon 和 Galeon。该调试器以 XPI 格式的附加组件包形式提供，自 2001 年 10 月 3 日起已成为 Mozilla
    安装发行版的一部分。


