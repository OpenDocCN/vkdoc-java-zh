    **IMMEDIATE 属性**


    在某些情况下，您不希望走完整个请求处理生命周期，例如当用户决定取消当前事务时。immediate 属性为应用程序开发者提供了一种覆盖由 FacesEvent
    实例定义的 PhaseId 的方法。该属性可设置在 UICommand 组件上，有效值为 true 或 false。通过将 immediate 属性设置为
    true，应用程序开发者可以缩短处理生命周期、取消某个流程并导航到另一个视图。


    immediate 属性也可用于 UIInput 组件。如果设置为 true，验证将在解码期间发生，并导致转换和验证处理（包括可能触发 ValueChangeEvent
    事件）在“应用请求值”阶段发生，而不是在“处理验证”阶段。


    setProperties() 方法，如代码示例 2-39 所示，如果此标签处理程序实例的相应属性被显式设置，则会将属性和特性从此标签传输到指定的组件。


