    The `<pro:showItem>` component, as shown in Code Sample 8-11, is the part of the
    `<pro:showOneDeck>` implementation that will expand when the user interacts with
    it. This binding contains one method, `expand`, that is invoked when the header
    is clicked.


    As you can see, you are using the `d2.js` library, passing the activated form
    id and the id of the selected node to the `d2.submit()` function. The `d2.submit()`
    function calls the `dojo.io.bind()` method, passing information about which form
    to submit, content (such as the ID of the selected component), the accepted request
    header (`''X-D2-Content-Type''`:

    `<contentType>`), and the MIME type (`text/xml`) for this request. This information
    will determine which node to expand and which `ResponseWriter` to use for this
    request.


    **Code Sample 8-11.** *The* showItem *Binding and the* expand *Method*


    ```

    <binding id="showItem" display="xul:vbox" >

    <resources>

    <stylesheet src="styles.css" />

    </resources>

    <content>

    <xul:vbox class="showItem" flex="1" >

    <xul:hbox id="showItemHeader"

    onclick="this.parentNode.parentNode.expand()"

    class="showItemHeader"

    xbl:inherits="className=headerStyleClass" >

    <children includes="showItemHeader" />

    </xul:hbox>

    <xul:hbox style="display:none;" >

    <children/>

    </xul:hbox>

    </xul:vbox>

    </content>

    <implementation>

    <method name="expand" >

    <body>

    <![CDATA[

    var showOneNode = this.parentNode;

    var showOneClientId = showOneNode.getAttribute(''id'');

    var currentNode = this;

    while (currentNode != null)

    {

    if (currentNode.localName == ''form'' &&

    currentNode.namespaceURI == ''http://www.w3.org/1999/xhtml'')

    {

    var formNode = currentNode;

    var content = new Object();

    content[showOneClientId] = this.getAttribute(''itemId'');

    d2.submit(formNode, content);

    break;

    }

    currentNode = currentNode.parentNode;

    }

    ]]>

    </body>

    </method>

    </implementation>

    </binding>

    ```


