    ### Step 12: Registering Resources with Weblets


    First, you need to register the XUL resources (`pro.css`, `bindings.xml`, `styles.css`)
    as weblets, which will enable you to package these resources as part of the custom
    JSF component library (see Code Sample 8-45). Second, you need to make sure you
    use weblets to load the image for the `ProInputDate` component’s button (see Code
    Sample 8-46).


    > **Note** For more information about weblets, please see Chapter 5, or visit
    the Weblets project’s site at `http://weblets.dev.java.net`.


    **Code Sample 8-45.** *The Weblets Configuration File*


    ```xml

    <?xml version="1.0" encoding="UTF-8" ?>

    <weblets-config >

    ...

    <weblet>

    <weblet-name>com.apress.projsf.ch8</weblet-name>

    <weblet-class>net.java.dev.weblets.packaged.PackagedWeblet</weblet-class>

    <init-param>

    <param-name>package</param-name>

    <param-value>com.apress.projsf.ch8.render.xul.ajax.resources</param-value>

    </init-param>

    </weblet>

    ...

    <weblet-mapping>

    <weblet-name>com.apress.projsf.ch8</weblet-name>

    <url-pattern>/projsf-ch8/*</url-pattern>

    </weblet-mapping>

    </weblets-config>

    ```


    In Code Sample 8-46, you use weblets to serve resources from the JAR file. Note
    the difference between the `style.css` file and the `inputDateButton.gif` file.
    The `styles.css` file is automatically processed relative to the `bindings.xml`
    file by the XBL runtime, but the XUL button’s image URL is processed relative
    to the main document. This will cause the image URL to not render, since the image
    is stored relative to the `bindings.xml` file and not to the main document. To
    solve this, you use the `weblet:/` relative protocol syntax to make it absolute
    at runtime but relative during design time.


    **Code Sample 8-46.** *Using Relative* `weblet:/` *Protocol Syntax*


    ```xml

    <?xml version="1.0"?>

    <bindings>

    <binding id="inputDate">

    <resources>

    <stylesheet src="styles.css" />

    </resources>

    <content>

    <xul:hbox>

    <xul:textbox id="input"

    style="margin-left:0px;margin-right:0px;"

    xbl:inherits="value"

    onchange="this.parentNode.parentNode.flushChanges();" />

    <xul:button pop-up="calendar"

    image="weblet:/inputDateButton.gif"

    style="margin-left:0px;margin-right:0px;min-width:2em;"/>

    </xul:hbox>

    ```


    ### Building Applications with JSF XUL Components


    Figure 8-16 shows the final result of the JSF XUL implementation and how it will
    be used in JSP pages. The first page contains the `<pro:inputDate>` component
    tag and looks the same as the one you created previously (see Chapter 7), except
    this page uses a XUL RenderKit. This XUL implementation provides the same functionality
    as the Ajax implementation where dates that are not selectable are marked red
    and dates outside the scope of the current month are disabled. When the user enters
    a date and clicks a submit button, a full postback will occur, and the attached
    validator, if any, will be invoked. Code Sample 8-47 uses the input date component
    with the XUL Renderer.


    **Figure 8-16.** *JSF page rendered using the XUL* `RenderKit` *and the* `ProInputDate`
    *component*


    **Code Sample 8-47.** *JSF Page Source for XUL Implementation*


    ```xml

    <?xml version="1.0" encoding="UTF-8" ?>

    <jsp:root version="1.2">

    <jsp:directive.page contentType="application/x-javaserver-faces"/>

    <f:view>

    <pro:document title="Pro JSF : ProInputDate" >

    <h:form id="form" >

    <pro:inputDate id="dateField"

    title="Date Field Component"

    value="#{inputDateBean.date}" >

    <f:convertDateTime pattern="d MMMMM yyyy" />

    <pro:validateDate availability="#{inputDateBean.getAvailability}" />

    </pro:inputDate>

    <br/>

    <h:message for="dateField" />

    <br/>

    <h:commandButton value="Submit" />

    <br/>

    <h:outputText value="#{inputDateBean.date}" >

    <f:convertDateTime pattern="d MMMMM yyyy" />

    </h:outputText>

    </h:form>

    </pro:document>

    </f:view>

    </jsp:root>

    ```


    The only step for the application developer to Ajax enable the application is
    to ensure to set the right `contentType`, which in this case is `application/x-javaserver-faces`.
    By specifying a custom `contentType` like the one in Code Sample 8-47 and Code
    Sample 8-48, you can intercept it and allow the `ResponseWriter` to decide what
    `contentType` is going to be set on the response.


    Figure 8-17 shows the result of the second page. Code Sample 8-48 shows the source
    of the second page, which contains the `showOneDeck` component source. The page
    looks the same as the previous implementations of the `showOneDeck` component
    (see Chapter 6), except this page uses a XUL RenderKit.


    **Figure 8-17.** *JSF page rendered using the XUL* `RenderKit` *and the* `ProShowOneDeck`
    *component*


    **Code Sample 8-48.** *JSF Page Source for XUL Implementation*


    ```xml

    <?xml version="1.0" encoding="UTF-8" ?>

    <jsp:root ...>

    <jsp:directive.page contentType="application/x-javaserver-faces"/>

    <f:view>

    ...

    <pro:showOneDeck showItemId="first"

    showListener="#{showOneDeckBean.doShow}">

    <pro:showItem id="first" styleClass="showItem" >

    <f:facet name="header">

    <h:panelGroup>

    <h:graphicImage url="/resources/java_small.jpg" alt="The Duke"

    style="margin-right: 8px; vertical-align:bottom;" />

    <h:outputText value="Java"/>

    </h:panelGroup>

    </f:facet>

    <h:panelGrid columns="1">

    <h:outputLink value="http://apress.com/book/bookDisplay.html?bID=10044">

    <h:outputText value="Pro JSF: Building Rich Internet Components"/>

    ...

    </f:view>

    </jsp:root>

    ```


    You might be asking yourself, “What’s so cool about this? I have seen the exact
    same page sources in two other solutions.” You are right, and that’s the beauty
    of JSF! Without impacting the application developer, you can change a `RenderKit`
    ID to use other `Renderer`s that support client-specific markup (XUL in this case)
    for optimized performance and responsiveness in the Mozilla browser.


    ### Summary


    The Mozilla Web site says it best: XUL is cool! We definitely recommend that component
    developers look at XUL as an alternative rendering technology for rich Web clients.
    Although initially it may seem overwhelming to create JSF components using XUL,
    it is actually pretty straightforward as long as you follow a well-defined blueprint.


    A direct benefit of using XUL is the declarative component model you have at your
    disposal. XUL also enhances performance and reduces the amount of JavaScript you
    have to create and maintain.


    We hope this chapter gave you a clear understanding that HTML is not the end of
    the road and that the limits of what we can do with the J2EE framework are sometimes
    in our own heads!


