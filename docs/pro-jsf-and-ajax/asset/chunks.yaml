- fmt: '# Ajax Enabling the Deck Component


    In this chapter, you will examine how to “Ajax enable” your `ProShowOneDeck` component
    and therefore improve the user experience when interacting with this component.
    As mentioned in Chapter 2, you do not need to create new `UIComponents` if the
    behavior already exists. In this case, you have already implemented the behavioral
    aspects of your `ProShowOneDeck` component in the `UIShowOne` component, so you
    need only to create a new `Renderer` that contains your client-side DHTML/Ajax
    implementation and all the resources needed to Ajax enable it.


    To do this, you will use Ajax and two open source frameworks—Delta DOM (D2) and
    the Dojo toolkit:


    - **Ajax**: Ajax is a new name describing a Web development technique for creating
    richer and more user-friendly Web applications using an already established technology
    suite—the DOM, JavaScript, and `XMLHttpRequest`.

    - **D2**: D2 (pronounced *D-squared*) is an open source project hosted on Java.net
    (`http://d2.dev.java.net/`). Delta DOM is extremely useful in the context of merging
    DOM differences into a DOM tree.

    - **Dojo toolkit**: Dojo is an open source DHTML toolkit written in JavaScript
    by Alex Russel (`http://www.dojotoolkit.org`). The Dojo toolkit contains Ajax
    features supporting a back button, bookmarking, and file upload.


    Ajax and the two open source frameworks are complementary, and in this chapter
    you will learn how you can use them to handle postback events for your `ProShowOneDeck`
    component. You will also provide a public API that can be used by all Ajax-enabled
    JSF components to turn “full” postback on and off.


    After reading this chapter, you should understand what Ajax solves and what issues
    you might encounter when creating rich user interface components with this technology.
    You will learn about D2 and how to use it to build your own *Rich Internet Components*.
    Finally, you will gain an understanding of the excellent Dojo toolkit and how
    to use it in the context of JSF and component design.


    Figure 6-1 shows the 12 classes you will create in this chapter.


    ![Image 37](index-250_1.png)


    **Figure 6-1.** *Class diagram showing classes created in this chapter*


    The classes are as follows:


    - `ExtendedRenderKit` extends an existing `RenderKit` without needing to repeat
    the registration of common `Renderer`s in `faces-config.xml`.

    - `HtmlAjaxRenderKit` can dynamically pick either the default `ResponseWriter`
    or the custom `FixedContentTypeResponseWriter`.

    - `HtmlAjaxShowOneDeckRenderer` is your new custom `Renderer`, which extends the
    `HtmlShowOneDeckRenderer` from Chapter 3 and adds JavaScript libraries to include
    Ajax support.

    - `DeferredContentTypeResponse` is responsible for wrapping the `HttpServletResponse`
    object to detect whether the JSP page directive indicates that the `ResponseWriter`
    should define the `contentType`.

    - `DeferredPrintWriter` sets the `contentType` header on the response just before
    streaming the first character of the payload.

    - `DeferredServletOutputStream` sets the `contentType` header on the response
    just before streaming the first byte of the payload.

    - The `ResponseWriterWrapper` class is only delegating, without decorating, to
    the standard `ResponseWriter`.

    - `FixedContentTypeResponseWriter` is responsible for writing out a document (content
    type `text/plain`) on any subsequent postback performed by your Ajax-enabled components.

    - `RenderKitFactoryWrapper` extends the JSF implementation’s abstract `RenderKitFactory`
    class to provide a loose coupling to the underlying JSF implementation.

    - `ExtendedRenderKitFactory` enhances the `RenderKitFactory` by adding support
    for creating `ExtendedRenderKit`s.

    - `FacesContextFactoryWrapper` is only delegating, without decorating, to the
    standard `FacesContextFactory` and provides a loose coupling to the underlying
    JSF implementation.'
