    **The Dynamic RenderKit Implementation**


    Figure 10-1 shows the dynamic RenderKit solution.


    **Figure 10-1.** *Structure of dynamic* RenderKit *implementation* The dynamic
    RenderKit solution contains three classes:


    • ViewHandlerWrapper is a wrapper class that provides a loose coupling between
    the solution and the JSF implementation.


    • ApplicationBean is a managed bean that contains logic to detect what agent has
    been used to request the application and contains information about what renderKitId
    to use.


    • DynamicRenderKitViewHandler overrides the default ViewHandler’s calculateRenderKitId()
    method in order to get the correct ID from the ApplicationBean.


