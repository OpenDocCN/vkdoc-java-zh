    关联的组件层次结构的当前状态，并且如果初始化参数 `STATE_SAVING_METHOD` 设置为客户端状态保存，则调用 `ResponseStateManager`
    从当前请求中检索状态。然后，“恢复视图”阶段将恢复后的组件层次结构传递给 `FacesContext`。


    **应用请求值阶段**


    在“应用请求值”阶段，每个输入组件从请求参数中建立提交的值，每个命令组件将一个事件排队，以便在“调用应用程序”阶段交付。图 1-18 展示了“应用请求值”阶段如何将新值传递给组件。

