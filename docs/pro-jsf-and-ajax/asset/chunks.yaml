    第 3 章 ■ 定义 DECK 组件


    **169**


    这是 deck 组件 HTML 版本的最终润色。我们意识到这个 deck 组件的复杂性，但我们认为有必要展示从零开始设计可复用新组件的各个方面，从新事件 ShowEvent
    及其对应的监听器接口 ShowListener 开始，接着是两个新的行为超类 UIShowOne 和 UIShowItem。我们还引入了 facet 的概念，并利用
    JavaScript 让您了解 JSF 的强大功能和灵活性。


    您可以复用为此组件所做的大部分工作（例如，UIShowOne、UIShowItem、ShowListener 和 ShowEvent）。接下来，我们将展示如何使用新的渲染器扩展这些行为超类，以便您能够支持更丰富的功能。


    **总结**


    本章扩展了第 2 章为您提供的蓝图。该蓝图现在包含七个步骤，涵盖了从分析 UI 原型到编写 JSP TLD 的所有内容。


    请记住，在大多数情况下，您只需要使用这七个步骤中的五个，因为最常见的场景是扩展现有的行为 UIComponent，而不是创建一个新的。


    作为蓝图的一部分，您还创建了一个特定于客户端的渲染器（HtmlShowOneDeckRenderer），其中包含了组件所需的所有属性，以及一个特定于渲染器的子类（ProShowOneDeck）。最后，您实现了对所选页面描述方式——JSP
    的支持。所有这些都遵循了第 2 章中介绍的模式；正如您可能注意到的，如果有蓝图可循，创建组件并不困难，尽管存在一定程度的重复。


    通过本章，您还了解了 JSF 事件模型，以及如何在您自己的 JSF 标签处理器中实现对自定义事件和监听器的支持。


