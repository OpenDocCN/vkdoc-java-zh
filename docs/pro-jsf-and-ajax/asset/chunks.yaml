    在本章中，你将学习如何为你的 ProShowOneDeck 组件启用 Ajax 功能，从而改善用户与该组件交互时的体验。如第 2 章所述，如果所需行为已经存在，则无需创建新的
    UIComponents。在本例中，你已经在 UIShowOne 组件中实现了 ProShowOneDeck 组件的行为层面，因此只需创建一个新的 Renderer，其中包含你的客户端
