    same page sources in two other solutions.” You are right, and that’s the beauty
    of JSF! Without impacting the application developer, you can change a RenderKit
    ID to use other Renderers that support client-specific markup (XUL in this case)
    for optimized performance and responsiveness in the Mozilla browser.


    **Summary**


    The Mozilla Web site says it best: XUL is cool! We definitely recommend that component
    developers look at XUL as an alternative rendering technology for rich Web clients.
    Although initially it may seem overwhelming to create JSF components using XUL,
    it is actually pretty straightforward as long as you follow a well-defined blueprint.


    A direct benefit of using XUL is the declarative component model you have at your
    disposal. XUL also enhances performance and reduces the amount of JavaScript you
    have to create and maintain.


    We hope this chapter gave you a clear understanding that HTML is not the end of
    the road and that the limits of what we can do with the J2EE framework are sometimes
    in our own heads!


