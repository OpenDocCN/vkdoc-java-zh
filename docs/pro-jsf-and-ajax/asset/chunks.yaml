    **362**


    第 9 章 ■ 提供微软 HTC 渲染器


    **Deck 和 Date 组件的 HTC 实现需求**


    本章中 ProInputDate 和 ProShowOneDeck 组件的需求很简单——你需要利用微软 Internet Explorer 提供的声明式组件模型。为此，你需要为
    deck 和 date 组件提供特定于 HTC 的 Renderer 类。与第 6 章和第 7 章创建的 deck 和 date 组件所提供的功能相比，支持这种特定于客户端的组件模型不应有任何功能损失。


    学完本章后，你应该理解 DHTML 行为与 HTC 之间的区别，了解使用这些技术创建丰富用户界面组件时能获得哪些好处，以及可能遇到哪些问题。


    **HTC 为 JSF 带来的价值**


    HTC 为组件编写者带来的好处与 XUL 类似。然而，Internet Explorer 并未提供任何内置的 HTC 可视化组件。HTC 组件模型是 Internet
    Explorer 运行时引擎的一部分，因此无需在将 JSF 页面结构发送到客户端之前，在服务器上将其“展开”为适当的标记。这反过来会减少网络负载，因为渲染是由客户端而非实际的服务器实现来完成的。


    当然，HTC 还提供了开箱即用的丰富客户端交互性，例如弹出功能，从而消除了组件编写者通过 Ajax 等替代方案来实现此功能的需求。


    在本章中，你将学习如何将 Ajax 异步通信通道——XMLHttpRequest——与 HTC 提供的组件模型相结合，以设计可重用且高度交互的标准 JSF
    组件。


    **JSF 为 HTC 带来的价值**


    JSF 为 HTC 带来的好处与它为 XUL 带来的好处相同：即 JSP 和 Java 的通用应用程序编程模型。而且，你可以将关于 XUL 的相同论点应用于
    HTC；对 HTC 感兴趣的开发者可以直接使用 HTC，但关键在于，JSF 提供了一种熟悉的编程模型和一个标准的请求生命周期，其中包括自动状态保存与恢复、验证、数据模型和事件处理。


    **Deck 和 Date 组件的 HTC 实现**


    对于 JSF 组件编写者而言，微软在其 HTC 组件模型中利用 HTML 标记这一事实，为他们提供了一种简单的封装技术——一个扩展名为.htc 的常规 HTML
    文件。因此，本章的主角是 HTC。


    ![图片 85](img/index-388_1.png)


    5807ch09.qxd 1/19/06 6:02 PM 第 363 页


    第 9 章 ■ 提供微软 HTC 渲染器


    **363**


    HTC 在微软 Internet Explorer 5 中引入，它提供了一种机制，可以在脚本中将组件实现为 DHTML 行为。HTC 文件以.htc 扩展名保存，是一个包含脚本和一组特定于
    HTC 的元素的 HTML 文件，这些元素将 HTML 文档发布为一个组件。


    学完本章后，你应该能够使用微软的 DHTML 行为技术创建丰富的用户界面组件。


    图 9-1 显示了本章将要创建的三个类。


    **图 9-1.** *显示本章创建的所有类的类图* 这些类如下：


    • HtmlDocumentRenderer 是负责在 HTML 文档中写入根元素的 Renderer。

    • HtcAjaxInputDateRenderer 是 date 组件的一个新的自定义 Renderer，它扩展了第 2 章创建的 HtmlInputDateRenderer，并添加了资源以包含
    HTC 和 Ajax 支持。

    • HtcAjaxShowOneDeckRenderer 是 deck 组件的一个新的自定义 Renderer，它扩展了第 2 章创建的 HtmlRenderer
    超类，并添加了资源以包含 HTC 和 Ajax 支持。


    **使用蓝图设计 JSF HTC 组件**


    蓝图，蓝图，还是蓝图！创建 JSF 组件的蓝图设计方式使其适用于任何标记语言。由于 HTC 利用了 HTML 标记，因此它可以使用 JSF 实现提供的默认
    HTML RenderKit。或者，你也可以利用第 6 章创建的 HtmlAjaxRenderKit。使用 HtmlAjaxRenderKit 的原因是它已经为
    HTML 设计并支持 Ajax 回发。在本章中，你将简单地遵循第 7 章最终确定的相同蓝图，特别是步骤 1、5、7、11 和 12。


    我们将展示如何通过将新组件实现为最终将发送到客户端的预期标记来定义它。


    **步骤 1：创建 UI 原型**


    为了能够在本章中对你想要实现的目标进行原型设计，你必须使用 HTML、DHTML 行为和 HTC 文件类型，以找出需要哪些元素、渲染器特定属性以及其他资源（例如
    JavaScript、图像等）。


    ![图片 86](img/index-389_1.png)


    5807ch09.qxd 1/19/06 6:02 PM 第 364 页


