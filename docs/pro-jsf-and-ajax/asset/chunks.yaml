    HtmlDocumentRenderer 类


    `HtmlDocumentRenderer` 类（见图 9-8）基本上是您在第八章中创建的 `XulDocumentRenderer` 的一个移植。通过将
    `XulDocumentRenderer` 代码移植到 HTML 版本，您现在可以为应用程序开发者提供一个完整的解决方案，允许组件编写者无需更改实际应用程序页面描述即可切换
    RenderKit。


    **图 9-8.** *显示* HtmlDocumentRenderer *类的类图* 另一个额外的好处是，当您扩展 `HtmlRenderer` 时，脚本资源具有“至多一次”的语义。


    HTML 文档渲染器的唯一要求是支持在不同客户端上运行应用程序，而无需强制应用程序开发者为每个客户端提供不同的解决方案。`HtmlDocumentRenderer`
    是一个控制渲染到客户端的根元素的顶级组件，它提供了巨大的可能性，并为组件编写者提供了对标记的完全控制。


    您可以将 `HtmlDocumentRenderer` 作为任何以 HTML 为默认标记的渲染器（例如 `HtmlInputDateRenderer`、`HtmlAjaxInputDateRenderer`
    和 `HtcAjaxInputDateRenderer`）的根组件。代码示例 9-14 展示了 `HtmlDocumentRenderer` 的 `encodeBegin()`
    方法。


