    These dates can then be validated against user entries in the `ProInputDate` text
    field. Third, you want to be able to reuse the same managed bean defined for the
    `Validator` to fetch the list of available dates in the visual calendar, if the
    validator is attached to the `ProInputDate` component.


    To do this, you will use Ajax, two open source frameworks (the Dojo toolkit and
    Mabon), and the JSON data-interchange format. You’ve worked with Ajax and the
    Dojo toolkit before, but the following are new:


    - **JSON**: JSON is a lightweight data-interchange format. It is based on a subset
    of the JavaScript programming language (Standard ECMA-262, Third Edition). JSON
    is a text format that is completely language independent but uses conventions
    that are familiar to programmers of the C family of languages, including C, C++,
    C#, Java, JavaScript, Perl, Python, and many others.


    - **Mabon**: Mabon is an open source project hosted on the Java.net Web site (`http://mabon.dev.java.net`),
    and it stands for Managed Bean Object Notation. Mabon allows the component author
    of Ajax-enabled components to access JSF managed beans outside the scope of the
    standard JSF lifecycle by using a JSON-syntax communication channel.


    In this chapter, you will look at how you can leverage Ajax, Mabon, JSON, and
    the Dojo toolkit to provide a visual calendar and asynchronously fetch data for
    the `ProInputDate` component.


    After reading this chapter, you should have an understanding of the difference
    between Ajax event and data fetch, as well as what issues you may run into while
    creating rich user interface components with this technology. You should also
    gain knowledge of an open source project called Mabon and how you can use it to
    build your own rich Internet components.


