    5807ch04.qxd 1/13/06 2:50 PM Page 212


    5807ch05.qxd 1/13/06 2:56 PM Page 213


    C H A P T E R 5


    ■ ■ ■


    Loading Resources


    with Weblets


    *If we have learned one thing from the history of invention and discovery, it
    is that in* *the long run—and often in the short one—the most daring prophecies
    seem laughably* *conservative.*


    —Arthur C. Clarke (1917–), *The Exploration of Space*, 1951


    Web applications often use many different resource files, such as images, style
    sheets, or scripts, to improve the presentation and interactivity of the user
    interface. JSF component libraries that want to render attractive user interfaces
    will also leverage resource files.


    The standard approach to providing resource files for a JSF component library
    is to serve them directly from the Web application root file system. These resources
    are usually packaged in an archive (such as a ZIP file) and are shipped separately
    from the JSF component library.


    This chapter will introduce a new open source project—Weblets. The goal of this
    project (located at http://weblets.dev.java.net) is to provide component writers
    with the ability to serve resource files from a Java archive (JAR), rather than
    serving them from the Web application root file system. Unlike traditional Web
