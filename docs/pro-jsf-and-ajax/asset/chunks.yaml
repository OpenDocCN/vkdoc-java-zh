- fmt: '# This approach adds functionality to the `Renderer` to detect the Ajax request.
    The JSF default lifecycle first restores the component hierarchy during the Restore
    View phase, and the `Renderer` takes control during the Apply Request Values phase.
    After the Ajax request has been processed, the `Renderer` calls `responseComplete()`
    on the `FacesContext` to terminate processing of remaining phases in the `Lifecycle`.
    On the surface this may seem like the preferred approach, but it has some severe
    drawbacks.


    A component hierarchy is required, which can incur additional overhead for each
    request, especially when client-side state saving is used. Calling the `responseComplete()`
    method will take effect only after this phase is done processing. The Apply Request
    Values phase calls the `decode()` method on all `Renderer`s in the view, which
    can cause undesired side effects that are out of your control, such as a `commandButton`
    set to `immediate="true"` by the application developer. This causes application
    logic to be called before the Apply Request Values phase is complete.


    Additionally, this approach typically requires HTTP POST to send the state string
    back to the server.


    ## The PhaseListener Approach


    This approach adds a `PhaseListener` (`PhaseId.RESTORE_VIEW`) that short-circuits
    the `Lifecycle` and does all the processing in the `PhaseListener` itself. When
    it is done, it calls `responseComplete()` on the `FacesContext`.


    For this approach to work, it has to render a reference containing information
    about the managed bean used by the `Validator` in the initial request. The `PhaseListener`
    uses this information during postback to create a `MethodBinding` that can then
    be used to invoke logic behind the validator and return data to the client. Since
    there is no component hierarchy created, and thus no `Renderer`s, there is no
    risk that command components with `immediate` set to `true` will cause any side
    effects.


    But, this approach has one issue; there is no way to prevent application developers
    from attaching additional `PhaseListener`s at the same phase, which can cause
    undesired side effects.


    Also, you have no way of knowing in which order these `PhaseListener`s will be
    executed.


    ## The Lifecycle Approach


    This approach adds a new `Lifecycle` that is mapped to an Ajax request and contains
    only the lifecycle phases needed to process the request, invokes the application
    logic defined by a `MethodBinding`, and renders the response. This eliminates
    the overhead of creating and restoring the component tree, and thus no `Renderer`s
    are required. You will also not encounter any issues with `immediate="true"`.


    Another positive side effect of using a custom `Lifecycle` is that any `PhaseListener`
    added by the application developer will have no impact on this solution; application
    developers can even add `PhaseListener`s to this custom `Lifecycle`. However,
    if a custom `PhaseListener` is used to place additional managed beans onto the
    request, you can run into issues, unless they are registered for the custom `Lifecycle`
    as well.


    ## Selecting a JSF Ajax Approach


    In this book, we have decided to go with the `Lifecycle` approach, since it has
    no application logic side effects and low overhead. It is here that the Mabon
    open source project can help you focus on the design of your Ajax calendar component.


    ## Issue with Relative Variables


    One valid approach of defining a `MethodBinding` is to use relative variables
    in the `MethodBinding` expression. This will have an unfortunate impact on both
    the `PhaseListener` approach and the `Lifecycle` approach. For a data fetch to
    work with these two approaches, you need absolute variables in the `MethodBinding`
    expression (for example, `#{ backingBean.getValidDates}`).


    An example of a `MethodBinding` expression using relative variables would be a
    `UIData` component (for example `<h:dataTable ...>`) that is stamping out information
    about employees.'
  raw: 'This approach adds functionality to the Renderer to detect the Ajax request.
    The JSF default lifecycle first restores the component hierarchy during the Restore
    View phase, and the Renderer takes control during the Apply Request Values phase.
    After the Ajax request has been processed, the Renderer calls responseComplete()
    on the FacesContext to terminate processing of remaining phases in the Lifecycle.
    On the surface this may seem like the preferred approach, but it has some severe
    drawbacks.


    A component hierarchy is required, which can incur additional overhead for each
    request, especially when client-side state saving is used. Calling the responseComplete()
    method will take effect only after this phase is done processing. The Apply Request
    Values phase calls the decode() method on all Renderers in the view, which can
    cause undesired side effects that are out of your control, such as a commandButton
    set to immediate="true" by the application developer. This causes application
    logic to be called before the Apply Request Values phase is complete.


    Additionally, this approach typically requires HTTP POST to send the state string
    back to the server.


