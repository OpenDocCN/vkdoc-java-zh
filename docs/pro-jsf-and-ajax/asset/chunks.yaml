- fmt: '# Registering a `UIComponent` and `Renderer`


    Register your new `UIComponent` and `Renderer` in the `faces-config.xml` file.


    # Creating a JSP Tag Handler and TLD


    This step is needed in the case you are using JSP as your default view handler.
    An alternative solution is to use Facelets (http://facelets.dev.java.net/).


    # Creating a `RenderKit` and `ResponseWriter`


    (Optional) If you plan to support alternative markup such as Mozilla XUL, then
    you need to create a new `RenderKit` with an associating `ResponseWriter`. The
    default `RenderKit` is `HTML_BASIC` with the `contentType` set to `text/html`.


    # Extending the JSF Implementation


    (Optional) This step is needed in the case you have to provide extensions to the
    JSF implementation (for example, extending JSF factory classes or providing a
    custom JSF lifecycle implementation).


    # Registering the `RenderKit` and JSF Extension


    (Optional) Register your custom `RenderKit` and/or extensions to the JSF implementation.


    # Registering Resources with Weblets


    (Optional) Register your resources such as images, JavaScript libraries, and CSS
    files with Weblets so that they can be packaged and loaded directly out of the
    component library JAR file.


    ![Image 69](index-332_1.png)


    5807ch08.qxd 1/19/06 7:21 PM Page 307


    C H A P T E R 8 ■ P R OV I D I N G M O Z I L L A X U L R E N D E R E R S


    **307**


    It might seem like a lot of work to have to cover nine out of twelve steps just
    to provide a XUL implementation, but you have already done most of the work in
    previous chapters; as such, each step is fairly simple. Let’s start with step
    1 and look at the new components’ markup.


    ## Step 1: Creating a UI Prototype


    To be able to prototype what you want to achieve in this chapter, you will have
    to use XUL to find out what XUL elements, renderer-specific attributes, and other
    resources (for example, JavaScript, images, and so on) you need. Since you are
    providing a XUL implementation for both the date and deck components, you also
    have to provide two prototypes, one for each component.


    > **Note** During our research for information about XUL and XBL, we found two
    really good resources on the Internet: Mozilla (http://www.mozilla.org/projects/xul/)
    and XULPlanet (http://www.xulplanet.com/).


    ### The XUL Date Implementation Prototype


    Figure 8-2 shows the end result of the `<pro:inputDate>` prototype implemented
    in XUL.


    **Figure 8-2.** *The* `<pro:inputDate>` *component implemented in a XUL page*


    Code Sample 8-1 shows the XUL markup for a page using the XUL `<pro:inputDate>`
    prototype shown in Figure 8-2.


    **Code Sample 8-1.** *The Markup Needed to Create the XUL Prototype Page*


    ```xml

    <?xml version="1.0" ?>

    <?xml-stylesheet href="projsf-ch8/document.css" type="text/css"?>

    <?xml-stylesheet href="projsf-ch8/pro.css" type="text/css"?>

    <xul:window

    5807ch08.qxd 1/19/06 7:21 PM Page 308

    308

    C H A P T E R 8 ■ P R OV I D I N G M O Z I L L A X U L R E N D E R E R S

    orient="horizontal" align="start"

    title="Pro JSF : ProInputDate">

    <xul:hbox align="center" flex="1">

    <xul:script type="text/javascript" src="/.../faces/weblets/mabon/mabon.js"/>

    <xul:script type="text/javascript">

    var djConfig={preventBackButtonFix: true,

    libraryScriptUri:''/.../faces/weblets/dojo/dojo.js''};

    </xul:script>

    <xul:script type="text/javascript" src="/.../faces/weblets/dojo/dojo.js"/>

    <pro:inputDate id="dateField"

    value="31 October 2005"

    pattern="d MMMMM yyyy"

    targetURL="projsf-ch8/sample-availability.json"/>

    </xul:hbox>

    </xul:window>

    ```


    A XUL document requires two elements to be valid: an XML processing instruction
    (`<?xml version="1.0"?>`) on the first line that identifies the file as XML and
    a `window` element (`<window>`) that defines the XUL Web page, which is similar
    to `<html>` for HTML.


    > **Caution** At the time of writing, the Dojo toolkit needs to be configured
    to work with XUL, and therefore you need the `preventBackButtonFix` workaround.
    This should go away in a future release of the Dojo toolkit.'
