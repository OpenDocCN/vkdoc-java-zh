    **Summary**


    In this chapter, we discussed how to use Ajax in general terms and as part of
    JSF, and we also talked about what pros and cons it brings to the plate. We also
    covered different architectural approaches implementing Ajax support in JSF—PPR
    and D2R. In addition, we discussed potential pitfalls of Ajax, such as file upload
    support, and how to solve them in the context of JSF.


    We explored how to use two open source projects—the Dojo toolkit and D2 project—to
    Ajax enable your ProShowOneDeck component and prove that providing richer functionality
    in well-defined and easy-to-use JSF components is not hard. With the use of rich
    toolkits such as Dojo and D2, the number of resource files is increasing, and
    weblet functionality provides an easy way to package your additional resources
    into the same library as your components.


    From this chapter, you gained an understanding of how to Ajax enable JSF components
    using available resources and now have a deeper understanding of the contentType
    issue between JSP and JSF. You also gained knowledge about how you solve the contentType
    issue and allow JSF to control the contentType, which will give you the opportunity
    to support multiple content types when needed.


