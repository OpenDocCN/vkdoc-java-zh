    \ rgb(32,80,255);\n  color: white;\n  font-weight: bold;\n}\n\n.ProInputDateCalendar\
    \ tbody .today\n{\n  font-weight: bold;\n}\n```\n\nThese styles use *descendant\
    \ selectors* relative to the element with the class `ProInputDateCalendar`. Descendant\
    \ selectors are a way to apply styles to specific areas of a page to reduce the\
