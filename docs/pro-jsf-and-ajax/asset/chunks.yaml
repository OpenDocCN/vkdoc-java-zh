    \    <weblet-name>com.apress.projsf.ch7</weblet-name>\n    <weblet-class>net.java.dev.weblets.packaged.PackagedWeblet</weblet-class>\n\
    \    <init-param>\n      <param-name>package</param-name>\n      <param-value>com.apress.projsf.ch7.render.html.ajax.resources</param-value>\n\
    \    </init-param>\n  </weblet>\n  ...\n  <weblet-mapping>\n    <weblet-name>com.apress.projsf.ch7</weblet-name>\n\
    \    <url-pattern>/projsf-ch7/*</url-pattern>\n  </weblet-mapping>\n</weblets-config>\n\
    ```\n\nThe `PackagedWeblet` is a built-in weblet implementation that can read\
    \ from a particular Java package using the `ClassLoader` and stream the result\
    \ to the browser. The package initialization parameter tells the `PackagedWeblet`\
    \ which Java package to use as a root when resolving weblet-managed resource requests.\n\
    \n## Summary\n\nThis chapter discussed how you can use Ajax to fetch data and\
    \ how you can leverage the JSF managed bean facility as a data source.\n\nThe\
    \ chapter also covered the different `XMLHttpRequest` response types—`responseText`\
    \ and `responseXML`—that you can use to return the result from the server. We\
    \ also showed you how to use the `eval()` function to efficiently parse JSON-syntax\
    \ responses.\n\nWe covered a new open source project called Mabon that extends\
