- fmt: "The Mabon project provides a convenience JavaScript library that you can use\
    \ to send your request to the server. The Mabon `send()` function leverages the\
    \ Dojo toolkit’s `bind()` function to asynchronously communicate with the server.\
    \ We discussed the Dojo toolkit in Chapter 6.\n\nCode Sample 7-10 shows the source\
    \ of the Mabon JavaScript library.\n\n**Code Sample 7-10.** *The* `mabon.js` *Library*\n\
    \n```\nvar mabon = new Object();\n\nmabon.send = function (\n\nkvparams)\n\n{\n\
    \nvar content = {args:'[' + kvparams.args.join(',') + ']'}; dojo.io.bind(\n\n\
    {\n\nurl: kvparams.url,\n\nmethod: 'get',\n\ncontent: content,\n\nmimetype: \"\
    text/javascript\",\n\nload: function(type, data, evt) { kvparams.callback(eval(data));\
    \ }, error: function(type, data, evt)\n\n{\n\nalert('Oops! The server returned\
    \ an error, please try again.');\n\n}\n\n});\n\n}\n```\n\nThe Mabon `send()` function\
    \ takes one argument—a Map. To call the `mabon.send()` function from your Ajax\
    \ implementation, you would have to construct the Map using JavaScript Map syntax,\
    \ as shown in Code Sample 7-11.\n\n**Code Sample 7-11.** *Passing Arguments to\
    \ the Mabon* `send()` *Function*\n\n```\nmabon.send(\n\n{ url: targetURL,\n\n\
    args: [item1, item2],\n\ncallback: callback_function }\n\n);\n```\n\n**Mabon Protocol**\n\
    \nNow that you know how to configure Mabon, it is time to look at how you can\
    \ reference managed beans that are needed to fetch data.\n\nThe Mabon protocol-like\
    \ syntax is convenient and easy to understand. The syntax starts with `mabon:/`\
    \ followed by the managed bean name and finally the method name, as shown in Code\
    \ Sample 7-12.\n\n**Code Sample 7-12.** *Using the* `mabon:/` *Syntax*\n\n```\n\
    ViewHandler.getResourceURL(context, \"mabon:/<managed bean name>.<method>\");\n\
    ```\n\nThe syntax uses a prefix to indicate this is a Mabon-managed request, the\
    \ managed bean name, and the method needed. This syntax—`<mabon prefix><managed\
    \ bean><method>`—defined by the Mabon contract is used to return a target URL\
    \ referencing the managed bean. The target URL will be intercepted by the `FacesLifecycleServlet`\
    \ and deciphered by the Mabon Apply Request Values phase.\n\n> **Note** Although\
    \ the Mabon project uses a protocol-like syntax to reference managed beans, this\
    \ is not a real protocol handler, so the `new URL(\"mabon:/...\").openStream()`\
    \ would not work from Java code—but you don’t need it to, since the client is\
    \ not Java code.\n\n**The `HtmlAjaxInputDateRenderer` Class**\n\nThe `HtmlAjaxInputDateRenderer`\
    \ (see Code Sample 7-13) extends the `HtmlInputDateRenderer` to add a pop-up calendar\
    \ and Ajax-based data fetch of available days.\n\n**Code Sample 7-13.** *Determine\
    \ Date Pattern and Launch Calendar Pop-Up*\n\n```\npackage com.apress.projsf.ch7.render.html.ajax;\n\
    \nimport java.io.IOException;\nimport java.text.DateFormat;\nimport java.text.SimpleDateFormat;\n\
    import java.util.Map;\nimport javax.faces.application.Application;\nimport javax.faces.application.ViewHandler;\n\
    import javax.faces.component.UIComponent;\nimport javax.faces.component.UIInput;\n\
    import javax.faces.context.FacesContext;\nimport javax.faces.context.ResponseWriter;\n\
    import javax.faces.convert.Converter;\nimport javax.faces.convert.DateTimeConverter;\n\
    import javax.faces.el.MethodBinding;\nimport javax.faces.validator.Validator;\n\
    import com.apress.projsf.ch2.render.html.basic.HtmlInputDateRenderer;\nimport\
    \ com.apress.projsf.ch7.validate.DateValidator;\n\n/**\n * HtmlAjaxInputDateRenderer\
    \ extends the HtmlInputDateRenderer\n * to add a pop-up calendar and Ajax-based\
    \ data fetch of available days.\n */\npublic class HtmlAjaxInputDateRenderer extends\
    \ HtmlInputDateRenderer\n{\n    /**\n     * Encodes the content of this component,\
    \ including a button to\n     * trigger the pop-up calendar.\n     *\n     * @param\
    \ context the Faces context\n     * @param component the Faces component\n   \
    \  *\n```"
