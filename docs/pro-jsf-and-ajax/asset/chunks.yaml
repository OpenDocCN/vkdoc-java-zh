    **JSF NAMINGCONTAINER**


    为了确保每个组件的唯一性，JSF 提供了一个 NamingContainer 标记接口。在实现了 NamingContainer 的组件内部，每个子组件都必须拥有一个局部唯一的标识符。


    这一点由 `ViewHandler` 上的 `renderView()` 方法强制执行，在基于 JSP 的应用程序中，也由 `UIComponentTag`
    强制执行。只有当你的组件以类似于 `HtmlDataTable` 组件的方式生成其子组件时，为自己的组件实现 NamingContainer 才会有用。


    如果客户端标记无法理解 JSF 默认生成的客户端 ID（例如，`_id1`、`_id2` 等），组件编写者可以决定重写一个名为 `convertClientId()`
    的方法。


    如果 UIComponent 有一个 Renderer，那么 `getClientId()` 方法最后调用的就是 `convertClientId()` 方法。这确保了
    Renderer 可以最终决定将哪个客户端 ID 发送给客户端。例如，XHTML 对片段标识符的规则比 HTML 严格得多，因为 XHTML 不允许标识符以下划线或冒号开头。（请参阅
    http://www.w3.org/TR/xhtml1/#C_8 上的 XHTML 1.0 规范。）


    ■**注意** 作为良好实践，始终在 JSP 页面描述中的 `<h:form>` 组件上设置 ID。


    **向客户端写入输出**


    现在你已经验证了值、客户端 ID 以及其他特定于渲染器的属性，是时候通过 JSP 缓冲体标签将必要的标记和资源写回浏览器了。使用 `ResponseWriter`
    类，你可以利用一些便捷方法来生成正确的标记。在此示例中，你将使用 `startElement()`、`writeAttribute()` 和 `endElement()`
    方法。然而，这些并不是 `ResponseWriter` 类实现的唯一方法。表 2-3 列出了 JSF `ResponseWriter` 类提供的一些有用方法。

