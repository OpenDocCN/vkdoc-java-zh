    ## Summary


    You have now completed four different solutions for the `ProInputDate` and `ProShowOneDeck`
    components. You used traditional HTML Renderers, HTML Ajax Renderers, XUL Ajax
    Renderers, and HTC Ajax Renderers. Who said JSF is not a rich client development
    platform?


    With the experience you have gained so far, it is important to keep in mind that
    an application developer might be using your component in combination with other
    technologies that you did not even consider. You need to keep the abstraction
    for the application developer, and although tempting, you should not design your
    component with a dependency on the client-side rendered markup, since you do not
    have control over other components’ generated markup.


    One of things you want you to take from this chapter is that you should stay open
    to new and controversial suggestions; do not get locked into one technology stack
    because it is what you know or is what others tell you is the latest and greatest.
    Always ask yourself, “How can this solve my problems?”


    After reading this chapter, you should have a clear understanding of what HTC
    is and how you can leverage it in your component design.


