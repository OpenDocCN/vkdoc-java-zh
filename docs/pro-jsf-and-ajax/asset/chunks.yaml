    **215**


    **Using Weblets**


    The open source Weblets project aims to solve the resource-packaging problem in
    a generic and extensible way so that all JSF component writers can leverage it,
    and it places no additional installation burden on the application developer.


    A *weblet* acts as a mediator that intercepts requests from the client and uses
    short URLs to serve resources from a JAR file. Unlike the servlet or filter approach,
    a weblet can be registered and configured inside a JAR file, so the component
    library Renderers, their resource files, and the weblet configuration file (weblets-config.xml)
    can all be packaged together in the same JAR file. You do not need to separately
    deploy additional installables when the component libraries are upgraded to new
    versions. For the application developer, no configuration steps are needed.


    It is important to note that all resources served up by weblets are *internal*
    resources, used only by the Renderer. Any resources, such as images, that are
    provided by the application are supplied as component attribute values and loaded
    from the context root as *external* resources.


    **Exploring the Weblet Architecture**


    Although weblets were designed to be used by any Web client, the weblet implementation
    has been integrated with JSF using a custom ViewHandler, called WebletsViewHandler,
    as shown in Figure 5-1\. During the rendering of the main JSF page, the WebletsViewHandler
    is responsible for converting weblet-specific resource URLs into the actual URLs
    used by a browser to request weblet-managed resources.


    **Figure 5-1.** *High-level overview of weblet architecture*


    5807ch05.qxd 1/13/06 2:56 PM Page 216


    **216**


    C H A P T E R 5 ■ L OA D I N G R E S O U R C E S W I T H W E B L E T S


    After receiving the rendered markup for the main page, the browser downloads each
    additional resource using a separate request. Each request for a weblet-managed
    resource is intercepted by the WebletsPhaseListener, which then asks the WebletContainer
    to stream the weblet-managed resource file from the component library JAR file.


    The weblet container is designed to leverage the browser cache where possible.
    This improves the overall rendering performance by minimizing the total number
    of requests made for weblet-managed resource files.


    To ensure flexibility, ensure optimization, and avoid collisions with existing
    web application resources, application developers can configure weblets to override
    any default settings provided by the component writer.


    **Using Weblets in Your Component Library**


    You can configure weblets using a weblets-config.xml file, which must be stored
    in the


    /META-INF directory of the component library JAR file. Configuring a weblet is
    similar to configuring a servlet or a filter. Each weblet entry in the weblets-config.xml
    file has a weblet name, an implementation class, and initialization parameters.
    The weblet mapping associates a particular URL pattern with a specific weblet
    name, such as com.apress.projsf.ch5\. The weblet name and default URL pattern
    define the public API for the weblet-managed resources and should not be modified
    between releases of the component library in order to maintain backward compatibility.


    As shown in Code Sample 5-2, the example component library packages resources
    in the com.apress.projsf.ch5.renderer.html.basic.resources Java package and makes
    them available to the browser using the default URL mapping of /projsf-ch5/*.


    **Code Sample 5-2.** *Weblets Configuration File—* weblets-config.xml


    <?xml version="1.0" encoding="UTF-8" ?>


    <weblets-config >


    <weblet>


    **<weblet-name>com.apress.projsf.ch5</weblet-name>**


    **<weblet-class>**


    **net.java.dev.weblets.packaged.PackagedWeblet**


    **</weblet-class>**


    <init-param>


    **<param-name>package</param-name>**


    **<param-value>com.apress.projsf.ch5.render.html.basic.resources</param-value>**


    </init-param>


    </weblet>


    <weblet-mapping>


    <weblet-name>com.apress.projsf.ch5</weblet-name>


    **<url-pattern>/projsf-ch5/*</url-pattern>**


    </weblet-mapping>


    </weblets-config>


    The PackagedWeblet is a built-in weblet implementation that can read from a particular
    Java package using the ClassLoader and then stream the result to the browser.
    The package


