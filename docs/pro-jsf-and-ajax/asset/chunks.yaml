    Here is where the similarities end; instead of returning null, the restoreView()
    method will return the current state of the component hierarchy associated with
    a particular viewId and FacesContext from the StateManager, and if the init parameter—STATE_SAVING_METHOD—


    is set to client-side state-saving, call the ResponseStateManager to retrieve
