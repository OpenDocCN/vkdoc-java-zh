    First you set the <view-handler> to point to the custom ViewHandler—


    DynamicRenderKitViewHandler. Then you define the ApplicationBean in the same way
    most application developers would define their own managed beans. Notice that
    you set the managed bean on the application scope so that there will be only one
    instance for all Web applications.


    You have now reached the end of this chapter—and the end of the book. You should
    now be able to dynamically switch RenderKits at runtime. This solution to switch
    RenderKits is not specific to the components created in this book; any component
    library can use the same technique with multiple RenderKits. Figure 10-4 shows
