    example, working days). All other days (for example, holidays and weekends) should
    be displayed but not be selectable. When a date is selected, it should be copied
    to the input field using the correct date format. When a value is submitted back
    to the server, it should successfully pass validation only if it is an available
    date (for example, a working day).


