    }\n```\n\n## The `XulAjaxInputDateRenderer` Class\n\nHow will XUL make your life\
    \ easier? Although XUL/XBL reduces some of the work involved in building prototypes,\
    \ you have some work to do. However, you still have to see the real gains of using\
    \ a well-defined component model to design the JSF components. So, without further\
    \ ado, Figure 8-9 shows the JSF XUL implementation.\n\n**Figure 8-9.** *Class\
    \ diagram showing the* `XulAjaxInputDateRenderer` *class*\n\nThe `XulAjaxInputDateRenderer`\
    \ really contains all the cool implementations. What is interesting about this\
    \ `Renderer` is that you can recognize most of the code from previous chapters,\
    \ while the actual output to the client is significantly smaller. XUL allows you\
    \ to reuse the prototype by adding the functional `bindings.xml` and `pro.css`\
    \ prototype files to the resources. The only element you need to write out to\
    \ the client for this JSF XUL component is `<pro:inputDate ...>` and its attributes.\n\
    \nBy overriding the `XulRenderer` base class's `encodeResources()` method (see\
    \ Code Sample 8-21), you extend the `XulAjaxInputDateRenderer` with a new call\
    \ to the `dojo.js` and `mabon.js` libraries. An application developer might add\
    \ two or more `ProInputDate` components to the page, but the semantics behind\
    \ the `writeScriptResource()` method provided by the `XulRenderer` implementation\
    \ will make sure these resources are written only once.\n\n**Code Sample 8-21.**\
    \ *The* `XulAjaxInputDateRenderer`\n\n```java\npackage com.apress.projsf.ch8.render.xul.ajax;\n\
    \nimport java.io.IOException;\nimport java.text.DateFormat;\nimport java.text.SimpleDateFormat;\n\
    import java.util.Map;\nimport java.util.TimeZone;\n\nimport javax.faces.application.Application;\n\
    import javax.faces.application.ViewHandler;\nimport javax.faces.component.UIComponent;\n\
    import javax.faces.component.UIInput;\nimport javax.faces.context.FacesContext;\n\
    import javax.faces.context.ResponseWriter;\nimport javax.faces.convert.Converter;\n\
    import javax.faces.convert.DateTimeConverter;\nimport javax.faces.el.MethodBinding;\n\
    import javax.faces.validator.Validator;\n\nimport com.apress.projsf.ch8.render.xul.XulRenderer;\n\
    import com.apress.projsf.ch7.validate.DateValidator;\n\npublic class XulAjaxInputDateRenderer\
    \ extends XulRenderer\n{\n    protected void encodeResources(\n        FacesContext\
    \ context,\n        UIComponent component) throws IOException\n    {\n       \
    \ writeScriptResource(context, \"weblet://net.java.dev.mabon/mabon.js\");\n  \
    \      writeScriptResource(context, \"weblet://org.dojotoolkit.browserio/dojo.js\"\
