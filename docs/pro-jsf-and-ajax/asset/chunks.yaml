    /**


    * Transfers the property values from this tag to the component.


    *


    * @param component the target component


    */


    protected void setProperties(


    UIComponent component)


    {


    super.setProperties(component);


    // Behavioral properties


    setValueBindingProperty(component, "converter", _converter); setBooleanProperty(component,
    "immediate", _immediate); setBooleanProperty(component, "required", _required);
    setValueBindingProperty(component, "validator", _validator); setStringProperty(component,
    "value", _value); setMethodBindingProperty(component, "valueChangeListener", _valueChangeListener,


    new Class[] { ValueChangeEvent.class });


    // Renderer-specific attributes


    setStringProperty(component, "title", _title);


    }


    }


