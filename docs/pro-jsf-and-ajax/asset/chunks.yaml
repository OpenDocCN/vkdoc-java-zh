    The XML data island created in Code Sample 9-3 contains markup defining the inner
    HTML of the calendar component. The calendar is an ordinary HTML <table> element
    with a header for the title, a row for the navigation controls, and several rows
    and cells making up the actual calendar month.


    In the <head> section of the HTC file, as shown in Code Sample 9-4, you define
    the element behavior prototype using the HTC-specific <public:component> element.


    **Code Sample 9-4.** *The* <head> *Element in the* <pro:inputDate> *HTC Component*


    <head>


    **<public:component tagName="inputDate" >**


    **<public:defaults viewlinkcontent="true" />**


    <public:property name="value" />


    <public:property name="pattern" />


    <public:property name="targetURL" />


    **<public:attach event="ondocumentready" handler="_constuctor" />**


    </public:component>


    The enclosing <public:component> element has the name and tagName attributes set
    to inputDate. The name attribute identifies the element behavior, and the tagName
    attribute specifies the name of the custom tag. The code also has the <public:default>
    element’s viewlinkcontent attribute set to true. This means the content of the
    element behavior is not exploded into the HTML document. Also, three public attributes
    (value, pattern, and targetURL)—or *properties* as they are called in HTC—are
    defined on the element behavior.


    Although no <constructor> element exists like you had in XUL, other facilities
    initialize content that the element behavior uses. In Code Sample 9-4, you are
    using the <public:attach> element to bind an event handler (_constructor) to an
    HTC-specific event (oncontentready or ondocumentready). In this case we chose
    ondocumentready to work around a bug in Internet Explorer. Table 9-2 lists the
    HTC-specific events.'
  trans: '

    与 XUL 相比，HTC 最显著的变化是使用 HTML 而非 XML 作为交付载体。你还需要在 `<html>` 元素中定义命名空间前缀 `pro`。然后，你可以导入并绑定
    HTC 组件（即所谓的*元素行为*）到 `pro` 命名空间中的特定标签名。你在 HTC 组件内部定义标签名，一旦导入该 HTC 组件，就可以在页面中使用带有前缀
    `pro` 的元素行为（例如 `<pro:inputDate>`）。


    当 HTC 仅需一个元素 `<pro:inputDate>` 时，你也能看到使用 HTC 相比传统 HTML 的优势。HTML 会显得冗长得多。这意味着渲染器只需提供
    `<pro:inputDate>` HTC 元素及其附带属性：`id`、`value`、`pattern` 和 `targetURL`。


    ■**注意** 在代码示例 9-1 中，`<pro:inputDate>` 元素代表一个 HTC 组件，而非 JSF 组件。


    为了在 `<pro:inputDate>` 元素被激活时能够与服务器进行异步通信，你需要在页面中下载两个 JavaScript 库——`dojo.js` 和
    `mabon.js`。


    HTC 日期元素行为


    与 XBL 类似，开发者可以将文档层次结构封装在 HTC 组件内部，或者决定将内容展开到 HTML 页面中，从而暴露内部实现。


    除了封装性，使用 HTC 的另一个明显好处是语法熟悉，因为 Internet Explorer 将文件解析为 HTML 文档。部署 Microsoft DHTML
    应用程序没有特殊要求，除了依赖 Microsoft Internet Explorer 5.0 及更高版本。你还应记住，使用 HTC 时，每个 HTC 文件只能定义一个元素行为。


