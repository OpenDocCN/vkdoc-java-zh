    **THE IMMEDIATE ATTRIBUTE**


    In some cases, you don’t want to go through the entire request-processing lifecycle,
    for example when the user decides to cancel the current transaction. The immediate
    attribute gives the application developer a way to override the PhaseId defined
    by the FacesEvent instance. This attribute can be set on UICommand components
    and takes true or false as valid values, and by setting the immediate attribute
    to true, an application developer can short-circuit the processing lifecycle,
    cancel a process, and navigate to another view.


    The immediate attribute is also available on the UIInput components. If set to
    true, validation will occur during decode and cause the conversion and validation
    processing (including the potential to fire ValueChangeEvent events) to occur
    during the Apply Request Values phase instead of in the Process Validations phase.


    The setProperties() method, as shown in Code Sample 2-39, transfers properties
    and attributes from this tag to the specified component, if the corresponding
    properties of this tag handler instance were explicitly set.


