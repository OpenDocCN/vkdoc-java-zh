    当引入新的事件类时，需要确保它继承自 `javax.faces.event.FacesEvent`，以便该事件能够参与 JSF 请求处理生命周期。


    `FacesEvent` 基类构造函数接受一个参数——传递事件的 `UIComponent` 实例来源。这意味着新的事件类 `ShowEvent` 必须将
    `UIComponent` 实例来源作为参数，并将其传递给其父类——`super(source);`。


    如果未设置，`phaseId` 的默认值为 `PhaseId.ANY_PHASE`，这意味着事件将在其入列的阶段被传递。为确保 deck 组件的 `ShowEvent`
    事件不会在组件层次结构完全处理之前被传递，必须将 `phaseId` 设置为 `PhaseId.INVOKE_APPLICATION`。这一点很重要，因为
    deck 节点需要了解其子节点，并允许它们被更新和验证，以便正确渲染。


    为了让使用 `ShowEvent` 类的应用程序开发人员更轻松，还可以添加两个属性——`oldShowItemId` 和 `newShowItemId`，并附带相应的
    getter 方法，这些并非 `FacesEvent` 基类所要求。这些访问器是为了方便而设，以便应用程序开发人员能够了解哪个项目已折叠，哪个项目当前已展开。


    此外，还需重写 `FacesEvent` 基类中的两个方法——`isAppropriateListener()` 和 `processListener()`。如果监听器是
    `ShowListener` 的实例（稍后将详细介绍此监听器），则 `isAppropriateListener()` 方法返回 `true`。`isAppropriateListener()`
    方法允许组件编写者验证与组件关联的监听器签名是否与正在广播的事件兼容。如果监听器兼容，则在 `UIComponent.broadcast()` 期间调用 `processListener()`
    方法，将此事件传递给 `ShowListener` 实例的 `processShow()` 方法，该方法由应用程序开发人员实现。


    监听器


    为了让应用程序对用户引发的事件做出响应，JSF 支持监听器。对于由 JSF 实现或自定义 `UIComponent` 定义的每种事件类型（例如 `ValueChangeEvent`），都必须有一个对应的监听器接口（例如
    `ValueChangeListener`）。由应用程序开发人员实现的监听器实现一个或多个这些监听器接口，以及这些接口指定的事件处理方法，这些方法将在事件广播期间被调用。


    **FacesListener 接口**


    `javax.faces.event.FacesListener` 接口（继承自 `java.util.EventListener`）是 JSF 中所有默认和自定义监听器接口的基接口。`FacesListener`
    接口（继承自 `java.util.EventListener`）是一个标记接口，仅用于类型安全。


    通常，此监听器接口的大多数实现都接受一个参数，即正在为其创建监听器的事件类型（例如 `public void processShow(ShowEvent event);`）。


    事件监听器接口


