    第 4 章 ■ 使用富互联网技术


    Ajax 回发


    现在你已经熟悉了常规回发，是时候看看 Ajax 了。本节将概述如何使用 Ajax 回发来处理事件。你可以使用 Ajax 来控制表单提交操作，而不是使用常规的表单提交操作，而是使用
    `XMLHttpRequest` 对象异步地将你的请求提交到 Web 服务器。一个副作用是，当用户提交表单时（例如，通过点击提交按钮），没有浏览器会帮助你处理提交表单中的控件。你现在需要处理任何需要作为回发一部分的表单字段，并使用它们构建一个表单数据集——控件名称/当前值对。然后，你获取该表单数据集并模拟编码（url-formencoded），以提供与常规回发相同的语法（见图
    4-2）。


    **图 4-2.** *一个* XMLHttpRequest *回发的序列图* 创建 `XMLHttpRequest` 对象后，你使用 `open()` 方法设置请求的
    HTTP 方法——GET 或 POST——以及连接的 URL。为 `XMLHttpRequest` 操作设置好阶段后，你使用 `XMLHttpRequest`
    对象将编码后的数据作为 url-formencoded 流发送回服务器（HTTP POST）。对于 Web 服务器而言，该请求将看起来像传统的 HTTP POST，这意味着
    Web 服务器无法区分常规回发和你的 Ajax 回发。对于 JSF 解决方案，这意味着 Ajax 请求可以像常规回发请求一样被接收，从而允许服务器代码（例如，JSF
    请求生命周期）不受影响。


    如果请求成功，你的 `XMLHttpRequest` 对象上的就绪状态将设置为 4，表示响应加载完成。然后，你可以使用两个属性来访问随响应返回的数据——`responseText`
    和 `responseXML`。


    `responseText` 属性提供数据的字符串表示形式，这在请求数据以纯文本或 HTML 形式出现时非常有用。根据上下文，`responseXML` 属性提供更广泛的数据表示形式。


    `responseXML` 属性将返回一个 XML 文档对象，这是一个完整的文档节点对象（DOM nodeType 为 9），可以使用 W3C DOM 节点树方法和属性进行检查。在这种传统的
    Ajax 方法中，Ajax 处理程序负责发送数据、管理响应以及修改 `HTMLDocument` 对象节点树。


    ■**注意** DOM 元素可以是不同类型。元素的类型存储在 `nodeType` 的整数字段中（例如，`COMMENT_NODE = 8` 和 `DOCUMENT_NODE
    = 9`）。有关不同 nodeType 的更多信息，请访问 http://www.w3.org/。


    Ajax 回发的副作用


    与常规回发一样，使用 Ajax 进行回发时也存在期望和不期望的副作用。最显著且期望的副作用是 `XMLHttpRequest` 对象的能力，它可以设置或获取页面的部分内容。这将消除数据重新加载时的闪烁，并提高应用程序的性能，因为无需重新加载整个页面及其所有资源。这种做法的副作用是，用户通常将无法再为页面添加书签，或使用后退按钮导航到上一页面/状态。


    在应用程序中使用 `XMLHttpRequest` 的另一个重要但不太明显的含义是，诸如手机、PDA、屏幕阅读器和即时通讯客户端等客户端缺乏对此技术的支持。此外，Ajax
    需要额外的工作才能使应用程序可访问；例如，屏幕阅读器期望完整的页面刷新才能正常工作。

