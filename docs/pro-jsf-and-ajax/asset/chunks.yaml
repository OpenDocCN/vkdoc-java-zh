- fmt: 'The first obvious approach is to define one HTC element behavior for each
    JSF tag (that is, `showOneDeck.htc`, `showItem.htc`, and `headerFacet.htc`), but
    from an HTC view only one will include actual behavior—`showItem`. The `<pro:showItem>`
    component is the one expanding and collapsing, not the `<pro:showOneDeck>` or
    the `<pro:headerFacet>`; thus, you should create only one HTC element behavior:
    `showItem.htc`.


    Code Sample 9-10 shows the `<body>` section of the HTC file, `showItem.htc`, since
    that will give you an understanding of how this component is constructed.


    **Code Sample 9-10.** *The* `<body>` *of the* `<pro:showItem>` *Component*


    ```

    <html>

    ...

    <body style="display:block" class="showItem" >

    <div id="header" ></div>

    <div id="content" style="display:none;" ></div>

    </body>

    </html>

    ```


    This is a simple component in its structure. It contains only two `<div>` elements:
    one for the header of the `<pro:showItem>` and one for the actual content of the
    `<pro:showItem>`. You leverage CSS to make sure that elements outside the `<pro:showItem>`
    will wrap properly by setting the style attribute on the `<body>` element to `display:block`;
    in other words, other `<pro:showItem>` components will be stacked either above
    or below. You also set the content `<div>` element’s style to `display:none` by
    default. This value causes the `<div>` element to take no space at all in the
    browser.


    > **Note:** For more information about visual formatting using block boxes, please
    visit the W3C Web site at http://www.w3.org/TR/REC-CSS2/visuren.html#initial-containing-block.


    In the `<head>` section of the HTC file, as shown in Code Sample 9-11, you define
    the element behavior prototype using the HTC-specific `<public:component>` element.


    **Code Sample 9-11.** *The* `<head>` *Element in the* `<pro:showItem>` *HTC Component*


    ```

    <head>

    <public:component tagName="showItem" >

    <public:property name="itemId" />

    <public:property name="styleClass" />

    <public:property name="headerStyleClass" />

    <public:property name="contentStyleClass" />

    <public:property name="active" />

    <public:attach event="oncontentready" handler="_constructor" />

    </public:component>

    ```


    The enclosing `<public:component>` element has the `tagName` attribute set to
    `showItem`. The `tagName` attribute specifies the name of the custom tag.


    Also, five public properties (`itemId`, `styleClass`, `headerStyleClass`, `contentStyleClass`,
    and `active`) are defined on the element behavior. The previous code sample uses
    the `<public:attach>` element to bind an event handler, `_constructor`, to the
    HTC-specific event `oncontentready`. The `_constructor()` function will initialize
    the internal state of the element behavior.


    ### The `_constructor()` Function


    The `_constructor()` function, as shown in Code Sample 9-12, is the core piece
    of the HTC element behavior. The `oncontentready` event will fire when the content
    of the `<pro:showItem>` element, to which the behavior is attached, has been parsed
    completely. This will invoke the `_constructor()` function, which will set the
    internal state of the `<pro:showItem>` tag based on the content written to the
    browser.


    **Code Sample 9-12.** *The* `_constructor()` *Function*


    ```

    <script type="text/javascript" >

    function _constructor()

    {

    header.className = (element.headerStyleClass || ''showItemHeader'');

    header.onclick = _expand;

    for (var i=0; i < childNodes.length; i++)

    {

    var childNode = childNodes[i];

    if (childNode.scopeName == ''pro'' &&

    childNode.nodeName == ''headerFacet'')

    {

    // set header on showItem

    header.innerHTML = childNode.innerHTML;

    }

    else

    {

    // set content inside showItem

    switch (childNode.nodeType)

    {

    case 1: // Element

    content.insertAdjacentHTML("beforeEnd", childNode.outerHTML);

    break;

    case 3: // Text

    content.insertAdjacentHTML("beforeEnd", childNode.nodeValue);

    break;

    }

    }

    }

    // show the contents if active

    if (element.active == ''true'')

    {

    content.className = (element.contentStyleClass || ''showItemContent'');

    content.style.display = ''block'';

    }

    defaults.viewLink = document;

    }

    ```


    The source of the `_constructor()` function is simple. You first set the `onclick`
    event handler on the HTC component’s header to use the `_expand` function so that
    this function will be invoked whenever the header is clicked. You then loop over
    all children of the `<pro:showItem>` tag listed in the parent document. If a child
    node is a `<pro:headerFacet>`, you then add its `innerHTML` to the header element
    in the HTC component body; otherwise, you add it to the content element. If the
    child node is being added to the content element, you have to check to see whether
    it is another element or just plain text.


    If the `active` attribute on the `<pro:showItem>` tag is set to `true`, the content
    of the `<pro:showItem>` element behavior will be displayed. Before the `_constructor()`
    is done executing and the content of the HTC element behavior is displayed in
    the browser, you have to create a `viewLink` between the root element of the document
    fragment in the HTC file to the master element, `<pro:showItem>`, in the primary
    document. You can define a `viewLink` using a script shown previously or by inserting
    the appropriate declaration in the component section of the HTC file (see Code
    Sample 9-4).


    > **Note:** The `insertAdjacentHTML` method is specific to Internet Explorer and
    appends the given HTML to the HTML content of the DOM element. The first argument
    on the `insertAdjacentHTML` method takes one of four string values: `beforeBegin`,
    `afterBegin`, `beforeEnd`, and `afterEnd`. The `beforeEnd` string tells the method
    to insert the HTML markup immediately before the end of the DOM element, after
    all the other content in the DOM element.


    ### The `_expand()` Function


    As shown in Figure 9-7, when the element behavior is bound to the `pro` namespace
    and attached to the `<pro:showItem ...>` tag, an `_expand()` function, as shown
    in Code Sample 9-13, is added as the event handler and will be invoked when the
    header is clicked.


    **Figure 9-7.** *HTC* `<pro:showItem>` `_expand` *function*


    **Code Sample 9-13.** *The* `_expand()` *Function*


    ```

    function _expand()

    {

    var showOneNode = element.parentNode;

    var showOneClientId = showOneNode.id;

    var currentNode = element;

    while (currentNode != null)

    {

    var method = currentNode.method;

    if (method != null &&

    (method.toLowerCase() == ''get'' ||

    method.toLowerCase() == ''post''))

    {

    //The following function call to d2 is needed to perform

    //an Ajax postback when implemented in the JSF HTC

    //ProShowOneDeck component.

    var formNode = currentNode;

    var content = new Object();

    content[showOneClientId] = element.itemId;

    d2.submit(formNode, content);

    break;

    }

    currentNode = currentNode.parentNode;

    }

    }

    </script>

    ```


    In the prototype you are constructing only the UI, but for Code Sample 9-13 the
    `d2.submit()` function has been added, passing the activated form id and the id
    of the selected node to the `d2.submit()` function. The `d2.submit()` function
    calls the `dojo.io.bind()` method, passing information about what form to submit,
    content (that is, the ID of the selected component), the accepted request header
    (`''X-D2-Content-Type'': <contentType>`), and the MIME type (`text/plain`) for
    this request.


    This information will determine which node to expand and which `ResponseWriter`
    to use for this request in your JSF implementation of the JSF HTC deck component.'
