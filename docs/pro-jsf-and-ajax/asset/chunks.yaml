    • *渲染器*：渲染器负责为特定组件族生成发送至客户端的标记语言。

    • *渲染工具包*：这是一个采用通用渲染技术（例如 HTML）的渲染器库。

    • *渲染器特定组件子类*：渲染器特定组件子类是一个便捷类，用于表示渲染器特有的方面和属性。

    • *JSP 标签*：默认的页面描述语言是 JSP，因此 JSF 需要遵循 JSP 的约定，并提供代表每个 JSF 组件的 JSP 标签。


    JSF 通过将 UI 与底层数据模型严格分离，实现了应用逻辑与视觉呈现清晰分离的理念。渲染器负责生成发送至客户端的标记语言，而 UIComponent 负责行为逻辑及数据模型访问。图
    1-5 展示了 UI、行为和数据模型之间的分离关系。


    5807ch01.qxd 1/3/06 4:47 PM 第 14 页


    **14**


    第 1 章 ■ JSF 基础：组件


    **图 1-5.** *UI 与行为及数据模型的分离*

    为了说明分离 UI 和数据模型的好处，我们来看一个常见 HTML 表单元素 `<select>` 的示例。该列表元素具有一个 `multiple` 属性，该属性可将行为从允许单选改为允许多选。这种模型没有将渲染和行为分离。对于应用开发者而言，要将元素行为从单选改为多选，只需进行微小调整——设置
    `multiple` 属性即可。然而，这会对底层应用逻辑产生更大影响，因为从客户端传递的值现在将结构化为键值对列表，而不再是单个键值对。


    UISelectOne 和 UISelectMany UI 组件是行为与外观清晰分离的典型示例。例如，UISelectOne 组件具有从多个可用选项中选择单个值的独特行为，而
    UISelectMany 组件则具有从可用选项列表中选择多个值的行为。UISelectOne 组件有三种渲染器类型：列表框、单选按钮和菜单。将外观从单选按钮改为菜单不会影响底层行为。


    但是，如果应用开发者想将行为改为多选组件，则必须将整个 UISelectOne JSF 组件替换为 UISelectMany JSF 组件，而不能像直接使用
    `<select>` 元素时那样，仅通过设置页面标记中的属性来实现。这种改变 JSF 组件行为与改变其外观之间的清晰分离，使应用开发者在修改页面定义时能更清楚地了解变更带来的影响。图
    1-6 展示了 UIComponent 及其三种不同外观的渲染器。


    图 1-6 展示了 JSF 规范中的一个组件——UISelectOne——它附带了三种不同的渲染器：列表框、菜单和单选按钮。在某些情况下，可能需要创建新的
    UIComponent 或渲染器。


