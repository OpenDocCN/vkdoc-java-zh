    **Step 8: Creating a RenderKit and ResponseWriter**


    Developers who want to include Ajax support in JSF applications have more than
    one strategy to choose from, as discussed earlier. The strategy we decided to
    take in this chapter—D2R—


    requires more than just a new Renderer to provide Ajax functionality. As discussed
    in the


    “Providing File Upload Functionality” section, you need to control the output
    to the client so


