  raw: 'Microsoft has often been seen as the evil empire among non-Microsoft developers,
    but you should recognize that Microsoft has contributed several bright ideas to
    standards organizations such as the W3C. Microsoft also introduced the now widely
    known XMLHttpRequest object. All of the pieces of Ajax—DHTML, JavaScript, and
    XMLHttpRequest—are available in Microsoft Internet Explorer, and the Microsoft
    Outlook Web Access solution has used these technologies to deliver a richer browser
    solution since 1998.


    To be able to give application developers the freedom to deploy to both browser
    platforms (Microsoft’s and Mozilla’s), you have to include support for Microsoft
    Internet Explorer as well.


    You could, of course, argue that you have already provided support for Internet
    Explorer with the HTML Ajax solution you created earlier, but that solution is
    still not leveraging Internet Explorer’s full potential as a client platform.


    In this chapter, you will leverage Microsoft’s component model, which is similar
    to the one provided by Mozilla XUL. Microsoft’s component model is called DHTML
    *behaviors* and allows developers to encapsulate regular DHTML in a separate file
    type: an HTC file. This file type allows developers to create reusable components
    that encapsulate dynamic behaviors, much the same way as XBL works for XUL. You
    should note that HTC defines only one element behavior per HTC file.


    1\. This is an approximate percentage of browser market at the time this book
    was written.


    **361**


    5807ch09.qxd 1/19/06 6:02 PM Page 362


    **362**


    C H A P T E R 9 ■ P R OV I D I N G M I C R O S O F T H T C R E N D E R E R S


    **Requirements for the Deck and Date Components’**


    **HTC Implementations**


    The requirements for the ProInputDate and ProShowOneDeck components in this chapter
    are simple—you need to leverage the declarative component model provided by Microsoft
    Internet Explorer. To support this, you need to provide HTC-specific Renderer
    classes for the deck and date components. There should be no loss of functionality
    supporting this client-specific component model compared to what is provided by
    the deck and date components created in Chapters 6 and 7.


    After this chapter, you should understand the difference between DHTML behaviors
    and HTC, what benefits you will gain, and what issues you can run into when creating
    rich user interface components with these technologies.


    **What HTC Brings to JSF**


    HTC provides similar benefits to component writers as XUL does. However, Internet
    Explorer is not providing any built-in HTC visual components. The HTC component
    model is part of the Internet Explorer runtime engine, so there is no need to
    “explode” the JSF page structure into the appropriate markup on the server before
    sending it to the client. This in turn will reduce the network payload, since
    rendering is taken care of by the client and not the actual server implementation.


    And, of course, HTC also provides out-of-the-box rich client interactivity, such
    as pop-up functionality, eliminating the need for the component writer to implement
    this in an alternative solution such as Ajax.


    In this chapter, you will learn how to combine the Ajax asynchronous communication
    channel—XMLHttpRequest—with the component model provided by HTC to design reusable
    and extremely interactive standard JSF components.


    **What JSF Brings to HTC**


    JSF brings the same benefit to HTC as it does to XUL: the common application programming
    model of JSP and Java. And, you can apply the same arguments about XUL to HTC;
    developers interested in HTC could use HTC directly, but the point is that JSF
    provides a familiar programming model and a standard request lifecycle that includes
    automatic state saving and restoring of state, validation, data model, and event
    handling.


    **The HTC Implementation of the Deck and Date**


    **Components**


    For JSF component writers, the fact that Microsoft is leveraging HTML markup in
    its HTC


    component model provides them with a simple encapsulation technique—a regular
    HTML


    file with the .htc extension. Therefore, the main player in this chapter is HTC.


    ![Image 85](index-388_1.png)


    5807ch09.qxd 1/19/06 6:02 PM Page 363


    C H A P T E R 9 ■ P R OV I D I N G M I C R O S O F T H T C R E N D E R E R S


    **363**


    Introduced in Microsoft Internet Explorer 5, HTC provides a mechanism to implement
    components in script as DHTML behaviors. Saved with an .htc extension, an HTC
    file is an HTML file that contains scripts and a set of HTC-specific elements
    that publish the HTML


    document as a component.


    After this chapter, you should be able to create rich user interface components
    with Microsoft’s DHTML behavior technology.


    Figure 9-1 shows the three classes you will create in this chapter.


    **Figure 9-1.** *Class diagram showing all classes created in this chapter* The
    classes are as follows:


    • HtmlDocumentRenderer is the Renderer in charge of writing the root elements
    in an HTML document.


    • HtcAjaxInputDateRenderer is a new custom Renderer for the date component that
    extends the HtmlInputDateRenderer created in Chapter 2 and adds resources to include
    HTC and Ajax support.


    • HtcAjaxShowOneDeckRenderer is a new custom Renderer for the deck component that
    extends the HtmlRenderer superclass created in Chapter 2 and adds resources to
    include HTC and Ajax support.


    **Designing JSF HTC Components Using a Blueprint**


    Blueprint, blueprint, blueprint! The blueprint for creating JSF components is
    created in such a way that it works for any markup. Because HTC is leveraging
    HTML markup, it can use the default HTML RenderKit provided by the JSF implementation.
    Alternatively, you can leverage the HtmlAjaxRenderKit you created in Chapter 6\.
    The reason for using the HtmlAjaxRenderKit is that it is already designed for
    HTML and supports Ajax postback. In this chapter, you will simply follow the same
    blueprint finalized in Chapter 7, specifically steps 1, 5, 7, 11, and 12.


    We’ll show how to define the new component by implementing it in the intended
    markup that will eventually be sent to the client.


    **Step 1: Creating a UI Prototype**


    To be able to prototype what you want to achieve in this chapter, you have to
    use HTML, DHTML behaviors, and HTC file types to find out what elements, renderer-specific
    attributes, and other resources (for example, JavaScript, images, and so on) are
    needed.


    ![Image 86](index-389_1.png)


    5807ch09.qxd 1/19/06 6:02 PM Page 364


    **364**


    C H A P T E R 9 ■ P R OV I D I N G M I C R O S O F T H T C R E N D E R E R S


    ■**Note** For more information about DHTML behaviors and HTC, please visit Microsoft’s
    MSDN Web site at http://msdn.microsoft.com.


    The HTML Date Implementation Prototype


    Figure 9-2 shows the page that includes the <pro:inputDate> prototype implemented
    in HTC.


    **Figure 9-2.** *The* <pro:inputDate> *component implemented in HTML and HTC*


    Code Sample 9-1 shows the markup needed to create a page using the HTC


    <pro:inputDate> prototype shown in Figure 9-2.


    **Code Sample 9-1.** *HTML Markup Needed for the* <pro:inputDate> *HTC Implementation*


    **<html >**


