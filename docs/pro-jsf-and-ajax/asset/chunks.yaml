- fmt: "# The First Change from XUL to HTC\n\nThe first noticeable change from XUL\
    \ is that HTC uses HTML as the delivery vehicle instead of XML. You are also defining\
    \ the namespace prefix `pro` in the `<html>` element. You can then import and\
    \ bind the HTC component, or *element behavior* as it is called, to a specific\
    \ tag name in the `pro` namespace. You define the tag name inside the HTC component,\
    \ and once you import the HTC component, you can use the element behavior in the\
    \ page with the prefix `pro` (for example, `<pro:inputDate>`).\n\nYou can also\
    \ see the benefits of using HTC over traditional HTML when HTC needs only one\
    \ element: `<pro:inputDate>`. HTML would have been a lot more verbose. This means\
    \ the Renderer has to provide only the `<pro:inputDate>` HTC element with the\
    \ accompanying attributes: `id`, `value`, `pattern`, and `targetURL`.\n\n> **Note**\
    \ In Code Sample 9-1, the `<pro:inputDate>` element represents an HTC component,\
    \ not a JSF component.\n\nTo be able to asynchronously communicate with the server\
    \ when the `<pro:inputDate>` element is activated, you have to download two JavaScript\
    \ libraries—`dojo.js` and `mabon.js`—to the page.\n\n## The HTC Date Element Behavior\n\
    \nSimilar to XBL, developers can encapsulate a document hierarchy within the HTC\
    \ component, or they can decide to explode the content into the HTML page and\
    \ as such expose internal implementations.\n\nApart from encapsulation, another\
    \ obvious benefit of using HTC is the familiarity with the syntax, since Internet\
    \ Explorer parses the file as an HTML document. Deploying Microsoft DHTML applications\
    \ has no specific requirements, except for the dependency on Microsoft Internet\
    \ Explorer 5.0 and newer. You should also remember that with HTC you define one\
    \ element behavior per HTC file.\n\nA typical HTC file is usually structured as\
    \ an HTML document with `<html>`, `<head>`, and `<body>` elements. It also contains\
    \ scripts and HTC-specific elements (see Table 9-1) that define the component.\n\
    \n**Table 9-1.** *HTC-Specific Elements*\n\n| Name | Description |\n|------|-------------|\n\
    | `document` | Represents the HTML document in a given browser window element\
    \ |\n| `element` | Returns a reference to the tag in the primary document to which\
    \ the element behavior is attached |\n| `public:component` | Identifies the content\
    \ of the file as an HTC component |\n| `public:property` | Defines a property\
    \ of the HTC component to be exposed to the containing document |\n| `public:default`\
    \ | Sets the default properties for an HTC component |\n| `public:attach` | Binds\
    \ a function to an event so that the function is called whenever the event fires\
    \ on the specified object |\n| `public:method` | Defines an HTC component method\
    \ to be exposed to the containing document |\n| `public:event` | Defines an HTC\
    \ component event to be exposed to the containing document |\n\n**Source:** http://msdn.microsoft.com/workshop/author/behaviors/behaviors_node_entry.asp\n\
    \nWhen you create an element behavior, it usually contains an enclosing `<public:component>`\
    \ element and scripts in the `<head>` element and contains a `<body>` element\
    \ that defines the actual markup for the element behavior. The file itself is\
    \ saved with an `.htc` extension. Code Sample 9-2 shows the `<body>` section of\
    \ the HTC file, `inputDate.htc`, since that will give you an understanding of\
    \ how this component is constructed.\n\n**Code Sample 9-2.** *The* `<body>` *Element\
    \ of the* `<pro:inputDate>` *HTC Component*\n\n```html\n<html>\n...\n<body>\n\
    <input id=\"input\" type=\"text\" style=\"margin:0px\"\n       onchange=\"_flushChanges()\"\
    \ >\n<button type=\"button\" style=\"margin:0px;width:2em;\"\n        onclick=\"\
    _popup()\" >\n  <img src=\"/.../projsf-ch9/inputDateButton.gif\" >\n</button>\n\
    ```\n\nThe `<body>` element defines two form elements: `<input>` and `<button>`.\
    \ Since Internet Explorer parses the HTC file as an encapsulated HTML document,\
    \ any input fields in the HTC document will not participate in the parent document’s\
    \ form submit. This means you need to provide a way to transfer the value of the\
    \ input field to a placeholder on the parent document (for example, `_flushChanges()`).\
    \ The button is responsible for launching the actual pop-up calendar.\n\n> **Caution**\
    \ It is illegal to have nested `<form>` elements in an HTML document, and since\
    \ you cannot control where this component is going to end up, it is wise to not\
    \ add any `<form>` elements to the element behavior.\n\nA useful feature in Internet\
    \ Explorer is XML *data islands*. You access an XML data island through an `id`\
    \ attribute, and you can use them to embed “islands” of data inside HTML pages\
    \ or, as in this case, inside an HTC file. More precisely, you will use this technique\
    \ to embed markup for the pop-up calendar, as shown in Code Sample 9-3, so that\
    \ you don’t have to dynamically create the calendar using scripts.\n\n**Code Sample\
    \ 9-3.** *The XML Data Island for the* `<pro:inputDate>` *Calendar*\n\n```html\n\
    <!-- IE XML Data Island -->\n<xml id=\"inputDatePopup\" >\n<style type=\"text/css\"\
    \ >\n@import url(\"/.../projsf-ch9/inputDate.css\");\n</style>\n<table id=\"tableNode\"\
    \n       class=\"inputDate\"\n       cellspacing=\"0px\"\n       cellpadding=\"\
    0px\" >\n  <thead>\n    <tr class=\"toolbar\">\n      <td id=\"prevNode\" >&lt;</td>\n\
    \      <td id=\"titleNode\" colspan=\"5\" ></td>\n      <td id=\"nextNode\" >&gt;</td>\n\
    \    </tr>\n    <tr class=\"headings\" >\n      <td>Sun</td>\n      <td>Mon</td>\n\
    \      <td>Tue</td>\n      <td>Wed</td>\n      <td>Thu</td>\n      <td>Fri</td>\n\
    \      <td>Sat</td>\n    </tr>\n  </thead>\n  <tbody>\n    <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>\n\
    \    <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>\n\
    \    <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>\n\
    \    <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>\n\
    \    <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>\n\
    \    <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>\n\
    \  </tbody>\n</table>\n</xml>\n```\n\nThe XML data island created in Code Sample\
    \ 9-3 contains markup defining the inner HTML of the calendar component. The calendar\
    \ is an ordinary HTML `<table>` element with a header for the title, a row for\
    \ the navigation controls, and several rows and cells making up the actual calendar\
    \ month.\n\nIn the `<head>` section of the HTC file, as shown in Code Sample 9-4,\
    \ you define the element behavior prototype using the HTC-specific `<public:component>`\
    \ element.\n\n**Code Sample 9-4.** *The* `<head>` *Element in the* `<pro:inputDate>`\
    \ *HTC Component*\n\n```html\n<head>\n<public:component tagName=\"inputDate\"\
    \ >\n  <public:defaults viewlinkcontent=\"true\" />\n  <public:property name=\"\
    value\" />\n  <public:property name=\"pattern\" />\n  <public:property name=\"\
    targetURL\" />\n  <public:attach event=\"ondocumentready\" handler=\"_constuctor\"\
    \ />\n</public:component>\n```\n\nThe enclosing `<public:component>` element has\
    \ the `name` and `tagName` attributes set to `inputDate`. The `name` attribute\
    \ identifies the element behavior, and the `tagName` attribute specifies the name\
    \ of the custom tag. The code also has the `<public:default>` element’s `viewlinkcontent`\
    \ attribute set to `true`. This means the content of the element behavior is not\
    \ exploded into the HTML document. Also, three public attributes (`value`, `pattern`,\
    \ and `targetURL`)—or *properties* as they are called in HTC—are defined on the\
    \ element behavior.\n\nAlthough no `<constructor>` element exists like you had\
    \ in XUL, other facilities initialize content that the element behavior uses.\
    \ In Code Sample 9-4, you are using the `<public:attach>` element to bind an event\
    \ handler (`_constructor`) to an HTC-specific event (`oncontentready` or `ondocumentready`).\
    \ In this case we chose `ondocumentready` to work around a bug in Internet Explorer.\
    \ Table 9-2 lists the HTC-specific events."
  raw: 'The first noticeable change from XUL is that HTC uses HTML as the delivery
    vehicle instead of XML. You are also defining the namespace prefix pro in the
    <html> element. You can then import and bind the HTC component, or *element behavior*
    as it is called, to a specific tag name in the pro namespace. You define the tag
    name inside the HTC component, and once you import the HTC component, you can
    use the element behavior in the page with the prefix pro (for example, <pro:inputDate>).


    You can also see the benefits of using HTC over traditional HTML when HTC needs
    only one element: <pro:inputDate>. HTML would have been a lot more verbose. This
    means the Renderer has to provide only the <pro:inputDate> HTC element with the
    accompanying attributes: id, value, pattern, and targetURL.


    ■**Note** In Code Sample 9-1, the <pro:inputDate> element represents an HTC component,
    not a JSF


    component.


    To be able to asynchronously communicate with the server when the <pro:inputDate>
    element is activated, you have to download two JavaScript libraries—dojo.js and
    mabon.js—


    to the page.


    The HTC Date Element Behavior


    Similar to XBL, developers can encapsulate a document hierarchy within the HTC
    component, or they can decide to explode the content into the HTML page and as
    such expose internal implementations.


    Apart from encapsulation, another obvious benefit of using HTC is the familiarity
    with the syntax, since Internet Explorer parses the file as an HTML document.
    Deploying Microsoft DHTML applications has no specific requirements, except for
    the dependency on Microsoft Internet Explorer 5.0 and newer. You should also remember
    that with HTC you define one element behavior per HTC file.


