- fmt: "# The ShowOneDeck Ajax Implementation\n\nAs you can see, you extend the `com.apress.projsf.ch3.render.html.HtmlShowOneDeckRenderer`\
    \ and its `encodeResources()` method with three new calls to the `dojo.js` toolkit\
    \ library, the `d2.js` library, and your own updated `showOneDeck.js` for this\
    \ new Renderer. An application developer might add two or more `ProShowOneDeck`\
    \ components to the page, but the semantics behind the `writeScriptResource()`\
    \ method, provided by your Renderer implementation and described in Chapter 3,\
    \ will make sure these resources are written only once.\n\nThe `showOneDeck.js`\
    \ library was first introduced in Chapter 3, and this chapter will provide some\
    \ modifications to this library to complete your client-side Ajax implementation.\
    \ Code Sample 6-5 shows the HTML version, and Code Sample 6-6 shows the Ajax version\
    \ of the library.\n\n**Code Sample 6-5.** *The HTML Version of the* `ShowOneDeck.js`\
    \ *Library*\n\n```\nfunction _showOneDeck_click(formClientId, clientId, itemId)\n\
    {\n  var form = document.forms[formClientId];\n  var input = form[clientId];\n\
    \  if (!input)\n  {\n    input = document.createElement(\"input\");\n    input.name\
    \ = clientId;\n    form.appendChild(input);\n  }\n  input.value = itemId;\n  form.submit();\n\
    }\n```\n\n**Code Sample 6-6.** *The Ajax Version of the* `ShowOneDeck.js` *Library*\n\
    \n```\nfunction _showOneDeck_click(formClientId, clientId, itemId)\n{\n  var form\
    \ = document.forms[formClientId];\n  var content = new Object();\n  content[clientId]\
    \ = itemId;\n  d2.submit(form, content);\n}\n```\n\nAs you can see, the `_showOneDeck_click()`\
    \ function (Code Sample 6-5) is similar to the one used with the traditional HTML\
    \ Renderer (Code Sample 6-6), with one exception. You are now calling the `d2.submit()`\
    \ function instead of the traditional `form.submit()` function. In this case,\
    \ you pass the activated form ID and the ID of the selected node to the `d2.submit()`\
    \ function. The `d2.submit()` function calls the underlying `dojo.io.bind()` method,\
    \ passing information about what form to submit, the content (that is, the ID\
    \ of the selected component), the accepted request header (`'X-D2-Content-Type':\
    \ 'text/html'`), and the MIME type (`text/plain`) for this request. This information\
    \ will determine what item to expand and what `ResponseWriter` to use for this\
    \ request.\n\n## Step 6: Registering a UIComponent and Renderer\n\nThis chapter\
    \ does not contain any behavioral superclass, but you still have to register your\
    \ client-specific Renderer. The `HtmlAjaxShowOneDeckRenderer` is registered in\
    \ `faces-config.xml`, as shown in Code Sample 6-7.\n\n**Code Sample 6-7.** *Register\
    \ the Ajax-Enabled* `Renderer` *and* `RenderKit`\n\n```xml\n<?xml version=\"1.0\"\
    \ encoding=\"UTF-8\" ?>\n<!DOCTYPE faces-config\n  PUBLIC \"-//Sun Microsystems,\
    \ Inc.//DTD JavaServer Faces Config 1.1//EN\"\n  \"http://java.sun.com/dtd/web-facesconfig_1_1.dtd\"\
    >\n<faces-config >\n  ...\n  <render-kit>\n    <render-kit-id> ... </render-kit-id>\n\
    \    <render-kit-class> ... </render-kit-class>\n    <renderer>\n      <component-family>com.apress.projsf.ShowOne</component-family>\n\
    \      <renderer-type>com.apress.projsf.Deck</renderer-type>\n      <renderer-class>\n\
    \        com.apress.projsf.ch6.render.html.ajax.HtmlAjaxShowOneDeckRenderer\n\
    \      </renderer-class>\n    </renderer>\n  </render-kit>\n</faces-config>\n\
    ```\n\nThe component family and renderer type are the same as defined in Chapter\
    \ 3 for the regular HTML version of the `ProShowOneDeck` component. This allows\
    \ you to reuse the `ProShowOneDeckTag` handler and the TLD defined in Chapter\
    \ 3.\n\n## Step 8: Creating a RenderKit and ResponseWriter\n\nDevelopers who want\
    \ to include Ajax support in JSF applications have more than one strategy to choose\
    \ from, as discussed earlier. The strategy we decided to take in this chapter—D2R—requires\
    \ more than just a new Renderer to provide Ajax functionality. As discussed in\
    \ the \"Providing File Upload Functionality\" section, you need to control the\
    \ output to the client so that on the initial request, or regular form postback,\
    \ you write out the requested document with the `contentType` set to `text/html`\
    \ and on any subsequent Ajax postback respond with the `contentType` set to `text/plain`.\n\
    \nWhat markup is written to the client is controlled by the `ResponseWriter`,\
    \ which in turn is created by the `RenderKit`. The default `RenderKit` provided\
    \ by a JSF implementation is the standard HTML `RenderKit`, which comes with a\
    \ default `ResponseWriter` that supports only content of type `text/html`. To\
    \ be able to support the content type `text/plain` as required by your Ajax Renderer,\
    \ you have to decorate the default `ResponseWriter` with functionality to fix\
    \ the `contentType` in the case of an Ajax request—`FixedContentTypeResponseWriter`.\
    \ With this new `ResponseWriter`, you also have to provide a custom `RenderKit`—`HtmlAjaxRenderKit`—that\
    \ can dynamically pick either the default `ResponseWriter` or the custom `FixedContentTypeResponseWriter`.\
    \ Figure 6-5 shows how to create the right `ResponseWriter`.\n\n**Figure 6-5.**\
    \ *Creating the right* `ResponseWriter`\n\nIs this all? No, one issue when creating\
    \ your own `RenderKit` is that application developers are allowed to set only\
    \ one default `RenderKit` per Web application. So, unless you want to reimplement\
    \ all the standard HTML `RenderKit` Renderers (or even worse, reimplement every\
    \ component library the application developer might use), you have to figure out\
    \ a way to provide access to `HTML_BASIC` renderers from your custom `RenderKit`.\
    \ This is also one of the reasons most component authors avoid creating a new\
    \ `RenderKit` and default to the standard HTML `RenderKit`. But, to implement\
    \ this strategy, you need a new `ResponseWriter` that can handle `text/plain`,\
    \ and thus you also need a new `RenderKit`.\n\nWhat you need is a way to wrap\
    \ your custom `RenderKit` around the standard HTML `RenderKit` to avoid having\
    \ to implement all renderers an application developer might use.\n\n### Registering\
    \ RenderKits to Wrap\n\nEach JSF application has to have one default `RenderKit`,\
    \ which means you need to come up with a way to register your `RenderKit` so you\
    \ can identify what `RenderKit` is to be wrapped at application start-up.\n\n\
    Code Sample 6-8 provides an example of what the syntax looks like that you will\
    \ use to register your `RenderKit` (`your.render.kit.id`) and the identifier for\
    \ the `RenderKit` (`[wrapped.render.kit.id]`) you are about to wrap.\n\n**Code\
    \ Sample 6-8.** *Alternative* `RenderKit` *Registration*\n\n```xml\n<render-kit>\n\
    \  <render-kit-id>your.render.kit.id[wrapped.render.kit.id]</render-kit-id>\n\
    \  <render-kit-class>your.render.kit.Class</render-kit-class>\n  <renderer>\n\
    \    ...\n  </renderer>\n</render-kit>\n```\n\nFigure 6-6 shows how the `ExtendedRenderKitFactory`\
    \ wraps the standard HTML `RenderKit`. The `RenderKitFactory` is responsible for\
    \ returning a `RenderKit` instance based on the `RenderKit` ID for this JSF Web\
    \ application.\n\n**Figure 6-6.** *Extending the* `RenderKitFactory` *and wrapping\
    \ the standard HTML* `RenderKit`\n\nNow when you have a way to identify what `RenderKits`\
    \ are involved, you need to decorate the default `RenderKitFactory` class with\
    \ filtering capabilities to process `RenderKit` IDs matching your syntax. Any\
    \ `RenderKit` IDs defined in the `faces-config.xml` not matching your syntax will\
    \ be delegated to the standard `RenderKitFactory`. If a `RenderKit` ID matches\
    \ your syntax—`your.render.kit.id[wrapped.render.kit.id]`—you wrap the `RenderKit`\
    \ defined by the first part of the implementation—`your.render.kit.id`—around\
    \ the `RenderKit` defined between the square brackets—`[wrapped.render.kit.id]`.\n\
    \n### The `ExtendedRenderKitFactory` Class"
