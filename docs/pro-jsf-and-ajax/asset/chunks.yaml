    Specifying Weblet MIME Types


    When weblets are used to serve a JSF component resource file, it is important
    that the browser is correctly informed of the corresponding MIME type so the resource
    file can be processed correctly. By default, weblets have built-in knowledge of
    many common MIME types, such as text/plain, for common filename extensions, such
    as .txt. However, in some cases, a JSF


    component might need to package resources that either are not previously known
    by weblets or must be served using a different extension, preventing weblets from
    automatically recognizing the correct MIME type to use.


    Code Sample 5-3 shows how to define a custom MIME type mapping for resources served
    by a weblet.


    **Code Sample 5-3.** *Weblets Configuration File Defining a Custom MIME Type*


    <?xml version="1.0" encoding="UTF-8" ?>


    <weblets-config >


    <weblet>


    <weblet-name>com.apress.projsf.ch5</weblet-name>


    <weblet-class>


    net.java.dev.weblets.packaged.PackagedWeblet


    </weblet-class>


    <init-param>


    <param-name>package</param-name>


    <param-value>com.apress.projsf.ch5.render.html.basic.resources</param-value>


    </init-param>


    **<mime-mapping>**


    **<extension>htc</extension>**


    **<mime-type>text/x-component</mime-type>**


    **</mime-mapping>**


    </weblet>


    <weblet-mapping>


    <weblet-name>com.apress.projsf.ch5</weblet-name>


    <url-pattern>/projsf-ch5/*</url-pattern>


    </weblet-mapping>


    </weblets-config>


    Code Sample 5-3 defines a custom MIME type mapping of text/x-component for all
    resources with the .htc extension served by this weblet.


