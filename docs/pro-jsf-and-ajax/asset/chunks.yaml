- fmt: "# Compared to Ten Years Ago\n\nCompared to ten years ago, customers today\
    \ have much higher demands and more specific requirements for new Web application\
    \ projects. They require richer and more user-friendly Web applications with built-in\
    \ security, accessibility, internationalization, portability, and so on. Multitier\
    \ applications must successfully deliver all these features, despite the increased\
    \ complexity of additional failure scenarios and increased scalability and security\
    \ requirements.\n\nThe growing complexity of building applications creates a need\
    \ for simplicity. So far, in the J2EE realm, there has not been a clear choice\
    \ of technology for Web applications. The traditional application programming\
    \ interfaces (APIs), such as JSP and servlets, do not really provide enough abstraction\
    \ from the underlying grunt work of implementing a multitier application. To fulfill\
    \ these requirements and to provide some level of simplicity, the industry has\
    \ evolved in a direction whereby open source communities and software companies\
    \ are providing application developers with frameworks to protect them from the\
    \ complexity introduced by multitier applications.\n\n`Tapestry`, `Struts`, `Tiles`,\
    \ `TopLink`, `Hibernate`, `ADF UIX`...\n\nMany frameworks have the same underlying\
    \ ideas but solve a problem a little differently and in different layers of a\
    \ multitier application (the view layer, the controller layer, and the model layer).\
    \ Examples of frameworks are `Struts` (an open source controller framework); `TopLink`\
    \ and `Hibernate` (model frameworks); and `Tiles`, `Tapestry`, `XUL`, and `ADF\
    \ UIX` (so-called view frameworks).\n\nThe benefits of application frameworks\
    \ are the modularity, reusability, and inversion of control (IoC) they provide\
    \ to developers. By encapsulating implementation details, frameworks enhance modularity\
    \ and improve software quality by centralizing the impact of design and implementation\
    \ details. Thanks to the stable environment provided by frameworks, they also\
    \ enhance reusability by allowing developers to create generic components that\
    \ can be reused in new applications. This reuse of framework components improves\
    \ application developer productivity and the quality of application software.\
    \ By leveraging IoC, the framework manages which application-specific methods\
    \ are called in response to user events.\n\n> **Note:** IoC means you have registered\
    \ some part of your code with the framework, and the framework will call this\
    \ code when the client requests it. This is also referred to as the *Hollywood\
    \ principle*. (“Don’t call us. We’ll call you.”)\n\nIn the previous retail software\
    \ scenario (refer to Figure 1-1), frameworks can help increase developer productivity\
    \ and ease of maintenance, but the frameworks are also incompatible with each\
    \ other, which makes integration hard to handle. In contrast, JSF is a standard\
    \ framework that aims to solve incompatibility.\n\n## Introducing JSF\n\nIn short,\
    \ JSF is a UI component framework for J2EE applications. Before we start covering\
    \ UI components (and by *UI components* we mean building blocks for application\
    \ developers, not components of the framework itself), it is worthwhile to elaborate\
    \ on why you need yet another framework. JSF is, after all, attempting to solve\
    \ the same problems as the aforementioned `Apache Tapestry` or `Oracle ADF UIX`,\
    \ frameworks that have been around for quite some time and have proved to be successful.\n\
    \nThe differentiator that JSF brings, which other similar frameworks do not have,\
    \ is the backing of a standard specification (JSR-127). Because JSF is part of\
    \ the J2EE standard specification, it is a top priority for every major J2EE tools\
    \ vendor in the market (including Oracle, IBM, Borland, and Sun) to support it,\
    \ which in turn will guarantee a wide adoption and good tools support.\n\nMost\
    \ Web applications are stuck in the 1990s where too much effort was put into basic\
    \ plumbing and not into high-level components. Basically, when there is limited\
    \ abstraction or no abstraction over the markup, the development of Web applications\
    \ becomes cumbersome and hard to maintain. You can invest a lot of time into the\
    \ application to make it rich and interactive using various technologies from\
    \ applets, plug-ins (Flex), Dynamic HTML (DHTML), and JavaScript. Used together,\
    \ these technologies can make up an interactive and powerful Web application,\
    \ but how do you maintain such an application? How do you reuse what you have\
    \ built?\n\n### Component Model\n\nJSF brings to the table a best-of-breed J2EE\
    \ framework. JSF is here to simplify life for application developers, making it\
    \ possible for them to focus on the view without needing to know the underlying\
    \ markup or scripts. They will see an improvement in productivity with JSF using\
    \ UI components that hide most of the grunt work of integrating richer functionality\
    \ into Web applications. The goal is to provide an easy way to construct UIs from\
    \ a set of reusable UI components.\n\nThese reusable components come in various\
    \ shapes with different functionality, from layout components (such as the layout\
    \ of an entire page) to simple buttons. Application developers can use these components\
    \ to construct a page and nest UI components within each other to get the desired\
    \ effect; for example, nesting text fields and buttons within a row layout component\
    \ will render the nested UI components in a single row on the client. This structure\
    \ of nested components is often referred to as a *parent-to-child* relationship\
    \ and visualized as a UI component hierarchy. This UI component hierarchy represents\
    \ a JSF page description at runtime.\n\n### Navigation Model\n\nJSF provides a\
    \ declarative navigation model, which allows application developers to set navigation\
    \ rules to define the navigation from one view to another in a Web application.\
    \ Navigation rules in JSF are defined inside the JSF configuration file, `faces-config.xml`,\
    \ and are page-based. Code Sample 1-1 shows a navigation rule configured in `faces-config.xml`.\n\
    \n**Code Sample 1-1.** *Navigation Rule Configured in* `faces-config.xml`\n\n\
    ```xml\n<navigation-rule>\n  <from-view-id>/login.jspx</from-view-id>\n  <navigation-case>\n\
    \    <from-outcome>success</from-outcome>\n    <to-view-id>/result.jspx</to-view-id>\n\
    \  </navigation-case>\n</navigation-rule>\n```\n\nIn Code Sample 1-1, a navigation\
    \ rule is set so that from a view, `login.jspx`, on an outcome of `success`, the\
    \ user will be sent to a page called `result.jspx`. The outcome is the return\
    \ value from an action performed in the application such as a button being clicked.\
    \ In JSF, an action is attached to the `UIComponent`, which allows for fine-grained\
    \ control on the page. These actions can either have their own navigation rule\
    \ or share the same navigation rule.\n\n### Application Lifecycle\n\nAnother benefit\
    \ that application developers will discover when using JSF is that the framework\
    \ helps manage UI state across server requests. Instead of having to take care\
    \ of user selections and passing these selections from page to page, the framework\
    \ will handle this for you. The JSF framework also has built-in processes in the\
    \ lifecycle to assist with validation, conversion, and model updates. As a side\
    \ bonus, JSF provides a simple model for delivering client-generated events to\
    \ server-side application code.\n\n## Application Development with JSF"
