    **304**


    C H A P T E R 8 ■ P R OV I D I N G M O Z I L L A X U L R E N D E R E R S


    **Requirements for the Deck and Date Components’**


    **XUL Implementations**


    The requirements for the ProInputDate and ProShowOneDeck components in this chapter
    are simple—you need to leverage the declarative component model provided by Mozilla’s
    GRE. To support this, you need to provide XUL-specific Renderer classes for the
    deck and date components. There should be no loss of functionality supporting
    this client-specific component model compared to what is provided by the deck
    and date components created in Chapters 6


    and 7.


    **What Mozilla XUL Brings to JSF**


    Since XUL components are part of the Mozilla GRE, there is no need to “explode”
    the JSF page structure into the appropriate markup on the server before sending
    the markup to the client.


    This in turn will reduce the network payload since rendering is taken care of
    by the client and not by the actual server implementation.


    Another great feature of XUL is its extensibility, providing a declarative way
    to create new components and extend existing XUL components. To enable this feature,
    XUL uses XBL. You attach these behavioral XBL components to markup using CSS selectors.


    And, of course, XUL provides out-of-the-box rich client interactivity without
    forcing the component author to implement this in an alternative solution such
    as JavaScript.


    We will show how you can combine the Ajax asynchronous communication channel—


    XMLHttpRequest—with the highly interactive components provided by XUL to design
    reusable and extremely interactive components based on the JSF standard.


    **What JSF Brings to XUL**


    One element that JSF brings to XUL is a common programming model—JSP and Java.
    You could argue that developers interested in XUL can use XUL directly, but the
    point we are making here is that not only does JSF provide a familiar programming
    model (at least for the majority of J2EE developers), it also provides a server-side
    component model that hides the XUL specifics without the application developer
    knowing or needing to know the implementation details.


    Another element that JSF brings is the standard request lifecycle that includes
    automatic state saving and state restoring, validation, data model, and event
    handling.


