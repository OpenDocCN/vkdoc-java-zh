    ![Image 68](index-330_1.png)


    以下是本章涉及的主要技术：`XUL`、`XBL`、`Ajax`、`Dojo Toolkit`、`D2`和`Mabon`。尽管这份技术列表相当广泛，但我们已在之前的章节中介绍了其中的大部分技术；此外，在本章中，它们将更多地扮演辅助角色，类似于`weblets`（在第5章中介绍）。学完本章后，您应该能够使用`Mozilla
    XUL`和`XBL`技术创建丰富的用户界面组件。


    图8-1展示了您将在本章中创建的九个类。


    **Figure 8-1.** *本章创建的所有类的类图*


    这些类如下：


    - `ProDocumentTag`是代表`ProDocument`组件的标签处理类。

    - `XulAjaxRenderKit`是新的自定义`RenderKit`，负责根据传入请求动态选择正确的`ResponseWriter`。

    - `XmlResponseWriter`扩展了默认的`ResponseWriter`，增加了对`XML`文档的支持。

    - `UIDocument`是一个行为超类，代表文档组件。

    - `ProDocument`是`UIDocument`类的特定于渲染器的子类。

    - `XulRenderer`是第2章中创建的`HtmlRenderer`的一个移植版本。

    - `XulDocumentRenderer`是负责在`XUL`文档中写入根元素的`Renderer`。

    - `XulAjaxInputDateRenderer`是日期组件的新自定义`Renderer`，它扩展了`XulRenderer`并添加了资源以支持`XUL`和`Ajax`。

    - 最后，`XulAjaxShowOneDeckRenderer`是deck组件的新自定义`Renderer`，它扩展了`XulRenderer`并添加了资源以支持`XUL`和`Ajax`。


    **使用蓝图设计JSF XUL组件**


    为基于`HTML`的`JSF`组件定义的蓝图同样适用于基于`XUL`的`JSF`组件。`XUL`实现并未引入任何新行为，因此您只需提供一组新的`XUL Renderers`。每当您引入一个支持`HTML`替代标记的新`Renderer`时，都必须提供一个新的`RenderKit`（即`XUL
    RenderKit`）。在本章中，您将简单地遵循蓝图（见表8-1），从步骤1开始，并跳过步骤2、4和10。


    **Table 8-1.** *创建新JSF组件的蓝图步骤*


    | **#** | **步骤** | **描述** |

    | :--- | :--- | :--- |

    | 1 | 创建UI原型 | 使用适当的标记为您的组件创建UI及其预期行为的原型。 |

    | 2 | 创建事件和监听器 | （可选）如果您的特定需求未被`JSF`规范覆盖，则创建自定义事件和监听器。 |

    | 3 | 创建行为超类 | （可选）如果找不到组件行为，则创建一个新的行为超类（例如`UIShowOne`）。 |

    | 4 | 创建转换器和验证器 | （可选）如果您的特定需求未被`JSF`规范覆盖，则创建自定义转换器和验证器。 |

    | 5 | 创建特定于客户端的Renderer | 创建您需要的`Renderer`，它将为您的`JSF`组件写出客户端标记。 |

    | 6 | 创建特定于渲染器的子类 | （可选）创建一个特定于渲染器的子类；尽管这是一个可选步骤，但实现它是一个好习惯。 |'
  raw: 'One noticeable benefit of using a component model such as XUL with standard
    JSF components is that it provides a set of UI widgets that are not available
    in HTML, such as menus, toolbars, pop-ups, and trees. This means component writers
    do not need to “create” these using traditional browser techniques, which is not
    a trivial task. These XUL widgets are available through the Mozilla GRE, and as
    such, they have the benefit of not needing to download components to draw an application
    in the browser. You can also design your own


    ![Image 68](index-330_1.png)


    5807ch08.qxd 1/19/06 7:21 PM Page 305


    C H A P T E R 8 ■ P R OV I D I N G M O Z I L L A X U L R E N D E R E R S


    **305**


    components with XUL; the browser will download these once on initial request and
    cache them in the browser.


    The following are the main technologies in this chapter: XUL, XBL, Ajax, Dojo
    Toolkit, D2, and Mabon. Although this list of technologies is pretty extensive,
    we have covered most of the technologies in previous chapters; also, in this chapter,
    they will play more of a supporting role, similar to weblets (which were introduced
    in Chapter 5). After this chapter, you should be able to create rich user interface
    components with the Mozilla XUL and XBL technologies.


    Figure 8-1 shows the nine classes you will create in this chapter.


    **Figure 8-1.** *Class diagram showing all classes created in this chapter* The
    classes are as follows:


    • ProDocumentTag is the tag handler class representing the ProDocument component.


    • XulAjaxRenderKit is the new custom RenderKit, which is responsible for dynamically
    selecting the correct ResponseWriter on the incoming request.


    • XmlResponseWriter extends the default ResponseWriter with support for XML


    documents.


    • UIDocument is a behavioral superclass representing the document component.


    • ProDocument is the renderer-specific subclass for the UIDocument class.


    • XulRenderer is a port of the HtmlRenderer created in Chapter 2.


    • XulDocumentRenderer is the Renderer in charge of writing the root elements in
    a XUL


    document.


    • XulAjaxInputDateRenderer is a new custom Renderer for the date component, which
    extends the XulRenderer and adds resources to include XUL and Ajax support.


    • And finally, XulAjaxShowOneDeckRenderer is a new custom Renderer for the deck
    component, which extends the XulRenderer and adds resources to include XUL and
    Ajax support.


