    XulAjaxRenderKit 类


    对于 XUL Ajax 回发，你会遇到与第 6 章讨论的相同的 `contentType` 问题。


    好消息是，你在第 6 章中通过提供 `FixedContentTypeResponseWriter` 解决了这个问题，并且由于在 XUL 中使用 Ajax
    并无特殊之处，你可以为 XUL Ajax 解决方案重用这个 `FixedContentTypeResponseWriter`。唯一的要求是应用程序开发者需要设置正确的内容类型，以便
    `ResponseWriter` 有机会为响应定义内容类型。


    有了新的 `XMLResponseWriter`，你还必须提供一个自定义的 `RenderKit`——`XulAjaxRenderKit`——它能够动态选择
    `XMLResponseWriter` 或自定义的 `FixedContentTypeResponseWriter`（见图 8-13）。


    **图 8-13.** *为响应创建正确* ResponseWriter *的序列图* 你可能会问自己：我是否需要重新实现应用程序开发者可能使用的每一个组件库？答案是否定的！你使用第
