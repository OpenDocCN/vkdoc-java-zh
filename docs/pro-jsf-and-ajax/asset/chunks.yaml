  raw: '**Figure 4-7.** *A page’s DOM tree with an XBL component* The direct benefits
    of encapsulation are that the component author has full control over the behavior
    and look and feel and that the component is not exposing internal implementation
    details. In Figure 4-7, the nested <xul:text> elements are shown in the DOM inspector
    but never exposed in the actual main document.


    Extending the XBL Bindings


    Apart from creating a widget that is a collection of one or more XUL elements
    (as shown in the previous sections), you can also use XBL to add new properties
    and methods. XBL has three types of items that can be added to the binding—fields,
    properties, and methods:


    • The field item is a simple container that can store a value, which can be retrieved
    and set.


    • The property item is slightly more complex and is used to validate values stored
    in fields or values retrieved from XBL-defined element attributes. Since the property
    item cannot hold a value, you have no way to set a value directly on a property
    item without using the onset handler or the onget handler. Using these handlers,
    you can perform precalculation or validation of the value retrieved or modified.


    • Methods are object functions, such as window.open(), that allow developers to
    add custom functions to custom elements.


    In Code Sample 4-14, these three items are defined in an <implementation> element
    that is a child element of the <binding> element.


