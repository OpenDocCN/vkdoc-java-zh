- fmt: '# The D2 Library and Client-Specific Renderer


    The `D2` library also defines a callback function, `d2._loadtext`, that is used
    to get the response data from the server. The `d2._loadtext` function will replace
    the target document with the document returned on the response. This will cause
    the HTC `<pro:showItem>` component to invoke the `_constructor()` again and cause
    the `<pro:showItem>` to be updated with new content sent from the server.


    To be able to asynchronously communicate with the server when a deck is activated,
    you also have to download a set of JavaScript libraries (`dojo.js` and `d2.js`)
    to the page. These libraries need to be part of your component and should be downloaded
    automatically to the client on initial request.


    ## Step 5: Creating a Client-Specific Renderer


    Your HTC solution contains three new Renderer classes: `HtmlDocumentRenderer`,
    `HtcAjaxInputDateRenderer`, and `HtcAjaxShowOneDeckRenderer`. Let’s start by looking
    at the `HtmlDocumentRenderer` class.


    ![Image 92](index-406_1.png)


