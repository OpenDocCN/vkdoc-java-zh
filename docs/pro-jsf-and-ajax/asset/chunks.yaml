    # Introduction


    Since JavaServer Faces first arrived on the Internet technology stage as the new
    standard for building Java-based Web applications, it has gained significant attention
    from the Java EE Web development community. Many developers are excited that they
    can use the standard JavaServer Faces HTML Basic RenderKit to create HTML-based
    Web applications, much as they did in the past with other technologies, such as
    Apache Struts. However, this is only the tip of the iceberg—the true power of
    JavaServer Faces lies in its extensible component model, which allows you to go
    far beyond those humble HTML beginnings.


    Based on the recent surge in demand for improved usability in Web applications,
    it is understandable that the hottest topic at the moment is Rich Internet Applications
    (RIAs) and how they offer distributed, server-based Web applications with a rich
    interface and the interaction capabilities of desktop applications. Although RIAs
    hold significant promise, they still have issues with compatibility, portability,
    usability, and reusability. Many Web application developers are struggling to
    keep up with new RIA frameworks, both open source and vendor specific, as they
    appear on the market. What is needed is a standard way of defining an RIA regardless
    of what RIA framework is being used.


    The debate over the best way to develop and deploy RIAs will not end with this
    book, but looking at the software industry today more and more developers are
    using the Web to deploy their applications. User interfaces for these Web applications
    are often built with technologies such as HTML, CSS, JavaScript, and the DOM.
    These technologies were not developed with enterprise applications in mind, and
    with an increasing pressure from consumers to provide applications with features
    not fully described or supported by these technologies, developers are looking
    for alternative solutions or to extend the standards.


    JSF does not just let you pick a single RIA technology such as Ajax, Mozilla XUL,
    Microsoft HTC, Macromedia Flash, and so on; it lets you pick and combine any RIA
    technologies you want and use them where they make the most sense. As with any
    technology, each RIA technology has its own advantages and disadvantages, but
    as a JSF component writer, you have the opportunity to leverage the best functionality
    of each RIA technology to provide the application developer with an extremely
    powerful RIA solution.


    We have been very much involved in the development and the use of component-based
    frameworks over the past five years, starting with Oracle’s own UI component framework,
    ADF UIX, and lately with Oracle’s JSF component library, ADF Faces.


    One day a very good friend asked us, “Why don’t you guys share some of your experience
    and write a book about it?” What surprised us was that nobody had actually written
    a book targeting developers who are interested in the same thing we are—how to
    develop reusable standards-based JSF components for RIAs.


    So, here we are, hoping that you will enjoy reading this book as much as we enjoyed
    writing it.


    ## An Overview of This Book


    *Pro JSF and Ajax: Building Rich Internet Components* is written to give you all
    the means to provide your Web application developers with easy-to-use Rich Internet
    Components (RICs).


    We decided early on that we would focus on establishing a clear blueprint that
    you as a developer could follow to be successful in your own JSF component development.
    We also decided that we would not limit this book to “just” JSF components and
    that we would incorporate everything you would need to know to be successful in
    developing, packaging, and deploying your own RICs.


    This book is not, and we would like to emphasize this, *not* an introductory level
    book about JSF or about writing simple JSF components. Sure, this book introduces
    JSF and covers the basics of writing JSF components, but if you have not acquainted
    yourself with JSF before reading this book, we strongly encourage you to refer
    to a few excellent books that will introduce you to JSF and give you the foundation
    needed to fully appreciate this book. We recommend *JSF in Action*, by Kito D.
    Mann (Manning, 2005), which is an excellent and very complete book on JSF, and
    *Core JavaServer Faces*, by David Geary and Cay Horstmann (Prentice, 2004). We
    are also looking forward to seeing *Java Server Faces: The Complete Reference*,
    by Ed Burns and Chris Schalk (McGraw-Hill Osborne, 2006), in stores.


    *Pro JSF and Ajax: Building Rich Internet Components* contains ten chapters that
    focus on writing JSF components. The book’s examples are fairly extensive, so
    we recommend you download the example source code from the Apress Web site to
    give you a better overview of the examples discussed (see the next section for
    more information). We assume that, as an experienced Web developer and JSF developer,
    you can extrapolate the demonstrated topic into your own environment; thus, we
    avoid cluttering the text and examples with information that is of little use.


    Chapter 1 gives a fast-paced and in-depth introduction to JSF, its component model,
    and its lifecycle. You might have followed our recommendation to read up on JSF
    before buying this book or you are already experienced working with JSF; either
    way, this chapter contains crucial information about JSF and its lifecycle that
    is needed in order to successfully build scalable and reusable JSF components.'
