    **渲染器**


    JSF 规范概述了两种模型，用于说明 JSF 组件如何处理来自传入请求（*解码*）和传出响应（*编码*）的值。这两种模型——直接实现和委托实现——采用了两种不同的方法；直接实现依赖于
    `UIComponent` 实例来处理解码和编码，而委托实现则将这些职责委托给一个 `Renderer`。正如你在图 1-5 中所见，委托方法允许应用程序开发人员独立于客户端将要渲染的内容来使用
    `UIComponent`。在本书中，我们将只讨论委托实现方法，因为我们的目标是为每个行为组件提供多个渲染器。这种方法也是使 JSF 成为如此强大的 UI
    框架的原因。


    ■**注意** 直接实现方法提供了稍好的性能，因为无需委托给渲染器，但它也严重限制了跨客户端的可扩展性和可移植性。


    渲染器负责 JSF 组件的呈现，并且必须生成适当的客户端标记，例如 HTML 和 JavaScript，或 XUL。渲染器还负责将来自客户端的信息转换为组件可以理解的内容（例如，将
    HTML 表单 POST 中的字符串值转换为强类型的 `Date` 对象）。


    尽管渲染器引入了客户端属性，例如 `style`、`disabled`、`tooltip` 等，但这些属性实际上是在特定于渲染器的组件子类中公开的（例如，`HtmlSelectOneRadio`）。


    `UIComponent` 和渲染器之间的一个主要区别是它们在运行时的定义方式。渲染器被定义为单例，因此对于每个特定渲染器类型，一个 `UIComponent`
    的所有实例只有一个渲染器。


    ■**警告** 由于单个渲染器实例将在渲染过程中按需实例化，并在 Web 应用程序的整个生命周期中使用，因此理解每个实例可能同时被多个请求处理线程调用这一点非常重要。这要求渲染器必须以线程安全的方式进行编程。


    5807ch01.qxd 1/3/06 4:47 PM Page 25


    第 1 章 ■ JSF 基础：组件


    **25**


    **渲染器类型**


    渲染器类型是由组件定义的标识符，它与组件族结合使用，可以唯一标识要与该组件一起使用的渲染器类。将渲染器类型和组件族结合起来非常强大，因为它允许为多个行为组件重用渲染器类型。

