    代码示例 9-3 中创建的 XML 数据岛包含定义日历组件内部 HTML 的标记。该日历是一个普通的 HTML `<table>` 元素，包含一个标题行、一个导航控件行，以及构成实际日历月份的多个行和单元格。


    在 HTC 文件的 `<head>` 部分，如代码示例 9-4 所示，你使用 HTC 特定的 `<public:component>` 元素定义了元素行为原型。


    **代码示例 9-4.** *`<pro:inputDate>` HTC 组件中的 `<head>` 元素*


    ```html

    <head>

    **<public:component tagName="inputDate" >**

    **<public:defaults viewlinkcontent="true" />**

    <public:property name="value" />

    <public:property name="pattern" />

    <public:property name="targetURL" />

    **<public:attach event="ondocumentready" handler="_constuctor" />**

    </public:component>

    ```


    封闭的 `<public:component>` 元素将 `name` 和 `tagName` 属性设置为 `inputDate`。`name` 属性标识元素行为，`tagName`
    属性指定自定义标签的名称。代码还将 `<public:default>` 元素的 `viewlinkcontent` 属性设置为 `true`。这意味着元素行为的内容不会展开到
    HTML 文档中。此外，还在元素行为上定义了三个公共属性（`value`、`pattern` 和 `targetURL`），在 HTC 中称为*属性*。


    虽然不像 XUL 那样存在 `<constructor>` 元素，但其他设施会初始化元素行为使用的内容。在代码示例 9-4 中，你使用 `<public:attach>`
    元素将事件处理程序（`_constructor`）绑定到 HTC 特定事件（`oncontentready` 或 `ondocumentready`）。在此例中，我们选择
    `ondocumentready` 以规避 Internet Explorer 中的一个错误。表 9-2 列出了 HTC 特定事件。

