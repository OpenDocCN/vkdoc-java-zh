- fmt: "**Figure 7-8.** *Sequence diagram of Mabon initial request* In the Figure\
    \ 7-8 sequence diagram, a page that contains a custom Ajax component is executed.\
    \ To work, the Ajax component needs to get data from an underlying backing bean.\
    \ During `encodeBegin()`, the Ajax Renderer for that component will use the Mabon\
    \ protocol—`mabon:/`—to write out a target URL that references the backing bean.\
    \ To get this URL, the Renderer will call the `getResourceURL()` on the `MabonViewHandler`.\
    \ It will pass a string matching the method binding expression for the backing\
    \ bean (for example, `mabon:/managedBean.getValidDates`). The `getResourceURL()`\
    \ method will return a full path—`/<context-root>/<mabon-servlet-mapping>/managedBean.getValidDates`—that\
    \ can be written out to the document.\n\n**Mabon: Data Fetch Request**\n\nAfter\
    \ the page has been rendered to the client, it contains a target URL to the backing\
    \ bean that is needed by the Ajax component to fetch data (for example, `/<context-root>/<mabon-mapping>/managedBean.getValidDates`).\
    \ In subsequent Ajax requests, this string will be intercepted by the Mabon implementation\
    \ and used to invoke the backing bean and return the result to the client (see\
    \ Figure 7-9).\n\n![Image 62](index-309_1.png)\n\n![Image 63](index-309_2.png)\n\
    \n**Figure 7-9.** *Sequence diagram of Mabon/Ajax data fetch request* On submit,\
    \ an Ajax-enabled component creates a new `XMLHttpRequest` object, which asynchronously\
    \ communicates with the server to get data from the managed bean. This request\
    \ is intercepted by the `FacesLifecycleServlet`, which routes the request through\
    \ the Mabon Lifecycle instead of the default JSF Lifecycle (see Figure 7-10).\n\
    \n**Figure 7-10.** *Sequence diagram over Mabon lifecycle during postback* When\
    \ the `FacesLifecycleServlet` intercepts the request, the processing of the request\
    \ starts by calling each Mabon lifecycle phase, in sequence. First, you execute\
    \ the `ApplyRequestValuesPhase`, which will decode the request and get the managed\
    \ bean reference and method arguments needed for the managed bean off the request.\
    \ Second, you execute the `InvokeApplicationPhase` that will create a `MethodBinding`\
    \ based on the managed bean reference, invoke this `MethodBinding` passing any\
    \ arguments, and return the result. Third, the `RenderResponsePhase` takes the\
    \ result and writes it back to the client.\n\n**Mabon APIs**\n\nThe following\
    \ sections cover the available APIs and how to register Mabon with an application.\n\
    \n**Mabon Servlet Configuration**\n\nIf you are planning on using Mabon for your\
    \ Ajax-enabled components, you should be aware that it adds an extra step for\
    \ the application developer using your JSF component library. The application\
    \ developer needs to add the entry shown in Code Sample 7-9 to the Web application\
    \ configuration file—`web.xml`.\n\n**Code Sample 7-9.** *Mabon Servlet Configuration*\n\
    \n```\n<servlet>\n  <servlet-name>Mabon Servlet</servlet-name>\n  <servlet-class>net.java.dev.mabon.webapp.FacesLifecycleServlet</servlet-class>\n\
    \  <init-param>\n    <param-name>javax.faces.LIFECYCLE_ID</param-name>\n    <param-value>net.java.dev.mabon</param-value>\n\
    \  </init-param>\n</servlet>\n...\n<servlet-mapping>\n  <servlet-name>Mabon Servlet</servlet-name>\n\
    \  <url-pattern>/mabon/*</url-pattern>\n</servlet-mapping>\n```\n\nThe servlet\
    \ class—`net.java.dev.mabon.webapp.FacesLifecycleServlet`—and the initialization\
    \ parameter (for example, `net.java.dev.mabon`) is part of the Mabon contract.\n\
    \nThe application developer can decide to set the mapping to the same `url-pattern(s)`\
    \ as defined by default (for example, `/mabon/*`) or override the default URL\
    \ mapping in case it is colliding with resources used by the Web application.\
    \ Mabon automatically consumes this URL mapping change without requiring any code\
    \ changes.\n\n**Mabon JavaScript APIs**"
