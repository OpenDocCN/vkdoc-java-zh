- fmt: '`HtmlAjaxRenderKit`，调用基础`RenderKit`上的`getRenderer()`方法。前述的`ExtendedRenderKitFactory`类使用`setRenderKit()`方法在应用程序启动时设置基础`RenderKit`（例如，标准的`HTML_BASIC
    RenderKit`）。


    ## `HtmlAjaxRenderKit`类


    现在到了`RenderKit`拼图的最后一块，即您的自定义`RenderKit`——`HtmlAjaxRenderKit`类。`HtmlRenderKit`类负责根据来自客户端的传入请求提供正确的`ResponseWriter`，如代码示例
    6-11 所示。


    **代码示例 6-11.** `HtmlAjaxRenderKit`类


    ```java

    package com.apress.projsf.ch6.render.html.ajax;


    import java.io.Writer;


    import java.util.Map;


    import javax.faces.context.ExternalContext;


    import javax.faces.context.FacesContext;


    import javax.faces.context.ResponseWriter;


    import com.apress.projsf.ch6.render.ExtendedRenderKit; import com.apress.projsf.ch6.render.FixedContentTypeResponseWriter;


    /**

    * HtmlAjaxRenderKit is an extended RenderKit, using HTML_BASIC as the

    * base RenderKit.

    */


    public class HtmlAjaxRenderKit extends ExtendedRenderKit

    {


    /**

    * Creates the ResponseWriter, fixing the content type

    * to "text/plain" for d2 Ajax requests.

    *

    * @param writer the writer

    * @param contentTypeList the acceptable content types (q-values)

    * @param charset the character encoding of the writer

    *

    * @return the newly created ResponseWriter

    */


    public ResponseWriter createResponseWriter(

    Writer writer,

    String contentTypeList,

    String charset)

    {


    FacesContext context = FacesContext.getCurrentInstance(); ExternalContext external
    = context.getExternalContext();


    Map requestHeaders = external.getRequestHeaderMap();


    if (contentTypeList == null)

    {


    contentTypeList = (String)requestHeaders.get("Accept");


    // IE sends a vague Accept header of "*/*"

    contentTypeList = contentTypeList.replaceFirst("(\\*/\\*)", "text/html");

    }


    ResponseWriter out =

    super.createResponseWriter(writer, contentTypeList, charset);


    // Detect D2 request

    String d2ContentType = (String)requestHeaders.get("X-D2-Content-Type"); if ("text/html".equals(d2ContentType))

    {


    out = new FixedContentTypeResponseWriter(out, "text/plain");

    }


    return out;

    }

    ```


    为了能够知道选择哪个`ResponseWriter`，您需要知道这是初始请求、常规表单回发还是 Ajax 回发。如果用户点击了`ProShowOneDeck`组件，您会在`XMLHttpRequest`上传递一个自定义头部——`X-D2-Content-Type`。在您的自定义`createResponseWriter()`方法中，您检查自定义请求头部；如果设置为`true`，您将创建一个新的`FixedContentTypeResponseWriter`实例。在初始请求或常规表单回发（例如，点击了`h:commandButton`）时，您的自定义请求头部将不存在；因此，您将把创建`ResponseWriter`的责任委托给`super`（例如，默认的`RenderKit`）。


    ## `FixedContentTypeResponseWriter`类


    `FixedContentTypeResponseWriter`负责在您的 Ajax 组件执行的任何后续回发中写出文档（内容类型为`text/plain`）。这将允许您利用`XMLHttpRequest`响应工具通过`responseText`属性检索文档。为了处理响应并修改目标文档中的
    DOM，您将使用 D2 开源项目。


