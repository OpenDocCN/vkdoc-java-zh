    **RenderKits**


    The functionality of a RenderKit is to support UIComponents that use the delegate
    implementation approach with the delegation of Renderers to the UIComponent. RenderKits
    group instances of Renderers with similar markup types, and the default RenderKit
    provided by all JSF implementations is the HTML Basic RenderKit containing Renderers
    that output HTML


    4.0.1\. Other possible RenderKits can have Renderers supporting view technologies
    such as SVG, WML, Ajax, XUL, and so on. In this book, you’ll look at additional
    RenderKits for Microsoft’s DHTML/HTML Components (HTC) and Mozilla’s XUL/XML Binding
    Language (XBL) technologies.


    The RenderKit is not responsible for creating the Renderer because it will store
    only a single instance of each renderer type. Each RenderKit is associated to
    a view (component hierarchy) at runtime as a UIViewRoot property. If no RenderKit
    has been set, the default RenderKit will be used. When it comes to RenderKits,
    many times you have no need to create a new RenderKit.


    Adding a custom Renderer to an already existing RenderKit is just a configuration
    operation.


    If a RenderKit identifier is omitted, the custom Renderer is automatically added
    to the default HTML Basic RenderKit. If you would like to add a RenderKit with
    custom Renderers, you can do the same thing—update the JSF configuration file.
    Code Sample 1-15 shows how you can add a new Renderer to the JSF configuration
    file.


