- fmt: "您需要确保在`faces-config.xml`文件中注册您的渲染器特定子类`ProDocument`、`XulDocumentRenderer`类、`XulAjaxInputDateRenderer`类和`XulAjaxShowOneDeckRenderer`类，如代码示例8-39所示。\n\
    \n**代码示例 8-39.** 在`faces-config.xml`中注册JSF XUL实现\n\n```xml\n<?xml version=\"1.0\"\
    \ encoding=\"UTF-8\" ?>\n\n<!DOCTYPE faces-config\nPUBLIC \"-//Sun Microsystems,\
    \ Inc.//DTD JavaServer Faces Config 1.1//EN\"\n\"http://java.sun.com/dtd/web-facesconfig_1_1.dtd\"\
    >\n\n<faces-config >\n    <component>\n        <component-type>com.apress.projsf.ProDocument</component-type>\n\
    \        <component-class>com.apress.projsf.ch8.component.pro.ProDocument</component-class>\n\
    \        <!-- UIComponent attributes -->\n        <attribute>\n            <description>\n\
    \                The component identifier for this component. This value must\
    \ be unique within the closest parent component that is a naming container.\n\
    \            </description>\n            <attribute-name>id</attribute-name>\n\
    \            <attribute-class>java.lang.String</attribute-class>\n        </attribute>\n\
    \        <attribute>\n            <description>\n                Flag indicating\
    \ whether or not this component should be rendered (during Render Response Phase),\
    \ or processed on any subsequent form submit.\n            </description>\n  \
    \          <attribute-name>rendered</attribute-name>\n            <attribute-class>boolean</attribute-class>\n\
    \            <default-value>true</default-value>\n        </attribute>\n     \
    \   <attribute>\n            <description>\n                The value binding\
    \ expression linking this component to a property in a backing bean.\n       \
    \     </description>\n            <attribute-name>binding</attribute-name>\n \
    \           <attribute-class>javax.faces.el.ValueBinding</attribute-class>\n \
    \       </attribute>\n        <!-- ProDocument attributes -->\n        <attribute>\n\
    \            <attribute-name>title</attribute-name>\n            <attribute-class>java.lang.String</attribute-class>\n\
    \        </attribute>\n        <attribute>\n            <attribute-name>stylesheetURI</attribute-name>\n\
    \            <attribute-class>java.lang.String</attribute-class>\n        </attribute>\n\
    \    </component>\n    ...\n    <renderer>\n        <component-family>com.apress.projsf.Document</component-family>\n\
    \        <renderer-type>com.apress.projsf.Document</renderer-type>\n        <renderer-class>com.apress.projsf.ch8.render.xul.basic.XulDocumentRenderer</renderer-class>\n\
    \    </renderer>\n    <renderer>\n        <component-family>javax.faces.Input</component-family>\n\
    \        <renderer-type>com.apress.projsf.Date</renderer-type>\n        <renderer-class>com.apress.projsf.ch8.render.xul.ajax.XulAjaxInputDateRenderer</renderer-class>\n\
    \    </renderer>\n    <renderer>\n        <component-family>com.apress.projsf.ShowOne</component-family>\n\
    \        <renderer-type>com.apress.projsf.Deck</renderer-type>\n        <renderer-class>com.apress.projsf.ch8.render.xul.ajax.XulAjaxShowOneDeckRenderer</renderer-class>\n\
    \    </renderer>\n</render-kit>\n</faces-config>\n```\n\n![Image 79](index-372_1.png)\n\
    \n## 步骤 8：创建 JSP 标签处理器和 TLD\n\n`UIDocument`组件需要一个自定义动作`<pro:document>`，以及对应的标签处理器类`ProDocumentTag`。在初始渲染时，`ProDocumentTag`负责将所有JSP自定义动作属性从标签处理器传输到组件实例。\n\
    \n### `ProDocumentTag`类\n\n如代码示例8-40所示，`ProDocumentTag`使用定义的组件类型`com.apress.projsf.Document`创建组件，该类型将创建一个默认渲染器类型为`com.apress.projsf.Document`的`ProDocument`实例。但是，Web应用程序的`faces-config.xml`可能会覆盖为此组件类型应创建的组件类。因此，标签处理器必须在新创建的组件实例上显式设置渲染器类型。这将保证`XulDocumentRenderer`用于由`ProDocumentTag`创建的组件实例。图8-12显示了类图中的`ProDocumentTag`。\n\
    \n**图 8-12.** 显示`ProDocumentTag`类的类图\n\n**代码示例 8-40.** JSP标签处理器\n\n```java\npackage\
    \ com.apress.projsf.ch8.taglib.pro\n\nimport javax.faces.component.UIComponent;\n\
    import com.apress.projsf.ch8.component.pro.ProDocument;\nimport com.apress.projsf.ch2.taglib.UIComponentTagSupport;\n\
    \n/**\n * ProDocumentTag component tag handler.\n */\npublic class ProDocumentTag\
    \ extends UIComponentTagSupport\n{\n    /**\n     * Returns the component type.\n\
    \     *\n     * @return the component type\n     */\n    public String getComponentType()\n\
    \    {\n        return ProDocument.COMPONENT_TYPE;\n    }\n\n    /**\n     * Returns\
    \ the renderer type.\n     *\n     * @return the renderer type\n     */\n    public\
    \ String getRendererType()\n    {\n        return ProDocument.RENDERER_TYPE;\n\
    \    }\n\n    public void setStylesheetURI(String stylesheetURI)\n    {\n    \
    \    _stylesheetURI = stylesheetURI;\n    }\n\n    public void setTitle(String\
    \ title)\n    {\n        _title = title;\n    }\n\n    public void setStyleClass(String\
    \ styleClass)\n    {\n        _styleClass = styleClass;\n    }\n\n    public void\
    \ release()\n    {\n        _title = null;\n        _styleClass = null;\n    \
    \    _stylesheetURI = null;\n    }\n\n    protected void setProperties(\n    \
    \    UIComponent component)\n    {\n        super.setProperties(component);\n\n\
    \        // Renderer-specific attributes\n        setStringProperty(component,\
    \ \"title\", _title);\n        setStringProperty(component, \"styleClass\", _styleClass);\n\
    \        setStringProperty(component, \"stylesheetURI\", _stylesheetURI);\n  \
    \  }\n\n    private String _title;\n    private String _styleClass;\n    private\
    \ String _stylesheetURI;\n}\n```\n\n`ProDocumentTag`为渲染器特定的`XulDocumentRenderer`属性（`title`、`styleClass`和`stylesheetURI`）提供了标签属性设置器和内部字段存储。`setProperties()`方法将属性和特性从该标签传输到指定的组件（如果此标签处理器实例的相应属性被显式设置）。\n\
    \n### 标签库描述符\n\n现在您已经定义了`ProDocumentTag`处理器的行为。是时候注册自定义动作的名称并设置一些关于如何使用它的规则了。在为JSF自定义组件创建标签库时，TLD文件为每个渲染器定义一个自定义动作。在本章中，您只需要定义一个自定义动作——`document`——如代码示例8-41所示。\n\
    \n**代码示例 8-41.** TLD\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\" ?>\n\n\
    <!DOCTYPE taglib\nPUBLIC \"-//Sun Microsystems, Inc.//DTD JSP Tag Library 1.2//EN\"\
    \n\"http://java.sun.com/dtd/web-jsptaglibrary_1_2.dtd\" >\n\n<taglib>\n    ...\n\
    \    <uri>http://projsf.apress.com/tags</uri>\n    ...\n    <tag>\n        <name>document</name>\n\
    \        <tag-class>com.apress.projsf.ch8.taglib.pro.ProDocumentTag</tag-class>\n\
    \        <body-content>JSP</body-content>\n        <description>\n           \
    \ The document tag handler represents a ProDocument component that is used as\
    \ the top component in the hierarchy, directly under the UIViewRoot.\n       \
    \ </description>\n        <!-- UIComponent attributes -->\n        <attribute>\n\
    \            <name>id</name>\n            <required>false</required>\n       \
    \     <rtexprvalue>false</rtexprvalue>\n            <description>\n          \
    \      The component identifier for this component. This value must be unique\
    \ within the closest parent component that is a naming container.\n          \
    \  </description>\n        </attribute>\n        ...\n        <!-- ProDocument\
    \ attributes -->\n        <attribute>\n            <name>title</name>\n      \
    \      <required>false</required>\n            <rtexprvalue>false</rtexprvalue>\n\
    \            <description>\n                Advisory title information about markup\
    \ elements generated for this component.\n            </description>\n       \
    \ </attribute>\n        <attribute>\n            <name>stylesheetURI</name>\n\
    \            <required>false</required>\n            <rtexprvalue>false</rtexprvalue>\n\
    \            <description>\n                User-defined stylesheet.\n       \
    \     </description>\n        </attribute>\n    </tag>\n    ...\n</taglib>\n```"
