    ### Step 12: Registering Resources with Weblets


    You need to register the HTC resources (`inputDate.css`, `inputDate.htc`, `showOneDeck.css`,
    and `showOneDeck.htc`) as weblets, as shown in Code Sample 9-34, which will enable
    you to package these resources as part of the custom JSF component library.


    **Code Sample 9-34.** *The Weblets Configuration File*


    ```xml

    <?xml version="1.0" encoding="UTF-8" ?>


    <weblets-config >


    <weblet>


    <weblet-name>com.apress.projsf.ch9</weblet-name>


    <weblet-class>net.java.dev.weblets.packaged.PackagedWeblet</weblet-class>


    <init-param>


    <param-name>package</param-name>


    <param-value>com.apress.projsf.ch9.render.htc.ajax.resources</param-value>


    </init-param>


    <mime-mapping>


    <extension>htc</extension>


    <mime-type>text/x-component</mime-type>


    </mime-mapping>


    </weblet>


    <weblet-mapping>


    <weblet-name>com.apress.projsf.ch9</weblet-name>


    <url-pattern>/projsf-ch9/*</url-pattern>


    </weblet-mapping>


    </weblets-config>

    ```


    ## Building Applications with JSF HTC Components


    Figure 9-11 shows the end result of the JSF HTC `ProInputDate` implementation.
    As you can see, the page looks the same as the one you created in previous chapters,
    except that this page uses an HTC Renderer. This HTC Ajax implementation provides
    the same functionality as both the HTML Ajax and XUL Ajax implementations, where
    dates that are not selectable are marked red and dates outside the scope of the
    current month are gray. When the user enters a date and clicks a submit button,
    a full postback will occur, and the attached validator, if any, will be invoked.


