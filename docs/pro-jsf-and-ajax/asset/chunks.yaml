    ■**乔纳斯·雅各比** 是 Oracle 公司的 J2EE 和开源技术倡导者。


    乔纳斯是瑞典人，在软件行业拥有超过 15 年的工作经验。在加入 Oracle 之前，乔纳斯曾在几家主要的瑞典软件公司担任管理、咨询、开发和项目管理等职务。


    在过去三年中，乔纳斯在 Oracle JDeveloper 团队中负责 JavaServer Faces、Oracle ADF Faces 和 Oracle
    ADF Faces Rich Client 的产品管理工作。


    乔纳斯是 Oracle OpenWorld、EclipseWorld 和 JavaPolis 等国际会议的热门演讲者，并为《*Java Developer''s
    Journal*》、《*JavaPro*》和《*Oracle Magazine*》等领先 IT 杂志撰写了大量文章。乔纳斯还为 Kito D. Mann 所著的《*JavaServer
    Faces in Action*》（Manning, 2005）的在线附录做出了贡献，并担任了《*Oracle JDeveloper 10g Handbook*》（Avrom
    Roy-Faderman、Peter Koletzke 和 Paul Dorsey 著，McGraw-Hill Osborne, 2004）的技术审阅人。


    除了在业余时间从事 Weblets、Mabon 和 D2 等开源项目外，他还喜欢高尔夫、帆船和快车（最好是驾驶它们）；他也喜欢与妻子 Marianne 以及女儿
    Emma 和 Isabelle 共度时光。


    ■**约翰·R·法洛斯** 是 Oracle 公司的 JavaServer Faces 技术架构师。


    约翰来自北爱尔兰，毕业于英国剑桥大学，在软件行业拥有超过十年的工作经验。在加入 Oracle 之前，约翰在英国电信公司担任研究科学家。


    在过去四年中，约翰在 Oracle ADF Faces 团队中发挥了主导作用，影响了 JavaServer Faces 标准的架构，并扩展了该标准以在 ADF
    Faces 项目中提供 Ajax 功能。


    约翰是开源社区的活跃参与者，为 Apache MyFaces 项目和 Apache Maven 项目都做出了贡献。约翰还在 Java.net 上领导着三个新的开源项目——Weblets、Mabon
    和 D2——所有这些项目都是在研究本书的基础技术时演变而来的。


    除了在业余时间撰写关于新奇刺激技术的文章外，约翰喜欢和朋友踢足球，也喜欢与他美丽的妻子 Nan 和他们出色的儿子 Jack 共度时光。


