    markup and scripting languages, as well as the rendering technology such as JavaServer
    Pages (JSP). According to the JSF specification, this developer type is generally
    not familiar with programming languages such as Java or Visual Basic.


    ## Application developer


    An application developer is, according to the JSF specification, in charge of
    the server-side functionality of an application that may or may not be related
    to the UI. The technical skills of an application developer generally include
    Java, Enterprise JavaBeans (EJBs), or other server technologies.


    **Table 1-1.** *Continued*


    | Type | Description |

    |------|-------------|

    | Component writer | A component writer is the main provider of reusable components.
    This developer is responsible for creating component libraries that can be consumed
    by others, such as the page author. |

    | Tools provider | A tools provider, as implied by the name, provides tools that
    can support developers who are building applications with JSF. |

    | JSF implementers | A JSF implementer is a developer who provides the runtime
    (or implementation of the JSF specification) for all the previously defined developers.
    Examples of available implementations are the Sun Reference Implementation (RI)
    (`http://java.sun.com/j2ee/javaserverfaces/`) and Apache MyFaces (`http://myfaces.apache.org`).
    |


    *Source: The JavaServer Faces 1.1 specification*


    In our experience, page authors and application developers are usually the same
    person, so they are knowledgeable in both UI design and programming languages,
    such as Java or Visual Basic. We will focus most of our attention on component
    writers in this book.


    # Overview of Application Development Technologies


    During the relatively short history of computers and software, application development
    has undergone several major evolutionary steps, all promising increased developer
    productivity and flexibility. These technology improvements have progressed exponentially
    since the computer was first introduced, and it looks like computer and software
    technologies will continue to evolve at the same tremendous pace well into the
    future.


    *No exponential is forever . . . but we can delay “forever.”*

    —Gordon Moore (famous for Moore’s law), Fairchild Camera and Instrument Corporation


    During these evolutionary years, the deployment profile for an application, as
    well as the computer and software technology used to develop such an application,
    has changed.


    ## One-Tier


    At the end of the 1970s and beginning of the 1980s, a fundamental shift occurred
    from large and centralized computers to personal computers (PCs), which moved
    the power of control from a few to many (anyone with a PC). Though most of the
    applications released during this period were more powerful than anything so far
    developed, they were developed and designed for single-user tasks and lacked collaboration
    over common data; at this point, no central databases or email systems existed.
    Applications deployed or installed this way are referred to as *one-tier* applications.


    From a maintenance point of view, this one-tier solution is an application that
    resides on an individual’s machine and that controls interaction with business
    logic. These one-tier applications all integrate three application layers (presentation,
    business logic, and data), making it hard to maintain and almost impossible to
    share and scale information.


    ## Two-Tier: Client-Server


    *Two-tier*, or *client-server*, solutions took center stage in the 1980s and pushed
    one-tier solutions into the history archives. A two-tier architecture, which enables
    sharing data, changed the way applications were developed and deployed. Two-tier
    applications directly interact with the end user; business and presentation logic
    are stored on the client, and data resides on a remote server. This architecture
    allows multiple users to access centralized data with applications such as desktop
    email clients (such as Microsoft Outlook or Mozilla Thunderbird).


    Although the two-tier solution solves the issue of having multiple users accessing
    the same data source, it also has its limitations, such as the lack of flexibility
    of the design to later modification or porting, which in turn increases maintenance
    costs.


    ## Multitier: Web Applications


    The next phase in application development arrived with the Internet and the Web
    browser and introduced the *three-tier*, or *multitier*, architecture. In the
    one-tier solution, presentation, business logic, and data are all integrated in
    one monolithic application. The multitier architecture breaks this type of application
    into three layers, allowing developers to focus on specific domain areas—model
    (data access), view (presentation), and controller (logic). This programming paradigm,
    representing the split between these layers, is known as the Model-View-Controller
    (MVC) architecture and was first introduced in SmallTalk and spread to the developer
    community in the 1980s.


    Splitting the one-tier application into layers—in combination with a standard
    client (for example, the Web browser) and a standard communication protocol (for
    example, Hypertext Transfer Protocol [HTTP])—suddenly gave users ubiquitous access
    to centralized and familiar applications such as email via a browser (for example,
    Google’s browser-based Gmail). Applications are no longer something that only
    come on a CD or are downloaded. A multitier solution gives the application owner
    centralized maintenance and administration, which allows the application owner
    to provide instantaneous upgrades for everyone using the application.


    # Exploring Application Development Today


    In this new world of multitier applications, developers need to keep up-to-date
    with emerging technologies and standards provided through such organizations as
    the World Wide Web Consortium (W3C) and the Java Community Process (JCP). The
    industry is evolving, which is good, but this also adds pressure on the application
    developer to always be building competitive multitier applications. If you look
    at a typical multitier software solution—serving a retail company, for example—it
    might include support for multiple agents such as Web browsers, mobile devices,
    and character-based Video Terminals (VT, for example, VT100).


    Figure 1-1 shows a simplistic schema over the architecture for such a multitier
    application.


    **Figure 1-1.** *Common J2EE architecture for a typical multitier software solution,
    serving a retail company*


    In this scenario, the application developer is forced to provide not one application
    but three. This architecture contains one application for the Web interface, one
    for the mobile device, and finally one for the Telnet device (such as a VT terminal
    or handheld character-based device). All three applications use their own technology
    stack, which for the administrator or application developer will be a maintenance
    nightmare, and may cause issues with security and scalability. For the application
    developer, it all boils down to one question: “How many technologies do I have
    to learn in order to successfully build a complete solution for my project?”


    # Frameworks'
