    ■**注意** 基于原型的编程是面向对象编程的一种风格和子集，其中不存在类，行为复用（在基于类的语言中称为*继承*）通过克隆现有对象来实现，这些对象作为新对象的原型。它也被称为*无类*、*面向原型*或*基于实例*的编程（http://en.wikipedia.org）。


    在组件的可视化规范中，你需要考虑三种主要的用户交互：能够弹出日历、导航到相关的年月，然后选择一个可用日期。


