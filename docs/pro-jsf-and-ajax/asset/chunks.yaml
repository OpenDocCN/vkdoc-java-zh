    方法，该方法接收一个表示组件类型的字符串，例如 `javax.faces.HtmlForm`（参见“组件族与组件类型”一节）。该组件类型映射到 `faces-config.xml`
    文件中定义的类，然后创建 `HtmlForm` 组件的一个实例并将其附加到 `UIViewRoot`。


    接下来，需要为新创建的组件查找一个 Renderer。Renderer 通过组件族和渲染器类型来定位，这两者共同定义了 Renderer 的唯一标识符（参见“渲染器类型”一节）。


    ■**注意** 让我们使用 `HtmlInputText` 组件来说明组件族与渲染器类型之间的关系。`HtmlInputText` 组件的组件族为 `javax.faces.Input`，渲染器类型为
    `javax.faces.Text`。两者共同在 HTML Basic RenderKit 中唯一标识了适当的 Renderer 类——`javax.faces.renderer.html.HtmlInputText`。


    渲染器类型已由 `<h:form>` 标签知晓，而组件族可以在组件的超类 `UIForm` 中找到。然后，该标签在组件上调用名为 `encodeBegin()`
    的方法，该方法进而调用 `HtmlForm` 渲染器上的 `encodeBegin()` 方法。


    Renderer 上的 `encodeBegin()` 方法调用 `ResponseWriter` 上的方法来编写 HTML 表单元素的标记——`<form
    method="" action="">`。所有来自 `ResponseWriter` 的标记输出最终都进入 `<f:view>` 主体内容缓冲区。图 1-15
