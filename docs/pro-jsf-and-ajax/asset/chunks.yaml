    正如前面“转换器、验证器、事件和监听器”一节中提到的，当 `ActionEvent` 发生时，将处理两个方法。首先发生的是调用 `UIViewRoot` 上的
    `processApplication()` 方法，该方法获取每个排队的事件并将其广播到事件的目标组件（例如，`commandButton.broadcast(FacesEvent)`）。`UICommand`
    组件知道 `action` 和 `actionListener` 属性，以及附加到 `Application` 对象的默认 `ActionListener`。


    首先调用所有先前注册的 `ActionListener`，然后执行 `actionListener` 方法绑定（例如，`#{credentials.onLogin}`），最后组件调用默认
    `ActionListener` 上的 `processAction()` 方法来处理 `action` 方法绑定并处理导航。重要的是，`action` 方法绑定在此过程结束时被调用，因为它定义了可能的导航，并且您不希望在处理完所有事件之前进行导航。


    **带导航的回传**


    当默认的 `ActionListener` 处理 `ActionEvent` 时，它会调用 `action` 方法绑定并获取结果，该结果是一个 `String`
    对象。如果结果返回 `null`，则默认的 `ActionListener` 将继续处理下一个排队的事件。在所有事件广播完毕后，调用应用程序阶段完成，生命周期处理继续到最后一个阶段——渲染响应。如果结果不为
    `null`，则默认的 `ActionListener` 将 `FacesContext`、`fromAction`（即方法绑定表达式文本，例如 `credentials.doLogin`）和结果传递给
    `NavigationHandler`。图 1-22 展示了回传时的导航。


    **图 1-22.** *回传时的导航*


