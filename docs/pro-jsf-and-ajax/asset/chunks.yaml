- fmt: 'Applications built with these Microsoft technologies are deployed and downloaded
    from the Web. Microsoft’s DHTML is designed to deliver an easy markup for building
    rich Internet applications.


    When building applications with DHTML, developers will use regular HTML pages
    to describe their Web application but with the ability to dynamically change the
    rendering and content of the HTML page. HTC files can create reusable components
    that encapsulate dynamic behaviors, much the same way as XBL works for XUL. The
    following sections will give you an overview of Microsoft’s DHTML solution and
    show how you can build reusable components with HTC.


    ## WHY HTC AND NOT XAML?


    Several reasons exist for not selecting XAML. One reason is that XAML requires
    .NET 2.0/Avalon, which ships with Microsoft’s Vista release and is scheduled to
    be released at the end of 2006. Another project, XAMLON, provides a preview implementation
    of Avalon, which is the runtime engine needed to build XAML applications. This
    implementation provides an early look at XAML-like technologies on a .NET 1.1
    runtime. The XAMLON preview implementation of XAML has two main drawbacks. First,
    it requires a .NET 1.1 runtime plug-in for Internet Explorer. Second, it does
    not integrate (well) with HTML pages. If you wanted to have a plug-in, you would
    use something that is established and can work cross-platform, such as Macromedia
    Flash, and be done.


    ## HTC Structure


    DHTML was introduced in Internet Explorer 5.0 and was Microsoft’s first attempt
    to supply a medium in which to build RIAs. DHTML made it possible to transform
    the behavior of standard HTML elements by using the `behavior` attribute of a
    CSS entry or by using the `addBehavior` method in script.


    > **Note** Microsoft has submitted a proposal to add and extend HTML elements,
    using CSS as the bridge. This proposal is based on Microsoft’s solution to add
    behavior to HTML, which is similar to the XUL solution. The proposal has been
    sent to the W3C and is named “Componentizing Web Applications” (http://www.w3.org/TR/1998/NOTE-HTMLComponents-19981023),
    in collaboration with Netscape to define how to best add behavior and extend HTML
    elements—see “Behavioral Extensions to CSS” at http://www.w3.org/TR/1999/WD-becss-19990804.


    HTC, as noted previously, provides a means of packaging dynamic behavior into
    a separate document. With DHTML and HTC, Microsoft has taken the approach of extending
    the HTML markup rather than coming up with yet another markup for RIAs. The fact
    that HTC leverages the HTML markup means you can focus purely on HTC, since HTML
    markup should be familiar to developers reading this book.


    ### HTC File Structure and Elements


    Plainly put, HTC is just an HTML page with the file extension `.htc`. The file
    shown in Code Sample 4-18 contains a set of HTC-specific elements, such as `<public:property>`,
    `<public:event>`, and `<public:method>`, that list properties, events, and methods
    that define the HTC component.


    **Code Sample 4-18.** *HTC File Structure*


    ```html

    <html>

    <head>

    <public:component>

    <public:property ... />

    <public:event ... />

    <public:method ... />

    ...

    </public:component>

    <script language=" ">

    ...

    </script>

    </head>

    <body>

    ...

    </body>

    </html>

    ```


    The `<public:component>` is used to define two behavior types—element behavior
    and attached behavior. Code Sample 4-19 illustrates an attached behavior, which
    will modify an existing element by setting the color to green. The `<public:attach>`
    element couples an event raised on the client with an underlying function. In
    Code Sample 4-19 the function `onColor()` is attached to the `mouseover` event.


    **Code Sample 4-19.** *A Simple HTC File*


    ```html

    <html>

    <head>

    <public:component>

    <public:attach event="onmouseover" onevent="onColors()" />

    </public:component>

    <script>

    function onColors()

    {

    ```'
