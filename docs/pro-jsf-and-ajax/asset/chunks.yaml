    5807ch02.qxd 12/30/05 4:27 PM Page 104


    **104**


    第 2 章 ■ 定义日期字段组件


    **总结**


    本章为你提供了编写 JSF 自定义组件所需的蓝图和理解。内容涵盖创建渲染器、创建特定于渲染器的子类、使用外部资源、注册组件对象，以及创建 JSP 标签处理器和
    TLD。在后续章节中，你将以此知识为基础，构建更高级的 JSF 组件。


    构建组件的结构将在本书中保持一致。首先，分析创建预期行为和用户界面所需的标记。然后，创建包含组件所需所有属性的客户端特定渲染器。可选但推荐的做法是，创建应用程序开发者可在运行时用于自定义组件的渲染器特定子类。最后，实现对所选页面描述语言（JSP）的支持。你现在还应了解如何使用
    `ValueBinding` 和 `MethodBinding`，以及如何在自定义 JSF 标签处理器中支持这些概念。


    ![Image 16](img/index-130_1.png)


    5807ch03.qxd 1/13/06 11:06 AM Page 105


    第 3 章


    ■ ■ ■


    定义 Deck 组件


    *大多数非平凡应用程序（尤其是 UI 类型应用）最重要的方面之一，是能够响应由应用程序各个组件生成的事件，这些事件既包括对用户交互的响应，也包括对其他系统组件的响应……*


    ——Terry Warren, SCOUG, 1999


    **本**章将扩展前一章概述的构建组件蓝图。在本章中，我们将展示如何创建一个可充当手风琴式面板或 *deck* 的组件，这种组件常用于应用程序和集成开发环境（IDE）中，用于显示和隐藏信息，例如文件资源管理器中选中文件的信息，或组件面板中的
    JSF 组件。图 3-1 展示了 Microsoft Windows 资源管理器中使用的一个可展开 deck。


    **图 3-1.** *Microsoft Windows 资源管理器中使用的可展开 deck* Deck 组件具有可堆叠的优势，并且能够比传统 HTML
    页面中同等空间存储更多信息。从组件编写者的角度来看，这类组件引入了组件设计的几个关键领域，例如处理事件、渲染子组件以及加载外部资源。


    **105**


    ![Image 17](img/index-131_1.png)


    5807ch03.qxd 1/13/06 11:06 AM Page 106


    **106**


    第 3 章 ■ 定义 Deck 组件


    **Deck 组件的需求**


    Deck 组件的设计将允许用户通过点击某个显示的 deck，来暴露当前隐藏的特定信息，并显示与该点击 deck 关联的一组项目。这些子项目可以是任何内容，包括链接、文本，甚至图形。


    该组件应足够智能，能够检测到已打开的 deck，并在打开用户请求的 deck 之前将其关闭。从应用程序开发者的角度来看，该组件需要是可扩展的，这意味着应用程序开发者可以根据需要添加任意数量的
    deck，并在这些 deck 中包含任意数量的子项。应用程序开发者还应能够向页面添加任意数量的 deck 组。


    **Deck 组件**


    正如你在第一章中记得的，创建新的行为超类的唯一原因是该行为和定义之前未被引入过。根据上一节的需求，deck 组件应能够根据用户选择，有选择地显示嵌套组件或组件组，并且任何时候只显示一个组。为实现这一点，你必须创建一个新的渲染器来处理选择性显示，以及一个新的事件类型来处理用户选择，并附带一个针对该特定事件类型的监听器接口。由于显示和隐藏子组件的行为尚未被引入，我们将涵盖两个新的行为超类来处理“显示一项”的行为（参见第
    2 章的表 2-1）。


    完成本章后，你应该理解 JSF 事件模型，并知道如何创建新的行为超类以及你自己的事件类型和相应的监听器接口。图 3-2 展示了你将在本章中创建的 11 个类。


    **图 3-2.** *展示本章所创建类的类图*


    5807ch03.qxd 1/13/06 11:06 AM Page 107


    第 3 章 ■ 定义 Deck 组件


    **107**


    这些类如下：


    • `ProShowOneDeckTag` 类代表 `ProShowOneDeck` 组件。


    • `ShowItemTag` 类代表 deck 组件的叶子节点。


    • `ShowListenerTag` 类代表一个自定义动作，应用程序开发者将使用它向 `UIShowOne` 组件注册一个 `ShowListener`
    实例。


    • `HtmlShowOneDeckRenderer` 是新的自定义渲染器，负责渲染到客户端的标记。


    • `ShowListener` 是一个监听器接口。


    • `ShowAdapter` 支持将 `MethodBinding` 添加为 `ShowListener`。


    • `ShowEvent` 是自定义事件类。


    • `UIShowItem` 是一个行为超类，代表 `UIShowOne` 组件的每个子组件。


    • `ShowSource` 类隔离了事件监听器管理方法。


    • `UIShowOne` 类是一个行为超类，充当顶级容器，控制激活时显示其哪个子组件。


    • 最后，`ProShowOneDeck` 类是你的渲染器特定子类。


    **使用蓝图设计 Deck 组件**


    当你设计一个需要新行为或新功能的组件时，明智的做法是在为此行为创建实际渲染器之前开始实现它，因此，这两个步骤在蓝图中先于客户端特定渲染器步骤，如表 3-1
    所示。


    **表 3-1.** *创建新 JSF 组件的蓝图步骤*


    **#**


    **步骤**


    **描述**


    创建 UI 原型


    使用适当的标记为你的组件创建 UI 和预期行为的原型。


    **2**


    **创建事件和监听器**


    （可选）如果 JSF 规范未涵盖你的特定需求，则创建自定义事件和监听器。


    **3**


    **创建行为超类**


    （可选）如果找不到组件行为，则创建一个新的行为超类（例如 `UIShowOne`）。


    创建客户端特定渲染器


    创建所需的渲染器，它将为你的 JSF 组件写出客户端标记。


    创建渲染器特定子类


    （可选）创建渲染器特定子类。虽然这是一个可选步骤，但实现它是一个好习惯。


    *续表*


    ![Image 18](img/index-133_1.png)


    5807ch03.qxd 1/13/06 11:06 AM Page 108


    **108**


    第 3 章 ■ 定义 Deck 组件


    **表 3-1.** *续表*


    **#**


    **步骤**


    **描述**


    注册 UIComponent 和 Renderer


    在 `faces-config.xml` 文件中注册你的新 `UIComponent` 和 `Renderer`。


    创建 JSP 标签处理器和 TLD


    如果你使用 JSP 作为默认视图处理器，则需要此步骤。另一种解决方案是使用 Facelets (http://facelets.dev.java.net/)。

