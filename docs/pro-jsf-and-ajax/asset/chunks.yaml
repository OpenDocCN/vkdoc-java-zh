    ■**提示** 要了解 XUL 能实现哪些功能，一个绝佳的参考示例是 Mozilla Amazon 浏览器（MAB），网址为 http://www.faser.net/mab/。


    **构建 XUL 应用程序**


    XUL 背后的理念是提供一种用于构建用户界面的标记语言，类似于 HTML，同时利用 CSS 等技术实现外观和感觉，利用 JavaScript 处理事件和行为。此外，还提供了
    API，使开发者能够通过网络读写文件系统，并访问 Web 服务。作为一种基于 XML 的语言，开发者还可以将 XUL 与其他 XML 语言（如 XHTML
    和 SVG）结合使用。你可以通过三种方式加载使用 XUL 构建的应用程序：


    •   你可以通过传统方式从本地文件系统加载 XUL 页面。

    •   你可以使用 HTTP URL 远程加载，以访问 Web 服务器上的内容。

    •   你可以使用 Mozilla GRE 提供的 chrome URL 进行加载。


    XUL 组件


    XUL 附带了一组基础组件（见表 4-3），这些组件可通过 Mozilla GRE 获得，因此 XUL 无需下载组件即可在浏览器中绘制应用程序。你也可以使用
    XUL 设计自己的组件；这些组件*将*需要按需下载并缓存在浏览器中。


    **MOZILLA XUL 的 CHROME 系统**


    除了从本地文件系统或 Web 服务器加载文件外，Mozilla 引擎还有一种特殊的方式，可以将应用程序安装并注册为其 *chrome 系统*的一部分。chrome
    系统允许开发者打包应用程序，并将其作为插件安装到支持 Mozilla GRE 的客户端中。以这种方式部署的 XUL 应用程序可以获得对本地文件系统的读写权限等。在传统的
    Web 应用程序中，这种访问权限很难实现，除非应用程序已使用数字证书签名，并且最终用户授予了访问权限。


    通过 HTTP URL (http://) 访问应用程序和通过 chrome URL (chrome://) 访问应用程序之间存在一个重要区别。chrome
    URL 始终指向安装在 Mozilla 引擎 chrome 系统中的包或扩展。一个可以通过 chrome URL 访问的应用程序示例是 chrome://browser/content/bookmarks/bookmarksManager.xul。此
    chrome URL 将打开 Firefox 浏览器中可用的书签管理器。


