    **275**


    **The PhaseListener Approach**


    This approach adds a PhaseListener (PhaseId.RESTORE_VIEW) that short-circuits
    the Lifecycle and does all the processing in the PhaseListener itself. When it
    is done, it calls responseComplete() on the FacesContext.


    For this approach to work, it has to render a reference containing information
    about the managed bean used by the Validator in the initial request. The PhaseListener
    uses this information during postback to create a MethodBinding that can then
    be used to invoke logic behind the validator and return data to the client. Since
    there is no component hierarchy created, and thus no Renderers, there is no risk
    that command components with immediate set to true will cause any side effects.


    But, this approach has one issue; there is no way to prevent application developers
    from attaching additional PhaseListeners at the same phase, which can cause undesired
    side effects.


    Also, you have no way of knowing in which order these PhaseListeners will be executed.


    **The Lifecycle Approach**


    This approach adds a new Lifecycle that is mapped to an Ajax request and contains
    only the lifecycle phases needed to process the request, invokes the application
    logic defined by a MethodBinding, and renders the response. This eliminates the
    overhead of creating and restoring the component tree, and thus no Renderers are
    required. You will also not encounter any issues with immediate="true".


    Another positive side effect of using a custom Lifecycle is that any PhaseListener
    added by the application developer will have no impact on this solution; application
    developers can even add PhaseListeners to this custom Lifecycle. However, if a
    custom PhaseListener is used to place additional managed beans onto the request,
    you can run into issues, unless they are registered for the custom Lifecycle as
    well.


    Selecting a JSF Ajax Approach


    In this book, we have decided to go with the Lifecycle approach, since it has
    no application logic side effects and low overhead. It is here that the Mabon
    open source project can help you focus on the design of your Ajax calendar component.


    **Issue with Relative Variables**


    One valid approach of defining a MethodBinding is to use relative variables in
    the MethodBinding expression. This will have an unfortunate impact on both the
    PhaseListener approach and the Lifecycle approach. For a data fetch to work with
    these two approaches, you need absolute variables in the MethodBinding expression
    (for example, #{ backingBean.getValidDates}).


    An example of a MethodBinding expression using relative variables would be a UIData
    component (for example <h:dataTable ...>) that is stamping out information about
    employees.'
