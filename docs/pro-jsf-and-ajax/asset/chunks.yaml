    Code Sample 1-2 defines a backing bean, `sample`, that points to a class called
    `com.apress.projsf.ch1.application.SampleBean`. The `<managed-bean-scope>` indicates
    where an instance of this bean will be stored after it has been created—request,
    session, or application scope. The code sample also has an option to set the scope
    to `none` for a bean that should not be stored in any scope but instead be instantiated
    on every access. Table 1-2 lists all the available scopes.


    **Table 1-2.** *Managed Bean Scopes*


    | Managed Bean Scope | Description |

    | --- | --- |

    | None | Instance created for every method invocation |

    | Request | Instance created for every request |

    | Session | Instance created on initial request and stored in the session |

    | Application | Instance created on initial request and stored in the Web application
    |

    | View | The JSF view layer describes the intended layout, behavior, and rendering
    of the application. |


    One of the cornerstones of a JSF application is the `UIComponent`. `UIComponent`s
    are the foundation of the JSF view layer and represent the behavior and structure
    of the application. A developer would use these `UIComponent`s to construct an
    application by nesting components within each other. This nested structure will
    at runtime be represented as a component hierarchy, as shown in Figure 1-4, which
    in turn represents the view or UI, much like developing a Swing-based application.


    **Figure 1-4.** *From page description to a JSF component hierarchy*


    The default page description defined by the JSF specification is JSP, but there
    is nothing in the JSF specification preventing an implementer from providing an
    alternative page description, such as an Extensible Markup Language (XML)–based,
    WML-based, or plain HTML-based page description. Using JSP as the page description
    has its good and bad sides. On the plus side, it is a well-known and widespread
    solution; as such, learning how to build applications with JSF and JSP presents
    a fairly shallow learning curve for most J2EE developers. In addition, as a bonus,
    the adoption of JSF as the view technology of choice for new Web applications
    is good. The consequence is that JSF has a dependency on JSP, and as such, it
    needs to work around the different lifecycles of an application that is partially
    JSP and partially JSF. Later in this chapter (refer to the section “JSF and JSP”),
    we will cover these differences and the impact they have on applications built
    with JSP syntax and JSF components.


    ## Controller


    JSF comes with a simple controller—the `FacesServlet`. The `FacesServlet` acts
    as a gatekeeper, controlling navigation flow and dispatching requests to the appropriate
    JSF page.


    ## A Component-Based UI Framework


    We have set the stage for the book, so it is now time to focus on the pieces that
    are differentiating JSF from other technologies: `UIComponent`s. JSF is a component-based
    UI framework where components, such as `HtmlDataTable` and `HtmlPanelGrid`, can
    be viewed as prefabricated blocks that allow application developers to productively
    build complex applications with reusable components. It also allows application
    developers to focus on the application logic rather than on building the dynamic/rich
    functionality themselves.


    > **Note** JSF is all about components—and reusable components at that! JSF was
    first released in March 2004 with a subsequent point release, 1.1, in August 2004.
    The initial JSR (JSR-127) has been replaced by JSR-252, which delivers the JSF
    1.2 release.


    A JSF component consists of five building blocks:


    - `UIComponent`: The `UIComponent` is responsible for the behavior and for accessing
    the data model.'
