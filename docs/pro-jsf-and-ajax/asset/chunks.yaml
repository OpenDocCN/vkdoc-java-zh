  raw: 'Meanwhile, developers are falling back to the lowest common denominator—HTML—and
    using technologies such as Ajax to build dynamic Web applications. This approach
    of developing Web applications has one severe drawback—it has no good reuse model.
    Currently, this approach has no standard way for a developer to define reusable
    and easy-to-integrate HTML


    components that have rich functionality with existing server-side logic. Currently
    developers use JSP tag libraries to create reusable HTML components that access
    server-side logic, but this is still low-level and cumbersome.


    What is needed is a standard that can encapsulate these RITs using components
    instead of markup in an effective model that allows application developers to
    build Web applications with prefabricated blocks of functionality without concern
    for implementation details. Prefabricated blocks, or components, allow application
    developers to build complex applications with reusable components. This also allows
    application developers to focus on the actual application structure rather than
    building the actual dynamic functionality themselves.


    JSF is all about these kinds of reusable components!


    **Cross-Platform Support**


    An important aspect that developers and their managers need to take into account
    when building applications is cross-platform support. Consumer requirements are
    increasingly supporting handheld devices, Telnet clients, desktops, and so on.
    For developers with complete control over the consumer base and infrastructure,
    this may not be important, but in most cases it is.


    Initially the term *cross-platform* meant the operating system the application
    runs on (for example, Windows, Linux, Mac OS, Unix, and so on), but the advancement
    of Internet-enabled devices means the cross-platform support matrix has become
    far more complex.


    Several cross-platform solutions such as Java are available.


    In most cases, applications need to be designed to use features of a specific
    platform, which in turn is time-consuming and costly. For a developer to fully
    support an application on only one platform requires lengthy lifecycles for compiling
    and debugging. Adding more platforms to the mix, the time spent on developing
    a cross-platform application can grow exponentially.


    For the technologies used in this chapter—Ajax, XUL, and HTC—Mozilla’s XUL claims
    that it has cross-platform support. That is partially true; you can deploy a XUL
    application to any operating system that the Mozilla platform (GRE) supports.


    ■**Note** XBL is already available for Firefox on the Mac, and it is coming to
    Safari 1.3/2.0.


    ![Image 35](index-234_1.png)


    5807ch04.qxd 1/13/06 2:50 PM Page 209


    C H A P T E R 4 ■ U S I N G R I C H I N T E R N E T T E C H N O L O G I E S


    **209**


    You could also argue that Ajax provides cross-platform support, but it is the
    provider of the Ajax solution that needs to ensure that every browser-specific
    quirk is supported.


    So, although you have plenty of environments to deploy to, no true solution has
    full cross-platform support.


    **Imagination As the Only Limit**


    JSF standardizes the server side for the application developer, but you still
    have to wait for the presentation layer in the browser to standardize for component
    developers. JSF brings platform independence to the application developer by separating
    the user interface from the application, which makes it possible for the component
    author to change the presentation layer without tampering with the application.


    This is not solving the browser inconsistency issue, the maintenance difficulties,
    or the cross-platform issue of the previously mentioned technologies, but it will
    help application developers build RIAs in a standard way.


    The three technologies described in this chapter—Ajax, XUL, and HTC—have their
    advantages and drawbacks, so wouldn’t it be great if you could combine the advantages
    into one reusable standard component?


    A JSF component developer can use XUL or HTC for presentation and Ajax for communication
    and then dynamically fall back to a traditional HTML solution if the client does
    not support any of the three technologies. The application developer will be able
    to build one application supporting multiple rendering technologies with one common
    programming model—JSP and Java.


    **A JSF Application Supporting Ajax, XUL, and HTC**


    To finish this chapter and map back to the previously covered technologies, the
    JSF sample shown in Figure 4-11 illustrates a page containing your JSF input date
    component. In later chapters, you will implement the support shown in this section.
    This version of your component has been extended to include a pop-up calendar
    from which the user can pick a date.


    This improved component leverages Ajax for communication and XUL and HTC as rendering
    technologies.


    **Figure 4-11.** *A page built with JSF components using XUL as the rendering
    technology*


    ![Image 36](index-235_1.png)


    5807ch04.qxd 1/13/06 2:50 PM Page 210


    **210**


    C H A P T E R 4 ■ U S I N G R I C H I N T E R N E T T E C H N O L O G I E S


    Figure 4-11 shows a JSF page—inputDate.jspx—that contains your ProInputDate component,
    which is rendering XUL content to the Mozilla Firefox browser.


    Figure 4-12 shows the same page—inputDate.jspx—running in Internet Explorer. The
    interesting part with this simple application is that you are using the best rendering
    technology for each browser, and although not visible, the ProInputDate component
    is using Ajax to asynchronously communicate with the server to receive dates that
    are selectable.


    **Figure 4-12.** *The same page in Internet Explorer using HTC as the rendering
    technology* The source of the page (see Code Sample 4-26) is not that different
    from what you have seen with XUL and HTC, but the main difference is that the
    application developer will not need to learn two, or even three, ways of supporting
    RIAs in today’s browsers.


    **Code Sample 4-26.** *JSF Page Matching the XUL and HTC Samples*


    <?xml version="1.0" encoding="UTF-8" ?>


    <jsp:root version="1.2"


    **>


    <jsp:directive.page contentType="application/x-javaserver-faces" />


    <f:view>


    <pro:document title="ProJSF : ProInputDate" >


    <h:form>


    Please enter a date with the pattern "d MMMMM yyyy".


    <br/>


    **<pro:inputDate id="dateField"**


    **title="Date Field Component"**


    **value="#{inputDateBean.date}" >**


    5807ch04.qxd 1/13/06 2:50 PM Page 211


    C H A P T E R 4 ■ U S I N G R I C H I N T E R N E T T E C H N O L O G I E S


    **211**


    <f:convertDateTime pattern="d MMMMM yyyy" />


    **<pro:validateDate availability="#{inputDateBean.getAvailability}" />**


    </pro:inputDate>


    <br/>


    <h:message for="theDate" />


    <br/>


    <h:commandButton value="Submit" />


    <br/>


    <h:outputText value="#{inputDateBean.date}" >


    <f:convertDateTime pattern="d MMMMM yyyy" />


    </h:outputText>


    </h:form>


    </pro:document>


    </f:view>


    </jsp:root>


    Apart from the obvious namespaces, the sample contains one namespace that maps
    to a custom component library () and a custom component (<pro:inputDate ..."/>).
    Be patient—you will see the actual JSF implementation in the coming chapters.


    **Summary**


    This chapter gave you some insight into three of the market’s leading view technologies
    for RIAs: XUL, HTC, and Ajax. These technologies have proven they are more than
    capable of providing users with rich and responsive interfaces. The chapter also
    touched on the issues with these technologies such as lack of standards, platform
    support, and maintenance.


    Looking ahead, the potential for JSF as a technology is unlimited. Component developers
    can provide the community with a wide range of components supporting technologies
    from HTML to XUL, including wireless and even character-based solutions; your
    imagination is the only limit.'
  trans: '

    与此同时，开发者们正退回到最低公分母——HTML——并使用 Ajax 等技术来构建动态 Web 应用。这种开发 Web 应用的方法有一个严重缺陷——它缺乏良好的复用模型。目前，这种方法没有标准方式让开发者定义可复用且易于集成的
    HTML 组件，这些组件需具备丰富的功能并能与现有服务器端逻辑协同工作。当前开发者使用 JSP 标签库来创建可访问服务器端逻辑的可复用 HTML 组件，但这仍然处于低级且繁琐的层面。


    我们需要的是一个标准，它能够使用组件而非标记语言，以一种有效的模型封装这些 RIT（富互联网技术），让应用开发者能够使用预制功能块构建 Web 应用，而无需关心实现细节。预制功能块，即组件，允许应用开发者使用可复用组件构建复杂应用。这也让应用开发者能够专注于实际的应用结构，而非自行构建动态功能。


    JSF 正是关于这类可复用组件的！


    **跨平台支持**


    开发者和他们的管理者在构建应用时需要考虑的一个重要方面是跨平台支持。消费者需求日益支持手持设备、Telnet 客户端、桌面电脑等。对于能完全控制消费者群体和基础设施的开发者来说，这可能并不重要，但在大多数情况下，它至关重要。


    最初，*跨平台*一词指的是应用运行的操作系统（例如 Windows、Linux、Mac OS、Unix 等），但随着支持互联网的设备的进步，跨平台支持矩阵已变得复杂得多。


    有几种跨平台解决方案可用，例如 Java。


    在大多数情况下，应用需要被设计为利用特定平台的功能，而这反过来又耗时且成本高昂。对于开发者来说，要在一个平台上完全支持一个应用，需要漫长的编译和调试生命周期。如果加入更多平台，开发跨平台应用所花费的时间可能会呈指数级增长。


    对于本章中使用的技术——Ajax、XUL 和 HTC——Mozilla 的 XUL 声称具有跨平台支持。这在一定程度上是正确的；你可以将 XUL 应用部署到
    Mozilla 平台（GRE）支持的任何操作系统上。


    ■**注意** XBL 已可用于 Mac 上的 Firefox，并且即将支持 Safari 1.3/2.0。


    ![图片 35](img/index-234_1.png)


    5807ch04.qxd 1/13/06 2:50 PM 第 209 页


    第 4 章 ■ 使用富互联网技术


    **209**


    你也可以说 Ajax 提供了跨平台支持，但需要 Ajax 解决方案的提供者确保支持每个浏览器特有的怪癖。


    因此，尽管你有许多部署环境，但没有一个真正的解决方案能提供完全的跨平台支持。


    **想象力是唯一的限制**


    JSF 为应用开发者标准化了服务器端，但你仍需等待浏览器中的表示层为组件开发者实现标准化。JSF 通过将用户界面与应用分离，为应用开发者带来了平台独立性，这使得组件作者能够在不篡改应用的情况下更改表示层。


    这并没有解决浏览器不一致性问题、维护难题，或前述技术的跨平台问题，但它将帮助应用开发者以标准方式构建 RIA。


    本章描述的三种技术——Ajax、XUL 和 HTC——各有优缺点，那么，如果你能将它们的优点结合到一个可复用的标准组件中，岂不是很好？


    JSF 组件开发者可以使用 XUL 或 HTC 进行表示，使用 Ajax 进行通信，然后在客户端不支持这三种技术中的任何一种时，动态回退到传统的 HTML
    解决方案。应用开发者将能够使用一个通用的编程模型——JSP 和 Java——构建一个支持多种渲染技术的应用。


    **一个支持 Ajax、XUL 和 HTC 的 JSF 应用**


    为了结束本章并回顾之前介绍的技术，图 4-11 中展示的 JSF 示例展示了一个包含你的 JSF 输入日期组件的页面。在后续章节中，你将实现本节中展示的支持。此版本的组件已扩展为包含一个弹出式日历，用户可以从其中选择日期。


    这个改进后的组件利用 Ajax 进行通信，并利用 XUL 和 HTC 作为渲染技术。


    **图 4-11.** *一个使用 XUL 作为渲染技术、由 JSF 组件构建的页面*


    ![图片 36](img/index-235_1.png)


    5807ch04.qxd 1/13/06 2:50 PM 第 210 页


    **210**


    第 4 章 ■ 使用富互联网技术


    图 4-11 显示了一个 JSF 页面——inputDate.jspx——它包含你的 ProInputDate 组件，该组件正在向 Mozilla Firefox
    浏览器渲染 XUL 内容。


    图 4-12 显示了同一个页面——inputDate.jspx——在 Internet Explorer 中运行的情况。这个简单应用的有趣之处在于，你为每个浏览器使用了最佳的渲染技术，并且虽然不可见，但
    ProInputDate 组件正在使用 Ajax 与服务器异步通信，以接收可选择的日期。


    **图 4-12.** *在 Internet Explorer 中使用 HTC 作为渲染技术的同一个页面* 该页面的源代码（参见代码示例 4-26）与你之前看到的
    XUL 和 HTC 示例没有太大不同，但主要区别在于，应用开发者无需学习两种甚至三种在当今浏览器中支持 RIA 的方法。


    **代码示例 4-26.** *匹配 XUL 和 HTC 示例的 JSF 页面*


    <?xml version="1.0" encoding="UTF-8" ?>


    <jsp:root version="1.2"


    **>


    <jsp:directive.page contentType="application/x-javaserver-faces" />


    <f:view>


    <pro:document title="ProJSF : ProInputDate" >


    <h:form>


    请输入一个符合模式 "d MMMMM yyyy" 的日期。


    <br/>


    **<pro:inputDate id="dateField"**


    **title="日期字段组件"**


    **value="#{inputDateBean.date}" >**


    5807ch04.qxd 1/13/06 2:50 PM 第 211 页


    第 4 章 ■ 使用富互联网技术


    **211**


    <f:convertDateTime pattern="d MMMMM yyyy" />


    **<pro:validateDate availability="#{inputDateBean.getAvailability}" />**


    </pro:inputDate>


    <br/>


    <h:message for="theDate" />


    <br/>


    <h:commandButton value="提交" />


    <br/>


    <h:outputText value="#{inputDateBean.date}" >


    <f:convertDateTime pattern="d MMMMM yyyy" />


    </h:outputText>


    </h:form>


    </pro:document>


    </f:view>


    </jsp:root>


    除了明显的命名空间之外，该示例包含一个映射到自定义组件库的命名空间（）和一个自定义组件（<pro:inputDate ..."/>）。请耐心等待——你将在接下来的章节中看到实际的
    JSF 实现。


    **总结**


    本章让你深入了解了市场上三种领先的 RIA 视图技术：XUL、HTC 和 Ajax。这些技术已证明它们完全能够为用户提供丰富且响应迅速的界面。本章还触及了这些技术存在的问题，例如缺乏标准、平台支持和维护。


    展望未来，JSF 作为一种技术的潜力是无限的。组件开发者可以为社区提供广泛的组件，支持从 HTML 到 XUL 的各种技术，包括无线甚至基于字符的解决方案；你的想象力是唯一的限制。

