    public class HtmlDocumentRenderer extends HtmlRenderer


    {


    /**


    * The title attribute.


    /


    public static String TITLE_ATTR = "title";


    /*


    * The styleClass attribute.


    /


    public static String STYLE_CLASS_ATTR = "styleClass";


    /*


    * The stylesheetURI attribute.


    */


    public static String STYLESHEET_URI_ATTR = "stylesheetURI"; public void encodeBegin(


    FacesContext context,


    UIComponent component) throws IOException


    {


    ResponseWriter out = context.getResponseWriter();


    Map attrs = component.getAttributes();


    String styleClass = getStyleClass(attrs);


    out.startElement("html", component);


    out.startElement("head", null);


    encodeHead(context, out, attrs);


    out.endElement("head");


    out.startElement("body", null);


    if (styleClass != null)


    out.writeAttribute("class", styleClass, STYLE_CLASS_ATTR);


    }

    ```


    The `encodeBegin()` method takes two arguments: `FacesContext context` and `UIComponent
    component`. From the component, you can obtain a `Map` containing all the available
    attributes.


    In this case, the application developer can set three attributes in his JSP document
    or backing bean (the `title`, the `styleClass` and the `stylesheetURI`), and the
    attribute map is passed as an argument to the `encodeHead()` method.


    The `startElement()` method takes the following arguments: `name` and `component`.
    The `name` argument is the name of the element generated (for example, `html`),
    and the `component` argument is the `UIComponent` that this element represents.
    In Code Sample 9-14, this is represented with the component `UIDocument`.


    The `encodeEnd()` method, as shown in Code Sample 9-15, is basically just closing
    the HTML `<body>` and `<html>` tags.


    5807ch09.qxd 1/19/06 6:02 PM Page 383


    C H A P T E R 9 ■ P R OV I D I N G M I C R O S O F T H T C R E N D E R E R S


