- fmt: "# Code Sample 2-14. Writing Output to the JSP Buffered Body Tag\n\n`ResponseWriter\
    \ out = context.getResponseWriter();`\n\n`out.startElement(\"div\", component);`\n\
    \n`if (title != null)`\n\n`out.writeAttribute(\"title\", title, TITLE_ATTR);`\n\
    \n`out.startElement(\"input\", component);`\n\n`out.writeAttribute(\"name\", clientId,\
    \ null);`\n\n`if (valueString != null)`\n\n`out.writeAttribute(\"value\", valueString,\
    \ null);`\n\n`out.endElement(\"input\");`\n\n`ViewHandler handler = context.getApplication().getViewHandler();`\n\
    \n`String overlayURL = handler.getResourceURL(context, \"/projsf-ch2/inputDateOverlay.gif\"\
    );`\n\n`out.startElement(\"img\", null);`\n\n`out.writeAttribute(\"class\", \"\
    ProInputDateOverlay\", null);`\n\n`out.writeAttribute(\"src\", overlayURL, null);`\n\
    \n`out.endElement(\"img\");`\n\n`out.endElement(\"div\");`\n\nThe `startElement()`\
    \ method takes the following arguments—`name`, `UIComponent`, and `componentForElement`.\
    \ The `name` parameter is the name of the element generated (for example, `\"\
