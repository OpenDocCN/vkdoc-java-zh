- fmt: "You can use this `setStringProperty()` method to assign any component attribute\
    \ that can take either a static value or a value binding (for example, `#{sample.Date}`).\
    \ If the value is null, then you avoid explicitly storing the value in the component.\
    \ To check whether the value is a JSF EL expression, you can use a method called\
    \ `isValueReference()`. This method is provided by the `UIComponentTag` class\
    \ and will return true if the specified value conforms to the syntax requirements\
    \ of a value-binding expression. When the string is a valid value-binding expression,\
    \ you create and store a corresponding `ValueBinding` instance as the attribute\
    \ value.\n\n## JSF 1.2 SETPROPERTIES\n\nJSF 1.2 supports the direct use of JSP\
    \ 2.1 `ValueExpression` and `MethodExpression`, rather than passing a `String`\
    \ to the tag handler and requiring it to parse the expression internally. As a\
    \ result, the `UIComponentTagSupport` `setStringProperty()` method described in\
    \ this chapter would change as follows for JSF 1.2:\n\n```\nprotected void setStringProperty(\n\
    \    UIComponent component,\n    String attrName,\n    ValueExpression value)\n\
    {\n    if (value == null)\n        return;\n    if (!value.isLiteralText())\n\
    \    {\n        component.setValueExpression(attrName, value);\n    }\n    else\n\
    \    {\n        component.getAttributes().put(attrName, value.getExpressionString());\n\
    \    }\n}\n```\n\nIf the `ValueExpression` is actually just literal text, then\
    \ this text is pushed directly into the component attribute’s map. Otherwise,\
    \ the `ValueExpression` is set on the component for this attribute for deferred\
    \ evaluation during the execution of the JSF lifecycle.\n\nThe `setBooleanProperty()`\
    \ method, as shown in Code Sample 2-33, is essentially performing the same task\
    \ as the aforementioned `setStringProperty()` method with one difference; instead\
    \ of handling `String` object types, it handles boolean types.\n\n### Code Sample\
    \ 2-33. Method Handling Boolean Attributes and Properties\n\n```\n/**\n * Sets\
    \ a component boolean property as a value binding, or boolean literal.\n *\n *\
    \ @param component the Faces component\n * @param attrName the attribute name\n\
    \ * @param value the attribute value\n */\nprotected void setBooleanProperty(\n\
    \    UIComponent component,\n    String attrName,\n    String value)\n{\n    if\
    \ (value == null)\n        return;\n    if (isValueReference(value))\n    {\n\
    \        component.setValueBinding(attrName, createValueBinding(value));\n   \
    \ }\n    else\n    {\n        component.getAttributes().put(attrName, Boolean.valueOf(value));\n\
    \    }\n}\n```\n\nThe `setValueBindingProperty()` method, as shown in Code Sample\
    \ 2-34, is simpler in its construction since it will be used by only those attributes\
    \ that do not support a literal value and accept only a value-binding expression.\
    \ If the value passed does not conform to EL expression syntax, it throws an `IllegalArgumentException`.\n\
    \n### Code Sample 2-34. Method Handling `ValueBinding` Attributes and Properties\n\
    \n```\n/**\n * Sets a component property as a value binding.\n *\n * @param component\
    \ the Faces component\n * @param attrName the attribute name\n * @param value\
    \ the attribute value\n */\nprotected void setValueBindingProperty(\n    UIComponent\
    \ component,\n    String attrName,\n    String value)\n{\n    if (value == null)\n\
    \        return;\n    if (!isValueReference(value))\n        throw new IllegalArgumentException();\n\
    \    component.setValueBinding(attrName, createValueBinding(value));\n}\n```\n\
    \nFor the `ProInputDate` component, you want to provide support for the `valueChangeListener`\
    \ attribute, and therefore you need to handle method-binding expressions, as illustrated\
    \ in Code Sample 2-35.\n\n### Code Sample 2-35. Method Handling `MethodBinding`\
    \ Attributes and Properties\n\n```\n/**\n * Sets a component property as a method\
    \ binding.\n *\n * @param component the Faces component\n * @param attrName the\
    \ attribute name\n * @param value the attribute value\n * @param signature the\
    \ method signature\n */\nprotected void setMethodBindingProperty(\n    UIComponent\
    \ component,\n    String attrName,\n    String value,\n    Class[] signature)\n\
    {\n    if (value == null)\n        return;\n    Map attrs = component.getAttributes();\n\
    \    attrs.put(attrName, createMethodBinding(value, signature));\n}\n```\n\nA\
    \ major difference between a `MethodBinding` and a `ValueBinding` is that not\
    \ only do you have to provide the method expression, but you also have to provide\
    \ the signature for the method specified by the method expression. For a `valueChangeListener`\
    \ method, this means you need to pass the signature as a class array with one\
    \ class—`ValueChangeEvent.class`.\n\n## METHODBINDING\n\n`UICommand` components\
    \ use method-binding expressions to reference, for example, an `Action` method\
    \ or an `ActionListener` method. The `MethodBinding` class encapsulates the actual\
    \ evaluation of a method binding. You can acquire instances of `MethodBinding`\
    \ for specific references from the `Application` instance by calling the `createMethodBinding()`\
    \ method. Note that instances of `MethodBinding` are immutable and contain no\
    \ references to a `FacesContext` (which is passed in as a parameter when the reference\
    \ binding is evaluated).\n\nTo complete the `UIComponentTagSupport` class, you\
    \ need to add two methods that can create and return a `ValueBinding` and a `MethodBinding`.\
    \ Code Sample 2-36 shows the `createValueBinding()` and `createMethodBinding()`\
    \ methods.\n\n### Code Sample 2-36. The `createValueBinding()` and `createMethodBinding()`\
    \ Methods\n\n```\n/**\n * Returns a ValueBinding for the string value.\n *\n *\
    \ @param value the attribute string value\n *\n * @return a parsed ValueBinding\n\
    \ */\nprotected ValueBinding createValueBinding(\n    String value)\n{\n    FacesContext\
    \ context = FacesContext.getCurrentInstance();\n    Application application =\
    \ context.getApplication();\n    return application.createValueBinding(value);\n\
    }\n\n/**\n * Returns a MethodBinding for the string value.\n *\n * @param value\
    \ the attribute string value\n * @param signature the method binding signature\n\
    \ *\n * @return a parsed MethodBinding\n */\nprotected MethodBinding createMethodBinding(\n\
    \    String value,\n    Class[] signature)\n{\n    FacesContext context = FacesContext.getCurrentInstance();\n\
    \    Application application = context.getApplication();\n    return application.createMethodBinding(value,\
    \ signature);\n}\n```\n\nThe `createMethodBinding()` method evaluates the specified\
    \ method-binding expression and creates a `MethodBinding` instance. The method\
    \ referenced by the expression is called when the `MethodBinding` is executed.\
    \ When the method is called, certain parameters are passed to the backing bean\
    \ method, such as a `ValueChangedEvent` for the `MethodBinding` attached to the\
    \ `valueChangeListener` attribute. The `MethodBinding` must dynamically look up\
    \ the right method signature to make sure it calls the right method.\n\n## JSF\
    \ 1.2 VALUEEXPRESSION AND METHODEXPRESSION\n\nJSF 1.2 now directly leverages JSP\
    \ EL in JSP 2.1. JSP EL has native support for both immediate `${}`-syntax expressions\
    \ and deferred `#{}`-syntax expressions. Therefore, JSF 1.2 tag handlers use the\
    \ new JSP EL `ValueExpression` and `MethodExpression` types as parameters, letting\
    \ the JSP container take responsibility for parsing the expressions. Two new tag\
    \ handler base classes, `UIComponentELTag` and `UIComponentELBodyTag`, have been\
    \ introduced in JSF 1.2 to replace `UIComponentTag` and `UIComponentBodyTag` in\
    \ JSF 1.1.\n\n## The ProInputDateTag Class\n\nYour new component needs a new custom\
    \ action, `inputDate`, with a corresponding tag handler class, `ProInputDateTag`.\
    \ On initial rendering, the `ProInputDateTag` is responsible for creating your\
    \ new renderer-specific component subclass—`ProInputDate`—and transferring all\
    \ JSP custom action attributes from the tag handler to the component instance."
  raw: 'You can use this setStringProperty() method to assign any component attribute
    that can take either a static value or a value binding (for example, #{sample.Date}).
    If the value is null, then you avoid explicitly storing the value in the component.
    To check whether the value is a JSF EL expression, you can use a method called
    isValueReference(). This method is provided by the UIComponentTag class and will
    return true if the specified value conforms to the syntax requirements of a value-binding
    expression. When the string is a valid value-binding expression, you create and
    store a corresponding ValueBinding instance as the attribute value.


    **JSF 1.2 SETPROPERTIES**


    JSF 1.2 supports the direct use of JSP 2.1 ValueExpression and MethodExpression,
    rather than passing a String to the tag handler and requiring it to parse the
    expression internally. As a result, the UIComponentTagSupport setStringProperty()
    method described in this chapter would change as follows for JSF 1.2:


    protected void setStringProperty(


    UIComponent component,


    String attrName,


    ValueExpression value)


    {


    if (value == null)


    return;


    if (!value.isLiteralText())


    {


    component.setValueExpression(attrName, value);


    }


    else


    {


    component.getAttributes().put(attrName, value.getExpressionString());


    }


    }


    If the ValueExpression is actually just literal text, then this text is pushed
    directly into the component attribute’s map. Otherwise, the ValueExpression is
    set on the component for this attribute for deferred evaluation during the execution
    of the JSF lifecycle.


    5807ch02.qxd 12/30/05 4:27 PM Page 90


    **90**


    C H A P T E R 2 ■ D E F I N I N G T H E D AT E F I E L D C O M P O N E N T


    The setBooleanProperty() method, as shown in Code Sample 2-33, is essentially
    performing the same task as the aforementioned setStringProperty() method with
    one difference; instead of handling String object types, it handles boolean types.


    **Code Sample 2-33.** *Method Handling Boolean Attributes and Properties*


    /**


    * Sets a component boolean property as a value binding, or boolean literal.


    *


    * @param component the Faces component


    * @param attrName the attribute name


    * @param value the attribute value


    */


    protected void setBooleanProperty(


    UIComponent component,


    String attrName,


    String value)


    {


    if (value == null)


    return;


    if (isValueReference(value))


    {


    component.setValueBinding(attrName, createValueBinding(value));


    }


    else


    {


    component.getAttributes().put(attrName, Boolean.valueOf(value));


    }


    }


    The setValueBindingProperty() method, as shown in Code Sample 2-34, is simpler
    in its construction since it will be used by only those attributes that do not
    support a literal value and accept only a value-binding expression. If the value
    passed does not conform to EL


    expression syntax, it throws an IllegalArgumentException.


    **Code Sample 2-34.** *Method Handling* ValueBinding *Attributes and Properties*


    /**


    * Sets a component property as a value binding.


    *


    * @param component the Faces component


    * @param attrName the attribute name


    * @param value the attribute value


    */


    5807ch02.qxd 12/30/05 4:27 PM Page 91


    C H A P T E R 2 ■ D E F I N I N G T H E D AT E F I E L D C O M P O N E N T


    **91**


    protected void setValueBindingProperty(


    UIComponent component,


    String attrName,


    String value)


    {


    if (value == null)


    return;


    if (!isValueReference(value))


    throw new IllegalArgumentException();


    component.setValueBinding(attrName, createValueBinding(value));


    }


    For the ProInputDate component, you want to provide support for the valueChangeListener
    attribute, and therefore you need to handle method-binding expressions, as illustrated
    in Code Sample 2-35.


    **Code Sample 2-35.** *Method Handling* MethodBinding *Attributes and Properties*


    /**


    * Sets a component property as a method binding.


    *


    * @param component the Faces component


    * @param attrName the attribute name


    * @param value the attribute value


    * @param signature the method signature


    */


    protected void setMethodBindingProperty(


    UIComponent component,


    String attrName,


    String value,


    Class[] signature)


    {


    if (value == null)


    return;


    Map attrs = component.getAttributes();


    attrs.put(attrName, createMethodBinding(value, signature));


    }


    A major difference between a MethodBinding and a ValueBinding is that not only
    do you have to provide the method expression, but you also have to provide the
    signature for the method specified by the method expression. For a valueChangeListener
    method, this means you need to pass the signature as a class array with one class—ValueChangeEvent.class.


    5807ch02.qxd 12/30/05 4:27 PM Page 92


    **92**


    C H A P T E R 2 ■ D E F I N I N G T H E D AT E F I E L D C O M P O N E N T


    **METHODBINDING**


    UICommand components use method-binding expressions to reference, for example,
    an Action method or an ActionListener method. The MethodBinding class encapsulates
    the actual evaluation of a method binding. You can acquire instances of MethodBinding
    for specific references from the Application instance by calling the createMethodBinding()
    method. Note that instances of MethodBinding are immutable and contain no references
    to a FacesContext (which is passed in as a parameter when the reference binding
    is evaluated).


    To complete the UIComponentTagSupport class, you need to add two methods that
    can create and return a ValueBinding and a MethodBinding. Code Sample 2-36 shows
    the createValueBinding() and createMethodBinding() methods.


    **Code Sample 2-36.** *The* createValueBinding() *and* createMethodBinding() *Methods*


    /**


    * Returns a ValueBinding for the string value.


    *


    * @param value the attribute string value


    *


    * @return a parsed ValueBinding


    */


    **protected ValueBinding createValueBinding(**


    String value)


    {


    FacesContext context = FacesContext.getCurrentInstance(); Application application
    = context.getApplication();


    return application.createValueBinding(value);


    }


    /**


    * Returns a MethodBinding for the string value.


    *


    * @param value the attribute string value


    * @param signature the method binding signature


    *


    * @return a parsed MethodBinding


    */


    **protected MethodBinding createMethodBinding(**


    String value,


    Class[] signature)


    {


    FacesContext context = FacesContext.getCurrentInstance(); Application application
    = context.getApplication();


    return application.createMethodBinding(value, signature);


    }


    }


    5807ch02.qxd 12/30/05 4:27 PM Page 93


    C H A P T E R 2 ■ D E F I N I N G T H E D AT E F I E L D C O M P O N E N T


    **93**


    The createMethodBinding() method evaluates the specified method-binding expression
    and creates a MethodBinding instance. The method referenced by the expression
    is called when the MethodBinding is executed. When the method is called, certain
    parameters are passed to the backing bean method, such as a ValueChangedEvent
    for the MethodBinding attached to the valueChangeListener attribute. The MethodBinding
    must dynamically look up the right method signature to make sure it calls the
    right method.


    **JSF 1.2 VALUEEXPRESSION AND METHODEXPRESSION**


    JSF 1.2 now directly leverages JSP EL in JSP 2.1\. JSP EL has native support for
    both immediate ${}-syntax expressions and deferred #{}-syntax expressions. Therefore,
    JSF 1.2 tag handlers use the new JSP EL ValueExpression and MethodExpression types
    as parameters, letting the JSP container take responsibility for parsing the expressions.
    Two new tag handler base classes, UIComponentELTag and UIComponentELBodyTag, have
    been introduced in JSF 1.2 to replace UIComponentTag and UIComponentBodyTag in
    JSF 1.1.


    The ProInputDateTag Class


    Your new component needs a new custom action, inputDate, with a corresponding
    tag handler class, ProInputDateTag. On initial rendering, the ProInputDateTag
    is responsible for creating your new renderer-specific component subclass—ProInputDate—and
    transferring all JSP custom action attributes from the tag handler to the component
    instance.'
  trans: "\n您可以使用 `setStringProperty()` 方法为任何组件属性赋值，该属性可以接受静态值或值绑定（例如，`#{sample.Date}`）。如果值为\
    \ `null`，则可以避免将值显式存储在组件中。要检查该值是否为 JSF EL 表达式，可以使用名为 `isValueReference()` 的方法。此方法由\
    \ `UIComponentTag` 类提供，如果指定的值符合值绑定表达式的语法要求，则返回 `true`。当字符串是有效的值绑定表达式时，您将创建并存储相应的\
    \ `ValueBinding` 实例作为属性值。\n\n**JSF 1.2 SETPROPERTIES**\n\nJSF 1.2 支持直接使用 JSP 2.1\
    \ 的 `ValueExpression` 和 `MethodExpression`，而不是将字符串传递给标签处理器并要求其在内部解析表达式。因此，本章描述的\
    \ `UIComponentTagSupport` 类的 `setStringProperty()` 方法在 JSF 1.2 中会进行如下修改：\n\n```java\n\
    protected void setStringProperty(\n    UIComponent component,\n    String attrName,\n\
    \    ValueExpression value)\n{\n    if (value == null)\n        return;\n    if\
    \ (!value.isLiteralText())\n    {\n        component.setValueExpression(attrName,\
    \ value);\n    }\n    else\n    {\n        component.getAttributes().put(attrName,\
    \ value.getExpressionString());\n    }\n}\n```\n\n如果 `ValueExpression` 实际上只是纯文本，则此文本会直接推入组件属性的映射中。否则，`ValueExpression`\
    \ 会被设置到组件的该属性上，以便在 JSF 生命周期执行期间进行延迟求值。\n\n5807ch02.qxd 12/30/05 4:27 PM 第 90 页\n\
    \n**90**\n\n第 2 章 ■ 定义日期字段组件\n\n如代码示例 2-33 所示，`setBooleanProperty()` 方法本质上执行与上述\
    \ `setStringProperty()` 方法相同的任务，但有一个区别：它处理的是布尔类型，而不是字符串对象类型。\n\n**代码示例 2-33.**\
    \ *处理布尔属性和属性的方法*\n\n```java\n/**\n * 将组件布尔属性设置为值绑定或布尔字面量。\n *\n * @param component\
    \ Faces 组件\n * @param attrName  属性名称\n * @param value     属性值\n */\nprotected\
    \ void setBooleanProperty(\n    UIComponent component,\n    String attrName,\n\
    \    String value)\n{\n    if (value == null)\n        return;\n    if (isValueReference(value))\n\
    \    {\n        component.setValueBinding(attrName, createValueBinding(value));\n\
    \    }\n    else\n    {\n        component.getAttributes().put(attrName, Boolean.valueOf(value));\n\
    \    }\n}\n```\n\n如代码示例 2-34 所示，`setValueBindingProperty()` 方法的结构更简单，因为它仅用于那些不支持字面量值且只接受值绑定表达式的属性。如果传递的值不符合\
    \ EL 表达式语法，则会抛出 `IllegalArgumentException`。\n\n**代码示例 2-34.** *处理* ValueBinding\
    \ *属性和属性的方法*\n\n```java\n/**\n * 将组件属性设置为值绑定。\n *\n * @param component Faces 组件\n\
    \ * @param attrName  属性名称\n * @param value     属性值\n */\n```\n\n5807ch02.qxd 12/30/05\
    \ 4:27 PM 第 91 页\n\n第 2 章 ■ 定义日期字段组件\n\n**91**\n\n```java\nprotected void setValueBindingProperty(\n\
    \    UIComponent component,\n    String attrName,\n    String value)\n{\n    if\
    \ (value == null)\n        return;\n    if (!isValueReference(value))\n      \
    \  throw new IllegalArgumentException();\n    component.setValueBinding(attrName,\
