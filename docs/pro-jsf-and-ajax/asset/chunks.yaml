    代码示例 5-9 将 weblet 容器映射到以 `/projsf-ch5` 为前缀的过滤器 URL，该前缀位于上下文根目录下。为 `WebletsFilter`
    映射使用此特定 URL 模式，可以防止 weblet 容器为非 weblet 请求引入不必要的开销。如果一个 weblet 服务于特定模式，例如 `/projsf-ch5/*`，那么它将服务于所有
    `/projsf-ch5/*` 的请求，而不会回退到上下文根目录。


    **代码示例 5-9.** *web.xml 文件中的 Weblet 容器配置*


    <web-app>


    <filter>


    <filter-name>Weblet Container</filter-name>


    **<filter-class>net.java.dev.weblets.WebletsFilter</filter-class>**


    </filter>


    <filter-mapping>


    <filter-name>Weblet Container</filter-name>


    **<url-pattern>/projsf-ch5/*</url-pattern>**


