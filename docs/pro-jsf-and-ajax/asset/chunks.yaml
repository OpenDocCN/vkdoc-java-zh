    <application>


    **<default-render-kit-id>#{[managedBean].[property]}</default-render-kit-id>**


    </application>


    ...


    </faces-config>


    With an explicit syntax shown in Code Sample 10-2, you can use the ViewHandler
    to first check the pattern of the string and then use the string to create a ValueBinding
    for the managed bean defined by the expression. In this case, the completed configuration
    would look something like Code Sample 10-3.


    **Code Sample 10-3.** *Setting the Default* RenderKit *ID Using a Managed Bean*


    <?xml version="1.0" encoding="utf-8"?>


    <!DOCTYPE faces-config PUBLIC


    "-//Sun Microsystems, Inc.//DTD JavaServer Faces Config 1.1//EN"


    "http://java.sun.com/dtd/web-facesconfig_1_1.dtd">


    <faces-config >


    <application>


    **<default-render-kit-id>#{projsf.renderKitId}</default-render-kit-id>**


    </application>


    ...


    </faces-config>


    In this case, the renderKitId is a JavaBean property of the ApplicationBean that
    returns the correct RenderKit identifier for the requesting user agent.


    **The Dynamic RenderKit Managed Bean**


    Let’s look at the actual ApplicationBean class. Figure 10-2 shows the ApplicationBean
    in a class diagram, and in Code Sample 10-4, you can observe the User-Agent request
    header for choosing an appropriate RenderKit.


