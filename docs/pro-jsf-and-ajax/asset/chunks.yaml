    在回传期间，JSF 请求生命周期的所有六个阶段都会被调用（除非在某个地方调用了 `renderResponse()`，在这种情况下，生命周期将直接跳转到渲染响应阶段）。当执行恢复视图阶段时，它会恢复来自先前请求的任何可用状态。在应用请求值阶段（见图
    3-5），会建立来自请求参数的提交值并将其添加到每个输入组件，同时任何事件都会被排队。


