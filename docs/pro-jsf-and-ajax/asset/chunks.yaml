- fmt: '# Note


    With `XMLHttpRequest`, you do not need the form element in an application, but
    one function requires a form regardless of regular postbacks or Ajax postbacks—file
    upload. If you need file-upload functionality in your application, you have to
    use `form.submit()`. In the context of Ajax, you can do this by using a hidden
    `<iframe>` tag and the `form.submit()` function and setting `target`.


    ## Ajax Is Not a Magic Wand


    As you know, the `XMLHttpRequest` object is an important player in Ajax, since
    it transports data asynchronously between the client and the server. It is important
    to understand that the `XMLHttpRequest` is not a magic wand that automatically
    solves all your problems. You still need to watch performance and scalability
    carefully using the `XMLHttpRequest` object. If you are aware of this, it is easy
    to understand that it is what you send on the request, receive upon the response,
    and manage on the client that will affect your performance.


    ## Building Ajax Applications


    Traditional Web applications are in most cases slower than their desktop application
    counterparts. With Ajax, you can now send requests to the Web server to retrieve
    only the data needed using JavaScript to process the response, which creates a
    more responsive Web application.


    Figure 4-3 illustrates a page using Ajax to asynchronously communicate with the
    back-end and provide a Book Titles drop-down list that includes certain books
    based on what category the user enters.


    ![Image 27](index-207_1.png)


    ![Image 28](index-207_2.png)


    **Figure 4-3.** *An HTML page using Ajax to filter a list of books based on category*


    When the user tabs out of the Book Category field, the drop-down list is populated
    with books based on the entered category without a page refresh.


    Figure 4-4 shows the result of entering *Ajax* as the category and tabbing out
    of the Book Category field.


    ![Image 29](index-209_1.png)


    **Figure 4-4.** *An HTML page using Ajax to filter a list of books based on category*


    As you can see, the Book Titles drop-down list has been populated with books about
    the related topic.


    A traditional Ajax application leverages standard HTML/XHTML as the presentation
    layer and JavaScript to dynamically change the DOM, which creates an effect of
    "richness" in the user interface with no dependency on a particular runtime environment.
    Code Sample 4-3 shows the actual HTML source behind this simple application.


    **Code Sample 4-3.** *An HTML Page Leveraging Ajax to Update a `<select>` Element*


    ```

    <!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">

    <html>

    <head>

    <script type="text/javascript"

    src="projsf-ch4/dynamicBookList.js" >

    </script>

    <title>Select a book</title>

    </head>

    <body>

    <form name="form" method="get">

    <table>

    <tr>

    <td align="right">Book Category</td>

    <td>

    <input type="text" size="3" maxlength="8"

    onchange="populateBookList(''/chapter4-context-root/projsf-ch4'',

    ''bookListId'', this.value);" />

    </td>

    </tr>

    <tr>

    <td align="right">Book Title</td>

    <td >

    <select id="bookListId" >

    <option value="[none]">

    [enter a book category]

    </option>

    </select>

    </td>

    </tr>

    </table>

    </form>

    </body>

    </html>

    ```


    At the top of this page, you have a reference to your Ajax implementation—`dynamicBookList.js`.
    This code adds an `onchange` event handler to the `<input>` element that will
    call a JavaScript function, `populateBookList()`, which is invoked when the cursor
    leaves the input field. The `populateBookList()` function takes three arguments—the
    service URL for retrieving the book list data, the book category entered in the
    input field (`this.value`), and the ID of the select element to populate with
    books (`''bookListId''`).


