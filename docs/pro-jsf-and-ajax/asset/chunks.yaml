    *Dojo 工具包*：Dojo 是一个由 Alex Russel（http://www.dojotoolkit.org）用 JavaScript 编写的开源
    DHTML 工具包。Dojo 工具包包含支持后退按钮、书签和文件上传的 Ajax 功能。


    Ajax 和这两个开源框架是互补的，在本章中，你将学习如何使用它们来处理 ProShowOneDeck 组件的回发事件。你还将提供一个公共 API，所有启用
