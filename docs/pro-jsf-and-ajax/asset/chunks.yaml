    During rendering, after the HTML document has been fully parsed, the browser provides
    array access to various collections of related HTML elements in the page (for
    example, images and forms). You can use the document.forms array to access the
    form being submitted. Each form also provides array access to the input fields
    managed by that form. In the JavaScript implementation, you will be using a hidden
    form field to store the clientId of the selected UIShowItem. When the form is
    submitted, this value will be passed to the server and used during decode to detect
    which UIShowItem should be expanded, causing its child components to be displayed.


    Potentially, an application developer might be adding more than one HtmlShowOneDeck
    component to the page, and by giving the hidden form field the same name as the
    clientId of the HtmlShowOneDeck component, you ensure you expand the correct HtmlShowOneDeck
    component. You first get the form—document.forms[formClientId]. Then, knowing
    the form, you can access the hidden input field, if it exists, and set the clientId
    of the selected UIShowItem component—input.value = itemId. You finish the function
    by submitting the form and passing the new values to the server-side component
    hierarchy for processing.


