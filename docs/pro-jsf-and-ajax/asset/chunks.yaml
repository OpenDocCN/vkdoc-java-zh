    C H A P T E R 2 ■ D E F I N I N G T H E D AT E F I E L D C O M P O N E N T


    **Summary**


    This chapter gave you a blueprint and an understanding of what is required to
    write a JSF


    custom component. It covered topics including creating Renderers, creating renderer-specific
    subclasses, using external resources, registering component objects, and creating
    JSP tag handlers and TLDs. In later chapters, you will leverage this knowledge
    as the foundation for building more advanced JSF components.


    The structure of how to build components will remain the same throughout the book.
    First you analyze the markup needed to create the intended behavior and user interface.
    Then you create the client-specific Renderer with all attributes needed for your
    component. Optionally, but recommended, you create the renderer-specific subclass
    that the application developer can use to customize the component at runtime.
    Finally, you implement support for the page description of choice—JSP. You should
    also now understand how to use ValueBinding and MethodBinding and how to support
    these concepts in your own JSF tag handlers.


    ![Image 16](index-130_1.png)


    5807ch03.qxd 1/13/06 11:06 AM Page 105


    C H A P T E R 3


    ■ ■ ■


    Defining the Deck Component


    *One of the most important aspects of most nontrivial applications (especially
    UI type* *apps) is the ability to respond to events that are generated by the
    various components of* *the application, both in response to user interactions
    and other system components . . . .*


    —Terry Warren, SCOUG, 1999


    **T**his chapter expands on the blueprint for building components outlined in
    the previous chapter. For this chapter, we will show how to create a component
    that can act as an accordion, or *deck*, which is commonly used within applications
    and integrated development environments (IDEs) to show and hide information, such
    as information about selected files in a file explorer or JSF components in a
    component palette. Figure 3-1 shows an expandable deck used in Microsoft’s Windows
    Explorer.


    **Figure 3-1.** *Expandable deck used in Microsoft Windows Explorer* A deck component
    has the benefit of being stackable and of being able to store more information
    than the equivalent space in a traditional HTML page. From a component writer’s
    point of view, this type of component introduces several key areas of component
    design, such as handling events, rendering children, and loading external resources.


    **105**


    ![Image 17](index-131_1.png)


    5807ch03.qxd 1/13/06 11:06 AM Page 106


    **106**


    C H A P T E R 3 ■ D E F I N I N G T H E D E C K C O M P O N E N T


    **Requirements for the Deck Component**


    The design of the deck component will allow a user to expose specific information
    that is currently hidden by clicking one of the displayed decks and exposing a
    set of items associated with the clicked deck. These child items can be anything,
    including links, text, and even graphics.


    The component should be intelligent enough to detect an already open deck and
    close it before opening the one requested by the user. From an application developer’s
    point of view, the component needs to be extensible, meaning the application developer
    can add as many decks as needed and include any number of children within these
    decks. The application developer should also be able to add any number of deck
    groups to a page.


    **The Deck Component**


    As you remember from the first chapter, the only reason for creating new behavioral
    superclasses is if the behavior and the definition have not been introduced before.
    According to the requirements in the previous section, the deck component should
    be able to selectively show nested components or groups of components, based on
    the user selection, and only one group will be shown at any time. To achieve this,
    you have to create a new Renderer to handle the selective display and a new event
    type to handle the user selection with an accompanying listener interface for
    that particular event type. Since the behavior of showing and hiding children
    has not been introduced yet, we will cover two new behavioral superclasses to
    handle the show-one-item behavior (see Table 2-1 in Chapter 2).


    After completing this chapter, you should understand the JSF event model and know
    how to create new behavioral superclasses and your own event type with a corresponding
    listener interface. Figure 3-2 shows the 11 classes you will create in this chapter.


    **Figure 3-2.** *Class diagram showing classes created in this chapter*


    5807ch03.qxd 1/13/06 11:06 AM Page 107


    C H A P T E R 3 ■ D E F I N I N G T H E D E C K C O M P O N E N T


    **107**


    The classes are as follows:


    • The ProShowOneDeckTag class represents the ProShowOneDeck component.


    • The ShowItemTag class represents leaf nodes of the deck component.


    • The ShowListenerTag class represents a custom action that the application developer
    will use to register a ShowListener instance to a UIShowOne component.


    • The HtmlShowOneDeckRenderer is the new custom Renderer, which is in charge of
    the markup rendered to the client.


    • The ShowListener is a Listener interface.


    • The ShowAdapter supports adding a MethodBinding as a ShowListener.


    • The ShowEvent is the custom event class.


    • The UIShowItem is a behavioral superclass and represents each of the child components
    to the UIShowOne component.


    • The ShowSource class isolates the event listener management methods.


    • The UIShowOne class is a behavioral superclass that acts as a top-level container,
    controlling which one of its child components to display when activated.


    • And finally, the ProShowOneDeck class is your renderer-specific subclass.


    **Designing the Deck Component Using a Blueprint**


    When you design a component that requires a new behavior or new functionality,
    it is wise to start implementing this before creating the actual Renderer for
    this behavior, and as such, these two steps precede the client-specific Renderer
    step in the blueprint, as shown in Table 3-1.


    **Table 3-1.** *Steps in the Blueprint for Creating a New JSF Component*


    **#**


    **Step**


    **Description**


    Creating a UI prototype


    Create a prototype of the UI and intended


    behavior for your component using the


    appropriate markup.


    **2**


    **Creating events and listeners**


    (Optional) Create custom events and listeners


    in case your specific needs are not covered by


    the JSF specification.


    **3**


    **Creating a behavioral superclass**


    (Optional) If the component behavior is not to


    be found, create a new behavioral superclass


    (for example, UIShowOne).


    Creating a client-specific Renderer


    Create the Renderer you need that will write


    out the client-side markup for your JSF com-


    ponent.


    Creating a renderer-specific subclass


    (Optional) Create a renderer-specific subclass.


    Although this is an optional step, it is good


    practice to implement it.


    *Continued*


    ![Image 18](index-133_1.png)


    5807ch03.qxd 1/13/06 11:06 AM Page 108


    **108**


    C H A P T E R 3 ■ D E F I N I N G T H E D E C K C O M P O N E N T


    **Table 3-1.** *Continued*


    **#**


    **Step**


    **Description**


    Registering a UIComponent and Renderer


    Register your new UIComponent and Renderer


    in the faces-config.xml file.


    Creating a JSP tag handler and TLD


    This step is needed in case you are using JSP


    as your default view handler. An alternative


    solution is to use Facelets (http://facelets.


    dev.java.net/).'
