    *Get used to working in components and only components, and you’re future-proofed.*


    *Stick to JSF plus HTML hybrids, and someone is going to hate you in five years’
    time . . . .*


    —Duncan Mills, Java Evangelist, Oracle


    Welcome to the last chapter of *Pro JSF and Ajax: Building Rich Internet Components*.
    This book has covered how JSF lets component writers mix and match technologies
    to streamline packaging and increase richness and user interactivity for their
    components. We have proven that JSF’s component model can provide an abstraction
    layer on top of the underlying client-specific markup, which increases an application
    developer’s productivity. We have also shown you that component writers can *manually*
    switch RenderKits without impacting the application developer or the actual application
    logic.


    Now that you have a set of rich Internet components that support multiple client
    technologies at your disposal, only one question is left: how can you automatically
    select a RenderKit to deliver the proper markup to any user agent?


    The main technology covered in this chapter is Oracle ADF Faces, which is a rich
    set of standard JSF components introduced in the fall of 2004\. The Oracle ADF
    Faces component library provides various user interface components with built-in
    functionality, such as data tables, hierarchical tables, and color and date pickers.
    ADF Faces also includes many of the framework features most needed by JSF developers
    today.


    After reading this chapter, you should be able to dynamically switch RenderKits
    and know how to set them up to detect different user agents, such as Mozilla GRE
    and Microsoft Internet Explorer.'
