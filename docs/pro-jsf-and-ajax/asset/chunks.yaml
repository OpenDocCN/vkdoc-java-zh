    事件处理概述


    在您看到 Deck 组件的事件和监听器实现的代码之前，本节将涵盖有关 JSF 事件模型的一些主题。


    如果您有使用 Swing 工具包或 Oracle 的 ADF Swing 框架开发应用程序的经验，您会注意到 JSF 实现的事件模型与之类似。实际上，JSF
    基于 JavaBeans 规范 1.0.1 版中的命名约定，实现了一个用于事件通知和监听器注册的模型。这基本上意味着应用程序开发人员可以编写应用程序代码并将其注册以监听特定事件。`UIComponent`
    自身会传递事件（例如，当用户点击按钮时，这与其他 UI 工具包采用的方法类似）。应用程序开发人员会立即认识到这种模型的好处，因为它已被证明易于维护和开发。它允许应用程序开发人员为特定事件编写定义良好的代码块中的应用程序代码，就像
    Microsoft Visual Basic 中使用的那样。


    Swing 框架和 JSF 之间的主要区别在于，Swing 在有状态模式下运行，并且始终监听客户端触发的事件；相比之下，JSF 在无状态环境中工作。由于客户端和后端服务器之间没有永久连接，JSF
    无法始终监听事件，必须依赖回传来获知客户端上可能导致事件传递的任何更改。HTTP 的这个限制


