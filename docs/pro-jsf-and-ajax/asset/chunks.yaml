    You check for the custom request header, and if it is set, you create a new instance
    of the `FixedContentTypeResponseWriter`. On initial request or a regular form
    postback (for example, an `h:commandButton` is clicked), the custom request header
    will not be present, and you will return the `XMLResponseWriter`.


