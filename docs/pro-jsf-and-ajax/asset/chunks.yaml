- fmt: "# Note\nAt the time of writing this chapter, Oracle has completed the first\
    \ step of donating the ADF Faces source code to the Apache Software Foundation.\
    \ By the time this book hits the shelves, the Apache MyFaces community should\
    \ be actively evolving the Oracle ADF Faces source code donation. For more information\
    \ about the Apache MyFaces open source project, please visit http://myfaces.apache.org.\n\
    \n## Requirements for Dynamically Switching RenderKits\n\nThe requirement is clear—the\
    \ application developer wants to be able to dynamically change `RenderKit`s, at\
    \ runtime, based on the user agent. For example, if it is the Firefox browser\
    \ requesting the page, the solution should serve XUL markup to the client.\n\n\
    A `RenderKit`'s function is to help out with the delegation of `Renderer` to the\
    \ `UIComponent`. A `RenderKit` groups instances of renderers of similar markup\
    \ types, and in this book, you created `RenderKit`s for HTML Ajax, Microsoft's\
    \ DHTML/HTC, and Mozilla's XUL/XBL technologies.\n\nEach `RenderKit` is associated\
    \ with a view (component hierarchy) as a `UIViewRoot` property at runtime. If\
    \ an application developer wants to add a `RenderKit` with custom `Renderer`s\
    \ to the application, a `RenderKit` ID must be added to the application's JSF\
    \ configuration file, as shown in Code Sample 10-1.\n\n**Code Sample 10-1.** *Setting\
    \ the Default* `RenderKit` *ID*\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"\
    ?>\n\n<!DOCTYPE faces-config PUBLIC\n  \"-//Sun Microsystems, Inc.//DTD JavaServer\
    \ Faces Config 1.1//EN\"\n  \"http://java.sun.com/dtd/web-facesconfig_1_1.dtd\"\
    >\n\n<faces-config >\n  <application>\n    <default-render-kit-id>com.apress.projsf.xul.ajax</default-render-kit-id>\n\
    \  </application>\n  ...\n</faces-config>\n```\n\nThis code sample shows the `faces-config.xml`\
    \ file with the `<default-render-kit-id>` set to your custom XUL `RenderKit`.\
    \ The `faces-config.xml` file is read once when the Web application is created\
    \ and stored in the `Application` instance. The `ViewHandler` is responsible for\
    \ returning the `renderKitId` for the current and subsequent requests from the\
    \ client. It is important to understand that there can be only one default `RenderKit`\
    \ per Web application, which is identified by a string (for example, `com.apress.projsf.xul.ajax`).\n\
    \nTo solve the requirement of enabling access to the application with any browser\
    \ and to provide a different `RenderKit` implementation for each browser, you\
    \ have three tasks to complete in this chapter. First, you need to define the\
    \ default `RenderKit` ID in the `faces-config.xml` file in such a way that you\
    \ can dynamically set it at runtime. Second, you need to detect the user agent\
    \ requesting the application. Third, you need to set the `RenderKit` ID using\
    \ a `ViewHandler`. The custom `ViewHandler` is required if you want to have multiple\
    \ `RenderKit` instances for the same application.\n\n# Note\nJSF 1.1 applications\
    \ require a custom `javax.faces.application.ViewHandler` instance to dynamically\
    \ select a `RenderKit`. However, JSF 1.2 adds support for directly specifying\
    \ the `RenderKit` ID on the `<f:view>` tag of individual pages in a Web application.\n\
    \n## The Dynamic RenderKit Implementation\n\nFigure 10-1 shows the dynamic `RenderKit`\
    \ solution.\n\n**Figure 10-1.** *Structure of dynamic* `RenderKit` *implementation*\n\
    \nThe dynamic `RenderKit` solution contains three classes:\n\n- `ViewHandlerWrapper`\
    \ is a wrapper class that provides a loose coupling between the solution and the\
    \ JSF implementation.\n- `ApplicationBean` is a managed bean that contains logic\
    \ to detect what agent has been used to request the application and contains information\
    \ about what `renderKitId` to use.\n- `DynamicRenderKitViewHandler` overrides\
    \ the default `ViewHandler`'s `calculateRenderKitId()` method in order to get\
    \ the correct ID from the `ApplicationBean`.\n\n### Syntax for Dynamic RenderKit\
    \ ID"
