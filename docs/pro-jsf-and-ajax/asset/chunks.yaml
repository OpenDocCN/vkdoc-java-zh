    **Code Sample 7-3.** *Data-Bound Table Component*


    <h:dataTable var="row" value="#{managedBean.employeeList}">


    <h:column>


    <pro:inputDate id="dateField"


    title="Date Field Component"


    value="#{row.date}" >


    <pro:validateDate availability="#{row.getValidDates}" />


    </pro:inputDate>


    </h:column>


    The var attribute defines a relative variable row, which is used by each stamped
    component to retrieve the unique data for each row. This works fine as long as
    you have access to the component hierarchy during postback. On the client, each
    row’s expression looks the same, so any client-side Ajax implementation depending
    on this expression to invoke an underlying managed bean method is out of luck.
    Any attached managed beans will work during regular postback, but an Ajax request
    using the PhaseListener or Lifecycle approach will not be able to locate the right
    row of data. Therefore, Ajax components relying on managed beans to provide them
    with data (for example, to fetch available dates for a specific employee) are
    not going to work properly when set up with a relative variable.


    **Possible Solutions to Relative Variables**


    You could try to solve this by implementing support for the UIData component,
    but you have no guarantee that the parent component is of type UIData, since it
    is perfectly legal for component authors to provide components that stamp out
    objects without subclassing the UIData component. Examples of such components
    are the Oracle’s ADF Faces table and treeTable components.


    The best solution would be if the JSF specification provided support for converting
    relative expressions to absolute expressions. Component writers could then convert
    relative variables to absolute during initial render. The rendered expression
    could take the form of


    #{managedBean.employeeList[1].getValidDates}, indicating this to be row one in
    the stamped collection.


    **Step 4: Creating Converters and Validators**


    As discussed in Chapter 1, the JSF implementation provides helper classes for
    any type of UIComponent. These helper classes are divided into converters, validators,
    and an event and listener model, each of them with its own area of expertise.
    In this section, you will build your own Validator to perform validation on the
    strongly typed Date object to make sure a selected date is actually available
    (for example, is not a weekend or a holiday).


    Code Sample 7-4 uses the Validator you will design. Its purpose is to validate
    the entered value and compare it with a list of dates that are flagged as “not
    available.” The contract for the application developer’s backing bean provided
    is to return an array of booleans—#{managedBean.getValidDates}. The array indicates
    whether a date is available (true) or not (false). This array provided by the
    backing bean is also used at the browser to show which dates are available for
    selection.


