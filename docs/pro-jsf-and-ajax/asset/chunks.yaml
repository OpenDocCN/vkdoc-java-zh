    **275**


    **PhaseListener 方法**


    这种方法添加了一个 PhaseListener（`PhaseId.RESTORE_VIEW`），它会短路生命周期，并在 PhaseListener 自身内部完成所有处理。处理完成后，它会在
    `FacesContext` 上调用 `responseComplete()` 方法。


    要使这种方法生效，它必须在初始请求中渲染一个引用，该引用包含验证器所使用的受管 Bean 的信息。PhaseListener 在回传期间使用此信息创建一个
    `MethodBinding`，然后可以调用验证器背后的逻辑并将数据返回给客户端。由于没有创建组件层次结构，因此也没有渲染器，所以不存在将 `immediate`
    设置为 `true` 的命令组件导致任何副作用的风险。


    但是，这种方法有一个问题：无法阻止应用程序开发者在同一阶段附加额外的 PhaseListener，这可能会导致意外的副作用。


    此外，你无法知道这些 PhaseListener 的执行顺序。


    **Lifecycle 方法**


    这种方法添加了一个新的 Lifecycle，它映射到 Ajax 请求，仅包含处理请求所需的生命周期阶段，调用由 `MethodBinding` 定义的应用程序逻辑，并渲染响应。这消除了创建和恢复组件树的额外开销，因此也不需要渲染器。你也不会遇到
    `immediate="true"` 带来的任何问题。


    使用自定义 Lifecycle 的另一个积极副作用是，应用程序开发者添加的任何 PhaseListener 都不会影响此解决方案；应用程序开发者甚至可以向这个自定义
    Lifecycle 添加 PhaseListener。但是，如果使用自定义 PhaseListener 将额外的受管 Bean 放入请求中，你可能会遇到问题，除非这些
    PhaseListener 也注册到了自定义 Lifecycle 上。


    选择 JSF Ajax 方法


    在本书中，我们决定采用 Lifecycle 方法，因为它没有应用程序逻辑副作用且开销较低。正是基于此，Mabon 开源项目可以帮助你专注于 Ajax 日历组件的设计。


    **相对变量的问题**


    定义 `MethodBinding` 的一种有效方法是在 `MethodBinding` 表达式中使用相对变量。这会对 PhaseListener 方法和
    Lifecycle 方法都产生不利影响。要使数据获取与这两种方法配合使用，你需要在 `MethodBinding` 表达式中使用绝对变量（例如，`#{ backingBean.getValidDates}`）。


    使用相对变量的 `MethodBinding` 表达式的一个例子是 `UIData` 组件（例如 `<h:dataTable ...>`），它正在输出关于员工的信息。

