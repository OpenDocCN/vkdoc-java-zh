    ## CHAPTER 2 ■ DEFINING THE DATE FIELD COMPONENT


    **51**


    | Name | Description |

    |------|-------------|

    | `UISelectItem` | `UISelectItem` (extends `UIComponentBase`) is a component that
    may be nested inside a `UISelectMany` or `UISelectOne` component and represents
    exactly one `SelectItem` instance in the list of available options for that parent
    component. |

    | `UISelectItems` | `UISelectItems` (extends `UIComponentBase`) is a component
    that may be nested inside a `UISelectMany` or `UISelectOne` component and represents
    zero or more `SelectItem` instances for adding selection items to the list of
    available options for that parent component. |

    | `UISelectMany` | `UISelectMany` (extends `UIInput`) is a component that represents
    one or more selections from a list of available options. It is most commonly rendered
    as a multiple selection list or a series of checkboxes. |

    | `UISelectOne` | `UISelectOne` (extends `UIInput`) is a component that represents
    zero or one selections from a list of available options. It is most commonly rendered
    as a combo box or a series of radio buttons. |


    **Source: The JSF 1.1 specification**


    ***The full class name of this component is `javax.faces.component`.***


    The key behavior of the date field component you’ll create in this chapter is
    for the user to input a new date. Examining Table 2-1, you can see that one component
    describes the behavior you’re looking for in the date field component—the behavioral
    superclass `UIInput`.


    Instead of having to create a new component that introduces existing behavior,
    you can use this `UIInput` component from the JSF specification. Therefore, the
    new component will be called an *input date component* and will follow the same
    naming conventions as standard JSF components, such as the input text component.


    ### USING `UIInput`


    The `UIInput` component defines the contract for how an application interacts
    with your component or any component extending this superclass. The `UIInput`
    component comes with a default renderer that will at runtime display the component
    as a text input field into which the user can enter data. Its component type is
    `javax.faces.Input`, and the default renderer type is `javax.faces.Text`.


    The `UIInput` component can display values to the client in much the same way
    as the `UIOutput` component does. In fact, the `UIInput` component extends the
    `UIOutput` component. The `UIInput` component also processes, on a postback, request
    parameters that need to be decoded and managed. If a value passed on the request
    is different from the previous value, then a `ValueChangeEvent` event is raised
    by the component. You can attach a `ValueChangeListener` to receive notification
    when the `ValueChangeEvent` is broadcast by the `UIInput` component.


    ### The Input Date Component


    The intent with this input date component is to give you a solid foundation for
    more advanced work with JSF later in the book. Visually the component will be
    a simple input text field with an icon overlay to indicate it is a date field
    and will have some useful type conversion and date validation functionality.


    ![Image 10](index-77_1.png)


    5807ch02.qxd 12/30/05 4:27 PM Page 52


    **52**


    CHAPTER 2 ■ DEFINING THE DATE FIELD COMPONENT


    To comply with these new requirements, this chapter will introduce one new `Renderer`,
    a renderer-specific subclass, and a new tag handler. The input date component
    also introduces a non-Java element to your design of components—the use of a style
    sheet. After completing this chapter, you should understand the JSF lifecycle
    and have enough knowledge to create a new `Renderer`, a renderer-specific subclass,
    and a corresponding JSP tag handler.


    Figure 2-1 shows the five classes you’ll create in this chapter; they are `HtmlInputDateRenderer`,
    `ProInputDate`, `UIComponentTagSupport`, and `ProInputDateTag`, as well as two
    you’ll be extending: `Renderer` and `UIInput`.


    **Figure 2-1.** *Class diagram showing classes created in this chapter*


    - The `ProInputDate` is the renderer-specific subclass.'
