- fmt: "**Figure 6-11.** *Default processing of the JSP document* On the initial request,\
    \ you need to know whether the `ResponseWriter` should control the content type\
    \ to be sent with the `HttpServletResponse` object to the client. You can do this\
    \ by providing a custom content type via the JSP page directive—`<jsp:directive.page\
    \ contentType=\"application/x-javaserver-faces\" />`. If the application developer\
    \ omits the special `contentType` in the JSP page directive, the implementation\
    \ will work the traditional way of having the JSP engine default the `contentType`.\n\
    \nIf the JSP page directive is set to `application/x-javaserver-faces`, you need\
    \ to defer setting the `contentType` on the `HttpServletResponse` object until\
    \ after the `ResponseWriter` has been created. This ensures that the `contentType`\
    \ set on the `HttpServletResponse` matches the markup written by the `ResponseWriter`\
    \ for this request. The way you can defer setting the `contentType` is to wrap\
    \ the `HttpServletResponse` with your own deferred servlet response—`DeferredContentTypeResponse`.\n\
    \n![Image 48](index-276_1.png)\n\n![Image 49](index-276_2.png)\n\n5807ch06.qxd\
    \ 1/13/06 11:18 AM Page 251\n\nC H A P T E R 6 ■ A J A X E N A B L I N G T H E\
    \ D E C K C O M P O N E N T\n\n**251**\n\n## Extending the `FacesContextFactory`\n\
    \nYou need to pass the servlet response to the `FacesContext`, and the most convenient\
    \ way is to wrap the `HttpServletResponse` object with your own response object\
    \ just before the `FacesContext` gets created for the incoming request. This avoids\
    \ the need for a servlet filter and can also work for portlets. Figure 6-12 shows\
    \ the initial processing of the request.\n\n**Figure 6-12.** *Initial processing\
    \ of the request* First you need to extend the `FacesContextFactory` with a means\
    \ to create a custom `ServletResponse` and wrap it around the `HttpServletResponse`,\
    \ and then you pass the custom `ServletResponse` to the `FacesContext`. That way,\
    \ you will have control over the `ServletResponse`, and you can intercept the\
    \ `contentType` when it’s being set by the JSP engine and, if needed, defer setting\
    \ the `contentType` until you have access to the `contentType` used by the `ResponseWriter`.\n\
    \nLooking at the sequence of the initial process, the `FacesServlet` will first\
    \ call the `getFacesContext` on your implementation of the `FacesContextFactory`—`FacesContextFactoryImpl`.\
    \ The `FacesContextFactoryImpl` will first create a new servlet response, `DeferredContentTypeResponse`;\
    \ this will wrap the standard `HttpServletResponse`. You then pass the `DeferredContentTypeResponse`\
    \ to the `FacesContext`. Figure 6-13 shows the `FacesContextFactory` implementation\
    \ in detail.\n\n**Figure 6-13.** *Diagram over the* `FacesContext` *implementation*\n\
    \n5807ch06.qxd 1/13/06 11:18 AM Page 252\n\n**252**\n\nC H A P T E R 6 ■ A J A\
    \ X E N A B L I N G T H E D E C K C O M P O N E N T\n\nFirst you create a `FacesContextFactoryWrapper`\
    \ wrapper class that is only delegating, without decorating, to the standard `FacesContextFactory`,\
    \ and that will provide you with a loose coupling to the JSF implementation used\
    \ by the application developer. Then you extend your wrapper class with the `FacesContextFactoryImpl`\
    \ class to add some decorations. This class intercepts the `HttpServletResponse`\
    \ and creates a new servlet response, `DeferredContentTypeResponse`; this will\
    \ defer setting the `contentType`, if needed, until the `ResponseWriter` is created.\n\
    \n## The `FacesContextFactoryImpl` Class\n\nThe `FacesContextFactoryImpl` class,\
    \ on the other hand, supports additional processing of the servlet response object,\
    \ as shown in Code Sample 6-13.\n\n**Code Sample 6-13.** *The* `FacesContextFactoryImpl`\
    \ *Class*\n\n```\npackage com.apress.projsf.ch6.context;\n\nimport javax.faces.FacesException;\n\
    \nimport javax.faces.context.FacesContext;\n\nimport javax.faces.context.FacesContextFactory;\n\
    \nimport javax.faces.lifecycle.Lifecycle;\n\nimport javax.servlet.http.HttpServletResponse;\n\
    \nimport com.apress.projsf.ch6.external.servlet.DeferredContentTypeResponse;\n\
    \n/**\n * FacesContextFactoryImpl supports additional processing of the response.\n\
    \ */\n\npublic class FacesContextFactoryImpl extends FacesContextFactoryWrapper\n\
    \n{\n```"
