    ## About the Authors


    **JONAS JACOBI** is a J2EE and open source evangelist at Oracle.


    A native of Sweden, Jonas has worked in the software industry for more than 15
    years. Prior to joining Oracle, Jonas worked at several major Swedish software
    companies in management, consulting, development, and project management roles.


    For the past three years, Jonas has been responsible for the product management
    of JavaServer Faces, Oracle ADF Faces, and Oracle ADF Faces Rich Client in the
    Oracle JDeveloper team.


    Jonas is a popular speaker at international conferences such as Oracle OpenWorld,
    EclipseWorld, and JavaPolis, and he has written numerous articles for leading
    IT magazines such as *Java Developer’s Journal*, *JavaPro*, and *Oracle Magazine*.
    Jonas has also contributed to the online appendix of *JavaServer Faces in Action*,
    by Kito D. Mann (Manning, 2005), and was a technical reviewer of *Oracle JDeveloper
    10g Handbook*, by Avrom Roy-Faderman, Peter Koletzke, and Paul Dorsey (McGraw-Hill
    Osborne, 2004).


    Apart from spending his spare time working on open source projects such as Weblets,
    Mabon, and D2, he likes golf, sailing, and fast cars (preferably driving them);
    he also enjoys spending time with his wife, Marianne, and his daughters, Emma
    and Isabelle.


    **JOHN R. FALLOWS** is a JavaServer Faces technology architect at Oracle.


    Originally from Northern Ireland, John graduated from Cambridge University in
    the United Kingdom and has worked in the software industry for more than ten years.
    Prior to joining Oracle, John worked as a research scientist for British Telecommunications
    Plc.


    For the past four years, John has played a leading role in the Oracle ADF Faces
    team to influence the architecture of the JavaServer Faces standard and to extend
    the standard to provide Ajax functionality in the ADF Faces project.


    John is an active participant in the open source community, contributing to both
    the Apache MyFaces project and the Apache Maven project. John is also leading
    three new open source projects on Java.net—Weblets, Mabon, and D2—all of which
    evolved while researching the foundational technologies for this book.


    Apart from spending his spare time writing articles about new and exciting technologies,
    John likes to play soccer with his friends and likes to spend time with his beautiful
    wife, Nan, and their wonderful son, Jack.


