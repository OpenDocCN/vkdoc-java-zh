- fmt: "• `Renderer`: The Renderer is in charge of the markup rendered to the client\
    \ for a specific component family.  \n• `RenderKit`: This is a library of Renderers\
    \ with a common rendering technology (for example, HTML).  \n• `Renderer`-specific\
    \ component subclass: The renderer-specific component subclass is a convenience\
    \ class and represents renderer-specific facets and attributes.  \n• `JSP` tag:\
    \ The default page description language is JSP, so JSF needs to follow the contract\
    \ of JSP and provide JSP tags representing each JSF component.\n\nJSF addresses\
    \ the idea of a clear separation between the application logic and the visual\
    \ presentation by strongly separating the UI from the underlying data model. The\
    \ `Renderer` is in charge of the markup rendered to the client, and the `UIComponent`\
    \ is responsible for the behavior and accessing data model. Figure 1-5 shows the\
    \ separation of UI, behavior, and data model.\n\n**Figure 1-5.** *Separation of\
    \ UI from behavior and data model*\n\nTo illustrate the benefit of separating\
    \ the UI and data models, let’s look at an example of the common HTML form element\
    \ `<select>`. This list element has a `multiple` attribute that changes the behavior\
    \ from allowing a single-select option to multiple-select options. This model\
    \ has no separation of rendering and behavior. For an application developer to\
    \ change the behavior of the element from single select to multiple select, it\
    \ requires just a minor adjustment—simply setting the attribute `multiple`. However,\
    \ this will have a bigger impact on the underlying application logic since the\
    \ values passed from the client are now structured as a list of key-value pairs\
    \ instead of just a single key-value pair.\n\nThe `UISelectOne` and `UISelectMany`\
    \ UI components provide a good example of clear separation between behavior and\
    \ appearance. For example, the `UISelectOne` component has a distinct behavior\
    \ to select a single value from many available options, and the `UISelectMany`\
    \ component has the behavior of selecting many values from a list of available\
    \ options. The `UISelectOne` component has three renderer types—`Listbox`, `Radio`,\
    \ and `Menu`. Changing the appearance from `Radio` to `Menu` will not affect the\
    \ underlying behavior.\n\nHowever, if application developers want to change the\
    \ behavior to a multiple-select component, they have to replace the entire `UISelectOne`\
    \ JSF component with a `UISelectMany` JSF component, rather than just setting\
    \ an attribute in the page markup, as they would do when using the `<select>`\
    \ element directly. This clear separation between changing the behavior of a JSF\
    \ component and changing its appearance gives application developers a better\
    \ understanding of the impact of their changes when modifying the page definition.\
    \ Figure 1-6 illustrates the `UIComponent` and three Renderers with different\
    \ appearances.\n\n**Figure 1-6.** *UISelectOne and its renderers*\n\nA good rule\
    \ to follow is before starting a component project, search the Web for already\
    \ created components. In most cases, you can probably get away with writing a\
    \ new `Renderer` for an already existing component, and a fair number of components\
    \ already exist. If you can’t find the component you are looking for, then it\
    \ is time to build your own. To build a new component, you should make sure it\
    \ introduces a new behavior, functionality, or definition and that the component\
    \ has a distinct server-side behavior. If the component exists and you just need\
    \ a new appearance, then you need to create a new `Renderer` (for example, to\
    \ enable Ajax or an existing input component)."
