    When you introduce a new event class, you need to make sure it extends javax.faces.


    event.FacesEvent so that the event can participate in the JSF request-processing
    lifecycle.


    The FacesEvent base class constructor takes one argument—the source of the UIComponent
    instance delivering the event. This means the new event class—ShowEvent—has to
    take the UIComponent instance source as an argument and pass it on to its superclass—super(source);.


    If not set, the default value for phaseId is PhaseId.ANY_PHASE, which means the
    event will be delivered in the phase in which it was queued. To ensure that the
    deck component’s ShowEvent event is not delivered before the entire component
    hierarchy has been processed, you have to set phaseId to PhaseId.INVOKE_APPLICATION.
    This is important since the deck node needs to know about its children and allow
    them to be updated and validated in order to render properly.


    To make life easier on application developers using the ShowEvent class, you can
    also add two properties—oldShowItemId and newShowItemId—with corresponding getter
    methods, which are not required by the FacesEvent base class. These accessors
    are there for convenience so that application developers can find out which item
    is collapsed and which item is currently expanded.


    You also override two methods in the FacesEvent base class—isApproriateListener()
    and processListener(). The isApproriateListener() method returns true if the listener
    is an instance of ShowListener (more about this listener in a second). The isAppropriateListener()
    method allows component writers to verify that the signature of the listener associated
    with the component is compatible with the event being broadcast. If the listener
    is compatible, the processListener() method is called during UIComponent.broadcast()
    to deliver this event to the ShowListener instance’s processShow() method, implemented
