- fmt: '`DynamicRenderKitViewHandler`只重写了一个方法`calculateRenderKitId()`，该方法用于计算当前请求应使用的`RenderKit`标识符。首先通过调用`super`计算`RenderKit`标识符，然后检测该标识符是否为可用于评估动态`RenderKit`标识符的表达式。如果它符合类EL语法，则使用该表达式创建一个`ValueBinding`，返回代表当前请求`renderKitId`的值。在实践中，这将通过遵循`ApplicationBean`中的动态`RenderKit`选择逻辑，为访问应用程序的浏览器选择正确的`RenderKit`。


    **注册动态RenderKit解决方案**


    你需要注册`DynamicRenderKitViewHandler`和受管Bean`ApplicationBean`到组件库中，以便动态切换能够工作（参见代码示例10-7）。


    **代码示例10-7.** *注册动态RenderKit实现*


    ```xml

    <?xml version="1.0" encoding="UTF-8" ?>


    <!DOCTYPE faces-config


    PUBLIC "-//Sun Microsystems, Inc.//DTD JavaServer Faces Config 1.1//EN"


    "http://java.sun.com/dtd/web-facesconfig_1_1.dtd">


    <faces-config >


    <factory>


    ...


    </factory>


    <application>


    <view-handler>


    com.apress.projsf.ch10.application.DynamicRenderKitViewHandler


    </view-handler>


    </application>


    <managed-bean>


    <managed-bean-name>projsf</managed-bean-name>


    <managed-bean-class>


    com.apress.projsf.ch10.application.ApplicationBean


    </managed-bean-class>


    <managed-bean-scope>application</managed-bean-scope>


    </managed-bean>


    ...


    <faces-config>

    ```


    首先，将`<view-handler>`设置为指向自定义的`ViewHandler`——`DynamicRenderKitViewHandler`。然后，以大多数应用程序开发者定义自己受管Bean的相同方式定义`ApplicationBean`。注意，将受管Bean设置为应用程序作用域，以便所有Web应用程序只有一个实例。


    至此，你已经到达本章的结尾——也是本书的结尾。现在你应该能够在运行时动态切换`RenderKit`。这种切换`RenderKit`的解决方案并非本书所创建组件的特例；任何组件库都可以使用相同的技术配合多个`RenderKit`。图10-4展示了本书创建的卡片组件在三种不同设备上的显示效果。


    ![Image 100](index-437_1.png)


    **图10-4.** *ProShowOneDeck在多个客户端中使用客户端特定标记运行*


    **总结**


    在本章中，我们展示了使用JSF提供动态`RenderKit`切换是多么容易。通过采用组件驱动的设计，应用程序开发者可以为任何类型的用户代理构建应用程序，而不会受到底层客户端标记的影响。


    在前面的章节中，我们演示了如何编写支持常规HTML、Ajax、XUL和HTC的`Renderer`。一些组件编写者已经在关注更多的客户端技术，以便为应用程序开发者提供独立于用户代理的通用编程模型。一个很好的例子是Oracle
    ADF Faces组件库。它内置支持HTML、RIA、基于字符的解决方案、即时通讯客户端（如Gaim和Yahoo）、PDA等。MyFaces开源项目也提供了另一种替代HTML的`RenderKit`——WML
    `RenderKit`。


    既然你已经知道如何使用JSF创建可重用的富互联网组件以及如何使用多个`RenderKit`，我们希望你能运用本书中学到的技术，创建自己的自定义组件，并用JSF构建RIA。'
  raw: 'The DynamicRenderKitViewHandler overrides only one method, calculateRenderKitId(),
    which is used to calculate the RenderKit identifier to use for this request. You
    first calculate the RenderKit identifier by calling super. Then you detect whether
    the identifier is an expression that can be used to evaluate the dynamic RenderKit
    identifier. If it matches the EL-like syntax, you use the expression to create
    a ValueBinding that returns the value representing the renderKitId for this request.
    In practice, this will pick the right RenderKit for the browser accessing the
    application by following the dynamic RenderKit selection logic in your ApplicationBean.


