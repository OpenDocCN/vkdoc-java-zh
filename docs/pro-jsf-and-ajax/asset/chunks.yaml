- fmt: '### **Figure 1-18.** *Applying new values passed on the request to the components*

    The submitted value is at this point stored only as “submitted” on the component,
    and no value has been pushed into the underlying model yet. By the time the Apply
    Request phase is completed, the Renderers no longer need to observe the request
    parameters, since all values have been updated on each component.


    ### **Process Validation Phase**

    In the Process Validations phase, conversion and validation are performed by calling
    the `processValidators()` method on the `UIViewRoot`. Figure 1-19 shows conversion
    and validation.


    **Figure 1-19.** *Performing conversion and validation*

    This process will continue calling the `processValidators()` method recursively
    on each component in the component hierarchy. During validation of each `HtmlInputText`
    component, type conversion will occur first on the component’s submitted value
    (for example, a string to a strongly typed object). The new object is set as a
    local value on the component, and the submitted value is cleared. The new strongly
    typed object is then validated. If there are no errors, then the next step is
    to queue a `ValueChangeEvent` that will be delivered at the end of the Apply Request
    Values phase.


    If a conversion or validation error occurs, a corresponding JSF message is attached
    to the `FacesContext` using the component `clientId`, and then the `renderResponse()`
    method is called to indicate that the lifecycle should skip directly to the Render
    Response phase after the Process Validations phase is complete.


    ### **Update Model Phase**

    At this point in the lifecycle, all submitted values have been successfully converted
    and validated, so it is safe to push them into the underlying data model. During
    the Update Model phase, the JSF lifecycle walks over the component hierarchy,
    calling the `processUpdates()` method on each component. Figure 1-20 shows the
    Update Model phase updating the underlying model.


    To determine where to store the new value, the `processUpdates()` method will
    use the value binding, which is defined in the `value` attribute on the component
    (for example, `#{credentials.username}`). The value binding points to a property
    on a managed bean (for example, `username`). Using the value binding, the locally
    stored value on the component is pushed into the data model, and the locally stored
    value on the component is cleared.


    Any JSF messages and errors on the model—for example, validations implemented
    by the model—are attached to the `FacesContext` with the component’s client ID.
    The `renderResponse()` method is then called to indicate that the lifecycle should
    skip directly to the Render Response phase after the Update Model phase is complete.


    **Figure 1-20.** *Updating underlying model*


    ### **Invoke Application Phase**

    In the Invoke Application phase, you have no need to walk the component hierarchy,
    since this phase will handle only the queued events from previous phases and,
    depending on the outcome, will either continue to the last phase—Render Response—or
    redirect to another page. Figure 1-21 shows the broadcasting of events queued
    for this phase and the processing of action method bindings.


    **Figure 1-21.** *Performing application logic*


    As mentioned in the earlier section “Converters, Validators, Events, and Listeners,”
    you have two methods that will be processed when an `ActionEvent` occurs. The
    first thing that happens is a call to the `processApplication()` method on the
    `UIViewRoot` that takes each queued event and broadcasts to the target component
    for the event (for example, `commandButton.broadcast(FacesEvent)`). The `UICommand`
    component knows about the `action` and `actionListener` attributes, as well as
    the default `ActionListener` attached to the `Application` object.


    First all previously registered `ActionListeners` are called, then the `actionListener`
    method binding is executed (for example, `#{credentials.onLogin}`), and finally
    the component calls the `processAction()` method on the default `ActionListener`
    to process the action method binding and handle navigation. It is important that
    the action method binding is called at the end of this process, since it defines
    possible navigation, and you don’t want to navigate before you have processed
    all events.


    ### **Postback with Navigation**

    When the default `ActionListener` is processing an `ActionEvent`, it invokes the
    action method binding and gets the outcome, which is a `String` object. If the
    outcome returns `null`, then the default `ActionListener` will continue with the
    next queued event. After all events have been broadcast, the Invoke Application
    phase is complete and lifecycle processing continues to the last phase—Render
    Response. If the outcome is not `null`, then the default `ActionListener` passes
    `FacesContext`, `fromAction` (which is the method-binding expression text—for
    example, `credentials.doLogin`), and outcome to the `NavigationHandler`. Figure
    1-22 shows navigation on postback.


    **Figure 1-22.** *Navigation on postback*


    Navigation rules are defined in `faces-config.xml`, which is read at start-up,
    and all information is stored in the `Application` object (see the section “Navigation
    Model”). The first thing the `NavigationHandler` does is to check for a navigation
    rule that matches the combination of `fromViewId` (which it will get from the
    `FacesContext`), `fromAction`, and outcome.


    You can handle navigation in two ways. Redirecting means a new request (and as
    a bonus you can bookmark the new page) and starts the JSF request lifecycle all
    over again; you can also have the `handleNavigation()` method create a new `UIViewRoot`,
    set the new `UIViewRoot` on the `FacesContext`, and let the default `ActionListener`
    call `renderResponse()` to initiate the Render Response phase. This solution is
    replicating the behavior of the initial request in the Render Response phase but
    with a new view identifier. Figure 1-23 shows the JSP execution during postback.


    **Figure 1-23.** *Render Response on postback*


    During a postback, the first part of the Render Response phase is the same as
    that of the initial request until the `dispatch()` method call, except that you
    now have a complete component hierarchy and not just the `UIViewRoot` (refer to
    Figure 1-13). After the dispatch, the JSP page is executed, and the `<f:view>`
    start tag does the same thing as at initial request—creating and storing an instance
    of the `ResponseWriter` on the `FacesContext` and acting as a buffer for rendered
    output from the components (see Figure 1-14).


    Instead of creating new components and attaching them to the `UIViewRoot` as in
    the initial request, individual component tags nested within the `<f:view>` tag
    will have to locate their counterparts that already exist in the component hierarchy.
    This takes place during JSP page execution, by traversing up the tag tree to find
    the closest enclosing parent component tag. From the parent component tag, the
    child component tag can find its component counterpart, via either the component
    identifier or the facet name (see the section “Facets”).'
