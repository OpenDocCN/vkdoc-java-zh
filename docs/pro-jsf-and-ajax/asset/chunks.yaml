    第 4 章 ■ 使用富互联网技术


    有大量的事件处理属性可用，其中一些仅适用于特定的 XUL/HTML 元素。一个例子是监听 DOM 事件（例如，load）的 XUL `<window>`元素。表
    4-4 列出了可用预定义事件处理程序的一个子集。


    **表 4-4.** *GRE DOM 实现提供的预定义事件处理程序列表*


    **事件处理程序**


    **描述**


    onload


    用于窗口加载的事件处理属性。当窗口元素加载完成且文档中的所有对象在 DOM 树中可用时，会发送此事件。此事件处理程序也可用于图像元素。


    oncommand


    此事件替代 onclick 事件处理程序，并在元素被激活时调用。激活方式因元素而异，但本质上可以通过不同的用户交互（如点击、按回车键或快捷键）来调用，而 onclick
    事件处理程序则不然。


    onblur


    当元素失去焦点时，会触发 blur 事件。


    onfocus


    与 onblur 事件相反。当元素获得焦点时，会触发此事件。


    **来源：** http://www.xulplanet.com


    **使用 XBL 创建自定义 XUL 组件**


    要完全理解 Mozilla XUL 如何为 JSF 提供一种使用 XUL 作为渲染技术的机制，你必须了解 XBL。XBL 是一种基于 XML 的语言，允许开发者扩展
    XUL，并向已经非常丰富的 XUL 元素集中添加“自定义”组件。在 XUL 中，开发者可以使用 CSS 更改外观和感觉，并可以附加皮肤，但他们无法在 XUL
    本身中更改 XUL 元素的行为。


    为此，开发者必须使用另一种语言——XBL。开发者可以将 XUL 视为附带一组基础组件的“实现”，或视为可用于构建用户界面的标签库，这与 JSF 参考实现非常相似。XBL
    是开发者用来扩展 XUL 组件并实现与 HTML 集成的语言，类似于使用 Java 扩展 JSF 组件的方式。


    创建 XBL 绑定


    XBL 是一种 XML 语言，使用 XBL 创建的文件包含一组绑定。每个绑定描述了一个 XUL 组件的行为。除了描述行为外，这些绑定还描述了构成该组件的 XUL
    元素以及该组件的属性和方法。在代码示例 4-11 中，根元素显示`<bindings>`元素包含一个`<binding>`元素。


