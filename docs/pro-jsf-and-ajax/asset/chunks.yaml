    这些样式使用了相对于类名为 ProInputDateCalendar 的元素的*后代选择器*。后代选择器是一种将样式应用于页面特定区域的方法，以减少在元素中嵌入类的需求。它由两个或多个用空格分隔的选择器组成，将样式应用于包含在其他元素中的元素。对于代码示例
    7-17 中定义的选择器，定义了一些样式类（例如，.other、.noselect、.selected 和 .today）。这些类名将设置日历 tbody
    元素中单元格的样式，指示某个单元格是否可选。稍后在 Ajax 实现中，你将看到如何使用这些类名来确定用户是否点击了有效日期。


