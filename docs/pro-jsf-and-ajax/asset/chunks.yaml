    \ the old `UIShowItem` ID, and the new `UIShowItem` ID. Finally, you queue the\
    \ `ShowEvent` event instance for later processing in the Invoke Application phase.\
    \ If application developers have used the `ShowListener`, they will be able to\
    \ invoke some application logic based on this user action.\n\n## Step 5: Creating\
    \ a Renderer-Specific Subclass\n\nTo follow best practices, you will now learn\
    \ how to create the renderer-specific subclass for the deck component—`com.apress.projsf.ch3.component.pro.ProShowOneDeck`\
