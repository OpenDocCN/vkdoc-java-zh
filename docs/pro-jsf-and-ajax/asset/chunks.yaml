    **Renderers**


    The JSF specification outlines two models for how a JSF component can handle values
    from incoming requests ( *decode*) and outgoing response ( *encode*). These two
    models—direct implementation and delegated implementation—have two distinct approaches;
    the direct implementation relies on the UIComponent instance to handle decode
    and encode, and the delegate implementation delegates these responsibilities to
    a Renderer. As you have seen in Figure 1-5, the delegate approach allows application
    developers to work with the UIComponent independently from what will be rendered
    on the client. In this book, we will discuss only the delegate implementation
    approach, since our goal is to provide multiple Renderers for each behavioral
    component. This approach is also what makes JSF such a powerful UI framework.


    ■**Note** The direct implementation approach provides slightly better performance
    since there is no need to delegate to a Renderer, but it also severely limits
    extensibility and portability across clients.


    Renderers are responsible for the presentation of a JSF component and must generate
    the appropriate client-side markup, such as HTML and JavaScript, or XUL. Renderers
    are also in charge of converting information coming from the client to something
    understandable for the component (for example, a string value from an HTML form
    POST converted to a strongly typed Date object).


    Although a Renderer introduces client-side attributes such as style, disabled,
    tooltip, and so on, these attributes are actually exposed in the renderer-specific
    component subclass (for example, HtmlSelectOneRadio).


    One major difference between UIComponents and Renderers is the way they are defined
    at runtime. Renderers are defined as singletons, so there is only one Renderer
    for all instances of a UIComponent for each particular renderer type.


    ■**Caution** Since individual Renderer instances will be instantiated as requested
    during the rendering process and used throughout the life of a Web application,
    it is important to understand that each instance may be invoked from more than
    one request-processing thread simultaneously. This requires that Renderers are
    programmed in a thread-safe manner.


    5807ch01.qxd 1/3/06 4:47 PM Page 25


    C H A P T E R 1 ■ T H E F O U N D AT I O N O F J S F : C O M P O N E N T S


    **25**


    **Renderer Types**


    The renderer type is an identifier that is defined by the component, and in combination
    with the component family, it uniquely identifies which Renderer class to use
    with the component.


    Combining the renderer type and the component family is extremely powerful since
    it allows the reuse of the renderer type for multiple behavioral components.'
