  图 4-1.


  轻量级 Java 游戏库 3 是一个开源 Java 游戏库，兼容 Java 和 JavaFX


  JMonkey 也是一个免费、开源的游戏引擎，面向希望创建 i3D 游戏的 Java 开发者（图 4-2）。该软件完全用 Java 编写，旨在提供广泛的易用性和快速部署能力。


