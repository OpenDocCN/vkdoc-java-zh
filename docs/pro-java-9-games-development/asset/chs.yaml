- '# 17. i3D 游戏方块选择：在 3D 模型中使用 PickResult 类


  现在，你已经创建了多层游戏棋盘组节点（子类）层级结构，为该层级结构下的所有 3D 组件添加了纹理，确保了层级结构的中心旋转，创建了一个旋转器 UI 来将游戏棋盘
  3D 模型（层级结构）随机旋转至某个象限，并使用你的 `createAnimationAssets()` 方法为游戏设计添加了动画对象，是时候让你的 3D 游戏元素变得可交互了。我们将设置
  3D 对象的鼠标点击事件处理代码，用于触发 3D 旋转器动画并选择棋盘方块。


  在本章中，我们将详细研究公共 PickResult 类和公共 MouseEvent 类，并在自定义的 `createSceneProcessing()` 方法中将其用于我们自己的游戏玩法设计。该方法将用于处理
  i3D 游戏元素（Box 和 Sphere 对象）的事件，以便玩家能够与 3D 游戏组件进行交互。


  ## 选择你的 3D 资源：PickResult 类


  公共类 PickResult 继承自 Object，位于 `javafx.scene.input` 包中，该包包含输入事件处理工具，如剪贴板、GestureEvent、SwipeEvent、TouchEvent
  和 ZoomEvent。PickResult 对象包含拾取事件的结果，在本游戏中，该结果来自鼠标或触摸。支持在其构造方法中使用 PickResult 对象的输入类包括
  MouseEvent、MouseDragEvent、DragEvent、GestureEvent、ContextMenuEvent 和 TouchPoint。这些类中都有一个
  `.getPickResult()` 方法调用，用于返回 PickResult 对象，该对象包含你在 Java 游戏开发中所需处理的所有拾取信息。


  PickResult 类的 Java 类层级结构表明，该类是从零开始编码以提供 3D 对象选择功能的；它没有自己的超类，因此看起来像下面的 Java 9 类层级结构：


  ```

  java.lang.Object

  > javafx.scene.input.PickResult

  ```


  PickResult 类包含一个数据字段，即静态整型 `FACE_UNDEFINED` 数据字段，它表示一个未定义的面。我们通常将使用此类来选择整个节点（旋转器、象限
  q1 到 q4、方块 Q1S1 到 Q4S5 以及类似的 3D 游戏元素），而不是单个多边形面或纹理贴图像素，尽管后者也是可行的。


  PickResult 类中的前两个构造方法创建用于处理 2D 和 2.5D 场景拾取结果的 PickResult 对象。第一个构造方法使用 EventTarget
  对象以及（双精度）sceneX 和 sceneY 属性为 2D 场景创建 PickResult 对象。该构造方法使用以下 Java 语句语法：


  ```

  PickResult(EventTarget target, double sceneX, double sceneY);

  ```


  第二个构造方法为“非 Shape3D”目标创建 PickResult 对象。由于它使用了 Point3D 对象和距离，我称之为 2.5D PickResult
  场景，因为它不支持基于 Shape3D 类的 3D 图元。然而，它确实支持 Point3D 对象以及进入 Scene 对象的距离概念。该构造方法使用以下 Java
  语句语法：


  ```

  PickResult(Node node, Point3D point, double distance)

  ```


  第三个构造方法为 Shape3D 目标创建 PickResult 对象，这正是我们用于创建 i3D 游戏所使用的。创建此构造方法的 Java 语法应如下所示：


  ```

  PickResult(Node node, Point3D point, double dist, int face, Point2D texCoord);

  ```


  第四个构造方法为包含法线的导入 3D 对象目标创建 PickResult 对象。如果你从外部 3D 建模软件包（如 Blender）导入了高级 3D 模型，则会用到此方法。创建此高级构造方法的
  Java 语法应如下所示：


  ```

  PickResult(Node node, Point3D point, double distance, int face, Point3D normal,
  Point2D texCoor)

  ```


  PickResult 类支持六个 `.get()` 方法调用，这些调用分别返回相交距离、相交面、相交节点、相交法线、相交点或相交纹理坐标（texCoord）。`.getIntersectedDistance()`
  方法调用将返回一个双精度值，表示当前相机位置与相交点之间的相交距离。


  `.getIntersectedFace()` 方法调用将返回一个整数，表示被拾取节点的相交面。如果节点没有用户指定的面（例如某个 Shape3D 图元），或者是在边界上被拾取，此方法将返回
  `FACE_UNDEFINED` 常量。`.getIntersectedNode()` 方法调用将返回一个 Node 对象形式的相交节点，我们将使用此方法调用来选择旋转器
  UI 和游戏棋盘节点元素。


  `.getIntersectedNormal()` 方法调用将返回被拾取的 Shape3D 对象或导入 3D 几何体的相交法线。`.getIntersectedPoint()`
  方法调用将使用被拾取节点对象的局部坐标系返回一个相交点（Point3D 对象）。`.getIntersectedTexCoord()` 方法调用将以 Point2D
  对象格式返回被拾取 3D 形状的相交纹理坐标。


  接下来，让我们看看另一个重要的事件处理类：MouseEvent。它是 InputEvent 的子类，用于将鼠标事件处理附加到我们用于创建 i3D 棋盘游戏模拟的
  3D 图元上。




  ### MouseEvent 类：捕获 3D 图元上的鼠标点击


  公共的 MouseEvent 类继承自 InputEvent 超类。MouseEvent 与其子类 MouseDragEvent 以及其他 InputEvent
  超类的子类一同存放在 `javafx.scene.input` 包中。MouseEvent 实现了 Java 的 Serializable 和 Cloneable
  接口。该类用于实现或“捕获”鼠标事件，以供你的 Java 游戏逻辑处理，你将在本章中学习如何做到这一点。当鼠标事件（例如点击）发生时，光标下的第一个（顶层或最前端的）Node
  对象会被“拾取”，并且 MouseEvent 会被传递到该 Node 对象的事件处理结构中。事件的传递使用了存储在 `javafx.event` 包中的公共 EventDispatcher
  Java 接口所描述的捕获和冒泡阶段。因此，MouseEvent 类的 Java 层次结构应如下所示：


  ```

  java.lang.Object

  > java.util.EventObject

  > javafx.event.Event

  > javafx.scene.input.InputEvent

  > javafx.scene.input.MouseEvent

  ```


  鼠标指针（光标）位置在几种不同的坐标系中都是可用的。可以使用相对于 MouseEvent 的 Node 对象原点的 X、Y 坐标（以及相对于你的 Scene 对象），使用相对于包含该
  Node 的 Scene 原点的 sceneX、sceneY 坐标，甚至可以使用相对于包含鼠标指针的显示屏原点的 screenX、screenY 坐标来获取。在这个特定的
  i3D BoardGame 项目中，我们将把被点击的 Node 与我们的游戏处理逻辑进行比较。


  MouseEvent 对象有许多特定的事件字段。这些字段是静态的，并使用大写字母，因为它们是 MouseEvent 类型的 InputEvent 所提供的不同类型事件的“硬编码”常量。一个通用的
  ANY 静态 EventType<MouseEvent> 被用作表示任何鼠标事件类型的公共“超类型”。


  一个 DRAG_DETECTED 静态 EventType<MouseEvent> 将被传递到任何被识别为拖拽手势源的 Node 对象。当鼠标按钮被点击（在同一节点上按下并释放）时，将传递一个
  MOUSE_CLICKED 静态 EventType<MouseEvent>。这正是我们将用于 i3D BoardGame 的事件。你还可以捕获鼠标按下和鼠标释放的事件。当鼠标按钮被按下时，将传递一个
  MOUSE_PRESSED 静态 EventType<MouseEvent>；当鼠标按钮被释放时，将传递一个 MOUSE_RELEASED 静态 EventType<MouseEvent>。


  你还可以处理鼠标移入一个 Node 然后又移出该 Node 而没有任何鼠标点击发生的事件！当鼠标进入一个 Node 对象但未被点击时（这称为悬停），将传递一个
  MOUSE_ENTERED 静态 EventType<MouseEvent>。当鼠标首次进入 Node（越过其边缘边界）时，将传递一个 MOUSE_ENTERED_TARGET
  静态 EventType<MouseEvent>。类似地，当鼠标退出一个 Node 对象时，将传递一个 MOUSE_EXITED 静态 EventType<MouseEvent>。当鼠标首次退出一个
  Node 对象（越过边缘边界）时，将传递一个 MOUSE_EXITED_TARGET 静态 EventType<MouseEvent>。


  最后，当鼠标在一个 Node 对象内移动且没有任何按钮被按下或释放时，将传递一个 MOUSE_MOVED 静态 EventType<MouseEvent>。当使用按下的（按住）鼠标按钮移动鼠标时（称为拖拽操作），将传递一个
  MOUSE_DRAGGED 静态 EventType<MouseEvent>。


  我们不会专门构造（实例化）MouseEvent 对象。我们将使用 `.setOnMouseClick()` 事件处理结构，作为其功能的一部分，它会为我们完成构造。不过，为了完整性，我将在此包含这两个重载的构造方法。第一个构造方法创建一个新的
  MouseEvent Event 对象，其源和目标为空，语法如下所示：


  ```

  MouseEvent(EventType eventType, double x, double y, double screenX, double

  screenY, MouseButton button, int clickCount, boolean shiftDown, boolean controlDown,

  boolean altDown, boolean metaDown, boolean primaryButtonDown, boolean

  middleButtonDown, boolean secondaryButtonDown, boolean synthesized, boolean

  popupTrigger, boolean stillSincePress, PickResult pickResult)

  ```


  第二个构造方法创建一个新的 MouseEvent Event 对象，语法如下所示：


  ```

  MouseEvent(Object source, EventTarget target, EventType eventType, double

  x, double y, double screenX, double screenY, MouseButton button, int clickCount,

  boolean shiftDown, boolean controlDown, boolean altDown, boolean metaDown, boolean

  primaryButtonDown, boolean middleButtonDown, boolean secondaryButtonDown, boolean

  synthesized, boolean popupTrigger, boolean stillSincePress, PickResult pickResult)

  ```


  MouseEvent 类包含 27 个方法，可帮助你控制鼠标事件处理。`.copyFor(Object newSource, EventTarget newTarget)`
  MouseEvent 方法调用将复制 Event 对象，以便它可以与不同的源和目标一起使用。


  `.copyFor(Object newSource, EventTarget newTarget, EventType<? extends MouseEvent>
  eventType)` MouseEvent 方法调用也将创建给定 Event 对象的副本，并替换给定的 MouseEvent 字段。


  静态的 `.copyForMouseDragEvent(MouseEvent e, Object source, EventTarget target, EventType<MouseDragEvent>
  type, Object gestureSource, PickResult pickResult)` 方法调用将创建一个 MouseDragEvent 类型的
  MouseEvent 副本。


  `.getButton()` 方法调用将轮询 MouseEvent 对象，以查看是哪个鼠标按钮（如果有）负责生成该 Event 对象。`.getClickCount()`
  方法调用将返回与该 Event 对象关联的鼠标点击次数（int 类型）。


  `.getEventType()` 方法调用将返回该 Event 对象的 EventType<? extends MouseEvent> 事件类型。`.getPickResult()`
  方法调用将返回 PickResult 对象关于该拾取的信息。


  `.getSceneX()` 方法调用将返回事件相对于包含 MouseEvent 源的 Scene 原点的水平位置的双精度值。`.getSceneY()` 方法调用将返回事件相对于包含
  MouseEvent 源的 Scene 原点的垂直位置的双精度值。


  `.getScreenX()` 方法调用将返回事件的绝对水平位置的双精度值。`.getScreenY()` 方法调用将返回事件的绝对垂直位置的双精度值。


  `.getX()` 方法调用将返回事件相对于 MouseEvent 源原点的水平位置的双精度值。`.getY()` 方法调用将返回事件相对于 MouseEvent
  源原点的垂直位置的双精度值。`.getZ()` 方法调用将返回事件相对于 MouseEvent 源原点的深度位置的双精度值。




  `.isAltDown()` 方法调用可用于判断在此事件期间是否按住了 Alt 修饰键。它会返回一个 `true` 或 `false`（布尔）值。`.isControlDown()`
  方法调用可用于判断在此事件期间是否按住了 Ctrl 修饰键。它同样返回一个 `true` 或 `false`（布尔）值。`.isMetaDown()` 方法调用可用于判断在此事件期间是否按住了
  META 修饰键。它也返回一个 `true` 或 `false`（布尔）值。`.isShiftDown()` 方法调用可用于判断在此事件期间是否按住了 SHIFT
  修饰键。它也返回一个 `true` 或 `false`（布尔）值。


  `.isDragDetect()` 方法调用应用于判断此 MouseEvent 之后是否会跟随一个 `DRAG_DETECTED` 事件，并返回一个布尔值 `true`（是，检测到拖动）或
  `false`（否，未检测到拖动）数据值。


  `.isMiddleButtonDown()` 方法调用可用于判断鼠标中键是否被按住。如果鼠标中键（鼠标按钮 #2）当前被按下，它将返回 `true` 布尔值。


  `.isPopupTrigger()` 方法调用应用于判断此事件是否为当前平台的弹出菜单触发事件。如果该鼠标事件确实是当前平台的弹出菜单触发事件，它将返回 `true`。


  `.isPrimaryButtonDown()` 方法调用将在主鼠标按钮（按钮 #1，通常是鼠标左键）当前被按下时返回 `true` 布尔值。`.isSecondaryButtonDown()`
  方法调用将在辅助按钮（按钮 #2，通常是鼠标右键）当前被按下时返回 `true` 布尔值。


  `.isShortcutDown()` 方法调用将返回在此 MouseEvent 期间，宿主平台的通用快捷键修饰键是否被按住。


  `.isStillSincePress()` 方法使用一个布尔值来指示，自在此事件之前发生的上一次鼠标按下事件以来，鼠标光标是否一直停留在系统提供的滞后区域内。


  `.isSynthesized()` 方法调用返回一个布尔值，指示该 MouseEvent 是否由触摸屏设备合成，而非通常的鼠标事件源设备（如鼠标、轨迹球、触控板或类似的鼠标模拟硬件设备）生成。


  最后，一个 `void .setDragDetect(boolean dragDetect)` 方法调用用于在使用鼠标、触控板或触摸屏设备进行拖拽检测时，结合
  MouseEvent 处理来增强拖拽检测行为。


