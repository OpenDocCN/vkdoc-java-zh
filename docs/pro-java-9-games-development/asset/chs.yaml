  ## 优化音频：使用较低采样率的 16 位音频


  我们已经很好地介绍了如何使用 Audacity 2.1.3 优化数字音频，因此我建议使用 16 位音频采样分辨率，并优化采样率（48、44、32、22、16、11
  或 8kHz），直到你听到音质发生变化。我们已经有了 16 位 44.1 kHz（当前使用）和 16 位 22.05 kHz 的音频，后者每个音效样本的数据量只有前者的一半，但音质听起来非常相似。如果你想使用更小的数字音频内存占用，只需在
  `loadAudioAssets()` 方法体中引用优化程度更高的音频资源即可。


  此时，我将这个内存与音质的权衡决定完全留给你。如果你想回到 Audacity 并优化其他三种采样率，例如 THX（48 kHz）、32 kHz 甚至 16 kHz，你可以聆听每种采样率下生成的
  16 位音频质量，并决定为每个级别的数字音频质量分配多少系统内存。


  请注意，你可以为游戏中的每个数字音频资源使用不同的采样率。某些音效在较低采样率（11 和 16 kHz）下也能保持音质，而其他音效（如音乐、人声）可能需要更高的采样率（22
  和 32 kHz）。不过，我建议全面使用 16 位采样分辨率，因为它能更好地适配内存，因为内存“块”是 8 位、16 位和 32 位的，你需要实现无缝适配。




  ## Java 游戏代码优化：善用 Java 技巧


  你可能已经注意到，在本书中设计和构建专业 Java 9 游戏的过程中，我一直使用长格式、易读（且易懂）的 Java 代码。这些代码是合法的，并且可能会被 Java
  9 的编译、构建（和执行）软件阶段优化，因此它们并非“糟糕”的代码，但确实存在一些优化流程和结构，可以使其显著缩短并更加精简。在书中进行此过程的问题在于，每个
  Java 程序员都有自己偏好的不同方式，那么我该选择哪种方法呢？还是展示大部分方法？不幸的是，本书的篇幅有限，需要涵盖新媒体资产开发、游戏设计、开发和测试，以及类似的需要掌握才能成为专业
  Java 9 游戏开发者的广泛主题。在本章的最后一节，我将介绍一些你可能希望稍后自行添加到这个棋盘游戏中的其他内容，以便练习你所学到的知识。


  首先，让我们看一下 `populateQuadrant()` 方法的代码。`populateQuadrantOne()` 方法以以下 Java 序列开始，其中每个构造对应象限
  1 中的五个游戏棋盘方格之一：


  ```

  pickS1 = random.nextInt(3);

  if (pickS1 == 0) { diffuse1 = new Image("/gamesquare1bird0.png", 256, 256, true,
  true, true); }

  if (pickS1 == 1) { diffuse1 = new Image("/gamesquare1bird1.png", 256, 256, true,
  true, true); }

  if (pickS1 == 2) { diffuse1 = new Image("/gamesquare1bird2.png", 256, 256, true,
  true, true); }

  Shader1.setDiffuseMap(diffuse1);

  ```


  一旦你确认代码在原型设计后能正常工作，就可以将其简化为以下代码，这也消除了条件 `if()` 的 CPU 处理和内存开销：


  ```

  pickS1 = random.nextInt(3);

  diffuse1 = new Image("/gamesquare1bird" + pickS1 + ".png", 256, 256, true, true,
  true);

  Shader1.setDiffuseMap(diffuse1);

  ```


  诚然，这使得在游戏玩法代码中更难看清你在做什么，但代码以相同方式运行，并且代码行数几乎减少了一半，使你可以将 `populateQuadrantN()` 方法从
  26 行代码减少到 16 行代码，代码量减少了 38%，或者所有四个方法总共减少了 40 行代码。


  接下来，考虑来自第 19 章的以下代码块，它可能需要 17 到 25 行代码来编写：


  ```

  if (picked == spinner) {

  int spin = random.nextInt(4);

  if (spin == 0) {

  rotGameBoard.setByAngle(1080); rotSpinner.setByAngle(-1080); spinDeg += 1080;

  }

  if (spin == 1) {

  rotGameBoard.setByAngle(1170); rotSpinner.setByAngle(-1170); spinDeg += 1170;

  }

  if (spin == 2) {

  rotGameBoard.setByAngle(1260); rotSpinner.setByAngle(-1260); spinDeg += 1260;

  }

  if (spin == 3) {

  rotGameBoard.setByAngle(1350); rotSpinner.setByAngle(-1350); spinDeg += 1350;

  }

  rotGameBoard.play();

  rotSpinner.play();

  calculateQuadrantLanding();

  }

  ```


  以下基于数组的 Java 代码块与之前的代码等效。它要短得多，只有 10 行 Java 9 代码，减少了 41% 到 60%（具体取决于你在 `if (spin
  == n) { … }` 内部编写代码的方式）：


  ```

  if (picked == spinner) {

  int spin = random.nextInt(4);

  double[] angles = { 1080, 1170, 1260, 1350 };

  rotGameBoard.setByAngle(angles[spin]);

  rotSpinner.setByAngle(-angles[spin]);

  spinDeg += angles[spin];

  rotGameBoard.play();

  rotSpinner.play();

  calculateQuadrantLanding();

  }

  ```


  在计算出随机旋转值之后，这段代码片段声明了一个包含四个元素的 double 类型数组，这些元素代表象限着陆角度。然后我使用旋转值（`random.nextInt(4)`
  输出四个随机象限值之一，范围从 0 到 3）来访问一个角度值（通过 `angles[spin]`），该值被传递给 `setByAngle`，同时也被加到 `spinDeg`
  变量中。


  请注意，如果 `spinDeg` 是 `int`（32 位整数）类型，你必须在赋值之前将 `double` 角度值强制转换为 `(int)`，否则会面临 Java
  编译器错误。在这种情况下，你应该将 `spinDeg += angle[spin];` 替换为 Java 9 代码 `spinDeg += (int) angle[spin];`
  以避免此 Java 编译器错误。


  如果你不想三次指定 `angles[spin]`，也可以将值存储在一个角度变量中，然后使用这个 double 类型的角度变量，如下面的 Java 代码所示：


  ```

  if (picked == spinner) {

  int spin = random.nextInt(4);

  double[] angles = { 1080, 1170, 1260, 1350 };

  double angle = angles[spin];

  rotGameBoard.setByAngle(angle);

  rotSpinner.setByAngle(-angle);

  spinDeg += angle;

  rotGameBoard.play();

  rotSpinner.play();

  calculateQuadrantLanding();

  }

  ```


  正如你所见，有多种编写此游戏 Java 代码的方法可以减少使用的代码行数，甚至可能略微降低游戏使用的几个百分点的 CPU 使用率，如本章的 NetBeans 9
  性能分析部分所示。由于每个人都有自己独特的代码优化风格和方法，我将把 Java 9 代码优化留给你，并在本书材料中使用（较长的）原型代码。这将使你能够更好地理解我在游戏玩法设计和开发工作流程中对新媒体资产的处理，并将本书内容聚焦于使用
  Java 9 及其强大的 JavaFX 9 API 进行专业游戏设计与开发。


  最后，让我们在本章中再增加一节，看看我们可能利用哪些其他 JavaFX 9 API 类来进一步扩展这个 i3D 游戏，毕竟你最终会这样做。你可以从第三方导入器包中导入
  i3D 模型（不幸的是，这还不是 JavaFX 的“原生”部分，因此本书坚持使用 JavaFX i3D API），并添加数字视频资产，前提是你仔细优化它们。由于
  JavaFX 9 模块（分发打包）尚未完全完成（距离 Java 9 发布还有一个月或更长时间）。一旦 Oracle 发布它，一份涵盖 JavaFX 9 模块（游戏分发打包）的附录将作为本书可下载源代码的一部分提供。要下载本书的源代码，请访问
  [`www.apress.com/9781484209745`](http://www.apress.com/9781484209745) 并点击“下载源代码”按钮。




