  PhongMaterial 类（对象）的 specularPower 属性（特性）控制表面的光泽度，至少在弯曲对象上是如此。如图 13-3 所示，零高光会创建所谓的哑光表面。需要注意的是，调用
  setSpecularPower(0) 并不会移除高光。实际上，这会产生相反的效果，给你一个巨大的“过曝”高光，看起来非常糟糕。接下来让我们尝试调整这个属性，然后我们可以继续查看所有其他属性。其余属性涉及贴图及其
  Image 对象，这将需要数字成像软件，在我们的案例中是 GIMP 2.10（如果已发布，也可能是 3.0）。


