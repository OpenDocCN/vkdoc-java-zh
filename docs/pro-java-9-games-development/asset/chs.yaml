  ## 使用外部图像资源：创建纹理贴图


  `PhongMaterial` 类及其算法最强大的功能在于其支持的四种纹理贴图属性。这为你提供了四个着色器通道，分别用于影响表面颜色（`diffuseMap`）、光泽度（`specularMap`）、照明（`selfIlluminationMap`）和高度（`bumpMap`
  或法线贴图）。可以将其想象为数字图像图层合成，在高光颜色和强度（由 `specularMap` 属性图像对象指导，如果该对象存在于 `PhongMaterial`
  着色器管线中）应用到表面之前，这四个通道会由 Phong 着色器渲染算法进行组合。


  ### 使用外部第三方软件：使用 GIMP 创建贴图


  Java 9 和 JavaFX 的设计足够灵活，允许你使用高级（专业）第三方软件，例如 GIMP（数字图像合成）、Blender（3D 建模）、Fusion（特效）、Inkscape（SVG
  内容）或 Audacity（数字音频编辑）。纹理贴图通常最好在专业的像素编辑和图层合成软件中制作和优化，例如免费开源的 GIMP 2.8（即将推出 GIMP 3.0），它功能极其强大。


