  ## 总结


  在第十九章中，我们学习了如何实现游戏棋盘方块内容的随机选择，同时编写了更多游戏逻辑代码，这些代码能够智能追踪游戏棋盘的旋转情况，并利用 Java 数学运算符以及简单而强大的编程算法与结构，确定每次旋转后象限将落在何处。我们调试了角度偏移评估顺序中的几个问题，以及这些评估所指向的
  `populateQuadrant()` 方法，并找到了一种将图像加载到内存中的方法，而无需同时在系统内存中声明超过二十多张游戏棋盘漫反射纹理图像。这种方法使我们能够向游戏应用添加数百张内容图像，而不会产生内存不足的错误。


  我们构建了几个新的自定义方法，包括 `resetTextureMaps()`、`calculateQuadrantLanding()`、`populateQuadrantOne()`、`populateQuadrantTwo()`、`populateQuadrantThree()`
  和 `populateQuadrantFour()`。


  我们在 `createSceneProcessing()` 方法的 `MouseEvent` 处理逻辑中添加了更多游戏逻辑，这样在每次旋转时，游戏 AI 逻辑都会从游戏启动开始追踪每一次旋转。这将使我们能够开发一个算法，在每次旋转时计算落点角度，从而使游戏逻辑能够知道每次旋转的当前“落点象限”是什么，这对于我们将要开发的所有其他游戏逻辑至关重要。


  我们开发了一个优雅的解决方案，该方案仅使用整数（角度度数）或 `int` 数字（整数），通过将 `spinDeg` 累加器变量除以 360 并仅保留余数角度偏移（超过完整
  360 度旋转的部分），从而丢弃完整的旋转（360 度）。这是通过使用 Java 的 `%` 取余运算符实现的，该运算符将分子（`spinDeg` 总数）除以除数（360
  度），并将余数赋值给等号（`=`）运算符另一侧的 `quadrantLanding` 变量。


  我们开发了四个 `populateQuadrant()` 方法，用于存放为每个象限所附着的五个游戏棋盘方块随机选择内容的代码。随着游戏内容的增加，这些方法可以进行扩展。


  我们还开发了一个 `resetTextureMaps()` 方法，该方法在下次旋转前将游戏棋盘重置为默认的空白状态。我们了解了如何“重用” `Image` 实例化，即引用不同的纹理贴图。这将请求
  Java 9 执行垃圾回收以重新加载图像内容的内存位置，而不是为游戏内容的每个纹理贴图都将 `Image` 对象加载到系统内存中，后者会导致内存不足错误！


