  PNG24（24 位）图像格式，而不是更优化的 PNG8 格式。嗯，这个 PNG24 编解码器在将 256 × 256 × 3（196,608）字节压缩到 680
  字节方面做得相当出色，数据量减少了 290:1，即 99.67%！


  从更技术的角度来看，Java 在内存中会使用 24 位 RGB 颜色表示，因此，如果我们使用了索引 8 位彩色图像，它在加载到内存时也会被简单地转换回 24 位彩色值图像。因此，我倾向于尽可能使用
  PNG24 和 PNG32 图像，特别是对于主要用于专业 Java 9 游戏设计和开发应用的 3D 纹理贴图，其尺寸通常为 32x32、64x64、128x128、256x256
  和 512x512。对于摄影图像，你也可以使用 JPEG。


  ## 总结


  在第十三章中，我们学习了 `javafx.scene.paint` 包中的类，这些类允许你处理 3D 着色器、纹理贴图和材质，包括基于抽象 Material 超类的
  PhongMaterial 类。我们了解到 Material 类基本上是一个“空”类或“外壳”，用于容纳“材质”对象（Shape3D 类中的属性），而繁重的工作（算法）则在
  PhongMaterial 子类中。我们相当详细地研究了该类中的属性、构造器和方法调用，以便你了解 PhongMaterial 对象能做什么，然后我们研究了如何在
  Java 代码中实现这些（除了 bumpMap，它在我当前使用的 JavaFX 9 代码库中无法正常工作，所以我们将在本书后面重新讨论这个问题）。


  你学习了如何使用 GIMP（本书当前版本为 2.8.22，但我预计 2.10 将在 2017 年发布，3.0 将在 2018 年发布）创建纹理贴图资源，以及如何通过使用
  GIMP 工具以最佳工作流程实现外科手术般的精确度，创建平衡、像素精确、尺寸为 2 的幂的纹理贴图，为专业 3D 游戏开发进行优化。


  然后，我们研究了如何将这些纹理贴图资源实现到当前 JavaFX 9 PhongMaterial 类提供给我们的四个纹理贴图“通道”中。我们看到了这些纹理贴图通道如何让我们微调材质属性的渲染方式，从而为我们的
  Java 9 游戏创造更专业的外观。


  最后，我们为游戏棋盘格创建了 `diffuseColor` 属性纹理贴图，将 Box 对象转换成了这些游戏棋盘格之一，并将新的纹理贴图应用到了新的 3D 基本体“平面”对象上，为下一章（在
  SceneGraph 中创建我们的 `gameBoard` 分支）要做的事情做准备，这样在创建过程中它看起来就像一个游戏棋盘。如你所知，我建议在进行专业 Java
  9 游戏开发时，采用这样一种方式：在编写 Java 9 代码、创建新的媒体资源以及“演变”你的专业 Java 9 游戏内容和交付物，使其最终成为你想要的样子时，你能看到
  JavaFX 9 将要做什么。专业 Java 9 游戏开发是一个精炼的过程，所以我正是以这种方式撰写本书的。我向你展示我是如何实际使用 NetBeans 9 IDE
  以及 Java 9 和 JavaFX 9 API“凭空变出一个 3D 棋盘游戏应用”的。


  在第 14 章中，我们将进一步优化我们的 Java 代码组织，创建新方法并重组一些现有方法，以创建并整合我们 i3D 棋盘游戏的核心——游戏棋盘。我们将在 `gameBoard`
  Group 节点（分支）下创建一个嵌套的 Group 3D 层次结构，并研究 3D 基本体的 X、Y、Z 定位以及相关概念，这些概念适用于以无缝方式布局 3D
  游戏棋盘，以便未来的 Java 代码能够以逻辑、最优的方式访问和引用其组件和子组件。就像数据库设计一样，你如何设计 SceneGraph 会极大地影响你的 Pro
  Java 9 3D 游戏未来的运行方式。我们越能保持设计、层次结构和 3D 对象命名方案的简单直接，在编写未来用于交互、动画、移动、碰撞检测等的代码时，我们的处境就越好。至此，你应该开始对
