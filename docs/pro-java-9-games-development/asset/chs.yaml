  ## 总结


  在第二十章中，我们进一步学习了如何完成游戏板方块内容的随机选择实现。我们实现了 `onMouseEvent` 处理代码，当玩家点击游戏板方块并选择内容后，该代码会将象限纹理贴图放置到位。我们还实现了摄像机动画代码，一旦游戏板方块被选中，该代码会改变游戏板的视图，以便显示更大的象限图像。这基本上使我们能够开始编写单个方块（以及选中方块后的象限）的游戏逻辑，即回答关于内容的视觉问题并进行评分，我们将在第
