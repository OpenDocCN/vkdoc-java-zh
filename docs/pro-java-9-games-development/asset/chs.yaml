  ## 使用 3D 相机：为 3D 游戏添加透视效果


  任何 3D 渲染管线的顶层都是场景相机，因为它处理 3D 场景中的所有内容，然后将这些数据交给渲染引擎。在这种情况下，可能是 PRISM 软件渲染器（在没有 GPU
  的情况下），也可能是你 3D 游戏所运行的消费电子设备（PC、手机、平板电脑、iTV 设备、笔记本电脑、游戏机、机顶盒）上的 OpenGL 硬件渲染引擎。如果你仍在使用
  Windows，它还可能包括 DirectX 3D 渲染。**Camera** 对象（在我们的例子中，将是一个 **PerspectiveCamera** 对象）专门用于
  3D 场景渲染；我们将在本章的这一部分对其进行研究。它对于 JavaFX 9 SceneGraph 来说如此不可或缺，以至于它拥有自己的 `Scene.setCamera(Camera)`
  方法调用。此方法调用用于将 **Camera** 对象添加到 SceneGraph 根节点，以确保它位于 SceneGraph 渲染层次结构的最顶层（根节点）。它不使用
  `.getChildren().add()` 方法链，因此，它将在你的 `createSceneGraphNodes()` 方法内部设置，正如你稍后在本章的这一部分设置你的专业
  Java 9 游戏的 **Camera** 对象时所看到的那样。我们还将介绍 **ParallelCamera**，它更适合 2D 游戏。




  ### JavaFX 相机类：定义相机的抽象超类


  公共的 JavaFX 相机超类是一个抽象类，仅用于创建不同类型的相机。目前有正交或平行相机子类（对象）或透视相机子类（对象）。你的应用程序不应尝试直接扩展此抽象相机类；如果你尝试这样做，Java
  将抛出 `UnsupportedOperationException`，并且你的专业 Java 9 游戏将无法编译或运行。相机类位于核心 `javafx.scene`
  包的 `javafx.graphics` 模块中，并且是 `Node` 的子类，因为它本质上是你场景图顶部的节点。相机类实现了 `Styleable` 接口，因此可以设置样式，并且它包含
  `EventTarget` 接口，因此可以处理事件。因此，Java 9 中 JavaFX 相机类的类层次结构如下所示：


  ```

  java.lang.Object

  > javafx.scene.Node

  > javafx.scene.Camera

  ```


  相机类是用于渲染场景的任何相机子类的基类。相机用于定义场景的坐标空间如何渲染到用户正在查看的 2D 窗口（舞台）上。默认相机（如果你没有专门创建一个，我们将在本节后面进行此操作）将定位在场景中，使其在场景坐标空间中的投影平面位于
  Z=0（正中间），并沿正 Z 方向看向屏幕内部。因此，在代码中，我们将把相机从屏幕中心向后移动 1000 个单位（到 -1000），因为 i3D 游戏板将位于“舞台中央”，即位于
  0, 0, 0（X, Y, Z）。


  从相机到投影平面的 Z 单位距离可以通过其所附加的场景（也是最终的投影平面）的宽度和高度以及相机对象的 `fieldOfView` 参数来确定。相机对象的 `nearClip`
  和 `farClip` 属性是这个抽象类中定义的仅有的两个属性或特征，并且在 JavaFX 所谓的眼坐标空间中指定。该空间定义为观察者的眼睛位于相机对象的原点，投影平面在正
  Z 方向上位于眼睛前方一个单位。任何相机子类（例如 `PerspectiveCamera`）的 `nearClip` 和 `farClip` 属性都可以使用 `.setNearClip()`
  和 `.setFarClip()` 方法调用来设置。我们将在本章本节稍后部分使用这两个 `PerspectiveCamera` 类（对象）方法调用来配置我们的场景图相机对象。


  ### JavaFX PerspectiveCamera 类：你的 3D 透视相机


  JavaFX `PerspectiveCamera` 类扩展了 `Camera` 类，用于创建用于渲染 i3D 场景的 `PerspectiveCamera`（对象）。`PerspectiveCamera`
  类也位于核心 `javafx.scene` 包的 `javafx.graphics` 模块中；它是 `Node` 的子类，并且是你 JavaFX 场景图顶部的节点。`PerspectiveCamera`
  类也实现了 `Styleable` 接口，因此可以设置样式，以及 `EventTarget` 接口，因此可以处理事件。Java 9 中 JavaFX `PerspectiveCamera`
  类的类层次结构如下所示：


  ```

  java.lang.Object

  > javafx.scene.Node

  > javafx.scene.Camera

  > javafx.scene.PerspectiveCamera

  ```


  `PerspectiveCamera` 对象定义了透视投影的视景体。想象一个截断的、朝右的金字塔，就像大多数相机在 Blender 或 3D Studio Max
  等 3D 软件中的视觉表示一样。


  这个类有两个（重载的）构造方法。一个具有空的参数区域，如下所示：


  ```

  camera = new PerspectiveCamera();

  ```


  第二个使用布尔值 `fixedEyeAtCameraZero` 属性（或参数或特征），这是我们将在相机对象声明、实例化和配置 Java 代码中使用的那个，如下所示：


  ```

  camera = new PerspectiveCamera(true);

  ```


  当然，我们也会在类的顶部声明一个 `PerspectiveCamera camera`，并使用 Alt+Enter 让 NetBeans 9 为我们编写这个类的导入语句。`PerspectiveCamera`
  有一个 `fieldOfView` 值，可用于更改相机投影的视场角（FOV），并以度为单位。我将保持 FOV 为其默认值，并假设这个默认 FOV 能提供最佳的视觉效果，这是由
  JavaFX 开发团队确定的。


  我在 i3D 游戏和模拟中的倾向是使用“推拉”，即沿着 Z（进出场景）变换轴移动相机，而不是使用 FOV 值变化，因为即使在现实生活中，更换相机镜头（例如从 24mm
  变为 105mm）也往往会更剧烈地改变透视。根据我的经验，使用不同的 3D 虚拟相机时，这种透视变化在虚拟 3D 中比在使用真实相机时更加剧烈。


  默认情况下，你的 `PerspectiveCamera` 在创建（实例化）时位于场景中心，并沿着（指向）正 Z 轴方向观察。如果你使用 `PerspectiveCamera(false)`
  构造一个 `PerspectiveCamera`，那么由相机定义的坐标系将使其 0,0 原点位于面板的左上角，Y 轴向下，Z 轴远离观察者（指向屏幕内部）。如果一个
  `PerspectiveCamera` 节点被添加到场景图中，相机的变换后的位置和方向将定义相机的位置以及相机观察的方向。在默认相机中，`fixedEyeAtCameraZero`
  为 false，眼睛位置的 Z 值会在 Z 方向上进行调整，以便使用指定的 `fieldOfView` 生成的投影矩阵在 Z = 0（在投影平面上）处产生使用设备独立像素的单位。这与
  `ParallelCamera` 的特性相匹配。当场景调整大小时，投影平面（Z = 0）上的场景对象将保持相同大小，但场景中可见的内容会增多或减少，这更适合 2D
  相机和 2D 滚动条使用，而不是 3D 相机使用，因为调整 3D 相机大小会缩放你的场景。这就是为什么 `PerspectiveCamera` 通常使用 `PerspectiveCamera(true)`
  进行实例化的原因，我们将在本章本节稍后部分进行此操作。




  当 `fixedEyeAtCameraZero` 设置为 true 时，眼睛位置固定在相机局部坐标系的 (0, 0, 0) 处。投影矩阵将使用默认（或指定）的
  `fieldOfView` 属性生成，并且投影体积将被映射到窗口（视口或 Stage 对象）上，使得它在投影平面上的设备无关像素上被“拉伸”（缩放）。当场景的
  `size` 属性改变时，场景中的物体会按比例缩小或放大，但内容的可见范围（边界）将保持不变。


  JavaFX 开发团队建议，如果你计划变换（移动或推拉）相机对象，请将 `fixedEyeAtCameraZero` 设置为 true。当 `fixedEyeAtCameraZero`
  设置为 false 时变换相机，可能会导致最终用户难以直观理解的结果。


  请注意，`PerspectiveCamera` 是一个条件性 3D 功能。你可以查询 `ConditionalFeature.SCENE3D` 布尔变量，以确定给定用户的设备是否支持此功能（在本例中，支持
  i3D）。这可以通过以下 Java 代码结构实现，该结构设置一个布尔变量来反映系统对 3D 渲染的支持：


  ```

  boolean supportFor3D = Platform.isSupported(ConditionalFeature.SCENE3D);

  ```


  最后，此类有一个名为 `verticalFieldOfView` 的布尔属性，用于定义 `fieldOfView` 属性是否应用于投影的垂直维度。从逻辑上讲，这意味着如果此属性为
  false，则增加或减少 FOV 将改变投影的宽度，但不会改变（垂直）高度；如果此属性为 true，则它将改变（缩放）相机投影的水平（宽度）和垂直（高度）两个维度，这表面上比仅改变相机投影平面的一个维度能更好地保持宽高比。


  接下来，让我们看看 `ParallelCamera` 类。为了保持我们 Camera 子类覆盖的一致性，我们将介绍这个类，尽管这个相机更适用于 2D 游戏和可能的正交
  3D 应用程序。


  ### JavaFX ParallelCamera 类：你的 2D 空间平行相机


  JavaFX `ParallelCamera` 类也扩展了 `Camera` 类，用于创建一个 `ParallelCamera`（对象），该对象用于渲染你的 i2D
  场景。这个 `ParallelCamera` 类也位于核心 `javafx.scene` 包的 `javafx.graphics` 模块中；它是 `Node`
  的子类，并且是你 JavaFX SceneGraph 顶部的 `Node`。`ParallelCamera` 类还实现了 `Styleable` 接口，因此可以设置样式，以及
  `EventTarget` 接口，因此可以处理事件。因此，JavaFX `ParallelCamera` 类的 Java 类层次结构如下所示：


  ```

  java.lang.Object

  > javafx.scene.Node

  > javafx.scene.Camera

  > javafx.scene.ParallelCamera

  ```


  JavaFX 9 创建的默认相机始终是 `ParallelCamera`，这就是我们在本章中编写特定 `Camera` 和 `LightBase` 对象创建代码的原因。例如，如果你只是创建了一个
  `Sphere` 对象，而没有创建任何 `Camera` 子类对象或 `LightBase` 子类对象，JavaFX 运行时将自动创建一个 `ParallelCamera`
  对象和一个 `AmbientLight` 对象，以便 `Shape3D` 子类（`Sphere`）对渲染器可见。


  如果场景仅包含 2D 变换，则不需要 `PerspectiveCamera`，因此会使用 `ParallelCamera`，它不会渲染 3D 对象的所有特性。`ParallelCamera`
  更适合《Beginning Java 8 Games Development》（Apress, 2014）中涵盖的内容。此相机为平行投影定义了一个视景体，在 3D
  行业中也称为正交投影。本质上，正交投影相当于一个矩形平面。


  `ParallelCamera` 始终位于窗口中心，并沿正 z 轴方向观察。`ParallelCamera`（相对于 `PerspectiveCamera`）的不同之处在于，此相机定义的场景坐标系原点位于屏幕左上角，y
  轴沿屏幕左侧向下延伸，x 轴沿屏幕顶部向右延伸，z 轴指向远离观察者的方向（进入屏幕表示的深处）。


  `ParallelCamera` 对象中使用的单位以像素坐标表示，因此这完全类似于 2D 数字成像软件包以及我们用于 2D UI 设计的 2D `StackPane`
  图像合成层对象，后者也从屏幕左上角 (0,0) 的 (X,Y) 坐标开始引用。这再次表明，对于你的 i2D 游戏，使用此 Camera 子类比用于 i3D 游戏更合理。


  此类只有一个构造函数方法，它使用一个空的参数区域，如下所示：


  ```

  Camera2D = new ParallelCamera();

  ```


  接下来，让我们看看如何创建 `PerspectiveCamera` 对象，我们将把它用于我们的专业 Java 9 游戏。我们将了解如何初始配置它以供使用，以及如何将其添加到
  JavaFX SceneGraph 的根节点。




  ### 向场景中添加透视摄像机：使用 .setCamera() 方法


  首先，我们需要在 JavaFXGame 类的顶部添加一个 PerspectiveCamera 对象的声明，使用 `PerspectiveCamera camera;`
  这条 Java 语句。随后，`PerspectiveCamera` 对象（类用法）下方会出现一条波浪形的红色下划线提示。使用 `Alt+Enter` 快捷键让
  NetBeans 9 为你编写 import 语句，然后打开 `createSceneGraphNodes()` 方法，以便将该摄像机对象添加到 SceneGraph
  的顶部（根节点）。在根 Group 实例化语句的下方，使用 `camera = new PerspectiveCamera(true);` 构造器语句来实例化这个摄像机对象。接着，在下一行调用
  `.setTranslateZ()` 方法，并传入 `-1000` 值，将摄像机从 3D 场景的 0,0,0 中心点移出 1000 个单位。


  通过调用摄像机对象的 `.setNearClip()` 方法，将 `nearClip` 摄像机对象属性设置为 0.1；再通过调用 `.setFarClip()`
  方法，将 `farClip` 属性设置为 5000.0。最后，通过调用场景对象的 `.setCamera()` 方法，将摄像机对象接入场景对象（根节点），并在
  `.setCamera(` `camera` `)` 方法调用中，将摄像机对象作为参数传入。使用 `.setFill()` 方法调用，将场景对象的 Background
  值设置为 `Color.BLACK`，这样你的 3D 对象就能清晰凸显出来。使用的 Java 语句如下：


  ```

  PerspectiveCamera camera;

  ...

  createSceneGraphNodes() {

  camera = new PerspectiveCamera(true);

  camera.setTranslateZ(-1000);

  camera.setNearClip(0.1);

  camera.setFarClip(5000.0);

  ...

  scene.setFill(Color.BLACK);

  scene.setCamera(camera);

  ```


