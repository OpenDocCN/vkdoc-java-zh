  Alpha 通道数据将允许我们将这些徽标或屏幕标题合成到任何背景图像之上，甚至如果我们在后续选择这样做，还可以合成到 i3D 游戏板本身之上。在下一节中，我将在
  Autodesk 3D Studio Max 中创建一个 iTVBoardGame 徽标，然后将其导出为 OBJ 文件，并使用一种酷炫（或者，也许是火热）的岩石纹理进行渲染。然后，我们将拥有一个专业的
  Java 9 游戏 3D 启动画面标题，供本章稍后在你完善 UI 设计时使用。




  ### 创建启动画面资源：在 2D 管线中使用 3D 资产


  如图 9-5 所示，我使用 2D 文本工具创建了一个“快速且粗糙”的 iTVBoardGame 3D 标志，然后使用倒角修改器对其进行挤出处理，如截图右上角 Autodesk
