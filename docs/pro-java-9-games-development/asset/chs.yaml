  `System.out.println` 调用）。本章我们将概述的 Java 和 JavaFX 事件处理，将实现玩家用来了解并启动你的 Java 9 游戏的用户界面。在本书中，你还会使用其他类型的事件处理（按键和鼠标），我们将在本章中介绍这些内容。你将添加
  Java 游戏 UI 编程逻辑，这可以看作是游戏的交互引擎。与游戏交互的方式有很多种，包括方向键（在消费电子设备和现代遥控器中称为 DPAD）、键盘、鼠标、轨迹球、游戏控制器、触摸屏，甚至包括陀螺仪和加速度计在内的先进硬件。你在专业
  Java 9 游戏开发中需要做出的重要选择之一，就是玩家将如何通过他们运行游戏的硬件设备与你开发的 Java 游戏进行交互，以及游戏支持哪些硬件输入功能。


