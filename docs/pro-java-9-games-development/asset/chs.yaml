  ## 总结


  在第十六章中，我们学习了 `Animation` 超类和 `Transition` 超类，以及一些重要的 `Transition` 子类 `RotateTransition`
  和 `TranslationTransition`，它们允许我们在游戏过程中移动和旋转 3D 对象。我们还研究了 `ParallelTransition` 子类，它允许我们组合这些
  `Animation` 对象以创建更复杂的 `Animation` 对象。我们还为我们的游戏构建了 `Animation` 对象，这将允许用户对游戏板应用随机旋转以选择一个主题象限，并在需要随机旋转游戏板时，将旋转的旋转器
  UI 元素移入和移出屏幕。


  我们为 `JavaFXGame` 类创建了一个名为 `createAnimationAssets()` 的新自定义方法，该方法将使用 `Transition`
  子类（如 `RotateTransition`、`TranslateTransition`、`ScaleTransition` 和 `ParallelTransition`）为专业
  Java 9 游戏设计创建的所有 `Animation` 对象。


  在第 17 章中，我们将学习 3D 场景元素的 `MouseEvent` 处理，以便我们可以点击 Sphere 3D 旋转器 UI 来旋转游戏板，并最终点击每个游戏板方块以选择教育问题类别，并调出问题供玩家回答。




