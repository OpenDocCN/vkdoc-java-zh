  ## 总结


  在第十五章中，我们构建了 3D“旋转器”球体图元 UI 元素，它将允许用户对游戏棋盘施加随机旋转，以选择一个主题象限。我们还完成了游戏棋盘的纹理映射，并弄清楚了如何修复面渲染异常，这些异常曾导致游戏的核心组件——游戏棋盘模型无法正确渲染，从而无法呈现专业外观。该解决方案涉及使用更复杂的场景对象实例化，包括一个启用深度缓冲算法的标志，以及一个启用场景范围内所有
  3D 对象抗锯齿的常量。这消除了 Y 维度（高度）的面渲染错误，以及我们在游戏棋盘组件边缘看到的锯齿状边缘。


  我们为游戏棋盘的四个中心象限和旋转器 UI 元素创建了五个新的纹理贴图，旋转器 UI 允许玩家旋转棋盘以决定他们的下一步行动，在本例中是一个教育主题。


  我们添加了漫反射纹理贴图图像对象和利用这些纹理贴图的 Phong 着色器定义。我们还添加了 Java 代码，将旋转器 UI 添加到场景图层次结构中，并进一步练习了使用
  GIMP。


