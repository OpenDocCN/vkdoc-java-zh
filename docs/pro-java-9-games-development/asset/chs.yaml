  ## 总结


  在第二十一章中，我们学习了如何为每个游戏板方块创建答案选项。我们还创建了一个 StackPane 和 Button 对象，供玩家记录答案。你需要创建其他 Java
  代码来回答每个游戏板方块的随机选项，并输入这些代码以完成游戏玩法，这样你就可以进入下一章，在那里我们将创建计分引擎、记分牌和高分代码，用于跟踪游戏的这一部分。


  我们还学习了如何使用 JavaFX AudioClip 音序器向游戏添加数字音频资源，该音序器拥有合成器所具备的所有核心音乐合成、声音跟踪和触发工具。我们创建了一个定时数字音频剪辑和一个循环（播放直到停止）版本的数字音频，以便你了解如何添加数字音频资源，为玩家在游戏过程中提供听觉反馈。


  在第 22 章中，你将开发一个计分引擎代码基础设施，用于处理玩家选择正确游戏板方块内容时发生的情况。这意味着我们将再次开发 2D 游戏元素来容纳记分牌内容，这些内容将弹出并覆盖
  3D 游戏用户界面中更多未使用的部分。在这种情况下，这将是游戏屏幕的右下部分。




