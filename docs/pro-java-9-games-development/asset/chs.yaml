  CPU 周期是否受到过大（从数据占用空间角度）的新媒体元素的影响。就专业 Java 游戏而言，NetBeans 分析器会告诉你很大一部分相关信息。是的，你的 Java
  逻辑很重要。无限循环问题会很快在分析器中显现出来，但非最优的动画对象结构、过大的纹理贴图、过长的数字音频音效、优化不佳的数字视频以及使用过多多边形（过多几何体）的
  i3D 资源也同样会显现出来。这就是我们在本书前三分之一部分探讨各种新媒体概念和原理的原因，因为新媒体优化会影响游戏的运行方式。




  ## NetBeans 9 分析器：测试内存与 CPU 使用率


  要调用 NetBeans 9 分析器，只需使用“分析”菜单及其顶部的“分析项目 (JavaFXGame)”选项，如图 24-12 所示。图中还显示了 40 个自定义方法、必需的
  `start()` 和 `main()` 方法，以及自我们创建 JavaFXGame 引导应用程序以来添加的 1700 行 Java 9 代码。一次 NetBeans
  9 分析会话可以展示程序执行期间计算机发生的许多复杂的“幕后”操作，以及与服务器的交互，甚至 SQL 数据库访问模式。因此，本章不会涉及 NetBeans 9
  分析系统的所有功能；但是，如果您对 Java 软件分析感兴趣，您当然应该利用您在其他 64 位工作站上的其他 Java 9 软件开发项目，在空闲时间自行探索和试验分析器选项。


