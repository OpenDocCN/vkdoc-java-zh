  `createGameBoardNodes()` 之前，添加一行代码；这些对象将使用 `createMaterials()` 方法体中创建的着色器。输入 `createMaterials()`
  和一个分号来调用这个尚不存在的方法；然后使用 `Alt+Enter` 组合键，选择“在 `javafxgame.JavaFXGame` 中添加 `createMaterials()`
  方法”选项。同时，将 `PhongMaterial` 的名称改为 `Shader1`。我们可以在此方法体中为前 20 个着色器命名，并在类顶部（我已预先声明了名为
  `diffuse1` 到 `diffuse20` 的 `Image` 对象以及 `Shader1` 到 `Shader20`）进行相应声明，以应对即将编写的代码。剪切并粘贴
  `PhongMaterial` 代码到 `createMaterials()` 中，并删除镜面反射属性。代码应如图 14-13 所示，内容如下：


