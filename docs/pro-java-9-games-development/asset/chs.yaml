  ### 在 PhongMaterial 中使用纹理贴图：着色器特效


  在 JavaFX 中使用图像对象的第一步，是在类顶部将图像对象的名称添加到图像对象复合声明语句中。我将根据图像对象将要使用的属性来命名它们。接下来，由于我们有一个
  loadImageAssets() 方法，我们将添加四个图像实例化语句，这些语句引用包含纹理映射数据的 PNG 文件。Java 代码如图 13-12 所示，应如下所示：


  ![A336284_1_En_13_Fig12_HTML.jpg](img/A336284_1_En_13_Fig12_HTML.jpg)


  图 13-12.


  声明并实例化图像对象，以保存漫反射、高光、自发光或凹凸贴图的纹理映射数据


  ```

  Image diffuseMap, specularMap, glowMap, bumpMap // 加上其他已在使用的图像对象

  ...

  diffuseMap = new Image("/beachball5color256px", 256, 256, true, true, true);

  specularMap = new Image("/beachball3grayscale256px", 256, 256, true, true, true);

  glowMap = new Image("/beachball2grayscale256px", 256, 256, true, true, true);

  bumpMap = new Image("/beachball3grayscale256px", 256, 256, true, true, true);

  ```


  接下来，进入 createBoardGameNodes() 方法，将漫反射和高光颜色设置改为 Color.WHITE 值，并在 phongMaterial 对象上添加
  setDiffuseMap(diffuseMap) 方法调用。漫反射颜色纹理贴图语句的 Java 代码（在图 13-13 中以蓝色高亮显示）应如下所示：


  ![A336284_1_En_13_Fig13_HTML.jpg](img/A336284_1_En_13_Fig13_HTML.jpg)


  图 13-13.


  向着色器管线添加 diffuseMap 以增加表面颜色，并将高光和漫反射颜色设置为白色


  ```

  phongMaterial = new PhongMaterial(Color.WHITE);

  phongMaterial.setSpecularColor(Color.WHITE);

  phongMaterial.setSpecularPower(20);

  phongMaterial.setDiffuseMap(diffuseMap);

  ```


  接下来，使用运行 ➤ 项目工作流程，再次查看你的图元。如图 13-14 所示，你的图元表面现在正使用漫反射贴图来控制其表面着色，而球体 3D 图元现在看起来像一个沙滩球。


  ![A336284_1_En_13_Fig14_HTML.jpg](img/A336284_1_En_13_Fig14_HTML.jpg)


  图 13-14.


  漫反射颜色纹理贴图现在正在绘制图元表面，将球体变成了沙滩球


  接下来，让我们将球体图元旋转 25 度，使黄色和白色条纹的分界线出现在高光区域中，我们在之前的代码中已将其恢复为默认设置 20。


  我们将使用 beachball3grayscale256px.png 图像资源；它有八个条纹，其中四个是 100% 开启（白色），两个是 75% 开启（25%
  灰度），两个是 50% 开启（半功率，即 50% 灰度）。这样做会“减弱”或降低沙滩球白色部分的高光耀斑，因为高光贴图定义了高光效果（光泽度）的强度或量。


  我们将保留 phongMaterial 上的 setDiffuseMap(diffuseMap) 方法调用，因为在本章中，我们正试图构建一个高级着色器渲染管线，将
  PhongMaterial 类推向专业着色器效果创建管线的极限，就像我们在 3D 软件中所做的那样，但仅使用 JavaFX API 和 Java 9 语句。


  因此，在 setDiffuseMap() 方法调用之后，我们将添加一行 Java 代码，在 phongMaterial 对象上调用 setSpecularMap()，然后传入
  specularMap 图像对象，该对象已在 loadImageAssets() 方法中设置为 beachball3grayscale256px.png 图像资源，如图
  13-12 所示。这一切将通过使用以下 Java 语句完成，这些语句在图 13-15 底部高亮显示：


  ![A336284_1_En_13_Fig15_HTML.jpg](img/A336284_1_En_13_Fig15_HTML.jpg)


  图 13-15.




  向着色器管线添加高光贴图（SpecularMap）图像引用，以控制镜面高光强度


  ```

  phongMaterial = new PhongMaterial(Color.WHITE);

  phongMaterial.setSpecularColor(Color.WHITE);

  phongMaterial.setSpecularPower(20);

  phongMaterial.setDiffuseMap(diffuseMap);

  phongMaterial.setSpecularMap(specularMap);

  sphere = new Sphere(100, 24);

  sphere.setRotationAxis(Rotate.Y_AXIS);

  sphere.setRotate(25);

  sphere.setMaterial(phongMaterial);

  ```


  现在再次使用“运行 ➤ 项目”工作流程，将此着色器管线渲染到你的 3D 场景中。如图 13-16 所示，球体图元上的镜面高光似乎在黄色和白色之间的分界线处被截断。这是由于高光贴图（降低了纹理贴图交替区域的镜面高光强度）造成的。在圆柱体图元上也能看到这种现象。你可能已经注意到，我将摄像机对象到场景中心的距离从
  250 个单位减少到了 100 个单位，以便放大视图，同时我也增大了 3D 图元的尺寸，这样我们就能更清晰地看到纹理映射效果。


  ![A336284_1_En_13_Fig16_HTML.jpg](img/A336284_1_En_13_Fig16_HTML.jpg)


  图 13-16.


  曲面球体和柱体对象上的镜面高光在彩色区域现在变得更亮


  接下来，让我们将球体图元旋转回 5 度，使黄色部分位于镜面高光的中心，两侧为白色条纹。这将更准确地展示自发光贴图的能力。


  我们将使用 `beachball2grayscale256px.png` 图像资源，它包含八条条纹。其中四条为 100% 开启（白色），另外四条为 100% 关闭（黑色），这几乎是效果处理纹理映射中能达到的极端情况，因为这相当于完全应用（白色或全部为
  255 值）或不应用（黑色或零值）。


  这种自发光贴图（在 3D 软件中通常称为发光贴图）的作用是将 3D 图元上映射为白色的部分像光源一样点亮，而黑色区域则不会被照亮，并会使用现有的纹理贴图管线。灰度值越高，添加的光线越多，因此
  25% 的灰度将模拟 25% 的照明强度（25% 的光照强度）。我们将保留 `phongMaterial` 上的 `setDiffuseMap()` 和 `setSpecularMap()`
  方法调用，因为我们正尝试构建一个高级着色器渲染管线，并将 `PhongMaterial` 类推向专业着色器效果创建管线的极限，就像在 3D 软件中一样，但仅使用
  JavaFX API 和 Java 9 语句。


  因此，在 `setSpecularMap()` 方法调用之后，我们将在 `phongMaterial` 对象上调用 `setSelfIlluminationMap(glowMap)`
  方法，并传入 `glowMap` 图像对象，该对象设置为在 `loadImageAssets()` 方法中实例化的 `beachball2grayscale256px.png`
  图像资源，如图 13-12 所示。这一切将通过以下 Java 语句完成，这些语句在图 13-17 底部以黄色和浅蓝色高亮显示：


  ![A336284_1_En_13_Fig17_HTML.jpg](img/A336284_1_En_13_Fig17_HTML.jpg)


  图 13-17.


  向着色器管线添加自发光贴图（SelfIlluminationMap）图像引用，以控制自发光强度


  ```

  phongMaterial = new PhongMaterial(Color.WHITE);

  phongMaterial.setSpecularColor(Color.WHITE);

  phongMaterial.setSpecularPower(20);

  phongMaterial.setDiffuseMap(diffuseMap);

  phongMaterial.setSpecularMap(specularMap);

  phongMaterial.setSelfIlluminationMap(glowMap);

  sphere = new Sphere(100, 24);

  sphere.setRotationAxis(Rotate.Y_AXIS);

  sphere.setRotate(5);

  sphere.setMaterial(phongMaterial);

  ```


  图 13-18 展示了在所有三个图元上应用自发光贴图后的“运行 ➤ 项目”Java 代码测试工作流程。白色区域已变成光源，而彩色区域仍显示漫反射和高光映射特性。`selfIlluminationMap`
  属性代码中的抗锯齿算法部分似乎存在一些问题，正如你在球体图元的边缘所看到的那样。


  ![A336284_1_En_13_Fig18_HTML.jpg](img/A336284_1_En_13_Fig18_HTML.jpg)


  图 13-18.


  自发光贴图将 3D 图元上的白色区域变成光源，而彩色区域保持不变


  接下来，让我们看看如何利用目前所学知识，在 GIMP 2.8.22 中创建一些着色器的纹理贴图组件，以便用于我们将在第 14 章中创建的 `gameBoard`
  组节点层级结构，届时我们将开始使用 Java 9 中的 JavaFX 9 API 构建我们的 i3D 游戏。


  ## 游戏板纹理化：创建游戏板方块


  理解抽象的 `Mesh` 超类及其与 `TriangleMesh` 子类（可用于“手写”复杂的网格对象）的关系，以及它与 `MeshView` 类（实际上是 `Shape3D`
  的子类，而非 `Mesh` 的子类！）的关系，这一点非常重要。这样 `MeshView` 才能继承（扩展）`Shape3D` 的 `cullFace`、`drawMode`
  和 `material` 属性，而这些属性对于使网格对象逼真（尤其是材质属性和 `Material` 类）至关重要。正如你将看到的，`MeshView` 构造函数接受一个
  `Mesh` 对象，因此这是复杂 3D 对象所基于的核心类（算法）；因此，`Mesh` 和 `MeshView` 是专业 Java 9 游戏开发中使用的关键类。如果出于某种原因，你想编写复杂的多边形几何体（也称为“三角形网格”，这不是最佳工作流程），你可以使用
  `TriangleMesh`，我们将在后面详细讨论。


  更好的工作流程是使用外部 3D 软件包，将你的 3D 对象直接“导入”到 `Mesh` 对象中，然后由 `MeshView` 对象引用。我们将用整整一章来介绍如何使用这些
  JavaFX 类“建模”一个 3D 游戏，这样你就不必导入任何“数据量大”的网格对象。导入 3D 资源可以是一种更快地让高级 i3D 游戏快速高效运行的方法，也是一种将专业工匠引入
  i3D 游戏开发工作流程的方法。




