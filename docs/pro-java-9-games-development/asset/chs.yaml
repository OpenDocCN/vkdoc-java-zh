  48000 Hz，因此我还创建了 16000 Hz（1/3）和 8000 Hz（1/6）的中等和低质量 16 位版本，大小分别为 526KB、176KB 和 88KB。这使得
  CD 质量的声音约为 1MB，而高质量声音约为半兆字节。


