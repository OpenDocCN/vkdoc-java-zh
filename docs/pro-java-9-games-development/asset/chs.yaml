  ### JavaFX Image 类：在设计中引用数字图像


  Image 类是一个公共类，直接继承自 java.lang.Object 主类，这意味着 Image 类也是通过“从零编码”来实现图像加载（引用）和缩放（调整大小）的。你可以锁定缩放时的宽高比，并指定缩放（算法）质量。所有
  `java.net.URL` 类支持的 URL 格式均受支持。这意味着你可以从互联网（[`www.domainname.com/imagename.png`](http://www.domainname.com/imagename.png)）、操作系统文件系统（`file:imagename.png`）或通过正斜杠字符（/imagename.png）从
  JAR 文件中加载图像。


  JavaFX Image 类是 javafx.scene.image 包的一部分。JavaFX Image 类的类层次结构源自 java.lang.Object
  主类，并使用以下 Java 类层次结构：


  ```

  java.lang.Object

  > javafx.scene.image.Image

  ```


  Image 类提供了六种不同的（重载的）Image() 构造方法。这些方法可以接受从简单的 URL 到一组参数值（指定 URL、宽度、高度、宽高比锁定、平滑处理和预加载选项）的各种输入。这些参数在构造方法中应按此顺序指定。稍后当你使用这些构造方法中最复杂的一个来编写
  Image() 构造方法时，就会看到这一点，其格式如下：


  ```

  Image(String url, double requestedWidth, double requestedHeight,

  boolean preserveRatio, boolean smooth, boolean backgroundLoading)

  ```


  Image 对象最简单的构造方法仅指定 URL，格式如下：


  ```

  Image(String url)

  ```


  如果你希望加载图像，同时让构造方法使用最高质量的重采样（平滑像素缩放）将图像缩放到不同的宽度和高度（通常为了更高质量而缩小），并锁定（保留）宽高比，则应使用以下
  Image 对象构造方法格式：


  ```

  Image(String url, double scaleWidth, double scaleHeight, boolean preserveAspect,
  boolean smooth)

  ```


  如果你希望以图像的“原始”或“物理”（默认）分辨率和原始宽高比加载图像，并在后台（异步）加载，则应使用以下 Image() 构造方法格式：


  ```

  Image(String url, boolean backgroundLoading)

  ```


  还有两种 Image() 构造方法使用了 java.io.InputStream 类。该类为 Image() 构造方法提供了一个更低级别的 Java 输入数据流。通常，你会使用
  URL 来引用数字图像文件。这两种 Image 对象构造方法的格式如下。简单格式如下：


  ```

  Image(InputStream is)

  ```


  复杂的 InputStream 构造方法允许你指定宽度、高度、宽高比锁定和图像缩放插值平滑算法（开启/true 或关闭/false）。第二种格式如下所示：


  ```

  Image(InputStream is, double newWidth, double newHeight, boolean preserveAspect,
  boolean smooth)

  ```


  因此，Image 类（对象）用于准备数字图像资源以供使用，即从 URL 读取其数据，必要时调整其大小（使用你喜欢的任何平滑处理和宽高比锁定），甚至在应用程序中其他操作进行的同时异步加载它。需要注意的是，Image
  类（或对象）并不显示你的图像资源；它只是加载图像，如果需要则进行缩放，并将其放入系统内存中，以便在你的应用程序中使用。


  要显示 Image 对象，你需要使用第二个类（对象），称为 ImageView，我们将在本章下一节中介绍它。这个 ImageView 对象在场景图中实现为一个叶节点，它引用然后“绘制”你的
  Image 对象数据到包含此 ImageView 节点的布局容器上。在我们的例子中，这是叶节点 ImageView 上方的 uiLayout StackPane
  父节点（或分支节点）。


  从数字图像合成的角度来看，StackPane 类（对象）是图层合成引擎，或者可以说是图层管理器，而 ImageView 对象则代表图层堆栈中的一个数字图像图层。Image
  对象包含显示在 ImageView 图层内部（或根据需要显示在多个 ImageView 中）的数字图像数据，因为 Image 对象和 ImageView 对象是解耦的，因此彼此独立存在。我正试图尽量减少场景图节点的使用，因此我使用一个
  ImageView 图像面板和一个文本信息合成面板来创建用户界面屏幕，然后通过代码在它们之间进行切换。




  ### JavaFX ImageView 类：在设计中显示数字图像


  ImageView 类是一个公共类，它直接继承自 `javafx.scene.Node` 超类，而后者又是 `java.lang.Object` 主类的扩展。因此，ImageView
  对象是 JavaFX 场景图中一种 Node 对象，用于利用 Image 对象中包含的数据来绘制图形视口。该类提供了允许图像重采样（调整大小）的方法，并且与 Image
  类一样，你可以锁定缩放时的宽高比，以及指定重采样算法（通过使用像素插值来实现平滑质量）。


  正如你在 Java 代码的第 24 行所见（如图 8-6 所示），你将使用一个名为 `boardGameBackPlate` 的 ImageView 对象来显示你的
  Image 对象数据。这个 ImageView 类，与你的 Image 类一样，也包含在 `javafx.scene.image` 包中。ImageView 类的
  Java 类层次结构始于 `java.lang.Object` 主类，并使用该类创建 `javafx.scene.Node` 类，然后使用后者创建 `javafx.scene.image.ImageView`
  Node 子类。ImageView 类使用以下 Java 类继承层次结构：


  ```

  java.lang.Object

  > javafx.scene.Node

  > javafx.scene.image.ImageView

  ```


  ImageView 类提供了三种不同的（重载的）`ImageView()` 构造方法。这些方法包括：空的 ImageView 构造方法（即你稍后将在代码中使用的方法）、一个接受
  Image 对象作为参数的方法，以及一个接受 URL 字符串对象作为参数并自动创建 Image 对象的方法。最简单的、参数列表为空的 `ImageView()`
  构造方法将创建一个（空的）ImageView 对象（即，一个没有要显示的 Image 对象，但可以容纳 Image 对象的对象）。它将使用以下格式：


  ```

  ImageView()

  ```


  我们将使用这个构造方法，以便我可以向你展示如何使用 `.setImage()` 方法调用将你的 Image 对象加载到 ImageView 对象中。如果你想避免使用
  `.setImage()` 方法调用，你可以使用另一个重载的构造方法。那个 ImageView 对象构造方法将使用以下格式：


  ```

  ImageView(Image image)

  ```


  因此，我将显式设置 ImageView 并将其连接到 Image 对象的方式如下所示：


  ```

  boardGameBackPlate = new ImageView();      // 这使用了空的构造方法方式

  boardGameBackPlate.setImage(splashScreen);

  ```


  这可以使用重载的构造方法压缩成一行代码，结构如下：


  ```

  boardGameBackPlate = new ImageView(splashScreen);  // 使用重载的构造方法

  ```


  如果你还想跳过创建和加载 Image 对象的过程，还有另一个构造方法可以做到这一点，它使用以下格式：


  ```

  ImageView(String url)

  ```


  如果你想使用图像的“原生”或“物理”（默认）分辨率和原生宽高比加载图像，并在后台（异步）加载它，`Image()` 构造方法将使用以下格式：


  ```

  backPlate = new Image("/backplate8.png", 1280, 640, true, false, true);

  boardGameBackplate = new ImageView();

  boardGameBackplate.setImage(backPlate); // 使用空的 ImageView 构造方法方式

  ```


  如果你不想指定图像尺寸、后台图像加载或平滑缩放，并且你想锁定任何缩放时的宽高比，你可以将前面的三行 Java 代码压缩成下面这一个构造方法：


  ```

  boardGameBackPlate = new ImageView("/backplate8.png");   // 使用第三种构造方法

  ```


  至少在学习阶段，为了教学目的，我将采用较长的做法，并且我将始终“显式地”使用 `Image()` 构造方法加载 Image 对象，以便我们可以指定所有不同的属性，并且让你看到你在
  Java 9 编程逻辑中使用的所有不同图像资源。我在这里向你展示快捷代码，是因为如果你以后开始将 ImageView 用作 2D 精灵，你可能会想使用这种快捷方式。你可以将这种快捷方式用于你的精灵，因为你不会对它们进行缩放，而且它们经过了高度优化，因此可以节省长时间加载的后台加载选项将不再是必需的。




  ### JavaFX TextFlow 类：在设计中运用文本对象（内容）


  TextFlow 类是一个公共类，允许开发者创建文本段落。文本段落是一个多行文本的容器，每一行文本都使用“换行”字符进行分隔，在 Java 代码中用“转义 n”序列表示。


  因此，TextFlow 类使用以下 Java 类继承层次结构：


  ```

  java.lang.Object

  > javafx.scene.Node

  > javafx.scene.Parent

  > javafx.scene.layout.Region

  > javafx.scene.layout.Pane

  > javafx.scene.text.TextFlow

  ```


  TextFlow 对象是 JavaFX 场景图（Scene Graph）中的一种 Node 对象，可用于使用 Text 对象中包含的数据来渲染文本段落，其方式与
  ImageView 可以渲染 Image 对象中包含的数据非常相似。然而，TextFlow 可以同时处理多个 Text 对象，允许你通过调用 `.setFill()`
  和 `.setFont()` 等方法，对不同的 Text 对象应用不同的样式。TextFlow 是一个专门的文本布局类，旨在渲染通常所说的富文本格式（RTF）。有些人称之为桌面出版，它涉及使用不同的字体、样式或颜色来增强基于文本的内容的呈现效果。值得注意的是，`javafx.scene.text`
  位于 `javafx.graphics` 模块中，而不是 `javafx.controls` 模块中。这一点很重要，因为如果你想优化掉（不使用）JavaFX 9
  的 UI 控件类（100 个或更多类），你仍然可以使用 `javafx.base` 和 `javafx.graphics` 模块，通过 Image、ImageView、Text
  和 3D 几何对象来创建你自己的 UI 元素，这些模块为你提供了创建专业 Java 9 i3D 游戏所需的一切。


  TextFlow 对象可用于在单个 TextFlow 对象内布局多个 Text 节点。TextFlow 对象使用其内部每个 Text Node 对象的文本、字体和样式设置，以及其自身的最大宽度和文本对齐样式属性，来确定每个子
  Text 对象的渲染位置。


  由于 TextFlow 对象的自动换行功能，单个 Text 节点可以跨越多行，并且由于双向（bidi）重排序，Text 节点的视觉位置可能与逻辑位置不同。Java
  Bidi 对象提供了用于创建它的文本的双向重排序信息。例如，这对于正确显示从右到左（RTL）阅读（而非从左到右（LTR））的阿拉伯语或希伯来语文本是必需的。


  当然，除了 Text Node 对象之外的任何其他 Node 对象类型，都将在 TextFlow 对象的布局中被视为嵌入的“富内容”对象。它将使用其首选宽度、高度和基线偏移值插入到内容中，以便相对于父
  TextFlow 对象中的其他 Text 对象进行间距和对齐。


  当 Text Node 对象位于 TextFlow 对象内部时，其某些属性将被忽略。例如，Text Node 对象的 X 和 Y 属性将被忽略，因为子 Text
  Node 的位置由父 TextFlow 对象决定。同样，Text 节点中的自动换行宽度也将被忽略，因为用于自动换行的最大宽度将继承 TextFlow 对象的最大宽度属性。TextFlow
  布局的自动换行宽度将由 Region 对象的当前宽度决定。这可以通过你的应用程序设置 TextFlow 对象的首选宽度属性来指定。如果不需要自动换行功能，应用程序可以将首选宽度设置为
  `Double.MAX_VALUE`，或者设置为 `Region.USE_COMPUTED_SIZE`。段落应使用换行符或 `\n`（转义字符）在你的任何子 Text
  Node 对象内进行分隔，如下面的粗体代码示例所示。


  当 Text Node 对象在 TextFlow 对象中渲染时，其 `pickOnBounds` 属性的值将被设置为 `false`。这是因为单个 Text Node
  对象中的内容可能会被 TextFlow 算法分割，并由于换行和双向重排序而放置在 TextFlow 中的不同位置。TextFlow 算法将布局每个受管理的子 Text
  Node 对象，无论该子对象的可见性属性值如何，都会为设置为不可见的 Text Node 对象留出间隙。以下是 TextFlow 对象创建工作流程的示例：


  ```

  Text titleText = new Text("欢迎来到 iTVboardgame！ \n");

  titleText.setFill(Color.RED).setFont(Font.font("Helvetica", FontPosture.ITALIC,
  40));

  Text pressPlayText = new Text("按下开始游戏按钮开始！");

  pressPlayText.setFill(Color.BLUE).setFont(Font.font("Helvetica", FontWeight.BOLD,
  10));

  TextFlow gameTextFlow = new TextFlow(titleText, pressPlayText);

  ```


  TextFlow 类有两个属性：`DoubleProperty lineSpacing` 属性，它定义了文本行之间的垂直间距（以像素为单位）；以及 `ObjectProperty<TextAlignment>
  textAlignment` 属性，它定义了水平文本对齐常量，例如 `LEFT`、`RIGHT`、`CENTER` 或 `JUSTIFY`。


  TextFlow 类有两个构造方法；第一个构造方法有一个空的参数区域，并构造一个空的 TextFlow 文本布局对象。此构造方法使用以下格式：


  ```

  TextFlow()

  ```


  第二个 TextFlow 构造方法（之前使用过）创建一个 TextFlow，其中包含使用逗号分隔列表传递到参数区域中的子 Text（或富媒体）Node 对象，使用以下格式：


  ```

  TextFlow(Node... children)

  ```


  第二个构造方法之所以接受一个 Node 对象的参数列表数组，是因为 TextFlow 对象支持“富文本布局”，即 Text 对象与其他支持富媒体（图像、形状、几何体、网格、动画、视频等）的受支持
  Node 对象的组合。


