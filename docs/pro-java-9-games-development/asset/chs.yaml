  Jenkins 页面的左上方是 Jenkins 软件孵化器功能导航链接，你可以通过它们返回仪表板（主页）、查看开发状态、查看构建之间的变更、查看依赖关系图、获取构建时间责任报告、查看
  GIT 轮询日志、获取嵌入式构建状态、查看测试结果分析器、跳过构建以及打开 Blue Ocean。Blue Ocean 是一个免费、开源、持续更新的实用工具，它能让你感觉自己就是软件开发团队的一员。


  其下方是构建历史记录。这是一个包含构建任务的窗格，会显示构建进度条、构建时间和完成预估。如果你点击其中一个构建任务（如果已完成），它会打开另一个窗口（浏览器标签页），其中包含该构建的详细信息和一个下载链接。如图
