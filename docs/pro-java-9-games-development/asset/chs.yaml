  Java 9 编程语言是当今世界上最流行的面向对象编程（OOP）语言。Java 运行在从智能手表到超高清智能手机、触摸屏平板电脑、电子书阅读器、游戏主机、智能眼镜、超高清（UHD）4K
  交互式电视机（或 iTV 设备）等消费电子设备上，并且越来越多的消费电子设备类型——例如汽车、家用电器、医疗保健、数字标牌、安防、家庭自动化市场、VR/AR 等领域中的设备——正逐渐采用这一开源的
  Java 9 平台，以在其硬件设备中驱动 i3D 数字媒体体验。


  由于全球有数十亿用户拥有数十亿台兼容 Java 9 的消费电子设备，因此，如果你拥有正确的游戏概念、美术作品、数字媒体资源、游戏设计和优化流程，为所有这些用户开发流行的
  Pro Java 9 游戏无疑是一项利润极其丰厚的任务。


  Java 9（及其多媒体引擎 JavaFX 9）代码几乎可以在所有主流操作系统上运行，包括 Windows 7、8.1 和 10、Linux 发行版（如 Ubuntu
  LTS 18 或 Fedora）、32 位 Android 1-4 和 64 位 Android 5-8、Open Solaris、Macintosh OS/X、iOS、Symbian
  以及 Raspberry Pi。其他任何流行的操作系统增加对这门流行开源编程语言的支持，都只是时间问题。此外，每个流行的互联网浏览器都具备 Java 能力。Java
  在软件安装方面提供了终极灵活性，既可以作为应用程序安装，也可以在浏览器中作为小程序运行。你甚至可以将 Java 应用程序直接从浏览器拖出，并使其自动安装到用户的桌面上。Java
  9 从各方面来看都是一项真正卓越的技术。


  目前，Java 9 和 JavaFX 9 拥有大量的嵌入式及桌面硬件支持级别，包括完整的 Java SE 9、Java SE 9 Embedded、Java ME（微型版）9
  和 Java ME 9 Embedded，以及用于企业应用开发的 Java EE 9。


  这就是所谓的“一次编码，随处部署！”这是每个程序员的梦想，而 Oracle（Java）和 Apache（NetBeans 9）正通过强大的 JavaFX 9 多媒体编程平台将其变为现实。本书将极大地帮助你学习如何使用
  Java 编程语言结合 JavaFX 9 多媒体引擎来开发 Java 9 游戏。这些 Java 9 游戏应用将能够在大量兼容 Java 的消费电子设备上运行。开发能够在所有这些不同类型的消费电子设备上流畅运行
  i3D 的 Java 9 游戏应用，需要一套非常特定的工作流程，包括游戏资源设计、游戏代码设计、UI 设计以及数据占用空间优化——所有这些内容都将在本《Pro
  Java 9》一书中涵盖。


  我完全基于一个我正在实际开发、并计划于 2017 年某个时候向公众发布的真实交互式 3D（i3D）游戏项目，从零开始撰写了《Pro Java 9 游戏开发》一书。我的目标读者是那些希望成为
  i3D 游戏开发者，但尚未使用 JavaFX 9 进行过 Java 9 编程的人。这些读者技术娴熟，但对 Java 9 面向对象计算机编程概念和技术，或对 i3D
  游戏开发并不完全熟悉。由于 Java 9 已于 2017 年 9 月 22 日向公众发布，本书将比市面上许多其他 Java 书籍更为深入。Java 9 增加了一些非常高级的特性，例如更安全的模块系统和
  JavaFX 9 API。这赋予了 Java 9 自身一个支持 SVG、2D、3D、音频或视频媒体的交互式 3D 数字媒体引擎。


  我设计本书的目的是提供对最佳 Java 9 游戏开发工作流程的全面概述。大多数专业的 Java 9 应用开发书籍只涵盖语言本身；然而，如果你真的想成为你渴望成为的那位知名
  Java 9 游戏或物联网应用开发者，你必须理解并掌握游戏设计的各个领域，包括数字媒体资源创建、用户界面设计、Java 9 编程、JavaFX 9 类使用、数据占用空间优化，以及内存和
  CPU 使用优化。


  一旦你掌握了这些领域，希望到本书结束时，你将能够创造出令人难忘的用户体验，这是打造流行、畅销的 Java 9 游戏所必需的。你能做到，我知道你可以！




  Java 9 游戏不仅可以使用 NetBeans 9 集成开发环境（IDE）进行开发，还可以结合 JavaFX 9 以及其他多种不同类型的新媒体内容开发软件包（目前已有十几种，且均为开源软件）来开发。因此，本书涵盖了多种其他流行开源软件包的安装与使用，例如
  GIMP 2.9.7 和 Audacity 2.1.3，并结合使用 NetBeans 9.0 IDE 和 JavaFX 9 新媒体游戏引擎来开发 Java 9
  游戏应用程序，这为 Java 9 编程语言带来了“惊艳效果”。


  我之所以这样架构本书，是为了让你能够精确地确定如何使用新媒体内容开发软件，使其融入整个《Pro Java 9 游戏开发》的工作流程。这种全面的方法将使这本独特的书在目前市场上所有其他
  Java 9 游戏应用程序开发书籍中脱颖而出。本书从第一章开始，介绍如何下载和安装最新的 Java JDK 以及 NetBeans 9 IDE，同时还包括十几个开源内容开发应用程序。


  在第二章中，你将学习 JavaFX 9 中 2D 和 i2D 功能的新媒体概念；在第三章中，你将学习 JavaFX 9 中 3D 和 i3D 功能更高级的 3D
  新媒体概念。在第四章中，我们将介绍 JavaFX 的游戏设计概念。


  在第五章中，你将学习 Java 9 编程语言的基础知识，并在本书的剩余部分中运用这些知识来创建一个 Java 9 游戏。在第六章中，你将了解 NetBeans
  9，创建你的第一个 JavaFX 9 游戏应用程序，并了解一些有用的 NetBeans 9 功能，例如代码补全和代码分析。


  在第七章中，你将全面了解 JavaFX 9 新媒体引擎（JavaFX API），以及它令人印象深刻的功能如何将你的《Pro Java 9 游戏开发》提升到一个新的高度。因此，本书的前三分之一是“基础”材料，你需要理解这些材料，才能明白
  NetBeans 9.0、Java 9、JavaFX 9.0 以及 JavaFX 9 游戏引擎支持的各种新媒体类型和资源如何作为一个平台协同工作。


  在第八章中，你将全面了解 JavaFX 9 场景图，以及如何使用其层次结构开始设计 Java 9 游戏的第一个 i2D 部分，即顶层启动画面及其用户界面设计。从这里开始，我们将更积极地编写
  Java 9 和 JavaFX 9 API 的代码。


  在第九章中，你将学习用户界面设计，包括使用数字图像资源和文本资源。我们将介绍的主要 JavaFX 类包括 `Image` 类、`ImageView` 类和 `TextFlow`
  类。我们将研究在创建启动画面以及游戏信息覆盖层（例如游戏玩法说明、法律免责声明、内容制作人员名单）时的数字图像合成管线，以及如何开始游戏以移除启动画面。


  在第十章中，我们将学习 JavaFX 事件处理引擎，它将处理你将来在创建自己的自定义专业 Java 9 游戏时可能用到的所有不同类型的动作、按键、鼠标和拖拽事件。在本章中，我们将在
  Java 9 中实现事件处理，使上一章中创建的用户界面和启动画面具有交互性。


  在第十一章中，我们将开始为 i3D 棋盘游戏编写主要的 i3D 游戏场景图。在本章中，你将了解核心 `javafx.scene` 包中包含的不同类型的 JavaFX
  9 `Camera` 和 `LightBase` 子类，而该包（自 Java 9 起）又包含在 `javafx.graphics` 模块中。我们将介绍 `PerspectiveCamera`，因为你将使用它来构建基本的
  3D 场景基础设施（我们将在本章中创建），同时还会介绍 `ParallelCamera`，这是另一个更适合 2D 或 2.5D 游戏开发管线的 `Camera`
  子类。我们还将学习 `LightBase` 抽象超类及其两个核心光照子类：`AmbientLight` 和 `PointLight`。


  在第十二章中，你将学习 JavaFX API 中的 3D 建模类。你将了解 `javafx.scene.shape` 包中包含的不同 JavaFX 9 3D 模型类。你将介绍
  `Sphere`，它可用于创建球体图元，并且你在第十一章中已经用它来测试你的 3D 场景设置。我们还将研究另外两个图元类：`Box` 和 `Cylinder`，它们也可用于创建你的平面和圆盘图元。这些图元基于
  `Shape3D` 超类，我们将首先研究这个超类。我们还将研究更高级的 `TriangleMesh` 类，它允许你构建基于多边形的网格对象，最后，研究 `Mesh`
  和 `MeshView` 类层次结构，它们允许你渲染 3D 网格对象。


  在第十三章中，你将学习包含在 `javafx.scene.paint` 包中的 JavaFX 9 3D 着色器类层次结构。在 Java 9 和 Android
  8 中，`Paint` 类将像素颜色和属性应用于画布，在这里，则是应用于你的 JavaFX 9 i3D 图元的表面。`paint` 包包含与这种“蒙皮”或“纹理映射”3D
  对象着色目标相关的类。你将介绍 `Material`（一个包含顶级着色器定义的超类）和 `PhongMaterial` 类，该类可用于为你的游戏中的 i3D 图元创建纹理贴图或“皮肤”，这些内容已在第十二章中介绍过。


  在第十四章中，你将使用 JavaFX 9 场景图层次结构和 JavaFX 3D 图元为你的游戏创建一个高级 i3D 对象。在本章中，你将构建场景图的 `gameBoard`
  组分支，该分支位于场景图根节点下，紧邻我们已在第九章中构建的 `SplashScreen`（UI）分支。在你的 `gameBoard` 组分支下，我们将把你的
  i3D 游戏板分割成四个象限，这样游戏板的中间可以有四个更大的 300x300 单位区域，供我们进行游戏。四个游戏象限中的每一个都将有另外 5 个（共 20 个）周边游戏板方格作为子对象。


  在第十五章中，我们将使用 JavaFX 中的 i3D 图元为你的 i3D 场景创建 i3D UI 元素，并解决我们在第十四章中看到的一些 3D 面渲染异常问题。我们将创建的
  i3D UI 元素将旋转游戏板，以选择一个象限主题进行游戏。


  在第十六章中，我们将详细研究 JavaFX 9（抽象）`Animation` 和 `Transition` 超类，以及所有强大的属性过渡子类，你可以在你的 i3D
  棋盘游戏中将它们实现为不同类型的 `Animation` 对象。动画为任何游戏增添了专业感，因为运动，尤其是在 3D 游戏中，为用户体验增加了大量的真实感。


  在第十七章中，我们将仔细研究公共 `PickResult` 类和公共 `MouseEvent` 类，并在我们自定义的 `.createSceneProcessing()`
  方法中为我们的游戏玩法设计使用它们，该方法将用于处理玩家对 i3D 游戏元素（`Box` 或 `Sphere` 对象）的选择（更多事件处理编码），以便我们的玩家能够与他们的
  i3D 游戏组件进行交互。




  在第十八章中，我们将探讨创建交替纹理贴图的工作流程。这些贴图会在游戏过程中，通过更改图像对象资源引用，根据随机旋转和玩家的鼠标点击（或屏幕触摸）来为棋盘格子和象限添加内容。尽管这一章并未深入涉及
  Java 代码，但值得注意的是，开发专业的 Java 9 游戏需要数字图像工匠、数字音频工程师、3D 建模师、3D 纹理艺术家、动画师、2D 插画师以及 VFX
  艺术家，因此我们在本书中也需要涵盖一些非 Java 特定的主题。


  在第十九章（i3D 游戏 AI 章节）中，我们将创建两个新的 int（整数）变量：`spinDeg` 用于存储旋转角度，以及一个累加器（`total`），用于累加玩家已旋转的总角度；还有
  `quadrantLanding`，用于保存一个简单而强大计算的最新结果，该结果能始终告诉我们最新一次旋转落在了哪个象限。


  在第二十章中，我们将创建十几个 `.setupQSgameplay()` 方法。这些方法将包含设置每个棋盘格子下一关游戏玩法的 Java 代码，以便当玩家点击一个棋盘格子时，会调用一个方法来设置问答体验。


  在第二十一章中，我们将通过添加游戏逻辑中的问答部分，来完成 `.setupQSgameplay()` 方法的编码。我们还将研究 JavaFX 的 `AudioClip`
  类，它允许我们添加数字音频音效。这将利用 JavaFX 9 API 的另一个新媒体组件（数字音频），进一步增强专业的 Java 9 游戏体验。


  在第二十二章中，我们将实现单人游戏玩法和计分引擎，以搭建好你的游戏计分用户界面，因为许多游戏玩家会希望与内容进行对抗式游戏，作为一种学习体验。话虽如此，每个按钮
  UI 元素仍需编写大量代码，这些代码会判断答案是否正确：如果正确，则增加“正确：”分数；如果不正确，则增加“错误：”分数。


  在第二十三章中，我们将完成向 `setupQSgameplay()` 方法填充与问题匹配的文本答案内容。我们还将完成 `createQAprocessing()`
  方法，该方法包含更新计分 UI 面板的答案计分代码。玩家将使用这些来选择正确答案，从而揭示该格子视觉元素所代表的内容，并对他们的答案进行计分。一旦我们完成了游戏玩法“答案显示、选择和计分”基础设施的大部分编码，并测试每个格子以确保其正常工作，我们就可以创建
  Java 代码的“防错”部分，以完成一款专业游戏，确保玩家正确使用它。这涉及到使用布尔变量（称为“标志”）来保存“点击”变量：一旦玩家点击了旋转器、棋盘格子或答案按钮元素，`elementClick`
  变量就会被设置为 `false`，这样游戏玩家就无法再次点击它，从而“欺骗”游戏代码。


  在第二十四章关于数据和内存占用优化的内容中，我们将把你的数字图像资源转换为使用 8 位（索引）颜色，而不是 24 位真彩色深度，用于你的纹理贴图。我们还将运行
  NetBeans Profiler，以查看你的 Java 9 代码在运行游戏时使用了多少内存和 CPU 处理能力。


  本书力求成为市场上最全面的 Pro Java 9 游戏应用开发编程书籍，涵盖了创建 i3D Java 9 游戏应用所需使用的大部分（如果不是全部）主要 Java
  9 和 JavaFX 9 类。


  如果你正在寻找关于 Java 9 游戏编程语言最全面、最新的概述，包括与新媒体内容开发工作流程无缝集成的 JavaFX 9.0 和 NetBeans 9.0 IDE，以及关于如何将这些技术与领先的开源新媒体游戏内容设计和开发工具结合使用的最佳实践（从入门到精通），那么这本书将真正引起你的极大兴趣。


  本书旨在将你从 Java 9 游戏应用开发的中级水平，提升到关于 Java 9、NetBeans 9 和 JavaFX 9 游戏应用开发的扎实专业知识水平。请注意，尽管本书表面上是一本专业书籍，但它包含了大量的新媒体技术知识。书中描述的所有工作流程可能需要阅读不止一两遍，才能将这些知识吸收到应用开发知识库中（纳入你的技术知识储备）。不过，请放心，这绝对值得你投入时间，所以请多读几遍。此外，Apress
  还出版了一本名为《Beginning Java 8 Games Development》的 Java 游戏开发入门书籍，涵盖了使用 JavaFX API 中不同类进行
  i2D 游戏开发的内容。


