  ## 特殊效果：javafx.scene.effects 包


  `javafx.scene.effect` 包包含一个用于所有 JavaFX 特殊效果的基础超类。毫不奇怪，它被称为 `Effect` 类。`Effect` 类有
  17 个已知的直接子类，用于 2D 数字图像合成效果，就像你在 GIMP 2.10 中能找到的那样，这些子类也包含在此包中。这些子类包括 `Blend`、`Bloom`、`BoxBlur`、`ColorAdjust`、`ColorInput`、`DisplacementMap`、`DropShadow`、`FloatMap`、`GaussianBlur`、`Glow`、`ImageInput`、`InnerShadow`、`Lighting`、`MotionBlur`、`PerspectiveTransform`、`Reflection`、`SepiaTone`
  和 `Shadow` 类。对于 2D，此包还包含 `Light` 超类以及 `Light.Distant`、`Light.Point` 和 `Light.Spot`
  子类，我们将在本书的 3D 部分中使用它们。


  让我们先介绍 JavaFX 的 `Effect` 超类。这个类是一个公共抽象类，继承自 `java.lang.Object` 主类。这意味着它是由 JavaFX
  开发团队从头开始创建的，专门用于在 JavaFX 中提供基于图像（基于像素）的特殊效果，并为 2D 和 3D 提供光照支持。所提供的效果与 GIMP 3 或 Photoshop
  在其各自的数字图像处理软件包中提供的效果非常相似。


  因此，JavaFX 的 `Effect` Java 类层次结构如下所示：


  ```

  java.lang.Object

  > javafx.scene.effect.Effect

  ```


  `Effect` 类为在 JavaFX 中创建所有特殊效果实现提供了一个抽象或“基础”类。JavaFX 中的 `Effect` 对象（及其子类）始终包含一个生成
  `Image` 对象的像素图形算法。这将是对源 `Image` 对象中像素的算法修改，并且适用于 2D 和 3D。


  `Effect` 对象也可以通过设置一个名为 `Node.effect` 的属性（即 `Node` 类或从 `Node` 子类创建的对象的 effect 属性）与场景图节点（而非
  `Image` 对象）关联。


  一些效果，例如 `ColorAdjust`，会改变源像素的颜色特性（色相、亮度和饱和度），而其他效果，例如 `Blend`，则会通过算法（通过 Porter-Duff）将多个图像组合在一起。


  `DisplacementMap` 和 `PerspectiveTransform` 特殊效果类会在 2D 空间中扭曲或移动源图像的像素，以模拟 3D 空间，通常称为“2.5D”或“等距”空间光学效果。


  所有 JavaFX 特殊效果都至少定义了一个输入。此外，此输入可以设置为另一个 `Effect` 对象，允许开发者将 `Effect` 对象链接在一起。这允许开发者组合效果结果，从而创建复合或混合特殊效果。此输入也可以保持“未指定”状态，在这种情况下，效果会将其算法应用于它所附加到的
  `Node` 对象的图形渲染（像素表示或渲染结果），该附加通过 `.setEffect()` 方法调用完成，或者应用于所提供的 `Image` 对象。


  需要注意的是，特殊效果处理是一个条件特性。`ConditionalFeature.EFFECT` 枚举类和常量将定义一组条件（受支持的）特殊效果特性。这些特性可能并非在所有操作系统或所有嵌入式平台上都可用，尽管“现代”消费电子设备通常可以使用其硬件
  GPU 图形处理能力来支持效果处理以及 i3D 渲染。


  如果你的专业 Java 游戏应用程序想要轮询硬件平台以确定任何特定效果特性是否可用，你可以使用 [Platform.isSupported](https://docs.oracle.com/javase/8/javafx/api/javafx/application/Platform.html#isSupported-javafx.application.ConditionalFeature-)
  () 方法调用来查询效果支持。如果你在不支持某个条件特性的平台上使用它，它不会引发异常。通常，该条件特性会被简单地忽略，这样你就不必编写任何特定的错误捕获或错误处理
  Java 代码。


  接下来，让我们看看如何在 UI 设计中实现一两个这样的特殊效果，并为 TextFlow 对象添加投影，以便通过增加对比度使其显示的文本更易读。之后，我们将研究如何在可见光谱范围内移动数字图像的颜色。




