- '# 24. 使用 NetBeans 优化游戏资源与代码，并进行游戏性能分析


  现在你的游戏已经可以运行，玩家们可以一次点击（回合）地进行游戏，我们可以看看它使用了多少内存，以及所有资源的大小。我们还可以探讨如何将数字音频和图像资源缩小两到四倍。首先使用
  GIMP 进行数据占用优化，然后使用 NetBeans 9 Profiler 对当前的 24 位图像资源和 CD 品质的 16 位 44.1KHz 音频资源进行分析。通过这种方式，我们可以判断这些高端多媒体资源是否占用了过多的内存和
  CPU 开销，或者我的开发系统能否很好地处理它们。我的开发系统是一台老旧的 4GB 内存、Win7 系统、四核 Acer 迷你塔式机（几年前花 300 美元从沃尔玛购买）。我一直在该系统上使用
  NetBeans 9 开发 Java 9，从未出过问题。当前的主流系统是六核或八核，配备 8MB 或 16MB 内存，因此 Java 9 开发在较老的系统上也能轻松完成，并不像
  Unity、Android 或 Lumberyard 等其他 i3D 平台那样需要尖端系统。


  在本章中，我们将把数字图像资源转换为使用 8 位（索引）颜色，而不是纹理贴图使用的 24 位“真彩色”，并运行 NetBeans Profiler 来查看运行游戏时
  Java 代码使用了多少内存和 CPU 处理能力。


  ## 优化纹理贴图：转换为 8 位颜色


  目前，源文件夹（`/src/`）中的数字图像资源大约为 24MB，即 24,000,000 字节，对于一个包含 120 张不同图像的 i3D 棋盘游戏来说，这实际上已经相当不错了（平均每张图像约
  200KB）。然而，如果我们能将其压缩到大约 10MB（每张图像 84KB），就能大大减小游戏发行包的大小。要将图像的“重量”或大小减少 300% 到 400%，方法是使用
  8 位颜色（索引颜色）以及“抖动”或点阵图案，来模拟超过索引图像最大 256 种颜色的更多色彩。中小型纹理贴图（正是我们用于游戏棋盘方格和象限的）非常适合使用索引颜色。原因在于，抖动效果在放大（近距离）时可见，但当图像从更远处观看（远距离或缩小）时，这种视觉效果就会消失。我将在本章的这一部分向你展示这一点，我们将把所有
  120 个图像资源从 24 位转换为 8 位索引颜色。


  ### 创建索引颜色纹理：在 GIMP 中更改颜色模式


  让我们优化图像资源，这样就不必对 Java 代码进行重大修改。为了保持 Java 代码不变，我们将使用相同的文件名，并将它们放在 `/src/` 下的一个名为
  `/8bit/` 的不同文件夹中。这样，我们将拥有指向索引颜色资源的 `/src/8bit/` 路径，以及指向 24 位高质量资源的 `/filename` 路径。使用你的操作系统文件管理工具，在当前包含原始真彩色图像资源的
  `/src` 文件夹下创建一个名为 `/8bit/` 的文件夹（目录）。图 24-1 显示了此新文件夹。


