  表 7-2 中的第一个包是 `javafx.animation` 包。由于动画对于 Java 游戏非常重要，我们将在本章的下一节中介绍它。我还将介绍 `javafx.geometry`
  和 `javafx.stage`，因为从表 7-2 来看，Java 9 游戏所需的核心包是 animation、application、geometry、scene
  和 stage。


  ### 用于游戏的 JavaFX 动画：使用 javafx.animation 类


  `javafx.animation` 包包含 `Animation` 超类以及 `Timeline`、`AnimationTimer`、`Interpolator`、`KeyFrame`
  和 `KeyValue` 类。它还包含 `Transition` 超类和十个 transition 子类，我们将在本章的这一部分中介绍所有这些类，因为动画是专业
  Java 9 游戏开发的重要设计元素。由于这些动画类已经为我们编写好了，这要归功于 JavaFX 9 API，我们为游戏添加动画所需要做的就是正确使用这些类。您将花费大量时间与这些类打交道，因此我将详细介绍每一个类，以便您了解每个类的工作原理、哪些类可以协同工作，以及实现您自己的
  Java 9 游戏逻辑解决方案需要哪些类。




  #### JavaFX 动画类：JavaFX 中动画对象的基础


  Animation 类，或者更准确地说 Animation 对象，为 JavaFX 中的动画提供了核心功能。Animation 类包含两个（重载的）Animation()
  构造方法。它们包括 `Animation()` 和 `Animation(double targetFramerate)`，它们会在内存中创建 Animation
  对象，该对象将从包含其他子对象的高层对象出发，控制你的动画及其播放特性和生命周期。


  Animation 类包含 .play() 方法、.playFrom(cuePoint) 或 .playFrom(Duration time) 方法，以及 .playFromStart()
  方法。这些方法用于启动 Animation 对象的播放。此外，还有 .pause() 方法，可以暂停动画播放，以及 .stop() 方法，可以停止动画播放。还有
  .jumpTo(Duration time) 和 .jumpTo(cuePoint) 方法，用于跳转到动画中的预定义位置。


  你可以通过使用 rate 属性来设置动画播放速度（有些人称之为帧率或 FPS）。cycleCount 属性（变量）允许你指定动画循环的次数，而 delay 属性允许你指定动画开始前的延迟时间。如果你的动画是循环播放的，这个
  delay 属性将指定循环之间的延迟时间，这可以用来创建一些逼真的效果。


  你可以通过将 cycleCount 属性或特性（变量）设置为 INDEFINITE，然后使用 autoReverse 属性（设置为 false）来指定无缝动画循环，或者通过为
  autoReverse 属性指定 true 值来使用乒乓（来回）动画循环。如果你希望动画只播放一次而不无限循环，你也可以将 cycleCount 设置为一个数值，例如
  1。


  有一个 .setRate() 方法用于设置动画播放速率属性，一个 .setDelay() 方法用于设置延迟属性，以及 .setCycleCount() 和 .setCycleDuration()
  方法用于控制循环特性。正如你可能想象的，也有类似的 .get() 方法来“获取”这些 Animation 对象变量（或者属性、特性、参数、特征；你如何称呼你的数据字段都可以）的当前设置值。


  你可以使用 onFinished 属性，并加载一个 ActionEvent 对象，来指定动画播放完成时要执行的操作。这将在动画每次循环结束时执行，正如你可以想象的，在专业级
  Java 游戏中使用这个特定功能可以触发一些非常强大的操作。


  还有一些只读变量（属性），你可以随时“轮询”它们，以查找每个 Animation 对象的状态、currentTime、currentRate、cycleDuration
  和 totalDuration。例如，你可以使用这个 currentTime 属性来查看动画播放周期中任意时间点的播放头（帧指针）位置。


  ##### JavaFX 时间线类：用于 JavaFX 属性时间线管理的动画子类


  JavaFX Timeline 类是 JavaFX Animation 超类的一个子类，因此其继承层次结构如下所示，从 Java 主类 java.lang.Object
  开始，向下延伸到 Timeline 类：


  ```

  > java.lang.Object

  > javafx.animation.Animation

  > javafx.animation.Timeline

  ```


  Timeline 对象可用于定义一种特殊的 Animation 对象，该对象由对象类型为 WritableValue 的 JavaFX 值（属性）组成。所有 JavaFX
  属性都是 WritableValue 类型，因此这个类可用于对 JavaFX 中的任何内容进行动画处理，这意味着你能用它做什么只受限于你的想象力。


  Timeline 动画是使用 KeyFrame 对象定义的，这些对象通过前面提到的 KeyFrame 类创建。毫不奇怪，这个 KeyFrame 类允许你创建和管理位于
  Timeline 对象内部的 KeyFrame 对象。熟悉动画的人都知道，关键帧为对象或数据值动画中不同点的不同插值数据值进行设置，以创建平滑的运动。


  KeyFrame 对象将始终由 Timeline 对象根据时间变量（使用 KeyFrame.time 访问）和要动画化的属性（使用 KeyFrame 对象的 values
  定义，并通过 KeyFrame.values 变量访问）进行处理。


  需要注意的是，你需要在开始运行 Timeline 对象之前设置好你的 KeyFrame 对象，因为你无法在正在运行的 Timeline 对象中更改 KeyFrame
  对象。这是因为一旦启动，它就已经被放入系统内存。如果你想以任何方式更改正在运行的 Timeline 对象中的 KeyFrame 对象，请先停止 Timeline
  对象，然后对 KeyFrame 进行更改，最后重新启动 Timeline 对象。这将把 Timeline 对象及其修改后的 KeyFrame 对象及其新值重新加载到内存中。


  你将在本书中使用的 Interpolator 类，会根据 Timeline 的方向对 Timeline 对象中的这些 KeyFrame 对象进行插值。插值是一个基于起始值和结束值创建中间帧（或“补间”帧）的过程。如果你想知道方向是如何推断的，它保存在
  Animation 超类的 rate 属性和只读的 currentRate 属性中，而 Animation 超类是扩展后的 Timeline 子类的一部分。


  反转 rate 属性的值（即使其为负）将反转（切换）播放方向，读取 currentRate 属性时也遵循同样的原则（负值表示反向或倒退方向）。最后，KeyValue
  类（对象）用于保存每个 KeyFrame 对象内部的数据值。一个 KeyFrame 对象存储多个（根据需要尽可能多）KeyValue 对象，每个数据值使用一个
  KeyValue 对象。


  ##### JavaFX 过渡类：用于过渡和特效应用的动画子类


  JavaFX Transition 类是 JavaFX Animation 超类的一个子类，因此其继承层次结构如下所示，从一个名为 java.lang.Object
  的 Java 主类开始，向下延伸到 Transition 类：


  ```

  > java.lang.Object

  > javafx.animation.Animation

  > javafx.animation.Transition

  ```


  Transition 类是一个公共抽象类，因此它只能被利用（子类化或扩展）来创建过渡子类。事实上，已经有十个这样的子类为你创建好，供你使用，以创建你自己的过渡特效。这些包括
  SequentialTransition、FadeTransition、FillTransition、PathTransition、PauseTransition、RotateTransition、ScaleTransition、TranslateTransition、ParallelTransition
  和 StrokeTransition 类。这些子类的 Java 9 类继承层次结构类似于以下内容：


  ```

  > java.lang.Object

  > javafx.animation.Animation

  > javafx.animation.Transition

  > javafx.animation.PathTransition

  ```


  作为 Animation 的子类，Transition 类包含了 Animation 的所有功能。你很可能会直接使用这十个自定义过渡类，因为它们提供了你可能想要使用的不同类型的过渡（淡入淡出、填充、基于路径、基于描边、旋转、缩放、移动或平移等）。随着本书的深入，我们将学习如何使用其中一些类，所以我将继续介绍
  AnimationTimer 类。




  #### JavaFX AnimationTimer 类：帧处理、纳秒与脉冲


  JavaFX 的 `AnimationTimer` 类并非 JavaFX `Animation` 超类的子类，因此其继承层次结构如下所示；它始于 Java 主类
  `java.lang.Object`，止于 `AnimationTimer`：


  ```

  > java.lang.Object

  > javafx.animation.AnimationTimer

  ```


  这意味着 `AnimationTimer` 类是专门为 JavaFX 提供 `AnimationTimer` 功能而从头编写的，并且它与 `Animation`（或
  `Timeline`、`Transition`）类或其子类没有任何关联。因此，如果你在心理上将其与同属 `javafx.animation` 包的 `Animation`、`Interpolator`、`KeyFrame`
  和 `KeyValue` 类归为一类，那么这个类的名称可能会有些误导；它与这些类毫无关系！该类允许你实现自己的动画（或游戏引擎）计时器，并自行编写所有代码！我在《Beginning
  Java 8 Games Development》一书中展示了如何为 i2D 游戏实现这一点。


  与 `Transition` 类一样，`AnimationTimer` 类也被声明为公共抽象类。由于它是一个抽象类，因此只能被用于（子类化或扩展）创建 `AnimationTimer`
  的子类。与 `Transition` 类不同，它没有为你预创建任何子类；你必须从头创建自己的 `AnimationTimer` 子类。


  `AnimationTimer` 类看似简单，因为它只有一个你必须“重写”或替换的方法，该方法包含在公共抽象类中：即 `.handle()` 方法。此方法包含你希望在
  JavaFX 引擎舞台和场景处理循环的每一帧上执行的编程逻辑，该循环优化为以 60 FPS（每秒 60 帧）运行，这恰好非常适合游戏。JavaFX 使用一种基于新的
  Java 纳秒时间单位的脉冲系统（Java 7 之前的版本使用毫秒）。


  ##### JavaFX 脉冲同步：为你的 JavaFX 场景图元素提供异步处理


  JavaFX 脉冲是一种定时或同步事件，用于同步你为 Pro Java 9 游戏或物联网应用创建的任何给定场景图结构中包含的元素的状态。JavaFX 中的脉冲系统由
  Glass Windowing Toolkit 管理。脉冲使用高分辨率（纳秒）计时器，Java 程序员也可以使用自 Java 7 引入的 `System.nanoTime()`
  方法来访问这些计时器。


  JavaFX 中的脉冲管理系统被“限制”或“节流”在 60 FPS。这是一种优化，以便我们之前讨论的所有 JavaFX 线程都有足够的“处理空间”来完成它们需要做的事情。JavaFX
  应用程序会根据你在 Pro Java 9 游戏逻辑中所做的事情，自动生成最多三个线程。一个基本的业务应用程序可能只使用主 JavaFX 线程，但一个 i3D 游戏还会生成
  Prism 渲染线程；如果该 Pro Java 9 游戏还使用音频和/或视频（通常如此），它还会生成一个媒体播放线程；如果它还实现了社交媒体界面或元素，它还会生成
  WebKit 渲染线程。因此，正如你将看到的，健壮的 Java 9 游戏需要仔细的处理器时间管理。


  在我们的游戏开发过程中，我们将使用音频、2D、3D，可能还有视频，因此我们的 JavaFX 游戏应用程序肯定是多线程的！正如你将看到的，JavaFX 被设计为能够创建具有多线程和纳秒计时能力以及
  i3D PRISM 渲染硬件支持的游戏。


  当场景图中的某些内容发生变化时，例如 UI 控件定位、CSS 样式定义或动画正在播放，就会安排一个脉冲事件，并最终“触发”以同步场景图中元素的状态。JavaFX
  游戏设计的技巧在于优化脉冲事件，使其专注于游戏逻辑（动画、碰撞检测）。因此，对于 Pro Java 9 游戏，你需要尽量减少脉冲引擎需要处理的非游戏变化（UI
  控件位置、样式更改）。你将通过使用场景图作为静态设计系统来实现这一点，即设计脉冲引擎不会更改的固定视觉元素（UI、背景图像等）。这将节省“脉冲”以供游戏的动态元素（动画或交互式元素）使用。


  我的意思是，你将使用场景图来设计游戏的结构，但不会通过场景图使用动态编程逻辑实时操作静态设计节点（UI、背景、装饰），因为脉冲系统需要被用来执行这些 UI 更新，而我们很可能需要将这些实时处理事件用于
  Pro Java 9 的游戏逻辑处理。这又回到了静态与动态游戏设计的问题。


  JavaFX 脉冲系统允许开发者异步（即无序）处理事件，并在纳秒级别调度任务。接下来，我们将看看如何使用 `.handle()` 方法在脉冲中调度代码。




  ##### 驾驭 JavaFX 脉冲引擎：扩展 AnimationTimer 超类以生成脉冲事件


  扩展你的 `AnimationTimer` 类是让 JavaFX 脉冲引擎在每个处理的脉冲上执行 Java 代码的绝佳方式。你的实时游戏编程逻辑将放置在 `.handle(long
  now)` 方法内部，并且可以通过使用另外两个 `AnimationTimer` 方法 `.start()` 和 `.stop()` 随意启动和停止。


  `.start()` 和 `.stop()` 方法是从 `AnimationTimer` 超类中调用的，尽管这两个方法也可以被重写；只需确保在重写的代码方法中最终调用
  `super.start()` 和 `super.stop()`。如果你将其作为内部类添加到当前的 JavaFX `public void .start()`
  方法结构中（可参考图 6-7 以回顾），代码结构可能如下所示：


  ```

  public void start(Stage primaryStage) {

  Button btn = new Button;

  btn.setText("Say ''Hello World''");

  btn.setOnAction(new EventHandler() {

  @Override

  public void handle(ActionEvent event) {

  System.out.println("Hello World!);

  }

  }

  new AnimationTimer() {

  @Override

  public void handle(long now) {

  // 在每个 JavaFX 处理的脉冲上被执行的程序逻辑

  }

  }.start();

  // 关于 Stage 和 Scene 对象的 start() 方法其余代码在此处

  }

  ```


  上述程序逻辑展示了 `AnimationTimer` 内部类如何“即时”构建，以及 Java 点链式调用如何工作：对 `AnimationTimer` 超类的
  `.start()` 方法调用被附加到新的 `AnimationTimer()` 构造函数的末尾。在一个语句中，你完成了 `AnimationTimer` 的创建（`new`
  关键字）、声明（构造函数方法）和执行（`start()` 方法调用链接到 `AnimationTimer` 对象构造）。


  如果你想为游戏逻辑的核心部分（例如碰撞检测）创建更复杂的 `AnimationTimer` 实现，更好的方法（即更好的专业 Java 9 游戏设计）是将游戏计时逻辑做成自己的（自定义）`AnimationTimer`
  子类，而不是内部类。如果你要创建多个 `AnimationTimer` 子类以实现自定义脉冲事件处理，这一点尤其重要。你可以同时运行多个 `AnimationTimer`
  子类，但我建议你不要过度使用太多子类，而是优化你的 Java 代码，只使用一个。


  要使用 Java `extends` 关键字结合 `AnimationTimer` 超类创建你自己的 `AnimationTimer` 类（名为 `BoardGamePulseEngine`），请实现此
  `AnimationTimer` 类定义和这些必需的 `AnimationTimer` 超类方法，以创建你的“空”JavaFX 脉冲棋盘游戏逻辑计时引擎。


  ```

  public class BoardGamePulseEngine extends AnimationTimer {

  @Override

  public void handle(long now) {   // 在每个脉冲上被执行的程序逻辑在此处

  }

  @Override

  public void start() {

  super.start();

  }

  @Override

  public void stop() {

  super.stop();

  }

  }

  ```


  我们将在本书后面学习了 Java 9、NetBeans 9、JavaFX 9 和 SceneGraph（第 8 章）的基础知识后创建动画代码。本章中的代码示例只是向你展示如何实现这些
  JavaFX 动画功能的示例。接下来，让我们看看 JavaFX Stage 类，我将实际向你展示一些代码，使你的 JavaFX 环境透明，这样你的游戏就可以浮动在操作系统桌面上，这是一种在
  Windows 中称为“无窗口 ActiveX 控件”的效果，它允许你创建虚拟 i3D 对象。


  ### JavaFX 屏幕与窗口控制：使用 javafx.stage 类


  `javafx.stage` 包包含可被视为“顶级”的类，你的 JavaFX 应用程序使用这些类进行显示。在你的用例中，这是专业 Java 9 游戏。这个舞台位于你最终游戏画面的“顶部”，因为它向应用程序的最终用户展示你的游戏场景。在你的
  `Stage` 对象内部，你有 `Scene` 对象，而在这些对象内部是 `SceneGraph Node` 对象，它们包含构成 Java 9 游戏或 Java
  9 IoT 应用程序的元素。因此，JavaFX `Stage` 对象是你在 Java 9 游戏中使用的最顶层对象。


  另一方面，从操作系统的角度来看，此包中的类可被视为提供底层服务。这些包括 `Stage`、`Screen`、`Window`、`WindowEvent`、`PopupWindow`、`Popup`、`DirectoryChooser`
  和 `FileChooser`，以及 `FileChooser.ExtensionFilter` 嵌套类。这些类将用于与设备显示硬件、操作系统窗口管理、文件管理和目录（文件夹）管理功能进行交互。这是因为
  `Stage` 类（对象）向操作系统请求这些功能，而不是使用 Java 或 JavaFX API 实际实现它们，因此操作系统实际上是在你的 Java 9 游戏或
  Java 9 IoT 应用程序请求操作系统提供这些操作系统前端实用程序时生成这些服务。


  如果你想获取运行 JavaFX 应用程序的硬件设备所使用的显示硬件的描述，你将需要使用 `Screen` 类。此类通过提供 `.getScreens()` 方法来支持多屏幕（第二屏幕是常见的行业术语）场景，该方法可以访问
  `ObservableList` 对象（一种允许监听器在发生变化时跟踪更改的列表对象），该对象将包含一个包含所有当前可用屏幕的列表数组。有一个“主”屏幕，可以通过调用
  `.getPrimary()` 方法访问。你可以通过调用 `.getDpi()` 方法获取当前屏幕硬件的物理分辨率。还有用于可用分辨率的 `.getBounds()`
  和 `.getVisualBounds()` 方法调用。


  `Window` 超类及其 `Stage` 和 `PopupWindow` 子类，可供 JavaFX 最终用户用来与你的应用程序交互。这是通过传递给你的 `.start()`
  方法（见图 5-2）的名为 `primaryStage` 的 `Stage` 对象，或使用 `PopupWindow`（对话框、工具提示、上下文菜单、通知等）子类（例如
  `Popup` 或 `PopupControl` 对象）来完成的。


  你可以使用 `Stage` 类在你的 JavaFX 应用程序编程逻辑中创建辅助舞台。主 `Stage` 对象始终由 JavaFX 平台使用 `public void
  start(Stage primaryStage)` 方法调用构建（正如你在第 6 章中由 NetBeans 9 创建的引导 JavaFX 9 应用程序中已经看到的那样）。所有
  JavaFX `Stage` 对象必须使用主 JavaFX 应用程序线程（我之前在讨论脉冲事件处理时提到过）进行构建和修改。由于 `Stage` 等同于其运行的操作系统平台上的一个窗口，因此某些属性或特性是只读的，需要在操作系统级别进行控制。这些是布尔属性（变量），包括
  `alwaysOnTop`、`fullScreen`、`iconified` 和 `maximized`。




  所有 Stage 对象都具有 StageStyle 属性和 Modality 属性，这些属性可以使用常量进行设置。stageStyle 常量包括 StageStyle.DECORATED、StageStyle.UNDECORATED、StageStyle.TRANSPARENT、StageStyle.UNIFIED
  和 StageStyle.UTILITY 常量。Modality 常量包括 Modality.NONE、Modality.APPLICATION_MODAL 和
  Modality.WINDOW_MODAL 常量。在我们讨论完 javafx.stage 包之后，下一节中，我将向你展示如何利用这个 StageStyle 属性和
  TRANSPARENT 常量做一些真正令人印象深刻的事情，这将使你的基于 JavaFX 的 Java 9 游戏和物联网应用在市场上脱颖而出。


  Popup 类可用于从头创建自定义弹出通知，甚至自定义游戏组件。或者，你也可以使用 PopupControl 类及其 ContextMenu 和 Tooltip
  子类来提供预定义（即已为你实现预编码）的 JavaFX 图形用户界面（GUI）控件。


  DirectoryChooser 和 FileChooser 类提供了将标准操作系统文件选择和目录导航对话框集成到 JavaFX 应用中的支持。FileChooser.ExtensionFilter
  嵌套类提供了一个实用工具，用于根据文件类型（文件扩展名）过滤 FileChooser 对话框中显示的文件。


  接下来，让我们将你当前 JavaFXGame 应用的 Stage 对象提升到一个新水平，并向你展示如何让你的 Java 9（JavaFX 9）游戏成为一个无窗口（浮动）应用！这是
  JavaFX 9 众多令人印象深刻的功能之一，你可以在你的 Pro Java 9 Games Development 开发流程中加以利用。


  ### 使用 JavaFX Stage 对象：创建浮动无窗口应用


  让我们将 JavaFXGame 应用的 `.start(Stage primaryStage)` 方法构造函数创建的 primaryStage Stage 对象设置为透明，这样
  HelloWorld 按钮（UI 控件）就能直接浮动在你的操作系统桌面上（或者在本例中，浮动在 NetBeans 9 之上）。这是 JavaFX 能做到但不太常见的事情，它将允许你创建看起来“浮动”在用户操作系统桌面上的
  i3D 游戏。对于 i3D 虚拟对象，至少在 Windows 7、8 和 10 操作系统上，这被称为“无窗口 ActiveX 控件”。移除窗口“边框”或装饰在其他高级操作系统（如
  Linux 和 Mac）上也应得到支持，并且有一个程序调用可以确定这种“使用 alpha 通道（透明度）移除除我的内容之外的所有内容”的能力是否可用，因此你可以实现一个回退方案，使用纯色或背景图像。这个很酷的小技巧（我想在本书早期就向你展示一些酷炫且强大的内容）部分是通过使用你刚刚学到的
  StageStyle.TRANSPARENT 常量，结合 Stage 类的 `.initStyle()` 方法来实现的。StageStyle 是一个“辅助”类，其中包含各种舞台（或最终是操作系统窗口）装饰常量，TRANSPARENT
  就是其中之一。我们将使用的回退方案是 UNDECORATED（一个普通的操作系统窗口）。


