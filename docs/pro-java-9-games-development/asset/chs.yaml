  '
- '# 16. 3D 游戏动画创建：使用动画过渡类


  现在你已经创建了多层级的 gameBoard 组节点（子类）层级结构，为该层级下的所有 3D 组件添加了纹理，确保你的 3D 游戏板模型能够中心旋转，并创建了一个
  3D 旋转器 UI 来随机旋转这个 gameBoard 3D 模型（层级结构）以随机选择一个象限，是时候使用自定义的 `createAnimationAssets()`
  方法为游戏设计添加动画对象了，该方法供旋转器调用，以创建游戏过程中使用的随机“旋转”。我们还将设置 3D 对象鼠标点击事件处理代码来触发动画，以及在进行此次旋转之前随机化
  RotateTransition 参数的逻辑。


  在本章中，我们将详细探讨抽象的 Animation 和 Transition 超类，以及所有强大的属性过渡子类，你可以在你的 i3D 棋盘游戏中将它们实现为不同类型的
  Animation 对象。我们将为你的游戏板和旋转器制作旋转动画，以及为旋转器制作平移（移动）动画。


  ## 为 3D 资源添加动画：Animation 超类


  公共抽象 Animation 类扩展了 Object，并位于 javafx.animation 包中，其他与动画相关的类也位于该包中，其中一些我们将用于我们的游戏，并在本章中详细讲解。Animation
  超类有两个直接已知的子类：Timeline 和 Transition。Transition 有十个预定义的 Animation（算法）子类，随时可以应用于你的游戏开发，因此我们将重点介绍它们，因为它们可以立即且有效地使用。javafx.animation
  包的内容足以写成一整本书，而我只有一章的篇幅，所以我将介绍最有效的动画类，用于创建专业的 Java 9 游戏。


  Animation 超类的 Java 9 类层级结构显示，该类是从零开始编码以提供对象动画能力的，因为它没有自己的超类，因此层级结构如下所示：


  ```

  java.lang.Object

  > javafx.animation.Animation

  ```


  抽象 Animation 类不能直接创建 Animation 对象，但它为 JavaFX API 中使用的所有动画类提供了核心功能。唯一的例外是 AnimationTimer
  类（一个脉冲引擎），它实现了一个核心定时器脉冲引擎（因此，它更像是一个定时器类而非动画类），非常适合基于 2D 精灵的游戏。我在《Beginning Java
  8 Games Development》一书中详细介绍了 i2D 游戏开发，并深入讲解了该类。本书更侧重于 i3D 游戏开发，因此我将借此机会介绍一些其他有用的（也是现成或预编码的）动画过渡类。


  通过设置 cycleCount 属性，动画可以运行有限次数。要使任何动画“来回弹跳”（即从起点到终点再回到起点反复运行），请将 autoReverse 属性设置为
  true；否则，使用 false 布尔值，我们将在专业的 Java 9 游戏中使用它来让 i3D 游戏板朝一个方向随机旋转。


  一旦实例化并配置好 Animation 对象，要播放它，可以调用 play() 方法或 playFromStart() 方法。Animation 对象的 currentRate
  属性设置你的速度和方向。通过反转 currentRate 的数值，你可以切换播放方向。当 duration 属性被“满足”（耗尽、结束、用完、达到、过期等）时，你的动画将停止。


  你可以通过使用带有 INDEFINITE 常量的 cycleCount 属性，为 Animation 对象设置无限持续时间（有时称为循环或无限循环）。以这种方式配置的
  Animation 对象会重复运行，直到调用 stop() 方法。这将停止正在运行的动画，并将其播放重置到起点（属性设置）。动画也可以通过调用 pause()
  来暂停，下一次调用 play() 将从暂停处恢复动画，除非你使用 .playFromStart() 方法调用。接下来，让我们看看 Animation 超类中的属性。这些属性由
  Transition 超类及其所有子类继承，因此你将在本书后续的 Pro Java 9 游戏开发代码中使用它们。


  autoReverse BooleanProperty 用于定义 Animation 对象是否应在交替循环中反转其方向。currentRate 是一个 ReadOnlyDoubleProperty，用于指示
  Animation 对象其他设置当前播放的速度（以及方向，由正值或负值表示）。




  一个 `currentTime` 类型的 `ReadOnlyObjectProperty<Duration>` 用于定义动画对象的播放位置，而 `cycleCount`
  类型的 `IntegerProperty` 用于定义动画对象的播放循环次数。`cycleDuration` 类型的 `ReadOnlyObjectProperty<Duration>`
  是一个只读变量，用于指示动画对象一个循环的持续时间。这是以默认速率 1 从时间 0 播放到动画结束所需的时间。


  `delay` 类型的 `ObjectProperty<Duration>` 用于延迟动画的开始时间，而 `onFinished` 类型的 `ObjectProperty<EventHandler<ActionEvent>>`
  属性包含在动画对象播放结束时触发的 `ActionEvent`。`rate` 类型的 `DoubleProperty` 用于定义动画的目标播放速度和方向。请注意，由于硬件限制，此速率可能并非总能达到，因此有一个
  `currentRate` 属性来保存实际达到的播放速率。


  `status` 类型的 `ReadOnlyObjectProperty<Animation.Status>` 属性包含动画对象的枚举状态常量。枚举辅助类 `Animation.Status`
  包含三个常量：`PAUSED`、`RUNNING` 和 `STOPPED`。


  `totalDuration` 类型的 `ReadOnlyObjectProperty<Duration>` 属性持有一个只读变量，用于指示动画对象的总持续时间，该持续时间乘以
  `cycleCount` 属性以计入其重复次数。因此，`duration` 是一个循环，而 `totalDuration` 等于 `(delay + (duration
  * cycleCount))`。


  `Animation` 有一个静态（嵌套）类，即 `Animation.Status` 类，它包含表示 `status` 可能状态的枚举常量。这些常量包括 `PAUSED`、`RUNNING`
  和 `STOPPED`。


  `Animation` 有一个数据字段，即静态的 `int INDEFINITE` 字段，用于指定一个动画将无限重复，直到调用 `.stop()` 方法。


  `Animation` 有两个重载的构造函数：一个简单的（空参数区域）构造函数，用于创建一个空的或未配置的 `Animation` 对象；另一个构造函数使用目标帧率配置
  `Animation` 对象。这些构造函数方法（其子类的构造函数方法格式，因为它们不能直接在代码中使用）应类似于以下 Java 代码：


  ```

  protected Animation()                        // 受保护：不能直接实例化

  protected Animation(double targetFramerate)

  ```


  有数十种方法可用于控制动画对象，在本章中，这些对象将是各种 `Transition` 子类。这些方法通过 `Transition` 类从 `Animation`
  类继承到各种属性过渡类，我们将在 Java 9 游戏中使用这些类。


  `autoReverseProperty()` 方法调用返回一个 `BooleanProperty`，用于定义动画对象是否在（交替的）播放循环之间反转其方向。`currentRateProperty()`
  方法调用返回一个只读的 `double` 变量，用于指示动画对象当前播放的速度和方向。


  `.rateProperty()` 方法调用返回一个 `double` 值，表示动画预期播放的速度和方向。`.statusProperty()` 方法调用返回一个
  `ReadOnlyObjectProperty<Animation.Status>` 类型的动画状态。`.currentTimeProperty()` 方法调用返回一个动画对象的播放位置。`.cycleCountProperty()`
  使用一个表示 `cycleCount` 属性的整数值返回动画对象中的循环次数。


  `.cycleDurationProperty()` 方法返回一个只读变量，指示动画一个循环的持续时间，即从时间 0.0 以默认速率 1.0 播放到动画结束所需的时间。`.delayProperty()`
  方法调用返回延迟属性的持续时间，该属性用于延迟动画对象的开始。


  `.totalDurationProperty()` 方法调用返回一个只读的 `Duration` 属性设置，用于指示动画对象的总持续时间。需要注意的是，此值将包含所有动画重复循环。


  `.getCuePoints()` 方法调用返回一个 `ObservableMap<String,Duration>`，其中包含动画对象的提示点。这些提示点应用于标记动画对象中的重要位置。`.getCurrentRate()`
  方法调用将返回动画对象 `currentRate` 属性的 `double` 值。


  `.getCurrentTime()` 方法调用将返回动画对象 `currentTime` 属性的值。


  `.getCycleCount()` 方法调用将返回动画对象 `cycleCount` 属性的整数值，而 `.getCycleDuration()` 方法调用将返回
  `cycleDuration` 属性的值。`.getDelay()` 方法调用将返回 `delay` 属性的值。


  `.getOnFinished()` 方法调用将返回 `onFinished` 属性的 `EventHandler<ActionEvent>` 值，而 `.getRate()`
  方法调用将返回 `rate` 属性的 `double` 值。`.getStatus()` 方法调用将返回 `status` 属性的 `Animation.Status`
  值。


  `.getTargetFramerate()` 方法调用将返回目标帧率，即动画对象运行的最大帧率（以每秒帧数为单位）。


  `.getTotalDuration()` 方法调用将返回 `totalDuration` 属性的 `Duration` 值。


  `.isAutoReverse()` 方法调用将返回 `autoReverse` 属性的值。


  `void .jumpTo(Duration time)` 方法调用将跳转到动画对象中的给定位置，`void .jumpTo(String cuePoint)`
  方法调用也是如此，但它使用 `cuePoint` 参数而不是 `Duration` 参数。


  `.onFinishedProperty()` 方法调用返回 `ObjectProperty<EventHandler<ActionEvent>>` 类型的动作，该动作在动画对象播放结束时触发。`void
  .pause()` 方法调用用于暂停动画对象的播放循环。`void .play()` 方法调用将从其当前位置开始播放动画对象，方向由 `rate` 属性指示。


  `void .playFrom(Duration time)` 方法调用是一个便捷方法，它将从特定位置播放动画，`void .playFrom(String cuePoint)`
  方法调用也是如此，但它使用 `cuePoint` 而不是 `Duration`。`void .playFromStart()` 方法调用将从前向的初始位置播放动画对象。`void
  .setAutoReverse(boolean value)` 方法调用可用于设置 `autoReverse` 属性的值。


  `void .setCycleCount(int value)` 方法调用可用于设置 `cycleCount` 属性的值。`protected void .setCycleDuration(Duration
  value)` 方法调用可用于设置 `cycleDuration` 属性的值。`void .setDelay(Duration value)` 方法调用可用于设置
  `delay` 属性的值。`void .setOnFinished(EventHandler<ActionEvent> value)` 方法调用可用于设置 `onFinished`
  属性的值。


  `void .setRate(double value)` 方法调用可用于设置动画对象 `rate` 属性的值。`protected void .setStatus(Animation.Status
  value)` 方法调用可用于设置 `status` 属性的常量值。


  `void .stop()` 方法调用用于停止动画对象的播放循环，需要注意的是，此方法调用会将播放头重置到其初始起始位置，因此它可以用作重置。接下来，让我们看看另一个抽象超类
  `Transition`，它是 `Animation` 的子类，用于创建属性过渡。




  ## 自动对象动画：过渡超类


  公共抽象过渡超类与其子类一同保存在 `javafx.animation` 包中，这些子类是预定义的算法，用于应用不同类型的属性动画，而无需使用时间线或动画计时器，也无需设置关键帧。因此，过渡子类是动画类中最高级（最先进）的形式，非常适合专业的
  Java 9 游戏开发，因为它们能让您将时间集中在游戏玩法开发上，而不是重新发明 Java 动画代码。这就是我们介绍这些类以快速实现游戏动画的原因！过渡超类的
  Java 类层次结构如下所示：


  ```

  java.lang.Object

  > javafx.animation.Animation

  > javafx.animation.Transition

  ```


  已知的直接子类可以快速有效地实现，以增强您的 Java 游戏开发流程，包括 `RotateTransition`、`ScaleTransition` 和 `TranslateTransition`，用于调用基本的
  3D 对象变换（这些也可用于 2D、文本和 UI 元素）；以及 `FadeTransition`、`FillTransition`、`StrokeTransition`
  和 `PathTransition`，用于处理 2D（即矢量）对象（`FadeTransition` 也适用于文本和 UI 元素）。还有两个子类用于创建复合（或复杂）动画，它们无缝地组合了这些其他类型的属性过渡。其中包括
  `ParallelTransition`，它同时执行属性过渡；以及 `SequentialTransition`，它串行（一个接一个）执行一系列属性过渡。还有一个
  `PauseTransition` 子类，用于在复杂动画中引入“等待状态”，这将为您尝试创建的特殊动画效果增加更多的运动真实感。


  抽象过渡超类包含了基于过渡的动画所需的所有基本功能。该类提供了一个定义属性动画的框架，如果您愿意，也可以用它来定义自己的过渡子类。然而，游戏中使用的大多数过渡类型（淡入淡出、变换、路径等）已经提供，因此您只需实现已经创建、调试和优化过的代码即可。


  所有过渡子类都需要实现一个名为 `.interpolate(double)` 的方法。只要过渡子类（对象）正在运行，该方法就会在动画对象的每个周期中被调用。除了
  `.interpolate()` 方法之外，任何扩展 `Transition` 的子类都需要使用 `Animation.setCycleDuration(javafx.util.Duration)`
  方法调用来设置动画周期的持续时间。


  例如，应使用持续时间属性（如 `RotateTransition.duration`）来设置此持续时间。但它也可以由扩展类计算，就像在 `ParallelTransition`
  和 `FadeTransition` 中所做的那样。


  `Transition` 类有一个插值器属性，类型为 `ObjectProperty<Interpolator>`，用于控制每个过渡周期加速和减速的时序。从 `Animation`
  超类继承的属性包括 `autoReverse`、`currentRate`、`currentTime`、`cycleCount`、`cycleDuration`、`delay`、`onFinished`、`status`、`rate`
  和 `totalDuration`。还有一个从 `Animation` 类继承的嵌套类 `Animation.Status`。


  有两个重载的构造函数；一个构造空的过渡子类对象，另一个构造帧率配置的过渡子类。它们看起来像以下两个构造函数方法：


  ```

  Transition()

  Transition(double targetFramerate)

  ```


  最后，这个抽象超类添加了六个方法，其中大部分与插值器属性相关。该类还继承了我们在上一节中介绍的方法。`.getCachedInterpolator()` 方法返回在启动过渡子类时设置的
  `Interpolator` 属性。`.getInterpolator()` 方法将获取插值器属性的值，而 `void .setInterpolator(Interpolator
  value)` 方法将为插值器属性设置一个值。如前所述，受保护的抽象 `void .interpolate(double)` 方法需要由过渡子类提供，而 `.interpolatorProperty()`
  方法控制加速和减速的时序。


  最后，`.getParentTargetNode()` 方法调用将返回已定位为播放过渡子类动画的节点。接下来，让我们详细了解一下其中一个过渡子类，然后我们可以在您的
  `JavaFXGame` Java 代码中实现它，以旋转（动画化旋转）您的 `gameBoard` 组节点。




  ### 制作 3D 对象旋转动画：使用 RotateTransition 类


  公共最终类 `RotateTransition` 将用于创建旋转动画，并继承自 `Transition` 超类。它将与所有其他动画和动画计时器相关的类一起，存储在
  `javafx.animation` 包中。`RotateAnimation` 子类的 Java 类层次结构应如下所示：


  ```

  java.lang.Object

  > javafx.animation.Animation

  > javafx.animation.Transition

  > javafx.animation.RotateTransition

  ```


  `RotateTransition` 类（对象）可用于创建持续时间与其设置时长一致的旋转动画。这是通过定期更新其所附加节点的 `rotate` 变量来实现的。旋转角度值应使用度数指定。如果提供了
  `fromAngle` 属性，则旋转从该值开始；否则，将从节点的当前（先前）旋转值开始。如果提供了 `toAngle` 值，则旋转将停止在该值；否则，将使用起始值加上
  `byAngle` 值。如果同时指定了 `toAngle` 和 `byAngle`，则 `toAngle` 值优先。


  `RotateTransition` 在继承自 `Animation` 和 `Transition` 的属性基础上添加了一些属性，这些属性有助于定义旋转过渡算法。其中包括：一个
  `axis` 属性（`ObjectProperty<Point3D>`），用于指定 `RotateTransition` 对象的旋转轴；一个 `node` 属性（`ObjectProperty<Node>`），用于指定受
  `RotateTransition` 影响的目标 `Node` 对象；以及一个 `duration` 属性（`ObjectProperty<Duration>`），用于指定
  `RotateTransition` 的持续时间。


  `byAngle` 属性（`DoubleProperty`）可用于指定从 `RotateTransition` 开始算起的增量停止角度值。`fromAngle`
  属性（`DoubleProperty`）可用于指定 `RotateTransition` 的起始角度值。`toAngle` 属性（`DoubleProperty`）可用于指定
  `RotateTransition` 的停止角度值。


  前面讨论的嵌套类、字段和属性均继承自 `Animation` 和 `Transition`。


  `RotateTransition` 类有三个重载的构造方法。一个创建未配置的 `RotateTransition`，一个创建配置了持续时间的 `RotateTransition`，还有一个创建配置了持续时间和
  `Node` 对象的 `RotateTransition`。这三个构造方法如下所示：


  ```

  RotateTransition()

  RotateTransition(Duration duration)

  RotateTransition(Duration duration, Node node)

  ```


  除了继承自该类扩展的 `Animation` 和 `Transition` 超类的方法外，该类还有 19 个专门使用的方法。`.axisProperty()`
  方法调用使用 `ObjectProperty<Point3D>` 格式为 `RotateTransition` 指定旋转轴。`.byAngleProperty()`
  方法为 `RotateTransition` 对象指定一个增量停止角度值，该值是相对于起始角度的偏移量。


  `.durationProperty()` 方法使用 `ObjectProperty<Duration>` 指定 `RotateTransition` 的持续时间。`.fromAngleProperty()`
  方法使用 `DoubleProperty` 指定此 `RotateTransition` 的起始角度值。`.getAxis()` 方法调用使用 `Point3D`
  对象获取 `axis` 属性的值。


  `.getByAngle()` 方法将获取 `byAngle` 属性的双精度值。`.getFromAngle()` 方法调用将获取 `fromAngle` 属性的双精度值。`.getToAngle()`
  方法调用将获取 `toAngle` 属性的双精度值。`.getNode()` 方法调用将获取 `node` 属性的 `Node` 对象值，`.getDuration()`
  方法调用将获取 `duration` 属性的值。如您所知，受保护的 `void .interpolate(double value)` 方法调用必须由 `Transition`
  超类的子类实现提供。`.nodeProperty()` 方法为 `RotateTransition` 指定目标 `ObjectProperty<Node>`。


  `void .setAxis(Point3D value)` 方法调用用于设置 `axis` 属性的值。`void .setByAngle(double value)`
  方法调用用于设置 `byAngle` 属性的值。`void .setDuration(Duration value)` 方法调用用于设置 `duration`
  属性的值。`void .setFromAngle(double value)` 方法调用用于设置 `fromAngle` 属性的值。`void .setNode(Node
  value)` 方法调用用于设置 `node` 属性的值。`void .setToAngle(double value)` 方法调用用于设置 `toAngle`
  属性的值。`.toAngleProperty()` 方法使用 `DoubleProperty` 为 `RotateTransition` 指定一个停止角度值。接下来，让我们实现
  `rotGameBoard` 和 `rotSpinner` 这两个 `RotateTransition` 对象，以获得一些实践经验。




  ### RotateTransition 示例：设置旋转动画资源


  让我们创建一个 `createAnimationAssets()` 方法，用于存放 `RotateTransition`、`TranslateTransition`
  以及其他 `Transition` 子类对象，使用以下 Java 语句，如图 16-1 中黄色高亮（以及红色波浪下划线）所示：


  ![A336284_1_En_16_Fig1_HTML.jpg](img/A336284_1_En_16_Fig1_HTML.jpg)


  图 16-1.


  在 `start()` 方法中自定义方法调用列表的末尾，添加一个 `createAnimationAssets()` 方法调用


  ```

  createAnimationAssets();

  ```


  请记得双击 `javafxgame.JavaFXGame` 选项中的“创建方法 createAnimationAssets()”，让 NetBeans 为您生成一个引导方法。在本章的这一部分，您将用
  `RotateTransition` 对象的实例化和配置代码替换占位 Java 代码。


  您需要做的第一件事是在类顶部声明一个 `RotateTransition` 对象，并将其命名为 `rotGameBoard`，因为这就是该对象将要执行的操作。在您的
  `.createAnimationAssets()` 方法内部，实例化 `rotGameBoard` 对象，并将其配置为播放五秒钟；然后将其连接到 `gameBoard`
  Group 节点，如下面的 Java 9 代码所示，并在图 16-2 中以浅蓝色和黄色高亮显示：


  ![A336284_1_En_16_Fig2_HTML.jpg](img/A336284_1_En_16_Fig2_HTML.jpg)


  图 16-2.


  在类顶部声明一个 `rotGameBoard` 对象，并在 `createAnimationAssets()` 内部实例化它


  ```

  RotateTransition rotGameBoard;

  ...

  private void createAnimationAssets() {

  rotGameBoard = new RotateTransition(Duration.seconds(5), gameBoard);

  }

  ```


  现在，您可以使用本章上一节中学到的各种 `.set()` 方法调用来开始配置此 `RotateTransition` 动画对象。使用 `.setAxis(Rotate.Y_AXIS)`
  设置 Y 旋转轴，并使用 `.setCycleCount(1)` 方法调用将 `cycleCount` 属性设置为一个周期。使用 `.setRate(0.5)`
  方法调用将 `rate` 属性设置为 50% 的速度，该调用作用于您的 `rotGameBoard` 对象。核心动画对象设置的 Java 语句应类似于以下 Java
  9 语句，这些语句在图 16-3 底部以高亮显示：


  ![A336284_1_En_16_Fig3_HTML.jpg](img/A336284_1_En_16_Fig3_HTML.jpg)


  图 16-3.


  使用 y 轴、`cycleCount` 为 1 以及 50% 速度的 `rate` 配置 `rotGameBoard` RotateTransition 对象


  ```

  RotateTransition rotGameBoard;

  ...

  private void createAnimationAssets() {

  rotGameBoard = new RotateTransition(Duration.seconds(5), gameBoard);

  rotGameBoard.setAxis(Rotate.Y_AXIS);

  rotGameBoard.setCycleCount(1);

  rotGameBoard.setRate(0.5);

  }

  ```


  您已经知道我们为什么使用 y 轴进行旋转；但是，您可能想知道为什么我们只使用一个周期。原因是，一旦我们通过指定 `fromAngle` 和 `toAngle`
  值使此 `RotateTransition` 具有交互性（这些值将在每次 `rotGameBoard.play()` 方法调用之前，使用我们稍后将编码的随机旋转生成器中的代码进行设置），我们将使用这些角度之间的差值（当前为
  1080 或三次旋转）来控制旋转次数；因此，我们只使用一个周期。我使用三次旋转是为了进行代码测试。


  `rate` 设置为 1 对于获得平滑的旋转动画来说太快了，而且游戏板不应该旋转得那么快，所以我将这个 1.0 的默认值降低了 50%，改为 0.5，以向您展示
  `rate` 变量如何提供精细调节的速度控制。


  接下来，让我们添加必需的 `Interpolator` 类常量规范，目前将使用默认的 `LINEAR`，因为我们希望获得平滑、均匀的旋转。这通过 `.setInterpolator()`
  方法调用和 `Interpolator.LINEAR` 常量来添加和配置。最后，我们要添加两个最重要的配置语句，它们告诉 `RotateTransition`
  引擎旋转的起始角度（`fromAngle` 属性）和结束角度（`toAngle` 属性）。使用这些将允许我们控制旋转从哪个象限（45、135、225 或 315）开始以及结束。目前，我们将只使用从起始
  45 度角开始的三个完整旋转（1080），因此 `toAngle` 将为 1125。要启动（并测试）动画，您还需要一个 `.play()` 方法调用，如下面的完整
  Java 方法体所示，并在图 16-4 底部以黄色和浅蓝色高亮显示：


  ![A336284_1_En_16_Fig4_HTML.jpg](img/A336284_1_En_16_Fig4_HTML.jpg)


  图 16-4.


  使用 `LINEAR` 插值器、`fromAngle` 为 45 以及 `toAngle` 为 1125 配置 `rotGameBoard` 对象


  ```

  RotateTransition rotGameBoard;

  ...

  private void createAnimationAssets() {

  rotGameBoard = new RotateTransition(Duration.seconds(5), gameBoard);

  rotGameBoard.setAxis(Rotate.Y_AXIS);

  rotGameBoard.setCycleCount(1);

  rotGameBoard.setRate(0.5);

  rotGameBoard.setInterpolator(Interpolator.LINEAR);

  rotGameBoard.setFromAngle(45);

  rotGameBoard.setToAngle(1125);

  rotGameBoard.play();

  }

  ```


