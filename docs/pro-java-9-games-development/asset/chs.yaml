- '# 14. 3D 模型层级结构创建：使用基本几何体构建游戏棋盘


  现在你已经学会了如何使用 JavaFX 的 Phong 着色器算法及其各种颜色和效果映射通道来为 3D 基本几何体“蒙皮”，并创建了色彩丰富、高度优化的游戏棋盘方格纹理贴图，是时候添加一些自定义方法来构建游戏棋盘并设置带有纹理贴图的
  Phong 着色器对象了。我们需要创建一个`createGameBoardNodes()`方法来组织构成 3D 游戏棋盘的 3D 基本几何体资源，因为`createBoardGameNodes()`方法应该（也确实）包含更高级别的节点子对象实例化和配置，例如场景、根节点、UI
  堆栈面板、3D 游戏棋盘组、摄像机、光照，以及四个名为 Q1 到 Q4（象限 1 到 4）的游戏棋盘象限组对象。我们还将创建其他 19 个游戏棋盘方格对象，分别命名为
  Q1S1 到 Q1S5、Q2S1 到 Q2S5、Q3S1 到 Q3S5 和 Q4S1 到 Q4S5，以保持对象名称简短。将对象命名为 Quadrant1Square1（Q1S1）的缩写版本将使使用这些缩写术语的
  Java 代码更具可读性。


  在本章中，你将构建场景图中位于场景图根节点下的 gameBoard 组分支，该分支紧邻你已经构建好的 uiLayout 分支。在 gameBoard 组分支下，我们将把游戏棋盘划分为四个象限，这样游戏棋盘中央就可以有四个较大的
  300x300 单位区域用于游戏玩法，每个象限包含 20 个外围游戏棋盘方格中的 5 个作为子对象。通过一个三层级的 3D 基本几何体对象层级结构，我们可以整体访问整个游戏棋盘（例如，旋转它），以单元形式访问每个象限（例如，使其悬浮或应用着色器效果），并访问层级结构底部的单个游戏棋盘方格（叶子节点子对象）。让我们开始吧！本章中我们将编写数百行新的
  Java 代码来实现基本几何体、着色器、图像和场景图层级节点。


  ## 基本几何体创建方法：createGameBoardNodes()


  由于创建 24 个基本几何体（4 个中央棋盘象限和 20 个外围方格）需要超过 100 条 Java 语句（使用 new 实例化、setTranslateX()、setTranslateZ()、setMaterial()等），让我们专门创建一个方法来容纳我们的游戏棋盘对象及其实例化和配置语句。这样，createBoardGameNodes()方法将创建全局和顶层的节点子类对象（场景、根节点、摄像机、光照、uiLayout
  分支、gameBoard 分支、Q1 到 Q4 分支等）。在本章后面，我们还将把 PhongMaterial 着色器创建逻辑提取到另一个自定义的 createMaterials()方法中，在那里我们将创建几十个自定义着色器对象，用于为游戏棋盘的各种组件蒙皮。为了让
  NetBeans 9 为你创建这个新方法，请在 start()方法的第一部分中，在 createBoardGameNodes()方法调用之后添加一行代码，然后输入以下
  Java 方法调用，命名你的新方法：


  ```

