  正如我们在 3D 场景中渲染这段代码时会看到的，在 3D 合成中，向场景图添加对象的顺序类似于 2D 合成 StackPane 中 2D 资源图层顺序的情况，因为
  3D 基本几何体会显示为“彼此叠放”。对象在场景图的 gameBoard Group 中添加得越晚，它们渲染到屏幕上的时间就越晚。因此，最后添加到场景图的基本几何体将渲染在所有之前添加的基本几何体之上，而第一个添加到场景图的基本几何体将最先渲染（即位于所有其他
  3D 基本几何体之下或之后）。


