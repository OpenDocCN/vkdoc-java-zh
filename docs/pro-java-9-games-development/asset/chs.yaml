- '# 19. 游戏内容引擎：具有随机内容选择方法的 AI 逻辑


  现在你已经让游戏棋盘动起来，并且每次点击 3D 旋转器 UI 元素时都会随机选择一个象限，我们需要想办法以某种方式追踪这些旋转，从而一致地告诉我们落在了哪个象限。这样，我们就可以将正确的漫反射纹理贴图映射到该象限的游戏棋盘方格上。我们将使用简单的数学方法，用整数来实现，因为圆形的
  360 度和象限的 90 度都是可整除的。这将是一个有趣的章节，因为 AI 通常可以用紧凑的 Java 代码来编写！一旦确定了方法，就需要进行大量的逻辑思考，并通过一些测试来优化数值。


  在本章中，我们将创建两个新的整数变量：`spinDeg` 用于表示旋转度数，它将作为玩家旋转的总角度累加器；以及 `quadrantLanding`，它将保存一个简单而强大的计算结果，该结果总能告诉我们最新一次旋转落在了哪个象限。


  我们将创建六个新方法，包括一个 `calculateQuadrantLanding()` 方法来确定当前象限，一个 `resetTextureMaps()` 方法在每次新旋转前将游戏棋盘方格纹理贴图重置为默认值，以及
  `populateQuadrantOne()` 到 `populateQuadrantFour()` 方法来处理随机数生成和条件 `if()` 处理，从而为玩家的每次随机旋转挑选游戏棋盘方格内容的组合。


  ## 编写随机旋转追踪器：取余运算符


  要获取玩家旋转后落点的最新象限结果，我们需要追踪整次旋转后的余数百分比，特别是当我们旋转三次加上偏移量时。因此，对于 `if()` 条件 1 中的 45 + 1080，这将对应象限一。对于
  `if()` 条件 2 中的 45 + 1170，这将对应象限二。对于 `if()` 条件 3 中的 45 + 1260，这将对应象限三。对于 `if()` 条件
  4 中的 45 + 1350，这将对应象限四。然而，对于后续的旋转，起始偏移量并不总是 45 度，因此我们需要保留一个 `spinDeg` 总变量，并将每次旋转的角度相加得到总和，然后除以
  360 得到完整旋转次数，最后使用 Java 中的取余 `%` 运算符来获取游戏棋盘象限落点处超出完整旋转的角度。在 Java 代码中，公式大致如下：


  ```

  int spinDeg = 45;                        // 初始化为 45 度

  int quadrantLanding;                    //  初始化为零

  spinDeg = spinDeg + lastSpinRotation;  //   总旋转角度累加器

  quadrantLanding = spinDeg % 360;      //    静止角度偏移计算

  ```


  `quadrantLanding` 变量将始终包含四个值之一：45（粉色或其他象限）、135（蓝色或矿物象限）、225（绿色或蔬菜象限）或 315（橙色或动物象限）。我们将创建一个名为
  `calculateQuadrantLanding()` 的方法，在实现随机旋转的鼠标事件处理程序末尾调用它。




  ### 实现旋转追踪器功能：创建空方法


