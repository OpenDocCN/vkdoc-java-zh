  ## 摄像机动画：选择后定位游戏面板


  接下来，我们添加一些 3D 摄像机动画。当玩家点击他们想要用于本回合的方块后，摄像机对象会向内移动，并将角度从 -30 度向下旋转到 -60 度，这将使象限及其图像更靠近摄像机（也更平行）。这会让象限图像对玩家来说更大，同时为屏幕左侧和右侧的
  2D 覆盖面板留出更多空间。这些面板将包含我们的 UI、记分板以及所选游戏方块视觉内容的答案。这些内容大部分将在接下来的几章中创建，因此我们基本上是在完成游戏外部（外层游戏面板）部分的
  i3D 和 UI 编程。在接下来的章节中，我们将开始游戏编程的内部（问答）和音频部分。


  在类顶部的 `RotateTransition` 复合语句中添加一个 `rotCameraDown` 对象声明；然后在 `createAnimationAssets()`
  方法的末尾，使用 5 秒作为持续时间设置并引用摄像机对象，为该对象添加实例化。将 `cycleCount` 变量设置为 1，`Rate` 设置为 0.75，以获得更适中的移动速度。将
  `Delay` 设置为 1（`Duration.ONE`），并暂时使用 `Interpolator.LINEAR` 插值器。最后，将 `fromAngle` 变量设置为当前的
  -30 度，`toAngle` 变量设置为目标 -60 度。这段 Java 代码可以在 `createAnimationAssets()` 方法的末尾看到，在图
  20-20 中以黄色高亮显示。


  ![A336284_1_En_20_Fig20_HTML.jpg](img/A336284_1_En_20_Fig20_HTML.jpg)


  图 20-20.


  在 `createAnimationAssets()` 方法的末尾添加一个从 -30 度到 -60 度的 `rotCameraDown` 动画


  图 20-20 中展示的、调用 `RotateTransition` 对象的摄像机对象的 Java 9 代码，应如下所示：


  ```

  rotCameraDown = new RotateTransition(Duration.seconds(5), camera);

  rotCameraDown.setAxis(Rotate.X_AXIS);

  rotCameraDown.setCycleCount(1);

  rotCameraDown.setRate(0.75);

  rotCameraDown.setDelay(Duration.ONE);

  rotCameraDown.setInterpolator(Interpolator.LINEAR);

  rotCameraDown.setFromAngle(-30);

  rotCameraDown.setToAngle(-60);

  ```


  由于我们还希望在旋转摄像机对象向下 -30 度的同时，将摄像机对象向内移动 -175 个单位（从 500 到 325），因此我们将在类顶部的 `TranslateTransition`
  对象复合声明语句中添加一个 `moveCameraIn` 对象。在 `createAnimationAssets()` 方法的末尾，我们将使用 2 秒实例化此对象，并将其附加到摄像机对象上。然后，通过使用
  `setByZ(-175)` 并设置 `cycleCount` 为 1，将其配置为在 Z 方向上移动 -175 个单位。此动画对象的 Java 代码应如下所示：


  ```

  moveCameraIn = new TranslateTransition(Duration.seconds(2), camera);

  moveCameraIn.setByZ(-175);

  moveCameraIn.setCycleCount(1);

  ```


  最后，为了制作一个复合动画，我们将添加一个 `cameraAnimIn` `ParallelTransition` 对象声明，在类顶部进行复合声明，然后在 `createAnimationAssets()`
  内部实例化该对象。


  我们将 `moveCameraIn` 和 `rotCameraDown` 动画对象添加到这个 `ParallelTransition` 对象中，直接放在对象实例化语句内部，这样我们只需要一行代码就能将这两个动画无缝组合在一起。Java
  代码（也显示在图 20-22 的末尾）应如下所示：


  ```

  cameraAnimIn = new ParallelTransition(moveCameraIn, rotCameraDown);

  ```




  接下来，让我们使用“运行 ➤ 项目”工作流程来测试这段代码，看看它是如何工作的！如图 20-21 所示，象限在屏幕上的位置很好，所以我们只需将 3D 旋转器 UI
  移出屏幕即可。为此，我们将在 `cameraAnimIn` 的 `ParallelTransition` 中添加一个 `moveSpinnerOff` 动画对象，这样，将摄像机旋转到游戏板的过程也包含了将
  3D 旋转器移出游戏屏幕的操作。


  ![A336284_1_En_20_Fig21_HTML.jpg](img/A336284_1_En_20_Fig21_HTML.jpg)


  图 20-21.


  摄像机现在向下倾斜 60 度对准游戏板，更好地显示内容


  这将使动画序列看起来更加专业。我们可以使用原有的 `spinnerAnim` 的 `ParallelTransition` 对象，在需要再次旋转游戏板时，将 3D
  旋转器 UI 移回屏幕。


  接下来，让我们创建 `moveSpinnerOff` 动画对象，然后将其添加到我们刚刚创建的 `cameraAnimIn` 对象中，以创建一个更复杂的 `ParallelTransition`
  动画对象，用于游戏逻辑代码。


  在类顶部的复合 `TranslateTransition` 声明语句中声明一个 `moveSpinnerOff` 对象，然后在 `createAnimationAssets()`
  方法体中，在 `moveCameraIn` 语句之后、`cameraAnimIn` 的 `ParallelTransition` 对象实例化之前对其进行实例化，因为我们要将其添加到此复合动画过渡中。这样，我们想要动画化的所有内容都会在同一时间发生。


  我们将在 2 秒内快速将旋转器移出屏幕，移动距离与之前将其移入屏幕时相同（这次是负值），即 150 个单位。Java 代码应如下所示，如图 20-22 所示，位于方法底部，以黄色和浅蓝色高亮显示：


  ![A336284_1_En_20_Fig22_HTML.jpg](img/A336284_1_En_20_Fig22_HTML.jpg)


  图 20-22.


  将 `moveSpinnerOff` 动画对象添加到 `cameraAnimIn` 的 `ParallelTransition` 对象中，以移除旋转器


  ```

  moveCameraIn = new TranslateTransition(Duration.seconds(2), camera);

  moveCameraIn.setByZ(-175);

  moveCameraIn.setCycleCount(1);

  moveSpinnerOff = new TranslateTransition(Duration.seconds(3), spinner);

  moveSpinnerOff.setByX(-150);

  moveSpinnerOff.setCycleCount(1);

  cameraAnimIn = new ParallelTransition(moveCameraIn, rotCameraDown, moveSpinnerOff);

  ```


  这四个新的动画对象将为你的 i3D 游戏增添不少专业感：将摄像机视图动画化到一个更优越的位置，在每次核心游戏环节中将旋转器 i3D UI 元素从屏幕上移除，旋转
  3D 摄像机的平面使其与象限内容更平行，并将所有这些移动组合到一个 `ParallelTransition` 动画序列中。


