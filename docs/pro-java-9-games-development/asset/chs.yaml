  图 2-1.

  如何使用 JavaFX 9、Java 9 和 NetBeans 9 在场景图中实现 2D 或音频新媒体资产


  由于在 Java 游戏设计（或编程）流程中创建或正确实现这些新媒体元素之前，你需要具备技术基础，因此我将逐一介绍这四种新媒体领域的核心概念。其中，2D 动画和数字视频在概念上相互关联，因为它们都涉及第四维度——时间，并使用帧，因此我将一并讲解。数字音频也涉及第四维度——时间，所以我将以数字音频概念收尾；最后，我们将快速了解数字内容优化，以便你的专业
  Java 游戏和物联网项目体积紧凑、下载迅速。


  ## 数字成像概念：分辨率、色彩深度、Alpha 通道、图层


  JavaFX 支持最流行的数字图像文件（数据）格式，这为游戏设计师提供了极大的灵活性。由于 JavaFX 8 API 现已集成到 Java 8 和 9 中，这意味着
  Java 也支持这些图像格式。其中一些数字图像格式已存在数十年，例如 CompuServe 图形交换格式（GIF）或广泛使用的联合图像专家组（JPEG）格式。而
  JavaFX 支持的一些数字图像格式则更为现代；例如，便携式网络图形（PNG，读作“ping”）格式将是我们游戏开发中使用的文件格式，因为它能提供最高质量水平，并支持图像合成——我们很快将学习这一概念。Java
  支持的所有主流数字图像文件格式同样受 HTML5 浏览器支持，由于 Java 应用可嵌入 HTML 应用或网站中，这确实是一种非常合理的协同效应！如果你需要更广泛的数字图像文件格式支持，还可以使用名为
  ImageJ 的第三方数字图像库。


  最古老的格式是一种无损数字图像文件格式，称为 CompuServe GIF。之所以称其为无损，是因为它不会丢弃（丢失）任何源图像数据来实现压缩效果。GIF 压缩算法不如
  PNG 格式精细（强大），且 GIF 仅支持索引颜色，这正是其实现压缩（更小文件大小）的方式。我们将在本节稍后详细学习色彩深度（索引颜色与真彩色）。如果你的所有游戏图像资产已使用
  GIF 格式创建，你可以在 Java 游戏中毫无问题地使用它们，尽管其图像压缩效率较低且图像合成能力有限。


  Java 通过 JavaFX 支持的最流行的数字图像格式是 JPEG。JPEG 使用“真彩色”色彩深度，而非索引色彩深度。我们稍后将介绍色彩理论和色彩深度。JPEG
  采用所谓的有损数字图像压缩。这是因为其压缩算法会“丢弃”图像数据，以实现更小的文件大小。这些图像数据将永久丢失，除非你明智地保存了原始未压缩图像！


  如果你在压缩后放大 JPEG 图像，会看到变色或脏污区域，这些区域在原始图像中显然不存在。图像中退化的区域在数字成像行业被称为压缩伪影。这种情况仅出现在有损图像压缩中，在
  JPEG（和 MPEG）压缩中很常见。


  我推荐你在专业 Java 游戏中使用的数字成像格式是便携式网络图形文件格式。PNG 有两种真彩色文件版本：一种称为 PNG24，不能用于图像合成；另一种称为 PNG32，带有用于定义透明度的
  Alpha 通道，我们稍后将介绍。此外，还有一种索引颜色（最多 256 色，可更少）版本的 PNG 格式，称为 PNG8。


  我推荐在游戏中使用 PNG 的原因在于，它拥有不错的图像压缩算法，并且是一种无损图像格式。这意味着 PNG 兼具出色的图像质量和合理的数据压缩效率，这将使你的游戏分发文件更小。PNG32
  格式的真正强大之处在于，它能够通过透明度与抗锯齿（借助其 Alpha 通道）与其他游戏图像进行合成。




  ### 数字图像分辨率与宽高比：定义图像的尺寸与形状


  你可能知道，数字图像由二维像素阵列构成。像素是图像元素（Picture Elements）的缩写。图像中的像素数量通过其分辨率来表示，即图像宽度（W，有时称为
  X 轴）和高度（H，有时称为 Y 轴）维度上的像素数。图像像素越多，分辨率就越高。这与数码相机的工作原理类似：图像采集设备（通常是相机中用于捕获图像数据的电荷耦合器件
  CCD）的百万像素数越高，所能实现的图像质量就越高。


  要计算图像的总像素数，只需将宽度像素乘以高度像素。例如，一张宽 VGA 800x480 的图像将包含 384,000 个像素，恰好是 1MB 的 3/8。通过这种方式，你可以确定图像的大小，既包括占用的千字节（或兆字节）数，也包括在显示屏上的高度和宽度。


  数字图像资产的形状通过图像宽高比来指定。宽高比是数字图像的宽度:高度比，它定义了正方形（1:1 宽高比）或矩形（也称为宽屏）的数字图像形状。采用 2:1（宽屏）宽高比的显示器（例如
  2160x1080 分辨率）已广泛普及。


  1:1 宽高比的显示器或图像始终是完美的正方形，2:2 或 3:3 宽高比的图像也是如此。例如，物联网开发者可能会在智能手表上看到这种宽高比。需要注意的是，定义图像或显示屏形状的是宽度和高度这两个数字（即
  X 和 Y 变量）之间的比例关系，而非数字本身。实际数字定义的是屏幕的分辨率，即总像素阵列能力。


  宽高比应始终表示为宽高比冒号两侧所能得到（约简）的最小一对数字。如果你在高中学习最小公分母时足够用心，那么计算宽高比对你来说将非常容易。我通常通过不断将冒号两侧的数字除以
  2 来计算宽高比。例如，以 SXGA 1280x1024 分辨率为例，1280x1024 的一半是 640x512，640x512 的一半是 320x256。320x256
  的一半是 160x128，再一半是 80x64，再一半是 40x32，再一半是 20x16。20x16 的一半是 10x8，再一半就得到了 SXGA 的 5:4
  宽高比。


  ### 数字图像色彩理论与色深：定义精确的图像像素颜色


  每个数字图像像素的颜色值可以由三种不同颜色（红色、绿色或蓝色，即 RGB）的量来定义，这三种颜色在每个像素中以不同比例存在。消费电子显示屏利用加色法，即每个 RGB
  颜色通道的光波长相加，从而创造出 1680 万种不同的颜色值。加色法应用于 LCD、LED 或 OLED 显示器。它与印刷中使用的减色法相反。为了展示不同结果，在减色法模型下，将红色与绿色（油墨）混合会产生紫色；而在加色法模型下，将红色与绿色（光）混合则会形成鲜艳的黄色。加色法能提供比减色法更广泛的色谱。


  每个像素所持有的红色、绿色和蓝色颜色值各有 256 级亮度。这允许你设置 8 位数据值范围，即 0 到 255，用于控制每个红、绿、蓝值的颜色亮度变化。这些数据使用十六进制表示法，从最小值
  0（#00，表示关闭、全暗或黑色）到最大值 255（#FF，表示完全开启、最大 RGB 颜色贡献，形成白色）。


  用于表示数字图像所支持像素颜色数量的位数称为图像的色深，它使用“2 的幂”来计算，就像 3D 纹理映射一样（我们将在下一章讨论）。因此，PNG8 图像使用 256
  种颜色，PNG7 使用其一半（128 种），PNG6 使用其一半（64 种），PNG5 使用其一半（32 种），PNG4 则使用 16 种，PNG3 使用 8
  种，PNG2 使用 4 种，PNG1 使用 2 种，即黑色和白色（开或关）。通常，你会希望使用完整的 256 种颜色，因为 JavaFX 仅支持 PNG8、PNG4
  或 PNG1，所以如果你打算使用索引颜色图像，请使用 PNG8。


  数字成像行业中常用的色深包括 8 位、16 位、24 位和 32 位。我将在此概述常见的几种及其格式。最低的色深存在于 8 位索引颜色图像中。这类图像最多包含
  256 种颜色值，并使用 GIF 和 PNG8 图像格式来存储这种索引颜色类型的数据。


  中等色深图像采用 16 位色深，因此包含 65,536 种颜色（计算方式为 256 乘以 256），并得到 TARGA（TGA）和标记图像文件格式（TIFF）数字图像格式的支持。如果你想在
  Java 8 游戏中使用除 GIF、JPEG 和 PNG 之外的数字图像格式，请导入 ImageJ 库。


  真彩色色深图像采用 24 位色深，因此包含超过 1600 万种颜色。计算方式为 256 乘以 256 再乘以 256，等于 16,777,216 种颜色。支持
  24 位色深的文件格式包括 JPEG（或 JPG）、PNG、BMP、XCF、PSD、TGA、TIFF 和 WebP。JavaFX 支持其中三种：JPEG、PNG24（24
  位）和 PNG32（32 位）。使用 24 位或 32 位的真彩色色深图像将为你提供最高级别的质量。这就是我一直建议你在 Java 9 游戏和物联网项目中使用
  PNG24 或 PNG32 格式的原因。


  接下来，让我们看看如何通过使用 PNG32 图像的 Alpha 通道来表示图像透明度。




  ### 数字图像合成：使用 Alpha 通道与图层透明度


  接下来，让我们看看如何利用 Alpha 通道定义数字图像像素的透明度值，以及如何将这些值用于 Java 游戏中的实时数字图像合成。合成是指将多个数字图像图层无缝融合在一起的过程。可以想象，这对于游戏设计与开发而言是一个极其重要的概念。当你希望在显示器上创建一幅看似单一图像（或动画），但实际上是由多个合成图像图层无缝集合而成的画面时，合成技术就非常有用。设置图像或动画合成的主要原因之一，是通过将每个元素放在不同图层上，从而能够以编程方式控制这些图像中的各个元素。


  要实现这一点，你需要一个 Alpha 通道透明度值，利用它可以精确控制该像素与其下方其他图层中相同 X、Y 图像位置像素的混合程度。在数字图像软件中，每个图像图层的透明度值通过棋盘格图案来表示，如图
  2-2 右侧所示。


  ![A336284_1_En_2_Fig2_HTML.jpg](img/A336284_1_En_2_Fig2_HTML.jpg)


  图 2-2.


  展示图像中透明像素的棋盘格表示，以及 RGBA 通道


  在 GIMP 的左侧，你可以看到我以蓝色选中的 Alpha 图层。它包含了 MindTaffy 标志的透明度值。GIMP 的通道面板（我选中的标签页，用于向你展示这些颜色和
  Alpha 通道：红、绿、蓝、Alpha）为每个图层分别保存了这些颜色（和 Alpha）通道，让你能够对每个图像合成图层中的每个像素实现令人难以置信的控制级别。


  与其他 RGB 通道类似，Alpha 通道也有 256 个级别，但这些值代表的是透明度级别，而非红色、绿色或蓝色。在 Java 编程中，Alpha 通道由十六进制表示法中的前两个位置表示，格式为
  `#AARRGGBB` 数据值。我们将在下一节详细讨论这一点。Alpha 加颜色通道的 ARGB 数据值使用八个数据位（32 位），而不是 24 位图像中使用的六个数据位（`#RRGGBB`），后者可被视为
  Alpha 通道数据为零（无）的 32 位图像。


  因此，24 位（PNG24）图像没有 Alpha 通道，除非它作为合成图层堆栈中的背景（底层）图像板，否则不会用于合成。另一方面，PNG32 图像将用作 PNG24（背景板）图像之上的合成图层，或者位于更低
  Z 轴顺序的 PNG32 合成图层之上，这些图层需要利用其 Alpha 通道能力，通过 Alpha 通道透明度值，在图像合成中需要一定透明度（或不透明度）的特定像素位置显示出来。


  数字图像 Alpha 通道以及图像合成的概念，是如何融入 Java 游戏设计的呢？你一定很好奇！其主要优势在于，能够将游戏画面及其包含的精灵、弹丸和背景图形元素分解为多个组件图层。这样做的目的是能够将
  Java 编程逻辑（或 JavaFX、SVG 特效）应用于各个图形图像元素，以控制游戏画面的各个部分。如果没有 2D 合成方法，你将无法单独控制游戏组件，因为逐像素处理对大多数设备来说计算量过大。


  图像合成的另一个部分称为混合模式，它在专业图像合成能力中也起着重要作用。JavaFX 混合模式通过使用 `Blend` 类以及 `javafx.scene.effect`
  子包中的 `BlendMode` 常量值来应用，我们将在本书后面介绍。这个 JavaFX 混合效果类为 Java 游戏开发者提供了许多与 Photoshop 或
  GIMP 为数字图像工匠提供的相同的图像合成模式。这使 Java 和 JavaFX 成为一个强大的图像合成引擎，就像 GIMP 一样，并且混合算法可以通过自定义
  Java 代码在非常灵活的级别上进行控制。一些 JavaFX 混合模式常量包括 `ADD`、`SCREEN`、`OVERLAY`、`DARKEN`、`LIGHTEN`、`MULTIPLY`、`DIFFERENCE`、`EXCLUSION`、`SRC_ATOP`、`SRC_OVER`、`SOFT_LIGHT`、`HARD_LIGHT`、`COLOR_BURN`
  和 `COLOR_DODGE`。




  ### 在 Java 游戏逻辑中表示颜色与透明度：使用十六进制表示法


  既然你已经了解了颜色深度和 Alpha 通道的概念，并且知道在任何数字图像中，颜色和透明度是通过 Alpha、红、绿、蓝（ARGB）四个图像通道的组合来表示的，那么现在重要的是要理解，作为程序员，我们如何在
  Java 和 JavaFX 中表示这四个 ARGB 图像颜色与透明度通道的值。


  在 Java 编程语言中，颜色和透明度不仅用于二维数字图像（通常称为位图图像），也用于二维插图（通常称为矢量图像）。颜色和透明度值也常用于多种不同的颜色设置选项。例如，你可以为
  JavaFX 的 Stage、Scene、布局容器（如 StackPane）、矢量形状填充、UI 控件以及其他元素（如 3D 资产特性）设置背景颜色（或透明度值）。我们将在后续章节中介绍
  3D 和 JavaFX。


  在 Java 和 JavaFX API 中，不同级别的 ARGB 颜色强度值使用十六进制表示法来表示。十六进制，简称“hex”，基于最初的 Base16 计算机表示法。这种表示法很久以前用于表示
  16 位数据值。与更常见的 Base10（从 0 计数到 9）不同，Base16 表示法从 0 计数到 F，其中 F 代表 Base10 中的值 15（0 到
  15 共产生 16 个数据值）。


  Java 中的十六进制值总是以零和 x 开头，因此白色的 24 位颜色值看起来像这样：`0xFFFFFF`。这个十六进制颜色值代表 Java 的 `Color.WHITE`
  常量，并且不使用 Alpha 通道。白色的 32 位颜色值看起来像 `0xFFFFFFFF`，其中 Alpha 通道数据为完全不透明。带有透明 Alpha 通道的白色（实际上不可能是白色，而应该是“透明色”）在
  Java 代码中使用十六进制编码为 `0x00FFFFFF`。我通常使用 `0x00000000` 在 Java 代码中表示透明（透明）的 Alpha+颜色值。


  在 24 位十六进制表示法中，每个位置代表一个 Base16 值，因此要获得每个 RGB 颜色所需的 256 个值，需要占用两个位置，因为 16 乘以 16 等于
  256。因此，要使用十六进制表示法表示 24 位图像，我们需要在 `0x` 之后有六个位置来容纳这六个十六进制数据值（每个数据对代表 256 个级别的值）。如果你计算
  16x16x16x16x16x16，你应该会得到 16,777,216 种颜色，这些颜色可以通过 24 位（也称为真彩色数字图像数据）来寻址。


  十六进制数据位置以以下格式表示 RGB 值：`0xRRGGBB`。对于 Java 常量 `Color.WHITE`，十六进制颜色数据值表示中的红色、绿色和蓝色通道都处于完全（最大颜色值）亮度设置。如果你将这些颜色相加混合，你将得到白光。


  黄色将由红色和绿色通道开启、蓝色通道关闭来表示，因此 `Color.YELLOW` 的十六进制表示将是 `0xFFFF00`，其中红色和绿色通道位置完全开启（`FF`，即
  Base10 数据值 255），而蓝色通道位置完全关闭（`00`，即零值）。


  ARGB 值的八个十六进制数据位置将以以下格式保存数据：`0xAARRGGBB`。因此，对于 `Color.WHITE`，十六进制颜色数据值表示中的所有 Alpha、红色、绿色和蓝色通道都将处于其最大亮度（或不透明度），并且
  Alpha 通道完全不透明，即不透明，由 `FF` 值表示。因此，`Color.WHITE` 常量的 32 位十六进制值将是 `0xFFFFFFFF`。


  100% 透明的 Alpha 通道可以通过将 Alpha 位置设置为零来表示，从而创建“透明”图像。因此，你可以使用 `0x00000000` 到 `0x00FFFFFF`
  之间的任何数据值来表示透明图像像素值。需要注意的是，如果 Alpha 通道值等于这种完全透明级别，那么其他六个（RGB）十六进制数据值位置中包含的 16,777,216
  种颜色值将完全无关紧要，因为该像素将被视为不存在，由于它是透明的，因此不会在最终图像或动画合成图像中合成，所以它的颜色是无关紧要的（完全没有影响）。


  ### 数字图像对象遮罩：使用 Alpha 通道合成游戏精灵


  在游戏设计中，Alpha 通道的主要应用之一是遮罩图像或动画（图像序列）的某些区域，以便在游戏图像合成场景中将其用作游戏精灵。遮罩是从数字图像中“裁剪”出主题对象的过程，以便可以使用
  Alpha 通道透明度值将其放置在自己的图层上。这是使用数字成像软件包完成的，如图 2-2 所示。


  像 Photoshop 或 GIMP 这样的数字图像合成软件包都包含用于遮罩和图像合成的工具。没有有效的遮罩，就无法进行有效的图像合成，因此对于希望将图形元素（如图像精灵和精灵动画）集成到游戏设计中的游戏设计师来说，这是一个需要掌握的重要领域。数字图像遮罩艺术已经存在了很长时间！


  遮罩可以自动为你完成，使用专业的蓝屏（或绿屏）背景以及能够自动提取这些精确颜色值以创建遮罩的计算机软件。这个遮罩被转换为 Alpha 通道（透明度）信息（数据）。遮罩也可以手动完成，通过使用数字图像软件，结合各种锐化和模糊算法，使用其中一种算法选择工具。


  在本书的课程中，我们将使用常见的开源软件包（如 GIMP）来学习这个工作流程的很多内容。遮罩可能是一个复杂且涉及面广的工作流程，完全掌握这个过程可能需要跨越几个章节，而不是试图将其全部塞进本书的一个章节（本章）。本章旨在让你了解我们在本书中将要进行的工作流程的基础知识。


  遮罩过程的一个关键考虑因素是围绕遮罩对象（主题）获得平滑、锐利的边缘。这样，当你将一个遮罩对象（在本书中，它将是一个游戏精灵）放置到（覆盖在）新的背景图像上时，对于游戏玩家来说，它看起来就像最初是在那里拍摄的一样（就像在视频中一样）。


  成功做到这一点的关键在于像素选择工作流程，这涉及使用数字图像软件选择工具，例如 GIMP 中的剪刀工具或 Photoshop 中的魔棒工具。这些工具必须以正确的方式（顺序）使用才能完全有效。使用正确的选择工作流程至关重要！


  例如，如果你想要遮罩的对象周围有颜色均匀的区域（也许你是在蓝屏前拍摄的），你将使用魔棒工具并设置适当的阈值来选择除对象之外的所有内容。然后反转选区，这将为你提供一个包含该对象的选区集。通常，正确的工作流程涉及逆向思考。其他选择工具包含复杂的算法，可以查看像素之间的颜色变化。这些对于边缘检测很有用，我们可以将其用于其他选择方法。




  ### 平滑数字图像合成：使用抗锯齿技术平滑图像边缘


  抗锯齿是一种流行的数字图像合成技术，它将数字图像中位于两个不同颜色区域边界上的相邻颜色沿该边界混合在一起。当图像缩小时，这会使边缘看起来更平滑（锯齿更少）。其作用是“欺骗”观看者的眼睛，使其看到更平滑的边缘，并消除所谓的图像锯齿。抗锯齿通过仅使用需要平滑的边缘上的几个彩色像素的平均颜色值，就能产生令人印象深刻的效果。所谓平均颜色值，是指介于图像锯齿边缘上两种颜色之间的某个颜色范围。这只需要大约六种中间色。我创建了一个示例来说明这一点；请参见图
  2-3。


  ![A336284_1_En_2_Fig3_HTML.jpg](img/A336284_1_En_2_Fig3_HTML.jpg)


  图 2-3.


  一个红色圆形合成在黄色背景上（左图）及其放大视图（右图），展示了抗锯齿效果


  如您所见，我在一个图层上创建了一个看似边缘锐利的红色圆形，并在背景图层上覆盖了黄色填充色。我放大了红色圆形形状的边缘，截取了另一张截图，并将其放置在缩小后的圆形右侧。这揭示了从黄橙色到橙色再到红橙色的抗锯齿颜色值范围，正好位于红色和黄色相互邻接的边缘上，即圆形与背景相交的边界处。


  需要注意的是，JavaFX 引擎将使用 Java2D 软件渲染器或硬件渲染的 i3D（使用 Prism 引擎，该引擎可调用 OpenGL 或 DirectX），根据背景颜色和背景图像对
  2D 形状和 3D 对象进行抗锯齿处理。您仍需负责正确合成，即通过有效使用我们在本章前面学过的 Alpha 通道，为您的多层图像提供抗锯齿效果。


  ### 数字图像数据优化：使用压缩、索引颜色和抖动


  许多因素会影响数字图像压缩，您可以使用一些基本技术，以更小的数据占用空间获得更高质量的结果。这是优化数字图像的主要目标：为您的应用程序（在此例中为游戏）获得尽可能小的数据占用空间，同时实现最高质量的视觉效果。我们将从对数据占用空间影响最大的方面开始，并研究每个方面如何有助于任何给定数字图像的数据占用空间优化。有趣的是，这些方面与我们迄今为止在本图像处理部分所涵盖的数字图像概念的顺序相似。


  对最终数字图像资产文件大小（我称之为数据占用空间）影响最大的因素是像素数量，即数字图像的分辨率。这合乎逻辑，因为每个像素都需要与其三个（24 位）或四个（32
  位）通道中包含的颜色和 Alpha 值一起存储。在保持图像清晰的前提下，您能获得的分辨率越小，最终的文件大小就越小。


  原始（或未压缩）图像大小的计算方式为：对于 24 位 RGB 图像，宽度乘以高度乘以 3；对于 32 位 ARGB 图像，则为宽度乘以高度乘以 4。例如，一幅未压缩的真彩色
  24 位 VGA 图像，其原始（原始）未压缩数字图像数据为 640 乘以 480 乘以 3，等于 921,600 字节。要确定这幅原始 VGA 图像有多少千字节，您需要将
  921,600 除以 1024（一千字节中的字节数），这将得出真彩色 VGA 图像的数据量正好为 900 KB。


  通过优化数字图像分辨率来优化原始（未压缩）图像大小非常重要。这是因为一旦图像从游戏应用程序文件中解压缩到系统内存中，它就会占用这么多内存，因为图像在内存中将使用
  24 位（RGB）或 32 位（ARGB）表示法逐像素存储。这也是我在游戏开发中使用 PNG24 和 PNG32 而非索引颜色（GIF 或 PNG8）的原因之一，因为如果操作系统要将颜色转换到
  24 位颜色“空间”，那么我们应该出于质量原因利用该 24 位颜色空间，并处理（接受）稍大的应用程序文件大小。


  图像颜色深度是影响压缩图像数据占用空间的次关键因素，因为图像中的像素数量会乘以一个（8 位）、两个（16 位）、三个（24 位）或四个（32 位）颜色数据通道。这种较小的文件大小是
  8 位索引颜色图像（尤其是使用 GIF 图像格式）仍被广泛使用的原因。


  如果构成图像的颜色变化不大，索引颜色图像可以模拟真彩色图像。索引颜色图像仅使用 8 位数据（256 种颜色）来定义图像像素颜色，使用一个包含最多 256 种优化选择颜色的所谓调色板，而不是包含
  256 级颜色的 3 个 RGB 颜色通道或 4 个 ARGB 颜色通道。再次强调，需要注意的是，在您通过压缩将 24 位图像转换为 8 位图像后，一旦它在系统内存中解压缩并转换回游戏使用的
  24 位 RGB 或 ARGB 数据模型（系统内存外使用的表示形式），您只能使用原始 1680 万种颜色中潜在的（最多）256 种颜色！这就是为什么我提倡使用
  PNG24 或 PNG32 图像，而不是 JavaFX 也支持的 GIF 或 PNG1（1 色）、PNG2（4 色）、PNG4（16 色）和 PNG8（256
  色）图像。




  根据任意 24 位源图像中使用的颜色数量，用 256 种颜色来表示原本包含 16,777,216 种颜色的图像，可能会产生一种称为“条带效应”的现象。这指的是在压缩后生成的
  256 色（或更少）调色板中，相邻颜色之间的过渡不够渐变，因此无法呈现平滑的色彩渐变效果。索引颜色图像有一个选项可以通过视觉校正来改善条带效应，这个选项称为“抖动”。


  抖动是一种算法过程，通过在图像中任何相邻颜色之间的边缘创建点状图案，来欺骗人眼，使其认为使用了第三种颜色。抖动最多能让你感知到 65,536 种颜色（256x256），但这仅在
  256 种颜色中的每一种都与另外 256 种不同颜色中的一种相邻时才会发生（或才有必要）。尽管如此，你仍能看到创造额外颜色的潜力，并且你会惊讶于索引颜色格式在某些压缩场景下（针对特定图像）所能达到的效果。


  让我们拿一张真彩色图像（例如图 2-4 中所示的图像）为例，将其保存为 PNG5 索引颜色图像格式，来向你展示这种抖动效果。需要注意的是，尽管 PNG5 在 Android
  和 HTML5 中受支持，但在 JavaFX 中并不受支持，所以如果你自己动手做这个练习，请选择 PNG1（2 色）、PNG2（4 色）、PNG4（16 色）或完整的
  PNG8（256 色）颜色选项！


  ![A336284_1_En_2_Fig4_HTML.jpg](img/A336284_1_En_2_Fig4_HTML.jpg)


  图 2-4.


  这是一张使用 Autodesk 3ds Max 创建的 PNG24 真彩色图像，我们将把它压缩为 PNG5


  我们将观察奥迪 3D 图像中驾驶员侧后翼子板上的抖动效果，因为它包含一个灰色渐变区域，我们将对此应用抖动效果。你可以在图 2-4 中看到 24 位源数字图像。


  有趣的是，允许使用少于 8 位索引颜色图像所能使用的最大 256 种颜色。这样做通常是为了进一步减小图像的数据占用空间。例如，一张仅使用 32 种颜色就能获得良好效果的图像，实际上是一张
  5 位图像，技术上应称为 PNG5，尽管该格式本身在索引颜色使用层面通常被称为 PNG8。请记住，JavaFX 仅支持 PNG4（16 色）或 PNG8（256
  色），因此对于 Java 游戏中的这张图像，你将使用 PNG8，即 256 色。


  我将使用 Photoshop 将图 2-5 中所示的这张索引颜色 PNG5 图像设置为使用 5 位颜色（32 色），以便你能清晰地看到这种抖动效果。正如你所见，在图
  5-4 左侧的 Photoshop 图像预览区域中，抖动算法在相邻颜色之间创建了点状图案，以生成额外的颜色。


  ![A336284_1_En_2_Fig5_HTML.jpg](img/A336284_1_En_2_Fig5_HTML.jpg)


  图 2-5.


  将抖动设置为扩散算法，32 种颜色（5 位颜色），并以 100%的抖动强度进行 PNG5 输出


  另外，请注意你可以设置抖动的百分比。我通常选择 0%或 100%的设置；不过，你也可以在这两个极端值之间微调抖动效果，以精细调整最终的文件大小，因为这些抖动点状图案会引入更多需要压缩的数据，从而增加文件大小。


  你还可以在不同的抖动算法之间进行选择，因为正如你可能已经推测到的，这些不同的抖动效果是通过数学方式，使用与索引文件格式压缩（该压缩使用调色板来存储像素所用的颜色值）最终兼容的抖动算法来生成的。


  我使用扩散抖动，它能沿着不规则形状的渐变区域产生平滑效果，就像在汽车翼子板上看到的那样。你也可以使用噪声选项，它更随机化；或者图案选项，它不那么随机化。扩散选项通常能给出最佳效果，这就是我在使用索引颜色时（虽然不常用）选择它的原因。


  正如你可能想象的那样，抖动会向图像中添加数据图案。这些图案更难压缩。这是因为图像中的平滑区域（如渐变或填充区域）通常更容易被这些压缩算法压缩，而锐利过渡（抗锯齿边缘）或通常由抖动产生的随机像素图案（或者可能由
  CCD 质量不佳的相机产生的“噪声”）则更难压缩。


  因此，应用抖动选项总是会使数据占用空间增加几个百分点。请务必检查应用抖动和不应用抖动（在导出对话框中选择）时的最终文件大小，以判断这是否值得其带来的视觉改善效果。请注意，索引颜色
  PNG 图像还有一个透明度选项复选框，但 PNG8 图像中使用的 Alpha 通道只有 1 位（开/关），不像 PNG32 那样是 8 位。


  到目前为止，我们学到的最后一个可能增加图像数据占用空间的概念是添加 Alpha 通道来定义透明度，以便进行合成。这是因为添加 Alpha 通道会向被压缩的图像中增加另一个
  8 位颜色通道（更准确地说，是透明度或 Alpha 通道）。如果你需要 Alpha 通道来定义图像的透明度（很可能是为了支持未来的合成需求，例如将图像用作游戏精灵），那么在这方面没有太多选择，所以请包含
  Alpha 通道。


  如果你的 Alpha 通道包含全零值（即使用全黑填充色，这将定义你的图像为完全透明），或者如果你的 Alpha 通道包含全 FF 值（或使用全白填充色，定义你的图像为完全不透明或背景底板），那么你实际上（在实际使用中）定义的是一个不包含任何有用
  Alpha 数据值的 Alpha 通道。因此，未使用的 Alpha 通道需要被移除，而不透明的图像则需要定义为 PNG24 而非 PNG32，以节省数据占用空间。


  最后，大多数用于遮罩数字图像 RGB 图层中对象的 Alpha 通道应该能压缩得很好。这是因为它们大部分是白色（不透明）和黑色（透明）区域，在两种颜色之间的边缘处有一些中等灰度值，用于对遮罩进行抗锯齿处理（见图
  2-2）。Alpha 通道中包含抗锯齿透明度值的这些灰色区域，将始终为你提供图像 RGB 图层中的对象与可能在其后面的任何背景颜色或背景图像之间视觉上平滑的边缘过渡。本质上，Alpha
  通道中的抗锯齿功能为你提供了该 Alpha 通道所服务对象的实时合成能力，因为你可以在其后面的背景底板中放置视频，而 Alpha 抗锯齿功能将实时保证在视频的每一帧上，通过不同的边缘颜色混合实现平滑的边缘效果。




  原因在于，你的 Alpha 通道图像蒙版使用的是 8 位透明度渐变，范围从白色到黑色，定义的是透明度级别而非颜色，因此应将其视为逐像素混合或透明度强度值。因此，Alpha
  通道中包含的蒙版中每个对象边缘的中等灰度值，将用于对对象边缘与任何目标背景的颜色进行平均，无论背景板可能包含何种颜色值、图像资源、插画资源、动画资源或视频资源。


  这能为任何可能使用的目标背景提供实时抗锯齿效果，即使你的对象是静态对象也是如此，因为 Alpha 通道提供的抗锯齿功能甚至能在动态背景中生效。


  ## 数字视频或动画：帧、帧率、循环、方向


  值得注意的是，我们刚刚讨论的所有关于数字图像的概念同样适用于数字视频和 2D 动画，因为这两种第四维度（基于时间）的新媒体格式都以数字图像作为其内容的基础。数字视频以及
  2D 动画通过引入一种称为“帧”的概念，将数字图像扩展到了时间的第四维度。数字视频和动画由一系列有序的帧组成，这些帧随时间快速显示，从而创造出运动的错觉，使图像栩栩如生。


  “帧”一词源于电影行业，即使在今天，电影帧仍以每秒 24 帧（通常缩写为 24 FPS）的帧率通过电影放映机播放，从而产生运动错觉。由于数字视频和动画都由包含数字图像的帧集合组成，因此帧率（以每秒帧数表示）这一概念在内存数据占用优化工作流程（针对动画资源）和数字视频文件大小数据占用优化工作流程中都至关重要。在
  JavaFX 中，你很快就会学到，动画的这一属性存储在 `Animation` 对象的 `rate` 变量中。


  关于 `Animation` 对象或数字视频资源中帧的优化概念，与图像中像素（数字图像的分辨率）的优化概念非常相似：使用得越少越好！这是因为动画或视频中使用的每一帧都会成倍增加系统内存使用量和文件大小数据占用。在数字视频中，不仅每帧（图像）的分辨率会极大地影响文件大小，压缩设置对话框中指定的每秒帧数（即帧率）也同样重要。在本章前面，我们了解到，如果将图像中的像素数乘以其颜色通道数，就能得到图像的原始数据占用。对于动画或数字视频，我们现在需要将这个数字再乘以为了创造运动错觉所需使用的总帧数。


  因此，如果我们为游戏设置一个动画 VGA（RGB）背景板（请记住每帧为 900KB），该背景板使用五帧来创造运动错觉，那么我们将使用 900KB 乘以 5，即
  4500KB（或 4.5MB）的系统内存来容纳该动画。当然，这对于背景来说内存占用过高，这就是为什么在本书中我们将使用带有精灵叠加层的静态背景，以不到 1MB
  的内存实现相同的最终效果。数字视频的计算略有不同；对于数字视频，你会有成百上千帧。对于数字视频，你需要将原始图像数据大小乘以每秒帧数（帧率），即数字视频设定的播放帧率（该帧率值在压缩过程中指定），然后将该结果乘以视频文件中包含的内容总时长（秒数）。


  继续使用之前的 VGA 示例，你现在知道一个 24 位 VGA 图像是 900KB。这使得下一步的计算变得非常简单。传统数字视频以 30 FPS 运行，因此在屏幕播放之前，系统内存中一秒钟的标准清晰度（SD
  或 VGA）原始（未压缩）数字视频将是 30 个图像帧，每帧 900KB，产生总内存数据占用为 27000KB，约 27MB！


  你可以理解为什么像 MPEG-4 H.264 AVC 这样的数字视频压缩文件格式如此重要，因为它能显著压缩数字视频可能产生的巨大原始数据占用。


  JavaFX 多媒体包使用了最令人印象深刻的视频压缩编解码器之一（codec 代表 COde-DECode），该编解码器也受 HTML5 和 Android 支持：即前面提到的
  MPEG-4 H.264 高级视频编解码器（AVC）。这种跨越当今三大“开放平台”（Java、HTML5 和 Android）的“跨开放平台支持”对于开发者资源优化来说极为便利，因为单个数字视频资源可以跨
  Java、JavaFX、HTML5 和 Android 应用程序使用。JavaFX 引擎中还包含一个名为 VP6 的“原生”数字视频编解码器，以防 H.264
  未安装。接下来，为了全面起见，我将在深入讲解数字音频之前，介绍数字视频资源压缩和数据占用优化的基础知识。然后，在下一章中，我们将深入探讨 3D 的复杂性，以便你对游戏中的新媒体元素有一个完整的基础理解。




  ### 数字视频压缩概念：比特率、数据流、标清、高清和超高清


  首先，我们来介绍商业视频中使用的主要或标准分辨率。这些分辨率也恰好是常见消费电子设备的屏幕分辨率，原因可能是：如果显示屏的像素分辨率与屏幕上“全屏”播放的视频像素分辨率匹配，就不会产生“缩放”，而缩放会导致伪影。在高清电视（HDTV）或高清晰度出现之前，视频被称为标清（SD），并使用
  480 像素的标准垂直分辨率。VGA 是一种标清分辨率，而 720×480 可称为宽屏标清分辨率。高清（HD）视频有两种分辨率：1280×720（我称之为伪高清）和
  1920×1080（业界称之为真高清）。这两种高清分辨率均采用 16:9 的宽高比，并用于电视和智能电视、智能手机、平板电脑、电子书阅读器和游戏机。现在还有一种超高清（UHD）分辨率，其像素为
  4096×2160。IMAX 分辨率曾是 4096×4096，因此超高清在水平（x 轴）分辨率上达到了 IMAX 级别，这相当令人印象深刻，因为消费者现在只需
  1000 美元就能在客厅里享受 IMAX 体验！


  视频流是一个比分辨率更复杂的概念，因为它涉及在广阔范围内播放视频数据，例如在你的 Java 游戏应用程序与存储着海量数字视频资产的远程视频数据服务器之间。流式传输之所以复杂，是因为你的
  Java 游戏应用程序所运行的设备将与远程数据服务器进行实时通信，在视频播放的同时接收视频数据包！这就是它被称为“流”的原因：视频从视频服务器通过互联网流式传输到硬件设备中。视频流由
  MPEG-4 H.264 AVC 格式编解码器（编码器-解码器对）支持。


  本节需要介绍的最后一个概念是比特率。比特率是视频压缩过程中使用的关键设置；比特率代表你的目标带宽或数据管道大小，该管道每秒能够容纳一定数量的比特流通过。你的比特率设置还应考虑任何支持
  Java 的设备中的 CPU 处理能力，这使得数字视频的数据优化更具挑战性。幸运的是，如今大多数设备都配备了双核或四核 CPU！


  原因在于，一旦这些比特通过数据管道传输，它们还需要被处理并显示到设备屏幕上。因此，数字视频资产的比特率不仅需要针对带宽进行优化，还需要考虑到 CPU 处理能力的差异。某些单核
  CPU 可能无法解码高分辨率、高比特率的数字视频资产，从而导致丢帧。如果你的目标是较旧或较便宜的消费电子设备（例如第三世界国家使用的设备），请务必优化低比特率的视频资产。


  ### 数字视频数据占用优化：视频编解码器的重要设置


  正如你在上一节所学到的，数字视频资产是使用称为编解码器的软件工具进行压缩的。视频编解码器有两个“方面”：一个用于编码视频数据流，另一个用于解码视频数据流。视频解码器将是你的操作系统、平台（JavaFX）或使用它的浏览器的一部分。解码器主要针对速度进行优化，因为播放的流畅性是一个关键问题；而编码器则针对减少其生成的数字视频资产的数据占用进行优化。因此，编码过程可能需要更长时间，并且取决于工作站包含多少个处理核心。大多数数字视频内容制作工作站应支持八个处理器核心，就像我的
  64 位 AMD 八核工作站一样。


  编解码器（编码器端）类似于插件，因为它们可以安装到不同的数字视频编辑软件包中，以便这些软件能够编码不同的数字视频资产文件格式。由于 Java 和 JavaFX
  9 原生支持 ON2 VP6 格式，并且如果安装了 MPEG4，你也需要确保你使用的数字视频软件包支持使用这些数字视频文件格式之一来编码数字视频。


  需要注意的是，不止一家软件制造商生产 MPEG4 编码软件，因此不同的 MPEG4 H.264 AVC 编解码器在编码速度和文件大小方面会产生不同（更好或更差）的结果。我更喜欢
  MainConcept H.264 编解码器。一个专业的解决方案是 Sorenson Squeeze Pro，我强烈建议你获取它，如果你想专业地制作数字视频的话，它支持
  ON2 VP6。


  我将在图 2-6 中向你展示 Sorenson Squeeze Pro 的数字视频压缩设置（预设）对话框，然后在本书本节的剩余部分中，我们将讨论其中一些重要的设置。


  ![A336284_1_En_2_Fig6_HTML.jpg](img/A336284_1_En_2_Fig6_HTML.jpg)


  图 2-6. Sorenson Squeeze Pro 数字视频压缩工具的数字视频压缩预设对话框


  还有一个名为 EditShare LightWorks 14 的开源解决方案，它计划在 2018 年之前原生支持输出到开源编解码器。目前，在 EditShare
  LightWorks 14 于 2018 年某个时候添加对 JavaFX（以及 HTML5 和 Android）的编解码器支持之前，我不得不为本书使用 Squeeze
  Pro 11。在优化数字视频数据文件大小（设置压缩参数）时，有大量变量会直接影响数字视频数据占用。我将按照它们对视频文件大小的影响程度，从最大到最小依次介绍这些变量，以便你知道调整哪些参数来获得你想要的结果。


  与数字图像压缩一样，视频每一帧的分辨率或像素数量是开始优化过程的最佳起点。如果你的用户使用的是 1024×640 或 1280×720 的智能手机、电子阅读器或平板电脑，那么你无需使用真高清（1920×1080）分辨率即可为你的数字视频资产获得良好的视觉效果。借助当今超精细密度（小点距）的显示屏，你可以将
  1280 视频放大 33%，它看起来也会相当不错。但一个例外可能是针对智能电视的高清或超高清（俗称 4K 智能电视）游戏；对于这些巨大的 65 到 96 英寸屏幕场景，你需要使用业界标准的真高清
  1920×1080 分辨率。




  下一层级的优化将涉及每秒视频所使用的帧数（即 FPS），前提是数字视频本身的实际秒数无法缩短。这被称为帧率，与其采用图 2-6 左上角所示的视频标准 30 FPS
  帧率（设置为 1:1，即每个源帧压缩为一帧），不如考虑使用电影标准帧率 24 FPS，甚至多媒体标准帧率 20 FPS。你甚至可能使用 15 FPS 的帧率，这相当于视频标准
  30 FPS 的一半，对应图 2-6 中“帧率”字段的 1:2 设置，具体取决于内容中运动的幅度（和速度）。请注意，15 FPS 的数据量仅为 30 FPS 的一半（编码数据减少
  100%）。对于某些视频内容，其播放效果（观感）可能与 30 FPS 内容相同。测试这一点的唯一方法是尝试不同的帧率设置，并在视频优化（编码）过程中观察结果。


  获得更小数据量的下一个最优设置是为你所设定的编解码器尝试达到的比特率。这在图 2-6 左侧以红色圆圈标出。比特率等同于所应用的压缩量，因此决定了数字视频数据的质量水平。需要注意的是，你可以简单地使用
  30 FPS、1920 分辨率的高清视频，并指定一个较低的比特率上限。但这样做出来的效果，远不如你首先尝试使用较低帧率和（或）较低分辨率进行压缩，同时配合使用较高（质量）比特率设置来得专业。这方面没有固定的经验法则，因为每个数字视频资产都包含
  100%不同且独特的数据（从编解码器算法的角度来看）。


  获得更小数据量的下一个最有效设置是关键帧的数量，编解码器利用关键帧对你的数字视频资产进行采样。该设置在图 2-6 右侧以红色圆圈标出。视频编解码器通过查看每一帧，然后对后续若干帧中的像素变化进行编码来应用压缩，这样编解码器算法就不必对视频数据流中的每一帧都进行编码。这就是为什么“说话人头”视频的编码效果优于每一帧每个像素都在移动的视频（例如带有摄像机平移的视频）。


  关键帧是编解码器中的一种设置，它强制编解码器每隔一定时间对视频数据资产进行一次全新的采样。关键帧通常有自动设置，允许编解码器自行决定采样多少个关键帧；也有手动设置，允许你指定每隔一定时间进行一次关键帧采样，通常是每秒一定次数，或者在整个视频时长内（总帧数）的一定次数。


  某些编解码器设置对话框具有质量或锐度设置（滑块），用于控制在压缩前应用于视频帧的模糊程度。如果你不知道这个技巧，那么对图像或视频施加轻微的模糊（通常是不希望的）可以实现更好的压缩，因为图像中锐利的过渡（锐利边缘）比柔和的过渡更难编码（再现它们需要更多数据）。话虽如此，我建议将质量（或锐度）滑块保持在
  85%到 100%的质量水平之间，然后尝试通过我们这里讨论的其他变量（例如降低分辨率、帧率或比特率）来减小数据量。


  最终，你需要微调多个变量，才能为任何给定的数字视频数据资产实现最佳的数据量优化。重要的是要记住，每个数字视频资产在数字视频编解码器看来（从数学角度）都是“不同”的。因此，无法制定出能够实现任何给定压缩结果的标准设置。话虽如此，随着时间的推移，通过经验来调整各种设置，你最终会更好地感知需要更改哪些设置才能获得期望的最终结果。


  ## 数字音频概念：振幅、频率、采样、波形


  各位音响发烧友已经知道，声音是通过发送脉冲穿过空气的声波产生的。数字音频很复杂；其复杂性部分源于需要桥接由扬声器纸盆创造的“模拟”音频技术与数字音频编解码器。模拟扬声器通过脉冲产生声波。我们的耳朵则以完全相反的方式接收模拟音频，捕捉并接收这些空气脉冲或具有不同波长的振动，然后将它们转换回我们大脑可以处理的“数据”。这就是我们“听到”声波的方式；我们的大脑随后将不同的音频声波频率解释为不同的音符或音调。


  声波根据其频率产生各种音调。宽或低频（长）波产生低音（低音调），而高频（短）波长产生高音（高音调）。有趣的是，不同频率的光会产生不同的颜色，因此模拟声音（音频）和模拟光（颜色）之间存在密切的关联。数字图像（和视频）与数字音频之间还有许多其他相似之处，这些相似之处将贯穿你的数字新媒体内容制作过程，你很快就会看到。


  声波的音量由声波的振幅或该波的高度（或大小）决定。因此，声波的频率相当于波在 x 轴上的间距（如果从二维角度看），而振幅相当于波在 y 轴上测量的高度。


  声波可以具有独特的形状，允许声波“搭载”各种音效。一种“纯”或基线类型的声波称为正弦波，你在高中三角学中学习过，使用了正弦、余弦和正切数学函数。熟悉音频合成的人都知道，声音设计中还使用了其他类型的声波，例如看起来像锯子边缘的锯齿波（因此得名），或者仅使用直角形成的脉冲波，从而产生即时的开/关声音，转化为合成数字音频的脉冲（或突发）。


  即使是随机化的波形，例如噪声，也被用于声音设计以获得“前卫”的声音效果。正如你可能通过运用你最近获得的关于数据量优化的知识所推断的那样，声波（以及一般的新媒体数据）中存在的“混沌”或噪声越多，编解码器就越难压缩它们。因此，更复杂的声波将导致更大的数字音频文件大小，因为数据中存在混沌。




  ### 将模拟音频转换为数字音频数据：采样、精度与高清音频


  将模拟音频（声波）转换为数字音频数据的过程称为**采样**。如果你在音乐行业工作，可能听说过一种被称为采样器的键盘（甚至机架式设备）。采样是将模拟音频波形切割成片段的过程，这样你就可以使用数字音频格式将波形的形状存储为数字音频数据。这会将无限精确的模拟声波转换为离散的数字数据，即零和一。使用的零和一越多，对无限精确（原始）模拟声波的还原就越精确。采样音频波形的每个数字片段被称为一个**样本**，因为它在该精确时间点对该声波进行了采样。样本精度决定了用于还原模拟声波所使用的零和一的数目，因此样本的精度由定义每个波形片段高度所使用的数据量决定。图
  2-7 展示了我使用 Audacity 采样的一个按钮音效，使用了 32 位浮点样本精度和 48 kHz 采样率，我们将在下一部分介绍这些概念。


  ![A336284_1_En_2_Fig7_HTML.jpg](img/A336284_1_En_2_Fig7_HTML.jpg)


  图 2-7.


  在 Audacity 中使用 32 位浮点样本精度和 48kHz 采样率得到的按钮音效立体声样本


  与数字成像一样，这种采样精度被称为**分辨率**，或者更准确地说（无意双关），**采样分辨率**。采样分辨率通常定义为 8 位、12 位、16 位、24 位或
  32 位。Java 游戏大多利用 8 位分辨率来处理爆炸等对清晰度要求不高的效果，使用 12 位分辨率来处理清晰的人声对话和更重要的音效资源，并可能使用 CD
  品质的 16 位分辨率来处理背景音乐或需要展现纯净音质的音频元素。


  在数字成像和数字视频中，分辨率以像素数量来衡量；而在数字音频中，分辨率则以定义每个模拟音频样本所使用的数据位数来衡量。就像在数字成像中（更多像素带来更高质量）一样，更高的采样分辨率能带来更好的声音还原效果。因此，更高的采样分辨率使用更多数据来还原给定的声波样本，会带来更高的音频播放质量，但代价是更大的数据占用空间。这就是为什么通常被称为
  CD 品质音频的 16 位音频听起来比 8 位音频更好的原因。根据具体音频内容，12 位可以是一个很好的折衷方案。


  在数字音频领域，消费电子行业中出现了新型的 24 位音频样本，称为**高清音频**。高清数字音频广播电台使用 24 位采样分辨率。每个音频样本，或者说声波的一个切片，理论上可以包含多达
  16,777,216 位的声波采样分辨率，尽管这些位很少被全部使用。


  一些新的硬件设备现在支持高清音频，例如你看到的标榜“高清音质”的智能手机广告。这意味着它们拥有 24 位音频硬件。如今的 PC 和笔记本电脑，以及游戏机和 iTV
  电视，也标配了 24 位音频播放硬件，因此支持高品质音频的基础已经具备。


  需要注意的是，对于 Java 9 游戏来说，高清音频可能并非必需，除非你的游戏以音乐为导向并使用了高品质音乐，在这种情况下，你可以通过 WAVE 文件格式使用高清音频样本。


  除了数字音频采样分辨率，我们还有数字音频采样频率。它指的是在**一秒**的采样时间范围内，以特定采样分辨率采集的样本数量。在数字图像编辑中，采样频率类似于数字图像中包含的颜色数量。采样频率也可以称为**采样率**。你可能熟悉“CD
  品质音频”这个术语，它定义为使用 16 位采样分辨率和 44.1 kHz 采样率。这意味着每秒采集 44,100 个样本，每个样本包含 16 位采样分辨率，或者说这
  44,100 个样本中的每一个都包含 65,536 位音频数据。你可以通过将采样比特率乘以采样频率再乘以音频片段的秒数来计算音频文件中的原始数据量。你会发现这可能是一个巨大的数字！音频编解码器非常擅长将采样的声波数据优化到令人惊讶的小数据占用空间，同时音质损失几乎听不出来。


  因此，数字成像和数字视频中存在的权衡在数字音频中同样存在。我们包含的数据越多，获得的结果质量就越高！然而，这总是以更大的数据占用空间为代价。在视觉媒介中，数据占用空间的大小由颜色深度、像素以及（对于数字视频和动画而言）帧数来定义。在数字音频媒介中，则由采样分辨率和采样率共同定义。目前数字音频行业中最常见的采样率包括
  8kHz、11.25 kHz、22.5kHz、32kHz、44.1kHz、48kHz、96kHz、192kHz，甚至 384kHz。


  较低的采样率，例如 8kHz、22kHz 和 32kHz，将是我们游戏中使用的主要采样率，因为通过精心优化，它们可以产生高质量的音效和街机音乐。这些采样率也最适合对任何“基于语音”的数字音频进行采样，例如电影对白或电子书旁白音轨。较高的采样率能够实现影院级音质的音频还原，但对于大多数游戏来说并非必需。


  ### 数字音频资源播放：内嵌音频播放 vs. 流式音频


  与数字视频数据一样，数字音频数据可以是**内嵌**的，即包含在应用程序的分发文件（在 Java 中，即 JAR 文件）中；或者，数字音频也可以使用远程数据服务器进行**流式**传输。与数字视频类似，流式传输数字音频数据的优点是可以减少应用程序文件的数据占用空间，就像流式传输数字视频数据一样。缺点则是可靠性。许多相同的概念同样适用于音频和视频。流式音频将节省数据占用空间，因为你无需将所有那些沉重的新媒体数字音频数据都包含在
  JAR 文件中。因此，如果你计划编写一个点唱机应用程序，可能需要考虑流式传输你的数字音频数据。否则，请尝试优化你的数字音频数据，以便将其（内嵌）包含在 JAR
  文件中。这样，当应用程序的用户需要时，它总是可用的！


  流式数字音频的缺点是，如果用户的连接（或音频数据服务器）出现故障，你的数字音频文件可能无法始终供最终用户使用你的游戏应用程序进行播放和收听。数字音频数据的可靠性和可用性是“流式音频数据与内嵌数字音频数据”权衡中需要考虑的关键因素。同样的权衡也适用于数字视频资源。


  与数字视频一样，关于流式传输数字音频的主要概念之一是你的数字音频数据的**比特率**。正如你在上一节中学到的，这个比特率是在压缩过程中定义的。与数字视频一样，需要支持较低比特率带宽的数字音频文件将对音频数据应用更多的压缩，这将导致质量降低。这些文件将在更多设备上更流畅地流式传输（播放），因为更少的比特可以更快地传输和处理。



  ### JavaFX 中的数字音频资源：数字音频编解码器与数据格式支持


  JavaFX 支持的数字音频编解码器数量远多于数字视频编解码器，因为视频编解码器只有两种，即 MPEG-4 H.264 AVC 或 ON2 VP6。JavaFX
  的音频支持包括 MP3（MPEG3）文件、Windows Wave（脉冲编码调制 [PCM] 音频）WAV 文件、MP4（或 M4A）MPEG-4 AAC 音频，以及苹果的
  AIFF（PCM）文件格式。JavaFX 支持的最常见音频格式是 MP3 数字音频文件格式。MP3 数字音频文件格式之所以流行，是因为它具有良好的压缩质量比，并且得到了广泛支持。


  MP3 是一种可接受的数字音频格式，可用于 Java 游戏或物联网应用，只要你能通过最优的编码工作流程，从中获得尽可能高的质量水平。需要注意的是，MP3 是一种有损音频文件格式，就像
  JPEG 用于数字图像一样，在压缩过程中，部分音频数据（以及因此带来的部分原始音频样本质量）会被丢弃，且之后无法恢复。


  JavaFX 确实有两种无损音频压缩编解码器，分别称为 AIFF 和 WAVE。你可能对这些数字音频格式很熟悉，因为它们分别是苹果和微软 Windows 操作系统最初使用的音频格式。这些文件使用
  PCM 音频，在这种情况下是无损的，因为根本没有应用任何压缩！脉冲编码调制指的是它所持有的数据格式。


  PCM 音频通常用于 CD-ROM 内容以及电话应用。这是因为 PCM Wave 音频是一种未压缩的数字音频格式，其数据流没有应用任何 CPU 密集型的压缩算法；因此，解码（CPU
  数据处理）对于电话设备或 CD 播放器来说不是问题。


  因此，当我们开始将数字音频资源压缩成这些不同的文件格式时，我们将使用 PCM 作为我们的基准文件格式。我们不仅可以查看 PCM（Wave）与 MP3 或 MP4
  音频压缩结果之间的差异，以了解我们的 JAR 文件获得了多少数据占用优化，更重要的是，我们可以看到我们的样本分辨率和样本频率优化将如何影响用于游戏音频效果的系统内存。即使我们使用
  MP3 或 MP4 格式，在音频资源可以与 `AudioClip` 类一起使用并作为音效用于 Java 游戏之前，它仍然需要解压缩到内存中。


  由于 Wave 或 AIFF 文件不会有任何质量损失，因为也不需要解压缩，这种脉冲编码调制数据可以直接从 JAR 文件放入系统内存！这使得 PCM 音频非常适合持续时间短（0.1
  到 1 秒）的游戏音效，并且可以使用 8 位和 12 位样本分辨率以及 8kHz、22kHz 或 32kHz 样本频率进行高度优化。最终，要找出 JavaFX
  支持的哪种音频格式对任何给定的数字音频数据具有最佳的数字音频压缩效果，唯一真正的方法是将你的数字音频编码到我们知道受支持且高效的几种主要编解码器中。我们将在第
  21 章中，当为游戏添加音频时，经历这个工作流程，并观察使用相同源音频样本时不同格式之间的相对数据占用结果。然后，我们将聆听音频播放质量，以便最终在质量和文件大小之间做出决定。这是你在开发
  JavaFX 数字音频资源时，为了在你的专业 Java 游戏开发工作流程中使用而需要经历的工作流程。


  JavaFX 还支持流行的 MPEG-4 高级音频编码（AAC）编解码器。这种数字音频数据可以包含在 MPEG4 容器（`.mp4`、`.m4a`、`.m4v`）或文件扩展名中，并且可以在所有操作系统上播放。需要注意的是，JavaFX
  不包含 MPEG-4 解码器，而是支持所谓的“多媒体容器”。这意味着它使用宿主操作系统的 MPEG-4 解码器进行解码。


  出于这个原因，并且由于在线收听研究得出结论，MP3 的质量（对于音乐而言）优于 MP4 格式，我们将对较长形式的音频（游戏背景音乐循环）使用 MP3 音频文件格式，并通过
  `Media` 和 `MediaPlayer` 类来使用。我们将对短形式的音频（游戏音效，例如射击声、铃声、叫喊声、咕哝声、笑声、欢呼声以及类似的一秒或更短的数字音频资源）使用
  PCM Wave 音频格式，并通过 JavaFX 慷慨提供的 `AudioClip` 数字音频序列引擎（类）来使用。




  ### 数字音频优化：从 CD 音质出发，逆向优化


  为在市场上最广泛的硬件设备上播放而优化数字音频资产，会比优化数字视频或数字图像（以及动画）更容易。这是因为目标屏幕分辨率和显示宽高比的差异，远大于硬件设备对数字音频播放支持能力的差异（可能除了支持
  24 位高清音频播放的新硬件外）。所有硬件都能良好播放数字音频资产，因此音频优化是一种“单一音频资产适配所有设备”的场景；而在视觉（视频、图像、动画）方面，你需要面对从
  4096x2160 像素（4K 电视）到 320x320 像素（翻盖手机和智能手表）的屏幕。


  重要的是要记住，用户的耳朵无法像眼睛感知数字图像、二维动画或数字视频那样，感知数字音频中同样的质量差异。通常，在所有硬件设备上，数字音频支持有三个主要的“最佳点”，你应该针对这些点来优化
  Java 游戏音频。


  低质量音频，例如短旁白音轨、角色感叹声或短时音效，可以通过使用 8 kHz、11.25 kHz 或 22.5 kHz 的采样率，配合 8 位或 12 位的采样分辨率，达到相当高的质量。中等质量音频，例如长旁白音轨、长时音效、循环背景（即环境）音频等，可以通过使用
  22.5 kHz 或 32 kHz 的采样率，配合 12 位或 16 位的采样分辨率，达到非常高的质量水平。


  高质量音频资产，例如音乐，应优化至接近 CD 音质，并使用 32 kHz 或 44.1 kHz 的采样率，配合 16 位数据采样分辨率。对于高清音频，处于此音频频谱的超高端，你会使用
  48 kHz 的采样率，配合 24 位数字音频数据采样分辨率。还有一种未命名的“介于中间”的高端音频规格，使用 48 kHz 采样率配合 16 位数据采样分辨率，这恰好是杜比
  THX 过去用于其高端音频体验技术的规格。当年在电影院播放《星球大战》时就使用了这种技术。


  最终，这一切都归结为数字音频数据足迹优化工作流程所产生的质量与文件大小的结果，这可以带来一些惊人的效果。因此，你为在所有硬件设备上优化数字音频资产而进行的初始工作流程，将是创建“基准”16
  位资产，采样率为 44.1 kHz 或 48 kHz，然后使用 JavaFX 支持的不同格式对其进行优化（压缩）。一旦完成该工作流程，你就可以看到哪些生成的数字音频资产提供了最小的数据足迹，同时具有最高的数字音频播放质量。之后，你可以将
  48 kHz 或 44.1 kHz 的数据降低到 32 kHz，并使用 16 位分辨率保存，然后再使用 12 位分辨率保存。之后，重新打开原始的 48 kHz
  数据，降采样到 22.5 kHz 采样频率，并使用 16 位或 12 位分辨率导出，以此类推。我们将在本书后面的第 21 章中执行此工作流程，以便你获得音频工作流程的经验。


  你将使用开源软件 Audacity 2.1.3 数字音频编辑与工程软件包来执行此工作流程。你在第 1 章中下载并安装了该软件包，理想情况下，你还安装了所有那些免费的
  VST、Nyquist、LV2 和 LADSPA 插件，以及用于 AC3、AMR-NB、M4A 和 WMA 音频格式的 LAME MPEG3 编码器和 FFMPEG
  编码器。如果你还没有这样做，你应该去做，以便为你的 Java 工作站配备绝对最强大的数字音频编辑与工程套件。


  如果你还没有这样做，或者现在不想做，我将在我们学习如何使用`AudioClip`、`Media`和`MediaPlayer`类为你的 Java 9 游戏环境添加数字音频元素的章节中，向你展示如何操作。这其实非常简单；你所要做的就是下载这些插件，并将它们放置在
  Audacity 主软件安装文件夹下的正确插件文件夹中，因此添加效果并不困难。




  ## 总结


  在第二章中，我们深入探讨了一些更重要的二维新媒体概念，这些概念将在我们的专业 Java 游戏和物联网开发工作流程中使用，以便你为 JavaFX 8 支持并已添加到
  Java 9 环境中的这些二维多媒体资源打下扎实的基础知识。请注意，Java 和 JavaFX 的版本发布并不同步，例如，Java 6 使用 JavaFX 1.x，而
  Java 7 使用 JavaFX 2.x。它们正逐渐趋于同步发布，因为 Java 8 使用了 JavaFX 8，但 Java 9 的重点在于语言的模块化，而非
  JavaFX 9，因此目前 Java 9 平台可能仍会从使用 JavaFX 8 技术开始。


  我首先介绍了与 Java FX 8（Java 8 和 Java 9 的新媒体引擎）相关的最重要且最基础的二维新媒体概念，这些概念同样适用于 Android、iOS、Windows、Linux
  操作系统以及 HTML5 开发。对于游戏开发者而言，理解新媒体概念与掌握 Java 9 和 JavaFX 编码实践同样重要，因为新媒体能让你的游戏更具沉浸感、更引人入胜，并在视觉上更令人兴奋。如果你想更深入地了解这些新媒体主题，我在
  [`www.apress.com`](http://www.apress.com) 上有一系列新媒体“基础”书籍。每本书都专门聚焦于一个新媒体垂直领域（音频、视频、视觉特效、插画、绘画等）。


  由于三维技术要复杂得多，我将这些基础知识留到了第 3 章；我希望本书各章保持合理的篇幅，以便你能最佳地消化所有这些技术信息。三维和交互式三维新媒体资源与二维和交互式二维新媒体资源截然不同，因为它们为原本已经复杂的新媒体内容创作工作增加了一个全新的维度、深度数据以及
  Z 轴。这会将基础的二维（区域）数学转变为向量或矩阵代数（从学士水平到硕士或博士水平）；因此，三维的复杂度比二维高出一个数量级。


  我们还探讨了一些相当高级的数字成像概念、JavaFX 支持的格式、技术以及数据占用优化。这些信息将使你能够从专业 Java 游戏或物联网应用程序中使用的每一个像素中提取最大的效用和性能。


  你学习了关于像素、分辨率以及宽高比如何定义图像、动画或视频形状的所有知识，还学习了关于颜色深度、图层、通道，以及 Alpha 通道透明度如何让你实现图像合成管线。你学习了如何使用十六进制表示法来定义颜色以及
  Alpha 通道透明度值。我们探讨了高级数字成像概念，例如遮罩、抖动、抗锯齿、混合与传输模式。


  接下来，我们探讨了时间的第四维度，并学习了帧、帧率和比特率如何与我们之前在数字成像部分学到的概念结合使用，为我们的新媒体资源添加运动，从而创建二维动画或数字视频。我们研究了不同的格式以及对其进行编码的编解码器，并了解了一些用于编辑和编码数字视频的软件包，例如
  DaVinci Resolve、Lightworks 和 Sorenson Squeeze。


  最后，我们探讨了数字音频，学习了采样频率和采样分辨率，以及 JavaFX 支持的 MP3 和 PCM 音频格式，并了解了如何使用这些编解码器来优化数字音频，以使用最少的系统内存。我们研究了如何为我们的专业
  Java 9 游戏和物联网应用程序获得最小的数据占用，同时仍能向游戏和应用商店交付高质量的产品。


  在下一章中，我们将探讨将在你的专业 Java 9 游戏和物联网应用程序中使用的三维和交互式三维概念、原理、格式、优化以及工作流程。你将感受到三维相对于二维新媒体资源的复杂程度，我们将探讨诸如三维角色建模、骨骼、绑定与动画、粒子系统、物理系统（物理力）、流体动力学、视觉效果和特效、纹理映射、着色器以及
  UVW 映射坐标等内容。


  '
- '# 3. 高级三维内容渲染：三维资源概念与原理


  既然你已经了解了二维（光栅和音频）内容开发概念和原理，这些也是你的二维新媒体开源内容开发软件包（GIMP、Lightworks、Audacity 和 DaVinci
  Resolve）所基于的，我们将通过在本章中探讨 Inkscape（二维矢量，即形状）、Blender（三维矢量，即多边形）和 Fusion（二维和三维视觉效果）来完成对新媒体资源的学习。我们之所以在本章中介绍
  Inkscape 二维，而不是在二维内容章节中介绍，是因为我们可以利用关于二维矢量图形工作原理的基本概念，作为连接二维矢量图形和三维矢量图形的概念桥梁。这是因为三维向量的工作方式与二维
  X 和 Y 维度中的二维向量完全相同，只不过是在三维 X、Y、Z 维度中。因此，我们将从学习 Inkscape 二维矢量插画（或称数字插画）开始本章，以便我们能够在此基础上构建二维矢量知识，然后学习更复杂的三维矢量图形软件包。


  我首先介绍了顶点（点）和样条线（连接点的线或曲线）的基本概念，因为它们为二维形状或三维几何体提供了基础。这很重要，因为无论你决定成为二维矢量插画师还是三维矢量建模师（或两者兼有），这都是你将构建的基础。处理顶点和样条线可以成为一个完整的职业，所以一定要掌握前几节的内容。


  接下来，我们将探讨如何将一个空的二维形状或三维线框变成看起来是实心的东西。这是通过为二维形状使用颜色填充、渐变或图案填充（这些也可以用于三维模型）以及为三维几何体使用纹理贴图来实现的。纹理贴图使用
  UVW 贴图将二维纹理贴图定位到三维几何体上。


  在我们涵盖了所有适用于二维和三维空间的概念之后，我们可以进入仅在三维中才会遇到的内容。这些包括三维渲染，这是一个将三维模型（这些模型具有三维几何体以及通过三维
  UVW 纹理映射坐标附加的二维纹理贴图）转换为三维图像的过程。我将三维图像称为静态三维，因为三维技术被用于制作不移动的图像，因此是静态或固定的。还有三维动画，它具有运动特性，很像数字视频，以及交互式三维，其中编程逻辑被嵌入到三维对象或场景层级结构中，这是三维的最高级形式。


  动画引入了时间的第四维度，就像数字视频一样，而三维动画为三维新媒体资源开发工作流程增加了另一层复杂性。三维动画像数字视频一样使用关键帧，因此所有相同的概念都适用，例如帧率；它还有一些其他概念，例如运动曲线，这些曲线受
  JavaFX 支持，可以改变加速和减速的速率，从而为你的三维动画提供逼真的运动，同样也适用于 JavaFX 中的二维动画，因为它们是独立的功能。


  交互式三维涉及将代码插入到一个称为场景图的对象层级结构中，该结构以层级格式保存资源、代码和其他元素。场景图最初是在 Amiga 时代由三维软件包发明的。开创这种设计和开发方法的三维软件包是
  Realsoft OY 公司的 Real 3D，如今被称为 Realsoft 3D。幸运的是，JavaFX 9 也拥有一个广泛的场景图 API，这使得它非常适合创建交互式三维和交互式二维游戏及物联网应用程序。




  ## 交互式 2D 资源：2D 矢量内容概念


  还有一类 2D 资源我们在第 2 章中没有详细讨论，因为其概念与 3D 直接相关，所以我决定在逻辑上将这些内容放在本章开头，以便信息更好地衔接。2D 和 3D
  在顶点和样条线的使用上非常相似，我们接下来将学习这些内容。2D 使用 X、Y 维度（即一个平面，或者如果你愿意，也可以称为平面区域），而 3D 使用 X、Y、Z
  维度（即一个立方体区域，如果你愿意的话）。


  因此，在本节中，我们将探讨如何通过在 2D 空间中放置点（即顶点），然后使用直线或曲线样条线将它们连接起来，并用纯色、渐变色或平铺图像图案填充闭合形状，来创建
  2D 矢量插图。JavaFX 9 提供了大量支持这些 2D 元素的 2D 类，以及一个 `SVGPath` 类，如果你选择使用 Inkscape，它可以用于导入所有这些
  2D 数据元素。


  你在 Java 中使用 JavaFX API 时用到的 2D 资源或对象通常被称为形状，尽管从技术上讲它们也是几何图形，因为形状本质上就是几何图形！在行业中，通常将
  3D 称为 3D 几何体，将 2D 称为 2D 形状。2D 和 3D 资源的基础都始于空间中的点，这些点被称为顶点。这些顶点通过（直）线或（非直）曲线连接。接下来我们来看看这些内容。


  ### 平面上的点：2D 顶点、模型参考原点、枢轴点、虚拟点


  别激动——这可不是《航班蛇患》的续集；这只是关于 2D 形状基础的讨论，与 3D 模型一样，它们都基于空间中的点。由于 2D 空间由 X、Y 平面构成，我们将点放置在
  2D 平面上。在专业术语中，空间中的每个点都称为顶点，毕竟这是《Pro Java 9 Games Development》。你可以在平面 X、Y 空间中使用这些顶点来创建
  2D 形状，也可以在立方体 X、Y、Z 空间中使用它们来创建 3D 几何体，我们将在本章后面部分介绍这些内容。


  我将本节副标题定为“平面上的点”，是因为顶点是通过 2D 平面上的 X、Y 网格放置在 2D 空间中，以及通过 3D 空间中的 X、Y、Z 立方体区域放置的。这个
  2D 网格的原点位于 (0,0)。通常这是屏幕的左上角，而对于 3D 立方体区域，这个参考原点则位于 (0,0,0)。


  对于 2D 形状和 3D 对象，这个原点都可以重新定位，因此不同的软件包会从平面或立方体的不同角落来参考这个网格。稍后你会在 JavaFX 中看到这一点，它有多种引用坐标的方式。在该平面或立方体区域内，还有一个用于旋转
  2D 或 3D 对象的参考点，称为枢轴点。


  例如，如果你希望你的锤子 2D 形状（或 3D 模型）像在现实生活中那样，在把手末端附近旋转，你可以通过将枢轴从 2D（或 3D）建模空间中的默认（中心）位置向下移动到锤子把手末端来实现。对于这个应用，你的枢轴点随后将成为该对象的旋转轴中心。枢轴点是关于资源如何旋转的参考原点，而网格（空间）原点则为点之间如何相对定位提供参考。因此，旋转算法会同时使用建模网格原点和枢轴点位置。这些通常是不同的点坐标；然而，在某些场景下，它们也可能是同一个点。


  原点和枢轴都通过一个轴来表示空间中的那个点。这个轴可以移动，在 3D 软件中看起来像一个星号，在 2D 软件中则像一个加号。实际上，轴是 2D 形状或 3D 几何体内部的一个独立对象，它甚至可以像其他任何
  2D 或 3D 对象元素一样，使用 JavaFX 和 Java 代码进行动画处理，以创建与形状或几何体随时间旋转方式相关的特殊效果。还有一种用于特殊效果和高级应用的“虚拟点”，它与枢轴非常相似，但用于其他目的，同样通过轴来表示。在本书的后续内容中，你将看到这个轴元素对于
  Java 游戏有多么重要。




  ### 连接二维点：矢量线与样条曲线连接二维顶点


  由于顶点在数学上是无限小的，这些微小的点几乎不可见，因此你需要将它们连接起来，才能创造出可视化的内容。最简单的形式就是直线，称为矢量（在 3D 渲染中有时也称为射线）。矢量从一个顶点开始，向外延伸直到碰到第二个顶点，这第二个顶点定义了矢量的方向。矢量本质上是直的，因此它被视为一条线，而不是曲线。曲线在数学上比直线复杂得多，你马上就会看到这一点。


  由于我们经常需要无限平滑的曲线作为二维形状或三维几何体的一部分，因此需要使用一种不同类型的数学结构，称为样条曲线。样条曲线之所以无限平滑，是因为它是一种使用数学方程定义的曲率，其分辨率可以通过使用更小的数值来提高，例如使用浮点数而非整数——这是对所有计算机程序员而言的（鉴于这本《Pro
  Java 9 Games Development》的专业性质，我希望各位都是程序员）。


  大多数样条曲线的数学基础被称为贝塞尔曲线，它以数学家皮埃尔·艾蒂安·贝塞尔的名字命名，他是一位法国工程师，生于 1910 年，卒于 1999 年。皮埃尔是三维实体、几何建模和物理建模领域的创始人之一，也是曲线表示专业领域的领导者，尤其是在
  CAD CAM 和三维系统中。贝塞尔曲线有几种数学格式，包括三次或二次贝塞尔曲线，它们使用不同类型的数学方程来定义每条曲线的构建方式。


  这些曲线中最简单的是线性贝塞尔曲线，它可用于创建直线（矢量）射线，并且仅使用两个控制点来定义曲线。如果你的形状仅使用线性贝塞尔曲线来定义，那么你的游戏或物联网应用将消耗更少的处理能力和内存。这是因为需要处理的控制点更少。如图
  3-1 的上半部分所示，Inkscape 使用蓝色绘制控制点及其手柄。如果你想在 Inkscape 中尝试，请点击图 3-1 左侧所示的样条/线条工具，然后点击创建一个点，在别处点击第二个点以添加一条直线，接着点击第三个点并拖动以创建一条曲线！一旦你掌握了窍门，这相当容易；话虽如此，事实上，你在本书中学到的一切都需要大量练习才能在专业水平上掌握。


  ![A336284_1_En_3_Fig1_HTML.jpg](img/A336284_1_En_3_Fig1_HTML.jpg)


  图 3-1.


  在 Inkscape 中使用矢量和样条曲线创建开放形状，闭合该形状，然后填充形状


  要调整线性贝塞尔曲线的曲率，你可以移动从刚添加的顶点伸出的两个手柄中的任意一个。如果你想要一条直线，只需点击添加顶点，直线就会将它们连接起来。另一方面，如果你想制作一条曲线，请按住鼠标点击添加顶点，并在鼠标仍按下的情况下（保持鼠标按下状态），拖出贝塞尔曲线的控制点手柄。


  下一种更复杂的贝塞尔曲线是二次贝塞尔曲线，它以用于定义它的二次数学算法类型命名。二次贝塞尔曲线有三个控制点而不是两个，因此处理强度更高，但通过使用手柄，可以对曲线的“微调”提供更多控制。


  最复杂的是三次贝塞尔曲线，它以用于定义它的三次数学算法类型命名，它有四个控制点而不是三个，因此处理强度更高，但同样，它提供了对曲线曲率微调的更多控制。


  在 Adobe Illustrator 中，控制点被细分为手柄和锚点。用于影响曲率的手柄位置就是手柄。锚点是描述贝塞尔曲线起点和终点位置的顶点。Inkscape
  对锚点使用了不同的术语，称之为节点。


  还有一种称为 NURBS 的三维建模方法，即非均匀有理 B 样条，它与贝塞尔样条表示相关，但针对三维 X、Y、Z 空间的使用进行了优化。NURBS 更复杂，允许创建平滑、有机的三维几何体表示。Michael
  Gibson 的 Moment of Inspiration 3D 是真正实惠的 NURBS 建模器之一，仅售 295 美元；它基于原始的 SGI Alias
  Wavefront NURBS 建模器 API。


  ### 填充形状内部：颜色填充、渐变和图案


  如果你使用这些顶点和样条曲线（或矢量/直线）创建的二维形状是闭合的，那么它们可以用各种内容填充，例如纯色、颜色渐变或平铺的图像图案。如图 3-1 的下半部分所示。要闭合一条曲线，请绘制你的最终矢量（直线）或样条曲线（曲线），直到鼠标光标位于起始顶点上方，当该顶点发生变化时（在
  Inkscape 中，它会从黑色变为红色），点击鼠标以创建一个闭合形状。要在 Inkscape 中填充你刚刚闭合的形状，请点击填充工具（与样条/线条工具及其工具提示一起显示在左侧），然后点击底部色板中的颜色，用该颜色填充选定的形状。


  Inkscape 和 JavaFX 使用的二维矢量形状文件格式是可缩放矢量图形（SVG），因此如果你保存 Inkscape 项目，它将使用 `.svg` 扩展名，例如
  `ProjectName.svg`。如果你想了解更多关于 SVG 的信息，请查阅 Apress.com 出版的《Digital Illustration Fundamentals》。接下来，让我们看看
  i3D 媒体资源，Java 8 和 9 通过 JavaFX 9 的新媒体引擎完全支持这些资源。


  ## 交互式三维资源：三维矢量内容概念


  最先进的多媒体资源类型是交互式三维矢量对象，它可以使用 Java 和 JavaFX API（类和接口）创建，也可以结合使用这种方法与三维建模软件包（例如第 1
  章讨论的那些）或三维动画软件包（例如 Autodesk 3ds Max——我从它的第一个版本 3D Studio DOS 就开始使用它；或者 Blender——它已接近类似的专业功能水平）。i3D
  资源由三维矢量几何体构成，表面使用二维光栅图像（我们在第 2 章中学习过），并在其模型和场景层级中包含编程逻辑，从而赋予它们生命。


  在本章的这部分中，我们将学习三维对象如何从网格变为带表面的模型。在本章中，我们还将探讨动画、运动曲线、对象层级、轴放置、虚拟对象、粒子系统、流体动力学、毛发和皮毛动力学、刚体动力学、软体动力学、布料动力学、绳索动力学以及相关的三维主题。正如你所见，三维是迄今为止最复杂、最有趣的新媒体类型。


  通过使用场景图对象层级中的编程逻辑，这些三维对象可以进一步实现交互，该层级定义了三维对象每个部分的功能，并且是 JavaFX 9 不可或缺的一部分。让我们从头开始。我将向你展示将三维资源从三维几何体转变为三维模型，再转变为三维层级，最后转变为三维对象的各种属性。这是最复杂的一种多媒体，也是在
  HTML5（使用 WebGL2）、Android 8（使用 Vulkan）以及使用 JavaFX 的 Java 8 和 9 中最不常见的新媒体资源类型。




  ### 3D 的基础：网格的几何结构


  与 2D 形状新媒体元素一样，3D 新媒体元素的最底层是顶点以及这些顶点之间的连接。在 3D 中，你仍然会有顶点，但它们之间的连接会变得稍微复杂一些。在 2D
  中，顶点、矢量（射线或直线）和样条线（曲线）之间的区域是空的（未填充的），形成闭合或开放的形状，开放形状无法填充，因为它们是开放的，内容会溢出。3D 几何体（在纹理映射之前，3D
  行业中有时称之为网格或线框，因为这就是 3D 几何体在纹理映射或蒙皮之前的样子）之间的连接，被称为顶点之间的“边”和边之间的“面”。


  #### 空间中的点：3D 顶点的起源


  与 2D 顶点（在 Illustrator 中称为锚点，在 Inkscape 中称为节点）一样，顶点是 3D 几何体和有机体（NURBS、Catmull-Rom
  样条线和 Hash Patches）建模的基础。顶点定义了模型的基础结构（无论是边还是样条线）在 3D 空间中的位置。在 3D 中，顶点数据可以包含表面颜色数据、法线数据、UVW
  纹理映射数据和顶点 XYZ 位置数据。熟悉 3D 扫描仪的人可能对“点云”这个术语不陌生，因此顶点仍然是我们 3D 行业中一切工作的基础。


  对于 Java 8 和 9 的编码，JavaFX 9 提供了一个 `VertexFormat` 类，它可以保存顶点数据，包括顶点位置、法线信息（我们稍后会介绍法线）和
  UVW 纹理映射坐标。因此，你可以通过 Java 代码来放置 Java 9 游戏或物联网应用的顶点，也可以使用 3D 建模器，例如 Daz Hexagon、MoI
  3D 或 Nevercenter SILO，或者使用 3D 建模与动画软件包，例如 Blender 或 Autodesk 3ds Max。


  #### 连接 3D 顶点：边桥接 3D 顶点


  大多数 3D 几何体使用一种称为“边”的东西来连接两个顶点。边是一个矢量，或者说是一条直线，因此在 3D 空间中看起来像剃刀的边缘。需要三条或更多条边才能形成一个多边形，我们接下来将介绍多边形。当你对
  3D 几何体进行建模时，你可以选择顶点、边、多边形或整个对象。


  如果你使用更高级的基于样条线的建模范式创建了 3D 几何体，例如使用 MoI 3D 创建 NURBS、使用 SILO 2（仅售 160 美元）创建四边形，或使用
  Animation:Master（仅售 80 美元）创建 Hash Patches，那么你需要将这些格式简化为多边形或三角形，我们接下来将介绍这一点。简化过程会将这些范式中使用的无限平滑曲线转换为一系列直线边。这是通过使用一个简化（平滑度）数值因子（滑块或设置）来完成的，该因子通常在你将基于曲线的建模器中的样条线建模格式导出为多边形几何模型格式时，在“文件导出”功能中提供。


  #### 创建表面：三条边形成多边形，四条边形成四边形


  一旦你将三条边组合成一个三角形，你就得到了一个多边形，它可以作为承载蒙皮或纹理的表面，使 3D 数据看起来更逼真。多边形有时被称为三角形、三角面或面，一些建模器使用被称为“四边形”的方形多边形。如果你的渲染引擎像
  JavaFX 及其 `TriangleMesh` 类那样需要三角形，你可以将四边形简化为三角形。在这种情况下，简化算法相当简单，因为它只是在四边形表面的两个对角之间插入一条边，从而创建两个角度特征相等（镜像）的三角形。最佳的三角形来自方形多边形，具有
  45-45-90 度的角配置。经验法则是，三角形越均匀（接近正方形），渲染效果越好；而“细长”或狭长的三角形可能会导致渲染伪影，但通常不会。


  一旦你有了一个表面（通常是一个三角形，如图 3-2 所示，基本立方体上的面是四边形），并且定义了它的法线（我们接下来将学习），那么你就可以应用纹理贴图了。我们将在本章下一主要部分介绍纹理映射。还有一个与相邻多边形或面相关的原理，称为平滑组，我们将在介绍表面法线之后讨论它。因此，一个表面（多边形、三角形、四边形、面）至少会承载一个法线、一个或多个纹理贴图以及一个平滑组。


  ![A336284_1_En_3_Fig2_HTML.jpg](img/A336284_1_En_3_Fig2_HTML.jpg)


  图 3-2.


  使用“将面法线显示为线条”按钮，将每个四边形面的方向法线显示为浅蓝色线条




  #### 指定表面朝向：表面法线的概念


  如果你知道如何在 3D 软件中开启“显示法线”功能，就能看到面表面法线，它们会显示为从面的正中心延伸出来的一条线，如图 3-2 中浅蓝色所示。


  在 Blender 2.8 中，也有用于显示顶点法线的开关（按钮），顶点法线从顶点向外指，因此对于这个模型，顶点法线从立方体的角（45 度）斜向向外指，与面法线的结果完全相反——面法线从面（表面、四边形）的中心笔直向上（90
  度，像摩天大楼一样）。如图 3-2 所示，其中两条法线实际上与 X 轴（红色）和 Y 轴（绿色）对齐，它们以 90 度角与立方体相交。


  坐标轴指南位于 3D 编辑模式视图的左下角，在 Blender 界面左下角的 XYZ 轴指南中也有标示。表面法线的功能相当简单：它告诉渲染引擎表面朝向哪个方向。在这种情况下，这个立方体会渲染成一个立方体，并带有你赋予它的任何纹理（皮肤）来着色。同样的逻辑也适用于顶点法线：它会告诉渲染引擎处理
  3D 几何体的哪一侧进行表面渲染。


  如果这个立方体几何体中的法线指向内部而不是外部，那么渲染时立方体将完全不可见。3D 软件中有一个翻转法线操作（算法），用于全局反转模型的法线方向（所有法线翻转
  180 度）。当你渲染场景时，如果导入的对象在渲染场景中不可见，就会用到这个功能。


  当 3D 导入工具将导入的 3D 几何体的法线指向（翻转）错误方向时，或者当其他 3D 工具的导出器相对于你导入的软件导出了错误方向的法线时，就会出现法线翻转的情况。这在你
  3D 工作流程中会相当常见，因此如果你经常从事 3D 或 i3D 工作，预计至少会用到几次翻转法线功能。


  如果你需要某些物体（例如房屋）的 3D 几何体从外部和内部都能渲染（这在 i3D（例如虚拟世界）中很常见），你就必须创建双面几何体，特别是面。然后你需要应用双面纹理贴图和
  UVW 贴图，我们将在本章下一节讨论 3D 纹理映射概念和技术时介绍这些内容。


  需要注意的是，对于 i3D，带有双面纹理的双面几何体需要显著更多的渲染引擎处理能力，并且渲染是基于用户对交互式 3D 环境、世界或模拟的探索实时进行的，因此 JavaFX
  需要同时导航、处理和渲染 i3D 场景，这需要大量处理器周期才能流畅运行，所以数据优化很重要。


  虽然你可以在 JavaFX 中为顶点分配法线，但法线通常按面分配。这就是`VertexFormat`类有两种格式的原因。一种支持多边形的位置和纹理，因为法线只需定义一次（使用三个顶点定义法线不如只用一个面高效）；另一种是`VertexFormat`数据格式，用于你想使用顶点而不是多边形来定义法线的情况。


  #### 平滑表面：使用平滑组让多边形看起来像样条线


  你可能见过渲染为实体（而非线框）但仍然看起来像被凿过的 3D 模型；也就是说，你可以看到多边形（面）被渲染成平坦的样子。在这种情况下，渲染引擎关闭了平滑功能。如果开启平滑渲染，这种效果就会消失，几何体看起来会像预期的那样无限平滑，就像是用样条线创建的一样，而实际上它使用的是多边形。让渲染引擎进行平滑处理更高效，因此有一种称为平滑组的东西，它应用于每个面，告诉渲染器何时在两个面之间进行平滑，何时不进行平滑（不进行平滑会留下通常所说的接缝）。平滑组使用简单的整数。如果面两侧的整数匹配（对于该边对侧每个相邻面），则渲染为平滑过渡（颜色渐变）。如果数字不同，则渲染为接缝；也就是说，该边清晰可见，因为该边两侧的颜色渐变不同（颜色渐变在两个面（也称为多边形）之间不是无缝的）。


  在一些 3D 软件包中，例如 Autodesk 3D Studio Max，你可以在用户界面中看到这种平滑组编号方案，并且可以实际选择每条边旁边使用的（整数）数字。你还可以选择边两侧的数字，这是一种更复杂的方法，但能让
  3D 建模师更精确地控制平滑效果。


  在其他软件如 Blender 中，编号是隐藏的，平滑组功能通过使用“标记接缝”、“清除接缝”、“标记锐边”和“清除锐边”等命令来“暴露”。这些命令可以在 Blender
  的边菜单中找到，如图 3-3 左侧所示，其中“标记锐边”选项以浅蓝色高亮显示。


  ![A336284_1_En_3_Fig3_HTML.jpg](img/A336284_1_En_3_Fig3_HTML.jpg)


  图 3-3.


  在 Blender 中使用边菜单（编辑模式下按 Ctrl-E）中的“标记接缝”或“标记锐边”命令设置边平滑


  在 Blender 中，一些 3D 建模师（指人，而非软件）可能会犯一个错误：试图通过实际分割 3D 几何体的边来暴露接缝或锐边，这虽然能达到视觉效果，但可能在后续的
  3D 几何体拓扑优化工作流程中引发问题。如果你熟悉地图学中使用的“地形”一词，拓扑与之非常相似，它指的是 3D 几何体是如何构建的，以及因此它将如何被渲染，因为渲染引擎和
  3D 几何体一样，都是“基于数学”的。


  3D 模型的拓扑是指 3D 几何体的构建方式，即顶点、边和面相对于彼此的位置，或者是指基于样条线的有机 3D 模型的构建方式，其中控制点、手柄和类似的基于样条线的拓扑已被放置（以及它们放置的顺序）。换句话说，3D
  建模很复杂！


  为了避免通过分割几何体边来实现接缝，可以在 Blender 中使用“标记接缝”或“标记锐边”边修改器。这些特定的 Blender 修改器实际上是基于平滑组的，因此能在不实际影响
  3D 几何体拓扑的情况下实现这种平滑（或边接缝）效果。


  Blender 修改器在渲染前应用，因此不会影响底层 3D 几何体的实际数学拓扑。Blender 修改器始终是一种更灵活的 3D 内容创建方法，因为它是在渲染引擎级别应用平滑（或任何其他所需效果），而不是在
  3D 几何体拓扑级别，从而保持 3D 网格的完整性。正如《Pro Java 9 Games Development》（以及物联网设计）中的一切，如果你能达到预期效果和最终结果，更简单总是更好，因为更简单意味着更少的处理器开销。




  ### 为你的 3D 模型蒙皮：2D 纹理映射概念


  一旦作为 3D 模型基础的 3D 几何体完成，你就可以为其应用纹理贴图，以创建 3D 模型的实体外观，并添加细节和特效，使其外观越来越逼真。如果你想知道 3D
  几何体和 3D 模型之间的区别，那么 3D 几何体只是网格或线框，而 3D 模型可以（应该）同时应用纹理贴图。如果你购买第三方 3D 模型，你期望它们在渲染时看起来像它们本来的样子，而不是仅仅呈现为平坦的灰色——这是没有任何纹理映射（且无顶点颜色）信息时渲染模型的样子。事实上，你在网上找到的一些
  3D 模型（免费或付费）甚至可能没有应用平滑组，因此你会看到一些模型有棱有角，一些平滑，还有一些纹理细节程度各不相同。有些模型的法线甚至可能是翻转的，在你对其应用翻转法线操作或修改器之前，它们甚至不会出现在你的
  3D 场景中。通常，对于任何不是从头创建的现有模型，你都需要进行额外的建模、平滑和纹理映射工作。我通常尝试从头创建所有内容，这样我就能控制并熟悉底层 3D 几何体拓扑结构，以及我的平滑组、UVW
  映射坐标、着色器和纹理贴图是如何应用到模型上的。我们将在本节中涵盖所有这些内容。


  #### 纹理贴图基础：概念、通道、着色、特效和 UVW 坐标


  纹理映射与正确创建几何拓扑结构一样，是 3D 领域中一个复杂的领域；事实上，3D 的每个领域都同样复杂，这使得 3D 成为迄今为止最复杂的新媒体类型，也解释了为什么
  3D 故事片会雇佣艺术家专门专注于（处理）我们在本章中探讨的每一个领域。纹理映射是 3D 建模中能够使用 2D 矢量或 2D 光栅图像资源的主要领域之一。


  需要注意的是，还有一个更复杂的 3D 纹理映射领域，也常被称为纹理贴图，它使用 3D 纹理算法（通常称为体积纹理）来创建贯穿 3D 对象的纹理效果，就好像它是一个实心体而不是空心（这里可以理解为双面）的
  3D 对象。


  纹理映射背后的基本概念是获取 2D 资源（例如我们在前一章中学到的那些），并将这些 2D 资源应用到你的 3D 几何体表面。这是通过使用 UVW（或 3D）映射坐标来实现的，这些坐标指示你希望该
  2D 图像（平面）如何定向到或投影到你的 3D 几何体表面拓扑结构上。现在，我希望你快速从书本上抬起头，对周围能听到的人大声说：“我真的需要将这个样条拓扑结构简化为多边形拓扑结构，这样我就可以使用
  UVW 纹理映射坐标将着色器应用到生成的几何体上，并将这个 3D 模型导出到我的 JavaFX 场景图层次结构中。”然后若无其事地继续阅读，尽管你刚刚向周围所有人展示了你即将成为交互式多媒体制作天才的潜力。


  你可以使用纹理通道向 3D 几何体表面添加多个纹理贴图，这类似于你在 2D 图像合成软件中使用的图层。JavaFX 目前支持四个最重要的纹理通道：漫反射纹理贴图（基本
  ARGB 颜色值）、高光纹理贴图（表面是光亮还是暗淡）、照明纹理贴图（也称为发光贴图）和凹凸纹理贴图。


  3D 软件包支持其他纹理贴图通道类型，以实现额外的纹理映射效果。为了能够将这些带入 JavaFX，你必须使用一个称为“烘焙”的过程。烘焙纹理贴图涉及将所有尚未支持的纹理通道渲染到一个单一的漫反射纹理贴图中，因为这是
  JavaFX 8 和 9 所支持的。这提供了与你在更高级的 3D 动画软件包中获得的大部分相同的视觉效果。


  如图 3-4 所示，Blender 2.8 也使用了场景图，就像大多数现代 3D 软件包一样，而 JavaFX 也提供了这种场景图功能；我们将在第 8 章中介绍它。球体几何体和纹理映射在场景图层次结构中组合在一起，我已经为你展开了该层次结构。


  ![A336284_1_En_3_Fig4_HTML.jpg](img/A336284_1_En_3_Fig4_HTML.jpg)


  图 3-4. 在 Blender 中使用场景图（右侧）将金色纹理贴图和着色器（底部）应用于球体对象


  随着时间的推移，理想情况下，JavaFX 9 将增加更多的纹理通道支持，并为开发者在 3D 新媒体资产使用方面提供更多的视觉灵活性，因为透明区域（不透明度贴图）和表面细节（法线贴图）是高级纹理映射支持方面最重要的两个领域。这些最终需要使用
  JavaFX API 添加到 Java 中，以便开发者能够为 Java 游戏创建逼真的 i3D 模型。


  纹理通道的集合，以及任何控制这些通道之间关系、以及它们将如何相互合成、应用和渲染的代码，被称为着色器定义。在 3D 行业中，着色器通常也被称为材质。我们将在本章的下一节中介绍着色器和着色器语言，因为这是
  3D 和 i3D 游戏开发的另一个专业且复杂的领域。在我的书《VFX 基础》（Apress，2016）中，我也使用开源软件 Fusion 8.2.1 详细介绍了着色器的构建。


  最后，一旦你的纹理在着色器中定义完毕，你需要将这些 2D 资源定向到你的 3D 几何体上，这是通过使用纹理映射坐标来完成的，通常通过称为 UVW 映射的方式实现。在进入第四维度和动画之前，我们也将专门用一节来介绍
  UVW 映射。



  #### 纹理贴图设计：着色器通道与着色器语言


  着色器设计本身就是一种艺术形式；成千上万的着色器艺术家致力于 3D 电影、游戏和电视节目，确保用于“着色”或“蒙皮”3D 几何体的着色器，能让最终的 3D 模型看起来尽可能逼真——这通常是
  3D 制作的目标，即取代成本更高的摄像机拍摄（以及重拍）。


  基本的着色器由一系列 2D 矢量图形、2D 光栅图像或体积纹理组成，这些内容保存在不同类型的通道中，用于施加不同类型的特效，例如漫反射（颜色）、高光（光泽度）、自发光（照明）、凹凸（地形）、法线（高度）、不透明度（透明度）和环境（周围环境）贴图。体积着色器本质上也是
  3D 的，因此它们不使用 2D 图像作为输入，而是使用复杂的算法定义来生成一个贯穿 3D 物体的 3D 着色器，这就是它被称为“体积”的原因。这些 3D 体积着色器也可以被动画化，并能根据其在
  3D 空间中的位置改变颜色和半透明度。


  除此之外，高级着色器语言，例如 Open GL 着色器语言（GLSL），使用代码来指定这些通道如何相互关联，如何应用或处理这些通道中包含的数据，以及如何基于时间、方向或
  3D 空间位置等复杂因素，对这些通道内的数据进行其他更复杂的应用。着色器的复杂性也意味着，着色器越复杂，其渲染时的处理时间就越长，消耗的处理周期也越多。由于复杂着色器能够产生照片级逼真的效果，所需的处理器周期通常代价高昂。


  这可能是 JavaFX 9.0 目前仅支持四种基础（且最容易处理）着色器的主要原因。随着硬件性能越来越强大（你会在更多消费电子产品中看到六核、八核和十核 CPU），JavaFX
  可能会增加最后两个重要的着色器通道：不透明度（或透明度贴图）和法线贴图。


  #### 纹理贴图方向：纹理贴图投影类型与 UVW 坐标


  将 2D 纹理贴图通道（尤其是基础的漫反射颜色通道）中的细节特征与 3D 几何体正确对齐非常重要，否则在渲染时可能会出现相当奇怪或至少在视觉上不正确的结果。这需要在
  3D 的 X、Y、Z 空间中进行，对于体积纹理尤其如此，但对于 2D 纹理，也需要定义它们如何投影到 3D 几何体上或如何包裹住它。


  实现这一点的最简单方法之一是应用纹理贴图投影类型及相关设置，这些设置会自动为你设定 UVW 映射数值。这些 UVW 贴图坐标值将定义 2D 图像平面如何在 3D
  空间中映射到 3D 几何体上，这有点像 2D 空间和 3D 空间之间的桥梁。UVW 浮点值可以手动设置或微调，以精细调整你的视觉效果。


  其中最简单的是平面投影，你可以将其想象为纹理贴图位于 3D 物体前方，你正用一束光穿过它，因此看起来漫反射纹理贴图中的颜色就像在 3D 物体上一样。平面投影是计算机最容易处理的，因此，如果它能为你专业的
  Java 游戏或物联网应用提供所需的效果，就请使用它。然而，它通常用于静态渲染的 3D 图像，因为一旦你（摄像机）移动到 3D 模型的侧面，这种投影映射就无法提供照片级逼真的效果。


  摄像机投影与平面投影类似。摄像机投影将你的纹理从摄像机镜头（与镜头 100%平行）投射到 3D 物体表面，就像幻灯机一样。这可用于将视频背景投射到你的场景中，这样你就可以在其前方建模，或最终为你的
  3D 资产制作动画。如果摄像机移动，摄像机投影会保持与镜头前端平行。这有时被称为广告牌模式（或投影）。


  接下来最简单的是圆柱投影，它比（本质上）从单一方向将纹理贴图投影到 3D 物体上的 2D 平面投影，提供了更全面的 3D 纹理贴图应用方式。一个圆柱体会在上下（Z
  轴）维度上包围你的物体，将图像环绕你的物体投射！因此，如果你绕着它走，会在另一个维度上看到平面投影所无法提供的独特纹理细节。


  一种更复杂的投影类型称为球体投影。它比圆柱投影提供了更完整的 3D 纹理贴图应用方式，从 Z 维度上的 X 和 Y 两个方向将纹理贴图应用到 3D 物体上。球体投影试图处理所有三个（X、Y、Z）轴方向的投影。


  与球体投影类似的是立方体投影，它就像是以立方体格式排列的六个平面投影；这会产生与球体投影相似的结果。当你对 3D 物体应用立方体投影时，物体的面会根据多边形法线的方向或与面的接近程度，被分配到立方体纹理贴图的特定面上。然后，纹理使用平面投影方法（或者对于某些
  3D 软件包，可能是球体投影贴图）从立方体纹理贴图的每个面投射出来。


  如果你使用的是体积纹理，空间投影是一种三维的 UVW 纹理投影，它会贯穿 3D 物体的体积。它通常与程序化纹理或体积纹理一起使用，用于需要内部结构的材质，例如木材、大理石、海绵、玛瑙等。如果你变形一个
  3D 物体或相对于该 3D 物体变换纹理映射坐标，体积纹理或程序化纹理的不同部分将会显现出来。


  还有一种更简单的纹理映射称为 UV 映射（没有 W 维度）。它以二维而非三维方式应用纹理，由于数据量更少，处理起来也更容易。我们可能会在 JavaFX 之外使用
  3D 软件来映射我们的 3D 模型，然后使用模型导入器将已经贴好纹理的 3D 对象导入 Java，因为截至 JavaFX 8，JavaFX API 中尚未添加支持这些更高级
  3D 贴图的类。


  ### 为你的 3D 模型制作动画：关键帧、运动曲线和反向动力学


  在你创建了 3D 几何体并使用着色器和映射坐标为其贴好纹理后，你可能希望让它以某种方式运动起来，例如让一个飞机模型飞行。你在第 2 章学到的关于数字视频资产以及
  2D 动画资产的概念，同样适用于 3D 动画。




  #### 线性动画：轨道、关键帧、循环与范围


  最简单的 3D 动画类型（2D 动画也是如此）是线性动画，它适用于多种动画场景。图 3-5 展示了如何在 Blender 2.8 中，通过“插入关键帧菜单”为立方体对象添加关键帧。


  ![A336284_1_En_3_Fig5_HTML.jpg](img/A336284_1_En_3_Fig5_HTML.jpg)


  图 3-5.


  在 Blender 2.8 中使用“插入关键帧菜单”，选中立方体对象以添加“增量缩放”关键帧


  选中立方体对象后，按下键盘上的 **I** 键即可调出此“插入关键帧菜单”。大多数 3D 软件包都配有通常称为“轨道编辑器”的工具，允许你在轨道上添加关键帧和运动曲线。每条轨道对应一个
  3D 模型；如果你的 3D 模型使用了子组件分组，那么轨道将涵盖组与子组，以及组或子组内的各个独立组件。


  线性动画消耗的计算资源最少，因此效率最高。如果线性动画能满足你的动画目标，请尽量使用最少的轨道数量和最少的关键帧数量，因为这样能占用最少的系统内存。


  如果动画运动是重复性的，请使用无缝循环而非长范围。一个无缝运动循环所占用的内存，比包含同一运动多个副本的长范围要少。使用循环是线性动画中一个极佳的优化原则。接下来，让我们看看一些更复杂的动画类型，包括非线性动画（非直线运动，关键帧间距不均），以及角色动画和程序化动画——后者常用于刚体或柔体物理模拟、布料动力学、毛发动力学、粒子系统和流体动力学等场景。


  #### 非线性动画：运动路径与运动曲线


  一种更复杂的非线性动画类型，其规律性较弱，通常看起来更逼真（尤其在涉及人体运动和简单物理模拟时），它会为动画 3D 对象或元素（层级结构中的子对象）设置一条运动路径。JavaFX
  提供了一个 `Path` 类，可用作自定义复杂动画或游戏精灵运动的路径。为了给沿路径的运动增加更多复杂性，还可以使用运动曲线，使运动本身能够加速或减速，从而模拟重力和摩擦等效果。这些用运动曲线直观呈现的数学算法被称为插值器，JavaFX
  提供了一个 `Interpolator` 类，其中包含了多种最标准（但若有效使用仍相当强大）的运动曲线算法。


  非线性不规则运动关键帧的一个典型例子，是一个橡胶球沿着蜿蜒的道路弹跳。道路的弯曲路径将使用运动路径，确保球始终贴合道路的曲率，并且球的落点符合道路的坡度（角度）。球的弹跳则会使用运动曲线（有时也称为运动插值器），通过控制其运动在时间上的加速与减速节奏，使每次弹跳看起来更真实。在这个例子中，这将控制球如何与地面相互作用。


  图 3-6 展示了屏幕底部的 Blender 时间线编辑器；你可以看到两个旋转关键帧显示为垂直的黄色线条，而当前帧设置显示为垂直的绿色线条。


  ![A336284_1_En_3_Fig6_HTML.jpg](img/A336284_1_En_3_Fig6_HTML.jpg)


  图 3-6.


  Blender 2.8 时间线编辑器，在第 0 帧和第 10 帧处有两个关键帧，当前帧设置为第 6 帧


  包含大量交互元素的复杂物理模拟无法通过关键帧完成——尽管理论上如果你有大量时间或许可行，但这并不划算（不值得投入时间）。正如运动曲线应用于关键帧播放时使用插值算法一样，程序化动画算法更进一步，它不仅影响关键帧的时序，还影响关键帧数据本身（X、Y、Z
  数据、旋转数据、缩放数据等）。


  由于程序化动画以算法形式存在，它非常高效，因为一旦算法创建完成，就可以反复使用而无需额外工作。这些程序化动画算法在 3D 领域催生了许多特效类型，包括刚体动力学和柔体动力学（物理模拟）、绳索和链条动力学、布料动力学、毛发动力学、粒子系统、流体动力学、肌肉和皮肤弯曲动力学、口型同步动力学以及面部表情动力学。我们稍后会介绍程序化动画，因为本章各节的内容是从较基础的概念逐步深入到更高级的概念。


  接下来，我们概述一下角色动画；它很可能是 JavaFX 下一步会支持的动画类型，因为 JavaFX 的导入器正在支持导入更复杂的 3D 数据类型，包括角色动画等高级动画类型。


  #### 角色动画：骨骼、肌肉、皮肤、正向与反向运动学


  一种更复杂的动画类型是角色动画，角色动画师是 3D 电影、游戏或电视内容制作团队中的热门职位之一。角色动画涉及多个复杂层次，包括为角色的骨架搭建“骨骼”层级结构、使用反向运动学控制骨骼（角色）运动、将肌肉附着在骨骼上并定义其弯曲方式、将肌肉附着在皮肤上，甚至添加衣物和布料动力学来为角色着装。在
  3D 角色动画中，其处理方式与现实生活非常相似，目的是逼真地模拟现实——而这正是 3D、i3D 和 VR 通常试图达成的目标。


  因此，使用角色动画模拟生物体，其复杂程度几乎达到了不使用直接编码（即你现在所知的程序化动画）的动画所能达到的极限。


  角色动画最底层的是骨骼；骨骼使用反向运动学算法来限定其运动范围（旋转角度），这样就不会出现肘部反向弯曲，或者头部像《驱魔人》里那样旋转的情况！骨骼按层级连接起来，就构成了——你猜对了——骨架。这个骨架就是你之后用来制作动画（关键帧）以驱动角色的核心。你还可以通过将肌肉和皮肤附着在骨骼上，并定义骨骼运动如何使肌肉弯曲、拉伸皮肤，来模拟肌肉和皮肤。可以想象，设置这一切是一个复杂的过程；这是角色动画中一个称为“绑定”的领域。如果需要添加衣物，3D
  领域还有一个新兴方向叫“布料动力学”，它定义了衣物如何移动、起皱和随风飘动，并且有类似的程序化动画算法旨在提升真实感。接下来，让我们看看这个方向，以及其他一些同样先进的程序化动画和模拟特效算法。




  #### 程序化动画：物理、流体或布料动力学、粒子系统、毛发


  最复杂的动画类型是程序化动画，因为它需要使用代码完成。编写计算 3D 向量和矩阵，以及物理和流体动力学方程的代码，其复杂程度与游戏编程代码不相上下（甚至可能更高，具体取决于游戏的复杂度）。在
  3D 软件包中，这种编码通常使用 C++、Python 或 Java 完成。而在你的《Pro Java 9 Games Development》中，程序化 3D
  动画将通过结合使用 Java 9 API 和 JavaFX 8 API 来实现。程序化动画是 3D 动画中最复杂但也是最强大的一种类型，这也是为什么程序化动画程序员目前是
  3D 电影、游戏、物联网和交互式电视（iTV）行业中更热门的 3D 职位空缺之一。


  在诸如 Blender 或 3D Studio Max 等 3D 建模和动画软件包中，有许多“功能”实际上是程序化动画算法插件。这些插件向用户提供一个用户界面，用于指定参数，这些参数将控制程序化动画在应用于
  3D 模型或复杂的 3D 模型层级结构（通过使用 3D 软件或 JavaFX 场景图创建，例如图 3-4 右侧所示的场景图）后的结果。我们刚刚讨论了一个复杂的骨骼-骨架-肌肉-皮肤角色模型层级结构，可以对其应用布料动力学，使服装在
  3D 角色奔跑、战斗、驾驶、跳舞等动作时能够逼真地随之运动。


  程序化动画算法控制功能的示例，其中许多包含真实世界物理模拟支持，这些功能通常被添加到高级 3D 动画软件包中，包括 3D 粒子系统、流体动力学、布料动力学、绳索动力学、毛发和皮毛动力学、软体动力学和刚体动力学。


  ### JavaFX 3D 支持：几何、动画和场景包


  JavaFX 中有三个顶级包包含了对 2D 和 3D 新媒体资源类型的所有支持。`javafx.geometry`包支持底层 3D 几何结构，例如使用`Point2D`和`Point3D`类表示顶点，以及使用`Bounds`和`BoundingBox`类表示区域。`javafx.animation`包支持底层动画结构，例如使用`Timeline`、`KeyFrame`、`KeyValue`和`Interpolator`类表示时间线、关键帧和运动曲线。`javafx.scene`包包含许多嵌套包，我喜欢称之为子包，包括用于
  2D 或 3D 形状结构的`javafx.scene.shape`包，例如`Mesh`、`TriangleMesh`和`MeshView`类；支持 2D 和 3D
  变换的`javafx.scene.transform`包，包括`Rotate`、`Scale`、`Shear`和`Transform`类；包含着色类的`javafx.scene.paint`包，例如`Material`和`PhongMaterial`类；以及`javafx.scene.media`包（`MediaPlayer`和`MediaView`类）。


  #### JavaFX API 3D 建模支持：点、多边形、网格、变换、着色


  我将把 JavaFX 3D 资源支持分成两个图表，一个用于静态 3D（渲染图像），另一个用于动画 3D（3D 动画）。交互式 3D 将使用所有 JavaFX 3D
  功能以及部分 Java API 功能。第一个图表，图 3-7，展示了 JavaFX 包中支持的四个主要领域。这些对于创建可用于静态 3D 图像、以及与其他 JavaFX
  API 结合用于动画 3D、与 Java API 结合用于交互式 3D 游戏、物联网应用和 3D 模拟的 3D 模型非常重要。


  ![A336284_1_En_3_Fig7_HTML.jpg](img/A336284_1_En_3_Fig7_HTML.jpg)


  图 3-7.


  JavaFX 3D 建模资源对几何、形状、变换和纹理贴图支持的高级示意图


  `javafx.geometry`包包含了 Java 和 JavaFX 中所有 3D 或 2D 几何的基础，即顶点（点）和空间（边界）。`Point2D`类支持顶点（2D
  空间中的一个点）和向量（从一点发出的 2D 空间中的一条线）表示。`Point3D`类也支持顶点（3D 空间中的一个点）和向量（从一点发出的 3D 空间中的一条线）表示。`Bounds`超类表示
  JavaFX 场景图节点及其包含对象的边界。`Bounds`超类的子类`BoundingBox`包含场景图节点对象在 2D 或 3D 空间中边界的更专门化表示。


  `javafx.scene.shape`包包含用于创建 3D 几何体的`Mesh`、`MeshView`和`TriangleMesh`对象（类），而`javafx.scene.transform`包包含用于在
  3D 空间中对 3D 几何体应用 3D 空间变换的`Rotate`、`Scale`、`Shear`和`Transform`对象（类）。`javafx.scene.paint`包包含`Material`和`PhongMaterial`对象（类），允许你使用不同的着色器算法在
  JavaFX 中为 3D 对象添加纹理。接下来，让我们仔细看看 JavaFX API 为我们提供了什么来支持第四维度——时间，以便我们能够为你的《Pro Java
  9》游戏（或物联网应用或 3D 模拟）添加 3D 动画功能。


  #### JavaFX API 3D 动画支持：时间线、关键帧、关键值、插值器


  正如你可能想象的那样，在 JavaFX 中实现 2D 和 3D 矢量动画的大多数关键（无意双关）类都存储在`javafx.animation`包中，如图 3-8
  所示。例外情况是`Camera`超类及其两个子类`PerspectiveCamera`（透视投影）和`ParallelCamera`（正交投影）。`Timeline`对象（类）保存动画定义，该定义由`KeyFrame`对象（类）组成，而`KeyFrame`对象又由包含实际变换指令数据的`KeyValue`对象组成。一个`KeyFrame`对象可以持有一个`KeyValue`对象数组，因此一个`KeyFrame`可以持有多个不同的`KeyValue`变换数据对象。还有一个`Interpolator`类，它包含许多用于向`Timeline`对象内的`KeyFrame`对象应用运动曲线的高级算法。当前支持的`Interpolator`算法包括`DISCRETE`（离散时间插值）、`EASE_IN`和`EASE_OUT`以及`EASE_BOTH`（缓入和缓出），以及`LINEAR`直线（均匀间隔）插值，这显然是处理强度最低的。


  ![A336284_1_En_3_Fig8_HTML.jpg](img/A336284_1_En_3_Fig8_HTML.jpg)


  图 3-8.


  JavaFX 3D 动画支持的高级示意图，展示了`javafx.animation`和`javafx.scene`包


  现在，你已经对 2D 矢量插图和 3D 矢量渲染及动画概念有了一个扎实的（3D）概述。在进入第 4 章关于游戏理论、概念、优化等内容之前，我们先稍作休息。




  ## 总结


  在第三章中，我们深入探讨了与二维矢量插画、三维矢量渲染、纹理贴图及动画相关的一些更为重要的新媒体概念。这些内容将在你专业的 Java 游戏开发工作中用到，以便你提前掌握这些基础知识。


  我首先介绍了同样适用于三维矢量图形的二维矢量图形概念，包括顶点、向量（射线或直线）以及样条线（带有控制手柄的曲线）。我们还探讨了如何使用纯色、渐变色或平铺图像图案来填充这些二维形状。


  接着，我们基于这些概念，带你进入三维矢量图形领域，学习了多边形、三角形、四边形、面片和边，它们与顶点共同构成三维几何体。我们探讨了如何利用纹理贴图、UVW 映射和投影映射，让三维几何线框（也称为网格对象）看起来更立体，以及所有这些元素如何通过材质或着色器整合在一起。


  随后，我们研究了三维动画。它比二维动画或数字视频复杂得多，因为高端三维动画包括角色动画、程序化动画以及算法特效，这些特效涉及物理模拟数学，以及控制大量粒子等操作，从而产生强大的基于代码的动画系统，例如群体模拟、毛发动力学、人群模拟、流体动力学、布料动力学、软体动力学和刚体动力学。在下一章，我们将探讨游戏设计类型。


  最后，我们介绍了 JavaFX 9 API。在本书中，我们将使用这些 API 来实现本章学到的所有三维概念和原理。当我们实现 Java 9 游戏的各个组件时，会详细研究这些
  API。


  在下一章，我们将从全局角度审视游戏理论以及与使用 Java 9 和新媒体资源创建游戏相关的概念，以实现我们的游戏玩法设计和游戏目标。


  '
- '# 4. 游戏设计入门：游戏设计概念、类型、引擎与技术


  让我们基于前两章学到的新媒体知识，进一步探讨如何利用强大的像素、帧、样本和矢量来创建专业的 Java 9 游戏以及物联网应用，并分析在某些专业 Java 9 游戏开发类型和场景中使用（或不使用）这些技术的原因。我们将研究高级游戏概念、基本游戏设计类型、游戏设计优化概念，以及
  Java 平台可用的开源游戏引擎，包括物理引擎（如 JBox2D、JBullet、Jinngine 和 Dyn4J）和 3D 游戏引擎（如 LWJGL 和 JMonkey）。


  我首先要介绍的是静态（固定）与动态（实时）这一基础概念，它适用于游戏类型、游戏设计以及游戏优化。我已在第二章（图像与音视频对比）和第三章（渲染 3D 与 3D
  动画及交互式 3D 对比）中讨论过静态（图像、渲染的静态 3D 图像）与动态（数字视频、2D 和 3D 动画、交互式 3D、数字音频）的概念。正如你将看到的，这个简单的概念是分类游戏类型的绝佳方式，也是游戏优化的基础原则。在本章中，我们将从宏观层面概述游戏玩法设计、新媒体整合，以及不同游戏设计方法和策略在内存占用和
  CPU 处理周期方面的成本。


  之所以这一点很重要，并且我们在本书第一部分就“预先思考”所有这些游戏设计因素，是因为你希望游戏能在所有用于运行游戏的不同平台和消费电子设备上流畅运行，即使这些设备配备的是单核处理器。实际上，如今单核处理器已极为罕见。入门级消费电子设备现在通常配备双核、四核、六核或八核
  CPU。与流畅游戏体验相反的是卡顿或跳跃的游戏体验，这并非良好的用户体验。用户体验取决于你如何结合用户界面设计、游戏概念、新媒体资源与代码优化，以及每个用户对游戏玩法设计的兴趣和好奇程度。


  接下来，我将介绍游戏设计与开发的不同方面或组成部分。这些包括游戏设计与开发的概念、技巧和“行话”，我希望确保你能跟上进度。这些主题包括二维精灵、三维模型、人工智能、图层、关卡、碰撞检测、物理模拟、背景板动画、游戏玩法逻辑、游戏设计、用户界面，以及类似的游戏设计与开发方面，它们可被视为游戏“组件”，因为每个组件都为专业的
  Java 9 游戏增添了不同的属性和能力。最后，我将介绍你可以设计和开发的不同游戏类型或种类，旨在激发你的左右脑同时思考，随后我将探讨一些技术问题，以及不同类型之间在资源和代码优化方面的差异。




  ## 高级概念：静态游戏与动态游戏


  我想从一个高级概念入手，这个概念贯穿本章我将讨论的所有内容，从你可以创建的游戏类型，到游戏优化，再到 JavaFX 场景图的构建。我们在第 2 章和第 3 章中已经探讨过这个概念，下一章我们还将再次审视它，届时我们将探讨固定或静态、不会变化的
  Java 常量，与动态且实时变化的 Java 变量之间的概念。类似地，JavaFX 场景图中的用户界面设计可以是静态的（固定或不可移动的），也可以是动态的（可动画、可拖动或可换肤的），这意味着你可以更改
  UI 外观以符合个人品味。


  这些概念在游戏设计和开发中如此重要的原因在于，你为“运行”或“渲染”游戏而设计的游戏引擎，需要不断检查（处理）游戏中的动态部分，以查看它们是否发生了变化，从而需要做出响应。响应需要处理，并且需要执行（处理）Java
  代码来更新分数、移动棋盘位置、播放动画帧、改变游戏棋子状态、计算碰撞检测、计算物理效果、应用游戏逻辑等等。在每个游戏循环（在 JavaFX 中称为脉冲）更新时，这些动态检查需求（以及随之而来的处理）确保变量、位置、状态、动画、碰撞、物理等符合你的
  Java 游戏引擎逻辑，并且这些需求确实会累积起来。这就是为什么在游戏设计中平衡静态与动态如此重要；在某个时刻，负责所有工作的处理器可能会过载，从而降低你的游戏运行速度。


  这种对所有实时、每脉冲检查（用于增强游戏动态性）的过载，其结果是游戏运行的帧率可能会下降。没错，就像数字视频和动画一样，游戏也有帧率，但游戏帧率是基于你编程逻辑的效率。游戏的帧率越低，游戏运行就越不流畅，至少对于像街机游戏这样的动态实时游戏来说是这样。游戏运行的流畅程度与用户体验的“无缝”程度息息相关。


  因此，静态与动态的概念对于游戏玩法的每个方面都非常重要，并且使得某些类型的游戏比其他类型的游戏更容易实现出色的用户体验。我们将在本章后面部分介绍不同类型的游戏，但正如你可能想象的那样，棋盘游戏本质上更“静态”，而街机游戏本质上更“动态”。话虽如此，本书将介绍一些游戏优化方法，这些方法可以使游戏保持动态（看起来有很多事情在发生），而从
  CPU 处理的角度来看，真正发生的事情，从处理的角度来看，变得可控。这是游戏设计的众多技巧之一，归根结底，游戏设计就是关于这样或那样的优化。


  我在 Android (Java) 编程书籍中介绍的最重要的静态与动态设计问题之一，是使用 XML（静态设计）进行 UI 设计，与使用 Java（动态设计）进行
  UI 设计之间的对比。Android 平台允许使用 XML 而非 Java 进行 UI 设计，以便非程序员（设计师）可以为应用程序进行前端设计。JavaFX 通过使用
  JavaFX 标记语言 (FXML) 实现了完全相同的功能。


  你必须创建 FXML JavaFX 应用程序才能做到这一点，正如你在第 6 章中使用 NetBeans 9 创建游戏应用程序时将会看到的那样。此选项会将 `javafx.fxml`
  包和类添加到你的应用程序中，允许你使用 FXML 设计 UI，然后让你的 Java 编程逻辑“填充”它们，从而使设计成为 JavaFX UI 对象。需要注意的是，使用
  FXML 会增加另一层处理器开销，包括 FXML 标记及其转换（和处理）到应用程序开发和编译过程中的开销。出于这个原因，并且因为归根结底，这是一本关于 Pro
  Java 9 游戏开发的书，而不是一本关于 FXML 标记的书，在本书中，我将专注于如何使用 Java 9 和 JavaFX API 来完成所有事情，而不是使用
  FXML。


  无论如何，我关于使用 XML（或 FXML）创建 UI 设计的观点是，这种 XML 方法可以被视为“静态的”，因为设计是事先使用 XML 创建的，并在编译时使用
  Java 进行“填充”。Java 填充方法使用设计师提供的 FXML 设计来创建场景图，该场景图根据使用 FXML 定义的 UI 设计结构，填充了 JavaFX
  UI 对象。静态 UI 被设计为固定的，用于处理游戏玩家的用户界面，并在游戏加载时一次性放入内存。




  ### 游戏优化：平衡静态元素与动态元素


  游戏优化归根结底在于平衡静态元素（无需实时处理）与动态元素（需要持续处理）。过多的动态处理，尤其是在非必要的情况下，会导致游戏画面卡顿或生硬。这就是为什么游戏编程是一门艺术；它需要“平衡”，以及出色的角色、故事情节、创造力、幻觉、预期、准确性，最后才是优化。


  例如，表 4-1 描述了在动态游戏中，针对优化所需考虑的一些不同游戏组件。如你所见，游戏玩法的许多方面都可以进行优化，从而显著减轻处理器的“繁忙”程度。如果这些主要的动态游戏处理区域中，哪怕有一个“失控”，占用了处理器宝贵的“每帧周期”，都会极大地影响你游戏的用户体验。我们将在本章下一节中介绍游戏术语（精灵、碰撞检测、物理模拟等）。


  表 4-1.


  可优化的游戏玩法方面


  | 游戏玩法方面 | 基本优化原则 |

  | --- | --- |

  | 精灵位置（移动） | 在实现平滑移动外观的前提下，尽可能多地移动精灵的像素数 |

  | 精灵动画 | 最小化需要循环的帧数，以营造平滑动画的错觉 |

  | 碰撞检测 | 仅在必要时（物体彼此靠近时）检测屏幕上对象之间的碰撞 |

  | 物理模拟 | 最小化场景中需要进行物理计算的对象数量 |

  | 群体/人群模拟 | 最小化需要循环的成员数量，以营造人群或群体的错觉 |

  | 粒子系统 | 最小化粒子复杂度以及营造预期效果所需的粒子数量 |

  | 摄像机动画（3D） | 除非是游戏玩法不可或缺（绝对必要）的部分，否则最小化摄像机动画 |

  | 背景动画 | 最小化动画背景区域，使整个背景看起来有动画效果，但实际上并非如此 |

  | 数字视频解码 | 除非是游戏玩法不可或缺（绝对必要）的部分，否则最小化数字视频的使用 |

  | 游戏玩法（或 AI）逻辑 | 设计/编写尽可能高效的玩法逻辑、模拟或人工智能代码 |

  | 计分板更新 | 通过绑定更新计分板，并将显示更新最大限制为每秒一次 |

  | 用户界面设计 | 使用静态用户界面设计，避免使用脉冲事件来定位 UI 元素 |


  考虑到所有这些关于游戏玩法内存和 CPU 处理优化的议题，将使你的 Pro Java 9 游戏设计和 Java 编码成为一项相当棘手的任务。毋庸置疑，专业的 Java
  9 游戏开发涉及很多方面。


  值得注意的是，其中一些方面协同工作，为玩家营造特定的幻觉；例如，精灵动画会营造出角色奔跑、跳跃或飞行的错觉，但如果不将该代码与精灵定位（移动）代码结合，就无法实现这种幻觉的真实感。为了微调幻觉，可能需要调整动画的速度（帧率）和移动的距离（每帧移动的像素数）。我喜欢将这些调整称为“微调”。微调意味着手动插值数据值，以达到最逼真的最终效果。游戏开发是一个迭代过程；无论你多么努力地预先坐下来设计游戏，然后创建新的媒体资源并编写
  Java 代码，修改都是不可避免的。


  在本书中，我们将深入探讨专业 Java 游戏设计与开发的许多领域，但为了在此更详细地阐述这些内容，当我们审视这些考量因素时，如果你能以更少的次数移动游戏元素（主要玩家精灵、投射物精灵、敌人精灵、背景图像、3D
  模型）更多的像素数，你将节省处理周期。消耗处理时间的是移动这个动作本身，而不是移动的距离（移动了多少像素）。类似地，对于动画而言，实现令人信服的动画所需的帧数越少，存储这些帧所需的内存就越少。同样的原则也适用于数字视频数据的处理，无论你的数字视频资源是内嵌的（包含在
  JAR 文件中）还是从远程服务器流式传输的。解码数字视频帧是处理器密集型任务，无论你是否在流式传输数据，它都会消耗宝贵的 CPU 周期，而这些周期本可用于游戏中其他可能也需要大量处理的组件。


  同样重要的是要记住，我们既要优化处理器周期，也要优化内存使用，两者相辅相成。使用的内存位置越少，处理器检索数据所需的工作就越少，因为内存位置的读取和处理是一次一个内存地址进行的；需要处理的地址越少，意味着进行的处理就越少。因此，内存优化也应被视为一种处理周期优化。


  对于群体、人群动力学和粒子系统效果，当使用这些处理密集型特效时，需要处理的元素更少，每个元素的复杂度更低，这些优势会迅速累积起来。这类基于粒子的特效为任何游戏、电影或电视剧增添了大量的“哇”效果，但也需要实时处理海量数据，这可能是处理密集型的。我们将在第
  5 章中介绍数组。


  碰撞检测是多种不同游戏类型（如街机游戏、棋盘游戏和第一人称射击等虚拟现实游戏）游戏编程逻辑的另一个主要部分。非常重要的一点是，不要盲目地检查（处理）游戏元素之间的碰撞。务必排除那些不在“游戏中”（屏幕上）、不活跃、彼此不相邻或永远不可能相互碰撞（静态元素）的游戏资源。正如你可能想象的那样，碰撞检测的考量、优化和编程本身就是一门艺术，仅此主题就有整本书的著作，所以请对这个迷人的主题保持正确的认识，并自行深入研究，特别是如果你有兴趣创建可能发生大量碰撞的
  Pro Java 9 游戏。


  为物理模拟计算自然力是处理器最密集的任务，与碰撞类似，关于物理编程的各个领域都有许多著作，包括刚体或柔体动力学、布料动力学、绳索动力学、毛发（实际上是连接的圆柱粒子系统）、流体动力学或驾驶动力学（用于驾驶游戏）。如果这些类型的物理模拟中的任何一种没有经过精心编码和优化，那么整个游戏玩法的用户体验可能会戛然而止，具体取决于游戏玩家用来玩游戏的消费电子硬件内部有多少个处理器核心。




  ### 2D 与 3D 渲染：表象静态与底层动态


  静态 3D 游戏，例如国际象棋，其棋盘在你不移动棋子到新位置时看似静止；然而，由于它们利用 3D 实时渲染来创建虚拟现实环境，在“底层”，系统可能正忙于实时渲染几何体、光照、摄像机和材质，具体取决于你如何在场景图中设计所有这些元素，以及你的
  Java 游戏处理逻辑是如何设置的。正如我们在第 3 章中看到的，3D 新媒体资产的本质比 2D 新媒体资产复杂一个数量级，同样的情况也适用于 3D 游戏与 2D
  游戏的对比。2D 游戏确实有一个称为“双缓冲”的“渲染”元素，即在下一帧显示在屏幕上之前，先在内存中合成。然而，3D 渲染实际上是创建像素颜色和 Alpha 值，而不仅仅是将其排列在
  X、Y 坐标上。3D 渲染基于 3D 几何体、变换、材质、着色器、映射坐标、光源位置和摄像机位置，从零开始创建像素颜色值和 X、Y 坐标。


  接下来，让我们更详细地探讨专业 Java 游戏设计的一些核心游戏概念及其相关考量，并审视一些适用于所有类型游戏的核心理念。


  ## 游戏组件：2D、3D、碰撞、物理和人工智能


  让我们来看看构建游戏所需理解的各种游戏设计概念、方面和组件，以及我们可以用来实现这些游戏玩法方面的 Java（或 JavaFX）包和类，我将其称为游戏玩法设计与开发的组件。这些可能包括游戏元素本身（在游戏行业中，2D
  游戏通常称为精灵，3D 游戏称为模型），以及处理引擎（我们可以自己编写代码，或导入现有的 Java 代码库，例如人工智能、物理模拟、粒子系统、反向运动学或碰撞检测）。我将花一些时间逐一介绍这些内容，解释它们为何适用于专业
  Java 游戏，并给出如果你决定使用这些游戏组件时应牢记的一些优化考量。


  ### 2D 精灵：街机风格游戏的基础


  让我们从最古老的电子游戏形式之一——街机游戏的基础开始。2D 资源（称为精灵）定义了我们的主要角色、用于伤害主要角色的投射物、主要角色收集的宝藏，以及发射这些投射物的敌人。精灵是
  2D 图形元素，可以是静态的（固定的，单个图像）或动态的（动画的，多个图像的无缝循环）。精灵可以是矢量（形状）或光栅（基于图像）资源。如果是基于图像的，它们通常是
  PNG32 格式并带有 Alpha 通道，以便能够实时合成到游戏设计的其余部分之上，使结果看起来像数字视频，即看起来像是用摄像机拍摄并在屏幕上播放，而不是基于游戏玩家的输入（通常是游戏控制器、键盘按键或
  iTV 遥控器）实时合成的。


  精灵将根据决定游戏运行方式的编程逻辑在屏幕上移动。精灵需要与背景图像、场景图中的其他游戏元素以及其他玩家的精灵进行合成，因此用于创建精灵的 PNG32 图形需要支持透明背景。这也是我介绍
  2D 对象遮罩主题的原因——以便将其用作游戏中的精灵。


  这也是我在第 2 章中向你介绍 Alpha 通道透明度概念的原因，因为我们需要用精灵实现同样的最终效果，从而为游戏带来无缝的视觉体验。在本书后续部分，我们将介绍如何使用
  GIMP 创建带有 Alpha 通道的图形，这样你就可以创建专业级别的精灵，并与游戏的其他图形无缝合成。


  由于 3D 模型都位于同一个渲染空间中，3D 渲染引擎会为你处理这个透明度因素，如果你使用 3D 模型而不是 2D 精灵，则无需担心为游戏的每个 3D 组件设置
  Alpha 通道。接下来，让我们看看 3D 模型，作为这一点的延续。


  ### 3D 模型：角色扮演风格游戏的基础


  得益于实时渲染平台（如 Android、HTML5、JavaFX 和 DirectX（DirectX 用于 Xbox 和 Windows 等微软产品）中使用的
  OpenGL ES 3 和 Vulkan）的出现，一种较新的电子游戏形式涉及实时渲染的虚拟世界。3D 模型提供了更灵活、更先进、更逼真的游戏玩法，因为它们将所有其他新媒体类型（数字音频除外）整合为一体；因为纹理、材质和着色器可以使用数字图像和数字视频；并且
  3D 几何网格对象可以利用其实际几何体来计算与真实对象的碰撞，而且是在三维空间而非二维空间中进行。再加上 3D 资源可以实时响应多个光源和摄像机，你就拥有了一个功能强大得多的
  i3D 游戏设计环境，尽管从数学和 Java 编码的角度来看更为复杂。


  由于 3D 和 i3D 非常复杂，因此有大量的优化考量，例如优化网格（几何体），这一过程称为低多边形建模，涉及谨慎使用点、边和面，然后使用平滑组来提供平滑的曲率，而增加更多几何体也能达到同样的效果。我在第
  2 章中还介绍了一些优化原则，例如使用更少的像素、更低的颜色深度和更少的通道，这些原则将用于纹理贴图（即图像）。同样，对于 3D 动画，我在第 2 章中介绍了一些可用于动画数据的优化原则，这与数字视频类似，例如使用更少的像素、更少的帧、更低的颜色深度和更少的通道，以及更简单的插值算法。


  3D 和 i3D 游戏的另一个优化与照亮虚拟世界所使用的光源数量有关。光照计算通常代价高昂，以至于大多数游戏引擎（包括 JavaFX）都将允许的光源数量限制为八个或更少。你能使用的光源对象越少，渲染引擎需要进行的计算就越少，你的游戏运行帧率就越高（速度越快）。


  同样的考量也适用于 3D 动画软件中的摄像机。例如，当渲染输出到胶片时，你可以根据需要渲染出任意数量的场景摄像机视图，而不会产生（实时）处理器开销。当消费电子设备（而非庞大的工作站渲染农场）处理该
  3D 内容时，最小化摄像机数量就变得至关重要，因为每个摄像机输出的数据量相当于未压缩的原始数字视频数据流。在这种情况下，你有一个 3D 渲染引擎在实时生成另一个未压缩的
  2D 动画（视频）资源，这同样会占用大量处理能力，因此，只有在你的游戏绝对需要实时平视显示器（HUD）时（例如，用于实时第二游戏视角），才应使用此功能。




  ### 碰撞检测：游戏资产交互的基础


  对于某些类型的游戏而言，另一个重要的组成部分或方面是碰撞检测，因为如果你的游戏元素在屏幕上只是相互擦肩而过，在接触或“相交”时从不触发任何酷炫效果，那么你的游戏实际上就没什么可玩性了！想象一下，如果没有碰撞检测，弹球游戏或台球会是什么样子！一旦你添加了一个由相交逻辑处理程序组成的碰撞检测引擎，你的游戏就能通过处理其组成几何体（通常是边缘、线条、曲线或它们的边界（`BoundingBox`））的相交情况，来确定任何
  2D 矢量精灵或 3D 模型是否正在相互接触或重叠。


  碰撞检测会调用（即触发）相关的游戏逻辑处理程序，这些程序将确定当任何给定的 2D 精灵或 3D 模型（例如一个抛射物和主角）相交时会发生什么。例如，当一个抛射物与主角相交时，可能会累积伤害点数，生命指数可能会减少，或者可能会触发死亡挣扎动画。另一方面，如果一个宝藏物品与主角相交（即被主角拾取），则可能会累积能量或能力点数，生命指数可能会增加，或者可能会触发“我找到了”的欢呼动画。


  如你所见，根据你正在创建的游戏类型，游戏的碰撞检测引擎很可能成为你游戏玩法背后的基础设计元素之一，仅次于代表角色、抛射物、宝藏、敌人、障碍物和道具本身的 2D
  精灵或 3D 模型，这也是我按此顺序介绍它们的原因。一旦检测到碰撞，通常会触发你的物理模拟代码，向游戏玩家展示物体在碰撞后应如何相互反应。那么，接下来让我们看看这个。


  ### 物理模拟：游戏玩法真实感的基础


  另一个要添加到游戏玩法中的重要组成部分或属性是真实世界的物理模拟。添加诸如重力、摩擦力、弹力、阻力、风力、加速度、减速度以及运动曲线（如 JavaFX 的`Interpolator`类所提供的）和类似力等因素，都将在已经逼真的精灵、同步动画序列、风景背景和高精度碰撞检测的基础上，增加额外的真实感。


  重力、摩擦力、阻力和风力是在 Java 代码中模拟或调整 2D 精灵或 3D 模型运动的最简单因素。我在我的书《Beginning Java 8 Games Development》（Apress,
  2014）的结尾部分简要提到了这一点。弹力类似于运动曲线中用于加速度和减速度的数学计算，它可以用来模拟单次弹跳，但无法模拟物理模拟中弹跳的衰减。


  你可以编写自己的 Java 方法，为你的专业 Java 游戏应用物理效果，也可以使用第三方 Java 库，这些库可以在 SourceForge、GitHub 或`code.google.com`等网站上找到。我将介绍一些用于
  2D 和 3D 游戏引擎、2D 和 3D 物理模拟引擎、2D 和 3D 碰撞检测引擎、正向和逆向运动学引擎等的库。我将在本章的下一个主要部分介绍这些内容，以防你想在你的专业
  Java 游戏或物联网应用中使用它们，而不是自己编写。


  有趣的是，我将在本章的“Java 引擎：游戏、物理和逆向运动学”部分介绍的大多数开源第三方物理引擎，不仅实现了物理模拟，还实现了碰撞检测。这是因为这两者在现实生活中是紧密联系在一起的。要出色地处理碰撞，物理模拟需要与该代码无缝集成。在现实生活中，碰撞前后都涉及物理过程，而这些引擎旨在重现现实生活（完全可信）的实现结果。请注意，从
  Java 9 开始，这些库需要被“模块化”，以便在新的 Java 9 模块系统中正确使用。


  ### 人工智能：游戏玩法逻辑的基础


  最后，你可以添加到游戏玩法中的最具专有性的逻辑或逻辑结构（Java 代码）是自定义的游戏玩法逻辑，它使你的游戏在市场上真正独一无二。这种人工智能（AI）编程逻辑应保存在其自己的
  Java 类和方法中，与物理模拟或碰撞检测代码分开。毕竟，Java 使模块化变得容易，而这种游戏玩法智能就像是你专业 Java 游戏的裁判。它监督玩家、对手、障碍物、宝藏、计分、惩罚等，确保每次游戏体验对每个人来说都是一致的！这与裁判在体育赛事或比赛中执行的功能相同。


  Java 有第三方 AI 引擎；然而，我建议在这个领域，你可能希望从头开始编写你的游戏玩法逻辑代码，以便它能以比任何第三方 AI 规则引擎都更无缝的方式，与你的用户界面（UI）代码、计分引擎代码、动画引擎代码、角色（精灵或模型）移动代码以及碰撞处理代码集成。


  当你开始将所有这些游戏组件组合在一起时，它会使游戏更加可信，也更加专业。一款优秀游戏的关键目标之一是“信念的暂停”，这仅仅意味着你的玩家 100%完全相信游戏的前提、角色、目标和玩法。这也是任何内容创作者——无论是电影制作人、电视剧制片人、作家、词曲作者、游戏程序员还是应用程序开发者——所追求的目标。如今，游戏与其他任何内容分发类型相比，具有同等甚至更强的创收能力，而且你可以直接向公众分发游戏，无需电影制片厂、唱片制作人或电视网络等中间商。这是最重要的一点，因为你将获得“你拿
  70%，商店拿 30%”的分成，而不是“分销商拿 70%，你拿 30%”！


  ## Java 引擎：游戏、物理和逆向运动学


  互联网上可以轻松找到许多开源第三方游戏引擎、物理和碰撞引擎、AI 引擎，甚至逆向（或正向）运动学（IK）引擎。其中大部分位于 SourceForge、GitHub
  或`code.google.com`上，可以通过基本的谷歌搜索找到。它们大多以 JAR 格式提供。




  ### 游戏引擎：JMonkey 与轻量级 Java 游戏库


  LWJGL 是一个开源、跨平台的 Java 库，适用于开发 3D 图形（OpenGL）、3D 音频（OpenAL）和并行计算（OpenCL）应用程序（图 4-1）。其
  API 访问直接且高性能，同时封装在适合 Java 生态系统的类型安全层中。其他高级 3D 游戏引擎也可能使用 LWJGL。


