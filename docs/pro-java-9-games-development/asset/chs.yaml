  7-2 所示，从左到右介绍 `javafx.scene` 包中的类，顺序依据你使用这些类的频率，从最常用到最不常用。话虽如此，所有这些类（可能除了 `Snapshot`
  类）对于 i3D 游戏都非常重要。


  ### JavaFX Scene 类：定义尺寸和背景颜色


  `javafx.scene` 包中的两个主要类是 `Scene` 类和 `Node` 类。我们将在下一节介绍 `Node` 类及其 `Parent`、`Group`
  和 `SubScene` 子类，因为这些类及其子类（例如 `JavaFXGame` 类中使用的 `StackPane` 类）可用于在 JavaFX 中实现场景图架构。此外，从某种意义上说，以及在我图
  7-2 和图 7-3 所示的图表中，`Node` 类及其子类可以被视为“位于”`Scene` 类“之下”，尽管 `Node` 类并不是 `Scene` 类的子类。实际上，`Node`（场景图）类及其子类，或者更确切地说，使用这些类创建的对象，实际上包含在
  `Scene` 对象本身内部，就像在现实舞台制作中事物按场景分组一样。因此，我们首先来看看 `Scene` 类及其 `Scene()` 构造方法如何用于为 JavaFX
  应用创建 `Scene` 对象。本节将极大地巩固你在第 5 章中学到的关于重载构造方法的知识，因为需要多种不同的方式来创建 `Scene` 对象。


  `Scene` 类通过 `Scene()` 构造方法用于创建 `Scene` 对象。该方法根据你选择使用的六个重载构造方法中的哪一个，接受一到五个参数。这些构造方法包括以下六种不同的重载参数列表数据字段配置：


  ```

  Scene(Parent root)

  Scene(Parent root, double width, double height)

  Scene(Parent root, double width, double height, boolean depthBuffer)

  Scene(Parent root, double width, double height, boolean depthBuffer, SceneAntialiasing
  aAlias)

  Scene(Parent root, double width, double height, Paint fill)

  Scene(Parent root, Paint fill)

  ```


  当前在你的引导 Java 和 JavaFX 代码中使用的构造方法（如图 6-7 和 Java 代码第 28 行所示）是第二个构造方法，到目前为止，它的结构（调用）如下：


  ```

  Scene scene = new Scene(root, 300, 250);

  ```


  如果你想为场景添加黑色背景颜色，你将使用第五个重载构造方法，使用 `Color` 类中的 `Color.BLACK` 常量（这是一个 `Paint` 对象，因为
  `Color` 是 `Paint` 的子类）作为填充数据，此处为填充颜色。这可以通过以下 `Scene()` 对象构造方法调用来实现：


  ```

  Scene scene = new Scene(root, 300, 250, Color.BLACK);

  ```


  请注意，`root` 对象是一个 `Parent` 子类，称为 `StackPane` 类，它是在 `Scene()` 构造方法调用上方两行，通过以下 Java
  代码行使用 `StackPane()` 构造方法创建的：


  ```

  StackPane root = new StackPane(); // StackPane 继承自 Parent；因此是 Parent 根节点类型

  ```


  如你所见，任何属于该构造方法参数位置（数据）所声明（要求）的对象（类）类型的子类的类都可以在构造方法中使用。这就是为什么我们能够在参数列表中使用 `Color`
  和 `StackPane` 对象，因为它们分别具有来自 `Paint` 和 `Parent` 类的超类渊源。




  如果你想知道布尔类型的 `depthBuffer` 参数是做什么用的，它用于 i3D 场景组件。由于这些场景组件是 3D 的，并且具有深度（除了 2D 的“X”和“Y”分量外，还有一个“Z”分量），因此如果你正在创建
  3D 场景，或者将 2D 和 3D 场景组件组合在一起，就需要包含这个参数并将其设置为 `true`。最后，如果你想知道第四个构造方法参数列表中传递的 `SceneAntialiasing`
  对象（及其类）是做什么的，它用于为 3D 场景组件提供实时平滑处理。因此，对于我们将需要的 3D 场景对象，构造方法的调用看起来像下面这样：


  ```

  Scene 3Dscene = new Scene(root, 300, 250, true, true);

  ```


  ### JavaFX 场景图：使用父节点组织场景


  场景图并非 JavaFX 独有，现在可以在相当多的新媒体内容创作软件包中看到，例如 3D、数字音频、声音设计、数字视频和特效等。场景图是一种内容数据结构的可视化表示，它看起来像一棵倒置的树，根节点在顶部，分支节点和叶节点从根节点延伸出来。我第一次看到场景图这种场景设计方法，是在使用芬兰
  RealSoft OY 公司为 Amiga 4000 开发的名为 Real3D 的软件包进行 3D 建模、渲染和动画制作的时候。此后，这种方法被大量的 3D、数字视频和特效软件包所模仿，现在已成为
  JavaFX 组织其场景内容的方式。因此，你们中的许多人可能已经熟悉并适应了这种设计范式。场景图数据结构不仅允许你构建、组织和设计你的 JavaFX 场景及其内容，而且如果你正确设置了场景图，它还允许你将不透明度、状态、事件处理器、变换和特效应用于场景图层次结构的整个逻辑分支。图
  7-3 展示了一个基本的场景图树，根节点在顶部，分支节点和叶节点在根节点下方。


  ![A336284_1_En_7_Fig3_HTML.jpg](img/A336284_1_En_7_Fig3_HTML.jpg)


  图 7-3.


  JavaFX 场景图层次结构，从根节点开始，向下延伸到分支节点和叶节点


  根节点是最顶层的节点，这就是为什么它被称为根，尽管它在顶部，而不是像植物世界中的根那样在底部。根节点没有父节点，也就是说，在场景图层次结构中，它上面没有任何东西。根节点本身是其下方的分支节点和叶节点的父节点。


  场景图树中下一个最强大（也最复杂）的结构称为分支节点，它使用 `javafx.scene.Parent` 类作为其超类，并且可以包含子节点，这是合乎逻辑的，因为它扩展了一个恰如其分地命名为
  `Parent` 的类。一个分支节点可以包含其他分支节点以及“叶”节点，因此它可以用来创建一些非常复杂且非常强大的场景图层次结构（或场景图架构）构造。


  层次结构中的最后一级是“叶”节点，叶节点是分支的末端。因此，叶节点不能有子节点。需要注意的是，叶节点可以直接从根节点延伸出来，正如你在图 7-3 中看到的那样。分支节点可以通过使用
  `Parent`、`Group` 或 `SubScene` 类（如图 7-2 所示）或其任何子类（例如 `WebView`、`Region`、`Pane` 或
  `StackPane` 类）来创建。


  位于分支最末端（即叶节点）的对象示例包括可以使用参数进行配置的 JavaFX 类（实例化为对象）。示例包括形状、文本或控件。这些本身就是设计或内容组件，因此其设计初衷并非拥有任何子节点（子对象），所以根据其类功能设计的性质，它们必须位于树和分支的末端。


  因此，叶节点将始终包含一个 JavaFX 类，该类既不是从 `Parent` 类或 `Group`、`Region` 或 `SubScene` 类派生（扩展）而来的，其本身也没有被专门设计为在你的
  JavaFX 场景图层次结构中包含任何子元素（子对象）。


  `Parent` 类的三个子类可以用作分支节点。其中包括：`Group` 类，用于对子（叶节点）对象进行分组，以便可以一次性将不透明度、变换和特效应用于组节点；`Region`
  类，用于在 2D 中对子（叶节点）对象进行分组以形成屏幕布局，如果你愿意，可以使用 CSS3 对其进行样式设置；以及 `WebView` 类，用于管理 `WebEngine`
  类，该类在 `WebView` 中渲染 HTML5、JS 和 CSS 内容。




  ### JavaFX 场景内容：灯光、摄像机、光标、开拍！


  接下来，让我们看看图 7-2 中心列出的八个类，它们提供了一些强大的多媒体工具，用于控制应用程序的光标，以及为你的 2D 和 3D JavaFX 应用程序提供自定义灯光特效和自定义摄像机功能。在本例中，这指的是游戏，但也可能是电子书、iTV
  节目或任何需要 JavaFX 为 Java 9 API 提供的强大新媒体功能的物联网应用。


  图 7-2 中心部分列出的更通用的类（`Cursor`、`LightBase`、`Camera`）是父类，而每个父类后面列出的更专门的类（`ImageCursor`、`PointLight`、`ParallelCamera`
  等）则是这些父类的子类。除了 `LightBase` 类，这似乎是显而易见的！


  你可能已经猜对了，JavaFX 的 `Cursor` 类可用于控制在任何给定时间使用的应用程序光标图形（箭头、手型、闭合手型、张开手型、调整大小、移动、文本、等待、无）。`ImageCursor`
  子类可用于定义和提供自定义的基于图像的光标，使用自定义光标图像中的 X 和 Y 位置来定义其“点击点”，也称为光标的“热点”。


  `LightBase` 类及其子类 `PointLight` 和 `AmbientLight` 可用于照亮你的场景。这些类主要用于 3D 场景，并且要求游戏运行的任何平台都具备
  3D 能力，这在当今并不是什么问题，因为大多数主要的 CPU 制造商也生产（并集成）GPU。此外，需要注意的是，如果渲染游戏的硬件平台上没有 GPU，Prism
  游戏引擎将使用 3D 处理模拟来模拟 3D 环境（GPU）。这被称为软件渲染。


  如果你设置正确，你也可以将这些光照类用于你的 2D 游戏，或者用于“混合”2D 和 3D 游戏的光照，我们将在本书后面看到这一点，因为 JavaFX 支持它。


  `Camera` 类及其子类 `ParallelCamera` 和 `PerspectiveCamera` 可用于拍摄你的场景的照片或视频，并可用于 3D、2D
  和混合游戏应用程序。其中两个摄像机类，`Camera` 和 `ParallelCamera`，不要求运行 JavaFX 应用程序（在本例中是游戏）的平台具备 3D（GPU）能力。平行摄像机视图在
  3D 软件中有时被称为正交投影。


  `Camera` 类的子类提供了两种不同类型的专用摄像机。`ParallelCamera` 类可用于渲染没有深度透视校正的场景，这在 3D 行业中称为正交投影。这意味着这个类非常适合用于
  2D 场景（以及 2D 游戏）。


  `PerspectiveCamera` 类提供了一个用于 3D 场景的复杂得多的摄像机，它将支持 3D 观察体。与 `LightBase` 类及其子类一样，`PerspectiveCamera`
  类要求你的专业 Java 9 游戏（或物联网应用程序）运行的硬件平台（称为目标平台）具备 3D 能力。


  `PerspectiveCamera` 类有一个 `fieldOfView` 属性（状态或属性）。这可以用来改变你的观察体，就像真实的摄像机变焦镜头一样，当你从广角变焦到长焦时。`fieldOfView`
  属性的默认设置是 30 度的锐角。如果你还记得高中的几何课，你可以通过沿着 y 轴（上下轴）看向摄像机来想象这个视野。正如你所料，有 `.getFieldOfView()`
  和 `.setFieldOfView(double)` 方法调用来控制这个摄像机类属性。


  接下来，让我们更仔细地看看场景工具类。之后，我们将更仔细地研究一些 `javafx.scene` 子包，例如 `javafx.scene.text`、`javafx.scene.image`、`javafx.scene.shape`
  和 `javafx.scene.layout`。


  ### JavaFX 场景工具：场景快照和抗锯齿


  最后，我们应该快速看一下图 7-2 右侧显示的三个工具类，因为它们可用于提高用户设备屏幕上场景输出的质量（使用抗锯齿），以及为你的用户（用于社交媒体分享）或你的游戏逻辑提供屏幕捕获功能。


  让我们先处理 `SceneAntialiasing` 类。你在第 2 章中了解了抗锯齿，我向你展示了它如何使用一种算法来平滑两种不同颜色交汇处的锯齿边缘，通常是在图像合成的对角线或圆形区域上。图像合成是指将两个独立的图像分层放置以形成一个最终图像。有时，这两个（或更多）图像层中图像组件之间不同的边缘需要被平滑。需要平滑（抗锯齿）以使最终的图像合成看起来像是一个无缝的图像，这正是艺术家或游戏设计师的意图。有趣的是，我们已经在我们的
  `JavaFXGame` 应用程序中使用 `StackPane` 类（窗格就是层）实现了 JavaFX 的“图层引擎”。“图层堆栈”图像合成方法在游戏以及 Photoshop
  或 GIMP 等软件中很常见。


  `SceneAntialiasing` 类的作用是为 3D 场景提供抗锯齿处理（算法），以便它们能够合成到场景的 2D 背景上，无论该背景是默认的 `Color.WHITE`
  或任何其他颜色值、2D 图像（创建混合 2D 和 3D 应用程序），还是其他任何东西，比如数字视频。`SceneAntiAliasing` 类允许你将静态的 `SceneAntialiasing`
  数据字段设置为 `DISABLED`（关闭抗锯齿）或 `BALANCED`（开启抗锯齿）。平衡选项提供了质量和性能之间的平衡，这仅仅意味着设备硬件提供的处理能力越强，处理的抗锯齿质量就越高。


  接下来让我们看看 `SnapshotParameters` 类（对象），它用于设置（包含）一个渲染属性参数，该参数将被你的 `SnapshotResult` 类（对象）使用。这些参数包括将使用哪种类型的
  `Camera`（平行或透视）对象、用于 3D 的 `depthBuffer` 是开启（3D 为 true）还是关闭（2D 为 false）、用于包含结果快照图像数据的
  `Paint` 对象、用于包含任何变换数据的 `Transform` 对象，以及用于定义要渲染的视口区域的 `Rectangle2D` 对象。这将是快照的尺寸以及
  `SnapshotResult` 左上角在屏幕上的 X、Y 位置。


  这个 `SnapshotResult` 类（更重要的是，使用此类创建的对象）包含你的结果快照图像数据、请求的参数以及场景图中生成它的源节点。因此，该类支持的三个方法将是显而易见的：`.getImage()`
  方法将获取快照图像，`.getSource()` 方法将获取源节点，`.getSnapshotParameters()` 方法将获取 `SnapshotParameters`。




  ## 场景子包：九个与场景相关的包


  你可能会想：“哇！刚才那个 javafx.scene 包的概述内容真多啊！”确实，核心的 javafx.scene 包中包含了许多类，涵盖了场景创建、场景图组织以及场景工具（如光照、摄像机、光标、截图（“场景截图”）和设置工具）。javafx.scene
  包中还有更多内容，存在于我称之为“子包”的包中，这些包位于 javafx.scene 包之下，通过另一个点号加上另一个包名（描述）来引用。实际上，还有九个 javafx.scene
  子包，如表 7-1 所示，它们涵盖了画布绘制、纹理绘画、特效、UI 布局、数字成像、事件处理、文本与字体、形状（2D 和 3D 几何体）以及 2D 和 3D 变换等内容。我们将在本章中探讨所有这些
  javafx.scene 子包中的类和概念，并在本书的后续内容中大量使用它们。本章的这一部分将更详细地介绍 javafx.scene 子包，你在游戏开发中将要使用的许多功能都将在这些子包中找到。这就是为什么我要为你概述
  JavaFX 提供的内容，以便一次性完成介绍，然后我们就可以开始使用 JavaFX 9 API 进行 Pro Java 9 Games 编码，并利用所有这些多媒体功能来创造游戏体验。


