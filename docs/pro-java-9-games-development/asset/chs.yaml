  ## 总结


  在第二十三章中，我们学习了如何创建防玩家误操作逻辑，以强制正确使用 i3D 转盘 UI、游戏板方块和答案按钮 UI 元素。这涉及使用大约六个布尔变量作为“标志”，来禁用玩家在单轮游戏中多次点击某个
  UI 元素的能力。我们保护了 i3D 转盘 UI、按钮 UI 答案以及每个象限的游戏板方块，防止它们被“滥用”以钻系统空子并获取不应得的分数。这是专业 Java
  9 游戏设计与开发中的一个重要部分，以确保你的游戏逻辑按照预期的方式运行。


  在本章的第一部分，我们还完成了剩余游戏内容的添加，增加了近 600 行 Java 代码，使当前的专业 Java 9 游戏开发项目代码量达到了近 1750 行。


  在第二十四章中，你将通过研究游戏优化、使用 NetBeans 9 进行评估以及 NetBeans 9 分析器来完成收尾工作。




