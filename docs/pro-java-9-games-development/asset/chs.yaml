  下一个子包 javafx.scene.effect 包含特效类。这些类对于专业的 Java 9 游戏开发非常有用，因此这是我在本节中要详细介绍的子包之一。


  javafx.scene.image 子包用于在 JavaFX 中实现数字图像，它包含 ImageView、Image、WritableImage、PixelFormat
  和 WritablePixelFormat 类。ImageView 类是你通常用来保存数字图像资源的类，而更高级的 PixelFormat 类允许你逐个像素地创建数字图像，如果你想进行更高级的（基于算法的）像素级数字图像创作的话。


  javafx.scene.input 子包包含用于从 JavaFX 应用程序用户获取输入的类，包括鼠标和键盘输入、手势、触摸屏、滚动、缩放或滑动输入以及剪贴板内容等输入类型。输入和操作通过事件处理能力进行处理，你将在本书中详细了解这一点，并且你已经在你的
  Pro JavaFX 9 应用程序中体验过了，正如你在引导 Java 9 代码的第 20 到 25 行（如图 6-7 所示）中所看到的那样。


  javafx.scene.layout 子包包含用于创建用户界面设计布局的类，也可以用于你的屏幕布局设计。这些布局类包括控制和管理背景、添加和设置边框样式的类，以及提供
  UI 面板管理类（如 StackPane、GridPane、TilePane、FlowPane 和 AnchorPane）的类。这些面板子类为 JavaFX 中的
  UI 控件提供了自动屏幕布局算法。Background 类提供屏幕背景工具，Border 类提供屏幕边框工具，可用于美化用户界面屏幕的图形。


  javafx.scene.paint 子包包含一个 Stop 类；一个 Paint 超类及其子类 Color、ImagePattern、LinearGradient
  和 RadialGradient；以及 3D Material 超类及其子类 PhongMaterial。熟悉 3D 内容制作的人会认出这个 Phong 着色器算法，它可以模拟不同的表面外观（塑料、橡胶等）。这些
  Material 和 PhongMaterial 类需要播放硬件具备 i3D 能力才能成功运行，就像 SceneAntialiasing、PerspectiveCamera
  和 LightBase 类及其子类一样。这些需要 GPU 硬件加速或软件渲染。


  抽象的 Paint 类创建用于绘制对象的子类，Color 类为这些对象着色（用颜色填充它们），LinearGradient 和 RadialGradient 是
  Paint 的子类，用颜色渐变填充对象，而 Stop 类允许你定义渐变颜色在渐变内部开始和结束的位置，这也是其名称的由来。最后，还有 ImagePattern
  类，它可以用可平铺的图像图案填充 Shape 对象，这对游戏来说非常有用。


  javafx.scene.shape 子包包含用于 2D 几何体（通常称为形状）以及 3D 几何体（通常称为网格）的类。Mesh 超类及其子类 TriangleMesh
  处理 3D 几何体，Shape3D 超类及其子类 Box、Sphere、Cylinder 和 MeshView 也是如此。Shape 超类有更多的子类（12 个）；这些是
  2D 几何元素，包括 Arc、Circle、CubicCurve、QuadCurve、Ellipse、Line、Path、Polygon、Polyline、Rectangle
  和 SVGPath 类。还有“路径”支持，路径被定义为“开放”形状（因为我是一名 3D 建模师，我喜欢称之为“样条线”），由 PathElement 超类及其子类
  ArcTo、ClosePath、CubicCurveTo、HLineTo、LineTo、MoveTo、QuadCurveTo 和 VLineTo 提供，这些子类允许你绘制样条曲线来创建自定义的可缩放矢量图形（SVG）形状。


  javafx.scene.text 子包包含用于在场景中渲染文本形状和字体的类。这包括用于使用你可能想用的任何非 JavaFX“系统”字体的 Font 类，以及用于创建将使用此字体显示文本值的文本节点的
  Text 类。还有一个专门的布局容器类叫做 TextFlow，用于“流动”文本，就像你在文字处理器中看到的那样。




  `javafx.scene.transform` 子包中包含用于渲染 2D 和 3D 空间变换的类，例如 `Transform` 超类的 `Scale`、`Rotate`、`Shear`、`Translate`
  和 `Affine`（3D 旋转）子类。这些变换可应用于场景图中的任何 `Node` 对象。这使得场景图中的任何内容（文本、UI 控件、形状、网格、图像、媒体等）都能以您喜欢的任何方式进行变换，为
  JavaFX 游戏开发者在变换对象时提供了巨大的创作能力。如果您想知道，平移是指整个对象的线性移动。剪切是指在二维平面上沿两个不同方向进行的线性移动，或者当二维平面的另一部分固定时，沿一个方向进行的移动。想象一下，移动一个平面的顶部，而底部保持固定，这样正方形就变成了平行四边形；或者，在同一平面（一个正方形）上，将顶部和底部向不同方向移动。


  现在，我们已经了解了 `javafx.scene` 包及其相关子包中大量重要且有用的类（对象），接下来让我们看看其他 18 个顶级 JavaFX 包，以了解 JavaFX
  为应用程序开发提供的其他关键功能。当然，我们将重点关注那些可用于游戏开发的功能，正如我们在本章中一直所做的那样，并且将在本书中继续这样做。


  ## javafx.graphics 模块：18 个多媒体包


  `javafx.graphics` 模块有 18 个顶级包，这些是最常用的包（除了核心的 `javafx.base` 模块包）。它们遵循 `javafx.packagename`
  的命名格式（而不是 `javafx.graphics.packagename`）。其中一些包，例如 `scene` 和 `css`，也有子包层级。我们在前面看到的九个
  `javafx.scene` 包及其子包就是如此，因此这里不再赘述。`javafx.graphics` 模块是创建 Pro Java 9 Games 需要包含的三个关键模块之一，另外两个是
  `javafx.base` 和 `javafx.media`。由于表 7-2 中包含了九个 `javafx.graphics` 模块包，这基本上意味着从 JavaFX
  API 模块的角度来看，`javafx.graphics` 模块总共有 18 个包类别，因为表 7-1 中列出了九个。自 JavaFX 8 以来，Oracle
  的 JavaFX 9 开发团队已经对这些模块包进行了重组，以实现更好的模块化（功能优化）。例如，如果您的 3D 游戏不需要音频或视频，您可以只使用 `base`
  和 `graphics` 模块。由于我们需要音频，我们将使用 `base`、`graphics` 和 `media` 模块，即七个 JavaFX API 模块中的三个（这直接减少了
  57% 的 JavaFX API 包代码）。我想向您概述 `javafx.graphics` 模块包中的这 18 个功能区域，如表 7-1 和 7-2 所示，并更深入地了解每个图形区域（矢量、光栅、动画、CSS）的功能。


