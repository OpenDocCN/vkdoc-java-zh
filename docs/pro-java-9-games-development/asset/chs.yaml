  ## JavaFX 场景包：16 个 Java 场景类


  在完成高层概述后，我首先要做的是研究最重要的 JavaFX 包之一——`javafx.scene` 包。正如你在第 2 章和第 3 章中所见，JavaFX 包不止一个。如图
  6-7 顶部所示，你的 `JavaFXGame.java` 应用已经使用了四个不同的 JavaFX 包。`javafx.scene` 包包含 16 个强大的 Java
  类（请记住 JavaFX 是用原生 Java 重新编写的），包括 `Camera`、`ParallelCamera` 和 `PerspectiveCamera`、`Cursor`
  和 `ImageCursor`、`LightBase`、`PointLight` 和 `AmbientLight`，以及场景图类（`Node`、`Parent`、`Group`、`Scene`
  和 `SubScene`）和一些实用工具类，如图 7-2 所示。如你所见，我按逻辑对这 16 个 `javafx.scene` 包类进行了分组。我将 `Scene`
  类放在此图表的场景图部分中，因为使用此 `Scene` 类创建的 `Scene` 对象将包含使用其他四个与场景图相关的类（`Node`、`Parent`、`Group`
  和 `SubScene`）及其子类创建的场景图对象。我们将在本章稍后部分详细讨论所有这些场景图类。


