- '# 1. Java 的不同面貌：打造 Java 9 开发工作站


  欢迎阅读《Pro Java 9 游戏开发》一书。在第一章中，我将讨论至今仍被用于为 Android 等开源平台以及基于 WebKit 的开源浏览器（如 Google
  Chrome、Mozilla Firefox、Apple Safari 和 Opera）开发软件应用程序的各种 Java 版本。在梳理了从 JDK 1.6（也称为
  Java 6）到最近发布的 JDK 1.9（即 Java 9）这些 Java 版本中，哪些需要用于为这些流行平台的不同版本进行开发之后，我们还需要详细了解如何创建一个专业的
  Java 9 软件开发工作站，以便在本书后续章节中使用。这将包括其他软件，例如新媒体内容制作软件包，它们可以与你的 Java 软件开发包一起使用，来创建游戏和物联网（IoT）应用程序。


  你工作站的核心将是 Java 8 SDK（软件开发工具包，也称为 JDK 或 Java 开发工具包），或者是 2017 年发布、比 Java 8 更具模块化特性、但包含相同类和方法用于创建游戏或物联网用户体验的新版
  Java 9 JDK。这一事实将使我们能够在本书中安全地同时关注 Java 8 和 Java 9。这是因为，就我们的目的而言，它们本质上是相同的，使我们能够专注于最新的
  Java API，而不是你正在使用的 Java 版本。事实上，由于我们将专注于 Java 的多媒体 API（通常称为 JavaFX），你在本书中学到的内容甚至可以用
  Java 7 来编码！Android 最近（从 Java 6）升级到了与 Java 7 和 Java 8 的兼容性。


  我们还将为你配置一个 NetBeans 9.0 IDE（集成开发环境），这将使 Java 8 或 9 的游戏编码变得容易得多。预计在 2017 年第四季度 Java
  9 发布后，你将使用 NetBeans 9，因为 NetBeans 9 IDE 将进行重大升级，以适应 Java 9 新的模块化特性，并允许你混合功能模块，为任何类型的应用程序开发创建自定义的
  Java 包集合（API 版本）。


  在你的 Java JDK 和 NetBeans IDE 配置完成后，我们将为你安装最新的开源新媒体内容创作软件包，包括专业软件包，例如用于数字图像处理的 GIMP、用于数字插画的
  InkScape、用于数字视频编辑或特效的 DaVinci Resolve、用于数字音频编辑的 Audacity、用于特效和 3D 的 Fusion、用于商业和项目管理的
  Open Office 4 套件、用于 3D 建模、纹理、动画、渲染、粒子系统、流体动力学或特效的 Blender，以及用于虚拟行星的 Terragen 4。


  在本章结束时，我甚至可能会建议一些其他专业级别的软件包，你应该考虑将它们添加到我们将在本章中创建的这个专业游戏开发工作站中。这样，当我们完成第一章时，你将拥有一个极具价值的商业生产资源。希望仅仅是这第一章就值得你为整本书付出的费用，因为你只需花
  500 美元购买一台强大的 64 位工作站，并在短短几个小时内就能让它价值五位数！


  我们还将讨论一些关于你新的 Java 9 内容生产工作站的硬件要求和注意事项。最后，请注意本书中的 Java 代码在 Java 8 IDE（集成开发环境）中同样可以完美运行，因此这本书完全可以被称为《Pro
  Java 8 游戏开发》！


  ## Java 的二元性：不同平台使用的版本


  目前仍有多种不同版本的 Java 被广泛用于多个流行平台的开发，包括用于 32 位 Android（Android 1.x、2.x、3.x 和 4.x 版本是
  32 位）的 Java 6，用于早期 64 位 Android 版本（5.0、5.1 和 6.0）的 Java 7，用于近期 Android 版本（7.0、7.1.2、8.0）的
  Java 8，以及用于 Windows 10 操作系统、Ubuntu Linux 操作系统（及其他 Linux 发行版）、Macintosh OSX 和 Open
  Solaris 操作系统的 Java 9。


  需要注意的是，Java 主要有三个版本：Java ME（微型版）针对嵌入式设备进行了优化；Java SE（标准版）是我们将要介绍的，用于“客户端”以及移动消费电子设备和
  iTV 机顶盒；Java EE（企业版）可以被视为一种“服务器端”模式，因为大型企业计算环境通常是基于服务器的，而不是“点对点”的（纯客户端模式，除了客户端-服务器交互外，还可能实现客户端之间的相互通信）。


  Java 6 于 2006 年 12 月发布（十多年前），至今仍被广泛与 Eclipse IDE 结合使用，为所有 32 位版本的 Android（从 1.0
  版到 4.4 版）开发应用程序。这是因为当 Android 1.0 于 2008 年 9 月发布时，Google 最初指定使用这个 Java 版本来开发 32
  位 Android 应用程序。需要注意的是，Google 使用 Open Java 项目创建了一个自定义版本的 Java 6，但这不会影响编程 API，因为类、方法和接口的功能仍然与你在
  NetBeans IDE 或 IntelliJ IDEA 中使用 Java 6 时相同，而不是使用 Eclipse IDE。


  当 Google 在 Android 5.x 中将 Android 升级到 64 位 Linux 内核（使用基于 IntelliJ 的 Android Studio
  IDEA）时，他们升级到了使用 Java 7，该版本也有 64 位版本。Java 7 于 2011 年 7 月发布。因此，如果你正在为高级平台开发 Android
  5-6 应用程序，例如 Android Wear（我在 Apress 出版的《Pro Android Wearables》（2015）一书中有所介绍），或 Android
  TV 和 Android Auto（在 Apress 出版的《Android Apps for Absolute Beginners》（2017）一书中有所介绍），你将需要使用
  Java 7。JavaFX 8 和 JavaFX 9 中的 JavaFX 8 引擎也已反向移植到 Java 7；然而，Java 7 已于今年退役。Java 6、7
  和 8 仍在 Android 中使用。


  在撰写本书时，Java 8 是 Java SE 的当前版本，此外，它还拥有强大的 JavaFX 8.0 多媒体引擎，该引擎也已与 Java 7 兼容，尽管 JavaFX
  8.0 API 尚未在 Android API 中得到原生支持。然而，开发能在 Android 操作系统和 iOS 平台上运行的 JavaFX 8 或 9 应用程序是可能的，这使本书对我们的读者来说更有价值！Java
  8 在所有流行浏览器、Android 7、7.1.2 和 8.0 以及所有四种流行操作系统（包括 Windows 7、8.1 和 10、所有 Linux 发行版、Macintosh
  OS/X 以及 Oracle 的 Open Solaris）上都得到支持。Java 8 于 2014 年 3 月发布，并增加了一个名为 Lambda 表达式的强大新特性，我们将在本书中介绍它，因为这是一种编写更紧凑代码的方式，并且通常对多处理器（和多线程）更高效。




  Java 9 是 Java 的下一个主要修订版本，于 2017 年 9 月 22 日发布。Java 语言开发者正在重新设计的主要新特性是使 Java 9 语言
  API 模块化。这将允许 Java 9 开发者以“模块”（代码库）的形式“混合搭配”功能，并创建他们自己的定制化、优化版 Java。这些定制版 Java 将完全按照开发者在定制开发环境或定制应用程序中所需要的方式运行。截至本书出版时，NetBeans
  9 仍在开发中。


  作为游戏开发者或物联网开发者，这意味着你可以创建多个游戏开发定制版 Java 版本层级，或者多个物联网开发定制版 Java 版本层级。从 Java 7 版本开始，如果需要，可以添加
  Lambda 表达式（一种编码快捷方式，我们将在后面介绍）来创建 Java 8 版本，或者打包为定制模块（Java 9 中的新特性）来为所有流行的操作系统平台创建
  Java 9 版本。如果你正在使用 JavaFX 多媒体/游戏引擎，最新的 JavaFX 特性同时存在于 Java 8 和 Java 9 的 API 中。


  我想向读者指出，他们可以优化自己的游戏程序逻辑，使其跨越多个 Java 版本，从针对 Java 7（Android 5 或 6）优化，到 Java 8（Android
  7、8 和现代操作系统），再到本书出版前于 2017 年 9 月 22 日发布的 Java 9 版本。这也可以在无需进行重大代码更改的情况下完成，因为除了使用
  Lambda 表达式之外，核心的 JavaFX 游戏处理逻辑在所有 Java 修订版本中都存在。


  ## Java 开发工作站：所需硬件


  为了从本章中我们将安装的所有专业开源软件中获得最佳效果，你需要一台强大的 64 位工作站，运行付费操作系统（如 Windows 10 或 OSX），或免费操作系统（如
  Ubuntu LTS 17）。我在多台工作站上使用 Windows 10，并在多台工作站上使用 Ubuntu LTS 17.10。你还需要一个大尺寸显示器，最好是高清（1920×1080）或超高清（3840×2160）。如果你计算一下，一个超高清显示器相当于四个高清显示器拼在一起，而现在超高清显示器的价格在
  300 到 500 美元之间。我在感恩节促销时花 250 美元买了一个。我使用的高清显示器尺寸从 32 英寸到 43 英寸不等，超高清显示器尺寸从 44 英寸到
  55 英寸不等，以获得紧密的像素密度。


  一台计算机工作站应配备（包含）至少 8 GB 的 DDR3 系统内存（16 GB 或 32 GB 系统内存会更好）。该内存的时钟频率应为 1333、1600、1866
  或 2133 兆赫。尖端系统通常配备时钟频率为 2400 兆赫的 DDR4 系统内存。DDR4 内存也有 16 GB 的 DIMM 条，因此你可以在工作站主板上安装
  48 GB、64 GB 或 128 GB 内存。我会为运行 Fusion 9、DaVinci Resolve 14、Blender 2.8、JavaFX 9 或其他
  i3D 制作软件的工作站这样做。


  系统内存运行速度越快，计算机处理数据的速度就越快，CPU 获取所需处理内容的速度也就越快。这就引出了工作站的“大脑”或 CPU/GPU，它负责处理工作。同样的概念也适用：64
  位 CPU 每秒能处理的指令越多，你在更短时间内能完成的工作就越多，你的 i3D 应用程序执行其给定功能时也会越流畅。


  如今，几乎所有 64 位工作站都配备多核处理器，通常称为 CPU 或中央处理器。流行的 CPU 包括 AMD Ryzen（四核、六核或八核）、9590（八核），或更昂贵的
  Intel i7，它有四核、六核、八核和十核版本。与 AMD Ryzen 一样，Intel i7 每个核心有两个线程，因此对于操作系统来说，它们看起来像 8、12、16
  或 20 核处理器，这也是它们比 AMD FX 9590 系列处理器更昂贵的原因。我根据应用程序的不同，使用 AMD Ryzen 或 Intel i7 处理器。例如，Android
  Studio 3 针对 Intel 硬件架构进行了优化，在 AMD FX CPU 上模拟 Android 虚拟设备（AVD）的速度不足以实现流畅的开发和测试。


  为了存储数据，你还需要一个硬盘驱动器。如今的计算机通常配备 1 TB 的硬盘驱动器，你甚至可以买到配备 2 TB、3 TB、4 TB、6 TB 或 8 TB 硬盘驱动器的工作站。如果你正在处理具有超高清或
  4K 屏幕分辨率的游戏（或 3D、电影、特效或视频素材），请选择 3 TB 或 4 TB 的型号。如果你希望系统快速启动并将软件快速加载到内存中，请务必使用固态硬盘作为主驱动器（Windows
  下为 C:\，Linux 下为 C:/）。这些固态硬盘比传统的 TB 级硬盘驱动器更昂贵，但你实际上只需要 64 GB 或 128 GB 来容纳你的操作系统和软件。我有一块
  256 GB 的固态硬盘，而 512 GB 和 768 GB 的固态硬盘也变得越来越实惠。


  具备此类功能的工作站基本上已成为商品，价格在 500 到 750 美元之间，可以在沃尔玛或百思买购买，也可以在线在 [`www.PriceWatch.com`](http://www.PriceWatch.com)
  购买，在那里你可以比较本章这一部分中我提到的任何组件的市场价格。如果你是 Java 9 游戏开发新手，并且还没有合适的工作站，请前往沃尔玛或 PriceWatch.com，购买一台价格实惠的
  3D 多核（购买 4、6 或 8 核）64 位计算机，运行 Windows 10 或 Ubuntu LTS 17，至少配备 8、16 或 32 GB 的 DDR3
  系统内存。你还需要一个相当大的硬盘驱动器，至少 750 GB，甚至 1.5 TB 或 2 TB 的硬盘驱动器，以及来自 AMD（Radeon）或 nVidia（GeForce）的
  3D GPU，它将用于 JavaFX 9 以及 Fusion、Blender 和 DaVinci Resolve 的实时 i3D 渲染。


  在本章的剩余部分中，我将假设你刚刚购买了这样一台价格实惠的 64 位工作站，我们将从头开始创建一个顶级的 Java 9 游戏和物联网开发工作站！如果你已经拥有一个现有的游戏开发工作站，我将包含一个简短的部分，向你展示如何从
  Windows 中移除过时的 Java 开发软件，以便我们都能从头开始。




