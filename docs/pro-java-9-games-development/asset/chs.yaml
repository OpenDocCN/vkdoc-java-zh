  环境（API）的优势之一在于，你可以决定哪些 3D 是“幻觉”（如 2.5D 或立体视觉），哪些 3D 是“真实的”i3D。立体 3D（主要是电影）并非真正的
  3D，因为你无法走到场景及其所有角色的背后。而在 i3D 游戏中，例如《光环》或《麦登橄榄球》，你可以做到，因为它是一个完全虚拟的现实。


