  Resolve 14 等工具创建的数字视频素材，为你的 i3D 棋盘游戏添加更复杂的新媒体元素。你可以使用像 Sorenson Media 的 Squeeze
  Desktop Pro 11 这样的专业工具来优化视频。这将让你获得更多使用 JavaFX 9 更高级的数字视频和 3D API 的经验。


  我接下来要做的事情之一是优化用于说明、致谢、法律信息等的 2D 启动代码。既然游戏原型已经完成，重新审视启动画面图形也是一个好主意。请记住，《Pro Java
  9 Games Development》，尤其是 i3D 游戏，是一个不断优化的过程，因为构成 i2D 和 i3D 游戏资源的数百个新媒体组件通常需要经过优化，才能使游戏符合游戏开发者艺术家的愿景。


  一旦你完成了游戏原型，就可以进行我们之前讨论过的代码优化，甚至在必要时为不同的特性或功能创建不同的类。我的技术编辑同意我的观点，即这个游戏不需要额外的类，因为我试图使用
  JavaFX API 中已有的类来创建一个 i3D 棋盘游戏。事实上，我导入了（使用了）44 个 Java 或 JavaFX 类来创建这个游戏，所以尽管我有一个
  JavaFXGame 主类将所有内容整合在一起，但实际上有 45 个类在共同创建这个游戏。其中 44 个类是由 Sun Microsystems 公司，以及后来在收购
  Sun 后的 Oracle 公司，预先创建、编码和优化的。我在本书中试图展示的是如何创建一个 Pro Java 9 游戏，通过最优地使用 JavaFX API
  类，并最大限度地减少开发人员创建 i3D 棋盘游戏所需完成的实际工作量，从而充分利用这些公司过去十年来的所有工作成果。随着 Oracle 不断改进这些类，JavaFX
  9 将继续成为一个更强大、更令人印象深刻的游戏引擎，并且理想情况下，对 iOS 和 Android 8 的支持也将持续发展和改进。


  ## 总结


  在这最后的第二十四章中，我们探讨了各种资源（数字图像和数字音频）的优化，以及 Java 代码的优化。我们了解了 NetBeans Profiler，以及如何查看运行游戏所使用的系统内存量。我们还查看了
  CPU 用于处理 Java 代码的百分比，以及垃圾回收何时将纹理贴图加载到系统内存（或从系统内存中卸载）。我们还研究了线程何时被用于处理内存位置、指令、循环、随机数生成以及类似的
  Java 代码指令。


  我们还探讨了未来可以在游戏中优化和添加的其他一些内容，以便进一步利用 JavaFX 9 的类。请务必使用 Profiler 来监控系统内存和 CPU 使用情况。我使用一台“较弱”的工作站（4GB
  内存，四核 AMD 3.11GHz Acer），这样我就能在“次主流”电脑上测试代码，同时这台电脑也有足够的性能和内存来流畅运行 NetBeans 9、Java
  9 和 JavaFX 9。这证明了 NetBeans 9、Java 9 和 JavaFX 的高效性。


  我希望你喜欢这二十四个章节，它们涵盖了新媒体资源开发以及 Java 9 和 JavaFX 9 游戏开发，重点放在了 JavaFX 9 API 的 i3D 部分，正如我的《Beginning
  Java 8 Games Development》一书侧重于 JavaFX API 的 i2D 部分一样。我还在 Apress（[`www.apress.com`](http://www.apress.com)）出版了几本关于新媒体资源（内容）创作的书籍，涵盖了使用
  Fusion 8 进行数字图像合成、数字音频编辑、数字视频编辑、数字插画（SVG）矢量编辑、数字绘画和视觉特效（VFX）创作。所有这些书籍都使用免费商用的专业开源软件包，例如
  GIMP、Inkscape、Audacity 和 Fusion。一旦 Black Magic Design 完成 DaVinci Resolve 14（一个非线性编辑套件），我就会将其添加到我的开源内容制作套件中，该套件会安装在我为
  JavaFX 9、Android 8 或 HTML 5.1 内容制作而设置的每一台工作站上。对于新硬件，我正在关注 AMD 的新款 Ryzen 7 1700，它仅需
  65W 功耗就能以 3.0GHz（超频可达 3.7GHz）运行 16 个 64 位线程；它配备 Radeon 7000 GPU，大多数主板支持 64GB DDR4-2400MHz
  内存（四个插槽）、USB 3.1、24 位音频、M2 SSD 卡、超高速 HDD 访问等。一台配备 Windows 10 的满配系统，价格不到 1000 美元。祝你游戏编码愉快！




