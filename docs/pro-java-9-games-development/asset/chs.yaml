  ## 更换相机：使用 ParallelCamera 类


  接下来，我将把相机对象从 PerspectiveCamera 更改为 ParallelCamera，这既是为了让你获得使用它们的经验，也是为了看看这个面顺序渲染问题（方块之间看似重叠）在两个
