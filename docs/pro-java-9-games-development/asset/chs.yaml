  让我们遵循组织 Java 代码的思路，创建一个名为 `.createSpecialEffects()` 的方法，用于设置所有特效。让 NetBeans 9 为你生成一个空的
  `private void createSpecialEffects() {...}` 框架：在 `start()` 方法中，`createTextAssets()`
  方法调用之后，添加一行代码来调用它，如图 10-9 高亮所示。这里的逻辑是，我们将先加载图像，然后定义特效，最后创建文本。


