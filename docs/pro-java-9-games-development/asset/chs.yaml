  `DrawMode` 类中的一个常量，当前可用的两个常量是 `DrawMode.FILL` 和 `DrawMode.LINE`。`FILL` 常量提供实体模型几何表示，而
  `LINE` 常量提供线框模型几何表示。在本节中，我们将使用 `.setDrawMode(drawMode)` 方法调用，将我们的三个图元从实体模型更改为线框模型，以便我们可以更改线框的分辨率或细分数量，观察其效果，并可以围绕
  X 维度旋转球体，查看其线框结构的外观以及细分属性如何影响其在 3D 场景中的渲染效果。不过，首先，我有点厌倦在 3D 场景的左上角查看这些图元了，因此我们将使用
  `.setTranslateZ(-500)` 将摄像机对象拉近 100%（或者将图元放大 100%），并使用 `.setTranslateY(300)` 方法将图元在视图的水平方向上居中。稍后，我们将使用
