  Java 游戏，而在 Java 7 之前（Java 6 中），JavaFX 2.0 还是它自己独立的编程语言！为了让 JavaFX 引擎成为 Java 9 编程语言中无缝集成的组件（就像现在这样），它必须被完全重写为
  Java 7（和 Java 8）的 API 或库集合（在 Java 9 中则成为模块）。你将在下一章中了解更多关于 JavaFX 引擎的内容。


  JavaFX API 将取代抽象窗口工具包（AWT）和 Swing（UI 元素）。尽管这些较旧的 UI 设计库仍然可以在 Java 项目中使用，但它们通常仅用于遗留（较旧）的
  Java 代码，以便这些项目在 Java 1.02、2、3、4、5、6、7、8 和 9 下仍能编译和运行。你将在本章的这一部分编译并运行这个基于新 JavaFX
  API 的项目，因此你会看到 JavaFX 在 Java 9 下运行。JavaFX 的当前版本是 9，因为 Oracle 使版本号与 Java 9 保持一致，不过，这些类与我编写的《Beginning
  Java 8 Games Development》一书中使用的类是相同的。


