  Java 9 的 NetBeans 9 捆绑包“孵化”完成之前，你可以在此处获取仍在开发中的 NetBeans 9 IDE 软件。你可以在图 1-13 中看到
  Apache Jenkins 网站当前的样子（该界面有可能会发生变化）。如你所见，它提供了相当多的选项。


