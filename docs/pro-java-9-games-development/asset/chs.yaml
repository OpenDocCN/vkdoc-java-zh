- '# 22. 计分引擎：创建计分界面布局并对内容进行计分


  现在你已经编写了游戏棋盘方格的答案选择逻辑，并为游戏棋盘旋转和摄像机动画序列添加了音效，我们需要编写另一半 Java 代码，用于检查用户选择（点击）的答案，并相应地更新计分板。我们将同时追踪正确和错误的答案，并使用一个简单但有效的计分界面来实时鼓励玩家。本章的工作流程还需要我们在屏幕右侧创建一个计分
  UI 面板，我们将使用一个名为 `scoreLayout` 的 StackPane 以及名称以 score 开头的 Text 对象来创建它。


  在本章中，我们将实现单人游戏模式和计分逻辑，以搭建你的计分用户界面。这是因为许多玩家会希望将游戏作为一种学习体验来挑战内容。话虽如此，我们仍然需要为每个按钮 UI
  元素编写大量代码，用于判断答案是否正确；如果正确，代码将增加“正确：”分数，如果不正确，则增加“错误：”分数。


  这意味着在学会本章的计分逻辑实现后，你还需要再添加几百行 Java 代码。这些代码将为你上一章学会放置的所有答案进行计分。


  幸运的是，我们将沿用上一章那种高效的“一次编写，然后复制、粘贴并修改”的方法，因此需要手动输入的工作量不会太大。真正的核心工作在于创建答案（第 21 章）和计分逻辑（本章），前提是你已经完成了计分实现的学习（即本章）。


  此外，我们还将修复上一章的一个小 bug：将 Q&A UI 面板的 `.setVisible(false)` 调用从“开始游戏”按钮移动到 JavaFX 应用程序的
  `start()` 方法启动序列中。这样，Q&A UI 面板（以及稍后的计分 UI 面板）将在游戏启动时自动隐藏，而不是在点击按钮时才隐藏。


  ## 启动画面渲染错误：在启动时隐藏 UI 面板


  你可能已经注意到，在上一章运行 ➤ 项目测试游戏渲染时，JavaFX 错误地将部分 Q&A UI 面板渲染到了游戏启动画面的上方，如图 22-1 左上角所示。这个
  Q&A UI 面板本应位于启动画面之后，因为你在 `addNodesToSceneGraph()` 方法的 `root.addChildren().addAll()`
  方法链的节点对象参数列表序列中指定了该渲染顺序。通过添加 i3D 元素将场景变为 3D（或“混合”2D+3D 场景）实体，这也可能是一个 Z 轴单位位置设置问题。因此，有两种方法可以调查并修复这个小的渲染问题。由于我们已经设置好了
  X、Y、Z 显示单位，并且它们在 i3D 游戏渲染管线中能有效工作，修复这个故障最简单的方法就是在游戏启动时自动隐藏 UI 面板（反正我们本来也要在游戏启动时隐藏它），而不是通过“开始游戏”按钮手动操作。这需要在
  JavaFX 要求的 `start()` 方法顶部完成，而不是在与“开始游戏”按钮初始点击事件关联的事件处理结构中完成。


  ![A336284_1_En_22_Fig1_HTML.jpg](img/A336284_1_En_22_Fig1_HTML.jpg)


  **图 22-1.**


  在开发计分功能之前，我们先修复影响启动画面的 Q&A 按钮面板渲染错误


  首先，从 `gameButton` 事件处理代码中移除 `qaLayout.setVisible(false);` 这条 Java 语句，并将其放置在 `.start()`
  方法的顶部，以便自动执行隐藏操作。


  请记住，你的 `qaLayout` StackPane 将在 `createQAnodes()` 方法中创建，因此这条语句必须放在 `createQAnodes();`
  自定义方法调用之后，也就是在该自定义方法之前调用的任何方法之后。这没问题，因为这些方法只是设置了游戏中会用到的资源引用和对象。


  这最终是对这个视觉 bug 更快速、更简单的修复；既然我们本来就要在游戏启动时隐藏这个面板，那么更早地（自动地）执行隐藏操作（设置可见性为 false），而不是在事件处理逻辑中执行，既能生成更简洁的代码，也省去了我们查明问题原因（显然是
  3D 空间中的 Z 单位设置问题）以及如何为 `qaLayout` StackPane 对象添加（并调整）Z 位置代码（这可能会破坏你当前完美的渲染结果，除了初始启动画面显示之外）的时间。


