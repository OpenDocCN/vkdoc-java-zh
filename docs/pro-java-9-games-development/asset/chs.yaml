  图 7-2.


  Java `javafx.scene` 包及 16 个核心场景图、场景实用工具、光照、相机和光标类


  JavaFX 的场景图架构类从最高层开始，包括 `Node` 超类及其 `Parent` 和 `SubScene` 子类，以及 `Parent` 类的 `Group`
  子类，我们将在本书后续内容中使用这些类来创建游戏的场景图层次结构。这些核心 `Node` 类用于创建游戏的 JavaFX 场景图层次结构，并用于组织和分组使用
  JavaFX 媒体资产和图形设计包创建的对象，这些包包含在 `javafx.media` 和 `javafx.graphics` 这两个 Java 9 模块中。


