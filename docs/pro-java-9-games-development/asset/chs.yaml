  ## 使用 3D 照明：为 3D 游戏添加光照


  JavaFX 9 中有两套不同的照明 API。一套用于 3D 场景，位于 `javafx.scene` 包中，包含一个抽象的 `LightBase` 超类以及“具体的”（可以在代码中作为可构造对象使用的）子类
  `AmbientLight` 和 `PointLight`。另一套是抽象的 `Light` 超类，位于 `javafx.scene.effect` 包中；该包包含
  2D 数字成像效果，正如我们在本书前面所介绍的那样。对于 3D 使用，我们将专注于 `LightBase`、`AmbientLight` 和 `PointLight`
  类，并首先使用 `PointLight` 类，因为使用该类可以获得最显著、最逼真的效果。




  ### JavaFX LightBase 类：定义光照的抽象超类


  公共的 JavaFX LightBase 超类是一个抽象类，仅用于创建不同类型的光照。目前，3D 场景的通用或“环境”照明级别由 AmbientLight 子类（对象）或模拟灯泡属性的
  PointLight 子类（对象）提供。你的应用程序不应尝试直接扩展抽象的 LightBase 类；如果尝试这样做，Java 将抛出 `UnsupportedOperationException`，并且你的
  Pro Java 9 游戏将无法编译或运行。LightBase 类位于核心 `javafx.scene` 包的 `javafx.graphics` 模块中，并且是
  `Node` 的子类，因为它本质上是一个位于 SceneGraph 顶部的节点。LightBase 类实现了 `Styleable` 接口，因此可以设置样式，并实现了
  `EventTarget` 接口，因此可以处理事件。因此，JavaFX LightBase 类的 Java 9 类层次结构如下所示：


  ```

  java.lang.Object

  > javafx.scene.Node

  > javafx.scene.LightBase

  ```


  LightBase 类为子类提供了公共属性的定义，这些子类构造用于在 3D 场景中表示（“投射”）某种形式光照的对象。这些 LightBase 对象属性应包括光源的初始颜色，以及光源最初是打开（启用）还是关闭（禁用）。需要注意的是，由于这是一个
  3D 功能，因此它是一个条件功能。请参考本章 PerspectiveCamera 部分中我列出的示例，了解如何设置检测 `ConditionalFeature.SCENE3D`
  标志的代码。


  LightBase 子类有两个属性（如果你更喜欢这些术语，也可以称为特性或特征）；一个是 `color` 或 `ObjectProperty<color>`，用于指定光源发出的光的颜色；第二个是名为
  `lightOn` 的 `BooleanProperty`，允许打开和关闭光源。


  LightBase 抽象类有两个重载的受保护构造方法。一个没有参数，并使用默认的 `Color.WHITE` 光源创建，使用以下构造方法调用格式：


  ```

  protected LightBase()

  ```


  第二个重载的受保护构造方法允许子类为光照指定颜色值，使用以下构造方法调用格式：


  ```

  protected LightBase(Color color)

  ```


  LightBase 类有七个方法，这些方法将全部可供（继承给）每个 LightBase 子类使用，包括 AmbientLight 和 PointLight 子类，因此请在此处注意这些方法，因为我只会介绍一次。


  `colorProperty()` 方法指定光源的 `ObjectProperty<Color>`，而 `getColor()` 方法获取光源的 `Color`
  值属性。`getScope()` 方法将获取一个 `ObservableList<Node>`，其中包含一个 `Node` 列表，该列表指定了 LightBase
  子类（对象）的层次范围。


  `isLightOn()` 方法调用返回光源的布尔值开（true）或关（false），而 `lightOnProperty()` 方法调用将为光源的 `BooleanProperty
  lightOn` 设置布尔数据值。


  最后，`void setColor(Color value)` 方法将设置光照颜色属性的数据值，而 `void setLightOn(boolean value)`
  方法将设置 LightBase 子对象 `lightOn` 布尔值属性的数据值。


  接下来，让我们分别仔细看看 AmbientLight 和 PointLight 具体类。


  ### JavaFX AmbientLight 类：均匀照亮你的 3D 场景


  公共的 JavaFX AmbientLight 类是一个具体类，用于为 3D 场景创建通用或“环境”级别的照明。通常，对于给定的 3D 场景实例，只定义一个 `AmbientLight`
  实例。AmbientLight 类位于核心 `javafx.scene` 包的 `javafx.graphics` 模块中，并且是 `LightBase` 的子类，而
  `LightBase` 是 `Node` 的子类，因为它本质上是一个位于 SceneGraph 顶部的节点。AmbientLight 类也实现了 `Styleable`
  接口，因此可以设置样式，并实现了 `EventTarget` 接口，以便处理事件。因此，JavaFX AmbientLight 类的 Java 类层次结构如下所示：


  ```

  java.lang.Object

  > javafx.scene.Node

  > javafx.scene.LightBase

  > javafx.scene.AmbientLight

  ```


  AmbientLight 类根据需要为你的 3D 场景定义环境光源对象。环境光可以定义为来自不可见光源的区域全局或通用照明量，该光源似乎从各个方向进入场景。所有
  AmbientLight 对象属性都继承自 LightBase 超类，并且应包括光源的初始颜色，以及光源最初是打开（启用）还是关闭（禁用）。再次需要注意的是，由于这是一个
  3D 功能，因此它是一个条件功能。


  AmbientLight 有两个重载的构造方法；第一个使用（默认的）`Color.WHITE` 光源创建一个未配置的 AmbientLight 对象类，使用以下
  Java 实例化编程格式：


  ```

  AmbientLight ambient = new AmbientLight();

  ```


  第二个重载的构造方法使用指定的非 `Color.WHITE` 颜色创建一个新的 PointLight 实例，使用以下 Java 实例化编程格式：


  ```

  AmbientLight ambientaqua = new AmbientLight(Color.AQUA);

  ```


  接下来，让我们详细看看 PointLight 具体类，然后我们可以在结束本章关于设置 3D 渲染场景环境（我们将在本书剩余部分将 3D 对象放入其中）之前，将一个
  PointLight 对象添加到你的 3D 场景中。


  ### JavaFX PointLight 类：戏剧性地照亮你的 3D 场景


  公共的 JavaFX PointLight 类是一个具体类，用于为 3D 场景创建局部或“点光源”照明实例。3D 场景中通常有多个 PointLight 实例，以允许艺术家实现模拟真实世界光源的复杂光照模型。PointLight
  类位于核心 `javafx.scene` 包的 `javafx.graphics` 模块中，并且是 `LightBase` 的子类，而 `LightBase`
  是 `Node` 的子类，因为它本质上是一个位于 SceneGraph 顶部的节点。PointLight 类也实现了 `Styleable` 接口，因此可以设置样式，并实现了
  `EventTarget` 接口，以便处理事件。因此，JavaFX PointLight 类的 Java 类层次结构如下所示：


  ```

  java.lang.Object

  > javafx.scene.Node

  > javafx.scene.LightBase

  > javafx.scene.PointLight

  ```


  PointLight 类根据需要为你的 3D 场景定义点光源（想想灯泡）对象。尽量使用尽可能少的 PointLight 对象，因为它们的渲染（计算或处理其算法）成本很高。点光源被定义为局部光发射点，并且可以设置动画以创建各种特殊效果。所有
  PointLight 对象属性都继承自 LightBase 超类，并且应包括光源的初始颜色，以及光源最初是打开（启用）还是关闭（禁用）。再次需要注意的是，由于这是一个
  3D 功能，因此它也是一个条件功能。


  PointLight 有两个重载的构造方法。第一个使用默认的 `Color.WHITE` 光源创建一个未配置的 PointLight 对象类，使用以下 Java
  实例化编程格式：


  ```

  PointLight light = new PointLight();

  ```


  第二个重载的构造方法使用指定的非 `Color.WHITE` 颜色创建一个新的 PointLight 实例，使用以下 Java 实例化编程格式：


  ```

  PointLight aqualight = new PointLight(Color.AQUA);

  ```


