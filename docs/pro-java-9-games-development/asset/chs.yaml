  .OBJ 3D 文件格式，这是 JavaFX 9 支持的几种 3D 文件导入格式之一。我们可能会使用这种格式或其他格式，具体取决于需要导入的 3D 数据类型，因为每种格式支持不同类型的
  3D 数据和特性，例如纹理贴图、UVW 贴图、反向运动学骨骼动画数据、网格变形、动画、摄像机数据、灯光数据等。JavaFX 能够导入相当多的高级 3D 格式，例如
  Collada (DAE)、FrameBox (FBX)、3D Studio 3DS 和 OBJ。


