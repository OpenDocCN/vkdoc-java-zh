  ## 下载并安装 Oracle Java 8 JDK


  你可能会想，既然这是一本关于 Java 9 游戏的书，为什么我们现在要下载最新版本的 Java 8（当前为更新 152）？原因是，尽管 Java 9 JDK 已于
  9 月发布，但 NetBeans 9 IDE 版本仍处于测试阶段（我写这本书时它还在 alpha 阶段），这意味着 NetBeans 9（测试版）仍然运行在 Java
  8 之上，这是由于 Java 9 中模块的复杂性（意味着程序员仍在模块化 NetBeans 9，以便它能用 Java 9 编写）。一旦 NetBeans 9 发布，它很可能会直接运行在
  Java 9 JDK 之上。有一种方法可以访问 Oracle 技术网络上的一个网页，该网页包含 Java 8u144 和 Java 9.0 的链接，网址为 [www.oracle.com/technetwork/java/javase/overview/index.html](http://www.oracle.com/technetwork/java/javase/overview/index.html)，如图
  1-7 所示。两个 JDK 的下载链接都位于网页最底部，因此只需点击 Java SE 8 update 144 JDK 的下载链接（已升级至 8u152）。


  ![A336284_1_En_1_Fig7_HTML.jpg](img/A336284_1_En_1_Fig7_HTML.jpg)


  图 1-7.


  Oracle 技术网络 Java SE 概览网页，包含 Java 9 JDK 和 Java 8u144 的链接


  如你所见，网页中间还圈出了一个红色的“Oracle JDK 8 公共更新结束”警告。Java 8 的 bug 并不多，毕竟它已经经历了 144 次更新，相当稳定！从某种意义上说，Java
  9 是一次重写，因为它已被重新模块化，所以 API 类和包（进入模块）的所有“连接”工作都在重做，这就是为什么用 Java 编写的 NetBeans 9 未能与
  Java 9 同时完成（编码和调试）。以前的 Java 和 NetBeans 版本几乎同时发布，并且有一个 NetBeans 捆绑包下载（如图 1-8 顶部所示，通过右侧的下载图标）。


