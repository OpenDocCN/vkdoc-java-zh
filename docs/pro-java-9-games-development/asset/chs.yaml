  ## 添加场景图节点：addNodesToSceneGraph()


  接下来，你需要创建一个方法，将我们已经创建的 SceneGraph 节点对象，以及即将使用 VBox 构造函数实例化的节点对象，添加到场景图的根对象中（在本例中，根对象是一个
  Group 对象）。这个新的、更高级别的 SceneGraph 根 Group 对象将容纳用于高级游戏功能的 StackPane UI 面板，以及我们将创建的另一个用于容纳
  SceneGraph 3D 游戏分支的 Group 对象。从某种意义上说，我们已经在使用 JavaFX 9 创建混合应用程序，因为游戏 UI（StackPane）分支将是
  2D 的，而游戏本身（Group）将是 3D 的。我们将使用 `.getChildren().add()` 方法链或 `.getChildren().addAll()`
  方法链，将“子”节点（Node、Parent 或 Group 的子类）对象添加到名为 `root` 的“父”Group 对象中，该对象现在是 JavaFX SceneGraph
  的“根”。


  要创建这第二个方法，我们将遵循与创建第一个自定义方法相同的工作流程。在 `createBoardGameNodes();` 代码行之后立即添加一行代码，然后输入
  `addNodesToSceneGraph();` 作为第二行代码。


  在 NetBeans 9 用波浪形红色错误下划线标记此内容后，使用 Alt+Enter 组合键，并选择“Create method "addNodesToSceneGraph"
