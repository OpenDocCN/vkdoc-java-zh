  ImageView 对象添加 `.setEffect(colorAdjust)` 方法调用。这会将透明徽标 PNG32 图像中的棕色像素转换为绿色，同时保持透明像素不变，因为它们颜色值为零（且透明度值最大）。如果这些像素是使用部分颜色值和部分透明度值定义的，那么部分颜色值将向前移动
  40%。


  我在 `boardGameBackPlate.setImage(helpLayer);` 方法调用之后立即添加了这个 `.setEffect()` 方法调用，因为我们现在需要对徽标图像合成层进行色移，如图
