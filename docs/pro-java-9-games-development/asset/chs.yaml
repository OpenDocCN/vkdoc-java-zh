  25% 的开发）。我将使用象限 1（橙色）的内容来测试本章构建的逻辑，因为我尚未创建开发初始代码所需的数百个图像资源（每个游戏板方格 6 个，即 120 个起步）。后续只需增加随机数生成器的上限值并更新
  `populateQuadrant()` 方法的逻辑，即可轻松添加更多资源。不过，本章的工作量仍将达到数百行代码，因此我们在本章中将在让游戏随机选择供玩家解答的内容方面取得大量编码进展。


