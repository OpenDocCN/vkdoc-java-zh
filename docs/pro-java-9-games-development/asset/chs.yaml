  ## 总结


  在第十一章中，我们通过添加一个 PerspectiveCamera 对象（它允许使用 X、Y 和 Z 维度渲染 3D 资源，并为 Scene 对象提供 3D 透视效果），为`JavaFXGame.java`增加了
  3D 场景能力。我们还添加了一个 PointLight 对象来模拟灯泡光源以照亮这些 3D 资源，以及一个 Sphere 对象（一个“图元”）来测试我们的基本
  3D 场景设置。


  你了解了抽象的 Camera 超类及其 ParallelCamera（用于 2D 或正交 3D 场景使用）和 PerspectiveCamera，我们将使用后者进行最有效的
  3D 或 i3D 场景渲染。然后我们学习了如何在 JavaFXGame 中声明、实例化和配置 PerspectiveCamera，并改变其操作方式。


  接着我们测试了 2D UI 元素及其层级结构，并观察到它们现在位于 3D 空间中的一个 2D“平面”上。我们修正了 Java 代码以补偿这种坐标空间的变化，使你的
  UI 恢复全屏显示。


  然后我们测试了所有 UI 按钮对象，发现新的 3D 场景黑色背景色影响了我们的信息屏幕，并非常巧妙地使用了一个复杂的嵌套 Java 语句，创建了一个 Color.WHITE
  BackgroundFill 对象并将其插入到你的 StackPane 对象的 Background 对象中。这通过用白色填充替换合成层之一的透明度，并向我们现在的混合
  3D 和 2D 合成管线添加另一个不透明层，解决了问题。一旦该问题解决，我们更改了 gameButton 事件处理程序中的逻辑，允许最终用户通过隐藏 UI 覆盖层并显示正确照明的测试球体图元来开始游戏。


