- '# 2. 内容创作入门：2D 新媒体资产基础


  既然你已经通过上一章搭建了一个专业的 Java 游戏和物联网开发工作站，那么让我们直接开始学习大多数新媒体内容开发软件包所基于的基本 2D 内容开发概念和原理。Blender
  是个例外，它基于更高级的 3D 内容开发，我们将在下一章中介绍。我们需要在进入 Java、NetBeans 和 JavaFX 之前先介绍这些基础多媒体材料，原因在于
  JavaFX 多媒体引擎提供了令人难以置信的支持，包括使用可缩放矢量图形（SVG）进行数字插图、使用光栅（位图）图像格式（如 PNG、JPEG 或 GIF）进行数字成像、使用音频格式（如
  MP3、MPEG4 AAC、WAV 或 AIFF（PCM））进行数字音频，以及使用 JavaFX 内部渲染引擎进行 3D 渲染。我假设你不会创建基于文本的游戏，而是创建交互式新媒体应用程序，因此我想先介绍一些与编码无关的主题。一旦我们开始使用
  NetBeans、Java 和 JavaFX API 进行编码，我们就再也不会停止编码。


  在本章中，你将详细了解 JavaFX 支持的每种 2D 新媒体内容类型背后的概念，包括数字插图（矢量）、数字成像（光栅）、数字视频（动态）和数字音频（波形）。我们这样做是为了让你具备基础知识，能够使用你在第
  1 章中下载并安装的免费开源多媒体内容制作工具进行游戏设计。


  我想首先介绍的是基础新媒体资产类型——数字图像，因为它将作为许多其他新媒体资产类型的基础输入资产。例如，你的数字视频只是一系列随时间快速播放以产生运动幻觉的数字图像。你的
  2D 矢量插图资产可以使用 JavaFX 的 `ImagePattern` 类填充数字图像数据，而你的 3D 矢量资产可以使用数字图像资产作为着色器和纹理贴图，我们将在第
  3 章中介绍这些内容，包括高级 3D 内容创建以及用于实现这些 3D 内容元素的相关 JavaFX 包和类。


  接下来，我将介绍数字视频的概念、技术和“行话”，包括帧、帧率、比特率以及其他添加第四维度（时间）的概念，使静态数字图像资产变为动画数字视频资产。这些概念也与动画相关，包括
  2D 动画和 3D 动画。我们将在第 3 章中介绍 2D 矢量和 3D 矢量概念，因为它们密切相关。


  最后，我们将探讨数字音频概念；数字音频与数字视频密切相关，因为它可以包含在数字视频文件格式中。数字音频也可以独立存在，因此我们还将介绍 JavaFX 中的数字音频格式支持，以及数字音频资产数据占用优化工作流程。因此，本章将涵盖除
  2D 矢量插图之外的所有 2D（X,Y 数据表示）新媒体形式，而 2D 矢量插图与 3D 矢量渲染密切相关，我们将在第 3 章的第一部分中介绍。




  ## 游戏设计资产：新媒体内容概念


  要让你的游戏内容显得专业且在视觉上吸引客户，最强大的工具之一就是你已在第 1 章下载并安装的多媒体制作软件。在深入本书之前，我需要花些时间为你提供关于四种主要新媒体资产类型的基础知识，这些资产通过
  JavaFX 多媒体引擎在 Java 中得到支持。它们包括：用于精灵、背景图像和 2D 动画的**数字图像**；用于 2D 插图、碰撞检测、2D 形状、路径和曲线的**矢量图形**；用于音效、旁白和背景音乐的**数字音频**；以及用于游戏中动画背景循环（如飞鸟掠过天空、云朵飘移等）和高度优化视频播放的**数字视频**。如图
  2-1 所示，这四种 2D 类型或领域均通过 JavaFX 场景图集成到你的游戏中。还有一个我称之为交互式 3D（i3D）的新媒体领域。i3D 将在下一章关于
  OpenGL ES 的内容中介绍，它为 Java 8 和 9 带来了实时 3D 渲染。


