  ## 安装新媒体内容制作软件


  JavaFX 9 支持多种新媒体元素“类型”，或者我称之为“资产”，JavaFX 9 是 Java 9 的新媒体“引擎”，因此它将是你 Pro Java 9 游戏开发的基础。在本章剩余部分，你将安装领先的开源软件，这些软件涵盖的主要新媒体类型包括：SVG
  数字插图、数字图像合成、数字音频编辑、数字视频编辑、VFX 或视觉效果、3D 建模与动画、虚拟世界创建、角色动画、歌曲创作、数字音频采样、办公生产力（是的，你还需要销售你的游戏）等等。


  ### 下载并安装用于 SVG 数字插图的 InkScape


  由于 JavaFX 支持 2D 或“矢量”技术，该技术常用于 Adobe Illustrator 和 Freehand 等数字插图软件包，我们将下载并安装流行的开源数字插图软件包
  InkScape。该软件最近版本号从 0.48 大幅跃升至 0.92，并具备专业功能。InkScape 适用于 Linux、Windows 和 Macintosh
  操作系统，就像我们本章将要安装的所有这些软件包一样，因此读者可以使用任何喜欢的平台来开发游戏。如果你想了解更多关于数字插图和 SVG 的知识，请查阅 Apress
  出版的《数字插图基础》一书。


  要在互联网上找到 InkScape 软件包，请使用谷歌搜索引擎，输入 InkScape。访问该网站，点击左上角的 DOWNLOAD 菜单或右侧的下载图标，如图
  1-15 所示。下载图标会代表你正在使用的操作系统，这是由网站代码通过轮询你的系统自动检测的，只需单击一下，即可自动为你提供正确的版本。


