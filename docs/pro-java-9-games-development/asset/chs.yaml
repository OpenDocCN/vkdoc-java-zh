  ### 纹理贴图管理：编写 resetTextureMaps() 方法


  从图 19-16 可以看出，接下来的编程任务是编写一个方法，用于在下次旋转动画开始前，将游戏棋盘重置为默认（空白）状态。具体做法是：通过使用新的图像资源引用重新实例化
  `Image` 对象（目前虽然应该有，但还没有 `setImageReference()` 方法调用），将漫反射颜色贴图的数字图像引用恢复为默认文件。这将强制
  Java 9 对内存中先前引用的图像进行垃圾回收（重新分配），并用新引用的图像数据替换它。在下一行代码中，你还需要引用关联的 `Shader` 对象，以便将 `Shader`
  对象重新插入内存，同时让新的引用数据指向刚刚加载到内存中的新 `Image` 对象。由于我们始终使用默认（空白）纹理贴图，因此所有这些操作都可以放在一个 `resetTextureMaps()`
  方法中。该方法本身不会改变，但在每次后续随机游戏棋盘旋转开始之前（即在 `if(pressed == spinner)` 条件 `if()` 结构中的其余语句被处理之前），调用它时会将
  3D 游戏棋盘方格重置为默认的未填充（无数字图像主题或问题内容）状态。


  回到你的 `createSceneProcessing()` 方法，在 `if (picked == spinner) { ... }` 结构的顶部添加一个 `resetTextureMaps();`
  方法调用，如图 19-17 所示。NetBeans 会弹出一个辅助菜单，提供为你编写方法体的选项，因此请选择并双击 `javafxgame.JavaFXGame`
  选项中的“创建方法 resetTextureMaps()”，该选项在图 19-17 中间以蓝色显示。


  ![A336284_1_En_19_Fig17_HTML.jpg](img/A336284_1_En_19_Fig17_HTML.jpg)


  图 19-17.


  将 `resetTextureMaps()` 方法调用添加到 `MouseClick` 事件处理代码中；按 `Alt+Enter` 让 NetBeans 创建它


  使用复制粘贴编程技术创建这个新方法体相对容易。你只需输入引用 `gameboardsquare.png` 的新 `Image` 实例化 Java 语句，并输入一条新的
  `Shader1` 语句，将 `setDiffuseMap()` 方法设置为 `diffuse1` 的 `Image` 对象。之后，你只需选中这两行代码，将它们复制
