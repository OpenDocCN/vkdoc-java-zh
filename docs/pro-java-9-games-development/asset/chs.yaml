  让我们在前两章回顾的 Java 9 编程语言和 NetBeans 9 IDE 知识的基础上，在第七章中详细探讨构成 JavaFX 9 新媒体引擎的功能、组件和核心类。这个
  JavaFX 9 新媒体 UI 和 UX API 是通过你在第六章创建引导 Pro Java 9 游戏应用程序时看到的 `javafx` 包添加到 Java 中的。之前的
  JavaFX 8 API 随 Java 8 一起发布，并且也与 Java 7 以及 Android 和 iOS 兼容。JavaFX 包对游戏编程至关重要，因为它们包含了你需要用于游戏编程的高级新媒体类，包括用于使用场景图将场景组件组织成层次结构的类、用于用户界面布局和设计的类、用于
  2D 数字插画（称为矢量图形）的类、用于数字成像（称为光栅图形）的类、2D 动画（矢量和光栅）、数字视频、数字音频、3D 渲染、网页渲染引擎（WebKit）等等。我们将在本章中涉及所有这些内容，以便你了解现在
  JavaFX 已作为 API 集成到 Java 中后，你可以为 Java 9 游戏使用哪些功能。


  在本书早期就深入进行 API 详细概述的理由是激发你大脑的创造性思维，让你开始思考 JavaFX 新媒体引擎特性如何支持你的专业游戏概念和设计。不仅了解 JavaFX
  能为你的游戏开发做什么很重要，而且所有 API 类都是相互关联的，因此你需要了解 JavaFX 新媒体引擎各个组件是如何组合在一起的。JavaFX 使用一组复杂的
  API（我喜欢称之为引擎）来实现令人难以置信的“前端”能力。这是因为它为你的专业 Java 游戏和物联网应用程序带来了实现用户界面（UI）和用户体验（UX）“胜利”的内在力量。所以，请耐心阅读这些“基础”章节，它们涵盖了如何掌握你的
  IDE（NetBeans 9）、基础编程语言（Java 9）以及新媒体引擎（JavaFX 8），后者现在是一个集成的 Java 平台 API，并且在浏览器支持、功能和流行度方面正在迅速增长。


