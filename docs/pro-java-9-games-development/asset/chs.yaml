  接下来，让我们看看平移过渡，它可用于在 3D 场景中沿 X、Y 或 Z 任意维度移动对象。我们将使用它在游戏过程中根据需要将转盘 UI 元素移入（和移出）屏幕，以便玩家随机旋转游戏板来选择新的主题象限。


  ### 动画节点移动：使用 TranslateTransition 类


  公共 final 类 TranslateTransition 扩展了公共抽象超类 Transition，并位于 javafx.graphics 模块的 javafx.animation
  包中。TranslateTransition 创建一个移动（平移）动画，其持续时间由 duration 属性决定。移动是通过在 Interpolator 常量定义的间隔内更新正在动画化的
  Node 的 translateX、translateY 和 translateZ 变量（属性）来实现的。如果提供了“from”值（fromX、fromY、fromZ），平移将从该值开始；否则，算法将使用
  Node 对象的当前位置（translateX、translateY、translateZ）值。如果提供了“to”值（toX、toY、toZ），平移将在该值处停止；否则，它将使用起始值加上
  byX、byY 或 byZ 值。如果同时指定了“to”（toX、toY、toZ）和“by”（byX、byY、byZ）值，则“to”值优先。


  ```

  java.lang.Object

  > javafx.animation.Animation

  > javafx.animation.Transition

  > javafx.animation.TranslateTransition

  ```


  TranslateTransition 类有十一个属性，其中九个涉及 X、Y 和 Z 3D 坐标的 to、from 和 by 规范。另外两个是 duration
  属性和 node 属性，它们定义了动画的持续时间以及它影响哪个 Node 对象。byX 属性用于指定 TranslateTransition 的增量停止 X 坐标
  double 值，该值根据起始值计算得出。byY 属性用于指定 TranslateTransition 的增量停止 Y 坐标 double 值，该值根据起始值计算得出。byZ
  属性用于指定 TranslateTransition 的增量停止 Z 坐标 double 值，该值根据起始值计算得出。fromX 属性用于指定 TranslateTransition
  的起始 X 坐标 double 值。fromY 属性用于指定 TranslateTransition 的起始 Y 坐标 double 值。fromZ 属性用于指定
  TranslateTransition 的起始 Z 坐标 double 值。toX 属性用于指定 TranslateTransition 的停止（静止或最终）X
  坐标值。toY 属性用于指定 TranslateTransition 的停止（静止或最终）Y 坐标值。toZ 属性用于指定 TranslateTransition
  对象的停止（静止或最终）Z 坐标值。


  TranslateTransition 有三个重载的构造方法：一个是空的，一个指定了 duration，一个指定了 duration 和 node 属性。它们如下所示：


  ```

  TranslateTransition()

  TranslateTransition(Duration duration)

  TranslateTransition(Duration duration, Node node)

  ```


  该类有近三十个方法可供使用，其中二十七个（九组，每组三个）处理 from、to 和 by 属性。这是因为对于每个 X、Y 和 Z 属性，都有一个 .get()、一个
  .set() 和一个 .property() 方法。还有用于 duration、node 和 interpolator 属性的方法。所有 X、Y 和 Z 方法都使用
  double 值。.byXProperty() 方法用于将停止 X 坐标值指定为相对于 TranslateTransition 起始位置的增量偏移。.byYProperty()
  方法用于将增量停止 Y 坐标值指定为相对于 TranslateTransition 起始位置的偏移。.byZProperty() 方法用于将增量停止 X 坐标值指定为相对于
  TranslateTransition 起始位置的偏移。


  .fromXProperty() 方法调用用于指定 TranslateTransition 的起始 X 坐标值。


  .fromYProperty() 方法调用用于指定 TranslateTransition 的起始 Y 坐标值。


  .fromZProperty() 方法调用用于指定 TranslateTransition 的起始 Z 坐标值。




  `.getByX()` 方法调用用于获取属性 `byX` 的值。`.getByY()` 方法调用用于获取属性 `byY` 的值。`.getByZ()` 方法调用用于获取属性
  `byZ` 的值。


  `.getFromX()` 方法调用用于获取属性 `fromX` 的值。`.getFromY()` 方法调用用于获取属性 `fromY` 的值。`.getFromZ()`
  方法调用用于获取属性 `fromZ` 的值。`.getToX()` 方法调用用于获取属性 `toX` 的值。`.getToY()` 方法调用用于获取属性 `toY`
  的值。`.getToZ()` 方法调用用于获取属性 `toZ` 的值。


  `void .setByX(double value)` 方法调用用于设置（指定）属性 `byX` 的值。`void .setByY(double value)`
  方法调用用于设置（指定）属性 `byY` 的值。`void .setByZ(double value)` 方法调用用于设置（指定）属性 `byZ` 的值。`void
  .setFromX(double value)` 方法调用用于设置（指定）属性 `fromX` 的值。`void .setFromY(double value)`
  方法调用用于设置（指定）属性 `fromY` 的值。`void .setFromZ(double value)` 方法调用用于设置（指定）属性 `fromZ`
  的值。


  `void .setToX(double value)` 方法调用用于设置（指定）属性 `toX` 的值。`void .setToY(double value)`
  方法调用用于设置（指定）属性 `toY` 的值。`void .setToZ(double value)` 方法调用用于设置（指定）属性 `toX` 的值。


  `.toXProperty()` 方法调用用于为 `TranslateTransition` 对象指定一个停止点的 X 坐标值。`.toYProperty()`
  方法调用用于为 `TranslateTransition` 对象指定一个停止点的 Y 坐标值。`.toZProperty()` 方法调用用于为 `TranslateTransition`
  对象指定一个停止点的 Z 坐标值。


  `.durationProperty()` 方法调用将返回 `TranslateTransition` 的当前持续时间属性。`.getDuration()` 方法调用用于获取
  `TranslateTransition` 持续时间属性的 `Duration` 值。`void .setDuration(Duration value)` 可用于设置（指定）持续时间属性的
  `Duration` 值。


  `.nodeProperty()` 方法调用将返回 `TranslateTransition` 的目标节点 `Node` 属性。`.getNode()` 方法调用将获取（读取）`TranslateTransition`
  节点属性的 `Node` 对象引用值。`void .setNode(Node value)` 方法调用将设置 `TranslateTransition` 节点属性的
  `Node` 值。`void .interpolate(double frac)` 方法调用始终需要由 `Transition` 的子类提供。


