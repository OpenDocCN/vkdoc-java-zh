  ## 摘要


  在第十四章中，我们构建了 JavaFX SceneGraph 层次结构的 3D 部分，即根节点下的 gameBoard Group（Node 子类）分支节点（我们之前创建了
  uiLayout StackPane Node 子类）。我们创建了一个由四个游戏棋盘象限 Group 分支节点组成的子组，分别命名为 Q1 到 Q4，每个节点包含四分之一的棋盘内部区域，这些区域是名为
  q1 到 q4 的 Box 图元，与它们的 Group Node 父对象相对应。在这些象限之下，我们分组了五个游戏棋盘方块叶节点对象，在游戏设计中，它们将对应象限的游戏功能。


  我们创建了两个新的方法体，一个用于创建游戏棋盘方块（因为数量众多），另一个用于创建 Phong 材质（同样数量众多！）。这保持了代码的组织性。我们现在有八个方法体（如果算上仍处于引导代码状态的
  `main()` 方法，则是九个），其中七个是自定义的，并且我们有超过 400 行的 Java 代码，全部组织成逻辑上可折叠和展开的部分。我们为每个游戏棋盘方块创建了彩色着色器，并将适当的漫反射纹理贴图映射到每个方块上。


  在第 15 章中，我们将进一步完善游戏棋盘设计和 Java 代码组织，并为游戏玩家创建一种在 3D 空间中操控棋盘的方法，以便他们（或游戏 AI 代码）能够访问他们感兴趣的游戏棋盘内容和主题部分。


