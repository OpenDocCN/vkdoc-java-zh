  ### 旋转后填充象限：OnFinished() 事件处理


  现在我们已经修改了 `createSceneProcessing()` 方法中的 `MouseEvent` 处理结构，让我们打开 `createAnimationAssets()`
  方法，在 `rotGameBoard` 动画对象中添加更多事件处理，以便在动画对象的旋转周期完成后触发一些代码来填充游戏棋盘方格。我们这样做的原因是，如果在旋转之前填充游戏棋盘方格，玩家就会知道旋转的游戏棋盘将停在何处！此外，我想向你展示如何“连接”一个动画对象，使其在播放完成后能够触发其他事件和代码结构，这对于专业的
