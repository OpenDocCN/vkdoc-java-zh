  ### JavaFX 边界与尺寸：使用 javafx.geometry 类


  尽管“几何”一词在技术上适用于 2D 和 3D 资源，但它们包含在 `javafx.scene.shape` 包中，我们已在本章前面部分介绍过。`javafx.geometry`
  包可以视为一个“工具”包，包含从头构建 2D 或 3D 结构的基础类。因此，该包包含诸如 `Bounds` 超类及其子类 `BoundingBox`，以及 `Insets`、`Point2D`、`Point3D`、`Dimension2D`
  和 `Rectangle2D` 等几何内容创建工具类。`javafx.geometry` 包中的所有类（除 `BoundingBox` 类外）都直接继承自 `java.lang.Object`
  主类，这意味着它们各自（从头编码）用于提供点（也称为顶点）、矩形、尺寸、边界和内边距（内部边界），作为 Java 9 游戏的几何工具。


  `Point2D` 和 `Point3D` 类（最终为对象）分别保存 2D 平面上 2D 点的 X、Y 坐标，或 3D 空间中 3D 点的 X、Y、Z 坐标。这些
  Point 对象最终将用于构建更复杂的 2D 或 3D 结构，这些结构由点的集合组成，例如 2D 路径或 3D 网格。`Point2D` 和 `Point3D`
  的构造方法没有重载，它们分别使用以下标准格式：


  ```

  Point2D(double X, double Y)

  Point3D(double X, double Y, double Z)

  ```


  `Rectangle2D` 类（对象）可用于定义矩形 2D 区域（通常称为“平面”），在图形编程中有许多用途，这一点不难想象。


  `Rectangle2D` 对象有一个起始点，位于矩形的左上角，由 X 和 Y 坐标位置指定，以及一个尺寸（宽度乘以高度）。`Rectangle2D` 对象的构造方法具有以下标准格式，且未重载：


  ```

  Rectangle2D(double minX, double minY, double width, double height)

  ```


  还有一个 `Dimension2D` 类（对象），它仅指定宽度和高度尺寸，而不将尺寸（否则会使其成为矩形）通过 X、Y 位置放置在屏幕上。其构造方法如下：


  ```

  Dimension2D(double width, double height)

  ```


  `Insets` 类（对象）类似于 `Dimension2D` 类，它不提供内边距的位置值，但根据上、下、左、右偏移距离提供矩形内边距区域的偏移量。实际上，`Insets`
  方法已重载，因此你可以使用以下方式指定等距内边距或自定义内边距：


  ```

  Insets(double topRightBottomLeft)

  Insets(double top, double right, double bottom, double left)

  ```


  `Bounds` 类是一个公共抽象类，永远不会成为对象，而是用于创建 Node 边界类（如其子类 `BoundingBox`）的蓝图。`Bounds` 超类也允许负值，用于指示边界区域为空（可视为
  null 或未使用）。`BoundingBox` 类使用以下（重载的）构造方法创建 2D（第一个构造方法）或 3D（第二个构造方法）的 `BoundingBox`
  对象：


  ```

  BoundingBox(double minX, double minY, double width, double height)

  BoundingBox(double minX, double minY, double minZ, double width, double height,
  double depth)

  ```


  接下来，让我们看看 JavaFX 中的 Event 和 ActionEvent 处理，因为这为你的游戏增加了交互性。




  ### 游戏中的 JavaFX 输入控件：使用 javafx.event 类


  由于游戏本质上具有交互性，接下来我们看看 `javafx.event` 包。它为我们提供了 `Event` 超类及其子类 `ActionEvent`，用于处理诸如
  UI 元素或动画 `KeyFrame` 处理事件所使用的 `ACTION` 事件。由于你将在专业 Java 9 游戏（或物联网应用）中使用 `ActionEvent`，我将在此介绍其跨包（Java
  到 JavaFX）的类继承层次结构，这也能让你了解 JavaFX `Event` 类的起源。之所以能做到这一点，是因为 JavaFX API 是 Java API
  的一部分（位于其下层）。


  ```

  Java.lang.Object

  > java.util.EventObject

  > javafx.event.Event

  > javafx.event.ActionEvent

  ```


  JavaFXGame 应用已经在使用这个 `ActionEvent` 类（对象），配合 `EventHandler` 接口及其 `.handle()` 方法。你需要实现该方法，以告知
  Java 应用如何处理该事件——一旦事件发生（编程术语称为“触发”），它就是一个 `ActionEvent`。然后，这个 `.handle()` 方法会“捕获”被触发的事件，并根据
  `.handle()` 方法“主体”内的 Java 9 编程逻辑对其进行处理。


  正如你在第 5 章所学到的，Java 接口是一种类型，它提供声明好但尚未包含任何 Java 结构的空方法。这些未实现的方法在使用时，需要由你（Java 程序员）来实现。这个
  Java 接口仅定义了哪些方法需要被实现；在本例中，它是一个单一方法，用于“处理” `ActionEvent`，以便该事件能以某种方式得到处理。


  需要注意的是，Java 接口定义了一个需要编写代码的方法，但并不会为你编写该方法代码，因此它是一张“路线图”，指明了你必须做什么才能完成或对接现有的编程结构。在本例中，这是一个用于处理
  `ActionEvent` 对象的 Java 编程结构，或者更准确地说，是一个用于在 `ActionEvent` 被触发后对其进行处理的编程结构。


  与本章 JavaFX 新媒体引擎概述中涵盖的其他所有内容一样，在本书（专业 Java 9 游戏与物联网应用开发）的后续内容中，当你应用这些 JavaFX 9 编程结构、JavaFX
  场景图构建以及新媒体资产设计概念时，你将很快深入了解如何使用这些包、类、嵌套类、接口、方法、常量和数据字段（变量）。


  ### JavaFX UI 元素：使用 javafx.scene.control 类


  `javafx.scene.control` 包以及我们接下来要介绍的 `javafx.scene.chart` 包，都位于 `javafx.controls`
  模块中。该包包含了所有用户界面控件（在 Android 中它们被称为“widgets”，而我更喜欢称它们为 UI“元素”）类，例如 `Alert`、`Button`、`Cell`、`CheckBox`、`ChoiceDialog`、`ContextMenu`、`Control`、`DatePicker`、`ColorPicker`、`Label`、`ProgressBar`、`Slider`、`Label`、`RadioButton`、`ScrollBar`
  和 `TextField`。由于 `javafx.scene.control` 中有超过 100 个类，我甚至不打算在此一一介绍，因为仅这一个 Java 9 模块就足以写成一本书。如果你想回顾这些类，只需使用谷歌或
  Oracle Java 网站搜索 `javafx.control` 模块，你就可以花上几天时间仔细研究这些类的功能。对于这个模块，“参考”是关键，因为当你需要实现某个特定
  UI 元素时，你会希望单独参考这个包及其类。在本书中，我将尝试使用自己的 3D UI 元素和代码来创建 i3D 游戏（最终），这样我就不必在发行版中包含 `javafx.controls`
  模块，从而省去了在发行版中包含超过 100 个控件类（更不用说十几个图表类）的开销，这些类实际上并未被使用。


  ### JavaFX 商业图表：使用 javafx.scene.chart 类


  `javafx.scene.chart` 包与预定义的 UI 控件（UI 元素）一起位于 `javafx.controls` 模块中。该包包含商业图表类，例如
  `Chart`、`ScatterChart`、`StackedAreaChart`、`XYChart`、`PieChart`、`LineChart`、`BarChart`、`StackedBarChart`、`AreaChart`、`BubbleChart`
  等，用于商业应用，这完全是另一本书的内容，因此我们不会在本书中介绍图表。事实上，对于我的游戏，我将采用 3D UI 方法，这意味着我根本不需要包含 `javafx.controls`
  模块（一个庞大的类集合），这样我的游戏模块只需包含 `javafx.base`、`javafx.media` 和 `javafx.graphics`，从而使发行版的下载体积显著减小（正如你在本章中所见，base
  只有 10 个包，media 有 9 个，而 graphics 有 18 个）。


  ### JavaFX 媒体控制：使用 javafx.scene.media 类


  `javafx.scene.media` 包包含在 `javafx.media` 模块中，其中包含用于播放音频和视频媒体资产的类，包括 `Media`、`MediaPlayer`
  和 `MediaView` 类，以及 `AudioClip`、`AudioEqualizer`、`EqualizerBand`、`Track`、`VideoTrack`
  和 `SubtitleTrack` 类。`Media` 类（或对象）引用或包含一个音频或视频媒体资产，`MediaPlayer` 播放该资产，而 `MediaView`（尤其是在视频情况下）显示数字音频或视频媒体资产，以及用于媒体播放的传输控件。


  在本书后续内容中，当我们为你的专业 Java 9 游戏添加数字音频音效时，我们将使用 `AudioClip` 类。既然我们使用了该模块的数字音频部分，如果必须将其包含在你的应用（模块）发行版中，我们不妨也利用数字视频资产（视频类）的功能。


  ### JavaFX Web 渲染：使用 javafx.scene.web 类


  `javafx.scene.web` 包包含在 `javafx.web` 模块中，其中包含用于在场景中渲染 Web（互联网）资产的类。该包包含一系列类，包括 `WebEngine`、`WebView`、`WebEvent`、`WebHistory`
  和 `HTMLEditor`。可以想象，`WebEngine` 类（嘿，也有人称这些算法为引擎）负责处理在 JavaFX 场景中显示 HTML5、CSS3、CSS4
  和 JavaScript，而 `WebView` 则创建节点以在 JavaFX 场景图中显示 `WebEngine` 的输出。`WebHistory` 类（最终是对象）保存着从
  `WebEngine` 实例化到从内存中移除的互联网“会话”，即访问过的网页历史记录，而 `WebEvent` 类则“桥接”了 JavaScript 网页事件处理与
  JavaFX 9 事件处理。在本书中创建 i3D 游戏的过程中，我们不会使用 `javafx.web` 模块，因为我将专注于那些能够提供最专业视觉效果的 i3D
  游戏体验的核心 API。




  ### 其他 JavaFX 包：Print、FXML、Beans 和 Swing


  在结束本章 JavaFX 概述之前，你还需要仔细了解其他几个 JavaFX 包。这些包包含的类可能在你专业的 Java 游戏开发中用到，但它们提供的是更专业的功能，例如打印、使用第三方
  Java 代码、使用较旧的 UI 范式（如 AWT 和 Swing），以及将 UI 设计工作交给非程序员使用 XML（特别是 FXML）来完成。这些 API 包括
  `javafx.print` 包（`javafx.graphics` 模块）、`javafx.fxml` 包（`javafx.fxml` 模块）、`javafx.beans`
  包（`javafx.base` 模块）和 `javafx.embed.swing` 包（`javafx.swing` 模块）。除非你的项目有特殊需求，否则在 Java
  游戏设计和开发工作流程中不太可能用到它们。其中最明显的是 `javafx.print`，它用于让打印机与你的专业 Java 9 游戏协同工作。如果你需要使用较旧的
  Swing UI 元素，有一个 `javafx.swing` 模块可以实现这一点，但这会增加 Java 9 游戏发行版的数据占用。`javafx.beans`
  包允许你使用 Java Beans（第三方或添加的类），而 `javafx.fxml` 模块则允许你使用 Java FXML，这是一种 XML 语言，可以将用户界面和图形设计工作从
  Java 编码转移到 XML 中。这使得不熟悉 Java 的设计师也能参与游戏项目。Android 操作系统和 Android Studio IDE 也采用了这种方法，它们使用
  XML 处理许多顶层设计任务，这样设计师就不必同时是程序员。


  ## 总结


  在第七章中，你了解了 JavaFX 9 API 中一些最重要的包、概念、组件、类、构造器、常量和变量（属性、参数、数据字段）。这是一个令人印象深刻的集合，包含七个
  Java 9 模块和 36 个包，其中许多我使用表格进行了简洁的概述，然后逐一进行了介绍。我这样做是因为，本章概述的大部分（如果不是全部）包和类，最终都会以某种方式用于新媒体、2D、3D
  以及混合 2D+3D 的专业 Java 9 游戏开发。当我说全面概述时，我的意思是让我们看看在 Java 9 下使用 JavaFX 9 进行游戏开发所需的一切。


  当然，我无法在一章中涵盖 JavaFX 9 API 中的每一个功能类，所以我从图 7-1 中 JavaFX API 新媒体引擎的概述开始，以及它如何与上层的 JavaFX
  场景图集成，并与 Java 9 API、NetBeans 9 以及这些 API 下层的目标操作系统集成。你的 Java 9 游戏发行版和操作系统之间通过 Java
  虚拟机（JVM）进行桥接。这赋予了 JavaFX 在众多流行平台和消费电子设备上广泛的操作系统支持，从智能手机到平板电脑再到 iTV 设备，以及所有基于流行的
  WebKit 引擎的主流网络浏览器（Chrome、Firefox 和 Opera）。


  你通过查看构成 JavaFX 引擎的结构，从高层次的技术角度审视了 JavaFX，这些结构包括 JavaFX 场景图、JavaFX API、Quantum、Prism、Glass、WebKit
  和媒体播放器引擎。你了解了这些多线程、渲染、窗口化、媒体和 Web 引擎如何与 Java 9 API 和 JDK 交互，以及如何与 NetBeans 9 及其生成的
  JVM 字节码交互，这些字节码得到了当前运行在十多种不同消费电子设备类型（从 96 英寸 UHD iTV 到 4 英寸智能手机）之上的各种操作系统平台的支持。


  我介绍了 JavaFX 的核心概念，例如使用 JavaFX 场景图和 JavaFX 脉冲事件系统，我们将在本书的后续章节中利用这些概念来创建一个专业的 Java
  9 游戏，从下一章开始，我们将开始设计游戏并介绍如何使用 JavaFX 场景图来开发处理层次结构。


  我深入探讨了一些用于专业 Java 9 游戏设计的关键 JavaFX 包、子包和类，例如 `application`、`scene`、`shape`、`effect`、`layout`、`control`、`media`、`image`、`stage`、`animation`、`geometry`、`event`、`fxml`
  和 `web`，以及它们相关的 Java 9 模块、包、子包、类和子类。在某些情况下，我甚至介绍了它们的接口、嵌套（辅助）类和数据常量。


  在回顾 JavaFX 9 API 的过程中，你稍作休息，为 `JavaFXGame` 应用程序添加了一些代码，使其成为一个“无窗口”应用程序，能够“浮动”在任何主流操作系统桌面上。你了解了如何通过使用十六进制设置
  `0x00000000` 的 Alpha 通道，或使用代表 100% Alpha 透明度的等效常量（例如 `Color.TRANSPARENT`、`StageStyle.TRANSPARENT`
