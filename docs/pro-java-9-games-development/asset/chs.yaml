  现在我们已经设置好了转盘和游戏板的旋转，并且 MouseEvent 处理已足够将两者连接起来，为游戏板创建随机旋转，接下来我们需要在代码中添加一个随机化算法，这样每次点击转盘时，游戏板都会随机旋转到一个新的象限。我们将至少使用三次旋转，以确保旋转时间足够长，让玩家感觉完全是随机的。让我们在类的顶部声明一个名为
  `random` 的 Random 对象，然后使用 Alt+Enter 组合键调出 NetBeans 9 的弹出式帮助器。最后，选择（双击）“Add import
  for java.util.Random”选项，如图 17-11 中蓝色高亮所示。


  ![A336284_1_En_17_Fig11_HTML.jpg](img/A336284_1_En_17_Fig11_HTML.jpg)


  图 17-11.


  在类顶部声明一个名为 `random` 的 Random 对象；使用 Alt+Enter 添加 `import java.util.Random`


  由于我们希望在实际使用随机数生成器“引擎”之前对其进行实例化（创建），因此让我们的代码在游戏应用程序启动时实例化（创建并加载到系统内存中）Random 数生成器。


