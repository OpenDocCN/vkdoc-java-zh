  既然您已经了解了 JavaFX API 中包含的 3D 资源（称为基本体），那么让我们开始获取一些基础知识，了解如何使用 2D 图像资源来“装扮”这些 3D 资源，我们将把这些图像资源转化为材质，然后使用着色器将其应用到
  3D 表面。JavaFX 支持 Phong 着色器，它包含多个通道，可接受称为纹理映射的特殊图像，这些图像可应用不同的效果，例如着色、照明、表面凹凸、表面光泽度等。JavaFX
  在 `javafx.graphics` 模块的 `javafx.scene.paint` 包中提供了两个核心着色器类，专门为您“着色”或处理 3D 几何体（基本体或网格）的表面，我们将在本章中对其进行介绍。我们还将了解如何使用
  GIMP 2.8.22 基于像素和数学方法快速准确地创建纹理映射，从而提供精确的纹理映射结果。我们还将回到 `JavaFXGame` 主应用程序类的编码中，开始向
  3D 基本体添加 Phong 着色器材质以进行一些练习。您可以在 Blender 等 3D 软件包中完成此操作，但棋盘游戏足够简单（正方形、球体、圆柱体），我们可以仅使用
  JavaFX 代码来完成。这意味着我们不需要导入（和分发）3D 模型，而是可以编写代码来“凭空”建模您的 i3D 游戏。这也将让您学到更多关于 Java 9 和
  JavaFX 中 3D API 的知识，因为您将学习如何仅使用 Java 9 及其 JavaFX API 来建模复杂的 3D 对象。


  在本章中，您将学习包含在 `javafx.scene.paint` 包中的 JavaFX 3D 着色器类层次结构。在 Java 9 和 Android 8 中，`Paint`
  类将像素颜色和属性应用于画布，在此情况下则应用于 3D 基本体的表面。`paint` 包包含与此“蒙皮”或纹理映射目标相关的类。您将涵盖 `Material`（一个包含顶级着色器定义的超类）和
  `PhongMaterial` 类，该类可用于为 3D 基本体创建纹理映射或“蒙皮”（在第 12 章中已介绍）。




  ## JavaFX 材质超类：i3D 着色器属性


  公共抽象材质超类用于创建 `PhongMaterial` 类，你将使用该类为 `Shape3D` 子类创建材质属性，这些子类用于你在专业 Java 9 游戏设计与开发中使用的
  i3D 图元。从外部 3D 软件包导入的高级模型在 3D 软件生产环境中已经应用了材质（有时称为着色器）和纹理贴图，导入后，它们将位于使用 `MeshView`
  对象显示的 `Mesh` 对象中，因此在大多数实际应用中，你并不总是需要直接在这个低层级使用 `PhongMaterial` 类来为高级 3D 对象着色。`Material`
  超类比 `Mesh` 更像一个空壳，因为它只有一个空构造函数，没有任何属性或方法！`Material` 类是 `javafx.scene.paint` 包的一部分，具有以下
  Java 类层次结构：


  ```

  java.lang.Object

  > javafx.scene.paint.Material

  ```


  这个唯一的空构造函数方法是受保护的，这意味着它不会被直接实例化。然而，这个构造函数方法的功能在 `PhongMaterial` 子类中实现为 `PhongMaterial()`，我们将在本章下一节中介绍。


  ```

  protected Material()

  ```


  接下来，让我们看看 `PhongMaterial` 子类，它代表了 Phong 着色器渲染算法。在本章中，我们将直接使用（并学习）它来为我们之前在第 12 章中创建的
  3D 图元着色。


  ### JavaFX PhongMaterial：Phong 着色算法与属性


  公共 `PhongMaterial` 类扩展了 `Material` 类，用于定义 Phong（算法）着色器材质、其颜色设置以及用于 JavaFX 3D 场景的纹理贴图。该类位于
  `javafx.graphics` 模块的 `javafx.scene.paint` 包中，并且如你所知，它是 `Material` 的子类，因此你将拥有以下
  Java 类层次结构：


  ```

  java.lang.Object

  > javafx.scene.paint.Material

  > javafx.scene.paint.PhongMaterial

  ```


  JavaFX 9 中的 Phong 着色（材质和纹理渲染）算法描述了你的 `PointLight` 对象和 `AmbientLight` 对象（如果存在）与应用了
  `PhongMaterial` 对象的 3D 图元表面之间的交互。`PhongMaterial` 对象在反射光线时会应用漫反射和镜面反射颜色着色，就像现实生活中的光线一样。当光线从有色物体上反射时，光线本身也会带上颜色。`PhongMaterial`
  算法支持 `AmbientLight` 对象设置（如果存在），并支持自发光或“辉光”贴图，以便你可以应用特效进一步增强着色器的真实感。


  根据 JavaFX 9 `PhongMaterial` 文档，几何表面上任意一点的颜色是这四个分量的数学函数：环境光、漫反射、镜面反射和自发光贴图。这些分量的子分量（算法输入）包括：`AmbientLight`（对象）、`PointLight`（对象）、漫反射颜色（设置）、漫反射颜色贴图（图像对象）、镜面反射颜色（设置）、镜面反射强度（设置）、镜面反射贴图（图像对象）、自发光或辉光贴图（图像对象）。


  如果存在多个 `AmbientLight` 对象，则环境光源的最终颜色将使用以下公式计算，在这种情况下，它们的值将简单相加（这就是我建议只使用一个的原因）：


  ```

  对于每个环境光（对象）源 [i]：{ ambient += AmbientLightColor[i] } // 颜色相加

  ```


  点光源的算法计算要复杂得多，这就是为什么我建议在专业 Java 9 3D 游戏中使用 `PointLight`，因为它允许对 `PhongMaterial` 对象的性能进行微调控制，并且可以为你的
  3D 场景添加更戏剧性的光照效果（衰减、阴影、更高对比度等），使其更逼真。需要注意的是，这些方程中使用的点表示点积数学运算。


  ```

  对于每个点光源（对象）源 [i]：

  {    diffuse  += (表面到光源向量 . 法线) * PointLightSourceColor[i]

  specular += ( (归一化反射向量 . 归一化观察向量)

  ^ (specularPower * intensity(specularMap)) )

  * PointLightSourceColor[i]

  }

  ```


  渲染结果中的颜色值将使用以下输入分量算法计算：


  ```

  color = ((ambient + diffuse) * diffuseColor * diffuseMap

  + specular * specularColor * specularMap

  + selfIlluminationMap

  ```


  这里列出这些内容是为了完整性，并且因为它们在 `PhongMaterial` 文档中有所概述，而不是因为你需要成为高级着色器数学家才能开发专业 Java 9 游戏。话虽如此，这将让你了解我们将在本章中探讨的着色器输入分量如何在
  Phong 着色器算法中相互交互，以及通过足够的贴图和参数调整，微调这些输入中的任何一个如何让你实现任何你想要的逼真表面渲染效果！


  `PhongMaterial` 类中有七个属性，它们告诉你可以使用哪些类型的纹理贴图和颜色规范来为你的 3D 图元添加表面效果。这些属性在所有标准 3D 软件包中也都是可用的，因此在
  JavaFX 9 外部创建并添加纹理的模型也可以访问这些属性（实际上，甚至更多）。




  `ObjectProperty<Image> bumpMap` 是一个 `Image` 对象，用于在 3D 模型上模拟凹凸或表面高度的细微变化。这可用于为 3D
  模型添加精细的表面细节，这些细节实际上并非模型几何表面拓扑的一部分，但凹凸贴图会使其看起来像是模型物理拓扑的一部分。凹凸贴图有时会被错误地称为法线贴图，就像在
  JavaFX 9 文档中那样。文档中说“`PhongMaterial` 的凹凸贴图是存储为 RGB 图像的法线贴图”，因此我写信给 Oracle，询问他们 `bumpMap`
  属性究竟是凹凸贴图还是更高级的法线贴图！我希望的是，它最初是一个凹凸贴图算法，后来随着时间的推移升级为支持更复杂的法线贴图算法，同时保留了 `bumpMap`
  的属性名称，以免破坏现有代码。法线贴图可以创造出远为优越的表面效果。


  `ObjectProperty<Color> diffuseColor` 表示材质的漫反射（或基础、基底）表面颜色。通过使用漫反射颜色贴图或漫反射贴图，可以改变对象表面的颜色。如果你的
  3D 软件拥有比 JavaFX 能导入的更高级的着色贴图类型，则可以使用一种称为“烘焙”的技术，将 3D 渲染器的着色器管线及纹理贴图结果渲染成一张漫反射贴图图像，然后导出（为
  TIFF、BMP、PNG 或 TGA 24 位 RGB 图像），并在 JavaFX 中用作漫反射贴图 `Image` 对象。实际上，既然我们已经基本涵盖了这一点，接下来就让我们看看这个。


  `ObjectProperty<Image> diffuseMap` 属性引用一个 `Image` 对象，其数据定义了一张漫反射贴图，该贴图将使用 UV 纹理坐标映射到使用
  `PhongMaterial` 的 3D 图元表面。


  `ObjectProperty<Image> selfIlluminationMap` 属性引用一个 `Image` 对象，其数据定义了一张辉光或照明贴图（使用表示光照强度的灰度
  `Image` 对象），该贴图将使用 UV 纹理坐标映射到使用 `PhongMaterial` 的 3D 图元表面。


  `ObjectProperty<Color> specularColor` 属性指定 `PhongMaterial` 的高光颜色。这是高光（参见图 13-5）的颜色，用于细化
  3D 图元表面的视觉特性。


  `ObjectProperty<Image> specularMap` 属性引用一个 `Image` 对象，其像素数据定义了 3D 图元表面上的一个区域，该区域将使用高光贴图（一个表示高光颜色是否应用的灰度
  `Image` 对象）对高光颜色做出响应。这应使用 UV 纹理坐标映射到图元上，并将影响图元表面高光映射区域的光泽度（或无光泽度）。


  `DoubleProperty specularPower` 属性用于指定高光的强度（我喜欢将其视为“聚焦度”）。此属性在球体和圆柱体（曲面）图元上尤其明显，如图
  13-8 所示，该图对 `phongMaterial` 应用了值为 100 的高（紧密或聚焦）高光强度。


  `PhongMaterial` 类有三个重载的构造方法。第一个使用默认的 `Color.WHITE` 漫反射颜色属性创建一个新的 `PhongMaterial`
  对象实例。这将使用以下 Java 代码：


  ```

  phongMaterial = new PhongMaterial();

  ```


  第二个构造方法使用指定的漫反射颜色属性创建一个新的 `PhongMaterial` 对象实例。这将使用以下 Java 代码和 `Color` 类的 `GOLD`
  常量，正如我们稍后在代码中将要使用的那样：


  ```

  phongMaterial = new PhongMaterial(Color.GOLD);

  ```


  第三个构造方法允许你指定漫反射颜色和四种不同类型的效果贴图。这是最方便的构造方法，我们将在游戏设计和开发进入更高级阶段时使用它。这个高级构造方法将采用以下 Java
  代码语句格式：


  ```

  phongMaterial = new PhongMaterial(Color diffuseColor, Image diffuseMap, Image specularMap,

  Image bumpMap, Image selfIlluminationMap)

  ```


  最后，让我们看看允许你处理所有这些 `PhongMaterial` 组件的 22 个方法。这些方法允许你使用 Java 代码动态地或交互式地更改 `PhongMaterial`。正如你将在本书中看到的那样，这将允许你在
  3D 和 i3D 游戏属性上创建一些相当令人印象深刻的效果。


  `ObjectProperty<Color> diffuseColorProperty()` 方法调用将返回其所调用的 `PhongMaterial` 的 `diffuseColor`
  属性。这是一个 `Color` 值，用于设置图元的基础（或基底）颜色。


  `ObjectProperty<Color> specularColorProperty()` 方法调用返回其所调用的 `PhongMaterial` 的 `specularColor`
  属性。这是一个 `Color` 值，用于设置图元的高光（或高亮）颜色。


  `DoubleProperty specularPowerProperty()` 方法调用返回其所调用的 `PhongMaterial` 的 `double`
  类型 `specularPower` 属性。这是一个 `Double` 值，用于设置图元的高光（或高亮）强度。


  `ObjectProperty<Image> bumpMapProperty()` 方法调用将返回其所调用的 `PhongMaterial` 的 `bumpMap`
  属性。这是一个存储为 RGB `Image` 对象的法线贴图。


  `ObjectProperty<Image> diffuseMapProperty()` 方法调用将返回其所调用的 `PhongMaterial` 的 `diffuseMap`
  属性。这是一个存储为 RGB `Image` 对象的漫反射颜色贴图。


  `ObjectProperty<Image> selfIlluminationMapProperty()` 方法调用将返回其所调用的 `PhongMaterial`
  的 `selfIlluminationMap` 属性。这个自发光贴图存储为 RGB `Image` 对象。


  `ObjectProperty<Image> specularMapProperty()` 方法调用返回其所调用的 `PhongMaterial` 的 `specularMap`
  属性。这个高光颜色贴图存储为 RGB `Image` 对象。


  `getBumpMap()` 方法调用获取 `PhongMaterial` 属性 `bumpMap` 的 `Image` 对象。


  `getDiffuseColor()` 方法调用获取 `PhongMaterial` 属性 `diffuseColor` 的 `Color` 值。


  `getDiffuseMap()` 方法调用获取 `PhongMaterial` 属性 `diffuseMap` 的 `Image` 对象。


  `getSelfIlluminationMap()` 方法调用获取属性 `selfIlluminationMap` 的 `Image` 对象。


  `getSpecularColor()` 方法调用获取 `PhongMaterial` 属性 `specularColor` 的 `Color` 值。


  `getSpecularMap()` 方法调用获取 `PhongMaterial` 属性 `specularMap` 的 `Image` 对象。


  `getSpecularPower()` 方法调用获取 `PhongMaterial` 属性 `specularPower` 的 `double` 值。


  `void setBumpMap(Image image)` 方法调用设置属性 `bumpMap` 的 `Image` 引用。


  `void setDiffuseColor(Color color)` 方法调用设置属性 `diffuseColor` 的 `Color` 值。


  `void setDiffuseMap(Image image)` 方法调用设置属性 `diffuseMap` 的 `Image` 引用。


  `void setSelfIlluminationMap(Image)` 方法调用设置属性 `selfIlluminationMap` 的 `Image`。


  `void setSpecularColor(Color color)` 方法调用设置属性 `specularColor` 的 `Color` 值。


  `void setSpecularMap(Image image)` 方法调用设置属性 `specularMap` 的 `Image` 对象。


  `void setSpecularPower(double value)` 方法调用设置属性 `specularPower` 的值。


  `toString()` 方法调用将任何非文本（二进制、数字等）格式的数据转换为文本格式。


