  ## 使用 java.util.Random：生成随机旋转


  公共类 Random 继承自 Object 并实现了 Serializable。它位于 java.util 包中，有两个已知的直接子类：SecureRandom
  和 ThreadLocalRandom。该类的实例可用于创建随机数生成对象，该对象将生成一个“伪随机数”流。这些数字的随机性足以用于创建随机游戏转盘 UI 功能。该类的算法使用一个
  48 位的种子，并通过线性同余公式进行修改。如果你想更详细地研究这个算法，可以参考 Donald Knuth 所著的《计算机程序设计艺术》（第 2 卷，第 3.2.1
  节）。因此，Random 类的 Java 类层次结构如下所示：


  ```

  java.lang.Object

  > java.util.Random

  ```


  需要注意的是，如果使用相同的种子创建两个不同的 Random 对象实例，并且对每个对象进行相同顺序的方法调用，那么算法将生成（返回）相同的数字结果序列。在某些应用中，这实际上是可取的；因此，为了保证结果一致，java.util.Random
  类实现了特定的算法。只要遵循所有方法的通用约定，Random 类的子类可以使用替代算法来提高安全性或支持多线程使用。


  java.util.Random 的实例是线程安全的。然而，在多个线程中并发使用同一个 java.util.Random 实例可能会遇到争用，从而导致性能不佳。在你的多线程游戏设计中，应考虑使用
  ThreadLocalRandom 子类。


  此外，java.util.Random 的实例在加密上并不安全。对于对安全性要求高且需要高安全级别的应用，应考虑改用 SecureRandom 子类来获取一个加密安全的伪随机数生成器。


  该类有两个重载的构造方法。第一个创建一个随机数生成器，第二个创建一个随机数生成器并使用 long 格式为其提供一个种子值。这些构造方法如下面的 Java 代码所示：


  ```

  Random()             // 我们将在本章后面的代码中使用这个

  Random(long seed)

  ```


  该类有 22 个方法可用于从 Random 对象获取随机数结果。`.doubles()` 方法调用将返回一个无限的数值流，称为 DoubleStream，其中包含伪随机
  double 值。这些值中的每一个都将介于 0（包含）和 1（不包含）之间。还有另外三个重载的 `.doubles()` 方法调用。`.doubles(double
  randomNumberOrigin, double randomNumberBound)` 方法调用将返回一个无限的、有界的伪随机 double 值流，每个值都符合方法调用参数区域中指定的给定起始值（包含）和边界值（不包含）。`.doubles(long
  streamSize)` 方法调用将返回一个流，该流生成指定 streamSize 数量的伪随机 double 值，这些值介于 0（包含）和 1（不包含）之间。最后，还有一个
  `.doubles(long streamSize, double randomNumberOrigin, double randomNumberBound)`
  方法调用，它返回一个流，该流生成符合给定 streamSize 数量的伪随机 double 值，每个值都符合给定的起始值（包含）和边界值（不包含）。


  `.ints()` 方法调用将返回一个无限的伪随机 int（整数）数值流，称为 IntStream。还有另外三个重载的 `.ints()` 方法调用，包括一个
  `.ints(int randomNumberOrigin, int randomNumberBound)` 方法调用，它将返回一个无限的伪随机 int（整数）值流，每个值都符合参数区域中指定的起始值（包含）和边界值（不包含）。`.ints(long
  streamSize)` 方法调用将返回一个随机值流，该流生成由 streamSize 参数指定的流大小，该参数设定了所需的伪随机 int（整数）值的数量。


  最后，`.ints(long streamSize, int randomNumberOrigin, int randomNumberBound)` 方法调用将返回一个数值（整数）流，该流生成参数区域中指定的
  streamSize 数量的伪随机 int 值，每个值都符合指定的起始值（包含）和边界值（不包含），这些值也取自方法调用的参数区域。


  `.longs()` 方法调用将返回一个无限的伪随机 long 数值流，称为 LongStream。还有另外三个重载的 `.longs()` 方法调用，包括一个
  `.longs(long randomNumberOrigin, int randomNumberBound)` 方法调用，它将返回一个无限的伪随机 long
  值流，每个值都符合参数区域中指定的起始值（包含）和边界值（不包含）。`.longs(long streamSize)` 方法调用将返回一个随机 long 值流，该流生成由
  streamSize 参数指定的流大小，该参数设定了所需的伪随机 long 值的数量。


  最后，一个 `.long(long streamSize, int randomNumberOrigin, long randomNumberBound)` 方法调用将返回一个
  long 数值流，该流生成参数区域中指定的 streamSize 数量的伪随机 long 值，每个值都符合指定的起始值（包含）和边界值（不包含），这些值也取自方法调用的参数区域。


  受保护的 int `.next(int bits)` 方法调用将使用整数位数作为参数规范来生成下一个伪随机整数。`.nextBoolean()` 方法调用将从随机数生成器对象的序列中返回一个伪随机、均匀分布的布尔值。这个方法可能不适用于本游戏的使用场景，因为
  `next()` 被设计为由其他 `random()` 方法调用。


  void `.nextBytes(byte[] bytes)` 方法调用将生成一个由参数提供的字节数组，并用随机字节值填充它。`.nextDouble()` 方法调用将使用随机数生成器对象的序列，返回一个介于
  0.0 和 1.0 之间的伪随机、均匀分布的 double 值。`.nextFloat()` 方法调用将使用随机数生成器对象的序列，返回一个介于 0.0 和 1.0
  之间的伪随机、均匀分布的 float（或浮点）值。


  `.nextGaussian()` 方法调用将从此随机数生成器对象的序列中返回一个伪随机、高斯分布、均值为 0.0、标准差为 1.0 的 double 值。`.nextInt()`
  方法调用将从此随机数生成器对象的序列中返回下一个伪随机、均匀分布的 int（整数）值。


  `.nextLong()` 方法调用将从此随机数生成器对象的序列中返回下一个伪随机、均匀分布的 long 值。


  void `.setSeed(long seed)` 方法调用可用于使用方法调用参数区域内指定的单个 long 值种子规范来设置（或重新设置）随机数生成器对象的种子。


  最后，`.nextInt(int bound)` 方法调用——我们将在本章的最后一节中使用它——将从此随机数生成器对象的随机 int 序列中返回一个介于 0（包含）和指定值（不包含，在我们的例子中是
  4）之间的伪随机、均匀分布的 int（整数）值。




