  让我们看看我是如何找到面顺序渲染问题的解决方案的。在向 JavaFX 9 开发论坛提交错误报告之前，我尝试使用 Google 搜索引擎和精准的关键词来寻找答案。


  ### 使用 Google 解决 JavaFX 异常：借助 StackOverflow


  要找到遇到类似问题的开发者，请使用 Google 搜索引擎，输入你在屏幕上看到的最常见或最可能的问题描述。在这种情况下，可以是“错误的形状重叠”或“Box 面顺序渲染问题”。有时你可能需要尝试几个不同的关键词字符串。在这种情况下，网上有一些正确答案，即开启一个名为深度缓冲的功能。这是一个计算密集型的算法，因此默认是关闭的。由于我们还看到一些锯齿边缘，我们可以开启另一个计算密集型算法，称为抗锯齿。这两个功能都可以在重载的
  `Scene()` 构造函数中访问，因此只需对我们 `Scene` 场景对象的实例化进行一处简单修改，即可解决这两个问题！以下是 StackOverflow 上关于此问题及其解决方案的两个示例回答：


  ```

  stackoverflow.com/questions/19589210/overlaping-shapes-wrong-overlapping-shapes-behaviour

  --或--

  stackoverflow.com/questions/28567195/javafx-8-3d-z-order-overlapping-shape-behaviour-is-wrong

  ```


  允许你开启深度缓冲和抗锯齿作为 3D 场景对象默认行为的 `Scene` 重载构造函数方法如下所示：


  ```

  Scene(Parent root, double width, double height, boolean depthBuffer, SceneAntialiasing
  constant)

  ```


  因此，我们需要在 `createBoardGameNodes()` 方法中使用的 `Scene()` 构造函数里添加 `depthBuffer=true` 和
  `SceneAntialiasing.BALANCED`。如图 15-12（红色矩形内）所示，我将其添加到了 `scene = new Scene(root,
  1280, 640);` 这个 Java 9 场景对象实例化语句的末尾。这将切换你的构造函数方法调用，以使用另一个不同的重载构造函数方法来创建你的 3D 场景。


