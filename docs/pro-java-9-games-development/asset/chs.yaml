  请注意，当移动摄像机对象时，它会保持直视前方，而在 3D 软件包中，存在一个“目标”摄像机，它会锁定在场景中心或场景中的 3D 对象上。在 JavaFX 中，摄像机对象是“固定”的，有一条从摄像机后方穿过前方发出的直线（称为射线或向量），沿摄像机指向的方向无限延伸。因此，在
  3D 软件中，如果你向上移动摄像机，其视野会向下旋转，并且摄像机与其拍摄对象之间存在一条链接（或连线）。


  如果你希望在 JavaFX 中实现这种行为，则必须手动旋转摄像机，因为 JavaFX 的 Camera 超类目前没有 `specifyTarget` 属性（目标功能）。随着本书内容的深入，我们将研究
  PerspectiveCamera 对象，以及如何在 3D 场景中以更高级的方式利用它，因为摄像机是 i3D 场景的一个重要方面，也是专业 Java 9 i3D
  游戏开发过程中的重要工具。


  在我们再次渲染 3D 场景之前，由于从代码中我们知道它现在将居中得足够好，以便我们查看诸如细分和面剔除等属性，并了解这些属性如何影响构成 3D 图元的多边形，让我们使用重载的（第二个）`Sphere(size,
  divisions)` 构造函数方法格式，并降低 Sphere 对象的网格分辨率，以优化保存该 3D 对象所需的内存量。你还需要将其向前旋转，以便能够看到球体结构的顶部，并将圆柱体的分辨率降低
  100%，从 24 个细分减少到 12 个细分。我始终使用能被 4 整除的细分值（90 度乘以 4 等于 360），并且如果启用了面剔除，则一半的细分甚至不会被渲染。所有这些都可以通过使用以下
  Java 语句来实现，这些语句在图 12-15 中（以及底部）突出显示：


  ![A336284_1_En_12_Fig15_HTML.jpg](img/A336284_1_En_12_Fig15_HTML.jpg)


  图 12-15. 使用 12 个细分构建球体，将其绕 X 轴旋转 90 度，并将圆柱体减少到 12 个细分


  ```

  sphere = new Sphere(100, 12);

  sphere.setRotationAxis(Rotate.X_AXIS);

  sphere.setRotate(90);

  sphere.setDrawMode(DrawMode.LINE);

  ```


  现在是时候使用“运行 ➤ 项目”工作流程并渲染我们的场景了。如图 12-16 所示，我们的 3D 图元更接近 3D 场景的中心，易于查看，并且使用的数据量大大减少。正如你在图
  12-13 中看到的，球体使用了 48 个细分来构建。这使用了数百个多边形，可以计算为 48 × 48 × 2 = 192；192 个多边形需要大量内存来处理（存储和渲染），因为每个多边形都有大量数据来定义它（模型中的位置、大小、方向、颜色、法线方向、平滑组）。


  ![A336284_1_En_12_Fig16_HTML.jpg](img/A336284_1_En_12_Fig16_HTML.jpg)


  图 12-16. 你的图元现在位于 3D 场景摄像机视图的中心，你可以看到球体的结构


  当我们在下一节关于面剔除的内容中渲染这些图元时，你会看到立方体和圆柱体的外观并没有真正改变，因此圆柱体细分减少 100%（从 24 到 12）是一次成功的优化。球体细分减少
  200%（从 48 到 12）则有点过于剧烈，球体边缘的平滑感会有所丧失，尤其是从顶部渲染时，这就是我将其绕 X 轴向前旋转 90 度的原因。


  接下来，让我们看看使用背面剔除进行渲染算法的优化，以及较低分辨率（更少的细分）如何在以实体模式渲染时影响 3D 图元的视觉质量。


  ### Shape3D 面剔除属性：优化渲染管线


  Shape3D 的 `cullFace` 属性和 `CullFace` 类用于控制 3D 场景的面和多边形渲染优化。默认值是 `CullFace.NONE`，因此你需要使用代码启用此优化，我将在本章的这一部分向你展示如何操作。我认为关闭面剔除后模型看起来更好（对比度更高），并且如果你将专业的
  Java 9 游戏优化得足够好，它应该能在所有平台和设备上流畅运行，而无需从模型上剔除一半的面。话虽如此，一旦你知道如何操作，在测试阶段进行实验应该很容易，以了解它如何影响视觉质量与游戏流畅度。


  让我们继续向 `createBoardGameNodes()` 方法添加代码，为图元对象设置背面剔除。首先，我们需要将图元的 `drawMode` 属性改回 `FILL`，以便进行实体建模，方法是在每个球体、盒子和杆对象上使用
  `.setDrawMode(DrawMode.FILL)`。紧接着在每个图元对象上调用此方法之后，在该对象上添加一个 `.setCullFace(CullFace.BACK)`
  方法调用。如果你在 NetBeans 9 中使用弹出式辅助工作流程，你会看到它使用默认的 `CullFace.NONE` 设置编写代码，因此你必须将其更改为 `CullFace.BACK`
  才能启用此渲染管线优化算法。


  背面剔除语句的 Java 代码在图 12-17 底部突出显示，应如下所示：


  ![A336284_1_En_12_Fig17_HTML.jpg](img/A336284_1_En_12_Fig17_HTML.jpg)


  图 12-17. 为场景中所有图元添加值为 `CullFace.BACK` 的 `.setCullFace()` 方法调用


  ```

  sphere.setDrawMode(DrawMode.FILL);

  sphere.setCullFace(CullFace.BACK);

  box.setDrawMode(DrawMode.FILL);

  box.setCullFace(CullFace.BACK);

  pole.setDrawMode(DrawMode.FILL);

  pole.setCullFace(CullFace.BACK);

  ```


  图 12-18 展示了“运行 ➤ 项目”Java 代码测试工作流程，显示了背面剔除算法已安装并在 3D 场景图元上运行。请注意，在球体上，降低的几何分辨率（更少的细分）会导致网格出现一些平滑问题，网格拓扑结构会透过平滑算法显现出来。我会将球体细分增加到
  24 以缓解此问题，这相对于默认设置仍然是 100% 的优化。


  ![A336284_1_En_12_Fig18_HTML.jpg](img/A336284_1_En_12_Fig18_HTML.jpg)


  图 12-18. 渲染器现在渲染的 3D 数据量减少了一半，并且可以在球体上看到较低的分辨率


  还要注意，当启用背面剔除时，立方体（Box）图元上的着色对比度（面之间的着色颜色差异）要低得多。随着你进行更多自定义纹理映射（将在下一章及后续章节中介绍），这将成为一个小问题（不那么明显），但这可能是
  `FaceCull` 类以及此方法调用的默认值为 `NONE` 的原因，因为面剔除优化可能会以某种方式影响当前算法代码中的对比度（质量）。我以这种方式安排本章内容，以便你能看到这一点，因为最基本的图元之一显示面之间的对比度明显降低，使用了默认的中灰色着色器颜色，正如你在比较图
  12-10 和图 12-18 时所看到的，对比度从高变为几乎为零。


  接下来，让我们看看三个与网格相关的类：`Mesh`、`TriangleMesh` 和 `MeshView`，了解它们的功能以及相互关系，因为它们将允许你渲染使用
  3D 软件创建的复杂网格对象。




  ## JavaFX 网格超类：构建 TriangleMesh


  理解抽象的 Mesh 超类及其与 TriangleMesh 子类的关系至关重要，后者可用于“手工编码”创建复杂的网格对象；同时，理解它与 MeshView 类的关系也很重要，MeshView
  实际上是 Shape3D 的子类，而非 Mesh 的子类！这样设计是为了让 MeshView 能够继承（扩展）Shape3D 的 cullFace、drawMode
  和 material 属性，这些属性对于使网格对象看起来逼真至关重要（尤其是 material 属性和 Material 类）。正如你将看到的，MeshView
  的构造函数接收一个 Mesh 对象。这是复杂 3D 对象所基于的核心类（算法），因此 Mesh 和 MeshView 是专业 Java 9 游戏开发中最关键的类。如果出于某种原因，你想要编写复杂的多边形几何体（也称为“三角形网格”），但这并非最佳工作流程，你可以使用
  TriangleMesh，我们将在后面详细讨论。


  更好的工作流程是使用外部 3D 软件包，将你的 3D 对象直接导入到 Mesh 对象中，然后由 MeshView 对象引用该 Mesh 对象。这是一种更快、更高效地让高级
  i3D 游戏快速启动并运行的方法，也是将专业工匠引入 i3D 游戏开发工作流程的一种方式。


  ### JavaFX Mesh 超类：你的原始 3D 模型数据容器


  公共抽象 Mesh 超类看似简单，只有一个 Mesh() 构造函数方法和一个 TriangleMesh 子类（用于使用 Java 代码加载网格数据），因此我们首先在这里介绍它。它本质上是一个用于包含
  3D 数据的对象，与其他以 3D 模型为中心的类一起位于 `javafx.scene.shape` 包中。Java 类层次结构如下所示，因为 Mesh 类是专门编写的一个
  Java 类，用于保存 3D 网格的表示：


  ```

  java.lang.Object

  > javafx.scene.shape.Mesh

  ```


  这是一个用于表示复杂 3D 几何表面的基类，这些表面并非 JavaFX Shape3D 图元。请注意，这显然是一个条件性功能，因为复杂的 3D 几何体需要具备
  3D 渲染管线，才能对你的专业 Java 9 游戏开发有用。需要轮询 `ConditionalFeature.SCENE3D`。


  如前所述，构造函数方法非常简单，如下面的 Java 代码所示：


  ```

  protected Mesh() // 受保护的代码不能直接使用（但子类可以使用）

  ```


  接下来，让我们看看 MeshView 类，它将引用、在内存中保存，并使用渲染引擎在 3D 场景中显示这个 Mesh 对象。这个类是 Mesh 引擎和 Shape3D
  之间的“桥梁”。


  ### JavaFX MeshView 类：格式化并呈现你的 3D 网格数据


  公共 MeshView 类几乎和 Mesh 类一样简单，只有两个重载的 MeshView() 构造函数方法，并且没有子类，因此我接下来在这里介绍它。它是 Shape3D
  的子类，并存储在 `javafx.scene.shape` 包中。它像三个图元类一样实现了 `Styleable` 和 `EventTarget` 接口。它用于使用
  Mesh 对象中保存的原始 3D 模型数据来定义 3D 表面。MeshView 类的 Java 类层次结构如下所示，因为 MeshView 类需要继承所有这些关键的
  Shape3D 渲染特性：


  ```

  java.lang.Object

  > javafx.scene.Node

  > javafx.scene.shape.Shape3D

  > javafx.scene.shape.MeshView

  ```


  MeshView 对象有一个 `ObjectProperty<Mesh>` 类型的 mesh 属性，该属性指定了 MeshView 的 3D 网格数据，它通过第二个重载构造函数方法的参数或使用
  `.getMesh(mesh)` 方法调用来获取。这个类（对象）还从 `javafx.scene.shape.Shape3D` 类继承了核心的 Shape3D
  属性，这些属性你已经了解过（除了 material），即 cullFace、drawMode 和 material。


  有两个重载的构造函数方法。一个创建一个空的 MeshView，以便将来加载 Mesh 对象（3D 数据），这当然会使用以下 Java 语句格式：


  ```

  meshView = new MeshView();

  ```


  第二个重载的构造函数方法调用同时实例化 MeshView 对象并加载一个 Mesh 对象（3D 几何数据），使用以下对象实例化 Java 语句格式：


  ```

  meshView = new MeshView(yourMeshNameHere);

  ```


  MeshView 类有三个用于处理 Mesh 对象的方法调用，包括：`getMesh(Mesh)` 方法调用，用于获取 mesh 属性的 Mesh 对象值；`ObjectProperty<Mesh>
  meshProperty()` 方法调用，用于为调用此方法的任何 MeshView 指定 3D 网格（Mesh 对象）数据；以及 `void setMesh(Mesh
  value)` 方法调用，用于为 MeshView 的 mesh 属性设置 Mesh 对象值。


  在我们介绍 TriangleMesh 类之前，让我们先看看 VertexFormat 类，它将通过为给定的 3D 模型（即 Mesh 对象及其 3D 模型数据）指定顶点数据格式来定义顶点数据。




  ### JavaFX VertexFormat 类：定义你的 3D 顶点数据格式


  公共 final 类 VertexNormal 同样继承自 Java Object 主类，这意味着该类是全新编写的，用于定义数据点数组、其纹理坐标及其法线的格式（如果外部
  3D 模型以 JavaFX 导入/导出软件支持的各种数据格式导出时提供了这些数据）。正如其 final 修饰符所示，该类是 Mesh、TriangleMesh
  和 MeshView 类的工具类，且无法被继承。与我们介绍过的其他六个类一样，它位于 javafx.graphics 模块的 javafx.scene.shape
  包中，其类层次结构如下：


  ```

  java.lang.Object

  > javafx.scene.shape.VertexFormat

  ```


  VertexFormat 类（对象）定义了两种不同的数据格式常量，用于反映 3D Mesh 对象中每个顶点所包含的 3D 数据类型。静态的 `VertexFormat
  POINT_NORMAL_TEXCOORD` 字段将为包含点坐标、法线和纹理坐标数据的顶点指定一种格式。静态的 `VertexFormat POINT_TEXCOORD`
  字段将为包含点坐标和纹理坐标数据的顶点指定一种格式。我建议使用支持法线的格式，因为用于定义 3D 模型的数据越多，渲染器就能越精确地渲染它们，从而获得更专业的效果。


  该类中有五个方法用于处理顶点及其法线、点和纹理坐标数据组件。`.getVertexIndexSize()` 方法将返回表示顶点索引的组件索引的整数数量。`.getNormalIndexOffset()`
  方法将返回给定顶点内法线组件的面数组的整数索引偏移量。`.getPointIndexOffset()` 方法将返回给定顶点内点组件的面数组中的整数索引偏移量。`.getTexCoordIndexOffset()`
  方法将返回顶点内纹理坐标组件的面数组中的索引偏移量。`String toString()` 方法将返回 VertexFormat 的字符串（文本）数据，使您能够以可读的格式查看顶点数据。


  接下来，让我们看看 TriangleMesh 对象，它是最复杂的；它允许您使用 Java 代码创建 3D 模型。在本章中，我们不会查看这方面的示例，因为这不是快速获得专业
  i3D 游戏开发 3D 模型创建结果的最有效方式。


  这是因为使用专业的 3D 建模、纹理、渲染和动画软件包（例如开源的 Blender.org、Autodesk 3D Studio Max、Maya 或 NewTek
  Lightwave）是创建专业 3D 模型最合理的工作流程。


  由于存在大量的 3D 数据导入文件格式，可以更快地创建 3D 模型，然后专业的 Java 9 游戏开发者可以使用 JavaFX 9 的导入器格式之一，将高质量
  3D 数据作为 Mesh 对象导入到 JavaFX 中。


  我们将在第 14 章中讨论此工作流程，在此之前，我们将在第 13 章中了解纹理映射，以便我们更深入地理解纹理映射是什么，因为它也用于第三方 3D 建模软件包。使用诸如
  Fusion、Blender、Audacity、Gimp 和 Inkscape 等第三方开发工具通常能获得更好的结果。


  ### JavaFX TriangleMesh 类：创建 3D 多边形网格对象


  公共类 TriangleMesh 是 Mesh 超类的子类，不实现任何接口，因为它用于创建旨在存储在 Mesh 对象内部的 3D 数据，非常类似于使用多种流行的
  3D 文件格式导入器导入到 JavaFX 中的 3D 模型，我们将在第 14 章中介绍这些导入器。TriangleMesh 存储在 javafx.graphics
  模块的 javafx.scene.shape 包中，其 Java 类层次结构如下：


  ```

  java.lang.Object

  > javafx.scene.shape.Mesh

  > javafx.scene.shape.TriangleMesh

  ```


  TriangleMesh 对象用于定义 3D 多边形网格。该对象将使用两个 VertexFormat 常量之一，并包含一组包含顶点组件的独立数据数组对象，包括点、法线、纹理坐标，以及一个定义网格各个三角形的面数组。正如我在本章中多次提到的，这种低级别的复杂性可以通过使用支持建模的外部
  3D 软件包（如 Blender、Hexagon、Lightwave、Maya 或 3D Studio Max）来完全避免并加速处理。


  请注意，JavaFX 术语“点”等同于 3D 软件术语“顶点”。JavaFX 9 使用“顶点”来指代顶点（点）及其所有相关属性，包括其法线位置和关联的 UV 纹理贴图坐标。因此，我们将在本章后面部分介绍的
  TriangleMesh 方法名称和方法描述中提到的“点”，实际上指的是 3D 空间中的 3D 点 (x, y, z) 位置数据，代表单个顶点的空间定位。


  类似地，术语“点集”（或点的集合）用于表示代表多个顶点的 3D 点集。术语“法线”用于表示 3D 空间中的一个 3D 向量 (nx, ny, nz)，它代表单个顶点的方向，告诉渲染引擎面朝向哪一侧，以便在面的正确一侧渲染纹理。术语“法线集”（或法线数据的集合）用于表示多个顶点的
  3D 向量集。


  术语“纹理坐标”用于表示单个顶点的一对 2D 纹理坐标 (u, v)，而术语“纹理坐标集”（纹理坐标的集合）用于表示跨多个顶点的纹理坐标集。


  最后，术语“面”用于表示一组三个交错排列的点、法线（这些是可选的，取决于指定的关联 VertexFormat 字段类型）和纹理坐标，它们共同代表单个三角形的几何拓扑。术语“面集”（面的集合）用于表示一组三角形（每个三角形用一个面表示），这通常就是
  3D 多边形模型的构成。现在是不是有点困惑了？正如我所说，使用导入/导出工作流程，让先进的 3D 建模软件用户界面完成所有工作，是获得惊人效果的更好方法，而不是试图使用
  Java 将点、法线和 UV 坐标放置到 3D 空间中。我在本书中试图做的是向您展示创建混合 2D 和 3D 游戏的最快、最简单且最优化方法，以便您能够创建市场上任何游戏玩家都未曾体验过的专业
  Java 9 游戏。


  这个 TriangleMesh 类（对象）有一个 `ObjectProperty<VertexFormat> vertexFormat` 属性，该属性将用于使用
  VertexFormat 工具类指定此 TriangleMesh 的顶点格式，因此这将是 `VertexFormat.POINT_TEXCOORD` 或 `VertexFormat.POINT_NORMAL_TEXCOORD`
  之一。


  TriangleMesh 类有两个重载的构造方法。第一个（空）构造方法使用默认的 `VertexFormat.POINT_TEXCOORD` 格式类型创建 TriangleMesh
  类的实例，如下所示：




  ```

  triangleMesh = new TriangleMesh(); // 仅创建点与纹理映射的多边形网格对象

  ```


  第二种构造方法使用在方法调用参数区域中指定的 `VertexFormat` 创建 `TriangleMesh` 的新实例。其 Java 实例化语句如下所示：


  ```

  normalTriangleMesh = new TriangleMesh(VertexFormat.POINT_NORMAL_TEXCOORD) // 包含法线

  ```


  有十几种方法可用于处理 `TriangleMesh` 对象的构建；接下来我们逐一了解。


  `.getFaceElementSize()` 方法将返回表示给定面的元素数量。使用此方法可确定任意给定面使用了哪些数据（点、法线、纹理映射）。


  `ObservableFaceArray getFaces()` 方法将获取 `TriangleMesh` 对象中的整个面数组，包括指向点、法线（仅当为网格指定了
  `VertexFormat.POINT_NORMAL_TEXCOORD` 时）和纹理坐标数组的索引。使用此方法可从 `TriangleMesh` 对象中提取多边形数据。


  `ObservableIntegerArray getFaceSmoothingGroups()` 方法将从 `TriangleMesh` 对象中获取 `faceSmoothingGroups`
  数据数组。平滑组定义了渲染后的 3D 对象表面着色（平滑）中接缝出现的位置。我们在本书第 3 章中已讨论过此主题。


  `.getNormalElementSize()` 方法将返回表示 `TriangleMesh` 对象中法线的元素数量。这告诉您有多少条法线用于表示表面方向。


  `ObservableFloatArray getNormals()` 方法将获取 `TriangleMesh` 对象的法线数组。


  `.getPointElementSize()` 方法将返回表示 `TriangleMesh` 对象中 XYZ 点的元素数量。这将告诉您 `TriangleMesh`
  中 3D 模型的顶点数量（顶点计数）。


  `ObservableFloatArray getPoints()` 方法用于获取 `TriangleMesh` 的点数据数组。


  `.getTexCoordElementSize()` 方法将返回表示 `TextureMesh` 对象中纹理坐标的数据元素数量。使用此方法可确定模型中的 UV
  映射坐标数量。


  `ObservableFloatArray getTexCoords()` 方法将获取 `TriangleMesh` 对象的纹理坐标数组。使用此方法可从 `TextureMesh`
  3D 多边形对象中提取纹理坐标数据（仅限）。


  `VertexFormat getVertexFormat()` 方法将从 `TriangleMesh` 对象内部获取 `vertexFormat` 属性的值。使用此方法可确定此
  3D 模型数据是否支持法线。


  `void .setVertexFormat(VertexFormat value)` 方法用于设置 `TriangleMesh` 对象的 `vertexFormat`
  属性值。请确保对象内部的数据数组与此设置正确匹配。


  `ObjectProperty<VertexFormat> vertexFormatProperty()` 方法可用于指定 `TriangleMesh` 的顶点格式；它可以是
  `VertexFormat.POINT_TEXCOORD` 或 `VertexFormat.POINT_NORMAL_TEXCOORD`。


  在下一章我们进一步了解着色器、纹理和映射之后，我们将进入 3D 软件领域，学习如何将强大的 3D 软件桥接到 JavaFX 9 游戏引擎的导入工作流程。


  ## 总结


