  Java 9 代码在 `Animation`（`Transition` 子类）对象被构造和配置后立即启动了播放生命周期。因此，一旦“开始游戏”2D UI 按钮出现，请立即单击它！


  稍后，当我们学习如何捕获 3D 对象（例如您的旋转器 UI 元素）上的鼠标点击（或屏幕触摸）时，我们将通过点击旋转器 UI 元素来触发 `rotGameBoard.play()`，以随机旋转游戏板来选择一个新象限。当轮到下一位玩家准备好时，我们将触发
  `rotSpinner.play()`，以便他们可以旋转游戏板。我们将在本书的剩余部分中开发此动画代码的复杂性。


  在本章稍后的部分，我们将使用 `TranslateTransition` 与 `RotateTransition` 结合，通过 `ParallelTransition`
  来实现，这将允许我们让 3D 旋转器 UI 元素移入和移出视图，以便玩家知道何时使用它来随机旋转游戏板，以选择一个新的象限（一个新的内容主题：动物-植物-矿物或地标类别），用于游戏循环中。




  接下来，让我们添加 rotSpinner 旋转过渡对象。首先，在类顶部 rotGameBoard 对象名称后面添加 rotSpinner 对象名称，将 RotateTransition
