  ### 资源加载方法：loadImageAssets() 和 createTextAssets()


  为了在本书中创建这个游戏时保持条理清晰，我们接下来要做的另一件事是创建另外两个专用方法，用于加载 `Image` 对象资源和创建 `Text` 对象资源。这为向游戏添加元素创建了一个专用的“基于方法的工作流程”。在
  `.createBoardGameNodes()` 中实例化，在 `.addNodesToSceneGraph()` 中添加到场景图，在 `.loadImageAssets()`
  中引用 `Image` 对象，在 `.createTextAssets()` 中创建 `Text` 对象。如图 9-4 所示，我将这两个新方法调用放在了 `.start()`
  方法的顶部，并且让 NetBeans 为它们创建了空方法，我们将在向游戏添加资源时，为这些方法添加 Java 代码。我将它们放在 `start` 方法的顶部，以便你的应用程序能够首先将这些资源加载到系统内存中，这样当你的专业
  Java 游戏代码的其他部分需要它们时，它们就已经就位，并且我们无需使用任何专门的预加载器。此外，这些对象必须在被其他方法调用之前就位，因此它们需要在设置更高级对象并将其添加到场景图层次结构的方法之前被调用。稍后，一旦我们有了需要确保高度优化且不占用
  Pulse 引擎 60 FPS 中断（时间片）过多处理场景图的 3D 对象渲染和游戏处理逻辑等内容，我们就可以使用 NetBeans 9 分析器来确保此资源加载耗时少于一秒。


