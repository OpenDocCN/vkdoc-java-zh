  在专业 Java 9 游戏开发中，另一个常用且有用的特效是调整像素颜色值。`javafx.scene.effect` 包中有一个强大的 `ColorAdjust`
  特效类，它允许开发者调整图像的数码影像属性，包括使用 `.setContrast()` 调整对比度、使用 `.setBrightness()` 调整亮度、使用
  `.setSaturation()` 调整饱和度，以及使用 `.setHue()` 调整色调（颜色）。接下来我们来了解这个。


  ### 颜色调整：调整色调、饱和度、对比度和亮度


  让我们使用 `ColorAdjust` 对象的 `.setHue()` 方法调用来“色移”我们的 PNG32 透明徽标数字图像资源的色温，使其在视觉上与本章中我们正在优化的每个按钮控件用户界面设计的所有其他屏幕设计元素颜色值相匹配。在类顶部声明一个名为
  `colorAdjust` 的 `ColorAdjust` 对象。在你的 `createSpecialEffects()` 方法内部，使用 `ColorAdjust()`
  构造方法实例化该对象，然后使用该对象调用 `.setHue()` 方法，传入浮点值 0.4，将当前图像颜色值沿色轮向前移动 40%。Java 代码如图 10-12
  的中部和底部高亮所示，应如下所示：


  ![A336284_1_En_10_Fig12_HTML.jpg](img/A336284_1_En_10_Fig12_HTML.jpg)


  图 10-12.


  添加一个 `colorAdjust` 对象实例化，并使用该对象的 `.setHue(0.4)` 方法调用来配置它


  ```

  DropShadow dropShadow;

  ColorAdjust colorAdjust;

  ...

  private void createSpecialEffects()  {

  dropShadow = new DropShadow();

  dropShadow.setRadius(4.0);

  dropShadow.setOffsetX(3.0);

  dropShadow.setOffsetY(3.0);

  dropShadow.setColor(Color.DARKGRAY);

  colorAdjust = new ColorAdjust();

  colorAdjust.setHue(0.4);        }

  ```


