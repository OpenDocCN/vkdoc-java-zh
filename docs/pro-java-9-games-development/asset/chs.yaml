  ## JavaFX 概述：从场景图到操作系统


  正如我在介绍新媒体的第 2 章和第 3 章中所做的那样，我想从 JavaFX 的最高层级——场景图开始讲起。这一层级紧接在图 2-1 和图 3-7 最顶层所示的新媒体资源类型之下。JavaFX
  API 的场景图 Java 代码也可以通过使用 Gluon 拖放式 JavaFX 场景构建器来构建，该构建器可以集成到 NetBeans 9 中（如你在第 6
  章所学），也可以独立使用。我们将研究如何“手写代码”来构建所有这些场景结构，因为这是一本《Pro Java 9 游戏开发》书籍。


  如图 7-1 所示，JavaFX 场景图架构位于 JavaFX API 之上，后者是一组 JavaFX 包（如`javafx.scene`或`javafx.application`）的集合，它最终使你能够构建场景图并设计你的
  JavaFX 新媒体创作。在本例中，它将是一款专业的 Java 游戏。请注意，JavaFX API 不仅与上方的场景图架构相连（图中用钢制轴承表示桥梁），还与下方的
  Java API 及其 JavaFX Quantum 工具包相连。如你所见，Java JDK（及 API）将 JavaFX 新媒体引擎连接到 NetBeans
  9 和 JVM。JVM 允许 Java 将你的专业 Java 游戏分发到 Java 当前支持的各种平台，以及未来的（原生支持）平台，如 Android 8 和
  iOS。


  ![A336284_1_En_7_Fig1_HTML.jpg](img/A336284_1_En_7_Fig1_HTML.jpg)


  图 7-1.


  JavaFX 组件架构：从顶层的场景图向下贯穿 Java、NetBeans、JVM 和操作系统


  与 JavaFX API 相连的 Quantum 工具包将接下来我要讨论的所有强大的新媒体相关引擎整合在一起。Quantum 工具包负责管理所有这些引擎的线程，这样，位于
  JavaFX 主线程上的游戏代码，以及位于各自线程上的游戏新媒体资源（音频、视频、3D 矢量、2D 矢量）（A/V 使用专用线程，WebKit、窗口系统或 3D
  渲染也是如此），就可以通过双核、四核、六核和八核 CPU 上的独立线程（或进程）来使用独立的处理器。这些多核 CPU 在当今的计算机和嵌入式消费电子设备中已十分常见。我在图
  7-1 的第四层中展示了那些重要到需要拥有自己线程的新媒体引擎。


  Glass 窗口工具包负责 JavaFX 的窗口管理。它负责控制显示器上的任何离散区域，例如你的舞台或弹出窗口（如对话框）。Glass 还管理事件处理队列，并将事件传递给
  JavaFX 进行处理，同时它还设置定时器——你将在本书后面学习游戏玩法以及脉冲毫秒如何控制游戏计时时了解到这些内容。


  如图 7-1 中部所示，还有一个 WebKit 引擎和一个媒体播放器引擎。这些也由 Quantum 工具包管理。WebKit 引擎可以渲染 HTML5、CSS3/4
  和 JavaScript 内容。这意味着你可以创建在 JavaFX 游戏内部无缝运行的 Web 内容。媒体播放器引擎负责处理数字音频和数字视频资源的播放、UI
  控件以及导航。


  Quantum 工具包下最重要的新媒体引擎是 PRISM 引擎，我喜欢称其为“棱镜游戏引擎”，因为它使用 Java2D 渲染 2D 内容，并使用 OpenGL（Macintosh、Linux
  或嵌入式操作系统）或 DirectX（如果用户使用 Windows 7、8 或 10 平台）渲染 3D 内容。我在部分生产工作站上使用 Windows 7.2
  和 10。Windows XP 和 Vista 的支持已停止，因为大多数计算机和消费电子设备现在都具备 64 位能力（Windows XP 是 32 位，仅能寻址
  3.24 GB 内存）。


  PRISM 的作用是“桥接”主流操作系统平台以及消费电子嵌入式设备上的强大游戏引擎（DirectX 和 OpenGL），以便 JavaFX 可以将复杂的渲染任务处理“卸载”到
  nVidia（GeForce）、AMD（Radeon）、ARM、Qualcomm 或 Intel 的 GPU 硬件上。这使得 JavaFX/Java 游戏运行更快，并允许游戏在将游戏资源渲染到屏幕时占用更少的
  CPU 处理能力。这反过来又允许更多的 CPU 处理能力用于游戏逻辑，例如 AI 或碰撞检测。在掌握 JavaFX 引擎特性及其场景图层次结构和架构之后（在本书接下来的两章——本章
  JavaFX 入门和第 8 章场景图设计中），我们将进入这些游戏设计领域。


  需要注意的是，游戏开发者无需了解 Quantum（线程）、Glass（窗口）或 Prism（渲染）引擎的内部工作原理，就能利用它们强大的新媒体特性。在本书中，你将重点关注顶层的场景图架构，以及此图中的
  JavaFX 和 Java API 层级。你还会涉及 NetBeans 9 IDE 层级，我们刚刚在第 6 章中处理了这部分内容，但在本书的剩余部分，我们还将进一步详细探索其特性。


  至于图 7-1 中较低层级，NetBeans 9.0 将为每个操作系统平台生成一个 Java 字节码文件，该文件由自定义 JVM 或 Java 9 虚拟机读取。这个
  JVM（如图 7-1 底部所示）可以通过下载 Java 9 Java 运行时引擎（JRE）为任何给定的操作系统平台安装，你在第 1 章中安装 Java 9 JDK
  时已经接触过它。


  这个 JVM 层允许你的游戏作为应用程序安装到所有主流操作系统平台以及嵌入式设备上，这些设备也将转向支持 JavaFX。你还应该将你的专业 Java 游戏生成为一个可以嵌入到网站中的
  Java“小程序”，甚至还有一种部署模型，可以将应用程序从网站拖放到桌面上，然后将其安装为一个完整的 Java 游戏应用程序。


  目前已经有一种工作流程可以在 iOS 8 和 Android 8 上运行 JavaFX 应用程序，尽管支持还不是“原生”的，因此 JavaFX 应用程序还不能直接在这些操作系统内部运行。如果你对此感兴趣，只需在
  Google 上搜索“JavaFX on Android”或“JavaFX on iOS”，可以确信到 2018 年，Android OS、iOS、BlackBerry
  和 Tizen OS 设备将能够“原生”运行 JavaFX 应用程序。这将使你能够借助 Java 和 JavaFX 这对动态组合实现“一次编写，到处运行”！我所说的原生是指，未来你将能够使用
  JetBrains IntelliJ 2017 Android Studio 直接将 Java（及 JavaFX 引擎）应用程序导出到 Android 8，或导出到
  iOS 或 Tizen OS，甚至可能直接使用 NetBeans 9 导出到 Android 8。这将补充 NetBeans 9 当前支持的 Windows、Mac、Open
  Solaris 和 Linux 发行版。


