  ## 完成游戏玩法：添加答案和分数


  为 60 个不同的棋盘格选项添加 4 个答案涉及 240 个不同的内容选项（以及代码行），而为这 60 个不同的棋盘格选项添加计分则涉及另外 480 行代码，如果包含
  lambda 表达式容器，可能还会更多。之所以说这是一项工作量很大但应该相当容易且无差错完成的任务，是因为我们创建了一种可以复制粘贴的代码设计，并且可以创建、插入和跟踪文本值，从而确保游戏内容在运行时能正常工作。也就是说，不要期望为您的专业
  Java 9 游戏开发流程创建内容会比创建 Java 9 代码更容易，因为游戏设计和游戏开发涉及大量新媒体、内容、策略和编码工作，才能最终获得专业的结果。


