  ## 摄像机拉远：另一个并行过渡


  首先，通过复制粘贴我们之前创建的 `rotCameraDown` 旋转过渡动画对象代码，在其下方创建一个完全相反的对象，因为我们即将创建 `cameraAnimOut`
  对象。除了将对象名称从 `rotCameraDown` 改为 `rotCameraBack`，并交换 `.setFromAngle()` 和 `.setToAngle()`
  方法调用中的值（-30 和 -60）之外，其他所有内容都相同。完成此任务的 Java 9 代码如下所示，并在图 23-25 中用黄色和蓝色高亮显示：


