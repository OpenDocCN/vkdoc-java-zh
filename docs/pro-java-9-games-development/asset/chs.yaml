  JavaFX 9 API 库将被包含（并启动）在 Java 应用程序项目的类和方法中，正如你很快将在代码中通过一系列 `import` 语句看到的那样。你将在第
  7 章中了解所有这些 Java 9 和 JavaFX 9 代码的作用，该章将涵盖 JavaFX 9 及其众多的用户界面设计和多媒体相关功能。


