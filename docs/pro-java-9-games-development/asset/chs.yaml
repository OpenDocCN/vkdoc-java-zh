  JavaFX 场景图层次结构中，并重新组织它以更好地适应你的游戏。




  ### JavaFX Pos 类：使用常量进行通用定位


  Pos 类是一个 `Enum<Pos>` 类，即枚举类的简写。它包含一系列常量，这些常量在代码中会被转换为整数值。常量值使程序员更容易在代码中使用这些值。在本例中，这些常量是诸如
  `TOP`、`CENTER` 或 `BASELINE` 等定位前缀。


  Pos 类的 Java 类继承层次结构始于 `java.lang.Object` 主类，经过 `java.lang.Enum<Pos>` 类，最终到达 `javafx.geometry.Pos`
  类。你在图 8-10 代码的第 56 行引用了 Pos。Pos 位于 `javafx.geometry` 包中，并使用以下子类层次结构：


  ```

  java.lang.Object

  > java.lang.Enum

  > javafx.geometry.Pos

  ```


  正如你将在下一节中看到的，你将需要使用 `Insets` 类和对象来获得所需的像素级精确定位。由于这是一个枚举类，本节需要学习的内容不多，主要是了解 Pos 类为你提供的常量，以便在你的
  Java 游戏中进行通用和相对定位。


  因此，Pos 类非常适合使用顶部、底部、左侧和右侧以及基线（主要用于相对于字体的定位）进行通用定位。每个方向也都有一个用于居中的 `CENTER` 选项。因此，通过使用这个辅助类提供的十几个常量，你可以实现所需的任何通用定位。


  关于通用定位的一个例子，可以参考你的网站设计经验，你可以设计一个网页，使其能够缩放以适应不同的窗口大小和形状。这与像素级精确定位截然不同，后者是在固定屏幕尺寸和形状的
  (0,0) 位置开始，并将元素精确地放置在你想要的位置！


  游戏设计通常使用像素级精确定位，但在本章中，我将向你展示如何将一组 UI 按钮定位在通用位置（例如用户屏幕的右上角或左下角），以便你尽可能多地接触 JavaFX
  API 工具类（本类位于 `javafx.geometry` 包中）。


  你将使用 `TOP_RIGHT` 常量，如图 8-10 第 56 行所示，将你的按钮控件组定位在 BoardGame 用户界面设计的右上角，避开主要的中央 3D
  视图区域。


  Pos 类提供了一组常量，我将在表 8-1 中总结，用于提供“通用”的水平和垂直定位与对齐。


  表 8-1. 可用于 JavaFX 定位和对齐的 Pos 类枚举常量


  | Pos 类常量 | 通用定位结果 |

  | --- | --- |

  | BASELINE_CENTER | 垂直方向在基线上定位对象，水平方向在中心定位 |

  | BASELINE_LEFT | 垂直方向在基线上定位对象，水平方向在左侧定位 |

  | BASELINE_RIGHT | 垂直方向在基线上定位对象，水平方向在右侧定位 |

  | BOTTOM_CENTER | 垂直方向在底部定位对象，水平方向在中心定位 |

  | BOTTOM_LEFT | 垂直方向在底部定位对象，水平方向在左侧定位 |

  | BOTTOM_RIGHT | 垂直方向在底部定位对象，水平方向在右侧定位 |

  | CENTER | 垂直方向在中心定位对象，水平方向在中心定位 |

  | CENTER_LEFT | 垂直方向在中心定位对象，水平方向在左侧定位 |

  | CENTER_RIGHT | 垂直方向在中心定位对象，水平方向在右侧定位 |

  | TOP_CENTER | 垂直方向在顶部定位对象，水平方向在中心定位 |

  | TOP_LEFT | 垂直方向在顶部定位对象，水平方向在左侧定位 |

  | TOP_RIGHT | 垂直方向在顶部定位对象，水平方向在右侧定位 |


  Pos 类提供通用定位；它可以与 `Insets` 类结合使用，以实现更像素级的精确定位。接下来，让我们看看 `Insets` 类，它也位于 `javafx.geometry`
  包中。


  ### JavaFX Insets 类：为你的 UI 提供内边距值


  Insets 类是一个公共类，它直接扩展了 `java.lang.Object` 主类，这意味着 Insets 类是“从头编码”的，用于在矩形区域内提供内边距或偏移量。想象一个相框，你在外框和内框之间留出一个“衬边”或装饰性边框。这就是
  Insets 类通过两个构造方法所做的事情：一个提供相等或均匀的内边距，另一个提供不相等或不均匀的内边距。


  我们将使用提供不均匀内边距值的构造方法，如果用来装裱照片，那会显得非常不专业！Insets 类的 Java 类层次结构始于 `java.lang.Object`
  主类，并使用此类创建 `javafx.geometry.Insets` 类。正如你将在本章后面图 8-11 的代码第 58 行中看到的，Insets 类被设置为在两侧提供零像素，在另外两侧提供十像素。这会将按钮组从用户显示屏的角落推开。JavaFX
  Insets 类包含在 `javafx.scene.geometry` 包中，就像 Pos 类一样，并使用以下 Java 9 类层次结构：


  ```

  java.lang.Object

  > javafx.scene.geometry.Insets

  ```


  Insets 类提供了一组四个 double 类型的偏移值，分别指定矩形的顶部、右侧、底部和左侧，并且应按照该顺序在构造方法中指定，正如你在编写代码时看到的那样。你将使用这个
  Insets 类（对象）来“微调”你的按钮控件组的位置，你将使用 VBox 布局容器（你将在下一节中学习）来创建该按钮组。可以将这些 Insets 对象视为在另一个框内绘制一个框的方法，它显示了希望矩形内部对象在其边缘周围“遵守”的间距。这通常被称为内边距，尤其是在
  Android Studio 和 HTML5 编程中。


  用于创建 Insets 对象的最简单的 `Insets()` 构造方法将使用以下格式：


  ```

  Insets(double topRightBottomLeft)

  ```


  此构造方法对所有边距（topRightBottomLeft）使用单个值，而一个重载的构造方法允许你分别指定这些值，如下所示：


  ```

  Insets(double top, double right, double bottom, double left)

  ```


  这些值需要按此顺序指定。记住这一点的一个好方法是想象一个模拟时钟。时钟的顶部是 12，右侧是 3，底部是 6，左侧是 9。所以，只需记住从正午（12 点）开始顺时针指定（献给西部电影爱好者），你就有了一个很好的方法来记住在使用“不均匀值”构造方法时如何指定
  Insets 值。


  你正在使用 Insets 类来定位你的按钮控件组，该组最初会“卡在”BoardGame 用户界面设计的左下角。Insets 对象将允许你使用这四个 Insets
  参数中的两个，将按钮控件从屏幕右侧和 VBox 顶部推开。




  ### JavaFX VBox 类：使用布局容器进行设计


  由于 Button 对象不易定位，我将把五个 Button 对象放入 `javafx.scene.layout` 包中一个名为 VBox（垂直框）的布局容器中。这个公共类将元素排列成一列，既然你希望按钮对齐在
  BoardGame 的一侧，它将成为你用于五个 Button 控制节点的父节点，这些节点将成为此 VBox 分支节点的子叶节点。这将创建一个 UI 按钮控件“组”，可以作为一个整体单元在
  UI 和启动画面设计中移动定位。


  VBox 类是一个公共类，它直接继承自 `javafx.scene.layout.Pane` 超类，而 Pane 又继承自 `javafx.scene.layout.Region`
  超类，Region 继承自 `javafx.scene.Parent` 超类，Parent 继承自 `javafx.scene.Node` 超类，Node 则继承自
  `java.lang.Object` 主类。如图 8-10 第 55 行所示，你将使用 VBox 作为按钮控件定位的用户界面布局容器。与 StackPane 类一样，VBox
  类也包含在 `javafx.scene.layout` 包中，并使用以下 Java 类层次结构：


  ```

  java.lang.Object

  > javafx.scene.Node

  > javafx.scene.Parent

  > javafx.scene.layout.Region

  > javafx.scene.layout.Pane

  > javafx.scene.layout.VBox

  ```


  如果 VBox 指定了边框或内边距值，VBox 布局容器内的内容将“遵循”该边框和内边距规范。内边距值使用 Insets 类指定，我们之前介绍过该类，你将在此精细调整的用户界面控件按钮组应用中使用它。


  你将使用 VBox 类（对象），以及 Pos 类常量和 Insets 类（对象），来将你的 UI Button 对象分组，并在后续微调它们的位置，形成你的按钮控件组。因此，这个
  VBox 布局容器将成为 UI 按钮控件（或叶节点）的父节点（以及分支节点）。


  可以将 VBox 对象视为一种使用列垂直排列子对象的方式。这可以是你的图像资源，彼此上下排列，使用基本的 VBox 构造函数（间距为零像素）；也可以是 UI 控件，例如按钮彼此上下排列，并使用其中一个重载构造函数来设置间距。


  创建 VBox 对象最简单的构造函数使用以下空构造函数方法调用：


  ```

  VBox()

  ```


  你将用于创建 VBox 对象的重载构造函数将包含一个间距值，用于在 VBox 内的子 Button 对象之间留出一些空间。它使用以下构造函数方法调用格式：


  ```

  VBox(double spacing)

  ```


  还有另外两种重载构造函数方法调用格式。它们允许你在构造函数方法调用本身中指定子 Node 对象（在我们的例子中，是 Button 对象），如下所示：


  ```

  VBox(double spacing, Nodes... children)

  ```


  此构造函数将在 Node 对象数组之间指定零像素的间距值：


  ```

  VBox(Nodes... children)

  ```


  我们将在代码中使用“简写形式”和 `.getChildren().addAll()` 方法链来演示如何操作，但我们也可以使用以下构造函数来声明 VBox 及其
  Button Node 对象：


  ```

  VBox uiContainer = new VBox(10, gameButton, helpButton, scoreButton, legalButton,
  creditButton);

  ```


  如果子对象被设置为可调整大小，你的 VBox 布局容器将根据不同的屏幕尺寸、宽高比和物理分辨率来控制子元素的缩放。如果 VBox 区域能够容纳子对象的首选宽度，它们将被设置为该值。有一个布尔类型的
  `fillWidth` 属性，其默认值为 `true`。这指定了子对象是否应填充（缩放至）VBox 的宽度值。


  VBox 的对齐方式由 `alignment` 属性控制，其默认值为 Pos 类中的 `TOP_LEFT` 常量（`Pos.TOP_LEFT`）。如果 VBox
  的 `fillWidth` 属性为 `false`，并且 VBox 的尺寸大于其指定宽度，则子对象将使用其首选宽度值，多余的空间将不会被利用。`fillWidth`
  的默认设置为 `true`，子对象的宽度将被调整以适配 VBox 的宽度。需要注意的是，VBox UI 布局引擎将布局所有受管理的子元素，无论其 `visibility`
  属性（也称为属性、特征或对象变量）设置如何。


  你还会注意到，本章中添加的类本质上具有透明或空的背景（我称之为背板），因此我们无需像第 7 章那样做额外的工作来保持 Alpha 通道。


  现在，我们已经用了好几页的篇幅讨论了 `javafx.scene.layout` 和 `javafx.geometry` 包中的一些类，这些类用于创建你的 UI（按钮对象组）设计。接下来，让我们仔细看看
  `javafx.scene` 包中与 SceneGraph 分组相关的类。这些类将使我们能够实现高级的 SceneGraph 层次结构，你需要将其放置在 VBox
  UI 布局容器对象（位于 StackPane UI 层合成对象内部）所包含的五个 JavaFX Button 控件 UI 元素（对象）旁边。这个 Group（Node）容器对象将在本书后续介绍
  3D 和 i3D 时，容纳你的 i3D 游戏对象层次结构。





  ### JavaFX Group 类：高级场景图节点分组


  Group 类是一个公共类，直接继承自 `javafx.scene.Parent` 超类，而 `Parent` 继承自 `javafx.scene.Node`
  类，`Node` 类又继承自 `java.lang.Object` 主类。因此，Group 对象是 JavaFX 场景图中一种 Parent（分支）节点对象，用于对其他分支节点和叶节点对象进行分组。Group
  类使用以下 Java 类继承层级结构：


  ```

  java.lang.Object

  > javafx.scene.Node

  > javafx.scene.Parent

  > javafx.scene.Group

  ```


  Group 父节点对象包含一个子 Node 对象的 `ObservableList`，每当渲染此 Group 父节点对象时，这些子节点将按预定顺序渲染。Group
  节点对象将采用其子节点的整体（汇总）边界；但是，它本身不可直接调整大小。应用于 Group 的任何变换、效果或状态都将应用于（传递至）该 Group 节点的所有子节点，但不会应用于
  Group 本身。


  这意味着这些应用的变换和效果将不会包含在 Group 父节点的布局边界内；但是，如果变换和效果是直接设置在此 Group 内部的子 Node 对象上，那么这些变换和效果将包含在此
  Group 的布局边界内。因此，要影响 Group 父节点的布局边界，你需要从内向外操作，即通过变换 Group 的 `ObservableList` 中的成员来实现，而不是通过变换
  Group 对象本身。


  默认情况下，Group 父节点会在布局传递期间自动将其设置为可调整大小的受管子对象缩放至其首选大小。这确保了 Region 或 Control 子对象在其状态变化时能够正确缩放。如果应用程序需要禁用此自动调整大小行为，则应将
  `autoSizeChildren` 设置为 `false`。需要注意的是，如果任何子对象的首选大小属性发生更改，它们将不会自动调整大小，因为 `autoSizeChildren`
  已被设置为 `false`。此 `Group()` 构造函数将创建一个空组。


  ```

  Group()

  ```


  重载的 `Group(Collection<Node>)` 构造函数方法将构造一个 Group，该 Group 包含一个 Java `Collection<Node>`，其中包含给定的
  Node 对象子节点的 Java 集合，使用以下构造函数方法：


  ```

  Group(Collection children)

  ```


  第二个重载的 `Group(Node…)` 构造函数方法将构造一个 Group，该 Group 包含一个子 Node 对象的 Java List，在构造函数方法参数区域内以逗号分隔列表的形式构建。这可以通过使用以下构造函数方法格式来实现：


  ```

  Group(Node... children)

  ```


  现在你已经了解了本章中使用的各种类的概况，让我们回到为 JavaFXGame 类组织代码的工作上，使其符合我们正在处理的游戏 SceneGraph 的要求。


