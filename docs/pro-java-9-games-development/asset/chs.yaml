  ## 总结


  在第八章中，我们通过优化游戏的实际顶层用户界面设计，以及勾勒底层游戏引擎组件设计，并找出使用不到十几个节点来实现大部分顶层游戏用户界面结构的最有效场景图节点设计，让你深入接触了
  JavaFXGame.java 代码。你通过重新设计现有的 JavaFXGame.java 引导 Java 代码重新回到了 Java 游戏编程，这段代码最初是由
  NetBeans 9 在第 6 章为你创建的。由于 NetBeans 9 生成的 Java 9 代码设计并不适合你的目的，你对其进行了大幅重写，使其更加模块化、精简和有条理。


  你通过创建两个新的 Java 方法来实现这一点：.createBoardGameNodes() 和 .addNodesToSceneGraph()。你这样做的目的是为了模块化你的场景图节点创建过程，同时也为了模块化将两个父分支节点和五个控件叶子节点对象添加到场景图根节点的过程，这里的根节点恰好是
  Group 节点对象。在其下方，你有一个名为 uiLayout 的 StackPane 分支节点，你利用它的多层 UI 对象合成能力；还有一个名为 gameBoard
  的 Group 分支节点，你将用它来容纳 i3D 游戏对象层次结构，你将在本书的剩余部分构建这个结构。


  你了解了一些我们将在这些新方法中实现的 JavaFX 类。这些包括来自 javafx.scene.geometry 包的 Pos 类和 Insets 类，来自
  javafx.scene.layout 包的 VBox 类，以及来自 javafx.scene 包的 Group 类。你编写了新的 .createBoardGameNodes()
  方法，该方法使用 Inset 对象实例化并配置了 VBox 对象、StackPane uiLayout 分支节点对象、Group gameBoard 分支节点对象以及你的五个
  UI Button 控件叶子节点对象。


  一旦所有场景图节点都被实例化并配置好，你就能够构建你的 .addNodesToSceneGraph() 方法，将你的场景图节点对象添加到 Group 根对象中。你这样做的目的是为了确保正确的场景图节点层次结构能够显示在你的
  Stage 对象内部，Stage 对象将引用并加载你的场景图根 Group 节点对象以及我们在其下构建的层次结构。


  最后，你创建了另外四个 Button UI 控件对象，并添加了 ActionEvent 事件处理程序逻辑。这完成了本章中与为 JavaFXGame.java Java
