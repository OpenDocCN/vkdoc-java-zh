  `populateQuadrant()` 方法（`populateQuadrantOne()` 到 `populateQuadrantFour()`）之一，来指示游戏棋盘方格如何自行填充。在此，我们必须初步推测
  `quadrantLanding` 中的哪个角度偏移值应对应于游戏棋盘的哪个象限颜色空间（橙色或动物、绿色或蔬菜、蓝色或矿物、粉色或其他主题）。


  创建初始（空）的 `OnFinished` 事件处理 lambda 表达式所需的 Java 9 代码如下；在图 19-5 中也用红色、黄色和蓝色进行了高亮显示：


