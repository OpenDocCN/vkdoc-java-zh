  ## 防误操作代码：控制玩家事件使用


  游戏“理论上”已经完成，我们可以相信玩家会（只一次）点击正确的 i3D 和 i2D UI 元素来玩游戏。然而，这个特定游戏的目标受众包括未成年儿童、智力障碍者、残障玩家和自闭症玩家。因此，我们将设置一些控制措施，确保玩家只点击一次正确的
  UI 元素来玩这个游戏。让我们从声明（在类顶部）并在 `rotGameBoard.setOnFinished()` 中添加一个设置为 `true` 的 `squareClick`
  布尔变量开始，如下所示，如图 23-11 所示：


  ![A336284_1_En_23_Fig11_HTML.jpg](img/A336284_1_En_23_Fig11_HTML.jpg)


  图 23-11.


  在 `rotGameBoard.setOnFinished()` 处理程序末尾添加一个设置为 `true` 的 `squareClick` 布尔变量


  ```

  rotGameBoard.setOnFinished(event-> {

  if (quadrantLanding == 315) { populateQuadrantOne();   }

  if (quadrantLanding == 225) { populateQuadrantTwo();   }

  if (quadrantLanding == 135) { populateQuadrantThree(); }

  if (quadrantLanding == 45)  { populateQuadrantFour();  }

  spinnerAudio.stop();

  squareClick = true;

  });

  ```


  因此，从逻辑上讲，我们将游戏棋盘方块的点击“保护”连接到了棋盘旋转动画对象上。另外，请注意，通过将所有点击保护变量初始化为没有（默认）值的 `boolean`，我们实际上只需在
  Java 类顶部声明这些变量，就将所有点击保护设置为 `false`，即“点击已锁定”。这样，我们就不需要在 `start()` 方法体中使用任何 `clickProtect
  = false;` 语句。


  注意在图 23-11 中，我还在类顶部使用复合 Java（`boolean`）声明声明了 `spinnerClick` 和 `buttonClick`。这是因为我们希望一旦玩家点击了
  i3D 旋转器 UI 元素、游戏棋盘方块和问答按钮 UI 元素，就将其“锁定”。这是为了防止多次点击，从而防止多次点击答案按钮（以刷分）。它还能确保你的 i3D
  动画和音频调用每轮游戏只按需触发一次，以防止出现玩家眼中的（或听起来像）错误。你肯定不希望动画在其预期的视觉效果中途重新开始，即使你告诉它这样做（在其播放周期中足够早地触发，这通常是多次点击的结果），所以我们将点击锁定为一次！


  接下来，让我们为 `spinnerClick` 设置锁定，从 `MouseEvent` 处理代码中的 `if(picked == spinner)` 条件判断开始。我们需要在
  `if(picked == spinner)` 中添加 `&& spinnerClick == true`，以判断在游戏的那个时刻是否允许点击旋转器。如果允许，我们立即将
  `spinnerClick` 设置为 `false`，因为旋转器动画对象（以及象限着陆处理）也在此代码块内启动。我们将在旋转器的 `.setOnFinished()`
  处理程序中启用点击旋转器，该处理程序在旋转器完成旋转后执行，这将防止玩家在旋转器实际旋转时点击你的 i3D 旋转器 UI 元素！很酷！


  这个新增的、用于 i3D 旋转器条件 `if()` Java 代码结构的鼠标点击防护代码，在此处以粗体显示，并在图 23-12 顶部以浅蓝色和黄色高亮显示：


  ![A336284_1_En_23_Fig12_HTML.jpg](img/A336284_1_En_23_Fig12_HTML.jpg)


  图 23-12.


  在 `MouseEvent` 处理结构中为旋转器添加 `&& spinnerClick == true` 到 `if()` 判断中


  ```

  if(picked == spinner && spinnerClick == true) {

  spinnerClick = false;

  ...

  }

  ```




  接下来，我们将为这个 `rotSpinner` 动画对象添加一个 `.setOnFinished()` 事件处理器，该处理器会在 `rotSpinner` 动画对象完成后，将布尔变量
  `spinnerClick` 设置为 `false`。之所以设置为 `false`（即关闭点击功能），是因为我们不希望在玩家选择一个方块并点击对应的答案按钮 UI
  元素来注册（并计分）其答案之前，转盘（或游戏面板）再次旋转。


  然而，我们确实希望在转盘再次进入屏幕（即 `rotSpinnerIn` 动画对象）后，重新启用鼠标点击转盘的功能。因此，我们将在 `.setOnFinished()`
  事件处理逻辑中将 `spinnerClick` 设置为 `true`。再次强调，这里的 Java 编程逻辑非常清晰，只要你思考一下在游戏流程中想要实现的目标，就不会有任何意外。和大多数游戏逻辑一样，一次性考虑所有内容会很多，因此一开始可能会觉得困难，直到你习惯一次性思考所有与实时交互游戏逻辑相关的实时游戏逻辑（处理流程）。这就是为什么大多数人都认为游戏开发很难，因为作为程序员，你需要“全盘掌握”所有的游戏代码。


  `createSceneProcessing()` 方法中的新 Java 代码如下所示，并且在图 23-13 中，设置 `rotSpinner` 和 `rotSpinnerIn`
  逻辑的代码块以浅蓝色和黄色高亮显示：


