  ## 游戏数字音频：使用 AudioClip 类


  在本章中，我们还将了解如何向游戏中添加数字音频资源。这将需要使用 `javafx.media` 模块，这会使你的发行包变大，因为需要将此模块添加到你的发行 JAR
  中，并且它同时包含 `MediaPlayer`（用于音频和视频）和 `AudioClip` 等类。`AudioClip` 类用于较短的音频“片段”，技术上称为**样本**。如果你想播放较长格式的数字音频（例如歌曲）或数字视频，则应改用
  `MediaPlayer` 类。游戏通常使用较短格式的音频，因此我们将在此介绍 `AudioClip` 类；它本质上是一个数字音频音序器，对于游戏开发者以及声音设计师和歌曲作者来说，这是一个非常强大的工具。


  `public final AudioClip` 类扩展了 `java.lang.Object`，这意味着它是从头开始编码的数字音频音序器。它位于 `javafx.media`
  模块的 `javafx.scene.media` 包中，因此，该类的 Java 类层次结构如下所示：


  ```

  java.lang.Object

  > javafx.scene.media.AudioClip

  ```


  `AudioClip` 对象可用于包含将以最小延迟播放的短段数字音频。剪辑从网络或 JAR 加载的方式与 `Media` 对象类似，但行为不同。例如，由 `MediaPlayer`
  对象播放的 `Media` 对象不能“自行播放”，而你的 `AudioClip` 对象可以。`AudioClip` 可以立即重用，因此它们具有零延迟且使用更少的内存，这对游戏来说很重要。


  `AudioClip` 对象的播放行为被 Oracle 称为“即发即弃”。一旦调用了该类的某个 `play()` 方法，唯一可操作的控制就是 `stop()`
  方法。我们将使用这两种方法。


  `AudioClip` 对象还可以同时多次播放！要使用 `MediaPlayer` 中的 `Media` 对象完成同样的任务，必须为并行播放的每个声音创建新的
  `MediaPlayer` 对象。这对于游戏场景来说并非最佳选择，这就是我们在此不介绍 `Media` 和 `MediaPlayer` 对象的原因。


  `Media` 对象和 `MediaPlayer` 更适合长格式音频，例如歌曲或有声读物。这主要是因为 `AudioClip` 在内存中存储整个数字音频资产的原始未压缩（PCM）音频数据，这对于长音频剪辑来说通常非常大。`MediaPlayer`
  在内存中只会“预卷”足够解压缩的音频数据以播放很短的时间；因此，对于较长的剪辑，`MediaPlayer` 的内存效率要高得多，特别是如果它们已经过压缩，例如使用
  MP3（数字音频）或 MPEG4（数字视频）文件格式，或者 OGG Vorbis（数字音频）、FLAC（数字音频）或 WebM（ON2 VP6、VP8 或 VP9）数字视频格式。


  `AudioClip` 类有六个影响声音平衡、循环、位置、优先级、速率和音量的数字音频属性。其中包括控制 `AudioClip` 对象（相对）左右音量级别的 `balance`
  DoubleProperty，以及控制 `AudioClip` 对象相对“中心”位置的 `pan` DoubleProperty。`rate` DoubleProperty
  控制播放 `AudioClip` 的相对速率（速度），`volume` DoubleProperty 控制播放 `AudioClip` 的相对音量级别。`cycleCount`
  IntegerProperty 控制在调用 `play()` 方法时 `AudioClip` 的播放次数。`priority` IntegerProperty
  控制 `AudioClip` 对象相对于其他 `AudioClip` 对象的相对优先级。


  还有一个静态 `int INDEFINITE` 数据字段，当 `cycleCount` 设置为此值时，`AudioClip` 将连续循环播放，直到使用 `stop()`
  方法调用停止它，我们很快将学习这一点。




  `AudioClip` 只有一个构造方法，它接受一个源 URL，并使用以下格式：


  ```

  AudioClip(String sourceURL)

  ```


  接下来，让我们看看 `AudioClip` 类允许我们在其对象上调用的方法。`DoubleProperty balanceProperty()` 方法调用允许你获取
  `AudioClip` 对象的左右声道相对音量级别。`IntegerProperty cycleCountProperty()` 方法调用允许你获取调用 `play()`
  方法时 `AudioClip` 对象将播放的次数。`DoubleProperty panProperty()` 方法调用允许你获取 `AudioClip` 对象的（相对）声像中心位置。`IntegerProperty
  priorityProperty()` 方法调用允许你获取该 `AudioClip` 对象相对于其他 `AudioClip` 对象的（相对）优先级设置。`DoubleProperty
  rateProperty()` 方法调用允许你获取该 `AudioClip` 播放的（相对）速度。`DoubleProperty volumeProperty()`
  方法调用允许你获取该 `AudioClip` 播放的（相对）音量级别。


  除了这六个 `AudioClip` 属性方法之外，还有七个 `get()` 方法，允许你获取 `AudioClip` 属性的值，包括其数字音频源文件。`double
  getBalance()` 方法调用用于获取 `AudioClip` 的默认平衡级别。`int getCycleCount()` 方法调用用于获取 `AudioClip`
  对象的默认循环次数。`double getPan()` 方法调用用于获取 `AudioClip` 对象的默认声像值。`int getPriority()` 方法调用用于获取
  `AudioClip` 对象的默认播放优先级值。`double getRate()` 方法调用用于获取 `AudioClip` 对象的默认播放速率。`String
  getSource()` 方法调用用于获取创建 `AudioClip` 对象时使用的源 URL。`double getVolume()` 方法调用用于获取 `AudioClip`
  对象的默认音量级别。


  还有七个 `set()` 方法，允许你设置 `AudioClip` 属性的值，包括数字音频源文件。`void setBalance(double balance)`
  方法调用用于设置 `AudioClip` 对象的默认平衡级别。`void setCycleCount(int count)` 方法调用用于设置 `AudioClip`
  对象的默认循环次数。`void setPan(double pan)` 方法调用用于设置 `AudioClip` 对象的默认声像值。


  `void setPriority(int priority)` 方法调用用于设置默认播放优先级。`void setRate(double rate)` 方法调用用于设置默认播放速率。`void
  setVolume(double value)` 方法调用用于设置默认音量级别。此外，还有五个方法可用于在 `AudioClip` 对象播放时对其进行控制。


  `boolean isPlaying()` 方法调用用于指示 `AudioClip` 当前是否正在播放。`void play()` 方法调用用于使用其默认参数播放
  `AudioClip` 对象。`void play(double volume)` 方法调用用于使用除音量之外的所有默认参数播放 `AudioClip`。`void
  play(double volume, double balance, double rate, double pan, int priority)` 方法调用用于使用给定的音量、平衡、速率、声像和优先级参数播放
  `AudioClip`。最后，`void stop()` 方法调用用于立即停止 `AudioClip` 对象的所有播放。现在，我们可以在游戏中将数字音频资源实现为
  `AudioClip` 对象，为诸如游戏棋盘旋转和摄像机缩放等事件提供音频音效。


