- '# 12. 3D 模型设计与图元：使用 JavaFX 9 Shape3D 类


  现在，你已经通过向场景根节点添加 Camera 对象和专门为 3D 资源设计的 PointLight 对象，完成了基础（空）3D 场景的设置，接下来让我们开始获取关于
  3D 资源本身的一些基础知识。这些资源以预定义的基础 3D 形状（称为图元）的形式出现，以及更自定义的 3D 几何资源，在行业中通常被称为网格或线框 3D 资源。JavaFX
  9 在 `javafx.scene.shape` 包（位于 javafx.graphics 模块中）中提供了七个类，专门为你创建 3D 几何体（图元或网格），我们将在本章中逐一了解它们。我们还会在第
  12 章中回到 JavaFXGame 主应用程序类的编码工作，并开始向 SceneGraph 的 gameBoard Group 节点添加 3D 图元，以便练习向
  JavaFXGame 应用程序添加 3D 资源。虽然我们可以在诸如 Blender 这样的 3D 软件包中完成这项工作，但棋盘游戏足够简单（正方形、球体、圆柱体），因此我们可以完全在
  JavaFX 代码中完成，这意味着我们不需要导入（和分发）3D 模型，而是可以编写代码来“凭空”建模你的 3D 游戏。这也将让你学到更多关于 Java 9 和
  JavaFX 9 中 3D API 的知识，因为你可以学习如何仅使用最新的 Java 和 JavaFX API 来建模复杂的对象（例如你的棋盘游戏的游戏板）。


  在本章中，你将学习 `javafx.scene.shape` 包中包含的不同类型的 JavaFX 3D 类。我们将介绍 Sphere，它可用于创建球体图元，你在第
  11 章中已经用它测试过你的 3D 场景设置。我们还将研究另外两个图元类：Box 和 Cylinder，它们可用于创建你的平面和圆盘图元。这些图元基于 Shape3D
  超类，我们将首先研究这个超类。我们还将研究更高级的 TriangleMesh 类，它允许你构建基于多边形的 Mesh 对象，最后，我们将研究 Mesh 和 MeshView
  类层次结构，它们允许你渲染在外部 3D 建模和渲染软件包（例如 Blender 2.8（开源）或 Autodesk 3D Studio Max（付费软件包））中创建的
  3D Mesh 对象。


  ## JavaFX Shape3D 超类：图元或 MeshView


  公共抽象 Shape3D 超类用于创建四个主要的 3D 类：Box、Sphere、Cylinder 和 MeshView。你将使用这些类来创建和显示你的专业 Java
  9 游戏开发所需的 3D 资源。其中三个子类创建图元，这些图元是通过算法预定义的 3D 对象，而 MeshView 子类允许在 3D 场景中渲染基于多边形几何的更详细的复杂
  3D 模型。需要注意的是，还有一个 `javafx.scene.shape.Shape` 超类，它与 `javafx.scene.shape.Shape3D`
  在类层次结构上没有关联；它用于 2D 形状，例如 SVG 2D 数字插图语言中常见的形状，这在《Beginning Java 8 Games Development》（Apress,
  2014）和《Digital Illustration Fundamentals》（Apress, 2016）中有所介绍。


  Shape3D 超类是 Node 的子类，就像我们将在 JavaFXGame 代码中使用的大多数具体类一样。与 Camera 和 LightBase 超类一样，这个
  Shape3D 超类实现了 Styleable 和 EventTarget 接口，以便其子类（对象）可以设置样式并处理事件（可以是交互式的）。因此，Java 9
  类层次结构跨越了 Java 和 JavaFX API，如下所示：


  ```

  java.lang.Object

  > javafx.scene.Node

  > javafx.scene.shape.Shape3D

  ```


  创建 Shape3D 基类（抽象类，不能直接实例化）是为了为表示 3D 几何形状的 3D 对象提供公共属性的定义。三个主要的 3D 属性包括：应用于形状可填充内部或形状轮廓的“材质”（或着色器和纹理贴图），我们将在第
  13 章中介绍；定义 JavaFX 9 渲染引擎如何向查看者表示几何体（作为实体模型或线框模型）的“绘制模型”属性；以及定义要剔除哪些面的“面剔除”属性。面剔除是渲染引擎用来获得更好性能（更高的
  FPS）的一种优化方法，它通过不渲染场景中模型的所有多边形来实现。由于渲染器获取 3D 场景并从 Camera 渲染出 2D 视图，这种“背面剔除”将不会渲染模型上背向
  Camera（Camera 不可见）部分的任何面（多边形）。正面剔除则相反，只渲染背向的多边形，这基本上渲染了多边形的内部，而模型的前面（多边形）变得隐藏或不可见。还有
  CullFace.NONE 常量，用于关闭面剔除优化算法。CullFace.BACK 是默认设置，也是你通常想要使用的设置，除非你使用 CullFace.FRONT
  来获得某种特殊的内部体积渲染效果，在本章结束后，如果你愿意，你将确切知道如何尝试。


  如你所知，3D 渲染以及任何 Shape3D 子类都是一个条件特性，你可以在代码中检查它，正如我们在上一章中介绍的那样。让我们深入了解任何 Shape3D 子类对象的三个对象设置（属性、特性、特征），它们定义了
  3D 渲染引擎将如何渲染它。


  cullFace ObjectProperty<CullFace> 将定义在此 Shape3D 对象上使用哪种 CullFace 优化算法（FRONT、BACK
  或 NONE）。这很可能会影响专业 Java 9 3D 游戏的性能。


  drawMode ObjectProperty<DrawMode> 将定义用于渲染 Shape3D 对象的绘制模式。你的两个选项包括用于实体 3D 对象的 DrawMode.FILL
  和用于线框表示的 DrawMode.LINE。


  material ObjectProperty<Material> 定义 Shape3D 对象将用作“皮肤”的材质。我们将在第 13 章中全面学习着色算法、材质和纹理贴图，该章涵盖了材质。


  抽象 Shape3D 超类的受保护（不能直接使用）构造函数如下所示：


  ```

  protected Shape3D()

  ```


  现在让我们来了解将成为所有 Shape3D 子类一部分的方法。这很方便，因为我们可以在这里一次性介绍所有这些方法。这些方法可用于任何图元 3D 形状或 MeshView。


  `.cullFaceProperty()` 方法为 Shape3D 对象定义 ObjectProperty<CullFace>，而 `.getCullFace()`
  方法允许你查询 Shape3D 对象当前的 CullFace 常量设置。还有 `.setCullFace(CullFace value)` 方法，允许你更改 Shape3D
  对象的 CullFace 常量设置。


  `.drawModeProperty()` 方法为 Shape3D 对象定义 ObjectProperty<DrawMode>，而 `.getDrawMode()`
  方法允许你查询 Shape3D 对象当前的 DrawMode 常量设置。还有 `.setDrawMode(DrawMode value)` 方法，允许你更改 Shape3D
  对象的 DrawMode 常量设置。


  `.materialProperty()` 方法为 Shape3D 对象定义 ObjectProperty<Material>，而 `.getMaterial()`
  方法允许你查询 Shape3D 对象当前的 Material 对象设置。还有 `.setMaterial(Material value)` 方法，允许你更改 Shape3D
  对象的 Material 对象设置。


  接下来，让我们逐一查看 Shape3D 子类，因为我们将在 JavaFXGame 中利用它们。




  ### JavaFX Sphere：为你的 3D 游戏创建球体图元


  由于我们在前一章中已经创建了一个名为 sphere 的 Sphere 对象来测试 PerspectiveCamera 和 PointLight 3D 场景设置的
  Java 代码，因此我们首先来介绍这个 Shape3D 子类。该类位于 `javafx.scene.shape` 包中，并且是 Shape3D 的子类，因此它具有以下
  Java 类层次结构：


  ```

  java.lang.Object

  > javafx.scene.Node

  > javafx.scene.shape.Shape3D

  > javafx.scene.shape.Sphere

  ```


  Sphere 类定义了一个具有指定大小的三维球体。Sphere 是一个 3D 几何图元，通过程序员输入的半径尺寸（大小）以算法方式创建。该球体最初始终以 3D
  原点 0,0,0 为中心。因此，Sphere 对象具有一个 radius DoubleProperty，用于定义球体的半径，以及三个从 `javafx.scene.shape.Shape3D`
  继承的属性：cullFace、drawMode 和 material。


  Sphere 类包含三个重载的构造方法，其中一个无参数，用于创建一个半径为 1.0 的 Sphere 实例。这看起来像下面的 Java 9 Sphere 实例化代码：


  ```

  sphere = new Sphere();

  ```


  第二个构造方法（即我们在第 11 章中使用的方法）允许你使用 double 数值指定半径。这看起来像下面的 Sphere 实例化 Java 代码：


  ```

  sphere = new Sphere(100);

  ```


  第三个构造方法允许你通过 divisions 参数指定半径和网格密度，如下面的 Java 语句所示，该语句创建一个半径为 100 单位、具有 24 个分段的 Sphere：


  ```

  sphere = new Sphere(100, 24)

  ```


  除了从 Shape3D 类继承的方法外，Sphere 类还有一些自己独特的方法，包括 `.getDivisions()` 方法，用于查询 Sphere 对象当前使用的分段数；`.radiusProperty()`
  方法，用于定义 Sphere 对象的半径；`.getRadius()` 方法，用于获取当前半径的值；以及 `.setRadius(double value)`
  方法，用于将半径设置为不同的值。


  ### JavaFX Cylinder：为游戏创建圆柱体或圆盘图元


  接下来，我们介绍 public Cylinder Shape3D 子类，它可以用于创建圆柱形 3D 对象，因为它是一个具体的（可用的）类，同时也实现了 Styleable
  和 EventTarget 接口。该类位于 `javafx.scene.shape` 包中，并且是 Shape3D 的子类，因此它具有以下 Java 类层次结构：


  ```

  java.lang.Object

  > javafx.scene.Node

  > javafx.scene.shape.Shape3D

  > javafx.scene.shape.Cylinder

  ```


  Cylinder 类用于定义一个具有指定半径和高度的三维圆柱体。Cylinder 是一个 3D 几何图元算法，它接受一个半径（double）属性和一个高度（double）属性。它最初以
  0,0,0 原点为中心，半径沿 z 轴方向，高度沿 y 轴方向。


  除了半径和高度属性外，它还将继承 Shape3D 的 cullFace、drawMode 和 material 属性。它有三个重载的构造方法：一个是默认的（空参数），一个带有半径和高度，第三个带有半径、高度和分段数。


  第一个空构造方法创建一个新的 Cylinder 对象实例，其半径为 1.0，高度为 2.0。它具有以下 Java 语句格式：


  ```

  cylinder = new Cylinder();

  ```


  第二个构造方法创建一个新的 Cylinder 对象实例，其半径和高度由开发者指定。它具有以下 Java 语句格式：


  ```

  cylinder = new Cylinder(50, 250);

  ```


  第三个构造方法创建一个新的 Cylinder 对象实例，其半径、高度和分辨率（决定平滑度的分段数）由开发者指定。它具有以下 Java 语句格式：


  ```

  cylinder = new Cylinder(50, 250, 24);

  ```


  有三个用于半径的方法，三个用于高度的方法，以及一个 `.getDivisions()` 方法用于查询 divisions 属性，该属性必须使用第三个构造方法格式设置，因为没有
  `.setDivisions()` 方法调用或 `divisionsProperty()` 方法调用。


  `double getHeight()` 方法将查询（获取）Cylinder 对象的高度属性值。`DoubleProperty heightProperty()`
  方法定义 Cylinder 对象的高度属性，即 Y 维度。最后，`void setHeight(double value)` 方法允许开发者设置 Cylinder
  对象的高度属性值。


  `double getRadius()` 方法将查询（获取）Cylinder 对象的半径属性值。`DoubleProperty radiusProperty()`
  方法定义 Cylinder 对象的半径属性，即 Z 维度。最后，`void setRadius(double value)` 方法允许开发者设置 Cylinder
  对象的半径属性值。


  最后，让我们看看 Box 图元类，它允许创建各种有用的形状。


  ### JavaFX Box：为 3D 游戏创建立方体、柱体和平面


  接下来，我们介绍 public Box Shape3D 子类，它可以用于创建正方形、矩形和平面 3D 对象，因为它是一个具体的（可用的）类，同时也实现了 Styleable
  和 EventTarget 接口。该类位于 `javafx.scene.shape` 包中，并且是 Shape3D 的子类，因此它具有以下 Java 类层次结构：


  ```

  java.lang.Object

  > javafx.scene.Node

  > javafx.scene.shape.Shape3D

  > javafx.scene.shape.Box

  ```


  Box 类定义了一个具有指定大小的三维立方体，通常称为立方体图元。Box 对象是一个 3D 几何图元，除了三个继承自 Shape3D 的属性（cullFace、drawMode
  和 material）外，还有三个 double 属性（depth、width 和 height）。实例化时，它最初以原点为中心。


  Box 类有两个重载的构造方法。一个创建默认的 2,2,2 立方体，看起来像下面的 Java 代码：


  ```

  box = new Box();

  ```


  第二个构造方法允许你指定立方体的尺寸，看起来像下面这样：


  ```

  box = new Box(10, 200, 10); // 创建一个柱体（或高矩形）图元

  box = new Box(10, 0.1, 10); // 创建一个平面（或平坦表面）图元

  ```


  你可能已经猜到，Box 类中有九个方法，每个属性对应三个方法。我们将使用这个类来创建大部分游戏棋盘基础设施，因此我们可能会经常使用它们。


  `DoubleProperty depthProperty()` 方法用于定义 Box 的深度，即 Z 维度。`double getDepth()` 方法可用于从
  Box 对象获取（查询）depth 属性的值。`void setDepth(double value)` 方法可用于为 Box 对象设置或指定 depth 属性的新值。


  `DoubleProperty heightProperty()` 方法用于定义 Box 的高度，即 Y 维度。`double getHeight()` 方法可用于从
  Box 对象获取（查询）height 属性的值。`void setHeight(double value)` 方法可用于为 Box 对象设置或指定 height
  属性的新值。


  `DoubleProperty widthProperty()` 方法用于定义 Box 的宽度，即 X 维度。`double getWidth()` 方法可用于从
  Box 对象获取（查询）width 属性的值。`void setWidth(double value)` 方法可用于为 Box 对象设置或指定 width 属性的新值。


