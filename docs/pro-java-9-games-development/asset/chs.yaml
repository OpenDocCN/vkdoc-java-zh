  需要特别说明的是，我将向你展示如何仅使用 Java（8 或 9）和 JavaFX 8 或 9 来创建游戏，因为这正是本书的主题：使用和学习原生 Java API（其中之一是
  JavaFX）来制作游戏或物联网应用程序。在开始之前，我只是想让你了解这两个主流的 Java 游戏平台。


  ### 物理与碰撞引擎：Jbox2D、JBullet、Dyn4j、Jinngine


  有大量第三方物理引擎也支持碰撞检测，因此你可以使用这些碰撞物理代码库中的任意一个，通过将 JAR 文件导入项目并调用适当的 API，同时为你的专业 Java 游戏或物联网应用程序项目添加碰撞和物理功能。


  Jbox2D 是 Box2D C++ 物理引擎的 Java“移植”或重编码版本。Box2D 是一个基于 C++ 的开源物理与碰撞引擎，用于模拟 i2D（X,Y）空间中的刚体动力学。Box2D
  由 Erin Catto 开发，并在 zlib 许可下发布，该许可不要求正式声明使用情况；但如果你使用从 C++ Box2D 移植的 Jbox2D API，建议在你的专业
  Java 游戏中注明对 Box2D 的致谢。


  JBullet 是 Bullet 2.7 3D C++ 物理引擎的部分移植版本，用于 Java 环境。Bullet 2.87 是一个基于 C++ 的开源物理与碰撞引擎，用于模拟
  3D（X,Y,Z）空间中的刚体动力学。Bullet 碰撞检测与物理库由超威半导体公司（AMD）开发。如需更多信息，可访问 [`http://bulletphysics.org`](http://bulletphysics.org)。JBullet
  在 zlib 许可下发布，不要求正式声明使用情况。但如果你使用从 Bullet 2.7 C++ 物理引擎部分移植的 JBullet API，建议在你的专业 Java
  游戏中注明对 JBullet 的致谢。


  图 4-3 中所示的 dyn4j 引擎是一个兼容 Java 6 和 7 的 2D 碰撞检测与物理引擎，这意味着它也能与我们本书中介绍的 Java 8 和 9 版本配合使用。Dyn4j
  设计稳定、可扩展、优化（快速）且相对易于使用。Dyn4j 可免费用于商业和非商业用途。其作者 William Bittle 根据 BSD 许可模型对其进行授权。


  ![A336284_1_En_4_Fig3_HTML.jpg](img/A336284_1_En_4_Fig3_HTML.jpg)


  图 4-3.


  Dyn4j 是一个开源 2D 碰撞检测与物理引擎，采用 BSD 许可协议


  Jinngine 是一个用 Java 编写的开源轻量级 3D 物理引擎，可提供实时碰撞以及实时物理计算能力。用户可以通过调用 API 函数来指定几何体、关节和参数，从而设置和模拟物理效果。摩擦力通过实现库仑摩擦定律的近似值来建模。该物理引擎仅专注于碰撞和物理，没有渲染功能，并采用基于速度的算法方法，通过高效的
  NCP 求解器进行求解。你可以将 jinngine 用作物理引擎，也可以将其其他组件用作 Java 代码库，例如，如果你只想实现碰撞检测，或者只想利用接触点生成功能。接下来，让我们看看反向运动学（IK）引擎，它们用于角色动画中定义骨骼结构及其关节运动限制。


  ### 反向运动学与机器人引擎：JRoboOp 和 JavaFX-IK


  JRoboOp 是一个开源 Java 库（包），专为 IK 机器人仿真设计，可可视化 3D 机器人模型。该引擎模拟机器人反向运动学以及机器人动力学，基于名为 ROBOOP
  的 C++ 库开发。该库由蒙特利尔理工学院的 Richard Gourdeau 开发，兼容 Java 5 及更高版本，以及 JavaFX 1.3 及更高版本，这意味着它能很好地与我们本书中介绍的
  Java 7、Java 8、JavaFX 9 和 Java 9 版本配合使用。该包根据 GNU 公共许可证（GPL）发布。


  JavaFX-IK 库大约在两年前专门为 JavaFX 创建，可在 GitHub 上获取，地址为 [`https://github.com/netopyr/javafx-ik`](https://github.com/netopyr/javafx-ik)。它根据
  Apache 许可证 2.0 版授权。该 IK 软件允许你使用 Bone 对象在 JavaFX 场景图中创建 Skeleton 对象结构，由德国弗莱堡的高级软件工程师
  Michael Heinrichs 创建。


  接下来，让我们看看可以创建的不同类型的游戏，以及它们在精灵、碰撞检测、物理模拟和游戏 AI 逻辑等核心游戏组件的应用上有何不同。


  ## 游戏类型：益智、棋盘、街机、射击或 VR


  就像我们在本章中讨论的其他内容一样，游戏本身也可以使用“静态与动态”的方法进行分类。静态游戏不受“处理器限制”，因为它们本质上是“回合制”的，而非“手眼协调型”，因此从某种意义上说，它们更容易流畅运行，只需将游戏玩法的“规则”编程逻辑和精美的图形落实并调试即可。此外，还存在一个重要的机遇，即开发新型游戏类型，这些类型以创造性的方式结合静态和动态玩法，前所未有。我自己也正在研究其中几种！




  ### 静态游戏：策略、知识、记忆与棋盘游戏


  由于本书本质上是一本专业的 Java 游戏编程书籍，我将从这个对游戏开发至关重要的“静态与动态”视角来探讨所有内容，而这也恰好是一种将游戏巧妙划分为三个独立类别（静态、动态和混合）的绝佳方式。我们先来介绍静态（固定图形）回合制游戏。这类游戏包括基于移动或回合制的游戏，例如棋盘游戏、益智游戏、知识游戏、记忆游戏和策略游戏。这些游戏的受欢迎程度和市场潜力不容小觑，尤其是在家庭用户群体中。并非所有游戏客户都是青少年男性，而这类游戏也最有可能被用于“寓教于乐”——这是当今一个流行的热词，它将教育与娱乐融合在一起，以促进教育部分取得更大成功。目前市场上缺乏有趣且有效的教育类游戏，因此这构成了一个重要的游戏商业机遇。


  关于静态游戏，需要记住的关键一点是，它们完全可以像动态游戏一样有趣。静态游戏本质上具有显著更低的处理开销，因为它们无需达到 60 FPS 的实时处理目标来实现流畅、专业的游戏体验。这是因为这类游戏的本质并非基于连续运动，而是基于做出正确的策略性移动。移动只在轮到你的回合时发生，这就是为什么这类静态游戏通常被称为“基于移动”的游戏。


  静态游戏中可能涉及某种基本的“碰撞检测”，用于判断哪些游戏棋子已被移动，以及移动到了棋盘或游戏表面的哪个位置。然而，对于静态游戏来说，不存在因碰撞检测而使处理器过载的风险，因为除了在特定玩家的回合中被策略性移动的那一个棋子外，棋盘的其他部分都是静止的。一旦完成这次碰撞判定过程，在下一个回合（无论是单人游戏中的玩家自己，还是多人游戏中的对手）到来之前，都不再需要（实时）碰撞检测。


  策略游戏的处理逻辑更多地是基于策略逻辑的编程，旨在允许玩家通过正确的移动序列达成特定的“胜利”结局；而动态游戏的编程逻辑则更关注游戏精灵之间发生的碰撞。动态游戏侧重于得分，这些分数通过躲避弹射物、寻找宝藏、击中目标、消灭敌人以及完成诸如此类的关卡目标来获得，以便进入下一关，在那里玩家可以获取更高的分数。


  像国际象棋这样拥有大量相互关联规则集的复杂策略游戏，其编程逻辑例程甚至可能比动态游戏复杂得多。然而，由于代码执行对时间不那么敏感，无论平台和 CPU 多么强大，最终的游戏体验都会很流畅，因为玩家愿意等待游戏验证移动的有效性，并在适当时为其计分。当然，对于这类游戏而言，其规则集逻辑必须完美无缺，才能被视为真正专业。因此，归根结底，无论是静态游戏还是动态游戏，至少那些优秀的作品，其编码都可能很困难，尽管原因截然不同。接下来，让我们看看动态游戏，这类游戏通常公众知名度高，吸引更年轻的玩家群体，并且往往倾向于个人游玩，而非团体、学生或家庭共同游玩。


  ### 动态游戏：街机、射击、平台与动作游戏


  动态游戏可称为动作游戏或街机游戏，其特点是显示屏上有大量的运动。这些高度动态的游戏几乎总是涉及射击，例如第一人称射击游戏（如《毁灭战士》和《半条命》）以及第三人称射击游戏（如《生化危机》和《侠盗猎车手》）类型，或者涉及偷窃或躲避可怕的事物。动作体育游戏，如美式足球、英式足球、棒球、篮球、高尔夫和长曲棍球，在动态游戏类型中也非常受欢迎，它们几乎总是使用照片级真实的
  i3D 虚拟世界或虚拟现实游戏模拟环境来创建。驾驶游戏是该类型的另一种表现形式，也倾向于使用实时 i3D 游戏渲染技术，为驾驶者提供超逼真的驾驶模拟。


  还有障碍赛道导航范式，常见于《大金刚》、《吃豆人》或《超级马里奥兄弟》等平台游戏中。平台游戏通常是街机游戏，典型的是 2D 或 2.5D（即等距视角）。街机游戏《ZAXXON》就是一个很好的等距游戏例子，它是
  2D 的，但看起来像 3D；或者《暴风雨》，其中几何形状沿着一个几何井壁向上攀爬，玩家从侧面射击以阻止攀爬的形状到达顶部。


  值得注意的是，任何类型的游戏都可以使用 2D 或 3D 图形资源来制作，甚至可以结合使用 2D 和 3D 资源，JavaFX 9.0 支持这种做法，我将其称为混合型游戏。




  ### 混合游戏：创造性运用 JavaFX 的机遇


  从 JavaFX 场景图资源的角度来看，混合游戏是指同时使用 2D 和 3D 资源的游戏，我们在第 2 章和第 3 章中已介绍了其中大部分内容。还有另一种混合类型，它可以跨越不同的游戏类型，我们在上一节中刚刚介绍了一些。流行的游戏类型如此之多，因此总有机会通过采用混合玩法来创造全新的游戏类型。例如，想象一下从静态（策略）游戏类型（如棋盘游戏）中提取一些特征，并加入动态（动作）游戏类型的元素。这方面的一个很好的例子是《战斗象棋》，其中棋子进入彼此的棋盘格时会进行生死搏斗。


  在我的《Beginning Java 8 Games Development》（Apress，2014）一书中，我使用 JavaFX 8.0 创建了一个混合游戏引擎，该引擎支持平台游戏、射击游戏和寻宝游戏的属性。正如你在图
  4-4 中所见，那本书中创建的 BagelToons InvinciBagel 游戏引擎（我在书中介绍了 i2D 游戏开发）包含了通常在不同类型 2D 游戏中出现的元素，包括超级英雄、敌人、射击、宝藏、障碍物、藏身之处、建筑物、汽车、景观、魔毯猫、开保险箱、食物等等。


  ![A336284_1_En_4_Fig4_HTML.jpg](img/A336284_1_En_4_Fig4_HTML.jpg)


  图 4-4.


  我的 i2D 游戏开发书籍《Beginning Java 8 Games Development》涵盖了使用精灵图开发游戏的内容


  总之，Java 的定位是让游戏开发者能够交付包含 2D 和 3D 资源以及高质量 16 位 48 kHz 和 24 位 48 kHz 数字音频的前沿混合游戏。只要发挥一点创造力，并运用你在本书学习过程中积累的知识，你应该能够实现前所未有的创举。这对于混合游戏将大有裨益的领域尤其如此，例如教育（寓教于乐）和工作场所（业务流程游戏化）。这是因为
  Java 广泛应用于操作系统和浏览器，以及 Android 5-8 等 64 位平台，这些平台在消费电子产品中拥有多数市场份额和制造商追随。话虽如此，有必要指出的是，JavaFX（尚）不适合用于开发需要高清或超高清高帧率的
  i3D VR 实时 3D 渲染游戏，例如那些使用 C++ 为 PlayStation 或 Xbox 等定制游戏主机创建的游戏。


  ## 总结


  在第四章中，我们更深入地探讨了一些更重要的游戏设计概念，这些概念将在我们的专业 Java 游戏开发工作流程中使用，以便你在本书的第一部分就提前掌握这些基础知识。


  我首先介绍了静态与动态的关键概念，以及它们对游戏设计和游戏优化的重要性，因为如果在整个游戏设计、开发和优化过程中不持续考虑优化问题，过多的动态元素可能会使较旧的单核甚至双核
  CPU 过载。


  接着，你了解了一些游戏设计和开发的关键组件，例如精灵图位置、精灵图动画、碰撞检测、物理模拟、群体或人群动力学、粒子系统、背景动画、摄像机动画、数字视频流、用户界面设计、计分引擎和游戏
  AI 逻辑。


  我们探讨了这些组件如何应用于静态游戏（即没有持续移动的游戏，例如基于移动的策略游戏、棋盘游戏、益智游戏、知识游戏和记忆游戏），然后探讨了它们如何应用于动态游戏（即使用持续移动的游戏，例如平台游戏、街机游戏、第一人称射击游戏、第三人称射击游戏、驾驶游戏、体育游戏、科幻游戏以及类似大量利用
  3D 实时渲染以及各种物理系统和粒子系统模拟的游戏）。


  我们还了解了一些最流行的第三方游戏引擎、物理（和碰撞）引擎以及反向运动学引擎。我们研究了一些不同类型的游戏及其特点，以便激发你的创造力，思考你想要创建哪些类型的专业
  Java 游戏。


  在下一章中，我们将探讨 Java 编程语言，并进行一次复习或入门介绍，以确保每个人对 Java 编程语言 API 组件（如包、类、接口、方法、常量、变量、修饰符等）的理解保持一致。




