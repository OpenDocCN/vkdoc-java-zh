  ## 设计你的游戏玩法：创建象限定义


  由于这是一款面向学龄前儿童以及自闭症、智力障碍和学习障碍人士的教育游戏，我们需要保持分类简单。一个与我们配色方案相匹配的经典分类范式是“动物、植物或矿物”，这将留出一个方格用于其他主题，例如“人物和著名地点”。显然，我们的绿色象限将是“植物”，因为人们常说“多吃绿色蔬菜”；橙色象限将是“动物”，因为狮子、老虎、猫、狗和其他动物正是那种橙色。我们的蓝色象限将是“矿物”，因为蓝宝石和紫水晶等矿物存在于这种冷色调光谱中。这留下了粉色象限用于“其他”，我们可以在每次旋转后决定如何分类。这些游戏板方格随机选择的主题将使用高质量的图像进行视觉呈现，我们将在本章中使用专业级的
  GIMP 来开发这些替代纹理映射的数字图像资源。




