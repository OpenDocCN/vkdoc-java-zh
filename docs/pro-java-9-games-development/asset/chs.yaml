  ### 合并动画属性：使用 ParallelTransition 类


  公共最终类 `ParallelTransition` 扩展了抽象超类 `Transition`，可以在 `javafx.animation` 包中找到，该包位于
  `javafx.graphics` 模块中。此 `Transition` 并行播放一个 `Animation` 对象列表，这意味着它们同时进行（一个接一个地播放称为串行或顺序播放）。如果子
  `Transition` 的节点属性尚未使用方法调用（通常是构造方法）显式指定，则它们会继承父 `Transition` 的 `Node` 节点属性。原因在于
  `ParallelTransition` 只是合并现有的 `Animation` 对象，因此节点可能已在合并的动画中指定。`ParallelTransition`
  的 Java 类层次结构如下所示：


  ```

  java.lang.Object

  > javafx.animation.Animation

  > javafx.animation.Transition

  > javafx.animation.ParallelTransition

  ```


  `ParallelTransition` 类只有一个原生属性，即 `ObjectProperty<Node>` 节点属性，它是组合动画将应用到的 `Node`
  对象。如果未指定节点，则将改用子 `Animation` 对象的节点属性。如果指定了节点，则该 `Node` 将被设置（即指定）给所有自身未定义任何目标 `Node`
  节点属性的子 `Transition`。


  `ParallelTransition` 类包含四个重载的构造方法。第一个创建一个空对象，第二个指定一个子 `Animation` 对象列表，第三个指定一个要影响的
  `Node`，第四个同时指定要影响的 `Node` 对象和一个子 `Animation` 对象列表。第二个和第四个构造方法是最常用的。我们将为子 `Animation`
  对象使用第二个构造方法；两个引用的 `Animation` `Transition` 对象都将 `spinner` `Node` 对象指定为 `ParallelAnimation`
  对象的目标。这些构造方法的 Java 代码如下所示：


  ```

  parallelTransition = new ParallelTransition();

  parallelTransition = new ParallelTransition(Animation... children);

  parallelTransition = new ParallelTransition(Node node);

  parallelTransition = new ParallelTransition(Node node, Animation... children);

  ```


  `ParallelTransition` 类只有大约六个你需要掌握的方法调用。`.getChildren()` 方法调用将返回一个 `ObservableList<Animation>`，其中包含要作为一个统一动画一起播放的
  `Animation` 对象。


  `.getNode()` 方法调用可用于获取（轮询）节点属性的 `Node` 对象值，而 `void .setNode(Node value)` 方法调用可用于设置（指定）节点属性的
  `Node` 对象值。


  还有一个受保护的 `Node .getParentTargetNode()` 方法调用，它将为那些未指定节点属性的 `Transition` 子 `Animation`
  对象返回目标 `Node`。要指定父目标节点属性，必须使用第四个构造方法，它为 `ParallelTransition`（父对象）指定了一个节点属性。否则，将使用第二个构造方法，并且子
  `Animation` 对象的节点属性将定义 `Animation` 对象将影响哪个 `Node` 对象。


  `ParallelTransition .nodeProperty()` 方法调用将返回你的 `ParallelTransition`（父对象）`ObjectProperty<Node>`
  值，该值将使用第三个或第四个构造方法或 `.setNode(Node)` 进行设置。如果此 `Node` 被指定（设置），它将被用于所有未具体定义其目标 `Node`
  的子 `Transition`。


  最后，所有抽象超类 `Transition` 的子类实现都必须提供受保护的 `void .interpolate(double value)` 方法调用。


