  ## 接下来是什么？


  我在本章和之前的章节中提到了包。什么是包？如何使用它？你将在下一章中找到答案。


  '
- "# 10. 包\n\n同名的引用类型（例如，两个不同的`Math`类）在尝试使用时可能会导致名称冲突，但 Java 通过包解决了这个问题。本章将向你介绍包的概念，然后是`package`和`import`语句。最后，你将了解静态导入、受保护访问和\
  \ JAR 文件。\n\n## 什么是包？\n\nJava 开发者将相关的类和/或接口分组到*包*中，包是用于存储引用类型的唯一*命名空间*。包可以存储类、接口和*子包*（嵌套在其他包中的包）。可以将包视为存储文件和子目录的目录。\n\
  \n注意\n\n包使得定位和使用引用类型更加容易，避免了同名类型之间的名称冲突，并控制对类型的访问。\n\n包有一个名称，该名称必须是非保留标识符，例如`java`。成员选择运算符（`.`）将包名与子包名分隔开，并将包名或子包名与类型名分隔开。例如，`java.lang.System`中的两个`.`运算符将包名`java`与子包名`lang`分隔开，并将子包名`lang`与类型名`System`分隔开。\n\
  \n注意\n\n`System`实用类提供了几个有用的系统相关常量和方法。我们将在第 14 章中查看其常量和一些方法。\n\n引用类型（例如`System`）必须声明为`public`才能从其包外部访问。任何必须可访问的常量、构造函数和方法也是如此。你将在本章后面看到示例。\n\
  \n\n\n## Package 语句\n\nJava 提供了 *package* *语句*用于创建包。该语句位于源文件顶部，用于标识该源文件中类型所属的包。它必须遵循以下语法：\n\
  \n```\n'package' 标识符 ('.' 标识符)* ';'\n```\n\n`package` 语句以保留字 `package` 开头，后跟一个*标识符*，该标识符后面可选地跟一个由\
  \ `.` 分隔的*标识符*序列。该语句以分号结束。\n\n第一个（最左侧）标识符命名包，后续每个标识符命名一个子包。例如，在 `package x.y;` 中，源文件中声明的所有类型都属于\
  \ `x` 包的 `y` 子包。\n\n注意\n\n按照惯例，包/子包名称使用小写字母表示。当名称由多个单词组成时，你可能希望在单词之间放置下划线以提高可读性。\n\
  \n包名称序列必须是唯一的，以避免编译问题。例如，假设你创建了两个不同的 `report_generator` 包，并且每个包都包含一个具有不同接口的 `ReportGenerator`\
  \ 类。当 Java 编译器在源代码中遇到例如 `ReportGenerator rg = new ReportGenerator();` 时，它需要验证 `ReportGenerator()`\
  \ 构造函数是否存在。\n\n编译器将搜索所有可访问的包，直到找到包含 `ReportGenerator` 类的 `report_generator` 包。如果找到的包包含带有\
  \ `ReportGenerator()` 构造函数的适当 `ReportGenerator` 类，则一切正常。否则，如果找到的 `ReportGenerator`\
  \ 类没有 `ReportGenerator()` 构造函数，编译器会报告错误。\n\n这个场景说明了选择唯一包名称序列的重要性。选择唯一名称序列的惯例是反转你的互联网域名，并将其用作序列的前缀。例如，如果\
  \ `javajeff.tech` 是我的域名，我可能会选择 `tech.javajeff` 作为我的前缀。然后我会指定 `tech.javajeff.report_generator.ReportGenerator`\
  \ 来访问 `ReportGenerator`。\n\n注意\n\n域名组件并不总是有效的包名称。一个或多个组件名称可能以数字开头（`4seasons.com`）、包含连字符（`-`）或其他非法字符（`news-world.com`），或者是\
  \ Java 的保留字之一（`interface.com`）。惯例规定，在数字前加下划线（`com._4seasons`），用下划线替换非法字符（`com.news_world`），并在保留字后加下划线（`com.interface_`）。\n\
  \n为了避免 `package` 语句出现更多问题，你需要遵循几条规则：\n\n*   你只能在源文件中声明一个 `package` 语句。\n\n*   除了注释之外，`package`\
  \ 语句前面不能有任何内容。\n\n第一条规则是第二条规则的特例，其存在是因为将引用类型存储在多个包中没有意义。虽然一个包可以存储多种类型，但一个类型只能属于一个包。\n\
  \n当源文件没有声明 `package` 语句时，该源文件的类型属于*未命名包*。重要的引用类型通常存储在自己的包中，并避免使用未命名包。\n\nOracle\
  \ 的 Java 实现将包和子包名称映射到同名的目录（对于 Macintosh 用户来说是文件夹）。例如，实现会将 `report_generator` 映射到名为\
  \ `report_generator` 的目录。在 `x`.`y` 中，`x` 将映射到名为 `x` 的目录，`y` 将映射到 `x` 的 `y` 子目录。编译器将实现包类型的类文件存储在相应的目录中。请注意，未命名包对应于当前目录。\n\
  \n## Import 语句\n\n想象一下，在源代码中每次出现 `ReportGenerator` 时都必须重复指定 `tech.javajeff.report_generator.ReportGenerator`。Java\
  \ 提供了一种便捷的替代方案来省略冗长的包细节。这种替代方案就是 `import` 语句。\n\n*import* *语句*通过告诉编译器在编译期间在哪里查找*非限定*（无包前缀）类型名称，从而从包中导入类型。它出现在源文件的顶部附近，并且必须遵循以下语法：\n\
  \n```\n'import' 标识符 ('.' 标识符)]* '.' (类型名称 | '*') ';'\n```\n\n`import` 语句以保留字 `import`\
  \ 开头，后跟一个*标识符*，该标识符后面可选地跟一个由 `.` 分隔的*标识符*序列。接着是*类型名称*或 `*`（星号），并以 `;`（分号）结束该语句。\n\
  \n该语法揭示了 `import` 语句的两种形式。首先，你可以导入单个类型名称，通过*类型名称*标识。其次，你可以导入所有类型，通过 `*` 标识。\n\n\
  `*` 符号是一个*通配符*，代表所有非限定类型名称。它告诉编译器在 `import` 语句的包序列的最右侧包中查找此类名称，除非该类型名称在先前搜索的包中已找到。请注意，使用通配符不会导致性能损失或代码膨胀。但是，它可能导致名称冲突，你将会看到这一点。\n\
  \n例如，`import tech.javajeff.report_generator.ReportGenerator;` 告诉编译器，一个非限定的 `ReportGenerator`\
  \ 类存在于 `tech.javajeff.report_generator` 包中。类似地，`import tech.javajeff.report_generator.*;`\
  \ 告诉编译器，当遇到 `ReportGenerator` 名称、`Vehicle` 名称甚至 `Account` 名称时，在此包中查找。\n\n提示\n\n\
  在多程序员项目中工作时，避免使用 `*` 通配符，以便其他程序员可以轻松看到你的源代码中使用了哪些类型。\n\n使用 `import` 语句的通配符版本时，你可能会遇到名称冲突，因为任何非限定类型名称都会匹配通配符。例如，你有\
  \ `math` 和 `statistics` 包，每个包都包含一个 `Math` 类，源代码以 `import math.*;` 和 `import statistics.*;`\
  \ 语句开头，并且还包含一个非限定的 `Math` 出现。由于编译器不知道 `Math` 指的是 `math` 的 `Math` 类还是 `statistics`\
  \ 的 `Math` 类，它会报告错误。你可以通过使用正确的包名称限定 `Math`（`math.Math` 或 `statistics.Math`）来解决此问题。\n\
  \n为了避免 `import` 语句出现其他问题，你需要遵循几条规则：\n\n*   由于 Java 区分大小写，因此在 `import` 语句中指定的包和子包名称必须与\
  \ `package` 语句中使用的大小写一致。\n\n*   除了注释、`package` 语句、其他 `import` 语句和 `static import`\
  \ 语句（我将在本章后面介绍）之外，`import` 语句前面不能有任何内容。\n\n编译器会自动从 `java.lang` 库包中导入类型。因此，你不必在源代码中指定\
  \ `import java.lang.System;`（导入 `java.lang` 的 `System` 类）或类似的 `import` 语句。\n\n由于\
  \ Java 实现将包和子包名称映射到同名的目录，因此 `import` 语句等同于从与包序列对应的目录序列中加载引用类型的类文件。\n\n## 使用包进行实践\n\
  \n一个实际的例子将帮助你充分理解 `package` 和 `import` 语句。我将在日志库的上下文中演示这些语句，该库允许你将消息记录到控制台、文件或其他目标。\n\
  \n\n\n### 封装一个日志库\n\n假设你的应用程序需要将消息记录到控制台、文件或其他目标。借助日志库可以完成此任务。我实现的这个库包含一个名为 `Logger`\
  \ 的接口、一个名为 `LoggerFactory` 的抽象类，以及一对包级私有的类 `Console` 和 `File`。\n\n清单 10-1 展示了 `Logger`\
  \ 接口，它描述了记录消息的对象。\n\n```\npackage logging;\npublic interface Logger\n{\nboolean\
  \ connect();\nboolean disconnect();\nboolean log(String msg);\n}\n清单 10-1\nLogger.java\n\
  ```\n\n`connect()`、`disconnect()` 和 `log()` 方法在成功时返回 `true`，失败时返回 `false`。（第 11\
  \ 章将介绍一种更好的处理失败的技术。）这些方法没有显式声明为 `public`，因为接口的方法隐式是 `public` 的。\n\n清单 10-2 展示了 `LoggerFactory`\
  \ 抽象类。\n\n```\npackage logging;\npublic abstract class LoggerFactory\n{\npublic\
  \ final static int CONSOLE = 0;\npublic final static int FILE = 1;\npublic static\
  \ Logger newLogger(int dstType, String... dstName)\n{\nswitch (dstType)\n{\ncase\
  \ CONSOLE:\nreturn new Console(dstName.length == 0 ? null : dstName[0]);\ncase FILE:\n\
  return new File(dstName.length == 0 ? null : dstName[0]);\ndefault:\nreturn null;\n\
  }\n}\n}\n清单 10-2\nLoggerFactory.java\n```\n\n清单 10-2 中的 `LoggerFactory` 类存储在文件 `LoggerFactory.java`\
  \ 中。该清单以一条 `package` 语句开头，将 `logging` 标识为该类的包。\n\n`LoggerFactory` 被声明为 `public`，以便可以从其包外部引用。此外，它被声明为\
  \ `abstract`，因此无法实例化。\n\n注意\n\n一个源文件中只能出现一个 `public` 类或接口。此外，源文件必须根据该类或接口的名称命名。不满足任一要求都会导致编译器报告错误。\n\
  \n`newLogger()` 返回一个 `Logger` 实例，用于将消息记录到适当的目标。它使用可变参数特性（参见第 6 章）来可选地接受一个额外的 `String`\
  \ 参数，用于那些需要该参数的目标类型。例如，`FILE` 需要一个文件名。\n\n清单 10-3 展示了包级私有的 `Console` 类——该类无法被 `logging`\
  \ 包中的类之外的代码访问，因为保留字 `class` 前面没有保留字 `public`。\n\n```\npackage logging;\nclass Console\
  \ implements Logger\n{\nprivate String dstName;\nConsole(String dstName)\n{\nthis.dstName\
  \ = dstName;\n}\n@Override\npublic boolean connect()\n{\nreturn true;\n}\n@Override\n\
  public boolean disconnect()\n{\nreturn true;\n}\n@Override\npublic boolean log(String\
  \ msg)\n{\nSystem.out.println(msg);\nreturn true;\n}\n}\n清单 10-3\nConsole.java\n\
  ```\n\n`Console` 的包级私有构造函数保存其参数，该参数很可能是 `null` 引用，因为不需要 `String` 参数。也许未来的 `Console`\
  \ 版本会使用此参数来标识多个控制台窗口中的一个。\n\n清单 10-4 展示了包级私有的 `File` 类。\n\n```\npackage logging;\n\
  class File implements Logger\n{\nprivate String dstName;\nFile(String dstName)\n\
  {\nthis.dstName = dstName;\n}\n@Override\npublic boolean connect()\n{\nif (dstName\
  \ == null)\nreturn false;\nSystem.out.println(\"opening file \" + dstName);\nreturn\
  \ true;\n}\n@Override\npublic boolean disconnect()\n{\nif (dstName == null)\nreturn\
  \ false;\nSystem.out.println(\"closing file \" + dstName);\nreturn true;\n}\n@Override\n\
  public boolean log(String msg)\n{\nif (dstName == null)\nreturn false;\nSystem.out.println(\"\
  writing \" + msg + \" to file \" + dstName);\nreturn true;\n}\n}\n清单 10-4\nFile.java\n\
  ```\n\n与 `Console` 不同，`File` 需要一个非 `null` 的参数。每个方法首先验证此参数不为 `null`。如果参数为 `null`，则方法返回\
  \ `false` 表示失败。\n\n请完成以下步骤来构建此库：\n\n1.  在文件系统中选择一个合适的位置作为当前目录。\n\n2.  在当前目录中创建一个\
  \ `logging` 子目录。\n\n3.  将清单 10-1 和 10-2 分别复制到文件 `Logger.java` 和 `LoggerFactory.java`\
  \ 中；并将这些文件存储在 `logging` 子目录中。\n\n4.  将清单 10-3 和 10-4 分别复制到文件 `Console.java` 和 `File.java`\
  \ 中；并将这些文件存储在 `logging` 子目录中。\n\n5.  假设当前目录包含 `logging` 子目录，执行 `javac logging/*.java`\
  \ 来编译 `logging` 中的四个源文件。如果一切顺利，你应该会在 `logging` 子目录中发现 `Logger.class`、`LoggerFactory.class`、`Console.class`\
  \ 和 `File.class`。（或者，对于此示例，你可以切换到 `logging` 子目录并执行 `javac *.java`。）\n\n现在你已经创建了\
  \ `logging` 库，接下来就可以使用它了。我将在下一节中展示一个正确演示此库的小型 Java 应用程序。\n\n\n\n### 从日志库导入类型\n\n\
  日志库允许我们在应用程序中引入可移植的日志代码。除了调用 `newLogger()` 之外，无论日志输出目标是什么，这段代码都将保持不变。清单 10-5 展示了一个测试该库的应用程序。\n\
  \n```\nimport logging.Logger;\nimport logging.LoggerFactory;\nclass TestLogging\n\
  {\npublic static void main(String[] args)\n{\nLogger logger = LoggerFactory.newLogger(LoggerFactory.CONSOLE);\n\
  if (logger.connect())\n{\nlogger.log(\"test message #1\");\nlogger.disconnect();\n\
  }\nelse\nSystem.out.println(\"cannot connect to console-based logger\");\nlogger\
  \ = LoggerFactory.newLogger(LoggerFactory.FILE, \"messages.txt\");\nif (logger.connect())\n\
  {\nlogger.log(\"test message #2\");\nlogger.disconnect();\n}\nelse\nSystem.out.println(\"\
  cannot connect to file-based logger\");\nlogger = LoggerFactory.newLogger(LoggerFactory.FILE);\n\
  if (logger.connect())\n{\nlogger.log(\"test message #3\");\nlogger.disconnect();\n\
  }\nelse\nSystem.out.println(\"cannot connect to file-based logger\");\n}\n}\n清单\
  \ 10-5\nTestLogging.java\n```\n\n清单 10-5 没有以 `package` 语句开头，因为简单的应用程序通常不存储在包中。相反，它以一对\
  \ `import` 语句开头，用于导入日志库的 `Logger` 和 `LoggerFactory` 类。\n\n`main()` 方法首先使用 `LoggerFactory.CONSOLE`\
  \ 常量作为参数调用 `LoggerFactory` 的 `newLogger()` 方法，以创建一个将消息记录到控制台的日志记录器。该方法返回一个 `Logger`\
  \ 对象（即，由一个实现了 `Logger` 接口的类——在本例中是 `Console`——创建的日志记录器）。\n\n接着，该方法通过调用 `Logger`\
  \ 的 `connect()` 方法来连接此日志记录器。如果此方法返回 true，则表示连接成功（控制台连接会成功，但记录到文件时可能不会成功），然后 `main()`\
  \ 通过调用 `Logger` 的 `log()` 方法来记录一条消息。最后，它通过调用 `Logger` 的 `disconnect()` 方法断开与日志记录器的连接。\n\
  \n接下来，`main()` 方法重复此过程，创建一个基于文件的日志记录器，将消息记录到名为 `messages.txt` 的文件中。\n\n该过程第三次重复，尝试创建一个基于文件的日志记录器，将消息记录到一个未命名的文件。我们假设当没有文件名参数传递给\
  \ `newLogger()` 时，会使用一个默认名称——请记住，`newLogger()` 使用可变参数来获取文件名。\n\n`newLogger()` 方法被编码为不返回日志记录器，但你可以修改它，使其选择一个默认文件名。我这样编写是为了测试当\
  \ `newLogger()` 无法返回日志记录器时的代码。\n\n将清单 10-5 复制到一个名为 `TestLogging.java` 的文件中，并将此文件放在你之前创建的\
  \ `logging` 目录所在的同一目录中。然后，执行以下命令来编译 `TestLogging.java`（如果之前未编译，也会编译日志包的源文件）：\n\n\
  ```\njavac TestLogging.java\n```\n\n执行以下命令来运行 `TestLogging`：\n\n```\njava TestLogging\n\
  ```\n\n你应该会看到以下输出：\n\n```\ntest message #1\nopening file messages.txt\nwriting test\
  \ message #2 to file messages.txt\nclosing file messages.txt\ncannot connect to\
  \ file-based logger\n```\n\n假设 `TestLogging.java` 不在 `logging` 所在的同一目录中。你将如何编译此源文件并运行生成的应用程序？答案是使用类路径。\n\
  \n*类路径* 是 Java 虚拟机（JVM）搜索引用类型的一系列包。它通过用于启动 JVM 的 `-classpath`（或 `-cp`）选项指定，或者，当该选项不存在时，通过\
  \ `CLASSPATH` 环境变量指定。\n\n注意\n\n无论你是使用 `-classpath`/`-cp` 选项还是 `CLASSPATH` 环境变量来指定类路径，都必须遵循特定的格式。在\
  \ Windows 下，此格式表示为 *path1*`;`*path2*`;...`，其中 *path1*、*path2* 等是包目录的位置。在 Mac OS\
  \ X、Unix 和 Linux 下，此格式变为 *path1*`:`*path2*`:...`。\n\n假设（在 Windows 平台上）日志库存储在 `C:\\\
  logging` 中，而 `TestLogging.java` 存储在 `C:\\TestLogging` 中，这是当前目录。指定以下命令来编译源代码并运行应用程序：\n\
  \n```\njavac -cp ../logging TestLogging.java\njava -cp ../logging;. TestLogging\n\
  ```\n\n`../logging;.` 中 `;` 字符后的句点字符代表当前目录。必须指定它，以便 JVM 能够找到 `TestLogging.class`。\n\
  \n## 其他主题\n\n在使用包时，还有三个其他主题需要考虑：静态导入、受保护访问和 JAR 文件。\n\n\n\n### 静态导入\n\n接口应仅用于声明类型。它们不应被用来声明*常量接口*，即那些仅用于导出常量的接口。清单\
  \ 10-6 中的 `Openable` 常量接口就是一个例子。\n\n```\npackage demo;\npublic interface Openable\n\
  {\nboolean OPEN = true;\nboolean CLOSED = false;\n}\n清单 10-6\nOpenable.java\n```\n\
  \n程序员使用常量接口是为了避免在常量名称前加上其引用类型的名称（例如 `Integer.MAX_VALUE`）。例如，考虑清单 10-7 中的 `Door`\
  \ 类，它实现了 `Openable` 接口，这样程序员就可以直接指定常量 `OPEN` 和 `CLOSED`，而无需包含类前缀（如果它们是在类中声明的）。\n\
  \n```\npackage demo;\npublic class Door implements Openable\n{\nprivate boolean\
  \ state = CLOSED;\npublic void status()\n{\nSystem.out.println(\"door is \" + ((state\
  \ == CLOSED) ? \"CLOSED\" : \"OPEN\"));\n}\npublic void open()\n{\nstate = OPEN;\n\
  }\npublic void close()\n{\nstate = CLOSED;\n}\n}\n清单 10-7\nDoor.java\n```\n\n常量接口提供了在类实现中使用的常量。这些常量是实现细节，不应泄露到类的导出接口中，因为它们可能会混淆类的使用者。此外，为了保持二进制兼容性，即使类不再使用这些常量，你也必须继续支持它们。\n\
  \n为了满足对常量接口的需求，同时避免使用这些接口带来的问题，JDK 5 引入了*静态导入*。这个语言特性可用于导入引用类型的静态成员。它通过 `import\
  \ static` 语句实现，其语法如下所示：\n\n```\n'import' 'static' packagespec '.' typename '.' (\
  \ staticmembername | '*' );\n```\n\n该语句将 `static` 放在 `import` 之后，这使其与常规的 `import`\
  \ 语句区分开来。其语法在标准的以句点分隔的包名和子包名列表方面与常规的 `import` 语句类似。可以导入单个静态成员名称，也可以导入所有静态成员名称（得益于星号）。请考虑以下示例：\n\
  \n```\nimport static java.lang.Integer.*;         // 从 Integer 导入所有静态成员。\nimport\
  \ static java.lang.Integer.MAX_VALUE; // 仅导入 MAX_VALUE 静态常量。\nimport static java.lang.Integer.max;\
  \       // 仅导入 max() 静态方法。\n```\n\n一旦导入，静态成员就可以直接指定，而无需在其前面加上类型名称。例如，在指定了第一个或第三个静态导入之后，你可以直接指定\
  \ `max`，如 `int maxValue = max(10, 20);`。\n\n为了修复清单 10-7，使其不再依赖 `implements Openable`，我们可以插入一个\
  \ `静态导入`，如清单 10-8 所示。\n\n```\npackage demo;\nimport static demo.Openable.*;\npublic\
  \ class Door\n{\nprivate boolean state = CLOSED;\npublic void status()\n{\nSystem.out.println(\"\
  door is \" + ((state == CLOSED) ? \"CLOSED\" : \"OPEN\"));\n}\npublic void open()\n\
  {\nstate = OPEN;\n}\npublic void close()\n{\nstate = CLOSED;\n}\n}\n清单 10-8\nDoor.java\
  \ (版本 2)\n```\n\n清单 10-8 以 `package demo;` 语句开头，因为你不能从位于未命名包中的类型导入静态成员。这个包名作为后续\
  \ `import static demo.Openable.*;` 静态导入的一部分出现。\n\n关于静态导入，还有两点额外的注意事项：\n\n*   当两个静态导入导入了同名的成员时，编译器会报告错误。例如，假设包\
  \ `math` 包含一个 `Math` 类，它与包 `physics` 的 `Math` 类相同，都实现了相同的 `E` 常量和对数方法。当遇到以下代码片段时，编译器会报告错误，因为它无法确定访问的是\
  \ `math.Math` 的 `E` 常量还是 `physics.Math` 的 `E` 常量，以及调用的是哪个 `log()` 方法：\n\n*   过度使用静态导入可能会使你的代码难以阅读和维护，因为它会用你导入的所有静态成员污染代码的命名空间。此外，任何阅读你代码的人都可能难以找出静态成员来自哪个类型，尤其是在从一个类型导入所有静态成员名称时。\n\
  \n```\nimport static math.Math.*;\nimport static physics.Math.*;\nSystem.out.println(E);\n\
  System.out.println(log(2));\n```\n\n### 受保护访问\n\nJava 提供了 `protected` 关键字用于包上下文中。此关键字将受保护访问级别分配给类成员，例如字段或方法。将类成员声明为\
  \ `protected` 使得该成员可以被同一包中任何类的所有代码以及子类（无论其包如何）访问。\n\n类成员被赋予受保护访问权限，以便它们可以作为类实现的钩子。这使得程序员能够以更简单的方式编写高效的子类。关于更多信息，我建议你参考\
  \ Joshua Bloch 的著作 *Effective Java, Second Edition* ([`www.amazon.com/Effective-Java-2nd-Joshua-Bloch/dp/0321356683/`](http://www.amazon.com/Effective-Java-2nd-Joshua-Bloch/dp/0321356683/))\
  \ 中的“第 17 条：为继承而设计和编写文档，否则就禁止继承”。\n\n\n\n### JAR 文件\n\n通过指定创建必要目录结构的指令以及包的类文件（并说明哪些类文件应存储在哪些目录中）来分发包，是一项繁琐且容易出错的任务。幸运的是，JAR\
  \ 文件提供了一种更好的替代方案。\n\n*JAR（Java 归档）文件*是一个带有 `.jar` 文件扩展名（而非 `.zip` 扩展名）的 Zip 归档文件。它包含一个特殊的\
  \ `META-INF` 目录，其中包含 `manifest.mf`（一个存储 JAR 文件内容信息的特殊文件），以及一个组织类文件的层级目录结构。\n\n你可以使用\
  \ JDK 的 `jar` 工具来创建和维护 JAR 文件。你也可以查看 JAR 文件的目录结构。为了展示使用该工具有多么简单，我们将创建一个 `logging.jar`\
  \ 文件，用于存储 `logging` 包的内容。然后，在运行 `TestLogging.class` 时，我们将访问这个 JAR 文件。\n\n注意\n\n\
  如果你在 Windows 上尝试运行 `jar`，可能会发现一条错误消息，提示找不到 `jar`。这是因为 JDK 21 只将少数重要的可执行文件存储在一个特殊目录中，并在安装过程中将\
  \ `PATH` 环境变量设置为指向该目录。例如，在我编写本书所使用的 Windows 8.1 平台上，我的 `C:\\Program Files\\Common\
  \ Files\\Oracle\\Java\\javapath` 路径被添加到了 `PATH` 中。`javapath` 目录包含 `java.exe`、`javac.exe`\
  \ 以及其他几个常用的可执行文件。为了访问 `jar`（以及我可能想使用的任何其他 JDK 工具），我需要将 `C:\\Program Files\\java\\\
  jdk-21\\bin` 目录添加到 `PATH` 中。我可以通过指定 `set path=%path%;C:\\Program Files\\java\\jdk-21\\\
  bin` 来临时完成此操作。或者，我也可以使用 Windows 控制面板来永久设置。你应该在你的平台上执行类似的操作。\n\n按如下方式创建 `logging.jar`：\n\
  \n1.  确保当前目录包含之前创建的 `logging` 子目录，并且 `logging` 包含 `Logger.class`、`LoggerFactory.class`、`Console.class`\
  \ 和 `File.class`。\n\n2.  执行以下命令：\n\n    ```\n    jar cf logging.jar logging\\*.class\n\
  \    ```\n\n`c` 选项代表“创建新归档”，`f` 选项代表“指定归档文件名”。\n\n现在，你应该能在当前目录中找到 `logging.jar`\
  \ 文件。通过执行以下命令（其中 `t` 选项代表“列出目录结构”），向自己证明该文件包含这四个类文件：\n\n```\njar tf logging.jar\n\
  ```\n\n你可以通过将 `logging.jar` 添加到其类路径来运行 `TestLogging.class`。例如，假设 `logging.jar` 与\
  \ `TestLogging.class` 位于同一目录，你可以通过以下命令在 Windows 下运行 `TestLogging`：\n\n```\njava\
  \ -classpath logging.jar;. TestLogging\n```\n\n为方便起见，你可以使用更短的 `-cp` 来代替较长的 `-classpath`。\n\
  \n## 下一步是什么？\n\n正在执行的应用程序容易发生故障。故障以不同的形式出现。Java 将故障分为异常或错误。我们将在下一章中回顾这些故障类别，并探讨\
  \ Java 用于检测故障并采取适当措施处理故障的语言特性。\n\n"
- '# 11. 异常与错误


  在理想世界中，应用程序运行时永远不会发生任何坏事。例如，当应用程序需要打开文件时，该文件始终存在；应用程序始终能够连接到远程计算机；当应用程序需要实例化对象时，Java
  虚拟机（JVM）永远不会耗尽内存。


  相比之下，现实世界中的应用程序偶尔会尝试打开不存在的文件，尝试连接到无法与之通信的远程计算机，并且需要的内存超过 JVM 所能提供的。你的目标是编写能够正确响应这些以及其他异常情况（异常）的代码。


  本章将向你介绍异常和错误（异常的一种相关类型）。在定义这些术语之后，本章将探讨如何在源代码中表示异常和错误。然后，它将研究抛出和处理异常的主题，最后讨论如何在方法返回之前执行清理任务，无论是否抛出了异常。


  你将发现两个与异常相关的语句（`try` 和 `try`-`with`-`resources`）：


  *   `try` 语句包围一个可能抛出异常和错误的代码块。该语句的 `try` 块后面必须跟有处理这些异常的 `catch` 块组合，和/或一个用于执行清理任务的
  `finally` 块。


  *   `try`-`with`-`resources` 语句与 `try` 语句类似，但它允许你在执行离开 `try` 块时自动关闭任何已打开的资源。


  ## 什么是异常和错误？


  当 Java 程序的正常执行流程被意外行为中断时，程序就会发生故障。例如，程序尝试打开一个不存在的文件，或者尝试将整数除以 0。也许程序尝试创建一个非常大的数组，但没有足够的空闲内存来满足内存分配请求。


  Java 将故障分为异常或错误。*异常*是一种故障，其发生是由于程序无法控制的某些情况（例如尝试打开不存在的文件），或者是由于代码中的错误（尝试除以 0）。（换句话说，它是与正常执行流程的偏离。）在第一种情况下，无法阻止异常的发生，因此程序需要通过采取纠正措施来恢复。在第二种情况下，如果程序编写正确，异常就不会发生。


  *错误*是一种不可恢复的故障。许多错误与 JVM 有关，例如，内存耗尽或尝试加载损坏的类文件。有些错误与 JVM 无关，例如输入/输出错误或断言评估为假。（*断言*是一个布尔表达式，必须为真才能继续执行。）


  注意


  通常，不要处理错误，因为 JVM 可能无法从中恢复。例如，一旦内存耗尽，JVM 可能必须关闭。（异常处理程序可能会尝试释放一个占用大量内存的对象，但这可能不起作用。）此外，程序如何修复损坏的类文件？


  Java 将由外部因素（例如文件缺失）引起的异常归类为*受检异常*。Java 编译器会检查此类异常要么在发生处被*处理*（纠正），要么被记录为在其他地方处理。


  Java 将由有缺陷的代码引起的异常归类为*运行时异常*。这些异常应由程序员修复。因为编译器不检查运行时异常是否被处理或记录为在其他地方处理，所以你可以将运行时异常视为*非受检异常*。


  异常由*异常处理程序*处理，这些处理程序是响应异常并采取适当操作的代码序列。异常处理程序会查询上下文（例如，从异常发生时作用域内的变量中读取值），并利用获取的信息将
  Java 程序恢复到正常行为流程。例如，异常处理程序可能会读取一个已保存的文件名，并通过对话框提示用户替换缺失的文件（显示该文件名），然后关闭对话框。


  注意


  你可以修改程序来处理运行时异常，但更好的做法是修复源代码。运行时异常通常源于向库的方法传递无效参数；应修复有缺陷的调用代码。




  ## 在源代码中表示异常和错误


  异常在源代码中表示为错误码或对象。本节首先回顾每种表示方式，并解释为何对象更优越，然后介绍 Java 的异常类库。


  ### 错误码 vs. 对象


  C 等编程语言使用基于整数的*错误码*来表示失败及失败原因（异常）。以下是几个示例：


  ```

  FILE* fp = fopen("notes.txt", "rt");

  if (fp == NULL)

  {

  printf("无法打开文件\n");

  // 终止程序。

  }

  int handle = open("image.png", O_RDONLY);

  if (handle == -1)

  {

  printf("无法打开文件\n");

  // 终止程序。

  }

  ```


  C 语言的 `fopen()`（文件打开）函数在成功时返回一个指向 `FILE` 结构的非空指针（整数地址），失败时返回空（0）指针（由常量 `NULL` 表示）。类似地，C
  语言的 `open()` 函数在成功时返回一个非 -1 的整数，失败时返回 -1。


  错误码存在一些问题：


  *   整数毫无意义；它们无法描述所代表的异常。例如，-5 是什么意思？


  *   将上下文与错误码关联起来很别扭。例如，你可能想输出无法打开的文件的名称。你要把文件名存储在哪里？


  *   整数是任意的；在阅读源代码时，它们的选择可能导致混淆。例如，使用 `if (!chdir("C:\\windows"))`（`!` 表示“非”）而不是
  `if (chdir("C:\\windows"))` 来测试失败会更清晰。然而，0 被选为表示成功，因此必须指定 `if (chdir("C:\\temp"))`
  来测试失败。


  *   错误码太容易被忽略，这可能导致有缺陷的代码。例如，程序员可能会忽略 `if (fp == NULL)` 检查。如果不测试失败，当任一函数返回失败指示时，程序的行为就会不稳定。


  为了克服这些问题，人们发明了一种新的异常处理方法。这种方法将描述异常的对象与基于抛出和捕获这些对象的机制相结合：


  *   可以从一个具有有意义名称的类创建对象。例如，`java.io` 包中的 `FileNotFoundException` 类比 -5 更有意义。


  *   对象可以在各种字段中存储上下文。例如，你可以在对象的字段中存储消息、无法打开的文件的名称、解析操作失败的最新位置和/或其他项目。


  *   你不使用 `if` 语句来测试失败。相反，异常对象被抛给一个与程序代码分离的处理程序。因此，源代码更易于阅读，也更不容易出现缺陷。


  ### Throwable 类层次结构


  Java 在其引用类型库中提供了一个类层次结构，用于表示不同类型的异常。这些类以 `java.lang` 包中的 `Throwable` 类及其 `Exception`、`RuntimeException`
  和 `Error` 子类为根。（除非另有说明，本章介绍的所有类都位于 `java.lang` 中。）


  #### Throwable 类


  `Throwable` 是涉及异常和错误的最终超类。只有从 `Throwable` 及其子类创建的对象才能被抛出（并随后被捕获）。此类对象被称为*可抛出对象*。


  一个 `Throwable` 对象与一条描述异常或错误的详细信息相关联。提供了几个构造函数（包括此处描述的一对）来创建带有或不带详细信息的 `Throwable`
  对象：


  *   `Throwable()`：创建一个没有详细信息的 `Throwable`。此构造函数适用于没有上下文的情况。例如，你只想知道栈是空的还是满的。


  *   `Throwable(String message)`：创建一个以 `message` 作为详细信息的 `Throwable`。此消息可以输出给用户和/或记录到日志中。


  `Throwable` 提供了 `String getMessage()` 方法来返回详细信息。它还提供了其他有用的方法。


  #### Exception 类


  `Throwable` 有两个直接子类。其中一个子类是 `Exception`，它描述了由外部因素引起的异常（例如尝试读取一个不存在的文件）。`Exception`
  声明了与 `Throwable` 相同的构造函数（具有相同的参数列表）；每个构造函数都调用其对应的 `Throwable` 构造函数。此外，`Exception`
  继承了 `Throwable` 的方法。它没有声明任何新方法。


  Java 提供了许多直接继承 `Exception` 的异常类。以下是三个示例：


  *   `IOException`：表示发生了某种 I/O 故障。此类型位于 `java.io` 包中。


  *   `ParseException`：表示解析文本时发生了故障。此类型可以在 `java.text` 包中找到。


  *   `UnsupportedAudioFileException`：表示由于文件不包含可识别文件类型或格式的有效数据，导致面向音频的操作失败。请查看 `javax.sound.sampled`
  包以了解此类型。


  请注意，每个 `Exception` 子类的名称都以单词 `Exception` 结尾。这种约定使得识别类的用途变得容易。


  你通常会使用自己的异常类（其名称应以 `Exception` 结尾）来继承 `Exception`（或其子类之一）。以下是几个自定义子类的示例：


  ```

  public class StackFullException extends Exception

  {

  }

  public class EmptyCardReaderException extends Exception

  {

  private String cardReaderName;

  public EmptyCardReaderException(String message, String cardReaderName)

  {

  super(message);

  this.cardReaderName = cardReaderName;

  }

  public String getCardReaderName()

  {

  return cardReaderName;

  }

  }

  ```


  第一个示例描述了一个不需要详细信息的异常类。其默认的无参构造函数调用 `Exception()`，后者又调用 `Throwable()`。


  第二个示例描述了一个异常类，其构造函数需要一条详细信息和空读卡器的名称。该构造函数使用 `super(message);` 来调用 `Exception(String
  message)`，后者又调用 `Throwable(String message)`。


  从 `Exception` 或其子类（`RuntimeException` 或其子类除外）实例化的对象是受检异常。


  #### RuntimeException 类


  `Exception` 的直接子类是 `RuntimeException`，它描述了最可能由编写不佳的代码引起的异常。`RuntimeException` 声明了与
  `Exception` 相同的构造函数（具有相同的参数列表）；每个构造函数都调用其对应的 `Exception` 构造函数。此外，`RuntimeException`
  继承了 `Throwable` 的方法。它没有声明任何新方法。


  Java 提供了许多直接继承 `RuntimeException` 的异常类。以下是三个示例：


  *   `ArithmeticException`：表示非法的算术运算，例如尝试将整数除以 0


  *   `IllegalArgumentException`：表示在方法调用期间向方法传递了非法或不适当的参数


  *   `NullPointerException`：表示尝试通过空引用调用方法或访问对象字段


  从 `RuntimeException` 或其子类之一实例化的对象是非受检异常。




  #### 错误类


  `Throwable` 的另一个直接子类是 `Error`，它描述了一个严重的（甚至是异常的）问题（例如内存耗尽、JVM 栈溢出，或尝试加载一个找不到的类），一个合理的应用程序不应尝试处理这类问题。与
  `Exception` 类似，`Error` 声明了与 `Throwable` 相同的构造方法，继承了 `Throwable` 的方法，并且没有声明任何自己的方法。


  你可以根据类名以 `Error` 结尾的惯例来识别 `Error` 的子类。例如包括 `OutOfMemoryError`、`LinkageError` 和 `StackOverflowError`。


  你不应该尝试创建自己的 `Error` 子类，也不应该抛出或处理 `Error` 子类的对象。基于这些原因，本章关于 `Error` 的内容就到此为止。


  ## 抛出异常


  C 语言库函数通过将全局 `errno` 变量设置为错误码并返回一个失败码来通知调用代码发生了异常。相比之下，Java 方法则是抛出一个对象。本节将探讨这种抛出机制。


  ### Throw 语句


  Java 提供了 `throw` 语句来抛出一个描述异常的对象。虽然你可以使用此语句抛出一个错误，但通常不会这样做，因为程序无法从内存耗尽或其他灾难性事件中恢复。


  `throw` 语句的语法如下：


  ```

  throw throwable;

  ```


  `throwable` 标识的对象是 `Throwable` 或其任何子类的实例。然而，你通常只抛出从 `Exception` 或 `RuntimeException`
  子类实例化的对象。以下是几个例子：


  ```

  throw new ZipException("无法读取下一个 ZIP 文件条目" + filename);

  throw new ArrayIndexOutOfBoundsException("数组索引越界");

  ```


  该 throwable 对象从当前方法抛出给 JVM，JVM 会检查此方法是否有合适的处理器。如果未找到，JVM 会展开一个称为*方法调用栈*的数据结构，寻找能够处理该
  throwable 所描述异常的最接近的调用方法。如果找到该方法，JVM 会将 throwable 传递给该方法的处理器，并执行其代码来处理异常。如果没有找到任何方法能处理该异常，JVM
  会终止并输出一条合适的消息。


  你通常不会抛出 `RuntimeException`（它过于通用，没有实际意义）或其子类（如 `ArrayIndexOutOfBoundsException`，当你指定一个负数数组索引或一个大于等于数组长度的索引时会抛出该异常）的对象。相反，你应该修复导致异常的代码。然而，在库的上下文中检测到无效参数时，你可能想要抛出
  `IllegalArgumentException`：


  ```

  static double sqrt(double n)

  {

  if (n < 0)

  throw new IllegalArgumentException(n + " 是负数");

  // ...

  }

  ```


  假设你正在基于一个包含 `sqrt()` 方法的 `Math` 类构建一个库。因为你无法计算负数的平方根，所以首先检查这种可能性，并在传入负数时创建并抛出一个描述此问题的
  `IllegalArgumentException` 对象。


  ### Throws 子句


  当你从一个方法中抛出一个受检异常时，需要通知编译器。这可以通过在方法头部附加一个 `throws` 子句来实现。该子句的语法如下：


  ```

  ''throws'' 受检异常类名 ('','' 受检异常类名)*

  ```


  `throws` 子句由关键字 `throws` 后跟一个逗号分隔的列表组成，该列表包含从该方法抛出的受检异常的类名。示例如下：


  ```

  public static void main(String[] args) throws IOException

  {

  FileInputStream fis = new FileInputStream("x.dat");

  }

  ```


  此示例尝试打开一个名为 `x.dat` 的文件，并返回一个允许我们从该文件读取字节的输入流。（本章不讨论超出本章范围的文件和流。）但是，如果文件不存在或发生其他
  I/O 相关错误，`FileInputStream()` 构造方法将抛出 `IOException` 或其子类之一（例如 `java.io.FileNotFoundException`）。


  通过在调用 `main()` 方法的头部附加一个 `throws IOException` 子句，有必要告知编译器正在抛出一个来自受检的 `IOException`
  类（或其子类，它们也是受检的）的对象。毕竟，该异常并未在此方法中处理。当异常被抛出给 JVM 时，JVM 会注意到这一点，并且（因为没有 `main()` 的父方法）会输出一条消息后终止。


  在使用 `throws` 子句时，需要记住一些规则：


  *   如果可能，不要在 `throws` 子句中包含非受检异常类（例如 `ArithmeticException`）的名称。这些名称不需要包含，因为 `throws`
  子句仅用于受检异常。包含非受检类名只会使源代码变得混乱。


  *   你可以将 `throws` 子句附加到构造方法上，并在构造方法执行过程中出现问题时从中抛出一个受检异常。这样，结果对象将不会被创建。


  *   如果超类方法声明了 `throws` 子句，重写的子类方法不必声明 `throws` 子句。但是，如果子类方法声明了 `throws` 子句，则该子句不得包含超类方法的
  `throws` 子句中未包含的受检异常类名，除非它们是异常子类的名称。例如，给定超类方法 `void open(String name) throws IOException
  {}`，重写的子类方法可以声明为 `void open(String name) {}`、`void open(String name) throws IOException
  {}` 或 `void open(String name) throws FileNotFoundException {}`。但是，你不能在子类中指定 `void
  open(String name) throws ClassNotFoundException`，因为 `ClassNotFoundException` 没有出现在超类的
  `throws` 子句中。


  *   当受检异常的超类名称出现在 `throws` 子句中时，该受检异常类名无需再出现。例如，你不需要指定 `throws FileNotFoundException,
  IOException`。只需要 `throws IOException` 即可。


  *   当一个方法抛出一个受检异常，但既没有处理该异常，也没有在其 `throws` 子句中列出该异常时，编译器会报告错误。


  *   你可以在方法的 `throws` 子句中声明一个受检异常类名，而不从该方法中抛出该类的实例。（也许该方法尚未完全编码。）然而，Java 要求你提供代码来处理此异常，即使它没有被抛出。


  还有一条规则需要考虑。有时，一个方法会抛出许多受检异常，人们很容易为了节省敲击键盘的次数而指定一个 `throws Exception` 子句。虽然只指定 `Exception`
  可以节省时间，但这会使源代码的可读性降低。阅读你代码的人可能难以识别所有传递给调用者的受检异常。我建议仅在私有的临时代码中遵循这种做法。


  ## Try 语句


  `try` 语句包围了一段可能抛出异常和错误的代码块。该语句的 `try` 块后面必须跟一个或多个用于处理这些异常的 `catch` 块，和/或一个用于执行清理任务的
  `finally` 块。




  ### try 块


  `try` 块的语法如下：


  ```

  ''try''

  {

  // 一个或多个可能抛出异常的语句

  }

  ```


  `try` 块中的语句服务于一个共同目的，并且可能直接或间接抛出异常。请看以下示例：


  ```

  FileInputStream fis = null;

  FileOutputStream fos = null;

  try

  {

  fis = new FileInputStream(args[0]);

  fos = new FileOutputStream(args[1]);

  int c;

  while ((c = fis.read()) != -1)

  fos.write(c);

  }

  ```


  此示例摘自一个更大的 `Copy` 应用程序（本章稍后将完整展示），该程序用于将源文件复制到目标文件。它使用了 `java.io` 包中的 `FileInputStream`
  和 `FileOutputStream` 类（我尚未正式介绍它们）。你可以将 `FileInputStream` 理解为从文件读取字节输入流的方式，将 `FileOutputStream`
  理解为向文件写入字节输出流的方式。


  `FileInputStream(String filename)` 构造函数会创建一个指向由 `file name` 标识的文件的输入流。当文件不存在、指向一个目录或发生其他相关问题时，此构造函数会抛出
  `FileNotFoundException`。`FileOutputStream(String filename)` 构造函数会创建一个指向由 `file name`
  标识的文件的输出流。当文件存在但指向一个目录、文件不存在且无法创建，或发生其他相关问题时会抛出 `FileNotFoundException`。


  `FileInputStream` 声明了一个 `int read()` 方法，用于读取一个字节并将其作为 32 位整数返回。此方法在文件结束时返回 -1。`FileOutputStream`
  提供了一个 `void write(int b)` 方法，用于写入 `b` 的低 8 位中的字节。当出现问题时，这两个方法都会抛出 `IOException`。


  该示例的主体是一个 `while` 循环，它反复从输入流读取下一个字节，并将该字节写入输出流，直到 `read()` 指示文件结束。


  ### catch 块


  `try` 块后面通常跟着一个或多个 `catch` 块，用于处理不同类型的异常。`catch` 块的语法如下：


  ```

  ''catch'' ''('' throwableType throwableObject '')''

  ''{''

  // 一个或多个处理异常的语句

  ''}''

  ```


  `catch` 块类似于构造函数，因为它有一个参数列表且没有返回类型。然而，此列表仅包含一个参数，该参数是一个 *throwableType*（`Throwable`
  或其子类之一），后跟一个用于该类型对象的 *throwableObject* 标识符。


  当异常发生时，会创建一个可抛出对象并将其抛出给 JVM，JVM 会搜索最近的 `catch` 块，该块的参数类型直接匹配或是该可抛出对象的超类型。当找到此块时，JVM
  会将可抛出对象传递给参数并执行 `catch` 块的语句，这些语句可以查询传递的可抛出对象并以其他方式处理异常。请看以下示例：


  ```

  catch (FileNotFoundException fnfe)

  {

  System.out.println(fnfe.getMessage());

  }

  ```


  此示例（扩展了之前的 `try` 块示例）描述了一个 `catch` 块，它捕获并处理类型为 `FileNotFoundException` 的可抛出对象。只有匹配此类型或其子类型的可抛出对象才会被此块捕获。


  假设 `FileInputStream(String filename)` 构造函数抛出了 `FileNotFoundException`。JVM 会检查 `try`
  后面的 `catch` 块，看其参数类型是否与可抛出对象类型匹配。检测到匹配后，JVM 将可抛出对象的引用传递给 `fnfe`，并将执行权转移到该块。该块通过调用
  `getMessage()` 来检索异常消息，然后将其输出。


  `catch` 块可能无法完全处理异常——也许它需要访问方法调用栈中某个祖先方法提供的信息。如果它可以部分处理异常，则 `catch` 块应以重新抛出异常结束，以便祖先处理器完成处理。另一种可能性是记录异常（供后续分析），然后重新抛出，如下所示：


  ```

  catch (FileNotFoundException fnfe)

  {

  logger.log(fnfe);

  throw fnfe;

  }

  ```


  #### 多个 catch 块


  你可以在一个 `try` 块后指定多个 `catch` 块。例如，考虑上述 `Copy` 应用程序中更大的一个片段：


  ```

  FileInputStream fis = null;

  FileOutputStream fos = null;

  try

  {

  fis = new FileInputStream(args[0]);

  fos = new FileOutputStream(args[1]);

  int c;

  while ((c = fis.read()) != -1)

  fos.write(c);

  }

  catch (FileNotFoundException fnfe)

  {

  System.out.println(fnfe.getMessage());

  }

  catch (IOException ioe)

  {

  System.out.println("I/O error: " + ioe.getMessage());

  }

  ```


  第一个 `catch` 块处理从任一构造函数抛出的 `FileNotFoundException`。第二个 `catch` 块处理从 `read()` 和 `write()`
  方法抛出的 `IOException`。


  当指定多个 `catch` 块时，不要在子类型的 `catch` 块之前指定超类型的 `catch` 块。例如，不要将 `catch (IOException
  ioe)` 放在 `catch (FileNotFoundException fnfe)` 之前。如果这样做，编译器会报告错误，因为 `catch (IOException
  ioe)` 也会处理 `FileNotFoundException`，而 `catch (FileNotFoundException fnfe)` 将永远没有机会执行。


  注意


  不要指定具有相同可抛出类型的多个 `catch` 块。例如，不要指定两个 `catch (IOException ioe) {}` 块。否则，编译器会报告错误。


  JDK 7 使得在单个 `catch` 块中捕获多个异常成为可能。你可以指定一个以竖线分隔的异常类型列表，然后指定参数名称，该参数是 `final` 的（你不能在
  `catch` 块中为该参数赋值）。请看以下示例，其中 `ex` 可能包含 `FileNotFoundException` 引用或 `IOException`
  引用：


  ```

  catch (FileNotFoundException | IOException ex)

  ```


  ### finally 块


  无论异常是否被处理，你可能都需要执行清理任务，例如关闭打开的文件。Java 为此提供了 `finally` 块。


  `finally` 块由关键字 `finally` 后跟一个用大括号括起来的语句序列组成，这些语句将被执行。其语法表示如下：


  ```

  ''finally''

  ''{''

  // 一个或多个执行清理任务的语句

  ''}''

  ```


  `finally` 块可以出现在最后一个 `catch` 块之后，或者 `try` 块之后。




  #### 在 Try-Catch-Finally 上下文中进行清理


  当资源必须被清理，且异常不会从方法中抛出时，`finally` 块会被放置在最后一个 `catch` 块之后。清单 11-1 演示了这一点，它展示了 `Copy`
  应用程序的第一个版本。


  ```

  import java.io.*;

  public class Copy

  {

  public static void main(String[] args)

  {

  FileInputStream fis = null;

  FileOutputStream fos = null;

  try

  {

  fis = new FileInputStream(args[0]);

  fos = new FileOutputStream(args[1]);

  int c;

  while ((c = fis.read()) != -1)

  fos.write(c);

  }

  catch (FileNotFoundException fnfe)

  {

  System.out.println(fnfe.getMessage());

  }

  catch (IOException ioe)

  {

  System.out.println("I/O error: " + ioe.getMessage());

  }

  finally

  {

  if (fis != null)

  try

  {

  fis.close();

  }

  catch (IOException ioe)

  {

  // ignore exception

  }

  if (fos != null)

  try

  {

  fos.close();

  }

  catch (IOException ioe)

  {

  // ignore exception

  }

  }

  }

  }

  清单 11-1

  Copy.java

  ```


  如果 `try` 块执行时没有发生异常，执行流程会传递到 `finally` 块以关闭文件输入/输出流。如果抛出了异常，则在相应的 `catch` 块执行完毕后，`finally`
  块会执行。


  `FileInputStream` 和 `FileOutputStream` 继承了一个 `void close()` 方法，当流无法关闭时，该方法会抛出 `IOException`。因此，我将
  `fis.close();` 和 `fos.close();` 分别包裹在 `try` 块中。我将关联的 `catch` 块留空，以说明忽略异常这一常见错误。


  一个被相应的可抛出对象调用但为空的 `catch` 块，无法报告该异常。你可能会浪费大量时间追踪异常的原因，最后才发现，如果这个空的 `catch` 块报告了异常（哪怕只是在日志中），你本可以更早地检测到它。


  按如下方式编译清单 11-1：


  ```

  javac Copy.java

  ```


  按如下方式运行应用程序：


  ```

  java Copy Copy.java Copy.bak

  ```


  如果一切顺利，你应该会在当前目录中发现一个 `Copy.bak` 文件，其大小和内容与 `Copy.java` 的大小和内容相匹配。


  #### 在 Try-Finally 上下文中进行清理


  当资源必须被清理，且异常会从方法中抛出时，`finally` 块会被放置在 `try` 块之后：此时没有 `catch` 块。请考虑清单 11-2，它展示了 `Copy`
  应用程序的第二个版本。


  ```

  import java.io.*;

  public class Copy

  {

  public static void main(String[] args)

  {

  if (args.length != 2)

  {

  System.out.println("usage: java Copy srcfile dstfile");

  return;

  }

  try

  {

  copy(args[0], args[1]);

  }

  catch (IOException ioe)

  {

  System.out.println("I/O error: " + ioe.getMessage());

  }

  }

  static void copy(String srcFile, String dstFile) throws IOException

  {

  FileInputStream fis = null;

  FileOutputStream fos = null;

  try

  {

  fis = new FileInputStream(srcFile);

  fos = new FileOutputStream(dstFile);

  int c;

  while ((c = fis.read()) != -1)

  fos.write(c);

  }

  finally

  {

  if (fis != null)

  try

  {

  fis.close();

  }

  catch (IOException ioe)

  {

  System.out.println(ioe.getMessage());

  }

  if (fos != null)

  try

  {

  fos.close();

  }

  catch (IOException ioe)

  {

  System.out.println(ioe.getMessage());

  }

  }

  }

  }

  清单 11-2

  Copy.java (版本 2)

  ```


  文件复制逻辑已被移入一个 `copy()` 方法。该方法旨在向调用者报告异常，但它会首先关闭每个已打开的文件。


  此方法的 `throws` 子句仅列出了 `IOException`。没有必要包含 `FileNotFoundException`，因为 `FileNotFoundException`
  是 `IOException` 的子类。


  再次强调，`finally` 子句为了关闭两个文件而呈现了大量代码。在下一节中，我将介绍 `try`-`with`-`resources` 语句，它消除了显式关闭这些文件的需要。


  按如下方式编译清单 11-2：


  ```

  javac Copy.java

  ```


  按如下方式运行应用程序：


  ```

  java Copy Copy.java Copy.bak

  ```


  如果一切顺利，你应该会在当前目录中发现一个 `Copy.bak` 文件，其大小和内容与 `Copy.java` 的大小和内容相匹配。


  ## Try-with-resources 语句


  我之前提到过，资源（实际上是它们所依赖的系统资源）会在 `finally` 块中被释放。这可能导致编写繁琐的样板代码，例如前面展示的文件关闭代码。


  这些样板代码不仅增加了类文件的体积，编写时的繁琐还可能导致错误，甚至可能忘记关闭文件。JDK 7 引入了 `try`-`with`-`resources` 来克服这个问题。


  `try`-`with`-`resources` 语句类似于 `try` 语句，但它允许你在执行离开 `try` 块时自动关闭任何已打开的资源。示例包括打开的文件、数据库连接、网络套接字以及其他依赖于相关系统资源（如文件句柄）的资源。其语法如下：


  ```

  ''try'' ''('' 资源获取语句 '')''

  ''{''

  // 资源使用

  ''}''

  ```


  `try` 关键字通过一个分号分隔的资源获取语句列表进行参数化，每个语句获取一个资源。每个获取的资源对 `try` 块可用，并在执行离开此主体时自动关闭。与常规的
  `try` 语句不同，`try`-`with`-`resources` 不要求 `try()` 后面必须跟 `catch` 块和/或 `finally` 块，尽管它们可以被指定。请考虑以下面向文件的示例：


  ```

  try (FileInputStream fis = new FileInputStream("notes.txt"))

  {

  // 使用 fis 和底层文件资源执行某些操作

  }

  ```


  在此示例中，获取了一个指向底层文件资源 (`notes.txt`) 的输入流。`try` 块对该资源执行某些操作，并且在退出 `try` 块时，流（和文件）会被关闭。


  清单 11-3 通过使用 `try`-`with`-`resources` 自动关闭打开的文件并消除样板代码，改进了清单 11-2 中的 `Copy` 应用程序。


  ```

  import java.io.FileInputStream;

  import java.io.FileNotFoundException;

  import java.io.FileOutputStream;

  import java.io.IOException;

  public class Copy

  {

  public static void main(String[] args)

  {

  if (args.length != 2)

  {

  System.err.println("usage: java Copy srcfile dstfile");

  return;

  }

  try

  {

  copy(args[0], args[1]);

  }

  catch (IOException ioe)

  {

  System.err.println("I/O error: " + ioe.getMessage());

  }

  }

  static void copy(String srcFile, String dstFile) throws IOException

  {

  try (FileInputStream fis = new FileInputStream(srcFile);

  FileOutputStream fos = new FileOutputStream(dstFile))

  {

  int c;

  while ((c = fis.read()) != -1)

  fos.write(c);

  }

  }

  }

  清单 11-3

  Copy.java (版本 3)

  ```


  `copy()` 方法使用 `try`-`with`-`resources` 来管理源文件和目标文件资源。`try` 后面圆括号内的代码尝试为这些文件创建文件输入和输出流。假设创建成功，其主体执行，将源文件复制到目标文件。


  无论是否抛出异常，`try`-`with`-`resources` 都能确保在执行离开 `try` 块时两个文件都被关闭。由于前面展示的样板文件关闭代码不再需要，清单
  11-3 中的 `copy()` 方法更加简单且易于阅读。


  按如下方式编译清单 11-3：


  ```

  javac Copy.java

  ```


  按如下方式运行应用程序：


  ```

  java Copy Copy.java Copy.bak

  ```


  如果一切顺利，你应该会在当前目录中发现一个 `Copy.bak` 文件，其大小和内容与 `Copy.java` 的大小和内容相匹配。


  ## 接下来是什么？


  到目前为止，我们的重点主要放在语言语法上。在本书的其余部分，我们将主要关注 Java 引用类型库中的 API。第 12 章将从查看 `Math` 和相关类开始。




  '
- '# 12. 数学、BigDecimal 和 BigInteger


  数学运算是计算的重要组成部分。你在第 3 章学习了基本的数学运算符（例如加法和乘法）。Java 还在 `java.lang` 包中提供了 `Math` 类，并在
  `java.math` 包中提供了 `BigDecimal` 和 `BigInteger` 类。本章将向你介绍这些类。


  ## Math


  `Math` 类通过有用的 `static` 常量和方法来增强基本数学运算符的功能。本节将介绍这些常量，并探讨其中一些方法。


  注意


  你可能对配套的 `java.lang.StrictMath` 类感兴趣。`StrictMath` 看起来与 `Math` 相同，但它更严格地定义了各种数学运算，使其在平台之间
  100% 可移植。请查阅 `Math` 的 JDK 文档以了解更多关于 `StrictMath` 的信息。


  Java 还提供了 `strictfp`（严格浮点）关键字，用作类和方法的修饰符。它是在 Java 1.2 版本中引入的，用于限制浮点计算并确保在每个平台上得到相同的结果。然而，它已不再被使用（参见
  [`http://en.wikipedia.org/wiki/Strictfp`](http://en.wikipedia.org/wiki/Strictfp)）。


  ### Math 常量


  JDK 21 的 `Math` 类声明了三个常量：


  *   `E`：最接近 e（自然对数的底数）的 `double` 值。

  *   `PI`：最接近 pi（π，圆的周长与其直径之比）的 `double` 值。

  *   `TAU`：最接近 tau（τ，圆的周长与其半径之比）的 `double` 值。


  `PI` 常量在计算圆的周长和面积时非常有用。清单 12-1 展示了一个执行此操作的 `Circle` 应用程序。


  ```

  public class Circle

  {

  public static void main(String[] args)

  {

  if (args.length != 1)

  {

  System.out.println("usage: java Circle diameter");

  return;

  }

  double diameter = Double.parseDouble(args[0]);

  System.out.println("Diameter: " + diameter);

  System.out.println("Circle area: " + Math.PI * diameter);

  double radius = diameter / 2;

  System.out.println("Circle circumference: " +

  Math.PI * radius * radius);

  }

  }

  清单 12-1

  Circle.java

  ```


  `Circle` 接受一个命令行参数，该参数指定圆的直径。我利用 `java.lang.Double` 类的 `parseDouble()` 方法将基于字符串的直径解析为
  `double`。`Circle` 的其余部分不言自明。


  注意


  `Double` 是*包装类*的一个例子，因为 `Double` 对象将自身包裹在一个双精度浮点值周围。包装类的其他示例包括 `Long`、`Character`
  和 `Float`。


  包装类将基于原始类型的值转换为可以存储在容器对象中的对象，例如由 Java 集合框架中的容器类型（`ArrayList`、`TreeSet`、`HashMap`
  等）创建的对象。为简洁起见，我对包装类着墨不多，并且不在本书中讨论 Java 的集合框架。


  `Double` 和其他包装类也包含有用的实用方法。`Double` 的 `parseDouble()` 方法就是一个例子。


  按如下方式编译清单 12-1：


  ```

  javac Circle.java

  ```


  按如下方式运行生成的 `Circle.class` 应用程序：


  ```

  java Circle 10

  ```


  你应该会看到以下输出：


  ```

  Diameter: 10.0

  Circle area: 31.41592653589793

  Circle circumference: 78.53981633974483

  ```


  ### 三角函数方法


  `Math` 声明了几个用于执行三角运算的方法。考虑以下用于获取角度的余弦、正弦和正切的重载三角函数方法：


  *   `double cos(double a)`

  *   `double sin(double a)`

  *   `double tan(double a)`


  对于每个方法，传递给 `a` 的角度必须以弧度表示。


  我创建了一个 `Graph` 应用程序来演示 `cos()` 和 `sin()`。`Graph` 在控制台上显示余弦波和正弦波的图形。清单 12-2 展示了其源代码。


  ```

  public class Graph

  {

  final static int ROWS = 27; // 必须为奇数

  final static int COLS = 50;

  public static void main(String[] args)

  {

  char[][] screen = new char[ROWS][COLS];

  double scaleX = COLS / 360.0;

  // 在缓冲区中绘制正弦波和余弦波。

  for (int degree = 0; degree < 360; degree++)

  {

  double radian = Math.toRadians(degree);

  int row = (int) Math.round(ROWS / 2 *

  Math.cos(radian)) + ROWS / 2;

  int col = (int) (degree * scaleX);

  screen[row][col] = ''C'';

  row = (int) Math.round(ROWS / 2 *

  Math.sin(radian)) + ROWS / 2;

  screen[row][col] = screen[row][col] == ''C'' ? ''*'' : ''S'';

  }

  // 将缓冲区输出到控制台。

  for (int row = ROWS - 1; row >= 0; row--)

  {

  for (int col = 0; col < COLS; col++)

  System.out.print(screen[row][col]);

  System.out.println();

  }

  }

  }

  清单 12-2

  Graph.java

  ```


  清单 12-2 中的 `Graph` 类首先引入了常量 `COLS` 和 `ROWS`，它们指定了用作离屏缓冲区来存储图形的表格尺寸。`ROWS` 必须赋值为奇数；否则，会抛出
  `java.lang.ArrayIndexOutOfBoundsException`。当某个 `row` 计算产生的值等于 `ROWS` 时，就会发生此异常：`row`
  只能取从 `0` 到 `ROWS - 1` 的值。此外，使用奇数行数会使图形看起来更好。


  注意


  `Graph` 演示了尽可能使用常量的价值。源代码更易于维护，因为你只需在一个地方更改常量的值，而无需在整个源代码中更改每个对应的值。


  `main()` 方法首先创建 `screen`，这是一个二维数组，用作存储图形的离屏缓冲区。图形在缓冲区中绘制，然后复制到控制台，因为无法在控制台上定位光标。


  接下来，`main()` 方法计算一个水平缩放值，用于水平缩放每个正弦波和余弦波，以便代表度数的 360 个水平位置能够适应 `NCOLS` 指定的列数。


  然后，`main()` 进入一个 `for` 循环，对于每个正弦波和余弦波，为每个度数创建（行，列）坐标，并在这些坐标处为 screen 数组赋值。字符 `C`
  表示余弦波，`S` 表示正弦波，`*` 表示波相交的位置。


  行计算调用 `Math` 的 `double toRadians(double angdeg)` 方法，将其角度参数从度转换为弧度，这是 `sin()` 和 `cos()`
  方法所要求的。这些方法返回的值范围从 -1 到 1，然后乘以 `ROWS / 2`，以将该值缩放到 `screen` 数组行数的一半。


  通过 `Math` 的 `long round(double a)` 方法将结果四舍五入到最接近的长整数后，`main()` 通过 `(int)` 强制转换将此长整数转换为
  `int`。将该 `int` 值加到 `ROWS / 2` 上，以偏移行坐标，使其相对于数组的中间行。列计算更简单，将度数乘以水平缩放因子。


  最后，`main()` 方法通过一对嵌套的 `for` 循环将 `screen` 数组转储到控制台。外层的 `for` 循环垂直反转数组，使其正立显示——第 0
  行应该最后输出。


