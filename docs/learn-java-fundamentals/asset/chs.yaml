  ## 下一步是什么？


  Java 提供了不常见的语言特性，用于在其他类甚至块中声明类。此外，你还可以声明匿名类。第 9 章将向你介绍这些奇特的特性。


  '
- '# 9. 静态类、非静态类、局部类和匿名类


  到目前为止我所介绍的类被称为*顶层类*。它们不属于另一个类或结构。然而，Java 也允许你在其他类、*块*（位于 `{` 和 `}` 字符之间的零个或多个语句的集合）以及表达式上下文中声明类。


  在其他类中声明的类被称为*嵌套类*。嵌套类有两种：静态类和非静态类。（非静态类也称为*内部类*）。


  注意


  Java 教程中关于嵌套类的教程（[`http://docs.oracle.com/javase/tutorial/java/javaOO/nested.xhtml`](http://docs.oracle.com/javase/tutorial/java/javaOO/nested.xhtml)）给出了使用嵌套类的三个令人信服的理由：


  *   **“这是一种对仅在一个地方使用的类进行逻辑分组的方式**：如果一个类只对另一个类有用，那么将其嵌入到那个类中并将两者放在一起是合乎逻辑的。嵌套这样的“辅助类”可以使它们的包参见第
  [10 章关于包的介绍]更加精简。


  *   **它增加了封装性**：考虑两个顶层类 `A` 和 `B`，其中 `B` 需要访问 `A` 的成员，而这些成员原本会被声明为 `private`。通过将类
  `B` 隐藏在类 `A` 内部，`A` 的成员可以被声明为 `private`，而 `B` 可以访问它们。此外，`B` 本身也可以对外部世界隐藏。


  *   **它可以带来更具可读性和可维护性的代码**：将小类嵌套在顶层类中，可以使代码更靠近其使用位置。”


  在块中声明的类被称为*局部类*。在表达式上下文中声明的类被称为*匿名类*。


  本章将向你介绍静态类、内部类、局部类和匿名类。




  ## 静态类


  第 6 章向你介绍了静态字段、静态方法、静态字段初始化器和静态初始化块。这些实体与对应的非静态字段、非静态方法、非静态字段初始化器和非静态初始化块的区别在于，它们涉及
  `static` 关键字。


  你可以在类中声明这些静态成员。你也可以在类中声明带有 `static` 关键字的类。这种嵌套类被称为*静态类*。以下示例阐明了这种组织方式：


  ```

  class C

  {

  static int f; // 字段可以被显式初始化

  static void m()

  {

  // 方法代码

  }

  static // 静态初始化块

  {

  // 初始化块代码

  }

  static class SC

  {

  // 静态类的成员

  }

  }

  ```


  此示例引入了顶层类 `C`，其中包含静态字段 `f`、静态方法 `m()`、一个静态初始化块以及静态类 `SC`。请注意，`SC` 是 `C` 的一个成员，就像
  `f`、`m()` 和静态初始化块是该类的成员一样。它们都属于类 `C`，而 `C` 是一个*封闭类*——`SC` 是一个*被封闭类*。


  静态类，如同静态方法和静态字段一样，与其封闭类相关联。并且与静态方法类似，静态类不能直接访问封闭类的非静态字段，也不能调用其非静态方法。它只能通过对象引用来访问它们。然而，它可以访问封闭类的静态字段并调用其静态方法。


  注意


  静态类与其封闭类（以及其他类）的非静态成员的交互方式，与任何其他顶层类完全相同。本质上，静态类的行为就像一个为了打包方便而被嵌套在另一个顶层类中的顶层类。


  作为顶层类的一个成员，静态类可以被声明为 `private`、`public`、`protected`，或者保持包级私有（默认）。相比之下，顶层类只能被声明为
  `public` 或保持包级私有。（第 10 章将向你介绍包。）


  清单 9-1 声明了一个 `EnclosingClass`，其中包含一个 `EnclosedClass`，该封闭类演示了对 `EnclosingClass` 成员的访问。


  ```

  class EnclosingClass

  {

  private static String msg1;

  private static void enclosingMethod1()

  {

  System.out.println(msg1);

  }

  private String msg2;

  private void enclosingMethod2()

  {

  System.out.println(msg2);

  }

  static class EnclosedClass

  {

  static void enclosedMethod1()

  {

  msg1 = "called from EnclosedClass''s enclosingMethod1() method";

  enclosingMethod1();

  }

  void enclosedMethod2()

  {

  System.out.println("unable to access msg2 or call enclosingMethod2()");

  // msg2 = "called from EnclosedClass''s enclosingMethod2() method";

  // enclosingMethod2();

  }

  }

  }

  清单 9-1

  EnclosingClass.java

  ```


  清单 9-1 声明了一个名为 `EnclosingClass` 的顶层类，其中包含静态字段 `msg1`、静态方法 `enclosingMethod1()`、非静态字段
  `msg2`、非静态方法 `enclosingMethod2()` 以及静态类 `EnclosedClass`。被封闭类声明了静态方法 `enclosedMethod1()`
  和非静态方法 `enclosedMethod2()`。有两点需要注意：


  *   `enclosedMethod1()` 能够访问 `EnclosingClass` 的 `msg1` 字段并调用其 `enclosingMethod1()`
  方法，即使两者都被声明为 `private`。

  *   `enclosedMethod2()` 无法访问 `EnclosingClass` 的 `msg2` 字段并调用其 `enclosingMethod2()`
  方法，因为无法从静态上下文中访问封闭类中的非静态字段和非静态方法。


  清单 9-2 展示了一个 `SCDemo` 应用程序类的源代码，该类演示了如何调用 `EnclosedClass` 的 `enclosedMethod1()`
  静态方法。它还演示了如何实例化 `EnclosedClass` 并调用其 `enclosedMethod2()` 非静态方法。


  ```

  class SCDemo

  {

  public static void main(String[] args)

  {

  EnclosingClass.EnclosedClass.enclosedMethod1();

  EnclosingClass.EnclosedClass ec = new EnclosingClass.EnclosedClass();

  ec.enclosedMethod2();

  }

  }

  清单 9-2

  SCDemo.java

  ```


  清单 9-2 的 `main()` 方法首先展示了，要调用静态方法，必须在被封闭类的名称前加上其封闭类的名称。然后展示了，在实例化被封闭类时，必须在其名称前加上封闭类的名称。之后，你就可以像平常一样调用非静态方法了。


  按如下方式编译这两个清单：


  ```

  javac *.java

  ```


  按如下方式运行生成的应用程序：


  ```

  java SCDemo

  ```


  你应该会看到以下输出：


  ```

  called from EnclosedClass''s enclosingMethod1() method

  unable to access msg2 or call enclosingMethod2()

  ```




  ### 一个更实用的静态类示例


  `SCDemo` 让你有机会学习如何使用静态类，但让我们考虑一个更实际的例子。我创建了一个小型 `Rectangle` 类（在图形上下文中很有用），它受益于一对静态类。清单
  9-3 展示了 `Rectangle` 的源代码。


  ```

  abstract class Rectangle

  {

  static class Float extends Rectangle

  {

  float x, y, w, h;

  Float()

  {

  }

  Float(float x, float y, float w, float h)

  {

  this.x = x;

  this.y = y;

  this.w = w;

  this.h = h;

  }

  @Override

  double getX()

  {

  return x;

  }

  @Override

  double getY()

  {

  return y;

  }

  @Override

  double getW()

  {

  return w;

  }

  @Override

  double getH()

  {

  return h;

  }

  }

  static class Double extends Rectangle

  {

  double x, y, w, h;

  Double()

  {

  }

  Double(double x, double y, double w, double h)

  {

  this.x = x;

  this.y = y;

  this.w = w;

  this.h = h;

  }

  @Override

  double getX()

  {

  return x;

  }

  @Override

  double getY()

  {

  return y;

  }

  @Override

  double getW()

  {

  return w;

  }

  @Override

  double getH()

  {

  return h;

  }

  }

  boolean contains(double x, double y)

  {

  return (x >= getX() && x = getY() && y < getY() + getH());

  }

  abstract double getX();

  abstract double getY();

  abstract double getW();

  abstract double getH();

  }

  清单 9-3

  Rectangle.java

  ```


  `Rectangle` 通过左上角坐标（x 和 y）以及范围（宽度和高度）来描述一个矩形形状。该类被声明为 `abstract`，因为它声明了四个抽象方法：`getX()`、`getY()`、`getW()`
  和 `getH()`。回顾第 8 章，在非抽象类中声明抽象方法是错误的。


  `Rectangle` 还声明了一个 `boolean contains(double x, double y)` 方法，当由 `x` 和 `y` 描述的点位于矩形内部时，该方法返回
  true；否则返回 false。`contains()` 方法将传递给它的参数与通过调用 `Rectangle` 的抽象方法形成的表达式进行比较。


  `Rectangle` 最有趣的部分是它声明了两个静态类。这些类提供了存储 `Rectangle` 对象位置和范围所需的字段。


  第一个静态类是 `Float`，第二个静态类是 `Double`。每个类都声明了 `x`、`y`、`w`（宽度）和 `h`（高度）字段。此外，每个类都声明了一个无参构造函数，将这些字段初始化为
  0。接着是一个显式将这些字段初始化为传入参数的构造函数。


  注意


  如果没有声明无参构造函数，则无法调用此构造函数，因为编译器不会生成等效的 `<init>()` 方法——有关 `<init>()` 的简要介绍，请参见第 6 章。


  然后，`Float` 和 `Double` 声明了 `getX()`、`getY()`、`getW()` 和 `getH()` 方法，这些方法返回这些字段的值。唯一的区别是一组字段和方法是
  `float` 类型，而另一组字段和方法是 `double` 类型。


  这些方法带有 `@Override` 注解前缀，因为 `Float` 和 `Double` 扩展了 `Rectangle`，并覆盖了 `Rectangle` 声明的抽象方法
  `getX()`、`getY()`、`getW()` 和 `getH()`。（除了在第 7 章中简要讨论过 `@Override` 之外，本书不讨论注解，因为我认为它不是基本特性。）


  你可能会对这种不寻常的组织方式感到困惑。理解它的最佳方法可能是查看清单 9-4，其中展示了演示 `Rectangle` 的 `UseRect` 应用程序的源代码。


  ```

  class UseRect

  {

  public static void main(String[] args)

  {

  System.out.println("Rectangle.Float Demo");

  System.out.println();

  Rectangle r = new Rectangle.Float(10.0f, 20.0f, 30f, 40f);

  System.out.println(r.getX());

  System.out.println(r.getY());

  System.out.println(r.getW());

  System.out.println(r.getH());

  System.out.println("contains(40.0, 45.0): " + r.contains(35.0, 40.0));

  System.out.println("contains(80.0, 45.0): " + r.contains(80.0, 40.0));

  System.out.println();

  System.out.println("Rectangle.Double Demo");

  System.out.println();

  r = new Rectangle.Double(15.0, 25.0, 35, 45);

  System.out.println(r.getX());

  System.out.println(r.getY());

  System.out.println(r.getW());

  System.out.println(r.getH());

  System.out.println("contains(40.0, 45.0): " + r.contains(40.0, 45.0));

  System.out.println("contains(80.0, 45.0): " + r.contains(80.0, 45.0));

  }

  }

  清单 9-4

  UseRect.java

  ```


  请注意以下语句：


  ```

  Rectangle r = new Rectangle.Float(10.0f, 20.0f, 30f, 40f);

  r = new Rectangle.Double(15.0, 25.0, 35, 45);

  ```


  第一条语句实例化了 `Float` 类，第二条语句实例化了 `Double` 类。传递给每个类构造函数的参数存储在其 `x`、`y`、`w` 和 `h` 字段中。由于
  `Float` 和 `Double` 扩展了 `Rectangle`，返回的对象也是 `Rectangle` 类型，其引用可以赋值给 `Rectangle` 变量
  `r`。


  `Float` 和 `Double` 各自扩展了 `Rectangle`，以提供单精度浮点和双精度浮点的 `Rectangle` 实现。`Float` 的存在是为了减少内存消耗（在构建场景时，你可能会有数千个甚至更多这样的对象），而
  `Double` 的存在是为了在需要更高精度时使用。


  当调用 `Rectangle` 的方法（如 `getX()`）时，例如 `r.getX()`，子类型多态性就会发挥作用。Java 用于实现子类型多态性的向上转型和后期绑定机制（参见第
  8 章）会导致调用 `Float` 的 `getX()` 方法（在第一条语句中）和 `Double` 的 `getX()` 方法（在第二条语句中）。


