  假设没有编译错误，按如下方式运行 `VehicleDemo` 应用程序：


  ```

  java VehicleDemo

  ```


  你应该会看到以下输出：


  ```

  Make = Ford

  Model = F150

  Year = 2023

  Is extended cab = true

  Make: Ford, Model: F150, Year: 2023

  Is extended cab: true

  ```


  最后两行输出是调用 `truck.info()` 的结果。第一行 `Make: Ford, Model: F150, Year: 2023` 是 `Truck`
  的 `info()` 方法通过 `super.info()` 调用其 `Vehicle` 超类的 `info()` 方法产生的。第二行执行 `System.out.println("Is
  extended cab: " + isExtendedCab);` 来输出该卡车是否为加长驾驶室。


  注意


  出于安全或其他原因，你可能需要声明一个不应被重写的方法。Java 提供了 `final` 关键字来防止方法被重写。只需在方法头前加上 `final`，例如 `final
  String getMake()`。有了这个声明，当有人试图重写 `getMake()` 时，编译器会报告错误。


  #### 方法重载而非重写


  假设你将清单 7-6 中的 `info()` 方法替换为以下允许同时输出许可证号的 `info()` 方法：


  ```

  void info(String licenseNumber)

  {

  System.out.print("License number: " + licenseNumber);

  super.info();

  }

  ```


  修改后的 `Truck` 类现在有两个 `info()` 方法：上面显式声明的方法和从 `Vehicle` 继承的方法。


  `void info(String licenseNumber)` 方法并没有重写 `Vehicle` 的 `info()` 方法。相反，它*重载*了 `info()`
  方法（提供了另一个同名但不同的方法）。调用 `truck.info()` 不会调用 `void info(String licenseNumber)`。


  你可以通过在子类的方法头前加上 `@Override` *注解*（附加到方法上的额外信息）来在编译时检测到试图重载而非重写方法的行为。以下 `info()` 方法演示了这一点：


  ```

  @Override

  void info(String licenseNumber)

  {

  System.out.print("License number: " + licenseNumber);

  super.info();

  }

  ```


  指定 `@Override` 告诉编译器该方法重写了另一个方法。如果有人试图重载该方法，编译器会报告错误。如果没有这个注解，编译器不会报告错误，因为方法重载是合法的。（本书不进一步讨论注解，因为我认为它们不是
  Java 语言的基本特性。）


  提示


  养成在重写方法前加上 `@Override` 的习惯。这个习惯将帮助你更早地发现重载错误。


  #### 方法重写与受保护方法


  Java 提供了 `protected` 关键字用于方法重写的场景。你也可以对字段使用 `protected`。该关键字通常用于标识那些设计为被重写的方法，因为并非所有可访问的方法都应该被重写。


  当你将方法或字段声明为 `protected` 时，该成员对于同一包中任何类内的所有代码都是可访问的。对于子类，无论它们位于哪个包中，该成员也是可访问的。（我将在第
  10 章讨论包。）




  ### 所有类的终极祖先


  Java 提供了一个庞大的类库和其他引用类型，让程序员能够处理文件和数据库、对象集合、并发等。这个库包含了 `Object` 类，它充当所有类的终极祖先。可以把
  `Object` 想象成终极超类。


  每个类都直接或间接地扩展了 `Object` 类。例如，`class Employee extends Object` 和 `class Vehicle` 都扩展了
  `Object`。`Employee` 直接扩展了 `Object`，而 `Vehicle` 间接扩展了 `Object`。扩展 `Object` 是可选的（并且按照惯例通常不这样做），因为
  Java 不支持多重继承。


  注意


  *多重继承*涉及扩展多个类。Java 中不这样做，因为可能会出现问题。例如，两个类可能提供具有不同实现的相同方法。如果一个类扩展了这两个类，它会继承哪个方法？如果允许，类上下文中的多重继承将被称为*多重实现继承*。


  接口支持多重继承，这是另一种引用类型，我将在第 8 章中探讨。因为接口不支持方法体，所以当一个类实现两个或多个标识了相同方法的接口时，不会发生冲突。接口上下文中的多重继承被称为*多重接口继承*。


  `Object` 声明了以下方法：


  *   `protected Object clone()`


  *   `boolean equals(Object obj)`


  *   `protected void finalize()`


  *   `final Class<?> getClass()`


  *   `int hashCode()`


  *   `final void notify()`


  *   `final void notifyAll()`


  *   `String toString()`


  *   `final void wait()`


  *   `final void wait(long timeout)`


  *   `final void wait(long timeout, int nanos)`


  这些方法执行所有类通用的任务。例如，`clone()` 允许你创建并返回调用此方法的对象的副本。


  我将在以下各节中介绍这些方法中的大部分。我不会介绍 `notify()`、`notifyAll()` 和重载的 `wait()` 方法，因为它们在我的 *Java
  Threads and the Concurrency Utilities* 一书（[`www.amazon.ca/Java-Threads-Concurrency-Utilities-FRIESEN/dp/1484216997/`](http://www.amazon.ca/Java-Threads-Concurrency-Utilities-FRIESEN/dp/1484216997/)）中已有介绍。


  #### 克隆对象


  `clone()` 方法创建并返回调用它的对象的副本。克隆有两种形式：浅克隆和深克隆。在讨论这些形式之后，本节将探讨数组克隆。


  ##### 浅克隆


  *浅克隆*（也称为*浅拷贝*）复制对象的字段，但不复制这些字段引用的对象。清单 7-8 展示了一个 `CloneDemo` 应用程序的源代码，向你展示了如何实现浅克隆。


  ```

  class Date

  {

  private int year, month, day;

  Date(int year, int month, int day)

  {

  this.year = year;

  this.month = month;

  this.day = day;

  }

  int getDay()

  {

  return day;

  }

  int getMonth()

  {

  return month;

  }

  int getYear()

  {

  return year;

  }

  }

  class Employee implements Cloneable

  {

  private String name;

  private int age;

  private Date hireDate;

  Employee(String name, int age, Date hireDate)

  {

  this.name = name;

  this.age = age;

  this.hireDate = hireDate;

  }

  String getName()

  {

  return name;

  }

  int getAge()

  {

  return age;

  }

  Date getHireDate()

  {

  return hireDate;

  }

  @Override

  public Object clone() throws CloneNotSupportedException

  {

  return super.clone();

  }

  }

  class CloneDemo

  {

  public static void main(String[] args) throws CloneNotSupportedException

  {

  Employee john = new Employee("John Doe", 37, new Date(1999, 10, 8));

  System.out.println("Name: " + john.getName() +

  ", Age: " + john.getAge() +

  ", Hire Date: " + john.getHireDate());

  Employee john2 = (Employee) john.clone();

  System.out.println("Name: " + john2.getName() +

  ", Age: " + john2.getAge() +

  ", Hire Date: " + john2.getHireDate());

  }

  }

  清单 7-8

  CloneDemo.java

  ```


  清单 7-8 首先声明了一个简单的 `Date` 类，它用年、月、日整数字段来描述日期。构造函数更新这些字段，getter 方法返回它们的值。


  清单 7-8 接下来声明了一个 `Employee` 类，其对象将被克隆。这个类必须实现空的 `Cloneable` 接口，以告知 `clone()` 方法对
  `Employee` 对象进行逐字段复制是合法的。（我将在第 8 章介绍接口。）当未实现 `Cloneable` 时，`clone()` 会抛出 `CloneNotSupportedException`。（我将在第
  11 章讨论异常。）


  因为 `clone()` 被标记为 `protected`，所以必须在 `Employee` 中重写它。注意 `@Override` 注解的存在，我在本章前面简要提到过它。


  重写 `clone()` 时必须指定 `public` 访问说明符。当你不指定访问说明符时（表示包私有访问），编译器会报告试图分配更弱的访问权限。


  当你指定 `private` 时，编译器会报告 `clone()` 在 `Employee` 中具有私有访问权限，此外还试图分配更弱的访问权限。当你指定 `protected`
  时，源代码可以编译，但在运行时抛出 `CloneNotSupportedException` 对象。


  `Employee` 的 `clone()` 方法执行 `super.clone()` 来调用 `Object` 的 `clone()` 方法，该方法对实现 `Cloneable`
  的类执行逐字段复制。在这种情况下，`Object` 的 `clone()` 方法复制调用 `Employee` 对象的 `name`、`age` 和 `hireDate`
  字段。


  `main()` 方法中的 `Employee john2 = (Employee) john.clone();` 语句演示了克隆操作。它将 `john.clone()`
  的返回类型转换为 `Employee`，因为 `clone()` 的返回类型是 `Object`。


  按如下方式编译清单 7-8：


  ```

  javac CloneDemo.java

  ```


  按如下方式运行生成的应用程序：


  ```

  java CloneDemo

  ```


  你应该会看到以下输出（`@` 符号后的十六进制数字可能不同）：


  ```

  Name: John Doe, Age: 37, Hire Date: Date@28a418fc

  Name: John Doe, Age: 37, Hire Date: Date@28a418fc

  ```


  你可能期望看到以年、月、日形式显示的员工雇佣日期。相反，你看到的是 `Date` 对象的默认字符串表示。这种表示由 `Date` 类名、`@` 符号和一个十六进制值（代表哈希码，将在本章后面讨论）组成。这种默认字符串表示是直观地表示对象引用的一种方式。


  你可以看到原始的 `Employee` 对象及其克隆引用同一个 `Date` 对象，因为每个对象的默认字符串表示是相同的。这是浅克隆的一个例子。


  要成为真正的克隆，`Employee` 克隆应该引用一个记录雇佣日期的新 `Date` 对象。换句话说，`Employee` 对象应该被深克隆。




  ##### 深克隆


  *深克隆*（也称为*深拷贝*）在执行浅克隆的基础上，还会递归地复制对象字段中引用的对象，以及这些对象字段中引用的对象，以此类推。清单 7-9 展示了 `CloneDemo`
  应用程序第二个版本的源代码，演示了如何实现深克隆。


  ```

  class Date implements Cloneable

  {

  private int year, month, day;

  Date(int year, int month, int day)

  {

  this.year = year;

  this.month = month;

  this.day = day;

  }

  int getDay()

  {

  return day;

  }

  int getMonth()

  {

  return month;

  }

  int getYear()

  {

  return year;

  }

  @Override

  public Object clone() throws CloneNotSupportedException

  {

  return super.clone();

  }

  }

  class Employee implements Cloneable

  {

  private String name;

  private int age;

  private Date hireDate;

  Employee(String name, int age, Date hireDate)

  {

  this.name = name;

  this.age = age;

  this.hireDate = hireDate;

  }

  String getName()

  {

  return name;

  }

  int getAge()

  {

  return age;

  }

  Date getHireDate()

  {

  return hireDate;

  }

  @Override

  public Object clone() throws CloneNotSupportedException

  {

  Date hire_Date = (Date) hireDate.clone();

  Employee emp = new Employee(name, age, hire_Date);

  return emp;

  }

  }

  class CloneDemo

  {

  public static void main(String[] args) throws CloneNotSupportedException

  {

  Employee john = new Employee("John Doe", 37, new Date(1999, 10, 8));

  System.out.println("Name: " + john.getName() +

  ", Age: " + john.getAge() +

  ", Hire Date: " + john.getHireDate());

  Employee john2 = (Employee) john.clone();

  System.out.println("Name: " + john2.getName() +

  ", Age: " + john2.getAge() +

  ", Hire Date: " + john2.getHireDate());

  }

  }

