  ##### 同时重写 `hashCode()` 和 `equals()`


  重写 `equals()` 时必须同时重写 `hashCode()`，并遵循 `hashCode()` 的 Java 文档中规定的以下约定：


  *   在 Java 应用程序执行期间，对同一对象多次调用 `hashCode()` 时，只要该对象中用于 `equals()` 比较的信息未被修改，`hashCode()`
  就必须始终返回相同的整数。但是，该整数无需在应用程序的不同执行之间保持一致。例如，`hashCode()` 在一次执行中每次调用可能返回 5000，而在另一次执行中每次调用可能返回
  8700。


  *   如果根据重写的 `equals()` 方法两个对象相等，那么对这两个对象分别调用 `hashCode()` 必须产生相同的整数结果。


  *   如果根据重写的 `equals()` 方法两个对象不相等，那么对这两个对象调用 `hashCode()` 返回的整数可以相同。但是，让 `hashCode()`
  为不相等的对象返回不同的值可能会提高哈希表的性能。


  如果不遵守此约定，你的类的实例将无法与前面提到的 `HashMap` 类正常工作。


  如果你重写了 `equals()` 但没有重写 `hashCode()`，那么你最主要违反了约定中的第二条：相等对象的哈希码也必须相等。这种违反可能导致严重后果，如清单
  7-15 和 7-16 所示。


  ```

  class Point

  {

  int x, y;

  Point(int x, int y)

  {

  this.x = x; this.y = y;

  }

  int getX()

  {

  return x;

  }

  int getY()

  {

  return y;

  }

  @Override

  public boolean equals(Object o)

  {

  if (!(o instanceof Point))

  return false;

  Point p = (Point) o;

  return p.x == x && p.y == y;

  }

  }

