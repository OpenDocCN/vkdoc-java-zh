  #### 扩展多个接口


  与实现接口类似，你可以扩展多个接口。每个接口的名称都作为 `extends` 关键字后逗号分隔的名称列表的一部分来指定。清单 8-13 展示了一个简单示例，其中接口
  `Z` 扩展了接口 `X` 和 `Y`。


  ```

  interface X

  {

  // 适当的常量和/或方法头

  }

  interface Y

  {

  // 适当的常量和/或方法头

  }

  interface Z extends X, Y

  {

  // 适当的常量和/或方法头

  }

  清单 8-13

  Z.java 演示多接口扩展

  ```


  在扩展多个接口时，要注意名称冲突的潜在可能性。当同一个常量名称出现在每个超接口中（可能具有不同的类型和/或其他信息），并在子接口中被访问时，就会发生这种情况。当发生名称冲突时，编译器会报告一个错误，清单
  8-14 演示了这一点。


  ```

  interface X

  {

  int SOME_CONSTANT = 2;

  void some_method();

  }

  interface Y

  {

  int SOME_CONSTANT = 3;

  int some_method(int x);

  }

  interface Z extends X, Y

  {

  int SOME_CONSTANT2 = SOME_CONSTANT;

  }

  清单 8-14

  Z.java（演示冲突的常量）

  ```


  这里，接口 `Z` 继承了名为 `SOME_CONSTANT` 的两个不同常量，它们被初始化为两个不同的值。Java 编译器无法确定 `Z` 应该继承哪个常量（如果每个常量被赋予相同的值，也会出现同样的问题），并报告以下错误信息：


  ```

  Z.java:15: 错误: 对 SOME_CONSTANT 的引用不明确

  int SOME_CONSTANT2 = SOME_CONSTANT;

  ^

  X 中的变量 SOME_CONSTANT 和 Y 中的变量 SOME_CONSTANT 都匹配

  1 个错误

  ```


  ## 向下转型与 RTTI


  通过向上转型在类层次结构中向上移动，意味着会失去对子类型特性的访问权限。例如，将一个 `Truck` 对象赋值给 `Vehicle` 变量 `v`，意味着你不能使用
  `v` 来调用 `Truck` 的 `isExtendedCab()` 方法。然而，通过执行像 `Truck t = (Truck) v;` 这样的显式转型操作，可以再次访问
  `Truck` 的 `isExtendedCab()` 方法。


  这种赋值被称为*向下转型*，因为你是在沿着继承层次结构从超类型向下转型到子类型（从 `Vehicle` 超类到 `Truck` 子类）。虽然向上转型总是安全的（超类的接口是子类接口的一个子集），但向下转型并不总是安全的。清单
  8-15 展示了如果错误地使用向下转型可能会带来什么样的麻烦。


  ```

  class Vehicle

  {

  }

  class Truck extends Vehicle

  {

  private boolean isExtendedCab;

  boolean isExtendedCab()

  {

  return isExtendedCab;

  }

  }

  public class BadDowncast

  {

  public static void main(String[] args)

  {

  Vehicle v = new Vehicle();

  Truck t = (Truck) v;

  System.out.println(t.isExtendedCab());

  }

  }

  清单 8-15

  BadDowncast.java（演示向下转型的问题）

  ```


  清单 8-15 展示了一个由 `Vehicle` 和扩展了 `Vehicle` 的 `Truck` 组成的类层次结构。此外，`Truck` 声明了 `isExtendedCab()`。第三个名为
  `BadDowncast` 的类提供了一个 `main()` 方法，该方法首先实例化 `Vehicle`。


  然后，`main()` 方法尝试将此对象向下转型为 `Truck`，并将结果赋值给变量 `t`。编译器不会报错，因为在同一类型层次结构中从超类向下转型到子类是合法的。


  如果允许此赋值，应用程序在尝试执行 `t.isExtendedCab();` 时会崩溃，因为 Java 虚拟机（JVM）将尝试调用一个不存在的方法：`Vehicle`
  没有声明 `isExtendedCab()`。幸运的是，JVM 在执行转型操作之前会验证转型是否合法。检测到 `Vehicle` 没有声明 `isExtendedCab()`
  后，它会抛出一个 `ClassCastException` 对象。（我将在第 11 章讨论异常。）


  按如下方式编译清单 8-15：


  ```

  javac BadDowncast.java

  ```


  按如下方式运行应用程序：


  ```

  java BadDowncast

  ```


  你应该会看到以下输出：


  ```

  Exception in thread "main" java.lang.ClassCastException: class Vehicle cannot be
  cast to class Truck (Vehicle and Truck are in unnamed module of loader ''app'')

  at BadDowncast.main(BadDowncast.java:19)

  ```




  ### 运行时类型识别


  清单 8-15 中 JVM 的类型转换验证展示了*运行时类型识别*（简称 RTTI）。类型转换验证通过检查类型转换操作符的操作数类型，来判断该转换是否应被允许，从而执行
  RTTI。在此场景中，该转换不应被允许。


  RTTI 的另一种形式涉及 `instanceof` 运算符。该运算符检查左操作数是否为右操作数的实例，如果是则返回 true。以下示例将 `instanceof`
  引入清单 8-15，以防止 `ClassCastException`：


  ```

  if (v instanceof Truck)

  {

  Truck t = (Truck) v;

  System.out.println(t.isExtendedCab());

  }

  ```


  `instanceof` 运算符检测到变量 `v` 的实例并非由 `Truck` 创建，并返回 false 以表明这一事实。因此，执行非法转换的代码将不会运行。


  由于子类型是超类型的一种，当左操作数是右操作数超类型的子类型实例或超类型实例时，`instanceof` 将返回 true。以下示例进行了演示：


  ```

  Vehicle v = new Truck();

  Truck t = new Truck();

  System.out.println(t instanceof Vehicle); // 输出：true

  System.out.println(v instanceof Vehicle); // 输出：true

  ```


  此示例假设了清单 8-15 中所示的类结构，并实例化了 `Vehicle` 和 `Truck`。第一个 `System.out.println()` 方法调用输出
  `true`，因为 `t` 的引用标识了 `Vehicle` 子类的一个实例；第二个 `System.out.println()` 方法调用输出 `true`，因为
  `v` 的引用标识了 `Vehicle` 的一个实例。


  警告


  过度使用 `instanceof` 可能表明软件设计不佳。例如，假设你决定使用多个 `instanceof` 表达式来判断一个 `vehicle` 对象的类型是
  `Car`、`Truck` 还是其他 `Vehicle` 子类型。当你引入一个新的 `Vehicle` 子类型时，可能会忘记添加一个 `instanceof`
  测试来检查 `vehicle` 是否为该类型的实例，这会导致一个 bug。请尽量减少对 `instanceof` 在特殊情况下的依赖。大多数情况下，使用子类型多态性会是更好的选择。


  ## 其他主题


  在本节中，我将向你介绍与本章内容相关的一对额外主题。首先，你将探索协变返回类型，它利用子类型多态性为你带来好处。接下来，你将了解基于接口的静态方法。


  ### 协变返回类型


  当你重写一个方法，并且允许重写方法的返回类型是被重写方法返回类型的子类型时，就产生了*协变返回类型*。当方法在子类中被重写时，方法的协变返回类型可以被替换为更“窄”（子类）的类型。


  我创建了一个小型应用程序来演示这一语言特性。请查看清单 8-16 的源代码。


  ```

  // 观察协变返回类型

  class ParentReturnType

  {

  @Override

  public String toString()

  {

  return "父类返回类型";

  }

  }

  class ChildReturnType extends ParentReturnType

  {

  @Override

  public String toString()

  {

  return "子类返回类型";

  }

  }

  class ParentClass

  {

  ParentReturnType createReturnType()

  {

  return new ParentReturnType();

  }

  }

  class ChildClass extends ParentClass

  {

  // ChildClass 重写了 ParentClass 的 createReturnType() 方法。

  // 注意 ChildClass 的 createReturnType() 方法的返回类型

  // 已从 ParentReturnType 变为 ChildReturnType。

  // 如果没有协变返回类型，返回类型必须是 ParentReturnType。

  @Override

  ChildReturnType createReturnType()

  {

  return new ChildReturnType();

  }

  }

  class OCRT

  {

  public static void main(String[] args)

  {

  ParentReturnType prt = new ParentClass().createReturnType();

  System.out.println(prt);

  // 以下语句实例化 ChildClass 并调用其

  // createReturnType() 方法。createReturnType() 返回的

  // ChildClass 引用被赋值给 crt。如果没有协变返回类型，

  // 你必须通过 (ChildClass) 转换运算符显式地将

  // new 运算符返回的对象转换为 ChildReturnType。

  ChildReturnType crt = new ChildClass().createReturnType();

  System.out.println(crt);

  }

  }

  清单 8-16

  OCRT.java

  ```


  清单 8-16 声明了 `ParentReturnType` 和 `ParentClass` 超类，以及 `ChildReturnType` 和 `ChildClass`
  子类。`ParentClass` 和 `ChildClass` 各自声明了一个 `createReturnType()` 方法。`ParentClass` 的方法将其返回类型设置为
  `ParentReturnType`，而 `ChildClass` 的重写方法将其返回类型设置为 `ChildReturnType`，即 `ParentReturnType`
  的子类。


  协变返回类型极大地减少了向上转型和向下转型。例如，`ChildClass` 的 `createReturnType()` 方法不需要将其 `ChildReturnType`
  实例向上转型为其 `ChildReturnType` 返回类型。此外，在赋值给变量 `crt` 时，此实例也不需要向下转型为 `ChildReturnType`。


  按如下方式编译清单 8-16：


  ```

  javac OCRT.java

  ```


  按如下方式运行生成的应用程序：


  ```

  java OCRT

  ```


  你应该会看到以下输出：


  ```

  父类返回类型

  子类返回类型

  ```


  如果没有协变返回类型，最终会得到清单 8-17。


  ```

  // 观察协变返回类型

  class ParentReturnType

  {

  @Override

  public String toString()

  {

  return "父类返回类型";

  }

  }

  class ChildReturnType extends ParentReturnType

  {

  @Override

  public String toString()

  {

  return "子类返回类型";

  }

  }

  class ParentClass

  {

  ParentReturnType createReturnType()

  {

  return new ParentReturnType();

  }

  }

  class ChildClass extends ParentClass

  {

  @Override

  ParentReturnType createReturnType()

  {

  return new ChildReturnType();

  }

  }

  class OCRT

  {

  public static void main(String[] args)

  {

  ParentReturnType prt = new ParentClass().createReturnType();

  System.out.println(prt);

  ChildReturnType crt =

  (ChildReturnType) new ChildClass().createReturnType();

  System.out.println(crt);

  }

  }

  清单 8-17

  OCRT.java（版本 2）

  ```


  清单 8-17 在 `ChildClass` 的 `createReturnType()` 方法中，将 `ChildReturnType` 向上转型为 `ParentReturnType`。此外，在
  `main()` 方法中，它在赋值给 `crt` 之前，使用了必需的 `(ChildReturnType)` 转换运算符，将 `ParentReturnType`
  向下转型为 `ChildReturnType`。




  ### 基于接口的静态方法


  JDK 8 为程序员引入了基于接口的静态方法。在接口中声明静态方法，可以让你将静态方法与接口关联，而不是与工具类关联。这样做能使源代码更具可读性，并确保二进制兼容性不被破坏。


  为了理解基于接口的静态方法的实用性，考虑一个 `Renderable` 接口，它包含一个 `void render(int color)` 方法，其 `color`
  参数包含一个整数颜色代码。由于用红、绿、蓝分量来表示这种颜色很方便，假设你添加一个 `rgb()` 静态方法，将这些分量转换为一个 `int` 值。请查看清单
  8-18。


  ```

  interface Renderable

  {

  public void render(int color);

  public static int rgb(int r, int g, int b)

  {

  return r << 16 | g << 8 | b;

  }

  }

  清单 8-18

  Renderable.java

  ```


  接下来，你声明一个 `Circle` 类，该类通过基于整数的圆心坐标和半径来描述一个圆，并实现 `Renderable` 来渲染一个圆。清单 8-19 展示了
  `Circle` 的源代码。


  ```

  class Circle implements Renderable

  {

  private int x, y, r;

  Circle(int x, int y, int r)

  {

  this.x = x;

  this.y = y;

  this.r = r;

  }

  @Override

  public void render(int color)

  {

  System.out.println("Rendering circle(" + x + ", " + y + ", " + r + ") in color "
  + color);

  }

  }

  清单 8-19

  Circle.java

  ```


  最后，你声明一个 `UseRenderable` 应用程序类，其源代码如清单 8-20 所示。


  ```

  public class UseRenderable

  {

  public static void main(String[] args)

  {

  Circle circle = new Circle(20, 30, 14);

  circle.render(Renderable.rgb(0x80, 0x60, 0x40));

  }

  }

  清单 8-20

  UseRenderable.java

  ```


  `UseRenderable` 的 `main()` 方法实例化 `Circle`，然后调用该对象的 `render()` 方法来渲染圆。请注意，`rgb()`
  方法调用前加上了此静态方法所属的 `Renderable` 接口。你不能用实现该接口的类作为前缀（例如 `Circle.rgb(0x80, 0x60, 0x40)`），因为该静态方法属于
  `Renderable`。


