  ### 随机数生成


  `Math` 类通过其 `double random()` 方法支持生成伪随机数。每次调用 `random()` 都会返回一个算法选择的双精度浮点数，范围从 0.0
  到接近 1.0。


  注意


  维基百科的“随机数生成器”主题（[`http://en.wikipedia.org/wiki/Random_number_generation`](http://en.wikipedia.org/wiki/Random_number_generation)）更详细地讨论了随机数生成器和伪随机数。为方便起见，我将使用常规术语“随机”来代替“伪随机”。


  随机数生成在计算机游戏中非常重要。例如，我们可以使用 `random()` 创建一个猜数字游戏。请查看清单 12-3。


  ```

  import java.util.Scanner;

  public class Guess

  {

  public static void main(String[] args)

  {

  int answer = rnd(100) + 1;

  while (true)

  {

  System.out.print("Enter guess (1 - 100): ");

  int guess = new Scanner(System.in).nextInt();

  if (guess  answer)

  {

  System.out.println("Too high");

  continue;

  }

  else

  {

  System.out.println("Correct");

  break;

  }

  }

  }

  /*

  rnd() - Return random integer.

  Parameters:

  limit - Specifies the largest integer less 1 that

  may be returned. 0 is the smallest integer.

  Return:

  random integer from 0 through limit - 1.

  */

  static int rnd(int limit)

  {

  return (int) (Math.random() * limit);

  }

  }

  清单 12-3

  Guess.java

  ```


  清单 12-3 展示了一个 `Guess` 应用程序的源代码，该程序生成一个 1 到 100 之间的随机整数，并持续提示你猜测生成了哪个整数。如果猜得太低或太高，程序会提示你。如果猜对了，程序也会提示你，然后结束。


  下面这行代码可能会让人困惑：


  ```

  int guess = new Scanner(System.in).nextInt();

  ```


  这行代码使用了 `java.util.Scanner` 类（来自 Java 的引用类型库）及其 `nextInt()` 方法来获取用户输入的整数。`System``.in`
  参数指定控制台为输入源。（除了本次演示，我不会讨论 `Scanner`。）


  最重要的是 `rnd()` 方法和 `return (int) (Math.random() * limit);` 语句。`rnd()` 方法返回一个随机选择的整数，范围从
  0 到 `limit` - 1。例如，当传入 `100` 时，`rnd()` 返回一个从 0 到 99 之间随机选择的整数。这就是为什么要在 `rnd()` 返回的结果上加
  1。


  `return (int) (Math.random() * limit);` 语句首先通过 `Math.random()` 调用获取一个从 0.0 到接近 1.0
  的随机 `double` 值，然后将此值乘以 `limit`。`(int)` 强制类型转换在将 `double` 转换为 `int` 时截断了小数部分。然后通过
  `return` 将结果值返回给调用者。


  按如下方式编译清单 12-3：


  ```

  javac Guess.java

  ```


  按如下方式运行应用程序：


  ```

  java Guess

  ```


  以下是使用 `Guess` 的一次会话示例：


  ```

  Enter guess (1 - 100): 50

  Too high

  Enter guess (1 - 100): 25

  Too high

  Enter guess (1 - 100): 12

  Too high

  Enter guess (1 - 100): 6

  Too high

  Enter guess (1 - 100): 3

  Correct

  ```


  我使用了二分查找算法（参见第 5 章）来确定 3 是正确的数字。在猜数字游戏的上下文中，该算法的工作原理是在搜索空间的中间选择一个值。如果猜得太高，则选择搜索空间的下半部分继续搜索。如果猜得太低，则选择搜索空间的上半部分继续搜索。该算法以递归方式重复。


  你可以让这个游戏变得有趣得多。例如，在用户猜对数字后，游戏可以提示用户是否继续下一轮。在你学习了更多 Java 知识后，你还可以添加一个计时器功能，这样用户必须在时间间隔内猜对，否则将输掉这一轮（并且无法得知该数字）。


  `Math` 还声明了许多其他方法。例如，重载的 `abs()` 方法让你可以获取一个数的绝对值，重载的 `max()` 和 `min()` 方法让你可以获取两个值中的最大值和最小值，而
  `double sqrt(double a)` 返回其参数的平方根。（负参数的平方根是 NaN。）




  ## BigDecimal


  许多开发者使用 `double` 和 `float` 类型来表示货币金额。然而，这种做法并不被推荐。问题在于“`float` 和 `double` 无法精确表示我们用于货币的十进制倍数”。我从
  [`http://stackoverflow.com/questions/3730019/why-not-use-double-or-float-to-represent-currency`](http://stackoverflow.com/questions/3730019/why-not-use-double-or-float-to-represent-currency)
  摘录了此答案，该答案随后对此进行了深入阐述。


  开发者也会使用 `int` 和 `long` 类型来表示以“分”为单位的货币金额，但这种方法同样存在问题。针对 Stack Overflow 上“为什么应用程序通常不使用
  `int` 在内部表示货币金额？”的问题（[`http://stackoverflow.com/questions/5356123/why-dont-applications-typically-use-int-to-internally-represent-currency-values`](http://stackoverflow.com/questions/5356123/why-dont-applications-typically-use-int-to-internally-represent-currency-values)），Matt
  解释道：


  “这并不能简化编码。1.10 美元转换为 110 美分。没问题，但当你需要计算税金时（例如，1.10 美元 * 4.225% —— 密苏里州的税率，结果为 0.046475
  美元）该怎么办？为了将所有金额保持为整数，你还必须将销售税转换为整数（4225），这需要将 110 美分进一步转换为 11000000。那么计算就变成了 11000000
  * 4225 / 100000 = 464750。这就产生了一个问题，因为现在我们有了以美分的小数部分表示的值（分别为 11000000 和 464750）。这一切都是为了将货币存储为整数。


  因此，以本币单位进行思考和编码更为容易。在美国，这将是美元，美分作为小数部分（例如，1.10 美元）。用 110 美分来编码则不那么自然。使用十进制浮点数（例如
  Java 的 `BigDecimal` 和 .NET 的 `Decimal`）对于货币值来说通常足够精确（相比于像 `Float` 和 `Double` 这样的二进制浮点数）。”


  `BigDecimal` 类描述了不可变的、任意精度的有符号十进制数。根据 `BigDecimal` 的 JDK 文档，“一个 `BigDecimal` 由一个任意精度的整数未缩放值和一个
  32 位整数标度组成。如果标度为零或正数，则标度表示小数点右侧的位数。如果标度为负数，则数字的未缩放值乘以 10 的标度绝对值次幂。因此，由 `BigDecimal`
  [类] 表示的数字的值为 (unscaledValue × 10^(-scale))。”


  `BigDecimal` 是进行货币计算的理想选择。清单 12-4 展示了源代码。


  ```

  // BigDecimal Demo

  import java.math.BigDecimal;

  import java.math.RoundingMode;

  class BDD

  {

  public static void main(String[] args)

  {

  BigDecimal purchaseAmount = new BigDecimal("586.32");

  BigDecimal pstRate = new BigDecimal("0.06");

  System.out.println("Purchase amount: " + purchaseAmount);

  System.out.println("PST rate: " + pstRate);

  // Calculate provincial sales tax on purchase.

  BigDecimal pst = purchaseAmount.multiply(pstRate);

  System.out.println("PST: " + pst);

  pst = pst.setScale(2, RoundingMode.HALF_UP);

  System.out.println("PST: " + pst);

  }

  }

  清单 12-4

  BDD.java

  ```


  清单 12-4 展示了一个演示 `BigDecimal` 的简单应用程序的源代码。


  `main()` 方法首先调用 `BigDecimal(String val)` 构造函数来构造一个 `BigDecimal` 对象，表示 586 美元 32
  美分的购买金额，然后构造一个 `BigDecimal` 对象，表示 6% 的省销售税率（我住在加拿大）。


  然后，该方法在每个对象上调用 `System.out.println()` 来输出其值（在幕后，`System.out.println()` 调用 `BigDecimal`
  的 `toString()` 方法将 `BigDecimal` 对象转换为字符串，然后输出）。


  此时，`main()` 调用 `BigDecimal` 的 `BigDecimal multiply(BigDecimal multiplicand)` 方法，将购买金额乘以
  PST 税率。返回的 `BigDecimal` 对象的引用被赋值给局部变量 `pst`。


  返回的 `BigDecimal` 对象显示了四位小数（美分）。在处理货币时，我们习惯使用两位小数。我们可以通过调用 `BigDecimal` 的 `BigDecimal
  setScale(int newScale, RoundingMode roundingMode)` 方法来实现两位小数。`main()` 方法调用此方法，将
  `2` 作为新的标度（我们需要两位小数），并将 `RoundingMode.HALF_UP` 作为舍入模式——四舍五入是我们上学时学到的舍入模式。


  注意


  `RoundingMode` 是*枚举类型*的一个例子，它是一种引用类型，由作为对象实现的命名常量组成。我在本书中没有讨论枚举类型，因为我认为它不是一个基础特性。


  最后，`main()` 输出四舍五入后的 PST 值。


  按如下方式编译清单 12-4：


  ```

  javac BDD.java

  ```


  按如下方式运行应用程序：


  ```

  java BDD

  ```


  您应该会看到以下输出：


  ```

  Purchase amount: 586.32

  PST rate: 0.06

  PST: 35.1792

  PST: 35.18

  ```




  ## BigInteger


  `BigDecimal` 类使用 `BigInteger` 类来表示任意精度的整数未缩放值。与 `BigDecimal` 一样，`BigInteger` 对象是不可变的——它们不能被更改。所有操作的行为都如同
  `BigInteger` 是用二进制补码表示法（就像 Java 的基本整数类型一样）表示的。


  `BigInteger` 提供了 Java 所有基本整数运算符的模拟，以及 `Math` 类中的所有相关方法。此外，`BigInteger` 还提供了模运算、GCD（最大公约数）计算、素数测试、素数生成、位操作以及其他一些杂项操作。


  `BigInteger` 非常适合表示在天文学、物理学和化学中遇到的巨大整数。例如，*阿伏伽德罗常数*（一摩尔物质中的粒子数）是 6.02214076×10²³。此外，100
  万光年的米数是 9.46052840500002×10²¹。相比之下，`long` 类型能表示的最大正整数略小于 10¹⁹。


  我创建了一个简单的应用程序来演示 `BigInteger` 的一部分功能。清单 12-5 展示了源代码。


  ```

  // BigInteger Demo

  import java.math.BigInteger;

  class BID

  {

  public static void main(String[] args)

  {

  BigInteger bi1 = new BigInteger("100");

  BigInteger bi2 = new BigInteger("25");

  System.out.println("bi1 = " + bi1);

  System.out.println("bi2 = " + bi2);

  System.out.println("bi1 + bi2: " + bi1.add(bi2));

  System.out.println("bi1 - bi2: " + bi1.subtract(bi2));

  System.out.println("bi1 * bi2: " + bi1.multiply(bi2));

  System.out.println("bi1 / bi2: " + bi1.divide(bi2));

  }

  }

