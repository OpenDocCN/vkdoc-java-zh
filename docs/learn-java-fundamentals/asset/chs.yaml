  ```

  Line separator: 13 10

  ```




  ## 标准 I/O


  *标准 I/O* 是一个通信框架，它通过字节流（如果你愿意，也可以称之为通道）将正在运行的程序与其输入源连接起来。它还将程序连接到其正常输出和错误输出目的地。


  注意


  `System` 声明了 `in`、`out` 和 `err` 类字段，这些字段将程序连接到其输入源、输出目的地和错误目的地。`in` 字段的类型是 `java.io.InputStream`；`out`
  和 `err` 字段的类型是 `java.io.PrintStream`。


  在本节之外，我不会在本书中深入讨论 `InputStream` 和 `PrintStream`。相反，我建议你参考我的 *Java I/O, NIO and NIO.2*
  一书，我在其中更详细地讨论了这些以及其他与 I/O 相关的类型。（请参阅 [`www.amazon.ca/Java-NIO-NIO-2-JEFF-FRIESEN/dp/1484215664/`](http://www.amazon.ca/Java-NIO-NIO-2-JEFF-FRIESEN/dp/1484215664/)
  获取本书。）


  我希望更新 *Java I/O, NIO and NIO.2* 并将其重命名为 *Learn Java I/O, NIO and NIO.2*，使其成为“Learn
  Java …”系列的一部分。


  ### 标准输入


  一个正在运行的程序从*标准输入*接收其输入，这是一种抽象了输入源的操作系统机制。该机制默认为控制台的键盘，但可以*重定向*到文件或其他输出设备。


  考虑第 13 章的 `WC` 应用程序。它调用 `System.in.read()` 从标准输入读取字节。这些字节可能来自键盘、文件或其他来源。程序不知道也不关心来源。它只是“看到”一个字节流并对其执行某些操作。


  注意


  各种字符编码标准用于对字符进行编码。例如，ASCII（美国信息交换标准码——参见 [`http://en.wikipedia.org/wiki/ASCII`](http://en.wikipedia.org/wiki/ASCII)）在
  Unicode（参见 [`en.wikipedia.org/wiki/Unicode`](http://en.wikipedia.org/wiki/Unicode)）出现之前是主要的字符编码标准。


  ASCII 使用 8 位字节中的 7 位来编码一个字符。相比之下，Unicode 最初使用两个字节来编码一个字符（这就是为什么 Java 的 `char` 类型占用
  16 位），但现在最多使用四个字节。`java.lang.Character` 类对此进行了补偿。（有关 `Character` 的更多信息，请查看 [`http://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/lang/Character.xhtml`](http://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/lang/Character.xhtml)。）


  `System.in` 引用 `System` 的 `in` 类字段，其类型为 `InputStream`。


  `InputStream` 提供了一个 `int read()` 方法，该方法从输入源读取一个字节，并将该字节作为 32 位整数（`int`）返回。当到达字节流的末尾时，它返回
  -1。当发生 I/O 错误（例如尝试读取已关闭的文件源）时，它会抛出 `java.io.IOException`。


  假设你按如下方式运行 `WC` 应用程序：


  ```

  java WC

  ```


  在此次执行中，`WC` 的输入（通过 `System.in.read()` 方法调用）来自键盘。


  标准 I/O 允许你将标准输入从默认的控制台键盘重定向到文件或其他输入源。要使用 `WC` 实现这一点，你需要指定 `<` 符号，后跟输入源的名称，如下所示：


  ```

  java WC <words.txt

  ```


  这里，输入来自一个名为 `words.txt` 的文件。


  注意


  `System` 提供了 `void setIn(InputStream in)` 方法，用于将标准输入重定向到另一个流。例如，`System.setIn(new
  FileInputStream("words.txt"));` 等同于 `<words.txt`。


  `java.io.FileInputStream` 类允许你从文件获取输入。我在本书中不讨论这个类。


  ### 标准输出


  一个正在运行的程序将其非错误输出发送到*标准输出*，这是一种抽象了非错误输出目的地（也称为*接收器*）的操作系统机制。该机制默认为控制台的屏幕，但可以重定向到文件或其他输出设备。


  考虑第 13 章的 `WC` 应用程序。它调用 `System.out.println()` 将字符串写入标准输出。该字符串被发送到文件或其他接收器。程序不知道也不关心接收器。


  `System.out` 引用 `System` 的 `out` 类字段，其类型为 `PrintStream`。


  `PrintStream` 提供了各种 `print()` 和 `println()` 方法，用于将各种类型的数据写入接收器。例如，`print(double
  d)` 写入一个双精度浮点值，而 `println(String s)` 写入一个字符串。


  注意


  `print()` 和 `println()` 之间的区别在于，`println()` 在写入其参数后会写入一个换行符（字面表示为 `\n`）。换行符会导致*光标*（一个可移动的指示器，指示输入输入或输出发送的位置）定位到下一行输入或输出的开头。它被写成一个特定于平台的字节序列，在
  Windows 平台上为 13 后跟 10，在 Unix/Linux 平台上为 10。


  你可以通过调用不带参数的 `System.out.println()` 方法来写入一个空行以分隔输出行。此方法输出我在本章前面提到的行分隔符。


  假设你按如下方式运行 `WC` 应用程序：


  ```

  java WC

  ```


  在此次执行中，`WC` 的输出被发送到屏幕（通过 `System.out.println()` 方法调用）。


  标准 I/O 允许你将标准输出从默认的控制台屏幕重定向到文件或其他输出接收器。要使用 `WC` 实现这一点，你需要指定 `>` 符号，后跟输出接收器的名称，如下所示：


  ```

  java WC >stats.txt

  ```


  这里，输出被发送到一个名为 `stats.txt` 的文件。


  注意


  `System` 提供了 `void setOut(PrintStream out)` 方法，用于将标准输出重定向到另一个流。例如，`System.setOut(new
  FileOutputStream("stats.txt"));` 等同于 `>stats.txt`。


  `java.io.FileOutputStream` 类允许你将输出发送到文件。我在本书中不讨论这个类。




  #### 格式化输出


  `PrintStream` 类还提供了 `PrintStream printf(String format, Object... args)` 方法来实现格式化输出。


  注意


  JDK 5 引入了 `printf()` 方法，其模式借鉴了 C 语言的 `printf()` 函数。请查阅 [`http://en.wikipedia.org/wiki/Printf`](http://en.wikipedia.org/wiki/Printf)
  以了解更多关于此函数的信息。


  `printf()` 方法的实现与 `java.util.Formatter` 类（同样由 JDK 5 引入）协同工作，以实现格式化输出。因此，`printf()`
  是一个*便捷方法*的示例。


  `format` 参数标识一个格式字符串，它由字面文本和格式说明符组成。每个格式说明符以 `%` 符号开头，并以一个转换字母结尾。例如，`%d` 表示需要一个十进制整数。同样，`%s`
  表示需要一个字符串。


  注意


  有关格式字符串和格式说明符的更多信息，请查阅 JDK 21 关于 `Formatter` 类的 API 文档（[`http://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/util/Formatter.xhtml`](http://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/util/Formatter.xhtml)）。


  `args` 参数是一个可变参数列表。每个参数的类型必须与其匹配的格式说明符兼容。


  清单 14-5 中的 `FormattedOutputDemo` 应用程序演示了格式化输出。


  ```

  public class FormattedOutputDemo

  {

  public static void main(String[] args)

  {

  int i = 10;

  System.out.printf("i = [%d]%n", i);

  System.out.printf("i = [%5d]%n", i);

  System.out.printf("i = [%05d]%n", i);

  System.out.printf("i = [%-5d]%n", i);

  String s = "hello, world";

  System.out.printf("s = [%s]%n", s);

  System.out.printf("s = [%30s]%n", s);

  }

  }

  清单 14-5

  FormattedOutputDemo.java

  ```


  `FormattedOutputDemo` 的 `main()` 方法首先声明了局部 `int` 变量 `i` 并将其初始化为 `10`。然后它执行了四次 `System.out.printf()`
  来演示格式化该整数的四种方式：


  *   `System.out.printf("i = [%d]%n", i);`：默认格式

  *   `System.out.printf("i = [%5d]%n", i);`：在五个字符宽的字段中格式化，前导空格

  *   `System.out.printf("i = [%05d]%n", i);`：在五个字符宽的字段中格式化，前导零

  *   `System.out.printf("i = [%-5d]%n", i);`：在五个字符宽的字段中左对齐格式化


  在每种情况下，格式字符串都以 `%n` 结尾。此格式说明符表示要输出一个换行符。


  接下来，`main()` 声明了局部 `String` 变量 `s` 并将其初始化为 `"hello, world"`。然后它执行了两次 `System.out.printf()`
  来演示格式化该字符串的两种方式：


  *   `System.out.printf("s = [%s]%n", s);`：默认格式

  *   `System.out.printf("s = [%30s]%n", s);`：在 30 个字符宽的字段中格式化，前导空格


  按如下方式编译清单 14-5：


  ```

  javac FormattedOutputDemo.java

  ```


  按如下方式运行应用程序：


  ```

  java FormattedOutputDemo

  ```


  您应该会看到以下输出：


  ```

  i = [10]

  i = [   10]

  i = [00010]

  i = [10   ]

  s = [hello, world]

  s = [                  hello, world]

  ```


  ### 标准错误


  正在运行的程序会将其错误输出发送到*标准错误*，这是一种操作系统机制，用于抽象错误输出的目的地。该机制默认指向控制台屏幕，但可以重定向到文件或其他输出设备。


  考虑第 13 章的 `TR` 应用程序。它调用 `System.out.println()` 将用法错误消息写入标准输出。相反，将此消息写入标准错误更为合适，以便改善程序输出的组织性。


  注意


  标准输出允许您将非错误输出发送到一个目的地，而标准错误允许您将错误输出发送到另一个目的地。这种分离有助于您组织输出，从而可以专注于错误消息，而不会被非错误输出分散注意力。


  `System.err` 引用 `System` 的 `err` 类字段，其类型为 `PrintStream`。您可以使用 `PrintStream` 的 `print()`
  和 `println()` 方法将各种类型的面向错误的数据写入接收端。


  假设您创建了一个新版本的 TR，将以下代码片段：


  ```

  if (args.length == 0)

  {

  System.out.println("usage: java TR sequence of words");

  return;

  }

  ```


  替换为：


  ```

  if (args.length == 0)

  {

  System.err.println("usage: java TR sequence of words");

  return;

  }

  ```


  我已将 `out` 和 `err` 加粗，以便您看到需要更改的内容。


  按照第 13 章中的方式编译并运行 `TR`。当您不指定任何命令行参数时，您会注意到以下错误消息：


  ```

  usage: java TR sequence of words

  ```


  如果您尝试通过以下命令行将其重定向到文件：


  ```

  java TR >out

  ```


  您会注意到 `out` 是空的。


  但是，如果您尝试通过以下命令行将错误消息重定向到文件：


  ```

  java TR 2>out

  ```


  您会发现错误消息出现在文件中。


  `2>out` 中的数字 `2` 标识了标准错误流。


  注意


  `System` 提供了 `void setErr(PrintStream out)` 方法，用于将标准错误输出重定向到另一个流。例如，`System.setErr(new
  FileOutputStream("out"));` 等同于 `2>out`。




  ## 系统属性


  *系统属性*是一个键值对，用于提供 JVM 运行时环境当前某个方面的信息。多个 `System` 方法和 `java.util.Properties` 类有助于处理系统属性。以下是
  `System` 提供的方法：


  *   `String clearProperty(`[`String`](https://docs.oracle.com/en/java/javase/20/docs/api/java.base/java/lang/String.xhtml)
  `key)`：移除由指定 `key` 标识的系统属性。


  *   `static` [`Properties`](https://docs.oracle.com/en/java/javase/20/docs/api/java.base/java/util/Properties.xhtml)
  `getProperties()`：返回当前的系统属性集。如果当前没有系统属性集，则会首先创建并初始化一个系统属性集。


  *   `static` [`String`](https://docs.oracle.com/en/java/javase/20/docs/api/java.base/java/lang/String.xhtml)
  `getProperty(`[`String`](https://docs.oracle.com/en/java/javase/20/docs/api/java.base/java/lang/String.xhtml)
  `key)`：获取由指定 `key` 标识的系统属性。


  *   `static` [`String`](https://docs.oracle.com/en/java/javase/20/docs/api/java.base/java/lang/String.xhtml)
  `getProperty(`[`String`](https://docs.oracle.com/en/java/javase/20/docs/api/java.base/java/lang/String.xhtml)
  `key,` [`String`](https://docs.oracle.com/en/java/javase/20/docs/api/java.base/java/lang/String.xhtml)
  `defaultValue)`：获取由指定 `key` 标识的系统属性。如果系统属性不存在，则返回 `defaultValue` 引用的字符串。


  *   `static void setProperties(`[`Properties`](https://docs.oracle.com/en/java/javase/20/docs/api/java.base/java/util/Properties.xhtml)
  `props)`：将系统属性设置为 `props` 的内容。


  *   `static` [`String`](https://docs.oracle.com/en/java/javase/20/docs/api/java.base/java/lang/String.xhtml)
  `setProperty(`[`String`](https://docs.oracle.com/en/java/javase/20/docs/api/java.base/java/lang/String.xhtml)
  `key,` [`String`](https://docs.oracle.com/en/java/javase/20/docs/api/java.base/java/lang/String.xhtml)
  `value)`：将由指定 `key` 标识的系统属性设置为 `value`。`System.setProperty()` 仅为当前运行时设置属性。程序退出后，这些属性将不再设置。如果需要在会话之间持久化属性，请考虑使用基于属性的配置文件（稍后讨论）或其他形式的持久化存储。


  警告


  关于 `setProperty()` **和** `setProperties()`**，除非另有说明，更改标准系统属性可能会导致不可预测的结果**。属性值可能在初始化期间或首次使用时被缓存。在初始化之后使用
  `getProperties()`、`setProperties(Properties)`、`setProperty(String, String)` 或 `clearProperty(String)`
  设置标准属性可能不会产生预期效果。


  设置系统属性在各种配置中可能很有用，但重要的是要负责任地使用它们，并确保它们不会干扰 JVM 或应用程序的正常运行。


  清单 14-6 中的 `PropertiesDemo` 应用程序演示了所有这些方法。


  ```

  import java.util.Properties;

  public class PropertiesDemo

  {

  public static void main(String[] args)

  {

  // 演示 setProperty()、getProperty() 和 clearProperty()。

  System.setProperty("temp.location", "C:\\temp");

  showProperty("清除前的临时位置", "temp.location");

  System.clearProperty("temp.location");

  showProperty("清除后的临时位置", "temp.location");

  // 演示 getProperties() 和 Properties。

  Properties properties = System.getProperties();

  showProperty("Java 版本", properties.getProperty("java.version"));

  showProperty("操作系统名称", properties.getProperty("os.name"));

  showProperty("用户主目录", properties.getProperty("user.home"));

  System.out.println();

  properties.list(System.out);

  // 更多 getProperty() 的演示。

  showProperty("Java 版本", "java.version");

  showProperty("操作系统名称", "os.name");

  showProperty("Java 类路径", "java.class.path");

  showProperty("行分隔符", "line.separator");

  showProperty("用户账户名", "user.name");

  showProperty("用户主目录", "user.home");

  // 演示 setProperty()。

  System.setProperty("someprop", "somevalue");

  showProperty("某个属性", "someprop");

  // 演示 setProperties()。

  Properties newProperties = new Properties();

  newProperties.setProperty("someprop1", "somevalue1");

  newProperties.setProperty("someprop2", "somevalue2");

  System.setProperties(newProperties);

  showProperty("某个属性 1", "someprop1");

  showProperty("某个属性 2", "someprop2");

  }

  static void showProperty(String msg, String propertyName)

  {

  System.out.printf("%s: %s%n", msg, System.getProperty(propertyName));

  }

  }

