  每一行标识一个或多个运算符。这些运算符共享相同的优先级。“优先级”列显示了一个从 1 到 15 的数字，用于指定该行中所有运算符的优先级。数字越大，优先级越高。例如，乘法的优先级（12）高于加法的优先级（11），因为乘法在加法之前执行。


  ### 运算符示例


  表 3-1 中的一些运算符可能比较熟悉；另一些则可能令人费解。接下来的几节将按优先级从低到高的顺序简要描述所有运算符。


  #### 赋值运算符


  Java 支持简单赋值（`=`）和复合赋值（`+=`、`-=`、`*=`、`/=`、`%=`、`&=`、`^=`、`|=`、`<<=`、`>>=` 和 `>>>=`）运算符。


  ##### 简单赋值


  *=* *运算符*将表达式的值赋给一个变量。该运算符的语法如下：


  ```

  变量 ''='' 表达式 '';''

  ```


  注意


  你必须指定单引号之间的内容（但不包括单引号本身）。此外，斜体项是你必须输入的占位符。这也适用于表 3-1 中的 `(`*类型*`)`。（在该表中，我没有使用单引号来包围你需要逐字输入的文本，因为我不想造成混淆。）


  *变量*和*表达式*的类型必须一致，以避免编译器错误。例如，你不能直接将一个`double`值赋给一个`int`变量。


  考虑以下示例，它将`self_employed`初始化为`true`：


  ```

  boolean self_employed = true;

  ```


  ##### 复合赋值


  *+=*、*-=*、**=*、*/=*、*%=*、*&=*、*^=*、*|=*、*<<=*、*>>=* 和 *>>>=* *运算符*先执行其运算，然后将结果赋给变量。它们的语法如下所示：


  ```

  变量 ''+='' 表达式 '';''

  变量 ''-='' 表达式 '';''

  变量 ''*='' 表达式 '';''

  变量 ''/='' 表达式 '';''

  变量 ''%='' 表达式 '';''

  变量 ''&='' 表达式 '';''

  变量 ''^='' 表达式 '';''

  变量 ''|='' 表达式 '';''

  变量 ''<<='' 表达式 '';''

  变量 ''>>='' 表达式 '';''

  变量 ''>>>='' 表达式 '';''

  ```


  同样，变量和表达式的类型必须一致，以避免编译器错误。


  看看这些例子：


  ```

  int x += 1; // 递增 x。

  int x -= 1; // 递减 x。

  int x *= 2; // 将 x 乘以 2。

  int x /= 2; // 将 x 除以 2。

  int x %= 2; // 将 x 除以 2 的余数赋给 x。

  int x &= 0xFFFFFF00; // 关闭 x 中最右边的八位。

  int x ^= 0xFFFFFFFF; // 关闭 x 中所有已设置的位。

  int x |= 0xFF000000; // 打开 x 中最左边的八位。

  int x <<= 1; // 将 x 乘以 2。

  int x >>= 1; // 将 x 除以 2。如果 x 为负数，结果也为负数。

  int x >>>= 1; // 将 x 除以 2。如果 x 为负数，结果为正数。

  ```


  在乘以或除以 2 的幂时，`<<=` 和 `>>=` 运算符比其对应的 `*` 和 `/` 运算符执行得更快。此外，在处理二进制数时，它们也更直观。




  #### 条件运算符


  *?: 运算符*根据条件决定对两个表达式中的哪一个进行求值。其语法如下：


  ```

  condition ''?'' expression1 '':'' expression2

  ```


  *条件*是一个布尔表达式。当条件求值为 true 时，将对 *expression1* 进行求值并返回其结果。然而，当条件求值为 false 时，将对 *expression2*
  进行求值并返回其结果。*expression1* 和 *expression2* 的类型必须一致，以避免编译器错误。例如，你不能让 *expression1*
  是 `int` 类型而 *expression2* 是 `double` 类型。


  以下示例展示了如何使用 `?:` 根据一位女性的 `age` 来判断她是否有资格领取养老金：


  ```

  int age = 60;

  boolean eligibleForPension = (age >= 55) ? true : false;

  ```


  因为 `age` 大于 `55`，所以 `true` 被赋值给 `eligibleForPension`。


  #### 逻辑或运算符


  *||* *运算符*会对其左操作数进行求值，并且仅当左操作数为 false 时，才对右操作数进行求值。这被称为*短路求值*。其语法如下：


  ```

  operand1 ''||'' operand2

  ```


  *operand1* 和 *operand2* 都必须为 `boolean` 类型。当 *operand1* 和 *operand2* 中有一个或两个都为 true
  时，此表达式返回 true；否则，返回 false。


  考虑以下示例：


  ```

  int x = 93;

  boolean outOfRange = (x < 10 || x > 50);

  ```


  该示例首先将 `x` 初始化为 `93`。然后，它使用逻辑或运算符结合 `x` 来判断 `x` 是否在范围 `10` 到 `50` 之外。因为 `x` 不在此范围内（其值为
  `93`），所以 `true` 被赋值给 `outOfRange`。


  由于 `x` 等于 `93`，表达式 `x < 10` 和 `x > 50` 都会被求值。但是，如果 `x` 等于 `5`，由于短路求值，则只需要对 `x <
  10` 表达式进行求值。


  短路求值可以帮助你避免在空引用上调用方法。考虑以下示例：


  ```

  str == null || str.isEmpty()

  ```


  在此示例中，`str` 引用了一个 `String` 对象。我们想在此对象上调用 `String` 的 `isEmpty()` 方法，以判断该字符串是否包含任何字符。然而，如果
  `str` 包含 null，调用 `isEmpty()` 将导致 `NullPointerException`。我们通过首先使用表达式 `str == null`
  来测试 `str` 是否为空，从而避免了这种可能性。如果 `str` 包含 null，则 `str == null` 为 true，并且 `||` 不会对 `str.isEmpty()`
  进行求值，从而防止了 `NullPointerException`。但是，如果 `str` 不包含 null，则 `str == null` 为 false，并且
  `||` 会对 `str.isEmpty()` 进行求值，从而防止了 `NullPointerException`。你将在后面的第 13、6 和 11 章中分别了解
  `String`、方法和 `NullPointerException`。


  #### 逻辑与运算符


  *&&* *运算符*会对其左操作数进行求值，并且仅当左操作数为 true 时，才对右操作数进行求值。这也被称为*短路求值*。其语法如下：


  ```

  operand1 ''&&'' operand2

  ```


  *operand1* 和 *operand2* 都必须为 `boolean` 类型。当 *operand1* 和 *operand2* 都为 true 时，此表达式返回
  true；否则，返回 false。


  考虑以下示例：


  ```

  int x = 93;

  boolean inRange = (x >= 10 && x <= 50);

  ```


  此示例与上一节中的示例基本相同。它只是反转了该示例的行为。


  短路求值可以帮助你避免在空引用上调用方法。考虑以下示例：


  ```

  str != null && !str.isEmpty()

  ```


  此示例与上一节中的示例基本相同。它只是反转了该示例的行为。


  #### 按位包含或运算符


  *|* *运算符*对其操作数的位进行包含或运算。对于每一位，如果其中一个或两个位都为 1，则结果位为 1；否则，结果位为 0。此运算符的语法如下：


  ```

  operand1 ''|'' operand2

  ```


  *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int` 或 `long` 类型。此表达式返回包含或运算后的结果。


  考虑以下示例：


  ```

  byte status = readPort(DEVICE);

  writePort(DEVICE, status | ENABLE_PRINTER);

  ```


  此示例从一个假设计算机的 `DEVICE` 端口读取一个状态字节。然后，它通过将 `ENABLE_PRINTER` 值与 `status` 字段进行或运算（以防打印机未启用）来启用打印机，并将此值写入
  `DEVICE` 端口。


  `|` 运算符可以像 `||` 一样使用，但不执行短路求值。它总是对其右操作数进行求值。示例如下：


  ```

  x < 10 | x > 50

  ```


  在此示例中，右操作数（`x > 50`）总是被求值。


  #### 按位异或运算符


  *^* *运算符*对其操作数的位进行异或运算。对于每一位，如果其中一个位为 1 但两个位不都为 1，则结果位为 1；否则，结果位为 0。此运算符的语法如下：


  ```

  operand1 ''^'' operand2

  ```


  *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int` 或 `long` 类型。此表达式返回异或运算后的结果。


  考虑以下示例：


  ```

  int i = 10;

  int j = 20;

  i = i ^ j; // 30

  j = i ^ j; // 10

  i = i ^ j; // 20

  ```


  此示例使用 `^` 来交换变量 `i` 和 `j` 的内容。


  #### 按位与运算符


  *&* *运算符*对其操作数的位进行与运算。对于每一位，如果两个位都为 1，则结果位为 1；否则，结果位为 0。此运算符的语法如下：


  ```

  operand1 ''&'' operand2

  ```


  *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int` 或 `long` 类型。此表达式返回与运算后的结果。


  考虑以下示例：


  ```

  byte status = readPort(DEVICE);

  writePort(DEVICE, status & ~ENABLE_PRINTER);

  ```


  此示例从一个假设计算机的 `DEVICE` 端口读取一个状态字节。然后，它通过将 `ENABLE_PRINTER` 值的取反值与 `status` 字段进行与运算（以防打印机已启用）来禁用打印机，并将此值写入
  `DEVICE` 端口。


  `&` 运算符可以像 `&&` 一样使用，但不执行短路求值。它总是对其右操作数进行求值。示例如下：


  ```

  x >= 10 & x <= 50

  ```


  在此示例中，右操作数（`x <= 50`）总是被求值。


  #### 相等运算符


  Java 支持等于（`==`）和不等于（`!=`）相等运算符。


  ##### 等于


  *==* *运算符*比较两个操作数是否相等。此运算符的语法如下：


  ```

  operand1 ''=='' operand2

  ```


  当两个操作数相等时，`==` 运算符返回 true；否则，返回 false。


  示例如下：


  ```

  int x = 10;

  int y = 15;

  boolean equal = x == y;

  ```


  在此示例中，`x` 和 `y` 各自包含一个整数。`x == y` 表达式返回 false，因为 `x`（`10`）不等于 `y`（`15`）。




  ##### 不等于


  *!=* *运算符*比较两个操作数是否不相等。该运算符的语法如下：


  ```

  operand1 ''!='' operand2

  ```


  当两个操作数不相等时，`!=` 运算符返回 true；否则返回 false。


  示例如下：


  ```

  int x = 10;

  int y = 15;

  boolean equal = x != y;

  ```


  在此示例中，`x` 和 `y` 各自包含一个整数。表达式 `x != y` 返回 true，因为 `x`（`10`）不等于 `y`（`15`）。


  对于这两个运算符，两个操作数都必须具有可比性。例如，你不能将整数常量与字符串常量进行比较。


  当涉及对象时（在第 6 章中讨论），这些运算符不会比较它们是否相等或不相等。相反，它们会比较这些对象的引用。例如，`"abc" == "abc"` 会比较第一个字符串常量的引用与第二个字符串常量的引用。由于一种称为“驻留”的机制（在第
  13 章讨论 `String` 类时会提到），这些引用是相同的，因此表达式返回 true。对于 `"abc" != "abc"`，表达式返回 false。


  #### 关系运算符


  Java 支持小于（`<`）、小于等于（`<=`）、大于（`>`）、大于等于（`>=`）以及用于对象的类型比较（`instanceof`）关系运算符。


  ##### 关系小于


  *<* *运算符*比较两个操作数，以判断左操作数是否小于右操作数。该运算符的语法如下：


  ```

  operand1 ''<'' operand2

  ```


  *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
  类型。当 *operand1* 小于 *operand2* 时，此表达式返回 true；否则返回 false。


  考虑以下示例：


  ```

  x < y

  ```


  当 `x` 小于 `y` 时，此表达式计算结果为 true；否则计算结果为 false。


  ##### 关系小于等于


  *<=* *运算符*比较两个操作数，以判断左操作数是否小于或等于右操作数。该运算符的语法如下：


  ```

  operand1 ''<='' operand2

  ```


  *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
  类型。当 *operand1* 小于或等于 *operand2* 时，此表达式返回 true；否则返回 false。


  考虑以下示例：


  ```

  x <= y

  ```


  当 `x` 小于或等于 `y` 时，此表达式计算结果为 true；否则计算结果为 false。


  ##### 关系大于


  *>* *运算符*比较两个操作数，以判断左操作数是否大于右操作数。该运算符的语法如下：


  ```

  operand1 ''>'' operand2

  ```


  *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
  类型。当 *operand1* 大于 *operand2* 时，此表达式返回 true；否则返回 false。


  考虑以下示例：


  ```

  x > y

  ```


  当 `x` 大于 `y` 时，此表达式计算结果为 true；否则计算结果为 false。


  ##### 关系大于等于


  *>=* *运算符*比较两个操作数，以判断左操作数是否大于或等于右操作数。该运算符的语法如下：


  ```

  operand1 ''>='' operand2

  ```


  *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
  类型。当 *operand1* 大于或等于 *operand2* 时，此表达式返回 true；否则返回 false。


  考虑以下示例：


  ```

  x >= y

  ```


  当 `x` 大于或等于 `y` 时，此表达式计算结果为 true；否则计算结果为 false。


  ##### 对象的类型比较


  *instanceof* *运算符*比较其左操作数（一个对象）与其右操作数（一个引用类型），以确定该对象是否为该引用类型的实例。该运算符的语法如下：


  ```

  operand1 ''instanceof'' operand2

  ```


  *Operand1* 必须是某个引用类型（例如类——关于对象和类的讨论请参见第 6 章）的实例（对象）。*Operand2* 必须是一个类或其他引用类型。当 *operand1*
  是 *operand2* 的一个实例时，此表达式返回 true；否则返回 false。


  考虑以下示例：


  ```

  "abc" instanceof String

  ```


  此表达式计算结果为 true，因为 `"abc"` 是 `String` 类的一个实例。


  #### 移位运算符


  Java 支持按位左移（`<<`）、带符号扩展的按位右移（`>>`）以及带零扩展的按位右移（`>>>`）移位运算符。


  ##### 按位左移


  *<<* *运算符*将其左操作数中的位向左移动，移动的位数由右操作数指定。每次移位，最右侧位补 0，最左侧位被丢弃。该运算符的语法如下：


  ```

  operand1 ''<<'' operand2

  ```


  *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int` 或 `long` 类型。此表达式返回 *operand1*
  向左移动 *operand2* 位后的结果。


  考虑以下示例：


  ```

  2 << 3

  ```


  此表达式将 `2` 向左移动 `3` 位。结果为 16。本质上，我们是将 `2` 乘以 8。这比使用 `*` 运算符快得多。然而，它仅限于乘以 2 的小次幂。


  ##### 带符号扩展的按位右移


  *>>* *运算符*将其左操作数中的位向右移动，移动的位数由右操作数指定。每次移位，最左侧位（*符号位*，指示其余位表示正数还是负数——0 表示正数，1 表示负数）的副本被移到右侧，最右侧位被丢弃。这被称为*有符号移位*。该运算符的语法如下：


  ```

  operand1 ''>>'' operand2

  ```


  *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int` 或 `long` 类型。此表达式返回 *operand1*
  向右移动 *operand2* 位后的结果。


  考虑以下示例：


  ```

  4 >> 1

  -4 >> 1

  ```


  第一个表达式将 `4` 向右移动 `1` 位。结果为 2。第二个表达式将 `-4` 向右移动 `1` 位。结果为 -2。本质上，我们是将 4 或 -4 除以 2。这比使用
  `/` 运算符快得多。然而，它仅限于除以 2 的小次幂。




  ##### 无符号右移


  *>>>* *运算符*将其左操作数的二进制位向右移动，移动的位数由右操作数指定。每次移位时，右侧会补入一个 0，而最右侧的位则被丢弃。这被称为*无符号移位*。该运算符的语法如下：


  ```

  operand1 ''>>>'' operand2

  ```


  *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int` 或 `long` 类型。此表达式返回将 *operand1*
  向右移动 *operand2* 位后的结果。


  请参考以下示例：


  ```

  4 >>> 1

  -4 >>> 1

  ```


  第一个表达式将 `4` 向右移动 `1` 位，结果为 2。第二个表达式将 `-4` 向右移动 `1` 位，结果为 2147483646（即 -2 的无符号等效值）。本质上，这是将
  4 或 -4 除以 2。这比使用 `/` 运算符快得多。然而，它仅限于除以 2 的小次幂。


  对于涉及 32 位表达式的每种移位操作，仅使用 *operand2* 的低 5 位，以防止移位超过 32 位整数的位数。对于涉及 64 位表达式的每种移位操作，仅使用
  *operand2* 的低 6 位，以防止移位超过 64 位表达式的位数。


  #### 加法运算符


  Java 支持加法/字符串连接 (`+`) 和减法 (`-`) 加法运算符。


  ##### 加法/字符串连接


  *+* *运算符*将其两个数值操作数相加并返回总和。该运算符的语法如下：


  ```

  operand1 ''+'' operand2

  ```


  *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
  类型。此表达式返回 *operand1* 加 *operand2* 的结果。


  请参考以下示例：


  ```

  int x = 10;

  int y = 20;

  int sum = x + y;

  ```


  此示例将变量 `x` 和 `y` 中的值相加，这两个变量分别被赋值为 `10` 和 `20`。然后将总和赋给变量 `sum`。


  *+* *运算符*也用于将一个字符串追加到另一个字符串。这被称为*字符串连接*。其语法与加法相同。


  至少一个操作数必须是 `String` 类型。另一个操作数在执行连接之前会被转换为字符串。


  请参考以下示例：


  ```

  "abc" + "def"

  ```


  结果是一个新的 `String` 对象，包含序列 `abcdef`。（我将在第 13 章讨论 `String` 类。）


  ##### 减法


  *-* *运算符*从其左数值操作数中减去其右数值操作数，并返回差值。该运算符的语法如下：


  ```

  operand1 ''-'' operand2

  ```


  *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
  类型。此表达式返回 *operand1* 减 *operand2* 的结果。


  请参考以下示例：


  ```

  int x = 10;

  int y = 20;

  int difference = x - y;

  ```


  此示例从变量 `x` 的值中减去变量 `y` 的值，这两个变量分别被赋值为 `10` 和 `20`。然后将差值赋给变量 `difference`。


  #### 乘法运算符


  Java 支持乘法 (`*`)、除法 (`/`) 和取模 (`%`) 乘法运算符。


  ##### 乘法


  *** *运算符*将其两个数值操作数相乘并返回乘积。该运算符的语法如下：


  ```

  operand1 ''*'' operand2

  ```


  *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
  类型。此表达式返回 *operand1* 乘以 *operand2* 的结果。


  请参考以下示例：


  ```

  int x = 10;

  int y = 20;

  int product = x * y;

  ```


  此示例将变量 `x` 和 `y` 中的值相乘，这两个变量分别被赋值为 `10` 和 `20`。然后将乘积赋给变量 `product`。


  ##### 除法


  */* *运算符*将其左数值操作数除以右数值操作数，并返回商。该运算符的语法如下：


  ```

  operand1 ''/'' operand2

  ```


  *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
  类型。此表达式返回 *operand1* 除以 *operand2* 的商。


  请参考以下示例：


  ```

  int x = 10;

  int y = 20;

  int dividend = x / y;

  ```


  此示例将变量 `x` 的值除以变量 `y` 的值，这两个变量分别被赋值为 `10` 和 `20`。然后将商赋给变量 `dividend`。


  ##### 取模


  *%* *运算符*将其左数值操作数除以右数值操作数，并返回余数。该运算符的语法如下：


  ```

  operand1 ''%'' operand2

  ```


  *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
  类型。此表达式返回 *operand1* 除以 *operand2* 的余数。


  请参考以下示例：


  ```

  int x = 10;

  int y = 20;

  int remainder = x % y;

  ```


  此示例将变量 `x` 的值除以变量 `y` 的值，这两个变量分别被赋值为 `10` 和 `20`。然后将余数赋给变量 `remainder`。


  #### 一元运算符


  Java 支持前自增 (`++`)、前自减 (`--`)、正号 (`+`)、负号 (`-`)、逻辑非 (`!`)、按位取反 (`~`) 和类型转换 [`(`*type*`)`]
  一元运算符。


  ##### 前自增


  *++* *运算符*对其操作数进行前自增，该操作数必须是 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
  类型的变量。结果存储在该变量中。这是一种快速给变量加 1 的方式。该运算符的语法如下：


  ```

  ''++'' variable

  ```


  请参考以下示例：


  ```

  int x = 1;

  int y = ++x;

  ```


  此示例运行后，`x` 和 `y` 都被赋值为 2。


  ##### 前自减


  *--* *运算符*对其操作数进行前自减，该操作数必须是 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
  类型的变量。结果存储在该变量中。这是一种快速给变量减 1 的方式。该运算符的语法如下：


  ```

  ''--'' variable

  ```


  请参考以下示例：


  ```

  int x = 1;

  int y = --x;

  ```


  此示例运行后，`x` 和 `y` 都被赋值为 0。


  ##### 正号


  *+* *运算符*是一个空操作运算符（它的存在是为了完整性）。其操作数必须是 `char`、`byte`、`short`、`int`、`long`、`float`
  或 `double` 类型。该运算符的语法如下：


  ```

  ''+'' operand

  ```


  请参考以下示例：


  ```

  int x = +6;

  int y = +x;

  ```


  示例运行后，`y` 被赋值为 6。


  ##### 负号


  *–* *运算符*对其操作数取反，该操作数必须是 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double` 类型。该运算符的语法如下：


  ```

  ''-'' operand

  ```


  请参考以下示例：


  ```

  int x = 6;

  int y = -x;

  ```


  示例运行后，`y` 被赋值为 -6。


  ##### 逻辑非


  *!* *运算符*对其操作数进行逻辑取反，该操作数必须是 `boolean` 类型。该运算符的语法如下：


  ```

  ''!'' operand

  ```


  请参考以下示例：


  ```

  boolean first = true;

  boolean second = !first;

  ```


  示例运行后，`second` 的值为 false。


  ##### 按位取反


  *~ 运算符*翻转其操作数中的所有位，该操作数必须是 `char`、`byte`、`short`、`int` 或 `long` 类型，并返回结果。该运算符的语法如下：


  ```

  ''~'' operand

  ```


  请参考以下示例：


  ```

  int x = 20;

  int y = ~x;

  ```


  此示例运行后，`y` 被赋值为 -20。




  ##### 类型转换


  *(类型)* *运算符*会将其操作数的类型转换（强制转换）为*类型*。操作数的值会被更改为新类型中的等效值。此运算符的语法如下：


  ```

  ''('' 类型 '')'' 操作数

  ```


  考虑以下示例：


  ```

  int x = (int) 1.0;

  ```


  此示例将 `double` 值 `1.0` 转换为 `int` 值 `1`。然后，该值被赋值给 `int` 变量 `x`。如果没有进行类型转换，编译器会报告错误。


  #### 一元后置自增/后置自减运算符


  Java 支持后置自增（`++`）和后置自减（`--`）一元运算符。


  ##### 后置自增


  *++* *运算符*对其操作数进行后置自增，该操作数必须是 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
  类型的变量。结果会存储在该变量中。这是一种给变量加 1 的快速方法。此运算符的语法如下：


  ```

  变量 ''++''

  ```


  考虑以下示例：


  ```

  int x = 1;

  int y = x++;

  ```


  此示例运行后，`y` 被赋值为 1。然而，`x` 的值为 2。


  ##### 后置自减


  *--* *运算符*对其操作数进行后置自减，该操作数必须是 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
  类型的变量。结果会存储在该变量中。这是一种给变量减 1 的快速方法。此运算符的语法如下：


  ```

  变量 ''--''

  ```


  考虑以下示例：


  ```

  int x = 1;

  int y = --x;

  ```


  此示例运行后，`y` 被赋值为 0。


  #### 其他运算符


  Java 还支持括号 [`()`]、数组索引（`[]`）和成员选择（`.`）运算符。


  ##### 括号


  *()* *运算符*允许你更改数值表达式的优先级顺序。例如，考虑以下表达式：


  ```

  4 + 2 * 3

  ```


  在此表达式中，`2 * 3` 会首先被计算。然后，其结果与 `4` 相加。


  你可以通过使用括号来更改计算顺序。考虑以下表达式：


  ```

  (4 + 2) * 3

  ```


  在此表达式中，`4 + 2` 会首先被计算。然后，其结果与 `3` 相乘。


  你可以将括号嵌套到任意深度。考虑以下表达式：


  ```

  (4 + (5 – 3)) * 2

  ```


  最内层的括号会首先被计算，因此 `5 – 3` 会首先被计算。然后，其结果与 `4` 相加。最后，结果再乘以 `2`。


  ##### 数组索引


  *[]* *运算符*允许你从数组中提取一个元素。我将在第 5 章讨论数组，并在该章中演示此运算符。


  ##### 成员选择


  *.* *运算符*允许你访问字段或调用方法。此运算符的语法如下：


  ```

  操作数 1 ''.'' 操作数 2

  ```


  *操作数 1* 是对对象或引用类型（例如类）的引用，通常表示为变量名（包括对象名）或引用类型名。*操作数 2* 是引用类型的字段或方法的名称。（我将在第 6 章讨论对象、类、字段和方法。）考虑以下示例：


  ```

  "abc".length()

  ```


  在此表达式中，字符串字面量 `"abc"`（实际上是一个 `String` 对象）提供了对此对象的引用，而 `length()` 是 `String` 类中的方法之一。此方法返回
  `"abc"` 中的字符数，恰好是 3。（我将在第 13 章介绍 `String` 及其 `length()` 方法。）




  ## 玩转表达式


  表达式可以很有趣，因为你永远不知道会发现什么。我创建了一个 `ExprDemo` 应用程序，并在其中填充了几个示例表达式，作为本次探索的起点。清单 3-1 展示了
  `ExprDemo` 的源代码。


  ```

  class ExprDemo

  {

  public static void main(String[] args)

  {

  System.out.println("\"abc\" instanceof String: " +

  ("abc" instanceof String));

  System.out.println("4 << 1: " + (4 << 1));

  System.out.println("-4 << 1: " + (-4 << 1));

  System.out.println("1 << 31: " + (1 << 31));

  System.out.println("1 << 32: " + (1 << 32));

  System.out.println("-1 << 31: " + (-1 << 31));

  System.out.println("-1 << 32: " + (-1 << 32));

  int x = 3;

  System.out.println("x++: " + x++);

  System.out.println("x: " + x);

  System.out.println("5 / 0: " + (5 / 0));

  }

  }

  清单 3-1

  ExprDemo.java

  ```


  `ExprDemo` 重点关注 `instanceof`、`+`（字符串拼接）、`()`（括号）、`<<`（左移）、`-`（取反）、`=`（赋值）、`++`（后置自增）和
  `/`（除法）这些运算符，它们出现在表达式中，而这些表达式的值作为参数传递给 `System.out.println()` 方法调用。


  第一个方法调用中的表达式使用 `instanceof` 来判断 `"abc"` 是否是 `String` 的实例，`String` 是一个类的例子。（第 6 章将教你关于类的知识。）回想一下，当
  `instanceof` 的左操作数（一个引用）是其右操作数（一个引用类型）的实例时，它返回 true；否则返回 false。


  事实证明，`"abc"` 字符串字面量是 `String` 的一个实例，这使得 `"abc"` 很特殊。你将在第 13 章（我会探讨 `String`）中了解到字符串字面量有多么特殊。


  第一个方法调用中的表达式还使用了 `+` 来将两个字符串拼接成一个更大的字符串。该运算符的左操作数是字符串字面量 `"\"abc\" instanceof String:
  "`（注意 `\"` 转义序列用于在字符串字面量中放置双引号字符），但右操作数不是字符串：带括号的 `"abc" instanceof String` 表达式求值为一个布尔值
  true/false。这是怎么回事？


  Java 的 `+` 运算符对其数值操作数进行加法运算并返回它们的和。然而，当其中一个操作数是字符串而另一个操作数不是字符串时，`+` 会使用*字符串转换*将非字符串转换为字符串。如果该字符串是一个对象（你将在第
  6 章学习对象），`+` 会使用该对象的 `toString()` 方法来获取该对象的字符串表示。如果操作数是基于原始类型的值（例如布尔值 true），`+`
  会将该操作数转换为字符串，而不依赖 `toString()`。`+` 运算符将右操作数字符串追加到左操作数字符串之后，并返回拼接后得到的字符串。


  将括号运算符与字符串拼接一起使用


  你可能想知道为什么我在 `"\"abc\" instanceof String: " + ("abc" instanceof String)` 中给 `"abc"
  instanceof String` 加上了括号。我这样做是因为我希望输出如下所示：


  ```

  "abc" instanceof String: true

  ```


  如果没有括号，我会看到以下输出：


  ```

  true

  ```


  字符串拼接 (`+`) 的优先级高于对象的 relational 类型检查 (`instanceof`)。如果没有括号，编译器生成的字节码就好像表达式被括号括起来如下：


  ```

  ("\"abc\" instanceof String: " + "abc") instanceof String

  ```


  字节码首先计算 `"\"abc\" instanceof String: " + "abc"`，结果是 `"abcabc"`。然后计算 `"abcabc" instanceof
  String`，返回 true。最后，它执行 `System.out.println()`，参数为 `true`，并输出该值。


  这是另一个没有括号就无法按预期求值的表达式示例：


  ```

  System.out.println("4 + 2: " + 4 + 2);

  ```


  此方法调用输出 `4 + 2: 42` 而不是 `4 + 2: 6`。


  回想一下，结合性决定了当一个表达式包含两个或多个具有相同优先级的运算符时，它是如何求值的。例如，表达式 `"4 + 2: " + 4 + 2` 由子表达式 `"4
  + 2: "`、子表达式 `4`（在左侧 `+` 运算符之后）和子表达式 `2`（在右侧 `+` 运算符之后）组成。


  表达式 `"4 + 2: " + 4 + 2` 的求值过程如下：


  1.  计算 `"4 + 2: " + 4`。结果是字符串 `"4 + 2: 4"`。


  2.  计算 `"4 + 2: 4" + 2`。结果是字符串 `"4 + 2: 42"`。


  这个求值顺序可以通过使用括号运算符来阐明，如下所示：


  ```

  (("4 + 2: " + 4) + 2)

  ```


  要更改此表达式以便看到 `4 + 2: 6`，你需要在 `4 + 2` 周围加上括号，如下所示：


  ```

  "4 + 2: " + (4 + 2)

  ```


  这次，`(4 + 2)` 会首先被求值，因为括号运算符具有最高优先级。


  `<<` 运算符将其左操作数向左移动其右操作数指示的位置数。接下来的六个方法调用演示了这个运算符。


  这些方法调用中第一个的表达式将 `4` 向左移动一个位置。结果是 `8`。这相当于将 `4` 乘以 2，但速度更快。


  第二个方法调用的表达式将 `-4` 向左移动一个位置。结果是 `-8`。这并不意外！


  第三个方法调用的表达式将 `1` 向左移动 31 个位置。结果是 -2147483648，这可能看起来令人惊讶，因为 `1` 是正数而结果是负数。然而，当你考虑到一个
  32 位的值正在被左移，其最左边的位（位置 31——最右边的位在位置 0）是符号位（0 表示正数，1 表示负数），并且 1 被移入了符号位，这就不足为奇了。


  Java 以*二进制补码*（[``en.wikipedia.org/wiki/Two''s_complement``](http://en.wikipedia.org/wiki/Two%2527s_complement)）格式表示整数，这种格式允许你通过将所有位翻转为相反状态并将结果加
  1，来“将正二进制数可逆地转换为具有等效负值的负二进制数”。例如，假设一个 4 位整数，位置 3 是符号位，你会将 5 表示为 0101。翻转这些位会得到 1010。将结果加
  1 会得到 1011，这是 -5 的位模式（1111 是 -1 的模式，1110 是 -2 的模式，1101 是 -3 的模式，1100 是 -4 的模式）。你可以通过翻转所有位并将结果加
  1 来转换回 5。


  第四个方法调用中 `1 << 32` 表达式的结果可能令人困惑。你可能期望结果是 0，因为 `1` 被移过了位置 31，并且 0 被移到了它后面。然而，结果是
  1。如果你回想一下我之前关于移位运算符的讨论，我说过：


  “对于一个 32 位的表达式，只使用 *operand2* 的低五位，以防止移位超过 32 位整数中的位数。”


  右操作数 (*operand2*) 是 `32`，其 32 位二进制表示为 00000000000000000000000000100000。低五位是 00000，等于
  0。因此，左操作数 (`1`) 没有被移位，保持不变。


  在演示 `<<` 运算符的六个方法调用中，倒数第二个的表达式 `-1 << 31` 生成的结果与表达式 `1 << 31` 相同，因为在这两种情况下最右边的位都是
  1，并且左边的所有位都被移出了结果。在这两种情况下，你最终都会得到 100000000000000000000000000000000。这导致 -2147483648。


  最后，表达式 `-1 << 32` 产生的结果是 -1，原因与 `1 << 32` 产生的结果是 1 相同。在移位中只使用了右操作数的低五位，这导致尝试将左操作数移动零个位位置。


  现在 `<<` 运算符已经讨论完毕，考虑 `-`（取反）运算符。在六个 `<<` 运算符示例的第二个中，取反反转了其 `4` 操作数的符号。它还在这些示例的第五个和第六个中反转了其
  `1` 操作数的符号。


  现在我们转到 `int` 变量 `x` 的声明。这个变量通过 `=` 运算符被赋值为 `3`。


  接下来，在 `System.out.println("x++: " + x++)` 方法调用中，表达式 `x++` 的输出是 `3`，因为后置自增运算符 `++`
  在递增变量值之前返回其变量操作数中的当前值。本质上，它将当前值保存在另一个内存位置，执行递增，然后返回保存的值。后置递减运算符 (`--`) 也是如此。相比之下，前置自增
  (`++`) 和前置递减 (`--`) 分别递增和递减其变量的值，然后返回结果。为了证明后置自增操作生效了，倒数第三个方法调用输出了 `x` 中的值。


  最后一个 `System.out.println()` 方法调用的表达式试图除以 0，这样你就可以看到 Java 对此的反应。你会发现抛出了一个 `ArithmeticException`
  对象，并带有“`/ by zero`”消息，表明试图除以 0。（我在第 11 章讨论异常。）


  按如下方式编译清单 3-1：


  ```

  javac ExprDemo.java

  ```


  按如下方式运行生成的应用程序：


  ```

  java ExprDemo

  ```


  你应该会发现以下输出：


  ```

  "abc" instanceof String: true

  4 << 1: 8

  -4 << 1: -8

  1 << 31: -2147483648

  1 << 32: 1

  -1 << 31: -2147483648

  -1 << 32: -1

  x++: 3

  x: 4

  Exception in thread "main" java.lang.ArithmeticException: / by zero

  at ExprDemo.main(ExprDemo.java:16)

  ```




  ## 接下来做什么？


  既然你已经掌握了表达式，接下来可以探索语句了。许多语句与表达式协同工作，帮助你创建更有趣的程序。


  '
- '# 4. 语句


  计算机程序通过语句执行任务。本章将介绍赋值语句、决策语句、循环语句、循环分支语句以及其他语句。


  ## 语句简介


  **语句**是一种语法单元，用于表达要执行的某个动作。语句用于给变量赋值、通过决策控制执行流程、重复执行其他语句特定次数或无限次，以及执行其他任务。


  通过将语句放在`{`和`}`字符之间，可以将多条语句组合在一起，视为一条语句。这种复合语句称为**块**。除块之外的每条语句都必须以分号（`;`）结尾。虽然可以用分号结束一个块，但这不符合惯例。


  ## 赋值语句


  **赋值语句**将表达式的结果赋给一个变量。它有两种形式：简单赋值语句和复合赋值语句。


  ### 简单赋值语句


  **简单赋值语句**计算`=`运算符右侧的表达式，并将结果赋给左侧的变量。其语法如下：


  ```

  变量 ''='' 表达式 '';''

  ```


  该语句以**变量**名开头，接着是`=`运算符，最后以**表达式**和分号结尾。以下是两个示例，假设变量已事先声明：


  ```

  healthyBodyTemp = 98.6; // healthyBodyTemp 是 double 类型

  name = "John Doe"; // name 是 String 类型

  ```


  注意


  在变量声明中初始化变量是简单赋值语句的一种形式，例如 `int age = 30;`。


  ### 复合赋值语句


  与简单赋值语句密切相关的是**复合赋值语句**，它一步完成操作并将结果赋给变量。该语句的语法如下：


  ```

  变量 (''+='' | ''-='' | ''*='' | ''/='' | ''%='' | ''&='' | ''^='' | ''|='' | ''=''
  | ''>>>='') 表达式 '';''

  ```


  该语句以**变量**名开头，接着是指定的复合赋值运算符之一，最后以**表达式**和分号结尾。以下是一个示例，假设变量已事先声明：


  ```

  counter += 1; // 将 counter 的值加 1，并将结果和存储在 counter 中。

  ```


  ## 决策语句


  **决策语句**允许 Java 程序在两条或多条执行路径之间做出选择。决策语句有三种：`if`、`if`-`else` 和 `switch`。


  ### If 语句


  **if 语句**计算一个布尔表达式，当该表达式为 true 时执行另一条语句。该语句的语法如下：


  ```

  ''if'' ''('' 表达式 '')''

  语句

  ```


  `if` 语句以保留字 `if` 开头，接着是括号内的布尔**表达式**。随后是**语句**，当**表达式**为 true 时执行该语句。


  `if` 语句的示例如下：


  ```

  if (temperature < 70)

  turn_on_furnace();

  ```


  如果 `temperature` 的值降至华氏 70 度以下（通过计算布尔表达式 `temperature < 70` 并发现其值为 true 来确定），则调用方法
  `turn_on_furnace()` 来打开暖气并加热房间。（我将在第 6 章讨论方法。）


  ### If-Else 语句


  **if-else 语句**计算一个布尔表达式，并根据该表达式计算结果为 true 还是 false 来执行两条语句中的一条。该语句的语法如下：


  ```

  ''if'' ''('' 表达式 '')''

  语句 1

  ''else''

  语句 2

  ```


  `if`-`else` 语句以保留字 `if` 开头，接着是括号内的布尔**表达式**。随后是**语句 1**，当**表达式**为 true 时执行；接着（在保留字
  `else` 之后）是**语句 2**，当**表达式**为 false 时执行。


  该语句的示例如下：


  ```

  if (temperature < 70)

  turn_on_furnace();

  else

  turn_off_furnace();

  ```


  如果 `temperature` 的值降至华氏 70 度以下（通过计算布尔表达式 `temperature < 70` 并发现其值为 true 来确定），则调用方法
  `turn_on_furnace()` 来打开暖气并加热房间。否则，调用方法 `turn_off_furnace()` 来关闭暖气（房间已达到 70 度）。


  你可以将多个 `if`-`else` 语句链接在一起，如下所示：


  ```

  ''if'' ''('' 表达式 1 '')''

  语句 1

  ''else''

  ''if'' ''('' 表达式 2 '')''

  语句 2

  ''else''

  ''if'' ''('' 表达式 3 '')''

  语句 3

  ''else''

  ...

  语句 N

  ```


  如果**表达式 1**为 true，则执行**语句 1**。然而，如果**表达式 2**为 false，则执行 `if ''(''` **表达式 2** `'')''`
  并计算**表达式 2**。如果为 true，则执行**语句 2**。此过程持续进行，直到其中一个表达式为 true 并执行其对应的语句。如果所有表达式都不为 true，则到达
  `else` 并执行**语句 N**（默认语句）。


  以下示例演示了这种链接能力：


  ```

  if (direction == "North")

  travelNorth();

  else

  if (direction == "East")

  travelEast();

  else

  if (direction == "South")

  travelSouth();

  else

  travelWest();

  ```


  悬挂 else 问题


  当 `if` 和 `if`-`else` 一起使用时，如果源代码缩进不当，可能难以确定哪个 `if` 与 `else` 配对。例如：


  ```

  if (file.isOpen())

  if (file.isReadable())

  file.read();

  else

  file.open();

  ```


  开发者是否意图让 `else` 匹配内部的 `if`，但代码格式不当导致看起来并非如此？例如：


  ```

  if (file.isOpen())

  if (file.isReadable())

  file.read();

  else

  file.open();

  ```


  如果 `file.isOpen()` 和 `file.isReadable()` 都返回 true，则执行 `file.read();`。如果 `file.isOpen()`
  返回 true 而 `file.isReadable()` 返回 false，则执行 `file.open();`。尝试打开一个已打开的文件毫无意义。


  开发者本意一定是想让 `else` 匹配外部的 `if`，但忘记了 `else` 匹配最近的 `if`。这个问题可以通过用花括号将内部的 `if` 括起来解决，如下所示：


  ```

  if (file.isOpen())

  {

  if (file.isReadable())

  file.read();

  }

  else

  file.open();

  ```


  当 `file.isOpen()` 返回 true 时，执行紧随其后的块。当此方法返回 false 时，执行 `file.open();`，这合情合理。


  忘记 `else` 匹配最近的 `if` 并使用糟糕的缩进来掩盖这一事实，被称为**悬挂 else 问题**。




  ### Switch 语句


  *switch* *语句*让你能够比等效的链式 `if`-`else` 语句更高效地选择多个执行路径之一。该语句的语法如下：


  ```

  ''switch'' ''('' 选择器表达式 '')''

  ''{''

  ''case'' 值 1 '':'' 语句 1 [''break'' '';'']

  ''case'' 值 2 '':'' 语句 2 [''break'' '';'']

  ...

  ''case'' 值 N '':'' 语句 N [''break'' '';'']

  [''default'' '':'' 语句]

  ''}''

  ```


  `switch` 语句以保留字 `switch` 开头，后跟括号内的*选择器表达式*以及由多个 `case` 组成的主体。*选择器表达式*是任何计算结果为整数、字符或字符串的表达式。


  每个 `case` 以保留字 `case` 开头，后跟一个字面值和一个冒号（`:`）字符，再跟一个要执行的语句，并可选地以 `break` 语句（本章稍后讨论）结尾。`break`
  语句会使执行流程跳转到 `switch` 语句之后继续执行。


  在计算完*选择器表达式*之后，`switch` 会将该值与每个 `case` 的值进行比较，直到找到匹配项。如果匹配，则执行该 `case` 的语句。例如，如果*选择器表达式*的值与*值
  1*匹配，则执行*语句 1*。


  可选的 `break` 语句（方括号内的任何内容都是可选的）由保留字 `break` 后跟一个分号（`;`）组成，它可以防止执行流程继续执行下一个 `case`
  的语句。相反，执行流程会继续执行 `switch` 之后的第一条语句。


  BREAK 语句的放置与难以发现的错误


  你通常会在 `case` 的语句之后放置一个 `break` 语句。忘记包含 `break` 可能会导致一个难以发现的错误，即执行流程会从一个 `case` 的末尾流向下一个
  `case` 的开头，而不是在第一个 `case` 完成后立即离开 `switch` 语句。然而，在某些情况下，你可能希望将几个 `case` 组合在一起，让它们执行共同的代码。例如，你编写了代码提示用户输入字符
  `Y`（表示 Yes）或字符 `y`（表示 yes）以继续程序，并且你希望无论输入哪个字符都执行相同的代码。在这种情况下，你应该省略参与组合的 `case` 中的
  `break` 语句，但该组中的最后一个 `case` 除外。请考虑以下示例：


  ```

  System.out.print("输入 Y 或 y 以结束程序：");

  // 用于输入 Y 或 y 并将该字符存储在 char 变量 ch 中的代码。

  switch (ch)

  {

  case ''Y'':

  case ''y'': System.out.println("已输入 Y 或 y。");

  break;

  }

  ```


  如果没有 `case` 的值与*选择器表达式*的值匹配，并且存在一个默认 `case`（由保留字 `default` 后跟一个冒号表示），则会执行默认 `case`
  的语句。以下示例演示了该语句：


  ```

  String direction = "East";

  switch (direction)

  {

  case "North": travelNorth(); break;

  case "East": travelEast(); break;

  case "South": travelSouth(); break;

  default: travelWest();

  }

  ```


  在声明变量 `direction` 并将其初始化为 `"East"` 之后，该示例进入 `switch` 语句。该语句读取 `direction` 的字符串，然后按从上到下的顺序将该值与每个
  `case` 的字符串进行比较，直到找到匹配项。


  它首先将 `"East"` 与 `"North"` 进行比较。由于它们不匹配，`switch` 继续处理下一个 `case`，其字符串值为 `"East"`。由于它们匹配，`switch`
  调用一个名为 `travelEast()` 的方法（我将在第 6 章讨论方法）。当此方法返回时，`switch` 执行 `break` 语句，这会导致执行流程继续执行
  `switch` 之后的第一条语句。


  假设 `direction` 被初始化为 `"SouthWest"`。由于没有 `case` 的字符串匹配，`switch` 将执行 `default` case：其
  `travelWest()` 方法将被调用。


  ## 循环语句


  *循环语句*允许 Java 程序重复执行其他语句。循环语句有三种：`for`、`while` 和 `do`-`while`。


  注意


  每次重复执行称为一个*循环*。此外，每次循环执行称为一次*迭代*。


  ### For 语句


  *for* *语句*可以按特定次数或无限次地迭代执行另一条语句。该语句的语法如下：


  ```

  ''for'' ''('' [初始化] '';'' [测试] '';'' [更新] '')''

  语句

  ```


  `for` 语句以保留字 `for` 开头，后跟括号内的头部，再跟*语句*。头部以一个可选的*初始化*部分开头，后跟一个非可选的分号字符。接着是一个可选的*测试*部分，后跟一个分号字符。最后以一个可选的*更新*部分结束。


  *初始化*部分由逗号（`,`）分隔的变量声明或变量赋值列表组成。这些变量中的一部分或全部通常用于控制循环的持续时间，被称为*循环控制变量*。


  *测试*部分由一个布尔表达式组成，该表达式决定循环的长度。只要此表达式为真，循环就会继续。


  *更新*部分由逗号分隔的表达式列表组成，这些表达式通常用于修改循环控制变量。


  `for` 语句首先执行*初始化*部分。然后执行*测试*部分以确定循环是否应该继续。*测试*部分由一个布尔表达式组成，返回 true 表示继续，返回 false
  表示不继续。在*语句*执行之后，执行*更新*部分，然后依次执行*测试*、*语句*、*更新*、*测试*、*语句*、*更新*，依此类推。


  以下示例演示了 `for` 语句：


  ```

  for (int i = 0; i < 10; i++)

  {

  for (int j = 0; j < i; j++)

  System.out.print("*");

  System.out.println();

  }

  ```


  外层的 `for` 语句以一个包含 `int i = 0;` 的初始化部分开始。这个复合赋值语句声明了一个名为 `i` 的 `int` 变量并将其初始化为 `0`。执行完此部分后，`for`
  将注意力转向测试部分，该部分由 `i < 10` 组成。


  `i < 10` 布尔表达式将 `i` 中的值与 `10` 进行比较。只要 `i` 的值小于 `10`，`for` 语句就会继续迭代其*语句*。


  接着，该示例进入 `for` 语句头部后面的代码块。


  该代码块首先执行内层的 `for` 语句，其初始化部分引入了另一个 `int` 变量 `j`，并将其初始化为 `0`。此外，其测试部分计算 `j < i`，比较
  `j` 和 `i` 中的当前值。只要 `j` 的值小于 `i` 的值，此布尔表达式将计算为 true，并且这个内层 `for` 语句将继续迭代。


  假设表达式为真，执行流程传递到 `System.out.print("*");`，该语句输出一个星号（`*`），并且随后不前进到下一输出行。输出之后，内层 `for`
  语句的更新部分执行 `j++`，这会增加存储在 `j` 中的值。


  内层 `for` 语句通过计算 `j < i` 开始另一次迭代。一旦 `j` 的值超过 `i` 的值，执行流程将离开内层 `for` 语句，并执行 `System.out.println();`，导致后续输出从下一输出行的开头开始。


  此示例绘制出以下图案：


  ```

  *

  **

  ***

  ****

  *****

  ******

  *******

  ********

  *********

  ```




  ### While 语句


  *while* *语句*在其布尔表达式为真时重复执行一条语句。该语句的语法如下：


  ```

  ''while'' ''('' 表达式 '')''

  语句

  ```


  `while` 语句由保留字 `while` 组成，后跟一个带括号的布尔*表达式*，再后跟*语句*，该语句会被重复执行。


  `while` 语句首先计算*表达式*。如果返回真，程序执行*语句*。然后再次计算*表达式*。如果仍为真，则再次执行*语句*。此行为持续进行，直到*表达式*计算为假，此时执行流程转到*语句*之后的第一条语句。


  以下示例演示了 `while` 语句：


  ```

  long fact = 1;

  int i = 1;

  while (i <= 4)

  fact *= i++;

  System.out.println(fact);

  ```


  此示例计算 4!（阶乘）。*阶乘*是从 1 开始到所求阶乘的整数为止的整数乘积。例如，4! = 1 x 2 x 3 x 4（即 24）。（注意，0! 计算结果为
  1。）


  在声明变量 `fact`（用于保存阶乘结果）和 `i`（一个记录当前循环迭代次数的循环计数器）之后，示例进入一个 `while` 循环。此循环首先通过计算 `i
  <= 4` 来验证 `i` 是否未超过四次迭代。只要此布尔表达式计算结果为真，`while` 循环就会继续。


  每次迭代执行 `fact *= i++;`。这个复合赋值语句完成了以下几件事：


  1.  它获取 `i` 的值并将其存储在一个内存位置，然后递增该值并将结果和存储回 `i`。

  2.  它获取 `fact` 的值以及从 `i` 读取的已存储值，并将这些值相乘。

  3.  它将相乘得到的结果值存储在 `fact` 中。


  当 `while` 循环结束时，执行 `System.out.println(fact);`。检索存储在 `fact` 中的值，然后输出到控制台。


  注意后置递增运算符 `++` 的存在。此运算符递增变量 `i`，使循环最终能够结束。如果它不存在，循环将永远不会结束，因为 `i` 永远不会递增，始终为 1，而
  1 小于 4。


  注意


  永不结束的循环被称为*无限循环*。


  此示例产生以下输出：


  ```


  ```


  一个 `for` 语句可以很容易地通过等价的 `while` 语句编写，如下例所示（该示例计算从 1 到 10 的整数之和）：


  ```

  int sum = 0;

  for (int i = 1; i < 10; i++)

  sum += i;

  ```


  声明变量 `sum` 后，示例进入 `for` 语句，该语句首先声明变量 `i` 并将其初始化为 `1`。然后计算布尔表达式 `i < 10`。只要 `i` 的值小于
  10，`for` 语句就会持续循环执行其后的 `sum += i;` 语句。


  这后一个表达式语句使用 `+=`（复合赋值运算符之一）将 `i` 的值加到 `sum` 的值上。在此更新之后，`for` 语句执行 `i++` 来递增 `i`。接下来，它计算
  `i < 10`，并在 `i` 的值小于 10 时重新执行 `sum += i;`。


  等价的 `while` 语句如下所示：


  ```

  int sum = 0;

  int i = 1;

  while (i < 10)

  {

  sum += i;

  i++;

  }

  ```


  ### Do-While 语句


  *do-while* *语句*在其布尔表达式为真时重复执行一条语句。与在循环顶部计算布尔表达式的 `while` 语句不同，`do`-`while` 在循环底部计算布尔表达式。该语句的语法如下：


  ```

  ''do''

  语句

  ''while'' ''('' 表达式 '')'' '';''

  ```


  `do`-`while` 语句由保留字 `do` 组成，后跟*语句*（该语句会被重复执行），再后跟保留字 `while`，接着是一个带括号的布尔表达式，最后是一个分号。


  `do`-`while` 语句首先执行*语句*。然后计算*表达式*。如果为真，`do`-`while` 执行*语句*。再次计算布尔表达式。如果仍为真，`do`-`while`
  重新执行*语句*。此循环模式持续进行，直到*表达式*为假。


  以下示例演示了 `do`-`while` 语句：


  ```

  long fact = 1;

  int i = 1;

  do

  fact *= i++;

  while (i <= 4)

  System.out.println(fact);

  ```


  此示例在功能上与上一节中的示例相同。唯一的区别是测试表达式的位置。


  提示


  当循环必须执行零次或多次时，使用 `while` 语句。当循环必须执行一次或多次时，使用 `do`-`while` 语句。


  ## 循环分支语句


  计算机程序通常需要终止循环或跳过循环的当前迭代。它们通过执行 `break` 或 `continue` *循环分支语句*来完成这些任务。


  ### Break 语句


  *break* *语句*允许你终止 `switch` 语句，这你已经见过了。然而，*break* *语句*也允许你终止循环。当循环是无限循环时，例如 `for
  (;;)`、`while (true)` 或 `do` … `while(true)` 循环，这是必要的。在有限循环的上下文中也可能需要它。


  `break` 语句的语法如下：


  ```

  ''break'' '';''

  ```


  以下示例展示了如何跳出无限循环：


  ```

  while (true)

  {

  System.out.println("按 x 退出循环。");

  // 下面的方法调用从键盘读取一个字符，并将其 int 值赋给 ch。

  // 我将在第 14 章中详细说明 System.in.read()。

  int ch = System.in.read();

  if (ch == ''x'')

  break;

  }

  ```


  当 `ch == ''x''` 为真时，`if` 语句执行 `break`，它将执行流程转移到 `while` 循环之后的第一条语句。


  以下示例展示了如何跳出有限循环：


  ```

  for (int i = 0; i < 1000; i++)

  if (i > 500)

  break;

  else

  System.out.println(i);

  ```


  当 `i` 中的值超过 500 时，此示例跳出循环。


  #### 带标签的 Break


  `break` 语句可以指定一个*标签*（一个标识符后跟一个冒号），这允许你跳出*嵌套循环*（循环内部的循环）。这种 `break` 语句的变体允许你将执行流程转移到以标签为前缀的循环之后的第一条语句，其语法如下：


  ```

  ''break'' 标签 '';''

  ```


  以下示例演示了带标签的 `break`：


  ```

  outer:

  for (int a = 0; a < 5; a++)

  {

  for (int b = 0; b < 5; b++)

  {

  System.out.println("a = " + a + ", b = " + b);

  if (b == 3)

  break outer;

  }

  System.out.println();

  }

  System.out.println("两个循环都已结束");

  ```


  此示例展示了一对 `for` 循环。外层循环可能执行五次。对于每次外层迭代，内层循环可能执行五次。然而，当 `b == 3` 计算结果为真时，执行流程离开内层和外层循环，并继续执行
  `outer:` 标签标记的 `for` 循环之后的第一条语句。


  生成以下输出：


  ```

  a = 0, b = 0

  a = 0, b = 1

  a = 0, b = 2

  a = 0, b = 3

  两个循环都已结束

  ```




  ### Continue 语句


  *continue* *语句*允许你跳过循环的当前迭代。当在迭代中较早满足某个条件，并且你不想继续执行本次迭代的剩余部分时，这很有必要。


  `continue` 语句的语法如下：


  ```

  ''continue'' '';''

  ```


  以下示例展示了如何取消迭代的剩余部分：


  ```

  int count = 0;

  String s = "To be or not to be, that is the question.";

  for (int i = 0; i < s.length(); i++)

  {

  if (s.charAt(i) != ''e'')

  continue;

  count++;

  }

  System.out.println("Number of ''e'' characters = " + count);

  ```


  此示例计算字符串中字母 ‘`e`’ 的数量。在初始化一个 `count` 变量来记录 ‘`e`’ 的数量，以及一个 `s` 变量来引用示例字符串后，程序进入一个
  `for` 循环，该循环遍历字符串的长度。表达式 `s.length()` 在变量 `s` 上调用 `String` 的 `length()` 方法，该变量持有对正在处理的字符串的引用，以返回此字符串的长度。（我将在第
  13 章中探讨 `String` 及其 `length()` 方法。）


  对于每次循环迭代，都会执行一个 `if`-`else` 语句。该语句调用 `String` 的 `charAt()` 方法，以返回字符串中的下一个字符。（我将在第
  13 章中探讨 `charAt()`。）如果此字符不等于 `e`，则执行 `continue` 语句以跳过本次循环迭代的剩余部分，从而不执行 `count++`。然而，如果此字符等于
  `e`，则不执行 `continue`，而是执行 `count++` 以增加已见 ‘`e`’ 的计数。一旦整个字符串被检查完毕，循环结束，并输出 ‘`e`’ 的计数。


  #### 带标签的 Continue


  `continue` 语句可以指定一个标签，这允许你跳过嵌套循环当前迭代的剩余部分。这种 `continue` 语句的变体允许你将执行转移到由该标签前缀的循环语句的布尔表达式，其语法如下：


  ```

  ''continue'' label '';''

  ```


  以下示例演示了带标签的 `continue`：


  ```

  outer:

  for (int a = 0; a < 5; a++)

  {

  for (int b = 0; b < 5; b++)

  {

  System.out.println("a = " + a + ", b = " + b);

  if (b == 3)

  continue outer;

  }

  System.out.println();

  }

  System.out.println("Both loops have finished");

  ```


  此示例与我之前讨论带标签的 `break` 时的示例类似。然而，输出略有不同：


  ```

  a = 0, b = 0

  a = 0, b = 1

  a = 0, b = 2

  a = 0, b = 3

  a = 1, b = 0

  a = 1, b = 1

  a = 1, b = 2

  a = 1, b = 3

  a = 2, b = 0

  a = 2, b = 1

  a = 2, b = 2

  a = 2, b = 3

  a = 3, b = 0

  a = 3, b = 1

  a = 3, b = 2

  a = 3, b = 3

  a = 4, b = 0

  a = 4, b = 1

  a = 4, b = 2

  a = 4, b = 3

  Both loops have finished

  ```


  之前，输出在 `a = 0, b = 3` 处停止。现在，它对于 `a` 从 `0` 到 `4` 的每个值都继续执行。但是，你仍然不会在输出中看到 `b = 4`，因为当
  `b` 等于 `3` 时，内部循环被跳过了。


  ## 其他语句


  Java 支持其他值得一提的语句：`assert` 语句、空语句、`import` 语句、方法调用语句、`package` 语句、`return` 语句、`try`
  语句和 `try`-`with`-`resources` 语句。


  ### Assert 语句


  *assert* *语句*允许你通过一个布尔表达式来表达对程序正确性的假设。本书不讨论此语句。


  ### 空语句


  *空语句*是一个单独的分号（`;`）字符。有时，让 `for` 语句重复执行此语句会很方便，因为实际工作是在 `for` 的头部中执行的。考虑以下示例：


  ```

  for (String line; (line = readLine()) != null; System.out.println(line));

  ```


  此示例使用一个 `for` 循环来读取并打印所有行（可能来自文件），直到没有更多行可读。我们正在将行从源复制到目标。


  通过调用 `readLine()` 方法（你需要在其他地方指定该方法）来读取一行。通过 `System.out.println()` 方法调用来打印该行。注意行尾的分号。这个分号就是空语句。


  警告


  空语句可能会在你的代码中引入微妙的错误。例如，以下循环本应在 15 行上输出 `Java is great!`。但实际上，只会出现一条此消息，因为空语句被执行了
  15 次。


  `for (int i = 0; i < 15; i++);`


  `System.out.println("Java is great!");`


  ### Import 语句


  *import* *语句*从包中导入一个类型。我将在第 10 章中全面讨论 `import`。


  ### 方法调用语句


  *方法调用语句*调用一个方法，该方法可能会也可能不会返回结果。如果方法的返回类型是 `void`，则该方法不返回值。例如，`System.out.println()`
  方法调用上下文中的各种 `println()` 方法具有 `void` 返回类型——这个保留字表明每个 `println()` 方法不返回值。我将在第 6 章中全面讨论方法调用语句。


  ### Package 语句


  *package* *语句*将一个或多个引用类型放入一个包中。我将在第 10 章中全面讨论 `package`。


  ### Return 语句


  *return* *语句*将执行从方法返回到调用该方法的代码。它可以选择返回一个值，该值的类型必须与方法的返回类型匹配。我将在第 6 章中全面讨论 `return`。


  ### Try 语句


  *try* *语句*提供了一种方法，用于检测从代码块中抛出的*异常*（偏离正常执行流程），然后将其传递给另一个代码块以处理该异常。我将在第 11 章中全面讨论
  `try`。


  ### Try-with-resources 语句


  *try-with-resources* *语句*是一个 `try` 语句，它声明一个或多个*资源*（在不需要时必须关闭的对象）。它会关闭每个资源。我将在第 11
  章中全面讨论 `try`-`with`-`resources`。




  ## 玩转语句


  语句玩起来很有趣，因为你永远不知道会发现什么。我创建了一个 `StmtDemo` 应用程序，并用几个示例语句填充了它，作为本次探索的起点。清单 4-1 展示了
  `StmtDemo` 的源代码。


  ```

  class StmtDemo

  {

  public static void main(String[] args)

  {

  if (args.length != 1)

  {

  System.out.println("usage: java StmtDemo ([-h] | [-v] | " + "[positive integer count])");

  return;

  }

  switch (args[0])

  {

  case "-H":

  case "-h": System.out.println("help");

  return;

  case "-V":

  case "-v": System.out.println("version 1.0");

  return;

  default  : int count = 0;

  for (int i = 0; i  ''9'')

  {

  System.out.println("invalid character detected: " + digit);

  return;

  }

  count *= 10;

  count += digit - ''0'';

  }

  for (int i = 0; i < count; i++)

  System.out.print("*");

  System.out.println();

  }

  }

  }

  清单 4-1

  StmtDemo.java

  ```


  `StmtDemo` 主要关注 `if`、方法调用、`return`、`switch`、简单赋值、`for` 和复合赋值语句。


  `main()` 方法中的第一个示例语句使用 `if` 来确保指定了单个命令行参数。它计算布尔表达式 `args.length != 1`，并在不满足此条件时执行一个代码块（布尔表达式计算结果为
  true，因为指定了零个参数或多个参数）。


  第二个示例语句使用 `System.out.println()` 方法调用来输出一条用法信息。`System.out.println()` 是该代码块中的第一条语句。


  第三个示例语句使用 `return` 退出 `main()` 方法并终止程序。这是该代码块中的第二条语句。


  第四个示例语句使用 `switch` 来识别传递给程序的第一个且唯一的命令行参数。该命令行参数存储在 `args[0]` 中，这是 `args` 数组中的第一个位置。（我将在第
  5 章中介绍数组。）


  `switch` 语句通过其 `case` 分支展示了其他语句。


  前两个 `case` 分支分别将 `args[0]` 与 `"-H"` 和 `"-h"` 进行比较。注意，`case "-H"` 是空的：它没有指定任何语句，甚至没有
  `break` 语句。因为没有 `break` 语句，当在命令行中指定 `-H` 时，执行流程会落入 `case "-h"` 的语句中。


  `case "-h"` 的第一条语句是一个 `System.out.println()` 方法调用，用于输出一条简短的帮助信息。可以推测，`-h` 会显示关于程序用法的有用帮助信息。在这个例子中，我提供了一个简单的消息，让你了解可能出现的内容。


  `case "-h"` 的第二条语句是一个 `return` 语句，它将执行流程从 `switch` 语句和 `main()` 方法中转移出来，从而终止程序。


  接下来的两个 `case` 分支分别将 `args[0]` 与 `"-V"` 和 `"-v"` 进行比较。它们在功能上与前面两个 `case` 分支相同，但输出的是简短的版本号信息。


  注意


  许多程序都有版本号。例如，`1.0` 通常表示程序的第一个版本。句点（`.`）之前的数字通常称为主版本号，句点之后的数字通常称为次版本号。在这个例子中，“`1`”是主版本号，“`0`”是次版本号。


  主版本号表示程序的主要变更。次版本号表示程序的次要变更。请查看维基百科的“软件版本号”条目（[`http://en.wikipedia.org/wiki/Software_versioning`](http://en.wikipedia.org/wiki/Software_versioning)）以了解更多关于版本号的信息。


  当在命令行中指定了 `-H`、`-h`、`-V` 或 `-v` 以外的内容时，将执行 `default` 分支。


  `default` 分支执行的第一条语句是一个简单赋值语句的变体，它声明了一个 `count` 变量并将其初始化为 0。


  接下来要执行的是一条 `for` 语句，它遍历命令行参数的字符。


  `for` 语句在其初始化部分声明了一个名为 `i` 的 `int` 变量，并将其初始化为 `0`。然后，它将此变量与 `args[0].length()` 进行比较，后者返回构成命令行参数的字符数。


  `args[0].length()` 表达式由两个操作数组成，它们由成员选择运算符（`.`）分隔。`args[0]` 操作数使用数组索引运算符（`[]`）从数组中返回第一个命令行参数，该参数以字符串形式表示。`length()`
  操作数是一个 `String` 方法，它返回字符串中的字符数。


  `for` 语句执行的代码块以 `char digit = args[0].charAt(i);` 开头，该语句从 `args[0]` 字符串中提取下一个字符（预期是一个数字），并将其赋值给
  `char` 变量 `digit`。`String` 提供了一个 `charAt()` 方法，该方法返回由其单个参数（必须是 `int` 类型）指定的索引处的字符。


  该代码块接下来执行一条 `if` 语句，其布尔表达式将 `digit` 中存储的字符与 `''0''` 和 `''9''` 进行比较。如果此字符在数值上小于 `''0''`
  的 Unicode 编号或大于 `''9''` 的 Unicode 编号，则会调用一个代码块。


  注意


  在创建用于那些使用 0 到 9 之外数字字符的国家（例如，参见 [`http://en.wikipedia.org/wiki/Tamil_numerals`](http://en.wikipedia.org/wiki/Tamil_numerals)）的
  Java 程序时，硬编码诸如 `digit < ''0'' || digit > ''9''` 这样的表达式并不是一个好主意。相反，你应该调用 `Character`
  类的 `boolean isDigit(char ch)` 方法来确定一个字符是否代表数字。（`Character` 是 Java 引用类型库的成员。）


  该代码块首先执行一个 `System.out.println()` 方法调用，以输出一条错误消息以及有问题的字符。（注意 `+` 运算符用于将两个字符串连接成第三个字符串。）


  然后，该代码块执行一条 `return` 语句，这会导致执行流程离开 `main()` 并终止程序。


  如果存储在 `digit` 变量中的字符确实是一个数字，则执行流程会转到一对复合赋值语句：


  ```

  count *= 10;

  count += digit - ''0'';

  ```


  第一条复合赋值语句读取 `count` 的值，将其乘以 `10`，并将结果存储回 `count`。第二条复合语句读取 `count` 的值，将 `digit`
  中的 Unicode 编号加到此值上，然后减去 `''0''` 的 Unicode 编号。结果存储回 `count`。


  `main()` 方法中的最后两个示例语句包括一条用于输出 `count` 个星号（`*`）的 `for` 语句，以及一条 `System.out.println();`
  方法调用语句，用于使后续输出从下一输出行的开头开始。


  按如下方式编译清单 4-1：


  ```

  javac StmtDemo.java

  ```


  按如下方式运行生成的应用程序：


  ```

  java StmtDemo

  ```


  你应该会看到以下输出：


  ```

  usage: java StmtDemo ([-h] | [-v] | [positive integer count])

  ```


  现在，使用 `-h`（或 `-H`）命令行选项运行该应用程序：


  ```

  java StmtDemo -h

  ```


  应用程序会输出以下消息作为响应：


  ```

  help

  ```


  接着，使用 `-v`（或 `-V`）命令行选项运行该应用程序：


  ```

  java StmtDemo -v

  ```


  你应该会看到以下输出：


  ```

  version 1.0

  ```


  最后，使用参数 `10` 运行该应用程序：


  ```

  java StmtDemo 10

  ```


  你现在应该会在输出行上看到十个星号：


  ```

  **********

  ```


  ## 下一步是什么？


  既然你已经掌握了语句，就可以开始创建有趣的程序了。下一章将介绍数组，它允许你将多个值与单个变量关联起来。数组让你能够创建比本书迄今为止所见到的程序更有趣的程序。




  '
- '# 5. 数组


  Java 支持数组，这是最古老且使用最广泛的数据结构之一（“一种通常为了高效访问数据而选择的数据组织、管理和存储格式”——更多信息请参见 [`http://en.wikipedia.org/wiki/Data_structure`](http://en.wikipedia.org/wiki/Data_structure)）。本章将介绍
  Java 在一维数组和二维数组方面对数组的支持，并通过搜索和排序演示一维数组，通过矩阵乘法演示二维数组。


  ## 数组简介


  *数组*是一种*数据结构*，由一系列具有相同内存大小的*元素*（存储在数组中的值）组成，其中每个元素至少与一个*索引*（唯一标识一个元素的非负整数）相关联。与元素关联的索引数量称为数组的*维度*。


  在 Java 中，数组具有固定大小。你不能扩展或收缩数组。相反，你需要创建一个所需大小的新数组，将当前数组中的元素复制到新数组，然后销毁当前数组。


  ## 一维数组


  *一维数组*（1D 数组——也称为*向量*）是一种将每个元素与一个索引关联的数组。它用于存储值的列表。数组通过数组变量存储，其语法如下：


  ```

  type ''['' '']'' identifier

  ```


  或


  ```

  type identifier ''['' '']''

  ```


  方括号可以出现在*类型*名称之后（推荐方式），或出现在命名变量的*标识符*之后（这种方式是为了让 C 和 C++ 程序员平滑过渡到 Java 而引入的）。它们表示*标识符*引用了一个一维数组，其元素具有指定的*类型*。该数组的类型是
  *type*`[]`。


  ### 创建一维数组


  创建一维数组有三种方法：仅使用初始化器、仅使用关键字 `new`，以及将关键字 `new` 与初始化器结合使用。


  #### 仅使用初始化器


  仅使用初始化器的方法遵循以下语法：


  ```

  ''{'' [expr ('','' expr)*]  ''}''

  ```


  该语法表明，一维数组是一个可选的、由逗号分隔的表达式列表，出现在左大括号和右大括号字符之间。此外，所有表达式的类型必须兼容。例如，一个表达式不能是字符串，而另一个表达式是整数。


  注意


  上述语法使用了特殊符号来提供紧凑的表示形式。此外，程序员必须提供的值放在单引号（`''`）或双引号（`"`）之间。`[` 和 `]` 之间的所有内容都是可选的。`(`
  和 `)` 之间的所有内容被视为一个整体。`*` 表示重复 `(` 和 `)` 之间的内容零次或多次。`+` 表示重复 `(` 和 `)` 之间的内容一次或多次。我在前面的章节中已经介绍过这种语法的一部分，并将在后续章节中继续使用。


  以下示例演示了使用初始化器创建一维数组的方法：


  ```

  String[] directions = {"North", "South", "East", "West"};

  ```


  该示例创建了一个包含四个字符串的一维数组，并将该一维数组的引用赋值给 `directions`。图 5-1 展示了该数组的概念视图。


  ![](img/615966_1_En_5_Fig1_HTML.jpg)


  四个矩形块分别表示：North 0。South 1。East 2。West 3。


  图 5-1


  赋值给 directions 的数组的概念视图


  `North` 位于索引 0，`South` 位于索引 1，`East` 位于索引 2，`West` 位于索引 3。


  #### 仅使用关键字 new


  仅使用关键字 `new` 的方法遵循以下语法：


  ```

  ''new'' type ''['' int_expr '']''

  ```


  关键字 `new` 为数组分配内存。元素的数量由 *int_expr*（一个通常大于 0 的非负整数）指定，每个元素的大小由 *type* 隐含。所有元素都会被清零（并解释为
  `0`、`0L`、`0.0F`、`0.0`、`false`、`null` 或 `''\u0000''`）。


  预分配零大小的数组


  有时，*int_expr* 会指定为 `0`。当程序员编写一个方法来预分配数组，并且该方法需要知道数组的元素类型时，会指定零——该方法不关心数组的大小。例如，你可以指定以下内容：


  ```

  ArrayList list = new ArrayList(100);

  int[] copy = list.toArray(new int[0]);

  ```


  此示例首先创建一个数组列表，并将其引用赋值给类型为 `ArrayList` 的列表变量。然后，它调用 `ArrayList` 的 `toArray()` 方法（关于方法的讨论请参见第
  6 章）将数组列表转换为数组。表达式 `new int[0]` 被传递给 `toArray()`，以便该方法预分配一个可以容纳列表中所有元素的 `int[]`
  数组。（我们假设每个元素都是 `int` 类型。）此外，`toArray()` 返回该数组。但是，如果你指定了以下内容：


  ```

  double[] copy = list.toArray(new double[0]);

  ```


  `toArray()` 方法将返回一个类型为 `double[]` 的数组。`toArray()` 能够改变其返回类型是*泛型*的一个特性，这是对 Java 类型系统的增强，允许类型或方法操作各种类型的对象，同时提供编译时类型安全。（我在本书中不讨论泛型，因为我认为它不是基础特性。）


  前面的示例（不包括元素值）可以表示如下：


  ```

  String[] directions = new String[4];

  ```


  值将在稍后填充。


  #### 将关键字 new 与初始化器结合使用


  创建数组的最后一种方法是将关键字 `new` 与初始化器结合使用。这种方法具有以下语法：


  ```

  ''new'' type ''['' '']'' ''{'' [expr ('','' expr)*] ''}''

  ```


  该语法融合了前两种语法。由于元素的数量可以从逗号分隔的表达式列表中确定，因此不需要（也不允许）在方括号之间提供 *int_expr*。


  以下示例演示了将关键字 `new` 与初始化器结合使用创建一维数组的方法：


  ```

  String[] directions = new String[] {"North", "South", "East", "West"};

  ```


  仅使用初始化器方法的语法是第三种方法的*语法糖*（使语言更易于使用的语法）。你可以使用数组索引运算符来索引此数组并访问元素。


  ### 访问一维数组元素


  一维数组变量与一个 `.length` 属性相关联，该属性将关联的一维数组的长度作为正 `int` 值返回；例如，`directions.length` 返回
  4。这个值在访问一维数组的元素时很重要。


  给定一个一维数组变量，你可以通过指定符合以下语法的表达式来访问任何元素：


  ```

  array_var ''['' index '']''

  ```


  这里，*index* 是一个正 `int` 值，范围从零（Java 数组是基于零的）到 `.length` 属性返回值减一。


  考虑之前的 `directions` 数组。以下示例引用了第一个元素：


  ```

  directions[0]

  ```


  你可以按如下方式打印此元素：


  ```

  System.out.println(directions[0]);

  ```


  你可以使用 `for` 循环打印所有元素，如下所示：


  ```

  for (int i = 0; i < directions.length; i++)

  System.out.println(directions[i]);

  ```


  你可以按如下方式修改第三个元素：


  ```

  directions[2] = "EAST"; // 因为 Java 数组是基于 0 的，所以 directions[2]

  // 访问的是第三个元素。

  ```


  如果你指定了负索引或大于等于数组长度的索引，Java 将创建并抛出一个 `ArrayIndexOutOfBoundsException` 对象。当我在第 11
  章讨论异常时，我会对此主题进行更多说明。




  ## 搜索与排序


  程序员经常编写代码来在一维数组中搜索特定元素，并将一维数组的元素按值升序或降序排序。两种常用的搜索算法是*线性搜索*和*二分搜索*。*冒泡排序*是一种简单的排序算法，但对于大型数组效率不高。


  ### 线性搜索


  *线性搜索*通过从最低索引到最高索引比较元素，在一维数组的 *n* 个元素中搜索特定元素，直到找到该元素或没有更多元素可供比较。


  我创建了一个演示线性搜索的 `LSearch` 应用程序。清单 5-1 展示了该应用程序的源代码。


  ```

  class LSearch

  {

  public static void main(String[] args)

  {

  int[] grades = { 86, 92, 68, 75, 79, 81 };

  int gradeToSearch = 68;

  int i;

  for (i = 0; i < grades.length; i++)

  if (grades[i] == gradeToSearch)

  {

  System.out.println("Found " + gradeToSearch + " at position " + i);

  break;

  }

  if (i == grades.length)

  System.out.println("Could not find " + gradeToSearch);

  gradeToSearch = 74;

  for (i = 0; i < grades.length; i++)

  if (grades[i] == gradeToSearch)

  {

  System.out.println("Found " + gradeToSearch + " at position " + i);

  break;

  }

  if (i == grades.length)

  System.out.println("Could not find " + gradeToSearch);

  }

  }

  清单 5-1

  LSearch.java

  ```


  `LSearch` 首先在 `grades` 数组中搜索元素 `68`。它找到了该元素并输出成功消息。然后它在 `grades` 中搜索元素 `74`。由于该元素不存在，`LSearch`
  输出失败消息。


  假设您已将清单 5-1 复制到名为 `LSearch.java` 的文件中，请按如下方式编译清单 5-1：


  ```

  javac LSearch.java

  ```


  如果编译成功，您应该会在当前目录中看到一个 `LSearch.class` 文件。按如下方式运行此应用程序：


  ```

  java LSearch

  ```


  您应该会看到以下输出：


  ```

  Found 68 at position 2

  Could not find 74

  ```


  ### 二分搜索


  线性搜索是一种易于实现的算法。然而，对于非常长的数组，其完成任务的速度相当慢。在最坏的情况下，当所需元素位于最后一个数组槽位时，它可能需要检查所有元素。平均而言，它需要搜索大约一半的数组。幸运的是，存在一种更快的搜索一维数组的算法。


  *二分搜索*通过遵循以下步骤，在一维数组的 *n* 个元素中搜索特定元素：


  1.  将低位和高位索引变量分别设置为数组第一个和最后一个元素的索引。


  2.  当低位索引大于高位索引时终止。表示搜索的元素不在数组中。


  3.  通过将低位和高位索引相加并除以 2 来计算中间索引。


  4.  将搜索的元素与中间索引处的数据项进行比较。如果相同则终止。表示已找到搜索的元素。


  5.  如果搜索的元素大于中间索引处的元素，则将低位索引设置为中间索引加一，并跳转到步骤 2 执行。二分搜索在数组的上半部分重复搜索。


  6.  搜索的元素必定小于中间索引处的元素，因此将高位索引设置为中间索引减一，并跳转到步骤 2 执行。二分搜索在数组的下半部分重复搜索。


  虽然不如线性搜索直观易懂，但二分搜索要快得多。例如，面对一个包含 4294967296 个元素的一维数组时，线性搜索平均需要执行 2147483648 次比较。相比之下，二分搜索最多执行
  32 次比较。


  我创建了一个演示二分搜索的 `BSearch` 应用程序。清单 5-2 展示了该应用程序的源代码。


  ```

  class BSearch

  {

  public static void main(String[] args)

  {

  int[] nums = { 4, 5, 8, 11, 19, 33, 42, 51, 67, 69, 83, 84, 86, 91, 93, 98 };

  int high = nums.length - 1, low = 0, mid;

  int srchint = 83;

  while (low  nums[mid])

  low = mid + 1;

  else

  if (srchint  high)

  System.out.println("Could not find " + srchint);

  high = nums.length - 1;

  low = 0;

  srchint = 27;

  while (low  nums[mid])

  low = mid + 1;

  else

  if (srchint < nums[mid])

  high = mid - 1;

  else

  {

  System.out.println("Found " + srchint);

  break;

  }

  }

  System.out.println("Could not find " + srchint);

  }

  }

  清单 5-2

  BSearch.java

  ```


  `BSearch` 首先在 `nums` 数组中搜索元素 `83`。它找到了该元素并输出成功消息。然后它在 `grades` 中搜索元素 `27`。由于该元素不存在，`BSearch`
  输出失败消息。


  假设您已将清单 5-2 复制到名为 `BSearch.java` 的文件中，请按如下方式编译清单 5-2：


