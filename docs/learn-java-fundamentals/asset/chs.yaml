- '# 1. Java 入门


  欢迎来到 Java 世界。这项技术在商业领域被广泛使用，您可能希望快速学习它，以便能在这些公司中谋得一份 Java 程序员的工作。尽管 Java 庞大且不断演进，但有许多基本特性是永恒且易于理解的。掌握这些基础知识后，您编写
  Java 程序将会更加得心应手。


  本章将带您开启 Java 基本特性的探索之旅。首先，您将得到“什么是 Java？”这个问题的答案。接着，您将了解 Java 开发工具包（JDK），这是在您的计算机上开发
  Java 程序所必需的软件。然后，您将接触到您的第一个 Java 程序，该程序会输出一条简单的“hello, world”消息。最后，您将了解应用程序的架构。


  注意


  *程序*是供计算机执行的一系列指令。*应用程序*是一个具有单一执行入口点的程序。（相比之下，*小程序*——一种旧的、已不再广泛使用的 Java 程序形式——具有多个入口点。）例如，存储在`.exe`文件中的
  Microsoft Windows 程序就有一个单一的入口点。当用 C 语言*源代码*（文本指令）表示时，该入口点由一个名为`main`的*函数*（一个命名的指令序列）定义。



  ## 什么是 Java？


  Java 就像一枚硬币的两面。一方面，它是一种计算机编程语言。另一方面，它是一个用于运行用该语言编写的程序的虚拟*平台*（程序运行所需的硬件和软件环境）。


  注意


  Java 有一段有趣的历史。可以查阅维基百科上关于“Java（编程语言）”（[`http://en.wikipedia.org/wiki/Java_(programming_language)#History`](http://en.wikipedia.org/wiki/Java_(programming_language)%2523History)）和“Java（软件平台）”（[`http://en.wikipedia.org/wiki/Java_
  (software_platform)#History`](http://en.wikipedia.org/wiki/Java_%20(software_platform)%2523History)）的词条来了解更多。


  ### Java 是一种编程语言


  *Java* 是一种编程语言，其许多特性与 C 和 C++ 语言中的特性相同。这并非偶然。Java 的初始目标之一就是让 C/C++ 程序员能够轻松迁移到 Java，从而快速建立起一个初始程序员群体，帮助
  Java 取得成功。


  你会发现这些语言之间存在若干相似之处：


  *   Java 和 C/C++ 中用于注释源代码的单行和多行注释方式相同。


  *   Java 和 C/C++ 中存在各种相同的保留字，例如 `if`、`while`、`for` 和 `switch`。Java 和 C++ 中还存在其他一些
  C 中没有的保留字，例如 `try`、`catch`、`class` 和 `public`。


  *   这三种语言共享基本类型：例如字符型和整型。此外，这些类型的保留字在这些语言中也相同：例如 `char` 和 `int`。


  *   Java 和 C/C++ 共享许多相同的运算符。例如算术运算符（如 `*` 和 `+`）和关系运算符（如 `==` 和 `<=`）。


  *   最后，Java 和 C/C++ 都使用花括号（`{` 和 `}`）来界定语句块。


  Java 在许多方面也与 C/C++ 有所不同。以下是众多差异中的一部分：


  *   Java 支持一种额外的注释风格来记录源代码。这种注释风格被称为 *Javadoc*。


  *   Java 提供了 C/C++ 中没有的保留字。例如 `strictfp` 和 `transient`。


  *   Java 的字符类型比 C 和 C++ 中的字符类型更大。在那些语言中，一个字符占用一个字节的内存。相比之下，Java 的字符类型占用两个字节。


  *   Java 不支持所有 C/C++ 的运算符。例如，你在 Java 中找不到 C/C++ 的 `sizeof` 运算符。此外，`>>>`（无符号右移）运算符是
  Java 独有的。


  *   Java 提供了带标签的 `break` 和 `continue` 语句。这些与不接受标签的 C/C++ 对应语句不同的变体，是 C/C++ 中 `goto`
  语句的更安全替代方案，而 Java 不支持 `goto` 语句。


  我将在本书的后续部分讨论注释、保留字、类型、运算符和语句。


  Java 编程语言由各种规则严格定义，这些规则描述了其*语法*（结构）和*语义*（含义）。编译器在将程序的源代码转换为等效的*字节码*（程序可执行代码的可移植表示形式）时，会使用这些规则来验证正确性。此字节码存储在一个或多个*类文件*中，这些类文件相当于
  Windows 程序的可执行文件（`.exe`）。


  ### Java 是一个虚拟平台


  *Java* 是一个执行 Java 程序的虚拟平台。与由微处理器（例如 Intel 或 AMD 处理器）和操作系统（例如 Windows 11）组成的真实平台不同，Java
  平台由虚拟机和执行环境软件组成。


  *虚拟机*是一个基于软件的处理器，拥有自己的一套指令集。Java 虚拟机（JVM）相关的*执行环境*包含一个庞大的预构建引用类型库（可以理解为应用程序编程接口
  [API]），Java 程序可以使用这些库来执行日常任务（例如打开文件）。执行环境还包含通过 Java 本地接口将 JVM 连接到底层操作系统的“胶水”代码。（本书不讨论
  Java 本地接口，因为我认为它不是一个基本特性。）


  注意


  字节码和虚拟机的结合使得实现*可移植性*成为可能：同一个 Java 程序可以在所有支持该虚拟机的平台上运行。无需为每个平台重新编译程序的源代码。


  Java 程序由一个特殊的可执行文件运行，我称之为*程序启动器*。由于程序由一个或多个类文件组成，启动器会接收*主类文件*（执行开始的类文件）的名称。在将 JVM
  加载到内存后，它会告诉 JVM 使用其*类加载器*组件将主类文件加载到内存中。然后，JVM 会验证该类文件的字节码是否可以安全运行（例如，没有病毒），然后运行它。


  注意


  验证器和安全管理器架构使得实现*安全性*成为可能：当验证器检测到损坏的字节码时，Java 应用程序将不允许运行。此外，当安装了安全管理器时，应用程序将无法窃取敏感信息、删除文件或以其他方式损害用户的计算机。


  在执行过程中，一个类文件可能会引用另一个类文件。发生这种情况时，JVM 会使用类加载器将引用的类文件加载到内存中，然后验证并（如果可以运行）执行该类文件的字节码。




  ## Java 开发工具包


  Java 开发工具包（JDK）提供了创建 *Java 应用程序* 所需的必要软件。Java 应用程序是一类具有单一执行入口点的 Java 程序。它们与 *Java
  小程序* 形成对比，后者是另一类嵌入在网页中运行的 Java 程序。如今小程序已很少使用。


  请按照以下步骤下载 JDK：


  1.  在浏览器中输入 [`www.oracle.com/java/technologies/`](http://www.oracle.com/java/technologies/)。这将带你进入
  Oracle Java 网站的主页。


  2.  在撰写本文时，最新的下载版本是 21.0.1。点击 **Java SE 21.0.1** 链接。（Java SE 代表 Java 标准版。这是其他版本所基于的基础版本，也是本书适用的版本。另一个版本是
  Java EE，代表 Java 企业版。在开发涉及 Web 服务器、数据库管理系统和客户端计算机的复杂业务解决方案时，你会使用此版本。）


  3.  在结果页面 **Java Downloads** 的 **JDK Development Kit 21.0.1 downloads** 部分，你将看到
  **Linux**、**macOS** 和 **Windows** 选项卡。JDK 适用于所有这三种操作系统。选择适合你的那个。例如，我点击了 **Windows**
  选项卡，因为我当时正在运行 Windows。然后我可以在不同类型的安装程序之间进行选择。我选择了文件名以 `.exe` 文件扩展名结尾的 x64 安装程序。我发现这是安装
  JDK 最简单的方法。


  下载安装程序（例如 `jdk-21_windows-x64_bin.exe`）后，运行此程序并按照屏幕提示安装 JDK。


  JDK 包含用于应用程序开发的各种工具。其中四个工具是 Java 编译器（Windows 下载中的 `javac.exe`）、Java 程序启动器（Windows
  下载中的 `java.exe`）、Java 文档生成器（Windows 下载中的 `javadoc.exe`）和 Java 归档工具（Windows 下载中的
  `jar.exe`）。在本书中，你只需要使用这些工具。


