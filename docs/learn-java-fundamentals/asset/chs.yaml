  CloneDemo.java（版本 2）

  ```


  清单 7-9 更新了 `Date` 类，使其能够浅克隆自身。它通过实现 `Cloneable` 接口并重写 `clone()` 方法来调用 `super.clone()`，进而调用
  `Object` 的 `clone()` 方法执行实际的克隆操作。这与之前清单中 `Employee` 类浅克隆自身的方式相同。


  然而，`Employee` 重写的 `clone()` 方法已被修改。它首先克隆 `Employee` 的 `hireDate` 字段，返回一个新的 `Date`
  对象，其引用被赋值给 `hire_Date`。作为深拷贝的一部分，会创建一个新的 `Employee` 对象，并用 `name`、`age` 和 `hire_Date`
  的值进行填充。最后返回该 `Employee` 对象的引用。


  你可能想知道为什么没有克隆 `name` 字段。该字段的类型是 `String`，并且无法被克隆，因为 `String` 对象是*不可变的*（不可更改）。不可变性是实现一种称为*字符串驻留*（interning）的特性所必需的，这样
  `String` 对象就可以通过相等运算符（`==` 和 `!=`）进行比较，从而极大地提升性能。关于这一点，我在此不再赘述，你可以在第 13 章中了解详情。


