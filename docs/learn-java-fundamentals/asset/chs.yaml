  ```

  Appointment@5305068a

  Appointment@279f2327

  Appointment@2ff4acd0

  ```


  ## 下一步是什么？


  当创建一个更具体的`Truck`对象更合适时，开发者可能会创建一个`Vehicle`对象。Java 提供了一种抽象类特性，可用于防止`Vehicle`被实例化。第
  8 章将向你介绍抽象类。同时，它还将介绍相关的接口概念，这是另一种抽象形式。


  '
- '# 8. 通过多态改变类型


  一些现实世界中的实体可以改变其形态。例如，水（在地球上而非星际空间中）天然是液体，但冻结时会变成固体，加热至沸点时则变成气体。像蝴蝶这样经历变态的昆虫是另一个例子。


  改变形态的能力被称为*多态*，在编程语言中建模非常有用。例如，绘制任意形状的代码可以通过引入一个单一的`Shape`类及其`draw()`方法，并为存储在数组中的每个`Circle`实例、`Rectangle`实例和其他`Shape`实例调用该方法，从而更简洁地表达。当为数组实例调用`Shape`的`draw()`方法时，实际被调用的是`Circle`、`Rectangle`或其他`Shape`实例的`draw()`方法。我们说`Shape`的`draw()`方法有多种形态，或者说该方法是多态的。


  Java 支持四种多态：


  *   **强制多态**：通过隐式类型转换，一个操作服务于多种类型。例如，除法允许你将一个整数除以另一个整数，或将一个浮点值除以另一个浮点值。如果一个操作数是整数，另一个是浮点值，编译器会强制（隐式转换）整数为浮点值，以防止类型错误。（不存在同时支持整数操作数和浮点操作数的除法操作。）将子类对象引用传递给方法的超类参数是强制多态的另一个例子。编译器将子类类型强制转换为超类类型，以将操作限制为超类的操作。


  *   **重载多态**：相同的运算符符号或方法名可以在不同的上下文中使用。例如，`+`可用于执行整数加法、浮点加法或字符串拼接，具体取决于其操作数的类型。此外，多个同名方法可以出现在一个类中（通过声明和/或继承）。


  *   **参数多态**：在类声明中，字段名可以与不同类型关联，方法名可以与不同的参数和返回类型关联。字段和方法随后可以在每个类实例中采用不同的类型。例如，在一个类实例中，字段可能是`Truck`类型，方法可能返回`Truck`引用；而在另一个类实例中，同一个字段可能是`Car`类型，同一个方法可能返回`Car`引用。Java
  通过泛型支持参数多态，本书不讨论这一点。


  *   **子类型多态**：一个类型可以作为另一个类型的子类型。当子类型实例出现在超类型上下文中时，对子类型实例执行超类型操作会导致执行该操作的子类型版本。例如，假设`Circle`是`Point`的子类，并且两个类都包含一个`draw()`方法。将`Circle`实例赋值给`Point`类型的变量，然后通过该变量调用`draw()`方法，会导致调用`Circle`的`draw()`方法。子类型多态与继承相辅相成。


  许多开发者不认为强制多态和重载多态是有效的多态类型。他们认为强制多态和重载多态不过是类型转换和语法糖。相比之下，参数多态和子类型多态被视为有效的多态类型。


  本章通过向上转型和后期绑定向你介绍子类型多态。然后我们将继续讨论抽象类和抽象方法、接口、向下转型和运行时类型识别，以及协变返回类型和基于接口的静态方法等附加主题。




  ## 向上转型与后期绑定


  子类型多态依赖于向上转型和后期绑定。*向上转型*是一种转型形式，即沿着继承层次结构从子类型向上转型为超类型。由于子类型是超类型的特化，因此无需使用`(`*类型*`)`运算符。例如，`Vehicle
  v = new Truck();` 将 `Truck` 向上转型为 `Vehicle`。这很合理，因为卡车是一种交通工具。


  将 `Truck` 向上转型为 `Vehicle` 后，你无法调用 `Truck` 特有的方法，例如返回卡车是普通驾驶室还是加长驾驶室的 `isExtendedCab()`
  方法，因为这些方法不属于 `Vehicle` 的接口。将子类缩小为超类后失去对子类型特性的访问权限看似毫无意义，但这是实现子类型多态所必需的。


  假设 `Vehicle` 声明了一个 `drive()` 方法，其子类 `Truck` 重写了该方法，`Vehicle v = new Truck();` 刚刚执行完毕，下一行代码指定了
  `v.drive();`。那么会调用哪个 `drive()` 方法：`Vehicle` 的 `drive()` 方法还是 `Truck` 的 `drive()`
  方法？编译器不知道应该调用哪个 `drive()` 方法。它所能做的只是验证超类中存在该方法，并验证方法调用的参数列表和返回类型与超类的方法声明匹配。然而，编译器还会在编译后的代码中插入一条指令，该指令在运行时获取并使用
  `v` 中存储的任何引用来调用正确的 `drive()` 方法。这一任务被称为*后期绑定*。


  注意


  后期绑定用于对非 final 对象方法的调用。对于所有其他方法调用，编译器知道应该调用哪个方法。它会在编译后的代码中插入一条指令，调用与变量类型（而非其值）相关联的方法。这一任务被称为*早期绑定*。


  ## 抽象类与抽象方法


  在设计类层次结构时，你会发现层次结构顶部的类比底部的类更通用。例如，`Vehicle` 超类比 `Truck` 子类更通用。同样，`Account` 超类比 `CheckingAccount`
  子类更通用。


  从通用类创建对象是没有意义的。毕竟，一个 `Account` 对象除了描述一个账户之外还能描述什么？它是储蓄账户还是支票账户，或是其他什么？同样，`Vehicle`
  对象代表的是哪种交通工具（卡车、飞机、自行车等）？与其在 `Vehicle` 中编写一个空的 `drive()` 方法（踩卡车的油门踏板、蹬自行车的踏板、在滑板上蹬地并向前推进），不如通过将这两个实体声明为抽象来防止该方法被调用以及该类被实例化。


  Java 的 `abstract` 保留字允许你声明一个无法实例化的类。当你尝试实例化此类时，编译器会报告错误。`abstract` 保留字也用于声明没有方法体的方法。`drive()`
  方法不需要方法体，因为它无法驱动抽象的交通工具。清单 8-1 演示了这一点。


  ```

  abstract class Vehicle

  {

  private String make, model;

  private int year;

  Vehicle(String make, String model, int year)

  {

  this.make = make;

  this.model = model;

  this.year = year;

  }

  abstract void drive();

  String getMake()

  {

  return make;

  }

  String getModel()

  {

  return model;

  }

  int getYear()

  {

  return year;

  }

  @Override

  public String toString()

  {

  return "Make: " + make + ", Model: " + model + ", Year: " + year;

  }

  }

  清单 8-1

  Vehicle.java

  ```


  清单 8-1 向你展示了抽象类除了抽象方法之外（甚至代替抽象方法）还可以声明字段、构造方法和非抽象方法。


  请注意，`Vehicle` 声明了一个抽象的 `drive()` 方法来描述如何驾驶该交通工具。例如，你踩下油门踏板来驾驶卡车。`Vehicle` 的子类将重写
  `drive()` 并提供适当的描述。它们还将继承这些方法，并且它们的构造方法将调用 `Vehicle` 的构造方法。


  警告


  当你尝试将类同时声明为 abstract 和 final 时，编译器会报告错误。例如，编译器会报错 `abstract final class Vehicle`，因为抽象类无法实例化，而
  final 类无法被继承。


  当你声明一个方法为 abstract 但未将其类声明为 abstract 时，编译器也会报告错误。在清单 8-1 中从 `Vehicle` 类的头部移除 `abstract`
  会导致错误。这是因为当非抽象（具体）类包含抽象方法时，它无法被实例化。


  最后，当你扩展一个抽象类时，扩展类必须重写所有抽象方法，否则扩展类本身必须被声明为抽象；否则，编译器将报告错误。




  ## 接口


  *接口*是两个实体相遇并相互作用的点。例如，墙上的电源插座是承载电力的电源线与电器电源线之间的接口，当电源线插入插座时，电力便通过电器电源线输送到电器。


  从 Java 的角度来看，*接口*是一个类（字段、构造器和方法）或其他引用类型中暴露出来的部分，外部代码可以与之交互。请参考清单 8-2。


  ```

  class Stack

  {

  private int[] stack;

  private int top;

  Stack(int size)

  {

  stack = new int[size];

  top = -1;

  }

  boolean isEmpty()

  {

  return top == -1;

  }

  void push(int item)

  {

  if (top == stack.length)

  {

  System.out.println("stack is full");

  return;

  }

  stack[++top] = item;

  }

  int pop()

  {

  if (top == -1)

  {

  System.out.println("stack is empty");

  return -1;

  }

  return stack[top--];

  }

  }

  清单 8-2

  Stack.java

  ```


  清单 8-2 展示了一个 `Stack` 类，它实现了一个*栈*，这是一种后进先出的数据结构。这种数据结构有助于代码记住事物，例如在迷宫中寻找出口时记录已经走过的路径。


  你可以将一个项目（例如一个 32 位整数）压入栈顶，并从栈顶弹出一个项目。判断栈是否为空也很重要，因为在弹出项目时无法知道已经压入了多少个项目。


  `Stack` 的接口是其构造器以及 `isEmpty()`、`push()` 和 `pop()` 方法头。私有的 `stack` 和 `top` 字段以及构造器和方法中的代码构成了实现。


  实现应该对外部代码隐藏，以便可以根据不断变化的需求进行修改。当实现暴露时，软件组件之间可能会产生相互依赖。例如，方法代码可能依赖于外部变量，而类的用户可能依赖于本应隐藏的字段。当实现必须演进时（例如，可能必须移除暴露的字段），这种*耦合*可能会导致问题。


  接口的概念非常重要，以至于 Java 通过 `interface` 保留字将其规范化。Java 开发者使用此特性来抽象类的接口，从而将*类与其用户解耦*。通过专注于
  Java 接口而非类，你可以最大限度地减少源代码中对类名的引用次数。这有助于随着软件的成熟，方便地从一类切换到另一类（例如，为了提升性能）。示例如下：


  ```

  List countries = new ArrayList();

  // 将国家添加到国家列表的代码。

  // ...

  void print(List list)

  {

  for (int i = 0; i < list.length(); i++)

  System.out.println(list.get(i));

  }

  ```


  此示例声明并初始化了一个 `countries` 字段，用于存储字符串名称的列表。该示例还声明了一个 `print()` 方法，用于打印此列表或任何其他列表。


  假设 `List` 是一个描述字符串序列的接口，而 `ArrayList` 是一个描述基于数组的 `List` 实现的类。获取一个新的 `ArrayList`
  类对象并将其赋值给 `countries`。


  当客户端代码与 `countries` 交互时，它将调用那些由 `List` 声明并由 `ArrayList` 实现的方法。客户端代码不会直接与 `ArrayList`
  交互。因此，当需要使用不同的实现类（例如 `LinkedList`）时，客户端代码不会出错：


  ```

  List countries = new LinkedList();

  ```


  注意


  `LinkedList` 提供了一种基于链接的*节点*组的 `List` 实现（节点是由声明了以自身命名的引用字段的类构造的对象）。例如：`class Node
  { String item; Node next; }`。在此示例中，`Node` 声明了一个 `next` 字段，其引用类型是声明它的类的名称。你可以通过将一个
  `Node` 对象的引用赋值给 `next` 来将一个 `Node` 对象链接到另一个 `Node` 对象。


  因为 `print()` 的参数类型是 `List`，所以此方法的实现无需更改。但是，如果类型是 `ArrayList`，则必须将其更改为 `LinkedList`。如果两个类都声明了自己独有的方法，则可能需要大幅更改
  `print()` 的实现。


  将 `List` 与 `ArrayList` 和 `LinkedList` 解耦，可以让你编写不受类实现更改影响的代码。通过使用 Java 接口，你可以避免因依赖实现类而可能产生的问题。这种解耦是使用
  Java 接口的主要原因。


  ### 接口声明


  声明接口时，需遵循类似类的语法，该语法由头部后跟主体组成。头部至少包含关键字 `interface` 后跟一个标识接口的名称（非保留标识符）。主体以左花括号字符（`{`）开始，以右花括号字符（`}`）结束。在这些分隔符之间是常量和方法头声明：


  ```

  interface identifier

  {

  // 接口主体

  }

  ```


  按照惯例，接口名称的首字母大写，后续字母小写（例如，`Listable`）。如果名称由多个单词组成，则每个单词的首字母大写（例如 `ListableAndIterable`）。此命名约定称为*驼峰式大小写*。


  例如，清单 8-3 展示了一个 `Collection` 接口，它描述了任何对象的分组，这被称为*集合*。


  ```

  interface Collection

  {

  void add(String item);

  boolean contains(String item);

  int length();

  }

  清单 8-3

  Collection.java

  ```


  `add()` 方法将字符串添加到集合中。当集合中存在其字符串参数时，`contains()` 方法返回 true；否则返回 false。`length()`
  方法返回列表中存储的字符串数量。


  `Collection` 标识了一个引用类型，它描述了一个字符串集合，但并未说明该集合是如何实现的。它将实现细节留给了实现此接口的类。




  ### 实现接口


  一个类通过在类头附加 Java 的 `implements` 关键字，后跟逗号分隔的接口名称列表，并在类中编码每个接口方法来实现接口。清单 8-4 展示了一个
  `ArrayCollection` 类，它实现了清单 8-3 中的 `Collection` 接口。


  ```

  class ArrayCollection implements Collection

  {

  private String[] items;

  private int length;

  ArrayCollection(int size)

  {

  items = new String[size];

  length = 0;

  }

  @Override

  public void add(String item)

  {

  if (length == items.length)

  resize(items.length * 2);

  items[length++] = item;

  }

  @Override

  public boolean contains(String item)

  {

  for (int i = 0; i < length; i++)

  if (item.equals(items[i]))

  return true;

  return false;

  }

  @Override

  public int length()

  {

  return length;

  }

  void resize(int newSize)

  {

  String[] items2 = new String[newSize];

  for (int i = 0; i < length; i++) // 将 items 复制到 items2

  items2[i] = items[i];

  items = items2;

  }

  }

  清单 8-4

  ArrayCollection.java

  ```


  清单 8-4 展示了 `ArrayCollection`，它在一个私有的 `items` 数组中存储基于数组的字符串集合。构造函数创建此数组，其大小等于其 `size`
  参数中的值。为简洁起见，我没有进行任何错误检查。我经常在各种清单中避免检查错误，但错误检查仍然很重要。


  创建数组后，构造函数将 `length` 字段初始化为 `0`。此变量记录存储项的数量。虽然这种初始化并非必要，因为对象字段在构造对象时会被清零，但它可以告知开发人员（他们可能不知道这一事实）`length`
  从 0 开始。


  `add()` 方法将一个字符串追加到集合中。它首先通过比较 `length` 和 `items.length`（数组大小）来确保集合未满。如果它们相等，则没有更多空间来添加
  `item`，并且会调用 `resize()` 将数组大小加倍。然后存储 `item`，由于数组变大，`length` 递增，并返回 true。


  `contains()` 方法确定其字符串参数是否包含在集合中，该集合通过数组实现。该方法遍历数组，将每个存储的字符串与其字符串参数进行比较。如果相等，则返回
  true；否则返回 false。


  比较是通过 `Object` 的 `equals()` 方法进行的。此方法将对象引用参数与调用 `equals()` 的对象引用进行比较。如果匹配，`equals()`
  返回 true；否则，`equals()` 返回 false。


  `length()` 方法返回存储在基于数组的集合中的项数。


  我已将所有三个方法声明为 `public`，因为 `interface` 的方法隐式是 public 的。


  警告


  当您实现接口方法时（通过覆盖接口的方法头），请记住，在接口中声明了头的所有方法都隐式声明为 `public`。如果您忘记在实现的方法声明中包含 `public`，编译器将报告错误，告知您正在尝试为已实现的方法分配更弱的访问权限。


  `resize()` 方法创建一个名为 `items2` 的新字符串数组，其大小设置为传递给其 `newSize` 参数的值。然后它将 `length` 个字符串从
  `items` 复制到 `items2`。复制从索引 0 开始。填充 `items2` 后，其引用被赋值给 `items`，因为 `items2` 只是一个临时占位符。


  清单 8-5 展示了一个 `LinkedCollection` 类，它实现了清单 8-3 中的 `Collection` 接口。


  ```

  class LinkedCollection implements Collection

  {

  private Node top, last;

  private int length;

  LinkedCollection()

  {

  top = null;

  last = null;

  length = 0;

  }

  @Override

  public void add(String item)

  {

  Node node = new Node();

  node.item = item;

  node.next = null;

  if (last != null)

  last.next = node;

  last = node;

  if (top == null)

  top = node;

  length++;

  }

  @Override

  public boolean contains(String item)

  {

  Node node = top;

  for (int i = 0; i < length; i++)

  if (item.equals(node.item))

  return true;

  else

  node = node.next;

  return false;

  }

  @Override

  public int length()

  {

  return length;

  }

  }

  class Node

  {

  String item;

  Node next;

  }

  清单 8-5

  LinkedCollection.java

  ```


  清单 8-5 展示了 `LinkedCollection`，它将字符串集合存储在一系列链接在一起的 `Node` 对象中。它展示了一个单独的 `Node` 类，该类由一个
  `item` 字段（用于记录正在存储的字符串）和一个 `next` 字段（用于记录对列表中下一个 `Node` 对象的引用）组成。


  私有的 `top` 和 `last` 字段分别标识链接集合中的第一个和最后一个节点。（通常使用名为 `top` 的变量来标识链表的起始位置。）`LinkedCollection()`
  构造函数将这些字段初始化为 null，表示一个空集合。


  私有的 `length` 字段标识存储的节点数。此字段的存在是为了性能。如果它不存在，您将不得不扫描列表以获取长度。`LinkedCollection()` 构造函数将此字段初始化为
  0，尽管它不必这样做，因为 `length` 默认为 0。


  `add()` 方法首先创建一个 `Node` 对象，并用其 `item` 参数中存储的 `String` 引用填充其 `item` 字段。然后它将 `Node`
  对象的 `next` 字段设置为 null，以表示集合的结束。


  如果 `last` 不为 null，则集合中已存在最后一个节点。因此，`add()` 通过首先将 `last` 的 `next` 字段设置为指向 `node`（我们希望最后一个节点引用正在添加到集合中的新节点），将此新节点追加到集合中。然后它将
  `last` 设置为指向 `node`，因为新节点将成为集合中的最后一个节点。


  `add()` 方法现在关注 `top`。如果 `top` 为 null，则链表为空，它将 `top` 指向正在添加的节点。结果是一个单节点链表。


  最后，`add()` 递增 `length` 以表示列表增加了一个节点。


  `contains()` 方法确定其字符串参数是否包含在集合中，该集合通过链表实现。此方法与 `ArrayList` 的 `contains()` 方法非常相似，只是遍历的是链表而不是数组。


  该方法遍历数组，将每个存储的字符串与其字符串参数进行比较。如果相等，则返回 true；否则返回 false。


  `length()` 方法很简单：它返回 `length` 字段的值。


  接口类型的数据值是其类实现了该接口并且其行为由该接口的方法头指定的对象。这一事实意味着，只要对象的类实现了该接口，您就可以将对象的引用赋值给接口类型的变量。


  例如，如果您有一个 `Collection` 类型的变量，并将一个从实现 `Collection` 的类创建的对象引用赋值给此变量，则您只能调用 `Collection`
  描述的那些方法。例如，您不能调用 `resize()`。在 `Collection` 中声明 `resize()` 没有意义，因为并非每个集合类（例如 `LinkedList`）都需要此功能，因此不会声明此方法。


  清单 8-6 演示了 `Collection` 接口以及 `ArrayCollection` 和 `LinkedCollection` 类。




  ```

  class CollectionDemo

  {

  public static void main(String[] args)

  {

  String[] planetNames =

  {

  "Mercury", "Venus", "Earth", "Mars",

  "Jupiter", "Saturn", "Uranus", "Neptune"

  };

  Collection names = new ArrayCollection(5);

  for (int i = 0; i < planetNames.length; i++)

  names.add(planetNames[i]);

  System.out.println("Contains Mercury: " +

  names.contains("Mercury"));

  System.out.println("Contains Pluto: " +

  names.contains("Pluto"));

  System.out.println();

  names = new LinkedCollection();

  for (int i = 0; i < planetNames.length; i++)

  names.add(planetNames[i]);

  System.out.println("Contains Mercury: " +

  names.contains("Mercury"));

  System.out.println("Contains Pluto: " +

  names.contains("Pluto"));

  }

  }

  清单 8-6

  CollectionDemo.java

  ```


  由于 `ArrayCollection` 和 `LinkedCollection` 实现了 `Collection`，因此 `ArrayCollection`
  和 `LinkedCollection` 对象除了拥有其类类型之外，还具有 `Collection` 类型。因此，将每个对象的引用存储在 `Collection`
  类型的变量（`names`）中是合法的，但只能调用由 `Collection` 声明的方法。


  假设清单 8-3 到 8-6 位于当前目录中，通过 `javac *.java` 或 `javac CollectionDemo.java` 编译它们（Java
  编译器会递归编译引用的源文件）。假设没有编译错误，执行以下命令来运行此应用程序：


  ```

  java CollectionDemo

  ```


