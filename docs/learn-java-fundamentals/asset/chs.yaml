  15.0

  25.0

  35.0

  45.0

  contains(40.0, 45.0): true

  contains(80.0, 45.0): false

  ```




  ## 内部类


  第 6 章还向你介绍了非静态字段、非静态方法、非静态字段初始化器和非静态初始化块。这些实体与对应的静态字段、静态方法、静态字段初始化器和静态初始化块的不同之处在于，它们不涉及
  `static` 关键字。


  你可以在一个类中声明这些非静态成员。你也可以在一个类中声明非静态类（内部类）。下面的示例阐明了这种组织方式：


  ```

  class C

  {

  int f; // 字段可以被显式初始化

  void m()

  {

  // 方法代码

  }

  // 非静态初始化块

  {

  // 初始化块代码

  }

  class NSC

  {

  // 非静态类的成员

  }

  }

  ```


  这个示例引入了顶层类 `C`，它包含非静态字段 `f`、非静态方法 `m()`、一个非静态初始化块（我本可以展示一个构造器）以及内部类 `NSC`。请注意，`NSC`
  是 `C` 的一个成员，就像 `f`、`m()` 和非静态初始化块是这个类的成员一样。它们都属于类 `C`，而 `C` 是一个封闭类——`NSC` 是一个被封闭类。


  内部类是其封闭类的一个成员。内部类可以访问封闭类的其他成员，即使它们被声明为 `private`。相比之下，静态类不能直接访问封闭类的非静态成员。


  作为顶层类的一个成员，内部类可以被声明为 `private`、`public`、`protected`，或者保持包私有（默认）。相比之下，顶层类只能被声明为 `public`
  或保持包私有。（第 10 章将向你介绍包。）


  清单 9-5 声明了 `EnclosingClass` 和 `EnclosedClass`，后者演示了对 `EnclosingClass` 成员的访问。


  ```

  class EnclosingClass

  {

  public final static double PI = 3.14159;

  public static double area(double radius)

  {

  return PI * radius * radius;

  }

  private String msg;

  private void printMessage()

  {

  System.out.println(msg);

  }

  class EnclosedClass

  {

  void accessMembersOfEnclosingClass()

  {

  msg = "called from EnclosedClass''s accessMembersOfEnclosingClass() " + "method";

  printMessage();

  System.out.println("PI = " + PI);

  System.out.println("area(10.0) = " + area(10.0));

  }

  }

  }

  清单 9-5

  EnclosingClass.java（版本 2）

  ```


  清单 9-5 声明了一个名为 `EnclosingClass` 的顶层类，它包含静态字段 `PI`、静态方法 `area()`、非静态字段 `msg`、非静态方法
  `printMessage()` 以及非静态类 `EnclosedClass`。此外，`EnclosedClass` 声明了非静态方法 `accessMembersOfEnclosingClass()`。


  该方法首先将一个字符串赋值给 `msg`。（因为字符串相当长，我使用 `+` 运算符将两个较短的字符串拼接成整个字符串。）接着，该方法输出 `msg`。然后，`accessMembersOfEnclosingClass()`
  打印 `PI` 的值，接着（以 `10.0` 作为参数）调用 `area()` 来计算并返回一个圆的面积。同样，我使用 `+` 将两个字符串连接成一个字符串，然后输出。


  清单 9-6 展示了一个 `NSCDemo` 应用程序类的源代码，该类演示了如何实例化 `EnclosingClass`，并使用这个引用来实例化 `EnclosedClass`，进而调用该类的
  `accessMembersOfEnclosingClass()` 非静态方法。


  ```

  class NSCDemo

  {

  public static void main(String[] args)

  {

  EnclosingClass ec = new EnclosingClass();

  ec.new EnclosedClass().accessMembersOfEnclosingClass();

  }

  }

  清单 9-6

  NSCDemo.java

  ```


  清单 9-6 的 `main()` 方法首先实例化 `EnclosingClass` 并将其引用保存在局部变量 `ec` 中。然后，`main()` 使用这个引用作为
  `new` 运算符的前缀来实例化 `NSClass`，随后使用该引用调用 `accessMembersOfEnclosingClass()`。


  注意


  用封闭类的引用作为 `new` 的前缀是很少见的。相反，你通常会在封闭类的构造器或实例方法中调用被封闭类的构造器。


  按如下方式编译这两个清单：


  ```

  javac *.java

  ```


  按如下方式运行生成的应用程序：


  ```

  java NSCDemo

  ```


  你应该会看到以下输出：


  ```

  called from EnclosedClass''s accessMembersOfEnclosingClass() method

  PI = 3.14159

  area(10.0) = 314.159

  ```


  ### 遮蔽


  当某个特定块（例如内部类或方法）中某个类型（例如成员变量[字段]或参数）的声明与封闭块中的另一个类型声明同名时，该声明就会*遮蔽*（隐藏）封闭块中的声明。在这种情况下，你不能仅通过名称来引用被遮蔽的声明。清单
  9-7 的 `ShadowDemo` 应用程序提供了一个遮蔽演示。


  ```

  class ShadowDemo

  {

  String name = "Java";

  class EnclosedClass

  {

  String name = "More Java";

  void outputName(String name)

  {

  System.out.println("name = " + name);

  System.out.println("this.name = " + this.name);

  System.out.println("ShadowDemo.this.name = " + ShadowDemo.this.name);

  }

  }

  public static void main(String[] args)

  {

  ShadowDemo sd = new ShadowDemo();

  ShadowDemo.EnclosedClass ec = sd.new EnclosedClass();

  ec.outputName("Even more Java");

  }

  }

  清单 9-7

  ShadowDemo.java

  ```


  `ShadowDemo.java` 揭示了三个 `name` 变量：`ShadowDemo` 的成员变量、内部类 `EnclosedClass` 的成员变量以及
  `outputName()` 的参数。参数 `name` 遮蔽了 `EnclosedClass` 的 `name` 变量。因此，当你在 `outputName()`
  中使用 `name` 时，你引用的是 `name` 参数。要引用 `EnclosedClass` 的 `name` 变量，请使用关键字 `this` 来表示封闭块：


  ```

  System.out.println("this.x = " + this.x);

  ```


  通过它们所属的类名来引用封闭更大块的成员变量。例如，以下语句从方法 `outputName()` 访问类 `ShadowDemo` 的成员变量：


  ```

  System.out.println("ShadowDemo.this.name = " + ShadowDemo.this.name);

  ```


  按如下方式编译清单 9-7：


  ```

  javac ShadowDemo.java

  ```


  按如下方式运行应用程序：


  ```

  java ShadowDemo

  ```


  你应该会看到以下输出：


  ```

  name = Even more Java

  this.name = More Java

  ShadowDemo.this.name = Java

  ```


  注意


  关于遮蔽的介绍，请参考第 6 章。




  ### 一个更实用的内部类示例


  `NSCDemo` 为你提供了一个学习如何使用内部类的机会。为了更实际地学习如何使用内部类，我们创建一个框架来维护待办事项列表。


  每个待办事项包含一个名称和一个描述。代码清单 9-8 展示了一个描述待办事项的 `ToDo` 类。


  ```

  class ToDo

  {

  private String name;

  private String desc;

  ToDo(String name, String desc)

  {

  this.name = name;

  this.desc = desc;

  }

  String getName()

  {

  return name;

  }

  String getDesc()

  {

  return desc;

  }

  @Override

  public String toString()

  {

  return "Name = " + getName() + ", Desc = " + getDesc();

  }

  }

  代码清单 9-8

  ToDo.java

  ```


  接下来，我们将创建一个 `ToDoList` 类来存储 `ToDo` 实例。`ToDoList` 使用其非静态成员类 `ToDoArray` 将 `ToDo`
  实例存储在一个可增长的数组中。（之所以可增长，是因为你不知道会存储多少个实例，而 Java 数组的长度是固定的）。参见代码清单 9-9。


  ```

  class ToDoList

  {

  private ToDoArray toDoArray;

  private int index = 0;

  ToDoList()

  {

  toDoArray = new ToDoArray(2);

  }

  boolean hasMoreElements()

  {

  return index < toDoArray.length;

  }

  ToDo nextElement()

  {

  return toDoArray[index++];

  }

  void add(ToDo item)

  {

  if (index >= toDoArray.length)

  {

  ToDo[] temp = new ToDo[toDoArray.length * 2];

  for (int i = 0; i < toDoArray.length; i++)

  temp[i] = toDoArray[i];

  toDoArray = temp;

  }

  toDoArray[index++] = item;

  }

  ToDo get(int i)

  {

  return toDoArray[i];

  }

  int size()

  {

  return index;

  }

  }

  }

  代码清单 9-9

  ToDoList.java

  ```


  除了提供 `add()` 方法将 `ToDo` 实例存储到 `ToDoArray` 实例中，`ToDoList` 还提供了 `hasMoreElements()`
  和 `nextElement()` 方法来遍历并返回已存储的实例。代码清单 9-10 演示了这些方法。


  ```

  class UseToDoList

  {

  public static void main(String[] args)

  {

  ToDoList toDoList = new ToDoList();

  toDoList.add(new ToDo("#1", "洗衣服。"));

  toDoList.add(new ToDo("#2", "买杂货。"));

  toDoList.add(new ToDo("#3", "用吸尘器打扫公寓。"));

  toDoList.add(new ToDo("#4", "写报告。"));

  toDoList.add(new ToDo("#5", "洗车。"));

  while (toDoList.hasMoreElements())

  System.out.println(toDoList.nextElement());

  }

  }

  代码清单 9-10

  ToDoList.java

  ```


