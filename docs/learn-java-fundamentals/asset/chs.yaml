  ```

  Contains Mercury: true

  Contains Pluto: false

  Contains Mercury: true

  Contains Pluto: false

  ```


  #### 实现多个接口


  我之前提到过，一个类可以实现多个接口。每个接口的名称都作为 `implements` 关键字后逗号分隔的名称列表的一部分来指定。清单 8-7 展示了一个简单的示例，其中类
  `Z` 实现了接口 `X` 和 `Y`。


  ```

  interface X

  {

  // 适当的常量和/或方法头

  }

  interface Y

  {

  // 适当的常量和/或方法头

  }

  class Z implements X, Y

  {

  // 重写 X 和 Y 的方法头

  }

  清单 8-7

  Z.java（演示多个接口的实现）

  ```


  在实现多个接口时，要注意名称冲突的潜在可能性。当每个接口中出现相同的常量名称（可能具有不同的类型和/或其他信息）并在类中被访问时，就会发生这种情况。当发生名称冲突时，编译器会报告错误，如清单
  8-8 所示。


  ```

  interface X

  {

  int SOME_CONSTANT = 2;

  void some_method();

  }

  interface Y

  {

  int SOME_CONSTANT = 3;

  int some_method(int i);

  }

  class Z implements X, Y

  {

  int i = SOME_CONSTANT;

  @Override

  public void some_method()

  {

  }

  @Override

  public int some_method(int i)

  {

  return i;

  }

  }

  清单 8-8

  Z.java（演示常量冲突）

  ```


  类 `Z` 继承了名为 `SOME_CONSTANT` 的两个不同常量，它们被初始化为两个不同的值。Java 编译器无法确定 `Z` 应该继承哪个常量（即使每个常量被赋予相同的值，也会出现同样的问题），并报告以下错误消息：


  ```

  Z.java:17: error: reference to SOME_CONSTANT is ambiguous

  int i = SOME_CONSTANT;

  ^

  both variable SOME_CONSTANT in X and variable SOME_CONSTANT in Y match

  1 error

  ```


  ### 扩展接口


  实现接口的类揭示了*接口继承*。该类继承了接口的常量和方法头，并对其进行重写。例如，`ArrayCollection` 和 `LinkedCollection`
  都继承了 `Collection` 的 `add()`、`contains()` 和 `length()` 方法头。


  当一个接口扩展另一个接口时，也演示了接口继承。正如子类可以通过保留字 `extends` 扩展超类一样，您可以使用此保留字让子接口扩展超接口。清单 8-9 对此进行了演示。


  ```

  interface List extends Collection

  {

  String get(int i);

  }

  清单 8-9

  List.java

  ```


  `List` 接口扩展了 `Collection`，继承了它的方法头。它还引入了一个 `get()` 方法，该方法返回列表中第 `i` 个位置的字符串，如果 `i`
  小于 0 或大于等于 `list` 的长度，则返回 null。


  清单 8-10 展示了一个实现 `List` 接口的 `ArrayList` 类。


  ```

  class ArrayList implements List

  {

  private String[] items;

  private int length;

  ArrayList(int size)

  {

  items = new String[size];

  length = 0;

  }

  @Override

  public void add(String item)

  {

  if (length == items.length)

  resize(items.length * 2);

  items[length++] = item;

  }

  @Override

  public boolean contains(String item)

  {

  for (int i = 0; i < length; i++)

  if (items[i].equals(item))

  return true;

  return false;

  }

  @Override

  public int length()

  {

  return length;

  }

  @Override

  public String get(int index)

  {

  if (index < 0 || index >= length)

  return null;

  return items[index];

  }

  void resize(int newSize)

  {

  String[] items2 = new String[newSize];

  for (int i = 0; i < length; i++) // 将 items 复制到 items2

  items2[i] = items[i];

  items = items2;

  }

  }

  清单 8-10

  ArrayList.java

  ```


  我之前描述了 `List` 从 `Collection` 继承的 `add()`、`contains()` 和 `length()` 方法。我还描述了 `resize()`
  方法。


  `List` 的 `get()` 方法验证传递给其 `index` 参数的参数：该参数必须大于等于 0 且小于存储列表字符串的数组的长度。如果不满足此条件，此方法返回
  null；否则，它返回该索引处的字符串。


  清单 8-11 展示了一个实现 `List` 接口的 `LinkedList` 类。


  ```

  class LinkedList implements List

  {

  private Node top, last;

  private int length;

  LinkedList()

  {

  top = null;

  last = null;

  length = 0;

  }

  @Override

  public void add(String item)

  {

  Node node = new Node();

  node.item = item;

  node.next = null;

  if (last != null)

  last.next = node;

  last = node;

  if (top == null)

  top = node;

  length++;

  }

  @Override

  public boolean contains(String item)

  {

  Node node = top;

  for (int i = 0; i < length; i++)

  {

  if (node.item.equals(item))

  return true;

  node = node.next;

  }

  return false;

  }

  @Override

  public int length()

  {

  return length;

  }

  @Override

  public String get(int index)

  {

  if (index < 0 || index >= length)

  return null;

  Node node = top;

  int count = 0;

  while (true)

  {

  if (count++ == index)

  break;

  node = node.next;

  }

  return node.item;

  }

  }

  class Node

  {

  String item;

  Node next;

  }

  清单 8-11

  LinkedList.java

  ```


  与 `ArrayList` 一样，我之前描述了 `List` 从 `Collection` 继承的 `add()`、`contains()` 和 `length()`
  方法。


  `List` 的 `get()` 方法首先验证传递给其 `index` 参数的参数：该参数必须大于等于 0 且小于存储列表字符串的数组的长度。如果不满足此条件，此方法返回
  null；否则，它返回该索引处的字符串。


  然后，`get()` 方法遍历链表，直到找到指定索引值处的节点，并返回该节点的项。


  遍历逻辑可能看起来难以理解，但实际上并不难。它首先将 `top` 的值赋给局部变量 `node`，然后将局部变量 `count` 初始化为 0。这些变量控制着遍历过程。




  导航逻辑现在进入了一个看似无限的 `while` 循环。它首先将 `count` 与 `index` 进行比较，并递增 `count` 以记录已遍历的节点数量。当
  `count` 的值等于 `index` 中的值时，表示恰好遍历了 `index` 个节点，循环终止；否则，通过将 `node.next` 的引用赋值给 `node`，使
  `node` 指向下一个节点。


  该循环总会终止，因为 `get()` 方法首先会验证传递给 `index` 的参数。当循环终止时，`get()` 方法返回 `node.item` 的字符串引用。


  最后，清单 8-12 展示了一个 `ListDemo` 类，该类演示了 `Collection`、`List`、`ArrayList` 和 `LinkedList`。


  ```

  class ListDemo

  {

