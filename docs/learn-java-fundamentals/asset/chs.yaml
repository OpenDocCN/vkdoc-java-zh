  ### 一个更实用的局部类示例


  `LCDemo` 让你有机会学习如何使用局部类。由于能够更实际地学习如何使用局部类会更好，我创建了一个受益于局部类的小型 `AddressBook` 类。在介绍
  `AddressBook` 之前，请先查看清单 9-13 中 `AddressBook` 所依赖的 `Address` 类。


  ```

  class Address

  {

  private String street, city;

  Address(String street, String city)

  {

  this.street = street;

  this.city = city;

  }

  String getStreet()

  {

  return street;

  }

  String getCity()

  {

  return city;

  }

  @Override

  public String toString()

  {

  return street + ": " + city;

  }

  }

  清单 9-13

  Address.java

  ```


  `Address` 以街道和城市的形式记录地址。你可以扩展此类以包含省、州或地区；国家；以及你想要的任何其他信息。


  请注意，我重写了 `toString()` 方法，`Address` 从 `Object` 继承了该方法。与默认表示形式相比，此方法提供了 `Address`
  内容更易读的表示形式。（如果你还记得，默认表示形式是 *类名*`@`*十六进制哈希码*。）


  既然 `Address` 已经介绍完毕，让我们来探索 `AddressBook`。清单 9-14 展示了此类的源代码。


  ```

  class AddressBook

  {

  private Address[] addressList;

  private int index = 0;

  AddressBook(int size)

  {

  addressList = new Address[size];

  }

  Iterator iterator()

  {

  class LocalIterator implements Iterator

  {

  int index = 0;

  @Override

  public boolean hasMoreElements()

  {

  return index < addressList.length;

  }

  @Override

  public Object nextElement()

  {

  return addressList[index++];

  }

  }

  return new LocalIterator();

  }

  void add(Address address)

  {

  addressList[index++] = address;

  }

  }

  清单 9-14

  AddressBook.java

  ```


  `AddressBook` 首先声明了一对 `private` 字段：`addressList` 和 `index`，后者被显式赋值为 `0`，尽管在创建 `AddressBook`
  对象时它会被隐式初始化为 0。这样做是为了向不熟悉默认初始化的人说明该字段被初始化为 0。


  `addressList` 字段引用了一个数组（在 `AddressBook(int size)` 构造函数中创建），该数组存储 `Address` 对象。`index`
  字段标识了将 `Address` 对象插入到 `addressList` 所引用数组中的下一个位置。


  `AddressBook(int size)` 构造函数的 `size` 参数接收一个参数，该参数指定了要在数组中存储的元素数量。当此参数小于 1 时，应注意避免出现问题。如果你指定了负数大小，很可能会抛出
  `NegativeArraySizeException` 对象，并且程序会终止。或者，如果你将大小指定为 0，很可能会遇到 `ArrayIndexOutOfBoundsException`
  异常，并且程序会终止。毕竟，在这种情况下，创建一个没有元素的数组有什么意义呢？（第 11 章将探讨异常。）


  构造函数执行 `addressList = new Address[size];`，使用 `new` 运算符实例化一个可以存储 `size` 个元素的 `Address`
  数组。对该数组的引用被赋值给 `addressList`。


  构造函数之后的 `iterator()` 方法演示了一个局部类。在我们查看此类之前，请注意 `iterator()` 的返回类型设置为 `Iterator`，这是一个接口，其内容在清单
  9-15 中给出。


  ```

  interface Iterator

  {

  boolean hasMoreElements();

  Object nextElement();

  }

  清单 9-15

  Iterator.java

  ```


  `Iterator` 接口描述了什么是*迭代器*，它是一个知道如何遍历存储的*元素*（在本例中是对象值，而不是基于原始类型的值）的对象。


  `Iterator` 声明了 `hasMoreElements()` 和 `nextElement()` 这两个无方法体的方法（它们的方法体由实现 `Iterator`
  的类提供）：




  *   `hasMoreElements()` 在存在更多待检查元素时返回布尔值 true；否则返回 false。


  *   `nextElement()` 返回对下一个待检查元素的引用。


  让我们回到 `iterator()` 方法，它执行两项操作。首先，它声明了一个名为 `LocalIterator` 的局部类。其次，它实例化该类并返回结果对象的引用。


  `LocalIterator` 实现了我之前介绍的 `Iterator` 接口。之所以这样做，是因为 `iterator()` 将返回 `LocalIterator`
  类的一个实例，并且 `iterator()` 的返回类型必须与 `iterator()` 末尾 `return` 语句中出现的 `new LocalIterator()`
  表达式的类型一致。


  `LocalIterator` 声明了一个 `index` 字段，用于跟踪 `nextElement()` 将要返回的下一个元素。该字段*遮蔽*（隐藏或掩盖）了其外部块
  `AddressBook` 中的 `index` 字段。


  我们不需要访问 `AddressBook` 的 `index` 字段，因为它与 `LocalIterator` 的 `index` 字段用途不同。前一个 `index`
  字段跟踪 `addressList` 所引用数组中通过 `add()` 方法插入下一个 `Address` 对象的位置。后一个 `index` 字段跟踪该数组中通过
  `nextElement()` 方法返回下一个 `Address` 对象的位置。


  接下来，`LocalIterator` 重写了 `Iterator` 接口声明的 `hasMoreElements()` 和 `nextElement()` 方法。请注意每个方法前面的
  `@Override` 注解。该注解表明正在发生重写，以防止方法被意外重载而非重写时出现问题。请参阅第 7 章，了解更多关于此困境的信息以及对 `@Override`
  的简要介绍。


  `hasMoreElements()` 方法将 `index` 与 `addressList.length` 进行比较，当 `index` 小于后一个表达式的值时，返回
  true（通过 `return` 语句）。否则，`hasMoreElements()` 返回 false。


  `nextElement()` 方法呈现了一个 `return` 语句，该语句通过执行 `addressList[index++]` 从 `addressList`
  返回下一个元素。`index++` 表达式在递增 `index` 之前返回 `index` 的当前值。


  `AddressBook` 的 `iterator()` 方法之后是一个 `add()` 方法，其 `address` 参数包含对 `Address` 对象的引用。该方法执行
  `addressList[index++] = address;`，将 `address` 的引用存储在 `addressList` 的 `index` 位置。请注意，在存储引用后，`index`
  的值会递增。


  清单 9-16 展示了一个 `UseAB` 应用程序类的源代码，该类演示了 `AddressBook` 及其支持的 `Address` 类和 `Iterator`
  接口。


  ```

  class UseAB

  {

  public static void main(String[] args)

  {

  AddressBook addressBook = new AddressBook(3);

  addressBook.add(new Address("100 Elm Street", "City #1"));

  addressBook.add(new Address("200 Bay Street", "City #2"));

  addressBook.add(new Address("300 Oak Street", "City #3"));

  Iterator iter = addressBook.iterator();

  while (iter.hasMoreElements())

  System.out.println(iter.nextElement());

  }

  }

  清单 9-16

  UseAB.java

  ```


  `UseAB` 的 `main()` 方法首先实例化 `AddressBook`，将 `3`（可存储的最大地址数量）传递给 `AddressBook` 的构造函数。对
  `AddressBook` 对象的引用被赋值给局部变量 `addressBook`。


  接下来，`main()` 方法创建三个 `Address` 对象，并将它们传递给 `AddressBook` 的 `add()` 方法。对于每个 `Address`
  对象，`main()` 调用 `AddressBook` 的构造函数，将街道和城市字符串作为参数传递。`Address` 对象的引用作为参数传递给 `add()`。


  下一个任务是执行 `addressBook.iterator()`，它返回一个 `Iterator` 对象（其类实现了 `Iterator` 接口）。该对象的引用被赋值给局部变量
  `iter`。


  最后，`main()` 进入一个 `while` 循环。只要 `iter.hasMoreElements()` 返回 true，该循环就会迭代。每次迭代都会调用
  `iter.nextElement()` 从地址簿返回下一个地址元素。然后通过 `System.out.println()` 输出该元素。


