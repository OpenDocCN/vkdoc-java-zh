- '# 14. System


  `java.lang.System` 类提供了对系统级功能的访问，例如数组复制和虚拟机关闭。本章将向您介绍七种功能。


  注意


  `System` 是一个工具类的示例，因为它的所有方法和字段都被声明为 `static`。




  ## 数组复制


  第 5 章向你介绍了数组。你了解到数组具有固定大小，并且知道要调整数组大小，必须创建一个所需大小的新数组，然后将当前数组中的元素复制到新数组中，最后销毁当前数组。（在本章后面讨论垃圾回收时，我会谈到数组销毁。）


  让我们聚焦于调整数组大小。以下是完成此任务的一种方法：


  ```

  int[] src = new int[] { 20, 30, 50 };

  int[] dest = new int[10];

  for (int i = 0; i < src.length; i++)

  dest[i] = src[i];

  ```


  这段代码片段首先创建并初始化了一个 32 位整数的 `src` 数组。该数组包含三个元素：`20`、`30` 和 `50`。


  然后，该片段创建了一个 `int` 类型的 `dest` 数组。该数组包含 10 个元素，每个元素（在后台）都被初始化为 0。


  最后，该片段进入一个 `for` 循环。这个循环的头部创建了局部变量 `i` 并将其初始化为 0。然后它将 `i` 与 `src.length`（`src` 数组的长度）进行比较。如果
  `i` 小于 `src.length`，则循环继续，执行赋值语句 `dest[i] = src[i];`，将 `src[i]` 的整数复制到对应的 `dest[i]`
  位置。`dest` 的最终结果是 `20, 30, 50, 0, 0, 0, 0, 0, 0, 0`。


  有一种更快的执行数组复制的方法：`System` 类的 `arraycopy()` 方法。以下是该方法的签名：


  ```

  void arraycopy(Object src, int srcPos, Object dest, int destPos, int length)

  ```


  `arraycopy()` 方法将从 `src` 数组中从零基偏移量 `srcPos` 开始的 `length` 个元素，复制到 `dest` 数组中从零基偏移量
  `destPos` 开始的位置。当 `src` 或 `dest` 包含空引用时，此方法会抛出 `java.lang.NullPointerException`；当复制导致访问数组边界之外的数据时，会抛出
  `java.lang.ArrayIndexOutOfBoundsException`；当由于类型不匹配而无法将 `src` 数组中的元素存储到 `dest` 数组时，会抛出
  `java.lang.ArrayStoreException`。


  注意


  很容易拼错 `arraycopy()`。你可能会输入大写字母 `C` 而不是小写字母 `c`，这最终会导致编译器错误。


  我创建了一个 `ArrayResize` 应用程序，演示了用于复制数组的传统方法和 `arraycopy()` 技术。清单 14-1 展示了其源代码。


  ```

  public class ArrayResize

  {

  public static void main(String[] args)

  {

  int[] src = new int[] { 20, 30, 50 };

  int[] dest = new int[10];

  for (int i = 0; i < src.length; i++)

  dest[i] = src[i];

  dump(dest);

  int[] dest2 = new int[10];

  System.arraycopy(src, 0, dest2, 0, src.length);

  dump(dest2);

  }

  static void dump(int[] array)

  {

  for (int i = 0; i < array.length; i++)

  System.out.print(array[i] + " ");

  System.out.println();

  }

  }

  清单 14-1

  ArrayResize.java

  ```


  源代码展示了 `main()` 和 `dump()` 实用方法。`main()` 方法运行应用程序，而 `dump()` 是一个辅助方法，用于支持 `main()`。


  在创建 `src` 和 `dest`，并以传统方式将 `src` 复制到 `dest` 之后，`main()` 将 `dest` 转储到控制台。然后它创建了 `dest2`，第二个目标数组。


  接着，`main()` 执行 `System.arraycopy(src, 0, dest2, 0, src.length);`。第一个参数是对源数组 (`src`)
  的引用，第三个参数是对目标数组 (`dest`) 的引用。


  第二个和第四个参数传递的是 0。第一个 `0` 是 `src` 中开始读取 `int` 值的起始索引。第二个 `0` 是 `dest` 中开始写入 `int`
  值的起始索引。


  最后一个参数是要复制的源数组中的元素数量。该参数通过执行 `src.length` 获得。如果你还记得，`.` 是成员选择运算符。它正在访问 `src` 数组的只读成员
  `length`。请注意，`length` 是数组对象的唯一成员。


  按如下方式编译清单 14-1：


  ```

  javac ArrayResize.java

  ```


  按如下方式运行生成的应用程序：


  ```

  java ArrayResize

  ```


  你应该会看到以下输出：


  ```

  20 30 50 0 0 0 0 0 0 0

  20 30 50 0 0 0 0 0 0 0

  ```


  第一行是 `dest` 的输出。第二行是 `dest2` 的输出。




  ## 当前时间与纳秒时间


  `long currentTimeMillis()` 方法返回自 1970 年 1 月 1 日 00:00:00 UTC 以来经过的当前系统时间（以毫秒为单位）。


  注意


  UTC 代表协调世界时（[`http://en.wikipedia.org/wiki/Coordinated_Universal_Time`](http://en.wikipedia.org/wiki/Coordinated_Universal_Time)）。也许您期望其缩写是
  CUT，但 UTC 实际上是 CUT 与法文版本 TUC（Temps Universel Coordonné）之间的折中方案。请访问 [`www.space.com/what-is-utc.xhtml`](http://www.space.com/what-is-utc.xhtml)
  了解更多关于 UTC 的信息。


  也许您对前面日期时间中的“1970 年 1 月 1 日 00:00:00”这部分感到好奇。为什么 `currentTimeMillis()` 返回的时间是相对于这个值的？[`http://kb.narrative.io/what-is-unix-time`](http://kb.narrative.io/what-is-unix-time)
  指出，1970 年 1 月 1 日 00:00:00 UTC 被称为 *Unix 纪元*。早期的 Unix 工程师随意选择了这个日期，因为他们需要为时间的起点设定一个统一日期，而
  1970 年的元旦似乎最为方便。


  `currentTimeMillis()` 返回的值本身并无意义。幸运的是，您可以通过将其传递给 `java.util.Date` 构造函数，将得到的长整型转换为人类可读的字符串，如下所示：


  ```

  String date = new Date(System.currentTimeMillis()).toString();

  ```


  关于 DATE 类


  JDK 1.0（Java 开发工具包的首个版本）引入了 `Date` 类，作为一种以平台无关方式表示日期和时间的方法。该类的各种问题（包括糟糕的 API 设计）导致
  JDK 8 引入了取代 `Date` 的日期和时间 API。因此，`Date` 的大部分内容已被弃用。（本书不讨论日期和时间 API，因为它是一个高级特性。）


  `Date` 中未被弃用的一个方法是 `toString()` 方法，它返回 `currentTimeMillis()` 值的字符串表示形式。该表示形式遵循以下格式：


  **dow mon dd hh:mm:ss zzz yyyy**


  其中


  *   **dow** 是星期几（Sun、Mon、Tue、Wed、Thu、Fri、Sat）。


  *   **mon** 是月份（Jan、Feb、Mar、Apr、May、Jun、Jul、Aug、Sep、Oct、Nov、Dec）。


  *   **dd** 是月份中的日期（01 到 31），以两位十进制数字表示。


  *   **hh** 是小时（00 到 23），以两位十进制数字表示。


  *   **mm** 是小时内的分钟（00 到 59），以两位十进制数字表示。


  *   **ss** 是分钟内的秒（00 到 61），以两位十进制数字表示。


  *   **zzz** 是时区（可能反映夏令时）。标准时区缩写包括 `Date` 的 `parse(String s)` 方法所识别的那些。如果时区信息不可用，则
  **zzz** 为空：它不包含任何字符。


  *   **yyyy** 是年份，以四位十进制数字表示。


  我很好奇为什么 **ss** 字段允许 60 和 61，于是向 ChatGPT 3.5 询问了这个异常现象：“为什么 `java.util.Date` 的 `toString`
  方法似乎允许秒值为 60 或 61？”ChatGPT 回答如下：


  “在 Java 中，`java.util.Date` 类并未明确阻止您将秒值设置为 60 或 61。这种行为是 `java.util.Date` 实现方式的结果。


  `java.util.Date` 将时间点表示为自‘纪元’（1970 年 1 月 1 日 00:00:00 GMT）以来的毫秒数。它没有单独的秒、分等字段。当您将秒设置为大于
  59 的值时，Java 会自动相应地调整分钟和秒的组成部分。


  例如，如果您将秒设置为 60，它会将分钟增加 1，并将秒设置为 0。类似地，如果您将秒设置为 61，它会将分钟增加 1，并将秒设置为 1。


  此行为与闰秒的处理方式有关。闰秒会被添加或从协调世界时（UTC）中减去，以考虑地球自转的不规则性。在添加闰秒的情况下，`java.util.Date` 对象中的秒值可能会暂时达到
  60 或 61。


  然而，需要注意的是，并非所有 Java 平台都以相同方式处理闰秒，其行为可能取决于底层操作系统和 Java 虚拟机（JVM）的实现。


  为了精确处理日期和时间，特别是当您处理涉及闰秒的场景时，建议使用 Java 8 中引入的较新日期和时间 API，该 API 属于 `java.time` 包。`java.time`
  中的 `LocalDateTime` 等类基于一个简化的模型运行，该模型没有相同的闰秒行为。”


  我可以保证这个答案的正确性。


  `long nanoTime()` 方法返回 JVM 高分辨率时间源的值，它恰好是最精确的系统计时器。此方法返回的值表示自某个固定但任意的原点时间（可能在未来，因此值可能为负）以来经过的纳秒数。在
  JVM 的一个实例中，此方法的所有调用都使用相同的原点；其他虚拟机实例可能使用不同的原点。


  ```

  public class TimeDemo

  {

  public static void main(String[] args)

  {

  System.out.println("自 1970 年 1 月 1 日 UTC 午夜以来的毫秒数：" +

  System.currentTimeMillis());

  System.out.println("自 1970 年 1 月 1 日 UTC 午夜以来的毫秒数（人类可读格式）：" +

  new java.util.Date(System.currentTimeMillis()));

  System.out.println("自某个任意原点时间以来的纳秒数：" + System.nanoTime());

  // 计算以 0.1 弧度增量计算并输出一个圆的所有正弦值 100 次所需的时间（以纳秒为单位）：

  long start = System.nanoTime();

  for (int i = 0; i < 100; i++)

  for (double angle = 0; angle < Math.PI * 2; angle += 0.1)

  System.out.println(Math.sin(angle));

  long end = System.nanoTime();

  System.out.println("经过的时间（以纳秒为单位）：" + (end - start + 1));

  System.out.println("经过的时间（以秒为单位）：" +

  ((end - start + 1) / (1000 * 1000 * 1000)));

  }

  }

  清单 14-2

  TimeDemo.java

  ```


  清单 14-2 的 `main()` 方法首先获取并输出当前时间（以毫秒为单位）。然后，它获取当前时间（以毫秒为单位），将此时间转换为 `Date` 对象，调用
  `Date` 对象的 `toString()` 方法（在后台）将此对象转换为当前时间的字符串表示形式，将此字符串连接到作为 + 运算符左操作数的字符串字面量上——多态性使得该运算符根据其操作数的类型执行整数加法、浮点加法或字符串连接——并通过
  `System.out.println()` 输出连接后的字符串。


  `main()` 方法接下来调用 `System.nanoTime()` 以返回经过的时间（以纳秒为单位），并将其输出。


  最后，`main()` 计算以 0.1 弧度增量计算并输出一个圆的所有正弦值所需的时间（以纳秒为单位）。它执行此操作 100 次。


  该计算首先获取开始时间，然后执行计算并输出这些正弦值的代码，最后在计算/输出逻辑之后获取结束时间。从结束时间中减去开始时间，并在结果上加 1 以获得经过的时间（以纳秒为单位）。（将纳秒数除以十亿
  [1000 * 1000 * 1000] 可将该值转换为秒数。）


  注意




  在动画（可能是游戏）中确定帧率时，你经常会用到这样的逻辑。请查阅维基百科的“帧率”主题（[`http://en.wikipedia.org/wiki/Frame_rate`](http://en.wikipedia.org/wiki/Frame_rate)）来了解帧率。


