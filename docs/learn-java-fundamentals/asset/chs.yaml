  ## 局部类


  在代码块（例如方法体）或*子块*（块中的块）中声明一个类通常很有帮助。这样的类被称为*局部类*，因为（就像局部变量一样）它对于声明它的块/子块来说是局部的。


  注意


  局部类有助于提高代码清晰度。这是因为它们被移到了更接近需要它们的地方。


  例如，你可以在一个方法中声明一个描述*迭代器*（用于遍历容器对象的对象）的类，并返回该类的实例。这样的类被称为*局部类*，因为（就像局部变量一样）它们对于声明它们的方法来说是局部的。以下是一个示例：


  ```

  interface I

  {

  // 成员

  }

  class C

  {

  I m() // 或者甚至 static I m()

  {

  class D implements I

  {

  // 成员

  }

  return new D();

  }

  }

  ```


  顶层类 `C` 声明了非静态方法 `m()`，该方法返回局部类 `D` 的实例，而 `D` 是在此方法中声明的。注意，`m()` 的返回类型是接口 `I`，`D`
  实现了该接口。这个接口是必需的，因为如果给 `m()` 返回类型 `D` 会导致编译器错误——`D` 在 `m()` 的方法体外部是不可访问的。


  警告


  当局部类声明包含任何访问修饰符关键字 `private`、`public` 或 `protected`，或修饰符关键字 `static` 时，编译器会报告错误。


  局部类可以与其封闭类的实例关联，但仅当在非静态上下文中使用时才可以。尽管局部类可以在静态上下文（例如静态方法）中声明，但它不能声明任何静态成员，这使得局部类类似于内部类，内部类也不能声明静态成员。


  注意


  你不能在局部块中声明接口，因为接口被认为是静态的，而局部类不能声明静态成员。


  局部类可以在任何可以声明局部变量的地方声明，并且具有与局部变量相同的作用域（本质上是一个块）。它可以访问周围作用域的局部变量和参数（参数是一种局部变量）。


  在 JDK 8 之前，这些变量必须声明为 `final`。然而，这不再是必需的，因为 JDK 8 引入了*有效 final* 的概念（编译器会将一个从未改变的变量视为
  `final`，无论是否有关键字 `final`）。


  注意


  在局部类中声明的变量可以*遮蔽*（掩盖或隐藏）封闭块中同名的变量。


  当局部类访问封闭块的局部变量或参数时，它会*捕获*该局部变量/参数。捕获局部变量或参数意味着制作该局部变量/参数的一个副本，因为从局部类创建的对象可能比声明该局部变量/参数的当前上下文存活得更久。此外，该局部变量/参数必须声明为
  `final` 或（从 JDK 8 开始）是有效 final 的，以防止对局部变量/参数的修改是否可见产生混淆（因为这些修改是不可见的）。


  考虑代码清单 9-11，它使用了 `final` 关键字。（本书的代码存档中包含第二个版本的 `EnclosingClass`，它没有使用 `final`。在编译该版本的
  `EnclosingClass` 时，JDK 8 之前的编译器会报告错误。）


  ```

  class EnclosingClass

  {

  void m(final int i)

  {

  final int j = i * 10;

  class LClass

  {

  int m = i;

  int n = j;

  }

  LClass lc = new LClass();

  System.out.println(lc.m);

  System.out.println(lc.n);

  }

  }

  代码清单 9-11

  EnclosingClass.java

  ```


  代码清单 9-11 声明了 `EnclosingClass`，其非静态方法 `m()` 声明了一个名为 `LClass` 的局部类。




  `LClass` 声明了两个非静态字段（`m` 和 `n`），当 `LClass` 被实例化时，这两个字段会被初始化为 `final` 参数 `i` 和 final
  局部变量 `j` 的值——请参见清单 9-12 中演示 `LClass` 的 `LCDemo` 应用程序的源代码。


  ```

  class LCDemo

  {

  public static void main(String[] args)

  {

  EnclosingClass ec = new EnclosingClass();

  ec.m(10);

  }

  }

  清单 9-12

  LCDemo.java

  ```


  清单 9-12 的 `main()` 方法首先实例化 `EnclosingClass`。然后使用该对象调用 `m(10)`。被调用的 `m()` 方法将该参数乘以
  10；实例化 `LClass`，其编译器生成的 `<init>()` 方法（关于 `<init>()` 的简要介绍，请参见第 6 章）将参数和参数乘以 10 的结果赋值给它的两个非静态字段（代替使用构造函数执行此任务）；并输出
  `LClass` 的非静态字段值。


  按如下方式编译清单 9-11 和 9-12：


  ```

  javac *.java

  ```


  当你编译一个方法中包含局部类的类时，编译器会为该局部类创建一个类文件，其名称由封闭类的名称、一个美元符号、一个从 1 开始的整数以及局部类的名称组成。编译后，除了
  `LCDemo.class` 之外，你还会发现 `EnclosingClass$1LClass.class` 和 `EnclosingClass.class`。


  编译器为局部类生成的类文件名


  在为局部类的类文件生成名称时，编译器会按照 *enclosingClass*`$(`*integer*`)`*enclosedClass* 的模式向生成的名称中添加一个整数。（括号不是最终名称的一部分。）如果有两个同名的局部类，编译器会递增该整数以避免名称冲突。请考虑以下示例：


  ```

  class EnclosingClass

  {

  void m1()

  {

  class LClass

  {

  }

  }

  void m2()

  {

  class LClass

  {

  }

  }

  void m3()

  {

  class LClass2

  {

  }

  }

  }

  ```


  `EnclosingClass` 声明了三个非静态方法，每个方法都声明了一个局部类。前两个方法生成了两个同名的不同局部类。编译器生成以下类文件：


  ```

  EnclosingClass$1LClass.class

  EnclosingClass$1LClass2.class

  EnclosingClass$2LClass.class

  EnclosingClass.class

  ```


  编译器为 `m1()` 的 `LClass` 局部类生成 `EnclosingClass$1LClass.class`，为 `m3()` 的 `LClass2`
  局部类生成 `EnclosingClass$1LClass2.class`，为 `m2()` 的 `LClass` 局部类生成 `EnclosingClass$2LClass.class`。


