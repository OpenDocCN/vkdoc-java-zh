- '# 7. 通过继承和组合复用类


  第 6 章向你介绍了类，它们*封装*（组合）了字段（存储状态）、方法（实现行为）和构造函数（实例化对象）。这种安排被称为*基于对象的编程*。


  Java 提供了一种继承机制，用于从一个类派生出另一个类。其思想是以更专业化的方式复用这个其他类。这种安排被称为*面向对象编程*。


  Java 还提供了一种组合机制，用于将一个类定义为其各个部分的总和。换句话说，类的字段由其他类实现。组合提供了复用其他类的另一种方式。


  本章首先向你介绍继承。然后向你介绍组合。


  ## 继承


  *继承*是一种用于类复用的编程技术，通过它你可以从一个类派生出另一个类。它允许你从更泛化的类创建更专门的类。


  考虑第 6 章的 `Vehicle` 类。`Vehicle` 概括了成为一辆交通工具的含义。一辆交通工具具有品牌、型号和年份。此外，一辆交通工具可以被驾驶。


  假设你想建模一辆卡车。你可以从 `Vehicle` 派生一个 `Truck` 类，该类将继承 `Vehicle` 的 `make`、`model` 和 `year`
  字段，以及通过 `Vehicle` 的 `drive()` 方法进行驾驶的能力。然后，你可以添加任何必要的字段和方法来区分 `Truck` 和 `Vehicle`。


  你可以用类似的方式建模自行车、摩托车、船或滑板。


  在这些例子中，继承都用于在一对类之间形成*是一个关系*。`Truck` 是一个 `Vehicle`。对于 `Bicycle`、`Motorcycle`、`Boat`
  和 `SkateBoard` 也是如此。


  本节首先向你展示如何使用 Java 的类扩展功能来形成 is-a 关系。然后讨论方法覆盖，并介绍所有类的最终祖先。




  ### 类扩展


  Java 的类扩展功能由 `extends` 关键字实现。当 `extends` 出现时，它指定了两个类之间的父子关系。这种关系通过以下语法描述：


  ```

  ''class'' 子类 ''extends'' 父类

  ''{''

  // 类体

  ''}''

  ```


  根据此语法，*子*类扩展了*父*类，并继承了父类中可访问的成员。


  注意


  `extends` 后面不能指定多个类名，因为 Java 不支持基于类的多重继承。


  例如，我将使用 `extends` 在 `Vehicle` 和 `Truck` 类之间建立关系，然后在 `Account` 和 `CheckingAccount`
  类之间建立关系：


  ```

  class Vehicle

  {

  // 成员声明

  }

  class Truck extends Vehicle

  {

  // 继承 Vehicle 中可访问的成员

  // 提供自己的成员声明

  }

  class Account

  {

  // 成员声明

  }

  class CheckingAccount extends Account

  {

  // 继承 Account 中可访问的成员

  // 提供自己的成员声明

  }

  ```


  这些示例体现了“是一个”关系。`Truck` 是一种专门的 `Vehicle`，`CheckingAccount` 是一种专门的 `Account`。`Vehicle`
  和 `Account` 被称为*基类*、*父类*或*超类*。`Truck` 和 `CheckingAccount` 被称为*派生类*、*子类*或*子类*。


  注意


  出于安全或其他原因，你可能希望声明一个不应被扩展的类。Java 提供了 `final` 关键字来防止类被扩展。只需在类头前加上 `final`，例如 `final
  class Password`。有了这个声明，当有人试图扩展 `Password` 时，编译器将报告错误。


  子类从其父类和其他祖先类继承可访问的字段和方法。它们从不继承构造函数。相反，子类声明自己的构造函数。此外，它们可以声明自己的字段和方法，以区别于其父类。请参考清单
  7-1。


  ```

  class Account

  {

  private String name;

  private long amount;

  Account(String name, long amount)

  {

  this.name = name;

  setAmount(amount);

  }

  void deposit(long amount)

  {

  this.amount += amount;

  }

  String getName()

  {

  return name;

  }

  long getAmount()

  {

  return amount;

  }

  void setAmount(long amount)

  {

  this.amount = amount;

  }

  }

  清单 7-1

  Account.java

  ```


  清单 7-1 描述了一个通用的银行账户类，包含一个名称和一个初始金额，两者都在构造函数中设置。此外，它允许用户进行存款。（你可以通过存入负金额来取款，但我们忽略这种可能性。）请注意，账户名称必须在创建账户时设置。


  注意


  我选择用 `long` 类型来表示货币值，其中值以美分计数存储。你可能更倾向于使用 `double` 或 `float` 来存储美元和美分值，但这可能导致不精确。第
  12 章提供了一个更好的替代方案。


  清单 7-2 展示了一个 `CheckingAccount` 子类，它扩展了其 `Account` 超类。


  ```

  class CheckingAccount extends Account

  {

  CheckingAccount(long amount)

  {

  super("checking", amount);

  }

  void withdraw(long amount)

  {

  setAmount(getAmount() - amount);

  }

  }

  清单 7-2

  CheckingAccount.java

  ```


  `CheckingAccount` 类继承自 `Account`，并提供了一个构造函数，通过将 `"checking"` 和 `amount` 传递给超类构造函数，来初始化其超类中的
  `amount` 和 `name` 字段。


  该构造函数使用保留字 `super` 将这些值传递给其对应的超类构造函数。它通过 `super("checking", amount);` 在调用上下文中使用
  `super`。这类似于使用 `this()` 调用上下文将参数传递给同一类中的另一个构造函数。


  警告


  正如 `this()` 必须是调用同一类中另一个构造函数的构造函数中的第一个元素一样，`super()` 也必须是调用其超类中构造函数的构造函数中的第一个元素。如果你违反此规则，编译器将报告错误。当编译器在方法中检测到
  `super()` 调用时，也会报告错误；`super()` 只能在构造函数中调用。


  `CheckingAccount` 还提供了一个 `withdraw()` 方法，该方法通过要取出的金额减少账户余额。由于 `Account` 的 `amount`
  字段是 `private` 的，`CheckingAccount` 无法直接访问它。相反，它调用从 `Account` 继承的 `setAmount()` 和
  `getAmount()` 方法，从 `getAmount()` 的返回值中减去其 `amount` 参数值，并将差值传递给 `setAmount()`。


