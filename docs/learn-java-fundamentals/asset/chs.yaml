  ## “hello, world” – Java 风格


  让我们创建一个简单的应用程序来体验一下 Java 代码。传统上，第一个应用程序除了在控制台上输出 `hello, world` 消息外什么也不做。清单 1-1
  展示了一个实现此功能的 `HelloWorld` 应用程序的源代码。


  ```

  class HelloWorld

  {

  public static void main(String[] args)

  {

  System.out.println("hello, world");

  }

  }

  清单 1-1

  HelloWorld.java

  ```


  清单 1-1 声明了一个 `HelloWorld` 类（我将在第 6 章中解释类），该类作为 `main()` *方法*（一个在类上下文中执行的命名指令序列）的占位符。


  注意


  像 C 这样的语言使用函数而不是方法。*函数* 是一个在任何上下文之外执行的命名指令序列。


  `main()` 方法作为应用程序的入口点。当应用程序运行时，`main()` 的代码被执行。


  `main()` 方法头（`public static void main(String[] args)`）展示了一些有趣的特征：


  *   该方法被标记为 `public`，以便 `Java` 程序启动器可以找到它。如果缺少 `public`，则在尝试运行应用程序时会输出错误消息。


  *   该方法被标记为 `static`，这样就不需要创建 `HelloWorld` 对象来调用 `main()`。启动器直接调用 `main()`。它对对象一无所知。如果缺少
  `static`，则在尝试运行应用程序时会输出错误消息。


  *   该方法声明了一个由 `String[] args` 组成的参数列表，该列表标识了一个字符串参数数组，当启动器运行应用程序时，这些参数会在命令行上应用程序名称（`HelloWorld`）之后传递。*字符串*
  是放在双引号（`"`）之间的一系列字符。


  *   该方法声明了一个 `void` 返回类型，表示该方法不返回任何内容。


  如果返回类型和参数列表等概念让你感到困惑，请不要担心。你将在本书后面学习这些概念。


  `main()` 方法执行 `System.out.println("hello, world");` 以在控制台窗口上输出 `hello, world`。我将在第
  14 章中探讨 `System.out` 及其对应的 `System.err` 和 `System.in`。


  缩进、左花括号位置和代码分隔风格


  程序员在缩进源代码时通常遵循一种风格，在定位块的左花括号字符时遵循另一种风格，在使用空行分隔源代码段时遵循第三种风格。（我将在第 4 章中简要讨论 *块*，即由
  `{` 和 `}` 字符包围的代码序列。）


  清单 1-1 演示了前两种风格类别。它展示了我倾向于将块中的所有行缩进三个空格。我发现这样做可以让我在根据需求变化更新源代码时更容易遵循其组织结构。


  此外，清单 1-1 展示了我倾向于对齐左花括号（`{`）和右花括号（`}`）字符，这样我可以更容易地定位块的开始和结束。许多程序员更喜欢以下的花括号字符对齐方式：


  ```

  class HelloWorld {

  public static void main(String[] args) {

  System.out.println("hello, world");

  }

  }

  ```


  另一个风格问题涉及插入空行来分隔代码段，其中每个段由共同作用于程序某个方面的语句组成。这里有一个人为的例子，涉及一对类 `A` 和 `B`：




  ```

  class A

  {

  void method1()

  {

  for (int i = 0; i < 10; i++)

  System.out.println(i);

  while (true)

  {

  // ... 在此处执行某些操作

  }

  }

  void method2()

  {

  for (int i = 0; i < 10; i++)

  System.out.println(i);

  while (true)

  {

  // ... 在此处执行某些操作

  }

  }

  }

  class B

  {

  void method1()

  {

  for (int i = 0; i < 10; i++)

  System.out.println(i);

  while (true)

  {

  // ... 在此处执行某些操作

  }

  }

  void method2()

  {

  for (int i = 0; i < 10; i++)

  System.out.println(i);

  while (true)

  {

  // ... 在此处执行某些操作

  }

  }

  }

  ```


  类 `A` 和 `B` 各自声明了两个方法：`method1()` 和 `method2()`。此外，`method1()` 和 `method2()` 各自声明了一个
  `for` 语句，后跟一个 `while` 语句。


  不必担心类、方法和语句。我将在第 6 章介绍类和方法的细节，并在第 4 章介绍语句的细节。


  现在，请注意 `A` 和 `B` 中的空行风格。`A` 的风格是在每个方法之间以及每组相关语句之间放置一个空行。`B` 的风格是消除方法之间和语句之间的空行。


  形成你自己的缩进、花括号放置和代码分隔风格。虽然这些风格不会影响生成的代码，但严格遵循它们能让你在程序员中脱颖而出，并使你的源代码更易于阅读和维护。我倾向于变化我的代码分隔风格，你将在本书的代码清单中发现这一点。


  按如下方式编译源代码（必须包含 `.java` 文件扩展名）：


  ```

  javac HelloWorld.java

  ```


  如果一切顺利，你应该会在当前目录中看到一个 `HelloWorld.class` 文件。


  现在，执行以下命令来运行 `HelloWorld.class`（不得包含 `.class` 文件扩展名）：


  ```

  java HelloWorld

  ```


  如果一切顺利，你应该会看到以下输出：


  ```

  hello, world

  ```


  恭喜！你已经成功运行了第一个 Java 应用程序。你应该感到自豪。


  ## 应用程序架构


  一个应用程序至少包含一个类，并且这个类必须声明一个 `main()` 入口点方法，正如你在清单 1-1 中看到的那样。然而，许多应用程序将由多个类组成。所有这些类可以声明在同一个源文件中，或者每个类可以声明在自己的源文件中。请参考清单
  1-2。


  ```

  class A

  {

  static void a()

  {

  System.out.println("a() called");

  }

  }

  class B

  {

  static void b()

  {

  System.out.println("b() called");

  }

  }

  class C

  {

  public static void main(String[] args)

  {

  A.a();

  B.b();

  }

  }

  清单 1-2

  Classes.java

  ```


  清单 1-2 在同一个源文件 `Classes.java` 中声明了三个类（`A`、`B` 和 `C`）。类 `C` 是入口点类，因为它声明了 `main()`
  方法。


  按如下方式编译 `Classes.java`：


  ```

  javac Classes.java

  ```


  你应该会在当前目录中看到 `A.class`、`B.class` 和 `C.class` 类文件。


  按如下方式运行此应用程序：


  ```

  java C

  ```


  你应该会看到以下输出：


  ```

  a() called

  b() called

  ```


  如果你尝试执行 `A`（`java A`）或 `B`（`java B`），你会发现一条错误消息，因为这两个类都没有声明 `main()` 入口点方法。


  这引出了一个有趣的观点。你可以在 `A` 和 `B` 中声明 `main()` 方法，并将这些类作为应用程序运行。然而，这可能会造成混淆。


  你可能想在 `A` 和 `B` 中各声明一个 `main()` 方法来测试这些类，但除此之外可能没有其他好的理由这样做。最好只在入口点类中声明 `main()`
  以避免混淆。


  ## 下一步是什么？


  既然你已经初步体验了 Java，是时候通过探索语言特性来巩固这些知识了。第 2 章将从最基本的语言特性开始：注释、标识符（以及保留字）、类型、变量和字面量。


  '
- '# 2. 注释、标识符、类型、变量和字面量


  在学习一门新的编程语言时，最好从最基本的语言特性开始。这些特性包括注释、标识符（保留字是其子集）、类型、变量和字面量。本章将在 Java 的上下文中向你介绍这些特性。


  ## 注释


  记录你的源代码非常重要，这样你和将来可能维护它的任何人都能理解代码的用途。随着年龄增长，我们的大脑容易遗忘，我们可能不理解当初为什么以某种方式编写代码。源代码应该在编写时就被记录。每当代码发生更改时，可能也需要修改这些文档，以便它能准确地解释新代码。


  Java 提供了用于记录源代码的*注释*。当你编译源代码时，编译器会忽略注释——不会生成字节码。支持单行注释、多行注释和 Javadoc（文档）注释。


  ### 单行注释


  *单行注释*出现在源代码的一行中。它以 `//` 字符序列开头，并持续到该行结束。编译器会忽略从 `//` 字符开始到该行末尾的所有内容。以下示例演示了一个单行注释：


  ```

  double degrees = (5.0 / 9.0) * (x - 32.0); // 将 x 华氏度转换为摄氏度。

  ```


  单行注释适用于指定简短但有意义的信息。它们不应用于插入无用的信息，例如 `// 这是一个注释`。


  ### 多行注释


  *多行注释*通常跨越源代码的多行，尽管它也可以出现在单行中。此注释以 `/*` 开头，以 `*/` 结尾。编译器会忽略两者之间的所有内容（包括 `/*` 和 `*/`）。以下示例演示了一个多行注释：


  ```

  /* 将电子邮件地址的两个部分提取到一个双元素数组中。

  email_parts[0] 存储 "xyz"，email_parts[1] 存储 "gmail.com"。 */

  String[] email_parts = "xyz@gmail.com".split("@", 2); // 提取

  ```


  你不能将一个多行注释嵌套在另一个多行注释内部。例如，当编译器遇到以下嵌套注释时，会生成一个错误：


  ```

  /*

  /*

  嵌套的多行注释是非法的。

  */

  */

  ```


  警告


  当编译器遇到嵌套的多行注释时，会报告一个错误。




  ### Javadoc 注释


  *Javadoc 注释*是多行注释的一种变体。它以 `/**`（而不是 `/*`）开头，并以 `*/` 结尾（与多行注释一样）。从 `/**` 到 `*/` 之间的所有字符都会被编译器忽略。以下示例展示了一个
  Javadoc 注释：


  ```

  /**

  *  应用程序入口点

  *

  *  @param args 传递给此方法的命令行参数数组

  */

  public static void main(String[] args)

  {

  // TODO 代码应用逻辑在此处

  }

  ```


  此示例中的 Javadoc 注释描述了应用程序的 `main()` 方法。夹在 `/**` 和 `*/` 之间的是对该方法的描述以及 `@param` *Javadoc
  标签*（一个以 `@` 为前缀、用于 `javadoc` 工具的指令）。


  以下是一些常用 Javadoc 标签（包括 `@param`）的列表：


  *   `@author` 标识源代码的作者。


  *   `@deprecated` 标识不应再使用的源代码实体（例如方法）。


  *   `@param` 标识方法的某个参数。


  *   `@see` 提供“另请参阅”引用。


  *   `@since` 标识该实体首次出现的软件版本。


  *   `@return` 标识方法返回值的类型。


  *   `@throws` 记录方法抛出的异常。


  清单 2-1 展示了清单 1-1 中 `HelloWorld` 应用程序的更新源代码。此源代码包含一对 Javadoc 注释，用于记录 `HelloWorld`
  类及其 `main()` 入口点方法。


  ```

  /**

  一个用于介绍 Java 应用程序的简单类。

  @author Jeff Friesen

  */

  public class HelloWorld

  {

  /**

  应用程序入口点

  @param args 传递给此方法的命令行参数数组

  */

  public static void main(String[] args)

  {

  System.out.println("hello, world");

  }

  }

  清单 2-1

  HelloWorld.java

  ```


