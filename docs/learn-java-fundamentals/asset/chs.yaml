  在处理非常大的*对角矩阵*（主对角线以外的元素全为零——参见 [`http://en.wikipedia.org/wiki/Diagonal_matrix`](http://en.wikipedia.org/wiki/Diagonal_matrix)）时，不规则数组在线性代数中非常有用。因为对角矩阵是方阵，所以通过不存储主对角线上方的
  0 元素，可以节省大量内存。


  ## 矩阵乘法


  *线性代数*是数学的一个分支，涉及*线性*（直线）方程。它广泛使用*矩阵*（表格）。


  将一个矩阵与另一个矩阵相乘是计算机图形学、经济学、运输行业和其他领域的常见任务。例如，*矩阵乘法*算法可用于确定在将几种不同产品运送到几个不同城市时，哪个城市能带来最大收入。


  矩阵乘法的工作原理如下。设 A 表示一个具有 m 行 p 列的矩阵。设 B 表示一个具有 p 行 n 列的矩阵。将 A 乘以 B 得到矩阵 C，C 具有 m 行
  n 列。C 中的每个 C[ij] 条目是通过将 A 的第 i 行中的所有条目与 B 的第 j 列中的相应条目相乘，然后将结果相加得到的。图 5-6 向你展示了这些操作。


  ![](img/615966_1_En_5_Fig6_HTML.jpg)


  一个矩阵乘法。A 中的每一行与 B 相乘并相加，最终得到 C 中的一个条目。


  图 5-6


  观察 A 中的每一行如何与 B 中的相应列相乘并相加，以生成 C 中的一个条目


  注意


  矩阵乘法要求左侧矩阵 (A) 的列数 (p) 等于右侧矩阵 (B) 的行数 (p)。否则，此算法将无法工作。


  我创建了一个 `MatMult` 应用程序来演示矩阵乘法。清单 5-4 展示了此应用程序的源代码。


  ```

  class MatMult

  {

  public static void main(String[] args)

  {

  // 分配两个要相乘的矩阵。

  // m1 是一个 2 行 2 列的矩阵。

  // m2 是一个 2 行 1 列的矩阵。

  int[][] m1 = {{ 80, 60 }, { 59, 32 }};

  int[][] m2 = {{ 4 }, { 19 }};

  // 打印 m1。

  for (int i = 0; i < m1.length; i++)

  {

  for (int j = 0; j < m1[0].length; j++)

  System.out.print(m1[i][j] + " ");

  System.out.println();

  }

  System.out.println();

  // 打印 m2。

  for (int i = 0; i < m2.length; i++)

  {

  for (int j = 0; j < m2[0].length; j++)

  System.out.print(m2[i][j] + " ");

  System.out.println();

  }

  System.out.println();

  // 分配结果 2 行 1 列矩阵。

  int[][] m3 = new int[m1.length][m2[0].length];

  // 将 m1 乘以 m2 并将结果累加到 m3。

  for (int i = 0; i < m1.length; i++)

  for (int j = 0; j < m2[0].length; j++)

  for (int k = 0; k < m1[0].length; k++) // 或 k < m2.length

  m3[i][j] += m1[i][k] * m2[k][j];

  // 打印 m3。

  for (int i = 0; i < m3.length; i++)

  {

  for (int j = 0; j < m3[0].length; j++)

  System.out.print(m3[i][j] + " ");

  System.out.println();

  }

  }

  }

  清单 5-4

  MatMult.java

  ```


  `MatMult` 首先声明一对矩阵 `m1` 和 `m2`，并打印它们的内容。然后，它为结果矩阵 `m3` 分配空间，用于保存乘法结果。执行乘法，并打印 `m3`
  的内容。


  假设你已经将清单 5-4 复制到名为 `MatMult.java` 的文件中，请按如下方式编译清单 5-4：


  ```

  javac MatMult.java

  ```


  如果编译成功，你应该会在当前目录中看到一个 `MatMult.java` 文件。按如下方式运行此应用程序：


  ```

  java MatMult

  ```


  你应该会看到以下输出：


  ```

  80 60

  59 32


  ```


  ## 接下来是什么？


  数组是从数组类型创建的对象，数组类型类似于类。我将在第 6 章中重点介绍类和对象。


