  ### 文本反转


  为了给您提供一个更实际的 `StringBuffer` 类示例，我创建了一个 `TR`（文本反转）应用程序，它可以反转作为参数传入的单词序列。清单 13-4 展示了
  `TR` 的源代码。


  ```

  public class TR

  {

  public static void main(String[] args)

  {

  if (args.length == 0)

  {

  System.out.println("用法: java TR 单词序列");

  return;

  }

  StringBuffer sb = new StringBuffer();

  for (int i = 0 ; i < args.length; i++)

  sb.append(args[i] + " ");

