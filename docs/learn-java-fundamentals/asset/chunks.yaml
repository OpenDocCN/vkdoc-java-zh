- fmt: '# 12. Math, BigDecimal, and BigInteger


    Mathematics operations are an important part of computing. You learned about basic
    math operators (such as addition and multiplication) in Chapter [3](#615966_1_En_3_Chapter.xhtml).
    Java also provides a `Math` class in the `java.lang` package, along with `BigDecimal`
    and `BigInteger` classes in the `java.math` package. This chapter introduces you
    to these classes.


    ## Math


    The `Math` class augments the basic math operators with useful `static` constants
    and methods. This section presents these constants and explores a few of these
    methods.


    **Note**


    You might be interested in the companion `java.lang.StrictMath` class. `StrictMath`
    appears to be identical to `Math` but more strictly defines various math operations
    so that they are 100% portable from platform to platform. Check out `Math`’s JDK
    documentation to learn more about `StrictMath`.


    Java also provides the `strictfp` (strict floating-point) keyword to serve as
    a modifier for classes and methods. It was introduced in Java version 1.2 to restrict
    floating-point calculations and ensure the same result on every platform. However,
    it is no longer being used (see [`http://en.wikipedia.org/wiki/Strictfp`](http://en.wikipedia.org/wiki/Strictfp)).


    ### Math Constants


    JDK 21’s `Math` class declares three constants:


    * `E`: The `double` value that is closer than any other to e, the base of the
    natural logarithms.

    * `PI`: The `double` value that is closer than any other to pi (π), the ratio
    of the circumference of a circle to its diameter.

    * `TAU`: The `double` value that is closer than any other to tau (τ), the ratio
    of the circumference of a circle to its radius.


    The `PI` constant is useful in calculating a circle’s circumference and area.
    Listing [12-1](#615966_1_En_12_Chapter.xhtml#PC1) presents a `Circle` application
    that does just this.


    ```

    public class Circle

    {

    public static void main(String[] args)

    {

    if (args.length != 1)

    {

    System.out.println("usage: java Circle diameter");

    return;

    }

    double diameter = Double.parseDouble(args[0]);

    System.out.println("Diameter: " + diameter);

    System.out.println("Circle area: " + Math.PI * diameter);

    double radius = diameter / 2;

    System.out.println("Circle circumference: " +

    Math.PI * radius * radius);

    }

    }

    Listing 12-1

    Circle.java

    ```


    `Circle` takes a single command-line argument, which identifies the diameter of
    a circle. I leverage the `java.lang.Double` class’s `parseDouble()` method to
    parse the string-based diameter to a `double`. The rest of `Circle` is self-explanatory.


    **Note**


    `Double` is an example of a *wrapper class* because a `Double` object wraps itself
    around a double-precision floating-point value. Additional examples of wrapper
    classes include `Long`, `Character`, and `Float`.


    Wrapper classes convert primitive type-based values into objects that can be stored
    in container objects, such as objects created from the container types (`ArrayList`,
    `TreeSet`, `HashMap`, and so on) in Java’s Collections Framework. For brevity,
    I have little to say about wrapper classes and don’t discuss Java’s Collections
    Framework in this book.


    `Double` and the other wrapper classes also contain useful utility methods. `Double`’s
    `parseDouble()` method is one example.


    Compile Listing [12-1](#615966_1_En_12_Chapter.xhtml#PC1) as follows:


    ```

    javac Circle.java

    ```


    Run the resulting `Circle.class` application as follows:


    ```

    java Circle 10

    ```


    You should observe the following output:


    ```

    Diameter: 10.0

    Circle area: 31.41592653589793

    Circle circumference: 78.53981633974483

    ```


    ### Trigonometric Methods


    `Math` declares several methods for carrying out operations related to trigonometry.
    Consider the following overloaded trigonometric methods for obtaining the cosine,
    sine, and tangent of an angle:


    * `double cos(double a)`

    * `double sin(double a)`

    * `double tan(double a)`


    For each method, the angle passed to `a` must be expressed in radians.


    I’ve created a `Graph` application that demonstrates `cos()` and `sin()`. `Graph`
    displays a graph of cosine and sine waves on the console. Listing [12-2](#615966_1_En_12_Chapter.xhtml#PC5)
    presents its source code.


    ```

    public class Graph

    {

    final static int ROWS = 27; // Must be odd

    final static int COLS = 50;

    public static void main(String[] args)

    {

    char[][] screen = new char[ROWS][COLS];

    double scaleX = COLS / 360.0;

    // Draw sine and cosine waves in buffer.

    for (int degree = 0; degree < 360; degree++)

    {

    double radian = Math.toRadians(degree);

    int row = (int) Math.round(ROWS / 2 * Math.sin(radian));

    screen[ROWS / 2 + row][(int) (degree * scaleX)] = ''S'';

    row = (int) Math.round(ROWS / 2 * Math.cos(radian));

    screen[ROWS / 2 + row][(int) (degree * scaleX)] = ''C'';

    }

    // Output buffer to console.

    for (int row = ROWS - 1; row >= 0; row--)

    {

    for (int col = 0; col < COLS; col++)

    System.out.print(screen[row][col]);

    System.out.println();

    }

    }

    }

    Listing 12-2

    Graph.java

    ```


    Listing [12-2](#615966_1_En_12_Chapter.xhtml#PC5)’s `Graph` class first introduces
    constants `COLS` and `ROWS`, which specify the dimensions of the table that I
    use as an offscreen buffer for storing the graph. `ROWS` must be assigned an odd
    number; otherwise, `java.lang.ArrayIndexOutOfBoundsException` is thrown. The exception
    occurs when one of the `row` calculations produces a value that equals `ROWS`:
    `row` can only take on a value from `0` through `ROWS - 1`. Also, the graph looks
    better with an odd number of rows.


    **Note**


    `Graph` demonstrates the value in using constants wherever possible. The source
    code is easier to maintain because you only need to change the constant’s value
    in one place instead of having to change each corresponding value throughout the
    source code.


    The `main()` method first creates `screen`, a two-dimensional array that serves
    as an offscreen buffer for storing the graph. The graph is drawn in the buffer,
    which is later copied to the console because it’s impossible to position the cursor
    on the console.


    The `main()` method next calculates a horizontal scale value for scaling each
    of the sine and cosine waves horizontally so that 360 horizontal positions representing
    degrees fit into the number of columns specified by `NCOLS`.


    Next, `main()` enters a `for` loop that, for each of the sine and cosine waves,
    creates (row, column) coordinates for each degree value and assigns a value to
    the screen array at those coordinates. The character is `C` for the cosine wave,
    `S` for the sine wave, and `*` for where the waves intersect.


    The row calculation invokes `Math`’s `double toRadians(double angdeg)` method
    to convert its angle argument from degrees to radians, which the `sin()` and `cos()`
    methods require. The value that these methods return ranges from -1 through 1
    and is then multiplied by `ROWS / 2` to scale this value to half the number of
    rows in the `screen` array.


    After rounding the result to the nearest long integer via `Math`’s `long round(double
    a)` method, `main()` converts this long integer to an `int` via the `(int)` cast.
    The `int` value is added to `ROWS / 2` to offset the row coordinate so that it
    is relative to the array’s middle row. The column calculation is simpler, multiplying
    the degree value by the horizontal scale factor.


    Lastly, the `main()` method dumps the `screen` array to the console via a pair
    of nested `for` loops. The outer `for` loop inverts the array vertically so that
    it appears right side up – row number 0 should be output last.


    Compile Listing [12-2](#615966_1_En_12_Chapter.xhtml#PC5) as follows:


    ```

    javac Graph.java

    ```


    Run the resulting `Graph.class` application class file as follows:


    ```

    java Graph

    ```


    You should observe the output shown in Figure [12-1](#615966_1_En_12_Chapter.xhtml#Fig1).


    ![](images/615966_1_En_12_Chapter/615966_1_En_12_Fig1_HTML.jpg)


    A screenshot depicts the cosine and sine waves with 90 degrees.


    **Figure 12-1** The cosine and sine waves are 90 degrees out of phase with each
    other'
