    \ section introduces you to information hiding, object initialization, another\
    \ use for classes, class initialization, field-access rules, method-call rules,\
    \ constants, method-call chaining, recursion, and varargs.\n\n## Information Hiding\n\
    \nA class’s body is composed of interface and implementation. The *interface*\
    \ is that part of the class that is accessible to code located outside of the\
    \ class. The *implementation* is that part of the class that exists to support\
    \ the interface. Implementation should be hidden from external code so that it\
    \ can be changed to meet evolving requirements.\n\nDevelopers strive to develop\
    \ classes that provide unchangeable interfaces while hiding the implementation\
    \ so that it can evolve without impacting external code. The task of hiding the\
    \ implementation is known as *information hiding*, which is related to *encapsulation*,\
    \ combining fields, methods, and constructors into classes.\n\n> **Note**  \n\
    > Encapsulation lets us program at a higher level of abstraction (classes and\
    \ objects) rather than focusing separately on data structures and functionality.\n\
    \nConsider the `Vehicle` class. Constructor and method headers form this class’s\
    \ interface. The code within the constructors and methods and the various fields\
    \ are part of the implementation. There is no need to access these fields because\
    \ they can be read or written via the getter and setter methods.\n\nBecause no\
    \ precautions have been taken, directly accessing these fields is possible. Using\
    \ the previous `v` reference variable, you could specify `v.make`, `v.model`,\
    \ and `v.year`, and that would be okay with the compiler. You need to take advantage\
    \ of access levels to prevent access to these fields (or at least determine who\
    \ can access them).\n\nAn *access level* indicates who can access a field, method,\
    \ or constructor. Java supports four access levels: `private`, `public`, `protected`,\
    \ and package private (the default) – I discuss packages in Chapter [10](#615966_1_En_10_Chapter.xhtml).\
    \ Java provides three keywords that correspond to the first three access levels:\n\
    \n- `private`: Only code in the same class as the field, method, or constructor\
    \ can access the member.\n- `public`: Any code in any class in any package can\
    \ access the member.\n- `protected`: Any code in the same class or its subclasses\
    \ (discussed in Chapter [7](#615966_1_En_7_Chapter.xhtml)) can access the member.\n\
    \nIf there is no keyword, then package private access is implied. Package private\
    \ access is similar to `public` access in that code outside the class can access\
    \ the member. However, unlike `public` access, the code must be located in a class\
    \ that belongs to the same package as the class containing the member to be accessed\
    \ – see Chapter [10](#615966_1_En_10_Chapter.xhtml).\n\nYou can prevent external\
    \ code from accessing `Vehicle`’s `make`, `model`, and `year` fields so that any\
    \ attempt to access these fields from beyond `Vehicle` will result in a compiler\
    \ error message. Accomplish this task by prepending `private` to their declarations,\
    \ as demonstrated here:\n\n```\nclass Vehicle\n{\nprivate String make;\nprivate\
    \ String model;\nprivate int year;\n// ...\n}\n```\n\nTo give you a better example\
    \ of why you should get into the habit of hiding at least most of your class’s\
    \ implementation, consider the following abbreviated `Employee` class:\n\n```\n\
    class Employee\n{\nprivate String firstName;\nprivate String lastName;\nString\
    \ getFullName()\n{\nreturn firstName + \" \" + lastName;\n}\n}\n```\n\nThe `getFullName()`\
    \ method returns an employee’s full name. It hides the fact that there is no `fullName`\
    \ field. If `firstName` and `lastName` were exposed, they would be part of the\
    \ class’s interface. That interface would break when the developer decided to\
    \ replace `firstName` and `lastName` with a single `fullName` field.\n\n## Object\
    \ Initialization\n\nObjects are typically initialized via their constructors.\
    \ However, there are a couple of other ways to perform at least some of this initialization.\n\
    \n> **Note**  \n> When an object is constructed, the `new` operator zeroes the\
    \ object’s non-static fields.\n\n### Explicit Field Initialization via an Instance\
    \ Field Initializer\n\nAn *instance field initializer* (also known as an *object\
    \ field initializer* or a *non-static field initializer*) is an assignment operator\
    \ followed by an expression that is type compatible with an instance field’s type\
    \ and that assigns the expression’s value to the instance field. For example,\
    \ consider the following `Database` class:\n\n```\nclass Database\n{\nprivate\
    \ Driver driver = DEFAULT_DRIVER;\nDatabase(/* ... */)\n{\n// ...\ndriver = loadDriver();\n\
    if (driver == null)\nSystem.out.println(\"unable to load driver ... using default\
    \ instead\");\n}\nDriver loadDriver()\n{\n// ...\n}\n// ...\n}\n```\n\n`Database`\
    \ presents a `driver` field initialized to a default device driver via an instance\
    \ field initializer. The constructor attempts to load a nondefault more capable\
    \ driver. If the driver cannot be loaded, a message is output, and a `Database`\
    \ object will have to work with the default driver instead.\n\n### Instance Initialization\
    \ Block\n\nAn *instance initialization block* (also known as an *object initialization\
    \ block* or a *non-static initialization block*) is a block of statements introduced\
    \ into a class body instead of a method body. For example, consider the following\
    \ change to the `Vehicle` class:\n\n```\nclass Vehicle\n{\nprivate String make;\n\
    private String model;\nprivate int year;\n// The following instance initialization\
    \ block initializes the make, // model, and\nyear fields to the specified values.\n\
    {\nmake = \"Ford\";\nmodel = \"F150\";\nyear = 2023;\n}\n}\n```\n\nBecause you\
    \ can initialize an object in a constructor, the only good use for an instance\
    \ initialization block is in the context of an *anonymous class* (a class without\
    \ a name), which doesn’t have a constructor and which I discuss in Chapter [9](#615966_1_En_9_Chapter.xhtml).\n\
    \n> **Note**  \n> For each constructor, the compiler generates a special `<init>()`\
    \ method in the class file. (Because of the `<` and `>` characters, which are\
    \ illegal in an identifier, there is no way that such a method can exist in source\
    \ code, so there is no way a programmer could create a same-named method and cause\
    \ a conflict.)\n\nThe `<init>()` method contains the bytecode for all object initialization\
    \ that takes place. The compiler works its way from the top of the class to the\
    \ bottom, placing bytecode first for each encountered instance field initializer\
    \ and instance initialization block, and then the constructor’s initialization\
    \ code into this method. The JVM invokes `<init>()` at runtime when constructing\
    \ an object.\n\n## Utility Classes\n\nClasses are used mainly to create objects.\
    \ However, there is another use for them: utility classes. A *utility class* consists\
    \ of class fields and/or class methods."
  raw: '## Additional Topics


    There is more to learn about classes and objects. This section introduces you
    to information hiding, object initialization, another use for classes, class initialization,
    field-access rules, method-call rules, constants, method-call chaining, recursion,
    and varargs.


    ### Information Hiding


    A class’s body is composed of interface and implementation. The *interface* is
    that part of the class that is accessible to code located outside of the class.
    The *implementation* is that part of the class that exists to support the interface.
    Implementation should be hidden from external code so that it can be changed to
    meet evolving requirements.


    Developers strive to develop classes that provide unchangeable interfaces while
    hiding the implementation so that it can evolve without impacting external code.
    The task of hiding the implementation is known as *information hiding*, which
    is related to *encapsulation*, combining fields, methods, and constructors into
    classes.


    Note


    Encapsulation lets us program at a higher level of abstraction (classes and objects)
    rather than focusing separately on data structures and functionality.


    Consider the `Vehicle` class. Constructor and method headers form this class’s
    interface. The code within the constructors and methods and the various fields
    are part of the implementation. There is no need to access these fields because
    they can be read or written via the getter and setter methods.


    Because no precautions have been taken, directly accessing these fields is possible.
    Using the previous `v` reference variable, you could specify `v.make`, `v.model`,
    and `v.year`, and that would be okay with the compiler. You need to take advantage
    of access levels to prevent access to these fields (or at least determine who
    can access them).


    An *access level* indicates who can access a field, method, or constructor. Java
    supports four access levels: private, public, protected, and package private (the
    default) – I discuss packages in Chapter [10](#615966_1_En_10_Chapter.xhtml).
    Java provides three keywords that correspond to the first three access levels:


    *   `private`: Only code in the same class as the field, method, or constructor
    can access the member.


    *   `public`: Any code in any class in any package can access the member.


    *   `protected`: Any code in the same class or its subclasses (discussed in Chapter
    [7](#615966_1_En_7_Chapter.xhtml)) can access the member.


    If there is no keyword, then package private access is implied. Package private
    access is similar to public access in that code outside the class can access the
    member. However, unlike public access, the code must be located in a class that
    belongs to the same package as the class containing the member to be accessed
    – see Chapter [10](#615966_1_En_10_Chapter.xhtml).


    You can prevent external code from accessing `Vehicle`’s `make`, `model`, and
    `year` fields so that any attempt to access these fields from beyond `Vehicle`
    will result in a compiler error message. Accomplish this task by prepending `private`
    to their declarations, as demonstrated here:


    ```

    class Vehicle

    {

    private String make;

    private String model;

    private int year;

    // ...

    }

    ```


    To give you a better example of why you should get into the habit of hiding at
    least most of your class’s implementation, consider the following abbreviated
    `Employee` class:


    ```

    class Employee

    {

    private String firstName;

    private String lastName;

    String getFullName()

    {

    return firstName + " " + lastName;

    }

    }

    ```


    The `getFullName()` method returns an employee’s full name. It hides the fact
    that there is no `fullName` field. If `firstName` and `lastName` were exposed,
    they would be part of the class’s interface. That interface would break when the
    developer decided to replace `firstName` and `lastName` with a single `fullName`
    field.


    ### Object Initialization


    Objects are typically initialized via their constructors. However, there are a
    couple of other ways to perform at least some of this initialization.


    Note


    When an object is constructed, the `new` operator zeroes the object’s non-static
    fields.


    #### Explicit Field Initialization via an Instance Field Initializer


    An *instance field initializer* (also known as an *object field initializer* or
    a *non-static field initializer*) is an assignment operator followed by an expression
    that is type compatible with an instance field’s type and that assigns the expression’s
    value to the instance field. For example, consider the following `Database` class:


    ```

    class Database

    {

    private Driver driver = DEFAULT_DRIVER;

    Database(/* ... */)

    {

    // ...

    driver = loadDriver();

    if (driver == null)

    System.out.println("unable to load driver ... using default instead");

    }

    Driver loadDriver()

    {

    // ...

    }

    // ...

    }

    ```


    `Database` presents a `driver` field initialized to a default device driver via
    an instance field initializer. The constructor attempts to load a nondefault more
    capable driver. If the driver cannot be loaded, a message is output, and a `Database`
    object will have to work with the default driver instead.


    #### Instance Initialization Block


    An *instance initialization block* (also known as an *object initialization block*
    or a *non-static initialization block*) is a block of statements introduced into
    a class body instead of a method body. For example, consider the following change
    to the `Vehicle` class:


    ```

    class Vehicle

    {

    private String make;

    private String model;

    private int year;

    // The following instance initialization block initializes the make, // model,
    and

    year fields to the specified values.

    {

    make = "Ford";

    model = "F150";

    year = 2023;

    }

    }

    ```


    Because you can initialize an object in a constructor, the only good use for an
    instance initialization block is in the context of an *anonymous class* (a class
    without a name), which doesn’t have a constructor and which I discuss in Chapter
    [9](#615966_1_En_9_Chapter.xhtml).


    Note


    For each constructor, the compiler generates a special `<init>()` method in the
    class file. (Because of the `<` and `>` characters, which are illegal in an identifier,
    there is no way that such a method can exist in source code, so there is no way
    a programmer could create a same-named method and cause a conflict.)


    The `<init>()` method contains the bytecode for all object initialization that
    takes place. The compiler works its way from the top of the class to the bottom,
    placing bytecode first for each encountered instance field initializer and instance
    initialization block, and then the constructor’s initialization code into this
    method. The JVM invokes `<init>()` at runtime when constructing an object.


    ### Utility Classes


    Classes are used mainly to create objects. However, there is another use for them:
    utility classes. A *utility class* consists of class fields and/or class methods.'
