- fmt: '### Concatenating Strings


    A third example of syntactic sugar is string concatenation via the `+` and `+=`
    operators. In Chapter [3](#615966_1_En_3_Chapter.xhtml), I mentioned that `+`
    could be used to concatenate strings. However, I didn’t mention that `+=` could
    be used as well. I present an example of string concatenation via the `+` and
    `+=` syntactic sugar:


    ```

    String hello = "hello, ";

    String world = "world";

    String result = hello + world;

    result += "!"; // equivalent to result = result + "!";

    ```


    This example ends with `result` containing a reference to a `String` object containing
    `hello, world!`.


    ### Exploring String Methods


    `String` provides methods for performing operations on `String` objects. The following
    list samples these methods:


    *   `char charAt(int index)`: Return the character at the specified `index`. The
    first character is located at index 0. If `index` is less than 0 or greater than
    or equal to the string’s length, throw `java.lang.IndexOutOfBoundsException`.

    *   `int indexOf(String s)`: Return the position of the first occurrence of substring
    `s` in this string. Return -1 when not found.

    *   `int lastIndexOf(String s)`: Return the position of the last occurrence of
    substring `s` in this string. Return -1 when not found.

    *   `int length()`: Return the length of this string.

    *   `boolean endsWith(String suffix)`: Return true when this string ends with
    `suffix`; otherwise, return false.

    *   `String replace(char oldChar, char newChar)`: Return a new `String` object
    where all occurrences of `oldChar` have been replaced with `newChar`.

    *   `String replaceAll(String regex, String replacement)`: Return a new `String`
    object where each substring of this string that matches the regular expression
    identified by `regex` has been replaced with the `replacement` string. (Also known
    as a *regex* or *regexp*, a *regular expression* is a string-based pattern that
    represents the set of strings that match this pattern. I don’t discuss regular
    expressions in this book because I don’t consider them to be a fundamental feature.)

    *   `String replaceFirst(String regex, String replacement)`: Return a new `String`
    object where the first substring of this string that matches the regular expression
    identified by `regex` has been replaced with the `replacement` string.

    *   `boolean startsWith(String prefix)`: Return `true` when this string starts
    with `prefix`.

    *   `String toLowerCase()`: Return a new `String` object where all uppercase characters
    have been converted to lowercase.

    *   `String toUpperCase()`: Return a new `String` object where all lowercase characters
    have been converted to uppercase.


    Listing [13-1](#615966_1_En_13_Chapter.xhtml#PC4) presents the source code to
    an `SD` (`String Demo`) application that demonstrates these methods.


    ```

    public class SD

    {

    public static void main(String[] args)

    {

    String s = "The quick brown fox jumped over the lazy dog.";

    for (int i = 0; i < s.length(); i++)

    System.out.print(s.charAt(i));

    System.out.println();

    System.out.println("Ends with ''dog.'': " + s.endsWith("dog."));

    System.out.println("Ends with ''dog'': " + s.endsWith("dog"));

    System.out.println("Starts with ''The'': " + s.startsWith("The"));

    System.out.println("Starts with ''They'': " + s.startsWith("They"));

    System.out.println("Index of ''he'': " + s.indexOf("he"));

    System.out.println("Index of ''fix'': " + s.indexOf("fix"));

    System.out.println("Last index of ''he'': " + s.lastIndexOf("he"));

    System.out.println("Last index of ''fix'': " + s.lastIndexOf("fix"));

    System.out.println("Replace spaces with dashes: " + s.replace('' '', ''-''));

    String rep = "a";

    System.out.println("Replace all occurrences of ''the'' (regardless of " +

    "case) with " +

    "''" + rep + "''" +

    " (first ''" + rep + "''" +

    " is capitalized): " +

    s.replaceAll("(?i)the", rep)

    .replaceFirst("^[a-z]", rep.toUpperCase()));

    System.out.println("Lowercase: " + s.toLowerCase());

    System.out.println("Uppercase: " + s.toUpperCase());

    }

    }

    Listing 13-1

    SD.java

    ```


    Compile Listing [13-1](#615966_1_En_13_Chapter.xhtml#PC4) as follows:


    ```

    javac SD.java

    ```


    Run the resulting `SD.class` application class file as follows:


    ```

    java SD

    ```


    You should observe the following output:


    ```

    The quick brown fox jumped over the lazy dog.

    Ends with ''dog.'': true

    Ends with ''dog'': false

    Starts with ''The'': true

    Starts with ''They'': false

    Index of ''he'': 1

    Index of ''fix'': -1

    Last index of ''he'': 33

    Last index of ''fix'': -1

    Replace spaces with dashes: The-quick-brown-fox-jumped-over-the-lazy-dog.

    Replace all occurrences of ''the'' (regardless of case) with ''a'' (first ''a''
    is capitalized): A quick brown fox jumped over a lazy dog.

    Lowercase: the quick brown fox jumped over the lazy dog.

    Uppercase: THE QUICK BROWN FOX JUMPED OVER THE LAZY DOG.

    ```


    The `s.replaceAll("(?i)the", rep).replaceFirst("^[a-z]", rep.toUpperCase())` expression
    deserves some explanation. For convenience, let’s reduce the expression to *a*`.`*b*`.`*c*,
    where *a* represents `s`, *b* represents `replaceAll("(?i)the", rep)`, and *c*
    represents `replaceFirst("^[a-z]", rep.toUpperCase())`.


    The member selection operator (`.`) has left-to-right associativity (see Chapter
    [3](#615966_1_En_3_Chapter.xhtml) for an introduction to associativity), which
    means that the expression evaluates as `(`*a*`.`*b*`).`*c*. Therefore, the compiler
    generates bytecode that first evaluates `s.replaceAll("(?i)the", rep)`, which
    invokes the `replaceAll()` method on the `String` object reference stored in `s`.


    The first argument passed to `replaceAll()` is `"(?i)the"`. The `(?i)` portion
    of this string enables case-insensitive matching. Following the `(?i)` noncapturing
    group (see [`docs.oracle.com/javase/tutorial/essential/regex/groups.xhtml`](https://docs.oracle.com/javase/tutorial/essential/regex/groups.xhtml))
    is literal text sequence `the`. This sequence is searched for regardless of case
    (e.g., `the`, `The`, `tHe`, and so on would all match). The `replaceAll()` method
    returns a new `String` object with each case-insensitive occurrence of `the` replaced
    by the string represented by `rep`.


    The bytecode next evaluates `replaceFirst("^[a-z]", rep.toUpperCase())` on the
    returned `String` object. The `"^[a-z]"` argument passed to `replaceFirst()` identifies
    the lowercase letter at the beginning of the string, and the `rep.toUpperCase()`
    argument converts the replacement character in `rep` to uppercase. The `replaceFirst()`
    method uses these arguments to replace the first letter in “`a quick brown fox`…”
