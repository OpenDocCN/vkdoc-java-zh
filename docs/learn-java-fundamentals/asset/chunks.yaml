- fmt: '## Compound Expressions


    A *compound expression* is a sequence of simple expressions connected to each
    other via *operators*, which are symbolically represented sequences of instructions
    that transform their operands into new values. For example, `-1` is a compound
    expression where `-` is an operator and `int` literal `1` is its operand. This
    expression transforms `1` into its negative equivalent: `-1`. Also, `4 * y` is
    a compound expression where `*` is an operator and `4` and `y` are its operands.
    When this expression is evaluated, `y`’s value is fetched and multiplied by `4`.
    The expression’s value becomes the result of the multiplication.


    **Note**


    If `x`’s type is `byte` or `short`, the variable’s value is widened to an `int`.
    However, if the type is `long`, `double`, or `float`, `4` is widened to the appropriate
    type. The addition is performed after the widening is carried out.


    Java classifies its operators via the number of operands that they take:


    - A *unary operator* takes a single operand. In the previous `-1` example, the
    `-` (unary minus) operator takes a single operand.

    - A *binary operator* takes two operands. The `*` (multiplication) operator in
    `4 * y` is an example of a binary operator.

    - Java supports a single *ternary operator* that takes three operands. This operator
    is represented by two symbols (`? :`) and is known as the *conditional operator*.
    I’ll discuss this operator later.


    Java also classifies its operators as prefix, postfix, and infix:


    - A *prefix operator* is a unary operator that precedes its single operand (as
    in `-1`).

    - A *postfix operator* is a unary operator that follows its single operand (as
    in `x++` – increment the value in `x`).

    - An *infix operator* is a binary operator that appears between the binary operator’s
    two operands (as in `4 * y`) or the ternary operator’s three operands.


    When evaluating an expression, the compiler considers each operator’s precedence
    and associativity:


    - *Precedence* determines how an expression is evaluated when it contains two
    or more operators with different precedences. Operators with higher precedence
    are evaluated first. For example, in the expression `4 + 2 * 3`, subexpression
    `2 * 3` is evaluated first because multiplication takes precedence over addition.

    - *Associativity* determines how an expression is evaluated when it contains two
    or more operators with the same precedence. For example, `4 + 2 + 3` would first
    evaluate `4 + 2` because `+` has left-to-right associativity. If `+` had right-to-left
    associativity, `2 + 3` would first be evaluated, and the result would be added
    to `4`.


    Table 3-1 presents all of Java’s operators in terms of their symbols, descriptions,
    precedences, and associativity.


    **Table 3-1** Java’s Operators Grouped by Precedence


    | Operator | Type | Precedence | Associativity |

    | --- | --- | --- | --- |

    | `()``[]``.` | ParenthesesArray indexMember selection | 15 | Left to right |

    | `++``--` | Unary post-incrementUnary post-decrement | 14 | Right to left |

    | `++``--``+``-``!``~``(`*type*`)` | Unary pre-incrementUnary pre-decrementUnary
    plusUnary minusUnary logical negationUnary bitwise complementUnary type cast |
    13 | Right to left |

    | `*``/``%` | MultiplicationDivisionModulus | 12 | Left to right |

    | `+``+``-` | AdditionString concatenationSubtraction | 11 | Left to right |

    | `<<``>>``>>>` | Bitwise left shiftBitwise right shift with sign extensionBitwise
    right shift with zero extension | 10 | Left to right |

    | `<``<=``>``>=``instanceof` | Relational less thanRelational less than or equal
    toRelational greater thanRelational greater than or equal toRelational type comparison
    for objects | 9 | Left to right |

    | `==``!=` | Is equal toIs not equal to | 8 | Left to right |

    | `&` | Bitwise AND | 7 | Left to right |

    | `^` | Bitwise exclusive OR | 6 | Left to right |

    | `&#124;` | Bitwise inclusive OR | 5 | Left to right |

    | `&&` | Logical AND | 4 | Left to right |

    | `&#124;&#124;` | Logical OR | 3 | Left to right |

    | `?:` | Conditional | 2 | Right to left |

    | `=``+=``-=``*=``/=``%=``&=``^=``&#124;=``<<=``>>=``>>>=` | AssignmentAddition
    assignmentSubtraction assignmentMultiplication assignmentDivision assignmentModulus
    assignmentBitwise AND assignmentBitwise exclusive OR assignmentBitwise inclusive
    OR assignmentBitwise left shift assignmentBitwise signed right shift with sign
    extension assignmentBitwise unsigned right shift with zero extension assignment
    | 1111111111111 | Right to leftRight to leftRight to leftRight to leftRight to
    leftRight to leftRight to leftRight to leftRight to leftRight to leftRight to
    leftRight to leftRight to left |


    Each row identifies one or more operators. These operators share the same precedence.
    The Precedence column reveals a number ranging from 1 through 15 that specifies
    the precedence of all operators in the intersecting table row. The higher this
    number, the higher the precedence. For example, multiplication’s precedence (12)
    is greater than addition’s precedence (11) because multiplication is performed
    before addition.


    ### Operator Examples


    Some of Table 3-1’s operators are probably familiar; others might be a mystery.
    The next several sections briefly describe all operators in bottom-up precedence
    order.


    #### Assignment Operators


    Java supports the simple assignment (`=`) and compound assignment (`+=`, `-=`,
    `*=`, `/=`, `%=`, `&=`, `^=`, `|=`, `<<=`, `>>=`, and `>>>=`) operators.


    ##### Simple Assignment


    The `=` *operator* assigns an expression’s value to a variable. This operator
    has the following syntax:


    ```

    variable ''='' expression '';''

    ```


    **Note**


    You must specify whatever appears between the single quotes (and not also the
    single quotes). Also, an italicized item is a placeholder for something else that
    you must enter. This also applies to `(`*type*`)` in Table 3-1. (In this table,
    I didn’t use single quotes to surround literal text that you enter verbatim because
    I didn’t want to be confusing.)


    The types of *variable* and *expression* must agree to avoid a compiler error.
    For example, you cannot directly assign a `double` to an `int`.


    Consider the following example, which initializes `self_employed` to `true`:


    ```

    boolean self_employed = true;

    ```


    ##### Compound Assignment


    The `+=`, `-=`, `*=`, `/=`, `%=`, `&=`, `^=`, `|=`, `<<=`, `>>=`, and `>>>=` *operators*
    perform their operations and then assign the results to variables. Their syntaxes
    are shown as follows:


    ```

    variable ''+='' expression '';''

    variable ''-='' expression '';''

    variable ''*='' expression '';''

    variable ''/='' expression '';''

    variable ''%='' expression '';''

    variable ''&='' expression '';''

    variable ''^='' expression '';''

    variable ''|='' expression '';''

    variable ''>='' expression '';''

    variable ''>>>='' expression '';''

    ```


    Once again, the types of variables and expressions must agree to avoid compiler
    errors.


    Check out these examples:


    ```

    int x += 1; // Increment x.

    int x -= 1; // Decrement x.

    int x *= 2; // Multiply x by 2.

    int x /= 2; // Divide x by 2.

    int x %= 2; // Assign the remainder of x / 2 to x.

    int x &= 0xFFFFFF00; // Turn off the rightmost eight bits in x.

    int x ^= 0xFFFFFFFF; // Turn off all set bits in x.

    int x |= 0xFF000000; // Turn on the leftmost eight bits in x.

    int x >= 1; // Divide x by 2. If x is negative, the result is negative.

    int x >>>= 1; // Divide x by 2. If x is negative, the result is positive.

    ```


    The `<<=` and `>>=` operators perform more quickly than their `*` and `/` counterparts
    when it comes to multiplying and dividing by powers of 2. Also, they are more
    intuitive when working with binary numbers.'
