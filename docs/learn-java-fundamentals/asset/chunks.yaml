- fmt: '### Recursion


    A method normally executes statements that may include calls to other methods.
    However, it’s often useful to have a method call itself. This programming technique
    is known as *recursion*.


    For example, suppose you need to write a method that returns a *factorial*, which
    is the product of all the positive integers up to and including a specific integer.
    Knowing that `!` is the mathematical symbol for factorial, you can guess that
    `4!` equals `4x3x2x1`, or `24`. Also, `1!` is `1` and `0!` is `1`. A first approach
    to writing this method could consist of the code presented earlier in this chapter.


    The previously presented `factorial()` code accomplishes its task via iteration.
    However, this method could be written more compactly by adopting a recursive style:


    ```

    long factorial(int n)

    {

    if (n < 0)

    return -1;

    if (n == 0 || n == 1)

    return 1; // base problem

    else

    return n * factorial(n - 1);

    }

    ```


    The recursive approach expresses a problem in simpler terms of itself. According
    to this example, the simplest problem, which is also known as the *base problem*,
    is `0!` (`1`) or `1!` (`1`).


    When an argument greater than `1` is passed to `factorial()`, this method divides
    the problem into a simpler problem by calling itself with the next smaller argument
    value. Eventually, the base problem will be reached. For example, calling `factorial(4)`
    results in the following stack of expressions:


    ```

    4 * factorial(3)

    3 * factorial(2)

    2 * factorial(1)

    ```


    This last expression is at the top of the stack. When `factorial(1)` returns `1`,
    these expressions are evaluated as the stack begins to unwind, in the following
    order:


    - `2 * factorial(1)` now becomes `2*1` (`2`)

    - `3 * factorial(2)` now becomes `3*2` (`6`)

    - `4 * factorial(3)` now becomes `4*6` (`24`)


    Recursion provides an elegant way to express many problems. Additional examples
    include searching tree-based data structures for specific values and, in a hierarchical
    file system, finding and outputting the names of all files that contain specific
    text.


    **Caution**: Recursion consumes stack space, so make sure that your recursion
    eventually ends in a base problem; otherwise, you will run out of stack space
    and your application will be forced to terminate.


    ### Varargs


    JDK 5 introduced a feature that simplifies the syntax for passing a variable number
    of arguments to methods and constructors. This feature is known as *varargs*.


    Specify three consecutive periods after the type name of the rightmost parameter
    when declaring a method or constructor that takes a variable number of arguments.
    Consider the following instance method example, which returns the minimum integer
    in a list of integers:


    ```

    int min(int... values)

    ```


    This method header declares a `min()` method that declares a variable number of
    arguments. You might call this method as follows:


    ```

    min(-8, 55, 0, -12, 14);

    ```


    Before JDK 5, you would have to declare the method with an array type:


    ```

    int min(int[] values)

    ```


    This method would be called in the following manner:


    ```

    min(new int[] {-8, 55, 0, -12, 14});

    ```


    The varargs feature is an example of *syntactic sugar* (syntax that makes code
    sweeter to write). During compilation, the compiler converts from the older and
    more cumbersome `int[] {}` syntax to the more modern `...` version of this feature.


    Listing [6-7](#615966_1_En_6_Chapter.xhtml#PC56) presents the source code to a
    `VarargsDemo` application class that demonstrates varargs in the context of two
    versions of the `min()` method.


    ```

    class VarargsDemo

    {

    public static void main(String[] args)

    {

    System.out.println(min(-8, 55, 0, -12, 14));

    System.out.println(min(new int[] {-8, 55, 0, -12, 14}));

    System.out.println(min2(new int[] {-8, 55, 0, -12, 14}));

    //      System.out.println(min2(-8, 55, 0, -12, 14));

    }

    static int min(int... values)

    {

    int smallest = 0;

    for (int i = 0; i < values.length; i++)

    if (values[i] < smallest)

    smallest = values[i];

    return smallest;

    }

    static int min2(int[] values)

    {

    int smallest = 0;

    for (int i = 0; i < values.length; i++)

    if (values[i] < smallest)

    smallest = values[i];

    return smallest;

    }

    }

    Listing 6-7

    VarargsDemo.java

    ```


    `VarargsDemo` declares `main()`, `min()`, and `min2()` methods. The `main()` method
    runs the application. The `min()` and `min2()` methods use the newer varargs and
    older array features, respectively, to receive a variable number of arguments.


    Although these methods have different headers, they have identical bodies, which
    proves that varargs is implemented in terms of one-dimensional arrays.


    Each method’s body consists of code to locate and return the smallest integer
    from the `values` array. The array’s length is specified by `values.length`.


    Perhaps you are wondering why I didn’t try to overload `min()` by specifying `min(int[]
    values)` instead of `min(int... values)`. If I tried to do this, the compiler
    would report an error about not being able to declare `min(int... values)` and
    `min(int[] values)`. Behind the scenes, `min(int... values)` is transformed into
    `min(int[] values)`.


    Compile Listing [6-7](#615966_1_En_6_Chapter.xhtml#PC56) as follows:


    ```

    javac VarargsDemo.java

    ```


    Run the resulting `VarargsDemo.class` class file as follows:


    ```

    java VarargsDemo

    ```


    You should observe the following output:


    ```


    ```


    ## What’s Next?


    `Vehicle` is too generalized to represent a specific kind of vehicle such as a
    truck or a car. It could also represent a skateboard or a bicycle. To accommodate
    more specific kinds of vehicles, we need to specialize through class extension,
    which is the subject of Chapter [7](#615966_1_En_7_Chapter.xhtml).


    # 7. Reusing Classes via Inheritance and Composition


    Chapter [6](#615966_1_En_6_Chapter.xhtml) introduced you to classes, which *encapsulate*
    (combine) fields (that store state), methods (that implement behaviors), and constructors
    (that instantiate objects). This arrangement is known as *object-based programming*.


    Java provides an inheritance mechanism for deriving a class from another class.
    The idea is to reuse this other class in a more specialized manner. This arrangement
    is known as *object-oriented programming*.


    Java also provides a composition mechanism for defining a class as the sum of
    its parts. In other words, the class’s fields are implemented by other classes.
    Composition offers another way to reuse other classes.


    This chapter first introduces you to inheritance. It then introduces you to composition.


    ### Inheritance


    *Inheritance* is a programming technique for class reuse in which you derive a
    class from another class. It lets you create more specialized classes from more
    generalized classes.


    Consider Chapter [6](#615966_1_En_6_Chapter.xhtml)’s `Vehicle` class. `Vehicle`
    generalizes what it means to be a vehicle. A vehicle has a make, a model, and
    a year. Also, a vehicle can be driven.


    Suppose you want to model a truck. You could derive a `Truck` class from `Vehicle`
    that would inherit `Vehicle`’s `make`, `model`, and `year` fields along with the
    capability to be driven via `Vehicle`’s `drive()` method. You could then add whatever
    fields and methods are required to differentiate `Truck` from `Vehicle`.


    You could model a bicycle, a motorcycle, a boat, or a skateboard in a similar
    way.


    In each of these examples, inheritance is used to form an *is-a relationship*
    between a pair of classes. A `Truck` is a `Vehicle`. The same is true for `Bicycle`,
    `Motorcycle`, `Boat`, and `SkateBoard`.


    This section first shows you how to form an is-a relationship by using Java’s
    class extension feature. It then discusses method overriding and tours the ultimate
    ancestor of all classes.'
