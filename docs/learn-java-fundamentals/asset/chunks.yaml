    maximum number of tries (`MAXTRIES`). I’ll introduce these constants later in
    this tour.


    `GCDemo` next declares a `LargeObject` inner class. It is useful to make `LargeObject`
    an inner class because of its close relationship to `GCDemo`.


    `LargeObject` declares a `memory` field and initializes it to a byte array whose
    size is `MAXMB` megabytes. It’s useful to use a constant here in case I want to
    change the size later and don’t want to waste time trying to track the place in
    the source code where `50` appears.


    `LargeObject` also overrides the `finalize()` method that it inherits from `Object`.
    This method is invoked before the memory belonging to an object instantiated from
    `LargeObject` is reclaimed.


    The `finalize()` method invokes `System.out.println()` with a message to alert
    the user that the object is just about dead.


    At this point, `GCDemo` instantiates `LargeObject` and assigns its reference to
    local variable `lo`. It then outputs a message and makes `MAXTRIES` attempts to
    call the garbage collector via `System.gc();`. You won’t see a message about the
    large object being finalized.


    Another message is output about `null` being assigned to `lo`, and then this assignment
    takes place.


    Finally, `GCDemo` outputs its final message (apart from the message output by
    `LargeObject`’s `finalize()` method) and then makes `MAXTRIES` attempts to call
    the garbage collector. This time, you should see a message about the large object
    being finalized (you might have to increase the value assigned to `MAXTRIES`).


    Compile `GCDemo.java` as follows:


    ```

    javac GCDemo.java

    ```


    Ignore the following compiler warning:


    ```

    GCDemo.java:15: warning: [removal] finalize() in Object has been deprecated and
    marked for removal

    public void finalize()

    ^

    1 warning

    ```


    Run the resulting application as follows:


    ```

    java GCDemo

    ```


    You should observe the following output:


    ```

    Performing garbage collection before assigning null to lo.

    Assigning null to lo.

    Performing garbage collection after assigning null to lo.

    Large object has been finalized.

    ```


    Don’t be surprised if you have to wait a while after the first “`Performing`”
    message is output and after the “`Large object has been finalized.`” message.
    (It may take time before the garbage collector runs.)


    ## Line Separator


    The `String lineSeparator()` method returns the system-dependent line separator
    string. It always returns the same value, which is the initial value of the system
    property `line.separator`. (I explore system properties later in this chapter.)


    On Linux/Unix operating systems, this method returns `\n`. On Microsoft Windows
    operating systems, it returns `\r\n`.


    Tip


    Use the string returned from `lineSeparator()` instead of hard-coding `\r` and/or
    `\n` in your source code to keep your application portable between Linux/Unix
    and Windows.


    Listing [14-4](#615966_1_En_14_Chapter.xhtml#PC17) presents the source code to
    an application that obtains the line separator and prints it in decimal notation.


    ```

    public class ShowLineSeparator

    {

    public static void main(String[] args)

    {

    String lineSeparator = System.lineSeparator();

    System.out.print("Line separator: ");

    for (int i = 0; i < lineSeparator.length(); i++)

    System.out.print((int) lineSeparator.charAt(i) + " ");

    System.out.println();

    }

    }

    Listing 14-4

    ShowLineSeparator.java

    ```


    `ShowLineSeparator`’s `main()` method first invokes `System.lineSeparator()` to
    obtain the line separator string. It stores this string’s reference in the `lineSeparator`
    local variable.


    Next, `main()` outputs a label for the line separator string and then enters a
    `for` loop. This loop iterates over the length of the string, outputting a decimal
    integer for each string character.


    The evaluation order for expression `(int) lineSeparator.charAt(i) + " "` is `((int)
    lineSeparator.charAt(i)) + " "`. In other words, `lineSeparator.charAt(i)` is
    called to return a character, which is then cast to an integer. The integer is
    converted to a string via the string concatenation operator (`+`), and a space
    character is appended to this string.


    Compile Listing [14-4](#615966_1_En_14_Chapter.xhtml#PC17) as follows:


    ```

    javac ShowLineSeparator.java

    ```


    Run the resulting application as follows:


    ```

    java ShowLineSeparator

    ```


    I observe the following output on my Windows platform:


    ```

    Line separator: 13 10

    ```'
