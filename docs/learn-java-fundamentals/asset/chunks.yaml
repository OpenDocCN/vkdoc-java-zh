    ### 一个更实用的内部类示例


    `NSCDemo` 为你提供了一个学习如何使用内部类的机会。为了更实际地学习如何使用内部类，我们创建一个框架来维护待办事项列表。


    每个待办事项包含一个名称和一个描述。代码清单 9-8 展示了一个描述待办事项的 `ToDo` 类。


    ```

    class ToDo

    {

    private String name;

    private String desc;

    ToDo(String name, String desc)

    {

    this.name = name;

    this.desc = desc;

    }

    String getName()

    {

    return name;

    }

    String getDesc()

    {

    return desc;

    }

    @Override

    public String toString()

    {

    return "Name = " + getName() + ", Desc = " + getDesc();

    }

    }

    代码清单 9-8

    ToDo.java

    ```


    接下来，我们将创建一个 `ToDoList` 类来存储 `ToDo` 实例。`ToDoList` 使用其非静态成员类 `ToDoArray` 将 `ToDo`
    实例存储在一个可增长的数组中。（之所以可增长，是因为你不知道会存储多少个实例，而 Java 数组的长度是固定的）。参见代码清单 9-9。


    ```

    class ToDoList

    {

    private ToDoArray toDoArray;

    private int index = 0;

    ToDoList()

    {

    toDoArray = new ToDoArray(2);

    }

    boolean hasMoreElements()

    {

    return index < toDoArray.length;

    }

    ToDo nextElement()

    {

    return toDoArray[index++];

    }

    void add(ToDo item)

    {

    if (index >= toDoArray.length)

    {

    ToDo[] temp = new ToDo[toDoArray.length * 2];

    for (int i = 0; i < toDoArray.length; i++)

    temp[i] = toDoArray[i];

    toDoArray = temp;

    }

    toDoArray[index++] = item;

    }

    ToDo get(int i)

    {

    return toDoArray[i];

    }

    int size()

    {

    return index;

    }

    }

    }

    代码清单 9-9

    ToDoList.java

    ```


    除了提供 `add()` 方法将 `ToDo` 实例存储到 `ToDoArray` 实例中，`ToDoList` 还提供了 `hasMoreElements()`
    和 `nextElement()` 方法来遍历并返回已存储的实例。代码清单 9-10 演示了这些方法。


    ```

    class UseToDoList

    {

    public static void main(String[] args)

    {

    ToDoList toDoList = new ToDoList();

    toDoList.add(new ToDo("#1", "洗衣服。"));

    toDoList.add(new ToDo("#2", "买杂货。"));

    toDoList.add(new ToDo("#3", "用吸尘器打扫公寓。"));

    toDoList.add(new ToDo("#4", "写报告。"));

    toDoList.add(new ToDo("#5", "洗车。"));

    while (toDoList.hasMoreElements())

    System.out.println(toDoList.nextElement());

    }

    }

    代码清单 9-10

    ToDoList.java

    ```


    假设代码清单 9-8 到 9-10 描述的文件都存储在当目录中，按如下方式编译这些文件：


    ```

    javac UseToDoList.java

    ```


    按如下方式运行生成的 `UseToDoList.class` 应用程序类文件：


    ```

    java UseToDoList

    ```


    你应该会看到以下输出：


    ```

    Name = #1, Desc = 洗衣服。

    Name = #2, Desc = 买杂货。

    Name = #3, Desc = 用吸尘器打扫公寓。

    Name = #4, Desc = 写报告。

    Name = #5, Desc = 洗车。

    ```


    ## 局部类


    在代码块（例如方法体）或*子块*（块中的块）中声明一个类通常很有帮助。这样的类被称为*局部类*，因为（就像局部变量一样）它对于声明它的块/子块来说是局部的。


    注意


    局部类有助于提高代码清晰度。这是因为它们被移到了更接近需要它们的地方。


    例如，你可以在一个方法中声明一个描述*迭代器*（用于遍历容器对象的对象）的类，并返回该类的实例。这样的类被称为*局部类*，因为（就像局部变量一样）它们对于声明它们的方法来说是局部的。以下是一个示例：


    ```

    interface I

    {

    // 成员

    }

    class C

    {

    I m() // 或者甚至 static I m()

    {

    class D implements I

    {

    // 成员

    }

    return new D();

    }

    }

    ```


    顶层类 `C` 声明了非静态方法 `m()`，该方法返回局部类 `D` 的实例，而 `D` 是在此方法中声明的。注意，`m()` 的返回类型是接口 `I`，`D`
    实现了该接口。这个接口是必需的，因为如果给 `m()` 返回类型 `D` 会导致编译器错误——`D` 在 `m()` 的方法体外部是不可访问的。


    警告


    当局部类声明包含任何访问修饰符关键字 `private`、`public` 或 `protected`，或修饰符关键字 `static` 时，编译器会报告错误。


    局部类可以与其封闭类的实例关联，但仅当在非静态上下文中使用时才可以。尽管局部类可以在静态上下文（例如静态方法）中声明，但它不能声明任何静态成员，这使得局部类类似于内部类，内部类也不能声明静态成员。


    注意


    你不能在局部块中声明接口，因为接口被认为是静态的，而局部类不能声明静态成员。


    局部类可以在任何可以声明局部变量的地方声明，并且具有与局部变量相同的作用域（本质上是一个块）。它可以访问周围作用域的局部变量和参数（参数是一种局部变量）。


    在 JDK 8 之前，这些变量必须声明为 `final`。然而，这不再是必需的，因为 JDK 8 引入了*有效 final* 的概念（编译器会将一个从未改变的变量视为
    `final`，无论是否有关键字 `final`）。


    注意


    在局部类中声明的变量可以*遮蔽*（掩盖或隐藏）封闭块中同名的变量。


    当局部类访问封闭块的局部变量或参数时，它会*捕获*该局部变量/参数。捕获局部变量或参数意味着制作该局部变量/参数的一个副本，因为从局部类创建的对象可能比声明该局部变量/参数的当前上下文存活得更久。此外，该局部变量/参数必须声明为
    `final` 或（从 JDK 8 开始）是有效 final 的，以防止对局部变量/参数的修改是否可见产生混淆（因为这些修改是不可见的）。


    考虑代码清单 9-11，它使用了 `final` 关键字。（本书的代码存档中包含第二个版本的 `EnclosingClass`，它没有使用 `final`。在编译该版本的
    `EnclosingClass` 时，JDK 8 之前的编译器会报告错误。）


    ```

    class EnclosingClass

    {

    void m(final int i)

    {

    final int j = i * 10;

    class LClass

    {

    int m = i;

    int n = j;

    }

    LClass lc = new LClass();

    System.out.println(lc.m);

    System.out.println(lc.n);

    }

    }

    代码清单 9-11

    EnclosingClass.java

    ```


    代码清单 9-11 声明了 `EnclosingClass`，其非静态方法 `m()` 声明了一个名为 `LClass` 的局部类。

    '
