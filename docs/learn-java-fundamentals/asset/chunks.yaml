    ### 随机数生成


    `Math` 类通过其 `double random()` 方法支持生成伪随机数。每次调用 `random()` 都会返回一个算法选择的双精度浮点数，范围从
    0.0 到接近 1.0。


    注意


    维基百科的“随机数生成器”主题（[`http://en.wikipedia.org/wiki/Random_number_generation`](http://en.wikipedia.org/wiki/Random_number_generation)）更详细地讨论了随机数生成器和伪随机数。为方便起见，我将使用常规术语“随机”来代替“伪随机”。


    随机数生成在计算机游戏中非常重要。例如，我们可以使用 `random()` 创建一个猜数字游戏。请查看清单 12-3。


    ```

    import java.util.Scanner;

    public class Guess

    {

    public static void main(String[] args)

    {

    int answer = rnd(100) + 1;

    while (true)

    {

    System.out.print("Enter guess (1 - 100): ");

    int guess = new Scanner(System.in).nextInt();

    if (guess  answer)

    {

    System.out.println("Too high");

    continue;

    }

    else

    {

    System.out.println("Correct");

    break;

    }

    }

    }

    /*

    rnd() - Return random integer.

    Parameters:

    limit - Specifies the largest integer less 1 that

    may be returned. 0 is the smallest integer.

    Return:

    random integer from 0 through limit - 1.

    */

    static int rnd(int limit)

    {

    return (int) (Math.random() * limit);

    }

    }

    清单 12-3

    Guess.java

    ```


    清单 12-3 展示了一个 `Guess` 应用程序的源代码，该程序生成一个 1 到 100 之间的随机整数，并持续提示你猜测生成了哪个整数。如果猜得太低或太高，程序会提示你。如果猜对了，程序也会提示你，然后结束。


    下面这行代码可能会让人困惑：


    ```

    int guess = new Scanner(System.in).nextInt();

    ```


    这行代码使用了 `java.util.Scanner` 类（来自 Java 的引用类型库）及其 `nextInt()` 方法来获取用户输入的整数。`System``.in`
    参数指定控制台为输入源。（除了本次演示，我不会讨论 `Scanner`。）


    最重要的是 `rnd()` 方法和 `return (int) (Math.random() * limit);` 语句。`rnd()` 方法返回一个随机选择的整数，范围从
    0 到 `limit` - 1。例如，当传入 `100` 时，`rnd()` 返回一个从 0 到 99 之间随机选择的整数。这就是为什么要在 `rnd()`
    返回的结果上加 1。


    `return (int) (Math.random() * limit);` 语句首先通过 `Math.random()` 调用获取一个从 0.0 到接近
    1.0 的随机 `double` 值，然后将此值乘以 `limit`。`(int)` 强制类型转换在将 `double` 转换为 `int` 时截断了小数部分。然后通过
    `return` 将结果值返回给调用者。


    按如下方式编译清单 12-3：


    ```

    javac Guess.java

    ```


    按如下方式运行应用程序：


    ```

    java Guess

    ```


    以下是使用 `Guess` 的一次会话示例：


    ```

    Enter guess (1 - 100): 50

    Too high

    Enter guess (1 - 100): 25

    Too high

    Enter guess (1 - 100): 12

    Too high

    Enter guess (1 - 100): 6

    Too high

    Enter guess (1 - 100): 3

    Correct

    ```


    我使用了二分查找算法（参见第 5 章）来确定 3 是正确的数字。在猜数字游戏的上下文中，该算法的工作原理是在搜索空间的中间选择一个值。如果猜得太高，则选择搜索空间的下半部分继续搜索。如果猜得太低，则选择搜索空间的上半部分继续搜索。该算法以递归方式重复。


    你可以让这个游戏变得有趣得多。例如，在用户猜对数字后，游戏可以提示用户是否继续下一轮。在你学习了更多 Java 知识后，你还可以添加一个计时器功能，这样用户必须在时间间隔内猜对，否则将输掉这一轮（并且无法得知该数字）。


    `Math` 还声明了许多其他方法。例如，重载的 `abs()` 方法让你可以获取一个数的绝对值，重载的 `max()` 和 `min()` 方法让你可以获取两个值中的最大值和最小值，而
    `double sqrt(double a)` 返回其参数的平方根。（负参数的平方根是 NaN。）

