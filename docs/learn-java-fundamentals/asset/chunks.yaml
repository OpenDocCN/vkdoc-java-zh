    ## 标识符


    变量、语句、类以及其他语言特性需要被命名，以便在代码的其他位置引用。Java 通过标识符支持此功能。


    *标识符*是由字母（A`–`Z、a`–`z 或其他人类字母表中等效的大写/小写字母）、数字（0`–`9 或其他人类字母表中的等效数字）、连接标点字符（如下划线）以及货币符号（例如
    $ 符号）组成的序列。它必须以字母、货币符号或连接标点字符开头。其长度不能超过它所在的行。


    注意


    根据 JDK 21 的“Java 语言规范”第 28 页（[`http://docs.oracle.com/javase/specs/jls/se21/jls21.pdf`](http://docs.oracle.com/javase/specs/jls/se21/jls21.pdf)），“美元符号
    [`$`] 应仅用于机械生成的源代码中，或者极少数情况下用于访问遗留系统上的现有名称。”


    有效标识符的示例包括 `i`、`grade_letter`、`counter10` 和 `degreesCelsius`。无效标识符的示例包括 `6Age`（以数字开头）和
    `last#Name`（`#` 不是有效的标识符符号）。


    注意


    Java 是一种区分大小写的语言。这意味着大小写不同的标识符被视为不同的标识符。例如，`age` 和 `Age` 是不同的标识符。


    几乎任何有效的标识符都可以用于命名语言特性。然而，有些标识符被 Java 保留用于特殊用途。这些保留的标识符被称为*保留字*。图 2-3 展示了 Java
    的 53 个保留字。


    ![](img/615966_1_En_2_Fig3_HTML.jpg)


    一张截图包含了 53 个 Java 保留字。


    图 2-3


    Java 保留标识符


    JDK 9 将单个下划线字符（`_`）添加到了 Java 的保留字列表中。使用单个下划线来命名任何内容都是错误的。但是，使用多个下划线是可以的（尽管你可能不应该这样做）。


    注意


    Java 的大多数保留字也被称为*关键字*。三个例外是 `false`、`null` 和 `true`。它们是*字面量*（逐字表达的值）的示例。


    此外，`const` 和 `goto` 被 Java 保留但未被使用。

