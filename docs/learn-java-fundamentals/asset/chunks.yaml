    Introduction


    Java is a popular programming language and environment. Because it is used in
    the Information Technology departments of many companies, learning Java is a great
    way to boost your career (and earn more money in these difficult financial times).


    If you have never worked with Java, this 14-chapter book is for you. Chapter [1](#615966_1_En_1_Chapter.xhtml)
    starts you on a gentle journey to learn Java fundamentals.


    Chapters [2](#615966_1_En_2_Chapter.xhtml) through [11](#615966_1_En_11_Chapter.xhtml)
    focus mainly on language syntax, although a few APIs that are closely related
    to syntax are also presented.


    Chapter [2](#615966_1_En_2_Chapter.xhtml) focuses on comments, identifiers, types,
    variables, and literals. These features are fundamental to many languages, and
    this chapter also shows you where Java differs from other languages in their implementation.


    Chapter [3](#615966_1_En_3_Chapter.xhtml) focuses on expressions (and operators),
    and Chapter [4](#615966_1_En_4_Chapter.xhtml) focuses on statements. Again, these
    features are found in many languages. You will use these building blocks to construct
    simple Java programs and will learn where Java’s implementations of expressions
    (and operators) and statements diverge from other languages.


    Chapter [5](#615966_1_En_5_Chapter.xhtml) focuses on arrays. You will use this
    fundamental data structure to create programs that work with sequences of data
    items. For example, you might want to search a sequence of employee IDs for a
    specific identifier.


    If this was all that Java had to offer, you would be able to create sophisticated
    structured programs. In a structured program, data and operations that manipulate
    the data are separated. However, Java goes beyond its ability to create structured
    programs, as revealed in Chapters [6](#615966_1_En_6_Chapter.xhtml) through [8](#615966_1_En_8_Chapter.xhtml).


    Chapter [6](#615966_1_En_6_Chapter.xhtml) introduces you to classes and objects.
    A class is a *template* from which objects are manufactured. It provides an architecture
    for structuring data and associating that data with code that manipulates the
    data. An *object* is an instance of a class (kind of like a cookie is an instance
    of a cookie cutter). It stores data that can be manipulated by the code that the
    object receives from its class. (Don’t worry if this seems complicated. After
    reading Chapter [6](#615966_1_En_6_Chapter.xhtml), you’ll have a much better understanding.)


    Java and other languages that support classes and objects are known as *object-based
    languages*. To go beyond object based and become an *object-oriented language*,
    a language must also support inheritance. Java supports inheritance, which you’ll
    learn about in Chapter [7](#615966_1_En_7_Chapter.xhtml).


    Programs can be made more efficient through polymorphism, which is based on inheritance.
    The idea behind polymorphism is that a single symbol can represent many different
    types (e.g., the `+` symbol can represent integer addition, floating-point addition,
    or string concatenation). You’ll learn about polymorphism in Chapter [8](#615966_1_En_8_Chapter.xhtml).


    There are a few more language features that you need to learn about before you
    can tour Java’s many APIs. Chapter [9](#615966_1_En_9_Chapter.xhtml) begins by
    introducing you to static, non-static, local, and anonymous classes. These features
    let you logically organize your code, making it more readable and maintainable.


    Packages let you organize related classes in the equivalent of a file folder.
    This feature helps you avoid name conflicts by organizing a library of classes
    under a single prefix. Check out Chapter [10](#615966_1_En_10_Chapter.xhtml) to
    learn about packages.


    Java provides a robust exception-handling mechanism for dealing with flawed code
    or unexpected difficulties, such as attempting to open a nonexistent file. This
    mechanism is covered in Chapter [11](#615966_1_En_11_Chapter.xhtml).


    The final three chapters tour some fundamental APIs that you’ll use in many Java
    programs. Chapter [12](#615966_1_En_12_Chapter.xhtml) focuses on the `Math` class
    and related types, Chapter [13](#615966_1_En_13_Chapter.xhtml) focuses on `String`
    and `StringBuffer`, and Chapter [14](#615966_1_En_14_Chapter.xhtml) focuses on
    `System`. After you explore these types, you’ll be able to explore additional
    APIs on your own to increase your Java knowledge.


    Two appendixes round out this book. Appendix A provides a quick reference to Java’s
    supported reserved words, and Appendix B provides a quick reference to Java’s
    supported operators.


    About the Author About the Technical Reviewer


    # 1. Getting Started with Java


    Welcome to Java. This technology is widely used in the business world, and you
    probably want to learn it quickly so you can capture a job in one of these companies
    as a Java programmer. Although Java is vast and constantly evolving, there are
    various fundamental features that are timeless and easy to understand. After you
    master these fundamentals, you will have an easier time writing Java programs.


    This chapter launches you on a tour of Java’s fundamental features. You first
    receive an answer to the “What is Java?” question. Next, you learn about the Java
    Development Kit, which is the necessary software for developing Java programs
    on your computer. Moving on, you are introduced to your first Java program, which
    outputs a simple “hello, world” message. Finally, you discover application architecture.


    Note


    A *program* is a sequence of instructions for a computer to execute. An *application*
    is a program with a single entry point of execution. (In contrast, an *applet*
    – an old form of Java program that is no longer widely used – has multiple entry
    points.) For example, a Microsoft Windows program that is stored in an `.exe`
    file has a single entry point. When expressed in C language *source code* (textual
    instructions), the entry point is defined by a *function* (a named sequence of
    instructions) with the name `main`.'
