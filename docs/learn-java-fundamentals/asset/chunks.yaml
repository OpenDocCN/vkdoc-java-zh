    ## Application Architecture


    An application consists of at least one class, and this class must declare a `main()`
    entry-point method, as you saw in Listing [1-1](#615966_1_En_1_Chapter.xhtml#PC1).
    However, many applications will consist of multiple classes. All of these classes
    might be declared in a single source file, or each class might be declared in
    its own source file. Consider Listing [1-2](#615966_1_En_1_Chapter.xhtml#PC7).


    ```

    class A

    {

    static void a()

    {

    System.out.println("a() called");

    }

    }

    class B

    {

    static void b()

    {

    System.out.println("b() called");

    }

    }

    class C

    {

    public static void main(String[] args)

    {

    A.a();

    B.b();

    }

    }

    Listing 1-2

    Classes.java

    ```


    Listing [1-2](#615966_1_En_1_Chapter.xhtml#PC7) declares three classes (`A`, `B`,
    and `C`) in the same source file – `Classes.java`. Class `C` is the entry-point
    class because it declares the `main()` method.


    Compile `Classes.java` as follows:


    ```

    javac Classes.java

    ```


    You should observe `A.class`, `B.class`, and `C.class` class files in the current
    directory.


    Run this application as follows:


    ```

    java C

    ```


    You should observe the following output:


    ```

    a() called

    b() called

    ```


    If you try to execute `A` (`java A`) or `B` (`java B`), you’ll discover an error
    message because neither class declares the `main()` entry-point method.


    This brings up an interesting point. You could declare `main()` methods in `A`
    and `B` and run these classes as applications. However, this could get confusing.


    You might want to declare a `main()` method in each of `A` and `B` to test these
    classes, but there’s probably no other good reason to do so. It’s best to avoid
    confusion by declaring `main()` in the entry-point class only.


