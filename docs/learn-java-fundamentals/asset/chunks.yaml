    for each `Point` object. This unique hash code is based on combining `Point`’s
    `x` and `y` field values, which specify the point’s coordinates. Using prime numbers
    (17 and 31) in the calculation helps distribute the hash codes more evenly, reducing
    the possibility of collisions.


    Note that this implementation is suitable for most cases. However, depending on
    your application, you might have to tune the implementation further. You need
    to ensure that objects that are considered equal (according to the `equals()`
    method) produce the same hash code.


