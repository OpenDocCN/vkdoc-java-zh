    error("unable to open file " + FILENAME);

    ```


    This example first introduces a constant named `FILENAME` that stores the name
    of a file, which happens to be `report.txt`. It then presents a local variable
    named `file` (of some type named `File`). Moving on, the example attempts to open
    the file by calling an `open()` method with the name of the file and `r` (indicating
    that the file is to be read as opposed to being written or read and written).


    If `open()` succeeds, it returns a reference to a `File` object, which is assigned
    to `file`; otherwise, it returns `null` to signify failure.


    Assuming success, `open()` invokes the `processReport()` method with `file`’s
    value passed to this method as its only argument. If `open()` fails to open the
    file, it invokes the `error()` method with a message consisting of a string expression
    (string literal `"unable to open file "` followed by `+` [string concatenation
    operator] followed by the `FILENAME` constant).


    There is a coding mistake in the example. The mistake is that a second copy of
    the `"report.txt"` string literal is present. The idea of using a `FILENAME` constant
    is to have the file name in one place so that it can be changed easily in one
    place. Without the constant, the programmer might forget to change all occurrences
    of the file name – it is a potential *bug* (defect) in the program.


    The JVM ensures that there is only a single `"report.txt"`-based `String` object
    in the string pool. As a result, a potentially significant amount of heap memory
    is saved.


    When you create a `String` object via a `String` constructor, this object is not
    interned. For example, if the string pool contains a `String` object containing
    `report.txt`, and you invoke `String s = new String("report.txt");`, a new `String`
    object containing `report.txt` in its internal character array will be created
    on the heap – the JVM will not place a reference to the string pool’s `report.txt
    String` object in variable `s`.


    However, if you would prefer to use the `String` object stored in the string pool,
    you can explicitly request this by invoking `String`’s `String intern()` method
    on this `String` object. Here is how you would do this:


    ```

    String s = new String("report.txt").intern();

    ```


    Now the reference assigned to `s` is the reference from the string pool.


    ### Word Counting


    To give you a more practical example of the `String` class, I’ve created a `WC`
    (Word Count) application that counts *words* (sequences of uppercase/lowercase
    alphabetic characters) read from the console. Listing [13-2](#615966_1_En_13_Chapter.xhtml#PC10)
    presents `WC`’s source code.


    ```

    public class WC

    {

    public static void main(String[] args) throws java.io.IOException

    {

    int ch, nwords = 0;

    boolean isWord = false;

    while ((ch = System.in.read()) != -1)

    {

    if (!isalpha(ch))

    isWord = false;

    else

    if (!isWord)

    {

    isWord = true;

    ++nwords;

    }

    }

    System.out.println("Number of words: " + nwords);

    }

    static boolean isalpha(int ch)

    {

    return ((ch >= ''A'' && ch = ''a'' && ch <= ''z''));

    }

    }

    Listing 13-2

    WC.java

    ```


    `WC`’s `main()` method first introduces local variables `ch` (the next character
    read from the console), `nwords` (a count of words read from the console), and
    `isWord` (a Boolean flag – true when the start of a new word has been detected;
    otherwise, false). The `nwords` variable is initialized to `0,` and `isWord` is
    initialized to `false`.


    The `main()` method now enters a `while` loop, repeatedly invoking `System.in.read()`
    to read a character from the console, which is assigned to local variable `ch`.
    This method returns `-1` when there is nothing left to read. (I’ll properly introduce
    `System.in.read()` in Chapter [14](#615966_1_En_14_Chapter.xhtml).)


    Each loop iteration invokes the `isalpha()` helper method to test the character
    in `ch`. If this character is alphabetic, true is returned; otherwise, false is
    returned.


    Note


    I’ve coded `isAlpha()` to assume English text. In an application designed to include
    a non-English audience, I would use the `java.lang.Character` class’s `isAlpha()`
    method. However, I prefer to leave a discussion of `Character` to a different
    book.


    If false is returned, the character in `ch` is not an alphabetic character, and
    false is assigned to `isWord`, which means that we are not in a word. Otherwise,
    an alphabetic character has been detected and the statement following `else` is
    executed.


    The statement consists of a chained-`if` statement, which starts with `if (!isWord)`.
    If `isWord` contains false, we execute the contents of the following block, which
    assigns `true` to `isWord` and increments `nwords` – `main()` has detected another
    word.


    Once the `while` loop finishes, `main()` outputs the word count.


    Compile Listing [13-2](#615966_1_En_13_Chapter.xhtml#PC10) as follows:


    ```

    javac WC.java

    ```


    Run the resulting application as follows:


    ```

    java WC <WC.java

    ```


    If you have never worked at the command line, the < symbol might look strange.
    Although I’ll discuss working with the console more formally in Chapter [14](#615966_1_En_14_Chapter.xhtml),
    < is a redirection symbol for obtaining input from the file whose name follows
    < (`WC.java,` in this case) instead of from the console’s keyboard (which is the
    default input source).


    Assuming that `WC.java` hasn’t been modified, you should observe the following
    output:


    ```

    Number of words: 56

    ```'
