- fmt: '### Static Imports


    Interfaces should only be used to declare types. They shouldn’t be used to declare
    *constant interfaces*, which are interfaces that exist only to export constants.
    Listing [10-6](#615966_1_En_10_Chapter.xhtml#PC12)’s `Openable` constant interface
    provides an example.


    ```

    package demo;

    public interface Openable

    {

    boolean OPEN = true;

    boolean CLOSED = false;

    }

    Listing 10-6

    Openable.java

    ```


    Programmers use constant interfaces to avoid having to prefix the constant’s name
    with the name of its reference type (e.g., `Integer.MAX_VALUE`). For example,
    consider Listing [10-7](#615966_1_En_10_Chapter.xhtml#PC13)’s `Door` class, which
    implements the `Openable` interface so that the programmer is free to specify
    constants `OPEN` and `CLOSED` without having to include class prefixes (if they
    were declared in a class).


    ```

    package demo;

    public class Door implements Openable

    {

    private boolean state = CLOSED;

    public void status()

    {

    System.out.println("door is " + ((state == CLOSED) ? "CLOSED" : "OPEN"));

    }

    public void open()

    {

    state = OPEN;

    }

    public void close()

    {

    state = CLOSED;

    }

    }

    Listing 10-7

    Door.java

    ```


    A constant interface provides constants that are to be used in a class’s implementation.
    These constants are an implementation detail that you shouldn’t leak into the
    class’s exported interface because they could confuse the users of your class.
    Furthermore, in order to preserve binary compatibility, you’re committed to support
    them even when they’re no longer used by the class.


    To satisfy the need for constant interfaces while avoiding the problems imposed
    by the use of these interfaces, JDK 5 introduced *static imports*. This language
    feature can be used to import a reference type’s static members. It is implemented
    via the `import static` statement whose syntax appears as follows:


    ```

    ''import'' ''static'' packagespec ''.'' typename ''.'' ( staticmembername | ''*''
    );

    ```


    This statement’s placement of `static` after `import` distinguishes it from a
    regular `import` statement. Its syntax is similar to the regular `import` statement
    in terms of the standard period-separated list of package and subpackage names.
    Either a single static member name or all static member names (thanks to the asterisk)
    can be imported. Consider the following examples:


    ```

    import static java.lang.Integer.*;         // Import all static members from Integer.

    import static java.lang.Integer.MAX_VALUE; // Import the MAX_VALUE static constant
    only.

    import static java.lang.Integer.max;       // Import the max() static method only.

    ```


    Once imported, static members can be specified without having to prefix them with
    their type names. For example, after specifying either the first or third static
    import, you could specify `max` directly, as in `int maxValue = max(10, 20);`.


    To fix Listing [10-7](#615966_1_En_10_Chapter.xhtml#PC13) so that it no longer
    relies on `implements Openable`, we can insert a `static import`, which Listing
    [10-8](#615966_1_En_10_Chapter.xhtml#PC16) demonstrates.


    ```

    package demo;

    import static demo.Openable.*;

    public class Door

    {

    private boolean state = CLOSED;

    public void status()

    {

    System.out.println("door is " + ((state == CLOSED) ? "CLOSED" : "OPEN"));

    }

    public void open()

    {

    state = OPEN;

    }

    public void close()

    {

    state = CLOSED;

    }

    }

    Listing 10-8

    Door.java (version 2)

    ```


    Listing [10-8](#615966_1_En_10_Chapter.xhtml#PC16) begins with a `package demo;`
    statement because you cannot import static members from a type located in the
    unnamed package. This package name appears as part of the subsequent `import static
    demo.Openable.*;` static import.


    There are two additional cautions in regard to static imports:


    *   When two static imports import the same named member, the compiler reports
    an error. For example, suppose package `math` contains a `Math` class that’s identical
    to package `physics`’s `Math` class in that it implements the same `E` constant
    and logarithmic methods. When confronted by the following code fragment, the compiler
    reports errors because it cannot determine whether `math.Math`’s or `physics.Math`’s
    `E` constant is being accessed and `log()` method is being called:


    *   Overuse of static imports can make your code unreadable and unmaintainable
    because it pollutes the code’s namespace with all of the static members you import.
    Also, anyone reading your code could have a hard time finding out which type a
    static member comes from, especially when importing all static member names from
    a type.


    ```

    import static math.Math.*;

    import static physics.Math.*;

    System.out.println(E);

    System.out.println(log(2));

    ```


    ### Protected Access


    Java provides the `protected` keyword for use in a package context. This keyword
    assigns the protected access level to a class member, such as a field or method.
    Declaring a class member `protected` makes the member accessible to all code in
    any class located in the same package and to subclasses regardless of their packages.


    Class members are given protected access so that they can serve as hooks into
    a class’s implementation. This lets programmers write efficient subclasses in
    an easier manner. I refer you to “Item 17: Design and document for inheritance
    or else prohibit it” in Joshua Bloch’s book, *Effective Java, Second Edition*
    ([`www.amazon.com/Effective-Java-2nd-Joshua-Bloch/dp/0321356683/`](http://www.amazon.com/Effective-Java-2nd-Joshua-Bloch/dp/0321356683/))
    for more information.'
