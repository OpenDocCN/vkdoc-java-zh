    Each row identifies one or more operators. These operators share the same precedence.
    The Precedence column reveals a number ranging from 1 through 15 that specifies
    the precedence of all operators in the intersecting table row. The higher this
    number, the higher the precedence. For example, multiplication’s precedence (12)
    is greater than addition’s precedence (11) because multiplication is performed
    before addition.


    ### Operator Examples


    Some of Table [3-1](#615966_1_En_3_Chapter.xhtml#Tab1)’s operators are probably
    familiar; others might be a mystery. The next several sections briefly describe
    all operators in bottom-up precedence order.


    #### Assignment Operators


    Java supports the simple assignment (`=`) and compound assignment (`+=`, `-=`,
    `*=`, `/=`, `%=`, `&=`, `^=`, `|=`, `<<=`, `>>=`, and `>>>=`) operators.


    ##### Simple Assignment


    The *=* *operator* assigns an expression’s value to a variable. This operator
    has the following syntax:


    ```

    variable ''='' expression '';''

    ```


    Note


    You must specify whatever appears between the single quotes (and not also the
    single quotes). Also, an italicized item is a placeholder for something else that
    you must enter. This also applies to `(`*type*`)` in Table [3-1](#615966_1_En_3_Chapter.xhtml#Tab1).
    (In this table, I didn’t use single quotes to surround literal text that you enter
    verbatim because I didn’t want to be confusing.)


    The types of *variable* and *expression* must agree to avoid a compiler error.
    For example, you cannot directly assign a `double` to an `int`.


    Consider the following example, which initializes `self_employed` to `true`:


    ```

    boolean self_employed = true;

    ```


    ##### Compound Assignment


    The *+=*, *-=*, **=*, */=*, *%=*, *&=*, *^=*, *|=*, *<<=*, *>>=*, and *>>>=* *operators*
    perform their operations and then assign the results to variables. Their syntaxes
    are shown as follows:


    ```

    variable ''+='' expression '';''

    variable ''-='' expression '';''

    variable ''*='' expression '';''

    variable ''/='' expression '';''

    variable ''%='' expression '';''

    variable ''&='' expression '';''

    variable ''^='' expression '';''

    variable ''|='' expression '';''

    variable ''>='' expression '';''

    variable ''>>>='' expression '';''

    ```


    Once again, the types of variables and expressions must agree to avoid compiler
    errors.


    Check out these examples:


    ```

    int x += 1; // Increment x.

    int x -= 1; // Decrement x.

    int x *= 2; // Multiply x by 2.

    int x /= 2; // Divide x by 2.

    int x %= 2; // Assign the remainder of x / 2 to x.

    int x &= 0xFFFFFF00; // Turn off the rightmost eight bits in x.

    int x ^= 0xFFFFFFFF; // Turn off all set bits in x.

    int x |= 0xFF000000; // Turn on the leftmost eight bits in x.

    int x >= 1; // Divide x by 2\. If x is negative, the result is negative.

    int x >>>= 1; // Divide x by 2\. If x is negative, the result is positive.

    ```


    The `<<=` and `>>=` operators perform more quickly than their `*` and `/` counterparts
    when it comes to multiplying and dividing by powers of 2\. Also, they are more
    intuitive when working with binary numbers.'
