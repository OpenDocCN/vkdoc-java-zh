    ##### 类型转换


    *(类型)* *运算符*会将其操作数的类型转换（强制转换）为*类型*。操作数的值会被更改为新类型中的等效值。此运算符的语法如下：


    ```

    ''('' 类型 '')'' 操作数

    ```


    考虑以下示例：


    ```

    int x = (int) 1.0;

    ```


    此示例将 `double` 值 `1.0` 转换为 `int` 值 `1`。然后，该值被赋值给 `int` 变量 `x`。如果没有进行类型转换，编译器会报告错误。


    #### 一元后置自增/后置自减运算符


    Java 支持后置自增（`++`）和后置自减（`--`）一元运算符。


    ##### 后置自增


    *++* *运算符*对其操作数进行后置自增，该操作数必须是 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
    类型的变量。结果会存储在该变量中。这是一种给变量加 1 的快速方法。此运算符的语法如下：


    ```

    变量 ''++''

    ```


    考虑以下示例：


    ```

    int x = 1;

    int y = x++;

    ```


    此示例运行后，`y` 被赋值为 1。然而，`x` 的值为 2。


    ##### 后置自减


    *--* *运算符*对其操作数进行后置自减，该操作数必须是 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
    类型的变量。结果会存储在该变量中。这是一种给变量减 1 的快速方法。此运算符的语法如下：


    ```

    变量 ''--''

    ```


    考虑以下示例：


    ```

    int x = 1;

    int y = --x;

    ```


    此示例运行后，`y` 被赋值为 0。


    #### 其他运算符


    Java 还支持括号 [`()`]、数组索引（`[]`）和成员选择（`.`）运算符。


    ##### 括号


    *()* *运算符*允许你更改数值表达式的优先级顺序。例如，考虑以下表达式：


    ```

    4 + 2 * 3

    ```


    在此表达式中，`2 * 3` 会首先被计算。然后，其结果与 `4` 相加。


    你可以通过使用括号来更改计算顺序。考虑以下表达式：


    ```

    (4 + 2) * 3

    ```


    在此表达式中，`4 + 2` 会首先被计算。然后，其结果与 `3` 相乘。


    你可以将括号嵌套到任意深度。考虑以下表达式：


    ```

    (4 + (5 – 3)) * 2

    ```


    最内层的括号会首先被计算，因此 `5 – 3` 会首先被计算。然后，其结果与 `4` 相加。最后，结果再乘以 `2`。


    ##### 数组索引


    *[]* *运算符*允许你从数组中提取一个元素。我将在第 5 章讨论数组，并在该章中演示此运算符。


    ##### 成员选择


    *.* *运算符*允许你访问字段或调用方法。此运算符的语法如下：


    ```

    操作数 1 ''.'' 操作数 2

    ```


    *操作数 1* 是对对象或引用类型（例如类）的引用，通常表示为变量名（包括对象名）或引用类型名。*操作数 2* 是引用类型的字段或方法的名称。（我将在第 6
    章讨论对象、类、字段和方法。）考虑以下示例：


    ```

    "abc".length()

    ```


    在此表达式中，字符串字面量 `"abc"`（实际上是一个 `String` 对象）提供了对此对象的引用，而 `length()` 是 `String` 类中的方法之一。此方法返回
    `"abc"` 中的字符数，恰好是 3。（我将在第 13 章介绍 `String` 及其 `length()` 方法。）

