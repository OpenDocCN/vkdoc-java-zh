    The `!=` operator compares both operands for inequality. This operator has the
    following syntax:


    ```

    operand1 ''!='' operand2

    ```


    The `!=` operator returns `true` when both operands are unequal; otherwise, it
    returns `false`.


    Here is an example:


    ```

    int x = 10;

    int y = 15;

    boolean equal = x != y;

    ```


    In this example, each of `x` and `y` contains an integer. The `x != y` expression
    returns `true` because `x` (`10`) does not equal `y` (`15`).


    For either operator, both operands must be comparable. For example, you cannot
    compare an integer literal with a string literal.


    When it comes to objects (discussed in Chapter [6](#615966_1_En_6_Chapter.xhtml)),
    these operators don’t compare them to see if they are equal or unequal. Instead,
    they compare references to these objects. For example, `"abc" == "abc"` compares
    the reference to the first string literal with the reference to the second string
    literal. Because of something called interning (discussed in Chapter [13](#615966_1_En_13_Chapter.xhtml)
    where I talk about the `String` class), these references are the same, so the
    expression returns `true`. The expression returns `false` for `"abc" != "abc"`.


    ### Relational Operators


    Java supports the less than (`<`), less than or equal to (`<=`), greater than
    (`>`), greater than or equal to (`>=`), and type comparison for objects (`instanceof`)
    relational operators.


    #### Relational Less Than


    The `<` operator compares both operands to discover if the left operand is less
    than the right operand. This operator has the following syntax:


    ```

    operand1 ''<'' operand2

    ```


    Each of `operand1` and `operand2` must be of `char`, `byte`, `short`, `int`, `long`,
    `float`, or `double` type. This expression returns `true` when `operand1` is less
    than `operand2`; otherwise, it returns `false`.


    Consider the following example:


    ```

    x < y

    ```


    This expression evaluates to `true` when `x` is less than `y`; otherwise, it evaluates
    to `false`.


    #### Relational Less Than or Equal To


    The `<=` operator compares both operands to discover if the left operand is less
    than or equal to the right operand. This operator has the following syntax:


    ```

    operand1 ''<='' operand2

    ```


    Each of `operand1` and `operand2` must be of `char`, `byte`, `short`, `int`, `long`,
    `float`, or `double` type. This expression returns `true` when `operand1` is less
    than `operand2`; otherwise, it returns `false`.


    Consider the following example:


    ```

    x <= y

    ```


    This expression evaluates to `true` when `x` is less than or equal to `y`; otherwise,
    it evaluates to `false`.


    #### Relational Greater Than


    The `>` operator compares both operands to discover if the left operand is greater
    than the right operand. This operator has the following syntax:


    ```

    operand1 ''>'' operand2

    ```


    Each of `operand1` and `operand2` must be of `char`, `byte`, `short`, `int`, `long`,
    `float`, or `double` type. This expression returns `true` when `operand1` is greater
    than `operand2`; otherwise, it returns `false`.


    Consider the following example:


    ```

    x > y

    ```


    This expression evaluates to `true` when `x` is greater than `y`; otherwise, it
    evaluates to `false`.


    #### Relational Greater Than or Equal To


    The `>=` operator compares both operands to discover if the left operand is greater
    than or equal to the right operand. This operator has the following syntax:


    ```

    operand1 ''>='' operand2

    ```


    Each of `operand1` and `operand2` must be of `char`, `byte`, `short`, `int`, `long`,
    `float`, or `double` type. This expression returns `true` when `operand1` is greater
    than or equal to `operand2`; otherwise, it returns `false`.


    Consider the following example:


    ```

    x >= y

    ```


    This expression evaluates to `true` when `x` is greater than or equal to `y`;
    otherwise, it evaluates to `false`.


    #### Relational Type Comparison for Objects


    The `instanceof` operator compares its left operand (an object) with its right
    operand (a reference type) to determine if the object is an instance of the reference
    type. This operator has the following syntax:


    ```

    operand1 ''instanceof'' operand2

    ```


    `Operand1` must be an instance (object) of a reference type (such as a class –
    see Chapter [6](#615966_1_En_6_Chapter.xhtml) for a discussion of objects and
    classes). `Operand2` must be a class or other reference type. This expression
    returns `true` when `operand1` is an instance of `operand2`; otherwise, it returns
    `false`.


    Consider the following example:


    ```

    "abc" instanceof String

    ```


    This expression evaluates to `true` because `"abc"` is an instance of the `String`
    class.


    ### Shift Operators


    Java supports the bitwise left shift (`<<`), bitwise right shift with sign extension
    (`>>`), and bitwise right shift with zero extension (`>>>`) shift operators.


    #### Bitwise Left Shift


    The `<<` operator shifts the bits in its left operand to the left by the number
    of bits specified by its right operand. For each shift, a 0 is shifted into the
    rightmost bit and the leftmost bit is discarded. This operator has the following
    syntax:


    ```

    operand1 ''<<'' operand2

    ```


    Each of `operand1` and `operand2` must be of `char`, `byte`, `short`, `int`, or
    `long` type. This expression returns the result of `operand1` shifted `operand2`
    bits to the left.


    Consider the following example:


    ```

    2 << 3

    ```


    This expression shifts `2` by `3` bits to the left. The result is 16. Essentially,
    we are multiplying `2` by 8. This is much faster than using the `*` operator.
    However, it is limited to multiplying by small powers of 2.


    #### Bitwise Right Shift with Sign Extension


    The `>>` operator shifts the bits in its left operand to the right by the number
    of bits specified by its right operand. For each shift, a copy of the leftmost
    bit (the *sign bit*, which indicates whether the remaining bits represent a positive
    or negative integer – 0 indicates a positive integer and 1 indicates a negative
    integer) is shifted to the right and the rightmost bit is discarded. This is known
    as a *signed shift*. This operator has the following syntax:


    ```

    operand1 ''>>'' operand2

    ```


    Each of `operand1` and `operand2` must be of `char`, `byte`, `short`, `int`, or
    `long` type. This expression returns the result of `operand1` shifted `operand2`
    bits to the left.


    Consider the following example:


    ```

    4 >> 1

    -4 >> 1

    ```


    The first expression shifts `4` by `1` bit to the right. The result is 2. The
    second expression shifts `-4` by `1` bit to the right. The result is -2. Essentially,
    we are dividing 4 or -4 by 2. This is much faster than using the `/` operator.
    However, it is limited to dividing by small powers of 2.'
