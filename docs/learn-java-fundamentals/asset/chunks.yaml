  raw: '## What Is Java?


    Java is like a two-sided coin. From one side, it’s a computer programming language.
    Conversely, it’s a virtual *platform* (the hardware and software context in which
    a program runs) for running programs written in that language.


    Note


    Java has an interesting history. Check out Wikipedia’s “Java (programming language)”
    ([`http://en.wikipedia.org/wiki/Java_(programming_language)#History`](http://en.wikipedia.org/wiki/Java_(programming_language)%2523History))
    and “Java (software platform)” ([`http://en.wikipedia.org/wiki/Java_ (software_platform)#History`](http://en.wikipedia.org/wiki/Java_%20(software_platform)%2523History))
    entries to learn more.


    ### Java Is a Programming Language


    *Java* is a programming language with many features that are identical to those
    found in the C and C++ languages. This is no accident. One of Java’s initial goals
    was to make it easy for C/C++ programmers to migrate to Java to quickly build
    up an initial pool of programmers that would help Java become successful.


    You will discover several similarities between these languages:


    *   The same single-line and multiline comments for documenting source code are
    found in Java and C/C++.


    *   Various identical reserved words are found in Java and C/C++, such as if,
    while, for, and switch. Various other reserved words are found in Java and C++
    but not in C, such as `try`, `catch`, `class`, and `public`.


    *   Primitive types are shared between the three languages: character and integer
    are examples. Furthermore, reserved words for these types are shared between these
    languages: char and int are examples.


    *   Many of the same operators are shared between Java and C/C++. Arithmetic operators
    (such as * and +) and relational operators (such as == and <=) are examples.


    *   Finally, Java and C/C++ use brace characters ({ and }) to delimit blocks of
    statements.


    Java also differs from C/C++ in many ways. Here are a few of the many differences:


    *   Java supports an additional comment style for documenting source code. This
    comment style is known as *Javadoc*.


    *   Java provides reserved words that are not found in C/C++. Examples include
    `strictfp` and `transient`.


    *   Java’s character type is larger than the character type in C and C++. In those
    languages, a character occupies one byte of memory. In contrast, Java’s character
    type occupies two bytes.


    *   Java doesn’t support all of C/C++’s operators. For example, you won’t find
    the C/C++ `sizeof` operator in Java. Also, the `>>>` (unsigned right shift) operator
    is exclusive to Java.


    *   Java provides labeled `break` and `continue` statements. These variants of
    their C/C++ counterparts, which don’t accept labels, are a safer alternative to
    C/C++’s `goto` statement, which Java doesn’t support.


    I discuss comments, reserved words, types, operators, and statements later in
    this book.


    The Java programming language is rigorously defined by various rules that describe
    its *syntax* (structure) and *semantics* (meaning). These rules are used by a
    compiler to verify correctness when translating a program’s source code into equivalent
    *bytecode*, which is a portable representation of the program’s executable code.
    This bytecode is stored in one or more *class files*, which are the Java equivalent
    of a Windows program’s executable (`.exe`) file.


    ### Java Is a Virtual Platform


    *Java* is a virtual platform that executes Java programs. Unlike real platforms
    that consist of a microprocessor (such as an Intel or AMD processor) and operating
    system (such as Windows 11), the Java platform consists of virtual machine and
    execution environment software.


    A *virtual machine* is a software-based processor with its own set of instructions.
    The Java Virtual Machine’s (JVM) associated *execution environment* consists of
    a huge library of prebuilt reference types (think Application Program Interfaces
    [APIs]) that Java programs can use to perform routine tasks (such as opening a
    file). The execution environment also contains “glue” code that connects the JVM
    to the underlying operating system via the Java Native Interface. (I don’t discuss
    the Java Native Interface in this book because I don’t consider it to be a fundamental
    feature.)


    Note


    The combination of bytecode and the virtual machine makes it possible to achieve
    *portability*: the same Java program runs on all platforms that support the virtual
    machine. It’s not necessary to recompile the program’s source code for each platform.


    A Java program is run by a special executable, which I call the *program launcher*.
    Because a program consists of one or more class files, the launcher receives the
    name of the *main class file* (the class file where execution begins). After loading
    the JVM into memory, it tells the JVM to use its *class loader* component to load
    the main class file into memory. The JVM then verifies that the class file’s bytecode
    is safe to run (e.g., no viruses) and runs it.


    Note


    The verifier and a security manager architecture make it possible to achieve *security*:
    a Java application will not be allowed to run when the verifier detects corrupt
    bytecode. Furthermore, when a security manager is installed, the application won’t
    be able to steal sensitive information, erase files, or otherwise harm a user’s
    computer.


    During execution, a class file might refer to another class file. When this happens,
    the JVM uses the class loader to load the referenced class file into memory and
    then verifies and (if okay to run) executes that class file’s bytecode.'
  trans: '

    ## 什么是 Java？


    Java 就像一枚硬币的两面。一方面，它是一种计算机编程语言。另一方面，它是一个用于运行用该语言编写的程序的虚拟*平台*（程序运行所需的硬件和软件环境）。


    注意


    Java 有一段有趣的历史。可以查阅维基百科上关于“Java（编程语言）”（[`http://en.wikipedia.org/wiki/Java_(programming_language)#History`](http://en.wikipedia.org/wiki/Java_(programming_language)%2523History)）和“Java（软件平台）”（[`http://en.wikipedia.org/wiki/Java_
    (software_platform)#History`](http://en.wikipedia.org/wiki/Java_%20(software_platform)%2523History)）的词条来了解更多。


    ### Java 是一种编程语言


    *Java* 是一种编程语言，其许多特性与 C 和 C++ 语言中的特性相同。这并非偶然。Java 的初始目标之一就是让 C/C++ 程序员能够轻松迁移到
    Java，从而快速建立起一个初始程序员群体，帮助 Java 取得成功。


    你会发现这些语言之间存在若干相似之处：


    *   Java 和 C/C++ 中用于注释源代码的单行和多行注释方式相同。


    *   Java 和 C/C++ 中存在各种相同的保留字，例如 `if`、`while`、`for` 和 `switch`。Java 和 C++ 中还存在其他一些
    C 中没有的保留字，例如 `try`、`catch`、`class` 和 `public`。


    *   这三种语言共享基本类型：例如字符型和整型。此外，这些类型的保留字在这些语言中也相同：例如 `char` 和 `int`。


    *   Java 和 C/C++ 共享许多相同的运算符。例如算术运算符（如 `*` 和 `+`）和关系运算符（如 `==` 和 `<=`）。


    *   最后，Java 和 C/C++ 都使用花括号（`{` 和 `}`）来界定语句块。


    Java 在许多方面也与 C/C++ 有所不同。以下是众多差异中的一部分：


    *   Java 支持一种额外的注释风格来记录源代码。这种注释风格被称为 *Javadoc*。


    *   Java 提供了 C/C++ 中没有的保留字。例如 `strictfp` 和 `transient`。


    *   Java 的字符类型比 C 和 C++ 中的字符类型更大。在那些语言中，一个字符占用一个字节的内存。相比之下，Java 的字符类型占用两个字节。


    *   Java 不支持所有 C/C++ 的运算符。例如，你在 Java 中找不到 C/C++ 的 `sizeof` 运算符。此外，`>>>`（无符号右移）运算符是
    Java 独有的。


    *   Java 提供了带标签的 `break` 和 `continue` 语句。这些与不接受标签的 C/C++ 对应语句不同的变体，是 C/C++ 中 `goto`
    语句的更安全替代方案，而 Java 不支持 `goto` 语句。


    我将在本书的后续部分讨论注释、保留字、类型、运算符和语句。


    Java 编程语言由各种规则严格定义，这些规则描述了其*语法*（结构）和*语义*（含义）。编译器在将程序的源代码转换为等效的*字节码*（程序可执行代码的可移植表示形式）时，会使用这些规则来验证正确性。此字节码存储在一个或多个*类文件*中，这些类文件相当于
    Windows 程序的可执行文件（`.exe`）。


    ### Java 是一个虚拟平台


    *Java* 是一个执行 Java 程序的虚拟平台。与由微处理器（例如 Intel 或 AMD 处理器）和操作系统（例如 Windows 11）组成的真实平台不同，Java
    平台由虚拟机和执行环境软件组成。


    *虚拟机*是一个基于软件的处理器，拥有自己的一套指令集。Java 虚拟机（JVM）相关的*执行环境*包含一个庞大的预构建引用类型库（可以理解为应用程序编程接口
    [API]），Java 程序可以使用这些库来执行日常任务（例如打开文件）。执行环境还包含通过 Java 本地接口将 JVM 连接到底层操作系统的“胶水”代码。（本书不讨论
    Java 本地接口，因为我认为它不是一个基本特性。）


    注意


    字节码和虚拟机的结合使得实现*可移植性*成为可能：同一个 Java 程序可以在所有支持该虚拟机的平台上运行。无需为每个平台重新编译程序的源代码。


    Java 程序由一个特殊的可执行文件运行，我称之为*程序启动器*。由于程序由一个或多个类文件组成，启动器会接收*主类文件*（执行开始的类文件）的名称。在将
    JVM 加载到内存后，它会告诉 JVM 使用其*类加载器*组件将主类文件加载到内存中。然后，JVM 会验证该类文件的字节码是否可以安全运行（例如，没有病毒），然后运行它。


    注意


    验证器和安全管理器架构使得实现*安全性*成为可能：当验证器检测到损坏的字节码时，Java 应用程序将不允许运行。此外，当安装了安全管理器时，应用程序将无法窃取敏感信息、删除文件或以其他方式损害用户的计算机。


    在执行过程中，一个类文件可能会引用另一个类文件。发生这种情况时，JVM 会使用类加载器将引用的类文件加载到内存中，然后验证并（如果可以运行）执行该类文件的字节码。

