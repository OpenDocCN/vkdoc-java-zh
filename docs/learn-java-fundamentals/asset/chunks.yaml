    node = node.next;

    }

    return false;

    }

    @Override

    public int length()

    {

    return length;

    }

    @Override

    public String get(int index)

    {

    if (index < 0 || index >= length)

    return null;

    Node node = top;

    int count = 0;

    while (true)

    {

    if (count++ == index)

    break;

    node = node.next;

    }

    return node.item;

    }

    }

