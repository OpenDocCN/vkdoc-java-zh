- fmt: '### Switch Statement


    `switch`语句让你能够比等效的链式`if`-`else`语句更高效地选择多个执行路径之一。该语句的语法如下：


    ```

    ''switch'' ''('' selector expression '')''

    ''{''

    ''case'' value1 '':'' statement1 [''break'' '';'']

    ''case'' value2 '':'' statement2 [''break'' '';'']

    ...

    ''case'' valueN '':'' statementN [''break'' '';'']

    [''default'' '':'' statement]

    ''}''

    ```


    `switch`语句以保留字`switch`开头，后跟括号内的*选择器表达式*以及由多个`case`组成的主体。*选择器表达式*是任何计算结果为整数、字符或字符串的表达式。


    每个`case`以保留字`case`开头，后跟一个字面值和一个冒号（`:`）字符，再跟一条要执行的语句，并可选地以`break`语句（本章稍后讨论）结束。`break`语句使执行流程跳转到`switch`语句之后。


    在计算*选择器表达式*之后，`switch`将该值与每个`case`的值进行比较，直到找到匹配项。如果存在匹配，则执行该`case`的语句。例如，如果*选择器表达式*的值匹配*value1*，则执行*statement1*。


    可选的`break`语句（方括号内的任何内容都是可选的）由保留字`break`后跟一个分号（`;`）组成，它防止执行流程继续执行下一个`case`的语句。相反，执行流程会继续执行`switch`之后的第一条语句。


    **BREAK 语句的放置与难以发现的错误**


    你通常会在`case`的语句之后放置一个`break`语句。忘记包含`break`可能会导致一个难以发现的错误，即执行流程会从一个`case`的末尾流向下一个`case`的开头，而不是在第一个`case`完成后立即退出`switch`语句。然而，在某些情况下，你可能希望将多个`case`分组在一起，并让它们执行共同的代码。例如，你编写了代码提示用户输入字符`Y`（表示是）或字符`y`（表示是）以继续程序，并且你希望无论输入哪个字符都执行相同的代码。在这种情况下，你应该省略参与分组的`case`中的`break`语句，但组中的最后一个`case`除外。考虑以下示例：


    ```

    System.out.print("Enter Y or y to end program:");

    // Code to input Y or y and store this character in char variable ch.

    switch (ch)

    {

    case ''Y'':

    case ''y'': System.out.println("Y or y has been entered.");

    break;

    }

    ```


    如果没有`case`的值与*选择器表达式*的值匹配，并且存在一个`default` case（由保留字`default`后跟一个冒号表示），则执行`default`
    case的语句。以下示例演示了该语句：


    ```

    String direction = "East";

    switch (direction)

    {

    case "North": travelNorth(); break;

    case "East": travelEast(); break;

    case "South": travelSouth(); break;

    default: travelWest();

    }

    ```


    在声明变量`direction`并将其初始化为`"East"`之后，示例进入`switch`语句。该语句读取`direction`的字符串，然后按从上到下的顺序将该值与每个`case`的字符串进行比较，直到找到匹配项。


    它首先将`"East"`与`"North"`进行比较。由于它们不匹配，`switch`继续到下一个`case`，其字符串值为`"East"`。由于它们匹配，`switch`调用一个名为`travelEast()`的方法（我将在第[6](#615966_1_En_6_Chapter.xhtml)章讨论方法）。当此方法返回时，`switch`执行`break`语句，这导致执行流程继续到`switch`之后的第一条语句。


    假设`direction`被初始化为`"SouthWest"`。由于没有`case`的字符串匹配，`switch`将执行`default` case：其`travelWest()`方法将被调用。


    ## 循环语句


    *循环语句*允许 Java 程序重复执行其他语句。有三种循环语句：`for`、`while`和`do`-`while`。


    注意


    每次重复执行称为一个*循环*。此外，每次循环执行称为一次*迭代*。


    ### For 语句


    *for 语句*在另一个语句上迭代特定次数或无限次。该语句的语法如下：


    ```

    ''for'' ''('' [initialize] '';'' [test] '';'' [update] '')''

    statement

    ```


    `for`语句以保留字`for`开头，后跟括号内的头部，再跟*语句*。头部以一个可选的*初始化*部分开始，后跟一个非可选的分号字符。它继续以一个可选的*测试*部分开始，后跟一个分号字符。它以可选的*更新*部分结束。


    *初始化*部分由逗号（`,`）分隔的变量声明或变量赋值列表组成。这些变量中的一部分或全部通常用于控制循环的持续时间，被称为*循环控制变量*。


    *测试*部分由一个布尔表达式组成，该表达式决定循环的长度。只要此表达式为真，循环就会继续。


    *更新*部分由逗号分隔的表达式列表组成，这些表达式通常修改循环控制变量。


    `for`语句首先执行*初始化*部分。然后它执行*测试*部分以确定循环是否应该继续。*测试*部分由一个布尔表达式组成，该表达式返回`true`以继续，返回`false`则不继续。在*语句*执行之后，执行*更新*部分，然后是*测试*、*语句*、*更新*、*测试*、*语句*、*更新*，依此类推。


    以下示例演示了`for`语句：


    ```

    for (int i = 0; i < 10; i++)

    {

    for (int j = 0; j < i; j++)

    System.out.print("*");

    System.out.println();

    }

    ```


    外层的`for`语句以一个包含`int i = 0;`的初始化部分开始。这个复合赋值语句声明了一个名为`i`的`int`变量并将其初始化为`0`。执行完此部分后，`for`将注意力转向测试部分，该部分由`i
    < 10`组成。


    `i < 10`布尔表达式将`i`中的值与`10`进行比较。只要`i`的值小于`10`，`for`语句就会继续在其*语句*上迭代。


    继续，此示例进入`for`语句头部后面的块。


    该块首先执行内层的`for`语句，其初始化部分引入了另一个`int`变量`j`，该变量被初始化为`0`。此外，其测试部分计算`j < i`，该表达式比较`j`和`i`中的当前值。只要`j`的值小于`i`的值，此布尔表达式将计算为`true`，并且这个内层的`for`语句将继续迭代。


    假设表达式为真，执行流程传递到`System.out.print("*");`，该语句输出一个星号（`*`）而不会随后前进到下一输出行。输出之后，内层`for`语句的更新部分执行`j++`，这会递增存储在`j`中的值。


    内层`for`语句通过计算`j < i`开始另一次迭代。一旦`j`的值超过`i`的值，执行流程将离开内层`for`语句，并且`System.out.println();`将执行，导致后续输出从下一输出行的开头开始。


    此示例绘制了以下图案：


    ```

