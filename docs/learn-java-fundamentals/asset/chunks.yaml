    ### Do-While Statement


    The *do-while* *statement* repeatedly executes a statement while its Boolean expression
    is true. Unlike the `while` statement, which evaluates the Boolean expression
    at the top of the loop, `do`-`while` evaluates the Boolean expression at the bottom
    of the loop. This statement has the following syntax:


    ```

    ''do''

    statement

    ''while'' ''('' expression '')'' '';''

    ```


    The `do`-`while` statement consists of reserved word `do`, followed by *statement*,
    which it executes repeatedly, followed by reserved word `while`, followed by a
    parenthesized Boolean expression, followed by a semicolon.


    The `do`-`while` statement first executes *statement*. It then evaluates *expression*.
    If it is true, `do`-`while` executes *statement*. Again, the Boolean expression
    is evaluated. If it is still true, `do`-`while` re-executes *statement*. This
    cyclic pattern continues until *expression* is false.


    The following example demonstrates the `do`-`while` statement:


    ```

    long fact = 1;

    int i = 1;

    do

    fact *= i++;

    while (i <= 4)

    System.out.println(fact);

    ```


    This example is functionally identical to the example in the previous section.
    The only difference is the location of the test expression.


    Tip


    Use a `while` statement when the loop must execute zero or more times. Use a `do`-`while`
    statement when the loop must execute one or more times.


    ## Loop-Branching Statements


    Computer programs often need to terminate a loop or skip the current iteration
    of a loop. They perform these tasks by executing a `break` or `continue` *loop-branching
    statement*.


    ### Break Statement


    The *break* *statement* lets you terminate a `switch` statement, which you’ve
    already seen. However, the *break* *statement* also lets you terminate a loop.
    This is necessary when the loop is infinite, as in a `for (;;)`, `while (true)`,
    or `do` … `while(true)` loop. It can also be necessary in a finite loop context.


    The `break` statement has the following syntax:


    ```

    ''break'' '';''

    ```


    The following example shows how to break out of an infinite loop:


    ```

    while (true)

    {

    System.out.println("Press x to exit the loop.");

    // The following method call reads a character from the keyboard and assigns

    // its int value to ch. I will have more to say about System.in.read() in Chapter
    14.

    int ch = System.in.read();

    if (ch == ''x'')

    break;

    }

    ```


    When `ch == ''x''` is true, the `if` statement executes `break`, which transfers
    execution to the first statement following the `while` loop.


    The following example shows how to break out of a finite loop:


    ```

    for (int i = 0; i  500)

    break;

    else

    System.out.println(i);

    ```


    This example breaks out of the loop when the value in `i` exceeds 500.


    #### Labeled Break


    The `break` statement can be specified with a *label* (an identifier followed
    by a colon), which lets you break out of *nested loops* (loops inside of other
    loops). This variation of the `break` statement lets you transfer execution to
    the first statement following the loop that’s prefixed by the label and has the
    following syntax:


    ```

    ''break'' label '';''

    ```


    The following example demonstrates labeled `break`:


    ```

    outer:

    for (int a = 0; a < 5; a++)

    {

    for (int b = 0; b < 5; b++)

    {

    System.out.println("a = " + a + ", b = " + b);

    if (b == 3)

    break outer;

    }

    System.out.println();

    }

    System.out.println("Both loops have finished");

    ```


    This example presents a pair of `for` loops. The outer loop potentially executes
    five times. For each of these iterations, the inner loop potentially executes
    five times. However, when `b == 3` evaluates to true, the flow of execution leaves
    both the inner and outer loops and continues with the first statement following
    the `outer:`-labeled `for` loop.


    The following output is generated:


    ```

    a = 0, b = 0

    a = 0, b = 1

    a = 0, b = 2

    a = 0, b = 3

    Both loops have finished

    ```'
