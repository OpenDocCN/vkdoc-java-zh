- fmt: '### Implementing Interfaces


    A class implements an interface by appending Java’s `implements` keyword followed
    by a comma-separated list of interface names to the class header and by coding
    each interface method in the class. Listing [8-4](#615966_1_En_8_Chapter.xhtml#PC7)
    presents an `ArrayCollection` class that implements Listing [8-3](#615966_1_En_8_Chapter.xhtml#PC6)’s
    `Collection` interface.


    ```

    class ArrayCollection implements Collection

    {

    private String[] items;

    private int length;

    ArrayCollection(int size)

    {

    items = new String[size];

    length = 0;

    }

    @Override

    public void add(String item)

    {

    if (length == items.length)

    resize(items.length * 2);

    items[length++] = item;

    }

    @Override

    public boolean contains(String item)

    {

    for (int i = 0; i < length; i++)

    if (item.equals(items[i]))

    return true;

    return false;

    }

    @Override

    public int length()

    {

    return length;

    }

    void resize(int newSize)

    {

    String[] items2 = new String[newSize];

    for (int i = 0; i < length; i++) // copy items to items2

    items2[i] = items[i];

    items = items2;

    }

    }

    Listing 8-4

    ArrayCollection.java

    ```


    Listing [8-4](#615966_1_En_8_Chapter.xhtml#PC7) reveals `ArrayCollection`, which
    stores an array-based collection of strings in a private `items` array. The constructor
    creates this array with a size equal to the value in its `size` parameter. For
    brevity, I haven’t bothered to do any error checking. I often avoid checking for
    errors in various listings, but error checking is still important.


    After creating the array, the constructor initializes the `length` field to `0`.
    This variable records the number of stored items. Although this initialization
    isn’t necessary because object fields are zeroed when an object is constructed,
    it informs developers (who might not know this fact) that `length` starts at 0.


    The `add()` method appends a string to the collection. It first makes sure the
    collection isn’t full by comparing `length` to `items.length` (the array size).
    If they are equal, there is no more room to add an `item`, and `resize()` is called
    to double the array’s size. The `item` is stored, the `length` is incremented
    because the array is larger, and true is returned.


    The `contains()` method determines if its string argument is contained in the
    collection, implemented via an array. The method loops over the array, comparing
    each stored string with its string argument. If they are equal, true is returned;
    otherwise, false is returned.


    The comparison is made via `Object`’s `equals()` method. This method compares
    the object reference argument with the reference to the object on which `equals()`
    is called. If they match, `equals()` returns true; otherwise, `equals()` returns
    false.


    The `length()` method returns the number of items stored in the array-based collection.


    I’ve declared all three methods `public` because an interface’s methods are implicitly
    public.


    **Caution**


    When you implement an interface method (by overriding the interface’s method header),
    remember that all of the methods whose headers are declared in the interface are
    implicitly declared `public`. If you forget to include `public` in the implemented
    method’s declaration, the compiler will report an error informing you that you’re
    attempting to assign weaker access to the implemented method.


    The `resize()` method creates a new string array named `items2` sized to the value
    passed to its `newSize` parameter. It then copies `length` strings from `items`
    to `items2`. Copying begins at index 0. After `items2` is populated, its reference
    is assigned to `items` because `items2` was only a temporary placeholder.


    Listing [8-5](#615966_1_En_8_Chapter.xhtml#PC8) presents a `LinkedCollection`
    class that implements Listing [8-3](#615966_1_En_8_Chapter.xhtml#PC6)’s `Collection`
    interface.


    ```

    class LinkedCollection implements Collection

    {

    private Node top, last;

    private int length;

    LinkedCollection()

    {

    top = null;

    last = null;

    length = 0;

    }

    @Override

    public void add(String item)

    {

    Node node = new Node();

    node.item = item;

    node.next = null;

    if (last != null)

    last.next = node;

    last = node;

    if (top == null)

    top = node;

    length++;

    }

    @Override

    public boolean contains(String item)

    {

    Node node = top;

    for (int i = 0; i < length; i++)

    if (item.equals(node.item))

    return true;

    else

    node = node.next;

    return false;

    }

    @Override

    public int length()

    {

    return length;

    }

    }

    class Node

    {

    String item;

    Node next;

    }

    Listing 8-5

    LinkedCollection.java

    ```


    Listing [8-5](#615966_1_En_8_Chapter.xhtml#PC8) reveals `LinkedCollection`, which
    stores a collection of strings in a sequence of `Node` objects that are linked
    together. It presents a separate `Node` class consisting of an `item` field to
    record the string being stored and a `next` field to record a reference to the
    next `Node` object in the list.


    The private `top` and `last` fields respectively identify the first and last nodes
    in the linked collection. (It’s conventional to use a variable named `top` to
    identify the start of a linked list.) The `LinkedCollection()` constructor initializes
    these fields to null, signifying an empty collection.


    The private `length` field identifies the number of stored nodes. This field exists
    for performance. If it didn’t exist, you would have to scan the list to obtain
    the length. The `LinkedCollection()` constructor initializes this field to 0,
    although it doesn’t have to because `length` defaults to 0.


    The `add()` method first creates a `Node` object and populates its `item` field
    with the `String` reference stored in its `item` parameter. It then sets the `Node`
    object’s `next` field to null to signify the end of the collection.


    If `last` isn’t null, there is already a last node in the collection. Therefore,
    `add()` appends this new node to the collection by first setting `last`’s `next`
    field to point to `node` (we want the last node to reference the new node being
    added to the collection). It then sets `last` to point to `node` because the new
    node is to be the last node in the collection.


    The `add()` method now focuses on `top`. If `top` is null, the linked list is
    empty, and it points `top` to the node being added. The result is a single-node
    linked list.


    Finally, `add()` increments `length` to signify that the list has grown by one
    node.


    The `contains()` method determines if its string argument is contained in the
    collection, implemented via a linked list. This method is very similar to `ArrayList`’s
    `contains()` method except for traversing a linked list instead of an array.


    The method loops over the array, comparing each stored string with its string
    argument. If they are equal, true is returned; otherwise, false is returned.


    The `length()` method is simple: it returns the value of the `length` field.


    An interface type’s data values are the objects whose classes implement the interface
    and whose behaviors are those specified by the interface’s method headers. This
    fact implies that you can assign an object’s reference to a variable of the interface
    type, provided that the object’s class implements the interface.


    For example, if you have a variable of type `Collection` and assign to this variable
    a reference to an object created from a class that implements `Collection`, you
    can invoke only those methods described by `Collection`. You cannot invoke `resize()`,
    for instance. There is no point in declaring `resize()` in `Collection` because
    not every collection class (such as `LinkedList`) requires this capability and
    thus does not declare this method.


    Listing [8-6](#615966_1_En_8_Chapter.xhtml#PC9) demonstrates the `Collection`
    interface along with the `ArrayCollection` and `LinkedCollection` classes.'
