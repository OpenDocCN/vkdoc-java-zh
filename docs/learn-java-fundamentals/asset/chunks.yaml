    A `catch` block might be unable to fully handle an exception – perhaps it needs
    to access information provided by some ancestor method in the method-call stack.
    If it can partly handle the exception, the `catch` block should conclude by rethrowing
    the exception so that an ancestor handler can finish handling it. Another possibility
    is to log the exception (for later analysis) and then rethrow it, which is demonstrated
    here:


    ```

    catch (FileNotFoundException fnfe)

    {

    logger.log(fnfe);

    throw fnfe;

    }

    ```


    #### Multiple Catch Blocks


    You can specify multiple `catch` blocks after a `try` block. For example, consider
    this larger excerpt from the aforementioned `Copy` application:


    ```

    FileInputStream fis = null;

    FileOutputStream fos = null;

    try

    {

    fis = new FileInputStream(args[0]);

    fos = new FileOutputStream(args[1]);

    int c;

    while ((c = fis.read()) != -1)

    fos.write(c);

    }

    catch (FileNotFoundException fnfe)

    {

    System.out.println(fnfe.getMessage());

    }

    catch (IOException ioe)

    {

    System.out.println("I/O error: " + ioe.getMessage());

    }

    ```


    The first `catch` block handles `FileNotFoundException`s thrown from either constructor.
    The second `catch` block handles `IOException`s thrown from the `read()` and `write()`
    methods.


    When specifying multiple `catch` blocks, don’t specify a `catch` block with a
    supertype before a `catch` block with a subtype. For example, don’t place `catch
    (IOException ioe)` before `catch (FileNotFoundException fnfe)`. If you do, the
    compiler will report an error because `catch (IOException ioe)` would also handle
    `FileNotFoundException`s, and `catch (FileNotFoundException fnfe)` would never
    have a chance to execute.


    Caution


    Don’t specify multiple `catch` blocks with the same throwable type. For example,
    don’t specify two `catch (IOException ioe) {}` blocks. Otherwise, the compiler
    reports an error.


    JDK 7 made it possible to catch multiple exceptions in a single `catch` block.
    You specify a vertical bar-separated list of exception types and then specify
    the parameter name, which is `final` (you cannot assign any values to the parameter
    in the `catch` block). Consider the following example, where `ex` might contain
    a `FileNotFoundException` reference or an `IOException` reference:


    ```

    catch (FileNotFoundException | IOException ex)

    ```


    ### The Finally Block


    Whether or not an exception is handled, you may need to perform cleanup tasks,
    such as closing an open file. Java provides the `finally` block for this purpose.


    The `finally` block consists of keyword `finally` followed by a brace-delimited
    sequence of statements to execute. This syntax is expressed as follows:


    ```

    ''finally''

    ''{''

    // one or more statements that perform cleanup tasks

    ''}''

    ```


    The `finally` block may appear after the final `catch` block or after the `try`
    block.'
