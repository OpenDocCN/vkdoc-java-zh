    *更新*部分由逗号分隔的表达式列表组成，这些表达式通常用于修改循环控制变量。


    `for` 语句首先执行*初始化*部分。然后执行*测试*部分以确定循环是否应该继续。*测试*部分由一个布尔表达式组成，返回 true 表示继续，返回 false
    表示不继续。在*语句*执行之后，执行*更新*部分，然后依次执行*测试*、*语句*、*更新*、*测试*、*语句*、*更新*，依此类推。


    以下示例演示了 `for` 语句：


    ```

    for (int i = 0; i < 10; i++)

    {

    for (int j = 0; j < i; j++)

    System.out.print("*");

    System.out.println();

    }

    ```


    外层的 `for` 语句以一个包含 `int i = 0;` 的初始化部分开始。这个复合赋值语句声明了一个名为 `i` 的 `int` 变量并将其初始化为
    `0`。执行完此部分后，`for` 将注意力转向测试部分，该部分由 `i < 10` 组成。


    `i < 10` 布尔表达式将 `i` 中的值与 `10` 进行比较。只要 `i` 的值小于 `10`，`for` 语句就会继续迭代其*语句*。


    接着，该示例进入 `for` 语句头部后面的代码块。


    该代码块首先执行内层的 `for` 语句，其初始化部分引入了另一个 `int` 变量 `j`，并将其初始化为 `0`。此外，其测试部分计算 `j < i`，比较
    `j` 和 `i` 中的当前值。只要 `j` 的值小于 `i` 的值，此布尔表达式将计算为 true，并且这个内层 `for` 语句将继续迭代。


    假设表达式为真，执行流程传递到 `System.out.print("*");`，该语句输出一个星号（`*`），并且随后不前进到下一输出行。输出之后，内层
    `for` 语句的更新部分执行 `j++`，这会增加存储在 `j` 中的值。


    内层 `for` 语句通过计算 `j < i` 开始另一次迭代。一旦 `j` 的值超过 `i` 的值，执行流程将离开内层 `for` 语句，并执行 `System.out.println();`，导致后续输出从下一输出行的开头开始。


    此示例绘制出以下图案：


    ```

    *

    **

    ***

    ****

    *****

    ******

    *******

    ********

    *********

    ```

