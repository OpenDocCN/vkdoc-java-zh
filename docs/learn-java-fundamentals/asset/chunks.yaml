- fmt: '# System Properties


    A *system property* is a key-value pair that provides current information about
    some aspect of the JVM’s runtime environment. Several `System` methods and the
    `java.util.Properties` class facilitate working with system properties. Here are
    the methods that `System` provides:


    - `String clearProperty(String key)`: Remove the system property identified by
    the specified `key`.

    - `static Properties getProperties()`: Return the current set of system properties.
    If there is no current set of system properties, a set of system properties is
    first created and initialized.

    - `static String getProperty(String key)`: Get the system property identified
    by the specified `key`.

    - `static String getProperty(String key, String defaultValue)`: Get the system
    property identified by the specified `key`. If the system property isn’t present,
    the string referenced by `defaultValue` is returned.

    - `static void setProperties(Properties props)`: Set the system properties to
    the contents of `props`.

    - `static String setProperty(String key, String value)`: Set the system property
    identified by the specified `key` to `value`. `System.setProperty()` only sets
    properties for the current runtime. Once the program exits, the properties are
    no longer set. If you need to persist properties across sessions, consider using
    properties-based configuration files (discussed shortly) or another form of persistent
    storage.


    **Caution**


    Regarding `setProperty()` and `setProperties()`, changing a standard system property
    may have unpredictable results unless otherwise specified. Property values may
    be cached during initialization or on first use. Setting a standard property after
    initialization using `getProperties()`, `setProperties(Properties)`, `setProperty(String,
    String)`, or `clearProperty(String)` may not have the desired effect.


    Setting system properties can be useful in various configurations, but it’s important
    to use them responsibly and ensure that they don’t interfere with the JVM’s or
    application’s normal operation.


    Listing 14-6’s `PropertiesDemo` application demonstrates all of these methods.


    ```

    import java.util.Properties;

    public class PropertiesDemo

    {

    public static void main(String[] args)

    {

    // Demonstrating setProperty(), getProperty(), and clearProperty().

    System.setProperty("temp.location", "C:\\temp");

    showProperty("Temporary Location before clear", "temp.location");

    System.clearProperty("temp.location");

    showProperty("Temporary Location after clear", "temp.location");

    // Demonstrating getProperties() and Properties.

    Properties properties = System.getProperties();

    showProperty("Java Version", properties.getProperty("java.version"));

    showProperty("OS Name", properties.getProperty("os.name"));

    showProperty("User''s Home Directory", properties.getProperty("user.home"));

    System.out.println();

    properties.list(System.out);

    // More demonstrations of getProperty().

    showProperty("Java Version", "java.version");

    showProperty("OS Name", "os.name");

    showProperty("Java Class Path", "java.class.path");

    showProperty("Line Separator", "line.separator");

    showProperty("User''s Account Name", "user.name");

    showProperty("User''s Home Directory", "user.home");

    // Demonstrating setProperty().

    System.setProperty("someprop", "somevalue");

    showProperty("Some Property", "someprop");

    // Demonstrating setProperties().

    Properties newProperties = new Properties();

    newProperties.setProperty("someprop1", "somevalue1");

    newProperties.setProperty("someprop2", "somevalue2");

    System.setProperties(newProperties);

    showProperty("Some Property 1", "someprop1");

    showProperty("Some Property 2", "someprop2");

    }

    static void showProperty(String msg, String propertyName)

    {

    System.out.printf("%s: %s%n", msg, System.getProperty(propertyName));

    }

    }

    ```


    **Listing 14-6** `PropertiesDemo.java`


    This listing should be fairly easy to follow. I created a `showProperty()` helper
    method to facilitate outputting a message and a property value.


    Compile Listing 14-6 as follows:


    ```

    javac PropertiesDemo.java

    ```


    Run the resulting application as follows:


    ```

    java PropertiesDemo

    ```


    You should observe output that is similar to the following output:


