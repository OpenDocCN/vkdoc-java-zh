    # 2. Comments, Identifiers, Types, Variables, and Literals


    When learning a new programming language, starting with the most basic of language
    features is best. These features are comments, identifiers (with reserved words
    as a subset), types, variables, and literals. This chapter introduces you to these
    features in a Java context.


    ## Comments


    It’s important to document your source code so that you and anyone else who might
    maintain it in the future can understand the code’s purpose. Our brains tend to
    forget things as we age, and we may not understand why we wrote the code the way
    we did. Source code should be documented when it is written. This documentation
    might have to be modified whenever the code is changed so that it accurately explains
    the new code.


    Java provides *comments* for documenting source code. Whenever you compile the
    source code, the compiler ignores the comments – no bytecode is generated. Single-line,
    multiline, and Javadoc (documentation) comments are supported.


    ### Single-Line Comments


    A *single-line comment* appears on one line of source code. It begins with the
    `//` character sequence and continues to the end of the line. The compiler ignores
    everything on this line starting with the `//` characters. The following example
    demonstrates a single-line comment:


    ```

    double degrees = (5.0 / 9.0) * (x - 32.0); // Convert x degrees Fahrenheit to
    Celsius.

    ```


    Single-line comments are useful for specifying short but meaningful information.
    They shouldn’t be used to insert unhelpful information, for example, `// This
    is a comment`.


    ### Multiline Comments


    A *multiline comment* typically extends over multiple lines of source code although
    it can appear on a single line. This comment begins with `/*` and ends with `*/`.
    The compiler ignores everything in between (including `/*` and `*/`). The following
    example demonstrates a multiline comment:


    ```

    /* Extract both components of an email address into a two-element array.

    email_parts[0] stores "xyz" and email_parts[1] stores "gmail.com". */

    String[] email_parts = "xyz@gmail.com".split("@", 2); // extract

    ```


    You cannot nest a multiline comment inside of another multiline comment. For example,
    the compiler generates an error when it encounters the following nested comments:


    ```

    /*

    /*

    Nested multiline comments are illegal.

    */

    */

    ```


    Caution


    The compiler reports an error when it encounters nested multiline comments.'
