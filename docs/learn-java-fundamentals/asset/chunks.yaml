  trans: '

    ## StringBuffer


    `java.lang.StringBuffer` 类描述了一个*可变*（可修改）的字符序列。`StringBuffer` 与 `String` 类类似，但与
    `String` 对象不同的是，`StringBuffer` 对象的内容在创建后可以被修改。


    与 `String` 一样，`StringBuffer` 将字符存储在一个内部数组中。与 `String` 无法调整其数组大小以使其变大不同，`StringBuffer`
    具备这种能力。


    `StringBuffer` 使用了*容量*的概念，即在必须将内部数组替换为更大的数组之前，可以存储的最大字符数。当要存储在数组中的字符序列长度超过容量时，会分配一个新的内部数组，并用该字符序列填充。


    ### 创建字符串缓冲区


    `StringBuffer` 提供了多个用于创建字符串缓冲区的构造方法。这些构造方法包括以下三个：


    *   `StringBuffer()`：构造一个不含任何字符的字符串缓冲区，初始容量为 16 个字符。


    *   `StringBuffer(int capacity)`：构造一个不含任何字符的字符串缓冲区，初始容量设置为传递给 `capacity` 的值。


    *   `StringBuffer(String s)`：构造一个字符串缓冲区，其内容初始化为传递给 `s` 的引用所指向的字符串。


    请谨慎使用 `StringBuffer(int capacity)`。如果你向此构造方法传递一个负整数，它将抛出一个 `java.lang.NegativeArraySizeException`
    对象。


    注意


    你可能想探索用于创建 `StringBuffer` 对象的其他构造方法。请查阅 JDK 21 引用类型库中 `StringBuffer` 类的 Java 文档（[`http://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/lang/StringBuffer.xhtml`](http://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/lang/StringBuffer.xhtml)），以了解这些构造方法以及
    `StringBuffer` 的方法。


    ### 探索 StringBuffer 方法


    `StringBuffer` 提供了多种方法，包括 `append()` 和 `insert()` 方法，这些方法被重载以接受任何类型的数据（例如 `int`、`char`
    或 `double`）。


    每个 `append()` 和 `insert()` 方法首先将其数据项转换为字符串，然后将该字符串的字符追加到或插入到字符串缓冲区中。每个 `append()`
    方法总是将这些字符添加到缓冲区的末尾；每个 `insert()` 方法则在指定位置添加字符。


    以下还介绍了一些其他方法：


    *   `int capacity()`：返回此字符串缓冲区的当前容量。


    *   `char charAt(int index)`：返回此字符串缓冲区中指定 `index` 处的 `char` 值。当 `index` 为负数或大于等于
    `length()` 的返回值时，会抛出一个 `IndexOutOfBoundsException` 对象。


    *   `StringBuffer delete(int start, int end)`：从此字符串缓冲区中移除从 `start` 到 `end` - 1
    的字符（如果 `end` 大于或等于字符串缓冲区的长度，则移除到字符串缓冲区的末尾）。当 `start` 和 `end` 包含相同的值时，不进行任何更改。当
    `start` 为负数、大于 `length()` 或大于 `end` 时，此方法会抛出 `java.lang.StringIndexOutOfBoundsException`。


    *   `int indexOf(String s)`：返回子字符串 `s` 在此字符串缓冲区中第一次出现的索引。如果没有出现，则返回 -1。


    *   `int lastIndexOf(String s)`：返回子字符串 `s` 在此字符串缓冲区中最后一次出现的索引。如果没有出现，则返回 -1。


    *   `int length()`：返回此字符串缓冲区的长度（存储的字符数）。


    *   `StringBuffer reverse()`：将此字符串缓冲区的字符序列替换为该序列的反转。例如，如果此字符串缓冲区包含 ABC，则将其替换为
    CBA。


    *   `void setCharAt(int index, char ch)`：将指定 `index` 处的字符设置为 `ch`。当 `index` 为负数或大于等于
    `length()` 的返回值时，抛出 `IndexOutOfBoundsException`。


    *   `void setLength(int newLength)`：设置此字符串缓冲区字符序列的长度。该序列将被更改为一个新的字符序列，其长度由 `newLength`
    指定。


    *   `String substring(int start, int end)`：返回一个新的 `String` 对象，该对象包含此字符序列中当前字符的一个子序列。子序列从
    `start` 开始，一直到 `end` - 1。当 `start` 或 `end` 为负数、`end` 大于 `length()` 或 `start` 大于
    `end` 时，此方法会抛出 `IndexOutOfBoundsException`。


    *   `void trimToSize()`：尝试减少用于字符序列的存储空间。如果内部数组大于保存当前字符序列所需的大小，则可能会调整其大小以提高空间效率。调用此方法可能会（但不要求）影响后续对
    `capacity()` 方法调用的返回值。


    清单 13-3 展示了一个演示这些方法的 `SBD`（`StringBuffer` 演示）应用程序的源代码。

