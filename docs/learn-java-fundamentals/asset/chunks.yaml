- fmt: '### Summarizing


    As with local classes, anonymous classes can capture variables; they have the
    same access to local variables in the enclosing scope, be it a block that follows
    an `if` statement header, a method header, or a class header:


    - An anonymous class can access the members of its enclosing class.

    - An anonymous class cannot access local variables in its enclosing block that
    are not declared `final` or are effectively final.

    - As with a nested class, a declaration of a variable in an anonymous class shadows
    any other declarations in the enclosing block that have the same name.


    Anonymous classes also have the same restrictions as local classes with respect
    to their members:


    - You cannot declare static initializers or member interfaces in an anonymous
    class.

    - An anonymous class can have static members provided that they are constant variables.


    You can declare the following language elements in anonymous classes:


    - Fields

    - Additional methods

    - Instance initializers

    - Local classes


    Remember that you cannot declare constructors in an anonymous class.


    ### A More Practical Anonymous Class Example


    I’ve created a `Sort` application that provides a more practical demonstration
    of an anonymous class. This application’s source code is spread across two source
    files: `Sort.java` and `Comparer.java`. Listing [9-17](#615966_1_En_9_Chapter.xhtml#PC52)
    presents `Sort.java`’s source code.


    ```

    class Sort

    {

    public static void main(String[] args)

    {

    System.out.println("Sort");

    System.out.println("----");

    System.out.println();

    int[] grades = new int[] { 96, 54, 71, 89, 63, 92 };

    outputArray("Unsorted array:", grades);

    sort(grades, new Comparer()

    {

    @Override

    public int compare(int x, int y)

    {

    return x - y;

    }

    });

    outputArray("Sorted array after ascending sort:", grades);

    System.out.println();

    int[] grades2 = new int[] { 79, 56, 100, 88 };

    outputArray("Unsorted array:", grades2);

    sort(grades2, new Comparer()

    {

    @Override

    public int compare(int x, int y)

    {

    return y - x;

    }

    });

    outputArray("Sorted array after descending sort:", grades2);

    }

    static void outputArray(String msg, int[] x)

    {

    System.out.println(msg);

    System.out.println();

    for (int i = 0; i < x.length; i++)

    System.out.print(x[i] + " ");

    System.out.println();

    System.out.println();

    }

    static void sort(int[] x, Comparer c)

    {

    for (int pass = 0; pass < x.length - 1; pass++)

    {

    int min = pass;

    for (int i = pass + 1; i < x.length; i++)

    if (c.compare(x[i], x[min]) < 0)

    min = i;

    if (min != pass)

    {

    int temp = x[min];

    x[min] = x[pass];

    x[pass] = temp;

    }

    }

    }

    }

    Listing 9-17

    Sort.java

    ```


    Listing [9-17](#615966_1_En_9_Chapter.xhtml#PC52)’s `Sort` class declares `main()`,
    `outputArray()`, and `sort()` methods:


    - `main()` is the entry point into this application. It first outputs a header.
    It then declares a 32-bit integer array of student grades (which are unsorted),
    outputs this array, sorts this array into ascending order, and outputs the sorted
    array. Continuing, it declares a second array of unsorted grades, outputs this
    array, sorts this array into descending order, and outputs the sorted array.

    - `outputArray()` prints a message followed by the contents of a 32-bit integer
    array on the console.

    - `sort()` organizes an integer array’s elements in ascending or descending order,
    which is determined by a `Comparer` object that is passed as the second argument
    to the `sort()` method. It uses the Selection Sort algorithm to perform this organization.


    Selection Sort is similar to Chapter [5](#615966_1_En_5_Chapter.xhtml)’s Bubble
    Sort algorithm in that they both use an outer loop to make multiple passes through
    an array. Each pass is associated with a pass index that identifies the next element
    to work with.


    For Selection Sort, an inner loop selects the smallest element – the minimum.
    If the minimum element’s index does not equal the pass index, a swap of the minimum
    and pass-numbered elements occurs. For Bubble Sort, an inner loop compares the
    inner loop–indexed element with the current pass-indexed element. If the inner
    loop–indexed element is smaller (ascending sort) or larger (descending sort) than
    the pass-indexed element, a swap occurs.


    Selection Sort emphasizes reducing the number of swaps, and Bubble Sort emphasizes
    simplicity.


    My discussion of the `sort()` method referred to a `Comparer` object. This object
    is created from an anonymous class that extends the abstract `Comparer` class.
    Listing [9-18](#615966_1_En_9_Chapter.xhtml#PC53) presents `Comparer.java`’s source
    code.


    ```

    abstract class Comparer

    {

    abstract int compare(int x, int y);

    }

    Listing 9-18

    Comparer.java

    ```


    `Comparer` declares a single abstract `int compare(int x, int y)` method that
    compares the values in the `x` and `y` parameters, returning a negative result
    when one of these values is less than the other value, zero when these values
    are identical, and a positive result when one of these values is greater than
    the other value.


    Refer back to the `main()` method and you’ll encounter two occurrences of `Comparer`
    being subclassed by an anonymous class and then instantiated. I’ve excerpted the
    first instance as follows:


    ```

    sort(grades, new Comparer()

    {

    @Override

    public int compare(int x, int y)

    {

    return x - y;

    }

    });

    ```


    The `return x - y;` statement subtracts the second parameter value from the first
    parameter value in order to perform an ascending sort. The second `Comparer` occurrence
    exchanges these parameters, resulting in a `return y - x;` statement that results
    in a descending sort.


    Compile Listings [9-17](#615966_1_En_9_Chapter.xhtml#PC52) and [9-18](#615966_1_En_9_Chapter.xhtml#PC53)
    as follows:


    ```

    javac *.java

    ```


    Run the `Sort` application as follows:


    ```

    java Sort

    ```


    You should observe the following output:


    ```

    Sort


    Unsorted array:

    96 54 71 89 63 92

    Sorted array after ascending sort:

    54 63 71 89 92 96

    Unsorted array:

    79 56 100 88

    Sorted array after descending sort:

    100 88 79 56

    ```


    ## What’s Next?


    I’ve referred to packages in this and previous chapters. What is a package and
    how do you use it? You’ll find out in the next chapter.


    # 10. Packages


    Same-named reference types (e.g., two different `Math` classes) can cause name
    conflicts when you try to use them, but Java overcomes this problem with packages.
    This chapter introduces you to the package concept followed by the `package` and
    `import` statements. Finally, you learn about static imports, protected access,
    and JAR files.


    ## What Are Packages?


    Java developers group related classes and/or interfaces into *packages*, which
    are unique *namespaces* for storing reference types. Packages can store classes,
    interfaces, and *subpackages* (packages nested within other packages). Think of
    a package as a directory that stores files and subdirectories.


    Note


    Packages make it easier to locate and use reference types, avoid name conflicts
    between same-named types, and control access to types.


    A package has a name, which must be a non-reserved identifier, for example, `java`.
    The member selection operator (`.`) separates a package name from a subpackage
    name and separates a package or subpackage name from a type name. For example,
    the two `.` operators in `java.lang.System` separate package name `java` from
    the `lang` subpackage name and separate subpackage name `lang` from the `System`
    type name.


    Note


    The `System` utility class provides several useful system-related constants and
    methods. We will look at its constants and some of its methods in Chapter [14](#615966_1_En_14_Chapter.xhtml).


    Reference types (such as `System`) must be declared `public` to be accessible
    from outside their packages. The same applies to any constants, constructors,
    and methods that must be accessible. You’ll see examples later in this chapter.'
