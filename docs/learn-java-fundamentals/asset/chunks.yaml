  trans: '

    #### 记录预约


    要理解这个问题，假设你购买了一个实现预约日历功能的类库。虽然你无法访问其源代码，但假设清单 7-21 描述了主要的 `ApptCal` 类。


    ```

    class ApptCal

    {

    private final static int MAX_APPT = 1000;

    private Appointment[] appointments;

    private int size;

    ApptCal()

    {

    appointments = new Appointment[MAX_APPT];

    size = 0;

    }

    void addAppointment(Appointment appointment)

    {

    if (size == appointments.length)

    return; // 数组已满

    appointments[size++] = appointment;

    }

    void addAppointments(Appointment[] appointments)

    {

    for (int i = 0; i < appointments.length; i++)

    addAppointment(appointments[i]);

    }

    }

    清单 7-21

    ApptCal.java

    ```


    `ApptCal` 存储了一个预约数组，每个预约由 `Appointment` 对象描述。在本讨论中，`Appointment` 的细节并不重要；它甚至可以是一个空的
    `Appointment` 类——参见清单 7-22。


    ```

    class Appointment

    {

    }

    清单 7-22

    Appointment.java

    ```


    假设你想将每次预约记录到文件中。由于该类库没有提供日志记录功能，你通过清单 7-23 中的 `LoggingApptCal` 类扩展了 `ApptCal`，该类在重写的
    `addAppointment()` 和 `addAppointments()` 方法中添加了日志记录行为。


    ```

    class LoggingApptCal extends ApptCal

    {

    LoggingApptCal()

    {

    }

    @Override

    void addAppointment(Appointment appointment)

    {

    Logger.log(appointment.toString());

    super.addAppointment(appointment);

    }

    @Override

    void addAppointments(Appointment[] appointments)

    {

    for (int i = 0; i < appointments.length; i++)

    Logger.log(appointments[i].toString());

    super.addAppointments(appointments);

    }

    }

    清单 7-23

    LoggingApptCal.java

    ```


    `LoggingApptCal` 类依赖于一个 `Logger` 类（参见清单 7-24），其 `void log(String msg)` 类方法将字符串记录到文件中。`Appointment`
    对象通过 `toString()` 转换为字符串，然后传递给 `log()`。


    ```

    class Logger

    {

    static void log(String msg)

    {

    System.out.println(msg);

    }

    }

    清单 7-24

    Logger.java

    ```


    虽然 `LoggingApptCal` 看起来没问题，但它的运行结果可能与你预期不符。假设你实例化了这个类，并通过 `addAppointments()`
    向该对象添加了几个 `Appointment` 对象，清单 7-25 中的 `ApptCalDemo` 类完成了这一操作。


    ```

    class ApptCalDemo

    {

    public static void main(String[] args)

    {

    Appointment[] appointments =

    {

    new Appointment(),

    new Appointment(),

    new Appointment()

    };

    LoggingApptCal lapptcal = new LoggingApptCal();

    lapptcal.addAppointments(appointments);

    }

    }

    清单 7-25

    ApptCalDemo.java

    ```


    按如下方式编译此代码：


    *   `javac ApptCalDemo.java`（或 `javac *.java`）


    按如下方式运行应用程序：


    ```

    java ApptCalDemo

    ```


    你应该会看到以下输出（哈希码可能不同）：


    ```

    Appointment@5305068a

    Appointment@279f2327

    Appointment@2ff4acd0

    Appointment@5305068a

    Appointment@279f2327

    Appointment@2ff4acd0

    ```


    输出了六条消息。预期的三条消息（每个 `Address` 对象一条）每条都重复了一次。


    当调用 `LoggingAB` 的 `addAddresses()` 方法时，它首先为传递给 `addAddresses()` 的 `addresses`
    数组中的每个 `Address` 对象调用 `Logger.log()`。然后，该方法通过 `super.addAddresses(addresses);`
    调用 `AB` 的 `addAddresses()` 方法。


    `AB` 的 `addAddresses()` 方法会为其 `addresses` 数组参数中的每个 `Address` 对象调用 `LoggingAB`
    重写的 `addAddress()` 方法。`addAddress()` 方法随后执行 `Logger.log(address.toString());`，记录其
    `address` 参数的字符串表示，于是你又得到了三条额外的日志消息。


    如果你没有重写 `addAddresses()` 方法，这个问题应该会消失。但即便如此，子类仍然依赖于一个实现细节：`AB` 的 `addAddresses()`
    方法调用了 `addAddress()`。


    依赖一个未记录的实现细节并非明智之举。（回想一下，你无法访问 `AB` 的源代码。）当一个细节未被记录时，它可能会在类的新版本中发生变化。


    由于基类的更改可能会破坏子类，这个问题被称为*脆弱的基类问题*。另一个导致脆弱性的相关原因（也与重写方法有关）是在后续版本中向超类添加新方法时发生。


    例如，假设该类库的新版本在 `AB` 类中引入了一个 `void addAddress(Address address, boolean unique)`
    方法。当 `unique` 为 false 时，该方法将地址添加到通讯录中。当 `unique` 为 true 时，仅当该地址之前未被添加过时才会添加。


    由于此方法是在创建 `LoggingAB` 类之后添加的，因此 `LoggingAB` 并未重写新的 `addAddress()` 方法以调用 `Logger.log()`。结果，传递给新
    `addAddress()` 方法的 `Address` 对象不会被记录。


    另一个问题是：你在子类中引入了一个超类中没有的方法。超类的新版本提供了一个与子类方法签名和返回类型匹配的新方法。你的子类方法现在重写了超类方法，并且很可能无法满足超类方法的约定。

    '
- fmt: '### Composed Objects and Forwarding to the Rescue


    You can make all of these problems disappear in part by using a *composed object*,
    which is an object whose state refers to other objects. For example, a `Vehicle`
    object has `String make` and `model` fields that reference strings (which are
    objects in Java) that store a vehicle’s make and model. We say that `Vehicle`
    is composed of these strings.


    Declare a `private ApptCal` field in a new `LoggingApptCal` class, and have this
    field reference an instance of the former `ApptCal` superclass (`LoggingApptCal`
    will no longer extend `ApptCal`). This workaround forms a *has-a relationship*
    between the new class (`LoggingApptCal`) and former superclass (`ApptCal`), so
    your technique is known as *composition*.


    Additionally, you can make each of the new class’s object methods call the corresponding
    superclass method and return the called method’s return value. You do this via
    the superclass object saved in the `private` field. This task is known as *forwarding*,
    and the new methods are known as *forwarding methods*.


    Listing [7-26](#615966_1_En_7_Chapter.xhtml#PC62) presents an improved `LoggingApptCal`
    class that uses composition and forwarding to forever eliminate the fragile base
    class problem and the additional problem of unanticipated method overriding.


    ```

    class LoggingApptCal

    {

    private ApptCal apptcal; // Create a private field in new class.

    LoggingApptCal(ApptCal apptcal)

    {

    this.apptcal = apptcal;

    }

    void addAppointment(Appointment appointment)

    {

    Logger.log(appointment.toString());

    apptcal.addAppointment(appointment);

    }

    void addAppointments(Appointment[] appointments)

    {

    for (int i = 0; i < appointments.length; i++)

    Logger.log(appointments[i].toString());

    apptcal.addAppointments(appointments);

    }

    }

    Listing 7-26

    LoggingApptCal.java

    ```


    In this example, the `LoggingApptCal` class doesn’t depend upon the implementation
    details of the `ApptCal` class. You can add new methods to `ApptCal` without breaking
    `LoggingApptCal`.


    **Note**


    Listing [7-26](#615966_1_En_7_Chapter.xhtml#PC62)’s `LoggingApptCal` class is
    an example of a *wrapper class*, which is a class whose objects wrap other objects.
    Each `LoggingApptCal` object wraps an `ApptCal` object.


    To use the new `LoggingApptCal` class, you must first instantiate `ApptCal` and
    pass the resulting object as an argument to `LoggingApptCal`’s constructor. The
    `LoggingApptCal` object wraps the `ApptCal` object, as follows:


    ```

    LoggingApptCal lapptcal = new LoggingApptCal(new ApptCal());

    ```


    Compile and run this refactored application and you should observe output that’s
    similar to the following:


    ```

    Appointment@5305068a

    Appointment@279f2327

    Appointment@2ff4acd0

    ```


    ## What’s Next?


    A developer can create a `Vehicle` object when it’s better to create a more specific
    `Truck` object. Java provides an abstract class feature that can be used to prevent
    `Vehicle` from being instantiated. Chapter [8](#615966_1_En_8_Chapter.xhtml) introduces
    you to abstract classes. It also introduces you to the related interface concept,
    which is another form of abstraction.


    # 8. Changing Type via Polymorphism


    Some real-world entities can change their forms. For example, water (on Earth
    as opposed to interstellar space) is naturally a liquid, but it changes to a solid
    when frozen, and it changes to a gas when heated to its boiling point. Insects
    such as butterflies that undergo metamorphosis are another example.


    The ability to change form is known as *polymorphism* and is useful to model in
    a programming language. For example, code that draws arbitrary shapes can be expressed
    more concisely by introducing a single `Shape` class and its `draw()` method and
    by invoking that method for each `Circle` instance, `Rectangle` instance, and
    other `Shape` instance stored in an array. When `Shape`’s `draw()` method is called
    for an array instance, it is the `Circle`’s, `Rectangle`’s, or other `Shape` instance’s
    `draw()` method that gets called. We say that there are many forms of `Shape`’s
    `draw()` method or that this method is polymorphic.


    Java supports four kinds of polymorphism:


    - **Coercion**: An operation serves multiple types through implicit type conversion.
    For example, division lets you divide an integer by another integer, or divide
    a floating-point value by another floating-point value. If one operand is an integer
    and the other operand is a floating-point value, the compiler coerces (implicitly
    converts) the integer to a floating-point value to prevent a type error. (There
    is no division operation that supports an integer operand and a floating-point
    operand.) Passing a subclass object reference to a method’s superclass parameter
    is another example of coercion polymorphism. The compiler coerces the subclass
    type to the superclass type to restrict operations to those of the superclass.


    - **Overloading**: The same operator symbol or method name can be used in different
    contexts. For example, `+` can be used to perform integer addition, floating-point
    addition, or string concatenation, depending on the types of its operands. Also,
    multiple methods having the same name can appear in a class (through declaration
    and/or inheritance).


    - **Parametric**: In a class declaration, a field name can associate with different
    types, and a method name can associate with different parameter and return types.
    The field and method can then take on different types in each class instance.
    For example, a field might be of type `Truck` and a method might return a `Truck`
    reference in one class instance, and the same field might be of type `Car` and
    the same method might return a `Car` reference in another class instance. Java
    supports parametric polymorphism via generics, which I don’t discuss in this book.


    - **Subtype**: A type can serve as another type’s subtype. When a subtype instance
    appears in a supertype context, executing a supertype operation on the subtype
    instance results in the subtype’s version of that operation executing. For example,
    suppose that `Circle` is a subclass of `Point` and that both classes contain a
    `draw()` method. Assigning a `Circle` instance to a variable of type `Point`,
    and then calling the `draw()` method via this variable, results in `Circle`’s
    `draw()` method being called. Subtype polymorphism partners with inheritance.


    Many developers do not regard coercion and overloading as valid kinds of polymorphism.
    They see coercion and overloading as nothing more than type conversions and syntactic
    sugar. In contrast, parametric and subtype are regarded as valid kinds of polymorphism.


    This chapter introduces you to subtype polymorphism through upcasting and late
    binding. We then move on to abstract classes and abstract methods, interfaces,
    downcasting and runtime type identification, and the additional topics of covariant
    return types and interface-based static methods.'
