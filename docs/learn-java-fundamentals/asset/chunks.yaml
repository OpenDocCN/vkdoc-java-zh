- fmt: '### Class Fields


    A *class field* (also known as a *static field*) is declared by prepending reserved
    word `static` to the declaration, as in the following syntax:


    ```

    ''static'' type [''='' expression] '';''

    ```


    Unlike an instance field in which each object has its own copy, a class field
    is shared by all objects. When the field is updated, all objects see the change.


    An object must be created to access an instance field. In contrast, no objects
    need to be created to access a class field.


    Consider the following example of a simple `Counter` utility class:


    ```

    class Counter

    {

    static int count;

    }

    ```


    We are creating a `Counter` class to hold a `count` field that code in multiple
    classes can access. Each code block increments this field to track some activity,
    and other code blocks can read `count`’s current value to decide on the course
    of action they want.


    A code block would typically access `count` by specifying the following expression,
    which consists of the class name followed by the `.` operator followed by the
    field name:


    ```

    Counter.count

    ```


    You could specify `Counter.count = 1;` to initialize `count` to `1`. You could
    specify `System.out.println(Counter.count)` to read `count`’s value, which is
    then output.


    ### Class Methods


    A *class method* (also known as a *static method*) is declared by prepending reserved
    word `static` to the declaration, as in the following syntax:


    ```

    ''static'' returnType identifier ''('' [parameterList] '')''

    ''{''

    // method body

    ''}''

    ```


    Unlike an instance method, which can access its copy of an instance field, a class
    method cannot access any instance fields. However, it can access class fields.


    Consider Listing [6-3](#615966_1_En_6_Chapter.xhtml#PC37)’s example of a `Temperature`
    utility class.


    ```

    class Temperature

    {

    static double c2f(double degrees)

    {

    return degrees * 9.0 / 5.0 + 32.0;

    }

    }

    Listing 6-3

    Temperature.java

    ```


    `Temperature` declares a single utility method: `c2f()`. This method converts
    the argument passed to parameter `degrees` from `Celsius` to `Fahrenheit` and
    returns the result.


    I’ve created a `UseTemperature` class that demonstrates `Temperature`. Listing
    [6-4](#615966_1_En_6_Chapter.xhtml#PC38) presents its source code.


    ```

    class UseTemperature

    {

    public static void main(String[] args)

    {

    System.out.println(Temperature.c2f(37));

    }

    }

    Listing 6-4

    UseTemperature.java

    ```


    Assuming that `Temperature.java` and `UseTemperature.java` are located in the
    same directory, you can compile both source files by using the following handy
    trick:


    ```

    javac *.java

    ```


    The `*` (asterisk) character serves as a wildcard that matches all *Java source
    files* (files with the `.java` file extension) in the current directory.


    Assuming that nothing goes wrong, you should observe `Temperature.class` and `UseTemperature.class`
    files in the current directory.


    Run the resulting application as follows:


    ```

    java UseTemperature

    ```


    You should observe the following output:


    ```

    98.6

    ```


    Note that 37 degrees Celsius is equivalent to 98.6 degrees Fahrenheit (the normal
    body temperature).


    Look carefully at Listing [6-4](#615966_1_En_6_Chapter.xhtml#PC38): you’ll notice
    something interesting. The `main()` method is marked `static`. This method serves
    as a utility method for defining an application’s entry point – every application
    class is a utility class. When you run the application via the `java` tool, this
    tool loads the JVM, and `main()` gets executed.


    ### Class Initialization


    Classes are initialized through class field initializers and class initialization
    blocks, which are equivalent to instance field initializers and instance initialization
    blocks.


    Note


    When a class is loaded into memory, the JVM zeroes the class’s static fields.


    #### Explicit Field Initialization via a Class Field Initializer


    A *class field initializer* (also known as a *static field initializer*) is an
    assignment operator followed by an expression that is type compatible with a class
    field’s type and that assigns the expression’s value to the class field. For example,
    consider the following `Product` class:


    ```

    class Product

    {

    static int productID = 1;

    void manufacture(String name)

    {

    // ...

    System.out.println("Manufacturing product " + productID++);

    }

    // ...

    }

    ```


    `Product` represents some kind of manufactured product. The `productID` field
    is marked `static` because it describes a product identification number. This
    number starts at `1` thanks to the class field initializer that assigns `1` to
    `productID` and is incremented in `manufacture()` after a product has been manufactured.


    #### Class Initialization Block


    A *class initialization block* (also known as a *static initialization block*)
    is a `static`-prefixed block of statements introduced into a class body. For example,
    consider the following `Graphics` class, which is part of a simple graphics package:


    ```

    class Graphics

    {

    static double[] sines, cosines;

    static

    {

    sines = new double[360];

    cosines = new double[360];

    for (int i = 0; i < sines.length; i++)

    {

    sines[i] = sin(toRadians(i));

    cosines[i] = cos(toRadians(i));

    }

    }

    // ...

    }

    ```


    `Graphics` declares `sines` and `cosines` array variables. It also declares a
    class initialization block that creates 360-element arrays of `double`s whose
    references are assigned to `sines` and `cosines`. It then uses a `for` loop to
    initialize these array elements to the appropriate sine and cosine values by calling
    `sin()` and `cos()` methods. The loop index in `i` represents a degree unit from
    0 to 360 degrees. This argument is passed to `toRadians()` in each of the calls
    to `sin()` and `cos()` to convert the degree value to radians.


    Tip


    Performance is important to graphics applications, and it’s faster to access an
    array element than to call a method. As a result, developers resort to performance
    tricks such as creating and initializing arrays of sines and cosines.


    Note


    For each class, the compiler generates a `<clinit>()` method that contains the
    bytecode for all class initialization that takes place. The compiler works its
    way from the top of the class to the bottom, placing bytecode for each encountered
    class field initializer and class initialization block into this method. The JVM
    invokes `<clinit>()` at runtime after loading its class file into memory.


    ### Field-Access Rules


    Fields are accessed in different ways depending on the kind of field (object or
    class) and context (from within a class or from code external to the class). These
    four rules will help you avoid mistakes when accessing different kinds of fields
    in different contexts:


    *   Specify an instance field name without a prefix when accessing this field
    from another instance field, constructor, or instance method in the same class.
    Example: `make`.


    *   Specify a class field name without a prefix when accessing this field from
    another instance or class field, constructor, or instance or class method in the
    same class. Example: `count`.


    *   Specify an object reference followed by the `.` operator followed by the instance
    field name when accessing this field (provided that it is accessible) from outside
    of its class or from a class method in the same class. Example: `v.make`.


    *   Specify a class name followed by the `.` operator followed by the class field
    name when accessing this field (provided that it is accessible) from outside of
    its class. Example: `Counter.count`.


    Don’t forget that, in some cases, shadowing is an issue. You can resolve it by
    prepending `this` followed by the `.` operator to an instance field name or the
    class name followed by the `.` operator to a class field name. For example, if
    you had to assign a parameter value to a same-named instance field, you would
    also prepend `this` and the `.` operator to the field name.'
