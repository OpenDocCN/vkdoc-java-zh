    ```

    operand1 ''||'' operand2

    ```


    Each of *operand1* and *operand2* must be of type `boolean`. This expression returns
    true when either or both *operand1* and *operand2* are true; otherwise, it returns
    false.


    Consider the following example:


    ```

    int x = 93;

    boolean outOfRange = (x  50);

    ```


    The example first initializes `x` to `93`. It then uses `x` with the logical OR
    operator to determine if `x` is outside the range `10` through `50`. Because `x`
    is not in this range (it contains `93`), true is assigned to `outOfRange`.


    Because `x` equals `93`, both the `x < 10` and `x > 50` expressions are evaluated.
    However, if `x` equalled `5`, only the `x < 10` expression would need to be evaluated
    because of short-circuiting.


    Short-circuiting can help you avoid invoking a method on a null reference. Consider
    the following example:


    ```

    str == null || str.isEmpty()

    ```


    In this example, `str` references a `String` object. We want to call `String`’s
    `isEmpty()` method on this object to determine if the string contains any characters
    or not. However, if `str` contains null, invoking `isEmpty()` will result in `NullPointerException`.
    We avoid this possibility by first testing `str` for null via the expression `str
    == null`. If `str` contains null, `str == null` is true and `||` does not evaluate
    `str.isEmpty()`, preventing `NullPointerException`. However, if `str` does not
    contain null, `str == null` is false and `||` evaluates `str.isEmpty()`, preventing
    `NullPointerException`. You’ll learn about `String`, methods, and `NullPointerException`
    later in Chapters [13](#615966_1_En_13_Chapter.xhtml), [6](#615966_1_En_6_Chapter.xhtml),
    and [11](#615966_1_En_11_Chapter.xhtml), respectively.


    #### Logical AND Operator


    The *&&* *operator* evaluates its left operand and evaluates its right operand
    only when its left operand is true. This is also known as *short-circuiting*.
    It has the following syntax:


    ```

    operand1 ''&&'' operand2

    ```


    Each of *operand1* and *operand2* must be of `boolean` type. This expression returns
    true when both *operand1* and *operand2* are true; otherwise, it returns false.


    Consider the following example:


    ```

    int x = 93;

    boolean inRange = (x >= 10 && x <= 50);

    ```


    This example is essentially the same as the example in the previous section. It
    simply inverts the behavior of that example.


    Short-circuiting can help you avoid invoking a method on a null reference. Consider
    the following example:


    ```

    str != null && !str.isEmpty()

    ```


    This example is essentially the same as the example in the previous section. It
    simply inverts the behavior of that example.


    #### Bitwise Inclusive OR Operator


    The *|* *operator* inclusive ORs the bits of its operands together. For each bit,
    if either or both bits are 1, the result bit is 1; otherwise, the result bit is
    0\. This operator has the following syntax:


    ```

    operand1 ''|'' operand2

    ```


    Each of *operand1* and *operand2* must be of `char`, `byte`, `short`, `int`, or
    `long` type. This expression returns the inclusive ORed result.


    Consider the following example:


    ```

    byte status = readPort(DEVICE);

    writePort(DEVICE, status | ENABLE_PRINTER);

    ```


    This example reads a status byte from a hypothetical computer’s `DEVICE` port.
    It then enables the printer by ORing the `ENABLE_PRINTER` value with the `status`
    field (in case the printer isn’t enabled) and writes this value to the `DEVICE`
    port.


    The `|` operator can be used like `||` but does not perform short-circuiting.
    It always evaluates its right operand. Here is an example:


    ```

    x  50

    ```


    The right operand (`x > 50`) is always evaluated in this example.


    #### Bitwise Exclusive OR Operator


    The *^* *operator* exclusive ORs the bits of its operands together. For each bit,
    if either bit is 1 but both bits are not 1, the result bit is 1; otherwise, the
    result bit is 0\. This operator has the following syntax:


    ```

    operand1 ''^'' operand2

    ```


    Each of *operand1* and *operand2* must be of `char`, `byte`, `short`, `int`, or
    `long` type. This expression returns the exclusive ORed result.


    Consider the following example:


    ```

    int i = 10;

    int j = 20;

    i = i ^ j; // 30

    j = i ^ j; // 10

    i = i ^ j; // 20

    ```


    This example uses `^` to swap the contents of variables `i` and `j`.


    #### Bitwise AND Operator


    The *&* *operator* ANDs the bits of its operands together. For each bit, if both
    bits are 1, the result bit is 1; otherwise, the result bit is 0\. This operator
    has the following syntax:


    ```

    operand1 ''&'' operand2

    ```


    Each of *operand1* and *operand2* must be of `char`, `byte`, `short`, `int`, or
    `long` type. This expression returns the exclusive ANDed result.


    Consider the following example:


    ```

    byte status = readPort(DEVICE);

    writePort(DEVICE, status & ~ENABLE_PRINTER);

    ```


    This example reads a status byte from a hypothetical computer’s `DEVICE` port.
    It then disables the printer by ANDing the inverse of the `ENABLE_PRINTER` value
    with the `status` field (in case the printer is enabled) and writes this value
    to the `DEVICE` port.


    The `&` operator can be used like `&&` but does not perform short-circuiting.
    It always evaluates its right operand. Here is an example:


    ```

    x >= 10 & x <= 50

    ```


    The right operand (`x <= 50`) is always evaluated in this example.


    #### Equality Operators


    Java supports the is equal to (`==`) and is not equal to (`!=`) equality operators.


    ##### Is Equal To


    The *==* *operator* compares both operands for equality. This operator has the
    following syntax:


    ```

    operand1 ''=='' operand2

    ```


    The `==` operator returns true when both operands are equal; otherwise, it returns
    false.


    Here is an example:


    ```

    int x = 10;

    int y = 15;

    boolean equal = x == y;

    ```


    In this example, each of `x` and `y` contains an integer. The `x == y` expression
    returns false because `x` (`10`) does not equal `y` (`15`).'
