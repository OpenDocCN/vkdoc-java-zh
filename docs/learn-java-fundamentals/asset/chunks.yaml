- fmt: "### JAR Files\n\nDistributing a package by specifying instructions for creating\
    \ the necessary directory structure along with the package’s class files (and\
    \ instructions on which class files to store in which directories) is a tedious\
    \ and error-prone task. Fortunately, JAR files offer a better alternative.\n\n\
    A *JAR (Java ARchive) file* is a Zip archive with a `.jar` file extension (instead\
    \ of the `.zip` extension). It includes a special `META-INF` directory containing\
    \ `manifest.mf` (a special file that stores information about the contents of\
    \ the JAR file) and a hierarchical directory structure that organizes class files.\n\
    \nYou use the JDK’s `jar` tool to create and maintain a JAR file. You can also\
    \ view the JAR file’s table of contents. To show you how easy it is to use this\
    \ tool, we’ll create a `logging.jar` file that stores the contents of the `logging`\
    \ package. We’ll then access this JAR file when running `TestLogging.class`.\n\
    \n**Note**\n\nIf you try to run `jar` on Windows, you will probably discover an\
    \ error message that `jar` cannot be found. This is due to JDK 21 storing only\
    \ a few important executables in a special directory and setting the `PATH` environment\
    \ variable to point to this directory during installation. For example, on the\
    \ Windows 8.1 platform that I’m using to write this book, my `C:\\Program Files\\\
    Common Files\\Oracle\\Java\\javapath` path is added to `PATH`. The `javapath`\
    \ directory contains `java.exe`, `javac.exe`, and a couple of other commonly run\
    \ executables. To access `jar` (and any other JDK tools I might want to use),\
    \ I need to add my `C:\\Program Files\\java\\jdk-21\\bin` directory to `PATH`.\
    \ I can do this temporarily by specifying `set path=%path%;C:\\Program Files\\\
    java\\jdk-21\\bin`. Alternatively, I can make this permanent by using the Windows\
    \ Control Panel. You will want to do something equivalent on your platform.\n\n\
    Create `logging.jar` as follows:\n\n1.  Make sure that the current directory contains\
    \ the previously created `logging` subdirectory and that `logging` contains `Logger.class`,\
    \ `LoggerFactory.class`, `Console.class`, and `File.class`.\n\n2.  Execute the\
    \ following command:\n\n    ```\n    jar cf logging.jar logging\\*.class\n   \
    \ ```\n\nThe `c` option stands for “create new archive,” and the `f` option stands\
    \ for “specify archive file name.”\n\nYou should now find a `logging.jar` file\
    \ in the current directory. Prove to yourself that this file contains the four\
    \ class files by executing the following command, where the `t` option stands\
    \ for “list table of contents”:\n\n```\njar tf logging.jar\n```\n\nYou can run\
    \ `TestLogging.class` by adding `logging.jar` to its class path. For example,\
    \ assuming that `logging.jar` is located in the same directory as `TestLogging.class`,\
    \ you can run `TestLogging` under Windows via the following command:\n\n```\n\
    java -classpath logging.jar;. TestLogging\n```\n\nFor convenience, you could specify\
    \ the shorter `-cp` instead of the longer `-classpath`.\n\n## What’s Next?\n\n\
    Executing applications are prone to fail. Failure comes in different forms. Java\
    \ classifies a failure as either an exception or an error. We’ll review these\
    \ failure categories and look at Java’s language features for detecting failure\
    \ and taking appropriate action to handle this failure in the next chapter.\n\n\
    # 11. Exceptions and Errors\n\nIn an ideal world, nothing bad ever happens when\
    \ an application runs. For example, a file always exists when the application\
    \ needs to open the file, the application is always able to connect to a remote\
    \ computer, and the Java Virtual Machine (JVM) never runs out of memory when the\
    \ application needs to instantiate objects.\n\nIn contrast, real-world applications\
    \ occasionally attempt to open files that do not exist, attempt to connect to\
    \ remote computers that are unable to communicate with them, and require more\
    \ memory than the JVM can provide. Your goal is to write code that properly responds\
    \ to these and other exceptional situations (exceptions).\n\nThis chapter introduces\
    \ you to exceptions and errors (a relative of exceptions). After defining these\
    \ terms, the chapter looks at representing exceptions and errors in source code.\
    \ It then examines the topics of throwing and handling exceptions and concludes\
    \ by discussing how to perform cleanup tasks before a method returns, whether\
    \ or not an exception has been thrown.\n\nYou will discover two statements related\
    \ to exceptions (`try` and `try`-`with`-`resources`):\n\n*   The `try` statement\
    \ surrounds a block of code that can throw exceptions and errors. This statement’s\
    \ `try` block must be followed by a combination of `catch` blocks that handle\
    \ these exceptions and/or a `finally` block for performing cleanup tasks.\n\n\
    *   The `try`-`with`-`resources` statement is similar to the `try` statement but\
    \ lets you automatically close any open resources when execution leaves the `try`\
    \ block.\n\n## What Are Exceptions and Errors?\n\nA Java program fails when its\
    \ normal execution flow is interrupted by unexpected behavior. For example, the\
    \ program attempts to open a file that doesn’t exist or tries to divide an integer\
    \ by 0. Maybe the program tries to create a very large array but there is insufficient\
    \ free memory to accommodate the memory-allocation request.\n\nJava categorizes\
    \ a failure as either an exception or an error. An *exception* is a failure that\
    \ occurs because something beyond the program’s control (such as attempting to\
    \ open a nonexistent file) has occurred or because of a bug in the code (division\
    \ by 0 attempt). (In other words, it is a divergence from the normal flow of execution.)\
    \ In the first case, there was no way to prevent the exception so the program\
    \ would need to recover by taking corrective action. In the second case, the exception\
    \ would not have happened if the program had been written correctly.\n\nAn *error*\
    \ is a failure that is non-recoverable. Many errors involve the JVM, for example,\
    \ running out of memory or attempting to load a corrupt class file. Some errors\
    \ have nothing to do with the JVM, such as an input/output error or an assertion\
    \ evaluating to false. (An *assertion* is a Boolean expression that must be true\
    \ for execution to continue.)\n\n**Note**\n\nAs a rule, don’t handle an error\
    \ because the JVM might not be able to recover from it. For example, once memory\
    \ is exhausted, the JVM probably must be shut down. (An exception handler might\
    \ try to release an object that’s claiming a lot of memory, but that might not\
    \ work.) Also, how would a program fix a corrupt class file?\n\nJava classifies\
    \ exceptions arising from external factors (such as a missing file) as *checked\
    \ exceptions*. The Java compiler checks that such exceptions are either *handled*\
    \ (corrected) where they occur or documented to be handled elsewhere.\n\nJava\
    \ classifies exceptions that arise from buggy code as *runtime exceptions*. These\
    \ exceptions should be fixed by the programmer. Because the compiler doesn’t check\
    \ that runtime exceptions are handled or documented to be handled elsewhere, you\
    \ can think of a runtime exception as an *unchecked exception*.\n\nExceptions\
    \ are handled by *exception handlers*, which are sequences of code that respond\
    \ to the exceptions and take appropriate action. An exception handler interrogates\
    \ the context (e.g., reads values from variables that were in scope when the exception\
    \ occurred) and uses what it learns to restore the Java program to a flow of normal\
    \ behavior. For example, an exception handler might read a saved file name and\
    \ prompt, via a dialog box, the user to replace the missing file, whose name is\
    \ shown, and then close the dialog box.\n\n**Note**\n\nYou might modify a program\
    \ to handle a runtime exception, but it’s better to fix the source code. Runtime\
    \ exceptions often arise from passing invalid arguments to a library’s methods;\
    \ the buggy calling code should be fixed."
