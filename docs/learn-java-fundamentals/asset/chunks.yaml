- fmt: '### A More Practical Static Class Example


    `SCDemo` gives you an opportunity to learn how to use static classes, but consider
    a more practical example. I’ve created a small `Rectangle` class (which is useful
    in a graphics context) that benefits from a pair of static classes. Listing [9-3](#615966_1_En_9_Chapter.xhtml#PC7)
    presents `Rectangle`’s source code.


    ```

    abstract class Rectangle

    {

    static class Float extends Rectangle

    {

    float x, y, w, h;

    Float()

    {

    }

    Float(float x, float y, float w, float h)

    {

    this.x = x;

    this.y = y;

    this.w = w;

    this.h = h;

    }

    @Override

    double getX()

    {

    return x;

    }

    @Override

    double getY()

    {

    return y;

    }

    @Override

    double getW()

    {

    return w;

    }

    @Override

    double getH()

    {

    return h;

    }

    }

    static class Double extends Rectangle

    {

    double x, y, w, h;

    Double()

    {

    }

    Double(double x, double y, double w, double h)

    {

    this.x = x;

    this.y = y;

    this.w = w;

    this.h = h;

    }

    @Override

    double getX()

    {

    return x;

    }

    @Override

    double getY()

    {

    return y;

    }

    @Override

    double getW()

    {

    return w;

    }

    @Override

    double getH()

    {

    return h;

    }

    }

    boolean contains(double x, double y)

    {

    return (x >= getX() && x = getY() && y < getY() + getH());

    }

    abstract double getX();

    abstract double getY();

    abstract double getW();

    abstract double getH();

    }

    Listing 9-3

    Rectangle.java

    ```


    `Rectangle` describes a rectangular shape in terms of upper-left corner coordinates
    (`x` and `y`) and extents (width and height). This class is declared `abstract`
    because it declares four abstract methods: `getX()`, `getY()`, `getW()`, and `getH()`.
    Recall from Chapter [8](#615966_1_En_8_Chapter.xhtml) that it is an error to declare
    abstract methods in a non-abstract class.


    `Rectangle` also declares a `boolean contains(double x, double y)` method that
    returns `true` when the point described by `x` and `y` lies inside the rectangle;
    otherwise, it returns `false`. The `contains()` method compares the arguments
    passed to itself with expressions formed by invoking `Rectangle`’s abstract methods.


    The most interesting part of `Rectangle` is its declaration of two static classes.
    These classes provide the fields needed to store a `Rectangle` object’s location
    and extents.


    The first static class is `Float`, and the second static class is `Double`. Each
    class declares `x`, `y`, `w` (width), and `h` (height) fields. Also, each class
    declares a no-argument constructor that initializes these fields to 0. This is
    followed by a constructor that explicitly initializes these fields to passed arguments.


    **Note:** If a no-argument constructor is not declared, it will not be possible
    to invoke this constructor because the compiler will not generate the equivalent
    `<init>()` method – see Chapter [6](#615966_1_En_6_Chapter.xhtml) for a brief
    introduction to `<init>()`.


    `Float` and `Double` then declare `getX()`, `getY()`, `getW()`, and `getH()` methods
    that return the values of these fields. The only difference is that one set of
    fields and methods is of type `float` whereas the other set of fields and methods
    is of type `double`.


    These methods are prefixed with the `@Override` annotation because `Float` and
    `Double` extend `Rectangle` and override their abstract `getX()`, `getY()`, `getW()`,
    and `getH()` counterparts, which `Rectangle` declares. (Except for a brief discussion
    of `@Override` in Chapter [7](#615966_1_En_7_Chapter.xhtml), I don’t discuss annotations
    in this book because I don’t consider it to be a fundamental feature.)


    You might be confused by this unusual organization. Perhaps the best way to understand
    it is to look at Listing [9-4](#615966_1_En_9_Chapter.xhtml#PC8), which presents
    the source code to a `UseRect` application that demonstrates `Rectangle`.


    ```

    class UseRect

    {

    public static void main(String[] args)

    {

    System.out.println("Rectangle.Float Demo");

    System.out.println();

    Rectangle r = new Rectangle.Float(10.0f, 20.0f, 30f, 40f);

    System.out.println(r.getX());

    System.out.println(r.getY());

    System.out.println(r.getW());

    System.out.println(r.getH());

    System.out.println("contains(40.0, 45.0): " + r.contains(35.0, 40.0));

    System.out.println("contains(80.0, 45.0): " + r.contains(80.0, 40.0));

    System.out.println();

    System.out.println("Rectangle.Double Demo");

    System.out.println();

    r = new Rectangle.Double(15.0, 25.0, 35, 45);

    System.out.println(r.getX());

    System.out.println(r.getY());

    System.out.println(r.getW());

    System.out.println(r.getH());

    System.out.println("contains(40.0, 45.0): " + r.contains(40.0, 45.0));

    System.out.println("contains(80.0, 45.0): " + r.contains(80.0, 45.0));

    }

    }

    Listing 9-4

    UseRect.java

    ```


    Notice the following statements:


    ```

    Rectangle r = new Rectangle.Float(10.0f, 20.0f, 30f, 40f);

    r = new Rectangle.Double(15.0, 25.0, 35, 45);

    ```


    The first statement instantiates the `Float` class, and the second statement instantiates
    the `Double` class. The arguments passed to each class’s constructor are stored
    in its `x`, `y`, `w`, and `h` fields. Because `Float` and `Double` extend `Rectangle`,
    the returned object is also of type `Rectangle`, and its reference can be assigned
    to `Rectangle` variable `r`.


    Each of `Float` and `Double` extends `Rectangle` to provide floating-point and
    double-precision floating-point `Rectangle` implementations. `Float` exists to
    reduce memory consumption (you might have thousands or more of these objects when
    constructing a scene), and `Double` exists for when greater accuracy is required.


    When a `Rectangle` method, such as `getX()`, is called, as in `r.getX()`, subtype
    polymorphism takes over. The upcasting and late binding mechanism (see Chapter
    [8](#615966_1_En_8_Chapter.xhtml)) that Java uses to implement subtype polymorphism
    causes `Float`’s `getX()` method (in the first statement) and `Double`’s `getX()`
    method (in the second statement) to be called.


    Compile Listings [9-3](#615966_1_En_9_Chapter.xhtml#PC7) and [9-4](#615966_1_En_9_Chapter.xhtml#PC8)
    as follows:


    ```

    javac *.java

    ```


    Run the application as follows:


    ```

    java UseRect

    ```


    You should observe the following output:


    ```

    Rectangle.Float Demo

    10.0

    20.0

    30.0

    40.0

    contains(40.0, 45.0): true

    contains(80.0, 45.0): false

    Rectangle.Double Demo

    15.0

    25.0

    35.0

    45.0

    contains(40.0, 45.0): true

    contains(80.0, 45.0): false

    ```'
