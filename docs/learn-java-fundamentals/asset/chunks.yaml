    ## BigDecimal


    许多开发者使用 `double` 和 `float` 类型来表示货币金额。然而，这种做法并不被推荐。问题在于“`float` 和 `double` 无法精确表示我们用于货币的十进制倍数”。我从
    [`http://stackoverflow.com/questions/3730019/why-not-use-double-or-float-to-represent-currency`](http://stackoverflow.com/questions/3730019/why-not-use-double-or-float-to-represent-currency)
    摘录了此答案，该答案随后对此进行了深入阐述。


    开发者也会使用 `int` 和 `long` 类型来表示以“分”为单位的货币金额，但这种方法同样存在问题。针对 Stack Overflow 上“为什么应用程序通常不使用
    `int` 在内部表示货币金额？”的问题（[`http://stackoverflow.com/questions/5356123/why-dont-applications-typically-use-int-to-internally-represent-currency-values`](http://stackoverflow.com/questions/5356123/why-dont-applications-typically-use-int-to-internally-represent-currency-values)），Matt
    解释道：


    “这并不能简化编码。1.10 美元转换为 110 美分。没问题，但当你需要计算税金时（例如，1.10 美元 * 4.225% —— 密苏里州的税率，结果为
    0.046475 美元）该怎么办？为了将所有金额保持为整数，你还必须将销售税转换为整数（4225），这需要将 110 美分进一步转换为 11000000。那么计算就变成了
    11000000 * 4225 / 100000 = 464750。这就产生了一个问题，因为现在我们有了以美分的小数部分表示的值（分别为 11000000
    和 464750）。这一切都是为了将货币存储为整数。


    因此，以本币单位进行思考和编码更为容易。在美国，这将是美元，美分作为小数部分（例如，1.10 美元）。用 110 美分来编码则不那么自然。使用十进制浮点数（例如
    Java 的 `BigDecimal` 和 .NET 的 `Decimal`）对于货币值来说通常足够精确（相比于像 `Float` 和 `Double` 这样的二进制浮点数）。”


    `BigDecimal` 类描述了不可变的、任意精度的有符号十进制数。根据 `BigDecimal` 的 JDK 文档，“一个 `BigDecimal` 由一个任意精度的整数未缩放值和一个
    32 位整数标度组成。如果标度为零或正数，则标度表示小数点右侧的位数。如果标度为负数，则数字的未缩放值乘以 10 的标度绝对值次幂。因此，由 `BigDecimal`
    [类] 表示的数字的值为 (unscaledValue × 10^(-scale))。”


    `BigDecimal` 是进行货币计算的理想选择。清单 12-4 展示了源代码。


    ```

    // BigDecimal Demo

    import java.math.BigDecimal;

    import java.math.RoundingMode;

    class BDD

    {

    public static void main(String[] args)

    {

    BigDecimal purchaseAmount = new BigDecimal("586.32");

    BigDecimal pstRate = new BigDecimal("0.06");

    System.out.println("Purchase amount: " + purchaseAmount);

    System.out.println("PST rate: " + pstRate);

    // Calculate provincial sales tax on purchase.

    BigDecimal pst = purchaseAmount.multiply(pstRate);

    System.out.println("PST: " + pst);

    pst = pst.setScale(2, RoundingMode.HALF_UP);

    System.out.println("PST: " + pst);

    }

    }

    清单 12-4

    BDD.java

    ```


    清单 12-4 展示了一个演示 `BigDecimal` 的简单应用程序的源代码。


    `main()` 方法首先调用 `BigDecimal(String val)` 构造函数来构造一个 `BigDecimal` 对象，表示 586 美元 32
    美分的购买金额，然后构造一个 `BigDecimal` 对象，表示 6% 的省销售税率（我住在加拿大）。


    然后，该方法在每个对象上调用 `System.out.println()` 来输出其值（在幕后，`System.out.println()` 调用 `BigDecimal`
    的 `toString()` 方法将 `BigDecimal` 对象转换为字符串，然后输出）。


    此时，`main()` 调用 `BigDecimal` 的 `BigDecimal multiply(BigDecimal multiplicand)` 方法，将购买金额乘以
    PST 税率。返回的 `BigDecimal` 对象的引用被赋值给局部变量 `pst`。


    返回的 `BigDecimal` 对象显示了四位小数（美分）。在处理货币时，我们习惯使用两位小数。我们可以通过调用 `BigDecimal` 的 `BigDecimal
    setScale(int newScale, RoundingMode roundingMode)` 方法来实现两位小数。`main()` 方法调用此方法，将
    `2` 作为新的标度（我们需要两位小数），并将 `RoundingMode.HALF_UP` 作为舍入模式——四舍五入是我们上学时学到的舍入模式。


    注意


    `RoundingMode` 是*枚举类型*的一个例子，它是一种引用类型，由作为对象实现的命名常量组成。我在本书中没有讨论枚举类型，因为我认为它不是一个基础特性。


    最后，`main()` 输出四舍五入后的 PST 值。


    按如下方式编译清单 12-4：


    ```

    javac BDD.java

    ```


    按如下方式运行应用程序：


    ```

    java BDD

    ```


    您应该会看到以下输出：


    ```

    Purchase amount: 586.32

    PST rate: 0.06

    PST: 35.1792

    PST: 35.18

    ```

