- fmt: '### Bitwise Right Shift with Zero Extension


    The `>>>` operator shifts the bits in its left operand to the right by the number
    of bits specified by its right operand. For each shift, a 0 is shifted to the
    right and the rightmost bit is discarded. This is known as an *unsigned shift*.
    This operator has the following syntax:


    ```

    operand1 ''>>>'' operand2

    ```


    Each of `operand1` and `operand2` must be of `char`, `byte`, `short`, `int`, or
    `long` type. This expression returns the result of `operand1` shifted `operand2`
    bits to the left.


    Consider the following example:


    ```

    4 >>> 1

    -4 >>> 1

    ```


    The first expression shifts `4` by `1` bit to the right. The result is 2. The
    second expression shifts `-4` by `1` bit to the right. The result is 2147483646
    (the unsigned equivalent of -2). Essentially, we are dividing 4 or -4 by 2. This
    is much faster than using the `/` operator. However, it is limited to dividing
    by small powers of 2.


    For each kind of shift that involves a 32-bit expression, only the five low-order
    bits of `operand2` are used to prevent shifting more than the number of bits in
    a 32-bit integer. For each kind of shift that involves a 64-bit expression, only
    the six low-order bits of `operand2` are used to prevent shifting more than the
    number of bits in a 64-bit expression.


    ### Additive Operators


    Java supports the addition/string concatenation (`+`) and subtraction (`-`) additive
    operators.


    #### Addition/String Concatenation


    The `+` operator adds its two numeric operands together and returns the sum. This
    operator has the following syntax:


    ```

    operand1 ''+'' operand2

    ```


    Each of `operand1` and `operand2` must be of `char`, `byte`, `short`, `int`, `long`,
    `float`, or `double` type. This expression returns the result of `operand1` plus
    `operand2`.


    Consider the following example:


    ```

    int x = 10;

    int y = 20;

    int sum = x + y;

    ```


    This example adds the values in variables `x` and `y`, which are assigned `10`
    and `20`, respectively. It then assigns the sum to variable `sum`.


    The `+` operator is also used to append a string to another string. This is known
    as *string concatenation*. It has the same syntax as addition.


    At least one of the operands must be of `String` type. The other operand is converted
    to a string before concatenation is performed.


    Consider the following example:


    ```

    "abc" + "def"

    ```


    The result is a new `String` object consisting of the sequence `abcdef`. (I discuss
    the `String` class in Chapter [13](#615966_1_En_13_Chapter.xhtml).)


    #### Subtraction


    The `-` operator subtracts its right numeric operand from its left numeric operand
    and returns the difference. This operator has the following syntax:


    ```

    operand1 ''-'' operand2

    ```


    Each of `operand1` and `operand2` must be of `char`, `byte`, `short`, `int`, `long`,
    `float`, or `double` type. This expression returns the result of `operand1` minus
    `operand2`.


    Consider the following example:


    ```

    int x = 10;

    int y = 20;

    int difference = x - y;

    ```


    This example subtracts the value in variable `y` from the value in variable `x`,
    which are assigned `20` and `10`, respectively. It then assigns the difference
    to variable `difference`.


    ### Multiplicative Operators


    Java supports the multiplication (`*`), division (`/`), and modulus (`%`) multiplicative
    operators.


    #### Multiplication


    The `*` operator multiplies its two numeric operands together and returns the
    product. This operator has the following syntax:


    ```

    operand1 ''*'' operand2

    ```


    Each of `operand1` and `operand2` must be of `char`, `byte`, `short`, `int`, `long`,
    `float`, or `double` type. This expression returns the result of `operand1` times
    `operand2`.


    Consider the following example:


    ```

    int x = 10;

    int y = 20;

    int product = x * y;

    ```


    This example multiplies together the values in variables `x` and `y`, which are
    assigned `10` and `20`, respectively. It then assigns the product to variable
    `product`.


    #### Division


    The `/` operator divides its left numeric operand by its right numeric operand
    and returns the dividend. This operator has the following syntax:


    ```

    operand1 ''/'' operand2

    ```


    Each of `operand1` and `operand2` must be of `char`, `byte`, `short`, `int`, `long`,
    `float`, or `double` type. This expression returns the dividend result of `operand1`
    divided by `operand2`.


    Consider the following example:


    ```

    int x = 10;

    int y = 20;

    int dividend = x / y;

    ```


    This example divides the value in variable `x` by the value in variable `y`, which
    are assigned `10` and `20`, respectively. It then assigns the dividend to variable
    `dividend`.


    #### Modulus


    The `%` operator divides its left numeric operand by its right numeric operand
    and returns the remainder. This operator has the following syntax:


    ```

    operand1 ''%'' operand2

    ```


    Each of `operand1` and `operand2` must be of `char`, `byte`, `short`, `int`, `long`,
    `float`, or `double` type. This expression returns the remainder result of `operand1`
    divided by `operand2`.


    Consider the following example:


    ```

    int x = 10;

    int y = 20;

    int remainder = x % y;

    ```


    This example divides the value in variable `x` by the value in variable `y`, which
    are assigned `10` and `20`, respectively. It then assigns the remainder to variable
    `remainder`.


    ### Unary Operators


    Java supports the pre-increment (`++`), pre-decrement (`--`), plus (`+`), minus
    (`-`), logical negation (`!`), bitwise complement (`~`), and type cast (`(`*type*`)`)
    unary operators.


    #### Pre-increment


    The `++` operator pre-increments its operand, which must be a variable of `char`,
    `byte`, `short`, `int`, `long`, `float`, or `double` type. The result is stored
    in the variable. It is a fast way of adding 1 to the variable. This operator has
    the following syntax:


    ```

    ''++'' variable

    ```


    Consider the following example:


    ```

    int x = 1;

    int y = ++x;

    ```


    After this example runs, each of `x` and `y` is assigned the value 2.


    #### Pre-decrement


    The `--` operator pre-decrements its operand, which must be a variable of `char`,
    `byte`, `short`, `int`, `long`, `float`, or `double` type. The result is stored
    in the variable. It is a fast way of subtracting 1 from the variable. This operator
    has the following syntax:


    ```

    ''--'' variable

    ```


    Consider the following example:


    ```

    int x = 1;

    int y = --x;

    ```


    After this example runs, each of `x` and `y` is assigned the value 0.


    #### Plus


    The `+` operator is a do-nothing operator (it is present for completeness). Its
    operand must be of `char`, `byte`, `short`, `int`, `long`, `float`, or `double`
    type. This operator has the following syntax:


    ```

    ''+'' operand

    ```


    Consider the following example:


    ```

    int x = +6;

    int y = +x;

    ```


    After the example runs, `y` is assigned 6.


    #### Minus


    The `-` operator negates its operand, which must be of `char`, `byte`, `short`,
    `int`, `long`, `float`, or `double` type. This operator has the following syntax:


    ```

    ''-'' operand

    ```


    Consider the following example:


    ```

    int x = 6;

    int y = -x;

    ```


    After the example runs, `y` is assigned -6.


    #### Logical Negation


    The `!` operator logically negates its operand, which must be of `boolean` type.
    This operand has the following syntax:


    ```

    ''!'' operand

    ```


    Consider the following example:


    ```

    boolean first = true;

    boolean second = !first;

    ```


    After the example runs, `second` contains false.


    #### Bitwise Complement


    The `~` operator flips all the bits in its operand, which must be of `char`, `byte`,
    `short`, `int`, or `long` type and returns the result. This operator has the following
    syntax:


    ```

    ''~'' operand

    ```


    Consider the following example:


    ```

    int x = 20;

    int y = ~x;

    ```


    After this example runs, `y` is assigned -20.'
