- fmt: '# Playing with Expressions


    Expressions can be fun to play with because you never know what you might discover.
    I’ve created an `ExprDemo` application and populated it with several example expressions
    that serve as a starting point in this exploration. Listing [3-1](#615966_1_En_3_Chapter.xhtml#PC77)
    presents `ExprDemo`’s source code.


    ```

    class ExprDemo

    {

    public static void main(String[] args)

    {

    System.out.println("\"abc\" instanceof String: " +

    ("abc" instanceof String));

    System.out.println("4 << 1: " + (4 << 1));

    System.out.println("-4 << 1: " + (-4 << 1));

    System.out.println("1 << 31: " + (1 << 31));

    System.out.println("1 << 32: " + (1 << 32));

    System.out.println("-1 << 31: " + (-1 << 31));

    System.out.println("-1 << 32: " + (-1 << 32));

    int x = 3;

    System.out.println("x++: " + x++);

    System.out.println("x: " + x);

    System.out.println("5 / 0: " + (5 / 0));

    }

    }

    Listing 3-1

    ExprDemo.java

    ```


    `ExprDemo` focuses on the `instanceof`, `+` (string concatenation), `()` (parenthesis),
    `<<` (shift left), `-` (negation), `=` (assignment), `++` (post-increment), and
    `/` (division) operators in the context of expressions whose values are passed
    as arguments in `System.out.println()` method calls.


    The first method call’s expression uses `instanceof` to determine if `"abc"` is
    an instance of `String`, which is an example of a class. (Chapter [6](#615966_1_En_6_Chapter.xhtml)
    will teach you about classes.) Recall that `instanceof` returns true when its
    left operand (a reference) is an instance of its right operand (a reference type);
    otherwise, it returns false.


    It turns out that the `"abc"` string literal is an instance of `String`, which
    makes `"abc"` special. You’ll learn how special string literals are in Chapter
    [13](#615966_1_En_13_Chapter.xhtml) (where I explore `String`).


    The first method call’s expression also uses `+` to concatenate two strings into
    a larger string. This operator’s left operand is string literal `"\"abc\" instanceof
    String: "` (note the `\"` escape sequence for placing a double quote character
    into a string literal), but the right operand is not a string: the parenthesized
    `"abc" instanceof String` expression evaluates to a Boolean true/false value.
    What is going on?


    Java’s `+` operator adds its numeric operands and returns their sum. However,
    when one of the operands is a string and the other operand is not a string, `+`
    uses *string conversion* to convert the non-string to a string. If the string
    is an object (you’ll learn about objects in Chapter [6](#615966_1_En_6_Chapter.xhtml)),
    `+` uses the object’s `toString()` method to obtain a string representation of
    the object. If the operand is a primitive type-based value (such as a Boolean
    true value), `+` converts the operand to a string without relying on `toString()`.
    The `+` operator appends the right operand string to the left operand string and
    returns the string that results from this concatenation.


    ## Using the Parenthesis Operator with String Concatenation


    You might wonder why I parenthesized `"abc" instanceof String` in `"\"abc\" instanceof
    String: " + ("abc" instanceof String)`. I did this because I want the output to
    read as follows:


    ```

    "abc" instanceof String: true

    ```


    Without the parentheses, I would have observed the following output:


    ```

    true

    ```


    String concatenation (`+`) has higher precedence than relational type checking
    for objects (`instanceof`). Without parentheses, the compiler generates bytecode
    as if the expression was parenthesized as follows:


    ```

    ("\"abc\" instanceof String: " + "abc") instanceof String

    ```


    The bytecode first evaluates `"\"abc\" instanceof String: " + "abc"`, which results
    in `"abcabc"`. It then evaluates `"abcabc" instanceof String`, which returns true.
    Finally, it executes `System.out.println()` with argument `true`, which is output.


    Here is another example expression that doesn’t evaluate as expected without parentheses:


    ```

    System.out.println("4 + 2: " + 4 + 2);

    ```


    This method call outputs `4 + 2: 42` instead of `4 + 2: 6`.


    Recall that associativity determines how an expression is evaluated when it contains
    two or more operators with the same precedence. For example, expression `"4 +
    2: " + 4 + 2` consists of sub-expression `"4 + 2: "`, sub-expression `4` (after
    the left `+` operator), and sub-expression `2` (after the right `+` operator).


    Expression `"4 + 2: " + 4 + 2` is evaluated as follows:


    1. `"4 + 2: " + 4` is evaluated. The result is string `"4 + 2: 4"`.

    2. `"4 + 2: 4" + 2` is evaluated. The result is string `"4 + 2: 42"`.


    This evaluation order can be clarified by using the parenthesis operator, as follows:


    ```

    (("4 + 2: " + 4) + 2)

    ```


    To change this expression so that you observe `4 + 2: 6`, you would wrap parentheses
    around `4 + 2`, as follows:


    ```

    "4 + 2: " + (4 + 2)

    ```


    This time, `(4 + 2)` would be evaluated first because the parenthesis operator
    has the highest precedence.


    The `<<` operator shifts its left operand to the left by the number of positions
    indicated by its right operand. The next six method calls demonstrate this operator.


    The expression in the first of these method calls shifts `4` to the left by one
    position. The result is `8`. This is equivalent to multiplying `4` by 2 but is
    faster.


    The second method call’s expression shifts `-4` to the left by one position. The
    result is `-8`. No surprise here!


    The third method call’s expression shifts `1` to the left by 31 positions. The
    result is -2147483648, which might seem surprising because `1` is positive and
    the result is negative. However, when you consider that a 32-bit value is being
    shifted left, its leftmost bit (position 31 – the rightmost bit is at position
    0) is the sign bit (with 0 being positive and 1 being negative), and 31 positions
    are being shifted with 1 being shifted into the sign bit, it is no surprise.


    Java represents integers in *two’s-complement* ([http://en.wikipedia.org/wiki/Two''s_complement](http://en.wikipedia.org/wiki/Two%2527s_complement))
    format, which lets you “reversibly convert a positive binary number into a negative
    binary number with equivalent negative value” by flipping all bits to their opposite
    states and adding 1 to the result. For example, assuming a 4-bit integer with
    position 3 as the sign bit, you would represent 5 as 0101. Flipping these bits
    would result in 1010. Adding 1 to the result would give you 1011, which is the
    bit pattern for -5 (1111 is the pattern for -1, 1110 is the pattern for -2, 1101
    is the pattern for -3, and 1100 is the pattern for -4). You could convert back
    to 5 by flipping all bits and adding 1 to the result.


    The result of the `1 << 32` expression in the fourth method call might be confusing.
    You might expect the result to be 0 because `1` is shifted past position 31 and
    0s are shifted behind it. However, the result is 1. If you recall from my earlier
    discussion of the shift operators, I said the following:


    “For a 32-bit expression, only the five low-order bits of *operand2* are used
    to prevent shifting more than the number of bits in a 32-bit integer.”


    The right operand (*operand2*) is `32`, which has 32-bit binary representation
    00000000000000000000000000100000. The five low-order bits are 00000, which equates
    to 0. Therefore, the left operand (`1`) is not shifted and remains the same.


    Expression `-1 << 31` in the second last of the six method calls that demonstrate
    the `<<` operator generates the same result as expression `1 << 31` because the
    rightmost bit in either case is 1 and all bits to the left are shifted out of
    the result. You end up with 100000000000000000000000000000000 in both cases. This
    results in -2147483648.


    Finally, expression `-1 << 32` produces a result of -1 for the same reason that
    `1 << 32` produces a result of 1. Only the five low-order bits of the right operand
    are used in the shift, and this results in an attempt to shift the left operand
    by zero bit positions.


    Now that the `<<` operator is out of the way, consider the `-` (negation) operator.
    Negation inverts the sign of its `4` operand in the second of the six `<<` operator
    examples. It also inverts the sign of its `1` operand in each of the fifth and
    sixth of these examples.


    We now move to the declaration of `int` variable `x`. This variable is assigned
    `3` via the `=` operator.


    Next, the output of expression `x++` in the `System.out.println("x++: " + x++)`
    method call is `3` because post-increment operator `++` returns the current value
    in its variable operand before incrementing the variable’s value. Essentially,
    it saves the current value in another memory location, performs the increment,
    and returns the saved value. The same is true for the post-decrement operator
    (`--`). In contrast, pre-increment (`++`) and pre-decrement (`--`) increment and
    decrement, respectively, their variable’s value and then return the result. To
    prove that the post-increment operation worked, the third-last method call outputs
    the value in `x`.


    The final `System.out.println()` method call’s expression attempts to divide by
    0 so you can see what Java does in response. You’ll discover that an `ArithmeticException`
    object is thrown with a “`/ by zero`” message that indicates an attempt to divide
    by 0. (I discuss exceptions in Chapter [11](#615966_1_En_11_Chapter.xhtml).)


    Compile Listing [3-1](#615966_1_En_3_Chapter.xhtml#PC77) as follows:


    ```

    javac ExprDemo.java

    ```


    Run the resulting application as follows:


    ```

    java ExprDemo

    ```


    You should discover the following output:


    ```

    "abc" instanceof String: true

    4 << 1: 8

    -4 << 1: -8

    1 << 31: -2147483648

    1 << 32: 1

    -1 << 31: -2147483648

    -1 << 32: -1

    x++: 3

    x: 4

    Exception in thread "main" java.lang.ArithmeticException: / by zero

    at ExprDemo.main(ExprDemo.java:16)

    ```'
