    count])");

    return;

    }

    switch (args[0])

    {

    case "-H":

    case "-h": System.out.println("help");

    return;

    case "-V":

    case "-v": System.out.println("version 1.0");

    return;

    default  : int count = 0;

    for (int i = 0; i  ''9'')

    {

    System.out.println("invalid character detected: " + digit);

    return;

    }

    count *= 10;

    count += digit - ''0'';

    }

    for (int i = 0; i < count; i++)

    System.out.print("*");

    System.out.println();

    }

    }

    }

    Listing 4-1

    StmtDemo.java

    ```


    `StmtDemo` focuses on the `if`, method-call, `return`, `switch`, simple-assignment,
    `for`, and compound-assignment statements.


    The `main()` method’s first example statement uses `if` to ensure that a single
    command-line argument has been specified. It evaluates Boolean expression `args.length
    != 1` and then executes a block when this isn’t the case (the Boolean expression
    evaluates to true because zero arguments were specified or more than one argument
    was specified).


    The second example statement uses the `System.out.println()` method call to output
    a usage message. `System.out.println()` is the first statement of the block.


    The third example statement uses `return` to exit the `main()` method and terminate
    the program. This is the second statement of the block.


    The fourth example statement uses `switch` to identify the first and only command-line
    argument passed to the program. The command-line argument is stored in `args[0]`,
    which is the first location in the `args` array. (I cover arrays in Chapter [5](#615966_1_En_5_Chapter.xhtml).)


    The `switch` statement presents additional statements via its `case`s.


    The first two `case`s compare `args[0]` with `"-H"` and `"-h"`, respectively.
    Notice that `case "-H"` is empty: it doesn’t specify any statements, not even
    a `break` statement. Because there is no `break` statement, execution falls through
    to `case "-h"`’s statements when `-H` is specified on the command line.


    The first of `case "-h"`’s statements is a `System.out.println()` method call
    that outputs a brief help message. Presumably, `-h` results in useful help information
    on program usage. In this example, I’ve provided a simple message to give you
    a sense of what could appear.


    The second of `case "-h"`’s statements is a `return` statement, which transfers
    execution out of the `switch` statement and the `main()` method, terminating the
    program.


    The next two `case`s compare `args[0]` with `"-V"` and `"-v"`, respectively. They
    are functionally identical to the first two cases but output a brief version number
    message instead.


    **Note**


    Many programs have version numbers. For example, `1.0` typically indicates the
    first version of a program. The number before the period (`.`) is often referred
    to as the major component, and the number after the period is often referred to
    as the minor component. In this example, “`1`” is the major component and “`0`”
    is the minor component.


    The major component indicates a major change to a program. The minor component
    indicates a minor change to a program. Check out Wikipedia’s “Software versioning”
    entry (`http://en.wikipedia.org/wiki/Software_versioning`) to learn more about
    version numbers.


    The `default` case is executed when something other than `-H`, `-h`, `-V`, or
    `-v` is specified on the command line.


    The first statement executed by `default` is a variation of the simple-assignment
    statement that declares and initializes, to 0, a `count` variable.


    The next statement to execute is a `for` statement that iterates over the command-line
    argument’s characters.


    The `for` statement declares an `int` variable named `i` and initializes this
    variable to `0` in its initialization section. It then compares this variable
    with `args[0].length()`, which returns the number of characters that make up the
    command-line argument.


    The `args[0].length()` expression consists of two operands separated by the member-selection
    operator (`.`). The `args[0]` operand uses the array index operator (`[]`) to
    return the first command-line argument from the array, which is expressed as a
    string. The `length()` operand is a `String` method that returns the number of
    characters in the string.


    The block that `for` executes begins with `char digit = args[0].charAt(i);`, which
    extracts the next character (which is expected to be a digit) from the `args[0]`
    string and assigns it to `char` variable `digit`. `String` provides a `charAt()`
    method that returns the character at the index specified by its single argument,
    which must be an `int`.


    The block next executes an `if` statement whose Boolean expression compares `digit`’s
    stored character with `''0''` and also with `''9''`. If this character is numerically
    less than `''0''`’s Unicode number or greater than `''9''`’s Unicode number, a
    block is invoked.


    **Note**


    When creating a Java program that is to be used in countries with digit characters
    other than 0 through 9 (see `http://en.wikipedia.org/wiki/Tamil_numerals` for
    an example), it is not a good idea to hard-code expressions such as `digit < ''0''
    || digit > ''9''`. Instead, you would invoke the `Character` class’s `boolean
    isDigit(char ch)` method to determine whether a character represents a digit or
    not. (`Character` is a member of Java’s reference type library.)


    The block first executes a `System.out.println()` method call to output an error
    message along with the offending character. (Note the `+` operator’s use in concatenating
    two strings into a third string.)


    The block then executes a `return` statement, which causes execution to leave
    `main()` and terminate the program.


    If the character stored in the `digit` variable is, in fact, a digit, execution
    proceeds to a pair of compound-assignment statements:


    ```

    count *= 10;

    count += digit - ''0'';

    ```


    The first compound-assignment statement reads `count`’s value, multiplies it by
    `10`, and stores the result in `count`. The second compound statement reads `count`’s
    value, adds the Unicode number in `digit` to this value, and then subtracts the
    Unicode number for `''0''`. The result is stored in `count`.


    The `main()` method’s last two example statements consist of a `for` statement
    to output `count` asterisks (`*`) and a `System.out.println();` method call statement
    to cause subsequent output to begin at the start of the next output line.


    Compile Listing [4-1](#615966_1_En_4_Chapter.xhtml#PC39) as follows:


    ```

    javac StmtDemo.java

    ```


    Run the resulting application as follows:


    ```

    java StmtDemo

    ```


    You should observe the following output:


    ```

    usage: java StmtDemo ([-h] | [-v] | [positive integer count])

    ```


    Now, run the application with the `-h` (or `-H`) command-line option:


    ```

    java StmtDemo -h

    ```


    The application responds by outputting the following message:


    ```

    help

    ```


    Continuing, run the application with the `-v` (or `-V`) command-line option:


    ```

    java StmtDemo -v

    ```


    You should observe the following output:


    ```

    version 1.0

    ```


    Finally, run the application with argument `10`:


    ```

    java StmtDemo 10

    ```


    You should now observe ten asterisks on the output line:


    ```

    **********

    ```


    ## What’s Next?


    Now that you’ve mastered statements, you can start to create interesting programs.
    The next chapter introduces the array, which lets you associate multiple values
    with a single variable. Arrays let you create programs that are more interesting
    than what you’ve seen so far in this book.'
