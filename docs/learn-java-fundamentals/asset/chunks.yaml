    Chapter [5](#615966_1_En_5_Chapter.xhtml) introduced you to arrays. You learned
    that arrays have fixed sizes and also learned that to resize an array, you have
    to create a new array of the desired size, then copy the elements from the current
    array to the new array, and finally destroy the current array. (I’ll talk about
    array destruction later in this chapter when I discuss garbage collection.)


    Let’s focus on resizing an array. Here is one way to accomplish this task:


    ```

    int[] src = new int[] { 20, 30, 50 };

    int[] dest = new int[10];

    for (int i = 0; i < src.length; i++)

    dest[i] = src[i];

    ```


    This code fragment first creates and initializes an `src` array of 32-bit integers.
    This array consists of three elements: `20`, `30`, and `50`.


    The fragment then creates a `dest` array of `int`s. This array consists of 10
    elements that are each initialized (behind the scenes) to 0.


    Finally, the fragment enters a `for` loop. This loop’s header creates local variable
    `i` and initializes it to 0. It then compares `i` to `src.length` (the length
    of the `src` array). If `i` is less than `src.length`, the loop continues and
    the `dest[i] = src[i];` assignment statement executes, copying `src[i]`’s integer
    to the equivalent `dest[i]` location. The end result for `dest` is `20, 30, 50,
    0, 0, 0, 0, 0, 0, 0`.


    There is a faster way to perform an array copy: `System`’s `arraycopy()` method.
    Here is the method’s signature:


    ```

    void arraycopy(Object src, int srcPos, Object dest, int destPos, int length)

    ```


    The `arraycopy()` method copies the number of elements specified by `length` from
    the `src` array starting at zero-based offset `srcPos` into the `dest` array starting
    at zero-based offset `destPos`. This method throws `java.lang.NullPointerException`
    when `src` or `dest` contains the null reference, `java.lang.ArrayIndexOutOfBoundsException`
    when copying causes access to data outside array bounds, and `java.lang.ArrayStoreException`
    when an element in the `src` array could not be stored to the `dest` array because
    of a type mismatch.


    **Caution**


    It’s easy to misspell `arraycopy()`. You might type an uppercase `C` instead of
    a lowercase `c`, which would ultimately result in a compiler error.


    I’ve created an `ArrayResize` application that demonstrates traditional and `arraycopy()`
    techniques for copying an array. Listing [14-1](#615966_1_En_14_Chapter.xhtml#PC3)
    presents its source code.


    ```

    public class ArrayResize

    {

    public static void main(String[] args)

    {

    int[] src = new int[] { 20, 30, 50 };

    int[] dest = new int[10];

    for (int i = 0; i < src.length; i++)

    dest[i] = src[i];

    dump(dest);

    int[] dest2 = new int[10];

    System.arraycopy(src, 0, dest2, 0, src.length);

    dump(dest2);

    }

    static void dump(int[] array)

    {

    for (int i = 0; i < array.length; i++)

    System.out.print(array[i] + " ");

    System.out.println();

    }

    }

    Listing 14-1

    ArrayResize.java

    ```


    The source code presents `main()` and `dump()` utility methods. The `main()` method
    runs the application, and `dump()` is a helper method that exists to support `main()`.


    After creating `src` and `dest`, and after copying `src` to `dest` in the traditional
    manner, `main()` dumps `dest` to the console. It then creates `dest2`, a second
    destination array.


    Continuing, `main()` executes `System.arraycopy(src, 0, dest2, 0, src.length);`.
    The first argument is a reference to the source array (`src`), and the third argument
    is a reference to the destination array (`dest`).


    A 0 is passed as the second and fourth arguments. The first `0` is the starting
    index in `src` from where an `int` value is read. The second `0` is the starting
    index in `dest` to where the `int` value is written.


    The final argument is the number of elements in the source array to be copied.
    This argument is obtained by executing `src.length`. If you recall, `.` is the
    member selection operator. It is accessing the read-only `length` member of the
    `src` array. Note that `length` is the only member of an array object.


    Compile Listing [14-1](#615966_1_En_14_Chapter.xhtml#PC3) as follows:


    ```

    javac ArrayResize.java

    ```


    Run the resulting application as follows:


    ```

    java ArrayResize

    ```


    You should observe the following output:


    ```

    20 30 50 0 0 0 0 0 0 0

    20 30 50 0 0 0 0 0 0 0

    ```


    The first line is the output from `dest`. The second line is the output from `dest2`.'
