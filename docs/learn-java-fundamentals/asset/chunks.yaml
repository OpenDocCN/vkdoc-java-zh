    #### 条件运算符


    *?: 运算符*根据条件决定对两个表达式中的哪一个进行求值。其语法如下：


    ```

    condition ''?'' expression1 '':'' expression2

    ```


    *条件*是一个布尔表达式。当条件求值为 true 时，将对 *expression1* 进行求值并返回其结果。然而，当条件求值为 false 时，将对 *expression2*
    进行求值并返回其结果。*expression1* 和 *expression2* 的类型必须一致，以避免编译器错误。例如，你不能让 *expression1*
    是 `int` 类型而 *expression2* 是 `double` 类型。


    以下示例展示了如何使用 `?:` 根据一位女性的 `age` 来判断她是否有资格领取养老金：


    ```

    int age = 60;

    boolean eligibleForPension = (age >= 55) ? true : false;

    ```


    因为 `age` 大于 `55`，所以 `true` 被赋值给 `eligibleForPension`。


    #### 逻辑或运算符


    *||* *运算符*会对其左操作数进行求值，并且仅当左操作数为 false 时，才对右操作数进行求值。这被称为*短路求值*。其语法如下：


    ```

    operand1 ''||'' operand2

    ```


    *operand1* 和 *operand2* 都必须为 `boolean` 类型。当 *operand1* 和 *operand2* 中有一个或两个都为
    true 时，此表达式返回 true；否则，返回 false。


    考虑以下示例：


    ```

    int x = 93;

    boolean outOfRange = (x < 10 || x > 50);

    ```


    该示例首先将 `x` 初始化为 `93`。然后，它使用逻辑或运算符结合 `x` 来判断 `x` 是否在范围 `10` 到 `50` 之外。因为 `x` 不在此范围内（其值为
    `93`），所以 `true` 被赋值给 `outOfRange`。


    由于 `x` 等于 `93`，表达式 `x < 10` 和 `x > 50` 都会被求值。但是，如果 `x` 等于 `5`，由于短路求值，则只需要对 `x
    < 10` 表达式进行求值。


    短路求值可以帮助你避免在空引用上调用方法。考虑以下示例：


    ```

    str == null || str.isEmpty()

    ```


    在此示例中，`str` 引用了一个 `String` 对象。我们想在此对象上调用 `String` 的 `isEmpty()` 方法，以判断该字符串是否包含任何字符。然而，如果
    `str` 包含 null，调用 `isEmpty()` 将导致 `NullPointerException`。我们通过首先使用表达式 `str == null`
    来测试 `str` 是否为空，从而避免了这种可能性。如果 `str` 包含 null，则 `str == null` 为 true，并且 `||` 不会对
    `str.isEmpty()` 进行求值，从而防止了 `NullPointerException`。但是，如果 `str` 不包含 null，则 `str
    == null` 为 false，并且 `||` 会对 `str.isEmpty()` 进行求值，从而防止了 `NullPointerException`。你将在后面的第
    13、6 和 11 章中分别了解 `String`、方法和 `NullPointerException`。


    #### 逻辑与运算符


    *&&* *运算符*会对其左操作数进行求值，并且仅当左操作数为 true 时，才对右操作数进行求值。这也被称为*短路求值*。其语法如下：


    ```

    operand1 ''&&'' operand2

    ```


    *operand1* 和 *operand2* 都必须为 `boolean` 类型。当 *operand1* 和 *operand2* 都为 true 时，此表达式返回
    true；否则，返回 false。


    考虑以下示例：


    ```

    int x = 93;

    boolean inRange = (x >= 10 && x <= 50);

    ```


    此示例与上一节中的示例基本相同。它只是反转了该示例的行为。


    短路求值可以帮助你避免在空引用上调用方法。考虑以下示例：


    ```

    str != null && !str.isEmpty()

    ```


    此示例与上一节中的示例基本相同。它只是反转了该示例的行为。


    #### 按位包含或运算符


    *|* *运算符*对其操作数的位进行包含或运算。对于每一位，如果其中一个或两个位都为 1，则结果位为 1；否则，结果位为 0。此运算符的语法如下：


    ```

    operand1 ''|'' operand2

    ```


    *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int` 或 `long` 类型。此表达式返回包含或运算后的结果。


    考虑以下示例：


    ```

    byte status = readPort(DEVICE);

    writePort(DEVICE, status | ENABLE_PRINTER);

    ```


    此示例从一个假设计算机的 `DEVICE` 端口读取一个状态字节。然后，它通过将 `ENABLE_PRINTER` 值与 `status` 字段进行或运算（以防打印机未启用）来启用打印机，并将此值写入
    `DEVICE` 端口。


    `|` 运算符可以像 `||` 一样使用，但不执行短路求值。它总是对其右操作数进行求值。示例如下：


    ```

    x < 10 | x > 50

    ```


    在此示例中，右操作数（`x > 50`）总是被求值。


    #### 按位异或运算符


    *^* *运算符*对其操作数的位进行异或运算。对于每一位，如果其中一个位为 1 但两个位不都为 1，则结果位为 1；否则，结果位为 0。此运算符的语法如下：


    ```

    operand1 ''^'' operand2

    ```


    *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int` 或 `long` 类型。此表达式返回异或运算后的结果。


    考虑以下示例：


    ```

    int i = 10;

    int j = 20;

    i = i ^ j; // 30

    j = i ^ j; // 10

    i = i ^ j; // 20

    ```


    此示例使用 `^` 来交换变量 `i` 和 `j` 的内容。


    #### 按位与运算符


    *&* *运算符*对其操作数的位进行与运算。对于每一位，如果两个位都为 1，则结果位为 1；否则，结果位为 0。此运算符的语法如下：


    ```

    operand1 ''&'' operand2

    ```


    *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int` 或 `long` 类型。此表达式返回与运算后的结果。


    考虑以下示例：


    ```

    byte status = readPort(DEVICE);

    writePort(DEVICE, status & ~ENABLE_PRINTER);

    ```


    此示例从一个假设计算机的 `DEVICE` 端口读取一个状态字节。然后，它通过将 `ENABLE_PRINTER` 值的取反值与 `status` 字段进行与运算（以防打印机已启用）来禁用打印机，并将此值写入
    `DEVICE` 端口。


    `&` 运算符可以像 `&&` 一样使用，但不执行短路求值。它总是对其右操作数进行求值。示例如下：


    ```

    x >= 10 & x <= 50

    ```


    在此示例中，右操作数（`x <= 50`）总是被求值。


    #### 相等运算符


    Java 支持等于（`==`）和不等于（`!=`）相等运算符。


    ##### 等于


    *==* *运算符*比较两个操作数是否相等。此运算符的语法如下：


    ```

    operand1 ''=='' operand2

    ```


    当两个操作数相等时，`==` 运算符返回 true；否则，返回 false。


    示例如下：


    ```

    int x = 10;

    int y = 15;

    boolean equal = x == y;

    ```


    在此示例中，`x` 和 `y` 各自包含一个整数。`x == y` 表达式返回 false，因为 `x`（`10`）不等于 `y`（`15`）。

