    ### 类扩展


    Java 的类扩展功能由 `extends` 关键字实现。当 `extends` 出现时，它指定了两个类之间的父子关系。这种关系通过以下语法描述：


    ```

    ''class'' 子类 ''extends'' 父类

    ''{''

    // 类体

    ''}''

    ```


    根据此语法，*子*类扩展了*父*类，并继承了父类中可访问的成员。


    注意


    `extends` 后面不能指定多个类名，因为 Java 不支持基于类的多重继承。


    例如，我将使用 `extends` 在 `Vehicle` 和 `Truck` 类之间建立关系，然后在 `Account` 和 `CheckingAccount`
    类之间建立关系：


    ```

    class Vehicle

    {

    // 成员声明

    }

    class Truck extends Vehicle

    {

    // 继承 Vehicle 中可访问的成员

    // 提供自己的成员声明

    }

    class Account

    {

    // 成员声明

    }

    class CheckingAccount extends Account

    {

    // 继承 Account 中可访问的成员

    // 提供自己的成员声明

    }

    ```


    这些示例体现了“是一个”关系。`Truck` 是一种专门的 `Vehicle`，`CheckingAccount` 是一种专门的 `Account`。`Vehicle`
    和 `Account` 被称为*基类*、*父类*或*超类*。`Truck` 和 `CheckingAccount` 被称为*派生类*、*子类*或*子类*。


    注意


    出于安全或其他原因，你可能希望声明一个不应被扩展的类。Java 提供了 `final` 关键字来防止类被扩展。只需在类头前加上 `final`，例如 `final
    class Password`。有了这个声明，当有人试图扩展 `Password` 时，编译器将报告错误。


    子类从其父类和其他祖先类继承可访问的字段和方法。它们从不继承构造函数。相反，子类声明自己的构造函数。此外，它们可以声明自己的字段和方法，以区别于其父类。请参考清单
    7-1。


    ```

    class Account

    {

    private String name;

    private long amount;

    Account(String name, long amount)

    {

    this.name = name;

    setAmount(amount);

    }

    void deposit(long amount)

    {

    this.amount += amount;

    }

    String getName()

    {

    return name;

    }

    long getAmount()

    {

    return amount;

    }

    void setAmount(long amount)

    {

    this.amount = amount;

    }

    }

    清单 7-1

    Account.java

    ```


    清单 7-1 描述了一个通用的银行账户类，包含一个名称和一个初始金额，两者都在构造函数中设置。此外，它允许用户进行存款。（你可以通过存入负金额来取款，但我们忽略这种可能性。）请注意，账户名称必须在创建账户时设置。


    注意


    我选择用 `long` 类型来表示货币值，其中值以美分计数存储。你可能更倾向于使用 `double` 或 `float` 来存储美元和美分值，但这可能导致不精确。第
    12 章提供了一个更好的替代方案。


    清单 7-2 展示了一个 `CheckingAccount` 子类，它扩展了其 `Account` 超类。


    ```

    class CheckingAccount extends Account

    {

    CheckingAccount(long amount)

    {

    super("checking", amount);

    }

    void withdraw(long amount)

    {

    setAmount(getAmount() - amount);

    }

    }

    清单 7-2

    CheckingAccount.java

    ```


    `CheckingAccount` 类继承自 `Account`，并提供了一个构造函数，通过将 `"checking"` 和 `amount` 传递给超类构造函数，来初始化其超类中的
    `amount` 和 `name` 字段。


    该构造函数使用保留字 `super` 将这些值传递给其对应的超类构造函数。它通过 `super("checking", amount);` 在调用上下文中使用
    `super`。这类似于使用 `this()` 调用上下文将参数传递给同一类中的另一个构造函数。


    警告


    正如 `this()` 必须是调用同一类中另一个构造函数的构造函数中的第一个元素一样，`super()` 也必须是调用其超类中构造函数的构造函数中的第一个元素。如果你违反此规则，编译器将报告错误。当编译器在方法中检测到
    `super()` 调用时，也会报告错误；`super()` 只能在构造函数中调用。


    `CheckingAccount` 还提供了一个 `withdraw()` 方法，该方法通过要取出的金额减少账户余额。由于 `Account` 的 `amount`
    字段是 `private` 的，`CheckingAccount` 无法直接访问它。相反，它调用从 `Account` 继承的 `setAmount()`
    和 `getAmount()` 方法，从 `getAmount()` 的返回值中减去其 `amount` 参数值，并将差值传递给 `setAmount()`。


    清单 7-3 展示了一个 `SavingsAccount` 子类，它扩展了其 `Account` 超类。


    ```

    class SavingsAccount extends Account

    {

    SavingsAccount(long amount)

    {

    super("savings", amount);

    }

    }

    清单 7-3

    SavingsAccount.java

    ```


    `SavingsAccount` 类很简单，因为它不需要声明额外的字段或方法。不过，它确实声明了一个构造函数，用于初始化其 `Account` 超类中的字段。初始化发生在通过
    Java 的 `super` 关键字（后跟带括号的参数列表）调用 `Account` 的构造函数时。


    警告


    如果在子类构造函数中没有指定 `super()`，并且超类没有声明无参构造函数，那么编译器将报告错误。这是因为当 `super()` 不存在时，子类构造函数必须调用一个无参的超类构造函数。


    我创建了一个 `AccountDemo` 应用程序类，演示了 `Account` 超类及其 `CheckingAccount` 和 `SavingsAccount`
    子类。清单 7-4 展示了 `AccountDemo` 的源代码。


    ```

    class AccountDemo

    {

    public static void main(String[] args)

    {

    SavingsAccount sa = new SavingsAccount(40000);

    System.out.println("账户名称: " + sa.getName());

    System.out.println("初始金额: " + sa.getAmount());

    sa.deposit(3500);

    System.out.println("存款后新金额: " + sa.getAmount());

    CheckingAccount ca = new CheckingAccount(2000);

    System.out.println("账户名称: " + ca.getName());

    System.out.println("初始金额: " + ca.getAmount());

    ca.deposit(6000);

    System.out.println("存款后新金额: " + ca.getAmount());

    ca.withdraw(1500);

    System.out.println("取款后新金额: " + ca.getAmount());

    }

    }

    清单 7-4

    AccountDemo.java

    ```


    假设 `Account.java`、`CheckingAccount.java`、`SavingsAccount.java` 和 `AccountDemo.java`
    位于同一目录下，执行以下命令来编译所有四个源文件：


    ```

    javac *.java

    ```


    执行以下命令来运行应用程序：


    ```

    java AccountDemo

    ```


    你应该会看到以下输出：


    ```

    账户名称: savings

    初始金额: 40000

    存款后新金额: 43500

    账户名称: checking

    初始金额: 2000

    存款后新金额: 8000

    取款后新金额: 6500

    ```

