- fmt: '# Understanding Properties


    The `Properties` class extends the `java.util.Hashtable` class (I briefly mentioned
    hash tables, which are also known as hash maps, in Chapter [7](#615966_1_En_7_Chapter.xhtml)),
    which supports key-value pair-based storage. However, `Properties` introduces
    some specific features tailored for managing configuration data.


    ## Data Storage and Retrieval


    Developers benefit from the simplicity of the `Properties` class. Data can be
    easily stored and retrieved using familiar syntax. Listing [14-6](#615966_1_En_14_Chapter.xhtml#PC34)
    provided an example. The following code fragment provides another:


    ```

    Properties dbms = new Properties();

    dbms.setProperty("database.url", "jdbc:mysql://localhost:3306/mydatabase");

    dbms.setProperty("database.username", "myusername");

    dbms.setProperty("database.password", "mypassword");

    String url = dbms.getProperty("database.url");

    String username = dbms.getProperty("database.username");

    String password = dbms.getProperty("database.password");

    ```


    This code fragment first instantiates `Properties`. In contrast, Listing [14-6](#615966_1_En_14_Chapter.xhtml#PC34)
    obtained a `Properties` object by calling `System`''s `getProperties()` method.


    The `Properties` object''s reference is assigned to the `dbms` variable. (The
    name `dbms` is an acronym for database management system.) This reference is then
    used in three `setProperty()` calls to set three `database`-prefixed properties
    and three `getProperty()` calls to retrieve the property values, which are stored
    in other variables.


    ## Properties Loading and Saving


    The `Properties` class can also load a list of properties from and store a list
    of properties to files, which allows configuration data to be persisted. The following
    methods are used to accomplish these tasks:


    *   `void load(Reader reader)`: Read a *property list* (a list of key/value pairs)
    from the input character stream (in a simple line-oriented format) to this `Properties`
    object.

    *   `void store(Writer writer, String comments)`: Write the property list in this
    `Properties` object to the output character stream in a format suitable for using
    the `load(Reader)` method.


    Both methods refer to a character stream, which is similar to the byte stream
    discussed earlier but streams 16-bit characters instead of 8-bit bytes.


    These methods are useful for scenarios where settings need to be modified without
    altering the source code. Consider the following code fragment:


    ```

    try (FileInputStream fis = new FileInputStream("config.properties"))

    {

    dbms.load(fis);

    }

    catch (IOException ioe)

    {

    ioe.printStackTrace();

    }

    ```


    ```

    try (FileOutputStream output = new FileOutputStream("config.properties"))

    {

    dbms.store(output, "Updated Database Configuration");

    }

    catch (IOException ioe)

    {

    ioe.printStackTrace();

    }

    ```


    This code fragment uses a pair of `try`-`with`-`resources` statements to handle
    `IOException`s, which can be thrown from the `load()` and `store()` methods.


    These statements first create `FileInputStream` and `FileOutputStream` for connecting
    to a file named `config.properties`. The `dbms`-related properties list will be
    loaded from and stored to this file.


    > **Note**: I don''t discuss `FileInputStream` and `FileOutputStream` any further
    in this book. You''ll find complete coverage in my book, *Java I/O, NIO and NIO.2*
    (see [www.amazon.ca/Java-NIO-NIO-2-JEFF-FRIESEN/dp/1484215664/](http://www.amazon.ca/Java-NIO-NIO-2-JEFF-FRIESEN/dp/1484215664/)
    for more information about this book and to order a copy).


    ## Virtual Machine Shutdown


    `System` provides the `void exit(int status)` method to initiate the JVM''s shutdown
    sequence. The argument passed to `status` is a code that provides information
    about the shutdown to a script (such as a Windows batch file) that can take appropriate
    action based on the code. By convention, a nonzero status code indicates abnormal
    termination.


    ### Shutdown Sequence


    The JVM initiates the *shutdown sequence* in response to one of several events,
    including when the `System.exit()` method is called for the first time.


    At the beginning of the shutdown sequence, any registered shutdown hooks are started
    in an unspecified order. (See the `java.lang.Runtime` class for more information.)


    The shutdown sequence finishes when all shutdown hooks have terminated. At this
    point, the JVM terminates.


    Although I''ve previously used `return` to return execution from an application''s
    `main()` method when the wrong number of command-line arguments is passed, I could
    use `exit()` when I need to pass a code to the caller. Here is an example:


    ```

    public static void main(String[] args)

    {

    if (args.length != 1)

    {

    System.err.println("usage: java SomeApp argument");

    //      return;

    System.exit(1); // Indicate abnormal termination: wrong number of arguments

    }

    }

    ```


    It''s a good idea to use constants instead of hard-coding integer values such
    as `1`. This is especially true when your application has multiple exit points
    (for different reasons). For example, I could declare the following constant:


    ```

    public static final BAD_NUM_OF_ARGS = 1;

    ```


    and later pass this constant to `exit()`, as follows:


    ```

    System.exit(BAD_NUM_OF_ARGS);

    ```


    The argument passed to `status` is a code that provides information about the
    shutdown to a script (such as a Windows batch file) that can take appropriate
    action based on the code. By convention, a nonzero status code indicates abnormal
    termination.


    ## What''s Next?


    This concludes my book. I hope you enjoyed it. If you would like me to create
    a series of "Learn Java …" books, let Apress ([www.apress.com](http://www.apress.com))
    know.


    Check out the pair of appendixes that follow for quick references on reserved
    words (A) and operators (B). All the best in your Java career.'
