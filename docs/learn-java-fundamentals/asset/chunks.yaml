    The *while* *statement* repeatedly executes a statement while its Boolean expression
    is true. This statement has the following syntax:


    ```

    ''while'' ''('' expression '')''

    statement

    ```


    The `while` statement consists of reserved word `while`, followed by a parenthesized
    Boolean *expression*, followed by *statement*, which is executed repeatedly.


    The `while` statement first evaluates *expression*. If it returns true, the program
    executes *statement*. It then evaluates *expression*. If it is still true, *statement*
    is once again executed. This behavior continues until *expression* evaluates to
    false, at which time execution proceeds to the first statement following *statement*.


    The following example demonstrates the `while` statement:


    ```

    long fact = 1;

    int i = 1;

    while (i <= 4)

    fact *= i++;

    System.out.println(fact);

    ```


    This example calculates 4! (factorial). A *factorial* is the product of integers
    starting at 1 and ranging to the integer whose factorial is desired. For example,
    4! = 1 x 2 x 3 x 4 (or 24). (Note that 0! evaluates to 1.)


    After declaring variables `fact` (to hold the factorial) and `i` (a loop counter
    that records the current loop iteration), the example enters a `while` loop. This
    loop first verifies that `i` has not exceeded four iterations by evaluating `i
    <= 4`. As long as this Boolean expression evaluates to true, the `while` loop
    will continue.


    Each iteration executes `fact *= i++;`. This compound-assignment statement accomplishes
    several things:


    1.  It retrieves `i`’s value and stores it in a memory location before incrementing
    this value and storing the resulting sum in `i`.


    2.  It retrieves `fact`’s value along with the stored value read from i and multiplies
    these values together.


    3.  It stores the value resulting from the multiplication in `fact`.


    When the `while` loop finishes, `System.out.println(fact);` is executed. The value
    stored in `fact` is retrieved and then output to the console.


    Note the presence of the post-increment operator `++`. This operator increments
    variable `i`, allowing the loop to end eventually. If it weren’t present, the
    loop would never end because `i` would never advance and always contain 1, which
    is less than 4.


    Note


    A never-ending loop is known as an *infinite loop*.


    This example produces the following output:


    ```


    ```


    A `for` statement can be easily coded via an equivalent `while` statement, as
    the following example (which sums the integers from 1 through 10) demonstrates:


    ```

    int sum = 0;

    for (int i = 1; i < 10; i++)

    sum += i;

    ```


    After declaring variable `sum`, the example enters the `for` statement, which
    first declares variable `i` and initializes it to `1`. It then evaluates Boolean
    expression `i < 10`. As long as `i`’s value is less than 10, the `for` statement
    will keep looping over the `sum += i;` statement that follows.


    This latter expression statement uses `+=` (one of the compound-assignment operators)
    to add the value in `i` to the value in `sum`. Following this update, the `for`
    statement executes `i++` to increment `i`. Next, it evaluates `i < 10` and re-executes
    `sum += i;` for as long as `i`’s value is less than 10.


    The equivalent `while` statement appears as follows:


    ```

    int sum = 0;

    int i = 1;

    while (i < 10)

    {

    sum += i;

    i++;

    }

