    If `x`’s type is `byte` or `short`, the variable’s value is widened to an `int`.
    However, if the type is `long`, `double`, or `float`, `4` is widened to the appropriate
    type. The addition is performed after the widening is carried out.


    Java classifies its operators via the number of operands that they take:


    *   A *unary operator* takes a single operand. In the previous `-1` example, the
    `-` (unary minus) operator takes a single operand.


    *   A *binary operator* takes two operands. The `*` (multiplication) operator
    in `4 *` y is an example of a binary operator.


    *   Java supports a single *ternary operator* that takes three operands. This
    operator is represented by two symbols ( `? :`) and is known as the *conditional
    operator*. I’ll discuss this operator later.


    Java also classifies its operators as prefix, postfix, and infix:


    *   A *prefix operator* is a unary operator that precedes its single operand (as
    in `-1`).


    *   A *postfix operator* is a unary operator that follows its single operand (as
    in `x++` – increment the value in `x`).


    *   An *infix operator* is a binary operator that appears between the binary operator’s
    two operands (as in `4` * y) or the ternary operator’s three operands.


    When evaluating an expression, the compiler considers each operator’s precedence
    and associativity:


    *   *Precedence* determines how an expression is evaluated when it contains two
    or more operators with different precedences. Operators with higher precedence
    are evaluated first. For example, in the expression 4 + 2 * 3, subexpression 2
    * 3 is evaluated first because multiplication takes precedence over addition.


    *   *Associativity* determines how an expression is evaluated when it contains
    two or more operators with the same precedence. For example, `4 + 2 + 3` would
    first evaluate `4 + 2` because `+` has left-to-right associativity. If `+` had
    right-to-left associativity, `2 + 3` would first be evaluated, and the result
    would be added to `4`.


    Table [3-1](#615966_1_En_3_Chapter.xhtml#Tab1) presents all of Java’s operators
    in terms of their symbols, descriptions, precedences, and associativity.


    Table 3-1


    Java’s Operators Grouped by Precedence


