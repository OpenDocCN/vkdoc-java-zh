    when the superclass hasn’t been designed and documented with extension in mind.


    Composition provides a solution to this problem. This section presents an example
    that demonstrates the problem and then shows you how to solve it via composition.'
  trans: '

    #### 字符串表示与调试


    `toString()` 方法返回调用它的对象的字符串表示形式。返回的字符串可用于调试。请参考清单 7-18 至 7-20。


    ```

    class VehicleDemo

    {

    public static void main(String[] args)

    {

    Truck truck = new Truck("Ford", "F150", 2023, true);

    System.out.println("Make = " + truck.getMake());

    System.out.println("Model = " + truck.getModel());

    System.out.println("Year = " + truck.getYear());

    System.out.println("Is extended cab = " + truck.isExtendedCab());

    System.out.println(truck.toString());

    }

    }

    清单 7-20

    VehicleDemo.java

    ```


    ```

    class Truck extends Vehicle

    {

    private boolean isExtendedCab;

    Truck(String make, String model, int year, boolean isExtendedCab)

    {

    super(make, model, year);

    this.isExtendedCab = isExtendedCab;

    }

    boolean isExtendedCab()

    {

    return isExtendedCab;

    }

    @Override

    public String toString()

    {

    return super.toString() + "\n" + "Is extended cab: " + isExtendedCab;

    }

    }

    清单 7-19

    Truck.java

    ```


    ```

    class Vehicle

    {

    private String make;

    private String model;

    private int year;

    Vehicle(String make, String model, int year)

    {

    this.make = make;

    this.model = model;

    this.year = year;

    }

    String getMake()

    {

    return make;

    }

    String getModel()

    {

    return model;

    }

    int getYear()

    {

    return year;

    }

    @Override

    public String toString()

    {

    return "Make: " + make + ", Model: " + model + ", Year: " + year;

    }

    }

    清单 7-18

    Vehicle.java

    ```


    清单 7-18 展示了 `Vehicle` 类。请注意，它移除了 `info()` 方法，并重写了从 `Object` 间接继承的 `toString()`
    方法。


    清单 7-19 展示了 `Truck` 类。它也移除了 `info()` 方法，并重写了从 `Vehicle` 直接继承的 `toString()` 方法。


    清单 7-20 展示了 `VehicleDemo` 类。其 `main()` 方法调用 `truck.toString()` 返回 `truck` 的字符串表示形式，并通过
    `System.out.println()` 输出。


    注意


    我本可以指定 `System.out.println(truck);` 而不是 `System.out.println(truck.toString());`。前者调用的是
    `System.out.println(Object o)` 重载的 `println()` 方法，而后者调用的是 `System.out.println(String
    s)` 重载的 `println()` 方法。


    通过 `javac *.java` 或 `javac VehicleDemo.java` 编译这三个源文件。通过 `java VehicleDemo` 运行生成的应用程序。您应该会看到以下输出：


    ```

    Make = Ford

    Model = F150

    Year = 2023

    Is extended cab = true

    Make: Ford, Model: F150, Year: 2023

    Is extended cab: true

    ```


    注意


    当 `toString()` 方法未被重写时，会调用 `Object` 的 `toString()` 版本。它返回一个格式为 *类名@十六进制哈希码* 的字符串。例如，如果
    `Truck` 中的 `toString()` 和 `Vehicle` 中的 `toString()` 都不存在，您会看到类似 `Truck@3af49f1c`
    的输出。由于存在这两个重写的 `toString()` 方法，您不会看到这个默认输出。此外，如果您仅从 `Truck` 中移除 `toString()`，也不会看到这个默认输出，因为
    `Truck` 会继承 `Vehicle` 重写的 `toString()` 方法。


    ## 组合


    通过类扩展实现继承提供了一种复用类的方法。正如您所学到的，继承关注的是用一个新类扩展一个类，这基于它们之间的“是一个”关系：例如，`Truck` 是一个 `Vehicle`。


    另一种类复用的方法是*组合*，它关注的是基于类之间的*有一个*关系，用其他类来组合成新类。例如，一辆 `Truck` 有一个 `Engine`、`Wheels`
    和一个 `SteeringWheel`：


    ```

    class Truck extends Vehicle

    {

    private Engine engine;

    private Wheel[] wheels;

    private SteeringWheel steeringWheel;

    }

    ```


    这个例子表明组合和继承并非互斥。尽管未显示，`Truck` 除了提供自己的 `engine`、`wheels` 和 `steeringwheel` 实例字段外，还从其父类
    `Vehicle` 继承了各种成员。


    ### 继承的问题


    继承可能会带来问题，因为它破坏了*封装*——如果您还记得，封装是将字段、方法和构造函数组合到类中。在继承中，子类依赖于其父类中的实现细节。如果父类的实现细节发生变化，子类可能会出现问题。当开发者无法完全控制父类，或者父类在设计时未考虑扩展性且未提供相应文档时，这个问题尤为严重。


    组合为这个问题提供了解决方案。本节将展示一个演示该问题的示例，然后向您展示如何通过组合来解决它。

    '
- fmt: '# Logging Appointments


    To understand this problem, assume that you have purchased a library of classes
    that implement an appointment calendar. Although you don’t have access to their
    source code, assume that Listing [7-21](#615966_1_En_7_Chapter.xhtml#PC55) describes
    the main `ApptCal` class.


    ```

    class ApptCal

    {

    private final static int MAX_APPT = 1000;

    private Appointment[] appointments;

    private int size;

    ApptCal()

    {

    appointments = new Appointment[MAX_APPT];

    size = 0;

    }

    void addAppointment(Appointment appointment)

    {

    if (size == appointments.length)

    return; // array is full

    appointments[size++] = appointment;

    }

    void addAppointments(Appointment[] appointments)

    {

    for (int i = 0; i < appointments.length; i++)

    addAppointment(appointments[i]);

    }

    }

    Listing 7-21

    ApptCal.java

    ```


    `ApptCal` stores an array of appointments, with each appointment described by
    an `Appointment` object. For this discussion, the details of `Appointment` aren’t
    important; it could be as trivial as an empty `Appointment` class – see Listing
    [7-22](#615966_1_En_7_Chapter.xhtml#PC56).


    ```

    class Appointment

    {

    }

    Listing 7-22

    Appointment.java

    ```


    Suppose you wanted to log each address to a file. Because a logging capability
    isn’t provided, you extend `ApptCal` with Listing [7-23](#615966_1_En_7_Chapter.xhtml#PC57)’s
    `LoggingApptCal` class, which adds logging behavior in overriding `addAppointment()`
    and `addAppointments()` methods.


    ```

    class LoggingApptCal extends ApptCal

    {

    LoggingApptCal()

    {

    }

    @Override

    void addAppointment(Appointment appointment)

    {

    Logger.log(appointment.toString());

    super.addAppointment(appointment);

    }

    @Override

    void addAppointments(Appointment[] appointments)

    {

    for (int i = 0; i < appointments.length; i++)

    Logger.log(appointments[i].toString());

    super.addAppointments(appointments);

    }

    }

    Listing 7-23

    LoggingApptCal.java

    ```


    The `LoggingApptCal` class relies on a `Logger` class (see Listing [7-24](#615966_1_En_7_Chapter.xhtml#PC58))
    whose `void log(String msg)` class method logs a string to a file. An `Appointment`
    object is converted to a string via `toString()`, which is passed to `log()`.


    ```

    class Logger

    {

    static void log(String msg)

    {

    System.out.println(msg);

    }

    }

    Listing 7-24

    Logger.java

    ```


    Although `LoggingApptCal` looks okay, it doesn’t work as you might expect. Suppose
    you instantiated this class and added a few `Appointment` objects to the object
    via `addAppointments()`, which Listing [7-25](#615966_1_En_7_Chapter.xhtml#PC59)’s
    `ApptCalDemo` class accomplishes.


    ```

    class ApptCalDemo

    {

    public static void main(String[] args)

    {

    Appointment[] appointments =

    {

    new Appointment(),

    new Appointment(),

    new Appointment()

    };

    LoggingApptCal lapptcal = new LoggingApptCal();

    lapptcal.addAppointments(appointments);

    }

    }

    Listing 7-25

    ApptCalDemo.java

    ```


    Compile this code as follows:


    *   `javac ApptCalDemo.java` (or `javac *.java`)


    Run the application as follows:


    ```

    java ApptCalDemo

    ```


    You should observe the following output (the hash codes might differ):


    ```

    Appointment@5305068a

    Appointment@279f2327

    Appointment@2ff4acd0

    Appointment@5305068a

    Appointment@279f2327

    Appointment@2ff4acd0

    ```


    Six messages are output. Each of the expected three messages (one per `Address`
    object) is duplicated.


    When `LoggingAB`’s `addAddresses()` method is called, it first calls `Logger.log()`
    for each `Address` object in the `addresses` array that is passed to `addAddresses()`.
    This method then calls `AB`’s `addAddresses()` method via `super.addAddresses(addresses);`.


    `AB`’s `addAddresses()` method calls `LoggingAB`’s overriding `addAddress()` method,
    one for each `Address` object in its `addresses` array argument. The `addAddress()`
    method then executes `Logger.log(address.toString());`, to log its `address` argument’s
    string representation, and you end up with three additional logged messages.


    If you didn’t override the `addAddresses()` method, this problem should go away.
    But in that case, the subclass would still be tied to an implementation detail:
    `AB`’s `addAddresses()` method calls `addAddress()`.


    It isn’t a good idea to rely on an implementation detail when that detail isn’t
    documented. (Recall that you don’t have access to `AB`’s source code.) When a
    detail isn’t documented, it can change in a new version of the class.


    Because a base class change can break a subclass, this problem is known as the
    *fragile base class problem*. A related cause of fragility (which also has to
    do with overriding methods) occurs when new methods are added to a superclass
    in a subsequent release.


    For example, suppose a new version of the library introduces a `void addAddress(Address
    address, boolean unique)` method into the `AB` class. This method adds the address
    to the address book when `unique` is false. When `unique` is true, it adds the
    address only if it wasn’t previously added.


    Because this method was added after the `LoggingAB` class was created, `LoggingAB`
    doesn’t override the new `addAddress()` method with a call to `Logger.log()`.
    As a result, `Address` objects passed to the new `addAddress()` method are not
    logged.


    Here’s another problem: you introduce a method into the subclass that is not also
    in the superclass. A new version of the superclass presents a new method that
    matches the subclass method signature and return type. Your subclass method now
    overrides the superclass method and probably doesn’t fulfill the superclass method’s
    contract.'
