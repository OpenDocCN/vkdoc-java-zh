- fmt: '# StringBuffer


    The `java.lang.StringBuffer` class describes a *mutable* (changeable) sequence
    of characters. `StringBuffer` is similar to the `String` class, but unlike with
    a `String` object, a `StringBuffer` object’s contents can be modified following
    the object’s creation.


    Like `String`, `StringBuffer` stores characters in an internal array. Unlike `String`,
    which cannot resize its array to make it larger, `StringBuffer` has this capability.


    `StringBuffer` uses the concept of *capacity*, which is the maximum number of
    characters that can be stored before the internal array must be replaced with
    a larger array. When the length of the character sequence to be stored in the
    array exceeds the capacity, a new internal array is allocated and populated with
    the character sequence.


    ## Creating String Buffers


    `StringBuffer` provides several constructors for creating a string buffer. These
    constructors include the following trio:


    * `StringBuffer()`: Construct a string buffer with no characters in it and an
    initial capacity of 16 characters.


    * `StringBuffer(int capacity)`: Construct a string buffer with no characters in
    it and an initial capacity set to the value passed to `capacity`.


    * `StringBuffer(String s)`: Construct a string buffer initialized to the contents
    of the string whose reference is passed to `s`.


    Be careful with `StringBuffer(int capacity)`. If you pass a negative integer to
    this constructor, it will throw a `java.lang.NegativeArraySizeException` object.


    Note


    You might want to explore additional constructors for creating `StringBuffer`
    objects. Check out the Java documentation for the JDK 21 reference types library’s
    `StringBuffer` class (`http://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/lang/StringBuffer.xhtml`)
    to learn about these constructors as well as `StringBuffer`’s methods.


    ## Exploring StringBuffer Methods


    `StringBuffer` provides various methods, including the `append()` and `insert()`
    methods that are overloaded to accept any type of data (such as `int`, `char`,
    or `double`).


    Each `append()` and `insert()` method first converts its data item to a string
    and then appends the string’s characters to or inserts the string’s characters
    into the string buffer. Each `append()` method always adds these characters at
    the end of the buffer; each `insert()` method adds the characters at a specified
    position.


    A few additional methods are presented as follows:


    * `int capacity()`: Return this string buffer’s current capacity.


    * `char charAt(int index)`: Return the `char` value from this string buffer at
    the specified `index`. An `IndexOutOfBoundsException` object is thrown when `index`
    is negative or greater than or equal to `length()`’s return value.


    * `StringBuffer delete(int start, int end)`: Remove from this string buffer the
    characters from `start` to `end` - 1 (or the end of the string buffer when `end`
    is greater than or equal to the string buffer’s length). No changes are made when
    `start` and `end` contain the same value. This method throws `java.lang.StringIndexOutOfBoundsException`
    when `start` is negative, greater than `length()`, or greater than `end`.


    * `int indexOf(String s)`: Return the index of the first occurrence of substring
    `s` in this string buffer. Return -1 when there is no occurrence.


    * `int lastIndexOf(String s)`: Return the index of the last occurrence of substring
    `s` in this string buffer. Return -1 when there is no occurrence.


    * `int length()`: Return the length (number of stored characters) of this string
    buffer.


    * `StringBuffer reverse()`: Replace this string buffer’s character sequence with
    the reverse of this sequence. For example, if this string buffer contains ABC,
    replace it with CBA.


    * `void setCharAt(int index, char ch)`: Set the character at the specified `index`
    to `ch`. Throw `IndexOutOfBoundsException` when `index` is negative or is greater
    than or equal to `length()`’s return value.


    * `void setLength(int newLength)`: Set the length of this string buffer’s character
    sequence. The sequence is changed to a new character sequence whose length is
    specified by `newLength`.


    * `String substring(int start, int end)`: Return a new `String` object that contains
    a subsequence of the characters currently contained in this character sequence.
    The subsequence begins at `start` and continues to `end` - 1. This method throws
    `IndexOutOfBoundsException` when `start` or `end` is negative, `end` is greater
    than `length()`, or `start` is greater than `end`.


    * `void trimToSize()`: Attempt to reduce the storage used for the character sequence.
    If the internal array is larger than necessary to hold its current sequence of
    characters, it may be resized to become more space efficient. Calling this method
    may, but is not required to, affect the value returned by a subsequent call to
    the `capacity()` method.


    Listing [13-3](#615966_1_En_13_Chapter.xhtml#PC14) presents the source code to
    an `SBD` (`StringBuffer` Demo) application that demonstrates these methods.'
