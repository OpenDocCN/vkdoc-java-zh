    ##### 无符号右移


    *>>>* *运算符*将其左操作数的二进制位向右移动，移动的位数由右操作数指定。每次移位时，右侧会补入一个 0，而最右侧的位则被丢弃。这被称为*无符号移位*。该运算符的语法如下：


    ```

    operand1 ''>>>'' operand2

    ```


    *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int` 或 `long` 类型。此表达式返回将 *operand1*
    向右移动 *operand2* 位后的结果。


    请参考以下示例：


    ```

    4 >>> 1

    -4 >>> 1

    ```


    第一个表达式将 `4` 向右移动 `1` 位，结果为 2。第二个表达式将 `-4` 向右移动 `1` 位，结果为 2147483646（即 -2 的无符号等效值）。本质上，这是将
    4 或 -4 除以 2。这比使用 `/` 运算符快得多。然而，它仅限于除以 2 的小次幂。


    对于涉及 32 位表达式的每种移位操作，仅使用 *operand2* 的低 5 位，以防止移位超过 32 位整数的位数。对于涉及 64 位表达式的每种移位操作，仅使用
    *operand2* 的低 6 位，以防止移位超过 64 位表达式的位数。


    #### 加法运算符


    Java 支持加法/字符串连接 (`+`) 和减法 (`-`) 加法运算符。


    ##### 加法/字符串连接


    *+* *运算符*将其两个数值操作数相加并返回总和。该运算符的语法如下：


    ```

    operand1 ''+'' operand2

    ```


    *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
    类型。此表达式返回 *operand1* 加 *operand2* 的结果。


    请参考以下示例：


    ```

    int x = 10;

    int y = 20;

    int sum = x + y;

    ```


    此示例将变量 `x` 和 `y` 中的值相加，这两个变量分别被赋值为 `10` 和 `20`。然后将总和赋给变量 `sum`。


    *+* *运算符*也用于将一个字符串追加到另一个字符串。这被称为*字符串连接*。其语法与加法相同。


    至少一个操作数必须是 `String` 类型。另一个操作数在执行连接之前会被转换为字符串。


    请参考以下示例：


    ```

    "abc" + "def"

    ```


    结果是一个新的 `String` 对象，包含序列 `abcdef`。（我将在第 13 章讨论 `String` 类。）


    ##### 减法


    *-* *运算符*从其左数值操作数中减去其右数值操作数，并返回差值。该运算符的语法如下：


    ```

    operand1 ''-'' operand2

    ```


    *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
    类型。此表达式返回 *operand1* 减 *operand2* 的结果。


    请参考以下示例：


    ```

    int x = 10;

    int y = 20;

    int difference = x - y;

    ```


    此示例从变量 `x` 的值中减去变量 `y` 的值，这两个变量分别被赋值为 `10` 和 `20`。然后将差值赋给变量 `difference`。


    #### 乘法运算符


    Java 支持乘法 (`*`)、除法 (`/`) 和取模 (`%`) 乘法运算符。


    ##### 乘法


    *** *运算符*将其两个数值操作数相乘并返回乘积。该运算符的语法如下：


    ```

    operand1 ''*'' operand2

    ```


    *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
    类型。此表达式返回 *operand1* 乘以 *operand2* 的结果。


    请参考以下示例：


    ```

    int x = 10;

    int y = 20;

    int product = x * y;

    ```


    此示例将变量 `x` 和 `y` 中的值相乘，这两个变量分别被赋值为 `10` 和 `20`。然后将乘积赋给变量 `product`。


    ##### 除法


    */* *运算符*将其左数值操作数除以右数值操作数，并返回商。该运算符的语法如下：


    ```

    operand1 ''/'' operand2

    ```


    *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
    类型。此表达式返回 *operand1* 除以 *operand2* 的商。


    请参考以下示例：


    ```

    int x = 10;

    int y = 20;

    int dividend = x / y;

    ```


    此示例将变量 `x` 的值除以变量 `y` 的值，这两个变量分别被赋值为 `10` 和 `20`。然后将商赋给变量 `dividend`。


    ##### 取模


    *%* *运算符*将其左数值操作数除以右数值操作数，并返回余数。该运算符的语法如下：


    ```

    operand1 ''%'' operand2

    ```


    *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
    类型。此表达式返回 *operand1* 除以 *operand2* 的余数。


    请参考以下示例：


    ```

    int x = 10;

    int y = 20;

    int remainder = x % y;

    ```


    此示例将变量 `x` 的值除以变量 `y` 的值，这两个变量分别被赋值为 `10` 和 `20`。然后将余数赋给变量 `remainder`。


    #### 一元运算符


    Java 支持前自增 (`++`)、前自减 (`--`)、正号 (`+`)、负号 (`-`)、逻辑非 (`!`)、按位取反 (`~`) 和类型转换 [`(`*type*`)`]
    一元运算符。


    ##### 前自增


    *++* *运算符*对其操作数进行前自增，该操作数必须是 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
    类型的变量。结果存储在该变量中。这是一种快速给变量加 1 的方式。该运算符的语法如下：


    ```

    ''++'' variable

    ```


    请参考以下示例：


    ```

    int x = 1;

    int y = ++x;

    ```


    此示例运行后，`x` 和 `y` 都被赋值为 2。


    ##### 前自减


    *--* *运算符*对其操作数进行前自减，该操作数必须是 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
    类型的变量。结果存储在该变量中。这是一种快速给变量减 1 的方式。该运算符的语法如下：


    ```

    ''--'' variable

    ```


    请参考以下示例：


    ```

    int x = 1;

    int y = --x;

    ```


    此示例运行后，`x` 和 `y` 都被赋值为 0。


    ##### 正号


    *+* *运算符*是一个空操作运算符（它的存在是为了完整性）。其操作数必须是 `char`、`byte`、`short`、`int`、`long`、`float`
    或 `double` 类型。该运算符的语法如下：


    ```

    ''+'' operand

    ```


    请参考以下示例：


    ```

    int x = +6;

    int y = +x;

    ```


    示例运行后，`y` 被赋值为 6。


    ##### 负号


    *–* *运算符*对其操作数取反，该操作数必须是 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
    类型。该运算符的语法如下：


    ```

    ''-'' operand

    ```


    请参考以下示例：


    ```

    int x = 6;

    int y = -x;

    ```


    示例运行后，`y` 被赋值为 -6。


    ##### 逻辑非


    *!* *运算符*对其操作数进行逻辑取反，该操作数必须是 `boolean` 类型。该运算符的语法如下：


    ```

    ''!'' operand

    ```


    请参考以下示例：


    ```

    boolean first = true;

    boolean second = !first;

    ```


    示例运行后，`second` 的值为 false。


    ##### 按位取反


    *~ 运算符*翻转其操作数中的所有位，该操作数必须是 `char`、`byte`、`short`、`int` 或 `long` 类型，并返回结果。该运算符的语法如下：


    ```

    ''~'' operand

    ```


    请参考以下示例：


    ```

    int x = 20;

    int y = ~x;

    ```


    此示例运行后，`y` 被赋值为 -20。

