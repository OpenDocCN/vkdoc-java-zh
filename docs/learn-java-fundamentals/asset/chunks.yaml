    ### Do-While语句


    `do-while`语句在其布尔表达式为`true`时重复执行一条语句。与在循环顶部计算布尔表达式的`while`语句不同，`do-while`在循环底部计算布尔表达式。该语句的语法如下：


    ```

    ''do''

    statement

    ''while'' ''('' expression '')'' '';''

    ```


    `do-while`语句由保留字`do`、后跟重复执行的`statement`、后跟保留字`while`、后跟括号括起来的布尔表达式、以及后跟分号组成。


    `do-while`语句首先执行`statement`。然后计算`expression`。如果为`true`，`do-while`执行`statement`。再次计算布尔表达式。如果仍为`true`，`do-while`重新执行`statement`。此循环模式持续直到`expression`为`false`。


    以下示例演示了`do-while`语句：


    ```

    long fact = 1;

    int i = 1;

    do

    fact *= i++;

    while (i <= 4)

    System.out.println(fact);

    ```


    此示例在功能上与上一节的示例相同。唯一的区别是测试表达式的位置。


    > **提示**：当循环必须执行零次或多次时，使用`while`语句。当循环必须执行一次或多次时，使用`do-while`语句。


    ## 循环分支语句


    计算机程序通常需要终止循环或跳过循环的当前迭代。它们通过执行`break`或`continue`循环分支语句来完成这些任务。


    ### Break语句


    `break`语句允许你终止`switch`语句，这一点你已经见过。然而，`break`语句也允许你终止循环。当循环是无限循环时，例如`for (;;)`、`while
    (true)`或`do` … `while(true)`循环，这是必要的。在有限循环的上下文中也可能需要。


    `break`语句的语法如下：


    ```

    ''break'' '';''

    ```


    以下示例展示了如何跳出无限循环：


    ```

    while (true)

    {

    System.out.println("Press x to exit the loop.");

    // The following method call reads a character from the keyboard and assigns

    // its int value to ch. I will have more to say about System.in.read() in Chapter
    14.

    int ch = System.in.read();

    if (ch == ''x'')

    break;

    }

    ```


    当`ch == ''x''`为`true`时，`if`语句执行`break`，将执行流程转移到`while`循环之后的第一条语句。


    以下示例展示了如何跳出有限循环：


    ```

    for (int i = 0; i < 1000; i++)

    {

    if (i > 500)

    break;

    else

    System.out.println(i);

    }

    ```


    此示例在`i`的值超过500时跳出循环。


    #### 带标签的Break


    `break`语句可以指定一个标签（一个标识符后跟冒号），这允许你跳出嵌套循环（循环内部的循环）。这种`break`语句的变体允许你将执行流程转移到由标签前缀的循环之后的第一条语句，其语法如下：


    ```

    ''break'' label '';''

    ```


    以下示例演示了带标签的`break`：


    ```

    outer:

    for (int a = 0; a < 5; a++)

    {

    for (int b = 0; b < 5; b++)

    {

    System.out.println("a = " + a + ", b = " + b);

    if (b == 3)

    break outer;

    }

    System.out.println();

    }

    System.out.println("Both loops have finished");

    ```


    此示例展示了一对`for`循环。外层循环可能执行五次。对于每次外层迭代，内层循环可能执行五次。然而，当`b == 3`计算为`true`时，执行流程离开内层和外层循环，并继续执行`outer:`标签的`for`循环之后的第一条语句。


    生成以下输出：


    ```

    a = 0, b = 0

    a = 0, b = 1

    a = 0, b = 2

    a = 0, b = 3

    Both loops have finished

    ```'
