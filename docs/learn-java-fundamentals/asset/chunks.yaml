    ## 附加主题


    关于类和对象，还有更多内容需要学习。本节将向你介绍信息隐藏、对象初始化、类的另一种用途、类初始化、字段访问规则、方法调用规则、常量、方法调用链、递归和可变参数。


    ### 信息隐藏


    一个类的主体由接口和实现组成。*接口*是类中可供类外部代码访问的部分。*实现*是类中用于支持接口的部分。实现应该对外部代码隐藏，以便可以根据不断变化的需求进行修改。


    开发人员致力于开发提供不变接口的类，同时隐藏实现，使其能够在不影响外部代码的情况下进行演变。隐藏实现的任务被称为*信息隐藏*，它与*封装*相关，即将字段、方法和构造函数组合到类中。


    注意


    封装让我们能够在更高的抽象层次（类和对象）上进行编程，而不是分别关注数据结构和功能。


    以 `Vehicle` 类为例。构造函数和方法头构成了该类的接口。构造函数和方法内部的代码以及各种字段属于实现部分。没有必要直接访问这些字段，因为它们可以通过
    getter 和 setter 方法进行读写。


    由于没有采取任何预防措施，直接访问这些字段是可能的。使用之前的 `v` 引用变量，你可以指定 `v.make`、`v.model` 和 `v.year`，编译器不会报错。你需要利用访问级别来阻止对这些字段的访问（或者至少确定谁可以访问它们）。


    *访问级别*指明了谁可以访问字段、方法或构造函数。Java 支持四种访问级别：private、public、protected 和包级私有（默认）——我将在第
    10 章中讨论包。Java 提供了三个关键字，分别对应前三种访问级别：


    *   `private`：只有与字段、方法或构造函数位于同一类中的代码才能访问该成员。

    *   `public`：任何包中任何类的任何代码都可以访问该成员。

    *   `protected`：同一类或其子类（在第 7 章中讨论）中的任何代码都可以访问该成员。


    如果没有关键字，则默认为包级私有访问。包级私有访问类似于公共访问，即类外部的代码可以访问该成员。但是，与公共访问不同，该代码必须位于与包含要访问成员的类属于同一包的类中——请参阅第
    10 章。


    你可以阻止外部代码访问 `Vehicle` 的 `make`、`model` 和 `year` 字段，这样任何从 `Vehicle` 外部访问这些字段的尝试都会导致编译器错误消息。通过在它们的声明前加上
    `private` 来实现这一点，如下所示：


    ```

    class Vehicle

    {

    private String make;

    private String model;

    private int year;

    // ...

    }

    ```


    为了给你一个更好的例子，说明为什么你应该养成隐藏至少大部分类实现的习惯，请考虑以下简化的 `Employee` 类：


    ```

    class Employee

    {

    private String firstName;

    private String lastName;

    String getFullName()

    {

    return firstName + " " + lastName;

    }

    }

    ```


    `getFullName()` 方法返回员工的全名。它隐藏了没有 `fullName` 字段这一事实。如果 `firstName` 和 `lastName`
    被暴露，它们将成为类接口的一部分。当开发人员决定用单个 `fullName` 字段替换 `firstName` 和 `lastName` 时，该接口就会被破坏。


    ### 对象初始化


    对象通常通过其构造函数进行初始化。然而，还有另外几种方法可以至少完成部分初始化工作。


    注意


    当构造对象时，`new` 运算符会将对象的非静态字段清零。


    #### 通过实例字段初始化器进行显式字段初始化


    *实例字段初始化器*（也称为*对象字段初始化器*或*非静态字段初始化器*）是一个赋值运算符，后跟一个与实例字段类型兼容的表达式，并将该表达式的值赋给实例字段。例如，考虑以下
    `Database` 类：


    ```

    class Database

    {

    private Driver driver = DEFAULT_DRIVER;

    Database(/* ... */)

    {

    // ...

    driver = loadDriver();

    if (driver == null)

    System.out.println("unable to load driver ... using default instead");

    }

    Driver loadDriver()

    {

    // ...

    }

    // ...

    }

    ```


    `Database` 通过实例字段初始化器将 `driver` 字段初始化为默认设备驱动程序。构造函数尝试加载一个非默认的、功能更强的驱动程序。如果无法加载驱动程序，则会输出一条消息，并且
    `Database` 对象将不得不使用默认驱动程序。


    #### 实例初始化块


    *实例初始化块*（也称为*对象初始化块*或*非静态初始化块*）是引入到类主体中而不是方法主体中的语句块。例如，考虑对 `Vehicle` 类的以下修改：


    ```

    class Vehicle

    {

    private String make;

    private String model;

    private int year;

    // 下面的实例初始化块将 make、model 和 year 字段初始化为指定值。

    {

    make = "Ford";

    model = "F150";

    year = 2023;

    }

    }

    ```


    因为你可以在构造函数中初始化对象，所以实例初始化块的唯一用途是在*匿名类*（没有名称的类）的上下文中，匿名类没有构造函数，我将在第 9 章中讨论。


    注意


    对于每个构造函数，编译器都会在类文件中生成一个特殊的 `<init>()` 方法。（由于 `<` 和 `>` 字符在标识符中是非法的，因此源代码中不可能存在这样的方法，所以程序员无法创建同名方法并导致冲突。）


    `<init>()` 方法包含所有发生的对象初始化的字节码。编译器从类的顶部开始向下工作，首先为遇到的每个实例字段初始化器和实例初始化块放置字节码，然后将构造函数的初始化代码放入此方法中。JVM
    在构造对象时在运行时调用 `<init>()`。


    ### 工具类


    类主要用于创建对象。然而，它们还有另一种用途：工具类。*工具类*由类字段和/或类方法组成。

