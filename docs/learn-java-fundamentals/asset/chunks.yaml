    ##### 同时重写 `hashCode()` 和 `equals()`


    重写 `equals()` 时必须同时重写 `hashCode()`，并遵循 `hashCode()` 的 Java 文档中规定的以下约定：


    *   在 Java 应用程序执行期间，对同一对象多次调用 `hashCode()` 时，只要该对象中用于 `equals()` 比较的信息未被修改，`hashCode()`
    就必须始终返回相同的整数。但是，该整数无需在应用程序的不同执行之间保持一致。例如，`hashCode()` 在一次执行中每次调用可能返回 5000，而在另一次执行中每次调用可能返回
    8700。


    *   如果根据重写的 `equals()` 方法两个对象相等，那么对这两个对象分别调用 `hashCode()` 必须产生相同的整数结果。


    *   如果根据重写的 `equals()` 方法两个对象不相等，那么对这两个对象调用 `hashCode()` 返回的整数可以相同。但是，让 `hashCode()`
    为不相等的对象返回不同的值可能会提高哈希表的性能。


    如果不遵守此约定，你的类的实例将无法与前面提到的 `HashMap` 类正常工作。


    如果你重写了 `equals()` 但没有重写 `hashCode()`，那么你最主要违反了约定中的第二条：相等对象的哈希码也必须相等。这种违反可能导致严重后果，如清单
    7-15 和 7-16 所示。


    ```

    class Point

    {

    int x, y;

    Point(int x, int y)

    {

    this.x = x; this.y = y;

    }

    int getX()

    {

    return x;

    }

    int getY()

    {

    return y;

    }

    @Override

    public boolean equals(Object o)

    {

    if (!(o instanceof Point))

    return false;

    Point p = (Point) o;

    return p.x == x && p.y == y;

    }

    }

    清单 7-15

    Point.java

    ```


    `Point` 类通过一对基于 `int` 的 `x` 和 `y` 字段来描述一个点。它声明了一个 `Point(x, y)` 构造函数来初始化这些字段，以及返回其值的
    `getX()` 和 `getY()` 方法。它还重写了 `equals()` 方法，以确定两个 `Point` 对象是否相同（基于相同的 `x` 和 `y`
    值）。


    ```

    class HashCodeDemo

    {

    public static void main(String[] args)

    {

    HashMap map = new HashMap();

    Point p = new Point(10, 20);

    map.put(p, "some point");

    System.out.println(map.get(p));

    System.out.println(map.get(new Point(10, 20)));

    }

    }

    清单 7-16

    HashCodeDemo.java (版本 2)

    ```


    `HashMapDemo` 的 `main()` 方法首先实例化 `HashMap` 并将其引用赋值给局部变量 `map`。然后实例化 `Point` 并将其引用赋值给局部变量
    `p`，并将对象初始化为 `10` (x) 和 `20` (y)。


    随后的 `map.put()` 调用将 `p` 的引用和 `"some point"` 字符串对象的引用存储到哈希映射中。


    接下来，`HashMapDemo` 调用 `get(p)` 返回与 `Point` 对象键关联的 `"some point"` 值。然后通过 `System.out.println()`
    输出该值。


    第二个 `System.out.println()` 调用输出与 `new Point(10, 20)` 描述的键关联的值。


