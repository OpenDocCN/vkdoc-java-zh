    ### 一个更实用的静态类示例


    `SCDemo` 让你有机会学习如何使用静态类，但让我们考虑一个更实际的例子。我创建了一个小型 `Rectangle` 类（在图形上下文中很有用），它受益于一对静态类。清单
    9-3 展示了 `Rectangle` 的源代码。


    ```

    abstract class Rectangle

    {

    static class Float extends Rectangle

    {

    float x, y, w, h;

    Float()

    {

    }

    Float(float x, float y, float w, float h)

    {

    this.x = x;

    this.y = y;

    this.w = w;

    this.h = h;

    }

    @Override

    double getX()

    {

    return x;

    }

    @Override

    double getY()

    {

    return y;

    }

    @Override

    double getW()

    {

    return w;

    }

    @Override

    double getH()

    {

    return h;

    }

    }

    static class Double extends Rectangle

    {

    double x, y, w, h;

    Double()

    {

    }

    Double(double x, double y, double w, double h)

    {

    this.x = x;

    this.y = y;

    this.w = w;

    this.h = h;

    }

    @Override

    double getX()

    {

    return x;

    }

    @Override

    double getY()

    {

    return y;

    }

    @Override

    double getW()

    {

    return w;

    }

    @Override

    double getH()

    {

    return h;

    }

    }

    boolean contains(double x, double y)

    {

    return (x >= getX() && x = getY() && y < getY() + getH());

    }

    abstract double getX();

    abstract double getY();

    abstract double getW();

    abstract double getH();

    }

    清单 9-3

    Rectangle.java

    ```


    `Rectangle` 通过左上角坐标（x 和 y）以及范围（宽度和高度）来描述一个矩形形状。该类被声明为 `abstract`，因为它声明了四个抽象方法：`getX()`、`getY()`、`getW()`
    和 `getH()`。回顾第 8 章，在非抽象类中声明抽象方法是错误的。


    `Rectangle` 还声明了一个 `boolean contains(double x, double y)` 方法，当由 `x` 和 `y` 描述的点位于矩形内部时，该方法返回
    true；否则返回 false。`contains()` 方法将传递给它的参数与通过调用 `Rectangle` 的抽象方法形成的表达式进行比较。


    `Rectangle` 最有趣的部分是它声明了两个静态类。这些类提供了存储 `Rectangle` 对象位置和范围所需的字段。


    第一个静态类是 `Float`，第二个静态类是 `Double`。每个类都声明了 `x`、`y`、`w`（宽度）和 `h`（高度）字段。此外，每个类都声明了一个无参构造函数，将这些字段初始化为
    0。接着是一个显式将这些字段初始化为传入参数的构造函数。


    注意


    如果没有声明无参构造函数，则无法调用此构造函数，因为编译器不会生成等效的 `<init>()` 方法——有关 `<init>()` 的简要介绍，请参见第 6
    章。


    然后，`Float` 和 `Double` 声明了 `getX()`、`getY()`、`getW()` 和 `getH()` 方法，这些方法返回这些字段的值。唯一的区别是一组字段和方法是
    `float` 类型，而另一组字段和方法是 `double` 类型。


    这些方法带有 `@Override` 注解前缀，因为 `Float` 和 `Double` 扩展了 `Rectangle`，并覆盖了 `Rectangle`
    声明的抽象方法 `getX()`、`getY()`、`getW()` 和 `getH()`。（除了在第 7 章中简要讨论过 `@Override` 之外，本书不讨论注解，因为我认为它不是基本特性。）


    你可能会对这种不寻常的组织方式感到困惑。理解它的最佳方法可能是查看清单 9-4，其中展示了演示 `Rectangle` 的 `UseRect` 应用程序的源代码。


    ```

    class UseRect

    {

    public static void main(String[] args)

    {

    System.out.println("Rectangle.Float Demo");

    System.out.println();

    Rectangle r = new Rectangle.Float(10.0f, 20.0f, 30f, 40f);

    System.out.println(r.getX());

    System.out.println(r.getY());

    System.out.println(r.getW());

    System.out.println(r.getH());

    System.out.println("contains(40.0, 45.0): " + r.contains(35.0, 40.0));

    System.out.println("contains(80.0, 45.0): " + r.contains(80.0, 40.0));

    System.out.println();

    System.out.println("Rectangle.Double Demo");

    System.out.println();

    r = new Rectangle.Double(15.0, 25.0, 35, 45);

    System.out.println(r.getX());

    System.out.println(r.getY());

    System.out.println(r.getW());

    System.out.println(r.getH());

    System.out.println("contains(40.0, 45.0): " + r.contains(40.0, 45.0));

    System.out.println("contains(80.0, 45.0): " + r.contains(80.0, 45.0));

    }

    }

    清单 9-4

    UseRect.java

    ```


    请注意以下语句：


    ```

    Rectangle r = new Rectangle.Float(10.0f, 20.0f, 30f, 40f);

    r = new Rectangle.Double(15.0, 25.0, 35, 45);

    ```


    第一条语句实例化了 `Float` 类，第二条语句实例化了 `Double` 类。传递给每个类构造函数的参数存储在其 `x`、`y`、`w` 和 `h` 字段中。由于
    `Float` 和 `Double` 扩展了 `Rectangle`，返回的对象也是 `Rectangle` 类型，其引用可以赋值给 `Rectangle`
    变量 `r`。


    `Float` 和 `Double` 各自扩展了 `Rectangle`，以提供单精度浮点和双精度浮点的 `Rectangle` 实现。`Float` 的存在是为了减少内存消耗（在构建场景时，你可能会有数千个甚至更多这样的对象），而
    `Double` 的存在是为了在需要更高精度时使用。


    当调用 `Rectangle` 的方法（如 `getX()`）时，例如 `r.getX()`，子类型多态性就会发挥作用。Java 用于实现子类型多态性的向上转型和后期绑定机制（参见第
    8 章）会导致调用 `Float` 的 `getX()` 方法（在第一条语句中）和 `Double` 的 `getX()` 方法（在第二条语句中）。


    按如下方式编译清单 9-3 和 9-4：


    ```

    javac *.java

    ```


    按如下方式运行应用程序：


    ```

    java UseRect

    ```


    你应该会看到以下输出：


    ```

    Rectangle.Float Demo

    10.0

    20.0

    30.0

    40.0

    contains(40.0, 45.0): true

