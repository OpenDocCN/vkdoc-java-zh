    ### Properties 类


    Java 提供了 `Properties` 类来简化应用程序配置数据的管理。它提供了一种管理键值对的简单方法，这使得它对于维护应用程序设置（例如窗口的位置和大小——本书不讨论窗口和其他用户界面概念）、数据库连接（我也不讨论数据库）以及其他可配置项非常有用。

