    The first two methods generate two different local classes with the same name.
    The compiler generates the following class files:


    ```

    EnclosingClass$1LClass.class

    EnclosingClass$1LClass2.class

    EnclosingClass$2LClass.class

    EnclosingClass.class

    ```


