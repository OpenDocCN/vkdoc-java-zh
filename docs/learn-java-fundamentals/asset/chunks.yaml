    ### 一个更实用的局部类示例


    `LCDemo`让你有机会学习如何使用局部类。由于能够更实际地学习如何使用局部类会更好，我创建了一个受益于局部类的小型`AddressBook`类。在我介绍`AddressBook`之前，请先查看清单[9-13](#615966_1_En_9_Chapter.xhtml#PC39)中`AddressBook`所依赖的`Address`类。


    ```

    class Address

    {

    private String street, city;

    Address(String street, String city)

    {

    this.street = street;

    this.city = city;

    }

    String getStreet()

    {

    return street;

    }

    String getCity()

    {

    return city;

    }

    @Override

    public String toString()

    {

    return street + ": " + city;

    }

    }

