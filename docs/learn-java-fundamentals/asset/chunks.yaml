- fmt: '### Method Overriding


    A subclass can *override* (replace) an inherited method so that the subclass’s
    version of the method is called instead. An overriding method must specify the
    same name, parameter list, and return type as the method being overridden. I’ve
    declared an `info()` method in Listing [7-5](#615966_1_En_7_Chapter.xhtml#PC10)’s
    `Vehicle` class to demonstrate.


    ```

    class Vehicle

    {

    private String make;

    private String model;

    private int year;

    Vehicle(String make, String model, int year)

    {

    this.make = make;

    this.model = model;

    this.year = year;

    }

    String getMake()

    {

    return make;

    }

    String getModel()

    {

    return model;

    }

    int getYear()

    {

    return year;

    }

    void info()

    {

    System.out.println("Make: " + make + ", Model: " + model + ", Year: " + year);

    }

    }

    Listing 7-5

    Vehicle.java

    ```


    Next, I override `info()` in Listing [7-6](#615966_1_En_7_Chapter.xhtml#PC11)’s
    `Truck` class.


    ```

    class Truck extends Vehicle

    {

    private boolean isExtendedCab;

    Truck(String make, String model, int year, boolean isExtendedCab)

    {

    super(make, model, year);

    this.isExtendedCab = isExtendedCab;

    }

    boolean isExtendedCab()

    {

    return isExtendedCab;

    }

    void info()

    {

    super.info();

    System.out.println("Is extended cab: " + isExtendedCab);

    }

    }

    Listing 7-6

    Truck.java

    ```


    `Truck`’s `info()` method has the same name, return type, and parameter list as
    `Vehicle`’s `info()` method. Note, too, that `Truck`’s `info()` method first calls
    `Vehicle`’s `info()` method by prefixing `super` followed by the member-selection
    operator (`.`) to the method name. It’s often a good idea to execute the superclass
    logic first and then execute the subclass logic.


    Note


    To call a superclass method from the overriding subclass method, prefix the method’s
    name with `super` and the `.` operator. Otherwise, you end up calling the subclass’s
    overriding method recursively. In some cases, a subclass will mask non-`private`
    superclass fields by declaring same-named fields. You can use `super` and `.`
    to access the non-`private` superclass fields.


    Listing [7-7](#615966_1_En_7_Chapter.xhtml#PC12) completes this example by presenting
    the source code to a `VehicleDemo` application class.


    ```

    class VehicleDemo

    {

    public static void main(String[] args)

    {

    Truck truck = new Truck("Ford", "F150", 2023, true);

    System.out.println("Make = " + truck.getMake());

    System.out.println("Model = " + truck.getModel());

    System.out.println("Year = " + truck.getYear());

    System.out.println("Is extended cab = " + truck.isExtendedCab());

    truck.info();

    }

    }

    Listing 7-7

    VehicleDemo.java

    ```


    Compile Listing [7-7](#615966_1_En_7_Chapter.xhtml#PC12) and the other source
    files as follows:


    ```

    javac VehicleDemo.java

    ```


    or


    ```

    javac *.java

    ```


    Assuming no compilation errors, run the `VehicleDemo` application as follows:


    ```

    java VehicleDemo

    ```


    You should observe the following output:


    ```

    Make = Ford

    Model = F150

    Year = 2023

    Is extended cab = true

    Make: Ford, Model: F150, Year: 2023

    Is extended cab: true

    ```


    The final two output lines are the result of the `truck.info()` call. The first
    line, `Make: Ford, Model: F150, Year: 2023`, results from `Truck`’s `info()` method
    invoking its `Vehicle` superclass’s `info()` method via `super.info()`. The second
    line executes `System.out.println("Is extended cab: " + isExtendedCab);` to output
    whether or not the truck is an extended cab.


    Note


    You might declare a method that should not be overridden for security or another
    reason. Java provides the `final` keyword to prevent the method from being overridden.
    Simply prefix a method header with `final`, as in `final String getMake()`. Given
    this declaration, the compiler will report an error when someone attempts to override
    `getMake()`.


    #### Method Overloading Instead of Overriding


    Assume that you replace Listing [7-6](#615966_1_En_7_Chapter.xhtml#PC11)’s `info()`
    method with the following `info()` method that lets you also output a license
    number:


    ```

    void info(String licenseNumber)

    {

    System.out.print("License number: " + licenseNumber);

    super.info();

    }

    ```


    The modified `Truck` class now has two `info()` methods: the preceding explicitly
    declared method and the method inherited from `Vehicle`.


    The `void info(String licenseNumber)` method doesn’t override `Vehicle`’s `info()`
    method. Instead, it *overloads* (supplies a different method with the same name)
    the `info()` method. The `truck.info()` call will not invoke `void info(String
    licenseNumber)`.


    You can detect an attempt to overload instead of override a method at compile
    time by prefixing a subclass’s method header with the `@Override` *annotation*
    (additional information that is attached to a method). The following `info()`
    method demonstrates:


    ```

    @Override

    void info(String licenseNumber)

    {

    System.out.print("License number: " + licenseNumber);

    super.info();

    }

    ```


    Specifying `@Override` tells the compiler that the method overrides another method.
    If someone attempted to overload the method instead, the compiler would report
    an error. Without this annotation, the compiler would not report an error because
    method overloading is legal. (I don’t discuss annotations further in this book
    because I don’t consider them to be a fundamental Java language feature.)


    Tip


    Get into the habit of prefixing overriding methods with `@Override`. This habit
    will help you detect overloading mistakes much sooner.


    #### Method Overriding and Protected Methods


    Java provides the `protected` keyword for use in a method-overriding context.
    You can also use `protected` for fields. This keyword is commonly used to identify
    methods that are designed to be overridden, given that not all accessible methods
    should be overridden.


    When you declare a method or field `protected`, the method or field becomes accessible
    to all of the code within any class that has been declared in the same package.
    It is also accessible to subclasses regardless of their packages. (I discuss packages
    in Chapter [10](#615966_1_En_10_Chapter.xhtml).)'
  raw: '### Method Overriding


    A subclass can *override* (replace) an inherited method so that the subclass’s
    version of the method is called instead. An overriding method must specify the
    same name, parameter list, and return type as the method being overridden. I’ve
    declared an `info()` method in Listing [7-5](#615966_1_En_7_Chapter.xhtml#PC10)’s
    `Vehicle` class to demonstrate.


    ```

    class Vehicle

    {

    private String make;

    private String model;

    private int year;

    Vehicle(String make, String model, int year)

    {

    this.make = make;

    this.model = model;

    this.year = year;

    }

    String getMake()

    {

    return make;

    }

    String getModel()

    {

    return model;

    }

    int getYear()

    {

    return year;

    }

    void info()

    {

    System.out.println("Make: " + make + ", Model: " + model + ", Year: " + year);

    }

    }

    Listing 7-5

    Vehicle.java

    ```


    Next, I override `info()` in Listing [7-6](#615966_1_En_7_Chapter.xhtml#PC11)’s
    `Truck` class.


    ```

    class Truck extends Vehicle

    {

    private boolean isExtendedCab;

    Truck(String make, String model, int year, boolean isExtendedCab)

    {

    super(make, model, year);

    this.isExtendedCab = isExtendedCab;

    }

    boolean isExtendedCab()

    {

    return isExtendedCab;

    }

    void info()

    {

    super.info();

    System.out.println("Is extended cab: " + isExtendedCab);

    }

    }

    Listing 7-6

    Truck.java

    ```


    `Truck`’s `info()` method has the same name, return type, and parameter list as
    `Vehicle`’s `info()` method. Note, too, that `Truck`’s `info()` method first calls
    `Vehicle`’s `info()` method by prefixing `super` followed by the member-selection
    operator (`.`) to the method name. It’s often a good idea to execute the superclass
    logic first and then execute the subclass logic.


    Note


    To call a superclass method from the overriding subclass method, prefix the method’s
    name with `super` and the `.` operator. Otherwise, you end up calling the subclass’s
    overriding method recursively. In some cases, a subclass will mask non-`private`
    superclass fields by declaring same-named fields. You can use `super` and `.`
    to access the non-`private` superclass fields.


    Listing [7-7](#615966_1_En_7_Chapter.xhtml#PC12) completes this example by presenting
    the source code to a `VehicleDemo` application class.


    ```

    class VehicleDemo

    {

    public static void main(String[] args)

    {

