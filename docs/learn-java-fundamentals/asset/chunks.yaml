- fmt: '### Packaging a Logging Library


    Suppose your application needs to log messages to the console, to a file, or to
    another destination. It can accomplish this task with the help of a logging library.
    My implementation of this library consists of an interface named `Logger`, an
    abstract class named `LoggerFactory`, and a pair of package-private classes named
    `Console` and `File`.


    Listing [10-1](#615966_1_En_10_Chapter.xhtml#PC3) presents the `Logger` interface,
    which describes objects that log messages.


    ```

    package logging;

    public interface Logger

    {

    boolean connect();

    boolean disconnect();

    boolean log(String msg);

    }

    Listing 10-1

    Logger.java

    ```


    Each of the `connect()`, `disconnect()`, and `log()` methods returns `true` on
    success and `false` on failure. (Chapter [11](#615966_1_En_11_Chapter.xhtml) presents
    a better technique for dealing with failure.) These methods are not declared `public`
    explicitly because an interface’s methods are implicitly `public`.


    Listing [10-2](#615966_1_En_10_Chapter.xhtml#PC4) presents the `LoggerFactory`
    abstract class.


    ```

    package logging;

    public abstract class LoggerFactory

    {

    public final static int CONSOLE = 0;

    public final static int FILE = 1;

    public static Logger newLogger(int dstType, String... dstName)

    {

    switch (dstType)

    {

    case CONSOLE:

    return new Console(dstName.length == 0 ? null : dstName[0]);

    case FILE:

    return new File(dstName.length == 0 ? null : dstName[0]);

    default:

    return null;

    }

    }

    }

    Listing 10-2

    LoggerFactory.java

    ```


    Listing [10-2](#615966_1_En_10_Chapter.xhtml#PC4)’s `LoggerFactory` class is stored
    in file `LoggerFactory.java`. This listing begins with a `package` statement that
    identifies `logging` as the class’s package.


    `LoggerFactory` is declared `public` so that it can be referenced from outside
    of its package. Also, it is declared `abstract` so that it cannot be instantiated.


    **Caution**


    Only one `public` class or interface can appear in a source file. Furthermore,
    the source file must be named after the class or interface name. Failing to adhere
    to either requirement results in the compiler reporting an error.


    `newLogger()` returns a `Logger` instance for logging messages to an appropriate
    destination. It uses the varargs feature (see Chapter [6](#615966_1_En_6_Chapter.xhtml))
    to optionally accept an extra `String` argument for those destination types that
    require the argument. For example, `FILE` requires a file name.


    Listing [10-3](#615966_1_En_10_Chapter.xhtml#PC5) presents the package-private
    `Console` class – this class is not accessible beyond the classes in the `logging`
    package because reserved word `class` is not preceded by reserved word `public`.


    ```

    package logging;

    class Console implements Logger

    {

    private String dstName;

    Console(String dstName)

    {

    this.dstName = dstName;

    }

    @Override

    public boolean connect()

    {

    return true;

    }

    @Override

    public boolean disconnect()

    {

    return true;

    }

    @Override

    public boolean log(String msg)

    {

    System.out.println(msg);

    return true;

    }

    }

    Listing 10-3

    Console.java

    ```


    `Console`’s package-private constructor saves its argument, which most likely
    will be the `null` reference because there is no need for a `String` argument.
    Perhaps a future version of `Console` will use this argument to identify one of
    multiple console windows.


    Listing [10-4](#615966_1_En_10_Chapter.xhtml#PC6) presents the package-private
    `File` class.


    ```

    package logging;

    class File implements Logger

    {

    private String dstName;

    File(String dstName)

    {

    this.dstName = dstName;

    }

    @Override

    public boolean connect()

    {

    if (dstName == null)

    return false;

    System.out.println("opening file " + dstName);

    return true;

    }

    @Override

    public boolean disconnect()

    {

    if (dstName == null)

    return false;

    System.out.println("closing file " + dstName);

    return true;

    }

    @Override

    public boolean log(String msg)

    {

    if (dstName == null)

    return false;

    System.out.println("writing " + msg + " to file " + dstName);

    return true;

    }

    }

    Listing 10-4

    File.java

    ```


    Unlike `Console`, `File` requires a non-null argument. Each method first verifies
    that this argument is not `null`. If the argument is `null`, the method returns
    `false` to signify failure.


    Complete the following steps to build this library:


    1. Select a suitable location in your file system as the current directory.

    2. Create a `logging` subdirectory in the current directory.

    3. Copy Listings [10-1](#615966_1_En_10_Chapter.xhtml#PC3) and [10-2](#615966_1_En_10_Chapter.xhtml#PC4)
    to files `Logger.java` and `LoggerFactory.java`, respectively; and store these
    files in the `logging` subdirectory.

    4. Copy Listings [10-3](#615966_1_En_10_Chapter.xhtml#PC5) and [10-4](#615966_1_En_10_Chapter.xhtml#PC6)
    to files `Console.java` and `File.java`, respectively; and store these files in
    the `logging` subdirectory.

    5. Assuming that the current directory contains the `logging` subdirectory, execute
    `javac logging/*.java` to compile the four source files in `logging`. If all goes
    well, you should discover `Logger.class`, `LoggerFactory.class`, `Console.class`,
    and `File.class` in the `logging` subdirectory. (Alternatively, for this example,
    you could switch to the `logging` subdirectory and execute `javac *.java`.)


    Now that you’ve created the `logging` library, you’ll want to use it. I’ll present
    a small Java application that properly demonstrates this library in the next section.'
