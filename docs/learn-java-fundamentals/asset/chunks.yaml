    ## 二维数组


    *二维数组*（2D 数组——也称为*表格*或*矩阵*）是一种将每个元素与两个索引关联的数组。它用于存储值的表格。该数组通过一个数组变量存储，其语法如下所示：


    ```

    type ''['' '']'' ''['' '']'' identifier

    ```


    或


    ```

    type identifier ''['' '']'' ''['' '']''

    ```


    这两对方括号可以出现在*类型*名称之后，或命名变量的*标识符*之后。它们表示*标识符*引用了一个元素具有指定*类型*的二维数组。该数组的类型是 *type*`[][]`。


    ### 创建二维数组


    创建二维数组有三种方法：仅使用初始化器、仅使用关键字 `new`，以及将关键字 `new` 与初始化器结合使用。

    '
- fmt: '### Use Only an Initializer


    The initializer-only approach adheres to the following syntax:


    ```

    ''{'' [rowInitializer ('','' rowInitializer)*] ''}''

    ```


    where *rowInitializer* has the following syntax:


    ```

    ''{'' [expr ('','' expr)*] ''}''

    ```


    This syntax reveals that a 2D array is an optional comma-separated list of row
    initializers appearing between open and close brace characters. Furthermore, each
    row initializer is an optional comma-separated list of expressions between open
    and close brace characters. As with 1D arrays, all expressions must evaluate to
    compatible types.


    The following example demonstrates the initializer approach to creating a 2D array:


    ```

    int[][] tempsForNextThreeDays = { {30, 25, 26}, {14, 16, 13} };

    ```


    The example creates a 2D array of high (row 0) and low (row 1) temperatures over
    the next three days and assigns the 2D array’s reference to `tempsForNextThreeDays`.
    Figure [5-2](#615966_1_En_5_Chapter.xhtml#Fig2) presents a conceptual view of
    this array.


    ![](images/615966_1_En_5_Chapter/615966_1_En_5_Fig2_HTML.jpg)


    A table with two rows and three columns has the following elements. 30. 25. 26.
    14. 16. 13.


    Figure 5-2


    A conceptual view of the array assigned to `tempsForNextThreeDays`


    Value `30` is located at row 0 and column 0, `25` is located at row 0 and column
    1, and `26` is located at row 0 and column 2. Value `14` is located at row 1 and
    column 0, `16` is located at row 1 and column 1, and `13` is located at row 2
    and column 2.


    ### Use Only Keyword `new`


    The keyword `new`–only approach adheres to the following syntax:


    ```

    ''new'' type ''['' int_expr1 '']'' ''['' int_expr2 '']''

    ```


    Keyword `new` allocates memory for the array. The number of row elements is specified
    by *int_expr1* (a non-negative integer typically greater than 0), the number of
    column elements is specified by *int_expr2*, and the size of each element is implied
    by *type*. All elements share the same type and are zeroed (and interpreted as
    `0`, `0L`, `0.0F`, `0.0`, `false`, `null`, or `''\u0000''`).


    The previous example (minus the element values) could be expressed as follows:


    ```

    int[][] tempsForNextThreeDays = new int[3][3];

    ```


    Values would be filled in later.


    ### Use Keyword `new` with an Initializer


    There is one more way to create an array: use keyword `new` with an initializer.
    You’ll need to adhere to the following syntax:


    ```

    ''new'' type ''['' '']'' ['' '']'' ''{'' [rowInitializer ('','' rowInitializer)*]
    ''}''

    ```


    where *rowInitializer* has the following syntax:


    ```

    ''{'' [expr ('','' expr)*] ''}''

    ```


    This syntax blends the previous two syntaxes. Because the number of elements can
    be determined from the comma-separated list of expressions, it isn’t necessary
    (or allowed) to provide an *int_expr* between the square brackets.


    The following example demonstrates the keyword `new` with initializer approach
    to creating a 2D array:


    ```

    int[][] tempsForNextThreeDays = new int[][] { {30, 25, 26}, {14, 16, 13} };

    ```


    The first syntax is syntactic sugar for the third approach.


    ### Accessing 2D Array Elements


    Java implements a 2D array as a 1D row array of 1D column arrays. Each element
    in the row array references the column array.


    A 2D array variable is associated with a `.length` property for its 1D row array
    that returns the length of this array as a positive `int`; for example, `tempsForNextThreeDays.length`
    returns 2 (there are two rows). This value is important when accessing a 1D array’s
    elements.


    Given a 2D array variable, you can access any element in the row array by specifying
    an expression that agrees with the following syntax:


    ```

    array_var ''['' index '']''

    ```


    Here, *index* is a positive `int` that ranges from zero (Java arrays are zero
    based) to one less than the value returned from the `.length` property.


    Consider the previous `tempsForNextThreeDays` array. The following example references
    the first row element:


    ```

    tempsForNextThreeDays[0]

    ```


    You can print out this element as follows:


    ```

    System.out.println(tempsForNextThreeDays[0]);

    ```


    In response, you would see something very strange that looks similar to the following:


    ```

    [I@372f7a8d

    ```


    This is a special code indicating that `tempsForNextThreeDays[0]` references an
    array.


    To print out the very first element (in row 0 and column 0), you would execute
    the following code:


    ```

    System.out.println(tempsForNextThreeDays[0][0]); // Output 30

    ```


    You could use a `for` loop to print out all elements as follows:


    ```

    int[][] tempsForNextThreeDays = new int[][] { {30, 25, 26}, {14, 16, 13} };

    for (int row = 0; row < tempsForNextThreeDays.length; row++)

    {

    for (int col = 0; col < tempsForNextThreeDays[row].length; col++)

    System.out.print(tempsForNextThreeDays[row][col] + " ");

    System.out.println();

    }

    ```


    Note


    `System.out.print()` outputs text without outputting a newline character after
    this text. As a result, further printing outputs to the same line. `System.out.println()`
    without anything between `(` and `)` outputs only a newline character so that
    further output appears on the next line. The combination of these two method calls
    behaves like the `System.out.println()` method calls that take an argument and
    that you’ve previously seen in this book.


    You could modify the third element in the second row as follows:


    ```

    tempsForNextThreeDays[1][2] = 15;

    ```


    For either the row array or one of the column arrays, if you specify a negative
    index or an index that is greater than or equal to the array’s length, Java will
    create and throw an `ArrayIndexOutOfBoundsException` object. I’ll have more to
    say about this topic when I discuss exceptions in Chapter [11](#615966_1_En_11_Chapter.xhtml).'
