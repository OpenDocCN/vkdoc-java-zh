    Beware of the potential for name collisions when extending multiple interfaces.
    This occurs when the same constant name appears in each superinterface, possibly
    with different type and/or other information, and is accessed in the subinterface.
    When a name collision occurs, the compiler reports an error, which Listing [8-14](#615966_1_En_8_Chapter.xhtml#PC22)
    demonstrates.


    ```

    interface X

    {

    int SOME_CONSTANT = 2;

    void some_method();

    }

    interface Y

    {

    int SOME_CONSTANT = 3;

    int some_method(int x);

    }

    interface Z extends X, Y

    {

    int SOME_CONSTANT2 = SOME_CONSTANT;

    }

    Listing 8-14

    Z.java (demonstrating colliding constants)

    ```


    Here, interface `Z` inherits two different constants named `SOME_CONSTANT` that
    are initialized to two different values. The Java compiler cannot determine which
    constant should be inherited by `Z` (the same problem would occur if each constant
    was assigned the same value) and reports the following error message:


    ```

    Z.java:15: error: reference to SOME_CONSTANT is ambiguous

    int SOME_CONSTANT2 = SOME_CONSTANT;

    ^

    both variable SOME_CONSTANT in X and variable SOME_CONSTANT in Y match

    1 error

    ```


    ## Downcasting and RTTI


    Moving up the class hierarchy, via upcasting, entails losing access to subtype
    features. For example, assigning a `Truck` object to `Vehicle` variable `v` means
    that you cannot use `v` to call `Truck`’s `isExtendedCab()` method. However, it’s
    possible to once again access `Truck`’s `isExtendedCab()` method by performing
    an explicit cast operation like this one: `Truck t = (Truck) v;`.


    This assignment is known as *downcasting* because you are casting down the inheritance
    hierarchy from a supertype to a subtype (from the `Vehicle` superclass to the
    `Truck` subclass). Although an upcast is always safe (the superclass’s interface
    is a subset of the subclass’s interface), a downcast isn’t always safe. Listing
    [8-15](#615966_1_En_8_Chapter.xhtml#PC24) shows what kind of trouble could follow
    if you use downcasting incorrectly.


    ```

    class Vehicle

    {

    }

    class Truck extends Vehicle

    {

    private boolean isExtendedCab;

    boolean isExtendedCab()

    {

    return isExtendedCab;

    }

    }

    public class BadDowncast

    {

    public static void main(String[] args)

    {

    Vehicle v = new Vehicle();

    Truck t = (Truck) v;

    System.out.println(t.isExtendedCab());

    }

    }

    Listing 8-15

    BadDowncast.java (demonstrating the problem with downcasting)

    ```


    Listing [8-15](#615966_1_En_8_Chapter.xhtml#PC24) presents a class hierarchy consisting
    of `Vehicle` and `Truck`, which extends `Vehicle`. Furthermore, `Truck` declares
    `isExtendedCab()`. A third class named `BadDowncast` provides a `main()` method
    that first instantiates `Vehicle`.


    The `main()` method then tries to downcast this object to `Truck` and assign the
    result to variable `t`. The compiler will not complain because downcasting from
    a superclass to a subclass in the same type hierarchy is legal.


    If the assignment was allowed, the application would crash when it tried to execute
    `t.isExtendedCab();` because the Java Virtual Machine (JVM) would be attempting
    to call a nonexistent method: `Vehicle` doesn’t declare `isExtendedCab()`. Fortunately,
    the JVM verifies that a cast is legal before performing a cast operation. Detecting
    that `Vehicle` doesn’t declare `isExtendedCab()`, it would throw a `ClassCastException`
    object. (I’ll discuss exceptions in Chapter [11](#615966_1_En_11_Chapter.xhtml).)


