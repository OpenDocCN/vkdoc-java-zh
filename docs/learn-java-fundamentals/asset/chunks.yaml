  raw: '### Switch Statement


    The *switch* *statement* lets you select one of multiple execution paths more
    efficiently than with equivalent chained `if`-`else` statements. This statement
    has the following syntax:


    ```

    ''switch'' ''('' selector expression '')''

    ''{''

    ''case'' value1 '':'' statement1 [''break'' '';'']

    ''case'' value2 '':'' statement2 [''break'' '';'']

    ...

    ''case'' valueN '':'' statementN [''break'' '';'']

    [''default'' '':'' statement]

    ''}''

    ```


    The `switch` statement begins with reserved word `switch`, followed by a *selector
    expression* in parentheses and a body of `case`s. The *selector expression* is
    any expression that evaluates to an integer, character, or string.


    Each `case` begins with reserved word `case`, continues with a literal value and
    a colon (`:`) character, continues with a statement to execute, and optionally
    concludes with a `break` statement (discussed later in this chapter). The `break`
    statement causes execution to continue after the `switch` statement.


    After evaluating *selector_expression*, `switch` compares this value with each
    `case`’s value until it finds a match. If there is a match, the `case`’s statement
    is executed. For example, if *selector_expression*’s value matches *value1*, *statement1*
    executes.


    The optional `break` statement (anything in square brackets is optional), which
    consists of reserved word `break` followed by a semicolon (`;`), prevents the
    flow of execution from continuing with the next `case`’s statement. Instead, execution
    continues with the first statement following `switch`.


    BREAK STATEMENT PLACEMENT AND A HARD-TO-FIND BUG


    You will usually place a `break` statement after a `case`’s statement. Forgetting
    to include `break` can lead to a hard-to-find bug in which execution flows from
    the end of a `case` and to the beginning of the following `case`, instead of leaving
    the `switch` statement immediately after the first `case` finishes. However, there
    are situations where you want to group several `case`s together and have them
    execute common code. For example, you have written code that prompts the user
    to enter character `Y` (for Yes) or character `y` (for yes) to continue a program,
    and you want to execute the same code regardless of which character has been entered.
    In such a situation, you would omit the `break` statement from the participating
    `case`s except for the last `case` in the group.Consider the following example:


    ```

    System.out.print("Enter Y or y to end program:");

    // Code to input Y or y and store this character in char variable ch.

    switch (ch)

    {

    case ''Y'':

    case ''y'': System.out.println("Y or y has been entered.");

    break;

    }

    ```


    If none of the `case`s’ values match the *selector_expression*’s value, and if
    a default `case` (signified by the `default` reserved word followed by a colon)
    is present, the default `case`’s statement is executed. The following example
    demonstrates this statement:


    ```

    String direction = "East";

    switch (direction)

    {

    case "North": travelNorth(); break;

    case "East": travelEast(); break;

    case "South": travelSouth(); break;

    default: travelWest();

    }

    ```


    After declaring variable `direction` and initializing this variable to `"East"`,
    the example enters the `switch` statement. This statement reads `direction`’s
    string and then compares this value with each `case`’s string in top-down order
    until a match is found.


    It first compares `"East"` with `"North"`. Because they don’t match, `switch`
    proceeds to the next `case`, whose string value is `"East"`. Because they match,
    `switch` calls a method (I discuss methods in Chapter [6](#615966_1_En_6_Chapter.xhtml))
    named `travelEast()`. When this method returns, `switch` executes the `break`
    statement, which causes execution to proceed to the first statement following
    `switch`.


    Suppose that `direction` had been initialized to `"SouthWest"`. Because none of
    the `case`s’ strings would have matched, `switch` would have executed the `default`
    case: its `travelWest()` method would have been invoked.


    ## Loop Statements


    A *loop statement* allows a Java program to repeatedly execute other statements.
    There are three kinds of loop statements: `for`, `while`, and `do`-`while`.


    Note


    Each occurrence of a repeated execution is known as a *loop*. Furthermore, each
    loop execution is known as an *iteration*.


    ### For Statement


    The *for* *statement* iterates over another statement a specific number of times
    or indefinitely. This statement has the following syntax:


    ```

    ''for'' ''('' [initialize] '';'' [test] '';'' [update] '')''

    statement

    ```


    The `for` statement begins with reserved word `for`, followed by a header in parentheses,
    followed by *statement*. The header begins with an optional *initialize* section
    followed by a non-optional semicolon character. It continues with an optional
    *test* section followed by a semicolon character. It concludes with an optional
    *update* section.


    The *initialize* section consists of a comma (`,`)-separated list of variable
    declarations or variable assignments. Some or all of these variables are typically
    used to control the loop’s duration and are known as *loop-control variables*.


    The *test* section consists of a Boolean expression that determines the length
    of the loop. The loop continues for as long as this expression is true.


    The *update* section consists of a comma-separated list of expressions that typically
    modify the loop-control variables.


    The `for` statement first executes the *initialize* section. It then executes
    the *test* section to determine if the loop should continue. The *test* section
    consists of a Boolean expression that returns true to continue or false not to
    continue. After *statement* executes, the *update* section is executed, followed
    by *test*, *statement*, *update*, *test*, *statement*, *update*, and so on.


    The following example demonstrates the `for` statement:


    ```

    for (int i = 0; i < 10; i++)

    {

    for (int j = 0; j < i; j++)

    System.out.print("*");

    System.out.println();

    }

    ```


    The outer `for` statement begins with an initialization section consisting of
    `int i = 0;`. This compound-assignment statement declares an `int` variable named
    `i` and initializes it to `0`. After executing this section, `for` turns its attention
    to the testing section, which consists of `i < 10`.


    The `i < 10` Boolean expression compares the value in `i` with `10`. As long as
    `i`’s value is less than `10`, the `for` statement will continue to iterate over
    its *statement*.


    Continuing, this example enters the block that follows the `for` statement’s header.


    The block initially executes the inner `for` statement, whose initialization section
    introduces another `int` variable, `j`, which is initialized to `0`. Furthermore,
    its testing section evaluates `j < i`, which compares the current values in `j`
    and `i`. For as long as `j`’s value is less than `i`’s value, this Boolean expression
    will evaluate to true and this other `for` statement will continue to iterate.


    Assuming that the expression is true, execution passes to `System.out.print("*");`,
    which outputs an asterisk (`*`) without subsequently advancing to the next output
    line. Following the output, the inner `for` statement’s updating section executes
    `j++`, which increments the value stored in `j`.


    The inner `for` statement begins another iteration by evaluating `j < i`. Once
    `j`’s value exceeds `i`’s value, execution will leave the inner `for` statement
    and `System.out.println();` will execute, causing subsequent output to begin at
    the start of the next output line.


    This example draws the following pattern:


    ```

    *

    **

    ***

    ****

    *****

    ******

    *******

    ********

    *********

    ```'
