    #### 调用构造函数


    类可以声明多个构造函数。例如，考虑一个仅接受制造商和型号参数的 `Vehicle` 构造函数——它将年份设置为 -1，以表示该车辆的制造年份未知。该构造函数如下所示：


    ```

    Vehicle(String make, String model)

    {

    setMake(make);

    setModel(model);

    setYear(-1);

    }

    ```


    这个新构造函数的问题在于它重复了原始构造函数中的代码：`setMake(make);` 后跟 `setModel(model);`。重复的代码会给类增加不必要的臃肿。Java
    通过提供 `this()` 语法来避免这种重复，使一个构造函数能够调用另一个构造函数：


    ```

    Vehicle(String make, String model)

    {

    this(make, model, -1);

    }

    ```


    `this()` 调用将其参数传递给 `Vehicle(String make, String model, int year)` 构造函数。编译器知道要调用这个构造函数，因为它将构造函数的参数数量和参数类型与
    `this()` 调用的参数数量和参数类型进行了匹配。


    **注意**


    如果在构造函数的 `this()` 调用之前放置任何代码，编译器将报告错误。例如，`make = "{" + make + "}"; this(make,
    model, -1);` 是错误的，因为赋值语句位于 `this()` 调用之前。


    ### 综合运用


    我创建了一个 `Vehicle` 类，其中包含了前面介绍的各种增强功能。清单 6-1 展示了 `Vehicle` 的源代码。


    ```

    class Vehicle

    {

    String make;

    String model;

    int year;

    Vehicle(String make, String model)

    {

    setMake(make);

    setModel(model);

    setYear(-1);

    }

    Vehicle(String make, String model, int year)

    {

    setMake(make);

    setModel(model);

    setYear(year);

    }

    String getMake()

    {

    return make;

    }

    String getModel()

    {

    return model;

    }

    int getYear()

    {

    return year;

    }

    void setMake(String make)

    {

    this.make = make;

    }

    void setModel(String model)

    {

    this.model = model;

    }

    void setYear(int year)

    {

    this.year = year;

    }

    }

    清单 6-1

    Vehicle.java

    ```


    按如下方式编译清单 6-1：


    ```

    javac Vehicle.java

    ```


    由于生成的 `Vehicle.class` 文件不是一个应用程序，因此无法运行它。我们将在本章后面通过一个包含 `main()` 方法的类（类似于第 1 章中所示的方法）来访问它。这两个类将共同描述我们的应用程序。


    ## 对象介绍


    *对象*是类的实例。它们代表特定的抽象实体（例如您的储蓄账户）或特定的物理实体（例如您正在阅读的漫画书或您正在驾驶的卡车）。


    在本节中，您首先学习如何构造对象。然后学习如何访问它们的字段并调用它们的方法。


    ### 构造对象


    声明类之后，就可以从中构造对象。通过将 `new` 运算符与构造函数结合使用来构造对象。例如，可以通过指定 `new` 运算符后跟一个 `Vehicle`
    构造函数来构造一个或多个 `Vehicle` 对象，如下所示：


    ```

    Vehicle v = new Vehicle("Ford", "F150", 2023);

    ```


    `new` 运算符会为 `Vehicle` 对象分配内存，然后使用参数 `"Ford"`、`"F150"` 和 `2023` 调用其三参数构造函数。`Vehicle`
    的 `make`、`model` 和 `year` 字段被初始化为这些值。完成后，`new` 返回对新创建的 `Vehicle` 对象的引用。然后，该引用被赋值给变量
    `v`。


    **注意**


    如果您曾疑惑为什么构造函数没有返回类型，原因在于 `new` 无法在返回对新构造对象的引用的同时返回构造函数的值。


    ### 访问字段


    现在您已经构造了一个对象，可以使用成员选择运算符（`.`）配合对象引用来访问对象的字段。例如，按如下方式访问先前创建的 `Vehicle` 对象的字段：


    ```

    System.out.println(v.make); // Ford

    System.out.println(v.model); // F150

    System.out.println(v.year); // 2023

    ```


    直接访问字段通常不是一个好主意。相反，您应该调用 getter 方法来访问字段。虽然这看起来有些多余，但它可以防止在需要删除或重命名字段时，访问该字段的代码出现故障。在本章后面讨论信息隐藏时，您将了解更多关于此主题的内容。


    ### 调用方法


    使用 `.` 运算符配合对象引用来调用对象的方法。例如，按如下方式调用先前创建的 `Vehicle` 对象的方法：


    ```

    v.setMake("Dodge");

    v.setModel("Durango");

    v.setYear(2023);

    ```


    之后，您可以调用对应的“get”方法来返回这些值：


    ```

    System.out.println(v.getMake()); // Dodge

    System.out.println(v.getModel()); // Durango

    System.out.println(v.getYear()); // 2023

    ```


    一个方法（或构造函数）调用包含零个或多个参数，这些参数被传递给方法（或构造函数）的形参。Java 通过*按值传递*传递参数，即传递变量的值或其他表达式的值。相比之下，C++
    语言还支持*按引用传递*，它将参数的地址传递给方法，以便修改参数（不能是值）。


    方法调用需要一个方法调用栈来跟踪当被调用的方法完成时执行必须返回的语句。（*栈*是一种数据结构，用于记住诸如在走出迷宫时已访问过的先前位置之类的事情。）


    *方法调用栈*是一个方法调用的栈，它让 Java 虚拟机（JVM）能够记住当执行 `return` 语句或执行离开没有 `return` 的方法时，应该返回到哪个语句。此外，方法调用栈会基于每次方法调用跟踪形参和局部变量。


    **注意**


    可以将方法调用栈想象成自助餐厅里的一摞干净托盘——您从摞顶*弹出*一个干净托盘，洗碗工将下一个干净托盘*推*到摞顶。相反，您也可以将此栈想象成一摞脏托盘——您将一个脏托盘*推*到摞顶，洗碗工从摞顶*弹出*下一个脏托盘。


    当调用一个方法时，JVM 将调用方法返回后要执行的下一条语句的地址，连同被调用方法的参数一起推入方法调用栈。JVM 还会为方法的形参和/或局部变量分配栈空间。当方法返回时，JVM
    移除形参/局部变量空间，从栈中弹出地址和参数，并将执行转移到给定地址处的语句。


    ### 综合运用


    我创建了一个 `Vehicles` 类，其中包含了前面介绍的各种增强功能。清单 6-2 展示了 `Vehicles` 的源代码。


    ```

    class Vehicles

    {

    public static void main(String[] args)

    {

    Vehicle v = new Vehicle("Ford", "F150", 2023);

    System.out.println(v.make);

    System.out.println(v.model);

    System.out.println(v.year);

    v.setMake("Dodge");

    v.setModel("Durango");

    v.setYear(2023);

    System.out.println(v.getMake());

    System.out.println(v.getModel());

    System.out.println(v.getYear());

    }

    }

    清单 6-2

    Vehicles.java

    ```


    假设 `Vehicles.java` 与 `Vehicle.java` 以及先前创建的 `Vehicle.class` 位于同一目录中，按如下方式编译清单
    6-2：


    ```

    javac Vehicles.java

    ```


    假设 `Vehicles.class` 已成功创建，按如下方式运行应用程序：


    ```

    java Vehicles

    ```


    您应该会看到以下输出：


    ```

    Ford

    F150


    Dodge

    Durango


    ```

