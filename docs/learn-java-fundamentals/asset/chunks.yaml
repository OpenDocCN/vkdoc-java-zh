- fmt: '## Current Time and Nano Time


    `long currentTimeMillis()`方法返回自1970年1月1日00:00:00 UTC以来的当前系统时间（以毫秒为单位）。


    **注意**


    UTC代表协调世界时（[`http://en.wikipedia.org/wiki/Coordinated_Universal_Time`](http://en.wikipedia.org/wiki/Coordinated_Universal_Time)）。也许您期望缩写是CUT，但UTC实际上是CUT和法文版本TUC（Temps
    Universel Coordonné）之间的折衷方案。请访问[`www.space.com/what-is-utc.xhtml`](http://www.space.com/what-is-utc.xhtml)了解更多关于UTC的信息。


    也许您对之前日期和时间中的1970年1月1日00:00:00部分感到好奇。为什么`currentTimeMillis()`返回相对于该值的时间？[`http://kb.narrative.io/what-is-unix-time`](http://kb.narrative.io/what-is-unix-time)指出，1970年1月1日00:00:00
    UTC被称为*Unix纪元*。早期的Unix工程师任意选择了这个日期，因为他们需要为时间的起点设定一个统一日期，而1970年的元旦似乎最为方便。


    `currentTimeMillis()`返回的值本身没有意义。幸运的是，您可以通过将其传递给`java.util.Date`构造函数，将生成的long整数转换为人类可读的字符串，如下所示：


    ```

    String date = new Date(System.currentTimeMillis()).toString();

    ```


    **关于`Date`类**


    JDK 1.0（Java开发工具包的首个版本）引入了`Date`类，作为以平台无关方式表示日期和时间的方式。该类的缺陷（包括糟糕的API设计）导致JDK 8引入了Date
    and Time API，该API取代了`Date`。因此，`Date`的大部分内容已被弃用。（本书不讨论Date and Time，因为它是一个高级特性。）


    一个未被弃用的方法是`Date`的`toString()`方法，它返回`currentTimeMillis()`值的字符串表示。该表示遵循以下格式：


    **dow mon dd hh:mm:ss zzz yyyy**


    其中：


    *   **dow** 是星期几（Sun, Mon, Tue, Wed, Thu, Fri, Sat）。

    *   **mon** 是月份（Jan, Feb, Mar, Apr, May, Jun, Jul, Aug, Sep, Oct, Nov, Dec）。

    *   **dd** 是月份中的日期（01到31），以两位十进制数字表示。

    *   **hh** 是小时（00到23），以两位十进制数字表示。

    *   **mm** 是分钟（00到59），以两位十进制数字表示。

    *   **ss** 是秒（00到61），以两位十进制数字表示。

    *   **zzz** 是时区（可能反映夏令时）。标准时区缩写包括`Date`的`parse(String s)`方法识别的那些。如果时区信息不可用，则**zzz**为空：它不包含任何字符。

    *   **yyyy** 是年份，以四位十进制数字表示。


    我对**ss**字段允许60和61感到好奇，并向ChatGPT 3.5询问了这个异常现象：“为什么`java.util.Date`的`toString`方法似乎允许秒值为60或61？”ChatGPT回答如下：


    “在Java中，`java.util.Date`类并未明确阻止您将秒值设置为60或61。这种行为是`java.util.Date`实现方式的结果。


    `java.util.Date`将时间点表示为自‘纪元’（1970年1月1日00:00:00 GMT）以来的毫秒数。它没有单独的秒、分钟等字段。当您将秒值设置为高于59时，Java会自动调整分钟和秒组件。


    例如，如果您将秒设置为60，它会将分钟增加1并将秒设置为0。类似地，如果您将秒设置为61，它会将分钟增加1并将秒设置为1。


    这种行为与闰秒的处理方式有关。闰秒被添加或从协调世界时（UTC）中减去，以考虑地球自转的不规则性。在添加闰秒的情况下，`java.util.Date`对象中的秒值可能会暂时达到60或61。


    然而，需要注意的是，并非所有Java平台都以相同方式处理闰秒，其行为可能取决于底层操作系统和Java虚拟机（JVM）实现。


    对于精确的日期和时间处理，特别是如果您处理涉及闰秒的场景，建议使用Java 8中引入的较新的日期和时间API，该API属于`java.time`包。`java.time`中的`LocalDateTime`等类在一个简化的模型上运行，没有相同的闰秒行为。”


    我可以证明这个答案的正确性。


    `long nanoTime()`方法返回JVM高分辨率时间源的值，该时间源恰好是最精确的系统计时器。此方法返回的值表示自某个固定但任意的原点时间（可能在未来，因此值可能为负）以来经过的纳秒数。在JVM实例中，此方法的所有调用都使用相同的原点；其他虚拟机实例可能使用不同的原点。


    ```

    public class TimeDemo

    {

    public static void main(String[] args)

    {

    System.out.println("Number of milliseconds since midnight, January 1, " +

    "1970 UTC: " +

    System.currentTimeMillis());

    System.out.println("Number of milliseconds since midnight, January 1, " +

    "1970 UTC in human-readable format: " +

    new java.util.Date(System.currentTimeMillis()));

    System.out.println("Number of nanoseconds since some arbitrary origin " +

    "time: " + System.nanoTime());

    // Calculate how much time (in nanoseconds) it takes to calculate and

    // output all of a circle''s sine values in increments of 0.1 radians 100

    // times:

    long start = System.nanoTime();

    for (int i = 0; i < 100; i++)

    for (double angle = 0; angle < Math.PI * 2; angle += 0.1)

    System.out.println(Math.sin(angle));

    long end = System.nanoTime();

    System.out.println("Elapsed time (in nanoseconds): " + (end - start + 1));

    System.out.println("Elapsed time (in seconds): " +

    ((end - start + 1) / (1000 * 1000 * 1000)));

    }

    }

    Listing 14-2

    TimeDemo.java

    ```


    清单[14-2](#615966_1_En_14_Chapter.xhtml#PC8)的`main()`方法首先获取并输出当前时间（以毫秒为单位）。然后，它获取当前时间（以毫秒为单位），将此时间转换为`Date`对象，调用`Date`对象的`toString()`方法（在后台）将此对象转换为当前时间的字符串表示，将此字符串连接到`+`运算符的左操作数字符串字面量——多态性使该运算符根据其操作数的类型执行整数加法、浮点加法或字符串连接——并通过`System.out.println()`输出连接后的字符串。


    `main()`方法接下来调用`System.nanoTime()`以返回经过的纳秒时间，并将其输出。


    最后，`main()`计算以0.1弧度增量计算并输出一个圆的所有正弦值所需的时间（以纳秒为单位）。它执行此操作100次。


    该计算首先获取开始时间，然后执行计算并输出这些正弦值的代码，最后在计算/输出逻辑之后获取结束时间。从结束时间中减去开始时间，并将结果加1以获得以纳秒为单位的经过时间。（将纳秒数除以十亿[1000
    * 1000 * 1000]可将该值转换为秒数。）


    **注意**'
  raw: '## Current Time and Nano Time


    The `long currentTimeMillis()` method returns the current system time in milliseconds
    since January 1, 1970 00:00:00 UTC.


    Note


    UTC stands for Coordinated Universal Time ([`http://en.wikipedia.org/wiki/Coordinated_Universal_Time`](http://en.wikipedia.org/wiki/Coordinated_Universal_Time)).
    Perhaps you were expecting the acronym to read CUT, but UTC is actually a compromise
    between CUT and the French version, TUC, which stands for Temps Universel Coordonné.
    Check out [`www.space.com/what-is-utc.xhtml`](http://www.space.com/what-is-utc.xhtml)
    to learn more about UTC.


    Perhaps you are curious about the January 1, 1970 00:00:00 portion of the previous
    date and time. Why does `currentTimeMillis()` return the time relative to that
    value? [`http://kb.narrative.io/what-is-unix-time`](http://kb.narrative.io/what-is-unix-time),
    January 1st, 1970 at 00:00:00 UTC is referred to as the *Unix epoch*. Early Unix
    engineers picked that date arbitrarily because they needed to set a uniform date
    for the start of time, and New Year’s Day, 1970, seemed most convenient.


    By itself, the value returned from `currentTimeMillis()` is meaningless. Fortunately,
    you can convert the resulting long integer to a human-readable string by passing
    it to a `java.util.Date` constructor as follows:


    ```

    String date = new Date(System.currentTimeMillis()).toString();

    ```


    ABOUT THE DATE CLASS


    JDK 1.0 (the first release of the Java Development Kit) introduced the `Date`
    class as a way to represent dates and times in a platform-independent manner.
    Problems with this class (including poor API design) led to JDK 8’s introduction
    of the Date and Time API, which replaces `Date`. For this reason, much of `Date`
    has been deprecated. (I don’t discuss Date and Time in this book because it’s
    an advanced feature.)


    One method that was not deprecated is `Date`’s `toString()` method, which returns
    a string representation of a `currentTimeMillis()` value. This representation
    adheres to the following format:


    **dow mon dd hh:mm:ss zzz yyyy**


    where


    *   **dow** is the day of the week (Sun, Mon, Tue, Wed, Thu, Fri, Sat).


    *   **mon** is the month (Jan, Feb, Mar, Apr, May, Jun, Jul, Aug, Sep, Oct, Nov,
    Dec).


    *   **dd** is the day of the month (01 through 31), as two decimal digits.


    *   **hh** is the hour of the day (00 through 23), as two decimal digits.


