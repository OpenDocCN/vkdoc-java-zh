- fmt: '### Local Variables


    You can declare additional variables within a method as part of the method’s implementation.
    These variables are known as *local variables* because they are local to the method
    – they cannot be accessed from outside the method. Furthermore, they only exist
    while the method is executing. In both cases, the same is true of parameters.


    Consider the following example, which calculates *n*! (factorial):


    ```

    long factorial(int n)

    {

    if (n < 0)

    return -1;

    if (n == 0 || n == 1)

    return 1;

    long result = 1;

    for (int i = n; i > 1; i--)

    result *= i;

    return result;

    }

    ```


    This method computes the *factorial* (the product of all positive integers less
    than or equal to some number *n*, as in *n* x (*n* – 1) x (*n* - 2) x … x 3 x
    2 x 1 of the argument passed to parameter `n`.


    The `factorial()` method first tests parameter `n`’s value to ensure that it is
    positive. If the value is less than 0, `factorial()` returns -1 to signify that
    a negative argument has been passed. By definition, a factorial cannot include
    negative integers in its product.


    **Note:** Chapter [11](#615966_1_En_11_Chapter.xhtml) presents a better technique
    for dealing with unexpected arguments, such as a negative integer being passed
    to `factorial()`’s parameter `n`.


    The method next tests parameter `n`’s value for 0 or 1. If either value has been
    passed, `factorial()` returns 1. According to the convention for an empty product
    ([`http://en.wikipedia.org/wiki/Empty_product`](http://en.wikipedia.org/wiki/Empty_product)),
    the value of 0! is 1.


    Continuing, `factorial()` declares a local variable named `result` and initializes
    this variable to `1`.


    **Caution:** Local variables must be initialized. The compiler reports an error
    when it discovers an attempt to read a local variable that has not been initialized.


    This method then enters a `for` loop to calculate the factorial. The `for` statement’s
    test section consists of `i > 1` instead of `i >= 1` because any integer multiplied
    by 1 is itself; assigning `1` to `result` takes care of this multiplication.


    Each loop iteration uses the `*=` compound assignment operator to multiply `result`’s
    value by `i`’s value and store the product in `result`.


    Finally, `result`’s value is returned to the caller.


    Along with `result`, `factorial()` declares a second local variable: `i`. Although
    both variables exist only during this method’s execution, they have different
    scopes. The `result` variable is accessible throughout the whole method. However,
    `i` is accessible only in the `for` loop and its `result *= i;` compound-assignment
    statement. It cannot be accessed before or after the `for` loop statement in which
    it is declared.


    More specifically, a local variable’s lifetime and scope are limited to the block
    in which it has been declared and to subblocks. This is why `i` is inaccessible
    outside of the `for` loop whose header is followed by a single-statement block.
    The following example should clarify this fact:


    ```

    {

    int j; // j comes into existence at this point

    {

    j = 5; // okay: j still exists

    }

    }

    j = 10; // error: j no longer exists

    ```


    ### Method Overloading


    You can declare methods with the same name but with different parameter lists
    in the same class, a feature known as *method overloading*. When the compiler
    encounters a method-call expression, it compares the called method’s comma-separated
    list of arguments with each overloaded method’s parameter list as it looks for
    the correct method to call.


    Two same-named methods are overloaded when their parameter lists differ in number
    or order of parameters. Alternatively, two same-named methods are overloaded when
    at least one parameter differs in type. For example, consider the following three
    `add()` methods, which add two or three values together – the first adds two double-precision
    floating-point values, the second adds two integers, and the third adds three
    integers:


    ```

    double add(double a, double b)

    {

    return a + b;

    }

    int add(int a, int b)

    {

    return a + b;

    }

    int add(int a, int b, int c)

    {

    return a + b + c;

    }

    ```


    You cannot overload a method by changing only its return type. For example, you
    could not specify `int add(int a, int b)` and `double add(int a, int b)` because
    the compiler doesn’t have enough information to distinguish between these methods
    when encountering `add(4, 5);`. The compiler would report a “redefinition” error.


    ### Describing Initialization via Constructors


    A class can declare one or more blocks of code to initialize an object when it
    is created. This code block is known as a *constructor*. Its declaration consists
    of a header followed by a brace-delimited body. The header begins with the name
    of the class in which the constructor is declared because a constructor doesn’t
    have its own name. An optional parameter list between parentheses follows:


    ```

    className ''('' [parameterList] '')''

    ''{''

    // constructor body

    ''}''

    ```


    The `className` must match the name of the class in which the constructor is declared.
    The `parameterList` is a comma-separated list of parameters. A brace-delimited
    body containing code to execute when the constructor is called follows. Unlike
    a method, a constructor doesn’t have a return type because it doesn’t return a
    value.


    **Note:** When a class doesn’t declare any constructors, the compiler generates
    a default and empty no-argument constructor.


    The following example declares a constructor in the `Vehicle` class. The constructor
    initializes a `Vehicle`’s `make`, `model`, and `year` fields to the arguments
    that are passed to the constructor’s `_make`, `_model`, and `_year` parameters:


    ```

    class Vehicle

    {

    // ...

    Vehicle(String _make, String _model, int _year)

    {

    make = _make;

    model = _model;

    year = _year;

    }

    // ...

    }

    ```


    For brevity, I haven’t included everything in the `Vehicle` class. The first `//...`
    is a shortcut for specifying the field declarations. The second `//...` is a shortcut
    for specifying the various method declarations.


    The parameter names have leading underscores to prevent a problem with the assignments.
    For example, if you renamed `_make` to `make` and specified `make = make;`, you
    accomplish nothing because you assign the parameter’s value to itself. You can
    also avoid this problem by prefixing the field names with `this.`:


    ```

    Vehicle(String make, String model, int year)

    {

    this.make = make;

    this.model = model;

    this.year = year;

    }

    ```


    Reserved word `this` refers to the current object. By prefixing a field name with
    `this.`, you are indicating that you are referring to the current object’s copy
    of the field.


    While you are refactoring the constructor, you might also want to refactor the
    `setMake()`, `setModel()`, and `setYear()` methods. For example, you could change
    `setMake()` from


    ```

    void setMake(String _make)

    {

    make = _make;

    }

    ```


    to


    ```

    void setMake(String make)

    {

    this.make = make;

    }

    ```


    to take advantage of the `this.` prefix.


    A parameter (or local variable) name that’s identical to an instance field name
    *shadows* (hides or masks) the field. The keyword `this` represents the current
    object’s reference. Prepending `this.` to the field name removes the shadowing
    by accessing the field name instead of the same-named parameter.


    Although you can initialize fields such as `make` through the assignment shown
    in the constructor, it’s preferable to perform the assignments via setter methods
    such as the previously shown `setMake()`, which I demonstrate as follows:


    ```

    Vehicle(String make, String model, int year)

    {

    setMake(make);

    setModel(model);

    setYear(year);

    }

    ```


    Because future versions of `setMake()`, `setModel()`, and `setYear()` might perform
    additional initialization tasks, why duplicate this code in the constructor?'
