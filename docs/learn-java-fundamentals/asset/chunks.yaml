- fmt: '# The Java Development Kit


    The Java Development Kit (JDK) provides the necessary software for creating *Java
    applications*, which are a category of Java programs with a single entry point
    of execution. They contrast with *Java applets*, another category of Java programs
    that run embedded in web pages. Applets are rarely used these days.


    Follow these steps to download the JDK:


    1.  Enter [`www.oracle.com/java/technologies/`](http://www.oracle.com/java/technologies/)
    in your browser. This takes you to the main page of Oracle’s Java site.


    2.  At the time of writing, the newest download is version 21.0.1. Click on the
    **Java SE 21.0.1** link. (Java SE stands for Java Standard Edition. This is the
    foundation on which other editions are based and is the appropriate edition for
    this book. Another edition is Java EE, for Java Enterprise Edition. You would
    use this edition when developing complex business solutions involving web servers,
    database management systems, and client computers.)


    3.  In the **JDK Development Kit 21.0.1 downloads** section of the resulting **Java
    Downloads** page, you will see **Linux**, **macOS**, and **Windows** tabs. The
    JDK is available for all three operating systems. Choose whichever one is right
    for you. For example, I clicked the **Windows** tab because I was running Windows.
    I then had a choice between different kinds of installers. I chose the x64 installer
    whose file name ends with a `.exe` file extension. I found this the easiest way
    to install the JDK.


    Once you download the installer, such as `jdk-21_windows-x64_bin.exe`, run this
    program and follow the onscreen prompts to install the JDK.


    The JDK contains various tools for use in application development. Four of these
    tools are the Java compiler (`javac.exe` in the Windows download), the Java program
    launcher (`java.exe` in the Windows download), the Java documentation generator
    (`javadoc.exe` in the Windows download), and the Java archiver (`jar.exe` in the
    Windows download). You will only need to work with these tools in this book.


    The JDK’s compiler, program launcher, documentation generator, archiver, and other
    tools are designed to be run from the command line within the context of a *console*
    (an operating system–specific construct consisting of a window for viewing output
    and a command line for obtaining command-based input). To obtain a console on
    Windows operating systems, perform the following tasks:


    ![](images/615966_1_En_1_Chapter/615966_1_En_1_Fig1_HTML.jpg)


    A screenshot of the upper portion of the console. It includes the following prompt.
    C semicolon backward slash Users backward slash Jeffrey rightward arrow. The rectangle
    next to the arrow is the cursor.


    Figure 1-1


    The upper portion of a console as seen on a Windows 8.1 machine


    1.  Go to the **Start** menu and select **Run**.


    2.  In the **Run** dialog box, enter **cmd** in the text field and click the **OK**
    button. On the Windows operating system, you should observe a window similar to
    that shown in Figure [1-1](#615966_1_En_1_Chapter.xhtml#Fig1).


    Figure [1-1](#615966_1_En_1_Chapter.xhtml#Fig1) reveals `C:\Users\jeffrey>`, which
    is a prompt for entering a command on my Windows 8.1 machine. The rectangular
    box to the right of `>` is the *cursor*, which indicates the current position
    for entering text on the command line.


    ## “hello, world” – Java Style


    Let’s create a simple application to get a taste of Java code. Traditionally,
    the first application does nothing but output the message `hello, world` on the
    console. Listing [1-1](#615966_1_En_1_Chapter.xhtml#PC1) presents the source code
    to a `HelloWorld` application that does just that.


    ```

    class HelloWorld

    {

    public static void main(String[] args)

    {

    System.out.println("hello, world");

    }

    }

    Listing 1-1

    HelloWorld.java

    ```


    Listing [1-1](#615966_1_En_1_Chapter.xhtml#PC1) declares a `HelloWorld` class
    (I explain classes in Chapter [6](#615966_1_En_6_Chapter.xhtml)) that serves as
    a placeholder for the `main()` *method* (a named sequence of instructions that
    executes in the context of a class).


    Note


    Languages such as C use functions instead of methods. A *function* is a named
    sequence of instructions that executes outside of any context.


    The `main()` method serves as the entry point to the application. When the application
    runs, `main()`’s code is executed.


    The `main()` method header (`public static void main(String[] args)`) exhibits
    some interesting features:


    *   The method is marked `public` so that the `Java` program launcher can locate
    it. If `public` is absent, an error message is output when attempting to run the
    application.


    *   The method is marked `static` so that a `HelloWorld` object does not need
    to be created in order to call `main()`. The launcher calls `main()` directly.
    It knows nothing of objects. If `static` is absent, an error message is output
    when attempting to run the application.


    *   The method is declared with a parameter list consisting of `String[] args`,
    which identifies an array of string arguments that are passed after the application’s
    name (`HelloWorld`) on the command line when the application is run by the launcher.
    A *string* is a sequence of characters placed between double quotes (`"`).


    *   The method is declared with a `void` return type that signifies the method
    returns nothing.


    Don’t worry if concepts such as return type and parameter list are confusing.
    You’ll learn about these concepts later in this book.


    The `main()` method executes `System.out.println("hello, world");` to output `hello,
    world` on the console’s window. I explore `System.out` and its `System.err` and
    `System.in` counterparts in Chapter [14](#615966_1_En_14_Chapter.xhtml).


    INDENTATION, OPEN BRACE CHARACTER PLACEMENT, AND CODE-SEPARATION STYLES


    Programmers often follow one style when indenting source code, another style when
    positioning a block’s open brace character, and a third style when using blank
    lines to separate segments of source code. (I briefly discuss *blocks*, which
    are sequences of code surrounded by `{` and `}` characters, in Chapter [4](#615966_1_En_4_Chapter.xhtml).)


    Listing [1-1](#615966_1_En_1_Chapter.xhtml#PC1) demonstrates the first two style
    categories. It shows my tendency to indent, by three spaces, all lines in a block.
    I find that doing so makes it easier to follow the organization of my source code
    when updating it as requirements change.


    Also, Listing [1-1](#615966_1_En_1_Chapter.xhtml#PC1) shows my tendency to align
    the open (`{`) and close (`}`) brace characters, so I can more easily locate the
    start and end of a block. Many programmers prefer the following brace character
    alignment instead:


    ```

    class HelloWorld {

    public static void main(String[] args) {

    System.out.println("hello, world");

    }

    }

    ```


    Another style issue involves inserting blank lines to separate segments of code,
    where each segment consists of statements that work collectively on some aspect
    of the program. Here is a contrived example, involving a pair of classes, `A`
    and `B`:'
