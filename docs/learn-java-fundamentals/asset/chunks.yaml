    ### Text Reversal


    To give you a more practical example of the `StringBuffer` class, I’ve created
    a `TR` (Text Reversal) application that reverses the sequence of words passed
    as arguments. Listing [13-4](#615966_1_En_13_Chapter.xhtml#PC18) presents `TR`’s
    source code.


    ```

    public class TR

    {

    public static void main(String[] args)

    {

    if (args.length == 0)

    {

    System.out.println("usage: java TR sequence of words");

    return;

    }

    StringBuffer sb = new StringBuffer();

    for (int i = 0 ; i < args.length; i++)

    sb.append(args[i] + " ");

    System.out.println("Text: " + sb.toString());

    System.out.println("Reversed text: " + sb.reverse().toString());

    }

    }

    Listing 13-4

    TR.java

    ```


    The `main()` method first verifies that at least one command-line argument has
    been specified. If not, a usage message is output.


    Continuing, `main()` creates a `StringBuffer` object and then enters a `for` loop
    to append each command-line argument to the string buffer. It performs the append
    operation by invoking `StringBuffer`’s `append(String s)` method, passing expression
    `args[i] +` `" "` to `append()`.


    Finally, `main()` outputs the text stored in the string buffer and, after invoking
    `StringBuffer`’s `reverse()` method on the string buffer’s contents, outputs the
    reversed string. In either case, `StringBuffer`’s inherited (from `Object`) `toString()`
    method converts the string buffer’s contents to a string.


    Compile Listing [13-4](#615966_1_En_13_Chapter.xhtml#PC18) as follows:


    ```

    javac TR.java

    ```


    Run the resulting application as follows:


    ```

    java TR The quick brown fox

    ```


    You should observe the following output:


    ```

    Text: The quick brown fox

    Reversed text:  xof nworb kciuq ehT

    ```


