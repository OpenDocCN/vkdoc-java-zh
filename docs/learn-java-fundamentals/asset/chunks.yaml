  trans: "\n### JAR 文件\n\n通过指定创建必要目录结构的指令以及包的类文件（并说明哪些类文件应存储在哪些目录中）来分发包，是一项繁琐且容易出错的任务。幸运的是，JAR\
    \ 文件提供了一种更好的替代方案。\n\n*JAR（Java 归档）文件*是一个带有 `.jar` 文件扩展名（而非 `.zip` 扩展名）的 Zip 归档文件。它包含一个特殊的\
    \ `META-INF` 目录，其中包含 `manifest.mf`（一个存储 JAR 文件内容信息的特殊文件），以及一个组织类文件的层级目录结构。\n\n\
    你可以使用 JDK 的 `jar` 工具来创建和维护 JAR 文件。你也可以查看 JAR 文件的目录结构。为了展示使用该工具有多么简单，我们将创建一个 `logging.jar`\
    \ 文件，用于存储 `logging` 包的内容。然后，在运行 `TestLogging.class` 时，我们将访问这个 JAR 文件。\n\n注意\n\n\
    如果你在 Windows 上尝试运行 `jar`，可能会发现一条错误消息，提示找不到 `jar`。这是因为 JDK 21 只将少数重要的可执行文件存储在一个特殊目录中，并在安装过程中将\
    \ `PATH` 环境变量设置为指向该目录。例如，在我编写本书所使用的 Windows 8.1 平台上，我的 `C:\\Program Files\\Common\
    \ Files\\Oracle\\Java\\javapath` 路径被添加到了 `PATH` 中。`javapath` 目录包含 `java.exe`、`javac.exe`\
    \ 以及其他几个常用的可执行文件。为了访问 `jar`（以及我可能想使用的任何其他 JDK 工具），我需要将 `C:\\Program Files\\java\\\
    jdk-21\\bin` 目录添加到 `PATH` 中。我可以通过指定 `set path=%path%;C:\\Program Files\\java\\\
    jdk-21\\bin` 来临时完成此操作。或者，我也可以使用 Windows 控制面板来永久设置。你应该在你的平台上执行类似的操作。\n\n按如下方式创建\
    \ `logging.jar`：\n\n1.  确保当前目录包含之前创建的 `logging` 子目录，并且 `logging` 包含 `Logger.class`、`LoggerFactory.class`、`Console.class`\
    \ 和 `File.class`。\n\n2.  执行以下命令：\n\n    ```\n    jar cf logging.jar logging\\\
    *.class\n    ```\n\n`c` 选项代表“创建新归档”，`f` 选项代表“指定归档文件名”。\n\n现在，你应该能在当前目录中找到 `logging.jar`\
    \ 文件。通过执行以下命令（其中 `t` 选项代表“列出目录结构”），向自己证明该文件包含这四个类文件：\n\n```\njar tf logging.jar\n\
    ```\n\n你可以通过将 `logging.jar` 添加到其类路径来运行 `TestLogging.class`。例如，假设 `logging.jar`\
    \ 与 `TestLogging.class` 位于同一目录，你可以通过以下命令在 Windows 下运行 `TestLogging`：\n\n```\n\
    java -classpath logging.jar;. TestLogging\n```\n\n为方便起见，你可以使用更短的 `-cp` 来代替较长的\
    \ `-classpath`。\n\n## 下一步是什么？\n\n正在执行的应用程序容易发生故障。故障以不同的形式出现。Java 将故障分为异常或错误。我们将在下一章中回顾这些故障类别，并探讨\
    \ Java 用于检测故障并采取适当措施处理故障的语言特性。\n\n# 11. 异常与错误\n\n在理想世界中，应用程序运行时永远不会发生任何坏事。例如，当应用程序需要打开文件时，该文件始终存在；应用程序始终能够连接到远程计算机；当应用程序需要实例化对象时，Java\
    \ 虚拟机（JVM）永远不会耗尽内存。\n\n相比之下，现实世界中的应用程序偶尔会尝试打开不存在的文件，尝试连接到无法与之通信的远程计算机，并且需要的内存超过\
    \ JVM 所能提供的。你的目标是编写能够正确响应这些以及其他异常情况（异常）的代码。\n\n本章将向你介绍异常和错误（异常的一种相关类型）。在定义这些术语之后，本章将探讨如何在源代码中表示异常和错误。然后，它将研究抛出和处理异常的主题，最后讨论如何在方法返回之前执行清理任务，无论是否抛出了异常。\n\
    \n你将发现两个与异常相关的语句（`try` 和 `try`-`with`-`resources`）：\n\n*   `try` 语句包围一个可能抛出异常和错误的代码块。该语句的\
    \ `try` 块后面必须跟有处理这些异常的 `catch` 块组合，和/或一个用于执行清理任务的 `finally` 块。\n\n*   `try`-`with`-`resources`\
    \ 语句与 `try` 语句类似，但它允许你在执行离开 `try` 块时自动关闭任何已打开的资源。\n\n## 什么是异常和错误？\n\n当 Java 程序的正常执行流程被意外行为中断时，程序就会发生故障。例如，程序尝试打开一个不存在的文件，或者尝试将整数除以\
    \ 0。也许程序尝试创建一个非常大的数组，但没有足够的空闲内存来满足内存分配请求。\n\nJava 将故障分为异常或错误。*异常*是一种故障，其发生是由于程序无法控制的某些情况（例如尝试打开不存在的文件），或者是由于代码中的错误（尝试除以\
    \ 0）。（换句话说，它是与正常执行流程的偏离。）在第一种情况下，无法阻止异常的发生，因此程序需要通过采取纠正措施来恢复。在第二种情况下，如果程序编写正确，异常就不会发生。\n\
    \n*错误*是一种不可恢复的故障。许多错误与 JVM 有关，例如，内存耗尽或尝试加载损坏的类文件。有些错误与 JVM 无关，例如输入/输出错误或断言评估为假。（*断言*是一个布尔表达式，必须为真才能继续执行。）\n\
    \n注意\n\n通常，不要处理错误，因为 JVM 可能无法从中恢复。例如，一旦内存耗尽，JVM 可能必须关闭。（异常处理程序可能会尝试释放一个占用大量内存的对象，但这可能不起作用。）此外，程序如何修复损坏的类文件？\n\
    \nJava 将由外部因素（例如文件缺失）引起的异常归类为*受检异常*。Java 编译器会检查此类异常要么在发生处被*处理*（纠正），要么被记录为在其他地方处理。\n\
    \nJava 将由有缺陷的代码引起的异常归类为*运行时异常*。这些异常应由程序员修复。因为编译器不检查运行时异常是否被处理或记录为在其他地方处理，所以你可以将运行时异常视为*非受检异常*。\n\
    \n异常由*异常处理程序*处理，这些处理程序是响应异常并采取适当操作的代码序列。异常处理程序会查询上下文（例如，从异常发生时作用域内的变量中读取值），并利用获取的信息将\
    \ Java 程序恢复到正常行为流程。例如，异常处理程序可能会读取一个已保存的文件名，并通过对话框提示用户替换缺失的文件（显示该文件名），然后关闭对话框。\n\
    \n注意\n\n你可以修改程序来处理运行时异常，但更好的做法是修复源代码。运行时异常通常源于向库的方法传递无效参数；应修复有缺陷的调用代码。\n"
- fmt: '# Representing Exceptions and Errors in Source Code


    An exception is represented in source code as an error code or as an object. This
    section first reviews each kind of representation and explains why objects are
    superior. It then introduces Java’s library of exception-oriented classes.


    ## Error Codes vs. Objects


    Programming languages such as C use integer-based *error codes* to represent failure
    and reasons for failure (exceptions). Here are a couple of examples:


    ```

    FILE* fp = fopen("notes.txt", "rt");

    if (fp == NULL)

    {

    printf("unable to open file\n");

    // Terminate the program.

    }

    int handle = open("image.png", O_RDONLY);

    if (handle == -1)

    {

    printf("unable to open file\n");

    // Terminate the program.

    }

    ```


    C’s `fopen()` (file open) function returns a non-null pointer (integer address)
    to a `FILE` structure on success or a null (0) pointer (represented by constant
    `NULL`) on failure. Similarly, C’s `open()` function returns an integer other
    than -1 on success or -1 on failure.


    There are some problems with error codes:


    * Integers are meaningless; they don’t describe the exceptions they represent.
    For example, what does -5 mean?

    * It’s awkward to associate context with an error code. For example, you might
    want to output the name of the file that couldn’t be opened. Where are you going
    to store the file’s name?

    * Integers are arbitrary; their choice can lead to confusion when reading source
    code. For example, specifying `if (!chdir("C:\\windows"))` (`!` signifies NOT)
    instead of `if (chdir("C:\\windows"))` to test for failure is clearer. However,
    0 was chosen to indicate success, and so `if (chdir("C:\\temp"))` must be specified
    to test for failure.

    * Error codes are too easy to ignore, which can lead to buggy code. For example,
    the programmer could ignore the `if (fp == NULL)` check. By not testing for failure,
    the program behaves erratically when either function returns a failure indicator.


    To overcome these problems, a new exception-handling approach was invented. This
    approach combines objects that describe exceptions with a mechanism based on throwing
    and catching these objects:


    * An object can be created from a class with a meaningful name. For example, the
    `java.io` package’s `FileNotFoundException` class is more meaningful than -5.

    * Objects can store context in various fields. For example, you can store a message,
    the name of the file that could not be opened, the most recent position where
    a parse operation failed, and/or other items in an object’s fields.

    * You don’t use `if` statements to test for failure. Instead, exception objects
    are thrown to a handler that’s separate from the program code. As a result, the
    source code is easier to read and less prone to be buggy.


    ## The Throwable Class Hierarchy


    Java provides a hierarchy of classes in its reference types library that represent
    different kinds of exceptions. These classes are rooted in the `java.lang` package’s
    `Throwable` class along with its `Exception`, `RuntimeException`, and `Error`
    subclasses. (Unless otherwise stated, all classes introduced in this chapter are
    located in `java.lang`.)


    ### The Throwable Class


    `Throwable` is the ultimate superclass where exceptions and errors are concerned.
    Only objects created from `Throwable` and its subclasses can be thrown (and subsequently
    caught). Such objects are known as *throwables*.


    A `Throwable` object is associated with a detail message that describes an exception
    or error. Several constructors, including the pair described here, are provided
    to create a `Throwable` object with or without a detail message:


    * `Throwable()`: Create a `Throwable` with no detail message. This constructor
    is appropriate for situations where there is no context. For example, you only
    want to know that a stack is empty or full.

    * `Throwable(String message)`: Create a `Throwable` with `message` as the detail
    message. This message can be output to the user and/or logged.


    `Throwable` provides the `String getMessage()` method to return the detail message.
    It also provides additional useful methods.


    ### The Exception Class


    `Throwable` has two direct subclasses. One of these subclasses is `Exception`,
    which describes an exception arising from an external factor (such as attempting
    to read from a nonexistent file). `Exception` declares the same constructors (with
    identical parameter lists) as `Throwable`; each constructor invokes its `Throwable`
    counterpart. Also, `Exception` inherits `Throwable`’s methods. It declares no
    new methods.


    Java provides many exception classes that directly subclass `Exception`. Here
    are three examples:


    * `IOException`: Signals that some kind of I/O failure has occurred. This type
    is located in the `java.io` package.

    * `ParseException`: Signals that a failure has occurred while parsing text. This
    type can be found in the `java.text` package.

    * `UnsupportedAudioFileException`: Signals that an audio-oriented operation failed
    because a file did not contain valid data of a recognized file type or format.
    Check out the `javax.sound.sampled` package for this type.


    Notice that each `Exception` subclass name ends with the word `Exception`. This
    convention makes it easy to identify the class’s purpose.


    You’ll typically subclass `Exception` (or one of its subclasses) with your own
    exception classes (whose names should end with `Exception`). Here are a couple
    of custom subclass examples:


    ```

    public class StackFullException extends Exception

    {

    }

    public class EmptyCardReaderException extends Exception

    {

    private String cardReaderName;

    public EmptyCardReaderException(String message, String cardReaderName)

    {

    super(message);

    this.cardReaderName = cardReaderName;

    }

    public String getCardReaderName()

    {

    return cardReaderName;

    }

    }

    ```


    The first example describes an exception class that doesn’t require a detail message.
    Its default no-argument constructor invokes `Exception()`, which invokes `Throwable()`.


    The second example describes an exception class whose constructor requires a detail
    message and the name of the empty card reader. The constructor uses `super(message);`
    to invoke `Exception(String message)`, which invokes `Throwable(String message)`.


    Objects instantiated from `Exception` or one of its subclasses (except for `RuntimeException`
    or one of its subclasses) are checked exceptions.


    ### The RuntimeException Class


    `Exception` is directly subclassed by `RuntimeException`, which describes an exception
    most likely arising from poorly written code. `RuntimeException` declares the
    same constructors (with identical parameter lists) as `Exception`; each constructor
    invokes its `Exception` counterpart. Also, `RuntimeException` inherits `Throwable`’s
    methods. It declares no new methods.


    Java provides many exception classes that directly subclass `RuntimeException`.
    Here are three examples:


    * `ArithmeticException`: Signals an illegal arithmetic operation, such as attempting
    to divide an integer by 0

    * `IllegalArgumentException`: Signals that an illegal or inappropriate argument
    has been passed to a method during a method call

    * `NullPointerException`: Signals an attempt to invoke a method or access an object
    field via the null reference


    Objects instantiated from `RuntimeException` or one of its subclasses are unchecked
    exceptions.'
