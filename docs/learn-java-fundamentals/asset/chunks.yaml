- fmt: '### Determining Object Equality


    In Chapter 3, you learned that the equality operators don’t compare objects but
    compare their references, which is much faster than comparing individual fields
    (shallow and deep cloning) and objects referenced from any reference fields (deep
    cloning only). However, it’s often necessary to compare objects in terms of their
    fields. One example is storing objects in container objects, such as an array
    list or a linked list.


    `Object` provides the `equals()` method to let you compare objects in terms of
    their content. However, the default implementation that all other classes inherit
    compares objects in terms of their references. If you want to compare a class’s
    objects in terms of their content, you must override `equals()` in that class.


    There are rules that must be followed when overriding `equals()`:


    - Be reflexive: For any non-null reference value *x*, `x.equals(x)` should return
    true.

    - Be symmetric: For any non-null reference values *x* and *y*, `x.equals(y)` should
    return true if and only if `y.equals(x)` returns true.

    - Be transitive: For any non-null reference values *x*, *y*, and *z*, if `x.equals(y)`
    returns true and `y.equals(z)` returns true, then `x.equals(z)` should return
    true.

    - Be consistent: For any non-null reference values *x* and *y*, multiple invocations
    of `x.equals(y)` consistently return true or consistently return false, provided
    no information used in equals comparisons on the objects is modified.

    - Additionally, for any non-null reference value *x*, `x.equals(null)` should
    return false.


    Listing 7-11 presents an `EqualsDemo` application’s source code that shows you
    how to properly override `equals()` to satisfy these rules.


    ```

    class Employee

    {

    private String name;

    private int age;

    Employee(String name, int age)

    {

    this.name = name;

    this.age = age;

    }

    String getName()

    {

    return name;

    }

    int getAge()

    {

    return age;

    }

    @Override

    public boolean equals(Object obj)

    {

    if (!(obj instanceof Employee))

    return false;

    Employee emp = (Employee) obj;

    return emp.getName().equals(name) && emp.getAge() == age;

    }

    }

    class EqualsDemo

    {

    public static void main(String[] args)

    {

    Employee john = new Employee("John Doe", 29);

    System.out.println("Name: " + john.getName() +

    ", Age: " + john.getAge());

    Employee jane = new Employee("Jane Doe", 33);

    System.out.println("Name: " + jane.getName() +

    ", Age: " + jane.getAge());

    Employee john2 = new Employee("John Doe", 27 + 2);

    System.out.println("Name: " + john2.getName() +

    ", Age: " + john2.getAge());

    Employee john3 = new Employee("John Doe", 30 - 1);

    System.out.println("Name: " + john3.getName() +

    ", Age: " + john3.getAge());

    System.out.println();

    // Demonstrate reflexivity.

    System.out.println("Demonstrating reflexivity...");

    System.out.println();

    System.out.println("john.equals(john): " + john.equals(john));

    System.out.println();

    // Demonstrate symmetry.

    System.out.println("Demonstrating symmetry...");

    System.out.println();

    System.out.println("john.equals(jane): " + john.equals(jane));

    System.out.println("jane.equals(john): " + jane.equals(john));

    System.out.println("john.equals(john2): " + john.equals(john2));

    System.out.println("john2.equals(john): " + john2.equals(john));

    System.out.println("jane.equals(john2): " + jane.equals(john2));

    System.out.println("john2.equals(jane): " + john2.equals(jane));

    System.out.println();

    // Demonstrate transitivity.

    System.out.println("Demonstrating transitivity...");

    System.out.println();

    System.out.println("john.equals(john2): " + john.equals(john2));

    System.out.println("john2.equals(john3): " + john2.equals(john3));

    System.out.println("john.equals(john3): " + john.equals(john3));

    System.out.println();

    // Demonstrate consistency.

    System.out.println("Demonstrating consistency...");

    System.out.println();

    for (int i = 0; i < 5; i++)

    {

    System.out.println("john.equals(jane): " + john.equals(jane));

    System.out.println("john.equals(john2): " + john.equals(john2));

    }

    System.out.println();

    // Demonstrate the null check.

    System.out.println("Demonstrating null check...");

    System.out.println();

    System.out.println("john.equals(null): " + john.equals(null));

    }

    }

    Listing 7-11

    EqualsDemo.java

    ```


    `Employee`’s overriding `equals()` method first verifies that an `Employee` object
    has been passed. If not, it returns false. This check relies on the `instanceof`
    operator, which also evaluates to false when `null` is passed as an argument.
    This satisfies the final rule mentioned previously: “for any non-null reference
    value *x*, `x.equals(null)` should return false.”


    **Note:** You need to override `equals()` and `hashCode()` when planning to store
    your class’s objects in a container object. Otherwise, you’ll probably have trouble
    when working with hash-based containers. I’ll discuss `hashCode()` later in this
    chapter.


    Continuing, the object argument is cast to `Employee`. You don’t have to worry
    about a possible `ClassCastException` because the previous `instanceof` test guarantees
    that the argument’s type is `Employee`. Following the cast, both `name` fields
    are compared, which relies on `String`’s `equals()` method (I discuss `String`
    in Chapter 13), and the two `age` fields are compared.


    Compile Listing 7-11 as follows:


    ```

    javac EqualsDemo.java

    ```


    Run the resulting application as follows:


    ```

    java EqualsDemo

    ```


    You should observe the following output:


    ```

    Name: John Doe, Age: 29

    Name: Jane Doe, Age: 33

    Name: John Doe, Age: 29

    Name: John Doe, Age: 29

    Demonstrating reflexivity...

    john.equals(john): true

    Demonstrating symmetry...

    john.equals(jane): false

    jane.equals(john): false

    john.equals(john2): true

    john2.equals(john): true

    jane.equals(john2): false

    john2.equals(jane): false

    Demonstrating transitivity...

    john.equals(john2): true

    john2.equals(john3): true

    john.equals(john3): true

    Demonstrating consistency...

    john.equals(jane): false

    john.equals(john2): true

    john.equals(jane): false

    john.equals(john2): true

    john.equals(jane): false

    john.equals(john2): true

    john.equals(jane): false

    john.equals(john2): true

    john.equals(jane): false

    john.equals(john2): true

    Demonstrating null check...

    john.equals(null): false

    ```


    **Note:** You can call `equals()` on an array reference, which is demonstrated
    here:


    ```

    int[] grades = { 89, 90, 73 };

    int[] grades2 = { 89, 90, 73 };

    System.out.println(grades.equals(grades2));

    ```


    Don’t do this. This capability isn’t useful because in an array context, `equals()`
    compares array references and not array elements. Because `grades` and `grades2`
    are assigned different references, `System.out.println(grades.equals(grades2));`
    outputs `false` instead of `true`.'
