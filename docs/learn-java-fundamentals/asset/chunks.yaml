- fmt: '### Deep Cloning


    *Deep cloning* (also known as *deep copying*) performs shallow cloning and also
    recursively duplicates objects referenced from an object’s fields along with objects
    referenced in those objects fields, and so on. Listing [7-9](#615966_1_En_7_Chapter.xhtml#PC23)
    presents the source code to a second version of the `CloneDemo` application’s
    source code that shows you how to accomplish deep cloning.


    ```

    class Date implements Cloneable

    {

    private int year, month, day;

    Date(int year, int month, int day)

    {

    this.year = year;

    this.month = month;

    this.day = day;

    }

    int getDay()

    {

    return day;

    }

    int getMonth()

    {

    return month;

    }

    int getYear()

    {

    return year;

    }

    @Override

    public Object clone() throws CloneNotSupportedException

    {

    return super.clone();

    }

    }

    class Employee implements Cloneable

    {

    private String name;

    private int age;

    private Date hireDate;

    Employee(String name, int age, Date hireDate)

    {

    this.name = name;

    this.age = age;

    this.hireDate = hireDate;

    }

    String getName()

    {

    return name;

    }

    int getAge()

    {

    return age;

    }

    Date getHireDate()

    {

    return hireDate;

    }

    @Override

    public Object clone() throws CloneNotSupportedException

    {

    Date hire_Date = (Date) hireDate.clone();

    Employee emp = new Employee(name, age, hire_Date);

    return emp;

    }

    }

    class CloneDemo

    {

    public static void main(String[] args) throws CloneNotSupportedException

    {

    Employee john = new Employee("John Doe", 37, new Date(1999, 10, 8));

    System.out.println("Name: " + john.getName() +

    ", Age: " + john.getAge() +

    ", Hire Date: " + john.getHireDate());

    Employee john2 = (Employee) john.clone();

    System.out.println("Name: " + john2.getName() +

    ", Age: " + john2.getAge() +

    ", Hire Date: " + john2.getHireDate());

    }

    }

    Listing 7-9

    CloneDemo.java (version 2)

    ```


    Listing [7-9](#615966_1_En_7_Chapter.xhtml#PC23) updates the `Date` class to shallowly
    clone itself. It does so by implementing `Cloneable` and overriding the `clone()`
    method to invoke `super.clone()`, which invokes `Object`’s `clone()` method to
    perform the actual cloning. This is the same as what the previous listing accomplished
    for `Employee`, which shallowly cloned itself.


    However, `Employee`’s overriding `clone()` method has been changed. It first clones
    `Employee`’s `hireDate` field that returns a new `Date` object whose reference
    is assigned to `hire_Date`. As part of the deep copy, a new `Employee` object
    is created and populated with the `name`, `age`, and `hire_Date` values. The `Employee`
    object’s reference is returned.


    Perhaps you are wondering why the `name` field wasn’t cloned. This field is of
    type `String` and cannot be cloned because `String` objects are *immutable* (unchangeable).
    Immutability is necessary to implement a feature known as *interning* so that
    `String` objects can be compared via the equality operators (`==` and `!=`), which
    greatly improves performance. I won’t say anything more about this now, but you
    can learn about it in Chapter [13](#615966_1_En_13_Chapter.xhtml).


    Compile Listing [7-9](#615966_1_En_7_Chapter.xhtml#PC23) as follows:


    ```

    javac CloneDemo.java

    ```


    Run the resulting application:


    ```

    java CloneDemo

    ```


    You should observe the following output (the hexadecimal numbers after the `@`
    symbols might be different from what you see):


    ```

    Name: John Doe, Age: 37, Hire Date: Date@28a418fc

    Name: John Doe, Age: 37, Hire Date: Date@eed1f14

    ```


    ### Array Cloning


    Array types have access to the `clone()` method, which lets you shallowly clone
    an array. When used in an array context, you don’t have to cast `clone()`’s return
    value to the array type. Listing [7-10](#615966_1_En_7_Chapter.xhtml#PC27) demonstrates
    array cloning.


    ```

    class Date

    {

    private int year, month, day;

    Date(int year, int month, int day)

    {

    this.year = year;

    this.month = month;

    this.day = day;

    }

    int getYear()

    {

    return year;

    }

    int getMonth()

    {

    return month;

    }

    int getDay()

    {

    return day;

    }

    }

    class CloneDemo

    {

    public static void main(String[] args)

    {

    int[] populations = { 100000000, 50000000, 10000 };

    for (int i = 0; i < populations.length; i++)

    System.out.print(populations[i] + " ");

    System.out.println();

    int[] populations2 = populations.clone();

    for (int i = 0; i < populations.length; i++)

    System.out.print(populations[i] + " ");

    System.out.println();

    System.out.println();

    Date[] dates = { new Date(1983, 10, 15), new Date(2022, 5, 6) };

    for (int i = 0; i < dates.length; i++)

    System.out.print(dates[i] + " ");

    System.out.println();

    Date[] dates2 = dates.clone();

    for (int i = 0; i < dates.length; i++)

    System.out.print(dates[i] + " ");

    System.out.println();

    }

    }

    Listing 7-10

    CloneDemo.java (version 3)

    ```


    Listing [7-10](#615966_1_En_7_Chapter.xhtml#PC27) declares a `Date` class that
    records a date in terms of its year, month, and day components. It also declares
    a `CloneDemo` class whose `main()` method demonstrates array cloning.


    `main()` first declares an array of integers that denote populations. After outputting
    this array’s values, it clones the array – note the absence of a cast operator.
    Next, it outputs the clone’s identical population values.


    > **Note:** A cast operator is not required when cloning an array because of *covariant
    return types*, a feature that JDK 5 introduced and which I discuss in Chapter
    [8](#615966_1_En_8_Chapter.xhtml). The stackoverflow article “Why can clone array
    without type cast?” ([`http://stackoverflow.com/questions/15501032/why-can-clone-array-without-type-cast`](http://stackoverflow.com/questions/15501032/why-can-clone-array-without-type-cast))
    explains why a cast operator isn’t needed.


    Continuing, `main()` creates an array of `Date` objects, outputs the dates, clones
    this array, and outputs the cloned array’s dates. As a proof that shallow cloning
    was used, the output will show identical string representations for the `Date`
    objects in the corresponding positions of their respective arrays.


    Compile Listing [7-10](#615966_1_En_7_Chapter.xhtml#PC27) as follows:


    ```

    javac CloneDemo.java

    ```


    Run the resulting application as follows:


    ```

    java CloneDemo

    ```


    You should observe output that is similar to the following (the hash codes will
    probably differ but will be identical for the first pair of `Date` objects and
    will be identical [but differ] for the second pair of `Date` objects):


    ```

    100000000 50000000 10000

    100000000 50000000 10000

    Date@33c7353a Date@3af49f1c

    Date@33c7353a Date@3af49f1c

    ```'
