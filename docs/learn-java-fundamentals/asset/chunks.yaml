- fmt: '# 5. Arrays


    Java supports arrays, one of the oldest and most widely used data structures (“a
    data organization, management, and storage format that is usually chosen for efficient
    access to data” – see [`http://en.wikipedia.org/wiki/Data_structure`](http://en.wikipedia.org/wiki/Data_structure)
    for more information). This chapter introduces you to this support in terms of
    one-dimensional arrays and two-dimensional arrays. It demonstrates one-dimensional
    arrays in terms of searching and sorting and two-dimensional arrays in terms of
    matrix multiplication.


    ## Introducing Arrays


    An *array* is a *data structure* consisting of a sequence of *elements* (values
    stored in an array) with the same memory size, where each element is associated
    with at least one *index* (a non-negative integer that uniquely identifies an
    element). The number of indexes associated with an element is known as the array’s
    *dimension*.


    In Java, arrays have fixed sizes. You cannot expand or contract an array. Instead,
    you need to create a new array of the desired size and copy the elements from
    the current array to the new array before destroying the current array.


    ## One-Dimensional Arrays


    A *one-dimensional array* (1D array – also known as a *vector*) is an array that
    associates each element with one index. It’s used to store a list of values. The
    array is stored with an array variable, whose syntax appears as follows:


    ```

    type ''['' '']'' identifier

    ```


    or


    ```

    type identifier ''['' '']''

    ```


    The square brackets may appear after the *type* name (the preferred approach)
    or after the *identifier* that names the variable (an approach introduced to smooth
    the transition of C and C++ programmers to Java). They signify that *identifier*
    refers to a 1D array whose elements have the specified *type*. The type of the
    array is *type*`[]`.


    ### Creating a 1D Array


    There are three approaches to creating a 1D array: use only an initializer, use
    only keyword `new`, and use keyword `new` with an initializer.


    #### Use Only an Initializer


    The initializer-only approach adheres to the following syntax:


    ```

    ''{'' [expr ('','' expr)*]  ''}''

    ```


    This syntax reveals that a 1D array is an optional comma-separated list of expressions
    appearing between open and close brace characters. Furthermore, the types of all
    expressions must be compatible. For example, one expression cannot be a string
    while another expression is an integer.


    Note


    The preceding syntax uses special notation to provide a compact representation.
    Furthermore, a value that a programmer must supply is placed between quotes, single
    (`''`) or double (`"`). Everything between `[` and `]` is optional. Everything
    between `(` and `)` is treated as a single unit. The `*` means repeat everything
    between `(` and `)` zero or more times. A `+` would mean repeat everything between
    `(` and `)` one or more times. I’ve presented some of this syntax in previous
    chapters and will continue to use the syntax in later chapters.


    The following example demonstrates the initializer approach to creating a 1D array:


    ```

    String[] directions = {"North", "South", "East", "West"};

    ```


    The example creates a 1D array of four strings and assigns the 1D array’s reference
    to `directions`. Figure [5-1](#615966_1_En_5_Chapter.xhtml#Fig1) presents a conceptual
    view of this array.


    ![](images/615966_1_En_5_Chapter/615966_1_En_5_Fig1_HTML.jpg)


    Four rectangle blocks represent the following. North 0. South 1. East 2. West
    3.


    Figure 5-1


    A conceptual view of the array assigned to `directions`


    `North` is located at index 0, `South` is located at index 1, `East` is located
    at index 2, and `West` is located at index 3.


    #### Use Only Keyword `new`


    The keyword `new`–only approach adheres to the following syntax:


    ```

    ''new'' type ''['' int_expr '']''

    ```


    Keyword `new` allocates memory for the array. The number of elements is specified
    by *int_expr* (a non-negative integer that’s typically greater than 0), and the
    size of each element is implied by *type*. All elements are zeroed (and interpreted
    as `0`, `0L`, `0.0F`, `0.0`, `false`, `null`, or `''\u0000''`).


    PREALLOCATING AN ARRAY WITH A ZERO SIZE


    Sometimes, `0` is specified for *int_expr*. A zero is specified when the programmer
    writes a method to preallocate an array, and the method needs to know the array’s
    element type – the method doesn’t care about the array’s size. For example, you
    might specify the following:


    ```

    ArrayList list = new ArrayList(100);

    int[] copy = list.toArray(new int[0]);

    ```


    This example first creates an array list and assigns its reference to a `list`
    variable of type `ArrayList`. It then invokes `ArrayList`’s `toArray()` method
    (see Chapter [6](#615966_1_En_6_Chapter.xhtml) for a discussion of methods) to
    convert the array list to an array. Expression `new int[0]` is passed to `toArray()`
    so that the method will preallocate an `int[]` array that can hold all of the
    elements in the list. (We’ll assume that each element has type `int`.) Furthermore,
    `toArray()` returns the array. However, if you specified the following:


    ```

    double[] copy = list.toArray(new double[0]);

    ```


    the `toArray()` method would return an array of type `double[]`. The ability for
    `toArray()` to change its return type is a feature of *generics*, an enhancement
    to Java’s type system that allows a type or method to operate on objects of various
    types while providing compile-time type safety. (I don’t discuss generics in this
    book because I don’t consider it to be a fundamental feature.)


    The previous example (minus the element values) could be expressed as follows:


    ```

    String[] directions = new String[4];

    ```


    Values would be filled in later.


    #### Use Keyword `new` with an Initializer


    The final approach to creating an array is to use keyword `new` with an initializer.
    This approach has the following syntax:


    ```

    ''new'' type ''['' '']'' ''{'' [expr ('','' expr)*] ''}''

    ```


    This syntax blends the previous two syntaxes. Because the number of elements can
    be determined from the comma-separated list of expressions, it isn’t necessary
    (or allowed) to provide an *int_expr* between the square brackets.


    The following example demonstrates the keyword `new` with initializer approach
    to creating a 1D array:


    ```

    String[] directions = new String[] {"North", "South", "East", "West"};

    ```


    The initializer-only approach’s syntax serves as *syntactic sugar* (syntax that
    makes the language sweeter to use) for the third approach. You would use the array
    index operator to index into this array and access an element.


    ### Accessing 1D Array Elements


    A 1D array variable is associated with a `.length` property that returns the length
    of the associated 1D array as a positive `int`; for example, `directions.length`
    returns 4. This value is important when accessing a 1D array’s elements.


    Given a 1D array variable, you can access any element by specifying an expression
    that agrees with the following syntax:


    ```

    array_var ''['' index '']''

    ```


    Here, *index* is a positive `int` that ranges from zero (Java arrays are zero
    based) to one less than the value returned from the `.length` property.


    Consider the previous `directions` array. The following example references the
    first element:


    ```

    directions[0]

    ```


    You can print out this element as follows:


    ```

    System.out.println(directions[0]);

    ```


    You could use a `for` loop to print out all elements as follows:


    ```

    for (int i = 0; i < directions.length; i++)

    System.out.println(directions[i]);

    ```


    You could modify the third element as follows:


    ```

    directions[2] = "EAST"; // Because Java arrays are 0-based, directions[2]

    // accesses the third element.

    ```


    If you specify a negative index or an index greater than or equal to the array’s
    length, Java will create and throw an `ArrayIndexOutOfBoundsException` object.
    I’ll have more to say about this topic when I discuss exceptions in Chapter [11](#615966_1_En_11_Chapter.xhtml).'
  raw: '# 5. Arrays


    Java supports arrays, one of the oldest and most widely used data structures (“a
