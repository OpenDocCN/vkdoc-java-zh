  trans: '

    ### 总结


    与局部类一样，匿名类可以捕获变量；它们对封闭作用域中的局部变量具有相同的访问权限，无论该作用域是`if`语句头、方法头还是类头之后的块：


    *   匿名类可以访问其封闭类的成员。

    *   匿名类不能访问其封闭块中未声明为`final`或有效`final`的局部变量。

    *   与嵌套类一样，匿名类中声明的变量会遮蔽封闭块中具有相同名称的任何其他声明。


    匿名类在其成员方面也与局部类具有相同的限制：


    *   不能在匿名类中声明静态初始化器或成员接口。

    *   匿名类可以拥有静态成员，前提是这些成员是常量变量。


    可以在匿名类中声明以下语言元素：


    *   字段

    *   额外方法

    *   实例初始化器

    *   局部类


    请记住，不能在匿名类中声明构造函数。


    ### 一个更实用的匿名类示例


    我创建了一个`Sort`应用程序，它提供了匿名类的更实用演示。该应用程序的源代码分布在两个源文件中：`Sort.java`和`Comparer.java`。清单
    9-17 展示了`Sort.java`的源代码。


    ```

    class Sort

    {

    public static void main(String[] args)

    {

    System.out.println("Sort");

    System.out.println("----");

    System.out.println();

    int[] grades = new int[] { 96, 54, 71, 89, 63, 92 };

    outputArray("Unsorted array:", grades);

    sort(grades, new Comparer()

    {

    @Override

    public int compare(int x, int y)

    {

    return x - y;

    }

    });

    outputArray("Sorted array after ascending sort:", grades);

    System.out.println();

    int[] grades2 = new int[] { 79, 56, 100, 88 };

    outputArray("Unsorted array:", grades2);

    sort(grades2, new Comparer()

    {

    @Override

    public int compare(int x, int y)

    {

    return y - x;

    }

    });

    outputArray("Sorted array after descending sort:", grades2);

    }

    static void outputArray(String msg, int[] x)

    {

    System.out.println(msg);

    System.out.println();

    for (int i = 0; i < x.length; i++)

    System.out.print(x[i] + " ");

    System.out.println();

    System.out.println();

    }

    static void sort(int[] x, Comparer c)

    {

    for (int pass = 0; pass < x.length - 1; pass++)

    {

    int min = pass;

    for (int i = pass + 1; i < x.length; i++)

    if (c.compare(x[i], x[min]) < 0)

    min = i;

    if (min != pass)

    {

    int temp = x[min];

    x[min] = x[pass];

    x[pass] = temp;

    }

    }

    }

    }

    清单 9-17

    Sort.java

    ```


    清单 9-17 中的`Sort`类声明了`main()`、`outputArray()`和`sort()`方法：


    *   `main()`是该应用程序的入口点。它首先输出一个标题。然后声明一个 32 位整数数组（学生成绩，未排序），输出该数组，将该数组按升序排序，并输出排序后的数组。接着，它声明第二个未排序成绩数组，输出该数组，将该数组按降序排序，并输出排序后的数组。

    *   `outputArray()`在控制台上打印一条消息，后跟一个 32 位整数数组的内容。

    *   `sort()`按升序或降序组织整数数组的元素，排序方式由作为第二个参数传递给`sort()`方法的`Comparer`对象决定。它使用选择排序算法来执行此组织操作。


    选择排序类似于第 5 章的冒泡排序算法，两者都使用外层循环对数组进行多次遍历。每次遍历都与一个遍历索引相关联，该索引标识下一个要处理的元素。


    对于选择排序，内层循环选择最小的元素——最小值。如果最小元素的索引不等于遍历索引，则交换最小元素和遍历编号的元素。对于冒泡排序，内层循环将内层循环索引的元素与当前遍历索引的元素进行比较。如果内层循环索引的元素小于（升序排序）或大于（降序排序）遍历索引的元素，则发生交换。


    选择排序强调减少交换次数，而冒泡排序强调简单性。


    我对`sort()`方法的讨论提到了一个`Comparer`对象。该对象是从一个扩展了抽象`Comparer`类的匿名类创建的。清单 9-18 展示了`Comparer.java`的源代码。


    ```

    abstract class Comparer

    {

    abstract int compare(int x, int y);

    }

    清单 9-18

    Comparer.java

    ```


    `Comparer`声明了一个单一的抽象方法`int compare(int x, int y)`，该方法比较`x`和`y`参数中的值，当一个值小于另一个值时返回负数，当这些值相等时返回零，当一个值大于另一个值时返回正数。


    回到`main()`方法，你会遇到两次`Comparer`被匿名类子类化然后实例化的情况。我摘录了第一个实例，如下所示：


    ```

    sort(grades, new Comparer()

    {

    @Override

    public int compare(int x, int y)

    {

    return x - y;

    }

    });

    ```


    `return x - y;`语句从第一个参数值中减去第二个参数值，以执行升序排序。第二个`Comparer`实例交换了这些参数，得到`return y -
    x;`语句，从而执行降序排序。


    按如下方式编译清单 9-17 和 9-18：


    ```

    javac *.java

    ```


    按如下方式运行`Sort`应用程序：


    ```

    java Sort

    ```


    你应该会看到以下输出：


    ```

    Sort


    Unsorted array:

    96 54 71 89 63 92

    Sorted array after ascending sort:

    54 63 71 89 92 96

    Unsorted array:

    79 56 100 88

    Sorted array after descending sort:

    100 88 79 56

    ```


    ## 接下来是什么？


    我在本章和之前的章节中提到了包。什么是包？如何使用它？你将在下一章中找到答案。


    # 10. 包


    同名的引用类型（例如，两个不同的`Math`类）在尝试使用时可能会导致名称冲突，但 Java 通过包解决了这个问题。本章将向你介绍包的概念，然后是`package`和`import`语句。最后，你将了解静态导入、受保护访问和
    JAR 文件。


    ## 什么是包？


    Java 开发者将相关的类和/或接口分组到*包*中，包是用于存储引用类型的唯一*命名空间*。包可以存储类、接口和*子包*（嵌套在其他包中的包）。可以将包视为存储文件和子目录的目录。


    注意


    包使得定位和使用引用类型更加容易，避免了同名类型之间的名称冲突，并控制对类型的访问。


    包有一个名称，该名称必须是非保留标识符，例如`java`。成员选择运算符（`.`）将包名与子包名分隔开，并将包名或子包名与类型名分隔开。例如，`java.lang.System`中的两个`.`运算符将包名`java`与子包名`lang`分隔开，并将子包名`lang`与类型名`System`分隔开。


    注意


    `System`实用类提供了几个有用的系统相关常量和方法。我们将在第 14 章中查看其常量和一些方法。


    引用类型（例如`System`）必须声明为`public`才能从其包外部访问。任何必须可访问的常量、构造函数和方法也是如此。你将在本章后面看到示例。

    '
- fmt: '## The Package Statement


    Java provides the `package` statement for creating a package. This statement appears
    at the top of a source file and identifies the package to which the source file’s
    types belong. It must conform to the following syntax:


    ```

    ''package'' identifier (''.'' identifier)* '';''

    ```


    A `package` statement starts with reserved word `package` and continues with an
    *identifier*, which is optionally followed by a `.`-separated sequence of *identifiers*.
    A semicolon terminates this statement.


    The first (leftmost) identifier names the package, and each subsequent identifier
    names a subpackage. For example, in `package x.y;`, all types declared in the
    source file belong to the `y` subpackage of the `x` package.


    **Note**


    By convention, a package/subpackage name is expressed in lowercase. When the name
    consists of multiple words, you might want to place an underscore between each
    word to improve readability.


    A sequence of package names must be unique to avoid compilation problems. For
    example, suppose you create two different `report_generator` packages, and suppose
    that each package contains a `ReportGenerator` class with a different interface.
    When the Java compiler encounters, for example, `ReportGenerator rg = new ReportGenerator();`
    in the source code, it needs to verify that the `ReportGenerator()` constructor
    exists.


    The compiler will search all accessible packages until it finds a `report_generator`
    package that contains a `ReportGenerator` class. If the found package contains
    the appropriate `ReportGenerator` class with a `ReportGenerator()` constructor,
    everything is fine. Otherwise, if the found `ReportGenerator` class doesn’t have
    a `ReportGenerator()` constructor, the compiler reports an error.


    This scenario illustrates the importance of choosing unique package name sequences.
    The convention in choosing a unique name sequence is to reverse your Internet
    domain name and use it as a prefix for the sequence. For example, I might choose
    `tech.javajeff` as my prefix if `javajeff.tech` was my domain name. I would then
    specify `tech.javajeff.report_generator.ReportGenerator` to access `ReportGenerator`.


    **Note**


    Domain name components are not always valid package names. One or more component
    names might start with a digit (`4seasons.com`), contain a hyphen (`-`) or other
    illegal character (`news-world.com`), or be one of Java’s reserved words (`interface.com`).
    Convention dictates that you prefix the digit with an underscore (`com._4seasons`),
    replace the illegal character with an underscore (`com.news_world`), and suffix
    the reserved word with an underscore (`com.interface_`).


    To avoid more problems with the `package` statement, there are a couple of rules
    that you need to follow:


    - You can declare only one `package` statement in a source file.

    - You cannot precede the `package` statement with anything apart from comments.


    The first rule, which is a special case of the second rule, exists because it
    doesn’t make sense to store a reference type in multiple packages. Although a
    package can store multiple types, a type can belong to only one package.


    When a source file doesn’t declare a `package` statement, the source file’s types
    belong to the *unnamed package*. Nontrivial reference types are typically stored
    in their own packages and avoid the unnamed package.


    Oracle’s Java implementations map package and subpackage names to same-named directories
    (folders for you Macintosh folks). For example, an implementation would map `report_generator`
    to a directory named `report_generator`. In `x`.`y`, `x` would map to a directory
    named `x` and `y` would map to a `y` subdirectory of `x`. The compiler stores
    the class files that implement the package’s types in the corresponding directory.
    Note that the unnamed package corresponds to the current directory.


    ## The Import Statement


    Imagine having to repeatedly specify `tech.javajeff.report_generator.ReportGenerator`
    for each occurrence of `ReportGenerator` in source code. Java provides a convenient
    alternative for omitting lengthy package details. This alternative is the `import`
    statement.


    The `import` statement imports types from a package by telling the compiler where
    to look for *unqualified* (no package prefix) type names during compilation. It
    appears near the top of a source file and must conform to the following syntax:


    ```

    ''import'' identifier (''.'' identifier)]* ''.'' (typeName | ''*'') '';''

    ```


    An `import` statement starts with reserved word `import` and continues with an
    *identifier*, which is optionally followed by a `.`-separated sequence of *identifiers*.
    A `typeName` or `*` (asterisk) follows, and a `;` (semicolon) terminates this
    statement.


    The syntax reveals two forms of the `import` statement. First, you can import
    a single type name, which is identified via `typeName`. Second, you can import
    all types, which is identified via the `*`.


    The `*` symbol is a *wildcard* that represents all unqualified type names. It
    tells the compiler to look for such names in the rightmost package of the `import`
    statement’s package sequence, unless the type name is found in a previously searched
    package. Note that using the wildcard doesn’t have a performance penalty or lead
    to code bloat. However, it can lead to name conflicts, which you will see.


    For example, `import tech.javajeff.report_generator.ReportGenerator;` tells the
    compiler that an unqualified `ReportGenerator` class exists in the `tech.javajeff.report_generator`
    package. Similarly, `import tech.javajeff.report_generator.*;` tells the compiler
    to look in this package when it encounters a `ReportGenerator` name, a `Vehicle`
    name, or even an `Account` name.


    **Tip**


    When working on a multi-programmer project, avoid using the `*` wildcard so that
    other programmers can easily see which types are used in your source code.


    You can run into name conflicts when using the wildcard version of the `import`
    statement because any unqualified type name matches the wildcard. For example,
    you have `math` and `statistics` packages that each contain a `Math` class, the
    source code begins with `import math.*;` and `import statistics.*;` statements,
    and it also contains an unqualified occurrence of `Math`. Because the compiler
    doesn’t know if `Math` refers to `math`’s `Math` class or to `statistics`’s `Math`
    class, it reports an error. You can fix this problem by qualifying `Math` with
    the correct package name (`math.Math` or `statistics.Math`).


    To avoid additional problems with the `import` statement, there are a couple of
    rules that you need to follow:


    - Because Java is case sensitive, package and subpackage names specified in an
    `import` statement must be expressed in the same case as that used in the `package`
    statement.

    - You cannot precede the `import` statement with anything apart from comments,
    a `package` statement, other `import` statements, and `static import` statements
    (which I introduce later in this chapter).


    The compiler automatically imports types from the `java.lang` library package.
    As a result, you don’t have to specify `import java.lang.System;` (import `java.lang`’s
    `System` class) or similar `import` statements in your source code.


    Because Java implementations map package and subpackage names to same-named directories,
    an `import` statement is equivalent to loading a reference type’s class file from
    the directory sequence corresponding to the package sequence.


    ## Playing with Packages


    A practical example will help you fully grasp the `package` and `import` statements.
    I’m demonstrating these statements in the context of a logging library that lets
    you log messages to the console, to a file, or to another destination.'
