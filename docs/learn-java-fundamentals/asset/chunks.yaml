- fmt: '### Class Extension


    Java’s class extension feature consists of the `extends` keyword. When present,
    `extends` specifies a parent-child relationship between two classes. This relationship
    is described by the following syntax:


    ```

    ''class'' child ''extends'' parent

    ''{''

    // class body

    ''}''

    ```


    Given this syntax, the *child* class extends the *parent* class, inheriting *parent*’s
    accessible members.


    **Note:** It’s impossible to specify multiple class names after `extends` because
    Java doesn’t support class-based multiple inheritance.


    For example, I’ll use `extends` to establish a relationship between classes `Vehicle`
    and `Truck` and then between classes `Account` and `CheckingAccount`:


    ```

    class Vehicle

    {

    // member declarations

    }

    class Truck extends Vehicle

    {

    // inherit accessible members from Vehicle

    // provide own member declarations

    }

    class Account

    {

    // member declarations

    }

    class CheckingAccount extends Account

    {

    // inherit accessible members from Account

    // provide own member declarations

    }

    ```


    These examples codify is-a relationships. `Truck` is a specialized `Vehicle`,
    and `CheckingAccount` is a specialized `Account`. `Vehicle` and `Account` are
    known as *base classes*, *parent classes*, or *superclasses*. `Truck` and `CheckingAccount`
    are known as *derived classes*, *child classes*, or *subclasses*.


    **Note:** You might declare a class that should not be extended for security or
    another reason. Java provides the `final` keyword to prevent the class from being
    extended. Simply prefix a class header with `final`, as in `final class Password`.
    Given this declaration, the compiler will report an error when someone attempts
    to extend `Password`.


    Child classes inherit accessible fields and methods from their parent classes
    and other ancestor classes. They never inherit constructors. Instead, child classes
    declare their own constructors. Furthermore, they can declare their own fields
    and methods to differentiate them from their parents. Consider Listing [7-1](#615966_1_En_7_Chapter.xhtml#PC3).


    ```

    class Account

    {

    private String name;

    private long amount;

    Account(String name, long amount)

    {

    this.name = name;

    setAmount(amount);

    }

    void deposit(long amount)

    {

    this.amount += amount;

    }

    String getName()

    {

    return name;

    }

    long getAmount()

    {

    return amount;

    }

    void setAmount(long amount)

    {

    this.amount = amount;

    }

    }

    Listing 7-1

    Account.java

    ```


    Listing [7-1](#615966_1_En_7_Chapter.xhtml#PC3) describes a generic bank account
    class with a name and an initial amount, which are both set in the constructor.
    Also, it lets users make deposits. (You can withdraw by depositing negative amounts
    of money, but we’ll ignore this possibility.) Note that the account name must
    be set when an account is created.


    **Note:** I chose to represent a monetary value as a `long`, where the value is
    stored as a count of pennies. You might prefer to use a `double` or a `float`
    to store a dollars and cents value, but doing that can lead to inaccuracies. Chapter
    [12](#615966_1_En_12_Chapter.xhtml) presents a better alternative.


    Listing [7-2](#615966_1_En_7_Chapter.xhtml#PC4) presents a `CheckingAccount` subclass
    that extends its `Account` superclass.


    ```

    class CheckingAccount extends Account

    {

    CheckingAccount(long amount)

    {

    super("checking", amount);

    }

    void withdraw(long amount)

    {

    setAmount(getAmount() - amount);

    }

    }

    Listing 7-2

    CheckingAccount.java

    ```


    The `CheckingAccount` class subclasses `Account` and provides a constructor that
    initializes the `amount` and `name` fields in its superclass by passing `"checking"`
    and `amount` to the superclass constructor.


    The constructor uses the `super` reserved word to pass these values to its equivalent
    superclass constructor. It uses `super` in a call context via `super("checking",
    amount);`. This is analogous to a `this()` call context to pass arguments to another
    constructor in the same class.


    **Caution:** Just as `this()` must be the first element in a constructor that
    calls another constructor in the same class, `super()` must be the first element
    in a constructor that calls a constructor in its superclass. If you break this
    rule, the compiler will report an error. The compiler will also report an error
    when it detects a `super()` call in a method; only ever call `super()` in a constructor.


    `CheckingAccount` also provides a `withdraw()` method that reduces the account
    balance by the amount to be withdrawn. Because `Account`’s `amount` field is `private`,
    `CheckingAccount` cannot directly access it. Instead, it invokes the `setAmount()`
    and `getAmount()` methods that it inherits from `Account`, subtracting its `amount`
    parameter value from `getAmount()`’s return value and passing the difference to
    `setAmount()`.


    Listing [7-3](#615966_1_En_7_Chapter.xhtml#PC5) presents a `SavingsAccount` subclass
    that extends its `Account` superclass.


    ```

    class SavingsAccount extends Account

    {

    SavingsAccount(long amount)

    {

    super("savings", amount);

    }

    }

    Listing 7-3

    SavingsAccount.java

    ```


    The `SavingsAccount` class is trivial because it doesn’t need to declare additional
    fields or methods. It does, however, declare a constructor that initializes the
    fields in its `Account` superclass. Initialization happens when `Account`’s constructor
    is called via Java’s `super` keyword, followed by a parenthesized arguments list.


    **Caution:** If `super()` is not specified in a subclass constructor, and if the
    superclass doesn’t declare a no-argument constructor, then the compiler will report
    an error. This is because the subclass constructor must call a no-argument superclass
    constructor when `super()` isn’t present.


    I’ve created an `AccountDemo` application class demonstrating the `Account` superclass
    and its `CheckingAccount` and `SavingsAccount` subclasses. Listing [7-4](#615966_1_En_7_Chapter.xhtml#PC6)
    presents `AccountDemo`’s source code.


    ```

    class AccountDemo

    {

    public static void main(String[] args)

    {

    SavingsAccount sa = new SavingsAccount(40000);

    System.out.println("account name: " + sa.getName());

    System.out.println("initial amount: " + sa.getAmount());

    sa.deposit(3500);

    System.out.println("new amount after deposit: " + sa.getAmount());

    CheckingAccount ca = new CheckingAccount(2000);

    System.out.println("account name: " + ca.getName());

    System.out.println("initial amount: " + ca.getAmount());

    ca.deposit(6000);

    System.out.println("new amount after deposit: " + ca.getAmount());

    ca.withdraw(1500);

    System.out.println("new amount after withdrawal: " + ca.getAmount());

    }

    }

    Listing 7-4

    AccountDemo.java

    ```


    Assuming that `Account.java`, `CheckingAccount.java`, `SavingsAccount.java`, and
    `AccountDemo.java` are located in the same directory, execute the following command
    to compile all four source files:


    ```

    javac *.java

    ```


    Execute the following command to run the application:


    ```

    java AccountDemo

    ```


    You should observe the following output:


    ```

    account name: savings

    initial amount: 40000

    new amount after deposit: 43500

    account name: checking

    initial amount: 2000

    new amount after deposit: 8000

    new amount after withdrawal: 6500

    ```'
