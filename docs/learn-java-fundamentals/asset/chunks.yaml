- fmt: '### Overriding `hashCode()` and `equals()` Together


    You must override `hashCode()` when overriding `equals()`, and in accordance with
    the following contract, which is specified in `hashCode()`’s Java documentation:


    - Whenever `hashCode()` is invoked on the same object more than once during an
    execution of a Java application, `hashCode()` must consistently return the same
    integer, provided no information used in `equals()` comparisons on the object
    is modified. However, this integer doesn’t need to remain consistent from one
    execution of an application to another. For example, `hashCode()` might return
    5000 each time it is called for one execution and return 8700 each time it is
    called for another execution.


    - When two objects are equal according to the overriding `equals()` method, calling
    `hashCode()` on each of the two objects must produce the same integer result.


    - When two objects are unequal according to the overriding `equals()` method,
    the integers returned from calling `hashCode()` on these objects can be identical.
    However, having `hashCode()` return distinct values for unequal objects may improve
    hash table performance.


    Fail to obey this contract and your class’s instances will not work properly with
    the aforementioned `HashMap` class.


    If you override `equals()` but not `hashCode()`, you most importantly violate
    the second item in the contract: The hash codes of equal objects must also be
    equal. This violation can lead to serious consequences, as demonstrated in Listings
    [7-15](#615966_1_En_7_Chapter.xhtml#PC41) and [7-16](#615966_1_En_7_Chapter.xhtml#PC42).


    ```

    class Point

    {

    int x, y;

    Point(int x, int y)

    {

    this.x = x; this.y = y;

    }

    int getX()

    {

    return x;

    }

    int getY()

    {

    return y;

    }

    @Override

    public boolean equals(Object o)

    {

    if (!(o instanceof Point))

    return false;

    Point p = (Point) o;

    return p.x == x && p.y == y;

    }

    }

    Listing 7-15

    Point.java

    ```


    The `Point` class describes a point via a pair of `int`-based `x` and `y` fields.
    It declares a `Point(x, y)` constructor that initializes these fields along with
    `getX()` and `getY()` methods that return their values. It also overrides the
    `equals()` method to determine whether two `Point` objects are the same (based
    on identical `x` and `y` values).


    ```

    class HashCodeDemo

    {

    public static void main(String[] args)

    {

    HashMap map = new HashMap();

    Point p = new Point(10, 20);

    map.put(p, "some point");

    System.out.println(map.get(p));

    System.out.println(map.get(new Point(10, 20)));

    }

    }

    Listing 7-16

    HashCodeDemo.java (version 2)

    ```


    `HashMapDemo`’s `main()` method first instantiates `HashMap` and assigns its reference
    to the `map` local variable. It then instantiates `Point` and assigns its reference
    to local variable `p`, and initializes the object to `10` (x) and `20` (y).


    The subsequent `map.put()` call stores `p`’s reference and a reference to the
    `"some point" String` object in the hash map.


    Next, `HashMapDemo` invokes `get(p)` to return the `"some point"` value associated
    with the `Point` object key. This value is then output via `System.out.println()`.


    A second `System.out.println()` call outputs the value associated with the key
    described by `new Point(10, 20)`.


    Compile Listing [7-16](#615966_1_En_7_Chapter.xhtml#PC42) as follows:


    ```

    javac HashCodeDemo.java

    ```


    Run the resulting application as follows:


    ```

    java HashCodeDemo

    ```


    You should observe the following output:


    ```

    some point

    null

    ```


    You might expect `some point` to be output because `new Point(10, 20)` and the
    `Point(10, 20)` object assigned to `p` logically describe the same key. However,
    this isn’t the case: `null` outputs instead.


    Although the `Point` object referenced by `p` and the object described by `new
    Point(10, 20)` are logically equivalent, these objects have different hash codes,
    resulting in each object referring to a different entry in the hash map. If an
    object is not stored (via `put()`) in that entry, `get()` returns the null reference.


    Correcting this problem requires that `hashCode()` be overridden to return the
    same integer value for logically equivalent objects. This is what the `String`
    class does, which is why you won’t encounter a problem when storing `String`-based
    keys.


    Let’s fix this problem. Consider Listing [7-17](#615966_1_En_7_Chapter.xhtml#PC46)’s
    upgraded `Point` class.


    ```

    class Point

    {

    int x, y;

    Point(int x, int y)

    {

    this.x = x; this.y = y;

    }

    int getX()

    {

    return x;

    }

    int getY()

    {

    return y;

    }

    @Override

    public boolean equals(Object o)

    {

    if (!(o instanceof Point))

    return false;

    Point p = (Point) o;

    return p.x == x && p.y == y;

    }

    @Override

    public int hashCode()

    {

    int result = 17; // A prime number to start with

    result = 31 * result + x; // Combine with x

    result = 31 * result + y; // Combine with y

    return result;

    }

    }

    Listing 7-17

    Point.java (version 3)

    ```


    The only difference between this version of `Point` and the previous version is
    the presence of a `hashCode()` method. This method works as follows:


    1. The first line, `int result = 17;`, initializes local variable `result` to
    `17`. This starting value is arbitrary and is chosen to be a prime number. A prime
    number helps reduce the likelihood of collisions.


    2. The second line, `result = 31 * result + x;`, combines `result`’s current value
    with `Point`’s `x` field value. Multiplying `result`’s value by `31` is commonly
    done because 31 is an odd prime number, which helps to create a more unique result.
    This line mixes `x`’s value into the hash code.


    3. The third line, `result = 31 * result + y;`, similarly combines `result`’s
    current value with `Point`’s `y` field value, which mixes `y`’s value into the
    hash code.


    4. The final line, `return result;`, returns the resulting hash code to this method’s
    caller.


    To summarize, this `hashCode()` method implementation creates a unique hash code
    for each `Point` object. This unique hash code is based on combining `Point`’s
    `x` and `y` field values, which specify the point’s coordinates. Using prime numbers
    (17 and 31) in the calculation helps distribute the hash codes more evenly, reducing
    the possibility of collisions.


    Note that this implementation is suitable for most cases. However, depending on
    your application, you might have to tune the implementation further. You need
    to ensure that objects that are considered equal (according to the `equals()`
    method) produce the same hash code.


