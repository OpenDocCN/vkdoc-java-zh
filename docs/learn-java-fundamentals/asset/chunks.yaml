    method. If this method returns true, the method succeeded (it will succeed with
    a console but might not succeed when logging to a file), and `main()` proceeds
    to log a message by invoking `Logger`’s `log()` method. It then disconnects from
    the logger by calling `Logger`’s `disconnect()` method.


    The `main()` method next repeats this process by creating a file-based logger
    that logs messages to a file named `messages.txt`.


    This process is repeated a third time by attempting to create a file-based logger
    that logs messages to an unnamed file. Let’s assume that a default name is used
    when no file name argument is passed to `newLogger()` – remember that `newLogger()`
    uses varargs to obtain the file name.


    The `newLogger()` method is coded to not return a logger, but you could change
    it to choose a default file name. I wrote it this way to test the code when `newLogger()`
    fails to return a logger.


    Copy Listing [10-5](#615966_1_En_10_Chapter.xhtml#PC7) to a file named `TestLogging.java`
    and place this file in the same directory as the `logging` directory that you
    previously created. Then, execute the following command to compile `TestLogging.java`
    (and the logging package’s source files when not previously compiled):


    ```

    javac TestLogging.java

    ```


    Execute the following command to run `TestLogging`:


    ```

    java TestLogging

    ```


    You should observe the following output:


    ```

    test message #1

    opening file messages.txt

    writing test message #2 to file messages.txt

    closing file messages.txt

    cannot connect to file-based logger

    ```


    Suppose that `TestLogging.java` wasn’t located in the same directory as `logging`.
    How would you compile this source file and run the resulting application? The
    answer is to use the class path.


    The *class path* is a sequence of packages that the Java Virtual Machine (JVM)
    searches for reference types. It is specified via the `-classpath` (or `-cp`)
    option used to start the JVM or, when not present, the `CLASSPATH` environment
    variable.


    Note


    Whether you use the `-classpath`/`-cp` option or the `CLASSPATH` environment variable
    to specify a class path, there is a specific format that must be followed. Under
    Windows, this format is expressed as *path1*`;`*path2*`;...`, where *path1*, *path2*,
    and so on are the locations of package directories. Under Mac OS X, Unix, and
    Linux, this format changes to *path1*`:`*path2*`:...`.


    Suppose (on a Windows platform) that the logging library is stored in `C:\logging`
    and that `TestLogging.java` is stored in `C:\TestLogging`, which is the current
    directory. Specify the following commands to compile the source code and run the
    application:


    ```

    javac -cp ../logging TestLogging.java

    java -cp ../logging;. TestLogging

    ```


    The period character after the `;` character in `../logging;.` represents the
    current directory. It must be specified so that the JVM can locate `TestLogging.class`.


    ## Additional Topics


    There are three additional topics to consider when working with packages: static
    imports, protected access, and JAR files.'
