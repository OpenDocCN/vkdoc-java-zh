  trans: '

    ### Javadoc 注释


    *Javadoc 注释*是多行注释的一种变体。它以 `/**`（而不是 `/*`）开头，并以 `*/` 结尾（与多行注释一样）。从 `/**` 到 `*/`
    之间的所有字符都会被编译器忽略。以下示例展示了一个 Javadoc 注释：


    ```

    /**

    *  应用程序入口点

    *

    *  @param args 传递给此方法的命令行参数数组

    */

    public static void main(String[] args)

    {

    // TODO 代码应用逻辑在此处

    }

    ```


    此示例中的 Javadoc 注释描述了应用程序的 `main()` 方法。夹在 `/**` 和 `*/` 之间的是对该方法的描述以及 `@param` *Javadoc
    标签*（一个以 `@` 为前缀、用于 `javadoc` 工具的指令）。


    以下是一些常用 Javadoc 标签（包括 `@param`）的列表：


    *   `@author` 标识源代码的作者。


    *   `@deprecated` 标识不应再使用的源代码实体（例如方法）。


    *   `@param` 标识方法的某个参数。


    *   `@see` 提供“另请参阅”引用。


    *   `@since` 标识该实体首次出现的软件版本。


    *   `@return` 标识方法返回值的类型。


    *   `@throws` 记录方法抛出的异常。


    清单 2-1 展示了清单 1-1 中 `HelloWorld` 应用程序的更新源代码。此源代码包含一对 Javadoc 注释，用于记录 `HelloWorld`
    类及其 `main()` 入口点方法。


    ```

    /**

    一个用于介绍 Java 应用程序的简单类。

    @author Jeff Friesen

    */

    public class HelloWorld

    {

    /**

    应用程序入口点

    @param args 传递给此方法的命令行参数数组

    */

    public static void main(String[] args)

    {

    System.out.println("hello, world");

    }

    }

    清单 2-1

    HelloWorld.java

    ```


    除了 Javadoc 注释之外，清单 2-1 与清单 1-1 的不同之处在于，它在 `HelloWorld` 类前添加了 `public` 关键字，这使得
    `HelloWorld` 在其包外部也可访问。（我将在第 6 章讨论 `public`，在第 10 章讨论包。）


    我使用 `javadoc` 工具为 `HelloWorld.java` 生成基于 HTML 的文档。此工具要求 `HelloWorld` 类前带有 `public`
    关键字。此外，还需要 `.java` 文件扩展名：


    ```

    javadoc HelloWorld.java

    ```


    作为响应，`javadoc` 生成以下输出：


    ```

    Loading source file HelloWorld.java...

