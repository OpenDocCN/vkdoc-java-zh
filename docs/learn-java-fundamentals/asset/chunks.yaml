  trans: '

    #### 局部变量


    你可以在方法内部声明额外的变量，作为方法实现的一部分。这些变量被称为*局部变量*，因为它们局限于该方法内部——无法从方法外部访问。此外，它们只在方法执行期间存在。在这两种情况下，参数也是如此。


    考虑以下计算 *n*!（阶乘）的示例：


    ```

    long factorial(int n)

    {

    if (n < 0)

    return -1;

    if (n == 0 || n == 1)

    return 1;

    long result = 1;

    for (int i = n; i > 1; i--)

    result *= i;

    return result;

    }

    ```


    该方法计算*阶乘*（所有小于或等于某个数 *n* 的正整数的乘积，即 *n* x (*n* – 1) x (*n* - 2) x … x 3 x 2 x 1），该乘积基于传递给参数
    `n` 的参数。


    `factorial()` 方法首先测试参数 `n` 的值，以确保其为正数。如果该值小于 0，`factorial()` 返回 -1，表示传入了负数参数。根据定义，阶乘的乘积中不能包含负整数。


    注意


    第 11 章介绍了一种更好的技术来处理意外参数，例如将负整数传递给 `factorial()` 的参数 `n`。


    接下来，该方法测试参数 `n` 的值是否为 0 或 1。如果传入了其中任何一个值，`factorial()` 返回 1。根据空乘积的约定（[`http://en.wikipedia.org/wiki/Empty_product`](http://en.wikipedia.org/wiki/Empty_product)），0!
    的值为 1。


    接着，`factorial()` 声明了一个名为 `result` 的局部变量，并将其初始化为 `1`。


    警告


    局部变量必须初始化。当编译器发现试图读取一个未初始化的局部变量时，会报告错误。


    然后，该方法进入一个 `for` 循环来计算阶乘。`for` 语句的测试部分由 `i > 1` 组成，而不是 `i >= 1`，因为任何整数乘以 1 都等于其本身；将
    `1` 赋值给 `result` 已经处理了这次乘法。


    每次循环迭代都使用 `*=` 复合赋值运算符，将 `result` 的值乘以 `i` 的值，并将乘积存储回 `result`。


    最后，`result` 的值被返回给调用者。


    除了 `result`，`factorial()` 还声明了第二个局部变量：`i`。虽然这两个变量都只在该方法执行期间存在，但它们的作用域不同。`result`
    变量在整个方法中都可访问。然而，`i` 仅在 `for` 循环及其 `result *= i;` 复合赋值语句中可访问。在声明它的 `for` 循环语句之前或之后，都无法访问它。


    更具体地说，局部变量的生命周期和作用域仅限于声明它的块及其子块。这就是为什么 `i` 在 `for` 循环外部不可访问的原因，该循环的头部后面跟着一个单语句块。以下示例应该能阐明这一点：


    ```

    {

    int j; // j 在此处开始存在

    {

    j = 5; // 正确：j 仍然存在

    }

    }

    j = 10; // 错误：j 已不存在

    ```


    #### 方法重载


    你可以在同一个类中声明具有相同名称但不同参数列表的方法，这一特性称为*方法重载*。当编译器遇到方法调用表达式时，它会将所调用方法的逗号分隔的参数列表与每个重载方法的参数列表进行比较，以寻找要调用的正确方法。


    当两个同名方法的参数列表在参数数量或顺序上不同时，它们就是重载的。或者，当两个同名方法至少有一个参数的类型不同时，它们也是重载的。例如，考虑以下三个 `add()`
    方法，它们将两个或三个值相加——第一个方法将两个双精度浮点值相加，第二个方法将两个整数相加，第三个方法将三个整数相加：


    ```

    double add(double a, double b)

    {

    return a + b;

    }

    int add(int a, int b)

    {

    return a + b;

    }

    int add(int a, int b, int c)

    {

    return a + b + c;

    }

    ```


    你不能仅通过更改方法的返回类型来重载它。例如，你不能同时指定 `int add(int a, int b)` 和 `double add(int a, int
    b)`，因为当编译器遇到 `add(4, 5);` 时，它没有足够的信息来区分这些方法。编译器会报告一个“重定义”错误。


    ### 通过构造函数描述初始化


    一个类可以声明一个或多个代码块，用于在创建对象时对其进行初始化。这种代码块称为*构造函数*。其声明由一个头部后跟一个花括号分隔的主体组成。头部以声明该构造函数的类名开头，因为构造函数没有自己的名称。后面跟着一个可选的括号括起来的参数列表：


    ```

    className ''('' [parameterList] '')''

    ''{''

    // 构造函数主体

    ''}''

    ```


    `className` 必须与声明该构造函数的类名匹配。`parameterList` 是一个逗号分隔的参数列表。后面跟着一个花括号分隔的主体，其中包含在调用构造函数时要执行的代码。与方法不同，构造函数没有返回类型，因为它不返回值。


    注意


    当一个类没有声明任何构造函数时，编译器会生成一个默认的空的无参构造函数。


    以下示例在 `Vehicle` 类中声明了一个构造函数。该构造函数将 `Vehicle` 的 `make`、`model` 和 `year` 字段初始化为传递给构造函数
    `_make`、`_model` 和 `_year` 参数的参数：


    ```

    class Vehicle

    {

    // ...

    Vehicle(String _make, String _model, int _year)

    {

    make = _make;

    model = _model;

    year = _year;

    }

    // ...

    }

    ```


    为简洁起见，我没有包含 `Vehicle` 类中的所有内容。第一个 `//...` 是字段声明的简写。第二个 `//...` 是各种方法声明的简写。


    参数名称带有前导下划线，以防止赋值出现问题。例如，如果你将 `_make` 重命名为 `make` 并指定 `make = make;`，你将一事无成，因为你将参数的值赋给了它自身。你也可以通过给字段名称添加
    `this.` 前缀来避免此问题：


    ```

    Vehicle(String make, String model, int year)

    {

    this.make = make;

    this.model = model;

    this.year = year;

    }

    ```


    保留字 `this` 指的是当前对象。通过在字段名称前加上 `this.`，你表示你正在引用当前对象对该字段的副本。


    在重构构造函数的同时，你可能还想重构 `setMake()`、`setModel()` 和 `setYear()` 方法。例如，你可以将 `setMake()`
    从


    ```

    void setMake(String _make)

    {

    make = _make;

    }

    ```


    改为


    ```

    void setMake(String make)

    {

    this.make = make;

    }

    ```


    以利用 `this.` 前缀。


    与实例字段名称相同的参数（或局部变量）名称会*遮蔽*（隐藏或掩盖）该字段。关键字 `this` 代表当前对象的引用。在字段名称前加上 `this.` 可以消除遮蔽，因为它访问的是字段名称，而不是同名的参数。


    虽然你可以通过构造函数中显示的赋值来初始化诸如 `make` 之类的字段，但最好通过 setter 方法（例如前面展示的 `setMake()`）来执行赋值，我如下演示：


    ```

    Vehicle(String make, String model, int year)

    {

    setMake(make);

    setModel(model);

    setYear(year);

    }

    ```


    因为未来版本的 `setMake()`、`setModel()` 和 `setYear()` 可能会执行额外的初始化任务，为什么要在构造函数中重复这些代码呢？

