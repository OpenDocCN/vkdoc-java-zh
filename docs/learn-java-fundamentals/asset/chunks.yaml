    ##### 不等于


    *!=* *运算符*比较两个操作数是否不相等。该运算符的语法如下：


    ```

    operand1 ''!='' operand2

    ```


    当两个操作数不相等时，`!=` 运算符返回 true；否则返回 false。


    示例如下：


    ```

    int x = 10;

    int y = 15;

    boolean equal = x != y;

    ```


    在此示例中，`x` 和 `y` 各自包含一个整数。表达式 `x != y` 返回 true，因为 `x`（`10`）不等于 `y`（`15`）。


    对于这两个运算符，两个操作数都必须具有可比性。例如，你不能将整数常量与字符串常量进行比较。


    当涉及对象时（在第 6 章中讨论），这些运算符不会比较它们是否相等或不相等。相反，它们会比较这些对象的引用。例如，`"abc" == "abc"` 会比较第一个字符串常量的引用与第二个字符串常量的引用。由于一种称为“驻留”的机制（在第
    13 章讨论 `String` 类时会提到），这些引用是相同的，因此表达式返回 true。对于 `"abc" != "abc"`，表达式返回 false。


    #### 关系运算符


    Java 支持小于（`<`）、小于等于（`<=`）、大于（`>`）、大于等于（`>=`）以及用于对象的类型比较（`instanceof`）关系运算符。


    ##### 关系小于


    *<* *运算符*比较两个操作数，以判断左操作数是否小于右操作数。该运算符的语法如下：


    ```

    operand1 ''<'' operand2

    ```


    *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
    类型。当 *operand1* 小于 *operand2* 时，此表达式返回 true；否则返回 false。


    考虑以下示例：


    ```

    x < y

    ```


    当 `x` 小于 `y` 时，此表达式计算结果为 true；否则计算结果为 false。


    ##### 关系小于等于


    *<=* *运算符*比较两个操作数，以判断左操作数是否小于或等于右操作数。该运算符的语法如下：


    ```

    operand1 ''<='' operand2

    ```


    *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
    类型。当 *operand1* 小于或等于 *operand2* 时，此表达式返回 true；否则返回 false。


    考虑以下示例：


    ```

    x <= y

    ```


    当 `x` 小于或等于 `y` 时，此表达式计算结果为 true；否则计算结果为 false。


    ##### 关系大于


    *>* *运算符*比较两个操作数，以判断左操作数是否大于右操作数。该运算符的语法如下：


    ```

    operand1 ''>'' operand2

    ```


    *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
    类型。当 *operand1* 大于 *operand2* 时，此表达式返回 true；否则返回 false。


    考虑以下示例：


    ```

    x > y

    ```


    当 `x` 大于 `y` 时，此表达式计算结果为 true；否则计算结果为 false。


    ##### 关系大于等于


    *>=* *运算符*比较两个操作数，以判断左操作数是否大于或等于右操作数。该运算符的语法如下：


    ```

    operand1 ''>='' operand2

    ```


    *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int`、`long`、`float` 或 `double`
    类型。当 *operand1* 大于或等于 *operand2* 时，此表达式返回 true；否则返回 false。


    考虑以下示例：


    ```

    x >= y

    ```


    当 `x` 大于或等于 `y` 时，此表达式计算结果为 true；否则计算结果为 false。


    ##### 对象的类型比较


    *instanceof* *运算符*比较其左操作数（一个对象）与其右操作数（一个引用类型），以确定该对象是否为该引用类型的实例。该运算符的语法如下：


    ```

    operand1 ''instanceof'' operand2

    ```


    *Operand1* 必须是某个引用类型（例如类——关于对象和类的讨论请参见第 6 章）的实例（对象）。*Operand2* 必须是一个类或其他引用类型。当
    *operand1* 是 *operand2* 的一个实例时，此表达式返回 true；否则返回 false。


    考虑以下示例：


    ```

    "abc" instanceof String

    ```


    此表达式计算结果为 true，因为 `"abc"` 是 `String` 类的一个实例。


    #### 移位运算符


    Java 支持按位左移（`<<`）、带符号扩展的按位右移（`>>`）以及带零扩展的按位右移（`>>>`）移位运算符。


    ##### 按位左移


    *<<* *运算符*将其左操作数中的位向左移动，移动的位数由右操作数指定。每次移位，最右侧位补 0，最左侧位被丢弃。该运算符的语法如下：


    ```

    operand1 ''<<'' operand2

    ```


    *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int` 或 `long` 类型。此表达式返回 *operand1*
    向左移动 *operand2* 位后的结果。


    考虑以下示例：


    ```

    2 << 3

    ```


    此表达式将 `2` 向左移动 `3` 位。结果为 16。本质上，我们是将 `2` 乘以 8。这比使用 `*` 运算符快得多。然而，它仅限于乘以 2 的小次幂。


    ##### 带符号扩展的按位右移


    *>>* *运算符*将其左操作数中的位向右移动，移动的位数由右操作数指定。每次移位，最左侧位（*符号位*，指示其余位表示正数还是负数——0 表示正数，1 表示负数）的副本被移到右侧，最右侧位被丢弃。这被称为*有符号移位*。该运算符的语法如下：


    ```

    operand1 ''>>'' operand2

    ```


    *operand1* 和 *operand2* 都必须为 `char`、`byte`、`short`、`int` 或 `long` 类型。此表达式返回 *operand1*
    向右移动 *operand2* 位后的结果。


    考虑以下示例：


    ```

    4 >> 1

    -4 >> 1

    ```


    第一个表达式将 `4` 向右移动 `1` 位。结果为 2。第二个表达式将 `-4` 向右移动 `1` 位。结果为 -2。本质上，我们是将 4 或 -4 除以
    2。这比使用 `/` 运算符快得多。然而，它仅限于除以 2 的小次幂。

