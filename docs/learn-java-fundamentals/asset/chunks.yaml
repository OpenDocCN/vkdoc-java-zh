  raw: '#### The Error Class


    `Throwable`’s other direct subclass is `Error`, which describes a serious (even
    abnormal) problem (such as running out of memory, overflowing the JVM’s stack,
    or attempting to load a class that cannot be found) that a reasonable application
    should not try to handle. Like `Exception`, `Error` declares identical constructors
    to `Throwable`, inherits `Throwable`’s methods, and doesn’t declare any of its
    own methods.


    You can identify `Error` subclasses from the convention that their class names
    end with `Error`. Examples include `OutOfMemoryError`, `LinkageError`, and `StackOverflowError`.


    You shouldn’t try to create your own `Error` subclasses and throw/handle `Error`
    subclass objects. For these reasons, I have nothing more to say about `Error`
    in this chapter.


    ## Throwing Exceptions


    A C library function notifies calling code of an exception by setting the global
    `errno` variable to an error code and returning a failure code. In contrast, a
    Java method throws an object. This section examines this throwing mechanism.


    ### The Throw Statement


    Java provides the `throw` statement to throw an object that describes an exception.
    Although you can use this statement to throw an error, that isn’t normally done
    because a program cannot recover from running out of memory or another catastrophic
    event.


    The `throw` statement has the following syntax:


    ```

    throw throwable;

    ```


    The object identified by `throwable` is an instance of `Throwable` or any of its
    subclasses. However, you usually only throw objects instantiated from subclasses
    of `Exception` or `RuntimeException`. Here are a couple of examples:


    ```

    throw new ZipException("unable to read the next ZIP file entry" + filename);

    throw new ArrayIndexOutOfBoundsException("array index out of bounds");

    ```


    The throwable is thrown from the current method to the JVM, which checks this
    method for a suitable handler. If not found, the JVM unwinds a data structure
    known as the *method-call stack*, looking for the closest calling method that
    can handle the exception described by the throwable. If it finds this method,
    it passes the throwable to the method’s handler, whose code is executed to handle
    the exception. If no method is found to handle the exception, the JVM terminates
    with a suitable message.


    You normally wouldn’t throw an object from `RuntimeException` (which is too general
    to mean anything) or a subclass such as `ArrayIndexOutOfBoundsException`, which
    is thrown when you specify a negative array index or an index that is greater
    than or equal to an array’s length. Instead, you would fix the code that gives
    rise to the exception. However, you might want to throw `IllegalArgumentException`
    when detecting an invalid argument in a library context:


    ```

    static double sqrt(double n)

    {

    if (n < 0)

    throw new IllegalArgumentException(n + " is negative");

    // ...

    }

    ```


    Assume that you are building a library based on a single `Math` class with a `sqrt()`
    method. Because you cannot calculate the square root of a negative number, you
    first check for this possibility and create/throw an `IllegalArgumentException`
    object describing this problem when a negative number is passed.


    ### The Throws Clause


    You need to inform the compiler when you throw a checked exception out of a method.
    Do this by appending a `throws` clause to the method’s header. This clause has
    the following syntax:


    ```

    ''throws'' checkedExceptionClassName ('','' checkedExceptionClassName)*

    ```


    A `throws` clause consists of keyword `throws` followed by a comma-separated list
    of the class names of checked exceptions thrown out of the method. Here is an
    example:


    ```

    public static void main(String[] args) throws IOException

    {

    FileInputStream fis = new FileInputStream("x.dat");

    }

    ```


    This example attempts to open a file named `x.dat` and return an input stream
    that lets us read bytes from the file. (I don’t discuss files and streams beyond
    what I discuss in this chapter.) However, if the file doesn’t exist or something
    else I/O related goes wrong, the `FileInputStream()` constructor will throw `IOException`
    or one of its subclasses (such as `java.io.FileNotFoundException`).


    It’s necessary to inform the compiler that an object from the checked `IOException`
    class (or subclass, which is also checked) is being thrown by attaching a `throws
    IOException` clause to the invoking `main()` method’s header. After all, the exception
    isn’t handled in this method. When the exception is thrown to the JVM, it will
    note this and (because there is no parent method of `main()`) terminate with a
    message.


    There are a few rules that you need to keep in mind when working with `throws`
    clauses:


    *   If at all possible, don’t include the names of unchecked exception classes
    (such as `ArithmeticException`) in a `throws` clause. These names don’t need to
    be included because `throws` clauses are for checked exceptions only. Including
    unchecked class names only clutters the source code.


    *   You can append a `throws` clause to a constructor and throw a checked exception
    from the constructor when something goes wrong while the constructor is executing.
    The resulting object will not be created.


    *   If a superclass method declares a `throws` clause, the overriding subclass
    method doesn’t have to declare a `throws` clause. However, if the subclass method
    declares a `throws` clause, the clause must not include the names of checked exception
    classes that are not also included in the superclass method’s `throws` clause,
    unless they are the names of exception subclasses. For example, given superclass
    method `void open(String name) throws IOException {}`, the overriding subclass
    method could be declared `as void open(String name) {}`, `void open(String name)
    throws IOException {}`, or `void open(String name) throws FileNotFoundException
    {}`. However, you couldn’t specify, in the subclass, `void open(String name) throws
    ClassNotFoundException`, because `ClassNotFoundException` doesn’t appear in the
    superclass’s `throws` clause.


    *   A checked exception class name doesn’t need to appear in a `throws` clause
    when the name of its superclass appears. For example, you don’t need to specify
    `throws FileNotFoundException, IOException`. Only `throws IOException` is necessary.


    *   The compiler reports an error when a method throws a checked exception and
    doesn’t also handle the exception or list the exception in its `throws` clause.


    *   You can declare a checked exception class name in a method’s `throws` clause
    without throwing an instance of this class from the method. (Perhaps the method
    has yet to be fully coded.) However, Java requires that you provide code to handle
    this exception, even though it isn’t thrown.


    There is one more rule to consider. Sometimes, a method throws many checked exceptions,
    and it’s tempting to specify a `throws Exception` clause to save keystrokes. Although
    specifying only `Exception` saves time, it makes the source code less readable.
    Someone who is reading your code might have difficulty identifying all of the
    checked exceptions that are being passed on to the caller. I suggest following
    this practice for private throwaway code only.


    ## The Try Statement


    The `try` statement surrounds a block of code that can throw exceptions and errors.
    This statement’s `try` block must be followed by a combination of `catch` blocks
    that handle these exceptions and/or a `finally` block for performing cleanup tasks.'
  trans: '

    #### 错误类


    `Throwable` 的另一个直接子类是 `Error`，它描述了一个严重的（甚至是异常的）问题（例如内存耗尽、JVM 栈溢出，或尝试加载一个找不到的类），一个合理的应用程序不应尝试处理这类问题。与
    `Exception` 类似，`Error` 声明了与 `Throwable` 相同的构造方法，继承了 `Throwable` 的方法，并且没有声明任何自己的方法。


    你可以根据类名以 `Error` 结尾的惯例来识别 `Error` 的子类。例如包括 `OutOfMemoryError`、`LinkageError` 和
    `StackOverflowError`。


    你不应该尝试创建自己的 `Error` 子类，也不应该抛出或处理 `Error` 子类的对象。基于这些原因，本章关于 `Error` 的内容就到此为止。


    ## 抛出异常


    C 语言库函数通过将全局 `errno` 变量设置为错误码并返回一个失败码来通知调用代码发生了异常。相比之下，Java 方法则是抛出一个对象。本节将探讨这种抛出机制。


    ### Throw 语句


    Java 提供了 `throw` 语句来抛出一个描述异常的对象。虽然你可以使用此语句抛出一个错误，但通常不会这样做，因为程序无法从内存耗尽或其他灾难性事件中恢复。


    `throw` 语句的语法如下：


    ```

    throw throwable;

    ```


    `throwable` 标识的对象是 `Throwable` 或其任何子类的实例。然而，你通常只抛出从 `Exception` 或 `RuntimeException`
    子类实例化的对象。以下是几个例子：


    ```

    throw new ZipException("无法读取下一个 ZIP 文件条目" + filename);

    throw new ArrayIndexOutOfBoundsException("数组索引越界");

    ```


    该 throwable 对象从当前方法抛出给 JVM，JVM 会检查此方法是否有合适的处理器。如果未找到，JVM 会展开一个称为*方法调用栈*的数据结构，寻找能够处理该
    throwable 所描述异常的最接近的调用方法。如果找到该方法，JVM 会将 throwable 传递给该方法的处理器，并执行其代码来处理异常。如果没有找到任何方法能处理该异常，JVM
    会终止并输出一条合适的消息。


    你通常不会抛出 `RuntimeException`（它过于通用，没有实际意义）或其子类（如 `ArrayIndexOutOfBoundsException`，当你指定一个负数数组索引或一个大于等于数组长度的索引时会抛出该异常）的对象。相反，你应该修复导致异常的代码。然而，在库的上下文中检测到无效参数时，你可能想要抛出
    `IllegalArgumentException`：


    ```

    static double sqrt(double n)

    {

    if (n < 0)

    throw new IllegalArgumentException(n + " 是负数");

    // ...

    }

    ```


    假设你正在基于一个包含 `sqrt()` 方法的 `Math` 类构建一个库。因为你无法计算负数的平方根，所以首先检查这种可能性，并在传入负数时创建并抛出一个描述此问题的
    `IllegalArgumentException` 对象。


    ### Throws 子句


    当你从一个方法中抛出一个受检异常时，需要通知编译器。这可以通过在方法头部附加一个 `throws` 子句来实现。该子句的语法如下：


    ```

    ''throws'' 受检异常类名 ('','' 受检异常类名)*

    ```


    `throws` 子句由关键字 `throws` 后跟一个逗号分隔的列表组成，该列表包含从该方法抛出的受检异常的类名。示例如下：


    ```

    public static void main(String[] args) throws IOException

    {

    FileInputStream fis = new FileInputStream("x.dat");

    }

    ```


    此示例尝试打开一个名为 `x.dat` 的文件，并返回一个允许我们从该文件读取字节的输入流。（本章不讨论超出本章范围的文件和流。）但是，如果文件不存在或发生其他
    I/O 相关错误，`FileInputStream()` 构造方法将抛出 `IOException` 或其子类之一（例如 `java.io.FileNotFoundException`）。


    通过在调用 `main()` 方法的头部附加一个 `throws IOException` 子句，有必要告知编译器正在抛出一个来自受检的 `IOException`
    类（或其子类，它们也是受检的）的对象。毕竟，该异常并未在此方法中处理。当异常被抛出给 JVM 时，JVM 会注意到这一点，并且（因为没有 `main()`
    的父方法）会输出一条消息后终止。


    在使用 `throws` 子句时，需要记住一些规则：


    *   如果可能，不要在 `throws` 子句中包含非受检异常类（例如 `ArithmeticException`）的名称。这些名称不需要包含，因为 `throws`
    子句仅用于受检异常。包含非受检类名只会使源代码变得混乱。


    *   你可以将 `throws` 子句附加到构造方法上，并在构造方法执行过程中出现问题时从中抛出一个受检异常。这样，结果对象将不会被创建。


    *   如果超类方法声明了 `throws` 子句，重写的子类方法不必声明 `throws` 子句。但是，如果子类方法声明了 `throws` 子句，则该子句不得包含超类方法的
    `throws` 子句中未包含的受检异常类名，除非它们是异常子类的名称。例如，给定超类方法 `void open(String name) throws IOException
    {}`，重写的子类方法可以声明为 `void open(String name) {}`、`void open(String name) throws IOException
    {}` 或 `void open(String name) throws FileNotFoundException {}`。但是，你不能在子类中指定 `void
    open(String name) throws ClassNotFoundException`，因为 `ClassNotFoundException` 没有出现在超类的
    `throws` 子句中。


    *   当受检异常的超类名称出现在 `throws` 子句中时，该受检异常类名无需再出现。例如，你不需要指定 `throws FileNotFoundException,
    IOException`。只需要 `throws IOException` 即可。


    *   当一个方法抛出一个受检异常，但既没有处理该异常，也没有在其 `throws` 子句中列出该异常时，编译器会报告错误。


    *   你可以在方法的 `throws` 子句中声明一个受检异常类名，而不从该方法中抛出该类的实例。（也许该方法尚未完全编码。）然而，Java 要求你提供代码来处理此异常，即使它没有被抛出。


    还有一条规则需要考虑。有时，一个方法会抛出许多受检异常，人们很容易为了节省敲击键盘的次数而指定一个 `throws Exception` 子句。虽然只指定
    `Exception` 可以节省时间，但这会使源代码的可读性降低。阅读你代码的人可能难以识别所有传递给调用者的受检异常。我建议仅在私有的临时代码中遵循这种做法。


    ## Try 语句


    `try` 语句包围了一段可能抛出异常和错误的代码块。该语句的 `try` 块后面必须跟一个或多个用于处理这些异常的 `catch` 块，和/或一个用于执行清理任务的
    `finally` 块。

    '
- fmt: '### The Try Block


    A `try` block has the following syntax:


    ```

    ''try''

    {

    // one or more statements that might throw exceptions

    }

    ```


    The statements in a `try` block serve a common purpose and might directly or indirectly
    throw an exception. Consider the following example:


    ```

    FileInputStream fis = null;

    FileOutputStream fos = null;

    try

    {

    fis = new FileInputStream(args[0]);

    fos = new FileOutputStream(args[1]);

    int c;

    while ((c = fis.read()) != -1)

    fos.write(c);

    }

    ```


    This example excerpts a larger `Copy` application (presented in its entirety later
    in this chapter) that copies a source file to a destination file. It uses the
    `java.io` package’s `FileInputStream` and `FileOutputStream` classes (which I
    have yet to formally introduce) for this purpose. Think of `FileInputStream` as
    a way to read an input stream of bytes from a file and `FileOutputStream` as a
    way to write an output stream of bytes to a file.


    The `FileInputStream(String filename)` constructor creates an input stream to
    the file identified by `file name`. This constructor throws `FileNotFoundException`
    when the file doesn’t exist, refers to a directory, or another related problem
    occurs. The `FileOutputStream(String filename)` constructor creates an output
    stream to the file identified by `file name`. It throws `FileNotFoundException`
    when the file exists but refers to a directory, doesn’t exist and cannot be created,
    or another related problem occurs.


    `FileInputStream` declares an `int read()` method to read one byte and return
    it as a 32-bit integer. This method returns -1 on end-of-file. `FileOutputStream`
    provides a `void write(int b)` method to write the byte in the lower 8 bits of
    `b`. Either method throws `IOException` when something goes wrong.


    The bulk of the example is a `while` loop that repeatedly reads the next byte
    from the input stream and writes that byte to the output stream, until `read()`
    signals end-of-file.


    ### Catch Blocks


    A `try` block is often followed by one or more `catch` blocks that are designed
    to handle different kinds of exceptions. A `catch` block has the following syntax:


    ```

    ''catch'' ''('' throwableType throwableObject '')''

    ''{''

    // one or more statements that handle an exception

    ''}''

    ```


    The `catch` block is similar to a constructor in that it has a parameter list
    and no return type. However, this list consists of only one parameter, which is
    a *throwableType* (`Throwable` or one of its subclasses) followed by a *throwableObject*
    identifier for an object of that type.


    When an exception occurs, a throwable is created and thrown to the JVM, which
    searches for the closest `catch` block whose parameter type directly matches or
    is the supertype of the throwable. When it finds this block, the JVM passes the
    throwable to the parameter and executes the `catch` block’s statements, which
    can interrogate the passed throwable and otherwise handle the exception. Consider
    the following example:


    ```

    catch (FileNotFoundException fnfe)

    {

    System.out.println(fnfe.getMessage());

    }

    ```


    This example (which extends the previous `try` block example) describes a `catch`
    block that catches and handles throwables of type `FileNotFoundException`. Only
    throwables matching this type or a subtype are caught by this block.


    Suppose the `FileInputStream(String filename)` constructor throws `FileNotFoundException`.
    The JVM checks the `catch` block following `try` to see if its parameter type
    matches the throwable type. Detecting a match, the JVM passes the throwable’s
    reference to `fnfe` and transfers execution to the block. The block responds by
    invoking `getMessage()` to retrieve the exception’s message, which it then outputs.


    A `catch` block might be unable to fully handle an exception – perhaps it needs
    to access information provided by some ancestor method in the method-call stack.
    If it can partly handle the exception, the `catch` block should conclude by rethrowing
    the exception so that an ancestor handler can finish handling it. Another possibility
    is to log the exception (for later analysis) and then rethrow it, which is demonstrated
    here:


    ```

    catch (FileNotFoundException fnfe)

    {

    logger.log(fnfe);

    throw fnfe;

    }

    ```


    #### Multiple Catch Blocks


    You can specify multiple `catch` blocks after a `try` block. For example, consider
    this larger excerpt from the aforementioned `Copy` application:


    ```

    FileInputStream fis = null;

    FileOutputStream fos = null;

    try

    {

    fis = new FileInputStream(args[0]);

    fos = new FileOutputStream(args[1]);

    int c;

    while ((c = fis.read()) != -1)

    fos.write(c);

    }

    catch (FileNotFoundException fnfe)

    {

    System.out.println(fnfe.getMessage());

    }

    catch (IOException ioe)

    {

    System.out.println("I/O error: " + ioe.getMessage());

    }

    ```


    The first `catch` block handles `FileNotFoundException`s thrown from either constructor.
    The second `catch` block handles `IOException`s thrown from the `read()` and `write()`
    methods.


    When specifying multiple `catch` blocks, don’t specify a `catch` block with a
    supertype before a `catch` block with a subtype. For example, don’t place `catch
    (IOException ioe)` before `catch (FileNotFoundException fnfe)`. If you do, the
    compiler will report an error because `catch (IOException ioe)` would also handle
    `FileNotFoundException`s, and `catch (FileNotFoundException fnfe)` would never
    have a chance to execute.


    Caution


    Don’t specify multiple `catch` blocks with the same throwable type. For example,
    don’t specify two `catch (IOException ioe) {}` blocks. Otherwise, the compiler
    reports an error.


    JDK 7 made it possible to catch multiple exceptions in a single `catch` block.
    You specify a vertical bar-separated list of exception types and then specify
    the parameter name, which is `final` (you cannot assign any values to the parameter
    in the `catch` block). Consider the following example, where `ex` might contain
    a `FileNotFoundException` reference or an `IOException` reference:


    ```

    catch (FileNotFoundException | IOException ex)

    ```


    ### The Finally Block


    Whether or not an exception is handled, you may need to perform cleanup tasks,
    such as closing an open file. Java provides the `finally` block for this purpose.


    The `finally` block consists of keyword `finally` followed by a brace-delimited
    sequence of statements to execute. This syntax is expressed as follows:


    ```

    ''finally''

    ''{''

    // one or more statements that perform cleanup tasks

    ''}''

    ```


    The `finally` block may appear after the final `catch` block or after the `try`
    block.'
