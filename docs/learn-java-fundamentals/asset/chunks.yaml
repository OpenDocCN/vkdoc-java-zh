  trans: '

    ### 实现接口


    一个类通过在类头附加 Java 的 `implements` 关键字，后跟逗号分隔的接口名称列表，并在类中编码每个接口方法来实现接口。清单 8-4 展示了一个
    `ArrayCollection` 类，它实现了清单 8-3 中的 `Collection` 接口。


    ```

    class ArrayCollection implements Collection

    {

    private String[] items;

    private int length;

    ArrayCollection(int size)

    {

    items = new String[size];

    length = 0;

    }

    @Override

    public void add(String item)

    {

    if (length == items.length)

    resize(items.length * 2);

    items[length++] = item;

    }

    @Override

    public boolean contains(String item)

    {

    for (int i = 0; i < length; i++)

    if (item.equals(items[i]))

    return true;

    return false;

    }

    @Override

    public int length()

    {

    return length;

    }

    void resize(int newSize)

    {

    String[] items2 = new String[newSize];

    for (int i = 0; i < length; i++) // 将 items 复制到 items2

    items2[i] = items[i];

    items = items2;

    }

    }

    清单 8-4

    ArrayCollection.java

    ```


    清单 8-4 展示了 `ArrayCollection`，它在一个私有的 `items` 数组中存储基于数组的字符串集合。构造函数创建此数组，其大小等于其
    `size` 参数中的值。为简洁起见，我没有进行任何错误检查。我经常在各种清单中避免检查错误，但错误检查仍然很重要。


    创建数组后，构造函数将 `length` 字段初始化为 `0`。此变量记录存储项的数量。虽然这种初始化并非必要，因为对象字段在构造对象时会被清零，但它可以告知开发人员（他们可能不知道这一事实）`length`
    从 0 开始。


    `add()` 方法将一个字符串追加到集合中。它首先通过比较 `length` 和 `items.length`（数组大小）来确保集合未满。如果它们相等，则没有更多空间来添加
    `item`，并且会调用 `resize()` 将数组大小加倍。然后存储 `item`，由于数组变大，`length` 递增，并返回 true。


    `contains()` 方法确定其字符串参数是否包含在集合中，该集合通过数组实现。该方法遍历数组，将每个存储的字符串与其字符串参数进行比较。如果相等，则返回
    true；否则返回 false。


    比较是通过 `Object` 的 `equals()` 方法进行的。此方法将对象引用参数与调用 `equals()` 的对象引用进行比较。如果匹配，`equals()`
    返回 true；否则，`equals()` 返回 false。


    `length()` 方法返回存储在基于数组的集合中的项数。


    我已将所有三个方法声明为 `public`，因为 `interface` 的方法隐式是 public 的。


    警告


    当您实现接口方法时（通过覆盖接口的方法头），请记住，在接口中声明了头的所有方法都隐式声明为 `public`。如果您忘记在实现的方法声明中包含 `public`，编译器将报告错误，告知您正在尝试为已实现的方法分配更弱的访问权限。


    `resize()` 方法创建一个名为 `items2` 的新字符串数组，其大小设置为传递给其 `newSize` 参数的值。然后它将 `length` 个字符串从
    `items` 复制到 `items2`。复制从索引 0 开始。填充 `items2` 后，其引用被赋值给 `items`，因为 `items2` 只是一个临时占位符。


    清单 8-5 展示了一个 `LinkedCollection` 类，它实现了清单 8-3 中的 `Collection` 接口。


    ```

    class LinkedCollection implements Collection

    {

    private Node top, last;

    private int length;

    LinkedCollection()

    {

    top = null;

    last = null;

    length = 0;

    }

    @Override

    public void add(String item)

    {

    Node node = new Node();

    node.item = item;

    node.next = null;

    if (last != null)

    last.next = node;

    last = node;

    if (top == null)

    top = node;

    length++;

    }

    @Override

    public boolean contains(String item)

    {

    Node node = top;

    for (int i = 0; i < length; i++)

    if (item.equals(node.item))

    return true;

    else

    node = node.next;

    return false;

    }

    @Override

    public int length()

    {

    return length;

    }

    }

    class Node

    {

    String item;

    Node next;

    }

    清单 8-5

    LinkedCollection.java

    ```


    清单 8-5 展示了 `LinkedCollection`，它将字符串集合存储在一系列链接在一起的 `Node` 对象中。它展示了一个单独的 `Node`
    类，该类由一个 `item` 字段（用于记录正在存储的字符串）和一个 `next` 字段（用于记录对列表中下一个 `Node` 对象的引用）组成。


    私有的 `top` 和 `last` 字段分别标识链接集合中的第一个和最后一个节点。（通常使用名为 `top` 的变量来标识链表的起始位置。）`LinkedCollection()`
    构造函数将这些字段初始化为 null，表示一个空集合。


    私有的 `length` 字段标识存储的节点数。此字段的存在是为了性能。如果它不存在，您将不得不扫描列表以获取长度。`LinkedCollection()`
    构造函数将此字段初始化为 0，尽管它不必这样做，因为 `length` 默认为 0。


    `add()` 方法首先创建一个 `Node` 对象，并用其 `item` 参数中存储的 `String` 引用填充其 `item` 字段。然后它将 `Node`
    对象的 `next` 字段设置为 null，以表示集合的结束。


    如果 `last` 不为 null，则集合中已存在最后一个节点。因此，`add()` 通过首先将 `last` 的 `next` 字段设置为指向 `node`（我们希望最后一个节点引用正在添加到集合中的新节点），将此新节点追加到集合中。然后它将
    `last` 设置为指向 `node`，因为新节点将成为集合中的最后一个节点。


    `add()` 方法现在关注 `top`。如果 `top` 为 null，则链表为空，它将 `top` 指向正在添加的节点。结果是一个单节点链表。


    最后，`add()` 递增 `length` 以表示列表增加了一个节点。


    `contains()` 方法确定其字符串参数是否包含在集合中，该集合通过链表实现。此方法与 `ArrayList` 的 `contains()` 方法非常相似，只是遍历的是链表而不是数组。


