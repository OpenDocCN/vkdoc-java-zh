    ## Local Classes


    It is often helpful to declare a class in a block such as a method body, or a
    *sub-block* (a block within a block). Such a class is known as a *local class*
    because (as with local variables) it is local to the block/sub-block in which
    it is declared.


    > **Note:** Local classes help improve code clarity. They do so because they are
    moved closer to where they are needed.


    For example, you might declare a class that describes an *iterator* (an object
    that is used to traverse a container’s objects) in a method that returns an instance
    of this class. Such classes are known as *local classes* because (as with local
    variables) they are local to the methods in which they are declared. Here is an
    example:


    ```java

    interface I

    {

    // members

    }

    class C

    {

    I m() // or even static I m()

    {

    class D implements I

    {

    // members

    }

    return new D();

    }

    }

    ```


    Top-level class `C` declares non-static method `m()`, which returns an instance
    of local class `D`, which is declared in this method. Notice that `m()`’s return
    type is interface `I`, which `D` implements. The interface is necessary because
    giving `m()` return type `D` would result in a compiler error – `D` isn’t accessible
    outside of `m()`’s body.


    > **Caution:** The compiler will report an error when a local class declaration
    contains any of the access modifier keywords `private`, `public`, or `protected`,
    or the modifier keyword `static`.


    A local class can be associated with an instance of its enclosing class, but only
    when used in a non-static context. Although a local class can be declared in a
    static context (such as a static method), it cannot declare any static members,
    which makes a local class similar to an inner class, which also cannot declare
    static members.


    > **Note:** You cannot declare an interface in a local block because interfaces
    are considered static and a local class cannot declare static members.


    A local class can be declared anywhere that a local variable can be declared and
    has the same scope (essentially a block) as a local variable. It can access the
    surrounding scope’s local variables and parameters (which are a kind of local
    variable).


    Before JDK 8, these variables would have to be declared `final`. However, this
    is no longer necessary because JDK 8 introduced the concept of *effectively final*
    (the compiler considers a variable that never changes `final` regardless of this
    keyword’s presence or absence).


    > **Note:** Variables that are declared in a local class can *shadow* (mask or
    hide) same-named variables in the enclosing block.


    When a local class accesses an enclosing block’s local variable or parameter,
    it *captures* that local/parameter. Capturing a local variable or parameter implies
    making a copy of the local/parameter because an object created from the local
    class may outlive the current context in which the local/parameter is declared.
    Furthermore, the local/parameter must be declared `final` or (starting with JDK
    8) be effectively final to prevent confusion about whether or not changes made
    to the local/parameter will be seen (because these changes won’t be seen).


    Consider Listing [9-11](#615966_1_En_9_Chapter.xhtml#PC32), which uses the `final`
    keyword. (This book’s code archive contains a second version of `EnclosingClass`
    that doesn’t use `final`. Pre-JDK 8 compilers will report an error when compiling
    that version of `EnclosingClass`.)


    ```java

    class EnclosingClass

    {

    void m(final int i)

    {

    final int j = i * 10;

    class LClass

    {

    int m = i;

    int n = j;

    }

    LClass lc = new LClass();

    System.out.println(lc.m);

    System.out.println(lc.n);

    }

    }

    ```


    Listing [9-11](#615966_1_En_9_Chapter.xhtml#PC32) declares `EnclosingClass` with
    non-static method `m()` declaring a local class named `LClass`.'
  raw: '### A More Practical Inner Class Example


    `NSCDemo` gives you an opportunity to learn how to use inner classes. Because
    it would be nice to learn how to use an inner class more practically, let’s create
    a framework that lets you maintain a to-do list of items.


    Each to-do item consists of a name and a description. Listing [9-8](#615966_1_En_9_Chapter.xhtml#PC25)
    presents a `ToDo` class that describes a to-do item in these terms.


    ```

    class ToDo

    {

    private String name;

    private String desc;

    ToDo(String name, String desc)

    {

    this.name = name;

    this.desc = desc;

    }

    String getName()

    {

    return name;

    }

    String getDesc()

    {

    return desc;

    }

    @Override

    public String toString()

    {

    return "Name = " + getName() + ", Desc = " + getDesc();

    }

    }

    Listing 9-8

    ToDo.java

    ```


    We’ll next create a `ToDoList` class to store `ToDo` instances. `ToDoList` uses
    its `ToDoArray` non-static member class to store `ToDo` instances in a growable
    array. (It is growable because you don’t know how many instances will be stored,
    and Java arrays have fixed lengths). See Listing [9-9](#615966_1_En_9_Chapter.xhtml#PC26).


    ```

    class ToDoList

    {

    private ToDoArray toDoArray;

    private int index = 0;

    ToDoList()

    {

    toDoArray = new ToDoArray(2);

    }

    boolean hasMoreElements()

    {

    return index = toDoArray.length)

    {

    ToDo[] temp = new ToDo[toDoArray.length * 2];

    for (int i = 0; i < toDoArray.length; i++)

    temp[i] = toDoArray[i];

    toDoArray = temp;

    }

    toDoArray[index++] = item;

    }

    ToDo get(int i)

    {

    return toDoArray[i];

    }

    int size()

    {

    return index;

    }

    }

    }

    Listing 9-9

    ToDoList.java

    ```


    As well as providing an `add()` method to store `ToDo` instances in the `ToDoArray`
    instance, `ToDoList` provides `hasMoreElements()` and `nextElement()` methods
    to iterate over and return the stored instances. Listing [9-10](#615966_1_En_9_Chapter.xhtml#PC27)
    demonstrates these methods.


    ```

    class UseToDoList

    {

    public static void main(String[] args)

    {

    ToDoList toDoList = new ToDoList();

    toDoList.add(new ToDo("#1", "Do laundry."));

    toDoList.add(new ToDo("#2", "Buy groceries."));

    toDoList.add(new ToDo("#3", "Vacuum apartment."));

    toDoList.add(new ToDo("#4", "Write report."));

    toDoList.add(new ToDo("#5", "Wash car."));

    while (toDoList.hasMoreElements())

    System.out.println(toDoList.nextElement());

    }

    }

    Listing 9-10

    ToDoList.java

    ```


    Assuming that the files described by Listings [9-8](#615966_1_En_9_Chapter.xhtml#PC25)
    through [9-10](#615966_1_En_9_Chapter.xhtml#PC27) are stored in the current directory,
    compile these files as follows:


    ```

    javac UseToDoList.java

    ```


    Run the resulting `UseToDoList.class` application class file as follows:


    ```

    java UseToDoList

