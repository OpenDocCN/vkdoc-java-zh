    ## Bubble Sort


    Unlike Linear Search, Binary Search requires the 1D array to be sorted. A simple
    but not very efficient algorithm for this task is Bubble Sort.


    *Bubble Sort* sorts a 1D array of *n* elements into ascending or descending order.
    An outer loop makes *n* - 1 passes over the array. Each pass invokes an inner
    loop to exchange elements such that the next smallest (ascending sort) or largest
    (descending sort) element “bubbles” toward the beginning of the array.


    Each inner loop iteration compares the pass-numbered element with each successive
    element. If a successor element is smaller (ascending sort) or larger (descending
    sort) than the pass-numbered element, the successor element is exchanged with
    the pass-numbered element.


    I’ve created a `BSort` application to demonstrate Bubble Sort. Listing [5-3](#615966_1_En_5_Chapter.xhtml#PC24)
    presents this application’s source code.


