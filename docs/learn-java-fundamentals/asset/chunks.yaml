  trans: '

    ### Continue 语句


    *continue* *语句*允许你跳过循环的当前迭代。当在迭代中较早满足某个条件，并且你不想继续执行本次迭代的剩余部分时，这很有必要。


    `continue` 语句的语法如下：


    ```

    ''continue'' '';''

    ```


    以下示例展示了如何取消迭代的剩余部分：


    ```

    int count = 0;

    String s = "To be or not to be, that is the question.";

    for (int i = 0; i < s.length(); i++)

    {

    if (s.charAt(i) != ''e'')

    continue;

    count++;

    }

    System.out.println("Number of ''e'' characters = " + count);

    ```


    此示例计算字符串中字母 ‘`e`’ 的数量。在初始化一个 `count` 变量来记录 ‘`e`’ 的数量，以及一个 `s` 变量来引用示例字符串后，程序进入一个
    `for` 循环，该循环遍历字符串的长度。表达式 `s.length()` 在变量 `s` 上调用 `String` 的 `length()` 方法，该变量持有对正在处理的字符串的引用，以返回此字符串的长度。（我将在第
    13 章中探讨 `String` 及其 `length()` 方法。）


    对于每次循环迭代，都会执行一个 `if`-`else` 语句。该语句调用 `String` 的 `charAt()` 方法，以返回字符串中的下一个字符。（我将在第
    13 章中探讨 `charAt()`。）如果此字符不等于 `e`，则执行 `continue` 语句以跳过本次循环迭代的剩余部分，从而不执行 `count++`。然而，如果此字符等于
    `e`，则不执行 `continue`，而是执行 `count++` 以增加已见 ‘`e`’ 的计数。一旦整个字符串被检查完毕，循环结束，并输出 ‘`e`’
    的计数。


    #### 带标签的 Continue


    `continue` 语句可以指定一个标签，这允许你跳过嵌套循环当前迭代的剩余部分。这种 `continue` 语句的变体允许你将执行转移到由该标签前缀的循环语句的布尔表达式，其语法如下：


    ```

    ''continue'' label '';''

    ```


    以下示例演示了带标签的 `continue`：


    ```

    outer:

    for (int a = 0; a < 5; a++)

    {

    for (int b = 0; b < 5; b++)

    {

    System.out.println("a = " + a + ", b = " + b);

    if (b == 3)

    continue outer;

    }

    System.out.println();

    }

    System.out.println("Both loops have finished");

    ```


    此示例与我之前讨论带标签的 `break` 时的示例类似。然而，输出略有不同：


    ```

    a = 0, b = 0

    a = 0, b = 1

    a = 0, b = 2

    a = 0, b = 3

    a = 1, b = 0

    a = 1, b = 1

    a = 1, b = 2

    a = 1, b = 3

    a = 2, b = 0

    a = 2, b = 1

    a = 2, b = 2

    a = 2, b = 3

    a = 3, b = 0

    a = 3, b = 1

    a = 3, b = 2

    a = 3, b = 3

    a = 4, b = 0

    a = 4, b = 1

    a = 4, b = 2

    a = 4, b = 3

    Both loops have finished

    ```


    之前，输出在 `a = 0, b = 3` 处停止。现在，它对于 `a` 从 `0` 到 `4` 的每个值都继续执行。但是，你仍然不会在输出中看到 `b =
    4`，因为当 `b` 等于 `3` 时，内部循环被跳过了。


    ## 其他语句


    Java 支持其他值得一提的语句：`assert` 语句、空语句、`import` 语句、方法调用语句、`package` 语句、`return` 语句、`try`
    语句和 `try`-`with`-`resources` 语句。


    ### Assert 语句


    *assert* *语句*允许你通过一个布尔表达式来表达对程序正确性的假设。本书不讨论此语句。


    ### 空语句


    *空语句*是一个单独的分号（`;`）字符。有时，让 `for` 语句重复执行此语句会很方便，因为实际工作是在 `for` 的头部中执行的。考虑以下示例：


    ```

    for (String line; (line = readLine()) != null; System.out.println(line));

    ```


    此示例使用一个 `for` 循环来读取并打印所有行（可能来自文件），直到没有更多行可读。我们正在将行从源复制到目标。


    通过调用 `readLine()` 方法（你需要在其他地方指定该方法）来读取一行。通过 `System.out.println()` 方法调用来打印该行。注意行尾的分号。这个分号就是空语句。


    警告


    空语句可能会在你的代码中引入微妙的错误。例如，以下循环本应在 15 行上输出 `Java is great!`。但实际上，只会出现一条此消息，因为空语句被执行了
    15 次。


    `for (int i = 0; i < 15; i++);`


    `System.out.println("Java is great!");`


    ### Import 语句


    *import* *语句*从包中导入一个类型。我将在第 10 章中全面讨论 `import`。


    ### 方法调用语句


    *方法调用语句*调用一个方法，该方法可能会也可能不会返回结果。如果方法的返回类型是 `void`，则该方法不返回值。例如，`System.out.println()`
    方法调用上下文中的各种 `println()` 方法具有 `void` 返回类型——这个保留字表明每个 `println()` 方法不返回值。我将在第 6
    章中全面讨论方法调用语句。


    ### Package 语句


    *package* *语句*将一个或多个引用类型放入一个包中。我将在第 10 章中全面讨论 `package`。


    ### Return 语句


    *return* *语句*将执行从方法返回到调用该方法的代码。它可以选择返回一个值，该值的类型必须与方法的返回类型匹配。我将在第 6 章中全面讨论 `return`。


    ### Try 语句


    *try* *语句*提供了一种方法，用于检测从代码块中抛出的*异常*（偏离正常执行流程），然后将其传递给另一个代码块以处理该异常。我将在第 11 章中全面讨论
    `try`。


    ### Try-with-resources 语句


    *try-with-resources* *语句*是一个 `try` 语句，它声明一个或多个*资源*（在不需要时必须关闭的对象）。它会关闭每个资源。我将在第
    11 章中全面讨论 `try`-`with`-`resources`。

