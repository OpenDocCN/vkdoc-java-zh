- fmt: '# Static Classes


    Chapter [6](#615966_1_En_6_Chapter.xhtml) introduced you to static fields, static
    methods, static field initializers, and static initialization blocks. These entities
    differ from their non-static field, non-static method, non-static field initializer,
    and non-static initialization block counterparts in that they involve the `static`
    keyword.


    You can declare these static members in a class. You can also declare classes
    marked with the `static` keyword in classes. Such a nested class is known as a
    *static class*. The following example clarifies this organization:


    ```

    class C

    {

    static int f; // field could be explicitly initialized

    static void m()

    {

    // method code

    }

    static // static initialization block

    {

    // initialization block code

    }

    static class SC

    {

    // members of static class

    }

    }

    ```


    This example introduces top-level class `C` with static field `f`, static method
    `m()`, a static initialization block, and static class `SC`. Notice that `SC`
    is a member of `C` in the same way that `f`, `m()`, and the static initialization
    block are members of this class. They all belong to class `C`, which is an *enclosing
    class* – `SC` is an *enclosed class*.


    A static class, like static methods and static fields, is associated with its
    enclosing class. And like static methods, a static class cannot directly access
    the enclosing class’s non-static fields and invoke its non-static methods. It
    can access them only through an object reference. However, it can access the enclosing
    class’s static fields and invoke its static methods.


    **Note**


    A static class interacts with the non-static members of its enclosing class (and
    other classes) just like any other top-level class. Essentially, a static class
    behaves as a top-level class that has been nested in another top-level class for
    packaging convenience.


    As a member of the top-level class, a static class can be declared `private`,
    `public`, `protected`, or left package private (the default). In contrast, top-level
    classes can only be declared `public` or left package private. (Chapter [10](#615966_1_En_10_Chapter.xhtml)
    introduces you to packages.)


    Listing [9-1](#615966_1_En_9_Chapter.xhtml#PC2) declares an `EnclosingClass` with
    an `EnclosedClass` that demonstrates access to the `EnclosingClass`’s members.


    ```

    class EnclosingClass

    {

    private static String msg1;

    private static void enclosingMethod1()

    {

    System.out.println(msg1);

    }

    private String msg2;

    private void enclosingMethod2()

    {

    System.out.println(msg2);

    }

    static class EnclosedClass

    {

    static void enclosedMethod1()

    {

    msg1 = "called from EnclosedClass''s enclosingMethod1() method";

    enclosingMethod1();

    }

    void enclosedMethod2()

    {

    System.out.println("unable to access msg2 or call enclosingMethod2()");

    // msg2 = "called from EnclosedClass''s enclosingMethod2() method";

    // enclosingMethod2();

    }

    }

    }

    Listing 9-1

    EnclosingClass.java

    ```


    Listing [9-1](#615966_1_En_9_Chapter.xhtml#PC2) declares a top-level class named
    `EnclosingClass` with static field `msg1`, static method `enclosingMethod1()`,
    non-static field `msg2`, non-static method `enclosingMethod2()`, and static class
    `EnclosedClass`. The enclosed class declares static method `enclosedMethod1()`
    and non-static method `enclosedMethod2()`. There are two items to note:


    * `enclosedMethod1()` is able to access `EnclosingClass`’s `msg1` field and call
    its `enclosingMethod1()` method even though both have been declared `private`.


    * `enclosedMethod2()` is unable to access `EnclosingClass`’s `msg2` field and
    call its `enclosingMethod2()` method because a non-static field and a non-static
    method in an enclosing class cannot be accessed from a static context.


    Listing [9-2](#615966_1_En_9_Chapter.xhtml#PC3) presents the source code to an
    `SCDemo` application class that demonstrates how to invoke `EnclosedClass`’s `enclosedMethod1()`
    static method. It also demonstrates how to instantiate `EnclosedClass` and invoke
    its `enclosedMethod2()` non-static method.


    ```

    class SCDemo

    {

    public static void main(String[] args)

    {

    EnclosingClass.EnclosedClass.enclosedMethod1();

    EnclosingClass.EnclosedClass ec = new EnclosingClass.EnclosedClass();

    ec.enclosedMethod2();

    }

    }

    Listing 9-2

    SCDemo.java

    ```


    Listing [9-2](#615966_1_En_9_Chapter.xhtml#PC3)’s `main()` method first shows
    that you must prefix an enclosed class’s name with the name of its enclosing class
    to invoke a static method. It then shows that you must prefix the name of the
    enclosed class with the name of its enclosing class when instantiating the enclosed
    class. You can then invoke the non-static method in the normal manner.


    Compile both listings as follows:


    ```

    javac *.java

    ```


    Run the resulting application as follows:


    ```

    java SCDemo

    ```


    You should observe the following output:


    ```

    called from EnclosedClass''s enclosingMethod1() method

    unable to access msg2 or call enclosingMethod2()

    ```'
