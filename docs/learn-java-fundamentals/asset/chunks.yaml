- fmt: '# Anonymous Classes


    You will encounter situations where it is helpful to declare a class in the context
    of an expression. For example, later in this chapter, I demonstrate an anonymous
    class based on an abstract `Comparer` class in a sorting context. Such a class
    is known as an *anonymous class* because it is not given a name.


    **Note:** Anonymous classes help make your code even more compact than what a
    local class offers. They do so because they are moved even closer to where they
    are needed.


    An anonymous class can be declared in a class-extension expression context as
    follows:


    ```

    Superclass sc = new Superclass()

    {

    // members

    };

    ```


    In this example, an anonymous class extends `Superclass` (declared elsewhere),
    inheriting various methods and other members. Notice that the `new` operator is
    followed by the name of the superclass followed by a pair of brace characters.


    The `new` operator instantiates the anonymous class and returns the resulting
    object’s reference, which is assigned to `sc`.


    Also, an anonymous class can be declared in an interface-implementation expression
    context as follows:


    ```

    Interface i = new Interface()

    {

    // members

    };

    ```


    In this example, an anonymous class implements `Interface` (declared elsewhere),
    inheriting various method bodies. Notice that the `new` operator is followed by
    the name of the interface followed by a pair of brace characters.


    The `new` operator instantiates the anonymous class and returns the resulting
    object’s reference, which is assigned to `i`.


    The anonymous class expression consists of four components:


    *   The `new` operator.

    *   The name of the class to extend or the interface to implement.

    *   Parentheses that surround optional constructor arguments. When implementing
    an interface, these parentheses are empty because interfaces don’t have constructors.

    *   Brace characters that delimit the anonymous class body.


    An anonymous class declaration must be part of a statement because it is an expression.
    In the first example, the anonymous class expression is part of the statement
    that instantiates `SuperClass`. Similarly, in the second example, the anonymous
    class expression is part of the statement that instantiates `Interface`.


    ## Instance Initialization Blocks as Constructors


    An anonymous class cannot have a constructor because a constructor must be named
    after the class and anonymous classes are unnamed. Instead, you can use an instance
    initialization block as a constructor. The following example demonstrates an instance
    initialization block in a class-extension context:


    ```

    Superclass sc = new Superclass(10)

    {

    {

    // perform initialization tasks here

    }

    // additional members

    };

    ```


    This example assumes that a class named `Superclass` exists and that it has declared
    a `Superclass(int)` constructor. The example executes as follows:


    *   Operator `new` allocates memory for and creates an object from an anonymous
    class that extends `Superclass`.

    *   Operator `new` invokes `Superclass`’s constructor with argument `10`. This
    is shown as `Superclass(10)`.

    *   After the constructor executes, any code located in the anonymous class’s
    instance initialization block (when present) executes.


    The following example demonstrates an instance initialization block in an interface-extension
    context:


    ```

    Interface i = new Interface()

    {

    {

    // perform initialization tasks here

    }

    // additional members

    };

    ```


    This example assumes that an interface named `Interface` exists. The example executes
    as follows:


    *   Operator `new` allocates memory for and creates an object from an anonymous
    class that implements `Interface`.

    *   Although it may appear otherwise, `Interface()` does not indicate a call to
    `Interface`’s constructor because `Interface` does not have a constructor. Instead,
    any code located in the anonymous class’s instance initialization block (when
    present) executes.


    Before JDK 8, an anonymous class could access only those local variables that
    were declared `final`. When an anonymous class accesses an enclosing block’s local
    variable or parameter, it *captures* that local or parameter. For example, suppose
    you have declared the following interface:


    ```

    interface Foo

    {

    void bar();

    }

    ```


    **Note:** There is an interesting history to the names `foo` (camel-cased to `Foo`
    – see Chapter [6](#615966_1_En_6_Chapter.xhtml) for a definition of camel casing)
    and `bar`. Check out Wikipedia’s “Camel case” entry (`http://en.wikipedia.org/wiki/Camel_case`)
    to learn about this history.


    Now suppose you’ve populated a method with the following code fragment:


    ```

    final int i;

    Foo foo;

    i = 42;

    foo = new Foo()

    {

    @Override

    public void bar()

    {

    System.out.println(i);

    }

    };

    foo.bar();

    ```


    This fragment first declares local variables `i` and `foo`. Local `i` has been
    declared `final` because it is going to be accessed from within an anonymous class.
    Because I’m using JDK 21, I don’t need to declare this local `final`. Instead,
    I could remove the `final` keyword. However, if I was using a version of the JDK
    that pre-dates JDK 8, I would need to use `final`.


    I then initialize `int` variable `i` to `42`. (If you are wondering why so many
    programmers feature this number in their examples, there is an interesting history
    behind it. According to Wikipedia’s “Phrases from *The Hitchhiker’s Guide to the
    Galaxy*” entry (`http://en.wikipedia.org/wiki/Phrases_from_The_Hitchhiker''s_Guide_to_the_Galaxy`),
    42 is the answer to the question about life, the universe, and everything else
    – or is it?)


    Moving on, the code fragment declares an unnamed (anonymous) class that implements
    the `Foo` interface. To implement this interface correctly, it must override its
    `bar()` method. This is signified by the `@Override` annotation (see Chapter [7](#615966_1_En_7_Chapter.xhtml)
    to learn about `@Override`).


    The code fragment instantiates the anonymous class that implements `Foo` and returns
    its reference, which is assigned to the previously declared `foo` variable. It
    then executes `foo.bar()`.


    Interface `Foo`’s `bar()` method header is not explicitly declared `public`. Instead,
    it is implicitly declared `public`. This is why I declare it `public` when overriding
    the method header in the anonymous class.


    The `bar()` method invokes `System.out.println()`, passing the captured `i` variable’s
    value as `println()`’s argument.


    Starting in JDK 8, an anonymous class can access local variables and parameters
    in the enclosing block that are effectively final. For example, in the previous
    sidebar, variable `i` was declared `final`. However, if I removed the `final`
    keyword, this variable would become effectively final because it never changes
    after it is initialized.


    **Note:** If I changed `System.out.println(i);` to `System.out.println(i++);`
    (which post-increments variable `i`) in the previous example’s `bar()` method,
    `i` would no longer be effectively final, which Java cannot allow. The JDK 21
    compiler would report a “`cannot assign a value to final variable i`” error message.'
