    ## “hello, world” – Java 风格


    让我们创建一个简单的应用程序来体验一下 Java 代码。传统上，第一个应用程序除了在控制台上输出 `hello, world` 消息外什么也不做。清单 1-1
    展示了一个实现此功能的 `HelloWorld` 应用程序的源代码。


    ```

    class HelloWorld

    {

    public static void main(String[] args)

    {

    System.out.println("hello, world");

    }

    }

    清单 1-1

    HelloWorld.java

    ```


    清单 1-1 声明了一个 `HelloWorld` 类（我将在第 6 章中解释类），该类作为 `main()` *方法*（一个在类上下文中执行的命名指令序列）的占位符。


    注意


    像 C 这样的语言使用函数而不是方法。*函数* 是一个在任何上下文之外执行的命名指令序列。


    `main()` 方法作为应用程序的入口点。当应用程序运行时，`main()` 的代码被执行。


    `main()` 方法头（`public static void main(String[] args)`）展示了一些有趣的特征：


    *   该方法被标记为 `public`，以便 `Java` 程序启动器可以找到它。如果缺少 `public`，则在尝试运行应用程序时会输出错误消息。


    *   该方法被标记为 `static`，这样就不需要创建 `HelloWorld` 对象来调用 `main()`。启动器直接调用 `main()`。它对对象一无所知。如果缺少
    `static`，则在尝试运行应用程序时会输出错误消息。


    *   该方法声明了一个由 `String[] args` 组成的参数列表，该列表标识了一个字符串参数数组，当启动器运行应用程序时，这些参数会在命令行上应用程序名称（`HelloWorld`）之后传递。*字符串*
    是放在双引号（`"`）之间的一系列字符。


    *   该方法声明了一个 `void` 返回类型，表示该方法不返回任何内容。


    如果返回类型和参数列表等概念让你感到困惑，请不要担心。你将在本书后面学习这些概念。


    `main()` 方法执行 `System.out.println("hello, world");` 以在控制台窗口上输出 `hello, world`。我将在第
    14 章中探讨 `System.out` 及其对应的 `System.err` 和 `System.in`。


