    fields* or *non-static fields*) because each `Vehicle` instance (object) will
    have its own copy of these non-static fields.


    ### Describing Behaviors via Methods


    A class also models an abstract or physical entity’s behaviors. For example, an
    account supports deposits, and a vehicle supports movement. These behaviors are
    implemented by named blocks of code that are known as *methods*. Another definition:
    a *method* is a function that executes in the context of a class.


    A method declaration has the following minimal syntax:


    ```

    returnType identifier ''('' [parameterList] '')''

    ''{''

    // method body

    ''}''

    ```


    A method declaration begins with a `returnType` that is followed by a non-reserved
    identifier that names the method. A parentheses-delimited `parameterList` follows
    this name. A brace-delimited body of code (a *block*) completes the declaration.


    The `returnType` identifies the type of values that the method returns via the
    `return` statement, which I''ll discuss later. For example, if a method returns
    32-bit integers, its return type would be `int`. When a method doesn’t return
    a value, its return type is `void`.


    The `parameterList` is a comma-separated list of parameter declarations: each
    declaration is a type followed by a non-reserved identifier that names the parameter.


    A *parameter* is a variable that receives an argument when a method or constructor
    is called. (An *argument* is an expression value whose type is compatible with
    its corresponding parameter.)


    A parameter is local to its method or constructor. It is created when the method
    or constructor is called and dies when the method or constructor returns to its
    caller. In other words, its *lifetime* is the method execution. Any code can access
    a parameter within the method. In other words, its *scope* is the entire method.


    The following example declares six methods (along with the previous three fields)
    in the `Vehicle` class:


    ```

    class Vehicle

    {

    String make;

    String model;

    int year;

    String getMake()

    {

    return make;

    }

    String getModel()

    {

    return model;

    }

    int getYear()

    {

    return year;

    }

    void setMake(String _make)

    {

    make = _make;

    }

    void setModel(String _model)

    {

    model = _model;

    }

    void setYear(int _year)

    {

    year = _year;

    }

    }

    ```


    The `getMake()`, `getModel()`, and `getYear()` methods use the `return` statement
    to return the values of their respective fields to the caller. This statement
    has the following syntax:


    ```

    ''return'' [expression] '';''

    ```


    An `expression` followed by a semicolon optionally follows reserved word `return`.
    The type of `return`’s `expression` must agree with the method’s `returnType`.


    Note


    You specify `return` by itself, as in `return;`, when prematurely exiting a method
    whose return type is `void`, or a constructor, which doesn’t have a return type.
    Perhaps some condition has been met, and you need to exit immediately. For example,
    you have a `copy()` method that copies the contents of one file to another in
    the context of a `while` loop. Its return type is `void`, and you only want to
    copy until the end-of-file is reached. You test for this possibility via an `if`
    statement (which assumes that a Boolean `eof` variable has been declared earlier
    in the code): `if (eof) return;`.


    The `setMake()`, `setModel()`, and `setYear()` methods set the values of the `make`,
    `model`, and `year` fields. Their return types are set to keyword `void` to indicate
    that they don’t return values to their callers.


    These three methods are an example of *instance methods* (also known as *object
    methods* or *non-static methods*) because they can use keyword `this` to access
    a `Vehicle` instance’s (object’s) non-static fields (I show how later).


    Note


    The “`set`” prefix on each of `setMake()`, `setModel()`, and `setYear()` identifies
    these methods as *setter methods*. Similarly, the “`get`” prefix on each of `getMake()`,
    `getModel()`, and `getYear()` identifies these methods as *getter methods*.'
