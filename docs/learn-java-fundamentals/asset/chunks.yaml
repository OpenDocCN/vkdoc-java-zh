  trans: '

    ## 玩转表达式


    表达式可以很有趣，因为你永远不知道会发现什么。我创建了一个 `ExprDemo` 应用程序，并在其中填充了几个示例表达式，作为本次探索的起点。清单 3-1
    展示了 `ExprDemo` 的源代码。


    ```

    class ExprDemo

    {

    public static void main(String[] args)

    {

    System.out.println("\"abc\" instanceof String: " +

    ("abc" instanceof String));

    System.out.println("4 << 1: " + (4 << 1));

    System.out.println("-4 << 1: " + (-4 << 1));

    System.out.println("1 << 31: " + (1 << 31));

    System.out.println("1 << 32: " + (1 << 32));

    System.out.println("-1 << 31: " + (-1 << 31));

    System.out.println("-1 << 32: " + (-1 << 32));

    int x = 3;

    System.out.println("x++: " + x++);

    System.out.println("x: " + x);

    System.out.println("5 / 0: " + (5 / 0));

    }

    }

    清单 3-1

    ExprDemo.java

    ```


    `ExprDemo` 重点关注 `instanceof`、`+`（字符串拼接）、`()`（括号）、`<<`（左移）、`-`（取反）、`=`（赋值）、`++`（后置自增）和
    `/`（除法）这些运算符，它们出现在表达式中，而这些表达式的值作为参数传递给 `System.out.println()` 方法调用。


    第一个方法调用中的表达式使用 `instanceof` 来判断 `"abc"` 是否是 `String` 的实例，`String` 是一个类的例子。（第 6
    章将教你关于类的知识。）回想一下，当 `instanceof` 的左操作数（一个引用）是其右操作数（一个引用类型）的实例时，它返回 true；否则返回 false。


    事实证明，`"abc"` 字符串字面量是 `String` 的一个实例，这使得 `"abc"` 很特殊。你将在第 13 章（我会探讨 `String`）中了解到字符串字面量有多么特殊。


    第一个方法调用中的表达式还使用了 `+` 来将两个字符串拼接成一个更大的字符串。该运算符的左操作数是字符串字面量 `"\"abc\" instanceof
    String: "`（注意 `\"` 转义序列用于在字符串字面量中放置双引号字符），但右操作数不是字符串：带括号的 `"abc" instanceof String`
    表达式求值为一个布尔值 true/false。这是怎么回事？


    Java 的 `+` 运算符对其数值操作数进行加法运算并返回它们的和。然而，当其中一个操作数是字符串而另一个操作数不是字符串时，`+` 会使用*字符串转换*将非字符串转换为字符串。如果该字符串是一个对象（你将在第
    6 章学习对象），`+` 会使用该对象的 `toString()` 方法来获取该对象的字符串表示。如果操作数是基于原始类型的值（例如布尔值 true），`+`
    会将该操作数转换为字符串，而不依赖 `toString()`。`+` 运算符将右操作数字符串追加到左操作数字符串之后，并返回拼接后得到的字符串。


    将括号运算符与字符串拼接一起使用


    你可能想知道为什么我在 `"\"abc\" instanceof String: " + ("abc" instanceof String)` 中给 `"abc"
    instanceof String` 加上了括号。我这样做是因为我希望输出如下所示：


    ```

    "abc" instanceof String: true

    ```


    如果没有括号，我会看到以下输出：


    ```

    true

    ```


    字符串拼接 (`+`) 的优先级高于对象的 relational 类型检查 (`instanceof`)。如果没有括号，编译器生成的字节码就好像表达式被括号括起来如下：


    ```

    ("\"abc\" instanceof String: " + "abc") instanceof String

    ```


    字节码首先计算 `"\"abc\" instanceof String: " + "abc"`，结果是 `"abcabc"`。然后计算 `"abcabc"
    instanceof String`，返回 true。最后，它执行 `System.out.println()`，参数为 `true`，并输出该值。


    这是另一个没有括号就无法按预期求值的表达式示例：


    ```

    System.out.println("4 + 2: " + 4 + 2);

    ```


    此方法调用输出 `4 + 2: 42` 而不是 `4 + 2: 6`。


    回想一下，结合性决定了当一个表达式包含两个或多个具有相同优先级的运算符时，它是如何求值的。例如，表达式 `"4 + 2: " + 4 + 2` 由子表达式
    `"4 + 2: "`、子表达式 `4`（在左侧 `+` 运算符之后）和子表达式 `2`（在右侧 `+` 运算符之后）组成。


    表达式 `"4 + 2: " + 4 + 2` 的求值过程如下：


    1.  计算 `"4 + 2: " + 4`。结果是字符串 `"4 + 2: 4"`。


    2.  计算 `"4 + 2: 4" + 2`。结果是字符串 `"4 + 2: 42"`。


    这个求值顺序可以通过使用括号运算符来阐明，如下所示：


    ```

    (("4 + 2: " + 4) + 2)

    ```


    要更改此表达式以便看到 `4 + 2: 6`，你需要在 `4 + 2` 周围加上括号，如下所示：


    ```

    "4 + 2: " + (4 + 2)

    ```


    这次，`(4 + 2)` 会首先被求值，因为括号运算符具有最高优先级。


    `<<` 运算符将其左操作数向左移动其右操作数指示的位置数。接下来的六个方法调用演示了这个运算符。


    这些方法调用中第一个的表达式将 `4` 向左移动一个位置。结果是 `8`。这相当于将 `4` 乘以 2，但速度更快。


    第二个方法调用的表达式将 `-4` 向左移动一个位置。结果是 `-8`。这并不意外！


    第三个方法调用的表达式将 `1` 向左移动 31 个位置。结果是 -2147483648，这可能看起来令人惊讶，因为 `1` 是正数而结果是负数。然而，当你考虑到一个
    32 位的值正在被左移，其最左边的位（位置 31——最右边的位在位置 0）是符号位（0 表示正数，1 表示负数），并且 1 被移入了符号位，这就不足为奇了。


    Java 以*二进制补码*（[``en.wikipedia.org/wiki/Two''s_complement``](http://en.wikipedia.org/wiki/Two%2527s_complement)）格式表示整数，这种格式允许你通过将所有位翻转为相反状态并将结果加
    1，来“将正二进制数可逆地转换为具有等效负值的负二进制数”。例如，假设一个 4 位整数，位置 3 是符号位，你会将 5 表示为 0101。翻转这些位会得到
    1010。将结果加 1 会得到 1011，这是 -5 的位模式（1111 是 -1 的模式，1110 是 -2 的模式，1101 是 -3 的模式，1100
    是 -4 的模式）。你可以通过翻转所有位并将结果加 1 来转换回 5。


    第四个方法调用中 `1 << 32` 表达式的结果可能令人困惑。你可能期望结果是 0，因为 `1` 被移过了位置 31，并且 0 被移到了它后面。然而，结果是
    1。如果你回想一下我之前关于移位运算符的讨论，我说过：


    “对于一个 32 位的表达式，只使用 *operand2* 的低五位，以防止移位超过 32 位整数中的位数。”


    右操作数 (*operand2*) 是 `32`，其 32 位二进制表示为 00000000000000000000000000100000。低五位是 00000，等于
    0。因此，左操作数 (`1`) 没有被移位，保持不变。


    在演示 `<<` 运算符的六个方法调用中，倒数第二个的表达式 `-1 << 31` 生成的结果与表达式 `1 << 31` 相同，因为在这两种情况下最右边的位都是
    1，并且左边的所有位都被移出了结果。在这两种情况下，你最终都会得到 100000000000000000000000000000000。这导致 -2147483648。


    最后，表达式 `-1 << 32` 产生的结果是 -1，原因与 `1 << 32` 产生的结果是 1 相同。在移位中只使用了右操作数的低五位，这导致尝试将左操作数移动零个位位置。


    现在 `<<` 运算符已经讨论完毕，考虑 `-`（取反）运算符。在六个 `<<` 运算符示例的第二个中，取反反转了其 `4` 操作数的符号。它还在这些示例的第五个和第六个中反转了其
    `1` 操作数的符号。


    现在我们转到 `int` 变量 `x` 的声明。这个变量通过 `=` 运算符被赋值为 `3`。


    接下来，在 `System.out.println("x++: " + x++)` 方法调用中，表达式 `x++` 的输出是 `3`，因为后置自增运算符 `++`
    在递增变量值之前返回其变量操作数中的当前值。本质上，它将当前值保存在另一个内存位置，执行递增，然后返回保存的值。后置递减运算符 (`--`) 也是如此。相比之下，前置自增
    (`++`) 和前置递减 (`--`) 分别递增和递减其变量的值，然后返回结果。为了证明后置自增操作生效了，倒数第三个方法调用输出了 `x` 中的值。


    最后一个 `System.out.println()` 方法调用的表达式试图除以 0，这样你就可以看到 Java 对此的反应。你会发现抛出了一个 `ArithmeticException`
    对象，并带有“`/ by zero`”消息，表明试图除以 0。（我在第 11 章讨论异常。）


    按如下方式编译清单 3-1：


    ```

    javac ExprDemo.java

    ```


    按如下方式运行生成的应用程序：


    ```

    java ExprDemo

    ```


    你应该会发现以下输出：


    ```

    "abc" instanceof String: true

    4 << 1: 8

    -4 << 1: -8

    1 << 31: -2147483648

    1 << 32: 1

    -1 << 31: -2147483648

    -1 << 32: -1

    x++: 3

    x: 4

    Exception in thread "main" java.lang.ArithmeticException: / by zero

    at ExprDemo.main(ExprDemo.java:16)

    ```

    '
- fmt: '# What’s Next?


    Now that you’ve mastered expressions, you’re ready to explore statements. Many
    statements work with expressions to help you create more interesting programs.


    # 4. Statements


    Computer programs perform tasks via statements. This chapter introduces you to
    statements in terms of assignment statements, decision statements, loop statements,
    loop-branching statements, and additional statements.


    ## Introducing Statements


    A *statement* is a syntactic unit that expresses some action to be carried out.
    Statements are used to assign values to variables, control the flow of execution
    by making decisions and repeating other statements a specific number of times
    or indefinitely, and carry out other tasks.


    Statements can be grouped together and treated as a single statement by placing
    them between `{` and `}` characters. The resulting compound statement is known
    as a *block*. Each statement except for a block must be terminated with a semicolon
    (`;`) character. Although you can terminate a block with a semicolon, doing so
    isn’t conventional.


    ## Assignment Statements


    An *assignment statement* assigns the result of an expression to a variable. There
    are two forms: the simple-assignment statement and the compound-assignment statement.


    ### Simple-Assignment Statement


    The *simple-assignment statement* evaluates an expression on the right of the
    `=` operator and assigns the result to the variable on the left. It has the following
    syntax:


    ```

    variable ''='' expression '';''

    ```


    The statement begins with a *variable* name, continues with the `=` operator,
    and concludes with an *expression* and a semicolon. Here are two examples which
    assume that the variables have been previously declared:


    ```

    healthyBodyTemp = 98.6; // healthyBodyTemp is of type double

    name = "John Doe"; // name is of type String

    ```


    Note


    Initializing a variable in a variable declaration is a form of the simple-assignment
    statement, for example, `int age = 30;`.


    ### Compound-Assignment Statement


    Closely related to the simple-assignment statement is the *compound-assignment
    statement*, which performs an operation and assigns the result to a variable in
    one step. This statement has the following syntax:


    ```

    variable (''+='' | ''-='' | ''*='' | ''/='' | ''%='' | ''&='' | ''^='' | ''|=''
    | ''='' | ''>>>='') expression '';''

    ```


    The statement begins with a *variable* name, continues with one of the specified
    compound-assignment operators, and concludes with an *expression* and a semicolon.
    Here is an example which assumes that the variable has been previously declared:


    ```

    counter += 1; // Add 1 to counter''s value and store the resulting sum in counter.

    ```


    ## Decision Statements


    A *decision statement* allows a Java program to decide between two or more paths
    of execution. There are three kinds of decision statements: `if`, `if`-`else`,
    and `switch`.


    ### If Statement


    The *if* *statement* evaluates a Boolean expression and executes another statement
    when this expression is true. This statement has the following syntax:


    ```

    ''if'' ''('' expression '')''

    statement

    ```


    An `if` statement begins with reserved word `if` and continues with a Boolean
    *expression* in parentheses. This is followed by *statement*, which is executed
    when *expression* is true.


    The `if` statement is demonstrated as follows:


    ```

    if (temperature < 70)

    turn_on_furnace();

    ```


    If `temperature`’s value drops below 70 degrees Fahrenheit (as determined by evaluating
    Boolean expression `temperature < 70` and discovering true as its value), invoke
    method `turn_on_furnace()` to turn on the furnace and warm up the room. (I discuss
    methods in Chapter [6](#615966_1_En_6_Chapter.xhtml).)


    ### If-Else Statement


    The *if-else* statement evaluates a Boolean expression and executes either of
    two statements depending on whether this expression evaluates to true or false.
    This statement has the following syntax:


    ```

    ''if'' ''('' expression '')''

    statement1

    ''else''

    statement2

    ```


    An `if`-`else` statement begins with reserved word `if` and continues with a Boolean
    *expression* in parentheses. This is followed by *statement1*, which is executed
    when *expression* is true, and (following reserved word `else`) *statement2*,
    which is executed when *expression* is false.


    This statement is demonstrated as follows:


    ```

    if (temperature < 70)

    turn_on_furnace();

    else

    turn_off_furnace();

    ```


    If `temperature`’s value drops below 70 degrees Fahrenheit (as determined by evaluating
    Boolean expression `temperature < 70` and discovering true as its value), invoke
    method `turn_on_furnace()` to turn on the furnace and warm up the room. Otherwise,
    invoke method `turn_off_furnace()` to turn off the furnace (the room has reached
    70 degrees).


    You can chain together multiple `if`-`else` statements as follows:


    ```

    ''if'' ''('' expression1 '')''

    statement1

    ''else''

    ''if'' ''('' expression2 '')''

    statement2

    ''else''

    ''if'' ''('' expression3 '')''

    statement3

    ''else''

    ...

    statementN

    ```


    If *expression1* is true, *statement1* executes. However, if *expression2* is
    false, `if ''(''` *expression2* `'')''` executes and evaluates *expression2*.
    If true, *statement2* executes. This process continues until one of these expressions
    is true and its corresponding statement executes. If none of these expressions
    are true, `else` is reached and *statementN* (the default statement) executes.


    The following example demonstrates this chaining capability:


    ```

    if (direction == "North")

    travelNorth();

    else

    if (direction == "East")

    travelEast();

    else

    if (direction == "South")

    travelSouth();

    else

    travelWest();

    ```


    DANGLING-ELSE PROBLEM


    When `if` and `if`-`else` are used together, and the source code is not properly
    indented, it can be difficult to determine which `if` associates with `else`.
    For example:


    ```

    if (file.isOpen())

    if (file.isReadable())

    file.read();

    else

    file.open();

    ```


    Did the developer intend for `else` to match the inner `if` but improperly formatted
    the code to make it appear otherwise? For example:


    ```

    if (file.isOpen())

    if (file.isReadable())

    file.read();

    else

    file.open();

    ```


    If `file.isOpen()` and `file.isReadable()` each return true, `file.read();` executes.
    If `file.isOpen()` returns true and `file.isReadable()` returns false, `file.open();`
    executes. Attempting to open an open file makes no sense.


    The developer must have wanted `else` to match the outer `if` but forgot that
    `else` matches the nearest `if`. This problem can be fixed by surrounding the
    inner `if` with braces, as follows:


    ```

    if (file.isOpen())

    {

    if (file.isReadable())

    file.read();

    }

    else

    file.open();

    ```


    When `file.isOpen()` returns true, the block that follows executes. When this
    method returns false, `file.open();` executes, which makes sense.


    Forgetting that `else` matches the nearest `if` and using poor indentation to
    obscure this fact is known as the *dangling-else problem*.'
