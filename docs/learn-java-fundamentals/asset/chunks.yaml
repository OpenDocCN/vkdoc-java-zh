    ## 搜索与排序


    程序员经常编写代码来在一维数组中搜索特定元素，并将一维数组的元素按值升序或降序排序。两种常用的搜索算法是*线性搜索*和*二分搜索*。*冒泡排序*是一种简单的排序算法，但对于大型数组效率不高。


    ### 线性搜索


    *线性搜索*通过从最低索引到最高索引比较元素，在一维数组的 *n* 个元素中搜索特定元素，直到找到该元素或没有更多元素可供比较。


