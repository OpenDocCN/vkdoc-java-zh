  trans: '

    ### 静态导入


    接口应仅用于声明类型。它们不应被用来声明*常量接口*，即那些仅用于导出常量的接口。清单 10-6 中的 `Openable` 常量接口就是一个例子。


    ```

    package demo;

    public interface Openable

    {

    boolean OPEN = true;

    boolean CLOSED = false;

    }

    清单 10-6

    Openable.java

    ```


    程序员使用常量接口是为了避免在常量名称前加上其引用类型的名称（例如 `Integer.MAX_VALUE`）。例如，考虑清单 10-7 中的 `Door`
    类，它实现了 `Openable` 接口，这样程序员就可以直接指定常量 `OPEN` 和 `CLOSED`，而无需包含类前缀（如果它们是在类中声明的）。


    ```

    package demo;

    public class Door implements Openable

    {

    private boolean state = CLOSED;

    public void status()

    {

    System.out.println("door is " + ((state == CLOSED) ? "CLOSED" : "OPEN"));

    }

    public void open()

    {

    state = OPEN;

    }

    public void close()

    {

    state = CLOSED;

    }

    }

    清单 10-7

    Door.java

    ```


    常量接口提供了在类实现中使用的常量。这些常量是实现细节，不应泄露到类的导出接口中，因为它们可能会混淆类的使用者。此外，为了保持二进制兼容性，即使类不再使用这些常量，你也必须继续支持它们。


    为了满足对常量接口的需求，同时避免使用这些接口带来的问题，JDK 5 引入了*静态导入*。这个语言特性可用于导入引用类型的静态成员。它通过 `import
    static` 语句实现，其语法如下所示：


    ```

    ''import'' ''static'' packagespec ''.'' typename ''.'' ( staticmembername | ''*''
    );

    ```


    该语句将 `static` 放在 `import` 之后，这使其与常规的 `import` 语句区分开来。其语法在标准的以句点分隔的包名和子包名列表方面与常规的
    `import` 语句类似。可以导入单个静态成员名称，也可以导入所有静态成员名称（得益于星号）。请考虑以下示例：


    ```

    import static java.lang.Integer.*;         // 从 Integer 导入所有静态成员。

    import static java.lang.Integer.MAX_VALUE; // 仅导入 MAX_VALUE 静态常量。

    import static java.lang.Integer.max;       // 仅导入 max() 静态方法。

    ```


    一旦导入，静态成员就可以直接指定，而无需在其前面加上类型名称。例如，在指定了第一个或第三个静态导入之后，你可以直接指定 `max`，如 `int maxValue
    = max(10, 20);`。


    为了修复清单 10-7，使其不再依赖 `implements Openable`，我们可以插入一个 `静态导入`，如清单 10-8 所示。


    ```

    package demo;

    import static demo.Openable.*;

    public class Door

    {

    private boolean state = CLOSED;

    public void status()

    {

    System.out.println("door is " + ((state == CLOSED) ? "CLOSED" : "OPEN"));

    }

    public void open()

    {

    state = OPEN;

    }

    public void close()

    {

    state = CLOSED;

    }

    }

    清单 10-8

    Door.java (版本 2)

    ```


    清单 10-8 以 `package demo;` 语句开头，因为你不能从位于未命名包中的类型导入静态成员。这个包名作为后续 `import static
    demo.Openable.*;` 静态导入的一部分出现。


    关于静态导入，还有两点额外的注意事项：


    *   当两个静态导入导入了同名的成员时，编译器会报告错误。例如，假设包 `math` 包含一个 `Math` 类，它与包 `physics` 的 `Math`
    类相同，都实现了相同的 `E` 常量和对数方法。当遇到以下代码片段时，编译器会报告错误，因为它无法确定访问的是 `math.Math` 的 `E` 常量还是
    `physics.Math` 的 `E` 常量，以及调用的是哪个 `log()` 方法：


    *   过度使用静态导入可能会使你的代码难以阅读和维护，因为它会用你导入的所有静态成员污染代码的命名空间。此外，任何阅读你代码的人都可能难以找出静态成员来自哪个类型，尤其是在从一个类型导入所有静态成员名称时。


    ```

    import static math.Math.*;

    import static physics.Math.*;

    System.out.println(E);

    System.out.println(log(2));

    ```


    ### 受保护访问


    Java 提供了 `protected` 关键字用于包上下文中。此关键字将受保护访问级别分配给类成员，例如字段或方法。将类成员声明为 `protected`
    使得该成员可以被同一包中任何类的所有代码以及子类（无论其包如何）访问。


    类成员被赋予受保护访问权限，以便它们可以作为类实现的钩子。这使得程序员能够以更简单的方式编写高效的子类。关于更多信息，我建议你参考 Joshua Bloch
    的著作 *Effective Java, Second Edition* ([`www.amazon.com/Effective-Java-2nd-Joshua-Bloch/dp/0321356683/`](http://www.amazon.com/Effective-Java-2nd-Joshua-Bloch/dp/0321356683/))
    中的“第 17 条：为继承而设计和编写文档，否则就禁止继承”。

