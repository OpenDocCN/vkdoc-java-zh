- fmt: '#### Calling Constructors


    Classes can declare multiple constructors. For example, consider a `Vehicle` constructor
    that accepts make and model arguments only – it sets the year to -1 to indicate
    that the vehicle’s year of manufacture is unknown. This constructor is shown as
    follows:


    ```

    Vehicle(String make, String model)

    {

    setMake(make);

    setModel(model);

    setYear(-1);

    }

    ```


    The problem with this new constructor is that it duplicates code located in the
    original constructor: `setMake(make);` followed by `setModel(model);`. Duplicate
    code adds unnecessary bulk to the class. Java lets you avoid this duplication
    by offering `this()` syntax for having one constructor call another constructor:


    ```

    Vehicle(String make, String model)

    {

    this(make, model, -1);

    }

    ```


    The `this()` call passes its arguments to the `Vehicle(String make, String model,
    int year)` constructor. The compiler knows to call this constructor because it
    matches the constructor’s number of parameters and parameter types with the `this()`
    call’s number of arguments and argument types.


    **Caution**


    The compiler will report an error when you place any code before a constructor’s
    `this()` call. For example, `make = "{" + make + "}"; this(make, model, -1);`
    is erroneous because the assignment statement precedes the `this()` call.


    ### Putting It All Together


    I’ve created a `Vehicle` class that contains the various enhancements presented
    earlier. Listing [6-1](#615966_1_En_6_Chapter.xhtml#PC19) presents `Vehicle`’s
    source code.


    ```

    class Vehicle

    {

    String make;

    String model;

    int year;

    Vehicle(String make, String model)

    {

    setMake(make);

    setModel(model);

    setYear(-1);

    }

    Vehicle(String make, String model, int year)

    {

    setMake(make);

    setModel(model);

    setYear(year);

    }

    String getMake()

    {

    return make;

    }

    String getModel()

    {

    return model;

    }

    int getYear()

    {

    return year;

    }

    void setMake(String make)

    {

    this.make = make;

    }

    void setModel(String model)

    {

    this.model = model;

    }

    void setYear(int year)

    {

    this.year = year;

    }

    }

    Listing 6-1

    Vehicle.java

    ```


    Compile Listing [6-1](#615966_1_En_6_Chapter.xhtml#PC19) as follows:


    ```

    javac Vehicle.java

    ```


    Because the resulting `Vehicle.class` file is not an application, you cannot run
    it. We will access it from a class with a `main()` method similar to the one shown
    in Chapter [1](#615966_1_En_1_Chapter.xhtml) later in this chapter. The pair of
    classes will collectively describe our application.


    ## Introducing Objects


    *Objects* are instances of classes. They represent specific abstract entities,
    such as your savings account, or specific physical entities, such as the comic
    book you are reading or the truck you are driving.


    In this section, you first learn how to construct objects. You then learn how
    to access their fields and call their methods.


    ### Constructing Objects


    After declaring a class, you can construct objects from it. You construct an object
    by using the `new` operator in conjunction with a constructor. For example, you
    can construct one or more `Vehicle` objects by specifying the `new` operator followed
    by a `Vehicle` constructor, as follows:


    ```

    Vehicle v = new Vehicle("Ford", "F150", 2023);

    ```


    The `new` operator causes memory to be assigned to a `Vehicle` object and then
    calls its three-parameter constructor with arguments `"Ford"`, `"F150"`, and `2023`.
    `Vehicle`’s `make`, `model`, and `year` fields are initialized to these values.
    When done, `new` returns a reference to the newly created `Vehicle` object. This
    reference is then assigned to variable `v`.


    **Note**


    If you’ve wondered why a constructor does not have a return type, the reason is
    that there is no way that `new` can return a constructor value while it is also
    returning a reference to the newly constructed object.


    ### Accessing Fields


    Now that you’ve constructed an object, you can use the member-selection operator
    (`.`) with an object reference to access the object’s fields. For example, access
    the previously created `Vehicle` object’s fields as follows:


    ```

    System.out.println(v.make); // Ford

    System.out.println(v.model); // F150

    System.out.println(v.year); // 2023

    ```


    It’s usually not a good idea to access fields directly. Instead, you invoke a
    getter method to access the field. Although this might seem redundant, it prevents
    the code that accesses the field from breaking should you need to remove or rename
    the field. You will learn more about this topic when I discuss information hiding
    later in this chapter.


    ### Calling Methods


    Use the `.` operator with an object reference to call the object’s methods. For
    example, call the previously created `Vehicle` object’s methods as follows:


    ```

    v.setMake("Dodge");

    v.setModel("Durango");

    v.setYear(2023);

    ```


    Later, you can call the counterpart “get” methods to return these values:


    ```

    System.out.println(v.getMake()); // Dodge

    System.out.println(v.getModel()); // Durango

    System.out.println(v.getYear()); // 2023

    ```


    A method (or constructor) call includes zero or more arguments that are passed
    to the method’s (or constructor’s) parameters. Java passes arguments via *pass-by-value*,
    which passes the value of a variable or the value of another expression. In contrast,
    the C++ language also supports *pass-by-reference*, which passes the address of
    the argument to a method so that the argument (which cannot be a value) is modified.


    A method call requires a method-call stack to keep track of the statement to which
    execution must return when a called method finishes. (A *stack* is a data structure
    for remembering things such as the previous locations that have been visited when
    navigating out of a maze.)


    A *method-call stack* is a stack of method calls that lets the Java Virtual Machine
    (JVM) remember what statement to return to when a `return` statement is executed
    or when execution leaves a method without `return`. Furthermore, the method-call
    stack keeps track of parameters and local variables on a per-method-call basis.


    **Note**


    Think of the method-call stack as a pile of clean trays in a cafeteria – you *pop*
    a clean tray from the top of the pile and the dishwasher will *push* the next
    clean tray onto the top of the pile. Conversely, you could think of this stack
    as a pile of dirty trays – you push a dirty tray onto the top of the pile and
    the dishwasher will pop the next dirty tray from the pile’s top.


    When a method is called, the JVM pushes the address of the next statement to execute
    after the called method returns onto the method-call stack, along with the called
    method’s arguments. The JVM also allocates stack space for the method’s parameters
    and/or local variables. When the method returns, the JVM removes the parameter/local
    variable space, pops the address and arguments off of the stack, and transfers
    execution to the statement at the given address.


    ### Putting It All Together


    I’ve created a `Vehicles` class that contains the various enhancements presented
    earlier. Listing [6-2](#615966_1_En_6_Chapter.xhtml#PC25) presents `Vehicles`’s
    source code.


    ```

    class Vehicles

    {

    public static void main(String[] args)

    {

    Vehicle v = new Vehicle("Ford", "F150", 2023);

    System.out.println(v.make);

    System.out.println(v.model);

    System.out.println(v.year);

    v.setMake("Dodge");

    v.setModel("Durango");

    v.setYear(2023);

    System.out.println(v.getMake());

    System.out.println(v.getModel());

    System.out.println(v.getYear());

    }

    }

    Listing 6-2

    Vehicles.java

    ```


    Assuming that `Vehicles.java` is in the same directory as `Vehicle.java` and the
    previously created `Vehicle.class`, compile Listing [6-2](#615966_1_En_6_Chapter.xhtml#PC25)
    as follows:


    ```

    javac Vehicles.java

    ```


    Assuming that `Vehicles.class` is successfully created, run the application as
    follows:


    ```

    java Vehicles

    ```


    You should observe the following output:


    ```

    Ford

    F150


    Dodge

    Durango


    ```'
