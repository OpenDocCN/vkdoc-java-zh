    纠正此问题需要重写 `hashCode()`，使其为逻辑等价的对象返回相同的整数值。这正是 `String` 类所做的，这就是为什么在存储基于 `String`
    的键时不会遇到问题。


    让我们修复这个问题。考虑清单 7-17 中升级后的 `Point` 类。


    ```

    class Point

    {

    int x, y;

    Point(int x, int y)

    {

    this.x = x; this.y = y;

    }

    int getX()

    {

    return x;

    }

    int getY()

    {

    return y;

    }

    @Override

    public boolean equals(Object o)

    {

    if (!(o instanceof Point))

    return false;

    Point p = (Point) o;

    return p.x == x && p.y == y;

    }

    @Override

    public int hashCode()

    {

    int result = 17; // 以质数开头

    result = 31 * result + x; // 与 x 组合

    result = 31 * result + y; // 与 y 组合

    return result;

    }

    }

    清单 7-17

    Point.java (版本 3)

    ```


    此版本 `Point` 与之前版本之间的唯一区别是增加了 `hashCode()` 方法。该方法的工作原理如下：


    1.  第一行 `int result = 17;` 将局部变量 `result` 初始化为 `17`。此起始值是任意的，并选择为质数。质数有助于降低冲突的可能性。


    2.  第二行 `result = 31 * result + x;` 将 `result` 的当前值与 `Point` 的 `x` 字段值组合。通常将 `result`
    的值乘以 `31`，因为 31 是奇质数，有助于产生更唯一的结果。此行将 `x` 的值混合到哈希码中。


    3.  第三行 `result = 31 * result + y;` 类似地将 `result` 的当前值与 `Point` 的 `y` 字段值组合，将
    `y` 的值混合到哈希码中。


    4.  最后一行 `return result;` 将生成的哈希码返回给此方法的调用者。


    总而言之，此 `hashCode()` 方法实现为每个 `Point` 对象创建了一个唯一的哈希码。此唯一哈希码基于组合 `Point` 的 `x` 和 `y`
    字段值（这些值指定点的坐标）。在计算中使用质数（17 和 31）有助于更均匀地分布哈希码，从而降低冲突的可能性。


    请注意，此实现适用于大多数情况。但是，根据你的应用程序，你可能需要进一步调整实现。你需要确保被视为相等的对象（根据 `equals()` 方法）产生相同的哈希码。


    按如下方式编译清单 7-17：


    ```

    javac HashCodeDemo.java

    ```


    按如下方式运行生成的应用程序：


    ```

    java HashCodeDemo

    ```


    你应该会看到以下输出：


    ```

    some point

    some point

    ```

