- fmt: '### Random Number Generation


    `Math` supports the generation of pseudorandom numbers via its `double random()`
    method. Each call to `random()` returns an algorithmically chosen double-precision
    floating-point number ranging from 0.0 to almost 1.0.


    **Note:** Wikipedia’s “Random number generator” topic ([`http://en.wikipedia.org/wiki/Random_number_generation`](http://en.wikipedia.org/wiki/Random_number_generation))
    discusses random number generators and pseudorandom numbers in more detail. For
    convenience, I’ll use the conventional term “random” in place of “pseudorandom.”


    Random number generation is important in computer games. For example, we can create
    a number-guessing game with `random()`. Check out Listing [12-3](#615966_1_En_12_Chapter.xhtml#PC8).


    ```

    import java.util.Scanner;

    public class Guess

    {

    public static void main(String[] args)

    {

    int answer = rnd(100) + 1;

    while (true)

    {

    System.out.print("Enter guess (1 - 100): ");

    int guess = new Scanner(System.in).nextInt();

    if (guess  answer)

    {

    System.out.println("Too high");

    continue;

    }

    else

    {

    System.out.println("Correct");

    break;

    }

    }

    }

    /*

    rnd() - Return random integer.

    Parameters:

    limit - Specifies the largest integer less 1 that

    may be returned. 0 is the smallest integer.

    Return:

    random integer from 0 through limit - 1.

    */

    static int rnd(int limit)

    {

    return (int) (Math.random() * limit);

    }

    }

    Listing 12-3

    Guess.java

    ```


    Listing [12-3](#615966_1_En_12_Chapter.xhtml#PC8) presents the source code to
    a `Guess` application that generates a random integer between 1 and 100 and keeps
    prompting you to guess which integer has been generated. You are informed if you
    guess too low or too high. You are also informed if you are correct, and the program
    ends.


    The following line will probably be confusing:


    ```

    int guess = new Scanner(System.in).nextInt();

    ```


    This line uses the `java.util.Scanner` class (from Java’s reference types library)
    and its `nextInt()` method to obtain an integer from the user. The `System.in`
    argument specifies the console as the input source. (I won’t discuss `Scanner`
    beyond this demonstration.)


    Most important is the `rnd()` method and the `return (int) (Math.random() * limit);`
    statement. The `rnd()` method returns a randomly chosen integer ranging from 0
    through `limit` - 1. For example, when passed `100`, `rnd()` returns a randomly
    chosen integer ranging from 0 through 99. This is why 1 is added to the result
    returned from `rnd()`.


    The `return (int) (Math.random() * limit);` statement first obtains a random `double`
    from 0.0 to almost 1.0 via the `Math.random()` call and then multiplies this value
    by `limit`. The `(int)` cast chops off the fractional part as it casts from `double`
    to `int`. The resulting value is then returned to the caller via `return`.


    Compile Listing [12-3](#615966_1_En_12_Chapter.xhtml#PC8) as follows:


    ```

    javac Guess.java

    ```


    Run the application as follows:


    ```

    java Guess

    ```


    Here is an example of one session with `Guess`:


    ```

    Enter guess (1 - 100): 50

    Too high

    Enter guess (1 - 100): 25

    Too high

    Enter guess (1 - 100): 12

    Too high

    Enter guess (1 - 100): 6

    Too high

    Enter guess (1 - 100): 3

    Correct

    ```


    I used the Binary Search algorithm (see Chapter [5](#615966_1_En_5_Chapter.xhtml))
    to identify 3 as the correct number. In the guessing-game context, this algorithm
    works by selecting a value at the middle of the search space. If the guess is
    too high, the lower half of the search space is chosen for continuing the search.
    If the guess is too low, the higher half of the search space is chosen for continuing
    the search. This algorithm repeats in a recursive manner.


    You can make this game much more interesting. For example, after the user guesses
    the correct number, the game could prompt the user to continue with another round
    (or not). After you learn more Java, you might add a timer facility so that the
    user must guess correctly within a time interval or lose the round (and not find
    out the number).


    `Math` declares many additional methods. For example, the overloaded `abs()` methods
    let you obtain the absolute value of a number, the overloaded `max()` and `min()`
    methods let you obtain the maximum and minimum of two values, and `double sqrt(double
    a)` returns the square root of its argument. (The square root of a negative argument
    is NaN.)'
