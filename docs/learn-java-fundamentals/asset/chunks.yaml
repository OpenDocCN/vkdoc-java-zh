- fmt: '### Method-Call Rules


    Methods are called in different ways depending on the kind of method (object or
    class) and context (from within a class or from code external to the class). Here
    are four rules for calling different kinds of methods in various contexts:


    - Specify an instance method name without a prefix when calling the method from
    another instance method or constructor in the same class. Example: `getMake()`.

    - Specify a class method name without a prefix when calling it from another object,
    class method, or a constructor in the same class. Example: `c2f(37)`.

    - Specify an object reference followed by the `.` operator followed by the instance
    method name when calling a method from outside its class or from a class method
    in the same class (provided that it is accessible). Example: `v.getMake()`.

    - Specify a class name followed by the `.` operator followed by the class method
    name when calling a method from outside its class (provided that it is accessible).
    Example: `Temperature.c2f(37)`.


    Don’t forget to ensure that the number of arguments passed to a method – along
    with the order in which they are passed and the types of these arguments – agrees
    with their parameter counterparts in the method being called. Otherwise, the compiler
    will report an error.


    ### Final Fields


    A *final field* is a field whose declaration is prefixed with keyword `final`.
    There are two kinds of final fields: class final fields and instance final fields.


    #### Class Final Fields


    A *class final field* is a final field that’s declared with the `static` keyword.
    The final field is associated with a class when the class is loaded and initialized.


    Class final fields are also known as *constants* because the field’s value never
    changes. You often declare constants in utility classes.


    The following example declares a constant named `PI`:


    ```

    final static double PI = 3.14159;

    ```


    According to Oracle’s (the current maintainer of Java) “Code Conventions for the
    Java Language” (`www.oracle.com/java/technologies/javase/codeconventions-contents.xhtml`)
    document, constants should be all uppercase with words separated by underscores
    (`_`).


    It’s a good idea to get into the habit of using constants instead of “magic numbers”
    in your code. For example, consider the following code fragment:


    ```

    radius = 10;

    area = 3.14159 * radius * radius;

    circumference = 3.14159 * radius * 2;

    ```


    This code fragment calculates the area and circumference of a circle whose radius
    is `10` units. Notice that `3.14159` appears twice in the code.


    It’s not a good idea to code a magic number like this because you would have to
    change all instances of the number when it needs to change. If you forget to modify
    an instance, you risk introducing a bug into your code. The following code fragment
    overcomes this problem by replacing `3.14159` with `PI`:


    ```

    radius = 10;

    area = PI * radius * radius;

    circumference = PI * radius * 2;

    ```


    #### Instance Final Fields


    An *instance final field* is a final field that’s declared without the `static`
    keyword. The final field is associated with an object when the object is created.


    Some developers believe that instance final fields are constants because an instance
    final field never changes while the object to which it is associated exists. Other
    developers believe that instance final fields are not constants because they haven’t
    been assigned values at compile time and don’t have to follow the same naming
    convention as is followed by class final fields.


    Unlike constants, which must be initialized when declared (see the previous `PI`
    example), instance final fields don’t have to be initialized when declared. Instead,
    initialization can be deferred to a constructor. When this happens, an instance
    final field is known as a *blank final*.


    Consider the following examples:


    ```

    class Counter

    {

    final int Count1 = 10; // instance final field that will remain the same

    // for each constructed object

    final int Count2;      // blank final that is initialized in constructor

    Counter(int initialCount) // each blank final can receive a different value that

    {                         // remains unchanged throughout the life of the object

    Count2 = initialCount;

    }

    }

    ```


    It’s difficult to think of a valid use for instance final fields. For some insight
    into what they might be used for, check out stackoverflow’s “Exposing instance
    constants with non-static public final variables” article (`http://stackoverflow.com/questions/12248635/exposing-instance-constants-with-non-static-public-final-variables`).


    ### Method-Call Chaining


    Two or more instance method calls can be chained together via the `.` operator,
    which results in more compact code. To accomplish instance method-call chaining,
    you need to re-architect your instance methods. The key is to design your methods
    to return a reference to the current object, which is indicated via the `this`
    keyword.


    I’ve refactored `Vehicle.java` and `Vehicles.java` to demonstrate method-call
    chaining. Listing 6-5 reveals `Vehicle.java`’s contents.


    ```

    class Vehicle

    {

    private String make;

    private String model;

    private int year;

    Vehicle(String make, String model)

    {

    setMake(make).setModel(model).setYear(-1);

    }

    Vehicle(String make, String model, int year)

    {

    setMake(make).setModel(model).setYear(year);

    }

    String getMake()

    {

    return make;

    }

    String getModel()

    {

    return model;

    }

    int getYear()

    {

    return year;

    }

    Vehicle setMake(String make)

    {

    this.make = make;

    return this;

    }

    Vehicle setModel(String model)

    {

    this.model = model;

    return this;

    }

    Vehicle setYear(int year)

    {

    this.year = year;

    return this;

    }

    }

    Listing 6-5

    Vehicle.java

    ```


    Note that the return type for `setMake()`, `setModel()`, and `setYear()` has been
    changed from `void` to `Vehicle` and that each method now ends with a `return
    this;` statement to return a reference to the current `Vehicle` object. Also,
    note the `setMake(make).setModel(model).setYear(-1);` and `setMake(make).setModel(model).setYear(year);`
    calls in the constructors.


    Listing 6-6 reveals `Vehicles.java`’s contents.


    ```

    class Vehicles

    {

    public static void main(String[] args)

    {

    Vehicle v = new Vehicle("Ford", "F150", 2023);

    System.out.println(v.getMake());

    System.out.println(v.getModel());

    System.out.println(v.getYear());

    v.setMake("Dodge").setModel("Durango").setYear(2023);

    System.out.println(v.getMake());

    System.out.println(v.getModel());

    System.out.println(v.getYear());

    }

    }

    Listing 6-6

    Vehicles.java

    ```


    Note the `v.setMake("Dodge").setModel("Durango").setYear(2023);` chained method
    calls, which demonstrate method-call chaining.


    Compile and run `Vehicles.java` and `Vehicle.java` in the same way as I demonstrated
    following Listing 6-2 and you should observe the same output.'
