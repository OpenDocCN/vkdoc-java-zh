  trans: '

    ### 封装一个日志库


    假设你的应用程序需要将消息记录到控制台、文件或其他目标。借助日志库可以完成此任务。我实现的这个库包含一个名为 `Logger` 的接口、一个名为 `LoggerFactory`
    的抽象类，以及一对包级私有的类 `Console` 和 `File`。


    清单 10-1 展示了 `Logger` 接口，它描述了记录消息的对象。


    ```

    package logging;

    public interface Logger

    {

    boolean connect();

    boolean disconnect();

    boolean log(String msg);

    }

    清单 10-1

    Logger.java

    ```


    `connect()`、`disconnect()` 和 `log()` 方法在成功时返回 `true`，失败时返回 `false`。（第 11 章将介绍一种更好的处理失败的技术。）这些方法没有显式声明为
    `public`，因为接口的方法隐式是 `public` 的。


    清单 10-2 展示了 `LoggerFactory` 抽象类。


    ```

    package logging;

    public abstract class LoggerFactory

    {

    public final static int CONSOLE = 0;

    public final static int FILE = 1;

    public static Logger newLogger(int dstType, String... dstName)

    {

    switch (dstType)

    {

    case CONSOLE:

    return new Console(dstName.length == 0 ? null : dstName[0]);

    case FILE:

    return new File(dstName.length == 0 ? null : dstName[0]);

    default:

    return null;

    }

    }

    }

    清单 10-2

    LoggerFactory.java

    ```


    清单 10-2 中的 `LoggerFactory` 类存储在文件 `LoggerFactory.java` 中。该清单以一条 `package` 语句开头，将
    `logging` 标识为该类的包。


    `LoggerFactory` 被声明为 `public`，以便可以从其包外部引用。此外，它被声明为 `abstract`，因此无法实例化。


    注意


    一个源文件中只能出现一个 `public` 类或接口。此外，源文件必须根据该类或接口的名称命名。不满足任一要求都会导致编译器报告错误。


    `newLogger()` 返回一个 `Logger` 实例，用于将消息记录到适当的目标。它使用可变参数特性（参见第 6 章）来可选地接受一个额外的 `String`
    参数，用于那些需要该参数的目标类型。例如，`FILE` 需要一个文件名。


    清单 10-3 展示了包级私有的 `Console` 类——该类无法被 `logging` 包中的类之外的代码访问，因为保留字 `class` 前面没有保留字
    `public`。


    ```

    package logging;

    class Console implements Logger

    {

    private String dstName;

    Console(String dstName)

    {

    this.dstName = dstName;

    }

    @Override

    public boolean connect()

    {

    return true;

    }

    @Override

    public boolean disconnect()

    {

    return true;

    }

    @Override

    public boolean log(String msg)

    {

    System.out.println(msg);

    return true;

    }

    }

    清单 10-3

    Console.java

    ```


    `Console` 的包级私有构造函数保存其参数，该参数很可能是 `null` 引用，因为不需要 `String` 参数。也许未来的 `Console` 版本会使用此参数来标识多个控制台窗口中的一个。


    清单 10-4 展示了包级私有的 `File` 类。


    ```

    package logging;

    class File implements Logger

    {

    private String dstName;

    File(String dstName)

    {

    this.dstName = dstName;

    }

    @Override

    public boolean connect()

    {

    if (dstName == null)

    return false;

    System.out.println("opening file " + dstName);

    return true;

    }

    @Override

    public boolean disconnect()

    {

    if (dstName == null)

    return false;

    System.out.println("closing file " + dstName);

    return true;

    }

    @Override

    public boolean log(String msg)

    {

    if (dstName == null)

    return false;

    System.out.println("writing " + msg + " to file " + dstName);

    return true;

    }

    }

    清单 10-4

    File.java

    ```


    与 `Console` 不同，`File` 需要一个非 `null` 的参数。每个方法首先验证此参数不为 `null`。如果参数为 `null`，则方法返回
    `false` 表示失败。


    请完成以下步骤来构建此库：


    1.  在文件系统中选择一个合适的位置作为当前目录。


    2.  在当前目录中创建一个 `logging` 子目录。


    3.  将清单 10-1 和 10-2 分别复制到文件 `Logger.java` 和 `LoggerFactory.java` 中；并将这些文件存储在 `logging`
    子目录中。


    4.  将清单 10-3 和 10-4 分别复制到文件 `Console.java` 和 `File.java` 中；并将这些文件存储在 `logging`
    子目录中。


    5.  假设当前目录包含 `logging` 子目录，执行 `javac logging/*.java` 来编译 `logging` 中的四个源文件。如果一切顺利，你应该会在
    `logging` 子目录中发现 `Logger.class`、`LoggerFactory.class`、`Console.class` 和 `File.class`。（或者，对于此示例，你可以切换到
    `logging` 子目录并执行 `javac *.java`。）


    现在你已经创建了 `logging` 库，接下来就可以使用它了。我将在下一节中展示一个正确演示此库的小型 Java 应用程序。

    '
- fmt: '### Importing Types from the Logging Library


    The logging library allows us to introduce portable logging code into an application.
    Apart from a call to `newLogger()`, this code will remain the same regardless
    of the logging destination. Listing [10-5](#615966_1_En_10_Chapter.xhtml#PC7)
    presents an application that tests this library.


    ```

    import logging.Logger;

    import logging.LoggerFactory;

    class TestLogging

    {

    public static void main(String[] args)

    {

    Logger logger = LoggerFactory.newLogger(LoggerFactory.CONSOLE);

    if (logger.connect())

    {

    logger.log("test message #1");

    logger.disconnect();

    }

    else

    System.out.println("cannot connect to console-based logger");

    logger = LoggerFactory.newLogger(LoggerFactory.FILE, "messages.txt");

    if (logger.connect())

    {

    logger.log("test message #2");

    logger.disconnect();

    }

    else

    System.out.println("cannot connect to file-based logger");

    logger = LoggerFactory.newLogger(LoggerFactory.FILE);

    if (logger.connect())

    {

    logger.log("test message #3");

    logger.disconnect();

    }

    else

    System.out.println("cannot connect to file-based logger");

    }

    }

    Listing 10-5

    TestLogging.java

    ```


    Listing [10-5](#615966_1_En_10_Chapter.xhtml#PC7) doesn’t begin with a `package`
    statement because simple applications are typically not stored in packages. Instead,
    it begins with a pair of `import` statements for importing the logging library’s
    `Logger` and `LoggerFactory` classes.


    The `main()` method first invokes `LoggerFactory`’s `newLogger()` method with
    the `LoggerFactory.CONSOLE` constant as this method’s argument to create a logger
    that logs messages to the console. This method returns a `Logger` object (i.e.,
    a logger created from a class – `Console`, in this case – that implements the
    `Logger` interface).


    This method proceeds to connect to this logger by calling `Logger`’s `connect()`
    method. If this method returns true, the method succeeded (it will succeed with
    a console but might not succeed when logging to a file), and `main()` proceeds
    to log a message by invoking `Logger`’s `log()` method. It then disconnects from
    the logger by calling `Logger`’s `disconnect()` method.


    The `main()` method next repeats this process by creating a file-based logger
    that logs messages to a file named `messages.txt`.


    This process is repeated a third time by attempting to create a file-based logger
    that logs messages to an unnamed file. Let’s assume that a default name is used
    when no file name argument is passed to `newLogger()` – remember that `newLogger()`
    uses varargs to obtain the file name.


    The `newLogger()` method is coded to not return a logger, but you could change
    it to choose a default file name. I wrote it this way to test the code when `newLogger()`
    fails to return a logger.


    Copy Listing [10-5](#615966_1_En_10_Chapter.xhtml#PC7) to a file named `TestLogging.java`
    and place this file in the same directory as the `logging` directory that you
    previously created. Then, execute the following command to compile `TestLogging.java`
    (and the logging package’s source files when not previously compiled):


    ```

    javac TestLogging.java

    ```


    Execute the following command to run `TestLogging`:


    ```

    java TestLogging

    ```


    You should observe the following output:


    ```

    test message #1

    opening file messages.txt

    writing test message #2 to file messages.txt

    closing file messages.txt

    cannot connect to file-based logger

    ```


    Suppose that `TestLogging.java` wasn’t located in the same directory as `logging`.
    How would you compile this source file and run the resulting application? The
    answer is to use the class path.


    The *class path* is a sequence of packages that the Java Virtual Machine (JVM)
    searches for reference types. It is specified via the `-classpath` (or `-cp`)
    option used to start the JVM or, when not present, the `CLASSPATH` environment
    variable.


    Note


    Whether you use the `-classpath`/`-cp` option or the `CLASSPATH` environment variable
    to specify a class path, there is a specific format that must be followed. Under
    Windows, this format is expressed as *path1*`;`*path2*`;...`, where *path1*, *path2*,
    and so on are the locations of package directories. Under Mac OS X, Unix, and
    Linux, this format changes to *path1*`:`*path2*`:...`.


    Suppose (on a Windows platform) that the logging library is stored in `C:\logging`
    and that `TestLogging.java` is stored in `C:\TestLogging`, which is the current
    directory. Specify the following commands to compile the source code and run the
    application:


    ```

    javac -cp ../logging TestLogging.java

    java -cp ../logging;. TestLogging

    ```


    The period character after the `;` character in `../logging;.` represents the
    current directory. It must be specified so that the JVM can locate `TestLogging.class`.


    ## Additional Topics


    There are three additional topics to consider when working with packages: static
    imports, protected access, and JAR files.'
