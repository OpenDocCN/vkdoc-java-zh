    COMPILER-GENERATED CLASS FILE NAMES FOR LOCAL CLASSES


    When generating a name for a local class’s class file, the compiler adds an integer
    to the generated name according to the pattern *enclosingClass*`$(`*integer*`)`*enclosedClass*.
    (The parentheses are not part of the final name.) If there are two local classes
    with the same name, the compiler increments the integer to avoid name conflicts.
    Consider the following example:


    ```

