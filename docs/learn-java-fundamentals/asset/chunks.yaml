    for (int i = 1; i < 10; i++)

    sum += i;

    ```


    声明变量`sum`后，示例进入`for`语句，该语句首先声明变量`i`并将其初始化为`1`。然后计算布尔表达式`i < 10`。只要`i`的值小于10，`for`语句就会持续循环执行后面的`sum
    += i;`语句。


    这个表达式语句使用`+=`（复合赋值运算符之一）将`i`的值加到`sum`的值上。更新后，`for`语句执行`i++`来递增`i`。接着，它再次计算`i <
    10`，并在`i`的值小于10时重新执行`sum += i;`。


    等价的`while`语句如下所示：


    ```

    int sum = 0;

    int i = 1;

    while (i < 10)

    {

    sum += i;

