    ## 标准 I/O


    *标准 I/O* 是一个通信框架，它通过字节流（如果你愿意，也可以称之为通道）将正在运行的程序与其输入源连接起来。它还将程序连接到其正常输出和错误输出目的地。


    注意


    `System` 声明了 `in`、`out` 和 `err` 类字段，这些字段将程序连接到其输入源、输出目的地和错误目的地。`in` 字段的类型是 `java.io.InputStream`；`out`
    和 `err` 字段的类型是 `java.io.PrintStream`。


    在本节之外，我不会在本书中深入讨论 `InputStream` 和 `PrintStream`。相反，我建议你参考我的 *Java I/O, NIO and
    NIO.2* 一书，我在其中更详细地讨论了这些以及其他与 I/O 相关的类型。（请参阅 [`www.amazon.ca/Java-NIO-NIO-2-JEFF-FRIESEN/dp/1484215664/`](http://www.amazon.ca/Java-NIO-NIO-2-JEFF-FRIESEN/dp/1484215664/)
    获取本书。）


    我希望更新 *Java I/O, NIO and NIO.2* 并将其重命名为 *Learn Java I/O, NIO and NIO.2*，使其成为“Learn
    Java …”系列的一部分。


    ### 标准输入


    一个正在运行的程序从*标准输入*接收其输入，这是一种抽象了输入源的操作系统机制。该机制默认为控制台的键盘，但可以*重定向*到文件或其他输出设备。


    考虑第 13 章的 `WC` 应用程序。它调用 `System.in.read()` 从标准输入读取字节。这些字节可能来自键盘、文件或其他来源。程序不知道也不关心来源。它只是“看到”一个字节流并对其执行某些操作。


    注意


    各种字符编码标准用于对字符进行编码。例如，ASCII（美国信息交换标准码——参见 [`http://en.wikipedia.org/wiki/ASCII`](http://en.wikipedia.org/wiki/ASCII)）在
    Unicode（参见 [`en.wikipedia.org/wiki/Unicode`](http://en.wikipedia.org/wiki/Unicode)）出现之前是主要的字符编码标准。


    ASCII 使用 8 位字节中的 7 位来编码一个字符。相比之下，Unicode 最初使用两个字节来编码一个字符（这就是为什么 Java 的 `char`
    类型占用 16 位），但现在最多使用四个字节。`java.lang.Character` 类对此进行了补偿。（有关 `Character` 的更多信息，请查看
    [`http://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/lang/Character.xhtml`](http://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/lang/Character.xhtml)。）


    `System.in` 引用 `System` 的 `in` 类字段，其类型为 `InputStream`。


    `InputStream` 提供了一个 `int read()` 方法，该方法从输入源读取一个字节，并将该字节作为 32 位整数（`int`）返回。当到达字节流的末尾时，它返回
    -1。当发生 I/O 错误（例如尝试读取已关闭的文件源）时，它会抛出 `java.io.IOException`。


    假设你按如下方式运行 `WC` 应用程序：


    ```

    java WC

    ```


    在此次执行中，`WC` 的输入（通过 `System.in.read()` 方法调用）来自键盘。


    标准 I/O 允许你将标准输入从默认的控制台键盘重定向到文件或其他输入源。要使用 `WC` 实现这一点，你需要指定 `<` 符号，后跟输入源的名称，如下所示：


    ```

    java WC <words.txt

    ```


    这里，输入来自一个名为 `words.txt` 的文件。


    注意


    `System` 提供了 `void setIn(InputStream in)` 方法，用于将标准输入重定向到另一个流。例如，`System.setIn(new
    FileInputStream("words.txt"));` 等同于 `<words.txt`。


    `java.io.FileInputStream` 类允许你从文件获取输入。我在本书中不讨论这个类。


    ### 标准输出


    一个正在运行的程序将其非错误输出发送到*标准输出*，这是一种抽象了非错误输出目的地（也称为*接收器*）的操作系统机制。该机制默认为控制台的屏幕，但可以重定向到文件或其他输出设备。


    考虑第 13 章的 `WC` 应用程序。它调用 `System.out.println()` 将字符串写入标准输出。该字符串被发送到文件或其他接收器。程序不知道也不关心接收器。


    `System.out` 引用 `System` 的 `out` 类字段，其类型为 `PrintStream`。


    `PrintStream` 提供了各种 `print()` 和 `println()` 方法，用于将各种类型的数据写入接收器。例如，`print(double
    d)` 写入一个双精度浮点值，而 `println(String s)` 写入一个字符串。


    注意


    `print()` 和 `println()` 之间的区别在于，`println()` 在写入其参数后会写入一个换行符（字面表示为 `\n`）。换行符会导致*光标*（一个可移动的指示器，指示输入输入或输出发送的位置）定位到下一行输入或输出的开头。它被写成一个特定于平台的字节序列，在
    Windows 平台上为 13 后跟 10，在 Unix/Linux 平台上为 10。


    你可以通过调用不带参数的 `System.out.println()` 方法来写入一个空行以分隔输出行。此方法输出我在本章前面提到的行分隔符。


    假设你按如下方式运行 `WC` 应用程序：


    ```

    java WC

    ```


    在此次执行中，`WC` 的输出被发送到屏幕（通过 `System.out.println()` 方法调用）。


    标准 I/O 允许你将标准输出从默认的控制台屏幕重定向到文件或其他输出接收器。要使用 `WC` 实现这一点，你需要指定 `>` 符号，后跟输出接收器的名称，如下所示：


    ```

    java WC >stats.txt

    ```


    这里，输出被发送到一个名为 `stats.txt` 的文件。


    注意


    `System` 提供了 `void setOut(PrintStream out)` 方法，用于将标准输出重定向到另一个流。例如，`System.setOut(new
    FileOutputStream("stats.txt"));` 等同于 `>stats.txt`。


    `java.io.FileOutputStream` 类允许你将输出发送到文件。我在本书中不讨论这个类。

    '
- fmt: '#### Formatted Output


    The `PrintStream` class also provides the `PrintStream.printf(String format, Object...
    args)` method to achieve formatted output.


    **Note:** JDK 5 introduced the `printf()` method, which is patterned after the
    C language’s `printf()` function. Check out [`http://en.wikipedia.org/wiki/Printf`](http://en.wikipedia.org/wiki/Printf)
    to learn more about this function.


    The `printf()` method’s implementation works with the `java.util.Formatter` class
    (also introduced by JDK 5) to achieve formatted output. For this reason, `printf()`
    is an example of a *convenience method*.


    The `format` argument identifies a format string that consists of literal text
    and format specifiers. Each format specifier begins with the `%` symbol and ends
    with a conversion letter. For example, `%d` indicates that a decimal integer is
    required. Also, `%s` indicates that a string is needed.


    **Note:** For more information about the format string and format specifiers,
    check out JDK 21’s API documentation on the `Formatter` class ([`http://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/util/Formatter.xhtml`](http://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/util/Formatter.xhtml)).


    The `args` argument is a varargs list of arguments. Each argument’s type must
    be compatible with its matching format specifier.


    Listing [14-5](#615966_1_En_14_Chapter.xhtml#PC25)’s `FormattedOutputDemo` application
    demonstrates formatted output.


    ```

    public class FormattedOutputDemo

    {

    public static void main(String[] args)

    {

    int i = 10;

    System.out.printf("i = [%d]%n", i);

    System.out.printf("i = [%5d]%n", i);

    System.out.printf("i = [%05d]%n", i);

    System.out.printf("i = [%-5d]%n", i);

    String s = "hello, world";

    System.out.printf("s = [%s]%n", s);

    System.out.printf("s = [%30s]%n", s);

    }

    }

    Listing 14-5

    FormattedOutputDemo.java

    ```


    `FormattedOutputDemo`’s `main()` method first declares local `int` variable `i`
    and initializes it to `10`. It then executes `System.out.printf()` four times
    to demonstrate four ways to format this integer:


    *   `System.out.printf("i = [%d]%n", i);`: default format

    *   `System.out.printf("i = [%5d]%n", i);`: format in a five-character field with
    leading spaces

    *   `System.out.printf("i = [%05d]%n", i);`: format in a five-character field
    with leading zeroes

    *   `System.out.printf("i = [%-5d]%n", i);`: left format in a five-character field


    In each case, the format string ends with `%n`. This format specifier indicates
    that a newline character is to be output.


    `main()` next declares local `String` variable `s` and initializes it to `"hello,
    world"`. It then executes `System.out.printf()` two times to demonstrate two ways
    to format this string:


    *   `System.out.printf("s = [%s]%n", s);`: default format

    *   `System.out.printf("s = [%30s]%n", s);`: format in a 30-character field with
    leading spaces


    Compile Listing [14-5](#615966_1_En_14_Chapter.xhtml#PC25) as follows:


    ```

    javac FormattedOutputDemo.java

    ```


    Run the application as follows:


    ```

    java FormattedOutputDemo

    ```


    You should discover the following output:


    ```

    i = [10]

    i = [   10]

    i = [00010]

    i = [10   ]

    s = [hello, world]

    s = [                  hello, world]

    ```


    ### Standard Error


    A running program sends its error output to *standard error*, which is an operating
    system mechanism that abstracts the error output destination. This mechanism defaults
    to a console’s screen but can be redirected to a file or another output device.


    Consider Chapter [13](#615966_1_En_13_Chapter.xhtml)’s `TR` application. It calls
    `System.out.println()` to write a usage error message to standard output. Instead,
    it would be more appropriate to write this message to standard error in order
    to improve the organization of the program’s output.


    **Note:** Standard output lets you send non-error output to one destination, and
    standard error lets you send error output to another destination. This segregation
    helps you organize your output so you can focus on error messages without being
    sidetracked by non-error output.


    `System.err` refers to `System`’s `err` class field, which is of type `PrintStream`.
    You can use `PrintStream`’s `print()` and `println()` methods to write various
    types of error-oriented data to a sink.


    Suppose you create a new version of `TR` that replaces the following code fragment:


    ```

    if (args.length == 0)

    {

    System.out.println("usage: java TR sequence of words");

    return;

    }

    ```


    with:


    ```

    if (args.length == 0)

    {

    System.err.println("usage: java TR sequence of words");

    return;

    }

    ```


    I’ve bolded `out` and `err` so you can see what needs to change.


    Compile and run `TR` as you did in Chapter [13](#615966_1_En_13_Chapter.xhtml).
    When you don’t specify any command-line arguments, you’ll notice the following
    error message:


    ```

    usage: java TR sequence of words

    ```


    If you try to redirect it to a file via the following command line:


    ```

    java TR >out

    ```


    you’ll notice that `out` is empty.


    However, if you try to redirect the error message to a file via the following
    command line:


    ```

    java TR 2>out

    ```


    you’ll discover that the error message appears in the file.


    The number `2` in `2>out` identifies the standard error stream.


    **Note:** `System` provides the `void setErr(PrintStream out)` method to redirect
    standard error output to another stream. For example, `System.setErr(new FileOutputStream("out"));`
    is the equivalent of `2>out`.'
