- fmt: 'Finally, a string literal consists of a sequence of Unicode characters surrounded
    by a pair of double quotes, for example, `"What is the weather like today?"`.
    It might also include *escape sequences*, which are special syntax for representing
    certain printable and nonprintable characters that otherwise cannot appear in
    a literal. For example, `"The title of the book is \"Mastering Java\" and is written
    by John Doe."` This example uses the `\"` escape sequence to surround `Mastering
    Java` with double quotes.


    The following escape sequences are supported: `\\` (backslash), `\"` (double quote),
    `\''` (single quote), `\b` (backspace), `\f` (form feed), `\n` (newline), `\r`
    (carriage return), and `\t` (tab).


    A string literal might also contain *Unicode escape sequences*, which are a special
    syntax for representing Unicode characters. A Unicode escape sequence starts with
    `\u` and continues with four hexadecimal digits (`0–9`, `A–F`, or `a–f`) with
    no intervening space. For example, `\u0043` represents the capital letter C, and
    `\u20ac` represents the European Union currency symbol.


    The following examples use literals to initialize the previously presented variables:


    ```

    boolean first = true;

    int counter = 10;

    char gradeLetter = ''A'';

    double temperature = 37.9;

    String direction = "East";

    ```


    ## Putting It All Together


    Listing [2-2](#615966_1_En_2_Chapter.xhtml#PC11) presents the source code to a
    `VarInit` application that demonstrates identifiers, types, variables, and literals
    via the previous examples. You can modify `VarInit`’s source code to introduce
    your own examples and learn more about these basic language features.


    ```

    class VarInit

    {

    public static void main(String[] args)

    {

    boolean first = true;

    int counter = 10;

    char gradeLetter = ''A'';

    double temperature = 37.9;

    String direction = "East";

    System.out.println(first);

    System.out.println(counter);

    System.out.println(gradeLetter);

    System.out.println(temperature);

    System.out.println(direction);

    }

    }

    Listing 2-2

    VarInit.java

    ```


    Compile Listing [2-2](#615966_1_En_2_Chapter.xhtml#PC11) as follows:


    ```

    javac VarInit.java

    ```


    Run the application as follows:


    ```

    java VarInit

    ```


    You should observe the following output:


    ```

    true


    A

    37.9

    East

    ```


    ## VAR


    JDK 10 introduced `var`, a shortcut to declaring and initializing variables. To
    save keystrokes, you no longer have to enter a variable’s type name because the
    compiler infers the variable’s type from the literal’s (or other expression’s)
    type during initialization. For example, in `var ch = ''C'';`, the compiler infers
    that variable `ch` has type `char` because the type of `''C''` is `char`. Without
    `var`, you would specify `char ch = ''C'';`. Although you saved one keystroke,
    which doesn’t seem like much, you could save more keystrokes in longer syntactic
    contexts, such as `var amount = 10.0;` instead of `double amount = 10.0;`.


    Remember two important points when working with `var`:


    *   You must always use `var` in an initialization and not a declaration-only
    context. In other words, you must always assign a literal or other expression
    to the variable. If you specify `var` and a variable name by themselves, as in
    `var ch;`, the compiler will report an error because it cannot infer a type for
    `ch`.


    *   The `var` identifier might seem like a reserved word (or keyword, if you like),
    but that is not the case. You cannot use a reserved word to name a variable. However,
    the following declaration is legal: `var var = 10.0;`. In this example, `var`
    is a double-precision floating-point variable initialized to 10.0.


    I recommend not using `var` to name a variable (as in `var var`) because the result
    might confuse someone who is reading your source code. Also, `var` might become
    a reserved word someday.


    ### What’s Next?


    Now that you’ve mastered comments, identifiers, types, variables, and literals,
    you’re ready to explore operators and expressions. These language features let
    you manipulate data items to produce new data items, which is done in every kind
    of program, from a business payroll application to a machine-learning demo.


    # 3. Expressions


    Computer programs manipulate data via expressions. This chapter introduces you
    to expressions in terms of simple and compound expressions.


    ## Introducing Expressions


    An *expression* is a combination of literals, variable names, method calls (discussed
    in Chapter [6](#615966_1_En_6_Chapter.xhtml)), and operators. At runtime, the
    expression evaluates to a type referred to as the expression’s type.


    If an expression is being assigned to a variable, their types must *agree* (it
    must be possible to convert from one type to the other without losing information)
    or else the compiler will report an error.


    ## Simple Expressions


    A *simple expression* is a literal value, a variable name (containing a value),
    or a method call (returning a value) – I cover methods and method calls in Chapter
    [6](#615966_1_En_6_Chapter.xhtml). The following examples demonstrate these simple
    expressions being used to initialize variables:


    ```

    int i = 2; // a literal value (2) of type int

    int j = i; // a variable name (i) of type int

    boolean success = open("file.txt"); // a method call that returns Boolean true/false

    ```


    The first example assigns literal `2` to variable `i`. The literal and variable
    have the same type: `int`.


    The second example assigns variable `i` to variable `j`. Both variables have the
    same `int` type.


    The third example calls an `open()` method, passing to this method the name of
    a file to open, and assigns the result to variable `success`. Let’s assume that
    `open()`’s return type is `boolean`, which matches `success`’s return type.


    These examples assume that only expressions whose types match the types of the
    variables that they are initializing can be assigned to those variables. However,
    it is possible to assign a simple expression having a different type. For example,
    Java lets you assign various `int` literals to a variable of type `short`, as
    in `short x = 90;`, and assign a `short` to an `int` variable, as in `int y =
    x;`.


    The former assignment is okay because `90` can be represented as a short integer
    – the largest `short` that can be represented is `32767`, so `90` fits into a
    `short`. In contrast, the compiler would complain when encountering `short x =
    80000;` because `80000` cannot be represented in 16-bit space, and information
    would be lost.


    The latter assignment is acceptable because there is no loss of information when
    you convert from a type with a lesser set of values to a type with a greater set
    of values. A `short`’s range of values can easily fit into an `int`’s greater
    range of values.


    Java uses widening conversion rules to support the following primitive-type conversions:


    *   `byte` to `short`, `int`, `long`, `float`, or `double`


