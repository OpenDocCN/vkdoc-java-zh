    }

    ```


    `Product` 代表某种制造的产品。`productID` 字段被标记为 `static`，因为它描述了一个产品标识号。由于类字段初始化器将 `1` 赋给了
    `productID`，该编号从 `1` 开始，并在制造产品后于 `manufacture()` 中递增。


    #### 类初始化块


    *类初始化块*（也称为*静态初始化块*）是一个以 `static` 为前缀的语句块，被引入到类体中。例如，考虑以下 `Graphics` 类，它是某个简单图形包的一部分：


    ```

    class Graphics

    {

    static double[] sines, cosines;

    static

    {

    sines = new double[360];

    cosines = new double[360];

    for (int i = 0; i < sines.length; i++)

    {

    sines[i] = sin(toRadians(i));

    cosines[i] = cos(toRadians(i));

    }

    }

    // ...

    }

    ```


    `Graphics` 声明了 `sines` 和 `cosines` 数组变量。它还声明了一个类初始化块，该块创建了 360 个元素的 `double` 数组，其引用被赋给了
    `sines` 和 `cosines`。然后，它使用一个 `for` 循环，通过调用 `sin()` 和 `cos()` 方法将这些数组元素初始化为相应的正弦和余弦值。循环索引
    `i` 表示从 0 到 360 度的角度单位。在每次调用 `sin()` 和 `cos()` 时，此参数都会被传递给 `toRadians()`，以将角度值转换为弧度。


    提示


    性能对图形应用程序很重要，访问数组元素比调用方法更快。因此，开发人员会采用性能技巧，例如创建并初始化正弦和余弦数组。


    注意


    对于每个类，编译器都会生成一个 `<clinit>()` 方法，其中包含所有发生的类初始化的字节码。编译器从类的顶部到底部工作，将遇到的每个类字段初始化器和类初始化块的字节码放入此方法中。JVM
    在将类文件加载到内存后，会在运行时调用 `<clinit>()`。


    ### 字段访问规则


    根据字段的类型（对象字段或类字段）和上下文（从类内部或从类外部的代码访问），字段的访问方式有所不同。以下四条规则将帮助你在不同上下文中访问不同类型的字段时避免错误：


    *   当从同一类的另一个实例字段、构造器或实例方法中访问实例字段时，指定不带前缀的实例字段名。示例：`make`。


    *   当从同一类的另一个实例字段或类字段、构造器、实例方法或类方法中访问类字段时，指定不带前缀的类字段名。示例：`count`。


    *   当从其类外部或从同一类的类方法中访问实例字段时（假设该字段可访问），指定对象引用后跟 `.` 运算符再跟实例字段名。示例：`v.make`。


    *   当从其类外部访问类字段时（假设该字段可访问），指定类名后跟 `.` 运算符再跟类字段名。示例：`Counter.count`。


    不要忘记，在某些情况下，变量遮蔽是一个问题。你可以通过在实例字段名前添加 `this` 后跟 `.` 运算符，或在类字段名前添加类名后跟 `.` 运算符来解决此问题。例如，如果你必须将参数值赋给同名的实例字段，你也需要在字段名前添加
    `this` 和 `.` 运算符。

