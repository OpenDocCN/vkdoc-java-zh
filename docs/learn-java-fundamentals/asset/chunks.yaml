    These methods perform tasks that are common to all classes. For example, `clone()`
    lets you create and return a copy of the object on which this method is invoked.


    I introduce most of these methods in the following sections. I don’t cover the
    `notify()`, `notifyAll()`, and overloaded `wait()` methods because they are covered
    in my *Java Threads and the Concurrency Utilities* book ([`www.amazon.ca/Java-Threads-Concurrency-Utilities-FRIESEN/dp/1484216997/`](http://www.amazon.ca/Java-Threads-Concurrency-Utilities-FRIESEN/dp/1484216997/)).


    #### Cloning Objects


    The `clone()` method creates and returns a copy of the object on which it’s called.
    There are two forms of cloning: shallow cloning and deep cloning. After discussing
    these forms, this section explores array cloning.


    ##### Shallow Cloning


    *Shallow cloning* (also known as *shallow copying*) duplicates an object’s fields
    without duplicating the objects referenced from those fields. Listing [7-8](#615966_1_En_7_Chapter.xhtml#PC19)
    presents a `CloneDemo` application’s source code that shows you how to accomplish
    shallow cloning.


    ```

    class Date

    {

    private int year, month, day;

    Date(int year, int month, int day)

    {

    this.year = year;

    this.month = month;

    this.day = day;

    }

    int getDay()

    {

    return day;

    }

    int getMonth()

    {

    return month;

    }

    int getYear()

    {

    return year;

    }

    }

    class Employee implements Cloneable

    {

    private String name;

    private int age;

    private Date hireDate;

    Employee(String name, int age, Date hireDate)

    {

    this.name = name;

    this.age = age;

    this.hireDate = hireDate;

    }

    String getName()

    {

    return name;

    }

    int getAge()

    {

    return age;

    }

    Date getHireDate()

    {

    return hireDate;

    }

    @Override

    public Object clone() throws CloneNotSupportedException

    {

    return super.clone();

    }

    }

    class CloneDemo

    {

    public static void main(String[] args) throws CloneNotSupportedException

    {

    Employee john = new Employee("John Doe", 37, new Date(1999, 10, 8));

    System.out.println("Name: " + john.getName() +

    ", Age: " + john.getAge() +

    ", Hire Date: " + john.getHireDate());

    Employee john2 = (Employee) john.clone();

    System.out.println("Name: " + john2.getName() +

    ", Age: " + john2.getAge() +

    ", Hire Date: " + john2.getHireDate());

    }

    }

    Listing 7-8

    CloneDemo.java

    ```


    Listing [7-8](#615966_1_En_7_Chapter.xhtml#PC19) first declares a simple `Date`
    class that describes a date in terms of year, month, and day integer fields. The
    constructor updates these fields, and getter methods return their values.


    Listing [7-8](#615966_1_En_7_Chapter.xhtml#PC19) next declares an `Employee` class
    whose objects are to be cloned. This class must implement the empty `Cloneable`
    interface to inform `clone()` that it’s legal for that method to make a field-for-field
    copy of `Employee` objects. (I introduce interfaces in Chapter [8](#615966_1_En_8_Chapter.xhtml).)
    When `Cloneable` isn’t implemented, `clone()` throws `CloneNotSupportedException`.
    (I discuss exceptions in Chapter [11](#615966_1_En_11_Chapter.xhtml).)


    Because `clone()` is marked `protected`, it must be overridden in `Employee`.
    Note the presence of the `@Override` annotation, which I briefly mentioned earlier
    in this chapter.


    You must specify the `public` access specifier when overriding `clone()`. When
    you don’t specify an access specifier (you are indicating package private access),
    the compiler reports an attempt to assign weaker access privileges.


    When you specify `private`, the compiler reports that `clone()` has private access
    in `Employee`, in addition to an attempt to assign weaker access privileges. When
    you specify `protected`, the source code compiles, but a `CloneNotSupportedException`
    object is thrown at runtime.


    `Employee`’s `clone()` method executes `super.clone()` to invoke `Object`’s `clone()`
    method, which performs a field-for-field copy of the class that implements `Cloneable`.
    In this case, `Object`’s `clone()` method copies the invoking `Employee` object’s
    `name`, `age`, and `hireDate` fields.


    The `main()` method’s `Employee john2 = (Employee) john.clone();` statement demonstrates
    the clone operation. It casts `john.clone()`’s return type to `Employee` because
    `clone()`’s return type is `Object`.


    Compile Listing [7-8](#615966_1_En_7_Chapter.xhtml#PC19) as follows:


    ```

    javac CloneDemo.java

    ```


    Run the resulting application as follows:


    ```

    java CloneDemo

    ```


    You should observe the following output (the hexadecimal number after the `@`
    symbol might be different):


    ```

    Name: John Doe, Age: 37, Hire Date: Date@28a418fc

    Name: John Doe, Age: 37, Hire Date: Date@28a418fc

    ```


    You might be expecting to see the employee’s hiring date in terms of year, month,
    and day components. Instead, you see a default string representation of the `Date`
    object. This representation consists of the `Date` class name, the `@` symbol,
    and a hexadecimal value (which represents a hash code, discussed later in this
    chapter). This default string representation is a visual way of noting an object’s
    reference.


    You can see that the original `Employee` object and its clone refer to the same
    `Date` object because the default string representation is the same for each object.
    This is an example of shallow cloning.


    To be a true clone, the `Employee` clone should reference a new `Date` object
    that records the hire date. In other words, the `Employee` object should be deeply
    cloned.'
