  trans: '

    ## 接下来做什么？


    既然你已经掌握了表达式，接下来可以探索语句了。许多语句与表达式协同工作，帮助你创建更有趣的程序。


    # 4. 语句


    计算机程序通过语句执行任务。本章将介绍赋值语句、决策语句、循环语句、循环分支语句以及其他语句。


    ## 语句简介


    **语句**是一种语法单元，用于表达要执行的某个动作。语句用于给变量赋值、通过决策控制执行流程、重复执行其他语句特定次数或无限次，以及执行其他任务。


    通过将语句放在`{`和`}`字符之间，可以将多条语句组合在一起，视为一条语句。这种复合语句称为**块**。除块之外的每条语句都必须以分号（`;`）结尾。虽然可以用分号结束一个块，但这不符合惯例。


    ## 赋值语句


    **赋值语句**将表达式的结果赋给一个变量。它有两种形式：简单赋值语句和复合赋值语句。


    ### 简单赋值语句


    **简单赋值语句**计算`=`运算符右侧的表达式，并将结果赋给左侧的变量。其语法如下：


    ```

    变量 ''='' 表达式 '';''

    ```


    该语句以**变量**名开头，接着是`=`运算符，最后以**表达式**和分号结尾。以下是两个示例，假设变量已事先声明：


    ```

    healthyBodyTemp = 98.6; // healthyBodyTemp 是 double 类型

    name = "John Doe"; // name 是 String 类型

    ```


    注意


    在变量声明中初始化变量是简单赋值语句的一种形式，例如 `int age = 30;`。


    ### 复合赋值语句


    与简单赋值语句密切相关的是**复合赋值语句**，它一步完成操作并将结果赋给变量。该语句的语法如下：


    ```

    变量 (''+='' | ''-='' | ''*='' | ''/='' | ''%='' | ''&='' | ''^='' | ''|='' | ''=''
    | ''>>>='') 表达式 '';''

    ```


    该语句以**变量**名开头，接着是指定的复合赋值运算符之一，最后以**表达式**和分号结尾。以下是一个示例，假设变量已事先声明：


    ```

    counter += 1; // 将 counter 的值加 1，并将结果和存储在 counter 中。

    ```


    ## 决策语句


    **决策语句**允许 Java 程序在两条或多条执行路径之间做出选择。决策语句有三种：`if`、`if`-`else` 和 `switch`。


    ### If 语句


    **if 语句**计算一个布尔表达式，当该表达式为 true 时执行另一条语句。该语句的语法如下：


    ```

    ''if'' ''('' 表达式 '')''

    语句

    ```


    `if` 语句以保留字 `if` 开头，接着是括号内的布尔**表达式**。随后是**语句**，当**表达式**为 true 时执行该语句。


    `if` 语句的示例如下：


    ```

    if (temperature < 70)

    turn_on_furnace();

    ```


    如果 `temperature` 的值降至华氏 70 度以下（通过计算布尔表达式 `temperature < 70` 并发现其值为 true 来确定），则调用方法
    `turn_on_furnace()` 来打开暖气并加热房间。（我将在第 6 章讨论方法。）


    ### If-Else 语句


    **if-else 语句**计算一个布尔表达式，并根据该表达式计算结果为 true 还是 false 来执行两条语句中的一条。该语句的语法如下：


    ```

    ''if'' ''('' 表达式 '')''

    语句 1

    ''else''

    语句 2

    ```


    `if`-`else` 语句以保留字 `if` 开头，接着是括号内的布尔**表达式**。随后是**语句 1**，当**表达式**为 true 时执行；接着（在保留字
    `else` 之后）是**语句 2**，当**表达式**为 false 时执行。


    该语句的示例如下：


    ```

    if (temperature < 70)

    turn_on_furnace();

    else

    turn_off_furnace();

    ```


    如果 `temperature` 的值降至华氏 70 度以下（通过计算布尔表达式 `temperature < 70` 并发现其值为 true 来确定），则调用方法
    `turn_on_furnace()` 来打开暖气并加热房间。否则，调用方法 `turn_off_furnace()` 来关闭暖气（房间已达到 70 度）。


    你可以将多个 `if`-`else` 语句链接在一起，如下所示：


    ```

    ''if'' ''('' 表达式 1 '')''

    语句 1

    ''else''

    ''if'' ''('' 表达式 2 '')''

    语句 2

    ''else''

    ''if'' ''('' 表达式 3 '')''

    语句 3

    ''else''

    ...

    语句 N

    ```


    如果**表达式 1**为 true，则执行**语句 1**。然而，如果**表达式 2**为 false，则执行 `if ''(''` **表达式 2** `'')''`
    并计算**表达式 2**。如果为 true，则执行**语句 2**。此过程持续进行，直到其中一个表达式为 true 并执行其对应的语句。如果所有表达式都不为
    true，则到达 `else` 并执行**语句 N**（默认语句）。


    以下示例演示了这种链接能力：


    ```

    if (direction == "North")

    travelNorth();

    else

    if (direction == "East")

    travelEast();

    else

    if (direction == "South")

    travelSouth();

    else

    travelWest();

    ```


    悬挂 else 问题


    当 `if` 和 `if`-`else` 一起使用时，如果源代码缩进不当，可能难以确定哪个 `if` 与 `else` 配对。例如：


    ```

    if (file.isOpen())

    if (file.isReadable())

    file.read();

    else

    file.open();

    ```


    开发者是否意图让 `else` 匹配内部的 `if`，但代码格式不当导致看起来并非如此？例如：


    ```

    if (file.isOpen())

    if (file.isReadable())

    file.read();

    else

    file.open();

    ```


    如果 `file.isOpen()` 和 `file.isReadable()` 都返回 true，则执行 `file.read();`。如果 `file.isOpen()`
    返回 true 而 `file.isReadable()` 返回 false，则执行 `file.open();`。尝试打开一个已打开的文件毫无意义。


    开发者本意一定是想让 `else` 匹配外部的 `if`，但忘记了 `else` 匹配最近的 `if`。这个问题可以通过用花括号将内部的 `if` 括起来解决，如下所示：


    ```

    if (file.isOpen())

    {

    if (file.isReadable())

    file.read();

    }

    else

    file.open();

    ```


    当 `file.isOpen()` 返回 true 时，执行紧随其后的块。当此方法返回 false 时，执行 `file.open();`，这合情合理。


    忘记 `else` 匹配最近的 `if` 并使用糟糕的缩进来掩盖这一事实，被称为**悬挂 else 问题**。

