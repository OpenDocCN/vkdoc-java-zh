    # 5. 数组


    Java 支持数组，这是最古老且使用最广泛的数据结构之一（“一种通常为了高效访问数据而选择的数据组织、管理和存储格式”——更多信息请参见 [`http://en.wikipedia.org/wiki/Data_structure`](http://en.wikipedia.org/wiki/Data_structure)）。本章将介绍
    Java 在一维数组和二维数组方面对数组的支持，并通过搜索和排序演示一维数组，通过矩阵乘法演示二维数组。


    ## 数组简介


    *数组*是一种*数据结构*，由一系列具有相同内存大小的*元素*（存储在数组中的值）组成，其中每个元素至少与一个*索引*（唯一标识一个元素的非负整数）相关联。与元素关联的索引数量称为数组的*维度*。


    在 Java 中，数组具有固定大小。你不能扩展或收缩数组。相反，你需要创建一个所需大小的新数组，将当前数组中的元素复制到新数组，然后销毁当前数组。


    ## 一维数组


    *一维数组*（1D 数组——也称为*向量*）是一种将每个元素与一个索引关联的数组。它用于存储值的列表。数组通过数组变量存储，其语法如下：


    ```

    type ''['' '']'' identifier

    ```


    或


    ```

    type identifier ''['' '']''

    ```


    方括号可以出现在*类型*名称之后（推荐方式），或出现在命名变量的*标识符*之后（这种方式是为了让 C 和 C++ 程序员平滑过渡到 Java 而引入的）。它们表示*标识符*引用了一个一维数组，其元素具有指定的*类型*。该数组的类型是
    *type*`[]`。


    ### 创建一维数组


    创建一维数组有三种方法：仅使用初始化器、仅使用关键字 `new`，以及将关键字 `new` 与初始化器结合使用。


    #### 仅使用初始化器


    仅使用初始化器的方法遵循以下语法：


    ```

    ''{'' [expr ('','' expr)*]  ''}''

    ```


    该语法表明，一维数组是一个可选的、由逗号分隔的表达式列表，出现在左大括号和右大括号字符之间。此外，所有表达式的类型必须兼容。例如，一个表达式不能是字符串，而另一个表达式是整数。


    注意


    上述语法使用了特殊符号来提供紧凑的表示形式。此外，程序员必须提供的值放在单引号（`''`）或双引号（`"`）之间。`[` 和 `]` 之间的所有内容都是可选的。`(`
    和 `)` 之间的所有内容被视为一个整体。`*` 表示重复 `(` 和 `)` 之间的内容零次或多次。`+` 表示重复 `(` 和 `)` 之间的内容一次或多次。我在前面的章节中已经介绍过这种语法的一部分，并将在后续章节中继续使用。


    以下示例演示了使用初始化器创建一维数组的方法：


    ```

    String[] directions = {"North", "South", "East", "West"};

    ```


    该示例创建了一个包含四个字符串的一维数组，并将该一维数组的引用赋值给 `directions`。图 5-1 展示了该数组的概念视图。


    ![](img/615966_1_En_5_Fig1_HTML.jpg)


    四个矩形块分别表示：North 0。South 1。East 2。West 3。


    图 5-1


    赋值给 directions 的数组的概念视图


    `North` 位于索引 0，`South` 位于索引 1，`East` 位于索引 2，`West` 位于索引 3。


    #### 仅使用关键字 new


    仅使用关键字 `new` 的方法遵循以下语法：


    ```

    ''new'' type ''['' int_expr '']''

    ```


    关键字 `new` 为数组分配内存。元素的数量由 *int_expr*（一个通常大于 0 的非负整数）指定，每个元素的大小由 *type* 隐含。所有元素都会被清零（并解释为
    `0`、`0L`、`0.0F`、`0.0`、`false`、`null` 或 `''\u0000''`）。


    预分配零大小的数组


    有时，*int_expr* 会指定为 `0`。当程序员编写一个方法来预分配数组，并且该方法需要知道数组的元素类型时，会指定零——该方法不关心数组的大小。例如，你可以指定以下内容：


    ```

    ArrayList list = new ArrayList(100);

    int[] copy = list.toArray(new int[0]);

    ```


    此示例首先创建一个数组列表，并将其引用赋值给类型为 `ArrayList` 的列表变量。然后，它调用 `ArrayList` 的 `toArray()` 方法（关于方法的讨论请参见第
    6 章）将数组列表转换为数组。表达式 `new int[0]` 被传递给 `toArray()`，以便该方法预分配一个可以容纳列表中所有元素的 `int[]`
    数组。（我们假设每个元素都是 `int` 类型。）此外，`toArray()` 返回该数组。但是，如果你指定了以下内容：


    ```

    double[] copy = list.toArray(new double[0]);

    ```


    `toArray()` 方法将返回一个类型为 `double[]` 的数组。`toArray()` 能够改变其返回类型是*泛型*的一个特性，这是对 Java
    类型系统的增强，允许类型或方法操作各种类型的对象，同时提供编译时类型安全。（我在本书中不讨论泛型，因为我认为它不是基础特性。）


    前面的示例（不包括元素值）可以表示如下：


    ```

    String[] directions = new String[4];

    ```


    值将在稍后填充。


    #### 将关键字 new 与初始化器结合使用


    创建数组的最后一种方法是将关键字 `new` 与初始化器结合使用。这种方法具有以下语法：


    ```

    ''new'' type ''['' '']'' ''{'' [expr ('','' expr)*] ''}''

    ```


    该语法融合了前两种语法。由于元素的数量可以从逗号分隔的表达式列表中确定，因此不需要（也不允许）在方括号之间提供 *int_expr*。


    以下示例演示了将关键字 `new` 与初始化器结合使用创建一维数组的方法：


    ```

    String[] directions = new String[] {"North", "South", "East", "West"};

    ```


    仅使用初始化器方法的语法是第三种方法的*语法糖*（使语言更易于使用的语法）。你可以使用数组索引运算符来索引此数组并访问元素。


    ### 访问一维数组元素


    一维数组变量与一个 `.length` 属性相关联，该属性将关联的一维数组的长度作为正 `int` 值返回；例如，`directions.length` 返回
    4。这个值在访问一维数组的元素时很重要。


    给定一个一维数组变量，你可以通过指定符合以下语法的表达式来访问任何元素：


    ```

    array_var ''['' index '']''

    ```


    这里，*index* 是一个正 `int` 值，范围从零（Java 数组是基于零的）到 `.length` 属性返回值减一。


    考虑之前的 `directions` 数组。以下示例引用了第一个元素：


    ```

    directions[0]

    ```


    你可以按如下方式打印此元素：


    ```

    System.out.println(directions[0]);

    ```


    你可以使用 `for` 循环打印所有元素，如下所示：


    ```

    for (int i = 0; i < directions.length; i++)

    System.out.println(directions[i]);

    ```


    你可以按如下方式修改第三个元素：


    ```

    directions[2] = "EAST"; // 因为 Java 数组是基于 0 的，所以 directions[2]

    // 访问的是第三个元素。

    ```


    如果你指定了负索引或大于等于数组长度的索引，Java 将创建并抛出一个 `ArrayIndexOutOfBoundsException` 对象。当我在第 11
    章讨论异常时，我会对此主题进行更多说明。

