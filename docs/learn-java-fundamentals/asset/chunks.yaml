    ## Extending Interfaces


    A class that implements an interface reveals *interface inheritance*. The class
    inherits the interface’s constants and method headers, which it overrides. For
    example, each of `ArrayCollection` and `LinkedCollection` inherits `Collection`’s
    `add()`, `contains()`, and `length()` method headers.


    Interface inheritance is also demonstrated when an interface extends another interface.
    Just as a subclass can extend a superclass via reserved word `extends`, you can
    use this reserved word to have a subinterface extend a superinterface. Listing
    [8-9](#615966_1_En_8_Chapter.xhtml#PC15) demonstrates.


    ```

    interface List extends Collection

    {

    String get(int i);

    }

    Listing 8-9

    List.java

    ```


    The `List` interface extends `Collection`, inheriting its method headers. It also
    introduces a `get()` method that returns the string at the `i`th position in the
    list, or null when `i` is less than 0 or greater than or equal to `list`’s length.


    Listing [8-10](#615966_1_En_8_Chapter.xhtml#PC16) presents an `ArrayList` class
    that implements the `List` interface.


    ```

    class ArrayList implements List

    {

    private String[] items;

    private int length;

    ArrayList(int size)

    {

    items = new String[size];

    length = 0;

    }

    @Override

    public void add(String item)

    {

    if (length == items.length)

    resize(items.length * 2);

    items[length++] = item;

    }

    @Override

    public boolean contains(String item)

    {

    for (int i = 0; i < length; i++)

    if (items[i].equals(item))

    return true;

    return false;

    }

    @Override

    public int length()

    {

    return length;

    }

    @Override

    public String get(int index)

    {

    if (index < 0 || index >= length)

    return null;

    return items[index];

    }

    void resize(int newSize)

    {

    String[] items2 = new String[newSize];

    for (int i = 0; i < length; i++) // copy items to items2

    items2[i] = items[i];

    items = items2;

    }

    }

    Listing 8-10

    ArrayList.java

    ```


    I previously described the `add()`, `contains()`, and `length()` methods that
    `List` inherits from `Collection`. I also described the `resize()` method.


    `List`’s `get()` method validates the argument passed to its `index` parameter:
    the argument must be greater than or equal to 0 and less than the length of the
    array that stores the list’s strings. This method returns null when this is not
    the case; otherwise, it returns the string at that index.


    Listing [8-11](#615966_1_En_8_Chapter.xhtml#PC17) presents a `LinkedList` class
    that implements the `List` interface.


    ```

    class LinkedList implements List

    {

    private Node top, last;

    private int length;

    LinkedList()

    {

    top = null;

    last = null;

    length = 0;

    }

    @Override

    public void add(String item)

    {

    Node node = new Node();

    node.item = item;

    node.next = null;

    if (last != null)

    last.next = node;

    last = node;

    if (top == null)

    top = node;

    length++;

    }

    @Override

    public boolean contains(String item)

    {

    Node node = top;

    for (int i = 0; i < length; i++)

    {

    if (node.item.equals(item))

    return true;

    node = node.next;

    }

    return false;

    }

    @Override

    public int length()

    {

    return length;

    }

    @Override

    public String get(int index)

    {

    if (index < 0 || index >= length)

    return null;

    Node node = top;

    int count = 0;

    while (true)

    {

    if (count++ == index)

    break;

    node = node.next;

    }

    return node.item;

    }

    }

    class Node

    {

    String item;

    Node next;

    }

    Listing 8-11

    LinkedList.java

    ```


    As with `ArrayList`, I previously described the `add()`, `contains()`, and `length()`
    methods that `List` inherits from `Collection`.


    `List`’s `get()` method first validates the argument passed to its `index` parameter:
    the argument must be greater than or equal to 0 and less than the length of the
    array that stores the list’s strings. This method returns null when this is not
    the case; otherwise, it returns the string at that index.


    The `get()` method then navigates through the linked list until it finds the node
    at the specified index value and returns the node’s item.


    The navigation logic might appear difficult to follow, but it isn’t that hard.
    It starts by assigning `top`’s value to the `node` local variable and then initializing
    a `count` local variable to 0. These variables control the navigation.'
