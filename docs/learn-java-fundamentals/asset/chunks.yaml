    `v.drive();`. Which `drive()` method is called: `Vehicle`’s `drive()` method or
    `Truck`’s `drive()` method? The compiler doesn’t know which `drive()` method to
    call. All it can do is verify that a method exists in the superclass and verify
    that the method call’s arguments list and return type match the superclass’s method
    declaration. However, the compiler also inserts an instruction into the compiled
    code that, at runtime, fetches and uses whatever reference is in `v` to call the
    correct `drive()` method. This task is known as *late binding*.


    Note


    Late binding is used for calls to non-final object methods. For all other method
    calls, the compiler knows which method to call. It inserts an instruction into
    the compiled code that calls the method associated with the variable''s type (not
    its value). This task is known as *early binding*.


    ## Abstract Classes and Abstract Methods


    When designing class hierarchies, you’ll find that classes nearer the top of these
    hierarchies are more generic than classes that are lower down. For example, a
    `Vehicle` superclass is more generic than a `Truck` subclass. Similarly, an `Account`
    superclass is more generic than a `CheckingAccount` subclass.


    It doesn’t make sense to create objects from a generic class. After all, what
    would an `Account` object describe apart from being an account? Is it a savings
    account or a checking account, or something else? Similarly, what kind of vehicle
    is represented by a `Vehicle` object (truck, plane, bicycle, and so on)? Rather
    than coding an empty `drive()` method in `Vehicle` (press the gas pedal in a truck,
    pedal a bicycle, and kick off and push forward on a skateboard), you can prevent
    this method from being called and this class from being instantiated by declaring
    both entities to be abstract.


    Java’s `abstract` reserved word lets you declare a class that cannot be instantiated.
    The compiler reports an error when you try to instantiate this class. The `abstract`
    reserved word is also used to declare a method without a body. The `drive()` method
    doesn’t need a body because it is unable to drive an abstract vehicle. Listing
    [8-1](#615966_1_En_8_Chapter.xhtml#PC1) demonstrates.


    ```

    abstract class Vehicle

    {

    private String make, model;

    private int year;

    Vehicle(String make, String model, int year)

    {

    this.make = make;

    this.model = model;

    this.year = year;

    }

    abstract void drive();

    String getMake()

    {

    return make;

    }

    String getModel()

    {

    return model;

    }

    int getYear()

    {

    return year;

    }

    @Override

    public String toString()

    {

    return "Make: " + make + ", Model: " + model + ", Year: " + year;

    }

    }

    Listing 8-1

    Vehicle.java

    ```


    Listing [8-1](#615966_1_En_8_Chapter.xhtml#PC1) shows you that an abstract class
    can declare fields, constructors, and non-abstract methods in addition to (or
    even instead of) abstract methods.


    Notice that `Vehicle` declares an abstract `drive()` method to describe how to
    drive the vehicle. For example, you press the gas pedal to drive a truck. `Vehicle`’s
    subclasses would override `drive()` and provide an appropriate description. They
    would also inherit the methods, and their constructors would call `Vehicle`’s
    constructor.


    Caution


    The compiler reports an error when you attempt to declare a class abstract and
    final. For example, the compiler complains about `abstract final class Vehicle`
    because an abstract class cannot be instantiated and a final class cannot be extended.


    The compiler also reports an error when you declare a method abstract but don’t
    declare its class abstract. Removing `abstract` from the `Vehicle` class’s header
    in Listing [8-1](#615966_1_En_8_Chapter.xhtml#PC1) would result in an error. This
    would be an error because a non-abstract (concrete) class cannot be instantiated
    when it contains an abstract method.


    Finally, when you extend an abstract class, the extending class must override
    all of the abstract methods, or else the extending class must itself be declared
    to be abstract; otherwise, the compiler will report an error.'
