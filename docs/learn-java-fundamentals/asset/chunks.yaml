    `main()` 方法首先验证是否至少指定了一个命令行参数。如果没有，则输出用法信息。


    接着，`main()` 创建一个 `StringBuffer` 对象，然后进入一个 `for` 循环，将每个命令行参数追加到字符串缓冲区中。它通过调用 `StringBuffer`
    的 `append(String s)` 方法来执行追加操作，并将表达式 `args[i] +` `" "` 传递给 `append()`。


    最后，`main()` 输出存储在字符串缓冲区中的文本，并在对字符串缓冲区的内容调用 `StringBuffer` 的 `reverse()` 方法后，输出反转后的字符串。在这两种情况下，`StringBuffer`
    继承自 `Object` 的 `toString()` 方法都会将字符串缓冲区的内容转换为字符串。


