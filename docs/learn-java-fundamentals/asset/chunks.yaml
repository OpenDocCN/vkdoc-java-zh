- fmt: '# Searching and Sorting


    Programmers often write code to search a 1D array for a specific element and to
    sort a 1D array’s elements into ascending or descending order of value. Two commonly
    used search algorithms are *Linear Search* and *Binary Search*. *Bubble Sort*
    is a simple algorithm for sorting, but one that isn’t efficient for large arrays.


    ## Linear Search


    *Linear Search* searches a 1D array of *n* elements for a specific element by
    comparing elements from the lowest to the highest index until it finds the element
    or there are no more elements to compare.


    I’ve created an `LSearch` application that demonstrates Linear Search. Listing
    [5-1](#615966_1_En_5_Chapter.xhtml#PC16) presents this application’s source code.


    ```

    class LSearch

    {

    public static void main(String[] args)

    {

    int[] grades = { 86, 92, 68, 75, 79, 81 };

    int gradeToSearch = 68;

    int i;

    for (i = 0; i < grades.length; i++)

    if (grades[i] == gradeToSearch)

    {

    System.out.println("Found " + gradeToSearch + " at position " + i);

    break;

    }

    if (i == grades.length)

    System.out.println("Could not find " + gradeToSearch);

    gradeToSearch = 74;

    for (i = 0; i < grades.length; i++)

    if (grades[i] == gradeToSearch)

    {

    System.out.println("Found " + gradeToSearch + " at position " + i);

    break;

    }

    if (i == grades.length)

    System.out.println("Could not find " + gradeToSearch);

    }

    }

    Listing 5-1

    LSearch.java

    ```


    `LSearch` first searches a `grades` array for element `68`. It finds this element
    and outputs a success message. It then searches `grades` for element `74`. Because
    this element is not present, `LSearch` outputs a failure message.


    Assuming that you’ve copied Listing [5-1](#615966_1_En_5_Chapter.xhtml#PC16) to
    a file named `LSearch.java`, compile Listing [5-1](#615966_1_En_5_Chapter.xhtml#PC16)
    as follows:


    ```

    javac LSearch.java

    ```


    If compilation succeeds, you should observe an `LSearch.class` file in the current
    directory. Run this application as follows:


    ```

    java LSearch

    ```


    You should observe the following output:


    ```

    Found 68 at position 2

    Could not find 74

    ```


    ## Binary Search


    Linear Search is a simple algorithm to implement. However, it is quite slow to
    accomplish its task for very long arrays. In the worst case, it might have to
    examine all elements when the desired element is in the last array slot. On average,
    it has to search about half the array. Fortunately, there exists a faster algorithm
    for searching 1D arrays.


    *Binary Search* searches a 1D array of *n* elements for a specific element by
    adhering to the following steps:


    1. Set `low` and `high` index variables to the indexes of the array’s first and
    last elements, respectively.

    2. Terminate when the `low` index is greater than the `high` index. The searched-for
    element is not in the array.

    3. Calculate the middle index by summing the `low` and `high` indexes and dividing
    the sum by 2.

    4. Compare the searched-for element with the middle-indexed data item. Terminate
    when they are the same. The searched-for element has been found.

    5. If the searched-for element is greater than the middle-indexed element, set
    the `low` index to the middle index plus one and transfer execution to step 2.
    Binary Search repeats the search in the upper half of the array.

    6. The searched-for element must be smaller than the middle-indexed element, so
    set the `high` index to the middle index minus one and transfer execution to step
    2. Binary Search repeats the search in the lower half of the array.


    Although not as intuitive to understand as Linear Search, Binary Search is much
    faster. For example, when confronted with a 1D array with 4294967296 elements,
    Linear Search must perform an average of 2147483648 comparisons. In contrast,
    Binary Search performs a maximum of 32 comparisons.


    I’ve created a `BSearch` application that demonstrates Binary Search. Listing
    [5-2](#615966_1_En_5_Chapter.xhtml#PC20) presents this application’s source code.


    ```

    class BSearch

    {

    public static void main(String[] args)

    {

    int[] nums = { 4, 5, 8, 11, 19, 33, 42, 51, 67, 69, 83, 84, 86, 91, 93, 98 };

    int high = nums.length - 1, low = 0, mid;

    int srchint = 83;

    while (low  nums[mid])

    low = mid + 1;

    else

    if (srchint  high)

    System.out.println("Could not find " + srchint);

    high = nums.length - 1;

    low = 0;

    srchint = 27;

    while (low  nums[mid])

    low = mid + 1;

    else

    if (srchint < nums[mid])

    high = mid - 1;

    else

    {

    System.out.println("Found " + srchint);

    break;

    }

    }

    System.out.println("Could not find " + srchint);

    }

    }

