  raw: '### Ragged Arrays


    Java supports the creation of 2D arrays where each row has a different number
    of columns. The result is known as a *ragged array*. Figure [5-3](#615966_1_En_5_Chapter.xhtml#Fig3)
    presents an example.


    ![](images/615966_1_En_5_Chapter/615966_1_En_5_Fig3_HTML.jpg)


    A 2-D array with 2 rows and 3 columns. Elements from 10 to 30 are given in the
    cells.


    Figure 5-3


    A 2D array where each row has a different number of columns


    In this example, row 0 has two columns, and row 1 has three columns.


    You can create this ragged array in three ways:


    ```

    int[][] table1 = { { 10, 15 }, { 20, 25, 30 } };

    int[][] table2 = new int[2][];

    int[][] table3 = new int[][] { { 10, 15 }, { 20, 25, 30 } };

    ```


    The first and third examples create a 2D array where the first row contains two
    columns and the second row contains three columns. The second example creates
    an array with two rows and an unspecified number of columns.


    After creating `table2`’s row array, its elements must be populated with references
    to new column arrays. The following example demonstrates assigning two columns
    to the first row and three columns to the second row and populating these columns
    with the elements shown in Figure [5-3](#615966_1_En_5_Chapter.xhtml#Fig3):


    ```

    table2[0] = new int[2];

    table2[0][0] = 10;

    table2[0][1] = 15;

    table2[1] = new int[3];

    table2[1][0] = 20;

    table2[1][1] = 25;

    table2[1][2] = 30;

    ```


    You can then iterate over a ragged array (such as `table1`) and print out its
    elements as follows:


    ```

    for (int i = 0; i < table1.length; i++)

    {

    for (int j = 0; j < table1[i].length; j++)

    System.out.print(table1[i][j] + " ");

    System.out.println();

    }

    ```


    You would observe the same output as shown in Figure [5-3](#615966_1_En_5_Chapter.xhtml#Fig3).


    These code fragments are excerpts from the `RagArray` application accompanying
    this book’s code archive.


    Why would you want to use a ragged array? They save memory when a *square table*
    (a table with the same number of rows and columns) mirrors its elements across
    the diagonal. Check out Figure [5-4](#615966_1_En_5_Chapter.xhtml#Fig4).


    ![](images/615966_1_En_5_Chapter/615966_1_En_5_Fig4_HTML.jpg)


    A 2-D array with 3 rows and 3 columns. Elements from 5 to 20 are given in the
    cells. The elements in the mirror rows and columns are the same.


    Figure 5-4


    A 2D array that mirrors its elements across the diagonal


    Each diagonal element is 10\. Notice that row 0, column 1 (5) is the same as row
    1, column 0 (5); row 0, column 2 (20) is the same as row 2, column 0 (20); and
    row 1, column 2 (15) is the same as row 2, column 1 (15). Because the elements
    are the same, there is no point in storing the elements above and to the right
    of the diagonal. This leads us to Figure [5-5](#615966_1_En_5_Chapter.xhtml#Fig5).


    ![](images/615966_1_En_5_Chapter/615966_1_En_5_Fig5_HTML.jpg)


    An array with the diagonal number of elements by 3\. They are 10\. 5. 20\. 15.


    Figure 5-5


    A ragged array that reduces the number of elements by 3


    Ragged arrays are useful in linear algebra when working with very large *diagonal
    matrixes* (the elements outside the main diagonals are all zeroes – see [`http://en.wikipedia.org/wiki/Diagonal_matrix`](http://en.wikipedia.org/wiki/Diagonal_matrix)).
    Because diagonal matrixes are square, you can save a lot of memory by not storing
    the 0 elements above the main diagonal.


    ## Matrix Multiplication


    *Linear algebra* is a branch of mathematics that involves *linear* (line) equations.
    It uses *matrixes* (tables) extensively.


    Multiplying one matrix with another is a common task in computer graphics, economics,
    the transportation industry, and other fields. For example, the *Matrix Multiplication*
    algorithm would be used to determine which of several cities provides maximum
    income when shipping several different products to several different cities.


    Matrix Multiplication works as follows. Let A represent a matrix with m rows and
    p columns. Let B represent a matrix with p rows and n columns. Multiply A by B
    to produce matrix C, with m rows and n columns. Each C[ij] entry in C is obtained
    by multiplying all entries in A’s ith row by corresponding entries in B’s jth
    column and adding the results. Figure [5-6](#615966_1_En_5_Chapter.xhtml#Fig6)
    shows you these operations.


    ![](images/615966_1_En_5_Chapter/615966_1_En_5_Fig6_HTML.jpg)


    A matrix multiplication. Each row in A is multiplied and added by B and then ends
    with an entry in C.


    Figure 5-6


    A look at each row in A being multiplied and added with the corresponding column
    in B to produce an entry in C


    Note


    Matrix Multiplication requires that the number of columns (p) in the left matrix
    (A) equal the number of rows (p) in the right matrix (B). Otherwise, this algorithm
    won''t work.


    I’ve created a `MatMult` application to demonstrate Matrix Multiplication. Listing
    [5-4](#615966_1_En_5_Chapter.xhtml#PC48) presents this application’s source code.


    ```

    class MatMult

    {

    public static void main(String[] args)

    {

    // Allocate two matrixes to be multiplied together.

    // m1 is a 2 row-by-2 column matrix.

    // m2 is a 2 row-by-1 column matrix.

    int[][] m1 = {{ 80, 60 }, { 59, 32 }};

    int[][] m2 = {{ 4 }, { 19 }};

    // Print out m1.

    for (int i = 0; i < m1.length; i++)

    {

    for (int j = 0; j < m1[0].length; j++)

    System.out.print(m1[i][j] + " ");

    System.out.println();

    }

    System.out.println();

    // Print out m2.

    for (int i = 0; i < m2.length; i++)

    {

    for (int j = 0; j < m2[0].length; j++)

    System.out.print(m2[i][j] + " ");

    System.out.println();

    }

    System.out.println();

    // Allocate result 2-by-1 matrix.

    int[][] m3 = new int[m1.length][m2[0].length];

    // Multiply m1 by m2 and add results to m3.

    for (int i = 0; i < m1.length; i++)

    for (int j = 0; j < m2[0].length; j++)

    for (int k = 0; k < m1[0].length; k++) // or k < m2.length

    m3[i][j] += m1[i][k] * m2[k][j];

    // Print out m3.

    for (int i = 0; i < m3.length; i++)

    {

    for (int j = 0; j < m3[0].length; j++)

    System.out.print(m3[i][j] + " ");

    System.out.println();

    }

    }

    }

    Listing 5-4

    MatMult.java

    ```


    `MatMult` first declares a pair of matrixes `m1` and `m2` and prints out their
    contents. It then allocates space for a result matrix `m3`, holding the multiplication
    result. The multiplication is performed, and the contents of `m3` are printed.


    Assuming that you’ve copied Listing [5-4](#615966_1_En_5_Chapter.xhtml#PC48) to
    a file named `MatMult.java`, compile Listing [5-4](#615966_1_En_5_Chapter.xhtml#PC48)
    as follows:


    ```

    javac MatMult.java

    ```


    If compilation succeeds, you should observe a `MatMult.java` file in the current
    directory. Run this application as follows:


    ```

    java MatMult

    ```


    You should observe the following output:


    ```

    80 60

    59 32


    ```


    ## What’s Next?


    Arrays are objects that are created from array types, which are similar to classes.
    I focus on classes and objects in Chapter [6](#615966_1_En_6_Chapter.xhtml).


    # 6. Classes and Objects


    This chapter introduces you to classes and objects. It then focuses on ten additional
    topics that you need to know when working with these language features.


    ## Introducing Classes


    *Classes* are templates for creating your own user-defined types. You use classes
    to describe virtual entities such as an account or physical entities such as a
    vehicle.


    In this section, you first learn how to declare classes. You then learn how to
    populate classes with fields, methods, and constructors.'
