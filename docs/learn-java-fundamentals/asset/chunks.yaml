- fmt: '### Type Cast


    The `(type)` operator casts (converts) the type of its operand to `type`. The
    operand value is changed to the equivalent value in the new type. This operator
    has the following syntax:


    ```

    ''('' type '')'' operand

    ```


    Consider the following example:


    ```

    int x = (int) 1.0;

    ```


    This example converts `double` value `1.0` to `int` value `1`. This value is then
    assigned to `int` variable `x`. Without the cast, the compiler reports an error.


    ### Unary Post-increment/Post-decrement Operators


    Java supports the post-increment (`++`) and post-decrement (`--`) unary operators.


    #### Post-increment


    The `++` operator post-increments its operand, which must be a variable of `char`,
    `byte`, `short`, `int`, `long`, `float`, or `double` type. The result is stored
    in the variable. It is a fast way of adding 1 to the variable. This operator has
    the following syntax:


    ```

    variable ''++''

    ```


    Consider the following example:


    ```

    int x = 1;

    int y = x++;

    ```


    After this example runs, `y` is assigned the value 1. However, `x` contains 2.


    #### Post-decrement


    The `--` operator post-decrements its operand, which must be a variable of `char`,
    `byte`, `short`, `int`, `long`, `float`, or `double` type. The result is stored
    in the variable. It is a fast way of subtracting 1 from the variable. This operator
    has the following syntax:


    ```

    variable ''--''

    ```


    Consider the following example:


    ```

    int x = 1;

    int y = --x;

    ```


    After this example runs, `y` is assigned the value 0.


    ### Additional Operators


    Java also supports the parentheses (`()`), array index (`[]`), and member selection
    (`.`) operators.


    #### Parentheses


    The `()` operator lets you change the precedence order of a numeric expression.
    For example, consider the following expression:


    ```

    4 + 2 * 3

    ```


    In this expression, `2 * 3` is evaluated first. Then, its product is added to
    `4`.


    You can change the evaluation order by using parentheses. Consider this expression:


    ```

    (4 + 2) * 3

    ```


    In this expression, `4 + 2` is evaluated first. Then, its sum is multiplied by
    `3`.


    You can nest parentheses to an arbitrary depth. Consider the following expression:


    ```

    (4 + (5 – 3)) * 2

    ```


    The innermost parentheses are evaluated first, so `5 – 3` is initially evaluated.
    Then, the result is added to `4`. Finally, the result is multiplied by `2`.


    #### Array Index


    The `[]` operator lets you extract an element from an array. I discuss arrays
    in Chapter [5](#615966_1_En_5_Chapter.xhtml) and will demonstrate this operator
    in that chapter.


    #### Member Selection


    The `.` operator lets you access a field or call a method. This operator has the
    following syntax:


    ```

    operand1 ''.'' operand2

    ```


    `Operand1` is a reference to an object or reference type (such as a class), which
    is typically expressed as a variable name (including the name of an object) or
    a reference type name. `Operand2` is the name of a reference type’s field or method.
    (I discuss objects, classes, fields, and methods in Chapter [6](#615966_1_En_6_Chapter.xhtml).)
    Consider the following example:


    ```

    "abc".length()

    ```


    In this expression, string literal `"abc"` (which is really a `String` object)
    provides a reference to this object, and `length()` is one of the methods in the
    `String` class. This method returns the number of characters in `"abc"`, which
    happens to be 3. (I cover `String` and its `length()` method in Chapter [13](#615966_1_En_13_Chapter.xhtml).)'
