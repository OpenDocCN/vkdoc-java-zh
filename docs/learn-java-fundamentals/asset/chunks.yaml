    ## Composition


    Inheritance through class extension offers one approach to reusing classes. As
    you have learned, inheritance is concerned with extending a class with a new class,
    which is based upon an is-a relationship between them: a `Truck` is a `Vehicle`,
    for example.


    Another approach to class reuse is *composition*, which is concerned with composing
    classes out of other classes based on a *has-a relationship* between them. For
    example, a `Truck` has an `Engine`, `Wheels`, and a `SteeringWheel`:


    ```

    class Truck extends Vehicle

    {

    private Engine engine;

    private Wheel[] wheels;

    private SteeringWheel steeringWheel;

    }

    ```


    This example demonstrates that composition and inheritance are not mutually exclusive.
    Although not shown, `Truck` inherits various members from its `Vehicle` superclass,
    in addition to providing its own `engine`, `wheels`, and `steeringwheel` instance
    fields.


    ### The Trouble with Inheritance


    Inheritance can be problematic because it breaks *encapsulation*, which, if you
    recall, combines fields, methods, and constructors into classes. In inheritance,
    a subclass relies on implementation details in its superclass. If the superclass’s
    implementation details change, the subclass might break. This problem is especially
    serious when a developer doesn’t have complete control over the superclass or
    when the superclass hasn’t been designed and documented with extension in mind.


    Composition provides a solution to this problem. This section presents an example
    that demonstrates the problem and then shows you how to solve it via composition.'
