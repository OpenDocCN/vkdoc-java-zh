- fmt: '### Runtime Type Identification


    The JVM’s cast verification in Listing [8-15](#615966_1_En_8_Chapter.xhtml#PC24)
    illustrates *runtime type identification* (or RTTI for short). Cast verification
    performs RTTI by examining the type of the cast operator’s operand to see whether
    the cast should be allowed or not. In this scenario, the cast should not be allowed.


    Another form of RTTI involves the `instanceof` operator. This operator checks
    the left operand to see whether or not it’s an instance of the right operand and
    returns `true` when this is the case. The following example introduces `instanceof`
    to Listing [8-15](#615966_1_En_8_Chapter.xhtml#PC24) to prevent the `ClassCastException`:


    ```

    if (v instanceof Truck)

    {

    Truck t = (Truck) v;

    System.out.println(t.isExtendedCab());

    }

    ```


    The `instanceof` operator detects that variable `v`’s instance was not created
    from `Truck` and returns `false` to indicate this fact. As a result, the code
    that performs the illegal cast will not execute.


    Because a subtype is a kind of supertype, `instanceof` will return `true` when
    its left operand is a subtype instance or a supertype instance of its right operand
    supertype. The following example demonstrates:


    ```

    Vehicle v = new Truck();

    Truck t = new Truck();

    System.out.println(t instanceof Vehicle); // Output: true

    System.out.println(v instanceof Vehicle); // Output: true

    ```


    This example assumes the class structure shown in Listing [8-15](#615966_1_En_8_Chapter.xhtml#PC24)
    and instantiates `Vehicle` and `Truck`. The first `System.out.println()` method
    call outputs `true` because `t`’s reference identifies an instance of a subclass
    of `Vehicle`; the second `System.out.println()` method call outputs `true` because
    `v`’s reference identifies an instance of `Vehicle`.


    **Caution**


    Overusing `instanceof` can indicate poor software design. For example, suppose
    you decide to use multiple `instanceof` expressions to determine whether a `vehicle`
    object’s type is `Car`, `Truck`, or another `Vehicle` subtype. When you introduce
    a new `Vehicle` subtype, you might forget to include an `instanceof` test to see
    if `vehicle` is an instance of that type, which would lead to a bug. Minimize
    your reliance on `instanceof` for special cases. Most of the time, you’ll be better
    off using subtype polymorphism.


    ## Additional Topics


    In this section, I introduce you to a pair of additional topics related to this
    chapter’s content. First, you explore covariant return types, which take advantage
    of subtype polymorphism to offer you a benefit. Next, you learn about interface-based
    static methods.


    ### Covariant Return Types


    When you override a method, and when the return type of the overriding method
    is allowed to be a subtype of the overridden method’s return type, you end up
    with a *covariant return type*. A method’s covariant return type can be replaced
    by a “narrower” (subclass) type when the method is overridden in a subclass.


    I’ve created a small application that demonstrates this language feature. Check
    out Listing [8-16](#615966_1_En_8_Chapter.xhtml#PC30) for the source code.


    ```

    // Observing Covariant Return Types

    class ParentReturnType

    {

    @Override

    public String toString()

    {

    return "parent class return type";

    }

    }

    class ChildReturnType extends ParentReturnType

    {

    @Override

    public String toString()

    {

    return "child class return type";

    }

    }

    class ParentClass

    {

    ParentReturnType createReturnType()

    {

    return new ParentReturnType();

    }

    }

    class ChildClass extends ParentClass

    {

    // ChildClass overrides ParentClass''s createReturnType() method.

    // Notice that the return type of ChildClass''s createReturnType()

    // method has changed from ParentReturnType to ChildReturnType.

    // Without covariant return types, the return type would have to

    // be ParentReturnType.

    @Override

    ChildReturnType createReturnType()

    {

    return new ChildReturnType();

    }

    }

    class OCRT

    {

    public static void main(String[] args)

    {

    ParentReturnType prt = new ParentClass().createReturnType();

    System.out.println(prt);

    // The following statement instantiates ChildClass and invokes its

    // createReturnType() method. The resulting ChildClass reference

    // that createReturnType() returns is assigned to crt. Without

    // covariant return types, you would have to explicitly cast the

    // new operator''s returned object to ChildReturnType via the

    // (ChildClass) cast operator.

    ChildReturnType crt = new ChildClass().createReturnType();

    System.out.println(crt);

    }

    }

    Listing 8-16

    OCRT.java

    ```


    Listing [8-16](#615966_1_En_8_Chapter.xhtml#PC30) declares `ParentReturnType`
    and `ParentClass` superclasses and `ChildReturnType` and `ChildClass` subclasses.
    Each of `ParentClass` and `ChildClass` declares a `createReturnType()` method.
    `ParentClass`’s method has its return type set to `ParentReturnType`, whereas
    `ChildClass`’s overriding method has its return type set to `ChildReturnType`,
    a subclass of `ParentReturnType`.


    Covariant return types greatly reduce upcasting and downcasting. For example,
    `ChildClass`’s `createReturnType()` method doesn’t need to upcast its `ChildReturnType`
    instance to its `ChildReturnType` return type. Furthermore, this instance doesn’t
    need to be downcast to `ChildReturnType` when assigning to variable `crt`.


    Compile Listing [8-16](#615966_1_En_8_Chapter.xhtml#PC30) as follows:


    ```

    javac OCRT.java

    ```


    Run the resulting application as follows:


    ```

    java OCRT

    ```


    You should observe the following output:


    ```

    parent class return type

    child class return type

    ```


    In the absence of covariant return types, you would end up with Listing [8-17](#615966_1_En_8_Chapter.xhtml#PC34).


    ```

    // Observing Covariant Return Types

    class ParentReturnType

    {

    @Override

    public String toString()

    {

    return "parent class return type";

    }

    }

    class ChildReturnType extends ParentReturnType

    {

    @Override

    public String toString()

    {

    return "child class return type";

    }

    }

    class ParentClass

    {

    ParentReturnType createReturnType()

    {

    return new ParentReturnType();

    }

    }

    class ChildClass extends ParentClass

    {

    @Override

    ParentReturnType createReturnType()

    {

    return new ChildReturnType();

    }

    }

    class OCRT

    {

    public static void main(String[] args)

    {

    ParentReturnType prt = new ParentClass().createReturnType();

    System.out.println(prt);

    ChildReturnType crt =

    (ChildReturnType) new ChildClass().createReturnType();

    System.out.println(crt);

    }

    }

    Listing 8-17

    OCRT.java (version 2)

    ```


    Listing [8-17](#615966_1_En_8_Chapter.xhtml#PC34) upcasts from `ChildReturnType`
    to `ParentReturnType` in `ChildClass`’s `createReturnType()` method. Also, in
    the `main()` method, it uses the required `(ChildReturnType)` cast operator to
    downcast from `ParentReturnType` to `ChildReturnType` before the assignment to
    `crt`.'
