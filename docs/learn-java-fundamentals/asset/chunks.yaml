- fmt: '# Continue Statement


    The `continue` statement lets you skip the current iteration of a loop. This is
    necessary when a certain condition is met earlier in the iteration and you don’t
    want to continue with the rest of the iteration.


    The `continue` statement has the following syntax:


    ```

    ''continue'' '';''

    ```


    The following example shows how to cancel the rest of an iteration:


    ```

    int count = 0;

    String s = "To be or not to be, that is the question.";

    for (int i = 0; i < s.length(); i++)

    {

    if (s.charAt(i) != ''e'')

    continue;

    count++;

    }

    System.out.println("Number of ''e'' characters = " + count);

    ```


    This example counts the number of letter `''e''`s in a string. After initializing
    a `count` variable to record the number of `''e''`s and an `s` variable to refer
    to a sample string, it enters a `for` loop, which iterates over the length of
    the string. Expression `s.length()` invokes `String`’s `length()` method on variable
    `s`, which holds a reference to the string being processed, to return this string’s
    length. (I explore `String` and its `length()` method in Chapter [13](#615966_1_En_13_Chapter.xhtml).)


    For each loop iteration, an `if`-`else` statement is executed. This statement
    invokes `String`’s `charAt()` method to return the next character from the string.
    (I explore `charAt()` in Chapter [13](#615966_1_En_13_Chapter.xhtml).) If this
    character doesn’t equal `e`, the `continue` statement is executed to skip the
    rest of the loop iteration so that `count++` isn’t executed. However, if this
    character equals `e`, `continue` isn’t executed but `count++` is executed to increase
    the tally of `''e''`s seen. Once the entire string has been examined, the loop
    ends, and the count of `''e''`s is output.


    ## Labeled Continue


    The `continue` statement can be specified with a label, which lets you skip the
    rest of the current iteration of nested loops. This variation of the `continue`
    statement lets you transfer execution to the Boolean expression of the loop statement
    that’s prefixed by the label and has the following syntax:


    ```

    ''continue'' label '';''

    ```


    The following example demonstrates labeled `continue`:


    ```

    outer:

    for (int a = 0; a < 5; a++)

    {

    for (int b = 0; b < 5; b++)

    {

    System.out.println("a = " + a + ", b = " + b);

    if (b == 3)

    continue outer;

    }

    System.out.println();

    }

    System.out.println("Both loops have finished");

    ```


    This example is similar to the earlier example when I discussed labeled `break`.
    However, the output is somewhat different:


    ```

    a = 0, b = 0

    a = 0, b = 1

    a = 0, b = 2

    a = 0, b = 3

    a = 1, b = 0

    a = 1, b = 1

    a = 1, b = 2

    a = 1, b = 3

    a = 2, b = 0

    a = 2, b = 1

    a = 2, b = 2

    a = 2, b = 3

    a = 3, b = 0

    a = 3, b = 1

    a = 3, b = 2

    a = 3, b = 3

    a = 4, b = 0

    a = 4, b = 1

    a = 4, b = 2

    a = 4, b = 3

    Both loops have finished

    ```


    Previously, the output stopped after `a = 0, b = 3`. Now, it continues for each
    value of `a` from `0` through `4`. However, you still won’t see `b = 4` in the
    output because the inner loop is skipped over when `b` equals `3`.


    # Additional Statements


    Java supports additional statements that deserve mention: the `assert` statement,
    the empty statement, the `import` statement, the method-call statement, the `package`
    statement, the `return` statement, the `try` statement, and the `try`-`with`-`resources`
    statement.


    ## Assert Statement


    The `assert` statement lets you express an assumption of program correctness via
    a Boolean expression. I don’t discuss this statement in this book.


    ## Empty Statement


    The empty statement is a single semicolon (`;`) character. It’s occasionally convenient
    to have a `for` statement repeatedly execute this statement because the actual
    work is performed in `for`’s header. Consider the following example:


    ```

    for (String line; (line = readLine()) != null; System.out.println(line));

    ```


    This example uses a `for` loop to read and print out all lines (possibly from
    a file) until there are no more lines to read. We are copying lines from a source
    to a destination.


    A line is read by calling a `readLine()` method (which you would specify elsewhere).
    The line is printed via the `System.out.println()` method call. Note the semicolon
    at the end of the line. This semicolon is the empty statement.


    **Caution**


    The empty statement can introduce subtle bugs into your code. For example, the
    following loop should output `Java is great!` on 15 lines. Instead, only one instance
    of this message appears because it’s the empty statement that’s executed 15 times.


    ```

    for (int i = 0; i < 15; i++);

    System.out.println("Java is great!");

    ```


    ## Import Statement


    The `import` statement imports a type from a package. I fully discuss `import`
    in Chapter [10](#615966_1_En_10_Chapter.xhtml).


    ## Method-Call Statement


    The method-call statement calls a method, which may or may not return a result.
    If the method’s return type is `void`, the method doesn’t return a value. For
    example, the various `println()` methods in `System.out.println()` method-call
    contexts have `void` return types – this reserved word indicates that each `println()`
    method doesn’t return a value. I fully discuss the method-call statement in Chapter
    [6](#615966_1_En_6_Chapter.xhtml).


    ## Package Statement


    The `package` statement places one or more reference types in a package. I fully
    discuss `package` in Chapter [10](#615966_1_En_10_Chapter.xhtml).


    ## Return Statement


    The `return` statement returns execution from a method to the code that called
    that method. It optionally returns a value whose type matches the method’s return
    type. I fully discuss `return` in Chapter [6](#615966_1_En_6_Chapter.xhtml).


    ## Try Statement


    The `try` statement provides a way to detect a thrown exception (a divergence
    from the normal flow of execution) from a block of code and then pass it to another
    block of code to handle the exception. I fully discuss `try` in Chapter [11](#615966_1_En_11_Chapter.xhtml).


    ## Try-with-resources Statement


    The `try`-`with`-`resources` statement is a `try` statement that declares one
    or more resources (objects that must be closed when not needed). It closes each
    resource. I fully discuss `try`-`with`-`resources` in Chapter [11](#615966_1_En_11_Chapter.xhtml).'
