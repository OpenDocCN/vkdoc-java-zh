    #### 在 Try-Catch-Finally 上下文中进行清理


    当资源必须被清理，且异常不会从方法中抛出时，`finally` 块会被放置在最后一个 `catch` 块之后。清单 11-1 演示了这一点，它展示了 `Copy`
    应用程序的第一个版本。


    ```

    import java.io.*;

    public class Copy

    {

    public static void main(String[] args)

    {

    FileInputStream fis = null;

    FileOutputStream fos = null;

    try

    {

    fis = new FileInputStream(args[0]);

    fos = new FileOutputStream(args[1]);

    int c;

    while ((c = fis.read()) != -1)

    fos.write(c);

    }

    catch (FileNotFoundException fnfe)

    {

    System.out.println(fnfe.getMessage());

    }

    catch (IOException ioe)

    {

    System.out.println("I/O error: " + ioe.getMessage());

    }

    finally

    {

    if (fis != null)

    try

    {

    fis.close();

    }

    catch (IOException ioe)

    {

    // ignore exception

    }

    if (fos != null)

    try

    {

    fos.close();

    }

    catch (IOException ioe)

    {

    // ignore exception

    }

    }

    }

    }

    清单 11-1

    Copy.java

    ```


    如果 `try` 块执行时没有发生异常，执行流程会传递到 `finally` 块以关闭文件输入/输出流。如果抛出了异常，则在相应的 `catch` 块执行完毕后，`finally`
    块会执行。


    `FileInputStream` 和 `FileOutputStream` 继承了一个 `void close()` 方法，当流无法关闭时，该方法会抛出
    `IOException`。因此，我将 `fis.close();` 和 `fos.close();` 分别包裹在 `try` 块中。我将关联的 `catch`
    块留空，以说明忽略异常这一常见错误。


    一个被相应的可抛出对象调用但为空的 `catch` 块，无法报告该异常。你可能会浪费大量时间追踪异常的原因，最后才发现，如果这个空的 `catch` 块报告了异常（哪怕只是在日志中），你本可以更早地检测到它。


    按如下方式编译清单 11-1：


    ```

    javac Copy.java

    ```


    按如下方式运行应用程序：


    ```

    java Copy Copy.java Copy.bak

    ```


    如果一切顺利，你应该会在当前目录中发现一个 `Copy.bak` 文件，其大小和内容与 `Copy.java` 的大小和内容相匹配。


    #### 在 Try-Finally 上下文中进行清理


    当资源必须被清理，且异常会从方法中抛出时，`finally` 块会被放置在 `try` 块之后：此时没有 `catch` 块。请考虑清单 11-2，它展示了
    `Copy` 应用程序的第二个版本。


    ```

    import java.io.*;

    public class Copy

    {

    public static void main(String[] args)

    {

    if (args.length != 2)

    {

    System.out.println("usage: java Copy srcfile dstfile");

    return;

    }

    try

    {

    copy(args[0], args[1]);

    }

    catch (IOException ioe)

    {

    System.out.println("I/O error: " + ioe.getMessage());

    }

    }

    static void copy(String srcFile, String dstFile) throws IOException

    {

    FileInputStream fis = null;

    FileOutputStream fos = null;

    try

    {

    fis = new FileInputStream(srcFile);

    fos = new FileOutputStream(dstFile);

    int c;

    while ((c = fis.read()) != -1)

    fos.write(c);

    }

    finally

    {

    if (fis != null)

    try

    {

    fis.close();

    }

    catch (IOException ioe)

    {

    System.out.println(ioe.getMessage());

    }

    if (fos != null)

    try

    {

    fos.close();

    }

    catch (IOException ioe)

    {

    System.out.println(ioe.getMessage());

    }

    }

    }

    }

    清单 11-2

    Copy.java (版本 2)

    ```


    文件复制逻辑已被移入一个 `copy()` 方法。该方法旨在向调用者报告异常，但它会首先关闭每个已打开的文件。


    此方法的 `throws` 子句仅列出了 `IOException`。没有必要包含 `FileNotFoundException`，因为 `FileNotFoundException`
    是 `IOException` 的子类。


    再次强调，`finally` 子句为了关闭两个文件而呈现了大量代码。在下一节中，我将介绍 `try`-`with`-`resources` 语句，它消除了显式关闭这些文件的需要。


    按如下方式编译清单 11-2：


    ```

    javac Copy.java

    ```


    按如下方式运行应用程序：


    ```

    java Copy Copy.java Copy.bak

    ```


    如果一切顺利，你应该会在当前目录中发现一个 `Copy.bak` 文件，其大小和内容与 `Copy.java` 的大小和内容相匹配。


    ## Try-with-resources 语句


    我之前提到过，资源（实际上是它们所依赖的系统资源）会在 `finally` 块中被释放。这可能导致编写繁琐的样板代码，例如前面展示的文件关闭代码。


    这些样板代码不仅增加了类文件的体积，编写时的繁琐还可能导致错误，甚至可能忘记关闭文件。JDK 7 引入了 `try`-`with`-`resources`
    来克服这个问题。


    `try`-`with`-`resources` 语句类似于 `try` 语句，但它允许你在执行离开 `try` 块时自动关闭任何已打开的资源。示例包括打开的文件、数据库连接、网络套接字以及其他依赖于相关系统资源（如文件句柄）的资源。其语法如下：


    ```

    ''try'' ''('' 资源获取语句 '')''

    ''{''

    // 资源使用

    ''}''

    ```


    `try` 关键字通过一个分号分隔的资源获取语句列表进行参数化，每个语句获取一个资源。每个获取的资源对 `try` 块可用，并在执行离开此主体时自动关闭。与常规的
    `try` 语句不同，`try`-`with`-`resources` 不要求 `try()` 后面必须跟 `catch` 块和/或 `finally` 块，尽管它们可以被指定。请考虑以下面向文件的示例：


    ```

    try (FileInputStream fis = new FileInputStream("notes.txt"))

    {

    // 使用 fis 和底层文件资源执行某些操作

    }

    ```


    在此示例中，获取了一个指向底层文件资源 (`notes.txt`) 的输入流。`try` 块对该资源执行某些操作，并且在退出 `try` 块时，流（和文件）会被关闭。


    清单 11-3 通过使用 `try`-`with`-`resources` 自动关闭打开的文件并消除样板代码，改进了清单 11-2 中的 `Copy` 应用程序。


    ```

    import java.io.FileInputStream;

    import java.io.FileNotFoundException;

    import java.io.FileOutputStream;

    import java.io.IOException;

    public class Copy

    {

    public static void main(String[] args)

    {

    if (args.length != 2)

    {

    System.err.println("usage: java Copy srcfile dstfile");

    return;

    }

    try

    {

    copy(args[0], args[1]);

    }

    catch (IOException ioe)

    {

    System.err.println("I/O error: " + ioe.getMessage());

    }

    }

    static void copy(String srcFile, String dstFile) throws IOException

    {

    try (FileInputStream fis = new FileInputStream(srcFile);

    FileOutputStream fos = new FileOutputStream(dstFile))

    {

    int c;

    while ((c = fis.read()) != -1)

    fos.write(c);

    }

    }

    }

    清单 11-3

    Copy.java (版本 3)

    ```


    `copy()` 方法使用 `try`-`with`-`resources` 来管理源文件和目标文件资源。`try` 后面圆括号内的代码尝试为这些文件创建文件输入和输出流。假设创建成功，其主体执行，将源文件复制到目标文件。


    无论是否抛出异常，`try`-`with`-`resources` 都能确保在执行离开 `try` 块时两个文件都被关闭。由于前面展示的样板文件关闭代码不再需要，清单
    11-3 中的 `copy()` 方法更加简单且易于阅读。


    按如下方式编译清单 11-3：


    ```

    javac Copy.java

    ```


    按如下方式运行应用程序：


    ```

    java Copy Copy.java Copy.bak

    ```


    如果一切顺利，你应该会在当前目录中发现一个 `Copy.bak` 文件，其大小和内容与 `Copy.java` 的大小和内容相匹配。


    ## 接下来是什么？


    到目前为止，我们的重点主要放在语言语法上。在本书的其余部分，我们将主要关注 Java 引用类型库中的 API。第 12 章将从查看 `Math` 和相关类开始。

