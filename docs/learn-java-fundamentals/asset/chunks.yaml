- fmt: '# BigDecimal


    Many developers use the `double` and `float` types to represent monetary values.
    However, this approach is frowned upon. The problem is “`float`s and `double`s
    cannot accurately represent the base 10 multiples that we use for money.” I excerpted
    this answer from [`http://stackoverflow.com/questions/3730019/why-not-use-double-or-float-to-represent-currency`](http://stackoverflow.com/questions/3730019/why-not-use-double-or-float-to-represent-currency),
    which goes on to develop the answer.


    Developers also use the `int` and `long` types to represent monetary values that
    are expressed in pennies, but this approach is also problematic. In response to
    stackoverflow’s “Why don’t applications typically use `int` to internally represent
    currency values?” question ([`http://stackoverflow.com/questions/5356123/why-dont-applications-typically-use-int-to-internally-represent-currency-values`](http://stackoverflow.com/questions/5356123/why-dont-applications-typically-use-int-to-internally-represent-currency-values)),
    Matt explains:


    “It does not make for simple coding. $1.10 translates to 110¢. Okay, but what
    about when you need to calculate tax (i.e., $1.10 * 4.225% -- Missouri’s tax rate,
    which results in $0.046475)? To keep all money in whole numbers, you’d have to
    also convert the sales tax to a whole number (4225), which would require converting
    110¢ further to 11000000. The math then can be 11000000 * 4225 / 100000 = 464750.
    This is a problem as now we have values in fractions of cents (11000000 and 464750,
    respectively). All this for the sake of storing money as whole numbers.


    Therefore, it’s easier to think and code in terms of the native currency. In the
    United States, this would be in dollars with the cents being a decimal fraction
    (i.e., $1.10). Coding such in terms of 110¢ isn’t as natural. Using base-10 floating-point
    numbers (such as Java’s `BigDecimal` and .NET’s `Decimal`) is usually precise
    enough for currency values (compared to base-2 floating-point numbers like `Float`
    and `Double`).”


    The `BigDecimal` class describes immutable, arbitrary precision signed decimal
    numbers. According to `BigDecimal`’s JDK documentation, “a `BigDecimal` consists
    of an arbitrary precision integer unscaled value and a 32-bit integer scale. If
    the scale is zero or positive, the scale is the number of digits to the right
    of the decimal point. If the scale is negative, the unscaled value of the number
    is multiplied by ten to the power of the negation of the scale. The value of the
    number represented by the `BigDecimal` [class] is therefore (unscaledValue × 10^(-scale)).”


    `BigDecimal` is ideal for performing calculations on money. Listing [12-4](#615966_1_En_12_Chapter.xhtml#PC13)
    presents the source code.


    ```

    // BigDecimal Demo

    import java.math.BigDecimal;

    import java.math.RoundingMode;

    class BDD

    {

    public static void main(String[] args)

    {

    BigDecimal purchaseAmount = new BigDecimal("586.32");

    BigDecimal pstRate = new BigDecimal("0.06");

    System.out.println("Purchase amount: " + purchaseAmount);

    System.out.println("PST rate: " + pstRate);

    // Calculate provincial sales tax on purchase.

    BigDecimal pst = purchaseAmount.multiply(pstRate);

    System.out.println("PST: " + pst);

    pst = pst.setScale(2, RoundingMode.HALF_UP);

    System.out.println("PST: " + pst);

    }

    }

    Listing 12-4

    BDD.java

    ```


    Listing [12-4](#615966_1_En_12_Chapter.xhtml#PC13) presents the source code to
    a simple application that demonstrates `BigDecimal`.


    The `main()` method first invokes the `BigDecimal(String val)` constructor to
    construct a `BigDecimal` object representing a purchase amount of 586 dollars
    and 32 cents, followed by a `BigDecimal` object representing a provincial sales
    tax rate of 6% (I live in Canada).


    This method then calls `System.out.println()` on each object to output its value
    (behind the scenes, `System.out.println()` invokes `BigDecimal`’s `toString()`
    method to convert the `BigDecimal` object to a string, which is then output).


    At this point, `main()` invokes `BigDecimal`’s `BigDecimal multiply(BigDecimal
    multiplicand)` method to multiply the purchase amount by the PST rate. The returned
    `BigDecimal` object’s reference is assigned to the `pst` local variable.


    The returned `BigDecimal` object reveals four fraction digits for the cents. When
    dealing with money, we’re accustomed to two fraction digits. We can achieve two
    fraction digits by invoking `BigDecimal`’s `BigDecimal setScale(int newScale,
    RoundingMode roundingMode)` method. The `main()` method invokes this method with
    `2` as the new scale (we want two fraction digits) and `RoundingMode.HALF_UP`
    as the rounding mode – half up is the rounding mode we learn in school.


    Note


    `RoundingMode` is an example of an *enum type*, which is a reference type consisting
    of named constants that are implemented as objects. I don’t discuss enum types
    in this book because I don’t consider it to be a fundamental feature.


    Finally, `main()` outputs the rounded PST value.


    Compile Listing [12-4](#615966_1_En_12_Chapter.xhtml#PC13) as follows:


    ```

    javac BDD.java

    ```


    Run the application as follows:


    ```

    java BDD

    ```


    You should observe the following output:


    ```

    Purchase amount: 586.32

    PST rate: 0.06

    PST: 35.1792

    PST: 35.18

    ```'
