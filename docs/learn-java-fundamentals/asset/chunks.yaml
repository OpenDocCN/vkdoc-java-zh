- fmt: '### The Error Class


    `Throwable`’s other direct subclass is `Error`, which describes a serious (even
    abnormal) problem (such as running out of memory, overflowing the JVM’s stack,
    or attempting to load a class that cannot be found) that a reasonable application
    should not try to handle. Like `Exception`, `Error` declares identical constructors
    to `Throwable`, inherits `Throwable`’s methods, and doesn’t declare any of its
    own methods.


    You can identify `Error` subclasses from the convention that their class names
    end with `Error`. Examples include `OutOfMemoryError`, `LinkageError`, and `StackOverflowError`.


    You shouldn’t try to create your own `Error` subclasses and throw/handle `Error`
    subclass objects. For these reasons, I have nothing more to say about `Error`
    in this chapter.


    ## Throwing Exceptions


    A C library function notifies calling code of an exception by setting the global
    `errno` variable to an error code and returning a failure code. In contrast, a
    Java method throws an object. This section examines this throwing mechanism.


    ### The Throw Statement


    Java provides the `throw` statement to throw an object that describes an exception.
    Although you can use this statement to throw an error, that isn’t normally done
    because a program cannot recover from running out of memory or another catastrophic
    event.


    The `throw` statement has the following syntax:


    ```

    throw throwable;

    ```


    The object identified by `throwable` is an instance of `Throwable` or any of its
    subclasses. However, you usually only throw objects instantiated from subclasses
    of `Exception` or `RuntimeException`. Here are a couple of examples:


    ```

    throw new ZipException("unable to read the next ZIP file entry" + filename);

    throw new ArrayIndexOutOfBoundsException("array index out of bounds");

    ```


    The throwable is thrown from the current method to the JVM, which checks this
    method for a suitable handler. If not found, the JVM unwinds a data structure
    known as the *method-call stack*, looking for the closest calling method that
    can handle the exception described by the throwable. If it finds this method,
    it passes the throwable to the method’s handler, whose code is executed to handle
    the exception. If no method is found to handle the exception, the JVM terminates
    with a suitable message.


    You normally wouldn’t throw an object from `RuntimeException` (which is too general
    to mean anything) or a subclass such as `ArrayIndexOutOfBoundsException`, which
    is thrown when you specify a negative array index or an index that is greater
    than or equal to an array’s length. Instead, you would fix the code that gives
    rise to the exception. However, you might want to throw `IllegalArgumentException`
    when detecting an invalid argument in a library context:


    ```

    static double sqrt(double n)

    {

    if (n < 0)

    throw new IllegalArgumentException(n + " is negative");

    // ...

    }

    ```


    Assume that you are building a library based on a single `Math` class with a `sqrt()`
    method. Because you cannot calculate the square root of a negative number, you
    first check for this possibility and create/throw an `IllegalArgumentException`
    object describing this problem when a negative number is passed.


    ### The Throws Clause


    You need to inform the compiler when you throw a checked exception out of a method.
    Do this by appending a `throws` clause to the method’s header. This clause has
    the following syntax:


    ```

    ''throws'' checkedExceptionClassName ('','' checkedExceptionClassName)*

    ```


    A `throws` clause consists of keyword `throws` followed by a comma-separated list
    of the class names of checked exceptions thrown out of the method. Here is an
    example:


    ```

    public static void main(String[] args) throws IOException

    {

    FileInputStream fis = new FileInputStream("x.dat");

    }

    ```


    This example attempts to open a file named `x.dat` and return an input stream
    that lets us read bytes from the file. (I don’t discuss files and streams beyond
    what I discuss in this chapter.) However, if the file doesn’t exist or something
    else I/O related goes wrong, the `FileInputStream()` constructor will throw `IOException`
    or one of its subclasses (such as `java.io.FileNotFoundException`).


    It’s necessary to inform the compiler that an object from the checked `IOException`
    class (or subclass, which is also checked) is being thrown by attaching a `throws
    IOException` clause to the invoking `main()` method’s header. After all, the exception
    isn’t handled in this method. When the exception is thrown to the JVM, it will
    note this and (because there is no parent method of `main()`) terminate with a
    message.


    There are a few rules that you need to keep in mind when working with `throws`
    clauses:


    *   If at all possible, don’t include the names of unchecked exception classes
    (such as `ArithmeticException`) in a `throws` clause. These names don’t need to
    be included because `throws` clauses are for checked exceptions only. Including
    unchecked class names only clutters the source code.


    *   You can append a `throws` clause to a constructor and throw a checked exception
    from the constructor when something goes wrong while the constructor is executing.
    The resulting object will not be created.


    *   If a superclass method declares a `throws` clause, the overriding subclass
    method doesn’t have to declare a `throws` clause. However, if the subclass method
    declares a `throws` clause, the clause must not include the names of checked exception
    classes that are not also included in the superclass method’s `throws` clause,
    unless they are the names of exception subclasses. For example, given superclass
    method `void open(String name) throws IOException {}`, the overriding subclass
    method could be declared as `void open(String name) {}`, `void open(String name)
    throws IOException {}`, or `void open(String name) throws FileNotFoundException
    {}`. However, you couldn’t specify, in the subclass, `void open(String name) throws
    ClassNotFoundException`, because `ClassNotFoundException` doesn’t appear in the
    superclass’s `throws` clause.


    *   A checked exception class name doesn’t need to appear in a `throws` clause
    when the name of its superclass appears. For example, you don’t need to specify
    `throws FileNotFoundException, IOException`. Only `throws IOException` is necessary.


    *   The compiler reports an error when a method throws a checked exception and
    doesn’t also handle the exception or list the exception in its `throws` clause.


    *   You can declare a checked exception class name in a method’s `throws` clause
    without throwing an instance of this class from the method. (Perhaps the method
    has yet to be fully coded.) However, Java requires that you provide code to handle
    this exception, even though it isn’t thrown.


    There is one more rule to consider. Sometimes, a method throws many checked exceptions,
    and it’s tempting to specify a `throws Exception` clause to save keystrokes. Although
    specifying only `Exception` saves time, it makes the source code less readable.
    Someone who is reading your code might have difficulty identifying all of the
    checked exceptions that are being passed on to the caller. I suggest following
    this practice for private throwaway code only.


