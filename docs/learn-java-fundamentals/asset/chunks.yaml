    expression that appears in the `return` statement at the end of `iterator()`.


    `LocalIterator` declares an `index` field that tracks the next element to be returned
    from `nextElement()`. This field *shadows* (hides or masks) the `index` field
    in its `AddressBook` enclosing block.


    We don’t need to access `AddressBook`’s `index` field because it serves a different
    purpose from `LocalIterator`’s `index` field. The former `index` field tracks
    the location in the `addressList`-referenced array for inserting the next `Address`
    object via the `add()` method. The latter `index` field tracks the location in
    this array for returning the next `Address` object via the `nextElement()` method.


    `LocalIterator` next overrides the `hasMoreElements()` and `nextElement()` methods
    that are declared by the `Iterator` interface. Notice the `@Override` annotation
    that prefixes each of these methods. This annotation indicates that overriding
    is occurring to prevent a problem when a method is accidentally overloaded instead
    of being overridden. See Chapter [7](#615966_1_En_7_Chapter.xhtml) to learn more
    about this dilemma and for a brief introduction to `@Override`.


    The `hasMoreElements()` method compares `index` with `addressList.length`, returning
    true (via the `return` statement) when `index` is less than this other expression’s
    value. Otherwise, `hasMoreElements()` returns false.


    The `nextElement()` method presents a `return` statement that returns the next
    element from `addressList`, which it obtains by executing `addressList[index++]`.
    The `index++` expression returns `index`’s current value before incrementing `index`.


    `AddressBook`’s `iterator()` method is followed by an `add()` method whose `address`
    parameter contains a reference to an `Address` object. This method executes `addressList[index++]
    = address;`, storing `address`’s reference in `addressList` at location `index`.
    Notice that `index`’s value is incremented after the reference is stored.


    Listing [9-16](#615966_1_En_9_Chapter.xhtml#PC42) presents the source code to
    a `UseAB` application class that demonstrates `AddressBook` along with its supporting
    `Address` class and `Iterator` interface.


    ```

    class UseAB

    {

    public static void main(String[] args)

    {

    AddressBook addressBook = new AddressBook(3);

    addressBook.add(new Address("100 Elm Street", "City #1"));

    addressBook.add(new Address("200 Bay Street", "City #2"));

    addressBook.add(new Address("300 Oak Street", "City #3"));

    Iterator iter = addressBook.iterator();

    while (iter.hasMoreElements())

    System.out.println(iter.nextElement());

    }

    }

    Listing 9-16

    UseAB.java

    ```


    `UseAB`’s `main()` method first instantiates `AddressBook`, passing `3` (the maximum
    number of addresses that can be stored) to `AddressBook`’s constructor. A reference
    to the `AddressBook` object is assigned to the `addressBook` local variable.


    The `main()` method next creates three `Address` objects and passes them to `AddressBook`’s
    `add()` method. For each `Address` object, `main()` invokes `AddressBook`’s constructor,
    passing street and city strings as arguments. The `Address` object’s reference
    is passed as an argument to `add()`.


    The next task is to execute `addressBook.iterator()`, which returns an `Iterator`
    object (whose class implements the `Iterator` interface). The object’s reference
    is assigned to local variable `iter`.


    Finally, `main()` enters a `while` loop. This loop iterates for as long as `iter.hasMoreElements()`
    returns true. Each iteration invokes `iter.nextElement()` to return the next address
    element from the address book. This element is then output via `System.out.println()`.


    Compile Listings [9-13](#615966_1_En_9_Chapter.xhtml#PC39) through [9-16](#615966_1_En_9_Chapter.xhtml#PC42)
    as follows:


    ```

    javac *.java

    ```


    Run the `UseAB` application as follows:


    ```

    java UseAB

    ```


    You should observe the following output:


    ```

    100 Elm Street: City #1

    200 Bay Street: City #2

    300 Oak Street: City #3

    ```'
