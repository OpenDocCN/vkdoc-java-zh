    ### try 块


    `try` 块的语法如下：


    ```

    ''try''

    {

    // 一个或多个可能抛出异常的语句

    }

    ```


    `try` 块中的语句服务于一个共同目的，并且可能直接或间接抛出异常。请看以下示例：


    ```

    FileInputStream fis = null;

    FileOutputStream fos = null;

    try

    {

    fis = new FileInputStream(args[0]);

    fos = new FileOutputStream(args[1]);

    int c;

    while ((c = fis.read()) != -1)

    fos.write(c);

    }

    ```


    此示例摘自一个更大的 `Copy` 应用程序（本章稍后将完整展示），该程序用于将源文件复制到目标文件。它使用了 `java.io` 包中的 `FileInputStream`
    和 `FileOutputStream` 类（我尚未正式介绍它们）。你可以将 `FileInputStream` 理解为从文件读取字节输入流的方式，将 `FileOutputStream`
    理解为向文件写入字节输出流的方式。


    `FileInputStream(String filename)` 构造函数会创建一个指向由 `file name` 标识的文件的输入流。当文件不存在、指向一个目录或发生其他相关问题时，此构造函数会抛出
    `FileNotFoundException`。`FileOutputStream(String filename)` 构造函数会创建一个指向由 `file
    name` 标识的文件的输出流。当文件存在但指向一个目录、文件不存在且无法创建，或发生其他相关问题时会抛出 `FileNotFoundException`。


    `FileInputStream` 声明了一个 `int read()` 方法，用于读取一个字节并将其作为 32 位整数返回。此方法在文件结束时返回 -1。`FileOutputStream`
    提供了一个 `void write(int b)` 方法，用于写入 `b` 的低 8 位中的字节。当出现问题时，这两个方法都会抛出 `IOException`。


    该示例的主体是一个 `while` 循环，它反复从输入流读取下一个字节，并将该字节写入输出流，直到 `read()` 指示文件结束。


    ### catch 块


    `try` 块后面通常跟着一个或多个 `catch` 块，用于处理不同类型的异常。`catch` 块的语法如下：


    ```

    ''catch'' ''('' throwableType throwableObject '')''

    ''{''

    // 一个或多个处理异常的语句

    ''}''

    ```


    `catch` 块类似于构造函数，因为它有一个参数列表且没有返回类型。然而，此列表仅包含一个参数，该参数是一个 *throwableType*（`Throwable`
    或其子类之一），后跟一个用于该类型对象的 *throwableObject* 标识符。


    当异常发生时，会创建一个可抛出对象并将其抛出给 JVM，JVM 会搜索最近的 `catch` 块，该块的参数类型直接匹配或是该可抛出对象的超类型。当找到此块时，JVM
    会将可抛出对象传递给参数并执行 `catch` 块的语句，这些语句可以查询传递的可抛出对象并以其他方式处理异常。请看以下示例：


    ```

    catch (FileNotFoundException fnfe)

    {

    System.out.println(fnfe.getMessage());

    }

    ```


    此示例（扩展了之前的 `try` 块示例）描述了一个 `catch` 块，它捕获并处理类型为 `FileNotFoundException` 的可抛出对象。只有匹配此类型或其子类型的可抛出对象才会被此块捕获。


    假设 `FileInputStream(String filename)` 构造函数抛出了 `FileNotFoundException`。JVM 会检查
    `try` 后面的 `catch` 块，看其参数类型是否与可抛出对象类型匹配。检测到匹配后，JVM 将可抛出对象的引用传递给 `fnfe`，并将执行权转移到该块。该块通过调用
    `getMessage()` 来检索异常消息，然后将其输出。


    `catch` 块可能无法完全处理异常——也许它需要访问方法调用栈中某个祖先方法提供的信息。如果它可以部分处理异常，则 `catch` 块应以重新抛出异常结束，以便祖先处理器完成处理。另一种可能性是记录异常（供后续分析），然后重新抛出，如下所示：


    ```

    catch (FileNotFoundException fnfe)

    {

    logger.log(fnfe);

    throw fnfe;

    }

    ```


    #### 多个 catch 块


    你可以在一个 `try` 块后指定多个 `catch` 块。例如，考虑上述 `Copy` 应用程序中更大的一个片段：


    ```

    FileInputStream fis = null;

    FileOutputStream fos = null;

    try

    {

    fis = new FileInputStream(args[0]);

    fos = new FileOutputStream(args[1]);

    int c;

    while ((c = fis.read()) != -1)

    fos.write(c);

    }

    catch (FileNotFoundException fnfe)

    {

    System.out.println(fnfe.getMessage());

    }

    catch (IOException ioe)

    {

    System.out.println("I/O error: " + ioe.getMessage());

    }

    ```


    第一个 `catch` 块处理从任一构造函数抛出的 `FileNotFoundException`。第二个 `catch` 块处理从 `read()` 和
    `write()` 方法抛出的 `IOException`。


    当指定多个 `catch` 块时，不要在子类型的 `catch` 块之前指定超类型的 `catch` 块。例如，不要将 `catch (IOException
    ioe)` 放在 `catch (FileNotFoundException fnfe)` 之前。如果这样做，编译器会报告错误，因为 `catch (IOException
    ioe)` 也会处理 `FileNotFoundException`，而 `catch (FileNotFoundException fnfe)` 将永远没有机会执行。


    注意


    不要指定具有相同可抛出类型的多个 `catch` 块。例如，不要指定两个 `catch (IOException ioe) {}` 块。否则，编译器会报告错误。


    JDK 7 使得在单个 `catch` 块中捕获多个异常成为可能。你可以指定一个以竖线分隔的异常类型列表，然后指定参数名称，该参数是 `final` 的（你不能在
    `catch` 块中为该参数赋值）。请看以下示例，其中 `ex` 可能包含 `FileNotFoundException` 引用或 `IOException`
    引用：


    ```

    catch (FileNotFoundException | IOException ex)

    ```


    ### finally 块


    无论异常是否被处理，你可能都需要执行清理任务，例如关闭打开的文件。Java 为此提供了 `finally` 块。


    `finally` 块由关键字 `finally` 后跟一个用大括号括起来的语句序列组成，这些语句将被执行。其语法表示如下：


    ```

    ''finally''

    ''{''

    // 一个或多个执行清理任务的语句

    ''}''

    ```


    `finally` 块可以出现在最后一个 `catch` 块之后，或者 `try` 块之后。

