    class HashMap

    {

    private static final int SIZE = 16;

    private Node[] buckets;

    public HashMap()

    {

    buckets = new Node[SIZE];

    }

    public void put(Object key, Object value)

    {

    int index = Math.abs(key.hashCode()) % SIZE;

    Node node = buckets[index];

    while (node != null)

    {

    if (node.key.equals(key))

    {

    node.value = value;

    return;

    }

    node = node.next;

    }

    Node newNode = new Node(key, value);

    newNode.next = buckets[index];

    buckets[index] = newNode;

    }

    public Object get(Object key)

    {

    int index = Math.abs(key.hashCode()) % SIZE;

    Node node = buckets[index];

    while (node != null)

    {

    if (node.key.equals(key))

    return node.value;

    node = node.next;

    }

    return null;

    }

    public void remove(Object key)

    {

    int hashCode = key.hashCode();

    int index = hashCode % SIZE;

    Node node = buckets[index];

    Node prev = null;

    while (node != null)

    {

    if (node.key.equals(key))

    {

    if (prev != null)

    prev.next = node.next;

    else

    buckets[index] = node.next;

    return;

    }

    prev = node;

    node = node.next;

    }

    }

    }

    ```


    Listing 7-13 `HashMap.java`


    Listing 7-13’s `HashMap` class implements a hash map as described earlier. It
    first declares a `SIZE` constant that presents the initial size of the `buckets`
    array.


    `HashMap` next declares `buckets`. Each slot stores a reference to a linked list
    of key-value pairs whose keys all hash to the same bucket index.


    `HashMap`’s constructor initializes the `buckets` array with a new array of `Node`
    objects. The number of elements in this array is specified by constant `SIZE`.


    Continuing, `HashMap` declares a `void put(Object key, Object value)` method.
    This method inserts a `key`-`value` pair into the hash map.


    The `put()` method first computes the hash code of the `key` using `key.hashCode()`.
    It then takes the absolute value of the hash code and uses the modulus operator
    (`%`) to determine the index where the key-value pair will be stored in the `buckets`
    array.


    Continuing, `put()` iterates through the linked list at that index. If a node
    with the same key is found, this method updates the value and returns. If not,
    `put()` creates a new node and adds it to the linked list.


    `HashMap` now declares an `Object get(Object key)` method. This method is used
    to retrieve the value associated with a given key.


    The `get()` method computes the index in a similar way to the `put()` method.
    It then iterates through the linked list at that index. If a node with the matching
    `key` is found, it returns the associated value.


    `HashMap` finally declares a `void remove(Object key)` method. This method removes
    a key-value pair from the hash map.


    The `remove()` method first computes the index based on the key’s hash code. It
    then iterates through the linked list at that index. If a node with the matching
    `key` is found, it removes that node from the linked list. (If there are multiple
    nodes with the same `key`, `remove()` only removes the first node that it encounters.)


