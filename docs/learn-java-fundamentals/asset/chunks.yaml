    ### 从日志库导入类型


    日志库允许我们在应用程序中引入可移植的日志代码。除了调用 `newLogger()` 之外，无论日志输出目标是什么，这段代码都将保持不变。清单 10-5 展示了一个测试该库的应用程序。


    ```

    import logging.Logger;

    import logging.LoggerFactory;

    class TestLogging

    {

    public static void main(String[] args)

    {

    Logger logger = LoggerFactory.newLogger(LoggerFactory.CONSOLE);

    if (logger.connect())

    {

    logger.log("test message #1");

    logger.disconnect();

    }

    else

    System.out.println("cannot connect to console-based logger");

    logger = LoggerFactory.newLogger(LoggerFactory.FILE, "messages.txt");

    if (logger.connect())

    {

    logger.log("test message #2");

    logger.disconnect();

    }

    else

    System.out.println("cannot connect to file-based logger");

    logger = LoggerFactory.newLogger(LoggerFactory.FILE);

    if (logger.connect())

    {

    logger.log("test message #3");

    logger.disconnect();

    }

    else

    System.out.println("cannot connect to file-based logger");

    }

    }

    清单 10-5

    TestLogging.java

    ```


    清单 10-5 没有以 `package` 语句开头，因为简单的应用程序通常不存储在包中。相反，它以一对 `import` 语句开头，用于导入日志库的 `Logger`
    和 `LoggerFactory` 类。


    `main()` 方法首先使用 `LoggerFactory.CONSOLE` 常量作为参数调用 `LoggerFactory` 的 `newLogger()`
    方法，以创建一个将消息记录到控制台的日志记录器。该方法返回一个 `Logger` 对象（即，由一个实现了 `Logger` 接口的类——在本例中是 `Console`——创建的日志记录器）。


    接着，该方法通过调用 `Logger` 的 `connect()` 方法来连接此日志记录器。如果此方法返回 true，则表示连接成功（控制台连接会成功，但记录到文件时可能不会成功），然后
    `main()` 通过调用 `Logger` 的 `log()` 方法来记录一条消息。最后，它通过调用 `Logger` 的 `disconnect()`
    方法断开与日志记录器的连接。


    接下来，`main()` 方法重复此过程，创建一个基于文件的日志记录器，将消息记录到名为 `messages.txt` 的文件中。


    该过程第三次重复，尝试创建一个基于文件的日志记录器，将消息记录到一个未命名的文件。我们假设当没有文件名参数传递给 `newLogger()` 时，会使用一个默认名称——请记住，`newLogger()`
    使用可变参数来获取文件名。


    `newLogger()` 方法被编码为不返回日志记录器，但你可以修改它，使其选择一个默认文件名。我这样编写是为了测试当 `newLogger()` 无法返回日志记录器时的代码。


    将清单 10-5 复制到一个名为 `TestLogging.java` 的文件中，并将此文件放在你之前创建的 `logging` 目录所在的同一目录中。然后，执行以下命令来编译
    `TestLogging.java`（如果之前未编译，也会编译日志包的源文件）：


    ```

    javac TestLogging.java

    ```


    执行以下命令来运行 `TestLogging`：


    ```

    java TestLogging

    ```


    你应该会看到以下输出：


    ```

    test message #1

    opening file messages.txt

    writing test message #2 to file messages.txt

    closing file messages.txt

    cannot connect to file-based logger

    ```


    假设 `TestLogging.java` 不在 `logging` 所在的同一目录中。你将如何编译此源文件并运行生成的应用程序？答案是使用类路径。


    *类路径* 是 Java 虚拟机（JVM）搜索引用类型的一系列包。它通过用于启动 JVM 的 `-classpath`（或 `-cp`）选项指定，或者，当该选项不存在时，通过
    `CLASSPATH` 环境变量指定。


    注意


    无论你是使用 `-classpath`/`-cp` 选项还是 `CLASSPATH` 环境变量来指定类路径，都必须遵循特定的格式。在 Windows 下，此格式表示为
    *path1*`;`*path2*`;...`，其中 *path1*、*path2* 等是包目录的位置。在 Mac OS X、Unix 和 Linux 下，此格式变为
    *path1*`:`*path2*`:...`。


    假设（在 Windows 平台上）日志库存储在 `C:\logging` 中，而 `TestLogging.java` 存储在 `C:\TestLogging`
    中，这是当前目录。指定以下命令来编译源代码并运行应用程序：


    ```

    javac -cp ../logging TestLogging.java

    java -cp ../logging;. TestLogging

    ```


    `../logging;.` 中 `;` 字符后的句点字符代表当前目录。必须指定它，以便 JVM 能够找到 `TestLogging.class`。


    ## 其他主题


    在使用包时，还有三个其他主题需要考虑：静态导入、受保护访问和 JAR 文件。

