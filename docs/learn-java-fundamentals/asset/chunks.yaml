    final static int ROWS = 27; // Must be odd

    final static int COLS = 50;

    public static void main(String[] args)

    {

    char[][] screen = new char[ROWS][COLS];

    double scaleX = COLS / 360.0;

    // Draw sine and cosine waves in buffer.

    for (int degree = 0; degree = 0; row--)

    {

    for (int col = 0; col < COLS; col++)

    System.out.print(screen[row][col]);

    System.out.println();

    }

    }

    }

    Listing 12-2

    Graph.java

    ```


    Listing [12-2](#615966_1_En_12_Chapter.xhtml#PC5)’s `Graph` class first introduces
    constants `COLS` and `ROWS`, which specify the dimensions of the table that I
    use as an offscreen buffer for storing the graph. `ROWS` must be assigned an odd
    number; otherwise, `java.lang.ArrayIndexOutOfBoundsException` is thrown. The exception
    occurs when one of the `row` calculations produces a value that equals `ROWS`:
    `row` can only take on a value from `0` through `ROWS - 1`. Also, the graph looks
    better with an odd number of rows.


    Note


    `Graph` demonstrates the value in using constants wherever possible. The source
    code is easier to maintain because you only need to change the constant’s value
    in one place instead of having to change each corresponding value throughout the
    source code.


    The `main()` method first creates `screen`, a two-dimensional array that serves
    as an offscreen buffer for storing the graph. The graph is drawn in the buffer,
    which is later copied to the console because it’s impossible to position the cursor
    on the console.


    The `main()` method next calculates a horizontal scale value for scaling each
    of the sine and cosine waves horizontally so that 360 horizontal positions representing
    degrees fit into the number of columns specified by `NCOLS`.


    Next, `main()` enters a `for` loop that, for each of the sine and cosine waves,
    creates (row, column) coordinates for each degree value and assigns a value to
    the screen array at those coordinates. The character is `C` for the cosine wave,
    `S` for the sine wave, and `*` for where the waves intersect.


    The row calculation invokes `Math`’s `double toRadians(double angdeg)` method
    to convert its angle argument from degrees to radians, which the `sin()` and `cos()`
    methods require. The value that these methods return ranges from -1 through 1
    and is then multiplied by `ROWS / 2` to scale this value to half the number of
    rows in the `screen` array.


    After rounding the result to the nearest long integer via `Math`’s `long round(double
    a)` method, `main()` converts this long integer to an `int` via the `(int)` cast.
    The `int` value is added to `ROWS / 2` to offset the row coordinate so that it
    is relative to the array’s middle row. The column calculation is simpler, multiplying
    the degree value by the horizontal scale factor.


    Lastly, the `main()` method dumps the `screen` array to the console via a pair
    of nested `for` loops. The outer `for` loop inverts the array vertically so that
    it appears right side up – row number 0 should be output last.


    Compile Listing [12-2](#615966_1_En_12_Chapter.xhtml#PC5) as follows:


