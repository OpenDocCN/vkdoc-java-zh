    ## Garbage Collection


    The `void gc()` method tells the JVM to expend effort toward recycling unused
    objects (including array objects) in order to make the memory they currently occupy
    available for reuse. When control returns from the method call, the JVM has made
    its best effort to reclaim space from all unused objects.


    There is no guarantee that the JVM’s effort will recycle any specific number of
    unused objects, reclaim any particular amount of space, or complete at any specific
    time (if at all) before the method returns (or ever).


    Listing [14-3](#615966_1_En_14_Chapter.xhtml#PC12) presents the source code to
    an application that demonstrates `gc()`.


    ```

    public class GCDemo

    {

    public final static int MAXMB = 50;

    public final static int MAXTRIES = 1000;

    public static void main(String[] args)

    {

    class LargeObject

    {

    private byte[] memory = new byte[MAXMB * 1024 *1024]; // convert 50

    // megabytes to

    // bytes

    @Override

    public void finalize()

    {

    System.out.println("Large object has been finalized.");

    }

    }

    LargeObject lo = new LargeObject();

    // Prove that there is no garbage collection of lo-referenced LargeObject

    // at this point.

    System.out.println("Performing garbage collection before assigning " +

    "null to lo.");

    for (int i = 0; i < MAXTRIES; i++)

    System.gc();

    // Assign null to lo to disconnect object from variable and make it

    // available for garbage collection.

    System.out.println("Assigning null to lo.");

    lo = null;

    // Prove that there is garbage collection of lo-referenced LargeObject

    // at this point. (You might have to assign a larger value to MAXTRIES

    // to see this proof.)

    System.out.println("Performing garbage collection after assigning " +

    "null to lo.");

    for (int i = 0; i < MAXTRIES; i++)

    System.gc();

    }

    }

    Listing 14-3

    GCDemo.java

    ```


    Listing [14-3](#615966_1_En_14_Chapter.xhtml#PC12)’s `GCDemo` class first declares
    a pair of constants that declares the maximum number of megabytes (`MAXMB`) and
    maximum number of tries (`MAXTRIES`). I’ll introduce these constants later in
    this tour.


    `GCDemo` next declares a `LargeObject` inner class. It is useful to make `LargeObject`
    an inner class because of its close relationship to `GCDemo`.


    `LargeObject` declares a `memory` field and initializes it to a byte array whose
    size is `MAXMB` megabytes. It’s useful to use a constant here in case I want to
    change the size later and don’t want to waste time trying to track the place in
    the source code where `50` appears.


    `LargeObject` also overrides the `finalize()` method that it inherits from `Object`.
    This method is invoked before the memory belonging to an object instantiated from
    `LargeObject` is reclaimed.


    The `finalize()` method invokes `System.out.println()` with a message to alert
    the user that the object is just about dead.


    At this point, `GCDemo` instantiates `LargeObject` and assigns its reference to
    local variable `lo`. It then outputs a message and makes `MAXTRIES` attempts to
    call the garbage collector via `System.gc();`. You won’t see a message about the
