- fmt: '### Interface-Based Static Methods


    JDK 8 introduced programmers to interface-based static methods. Declaring static
    methods in interfaces lets you associate static methods with interfaces instead
    of associating them with utility classes. Doing this makes source code more readable
    and ensures that binary compatibility isn’t broken.


    To understand the usefulness of interface-based static methods, consider a `Renderable`
    interface with a `void render(int color)` method whose `color` parameter contains
    an integer color code. Because it’s convenient to express this color as red, green,
    and blue components, suppose you add an `rgb()` static method that converts these
    components to an `int`. Check out Listing [8-18](#615966_1_En_8_Chapter.xhtml#PC35).


    ```

    interface Renderable

    {

    public void render(int color);

    public static int rgb(int r, int g, int b)

    {

    return r << 16 | g << 8 | b;

    }

    }

    ```


    You next declare a `Circle` class that describes a circle via integer-based center
    coordinates and a radius and that implements `Renderable` to render a circle.
    Listing [8-19](#615966_1_En_8_Chapter.xhtml#PC36) presents `Circle`’s source code.


    ```

    class Circle implements Renderable

    {

    private int x, y, r;

    Circle(int x, int y, int r)

    {

    this.x = x;

    this.y = y;

    this.r = r;

    }

    @Override

    public void render(int color)

    {

    System.out.println("Rendering circle(" + x + ", " + y + ", " + r + ") in color
    " + color);

    }

    }

    ```


    Finally, you declare a `UseRenderable` application class whose source code appears
    in Listing [8-20](#615966_1_En_8_Chapter.xhtml#PC37).


    ```

    public class UseRenderable

    {

    public static void main(String[] args)

    {

    Circle circle = new Circle(20, 30, 14);

    circle.render(Renderable.rgb(0x80, 0x60, 0x40));

    }

    }

    ```


    `UseRenderable`’s `main()` method instantiates `Circle` and then calls the object’s
    `render()` method to render the circle. Notice that the `rgb()` method call is
    prefixed by this static method’s `Renderable` interface. You cannot prefix this
    method with the interface-implementing class (as in `Circle.rgb(0x80, 0x60, 0x40)`)
    because the static method belongs to `Renderable`.


    Compile Listings [8-18](#615966_1_En_8_Chapter.xhtml#PC35), [8-19](#615966_1_En_8_Chapter.xhtml#PC36),
    and [8-20](#615966_1_En_8_Chapter.xhtml#PC37) as follows:


    ```

    javac UseRenderable.java

    ```


    The `javac` compiler tool recursively compiles the source files corresponding
    to the classes and interfaces that it encounters while compiling the source file
    specified as its command-line argument.


    Run `UseRenderable.class` as follows:


    ```

    java UseRenderable

    ```


    You should observe the following output:


    ```

    Rendering circle(20, 30, 14) in color 8413248

    ```


    ## What’s Next?


    Java provides unusual language features for declaring classes in other classes
    and even blocks. Also, you can declare nameless classes. Chapter [9](#615966_1_En_9_Chapter.xhtml)
    introduces you to these strange features.


    # Static, Non-static, Local, and Anonymous Classes


    The classes that I’ve presented to this point are known as *top-level classes*.
    They don’t belong to another class or structure. However, Java also lets you declare
    classes in other classes, *blocks* (groups of zero or more statements between
    `{` and `}` characters), and expression contexts.


    Classes declared in other classes are known as *nested classes*. There are two
    kinds of nested classes: static classes and non-static classes. (Non-static classes
    are also known as *inner classes*).


    Note


    The Java Tutorials tutorial on nested classes ([`http://docs.oracle.com/javase/tutorial/java/javaOO/nested.xhtml`](http://docs.oracle.com/javase/tutorial/java/javaOO/nested.xhtml))
    presents three compelling reasons for using nested classes:


    *   “**It is a way of logically grouping classes that are only used in one place**:
    If a class is useful to only one other class, then it is logical to embed it in
    that class and keep the two together. Nesting such “helper classes” makes their
    package [see Chapter [10](#615966_1_En_10_Chapter.xhtml) for an introduction to
    packages] more streamlined.


    *   **It increases encapsulation**: Consider two top-level classes, `A` and `B`,
    where `B` needs access to members of `A` that would otherwise be declared `private`.
    By hiding class `B` within class `A`, `A`’s members can be declared `private`
    and `B` can access them. In addition, `B` itself can be hidden from the outside
    world.


    *   **It can lead to more readable and maintainable code**: Nesting small classes
    within top-level classes places the code closer to where it is used.”


    Classes declared in blocks are known as *local classes*. Classes declared in expression
    contexts are known as *anonymous classes*.


    This chapter introduces you to static classes, inner classes, local classes, and
    anonymous classes.'
  raw: '### Interface-Based Static Methods


    JDK 8 introduced programmers to interface-based static methods. Declaring static
    methods in interfaces lets you associate static methods with interfaces instead
    of associating them with utility classes. Doing this makes source code more readable
    and ensures that binary compatibility isn’t broken.


    To understand the usefulness of interface-based static methods, consider a `Renderable`
    interface with a `void render(int color)` method whose `color` parameter contains
    an integer color code. Because it’s convenient to express this color as red, green,
    and blue components, suppose you add an `rgb()` static method that converts these
    components to an `int`. Check out Listing [8-18](#615966_1_En_8_Chapter.xhtml#PC35).


    ```

    interface Renderable

    {

    public void render(int color);

    public static int rgb(int r, int g, int b)

    {

    return r << 16 | g << 8 | b;

    }

    }

    Listing 8-18

    Renderable.java

    ```


    You next declare a `Circle` class that describes a circle via integer-based center
    coordinates and a radius and that implements `Renderable` to render a circle.
    Listing [8-19](#615966_1_En_8_Chapter.xhtml#PC36) presents `Circle`’s source code.


    ```

    class Circle implements Renderable

    {

    private int x, y, r;

    Circle(int x, int y, int r)

    {

    this.x = x;

    this.y = y;

    this.r = r;

    }

    @Override

    public void render(int color)

    {

    System.out.println("Rendering circle(" + x + ", " + y + ", " + r + ") in color
    " + color);

    }

    }

    Listing 8-19

    Circle.java

    ```


    Finally, you declare a `UseRenderable` application class whose source code appears
    in Listing [8-20](#615966_1_En_8_Chapter.xhtml#PC37).


    ```

    public class UseRenderable

    {

    public static void main(String[] args)

    {

    Circle circle = new Circle(20, 30, 14);

    circle.render(Renderable.rgb(0x80, 0x60, 0x40));

    }

    }

    Listing 8-20

    UseRenderable.java

    ```


    `UseRenderable`’s `main()` method instantiates `Circle` and then calls the object’s
    `render()` method to render the circle. Notice that the `rgb()` method call is
    prefixed by this static method’s `Renderable` interface. You cannot prefix this
    method with the interface-implementing class (as in `Circle.rgb(0x80, 0x60, 0x40)`)
    because the static method belongs to `Renderable`.


    Compile Listings [8-18](#615966_1_En_8_Chapter.xhtml#PC35), [8-19](#615966_1_En_8_Chapter.xhtml#PC36),
    and [8-20](#615966_1_En_8_Chapter.xhtml#PC37) as follows:


    ```

    javac UseRenderable.java

    ```


    The `javac` compiler tool recursively compiles the source files corresponding
    to the classes and interfaces that it encounters while compiling the source file
    specified as its command-line argument.


    Run `UseRenderable.class` as follows:


    ```

    java UseRenderable

    ```


    You should observe the following output:


    ```

    Rendering circle(20, 30, 14) in color 8413248

    ```


    ## What’s Next?


    Java provides unusual language features for declaring classes in other classes
    and even blocks. Also, you can declare nameless classes. Chapter [9](#615966_1_En_9_Chapter.xhtml)
    introduces you to these strange features.


    # 9. Static, Non-static, Local, and Anonymous Classes


    The classes that I’ve presented to this point are known as *top-level classes*.
    They don’t belong to another class or structure. However, Java also lets you declare
    classes in other classes, *blocks* (groups of zero or more statements between
    `{` and `}` characters), and expression contexts.


    Classes declared in other classes are known as *nested classes*. There are two
    kinds of nested classes: static classes and non-static classes. (Non-static classes
    are also known as *inner classes*).


    Note


    The Java Tutorials tutorial on nested classes ([`http://docs.oracle.com/javase/tutorial/java/javaOO/nested.xhtml`](http://docs.oracle.com/javase/tutorial/java/javaOO/nested.xhtml))
    presents three compelling reasons for using nested classes:


    *   “**It is a way of logically grouping classes that are only used in one place**:
    If a class is useful to only one other class, then it is logical to embed it in
    that class and keep the two together. Nesting such “helper classes” makes their
    package [see Chapter [10](#615966_1_En_10_Chapter.xhtml) for an introduction to
    packages] more streamlined.


    *   **It increases encapsulation**: Consider two top-level classes, `A` and `B`,
    where `B` needs access to members of `A` that would otherwise be declared `private`.
    By hiding class `B` within class `A`, `A`’s members can be declared `private`
    and `B` can access them. In addition, `B` itself can be hidden from the outside
    world.


    *   **It can lead to more readable and maintainable code**: Nesting small classes
    within top-level classes places the code closer to where it is used.”


    Classes declared in blocks are known as *local classes*. Classes declared in expression
    contexts are known as *anonymous classes*.


    This chapter introduces you to static classes, inner classes, local classes, and
    anonymous classes.'
  trans: '

    ### 基于接口的静态方法


    JDK 8 为程序员引入了基于接口的静态方法。在接口中声明静态方法，可以让你将静态方法与接口关联，而不是与工具类关联。这样做能使源代码更具可读性，并确保二进制兼容性不被破坏。


    为了理解基于接口的静态方法的实用性，考虑一个 `Renderable` 接口，它包含一个 `void render(int color)` 方法，其 `color`
    参数包含一个整数颜色代码。由于用红、绿、蓝分量来表示这种颜色很方便，假设你添加一个 `rgb()` 静态方法，将这些分量转换为一个 `int` 值。请查看清单
    8-18。


    ```

    interface Renderable

    {

    public void render(int color);

    public static int rgb(int r, int g, int b)

    {

    return r << 16 | g << 8 | b;

    }

    }

    清单 8-18

    Renderable.java

    ```


    接下来，你声明一个 `Circle` 类，该类通过基于整数的圆心坐标和半径来描述一个圆，并实现 `Renderable` 来渲染一个圆。清单 8-19 展示了
    `Circle` 的源代码。


    ```

    class Circle implements Renderable

    {

    private int x, y, r;

    Circle(int x, int y, int r)

    {

    this.x = x;

    this.y = y;

    this.r = r;

    }

    @Override

    public void render(int color)

    {

    System.out.println("Rendering circle(" + x + ", " + y + ", " + r + ") in color
    " + color);

    }

    }

    清单 8-19

    Circle.java

    ```


    最后，你声明一个 `UseRenderable` 应用程序类，其源代码如清单 8-20 所示。


    ```

    public class UseRenderable

    {

    public static void main(String[] args)

    {

    Circle circle = new Circle(20, 30, 14);

    circle.render(Renderable.rgb(0x80, 0x60, 0x40));

    }

    }

    清单 8-20

    UseRenderable.java

    ```


    `UseRenderable` 的 `main()` 方法实例化 `Circle`，然后调用该对象的 `render()` 方法来渲染圆。请注意，`rgb()`
    方法调用前加上了此静态方法所属的 `Renderable` 接口。你不能用实现该接口的类作为前缀（例如 `Circle.rgb(0x80, 0x60, 0x40)`），因为该静态方法属于
    `Renderable`。


    按如下方式编译清单 8-18、8-19 和 8-20：


    ```

    javac UseRenderable.java

    ```


    `javac` 编译器工具会递归地编译其在编译命令行参数指定的源文件时遇到的类及接口所对应的源文件。


    按如下方式运行 `UseRenderable.class`：


    ```

    java UseRenderable

    ```


    你应该会看到以下输出：


    ```

    Rendering circle(20, 30, 14) in color 8413248

    ```


    ## 下一步是什么？


    Java 提供了不常见的语言特性，用于在其他类甚至块中声明类。此外，你还可以声明匿名类。第 9 章将向你介绍这些奇特的特性。


    # 9. 静态类、非静态类、局部类和匿名类


    到目前为止我所介绍的类被称为*顶层类*。它们不属于另一个类或结构。然而，Java 也允许你在其他类、*块*（位于 `{` 和 `}` 字符之间的零个或多个语句的集合）以及表达式上下文中声明类。


    在其他类中声明的类被称为*嵌套类*。嵌套类有两种：静态类和非静态类。（非静态类也称为*内部类*）。


    注意


    Java 教程中关于嵌套类的教程（[`http://docs.oracle.com/javase/tutorial/java/javaOO/nested.xhtml`](http://docs.oracle.com/javase/tutorial/java/javaOO/nested.xhtml)）给出了使用嵌套类的三个令人信服的理由：


    *   **“这是一种对仅在一个地方使用的类进行逻辑分组的方式**：如果一个类只对另一个类有用，那么将其嵌入到那个类中并将两者放在一起是合乎逻辑的。嵌套这样的“辅助类”可以使它们的包参见第
    [10 章关于包的介绍]更加精简。


    *   **它增加了封装性**：考虑两个顶层类 `A` 和 `B`，其中 `B` 需要访问 `A` 的成员，而这些成员原本会被声明为 `private`。通过将类
    `B` 隐藏在类 `A` 内部，`A` 的成员可以被声明为 `private`，而 `B` 可以访问它们。此外，`B` 本身也可以对外部世界隐藏。


    *   **它可以带来更具可读性和可维护性的代码**：将小类嵌套在顶层类中，可以使代码更靠近其使用位置。”


    在块中声明的类被称为*局部类*。在表达式上下文中声明的类被称为*匿名类*。


    本章将向你介绍静态类、内部类、局部类和匿名类。

