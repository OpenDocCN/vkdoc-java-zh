    access to data” – see [`http://en.wikipedia.org/wiki/Data_structure`](http://en.wikipedia.org/wiki/Data_structure)
    for more information). This chapter introduces you to this support in terms of
    one-dimensional arrays and two-dimensional arrays. It demonstrates one-dimensional
    arrays in terms of searching and sorting and two-dimensional arrays in terms of
    matrix multiplication.


    ## Introducing Arrays


    An *array* is a *data structure* consisting of a sequence of *elements* (values
    stored in an array) with the same memory size, where each element is associated
    with at least one *index* (a non-negative integer that uniquely identifies an
    element). The number of indexes associated with an element is known as the array’s
    *dimension*.


    In Java, arrays have fixed sizes. You cannot expand or contract an array. Instead,
    you need to create a new array of the desired size and copy the elements from
    the current array to the new array before destroying the current array.


    ## One-Dimensional Arrays


    A *one-dimensional array* (1D array – also known as a *vector*) is an array that
    associates each element with one index. It’s used to store a list of values. The
