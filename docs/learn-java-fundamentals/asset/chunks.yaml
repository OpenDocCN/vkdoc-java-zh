- fmt: '# Inner Classes


    Chapter [6](#615966_1_En_6_Chapter.xhtml) also introduced you to non-static fields,
    non-static methods, non-static field initializers, and non-static initialization
    blocks. These entities differ from their static field, static method, static field
    initializer, and static initialization block counterparts in that they don’t involve
    the `static` keyword.


    You can declare these non-static members in a class. You can also declare non-static
    classes (inner classes) in a class. The following example clarifies this organization:


    ```

    class C

    {

    int f; // field could be explicitly initialized

    void m()

    {

    // method code

    }

    // non-static initialization block

    {

    // initialization block code

    }

    class NSC

    {

    // members of non-static class

    }

    }

    ```


    This example introduces top-level class `C` with non-static field `f`, non-static
    method `m()`, a non-static initialization block (I could have shown a constructor
    instead), and inner class `NSC`. Notice that `NSC` is a member of `C` in the same
    way that `f`, `m()`, and the non-static initialization block are members of this
    class. They all belong to class `C`, which is an enclosing class – `NSC` is an
    enclosed class.


    An inner class is a member of its enclosing class. Inner classes have access to
    other members of the enclosing class, even when they are declared `private`. In
    contrast, static classes do not have direct access to non-static members of the
    enclosing class.


    As a member of the top-level class, an inner class can be declared `private`,
    `public`, `protected`, or left package private (the default). In contrast, top-level
    classes can only be declared `public` or left package private. (Chapter [10](#615966_1_En_10_Chapter.xhtml)
    introduces you to packages.)


    Listing [9-5](#615966_1_En_9_Chapter.xhtml#PC14) declares `EnclosingClass` with
    `EnclosedClass` that demonstrates access to `EnclosingClass`’s members.


    ```

    class EnclosingClass

    {

    public final static double PI = 3.14159;

    public static double area(double radius)

    {

    return PI * radius * radius;

    }

    private String msg;

    private void printMessage()

    {

    System.out.println(msg);

    }

    class EnclosedClass

    {

    void accessMembersOfEnclosingClass()

    {

    msg = "called from EnclosedClass''s accessMembersOfEnclosingClass() " + "method";

    printMessage();

    System.out.println("PI = " + PI);

    System.out.println("area(10.0) = " + area(10.0));

    }

    }

    }

    Listing 9-5

    EnclosingClass.java (version 2)

    ```


    Listing [9-5](#615966_1_En_9_Chapter.xhtml#PC14) declares a top-level class named
    `EnclosingClass` with static field `PI`, static method `area()`, non-static field
    `msg`, non-static method `printMessage()`, and non-static class `EnclosedClass`.
    Furthermore, `EnclosedClass` declares non-static method `accessMembersOfEnclosingClass()`.


    This method first assigns a string to `msg`. (Because the string is pretty long,
    I use the `+` operator to concatenate two smaller strings into the overall string.)
    Next, the method outputs `msg`. Moving on, `accessMembersOfEnclosingClass()` prints
    the value of `PI` and then (with `10.0` as the argument) invokes `area()` to calculate
    and return a circle’s area. Again, I use `+` to join two strings into one string,
    which is then output.


    Listing [9-6](#615966_1_En_9_Chapter.xhtml#PC15) presents the source code to an
    `NSCDemo` application class that demonstrates how to instantiate `EnclosingClass`
    and use this reference to instantiate `EnclosedClass`, which is used to call this
    class’s `accessMembersOfEnclosingClass()` non-static method.


    ```

    class NSCDemo

    {

    public static void main(String[] args)

    {

    EnclosingClass ec = new EnclosingClass();

    ec.new EnclosedClass().accessMembersOfEnclosingClass();

    }

    }

    Listing 9-6

    NSCDemo.java

    ```


    Listing [9-6](#615966_1_En_9_Chapter.xhtml#PC15)’s `main()` method first instantiates
    `EnclosingClass` and saves its reference in local variable `ec`. `main()` then
    uses this reference as a prefix to the `new` operator to instantiate `NSClass`,
    whose reference is subsequently used to call `accessMembersOfEnclosingClass()`.


    **Note**


    Prefixing `new` with a reference to the enclosing class is rare. Instead, you
    will typically call an enclosed class’s constructor from within a constructor
    or an instance method of its enclosing class.


    Compile both listings as follows:


    ```

    javac *.java

    ```


    Run the resulting application as follows:


    ```

    java NSCDemo

    ```


    You should observe the following output:


    ```

    called from EnclosedClass''s accessMembersOfEnclosingClass() method

    PI = 3.14159

    area(10.0) = 314.159

    ```


    ## Shadowing


    When the declaration of a type (such as a member variable [field] or a parameter)
    in a specific block (such as an inner class or a method) has the same name as
    another type declaration in the enclosing block, the declaration *shadows* (hides)
    the declaration in the enclosing block. In this context, you cannot refer to the
    shadowed declaration by its name only. Listing [9-7](#615966_1_En_9_Chapter.xhtml#PC19)’s
    `ShadowDemo` application provides a shadowing demonstration.


    ```

    class ShadowDemo

    {

    String name = "Java";

    class EnclosedClass

    {

    String name = "More Java";

    void outputName(String name)

    {

    System.out.println("name = " + name);

    System.out.println("this.name = " + this.name);

    System.out.println("ShadowDemo.this.name = " + ShadowDemo.this.name);

    }

    }

    public static void main(String[] args)

    {

    ShadowDemo sd = new ShadowDemo();

    ShadowDemo.EnclosedClass ec = sd.new EnclosedClass();

    ec.outputName("Even more Java");

    }

    }

    Listing 9-7

    ShadowDemo.java

    ```


    `ShadowDemo.java` reveals three `name` variables: `ShadowDemo`’s member variable,
    inner class `EnclosedClass`’s member variable, and `outputName()`’s parameter.
    Parameter `name` shadows `EnclosedClass`’s `name` variable. Consequently, when
    you use `name` in `outputName()`, you are referring to the `name` parameter. To
    refer to `EnclosedClass`’s `name` variable, use keyword `this` to represent the
    enclosing block:


    ```

    System.out.println("this.x = " + this.x);

    ```


    Refer to member variables that enclose larger blocks by the class name to which
    they belong. For example, the following statement accesses the member variable
    of the class `ShadowDemo` from the method `outputName()`:


    ```

    System.out.println("ShadowDemo.this.name = " + ShadowDemo.this.name);

    ```


    Compile Listing [9-7](#615966_1_En_9_Chapter.xhtml#PC19) as follows:


    ```

    javac ShadowDemo.java

    ```


    Run the application as follows:


    ```

    java ShadowDemo

    ```


    You should observe the following output:


    ```

    name = Even more Java

    this.name = More Java

    ShadowDemo.this.name = Java

    ```


    **Note**


    Refer to Chapter [6](#615966_1_En_6_Chapter.xhtml) for an introduction to shadowing.'
