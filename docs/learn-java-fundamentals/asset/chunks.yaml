- fmt: '### Javadoc Comments


    A *Javadoc comment* is a variation of the multiline comment. It begins with `/**`
    (instead of `/*`) and (like a multiline comment) ends with `*/`. All characters
    from `/**` through `*/` are ignored by the compiler. The following example presents
    a Javadoc comment:


    ```

    /**

    *  Application entry point

    *

    *  @param args array of command-line arguments passed to this method

    */

    public static void main(String[] args)

    {

    // TODO code application logic here

    }

    ```


    This example’s Javadoc comment describes an application’s `main()` method. Sandwiched
    between `/**` and `*/` is a description of the method and the `@param` *Javadoc
    tag* (an `@`-prefixed instruction to the `javadoc` tool).


    Here is a list of some commonly used Javadoc tags (including `@param`):


    * `@author` identifies the source code’s author.

    * `@deprecated` identifies a source code entity (such as a method) that should
    no longer be used.

    * `@param` identifies one of a method’s parameters.

    * `@see` provides a see-also reference.

    * `@since` identifies the software release where the entity first originated.

    * `@return` identifies the kind of value that the method returns.

    * `@throws` documents an exception thrown from a method.


    Listing [2-1](#615966_1_En_2_Chapter.xhtml#PC5) presents updated source code to
    Listing 1-1’s `HelloWorld` application. This source code includes a pair of Javadoc
    comments that document the `HelloWorld` class and its `main()` entry-point method.


    ```

    /**

    A simple class for introducing Java applications.

    @author Jeff Friesen

    */

    public class HelloWorld

    {

    /**

    Application entry point

    @param args array of command-line arguments passed to this method

    */

    public static void main(String[] args)

    {

    System.out.println("hello, world");

    }

    }

    Listing 2-1

    HelloWorld.java

    ```


    Apart from the Javadoc comments, Listing [2-1](#615966_1_En_2_Chapter.xhtml#PC5)
    differs from Listing [1-1](#615966_1_En_1_Chapter.xhtml#PC1) in that it prefixes
    class `HelloWorld` with the `public` keyword, which makes `HelloWorld` accessible
    outside of its package. (I will discuss `public` in Chapter [6](#615966_1_En_10_Chapter.xhtml)
    and packages in Chapter [10](#615966_1_En_5_Chapter.xhtml).)


    I use the `javadoc` tool to generate HTML-based documentation for `HelloWorld.java`.
    This tool requires that the `public` keyword be prefixed to the `HelloWorld` class.
    Furthermore, the `.java` file extension is required:


    ```

    javadoc HelloWorld.java

    ```


    In response, `javadoc` generates the following output:


    ```

    Loading source file HelloWorld.java...

    Constructing Javadoc information...

    Building index for all the packages and classes...

    Standard Doclet version 20.0.1+9-29

    Building tree for all the packages and classes...

    Generating .\HelloWorld.xhtml...

    HelloWorld.java:7: warning: use of default constructor, which does not provide
    a comment

    public class HelloWorld

    ^

    Generating .\package-summary.xhtml...

    Generating .\package-tree.xhtml...

    Generating .\overview-tree.xhtml...

    Building index for all classes...

    Generating .\allclasses-index.xhtml...

    Generating .\allpackages-index.xhtml...

    Generating .\index-all.xhtml...

    Generating .\search.xhtml...

    Generating .\index.xhtml...

    Generating .\help-doc.xhtml...

    1 warning

    ```


    The warning message refers to an undocumented default constructor. Constructors
    are used to initialize objects when they are created. I discuss constructors,
    objects, and the creation of objects in Chapter [6](#615966_1_En_6_Chapter.xhtml).


    I’ve created a second version of `HelloWorld.java` that includes a commented constructor.
    You can find this file in this book’s code archive. Instructions for obtaining
    the code archive are provided in the book’s introduction.


    The generated documentation includes an index file (`index.xhtml`) that describes
    the documentation’s start page. Figure [2-1](#615966_1_En_2_Chapter.xhtml#Fig1)
    shows the start page for `HelloWorld.java`.


    ![](images/615966_1_En_2_Chapter/615966_1_En_2_Fig1_HTML.jpg)


    A screenshot highlights the unnamed package section.


    Figure 2-1


    The javadoc-generated documentation for HelloWorld.java


    The `javadoc` tool was also used to generate the documentation for JDK 21’s reference
    type library. This documentation’s start page is located at [`http://docs.oracle.com/en/java/javase/21/docs/api/index.xhtml`](http://docs.oracle.com/en/java/javase/21/docs/api/index.xhtml).
    Figure [2-2](#615966_1_En_2_Chapter.xhtml#Fig2) shows you part of this start page.


    ![](images/615966_1_En_2_Chapter/615966_1_En_2_Fig2_HTML.jpg)


    A screenshot highlights the overview of the java doc generated document.


    Figure 2-2


    The javadoc-generated documentation for JDK 21’s reference type library


    ## Identifiers


    Variables, statements, classes, and other language features need to be named to
    be referenced from elsewhere in the code. Java supports this capability through
    identifiers.


    An *identifier* is a sequence of letters (A`–`Z, a`–`z, or equivalent uppercase/lowercase
    letters in other human alphabets), digits (0`–`9 or equivalent digits in other
    human alphabets), connecting punctuation characters such as the underscore, and
    currency symbols (e.g., the `$` sign). It must begin with a letter, a currency
    symbol, or a connecting punctuation character. Its length cannot exceed the line
    in which it appears.


    Note


    According to page 28 of the “Java Language Specification” for JDK 21 ([`http://docs.oracle.com/javase/specs/jls/se21/jls21.pdf`](http://docs.oracle.com/javase/specs/jls/se21/jls21.pdf)),
    “the dollar sign [`$`] should be used only in mechanically generated source code
    or, rarely, to access pre-existing names on legacy systems.”


    Examples of valid identifiers include `i`, `grade_letter`, `counter10`, and `degreesCelsius`.
    Examples of invalid identifiers include `6Age` (starts with a digit) and `last#Name`
    (`#` is not a valid identifier symbol).


    Note


    Java is a case-sensitive language. This means that identifiers differing in case
    are considered different identifiers. For example, `age` and `Age` are different
    identifiers.


    Almost any valid identifier can be used to name a language feature. However, some
    identifiers are reserved for special use by Java. These reserved identifiers are
    known as *reserved words*. Figure [2-3](#615966_1_En_2_Chapter.xhtml#Fig3) reveals
    Java’s 53 reserved words.


    ![](images/615966_1_En_2_Chapter/615966_1_En_2_Fig3_HTML.jpg)


    A screenshot contains the 53 Java-reserved words.


    Figure 2-3


    Java-reserved identifiers


    JDK 9 added a single underscore character (`_`) to Java’s list of reserved words.
    It’s an error to use a single underscore to name anything. However, it’s okay
    to use multiple underscores (although you probably shouldn’t).


    Note


    Most of Java’s reserved words are also known as *keywords*. The three exceptions
    are `false`, `null`, and `true`. They are examples of *literals* (values expressed
    verbatim).


    Also, `const` and `goto` are reserved by Java but are not used.'
