- fmt: '# Standard I/O


    *Standard I/O* is a communications framework that connects a running program to
    its source of input via a byte stream (or channel, if you prefer). It also connects
    the program to its normal output and error output destinations.


    **Note**


    `System` declares `in`, `out`, and `err` class fields that connect a program to
    its input source, output destination, and error destination. The `in` field is
    of type `java.io.InputStream`; the `out` and `err` fields are of type `java.io.PrintStream`.


    I won’t be discussing `InputStream` and `PrintStream` in this book beyond what
    I present in this section. Instead, I refer you to my *Java I/O, NIO and NIO.2*
    book where I discuss these and other I/O-related types in more detail. (See [`www.amazon.ca/Java-NIO-NIO-2-JEFF-FRIESEN/dp/1484215664/`](http://www.amazon.ca/Java-NIO-NIO-2-JEFF-FRIESEN/dp/1484215664/)
    to obtain this book.)


    I hope to update *Java I/O, NIO and NIO.2* and rename it to *Learn Java I/O, NIO
    and NIO.2* to make it part of a “Learn Java …” series.


    ## Standard Input


    A running program receives its input from *standard input*, which is an operating
    system mechanism that abstracts the input source. This mechanism defaults to a
    console’s keyboard but can be *redirected* to a file or other output device.


    Consider Chapter [13](#615966_1_En_13_Chapter.xhtml)’s `WC` application. It calls
    `System.in.read()` to read bytes from standard input. These bytes could come from
    the keyboard, a file, or some other source. The program doesn’t know or care about
    the source. It just “sees” a stream of bytes and performs some action on them.


    **Note**


    Various character-encoding standards are used to encode characters. For example,
    ASCII (American Standard Code for Information Interchange – see [`http://en.wikipedia.org/wiki/ASCII`](http://en.wikipedia.org/wiki/ASCII))
    was the dominant character-encoding standard before Unicode (see [`en.wikipedia.org/wiki/Unicode`](http://en.wikipedia.org/wiki/Unicode))
    emerged.


    ASCII uses seven bits of an 8-bit byte to encode a character. In contrast, Unicode
    originally used two bytes to encode a character (which is why Java’s `char` type
    occupies 16 bits) but now uses up to four bytes. The `java.lang.Character` class
    compensates. (Check out [`http://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/lang/Character.xhtml`](http://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/lang/Character.xhtml)
    for more information on `Character`.)


    `System.in` refers to `System`’s `in` class field, which is of type `InputStream`.


    `InputStream` provides an `int read()` method that reads a byte from an input
    source and returns the byte as a 32-bit integer (`int`). It returns -1 when the
    end of the byte stream is reached. It throws `java.io.IOException` when an I/O
    error (such as an attempt to read from a file source that has been closed) occurs.


    Suppose you run the `WC` application as follows:


    ```

    java WC

    ```


    In this execution, `WC`’s input (via `System.in.read()` method calls) comes from
    the keyboard.


    Standard I/O lets you redirect standard input from the console keyboard default
    to a file or another input source. To achieve this with `WC`, you would specify
    the `<` symbol followed by the name of the input source, as follows:


    ```

    java WC <words.txt

    ```


    Here, the input is coming from a file named `words.txt`.


    **Note**


    `System` provides the `void setIn(InputStream in)` method to redirect standard
    input to another stream. For example, `System.setIn(new FileInputStream("words.txt"));`
    is the equivalent of `<words.txt`.


    The `java.io.FileInputStream` class lets you obtain input from a file. I don’t
    discuss this class in this book.


    ## Standard Output


    A running program sends its non-error output to *standard output*, which is an
    operating system mechanism that abstracts the non-error output destination (also
    known as a *sink*). This mechanism defaults to a console’s screen but can be redirected
    to a file or other output device.


    Consider Chapter [13](#615966_1_En_13_Chapter.xhtml)’s `WC` application. It calls
    `System.out.println()` to write a string to standard output. This string is sent
    to a file or some other sink. The program doesn’t know or care about the sink.


    `System.out` refers to `System`’s `out` class field, which is of type `PrintStream`.


    `PrintStream` provides assorted `print()` and `println()` methods to write various
    types of data to a sink. For example, `print(double d)` writes a double-precision
    floating-point value, whereas `println(String s)` writes a string.


    **Note**


    The difference between `print()` and `println()` is that `println()` writes a
    newline character (expressed literally as `\n`) after writing its argument. The
    newline character causes the *cursor* (a movable indicator where input is entered
    or where output is sent) to be positioned at the start of the next input or output
    line. It is written as a platform-specific byte sequence, which is 13 followed
    by 10 on a Windows platform or 10 on a Unix/Linux platform.


    You can write a blank line to separate lines of output by calling the `System.out.println()`
    method that takes no arguments. This method outputs the line separator that I
    mentioned earlier in this chapter.


    Suppose you run the `WC` application as follows:


    ```

    java WC

    ```


    In this execution, `WC`’s output is sent to the screen (via `System.out.println()`
    method calls).


    Standard I/O lets you redirect standard output from the console screen default
    to a file or another output sink. To achieve this with `WC`, you would specify
    the `>` symbol followed by the name of the output sink, as follows:


    ```

    java WC >stats.txt

    ```


    Here, the output is going to a file named `stats.txt`.


    **Note**


    `System` provides the `void setOut(PrintStream out)` method to redirect standard
    output to another stream. For example, `System.setOut(new FileOutputStream("stats.txt"));`
    is the equivalent of `>stats.txt`.


    The `java.io.FileOutputStream` class lets you send output to a file. I don’t discuss
    this class in this book.'
