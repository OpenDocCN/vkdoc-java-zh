    ## 向下转型与RTTI


    通过向上转型沿类层次结构向上移动，意味着会失去对子类型特性的访问。例如，将`Truck`对象赋值给`Vehicle`变量`v`意味着您无法使用`v`调用`Truck`的`isExtendedCab()`方法。但是，可以通过执行像`Truck
    t = (Truck) v;`这样的显式强制转换操作，再次访问`Truck`的`isExtendedCab()`方法。


    这种赋值被称为*向下转型*，因为您正在沿继承层次结构从超类型向下转型到子类型（从`Vehicle`超类到`Truck`子类）。虽然向上转型总是安全的（超类的接口是子类接口的子集），但向下转型并不总是安全的。清单[8-15](#615966_1_En_8_Chapter.xhtml#PC24)展示了如果错误使用向下转型可能带来的麻烦。


    ```

    class Vehicle

    {

    }

    class Truck extends Vehicle

    {

    private boolean isExtendedCab;

    boolean isExtendedCab()

    {

    return isExtendedCab;

    }

    }

    public class BadDowncast

    {

    public static void main(String[] args)

    {

    Vehicle v = new Vehicle();

    Truck t = (Truck) v;

    System.out.println(t.isExtendedCab());

    }

    }

