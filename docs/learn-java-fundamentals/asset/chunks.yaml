    statement

    ```


    `while`语句由保留字`while`、后跟括号括起来的布尔表达式`expression`、以及后跟的`statement`组成，`statement`会被重复执行。


    `while`语句首先计算`expression`。如果返回`true`，程序执行`statement`。然后再次计算`expression`。如果仍为`true`，则再次执行`statement`。此行为持续直到`expression`计算为`false`，此时执行流程转到`statement`之后的第一条语句。


    以下示例演示了`while`语句：


    ```

    long fact = 1;

    int i = 1;

    while (i <= 4)

    fact *= i++;

    System.out.println(fact);

    ```


    此示例计算4!（阶乘）。阶乘是从1开始到目标整数为止的所有整数的乘积。例如，4! = 1 x 2 x 3 x 4（即24）。（注意0!等于1。）


    声明变量`fact`（用于保存阶乘结果）和`i`（记录当前循环次数的循环计数器）后，示例进入`while`循环。该循环首先通过计算`i <= 4`来验证`i`是否未超过四次迭代。只要此布尔表达式计算为`true`，`while`循环就会继续。


    每次迭代执行`fact *= i++;`。这条复合赋值语句完成了以下几件事：


    1.  它获取`i`的值并存储到内存位置，然后递增该值并将结果和存入`i`。

    2.  它获取`fact`的值以及从`i`读取的存储值，并将这两个值相乘。

    3.  它将乘法结果存入`fact`。


    当`while`循环结束时，执行`System.out.println(fact);`。获取`fact`中存储的值并输出到控制台。


    注意后自增运算符`++`的存在。此运算符递增变量`i`，使循环最终能够结束。如果没有它，循环将永远不会结束，因为`i`永远不会递增，始终为1，而1小于4。


    > **注意**：永不结束的循环称为无限循环。


    此示例产生以下输出：


    ```

    24

    ```


