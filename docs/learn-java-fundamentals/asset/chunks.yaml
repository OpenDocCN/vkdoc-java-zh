  trans: '

    ## 玩转语句


    语句玩起来很有趣，因为你永远不知道会发现什么。我创建了一个 `StmtDemo` 应用程序，并用几个示例语句填充了它，作为本次探索的起点。清单 4-1 展示了
    `StmtDemo` 的源代码。


    ```

    class StmtDemo

    {

    public static void main(String[] args)

    {

    if (args.length != 1)

    {

    System.out.println("usage: java StmtDemo ([-h] | [-v] | " + "[positive integer
    count])");

    return;

    }

    switch (args[0])

    {

    case "-H":

    case "-h": System.out.println("help");

    return;

    case "-V":

    case "-v": System.out.println("version 1.0");

    return;

    default  : int count = 0;

    for (int i = 0; i  ''9'')

    {

    System.out.println("invalid character detected: " + digit);

    return;

    }

    count *= 10;

    count += digit - ''0'';

    }

    for (int i = 0; i < count; i++)

    System.out.print("*");

    System.out.println();

    }

    }

    }

    清单 4-1

    StmtDemo.java

    ```


    `StmtDemo` 主要关注 `if`、方法调用、`return`、`switch`、简单赋值、`for` 和复合赋值语句。


    `main()` 方法中的第一个示例语句使用 `if` 来确保指定了单个命令行参数。它计算布尔表达式 `args.length != 1`，并在不满足此条件时执行一个代码块（布尔表达式计算结果为
    true，因为指定了零个参数或多个参数）。


    第二个示例语句使用 `System.out.println()` 方法调用来输出一条用法信息。`System.out.println()` 是该代码块中的第一条语句。


    第三个示例语句使用 `return` 退出 `main()` 方法并终止程序。这是该代码块中的第二条语句。


    第四个示例语句使用 `switch` 来识别传递给程序的第一个且唯一的命令行参数。该命令行参数存储在 `args[0]` 中，这是 `args` 数组中的第一个位置。（我将在第
    5 章中介绍数组。）


    `switch` 语句通过其 `case` 分支展示了其他语句。


    前两个 `case` 分支分别将 `args[0]` 与 `"-H"` 和 `"-h"` 进行比较。注意，`case "-H"` 是空的：它没有指定任何语句，甚至没有
    `break` 语句。因为没有 `break` 语句，当在命令行中指定 `-H` 时，执行流程会落入 `case "-h"` 的语句中。


    `case "-h"` 的第一条语句是一个 `System.out.println()` 方法调用，用于输出一条简短的帮助信息。可以推测，`-h` 会显示关于程序用法的有用帮助信息。在这个例子中，我提供了一个简单的消息，让你了解可能出现的内容。


    `case "-h"` 的第二条语句是一个 `return` 语句，它将执行流程从 `switch` 语句和 `main()` 方法中转移出来，从而终止程序。


    接下来的两个 `case` 分支分别将 `args[0]` 与 `"-V"` 和 `"-v"` 进行比较。它们在功能上与前面两个 `case` 分支相同，但输出的是简短的版本号信息。


    注意


    许多程序都有版本号。例如，`1.0` 通常表示程序的第一个版本。句点（`.`）之前的数字通常称为主版本号，句点之后的数字通常称为次版本号。在这个例子中，“`1`”是主版本号，“`0`”是次版本号。


    主版本号表示程序的主要变更。次版本号表示程序的次要变更。请查看维基百科的“软件版本号”条目（[`http://en.wikipedia.org/wiki/Software_versioning`](http://en.wikipedia.org/wiki/Software_versioning)）以了解更多关于版本号的信息。


    当在命令行中指定了 `-H`、`-h`、`-V` 或 `-v` 以外的内容时，将执行 `default` 分支。


    `default` 分支执行的第一条语句是一个简单赋值语句的变体，它声明了一个 `count` 变量并将其初始化为 0。


    接下来要执行的是一条 `for` 语句，它遍历命令行参数的字符。


    `for` 语句在其初始化部分声明了一个名为 `i` 的 `int` 变量，并将其初始化为 `0`。然后，它将此变量与 `args[0].length()`
    进行比较，后者返回构成命令行参数的字符数。


    `args[0].length()` 表达式由两个操作数组成，它们由成员选择运算符（`.`）分隔。`args[0]` 操作数使用数组索引运算符（`[]`）从数组中返回第一个命令行参数，该参数以字符串形式表示。`length()`
    操作数是一个 `String` 方法，它返回字符串中的字符数。


    `for` 语句执行的代码块以 `char digit = args[0].charAt(i);` 开头，该语句从 `args[0]` 字符串中提取下一个字符（预期是一个数字），并将其赋值给
    `char` 变量 `digit`。`String` 提供了一个 `charAt()` 方法，该方法返回由其单个参数（必须是 `int` 类型）指定的索引处的字符。


    该代码块接下来执行一条 `if` 语句，其布尔表达式将 `digit` 中存储的字符与 `''0''` 和 `''9''` 进行比较。如果此字符在数值上小于
    `''0''` 的 Unicode 编号或大于 `''9''` 的 Unicode 编号，则会调用一个代码块。


    注意


    在创建用于那些使用 0 到 9 之外数字字符的国家（例如，参见 [`http://en.wikipedia.org/wiki/Tamil_numerals`](http://en.wikipedia.org/wiki/Tamil_numerals)）的
    Java 程序时，硬编码诸如 `digit < ''0'' || digit > ''9''` 这样的表达式并不是一个好主意。相反，你应该调用 `Character`
    类的 `boolean isDigit(char ch)` 方法来确定一个字符是否代表数字。（`Character` 是 Java 引用类型库的成员。）


    该代码块首先执行一个 `System.out.println()` 方法调用，以输出一条错误消息以及有问题的字符。（注意 `+` 运算符用于将两个字符串连接成第三个字符串。）


    然后，该代码块执行一条 `return` 语句，这会导致执行流程离开 `main()` 并终止程序。


    如果存储在 `digit` 变量中的字符确实是一个数字，则执行流程会转到一对复合赋值语句：


    ```

    count *= 10;

    count += digit - ''0'';

    ```


    第一条复合赋值语句读取 `count` 的值，将其乘以 `10`，并将结果存储回 `count`。第二条复合语句读取 `count` 的值，将 `digit`
    中的 Unicode 编号加到此值上，然后减去 `''0''` 的 Unicode 编号。结果存储回 `count`。


    `main()` 方法中的最后两个示例语句包括一条用于输出 `count` 个星号（`*`）的 `for` 语句，以及一条 `System.out.println();`
    方法调用语句，用于使后续输出从下一输出行的开头开始。


    按如下方式编译清单 4-1：


    ```

    javac StmtDemo.java

    ```


    按如下方式运行生成的应用程序：


    ```

    java StmtDemo

    ```


    你应该会看到以下输出：


    ```

    usage: java StmtDemo ([-h] | [-v] | [positive integer count])

    ```


    现在，使用 `-h`（或 `-H`）命令行选项运行该应用程序：


    ```

    java StmtDemo -h

    ```


    应用程序会输出以下消息作为响应：


    ```

    help

    ```


    接着，使用 `-v`（或 `-V`）命令行选项运行该应用程序：


    ```

    java StmtDemo -v

    ```


    你应该会看到以下输出：


    ```

    version 1.0

    ```


    最后，使用参数 `10` 运行该应用程序：


    ```

    java StmtDemo 10

    ```


    你现在应该会在输出行上看到十个星号：


    ```

    **********

    ```


    ## 下一步是什么？


    既然你已经掌握了语句，就可以开始创建有趣的程序了。下一章将介绍数组，它允许你将多个值与单个变量关联起来。数组让你能够创建比本书迄今为止所见到的程序更有趣的程序。

