    ## 复合表达式


    *复合表达式*是由一系列简单表达式通过*运算符*连接而成的序列，运算符是以符号形式表示的指令序列，用于将操作数转换为新值。例如，`-1`是一个复合表达式，其中`-`是运算符，`int`字面量`1`是其操作数。该表达式将`1`转换为其相反数：`-1`。同样，`4
    * y`也是一个复合表达式，其中`*`是运算符，`4`和`y`是其操作数。当该表达式被求值时，会获取`y`的值并与`4`相乘，表达式的值即为乘法运算的结果。


    注意


    如果`x`的类型是`byte`或`short`，该变量的值会被拓宽为`int`类型。但如果类型是`long`、`double`或`float`，则`4`会被拓宽为相应的类型。加法运算在拓宽操作完成后执行。


    Java 根据运算符所操作的操作数数量对其进行分类：


    *   *一元运算符*接受单个操作数。在前面的`-1`示例中，`-`（一元负号）运算符接受单个操作数。

    *   *二元运算符*接受两个操作数。`4 * y`中的`*`（乘法）运算符就是二元运算符的一个例子。

    *   Java 支持一个*三元运算符*，它接受三个操作数。该运算符由两个符号（`? :`）表示，被称为*条件运算符*。我将在后面讨论这个运算符。


    Java 还根据运算符的位置将其分为前缀、后缀和中缀：


    *   *前缀运算符*是位于其单个操作数之前的一元运算符（如`-1`）。

    *   *后缀运算符*是位于其单个操作数之后的一元运算符（如`x++`——递增`x`中的值）。

    *   *中缀运算符*是位于二元运算符的两个操作数之间（如`4 * y`）或三元运算符的三个操作数之间的二元运算符。


    在求值表达式时，编译器会考虑每个运算符的优先级和结合性：


    *   *优先级*决定了当表达式包含两个或多个不同优先级的运算符时，表达式的求值顺序。优先级高的运算符先被求值。例如，在表达式`4 + 2 * 3`中，子表达式`2
    * 3`先被求值，因为乘法的优先级高于加法。

    *   *结合性*决定了当表达式包含两个或多个相同优先级的运算符时，表达式的求值顺序。例如，`4 + 2 + 3`会先求值`4 + 2`，因为`+`具有从左到右的结合性。如果`+`具有从右到左的结合性，则会先求值`2
    + 3`，然后将结果与`4`相加。


    表 3-1 列出了 Java 的所有运算符，包括它们的符号、描述、优先级和结合性。


    表 3-1


    按优先级分组的 Java 运算符


    | 运算符 | 类型 | 优先级 | 结合性 |

    | --- | --- | --- | --- |

    | `()``[]``.` | 括号数组索引成员选择 | 15 | 从左到右 |

    | `++``--` | 一元后置递增一元后置递减 | 14 | 从右到左 |

    | `++``--``+``-``!``~``(`*类型*`)` | 一元前置递增一元前置递减一元正号一元负号一元逻辑非一元按位取反一元类型转换 | 13
    | 从右到左 |

    | `*``/``%` | 乘法除法取模 | 12 | 从左到右 |

    | `+``+``-` | 加法字符串拼接减法 | 11 | 从左到右 |

    | `<<``>>``>>>` | 按位左移带符号扩展的按位右移带零扩展的按位右移 | 10 | 从左到右 |

    | `<``<=``>``>=``instanceof` | 关系小于关系小于等于关系大于关系大于等于对象关系类型比较 | 9 | 从左到右 |

    | `==``!=` | 等于不等于 | 8 | 从左到右 |

    | `&` | 按位与 | 7 | 从左到右 |

    | `^` | 按位异或 | 6 | 从左到右 |

    | `&#124;` | 按位或 | 5 | 从左到右 |

    | `&&` | 逻辑与 | 4 | 从左到右 |

    | `&#124;&#124;` | 逻辑或 | 3 | 从左到右 |

    | `?:` | 条件 | 2 | 从右到左 |

    | `=``+=``-=``*=``/=``%=``&=``^=``&#124;=``<<=``>>=``>>>=` | 赋值加法赋值减法赋值乘法赋值除法赋值取模赋值按位与赋值按位异或赋值按位或赋值按位左移赋值带符号扩展的按位右移赋值带零扩展的按位无符号右移赋值
    | 1111111111111 | 从右到左从右到左从右到左从右到左从右到左从右到左从右到左从右到左从右到左从右到左从右到左从右到左从右到左 |


    每一行标识一个或多个运算符。这些运算符共享相同的优先级。“优先级”列显示了一个从 1 到 15 的数字，用于指定该行中所有运算符的优先级。数字越大，优先级越高。例如，乘法的优先级（12）高于加法的优先级（11），因为乘法在加法之前执行。


    ### 运算符示例


    表 3-1 中的一些运算符可能比较熟悉；另一些则可能令人费解。接下来的几节将按优先级从低到高的顺序简要描述所有运算符。


    #### 赋值运算符


    Java 支持简单赋值（`=`）和复合赋值（`+=`、`-=`、`*=`、`/=`、`%=`、`&=`、`^=`、`|=`、`<<=`、`>>=` 和 `>>>=`）运算符。


    ##### 简单赋值


    *=* *运算符*将表达式的值赋给一个变量。该运算符的语法如下：


    ```

    变量 ''='' 表达式 '';''

    ```


    注意


    你必须指定单引号之间的内容（但不包括单引号本身）。此外，斜体项是你必须输入的占位符。这也适用于表 3-1 中的 `(`*类型*`)`。（在该表中，我没有使用单引号来包围你需要逐字输入的文本，因为我不想造成混淆。）


    *变量*和*表达式*的类型必须一致，以避免编译器错误。例如，你不能直接将一个`double`值赋给一个`int`变量。


    考虑以下示例，它将`self_employed`初始化为`true`：


    ```

    boolean self_employed = true;

    ```


    ##### 复合赋值


    *+=*、*-=*、**=*、*/=*、*%=*、*&=*、*^=*、*|=*、*<<=*、*>>=* 和 *>>>=* *运算符*先执行其运算，然后将结果赋给变量。它们的语法如下所示：


    ```

    变量 ''+='' 表达式 '';''

    变量 ''-='' 表达式 '';''

    变量 ''*='' 表达式 '';''

    变量 ''/='' 表达式 '';''

    变量 ''%='' 表达式 '';''

    变量 ''&='' 表达式 '';''

    变量 ''^='' 表达式 '';''

    变量 ''|='' 表达式 '';''

    变量 ''<<='' 表达式 '';''

    变量 ''>>='' 表达式 '';''

    变量 ''>>>='' 表达式 '';''

    ```


    同样，变量和表达式的类型必须一致，以避免编译器错误。


    看看这些例子：


    ```

    int x += 1; // 递增 x。

    int x -= 1; // 递减 x。

    int x *= 2; // 将 x 乘以 2。

    int x /= 2; // 将 x 除以 2。

    int x %= 2; // 将 x 除以 2 的余数赋给 x。

    int x &= 0xFFFFFF00; // 关闭 x 中最右边的八位。

    int x ^= 0xFFFFFFFF; // 关闭 x 中所有已设置的位。

    int x |= 0xFF000000; // 打开 x 中最左边的八位。

    int x <<= 1; // 将 x 乘以 2。

    int x >>= 1; // 将 x 除以 2。如果 x 为负数，结果也为负数。

    int x >>>= 1; // 将 x 除以 2。如果 x 为负数，结果为正数。

    ```


    在乘以或除以 2 的幂时，`<<=` 和 `>>=` 运算符比其对应的 `*` 和 `/` 运算符执行得更快。此外，在处理二进制数时，它们也更直观。

