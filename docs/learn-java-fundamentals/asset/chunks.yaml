    ### 递归


    方法通常会执行包含调用其他方法的语句。然而，让一个方法调用自身也常常很有用。这种编程技术被称为*递归*。


    例如，假设你需要编写一个返回*阶乘*的方法，阶乘是指从 1 到指定整数（含该整数）的所有正整数的乘积。已知 `!` 是阶乘的数学符号，你可以推断出 4! 等于
    4x3x2x1，即 24。此外，1! 等于 1，0! 也等于 1。编写此方法的第一种方法可能包含本章前面展示的代码。


    前面展示的 `factorial()` 代码通过迭代完成了任务。然而，采用递归风格可以更简洁地编写此方法：


    ```

    long factorial(int n)

    {

    if (n < 0)

    return -1;

    if (n == 0 || n == 1)

    return 1; // 基础问题

    else

    return n * factorial(n - 1);

    }

    ```


    递归方法用自身更简单的形式来表达问题。根据这个例子，最简单的问题，也称为*基础问题*，是 0! (1) 或 1! (1)。


    当向 `factorial()` 传递一个大于 1 的参数时，该方法通过用下一个更小的参数值调用自身，将问题分解为一个更简单的问题。最终，会达到基础问题。例如，调用
    `factorial(4)` 会产生以下表达式堆栈：


    ```

    4 * factorial(3)

    3 * factorial(2)

    2 * factorial(1)

    ```


    最后一个表达式位于堆栈顶部。当 `factorial(1)` 返回 1 时，这些表达式会随着堆栈开始展开而按以下顺序求值：


    *   `2 * factorial(1)` 现在变为 2*1 (2)

    *   `3 * factorial(2)` 现在变为 3*2 (6)

    *   `4 * factorial(3)` 现在变为 4*6 (24)


    递归为表达许多问题提供了一种优雅的方式。其他示例包括在基于树的数据结构中搜索特定值，以及在分层文件系统中查找并输出包含特定文本的所有文件的名称。


    警告


    递归会消耗堆栈空间，因此请确保你的递归最终会终止于一个基础问题；否则，你将耗尽堆栈空间，并且你的应用程序将被迫终止。


    ### 可变参数


    JDK 5 引入了一项功能，简化了向方法和构造函数传递可变数量参数的语法。此功能被称为*可变参数*。


    在声明接受可变数量参数的方法或构造函数时，在最右侧参数的类型名称后指定三个连续的点。考虑以下实例方法示例，它返回整数列表中的最小值：


    ```

    int min(int... values)

    ```


    此方法头声明了一个 `min()` 方法，该方法声明了可变数量的参数。你可以像下面这样调用此方法：


    ```

    min(-8, 55, 0, -12, 14);

    ```


    在 JDK 5 之前，你必须使用数组类型来声明该方法：


    ```

    int min(int[] values)

    ```


    此方法将按以下方式调用：


    ```

    min(new int[] {-8, 55, 0, -12, 14});

    ```


    可变参数功能是*语法糖*（使代码编写更甜美的语法）的一个例子。在编译期间，编译器会将较旧且更繁琐的 `int[] {}` 语法转换为此功能的更现代的 `...`
    版本。


    清单 6-7 展示了一个 `VarargsDemo` 应用程序类的源代码，该类在 `min()` 方法的两个版本中演示了可变参数。


    ```

    class VarargsDemo

    {

    public static void main(String[] args)

    {

    System.out.println(min(-8, 55, 0, -12, 14));

    System.out.println(min(new int[] {-8, 55, 0, -12, 14}));

    System.out.println(min2(new int[] {-8, 55, 0, -12, 14}));

    //      System.out.println(min2(-8, 55, 0, -12, 14));

    }

    static int min(int... values)

    {

    int smallest = 0;

    for (int i = 0; i < values.length; i++)

    if (values[i] < smallest)

    smallest = values[i];

    return smallest;

    }

    static int min2(int[] values)

    {

    int smallest = 0;

    for (int i = 0; i < values.length; i++)

    if (values[i] < smallest)

    smallest = values[i];

    return smallest;

    }

    }

    清单 6-7

    VarargsDemo.java

    ```


    `VarargsDemo` 声明了 `main()`、`min()` 和 `min2()` 方法。`main()` 方法运行应用程序。`min()` 和 `min2()`
    方法分别使用较新的可变参数和较旧的数组功能来接收可变数量的参数。


    尽管这些方法具有不同的方法头，但它们具有相同的方法体，这证明了可变参数是基于一维数组实现的。


    每个方法的方法体都包含用于从 `values` 数组中定位并返回最小整数的代码。数组的长度由 `values.length` 指定。


    也许你想知道为什么我没有尝试通过指定 `min(int[] values)` 而不是 `min(int... values)` 来重载 `min()`。如果我尝试这样做，编译器会报告错误，指出无法同时声明
    `min(int... values)` 和 `min(int[] values)`。在幕后，`min(int... values)` 会被转换为 `min(int[]
    values)`。


    按如下方式编译清单 6-7：


    ```

    javac VarargsDemo.java

    ```


    按如下方式运行生成的 `VarargsDemo.class` 类文件：


    ```

    java VarargsDemo

    ```


    你应该会看到以下输出：


    ```


    ```


    ## 接下来是什么？


    `Vehicle` 过于泛化，无法表示特定类型的车辆，例如卡车或汽车。它也可以表示滑板或自行车。为了容纳更具体的车辆类型，我们需要通过类扩展来进行特化，这是第
    7 章的主题。


    # 7. 通过继承和组合复用类


    第 6 章向你介绍了类，它们*封装*（组合）了字段（存储状态）、方法（实现行为）和构造函数（实例化对象）。这种安排被称为*基于对象的编程*。


    Java 提供了一种继承机制，用于从一个类派生出另一个类。其思想是以更专业化的方式复用这个其他类。这种安排被称为*面向对象编程*。


    Java 还提供了一种组合机制，用于将一个类定义为其各个部分的总和。换句话说，类的字段由其他类实现。组合提供了复用其他类的另一种方式。


    本章首先向你介绍继承。然后向你介绍组合。


    ## 继承


    *继承*是一种用于类复用的编程技术，通过它你可以从一个类派生出另一个类。它允许你从更泛化的类创建更专门的类。


    考虑第 6 章的 `Vehicle` 类。`Vehicle` 概括了成为一辆交通工具的含义。一辆交通工具具有品牌、型号和年份。此外，一辆交通工具可以被驾驶。


    假设你想建模一辆卡车。你可以从 `Vehicle` 派生一个 `Truck` 类，该类将继承 `Vehicle` 的 `make`、`model` 和 `year`
    字段，以及通过 `Vehicle` 的 `drive()` 方法进行驾驶的能力。然后，你可以添加任何必要的字段和方法来区分 `Truck` 和 `Vehicle`。


    你可以用类似的方式建模自行车、摩托车、船或滑板。


    在这些例子中，继承都用于在一对类之间形成*是一个关系*。`Truck` 是一个 `Vehicle`。对于 `Bicycle`、`Motorcycle`、`Boat`
    和 `SkateBoard` 也是如此。


    本节首先向你展示如何使用 Java 的类扩展功能来形成 is-a 关系。然后讨论方法覆盖，并介绍所有类的最终祖先。

