    Because a program consists of one or more class files, the launcher receives the
    name of the *main class file* (the class file where execution begins). After loading
    the JVM into memory, it tells the JVM to use its *class loader* component to load
    the main class file into memory. The JVM then verifies that the class file’s bytecode
    is safe to run (e.g., no viruses) and runs it.


    Note


    The verifier and a security manager architecture make it possible to achieve *security*:
    a Java application will not be allowed to run when the verifier detects corrupt
    bytecode. Furthermore, when a security manager is installed, the application won’t
    be able to steal sensitive information, erase files, or otherwise harm a user’s
    computer.


