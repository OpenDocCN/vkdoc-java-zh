    引言


    Java 是一种流行的编程语言和环境。由于许多公司的信息技术部门都在使用 Java，学习 Java 是提升职业生涯（并在当前经济困难时期赚取更多收入）的绝佳途径。


    如果您从未接触过 Java，这本包含 14 个章节的书正适合您。第 1 章将带您轻松踏上学习 Java 基础知识的旅程。


    第 2 章至第 11 章主要关注语言语法，同时也介绍了一些与语法密切相关的 API。


    第 2 章重点介绍注释、标识符、类型、变量和字面量。这些特性是许多语言的基础，本章还将向您展示 Java 在这些特性的实现上与其他语言的不同之处。


    第 3 章重点介绍表达式（和运算符），第 4 章重点介绍语句。同样，这些特性在许多语言中都很常见。您将使用这些构建块来构造简单的 Java 程序，并了解 Java
    在表达式（和运算符）及语句的实现上与其他语言的不同之处。


    第 5 章重点介绍数组。您将使用这种基本数据结构来创建处理数据项序列的程序。例如，您可能希望在员工 ID 序列中搜索特定的标识符。


    如果 Java 仅提供这些功能，您将能够创建复杂的结构化程序。在结构化程序中，数据和操作数据的方法是分离的。然而，正如第 6 章至第 8 章所示，Java
    的能力远不止创建结构化程序。


    第 6 章向您介绍类和对象。类是制造对象的*模板*。它提供了一种架构，用于组织数据并将数据与操作数据的代码关联起来。*对象*是类的一个实例（有点像饼干是饼干模具的一个实例）。它存储数据，这些数据可以由对象从其类中继承的代码进行操作。（如果这看起来复杂，请不要担心。阅读第
    6 章后，您将会有更好的理解。）


    Java 和其他支持类和对象的语言被称为*基于对象的语言*。要超越基于对象并成为*面向对象的语言*，一种语言还必须支持继承。Java 支持继承，您将在第 7
    章中了解这一点。


    通过多态性（基于继承）可以使程序更高效。多态性背后的思想是，单个符号可以代表许多不同的类型（例如，`+`符号可以表示整数加法、浮点数加法或字符串拼接）。您将在第
    8 章中了解多态性。


    在您探索 Java 的众多 API 之前，还需要了解一些其他的语言特性。第 9 章首先向您介绍静态类、非静态类、局部类和匿名类。这些特性让您能够逻辑地组织代码，使其更具可读性和可维护性。


    包允许您将相关的类组织在相当于文件夹的结构中。此功能通过将类库组织在单个前缀下，帮助您避免名称冲突。请查看第 10 章以了解包的相关知识。


    Java 提供了一种健壮的异常处理机制，用于处理有缺陷的代码或意外困难，例如尝试打开一个不存在的文件。该机制在第 11 章中介绍。


    最后三章将介绍一些您在许多 Java 程序中都会用到的基本 API。第 12 章重点介绍`Math`类及相关类型，第 13 章重点介绍`String`和`StringBuffer`，第
    14 章重点介绍`System`。在探索了这些类型之后，您将能够自行探索更多的 API，以增加您的 Java 知识。


    本书末尾有两个附录。附录 A 提供了 Java 支持的保留字的快速参考，附录 B 提供了 Java 支持的运算符的快速参考。


    关于作者 关于技术审校者


    # 1. Java 入门


    欢迎来到 Java 世界。这项技术在商业领域被广泛使用，您可能希望快速学习它，以便能在这些公司中谋得一份 Java 程序员的工作。尽管 Java 庞大且不断演进，但有许多基本特性是永恒且易于理解的。掌握这些基础知识后，您编写
    Java 程序将会更加得心应手。


    本章将带您开启 Java 基本特性的探索之旅。首先，您将得到“什么是 Java？”这个问题的答案。接着，您将了解 Java 开发工具包（JDK），这是在您的计算机上开发
    Java 程序所必需的软件。然后，您将接触到您的第一个 Java 程序，该程序会输出一条简单的“hello, world”消息。最后，您将了解应用程序的架构。


    注意


    *程序*是供计算机执行的一系列指令。*应用程序*是一个具有单一执行入口点的程序。（相比之下，*小程序*——一种旧的、已不再广泛使用的 Java 程序形式——具有多个入口点。）例如，存储在`.exe`文件中的
    Microsoft Windows 程序就有一个单一的入口点。当用 C 语言*源代码*（文本指令）表示时，该入口点由一个名为`main`的*函数*（一个命名的指令序列）定义。'
- fmt: '# What Is Java?


    Java is like a two-sided coin. From one side, it’s a computer programming language.
    Conversely, it’s a virtual *platform* (the hardware and software context in which
    a program runs) for running programs written in that language.


    Note


    Java has an interesting history. Check out Wikipedia’s “Java (programming language)”
    (`http://en.wikipedia.org/wiki/Java_(programming_language)#History`) and “Java
    (software platform)” (`http://en.wikipedia.org/wiki/Java_ (software_platform)#History`)
    entries to learn more.


    ## Java Is a Programming Language


    *Java* is a programming language with many features that are identical to those
    found in the C and C++ languages. This is no accident. One of Java’s initial goals
    was to make it easy for C/C++ programmers to migrate to Java to quickly build
    up an initial pool of programmers that would help Java become successful.


    You will discover several similarities between these languages:


    - The same single-line and multiline comments for documenting source code are
    found in Java and C/C++.

    - Various identical reserved words are found in Java and C/C++, such as `if`,
    `while`, `for`, and `switch`. Various other reserved words are found in Java and
    C++ but not in C, such as `try`, `catch`, `class`, and `public`.

    - Primitive types are shared between the three languages: character and integer
    are examples. Furthermore, reserved words for these types are shared between these
    languages: `char` and `int` are examples.

    - Many of the same operators are shared between Java and C/C++. Arithmetic operators
    (such as `*` and `+`) and relational operators (such as `==` and `<=`) are examples.

    - Finally, Java and C/C++ use brace characters (`{` and `}`) to delimit blocks
    of statements.


    Java also differs from C/C++ in many ways. Here are a few of the many differences:


    - Java supports an additional comment style for documenting source code. This
    comment style is known as *Javadoc*.

    - Java provides reserved words that are not found in C/C++. Examples include `strictfp`
    and `transient`.

    - Java’s character type is larger than the character type in C and C++. In those
    languages, a character occupies one byte of memory. In contrast, Java’s character
    type occupies two bytes.

    - Java doesn’t support all of C/C++’s operators. For example, you won’t find the
    C/C++ `sizeof` operator in Java. Also, the `>>>` (unsigned right shift) operator
    is exclusive to Java.

    - Java provides labeled `break` and `continue` statements. These variants of their
    C/C++ counterparts, which don’t accept labels, are a safer alternative to C/C++’s
    `goto` statement, which Java doesn’t support.


    I discuss comments, reserved words, types, operators, and statements later in
    this book.


    The Java programming language is rigorously defined by various rules that describe
    its *syntax* (structure) and *semantics* (meaning). These rules are used by a
    compiler to verify correctness when translating a program’s source code into equivalent
    *bytecode*, which is a portable representation of the program’s executable code.
    This bytecode is stored in one or more *class files*, which are the Java equivalent
    of a Windows program’s executable (`.exe`) file.


    ## Java Is a Virtual Platform


    *Java* is a virtual platform that executes Java programs. Unlike real platforms
    that consist of a microprocessor (such as an Intel or AMD processor) and operating
    system (such as Windows 11), the Java platform consists of virtual machine and
    execution environment software.


    A *virtual machine* is a software-based processor with its own set of instructions.
    The Java Virtual Machine’s (JVM) associated *execution environment* consists of
    a huge library of prebuilt reference types (think Application Program Interfaces
    [APIs]) that Java programs can use to perform routine tasks (such as opening a
    file). The execution environment also contains “glue” code that connects the JVM
    to the underlying operating system via the Java Native Interface. (I don’t discuss
    the Java Native Interface in this book because I don’t consider it to be a fundamental
    feature.)


