- fmt: '# Types


    Computers process different types of data: integers, characters, floating-point
    values, Boolean true/false values, strings of characters, and so on. Java associates
    a type with each data category.


    A *type* identifies a set of values (and their representation in memory) and a
    set of operations that transform these values into other values of that set. For
    example, the floating-point type identifies numeric values with fractional parts
    and floating-point-oriented math operations, such as adding two floating-point
    values to produce another floating-point value that represents their sum.


    **Note**


    *Java is a strongly typed* language. Every expression, variable, and so on has
    a type known to the compiler. This capability helps the compiler detect type-related
    errors at compile time rather than having these errors manifest themselves at
    runtime. Expressions are discussed in Chapter [3](#615966_1_En_3_Chapter.xhtml).
    Variables are discussed later in this chapter.


    Java supports primitive types, user-defined types, and array types. I discuss
    primitive and user-defined types here. I discuss array types in Chapter [5](#615966_1_En_5_Chapter.xhtml).


    ## Primitive Types


    A *primitive type* (also known as a *value type*) is a basic type from which user-defined
    types (discussed later in this chapter) are built. It identifies a set of values
    (such as integers) and operations (such as addition) that are performed on these
    values. These operations are built into the Java Virtual Machine (JVM).


    More specifically, a primitive type consists of a reserved word that describes
    the memory organization of an instance of this type. The reserved word also implies
    the operations that can be performed on this type. For example, the Boolean primitive
    type consists of reserved word `boolean` and implies operations such as logical
    negation (`!`), which converts from true to false and false to true.


    Java supports the Boolean, character, byte integer, short integer, integer, long
    integer, floating-point, and double-precision floating-point primitive types.
    They are described in Table [2-1](#615966_1_En_2_Chapter.xhtml#Tab1).


    **Table 2-1** Java’s Primitive Types


    | Primitive Type | Reserved Word | Size | Min Value | Max Value |

    | --- | --- | --- | --- | --- |

    | Boolean | `boolean` | -- | -- | -- |

    | Character | `char` | 16-bit | Unicode 0 | Unicode 2^(16) - 1 |

    | Byte integer | `byte` | 8-bit | -128 | +127 |

    | Short integer | `short` | 16-bit | -32768 | +32767 |

    | Integer | `int` | 32-bit | -2^(31) | +2^(31) - 1 |

    | Long integer | `long` | 64-bit | -2^(63) | +2^(63) - 1 |

    | Floating-point | `float` | 32-bit | IEEE 754 | IEEE 754 |

    | Double-precision floating-point | `double` | 64-bit | IEEE 754 | IEEE 754 |


    Table [2-1](#615966_1_En_2_Chapter.xhtml#Tab1) describes each primitive type in
    terms of its reserved word, size, minimum value, and maximum value. A `--` entry
    indicates that the column in which it appears does not apply to the primitive
    type described in the entry’s row.


    The size column identifies the number of bits required to hold a value. Except
    for Boolean, whose size is JVM dependent, each type’s implementation has a specific
    size.


    The minimum and maximum size columns identify the smallest and largest values
    that the type represents. Besides Boolean, which has only true and false values,
    each type has minimum and maximum values.


    The character type’s minimum and maximum values refer to *Unicode*, a standard
    for consistently encoding, representing, and handling text expressed in most of
    the world’s writing systems (see [`http://en.wikipedia.org/wiki/Unicode`](http://en.wikipedia.org/wiki/Unicode)
    for more information).


    **Note**


    The character type is unsigned, which its limits suggest (the smallest value is
    0). In contrast, the byte integer, short integer, integer, and long integer types
    are signed.


    The minimum and maximum values for the four integer types reveal one more negative
    value than positive value (0 is usually not regarded as positive). This imbalance
    has to do with how integers are represented in *two’s-complement* ([`http://en.wikipedia.org/wiki/Two''s_complement`](http://en.wikipedia.org/wiki/Two%2527s_complement))
    format. In contrast, the minimum and maximum values for the floating-point types
    are defined by the IEEE 754 ([`http://en.wikipedia.org/wiki/IEEE_754`](http://en.wikipedia.org/wiki/IEEE_754))
    specification.


    ## User-Defined Types


    A *user-defined type* is a combination of primitive types and user-defined types.
    For example, a user-defined type for representing the concept of man might combine
    a user-defined, string-based name along with a primitive integer-based age. The
    following code fragment shows how you would specify man as a user-defined type:


    ```

    class Man

    {

    // implementation of the structure for representing a set of Man values

    String name;

    int age;

    // implementation of the operations that are performed on these values

    int getName()

    {

    return name;

    }

    void setName(String name_)

    {

    return name = name_;

    }

    int getAge()

    {

    return age;

    }

    void setAge(int age_)

    {

    return age = age_;

    }

    }

    ```


    The `class` reserved word introduces `Man` as a user-defined type. It is conventional
    to begin the name of a user-defined type with a capital letter.


    The class’s body describes `Man`’s implementation in terms of the structure for
    implementing `Man` values and the operations that are performed on these values.


    The structure is comprised of two *fields* (variables that store a class type’s
    values – see Chapter [6](#615966_1_En_6_Chapter.xhtml) for an introduction to
    fields). `Man` stores its values in `name` and `age` fields:


    *   `name` stores a man’s name. This field’s type is `String`, which is a special
    user-defined type that represents a *string* (a sequence of characters placed
    between double quotes [`"`]). JDK 21’s reference type library includes the pre-created
    `String` type. (I discuss `String` in Chapter [13](#615966_1_En_13_Chapter.xhtml).)


    *   `age` stores a man’s age. This field’s type is `int`, which is a primitive
    type that represents a 32-bit integer.


    The operations consist of four *methods* (functions that execute in the context
    of a class – see Chapter [6](#615966_1_En_6_Chapter.xhtml) for an introduction
    to methods). `Man` provides get and set operations:


    *   get returns a `Man` value by retrieving the values of its `name` and `age`
    fields. It provides `getName()` and `getAge()` methods for this purpose.


    *   set changes a `Man` value by changing the values of its `name` and `age` fields.
    It provides `setName()` and `setAge()` methods for this purpose.


    User-defined types are also known as *reference types* because a variable (discussed
    shortly) whose type is user defined stores a *reference* (a memory address or
    other location identifier) to a value of that type. In contrast, a variable of
    a primitive type stores the type’s value instead of a reference to a value.'
