  trans: '

    ## 类型


    计算机处理不同类型的数据：整数、字符、浮点值、布尔真/假值、字符串等等。Java 为每个数据类别关联一个类型。


    一个*类型*标识一组值（及其在内存中的表示形式）以及一组操作，这些操作将这些值转换为该集合中的其他值。例如，浮点类型标识带有小数部分的数值以及面向浮点的数学运算，例如将两个浮点值相加，生成另一个代表它们和的浮点值。


    注意


    *Java 是一种强类型*语言。每个表达式、变量等都有一个编译器已知的类型。这种能力有助于编译器在编译时检测类型相关的错误，而不是让这些错误在运行时才显现。表达式将在第
    3 章讨论。变量将在本章后面讨论。


    Java 支持原始类型、用户定义类型和数组类型。我在这里讨论原始类型和用户定义类型。数组类型将在第 5 章讨论。


    ### 原始类型


    *原始类型*（也称为*值类型*）是一种基本类型，用户定义类型（本章后面讨论）由此构建。它标识一组值（例如整数）以及对这些值执行的操作（例如加法）。这些操作内置于
    Java 虚拟机（JVM）中。


    更具体地说，原始类型由一个保留字组成，该保留字描述了该类型实例的内存组织方式。该保留字也隐含了可以对该类型执行的操作。例如，布尔原始类型由保留字 `boolean`
    组成，并隐含了诸如逻辑非 (`!`) 之类的操作，该操作将真转换为假，将假转换为真。


    Java 支持布尔、字符、字节整数、短整数、整数、长整数、浮点数和双精度浮点数这些原始类型。它们在表 2-1 中进行了描述。


    表 2-1


    Java 的原始类型


    | 原始类型 | 保留字 | 大小 | 最小值 | 最大值 |

    | --- | --- | --- | --- | --- |

    | 布尔 | `boolean` | -- | -- | -- |

    | 字符 | `char` | 16 位 | Unicode 0 | Unicode 2¹⁶ - 1 |

    | 字节整数 | `byte` | 8 位 | -128 | +127 |

    | 短整数 | `short` | 16 位 | -32768 | +32767 |

    | 整数 | `int` | 32 位 | -2³¹ | +2³¹ - 1 |

    | 长整数 | `long` | 64 位 | -2⁶³ | +2⁶³ - 1 |

    | 浮点数 | `float` | 32 位 | IEEE 754 | IEEE 754 |

    | 双精度浮点数 | `double` | 64 位 | IEEE 754 | IEEE 754 |


    表 2-1 根据每个原始类型的保留字、大小、最小值和最大值进行了描述。-- 条目表示该条目所在列不适用于该行描述的原始类型。


    大小列标识保存一个值所需的位数。除了布尔类型（其大小取决于 JVM）外，每种类型的实现都有特定的大小。


    最小值和最大值列标识该类型表示的最小值和最大值。除了只有真和假值的布尔类型外，每种类型都有最小值和最大值。


    字符类型的最小值和最大值指的是 *Unicode*，这是一个用于对世界上大多数书写系统表达的文本进行一致编码、表示和处理的标​​准（更多信息请参见 [`http://en.wikipedia.org/wiki/Unicode`](http://en.wikipedia.org/wiki/Unicode)）。


    注意


    字符类型是无符号的，其范围也表明了这一点（最小值为 0）。相比之下，字节整数、短整数、整数和长整数类型是有符号的。


    四种整数类型的最小值和最大值显示，负值比正值多一个（0 通常不被视为正数）。这种不平衡与整数在*二进制补码*（[`http://en.wikipedia.org/wiki/Two''s_complement`](http://en.wikipedia.org/wiki/Two%2527s_complement)）格式中的表示方式有关。相比之下，浮点类型的最小值和最大值由
    IEEE 754（[`http://en.wikipedia.org/wiki/IEEE_754`](http://en.wikipedia.org/wiki/IEEE_754)）规范定义。


    ### 用户定义类型


    *用户定义类型*是原始类型和用户定义类型的组合。例如，一个用于表示“人”概念的用户定义类型，可能会将一个基于字符串的用户定义名称与一个基于整数的原始年龄组合在一起。以下代码片段展示了如何将
    `Man` 指定为用户定义类型：


    ```

    class Man

    {

    // 用于表示一组 Man 值的结构实现

    String name;

    int age;

    // 对这些值执行的操作的实现

    int getName()

    {

    return name;

    }

    void setName(String name_)

    {

    return name = name_;

    }

    int getAge()

    {

    return age;

    }

    void setAge(int age_)

    {

    return age = age_;

    }

    }

    ```


    保留字 `class` 将 `Man` 引入为用户定义类型。通常，用户定义类型的名称以大写字母开头。


    类的主体根据实现 `Man` 值的结构以及对这些值执行的操作来描述 `Man` 的实现。


    该结构由两个*字段*（存储类类型值的变量——有关字段的介绍，请参见第 6 章）组成。`Man` 将其值存储在 `name` 和 `age` 字段中：


    *   `name` 存储一个人的姓名。此字段的类型是 `String`，它是一个特殊的用户定义类型，表示一个*字符串*（放在双引号 [`"`] 之间的字符序列）。JDK
    21 的引用类型库包含预先创建的 `String` 类型。（我将在第 13 章讨论 `String`。）


    *   `age` 存储一个人的年龄。此字段的类型是 `int`，它是一个表示 32 位整数的原始类型。


    这些操作由四个*方法*（在类的上下文中执行的函数——有关方法的介绍，请参见第 6 章）组成。`Man` 提供了 get 和 set 操作：


    *   get 通过检索其 `name` 和 `age` 字段的值来返回一个 `Man` 值。它为此提供了 `getName()` 和 `getAge()`
    方法。


    *   set 通过更改其 `name` 和 `age` 字段的值来改变一个 `Man` 值。它为此提供了 `setName()` 和 `setAge()`
    方法。


    用户定义类型也称为*引用类型*，因为一个类型为用户定义的变量存储的是对该类型值的一个*引用*（一个内存地址或其他位置标识符）。相比之下，原始类型的变量存储的是该类型的值本身，而不是对值的引用。

    '
- fmt: '# Variables


    Data items are stored in *variables*, which symbolically (via their names) identify
    memory locations where these items are stored. For a primitive type, the data
    item is stored directly in the variable. For a user-defined type, a data item
    is an object stored elsewhere in memory and a reference to the object is stored
    in the variable.


    Variables must be declared before they are used. A declaration minimally consists
    of a type name followed by an identifier that names the variable. Here are some
    examples:


    ```

    boolean first; // Determine first time through the loop.

    int counter; // Count the number of times a file has been opened.

    char gradeLetter; // Identify a student’s end-of-year grade in a particular subject.

    double temperature; // Specify the current temperature.

    String direction; // In what direction is the wind blowing?

    ```


    The first example declares a Boolean variable named `first`. The second example
    declares an integer variable named `counter`. The third example declares a character
    variable named `gradeLetter`. The fourth example declares a double-precision floating-point
    variable named `temperature`. The fifth example declares a `String` variable named
    `direction`.


    When a variable is declared and not explicitly initialized (demonstrated later
    in this chapter), it is implicitly initialized to a default value. A `Boolean`
    variable is initialized to `false`, variables of the four integer types are initialized
    to `0`, a character variable is initialized to Unicode character `0`, variables
    of the floating-point types are initialized to `0.0`, and `String` variables are
    initialized to `null`.


    ## Declaration vs. Definition


    I use the term *declaration* when introducing an identifier and associated syntax
    for a new variable, method, or other relevant language feature into a program’s
    source code. (I use declaration regardless of whether or not I initialize the
    variable, specify a non-abstract method, and so on. [I cover methods in Chapter
    6 and abstract methods in Chapter 8.] Some programmers prefer the term *definition*
    over declaration, which has led to confusion. If you are wondering what’s the
    big deal, remember that being precise in terminology can minimize mistakes and
    clear up confusion – you’ll save yourself many headaches that arise from arguments
    over seemingly trivial matters. However, such matters cannot be trivial if you
    spend time getting worked up and angry while trying to defend your position.)


    According to *The C Programming Language* (`http://en.wikipedia.org/wiki/The_C_Programming_Language`),
    the definitive reference book on C, which was written by Brian Kernighan and the
    late Dennis Ritchie (the creator of C), there is a difference. Page 76 of the
    1978 edition states: “It is important to distinguish between the declaration of
    an external variable and its definition. A declaration announces the properties
    of a variable (its type, size, etc.); a definition also causes storage to be allocated.”


    Regarding Java, the best resource for addressing this issue is probably *The Java*®
    *Language Specification* (`http://docs.oracle.com/javase/specs/jls/se21/jls21.pdf`).
    Chapter 6 (which covers names) uses the term *declaration*. In contrast, the most
    popular answer to stackoverflow’s “What is the difference between declaration
    and definition in Java” topic (`http://stackoverflow.com/questions/11715485/what-is-the-difference-between-declaration-and-definition-in-java`)
    states that declaration deals with the existence of a variable, method, and so
    on, whereas definition deals with “how something is implemented” – what it is.
    The answer goes on to state that there is little difference between declaration
    and definition in Java. Furthermore, the answer states that “a declaration not
    only includes the identifier, but also its definition.”


    # Literals


    A *literal* is a value expressed verbatim in source code. Java supports literals
    for its primitive types, initializing reference type variables, and a special
    reference type known as `String` (discussed in Chapter 13).


    > **Note:** Literals are also known as *simple expressions*. I discuss expressions
    in terms of their simple and compound variants in Chapter 3.


    A Boolean literal consists of either the keyword `true` or the keyword `false`.


    A character literal consists of a single Unicode character surrounded by single
    quotes (e.g., `''6''`).


    An integer literal consists of a sequence of digits. The type of an integer literal
    is `int` (a 32-bit value). You can change the type to `long` by suffixing the
    literal with `l` or `L` (which is easier to read).


    Integer literals can be specified in the decimal, hexadecimal, octal, and binary
    formats:


    *   The decimal format is the default format, for example, `127`.

    *   The hexadecimal format requires that the literal be prefixed with `0x` or
    `0X` and continue with hexadecimal digits (`a–f` and/or `A–F`), for example, `0x3FB2`.

    *   The octal format requires that the literal be prefixed with `0` and continue
    with octal digits (`0–7`), for example, `0276`.

    *   The binary format requires that the literal be prefixed with `0b` or `0B`
    and continue with `0`s and `1`s, for example, `0b11010110`.


    Starting with JDK 7, you can improve readability by inserting underscores between
    digits. For example, `204_555_1212` is easier to read than `2045551212`. Although
    you can insert multiple successive underscores between digits (such as `987___235`),
    you cannot insert a leading underscore (`_4222`). The compiler will report an
    error when you try to do so. Also, the compiler reports an error when you specify
    a trailing underscore, for example, `99_`.


    A floating-point literal consists of an integer part followed by a decimal point
    followed by a fractional part followed by an exponent (starting with letter `E`
    or `e`) followed by a type suffix (`D` or `d` for double-precision floating-point;
    `F` or `f` for floating-point – a floating-point literal defaults to double-precision
    floating-point). Most parts are optional, but you must specify enough information
    to distinguish the floating-point literal from an integer literal. Examples include
    `0.9` (double-precision floating-point), `36F` (floating-point), `900D` (double-precision
    floating-point – the `D` changes 32-bit integer `900` to an equivalent double-precision
    floating-point value), and `33.8E+22` (double-precision floating-point).


    The `null` literal is assigned to a reference variable to indicate that the variable
    does not refer to an object. It signifies the absence of a meaningful value.


    > **Caution:** The compiler reports an error when you attempt to assign `null`
    to a variable that has a primitive (value) type (such as `int`).


    It’s possible to run into trouble when working with `null`. For example, when
    a user-defined variable contains the `null` reference instead of a reference to
    an object, and you attempt to access a field or *invoke* (call) a method, you
    will encounter the dreaded `NullPointerException`. (I will discuss objects, fields,
    and methods in Chapter 6. Also, I will discuss exceptions and mention `NullPointerException`
    in Chapter 11.)


    > **Note:** You can learn more about the concept of *nullness* (being null) and
    `NullPointerException` by reading Yoshitaka Shiotsu’s excellent article “Null
    In Java: Understanding the Basics” (`http://www.upwork.com/resources/what-is-null-in-java`).'
  raw: '## Variables


    Data items are stored in *variables*, which symbolically (via their names) identify
    memory locations where these items are stored. For a primitive type, the data
    item is stored directly in the variable. For a user-defined type, a data item
    is an object stored elsewhere in memory and a reference to the object is stored
    in the variable.


    Variables must be declared before they are used. A declaration minimally consists
    of a type name followed by an identifier that names the variable. Here are some
    examples:


    ```

    boolean first; // Determine first time through the loop.

    int counter; // Count the number of times a file has been opened.

    char gradeLetter; // Identify a student’s end-of-year grade in a particular subject.

    double temperature; // Specify the current temperature.

    String direction; // In what direction is the wind blowing?

    ```


    The first example declares a Boolean variable named `first`. The second example
    declares an integer variable named `counter`. The third example declares a character
    variable named `gradeLetter`. The fourth example declares a double-precision floating-point
    variable named `temperature`. The fifth example declares a `String` variable named
    `direction`.


    When a variable is declared and not explicitly initialized (demonstrated later
    in this chapter), it is implicitly initialized to a default value. A `Boolean`
    variable is initialized to false, variables of the four integer types are initialized
    to 0, a character variable is initialized to Unicode character 0, variables of
    the floating-point types are initialized to 0.0, and `String` variables are initialized
    to null.


    DECLARATION VS. DEFINITION


    I use the term *declaration* when introducing an identifier and associated syntax
    for a new variable, method, or other relevant language feature into a program’s
    source code. (I use declaration regardless of whether or not I initialize the
    variable, specify a non-abstract method, and so on. [I cover methods in Chapter
    [6](#615966_1_En_6_Chapter.xhtml) and abstract methods in Chapter [8](#615966_1_En_8_Chapter.xhtml).]
    Some programmers prefer the term *definition* over declaration, which has led
    to confusion. If you are wondering what’s the big deal, remember that being precise
    in terminology can minimize mistakes and clear up confusion – you’ll save yourself
    many headaches that arise from arguments over seemingly trivial matters. However,
    such matters cannot be trivial if you spend time getting worked up and angry while
    trying to defend your position.)


    According to *The C Programming Language* ([`http://en.wikipedia.org/wiki/The_C_Programming_Language`](http://en.wikipedia.org/wiki/The_C_Programming_Language)),
    the definitive reference book on C, which was written by Brian Kernighan and the
    late Dennis Ritchie (the creator of C), there is a difference. Page 76 of the
    1978 edition states: “It is important to distinguish between the declaration of
    an external variable and its definition. A declaration announces the properties
    of a variable (its type, size, etc.); a definition also causes storage to be allocated.”


    Regarding Java, the best resource for addressing this issue is probably *The Java*^®
    *Language Specification* ([`http://docs.oracle.com/javase/specs/jls/se21/jls21.pdf`](http://docs.oracle.com/javase/specs/jls/se21/jls21.pdf)).
    Chapter [6](#615966_1_En_6_Chapter.xhtml) (which covers names) uses the term *declaration*.
    In contrast, the most popular answer to stackoverflow’s “What is the difference
    between declaration and definition in Java” topic ([`http://stackoverflow.com/questions/11715485/what-is-the-difference-between-declaration-and-definition-in-java`](http://stackoverflow.com/questions/11715485/what-is-the-difference-between-declaration-and-definition-in-java))
    states that declaration deals with the existence of a variable, method, and so
    on, whereas definition deals with “how something is implemented” – what it is.
    The answer goes on to state that there is little difference between declaration
    and definition in Java. Furthermore, the answer states that “a declaration not
    only includes the identifier, but also its definition.”


    ## Literals


    A *literal* is a value expressed verbatim in source code. Java supports literals
    for its primitive types, initializing reference type variables, and a special
    reference type known as `String` (discussed in Chapter [13](#615966_1_En_13_Chapter.xhtml)).


    Note


    Literals are also known as *simple expressions*. I discuss expressions in terms
    of their simple and compound variants in Chapter [3](#615966_1_En_3_Chapter.xhtml).


    A Boolean literal consists of either the keyword `true` or the keyword `false`.


    A character literal consists of a single Unicode character surrounded by single
    quotes (e.g., `''6''`).


    An integer literal consists of a sequence of digits. The type of an integer literal
    is `int` (a 32-bit value). You can change the type to `long` by suffixing the
    literal with `l` or `L` (which is easier to read).


    Integer literals can be specified in the decimal, hexadecimal, octal, and binary
    formats:


    *   The decimal format is the default format, for example, `127`.


    *   The hexadecimal format requires that the literal be prefixed with `0x` or
    `0X` and continue with hexadecimal digits (`a–f` and/or `A–F`), for example, `0x3FB2`.


    *   The octal format requires that the literal be prefixed with `0` and continue
    with octal digits (`0–7`), for example, `0276`.


    *   The binary format requires that the literal be prefixed with `0b` or `0B`
    and continue with 0s and 1s, for example, `0b11010110`.


    Starting with JDK 7, you can improve readability by inserting underscores between
    digits. For example, `204_555_1212` is easier to read than `2045551212`. Although
    you can insert multiple successive underscores between digits (such as `987___235`),
    you cannot insert a leading underscore (`_4222`). The compiler will report an
    error when you try to do so. Also, the compiler reports an error when you specify
    a trailing underscore, for example, `99_`.


    A floating-point literal consists of an integer part followed by a decimal point
    followed by a fractional part followed by an exponent (starting with letter `E`
    or `e`) followed by a type suffix (`D` or `d` for double-precision floating-point;
    `F` or `f` for floating-point – a floating-point literal defaults to double-precision
    floating-point). Most parts are optional, but you must specify enough information
    to distinguish the floating-point literal from an integer literal. Examples include
    `0.9` (double-precision floating-point), `36F` (floating-point), `900D` (double-precision
    floating-point – the `D` changes 32-bit integer `900` to an equivalent double-precision
    floating-point value), and `33.8E+22` (double-precision floating-point).


    The `null` literal is assigned to a reference variable to indicate that the variable
    does not refer to an object. It signifies the absence of a meaningful value.


    Caution


    The compiler reports an error when you attempt to assign `null` to a variable
    that has a primitive (value) type (such as `int`).


    It’s possible to run into trouble when working with `null`. For example, when
    a user-defined variable contains the null reference instead of a reference to
    an object, and you attempt to access a field or *invoke* (call) a method, you
    will encounter the dreaded `NullPointerException`. (I will discuss objects, fields,
    and methods in Chapter [6](#615966_1_En_6_Chapter.xhtml). Also, I will discuss
    exceptions and mention `NullPointerException` in Chapter [11](#615966_1_En_11_Chapter.xhtml).)


    Note


    You can learn more about the concept of *nullness* (being null) and `NullPointerException`
    by reading Yoshitaka Shiotsu’s excellent article “Null In Java: Understanding
    the Basics” ([`www.upwork.com/resources/what-is-null-in-java`](http://www.upwork.com/resources/what-is-null-in-java)).'
  trans: '

    ## 变量


    数据项存储在*变量*中，变量通过其名称符号化地标识存储这些数据项的内存位置。对于基本类型，数据项直接存储在变量中。对于用户定义类型，数据项是存储在内存其他位置的对象，而对该对象的引用则存储在变量中。


    变量在使用前必须先声明。声明至少包含一个类型名，后跟一个标识该变量的名称。以下是一些示例：


    ```

    boolean first; // 判断是否首次进入循环。

    int counter; // 统计文件被打开的次数。

    char gradeLetter; // 标识学生在某门课程中的年终成绩等级。

    double temperature; // 指定当前温度。

    String direction; // 风正在往哪个方向吹？

    ```


    第一个示例声明了一个名为 `first` 的布尔变量。第二个示例声明了一个名为 `counter` 的整型变量。第三个示例声明了一个名为 `gradeLetter`
    的字符变量。第四个示例声明了一个名为 `temperature` 的双精度浮点变量。第五个示例声明了一个名为 `direction` 的 `String`
    变量。


    当一个变量被声明但未显式初始化（本章后面会演示）时，它会被隐式初始化为一个默认值。`Boolean` 变量被初始化为 false，四种整型变量被初始化为 0，字符变量被初始化为
    Unicode 字符 0，浮点类型变量被初始化为 0.0，而 `String` 变量被初始化为 null。


    声明 vs. 定义


    当我在程序源代码中为一个新变量、方法或其他相关语言特性引入标识符及其相关语法时，我使用术语*声明*。（无论我是否初始化变量、指定非抽象方法等，我都使用声明。我将在第
    [6 章介绍方法，并在第 8 章介绍抽象方法。] 一些程序员更喜欢使用术语*定义*而非声明，这导致了混淆。如果你想知道这有什么大不了的，请记住，术语的精确性可以最大限度地减少错误并澄清混淆——你将避免因看似琐碎的事情争论不休而带来的许多头痛问题。然而，如果你花时间在试图捍卫自己立场时变得激动和愤怒，那么这些事情就不能算是琐碎的。）


    根据由 Brian Kernighan 和已故的 Dennis Ritchie（C 语言的创造者）编写的 C 语言权威参考书 *The C Programming
    Language* ([`http://en.wikipedia.org/wiki/The_C_Programming_Language`](http://en.wikipedia.org/wiki/The_C_Programming_Language))，两者是有区别的。1978
    年版的第 76 页指出：“区分外部变量的声明和其定义非常重要。声明宣告了变量的属性（其类型、大小等）；而定义还会导致存储空间的分配。”


    关于 Java，解决这个问题的最佳资源可能是 *The Java*^® *Language Specification* ([`http://docs.oracle.com/javase/specs/jls/se21/jls21.pdf`](http://docs.oracle.com/javase/specs/jls/se21/jls21.pdf))。第
    6 章（涵盖名称）使用了术语*声明*。相比之下，StackOverflow 上关于“Java 中声明和定义的区别”主题 ([`http://stackoverflow.com/questions/11715485/what-is-the-difference-between-declaration-and-definition-in-java`](http://stackoverflow.com/questions/11715485/what-is-the-difference-between-declaration-and-definition-in-java))
    最受欢迎的答案指出，声明涉及变量、方法等的存在性，而定义则涉及“某事物如何被实现”——即它是什么。该答案接着指出，在 Java 中声明和定义之间几乎没有区别。此外，该答案还指出，“声明不仅包括标识符，还包括其定义。”


    ## 字面量


    *字面量*是在源代码中逐字表达的值。Java 支持用于其基本类型、初始化引用类型变量以及一种称为 `String` 的特殊引用类型（在第 13 章讨论）的字面量。


    注意


    字面量也被称为*简单表达式*。我将在第 3 章从简单和复合变体的角度讨论表达式。


    布尔字面量由关键字 `true` 或 `false` 组成。


    字符字面量由单引号括起来的单个 Unicode 字符组成（例如，`''6''`）。


    整数字面量由一串数字组成。整数字面量的类型是 `int`（一个 32 位值）。你可以通过在字面量后添加 `l` 或 `L`（后者更易读）后缀来将类型更改为
    `long`。


    整数字面量可以以十进制、十六进制、八进制和二进制格式指定：


    *   十进制格式是默认格式，例如 `127`。


    *   十六进制格式要求字面量以 `0x` 或 `0X` 为前缀，后跟十六进制数字（`a–f` 和/或 `A–F`），例如 `0x3FB2`。


    *   八进制格式要求字面量以 `0` 为前缀，后跟八进制数字（`0–7`），例如 `0276`。


    *   二进制格式要求字面量以 `0b` 或 `0B` 为前缀，后跟 0 和 1，例如 `0b11010110`。


    从 JDK 7 开始，你可以通过在数字之间插入下划线来提高可读性。例如，`204_555_1212` 比 `2045551212` 更容易阅读。虽然你可以在数字之间插入多个连续的下划线（例如
    `987___235`），但不能插入前导下划线（`_4222`）。如果你尝试这样做，编译器会报告错误。同样，当你指定尾随下划线时，例如 `99_`，编译器也会报告错误。


    浮点字面量由整数部分、小数点、小数部分、指数（以字母 `E` 或 `e` 开头）和类型后缀（`D` 或 `d` 表示双精度浮点；`F` 或 `f` 表示浮点——浮点字面量默认为双精度浮点）组成。大部分部分是可选的，但你必须指定足够的信息以将浮点字面量与整数字面量区分开来。示例包括
    `0.9`（双精度浮点）、`36F`（浮点）、`900D`（双精度浮点——`D` 将 32 位整数 `900` 更改为等效的双精度浮点值）和 `33.8E+22`（双精度浮点）。


    `null` 字面量被赋值给引用变量，以指示该变量不引用任何对象。它表示没有有意义的值。


    警告


    当你尝试将 `null` 赋值给具有基本（值）类型（例如 `int`）的变量时，编译器会报告错误。


    使用 `null` 时可能会遇到麻烦。例如，当用户定义的变量包含 null 引用而不是对象的引用，并且你尝试访问字段或*调用*方法时，你将遇到可怕的 `NullPointerException`。（我将在第
    6 章讨论对象、字段和方法。此外，我将在第 11 章讨论异常并提及 `NullPointerException`。）


    注意


    你可以通过阅读 Yoshitaka Shiotsu 的优秀文章“Java 中的 Null：理解基础” ([`www.upwork.com/resources/what-is-null-in-java`](http://www.upwork.com/resources/what-is-null-in-java))
    来了解更多关于*空性*（being null）和 `NullPointerException` 的概念。

