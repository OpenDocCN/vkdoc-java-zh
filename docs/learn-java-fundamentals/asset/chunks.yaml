- fmt: '## Interfaces


    An *interface* is a point where two entities meet and interact. For example, an
    electrical wall outlet is an interface between a power cable carrying electricity
    and an appliance cord that funnels that electricity to an appliance when the cord
    is plugged into the outlet.


    From Java’s perspective, an *interface* is the exposed part of a class (fields,
    constructors, and methods) or another reference type with which external code
    can interact. Consider Listing [8-2](#615966_1_En_8_Chapter.xhtml#PC2).


    ```

    class Stack

    {

    private int[] stack;

    private int top;

    Stack(int size)

    {

    stack = new int[size];

    top = -1;

    }

    boolean isEmpty()

    {

    return top == -1;

    }

    void push(int item)

    {

    if (top == stack.length)

    {

    System.out.println("stack is full");

    return;

    }

    stack[++top] = item;

    }

    int pop()

    {

    if (top == -1)

    {

    System.out.println("stack is empty");

    return -1;

    }

    return stack[top--];

    }

    }

    ```


    Listing [8-2](#615966_1_En_8_Chapter.xhtml#PC2) presents a `Stack` class that
    implements a *stack*, a data structure where the last item stored is the first
    item retrieved. This data structure helps code remember things, like where it
    has been while traversing a maze as it looks for an exit.


    You push an item (such as a 32-bit integer) on to the top of the stack and pop
    an item off of the top of the stack. It’s also important to determine if the stack
    is empty because there is no way to know how many items have been pushed when
    popping them.


    `Stack`’s interface is its constructor and the `isEmpty()`, `push()`, and `pop()`
    method headers. The private `stack` and `top` fields along with the code in the
    constructor and methods form the implementation.


    An implementation should be hidden from external code so that it can be changed
    to meet evolving requirements. When implementations are exposed, interdependencies
    between software components can arise. For example, method code may rely on external
    variables, and a class’s users may become dependent on fields that should have
    been hidden. This *coupling* can lead to problems when implementations must evolve
    (perhaps exposed fields must be removed).


    The concept of interface is so important that Java has codified this concept via
    the `interface` reserved word. Java developers use this feature to abstract class
    interfaces, thus *decoupling* classes from their users. By focusing on Java interfaces
    instead of classes, you can minimize the number of references to class names in
    your source code. This facilitates changing from one class to another (perhaps
    to improve performance) as your software matures. Here is an example:


    ```

    List countries = new ArrayList();

    // Code to add countries to the countries list.

    // ...

    void print(List list)

    {

    for (int i = 0; i < list.length(); i++)

    System.out.println(list.get(i));

    }

    ```


    This example declares and initializes a `countries` field that stores a list of
    string names. The example also declares a `print()` method for printing out this
    or any other list.


    Assume that `List` is an interface describing a sequence of strings and that `ArrayList`
    is a class describing an array-based `List` implementation. A new `ArrayList`
    class object is obtained and assigned to `countries`.


    When client code interacts with `countries`, it will invoke those methods that
    are declared by `List` and that are implemented by `ArrayList`. The client code
    will not interact directly with `ArrayList`. As a result, the client code will
    not break when a different implementation class, such as `LinkedList`, is required:


    ```

    List countries = new LinkedList();

    ```


    Note


    `LinkedList` provides a `List` implementation that’s based on a linked group of
    *nodes* (objects constructed from classes that declare reference fields named
    after them). For example: `class Node { String item; Node next; }`. In this example,
    `Node` declares a `next` field whose reference type is the name of the class in
    which it is declared. You can link a `Node` object to another `Node` object by
    assigning the `Node` object’s reference to `next`.


    Because `print()`’s parameter type is `List`, this method’s implementation doesn’t
    have to change. However, if the type had been `ArrayList`, the type would have
    to be changed to `LinkedList`. If both classes were to declare their own unique
    methods, you might need to significantly change `print()`’s implementation.


    Decoupling `List` from `ArrayList` and `LinkedList` lets you write code that’s
    immune to class-implementation changes. By using Java interfaces, you can avoid
    problems that could arise from relying on implementation classes. This decoupling
    is the main reason for using Java interfaces.


    ### Interface Declaration


    You declare an interface by adhering to a class-like syntax that consists of a
    header followed by a body. At minimum, the header consists of keyword `interface`
    followed by a name (a non-reserved identifier) that identifies the interface.
    The body starts with an open brace character (`{`) and ends with a close brace
    character (`}`). Between these delimiters are constant and method header declarations:


    ```

    interface identifier

    {

    // interface body

    }

    ```


    By convention, the first letter of an interface’s name is uppercased, and subsequent
    letters are lowercased (e.g., `Listable`). If a name consists of multiple words,
    the first letter of each word is uppercased (such as `ListableAndIterable`). This
    naming convention is known as *camel casing*.


    For example, Listing [8-3](#615966_1_En_8_Chapter.xhtml#PC6) presents a `Collection`
    interface that describes any grouping of objects, which is known as a *collection*.


    ```

    interface Collection

    {

    void add(String item);

    boolean contains(String item);

    int length();

    }

    ```


    The `add()` method adds strings to the collection. The `contains()` method returns
    true when its string argument is present in the collection; otherwise, it returns
    false. The `length()` method returns the number of strings stored in the list.


    `Collection` identifies a reference type that describes a collection of strings
    but not how the collection is implemented. It leaves implementation details to
    classes that implement this interface.'
