- fmt: '### Cleaning Up in a Try-Catch-Finally Context


    When resources must be cleaned up and an exception isn’t being thrown out of a
    method, a `finally` block is placed after the final `catch` block. This is demonstrated
    by Listing [11-1](#615966_1_En_11_Chapter.xhtml#PC15), which presents the first
    version of the `Copy` application.


    ```

    import java.io.*;

    public class Copy

    {

    public static void main(String[] args)

    {

    FileInputStream fis = null;

    FileOutputStream fos = null;

    try

    {

    fis = new FileInputStream(args[0]);

    fos = new FileOutputStream(args[1]);

    int c;

    while ((c = fis.read()) != -1)

    fos.write(c);

    }

    catch (FileNotFoundException fnfe)

    {

    System.out.println(fnfe.getMessage());

    }

    catch (IOException ioe)

    {

    System.out.println("I/O error: " + ioe.getMessage());

    }

    finally

    {

    if (fis != null)

    try

    {

    fis.close();

    }

    catch (IOException ioe)

    {

    // ignore exception

    }

    if (fos != null)

    try

    {

    fos.close();

    }

    catch (IOException ioe)

    {

    // ignore exception

    }

    }

    }

    }

    Listing 11-1

    Copy.java

    ```


    If the `try` block executes without an exception, execution passes to the `finally`
    block to close the file input/output streams. If an exception is thrown, the `finally`
    block executes after the appropriate `catch` block.


    `FileInputStream` and `FileOutputStream` inherit a `void close()` method that
    throws `IOException` when the stream cannot be closed. For this reason, I’ve wrapped
    each of `fis.close();` and `fos.close();` in a `try` block. I’ve left the associated
    `catch` block empty to illustrate the common mistake of ignoring an exception.


    An empty `catch` block that’s invoked with the appropriate throwable has no way
    to report the exception. You might waste a lot of time tracking down the exception’s
    cause, only to discover that you could have detected it sooner if the empty `catch`
    block had reported the exception, even if only in a log.


    Compile Listing [11-1](#615966_1_En_11_Chapter.xhtml#PC15) as follows:


    ```

    javac Copy.java

    ```


    Run the application as follows:


    ```

    java Copy Copy.java Copy.bak

    ```


    If all goes well, you should discover a `Copy.bak` file in the current directory
    whose size and content match `Copy.java`’s size and content.


    ### Cleaning Up in a Try-Finally Context


    When resources must be cleaned up and an exception is being thrown out of a method,
    a `finally` block is placed after the `try` block: there are no `catch` blocks.
    Consider Listing [11-2](#615966_1_En_11_Chapter.xhtml#PC18), which presents a
    second version of the `Copy` application.


    ```

    import java.io.*;

    public class Copy

    {

    public static void main(String[] args)

    {

    if (args.length != 2)

    {

    System.out.println("usage: java Copy srcfile dstfile");

    return;

    }

    try

    {

    copy(args[0], args[1]);

    }

    catch (IOException ioe)

    {

    System.out.println("I/O error: " + ioe.getMessage());

    }

    }

    static void copy(String srcFile, String dstFile) throws IOException

    {

    FileInputStream fis = null;

    FileOutputStream fos = null;

    try

    {

    fis = new FileInputStream(srcFile);

    fos = new FileOutputStream(dstFile);

    int c;

    while ((c = fis.read()) != -1)

    fos.write(c);

    }

    finally

    {

    if (fis != null)

    try

    {

    fis.close();

    }

    catch (IOException ioe)

    {

    System.out.println(ioe.getMessage());

    }

    if (fos != null)

    try

    {

    fos.close();

    }

    catch (IOException ioe)

    {

    System.out.println(ioe.getMessage());

    }

    }

    }

    }

    Listing 11-2

    Copy.java (version 2)

    ```


    The file-copying logic has been moved into a `copy()` method. This method is designed
    to report an exception to the caller, but it first closes each open file.


    This method’s `throws` clause lists only `IOException`. It isn’t necessary to
    include `FileNotFoundException` because `FileNotFoundException` subclasses `IOException`.


    Once again, the `finally` clause presents a lot of code just to close two files.
    In the next section, I’ll present the `try`-`with`-`resources` statement, which
    obviates the need to explicitly close these files.


    Compile Listing [11-2](#615966_1_En_11_Chapter.xhtml#PC18) as follows:


    ```

    javac Copy.java

    ```


    Run the application as follows:


    ```

    java Copy Copy.java Copy.bak

    ```


    If all goes well, you should discover a `Copy.bak` file in the current directory
    whose size and content match `Copy.java`’s size and content.


    ## The Try-with-resources Statement


    I mentioned earlier that resources (actually, the system resources on which they
    depend) are released in a `finally` block. This can lead to tedious-to-write boilerplate,
    such as the previously shown file-closing code.


    Not only does this boilerplate code add bulk to a class file, the tedium in writing
    it might lead to a bug, perhaps even failing to close a file. JDK 7 introduced
    `try`-`with`-`resources` to overcome this problem.


    The `try`-`with`-`resources` statement is similar to the `try` statement but lets
    you automatically close any open resources when execution leaves the `try` block.
    Examples include open files, database connections, network sockets, and other
    resources that depend on related system resources (such as file handles). It has
    the following syntax:


    ```

    ''try'' ''('' resource acquisitions '')''

    ''{''

    // resource usage

    ''}''

    ```


    The `try` keyword is parameterized by a semicolon-separated list of resource-acquisition
    statements, where each statement acquires a resource. Each acquired resource is
    available to the `try` block and is automatically closed when execution leaves
    this body. Unlike a regular `try` statement, `try`-`with`-`resources` doesn’t
    require `catch` blocks and/or a `finally` block to follow `try()`, although they
    can be specified. Consider the following file-oriented example:


    ```

    try (FileInputStream fis = new FileInputStream("notes.txt"))

    {

    // Do something with fis and the underlying file resource.

    }

    ```


    In this example, an input stream to an underlying file resource (`notes.txt`)
    is acquired. The `try` block does something with this resource, and the stream
    (and file) is closed upon exit from the `try` block.


    Listing [11-3](#615966_1_En_11_Chapter.xhtml#PC23) improves on Listing [11-2](#615966_1_En_11_Chapter.xhtml#PC18)’s
    `Copy` application by using `try`-`with`-`resources` to automatically close open
    files and eliminate this boilerplate.


    ```

    import java.io.FileInputStream;

    import java.io.FileNotFoundException;

    import java.io.FileOutputStream;

    import java.io.IOException;

    public class Copy

    {

    public static void main(String[] args)

    {

    if (args.length != 2)

    {

    System.err.println("usage: java Copy srcfile dstfile");

    return;

    }

    try

    {

    copy(args[0], args[1]);

    }

    catch (IOException ioe)

    {

    System.err.println("I/O error: " + ioe.getMessage());

    }

    }

    static void copy(String srcFile, String dstFile) throws IOException

    {

    try (FileInputStream fis = new FileInputStream(srcFile);

    FileOutputStream fos = new FileOutputStream(dstFile))

    {

    int c;

    while ((c = fis.read()) != -1)

    fos.write(c);

    }

    }

    }

    Listing 11-3

    Copy.java (version 3)

    ```


    The `copy()` method uses `try`-`with`-`resources` to manage source and destination
    file resources. The round bracketed code following `try` attempts to create file
    input and output streams to these files. Assuming success, its body executes,
    copying the source file to the destination file.


    Whether an exception is thrown or not, `try`-`with`-`resources` ensures that both
    files are closed when execution leaves the `try` block. Because the boilerplate
    file-closing code that was shown earlier isn’t needed, Listing [11-3](#615966_1_En_11_Chapter.xhtml#PC23)’s
    `copy()` method is much simpler and easier to read.


    Compile Listing [11-3](#615966_1_En_11_Chapter.xhtml#PC23) as follows:


    ```

    javac Copy.java

    ```


    Run the application as follows:


    ```

    java Copy Copy.java Copy.bak

    ```


    If all goes well, you should discover a `Copy.bak` file in the current directory
    whose size and content match `Copy.java`’s size and content.


    ## What’s Next?


    So far, our focus has been mainly on language syntax. In the rest of this book,
    we will focus mainly on APIs from Java’s reference types library. Chapter [12](#615966_1_En_12_Chapter.xhtml)
    begins by looking at `Math` and related classes.'
