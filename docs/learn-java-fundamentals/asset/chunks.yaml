- fmt: "#### Finalization\n\n`finalize()`方法*终结*（清理）当前对象。Java的垃圾收集器（稍后介绍）在确定不再有对该对象的引用时调用此方法。子类重写`finalize()`以关闭打开的文件、释放系统资源以及执行其他清理任务。\n\
    \n> **注意**  \n> *垃圾收集器*是编程语言运行时系统或运行时环境（如Java虚拟机，即JVM）的一部分，用于自动管理内存。它通过促进内存分配（通常为对象）和回收不再*可达*（程序可访问）的对象所占用的内存来实现这一点。\
    \  \n> 通过自动处理内存分配和释放，垃圾收集器使程序员无需执行这些任务，从而可以专注于编写代码并提高生产力。\n\n`Object`类的`finalize()`版本不执行任何操作；它被重写以提供所需的清理代码。由于JVM可能在应用程序结束前不会调用`finalize()`，因此应提供一个清理方法，并在`finalize()`中调用该方法，以防该方法未被调用。\n\
    \n> **警告**  \n> `finalize()`方法已被弃用，并将在未来的JDK版本中移除。由于`finalize()`可能导致安全、性能和可靠性问题，除了在讨论垃圾收集时提供一个简短示例外（参见第[14]章），我将不再进一步讨论它。\n\
    \n#### 获取Class对象\n\n`getClass()`方法返回调用该方法的对象的运行时类。运行时类由`Class`对象表示。\n\n`Class`是Java反射API的入口点。Java应用程序使用`Class`和Java反射API的其他部分来了解自身的结构。（本书不讨论`Class`和Java反射API的其他部分，因为我认为它们不是Java的基础部分。）\n\
    \n#### 哈希码\n\n`hashCode()`方法返回一个32位整数，用于标识当前对象的*哈希码*，这是一个通过对大量数据应用数学函数得到的小值。该值的计算称为*哈希*。\n\
    \n##### 哈希映射\n\n哈希码用于处理*哈希映射*（也称为*哈希表*），这些数据结构是基于哈希码的映射实现。\n\n> **注意**  \n> *映射*是键（也称为名称）与值之间的关联。*键*是唯一标识映射中名称-值条目的标识符。*值*是要记录在映射中的所需信息，并且始终与键/名称关联。\
    \  \n> 映射可以通过哈希映射、树或其他数据结构实现。\n\n哈希映射使用*哈希*（一种加扰操作）将（通常是基于字符串的）键转换为从0开始的正整数。这个正整数称为哈希码，由`hashCode()`方法提供。\n\
    \n哈希码索引到一个*桶*数组（数组槽）。理想情况下，每个键应映射到其自己的桶，该桶存储与该键关联的值。然而，对于非常多的键，可能没有足够的内存来存储它们的值。\n\
    \n> **注意**  \n> 想象实现一个电子表格，它可能包含数百万个单元格。大多数单元格不会被使用，因此你不会想为每个单元格的行/列编号组合创建桶而浪费内存。\n\
    \n由于内存有限，通常需要减少桶的数量，使得键的数量远大于桶的数量。因此，可能存在*冲突*，即多个键哈希到同一个桶。你不能在桶中存储值，因为每个键可能关联不同的值。\n\
    \n解决方案是使用桶来存储指向节点链表的引用，这些节点存储（键，值）对。链表中的所有节点共享相同的哈希码。例如，假设你创建一个哈希映射来存储英语单词及其定义。实现可以使用26个桶，每个桶代表以英文字母（a–z）中单个字母开头的所有单词。\n\
    \n在存储或查找值时，键被哈希，生成的哈希码标识指向其链表中第一个节点的桶。然后搜索链表，查找与哈希键匹配的节点。如果未找到，则创建新节点，填充键值对，并附加到链表（用于存储操作）；或返回`null`（用于查找操作）。搜索链表的行为称为*线性探测*。\n\
    \n图7-1展示了哈希映射的组织结构。\n\n![哈希映射的组织结构](images/615966_1_En_7_Chapter/615966_1_En_7_Fig1_HTML.jpg)\n\
    \n*图7-1 哈希映射的组织结构*\n\n为了演示`hashCode()`，我创建了一个哈希映射的实现。该实现包含`Node`和`HashMap`类。清单7-12展示了`Node`的实现。\n\
    \n```\nclass Node\n{\n    Node next;\n    Object key;\n    Object value;\n   \
    \ Node(Object key, Object value)\n    {\n        this.key = key;\n        this.value\
    \ = value;\n    }\n}\n```\n\n`Node`表示链表中的一个节点，声明了`key`和`value`（存储键值对）以及`next`（指向链表中的下一个节点）。这些字段由构造函数初始化。\n\
    \n清单7-13展示了`HashMap`的实现。"
  raw: '#### Finalization


    The `finalize()` method *finalizes* (cleans up) the current object. Java’s garbage
    collector (introduced shortly) calls this method when it determines that there
    are no more references to the object. A subclass overrides `finalize()` to close
    open files, dispose of system resources, and to perform other cleanup tasks.


    Note


    A *garbage collector* is that part of a programming language’s runtime system
    or runtime environment (such as the Java Virtual Machine, or JVM) that automatically
    manages memory. It does so by facilitating the allocation of memory (typically
    for objects) and the reclamation of memory (formerly occupied by objects) that
    is no longer *reachable* (accessible to a program).


    By automatically handling memory allocation and deallocation, a garbage collector
    saves programmers from having to perform these tasks. Instead, they can focus
    on writing code and being more productive.


    The `Object` class’s version of `finalize()` does nothing; it is overridden to
    provide needed cleanup code. Because the JVM might not call `finalize()` before
    an application ends, you should provide a cleanup method that is called to perform
    cleanup. Also, have `finalize()` call this method in case the method is not called.


    Caution


    The `finalize()` method has been deprecated and will be removed in a future JDK
    release. Because `finalize()` can cause security, performance, and reliability
    problems, I won’t discuss it further, apart from providing a brief example while
    discussing garbage collection in Chapter [14](#615966_1_En_14_Chapter.xhtml).


    #### Getting the Class Object


    The `getClass()` method returns the runtime class of the object on which this
    method is called. The runtime class is represented by a `Class` object.


    `Class` is the entry point into the Java Reflection API. A Java application uses
    `Class` and the rest of the Java Reflection API to learn about its own structure.
    (I don’t discuss `Class` and the rest of the Java Reflection API in this book
    because I don’t consider them a fundamental part of Java.)


    #### Hash Codes


    The `hashCode()` method returns a 32-bit integer that identifies the current object’s
    *hash code*, a small value that results from applying a mathematical function
    to a potentially large amount of data. The calculation of this value is known
    as *hashing*.


    ##### Hash Maps


    Hash codes are used when working with *hash maps* (also known as *hash tables*),
    which are data structures that serve as hash code`–`based map implementations.


    Note


    A *map* is an association between keys (also known as names) and values. A *key*
    is an identifier that uniquely identifies a name-value entry in a map. A *value*
    is the desired information to be recorded in the map and is always associated
    with a key/name.


    A map could be implemented via a hash map, a tree, or another kind of data structure.


    A hash map uses *hashing* (a scrambling operation) to convert (a typically string-based)
    key into a positive integer that starts at 0\. This positive integer, which is
    known as a hash code, is provided by the `hashCode()` method.


    The hash code indexes into an array of *buckets* (array slots). Ideally, each
    key would be mapped to its own bucket, which would store the value associated
    with the key. However, for a very large number of keys, there may not be enough
    memory to store their values.


    Note


    Imagine implementing a spreadsheet, which potentially consists of millions of
    cells. Most of the cells will not be in use so you wouldn’t want to waste memory
    by creating a bucket for each cell row/column number combination.


    Because of limited memory, it’s often necessary to reduce the number of buckets
    so that the number of keys greatly exceeds the bucket count. As a result, there
    is the possibility of *collisions* where multiple keys hash to the same bucket.
    You cannot store a value in a bucket because each key might be associated with
    a different value.


    The solution is to use the bucket to store a reference to a linked list of nodes
    that store (key, value) pairs. All nodes in the linked list share the same hash
    code. For example, suppose you create a hash map to store English words and their
    definitions. The implementation could use 26 buckets where each bucket represents
    all words starting with a single letter of the English alphabet (a–z).


    During storage or lookup of a value, the key is hashed, and the resulting hash
    code identifies the bucket that points to the first node in its linked list. The
    linked list is then searched for a node whose key matches the key that was hashed.
    If not found, either a new node is created, populated with a key-value pair, and
    attached to the list (for a storage operation); or null is returned (for a lookup
    operation). The act of searching a linked list is known as *linear probing*.


    Figure [7-1](#615966_1_En_7_Chapter.xhtml#Fig1) shows the organization of a hash
    map.


    ![](images/615966_1_En_7_Chapter/615966_1_En_7_Fig1_HTML.jpg)


    An illustration depicts the organization of a hash map. The keys link with the
    hash function.


    Figure 7-1


    The organization of a hash map


    I’ve created an implementation of a hash map in order to demonstrate `hashCode()`.
    This implementation consists of `Node` and `HashMap` classes. Listing [7-12](#615966_1_En_7_Chapter.xhtml#PC35)
    presents the implementation of `Node`.


    ```

    class Node

    {

    Node next;

    Object key;

    Object value;

    Node(Object key, Object value)

    {

    this.key = key;

    this.value = value;

    }

    }

    Listing 7-12

    Node.java

    ```


    `Node` represents a node in a linked list and declares `key` and `value`, which
    store the key-value pair, and `next`, which points to the next node in the list.
    These fields are initialized by the constructor.


    Listing [7-13](#615966_1_En_7_Chapter.xhtml#PC36) presents the implementation
    of `HashMap`.'
