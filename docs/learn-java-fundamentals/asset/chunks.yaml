  trans: '

    #### 理解属性


    `Properties` 类继承自 `java.util.Hashtable` 类（我在第 7 章简要介绍过哈希表，它也被称为哈希映射），该类支持基于键值对的存储。然而，`Properties`
    引入了一些专门用于管理配置数据的特定功能。


    #### 数据存储与检索


    开发者可以受益于 `Properties` 类的简洁性。使用熟悉的语法即可轻松存储和检索数据。清单 14-6 提供了一个示例。以下代码片段提供了另一个示例：


    ```

    Properties dbms = new Properties();

    dbms.setProperty("database.url", "jdbc:mysql://localhost:3306/mydatabase");

    dbms.setProperty("database.username", "myusername");

    dbms.setProperty("database.password", "mypassword");

    String url = dbms.getProperty("database.url");

    String username = dbms.getProperty("database.username");

    String password = dbms.getProperty("database.password");

    ```


    此代码片段首先实例化 `Properties`。相比之下，清单 14-6 通过调用 `System` 的 `getProperties()` 方法获取了一个
    `Properties` 对象。


    `Properties` 对象的引用被赋值给 `dbms` 变量。（名称 `dbms` 是数据库管理系统的缩写。）然后，该引用被用于三次 `setProperty()`
    调用来设置三个以 `database` 为前缀的属性，以及三次 `getProperty()` 调用来检索属性值，这些值被存储在其他变量中。


    #### 属性加载与保存


    `Properties` 类还可以从文件加载属性列表，并将属性列表存储到文件中，这使得配置数据能够持久化。以下方法用于完成这些任务：


    *   `void load(`[`Reader`](https://docs.oracle.com/en/java/javase/20/docs/api/java.base/java/io/Reader.xhtml)
    `reader)`：从输入字符流（采用简单的面向行格式）中读取*属性列表*（键/值对列表）到此 `Properties` 对象中。


    *   `void store(`[`Writer`](https://docs.oracle.com/en/java/javase/20/docs/api/java.base/java/io/Writer.xhtml)
    `writer,` [`String`](https://docs.oracle.com/en/java/javase/20/docs/api/java.base/java/lang/String.xhtml)
    `comments)`：将此 `Properties` 对象中的属性列表以适合使用 `load(Reader)` 方法的格式写入输出字符流。


    这两个方法都涉及字符流，它类似于之前讨论的字节流，但流式传输的是 16 位字符，而不是 8 位字节。


    这些方法对于需要在不修改源代码的情况下更改设置的场景非常有用。请考虑以下代码片段：


    ```

    try (FileInputStream fis = new FileInputStream("config.properties"))

    {

    dbms.load(fis);

    }

    catch (IOException ioe)

    {

    ioe.printStackTrace();

    }

    ```


    ```

    try (FileOutputStream output = new FileOutputStream("config.properties"))

    {

    dbms.store(output, "Updated Database Configuration");

    }

    catch (IOException ioe)

    {

    ioe.printStackTrace();

    }

    ```


    此代码片段使用一对 `try`-`with`-`resources` 语句来处理 `IOException`，这些异常可能由 `load()` 和 `store()`
    方法抛出。


    这些语句首先创建 `FileInputStream` 和 `FileOutputStream`，用于连接名为 `config.properties` 的文件。与
    `dbms` 相关的属性列表将从该文件加载并存储到该文件中。


    注意


    我在本书中不再进一步讨论 `FileInputStream` 和 `FileOutputStream`。你可以在我的书 *Java I/O, NIO and
    NIO.2* 中找到完整的介绍（有关本书的更多信息及订购，请参见 [`www.amazon.ca/Java-NIO-NIO-2-JEFF-FRIESEN/dp/1484215664/`](http://www.amazon.ca/Java-NIO-NIO-2-JEFF-FRIESEN/dp/1484215664/)）。


    ## 虚拟机关闭


    `System` 提供了 `void exit(int status)` 方法来启动 JVM 的关闭序列。传递给 `status` 的参数是一个代码，它向脚本（例如
    Windows 批处理文件）提供有关关闭的信息，该脚本可以根据代码采取适当的操作。按照惯例，非零状态码表示异常终止。


    关闭序列


    JVM 响应多个事件之一而启动*关闭序列*，包括首次调用 `System.exit()` 方法时。


    在关闭序列开始时，任何已注册的关闭钩子都会以未指定的顺序启动。（有关更多信息，请参见 `java.lang.Runtime` 类。）


    当所有关闭钩子终止时，关闭序列结束。此时，JVM 终止。


    虽然我之前在传递错误数量的命令行参数时使用 `return` 从应用程序的 `main()` 方法返回执行，但当需要向调用者传递代码时，我可以使用 `exit()`。以下是一个示例：


    ```

    public static void main(String[] args)

    {

    if (args.length != 1)

    {

    System.err.println("usage: java SomeApp argument");

    //      return;

    System.exit(1); // 指示异常终止：参数数量错误

    }

    }

    ```


    使用常量而不是硬编码整数值（例如 `1`）是一个好主意。当你的应用程序有多个退出点（出于不同原因）时尤其如此。例如，我可以声明以下常量：


    ```

    public static final BAD_NUM_OF_ARGS = 1;

    ```


    然后像下面这样将此常量传递给 `exit()`：


    ```

    System.exit(BAD_NUM_OF_ARGS);

    ```


    传递给 `status` 的参数是一个代码，它向脚本（例如 Windows 批处理文件）提供有关关闭的信息，该脚本可以根据代码采取适当的操作。按照惯例，非零状态码表示异常终止。


    ## 下一步是什么？


    本书到此结束。希望你喜欢。如果你希望我创作一系列“学习 Java ……”书籍，请告知 Apress（[`www.apress.com`](http://www.apress.com)）。


    请查看接下来的两个附录，它们分别是关于保留字（A）和运算符（B）的快速参考。祝你在 Java 职业生涯中一切顺利。

