    注意


    想象实现一个电子表格，它可能包含数百万个单元格。大多数单元格不会被使用，因此你不会想为每个单元格的行/列编号组合创建一个桶而浪费内存。


    由于内存有限，通常需要减少桶的数量，使得键的数量远远超过桶的数量。因此，存在*冲突*的可能性，即多个键哈希到同一个桶。你不能在桶中存储一个值，因为每个键可能关联不同的值。


    解决方案是使用桶来存储指向节点链表的引用，这些节点存储（键，值）对。链表中的所有节点共享相同的哈希码。例如，假设你创建一个哈希映射来存储英语单词及其定义。该实现可以使用
    26 个桶，每个桶代表以英语字母表（a–z）中单个字母开头的所有单词。


    在存储或查找值时，键被哈希，生成的哈希码标识指向其链表中第一个节点的桶。然后搜索链表，查找键与已哈希的键匹配的节点。如果未找到，则要么创建一个新节点，填充键值对，并将其附加到链表（用于存储操作）；要么返回
    null（用于查找操作）。搜索链表的行为称为*线性探测*。


