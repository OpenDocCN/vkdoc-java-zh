    ## 静态类


    第 6 章向你介绍了静态字段、静态方法、静态字段初始化器和静态初始化块。这些实体与对应的非静态字段、非静态方法、非静态字段初始化器和非静态初始化块的区别在于，它们涉及
    `static` 关键字。


    你可以在类中声明这些静态成员。你也可以在类中声明带有 `static` 关键字的类。这种嵌套类被称为*静态类*。以下示例阐明了这种组织方式：


    ```

    class C

    {

    static int f; // 字段可以被显式初始化

    static void m()

    {

    // 方法代码

    }

    static // 静态初始化块

    {

    // 初始化块代码

    }

    static class SC

    {

    // 静态类的成员

    }

    }

    ```


    此示例引入了顶层类 `C`，其中包含静态字段 `f`、静态方法 `m()`、一个静态初始化块以及静态类 `SC`。请注意，`SC` 是 `C` 的一个成员，就像
    `f`、`m()` 和静态初始化块是该类的成员一样。它们都属于类 `C`，而 `C` 是一个*封闭类*——`SC` 是一个*被封闭类*。


    静态类，如同静态方法和静态字段一样，与其封闭类相关联。并且与静态方法类似，静态类不能直接访问封闭类的非静态字段，也不能调用其非静态方法。它只能通过对象引用来访问它们。然而，它可以访问封闭类的静态字段并调用其静态方法。


    注意


    静态类与其封闭类（以及其他类）的非静态成员的交互方式，与任何其他顶层类完全相同。本质上，静态类的行为就像一个为了打包方便而被嵌套在另一个顶层类中的顶层类。


    作为顶层类的一个成员，静态类可以被声明为 `private`、`public`、`protected`，或者保持包级私有（默认）。相比之下，顶层类只能被声明为
    `public` 或保持包级私有。（第 10 章将向你介绍包。）


    清单 9-1 声明了一个 `EnclosingClass`，其中包含一个 `EnclosedClass`，该封闭类演示了对 `EnclosingClass`
    成员的访问。


    ```

    class EnclosingClass

    {

    private static String msg1;

    private static void enclosingMethod1()

    {

    System.out.println(msg1);

    }

    private String msg2;

    private void enclosingMethod2()

    {

    System.out.println(msg2);

    }

    static class EnclosedClass

    {

    static void enclosedMethod1()

    {

    msg1 = "called from EnclosedClass''s enclosingMethod1() method";

    enclosingMethod1();

    }

    void enclosedMethod2()

    {

    System.out.println("unable to access msg2 or call enclosingMethod2()");

    // msg2 = "called from EnclosedClass''s enclosingMethod2() method";

    // enclosingMethod2();

    }

    }

    }

    清单 9-1

    EnclosingClass.java

    ```


    清单 9-1 声明了一个名为 `EnclosingClass` 的顶层类，其中包含静态字段 `msg1`、静态方法 `enclosingMethod1()`、非静态字段
    `msg2`、非静态方法 `enclosingMethod2()` 以及静态类 `EnclosedClass`。被封闭类声明了静态方法 `enclosedMethod1()`
    和非静态方法 `enclosedMethod2()`。有两点需要注意：


    *   `enclosedMethod1()` 能够访问 `EnclosingClass` 的 `msg1` 字段并调用其 `enclosingMethod1()`
    方法，即使两者都被声明为 `private`。

    *   `enclosedMethod2()` 无法访问 `EnclosingClass` 的 `msg2` 字段并调用其 `enclosingMethod2()`
    方法，因为无法从静态上下文中访问封闭类中的非静态字段和非静态方法。


    清单 9-2 展示了一个 `SCDemo` 应用程序类的源代码，该类演示了如何调用 `EnclosedClass` 的 `enclosedMethod1()`
    静态方法。它还演示了如何实例化 `EnclosedClass` 并调用其 `enclosedMethod2()` 非静态方法。


    ```

    class SCDemo

    {

    public static void main(String[] args)

    {

    EnclosingClass.EnclosedClass.enclosedMethod1();

    EnclosingClass.EnclosedClass ec = new EnclosingClass.EnclosedClass();

    ec.enclosedMethod2();

    }

    }

    清单 9-2

    SCDemo.java

    ```


    清单 9-2 的 `main()` 方法首先展示了，要调用静态方法，必须在被封闭类的名称前加上其封闭类的名称。然后展示了，在实例化被封闭类时，必须在其名称前加上封闭类的名称。之后，你就可以像平常一样调用非静态方法了。


    按如下方式编译这两个清单：


    ```

    javac *.java

    ```


    按如下方式运行生成的应用程序：


    ```

    java SCDemo

    ```


    你应该会看到以下输出：


    ```

    called from EnclosedClass''s enclosingMethod1() method

    unable to access msg2 or call enclosingMethod2()

    ```

