    require `catch` blocks and/or a `finally` block to follow `try()`, although they
    can be specified. Consider the following file-oriented example:


    ```

    try (FileInputStream fis = new FileInputStream("notes.txt"))

    {

    // Do something with fis and the underlying file resource.

    }

    ```


    In this example, an input stream to an underlying file resource (`notes.txt`)
    is acquired. The `try` block does something with this resource, and the stream
    (and file) is closed upon exit from the `try` block.


    Listing [11-3](#615966_1_En_11_Chapter.xhtml#PC23) improves on Listing [11-2](#615966_1_En_11_Chapter.xhtml#PC18)’s
    `Copy` application by using `try`-`with`-`resources` to automatically close open
    files and eliminate this boilerplate.


    ```

    import java.io.FileInputStream;

    import java.io.FileNotFoundException;

    import java.io.FileOutputStream;

    import java.io.IOException;

    public class Copy

    {

    public static void main(String[] args)

    {

    if (args.length != 2)

    {

    System.err.println("usage: java Copy srcfile dstfile");

    return;

    }

    try

    {

    copy(args[0], args[1]);

    }

    catch (IOException ioe)

    {

    System.err.println("I/O error: " + ioe.getMessage());

    }

    }

    static void copy(String srcFile, String dstFile) throws IOException

    {

    try (FileInputStream fis = new FileInputStream(srcFile);

    FileOutputStream fos = new FileOutputStream(dstFile))

    {

    int c;

    while ((c = fis.read()) != -1)

    fos.write(c);

    }

    }

    }

    Listing 11-3

    Copy.java (version 3)

    ```


    The `copy()` method uses `try`-`with`-`resources` to manage source and destination
    file resources. The round bracketed code following `try` attempts to create file
    input and output streams to these files. Assuming success, its body executes,
    copying the source file to the destination file.


    Whether an exception is thrown or not, `try`-`with`-`resources` ensures that both
    files are closed when execution leaves the `try` block. Because the boilerplate
    file-closing code that was shown earlier isn’t needed, Listing [11-3](#615966_1_En_11_Chapter.xhtml#PC23)’s
    `copy()` method is much simpler and easier to read.


    Compile Listing [11-3](#615966_1_En_11_Chapter.xhtml#PC23) as follows:


    ```

    javac Copy.java

    ```


    Run the application as follows:


    ```

    java Copy Copy.java Copy.bak

    ```


    If all goes well, you should discover a `Copy.bak` file in the current directory
    whose size and content match `Copy.java`’s size and content.


    ## What’s Next?


    So far, our focus has been mainly on language syntax. In the rest of this book,
    we will focus mainly on APIs from Java’s reference types library. Chapter [12](#615966_1_En_12_Chapter.xhtml)
    begins by looking at `Math` and related classes.'
