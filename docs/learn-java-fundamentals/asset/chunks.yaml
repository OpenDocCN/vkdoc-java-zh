    ## The Properties Class


    Java provides the `Properties` class to facilitate the management of an application’s
    configuration data. It provides a simple way to manage key-value pairs, which
    makes it useful for maintaining application settings (such as a window’s location
    and size – I don’t discuss windows and other user interface concepts in this book),
    database connections (I don’t discuss databases either), and other configurable
    items.'
