- fmt: "### Immutability and Interning\n\nThree of the previously listed methods have\
    \ `String` as their return type: `replace()`, `toLowerCase()`, and `toUpperCase()`.\
    \ They appear to modify the current `String` object and return its reference,\
    \ but this isn’t the case. Instead, they create a new `String` object, extract\
    \ the character array from the current `String` object, modify the contents of\
    \ this array, then invoke the new `String` object’s `String(char[] value)` constructor\
    \ with the modified character array as its argument, and finally return a reference\
    \ to the new `String` object.\n\nWhy do `replace()`, `toLowerCase()`, and `toUpperCase()`\
    \ behave this way? `String` objects are *immutable* – they cannot be changed.\
    \ When you invoke a method that appears to change the character array in the `String`\
    \ object on which the method is invoked (also known as this `String` object),\
    \ a new `String` object is created and populated with the modified character array,\
    \ and its reference is returned.\n\nWhy are `String` objects immutable? There\
    \ are several benefits, such as caching.\n\nJava objects including constructor-created\
    \ `String` objects are stored in a region of memory known as the *heap*. `String`\
    \ objects that are based on string literals are stored in a special heap memory\
    \ area known as the *string pool*. This caching process, known as *interning*,\
    \ lets the Java Virtual Machine (JVM) optimize the amount of allocated memory\
    \ by storing one copy of each literal string-based object in the pool.\n\n**Note**:\
    \ Some sources state that only string literals are stored in the string pool.\
    \ I might be wrong that it is `String` objects containing the character sequences\
    \ identified by these literals that are stored. Regardless, the point is the same.\
    \ Strings are stored in the string pool.\n\nBecause of the close relationship\
    \ between string literals and `String` objects, you can invoke `String` methods\
    \ on a string literal. For example, you can specify `\"abc\".length()` to return\
    \ the length of string `\"abc\"` or `\"abc\".charAt(1)` to return character `b`\
    \ from `\"abc\"`.\n\nConsider the following example:\n\n```\nstatic string FILENAME\
    \ = \"report.txt\";\nFile file;\nif ((file = open(\"report.txt\", \"r\")) != null)\n\
    \    processReport(file);\nelse\n    error(\"unable to open file \" + FILENAME);\n\
    ```\n\nThis example first introduces a constant named `FILENAME` that stores the\
    \ name of a file, which happens to be `report.txt`. It then presents a local variable\
    \ named `file` (of some type named `File`). Moving on, the example attempts to\
    \ open the file by calling an `open()` method with the name of the file and `r`\
    \ (indicating that the file is to be read as opposed to being written or read\
    \ and written).\n\nIf `open()` succeeds, it returns a reference to a `File` object,\
    \ which is assigned to `file`; otherwise, it returns `null` to signify failure.\n\
    \nAssuming success, `open()` invokes the `processReport()` method with `file`’s\
    \ value passed to this method as its only argument. If `open()` fails to open\
    \ the file, it invokes the `error()` method with a message consisting of a string\
    \ expression (string literal `\"unable to open file \"` followed by `+` [string\
    \ concatenation operator] followed by the `FILENAME` constant).\n\nThere is a\
    \ coding mistake in the example. The mistake is that a second copy of the `\"\
    report.txt\"` string literal is present. The idea of using a `FILENAME` constant\
    \ is to have the file name in one place so that it can be changed easily in one\
    \ place. Without the constant, the programmer might forget to change all occurrences\
    \ of the file name – it is a potential *bug* (defect) in the program.\n\nThe JVM\
    \ ensures that there is only a single `\"report.txt\"`-based `String` object in\
    \ the string pool. As a result, a potentially significant amount of heap memory\
    \ is saved.\n\nWhen you create a `String` object via a `String` constructor, this\
    \ object is not interned. For example, if the string pool contains a `String`\
    \ object containing `report.txt`, and you invoke `String s = new String(\"report.txt\"\
    );`, a new `String` object containing `report.txt` in its internal character array\
    \ will be created on the heap – the JVM will not place a reference to the string\
    \ pool’s `report.txt String` object in variable `s`.\n\nHowever, if you would\
    \ prefer to use the `String` object stored in the string pool, you can explicitly\
    \ request this by invoking `String`’s `String intern()` method on this `String`\
    \ object. Here is how you would do this:\n\n```\nString s = new String(\"report.txt\"\
    ).intern();\n```\n\nNow the reference assigned to `s` is the reference from the\
    \ string pool.\n\n### Word Counting\n\nTo give you a more practical example of\
    \ the `String` class, I’ve created a `WC` (Word Count) application that counts\
    \ *words* (sequences of uppercase/lowercase alphabetic characters) read from the\
    \ console. Listing [13-2](#615966_1_En_13_Chapter.xhtml#PC10) presents `WC`’s\
    \ source code.\n\n```\npublic class WC\n{\n    public static void main(String[]\
    \ args) throws java.io.IOException\n    {\n        int ch, nwords = 0;\n     \
    \   boolean isWord = false;\n        while ((ch = System.in.read()) != -1)\n \
    \       {\n            if (!isalpha(ch))\n                isWord = false;\n  \
    \          else\n                if (!isWord)\n                {\n           \
    \         isWord = true;\n                    ++nwords;\n                }\n \
    \       }\n        System.out.println(\"Number of words: \" + nwords);\n    }\n\
    \    static boolean isalpha(int ch)\n    {\n        return ((ch >= 'A' && ch <=\
    \ 'Z') || (ch >= 'a' && ch <= 'z'));\n    }\n}\n```\n\n**Listing 13-2** `WC.java`\n\
    \n`WC`’s `main()` method first introduces local variables `ch` (the next character\
    \ read from the console), `nwords` (a count of words read from the console), and\
    \ `isWord` (a Boolean flag – true when the start of a new word has been detected;\
    \ otherwise, false). The `nwords` variable is initialized to `0`, and `isWord`\
    \ is initialized to `false`.\n\nThe `main()` method now enters a `while` loop,\
    \ repeatedly invoking `System.in.read()` to read a character from the console,\
    \ which is assigned to local variable `ch`. This method returns `-1` when there\
    \ is nothing left to read. (I’ll properly introduce `System.in.read()` in Chapter\
    \ [14](#615966_1_En_14_Chapter.xhtml).)\n\nEach loop iteration invokes the `isalpha()`\
    \ helper method to test the character in `ch`. If this character is alphabetic,\
    \ true is returned; otherwise, false is returned.\n\n**Note**: I’ve coded `isAlpha()`\
    \ to assume English text. In an application designed to include a non-English\
    \ audience, I would use the `java.lang.Character` class’s `isAlpha()` method.\
    \ However, I prefer to leave a discussion of `Character` to a different book.\n\
    \nIf false is returned, the character in `ch` is not an alphabetic character,\
    \ and false is assigned to `isWord`, which means that we are not in a word. Otherwise,\
    \ an alphabetic character has been detected and the statement following `else`\
    \ is executed.\n\nThe statement consists of a chained-`if` statement, which starts\
    \ with `if (!isWord)`. If `isWord` contains false, we execute the contents of\
    \ the following block, which assigns `true` to `isWord` and increments `nwords`\
    \ – `main()` has detected another word.\n\nOnce the `while` loop finishes, `main()`\
    \ outputs the word count.\n\nCompile Listing [13-2](#615966_1_En_13_Chapter.xhtml#PC10)\
    \ as follows:\n\n```\njavac WC.java\n```\n\nRun the resulting application as follows:\n\
    \n```\njava WC <WC.java\n```\n\nIf you have never worked at the command line,\
    \ the `<` symbol might look strange. Although I’ll discuss working with the console\
    \ more formally in Chapter [14](#615966_1_En_14_Chapter.xhtml), `<` is a redirection\
    \ symbol for obtaining input from the file whose name follows `<` (`WC.java`,\
    \ in this case) instead of from the console’s keyboard (which is the default input\
    \ source).\n\nAssuming that `WC.java` hasn’t been modified, you should observe\
    \ the following output:\n\n```\nNumber of words: 56\n```"
