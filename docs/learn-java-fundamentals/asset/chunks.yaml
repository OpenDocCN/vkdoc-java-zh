- fmt: '# BigInteger


    `BigDecimal`类使用`BigInteger`类来表示任意精度的整数未缩放值。与`BigDecimal`一样，`BigInteger`对象是不可变的——它们不能被更改。所有操作的行为都如同`BigInteger`是用二进制补码表示法（如Java的原始整数类型）表示的。


    `BigInteger`提供了Java所有原始整数运算符的模拟，以及`Math`类中所有相关方法。此外，`BigInteger`还提供了模运算、GCD（最大公约数）计算、素数测试、素数生成、位操作以及其他一些杂项操作。


    `BigInteger`非常适合表示在天文学、物理学和化学中发现的巨大整数。例如，*阿伏伽德罗常数*（一摩尔物质中的粒子数）是`6.02214076×10^(23)`。此外，`1,000,000`光年中的米数是`9.46052840500002×10^(21)`。相比之下，`long`类型可以表示的最大正整数略低于`10^(19)`。


    我创建了一个简单的应用程序来演示`BigInteger`的一部分。清单[12-5](#615966_1_En_12_Chapter.xhtml#PC17)展示了源代码。


    ```

    // BigInteger Demo

    import java.math.BigInteger;

    class BID

    {

    public static void main(String[] args)

    {

    BigInteger bi1 = new BigInteger("100");

    BigInteger bi2 = new BigInteger("25");

    System.out.println("bi1 = " + bi1);

    System.out.println("bi2 = " + bi2);

    System.out.println("bi1 + bi2: " + bi1.add(bi2));

    System.out.println("bi1 - bi2: " + bi1.subtract(bi2));

    System.out.println("bi1 * bi2: " + bi1.multiply(bi2));

    System.out.println("bi1 / bi2: " + bi1.divide(bi2));

    }

    }

    Listing 12-5

    BID.java

    ```


    清单[12-5](#615966_1_En_12_Chapter.xhtml#PC17)的`main()`方法首先调用`BigInteger(String
    val)`构造函数来构造一对`BigInteger`对象。输出它们的值后，它调用`BigInteger`的`BigInteger add(BigInteger
    val)`、`BigInteger subtract(BigInteger val)`、`BigInteger multiply(BigInteger val)`和`BigInteger
    divide(BigInteger val)`方法，将`val`加到调用`BigInteger`上、从调用`BigInteger`中减去`val`、将调用`BigInteger`乘以`val`、以及将调用`BigInteger`除以`val`。在每种情况下，都会返回一个新的`BigInteger`对象（与`BigDecimal`对象一样，`BigInteger`对象不能被更改——它们是不可变的）。结果被输出。


    编译清单[12-5](#615966_1_En_12_Chapter.xhtml#PC17)如下：


    ```

    javac BID.java

    ```


    运行生成的应用程序如下：


    ```

    java BID

    ```


    您应该观察到以下输出：


    ```

    bi1 = 100

    bi2 = 25

    bi1 + bi2: 125

    bi1 - bi2: 75

    bi1 * bi2: 2500

    bi1 / bi2: 4

    ```


    ## 接下来是什么？


    在本书中，我提到了字符串和`java.lang.String`类。第[13](#615966_1_En_13_Chapter.xhtml)章将探讨`String`以及相关的`java.lang.StringBuffer`类。


    # 13. String 和 StringBuffer


    第[1](#615966_1_En_1_Chapter.xhtml)章在`String[] args`的上下文中简要提到了`String`类型。该类型在后续章节中出现，但没有进行适当的讨论。本章通过正确介绍`String`来弥补这一疏忽。然后介绍`String`的伴随类型：`StringBuffer`。


    ## String


    `java.lang.String`类描述了一个*字符串*，它是一个字符序列。您可以通过将这些字符放在一对双引号之间来字面地表示一个字符串（例如，`"The
    quick brown fox jumps over the lazy dog."`）。


    ### 创建字符串


    `String`提供了几个用于创建字符串的构造函数。这些构造函数包括`String(char[] value)`，它创建一个包含`value`字符数组中字符的`String`对象。以下代码片段演示了此构造函数：


    ```

    char[] c = new char[] { ''T'', ''h'', ''e'', '' '', ''q'', ''u'', ''i'', ''c'',
    ''k'', '' '',

    ''b'', ''r'', ''o'', ''w'', ''n'', '' '', ''f'', ''o'', ''x'', '' '',

    ''j'', ''u'', ''m'', ''p'', ''s'', '' '', ''o'', ''v'', ''e'', ''r'',

    '' '', ''t'', ''h'', ''e'', '' '', ''l'', ''a'', ''z'', ''y'', '' '',

    ''d'', ''o'', ''g'', ''.'' };

    String s = new String(c); // 将新创建的String对象的引用赋给s。

    ```


    您可能认为我应该使用`String(String original)`构造函数，例如`new String("The quick brown fox jumps
    over the lazy dog.")`。然而，这样做将是一个错误。


    传递给构造函数的参数是另一个`String`对象。当您调用构造函数时，您正在创建参数的副本——您现在有了第二个`String`对象。


    注意


    您可能想探索用于创建`String`对象的其他构造函数。查看JDK 21引用类型库的`String`类的Java文档（[http://`docs.oracle.com/en/java/javase/20/docs/api/java.base/java/lang/String.xhtml`](http://docs.oracle.com/en/java/javase/20/docs/api/java.base/java/lang/String.xhtml)）以了解这些构造函数以及`String`的方法。


    通过将字符串字面量赋值给`String`变量来创建`String`对象要容易得多。以下示例演示：


    ```

    String s = "The quick brown fox jumps over the lazy dog.";

    ```


    此赋值利用了*语法糖*（使语言更易于使用的语法）来更轻松地创建`String`对象。


    ### 比较字符串


    另一个使`String`使用起来更甜的语法糖示例是通过`==`和`!=`运算符进行字符串比较。例如，`System.out.println("abc" ==
    "abc");`输出`true`，`System.out.println("abc" != "Abc");`输出`true`。这是因为字符串驻留（interning）机制，稍后将讨论。


    您不能比较任意字符串。例如，您不能将基于字符串字面量的`String`对象（再次，请查看本章后面关于驻留的讨论）与基于构造函数的`String`对象进行比较。例如，`System.out.println("abc"
    == new String("abc"));`输出`false`。


    在`String`（以及任何类型的对象）比较中，`==`和`!=`运算符比较引用。由于字符串字面量的驻留机制，只有一个`String`对象。将其引用与其自身引用进行比较会产生`true`结果。


    基于引用的比较带来了性能提升。通过`==`和`!=`比较两个对象比通过重写的`java.lang.Object`的`equals(Object obj)`方法（该方法比较它们的各个字段）更快。（`equals()`方法默认使用`==`进行比较。）


    `String`的`equals(Object obj)`方法将此字符串与指定的`obj`ect进行比较。当且仅当参数不是`null`引用并且是一个表示与此对象相同字符序列的`String`对象时，结果为`true`。否则，返回`false`。


    `String`还提供了一个`boolean equalsIgnoreCase(String string)`方法，该方法将此字符串与指定的`string`进行比较。此方法忽略大小写，这意味着大写和小写字母被视为相同。例如，出于比较目的，`A`和`a`被视为相同的字符。


    注意


    查看文档中关于`compareTo()`和`compareToIgnoreCase()`方法的介绍，它们也提供比较功能。与`equals()`和`equalsIgnoreCase()`不同，它们设计用于排序应用程序。'
  raw: '## BigInteger


    The `BigDecimal` class uses the `BigInteger` class to represent the arbitrary
    precision integer unscaled value. As with `BigDecimal`, `BigInteger` objects are
    immutable – they cannot be changed. All operations behave as if `BigInteger`s
    were represented in two’s-complement notation (like Java’s primitive integer types).


    `BigInteger` provides analogues to all of Java’s primitive integer operators and
    all relevant methods from the `Math` class. Additionally, `BigInteger` provides
    operations for modular arithmetic, GCD (Greatest Common Divisor) calculation,
    primality testing, prime generation, bit manipulation, and a few other miscellaneous
    operations.


    `BigInteger` is ideal for representing fantastically large integers such as what
    you find in astronomy, physics, and chemistry. For example, the *Avogadro constant*
    (the number of particles found in one mole of a substance) is 6.02214076×10^(23).
    Also, the number of meters in 1,000,000 light years is 9.46052840500002×10^(21).
    In contrast the largest positive integer that the `long` type can represent is
    just under 10^(19).


    I’ve created a simple application that demonstrates a portion of `BigInteger`.
    Listing [12-5](#615966_1_En_12_Chapter.xhtml#PC17) presents the source code.


    ```

    // BigInteger Demo

    import java.math.BigInteger;

    class BID

    {

    public static void main(String[] args)

    {

    BigInteger bi1 = new BigInteger("100");

    BigInteger bi2 = new BigInteger("25");

    System.out.println("bi1 = " + bi1);

    System.out.println("bi2 = " + bi2);

    System.out.println("bi1 + bi2: " + bi1.add(bi2));

    System.out.println("bi1 - bi2: " + bi1.subtract(bi2));

    System.out.println("bi1 * bi2: " + bi1.multiply(bi2));

    System.out.println("bi1 / bi2: " + bi1.divide(bi2));

    }

    }

    Listing 12-5

    BID.java

    ```


    Listing [12-5](#615966_1_En_12_Chapter.xhtml#PC17)’s `main()` method first invokes
    the `BigInteger(String val)` constructor to construct a pair of `BigInteger` objects.
    After outputting their values, it invokes `BigInteger`’s `BigInteger add(BigInteger
    val)`, `BigInteger subtract(BigInteger val)`, `BigInteger multiply(BigInteger
    val)`, and `BigInteger divide(BigInteger val)` methods to add `val` to the invoking
    `BigInteger`, to subtract `val` from the invoking `BigInteger`, to multiply the
    invoking `BigInteger` by `val`, and to divide the invoking `BigInteger` by `val`.
    In each case, a new `BigInteger` object is returned (as with `BigDecimal` objects,
    `BigInteger` objects cannot be changed – they are immutable). The results are
    output.


    Compile Listing [12-5](#615966_1_En_12_Chapter.xhtml#PC17) as follows:


    ```

    javac BID.java

    ```


    Run the resulting application as follows:


    ```

    java BID

    ```


    You should observe the following output:


    ```

    bi1 = 100

    bi2 = 25

    bi1 + bi2: 125

    bi1 - bi2: 75

    bi1 * bi2: 2500

    bi1 / bi2: 4

    ```


    ## What’s Next?


    Throughout this book, I’ve referred to strings and the `java.lang.String` class.
    Chapter [13](#615966_1_En_13_Chapter.xhtml) explores `String` as well as the related
    `java.lang.StringBuffer` class.


    # 13. String and StringBuffer


    Chapter [1](#615966_1_En_1_Chapter.xhtml) briefly referred to the `String` type
    in the context of `String[] args`. This type showed up in subsequent chapters
    without a proper discussion. This chapter addresses this oversight by properly
    introducing you to `String`. It then introduces `String`’s companion type: `StringBuffer`.


    ## String


    The `java.lang.String` class describes a *string*, which is a sequence of characters.
    You express a string literally by placing these characters between a pair of double
    quotes (e.g., `"The quick brown fox jumps over the lazy dog."`).


    ### Creating Strings


    `String` provides several constructors for creating a string. These constructors
    include `String(char[] value)`, which creates a `String` object containing the
    characters in the `value` character array. The following code fragment demonstrates
    this constructor:


    ```

    char[] c = new char[] { ''T'', ''h'', ''e'', '' '', ''q'', ''u'', ''i'', ''c'',
    ''k'', '' '',

    ''b'', ''r'', ''o'', ''w'', ''n'', '' '', ''f'', ''o'', ''x'', '' '',

    ''j'', ''u'', ''m'', ''p'', ''s'', '' '', ''o'', ''v'', ''e'', ''r'',

    '' '', ''t'', ''h'', ''e'', '' '', ''l'', ''a'', ''z'', ''y'', '' '',

    ''d'', ''o'', ''g'', ''.'' };

    String s = new String(c); // Assign newly-created String object''s reference to
    s.

    ```


    You might think that I should have used the `String(String original)` constructor,
    as in `new String("The quick brown fox jumps over the lazy dog.")`. However, doing
    that would have been a mistake.


    The argument passed to the constructor is another `String` object. When you invoke
    the constructor, you are making a copy of the argument – you now have a second
    `String` object.


    Note


    You might want to explore additional constructors for creating `String` objects.
    Check out the Java documentation for the JDK 21 reference types library’s `String`
    class ([http://`docs.oracle.com/en/java/javase/20/docs/api/java.base/java/lang/String.xhtml`](http://docs.oracle.com/en/java/javase/20/docs/api/java.base/java/lang/String.xhtml))
    to learn about these constructors as well as `String`’s methods.


    It’s much easier to create a `String` object by assigning a string literal to
    a `String` variable. The following example demonstrates:


    ```

    String s = "The quick brown fox jumps over the lazy dog.";

    ```


    This assignment takes advantage of *syntactic sugar* (syntax that makes the language
    sweeter to use) to create a `String` object more easily.


    ### Comparing Strings


    Another example of syntactic sugar that makes working with `String` much sweeter
    is string comparison via the `==` and `!=` operators. For example, `System.out.println("abc"
    == "abc");` outputs `true` and `System.out.println("abc" != "Abc");` outputs `true`.
    This works because of interning, discussed later.


    You cannot compare just any old strings. For example, you cannot compare a `String`
    object that is based on a string literal (again, check out my discussion on interning
    later in this chapter) with a `String` object that is based on a constructor.
    For example, `System.out.println("abc" == new String("abc"));` outputs `false`.


    When it comes to `String` (and any type of object) comparisons, the `==` and `!=`
    operators compare references. Because of interning where string literals are concerned,
    there is only a single `String` object. Comparing its reference with its reference
    produces a true result.


    Comparison based on references results in a performance boost. It is faster to
    compare two objects via `==` and `!=` than via an overloaded version of `java.lang.Object`’s
    `equals(Object obj)` method that compares their individual fields. (The `equals()`
    method defaults to using `==` for comparisons.)


    `String`’s `equals(Object obj)` method compares this string to the specified `obj`ect.
    The result is true if and only if the argument is not the null reference and is
    a `String` object that represents the same sequence of characters as this object.
    Otherwise, it returns false.


    `String` also provides a `boolean equalsIgnoreCase(String string)` method that
    compares this string to the specified `string`. This method ignores case, which
    means that uppercase and lowercase letters are treated the same. For example,
    A and a are considered to be the same character for comparison purposes.


    Note


    Check out the documentation’s coverage of the `compareTo()` and `compareToIgnoreCase()`
    methods, which also provide comparisons. Unlike `equals()` and `equalsIgnoreCase()`,
    they are designed for use in sorting applications.'
  trans: '

    ## BigInteger


    `BigDecimal` 类使用 `BigInteger` 类来表示任意精度的整数未缩放值。与 `BigDecimal` 一样，`BigInteger` 对象是不可变的——它们不能被更改。所有操作的行为都如同
    `BigInteger` 是用二进制补码表示法（就像 Java 的基本整数类型一样）表示的。


    `BigInteger` 提供了 Java 所有基本整数运算符的模拟，以及 `Math` 类中的所有相关方法。此外，`BigInteger` 还提供了模运算、GCD（最大公约数）计算、素数测试、素数生成、位操作以及其他一些杂项操作。


    `BigInteger` 非常适合表示在天文学、物理学和化学中遇到的巨大整数。例如，*阿伏伽德罗常数*（一摩尔物质中的粒子数）是 6.02214076×10²³。此外，100
    万光年的米数是 9.46052840500002×10²¹。相比之下，`long` 类型能表示的最大正整数略小于 10¹⁹。


    我创建了一个简单的应用程序来演示 `BigInteger` 的一部分功能。清单 12-5 展示了源代码。


    ```

    // BigInteger Demo

    import java.math.BigInteger;

    class BID

    {

    public static void main(String[] args)

    {

    BigInteger bi1 = new BigInteger("100");

    BigInteger bi2 = new BigInteger("25");

    System.out.println("bi1 = " + bi1);

    System.out.println("bi2 = " + bi2);

    System.out.println("bi1 + bi2: " + bi1.add(bi2));

    System.out.println("bi1 - bi2: " + bi1.subtract(bi2));

    System.out.println("bi1 * bi2: " + bi1.multiply(bi2));

    System.out.println("bi1 / bi2: " + bi1.divide(bi2));

    }

    }

    清单 12-5

    BID.java

    ```


    清单 12-5 的 `main()` 方法首先调用 `BigInteger(String val)` 构造函数来构造一对 `BigInteger` 对象。输出它们的值后，它调用
    `BigInteger` 的 `BigInteger add(BigInteger val)`、`BigInteger subtract(BigInteger
    val)`、`BigInteger multiply(BigInteger val)` 和 `BigInteger divide(BigInteger val)`
    方法，分别将 `val` 加到调用 `BigInteger` 上、从调用 `BigInteger` 中减去 `val`、将调用 `BigInteger` 乘以
    `val`、以及将调用 `BigInteger` 除以 `val`。在每种情况下，都会返回一个新的 `BigInteger` 对象（与 `BigDecimal`
    对象一样，`BigInteger` 对象不能被更改——它们是不可变的）。结果被输出。


    按如下方式编译清单 12-5：


    ```

    javac BID.java

    ```


    按如下方式运行生成的应用程序：


    ```

    java BID

    ```


    您应该会看到以下输出：


    ```

    bi1 = 100

    bi2 = 25

    bi1 + bi2: 125

    bi1 - bi2: 75

    bi1 * bi2: 2500

    bi1 / bi2: 4

    ```


    ## 接下来是什么？


    在本书中，我多次提到字符串和 `java.lang.String` 类。第 13 章将探讨 `String` 以及相关的 `java.lang.StringBuffer`
    类。


    # 13. String 和 StringBuffer


    第 1 章在 `String[] args` 的上下文中简要提到了 `String` 类型。该类型在后续章节中出现过，但没有进行适当的讨论。本章通过正式介绍
    `String` 来弥补这一疏忽。然后介绍 `String` 的配套类型：`StringBuffer`。


    ## String


    `java.lang.String` 类描述了一个*字符串*，它是一个字符序列。你可以通过将这些字符放在一对双引号之间来字面地表示一个字符串（例如，`"The
    quick brown fox jumps over the lazy dog."`）。


    ### 创建字符串


    `String` 提供了几个用于创建字符串的构造函数。这些构造函数包括 `String(char[] value)`，它创建一个包含 `value` 字符数组中字符的
    `String` 对象。以下代码片段演示了此构造函数：


    ```

    char[] c = new char[] { ''T'', ''h'', ''e'', '' '', ''q'', ''u'', ''i'', ''c'',
    ''k'', '' '',

    ''b'', ''r'', ''o'', ''w'', ''n'', '' '', ''f'', ''o'', ''x'', '' '',

    ''j'', ''u'', ''m'', ''p'', ''s'', '' '', ''o'', ''v'', ''e'', ''r'',

    '' '', ''t'', ''h'', ''e'', '' '', ''l'', ''a'', ''z'', ''y'', '' '',

    ''d'', ''o'', ''g'', ''.'' };

    String s = new String(c); // 将新创建的 String 对象的引用赋给 s。

    ```


    你可能会认为我应该使用 `String(String original)` 构造函数，例如 `new String("The quick brown fox
    jumps over the lazy dog.")`。然而，这样做会是一个错误。


    传递给构造函数的参数是另一个 `String` 对象。当你调用构造函数时，你是在复制该参数——你现在有了第二个 `String` 对象。


    注意


    你可能想探索用于创建 `String` 对象的其他构造函数。请查看 JDK 21 引用类型库的 `String` 类的 Java 文档（[``docs.oracle.com/en/java/javase/20/docs/api/java.base/java/lang/String.xhtml``](http://docs.oracle.com/en/java/javase/20/docs/api/java.base/java/lang/String.xhtml)），以了解这些构造函数以及
    `String` 的方法。


    通过将字符串字面量赋值给 `String` 变量来创建 `String` 对象要容易得多。以下示例演示了这一点：


    ```

    String s = "The quick brown fox jumps over the lazy dog.";

    ```


    这种赋值利用了*语法糖*（使语言更易于使用的语法）来更轻松地创建 `String` 对象。


    ### 比较字符串


    另一个使 `String` 操作更加便捷的语法糖示例是通过 `==` 和 `!=` 运算符进行字符串比较。例如，`System.out.println("abc"
    == "abc");` 输出 `true`，`System.out.println("abc" != "Abc");` 输出 `true`。这之所以有效，是因为字符串驻留（interning），稍后会讨论。


    你不能随意比较任何字符串。例如，你不能将基于字符串字面量的 `String` 对象（再次，请查看本章后面关于字符串驻留的讨论）与基于构造函数的 `String`
    对象进行比较。例如，`System.out.println("abc" == new String("abc"));` 输出 `false`。


    在比较 `String`（以及任何类型的对象）时，`==` 和 `!=` 运算符比较的是引用。由于字符串字面量涉及字符串驻留，因此只有一个 `String`
    对象。将其引用与其自身引用进行比较会产生 true 结果。


    基于引用的比较可以提升性能。通过 `==` 和 `!=` 比较两个对象，比通过 `java.lang.Object` 的 `equals(Object obj)`
    方法的重载版本（该方法比较它们的各个字段）要快。（`equals()` 方法默认使用 `==` 进行比较。）


    `String` 的 `equals(Object obj)` 方法将此字符串与指定的 `obj` 对象进行比较。当且仅当参数不是空引用，并且是一个与此对象表示相同字符序列的
    `String` 对象时，结果才为 true。否则，返回 false。


    `String` 还提供了一个 `boolean equalsIgnoreCase(String string)` 方法，该方法将此字符串与指定的 `string`
    进行比较。此方法忽略大小写，这意味着大写和小写字母被视为相同。例如，在比较时，A 和 a 被视为相同的字符。


    注意


    请查看文档中关于 `compareTo()` 和 `compareToIgnoreCase()` 方法的介绍，它们也提供比较功能。与 `equals()`
    和 `equalsIgnoreCase()` 不同，它们专为排序应用程序中的使用而设计。

