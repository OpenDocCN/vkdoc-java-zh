  trans: '

    ### 方法重写


    子类可以*重写*（替换）继承的方法，从而调用子类自身版本的方法。重写方法必须指定与被重写方法相同的名称、参数列表和返回类型。我在清单 7-5 的 `Vehicle`
    类中声明了一个 `info()` 方法来演示这一点。


    ```

    class Vehicle

    {

    private String make;

    private String model;

    private int year;

    Vehicle(String make, String model, int year)

    {

    this.make = make;

    this.model = model;

    this.year = year;

    }

    String getMake()

    {

    return make;

    }

    String getModel()

    {

    return model;

    }

    int getYear()

    {

    return year;

    }

    void info()

    {

    System.out.println("Make: " + make + ", Model: " + model + ", Year: " + year);

    }

    }

    清单 7-5

    Vehicle.java

    ```


    接下来，我在清单 7-6 的 `Truck` 类中重写了 `info()` 方法。


    ```

    class Truck extends Vehicle

    {

    private boolean isExtendedCab;

    Truck(String make, String model, int year, boolean isExtendedCab)

    {

    super(make, model, year);

    this.isExtendedCab = isExtendedCab;

    }

    boolean isExtendedCab()

    {

    return isExtendedCab;

    }

    void info()

    {

    super.info();

    System.out.println("Is extended cab: " + isExtendedCab);

    }

    }

    清单 7-6

    Truck.java

    ```


    `Truck` 的 `info()` 方法与 `Vehicle` 的 `info()` 方法具有相同的名称、返回类型和参数列表。同时请注意，`Truck`
    的 `info()` 方法首先通过 `super` 后跟成员选择运算符（`.`）来调用 `Vehicle` 的 `info()` 方法。通常，先执行超类逻辑再执行子类逻辑是一个好习惯。


    注意


    要从重写方法的子类中调用超类方法，请在方法名前加上 `super` 和 `.` 运算符。否则，最终会递归调用子类的重写方法。在某些情况下，子类会通过声明同名字段来屏蔽非
    `private` 的超类字段。你可以使用 `super` 和 `.` 来访问这些非 `private` 的超类字段。


    清单 7-7 通过展示 `VehicleDemo` 应用程序类的源代码完成了这个示例。


    ```

    class VehicleDemo

    {

    public static void main(String[] args)

    {

    Truck truck = new Truck("Ford", "F150", 2023, true);

    System.out.println("Make = " + truck.getMake());

    System.out.println("Model = " + truck.getModel());

    System.out.println("Year = " + truck.getYear());

    System.out.println("Is extended cab = " + truck.isExtendedCab());

    truck.info();

    }

    }

    清单 7-7

    VehicleDemo.java

    ```


    按如下方式编译清单 7-7 及其他源文件：


    ```

    javac VehicleDemo.java

    ```


    或


    ```

    javac *.java

    ```


    假设没有编译错误，按如下方式运行 `VehicleDemo` 应用程序：


    ```

    java VehicleDemo

    ```


    你应该会看到以下输出：


    ```

    Make = Ford

    Model = F150

    Year = 2023

    Is extended cab = true

    Make: Ford, Model: F150, Year: 2023

    Is extended cab: true

    ```


    最后两行输出是调用 `truck.info()` 的结果。第一行 `Make: Ford, Model: F150, Year: 2023` 是 `Truck`
    的 `info()` 方法通过 `super.info()` 调用其 `Vehicle` 超类的 `info()` 方法产生的。第二行执行 `System.out.println("Is
    extended cab: " + isExtendedCab);` 来输出该卡车是否为加长驾驶室。


    注意


    出于安全或其他原因，你可能需要声明一个不应被重写的方法。Java 提供了 `final` 关键字来防止方法被重写。只需在方法头前加上 `final`，例如
    `final String getMake()`。有了这个声明，当有人试图重写 `getMake()` 时，编译器会报告错误。


    #### 方法重载而非重写


    假设你将清单 7-6 中的 `info()` 方法替换为以下允许同时输出许可证号的 `info()` 方法：


    ```

    void info(String licenseNumber)

    {

    System.out.print("License number: " + licenseNumber);

    super.info();

    }

    ```


    修改后的 `Truck` 类现在有两个 `info()` 方法：上面显式声明的方法和从 `Vehicle` 继承的方法。


    `void info(String licenseNumber)` 方法并没有重写 `Vehicle` 的 `info()` 方法。相反，它*重载*了 `info()`
    方法（提供了另一个同名但不同的方法）。调用 `truck.info()` 不会调用 `void info(String licenseNumber)`。


    你可以通过在子类的方法头前加上 `@Override` *注解*（附加到方法上的额外信息）来在编译时检测到试图重载而非重写方法的行为。以下 `info()`
    方法演示了这一点：


    ```

    @Override

    void info(String licenseNumber)

    {

    System.out.print("License number: " + licenseNumber);

    super.info();

    }

    ```


    指定 `@Override` 告诉编译器该方法重写了另一个方法。如果有人试图重载该方法，编译器会报告错误。如果没有这个注解，编译器不会报告错误，因为方法重载是合法的。（本书不进一步讨论注解，因为我认为它们不是
    Java 语言的基本特性。）


    提示


    养成在重写方法前加上 `@Override` 的习惯。这个习惯将帮助你更早地发现重载错误。


    #### 方法重写与受保护方法


    Java 提供了 `protected` 关键字用于方法重写的场景。你也可以对字段使用 `protected`。该关键字通常用于标识那些设计为被重写的方法，因为并非所有可访问的方法都应该被重写。


    当你将方法或字段声明为 `protected` 时，该成员对于同一包中任何类内的所有代码都是可访问的。对于子类，无论它们位于哪个包中，该成员也是可访问的。（我将在第
    10 章讨论包。）

