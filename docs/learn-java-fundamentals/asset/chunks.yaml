    当循环必须执行零次或多次时，使用 `while` 语句。当循环必须执行一次或多次时，使用 `do`-`while` 语句。


    ## 循环分支语句


    计算机程序通常需要终止循环或跳过循环的当前迭代。它们通过执行 `break` 或 `continue` *循环分支语句*来完成这些任务。


    ### Break 语句


    *break* *语句*允许你终止 `switch` 语句，这你已经见过了。然而，*break* *语句*也允许你终止循环。当循环是无限循环时，例如 `for
    (;;)`、`while (true)` 或 `do` … `while(true)` 循环，这是必要的。在有限循环的上下文中也可能需要它。


    `break` 语句的语法如下：


    ```

    ''break'' '';''

    ```


    以下示例展示了如何跳出无限循环：


    ```

    while (true)

    {

    System.out.println("按 x 退出循环。");

    // 下面的方法调用从键盘读取一个字符，并将其 int 值赋给 ch。

    // 我将在第 14 章中详细说明 System.in.read()。

    int ch = System.in.read();

    if (ch == ''x'')

    break;

    }

    ```


    当 `ch == ''x''` 为真时，`if` 语句执行 `break`，它将执行流程转移到 `while` 循环之后的第一条语句。


    以下示例展示了如何跳出有限循环：


    ```

    for (int i = 0; i < 1000; i++)

    if (i > 500)

    break;

    else

    System.out.println(i);

    ```


    当 `i` 中的值超过 500 时，此示例跳出循环。


    #### 带标签的 Break


    `break` 语句可以指定一个*标签*（一个标识符后跟一个冒号），这允许你跳出*嵌套循环*（循环内部的循环）。这种 `break` 语句的变体允许你将执行流程转移到以标签为前缀的循环之后的第一条语句，其语法如下：


    ```

    ''break'' 标签 '';''

    ```


    以下示例演示了带标签的 `break`：


    ```

    outer:

    for (int a = 0; a < 5; a++)

    {

    for (int b = 0; b < 5; b++)

    {

    System.out.println("a = " + a + ", b = " + b);

    if (b == 3)

    break outer;

    }

    System.out.println();

    }

    System.out.println("两个循环都已结束");

    ```


    此示例展示了一对 `for` 循环。外层循环可能执行五次。对于每次外层迭代，内层循环可能执行五次。然而，当 `b == 3` 计算结果为真时，执行流程离开内层和外层循环，并继续执行
    `outer:` 标签标记的 `for` 循环之后的第一条语句。


    生成以下输出：


    ```

    a = 0, b = 0

    a = 0, b = 1

    a = 0, b = 2

    a = 0, b = 3

    两个循环都已结束

    ```

