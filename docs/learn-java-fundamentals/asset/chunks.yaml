  trans: '

    ## Package 语句


    Java 提供了 *package* *语句*用于创建包。该语句位于源文件顶部，用于标识该源文件中类型所属的包。它必须遵循以下语法：


    ```

    ''package'' 标识符 (''.'' 标识符)* '';''

    ```


    `package` 语句以保留字 `package` 开头，后跟一个*标识符*，该标识符后面可选地跟一个由 `.` 分隔的*标识符*序列。该语句以分号结束。


    第一个（最左侧）标识符命名包，后续每个标识符命名一个子包。例如，在 `package x.y;` 中，源文件中声明的所有类型都属于 `x` 包的 `y` 子包。


    注意


    按照惯例，包/子包名称使用小写字母表示。当名称由多个单词组成时，你可能希望在单词之间放置下划线以提高可读性。


    包名称序列必须是唯一的，以避免编译问题。例如，假设你创建了两个不同的 `report_generator` 包，并且每个包都包含一个具有不同接口的 `ReportGenerator`
    类。当 Java 编译器在源代码中遇到例如 `ReportGenerator rg = new ReportGenerator();` 时，它需要验证 `ReportGenerator()`
    构造函数是否存在。


    编译器将搜索所有可访问的包，直到找到包含 `ReportGenerator` 类的 `report_generator` 包。如果找到的包包含带有 `ReportGenerator()`
    构造函数的适当 `ReportGenerator` 类，则一切正常。否则，如果找到的 `ReportGenerator` 类没有 `ReportGenerator()`
    构造函数，编译器会报告错误。


    这个场景说明了选择唯一包名称序列的重要性。选择唯一名称序列的惯例是反转你的互联网域名，并将其用作序列的前缀。例如，如果 `javajeff.tech` 是我的域名，我可能会选择
    `tech.javajeff` 作为我的前缀。然后我会指定 `tech.javajeff.report_generator.ReportGenerator`
    来访问 `ReportGenerator`。


    注意


    域名组件并不总是有效的包名称。一个或多个组件名称可能以数字开头（`4seasons.com`）、包含连字符（`-`）或其他非法字符（`news-world.com`），或者是
    Java 的保留字之一（`interface.com`）。惯例规定，在数字前加下划线（`com._4seasons`），用下划线替换非法字符（`com.news_world`），并在保留字后加下划线（`com.interface_`）。


    为了避免 `package` 语句出现更多问题，你需要遵循几条规则：


    *   你只能在源文件中声明一个 `package` 语句。


    *   除了注释之外，`package` 语句前面不能有任何内容。


    第一条规则是第二条规则的特例，其存在是因为将引用类型存储在多个包中没有意义。虽然一个包可以存储多种类型，但一个类型只能属于一个包。


    当源文件没有声明 `package` 语句时，该源文件的类型属于*未命名包*。重要的引用类型通常存储在自己的包中，并避免使用未命名包。


    Oracle 的 Java 实现将包和子包名称映射到同名的目录（对于 Macintosh 用户来说是文件夹）。例如，实现会将 `report_generator`
    映射到名为 `report_generator` 的目录。在 `x`.`y` 中，`x` 将映射到名为 `x` 的目录，`y` 将映射到 `x` 的 `y`
    子目录。编译器将实现包类型的类文件存储在相应的目录中。请注意，未命名包对应于当前目录。


    ## Import 语句


    想象一下，在源代码中每次出现 `ReportGenerator` 时都必须重复指定 `tech.javajeff.report_generator.ReportGenerator`。Java
    提供了一种便捷的替代方案来省略冗长的包细节。这种替代方案就是 `import` 语句。


    *import* *语句*通过告诉编译器在编译期间在哪里查找*非限定*（无包前缀）类型名称，从而从包中导入类型。它出现在源文件的顶部附近，并且必须遵循以下语法：


    ```

    ''import'' 标识符 (''.'' 标识符)]* ''.'' (类型名称 | ''*'') '';''

    ```


    `import` 语句以保留字 `import` 开头，后跟一个*标识符*，该标识符后面可选地跟一个由 `.` 分隔的*标识符*序列。接着是*类型名称*或
    `*`（星号），并以 `;`（分号）结束该语句。


    该语法揭示了 `import` 语句的两种形式。首先，你可以导入单个类型名称，通过*类型名称*标识。其次，你可以导入所有类型，通过 `*` 标识。


    `*` 符号是一个*通配符*，代表所有非限定类型名称。它告诉编译器在 `import` 语句的包序列的最右侧包中查找此类名称，除非该类型名称在先前搜索的包中已找到。请注意，使用通配符不会导致性能损失或代码膨胀。但是，它可能导致名称冲突，你将会看到这一点。


    例如，`import tech.javajeff.report_generator.ReportGenerator;` 告诉编译器，一个非限定的 `ReportGenerator`
    类存在于 `tech.javajeff.report_generator` 包中。类似地，`import tech.javajeff.report_generator.*;`
    告诉编译器，当遇到 `ReportGenerator` 名称、`Vehicle` 名称甚至 `Account` 名称时，在此包中查找。


    提示


    在多程序员项目中工作时，避免使用 `*` 通配符，以便其他程序员可以轻松看到你的源代码中使用了哪些类型。


    使用 `import` 语句的通配符版本时，你可能会遇到名称冲突，因为任何非限定类型名称都会匹配通配符。例如，你有 `math` 和 `statistics`
    包，每个包都包含一个 `Math` 类，源代码以 `import math.*;` 和 `import statistics.*;` 语句开头，并且还包含一个非限定的
    `Math` 出现。由于编译器不知道 `Math` 指的是 `math` 的 `Math` 类还是 `statistics` 的 `Math` 类，它会报告错误。你可以通过使用正确的包名称限定
    `Math`（`math.Math` 或 `statistics.Math`）来解决此问题。


    为了避免 `import` 语句出现其他问题，你需要遵循几条规则：


    *   由于 Java 区分大小写，因此在 `import` 语句中指定的包和子包名称必须与 `package` 语句中使用的大小写一致。


    *   除了注释、`package` 语句、其他 `import` 语句和 `static import` 语句（我将在本章后面介绍）之外，`import`
    语句前面不能有任何内容。


    编译器会自动从 `java.lang` 库包中导入类型。因此，你不必在源代码中指定 `import java.lang.System;`（导入 `java.lang`
    的 `System` 类）或类似的 `import` 语句。


    由于 Java 实现将包和子包名称映射到同名的目录，因此 `import` 语句等同于从与包序列对应的目录序列中加载引用类型的类文件。


    ## 使用包进行实践


    一个实际的例子将帮助你充分理解 `package` 和 `import` 语句。我将在日志库的上下文中演示这些语句，该库允许你将消息记录到控制台、文件或其他目标。

