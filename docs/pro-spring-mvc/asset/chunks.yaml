- fmt: "### ApplicationContexts\n\nTo be able to do dependency injection in Spring,\
    \ we need an *application context*. In Spring, this is an instance of the `org.springframework.context.ApplicationContext`\
    \ interface. The application context is responsible for managing the beans defined\
    \ in it. It also enables more elaborate things like applying AOP to the beans\
    \ defined in it.\n\nThe `ApplicationContext` interface can be configured in different\
    \ ways. The most well-known way is to use one or more XML files; however, we could\
    \ also use a properties file or Java classes. We could even mix-and-match different\
    \ configuration approaches. In general, it is best to stick with a single approach.\
    \ Doing so makes it easier to understand and figure out what your configuration\
    \ is. This also removes the need to hunt down Java, XML, and properties files.\n\
    \nSpring provides several different `ApplicationContext` implementations (see\
    \ [Figure 2-3](#Chapter02.html#fig_2_3)). Each of these implementations provides\
    \ the same features, but differs in how it loads the application context configuration.\
    \ [Figure 2-3](#Chapter02.html#fig_2_3) also shows us the `org.springframework.web.context.WebApplicationContext`\
    \ interface, which is a specialized version of the `ApplicationContext` interface\
    \ used in web environments.\n\n![Image](images/9781430241553_Fig02-03.jpg)\n\n\
    ***Figure 2-3.** Various ApplicationContext implementations (simplified)*\n\n\
    As mentioned previously, the different implementations have different configuration\
    \ mechanisms (i.e., XML or Java). [Table 2-2](#Chapter02.html#tab_2_2) shows the\
    \ default configuration options and indicates the resource loading location.\n\
    \n![Image](images/tab_2_2.jpg)\n\nLet’s take a look at a Java-based configuration\
    \ file, the `com.apress.prospringmvc.moneytransfer.annotation.ApplicationContextConfiguration`\
    \ class (see [Listing 2-6](#Chapter02.html#list_2_6)). There are two annotations\
    \ used in the class: `org.springframework.context.annotation.Configuration` and\
    \ `org.springframework.context.annotation.Bean`. The first stereotypes our class\
    \ as a configuration file, while the second indicates that the result of the method\
    \ is to be used as a factory to create a bean. The name of the bean is, by default,\
    \ the method name. In [Listing 2-6](#Chapter02.html#list_2_6), we have three beans.\
    \ They are named `accountRepository`, `transactionRepository`, and `moneyTransferService`.\
    \ We could also explicitly specify a bean name by setting the `name` attribute\
    \ on the `Bean` annotation.\n\n***Listing 2-6.** The ApplicationContextConfiguration\
    \ configuration file*\n\n```\npackage com.apress.prospringmvc.moneytransfer.annotation;\n\
    \nimport org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
    \nimport com.apress.prospringmvc.moneytransfer.repository.AccountRepository;\n\
    import com.apress.prospringmvc.moneytransfer.repository.MapBasedAccountRepository;\n\
    import com.apress.prospringmvc.moneytransfer.repository.MapBasedTransactionRepository;\n\
    import com.apress.prospringmvc.moneytransfer.repository.TransactionRepository;\n\
    import com.apress.prospringmvc.moneytransfer.service.MoneyTransferService;\n\n\
    @Configuration\npublic class ApplicationContextConfiguration {\n\n    @Bean\n\
    \    public AccountRepository accountRepository() {\n        return new MapBasedAccountRepository();\n\
    \    }\n\n    @Bean\n    public TransactionRepository transactionRepository()\
    \ {\n        return new MapBasedTransactionRepository();\n    }\n\n    @Bean\n\
    \    public MoneyTransferService moneyTransferService() {\n        return new\
    \ MoneyTransferServiceImpl();\n    }\n}\n```\n\n![Image](images/square.jpg) **Caution**\
    \ Configuration classes can be `abstract`; however, they cannot be `final`. To\
    \ parse the class, Spring will create a dynamic subclass of the configuration\
    \ class.\n\nHaving a class with only the `Configuration` annotation isn’t enough.\
    \ We also need something to bootstrap our application context. We use this to\
    \ basically launch our application. In the sample project, this is the responsibility\
    \ of the `MoneyTransferSpring` class (see [Listing 2-7](#Chapter02.html#list_2_7)).\
    \ This class bootstraps our configuration by creating an instance of `org.springframework.context.annotation.AnnotationConfigApplicationContext`\
    \ and passes it the class containing our configuration (see [Listing 2-6](#Chapter02.html#list_2_6)).\
    \ The process is similar for an XML-based approach, which loads the XML file from\
    \ the classpath. The result for both is the same. We included both approaches\
    \ to highlight the differences between the XML- and Java-based configurations;\
    \ however, nothing changes in the resulting application or its execution.\n\n\
    ***Listing 2-7.** The MoneyTransferSpring class*\n\n```\npackage com.apress.prospringmvc.moneytransfer.annotation;\n\
    \nimport java.math.BigDecimal;\n\nimport org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\n\
    import org.springframework.context.ApplicationContext;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
    import org.springframework.context.support.ClassPathXmlApplicationContext;\n\n\
    import com.apress.prospringmvc.ApplicationContextLogger;\nimport com.apress.prospringmvc.moneytransfer.domain.Transaction;\n\
    import com.apress.prospringmvc.moneytransfer.service.MoneyTransferService;\n\n\
    public class MoneyTransferSpring {\n\n    private static final Logger logger =\
    \ LoggerFactory.getLogger(MoneyTransferSpring.class);\n\n    public static void\
    \ main(String[] args) {\n\n        ApplicationContext ctx1 = new AnnotationConfigApplicationContext\n\
    (ApplicationContextConfiguration.class);\n        transfer(ctx1);\n\n        ApplicationContext\
    \ ctx2 = new ClassPathXmlApplicationContext(\n                \"/com/apress/prospringmvc/moneytransfer/annotation/application-context.xml\"\
    );\n        transfer(ctx2);\n\n        ApplicationContextLogger.log(ctx1);\n \
    \       ApplicationContextLogger.log(ctx2);\n    }\n\n    private static void\
    \ transfer(ApplicationContext ctx) {\n        MoneyTransferService service = ctx.getBean(\"\
    moneyTransferService\",\n MoneyTransferService.class);\n        Transaction transaction\
    \ = service.transfer(\"123456\", \"654321\", new\n BigDecimal(\"250.00\"));\n\
    \        logger.info(\"Money Transfered: {}\", transaction);\n    }\n}\n```\n\n\
    Finally, note that application contexts can be in a hierarchy. We can have an\
    \ application context that serves as a parent for another context (see [Figure\
    \ 2-4](#Chapter02.html#fig_2_4)). An application context can only have a single\
    \ parent, but it can have multiple children. Child contexts can access beans defined\
    \ in the parent context; however, parent beans cannot access beans in the child\
    \ contexts. For example, if we enable transactions in the parent context, this\
    \ won’t apply to child contexts (see the “Enabling Features” section later in\
    \ this chapter).\n\n![Image](images/9781430241553_Fig02-04.jpg)\n\n***Figure 2-4.**\
    \ The ApplicationContext Hierarchy*\n\nThis feature allows us to separate our\
    \ application beans (e.g., services, repositories, and infrastructure) from our\
    \ web beans (e.g., request handlers and views). It can be quite useful to have\
    \ this separation. For example, assume that multiple servlets need to reuse the\
    \ same application beans. Instead of recreating them for each servlet, we can\
    \ simply reuse the already existing instances. This can be the case when there\
    \ is one servlet handling the web UI and another that is handling the web services."
  raw: '### ApplicationContexts


    To be able to do dependency injection in Spring, we need an *application context*.
    In Spring, this is an instance of the `org.springframework.context.ApplicationContext`
    interface. The application context is responsible for managing the beans defined
    in it. It also enables more elaborate things like applying AOP to the beans defined
    in it.


    The `ApplicationContext` interface can be configured in different ways. The most
    well-known way is to use one or more XML files; however, we could also use a properties
    file or Java classes. We could even mix-and-match different configuration approaches.
    In general, it is best to stick with a single approach. Doing so makes it easier
    to understand and figure out what your configuration is. This also removes the
    need to hunt down Java, XML, and properties files.


    Spring provides several different `ApplicationContext` implementations (see [Figure
    2-3](#Chapter02.html#fig_2_3)). Each of these implementations provides the same
    features, but differs in how it loads the application context configuration. [Figure
    2-3](#Chapter02.html#fig_2_3) also shows us the `org.springframework.web.context.WebApplicationContext`
    interface, which is a specialized version of the `ApplicationContext` interface
    used in web environments.


    ![Image](images/9781430241553_Fig02-03.jpg)


    ***Figure 2-3.** Various ApplicationContext implementations (simplified)*


    As mentioned previously, the different implementations have different configuration
    mechanisms (i.e., XML or Java). [Table 2-2](#Chapter02.html#tab_2_2) shows the
    default configuration options and indicates the resource loading location.


    ![Image](images/tab_2_2.jpg)


    Let’s take a look at a Java-based configuration file, the `com.apress.prospringmvc.moneytransfer.annotation.ApplicationContextConfiguration`
    class (see [Listing 2-6](#Chapter02.html#list_2_6)). There are two annotations
    used in the class: `org.springframework.context.annotation.Configuration` and
    `org.springframework.context.annotation.Bean`. The first stereotypes our class
    as a configuration file, while the second indicates that the result of the method
    is to be used as a factory to create a bean. The name of the bean is, by default,
    the method name. In [Listing 2-6](#Chapter02.html#list_2_6), we have three beans.
    They are named `accountRepository`, `transactionRepository`, and `moneyTransferService`.
    We could also explicitly specify a bean name by setting the `name` attribute on
    the `Bean` annotation.


    ***Listing 2-6.** The ApplicationContextConfiguration configuration file*


    `package com.apress.prospringmvc.moneytransfer.annotation;`


    `import org.springframework.context.annotation.Bean;`

    `import org.springframework.context.annotation.Configuration;`


    `import com.apress.prospringmvc.moneytransfer.repository.AccountRepository;`

    `import com.apress.prospringmvc.moneytransfer.repository.MapBasedAccountRepository;`

    `import com.apress.prospringmvc.moneytransfer.repository.MapBasedTransactionRepository;`

    `import com.apress.prospringmvc.moneytransfer.repository.TransactionRepository;`

    `import com.apress.prospringmvc.moneytransfer.service.MoneyTransferService;`


    **`@Configuration`**

    `public class ApplicationContextConfiguration {`


    **`    @Bean`**

    `    public AccountRepository accountRepository() {`

    `        return new MapBasedAccountRepository();`

    `    }`


    **`    @Bean`**

    `    public TransactionRepository transactionRepository() {`

    `        return new MapBasedTransactionRepository();`

    `    }`


    **`    @Bean`**

    `    public MoneyTransferService moneyTransferService() {`

    `        return new MoneyTransferServiceImpl();`

    `    }`

    `}`


    ![Image](images/square.jpg) **Caution** Configuration classes can be `abstract`;
    however, they cannot be `final`. To parse the class, Spring will create a dynamic
    subclass of the configuration class.


    Having a class with only the `Configuration` annotation isn’t enough. We also
    need something to bootstrap our application context. We use this to basically
    launch our application. In the sample project, this is the responsibility of the
    `MoneyTransferSpring` class (see [Listing 2-7](#Chapter02.html#list_2_7)). This
    class bootstraps our configuration by creating an instance of `org.springframework.context.annotation
    .AnnotationConfigApplicationContext` and passes it the class containing our configuration
    (see [Listing 2-6](#Chapter02.html#list_2_6)). The process is similar for an XML-based
    approach, which loads the XML file from the classpath. The result for both is
    the same. We included both approaches to highlight the differences between the
    XML- and Java-based configurations; however, nothing changes in the resulting
    application or its execution.


    ***Listing 2-7.** The MoneyTransferSpring class*


    `package com.apress.prospringmvc.moneytransfer.annotation;`


    `import java.math.BigDecimal;`


    `import org.slf4j.Logger;`

    `import org.slf4j.LoggerFactory;`

    `import org.springframework.context.ApplicationContext;`

    `import org.springframework.context.annotation.AnnotationConfigApplicationContext;`

    `import org.springframework.context.support.ClassPathXmlApplicationContext;`


    `import com.apress.prospringmvc.ApplicationContextLogger;`

    `import com.apress.prospringmvc.moneytransfer.domain.Transaction;`

    `import com.apress.prospringmvc.moneytransfer.service.MoneyTransferService;`


    `public class MoneyTransferSpring {`


    `    private static final Logger logger = LoggerFactory.getLogger(MoneyTransferSpring.class);`


    `public static void main(String[] args) {`


    `        ApplicationContext ctx1 = new AnnotationConfigApplicationContext`![Image](images/U002.jpg)

    `(ApplicationContextConfiguration.class);`

    `        transfer(ctx1);`


    `        ApplicationContext ctx2 = new ClassPathXmlApplicationContext(`

    `                "/com/apress/prospringmvc/moneytransfer/annotation/application-context.xml");`

    `        transfer(ctx2);`


    `        ApplicationContextLogger.log(ctx1);`

    `        ApplicationContextLogger.log(ctx2);`

    `    }`


    `    private static void transfer(ApplicationContext ctx) {`

    `        MoneyTransferService service = ctx.getBean("moneyTransferService",`![Image](images/U002.jpg)

    ` MoneyTransferService.class);`

    `        Transaction transaction = service.transfer("123456", "654321", new`![Image](images/U002.jpg)

    ` BigDecimal("250.00"));`

    `        logger.info("Money Transfered: {}", transaction);`

    `    }`

    `}`


    Finally, note that application contexts can be in a hierarchy. We can have an
    application context that serves as a parent for another context (see [Figure 2-4](#Chapter02.html#fig_2_4)).
    An application context can only have a single parent, but it can have multiple
    children. Child contexts can access beans defined in the parent context; however,
    parent beans cannot access beans in the child contexts. For example, if we enable
    transactions in the parent context, this won’t apply to child contexts (see the
    “Enabling Features” section later in this chapter).


    ![Image](images/9781430241553_Fig02-04.jpg)


    ***Figure 2-4.** The ApplicationContext Hierarchy*


    This feature allows us to separate our application beans (e.g., services, repositories,
    and infrastructure) from our web beans (e.g., request handlers and views). It
    can be quite useful to have this separation. For example, assume that multiple
    servlets need to reuse the same application beans. Instead of recreating them
    for each servlet, we can simply reuse the already existing instances. This can
    be the case when there is one servlet handling the web UI and another that is
    handling the web services.'
