    ##### Configuring Servlet 3.0 File Uploading


    The first step in multipart parsing on the `org.springframework.web.servlet.DispatcherServlet`
    we need to add, depending on our configuration, a `multipart-config` section to
    `XML` configuration or include a `javax.servlet.MultipartConfigElement` in our
    `org.springframework.web.WebApplicationInitializer` implementation (see [Listing
    7-13](#Chapter07.html#list_7_13)).


