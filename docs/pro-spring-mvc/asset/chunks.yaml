- fmt: "### `UriComponentsBuilder`\n\n`UriComponentsBuilder`提供了一种构建和编码URI的机制。它可以接受一个URL模式，并替换或扩展变量。这可以用于相对或绝对URL。这种机制在创建URL时特别有用，而不是需要我们自己去考虑编码参数或进行字符串拼接。该组件以一致的方式为我们处理所有这些事情。[清单5-6](#Chapter05.html#list_5_6)中的代码创建了`/book/detail/42`这个URL。\n\
    \n**清单5-6. `UriComponentsBuilder`示例代码**\n\n```\nUriComponentsBuilder.fromPath(\"\
    /book/detail/{bookId}\");\n.build();\n.expand(\"42\")\n.encode()\n```\n\n给出的示例非常简单；然而，我们可以指定更多的变量（例如，`bookId`）并替换它们（例如，指定`port`或`host`）。还有一个`ServletUriComponentsBuilder`子类，我们可以用它来操作当前请求。例如，我们可能用它来替换路径变量，以及请求参数。\n\
    \n### 支持的方法参数注解\n\n除了显式支持的类型（如上一节所述），还有一些注解可以用来标注我们的方法参数（参见[表5-5](#Chapter05.html#tab_5_5)）。其中一些注解也可以与[表5-4](#Chapter05.html#tab_5_4)中提到的方法参数类型一起使用。在这种情况下，它们用于指定请求、Cookie、标头或响应中属性的名称，以及该参数是否为必需的。\n\
    \n所有参数值都通过类型转换转换为参数类型。类型转换系统使用`org.springframework.core.convert.converter.Converter`或`PropertyEditor`将`String`类型转换为实际类型。\n\
    \n![Image](images/tab_5_5.jpg)\n\n所有这些不同的方法参数类型和注解使我们能够编写非常灵活的请求处理方法。然而，我们可以通过扩展框架来扩展这种机制。解析这些方法参数类型是由`org.springframework.web.method.support.HandlerMethodArgumentResolver`的各种实现完成的。[清单5-7](#Chapter05.html#list_5_7)展示了该接口。如果需要，我们可以创建此接口的自定义实现，并将其注册到框架中。你可以在[第7章](#Chapter07.html#ch7)中找到更多相关信息。\n\
    \n**清单5-7. `HandlerMethodArgumentResolver`接口**\n\n```\npackage org.springframework.web.method.support;\n\
    \nimport org.springframework.core.MethodParameter;\nimport org.springframework.web.bind.WebDataBinder;\n\
    import org.springframework.web.bind.support.WebDataBinderFactory;\nimport org.springframework.web.context.request.NativeWebRequest;\n\
    \npublic interface HandlerMethodArgumentResolver {\n\n    boolean supportsParameter(MethodParameter\
    \ parameter);\n\n    Object resolveArgument(MethodParameter parameter,\n     \
    \                      ModelAndViewContainer mavContainer,\n                 \
    \          NativeWebRequest webRequest,\n                           WebDataBinderFactory\
    \ binderFactory)\n                               throws Exception;\n}\n```\n\n\
    ________________\n\n⁴ [`http://en.wikipedia.org/wiki/List_of_HTTP_header_fields`](http://en.wikipedia.org/wiki/List_of_HTTP_header_fields)\n\
    \n让我们仔细看看我们可以使用的所有不同注解类型。所有这些注解都有一些我们可以设置的属性，这些属性有默认值或者可能是必需的。\n\n[表5-5](#Chapter05.html#tab_5_5)中提到的所有注解都有一个`value`属性。这个`value`属性指的是要使用的对象的名称（它适用于什么取决于注解）。如果未填充此值，则回退为使用方法参数的名称。此回退仅在类使用调试信息编译时才可用。^([5](#Chapter05.html#CHP-5-FN-5))\
    \ 使用`ModelAttribute`注解时是一个例外。它不会使用方法参数的名称，而是从参数类型推断名称，使用简单的类名作为参数名。如果类型是数组或集合，它会通过添加`List`使其变为复数形式。如果我们使用`com.apress.prospringmvc.bookstore.domain.Book`作为参数，那么名称将是`book`；如果是数组或集合，那么它将变为`bookList`。\n\
    \n### `RequestParam`\n\n`RequestParam`注解可以放在请求处理方法的任何参数上。当存在时，它用于从请求中检索参数。当放在`Map`上时，根据是否设置了`name`属性，会有一些特殊处理。如果设置了名称，则检索该值并将其转换为`Map`。对于转换（更多信息请参见本章的“数据绑定”部分），如果没有指定名称，则所有请求参数都会作为键/值对添加到映射中。\n\
    \n![Image](images/tab_5_6.jpg)\n\n________________\n\n⁵ [`http://docs.oracle.com/javase/6/docs/technotes/tools/windows/javac.html`](http://docs.oracle.com/javase/6/docs/technotes/tools/windows/javac.html)\n\
    \n### `RequestHeader`\n\n`RequestHeader`注解可以放在任何方法参数上。它用于将方法参数绑定到请求标头。当放在`Map`上时，所有可用的请求标头都会作为键/值对放入映射中。如果放在其他类型的参数上，则使用`org.springframework.core.convert.converter.Converter`或`PropertyEditor`（更多信息请参见“数据绑定”部分）将该值转换为该类型。\n\
    \n![Image](images/tab_5_7.jpg)\n\n### `RequestBody`\n\n`RequestBody`注解用于标记我们想要绑定到Web请求正文的方法参数。通过定位并调用`org.springframework.http.converter.HttpMessageConverter`，将正文转换为方法参数类型。此转换器根据请求的内容类型进行选择。如果未找到转换器，则会抛出`org.springframework.web.HttpMediaTypeNotSupportedException`。默认情况下，这会导致向客户端发送状态码为415（`SC_UNSUPPORTED_MEDIA_TYPE`）的响应。\n\
    \n可选地，方法参数还可以使用`javax.validation.Valid`或`org.springframework.validation.annotation.Validated`进行注解，以对创建的对象强制执行验证。你可以在本章后面的“模型属性验证”部分找到更多关于验证的信息。\n\
    \n### `RequestPart`\n\n当`RequestPart`注解放在类型为`javax.servlet.http.Part`、`org.springframework.web.multipart.MultipartFile`（或后者的集合或数组）的方法参数上时，我们将获得该文件（或文件组）的内容注入。如果放在任何其他参数类型上，则内容会通过`org.springframework.http.converter.HttpMessageConverter`进行处理，该转换器基于检测到的文件内容类型。如果未找到合适的转换器，则会抛出`org.springframework.web.HttpMediaTypeNotSupportedException`。\n\
    \n![Image](images/tab_5_8.jpg)\n\n### `ModelAttribute`\n\n`ModelAttribute`注解可以放在方法参数上，也可以放在方法上。当放在方法参数上时，它用于将此参数绑定到模型对象。当放在方法上时，该方法用于构造模型对象，并且该方法将在调用请求处理方法之前被调用。这类方法可用于创建要在表单中编辑的对象，或提供表单渲染自身所需的数据。（更多信息，请参见“数据绑定”部分。）\n\
    \n![Image](images/tab_5_9.jpg)"
  raw: '##### UriComponentsBuilder


    The `UriComponentsBuilder` provides a mechanism for building and encoding URIs.
    It can take a URL pattern and replace or extend variables. This can be done for
    relative or absolute URLs. This mechanism is particularly useful when creating
    URLs, as opposed to cases where we need to think about encoding parameters or
    doing string concatenation ourselves. This component handles all these things
    in a consistent manner for us. The code in [Listing 5-6](#Chapter05.html#list_5_6)
    creates the `/book/detail/42` URL.


    ***Listing 5-6.** The UriComponentsBuilder Sample Code*


    `UriComponentsBuilder.fromPath("/book/detail/{bookId}");`

    `.build();`

    `.expand("42")`

    `.encode()`


    The sample given is quite simple; however, it is possible to specify more variables
    (e.g., `bookId`) and replace them (e.g., specify the `port` or `host`). There
    is also the `ServletUriComponentsBuilder` subclass, which we can use to operate
    on the current request. For example, we might use it to replace, not only path
    variables, but also request parameters.


    #### Supported Method Argument Annotations


    In addition to explicitly supported types (as mentioned in the previous section),
    there are also a couple of annotations that we can use to annotate our method
    arguments (see [Table 5-5](#Chapter05.html#tab_5_5)). Some of these can also be
    used with the method argument types mentioned in [Table 5-4](#Chapter05.html#tab_5_4).
    In that case, they are used to specify what the name of the attribute in the request,
    cookie, header, or response must be, as well as whether the parameter is required.


    All the parameter values are converted to the argument type by using type conversion.
    The type-conversion system uses an `org.springframework.core.convert.converter.Converter`
    or `PropertyEditor` to convert from a `String` type to the actual type.


    ![Image](images/tab_5_5.jpg)


    All these different method argument types and annotations allow us to write very
    flexible request-handling methods. However, we could extend this mechanism by
    extending the framework. Resolving those method argument types is done by various
    implementations of the `org.springframework.web.method.support.HandlerMethodArgumentResolver`.
    [Listing 5-7](#Chapter05.html#list_5_7) shows that interface. If we want, we can
    create our own implementation of this interface and register it with the framework.
    You can find more information on this in [Chapter 7](#Chapter07.html#ch7).


    ***Listing 5-7.** The HandlerMethodArgumentResolver Interface*


    `package org.springframework.web.method.support;`


    `import org.springframework.core.MethodParameter;`

    `import org.springframework.web.bind.WebDataBinder;`

    `import org.springframework.web.bind.support.WebDataBinderFactory;`

    `import org.springframework.web.context.request.NativeWebRequest;`


    `public interface HandlerMethodArgumentResolver {`


    `    boolean supportsParameter(MethodParameter parameter);`


    `    Object resolveArgument(MethodParameter parameter,`

    `                           ModelAndViewContainer mavContainer,`

    `                           NativeWebRequest webRequest,`

    `                           WebDataBinderFactory binderFactory)`

    `                               throws Exception;`

    `}`


    ________________


    ⁴ [`http://en.wikipedia.org/wiki/List_of_HTTP_header_fields`](http://en.wikipedia.org/wiki/List_of_HTTP_header_fields)


    Let’s take a closer look at all the different annotation types we can use. All
    these annotations have a few attributes that we can set and that have default
    values or may be required.


    All of the annotations mentioned in [Table 5-5](#Chapter05.html#tab_5_5) have
    a value attribute. This value attribute refers to the name of the object to use
    (what it applies to depends on the annotation). If this value isn’t filled, then
    the fallback is to use the name of the method argument. This fallback is only
    usable if the classes are compiled with debug information.^([5](#Chapter05.html#CHP-5-FN-5))
    An exception to this rule occurs when using the `ModelAttribute` annotation. Instead
    of the name of the method argument, it infers the name from the type of argument,
    using the simple classname as the argument name. If the type is an array or collection,
    it makes this plural by adding `List`. If we were to use our `com.apress.prospringmvc.bookstore.domain.Book`
    as an argument, then the name would be `book`; if it were an array or collection,
    then it would become `bookList`.


    ##### RequestParam


    The `RequestParam` annotation can be placed on any argument in a request-handling
    method. When present, it is used to retrieve a parameter from the request. When
    put on a `Map`, there is some special handling, depending on whether the `name`
    attribute is set. If the name is set, the value is retrieved and converted into
    a `Map`. For conversion (see the “Data Binding” section in this chapter for more
    information), if no name is given, all request parameters are added to the map
    as key/value pairs.


    ![Image](images/tab_5_6.jpg)


    ________________


    ⁵ [`http://docs.oracle.com/javase/6/docs/technotes/tools/windows/javac.html`](http://docs.oracle.com/javase/6/docs/technotes/tools/windows/javac.html)


    ##### RequestHeader


    The `RequestHeader` annotation can be placed on any method argument. It is used
    to bind a method argument to a request header. When placed on a `Map`, all available
    request headers are put in the map as key/value pairs. If it is placed on another
    type of argument, then the value is converted into the type by using a `org.springframework.core.convert.converter.Converter`
    or `PropertyEditor` (see the “Data Binding” section for more information).


    ![Image](images/tab_5_7.jpg)


    ##### RequestBody


    The `RequestBody` annotation is used to mark a method parameter we want to bind
    to the body of the web request. The body is converted into the method parameter
    type by locating and calling an `org.springframework.http.converter.HttpMessageConverter`.
    This converter is selected based on the requests content-type. If no converter
    is found, an `org.springframework.web.HttpMediaTypeNotSupportedException` is thrown.
    By default, this leads to a response with code 415 (SC_UNSUPPORTED_MEDIA_TYPE)
    being send to the client.


    Optionally, method parameters can also be annotated with `javax.validation.Valid`
    or `org.springframework.validation.annotation.Validated` to enforce validation
    for the created object. You can find more information on validation in the “Validation
    of Model Attributes” section later in this chapter.


    ##### RequestPart


    When the `RequestPart` annotation is put on a method argument of the type `javax.servlet.http.Part`,
    `org.springframework.web.multipart.MultipartFile` (or on a collection or array
    of the latter,) then we will get the content of that file (or group of files)
    injected. If it is put on any other argument type, the content is passed through
    an `org.springframework.http.converter.HttpMessageConverter` for the content type
    detected on the file. If no suitable converter is found, then an `org.springframework.web.HttpMediaTypeNotSupportedException`
    is thrown.


    ![Image](images/tab_5_8.jpg)


    ##### ModelAttribute


    The `ModelAttribute` annotation can be placed on method arguments, as well as
    on methods. When placed on a method argument, it is used to bind this argument
    to a model object. When placed on a method, that method is used to construct a
    model object, and this method will be called before request-handling methods are
    called. These kinds of methods can be used to create an object to be edited in
    a form or to supply data needed by a form to render itself. (For more information,
    see the “Data Binding” section.)


    ![Image](images/tab_5_9.jpg)'
