    ### 本章小结


    在本章中，我们首先从一些理论入手，探讨了 Web Flow 为何以及如何简化你的 Web 应用程序开发。我们还介绍了 Web Flow 的一些更重要的特性，例如其扩展的作用域机制、自动状态保存，以及它如何通过使用
    Post Redirect Get 和请求令牌同步来帮助保护 Web 应用程序状态的完整性。


    接下来，我们学习了如何配置 Web Flow，包括如何管理其特定的配置细节。我们还学习了如何将 Web Flow 与 Spring MVC 整合在一起。接着，我们介绍了在应用程序中实现基本流程所需的大部分
    Web Flow 基础知识。最后，我们通过一个构建基本图书订购流程的实时代码示例，展示了 Web Flow 的一些特性。


    现在，我们准备进入下一章，届时我们将更深入地探讨 Web Flow 的一些尚未涉及的特性，并利用这些特性将我们的示例应用程序转变为一个真正的 Web Flow
    应用程序。


    ## 第 11 章


    ## 使用 Spring Web Flow 构建应用程序


    在上一章关于 Spring Web Flow 的内容中，我们向你介绍了 Web Flow 的主要特性及其能为你做什么。我们还介绍了基本 Web Flow 配置的样子，以及它如何与
    Spring MVC 集成。我们看到了几乎每个流程都包含的一些基本元素，例如视图状态和评估动作。最后，我们将书店转换为了一个支持基本 Web Flow 的应用程序。


    在本章中，我们将继续探讨 Web Flow 的更多特性。例如，我们将看到将书店转变为实际应用程序所需的所有特性。我们将从上一章结束时的书店状态开始，并在此过程中逐步对其进行重构。本章的总体方法是一种混合方式；我们将首先向你介绍一些新特性，并详细解释它们。接着，我们将通过重构现有应用程序或使用这些特性来修改书店，看看如何应用这些概念。


    我们选择这种方法，是为了便于继续参考目录。在使用 Web Flow 时，你可能希望回溯到某些功能并阅读其所有细节。如果我们将所有内容混合在一起，这将变得困难。我们将分两个阶段处理示例，以使一切更易于理解。


    ### 重要的 Web Flow 概念


    既然你已经了解了 Web Flow 的一些基础知识，我们想解释一些特定的新 Web Flow 概念和术语，并进一步阐述第 10 章中引入的一些概念。具体来说，我们将扩展第
    10 章中引入的“流程”定义。我们还将更深入地研究作用域及其工作原理，然后介绍并定义可用于 Web Flow 表达式的隐式对象。


    #### 流程定义


    在一个流程定义中，我们可以有五种状态，其中两种我们已经见过：视图状态和结束状态。其余的状态是动作状态、决策状态和子流程状态。我们将在本章中更详细地介绍这些状态。然而，在本节中，我们想对子流程做一个简短介绍，因为在我们完全介绍“子流程”部分之前，会先提到它们。子流程的概念非常简单。例如，子流程的结构和设置与其他流程没有太大区别；它在其自己的流程定义
    XML 中定义，并且有自己的流程 ID。


    有时，一个给定的流程是从另一个流程启动的，而不是通过直接引用它在顶层启动。我们将这样的流程称为*子流程*。这个过程在两个流程之间创建了一种父子关系。正如我们稍后将看到的，这种关系意味着这两个流程可以使用
    `conversation` 作用域共享状态，以及将数据从一个流程映射到另一个流程。它也是一种模块化技术，因为它可以帮助你构建可重用的组件。


    另一个驱动流程的重要元素是*事件*。用户通过将表单内容提交到 URL 来发出事件信号，该 URL 包含作为路径的流程 ID 和作为参数之一的流程执行键。其他参数可以是输入组件的值，例如文本字段、选择框、复选框等。Web
    Flow 将使用提交中的流程 ID 和执行键来恢复流程执行，并从提交的参数中解析出事件。请记住，在我们的示例中，事件被封装在 Submit 按钮的名称中，格式为：`_eventId_event`。解析事件后，Web
    Flow 将使用它来调用转换，该转换具有与我们提交的事件匹配的 `on` 属性。然后，它将被转发到由转换的 `to` 属性指示的状态。


    转换将流程从一种状态带到同一流程的另一种状态。在你可以返回视图之前，你必须要么转换到另一个视图状态（可能经过其他状态），要么转换到一个结束状态。正如我们将看到的，结束状态也可以选择指定一个视图。该视图在流程执行终止后呈现。

