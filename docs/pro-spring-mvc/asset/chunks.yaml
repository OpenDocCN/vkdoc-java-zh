- fmt: '#### Different Web Flow Scopes


    We already mentioned in the previous chapter that Web Flow adds a lot of different
    scopes into the picture (five to be exact): `conversation`, `flow`, `view`, `flash`,
    and `request` (see the “Fine-Grained Scoping” section in [Chapter 10](#Chapter10.html#ch10)).
    Each of them has a well-defined lifecycle.


    ![Image](images/square.jpg) **Note** Every object you put on `conversation`, `flow`,
    `view` or `flash` scope should implement `java.io.Serializable` (for the `request`
    scope, this is not required). This is the case because Web Flow stores the state
    of these scopes between requests. The default implementation relies on Java serialization.
    Also note that this is recursive; every object your object refers to should be
    serializable, as well. If you do not want to retain certain objects, you can use
    the Java `transient` keyword on the field. This way, the field is exempted from
    being serialized. When the flow state is restored, these fields will resolve to
    `null`.


    Next, we will explain each of the five scopes in detail, from the shortest life
    cycle to the longest. Let''s start with the `request` scope.


    ##### Request Scope


    [Figure 11-1](#Chapter11.html#fig_11_1) shows two HTTP requests entering the view
    state: HTTP request 1 and HTTP request 2. While they are shown in the same figure,
    they should be interpreted sequentially. First, HTTP request 1 enters and gets
    processed, and the response is returned. Second, HTTP request 2 enters, and the
    cycle repeats for this request. When the first request enters, `request` scope
    1 is started. It is possible that an event is triggered, and a transition is executed.
    Whatever is executed has access to that `request` scope. When the processing is
    done, `request` scope 1 is destroyed, and the response for HTTP request 1 returned.
    When the next request (HTTP request 2) comes in, a *new* `request` scope (request
    scope 2) is created.


    ![Image](images/9781430241553_Fig11-01.jpg)


    ***Figure 11-1.** Illustrating the request scope*


    ![Image](images/square.jpg) **Note** We want to point out that, from now on, a
    curly brace indicates the scope available at that moment in a “scope figure.”
    The creation and cleanup of a certain scope is denoted by the curly brace itself;
    between the top and bottom of the brace, the scope is available to any execution
    trying to use it.


    The `request` scope is tied at the level of a single request into the flow execution.
    Each and every request coming into the flow execution will start with a new and
    empty `request` scope.


    It is important to realize that the `request` scope is not linked to a flow execution
    by itself. Consequently, a parent flow executing a subflow (or vice versa) always
    sees the same `request` scope. You can use the `request` scope to store objects
    that are only required while processing the current request. Objects that are
    cheap to create or load can also be put in the `request` scope because they can
    be re-created or reloaded every time they are needed.


    For example, if you need to load a list of results, you could load them with an
    `<on-render>` action (as we will explain later on). The `<on-render>` is executed
    right before the view is rendered. The result could then be stored on the `request`
    scope for a very brief moment, until the view is rendered using that information
    and then cleared.


    There is a great resemblance between the Servlet `request` scope and Web Flow
    `request` scope. The major difference is that the latter scope is local to Web
    Flow components. It is an internal artifact used within Web Flow, and it isn''t
    exposed to external components (e.g., Servlets).


    ![Image](images/square.jpg) **Note** Including a `request` scope in Web Flow was
    a design decision to have an abstraction over the standard Servlet `request` scope.
    The designers targeted Web Flow for other platforms, as well (which may not have
    the notion of a `request` scope as the Servlet specification does). For you as
    a developer, there is no real difference apart from the fact that Web Flow''s
    `request` scope is easier to reach from, for example, expressions inside your
    flow.


    ##### Flash Scope


    You can think of the `flash` scope as a bigger `request` scope that survives two
    requests in a Post Redirect Get until the view finally gets rendered. Attributes
    with `flash` scope are persisted until the view is rendered and then cleared.


    Storing objects in the `flash` scope is particularly useful for objects that are
    required in the view, but are not needed anywhere else. A good example of using
    `flash` scope is to store messages that are rendered on a view, like errors or
    warning messages. While an action executes, they can be put on `flash` scope by
    your application controller or by validation logic in your flow. The `request`
    scope is not sufficient because model validation occurs in the first request of
    the PRG. As a result, when the view gets rendered, the messages put on `request`
    scope will be gone. The `flash` scope provides an elegant solution for these kinds
    of use cases.


    [Figure 11-2](#Chapter11.html#fig_11_2) shows this by having a `flash` scope available
    that spans request 1 and 2 in transition t1. From the moment the view is rendered,
    the existing `flash` scope is cleared. This implies that, if you refresh the view,
    the messages will be gone, which is typically what you want for things like error
    and warning messages.


    ![Image](images/9781430241553_Fig11-02.jpg)


    ***Figure 11-2**. Showing the flash scope*


    Because `flash` scope is an extended `request` scope, it is also available to
    any subflow that is used. For example, when a transition within a view state delegates
    to a subflow which then renders the view, the `flash` scope will also be available
    to the execution that happens within the subflow. However, after the view has
    been rendered, any subsequent requests to that subflow will operate in their own
    `flash` scope.


    ##### View Scope


    The `view` scope gets allocated when a view state enters, and it is destroyed
    when the view state exits. The `view` scope can only be referenced from within
    a view state. In [Figure 11-3](#Chapter11.html#fig_11_3), you can see that, for
    each new view state, a new `view` scope is available.


    ![Image](images/9781430241553_Fig11-03.jpg)


    ***Figure 11-3**. Showing the view scope*


    You could use `view` scope for storing data that is only required within the given
    view. For example, when you have a data table with pagination, you could load
    the results and put them in `view` scope. Using transitions within the view state
    (e.g., a `next` and `previous` transition), you could scroll through the list
    each time, showing a certain part of the result set. From the moment the view
    state is exited (e.g., after selecting a result in the data table), the `view`
    scope is destroyed, and the resources are released.


    ##### Flow Scope


    The scope of the `flow` scope is a flow session. You can see this in [Figure 11-4](#Chapter11.html#fig_11_4),
    where the execution of the parent flow has a `flow` scope, as does the flow session
    of the subflow (a subflow runs in the same flow execution as the parent flow but
    in a different flow session). This means that an attribute placed in a `flow`
    scope by a parent flow will not be accessible from the `flow` scope of a subflow.


    ![Image](images/9781430241553_Fig11-04.jpg)


    ***Figure 11-4.** The flow scope*


    You can use the `flow` scope to store objects that should be available for the
    entire flow session, but which are only for that session and not other flow sessions
    started in the same flow execution (i.e., subflows).


    Objects in the `flow` scope are mostly related to the application and the functionality
    it implements (e.g., domain object instances manipulated by the flow).'
