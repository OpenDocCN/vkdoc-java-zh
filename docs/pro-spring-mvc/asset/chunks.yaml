    第一个高亮块是将表单数据转换为 JSON 对象。第二个高亮行是类型。我们需要将其改为 `POST`。之所以需要这样做，是因为内容就是请求体，而 `GET`
    请求没有请求体，它会将所有内容编码到 URL 中。最后一个高亮行是将 JSON 对象转换为可以发送到服务器的 JSON 字符串。其余部分保持不变。


    如果重新部署应用程序并执行搜索，搜索结果将再次显示给用户。


