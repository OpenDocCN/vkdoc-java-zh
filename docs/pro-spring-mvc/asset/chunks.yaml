    每次退出状态时，都会执行由 `<on-exit>` 指定的操作。这也适用于转换到同一状态的情况；在这种情况下，如果指定了 `to` 属性，则会退出该状态并再次进入（适用于
    `<on-entry>` 元素的相同规则也适用于 `<on-exit>` 元素）。现在让我们扩展之前给出的 `<on-entry>` 示例。如果我们在 `createOrders-flow`
    的 `selectBooks` 视图状态中添加一个 `<on-exit>`（参见清单 11-15），那么执行 `reset` 转换将会触发 `<on-exit>`。在这种情况下，我们将退出
    `selectBooks` 视图状态以再次进入它。


