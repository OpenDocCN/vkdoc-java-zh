    ### Summary


    This chapter covered all things we need to write controllers and handle forms.
    We began by exploring the `RequestMapping` annotation and how that can be used
    to map requests to a method to handle a request. We also explored flexible method
    signatures and covered which method argument types and return values are supported
    out of the box.


    Next, we dove into the deep end and started writing controllers and modifying
    our existing code. We also introduced form objects and covered how to bind the
    properties to fields. And we explained data binding and explored Spring’s type-conversion
    system and how that is used to convert from and to certain objects. We also wrote
    our own implementation of a `Converter` to convert from text to a `Category` object.


    In addition to type conversion, we also explored validation. There are two ways
    of doing validation: we can create our own implementation of a `Validator` interface,
    or we can use the JSR-303 annotations on the objects we want to validate. Enabling
    validation is done with either the `Valid` or the `Validated` annotation.


    To make it easier to bind certain fields to attributes of a form object, there
    is the Spring Form Tag library, which helps us to write HTML forms. This library
    also helps us to display bind and validation errors to the user.


    Finally we covered how to implement internationalization on our web pages and
    how to convert the validation and error codes to proper messages to show to the
    end user.


    In the next chapter, we are going to explore some more advanced features of Spring
    MVC. Along the way, we will see how we can further extend and customize the existing
    infrastructure.


    ## C H A P T E R  6


    ## Implementing Controllers — Advanced


    In this chapter, we are going to take a look at some of the more advanced parts
    of Spring MVC, and then see how we can tap into the framework itself to extend
    it to suit our needs.


    We’ll begin by examining scoped beans and how we can use them to our advantage.
    Next, we’ll explore how we can add generic functionality (so-called crosscutting
    concerns) to our application. For this, we are going to take a look at interceptors,
    including how to create them and how to wire them into our application.


    No matter how robust or well-thought out our application is, there is going to
    be a time when our application doesn’t behave as expected (e.g., maybe someone
    will trip over the wire to our database server), and this will result in exceptions
    in our application. In general, we want to prevent the user from seeing the often
    cryptic stack traces; and for this, we are going to explore the exception-handling
    facilities in Spring MVC.


    After we cover all these topics, we are going to dive into the internals of Spring
    @MVC and explore a couple of APIs we can extend; we’ll then use these extended
    APIs to augment the functionality of the framework.


    ### Using Scoped Beans


    In [Chapter 2](#Chapter02.html#ch2), we noted the different scopes for beans that
    are supported by the Spring Framework. [Table 6-1](#Chapter06.html#tab_6_1) lists
    them again. In this section, we are going to use scopes to our advantage. Specifically,
    we will walk through a practical example that leverages a scoped bean to create
    an online shopping cart (`com.apress.prospringmvc.bookstore.domain.Cart`).


    ![Image](images/tab_6_1.jpg)


    ![Image](images/tab_6_1a.jpg)


    We’ve already worked with the `singleton` scope—that is the default for bean creation
    in the Spring Framework. The `org.springframework.context.annotation.Scope` annotation
    is used to specify the scope of a bean; its properties are listed in [Table 6-2](#Chapter06.html#tab_6_2).


    This annotation can be used as a type-level or method-level annotation. When you
    use Scope as a type-level annotation, all beans of this type will have the scope
    specified by the annotation. When you use it as a method-level annotation, beans
    created by this annotated method will have the scope specified by the annotation.
    You must put it on a method annotated with the `org.springframework.context.annotation.Bean`
    annotation.


    ![Image](images/tab_6_2.jpg)'
