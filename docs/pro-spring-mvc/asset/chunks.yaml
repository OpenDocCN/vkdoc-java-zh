    #### 扩展 RequestMappingHandlerAdapter


    与 `RequestMappingHandlerMapping` 类似，`RequestMappingHandlerAdapter` 也使用了几种不同的策略来完成其工作。为了确定向方法参数注入什么内容，适配器会查询多个
    `org.springframework.web.method.support.HandlerMethodArgumentResolver` 实现。对于返回类型，它会查询已注册的
    `org.springframework.web.method.support.HandlerMethodReturnValueHandler` 实现。

