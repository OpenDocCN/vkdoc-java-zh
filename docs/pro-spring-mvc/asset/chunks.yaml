  raw: '#### Using Spring Mock Objects


    When the time has come to test your application controller, you can use the helpers
    from Spring: `org.springframework.test.web.ModelAndViewAssert` combined with `MockHttpServletRequest`,
    `MockHttpServletResponse`, and `MockHttpSession` (all found in `org.springframework.mock.web)`.
    Although they are named “Mock” they are more like stubs by our definition of the
    terms. You can, for example, add attributes to the `MockHttpSession` via `MockHttpServletRequest`
    and retrieve them later on (`MockHttpServletRequest` uses `MockHttpSession` internally
    as its session stub). Depending on things you set or do, some `MockHttpServletRequest`
    methods might react differently when you call them (it also contains some inner
    logic to simulate the `HttpServletRequest` where possible). We will first show
    the handle login method, in [Listing 9-12](#Chapter09.html#list_9_12), so you
    can easily follow what we are testing.


    ***Listing 9-12.** The handleLogin method from the LoginController*


    `@RequestMapping(method = RequestMethod.POST)`

    `public String handleLogin(@RequestParam String username, @RequestParam String`![Image](images/U002.jpg)

    `                          password, HttpSession session)`![Image](images/U002.jpg)

    `                          throws AuthenticationException {`

    `    Account account = this.accountService.login(username, password);`

    `    session.setAttribute(ACCOUNT_ATTRIBUTE, account);`

    `    String url = (String) session.getAttribute(REQUESTED_URL);`

    `    session.removeAttribute(REQUESTED_URL); // Remove the attribute`


    `    if (StringUtils.hasText(url) && !url.contains("login")) {`![Image](images/U002.jpg)

    `        // Prevent loops for the login page.`

    `        return "redirect:" + url;`

    `    } else {`

    `        return "redirect:/index.htm";`

    `    }`

    `}`


    The method in [Listing 9-12](#Chapter09.html#list_9_12) takes care of handling
    the login from the login page. It accepts a username and password submitted from
    the login form. It will then authenticate the user using the `AccountService`
    and put the result (an Account) on the HTTP session using the constant `ACCOUNT_ATTRIBUTE`
    as key. You can see the `SecurityHandlerInterceptor` defined in the [Chapter 6](#Chapter06.html#ch6)
    section “Implementing a HandlerInterceptor.”


