    #### 类型转换


    数据绑定中的一个重要部分是类型转换。当我们收到请求时，我们唯一拥有的是`String`实例。然而，在现实世界中，我们使用许多不同的对象类型，而不仅仅是文本表示。因此，我们希望将这些`String`实例转换为我们可以使用的东西，这就是类型转换的作用。在
    Spring MVC 中，有三种方法可以进行类型转换：


    *   属性编辑器（Property Editors）

    *   转换器（Converters）

    *   格式化器（Formatters）


    属性编辑器是进行类型转换的旧方式，而转换器和格式化器是进行类型转换的新方式。转换器和格式化器更加灵活；因此，它们也比属性编辑器更强大。此外，依赖属性编辑器还会引入整个`java.beans`包，包括其所有支持类，而这些在
    Web 环境中我们并不需要。


    ##### 属性编辑器


    自 Spring 框架诞生以来，对属性编辑器的支持就一直是其一部分。要使用这种类型转换，我们创建一个`PropertyEditor`实现（通常通过继承`PropertyEditorSupport`）。属性编辑器接收一个`String`并将其转换为强类型对象——反之亦然。Spring
    提供了几个开箱即用的实现来完成此操作（参见表 5-20）。


    ![Image](img/tab_5_20.jpg)


    ![Image](img/tab_5_20a.jpg)


    ##### 转换器


    Spring 3 中的转换器 API 是一个通用的类型转换系统。在 Spring 容器中，该系统用作属性编辑器的替代方案，用于将 bean 属性值的字符串转换为所需的属性类型。在我们的应用程序中，只要需要进行类型转换，我们也可以利用这个
    API。转换器系统是一个强类型转换系统，并使用泛型来强制执行这一点。


    有四种不同的接口可用于实现转换器，所有这些接口都可以在`org.springframework.core.convert.converter`包中找到：


    *   `Converter`

    *   `ConverterFactory`

    *   `GenericConverter`

    *   `ConditionalGenericConverter`


    让我们探讨这四种不同的 API。


    清单 5-29 展示了 Converter API，它非常直接。它有一个单一的`convert`方法，该方法接收一个`source`参数并将其转换为目标类型。源类型和目标类型由泛型类型参数`S`和`T`表示。


    ***清单 5-29.** Converter API*


    `package org.springframework.core.convert.converter;`


    `public interface Converter<S, T> {`


    `    T convert(S source);`

    `}`


    清单 5-30 展示了`ConverterFactory` API，当您需要为整个类层次结构提供转换逻辑时，它非常有用。为此，我们可以将`S`参数化为我们要转换的类型（源），并将`R`参数化为我们要转换到的基类型。然后，我们可以在此工厂的实现内部创建适当的转换器。


    ***清单 5-30.** ConverterFactory API*


    `package org.springframework.core.convert.converter;`


    `public interface ConverterFactory<S, R> {`


    `    <T extends R> Converter<S, T> getConverter(Class<T> targetType);`

    `}`


    当我们需要更复杂的转换逻辑时，我们可以使用`org.springframework.core.convert.converter.GenericConverter`（参见清单
    5-31）。它比之前的转换器类型更灵活，但强类型化程度较低。它支持在多个源类型和目标类型之间进行转换。在转换过程中，我们可以访问源类型和目标类型的描述，这对于复杂的转换逻辑非常有用。这也允许通过注解驱动类型转换（即，我们可以在运行时解析注解以确定需要做什么）。


    ***清单 5-31.** GenericConverter API*


    `package org.springframework.core.convert.converter;`


    `import org.springframework.core.convert.TypeDescriptor;`

    `import org.springframework.util.Assert;`


    `import java.util.Set;`


    `public interface GenericConverter {`


    `    Set<ConvertiblePair> getConvertibleTypes();`


    `    Object convert(Object source,`

    `                   TypeDescriptor sourceType,`

    `                   TypeDescriptor targetType);`


    `}`


    这种类型转换逻辑的一个例子是将数组转换为集合的转换器。转换器会首先检查正在转换的元素类型，以便我们可以对不同的元素应用额外的转换逻辑。


    清单 5-32 展示了`GenericConverter`的一个特化版本，它允许我们指定一个条件来决定何时执行转换。例如，我们可以创建一个转换器，它使用`BigDecimal`的某个`valueOf`方法来转换一个值，但这只有在我们可以使用给定的`sourceType`实际调用该方法时才有用。


    ***清单 5-32.** ConditionalGenericConverter API*


    `package org.springframework.core.convert.converter;`


    `import org.springframework.core.convert.TypeDescriptor;`


    `    boolean matches(TypeDescriptor sourceType, TypeDescriptor targetType);`


    `}`


    转换器在`org.springframework.core.convert.ConversionService`接口（参见清单 5-33）背后执行；该接口的典型实现也实现了`org.springframework.core.convert.converter.ConverterRegistry`接口，这使得可以轻松注册额外的转换器。当使用
    Spring @MVC 时，有一个预配置的`org.springframework.format.support.DefaultFormattingConversionService`实例（它也允许执行和注册格式化器）。


    ***清单 5-33.** ConversionService API*


    `package org.springframework.core.convert;`


    `public interface ConversionService {`


    `    boolean canConvert(Class<?> sourceType, Class<?> targetType);`


    `    boolean canConvert(TypeDescriptor sourceType, TypeDescriptor targetType);`


    `    <T> T convert(Object source, Class<T> targetType);`


    `    Object convert(Object source, TypeDescriptor sourceType, TypeDescriptor targetType);`

    `}`

