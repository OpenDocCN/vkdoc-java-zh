    \ **Note** You can check the welcome file defaults by first going to your workspace\
    \ server home directory. The home directory can be found by double clicking the\
    \ “Servers” project (while being in the Java or Java EE perspective) and then\
    \ by double clicking on the server instance (which is named “VMware vFabric tc\
    \ Server Developer Edition v2.6-config” by default). In there you can open the\
    \ `web.xml`. The entries in this file are the defaults for each web application\
    \ that will be deployed on this server instance. At the end of the file, you will\
    \ find the `welcome-file-list`, which lists all the files (and their extensions)\
    \ that are recognized as welcome files by default.\n\n#### Implementing the Create\
    \ Order Flow\n\n*To implement our flow according to the required use case, we\
    \ will need three major elements:*\n\n*   An `<on-start>` element to initialize\
    \ our model and selectable categories\n*   Three view states, one for each page\n\
    \    *   Transitions in each view state to navigate back/cancel/forward\n    *\
    \   Some evaluation actions\n    *   To prepare our list of selectable books\n\
    \    *   To add a book to the list of selected books\n    *   To clear the list\
    \ of selected books\n    *   To create our order in the last step\n*   An end\
    \ state to terminate our flow\n\nWe decided to start building the sample page-by-page.\
    \ In the upcoming sections, we will build the three pages (in the order as displayed\
    \ in [Figure 10-5](#Chapter10.html#fig_10_5)) and the required flow components.\
    \ Let's get started by building the page that lets users select the category."
  trans: "\n### 构建你的第一个流程\n\n在本节及后续内容中，我们将使用 Web Flow 构建书店示例应用的一小部分。我们已经了解了构成流程的一些重要元素。现在，我们将利用它们构建一个完整的可运行流程。为了让您熟悉构建第一个流程所需的基本模块，我们将逐步构建它，并详细描述每个部分。最后，我们将展示完整的组装流程。接下来的章节将包含大量代码片段，因此如果您在阅读过程中感到困惑，不妨先查看“概述”部分中列出的完整流程。\n\
    \n我们将实现“创建订单”用例。该用例允许用户订购图书。第一个屏幕显示一个用于选择类别的下拉列表，而下一个屏幕允许用户选择属于该选定类别的图书。可以将一本或多本不同的图书添加到列表中。接着，用户可以输入订单详细信息，例如交货日期。当用户确认后，订单即生成。用户还可以在不同阶段取消该流程。此流程包含以下操作/页面：\n\
    \n1.  用户从导航栏中选择“购买图书”链接。\n2.  必须选择一个类别（页面 1）。\n3.  必须显示该类别下的图书（页面 2）。\n4.  用户可以选择一本或多本不同的图书，并将其添加到已选图书列表中。\n\
    5.  用户可以输入一些订单详细信息，例如交货日期（页面 3）。\n6.  订单被提交。\n\n请参见图 10-11 中创建订单的流程图；表 10-8 解释了流程步骤。\n\
    \n![Image](img/9781430241553_Fig10-11.jpg)\n\n***图 10-11.** 示例应用实现的流程*\n\n![Image](img/9781430241553_tab10-08.jpg)\n\
    \n我们可以总结如下：\n\n*   在此示例应用中，我们不执行任何形式的身份验证。但由于需要将订单关联到用户，每个用户在进入 Web 应用时都会自动通过身份验证。示例中已为您完成了此操作。我们在此不讨论这一点，因为暂时将这部分流程从您的控制中剥离。我们将在下一章进行解释。\n\
    *   订单生成后，用户将被送回首页。\n\n![Image](img/square.jpg) **注意** 我们在此 Spring Web Flow 示例中用于选择图书和创建订单的方法，与之前讨论的\
    \ Spring MVC 方法有所不同。我们特意省略了购物车，并将图书选择和订单流程转变为更基于流程的方法。这在解释不同的 Web Flow 元素时，更能满足我们的需求。\n\
    \n#### 创建首页\n\n在开始构建流程之前，我们首先要介绍用户如何进入应用。换句话说，我们想回顾一下用户在输入书店 URL 时看到的内容。\n\n首先显示的页面是所谓的首页。它由中间没有内容（内容区域）的模板组成。此页面允许用户从导航菜单中选择一个操作。让我们快速了解一下这是如何实现的。\n\
    \n控制器 `com.apress.prospringmvc.bookstore.web.controller.MainController` 是一个普通的\
    \ Spring MVC 控制器，通过 `@Controller` 注解定义为 Spring Bean。该控制器的目标很简单，就是渲染首页，其物理文件是 `main.jsp`。控制器使用\
    \ `@RequestMapping(\"index.htm\")` 来实现这一点。该控制器定义在清单 10-9 中。\n\n***清单 10-9.** 主控制器*\n\
    \n`package com.apress.prospringmvc.bookstore.web.controller;`\n\n`import org.springframework.stereotype.Controller;`\n\
    `import org.springframework.web.bind.annotation.RequestMapping;`\n`import org.springframework.web.servlet.ModelAndView;`\n\
    \n`@Controller`\n`public class MainController {`\n`    @RequestMapping(\"index.htm\"\
    )`\n`    public ModelAndView main() {`\n`        ModelAndView mov = new ModelAndView();`\n\
    `        mov.setViewName(\"main\");`\n`        return mov;`\n`    }`\n`}`\n\n\
    视图通过 Tiles 渲染。如果您打开位于 `/WEB-INF/tiles/tiles-configuration.xml` 的 `tiles-configuration.xml`，您会看到\
    \ `main` 视图继承了 `fullTemplate`，并将 `main.jsp` 设置为内容面板（参见清单 10-10）。\n\n***清单 10-10.**\
    \ Tiles 配置*\n\n`<definition name=\"main\" extends=\"fullTemplate\">`\n`    <put-attribute\
    \ name=\"content\" value=\"/WEB-INF/view/main.jsp\"/>`\n`</definition>`\n\n要访问应用并显示此首页，您只需在浏览器中指向\
    \ [`http://localhost:8080/chapter10-bookstore/`](http://localhost:8080/chapter10-bookstore/)。得益于\
    \ `index.jsp`（它会被自动识别为 Web 应用的欢迎文件），欢迎屏幕会显示出来。这个 `index.jsp` 会在内部转发到 `index.htm`\
    \ 请求映射，`MainController` 正在监听该映射，从而触发视图渲染过程。请注意，欢迎文件必须是一个物理文件。它不能是一个由 Spring MVC\
    \ 解析的虚构视图名称（例如我们的 `index.htm`）。为了实现这一点，我们在 `webapp` 文件夹下直接放置了一个 `index.jsp` 文件，如清单\
    \ 10-11 所示。该文件夹可直接被浏览器访问。Tomcat（或 tc Server）默认会在此处查找 `index.jsp` 欢迎文件。请记住，`index.jsp`\
    \ 位于我们的 `WEB-INF` 目录之外（在 STS Java 视图中，它位于 `/webapp` 目录下），因此外部客户端可以直接访问它。这与我们其他视图的\
    \ JSP 不同，它们位于 `WEB-INF/view` 下，外部客户端无法直接访问。\n\n***清单 10-11.** 转发到内部 Tiles 组合主视图的\
    \ index.jsp*\n\n`<!DOCTYPE HTML>`\n\n`<%@ page pageEncoding=\"UTF-8\" contentType=\"\
    text/html; charset=UTF-8\"%>`\n\n`<jsp:forward page=\"/index.htm\" />`\n\n![Image](img/square.jpg)\
    \ **注意** 您可以通过首先进入工作区服务器主目录来检查欢迎文件的默认设置。可以通过双击“Servers”项目（在 Java 或 Java EE 透视图下），然后双击服务器实例（默认名为“VMware\
    \ vFabric tc Server Developer Edition v2.6-config”）来找到主目录。在其中，您可以打开 `web.xml`。此文件中的条目是将在该服务器实例上部署的每个\
    \ Web 应用的默认设置。在文件末尾，您会找到 `welcome-file-list`，它列出了默认被识别为欢迎文件的所有文件（及其扩展名）。\n\n####\
    \ 实现创建订单流程\n\n*要根据所需的用例实现我们的流程，我们需要三个主要元素：*\n\n*   一个 `<on-start>` 元素，用于初始化我们的模型和可选择的类别\n\
    *   三个视图状态，每个页面一个\n    *   每个视图状态中的转换，用于导航返回/取消/前进\n    *   一些评估操作\n    *   准备我们的可选图书列表\n\
    \    *   将图书添加到已选图书列表\n    *   清空已选图书列表\n    *   在最后一步创建我们的订单\n*   一个结束状态，用于终止我们的流程\n\
    \n我们决定开始逐页构建示例。在接下来的章节中，我们将构建这三个页面（按照图 10-5 所示的顺序）以及所需的流程组件。让我们从构建允许用户选择类别的页面开始。\n"
- fmt: "### Selecting the Category\n\nWe need to begin by initializing our model and\
    \ retrieving the selectable categories that we will have to present to the user.\
    \ The model is the `com.apress.prospringmvc.bookstore.web.controller.OrderForm`.\
    \ We will use this model throughout the flow to gather the user's input. The categories\
    \ are required for the first step of the flow, and these are displayed to the\
    \ user in a dropdown list that the user can select from. These categories need\
    \ to be retrieved from database first.\n\n![Image](images/square.jpg) **Note**\
    \ The flow we are building here is the `createOrders-flow.xml`, which is located\
    \ in `WEB-INF/view/createOrders/`. This is also the location where we will put\
    \ the pages that we are going to create, along with the flow.\n\nEarlier in this\
    \ chapter, we covered the `<on-start>` element, which allows you to execute logic\
    \ when the flow is initially starting. This logic will execute before the flow\
    \ enters any other state. The action should appear before any other state, and\
    \ it can appear only once in the flow. This will be perfect for our initialization\
    \ (see [Listing 10-12](#Chapter10.html#list_10_12)).\n\n***Listing 10-12.** The\
    \ `<on-start>` Element of Our Create Order Flow*\n\n```\n<on-start>\n    <evaluate\
    \ expression=\"orderController.initializeForm()\" result=\"flowScope.orderForm\"\
    \ />\n    <evaluate expression=\"orderController.initializeSelectableCategories()\"\
    \ result=\"flowScope.selectableCategories\"/>\n</on-start>\n```\n\nThe first evaluate\
    \ action will initialize our form and set some initial values (this code is executed\
    \ on the `com.apress.prospringmvc.bookstore.web.controller.OrderController`).\
    \ It calls the method shown in [Listing 10-13](#Chapter10.html#list_10_13). The\
    \ initialized `OrderForm` is then set to the flow scope. `flowScope` is an implicit\
    \ variable to access the flow scope. (Scoping is explained in the next chapter\
    \ in the “Different Web Flow Scopes” section; similarly, you can learn about implicit\
    \ variables in the next chapter's “Implicit Variables” section).\n\n***Listing\
    \ 10-13.** The Method to Initialize Our Form, Called from the `<on-start>` element*\n\
    \n```\npublic OrderForm initializeForm() {\n    OrderForm orderForm = new OrderForm();\n\
    \    orderForm.setQuantity(1);\n    orderForm.setOrderDate(simpleDateFormat.format(new\
    \ Date()));\n    return orderForm;\n}\n```\n\nWe can specify more than one evaluate\
    \ action in an on start, and these actions will be executed in order. If one of\
    \ the evaluate actions results in an exception, then the processing stops and\
    \ no transition takes place. The second evaluate action will put a map of selectable\
    \ categories (`com.apress.prospringmvc.bookstore.domain.Category`) on the flow\
    \ scope. To keep things simple, we used a map with a key type of `Long` (the surrogate\
    \ key of each category record) and a value type of `String` (the name of the Category)\
    \ as can be seen in [Listing 10-14](#Chapter10.html#list_10_14). Later on we will\
    \ see how we can use Category Objects directly instead of transforming them to\
    \ String's first.\n\n***Listing 10-14.** The Method to Initialize Categories,\
    \ Called from the on-start*\n\n```\npublic Map<Long, String> initializeSelectableCategories()\
    \ {\n    Map<Long, String> selectableCategories = new HashMap<Long, String>();\n\
    \    for (Category category : categoryService.findAll()) {\n        selectableCategories.put(category.getId(),\
    \ category.getName());\n    }\n    return selectableCategories;\n}\n```\n\n![Image](images/square.jpg)\
    \ **Note** We explicitly stored our categories separately from the `OrderForm`.\
    \ We could have also saved this on the form itself, but we kept it separate, so\
    \ as not to cause bloat on the form.\n\nNext, we are going to create our view\
    \ state, as shown in [Listing 10-15](#Chapter10.html#list_10_15).\n\n***Listing\
    \ 10-15.** The selectCategory View State*\n\n```\n<view-state id=\"selectCategory\"\
    \ view=\"selectCategory\" model=\"orderForm\">\n    <transition on=\"next\" to=\"\
    selectBooks\">\n    <evaluate expression=\"orderController.initializeSelectableBooks(flowScope.orderForm)\"\
    \ result=\"flowScope.selectableBooks\"/>\n    </transition>\n    <transition on=\"\
    cancel\" to=\"end\" />\n</view-state>\n```\n\nThis view state will render the\
    \ `selectCategory` view. This is a definition entry in our `tiles-configuration.xml`\
    \ that extends from the full template (see [Listing 10-16](#Chapter10.html#list_10_16)).\n\
    \n***Listing 10-16.** The Tiles Configuration for the Select Categories View*\n\
    \n```\n<definition name=\"selectCategory\" extends=\"fullTemplate\">\n    <put-attribute\
    \ name=\"content\" value=\"/WEB-INF/view/createOrders/selectCategory.jsp\"/>\n\
    </definition>\n```\n\nThe view state will use our `orderForm` (as indicated with\
    \ the `model` attribute) that we initialized previously in the `<on-start>` element.\
    \ Web Flow will automatically bind every request parameter to the specified form.\
    \ As we will see in [Chapter 11](#Chapter11.html#ch11)'s “Explicit Binding” section,\
    \ this can be overridden. Remember: We are keeping this sample as simple as possible;\
    \ therefore, we left explicit binding, validation, and conversion out of the picture.\
    \ We will address those things in the following chapters.\n\nOur view will require\
    \ some kind of control component that will trigger the `next` or `cancel` transition.\
    \ The `next` transition will bring us to the next view state. We already named\
    \ it `selectBooks`. However, before making the transition, we prepare the list\
    \ of books that are available within the chosen category. We do this by calling\
    \ a method on the `OrderController`. This method will use the selected category\
    \ to load the books available for that category. The result is a map with the\
    \ same structure as the categories; it is also set to the flow scope (see [Listing\
    \ 10-17](#Chapter10.html#list_10_17)).\n\n***Listing 10-17.** The Initializer\
    \ for Our List of Selectable Books*\n\n```\npublic Map<Long, String> initializeSelectableBooks(OrderForm\
    \ orderForm) {\n    orderForm.getSelectedBooks().clear();\n    orderForm.resetSelectedBooks();\n\
    \n    Map<Long, String> selectableBooks = new HashMap<Long, String>();\n    for\
    \ (Book book : bookstoreService.findBooksByCategory(categoryService.findById(orderForm.getCategoryId())))\
    \ {\n        selectableBooks.put(book.getId(), book.getTitle());\n    }\n    return\
    \ selectableBooks;\n}\n```\n\nThe page that will be shown to the user and drive\
    \ the transition in the previously mentioned view state is located at `WEB-INF/view/createOrders/selectCategory.jsp`\
    \ and shown in [Listing 10-18](#Chapter10.html#list_10_18).\n\n***Listing 10-18.**\
    \ The Actual Page for Our Select Categories*\n\n```\n<form:form modelAttribute=\"\
    orderForm\" action=\"${flowExecutionUrl}\">\n    <table style=\"width: 100%\"\
    >\n        <tr>\n             <td width=\"30%\">\n                 <spring:message\
    \ code=\"label.page.category\"/></td>\n             <td>\n<form:select path=\"\
    categoryId\" items=\"${selectableCategories}\"/>\n             </td>\n       \
    \ </tr>\n    </table>\n\n    <div align=\"right\" style=\"margin-bottom: 20px;\
    \ margin-top: 10px\" >\n        <button type=\"submit\" id=\"return\" name=\"\
    _eventId_cancel\">\n            <spring:message code=\"button.cancel\"/>\n   \
    \     </button>\n    <button type=\"submit\" id=\"continue\" name=\"_eventId_next\"\
    >\n            <spring:message code=\"button.next\"/>\n        </button>\n   \
    \ </div>\n</form:form>\n```"
  raw: '##### Selecting the Category


    We need to begin by initializing our model and retrieving the selectable categories
    that we will have to present to the user. The model is the `com.apress.prospringmvc.bookstore.web.controller.OrderForm`.
    We will use this model throughout the flow to gather the user''s input. The categories
    are required for the first step of the flow, and these are displayed to the user
    in a dropdown list that the user can select from. These categories need to be
    retrieved from database first.


    ![Image](images/square.jpg) **Note** The flow we are building here is the `createOrders-flow.xml`,
    which is located in `WEB-INF/view/createOrders/`. This is also the location where
    we will put the pages that we are going to create, along with the flow.


    Earlier in this chapter, we covered the <`on-start>` element, which allows you
    to execute logic when the flow is initially starting. This logic will execute
    before the flow enters any other state. The action should appear before any other
    state, and it can appear only once in the flow. This will be perfect for our initialization
    (see [Listing 10-12](#Chapter10.html#list_10_12)).


    ***Listing 10-12.** The <on-start> Element of Our Create Order Flow*


    `<on-start>`

    `    <evaluate expression="orderController.initializeForm()"`![Image](images/U002.jpg)

    `        result="flowScope.orderForm" />`

    `    <evaluate expression="orderController.initializeSelectableCategories()"`![Image](images/U002.jpg)

    `        result="flowScope.selectableCategories"/>`

    `</on-start>`


    The first evaluate action will initialize our form and set some initial values
    (this code is executed on the `com.apress.prospringmvc.bookstore.web.controller.OrderController`).
    It calls the method shown in [Listing 10-13](#Chapter10.html#list_10_13). The
    initialized `OrderForm` is then set to the flow scope. `flowScope` is an implicit
    variable to access the flow scope. (Scoping is explained in the next chapter in
    the “Different Web Flow Scopes” section; similarly, you can learn about implicit
    variables in the next chapter''s “Implicit Variables” section).


    ***Listing 10-13.** The Method to Initialize Our Form, Called from the <on-start>
    element*


    `public OrderForm initializeForm() {`

    `    OrderForm orderForm = new OrderForm();`

    `    orderForm.setQuantity(1);`

    `    orderForm.setOrderDate(simpleDateFormat.format(new Date()));`

    `    return orderForm;`

    `}`


    We can specify more than one evaluate action in an on start, and these actions
    will be executed in order. If one of the evaluate actions results in an exception,
    then the processing stops and no transition takes place. The second evaluate action
    will put a map of selectable categories (`com.apress.prospringmvc.bookstore.domain.Category`)
    on the flow scope. To keep things simple, we used a map with a key type of `Long`
    (the surrogate key of each category record) and a value type of `String` (the
    name of the Category) as can be seen in [Listing 10-14](#Chapter10.html#list_10_14).
    Later on we will see how we can use Category Objects directly instead of transforming
    them to String''s first.


    ***Listing 10-14.** The Method to Initialize Categories, Called from the on-start*


    `public Map<Long, String> initializeSelectableCategories() {`

    `    Map<Long, String> selectableCategories = new HashMap<Long, String>();`

    `    for (Category category : categoryService.findAll()) {`

    `        selectableCategories.put(category.getId(), category.getName());`

    `    }`

    `    return selectableCategories;`

    `}`


    ![Image](images/square.jpg) **Note** We explicitly stored our categories separately
    from the `OrderForm`. We could have also saved this on the form itself, but we
    kept it separate, so as not to cause bloat on the form.


    Next, we are going to create our view state, as shown in [Listing 10-15](#Chapter10.html#list_10_15).


    ***Listing 10-15.** The selectCategory View State*


    `<view-state id="selectCategory" view="selectCategory" model="orderForm">`

    `    <transition on="next" to="selectBooks">`

    `    <evaluate expression="orderController.initializeSelectableBooks(flowScope.orderForm)"`![Image](images/U002.jpg)

    ` result="flowScope.selectableBooks"/>`

    `    </transition>`

    `    <transition on="cancel" to="end" />`

    `</view-state>`


    This view state will render the `selectCategory` view. This is a definition entry
    in our `tiles-configuration.xml` that extends from the full template (see [Listing
    10-16](#Chapter10.html#list_10_16)).


    ***Listing 10-16.** The Tiles Configuration for the Select Categories View*


    `<definition name="selectCategory" extends="fullTemplate">`

    `    <put-attribute name="content" value="/WEB-`![Image](images/U002.jpg)

    `      INF/view/createOrders/selectCategory.jsp"/>`

    `</definition>`


    The view state will use our `orderForm` (as indicated with the `model` attribute)
    that we initialzied previously in the `<on-start>` element. Web Flow will automatically
    bind every request parameter to the specified form. As we will see in [Chapter
    11](#Chapter11.html#ch11)''s “Explicit Binding” section, this can be overridden.
    Remember: We are keeping this sample as simple as possible; therefore, we left
    explicit binding, validation, and conversion out of the picture. We will address
    those things in the following chapters.


    Our view will require some kind of control component that will trigger the `next`
    or `cancel` transition. The `next` transition will bring us to the next view state.
    We already named it `selectBooks`. However, before making the transition, we prepare
    the list of books that are available within the chosen category. We do this by
    calling a method on the `OrderController`. This method will use the selected category
    to load the books available for that category. The result is a map with the same
    structure as the categories; it is also set to the flow scope (see [Listing 10-17](#Chapter10.html#list_10_17)).


    ***Listing 10-17.** The Initializer for Our List of Selectable Books*


    `public Map<Long, String> initializeSelectableBooks(OrderForm orderForm) {`

    `    orderForm.getSelectedBooks().clear();`

    `    orderForm.resetSelectedBooks();`


    `    Map<Long, String> selectableBooks = new HashMap<Long, String>();`

    `    for (Book book : bookstoreService.findBooksByCategory(categoryService.findById`![Image](images/U002.jpg)

    `(orderForm.getCategoryId()))) {`

    `        selectableBooks.put(book.getId(), book.getTitle());`

    `    }`

    `    return selectableBooks;`

    `}`


    The page that will be shown to the user and drive the transition in the previously
    mentioned view state is located at `WEB-INF/view/createOrders/selectCategory.jsp`
    and shown in [Listing 10-18](#Chapter10.html#list_10_18).


    ***Listing 10-18.** The Actual Page for Our Select Categories*


    `<form:form modelAttribute="orderForm" action="${flowExecutionUrl}">`

    `    <table style="width: 100%">`

    `        <tr>`

    `             <td width="30%">`

    `                 <spring:message code="label.page.category"/></td>`

    `             <td>`

    `<form:select path="categoryId"` ![Image](images/U002.jpg)

    `                     items="${selectableCategories}"/>`

    `             </td>`

    `        </tr>`

    `    </table>`


    `    <div align="right" style="margin-bottom: 20px; margin-top: 10px" >`

    `        <button type="submit" id="return" name="_eventId_cancel">`

    `            <spring:message code="button.cancel"/>`

    `        </button>`

