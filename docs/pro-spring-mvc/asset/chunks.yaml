    元素可用于执行更细粒度的访问控制或授权。虽然过滤器配置可能允许用户通过（例如，用户已成功认证），但你仍然可以检查仅当用户具有特定角色时才授予访问权限；例如，`<secured
    attribute="hasRole(ROLE_SOMEROLE)"/>`。角色将在“基于角色的访问控制”部分讨论。    #### 配置 SecurityFlowExecutionListener    `org.springframework.webflow.security.SecurityFlowExecutionListener`
