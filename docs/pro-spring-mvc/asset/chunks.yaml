  raw: '### Web Flow AJAX Support


    Web Flow has support for AJAX on both the server and client sides. The server
    side supports selective partial rendering via the `<render>` element, on which
    one or more fragments can be specified that need to be rendered.


    On the client side, there is a JavaScript library available that will automatically
    interpret the partial responses and execute the partial page refreshes.


    The JavaScript part is based on the Dojo framework and is branded Spring JS (Spring
    JavaScript). It is packaged as part of Web Flow, but as a separate artifact. This
    means you have to put a separate dependency in your build system to obtain this
    dependency because it does not come directly with the main Web Flow dependency.
    In our sample project, `build.gradle`, we explicitly defined this dependency (see
    [Listing 12-15](#Chapter12.html#list_12_15)).


    ***Listing 12-15** Defining the Extra Dependency via Gradle on Spring JS*


    `compile "org.springframework.webflow:spring-js:$springSwfVersion"`


    This dependency contains the AJAX `ViewResolver` and the AJAX Tiles view. You
    will also get JS resources as a transient dependency. This dependency contains
    the JavaScript dependencies. The convention is to put them under `META-INF/web-resources`
    (see [Figure 12-1](#Chapter12.html#fig_12_1)).


    ![Image](images/9781430241553_Fig12-01.jpg)


    ***Figure 12-1.** The directory structure of the Spring JS resources, which shows
    a central web-resources folder under which all artifacts are packaged*


    The same convention is followed in our sample application. This relaxes the number
    of places where resources can be found, and it lets us get away with a single
    resource handler definition in our Spring MVC configuration, `com.apress.prospringmvc.bookstore.web.config.WebMvcContextConfiguration`:


    `public void addResourceHandlers(ResourceHandlerRegistry registry) {`

    `  registry.addResourceHandler("/resources/**/*")`![Image](images/U002.jpg)

    `          .addResourceLocations("classpath:/META-INF/web-resources/");`

    `}`


    Before we can use that AJAX functionality, we need to set up different elements.
    This section will summarize those elements, providing an overview of what we will
    need to address for the sample application to support AJAX partial rendering:


    *   We need to enable the special AJAX `ViewResolver` with the AJAX Tiles view.
    This `ViewResolver` has special support built-in for detecting AJAX requests.

    *   We need to rework a page, so that we can rerender a part of it via an AJAX
    call. We also need to adjust the `tiles-config.xml` with the separate fragment
    that we will rerender.

    *   We need to adjust the flow with the `<render>` element and specify the fragment
    to render.

    *   Finally, we need to use the Spring JS in our page to start an AJAX request
    and let it partially refresh the part of that page that matches the fragment.


    #### Configuring Web Flow for AJAX


    Let’s begin by replacing the standard `UrlBasedViewResolver` with the AJAX decorated
    `org.springframework.js.ajax.AjaxUrlBasedViewResolver` in the `WebMvcContextConfiguration`
    class (see [Listing 12-16](#Chapter12.html#list_12_16)). The `org.springframework.web.servlet.view.tiles2.TilesView`
    is also replaced with the `org.springframework.webflow.mvc.view.FlowAjaxTilesView`.


    ***Listing 12-16** Configuring the AjaxUrlBasedViewResolver for Ajax support in
    WebMvcContextConfiguration*


    `@Bean`

    `public ViewResolver tilesViewResolver() {`

    `    UrlBasedViewResolver urlBasedViewResolver = new AjaxUrlBasedViewResolver();`

    `    urlBasedViewResolver.setOrder(1);`

    `    urlBasedViewResolver.setViewClass(FlowAjaxTilesView.class);`

    `    return urlBasedViewResolver;`

    `}`


    In the preceding example, we simply replace the existing view resolver with the
    Ajax decorated one. When a non-AJAX view is detected, the behavior is the same
    as for a normal URL-based view resolver.


    #### Preparing the View


    Now that we have configured Web Flow for AJAX, we will change our view by partially
    rerendering a part using an AJAX call (as opposed to triggering a complete page
    refresh). In this section, we’ll see what modifications we have to make to support
    this.


    We will also have to modify the Tiles configuration, but we’ll tackle that in
    a separate section to keep things separated and to make them easier to understand.


    We will start in our `selectBooks.jsp` view, where there is a form that allows
    us to add books to the order. Once the books are added, they are immediately shown
    in the table below the selected book. This will be a good candidate for partial
    rendering, as seen this in [Figure 12-2](#Chapter12.html#fig_12_2). We added three
    different books to the table: *Effective Java*, *Refactoring: Improving the Design
    of Existing Code*, and *Practical API Design: Confessions of a Java Framework
    Architect*.


    ![Image](images/9781430241553_Fig12-02.jpg)


    ***Figure 12-2.** Selecting books*


    What we will do is extract the table part from the `selectBooks.jsp` view and
    put it in a separate view named `showSelectedBooks.jsp`, which is located at `WEB-INF/view/createOrders/showSelectedBooks.jsp`
    (see [Listing 12-17](#Chapter12.html#list_12_17)).


    ***Listing 12-17** The showSelectedBooks.jsp view*


    `<%@ taglib prefix="c" uri="http://java.sun.com/jsp/jstl/core"%>`

    `<%@ taglib prefix="spring" uri="http://www.springframework.org/tags"%>`

    `<%@ taglib prefix="form" uri="http://www.springframework.org/tags/form"%>`

    `<%@ taglib prefix="fn" uri="http://java.sun.com/jsp/jstl/functions"%>`


    `<div id="selectedBooks" style="margin-top: 10px; margin-bottom: 10px;">`

    `    <table style="width: 100%;" rules="groups">`

    `        <thead>`

    `            <tr>`

    `                <th width="80%" align="left">`

    `                    <spring:message code="label.page.books.book.name"/>`

    `                </th>`

    `                <th width="20%" align="left">`

    `                    <spring:message code="label.page.books.book.quantity"/>`

    `                </th>`

    `            </tr>`

    `        </thead>`

    `        <tbody>`

    `            <tr height="10px" />`

    `                <c:forEach items="${orderForm.books}" var="book">`

    `                    <tr>`

    `                        <td>${book.key.title}</td>`

    `                        <td>${book.value}</td>`

    `                    </tr>`

    `                </c:forEach>`

    `            <tr height="20px" />`

    `        </tbody>`

    `    </table>`

    `</div>`


    ![Image](images/square.jpg) **Note**  We should point out that we explicitly named
    the top-level `<div>` element with an `id` attribute. In our case, we named it
    `selectedBooks`. In the following sections, we will see that it is used to identify
    the part of the page that should be replaced by the incoming AJAX response. The
    AJAX response will contain the rendered partial `showSelectedBooks.jsp`, as shown
    in [Listing 12-17](#Chapter12.html#list_12_17). By inspecting the first element,
    Spring JS knows which piece of HTML to replace on the actual page. In this case,
    it will look up the `<div>` with `id` `selectedBooks` and replace it with the
    version that came in via the AJAX response.


    Next, in the `selectBooks.jsp` view, we are going to add a Tiles placeholder to
    insert the content from `showSelectBooks.jsp` (see [Listing 12-18](#Chapter12.html#list_12_18)).
    To this point, we are still just playing with Tiles, and we have not done anything
    special that is Web Flow AJAX related. Thus far, this example could be a normal
    refactoring where we want to extract a part into a separate view (e.g., for readability,
    easier maintenance, or reuse).


    ***Listing 12-18** The Tiles attribute in createOrders/selectBooks.jsp*


    `<h3>`

    `    <spring:message code="label.page.books.selected.books"/>`

    `</h3>`

    `<tiles:insertAttribute name="selectedBooks"/>`'
