    ### 本章小结


    本章涵盖了编写控制器和处理表单所需的所有内容。我们首先探讨了 `RequestMapping` 注解，以及如何使用它将请求映射到处理请求的方法。我们还探讨了灵活的方法签名，并介绍了开箱即用支持的方法参数类型和返回值。


    接着，我们深入实践，开始编写控制器并修改现有代码。我们还引入了表单对象，并介绍了如何将属性绑定到字段。此外，我们解释了数据绑定，探讨了 Spring 的类型转换系统，以及如何使用它进行对象间的转换。我们还编写了自己的
    `Converter` 实现，用于将文本转换为 `Category` 对象。


    除了类型转换，我们还探讨了验证。有两种验证方式：我们可以创建自己的 `Validator` 接口实现，或者在我们想要验证的对象上使用 JSR-303 注解。启用验证可以通过
    `Valid` 或 `Validated` 注解来完成。


    为了更轻松地将特定字段绑定到表单对象的属性，Spring 提供了表单标签库，帮助我们编写 HTML 表单。该库还帮助我们向用户显示绑定和验证错误。


    最后，我们介绍了如何在网页上实现国际化，以及如何将验证和错误代码转换为适当的消息以显示给最终用户。


    在下一章中，我们将探讨 Spring MVC 的一些更高级的特性。在此过程中，我们将了解如何进一步扩展和自定义现有基础设施。


    ## 第 6 章


    ## 实现控制器——高级篇


    在本章中，我们将探讨 Spring MVC 的一些更高级的部分，然后了解如何深入框架本身进行扩展，以满足我们的需求。


    我们将首先研究作用域 Bean，以及如何利用它们为我们带来优势。接下来，我们将探讨如何为应用程序添加通用功能（即所谓的横切关注点）。为此，我们将研究拦截器，包括如何创建它们以及如何将它们接入我们的应用程序。


    无论我们的应用程序多么健壮或设计得多么周全，总会有应用程序行为不符合预期的时候（例如，有人可能绊到连接数据库服务器的线缆），这会导致应用程序中出现异常。通常，我们希望防止用户看到那些往往令人费解的堆栈跟踪信息；为此，我们将探讨
    Spring MVC 中的异常处理机制。


    在涵盖所有这些主题之后，我们将深入 Spring @MVC 的内部机制，探讨一些我们可以扩展的 API；然后，我们将使用这些扩展的 API 来增强框架的功能。


    ### 使用作用域 Bean


    在第 2 章中，我们介绍了 Spring 框架支持的 Bean 的不同作用域。表 6-1 再次列出了它们。在本节中，我们将利用作用域来为我们服务。具体来说，我们将通过一个实际示例来演示如何利用作用域
    Bean 创建一个在线购物车（`com.apress.prospringmvc.bookstore.domain.Cart`）。


    ![Image](img/tab_6_1.jpg)


    ![Image](img/tab_6_1a.jpg)


    我们已经使用过 `singleton` 作用域——这是 Spring 框架中 Bean 创建的默认作用域。`org.springframework.context.annotation.Scope`
    注解用于指定 Bean 的作用域；其属性列在表 6-2 中。


    该注解可以用作类型级别或方法级别的注解。当您将 Scope 用作类型级别注解时，该类型的所有 Bean 都将具有该注解指定的作用域。当您将其用作方法级别注解时，由该注解方法创建的
    Bean 将具有该注解指定的作用域。您必须将其放在带有 `org.springframework.context.annotation.Bean` 注解的方法上。


    ![Image](img/tab_6_2.jpg)

