  raw: '###### Implementing Our Own Validator


    We’ll begin by implementing our own validator. In this case, we will create a
    `com.apress.prospringmvc.bookstore.validation.AccountValidator` (see [Listing
    5-45](#Chapter05.html#list_5_45)) and use an init-binder method to configure it.


    ***Listing 5-45.** The AccountValidator Implementation*


    `package com.apress.prospringmvc.bookstore.validation;`


    `import java.util.regex.Pattern;`


    `import org.springframework.validation.Errors;`

    `import org.springframework.validation.ValidationUtils;`

    `import org.springframework.validation.Validator;`


    `import com.apress.prospringmvc.bookstore.domain.Account;`


    `public class AccountValidator implements Validator {`


    `    private static final String EMAIL_PATTERN =`

    `    "^[_A-Za-z0-9-]+(\\.[_A-Za-z0-9-]+)*@"`

    `    +"[A-Za-z0-9]+(\\.[A-Za-z0-9]+)*(\\.[A-Za-z]{2,})$";`


    `    @Override`

    `    public boolean supports(Class<?> clazz) {`

    `        return (Account.class).isAssignableFrom(clazz);`

    `    }`


    `    @Override`

    `    public void validate(Object target, Errors errors) {`

    `        ValidationUtils.rejectIfEmpty(errors, "username",`

    `                                  "required", new Object[] {"Username"});`

    `        ValidationUtils.rejectIfEmpty(errors, "password",`

    `                                  "required", new Object[] {"Password"});`

    `        ValidationUtils.rejectIfEmpty(errors, "emailAddress",`

    `                                  "required", new Object[] {"Email Address"});`

    `        ValidationUtils.rejectIfEmpty(errors, "address.street",`

    `                                  "required", new Object[] {"Street"});`

    `        ValidationUtils.rejectIfEmpty(errors, "address.city",`

    `                                  "required", new Object[] {"City"});`

    `        ValidationUtils.rejectIfEmpty(errors, "address.country",`

    `                                  "required", new Object[] {"Country"});`


    `        if (!errors.hasFieldErrors("emailAddress")) {`

    `            Account account = (Account) target;`

    `            String email = account.getEmailAddress();`

    `            if (!emai.matches(EMAIL_PATTERN)) {`

    `                errors.rejectValue("emailAddress", "invalid");`

    `            }`

    `        }`

    `    }`

    `}`


    ![Image](images/square.jpg) **Note** Specifying `requiredFields` on the `org.springframework.web.bind.WebDataBinder`
    would result in the same validation logic as with the `ValidationUtils.rejectIfEmptyOrWhiteSpace`.
    In our case, however, we have all the validation logic in one place, rather than
    having it spread over two places.


    This validator implementation will check if the fields are not `null` and non-empty.
    If the field is empty, it will register an error for the given field. The error
    is a collection of message codes, and this collection of message codes is determined
    by an `org.springframework.validation.MessageCodesResolver` implementation. The
    default implementation, `org.springframework.validation.DefaultMessageCodesResolver`,
    will resolve to four different codes (see [Table 5-21](#Chapter05.html#tab_5_21)).
    The order in the table is also the order in which the error codes are resolved
    to a proper message.


    ![Image](images/tab_5_21.jpg)


