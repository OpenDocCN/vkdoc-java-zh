    #### Excel


    Spring 有两种渲染 Excel 文档的方式。第一种是使用 JExcel 库^(6)，另一种是使用 Apache POI 库^(7)。这两种方法都需要我们实现一个视图（就像处理
    PDF 一样）；为此，我们需要继承 `org.springframework.web.servlet.view.document.AbstractJExcelView`
    或 `org.springframework.web.servlet.view.document.AbstractExcelView`。这两个类分别对应 JExcel
    和 Apache POI。这两种实现都隐藏了设置过程，并允许加载和处理模板 xls 文件；我们需要添加视图特定的渲染逻辑。为此，我们需要实现 `buildExcelDocument`
    方法。代码清单 8-23 展示了一个将订单导出为 Excel 文档的 JExcel 示例。


