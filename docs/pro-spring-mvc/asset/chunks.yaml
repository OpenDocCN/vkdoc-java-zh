- fmt: "#### `HandlerExceptionResolver`\n\nIn most cases, you want to control how\
    \ you handle an exception that occurs during the handling of a request. You can\
    \ use a `HandlerExceptionResolver` for this. The API (see [Listing 4-18](#Chapter04.html#list_4_18))\
    \ consists of a single method that is called on the `org.springframework.web.servlet.HandlerExceptionResolver`s\
    \ detected by the dispatcher servlet. The resolver can choose to handle the exception\
    \ itself or to return an `org.springframework.web.servlet.ModelAndView` that contains\
    \ a view to render and a model (generally containing the exception thrown).\n\n\
    **Listing 4-18.** The `HandlerExceptionResolver` API\n\n```\npackage org.springframework.web.servlet;\n\
    \nimport javax.servlet.http.HttpServletRequest;\nimport javax.servlet.http.HttpServletResponse;\n\
    \npublic interface HandlerExceptionResolver {\n\n    ModelAndView resolveException(HttpServletRequest\
    \ request,\n                                  HttpServletResponse response,\n\
    \                                  Object handler,\n                         \
    \         Exception ex);\n\n}\n```\n\n[Figure 4-16](#Chapter04.html#fig_4_16)\
    \ shows the different implementations provided by the Spring Framework. Each works\
    \ in a slightly different way, just as each is configured differently (see [Chapter\
    \ 6](#Chapter06.html#ch6) for more information).\n\n![Image](images/9781430241553_Fig04-16.jpg)\n\
    \n**Figure 4-16.** The `HandlerExceptionResolver` implementations\n\nThe `org.springframework.web.servlet.handler.HandlerExceptionResolverComposite`\
    \ is an implementation used internally by Spring MVC. It is used to chain several\
    \ `org.springframework.web.servlet.HandlerExceptionResolver` implementations together.\
    \ This resolver does not provide an actual implementation or added functionality;\
    \ instead, it merely acts as a wrapper around multiple implementations (when multiple\
    \ implementations are configured).\n\n#### `RequestToViewNameTranslator`\n\nWhen\
    \ a handler returns no view implementation or view name and did not send a response\
    \ itself to the client, then the `org.springframework.web.servlet.RequestToViewNameTranslator`\
    \ tries to determine a view name from the incoming request. The default implementation\
    \ (see [Figure 4-17](#Chapter04.html#fig_4_17)), `org.springframework.web.servlet.view.DefaultRequestToViewNameTranslator`,\
    \ simply takes the URL, strips the suffix and context path, and then uses the\
    \ remainder as the view name (i.e., `http://localhost:8080/bookstore/admin/index.html`\
    \ becomes `admin/index`). You can find more information about views in [Chapter\
    \ 8](#Chapter08.html#ch8).\n\n![Image](images/9781430241553_Fig04-17.jpg)\n\n\
    **Figure 4-17.** The `RequestToViewNameTranslator` hierarchy\n\nThe `RequestToViewNameTranslator`\
    \ API is shown in [Listing 4-19](#Chapter04.html#list_4_19).\n\n**Listing 4-19.**\
    \ The `RequestToViewNameTranslator` API\n\n```\npackage org.springframework.web.servlet;\n\
    \nimport javax.servlet.http.HttpServletRequest;\n\npublic interface RequestToViewNameTranslator\
    \ {\n\n    String getViewName(HttpServletRequest request) throws Exception;\n\n\
    }\n```\n\n#### `ViewResolver`\n\nSpring MVC provides a very flexible view resolving\
    \ mechanism. It simply takes the view name returned from the handler and tries\
    \ to resolve it to an actual view implementation (if no concrete `org.springframework.web.servlet.View`\
    \ is returned). The actual implementation could be a JSP, but it could just as\
    \ easily be an Excel spreadsheet or PDF file. For more information on view resolving,\
    \ refer to [Chapter 8](#Chapter08.html#ch8).\n\nThis API (see [Listing 4-20](#Chapter04.html#list_4_20))\
    \ is pretty simple and consists of a single method. This method takes the view\
    \ name and currently selected locale (see also the `LocaleResolver`). This can\
    \ be used to resolve to an actual `View` implementation. When there are multiple\
    \ `org.springframework.web.servlet.ViewResolver`s configured, the dispatcher servlet\
    \ calls them in turn until one of them returns a `View` to render.\n\n**Listing\
    \ 4-20.** The `ViewResolver` API\n\n```\npackage org.springframework.web.servlet;\n\
    \nimport java.util.Locale;\n\npublic interface ViewResolver {\n\n    View resolveViewName(String\
    \ viewName, Locale locale) throws Exception;\n\n}\n```\n\nThe `ViewResolver` implementations\
    \ are shown in [Figure 4-18](#Chapter04.html#fig_4_18). Out of the box, Spring\
    \ provides several implementations (see [Chapter 8](#Chapter08.html#ch8) for more\
    \ information).\n\n![Image](images/9781430241553_Fig04-18.jpg)\n\n**Figure 4-18.**\
    \ The `ViewResolver` implementations\n\n#### `FlashMapManager`\n\nThe `org.springframework.web.servlet.FlashMapManager`\
    \ is used to enable a flash “scope” in Spring MVC applications. You can use this\
    \ mechanism to put attributes in a flash map that are then retrieved after a redirect\
    \ (the flash map survives a request/response cycle). The flash map is cleared\
    \ after the view is rendered. Spring provides a single implementation, `org.springframework.web.servlet.support.SessionFlashMapManager`\
    \ (see [Figure 4-19](#Chapter04.html#fig_4_19)).\n\n![Image](images/9781430241553_Fig04-19.jpg)\n\
    \n**Figure 4-19.** The `FlashMapManager` hierarchy\n\n[Listing 4-21](#Chapter04.html#list_4_21)\
    \ shows the API of the `FlashMapManager`.\n\n![Image](images/square.jpg) **Note**\
    \ The flash “scope” mentioned here has no relation to the “flashscope” used in\
    \ Spring Web Flow.\n\n**Listing 4-21.** The `FlashMapManager` API\n\n```\npackage\
    \ org.springframework.web.servlet;\n\nimport javax.servlet.http.HttpServletRequest;\n\
    import javax.servlet.http.HttpServletResponse;\n\npublic interface FlashMapManager\
    \ {\n\n    FlashMap retrieveAndUpdate(HttpServletRequest request,\n          \
    \                     HttpServletResponse response);\n\n    void saveOutputFlashMap(FlashMap\
    \ flashMap,\n                            HttpServletRequest request,\n       \
    \                     HttpServletResponse response);\n}\n```\n\n### Summary\n\n\
    This chapter started by looking at the request processing workflow, identifying\
    \ which components play a role in this. The `DispatcherServlet` can be considered\
    \ the main component in Spring MVC, and it plays the most crucial role, that of\
    \ the front controller. The MVC pattern in Spring MVC is quite explicit; you have\
    \ a `Model`, a `View`, and also a `Controller` (handler). The controller processes\
    \ the request, fills the model, and selects the view to render.\n\nWhile processing\
    \ a request, the `DispatcherServlet` uses a lot of different components to play\
    \ its role. The most important components are the `HandlerMapping` and `HandlerAdapter`;\
    \ these components are the core components used to map and handle requests, respectively.\
    \ To apply crosscutting concerns, you can use a `HandlerInterceptor`. After handling\
    \ a request, a view needs to be rendered. A handler can return a `View` or the\
    \ name of a view to render. In the latter situation, this name is passed to a\
    \ `ViewResolver` to resolve to an actual view implementation.\n\nThere is also\
