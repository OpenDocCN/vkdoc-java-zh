    ##### SimpleUrlHandlerMapping


    此实现需要显式配置，与 `org.springframework.web.servlet.handler.BeanNameUrlHandlerMapping`
    不同，它不会自动检测映射。清单 4-9 展示了一个示例配置。同样，你将控制器映射到 `/index.htm`。


    ***清单 4-9.** SimpleUrlHandlerMapping 示例配置*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// 其他导入已省略，参见清单 4-8`


    `import org.springframework.web.servlet.HandlerMapping;`

    `import org.springframework.web.servlet.handler.SimpleUrlHandlerMapping;`


    `@Configuration`

    `public class WebMvcContextConfiguration {`


    `    @Bean`

    `    public IndexController indexController() {`

    `        return new IndexController();`

    `    }`


    `    @Bean`

    `    public HandlerMapping simpleUrlHandlerMapping() {`

    `        SimpleUrlHandlerMapping urlMapping = new SimpleUrlHandlerMapping();`

    `        Properties mappings = new Properties();`

    **`        mappings.put("/index.htm", "indexController");`**

    `        urlMapping.setMappings(mappings);`

    `        return urlMapping;`

    `    }`

    `}`


    你需要显式配置 `SimpleUrlHandlerMapping` 并向其传递映射（参见粗体代码）。你将 `/index.htm` URL 映射到名为 `indexController`
    的控制器。如果你有很多控制器，此配置会显著增长。这种方法的优点在于，你可以将所有映射集中在一个位置。


    ##### ControllerBeanNameHandlerMapping


    此实现的工作方式与 `org.springframework.web.servlet.handler .BeanNameUrlHandlerMapping`
    类似，但有一个重大区别：它不要求 bean 名称以 / 开头。此映射会检测应用程序上下文中的所有控制器，获取它们的名称，并在前面加上 /。它还可以选择性地为生成的
    URL 映射添加后缀。清单 4-10 展示了如何使用此处理器映射将控制器映射到 `/index.htm`。


    ***清单 4-10.** ControllerBeanNameHandlerMapping 示例配置*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// 其他导入已省略，参见清单 4-8`


    `import org.springframework.web.servlet.HandlerMapping;`

    `import org.springframework.web.servlet.mvc.support.ControllerBeanNameHandlerMapping;`


    `@Configuration`

    `public class WebMvcContextConfiguration {`


    **`  @Bean(name = "index")`**

    `  public IndexController indexController() {`

    `      return new IndexController();`

    `  }`


    `  @Bean`

    `  public HandlerMapping controllerBeanNameHandlerMapping() {`

    `      ControllerBeanNameHandlerMapping mapping;`

    `      mapping = new ControllerBeanNameHandlerMapping();`

    **`      mapping.setUrlSuffix(".htm");`**

    `      return mapping;`

    `  }`

    `}`


    ##### ControllerClassNameHandlerMapping


    此实现会检测应用程序上下文中的所有控制器，并使用类的简单名称来创建 URL 映射。对于 `com.apress.prospringmvc.bookstore.web.IndexController`，它将创建
    URL `/index`。它会获取类的简单名称，去掉 Controller 部分，并将剩余部分转换为小写（除非另有配置）。清单 4-11 展示了此实现的一个示例配置，它将把控制器映射到
    `/index` URL。此映射实现不支持后缀（例如 `.htm`）。


    ***清单 4-11.** ControllerClassNameHandlerMapping 示例配置*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// 其他导入已省略，参见清单 4-8`


    `import org.springframework.web.servlet.HandlerMapping;`

    `import org.springframework.web.servlet.mvc.support.ControllerClassNameHandlerMapping;`


    `@Configuration`

    `public class WebMvcContextConfiguration {`


    `    @Bean`

    `    public IndexController indexController() {`

    `        return new IndexController();`

    `    }`


    `    @Bean`

    `    public HandlerMapping controllerClassNameHandlerMapping() {`

    `        return new ControllerClassNameHandlerMapping();`

    `    }`

    `}`


    如果你的控制器遵循某些命名约定，并且它们直接映射到 URL，那么此映射实现会非常方便。这种方法可以节省大量配置。


    ##### DefaultAnnotationHandlerMapping 和 RequestMappingHandlerMapping


    DefaultAnnotationHandlerMapping 和 RequestMappingHandlerMapping 实现是更复杂的实现。两者都非常强大，并且都使用注解来检测映射。此外，两者都会检测应用程序上下文中请求处理
    bean 上的 `org.springframework.web.bind.annotation.RequestMapping` 注解。此注解可以放在类级别和/或方法级别。要将
    `com.apress.prospringmvc.bookstore.web.IndexController` 映射到 `/index.htm`，你需要添加该注解。清单
    4-12 是控制器，清单 4-13 展示了示例配置。


    ***清单 4-12.** 带有 RequestMapping 的 IndexController*


    `package com.apress.prospringmvc.bookstore.web;`


    `import org.springframework.stereotype.Controller;`

    `import org.springframework.web.bind.annotation.RequestMapping;`

    `import org.springframework.web.servlet.ModelAndView;`


    `@Controller`

    `public class IndexController {`


    `    @RequestMapping(value = "/index.htm")`

    `    public ModelAndView indexPage() {`

    `        return new ModelAndView("/WEB-INF/views/index.jsp");`

    `    }`

    `}`


    ***清单 4-13.** 基于注解的示例配置*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// 其他导入已省略，参见清单 4-8`


    `@Configuration`

    `public class WebMvcContextConfiguration {`


    `    @Bean`

    `    public IndexController indexController() {`

    `        return new IndexController();`

    `    }`

    `}`


    `DefaultAnnotationHandlerMapping` 是 dispatcher servlet 注册的默认映射之一。如果你想使用 `RequestMappingHandlerMapping`，则需要显式配置它，或者使用
    `org.springframework.web.servlet.config.annotation.EnableWebMvc` 注解。`RequestMappingHandlerMapping`
    实现比默认注册的映射更强大、更灵活，并且允许更灵活的配置和映射方法。这种方法的可扩展性和灵活性将在第 6 章中介绍。

