    Looking at the templates, we can see that they are similar to the JSPs we wrote
    in the previous chapters. The Velocity ([Listing 8-19](#Chapter08.html#list_8_19))
    and FreeMarker ([Listing 8-20](#Chapter08.html#list_8_20)) templates also have
    tag libraries available (in the listings bound to Spring). Both libraries offer
    more or less the same support as the Spring Form Tag library for JSP. [Table 8-10](#Chapter08.html#tab_8_10)
    provides an overview of the different tags, or better macro libraries, for both
    Velocity and FreeMarker.


    ![Image](images/9781430241553_tab08-10.jpg)


