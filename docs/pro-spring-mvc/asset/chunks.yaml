- fmt: "#### Reworking the Orders Overview\n\nThe preceding section illustrated that\
    \ we can use Web Flow to manage our transaction, and that it can create a committing\
    \ transaction at the end of a flow that pushes out all changes to the database\
    \ when the flow ends.\n\nFinally, we want to illustrate that the persistence context\
    \ is also available in our view for entities that are stored in a scope. Normally\
    \ this would not be possible because the persistence context would no longer be\
    \ available after a request ended.\n\nThe `Orders Overview` page shows the orders\
    \ a customer made. We will add an additional popup window that shows the details\
    \ of the order. In the domain model, we have an `Order` that has a list of zero\
    \ or more `OrderDetails`. At the moment, the orders overview is backed by a Spring\
    \ MVC controller, and it is not governed by a flow. In [Listing 12-35](#Chapter12.html#list_12_35),\
    \ we will begin building a flow for the orders overview. You can find this code\
    \ at `WEB-INF/view/ordersOverview/ordersOverview-flow.xml`.\n\n![Image](images/square.jpg)\
    \ **Note** In [Listing 12-35](#Chapter12.html#list_12_35), we are building a flow\
    \ for something that is not really a “flow”; rather, it is just an overview page\
    \ with a detail. We created a flow purely in terms of the sample application,\
    \ so we could demonstrate the flow-managed persistence context. In a real-world\
    \ app, this would probably not benefit from being modeled as a flow.\n\n***Listing\
    \ 12-35** The newly created ordersOverview-flow*\n\n```\n<persistence-context/>\n\
    <view-state id=\"ordersOverview\" view=\"ordersOverview\">\n    <on-render>\n\
    \        <evaluate expression=\"orderController.retrieveOrders(\nexternalContext.sessionMap.authenticatedAccount)\"\
    \n                  result=\"viewScope.orders\" />\n    </on-render>\n    <transition\
    \ on=\"showOrderDetail\" to=\"orderDetail\">\n        <set name=\"flashScope.order\"\
    \n             value=\"orders[requestParameters.index]\">\n        </set>\n  \
    \  </transition>\n</view-state>\n\n<view-state id=\"orderDetail\" view=\"orderDetail\"\
    \ popup=\"true\">\n    <on-render>\n        <render fragments=\"content\"></render>\n\
    \    </on-render>\n</view-state>\n```\n\nThe following aspects of the preceding\
    \ listing are noteworthy:\n\n*   We have added the `<persistence-context/>`, which\
    \ will enable the flow-managed persistence context for this flow (we did the same\
    \ thing for our `createOrders-flow`).\n*   We also set the selected `Order` on\
    \ `flash` scope using a `<set>` action. The index of the selected order is retrieved\
    \ from the request parameters: `orders[requestParameters.index]`.\n*   The first\
    \ `view` state renders the `ordersOverview` view, which renders the `ordersOverview.jsp`.\n\
    *   The second `view` state renders the `orderDetail` view, but will only partially\
    \ render it. Because the popup attribute is set to `true`, this will, in conjunction\
    \ with Spring’s client-side JavaScript, render the content in a popup window.\n\
