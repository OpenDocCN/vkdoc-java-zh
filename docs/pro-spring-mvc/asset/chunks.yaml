  trans: '

    ##### 在测试内部管理事务


    由于我们将编写一个集成测试，该测试会（通过我们正在测试的仓库）访问内存数据库，因此我们需要在测试用例内部管理事务。在生产代码中，事务由服务层管理，而非仓库本身。仓库参与由服务启动的事务。因此，在这种情况下，我们需要测试用例来启动事务，因为我们将直接测试仓库。我们将通过在测试类上添加
    `@Transactional` 注解来实现这一点，使每个测试方法首先启动一个事务。


    当找到此类注解时，自动注册的 `TransactionalTestExecutionListener` 将确保在测试方法结束时默认执行事务*回滚*。正如本章前面提到的，`TransactionalTestExecutionListener`
    是 Spring 测试支持注册的默认监听器之一。为了让您快速了解：这些监听器（以及所有其他可能注册的 `TestExecutionListener`）会在测试方法执行之前（和之后）被调用。这个特定的监听器会在测试方法结束后自动将事务标记为回滚。请记住，这是
    Spring 测试支持特有的功能。当您以正常方式启动应用程序上下文时，这些监听器并不存在。因此，在正常的生产场景中，如果没有发生异常，事务将会提交。


    回滚实际上正是您想要的行为。这意味着 CUD 操作（创建、更新和删除）不会修改我们数据库中的数据。允许它们修改数据是最不可取的方法，因为这可能会在测试之间创建数据依赖关系。当测试被修改，或者由于某种原因测试的运行顺序被改变时，某些测试可能会突然开始失败，因为它们依赖于另一个尚未运行的测试所添加的数据。这里的最佳模式是在方法级别插入您需要的数据，然后让事务回滚。这样数据就不会持久化到数据库中，也不会留下任何痕迹。


    ![图片](img/square.jpg) **注意** 在测试仓库时，您可能需要一些默认的数据设置，这些数据可用于每个测试方法。与其为每个测试方法重复相同的数据设置，不如安全地在
    `@Before` 注解的方法中创建这些数据。该方法会在每个测试方法之前自动运行。它也会在与测试方法本身相同的事务中运行，因此插入、修改或删除的数据将像正在执行的测试方法一样被回滚。


    这种在每个测试方法结束时自动回滚事务的方法也有一个缺点。当使用 ORM（对象关系映射）时，回滚对于读取操作非常有效，因为所有查询都已发送到数据库，为您提供了完整的覆盖率。但是，当使用像
    Hibernate 这样的 ORM（直接使用或通过 JPA 使用）时，CUD 操作可能不会被刷新。Hibernate 使用写后缓存。它会在认为时机成熟时，或者至少在事务提交时，将语句刷新到数据库。因此，当您调用了触发更新或插入语句的方法时，该语句在回滚事务时可能永远不会被刷新到数据库。在这种情况下，您永远无法确定该查询是否真的在数据库上执行了。您有两个选项来处理这个问题：


    > *   无论如何都让事务提交。您可以通过在测试方法上添加 `@Rollback(false)` 来实现。然后，您可以创建一个拆卸方法（`@After`），用于删除您插入的数据。

    > *   在测试方法结束之前，调用 `EntityManager`（在 JPA 的情况下）上的 `flush` 方法，让它将所有未处理的语句刷新到数据库。请记住，事务将会回滚，因此更改不会持久化。但它们已被数据库接收并验证，因此您可以确保它们能够正常工作。


    选择这两种方法中的哪一种取决于个人偏好；两者都会产生相同的结果。第一种方法要求您在拆卸方法中编写一些额外的代码。第二种方法更自动化，但需要对您使用的 ORM
    有更深入的了解。对于第二种解决方案，您也可以将 `flush` 放在 `@After` 方法中，也许是从父类继承而来的。


    正如我们之前提到的，集成测试并不能提供 100% 的保证。首先，我们使用的是与您的实际目标环境不同的 RDBMS。当回滚事务而不是提交它们时，您增加了实际提交时可能出现问题的可能性。然而，当应用前面讨论的任何策略时，这种情况发生的可能性非常小。如果您刷新了，所有语句都已被数据库处理，因此通常没有理由提交会失败。尽管在非常特定的场景中可能仍然会出现问题，但这种情况发生的几率非常小。最大的优点是您的测试保持独立，并且当您添加另一个本身完全正常工作的测试时，您永远不必弄清楚为什么突然有
    10 个测试开始失败。您的测试集也将是资源无关的，并且可以在任何地方运行。很明显，这些都是主要的优势。


    ![图片](img/square.jpg) **注意** 如您所知，大型代码库在设计、API、一致性等方面难以管理。不要忘记，您的测试代码量甚至可能超过您的实际生产代码。善待它们，它们也会善待您。

    '
- fmt: "#### Testing the `JpaBookRepository`\n\nWe now have all the bits and pieces\
    \ to start building our test. For the transaction strategy, we will choose the\
    \ second option. That is, we depend on the infrastructure to start and roll back\
    \ the transaction and we will manually call `flush` on test method that perform\
    \ CUD operations.\n\nNext, we continue to define a test method for each of the\
    \ methods exposed by the `BookRepository` interface and test them. For the sample\
    \ code we will restrict the test to two `read` methods and one `create` method\
    \ of the `BookRepository`. The other methods are tested in the same fashion and\
    \ would not show anything new. We will also create a setup method (annotated with\
    \ `@Before`) which will load the common data used by each of the test methods.\
    \ Let’s first look at the test code in [Listing 9-7](#Chapter09.html#list_9_7).\n\
    \n**Listing 9-7.** The complete test class in `src/test/java`\n\n```\npackage\
    \ com.apress.prospringmvc.bookstore.repository;\n\nimport static junit.framework.Assert.assertEquals;\n\
    \nimport javax.persistence.EntityManager;\nimport javax.persistence.PersistenceContext;\n\
    \nimport org.junit.After;\nimport org.junit.Before;\nimport org.junit.Test;\n\
    import org.junit.runner.RunWith;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.test.annotation.Rollback;\nimport org.springframework.test.context.ContextConfiguration;\n\
    import org.springframework.test.context.junit4.SpringJUnit4ClassRunner;\nimport\
    \ org.springframework.transaction.annotation.Transactional;\n\nimport com.apress.prospringmvc.bookstore.config.\n\
    \       InfrastructureContextConfiguration;\nimport com.apress.prospringmvc.bookstore.config.TestDataContextConfiguration;\n\
    import com.apress.prospringmvc.bookstore.domain.Book;\nimport com.apress.prospringmvc.bookstore.domain.Category;\n\
    import com.apress.prospringmvc.bookstore.domain.support.BookBuilder;\nimport com.apress.prospringmvc.bookstore.domain.support.CategoryBuilder;\n\
    import com.apress.prospringmvc.bookstore.domain.support.EntityBuilder.\n     \
    \  EntityBuilderManager;\n\n@RunWith(SpringJUnit4ClassRunner.class)\n@ContextConfiguration(classes\
    \ = { InfrastructureContextConfiguration.class, TestDataContextConfiguration.class\
    \ })\n@Transactional\npublic class JpaBookRepositoryTest {\n\n    @Autowired\n\
    \    private BookRepository bookRepository;\n    @Autowired\n    private BookBuilder\
    \ bookBuilder;\n    @Autowired\n    private CategoryBuilder categoryBuilder;\n\
    \    @PersistenceContext\n    private EntityManager entityManager;\n\n    private\
    \ Book book;\n    private Category category;\n\n    @Before\n    public void setupData()\
    \ {\n        category = categoryBuilder.name(\"Evolution\").build();\n       \
    \ book = bookBuilder.description(\"Richard Dawkins' brilliant\n              \
    \ reformulation of the theory of natural selection\")\n               .author(\"\
    Richard Dawkins\").title(\"The Selfish Gene:\n                         30th Anniversary\
    \ Edition\")\n               .isbn(\"9780199291151\")\n               .category(category).build();\n\
    \    }\n\n    @Test\n    public void testFindById() {\n        Book book = bookRepository.findById(this.book.getId());\n\
    \        assertEquals(this.book.getAuthor(), book.getAuthor());\n        assertEquals(this.book.getDescription(),\
    \ book.getDescription());\n        assertEquals(this.book.getIsbn(), book.getIsbn());\n\
    \    }\n\n    @Test\n    public void testFindByCategory() {\n        List<Book>\
    \ books = bookRepository.findByCategory(category);\n        assertEquals(1, books.size());\n\
    \n        for (Book book : books) {\n            assertEquals(this.book.getCategory().getId(),\
    \ category.getId());\n            assertEquals(this.book.getAuthor(), book.getAuthor());\n\
    \            assertEquals(this.book.getDescription(), book.getDescription());\n\
    \            assertEquals(this.book.getIsbn(), book.getIsbn());\n        }\n \
    \   }\n\n    @Test\n    public void testStoreBook() {\n        Book book = bookBuilder.description(\"\
    Something\").author(\"JohnDoe\").title(\"John Doe's\nlife\")\n               \
    \ .isbn(\"1234567890123\").category(category).build();\n        bookRepository.storeBook(book);\n\
    \n        // Explicitly flush so any CUD query that is left behind is sent to\
    \ the database\n        // before rollback\n        entityManager.flush();\n \
    \   }\n}\n```\n\nIn this code we make our test transactional by default. For the\
    \ `read` methods we insert additional data using the already discussed JUnit `@Before`\
    \ method. We use the Builder pattern to build our data and it is by default inserted\
    \ using an `EntityManager` instance injected in the builders. This data is also\
    \ removed when the test method ends because of the transaction rollback.\n\n**Note**\
    \ We said before that one should perform a flush in a test method testing functionality\
    \ that performs CUD, to make sure all statements are flushed to database. While\
    \ testing a read-only method, we first inserted data in the database using JPA.\
    \ What about flushing these insert statements? Well, actually, we don’t care.\
    \ The ORM will flush them as it sees fit to make sure our read operations work\
    \ on the latest data. It might hold back the insertion of the category and book,\
    \ but from the moment it sees our query to select a book by ID, it will first\
    \ flush the book and category to database. The point is that we are not testing\
    \ any of our CUD operations. How the ORM manages the write-behind internally to\
    \ make sure our read operations see the latest data is not our concern.\n\nIn\
    \ our method that tests the creation of new book records, we explicitly flushed\
    \ before the test method ends. This way we are sure that the `insert` statement\
    \ (generated by the query in the `storeBook` method of our repository) was send\
    \ to database (which is probably the only statement). After that, the test method\
    \ ends and the transaction is rolled back.\n\n### Using Mock Objects\n\nIn this\
    \ section we will introduce you to using mock objects. When creating a unit test,\
    \ you want to make sure your test is as isolated as possible and does not depend\
    \ on resources. In your integration tests, on the other hand, you try to use as\
    \ many resources as you can, as long as you remain in control and they don’t make\
    \ your test dependent on a specific resource or environment. For those cases where\
    \ you are not able to accomplish this, mock objects will help you. Let’s start\
    \ at looking what mock objects really are."
  raw: '#### Testing the JpaBookRepository


    We now have all the bits and pieces to start building our test. For the transaction
    strategy, we will choose the second option. That is, we depend on the infrastructure
    to start and roll back the transaction and we will manually call flush on test
    method that perform CUD operations.


    Next, we continue to define a test method for each of the methods exposed by the
    `BookRepository` interface and test them. For the sample code we will restrict
    the test to two `read` methods and one `create` method of the `BookRepository`.
    The other methods are tested in the same fashion and would not show anything new.
    We will also create a setup method (annotated with @Before) which will load the
    common data used by each of the test methods. Let’s first look at the test code
    in [Listing 9-7](#Chapter09.html#list_9_7).


    ***Listing 9-7.** The complete test class in src/test/java*


    `package com.apress.prospringmvc.bookstore.repository;`


    `import static junit.framework.Assert.assertEquals;`


    `import javax.persistence.EntityManager;`

    `import javax.persistence.PersistenceContext;`


    `import org.junit.After;`

    `import org.junit.Before;`

    `import org.junit.Test;`

    `import org.junit.runner.RunWith;`

    `import org.springframework.beans.factory.annotation.Autowired;`

    `import org.springframework.test.annotation.Rollback;`

    `import org.springframework.test.context.ContextConfiguration;`

    `import org.springframework.test.context.junit4.SpringJUnit4ClassRunner;`

    `import org.springframework.transaction.annotation.Transactional;`


    `import com.apress.prospringmvc.bookstore.config.`

    `       InfrastructureContextConfiguration;`![Image](images/U002.jpg)

    `import com.apress.prospringmvc.bookstore.config.TestDataContextConfiguration;`

    `import com.apress.prospringmvc.bookstore.domain.Book;`

    `import com.apress.prospringmvc.bookstore.domain.Category;`

    `import com.apress.prospringmvc.bookstore.domain.support.BookBuilder;`

    `import com.apress.prospringmvc.bookstore.domain.support.CategoryBuilder;`

    `import com.apress.prospringmvc.bookstore.domain.support.EntityBuilder.`

    `       EntityBuilderManager;`![Image](images/U002.jpg)


    `@RunWith(SpringJUnit4ClassRunner.class)`

    `@ContextConfiguration(classes = { InfrastructureContextConfiguration.class, TestDataContextConfiguration.class
    })`

    **`@Transactional`**

    `public class JpaBookRepositoryTest {`


    `    @Autowired`

    `    private BookRepository bookRepository;`

    `    @Autowired`

    `    private BookBuilder bookBuilder;`

    `    @Autowired`

    `    private CategoryBuilder categoryBuilder;`

    `    @PersistenceContext`

    `    private EntityManager entityManager;`


    `    private Book book;`

    `    private Category category;`


    `    @Before`

    `    public void setupData() {`

    `        category = categoryBuilder.name("Evolution").build();`

    `        book = bookBuilder.description("Richard Dawkins'' brilliant`

    `               reformulation of the theory of natural selection")`

    `               .author("Richard Dawkins").title("The Selfish Gene:`![Image](images/U002.jpg)

    `                         30th Anniversary Edition")`

    `               .isbn("9780199291151")`

    `               .category(category).build();`

    `    }`


    `    @Test`

    `    public void testFindById() {`

    `        Book book = bookRepository.findById(this.book.getId());`

    `        assertEquals(this.book.getAuthor(), book.getAuthor());`

    `        assertEquals(this.book.getDescription(), book.getDescription());`

    `        assertEquals(this.book.getIsbn(), book.getIsbn());`

    `    }`


    `    @Test`

    `    public void testFindByCategory() {`

    `        List<Book> books = bookRepository.findByCategory(category);`

    `        assertEquals(1, books.size());`


    `        for (Book book : books) {`

    `            assertEquals(this.book.getCategory().getId(), category.getId());`

    `            assertEquals(this.book.getAuthor(), book.getAuthor());`

    `            assertEquals(this.book.getDescription(), book.getDescription());`

    `            assertEquals(this.book.getIsbn(), book.getIsbn());`

    `        }`

    `    }`


    `    @Test`

    `    public void testStoreBook() {`

    `        Book book = bookBuilder.description("Something").author("JohnDoe").title("John
    Doe''s`![Image](images/U002.jpg)

    `life")`

    `                .isbn("1234567890123").category(category).build();`

    `        bookRepository.storeBook(book);`


    **`// Explicitly flush so any CUD query that is left behind is sent to the database`**

    **`// before rollback`**

    **`entityManager.flush();`**

    `    }`

    `}`


    In this code we make our test transactional by default. For the `read` methods
    we insert additional data using the already discussed JUnit `@Before` method.
    We use the Builder pattern to build our data and it is by default inserted using
    an `EntityManager` instance injected in the builders. This data is also removed
    when the test method ends because of the transaction rollback.


    ![Image](images/square.jpg) **Note** We said before that one should perform a
    flush in a test method testing functionality that performs CUD, to make sure all
    statements are flushed to database. While testing a read-only method, we first
    inserted data in the database using JPA. What about flushing these insert statements?
    Well, actually, we don’t care. The ORM will flush them as it sees fit to make
    sure our read operations work on the latest data. It might hold back the insertion
    of the category and book, but from the moment it sees our query to select a book
    by ID, it will first flush the book and category to database. The point is that
    we are not testing any of our CUD operations. How the ORM manages the write-behind
    internally to make sure our read operations see the latest data is not our concern.


    In our method that tests the creation of new book records, we explicitly flushed
    before the test method ends. This way we are sure that the `insert` statement
    (generated by the query in the `storeBook` method of our repository) was send
    to database (which is probably the only statement). After that, the test method
    ends and the transaction is rolled back.


    ### Using Mock Objects


    In this section we will introduce you to using mock objects. When creating a unit
    test, you want to make sure your test is as isolated as possible and does not
    depend on resources. In your integration tests, on the other hand, you try to
    use as many resources as you can, as long as you remain in control and they don’t
    make your test dependent on a specific resource or environment. For those cases
    where you are not able to accomplish this, mock objects will help you. Let’s start
    at looking what mock objects really are.'
