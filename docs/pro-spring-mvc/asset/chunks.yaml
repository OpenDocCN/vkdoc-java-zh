- fmt: "### Global Customization\n\nTo customize data binding globally, we need to\
    \ create a class that implements the `org.springframework.web.bind.support.WebBindingInitializer`\
    \ interface. Spring MVC provides a configurable implementation of this interface,\
    \ the `org.springframework.web.bind.support.ConfigurableWebBindingInitializer`.\
    \ An instance of the interface must be registered with the handler mapping implementation,\
    \ so that it can be used. After an instance of `org.springframework.web.bind.WebDataBinder`\
    \ is created, the `initBinder` method of the `org.springframework.web.bind.support.WebBindingInitializer`\
    \ is called.\n\nThe provided implementation allows us to set a couple of properties.\
    \ When a property is not set, it uses the defaults as specified by the `org.springframework.web.bind.WebDataBinder`.\
    \ If we were to want to specify more properties, it would be quite easy to extend\
    \ the default implementation and add the desired behavior. It is possible to set\
    \ the same properties here as in the controller (see [Table 5-13](#Chapter05.html#tab_5_13)).\n\
    \n![Image](images/tab_5_13.jpg)\n\nWhen we want to extend the configuration provided\
    \ by Spring @MVC, we need to do some extending and overriding. This is because\
    \ the default configuration already configures a `org.springframework.web.bind.support.ConfigurableWebBindingInitializer`;\
    \ however, it doesn’t expose it as a bean. Instead, we need to extend `org.springframework.web.servlet.config.annotation.WebMvcConfigurationSupport`\
    \ and override the `requestMappingHandlerAdapter` method (see [Listing 5-22](#Chapter05.html#list_5_22)).\n\
    \n**Listing 5-22.** Reusing the ConfigurableWebBindingInitializer\n\n```\npublic\
    \ class WebMvcContextConfiguration extends WebMvcConfigurationSupport {\n    @Override\n\
    \    @Bean\n    public RequestMappingHandlerAdapter requestMappingHandlerAdapter()\
    \ {\n        RequestMappingHandlerAdapter adapter = super.requestMappingHandlerAdapter();\n\
    \        ConfigurableWebBindingInitializer webBindingInitializer;\n        webBindingInitializer\
    \ = (ConfigurableWebBindingInitializer) adapter.getWebBindingInitializer();\n\
    \        webBindingInitializer.setDirectFieldAccess(true);\n        //Do other\
    \ re-configuration\n        return adapter;\n    }\n}\n```\n\n### Per Controller\
    \ Customization\n\nFor the per controller option, we must implement a method in\
    \ the controller and put the `org.springframework.web.bind.annotation.InitBinder`\
    \ annotation on that method. The method must have no return value (void) and at\
    \ least an `org.springframework.web.bind.WebDataBinder` as a method argument.\
    \ The method *can* have the same arguments as a request-handling method. However,\
    \ it *cannot* have a method argument with the `org.springframework.web.bind.annotation.ModelAttribute`\
    \ annotation. This is because the model is available after binding; and in this\
    \ method, we are going to configure how we bind.\n\nThe `org.springframework.web.bind.annotation.InitBinder`\
    \ annotation has a single attribute named `value` that can take the model attribute\
    \ names or request parameter names this init-binder method is going to apply to.\
    \ The default is to apply to all model attributes and request parameters.\n\n\
    To customize binding, we need to configure our `org.springframework.web.bind.WebDataBinder`.\
    \ This object has several configuration options (setter methods) that we can use,\
    \ as shown in [Table 5-14](#Chapter05.html#tab_5_14).\n\n![Image](images/tab_5_14.jpg)\n\
    \n![Image](images/tab_5_14a.jpg)\n\nIn addition to setting these properties, we\
    \ can also tell the `org.springframework.web.bind.WebDataBinder` to use bean property\
    \ access (the default) or direct field access. This can be done by calling the\
    \ `initBeanPropertyAccess` or `initDirectFieldAccess` method to set property access\
    \ or direct field access, respectively. The advantage of direct field access is\
    \ that we don’t have to write getter/setters for each field we want to use for\
    \ binding. [Listing 5-23](#Chapter05.html#list_5_23) shows an example init-binder\
    \ method.\n\n**Listing 5-23.** An Example init-binder Method\n\n```\npackage com.apress.prospringmvc.bookstore.web.controller;\n\
    \n//Imports omitted\n\n@Controller\n@RequestMapping(value = \"/customer\")\npublic\
    \ class RegistrationController {\n\n    // Other methods omitted\n\n    @InitBinder\n\
    \    public void initBinder(WebDataBinder binder) {\n        binder.initDirectFieldAccess();\n\
    \        binder.setDisallowedFields(\"id\");\n        binder.setRequiredFields(\"\
    username\", \"password\", \"emailAddress\");\n    }\n\n}\n```\n\n### ModelAttributes\n\
    \nTo fully utilize data binding, we have to use model attributes. Furthermore,\
    \ we should use one of these model attributes as the object our form fields are\
    \ bound to. In our `com.apress.prospringmvc.bookstore.web.controller.BookSearchController`,\
    \ we added an object as a method argument, and Spring used that as the object\
    \ to bind the request parameters to. However, it is possible to have more control\
    \ over our objects and how we create objects. For this, we can use the `org.springframework.web.bind.annotation.ModelAttribute`\
    \ annotation. This annotation can be put both on a method and on method arguments.\n\
    \n#### Using ModelAttribute on Methods\n\nWe can use the `ModelAttribute` annotation\
    \ on methods to create an object to be used in our form (e.g., when editing or\
    \ updating) or to get reference data (i.e., data that is needed to render the\
    \ form like a list of categories). Let’s modify our controller to add a list of\
    \ categories to the model and an instance of a `com.apress.prospring.bookstore.domain.BookSearchCriteria`\
    \ object (see [Listing 5-24](#Chapter05.html#list_5_24)).\n\n![Image](images/square.jpg)\
    \ **Caution** When a `ModelAttribute` annotation is put on a method, this method\
    \ will be called before the request-handling method is called!\n\n**Listing 5-24.**\
    \ The BookSearchController with ModelAttribute Methods\n\n```\npackage com.apress.prospringmvc.bookstore.web.controller;\n\
    \n// Other imports omitted.\n\nimport org.springframework.web.bind.annotation.ModelAttribute;\n\
    \n@Controller\npublic class BookSearchController {\n\n    @Autowired\n    private\
    \ BookstoreService bookstoreService;\n\n    @ModelAttribute\n    public BookSearchCriteria\
    \ criteria() {\n        return new BookSearchCriteria();\n    }\n\n    @ModelAttribute(\"\
    categories\")\n    public List<Category> getCategories() {\n        return this.bookstoreService.findAllCategories();\n\
    \    }\n\n    @RequestMapping(value = \"/book/search\", method = { RequestMethod.GET\
    \ })\n    public Collection<Book> list(BookSearchCriteria criteria) {\n      \
    \  return this.bookstoreService.findBooks(criteria);\n    }\n}\n```\n\nMethods\
    \ annotated with `ModelAttribute` have the same flexibility in method argument\
    \ types as the request-handling methods. Of course, they shouldn’t operate on\
    \ the response and cannot have `ModelAttribute` annotation method arguments. We\
    \ could also have the method return void; however, we would then need to include\
    \ an `org.springframework.ui.Model`, `org.springframework.ui.ModelMap` or `Map`\
    \ as a method argument and explicitly add its value to the model.\n\nThe annotation\
    \ can also be placed on request-handling methods, indicating that the return value\
    \ of the method is to be used as a model attribute. The name of the view is then\
    \ derived from the request that uses the configured `org.springframework.web.servlet.RequestToViewNameTranslator`."
  raw: '##### Global Customization


    To customize data binding globally, we need to create a class that implements
    the `org.springframework.web.bind.support.WebBindingInitializer` interface. Spring
    MVC provides a configurable implementation of this interface, the `org.springframework.web.bind.support.ConfigurableWebBindingInitializer`.
    An instance of the interface must be registered with the handler mapping implementation,
    so that it can be used. After an instance of `org.springframework.web.bind.WebDataBinder`
    is created, the `initBinder` method of the `org.springframework.web.bind.support.WebBindingInitializer`
    is called.


    The provided implementation allows us to set a couple of properties. When a property
    is not set, it uses the defaults as specified by the `org.springframework.web.bind.WebDataBinder`.
    If we were to want to specify more properties, it would be quite easy to extend
    the default implementation and add the desired behavior. It is possible to set
    the same properties here as in the controller (see [Table 5-13](#Chapter05.html#tab_5_13)).


    ![Image](images/tab_5_13.jpg)


    When we want to extend the configuration provided by Spring @MVC, we need to do
    some extending and overriding. This is because the default configuration already
    configures a `org.springframework.web.bind.support.ConfigurableWebBindingInitializer`;
    however, it doesn’t expose it as a bean. Instead, we need to extend `org.springframework.web.servlet.config.annotation.WebMvcConfigurationSupport`
    and override the `requestMappingHandlerAdapter` method (see [Listing 5-22](#Chapter05.html#list_5_22)).


    ***Listing 5-22.** Reusing the ConfigurableWebBindingInitializer*


    `public class WebMvcContextConfiguration` **`extends WebMvcConfigurationSupport`**
    `{`

    **`    @Override`**

    **`    @Bean`**

    **`    public RequestMappingHandlerAdapter requestMappingHandlerAdapter() {`**

    **`        RequestMappingHandlerAdapter adapter = super.requestMappingHandlerAdapter();`**

    **`        ConfigurableWebBindingInitializer webBindingInitializer;`![Image](images/U002.jpg)**

    **`webBindingInitializer = (ConfigurableWebBindingInitializer)` ![Image](images/U002.jpg)**

    **`adapter.getWebBindingInitializer();`**

    **`        webBindingInitializer.setDirectFieldAccess(true);`**

    **`        //Do other re-configuration`**

    **`        return adapter;`**

    **`    }`**

    `}`


    #### Per Controller Customization


    For the per controller option, we must implement a method in the controller and
    put the `org.springframework.web.bind.annotation.InitBinder` annotation on that
    method. The method must have no return value (void) and at least an `org.springframework.web.bind.WebDataBinder`
    as a method argument. The method *can* have the same arguments as a request-handling
    method. However, it *cannot* have a method argument with the `org.springframework.web.bind.annotation.ModelAttribute`
    annotation. This is because the model is available after binding; and in this
    method, we are going to configure how we bind.


    The `org.springframework.web.bind.annotation.InitBinder` annotation has a single
    attribute named `value` that can take the model attribute names or request parameter
    names this init-binder method is going to apply to. The default is to apply to
    all model attributes and request parameters.


    To customize binding, we need to configure our `org.springframework.web.bind.WebDataBinder`.
    This object has several configuration options (setter methods) that we can use,
    as shown in [Table 5-14](#Chapter05.html#tab_5_14).


    ![Image](images/tab_5_14.jpg)


    ![Image](images/tab_5_14a.jpg)


    In addition to setting these properties, we can also tell the `org.springframework.web.bind.WebDataBinder`
    to use bean property access (the default) or direct field access. This can be
    done by calling the `initBeanPropertyAccess` or `initDirectFieldAccess` method
    to set property access or direct field access, respectively. The advantage of
    direct field access is that we don’t have to write getter/setters for each field
    we want to use for binding. [Listing 5-23](#Chapter05.html#list_5_23) shows an
    example init-binder method.


    ***Listing 5-23.** An Example init-binder Method*


    `package com.apress.prospringmvc.bookstore.web.controller;`


    `//Imports omitted`


    `@Controller`

    `@RequestMapping(value = "/customer")`

    `public class RegistrationController {`


    `    // Other methods omitted`


    `    @InitBinder`

    `    public void initBinder(WebDataBinder binder) {`

    `        binder.initDirectFieldAccess();`

    `        binder.setDisallowedFields("id");`

    `        binder.setRequiredFields("username", "password", "emailAddress");`

    `    }`


    `}`


    #### ModelAttributes


    To fully utilize data binding, we have to use model attributes. Furthermore, we
    should use one of these model attributes as the object our form fields are bound
    to. In our `com.apress.prospringmvc.bookstore.web.controller.BookSearchController`,
    we added an object as a method argument, and Spring used that as the object to
    bind the request parameters to. However, it is possible to have more control over
    our objects and how we create objects. For this, we can use the `org.springframework.web.bind.annotation.ModelAttribute`
    annotation. This annotation can be put both on a method and on method arguments.


    ##### Using ModelAttribute on Methods


    We can use the `ModelAttribute` annotation on methods to create an object to be
    used in our form (e.g., when editing or updating) or to get reference data (i.e.,
    data that is needed to render the form like a list of categories). Let’s modify
    our controller to add a list of categories to the model and an instance of a `com.apress.prospring.bookstore.domain.BookSearchCriteria`
    object (see [Listing 5-24](#Chapter05.html#list_5_24)).


    ![Image](images/square.jpg) **Caution** When a `ModelAttribute` annotation is
    put on a method, this method will be called before the request-handling method
    is called!


    ***Listing 5-24.** The BookSearchController with ModelAttribute Methods*


    `package com.apress.prospringmvc.bookstore.web.controller;`


    `// Other imports omitted.`


    `import org.springframework.web.bind.annotation.ModelAttribute;`


    `@Controller`

    `public class BookSearchController {`


    `    @Autowired`

    `    private BookstoreService bookstoreService;`


    `    @ModelAttribute`

    `    public BookSearchCriteria criteria() {`

    `        return new BookSearchCriteria();`

    `    }`


    `    @ModelAttribute("categories")`

    `    public List<Category> getCategories() {`

    `        return this.bookstoreService.findAllCategories();`

    `    }`


    `    @RequestMapping(value = "/book/search", method = { RequestMethod.`*`GET`*
    `})`

    `    public Collection<Book> list(BookSearchCriteria criteria) {`

    `        return this.bookstoreService.findBooks(criteria);`

    `    }`

    `}`


    Methods annotated with `ModelAttribute` have the same flexibility in method argument
    types as the request-handling methods. Of course, they shouldn’t operate on the
    response and cannot have `ModelAttribute` annotation method arguments. We could
    also have the method return void; however, we would then need to include an `org.springframework.ui.Model`,
    `org.springframework.ui.ModelMap` or `Map` as a method argument and explicitly
    add its value to the model.


    The annotation can also be placed on request-handling methods, indicating that
    the return value of the method is to be used as a model attribute. The name of
    the view is then derived from the request that uses the configured `org.springframework.web.servlet.RequestToViewNameTranslator`.'
