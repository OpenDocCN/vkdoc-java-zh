- fmt: "### Explicit Form Binding\n\nIn [Chapter 11](#Chapter11.html#ch11), we saw\
    \ that when a model is specified, the request parameters submitted with the form\
    \ are bound to the model. This happens automatically when you specify a model,\
    \ and you don’t explicitly turn off binding for a given transition.\n\nAfter binding,\
    \ the model gets validated when it contains validation methods or a custom validator\
    \ exists, as we have seen in the validation section of the preceding chapter.\n\
    \nSometimes, this automatic binding can be too coarse-grained. If you want more\
    \ control over the request parameters that get bound, you can specify a binder,\
    \ as shown in [Listing 12-14](#Chapter12.html#list_12_14). For example, suppose\
    \ that not every property on your model is used on your page. You could have properties\
    \ that are private to the application and are never rendered on the view (e.g.,\
    \ helper methods for exploiting the model). Because Web Flow automatically tries\
    \ to map every request parameter, a user could abuse this by submitting a value\
    \ for these properties (by manipulating the request URL and parameters). Chances\
    \ are pretty small that this will be exploited because the user must to know the\
    \ name of the property, and this property’s name is used nowhere in these pages.\
    \ But still, it could be a potential hole in your security. If you have a model\
    \ that contains “application private” properties that should never be populated\
    \ with request parameters, then you can use a binder that explicitly lists only\
    \ those properties that are allowed to be bound with incoming request parameters.\n\
    \n***Listing 12-14** Specifying a Per-Property Based Binding*\n\n```\n<view-state\
    \ id=\"authenticate\" view=\"login\" model=\"authenticationForm\">\n    <binder>\n\
    \        <binding property=\"username\" required=\"true\"/>\n        <binding\
    \ property=\"password\" required=\"true\"/>\n    </binder>\n\n    <transition\
    \ on=\"authenticate\" to=\"authenticationOk\" >\n        <evaluate expression=\"\
    authenticationController.authenticate(\n             flowScope.authenticationForm,\
    \ externalContext, messageContext)\"/>\n</transition>\n\n    <transition on=\"\
    previous\" to=\"previous\" bind=\"false\"/>\n</view-state>\n```\n\nIn the preceding\
    \ code, we explicitly bound the `username` and `password` from the request parameters\
    \ to the model. We also marked them as required; when the value is absent, an\
    \ error message will be added. We will discuss how these messages are localized\
    \ in a moment.\n\nThere is also a third attribute: `converter`. You can use this\
    \ to point to a named converter. This works with the older Spring Web Flow conversion\
    \ mechanism, but it should no longer be used.\n\nIn [Chapter 11](#Chapter11.html#ch11),\
    \ we explained that we create converters from the `org.springframework.core.convert.converter`\
    \ package and not from the `org.springframework.binding.convert.converter` package.\
    \ The Spring core conversion service does not support named converters. Hence,\
    \ using a named converter would mean that you need to explicitly register it with\
    \ the Web Flow custom conversion service, but it cannot be used as such (via naming)\
    \ in Spring MVC. This way of working is discouraged.\n\nThe preferred approach\
    \ is to create an `org.springframework.core.convert.converter.Converter`, and\
    \ then register it as a Spring bean and with an `org.springframework.format.support.FormattingConversionServiceFactoryBean`\
    \ for Spring Web Flow. This will cause the right converter to be chosen automatically.\n\
    \nFinally, notice that we specified `bind=\"false\"` on the `previous` transition.\
    \ The `previous` transition is triggered via a normal submit button in the form.\
    \ The only difference is the event id. Without explicitly disabling binding, we\
    \ can require that the username and password be filled in to go back.\n\n**Caution**\
    \ You might recall from [Chapter 11](#Chapter11.html#ch11) that we had a Previous\
    \ button in the sample application, as well. In that example, we tackled this\
    \ issue programmatically by checking the state in the model validation method:\n\
    \n```\nif (context.getUserEvent().equals(\"next\")) {\n…\n```\n\nIn this case,\
    \ the better solution is to indicate that `binding=\"false\"`. If you rename a\
    \ transition in your flow, the code in the model will break. So, for simple cases,\
    \ it is better to set the flow binding attribute to `false`. Nevertheless, the\
    \ programmatic solution might be convenient in some cases where certain validations\
    \ need to be conditionally performed, depending on the state.\n\nWe marked both\
    \ `username` and `password` as required, but how are they localized to an error\
    \ message? In order for the required message to show up, we must declare the message\
    \ keys. Web Flow follows a predefined structure in trying to find the key that\
    \ belongs to a field that is missing:\n\n*   `required`\n*   `<fieldname>.required`\n\
    *   `<modelname>.<fieldname>.required`\n\nIn our message bundle (`messages_xx.properties`),\
    \ we used the third option:\n\n```\nauthenticationForm.password.required=Password\
    \ is required\nauthenticationForm.username.required=Username is required\n```\n\
    \nAnother possibility is to use `required` and a place holder. The first placeholder\
    \ contains the field name:\n\n```\nrequired= {0}: is required\n```\n\nFinally,\
    \ you need to declare a standard `<form:errors>` in your JSP with the path of\
    \ the field to show the error for the different fields:\n\n```\n<form:errors cssClass=\"\
    error\" path=\"password\"/>\n<form:errors cssClass=\"error\" path=\"password\"\
    />\n```\n\n**Note** In addition to the `required` error type, there are also others\
    \ you can use, such as `typeMismatch`. When an adequate type conversion cannot\
    \ be executed, an error of this type is added. You can find other error types\
    \ by looking at implementations of `org.springframework.binding.mapping.MappingResult`.\
    \ The implementation’s `getCode()` method returns the error type. The following\
    \ error types exist and might be raised: `required`, `propertyNotFound`, `evaluationException`,\
    \ and `typeMismatch`. You can define messages for these errors in the same manner\
    \ as just discussed."
  raw: '### Explicit Form Binding


    In [Chapter 11](#Chapter11.html#ch11), we saw that when a model is specified,
    the request parameters submitted with the form are bound to the model. This happens
    automatically when you specify a model, and you don’t explicitly turn off binding
    for a given transition.


    After binding, the model gets validated when it contains validation methods or
    a custom validator exists, as we have seen in the validation section of the preceding
    chapter.


    Sometimes, this automatic binding can be too coarse-grained. If you want more
    control over the request parameters that get bound, you can specify a binder,
    as shown in [Listing 12-14](#Chapter12.html#list_12_14). For example, suppose
    that not every property on your model is used on your page. You could have properties
    that are private to the application and are never rendered on the view (e.g.,
    helper methods for exploiting the model). Because Web Flow automatically tries
    to map every request parameter, a user could abuse this by submitting a value
    for these properties (by manipulating the request URL and parameters). Chances
    are pretty small that this will be exploited because the user must to know the
    name of the property, and this property’s name is used nowhere in these pages.
    But still, it could be a potential hole in your security. If you have a model
    that contains “application private” properties that should never be populated
    with request parameters, then you can use a binder that explicitly lists only
    those properties that are allowed to be bound with incoming request parameters.


    ***Listing 12-14** Specifying a Per-Property Based Binding*


    `<view-state id="authenticate" view="login" model="authenticationForm">`

    `    <binder>`

    `        <binding property="username" required="true"/>`

    `        <binding property="password" required="true"/>`

    `    </binder>`


    `    <transition on="authenticate" to="authenticationOk" >`

    `        <evaluate expression="authenticationController.authenticate(`![Image](images/U002.jpg)

    `             flowScope.authenticationForm, externalContext, messageContext)"/>`

    `</transition>`


    `    <transition on="previous" to="previous" bind="false"/>`

    `</view-state>`


    In the preceding code, we explicitly bound the username and password from the
    request parameters to the model. We also marked them as required; when the value
    is absent, an error message will be added. We will discuss how these messages
    are localized in a moment.


    There is also a third attribute: `converter`. You can use this to point to a named
    converter. This works with the older Spring Web Flow conversion mechanism, but
    it should no longer be used.


    In [Chapter 11](#Chapter11.html#ch11), we explained that we create converters
    from the `org.springframework.`**`core`**`.convert.converter` package and not
    from the `org.springframework.`**`binding`**`.convert.converter` package. The
    Spring core conversion service does not support named converters. Hence, using
    a named converter would mean that you need to explicitly register it with the
    Web Flow custom conversion service, but it cannot be used as such (via naming)
    in Spring MVC. This way of working is discouraged.


    The preferred approach is to create an `org.springframework.core.convert.converter`.`Converter`,
    and then register it as a Spring bean and with an `org.springframework.format.support.FormattingConversionServiceFactoryBean`
    for Spring Web Flow. This will cause the right converter to be chosen automatically.


    Finally, notice that we specified `bind="false"` on the `previous` transition.
    The `previous` transition is triggered via a normal submit button in the form.
    The only difference is the event id. Without explicitly disabling binding, we
    can require that the username and password be filled in to go back.


    ![Image](images/square.jpg) **Caution** You might recall from [Chapter 11](#Chapter11.html#ch11)
    that we had a Previous button in the sample application, as well. In that example,
    we tackled this issue programmatically by checking the state in the model validation
    method:


    `if (context.getUserEvent().equals("next")) {`

    `…`


    In this case, the better solution is to indicate that `binding="false"`. If you
    rename a transition in your flow, the code in the model will break. So, for simple
    cases, it is better to set the flow binding attribute to `false`. Nevertheless,
    the programmatic solution might be convenient in some cases where certain validations
    need to be conditionally performed, depending on the state.


    We marked both username and password as required, but how are they localized to
    an error message? In order for the required message to show up, we must declare
    the message keys. Web Flow follows a predefined structure in trying to find the
    key that belongs to a field that is missing:


    *   `required`

    *   `<`*`fieldname`*`>.required`

    *   `<`*`modelname`*`>.<`*`fieldname`*`>.required`


    In our message bundle (`messages_xx.properties`), we used the third option:


    `authenticationForm.password.required=Password is required`

    `authenticationForm.username.required=Username is required`


    Another possibility is to use `required` and a place holder. The first placeholder
    contains the field name:


    `required= {0}: is required`


    Finally, you need to declare a standard `<form:errors>` in your JSP with the path
    of the field to show the error for the different fields:


    `<form:errors cssClass="error" path="password"/>`

    `<form:errors cssClass="error" path="password"/>`


    ![Image](images/square.jpg) **Note** In addition to the `required` error type,
    there are also others you can use, such as `typeMismatch`. When an adequate type
    conversion cannot be executed, an error of this type is added. You can find other
    error types by looking at implementations of `org.springframework.binding.mapping.MappingResult`.
    The implementation’s `getCode()` method returns the error type. The following
    error types exist and might be raised: `required`, `propertyNotFound`, `evaluationException`,
    and `typeMismatch`. You can define messages for these errors in the same manner
    as just discussed.'
  trans: '

    ### 显式表单绑定


    在第 11 章中，我们看到当指定模型时，随表单提交的请求参数会被绑定到该模型。当你指定模型时，这一过程会自动发生，并且你无需为特定转换显式关闭绑定。


    绑定之后，如果模型包含验证方法或存在自定义验证器，模型就会得到验证，正如我们在前一章的验证部分所看到的那样。


    有时，这种自动绑定可能过于粗粒度。如果你希望对绑定的请求参数有更多控制，可以指定一个绑定器，如代码清单 12-14 所示。例如，假设你的模型并非每个属性都在页面上使用。你可能有一些对应用程序来说是私有的属性，并且永远不会在视图上渲染（例如，用于操作模型的辅助方法）。由于
    Web Flow 会自动尝试映射每个请求参数，用户可能会通过为这些属性提交值（通过操纵请求 URL 和参数）来滥用此功能。这种被利用的可能性很小，因为用户必须知道属性的名称，而且该属性名称在这些页面中从未使用过。但这仍然可能是你安全中的一个潜在漏洞。如果你的模型包含“应用程序私有”且绝不应通过请求参数填充的属性，那么你可以使用一个绑定器，该绑定器仅显式列出那些允许与传入请求参数绑定的属性。


    ***代码清单 12-14** 指定基于每个属性的绑定*


    `<view-state id="authenticate" view="login" model="authenticationForm">`

    `    <binder>`

    `        <binding property="username" required="true"/>`

    `        <binding property="password" required="true"/>`

    `    </binder>`


    `    <transition on="authenticate" to="authenticationOk" >`

    `        <evaluate expression="authenticationController.authenticate(`![Image](img/U002.jpg)

    `             flowScope.authenticationForm, externalContext, messageContext)"/>`

    `</transition>`


    `    <transition on="previous" to="previous" bind="false"/>`

    `</view-state>`


    在上述代码中，我们显式地将请求参数中的用户名和密码绑定到了模型。我们还将它们标记为必填项；当值缺失时，会添加一条错误消息。我们稍后将讨论如何本地化这些消息。


    还有第三个属性：`converter`。你可以用它来指向一个命名的转换器。这适用于较旧的 Spring Web Flow 转换机制，但不应再使用。


    在第 11 章中，我们解释过，我们是从 `org.springframework.`**`core`**`.convert.converter` 包创建转换器，而不是从
    `org.springframework.`**`binding`**`.convert.converter` 包。Spring 核心转换服务不支持命名转换器。因此，使用命名转换器意味着你需要将其显式注册到
    Web Flow 自定义转换服务中，但它不能在 Spring MVC 中直接（通过命名）使用。不鼓励这种工作方式。


    推荐的方法是创建一个 `org.springframework.core.convert.converter`.`Converter`，然后将其注册为一个
    Spring Bean，并通过 `org.springframework.format.support.FormattingConversionServiceFactoryBean`
    为 Spring Web Flow 注册。这将导致自动选择正确的转换器。


    最后，请注意我们在 `previous` 转换上指定了 `bind="false"`。`previous` 转换是通过表单中的普通提交按钮触发的。唯一的区别是事件
    ID。如果没有显式禁用绑定，我们可能会要求必须填写用户名和密码才能返回。


    ![Image](img/square.jpg) **警告** 你可能还记得第 11 章中，示例应用程序中也有一个“上一步”按钮。在那个例子中，我们通过在模型验证方法中检查状态以编程方式处理了这个问题：


    `if (context.getUserEvent().equals("next")) {`

    `…`


    在这种情况下，更好的解决方案是指定 `binding="false"`。如果你在流程中重命名了一个转换，模型中的代码就会出错。因此，对于简单情况，最好将流程绑定属性设置为
    `false`。尽管如此，在某些需要根据状态有条件地执行特定验证的情况下，编程式解决方案可能更方便。


    我们将用户名和密码都标记为必填项，但它们如何本地化为错误消息呢？为了让必填消息显示出来，我们必须声明消息键。Web Flow 遵循预定义的结构来尝试查找属于缺失字段的键：


    *   `required`

    *   `<`*`字段名`*`>.required`

    *   `<`*`模型名`*`>.<`*`字段名`*`>.required`


    在我们的消息包（`messages_xx.properties`）中，我们使用了第三种选项：


    `authenticationForm.password.required=密码是必填项`

    `authenticationForm.username.required=用户名是必填项`


    另一种可能性是使用 `required` 和一个占位符。第一个占位符包含字段名：


    `required= {0}: 是必填项`


    最后，你需要在 JSP 中声明一个标准的 `<form:errors>`，并指定字段的路径，以便为不同字段显示错误：


    `<form:errors cssClass="error" path="password"/>`

    `<form:errors cssClass="error" path="password"/>`


    ![Image](img/square.jpg) **注意** 除了 `required` 错误类型之外，还有其他类型可以使用，例如 `typeMismatch`。当无法执行适当的类型转换时，会添加此类型的错误。你可以通过查看
    `org.springframework.binding.mapping.MappingResult` 的实现来找到其他错误类型。该实现的 `getCode()`
    方法返回错误类型。存在并可能引发的错误类型如下：`required`、`propertyNotFound`、`evaluationException` 和
    `typeMismatch`。你可以按照刚才讨论的相同方式为这些错误定义消息。

