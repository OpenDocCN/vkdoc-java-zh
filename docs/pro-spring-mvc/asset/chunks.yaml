- fmt: "# Foreword\n\nI still remember first learning about the Spring framework back\
    \ in 2004. I had been using J2EE and Struts heavily, and had struggled with many\
    \ difficulties in effectively using those technologies while building Java enterprise\
    \ applications. Instead of trying to do away with J2EE altogether, Spring tried\
    \ to make using J2EE drastically simpler and more productive by offering a large\
    \ collection of best practice implementations and an inversion of control container\
    \ gluing it all together. An exciting proposition indeed!\n\nWhile in general\
    \ Spring did not try to reinvent the wheel by providing solutions competing with\
    \ existing parts of J2EE or other established frameworks (notably Hibernate),\
    \ there was one important exception to this rule: web application development.\
    \ Spring shipped with its own web framework, Spring MVC, a fully functional web\
    \ application framework that can serve as a direct alternative to something like\
    \ Struts. At the time, I saw further opportunity to enhance Spring-based web application\
    \ development by adding a page flow component to Spring MVC called Spring Web\
    \ Flow. Spring MVC and Spring Web Flow are the prime subjects of this book.\n\n\
    The design of Spring MVC benefited from the lessons learned working with earlier\
    \ frameworks. Flexibility and long-term productivity were core design goals. Well-designed\
    \ Spring MVC applications can grow and change while remaining manageable and maintainable.\
    \ Still, all was not good. Many found the initial learning curve when adopting\
    \ Spring, and more specifically Spring MVC, too steep. New frameworks such as\
    \ Ruby on Rails popped up and focused on short term-productivity and making it\
    \ very easy to get up-and-running. The Spring developer community recognized this\
    \ shortcoming, and the recent 3.0 and 3.1 releases of Spring MVC have largely\
    \ addressed it: extensive use of convention-over-configuration and annotations\
    \ have made the framework easer to use than ever, as this book will demonstrate!\
    \ It is a real testament to the flexibility and design quality of Spring MVC that\
    \ all of this has been possible while remaining 100% backward-compatible. You\
    \ now have a framework offering the best of both worlds: easy to get started with\
    \ while the fundamental principles underpinning it all pay dividends in the long\
    \ term. Spring Web Flow is currently undergoing a similar evolution.\n\nSince\
    \ 2004, Spring MVC and Spring Web Flow have seen a steady and continued increase\
    \ in popularity. They are now mature and well established Java development frameworks.\
    \ If you build a Java web application on top of these frameworks, you can rest\
    \ assured that you are building on a very solid foundation!\n\nIn this book, Marten\
    \ and Koen take a practical approach to introducing Spring MVC and Spring Web\
    \ Flow. Of course, they help you in setting up a productive development environment\
    \ and guide you while getting started developing with Spring MVC and Web Flow.\
    \ But they don't stop there. I really appreciate how they did not simply cover\
    \ the technical details, but took the time to explain many of the underlying concepts,\
    \ bringing a deeper understanding to you, the reader. Furthermore, the book also\
    \ covers other important topics such as enforcing security constraints and making\
    \ sure your web applications are well tested. After having read this book you\
    \ should be well prepared to develop real-life web application based on Spring\
    \ technologies.\n\nI'm excited to see that to this day people are still benefiting\
    \ from Spring and the small component I added to it back in 2004. I highly recommend\
    \ this book for all those eager to learn about Spring MVC and Spring Web Flow,\
    \ and I applaud the excellent job the authors have done in helping developers\
    \ learn about these exciting Spring technologies.\n\nErwin Vervaet  \nSpring Web\
    \ Flow project founder\n\n## About the Authors\n\n![Image](images/marten_deinum.jpg)\
    \ ![Image](images/square.jpg) **Marten Deinum** is a Java/software consultant\
    \ working for Conspect. He has developed and architected software, primarily in\
    \ Java, for small and large companies. He is an enthusiastic open source user\
    \ and longtime fan, user and advocate of the Spring Framework. He has held a number\
    \ of positions including Software Engineer, Development Lead, Coach, and also\
    \ as a Java and Spring Trainer. When not working or answering questions on the\
    \ Spring Framework Forums, he can be found in the water training for the triathlon\
    \ or under the water diving or guiding other people around.\n\n![Image](images/koen_serneels.jpg)\
    \ ![Image](images/square.jpg) **Koen Serneels** is a Senior JAVA software engineer\
    \ with several IBM, Cisco, and Oracle certifications. For more than 10 years he\
    \ has developed enterprise solutions using Java(EE), Spring, Spring MVC, Web Flow,\
    \ JSF, and Hibernate. He holds a keen interest in system architecture and integration,\
    \ data modeling, relational databases, security and networks. Beginning his career\
    \ with the Belgian federal government, Koen developed highly transactional Java-based\
    \ applications with legacy integration. Currently, he is employed by Hewlett-Packard\
    \ and is a Java software consultant and technical lead for the Flemish government\
    \ in Belgium. He also teaches a graduate course on “Software Development with\
    \ Java” at the Groep T Engineering School in Leuven, Belgium.\n\n![Image](images/square.jpg)\
    \ **Colin Yates** is a J2EE principal architect who specializes in web-based development.\
    \ He has been a freelance consultant for the past three years and has worked in\
    \ a number of environments, both structured and chaotic. Since graduating with\
    \ a software engineering degree in 1997, he has held a number of positions, including\
    \ development lead, principal systems engineer, mentor, and professional trainer.\
    \ His principal skill set includes mentoring others, architecting complex problems\
    \ into manageable solutions, and optimizing development processes.\n\nColin was\
    \ first introduced to the Spring Framework in January 2003 by his mentors, Peter\
    \ Den Haan and David Hewitt, and he has never looked back.\n\n![Image](images/square.jpg)\
    \ **Seth Ladd** is a software engineer and professional Spring Framework trainer\
    \ and mentor specializing in object-oriented and testable web applications. He\
    \ started his own company building websites at age 17, but now enjoys having a\
    \ real job. Currently working for Camber Corporation, Seth has built and deployed\
    \ systems for NEC, Rochester Institute of Technology, Brivo Systems, and National\
    \ Information Consortium. He has architected and developed enterprise applications\
    \ in Java and C for both the server and remotely connected embedded devices. He\
    \ enjoys speaking and teaching, and is a frequent presenter at local Java user\
    \ groups and at corporate developer conferences. Seth is very thankful for living\
    \ and working in Kailua, Hawaii, with his wife.\n\n![Image](images/square.jpg)\
    \ **Christophe Vanfleteren** is a software engineer who has been working with\
    \ Java technologies since 2001. Working for EDS / HP, he has mostly worked on\
    \ projects for the Flemish government in Belgium, including some large-scale,\
    \ event-driven applications like the one tracking the Flemish elections in 2006\
    \ and the Flemish fiscal platform, which collects several different taxes from\
    \ 6 million people. He is able to work all the way up the stack, from heavy transactional\
    \ code all the way to JavaScript-based front-ends. Since 2010, Christophe has\
    \ been an independent contractor."
  raw: '## Foreword


    I still remember first learning about the Spring framework back in 2004\. I had
    been using J2EE and Struts heavily, and had struggled with many difficulties in
    effectively using those technologies while building Java enterprise applications.
    Instead of trying to do away with J2EE altogether, Spring tried to make using
    J2EE drastically simpler and more productive by offering a large collection of
    best practice implementations and an inversion of control container gluing it
    all together. An exciting proposition indeed!


    While in general Spring did not try to reinvent the wheel by providing solutions
    competing with existing parts of J2EE or other established frameworks (notably
    Hibernate), there was one important exception to this rule: web application development.
    Spring shipped with its own web framework, Spring MVC, a fully functional web
    application framework that can serve as a direct alternative to something like
    Struts. At the time, I saw further opportunity to enhance Spring-based web application
    development by adding a page flow component to Spring MVC called Spring Web Flow.
    Spring MVC and Spring Web Flow are the prime subjects of this book.


    The design of Spring MVC benefited from the lessons learned working with earlier
    frameworks. Flexibility and long-term productivity were core design goals. Well-designed
    Spring MVC applications can grow and change while remaining manageable and maintainable.
    Still, all was not good. Many found the initial learning curve when adopting Spring,
    and more specifically Spring MVC, too steep. New frameworks such as Ruby on Rails
    popped up and focused on short term-productivity and making it very easy to get
    up-and-running. The Spring developer community recognized this shortcoming, and
    the recent 3.0 and 3.1 releases of Spring MVC have largely addressed it: extensive
    use of convention-over-configuration and annotations have made the framework easer
    to use than ever, as this book will demonstrate! It is a real testament to the
    flexibility and design quality of Spring MVC that all of this has been possible
    while remaining 100% backward-compatible. You now have a framework offering the
    best of both worlds: easy to get started with while the fundamental principles
    underpinning it all pay dividends in the long term. Spring Web Flow is currently
    undergoing a similar evolution.


    Since 2004, Spring MVC and Spring Web Flow have seen a steady and continued increase
    in popularity. They are now mature and well established Java development frameworks.
    If you build a Java web application on top of these frameworks, you can rest assured
    that you are building on a very solid foundation!


    In this book, Marten and Koen take a practical approach to introducing Spring
    MVC and Spring Web Flow. Of course, they help you in setting up a productive development
    environment and guide you while getting started developing with Spring MVC and
    Web Flow. But they don''t stop there. I really appreciate how they did not simply
    cover the technical details, but took the time to explain many of the underlying
    concepts, bringing a deeper understanding to you, the reader. Furthermore, the
    book also covers other important topics such as enforcing security constraints
    and making sure your web applications are well tested. After having read this
    book you should be well prepared to develop real-life web application based on
    Spring technologies.


    I''m excited to see that to this day people are still benefiting from Spring and
    the small component I added to it back in 2004\. I highly recommend this book
    for all those eager to learn about Spring MVC and Spring Web Flow, and I applaud
    the excellent job the authors have done in helping developers learn about these
    exciting Spring technologies.


    Erwin Vervaet


    Spring Web Flow project founder


