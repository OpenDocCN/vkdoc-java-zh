  raw: '#### ResourceBundleViewResolver


    Very similar to the `XmlViewResolver,` this implementation uses a properties file
    instead of an XML file to hold the view configuration. The advantage of the `org.springframework.web.servlet.view.ResourceBundleViewResolver`
    is that we could have different views for different languages. This is because
    it uses the standard resource bundle mechanism in Java to load the configuration
    files. [Table 8-3](#Chapter08.html#tab_8_3) lists the properties for this implementation.


    ![Image](images/9781430241553_tab08-03.jpg)


    [Listing 8-6](#Chapter08.html#list_8_6) shows the sample configuration for the
    `ResourceBundleViewResolver`. In [Listing 8-7](#Chapter08.html#list_8_7), we see
    the `views.properties` file in use.


    ***Listing 8-6.** ResourceBundleViewResolver configuration*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// Other imports omitted`

    `import org.springframework.web.servlet.view.ResourceBundleViewResolver;`


    `@Configuration`

    `public class ViewConfiguration {`


    `    @Bean`

    `    public ViewResolver viewResolver() {`

    `        ResourceBunldeViewResolver viewResolver;`

    `        viewResolver = new ResourceBundleViewResolver();`

    `        viewResolver.setOrder(1);`

    `        return viewResolver;`

    `    }`

    `}`


    ***Listing 8-7.** Sample views.properties*


    **`index.(class)`**`=org.springframework.web.servlet.view.JstlView`

    **`index.url=`**`/WEB-INF/views/index.jsp`


    #### UrlBasedViewResolver


    The `org.springframework.web.servlet.view.UrlBasedViewResolver` expects the view
    name to map directly to a URL. It can optionally modify the URL by adding a prefix
    and/or suffix to the view name. In general this class serves as a base class to
    the different view technologies like JSP and template-based view technologies
    (see section “View Technologies” later in this chapter). In [Table 8-4](#Chapter08.html#tab_8_4)
    we can see the properties for this type of view resolver.


    ![Image](images/9781430241553_tab08-04.jpg)


    _________


    ¹ [`http://www.iana.org/assignments/media-types/index.html`](http://www.iana.org/assignments/media-types/index.html)


    In [Listing 8-8](#Chapter08.html#list_8_8) we see a sample configuration for this
    view resolver. We need to specify the view class (required,) and in general it
    is also necessary to add a prefix and/or suffix to generate a URL pointing to
    the actual view implementation. The advantage is that we can use a naming convention
    for our views and we don’t have to specify our views explicitly in the configuration
    (as we did with the `BeanNameViewResolver`, for instance).


    ***Listing 8-8.** UrlBasedViewResolver configuration*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// Other imports omitted`

    `import org.springframework.web.servlet.view.JstlView;`

    `import org.springframework.web.servlet.view.UrlBasedViewResolver;`


    `@Configuration`

    `public class ViewConfiguration {`


    `    @Bean`

    `    public ViewResolver viewResolver() {`

    `        UrlBasedViewResolver viewResolver = new UrlBasedViewResolver();`

    `        viewResolver.setOrder(1);`

    `        viewResolver.setPrefix("/WEB-INF/views/");`

    `        viewResolver.setSuffix(".jsp");`

    `        viewResolver.setViewClass(JstlView.class);`

    `        return viewResolver;`

    `    }`

    `}`


    #### InternalResourceViewResolver


    This extension of the `UrlBasedViewResolver` is a convenience subclass that preconfigures
    the view class and adds some additional support to include beans in the model
    so that they are available in the view for rendering. [Listing 8-9](#Chapter08.html#list_8_9)
    shows a sample configuration for the `org.springframework.web.servlet.view.InternalResourceViewResolver`.
    The result is essentially the same as in [Listing 8-8](#Chapter08.html#list_8_8).


    ***Listing 8-9.** InternalResourceViewResolver configuration*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// Other imports omitted`

    `import org.springframework.web.servlet.view.InternalResourceViewResolver;`


    `@Configuration`

    `public class ViewConfiguration {`


    `    @Bean`

    `    public ViewResolver viewResolver() {`

    `        InternalResourceViewResolver viewResolver;`

    `        viewResolver = new InternalResourceViewResolver();`

    `        viewResolver.setOrder(1);`

    `        viewResolver.setPrefix("/WEB-INF/views/");`

    `        viewResolver.setSuffix(".jsp");`

    `        return viewResolver;`

    `    }`

    `}`


    #### XsltViewResolver


    The `org.springframework.web.servlet.web.view.xslt.XsltViewResolver` can be used
    to resolve the view name to an XSLT stylesheet to transform the model into something
    to show to the user. To work with this view resolver and views we need an XSLT
    template for transforming our model to a view. The returned view, an instance
    of `org.springframework.web.servlet.view.xslt.XsltView`, will detect which model
    object to render. It supports the following types:


    > *   `javax.xml.transform.Source`

    > *   `org.w3c.dom.Document`

    > *   `org.w3c.dom.Node`

    > *   `java.io.Reader`

    > *   `java.io.InputStream`

    > *   `org.springframework.core.io.Resource`


    The `org.springframework.web.servlet.view.xslt.XsltView` will take the supported
    type and use the XSLT stylesheet to transform it into what we want it to be. Although
    this mechanism can be powerful, it is the author’s belief that this isn’t something
    to be used to create a view layer for a web application. It in general is easier
    to return XML (or JSON) from the controller and directly process that on the client
    with JavaScript.


    #### ContentNegotiatingViewResolver


    The `org.springframework.web.servlet.view.ContentNegotiatingViewResolver` is a
    very special view resolver: it can resolve views by name and content-type. It
    works by first determining which content-type is requested, which it does by checking
    the file extension, checking the Accept header, or checking a request parameter
    (this is configurable; see [Table 8-5](#Chapter08.html#tab_8_5)). After the content-type
    is determined, the resolver consults all configured view resolvers to collect
    the candidate views by name. Finally, it selects the best matching view by checking
    if the requested content-type is supported. [Table 8-5](#Chapter08.html#tab_8_5)
    shows the configurable properties of the view resolver.


    ![Image](images/9781430241553_tab08-05.jpg)


    ![Image](images/square.jpg) **Note** When multiple view resolvers are used, the
    `ContentNegotiatingViewResolver` must have the highest order to function correctly.
    This is already set by default, but if you change the `order` keep this in mind.


    #### Implementing Your Own ViewResolver


    This section explains how to implement our own view resolver. We will create a
    simple implementation that resolves the view name from a map of configured views.


    Implementing your own view is quite easy to do; you just create a class and let
    it implement the `ViewResolver` interface (see [Listing 8-1](#Chapter08.html#list_8_1))
    and provide the necessary implementation. [Listing 8-10](#Chapter08.html#list_8_10)
    shows our `com.apress.prospringmvc.bookstore.web.view.SimpleConfigurableViewResolver`.


    ***Listing 8-10.** SimpleConfigurableViewResolver*


    `package com.apress.prospringmvc.bookstore.web.view;`


    `// Other imports omitted`

    `import org.springframework.web.servlet.View;`

    `import org.springframework.web.servlet.ViewResolver;`


    `public class SimpleConfigurableViewResolver implements ViewResolver {`


    `    private Map<String, ? extends View> views = new HashMap<String, View>();`


    `    @Override`

    `    public View resolveViewName(String viewName, Locale locale)`

    `    throws Exception {`

    `        return this.views.get(viewName);`

    `    }`


    `    public void setViews(Map<String, ? extends View> views) {`

    `        this.views = views;`

    `    }`

    `}`


    We are going to use this implementation in the next section when we need to add
    views for PDF and Excel.'
  trans: '

    #### ResourceBundleViewResolver


    该实现与 `XmlViewResolver` 非常相似，它使用属性文件而非 XML 文件来保存视图配置。`org.springframework.web.servlet.view.ResourceBundleViewResolver`
    的优势在于，我们可以为不同语言提供不同视图。这是因为该解析器使用 Java 中的标准资源包机制来加载配置文件。表 8-3 列出了该实现的属性。


    ![Image](img/9781430241553_tab08-03.jpg)


    清单 8-6 展示了 `ResourceBundleViewResolver` 的示例配置。在清单 8-7 中，我们可以看到正在使用的 `views.properties`
    文件。


    ***清单 8-6.** ResourceBundleViewResolver 配置*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// 其他导入已省略`

    `import org.springframework.web.servlet.view.ResourceBundleViewResolver;`


    `@Configuration`

    `public class ViewConfiguration {`


    `    @Bean`

    `    public ViewResolver viewResolver() {`

    `        ResourceBunldeViewResolver viewResolver;`

    `        viewResolver = new ResourceBundleViewResolver();`

    `        viewResolver.setOrder(1);`

    `        return viewResolver;`

    `    }`

    `}`


    ***清单 8-7.** 示例 views.properties*


    **`index.(class)`**`=org.springframework.web.servlet.view.JstlView`

    **`index.url=`**`/WEB-INF/views/index.jsp`


    #### UrlBasedViewResolver


    `org.springframework.web.servlet.view.UrlBasedViewResolver` 期望视图名称直接映射到 URL。它可以选择性地通过为视图名称添加前缀和/或后缀来修改
    URL。通常，该类作为不同视图技术（如 JSP 和基于模板的视图技术，参见本章后面的“视图技术”一节）的基类。在表 8-4 中，我们可以看到此类视图解析器的属性。


    ![Image](img/9781430241553_tab08-04.jpg)


    _________


    ¹ [`http://www.iana.org/assignments/media-types/index.html`](http://www.iana.org/assignments/media-types/index.html)


    在清单 8-8 中，我们看到了此视图解析器的示例配置。我们需要指定视图类（必需），并且通常还需要添加前缀和/或后缀，以生成指向实际视图实现的 URL。其优势在于，我们可以为视图使用命名约定，而无需在配置中显式指定视图（例如，我们之前使用
    `BeanNameViewResolver` 时就是这样做的）。


    ***清单 8-8.** UrlBasedViewResolver 配置*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// 其他导入已省略`

    `import org.springframework.web.servlet.view.JstlView;`

    `import org.springframework.web.servlet.view.UrlBasedViewResolver;`


    `@Configuration`

    `public class ViewConfiguration {`


    `    @Bean`

    `    public ViewResolver viewResolver() {`

    `        UrlBasedViewResolver viewResolver = new UrlBasedViewResolver();`

    `        viewResolver.setOrder(1);`

    `        viewResolver.setPrefix("/WEB-INF/views/");`

    `        viewResolver.setSuffix(".jsp");`

    `        viewResolver.setViewClass(JstlView.class);`

    `        return viewResolver;`

    `    }`

    `}`


    #### InternalResourceViewResolver


    作为 `UrlBasedViewResolver` 的扩展，这是一个便捷的子类，它预配置了视图类，并添加了一些额外支持，以便将 bean 包含在模型中，使其在视图中可用于渲染。清单
    8-9 展示了 `org.springframework.web.servlet.view.InternalResourceViewResolver` 的示例配置。其结果与清单
    8-8 基本相同。


    ***清单 8-9.** InternalResourceViewResolver 配置*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// 其他导入已省略`

    `import org.springframework.web.servlet.view.InternalResourceViewResolver;`


    `@Configuration`

    `public class ViewConfiguration {`


    `    @Bean`

    `    public ViewResolver viewResolver() {`

    `        InternalResourceViewResolver viewResolver;`

    `        viewResolver = new InternalResourceViewResolver();`

    `        viewResolver.setOrder(1);`

    `        viewResolver.setPrefix("/WEB-INF/views/");`

    `        viewResolver.setSuffix(".jsp");`

    `        return viewResolver;`

    `    }`

    `}`


    #### XsltViewResolver


    `org.springframework.web.servlet.web.view.xslt.XsltViewResolver` 可用于将视图名称解析为 XSLT
    样式表，从而将模型转换为可供用户查看的内容。要使用此视图解析器和视图，我们需要一个 XSLT 模板来将模型转换为视图。返回的视图（`org.springframework.web.servlet.view.xslt.XsltView`
    的实例）将检测要渲染的模型对象。它支持以下类型：


    > *   `javax.xml.transform.Source`

    > *   `org.w3c.dom.Document`

    > *   `org.w3c.dom.Node`

    > *   `java.io.Reader`

    > *   `java.io.InputStream`

    > *   `org.springframework.core.io.Resource`


    `org.springframework.web.servlet.view.xslt.XsltView` 将获取支持的类型，并使用 XSLT 样式表将其转换为我们想要的形式。尽管此机制可能很强大，但作者认为，它不应用于为
    Web 应用程序创建视图层。通常，从控制器返回 XML（或 JSON）并在客户端使用 JavaScript 直接处理更为简单。


    #### ContentNegotiatingViewResolver


    `org.springframework.web.servlet.view.ContentNegotiatingViewResolver` 是一个非常特殊的视图解析器：它可以根据名称和内容类型解析视图。它的工作方式是首先确定请求的内容类型，通过检查文件扩展名、检查
    Accept 头或检查请求参数来实现（这是可配置的；参见表 8-5）。确定内容类型后，解析器会咨询所有已配置的视图解析器，按名称收集候选视图。最后，它通过检查请求的内容类型是否受支持，来选择最佳匹配的视图。表
    8-5 显示了此视图解析器的可配置属性。


    ![Image](img/9781430241553_tab08-05.jpg)


    ![Image](img/square.jpg) **注意** 当使用多个视图解析器时，`ContentNegotiatingViewResolver` 必须具有最高优先级才能正常运行。默认情况下已设置此优先级，但如果您更改了
    `order`，请记住这一点。


    #### 实现你自己的 ViewResolver


    本节说明如何实现我们自己的视图解析器。我们将创建一个简单的实现，该实现从已配置视图的映射中解析视图名称。


    实现你自己的视图相当简单；只需创建一个类，让它实现 `ViewResolver` 接口（参见清单 8-1），并提供必要的实现。清单 8-10 展示了我们的
    `com.apress.prospringmvc.bookstore.web.view.SimpleConfigurableViewResolver`。


    ***清单 8-10.** SimpleConfigurableViewResolver*


    `package com.apress.prospringmvc.bookstore.web.view;`


    `// 其他导入已省略`

    `import org.springframework.web.servlet.View;`

    `import org.springframework.web.servlet.ViewResolver;`


    `public class SimpleConfigurableViewResolver implements ViewResolver {`


    `    private Map<String, ? extends View> views = new HashMap<String, View>();`


    `    @Override`

    `    public View resolveViewName(String viewName, Locale locale)`

    `    throws Exception {`

    `        return this.views.get(viewName);`

    `    }`


    `    public void setViews(Map<String, ? extends View> views) {`

    `        this.views = views;`

    `    }`

    `}`


    我们将在下一节中需要使用 PDF 和 Excel 视图时使用此实现。

