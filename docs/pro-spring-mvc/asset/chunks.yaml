    Currently, our account pages aren’t secure. For example, someone could simply
    change the id in the URL to see the content of another account. Let’s use the
    interceptor approach to apply security to our pages. We are going to create an
    interceptor that checks whether we are already logged in (our account is available
    in the HTTP session). If not, it will throw a `com.apress.prospringmvc.bookstore.service.AuthenticationException`
    (see [Listing 6-14](#Chapter06.html#list_6_14)). We will also store the original
    URL in a session attribute; that way, we can redirect the user to the URL he wants
    to visit after he logs in.


    ***Listing 6-14.** The SecurityHandlerInterceptor*


    `package com.apress.prospringmvc.bookstore.web.interceptor;`

    `// javax.servlet imports omitted`

    `import org.springframework.web.servlet.HandlerInterceptor;`

    `import org.springframework.web.servlet.handler.HandlerInterceptorAdapter;`

    `import org.springframework.web.util.WebUtils;`


    `import com.apress.prospringmvc.bookstore.domain.Account;`

    `import com.apress.prospringmvc.bookstore.service.AuthenticationException;`

    `import com.apress.prospringmvc.bookstore.web.controller.LoginController;`


    `public class SecurityHandlerInterceptor extends HandlerInterceptorAdapter {`


    `    @Override`

    `    public boolean preHandle(HttpServletRequest request,`

    `                             HttpServletResponse response,`

    `                             Object handler) throws Exception {`

    `        Account account= (Account) WebUtils.getSessionAttribute(`

    `                                request, LoginController.ACCOUNT_ATTRIBUTE);`

    `        if (account == null) {`

    `            //Retrieve and store the original URL.`

    `            String url = request.getRequestURL().toString();`

    `            WebUtils.setSessionAttribute(`

    `                         request, LoginController.REQUESTED_URL, url);`

    `            throw new AuthenticationException(`

    `                 "Authentication required.", "authentication.required");`

    `        }`

    `        return true;`

    `    }`


    `}`


