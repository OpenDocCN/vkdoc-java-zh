- fmt: "### Resource Loading\n\n[Table 2-2](#Chapter02.html#tab_2_2) provided an overview\
    \ of the different `ApplicationContext` implementations and the default resource\
    \ loading mechanisms. However, this doesn’t mean that we are restricted to loading\
    \ resources only from the default locations. We also have the option to load resources\
    \ from specific locations by including the proper prefix (see [Table 2-3](#Chapter02.html#tab_2_3)).\n\
    \n![Image](images/tab_2_3.jpg)\n\n[Listing 2-7](#Chapter02.html#list_2_7) shows\
    \ bootstrapping code that uses an application context implementation that loads\
    \ from the classpath by default. We could also have used an implementation that\
    \ loads from the file system by default, but loads from the classpath when the\
    \ proper prefix is used (see [Listing 2-8](#Chapter02.html#list_2_8)).\n\n***Listing\
    \ 2-8.** Using prefixes to load resources in MoneyTransferSpringFileSystem*\n\n\
    ```\npackage com.apress.prospringmvc.moneytransfer.annotation;\n\nimport org.springframework.context.support.FileSystemXmlApplicationContext;\n\
    \n// Other imports ommitted see Listing 2-7\n\npublic class MoneyTransferSpringFileSystem\
    \ {\n\n    private static final Logger logger = LoggerFactory.getLogger\n    (MoneyTransferSpringFileSystem.class);\n\
    \n    public static void main(String[] args) {\n\n        ApplicationContext ctx1\
    \ = new AnnotationConfigApplicationContext(\n                                \
    \    ApplicationContextConfiguration.class);\n        transfer(ctx1);\n\n    \
    \    ApplicationContext ctx2 = new FileSystemXmlApplicationContext(\n        \
    \        \"classpath:/com/apress/prospringmvc/moneytransfer/annotation\n/application-context.xml\"\
    );\n        transfer(ctx2);\n\n        ApplicationContextLogger.log(ctx1);\n \
    \       ApplicationContextLogger.log(ctx2);\n    }\n  // transfer method ommitted\
