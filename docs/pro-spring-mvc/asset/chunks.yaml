    #### 面向切面编程


    为了启用表 2-4 中列出的特性，Spring 使用了面向切面编程（AOP）。AOP 是另一种思考软件结构的方式。它使你能够将事务管理或性能日志记录等跨越多种类型和对象的功能（横切关注点）模块化。在
    AOP 中，有几个重要的概念需要牢记（参见表 2-7）。


    ![图片](img/tab_2_7.jpg)


    现在让我们来看看事务管理，以及 Spring 如何使用 AOP 在方法周围应用事务。事务通知或拦截器是 `org.springframework.transaction.interceptor.TransactionInterceptor`。该通知被放置在带有
    `org.springframework.transaction.annotation.Transactional` 注解的方法周围。为此，Spring 会在实际对象周围创建一个包装器，这被称为*代理*（参见图
    2-5）。代理就像一个封装对象，但它允许添加（动态）行为（在此例中为方法的事务性）。


    ![图片](img/9781430241553_Fig02-05.jpg)


    ***图 2-5.** 代理方法调用*


    `org.springframework.transaction.annotation.EnableTransactionManagement` 注解会注册包含切入点（作用于
    `org.springframework.transaction.annotation.Transactional` 注解）的 Bean。此时，拦截器已准备好供我们使用。其他用于启用特性的注解工作方式类似；它们注册
    Bean 以启用所需特性，包括大多数特性所需的 AOP（以及由此产生的代理创建）。


    ### Web 应用程序


    那么，上述所有技术如何应用于 Web 应用程序呢？例如，应用程序上下文扮演什么角色？还有所有其他提到的东西呢？


    在开发 Web 应用程序时，我们拥有实际的业务逻辑（例如，我们的服务、仓库和基础设施信息），以及基于 Web 的 Bean。这些东西应该被分离，因此我们需要拥有多个应用程序上下文，并在它们之间建立关系。


    我们还需要引导应用程序的代码，否则什么都不会发生。在本章的示例中，我们使用了一个带有 `main` 方法的 `MoneyTransferSpring` 类来启动应用程序上下文。这在
    Web 环境中是无法做到的。Spring 提供了两个可以引导应用程序的组件：`org.springframework.web.servlet.DispatcherServlet`
    和 `org.springframework.web.context.ContextLoaderListener`。这两个组件都会引导和配置一个应用程序上下文。


    让我们看一下配置 `DispatcherServlet` 的类。这是 `com.apress.prospringmvc.bookstore.web.BookstoreWebApplicationInitializer`
    类（参见清单 2-12）。这个类会被我们的 Servlet 3.0 容器检测到，并用于初始化我们的应用程序（有关此主题的更多信息，请参见第 3 章）。我们创建
    `DispatcherServlet` 并将 `org.springframework.web.context.support.AnnotationConfigWebApplicationContext`
    传递给它。接下来，我们将 Servlet 映射到所有内容（“/”），并告诉它在启动时加载。


    ***清单 2-12.** BookstoreWebApplicationInitializer 类*


    `package com.apress.prospringmvc.bookstore.web;`


    `import javax.servlet.ServletContext;`

    `import javax.servlet.ServletException;`

    `import javax.servlet.ServletRegistration;`


    `import org.springframework.web.WebApplicationInitializer;`

    `import org.springframework.web.context.WebApplicationContext;`

    `import org.springframework.web.context.support.AnnotationConfigWebApplicationContext;`

    `import org.springframework.web.servlet.DispatcherServlet;`


    `import com.apress.prospringmvc.bookstore.web.config.WebMvcContextConfiguration;`


    `public class BookstoreWebApplicationInitializer implements WebApplicationInitializer
    {`


    `    @Override`

    `    public void onStartup(final ServletContext servletContext) throws ServletException
    {`

    `        registerDispatcherServlet(servletContext);`

    `    }`


    **`    private void registerDispatcherServlet(final ServletContext servletContext)
    {`**

    **`        WebApplicationContext dispatcherContext = createContext`![图片](img/U002.jpg)**

    **`(WebMvcContextConfiguration.class);`**

    **`        DispatcherServlet dispatcherServlet = new DispatcherServlet(dispatcherContext);`**

    **`        ServletRegistration.Dynamic dispatcher = servletContext.addServlet`![图片](img/U002.jpg)**

    **`("dispatcher", dispatcherServlet);`**

    **`        dispatcher.setLoadOnStartup(1);`**

    **`        dispatcher.addMapping("/");`**

    **`    }`**


    `private WebApplicationContext createContext(final Class<?>... annotatedClasses)
    {`

