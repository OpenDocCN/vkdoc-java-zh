- fmt: "### Validating Model Attributes\n\nWe’ve already mentioned validation a couple\
    \ of times. We’ve also referred to the `org.springframework.validation` package\
    \ a couple of times. Validating our model attributes is quite easy to accomplish\
    \ with the validation abstraction from the Spring Framework. Validation isn’t\
    \ bound to the web; it is about validating objects. Therefore, validation can\
    \ also be used outside the web layer; in fact, it can be used anywhere.\n\nThe\
    \ main abstraction for validation is the `org.springframework.validation.Validator`\
    \ interface. This interface has two callback methods. The `supports` method is\
    \ used to determine if the validator instance can validate the object. The `validate`\
    \ method is used to actually validate the object (see [Listing 5-43](#Chapter05.html#list_5_43)).\n\
    \n**Listing 5-43.** The `Validator` Interface\n\n```\npackage org.springframework.validation;\n\
    \npublic interface Validator {\n\n    boolean supports(Class<?> clazz);\n\n  \
    \  void validate(Object target, Errors errors);\n}\n```\n\nThe `supports` method\
    \ is called to see if a validator can validate the current object type. If that\
    \ returns `true`, the framework will call the `validate` method with the object\
    \ to validate and an instance of an implementation of the `org.springframework.validation.Errors`\
    \ interface. When doing binding, this will be an implementation of the `org.springframework.validation.BindingResult`.\
    \ When doing validation, it is a good idea to include an `Errors` or `BindingResult`\
    \ (the latter extends `Errors`) method attribute. This way, we can handle situations\
    \ where there is a bind or validation error. If this is not the case, an `org.springframework.validation.BindException`\
    \ will be thrown.\n\nWhen using Spring @MVC, we have two options for triggering\
    \ validation. The first is to inject the validator into our controller and to\
    \ call the `validate` method on the validator ourselves. The second is to add\
    \ the `javax.validation.Valid` (JSR-303) or `org.springframework.validation.annotation.Validated`\
    \ annotation to our method attribute. The annotation from the Spring Framework\
    \ is more powerful than the one from the `javax.validation` package. The Spring\
    \ annotation enables us to specify *hints*; when combined with a JSR-303 validator\
    \ (e.g., `hibernate-validation`), can be used to specify validation groups.\n\n\
    Validation and bind errors lead to message codes that are registered with the\
    \ `Errors` instance. In general, simply showing an error code to the user isn’t\
    \ very informative, so the code has to be resolved to a message. This is where\
    \ the `org.springframework.context.MessageSource` comes into play. The error codes\
    \ are passed as message codes to the configured message source and used to retrieve\
    \ the message. If we don’t configure a message source, we will be greeted with\
    \ a nice stacktrace indicating that a message for code x cannot be found. So,\
    \ before we proceed, let’s configure the `MessageSource` shown in [Listing 5-44](#Chapter05.html#list_5_44).\n\
    \n**Listing 5-44.** The `MessageSource` Configuration\n\n```\npackage com.apress.prospringmvc.bookstore.web.config;\n\
    \nimport org.springframework.context.support.ResourceBundleMessageSource;\n//\
    \ Other imports omitted\n\n@Configuration\n@EnableWebMvc\n@ComponentScan(basePackages\
    \ = { \"com.apress.prospringmvc.bookstore.web\" })\npublic class WebMvcContextConfiguration\
    \ extends WebMvcConfigurerAdapter {\n\n    @Bean\n    public MessageSource messageSource()\
    \ {\n        ResourceBundleMessageSource messageSource;\n        messageSource\
    \ = new ResourceBundleMessageSource();\n        messageSource.setBasename(\"messages\"\
    );\n        messageSource.setUseCodeAsDefaultMessage(true);\n        return messageSource;\n\
    \    }\n    // Other methods omitted\n}\n```\n\nWe configure a message source,\
    \ and then configure it to load a resource bundle with basename messages (we’ll\
    \ learn more about this in the “Internationalization” section later in this chapter).\
    \ When a message is not found, we return the code as the message. This is especially\
    \ useful during development because we can quickly see which message codes are\
    \ missing from our resource bundles.\n\nLet’s implement validation for our `com.apress.prospringmvc.bookstore.domain.Account`\
    \ class. We want to validate whether an account is valid; and for that, we need\
    \ a username, password and a valid e-mail address. To be able to handle shipping,\
    \ we also need an address, city, and country. Without this information, the account\
    \ isn’t valid. Now let’s see how we can use the validation framework to our advantage."
  raw: '#### Validating Model Attributes


    We’ve already mentioned validation a couple of times. We’ve also referred to the
    `org.springframework.validation` package a couple of times. Validating our model
    attributes is quite easy to accomplish with the validation abstraction from the
    Spring Framework. Validation isn’t bound to the web; it is about validating objects.
    Therefore, validation can also be used outside the web layer; in fact, it can
    be used anywhere.


    The main abstraction for validation is the `org.springframework.validation.Validator`
    interface. This interface has two callback methods. The `supports` method is used
    to determine if the validator instance can validate the object. The `validate`
    method is used to actually validate the object (see [Listing 5-43](#Chapter05.html#list_5_43)).


    ***Listing 5-43.** The Validator Interface*


    `package org.springframework.validation;`


    `public interface Validator {`


    `    boolean supports(Class<?> clazz);`


    `    void validate(Object target, Errors errors);`

    `}`


    The `supports` method is called to see if a validator can validate the current
    object type. If that returns `true`, the framework will call the `validate` method
    with the object to validate and an instance of an implementation of the `org.springframework.validation.Errors`
    interface. When doing binding, this will be an implementation of the `org.springframework.validation.BindingResult`.
    When doing validation, it is a good idea to include an `Errors` or `BindingResult`
    (the latter extends `Errors`) method attribute. This way, we  can handle situations
    where there is a bind or validation error. If this is not the case, an `org.springframework.validation.BindException`
    will be thrown.


    When using Spring @MVC, we have two options for triggering validation. The first
    is to inject the validator into our controller and to call the `validate` method
    on the validator ourselves. The second is to add the `javax.validation.Valid`
    (JSR-303) or `org.springframework.validation.annotation.Validated` annotation
    to our method attribute. The annotation from the Spring Framework is more powerful
    than the one from the `javax.validation` package. The Spring annotation enables
    us to specify *hints*; when combined with a JSR-303 validator (e.g., `hibernate-validation`),
    can be used to specify validation groups.


    Validation and bind errors lead to message codes that are registered with the
    `Errors` instance. In general, simply showing an error code to the user isn’t
    very informative, so the code has to be resolved to a message. This is where the
    `org.springframework.context.MessageSource` comes into play. The error codes are
    passed as message codes to the configured message source and used to retrieve
    the message. If we don’t configure a message source, we will be greeted with a
    nice stacktrace indicating that a message for code x cannot be found. So, before
    we proceed, let’s configure the `MessageSource` shown in [Listing 5-44](#Chapter05.html#list_5_44).


    ***Listing 5-44.** The MessageSource Configuration*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `import org.springframework.context.support.ResourceBundleMessageSource;`

    `// Other imports omitted`


    `@Configuration`

    `@EnableWebMvc`

    `@ComponentScan(basePackages = { "com.apress.prospringmvc.bookstore.web" })`

    `public class WebMvcContextConfiguration extends WebMvcConfigurerAdapter {`


    `@Bean`

    `    public MessageSource messageSource() {`

    `        ResourceBundleMessageSource messageSource;`

    `        messageSource = new ResourceBundleMessageSource();`

    `        messageSource.setBasename("messages");`

    `        messageSource.setUseCodeAsDefaultMessage(true);`

    `        return messageSource;`

    `    }`

    `    // Other methods omitted`

    `}`


    We configure a message source, and then configure it to load a resource bundle
    with basename messages (we’ll learn more about this in the “Internationalization”
    section later in this chapter). When a message is not found, we return the code
    as the message. This is especially useful during development because we can quickly
    see which message codes are missing from our resource bundles.


    Let’s implement validation for our `com.apress.prospringmvc.bookstore.domain.Account`
    class. We want to validate whether an account is valid; and for that, we need
    a username, password and a valid e-mail address. To be able to handle shipping,
    we also need an address, city, and country. Without this information, the account
    isn’t valid. Now let’s see how we can use the validation framework to our advantage.'
  trans: '

    #### 验证模型属性


    我们之前已经多次提到过验证。我们也多次引用了 `org.springframework.validation` 包。使用 Spring 框架的验证抽象来验证我们的模型属性相当容易。验证并不局限于
    Web 层；它关乎对象的验证。因此，验证也可以在 Web 层之外使用；事实上，它可以在任何地方使用。


    验证的主要抽象是 `org.springframework.validation.Validator` 接口。该接口有两个回调方法。`supports` 方法用于确定验证器实例是否可以验证该对象。`validate`
    方法用于实际验证对象（参见 清单 5-43）。


    ***清单 5-43.** Validator 接口*


    `package org.springframework.validation;`


    `public interface Validator {`


    `    boolean supports(Class<?> clazz);`


    `    void validate(Object target, Errors errors);`

    `}`


    调用 `supports` 方法是为了检查验证器是否可以验证当前对象类型。如果返回 `true`，框架将调用 `validate` 方法，并传入要验证的对象以及
    `org.springframework.validation.Errors` 接口实现的一个实例。在进行绑定时，这将是 `org.springframework.validation.BindingResult`
    的一个实现。在进行验证时，最好包含一个 `Errors` 或 `BindingResult`（后者扩展了 `Errors`）方法属性。这样，我们就可以处理存在绑定或验证错误的情况。如果不是这种情况，则会抛出
    `org.springframework.validation.BindException`。


    使用 Spring @MVC 时，我们有两种触发验证的选项。第一种是将验证器注入到我们的控制器中，然后自行调用验证器上的 `validate` 方法。第二种是向我们的方法属性添加
    `javax.validation.Valid`（JSR-303）或 `org.springframework.validation.annotation.Validated`
    注解。Spring 框架的注解比 `javax.validation` 包中的注解更强大。Spring 注解使我们能够指定*提示*；当与 JSR-303 验证器（例如
    `hibernate-validation`）结合使用时，可用于指定验证组。


    验证和绑定错误会导致消息代码注册到 `Errors` 实例中。通常，仅向用户显示错误代码信息量不大，因此需要将代码解析为消息。这就是 `org.springframework.context.MessageSource`
    发挥作用的地方。错误代码作为消息代码传递给配置的消息源，并用于检索消息。如果我们没有配置消息源，将会看到一个友好的堆栈跟踪，指示找不到代码 x 的消息。因此，在继续之前，让我们配置
    清单 5-44 中所示的 `MessageSource`。


    ***清单 5-44.** MessageSource 配置*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `import org.springframework.context.support.ResourceBundleMessageSource;`

    `// 其他导入已省略`


    `@Configuration`

    `@EnableWebMvc`

    `@ComponentScan(basePackages = { "com.apress.prospringmvc.bookstore.web" })`

    `public class WebMvcContextConfiguration extends WebMvcConfigurerAdapter {`


    `@Bean`

    `    public MessageSource messageSource() {`

    `        ResourceBundleMessageSource messageSource;`

    `        messageSource = new ResourceBundleMessageSource();`

    `        messageSource.setBasename("messages");`

    `        messageSource.setUseCodeAsDefaultMessage(true);`

    `        return messageSource;`

    `    }`

    `    // 其他方法已省略`

    `}`


    我们配置了一个消息源，然后将其配置为加载一个基本名称为 messages 的资源包（我们将在本章后面的“国际化”部分了解更多信息）。当找不到消息时，我们将代码本身作为消息返回。这在开发期间特别有用，因为我们可以快速查看资源包中缺少哪些消息代码。


    让我们为 `com.apress.prospringmvc.bookstore.domain.Account` 类实现验证。我们想要验证一个账户是否有效；为此，我们需要用户名、密码和一个有效的电子邮件地址。为了能够处理发货，我们还需要地址、城市和国家。没有这些信息，账户就是无效的。现在让我们看看如何利用验证框架来为我们服务。

    '
- fmt: "### Implementing Our Own Validator\n\nWe’ll begin by implementing our own\
    \ validator. In this case, we will create a `com.apress.prospringmvc.bookstore.validation.AccountValidator`\
    \ (see [Listing 5-45](#Chapter05.html#list_5_45)) and use an init-binder method\
    \ to configure it.\n\n**Listing 5-45.** The `AccountValidator` Implementation\n\
    \n```\npackage com.apress.prospringmvc.bookstore.validation;\n\nimport java.util.regex.Pattern;\n\
    \nimport org.springframework.validation.Errors;\nimport org.springframework.validation.ValidationUtils;\n\
    import org.springframework.validation.Validator;\n\nimport com.apress.prospringmvc.bookstore.domain.Account;\n\
    \npublic class AccountValidator implements Validator {\n\n    private static final\
    \ String EMAIL_PATTERN =\n    \"^[_A-Za-z0-9-]+(\\\\.[_A-Za-z0-9-]+)*@\"\n   \
    \ +\"[A-Za-z0-9]+(\\\\.[A-Za-z0-9]+)*(\\\\.[A-Za-z]{2,})$\";\n\n    @Override\n\
    \    public boolean supports(Class<?> clazz) {\n        return (Account.class).isAssignableFrom(clazz);\n\
    \    }\n\n    @Override\n    public void validate(Object target, Errors errors)\
    \ {\n        ValidationUtils.rejectIfEmpty(errors, \"username\",\n           \
    \                       \"required\", new Object[] {\"Username\"});\n        ValidationUtils.rejectIfEmpty(errors,\
    \ \"password\",\n                                  \"required\", new Object[]\
    \ {\"Password\"});\n        ValidationUtils.rejectIfEmpty(errors, \"emailAddress\"\
    ,\n                                  \"required\", new Object[] {\"Email Address\"\
    });\n        ValidationUtils.rejectIfEmpty(errors, \"address.street\",\n     \
    \                             \"required\", new Object[] {\"Street\"});\n    \
    \    ValidationUtils.rejectIfEmpty(errors, \"address.city\",\n               \
    \                   \"required\", new Object[] {\"City\"});\n        ValidationUtils.rejectIfEmpty(errors,\
    \ \"address.country\",\n                                  \"required\", new Object[]\
    \ {\"Country\"});\n\n        if (!errors.hasFieldErrors(\"emailAddress\")) {\n\
    \            Account account = (Account) target;\n            String email = account.getEmailAddress();\n\
    \            if (!emai.matches(EMAIL_PATTERN)) {\n                errors.rejectValue(\"\
    emailAddress\", \"invalid\");\n            }\n        }\n    }\n}\n```\n\n![Image](images/square.jpg)\
    \ **Note** Specifying `requiredFields` on the `org.springframework.web.bind.WebDataBinder`\
    \ would result in the same validation logic as with the `ValidationUtils.rejectIfEmptyOrWhiteSpace`.\
    \ In our case, however, we have all the validation logic in one place, rather\
    \ than having it spread over two places.\n\nThis validator implementation will\
    \ check if the fields are not `null` and non-empty. If the field is empty, it\
    \ will register an error for the given field. The error is a collection of message\
    \ codes, and this collection of message codes is determined by an `org.springframework.validation.MessageCodesResolver`\
    \ implementation. The default implementation, `org.springframework.validation.DefaultMessageCodesResolver`,\
    \ will resolve to four different codes (see [Table 5-21](#Chapter05.html#tab_5_21)).\
    \ The order in the table is also the order in which the error codes are resolved\
    \ to a proper message.\n\n![Image](images/tab_5_21.jpg)\n\nThe final part of this\
    \ validation is that we need to configure our validator and tell the controller\
    \ to validate our model attribute on submission. In [Listing 5-46](#Chapter05.html#list_5_46),\
    \ we show the modified order controller. We only want to trigger validation on\
    \ the final submission of our form.\n\n**Listing 5-46.** The `RegistrationController`\
    \ with Validation\n\n```\npackage com.apress.prospringmvc.bookstore.web.controller;\n\
    \nimport com.apress.prospringmvc.bookstore.domain.AccountValidator;\n\nimport\
    \ javax.validation.Valid;\n// Other imports omitted\n\n@Controller\n@RequestMapping(\"\
    /customer/register\")\npublic class RegistrationController {\n\n    @InitBinder\n\
    \    public void initBinder(WebDataBinder binder) {\n        binder.setDisallowedFields(\"\
    id\");\n        binder.setValidator(new AccountValidator());\n    }\n\n    @RequestMapping(method\
    \ = { RequestMethod.POST, RequestMethod.PUT })\n    public String handleRegistration(@Valid\
    \ @ModelAttribute Account account, BindingResult\n result) {\n        if (result.hasErrors())\
    \ {\n            return \"customer/register\";\n        }\n        this.accountService.save(account);\n\
    \        return \"redirect:/customer/account/\" + account.getId();\n    }\n\n\
    \    // Other methods omitted\n}\n```\n\nIf we submit illegal values after redeployment,\
    \ we will be greeted with some error codes, as shown in [Figure 5-9](#Chapter05.html#fig_5_9).\n\
    \n![Image](images/9781430241553_Fig05-09.jpg)\n\n**Figure 5-9.** The registration\
    \ page with error codes\n\n### Using JSR-303 Validation\n\nInstead of implementing\
    \ our own validator, we could also use the JSR-303 annotations to add validation.\
    \ For this, we would only need to annotate our `com.apress.prospringmvc.bookstore.domain.Account`\
    \ object with JSR-303 annotations (see [Listing 5-47](#Chapter05.html#list_5_47))\
    \ and then leave the `javax.validation.Valid` annotation in place. When using\
    \ these annotations, the error code used is slightly different than the one used\
    \ in our custom validator (see [Table 5-22](#Chapter05.html#tab_5_22)). However,\
    \ the registration page doesn’t need to change, so it remains the same as before.\
    \ In our init-binder method, we do not need to set the validator because a JSR-303\
    \ capable validator is automatically detected (the sample project uses the one\
    \ from Hibernate).\n\n**Listing 5-47.** An `Account` with JSR-303 Annotations\n\
    \n```\npackage com.apress.prospringmvc.bookstore.domain;\n\nimport java.io.Serializable;\n\
    import java.util.ArrayList;\nimport java.util.Date;\nimport java.util.List;\n\n\
    import javax.persistence.CascadeType;\nimport javax.persistence.Embedded;\nimport\
    \ javax.persistence.Entity;\nimport javax.persistence.GeneratedValue;\nimport\
    \ javax.persistence.GenerationType;\nimport javax.persistence.Id;\nimport javax.persistence.ManyToMany;\n\
    import javax.validation.Valid;\n\nimport org.hibernate.validator.constraints.Email;\n\
    import org.hibernate.validator.constraints.NotEmpty;\n\n@Entity\npublic class\
    \ Account implements Serializable {\n\n    @Id\n    @GeneratedValue(strategy =\
    \ GenerationType.AUTO)\n    private Long id;\n\n    private String firstName;\n\
    \    private String lastName;\n\n    private Date dateOfBirth;\n\n    @Embedded\n\
    \    @Valid\n    private Address address = new Address();\n\n    @NotEmpty\n \
    \   @Email\n    private String emailAddress;\n    @NotEmpty\n    private String\
    \ username;\n    @NotEmpty\n    private String password;\n\n    // getters and\
    \ setters omitted\n}\n```\n\n![Image](images/square.jpg) **Note** The `NotEmpty`\
    \ and `Email` annotations come from the `org.hibernate.validator.constraints`\
    \ package; thus this package is not a standard JSR-303 annotation, but an extension\
    \ to it.\n\n![Image](images/tab_5_22.jpg)\n\nWhen using JSR-303 annotations, if\
    \ we submit the form with invalid values, we get a result like the one shown in\
    \ [Figure 5-10](#Chapter05.html#fig_5_10). As we can see, there are messages displayed\
    \ instead of codes. How is that possible? There are some default messages shipped\
    \ with the validator implementation we use. We can override these if we want by\
    \ specifying one of the codes from [Table 5-22](#Chapter05.html#tab_5_22) in our\
