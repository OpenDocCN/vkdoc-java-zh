- fmt: "### Formatters\n\nThe Converter API is a general purpose type-conversion system.\
    \ It is strongly typed and can convert from any object type to another object\
    \ type (if there is a converter available). However, this is not something we\
    \ need in our web environment because we only deal with `String` objects there.\
    \ On the other hand, we probably want to represent our objects as `String` to\
    \ the client, and we might even want to do so in a localized way. This is where\
    \ the Formatter API comes in (see [Listing 5-34](#Chapter05.html#list_5_34)).\
    \ It provides a simple and robust mechanism to convert from a `String` to a strongly\
    \ typed object. It is an alternative to property editors, but it is also lighter\
    \ (e.g., it doesn’t depend on the `java.beans` package) and more flexible (e.g,\
    \ it has access to the Locale for localized content).\n\n**Listing 5-34.** The\
    \ Formatter API\n\n```\npackage org.springframework.format;\n\npublic interface\
    \ Formatter<T> extends Printer<T>, Parser<T> {\n}\n\nimport java.util.Locale\n\
    \npublic interface Printer<T> {\n    String print(T object, Locale locale);\n\
    }\n\nimport java.util.Locale\nimport java.text.ParseException;\n\npublic interface\
    \ Parser<T> {\n    T parse(String text, Locale locale) throws ParseException;\n\
    }\n```\n\nTo create a formatter, we need to implement the `org.springframework.format.Formatter`\
    \ interface and specify the type `T` as the type we want to convert. For example,\
    \ imagine we had a formatter that could convert `Date` instances to text, and\
    \ vice-versa. We would specify `T` as `Date` and use the `Locale` to determine\
    \ the specific date format to use for performing the conversion (see [Listing\
    \ 5-35](#Chapter05.html#list_5_35)).\n\n**Listing 5-35.** The Sample DateFormatter\n\
    \n```\npackage com.apress.prospringmvc.bookstore.formatter;\n\n// java.text and\
    \ java.util imports omitted\n\nimport org.springframework.format.Formatter;\n\
    import org.springframework.util.StringUtils;\n\npublic class DateFormatter implements\
    \ Formatter<Date> {\n\n    private String format;\n\n    @Override\n    public\
    \ String print(Date object, Locale locale) {\n        return getDateFormat(locale).format(object);\n\
    \    }\n\n    @Override\n    public Date parse(String text, Locale locale) throws\
    \ ParseException {\n        return getDateFormat(locale).parse(text);\n    }\n\
    \n    private DateFormat getDateFormat(Locale locale) {\n        if (StringUtils.hasText(this.format))\
    \ {\n            return new SimpleDateFormat(this.format, locale);\n        }\
    \ else {\n            return SimpleDateFormat.getDateInstance(SimpleDateFormat.MEDIUM,\
    \ locale);\n        }\n    }\n\n    public void setFormat(String format) {\n \
    \       this.format = format;\n    }\n}\n```\n\nFormatters can also be driven\
    \ by annotations instead of by field type. If we want to bind a formatter to an\
    \ annotation, we have to implement the `org.springframework.format.AnnotationFormatterFactory`\
    \ (see [Listing 5-36](#Chapter05.html#list_5_36)).\n\n**Listing 5-36.** The AnnotationFormatterFactory\n\
    \n```\npackage org.springframework.format;\n\npublic interface AnnotationFormatterFactory<A\
    \ extends Annotation> {\n\n    Set<Class<?>> getFieldTypes();\n\n    Printer<?>\
    \ getPrinter(A annotation, Class<?> fieldType);\n\n    Parser<?> getParser(A annotation,\
    \ Class<?> fieldType);\n}\n```\n\nWe need to parameterize `A` with the annotation\
    \ type we want to associate with it. The `getPrinter` and `getParser` methods\
    \ should return an `org.springframework.format.Printer` and `org.springframework.format.Parser`,\
    \ respectively. We can then use these to convert from or to the annotation type.\
    \ Let’s imagine we have a `com.apress.prospringmvc.bookstore.formatter.DateFormat`\
    \ annotation that we can use to set the format for a `date` field. We could then\
    \ implement the factory shown in [Listing 5-37](#Chapter05.html#list_5_37).\n\n\
    **Listing 5-37.** The DateFormatAnnotationFormatterFactory\n\n```\npackage com.apress.prospringmvc.bookstore.formatter;\n\
    \nimport java.util.Date;\nimport java.util.HashSet;\nimport java.util.Set;\n\n\
    import org.springframework.format.AnnotationFormatterFactory;\nimport org.springframework.format.Parser;\n\
    import org.springframework.format.Printer;\n\npublic class DateFormatAnnotationFormatterFactory\
    \ implements\n    AnnotationFormatterFactory<DateFormat> {\n\n    @Override\n\
    \    public Set<Class<?>> getFieldTypes() {\n        Set<Class<?>> types = new\
    \ HashSet<Class<?>>(1);\n        types.add(Date.class);\n        return types;\n\
    \    }\n\n    @Override\n    public Printer<?> getPrinter(DateFormat annotation,\
    \ Class<?> fieldType) {\n        return createFormatter(annotation);\n    }\n\n\
    \    @Override\n    public Parser<?> getParser(DateFormat annotation, Class<?>\
    \ fieldType) {\n        return createFormatter(annotation);\n    }\n\n    private\
    \ DateFormatter createFormatter(DateFormat annotation) {\n        DateFormatter\
    \ formatter = new DateFormatter();\n        formatter.setFormat(annotation.format());\n\
    \        return formatter;\n    }\n}\n```"
  raw: '##### Formatters


    The Converter API is a general purpose type-conversion system. It is strongly
    typed and can convert from any object type to another object type (if there is
    a converter available). However, this is not something we need in our web environment
    because we only deal with `String` objects there. On the other hand, we probably
    want to represent our objects as `String` to the client, and we might even want
    to do so in a localized way. This is where the Formatter API comes in (see [Listing
    5-34](#Chapter05.html#list_5_34)). It provides a simple and robust mechanism to
    convert from a `String` to a strongly typed object. It is an alternative to property
    editors, but it is also lighter (e.g., it doesn’t depend on the `java.beans` package)
    and more flexible (e.g, it has access to the Locale for localized content).


    ***Listing 5-34.** The Formatter API*


    `package org.springframework.format;`


    `public interface Formatter<T> extends Printer<T>, Parser<T> {`

    `}`


    `import java.util.Locale`


    `public interface Printer<T> {`

    `    String print(T object, Locale locale);`

    `}`


    `import java.util.Locale`

    `import java.text.ParseException;`


    `public interface Parser<T> {`

    `    T parse(String text, Locale locale) throws ParseException;`

    `}`


    To create a formatter, we need to implement the `org.springframework.format.Formatter`
    interface and specify the type `T` as the type we want to convert. For example,
    imagine we had a formatter that could convert `Date` instances to text, and vice-versa.
    We would specify `T` as `Date` and use the `Locale` to determine the specific
    date format to use for performing the conversion (see [Listing 5-35](#Chapter05.html#list_5_35)).


    ***Listing 5-35.** The Sample DateFormatter*


    `package com.apress.prospringmvc.bookstore.formatter;`


    `// java.text and java.util imports omitted`


    `import org.springframework.format.Formatter;`

    `import org.springframework.util.StringUtils;`


    `public class DateFormatter implements Formatter<Date> {`


    `    private String format;`


    `    @Override`

    `    public String print(Date object, Locale locale) {`

    `        return getDateFormat(locale).format(object);`

    `    }`


    `    @Override`

    `    public Date parse(String text, Locale locale) throws ParseException {`

    `        return getDateFormat(locale).parse(text);`

    `    }`


    `    private DateFormat getDateFormat(Locale locale) {`

    `        if (StringUtils.hasText(this.format)) {`

    `            return new SimpleDateFormat(this.format, locale);`

    `        } else {`

    `            return SimpleDateFormat.getDateInstance(SimpleDateFormat.MEDIUM,
    locale);`

    `        }`

    `    }`


    `    public void setFormat(String format) {`

    `        this.format = format;`

    `    }`

    `}`


    Formatters can also be driven by annotations instead of by field type. If we want
    to bind a formatter to an annotation, we have to implement the `org.springframework.format.AnnotationFormatterFactory`
    (see [Listing 5-36](#Chapter05.html#list_5_36)).


    ***Listing 5-36.** The AnnotationFormatterFactory*


    `package org.springframework.format;`


    `public interface AnnotationFormatterFactory<A extends Annotation> {`


    `    Set<Class<?>> getFieldTypes();`


    `    Printer<?> getPrinter(A annotation, Class<?> fieldType);`


    `    Parser<?> getParser(A annotation, Class<?> fieldType);`

    `}`


    We need to parameterize `A` with the annotation type we want to associate with
    it. The `getPrinter` and `getParser` methods should return an `org.springframework.format.Printer`
    and `org.springframework.format.Parser`, respectively. We can then use these to
    convert from or to the annotation type. Let’s imagine we have a `com.apress.prospringmvc.bookstore.formatter.DateFormat`
    annotation that we can use to set the format for a `date` field. We could then
    implement the factory shown in [Listing 5-37](#Chapter05.html#list_5_37).


    ***Listing 5-37.** The DateFormatAnnotationFormatterFactory*


    `package com.apress.prospringmvc.bookstore.formatter;`


    `import java.util.Date;`

    `import java.util.HashSet;`

    `import java.util.Set;`


    `import org.springframework.format.AnnotationFormatterFactory;`

    `import org.springframework.format.Parser;`

    `import org.springframework.format.Printer;`


    `public class DateFormatAnnotationFormatterFactory implements`![Image](images/U002.jpg)

    ` AnnotationFormatterFactory<DateFormat> {`


    `    @Override`

    `    public Set<Class<?>> getFieldTypes() {`

    `        Set<Class<?>> types = new HashSet<Class<?>>(1);`

    `        types.add(Date.class);`

    `        return types;`

    `    }`


    `    @Override`

    `    public Printer<?> getPrinter(DateFormat annotation, Class<?> fieldType) {`

    `        return createFormatter(annotation);`

    `    }`


    `    @Override`

    `    public Parser<?> getParser(DateFormat annotation, Class<?> fieldType) {`

    `        return createFormatter(annotation);`

    `    }`


    `    private DateFormatter createFormatter(DateFormat annotation) {`

    `        DateFormatter formatter = new DateFormatter();`

    `        formatter.setFormat(annotation.format());`

    `        return formatter;`

    `    }`

    `}`'
