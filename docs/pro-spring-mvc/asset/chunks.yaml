- fmt: '# Managing Transactions from Within the Test


    Since we are going to write an integration test that will access our in-memory
    database (through the repository we are testing), we need to manage our transactions
    from within the test case. In our production code the transactions are managed
    by the services and not the repositories themselves. The repositories take part
    in the transaction started by the service. So in this case we need our test case
    to start the transaction, since we will be testing the repositories directly.
    We will do this by putting the `@Transactional` annotation on the test class,
    making each test method start a transaction first.


    When such an annotation is found the automatically registered `TransactionalTestExecutionListener`
    will assure a transaction *rollback* by default when the test method ends. As
    mentioned earlier in the chapter, `TransactionalTestExecutionListener` is one
    of the default listeners that are registered by the Spring’s test support. To
    give you a quick insight; these listeners (and all other possible registered `TestExecutionListener`’s)
    are invoked before (and after) a test method is executed. This listener in question
    will automatically mark the transaction for rollback after the test method ended.
    Remember, this is something specific to Spring’s test support. These listeners
    are not there when you boot your application context the normal way. So in a normal
    production scenario the transaction would commit when no exceptions occurred.


    Rolling back is actually the behavior you want. It means that CUD operations (Create,
    Update and Delete) will not modify data in our database. Allowing them to do so
    would be the least desirable approach, since that might create data dependencies
    between tests. When tests are changed, or for some reason the order in which tests
    are run is altered, some tests suddenly might start to fail because they depend
    on data being added by another test that has not yet run. The best pattern here
    is to insert the data you need on the method level and let the transaction roll
    back. This way the data is not persisted in the database and no traces remain.


    ![Image](images/square.jpg) **Note** When testing a repository, you will probably
    need some default data setup that can be used for each test method. Instead of
    repeating the same data setup over again for each test method, you can safely
    create this data in an `@Before` annotated method. This method will automatically
    run before each test method. It will also run in the same transaction as the test
    method itself, and hence data inserted, modified, or deleted will be rolled back
    the same way as with the test method that is being executed.


    This approach of automatically rolling back the transaction at the end of each
    test method also has a drawback. When using an ORM (Object Relational Mapping),
    rolling back works great for Read operations, since all queries have been sent
    to the database, giving you a complete coverage. However, when using an ORM like
    Hibernate (directly or via JPA), CUD operations might not be flushed. Hibernate
    does write-behind. It flushes statements to the database when it thinks the time
    has come or at least when the transaction commits. So while you called that method
    which triggered an update or insert statement, the statement might never be flushed
    to database when rolling back the transaction. In that case you never had the
    certainty the query was actually executed on the database. You have two options
    for handling this:


    > *   Let the transaction commit anyway. You can do this by adding `@Rollback(false)`
    on the test method. You can then create a tear-down method (`@After`) which removes
    the data you inserted.

    > *   Before the end of the test method, call `flush` on the `EntityManager` (in
    the case of JPA) to let it flush all outstanding statements to database. Remember
    that the transaction will roll back, so the changes will not remain persistent.
    But they have been received and verified by the database, so you are sure they
    will work.


    Choosing one of the two approaches is a matter of preference; both will yield
    the same result. The first approach requires you to have some additional code
    in the teardown method. The second approach is more automatic, but requires some
    more understanding of the ORM you are using. For the second solution you could
    also put the `flush` in a `@After` method, perhaps inherited from a superclass.


    As we mentioned before, the integration test doesn’t give a 100% guarantee. For
    starters, we are working against a different RDMBS than your actual target environment.
    When rolling back transactions instead of committing them, you’re increasing the
    possibility that something might go wrong when it actually commits. However, when
    applying any of the previously discussed strategies, it is very unlikely that
    this will happen. If you flush, all statements have been processed by the database,
    so there is normally no reason the commit will fail. Although in very specific
    scenarios there might still be something that goes wrong, chances of that are
    very small. The big advantage is that your tests remain independent and you will
    never have to figure out why suddenly 10 tests are starting to fail when you add
    another test that by itself is fully working. Your test set will also be resource-independent
    and run everywhere. It is clear that these are major advantages.


    ![Image](images/square.jpg) **Note** As you know, a big code base is hard to manage
    in terms of design, API, consistency and so on. Do not forget that your tests
    might even become a bigger code base than your actual production code. Take care
    of them and they will take care of you.'
