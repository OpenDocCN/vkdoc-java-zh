  trans: '

    ## 前言


    我至今仍记得 2004 年初次接触 Spring 框架时的情景。当时我大量使用 J2EE 和 Struts，在构建 Java 企业应用时，这些技术的有效运用让我遇到了诸多困难。Spring
    并没有试图完全摒弃 J2EE，而是通过提供大量最佳实践实现，以及一个将所有组件粘合在一起的控制反转容器，极大地简化并提升了 J2EE 的使用效率。这确实是一个令人振奋的方案！


    虽然 Spring 通常不会试图通过提供与 J2EE 现有组件或其他成熟框架（尤其是 Hibernate）竞争的解决方案来重新发明轮子，但有一个重要的例外：Web
    应用程序开发。Spring 自带了自己的 Web 框架——Spring MVC，这是一个功能完备的 Web 应用框架，可以直接作为 Struts 等框架的替代方案。当时，我看到了通过为
    Spring MVC 添加一个名为 Spring Web Flow 的页面流组件来增强基于 Spring 的 Web 应用开发的进一步机会。Spring MVC
    和 Spring Web Flow 正是本书的核心主题。


    Spring MVC 的设计受益于从早期框架中汲取的经验教训。灵活性和长期生产力是其核心设计目标。设计良好的 Spring MVC 应用能够成长和变化，同时保持可管理和可维护性。然而，并非一切尽善尽美。许多人发现采用
    Spring，特别是 Spring MVC 的初始学习曲线过于陡峭。Ruby on Rails 等新框架应运而生，它们专注于短期生产力，让开发者能够非常轻松地快速上手并运行。Spring
    开发者社区认识到了这一不足，而 Spring MVC 最近的 3.0 和 3.1 版本在很大程度上解决了这个问题：正如本书将展示的那样，大量使用约定优于配置和注解使得该框架比以往任何时候都更容易使用！这一切在保持
    100%向后兼容性的同时得以实现，这充分证明了 Spring MVC 的灵活性和设计质量。您现在拥有一个两全其美的框架：既易于上手，其支撑的底层原则又能带来长期回报。Spring
    Web Flow 目前也正在经历类似的演变。


    自 2004 年以来，Spring MVC 和 Spring Web Flow 的受欢迎程度稳步持续增长。它们现在已是成熟且完善的 Java 开发框架。如果您在这些框架之上构建
    Java Web 应用程序，可以放心，您正在一个非常坚实的基础上进行构建！


    在本书中，Marten 和 Koen 采用了一种实践性的方法来介绍 Spring MVC 和 Spring Web Flow。当然，他们会帮助您搭建高效的生产开发环境，并指导您开始使用
    Spring MVC 和 Web Flow 进行开发。但他们并未止步于此。我由衷赞赏他们不仅涵盖了技术细节，还花时间解释了许多底层概念，从而为您（读者）带来更深入的理解。此外，本书还涵盖了其他重要主题，例如实施安全约束以及确保您的
    Web 应用程序经过充分测试。阅读完本书后，您将能够很好地基于 Spring 技术开发真实的 Web 应用程序。


    我很高兴看到，时至今日，人们仍在受益于 Spring 以及我在 2004 年为其添加的那个小组件。我向所有渴望学习 Spring MVC 和 Spring
    Web Flow 的人强烈推荐这本书，并赞扬作者们在帮助开发者学习这些激动人心的 Spring 技术方面所做的出色工作。


    Erwin Vervaet


    Spring Web Flow 项目创始人


    ## 关于作者


    ![图片](img/marten_deinum.jpg) ![图片](img/square.jpg) **Marten Deinum** 是 Conspect
    公司的一名 Java/软件顾问。他为大小公司开发并设计了软件架构，主要使用 Java。他是一位热心的开源软件用户，也是 Spring 框架的长期粉丝、用户和倡导者。他曾担任过软件工程师、开发主管、教练以及
    Java 和 Spring 培训师等职位。在不工作或不在 Spring 框架论坛上回答问题的时候，他会在水中为铁人三项训练，或者在水下潜水或为他人做向导。


    ![图片](img/koen_serneels.jpg) ![图片](img/square.jpg) **Koen Serneels** 是一名高级 JAVA
    软件工程师，拥有多项 IBM、Cisco 和 Oracle 认证。十多年来，他使用 Java(EE)、Spring、Spring MVC、Web Flow、JSF
    和 Hibernate 开发企业解决方案。他对系统架构与集成、数据建模、关系数据库、安全和网络有着浓厚的兴趣。Koen 的职业生涯始于比利时联邦政府，他开发了具有遗留系统集成功能的高事务性
    Java 应用程序。目前，他受雇于惠普公司，担任比利时弗拉芒政府的 Java 软件顾问和技术负责人。他还在比利时鲁汶的 Groep T 工程学院教授一门名为“使用
    Java 进行软件开发”的研究生课程。


    ![图片](img/square.jpg) **Colin Yates** 是一位专攻基于 Web 开发的 J2EE 首席架构师。过去三年，他一直是自由顾问，曾在多种（既有结构化的也有混乱的）环境中工作。自
    1997 年获得软件工程学位以来，他担任过多个职位，包括开发主管、首席系统工程师、导师和专业培训师。他的主要技能包括指导他人、将复杂问题架构为可管理的解决方案，以及优化开发流程。


    Colin 于 2003 年 1 月由他的导师 Peter Den Haan 和 David Hewitt 首次引入 Spring 框架，此后便一直专注于该领域。


    ![图片](img/square.jpg) **Seth Ladd** 是一名软件工程师和专业 Spring 框架培训师及导师，专精于面向对象和可测试的 Web
    应用程序。他 17 岁时创办了自己的公司来构建网站，但现在更喜欢拥有一份正式的工作。Seth 目前受雇于 Camber Corporation，曾为 NEC、罗切斯特理工学院、Brivo
    Systems 和国家信息联盟构建并部署系统。他使用 Java 和 C 语言为服务器和远程连接的嵌入式设备设计并开发了企业应用程序。他乐于演讲和教学，经常在本地
    Java 用户组和企业开发者大会上担任演讲者。Seth 非常感激能与妻子一起在夏威夷凯鲁瓦生活和工作。


    ![图片](img/square.jpg) **Christophe Vanfleteren** 是一名软件工程师，自 2001 年以来一直从事 Java
    技术工作。在 EDS / HP 工作期间，他主要参与比利时弗拉芒政府的项目，包括一些大规模的事件驱动型应用，例如跟踪 2006 年弗拉芒选举的系统，以及向
    600 万人征收多种不同税种的弗拉芒税务平台。他能够处理技术栈的各个层面，从高事务性代码到基于 JavaScript 的前端。自 2010 年起，Christophe
    成为一名独立承包商。

