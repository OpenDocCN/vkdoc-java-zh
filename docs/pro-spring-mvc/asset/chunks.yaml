  trans: '

    #### 流程执行监听器方法


    `FlowExecutionListener` 接口定义了许多方法，可以在 Web Flow 执行（或即将执行）处理流程执行请求的不同步骤时通知您。例如，您可以在恢复或暂停执行、触发事件、执行操作等时获得回调。当回调方法过多且文档记录不佳时，它们会变得令人不悦。如果回调方法太少，您无法使用监听器捕获所需信息，使用起来也会令人不悦。在本小节中，您将找到每个回调方法的完整说明，以便您能够为特定任务做出正确选择。


    我们不建议您尝试记住所有这些方法；最好快速浏览一遍，以便了解有哪些可能性。当您需要此类功能时，可以返回本节，验证哪个回调最符合您的需求。需要牢记的是：某些执行监听器方法非常相似，但也存在微妙的差异。您应始终确保进行充分测试，不要假设某个给定的监听器方法会按照您认为的方式工作。


    让我们来看看 `FlowExecutionListener` 接口定义的方法。（请注意，为了更好的可读性，我们省略了返回类型，它始终是 `void`。）流程执行监听器方法不能返回任何内容；如果它要更改某些内容，应通过提供给相关回调方法的参数来实现。


    **`requestSubmitted(RequestContext context)`**

    **`requestProcessed(RequestContext context)`**


    `requestSubmitted` 在请求进入流程执行的开头被调用，而 `requestProcessed` 在请求结束时被调用。`requestSubmitted`
    是所有 `FlowExecutionListener` 回调方法中第一个被调用的方法，而 `requestProcessed` 是最后一个被调用的方法。如果您想在处理生命周期的早期执行某些对整个请求执行有影响的操作，可以使用这些回调。请注意，当启动一个新的流程执行时，`requestSubmitted`
    回调会在流程执行实际启动*之前*被调用（此时还没有活跃的流程）。`requestProcessed` 也有类似的情况：当流程执行终止时（因为它到达了一个 `end`
    状态），在调用 `requestProcessed` 时，流程已经终止。您可以通过使用 `context.getFlowExecutionContext().isActive()`
    来测试流程执行是否处于活跃状态。


    **`sessionCreating(RequestContext context, FlowDefinition definition)`**


    `sessionCreating` 被调用来指示即将创建一个新的流程执行。可以通过从此方法中抛出任何类型的运行时异常来否决新流程执行的创建。


    **`sessionStarting(RequestContext context, FlowSession session, MutableAttributeMap
    input)`**


    `sessionStarting` 在新的流程执行创建之后、但在该新流程执行实际启动之前被调用。在启动子流程的情况下，流程执行尚未启动，因此父流程执行仍然处于活跃状态。`input`
    参数是将要传递给衍生流程的输入映射，该映射由子流程状态的 `<input>` 映射准备或由外部提供。监听器也可以操作该输入。监听器可以通过抛出任何类型的运行时异常来否决新启动的流程执行会话的启动。


    **`sessionStarted(RequestContext context, FlowSession session)`**


    `sessionStarted` 在新的流程执行已初始化并开始处理之后被调用。启动行为已经执行（例如，流程的 `<on-start>` 或所执行的第一个状态的
    `<on-entry>`）。如果您想在每次流程会话成功启动并初始化后执行某些操作，此回调非常有用。


    **`eventSignaled(RequestContext context, Event event)`**


    `eventSignaled` 在流程执行中每次发出事件信号时被调用。该事件可以是用户外部发出的事件，也可以是内部发出的事件（例如，由应用程序控制器发出）。此方法在实际进行转换之前被调用。


    **`transitionExecuting(RequestContext context, TransitionDefinition transition)`**


    `transitionExecuting` 在匹配到转换时、但在转换发生之前被调用。将此方法与 `eventSignaled` 进行比较是很有意义的；在这种情况下，转换的进展更进一步。在此阶段，您已经知道转换的源状态和（将成为的）目标状态，而在
    `eventSignaled` 中，您只知道“某些事情”将要发生。


    **`stateEntering(RequestContext context, StateDefinition state) throws EnterStateVetoException`**


    `stateEntering` 指示流程执行即将进入一个给定的状态。此方法将在匹配到转换之后、但在进入该状态之前被调用（例如，此时尚未执行任何进入动作）。请注意，监听器可以通过抛出
    `org.springframework.webflow.execution.EnterStateVetoException` 来否决进入该状态。


    **`stateEntered(RequestContext context, StateDefinition previousState, StateDefinition
    state)`**


    `stateEntered` 通知监听器流程已成功从一个状态转换到下一个状态。给定状态的所有进入逻辑现已执行完毕，并且该状态已完全初始化。


    **`viewRendering(RequestContext context, View view, StateDefinition viewState)`**


    `viewRendering` 在视图选择已经发生、并且信息已从触发的 `view` 状态中检索出来时被调用。这发生在任何渲染动作执行之前。


    **`viewRendered(RequestContext context, View view, StateDefinition viewState);`**


    `viewRendered` 在视图完全渲染完毕、并准备好发送回客户端之后被调用。


    **`paused(RequestContext context)`**


    `paused` 将在活跃的流程会话暂停、并且视图已渲染之后被调用。请注意，如果流程执行结束（即，它经过了一个 `end` 状态），则不会调用此方法。在这种情况下，将改为调用
    `sessionEnding` 和 `sessionEnded`。


    **`resuming(RequestContext context)`**


    `resuming` 回调通知监听器一个暂停的流程执行已被恢复，并且即将继续执行。


    **`sessionEnding(RequestContext context, FlowSession session, String outcome,
    MutableAttributeMap output)`**


    `sessionEnding` 在流程到达一个 `end` 状态并即将结束流程执行时被调用。在此回调方法被调用时，流程执行仍然处于活跃状态。可能的 `<on-entry>`
    动作（例如，那些出现在 `end` 状态上的动作）已经执行完毕。如果该流程是一个子流程，并且使用 `<output>` 映射输出了任何内容，则也可以通过 `output`
    参数获取。这允许监听器检查或操作返回给父流程的输出。`outcome` 参数与结束会话所达到的结果相匹配；这将是终止的 `<end-state>` 的 id。


    **`sessionEnded(RequestContext context, FlowSession session, String outcome, AttributeMap
    output)`**


    `sessionEnded` 在 `sessionEnding` 之后、流程执行完全结束时被调用。当此方法被调用时，流程执行不再处于活跃状态。如果所讨论的流程是一个子流程，并且它将数据映射回父流程，那么此时不能再操作流程输出映射。此外，如果父流程已经重新激活，但尚未恢复，那么
    `session.isRoot()` 将指示会话是为子流程结束的（在这种情况下，`isRoot` 将为 `false`）还是为父流程结束的（`isRoot`
    将为 `true`）。


    **`exceptionThrown(RequestContext context, FlowExecutionException exception)`**

    '
- fmt: '`exceptionThrown`回调方法将在活动流程执行中处理请求期间发生异常时被调用。如果配置了流程异常处理器，它们将在该方法被调用后执行。


    ### 流程托管持久化上下文


    本节将介绍Web Flow的最后一个特性。该特性允许将JPA持久化上下文扩展到表示层，并使其在整个流程执行期间保持持久化。


    虽然从Web Flow的角度看这是一个简单的特性，但完全理解何时或为何使用它则稍显复杂。在本节中，我们将详细探讨它实际能为你做什么，并通过示例应用程序的部分内容进行解释和说明。


    该特性并非纯粹的Web Flow或Web应用程序相关特性。我们在Web Flow章节中看到的所有其他内容都与如何在表示层中执行操作有关。然而，此特性则始于后端数据访问层（DAL）。


    正如你在[第1章](#Chapter01.html#ch1)中所了解的，我们使用ORM来管理持久化。为了保持供应商中立，我们选择使用JPA作为ORM API，并采用Hibernate作为JPA的提供者。这样做也使得应用程序可以与其他JPA提供者（例如EclipseLink）一起运行。你可以在Repository中通过导入的包来区分这一点：我们使用`javax.persistence`包中的类，这是Java
    API中Java持久化API的一部分。


    JPA既可以在JEE托管上下文中使用，也可以在其外部使用。我们在JEE托管上下文之外使用它，这需要在事务管理和其他配置方面进行一些手动干预。得益于Spring，我们可以模拟一个托管环境，因此与在托管环境中使用JPA几乎没有区别。


    ![Image](images/square.jpg) **注意** 虽然我们在托管环境（Tomcat）中运行，但我们实际上指的是一个完全托管/兼容的JEE应用服务器（无论是否包含EJB配置文件）。例如，Tomcat仅实现了JEE服务器的部分Web配置文件，从JPA的角度来看，它不能被视为托管环境。在Tomcat中，至少从JPA的角度来看，你的应用程序必须自行处理事务管理，并且JPA将像在普通SE环境中一样进行配置。


    #### 从数据库到视图


    首先，我们来解释一下到目前为止示例应用程序中数据访问的处理方式。如[第1章](#Chapter01.html#ch1)所述，我们配置Spring使用JPA，并使用Hibernate作为ORM实现。我们的应用程序遵循典型的简单三层架构：表示层、业务（逻辑）层和数据访问层。每当应用程序控制器需要某些数据时，它们会与Service通信。Service使用领域模型和Repository从关系数据库中检索数据。


    从数据库检索到的对象称为*实体*。实体是领域模型的一部分，反映了由数据库支持的数据。这样的实体由JPA管理，更准确地说，由持久化上下文管理。ORM可能提供的特性之一是*懒加载*。此特性允许你仅检索少量数据，并在需要时（自动）获取额外数据。例如，在检索`Order`时，我们可以懒加载`Customer`。如果在处理过程中不需要`Customer`，则不会加载任何`Customer`数据。加载的数据越少越好。


    然而，此特性仅在实体由持久化上下文管理时才有效。通常，当事务结束时，持久化上下文会关闭。在事务外部，实体变为*游离态*。调用方法加载事务活动期间未加载的额外数据将导致抛出异常（对于Hibernate，你会看到著名的`org.hibernate.LazyInitializationException`）。


    然而，在我们的示例应用程序中，我们一直使用`org.springframework.orm.jpa.support.OpenEntityManagerInViewFilter`。这意味着我们的业务事务被提交（或回滚），但持久化上下文保持打开状态。这也意味着我们的实体保持托管状态，我们仍然可以从表示层（以及视图内部）让它们加载数据。但是，我们应该小心不要在表示层执行更改或创建操作，因为使用实体时不再有跨域事务。每次交互将在其自身的事务中运行；这与我们的业务逻辑层不同，在业务逻辑层中，整个Service方法调用发生在一个大事务中。


    你可以在[图12-6](#Chapter12.html#fig_12_6)中看到这一点。我们模拟了一个从表示层发起的方法调用，该调用进入业务逻辑层，并在途中启动了一个事务。在业务逻辑层中，我们被允许进行修改，因为我们所做的所有修改都包含在全局事务中。当结果返回给表示层时，事务结束，要么提交要么回滚事务。我们可以看到实体在所有层中都处于托管状态。然而，在业务逻辑层之外，不再有事务。尽管如此，得益于`OpenEntityManagerInViewFilter`，在渲染视图阶段，持久化上下文会为读取操作保持打开状态。


    ![Image](images/9781430241553_Fig12-06.jpg)


    ***图12-6.** 事务边界位于业务服务层*


    虽然这很有效，但问题在于，一旦视图被渲染，`OpenEntityManagerInViewFilter`会在将视图返回给浏览器之前关闭持久化上下文。这意味着，如果你将一个实体放入（例如）`flow`作用域，它将变为游离态。如果你需要在多个请求中使用该实体加载关联，这将成为一个问题，因为这会再次触发`LazyInitializationException`。'
  raw: 'The `exceptionThrown` callback method will be called whenever an exception
    occurs during the processing of a request in an active flow execution. If there
    are flow exception handlers configured, they will be invoked after this method
    has been called.


    ### Flow Managed Persistence Context


    With this section, we come to the last feature of Web Flow that we’ll be covering.
    This feature allows you to extend a JPA persistence context into your presentation
    layer, while making it persistent for the duration of an entire flow execution.


    While this is a simple feature when seen from the Web Flow side, fully understanding
    when or why to use it is a bit more complicated. In this section, we will look
    in detail at what it actually can do for you, explaining and then illustrating
    how it works by using parts of the sample application.


    This feature is not a solely Web Flow or web application-related feature. All
    the other things we have seen in the Web Flow chapters are related to how we do
    something in the presentation layer. However, this feature starts all the way
    back in the backend data access layer (DAL).


    As you are aware from [Chapter 1](#Chapter01.html#ch1), we use an ORM to manage
    our persistence. To be vendor neutral, we opted to use JPA as the ORM API. Hibernate
    is used as provider for JPA. In doing this, we could let the application run with
    other JPA providers, as well (e.g., EclipseLink). You can distinguish this in
    the Repositories by the imports; we use classes from the `javax.persistence` package,
    which is the Java Persistence API part of the Java APIs.


    JPA can be used either inside or outside a JEE managed context. We are using it
    outside a JEE managed context, which requires some manual intervention when it
    comes down to transaction management and other configuration. Thanks to Spring,
    we can simulate a managed environment, so that there is in fact little difference
    from using JPA within a managed environment.


    ![Image](images/square.jpg) **Note** While we are running in a managed environment
    (Tomcat), we actually mean a fully managed/compliant JEE application server with
    or without the EJB profile. For example, Tomcat only implements a partial web
    profile of a JEE server, and it cannot be considered to be a managed environment
    from the JPA point of view. In Tomcat, at least from the JPA point of view, your
    application would have to deal with the transaction management itself, and JPA
    would be configured as in a normal SE environment.


    #### From Database to View


    Let’s begin by explaining how the data access is handled in the sample application
    to this point. As explained in [Chapter 1](#Chapter01.html#ch1), we configured
    Spring to use JPA, and we use Hibernate as the ORM implementation. Our application
    follows a typical, simple three-layered approach: we have a presentation layer,
    a business (logic) layer, and a data access layer. Whenever our application controllers
    need something, they talk to a service. The service uses the domain model and
    repositories to retrieve data from a relational database.


    The objects retrieved from database are called *entities*. An entity is part of
    the domain model and reflects data backed by the database. Such an entity is managed
    by JPA; or more precisely, by a persistence context. One of the features an ORM
    may offer is *lazy loading*. This feature allows you to retrieve only a small
    amount of data and (automatically) fetch additional data when you ask for it.
    For example, when retrieving an `Order`, we could lazily load the `Customer`.
    If we don’t need the `Customer` in our processing, no `Customer` data is loaded.
    The less data we load, the better.


    However, this feature only works when an entity is managed by the persistence
    context. Normally, the persistence context is closed when the transaction ends.
    Outside the transaction, the entity becomes *detached*. Calling a method to load
    additional data that was not loaded while the transaction was active will result
    in an exception being thrown (in case of Hibernate, you will see the famous `org.hibernate.LazyInitializationException`).


    However, in our sample application, we have been using the `org.springframework.orm.jpa.support.OpenEntityManagerInViewFilter`.
    This means our business transaction is committed (or rolled back), but the persistence
    context is kept open. This also means that our entities remain managed, and we
    can still let them load data from our presentation layer (and thus, from within
    our views). However, we should be careful not to perform changes or create operations
    in the presentation layer because there is no longer a spanning transaction when
    using the entities. Each interaction will operate in its own transaction; this
    is unlike our business logic layer, where the entire service method call happens
    in one big transaction.


    You can see this illustrated in [Figure 12-6](#Chapter12.html#fig_12_6). We simulate
    a method call originating from the presentation layer that goes into the business
    logic layer, starting a transaction on its way. In the business logic layer, we
    are allowed to make modifications because all modifications we make are covered
    by the global transaction. The transaction is ended when the result is returned
    back to the presentation layer, either committing or rolling back the transaction.
    We can see that the entity is in a managed state in all layers. Outside of the
    business logic layer, however, there is no more transaction. Nevertheless, the
    persistence context is kept open for read operations during the render view phase,
    thanks to the `OpenEntityManagerInViewFilter`.


    ![Image](images/9781430241553_Fig12-06.jpg)


    ***Figure 12-6.** The transactional boundary lies on the business services*


    While this works great, the problem is that, once the view has been rendered,
    the `OpenEntityManagerInViewFilter` will close the persistence context before
    returning the view back to the browser. This means that, if you put an entity
    on (for example) `flow` scope, it will become detached. This becomes a problem
    if you need to load associations using that entity over multiple requests because
    that will again trigger a `LazyInitializationException`.'
