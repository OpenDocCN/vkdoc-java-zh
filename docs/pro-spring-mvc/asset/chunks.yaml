    但是，等等，我们的应用会不会因为多个视图实现都解析到 `order` 视图名称而出错？特殊的视图解析器 `ContentNegotiatingViewResolver`
    将在这里帮助我们。它会确定哪个已解析的视图与请求的内容类型最匹配。因此，无需更改控制器，只需添加一些配置（和视图实现），我们就可以区分提供的是哪个视图。


