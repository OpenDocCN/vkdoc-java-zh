    ## 实现控制器


    控制器在 Web 应用中扮演着至关重要的角色：它们执行实际的请求、准备模型并选择要渲染的视图。与调度器 Servlet 协同工作时，控制器在请求处理流程中也发挥着关键作用。控制器是核心应用与应用
    Web 界面之间的粘合剂。在本章中，我们将探讨两种不同的控制器方法，并介绍 Spring 框架提供的开箱即用实现。


    本章还将介绍请求处理的支持组件。例如，我们将涵盖表单提交以及如何应用国际化（I18N）。


    ### 控制器简介


    控制器是负责响应用户操作的组件。该操作可以是表单提交、点击链接或仅访问页面。控制器选择或更新视图所需的数据。它还选择要渲染的视图名称，或者可以直接渲染视图本身。使用
    Spring MVC，我们在编写控制器时有两种选择。我们可以实现一个接口，或者在类上添加注解。接口是 `org.springframework.web.servlet.mvc.Controller`，注解是
    `org.springframework.stereotype.Controller`。本书主要关注基于注解的方法（即 Spring @MVC）来编写控制器。不过，我们认为仍有必要提及基于接口的方法。


    尽管两种方法都能实现控制器，但它们之间存在两个主要区别。第一个区别在于灵活性，第二个区别在于 URL 到控制器的映射。基于注解的控制器允许非常灵活的方法签名，而基于接口的方法则必须在接口上实现预定义的方法。获取其他有用的协作者会更加困难（但并非不可能！）。


    对于基于接口的方法，我们必须显式地将 URL 外部映射到这些控制器；通常，这种方法会与 `org.springframework.web.servlet.handler.SimpleUrlHandlerMapping`
    结合使用，以便将所有 URL 集中在一个位置。将所有 URL 集中在一个位置是基于接口的方法相对于基于注解的方法的一个优势。基于注解的方法的映射分散在整个代码库中，这使得查看哪个
    URL 映射到哪个请求处理方法变得更加困难。基于注解的控制器的优势在于，当你打开一个控制器时，你可以看到它映射到了哪些 URL。


    在本节中，我们将展示如何编写这两种类型的控制器，以及如何配置基本的视图控制器。


    #### 基于接口的控制器


    要编写基于接口的控制器，我们需要创建一个实现 `Controller` 接口的类。清单 5-1 展示了该接口的 API。实现此接口时，我们必须实现 `handleRequest`
    方法。该方法需要返回一个 `org.springframework.web.servlet.ModelAndView` 对象，如果控制器自行处理响应，则返回
    `null`。


    ***清单 5-1.** Controller 接口*


    `package org.springframework.web.servlet.mvc;`


    `import javax.servlet.http.HttpServletRequest;`

    `import javax.servlet.http.HttpServletResponse;`


    `import org.springframework.web.servlet.ModelAndView;`


    `public interface Controller {`

    `    ModelAndView handleRequest(HttpServletRequest request,`

    `                               HttpServletResponse response) throws Exception;`

    `}`


    让我们看一个小例子。如果我们以 `com.apress.prospringmvc.bookstore.web.IndexController` 为例，并从中创建一个基于接口的控制器，它将类似于清单
    5-2 所示。我们实现了 `handleRequest` 方法，并返回一个带有视图名称的 `ModelAndView` 实例。


    ***清单 5-2**. 基于接口的 IndexController*


    `package com.apress.prospringmvc.bookstore.web;`

    `// 省略 javax.servlet 导入`

    `import org.springframework.web.servlet.ModelAndView;`

    `import org.springframework.web.servlet.mvc.Controller;`


    `public class IndexController implements Controller {`


    `    @Override`

    `    public ModelAndView handleRequest(HttpServletRequest request,`

    `                                      HttpServletResponse response)`

    `    throws Exception {`

    `        return new ModelAndView("index");`

    `    }`

    `}`


    除了编写此控制器外，我们还需要配置一个 `org.springframework.web.servlet.HandlerMapping` 实例，将 `/index.htm`
    映射到此控制器（更多信息请参见第 3 章）。我们还需要确保注册了一个 `org.springframework.web.servlet.mvc.SimpleControllerHandlerAdapter`
    来执行基于接口的控制器（默认情况下已注册）。


    这里给出的示例相当简单。现在想象一个具有某些页面流程的控制器。在这种情况下，我们需要检查请求是 `GET` 还是 `POST`；基于此，我们需要执行不同的控制器逻辑。对于大型控制器来说，这可能会变得相当繁琐。


    表 5-1 显示了框架附带的 `Controller` 实现。其中许多已弃用（自 Spring 3.0 起），或者可以被视为已弃用，转而支持更新的基于注解的控制器。请查看每个控制器的描述以了解弃用说明。


    ![图片](img/tab_5_1.jpg)


    ![图片](img/tab_5_1a.jpg)


    #### 基于注解的控制器


    要编写基于注解的控制器，我们需要编写一个类，并在该类上添加 `Controller` 注解。此外，我们需要在类、方法或两者上添加 `org.springframework.web.bind.annotation.RequestMapping`
    注解。清单 5-3 展示了我们 `IndexController` 的基于注解的方法。


    ***清单 5-3.** 基于注解的 IndexController*


    `package com.apress.prospringmvc.bookstore.web;`


    `import org.springframework.stereotype.Controller;`

    `import org.springframework.web.bind.annotation.RequestMapping;`

    `import org.springframework.web.servlet.ModelAndView;`


    `@Controller`

    `public class IndexController {`


    `    @RequestMapping(value = "/index.htm")`

    `    public ModelAndView indexPage() {`

    `        return new ModelAndView("index");`

    `    }`

    `}`


    该控制器包含一个带有 `RequestMapping` 注解的方法，并指定它应映射到 `/index.htm` URL，这就是请求处理方法。该方法没有必需的参数，我们可以返回任何我们想要的内容；目前，我们想要返回一个
    `ModelAndView`。


    映射位于控制器定义中，我们需要一个 `HandlerMapping` 实例来解释这些映射。这里有两个实现可以帮助我们：`org.springframework.web.servlet.mvc.annotation.DefaultAnnotationHandlerMapping`
    和 `org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping`。第一个是由
    `org.springframework.web.servlet.DispatcherServlet` 注册的默认实现之一。第二个是由 Spring @MVC（我们通过
    `org.springframework.web.servlet.config.EnableWebMvc` 注解启用）注册的默认实现之一。我们将使用 Spring
    @MVC 默认实现，因为它比 `DefaultAnnotationHandlerMapping` 更强大、更灵活。我们将在本书中看到这种强大和灵活性。

    '
- fmt: "### Configuring View Controllers\n\nThe two controller samples we have written\
    \ so far are called *view controllers*. They don’t select data; rather, they only\
    \ select the view name to render. If we had a large application with more of these\
    \ views, it would become quite cumbersome to maintain and write these. Spring\
    \ MVC can help us out here, enabling us simply to add an `org.springframework.web.servlet.mvc.ParameterizableViewController`\
    \ to our configuration and to configure it accordingly. We would need to configure\
    \ an instance to return `index` as a view name and map it to the `/index.htm`\
    \ URL. [Listing 5-4](#Chapter05.html#list_5_4) shows what needs to be added to\
    \ make this work.\n\n**Listing 5-4.** A ParameterizableViewController Configuration\n\
    \n```\npackage com.apress.prospringmvc.bookstore.web.config;\n\nimport org.springframework.web.servlet.mvc.ParameterizableViewController;\n\
    import org.springframework.web.servlet.config.annotation.WebMvcConfigurerAdapter;\n\
    \n// Other imports ommitted\n\n@Configuration\n@EnableWebMvc\n@ComponentScan(basePackages\
    \ = { \"com.apress.prospringmvc.bookstore.web\" })\npublic class WebMvcContextConfiguration\
    \ extends WebMvcConfigurerAdapter {\n\n    // Other methods ommitted\n\n    @Bean(name\
    \ = \"/index.htm\")\n    public Controller index() {\n        ParameterizableViewController\
    \ index;\n        index = new ParameterizableViewController();\n        index.setViewName(\"\
    index\");\n        return index;\n    }\n}\n```\n\nSo how does it work? We create\
    \ the controller, set the view name to return, and then explicitly give it the\
    \ name of `/index.htm` (see the highlighted parts). The explicit naming makes\
    \ it possible for the `org.springframework.web.servlet.handler.BeanNameUrlHandlerMapping`\
    \ to pick up our controller and map it to the URL. However, if this were to grow\
    \ significantly larger, then we would need to create quite a few of these methods.\
    \ Again, Spring MVC is here to help us. Because we have enabled the new Spring\
    \ MVC configuration, we can utilize it to our advantage. We can override the `addViewControllers`\
    \ method (one of the methods of the `org.springframework.web.servlet.config.annotation.WebMvcConfigurerAdapter`)\
    \ and simply register our view names to certain URLs. [Listing 5-5](#Chapter05.html#list_5_5)\
    \ shows how to do this.\n\n**Listing 5-5.** A ViewController Configuration\n\n\
    ```\npackage com.apress.prospringmvc.bookstore.web.config;\n\nimport org.springframework.web.servlet.config.annotation.ViewControllerRegistry;\n\
    import org.springframework.web.servlet.config.annotation.WebMvcConfigurerAdapter;\n\
    \n// Other imports ommitted\n\n@Configuration\n@EnableWebMvc\n@ComponentScan(basePackages\
    \ = { \"com.apress.prospringmvc.bookstore.web\" })\npublic class WebMvcContextConfiguration\
    \ extends WebMvcConfigurerAdapter {\n\n    // Other methods ommitted\n    @Override\n\
    \    public void addViewControllers(final ViewControllerRegistry registry) {\n\
    \        registry.addViewController(\"/index.htm\").setViewName(\"index\");\n\
    \    }\n}\n```\n\nThe result is the same. A `ParameterizableViewController` is\
    \ created and mapped to the `/index.htm` URL (see [Figure 5-1](#Chapter05.html#fig_5_1)).\
    \ However, the second approach is easier and less cumbersome to use than the first\
    \ one.\n\n![Image](images/9781430241553_Fig05-01.jpg)\n\n**Figure 5-1.** The index\
    \ page\n\n### Request-Handling Methods\n\nWriting request-handling methods can\
    \ be a challenge. For example, how should you map a method to an incoming request?\
    \ Several things could be a factor here, including the URL, the method used (e.g.,\
    \ `GET` or `POST`^([1](#Chapter05.html#CHP-5-FN-1))), the availability of parameters\
    \ or HTTP headers^([2](#Chapter05.html#CHP-5-FN-2)), or even the request content\
    \ type or the content type (e.g., XML, JSON, or HTML) to be produced. All these\
    \ can influence which method is selected to handle the request.\n\nThe first step\
    \ in writing a request-handling method is to put an `org.springframework.web.bind.annotation.RequestMapping`\
    \ annotation on the method. This mapping is detected by the `org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping`\
    \ to create the mapping of incoming URLs to the correct method (see the “Spring\
    \ MVC Components” section in [Chapter 4](#Chapter04.html#ch4) for more information\
    \ on handler mapping). Next, we need to specify which web request we want to execute\
    \ the specified handler.\n\nThe annotation can be put on both the type (the controller)\
    \ and the method level. We can use the one on the type level to do some coarse-grained\
    \ mapping (e.g., the URL), and then use the annotation on the method level to\
    \ further specify when to execute the method (e.g., a `GET` or `POST` request).\n\
    \n[Table 5-2](#Chapter05.html#tab_5_2) shows which attributes we can set on the\
    \ `RequestMapping` annotation and how they influence the mapping.\n\n![Image](images/tab_5_2.jpg)\n\
    \n![Image](images/tab_5_2a.jpg)\n\n________________\n\n¹ [`http://www.w3.org/Protocols/rfc2616/rfc2616-sec9.html`](http://www.w3.org/Protocols/rfc2616/rfc2616-sec9.html)\n\
    \n² [`http://www.w3.org/Protocols/rfc2616/rfc2616-sec14.html`](http://www.w3.org/Protocols/rfc2616/rfc2616-sec14.html)\n\
    \nIn [Table 5-3](#Chapter05.html#tab_5_3), there are a couple of sample mappings\
    \ that also show the effect of class- and method-level matching. As already mentioned,\
    \ the `RequestMapping` annotation on the class applies to *all* methods in the\
    \ controller. This mechanism can be used to do coarse-grained mapping on the class\
    \ level and finer-grained mapping on the method level.\n\n![Image](images/tab_5_3.jpg)\n\
    \n![Image](images/tab_5_3a.jpg)\n\n________________\n\n³ [`http://www.w3.org/Protocols/rfc2616/rfc2616-sec14.html`](http://www.w3.org/Protocols/rfc2616/rfc2616-sec14.html)\n\
    \n### Supported Method Argument Types\n\nA request-handling method can have various\
    \ method arguments and return values. Most arguments mentioned in [Table 5-4](#Chapter05.html#tab_5_4)\
    \ can be used in arbitrary order. However, there is a single exception to that\
    \ rule: the `org.springframework.validation.BindingResult` argument. That argument\
    \ has to follow a model object that we use to bind request parameters to.\n\n\
    ![Image](images/tab_5_4.jpg)\n\n![Image](images/tab_5_4a.jpg)\n\n![Image](images/tab_5_4b.jpg)\n\
    \n#### RedirectAttributes\n\nThe `org.springframework.web.servlet.mvc.support.RedirectAttributes`\
    \ deserve a little more explanation than what is shown in [Table 5-4](#Chapter05.html#tab_5_4).\
    \ With `RedirectAttributes`, it is possible to declare exactly which attributes\
    \ are needed for the redirect. By default, all model attributes are exposed when\
    \ doing a redirect. Because a redirect always leads to a `GET` request, all primitive\
    \ model attributes (or collections/arrays of primitives) will be encoded as request\
    \ parameters. However, with the annotated controllers, there are also objects\
    \ in the model (like the path variables and other implicit values) that don’t\
    \ need to be exposed and that are outside of our control.\n\nThe `RedirectAttributes`\
    \ can help us out here. When this is used as a method argument and a redirect\
    \ is being issued, only the attributes added to the `RedirectAttributes` instance\
    \ are going to be added to the URL.\n\nIn addition to specifying attributes encoded\
    \ in the URL, it is also possible to specify so called flash attributes. *Flash\
    \ attributes* are attributes that are stored before the redirect and retrieved\
    \ and made available as model attributes after the redirect. This is done by using\
    \ the configured `org.springframework.web.servlet.FlashMapManager`. The use of\
    \ flash attributes is useful for objects that cannot be encoded (non-primitive\
    \ objects) or to keep URLs clean."
