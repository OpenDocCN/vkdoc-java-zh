    \ expression=\"orderController.addBook(flowScope.orderForm)\" />\n</transition>\n\
    ```\n\n上述代码片段将调用[清单 10-22](#Chapter10.html#list_10_22) 中`OrderController`上的方法。\n\
    \n***清单 10-22.** 执行控制器代码以将书籍添加到选定书籍列表*\n\n```\npublic void addBook(OrderForm orderForm)\
    \ {\n    Book book = bookstoreService.findBook(orderForm.getBookId());\n    if\
    \ (orderForm.getSelectedBooks().containsKey(book)) {\norderForm.getSelectedBooks().put(book,\
    \ ![Image](images/U002.jpg)\n        orderForm.getSelectedBooks().get(book) +\
