- fmt: "### Internationalization\n\nFor internationalization to work, we need to configure\
    \ different components to be able to resolve messages based on the language (locale)\
    \ of the user. For example, there is the `org.springframework.context.MessageSource`,\
    \ which lets us resolve messages based on message codes and locale. To be able\
    \ to resolve the locale, we also need an `org.springframework.web.servlet.LocaleResolver`.\
    \ Finally, to be able to change the locale, we also need to configure an `org.springframework.web.servlet.i18n.LocaleChangeInterceptor`\
    \ (the next chapter will cover interceptors in more depth).\n\n#### Message Source\n\
    \nThe message source is the component that actually resolves our message based\
    \ on a code and the locale. Spring provides a couple of implementations of the\
    \ `org.springframework.context.MessageSource` interface. Two of those implementations\
    \ are implementations that we can use, while the other implementations simply\
    \ delegate to another message source.\n\nThe two implementations provided by the\
    \ Spring Framework are in the `org.springframework.context.support` package. [Table\
    \ 5-23](#Chapter05.html#tab_5_23) briefly describes both of them.\n\n![Image](images/tab_5_23.jpg)\n\
    \nWe configure both beans more or less the same way. One thing we need is a bean\
    \ named `messageSource`. Which implementation we choose doesn’t really matter.\
    \ For example, we could even create our own implementation that uses a database\
    \ to load the messages.\n\nThe configuration in [Listing 5-48](#Chapter05.html#list_5_48)\
    \ configures an `org.springframework.context.support.ReloadableResourceBundleMessageSource`\
    \ that loads a file named `messages.properties` from the classpath. It will also\
    \ try to load the `messages_[locale].properties` for the `Locale` we are currently\
    \ using to resolve the messages.\n\n**Listing 5-48.** The MessageSource Configuration\
    \ in WebMvcContext\n\n```\npackage com.apress.prospringmvc.bookstore.web.config;\n\
    \nimport org.springframework.context.support.ReloadableResourceBundleMessageSource;\n\
    \n// Other imports omitted\n\n@Configuration\n@EnableWebMvc\n@ComponentScan(basePackages\
    \ = { \"com.apress.prospringmvc.bookstore.web\" })\npublic class WebMvcContextConfiguration\
    \ extends WebMvcConfigurerAdapter {\n\n    @Bean\n    public MessageSource messageSource()\
    \ {\n        ReloadableResourceBundleMessageSource messageSource;\n        messageSource\
    \ = new ReloadableResourceBundleMessageSource();\n        messageSource.setBasename(\"\
    classpath:/messages\");\n        messageSource.setUseCodeAsDefaultMessage(true);\n\
    \        return messageSource;\n    }\n}\n```\n\nThe following snippets show two\
    \ properties files (actually resource bundles) that are loaded. The messages in\
    \ the `messages.properties` (see [Listing 5-49](#Chapter05.html#list_5_49)) file\
    \ are treated as the defaults, and they can be overridden in the language-specific\
    \ `messages_nl.properties` file (see [Listing 5-50](#Chapter05.html#list_5_50)).\n\
    \n**Listing 5-49.** The messages.properties Snippet\n\n```\nhome.title=Welcome\n\
    \ninvalid.account.emailaddress=Invalid email address.\nrequired=Field {0} is required.\n\
    ```\n\n**Listing 5-50.** The messages_nl.properties\n\n```\nhome.title=Welkom\n\
    \ninvalid.account.emailaddress=Ongeldig emailadres.\nrequired=Veld {0} is verplicht.\n\
    ```\n\n#### LocaleResolver\n\nFor the message source to do its work correctly,\
    \ we also need to configure an `org.springframework.web.servlet.LocaleResolver`\
    \ (this can be found this in the `org.springframework.web.servlet.i18n` package).\
    \ Several different implementations ship with Spring that can make our lives easier.\
    \ The locale resolver is a strategy that is used to detect which `Locale` to use.\
    \ The different implementations each use a different way of resolving the locale\
    \ (see [Table 5-24](#Chapter05.html#tab_5_24)).\n\n![Image](images/tab_5_24.jpg)\n\
    \n#### LocaleChangeInterceptor\n\nIf we want our users to be able to change the\
    \ locale, we need to configure an `org.springframework.web.servlet.i18n.LocaleChangeInterceptor`\
    \ (see [Listing 5-51](#Chapter05.html#list_5_51)). This interceptor inspects the\
    \ current incoming requests and checks whether there is a parameter named `locale`\
    \ on the request. If this is present, the interceptor uses the earlier configured\
    \ locale resolver to change the current user’s `Locale`. The parameter name can\
    \ be configured.\n\n**Listing 5-51.** The Full Internationalization Configuration\n\
    \n```\npackage com.apress.prospringmvc.bookstore.web.config;\n\nimport org.springframework.context.MessageSource;\n\
    import org.springframework.context.support.ReloadableResourceBundleMessageSource;\n\
    import org.springframework.web.servlet.HandlerInterceptor;\nimport org.springframework.web.servlet.LocaleResolver;\n\
    import org.springframework.web.servlet.config.annotation.InterceptorRegistry;\n\
    import org.springframework.web.servlet.config.annotation.ResourceHandlerRegistry;\n\
    import org.springframework.web.servlet.i18n.CookieLocaleResolver;\nimport org.springframework.web.servlet.i18n.LocaleChangeInterceptor;\n\
    \n// Other imports omitted\n\n@Configuration\n@EnableWebMvc\n@ComponentScan(basePackages\
    \ = { \"com.apress.prospringmvc.bookstore.web\" })\npublic class WebMvcContextConfiguration\
    \ extends WebMvcConfigurerAdapter {\n\n    @Override\n    public void addInterceptors(InterceptorRegistry\
    \ registry) {\n        registry.addInterceptor(localeChangeInterceptor());\n \
    \   }\n\n    @Bean\n    public HandlerInterceptor localeChangeInterceptor() {\n\
    \        LocaleChangeInterceptor localeChangeInterceptor;\n        localeChangeInterceptor\
    \ = new LocaleChangeInterceptor();\n        localeChangeInterceptor.setParamName(\"\
    lang\");\n        return localeChangeInterceptor;\n    }\n\n    @Bean\n    public\
    \ LocaleResolver localeResolver() {\n        return new CookieLocaleResolver();\n\
    \    }\n\n    @Bean\n    public MessageSource messageSource() {\n        ReloadableResourceBundleMessageSource\
    \ messageSource;\n        messageSource = new ReloadableResourceBundleMessageSource();\n\
    \        messageSource.setBasename(\"classpath:/messages\");\n        messageSource.setUseCodeAsDefaultMessage(true);\n\
    \        return messageSource;\n    }\n}\n```\n\n![Image](images/square.jpg) **Note**\
    \ In general, it is a good idea to have the `LocaleChangeInterceptor` as one of\
    \ the first interceptors. If something goes wrong, we want to inform the user\
    \ in the correct language.\n\nIf we redeploy our application, we should get localized\
    \ error messages if we switch the language (of course, this works only if we add\
    \ the appropriate error codes to the resource bundles). However, using the `MessageSource`\
    \ for error messages isn’t its only use; we can also use `MessageSource` to retrieve\
    \ our labels, titles, error messages, and so on from our resource bundles. We\
    \ can use the `message` tag for that. [Listing 5-52](#Chapter05.html#list_5_52)\
    \ shows a modified book search page, which uses the `message` tag to fill the\
    \ labels, titles, and headers. If we switch the language, we should get localized\
    \ messages (see [Figures 5-11](#Chapter05.html#fig_5_11) and [5-12](#Chapter05.html#fig_5_12)).\n\
    \n**Listing 5-52.** The Book Search Page with the Message Tag\n\n```\n<%@ taglib\
    \ prefix=\"c\" uri=\"http://java.sun.com/jsp/jstl/core\"%>\n<%@ taglib prefix=\"\
    spring\" uri=\"http://www.springframework.org/tags\" %>\n<%@ taglib prefix=\"\
    form\" uri=\"http://www.springframework.org/tags/form\" %>\n```"
  raw: '### Internationalization


    For internationalization to work, we need to configure different components to
    be able to resolve messages based on the language (locale) of the user. For example,
    there is the `org.springframework.context.MessageSource`, which lets us resolve
    messages based on message codes and locale. To be able to resolve the locale,
    we also need an `org.springframework.web.servlet.LocaleResolver`. Finally, to
    be able to change the locale, we also need to configure an `org.springframework.web.servlet.i18n.LocaleChangeInterceptor`
    (the next chapter will cover interceptors in more depth).


    #### Message Source


    The message source is the component that actually resolves our message based on
    a code and the locale. Spring provides a couple of implementations of the `org.springframework.context.MessageSource`
    interface. Two of those implementations are implementations that we can use, while
    the other implementations simply delegate to another message source.


    The two implementations provided by the Spring Framework are in the `org.springframework.context.support`
    package. [Table 5-23](#Chapter05.html#tab_5_23) briefly describes both of them.


    ![Image](images/tab_5_23.jpg)


    We configure both beans more or less the same way. One thing we need is a bean
    named `messageSource`. Which implementation we choose doesn’t really matter. For
    example, we could even create our own implementation that uses a database to load
    the messages.


    The configuration in [Listing 5-48](#Chapter05.html#list_5_48) configures an `org.springframework.context.support.ReloadableResourceBundleMessageSource`
    that loads a file named `messages.properties` from the classpath. It will also
    try to load the `messages_[locale].properties` for the `Locale` we are currently
    using to resolve the messages.


    ***Listing 5-48.** The MessageSource Configuration in WebMvcContext*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `import org.springframework.context.support.ReloadableResourceBundleMessageSource;`


    `// Other imports omitted`


    `@Configuration`

    `@EnableWebMvc`

    `@ComponentScan(basePackages = { "com.apress.prospringmvc.bookstore.web" })`

    `public class WebMvcContextConfiguration extends WebMvcConfigurerAdapter {`


    `    @Bean`

    `    public MessageSource messageSource() {`

    `        ReloadableResourceBundleMessageSource messageSource;`

    `        messageSource = new ReloadableResourceBundleMessageSource();`

    `        messageSource.setBasename("classpath:/messages");`

    `        messageSource.setUseCodeAsDefaultMessage(true);`

    `        return messageSource;`

    `    }`

    `}`


    The following snippets show two properties files (actually resource bundles) that
    are loaded. The messages in the `messages.properties` (see [Listing 5-49](#Chapter05.html#list_5_49))
    file are treated as the defaults, and they can be overridden in the language-specific
    `messages_nl.properties` file (see [Listing 5-50](#Chapter05.html#list_5_50)).


    ***Listing 5-49.** The messages.properties Snippet*


    `home.title=Welcome`


    `invalid.account.emailaddress=Invalid email address.`

    `required=Field {0} is required.`


    ***Listing 5-50.** The messages_nl.properties*


    `home.title=Welkom`


    `invalid.account.emailaddress=Ongeldig emailadres.`

    `required=Veld {0} is verplicht.`


    #### LocaleResolver


    For the message source to do its work correctly, we also need to configure an
    `org.springframework.web.servlet.LocaleResolver` (this can be found this in the
    `org.springframework.web.servlet.i18n` package). Several different implementations
    ship with Spring that can make our lives easier. The locale resolver is a strategy
    that is used to detect which `Locale` to use. The different implementations each
    use a different way of resolving the locale (see [Table 5-24](#Chapter05.html#tab_5_24)).


    ![Image](images/tab_5_24.jpg)


    #### LocaleChangeInterceptor


    If we want our users to be able to change the locale, we need to configure an
    `org.springframework.web.servlet.i18n.LocaleChangeInterceptor` (see [Listing 5-51](#Chapter05.html#list_5_51)).
    This interceptor inspects the current incoming requests and checks whether there
    is a parameter named `locale` on the request. If this is present, the interceptor
    uses the earlier configured locale resolver to change the current user’s `Locale`.
    The parameter name can be configured.


    ***Listing 5-51.** The Full Internationalization Configuration*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `import org.springframework.context.MessageSource;`

    `import org.springframework.context.support.ReloadableResourceBundleMessageSource;`

    `import org.springframework.web.servlet.HandlerInterceptor;`

    `import org.springframework.web.servlet.LocaleResolver;`

    `import org.springframework.web.servlet.config.annotation.InterceptorRegistry;`

    `import org.springframework.web.servlet.config.annotation.ResourceHandlerRegistry;`

    `import org.springframework.web.servlet.i18n.CookieLocaleResolver;`

    `import org.springframework.web.servlet.i18n.LocaleChangeInterceptor;`


    `// Other imports omitted`


    `@Configuration`

    `@EnableWebMvc`

    `@ComponentScan(basePackages = { "com.apress.prospringmvc.bookstore.web" })`

    `public class WebMvcContextConfiguration extends WebMvcConfigurerAdapter {`


    `    @Override`

    `    public void addInterceptors(InterceptorRegistry registry) {`

    `        registry.addInterceptor(localeChangeInterceptor());`

    `    }`


    `    @Bean`

    `    public HandlerInterceptor localeChangeInterceptor() {`

    `        LocaleChangeInterceptor localeChangeInterceptor;`

    `        localeChangeInterceptor = new LocaleChangeInterceptor();`

    `        localeChangeInterceptor.setParamName("lang");`

    `        return localeChangeInterceptor;`

    `    }`


    `    @Bean`

    `    public LocaleResolver localeResolver() {`

    `        return new CookieLocaleResolver();`

    `    }`


    `    @Bean`

    `    public MessageSource messageSource() {`

    `        ReloadableResourceBundleMessageSource messageSource;`

    `        messageSource = new ReloadableResourceBundleMessageSource();`

    `        messageSource.setBasename("classpath:/messages");`

    `        messageSource.setUseCodeAsDefaultMessage(true);`

    `        return messageSource;`

    `    }`

    `}`


    ![Image](images/square.jpg) **Note** In general, it is a good idea to have the
    `LocaleChangeInterceptor` as one of the first interceptors. If something goes
    wrong, we want to inform the user in the correct language.


    If we redeploy our application, we should get localized error messages if we switch
    the language (of course, this works only if we add the appropriate error codes
    to the resource bundles). However, using the `MessageSource` for error messages
    isn’t its only use; we can also use `MessageSource` to retrieve our labels, titles,
    error messages, and so on from our resource bundles. We can use the `message`
    tag for that. [Listing 5-52](#Chapter05.html#list_5_52) shows a modified book
    search page, which uses the `message` tag to fill the labels, titles, and headers.
    If we switch the language, we should get localized messages (see [Figures 5-11](#Chapter05.html#fig_5_11)
    and [5-12](#Chapter05.html#fig_5_12)).


