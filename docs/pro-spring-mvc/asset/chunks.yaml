    ![Image](images/square.jpg) **Note** The `NotEmpty` and `Email` annotations come
    from the `org.hibernate.validator.constraints` package; thus this package is not
    a standard JSR-303 annotation, but an extension to it.


    ![Image](images/tab_5_22.jpg)


    When using JSR-303 annotations, if we submit the form with invalid values, we
    get a result like the one shown in [Figure 5-10](#Chapter05.html#fig_5_10). As
    we can see, there are messages displayed instead of codes. How is that possible?
    There are some default messages shipped with the validator implementation we use.
    We can override these if we want by specifying one of the codes from [Table 5-22](#Chapter05.html#tab_5_22)
    in our resource bundle (see the next section).


    ![Image](images/9781430241553_Fig05-10.jpg)


    ***Figure 5-10.** The registration page with error messages*'
