    ### 应用上下文


    为了在 Spring 中实现依赖注入，我们需要一个*应用上下文*。在 Spring 中，这是 `org.springframework.context.ApplicationContext`
    接口的一个实例。应用上下文负责管理其中定义的 bean，还支持更复杂的功能，例如对其中的 bean 应用 AOP。


    `ApplicationContext` 接口可以通过多种方式进行配置。最广为人知的方式是使用一个或多个 XML 文件；不过，我们也可以使用属性文件或 Java
    类，甚至可以混合搭配不同的配置方法。通常，最好坚持使用单一方法，这样更容易理解和弄清你的配置是什么，也无需在 Java、XML 和属性文件之间来回查找。


    Spring 提供了几种不同的 `ApplicationContext` 实现（参见图 2-3）。每种实现都提供相同的功能，但在加载应用上下文配置的方式上有所不同。图
    2-3 还向我们展示了 `org.springframework.web.context.WebApplicationContext` 接口，它是 `ApplicationContext`
    接口的一个专门版本，用于 Web 环境。


    ![Image](img/9781430241553_Fig02-03.jpg)


    ***图 2-3.** 各种 ApplicationContext 实现（简化版）*


    如前所述，不同的实现具有不同的配置机制（即 XML 或 Java）。表 2-2 显示了默认配置选项，并指明了资源加载位置。


    ![Image](img/tab_2_2.jpg)


    让我们来看一个基于 Java 的配置文件：`com.apress.prospringmvc.moneytransfer.annotation.ApplicationContextConfiguration`
    类（参见清单 2-6）。该类中使用了两个注解：`org.springframework.context.annotation.Configuration`
    和 `org.springframework.context.annotation.Bean`。前者将我们的类标记为配置文件，后者则指示该方法的返回值将用作创建
    bean 的工厂。默认情况下，bean 的名称就是方法名。在清单 2-6 中，我们有三个 bean，分别命名为 `accountRepository`、`transactionRepository`
    和 `moneyTransferService`。我们也可以通过设置 `Bean` 注解的 `name` 属性来显式指定 bean 名称。


    ***清单 2-6.** ApplicationContextConfiguration 配置文件*


    `package com.apress.prospringmvc.moneytransfer.annotation;`


    `import org.springframework.context.annotation.Bean;`

    `import org.springframework.context.annotation.Configuration;`


    `import com.apress.prospringmvc.moneytransfer.repository.AccountRepository;`

    `import com.apress.prospringmvc.moneytransfer.repository.MapBasedAccountRepository;`

    `import com.apress.prospringmvc.moneytransfer.repository.MapBasedTransactionRepository;`

    `import com.apress.prospringmvc.moneytransfer.repository.TransactionRepository;`

    `import com.apress.prospringmvc.moneytransfer.service.MoneyTransferService;`


    **`@Configuration`**

    `public class ApplicationContextConfiguration {`


    **`    @Bean`**

    `    public AccountRepository accountRepository() {`

    `        return new MapBasedAccountRepository();`

    `    }`


    **`    @Bean`**

    `    public TransactionRepository transactionRepository() {`

    `        return new MapBasedTransactionRepository();`

    `    }`


    **`    @Bean`**

    `    public MoneyTransferService moneyTransferService() {`

    `        return new MoneyTransferServiceImpl();`

    `    }`

    `}`


    ![Image](img/square.jpg) **注意** 配置类可以是 `abstract` 的，但不能是 `final` 的。为了解析该类，Spring
    会创建一个配置类的动态子类。


    仅仅有一个带有 `Configuration` 注解的类是不够的，我们还需要一些东西来引导我们的应用上下文。我们用它来启动应用程序。在示例项目中，这由 `MoneyTransferSpring`
    类负责（参见清单 2-7）。该类通过创建 `org.springframework.context.annotation.AnnotationConfigApplicationContext`
    的实例，并将包含我们配置的类（参见清单 2-6）传递给它，从而引导我们的配置。对于基于 XML 的方法，过程类似，它会从类路径加载 XML 文件。两者的结果相同。我们同时包含了这两种方法，以突出基于
    XML 和基于 Java 的配置之间的差异；然而，最终应用程序及其执行结果没有任何变化。


    ***清单 2-7.** MoneyTransferSpring 类*


    `package com.apress.prospringmvc.moneytransfer.annotation;`


    `import java.math.BigDecimal;`


    `import org.slf4j.Logger;`

    `import org.slf4j.LoggerFactory;`

    `import org.springframework.context.ApplicationContext;`

    `import org.springframework.context.annotation.AnnotationConfigApplicationContext;`

    `import org.springframework.context.support.ClassPathXmlApplicationContext;`


    `import com.apress.prospringmvc.ApplicationContextLogger;`

    `import com.apress.prospringmvc.moneytransfer.domain.Transaction;`

    `import com.apress.prospringmvc.moneytransfer.service.MoneyTransferService;`


    `public class MoneyTransferSpring {`


    `    private static final Logger logger = LoggerFactory.getLogger(MoneyTransferSpring.class);`


    `public static void main(String[] args) {`


    `        ApplicationContext ctx1 = new AnnotationConfigApplicationContext`![Image](img/U002.jpg)

    `(ApplicationContextConfiguration.class);`

    `        transfer(ctx1);`


    `        ApplicationContext ctx2 = new ClassPathXmlApplicationContext(`

    `                "/com/apress/prospringmvc/moneytransfer/annotation/application-context.xml");`

    `        transfer(ctx2);`


    `        ApplicationContextLogger.log(ctx1);`

    `        ApplicationContextLogger.log(ctx2);`

    `    }`


    `    private static void transfer(ApplicationContext ctx) {`

    `        MoneyTransferService service = ctx.getBean("moneyTransferService",`![Image](img/U002.jpg)

    ` MoneyTransferService.class);`

    `        Transaction transaction = service.transfer("123456", "654321", new`![Image](img/U002.jpg)

    ` BigDecimal("250.00"));`

    `        logger.info("转账完成: {}", transaction);`

    `    }`

    `}`


    最后，请注意应用上下文可以形成层级结构。我们可以有一个应用上下文作为另一个上下文的父上下文（参见图 2-4）。一个应用上下文只能有一个父上下文，但可以有多个子上下文。子上下文可以访问父上下文中定义的
    bean；但父上下文中的 bean 不能访问子上下文中的 bean。例如，如果我们在父上下文中启用了事务，这不会应用于子上下文（请参阅本章后面的“启用特性”部分）。


    ![Image](img/9781430241553_Fig02-04.jpg)


    ***图 2-4.** ApplicationContext 层级结构*


    此功能允许我们将应用程序 bean（例如服务、仓库和基础设施）与 Web bean（例如请求处理器和视图）分离开来。这种分离非常有用。例如，假设多个 servlet
    需要重用相同的应用程序 bean。我们无需为每个 servlet 重新创建它们，只需简单地重用已有的实例即可。例如，当一个 servlet 处理 Web UI，而另一个
    servlet 处理 Web 服务时，就可能出现这种情况。

