    ###### 使用 InterceptorRegistry


    注册拦截器的一种更强大且灵活的方式是使用 `org.springframework.web.servlet.config.annotation.InterceptorRegistry`。添加到该注册表中的拦截器会被添加到所有已配置的处理器映射中。此外，通过这种方式，可以非常轻松地实现对特定
    URL 的映射。要获取该注册表，我们需要在配置 Web 资源的配置类上实现 `org.springframework.web.servlet.config.annotation.WebMvcConfigurer`
    接口。该接口包含多个回调方法，这些方法会在 Spring @MVC 配置期间被调用。


    ![Image](img/square.jpg) **提示** 框架提供了一个 `org.springframework.web.servlet.config.annotation.WebMvcConfigurerAdapter`
    类，我们可以继承它。这样我们就不必实现 `org.springframework.web.servlet.config.annotation.WebMvcConfigurer`
    接口中的所有方法。


    我们也可以继承 `org.springframework.web.servlet.config.annotation.WebMvcConfigurationSupport`，从而可以简单地添加到默认配置中。这样我们就可以省略
    `org.springframework.web.servlet.config.annotation.EnableWebMvc` 注解。


    `InterceptorRegistry` 有两个方法（每种拦截器类型对应一个），我们可以用它们来添加拦截器（参见清单 6-8）。这两个方法都返回一个 `org.springframework.web.servlet.config.annotation.InterceptorRegistration`
    实例，我们可以用它来微调拦截器的映射。我们可以使用 Ant 风格的路径模式^(3)来为已注册的拦截器配置细粒度的映射。如果不提供模式，该拦截器将应用于所有传入的请求。


    ***清单 6-8.** InterceptorRegistry 接口*


    `package org.springframework.web.servlet.config.annotation;`


    `import java.util.ArrayList;`

    `import java.util.List;`


    `import org.springframework.web.context.request.WebRequestInterceptor;`

    `import org.springframework.web.servlet.HandlerInterceptor;`

    `import org.springframework.web.servlet.handler.WebRequestHandlerInterceptorAdapter;`


    `public class InterceptorRegistry {`


    `      public InterceptorRegistration addInterceptor(`

    `                HandlerInterceptor interceptor) { .. }`


    `    public InterceptorRegistration addWebRequestInterceptor(`

    `                WebRequestInterceptor interceptor) { .. }`

    `}`


    ________________


    ³ 关于 Ant 风格表达式的信息，请参见第 3 章。


    清单 6-9 展示了我们当前的配置。此时，我们已经配置了一个用于更改区域设置的拦截器，并且该拦截器被应用于所有传入的请求（我们没有指定要匹配的 URL 模式）。接下来，我们配置该拦截器，并使用
    `addInterceptor` 方法将其添加到注册表中。框架将负责处理将拦截器注册到已配置的处理器映射中的其他细节。


    ***清单 6-9.** 使用 InterceptorRegistry 添加拦截器*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `//其他导入已省略`


    `import org.springframework.web.servlet.HandlerInterceptor;`

    `import org.springframework.web.servlet.config.annotation.InterceptorRegistry;`


    `@Configuration`

    `@EnableWebMvc`

    `@ComponentScan(basePackages = { "com.apress.prospringmvc.bookstore.web" })`

    `public class WebMvcContextConfiguration extends WebMvcConfigurerAdapter {`


    `    @Override`

    `    public void addInterceptors(InterceptorRegistry registry) {`

    `        registry.addInterceptor(localeChangeInterceptor());`

    `    }`


    `    @Bean`

    `    public HandlerInterceptor localeChangeInterceptor() {`

    `        LocaleChangeInterceptor localeChangeInterceptor;`

    `        localeChangeInterceptor = new LocaleChangeInterceptor();`

    `        localeChangeInterceptor.setParamName("lang");`

    `        return localeChangeInterceptor;`

    `    }`

    `    //… 其他方法已省略`


    `}`


    清单 6-10 展示了一段代码片段，我们将映射从所有 URL 更改为仅以 `/customer` 开头的 URL。


    ***清单 6-10.** 将拦截器限制到特定 URL*


    `package com.apress.prospringmvc.bookstore.web.config;`

    `//导入已省略`

    `@Configuration`

    `@EnableWebMvc`

    `@ComponentScan(basePackages = { "com.apress.prospringmvc.bookstore.web" })`

    `public class WebMvcContextConfiguration extends WebMvcConfigurerAdapter {`


    `    @Override`

    `    public void addInterceptors(InterceptorRegistry registry) {`

    `        InterceptorRegistration registration;`

    `        registration = registry.addInterceptor(localeChangeInterceptor());`

    **`registation.addPathPatterns("/customers/**");`**

    `    }`

    `    //其他方法已省略`

    `}`


    ##### 实现拦截器


    到目前为止，我们已经介绍了不同类型的拦截器以及如何注册它们，以便它们能够被使用。现在，让我们为我们的商店实现拦截器。我们将实现两个不同的拦截器。第一个拦截器会向我们的模型添加一些常用数据，以便我们可以将其展示给用户。第二个拦截器将解决一个安全需求：我们希望只有注册用户才能访问账户和结账页面。

