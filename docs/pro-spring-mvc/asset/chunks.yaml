    ##### 使用 SessionAttributes


    在请求之间将模型属性存储在会话中可能非常有用。例如，假设我们需要编辑一条客户记录。第一个请求从数据库中获取该客户。然后在应用程序中对其进行编辑，并将更改提交回来并应用到该客户。如果我们不将客户存储在会话中，则必须再次从数据库中检索该客户记录。这可能很不方便。


    在 Spring @MVC 中，你可以告诉框架将某些模型属性存储在会话中。为此，你可以使用 `org.springframework.web.bind.annotation.SessionAttributes`
    注解（参见表 5-15）。你应该使用此注解将模型属性存储在会话中，以便它们能够跨越多个 HTTP 请求而存在。但是，你不应该使用此注解将某些内容存储在会话中，然后使用
    `javax.servlet.http.HttpSession` 来检索它。会话属性也只能在同一个控制器内使用，因此你不应将它们用作在控制器之间传递对象的传输工具。如果你需要类似的功能，我们建议你使用
    Spring Web Flow（参见第 10 章至第 12 章）。


    ![Image](img/tab_5_15.jpg)


    当使用 `org.springframework.web.bind.annotation.SessionAttributes` 注解将模型属性存储在会话中时，我们还需要告诉框架何时移除这些属性。为此，我们需要使用
    `org.springframework.web.bind.support.SessionStatus` 接口（参见清单 5-26）。当我们使用完这些属性后，需要调用该接口上的
    `setComplete` 方法。要访问该接口，我们可以简单地将其作为方法参数包含进来（参见表 5-4）。


    ***清单 5-26.** SessionStatus 接口*


    `package org.springframework.web.bind.support;`


    `public interface SessionStatus {`


    `    void setComplete();`


    `    boolean isComplete();`


    `}`


