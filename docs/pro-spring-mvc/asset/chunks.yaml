    then be a resource or even a call to your controller). In the case of Web Flow,
    there is an `org.springframework.webflow.mvc.servlet.FlowHandlerMapping` registered
    with the `Dispatcher`Servlet. This `FlowHandlerMapping` will detect whether the
    URL points to an existing flow id. If so, the request is treated as a Web Flow
    request; otherwise, the next `org.springframework.web.servlet.HandlerMapping`
    in line tries to identify the type of request.


    ![Image](images/9781430241553_Fig10-10.jpg)


    ***Figure 10-10.** Spring MVC''s configurable HandlerAdapter mechanism to forward
    requests*


    You can see that the `DispatcherServlet` uses `HandlerAdapter` and `HandlerMapping`
    to send a request to a specific part—to either Web Flow or Spring MVC in our case.
    These two components (i.e., the `FlowHandlerMapping` and `FlowHandlerAdapter`)
    need to be registered before Web Flow will be able to receive requests from the
    `DispatcherServlet`.


    We declared these components in the `com.apress.prospringmvc.bookstore.web.config.WebflowContextConfiguration`.
    This class does two things:


    *   It imports the `webflow-config.xml` (as discussed in the previous section)
    into the ApplicationContext using the `@ImportResource("classpath:/spring/webflow-config.xml")`
    annotation.

    *   It defines and configures the two beans with the following ids: `flowHandlerAdapter`
    and `flowHandlerMapping`.


    In the [Listing 10-8](#Chapter10.html#list_10_8), we show what the `WebflowContextConfiguration`
    looks like. This listing brings all these components together and effectively
    serves as the glue between Web Flow and Spring MVC.


    ***Listing 10-8.** Adding the FlowHandlerAdapter and FlowHandlerMapping Beans*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `import org.springframework.web.servlet.DispatcherServlet;`

    `import org.springframework.web.servlet.i18n.LocaleChangeInterceptor;`

    `import org.springframework.webflow.definition.registry.FlowDefinitionRegistry;`

    `import org.springframework.webflow.executor.FlowExecutor;`

    `import org.springframework.webflow.mvc.servlet.FlowHandlerAdapter;`

    `import org.springframework.webflow.mvc.servlet.FlowHandlerMapping;`

    `import com.apress.prospringmvc.bookstore.web.interceptor.`![Image](images/U002.jpg)

    `         CommonDataHandlerInterceptor;`

    `//Ommited other imports for brevity`


    `@Configuration`

    `@ImportResource("classpath:/spring/webflow-config.xml")`

    `public class WebflowContextConfiguration {`


    `    @Autowired`

    `    private FlowExecutor flowExecutor;`

    `    @Autowired`

    `    private FlowDefinitionRegistry flowRegistry;`

    `    @Autowired`

    `    private CommonDataHandlerInterceptor commonDataHandlerInterceptor;`

    `    @Autowired`

    `    private LocaleChangeInterceptor localeChangeInterceptor;`


    `    @Bean`

    `    public FlowHandlerAdapter flowHandlerAdapter() {`

    `        FlowHandlerAdapter flowHandlerAdapter = new FlowHandlerAdapter();`

    `        flowHandlerAdapter.setFlowExecutor(flowExecutor);`

    `        return flowHandlerAdapter;`

    `    }`


    `    @Bean`

    `    public FlowHandlerMapping flowHandlerMapping() {`

    `        FlowHandlerMapping flowHandlerMapping = new FlowHandlerMapping();`

    `        flowHandlerMapping.setInterceptors(new Object[] { commonDataHandlerInterceptor,`![Image](images/U002.jpg)

    ` localeChangeInterceptor });`

    `        flowHandlerMapping.setFlowRegistry(flowRegistry);`

    `        return flowHandlerMapping;`

    `    }`

    `  }`

    `}`


    ![Image](images/square.jpg) **Note** When we discussed the `WebMvcContextConfiguration`,
    we said that it declares the two interceptors, just as it did in the previous
    Spring MVC chapters. These interceptors are `CommonDataHandlerInterceptor` for
    the random books, and `LocaleChangeInterceptor` for supporting dynamic language
    change. In the `WebflowContextConfiguration`, we repeat this mapping, passing
    the same interceptor references to the `FlowHandlerMapping`. This is because the
    two systems are separated from each other. Once Web Flow is handling the request,
    it doesn''t know about interceptors added to Spring MVC handler mappings, and
    vice versa. If you did not add these interceptors here, changing the language
    or showing random books would no longer work from the moment you started a flow.


    In the preceding sections, we covered the different configuration details for
    configuring Web Flow. We also investigated and explained how to integrate Web
    Flow with Spring MVC. In the next section, we will focus on building something
    workable using Web Flow.'
  trans: '

    #### 粘合 Spring MVC 与 Spring Web Flow


    我们的 Spring MVC 配置采用默认设置，其设置方式与前几章完全相同。此外，还有一个基础的 `com.apress.prospringmvc.bookstore.web.config.WebMvcContextConfiguration`
    类，其开头如下：


    `package com.apress.prospringmvc.bookstore.web.config;`


    `import org.springframework.context.annotation.Configuration;`

    `import org.springframework.web.servlet.config.annotation.EnableWebMvc;`

    `import org.springframework.context.annotation.ComponentScan;`

    `//为简洁起见，省略了其他导入`


    `@Configuration`

    `@EnableWebMvc`

    `@ComponentScan(basePackages = { "com.apress.prospringmvc.bookstore.web" })`

    `public class WebMvcContextConfiguration extends WebMvcConfigurationSupport{`


    在该类内部，我们为以下内容添加了 Bean：


    *   `本地化（messagesource）`

    *   `标准视图解析器`

    *   `Tiles 视图解析器`


    我们还拥有 `com.apress.prospringmvc.bookstore.web.interceptor.CommonDataHandlerInterceptor`，用于支持右侧面板中的随机图书功能。然而，与前几章相比，这并非新内容（在第
    6 章的“配置拦截器”一节中已有说明）。同样，还有 `org.springframework.web.servlet.i18n.LocaleChangeInterceptor`，用于在页面上动态切换语言（在第
    5 章的“LocaleChangeInterceptor”一节中已有说明）。我们不再进一步讨论此类，因为它与前几章完全相同。


    在本章后续部分，我们将使用与 Spring MVC 定义和使用的相同的 Tiles 视图解析器来配置 Web Flow。关键在于，我们仍然可以按原样使用 Spring
    MVC，而无需添加 Web Flow 功能。在这种情况下，Spring MVC 将正常工作，并且应该具备解析其视图的能力。


    在普通的 Spring MVC 和 Web Flow 之间进行选择，发生在 Spring MVC 的主入口点：`org.springframework.web.servlet.DispatcherServlet`。通过使用
    `org.springframework.web.servlet.HandlerAdapter` 映射，Spring MVC 能够将请求转发到其自身的某个
    `HandlerAdapter`，或转发到 Web Flow 的 `org.springframework.webflow.mvc.servlet.FlowHandlerAdapter`（参见图
    10-8）。


    此机制是专门构建的，以便 Spring MVC 的 `DispatcherServlet` 仍然是您的单一入口点。根据请求的不同进行区分，并将请求转发到 Web
    Flow 或 Spring MVC 本身（后者可能是一个资源，甚至是对控制器的调用）。对于 Web Flow，有一个 `org.springframework.webflow.mvc.servlet.FlowHandlerMapping`
    注册到 `DispatcherServlet`。此 `FlowHandlerMapping` 将检测 URL 是否指向现有的流程 ID。如果是，则该请求被视为
    Web Flow 请求；否则，下一个 `org.springframework.web.servlet.HandlerMapping` 将尝试识别请求类型。


    ![Image](img/9781430241553_Fig10-10.jpg)


    ***图 10-10.** Spring MVC 的可配置 HandlerAdapter 机制，用于转发请求*


    您可以看到 `DispatcherServlet` 使用 `HandlerAdapter` 和 `HandlerMapping` 将请求发送到特定部分——在我们的案例中，是发送到
    Web Flow 或 Spring MVC。这两个组件（即 `FlowHandlerMapping` 和 `FlowHandlerAdapter`）需要在
    Web Flow 能够从 `DispatcherServlet` 接收请求之前进行注册。


    我们在 `com.apress.prospringmvc.bookstore.web.config.WebflowContextConfiguration`
    中声明了这些组件。此类执行两项操作：


    *   它使用 `@ImportResource("classpath:/spring/webflow-config.xml")` 注解将 `webflow-config.xml`（如上一节所述）导入到
    ApplicationContext 中。

    *   它定义并配置了两个具有以下 ID 的 Bean：`flowHandlerAdapter` 和 `flowHandlerMapping`。


    在清单 10-8 中，我们展示了 `WebflowContextConfiguration` 的内容。此清单将所有组件整合在一起，并有效地充当了 Web Flow
    和 Spring MVC 之间的粘合剂。


    ***清单 10-8.** 添加 FlowHandlerAdapter 和 FlowHandlerMapping Bean*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `import org.springframework.web.servlet.DispatcherServlet;`

    `import org.springframework.web.servlet.i18n.LocaleChangeInterceptor;`

    `import org.springframework.webflow.definition.registry.FlowDefinitionRegistry;`

    `import org.springframework.webflow.executor.FlowExecutor;`

    `import org.springframework.webflow.mvc.servlet.FlowHandlerAdapter;`

    `import org.springframework.webflow.mvc.servlet.FlowHandlerMapping;`

    `import com.apress.prospringmvc.bookstore.web.interceptor.`![Image](img/U002.jpg)

    `         CommonDataHandlerInterceptor;`

    `//为简洁起见，省略了其他导入`


    `@Configuration`

    `@ImportResource("classpath:/spring/webflow-config.xml")`

    `public class WebflowContextConfiguration {`


    `    @Autowired`

    `    private FlowExecutor flowExecutor;`

    `    @Autowired`

    `    private FlowDefinitionRegistry flowRegistry;`

    `    @Autowired`

    `    private CommonDataHandlerInterceptor commonDataHandlerInterceptor;`

    `    @Autowired`

    `    private LocaleChangeInterceptor localeChangeInterceptor;`


    `    @Bean`

    `    public FlowHandlerAdapter flowHandlerAdapter() {`

    `        FlowHandlerAdapter flowHandlerAdapter = new FlowHandlerAdapter();`

    `        flowHandlerAdapter.setFlowExecutor(flowExecutor);`

    `        return flowHandlerAdapter;`

    `    }`


    `    @Bean`

    `    public FlowHandlerMapping flowHandlerMapping() {`

    `        FlowHandlerMapping flowHandlerMapping = new FlowHandlerMapping();`

    `        flowHandlerMapping.setInterceptors(new Object[] { commonDataHandlerInterceptor,`![Image](img/U002.jpg)

    ` localeChangeInterceptor });`

    `        flowHandlerMapping.setFlowRegistry(flowRegistry);`

    `        return flowHandlerMapping;`

    `    }`

    `  }`

    `}`


    ![Image](img/square.jpg) **注意** 当我们讨论 `WebMvcContextConfiguration` 时，我们说过它声明了两个拦截器，就像在前几章
    Spring MVC 中所做的那样。这些拦截器是用于随机图书的 `CommonDataHandlerInterceptor`，以及用于支持动态语言切换的 `LocaleChangeInterceptor`。在
    `WebflowContextConfiguration` 中，我们重复了此映射，将相同的拦截器引用传递给 `FlowHandlerMapping`。这是因为这两个系统是相互分离的。一旦
    Web Flow 处理请求，它便不知道添加到 Spring MVC 处理程序映射中的拦截器，反之亦然。如果您没有在此处添加这些拦截器，那么从您启动流程的那一刻起，更改语言或显示随机图书的功能将不再有效。


    在前面的章节中，我们介绍了配置 Web Flow 的不同配置细节。我们还研究并解释了如何将 Web Flow 与 Spring MVC 集成。在下一节中，我们将重点构建一个使用
    Web Flow 的可运行示例。

