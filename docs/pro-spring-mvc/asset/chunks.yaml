    \n```\npublic void resetSelectedBooks() {\n    selectedBooks.clear();\n}\n```\n\
    \n与上一个视图状态一样，用户必须能够通过单击“取消”按钮退出当前的订单流程（参见[清单 10-25](#Chapter10.html#list_10_25)）。\n\
    \n***清单 10-25.** 取消当前订单并进入结束状态*\n\n```\n<transition on=\"cancel\" to=\"end\" />\n\
    ```"
  raw: 'Note that we are using a Spring MVC form. This is useful if we later want
    to bind our errors for the specific input fields. Our action (`${flowExecutionUrl})`
    is a special implicit object that refers to the current flow execution. This is
    the current URL together with the flow execution key. You should think of this
    as the post back URL to the running flow. In your final rendered HTML, this could
    be translated like this in the following listing :


    `action="/chapter10-bookstore/createOrders?execution=e4s1"`


    The flow execution key will allow Web Flow to load the state again where it was
    saved before returning the response (i.e., before pausing the flow).


    The `<form:select>` element is a basic Spring MVC tag library for rendering a
    HTML select list. It can work perfectly with a map; in that case, it will use
    the key as value for the HTML option element (which is the text that will be send
    as part of the form submission) and the value as the content of the HTML option
    (which is the text that will be shown in the list).


    Finally, there are two buttons. These are the control components that will drive
    the transition. If you look at the name, you see that they end with the `on` value
    of our transitions and are prefixed with `_eventId_`. This is how Web Flow will
    identify which transition to execute. The name of the buttons are sent along with
    the request when submitting the form. The scheme is `_eventId_<`*`on_transition`*`>`.


    Oh wait; there is one more thing to do. As can be seen on the home page in [Figure
    10-10](#Chapter10.html#fig_10_10), our idea is to initiate our flow with a `Buy
    books` link. We still need to configure this link in the navigation bar to start
    our flow.


    To find the link, we have to open the `header.jsp`, which you can find in `WEB-INF/templates/`.
    Remember that we use Tiles for templating. A page consists of a header, content,
    and a footer panel. The menu is rendered as part of the `header.jsp` (see [Listing
    10-19](#Chapter10.html#list_10_19)).


    ***Listing 10-19** The Link in Our Navigation Bar to Start the Create Order Flow*


    `<li>`

    `    <spring:url value="/createOrders" var="createOrder" />`

    `    <a href="${createOrder}">Buy books</a>`

    `</li>`


    In our case, the flow is located under `(WEB-INF/view)/createOrders/createOrders-flow.xml`,
    along with the pages that will be used in our flow. The URL created is simply
    appending `"/createOrders"` to the base URL. As we saw in the “Core Configuration”
    section, the flows under the `WEB-INF/view` directory are addressable directly
    via the directory structure they reside in.


    ![Image](images/square.jpg) **Note** You might wonder why we don''t embed `<spring:url>`
    inside the `href` attribute directly, instead of working with a variable. We could
    have done this; while this notation is a bit more elaborate, it is also more readable.
    Let''s just say it''s a matter of personal style and taste.


    At this point you should be able to test the application. Open your browser and
    point it to [`http://localhost:8080/chapter10-bookstore/`](http://localhost:8080/chapter10-bookstore/).
    On the home page, you can now click the `Buy books` link. Doing so should display
    the view shown in [Figure 10-12](#Chapter10.html#fig_10_12).


    ![Image](images/9781430241553_Fig10-12.jpg)


    ***Figure 10-12.** Our Select Categories Rendered in the Browser*


    Clicking the Next button will yield an error because we haven''t implemented the
    next view state yet. However, clicking the Cancel button should bring us back
    to the home page. This is accomplished by transitioning to the end state. For
    now, it is enough to know that the end state will simply end the flow execution
    and perform a last redirect to a view we configure. As mentioned previously, we
    will examine the `<end-state>` element in detail in [Chapter 11](#Chapter11.html#ch11).


    That rounds out how to select a category, so let''s move onto selecting and adding
    books.


    ##### Selecting and Adding Books


    Next, we need to build a page where the user is presented with a list of books
    for the previously selected category. The user should be able to add a selected
    book to an order list, and there should also be an input field to specify the
    number of books the user wants to add.


    In our previous view state, before transitioning to the view state we are going
    to build here, we loaded the books on the flow scope under the `selectableBooks`
    key—so that part is already done. What remains is for us to specify the view state
    and define all available transitions to handle the part of the use case where
    the user selects a book and adds it to the list. In this section, we will continue
    by describing the functionality that we need to accomplish this. Next, we will
    place the actual transition underneath, so you can see what it looks like. Finally,
    we will give an overview of the entire view state.


    Let''s begin by implementing something that takes us back to the previous page
    (see [Listing 10-20](#Chapter10.html#list_10_20)).


    ***Listing 10-20.** Transitioningto the Previous View State*


    `<transition on="previous" to="selectCategory" />`


    The `to` attribute is the `id` of the previous view state. So, when a `_eventId_previous`
    comes in via the request parameters, Web Flow will automatically take us back
    to the previous view state. The previous view will then be shown, including its
    data.


    We should be able to select a book from the available books list, and then add
    the book to our list of selected books that is stored on our form (see [Listing
    10-21](#Chapter10.html#list_10_21)).


    ***Listing 10-21.** Transition to Add a Seleted Book to Our Selected Book List*


    `<transition on="add" >`

    `    <evaluate expression="orderController.addBook(flowScope.orderForm)" />`

    `</transition>`


    This preceding snippet will invoke the method in [Listing 10-22](#Chapter10.html#list_10_22)
    on the `OrderController`.


    ***Listing 10-22.** Executing the Controller Code to Add a Book to Our Selected
    Book List*


    `public void addBook(OrderForm orderForm) {`

    `    Book book = bookstoreService.findBook(orderForm.getBookId());`

    `    if (orderForm.getSelectedBooks().containsKey(book)) {`

    `orderForm.getSelectedBooks().put(book,` ![Image](images/U002.jpg)

    `        orderForm.getSelectedBooks().get(book) + orderForm.getQuantity());`

    `    } else {`

    `        orderForm.getSelectedBooks().put(book, orderForm.getQuantity());`

    `    }`

    `}`


    We will use the OrderForm to retrieve the selected book `id`. This was bound by
    Web Flow on the form when the form was submitted (i.e., when executing the `add`
    transition). We retrieve the book and add it to the map of selected books with
    the specified amount.


    Also, notice that this transition does not have a `to` attribute. As we have already
    seen, this attribute is optional. When left unspecified, the same view state is
    rendered again. This is exactly what we want; after adding a book; that is, we
    want to stay on the same page and show the user that the new book was added to
    the list.


    Once some books are added to the list, the user might want to start over and thus
    clear the currently selected books. [Listing 10-23](#Chapter10.html#list_10_23)
    shows the transition, and [Listing 10-24](#Chapter10.html#list_10_24) shows the
    code that clears the list.


    ***Listing 10-23.** The Transition to Clear Our List of Selected Books*


    `<transition on="reset" to="selectBooks">`

    `    <evaluate expression="orderForm.resetSelectedBooks()" />`

    `</transition>`


    ***Listing 10-24.** The Code that Actually Clears the List*


    `public void resetSelectedBooks() {`

    `    selectedBooks.clear();`

    `}`


    As in the previous view state, the user must be able to opt out of the current
