- fmt: "### Using Type Conversion\n\nNow that we have covered type conversion, let’s\
    \ see it in action. We will create the user registration page that allows us to\
    \ enter the details for the `com.apress.prospringmvc.bookstore.domain.Account`\
    \ object. First, we need a web page under `WEB-INF/views`. Next, we need to create\
