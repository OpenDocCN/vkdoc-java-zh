    ![Image](img/square.jpg) **提示** 使用自定义异常处理器时，建议采用支持类 `org.springframework.webflow.engine.support.TransitionExecutingFlowExecutionExceptionHandler`。使用该支持类可以确保异常处理完成后导航按预期进行。此类可通过配置一个异常映射表来指定要处理的异常，以及处理异常后应执行的目标状态。默认情况下，该类还会将异常暴露在
    `flash` 作用域中。你可以重写 `handle` 方法以实现自定义异常处理。在这种情况下，建议在方法末尾调用 `super.handle`，以便异常仍能暴露在
    `flash` 作用域中，并执行到目标状态的转换。


    你可以通过一个或多个映射来配置 `TransitionExecutingFlowExecutionExceptionHandler`，每个映射以异常类作为键，目标状态
    ID 作为值。这两个值构成异常映射。每当处理器作用域内抛出异常时，`TransitionExecutingFlowExecutionExceptionHandler`
    会通过比较所抛出异常的异常类与初始配置映射中的异常类，检查是否存在对应映射。如果存在映射，则会调用 `exposeException()` 方法，最终流程将转换到该映射指定的目标状态。


    在查找异常时，`TransitionExecutingFlowExecutionExceptionHandler` 不仅会考虑 `FlowExecutionException`（或其任何子类），还会考虑其异常原因链。原因链中的异常也会匹配其超类的映射。例如，一个包装了
    `java.io.FileNotFoundException` 的 `FlowExecutionException` 实例，会匹配 `java.io.IOException`
    的映射，因为后者是 `FileNotFoundException` 的超类。


    `TransitionExecutingFlowExecutionExceptionHandler` 可以像普通 Spring Bean 一样进行配置，如清单
    12-13 所示。


    ***清单 12-13** 配置 `TransitionExecutingFlowExecutionExceptionHandler`*


    `@Bean`

    `public TransitionExecutingFlowExecutionExceptionHandler`![Image](img/U002.jpg)

    `                                           ioFlowExecutionExceptionHandler()
    {`

    `    TransitionExecutingFlowExecutionExceptionHandler`![Image](img/U002.jpg)

    `    handler = new TransitionExecutingFlowExecutionExceptionHandler();`


    `    handler.add(IOException.class, "targetState");`

    `    return handler;`

    `}`


    然后可以将 `ioFlowExecutionExceptionHandler` 配置为 `<exception-handler>` 元素的 bean 属性：


    `<exception-handler attribute="ioFlowExecutionExceptionHandler"/>`


    我们已经看到，Web Flow 提供了三种处理异常的方式：


    *   在应用程序控制器内部。通过捕获异常并向 `Messagecontext` 添加相应消息来实现。

    *   在流程内部，通过指定转换的 on exception 属性来实现。

    *   在流程内部，通过指定使用 `FlowExecutionExceptionHandler` 的 `<exception-handler>` 元素来实现。该元素可以在五个状态之一中以细粒度方式声明，也可以在整个流程中以粗粒度方式声明（在这种情况下，`<exception-handler>`
    元素是 flow 元素的直接同级元素）。


    问题在于：每种技术最适合在何时使用？当应用程序控制器与流程结合使用时，第一种方法可能最为自然。它让你能直接控制异常处理过程，并且与代码保持耦合。


    然而，如果你直接从流程内部执行服务或外观（而不使用任何应用程序控制器），那么你只能通过流程功能来响应异常。在这种情况下，使用第二种方法（即使用 on exception
    属性）将是处理应用程序异常的首选方式。


    最后一种方法，即使用 `FlowExecutionExceptionHandler`，更适用于全局异常行为。例如，假设你想在每次出现异常时记录日志。你可以通过在
    `flow` 级别声明一个 `FlowExecutionExceptionHandler` 来处理。

