    #### Exception Handling


    As mentioned in [Chapter 4](#Chapter04.html#ch4), when an exception occurs during
    request processing, Spring will try to handle the exception. To give us a generic
    way of handling exceptions, Spring uses yet another strategy that can be utilized
    by implementing the `org.springframework.web.servlet.HandlerExceptionResolver`
    interface.


    The `org.springframework.web.servlet.HandlerExceptionResolver` provides a callback
    method for the dispatcher servlet (see [Listing 6-17](#Chapter06.html#list_6_17)).
    This method is called when an exception occurs during the request processing workflow.
    The method can return an `org.springframework.web.servlet.ModelAndView`, or it
    can choose to handle the `Exception` itself.


    ***Listing 6-17.** The HandlerExceptionResolver Interface*


    `package org.springframeowork.web.servlet;`


    `import javax.servlet.http.HttpServletRequest;`

    `import javax.servlet.http.HttpServletResponse;`


    `public interface HandlerExceptionResolver {`


    `  ModelAndView resolveException(HttpServletRequest request,`

    `                                HttpServletResponse response,`

    `                                Object handler,`

    `                                Exception ex);`

    `}`


    By default, the dispatcher servlet looks for all beans in the application context
    of the type `org.springframework.web.servlet.HandlerExceptionResolver` (see the
    “Configuring the DispatcherServlet” section in [Chapter 4](#Chapter04.html#ch4)).
    When multiple resolvers are detected, the dispatcher servlet will consult each
    of them until a viewname is returned or the response is written. If the exception
    cannot be handled, then the exception is rethrown, so that the servlet container
    can handle it. The servlet container will use the error-pages configuration from
    its configuration or simply propagate the exception to the user. (In most cases,
    you will get an error 500 with a stacktrace on screen.)


    Spring MVC comes with several implementations of the `org.springframework.web.servlet.HandlerExceptionResolver`
    interface, as we can see in [Figure 6-6](#Chapter06.html#fig_6_6). Note that each
    of these implementations works differently. [Table 6-4](#Chapter06.html#tab_6_4)
    gives a short overview on how the different implementations work.


    ![Image](images/9781430241553_Fig06-07.jpg)


    ***Figure 6-7.** The HandlerExceptionResolver hierarchy*


    ![Image](images/tab_6_4.jpg)


    As the class diagram in [Figure 6-7](#Chapter06.html#fig_6_7) illustrates, all
    usable implementations for resolving exceptions extend the `org.springframework.web.servlet.handler.AbstractHandlerExceptionResolver`.
    This is a convenient superclass that provides common features and configuration
    options to all implementations. [Table 6-5](#Chapter06.html#tab_6_5) lists and
    briefly describes its common properties.


