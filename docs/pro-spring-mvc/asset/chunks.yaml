    shown in [Figure 9-16](#Chapter09.html#fig_9_16).


    ![Image](images/9781430241553_Fig09-16.jpg)


    ***Figure 9-16.** Selecting the language to export the scenario to*


    Now, copy all lines in the Table list, by selecting them, right-clicking, and
    selecting Copy, as can be seen in [Figure 9-17](#Chapter09.html#fig_9_17).


    ![Image](images/9781430241553_Fig09-17.jpg)


    ***Figure 9-17**. Copying the scenario to the clipboard*


    After copying, you can paste this right in your test class file. The scenario
    will immediately be in the desired format, as you can see in [Listing 9-16](#Chapter09.html#list_9_16).


    ***Listing 9-16.** The scenario in Selenium WebDriver JUnit style generated by
    the Selenium IDE*


    `driver.get(baseUrl + "/chapter9-bookstore/index.htm");`

    `driver.findElement(By.id("login")).click();`

    `driver.findElement(By.id("username")).clear();`

    `driver.findElement(By.id("username")).sendKeys("jd");`

    `driver.findElement(By.id("password")).clear();`

    `driver.findElement(By.id("password")).sendKeys("secret");`

    `driver.findElement(By.id("loginButton")).click();`

    `driver.findElement(By.id("account")).click();`


    This is almost the same code as we came up with ourselves in the example. The
    only difference here is that Selenium also performs an explicit clear of the fields
    before adding text to them.


    Besides using the plug-in to generate code from recorded scenarios, you can also
    replay scenarios using the plug-in. For more information we recommend visiting
    the Selenium IDE documentation page.^([22](#Chapter09.html#CHP-9-FN-22))'
