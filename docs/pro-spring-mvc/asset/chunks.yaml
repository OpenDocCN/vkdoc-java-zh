  raw: '### The MVC Pattern


    The Model View Controller pattern (MVC pattern) was first described by Trygve
    Reenskaug when he was working on Smalltalk at Xerox. At that time, the pattern
    was aimed at desktop applications. This pattern divides the presentation layer
    into different kinds of components. Each component has its own responsibilities.
    The view uses the model to render itself. Based on a user action, the view triggers
    the controller, which in turn updates the model. The model then notifies the view
    to (re)render itself (see [Figure 3-1](#Chapter03.html#fig_3_1)).


    ![Image](images/9781430241553_Fig03-01.jpg)


    ***Figure 3-1.** The MVC pattern*


    The MVC pattern is all about separation of concerns. As we mentioned previously,
    each component has its own role (see [Table 3-1](#Chapter03.html#tab_3_1)). Separation
    of concerns is important in the presentation layer because it helps us keep the
    different components clean. This way, we don’t burden the actual view with business
    logic, navigation logic, and model data. Following this approach keeps everything
    nicely separated, which makes it easier to maintain and test our application.


    ![Image](images/tab_3_1.jpg)


    The classic implementation of the MVC pattern (as shown in [Figure 3-1](#Chapter03.html#fig_3_1))
    involves the user triggering an action. This prompts the controller to update
    the model, which in turn pushes the changes back to the view. The view then updates
    itself with the updated data from the model. This is the ideal implementation
    of an MVC pattern, and it works very well in desktop applications based on Swing,
    for example. However, this approach is not feasible in a web environment due to
    the nature of the HTTP protocol. For a web application, the user typically initiates
    action by issuing a request. This prompts the app to update and render the view,
    which is sent back to the user. This means that we need a slightly different approach
    in a web environment. Instead of pushing the changes to the view, we need to pull
    the changes from the server.


    This approach seems quite workable, but it isn’t as straightforward to apply in
    a web application as one might think. The Web (or HTTP) is stateless by design,
    so keeping a model around can be quite difficult. For the Web, the MVC pattern
    is implemented as a *Model 2* architecture (see [Figure 3-2](#Chapter03.html#fig_3_2))^([1](#Chapter03.html#CHP-3-FN-1)).
    The difference between the original pattern (*Model 1* was shown in [Figure 3-1](#Chapter03.html#fig_3_1))
    and the modified pattern is that it incorporates a *front controller* that dispatches
    the incoming requests to other controllers. These controllers handle the incoming
    request, return the model, and select the view.


    ____________


    ¹ [`http://java.sun.com/blueprints/guidelines/designing_enterprise_applications_2e/web-tier/webtier5.html`](http://java.sun.com/blueprints/guidelines/designing_enterprise_applications_2e/web-tier/webtier5.html)


    ![Image](images/9781430241553_Fig03-02.jpg)


    ***Figure 3-2.** The Model 2 MVC pattern*


    The front controller is the component that handles the incoming requests. First,
    it delegates the request to a suitable controller. When that controller has finished
    processing and updating the model, the front controller will determine which view
    to render based on the outcome. In most cases, this front controller is implemented
    as a `javax.servlet.Servlet` servlet (e.g., `ActionServlet` in struts or `FacesServlet`
    in JSF). In Spring MVC, this front controller is `org.springframework.web.servlet.DispatcherServlet`.


    ### Application Layering


    In the introduction, we mentioned that an application consists of several layers
    (see [Figure 4-3](#Chapter04.html#fig_4_3)). We like to think of a layer as an
    area of concern for the application. Therefore, we also use layering to achieve
    separation of concerns. For example, the view shouldn’t be burdened with business
    or data access logic because these are all different concerns and typically located
    in different layers.


    Layers should be thought of as conceptual boundaries, but they don’t have to be
    physically isolated from each other (in another virtual machine). For a web application,
    the layers typically run inside the same virtual machine. Rod Johnson’s book,
    *Expert One-on-One J2EE Design and Development* (Wrox, 2002), has a good discussion
    on application distribution and scaling.


    ![Image](images/9781430241553_Fig03-03.jpg)


    ***Figure 3-3.** Typical application layering*


    [Figure 3-3](#Chapter03.html#fig_3_3) is a highly generalized view of the layers
    of a Spring MVC application. This layering can be seen in many applications. The
    data access is at the bottom of the application, the presentation is on top, and
    the services (the actual business logic) are in the middle. In this chapter, we
    will take a look at this architecture and how everything is organized. [Table
    3-2](#Chapter03.html#tab_3_2) provides a brief description of the different layers.


    ![Image](images/tab_3_2.jpg)


    Communication between the layers is from top to bottom. The service layer can
    access the data access layer, but the data access layer cannot access the service
    layer. If you see these kinds of circular dependencies creep into your application,
    take a few steps back and reconsider your design. Circular dependencies (or bottom
    to top dependencies) are almost always a sign of bad design and lead to increased
    complexity and a harder-to-maintain application.


    ![Image](images/square.jpg) **Note** Sometimes, one might also encounter the term,
    *tier*. Many people use tier and layer interchangeably; however, separating the
    two helps when discussing the application architecture or its deployment. We like
    to use *layer* to indicate a conceptual layer in the application, whereas a *tier*
    indicates the physical separation of the layers on different machines at deployment
    time. Thinking in *layers* helps the software developer, whereas thinking in *tiers*
    helps the system administrator.


    Although [Figure 3-3](#Chapter03.html#fig_3_3) gives a general overview of the
    layers for a web application, we could break it down a little further. In a typical
    web application, we can identify five conceptual layers (see [Figure 3-4](#Chapter03.html#fig_3_4)).
    We can split the presentation layer into a web and user interface layer, but the
    application also includes a domain layer (see the “Spring MVC Application Layers”
    section later in this chapter). Typically, the domain layer cuts across all layers
    because it is used everywhere from the data access layer to the user interface.


    ![Image](images/9781430241553_Fig03-04.jpg)


    ***Figure 3-4.** Web MVC application layers*


    ![Image](images/square.jpg) **Note** The layered architecture isn’t the only application
    architecture out there; however, it is the most frequently encountered architecture
    for web applications.


    If we look at the sample application, the architecture shown in [Figure 3-4](#Chapter03.html#fig_3_4)
    is made explicit in the package structure. The packages can be found in the *bookstore-shared*
    project (see [Figure 3-5](#Chapter03.html#fig_3_5)). The main packages include
    the following:


    *   `com.apress.prospringmvc.bookstore.domain`: the domain layer

    *   `com.apress.prospringmvc.bookstore.service`: the service layer

    *   `com.apress.prospringmvc.bookstore.repository`: the data access layer


    The other packages are supporting packages for the web layer and the `com.apress.prospringmvc.bookstore.config`
    package contains the configuration classes for the root application context. The
    user interface and web layer we over the course of this book, and these layers
    will be in the `com.apress.prospringmvc.bookstore.web` package and in Java Server
    Pages where needed for the user interface.


    ![Image](images/9781430241553_Fig03-05.jpg)


    ***Figure 3-5.** The Bookstore packages overview*'
  trans: '

    ### MVC 模式


    模型-视图-控制器模式（MVC 模式）最早由 Trygve Reenskaug 在施乐公司从事 Smalltalk 开发时提出。当时，该模式主要面向桌面应用程序。该模式将表示层划分为不同类型的组件，每个组件都有其自身的职责。视图利用模型来渲染自身。基于用户的操作，视图会触发控制器，控制器进而更新模型。然后模型会通知视图进行（重新）渲染（参见图
    3-1）。


    ![Image](img/9781430241553_Fig03-01.jpg)


    ***图 3-1.** MVC 模式*


    MVC 模式的核心在于关注点分离。正如我们之前提到的，每个组件都有其特定的角色（参见表 3-1）。关注点分离在表示层中非常重要，因为它有助于我们保持各个组件的清晰整洁。这样，我们就不会让实际的视图承担业务逻辑、导航逻辑和模型数据的负担。遵循这种方法可以使一切保持良好分离，从而使我们的应用程序更易于维护和测试。


    ![Image](img/tab_3_1.jpg)


    MVC 模式的经典实现（如图 3-1 所示）涉及用户触发一个操作。这会促使控制器更新模型，模型进而将更改推送给视图。然后视图使用来自模型的更新数据进行自我更新。这是
    MVC 模式的理想实现，例如，它在基于 Swing 的桌面应用程序中运行良好。然而，由于 HTTP 协议的特性，这种方法在 Web 环境中并不可行。对于 Web
    应用程序，用户通常通过发出请求来启动操作。这会促使应用程序更新并渲染视图，然后将视图发送回用户。这意味着我们在 Web 环境中需要一种略有不同的方法。我们不是将更改推送给视图，而是需要从服务器拉取更改。


    这种方法看起来相当可行，但在 Web 应用程序中应用起来并不像人们想象的那么直接。Web（或 HTTP）本质上是无状态的，因此保持模型的存在可能相当困难。对于
    Web 而言，MVC 模式被实现为 *Model 2* 架构（参见图 3-2）^(1)。原始模式（*Model 1* 如图 3-1 所示）与修改后模式的区别在于，后者引入了一个*前端控制器*，用于将传入的请求分派给其他控制器。这些控制器处理传入的请求，返回模型，并选择视图。


    ____________


    ¹ [`http://java.sun.com/blueprints/guidelines/designing_enterprise_applications_2e/web-tier/webtier5.html`](http://java.sun.com/blueprints/guidelines/designing_enterprise_applications_2e/web-tier/webtier5.html)


    ![Image](img/9781430241553_Fig03-02.jpg)


    ***图 3-2.** Model 2 MVC 模式*


    前端控制器是处理传入请求的组件。首先，它将请求委托给一个合适的控制器。当该控制器完成处理并更新模型后，前端控制器将根据结果决定渲染哪个视图。在大多数情况下，这个前端控制器被实现为一个
    `javax.servlet.Servlet` servlet（例如，Struts 中的 `ActionServlet` 或 JSF 中的 `FacesServlet`）。在
    Spring MVC 中，这个前端控制器是 `org.springframework.web.servlet.DispatcherServlet`。


    ### 应用程序分层


    在引言中，我们提到一个应用程序由多个层组成（参见图 4-3）。我们倾向于将层视为应用程序的一个关注领域。因此，我们也使用分层来实现关注点分离。例如，视图不应该承担业务逻辑或数据访问逻辑，因为这些是不同的关注点，通常位于不同的层中。


    层应被视为概念上的边界，但它们不必在物理上相互隔离（在不同的虚拟机中）。对于 Web 应用程序，这些层通常运行在同一个虚拟机内。Rod Johnson 的著作
    *Expert One-on-One J2EE Design and Development*（Wrox, 2002）对应用程序的分布和扩展进行了很好的讨论。


    ![Image](img/9781430241553_Fig03-03.jpg)


    ***图 3-3.** 典型的应用程序分层*


    图 3-3 是 Spring MVC 应用程序各层的高度概括视图。这种分层在许多应用程序中都能看到。数据访问位于应用程序的底部，表示层位于顶部，而服务层（实际的业务逻辑）位于中间。在本章中，我们将探讨这种架构以及一切是如何组织的。表
    3-2 提供了对不同层的简要描述。


    ![Image](img/tab_3_2.jpg)


    层之间的通信是自上而下的。服务层可以访问数据访问层，但数据访问层不能访问服务层。如果你发现应用程序中出现了这种循环依赖，请退后几步，重新考虑你的设计。循环依赖（或自下而上的依赖）几乎总是设计不良的标志，会导致复杂性增加，并使应用程序更难维护。


    ![Image](img/square.jpg) **注意** 有时，人们也可能遇到术语 *tier*。许多人将 tier 和 layer 互换使用；然而，在讨论应用程序架构或其部署时，区分这两个术语会有所帮助。我们倾向于使用
    *layer* 来表示应用程序中的概念层，而 *tier* 则表示在部署时各层在不同机器上的物理分离。从 *layers* 的角度思考有助于软件开发人员，而从
    *tiers* 的角度思考则有助于系统管理员。


    尽管图 3-3 给出了 Web 应用程序各层的总体概览，但我们还可以进一步细分。在一个典型的 Web 应用程序中，我们可以识别出五个概念层（参见图 3-4）。我们可以将表示层拆分为
    Web 层和用户界面层，但应用程序还包括一个领域层（请参阅本章后面的“Spring MVC 应用程序层”部分）。通常，领域层横切所有层，因为它从数据访问层到用户界面层都被广泛使用。


    ![Image](img/9781430241553_Fig03-04.jpg)


    ***图 3-4.** Web MVC 应用程序层*


    ![Image](img/square.jpg) **注意** 分层架构并非唯一的应用程序架构；然而，它是 Web 应用程序中最常遇到的架构。


    如果我们查看示例应用程序，图 3-4 中所示的架构在包结构中得到了明确体现。这些包可以在 *bookstore-shared* 项目中找到（参见图 3-5）。主要的包包括：


    *   `com.apress.prospringmvc.bookstore.domain`：领域层

    *   `com.apress.prospringmvc.bookstore.service`：服务层

    *   `com.apress.prospringmvc.bookstore.repository`：数据访问层


    其他包是 Web 层的支持包，而 `com.apress.prospringmvc.bookstore.config` 包包含根应用程序上下文的配置类。用户界面层和
    Web 层将在本书中介绍，这些层将位于 `com.apress.prospringmvc.bookstore.web` 包中，并在需要时以 Java Server
    Pages 的形式存在于用户界面中。


    ![Image](img/9781430241553_Fig03-05.jpg)


    ***图 3-5.** Bookstore 包结构概览*

    '
- fmt: '### Separation of Concerns


    As we mentioned in [Chapter 2](#Chapter02.html#ch2), it is important to have a
    clear separation of concerns. If we look at the architecture from [Figure 3-4](#Chapter03.html#fig_3_4),
    the separation of concerns is present in the layers. Separating the concerns into
    different layers helps us achieve a clean design, as well as a flexible and testable
    application.


    Creating or detecting layers can be hard. A rule of thumb is that, if a layer
    has too many dependencies with other layers, we might want to introduce another
    layer that incorporates all the dependencies. On the other hand, if we see a single
    layer throughout different layers, we might want to reconsider this layer and
    make it an aspect of the application. In this case, we can use the AOP functionality
    from the Spring Framework to apply these aspects at runtime (see [Chapter 2](#Chapter02.html#ch2)).


    Coupling layers—for example, the service layer will need to talk to the data access
    layer—is done by defining clear interfaces. Defining interfaces and programming
    to interfaces reduces the actual coupling to concrete implementations. This reduced
    coupling and reduced complexity results in an easier-to-test and easier-to-maintain
    application. Another benefit of using interfaces is that Spring can use JDK Dynamic
    Proxies^([2](#Chapter03.html#CHP-3-FN-2)) to create proxies and apply AOP.


    ![Image](images/square.jpg) **Note** Spring can also apply AOP on class-based
    proxies; however, this requires the `cglib` library ([`http://cglib.sourceforge.net`](http://cglib.sourceforge.net))
    on the classpath.


    The point is this: layering in an application leads to a more maintainable and
    testable application. A clear separation of concerns also leads to good application
    architecture.


    ### Spring MVC Application Layers


    You might wonder how all the layers fit into a Spring MVC application, as well
    as how all the different layers help us build our Spring MVC application. In this
    section, we will take a look at the five layers depicted in [Figure 3-4](#Chapter03.html#fig_3_4).
    We will pay particular attention to the roles the different layers play and what
    should be in each.


    #### The Domain Layer


    The domain is the most important layer in an application. It is the code representation
    of the business problem we are solving, and it contains the business rules of
    our domain. These rules might check whether we have sufficient funds to transfer
    money from our account or ensure that fields are unique (e.g., usernames in our
    system).


    A popular technique to determine the domain model is to use the nouns in use case
    descriptions as domain objects (e.g., `Account` or `Transaction`). These objects
    contain both state (e.g., the `username` for the `Account`) and behavior (e.g.,
    a `credit` method on the `Account`). These methods are typically more fine-grained
    then the methods in the service layer. For example, in the money transfer sample
    in [Chapter 2](#Chapter02.html#ch2), the `com.apress.prospringmvc.moneytransfer.domain.Account`
    object has a `debit` and `credit` method. The `credit` method contains some business
    logic for checking whether we have sufficient money in our account to transfer
    the money.


    ____________


    ² [`http://docs.oracle.com/javase/6/docs/technotes/guides/reflection/proxy.html`](http://docs.oracle.com/javase/6/docs/technotes/guides/reflection/proxy.html)


    In [Chapter 2](#Chapter02.html#ch2), the implementations of the `com.apress.prospringmvc.moneytransfer.service.MoneyTransferService`
    used these supporting methods to implement a use case (in the sample, it transferred
    money from one account to another account). This is not to be confused with an
    anemic domain model^([3](#Chapter03.html#CHP-3-FN-3)), in which our domain objects
    only hold state and have no behavior.


    In general, your domain model will not need dependencies injected; however, it
    is still possible to do this. For example, it’s possible to use the Spring Framework
    and AspectJ to enable dependency injection in our domain objects. In that circumstance,
    we would give our domain classes the `org.springframework.beans.factory.annotation.Configurable`
    annotation. Next, we would need to set up load-time weaving or compile-time weaving,
    and we would have our dependencies injected. For more detailed information on
    the subject, please see the Spring Reference Guide^([4](#Chapter03.html#CHP-3-FN-4)).


    ![Image](images/square.jpg) **Note** This is the setup used in Spring ROO^([5](#Chapter03.html#CHP-3-FN-5)).
    It uses a *rich domain model*, as advocated by Eric Evans^([6](#Chapter03.html#CHP-3-FN-6)).


    #### The User Interface Layer


    The user interface layer presents the application to the user. This layer renders
    the response generated by the server into the type requested by the user’s client.
    For instance, a web browser will probably request an HTML document, a web service
    may want an XML document, and another client could request a PDF or Excel document.


    We separated the presentation layer into a user interface and web layer because,
    notwithstanding the wide range of different view technologies, we wanted to reuse
    as much code as possible. Our goal is to reimplement only the user interface.
    There are many different view technologies out there, including JSP(X), JSF, Velocity,
    and Freemarker, to name a few. In an ideal world, we would be able to switch our
    user interface without changing the backend of our application.


    Spring MVC helps us in isolating the user interface from the rest of the system.
    In Spring, the view is represented by an interface: `org.springframework.web.servlet.View`.
    This interface is responsible for transforming the result of the action from the
    user (the model) into the type of response the user requested. The `View` interface
    is generic, and it has no dependencies on a particular view technology. For each
    supported view technology, there is an implementation provided either by the Spring
    Framework itself or by the view technologies themselves. Out of the box, Spring
    supports the following view technologies:


    *   JSP

    *   PDF

    *   Excel


    ____________


    ³ [`http://martinfowler.com/bliki/AnemicDomainModel.html`](http://martinfowler.com/bliki/AnemicDomainModel.html)


    ⁴ [`http://static.springsource.org/spring/docs/3.1.x/spring-frameworkreference/html/aop.html#aop-atconfigurable`](http://static.springsource.org/spring/docs/3.1.x/spring-frameworkreference/html/aop.html#aop-atconfigurable)


    ⁵ [`http://www.springsource.org/spring-roo`](http://www.springsource.org/spring-roo)


    ⁶ [`http://domaindrivendesign.org/`](http://domaindrivendesign.org/)


    *   Freemarker

    *   Velocity

    *   JasperReports

    *   Tiles 2

    *   XML (marshaling, XSLT or plain)

    *   JSON


    The user interface in general has a dependency on the domain layer. Sometimes,
    it is convenient to directly expose and render the domain model. This can be especially
    useful when we start to use forms in our application. For example, this would
    let us work directly with the domain objects instead of an additional layer of
    indirection. Some argue that this creates an unnecessary or unwanted coupling
    between layers. However, the creation of another layer for the sole purpose of
    decoupling the domain from the view leads to unnecessary complexity and duplication.
    In any case, it is important to keep in mind that Spring MVC doesn’t requires
    us to directly expose the domain model to the view—whether we do so is entirely
    up to us.'
