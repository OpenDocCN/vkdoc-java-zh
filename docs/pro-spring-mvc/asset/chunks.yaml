    `            <legend>#springMessage("book.searchcriteria")</legend>`

    `            <table>`

    `                <tr><td>#springMessage("book.title")</td><td>#springFormInput`![Image](images/U002.jpg)

    `("searchCriteria.title" "")</td></tr>`

    `                <tr><td>#springMessage("book.category")</td><td>#springFormSingleSelect`![Image](images/U002.jpg)

    `("searchCriteria.category" $categories "")</td></tr>`

    `            </table>`

    `        </fieldset>`

    `        <button id="search">#springMessage("button.search")</button>`

    `    </form>`


    `    #if ($bookList.empty eq false)`

    `        <table>`

    `            <tr><th>#springMessage("book.title")</th><th>#springMessage`![Image](images/U002.jpg)

    `("book.description")</th><th>#springMessage("book.price")</th></tr>`

    `            #foreach($book in $bookList)`

    `                <tr><td>${book.title}</td><td>${book.description}</td><td>$`![Image](images/U002.jpg)

    `{book.price}</td><td><a href="#springUrl("/cart/add/${book.id}")">#springMessage`![Image](images/U002.jpg)

    `("book.addtocart")</a></tr>`

