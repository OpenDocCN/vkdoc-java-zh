- fmt: "#### Adding the Right Dependencies\n\nBefore you can use Spring Security you\
    \ have to declare the correct set of dependencies. Like Web Flow or Spring MVC,\
    \ Spring Security is a module on which you must declare a specific dependency\
    \ in order to use it. Conveniently, Spring Security itself is further divided\
    \ into submodules. This is convenient because your project can depend on the modules\
    \ it actually needs; no more, no fewer. This helps to keep your dependency tree\
    \ clean, as no unused modules (which again have dependencies) are pulled into\
    \ your project. The modules we will be using (and the ones you will probably always\
    \ use to secure a web application) are listed in [Table 13-1](#Chapter13.html#tab_13_1).\n\
    \n![Image](images/9781430241553_Tab13-01.jpg)\n\nIn the sample project, you will\
    \ find these modules translated to dependency entries in the `build.gradle` (see\
    \ [Listing 13-1](#Chapter13.html#list_13_1)).\n\n***Listing 13-1.** Dependencies\
    \ in gradle*\n\n```\ncompile \"org.springframework.security:spring-security-core:$springSecurityVersion\"\
    \ncompile \"org.springframework.security:spring-security-web:$springSecurityVersion\"\
    \ncompile \"org.springframework.security:spring-security-config:$springSecurityVersion\"\
    \ncompile \"org.springframework.security:spring-security-taglibs:$springSecurityVersion\"\
    \n```\n\nSince Spring Security is a core dependency, we used a variable to indicate\
    \ its version, `$springSecurityVersion`. The value of this variable can be found\
    \ in the root Gradle file. (At the time of writing, it is 3.1.0.RELEASE.)\n\n\
    ![Image](images/square.jpg) **Note** You’ve seen that Spring Security is divided\
    \ into several modules. The modules we are depending on, as can be seen in [Listing\
    \ 13-1](#Chapter13.html#list_13_1), are only a subset of these, since we will\
    \ not be using every functionality Spring Security has to offer. In case you require\
    \ other functionality (LDAP, for example) you have to include it as an extra module\
    \ in your dependency list. A list of these modules can be found in the Spring\
    \ Security reference under the dependency section^([1](#Chapter13.html#CHP-13-FN-1)).\
    \ Here you will see each module listed together with its own dependencies. The\
    \ dependencies of the module itself are only there as information; they will be\
    \ pulled in automatically by your build tool/dependency management system from\
    \ the moment you add a dependency to one of the Spring Security modules.\n\n__________\n\
    \n¹ [`http://static.springsource.org/spring-security/site/docs/3.1.x/reference/appendixdependencies.html`](http://static.springsource.org/spring-security/site/docs/3.1.x/reference/appendixdependencies.html)\n\
    \n#### Enabling Spring Security\n\nBefore we can secure anything, we need to enable\
    \ Spring Security. The core concept is that it will capture every request coming\
    \ in to our system and decide if the request can go through or not. The mechanism\
    \ to support this begins with a standard JEE Servlet filter.\n\nSpring Security\
    \ uses the Spring Core `org.springframework.web.filter.DelegatingFilterProxy`\
    \ (which is an implementation of a standard `javax.servlet.Filter`), which will\
    \ be configured to intercept every request. This filter will serve as a hook to\
    \ delegate the captured requests to Spring Security. The configuration of the\
    \ filter is done the same way as with the Spring MVC dispatcher servlet, in our\
    \ `com.apress.prospringmvc.bookstore.web.BookstoreWebApplicationInitializer`.\
    \ We can make use of the JEE dynamic servlet API to add this filter, as shown\
    \ in [Listing 13-2](#Chapter13.html#list_13_2).\n\n***Listing 13-2.** Registering\
    \ the Spring Security Filter in BookstoreWebApplicationInitializer*\n\n```\nprivate\
    \ void registerSpringSecurityFilterChain(ServletContext servletContext){\n   \
    \ FilterRegistration.Dynamic springSecurityFilterChain =\n        servletContext.addFilter(BeanIds.SPRING_SECURITY_FILTER_CHAIN,\
    \ new\n              DelegatingFilterProxy());\n        springSecurityFilterChain.addMappingForUrlPatterns(null,\
    \ false, \"/*\");\n}\n```\n\nThe first argument of `addFilter` is the name we\
    \ will be giving to the filter. In this case the name of the filter we are adding\
    \ is `springSecurityFilterChain`. We didn’t choose a random name, but in fact\
    \ referred to a Spring class containing these predefined names as constants (so\
    \ the constant `org.springframework.security.config.BeanIds.SPRING_SECURITY_FILTER_CHAIN`\
    \ has the value `springSecurityFilterChain`). When we cover the Spring side in\
    \ a moment, we will explain why this filter’s name is of importance. The second\
    \ argument is the filter instance itself.\n\nAlso note that the filter `DelegatingFilterProxy`\
    \ is a “catch-all” filter. Looking at the filter pattern `\"/*\"` it will capture\
    \ ANY request (see [Figure 13-2](#Chapter13.html#fig_13_2))! So there is no request\
    \ that can go into our application without being captured by this filter.\n\n\
    ![Image](images/9781430241553_Fig13-02.jpg)\n\n***Figure 13-2.** Filter catches\
    \ all requests.*\n\nThe first parameter of `addMappingForUrlPatterns` (`dispatcherTypes`)\
    \ indicates when the filter should be invoked. The default (when supplying `null`)\
    \ is to invoke it for all requests coming from “outside” the Servlet container.\
    \ You can also specify, for example, that the filter should be invoked when a\
    \ resource is accessed by an internal include or forward statement. In that case\
    \ you must supply a `java.util.EnumSet` with one or more enumerations of type\
    \ `javax.servlet.DispatcherType`. Leaving this value as `null` is sufficient,\
    \ since your resources are protected from the outside, and even when making includes\
    \ or forwards you will be checking authorization on your pages using security\
    \ tags (which we will cover later). However, in some situations it can be desirable\
    \ to go through the security filter chain again when performing such operations."
  raw: '#### Adding the Right Dependencies


    Before you can use Spring Security you have to declare the correct set of dependencies.
    Like Web Flow or Spring MVC, Spring Security is a module on which you must declare
    a specific dependency in order to use it. Conveniently, Spring Security itself
    is further divided into submodules. This is convenient because your project can
    depend on the modules it actually needs; no more, no fewer. This helps to keep
    your dependency tree clean, as no unused modules (which again have dependencies)
    are pulled into your project. The modules we will be using (and the ones you will
    probably always use to secure a web application) are listed in [Table 13-1](#Chapter13.html#tab_13_1).


    ![Image](images/9781430241553_Tab13-01.jpg)


    In the sample project, you will find these modules translated to dependency entries
    in the build.gradle (see [Listing 13-1](#Chapter13.html#list_13_1)).


    ***Listing 13-1.** Dependencies in gradle*


    `compile "org.springframework.security:spring-security-core:$springSecurityVersion"`

    `compile "org.springframework.security:spring-security-web:$springSecurityVersion"`

    `compile "org.springframework.security:spring-security-config:$springSecurityVersion"`

    `compile "org.springframework.security:spring-security-taglibs:$springSecurityVersion"`


    Since Spring Security is a core dependency, we used a variable to indicate its
    version, `$springSecurityVersion`. The value of this variable can be found in
    the root Gradle file. (At the time of writing, it is 3.1.0.RELEASE.)


    ![Image](images/square.jpg) **Note** You’ve seen that Spring Security is divided
    into several modules. The modules we are depending on, as can be seen in [Listing
    13-1](#Chapter13.html#list_13_1), are only a subset of these, since we will not
    be using every functionality Spring Security has to offer. In case you require
    other functionality (LDAP, for example) you have to include it as an extra module
    in your dependency list. A list of these modules can be found in the Spring Security
    reference under the dependency section^([1](#Chapter13.html#CHP-13-FN-1)). Here
    you will see each module listed together with its own dependencies. The dependencies
    of the module itself are only there as information; they will be pulled in automatically
    by your build tool/dependency management system from the moment you add a dependency
    to one of the Spring Security modules.


    __________


    ¹ [`http://static.springsource.org/spring-security/site/docs/3.1.x/reference/appendixdependencies.html`](http://static.springsource.org/spring-security/site/docs/3.1.x/reference/appendixdependencies.html)


    #### Enabling Spring Security


    Before we can secure anything, we need to enable Spring Security. The core concept
    is that it will capture every request coming in to our system and decide if the
    request can go through or not. The mechanism to support this begins with a standard
    JEE Servlet filter.


    Spring Security uses the Spring Core `org.springframework.web.filter.DelegatingFilterProxy`
    (which is an implementation of a standard `javax.servlet.Filter`), which will
    be configured to intercept every request. This filter will serve as a hook to
    delegate the captured requests to Spring Security. The configuration of the filter
    is done the same way as with the Spring MVC dispatcher servlet, in our `com.apress.prospringmvc.bookstore.web.BookstoreWebApplicationInitializer`.
    We can make use of the JEE dynamic servlet API to add this filter, as shown in
    [Listing 13-2](#Chapter13.html#list_13_2).


    ***Listing 13-2.** Registering the Spring Security Filter in BookstoreWebApplicationInitializer*


    `private void registerSpringSecurityFilterChain(ServletContext servletContext){`

    `FilterRegistration.Dynamic springSecurityFilterChain =` ![Image](images/U002.jpg)

    `servletContext.addFilter(BeanIds.SPRING_SECURITY_FILTER_CHAIN, new` ![Image](images/U002.jpg)

    `      DelegatingFilterProxy());`

    `    springSecurityFilterChain.addMappingForUrlPatterns(null, false, "/*");`

    `}`


    The first argument of `addFilter` is the name we will be giving to the filter.
    In this case the name of the filter we are adding is `springSecurityFilterChain`.
    We didn’t choose a random name, but in fact referred to a Spring class containing
    these predefined names as constants (so the constant `org.springframework.security.config.BeanIds.SPRING_SECURITY_FILTER_CHAIN`
    has the value `springSecurityFilterChain`*)*. When we cover the Spring side in
    a moment, we will explain why this filter’s name is of importance. The second
    argument is the filter instance itself.


    Also note that the filter `DelegatingFilterProxy` is a “catch-all” filter. Looking
    at the filter pattern “/*” it will capture ANY request (see [Figure 13-2](#Chapter13.html#fig_13_2))!
    So there is no request that can go into our application without being captured
    by this filter.


    ![Image](images/9781430241553_Fig13-02.jpg)


    ***Figure 13-2.** Filter catches all requests.*


    The first parameter of `addMappingForUrlPatterns` (dispatcherTypes) indicates
    when the filter should be invoked. The default (when supplying null) is to invoke
    it for all requests coming from “outside” the Servlet container. You can also
    specify, for example, that the filter should be invoked when a resource is accessed
    by an internal include or forward statement. In that case you must supply a `java.util.EnumSet`
    with one or more enumerations of type `javax.servlet.DispatcherType`. Leaving
    this value as null is sufficient, since your resources are protected from the
    outside, and even when making includes or forwards you will be checking authorization
    on your pages using security tags (which we will cover later). However, in some
    situations it can be desirable to go through the security filter chain again when
    performing such operations.'
  trans: '

    #### 添加正确的依赖项


    在使用 Spring Security 之前，您必须声明正确的依赖项集合。与 Web Flow 或 Spring MVC 类似，Spring Security
    是一个模块，您必须为其声明特定的依赖项才能使用它。方便的是，Spring Security 本身又进一步划分为多个子模块。这样做的好处是，您的项目可以只依赖它实际需要的模块；不多不少。这有助于保持依赖树整洁，因为不会将未使用的模块（这些模块本身也有依赖项）拉入您的项目。我们将要使用的模块（以及您可能始终用于保护
    Web 应用程序的模块）列在表 13-1 中。


    ![Image](img/9781430241553_Tab13-01.jpg)


    在示例项目中，您会发现这些模块已转换为 `build.gradle` 中的依赖项条目（请参见清单 13-1）。


    ***清单 13-1.** Gradle 中的依赖项*


    `compile "org.springframework.security:spring-security-core:$springSecurityVersion"`

    `compile "org.springframework.security:spring-security-web:$springSecurityVersion"`

    `compile "org.springframework.security:spring-security-config:$springSecurityVersion"`

    `compile "org.springframework.security:spring-security-taglibs:$springSecurityVersion"`


    由于 Spring Security 是一个核心依赖项，我们使用了一个变量 `$springSecurityVersion` 来表示其版本。该变量的值可以在根
    Gradle 文件中找到。（在撰写本文时，其版本为 3.1.0.RELEASE。）


    ![Image](img/square.jpg) **注意** 您已经看到 Spring Security 被划分为多个模块。如清单 13-1 所示，我们所依赖的模块只是其中的一部分，因为我们不会使用
    Spring Security 提供的所有功能。如果您需要其他功能（例如 LDAP），则必须将其作为额外模块包含在依赖项列表中。这些模块的列表可以在 Spring
    Security 参考文档的依赖项部分找到^(1)。在这里，您将看到每个模块及其自身的依赖项一起列出。模块自身的依赖项仅作为参考信息；从您向某个 Spring
    Security 模块添加依赖项的那一刻起，它们就会被您的构建工具/依赖管理系统自动拉取。


    __________


    ¹ [`http://static.springsource.org/spring-security/site/docs/3.1.x/reference/appendixdependencies.html`](http://static.springsource.org/spring-security/site/docs/3.1.x/reference/appendixdependencies.html)


    #### 启用 Spring Security


    在保护任何内容之前，我们需要启用 Spring Security。其核心概念是，它将捕获进入我们系统的每个请求，并决定该请求是否可以通过。支持此机制的起点是一个标准的
    JEE Servlet 过滤器。


    Spring Security 使用 Spring Core 的 `org.springframework.web.filter.DelegatingFilterProxy`（它是标准
    `javax.servlet.Filter` 的一个实现），该过滤器将被配置为拦截每个请求。此过滤器将作为一个钩子，将捕获到的请求委托给 Spring Security。过滤器的配置方式与
    Spring MVC 的 Dispatcher Servlet 相同，都在我们的 `com.apress.prospringmvc.bookstore.web.BookstoreWebApplicationInitializer`
    中进行。我们可以利用 JEE 动态 Servlet API 来添加此过滤器，如清单 13-2 所示。


    ***清单 13-2.** 在 BookstoreWebApplicationInitializer 中注册 Spring Security 过滤器*


    `private void registerSpringSecurityFilterChain(ServletContext servletContext){`

    `FilterRegistration.Dynamic springSecurityFilterChain =` ![Image](img/U002.jpg)

    `servletContext.addFilter(BeanIds.SPRING_SECURITY_FILTER_CHAIN, new` ![Image](img/U002.jpg)

    `      DelegatingFilterProxy());`

    `    springSecurityFilterChain.addMappingForUrlPatterns(null, false, "/*");`

    `}`


    `addFilter` 的第一个参数是我们将赋予过滤器的名称。在这种情况下，我们添加的过滤器名称为 `springSecurityFilterChain`。我们并非随意选择名称，实际上引用了一个包含这些预定义名称作为常量的
    Spring 类（因此常量 `org.springframework.security.config.BeanIds.SPRING_SECURITY_FILTER_CHAIN`
    的值为 `springSecurityFilterChain`*)*。稍后当我们介绍 Spring 端时，将解释为什么此过滤器的名称很重要。第二个参数是过滤器实例本身。


    另请注意，过滤器 `DelegatingFilterProxy` 是一个“全捕获”过滤器。查看过滤器模式“/*”，它将捕获任何请求（请参见图 13-2）！因此，没有任何请求可以在不被此过滤器捕获的情况下进入我们的应用程序。


    ![Image](img/9781430241553_Fig13-02.jpg)


    ***图 13-2.** 过滤器捕获所有请求。*


    `addMappingForUrlPatterns` 的第一个参数（dispatcherTypes）指示何时应调用过滤器。默认值（当提供 null 时）是对所有来自
    Servlet 容器“外部”的请求调用它。您也可以指定，例如，当通过内部 include 或 forward 语句访问资源时，应调用过滤器。在这种情况下，您必须提供一个
    `java.util.EnumSet`，其中包含一个或多个 `javax.servlet.DispatcherType` 类型的枚举。将此值保留为 null
    就足够了，因为您的资源受到外部保护，并且即使在执行 include 或 forward 时，您也会使用安全标签（我们稍后将介绍）检查页面上的授权。然而，在某些情况下，在执行此类操作时再次经过安全过滤器链可能是可取的。

    '
- fmt: '`addMappingForUrlPatterns`的第二个参数（即`isMatchAfter`）声明了当多个过滤器匹配同一个URL模式（或同一个Servlet）时的顺序；其值可以是`true`或`false`。在这种情况下，过滤器通常按照它们在`web.xml`中出现的顺序应用，或者当通过API（如我们这样）工作时，按照它们在代码中添加的顺序应用。如果你为`isMatchAfter`提供`true`，该过滤器将在匹配该URL模式（或Servlet）的过滤器链中最后被调用。如果多个过滤器匹配同一个URL模式（或Servlet）并且也将此标志设置为`true`，则使用它们定义的顺序（但它们仍将在所有其他过滤器之后匹配）。如果此标志设置为`false`，则发生相反的情况，该过滤器将在调用映射到同一URL（或Servlet）的其他过滤器之前被调用。由于我们控制所有注册的过滤器，我们可以通过简单地改变注册它们的顺序来改变顺序。因此无需考虑此属性，我们选择一个值（本例中为`false`）用于所有其他过滤器注册。在这种情况下，它们定义的顺序将决定它们被调用的顺序。


