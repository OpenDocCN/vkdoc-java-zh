    ### 设置变量和访问作用域


    好了，我们已经完成了第一次重构。在进一步深入之前，我们想先向你介绍一些其他的 Web Flow 特性。在本节中，我们将介绍如何使用流变量以及如何通过隐式对象访问不同的
    Web Flow 作用域。


    作用域被视为一个 `java.util.Map`，因此你只需传递一个键来从作用域中读取值，以及传递一个键和值来在作用域上设置内容。表达式语言使得读取作用域变得简单直接。例如，如果你想从
    `flow` 作用域中读取键为 `myKey` 的值，并将其传递给一个应用控制器，可以这样做：


    `expression="myApplicationController.someMethod(flowscope.myKey)"`


    设置变量可以使用 `<set>` 元素。该元素在所有五种状态（我们将在后续章节中介绍）中都是有效的，但决策状态除外。该元素也可以在转换中使用。清单 11-30
    中的示例通过一个流启动动作，在 `flow` 作用域上使用键 `myKey` 设置了一个字面值 `someValue`。我们本可以使用其他作用域来存放该值（例如
    `conversationScope` 或 `requestScope`）；然而，并非所有作用域都合理或允许。例如，`view` 作用域会报错，因为我们尚未处于视图状态，因此不存在
    `view` 作用域。最后，如果指定一个字面值，则必须将其放在单引号内。`value` 属性默认期望一个表达式，这意味着 `value` 属性的值会被自动解释为一个表达式（即，不需要将其放在
    `#{}` 之间）。


    ***清单 11-30.** 在 Flow 作用域上设置一个字面值*


    `<on-start>`

    `    <set name="flowScope.myKey" value="''someValue''"/>`

    `</on-start>`


    除了 `<set>` 元素，你还可以在 evaluate 动作中使用表达式语言来设置变量。清单 11-31 展示了如何将执行应用控制器方法返回的结果存储到
    `flow` 作用域中。该表达式包含了要执行的逻辑（在此例中，是在 `myApplicationController` bean 上执行 `someMethod`
    方法），将使用键 `myKey` 从 `flow` 作用域中检索到的值作为参数传递，并将结果以键 `someMethodResult` 存储在 `flow`
    作用域中。


    ***清单 11-31.** 带参数调用应用控制器方法并将结果存储在 flow 作用域上*


    `<evaluate expression="myApplicationController.someMethod(flowScope.myKey)"`![Image](img/U002.jpg)

    `results="flowScope.someMethodResult"/>`


    #### 流变量


    一个流可以声明一个或多个实例变量。这些变量在流启动时分配，在流结束时销毁。声明它们的语法如下所示：


    `<var name="orderForm" class="com.apress.prospringmvc.bookstore.web.OrderForm"/>`


    `name` 是创建的实例在 `flow` 作用域中可用的键，而 `class` 属性是要实例化的类的完全限定类名。Web Flow 使用该类的默认（或无参）构造函数创建一个实例。


    请注意，Web Flow 会从创建的实例中创建一个 Spring 管理的 bean。这样做时，Spring 会完全初始化这个实例化的类，应用所有适用的 `BeanPostProcessors`。该实例最终会作为
    Spring bean 注册到应用上下文中。这意味着你可以在该类中使用例如 `@Autowired` 注解。在初始化期间，这些依赖关系将由 Spring 注入。


    ![Image](img/square.jpg) **注意**  “不同的 Web Flow 作用域”一节解释了你在 `class` 属性中指定的类应该实现
    `java.io.Serializable`，因为创建的对象会被放入 `flow` 作用域。这也适用于未标记为 `transient` 的引用对象。然而，对不持有状态的对象（例如，服务、外观、DAO
    等）的引用应声明为 `transient`。Java 的 `transient` 关键字将这些对象排除在 Java 序列化过程之外。此类对象不需要序列化，因为它们不包含任何状态。如果这些实例是自动装配的
    bean（使用 `@Autowired`），那么 Spring 会确保在流恢复时重新连接它们。


    `<var>` 元素主要用于在流启动前创建类的实例，并且这些实例在该流执行的作用域内使用。你只能在流定义的顶部使用此元素。相比之下，`<set>` 元素更适合在已有实例之间设置或移动值。例如，如果你想将给定的请求参数值放到一个搜索条件对象上，可以使用
    `<set>` 元素。在 `name` 属性中，你可以引用代表搜索条件对象的键。在 `value` 属性中，你可以引用 `requestParameters`
    隐式对象，然后通过该对象访问所需名称的参数（例如 `requestParameters.myParam`）。

