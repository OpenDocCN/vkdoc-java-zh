- fmt: "### Web Flow 1 Migration\n\nThis section may not be of interest to you if\
    \ you didn’t use Web Flow 1, or you’re not involved in a Web Flow 1 project. However,\
    \ we wanted to make sure that you are aware of the possibilities of migrating,\
    \ in case you do happen to be a Web Flow 1 user, or in case you come across a\
    \ project using Web Flow 1 that you want to migrate. Even if it doesn’t apply\
    \ to you, you can quickly skim this section because it is very short and might\
    \ be of help in the future.\n\nAlthough there was a lot of rework in Web Flow\
    \ 2, conceptually from a user’s point of view, it remains very much like Web Flow\
    \ 1 (which is a good thing). That said, it does add some new stuff, refactor some\
    \ quirks, and implement some internal optimizations. Web Flow 2’s flow-definition\
    \ syntax also very much resembles that of Web Flow 1; however, it is *not* backward\
    \ compatible. An `<inline-flow>` element is an example of this. This feature was\
    \ simply removed in Web Flow 2, and there is no replacement. Fortunately, Web\
    \ Flow 2 does offer you a tool that will convert your Web Flow 1 flows, so they\
    \ can be used in Web Flow 2 (this tool comes bundled with Web Flow 2).\n\nSuppose\
    \ you have the Web Flow 1 flow shown in [Listing 12-8](#Chapter12.html#list_12_8)\
    \ and that you want to migrate this flow to Web Flow 2, which no longer supports\
    \ `<inline-flow>`.\n\n***Listing 12-8.** A Web Flow 1 Flow to Be Converted to\
    \ a Web Flow 2 Flow*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<flow\n\
    \      xsi:schemaLocation=\"\n        http://www.springframework.org/schema/webflow\n\
    \        http://www.springframework.org/schema/webflow/spring-webflow-1.0.xsd\"\
    >\n    <var name=\"someVar\" scope=\"flow\"/>\n    <start-state idref=\"loadDetail\"\
    />\n    <action-state id=\"loadDetail\"/>\n    <inline-flow id=\"testInlineFlow\"\
    >\n        <flow/>\n    </inline-flow>\n</flow>\n```\n\nTo run the flow definition\
    \ updater tool, you will need the following jars on its classpath: the main Web\
    \ Flow jar, which is named `org.springframework.webflow-2.3.0.RELEASE.jar` if\
    \ you downloaded it manually; the Spring core jar, which is named `org.springframework.core-3.1.0.RELEASE.jar`\
    \ if you downloaded it manually; and an XSLT processor. When running Java6 or\
    \ later, the XSLT processor that comes shipped by default as part of the JRE will\
    \ be sufficient, so you won’t need any additional jar(s). If you do encounter\
    \ any problems, it is advised that you download Saxon (the home edition). In that\
    \ case, you just have to put the jar file (`saxon9he.jar` at the time of writing)\
    \ in the same directory where you are putting the Spring core and Spring Web Flow\
    \ jar files.\n\nAs described previously, you put the Spring core and Web Flow\
    \ dependencies together with the flow from [Listing 12-8](#Chapter12.html#list_12_8)\
    \ in a single directory; in this case, that directory is `/tmp/convert`. If you\
    \ do a directory listing, it should look like this:\n\n```\n/tmp/convert$ ls -l\n\
    org.springframework.core-3.1.1.RELEASE.jar\norg.springframework.webflow-2.3.0.RELEASE.jar\n\
    web-flow-1-flow.xml\n```\n\nNext, fire up the converter:\n\n```\njava -cp *: org.springframework.webflow.upgrade.WebFlowUpgrader\
    \ web-flow-1-flow.xml\n```\n\nThe output is shown on the console and not stored\
    \ in a file. You can use your console tooling to *pipe* the output to a file,\
    \ if desired. The output generated with the preceding command is an equivalent\
    \ flow definition converted to Web Flow 2 flow syntax (see [Listing 12-9](#Chapter12.html#list_12_9))\n\
    \n***Listing 12-9.** The Web Flow 2 Converted Flow*\n\n```\n<?xml version=\"1.0\"\
    \ encoding=\"UTF-8\"?>\n<flow xmlns=\"http://www.springframework.org/schema/webflow\n\
    \      xmlns:xsi=http://www.w3.org/2001/XMLSchema-instance\n      xsi:schemaLocation=\"\
    \n         http://www.springframework.org/schema/webflow\n         http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd\"\
    \n      start-state=\"loadDetail\">\n    <var name=\"someVar\"/>\n    <action-state\
    \ id=\"loadDetail\"/>\n    <inline-flow>\n    <!-- WARNING: inline-flow is no\
    \ longer supported.  Create a new top level\n         flow.\n     -->\n      \
    \ <flow xsi:schemaLocation=\"http://www.springframework.org/schema/webflow\n \
    \      http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd\"\
    >\n      </flow>\n    </inline-flow>\n</flow>\n```\n\nIn the preceding snippet,\
    \ you can see that the `<start-state>` element has been moved to the top-level\
    \ flow element as an attribute. The `<start-state>` element does not exist anymore\
    \ as a separate element in Web Flow 2. Also, the `<inline-flow>` element is extracted\
    \ as a separate flow with a warning that you should add it as a top-level flow.\n\
    \n![Image](images/square.jpg) **Note** While this tool will help you convert your\
    \ Web Flow 1 flows, be aware that the definitions around scoping (especially for\
    \ `flash` scope) has been altered in Web Flow 2. Also, the conversion requires\
    \ changes to other aspects, such as the flow execution listener API (these changes\
    \ are covered in following sections). A migration from Web Flow 1 to Web Flow\
    \ 2 is not as easy as just running this tool. You will still need to go through\
    \ the flows and a portion of your code to check whether additional modifications\
    \ are required. However, this tool will at least put you on the right track. Finally,\
    \ depending on how many Web Flow 1 flows you have, and assuming your Web Flow\
    \ 1 flows are using OGNL (chances are high because that was the default), it might\
    \ be a good idea to switch your expression language in Web Flow 2 to OGNL, as\
    \ well. This way, you are at least relieved from having to change every expression\
    \ in your flows.\n\n### Exception Handling\n\nThere are three major ways in which\
    \ you can deal with exception handling while using Web Flow. We have already (indirectly)\
    \ seen the first of these. In that case, we let the application controller handle\
    \ the exception. In the `com.apress.prospringmvc.bookstore.web.controller.AuthenticationController`\
    \ `authenticate` method, you can see that we return another event type (of type\
    \ `error`) in case the authentication fails after adding a message to the message\
    \ context (see [Listing 12-10](#Chapter12.html#list_12_10)).\n\n***Listing 12-10.**\
    \ The Authenticate Method of the AuthenticationController*\n\n```\npublic Event\
    \ authenticate(AuthenticationForm authenticationForm,\n                      \
    \    MvcExternalContext externalContext,\n                          MessageContext\
    \ messageContext) {\n    try {\n        authenticate(authenticationForm, ((HttpServletRequest)\n\
    \        externalContext.getNativeRequest()).getSession());\n    } catch (AuthenticationException\
    \ authenticationException) {\n        messageContext.addMessage(new\n        MessageBuilder().error().code(LOGIN_FAILED_KEY).build());\n\
    \        return new EventFactorySupport().error(this);\n    }\n}\n```\n\nThe flow\
    \ can react to this event type. In the case of an error event, the flow will do\
    \ something else (e.g., render the same view again, so that error messages are\
    \ shown) instead of continuing, which would be the case if the event was a successful\
    \ event. Capturing exceptions in your application controller and steering the\
    \ outcome using specific events is the preferred way of dealing with exceptions.\
    \ To some extent, this might be a matter of personal preference; however, when\
    \ working with an application controller, this approach makes it more visible\
    \ if the exception handling is also performed inside the method itself, rather\
    \ than delegating it to the flow.\n\nHowever, there are two other mechanisms you\
    \ can use to handle exceptions, both of which involve handling the exceptions\
    \ within the flow:\n\n*   The on exception transition attribute\n*   A custom\
    \ exception handler via the `<exception-handler>` element"
  raw: '### Web Flow 1 Migration


    This section may not be of interest to you if you didn’t use Web Flow 1, or you’re
    not involved in a Web Flow 1 project. However, we wanted to make sure that you
    are aware of the possibilities of migrating, in case you do happen to be a Web
    Flow 1 user, or in case you come across a project using Web Flow 1 that you want
    to migrate. Even if it doesn’t apply to you, you can quickly skim this section
    because it is very short and might be of help in the future.


    Although there was a lot of rework in Web Flow 2, conceptually from a user’s point
    of view, it remains very much like Web Flow 1 (which is a good thing). That said,
    it does add some new stuff, refactor some quirks, and implement some internal
    optimizations. Web Flow 2’s flow-definition syntax also very much resembles that
    of Web Flow 1; however, it is *not* backward compatible. An `<inline-flow>` element
    is an example of this. This feature was simply removed in Web Flow 2, and there
    is no replacement. Fortunately, Web Flow 2 does offer you a tool that will convert
    your Web Flow 1 flows, so they can be used in Web Flow 2 (this tool comes bundled
    with Web Flow 2).


    Suppose you have the Web Flow 1 flow shown in [Listing 12-8](#Chapter12.html#list_12_8)
    and that you want to migrate this flow to Web Flow 2, which no longer supports
    `<inline-flow>`.


    ***Listing 12-8.** A Web Flow 1 Flow to Be Converted to a Web Flow 2 Flow*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<flow`


    `      xsi:schemaLocation="`

    `        http://www.springframework.org/schema/webflow`

    `        http://www.springframework.org/schema/webflow/spring-webflow-1.0.xsd">`


    `    <var name="someVar" scope="flow"/>`


    `    <start-state idref="loadDetail"/>`


    `    <action-state id="loadDetail"/>`


    `    <inline-flow id="testInlineFlow">`

    `        <flow/>`

    `    </inline-flow>`

    `</flow>`


    To run the flow definition updater tool, you will need the following jars on its
    classpath: the main Web Flow jar, which is named `org.springframework.webflow-2.3.0.RELEASE.jar`
    if you downloaded it manually; the Spring core jar, which is named `org.springframework.core-3.1.0.RELEASE.jar`
    if you downloaded it manually; and an XSLT processor. When running Java6 or later,
    the XSLT processor that comes shipped by default as part of the JRE will be sufficient,
    so you won’t need any additional jar(s). If you do encounter any problems, it
    is advised that you download Saxon (the home edition). In that case, you just
    have to put the jar file (`saxon9he.jar` at the time of writing) in the same directory
    where you are putting the Spring core and Spring Web Flow jar files.


    As described previously, you put the Spring core and Web Flow dependencies together
    with the flow from [Listing 12-8](#Chapter12.html#list_12_8) in a single directory;
    in this case, that directory is `/tmp/convert`. If you do a directory listing,
    it should look like this:


    `/tmp/convert$ ls -l`

    `org.springframework.core-3.1.1.RELEASE.jar`

    `org.springframework.webflow-2.3.0.RELEASE.jar`

    `web-flow-1-flow.xml`


    Next, fire up the converter:


    `java -cp *: org.springframework.webflow.upgrade.WebFlowUpgrader web-flow-1-flow.xml`


    The output is shown on the console and not stored in a file. You can use your
    console tooling to *pipe* the output to a file, if desired. The output generated
    with the preceding command is an equivalent flow definition converted to Web Flow
    2 flow syntax (see [Listing 12-9](#Chapter12.html#list_12_9))


    ***Listing 12-9.** The Web Flow 2 Converted Flow*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<flow xmlns="http://www.springframework.org/schema/webflow`

    `      xmlns:xsi=http://www.w3.org/2001/XMLSchema-instance`

    `      xsi:schemaLocation="`

    `         http://www.springframework.org/schema/webflow`

    `         http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd"`

    `      start-state="loadDetail">`

    `    <var name="someVar"/>`

    `    <action-state id="loadDetail"/>`


    `    <inline-flow>`

    `    <!-- WARNING: inline-flow is no longer supported.  Create a new top level`

    `         flow.`

    `     -->`

    `       <flow xsi:schemaLocation="http://www.springframework.org/schema/webflow`

    `       http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd">`

    `      </flow>`

    `    </inline-flow>`

    `</flow>`


    In the preceding snippet, you can see that the `<start-state>` element has been
    moved to the top-level flow element as an attribute. The `<start-state>` element
    does not exist anymore as a separate element in Web Flow 2. Also, the `<inline-flow>`
    element is extracted as a separate flow with a warning that you should add it
    as a top-level flow.


    ![Image](images/square.jpg) **Note**  While this tool will help you convert your
    Web Flow 1 flows, be aware that the definitions around scoping (especially for
    `flash` scope) has been altered in Web Flow 2\. Also, the conversion requires
    changes to other aspects, such as the flow execution listener API (these changes
    are covered in following sections). A migration from Web Flow 1 to Web Flow 2
    is not as easy as just running this tool. You will still need to go through the
    flows and a portion of your code to check whether additional modifications are
    required. However, this tool will at least put you on the right track. Finally,
    depending on how many Web Flow 1 flows you have, and assuming your Web Flow 1
    flows are using OGNL (chances are high because that was the default), it might
    be a good idea to switch your expression language in Web Flow 2 to OGNL, as well.
    This way, you are at least relieved from having to change every expression in
    your flows.


    ### Exception Handling


    There are three major ways in which you can deal with exception handling while
    using Web Flow. We have already (indirectly) seen the first of these. In that
    case, we let the application controller handle the exception. In the `com.apress.prospringmvc.bookstore.web.controller.AuthenticationController`
    `authenticate` method, you can see that we return another event type (of type
    `error`) in case the authentication fails after adding a message to the message
    context (see [Listing 12-10](#Chapter12.html#list_12_10)).


    ***Listing 12-10.** The Authenticate Method of the AuthenticationController*


    `public Event authenticate(AuthenticationForm authenticationForm,`

    `                          MvcExternalContext externalContext,`

    `                          MessageContext messageContext) {`

    `    try {`

    `        authenticate(authenticationForm, ((HttpServletRequest)`

    `        externalContext.getNativeRequest()).getSession());`

    `    } catch (AuthenticationException authenticationException) {`

    `        messageContext.addMessage(new`

    `        MessageBuilder().error().code(LOGIN_FAILED_KEY).build());`

    **`return new EventFactorySupport().error(this);`**

    **`}`**

    `}`


    The flow can react to this event type. In the case of an error event, the flow
    will do something else (e.g., render the same view again, so that error messages
    are shown) instead of continuing, which would be the case if the event was a successful
    event. Capturing exceptions in your application controller and steering the outcome
    using specific events is the preferred way of dealing with exceptions. To some
    extent, this might be a matter of personal preference; however, when working with
    an application controller, this approach makes it more visible if the exception
    handling is also performed inside the method itself, rather than delegating it
    to the flow.


    However, there are two other mechanisms you can use to handle exceptions, both
    of which involve handling the exceptions within the flow:


    *   The on exception transition attribute

    *   A custom exception handler via the `<exception-handler>` element'
  trans: '

    ### Web Flow 1 迁移


    如果您没有使用过 Web Flow 1，或者您不参与 Web Flow 1 项目，那么本节可能对您不感兴趣。但是，我们想确保您了解迁移的可能性，以防您恰好是
    Web Flow 1 的用户，或者您遇到了一个想要迁移的使用 Web Flow 1 的项目。即使它不适用于您，您也可以快速浏览本节，因为它非常简短，并且将来可能会对您有所帮助。


    尽管 Web Flow 2 进行了大量重构，但从用户的角度来看，它在概念上仍然非常类似于 Web Flow 1（这是一件好事）。话虽如此，它确实增加了一些新功能，重构了一些古怪之处，并实现了一些内部优化。Web
    Flow 2 的流程定义语法也与 Web Flow 1 非常相似；但是，它*不*向后兼容。`<inline-flow>` 元素就是一个例子。这个特性在 Web
    Flow 2 中被直接移除了，并且没有替代品。幸运的是，Web Flow 2 确实为您提供了一个工具，可以转换您的 Web Flow 1 流程，以便它们可以在
    Web Flow 2 中使用（该工具随 Web Flow 2 一起提供）。


    假设您有清单 12-8 中所示的 Web Flow 1 流程，并且您希望将此流程迁移到不再支持 `<inline-flow>` 的 Web Flow 2。


    ***清单 12-8.** 将要转换为 Web Flow 2 流程的 Web Flow 1 流程*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<flow`


    `      xsi:schemaLocation="`

    `        http://www.springframework.org/schema/webflow`

    `        http://www.springframework.org/schema/webflow/spring-webflow-1.0.xsd">`


    `    <var name="someVar" scope="flow"/>`


    `    <start-state idref="loadDetail"/>`


    `    <action-state id="loadDetail"/>`


    `    <inline-flow id="testInlineFlow">`

    `        <flow/>`

    `    </inline-flow>`

    `</flow>`


    要运行流程定义更新工具，您需要在其类路径中包含以下 jar 包：主要的 Web Flow jar 包，如果您手动下载，其名称为 `org.springframework.webflow-2.3.0.RELEASE.jar`；Spring
    核心 jar 包，如果您手动下载，其名称为 `org.springframework.core-3.1.0.RELEASE.jar`；以及一个 XSLT 处理器。当运行
    Java6 或更高版本时，JRE 默认附带的 XSLT 处理器就足够了，因此您不需要任何额外的 jar 包。如果您确实遇到任何问题，建议您下载 Saxon（家庭版）。在这种情况下，您只需将
    jar 包（撰写本文时为 `saxon9he.jar`）放在与 Spring 核心和 Spring Web Flow jar 包相同的目录中即可。


    如前所述，您将 Spring 核心和 Web Flow 依赖项与清单 12-8 中的流程放在一个目录中；在本例中，该目录是 `/tmp/convert`。如果您列出目录内容，它应该如下所示：


    `/tmp/convert$ ls -l`

    `org.springframework.core-3.1.1.RELEASE.jar`

    `org.springframework.webflow-2.3.0.RELEASE.jar`

    `web-flow-1-flow.xml`


    接下来，启动转换器：


    `java -cp *: org.springframework.webflow.upgrade.WebFlowUpgrader web-flow-1-flow.xml`


    输出显示在控制台上，不会存储在文件中。如果需要，您可以使用控制台工具将输出*管道*到文件中。上述命令生成的输出是转换为 Web Flow 2 流程语法的等效流程定义（参见清单
    12-9）。


    ***清单 12-9.** 转换后的 Web Flow 2 流程*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<flow xmlns="http://www.springframework.org/schema/webflow`

    `      xmlns:xsi=http://www.w3.org/2001/XMLSchema-instance`

    `      xsi:schemaLocation="`

    `         http://www.springframework.org/schema/webflow`

    `         http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd"`

    `      start-state="loadDetail">`

    `    <var name="someVar"/>`

    `    <action-state id="loadDetail"/>`


    `    <inline-flow>`

    `    <!-- WARNING: inline-flow is no longer supported.  Create a new top level`

    `         flow.`

    `     -->`

    `       <flow xsi:schemaLocation="http://www.springframework.org/schema/webflow`

    `       http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd">`

    `      </flow>`

    `    </inline-flow>`

    `</flow>`


    在前面的代码片段中，您可以看到 `<start-state>` 元素已作为属性移动到顶级流程元素中。`<start-state>` 元素在 Web Flow
    2 中不再作为单独的元素存在。此外，`<inline-flow>` 元素被提取为一个单独的流程，并附带一条警告，提示您应将其添加为顶级流程。


    ![Image](img/square.jpg) **注意**  虽然此工具将帮助您转换 Web Flow 1 流程，但请注意，关于作用域的定义（特别是 `flash`
    作用域）在 Web Flow 2 中已更改。此外，转换还需要更改其他方面，例如流程执行监听器 API（这些更改将在后续章节中介绍）。从 Web Flow 1
    迁移到 Web Flow 2 并不像仅仅运行此工具那么简单。您仍然需要检查流程和部分代码，以确定是否需要额外的修改。但是，此工具至少会让您走上正轨。最后，根据您拥有的
    Web Flow 1 流程数量，并假设您的 Web Flow 1 流程使用 OGNL（可能性很大，因为这是默认设置），将 Web Flow 2 中的表达式语言也切换为
    OGNL 可能是个好主意。这样，您至少可以免于更改流程中的每个表达式。


    ### 异常处理


    在使用 Web Flow 时，有三种主要方式可以处理异常。我们已经（间接地）看到了第一种方式。在这种情况下，我们让应用程序控制器处理异常。在 `com.apress.prospringmvc.bookstore.web.controller.AuthenticationController`
    的 `authenticate` 方法中，您可以看到，如果在向消息上下文添加消息后身份验证失败，我们会返回另一个事件类型（`error` 类型）（参见清单
    12-10）。


    ***清单 12-10.** AuthenticationController 的 authenticate 方法*


    `public Event authenticate(AuthenticationForm authenticationForm,`

    `                          MvcExternalContext externalContext,`

    `                          MessageContext messageContext) {`

    `    try {`

    `        authenticate(authenticationForm, ((HttpServletRequest)`

    `        externalContext.getNativeRequest()).getSession());`

    `    } catch (AuthenticationException authenticationException) {`

    `        messageContext.addMessage(new`

    `        MessageBuilder().error().code(LOGIN_FAILED_KEY).build());`

    **`return new EventFactorySupport().error(this);`**

    **`}`**

    `}`


    流程可以对此事件类型做出反应。在发生错误事件的情况下，流程将执行其他操作（例如，再次渲染同一个视图，以便显示错误消息），而不是像事件成功时那样继续执行。在应用程序控制器中捕获异常并使用特定事件来控制结果是处理异常的首选方式。在某种程度上，这可能是个人偏好问题；然而，当使用应用程序控制器时，这种方法使得异常处理也在方法本身内部执行（而不是委托给流程）更加明显。


    但是，您还可以使用另外两种机制来处理异常，这两种机制都涉及在流程内部处理异常：


    *   异常转换属性（on exception transition attribute）

    *   通过 `<exception-handler>` 元素实现的自定义异常处理器

