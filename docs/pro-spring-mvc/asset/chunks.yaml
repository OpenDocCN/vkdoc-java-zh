- fmt: '# Flow Execution Listener Methods


    The `FlowExecutionListener` interface defines a lot of methods that can inform
    you when Web Flow is executing (or is about to execute) different steps in processing
    your flow execution request. For example, you can get callbacks when resuming
    or pausing an execution, triggering events, executing actions, and so on. Such
    callback methods become unpleasant when there are too many of them and they are
    badly documented. They can also be unpleasant to use if you have too few of them,
    and you cannot use the listener to capture what you need. In this subsection,
    you will find a complete explanation of each of the callbacks methods, so that
    you are prepared to make the right choice for a given job.


    We don’t suggest trying to remembering all of these; it is better to quickly skim
    over them, so you know what the possibilities are. When you need such functionality,
    you can return to this section and verify which callback suits your requirements
    best. The thing to keep in mind is this: some execution listener methods are very
    similar, but also sneakily different. You should always make sure you test properly
    and don’t assume that a given listener method does what you think it will do.


    Let''s look at the methods defined by the `FlowExecutionListener` interface. (Note
    that we left out the return type for better readability, it is always `void`.)
    A flow execution listener method cannot return anything; if it changes something,
    it should do so with the parameters supplied to the callback method in question.


    ## `requestSubmitted(RequestContext context)` and `requestProcessed(RequestContext
    context)`


    `requestSubmitted` is invoked at the beginning, and `requestProcessed` is invoked
    at the end of a request entering a flow execution. `requestSubmitted` is the first
    method that is called of all the `FlowExecutionListener` callback methods, while
    `requestProcessed` is the last method called. You can use these callbacks if you
    want to perform something upfront in the processing lifecycle that has an impact
    over the entire request execution. Note that, when a new flow execution is started,
    the `requestSubmitted` callback is called *before* the flow execution is actually
    started (there will be no active flow yet at that time). The equivalent is also
    true with `requestProcessed`: when a flow execution terminates (because it hits
    an `end` state), the flow will already be terminated when `requestProcessed` is
    invoked. You can test whether the flow execution is active by using `context.getFlowExecutionContext().isActive()`.


    ## `sessionCreating(RequestContext context, FlowDefinition definition)`


    `sessionCreating` is called to indicate that a new flow execution is about to
    be created. An exception may be thrown from this method to veto the creation of
    a new flow execution by throwing any kind of runtime exception.


    ## `sessionStarting(RequestContext context, FlowSession session, MutableAttributeMap
    input)`


    `sessionStarting` is called after a new flow execution is created, but before
    that new flow execution actually starts. In the case of launching a subflow, the
    flow execution has not yet been started, so the parent flow execution is still
    active. The input parameter is the input map that will be passed to the spawning
    flow, as prepared by the subflow state `<input>` mapping or as provided externally.
    The listener is also allowed to manipulate the input. A listener could veto the
    start of the newly starting flow execution session by throwing any kind of runtime
    exception.


    ## `sessionStarted(RequestContext context, FlowSession session)`


    `sessionStarted` is called after the new flow execution has been initialized and
    started processing. Startup behavior has already been performed (e.g., a flow
    `<on-start>` or the `<on-entry>` of the first state that is executed). This callback
    is useful if you want to do something every time a flow session has been started
    and initialized successfully.


    ## `eventSignaled(RequestContext context, Event event)`


    `eventSignaled` is invoked every time an event is signaled in the flow execution.
    The event could be an event signaled externally by the user or an event signaled
    internally (e.g., by an application controller). This method is called prior to
    the transition actually taking place.


    ## `transitionExecuting(RequestContext context, TransitionDefinition transition)`


    `transitionExecuting` is called when a transition is matched, but before the transition
    occurs. It is interesting to compare this method to `eventSignaled`; in this case,
    the transition is further along. At this stage, you already know the source and
    (what will be) the target of the transition, whereas in `eventSignaled`, you simply
    know “something” is going to happen.


    ## `stateEntering(RequestContext context, StateDefinition state) throws EnterStateVetoException`


    `stateEntering` indicates that the flow execution is about to enter a given state.
    This method will be called after the transition matched, but before the state
    has been entered (e.g., no entry actions are executed at this point). Note that
    the listener can veto entering the state by throwing an `org.springframework.webflow.execution.EnterStateVetoException`.


    ## `stateEntered(RequestContext context, StateDefinition previousState, StateDefinition
    state)`


    `stateEntered` informs the listener that the flow has successfully transitioned
    from one state to the next. All entry logic of the given state has now been executed,
    and the state is fully initialized.


    ## `viewRendering(RequestContext context, View view, StateDefinition viewState)`


    `viewRendering` is called when a view selection has already occurred, and the
    information has been retrieved from the triggered `view` state. This happens before
    any render actions are executed.


    ## `viewRendered(RequestContext context, View view, StateDefinition viewState)`


    `viewRendered` is called after the view has been fully rendered, and it is ready
    to be sent back to the client.


    ## `paused(RequestContext context)`


    `paused` will be called after the active flow session has been paused, and the
    view has been rendered. Note that it will not be called if the flow execution
    ends (i.e., it passes through an `end` state). In that case, `sessionEnding` and
    `sessionEnded` will be called instead.


    ## `resuming(RequestContext context)`


    The `resuming` callback informs the listener that a paused flow execution has
    been restored and is going to resume.


    ## `sessionEnding(RequestContext context, FlowSession session, String outcome,
    MutableAttributeMap output)`


    `sessionEnding` is called when a flow hits an `end` state and is going to end
    the flow execution. At the point this callback method is invoked, the flow execution
    is still active. Possible `<on-entry>` actions (e.g., those that appeared on the
    `end` state) have already executed. If the flow is a subflow and has mapped out
    anything using the `<output>` mapping, it is also available via the *output* parameter.
    This allows the listener to inspect or manipulate the output returned to the parent
    flow. The *outcome* parameter matches the outcome reached by the ending session;
    this will be the id of the terminating `<end-state>`.


    ## `sessionEnded(RequestContext context, FlowSession session, String outcome,
    AttributeMap output)`


    `sessionEnded` is called after `sessionEnding`, when the flow execution has completely
    ended. When this method is invoked, the flow execution is no longer active. If
    the flow in question was a subflow and it mapped data back to the parent, then
    the flow output map can no longer be manipulated at this point. Also, if the parent
    flow has already been reactivated, but is not yet resuming, then `session.isRoot()`
    will indicate whether the session ended for a subflow (in that case, `isRoot`
    will be `false`) or for a parent flow (`isRoot` will be `true`).


    ## `exceptionThrown(RequestContext context, FlowExecutionException exception)`'
