    #### LocaleResolver


    `org.springframework.web.servlet.LocaleResolver` 策略接口用于确定渲染页面时应使用哪个 `java.util.Locale`。在大多数情况下，它用于解析应用程序中的验证消息或标签。不同的实现方式如图
    4-14 所示，并在以下小节中描述。


    ____________


    ¹ [`http://commons.apache.org/fileupload/`](http://commons.apache.org/fileupload/)


    ![Image](img/9781430241553_Fig04-14.jpg)


    ***图 4-14.** LocaleResolver 实现*


    清单 4-16 展示了 `org.springframework.web.servlet.LocaleResolver` 的 API。


    ***清单 4-16.** LocaleResolver API*


    `package org.springframework.web.servlet;`


    `import java.util.Locale;`


    `import javax.servlet.http.HttpServletRequest;`

    `import javax.servlet.http.HttpServletResponse;`


    `public interface LocaleResolver {`


    `    Locale resolveLocale(HttpServletRequest request);`

    `    void setLocale(HttpServletRequest request,`

    `                   HttpServletResponse response,`

    `                   Locale locale);`


    `}`


    该 API 包含两个方法，每个方法在存储和检索当前 `java.util.Locale` 时都发挥作用。当您想要更改当前 locale 时，会调用 `setLocale`
    方法。如果实现不支持此操作，则会抛出 `java.lang.UnsupportedOperationException`。Spring 框架（通常内部）使用
    `resolveLocale` 方法来解析当前 locale。


    ##### AcceptHeaderLocaleResolver


    `org.springframework.web.servlet.i18n.AcceptHeaderLocaleResolver` 简单地委托给当前 `javax.servlet.HttpServletRequest`
    的 `getLocale` 方法。它使用 `Accept-Language` HTTP 头来确定语言。客户端设置此标头值；此解析器不支持更改 locale。


    ##### CookieLocaleResolver


    顾名思义，`org.springframework.web.servlet.i18n.CookieLocaleResolver` 使用 `javax.servlet.http.Cookie`
    来存储要使用的 locale。这在您希望应用程序尽可能无状态的情况下特别有用。实际值存储在客户端，并在每次请求时发送给您。此解析器允许更改 locale（您可以在第
    6 章中找到更多信息）。此解析器还允许您配置 cookie 的名称和要使用的默认 locale。如果无法为当前请求确定值（即，既没有 cookie 也没有默认
    locale），则此解析器会回退到请求的 locale（请参阅 `AcceptHeaderLocaleResolver`）。


    ##### FixedLocaleResolver


    `org.springframework.web.servlet.i18n.FixedLocaleResolver` 是 `org.springframework.web.servlet.LocaleResolver`
    最基本的实现。它允许您配置在整个应用程序中使用的 locale。此配置是固定的；因此，无法更改。


    ##### SessionLocaleResolver


    `org.springframework.web.servlet.i18n.SessionLocaleResolver` 实现使用 `javax.servlet.http.HttpSession`
    来存储 locale 的值。可以配置属性的名称以及默认 locale。如果无法为当前请求确定值（即，会话中既没有存储值也没有默认 locale），则它会回退到请求的
    locale（请参阅 `AcceptHeaderLocaleResolver`）。此解析器还允许您更改 locale（更多信息请参见第 6 章）。


    #### ThemeResolver


    `org.springframework.web.servlet.ThemeResolver` 策略接口用于确定渲染页面时应使用哪个主题。有几种实现；这些如图
    4-15 所示，并在以下小节中解释。如何应用主题化在第 8 章中解释。如果无法解析主题名称，则此解析器使用硬编码的默认 `theme`。


    ![Image](img/9781430241553_Fig04-15.jpg)


    ***图 4-15.** ThemeResolver 实现*


    清单 4-17 展示了 `org.springframework.web.servlet.ThemeResolver` 的 API，它与 `org.springframework.web.servlet.LocaleResolver`
    API 非常相似。


    ***清单 4-17.** ThemeResolver API*


    `package org.springframework.web.servlet;`


    `import javax.servlet.http.HttpServletRequest;`

    `import javax.servlet.http.HttpServletResponse;`


    `public interface ThemeResolver {`

    `    String resolveThemeName(HttpServletRequest request);`


    `    void setThemeName(HttpServletRequest request,`

    `                      HttpServletResponse response,`

    `                      String themeName);`


    `}`


    当您想要更改当前主题时，会调用 `setThemeName` 方法。如果不支持更改主题，则会抛出 `java.lang.UnsupportedOperationException`。当
    Spring 框架需要解析当前主题时，会调用 `resolveThemeName` 方法。这主要通过使用主题 `jsp` 标签来完成。


    ##### CookieThemeResolver


    顾名思义，`org.springframework.web.servlet.theme.CookieThemeResolver` 使用 `javax.servlet.http.Cookie`
    来存储要使用的主题。这在您希望应用程序尽可能无状态的情况下特别有用。实际值存储在客户端，并将在每次请求时发送给您。此解析器允许更改主题；您可以在第 6 章和第
    8 章中找到更多信息。此解析器还允许您配置 cookie 的名称和要使用的主题 locale。


    ##### FixedThemeResolver


    `org.springframework.web.servlet.theme.FixedThemeResolver` 是 `org.springframework.web.servlet.ThemeResolver`
    最基本的实现。它允许您配置在整个应用程序中使用的主题。此配置是固定的；因此，无法更改。


    ##### SessionThemeResolver


    `org.springframework.web.servlet.theme.SessionThemeResolver` 使用 `javax.servlet.http
    .HttpSession` 来存储主题的值。可以配置属性的名称以及默认主题。

