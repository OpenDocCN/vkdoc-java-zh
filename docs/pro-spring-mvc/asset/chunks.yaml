    ^(17) [`http://repo1.maven.org/maven2/org/seleniumhq/selenium/`](http://repo1.maven.org/maven2/org/seleniumhq/selenium/)


    In the `setup` method we start our `browser`, which is the actual API to control
    the browser from within our test case. Here we are using Firefox via the FirefoxDriver:


    `browser = new FirefoxDriver();`


    If we want to switch to an in-memory browser (HtmlUnit) all code would remain
    the same. We just need to assign the `HtmlUnitDriver` instead of the `FirefoxDriver`:


    `browser = new HtmlUnitDriver();`


    Running this will run the tests against the in-memory browser. There will be no
    browser popping up when we run the tests like this. To get an idea of which browsers
    are supported and their specifics, the best resource is the Selenium documentation.^([18](#Chapter09.html#CHP-9-FN-18))


