- fmt: "# Type Conversion\n\nAn important part of data binding is type conversion.\
    \ When we receive a request, the only thing we have are `String` instances. However,\
    \ in the real world we use a lot of different object types, not just text representations.\
    \ Therefore, we want to convert those `String` instances into something we can\
    \ use, which is where type conversion comes in. In Spring MVC, there are three\
    \ ways to do type conversion:\n\n- Property Editors\n- Converters\n- Formatters\n\
    \nProperty editors are the old-style of doing type conversion, whereas converters\
    \ and formatters are the new way of doing type conversion. Converters and formatters\
    \ are more flexible; as such, they are also more powerful than property editors.\
    \ In addition, relying on property editors also pulls in the whole `java.beans`\
    \ package, including all its support classes, which we just don’t need in a web\
    \ environment.\n\n## Property Editors\n\nSupport for property editors has been\
    \ part of the Spring Framework since its inception. To use this kind of type conversion,\
    \ we create a `PropertyEditor` implementation (typically by subclassing `PropertyEditorSupport`).\
    \ Property editors take a `String` and convert it into a strongly typed object—and\
    \ vice versa. Spring provides several implementations for accomplishing this out\
    \ of the box (see [Table 5-20](#Chapter05.html#tab_5_20)).\n\n![Image](images/tab_5_20.jpg)\n\
    \n![Image](images/tab_5_20a.jpg)\n\n## Converters\n\nThe converter API in Spring\
    \ 3 is a general purpose type-conversion system. Within a Spring container, this\
    \ system is used as an alternative to property editors to convert bean property\
    \ value strings into the required property type. We can also use this API to our\
    \ advantage in our application whenever we need to do type conversion. The converter\
    \ system is a strongly typed conversion system and uses generics to enforce this.\n\
    \nThere are four different interfaces that can be used to implement a converter,\
    \ all of which can be found in the `org.springframework.core.convert.converter`\
    \ package:\n\n- `Converter`\n- `ConverterFactory`\n- `GenericConverter`\n- `ConditionalGenericConverter`\n\
    \nLet’s explore the four different APIs.\n\n[Listing 5-29](#Chapter05.html#list_5_29)\
    \ shows the `Converter` API, which is very straightforward. It has a single `convert`\
    \ method that takes a `source` argument and transforms it into a target. The source\
    \ and target types are expressed by the `S` and `T` generic type arguments.\n\n\
    **Listing 5-29.** The `Converter` API\n\n```\npackage org.springframework.core.convert.converter;\n\
    \npublic interface Converter<S, T> {\n\n    T convert(S source);\n}\n```\n\n[Listing\
    \ 5-30](#Chapter05.html#list_5_30) shows the `ConverterFactory` API that is useful\
    \ when you need to have conversion logic for an entire class hierarchy. For this,\
    \ we can parameterize `S` to be type we are converting from (the source), and\
    \ we parameterize `R` as the base type we want to convert to. We can then create\
    \ the appropriate converter inside the implementation of this factory.\n\n**Listing\
    \ 5-30.** The `ConverterFactory` API\n\n```\npackage org.springframework.core.convert.converter;\n\
    \npublic interface ConverterFactory<S, R> {\n\n    <T extends R> Converter<S,\
    \ T> getConverter(Class<T> targetType);\n}\n```\n\nWhen we require more sophisticated\
    \ conversion logic, we can use the `org.springframework.core.convert.converter.GenericConverter`\
    \ (see [Listing 5-31](#Chapter05.html#list_5_31)). It is more flexible, but less\
    \ strongly typed than the previous converter types. It supports converting between\
    \ multiple source and target types. During a conversion, we have access to the\
    \ source and target type descriptions, which can be useful for complex conversion\
    \ logic. This also allows for type conversion to be driven by annotation (i.e.,\
    \ we can parse the annotation at runtime to determine what needs to be done).\n\
    \n**Listing 5-31.** The `GenericConverter` API\n\n```\npackage org.springframework.core.convert.converter;\n\
    \nimport org.springframework.core.convert.TypeDescriptor;\nimport org.springframework.util.Assert;\n\
    \nimport java.util.Set;\n\npublic interface GenericConverter {\n\n    Set<ConvertiblePair>\
    \ getConvertibleTypes();\n\n    Object convert(Object source,\n              \
    \     TypeDescriptor sourceType,\n                   TypeDescriptor targetType);\n\
    \n}\n```\n\nAn example of this type of conversion logic would be a converter that\
    \ converts from an array to a collection. A converter would first inspect the\
    \ type of element being converted, so that we could apply additional conversion\
    \ logic to different elements.\n\n[Listing 5-32](#Chapter05.html#list_5_32) shows\
    \ a specialized version of the `GenericConverter` that allows us to specify a\
    \ condition for when it should execute. For example, we could create a converter\
    \ that uses one of the `BigDecimal`'s `valueOf` methods to convert a value, but\
    \ this would only be useful if we could actually invoke that method with the given\
    \ `sourceType`.\n\n**Listing 5-32.** The `ConditionalGenericConverter` API\n\n\
    ```\npackage org.springframework.core.convert.converter;\n\nimport org.springframework.core.convert.TypeDescriptor;\n\
    \n    boolean matches(TypeDescriptor sourceType, TypeDescriptor targetType);\n\
    \n}\n```\n\nThe converters are executed behind the `org.springframework.core.convert.ConversionService`\
    \ interface (see [Listing 5-33](#Chapter05.html#list_5_33)); typical implementations\
    \ of this interface also implement the `org.springframework.core.convert.converter.ConverterRegistry`\
    \ interface, which enables the easy registration of additional converters. When\
    \ using Spring @MVC, there is a preconfigured instance of the `org.springframework.format.support.DefaultFormattingConversionService`\
    \ (which also allows for executing and registering formatters).\n\n**Listing 5-33.**\
    \ The `ConversionService` API\n\n```\npackage org.springframework.core.convert;\n\
    \npublic interface ConversionService {\n\n    boolean canConvert(Class<?> sourceType,\
    \ Class<?> targetType);\n\n    boolean canConvert(TypeDescriptor sourceType, TypeDescriptor\
    \ targetType);\n\n    <T> T convert(Object source, Class<T> targetType);\n\n \
    \   Object convert(Object source, TypeDescriptor sourceType, TypeDescriptor targetType);\n\
    }\n```"
  raw: '#### Type Conversion


    An important part of data binding is type conversion. When we receive a request,
    the only thing we have are `String` instances. However, in the real world we use
    a lot of different object types, not just text representations. Therefore, we
    want to convert those `String` instances into something we can use, which is where
    type conversion comes in. In Spring MVC, there are three ways to do type conversion:


    *   Property Editors

    *   Converters

    *   Formatters


    Property editors are the old-style of doing type conversion, whereas converters
    and formatters are the new way of doing type conversion. Converters and formatters
    are more flexible; as such, they are also more powerful than property editors.
    In addition, relying on property editors also pulls in the whole `java.beans`
    package, including all its support classes, which we just don’t need in a web
    environment.


    ##### Property Editors


    Support for property editors has been part of the Spring Framework since its inception.
    To use this kind of type conversion, we create a `PropertyEditor` implementation
    (typically by subclassing `PropertyEditorSupport`). Property editors take a `String`
    and convert it into a strongly typed object—and vice versa. Spring provides several
    implementations for accomplishing this out of the box (see [Table 5-20](#Chapter05.html#tab_5_20)).


    ![Image](images/tab_5_20.jpg)


    ![Image](images/tab_5_20a.jpg)


    ##### Converters


    The converter API in Spring 3 is a general purpose type-conversion system. Within
    a Spring container, this system is used as an alternative to property editors
    to convert bean property value strings into the required property type. We can
    also use this API to our advantage in our application whenever we need to do type
    conversion. The converter system is a strongly typed conversion system and uses
    generics to enforce this.


    There are four different interfaces that can be used to implement a converter,
    all of which can be found in the `org.springframework.core.convert.converter`
    package:


    *   `Converter`

    *   `ConverterFactory`

    *   `GenericConverter`

    *   `ConditionalGenericConverter`


    Let’s explore the four different APIs.


    [Listing 5-29](#Chapter05.html#list_5_29) shows the Converter API, which is very
    straightforward. It has a single `convert` method that takes a `source` argument
    and transforms it into a target. The source and target types are expressed by
    the `S` and `T` generic type arguments.


    ***Listing 5-29.** The Converter API*


    `package org.springframework.core.convert.converter;`


    `public interface Converter<S, T> {`


    `    T convert(S source);`

    `}`


    [Listing 5-30](#Chapter05.html#list_5_30) shows the `ConverterFactory` API that
    is useful when you need to have conversion logic for an entire class hierarchy.
    For this, we can parameterize `S` to be type we are converting from (the source),
    and we parameterize `R` as the base type we want to convert to. We can then create
    the appropriate converter inside the implementation of this factory.


    ***Listing 5-30.** The ConverterFactory API*


    `package org.springframework.core.convert.converter;`


    `public interface ConverterFactory<S, R> {`


    `    <T extends R> Converter<S, T> getConverter(Class<T> targetType);`

    `}`


    When we require more sophisticated conversion logic, we can use the `org.springframework.core.convert.converter.GenericConverter`
    (see [Listing 5-31](#Chapter05.html#list_5_31)). It is more flexible, but less
    strongly typed than the previous converter types. It supports converting between
    multiple source and target types. During a conversion, we have access to the source
    and target type descriptions, which can be useful for complex conversion logic.
    This also allows for type conversion to be driven by annotation (i.e., we can
    parse the annotation at runtime to determine what needs to be done).


    ***Listing 5-31.** The GenericConverter API*


    `package org.springframework.core.convert.converter;`


    `import org.springframework.core.convert.TypeDescriptor;`

    `import org.springframework.util.Assert;`


    `import java.util.Set;`


    `public interface GenericConverter {`


    `    Set<ConvertiblePair> getConvertibleTypes();`


    `    Object convert(Object source,`

    `                   TypeDescriptor sourceType,`

    `                   TypeDescriptor targetType);`


    `}`


    An example of this type of conversion logic would be a converter that converts
    from an array to a collection. A converter would first inspect the type of element
    being converted, so that we could apply additional conversion logic to different
    elements.


    [Listing 5-32](#Chapter05.html#list_5_32) shows a specialized version of the `GenericConverter`
    that allows us to specify a condition for when it should execute. For example,
    we could create a converter that uses one of the `BigDecimal`s `valueOf` methods
    to convert a value, but this would only be useful if we could actually invoke
    that method with the given `sourceType`.


    ***Listing 5-32.** The ConditionalGenericConverter API*


    `package org.springframework.core.convert.converter;`


    `import org.springframework.core.convert.TypeDescriptor;`


    `    boolean matches(TypeDescriptor sourceType, TypeDescriptor targetType);`


    `}`


    The converters are executed behind the `org.springframework.core.convert.ConversionService`
    interface (see [Listing 5-33](#Chapter05.html#list_5_33)); typical implementations
    of this interface also implement the `org.springframework.core.convert.converter.ConverterRegistry`
    interface, which enables the easy registration of additional converters. When
    using Spring @MVC, there is a preconfigured instance of the `org.springframework.format.support.DefaultFormattingConversionService`
    (which also allows for executing and registering formatters).


    ***Listing 5-33.** The ConversionService API*


    `package org.springframework.core.convert;`


    `public interface ConversionService {`


    `    boolean canConvert(Class<?> sourceType, Class<?> targetType);`


    `    boolean canConvert(TypeDescriptor sourceType, TypeDescriptor targetType);`


    `    <T> T convert(Object source, Class<T> targetType);`


    `    Object convert(Object source, TypeDescriptor sourceType, TypeDescriptor targetType);`

    `}`'
