- fmt: "## Implementing Controllers\n\nControllers play a crucial role in a web application:\
    \ they execute the actual request, prepare the model, and select a view to render.\
    \ In conjunction with the dispatcher servlet, controllers also play a crucial\
    \ role in the request processing workflow. The controller is the glue between\
    \ the core application and the web interface to the application. In this chapter,\
    \ we will take a look at the two different controller approaches and cover the\
    \ out-of-the-box implementations provided with the Spring Framework.\n\nThis chapter\
    \ will also take a look at the supporting components for request processing. For\
    \ example, we will cover form submission and how to apply internationalization\
    \ (I18N).\n\n### Introducing Controllers\n\nThe controller is the component that\
    \ is responsible for responding to the action the user takes. This action could\
    \ be a form submission, clicking a link, or simply accessing a page. The controller\
    \ selects or updates the data needed for the view. It also select the name of\
    \ the view to render or can render the view itself. With Spring MVC, we have two\
    \ options when writing controllers. We can either implement an interface or put\
    \ an annotation on the class. The interface is `org.springframework.web.servlet.mvc.Controller`,\
    \ and the annotation is `org.springframework.stereotype.Controller`. The main\
    \ focus of this book is the annotation-based approach (aka Spring @MVC) for writing\
    \ controllers. However, we feel that we still need to mention the interface-based\
    \ approach.\n\nAlthough both approaches work for implementing a controller, there\
    \ are two major differences between them. The first difference is about flexibility,\
    \ and the second is about mapping URLs to controllers. Annotation-based controllers\
    \ allow for very flexible method signatures, whereas the interface-based approach\
    \ has a predefined method on the interface that we must implement. Getting access\
    \ to other interesting collaborators is harder (but not impossible!).\n\nFor the\
    \ interface-based approach, we must do explicit external mapping of URLs to these\
    \ controllers; in general, this approach is combined with an `org.springframework.web.servlet.handler.SimpleUrlHandlerMapping`,\
    \ so that all the URLs are in a single location. Having all of the URLs in a single\
    \ location is one advantage the interface-based approach has over the annotation-based\
    \ approach. The annotation-based approach has its mappings scattered throughout\
    \ the codebase, which makes it harder to see which URL is mapped to which request-handling\
    \ method. The advantage of annotation-based controllers is that, when you open\
    \ a controller, you can see which URLs it is mapped to.\n\nIn this section, we\
    \ will show how to write both types of controllers, as well as how to configure\
    \ basic view controllers.\n\n#### Interface-based Controllers\n\nTo write an interface-based\
    \ controller, we need to create a class that implements the `Controller` interface.\
    \ [Listing 5-1](#Chapter05.html#list_5_1) shows the API for that interface. When\
    \ implementing this interface, we must implement the `handleRequest` method. This\
    \ method needs to return an `org.springframework.web.servlet.ModelAndView` object\
    \ or `null` when the controller handles the response itself.\n\n**Listing 5-1.**\
    \ The Controller Interface\n\n```\npackage org.springframework.web.servlet.mvc;\n\
    \nimport javax.servlet.http.HttpServletRequest;\nimport javax.servlet.http.HttpServletResponse;\n\
    \nimport org.springframework.web.servlet.ModelAndView;\n\npublic interface Controller\
    \ {\n    ModelAndView handleRequest(HttpServletRequest request,\n            \
    \                   HttpServletResponse response) throws Exception;\n}\n```\n\n\
    Let’s take a look at a small sample. If we take the `com.apress.prospringmvc.bookstore.web.IndexController`\
    \ and create an interface-based controller out of it, it would look something\
    \ like what you see in [Listing 5-2](#Chapter05.html#list_5_2). We implement the\
    \ `handleRequest` method and return an instance of `ModelAndView` with a view\
    \ name.\n\n**Listing 5-2**. An Interface-based IndexController\n\n```\npackage\
    \ com.apress.prospringmvc.bookstore.web;\n// javax.servlet imports omitted\nimport\
    \ org.springframework.web.servlet.ModelAndView;\nimport org.springframework.web.servlet.mvc.Controller;\n\
    \npublic class IndexController implements Controller {\n\n    @Override\n    public\
    \ ModelAndView handleRequest(HttpServletRequest request,\n                   \
    \                   HttpServletResponse response)\n    throws Exception {\n  \
    \      return new ModelAndView(\"index\");\n    }\n}\n```\n\nIn addition to writing\
    \ this controller, we would need to configure an instance of `org.springframework.web.servlet.HandlerMapping`\
    \ to map `/index.htm` to this controller (see [Chapter 3](#Chapter03.html#ch3)\
    \ for more information). We would also need to make sure that there is an `org.springframework.web.servlet.mvc.SimpleControllerHandlerAdapter`\
    \ registered to execute the interface-based controllers (this is registered by\
    \ default).\n\nThe sample given here is quite straightforward. Now image a controller\
    \ that has some page flow. In that case, we would need to check whether the request\
    \ is a `GET` or `POST` request; based on that, we would need to execute different\
    \ controller logic. With large controllers, this can become quite cumbersome.\n\
    \n[Table 5-1](#Chapter05.html#tab_5_1) shows the `Controller` implementations\
    \ that ship with the framework. Many of these are deprecated (as of Spring 3.0)\
    \ or can be considered deprecated in favor of the newer annotation-based controllers.\
    \ Check the descriptions of each controller for deprecation notes.\n\n![Image](images/tab_5_1.jpg)\n\
    \n![Image](images/tab_5_1a.jpg)\n\n#### Annotation-based Controllers\n\nTo write\
    \ an annotation-based controller, we need to write a class and put the `Controller`\
    \ annotation on that class. Also, we need to add an `org.springframework.web.bind.annotation.RequestMapping`\
    \ annotation to the class, a method, or both. [Listing 5-3](#Chapter05.html#list_5_3)\
    \ shows an annotation-based approach to our `IndexController`.\n\n**Listing 5-3.**\
    \ An Annotation-based IndexController\n\n```\npackage com.apress.prospringmvc.bookstore.web;\n\
    \nimport org.springframework.stereotype.Controller;\nimport org.springframework.web.bind.annotation.RequestMapping;\n\
    import org.springframework.web.servlet.ModelAndView;\n\n@Controller\npublic class\
    \ IndexController {\n\n    @RequestMapping(value = \"/index.htm\")\n    public\
    \ ModelAndView indexPage() {\n        return new ModelAndView(\"index\");\n  \
    \  }\n}\n```\n\nThe controller contains a method with the `RequestMapping` annotation,\
    \ and it specifies that it should be mapped to the `/index.htm` URL, which is\
    \ the request-handling method. The method has no required parameters, and we can\
    \ return anything we want; for now, we want to return a `ModelAndView`.\n\nThe\
    \ mapping is in the controller definition, and we need an instance of a `HandlerMapping`\
    \ to interpret these mappings. There are two implementations that can help us\
    \ out here: the `org.springframework.web.servlet.mvc.annotation.DefaultAnnotationHandlerMapping`\
    \ and the `org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping`.\
    \ The first is one of the defaults registered by the `org.springframework.web.servlet.DispatcherServlet`.\
    \ The second is one of the defaults registered by Spring @MVC (which we enabled\
    \ with the `org.springframework.web.servlet.config.EnableWebMvc` annotation).\
    \ We are going to use the Spring @MVC default because it is both more powerful\
    \ and flexible than the `DefaultAnnotationHandlerMapping`. We will see that power\
    \ and flexibility throughout the book."
  raw: '## Implementing Controllers


    Controllers play a crucial role in a web application: they execute the actual
    request, prepare the model, and select a view to render. In conjunction with the
    dispatcher servlet, controllers also play a crucial role in the request processing
    workflow. The controller is the glue between the core application and the web
    interface to the application. In this chapter, we will take a look at the two
    different controller approaches and cover the out-of-the-box implementations provided
    with the Spring Framework.


    This chapter will also take a look at the supporting components for request processing.
    For example, we will cover form submission and how to apply internationalization
    (I18N).


    ### Introducing Controllers


    The controller is the component that is responsible for responding to the action
    the user takes. This action could be a form submission, clicking a link, or simply
    accessing a page. The controller selects or updates the data needed for the view.
    It also select the name of the view to render or can render the view itself. With
    Spring MVC, we have two options when writing controllers. We can either implement
    an interface or put an annotation on the class. The interface is `org.springframework.web.servlet.mvc.Controller`,
    and the annotation is `org.springframework.stereotype.Controller`. The main focus
    of this book is the annotation-based approach (aka Spring @MVC) for writing controllers.
    However, we feel that we still need to mention the interface-based approach.


    Although both approaches work for implementing a controller, there are two major
    differences between them. The first difference is about flexibility, and the second
    is about mapping URLs to controllers. Annotation-based controllers allow for very
    flexible method signatures, whereas the interface-based approach has a predefined
    method on the interface that we must implement. Getting access to other interesting
    collaborators is harder (but not impossible!).


    For the interface-based approach, we must do explicit external mapping of URLs
    to these controllers; in general, this approach is combined with an `org.springframework.web.servlet.handler
    .SimpleUrlHandlerMapping`, so that all the URLs are in a single location. Having
    all of the URLs in a single location is one advantage the interface-based approach
    has over the annotation-based approach. The annotation-based approach has its
    mappings scattered throughout the codebase, which makes it harder to see which
    URL is mapped to which request-handling method. The advantage of annotation-based
    controllers is that, when you open a controller, you can see which URLs it is
    mapped to.


    In this section, we will show how to write both types of controllers, as well
    as how to configure basic view controllers.


    #### Interface-based Controllers


    To write an interface-based controller, we need to create a class that implements
    the `Controller` interface. [Listing 5-1](#Chapter05.html#list_5_1) shows the
    API for that interface. When implementing this interface, we must implement the
    `handleRequest` method. This method needs to return an `org.springframework.web.servlet.ModelAndView`
    object or `null` when the controller handles the response itself.


    ***Listing 5-1.** The Controller Interface*


    `package org.springframework.web.servlet.mvc;`


    `import javax.servlet.http.HttpServletRequest;`

    `import javax.servlet.http.HttpServletResponse;`


    `import org.springframework.web.servlet.ModelAndView;`


    `public interface Controller {`

    `    ModelAndView handleRequest(HttpServletRequest request,`

    `                               HttpServletResponse response) throws Exception;`

    `}`


    Let’s take a look at a small sample. If we take the `com.apress.prospringmvc.bookstore.web
    .IndexController` and create an interface-based controller out of it, it would
    look something like what you see in [Listing 5-2](#Chapter05.html#list_5_2). We
    implement the `handleRequest` method and return an instance of `ModelAndView`
    with a view name.


    ***Listing 5-2**. An Interface-based IndexController*


    `package com.apress.prospringmvc.bookstore.web;`

    `// javax.servlet imports omitted`

    `import org.springframework.web.servlet.ModelAndView;`

    `import org.springframework.web.servlet.mvc.Controller;`


    `public class IndexController implements Controller {`


    `    @Override`

    `    public ModelAndView handleRequest(HttpServletRequest request,`

    `                                      HttpServletResponse response)`

    `    throws Exception {`

    `        return new ModelAndView("index");`

    `    }`

    `}`


    In addition to writing this controller, we would need to configure an instance
    of `org.springframework.web.servlet.HandlerMapping` to map `/index.htm` to this
    controller (see [Chapter 3](#Chapter03.html#ch3) for more information). We would
    also need to make sure that there is an `org.springframework.web.servlet.mvc.SimpleControllerHandlerAdapter`
    registered to execute the interface-based controllers (this is registered by default).


    The sample given here is quite straightforward. Now image a controller that has
    some page flow. In that case, we would need to check whether the request is a
    `GET` or `POST` request; based on that, we would need to execute different controller
    logic. With large controllers, this can become quite cumbersome.


    [Table 5-1](#Chapter05.html#tab_5_1) shows the `Controller` implementations that
    ship with the framework. Many of these are deprecated (as of Spring 3.0) or can
    be considered deprecated in favor of the newer annotation-based controllers. Check
    the descriptions of each controller for deprecation notes.


    ![Image](images/tab_5_1.jpg)


    ![Image](images/tab_5_1a.jpg)


    #### Annotation-based Controllers


    To write an annotation-based controller, we need to write a class and put the
    `Controller` annotation on that class. Also, we need to add an `org.springframework.web.bind.annotation.RequestMapping`
    annotation to the class, a method, or both. [Listing 5-3](#Chapter05.html#list_5_3)
    shows an annotation-based approach to our `IndexController`.


    ***Listing 5-3.** An Annotation-based IndexController*


    `package com.apress.prospringmvc.bookstore.web;`


    `import org.springframework.stereotype.Controller;`

    `import org.springframework.web.bind.annotation.RequestMapping;`

    `import org.springframework.web.servlet.ModelAndView;`


    `@Controller`

    `public class IndexController {`


    `    @RequestMapping(value = "/index.htm")`

    `    public ModelAndView indexPage() {`

    `        return new ModelAndView(“index");`

    `    }`

    `}`


    The controller contains a method with the `RequestMapping` annotation, and it
    specifies that it should be mapped to the `/index.htm` URL, which is the request-handling
    method. The method has no required parameters, and we can return anything we want;
    for now, we want to return a `ModelAndView`.


    The mapping is in the controller definition, and we need an instance of a `HandlerMapping`
    to interpret these mappings. There are two implementations that can help us out
    here: the `org.springframework.web.servlet.mvc.annotation.DefaultAnnotationHandlerMapping`
    and the `org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping`.
    The first is one of the defaults registered by the `org.springframework.web.servlet.DispatcherServlet.`
    The second is one of the defaults registered by Spring @MVC (which we enabled
    with the `org.springframework.web.servlet.config.EnableWebMvc` annotation). We
    are going to use the Spring @MVC default because it is both more powerful and
    flexible than the `DefaultAnnotationHandlerMapping`. We will see that power and
    flexibility throughout the book.'
