    \n### `HandlerMethodReturnValueHandler`\n\n`HandlerMethodReturnValueHandler`与`HandlerMethodArgumentResolver`类似，但有一个重要区别。顾名思义，`HandlerMethodReturnValueHandler`处理方法的返回值。对于每种受支持的返回值或注解，都有对应的实现（参见[第5章](#Chapter05.html#ch5)的“受支持的返回值”一节）。该API也非常简单，如[清单6-26](#Chapter06.html#list_6_26)所示。\n\
