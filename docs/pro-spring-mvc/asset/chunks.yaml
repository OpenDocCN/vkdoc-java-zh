- fmt: "`<subflow-state>`元素的`transition`属性应匹配子流程的某个结束状态`id`。这样，子流程可以根据执行的是哪个结束状态，告知父流程应转换到哪个状态。如果子流程以`previous`id的结束状态终止，则父流程（我们的`createOrders-flow`）将转换回`selectDeliveryOptions`。然而，如果子流程以`authenticationOk`id的结束状态终止，我们将继续执行`placeOrder`状态。\n\
    \n我们仍然没有将所有内容连接起来所需的一切。在我们的`createOrders-flow`中，需要决定是否需要进入子流程。如果用户已经通过身份验证，则无需执行子流程。我们需要一个决策状态来帮助我们。\n\
    \n### 决策状态\n\n决策状态可以包含任意数量的`if`元素，这些元素定义了if-then-else结构。`if`元素的`test`属性定义条件，而`then`和`else`属性标识目标状态。当流程进入决策状态时，第一个匹配的`if`用于转换到下一个状态。这意味着所有其他`if`元素将不会被处理。决策状态还可以使用表达式将决策标准委托给Java应用程序代码。您可以在[图11-11](#Chapter11.html#fig_11_11)中看到决策状态的不同元素和属性（包括它们的顺序）。\n\
    \n![Image](images/9781430241553_Fig11-11.jpg)\n\n***图11-11.** 决策状态的不同属性和元素*\n\n\
    在我们的示例中，我们将在`createOrders-flow`中使用一个决策状态来检查用户是否已通过身份验证。如果用户未通过身份验证，我们将进入身份验证子流程，该子流程将呈现登录屏幕。如果用户之前已通过身份验证，我们可以立即继续创建订单。\n\
    \n![Image](images/square.jpg) **注意** 请记住，身份验证机制是一个自创的、基于会话的模型。Web Flow与Spring\
    \ Security有安全集成，我们将在[第13章](#Chapter13.html#ch13)中看到。通常不需要自己构建这样的模型。然而，我们选择不通过引入Spring\
    \ Security来分散您的注意力，因为现在我们希望您专注于本章讨论的核心Web Flow项目。当通过身份验证时，模型只是将一个令牌放置在`session`作用域上。\n\
    \n您可以在[清单11-42](#Chapter11.html#list_11_42)中看到决策状态的实现。\n\n***清单11-42.** 登录决策状态*\n\
    \n```\n<decision-state id=\"loginCheck\">\n<if test=\"externalContext.sessionMap.contains('authenticatedCustomer')\
    \ == \n              true\" then=\"placeOrder\" else=\"authenticate\"/>\n</decision-state>\n\
    ```\n\n如果提供了多个`if`条件，则它们会逐一评估。如果没有一个条件评估为`true`，则会抛出`org.springframework.webflow.engine.NoMatchingTransitionException`。您可以实现一个`if`条件链；但请注意，任何定义了`else`子句的`if`条件，根据定义，都会评估为`true`。这意味着剩余的`if`条件都不会被评估。因此，如果您有多个`if`元素，只有最后一个`if`元素有`else`才有意义。如果前面的某个`if`有`else`，则后续的`if`元素将永远不会被评估。如果您仔细想想，这是有道理的；如果一个`if`也有一个`else`条件，那么要么执行`then`，要么执行`else`。因此，所有定义在该`if`条件之后的`if`元素都会被跳过。\n\
    \n在我们向您展示本章所做工作的概述之前，我们想执行最后一次重构——针对创建订单流程。该流程现在作为`finish`转换的一个评估动作嵌入。我们将用动作状态替换它。\n\
    \n### 动作状态\n\n动作状态执行一个动作作为其活动。[图11-12](#Chapter11.html#fig_11_12)显示了它的各种属性和元素。在XML流程定义中，动作状态使用`<action-state>`元素定义，要执行的动作使用嵌套的`<evaluate>`元素定义。动作状态通常用于直接或通过控制器与后端服务交互。动作状态自动执行，不会暂停流程执行。视图状态会暂停流程执行（视图被渲染，用户花时间与视图交互），但动作状态会触发事件，导致转换到另一个状态。\n\
    \n![Image](images/9781430241553_Fig11-12.jpg)\n\n***图11-12.** 动作状态的不同属性和元素*\n\n\
    在下面的示例中，当订单成功创建时，我们转换到结束状态。我们也可以响应“error”事件并转换到错误页面。\n\n![Image](images/square.jpg)\
    \ **注意** 没有单一规则来确定是否需要动作状态。如果有多个可能响应的结果，或者处理过程更复杂（例如，执行多个动作时），您可能应该使用动作状态。\n\n\
    为了重构，我们只需将评估表达式移动到一个`<action-state>`中，并相应调整转换。[清单11-43](#Chapter11.html#list_11_43)中显示的代码变成了[清单11-44](#Chapter11.html#list_11_44)中显示的动作状态代码。此代码可以在`src/main/webapp/WEB-INF/view/createOrders/createOrders-flow.xml`中找到。\n\
    \n***清单11-43.** 将评估动作重构为动作状态*\n\n```\n<transition on=\"finish\" to=\"end\">\n\
    \    <evaluate expression=\"orderController.placeOrder(flowScope.orderForm,\n\
    \     externalContext.sessionMap.authenticatedAccount)\"/>\n</transition>\n```\n\
    \n***清单11-44.** 用于下单的动作状态*\n\n```\n<action-state id=\"placeOrder\">\n    <evaluate\
    \ expression=\"orderController.placeOrder(externalContext.\nsessionMap.authenticatedAccount,\
    \ \n                          flowScope.orderForm)\"\n              result=\"\
    flowScope.orderId\"/>\n    <transition on=\"success\" to=\"end\"/>\n</action-state>\n\
    ```\n\n`authenticatedAccount`变量从`session`作用域中查找。它是在用户使用`AuthenticationController`登录时放置在那里的。您可以在[清单11-40](#Chapter11.html#list_11_40)的最后一个方法中看到这一点。`OrderForm`是在`createOrder-flow`开头的`on\
    \ start`元素中创建的。它被放置在流程作用域上。我们不需要特别指定作用域，因为表达式语言会自动在所有Web Flow作用域中查找（即，不指定隐式`flowScope`对象而直接指定`orderForm`也是正确的，并且会产生相同的结果）。"
  raw: 'The transition on attribute of the `<subflow-state>` element should match
    one of the end state `id`s of the subflow. This way, the subflow can tell the
    parent flow which state to transition to, depending on which end state was executed
    on the subflow. If the subflow were to end with the end state that had the `previous`
    id, then the parent flow (our `createOrders-flow`) would transition back to `selectDeliveryOptions`.
    However, if our subflow were to end with an end state with the `authenticationOk`
    id, then we would continue to the `placeOrder` state.


    We still don''t have everything we need to be able wire everything together. In
    our `createOrders-flow`, we need to decide whether we need to go to the subflow.
    If our user was already authenticated, then there is no need to execute the subflow.
    We need a decision state to help us out.


    #### Decision State


    A decision state can contain any number of `if` elements that define an if-then-else
    structure. The test attribute of the `if` element defines the condition, while
    the `then` and `else` attributes identify the target state. When the flow enters
    a decision state, the first matching `if` is used to transition to the next state.
    This means that all other `if` elements will not be processed. The decision state
    can also delegate the criteria for the decision to Java application code using
    expressions. You can see the different elements and attributes of the decision
    state (including their order) in [Figure 11-11](#Chapter11.html#fig_11_11).


    ![Image](images/9781430241553_Fig11-11.jpg)


    ***Figure 11-11.** Different attributes and elements of the decision state*


    In our sample, we will use a decision state in the `createOrders-flow` to check
    whether the user is authenticated. If the user is not authenticated, then we will
    proceed to the authentication subflow, which will render the login screen. If
    the user was previously authenticated, we can immediately proceed with creating
    the order.


    ![Image](images/square.jpg) **Note**  Remember that the authentication mechanism
    is a self-invented, session-based model. Web Flow has security integration with
    Spring security, as we will see in [Chapter 13](#Chapter13.html#ch13). There is
    usually no need to build such a model yourself. However, we opted not to distract
    you by introducing Spring security because right now we want you to focus on the
    core Web Flow items being discussed in this chapter. When authenticated, the model
    simply places a token on the `session` scope.


    You can see the implementation of the decision state in [Listing 11-42](#Chapter11.html#list_11_42).


    ***Listing 11-42.** The Login Decision State*


    `<decision-state id="loginCheck">`

    `<if test="externalContext.sessionMap.contains(''authenticatedCustomer'') ==`
    ![Image](images/U002.jpg)

    `              true" then="placeOrder" else="authenticate"/>`

    `</decision-state>`


    If multiple if conditions are supplied, then they are evaluated one by one. If
    none of the conditions evaluates to `true`, then an `org.springframework.webflow.engine.NoMatchingTransitionException`
    is thrown. You can implement a chain of if conditions; however, be aware that
    any `if` condition that defines an `else` clause will, by definition, evaluate
    to `true`. This means that none of the remaining `if` conditions will be evaluated.
    For this reason, if you have multiple `if` elements, it only makes sense for the
    last `if` element to have an `else`. If one of the previous `if`s had an else,
    then the subsequent `if` elements would never be evaluated. This makes sense if
    you think about it; if an `if` has also an `else` condition, either the `then`
    or the `else` is executed. Hence, all `if` elements that are defined below an
    `if` condition are skipped.


    Before we show you an overview of what we have done in this chapter, we want to
    perform one last refactoring—for the create order process. This process is now
    embedded as an evaluate action of the `finish` transition. We are going to replace
    this with an action state.


    #### Action State


    An action state executes an action as its activity. [Figure 11-12](#Chapter11.html#fig_11_12)
    shows its various attributes and elements. In an XML flow definition, an action
    state is defined using the `<action-state>` element, and the action to execute
    is defined using a nested `<evaluate>` element. Action states are typically used
    to interact with back-end services, either directly or via controllers. Action
    states execute automatically and do not pause the flow execution. A view state
    pauses the flow execution (the view gets rendered, and the user spends time working
    with the view), but an action state signals events that leads to transitioning
    to another state.


    ![Image](images/9781430241553_Fig11-12.jpg)


    ***Figure 11-12.** Different attributes and elements of the action state*


    In the example that follows, we transition to the end state when an order is successfully
    made. We could also react to on “error” events and transition to an error page
    instead.


    ![Image](images/square.jpg) **Note**  There is no single rule for determining
    whether you need an action state. You should probably be using an action state
    if there are multiple outcomes that you could react upon or in cases where processing
    is more complex (e.g., when executing multiple actions).


    To refactor this, we simply move the evaluation expression to an `<action-state>`
    and adjust the transitions accordingly. The code shown in [Listing 11-43](#Chapter11.html#list_11_43)
    becomes the code for the action state shown in [Listing 11-44](#Chapter11.html#list_11_44).
    This code can be found in `src/main/webapp/WEB-INF/view/createOrders/createOrders-flow.xml.`


    ***Listing 11-43.** Refactoring the Evaluate Action to an Action State*


    `<transition on="finish" to="end">`

    `    <evaluate expression="orderController.placeOrder(flowScope.orderForm,`

    `     externalContext.sessionMap.authenticatedAccount)"/>`

    `</transition>`


    ***Listing 11-44.** The Action State for Placing an Order*


    `<action-state id="placeOrder">`

    `    <evaluate expression="orderController.placeOrder(externalContext.`![Image](images/U002.jpg)

    `sessionMap.authenticatedAccount,` ![Image](images/U002.jpg)

    `                          flowScope.orderForm)"`

    `              result="flowScope.orderId"/>`

    `    <transition on="success" to="end"/>`

    `</action-state>`


    The `authenticatedAccount` variable is looked up from `session` scope. It was
    placed there when the user logged in using the `AuthenticationController`. You
    can see this in the last method of [Listing 11-40](#Chapter11.html#list_11_40).
    The `OrderForm` was created in the beginning of the `createOrder-flow` in the
    on start element. It was placed on flow scope. We don''t need to specify a scope
    per se because the expression language will look in all Web Flow scopes automatically
    (i.e., specifying `orderForm` without the implicit `flowScope` object would also
    be correct and yield the same result).'
