- fmt: "第一个高亮块是将表单数据转换为`JSON`对象。第二个高亮行是类型。我们需要将其改为`POST`。这是因为内容是请求体，而`GET`请求没有请求体，而是将所有内容编码到`URL`中。最后一个高亮行是将`JSON`对象转换为可以发送到服务器的`JSON`字符串。其余部分保持不变。\n\
    \n如果应用程序重新部署并执行搜索，搜索结果将再次显示给用户。\n\n![Image](images/square.jpg) **注意** `jQuery`具有插件架构，并且有一些插件可以简化表单到`JSON`的转换。我们选择不使用插件，因为那样会过于关注插件本身。\n\
    \n### 结合AJAX和REST\n\n我们简要介绍了`REST`，也涉及了`AJAX`的主题，但每个主题都是分开讨论的。然而，将两者结合起来也非常容易。在`REST`部分，我们将账户更新表单改为使用`PUT`请求提交的表单，但这只是使用`POST`进行的模拟。使用我们使用的`JavaScript`库，实际上可以创建真正的`PUT`请求，而不是使用`POST`请求来模拟`PUT`请求。\n\
    \n为了能够发出并处理`PUT`请求，我们需要做两件事：表单必须通过`AJAX`作为`PUT`请求提交，并且我们需要准备服务器以能够处理`PUT`请求。`POST`和`PUT`请求之间存在一些差异。一个主要区别是`POST`请求必须提供表单数据（这是规范要求的），但对于`PUT`请求则不是这样。`Spring`提供了一个`org.springframework.web.filter.HttpPutFormContentFilter`，可以帮助我们解决这个问题。\n\
    \n当检测到`PUT`请求的内容类型为`application/x-www-form-urlencoded`时，该过滤器会启动。它解析传入请求的请求体（委托给`org.springframework.http.converter.xml.XmlAwareFormHttpMessageConverter`），结果是一个参数映射，可以像普通表单参数一样使用。[清单7-11](#Chapter07.html#list_7_11)展示了如何注册该过滤器。\n\
    \n***清单7-11.** 注册HttpPutFormContentFilter*\n\n```\npackage com.apress.prospringmvc.bookstore.web;\n\
    \nimport org.springframework.web.filter.HttpPutFormContentFilter;\n// 其他导入省略。\n\
    \npublic class BookstoreWebApplicationInitializer implements WebApplicationInitializer\
    \ {\n\n    private static final String DISPATCHER_SERVLET_NAME = \"dispatcher\"\
    ;\n\n    @Override\n    public void onStartup(ServletContext servletContext)\n\
    \    throws ServletException {\n        registerListener(servletContext);\n  \
    \      registerDispatcherServlet(servletContext);\n        registerHttPutFormContentFilter(servletContext);\n\
    \        registerHiddenHttpMethodFilter(servletContext);\n\n    }\n\n    private\
    \ void registerHttPutFormContentFilter(\n           ServletContext servletContext)\
    \ {\n        FilterRegistration.Dynamic registration;\n        registration =\
    \ servletContext.addFilter(\n                           \"httpPutFormContentFilter\"\
    ,\n                            HttpPutFormContentFilter.class);\n        registration.addMappingForServletNames(\n\
    \            EnumSet.of(DispatcherType.REQUEST, DispatcherType.FORWARD),\n   \
    \         false,\n            DISPATCHER_SERVLET_NAME);\n    }\n    // 其他方法省略\n\
    }\n```\n\n接下来，我们还需要在`account.jsp`文件中添加一些`JavaScript`。这与我们最初添加到图书搜索页面的脚本非常相似，但有一个主要区别——我们现在使用`PUT`而不是`GET`。请参见[清单7-12](#Chapter07.html#list_7_12)，了解在表单之后或页面末尾添加的`JavaScript`。控制器方法（参见[清单7-3](#Chapter07.html#list_7_3)）保持不变，因为它对于控制器来说仍然是一个`PUT`请求。\n\
    \n***清单7-12.** 账户页面PUT Ajax表单提交*\n\n```\n<script>\n$('#accountForm').submit(function(evt){\n\
    \    evt.preventDefault();\n    formData = $('#accountForm').serialize();\n  \
    \  $.ajax({\n        url: $('#accountForm').action,\n        type: 'PUT',\n  \
    \      data: formData\n    });\n});\n</script>\n```\n\n### 渐进增强\n\n我们应用`AJAX`特性的方式是一种称为*渐进增强*的技术。这意味着先构建一个功能完整的简单网页，然后使用`JavaScript`为页面添加动态和丰富的交互行为。\n\
    \n相反的方法也是可行的；这种技术称为*优雅降级*，这意味着我们从包含所有所需行为的页面开始，然后根据浏览器提供的功能，缩减所使用的丰富行为。\n\n目前的趋势是使用渐进增强，因为通常来说，它更容易构建和维护。它还有一个优点，即我们可以根据连接到我们应用程序的设备的能力进行增强（`iPhone`具有与运行`Internet\
    \ Explorer 9`的`Windows 7 PC`不同的特性）。\n\n### 处理文件上传\n\n`HTTP`文件上传或基于表单的`HTML`文件上传在`RFC\
    \ 1867`中定义。^([8](#Chapter07.html#CHP-7-FN-8)) 在向表单添加类型为`file`的`HTML`输入字段并将编码设置为`multipart/form-data`后，浏览器可以将文本和/或二进制文件作为`POST`请求的一部分发送到服务器。\n\
    \n为了能够处理文件上传，我们首先需要注册一个`org.springframework.web.multipart.MultipartResolver`。开箱即用，`Spring`提供了两种处理文件上传的方式。第一种是`Servlet\
    \ 3.0`规范中描述的多部分支持，第二种是使用`Apache`的`Commons FileUpload`^([9](#Chapter07.html#CHP-7-FN-9))项目提供的功能。\n\
    \n`Spring`框架提供了两种实现：`org.springframework.web.multipart.support.StandardServletMultipartResolver`和`org.springframework.web.multipart.commons.CommonsMultipartResolver`。第一种实现只能在启用了多部分支持的`Servlet\
    \ 3.0`环境中使用，第二种则使用`commons-fileupload`。\n\n为了实际处理文件上传，我们需要修改控制器。这些修改大多与所使用的文件上传技术无关。`Spring`提供了几个抽象来处理文件上传。我们可以编写一个请求处理方法，该方法接受类型为`org.springframework.web.multipart.MultipartFile`（或集合）的参数；我们也可以使用`org.springframework.web.multipart.MultipartHttpServletRequest`并自行检索文件。当我们在`Servlet\
    \ 3.0`环境中并使用多部分解析支持时，我们还可以使用`javax.servlet.http.Part`接口来获取文件。\n\n指示对文件上传执行操作的最终方法是用`org.springframework.web.bind.annotation.RequestPart`注解方法参数（参见[第4章](#Chapter04.html#ch4)）。当将其放在上述任何其他内容上时，`Spring`会使用类型转换系统来转换文件的内容。\n\
    \n我们将首先讨论两种不同策略的配置。之后，我们将研究如何在控制器内部处理文件上传。"
