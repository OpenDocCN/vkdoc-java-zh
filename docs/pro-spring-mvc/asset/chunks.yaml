    Now let’s put some more functionality into our search page. For example, let’s
    make the title of a book a link that navigates to a book’s details page that shows
    an image of and some information about the book. We’ll start by modifying our
    `search.jsp` and adding links (see [Listing 5-18](#Chapter05.html#list_5_18)).


    ***Listing 5-18.** The Modified Search Page*


    `<%@ taglib prefix="c" uri="http://java.sun.com/jsp/jstl/core"%>`


    `<form method="POST" action="<c:url value="/book/search"/>">`

    `    <fieldset>`

    `        <legend>Search Criteria</legend>`

    `        <table>`

