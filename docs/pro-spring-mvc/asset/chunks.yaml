- fmt: "### Implementing the Checkout\n\nTo finalize the ordering process, we will\
    \ give our customers an opportunity to check out their cart. This will create\
    \ an actual `com.apress.prospringmvc.bookstore.domain.Order` object and entry\
    \ in the database. The checkout is a combination of a lot of things we covered\
    \ in the previous chapter and the previous section. The controller is the `com.apress.prospringmvc.bookstore.web.controller.CheckoutController`\
    \ (see [Listing 6-4](#Chapter06.html#list_6_4)), and it contains a lot of logic.\
    \ The `checkout.jsp` file is the JSP that contains our screen; it can be found\
    \ in `/WEB-INF/views/cart`.\n\n**Listing 6-4.** The `CheckoutController`\n\n```\n\
    package com.apress.prospringmvc.bookstore.web.controller;\n\n//Other imports omitted\n\
    import com.apress.prospringmvc.bookstore.validation.OrderValidator;\n\n@Controller\n\
    @SessionAttributes(types = { Order.class })\n@RequestMapping(\"/cart/checkout\"\
    )\npublic class CheckoutController {\n\n    private final Logger logger;\n   \
    \ logger  = LoggerFactory.getLogger(CheckoutController.class);\n\n    @Autowired\n\
    \    private Cart cart;\n\n    @Autowired\n    private BookstoreService bookstoreService;\n\
    \n    @ModelAttribute(\"countries\")\n    public Map<String, String> countries(Locale\
    \ currentLocale) {\n        Map<String, String> countries = new TreeMap<String,\
    \ String>();\n        for (Locale locale : Locale.getAvailableLocales()) {\n \
    \           countries.put(\n                       locale.getCountry(),\n    \
    \                   locale.getDisplayCountry(currentLocale));\n        }\n   \
    \     return countries;\n    }\n\n    @RequestMapping(method = RequestMethod.GET)\n\
    \    public void show(HttpSession session, Model model) {\n        Account account\
    \ = (Account)\n        session.getAttribute(LoginController.ACCOUNT_ATTRIBUTE);\n\
    \        Order order = this.bookstoreService.createOrder(this.cart, account);\n\
    \        model.addAttribute(order);\n    }\n\n    @RequestMapping(method = RequestMethod.POST,\
    \ params = \"order\")\n    public String checkout(SessionStatus status,\n    \
    \                       @Validated @ModelAttribute Order order,\n            \
    \               BindingResult errors) {\n        if (errors.hasErrors()) {\n \
    \           return \"cart/checkout\";\n        } else {\n            this.bookstoreService.store(order);\n\
    \            status.setComplete(); //remove order from session\n            this.cart.clear();\
    \ // clear the cart\n            return \"redirect:/index.htm\";\n        }\n\
    \    }\n\n    @RequestMapping(method = RequestMethod.POST, params = \"update\"\
    )\n    public String update(@ModelAttribute Order order) {\n        order.updateOrderDetails();\n\
    \        return \"cart/checkout\";\n    }\n\n    @InitBinder\n    public void\
    \ initBinder(WebDataBinder binder) {\n        binder.setValidator(new OrderValidator());\n\
    \    }\n\n}\n```\n\nThe first method called on the controller when we click checkout\
    \ is the `show` method, it takes our cart and uses the `Account` stored in the\
    \ session to create an order and add that to the model. The order is stored in\
    \ the session in between requests; this due to the use of `SessionAttributes`.\
    \ When this is done, the checkout page is rendered (see [Figure 6-3](#Chapter06.html#fig_6_3)).\n\
    \n![Image](images/9781430241553_Fig06-03.jpg)\n\n**Figure 6-3.** The Checkout\
    \ page\n\nWhen the form is filled in, the customer can do two things: he can press\
    \ the Order button or the Update button. When the Update button is pressed, the\
    \ `update` method is called. This submits the form and then updates the order\
    \ (and recalculates the total price). When the Order button is pressed, the order\
    \ is submitted and then validated by the `com.apress.prospringmvc.bookstore.validation.OrderValidator`.\
    \ In any errors occur, the page is redisplayed and error messages are shown to\
    \ the customer. The interesting part occurs when there are no errors. First, the\
    \ order is stored in the database. When we are finished with the order, we need\
    \ to remove it from the session, which we accomplish by calling the `setComplete`\
    \ method on the `org.springframework.web.bind.support.SessionStatus` object (see\
    \ the [Chapter 5](#Chapter05.html#ch5) section, “Supported Method Argument Types”).\
    \ Finally, before redirecting to the index page again, we need to clear the shopping\
    \ cart. We do this so that the customer can add new books to the cart. Because\
    \ we cannot simply replace the `session`-scoped object, we need to call a method\
    \ to clear it. If we were to replace the cart with a fresh instance we would basically\
    \ destroy the scoped proxy object.\n\n### Crosscutting Concerns\n\nWhen developing\
    \ an enterprise application, we are often faced or challenged with crosscutting\
    \ concerns. These are concerns that affect many objects and actions. Examples\
    \ of crosscutting concerns include transaction management and security, but also\
    \ actions such as exposing generic data for each incoming web request.\n\nIn general,\
    \ these concerns are hard to implement in our codebase by using traditional object-oriented\
    \ approaches. If we were to implement them in traditional ways, it would lead\
    \ to code duplication and hard-to-maintain code. For our general objects, we can\
    \ use aspect-oriented programming (AOP) to address these crosscutting concerns;\
    \ however when it comes to applying it to requests, we need a slightly different\
    \ approach.\n\nSpring MVC gives us two ways of implementing crosscutting concerns.\
    \ The first approach uses *interceptors* to implement generic logic, while the\
    \ second relies on exception handling. In this section, we are going to take a\
    \ look at both techniques of applying crosscutting concerns in our web application."
