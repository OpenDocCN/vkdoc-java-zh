    In this section, we are going to implement an `org.springframework.web.context.request.WebRequestInterceptor`.
    If we look at our web page in [Figure 6-4](#Chapter06.html#fig_6_4), we can see
    a section called Random Books. This section on our web page has remained empty
    thus far. Now we are going to create an interceptor that will add some random
    books to the model. For this, we are going to implement the `postHandle` method
    (see [Listing 6-11](#Chapter06.html#list_6_11)).


    ![Image](images/square.jpg) **Note** In a real web shop, we would probably call
    this section “New Books” or “Suggested Books.”


    ![Image](images/9781430241553_Fig06-04.jpg)


    ***Figure 6-4.** The welcome page without random books listed*


    ***Listing 6-11.** The CommonDataInterceptor*


    `package com.apress.prospringmvc.bookstore.web.interceptor;`


    `import org.springframework.beans.factory.annotation.Autowired;`

    `import org.springframework.ui.ModelMap;`

    `import org.springframework.web.context.request.WebRequest;`

    `import org.springframework.web.context.request.WebRequestInterceptor;`


    `import com.apress.prospringmvc.bookstore.service.BookstoreService;`


    `public class CommonDataInterceptor implements WebRequestInterceptor {`


    `    @Autowired`

    `    private BookstoreService bookstoreService;`


    `    @Override`

    `    public void preHandle(WebRequest request) throws Exception {`

    `    }`


    `    @Override`

    `    public void postHandle(WebRequest request, ModelMap model)`

    `    throws Exception {`

    `        if (model != null) {`

    **`model.addAttribute("randomBooks", this.bookstoreService.findRandomBooks());`**

    `        }`

    `    }`


    `    @Override`

    `    public void afterCompletion(WebRequest request, Exception ex)`

    `    throws Exception {`

    `    }`


    `}`


    The `postHandle` method adds some random books to the model, but only when this
    model is available. This is why our code includes a `null` check. The model can
    be `null` when we are going to do AJAX or write the response ourselves.


    To have our interceptor applied to incoming request, we need to register it. The
    interceptor needs to be called for every incoming request, so it doesn’t require
    much additional configuration (see the highlighted line in [Listing 6-12](#Chapter06.html#list_6_12)).


    ***Listing 6-12.** The CommondDataInterceptor Configuration*


