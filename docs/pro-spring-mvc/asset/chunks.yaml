    This concludes the testing of our `AccountService` using a mocked `AccountRepository`.
    We hope we have shown you how easy it is to set up and verify mocks using Mockito
    and how useful they are in isolating logic to be tested. There are plenty of other
    features that can help you set up the desired mocking environment. Those are out
    of scope for this chapter, so we invite you to take a look at the Mockito website
    for a good starting point.


    ### Testing Your MVC Logic


    As shown in [Figure 9-9](#Chapter09.html#fig_9_9), Spring MVC consists of our
    view layer (JSPs), the controller (Spring internal code), our model, and our application
    controllers. It is important that we first decide which of these components we
    should actually test and which not.


    To test JSPs, you need a running servlet container. This will be part of our system
    tests and we will test it later in this chapter in the section “Automated Front-End
    Testing.” We don’t need to test the controller, as this is Spring Framework internal
    code. We explained before how to test the domain using unit and integration tests,
    so these are already tested. The only things left to test are our application
    controllers.


    ![Image](images/9781430241553_Fig09-09.jpg)


    ***Figure 9-9.** Components in an MVC architecture*


    `com.apress.prospringmvc.bookstore.web.controller.LoginController` is the application
    controller we are going to test, more specifically the `handleLogin` method. Our
    first advice is to keep the logic inside the application controllers as limited
    as possible. E.g., when you have extensive validation, put that code in separate
    classes. This way they become standalone components which are easy to test without
    requiring your application controller. If you apply this rule consistently, you
    will be able to test 90% (or more) of your code on the frontend using plain unit
    tests. This way the application controller will only remain a thin layer between
    the controller framework and these standalone (easy to test) classes and your
    model.'
