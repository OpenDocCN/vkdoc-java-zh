    #### 什么是模拟对象？


    正如引言中所述，在某些情况下，你希望隔离某个特定算法进行单元测试。该算法可能依赖于一个为其提供数据的仓库，而你不想费心去设置测试数据。你希望将测试重点完全放在算法本身。模拟对象在这里是一个很好的解决方案，因为它允许你插入一个真实资源的替代品，并预先为其编程设定数据。每当算法调用模拟对象时，它就能返回你在测试设置中为其编程设定的数据。


    模拟对象还有其他好处。模拟对象是智能的。例如，它可以被设计成仅当方法调用的参数匹配某个特定值时才会返回数据。模拟对象还可以被验证。当测试完成时，你可以要求模拟对象检查所有你为其编程设定的方法是否确实以预期的参数被调用了。如果没有，它就会让你的测试失败。模拟对象的另一个用例是针对那些没有简单内存替代方案的资源；例如，当你依赖一个遗留系统时。


    模拟对象属于所谓的“测试替身”范畴。测试替身有不同的种类，但其中只有一种是真正的模拟对象。马丁·福勒在他的文章《Mocks Aren''t Stubs》^(11)中区分了不同的测试替身并恰当地命名了它们。让我们来看看：


    > *   **哑元。** 哑元通常是给定接口的真实实现。例如，我们可以构建一个 `DummyBookRepository`。哑元的方法体大多是空的。如果其签名要求它们返回一个值，那么通常返回“null”。哑元对于构建你要测试的对象很有用，这些对象对哑元有强制性的依赖。但所讨论的这个依赖关系并不用于测试给定的功能。

    > *   **伪造。** 伪造是真实资源的工作替代品，例如内存数据库或 Web 服务的内存实现。很明显，内存伪造相比任何外部依赖都具有真正的优势，因为外部依赖会再次打破我们的规则——即我们的测试应该能够在任何地方运行，同时，一旦伪造被替换为真实资源，它仍能提供高水平的保证，确保你的代码能正常工作。

    > *   **桩。** 桩是替换对象，当它们的方法被调用时，能够返回预先编程设定的值。它们通常不会响应其被编程设定值之外的值。它们捕获状态的方式非常基础，并且验证过程大多不允许你进行行为验证。这些有时也被称为“模拟器”。

    > *   **模拟。** 与桩相比，模拟对象在训练（设置预编程数据）和验证阶段增加了额外的功能。模拟对象不仅允许你验证某个给定方法是否被调用，还能验证它是否以期望的参数被调用。这通常是内建在模拟框架中的，不需要你自己构建（与桩不同）。


    根据我们的经验，所有这些测试替身在项目中都有其特定的位置。虽然所有测试替身实际上都可以被模拟对象替代，但你或许不应该这样做。模拟对象是在测试中即时构建的，为其编程设定数据，期望特定的行为，并在测试结束前进行验证。哑元是位于项目代码中的一个真实类。除了
    `com.apress.prospringmvc.bookstore.repository.JpaBookRepository` 之外，可能还存在一个“`DummyBookRepository`”。除了存在之外，它不应该做任何事情。其优势在于，你可以在测试中使用
    Spring 配置文件或选择性上下文加载来装配其中一个。这可能会使你的代码库更整洁，测试更易于理解。此外，当你在真正需要哑元的地方使用了模拟对象时，你会向阅读你代码的其他开发者发出错误的信号。他们会看到一个既未编程设定也未经验证的模拟对象，因此会认为这是一个开发者错误。使用哑元，你清楚地表明该依赖关系在你正在执行的测试范围内不相关，但你正在测试的对象对其有强制性依赖，因此你给了它一个哑元实现。


    _________


    ¹¹ [`http://martinfowler.com/articles/mocksArentStubs.html`](http://martinfowler.com/articles/mocksArentStubs.html)


    在某些时候，你想要构建一个真正的集成测试。在上一节中，我们针对一个内存数据库测试了我们的 `JpaBookRepository`。尽管我们可以模拟 `EntityManager`，但不这样做带来了巨大的价值；它告诉我们，我们的
    JPQL 查询被翻译成了实际正确的 SQL，并且可以被 RDBMS 执行。用模拟对象替换它会从我们的测试中削减关键内容，并降低其有效性。


    桩可能只在特殊的集成测试中有用，即当某个给定资源（例如遗留系统）没有现成的伪造可用时。此时，桩可以作为“带数据的哑元”被装配进来。


    最后一点，仔细考虑你将使用哪种测试替身。在编写单元测试时，首先考虑使用哑元。如果你真的需要对依赖项进行状态和行为验证，考虑使用模拟对象。如果你在进行集成测试，尽可能多地考虑使用内存伪造。如果你从另一个接口进行集成测试（例如，使用内存浏览器进行前端测试），考虑使用桩。


    在此讨论中，我们将仅限于为我们的单元测试使用和创建模拟对象。在下一节中，我们将深入代码，测试我们的 `AccountService`，同时为其 `AccountRepository`
    依赖项使用模拟对象。

    '
- fmt: "### Testing the `AccountService`\n\nOur `com.apress.prospringmvc.bookstore.service.AccountService`\
    \ has two methods: `save`, which saves a new `com.apress.prospringmvc.bookstore.domain.Account`\
    \ to the database, and `login`, which takes a username and password as parameters\
    \ and verifies the credentials. If the credentials are correct, it returns the\
    \ `Account` that belongs to the given user. It does that by loading an `Account`\
    \ from the database where the username matches. After that, it tries to verify\
    \ passwords. The passwords are SHA-256 hashed. So the service first creates a\
    \ hash from the password parameter and then compares it with the value retrieved\
    \ from the database (where we store only the hashed values of the passwords).\n\
    \nWe are writing a unit test that will test the `login` method. In order to do\
    \ this, we will create a mock for `com.apress.prospringmvc.bookstore.repository.AccountRepository`\
    \ (this is the repository used to load the `Account` from database based upon\
    \ the username). We will create a test method that tests a successful login and\
    \ another that performs a negative test, in which we intentionally supply bad\
    \ credentials, which should lead produce an exception. Let’s look at our first\
    \ version of the test in [Listing 9-8](#Chapter09.html#list_9_8).\n\n**Listing\
    \ 9-8.** Setting up the `AccountServiceTest` in `src/test/java`\n\n```java\npackage\
    \ com.apress.prospringmvc.bookstore.service;\n\n// Other imports omitted, see\
    \ Listing 9-7\n\nimport static junit.framework.Assert.assertEquals;\n\nimport\
    \ org.mockito.Mockito;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.Configuration;\n\nimport com.apress.prospringmvc.bookstore.domain.Account;\n\
    import com.apress.prospringmvc.bookstore.domain.support.AccountBuilder;\nimport\
    \ com.apress.prospringmvc.bookstore.repository.AccountRepository;\n\n@RunWith(SpringJUnit4ClassRunner.class)\n\
    @ContextConfiguration\npublic class AccountServiceTest {\n\n    @Autowired\n \
    \   private AccountService accountService;\n    @Autowired\n    private AccountRepository\
    \ accountRepository;\n\n    @Test(expected = AuthenticationException.class)\n\
    \    public void testLoginFailure() throws AuthenticationException {\n       \
    \ accountService.login(\"john\", \"fail\");\n    }\n\n    @Test()\n    public\
    \ void testLoginSuccess() throws AuthenticationException {\n        Account account\
    \ = accountService.login(\"john\", \"secret\");\n        assertEquals(\"John\"\
    , account.getFirstName());\n        assertEquals(\"Doe\", account.getLastName());\n\
    \    }  \n\n    @Configuration\n    static class AccountServiceTestContextConfiguration\
    \ {\n\n        @Bean\n        public AccountService accountService() {\n     \
    \       return new AccountServiceImpl();\n        }\n\n        @Bean\n       \
    \ public AccountRepository accountRepository() {\n            return Mockito.mock(AccountRepository.class);\n\
    \        }\n    }\n}\n```\n\nMockito^([12](#Chapter09.html#CHP-9-FN-12)) is a\
    \ state of the art mock framework that we will be using. It is flexible and has\
    \ a very intuitive API. Throughout this section we will make you more familiar\
    \ how you can use Mockito for all your mocking needs. The line in bold is all\
    \ that is needed to create a mock using Mockito. You pass along an interface or\
    \ class, and Mockito will return a mock object which is not yet programmed.\n\n\
    What further happens is that when adding the `@ContextConfiguration` annotation,\
    \ Spring will automatically scan for `@Configuration` classes within the scope\
    \ of the class and find our `AccountServiceTestContextConfiguration`. Alternatively,\
    \ you can also specify classes directly on the `@ContextConfiguration` annotation\
    \ using the `classes` attribute, or XML files with the `locations` attribute.\
    \ In the `AccountServiceTestContextConfiguration` configuration class, we created\
    \ two beans: the first one is the `AuthenticationService`, the second is the `AccountRepository`.\
    \ For the second case we have used Mockito to create a mock. Spring will now auto-inject\
    \ the `AccountRepository` into the `AuthenticationService` when creating the context\
    \ (remember, Spring will be injecting our mocked version of the `AccountRepository`).\n\
    \nAt this point the test will not run, since we have not yet programmed our mock.\
    \ When the `login` method of the `AuthenticationService` calls a method on our\
    \ `AccountRepository` mock, it will return null values. So the next thing to do\
    \ is program our mock as can be seen in [Listing 9-9](#Chapter09.html#list_9_9).\n\
    \n![Image](images/square.jpg) **Note** The `testLoginFailure` (being a so called\
    \ “negative” test) uses a JUnit feature to verify that indeed an exception is\
    \ thrown: `@Test(expected = AuthenticationException.class)`. In this case we require\
    \ that the `AuthenticationException` is actually thrown. If it isn’t, the test\
    \ fails.\n\n**Listing 9-9.** Programming the mock\n\n```java\n@Before\npublic\
    \ void setup() {\n    Account account = new AccountBuilder() {\n        {\n  \
    \          address(\"Herve\", \"4650\", \"Rue de la gare\", \"1\", null, \"Belgium\"\
    );\n            credentials(\"john\", \"secret\");\n            name(\"John\"\
    , \"Doe\");\n        }\n    }.build(true);\n\n    Mockito.when(accountRepository.findByUsername(\"\
    john\"))\n           .thenReturn(account);\n}\n```\n\nWe first created the data\
    \ that our mock will have to return. In our case it is an instance of an `Account`.\
    \ The last line of code of [Listing 9-9](#Chapter09.html#list_9_9) programs the\
    \ mock. Whenever the mock receives a call on method `findByUsername` with the\
    \ parameter `\"john\"`, it will return the account. If it receives calls with\
    \ other parameters (or other methods that aren’t programmed), null is returned.\
    \ This logic is put in an `@Before` method since we will reset our mock after\
    \ every test method invocation. The mock will be reprogrammed before a new test\
    \ execution starts.\n\n_________\n\n^(12) [`http://code.google.com/p/mockito/`](http://code.google.com/p/mockito/)\n\
    \nFinally, in [Listing 9-10](#Chapter09.html#list_9_10), we have the `@After`\
    \ method, which will verify the mock’s state. It will check that the method we\
    \ programmed the mock with was indeed called. Here we will strictly check that\
    \ the method was called once (exactly once). After that we reset to mock so it\
    \ forgets about its programmed data and verification state. It can then be reprogrammed\
    \ (which will happen in the `@Before` method before the next method is executed).\n\
    \n**Listing 9-10.** Verifying the mock’s state and resetting it\n\n```java\n@After\n\
    public void verify() {\n    Mockito.verify(accountRepository,\n              \
    \     VerificationModeFactory.times(1))\n                   .findByUsername(Mockito.anyString());\n\
    \n    // This is allowed here: using container injected mocks  \n    Mockito.reset(accountRepository);\n\
    }\n```"
  raw: '#### Testing the AccountService


    Our `com.apress.prospringmvc.bookstore.service.AccountService` has two methods:
    `save`, which saves a new `com.apress.prospringmvc.bookstore.domain.Account` to
    the database, and `login`, which takes a username and password as parameters and
    verifies the credentials. If the credentials are correct, it returns the `Account`
    that belongs to the given user. It does that by loading an `Account` from the
    database where the username matches. After that, it tries to verify passwords.
    The passwords are SHA-256 hashed. So the service first creates a hash from the
    password parameter and then compares it with the value retrieved from the database
    (where we store only the hashed values of the passwords).


    We are writing a unit test that will test the login method. In order to do this,
    we will create a mock for `com.apress.prospringmvc.bookstore.repository.AccountRepository`
    (this is the repository used to load the `Account` from database based upon the
    username). We will create a test method that tests a successful login and another
    that performs a negative test, in which we intentionally supply bad credentials,
    which should lead produce an exception. Let’s look at our first version of the
    test in [Listing 9-8](#Chapter09.html#list_9_8).


    ***Listing 9-8.** Setting up the AccountServiceTest in src/test/java*


    `package com.apress.prospringmvc.bookstore.service;`


    `// Other imports omitted, see Listing 9-7`


    `import static junit.framework.Assert.assertEquals;`


    `import org.mockito.Mockito;`

    `import org.springframework.context.annotation.Bean;`

    `import org.springframework.context.annotation.Configuration;`


    `import com.apress.prospringmvc.bookstore.domain.Account;`

    `import com.apress.prospringmvc.bookstore.domain.support.AccountBuilder;`

    `import com.apress.prospringmvc.bookstore.repository.AccountRepository;`


    `@RunWith(SpringJUnit4ClassRunner.class)`

    `@ContextConfiguration`

    `public class AccountServiceTest {`


    `    @Autowired`

    `    private AccountService accountService;`

    `    @Autowired`

    `    private AccountRepository accountRepository;`


    `    @Test(expected = AuthenticationException.class)`

    `    public void testLoginFailure() throws AuthenticationException {`

    `        accountService.login("john", "fail");`

    `    }`


    `    @Test()`

    `    public void testLoginSuccess() throws AuthenticationException {`

    `        Account account = accountService.login("john", "secret");`

    `        assertEquals("John", account.getFirstName());`

    `        assertEquals("Doe", account.getLastName());`

    `    }  `


    `    @Configuration`

    `    static class AccountServiceTestContextConfiguration {`


    `        @Bean`

    `        public AccountService accountService() {`

    `            return new AccountServiceImpl();`

    `        }`


    `        @Bean`

    `        public AccountRepository accountRepository() {`

    `return` **`Mockito.mock(AccountRepository.class);`**

    `        }`

    `    }`

    `}`


    Mockito^([12](#Chapter09.html#CHP-9-FN-12)) is a state of the art mock framework
    that we will be using. It is flexible and has a very intuitive API. Throughout
    this section we will make you more familiar how you can use Mockito for all your
    mocking needs. The line in bold is all that is needed to create a mock using Mockito.
    You pass along an interface or class, and Mockito will return a mock object which
    is not yet programmed.


    What further happens is that when adding the `ContextConfiguration` annotation,
    Spring will automatically scan for `@Configuration` classes within the scope of
    the class and find our `AccountServiceTestContextConfiguration`. Alternatively,
    you can also specify classes directly on the `ContextConfiguration` annotation
    using the `classes` attribute, or XML files with the `locations` attribute. In
    the `AccountServiceTestContextConfiguration` configuration class, we created two
    beans: the first one is the `AuthenticationService`, the second is the `AccountRepository`.
    For the second case we have used Mockito to create a mock. Spring will now auto-inject
    the `AccountRepository` into the `AuthenticationService` when creating the context
    (remember, Spring will be injecting our mocked version of the `AccountRepository`).


    At this point the test will not run, since we have not yet programmed our mock.
    When the `login` method of the `AuthenticationService` calls a method on our `AccountRepository`
    mock, it will return null values. So the next thing to do is program our mock
    as can be seen in [Listing 9-9](#Chapter09.html#list_9_9).


    ![Image](images/square.jpg) **Note** The `testLoginFailure` (being a so called
    “negative” test) uses a JUnit feature to verify that indeed an exception is thrown:
    `@Test(expected = AuthenticationException.class`). In this case we require that
    the `AuthenticationException` is actually thrown. If it isn’t, the test fails.


    ***Listing 9-9.** Programming the mock*


    `@Before`

    `public void setup() {`

    `    Account account = new AccountBuilder() {`

    `        {`

    `            address("Herve", "4650", "Rue de la gare", "1", null,`![Image](images/U002.jpg)
    `"Belgium");`

    `            credentials("john", "secret");`

    `            name("John", "Doe");`

    `        }`

    `    }.build(true);`


    `    Mockito.when(accountRepository.findByUsername("john"))`

    `           .thenReturn(account);`

    `}`


    We first created the data that our mock will have to return. In our case it is
    an instance of an `Account`. The last line of code of [Listing 9-9](#Chapter09.html#list_9_9)
    programs the mock. Whenever the mock receives a call on method `findByUsername`
    with the parameter `"john"`, it will return the account. If it receives calls
    with other parameters (or other methods that aren’t programmed), null is returned.
    This logic is put in an `@Before` method since we will reset our mock after every
    test method invocation. The mock will be reprogrammed before a new test execution
    starts.


    _________


    ^(12) [`http://code.google.com/p/mockito/`](http://code.google.com/p/mockito/)


    Finally, in [Listing 9-10](#Chapter09.html#list_9_10), we have the `@After` method,
    which will verify the mock’s state. It will check that the method we programmed
    the mock with was indeed called. Here we will strictly check that the method was
    called once (exactly once). After that we reset to mock so it forgets about its
    programmed data and verification state. It can then be reprogrammed (which will
    happen in the `@Before` method before the next method is executed).


    ***Listing 9-10.** Verifying the mock’s state and resetting it*


    `@After`

    `public void verify() {`

    `    Mockito.verify(accountRepository,`

    `                   VerificationModeFactory.times(1))`![Image](images/U002.jpg)

    `                   .findByUsername(Mockito.anyString());`


    `    // This is allowed here: using container injected mocks  `

    `    Mockito.reset(accountRepository);`

    `}`'
  trans: '

    #### 测试 AccountService


    我们的 `com.apress.prospringmvc.bookstore.service.AccountService` 有两个方法：`save` 方法，用于将新的
    `com.apress.prospringmvc.bookstore.domain.Account` 保存到数据库；以及 `login` 方法，该方法接收用户名和密码作为参数并验证凭据。如果凭据正确，则返回属于该用户的
    `Account`。它通过从数据库中加载用户名匹配的 `Account` 来实现这一点。之后，它会尝试验证密码。密码是经过 SHA-256 哈希处理的。因此，该服务首先根据密码参数创建一个哈希值，然后将其与从数据库中检索到的值（我们只存储密码的哈希值）进行比较。


    我们将编写一个单元测试来测试 `login` 方法。为此，我们将为 `com.apress.prospringmvc.bookstore.repository.AccountRepository`（这是用于根据用户名从数据库加载
    `Account` 的仓库）创建一个模拟对象。我们将创建一个测试方法来测试成功登录，并创建另一个执行负面测试的方法，在该方法中我们故意提供错误的凭据，这应该会导致产生异常。让我们看看
    清单 9-8 中测试的第一个版本。


    ***清单 9-8.** 在 src/test/java 中设置 AccountServiceTest*


    `package com.apress.prospringmvc.bookstore.service;`


    `// 其他导入已省略，参见清单 9-7`


    `import static junit.framework.Assert.assertEquals;`


    `import org.mockito.Mockito;`

    `import org.springframework.context.annotation.Bean;`

    `import org.springframework.context.annotation.Configuration;`


    `import com.apress.prospringmvc.bookstore.domain.Account;`

    `import com.apress.prospringmvc.bookstore.domain.support.AccountBuilder;`

    `import com.apress.prospringmvc.bookstore.repository.AccountRepository;`


    `@RunWith(SpringJUnit4ClassRunner.class)`

    `@ContextConfiguration`

    `public class AccountServiceTest {`


    `    @Autowired`

    `    private AccountService accountService;`

    `    @Autowired`

    `    private AccountRepository accountRepository;`


    `    @Test(expected = AuthenticationException.class)`

    `    public void testLoginFailure() throws AuthenticationException {`

    `        accountService.login("john", "fail");`

    `    }`


    `    @Test()`

    `    public void testLoginSuccess() throws AuthenticationException {`

    `        Account account = accountService.login("john", "secret");`

    `        assertEquals("John", account.getFirstName());`

    `        assertEquals("Doe", account.getLastName());`

    `    }  `


    `    @Configuration`

    `    static class AccountServiceTestContextConfiguration {`


    `        @Bean`

    `        public AccountService accountService() {`

    `            return new AccountServiceImpl();`

    `        }`


    `        @Bean`

    `        public AccountRepository accountRepository() {`

    `return` **`Mockito.mock(AccountRepository.class);`**

    `        }`

    `    }`

    `}`


    Mockito^(12) 是一个我们将使用的先进的模拟框架。它很灵活，并且拥有非常直观的 API。在本节中，我们将让您更熟悉如何使用 Mockito 来满足您的所有模拟需求。加粗的那一行代码就是使用
    Mockito 创建模拟对象所需的全部内容。您传入一个接口或类，Mockito 将返回一个尚未编程的模拟对象。


    进一步发生的是，当添加 `@ContextConfiguration` 注解时，Spring 会自动扫描该类范围内的 `@Configuration` 类，并找到我们的
    `AccountServiceTestContextConfiguration`。或者，您也可以直接在 `@ContextConfiguration` 注解上使用
    `classes` 属性指定类，或使用 `locations` 属性指定 XML 文件。在 `AccountServiceTestContextConfiguration`
    配置类中，我们创建了两个 Bean：第一个是 `AuthenticationService`，第二个是 `AccountRepository`。对于第二个
    Bean，我们使用了 Mockito 来创建一个模拟对象。Spring 现在会在创建上下文时自动将 `AccountRepository` 注入到 `AuthenticationService`
    中（请记住，Spring 将注入我们模拟版本的 `AccountRepository`）。


    此时测试将无法运行，因为我们还没有对模拟对象进行编程。当 `AuthenticationService` 的 `login` 方法调用我们的 `AccountRepository`
    模拟对象上的方法时，它将返回 null 值。因此，下一步就是对我们模拟对象进行编程，如 清单 9-9 所示。


    ![Image](img/square.jpg) **注意** `testLoginFailure`（所谓的“负面”测试）使用 JUnit 特性来验证确实抛出了异常：`@Test(expected
    = AuthenticationException.class)`。在这种情况下，我们要求实际抛出 `AuthenticationException`。如果没有抛出，则测试失败。


    ***清单 9-9.** 对模拟对象进行编程*


    `@Before`

    `public void setup() {`

    `    Account account = new AccountBuilder() {`

    `        {`

    `            address("Herve", "4650", "Rue de la gare", "1", null,`![Image](img/U002.jpg)
    `"Belgium");`

    `            credentials("john", "secret");`

    `            name("John", "Doe");`

    `        }`

    `    }.build(true);`


    `    Mockito.when(accountRepository.findByUsername("john"))`

    `           .thenReturn(account);`

    `}`


    我们首先创建了模拟对象需要返回的数据。在我们的例子中，它是一个 `Account` 实例。清单 9-9 的最后一行代码对模拟对象进行了编程。每当模拟对象接收到对
    `findByUsername` 方法且参数为 `"john"` 的调用时，它将返回该 account。如果它接收到其他参数的调用（或未编程的其他方法），则返回
    null。此逻辑被放在一个 `@Before` 方法中，因为我们将在每次测试方法调用后重置模拟对象。在新的测试执行开始之前，模拟对象将被重新编程。


    _________


    ¹² [`http://code.google.com/p/mockito/`](http://code.google.com/p/mockito/)


