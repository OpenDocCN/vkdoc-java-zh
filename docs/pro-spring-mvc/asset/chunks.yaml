    ### 本章小结


    本章我们介绍了 MVC 模式，包括其起源以及它解决了哪些问题。我们还简要讨论了 MVC 模式的三个组成部分：模型、视图和控制器。接着，我们谈到了 Model
    2 MVC 模式，以及使用前端控制器如何使其区别于 Model 1 MVC 模式。在 Spring MVC 中，这个前端控制器就是`org.springframework.web.servlet.DispatcherServlet`。


    随后，我们简要概述了通用的 Web 应用程序架构。我们指出了 Web 应用程序中通常存在的五个不同层次：领域层、用户界面层、Web 层、服务层和数据访问层。所有这些层次在我们的应用程序中都扮演着重要角色，我们既讨论了这些角色是什么，也讨论了它们如何协同工作。我们还介绍了
    Spring 如何在应用程序的不同层次中为我们提供帮助。


    本章的主要收获在于，MVC 模式中的不同层次和组件可以帮助我们分离不同的关注点。每个层次都应该有单一的职责，无论是处理业务逻辑，还是作为 HTTP 世界与服务层之间的粘合剂。关注点分离有助于我们实现清晰的架构并创建可维护的代码。最后，清晰的层次划分使得测试我们的应用程序变得更加容易。


    在下一章中，我们将深入探讨 Spring MVC。具体来说，我们将探索`DispatcherServlet`这个 Servlet，包括它的工作原理以及如何配置它。我们还将更仔细地研究本章中描述的不同组件在
    Spring MVC 应用程序中是如何工作的。


    ## 第 4 章


    ## Spring MVC 架构


    在本章中，你将深入 Spring MVC 的内部机制，仔细研究`org.springframework.web.servlet.DispatcherServlet`。你将首先了解该
    Servlet 如何处理传入的请求，以及如何识别在请求处理过程中起作用的组件。在识别出这些组件之后，你将更深入地了解这些组件的角色和功能，以及这些组件的不同实现。你还将学习如何配置`org.springframework.web.servlet.DispatcherServlet`，部分内容将通过检查默认配置来实现。


    ### DispatcherServlet 请求处理工作流


    在上一章中，你了解了前端控制器在 Model 2 MVC 模式中扮演的重要角色。前端控制器负责将传入的请求分派给正确的处理器，并准备响应，以便将其渲染为用户希望看到的内容。在
    Spring MVC 中，前端控制器的角色由`org.springframework.web.servlet.DispatcherServlet`扮演。该
    Servlet 使用多个组件来履行其职责。所有这些组件都以接口的形式表示，并且每个接口都有一个或多个可用的实现。下一节将探讨这些组件在请求处理工作流中的一般角色。后续章节将介绍这些接口的不同实现。


    ![图片](img/square.jpg) **注意** 我们特意使用了术语*处理器*。`DispatcherServlet`非常灵活且可定制，它能够处理的处理器类型不仅限于`org.springframework.web.servlet.mvc.Controller`的实现或带有`org.springframework.stereotype.Controller`注解的类。


    #### 工作流


    请求处理工作流的高级概览如图 4-1 所示。


    ![图片](img/9781430241553_Fig04-01.jpg)


    ***图 4-1.** 请求处理工作流*


    在前面的章节中，你了解了关注点分离的重要性。在 Spring 框架中，同样的规则也得到了应用。许多支持组件在设计时都考虑到了可扩展性和关注点分离，并以接口的形式呈现。尽管图
    4-1 中的高级概览是正确的，但幕后还有更多事情发生。图 4-2 展示了请求处理工作流更完整的视图。


    ![图片](img/9781430241553_Fig04-02.jpg)


    ***图 4-2.** 请求处理工作流*


    图 4-2 提供了`DispatcherServlet`内部请求处理工作流的全局概览。以下各节将放大介绍此流程中的不同步骤。


    ##### 准备请求


    在`DispatcherServlet`开始分派和处理请求之前，它首先会对请求进行一些准备和预处理工作。该 Servlet 首先使用`org.springframework.web.servlet.LocaleResolver`确定并暴露当前请求的`java.util.Locale`。接着，它在`org.springframework.web.context.request.RequestContextHolder`中准备并暴露当前请求。这使得框架代码可以轻松访问当前请求，而无需将其四处传递。


    接下来，该 Servlet 将构建一个所谓的`org.springframework.web.servlet.FlashMap`。它通过调用`org.springframework.web.servlet.FlashMapManager`来实现，后者将尝试解析输入的`FlashMap`。此映射包含显式存储在上一个请求中的属性。通常，这在重定向到下一页时使用。此主题将在第
    5 章中深入讨论。


    接着，会检查传入的请求是否为 multipart HTTP 请求（这在执行文件上传时使用）。如果是，则通过将其传递给`org.springframework.web.multipart.MultipartResolver`，将请求包装在`org.springframework.web.multipart.MultipartHttpServletRequest`中。在此之后，请求就准备好被分派到正确的处理器了。图
    4-3 展示了请求处理工作流第一部分的流程图。


    ![图片](img/9781430241553_Fig04-03.jpg)


    ***图 4-3.** 请求处理流程的开始*


    ##### 确定 HandlerExecutionChain


    分派请求涉及多个组件（见图 4-4）。当请求准备好进行分派时，`DispatcherServlet`将咨询一个或多个`org.springframework.web.servlet.HandlerMapping`实现，以确定哪个处理器可以处理该请求。如果未找到处理器，则会向客户端发送
    HTTP 404 响应。`HandlerMapping`返回一个`org.springframework.web.servlet.HandlerExecutionChain`（你将在下一节中了解更多信息）。当处理器确定后，该
    Servlet 将尝试找到一个`org.springframework.web.servlet.HandlerAdapter`来实际执行找到的处理器。如果找不到合适的`HandlerAdapter`，则会抛出`javax.servlet.ServletException`。


    ![图片](img/9781430241553_Fig04-04.jpg)


    ***图 4-4.** 分派请求*

