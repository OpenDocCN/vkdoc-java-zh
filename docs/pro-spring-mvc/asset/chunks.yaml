  raw: '#### When to Avoid Web Flow


    As with everything, there are pros and cons when using Web Flow. We''ve already
    introduced you to some of the pros that Web Flow will deliver for your application.
    Now let''s look at situations where it might be inappropriate to use Web Flow.


    Fortunately, we can think of only three reasons to avoid using Web Flow. First,
    you''ll (obviously) want to avoid using Web Flow when your web application framework
    has no support for it. We would suggest finding different solutions in that case.
    But since we are using Spring MVC, this is not an issue for us. (By the way, Web
    Flow also supports JSF and portlets, or JSR-168^([3](#Chapter10.html#CHP-10-FN-3))
    environments.)


    Second, Spring MVC already has some (primitive) support for building wizards (sequential
    views that share state), so one could say that the Spring MVC infrastructure can
    be used for simple, interdependent pages. On the other hand, introducing Web Flow
    is pretty easy (as we will see). Web Flow will add a great deal of functionality
    and other possibilities that won''t bother you if you don''t need them, but are
    there when you do. Web Flow is, like almost all Spring technology, non-intrusive.


    Third, Web Flow is not very useful for places in your application where there
    are no flows. If everything is contained in a single page, then Web Flow will
    only cause overhead. This page could still be backed by normal Spring MVC controllers
    and remain Web Flow-unaware.


    So, outside of these situations and the fact that it is yet another framework/concept
    to learn, we see little or no disadvantages to introducing Web Flow to your application.
    If you don''t need it for some specific, very easy use cases and can get along
    with Spring MVC controllers, then do so. Our Web Flow setup will still allow you
    to use Spring MVC and Web Flow next to each other in the same application, allowing
    you to pick the right option for each situation.


    ![Image](images/square.jpg) **Note** The basic Spring MVC flow functionality we
    talked about is supported via a specific Spring MVC controller: `org.springframework.web.servlet.mvc.AbstractWizardFormController`.
    This class is now deprecated, and you should use the standard `@Controller` annotation
    instead. You can build a flow in combination with `@SessionAttributes` and `org.springframework.web.bind.support.SessionStatus`
    to end the flow when processing is over. While this is still a valid alternative,
    it is a bit cumbersome. Be aware that this way of working is very limited and
    in no way resembles the extra power that Web Flow gives you. Our advice is to
    use this approach only as a small helper in case you need to build very discrete
    and small bits of flow logic for a very small part of your application. For all
    other needs, save yourself the trouble and consider using Web Flow.


    ### The Basic Ingredients of a Flow


    In this section, we will look at the basic building blocks required for building
    a so-called flow. We will start off with a simple flow example, and then explain
    the different elements that this flow consists of. We will not go into detail
    about all the possible options of each element, but simply stick to the basics.
    In the next chapter, we will revise certain elements laid out here (as well as
    cover some new ones) and go more into more detail about how to use those elements.
    Therefore, don''t panic if certain functionality is not described here—we will
    get there.


    ____________


    ³ [`http://jcp.org/aboutJava/communityprocess/final/jsr168/index.html`](http://jcp.org/aboutJava/communityprocess/final/jsr168/index.html)


    #### Flow


    A flow is the main component that you will be interacting with. It is an XML document
    written by you and interpreted by Web Flow. A flow defines the possible steps
    in your application and defines the following things for each step:


    *   Which view should be rendered and the interaction between views

    *   Which actions are possible and whether to delegate execution to application
    controllers or execute expressions directly in your flow


    Each flow definition is an XML document and should therefore comply with XML syntax
    standards. You start with the XML declaration, followed by the flow root element
    (see [Listing 10-1](#Chapter10.html#list_10_1)).


    ***Listing 10-1.** A Flow Root Element Declaration*


    `<flow xmlns=http://www.springframework.org/schema/webflow`


    `      xsi:schemaLocation="`

    `        http://www.springframework.org/schema/webflow`

    `        http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd">`


    There is an XML Schema for a flow definition that will tell you which elements/attributes
    are allowed at which location. This schema will also give you a short summary
    that covers what each (basic) element/attribute is good for.


    In [Figure 10-6](#Chapter10.html#fig_10_6), we can see the visualization of the
    flow definition XML schema.^([4](#Chapter10.html#CHP-10-FN-4)) This schema allows
    us to give an overview of the elements and attributes a flow definition can consist
    of.


    ![Image](images/square.jpg) **Note** Depending on how familiar you are with XML
    schemas, you might know that the schema visualization only resembles the top-level
    elements of a flow. Most of the elements have their own attributes, but these
    attributes are not listed here (you can see them when you drill down in the schema).
    When we discuss the elements in this or the next chapter, we will list and explain
    the attributes of these elements. Also, some of the elements can contain nested
    elements, but these nested elements cannot exist as top-level elements (and are
    therefore not listed here). For example, the `<set>` element can be nested in
    an `<on-start>` element, but it cannot be used as top-level element. As we discuss
    a given element, we will also cover the different possibilities enabled by that
    element.


    ____________


    ⁴[`http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd`](http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd)


    ![Image](images/9781430241553_Fig10-06.jpg)


    ***Figure 10-6.** The flow definition XML schema visualisation*


    In [Figure 10-6](#Chapter10.html#fig_10_6), the flow on the right is the top element.
    Each flow definition should start with the `<flow>` element. The top-level section
    (beginning with `start-state`) contains the three attributes that can be used
    inside the flow root element.


    In the lower section (starting with `attribute`), you can see the elements that
    can be used inside the flow definition. Their order is important, and you should
    follow the order listed here. For example, you cannot place a `<var>` element
    after an `<on-start>` element.


    ![Image](images/square.jpg) **Note** Only the five states are non-positional in
    the flow definition. This is because they are connected via the special choice
    structure. All other elements are positional and should appear in the order shown
    in [Figure 10-6](#Chapter10.html#fig_10_6).


    The middle column (e.g., `[0..*]`) displays the multiplicity of the element. It
    indicates how many times the element can exist in a single flow definition. The
    number on the left is the minimum, the number (or asterisk for unlimited) is the
    maximum. For example, `[0..*]` indicates that the element is optional and can
    appear an unlimited amount of times. Now look at the `<var>` element. Its multiplicity
    (`[0..1]`) means that the element is optional, but that it can only appear once
    for a given flow definition (e.g., the `<on-start>` element).'
  trans: '

    #### 何时应避免使用 Web Flow


    与所有技术一样，使用 Web Flow 也有其利弊。我们已经向你介绍了 Web Flow 能为应用程序带来的一些优势。现在，让我们看看在哪些情况下可能不适合使用
    Web Flow。


    幸运的是，我们认为只有三个理由需要避免使用 Web Flow。首先，（显然）当你的 Web 应用程序框架不支持 Web Flow 时，应避免使用它。在这种情况下，我们建议寻找其他解决方案。但由于我们使用的是
    Spring MVC，这不成问题。（顺便提一下，Web Flow 也支持 JSF 和 portlet，即 JSR-168^(3) 环境。）


    其次，Spring MVC 已经提供了一些（基本的）对构建向导（即共享状态的顺序视图）的支持，因此可以说 Spring MVC 基础设施可用于处理简单的、相互依赖的页面。另一方面，引入
    Web Flow 相当容易（我们将会看到）。Web Flow 会添加大量功能和其他可能性，这些功能在你不需要时不会造成困扰，但在你需要时随时可用。与几乎所有
    Spring 技术一样，Web Flow 是非侵入式的。


    第三，在应用程序中没有流程的地方，Web Flow 作用不大。如果所有内容都包含在单个页面中，那么 Web Flow 只会带来额外开销。这个页面仍然可以由普通的
    Spring MVC 控制器支持，并且无需感知 Web Flow。


    因此，除了这些情况以及它需要学习另一个框架/概念这一事实外，我们认为在应用程序中引入 Web Flow 几乎没有缺点。如果你在某些特定且非常简单的用例中不需要它，并且可以使用
    Spring MVC 控制器，那就这样做。我们的 Web Flow 设置仍然允许你在同一个应用程序中同时使用 Spring MVC 和 Web Flow，从而让你能够针对每种情况选择最合适的方案。


    ![Image](img/square.jpg) **注意** 我们讨论的基本 Spring MVC 流程功能是通过一个特定的 Spring MVC 控制器支持的：`org.springframework.web.servlet.mvc.AbstractWizardFormController`。这个类现已弃用，你应该改用标准的
    `@Controller` 注解。你可以结合 `@SessionAttributes` 和 `org.springframework.web.bind.support.SessionStatus`
    来构建一个流程，并在处理结束时结束该流程。虽然这仍然是一个有效的替代方案，但有些繁琐。请注意，这种工作方式非常有限，远不及 Web Flow 提供的额外能力。我们的建议是，仅在你需要为应用程序的极小部分构建非常离散且小块的流程逻辑时，才将此方法作为一个小帮手使用。对于所有其他需求，请省去麻烦，考虑使用
    Web Flow。


    ### 流程的基本要素


    在本节中，我们将探讨构建所谓流程所需的基本构建块。我们将从一个简单的流程示例开始，然后解释该流程包含的不同元素。我们不会深入探讨每个元素的所有可能选项，而是只关注基础知识。在下一章中，我们将修订此处介绍的某些元素（并涵盖一些新元素），并更详细地介绍如何使用这些元素。因此，如果某些功能未在此处描述，请不要惊慌——我们会在后面讲到。


    ____________


    ³ [`http://jcp.org/aboutJava/communityprocess/final/jsr168/index.html`](http://jcp.org/aboutJava/communityprocess/final/jsr168/index.html)


    #### 流程


    流程是你将与之交互的主要组件。它是一个由你编写并由 Web Flow 解释的 XML 文档。流程定义了应用程序中可能的步骤，并为每个步骤定义了以下内容：


    *   应渲染哪个视图以及视图之间的交互

    *   哪些操作是可行的，以及是将执行委托给应用程序控制器，还是直接在流程中执行表达式


    每个流程定义都是一个 XML 文档，因此应符合 XML 语法标准。你需要从 XML 声明开始，然后是流程根元素（见清单 10-1）。


    ***清单 10-1.** 流程根元素声明*


    `<flow xmlns=http://www.springframework.org/schema/webflow`


    `      xsi:schemaLocation="`

    `        http://www.springframework.org/schema/webflow`

    `        http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd">`


    流程定义有一个 XML Schema，它会告诉你哪些元素/属性允许在哪个位置出现。该 Schema 还会提供一个简短摘要，说明每个（基本）元素/属性的用途。


    在图 10-6 中，我们可以看到流程定义 XML Schema 的可视化表示。^(4) 该 Schema 让我们能够概览流程定义可以包含的元素和属性。


    ![Image](img/square.jpg) **注意** 根据你对 XML Schema 的熟悉程度，你可能知道 Schema 可视化仅展示了流程的顶级元素。大多数元素都有自己的属性，但这些属性并未在此列出（你可以在深入查看
    Schema 时看到它们）。当我们在本章或下一章讨论这些元素时，我们会列出并解释这些元素的属性。此外，某些元素可以包含嵌套元素，但这些嵌套元素不能作为顶级元素存在（因此未在此列出）。例如，`<set>`
    元素可以嵌套在 `<on-start>` 元素中，但不能用作顶级元素。在讨论某个元素时，我们也会介绍该元素所支持的不同可能性。


    ____________


    ⁴[`http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd`](http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd)


    ![Image](img/9781430241553_Fig10-06.jpg)


    ***图 10-6.** 流程定义 XML Schema 可视化*


    在图 10-6 中，右侧的 flow 是顶级元素。每个流程定义都应以 `<flow>` 元素开头。顶部区域（以 `start-state` 开头）包含可在流程根元素内使用的三个属性。


    在底部区域（以 `attribute` 开头），你可以看到可在流程定义内部使用的元素。它们的顺序很重要，你应该遵循此处列出的顺序。例如，你不能在 `<on-start>`
    元素之后放置 `<var>` 元素。


    ![Image](img/square.jpg) **注意** 只有五种状态在流程定义中是不区分位置的。这是因为它们通过特殊的选择结构连接在一起。所有其他元素都是区分位置的，并且应按照图
    10-6 所示的顺序出现。


    中间列（例如 `[0..*]`）显示了元素的多重性。它表示该元素在单个流程定义中可以出现的次数。左边的数字是最小值，右边的数字（或表示无限的星号）是最大值。例如，`[0..*]`
    表示该元素是可选的，并且可以出现无限次。现在看看 `<var>` 元素。它的多重性（`[0..1]`）意味着该元素是可选的，但对于给定的流程定义，它只能出现一次（例如
    `<on-start>` 元素）。

    '
- fmt: "不同状态（以`<action-state>`开始，以`<end-state>`结束）通过一个选择（choice）连接。通常，在一个选择中，你只能拥有所列元素中的一个。例如，通常你只能有一个`<view-state>`或一个`<action-state>`，但不能同时拥有两者。然而，如果你仔细观察选择图标，你会看到选择符号具有多重性（`0..*`）。这意味着状态是可选的；但同时，它也表明选择中的每个元素都可以出现无限次。因此，对于你可以定义多少个状态没有限制。此外，由于选择的存在，状态是非位置性的（这可能是引入选择作为此结构的主要原因）。例如，你可以有一个`<view-state>`（出现一次或多次）后跟一个`<action-state>`（出现一次或多次）——或者反过来。两种方式都是有效的。\n\
    \n如果你回顾[清单 10-1](#Chapter10.html#list_10_1)，你会看到我们将 Web Flow 本身声明为默认命名空间。这意味着我们不必为每个元素使用前缀。每个元素或属性都会自动根据与默认命名空间关联的模式进行验证。最后，我们还指定了模式位置。IDE\
    \ 使用模式位置来加载模式、验证 XML 并提供命令行补全。请注意，我们使用的是 Web Flow 2.0 的模式。\n\n在 Web Flow 的后续内容中，我们将在代码清单中省略流根元素及其命名空间声明。这可以使内容保持紧凑且更易读。只有当这些信息相关时，我们才会展示，例如当我们介绍属于流根元素的属性时。请注意，即使在给定的清单中没有显示流根元素及其命名空间声明，它们仍然位于每个流的开头，并且是强制性的。\n\
    \n现在，请查看[清单 10-2](#Chapter10.html#list_10_2)中的流定义。\n\n***清单 10-2.** 一个流示例*\n\n\
    ```\n<flow\n      xsi:schemaLocation=\"\n        http://www.springframework.org/schema/webflow\n\
    \        http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd\"\
    >\n\n    <on-start>\n<evaluate\n            expression=\"orderController.initializeForm()\"\
    \n            result=\"flowScope.orderForm\"/>\n<evaluate\n            expression=\"\
    orderController.initializeSelectableCategories()\"\n            result=\"flowScope.selectableCategories\"\
    />\n    </on-start>\n\n    <view-state id=\"selectCategory\" view=\"selectCategory\"\
    \ model=\"orderForm\">\n        <transition on=\"next\" to=\"selectBooks\" >\n\
    <evaluate\n   expression=\"orderController.initializeSelectableBooks(flowScope.orderForm)\"\
    \n   result=\"flowScope.selectableBooks\" />\n        </transition>\n\n      \
    \  <transition on=\"cancel\" to=\"end\" />\n    </view-state>\n\n    ...\n\n \
    \   <end-state id=\"end\" view=\"redirect:/index.htm\"/>\n</flow>\n```\n\n在这个例子中，我们创建了一个简单的流定义。它不是一个完整的定义（因此末尾有省略号`...`）；然而，我们想让你温和地了解流定义的样子。\n\
    \n我们还想指出，在使用 STS 时，你的 IDE 中拥有 Web Flow 支持。你还可以以图形方式显示流 XML。一旦你双击流 XML 文件，内容面板将打开，通常会显示\
    \ XML 视图。在此面板的底部，你会注意到一些标签页。在 Source 标签页旁边，你还应该找到 `flow` 和 `flow-graph` 标签页。`flow`\
    \ 标签页以列表形式提供流中元素的概览（参见[图 10-7](#Chapter10.html#fig_10_7)）。\n\n![Image](images/9781430241553_Fig10-07.jpg)\n\
    \n***图 10-7.** flow 标签页，提供流组件的概览*\n\n`flow-graph` 标签页以图形方式显示元素以及它们之间的不同关系（参见[图\
    \ 10-8](#Chapter10.html#fig_10_8)）。你也可以使用左侧的调色板添加新元素并组合它们。\n\n![Image](images/9781430241553_Fig10-08.jpg)\n\
    \n***图 10-8.** flow-graph 标签页，提供流的图形化概览*\n\n此调色板中的所有信息都直接反映在源代码中，反之亦然。如果你从调色板添加一个组件，相应的\
    \ XML 将被添加到源代码中。如果你直接在 XML 中添加一个元素并返回到 `flow-graph`（或 graph），新元素也会出现在那里。\n\n目前，理解以下内容就足够了：当此流启动时，它最终将进入`selectCategory`视图状态。此视图状态将渲染`selectCategory`视图（该视图将由\
    \ Tiles^([5](#Chapter10.html#CHP-10-FN-5)) 配置解析）并使用在`orderForm`键下可用的表单。\n\n我们使用一个\
    \ `on-start` 动作来实例化模型，并在进入视图状态之前将其分配给流作用域。我们将在后续章节中讨论 `evaluate` 和 `on-start`\
    \ 动作。目前，只需知道 `on-start` 动作在 Web Flow 进入其第一个状态之前执行，并且它将在`com.apress.prospringmvc.bookstore.web.controller.OrderController`上执行`initializeForm`方法。这将创建一个已初始化的模型并返回它。然后该模型将被放入流作用域。然后可以在视图中的`<spring:form\
    \ modelAttribute=\"orderForm\"…/>`标签中使用该模型名称。这将在提交期间将表单中的字段绑定到指定的表单。Web Flow 将负责参数绑定，以及转换和表单验证（我们将在后面看到）。请注意，`modelAttribute`必须已经存在于\
    \ Web Flow 的某个作用域中。\n\n____________\n\n⁵我们在[第 8 章](#Chapter08.html#ch8)中向你介绍了\
    \ Tiles，因此我们假设你已经对这个模板框架有了基本的了解。如果你跳过了前面的内容直接阅读本章关于 Web Flow 的内容，但不知道 Tiles 是如何工作的，那么我们建议你在继续阅读本章其余部分之前，先阅读\
    \ Tiles 的介绍。\n\n![Image](images/square.jpg) **注意** `OrderController` 只是一个在应用程序上下文中定义的\
    \ Spring bean。在我们的例子中，通过使用注解；应用`@Controller`注解，这样做该类将被类路径扫描发现并成为一个 Spring bean。\n\
    \n同样值得注意的是可以在视图状态内触发的可能转换。当视图被渲染时，可以执行 `next` 或 `cancel` 转换。`next` 转换将在控制器上执行一个方法，然后转发到下一个状态（这可以是视图状态或\
    \ Web Flow 支持的任何其他状态，我们将在后面看到）。`cancel` 转换将导航到结束状态。我们将在下一章详细讨论结束状态；目前，知道转换到结束状态会终止流就足够了。\n\
    \n流定义根元素（`flow`）允许你指定一些额外的属性，这些属性是可选的。对于一个简单的流，跳过指定它们是完全可以的；然而，一旦你有了更复杂的流布局或想要更多自定义，这些属性可能会派上用场（参见[表\
    \ 10-3](#Chapter10.html#tab_10_3)）。此根元素允许你覆盖默认的起始状态、从另一个现有流继承，以及将你的流标记为抽象。我们将在[第\
    \ 12 章](#Chapter12.html#ch12)的“应用继承”部分详细讨论后两种情况。\n\n![Image](images/9781430241553_tab10-03.jpg)"
  raw: 'The different states (starting with `<action-state>` and ending with `<end-state>`)
    are connected by a choice. Typically, you can only have one element of the listed
    elements present within a choice. For example, typically you could only have one
    `<view-state>` or one `<action-state>`, but not both. However, if you look carefully
    at the choice icon, you will see the choice symbol has a multiplicity of (`0..*`).
    This means that a state is optional; however, it also indicates that every element
    of the choice can appear an unlimited number of times. Thus, there is no restriction
    on how many states you can define. Furthermore, because of the choice, the states
    are non-positional (probably the main reason for introducing this as a choice).
    For example, you can have a `<view-state>` (one or more times) followed by an
    `<action-state>` (one or more times)—or the other way around. Both approaches
    are valid.


    If you look back at [Listing 10-1](#Chapter10.html#list_10_1), you will see that
    we declared Web Flow itself as the default namespace. This means we don''t have
    to use prefixes for each element. Each element or attribute is automatically validated
    against the schema coupled to the default namespace. Finally, we also specify
    the schema location. The schema location is used by IDEs to load the schema and
    validate the XML and to give command-line completion. Notice that we are using
    the schema for Web Flow 2.0.


    For the remainder of the Web Flow coverage, we will omit the flow root element
    and its namespace declarations in the code listings. This keeps everything compact
    and more readable. We will only show this information if there is any relevance
    to it, such as when we cover attributes that belong to the flow root element.
    Be aware that, even when the flow root element and its namespace declarations
    are not shown in a given listing, they are still at the beginning of every flow
    and are mandatory.


    Now take a look at the flow definition in [Listing 10-2](#Chapter10.html#list_10_2).


    ***Listing 10-2.** An Example of a Flow*


    `<flow`


    `      xsi:schemaLocation="`

    `        http://www.springframework.org/schema/webflow`

    `        http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd">`


    `    <on-start>`

    `<evaluate` ![Image](images/U002.jpg)

    `            expression="orderController.initializeForm()"`![Image](images/U002.jpg)

    `            result="flowScope.orderForm"/>`

    `<evaluate` ![Image](images/U002.jpg)

    `            expression="orderController.initializeSelectableCategories()"`![Image](images/U002.jpg)

    `            result="flowScope.selectableCategories"/>`

    `    </on-start>`


    `    <view-state id="selectCategory" view="selectCategory" model="orderForm">`

    `        <transition on="next" to="selectBooks" >`

    `<evaluate` ![Image](images/U002.jpg)

    `   expression="orderController.initializeSelectableBooks(flowScope.orderForm)"`![Image](images/U002.jpg)

    `   result="flowScope.selectableBooks" />`

    `        </transition>`


    `        <transition on="cancel" to="end" />`

    `    </view-state>`


    `    ...`


    `    <end-state id="end" view="redirect:/index.htm"/>`

    `</flow>`


    In this example, we created a simple flow definition. It is not a complete definition
    (hence the ellipsis (...) at the end); however, we want to give you a gentle introduction
    to what a flow definition looks like.


    We would also like to point out that, when using STS, you have Web Flow support
    in your IDE. You can also display the flow XML graphically. Once you double-click
    the flow XML file, the content panel will open, typically showing the XML view.
    At the bottom of this panel, you will notice tabs. Next to the Source tab, you
    should also find flow and flow-graph tabs. The flow tab gives a list-based overview
    of the elements in your flow (see [Figure 10-7](#Chapter10.html#fig_10_7)).


    ![Image](images/9781430241553_Fig10-07.jpg)


    ***Figure 10-7.** The flow tab, which provides an overview of the flow components*


    The flow-graph tab graphically shows the elements and the different relations
    between them (see [Figure 10-8](#Chapter10.html#fig_10_8)). You can also use the
    palette on the left to add new elements and combine them.


    ![Image](images/9781430241553_Fig10-08.jpg)


    ***Figure 10-8.** The flow-graph tab, which gives a graphical overview of the
    flow*


    All of the information in this palette is directly reflected in the source, and
    vice versa. If you add a component from the palette, the corresponding XML will
    be added to the source. If you add an element directly in the XML and go back
    to the flow-graph (or graph), the new element will also appear there.


    For now, it''s enough to understand that, when this flow is started, it will eventually
    enter the `selectCategory` view state. This view state will render the `selectCategory`
    view (which will be resolved by the Tiles^([5](#Chapter10.html#CHP-10-FN-5)) configuration)
    and use the form that is available under the `orderForm` key.


    We use an on start action to instantiate the model and assign it to flow scope
    before we enter the view state. We will discuss the evaluate and on start actions
    in the following sections. For now, it is enough to know that the on start action
    is executed before Web Flow enters its first state, and that it will execute the
    `initializeForm` method on the `com.apress.prospringmvc.bookstore.web.controller.OrderController`.
    This will create an initialized model and return it. The model will then be put
    on flow scope. The model name can then be used in a `<spring:form modelAttribute="orderForm"…/>
    tag in your view`. This will bind the fields in a form during submission to the
    specified form. Web Flow will take care of the parameter binding, as well as the
    conversion and form validation (as we will see later). Note that the `modelAttribute`
    must already be present on one of the Web Flow scopes.


    ____________


    ⁵We introduced you to Tiles in [Chapter 8](#Chapter08.html#ch8), so we will assume
    that you already have a basic understanding about this templating framework. If
    you have skipped ahead to read this chapter on Web Flow, but have no idea how
    Tiles works, then we suggest that you read the introduction to Tiles before proceeding
    with the rest of this chapter.


    ![Image](images/square.jpg) **Note** The `OrderController` is just a Spring bean
    defined in the application context. In our case by using annotations; applying
    the `@Controller` annotation, doing so the class will be picked up by classpath
    scanning and become a Spring bean.


    Also notable are the possible transitions that can be triggered within the view
    state. When the view is rendered, it is possible to execute a `next` or `cancel`
    transition. The `next` transition will execute a method on the controller, and
    then forward to the next state (this could be view state or any of the other states
    that Web Flow supports, as we will see later on). The `cancel` transition will
    navigate to the end state. We will cover the end state in detail in the next chapter;
    for now, it is sufficient to know that transitioning to the end state terminates
    the flow.


    The flow definition root element (flow) allows you to specify some extra attributes,
    which are optional. It is fine to skip specifying them for a simple flow; however,
    these attributes might come in handy once you get a more complex flow layout or
    you want more customization (see [Table 10-3](#Chapter10.html#tab_10_3)). This
    root element allows you to override the default start-state, inherit from another
    existing flow, and mark your flow as abstract. We will cover the latter two cases
    in detail in [Chapter 12](#Chapter12.html#ch12) in the “Applying Inheritance”
    section.


    ![Image](images/9781430241553_tab10-03.jpg)'
