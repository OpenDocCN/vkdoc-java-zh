    ##### Configuring Tiles


    For the `selectBooks` view, we simply used the configuration shown in [Listing
    12-20](#Chapter12.html#list_12_20).


    ***Listing 12-20** The current Tiles configuration for selectBooks.jsp*


    `<definition name="selectBooks" extends="fullTemplate">`

    `<put-attribute name="content"` ![Image](images/U002.jpg)

    `           value="/WEB-INF/view/createOrders/selectBooks.jsp"/>`

    `</definition>`


    This snippet tells Tiles that it should render the full template, replacing the
    content of the Tiles placeholder with the `selectBooks.jsp` view. What we want
    now is to extend this because `selectBooks` is also a template at this point.


    Let’s begin by creating a new template that identifies `selectBooks` as a template.
    This template will be included in the original selectBooks definition. To illustrate
    this, we will give it an *internal* name: `show.selected.books`. As you can see
    in [Listing 12-21](#Chapter12.html#list_12_21), this has the `selectBooks` view
    as a template, and instructs it to replace the `selectedBooks` Tiles placeholder
    with the newly created view, `/WEB-INF/view/createOrders/showSelectedBooks.jsp`.


    ***Listing 12-21** The new Tiles definition for the showSelectedBooks.jsp with
    selectBooks.jsp as a template*


    `<definition name="show.selected.books"`![Image](images/U002.jpg)

    `template="/WEB-INF/view/createOrders/selectBooks.jsp">`

    `    <put-attribute name="selectedBooks"`![Image](images/U002.jpg)

    `     value="/WEB-INF/view/createOrders/showSelectedBooks.jsp"/>`

    `</definition>`


    Finally, we need to link this template with the content attribute of the main
    template. This is actually the same as the original configuration we had; but
    instead of pointing to the actual view, we point to the definition we just created:
    `show.selected.books` (see [Listing 12-22](#Chapter12.html#list_12_22)).


    ***Listing 12-22.** The adapted selectBooks Tiles definition using the previously
    defined show.selected.books as content*


    `<definition name="selectBooks" extends="fullTemplate">`

    `    <put-attribute name="content" value="show.selected.books"/>`

    `</definition>`


    [Figure 12-3](#Chapter12.html#fig_12_3) shows our new layered design. Until now,
    we’ve had the main template (`fullTemplate`), which filled its content directly
    with a page (e.g., `WEB-INF/view/createOrders/selectBooks.jsp`). However, in that
    page, we’ve also included a Tiles placeholder. With the configuration we’ve just
    created, we can also make a second template that renders `selectBooks.jsp`, but
    replaces its content attribute with the `showSelectedBooks.jsp` page.


    ![Image](images/9781430241553_Fig12-03.jpg)


    ***Figure 12-3.** The selectBooks page as it will be finally rendered, including
    all compositions*


    Let’s summarize what we’ve done so far: these two Tiles definitions together form
    our new configuration. If The selectBooks view is rendered, the template `fullTemplate`
    will be used, and the tiles content placeholder will be replaced with show.select.books.
    The latter refers to another Tiles definition which in turn renders `/WEB-INF/view/createOrders/selectBooks.jsp`
    and replaces the Tiles `selectedBooks` placeholder with the `/WEB-INF/view/createOrders/showSelectedBooks.jsp`
    view.


    ![Image](images/square.jpg) **Note** The `show.selected.books` definition is part
    of a composition, and we will never render this directly because we will still
    need to include it in a definition that extends from the `fullTemplate` (in our
    case, the `selectBooks` definition). If we were to render `show.selected.books`
    directly, we would see the `selectBooks.jsp` page with the included `showSelectedBooks.jsp`;
    however, we would still be missing the header and footer because these have not
    yet been inserted into the main template. Since the top-level definition we are
    rendering is still called `selectBooks` (we just changed its internal composition),
    nothing must be changed in our controllers or flows, and the view name remains
    unaltered. By the way, there is also a shorter notation for defining this composition
    that uses an inline form. This will yield the same result, but is syntactically
    a bit more elegant. We will illustrate this when we refactor the Tiles configuration
    in the “Flow Managed Persistence Context” section later in this chapter.


    With this code in place, we can already test the refactored application. It should
    yield the exact same results that it did before we changed the composition by
    moving the “show selected books” result table into a different view; in other
    words, the merged view that is being rendered should be same as the view rendered
    before.'
