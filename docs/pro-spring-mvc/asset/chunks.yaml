    #### 视图状态


    `<view-state>` 元素是每个流程中的基本元素。正如我们将看到的，还有其他四个 `*-state` 元素。视图状态可能是这些元素中最重要的一个，因此我们将首先对其进行描述。


    视图状态模拟了一个从进入该状态时开始渲染的视图。视图状态可以作为流程的起点进入，也可以通过该流程内其他状态的转换事件进入。当视图状态渲染视图时，执行过程会暂停（此时用户正在浏览器上查看渲染后的视图）。然后，用户可以触发该视图状态内允许的转换以继续处理。


    ____________


    ⁶ 我们接下来将详细讨论视图状态。其他状态包括决策状态、动作状态、子流程状态和结束状态。我们在此有意省略了它们，因为构建基本流程并不需要它们。


    在清单 10-2 中，描述了两种这样的转换：`next` 和 `cancel`。每当用户触发此类动作（通过点击页面上的按钮或链接）时，流程会恢复并执行给定的动作。


    视图状态通过其 `id` 属性进行标识。你可以使用该属性从其他状态引用此视图状态。在同一流程定义中，所有状态的 id 必须是唯一的。`view` 属性指示此视图状态将渲染哪个视图。`model`
    属性标识存在于任何 Web Flow 作用域中的对象名称，该对象将用于绑定接收到的参数。这些参数是表单提交中的请求参数部分。表 10-4 列出了这些属性及其描述和用途。


    ![图片](img/9781430241553_tab10-04.jpg)


    ____________


    ⁷ 如需更多详细信息，请参阅 [`jira.springsource.org/browse/SWF-1518`](https://jira.springsource.org/browse/SWF-1518)。


    图 10-9 中还列出了其他一些属性，我们此时不会讨论它们，因为它们超出了本章基础内容的范围。构建基本流程也不需要它们。为了方便起见，如果你正在阅读本文作为参考，或者想提前了解，`parent`、`popup`
    和 `history` 属性将分别在第 12 章的“继承”、“重新设计订单概览”和“执行与会话快照”部分中讨论。


    ![图片](img/9781430241553_Fig10-09.jpg)


    ***图 10-9.** `<view-state>` 元素的 XML 模式概览*


    `attribute` 元素对于每个状态都是通用的，也可以应用于流程根元素。你可能永远不会用到这个元素，但为了完整性，我们在此进行介绍。例如，`attribute`
    元素用于向工具提供元数据。


    ![图片](img/square.jpg) **注意** 当属性也是 XML 语法的一部分时（例如 `id` 或 `view` 属性），你会看到一个名为“attribute”的元素。这一切使得这个属性名称变得不必要的令人困惑！


    可视化流程的工具可以读取这些 `attribute` 元素，并使用其内容来显示附加信息。该元素具有三个属性：`name`、`value` 和 `type`。`name`
    和 `value` 属性可以是任何内容。`type` 属性用于将值（否则被视为字符串数据类型）转换为特定类型（如果需要）。


    在其余元素中（参见图 10-9），我们将在本章中仅讨论 `<transition>` 元素。请查阅目录或索引以查找其余元素的解释，因为它们分散在接下来的几章中。


    #### 状态转换


    转换字面意思是指从当前状态到流程内相同或不同状态的状态转换。在某些情况下，流程可能会在执行实际转换之前执行一个动作。你可以在清单 10-2 的 `selectCategory`
    视图状态中看到这一点，其中有两个转换。转换由 `on` 属性中定义的字面量触发。你基本上是通过一种特定的命名约定来提供一个请求参数，其中嵌套了 `on` 字面量。在接下来的“选择类别”部分中，当你构建第一个页面时，你将看到如何在视图中定义它。


    ![图片](img/square.jpg) **注意** Web Flow 内部使用事件工作。当你在 `on` 属性中指定一个字面量时，它会从中创建一个匹配的事件。每当有请求进来触发转换时，它会匹配该事件。这目前还不是很重要，因为你将在视图和
    `on` 属性中指定一个字面量。第 11 章的“使用应用程序控制器进行表单验证”和“处理结果事件”部分将介绍这与事件的关联。除了字面量，你还可以在 `on`
    和 `to` 属性中使用表达式。


    目标状态可以是五种可能的状态类型中的任何一种，你可以通过 `to` 属性引用它们。其值是你希望转换到的其他状态的 id。请记住，你也可以转换到相同的状态（在我们的例子中是相同的视图状态）。省略
    `to` 属性会产生相同的效果，尽管它不会触发真正的转换。在这种情况下，视图状态不会被显式地重新进入。当我们下一章讨论 `on entry` 和 `on exit`
    动作时，这一点将变得重要。目前，可以安全地假设这两种替代方案会产生相同的结果；然而，不指定 `to` 属性是此处最合乎逻辑的做法。请注意，`cancel`
    转换会转换到另一个具有 `end` id 的状态（即结束状态）。这是其他四个特殊状态之一，我们稍后会看到。


    表 10-5 列出了 `transition` 元素的各种属性。


    ![图片](img/9781430241553_tab10-05.jpg)


    #### 评估动作


    评估动作使你的流程能够与其他组件交互，例如 Spring MVC 控制器（或任何其他 Java 类，只要它们是 Spring Bean）。评估动作接受一个表达式，该表达式在评估发生时执行。评估动作必须是另一个元素的子元素，不能独立存在。它作为流程中触发的某个特定*动作*的一部分执行。在示例中，我们将评估动作嵌套在视图状态内的转换中以及启动动作中。正如我们将看到的，除了转换和启动动作之外，你还可以将评估动作与其他元素结合使用。^(8)
    无论 `evaluate` 动作在哪里使用，其目标保持不变：评估一个执行方法、操作某些对象状态并可能返回结果的表达式。


    当表达式返回一个值时，你可以使用 `result` 属性将返回值绑定到给定作用域中的变量。评估动作的属性列在表 10-6 中。


    ![图片](img/9781430241553_tab10-06.jpg)

