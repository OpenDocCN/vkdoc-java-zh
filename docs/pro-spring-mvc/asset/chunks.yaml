  raw: '#### Book Search Page


    We have a bookstore, and we want to sell books. At the moment, however, there
    is nothing in our web application that allows the user to search for or even see
    a list of books. Let’s address this by creating a book search page, so that the
    users of our application can search for books.


    First, we create a directory `book` in the `/WEB-INF/views` directory. In that
    directory, we create a file called `search.jsp`. This file is our search form,
    and it will also display the results of the search. The code for this can be seen
    in [Listing 5-14](#Chapter05.html#list_5_14).


    ***Listing 5-14.** The Search Page Form*


    `<%@ taglib prefix="c" uri="http://java.sun.com/jsp/jstl/core"%>`


    `<form method="GET" action="<c:url value="/book/search"/>">`

    `    <fieldset>`

    `        <legend>Search Criteria</legend>`

    `        <table>`

    `            <tr>`

    `                <td><label for="title">Title</label></td>`

    `                <td><input id="title" name="title" /></td>`

    `            </tr>`

    `        </table>`

    `    </fieldset>`

    `    <button id="search">Search</button>`

    `</form>`


    `<c:if test="${not empty bookList}">`

    `    <table>`

    `        <tr><th>Title</th><th>Description</th><th>Price</th></tr>`

    `        <c:forEach items="${bookList}" var="book">`

    `            <tr>`

    `                <td>${book.title}</td>`

    `                <td>${book.description}</td>`

    `                <td>${book.price}</td>`

    `            </tr>`

    `        </c:forEach>`

    `    </table>`

    `</c:if>`


    The page consists of a form with a field to fill in a (partial) title that will
    be used to search for books. When there are results, we will show a table to the
    user containing the results. Now that we have a page, we also need a controller
    that can handle the requests. [Listing 5-15](#Chapter05.html#list_5_15) shows
    the initial `com.apress.prospringmvc.bookstore.web.controller.BookSearchController`.


    ***Listing 5-15.** The BookSearchController with Search*


    `package com.apress.prospringmvc.bookstore.web.controller;`


    `import org.springframework.beans.factory.annotation.Autowired;`

    `import org.springframework.stereotype.Controller;`

    `import org.springframework.ui.Model;`

    `import org.springframework.web.bind.annotation.RequestMapping;`

    `import org.springframework.web.bind.annotation.RequestMethod;`


    `import com.apress.prospringmvc.bookstore.domain.BookSearchCriteria;`

    `import com.apress.prospringmvc.bookstore.service.BookstoreService;`


    `import javax.servlet.http.HttpServletRequest`


    `@Controller`

    `public class BookSearchController {`


    `    @Autowired`

    `    private BookstoreService bookstoreService;`


    `    @RequestMapping(value = "/book/search", method = RequestMethod.GET)`

    `    public String list(Model model, HttpServletRequest request) {`

    `        BookSearchCriteria criteria = new BookSearchCriteria();`

    `        criteria.setTitle(request.getParameter("title");`

    `        model.addAttribute(this.bookstoreService.findBooks(criteria));`

    `        return "book/search";`

    `    }`

    `}`


    The controller will react on the URL; retrieve the title parameter from the request
    (this is the name of the field in our page, as shown in [Listing 5-13](#Chapter05.html#list_5_13));
    and finally, proceed with a search. The results of the search are put in the model.
    Initially it will display all the books; however, as soon as a title is entered,
    it will limit the results based on that title (see [Figure 5-4](#Chapter05.html#fig_5_4)).


    ![Image](images/9781430241553_Fig05-04.jpg)


    ***Figure 5-4.** The book search page showing the results*


    As mentioned earlier, working with the `HttpServletRequest` directly isn’t necessary
    in most cases. Let’s make our search method a little simpler by putting the `com.apress.prospringmvc.bookstore.domain.BookSearchCriteria`
    in the list of method arguments (see [Listing 5-16](#Chapter05.html#list_5_16)).


    ***Listing 5-16.** The BookSearchController with BookSearchCriteria as a Method
    Argument*


    `package com.apress.prospringmvc.bookstore.web.controller;`


    `import org.springframework.web.bind.annotation.RequestParam;`


    `// Other imports omitted, see` [`Listing 5-15`](#Chapter05.html#list_5_15)


    `@Controller`

    `public class BookSearchController {`


    `    @Autowired`

    `    private BookstoreService bookstoreService;`


    `    @RequestMapping(value = "/book/search", method = RequestMethod.GET)`

    `public String list(Model model,` **`BookSearchCriteria criteria`**`) {`

    `        model.addAttribute(this.bookstoreService.findBooks(criteria));`

    `        return "book/search";`

    `    }`

    `}`


    With Spring MVC, this is what we call *data binding*. To enable data binding,
    we needed to modify our `com.apress.prospring.bookstore.web.controller.BookSearchController`
    so it uses a method argument, instead of working with the `request` directly (see
    [Listing 5-14](#Chapter05.html#list_5_14)). Alternatively, it could use `RequestParam`
    to retrieve the parameters and set them on the object. This will force Spring
    to use data binding on the `criteria` method argument. Doing so will map all request
    parameters with the same name as one of our object’s properties to that object
    (i.e., the request parameter `title` will be mapped to the property `title`).
    Using data binding will greatly simplify our controller (you can find more in-depth
    information on this in the “Data Binding” section of this chapter).


    We can do even better! Instead of returning a `String`, we could return something
    else. For example, let’s modify our controller to return a collection of books.
    This collection is added to the model with the name `bookList`, as explained earlier
    in this chapter. [Listing 5-16](#Chapter05.html#list_5_16) shows this controller,
    but where do we select the view to render? It isn’t explicitly specified. In [Chapter
    4](#Chapter04.html#ch4), we mentioned that the `org.springframework.web.servlet.RequestToViewNameTranslator`
    kicks in if there is no explicitly mentioned view to render. We see that mechanism
    working here. It takes the URL (`http://[server]:[port]/chapter5-bookstore/book/search`);
    strips the server, port, and application name; removes the suffix (if any); and
    then uses the remaining `book/search` as the name of the view to render (exactly
    what we have been returning).


    ***Listing 5-17.** The BookSearchController Alternate Version*


    `package com.apress.prospringmvc.bookstore.web.controller;`


    `// Other imports omitted, see` [`Listing 5-15`](#Chapter05.html#list_5_15)


    `@Controller`

    `public class BookSearchController {`


    `    @Autowired`

    `    private BookstoreService bookstoreService;`


    `    @RequestMapping(value = "/book/search", method = RequestMethod.GET)`

    `public` **`Collection<Book>`** `list(BookSearchCriteria criteria ) {`

    **`return this.bookstoreService.findBooks(criteria);`**

    `    }`

    `}`'
