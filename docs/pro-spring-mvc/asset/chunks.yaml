    We can use this interface to do some interesting things. For example, we might
    create a checksum over the not editable fields (like `id`) in the controller (or
    an interceptor), and then review this checksum to see whether any fields have
    been tampered with.


    The `processUrl` method is used by the `Url` tag; and on a redirect, we could
    use it to encode or add extra parameters to the URL to secure our URLs (for instance,
    we could add a checksum to check the validity of our parameters).


    There is no default instance provided by the framework. Therefore, an implementation
    needs to be tailored for our application (the HDIV website has a plugin to protect
    a site from a whole range of vulnerabilities). To configure a `RequestDataValueProcessor`,
    we need to add it to the application context and then register it with the name,
    `requestDataValueProcessor`. This is the name the framework uses to detect the
    registered instance.


    ### Summary


    In this chapter, we covered some more advanced techniques that we can use to build
    web applications. For example, we started by looking at scoped beans and how we
    can use them to our advantage. To that end, we implemented a shopping cart in
    our sample application.


    At times we find ourselves in need of the ability to reuse code or to execute
    code across a large amount of classes or URLs. These so-called crosscutting concerns
    can be addressed by using aspect oriented programming; however, in a web application,
    this isn’t always a good fit. In Spring MVC, we can use interceptors and an advanced
    exception-handling strategy to address those crosscutting concerns. For example,
    we can use interceptors to execute a piece of code for a large number of controllers.
    When configuring these interceptors, we can specify whether to map to all controllers
    or only to certain controllers based on the URL.


    Although we all try to build our applications to be as robust as possible, there
    is always a chance that things will go wrong. When things do go wrong, we want
    to be able to handle the problems gracefully. For example, we might want to show
    the user an error page or login page when we need the user’s credentials. For
    this, we took an in-depth look at the exception-handling strategies inside Spring
    MVC.


    We followed this by diving deeper into the infrastructure classes of Spring MVC
    and examined how to extend the framework, if the need arises. We also explained
    how to expand the request matching by specifying an additional request condition.
    Next, we explained (and showed) how to write a processor to handle method-argument
    types and return values for request-handling methods.


    Finally, we ended the chapter with a brief introduction to the request data value
    processor, covering how to use this to protect against CSFR and provide data integrity.


