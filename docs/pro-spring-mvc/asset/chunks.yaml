- fmt: "### Book Detail Page\n\nNow let’s put some more functionality into our search\
    \ page. For example, let’s make the title of a book a link that navigates to a\
    \ book’s details page that shows an image of and some information about the book.\
    \ We’ll start by modifying our `search.jsp` and adding links (see [Listing 5-18](#Chapter05.html#list_5_18)).\n\
    \n***Listing 5-18.** The Modified Search Page*\n\n```\n<%@ taglib prefix=\"c\"\
    \ uri=\"http://java.sun.com/jsp/jstl/core\"%>\n\n<form method=\"POST\" action=\"\
    <c:url value=\"/book/search\"/>\">\n    <fieldset>\n        <legend>Search Criteria</legend>\n\
    \        <table>\n            <tr>\n                <td><label for=\"title\">Title</label></td>\n\
    \                <td><input id=\"title\" name=\"title\"/></td>\n            </tr>\n\
    \        </table>\n    </fieldset>\n    <button id=\"search\">Search</button>\n\
    </form>\n\n<c:if test=\"${not empty bookList}\">\n    <table>\n        <tr><th>Title</th><th>Description</th><th>Price</th></tr>\n\
    \        <c:forEach items=\"${bookList}\" var=\"book\">\n            <tr>\n  \
    \              <td><a href=\"<c:url value=\"/book/detail/${book.id}\"/>\">${book.title}</a></td>\n\
    \                <td>${book.description}</td>\n                <td>${book.price}</td>\n\
    \            </tr>\n        </c:forEach>\n    </table>\n</c:if>\n```\n\nThe highlighted\
    \ line is the only change we need to make to this page. At this point, we have\
    \ generated a URL based on the `id` of the book, so we should get a URL like `/book/detail/4`\
    \ that shows us the details of the book with id 4. Let’s create a controller to\
    \ react to this URL and extract the id from the URL (see [Listing 5-19](#Chapter05.html#list_5_19)).\n\
    \n***Listing 5-19.** The BookDetailController*\n\n```\npackage com.apress.prospringmvc.bookstore.web.controller;\n\
    \nimport org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Controller;\n\
    import org.springframework.ui.Model;\nimport org.springframework.web.bind.annotation.PathVariable;\n\
    import org.springframework.web.bind.annotation.RequestMapping;\n\nimport com.apress.prospringmvc.bookstore.domain.Book;\n\
    import com.apress.prospringmvc.bookstore.service.BookstoreService;\n\n@Controller\n\
    public class BookDetailController {\n\n    @Autowired\n    private BookstoreService\
    \ bookstoreService;\n\n    @RequestMapping(value = \"/book/detail/{bookId}\")\n\
    \    public String details(@PathVariable(\"bookId\") long bookId, Model model)\
    \ {\n        Book book = this.bookstoreService.findBook(bookId);\n        model.addAttribute(book);\n\
    \        return \"book/detail\";\n    }\n}\n```\n\nThe highlighted code is what\
    \ makes the extraction of the id possible. This is the `org.springframework.web.bind.annotation.PathVariable`\
    \ in action. The URL mapping contains the `{bookId}` part, which tells Spring\
    \ MVC to bind that part of the URL to a path variable called `bookId`. We can\
    \ then use the annotation to retrieve the path variable again. In addition to\
    \ the controller, we also need a JSP to show the details. The code in [Listing\
    \ 5-20](#Chapter05.html#list_5_20) creates a `detail.jsp` in the `book` directory.\n\
    \n***Listing 5-20.** The Book’s Details Page*\n\n```\n<%@ taglib prefix=\"c\"\
    \ uri=\"http://java.sun.com/jsp/jstl/core\"%>\n\n<c:url value=\"/resources/images/books/${book.isbn}/book_front_cover.png\"\
    \ var=\"bookImage\"/>\n<img src=\"${bookImage}\" align=\"left\" alt=\"${book.title}\"\
    \ width=\"250\"/>\n\n<table>\n    <tr><td>Title</td><td>${book.title}</td></tr>\n\
    \    <tr><td>Description</td><td>${book.description}</td></tr>\n    <tr><td>Author</td><td>${book.author}</td></tr>\n\
    \    <tr><td>Year</td><td>${book.year}</td></tr>\n    <tr><td>ISBN</td><td>${book.isbn}</td></tr>\n\
    \    <tr><td>Price</td><td>${book.price}</td></tr>\n</table>\n```\n\nIf we click\
    \ one of the links from the search page after redeployment, we should be greeted\
    \ with a details page that shows an image of and some information about the book\
    \ (see [Figure 5-5](#Chapter05.html#fig_5_5)).\n\n![Image](images/9781430241553_Fig05-05.jpg)\n\
    \n***Figure 5-5.** The book’s details page*\n\n### Data Binding\n\nIn this section,\
    \ we will explore the benefits and possibilities of using data binding, including\
    \ how we can configure and extend it. However, we’ll begin by explaining the basics\
    \ of data binding. [Listing 5-21](#Chapter05.html#list_5_21) shows our `com.apress.prospringmvc.bookstore.domain.BookSearchCriteria`\
    \ JavaBean. It is a simple object with two properties: `title` and `category`.\n\
    \n***Listing 5-21.** The BookSearchCriteria JavaBean*\n\n```\npackage com.apress.prospringmvc.bookstore.domain;\n\
    \npublic class BookSearchCriteria {\n\n    private String title;\n    private\
    \ Category category;\n\n    public String getTitle() {\n        return this.title;\n\
    \    }\n\n    public void setTitle(String title) {\n        this.title = title;\n\
    \    }\n    public void setCategory(Category category) {\n        this.category\
    \ = category;\n    }\n\n    public Category getCategory() {\n        return this.category;\n\
    \    }\n}\n```\n\nAssume we receive the following request: [`http://localhost:8080/chapter5-bookstore/book/search?title=Agile`](http://localhost:8080/chapter5-bookstore/book/search?title=Agile).\
    \ In this case, the `title` property receives the value of `Agile`. Behind the\
    \ scenes, Spring calls the `setTitle` method on our JavaBean, which we specified\
    \ as a method argument in the `list` method on our controller. If there were a\
    \ parameter named `category` in the request, then Spring would call the `setCategory`\
    \ method; however, it would first try to convert the parameter (which is always\
    \ a `String`) into a `com.apress.prospring.bookstore.domain.Category` JavaBean.\n\
    \nHowever, data binding isn’t limited to simple setter methods. We can also bind\
    \ to nested properties and even to indexed collections like maps, arrays, and\
    \ lists. Nested binding happens when the parameter name contains a *dot* (`.`);\
    \ for instance, `address.street=Somewhere` leads to `getAddress().setStreet(\"\
    Somewhere\")`.\n\nTo bind to indexed collections, we must use a notation with\
    \ square brackets in which we enclose the index. When using a map, this index\
    \ doesn’t have to be a numeric. For instance, `list[2].name` would bind a name\
    \ property on the third element in the list. Similarly, `map['foo'].name` would\
    \ bind the name property to the value under the key `foo` in the map.\n\n####\
    \ Customizing Data Binding\n\nWe have two options for customizing the behavior\
    \ of data binding: globally or per controller. Of course, we can mix both strategies\
    \ together by performing a global setup, and then fine-tuning it per controller."
