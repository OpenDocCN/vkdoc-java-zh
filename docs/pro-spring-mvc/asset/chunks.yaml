- fmt: '# Execution and Conversation Snapshots


    We’ve already configured the `org.springframework.webflow.executor.FlowExecutor`
    without any specific options. The out-of-the-box configuration was fine for our
    basic setup:


    ```

    <webflow:flow-executor id="flowExecutor"/>

    ```


    The only notable sub-element used within `flow-executor` is `<webflow:flow-execution-repository>`,
    which lets you customize the internals of the flow executor. It has two interesting
    attributes: namely, `max-execution-snapshots` and `max-executions`. We will illustrate
    how you define them in [Listing 12-6](#Chapter12.html#list_12_6) and then describe
    them in the next paragraph.


    **Listing 12-6.** Customizing the Flow Registry Configuration


    ```

    <webflow:flow-executor id="flowExecutor" flow-registry="flowRegistry" >

    <webflow:flow-execution-repository max-execution-snapshots="30"

    max-executions="5"/>

    </webflow:flow-executor>

    ```


    The `max-execution-snapshots` and `max-executions` attributes allow you to fine-tune
    how far back you can go in “the past.” In the preceding code sample, we have set
    them to their default values. Thus, specifying `30` for `max-execution-snapshots`
    and `5` for `max-executions` has the same effect as not specifying them at all
    because these are the default values when no other values are in place. We entered
    these values in the code snippet to illustrate how to use these attributes, as
    well as to highlight their default values.


    In [Chapter 10](#Chapter10.html#ch10), we mentioned that each request into a flow
    execution creates a snapshot of its state before the response is returned (see
    [Chapter 10’s](#Chapter10.html#ch10) [Figure 10-2](#Chapter10.html#fig_10_2) and
    its depiction of the Web Flow state management mechanism). The `max-execution-snapshots`
    attribute maps to how many of these snapshots within a flow execution can be stored.
    If we set this value to `0`, then it will not be possible to go to a previous
    state within a flow execution. In fact, your Back button will look like it doesn’t
    work. A value of `-1` means “unlimited”—you would probably never want to use this
    value because you want to keep the size of the user’s session within limits.


    The `max-executions` attribute maps to how many concurrent flow executions can
    be active within a given session. Whenever you start a new flow execution (and
    you don’t end the previous one explicitly), you can still go back to the previous
    one—it remains stored together with all it states, depending on the value of the
    `max-execution-snapshots` attribute. So, the configuration in [Listing 12-3](#Chapter12.html#list_12_3)
    means that you can go back five previous flow executions; and within each flow,
    you can browse the last 30 `view` states. Again, a value of `0` disables this
    feature completely, while `-1` sets the amount to infinite (remember: you probably
    don’t want to use that value).


    For both the `max-execution-snapshots` and the `max-executions` attributes, whenever
    the configured maximum value is reached, Web Flow will respectively remove the
    oldest snapshot or the oldest execution. So, if we were to set `max-executions`
    to `2`, then, after starting the third execution, Web Flow would simply clean
    up and remove the first started execution. The same principle goes for the `max-execution-snapshots`.


    **Note** These settings are always applicable for a user’s session, but not for
    the entire application. So, if we set `max-conversations` to `5`, that would mean
    that each user (and thus each session) could have a maximum of five conversations
    active at the same time (if a sixth conversation is started, the oldest is cleaned
    up and removed by Web Flow).


    **Caution** We are telling you right here and now that you should think about
    these defaults. You probably want to tweak them to fit your needs, especially
    if you have lots of `view` states in your flows and you store lots of state in
    your flows—in such a case, these defaults would start to hog memory very fast
    (hence, you would probably want to bring these numbers down). For a memory-heavy
    application (or a memory-poor environment), setting `max-execution-snapshots`
    to `5` and `max-executions` to `1` is a perfectly sound setting. Also, most applications
    don’t need to be able to go back more than five states or more than one previous
    flow execution. If you don’t need this state “save/restore” snapshot functionality
    at all, then set both values to `0` to disable it.


    # Changing the Expression Parser


    In the previous chapter, we saw how we could use the `<webflow:flow-builder-services>`
    to customize behavior. A feature we haven’t discussed yet is the `expression-parser`
    attribute. This attribute will allow you to plug in another parser that supports
    other types of expression language.


    By default, Web Flow uses SpEL as its expression language. Depending on your background
    or preferences, you might want to switch the expression language to something
    else.


    Another good reason to change your expression parser might be that you are migrating
    from Web Flow 1. In the next section, you will see that there is a tool to help
    you migrate your Web Flow 1 flows to Web Flow 2 syntax. However, this migration
    will not change your expressions. Setting OGNL as the default expression language
    could help you in upgrading Web Flow step-by-step.


    As it turns out, switching the expression language is just a matter of configuring
    the correct class in the `expression-parser` attribute (see [Listing 12-7](#Chapter12.html#list_12_7)).


    **Listing 12-7.** Changing the Expression Parser


    ```

    <webflow:flow-builder-services id="flowBuilderServices" view-factory-

    creator="mvcViewFactoryCreator" conversion-service="conversionService" validator="validator"

    development="true" expression-parser=""/>

    ```


    In [Listing 12-7](#Chapter12.html#list_12_7), we left the `expression-parser`
    attribute empty. For example, specifying the following class, `org.springframework.webflow.expression.el.WebFlowELExpressionParser`,
    will enable you to use the unified expression language (EL) as it is used, for
    example, in JSF. If you use the `org.springframework.webflow.expression.WebFlowOgnlExpressionParser`
    class instead, then OGNL will be enabled as the expression language (this is the
    default in Web Flow 1).'
