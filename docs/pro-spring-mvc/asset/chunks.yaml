  raw: '##### HandlerMethodArgumentResolver


    The `HandlerMethodArgumentResolver` is used by the `RequestMappingHandlerAdapter`
    to determine what to use for a method argument. There is more or a less an implementation
    for each of the supported method-argument types or annotations (see the [Chapter
    5](#Chapter05.html#ch5) section, “Supported Method Argument Types”). The API is
    quite simple, as we can see in [Listing 6-25](#Chapter06.html#list_6_25).


    ***Listing 6-25.** The HandlerMethodArgumentResolver API*


    `package org.springframework.web.method.support;`


    `import org.springframework.core.MethodParameter;`

    `import org.springframework.web.bind.WebDataBinder;`

    `import org.springframework.web.bind.support.WebDataBinderFactory;`

    `import org.springframework.web.context.request.NativeWebRequest;`


    `public interface HandlerMethodArgumentResolver {`


    `    boolean supportsParameter(MethodParameter parameter);`


    `    Object resolveArgument(MethodParameter parameter,`

    `                           ModelAndViewContainer mavContainer,`

    `                           NativeWebRequest webRequest,`

    `                           WebDataBinderFactory binderFactory)`

    `       throws Exception;`


    `}`


    The `supportsParameter` method is called on each registered `HandlerMethodArgumentResolver`.
    The one that returns `true` will be used to detect or create the actual value
    to use for that method argument. We do this by calling the `resolveArgument` method.


    ##### HandlerMethodReturnValueHandler


    The `HandlerMethodReturnValueHandler` is similar to the `HandlerMethodArgumentResolver`,
    but with one important difference. As its name implies, `HandlerMethodReturnValueHandler`
    works for method return values. There is an implementation for each of the supported
    return values or annotations (see the [Chapter 5](#Chapter05.html#ch5) section,
    “Supported Return Values”). This API is also quite simple, as we can see in [Listing
    6-26](#Chapter06.html#list_6_26).


    ***Listing 6-26.** The HandlerMethodReturnValueHandler*


    `package org.springframework.web.method.support;`


    `import org.springframework.core.MethodParameter;`

    `import org.springframework.web.context.request.NativeWebRequest;`


    `public interface HandlerMethodReturnValueHandler {`


    `    boolean supportsReturnType(MethodParameter returnType);`


    `    void handleReturnValue(Object returnValue,`

    `                           MethodParameter returnType,`

    `                           ModelAndViewContainer mavContainer,`

    `                           NativeWebRequest webRequest)`

    `    throws Exception;`


    `}`


    The `supportsReturnType` method for each registered `HandlerMethodReturnValueHandler`
    will be called with the return type of the method. The one that returns `true`
    will be used to actually handle the return value. This is accomplished by calling
    the `handleReturnValue` method.


    ##### Implementing Your Own


    We can use the strategies used by the `RequestMappingHandlerAdapter` to our advantage.
    For example, we want an easy way to store and retrieve objects in the `javax.servlet.http.HttpSession`.
    For this, we first need an annotation to mark a method argument or return type
    as something we want to retrieve or put in the `HttpSession`. [Listing 6-27](#Chapter06.html#list_6_27)
    describes the annotation we will use.


