  raw: 'The first line verifies that the `findByUsername` method was called exactly
    once. If it hadn’t been, the `verify` method would raise an error, letting our
    test fail. In the second line we reset the mock. You might notice the comment
    above the `reset` method. Resetting a mock is normally bad practice. Normally
    you create a mock in scope of a single test method. You create it, program it,
    verify it, and that’s it. In the next test method you create a new instance of
    the mock. However, in our case the `AccountRepository` is autowired (by Spring)
    in the `AccountService`. When we create a new instance of the mock, we need to
    find a clean way to inject it in the `AccountService`. Yes, as an alternative
    we could have opted for an extra (`AccountRepository`) setter on the `AccountService`,
    so we could have set the `AccountRepository` using the setter. This is a matter
    of preference. In any case we are not violating any rules by resetting the mock
    this way. Just be sure you don’t reset a mock in the middle of a test, for example.
    In that case you should probably have created two test methods instead.


    ![Image](images/square.jpg) **Note** You can also use static imports for Mockito
    methods, just as we did with JUnit. It is in fact a recommended practice, as it
    keeps your code clean and readable. In the code examples, we deliberately left
    the classes visible to make it clear that it is a Mockito object rather than a
    JUnit object (which might not be obvious if you are new to Mockito or mocks in
    general).


