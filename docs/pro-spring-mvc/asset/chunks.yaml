    #### 资源加载


    表 2-2 概述了不同的 `ApplicationContext` 实现及其默认的资源加载机制。但这并不意味着我们只能从默认位置加载资源。我们还可以通过添加适当的前缀，从特定位置加载资源（参见表
    2-3）。


    ![图片](img/tab_2_3.jpg)


    代码清单 2-7 展示了一个引导代码，它使用了默认从类路径加载资源的应用上下文实现。我们也可以使用默认从文件系统加载资源，但在使用适当前缀时从类路径加载资源的实现（参见代码清单
    2-8）。


    ***代码清单 2-8.** 在 MoneyTransferSpringFileSystem 中使用前缀加载资源*


    `package com.apress.prospringmvc.moneytransfer.annotation;`


    `import org.springframework.context.support.FileSystemXmlApplicationContext;`


    `// 其他导入已省略，参见代码清单 2-7`


    `public class MoneyTransferSpringFileSystem {`


    `private static final Logger` *`logger`* `= LoggerFactory.`*`getLogger`*![图片](img/U002.jpg)

    `(MoneyTransferSpringFileSystem.class);`


    `public static void main(String[] args) {`


    `        ApplicationContext ctx1 = new AnnotationConfigApplicationContext(                                     ApplicationContextConfiguration.class);`

    *`transfer`*`(ctx1);`


    **`        ApplicationContext ctx2 = new FileSystemXmlApplicationContext(`**

    **`                "classpath:/com/apress/prospringmvc/moneytransfer/annotation`**![图片](img/U002.jpg)

    **`/application-context.xml");`**

    *`transfer`*`(ctx2);`


    `        ApplicationContextLogger.`*`log`*`(ctx1);`

    `        ApplicationContextLogger.`*`log`*`(ctx2);`

    `    }`

    `  // transfer 方法已省略，参见代码清单 2-7`

    `}`


    除了能够指定从何处加载文件，我们还可以使用 Ant 风格的正则表达式来指定加载哪些文件。Ant 风格的正则表达式是一种包含 `**` 和/或 `*` 字符的资源位置。`*`
    字符表示“当前层级”或“单个层级”，而 `**` 字符表示“当前层级及其所有子层级”。表 2-4 展示了一些示例。此技术仅适用于处理类路径或文件系统中的文件资源；不适用于
    Web 资源或包名。


    ![图片](img/tab_2_4.jpg)


    #### 组件扫描


    Spring 还提供了一种称为*组件扫描*的功能。简而言之，此功能使 Spring 能够扫描类路径，查找带有 `org.springframework.stereotype.Component`
    注解（或其专用注解，如 `org.springframework.stereotype.Service`、`org.springframework.stereotype.Repository`、`org.springframework.stereotype.Controller`
    或 `org.springframework.context.annotation.Configuration`）的类。如果我们想启用组件扫描，需要指示应用上下文执行此操作。`org.springframework.context.annotation.ComponentScan`
    注解使我们能够实现这一点。该注解需要放在配置类上以启用组件扫描。代码清单 2-9 展示了修改后的配置类。


    ***代码清单 2-9.** 使用 ApplicationContextConfiguration 实现组件扫描*


    `package com.apress.prospringmvc.moneytransfer.scanning;`


    `import org.springframework.context.annotation.ComponentScan;`

    `import org.springframework.context.annotation.Configuration;`


    `@Configuration`

    **`@ComponentScan(basePackages = {`**

    **`        "com.apress.prospringmvc.moneytransfer.scanning",`**

    **`        "com.apress.prospringmvc.moneytransfer.repository" })`**

    `public class ApplicationContextConfiguration {}`


    查看代码清单 2-9 可以发现，该类没有更多内容，只有两个注解。一个注解表示该类用于配置，另一个注解则启用组件扫描。组件扫描注解配置了一个要扫描的包。


    ![图片](img/square.jpg) **注意** 不指定包或使用过于宽泛的包（如 com.apress）来扫描整个类路径被认为是不良实践。这可能导致扫描大部分甚至所有类，从而严重影响应用程序的启动时间。


    如果我们使用了组件扫描，并且找到了带有 `Configuration` 注解的类，那么该类将被用于向上下文中添加更多 Bean。通常，这些 Bean 是无法自动创建的，例如数据源或
    JMS 配置。


    #### 作用域


    默认情况下，Spring 应用上下文中的所有 Bean 都是*单例*的。顾名思义，每个 Bean 只有一个实例，并用于整个应用程序。这通常不会带来问题，因为我们的服务和仓库不持有状态；它们只是执行特定操作并（可选地）返回一个值。


    然而，如果我们想在 Bean 内部保持状态，单例就会带来问题。我们正在开发一个希望吸引成千上万用户的 Web 应用程序。如果只有一个 Bean 实例，并且所有这些用户都在操作同一个实例，那么用户将看到并修改彼此的数据，或来自多个用户组合的数据。显然，这不是我们想要的。幸运的是，Spring
    为 Bean 提供了多种作用域，我们可以利用这些作用域（参见表 2-5）。


    ![图片](img/tab_2_5.jpg)

