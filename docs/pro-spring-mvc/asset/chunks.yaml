    \ 5-41.** The Registration Page\n\n```\n<%@ taglib prefix=\"c\" uri=\"http://java.sun.com/jsp/jstl/core\"\
    %>\n<%@ taglib prefix=\"spring\" uri=\"http://www.springframework.org/tags\" %>\n\
    <%@ taglib prefix=\"form\" uri=\"http://www.springframework.org/tags/form\" %>\n\
    \n<form:form method=\"POST\" modelAttribute=\"account\">\n    <fieldset>\n   \
    \     <legend>Personal</legend>\n        <table>\n            <tr>\n         \
    \       <td>\n                     <form:label path=\"firstName\" cssErrorClass=\"\
    error\">\n                          Firstname\n                     </form:label>\n\
    \                  </td>\n                  <td><form:input path=\"firstName\"\
    \ /></td>\n                  <td><form:errors path=\"firstName\"/></td>\n    \
    \         </tr>\n             // Other Account fields omitted\n        </table>\n\
    \    <fieldset>\n        <legend>Userinfo</legend>\n        <table>\n        \
    \    <tr>\n                <td><form:label path=\"username\" cssErrorClass=\"\
    error\">\n                         Username\n                    </form:label></td>\n\
    \                <td><form:input path=\"username\"/></td>\n                <td><form:errors\
    \ path=\"username\"/></td>\n            </tr>\n            // Password and emailAddress\
    \ field omitted.  \n         </table>\n    </fieldset>\n    <button id=\"save\"\
    >Save</button>\n</form:form>\n```\n\nWe also need a controller for this, so we\
    \ will create the `com.apress.prospringmvc.bookstore.web.controller.RegistrationController`.\
    \ In this controller, we will use a couple of data binding features. First, we\
    \ will disallow the submission of an `id` field (to prevent someone from editing\
    \ another user). Second, we will preselect the user’s country based on the current\
    \ `Locale`. [Listing 5-42](#Chapter05.html#list_5_42) shows our controller.\n\n\
    **Listing 5-42.** The RegistrationController\n\n```\npackage com.apress.prospringmvc.bookstore.web.controller;\n\
    \nimport java.util.Locale;\nimport java.util.Map;\nimport java.util.TreeMap;\n\
    \nimport org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Controller;\n\
    import org.springframework.validation.BindingResult;\nimport org.springframework.web.bind.WebDataBinder;\n\
    import org.springframework.web.bind.annotation.InitBinder;\nimport org.springframework.web.bind.annotation.ModelAttribute;\n\
    import org.springframework.web.bind.annotation.RequestMapping;\nimport org.springframework.web.bind.annotation.RequestMethod;\n\
    \nimport com.apress.prospringmvc.bookstore.domain.Account;\nimport com.apress.prospringmvc.bookstore.service.AccountService;\n\
    \n@Controller\n@RequestMapping(\"/customer/register\")\npublic class RegistrationController\
    \ {\n\n    @Autowired\n    private AccountService accountService;\n\n    @ModelAttribute(\"\
    countries\")\n    public Map<String, String> countries(Locale currentLocale) {\n\
    \        Map<String, String> countries = new TreeMap<String, String>();\n    \
    \    for (Locale locale : Locale.getAvailableLocales()) {\n            countries.put(locale.getCountry(),\
    \ locale.getDisplayCountry(currentLocale));\n        }\n        return countries;\n\
    \    }\n\n    @InitBinder\n    public void initBinder(WebDataBinder binder) {\n\
    \        binder.setDisallowedFields(\"id\");\n        binder.setRequiredFields(\"\
    username\",\"password\",\"emailAddress\");\n    }\n\n    @RequestMapping(method\
    \ = RequestMethod.GET)\n    @ModelAttribute\n    public Account register(Locale\
    \ currentLocale) {\n        Account account = new Account();\n        account.getAddress().setCountry(currentLocale.getCountry());\n\
    \        return account;\n    }\n\n    @RequestMapping(method = { RequestMethod.POST,\
    \ RequestMethod.PUT })\n    public String handleRegistration(@ModelAttribute Account\
    \ account, BindingResult result) {\n        if (result.hasErrors()) {\n      \
    \      return \"customer/register\";\n        }\n        this.accountService.save(account);\n\
    \        return \"redirect:/customer/account/\" + account.getId();\n    }\n}\n\
    ```\n\nThe controller has a lot going on. For example, the `initBinder` method\
    \ configures our binding. It disallows the setting of the `id` property and sets\
    \ some required fields. We also have a method that prepares our model by adding\
    \ all the available countries in the JDK to the model. Finally, we have two request-handling\
    \ methods, one for a `GET` request (the initial request when we enter our page)\
    \ and one for `POST`/`PUT` requests when we submit our form. Notice the `org.springframework.validation.BindingResult`\
    \ attribute next to the model attribute. This is what we can use to detect errors;\
    \ and based on that, we can redisplay the original page. Also remember that the\
    \ `error` tags in the JSP those are used to display error messages for fields\
    \ or objects (we’ll cover this in more depth in the upcoming sections). When the\
    \ application is redeployed and we click the `Register` link, we should see the\
