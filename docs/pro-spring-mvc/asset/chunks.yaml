    `}`


    在这段代码中，我们默认将测试设置为事务性的。对于 `read` 方法，我们使用前面讨论过的 JUnit `@Before` 方法插入额外数据。我们使用 Builder
    模式构建数据，默认情况下，这些数据通过注入到构建器中的 `EntityManager` 实例进行插入。当测试方法结束时，由于事务回滚，这些数据也会被移除。


    ![Image](img/square.jpg) **注意** 我们之前提到过，在测试执行 CUD 功能的方法时，应该执行一次 flush，以确保所有语句都被刷新到数据库。在测试只读方法时，我们首先使用
    JPA 将数据插入数据库。那么这些插入语句的刷新呢？实际上，我们并不关心。ORM 会根据需要自行刷新它们，以确保我们的读取操作基于最新数据。它可能会延迟插入
    category 和 book，但一旦它看到我们按 ID 查询书籍的查询语句，就会先将 book 和 category 刷新到数据库。关键在于，我们并没有测试任何
    CUD 操作。ORM 如何在内部管理延迟写入，以确保我们的读取操作看到最新数据，这并非我们关注的重点。


    在测试创建新图书记录的方法中，我们在测试方法结束前显式执行了 flush。这样我们就能确保 `insert` 语句（由仓库 `storeBook` 方法中的查询生成）已发送到数据库（这可能是唯一的语句）。之后，测试方法结束，事务被回滚。


    ### 使用 Mock 对象


    在本节中，我们将介绍如何使用 Mock 对象。在创建单元测试时，你需要确保测试尽可能隔离，不依赖外部资源。而在集成测试中，你则要尽可能多地使用资源，只要你能保持控制，并且这些资源不会使测试依赖于特定资源或环境即可。对于那些无法做到这一点的情况，Mock
    对象将为你提供帮助。让我们先来看看 Mock 对象究竟是什么。

