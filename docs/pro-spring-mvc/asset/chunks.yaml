    13-4）。  ![Image](img/9781430241553_Fig13-04.jpg)  ***图 13-4.** 使用过滤器链将流程作为请求 URI
    进行保护是不够的。从父流程启动子流程将绕过此机制。*    如果你还记得请求映射，`placeOrders-flow`（位于 `WEB-INF/view/secured/placeOrders/`）只能由经过认证的用户访问。`createOrders-flow`（位于
    `WEB-INF/view/public/createOrders/`）是公开可用的。这里发生的情况是，当请求进来以转换到 `placeOrder` 时，不会触发认证（因为它仍然是
    `createOrders-flow`）。`placeOrder` 是 `createOrders-flow` 中的一个子流程状态。为了刷新我们的记忆，你可以从下面的
    `createOrders-flow` 代码片段中看到，该代码片段从流程转换到 `placeOrder` 的那一刻起启动子流程：  `<subflow-state
    id="placeOrder" subflow="secured/placeOrders">` `    <input name="orderForm"/>`  `    <output
    name="orderId"/>` `        <transition on="endOrderOk" to="endOrderOk"/>` `</subflow-state>`  当
    Web Flow 进行内部状态转换到子流程时，它实际上会执行，而不会将用户重定向到登录页面。我们真正想要的是 Web Flow 与 Spring Security
    的集成，以便在执行流程时涉及 Spring Security。    #### 向流程添加访问属性    在这里，我们将看到为了调用 Spring Security
    for Web Flow 需要做什么。当你这样做时，你的流程间通信也将得到保护。    为了保护你的流程，你可以在流程定义的顶部添加以下元素：  `<secured
    attributes="…"/>`  `attributes` 属性的用法与 Spring Security 配置中 `<security:intercept-url>`
    的 `access` 属性相同。你可以使用它来放置在此流程可以执行之前必须有效的表达式。    如果你回到“*配置要保护的资源*”部分，你会看到以下两个流程需要认证：    >
    *   `placeOrders-flow` > *   `ordersOverview-flow`    第三个流程 `createOrders-flow`（位于
    `WEB-INF/view/public/createOrders/`）是公开的，不需要任何认证即可执行。我们将 `fullyAuthenticated`
    条件添加到 `placeOrders-flow.xml`（位于 `WEB-INF/view/secured/placeOrders/`）和 `ordersOverview-flow.xml`（位于
    `secured/ordersOverview/`），如清单 13-18 和 13-19 所示。    ***清单 13-18.** 将 fullyAuthenticated
