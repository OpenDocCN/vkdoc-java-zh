    #### 拦截器


    拦截器之于请求处理器，就如同过滤器之于 Servlet。根据 Servlet 规范^(2)，过滤器是一段可重用的代码，能够转换 HTTP 请求、响应及头部信息的内容。过滤器可以修改或适配针对某个资源的请求，也可以修改或适配来自某个资源的响应。过滤的示例包括身份验证、审计和加密。


    过滤器和拦截器都实现了通用功能（横切关注点），以应用于所有（或选定的）传入 HTTP 请求。过滤器比拦截器更强大，因为它们可以替换（或包装）传入的请求/响应，而拦截器无法做到这一点。另一方面，拦截器比过滤器拥有更多的生命周期方法（参见表
    6-3）。


    ![图片](img/tab_6_3.jpg)


    Spring MVC 有两种不同的拦截器策略：


    *   `org.springframework.web.servlet.HandlerInterceptor`（参见清单 6-5）

    *   `org.springframework.web.context.request.WebRequestInterceptor`（参见清单 6-6）


    ________________


    ² 参见 Servlet 规范 3.0，第 6 章。


    ***清单 6-5.** HandlerInterceptor 接口*


    `package org.springframework.web.servlet;`


    `import javax.servlet.http.HttpServletRequest;`

    `import javax.servlet.http.HttpServletResponse;`


    `public interface HandlerInterceptor {`


    `  boolean preHandle(HttpServletRequest request,`

    `                    HttpServletResponse response,`

    `                    Object handler) throws Exception;`


    `  void postHandle(HttpServletRequest request, HttpServletResponse response,`

    `                  Object handler, ModelAndView modelAndView) throws Exception;`


    `  void afterCompletion(HttpServletRequest request,`

    `                       HttpServletResponse response,`

    `                       Object handler,`

    `                       Exception ex) throws Exception;`

    `}`


    ***清单 6-6.** WebRequestInterceptor 接口*


    `package org.springframework.web.context.request;`


    `import org.springframework.ui.ModelMap;`


    `public interface WebRequestInterceptor {`


    `  void preHandle(WebRequest request) throws Exception;`


    `  void postHandle(WebRequest request, ModelMap model) throws Exception;`


    `  void afterCompletion(WebRequest request, Exception ex) throws Exception;`

    `}`


    与 Spring 框架中的常见情况一样，这两种策略都表示为接口，我们可以为其提供实现。这两种策略的主要区别在于，`WebRequestInterceptor`
    与底层技术无关。它可以在 JSF 或 Servlet 环境中使用，而无需更改实现。而 `HandlerInterceptor` 只能在 Servlet 环境中使用。`HandlerInterceptor`
    的一个优点是，我们可以用它来阻止处理器的调用。我们通过从 `preHandle` 方法返回 `false` 来实现这一点。


    ##### 配置拦截器


    要使用拦截器，我们需要在配置中进行配置。配置拦截器包含两个步骤：


    1.  我们需要配置拦截器本身。

    2.  我们需要将其连接到我们的处理器。


    将拦截器连接到我们的处理器有两种方式。可以同时使用这两种方法，但我们不推荐这样做。首先，我们可以在配置中显式地将拦截器添加到处理器映射中。其次，我们可以使用
    `org.springframework.web.servlet .config.annotation.InterceptorRegistry` 来添加拦截器。


    通常，更推荐使用 `InterceptorRegistry` 来添加拦截器，仅仅因为这是一种非常便捷的添加方式。而且，限制拦截器匹配哪些 URL 也非常容易（我们将在关于
    `InterceptorRegistry` 的部分进行说明）。


    ###### 显式配置带有拦截器的 HandlerMapping


    要将拦截器注册到处理器映射中，我们首先需要获取相关的处理器映射。为此，我们需要显式地添加它们，或者扩展 Spring 基类以获取对它们的引用（参见清单 6-7）。接下来，我们只需将所有拦截器添加到这些实例中。当使用多个处理器映射时，这可能会相当繁琐，尤其是当我们只想将拦截器应用于某些特定的
    URL 时。


    ***清单 6-7.** 带有拦截器的显式 HandlerMapping 配置示例*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `import org.springframework.context.annotation.ComponentScan;`

    `import org.springframework.context.annotation.Configuration;`

    `import org.springframework.web.servlet.config.annotation.EnableWebMvc;`

    `import org.springframework.web.servlet.config.annotation.WebMvcConfigurationSupport;`

    `import org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping;`


    `@Configuration`

    `@EnableWebMvc`

    `@ComponentScan(basePackages = { "com.apress.prospringmvc.bookstore.web" })`

    `public class WebMvcContextConfiguration extends WebMvcConfigurationSupport {`


    `    @Override`

    `    public RequestMappingHandlerMapping requestMappingHandlerMapping() {`

    `        RequestMappingHandlerMapping handlerMapping;`

    `        handlerMapping = super.requestMappingHandlerMapping();`

    `        handlerMapping.setInterceptors(getAllInterceptors());`

    `        return handlerMapping`

    `    }`

    `}`

