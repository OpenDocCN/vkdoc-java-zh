- fmt: "#### XML and JSON\n\nSpring MVC has another way of serving XML or JSON to\
    \ our clients. We can use the `ContentNegotiatingViewResolver` to our advantage.\
    \ Spring has two special view implementations to convert objects to XML or JSON,\
    \ respectively, `org.springframework.web.servlet.view.xml.MarshallingView` and\
    \ `org.springframework.web.servlet.view.json.MappingJacksonJsonView`. The XML-based\
    \ view uses the Spring XML support to marshall our model to XML. The JSON view\
    \ uses the Jackson library. We can quite easily configure our view resolver to\
    \ also expose XML and/or JSON to our clients. We simply can add a default view\
    \ for XML and JSON (we can also add additional view resolvers, as we did for the\
    \ PDF and Excel documents). [Listing 8-25](#Chapter08.html#list_8_25) is the modified\
    \ configuration (see the highlighted parts).\n\n**Listing 8-25.** ViewConfiguration\
    \ for XML and JSON\n\n```java\npackage com.apress.prospringmvc.bookstore.web.config;\n\
    \n// Other imports omitted\n\nimport org.springframework.oxm.Marshaller;\nimport\
    \ org.springframework.oxm.xstream.XStreamMarshaller;\nimport org.springframework.web.servlet.view.json.MappingJacksonJsonView;\n\
    import org.springframework.web.servlet.view.xml.MarshallingView;\n\nimport com.apress.prospringmvc.bookstore.web.view.OrderExcelView;\n\
    import com.apress.prospringmvc.bookstore.web.view.OrderPdfView;\n\n@Configuration\n\
    public class ViewConfiguration {\n\n    @Bean\n    public ContentNegotiatingViewResolver\
    \ contentNegotiatingViewResolver() {\n        ContentNegotiatingViewResolver viewResolver;\n\
    \        viewResolver = new ContentNegotiatingViewResolver();\n        List<ViewResolver>\
    \ viewResolvers = new ArrayList<ViewResolver>();\n        viewResolvers.add(pdfViewResolver());\n\
    \        viewResolvers.add(xlsViewResolver());\n        viewResolver.setViewResolvers(viewResolvers);\n\
    \        List<View> defaultViews = new ArrayList<View>();\n        defaultViews.add(jsonOrderView());\n\
    \        defaultViews.add(xmlOrderView());\n        viewResolver.setDefaultViews(defaultViews);\n\
    \        return viewResolver;\n    }\n\n    @Bean\n    public MappingJacksonJsonView\
    \ jsonOrderView() {\n        MappingJacksonJsonView jsonView = new MappingJacksonJsonView();\n\
    \        jsonView.setModelKey(\"order\");\n        return jsonView;\n    }\n\n\
    \    @Bean\n    public MarshallingView xmlOrderView() {\n        MarshallingView\
    \ xmlView = new MarshallingView(marshaller());\n        xmlView.setModelKey(\"\
    order\");\n        return xmlView;\n    }\n\n    @Bean\n    public Marshaller\
    \ marshaller() {\n        return new XStreamMarshaller();\n    }\n\n    // Other\
    \ methods omitted, see listings 8-22 and 8-24\n}\n```\n\nFor XML to work, we also\
    \ need to configure an `org.springframework.oxm.Marshaller` implementation. We\
    \ choose here to use the XStream^([8](#Chapter08.html#CHP-8-FN-8)) library because\
    \ that is quick and easy to use. To use another solution, simply configure the\
    \ appropriate marshaller. More information on marshalling and XML can be found\
    \ in the Spring Reference guide.\n\n![Image](images/square.jpg) **Caution** When\
    \ using these type of views together with an ORM implementation (like in our sample)\
    \ one could get issues like lazy loading or loading half the database due to collections\
    \ getting initialized.\n\nIf we now change the URL in the browser to end in either\
    \ `.json` or `.xml`, we will get a JSON or XML representation of our order ([Figure\
    \ 8-6](#Chapter08.html#fig_8_6) is the JSON sample). We have now five different\
    \ ways of viewing our order (HTML, PDF, Excel, JSON and XML) without touching\
    \ our controller and by simply changing our configuration.\n\n![Image](images/9781430241553_Fig08-06.jpg)\n\
    \n**Figure 8-6.** JSON Representation of our Order\n\n_________\n\n⁸ [`http://xstream.codehaus.org`](http://xstream.codehaus.org)\n\
    \n#### JasperReports\n\nSpring MVC provides support for the reporting engine called\
    \ JasperReports.^([9](#Chapter08.html#CHP-8-FN-9)) This reporting engine uses\
    \ report designs in XML and can output different formats based on that XML. There\
    \ is a powerful report designer called iReport Designer which can be used to create\
    \ the report designs. One could use an XML or text editor to create the designs,\
    \ but that isn’t recommended because the XML is very verbose.\n\nSpring supports\
    \ JasperReports with a view resolver and six different view implementations. The\
    \ view resolver is, not surprisingly, the `org.springframework.web.servlet.view.jasperreports.JasperReportsViewResolver`.\
    \ The view implementations can be found in the same package. They are\n\n> * \
    \  `JasperReportsCsvView`\n> *   `JasperReportsHtmlView`\n> *   `JasperReportsPdfView`\n\
    > *   `JasperReportsXlsView`\n> *   `ConfigurableJasperReportsView`\n> *   `JasperReportsMultiFormatView`\n\
    \nThe first four implementations produce a predefined format, either CSV, HTML,\
    \ PDF, or Excel. For the fifth you can configure the format to export; it allows\
    \ for setting the specific `net.sf.jasperreports.engine.JRExporter` implementation\
    \ to use to generate a report. The last view implementation acts as a wrapper\
