  trans: '

    ##### 填写报告


    与之前的 PDF 和 Excel 示例类似，如果能向用户展示一些内容，那将非常不错。与其他视图实现一样，Jasper Reports 的视图实现也使用模型中的数据进行渲染。不过，Jasper
    的做法与其他视图技术略有不同。


    如果我们的模型包含单个属性，并且该属性是 `net.sf.jasperreports.engine.JRDataSource`、`net.sf.jasperreports.engine.JRDataSourceProvider`
    或 `javax.sql.DataSource`，那么它将直接使用（如果是 `DataSource`，则需要在报告中包含查询语句）。如果该属性是 `Collection`
    或数组，它将被转换为可用的 `JRDataSource` 实现。


    如果我们的模型包含多个属性，则需要指定要使用哪个属性。我们通过设置视图的 `reportDataKey` 属性来实现这一点。如果不这样做，可能会导致意外结果，因为系统会使用检测到的第一个
    `JRDataSource`、`Collection` 或数组来填充报告。


    报告需要 `net.sf.jasperreports.engine.JRDataSource` 来检索数据并渲染报告。JasperReports 为不同的数据源提供了多种实现，范围从数据库到
    Excel 文档。


    ### 总结


    本章涵盖了 Spring MVC 的视图部分。我们通过介绍几个通用的 `ViewResolver` 实现来探讨视图解析。我们还介绍了 Spring MVC
    支持的几种视图技术，并解释了如何配置 Spring 来使用它们。我们从 JSP 开始，简要介绍了 JSF 以及如何将 Spring 集成到 JSF 应用程序中。接着，我们研究了几种模板解决方案，具体来说，涵盖了
    Tiles、Velocity 和 FreeMarker。


    在基于 Web 的视图之后，我们研究了不同的视图技术，例如如何在不更改控制器的情况下创建 PDF 和 Excel，只需添加一个 `ContentNegotiatingViewResolver`
    和相应的 `View` 实现即可。


    在上一章中，我们介绍了 JSON，而在本章中，我们探讨了另一种将模型（部分）暴露为 JSON 或 XML 的方法。最后，我们研究了 JasperReports，用于基于模板语言创建报告。


    本章需要掌握的一个重要内容是控制器逻辑与视图逻辑的分离（这一点通过我们订单的不同表现形式得到了证明）。这展示了应用关注点分离的强大之处以及它带来的灵活性。


    我们可能永远不会在单个应用程序中使用所有这些技术。很可能仅限于两到三种不同的技术（用于我们的页面，可能还会创建 PDF 或 Excel 文件）。但拥有更改或简单地为应用程序添加新视图层的灵活性，这非常好。


    ## 第 9 章


    ## 测试 Spring MVC 应用程序


    在大多数项目中，测试都是一个难点。我们都知道测试很重要，但我们也知道测试需要时间，并且编写好的测试很困难。测试还需要代码库中有足够的基础设施。


    测试也不是很吸引人。它不涉及制作具有炫酷效果的闪亮 UI，也不需要你做出出色的设计（不要误会，测试需要*良好*的设计，但它大多是重复性的，不像生产代码那样引人入胜）。也许最大的挑战是，在编写测试时，你的项目似乎没有进展。感觉像是在浪费时间，而本可以用来构建功能。因此，测试有时会被“遗忘”，或者承诺稍后再编写测试。


    尽管有大量的书籍，甚至互联网上有更多的参考资料，但我们不打算讨论方法论之类的东西。在本章中，我们首先要提醒你测试为何如此重要，并且我们还将尝试定义本章中将如何开展测试。


    在代码示例中，我们将向你介绍一种使用 Spring 测试支持进行测试的方法，这种方法既吸引人又易于处理。我们将展示测试应用程序的不同方法以及如何构建这些测试。


    本章的标题是“测试 Spring MVC 应用程序”，这是广义上的意思，因为我们将在应用程序的每个层面讨论测试。我们将从简单的部分开始，即如何使用 Spring
    的测试支持测试我们的后端模块：存储库和服务。我们还将向你展示如何以及何时使用模拟对象。之后，我们将讨论如何测试 MVC 控制器，最后对我们的页面执行完整的浏览器测试。


    ### 测试介绍


    在深入代码之前，我们想确保你了解编写测试为何如此有益。我们还将探讨一些重要的事情，你可以通过这些事让测试在你的项目中变得（并保持）有吸引力。当编写测试成为一种痛苦时，可以肯定测试质量很差，甚至更糟，根本没有编写测试。为了结束我们的介绍，我们将研究不同类型的测试。我们将解释它们之间的区别，并更深入地研究本章将要涵盖的测试类型。那么，让我们先来看看为什么你应该投入时间编写测试。

    '
- fmt: '# Why Should I Bother Writing Tests?


    Testing should be a natural reflex that is part of your daily development process,
    just like writing functionality, delivering builds, fixing bugs, tracking issues
    and so on.


    Testing takes time and we know that. Writing good test cases sometimes can be
    more complex than writing the code to implement the actual business case. Therefore
    you should do everything in your power to make testing within your project as
    smooth and easy as possible. This is the first requirement for having successful
    testing within a project. If it takes too much trouble to write a test, or a test
    is never automatically run, people will find excuses not to write them. A test
    should be considered a first-level citizen within your project.


    We all know the feeling; after you changed some code, how can you be sure the
    code actually works? Some might argue that depending on your experience, background,
    and skills this fact alone does not require a test per se. That might be so, but
    what about the impact of your change? Your code might work fine, but do you know
    it doesn’t break any other code depending on it? Also, have you thought about
    the people coming behind you who will need to change your code? They are looking
    for some guarantee that what they did is actually OK and did not break anything
    else.


    Without testing, your implementation might look like [Figure 9-1](#Chapter09.html#fig_9_1)
    before you even realize it:


    ![Image](images/9781430241553_Fig09-01.jpg)


    ***Figure 9-1.** Implementation deformation without tests*


    This diagram represents the requirements to be implemented and the actual implementation.
    It is referred to as the “amoeba effect” in Jaroslav Tulach’s book *Practical
    API Design*^([1](#Chapter09.html#CHP-9-FN-1)) – admittedly in a different context,
    but the idea is also applicable here. If we were all perfect developers, writing
    100% correct code, the implementation would have the same rectangular shape as
    the requirements. Unfortunately, that is not the case, and the implementation
    will be deformed. You can also call it “buggy,” or “not compliant” in terms of
    what has been asked for.


    ![Image](images/square.jpg) **Note** Here we consider the requirements as being
    the absolute truth, since they are drawn in straight lines forming a rectangular
    shape. In practice, this is also not true. The requirements will also contain
    a failure margin beyond to what is really been asked for. But from the developer’s
    point of view the requirements are what they are, and the code should resemble
    them 100% (if not, the requirements should be changed first).


    So, wouldn’t it be great to have some kind of robot super developer that is integrated
    in the project, and that told you every time your implementation was going to
    deform, so you could have stopped this?


    Deformation might sneak into your code in different ways. You might have caused
    it by simply refactoring something in the application, or after changing some
    functionality. After performing even the smallest change, you could call the robot
    developer for free and ask it to check all dependencies and analyze all impacts
    of your work. After a couple of seconds, the robot developer could say; “you did
    a good job, I inspected all code and everything seems to be OK!” Or maybe the
    robot says: “Attention, you broke a business rule in that class at line x!” In
    both cases you will be very happy. In the first case you will be experiencing
    the “cozy warm feeling effect.” In the second case you are thankful to the robot
    pointing out a potential bug. In that case you continue by changing your code
    (or your test) so it maintains the rectangular form as closely as possible.


    _________


    ¹ Jaroslav Tulach, *Practical API Design: Confessions of a Java Framework Architect*
    (Apress 2008)


    That robot developer exists and is hidden in your tests. But you have to build
    it, bit by bit. Every time you can write a test case, you should. Every time you
    write a test case, you should make the best out of it and you should treat it
    as important as the code you are testing. Test cases are investments, and they
    safeguard the future of your project.


    After you have a suitable test harness (a suite of tests), you can make sure that
    after every change your code still complies with the harness. The harness is formed
    after the requirements, which means that each test tests a part of the requirements.
    If you add up all the tests, you ideally have tested all the requirements of your
    project (see [Figure 9-2](#Chapter09.html#fig_9_2)).


    ![Image](images/9781430241553_Fig09-02.jpg)


    ***Figure 9-2.** Adding a test harness to keep the code in line with the requirements*


    In this figure we added a test harness that attempts to map our testing to our
    requirements. As you can see, the test harness isn’t a perfect rectangle either,
    but it is a lot closer than the badly deformed implementation. A test harness
    cannot be perfect, because it never truly tests everything and also can contain
    bugs itself. However, applying the harness on this deformed implementation will
    yield a lot of failures that you can fix until your implementation becomes more
    and more like your requirements. And above all, after fixing this code to map
    closely to the requirements, your test harness will act as a monitor for your
    code. Every time a new deformation occurs, you will be alerted so you can take
    proper action.


    How you write your tests, before or after your actual production code is up to
    you. That discussion is beyond the scope of this chapter. But it can be said that
    if you write a test after writing the code, it’s best to keep the interval as
    short as possible. In the model shown in [Figure 9-2](#Chapter09.html#fig_9_2),
    the implementation that we are testing should be seen as a very small part of
    your project. It would represent a single class or even a single method, for which
    you write a unit test— as soon as possible after writing the code.'
