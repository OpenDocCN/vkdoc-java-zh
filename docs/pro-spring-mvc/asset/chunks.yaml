- fmt: "`xsi:schemaLocation=\"http://www.springframework.org/schema/beans http://www.springframework.org/schema/beans/spring-beans-3.1.xsd\
    \ http://www.springframework.org/schema/security http://www.springframework.org/schema/security/spring-security-3.1.xsd\"\
    `\n\nEvery security feature will use the namespace prefix \"security.\"\n\n**Note**\
    \ You can also make the Spring Security namespace the default namespace. Here\
    \ we have chosen to use the default namespace for the core Spring beans functionality,\
    \ which is the default in all our other Spring configuration files as well. However,\
    \ it would also work to switch them in this case, since this is a configuration\
    \ file dedicated to Spring Security, where you will be using more of the Spring\
    \ Security elements than from the bean namespace. In that case, you could drop\
    \ the \"security\" prefix, as all security elements will be accessible in the\
    \ default namespace, without any prefix. When there is a lot of security configuration,\
    \ it can make your XML look less cluttered.\n\n² [`http://markmail.org/message/5q7gpipxdiqxsu6p?q=+list:org.apache.tomcat.dev`](http://markmail.org/message/5q7gpipxdiqxsu6p?q=+list:org.apache.tomcat.dev)\n\
    \nNext, we need to define the \"delegate\" to which our `DelegatingFilterProxy`\
    \ will delegate. This is done with the `<security:http>` element, as shown in\
    \ [Listing 13-4](#Chapter13.html#list_13_4).\n\n***Listing 13-4:** The Spring\
    \ Security namespaced filter chain configuration*\n\n```\n<security:http>\n  \
    \   <security:form-login login-page=\"/public/authentication/login.htm\" default-target-\n\
    url=\"/public/main.htm\"/>\n</security:http>\n```\n\nWhat this element does is\
    \ create a filter chain and registers it in the application context with the default\
    \ bean ID `springSecurityFilterChain`. The `DelegatingFilterProxy` will use the\
    \ name of the filter to look up this bean, and delegate control to it. If you\
    \ name the filter `someFilter`, it will look up the filter chain with bean ID\
    \ `someFilter`, which results in no bean being found. Before we continue we need\
    \ to explain what the Spring Security filter chain is and what it will do for\
    \ us.\n\nThe filter chain is the core component in capturing requests and dealing\
    \ with what has to be done. Almost everything in the main Spring Security configuration\
    \ is handled by a filter in the filter chain. You can plug in or remove filters\
    \ at will, and every filter will have a specific job (see [Figure 13-3](#Chapter13.html#fig_13_3)).\n\
    \n***Figure 13-3.** Filter delegates to the configured application filter chain*\n\
    \nIn [Listing 13-4](#Chapter13.html#list_13_4), we implicitly configured an element\
    \ that will send the user to the `login.htm` (specified by the `login-page` attribute)\
    \ page if accessing a secured resource without being authenticated. When the user\
    \ logs in, the filter will automatically redirect the user back to the requested\
    \ secured resource. Or, the user might be redirected to `main.htm`, which renders\
    \ the home page (defined by the `default-target-url` attribute) if there was no\
    \ previously requested secure page but the user logged in directly via the login\
    \ page. In that case we also send a parameter, indicating that authentication\
    \ was successful. The main page in question will detect this and show a message\
    \ that the authentication process succeeded. This element will result in a filter\
    \ being added to the filter chain to take care of this.\n\nWhile you will be able\
    \ to plug in your own custom filters, many existing filters are already at your\
    \ disposal. It is beyond the scope of this book to discuss them all, but in the\
    \ Spring Security reference manual^([3](#Chapter13.html#CHP-13-FN-3)) you will\
    \ find more information about them.\n\nFor your convenience we have included the\
    \ complete list here in [Table 13-2](#Chapter13.html#tab_13_2). It will give you\
    \ an idea of what is already available for you to use. The bean alias will be\
    \ important to refer to the filter if you defined such. For example, if you add\
    \ your own custom filters, you will be able to position them in the chain. Custom\
    \ filters can be defined using the `<security:custom-filter />` element, for example\
    \ `<security:custom-filter ref=\"myCustomFilter\"/>`. By explicitly referencing\
    \ these filters you can position them before or after a specific filter. For example,\
    \ if you want to position `myCustomFilter` after the `FORM_LOGIN_FILTER`, you\
    \ could define it as\n\n```\n <security:custom-filter ref=\"myCustomFilter\" after=\"\
    FORM_LOGIN_FILTER\"/>\n```\n\nThe namespace element or attribute is the configuration\
    \ element that triggers the addition of the filter in the chain. The filters are\
    \ listed in the table in the order they would be in the chain if you define them.\n\
    \n³ [`http://static.springsource.org/spring-security/site/docs/3.1.x/reference/springsecuritysingle.html#filter-stack`](http://static.springsource.org/spring-security/site/docs/3.1.x/reference/springsecuritysingle.html#filter-stack)\n\
    \nAs it turns out, we already configured a filter in [Listing 13-4](#Chapter13.html#list_13_4),\
    \ by adding:\n\n```\n<security:form-login login-page=\"/public/authentication/login.htm\"\
    \ default-target-\nurl=\"/public/main.htm\"/>\n```\n\nIf you take a look at the\
    \ [Table 13-2](#Chapter13.html#tab_13_2), you will see that the `http/form-login`\
    \ configured the `UsernamePasswordAuthenticationFilter`. This filter will leverage\
    \ the previously described functionality of redirecting the user to the login\
    \ page or the index page. As the name implies, it also covers other functionality,\
    \ as we will discuss later.\n\n#### Defining Which Resources to Secure\n\nNext\
    \ we must tell Spring Security which resource should be secured. This is again\
    \ done by implicitly adding a filter to the filter chain. We don't declare a new\
    \ filter, but instead use an existing one provided by Spring Security. We will\
    \ use an element from the security namespace: `<security:intercept-url>`. If you\
    \ look at [Table 13-2](#Chapter13.html#tab_13_2), you will see that this element\
    \ (`intercept-url`) matches the `ChannelProcessingFilter` and will be a child\
    \ element of the `http` element. This is the filter that Spring Security will\
    \ add automatically to the chain when we specify `<security:intercept-url>`. The\
    \ filter will perform the authentication check if the resource you entered in\
    \ the pattern matches with the resource requested.\n\nAt this point we have a\
    \ mixture of flows and pages, the latter being controlled directly by a Spring\
    \ MVC controller. We will list them here for completeness. For each we will indicate\
    \ whether it should be available publicly or privately (authenticated access only).\
    \ Let's start with the flows, in [Table 13-3](#Chapter13.html#tab_13_3).\n\nNext,\
    \ in [Table 13-4](#Chapter13.html#tab_13_4) we will list the URLs for which there\
    \ is an `@RequestMapping` in a Spring MVC controller. We again define if they\
    \ should be available publicly or only after authentication.\n\nTo organize the\
    \ pages that require public or authenticated access, we are going to group them\
    \ under `WEB-INF/view/public` and `WEB-INF/view/secured`.\n\n#### Configuring\
    \ Access to Resources\n\n[Listing 13-5](#Chapter13.html#list_13_5) shows the preceding\
    \ access rules converted to our XML configuration and added to the base configuration\
    \ we already put together in [Listing 13-4](#Chapter13.html#list_13_4).\n\n***Listing\
    \ 13-5.** Adding the intercept-url rules based on the request URIs we explicitly\
    \ want to configure*\n\n```\n<security:http use-expressions=\"true\" >\n<security:form-login\
    \ login-page=\"/public/authentication/login.htm\"\n    default-target-url=\"/public/main.htm\"\
    \n    authentication-failure-url=\"/public/authentication/login.htm\"  />\n\n\
    \    <security:intercept-url pattern=\"/index.jsp\" access=\"permitAll\" />\n\n\
    \    <security:intercept-url pattern=\"/public/**\" access=\"permitAll\" />\n\
    \    <security:intercept-url pattern=\"/secured/**\" access=\"fullyAuthenticated\"\
    />\n\n    <security:intercept-url pattern=\"/**\" access=\"denyAll\" />\n</security:http>\n\
    ```\n\nThis listing should be read from top to bottom. This means that you should\
    \ specify the more specific rules first, followed by the more general rules. If\
    \ a resource matches a pattern, either directly or by wildcards specified in the\
    \ pattern, the level of authentication specified by the `access` attribute will\
    \ be required. If that condition is met, access is granted; otherwise it is denied.\n\
    \nFirst we declared that `index.jsp` (our welcome) file is accessible for everyone.\
    \ Next we defined the `/secured/**` and `/public/**` matching patterns. By default\
    \ ant^(**[4](#Chapter13.html#CHP-13-FN-4)**) style matching patterns are used.\
    \ Every URL beginning with `/secured` requires the user to be fully authenticated\
    \ before access is granted. URLs beginning with `/public` are able to be accessed\
    \ by any one. We will discuss the `access` attribute and where those values are\
    \ coming from in a minute.\n\nAs you recall, our flows are placed together with\
    \ our pages. To start `ordersOverviewflow` you need to be fully authenticated,\
    \ since the path for this flow is `secured/ordersOverview`. Because of this we\
    \ do not need to specify extra rules, since access to anything under `/secured`\
    \ will be captured by our `/secured/**` rule.\n\nIf you store your flows in a\
    \ separate location, however, for example under `WEB-INF/flows`, and you made\
    \ `WEB-INF/flows` your base path using the `base-path` attribute of the `<webflow:flow-registry>`,\
    \ you will have to follow the same convention. That is, you will have to put secured\
    \ flows under `flows/secured` and public flows under `flows/public`. If you don't,\
    \ for example if you put all flows under `/flows`, you will have to add separate\
    \ `<security:intercept-url>` rules for each flow.\n\nIf we request access to the\
    \ `/createOrders-flow` we don't need to be authenticated to get access. If we\
    \ try to access the `/placeOrders-flow`, however, we will need to be authenticated\
    \ first. If we are not authenticated, we are redirected to the login page. After\
    \ the login succeeds, Spring Security takes us back to the secured resources we\
    \ asked for in the first place (`/placeOrders-flow` in this case).\n\nYou might\
    \ also have noticed that we added an attribute in the `<security:http>` element\
    \ called `use-expressions` with value `true`. We also have to explain where the\
    \ `fullyAuthenticated`, `permitAll` and `denyAll` values suddenly come from. Before\
    \ we can do that we have to explain a bit more about how Spring Security works.\n\
    \nWhenever a `<security:intercept-url>` matches an incoming request URL, Spring\
    \ Security needs to know which conditions should be checked to grant or deny access.\
    \ These conditions are checked by a so called `org.springframework.security.access.AccessDecisionManager`.\
    \ An `AccessDecisionManager` has in turn one or more instances of `org.springframework.security.access.AccessDecisionVoter`.\
    \ Each voter will evaluate if access is granted, abstained, or denied. This is\
    \ indicated by the return value of the `vote` method of the `AccessDecisionVoter`.\
    \ This return value is a primitive `int`, which can be one of the following constants:\
    \ `AccessDecisionVoter.ACCESS_ABSTAIN`, `AccessDecisionVoter.ACCESS_DENIED`, or\
    \ `AccessDecisionVoter.ACCESS_GRANTED`\n\n⁴ [`http://static.springsource.org/spring/docs/3.1.0.RELEASE/javadocapi/org/springframework/util/AntPathMatcher.html`](http://static.springsource.org/spring/docs/3.1.0.RELEASE/javadocapi/org/springframework/util/AntPathMatcher.html)\n\
    \nThere are three implementations of the `AccessDecisionManager` interface. We\
    \ will be using `org.springframework.security.access.vote.AffirmativeBased`. This\
    \ `AccessDecisionManager` will allow access if at least one of its voters returns\
    \ `ACCESS_GRANTED`. The other two are `org.springframework.security.access.vote.ConsensusBased`^(**[5](#Chapter13.html#CHP-13-FN-5)**)\
    \ and `org.springframework.security.access.vote.UnanimousBased`.^([6](#Chapter13.html#CHP-13-FN-6))\
    \ See their respective JavaDoc for more details.\n\nThe `access-decision-manager-ref`\
    \ attribute of the `http` element is the way to reference an `AccessDecisionManager.`\
    \ However, when defining the `use-expressions` attribute, an `AffirmativeBased`\
    \ `AccessDecisionManager` will be added for us automatically. So there is no need\
    \ to configure an `AccessDecisionManager` ourselves, and thus we can leave the\
    \ `access-decision-manager-ref` attribute absent. The `AccessDecisionVoter` that\
    \ is used is `org.springframework.security.web.access.expression.WebExpressionVoter`,\
    \ which will help resolving the (SpEL) expressions you will be able to use in\
    \ the `access` attribute.\n\nAt this stage we have configured Spring Security\
    \ so that it will intercept each request and scan our list of `<security:intercept-url>`\
    \ entries. If the request resource matches any of the listed entries, either directly\
    \ or by wildcard matching, the access attribute is checked to see what has to\
    \ be done. If the access attribute is `permitAll`, access is always granted. If\
    \ the access attribute is `fullyAuthenticated`, the user must be authenticated\
    \ to be allowed access. If that is not the case, the user is redirected to the\
    \ login page automatically. After login, the user will be redirected back to the\
    \ secured resource.\n\nFinally, if the requested resource does not match any entry,\
    \ access is denied by default by using the `denyAll` `access` attribute. By default\
    \ this will render the server's default \"403 access denied\" page. So accessing\
    \ a random URL will bring up this page. Even after the user has logged in, accessing\
    \ a random URL will still trigger the \"access denied\" page, because there was\
    \ no previous rule that explicitly *granted* access. All resources that are not\
    \ explicitly listed are now by default shielded from any user access.\n\n**Tip**\
    \ When configuring access to resources, it is always wise to close up with a deny\
    \ all rule. If the access requirements for the requested resource aren't listed,\
    \ access is simply denied. When the user accesses a resource other than the ones\
    \ we listed, a \"403 access denied\" page will be shown on the user's browser.\
    \ This makes sure that resources which are not explicitly configured cannot be\
    \ accessed by accident.\n\n**Note** In the list of resources, we mentioned that\
    \ access to resources should be public. To do this, we changed the mapping in\
    \ the resource holder defined in `WebMvcContextConfiguration`. We prefixed the\
    \ URL with `/public` in order to make our resources publicly available without\
    \ requiring authentication:\n\n```\npublic void addResourceHandlers(ResourceHandlerRegistry\
    \ registry) {\nregistry.addResourceHandler(\"/public/resources/**/*\").\n    addResourceLocations(\"\
    classpath:/META-INF/web-resources/\");\n}\n```\n\n⁵ [`http://static.springsource.org/springsecurity/site/docs/3.1.x/apidocs/org/springframework/security/access/vote/ConsensusBased.html`](http://static.springsource.org/springsecurity/site/docs/3.1.x/apidocs/org/springframework/security/access/vote/ConsensusBased.html)\n\
    \nWe refactored all URL mapping in the pages accordingly to be prefixed with `/public`.\n\
    \n##### Overview of Expression Methods and Literals\n\nWe still need to explain\
    \ where the `permitAll`, `fullyAuthenticated` and `denyAll` come from. These are\
    \ all Spring EL expressions that are evaluated with a special Spring Security-aware\
    \ context. In a normal Spring EL environment, evaluating `denyAll` would trigger\
    \ an exception. However, in this scope, extra methods and properties are implicitly\
    \ available for your expressions.\n\nAlthough we cannot cover all possibilities\
    \ here, [Table 13-5](#Chapter13.html#tab_13_5) provides a quick overview of the\
    \ methods you can use in the `access` attribute when using expressions, and [Table\
    \ 13-6](#Chapter13.html#tab_13_6) summarizes the properties).\n\n**Note** These\
    \ methods can be found in the super class `org.springframework.security.access.expression.SecurityExpressionRoot`\
    \ and its subclass `org.springframework.security.web.access.expression.WebSecurityExpressionRoot`.\
    \ You will see that in the super class there are additional methods not covered\
    \ in [Table 13-5](#Chapter13.html#tab_13_5). We didn't include them, because they\
    \ are aliases; for example, `hasAuthority` and `hasAnyAuthority` are aliases for\
    \ respectively `hasRole` and `hasAnyRole`. We also omitted the `hasPermission`\
    \ methods, which are specifically for method-based security in combination with\
    \ post- and pre filtering.\n\n⁶ [`http://en.wikipedia.org/wiki/CIDR_notation`](http://en.wikipedia.org/wiki/CIDR_notation)\n\
    \nThe methods in [Table 13-6](#Chapter13.html#tab_13_6) can also be accessed as\
    \ properties. They provide access to a getter method that returns an `Object`,\
    \ such as the `principal`. The principal is just an `Object`. Most of the time\
    \ this is an instance of the `org.springframework.security.core.UserDetails` interface,\
    \ as we will discuss later. Or they provide a shortcut for a getter method that\
    \ returns a boolean (those properties start with `is` rather than `get`). For\
    \ example, the method `boolean isFullyAuthenticated()` can be called directly\
    \ as the property `isFullyAuthenticated`. The result is exactly the same as the\
    \ method syntax, but saves you the effort of typing the parentheses.\n\nRemember\
    \ that the expressions, whether you are using methods or properties, are Spring\
    \ EL expressions. You will be able to use logical operators such as `and`, `or`\
    \ etc. For example `access=\"hasRole('ROLE_X')` **`and`** `hasRole('ROLE_Y')`\n\
    \n#### Configuring Authentication\n\nWhen users are redirected to the login page,\
    \ the application asks them to enter a username and password combination in order\
    \ to proceed. Spring Security will receive this information but needs to verify\
    \ that the user exists and that the password supplied matches for that user.\n\
    \nIn order to do this we need some kind of user store to hold the users (and passwords)\
    \ that are able to access the application. To keep things simple for now, we will\
    \ use an in-memory data store, which we will fill with users and passwords entirely\
    \ specified in the configuration. Later we will see how to replace this with a\
    \ database store.\n\nWe need to configure an `org.springframework.security.authentication.AuthenticationManager`\
    \ to do this. Spring Security offers a namespacing construct (`<security:authentication-manager>`)\
    \ that, unlike the `org.springframework.security.access.AccessDecisionManager`,\
    \ will keep the coding required short and easy. Using this construct we don't\
    \ have to wire this authentication manager explicitly; it will be auto detected\
    \ by Spring.\n\nIn order for the authentication manager to do its job, it needs\
    \ a reference to an authentication provider. This is the bridge to the store that\
    \ contains the user details. In this case we won't reference an external provider\
    \ but use the in-memory user-service, which is declared as `<security:user-service>`\
    \ and takes a list of `<security:user>` elements, each representing a user in\
    \ our system (see [Listing 13-6](#Chapter13.html#list_13_6)). A user has a username\
    \ (abbreviated `name` in this case), a password, and a comma-separated list of\
    \ authorities. The authorities are of no importance for the moment. Later we will\
    \ show how we can use them.\n\n***Listing 13-6.** The authentication manager configuration\
    \ with in-memory user-data store*\n\n```\n<security:authentication-manager>\n\
    \    <security:authentication-provider>\n        <security:user-service >\n  \
    \          <security:user name=\"jd\"            \n                password=\"\
    5238377ba2eac049901b54004ee9e03db62c0ab0b48133a4a162ab3aedfc809f\"\n         \
    \       authorities=\"ROLE_CUSTOMER\"/>\n        </security:user-service>\n  \
    \  </security:authentication-provider>\n</security:authentication-manager>\n```\n\
    \nWhat is important is that this code is not yet complete. As you can see, we\
    \ have a strange and long password. This is called a *one-way hashed password*.\
    \ A one way hash is a cryptographic function that takes plain text as input and\
    \ generates another, weird-looking, string as output, called a hash (or digest).\
    \ The general idea is that the hash cannot (without taking decades of computing\
    \ time) be reverse-engineered to the original plain-text form. In order to compare\
    \ these passwords, one takes the password as entered by the user, hashes it with\
    \ the hash function and then compares the output with the hash stored in the data\
    \ store. If the hashes match, the password is the same.\n\nIn this case we used\
    \ the SHA2 hashing algorithm with an output size of 256-bit (so SHA-256). The\
    \ only problem is that Spring now expects the user to enter the hash\n\n```\n\"\
    5238377ba2eac049901b54004ee9e03db62c0ab0b48133a4a162ab3aedfc809f\"\n```\n\nas\
    \ the password, instead of the readable password. Because Spring does not know\
    \ that what we stored is actually a hash, it thinks that this long string is the\
    \ actual password that the user has to enter.\n\nWhat is left to do is configure\
    \ Spring to take the real plain-text password by the user, hash it using the selected\
    \ hashing algorithm, and then compare the output hash with the hash value we supplied\
    \ in the password field. In [Listing 13-7](#Chapter13.html#list_13_7), we do this\
    \ by specifying the `<security:password-encoder>`. There is not much to configure.\
    \ We just say we are using SHA-256 bit (which is actually SHA version 2). There\
    \ is also a weird sub element, which we will discuss in a minute. With this password\
    \ encoder, Spring Security knows that our passwords are hashed, and that it should\
    \ hash the user's entered password first before comparing the value with the one\
    \ in our data store.\n\n***Listing 13-7.** Adding the password encoder*\n\n```\n\
    <security:authentication-manager>\n    <security:authentication-provider>\n  \
    \      <security:password-encoder hash=\"sha-256\">\n            <security:salt-source\
    \ user-property=\"username\"/>\n        </security:password-encoder>\n       \
    \ <security:user-service >\n<security:user name=\"jd\"\n                password=\"\
    5238377ba2eac049901b54004ee9e03db62c0ab0b48133a4a162ab3aedfc809f\"\n         \
    \       authorities=\"ROLE_CUSTOMER\"/>\n        </security:user-service>\n  \
    \  </security:authentication-provider>\n</security:authentication-manager>\n```\n\
    \n**Note** Why did we make things more complex by introducing a hashed password\
    \ rather than a plain text one, when we are creating just the basic setup? We\
    \ did this for a good reason. Never, ever, store a password in plain text. Not\
    \ even in a temporary (or basic) solution. A wise man once told us \"in practice,\
    \ a temporary solution is the equivalent of a production ready solution that will\
    \ stay there forever.\" Ask yourself; how many times have you developed something\
    \ temporary that is still out there? Also, when working with Spring Security or\
    \ Java, there is no good reason not to hash your passwords. With the Apache Commons\
    \ Codec,^([7](#Chapter13.html#CHP-13-FN-7)) you can create a hash with a single\
    \ line of code. Never store plain-text passwords! Also, if someone performs an\
    \ audit and sees that passwords are in plain text, you will be in trouble. This\
    \ is the first step of any secure application.\n\nYou might wonder, how did we\
    \ generate the hash in the first place? We could have written a small Java tool\
    \ which does that for us, using the Apache Commons Codec:\n\n```\nString hashedPassword\
    \ =\norg.apache.commons.codec.digest.DigestUtils.sha256Hex(plainTextPassword);\n\
    ```\n\nOr, we could have Googled an online site to do that. There are also plenty\
    \ of free tools out there that can generate any kind of hash. Just one note, be\
    \ careful using online generators, as you will be passing around real passwords.\
    \ For testing purposes this will do fine, but for real case scenarios, think about\
    \ writing a tool yourself or downloading a well-known tool**^([8](#Chapter13.html#CHP-13-FN-8))**\
    \ instead.\n\nThe password we hashed is \"secret\". If you would verify this you'll\
    \ notice that the hashes don't quite match. In this case we are using a \"salted\
    \ hash\" which is nothing more than the password suffixed with extra data that\
    \ can be found when authenticating the user. For example, it could be the first\
    \ name of the user. In this case we have chosen the easiest element; the username.\n\
    \n⁷ [`http://commons.apache.org/codec/`](http://commons.apache.org/codec/)\n⁸\
    \ [`http://www.slavasoft.com/hashcalc/`](http://www.slavasoft.com/hashcalc/) `(Windows\
    \ only - freeware)` [`http://sourceforge.net/projects/hash-calculator/files/hash-calculator/`](http://sourceforge.net/projects/hash-calculator/files/hash-calculator/)\
    \ `(Java - open source)`\n\nThe goal of the salt is to make the digests more unique.\
    \ If two users use the same password, the same hash will be generated. When using\
    \ a salt, the hashes will differ, as they are calculated using another suffix\
    \ (in this case their username).\n\nHaving the same hash doesn't hurt, as they\
    \ (practically) cannot be reverse engineered. However, you are giving away a free\
    \ hint: someone looking at the hashes might note that multiple users have the\
    \ same hash, and thereby implicitly know that they also have the same password.\
    \ By adding the salt you are taking away that last hint, and you are also making\
    \ the passwords longer. The longer the password, the more resistant the hash will\
    \ be against attacks.\n\nSpring calculates the salted hash by using this scheme:\n\
    \n```\nplaint_text_password{salt}\n```\n\nIn our case we have to calculate the\
    \ hash as `secret{jd}`, where `jd` is the username of our user. If you now try\
    \ to regenerate the hash with this input string, you'll notice that it will match\
    \ with the hash shown above. We will configure this as shown in [Listing 13-8](#Chapter13.html#list_13_8).\n\
    \n***Listing 13-8.** The password encoder using a property as salt*\n\n```\n<security:password-encoder\
    \ hash=\"sha-256\">\n**<security:salt-source user-property=\"username\"/>**\n\
    </security:password-encoder>\n```\n\nWe have now configured the password encoder\
    \ with a type of hash. Internally, we supplied it with a salt source that has\
    \ a `user-property` with the value `\"username\"`. Let's look in more detail at\
    \ how Spring Security will handle this:\n\n> 1.  Before applying the hash function,\
    \ first resolve our salt. The salt is retrieved from the `UserDetails` object\
    \ (which we will introduce later). The property that should be used from this\
    \ `Object` is indicated by the value of the `user-property` attribute (`\"username\"\
    `). The value from the `username` property is retrieved from the `UserDetails`\
    \ `Object`. That value will be our salt. The salt is then added at the end of\
    \ the password between braces. So, when our password is `secret` and the username\
    \ property of the `UserDetails` object is `jd`, our password string will now be\
    \ `secret{jd}.`\n> 2.  Hash the password string `secret{jd`} using SHA 256bit.\n\
    > 3.  Finally, compare the result from the hash function with the one retrieved\
    \ from the users data store.\n\n#### Putting It All Together\n\nBefore we can\
    \ test our application, we still have to make some modifications to our pages.\
    \ In the previous application our pages were adapted for the custom authentication\
    \ scheme that we created ourselves. In particular, the login and landing page\
    \ need some modifications to work together with Spring Security.\n\nFirst we will\
    \ take care of the login page. Spring Security will perform authentication, based\
    \ on the username and password that we will supply. We will do this by our login\
    \ page, which has username and password fields. But Spring needs to know about\
    \ these items, so we are going see how to handle that. We will also see how we\
    \ can show error messages that the login might have produced.\n\nNext we will\
    \ make a small modification to our home page to indicate whether the authentication\
    \ was successful. Previously, if a user logged in using the login link, he or\
    \ she could only infer that the login must have succeeded since there was no error.\
    \ We will enhance this a bit with a message saying that the authentication succeeded.\n\
    \nFinally, we will change the logout so it is handled by Spring Security as well.\n\
    \n##### Changing the Login Page\n\nAs we explained previously, we implicitly configured\
    \ a filter (`UsernamePasswordAuthenticationFilter`) that will perform redirection\
    \ to the login page and landing page. Besides this, this filter will also listen\
    \ to a preconfigured URL and look for preconfigured request parameters for username\
    \ and password. These default key values are as follows:\n\n> *   Username request\
    \ parameter name: `j_username`\n> *   Password request parameter name: `j_password`\n\
    > *   Request URL: `/j_spring_security_check`\n\n**Note** You can change all three\
    \ of these values on the `<security:form-login>` element by specifying the attributes:\
    \ *`username-parameter`*, *`password-parameter`,* and *`login-processing-url`*.\
    \ We mention this option because it might be worth considering in your own Spring\
    \ projects, although we will leave the values at their defaults for the duration\
    \ of the chapter. The request URL will be in the action of the HTML form. Anyone\
    \ inspecting your HTML source will know you are using Spring Security. While \"\
    security through obscurity\" might by itself give a false sense of security, if\
    \ applied in a well-controlled and secured environment (as we are building here)\
    \ it is considered a plus, since you are removing one more hint. In this case,\
    \ it is the version or software product you are using to secure your application.\n\
    \nThe `login.jsp` now looks like [Listing 13-9](#Chapter13.html#list_13_9).\n\n\
    ***Listing 13-9.** The WEB-INF/view/public/authentication/login.jsp adapted to\
    \ integrate with the Spring Security form based login filter.*\n\n```\n<%@ taglib\
    \ prefix=\"c\" uri=\"http://java.sun.com/jsp/jstl/core\"%>\n<%@ taglib prefix=\"\
    spring\" uri=\"http://www.springframework.org/tags\"%>\n<%@ taglib prefix=\"form\"\
    \ uri=\"http://www.springframework.org/tags/form\"%>\n\n    <spring:url value=\"\
    **/j_spring_security_check**\" var=\"**login**\" />\n        <form action=\"**${login}**\"\
    \ method=\"POST\">\n            <table style=\"width: 100%\">\n              \
    \  <tr>\n                    <td>\n                        <spring:message code=\"\
    label.page.login.username\" />\n                    </td>\n                  \
    \  <td>\n<input type=\"text\" **name=\"j_username\"**/>\n                    </td>\n\
    \                    <td>\n                        <spring:message code=\"label.page.login.password\"\
    \ />\n                    </td>\n                    <td>\n<input type=\"password\"\
    \ **name=\"j_password\"** />\n                    </td>\n                </tr>\n\
    \                <tr>\n                    <td colspan=\"4\">\n\n            \
    \                <c:if test=\"${not empty param.authenticationNok}\">\n      \
    \                          <font color=\"red\">\n<spring:message code=\"label.login.failed\"\
    \n                                                              arguments=\"${SPRING_SECURITY_LAST_EXCEPTION.message}\"\
    \ />\n                                </font>\n                            </c:if>\n\
    \                        </td>\n                    </tr>\n                </table>\n\
    \n                <div align=\"right\" style=\"margin-bottom: 20px; \n       \
    \              margin-top: 10px\" >\n                    <button type=\"submit\"\
    \ id=\"login\">\n                        <spring:message code=\"label.page.login.login\"\
    />\n                    </button>\n                </div>\n        </form>\n</jsp:root>\n\
    ```\n\nAs you can see, we have made sure the input fields for password and username\
    \ have the requested name, so that the parameter will be picked up by Spring.\
    \ We are also submitting our form to the default Spring Security URL for authentication.\n\
    \nWhat you might also notice is that we added a section to display login errors:\n\
    \n```\n<c:if test=\"${not empty param.authenticationNok}\">\n    <font color=\"\
    red\">\n        <spring:message code=\"label.login.failed\"\n            arguments=\"\
    ${SPRING_SECURITY_LAST_EXCEPTION.message}\" />\n     </font>\n</c:if>\n```\n\n\
    When a user supplies bad credentials, Spring Security makes the exception available\
    \ on the session with the key `SPRING_SECURITY_LAST_EXCEPTION`. The only thing\
    \ we have to do is display it. The message can be localized and can also be changed.\
    \ We will discuss this further in the \"Localization\" section of this chapter.\
    \ To detect that a new login failure occurred, we check for the presence of the\
    \ parameter `authenticationNok`*.*\n\nThis parameter is added by us. When Spring\
    \ Security detects a login failure, it can direct to a specified URL. Doing so\
    \ you can pass along additional parameters. To do this redirection we need to\
    \ modify the `<security:form-login>` as shown in [Listing 13-10](#Chapter13.html#list_13_10).\n\
    \n***Listing 13-10.** Forwarding when authentication fails using a parameter*\n\
    \n```\n<security:form-login login-page=\"/public/authentication/login.htm\"\n\
    \    authentication-failure-url=\"**/public/authentication/login.htm?**\n    \
    \                              **authenticationNok=1**\"\n</security:form-login>\n\
    ```\n\nOn authentication failure we redirect back to the login page, but this\
    \ time we append the parameter `authenticationNok`, which will make the message\
    \ appear. We are supplying a value 1 for the parameter, just to let it have a\
    \ value so we can easily test if this parameter is present. The value is of no\
    \ real importance, however. This rounds up the modifications to the login page;\
    \ now we will move on to the home page.\n\n**Note** We also removed the `authentication-flow.xml`\
    \ from the previous example, as login is now handled by Spring Security infrastructure.\
    \ This also means we changed the anchor in `header.jsp` to go to `/public/authentication/login.htm`\
    \ instead of launching the (no longer existing) authentication flow.\n\n#####\
    \ Changing the Home Page\n\nWhen authentication is successful we redirect to the\
    \ home page. In this case we want to show a message that authentication was successful.\
    \ In order to do this, we will add a parameter to the URL specified in the `default-target-url`\
    \ attribute (see [Listing 13-11](#Chapter13.html#list_13_11)).\n\n***Listing 13-11.**\
    \ Configuring the default-target-url, with an extra parameter, which Spring Security\
    \ will redirect the user to after successful authentiction*\n\n```\n<security:form-login\
    \ login-page=\"/public/authentication/login.htm\"\n**default-target-**\n**url=\"\
    /public/main.htm?authenticationOk=1\"**\nauthentication-failure-\nurl=\"/public/authentication/login.htm?authenticationNok=1\"\
    \  />\n```\n\nIn [Listing 13-12](#Chapter13.html#list_13_12) we show the relevant\
    \ portion of the home page (`main.jsp`, located in `WEB-INF/view/public/`), which\
    \ will display the message to the user when login was successful. The code that\
    \ displays the message is indicated in bold.\n\n***Listing 13-12.** Adapting the\
    \ home page to show the appropriate message when login was successful*\n\n```\n\
    <%@ taglib prefix=\"c\" uri=\"http://java.sun.com/jsp/jstl/core\"%>\n<%@ taglib\
    \ prefix=\"spring\" uri=\"http://www.springframework.org/tags\"%>\n<%@ taglib\
    \ prefix=\"form\" uri=\"http://www.springframework.org/tags/form\"%>\n<%@ taglib\
    \ prefix=\"fn\" uri=\"http://java.sun.com/jsp/jstl/functions\"%>\n<%@ taglib prefix=\"\
    sec\"\n        uri=\"http://www.springframework.org/security/tags\"%>\n<sec:authorize\
    \ access=\"fullyAuthenticated\">\n    <c:if test=\"${not empty param.authenticationOk}\"\
    >\n        <div id=\"authenticationOk\"\n            style=\"color: green; display:\
    \ block; margin-left: 15px;\n            margin-bottom: 10px;\">\n           \
    \ <table>\n                <tr>\n                    <td>\n                  \
    \      <ul style=\"list-style-type: disc\">\n                            <li>\n\
    \                                <h3>\n                                   <sec:authentication\n\
    \                                    property=\"principal.username\"\n       \
    \                             var=\"username\" scope=\"request\"/>\n\n**<spring:message**\n\
    **                      code=\"label.page.main.authentication.ok\"**\n**     \
    \                 arguments=\"${username}\" />**\n                           \
    \     </h3>\n                            </li>\n                        </ul>\n\
    \                    </td>\n                </tr>\n            </table>\n    \
    \    </div>\n    </c:if>\n</sec:authorize>\n\n<script>\n    dojo.addOnLoad(function(){\n\
    \        function fadeIt() {\n            if(dojo.byId(\"authenticationOk\")){\n\
    \                dojo.style(\"authenticationOk\", \"opacity\", \"1\");\n     \
    \           var fadeOutArgs = {node: \"authenticationOk\", duration: 15000};\n\
    \                dojo.fadeOut(fadeOutArgs).play();\n            }\n        }\n\
    \    fadeIt();\n    });\n</script\n```\n\nIf someone were to append this parameter\
    \ (`authenticationOk=1`) manually, this would have no side effects, and the message\
    \ would also not be shown. On the home page there is an authentication check around\
    \ the code that shows the message using the security tag library (`<sec:authorize\
    \ access=\"fullyAuthenticated\">`).\n\nWe only check for the `authenticationOk`\
    \ parameter if the user is already authenticated. If we then see that this parameter\
    \ is present, we display a message so the user knows authentication was successful.\
    \ This authentication strategy ensures that the message is shown only once. If\
    \ the authenticated user were to return to the welcome page using the \"home\"\
    \ link, or any other way, we have ensured that the message is not shown a second\
    \ time.\n\nWe will discuss the Spring Security taglibs in detail later in the\
    \ \"Authorizing Access\" section.\n\n##### Logging Out\n\nThe logout functionality\
    \ was until now implemented in our `com.apress.prospringmvc.bookstore.web.controller.AuthenticationController`.\
    \ Let's repeat the code snippet to refresh our memory.\n\n```\n@RequestMapping(value\
    \ = \"/logout\", method = RequestMethod.GET)\npublic String logout(HttpSession\
    \ session) {\n    session.invalidate();\n    return \"redirect:/index.htm\";\n\
    }\n```\n\nWhen the user clicks the logout link, it will direct to `/logout`, which\
    \ will invoke the controller method `logout`, and call `invalidate` on the HTTP\
    \ session. After that the user is redirected to the homepage. Although this is\
    \ not very complex, it should no longer be part of our application code. Spring\
    \ Security can take care of this as well. We can safely remove the code in the\
    \ `AuthenticationController`.\n\nAfter that we will configure Spring Security\
    \ to take over the task. We will do this by configuring the `LogoutFilter`. In\
    \ [Table 13-2](#Chapter13.html#tab_13_2) earlier, we gave an overview of the possible\
    \ filters; the `LogoutFilter` is one of them. This filter had the following entry\
    \ in the table:\n\nThis filter can be declared as an element `(<security:logout>`)\
    \ within the `http` element. The code for this configuration is shown in [Listing\
    \ 13-13](#Chapter13.html#list_13_13).\n\n***Listing 13-13.** Configuring the logout\
    \ functionality in our src/main/resources/spring/spring-security.xml*\n\n```\n\
    <security:logout logout-success-url=\"/public/main.htm\" logout-url=\"/logout\"\
    \ invalidate-\nsession=\"true\"/>\n```\n\nThe `logout-success-url` attribute indicates\
    \ the page to which Spring Security should redirect when the logout was successful.\
    \ In our case this is the home page. The second attribute, `logout-url`, indicates\
    \ the URL where the filter should listen. In our case this is `/logout`. Whenever\
    \ a call is made to `/logout`, the `LogoutFilter` will be invoked and the user\
    \ logged out. The last attribute indicates whether the HTTP session should be\
    \ invalidated as well. If you specify `false`, only the `org.springframework.security.core.context.SecurityContext`\
    \ will be cleared, and no invalidation occurs on the HTTP session. We will cover\
    \ this class in a minute; for now it is enough to know that from the moment you\
    \ are authenticated, the authentication information will be accessible via `org.springframework.security.core.context.SecurityContext`.\
    \ Optionally you can also indicate to clear the entire HTTP session. While it\
    \ is not mandatory, it is in nearly all cases the safest to clear the session\
    \ as well. Invalidating the session is the default behavior if you don't specify\
    \ the `invalidate-session` attribute. We specified it here explicitly so anyone\
    \ reading our security configuration understands that the session is cleared for\
    \ sure (not that we doubt the default value is working, but to give a clear indication,\
    \ not everyone is aware of the defaults).\n\nThe logout link itself in our `header.jsp`\
    \ remains unaltered, as you can see in [Listing 13-14](#Chapter13.html#list_13_14).\n\
    \n***Listing 13-14.** The logout link in our WEB-INF/templates/header.jsp*\n\n\
    ```\n<spring:url value=\"/logout\" var=\"logout\" />\n<a href=\"${logout}\">\n\
    \    <spring:message code=\"nav.logout\"/>\n</a>\n```\n\nThis link now directs\
    \ to `/logout`. The only thing missing is that this link should only appear when\
    \ the user is actually logged in. We will see how to handle this when we introduce\
    \ the authorization tag. Our logout control is now fully operational.\n\n####\
    \ The Complete Security Configuration\n\nIn [Listing 13-15](#Chapter13.html#list_13_15)\
    \ you will find the complete security configuration that we build for this part\
    \ of the chapter (located in `src/main/resources/spring/spring-security.xml`).\
    \ Although we have included a lot of functionality, the configuration part is\
    \ still pretty digestible, as you will see.\n\n***Listing 13-15.** A complete\
    \ overview of the basic security setup*\n\n```\n<security:http use-expressions=\"\
    true\" >\n    <security:form-login login-page=\"/public/authentication/login.htm\"\
    \    \ndefault-target-url=\"/public/main.htm?authenticationOk=1\"\n        authentication-failure-url=\"\
    /public/authentication/login.htm\n                                   ?authenticationNok=1\"\
    />\n\n    <security:intercept-url pattern=\"/index.jsp\" access=\"permitAll\"\
    \ />\n\n    <security:intercept-url pattern=\"/public/**\" access=\"permitAll\"\
    \ />\n    <security:intercept-url pattern=\"/secured/**\"\n    access=\"fullyAuthenticated\"\
    />\n\n    <security:intercept-url pattern=\"/**\" access=\"denyAll\" />\n<security:logout\
    \ logout-success-url=\"/public/main.htm\"\n              logout-url=\"/logout\"\
    \ invalidate-session=\"true\"/>\n</security:http>\n\n<security:authentication-manager>\n\
    \    <security:authentication-provider>\n        <security:password-encoder hash=\"\
    sha-256\">\n            <security:salt-source user-property=\"username\"/>\n \
    \       </security:password-encoder>\n    <security:user-service >\n<security:user\
    \ name=\"jd\"\npassword=\"5238377ba2eac049901b54004ee9e03db62c0ab0b48133a4a162ab3aedfc809f\"\
    \n            authorities=\"ROLE_CUSTOMER\"/>\n        </security:user-service>\n\
    \    </security:authentication-provider>\n</security:authentication-manager>\n\
    ```\n\nTogether with the login and home page modification explained in the previous\
    \ two sections, this secures our entire application. We are now able to log in\
    \ via a form login. The authentication is handled securely via Spring Security.\
    \ All our resources are now secured; some require authentication before a user\
    \ can access them, and others are publicly accessible. Resources that are not\
    \ explicitly listed are denied access by default.\n\nLet's continue and see what\
    \ else we can do!\n\n### Going to the Database\n\nUp until now we have stored\
    \ our user information in the configuration itself. By making use of the `<security:user-service>`,\
    \ Spring Security created an in-memory data store which would be populated with\
    \ the data we specified there. In our current application, users are actually\
    \ stored in the database and modeled as instances of `org.springframework.security.authentication.dao.Account`.\
    \ It would be better to adapt our configuration so that we can load the user's\
    \ account from the existing database tables. As it turns out, this is a very easy\
    \ step to take.\n\nBy defining the `<security:authentication-provider>` Spring\
    \ registered a `org.springframework.security.authentication.dao.DaoAuthenticationProvider`.\
    \ This class will deal with all low-level plumbing. What is important for us is\
    \ that this class delegates to a so-called `org.springframework.security.core.userdetails.UserDetailsService`\
    \ class, which will be responsible for loading the user information from wherever\
    \ suitable. In our previous implementation this was loaded from the in-memory\
    \ data store. Now we will provide our own implementation. This is a very easy\
    \ interface to implement, as it only has one method:\n\n```\nUserDetails loadUserByUsername(String\
    \ username) throws UsernameNotFoundException;\n```\n\n**Note** The `UserDetailsService`\
    \ is not responsible for authentication. That is the job of the authentication\
    \ provider. In our case this will be the `DaoAuthenticationProvider` from Spring\
    \ Security. The goal of the `UserDetailsService` is to access the data store (database,\
    \ directory server, or possibly a file) that contains the user information and\
    \ possibly credentials. It should map this information from that data store's\
    \ internal structure to predefined standard object (`org.springframework.security.core.userdetails.UserDetails`)\
    \ and return it to the provider so it can continue to do its work.\n\nBasically,\
    \ the implementation should load the user information from wherever its configuration\
    \ determines and convert that information to a `UserDetails` object. As we will\
    \ see later, a `UserDetails` object is the main object you will be using when\
    \ asking for security information. The implementation is shown in [Listing 13-16](#Chapter13.html#list_13_16).\n\
    \n***Listing 13-16.** Implementing a custom UserDetailsService*\n\n```\npackage\
    \ com.apress.prospringmvc.bookstore.web.security;\n\nimport org.apache.commons.lang3.StringUtils;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.security.core.GrantedAuthority;\n\
    import org.springframework.security.core.authority.SimpleGrantedAuthority;\nimport\
    \ org.springframework.security.core.userdetails.UserDetails;\nimport org.springframework.security.core.userdetails.UserDetailsService;\n\
    import org.springframework.security.core.userdetails.UsernameNotFoundException;\n\
    import org.springframework.stereotype.Component;\nimport com.apress.prospringmvc.bookstore.domain.Account;\n\
    import com.apress.prospringmvc.bookstore.domain.Permission;\nimport com.apress.prospringmvc.bookstore.domain.Role;\n\
    import com.apress.prospringmvc.bookstore.service.AccountService;\n\n@Component\n\
    public class BookstoreUserDetailsService implements UserDetailsService {\n\n@Autowired\n\
    private CustomerService customerService;\n\n    @Override\n    public UserDetails\
    \ loadUserByUsername(String username) throws UsernameNotFoundException {\n   \
    \     return new BookstoreUserDetails(customerService.getCustomer(username));\n\
    \    }\n}\n```\n\nWe use our `CustomerService` to load the `Customer` and pass\
    \ it along to our custom `UserDetails` object. This object is implemented as shown\
    \ in [Listing 13-17](#Chapter13.html#list_13_17).\n\n***Listing 13-17.** Implementing\
    \ a custom UserDetails*\n\n```\npackage com.apress.prospringmvc.bookstore.web.security;\n\
    \n// Imports omitted, see Listing 13-16\n\npublic class BookstoreUserDetails implements\
    \ UserDetails {\n\n    private Customer customer;\nprivate List<GrantedAuthority>\
    \ authorities = new\n        ArrayList<GrantedAuthority>();\n\n    public BookstoreUserDetails(Customer\
    \ customer) {\n        this.customer = customer;\n    }\n\n    //Omitting getter\
    \ and setter methods for class instance variables\n}\n```\n\nThere are getters\
    \ for the username, password and our `Customer` object. At the moment we return\
    \ an empty list with for the `GrantedAuthority` property. We will later see how\
    \ this will fit into our application. All the other methods are features for the\
    \ `UserDetails`, such as account expiry and so on. We won't be using these features,\
    \ so `true` is returned for all of them. Once a user has been authenticated, the\
    \ information about that user is stored in an implementation of `org.springframework.security.core.context.SecurityContext`.\
    \ The `org.springframework.security.core.context.SecurityContextHolder` class\
    \ which is a `java.lang.ThreadLocal`,^([9](#Chapter13.html#CHP-13-FN-9)) will\
    \ give access to the `SecurityContext`. The `SecurityContext` itself has only\
    \ a getter (and setter) for an `org.springframework.security.core.Authentication\
    \ Object`. This means you will be able to access the `Authentication Object` anywhere\
    \ in your web application by calling\n\n⁹ [`http://docs.oracle.com/javase/6/docs/api/java/lang/ThreadLocal.html`](http://docs.oracle.com/javase/6/docs/api/java/lang/ThreadLocal.html)\n\
    \n```\nSecurityContextHolder.getContext().getAuthentication();\n```\n\nOn the\
    \ `Authentication` object, we are especially interested in the `getPrincipal`\
    \ method. This returns details about the user currently authenticated. In the\
    \ previous section, we introduced you to the `UserDetails`, well this is what\
    \ the `getPrincipal` returns, a `UserDetails` implementation. In our case it will\
    \ be the a custom `UserDetails`, namely our `BookstoreUserDetails`.\n\n**Note**\
    \ If you look at the API, you will see that `getPrincipal` returns `Object`. So\
    \ it can also return other types besides a `UserDetails` implementation. If you\
    \ define your own custom `org.springframework.security.authentication.AuthenticationProvider`,\
    \ you are free to construct your own authentication objects. In that case the\
    \ return value from `getPrincipal` can be whatever type you want the principal\
    \ to be.\n\n### Securing Our Flows, the Right Way\n\nThe setup we've put in place\
    \ until now still secures our flows as normal request mappings. While this might\
    \ seem to work, it actually doesn't. It only works for requests coming from outside\
    \ to access a flow. If a flow wants to start a subflow, the request is already\
    \ behind the Security filters and will not be picked up (see [Figure 13-4](#Chapter13.html#fig_13_4)).\n\
    \n***Figure 13-4.** Securing flows as request URI using the filter chain is not\
    \ enough. Starting a sub flow from a parent flow would bypass this mechanism.*\n\
    \nIf you remember from the request mappings, the `placeOrders-flow` (located in\
    \ `WEB-INF/view/secured/placeOrders/)` can only be accessed by authenticated user.\
    \ The `createOrders-flow` (located in `WEB-INF/view/public/createOrders/`) is\
    \ publicly available. What happens here is that no authentication is triggered\
    \ when the request comes in to transition to `placeOrder` (as it is still for\
    \ `createOrders-flow`). The `placeOrder` is a subflow state within `createOrders-flow`.\
    \ To refresh our memory you can see the code snippet below from the `createOrders-flow`\
    \ which starts the sub flow from the moment the flow transitions to `placeOrder:`\n\
    \n```\n<subflow-state id=\"placeOrder\" subflow=\"secured/placeOrders\">\n   \
    \ <input name=\"orderForm\"/>\n\n    <output name=\"orderId\"/>\n        <transition\
    \ on=\"endOrderOk\" to=\"endOrderOk\"/>\n</subflow-state>\n```\n\nWhen Web Flow\
    \ makes the internal state transition to the sub-flow, it will actually execute\
    \ without redirecting the user to the login page. What we really want is Web Flow\
    \ integration with Spring Security, so that Spring Security is involved when Web\
    \ Flow executes flows.\n\n#### Adding Access Attributes to Your Flows\n\nHere\
    \ we will see what you have to do in order to invoke Spring Security for Web Flow.\
    \ When you do so, your inter flow communication will also be secured.\n\nIn order\
    \ to secure your flows, you can add the following element on top of your flow\
    \ definitions:\n\n```\n<secured attributes=\"…\"/>\n```\n\nThe usage of the `attributes`\
    \ attribute is the same as the `access` attribute in the `<security:intercept-url>`\
    \ of the spring security configuration. You can use it to place the expressions\
    \ you want to be valid before this flow can execute.\n\nIf you return to the *\"\
    *Configuring Which Resources to Secure*\"* section, you will see that the following\
    \ two flows required authentication:\n\n> *   `placeOrders-flow`\n> *   `ordersOverview-flow`\n\
    \nThe third flow, `createOrders-flow` (located in `WEB-INF/view/public/createOrders/`),\
    \ was public and did not require any authentication to be executed. We add the\
    \ `fullyAuthenticated` condition to `placeOrders-flow.xml`(located in `WEB-INF/view/secured/placeOrders/`)\
    \ and `ordersOverview-flow.xml (`located in `secured/ordersOverview/`), as shown\
    \ in [Listings 13-18](#Chapter13.html#list_13_18) and [13-19](#Chapter13.html#list_13_19).\n\
    \n***Listing 13-18.** Adding the fullyAuthenticated authorization check as top\
    \ element in ordersOverview-flow.xml and placeOrders-flow.xml*\n\n```\n<flow\n\
    \n      xsi:schemaLocation=\"http://www.springframework.org/schema/webflow\n \
    \                          http://www.springframework.org/schema/webflow/ \n \
    \                          spring-webflow-2.0.xsd\">\n\n<secured attributes=\"\
    fullyAuthenticated\" />\n...\n```\n\n***Listing 13-19.** Adding the permitAll\
    \ check as top element in createOrders-flow.xml*\n\n```\n<flow\n\n        xsi:schemaLocation=\"\
    http://www.springframework.org/schema/webflow\n                           http://www.springframework.org/schema/webflow/\
    \ \n                           spring-webflow-2.0.xsd\">\n\n<secured attributes=\"\
    permitAll\" />\n...\n```\n\nThe `<secured>` element also has a second attribute,\
    \ called `match`. This attribute is of no importance when using SpEL. But without\
    \ using SpEL you are much more limited. For example, it is not possible to define\
    \ an \"`or\" or` \"`and\"` relation. Later on we will introduce the concept of\
    \ roles, but you should know that you can allow or deny a flow to be executed\
    \ depending on one or more roles being present. With SpEL you would simply use\
    \ the `and` operator if you only want the flow to execute when both roles are\
    \ present, or the `or` operator if one suffices. When not using SpEL you must\
    \ use the `match` attribute, which will let you switch between `any`; if one of\
    \ the roles requested are present, the flow will execute, or `all`; meaning that\
    \ all of the roles in the `attributes` attribute must be present before the flow\
    \ is executed.\n\n**Note** The flow security configuration on `createOrders-flow`\
    \ and `ordersOverview-flow` is a bit superfluous, since they are both top-level\
    \ flows. The `<security:intercept-url pattern=\"/public/**\" access=\"permitAll\"\
    \ />` and `<security:intercept-url pattern=\"/secured/**\" access=\"fullyAuthenticated\"\
    />` have already checked that we had the proper authentication before letting\
    \ us even go any further. However, the `<secured>` element in the flow could be\
    \ used to perform finer-grained access control or authorization. While the filter\
    \ configuration could allow the user to go through (the user was authenticated\
    \ successfully for example) you could still check that access would only be granted\
    \ if the user has a certain role; for example, `<secured attribute=\"hasRole(ROLE_SOMEROLE)\"\
    />`. Roles will be discussed in the \"Role-Based Access Control\" section.\n\n\
    #### Configuring the SecurityFlowExecutionListener\n\nThe `org.springframework.webflow.security.SecurityFlowExecutionListener`\
    \ class will enable the integration between Web Flow and Spring Security. It is\
    \ required in order for the `<security>` element we discussed previously to do\
    \ anything. This class is an implementation of the Web Flow `org.springframework.webflow.execution.FlowExecutionListener`\
    \ that we saw in [Chapter 12](#Chapter12.html).\n\nNormally this would have been\
    \ a two-paragraph section, since you ordinarily just define a bean (the `SecurityFlowExecutionListener`)\
    \ and bind it to the flow executor using the `<webflow:flow-execution-listeners>`\
    \ element in `webflow-config.xml`. As it turns out, there is currently a problem\
    \ with the `SecurityFlowExecutionListener` when using SpEL-enabled security expressions\
    \ with Spring Security. It might well be that this problem is resolved by the\
    \ time you read this; and if so then you can continue as normal (simply configuring\
    \ the `SecurityFlowExecutionListener` as we will see in [Listing 13-21](#Chapter13.html#list_13_21)).\
    \ If the issue^([10](#Chapter13.html#CHP-13-FN-10)) has not been resolved, however,\
    \ you have two options:\n\n> *   Use the `SecurityFlowExecutionListener` as-is,\
    \ but in that case you cannot use SpEL in your flow `<security>` elements. You\
    \ would have to fall back to mainly using roles.\n> *   Use our custom `com.apress.prospringmvc.bookstore.web.security.BookstoreSecurityFlowExecutionListener`,\
    \ which should do the trick as a workaround. With this approach you will still\
    \ be able to use SpEL.\n\nFor the sake of consistency we went with the second\
    \ solution for the examples.\n\nTo configure the `BookstoreSecurityFlowExecutionListener`\
    \ we open `src/main/resources/spring/webflow-config.xml` and define a Spring bean,\
    \ as shown in [Listing 13-20](#Chapter13.html#list_13_20).\n\n***Listing 13-20:**\
    \ Defining the `SecurityFlowExecutionListener`*\n\n```\n<bean id=\"securityFlowExecutionListener\"\
    \nclass=\"com.apress.prospringmvc.bookstore.web.security.BookstoreSecurityFlowExecutionListener\n\
    \"/>\n```\n\nNext we configure the listener with the flow executor (see [Listing\
    \ 13-21](#Chapter13.html#list_13_21)).\n\n***Listing 13-21:** Integrating the\
    \ `SecurityFlowExecutionListener` with the flow executor*\n\n```\n<webflow:flow-executor\
    \ id=\"flowExecutor\" flow-registry=\"flowRegistry\" >\n    <webflow:flow-execution-repository\
    \ max-executions=\"3\" max-execution-snapshots=\"10\" />\n**<webflow:flow-execution-listeners>**\n\
    **        <webflow:listener ref=\"securityFlowExecutionListener\"/>**\n**    </webflow:flow-execution-listeners>**\n\
    </webflow:flow-executor>\n```\n\nThat's it! If you want to configure the default\
    \ `SecurityFlowExecutionListener`, it is done in exactly the same way, except\
    \ that the class of bean `securityFlowExecutionListener` would be `org.springframework.webflow.security.SecurityFlowExecutionListener`\
    \ instead of `com.apress.prospringmvc.bookstore.web.security.BookstoreSecurityFlowExecutionListener`.\n\
    \n**Note** We did not add the `BookstoreSecurityFlowExecutionListener` code into\
    \ this section, since that would take us too far. If you come to a point where\
    \ you need this, and it isn't fixed, we suggest you read the issue (see the link\
    \ in the footnote) and look at the source code at the same time. This will be\
    \ the best way to understand the fix we applied.\n\n^(10) [`https://jira.springsource.org/browse/SWF-1508`](https://jira.springsource.org/browse/SWF-1508)\n\
    \n### Transport Security\n\nAt the moment we still have one major security hole\
    \ in our security setup. When our users log in they supply username and password\
    \ credentials, which will be authenticated by Spring Security. These credentials\
    \ are, however, sent via the browser to the web server using HTTP, which is a\
    \ plain-text protocol. Anyone capturing data will be able to see the username\
    \ and password in clear text. To illustrate this we started up Wireshark**^([11](#Chapter13.html#CHP-13-FN-11))**\
    \ and let it listen on the loopback adapter. Next we performed a login in our\
    \ application, and [Figure 13-5](#Chapter13.html#fig_13_5) shows the results.\n\
    \n***Figure 13-5.** Network capture of an HTTP session showing plain credentials\
    \ when logging in via the form*\n\nThis seems very unsecure. To change this behavior\
    \ we are going to switch to SSL (Secure Socket Layer, which is now called TLS,\
    \ or Transport Layer Security, its successor, but for consistency we'll call it\
    \ SSL), whenever a user logs in. From that point everything will be served using\
    \ SSL.\n\nBefore we proceed, you must prepare your tomcat or tomcat STS instance\
    \ to add an extra SSL connector. It is beyond the scope of this book to go deeper\
    \ into the internals of the SSL protocol or the PKI(Public Key Infrastructure),\
    \ but for this to work you need to supply tomcat with a keystore, which contains\
    \ a private/public key pair and a certificate for that public key. Normally the\
    \ certificate part is generated by a third-party Certificate Authority (CA). Fortunately,\
    \ you can self-sign such a certificate which is ideal for tests or closed production\
    \ setups.\n\nAs a small intermezzo we wanted to share something about self-signed\
    \ certificates, since there is sometimes a misunderstanding about them. Using\
    \ PKI with self-signed certificates has exactly the same encryption level as using\
    \ an official CA signed certificate. So your SSL will not be less safe; the encryption\
    \ strength, the procedures, and everything that depends on them offers the exact\
    \ same guarantees.\n\n^(11) [`http://www.wireshark.org/`](http://www.wireshark.org/)\n\
    \nThe difference lies in the trust. With a self-signed certificate your users\
    \ will have to explicitly accept the certificate, and the browser will give them\
    \ a warning that the identity cannot be verified. How this is presented is browser\
    \ dependent, but with Safari they will get the page as shown in [Figure 13-6](#Chapter13.html#fig_13_6).\n\
    \n***Figure 13-6.** Browser confirmation for trusting our self signed certificate*\n\
    \nIn order to trust the certificate for the current session only, you can click\
    \ \"Continue\". If you want to trust the certificate for future sessions, you\
    \ have to click \"Show Certificate\". Doing so will present the dialog box shown\
    \ in [Figure 13-7](#Chapter13.html#fig_13_7). If you then check \"always trust\
    \ Bookstore when connecting to localhost\" the certificate will be stored.\n\n\
    ***Figure 13-7.** Accepting the self signed certificate*\n\nAfter you click Continue,\
    \ the certificate will be trusted (for this session only or for future sessions\
    \ depending if you clicked the checkbox in [Figure 13-7](#Chapter13.html#fig_13_7))\
    \ and you will be able to continue over SSL. It is clear that this trusting is\
    \ only a good idea for internal testing.\n\nWith a real CA signed certificate,\
    \ the CA has asked the certificate holder for credentials before actually issuing\
    \ the certificate. For example, we would never get a server certificate for google.com\
    \ from an authorized CA, since we cannot proof that we own the domain or have\
    \ any authorization over it.\n\nA client's browser truststore (which contains\
    \ a list of authorized root CAs) will also not trust our self-signed certificate\
    \ by default, since it cannot be verified by any of the known and trusted CAs.\
    \ I will explicitly have to accept its trust.\n\nSo for a production website a\
    \ self-signed certificate would be a bad idea, since users cannot verify that\
    \ the identity behind the certificate is really what it claims to be (your server);\
    \ there is no third party that verified the identity and gave any approval. However,\
    \ if you are sending data among a limited set of users (closed production), and\
    \ each party trusts the others, it is perfectly viable to send a self-signed certificate\
    \ to each party. Each party knows that your identity (you gave it personally on\
    \ a USB stick, or emailed it from your personal account) is the one that is coupled\
    \ to that certificate (the identity could be a person, server, domain, or whatever).\
    \ This way, you can easily save the costs of signing your public keys by a CA.\n\
    \nTo generate a self-signed certificate we can use a Java tool called `keytool`.\
    \ To use it, take the following steps:\n\n> 1.  Open a command line prompt and\
    \ enter the following command (make sure the JDK is available on your path): `keytool\
    \ -genkey -alias tomcat -keystore keystore.jks`\n> 2.  Enter **tomcat** as the\
    \ password and again when prompted to re-enter it:\n>     `Enter keystore password:`\n\
    >     `Re-enter new password:`\n> 3.  Complete the prompts as follows:\n>    \
    \ `What is your first and last name?`\n>     `  [Unknown]:  `**`Bookstore`**\n\
    >     `What is the name of your organizational unit?`\n>     `  [Unknown]:  `**`Bookstore`**\n\
    >     `What is the name of your organization?`\n>     `  [Unknown]:  `**`Bookstore`**\n\
    >     `What is the name of your City or Locality?`\n>     `  [Unknown]:  `**`Brussels`**\n\
    >     `What is the name of your State or Province?`\n>     `  [Unknown]:  `**`Brussel`**`s`\n\
    >     `What is the two-letter country code for this unit?`\n>     `  [Unknown]:\
    \  `**`BE`**\n>     `Is CN=Bookstore, OU=Bookstore, O=Bookstore, L=Brussels, ST=Brussels,\
    \ C=BE correct?`\n>     `[no]:  `**`yes`**\n> 4.  Press Enter without typing anything.\
    \ The prompt will return, and your self-signed key is ready in the keystore.\n\
    >     `Enter key password for <tomcat>`\n>     `        (RETURN if same as keystore\
    \ password):`\n\nPlace the keystore under your tomcat home directory `/conf`,\
    \ which is `spring-insight-instance/conf/` if you are using STS.\n\nNext open\
    \ the server.xml (`spring-insight-instance/conf/server.xml`) and configure the\
    \ SSL connector, as shown in [Listing 13-22](#Chapter13.html#list_13_22).If you\
    \ want a full explanation of the configuration shown here, see the Tomcat howto^([12](#Chapter13.html#CHP-13-FN-12)),\
    \ in the section \"Edit The Tomcat Configuration File.\"\n\n^(12) [`http://tomcat.apache.org/tomcat-7.0-doc/ssl-howto.html`](http://tomcat.apache.org/tomcat-7.0-doc/ssl-howto.html)\n\
    \n***Listing 13-22.** Adding an SSL connector to tomcat's server.xml*\n\n```\n\
    <Connector executor=\"tomcatThreadPool\" port=\"${bio.https.port}\"\nprotocol=\"\
    org.apache.coyote.http11.Http11Protocol\"\nconnectionTimeout=\"20000\" redirectPort=\"\
    ${bio.https.port}\" acceptCount=\"100\"\nmaxKeepAliveRequests=\"15\"\nkeystoreFile=\"\
    ${catalina.base}/conf/keystore.jks\" keystorePass=\"tomcat\" keyAlias=\"tomcat\"\
    \nSSLEnabled=\"true\" scheme=\"https\" secure=\"true\"/>\n```\n\nIn this example\
    \ we are depending on the STS instance. The variables, like `${bio.https.port}`,\
    \ are already predefined. If you are using Tomcat you can replace them with 8443,\
    \ which will be our default SSL port.\n\nAfter that you can start Tomcat. Do not\
    \ forget to clean the server in STS before starting. After modifying anything\
    \ in the server configuration you have to \"clean\" in order for the latest files\
    \ to be copied over (right-click on the server instance in the server view and\
    \ click Clean).\n\nAt this time verify that your server starts and that no errors\
    \ are thrown. If there is anything wrong with the configuration, Tomcat will show\
    \ errors almost directly after starting up.\n\nThe final thing to do is to tell\
    \ Spring Security which mappings we would like to use SSL for (see [Listing 13-23](#Chapter13.html#list_13_23)).\
    \ We will use SSL for\n\n> *   Our login page\n> *   The buy books flow\n\n***Listing\
    \ 13-23.** Configuring secured transfer for specific request URIs*\n\n```\n<security:intercept-url\
    \ pattern=\"/index.jsp\" access=\"permitAll\" />\n<security:intercept-url pattern=\"\
    /public/authentication/**\" access=\"permitAll\"\n**requires-**\n**channel=\"\
    https\"** />\n<security:intercept-url pattern=\"/public/createOrders/**\" access=\"\
    permitAll\"\n**requires-**\n**channel=\"https\"** />\n\n<security:intercept-url\
    \ pattern=\"/public/**\" access=\"permitAll\" />\n\n<security:intercept-url pattern=\"\
    /secured/**\" access=\"fullyAuthenticated\"\n**requires-**\n**channel=\"https\"\
    ** />\n\n<security:intercept-url pattern=\"/**\" access=\"denyAll\" />\n```\n\n\
    The `requires-channel` will automatically change our protocol from HTTP to HTTPS\
    \ (which is HTTP over SSL). To illustrate this we are going to our home page (see\
    \ [Figure 13-8](#Chapter13.html#fig_13_8)).\n\n***Figure 13-8.** Before login,\
    \ we are still on HTTP.*\n\nNext, we click the Login link in the navigation bar,\
    \ which results in the page shown in [Figure 13-9](#Chapter13.html#fig_13_9).\n\
    \n***Figure 13-9.** After clicking on the Login navigation link, we automatically\
    \ switch to HTTPS.*\n\nWhen we log in now, our credentials are transmitted securely.\
    \ If we take a look at the certificate, we will see the data we entered when generating\
    \ it with `keytool`. We will also see that there is no trust, as it is not generated\
    \ by a trusted CA stored in our browser's truststore. [Figure 13-10](#Chapter13.html#fig_13_10)\
    \ shows the self-signed certificate we created earlier. It is not trusted by our\
    \ browser, in this case Safari.\n\n***Figure 13-10.** Information on the certificate\
    \ issued by tomcat*\n\n**Note** When you run the sample application for the first\
    \ time, going to the login page will automatically trigger the switch to SSL.\
    \ In this case you will get warning of the self-signed certificate as shown in\
    \ [Figure 13-6](#Chapter13.html#fig_13_6) and [Figure 13-7](#Chapter13.html#fig_13_7).\
    \ So you will first have to accept the self-signed certificate before your browser\
    \ will proceed over SSL to the login page.\n\nWhen we inspect what's on the wire\
    \ now, after configuring SSL, we will see that the initial request is a plain\
    \ HTTP get to the login page. Spring Security will, however, send a redirect (HTTP\
    \ 302) back to the browser indicating a protocol change. You can see that in the\
    \ two highlighted lines in [Figure 13-11](#Chapter13.html#fig_13_11). The first\
    \ line is the HTTP 302 redirect. The second is the body content of the reply,\
    \ in which you can see it is requesting our browser to `https://localhost....`\
    \ What follows next is no longer plain HTTP, but SSL. In Wireshark it is marked\
    \ as TCP. The content of the packets are encrypted, and the password can no longer\
    \ be intercepted by looking at the packets.\n\n***Figure 13-11.** All information\
    \ submitted is now encrypted by SSL*\n\nThis concludes our discussion of Transport\
    \ layer security. You have seen how we can switch from HTTP to HTTPS, just by\
    \ altering the Spring Security configuration.\n\n### Localization\n\nSpring Security\
    \ supports localization of exception messages. If your application is designed\
    \ for English-speaking users, you don't need to do anything as by default since\
    \ all Security messages are in English.\n\nIf you need to support other locales,\
    \ you should know that all exception messages can be localized, including messages\
    \ related to authentication failures and access being denied (authorization failures).\
    \ Exceptions and logging messages for developers or system deployers (including\
    \ incorrect attributes, interface contract violations, using incorrect constructors,\
    \ startup time validation, debug-level logging) are not localized and instead\
    \ are hard-coded in English within Spring Security's code.\n\nThe resource bundle\
    \ is located under `org/springframework/security/` with the base name `messages.properties`\
    \ and can be configured in our `WebMvcContextConfiguration` (see [Listing 13-24](#Chapter13.html#list_13_24)).\
    \ We already have an `org.springframework.context.MessageSource` configured for\
    \ our local resource bundle (`messages.properties`); here we will extend the configuration\
    \ and pass along a second resource bundle, which is identified with the location\
    \ in package format (`org.springframework.security.messag`es) followed by the\
    \ basename, which is the name of the file without country or language suffixed\
    \ and without a \"properties\" extension.\n\n***Listing 13-24.** Adding extra\
    \ bundles for localizing Spring Security messages*\n\n```\n@Bean\npublic MessageSource\
    \ messageSource() {\nResourceBundleMessageSource messageSource = new\n       \
    \ ResourceBundleMessageSource();\nmessageSource.setBasenames(new String[] { \"\
    messages\",\n        \"**org.springframework.security.messages**\" });\n    messageSource.setUseCodeAsDefaultMessage(true);\n\
    \    return messageSource;\n}\n```\n\nSpring Security relies on Spring's localization\
    \ support to look up the appropriate message. In order for this to work, you have\
    \ to make sure that the locale from the incoming request is stored in Spring's\
    \ `org.springframework.context.i18n.LocaleContextHolder`. Spring MVC's `org.springframework.web.servlet.DispatcherServlet`\
    \ does this for your application automatically, but since Spring Security's filters\
    \ are invoked before the `DispatcherServlet`, the `LocaleContextHolder` needs\
    \ to be set up to contain the correct locale before Spring Security is invoked.\
    \ We do this by configuring a Spring `javax.servlet.ServletContextListener` implementation,\
    \ namely `org.springframework.web.context.request.RequestContextListener`. This\
    \ listener will be called before any filter is invoked.\n\nThe `RequestContextListener`\
    \ is configured in the `BookstoreWebApplicationInitializer`, as you can see in\
    \ [Listing 13-25](#Chapter13.html#list_13_25).\n\n***Listing 13-25:** Code from\
    \ the BookstoreWebApplicationInitializer configuring the RequestContextListener*\n\
    \n```\n@Override\npublic void onStartup(ServletContext servletContext) throws\
    \ ServletException {\n    registerListener(servletContext);\n    registerDispatcherServlet(servletContext);\n\
    \    // We are using JpaFlowExecutionListener instead, but we enable it for\n\
    \    // Spring MVC served pages\n    registerSpringSecurityFilterChain(servletContext);\n\
    \    registerOpenEntityManagerInViewFilter(servletContext);\n}\n\nprivate void\
    \ registerListener(ServletContext servletContext) {\nAnnotationConfigWebApplicationContext\
    \ rootContext =\n        createContext(configurationClasses);\n    servletContext.addListener(new\
    \ ContextLoaderListener(rootContext));\n    servletContext.addListener(new RequestContextListener());\n\
    }\n```\n\n### Role-Based Access Control\n\nRole-based access control (RBAC) is\
    \ a beneficial access control model for organizations with many users and a high\
    \ degree of diversity in the functions they are playing in their daily job. RBAC\
    \ was modeled especially to support this kind of structure. Your role in RBAC\
    \ is actually comparable with the role you would play in your organization; most\
    \ likely that will have something to do with development. The permissions are\
    \ the rights that have been granted to someone with that role.\n\nWhile this level\
    \ of detail mostly makes sense only for larger organizations, its basic implementation\
    \ is not very difficult. As we will see, we can extend our domain model easily\
    \ to support basic RBAC with a minimum of effort.\n\nBut to set the record straight,\
    \ for something as simple our bookstore this is certainly overkill. Even if it\
    \ were to become a popular store, the diversity of users will be very low; they\
    \ will all be doing pretty much the same things. Hence we will not really benefit\
    \ from an RBAC system. But we will demonstrate it just to show what is possible\
    \ with Spring Security.\n\nThe model we are going to support comes down to the\
    \ relationships shown in [Figure 13-12](#Chapter13.html#fig_13_12).\n\n***Figure\
    \ 13-12.** The RBAC model*\n\nA user (in our domain called \"`Account`\") has\
    \ one or more roles. A role can have one or more permissions. The roles we define\
    \ will depend on what's important for our application. A role can be thought of\
    \ as a globalization of a set of permissions.\n\nIn our bookstore a role might\
    \ be \"customer\" or \"administrator,\" and a permission might be \"create order\"\
    \ or \"add books.\" Permissions are normally finer-grained than roles.\n\nWe decided\
    \ to load both roles and permissions in the Security context. Checking on the\
    \ role might be meaningful for a coarse-grained check. For example; should this\
    \ navigation link be shown? This probably depends on the fact that a given user\
    \ possesses a given role. However, going deeper, it could be that there are two\
    \ different roles giving access to that same functionality. But within the functionality,\
    \ only certain operations are allowed, depending on specific permissions. So here\
    \ it would benefit us to check for the presence of a specific permission. As we\
    \ will see, with Spring Security we can easily check on both.\n\nFor example,\
    \ suppose that a company has a page that shows various benefits an employee enjoys.\
    \ This could contain information about the medical plan, the meal vouchers, or\
    \ group promotions. Accessing this information is allowed for internal employees\
    \ only; contractors and other types of outside employees don't benefit from this\
    \ and should be excluded from accessing this information.\n\nFor this reason we\
    \ could opt to do a coarse-grained check on roles first. This will prevent the\
    \ contractors from even seeing a link to this information. However, within the\
    \ page itself we want to differentiate between normal employees, who can only\
    \ read/query the information, and administrators, who will be able to modify the\
    \ information. Here we will continue by checking the actual permissions. As employees,\
    \ we will only have the permission to read the extra benefits, while administrators\
    \ (also being employees) will have the extra *permission* to modify the information\
    \ as well.\n\nThis whole story is not so interesting for Spring Security. It just\
    \ wants to know a list of \"strings\" that you will use to check presence upon.\
    \ That this list contains roles, permissions, or aliens, doesn't really matter.\
    \ The role and permission division is just for the people administrating the application,\
    \ so that access can be dealt with flexibly, without having to change the code\
    \ of the application.\n\nRoles or permissions will be transformed to Spring Security\
    \ `GrantedAuthorities`. Our domain model has specific entities to support this.\
    \ First is the familiar `Account` entity, which is shown in [Listing 13-26](#Chapter13.html#list_13_26).\
    \ In bold you will see the many-to-many association it has with Order. The `Role`\
    \ entity shown in [Listing 13-27](#Chapter13.html#list_13_27), along with its\
    \ many-to-many association with `Permission`, is indicated in bold. Finally we\
    \ have the `Permission` entity shown in [Listing 13-28](#Chapter13.html#list_13_28).\n\
    \n***Listing 13-26.** The Account, which has a many-to-many association with Role*\n\
    \n```\npackage com.apress.prospringmvc.bookstore.domain;\n\nimport java.io.Serializable;\n\
    \nimport javax.persistence.CascadeType;\nimport javax.persistence.Embedded;\n\
    import javax.persistence.Entity;\nimport javax.persistence.GeneratedValue;\nimport\
    \ javax.persistence.GenerationType;\nimport javax.persistence.Id;\nimport javax.persistence.ManyToMany;\n\
    import javax.validation.Valid;\n\nimport org.hibernate.validator.constraints.Email;\n\
    import org.hibernate.validator.constraints.NotEmpty;\n\n@Entity\npublic class\
    \ Account implements Serializable {\n\n    @Id\n    @GeneratedValue(strategy =\
    \ GenerationType.AUTO)\n    private Long id;\n\n    private String firstName;\n\
    \    private String lastName;\n\n    private Date dateOfBirth;\n\n    @Embedded\n\
    \    @Valid\n    private Address address = new Address();\n\n    @NotEmpty\n \
    \   @Email\n    private String emailAddress;\n    @NotEmpty\n    private String\
    \ username;\n    @NotEmpty\n    private String password;\n\n**    @ManyToMany(cascade\
    \ = CascadeType.ALL)**\n**    private List<Role> roles = new ArrayList<Role>();**\n\
    \n    //Omitting getter and setter methods for class instance variables\n}\n```\n\
    \n***Listing 13-27.** The Role entity, which has in turn a many-to-many association\
    \ with Permission*\n\n```\npackage com.apress.prospringmvc.bookstore.domain;\n\
    \nimport java.io.Serializable;\nimport java.util.ArrayList;\nimport java.util.List;\n\
    \nimport javax.persistence.CascadeType;\nimport javax.persistence.Entity;\nimport\
    \ javax.persistence.GeneratedValue;\nimport javax.persistence.GenerationType;\n\
    import javax.persistence.Id;\nimport javax.persistence.ManyToMany;\nimport javax.persistence.Table;\n\
    import javax.persistence.UniqueConstraint;\n\n@Entity\n@Table(uniqueConstraints\
    \ = { @UniqueConstraint(columnNames = { \"role\" }) })\npublic class Role implements\
    \ Serializable {\n\n    @Id\n    @GeneratedValue(strategy = GenerationType.AUTO)\n\
    \    private Long id;\n\n    private String role;\n\n**@ManyToMany(cascade = CascadeType.ALL)**\n\
    **    private List<Permission> permissions = new ArrayList<Permission>();**\n\n\
    \    Role() {\n        // For ORM\n    }\n\n    public Role(String role) {\n \
    \       this.role = role;\n    }\n\n    //Omitting getter and setter methods for\
    \ class instance variables\n}\n```\n\n***Listing 13-28.** The Permission entity*\n\
    \n```\npackage com.apress.prospringmvc.bookstore.domain;\n\nimport java.io.Serializable;\n\
    \nimport javax.persistence.Entity;\nimport javax.persistence.GeneratedValue;\n\
    import javax.persistence.GenerationType;\nimport javax.persistence.Id;\nimport\
    \ javax.persistence.Table;\nimport javax.persistence.UniqueConstraint;\n\n@Entity\n\
    @Table(uniqueConstraints = { @UniqueConstraint(columnNames = { \"permission\"\
    \ }) })\npublic class Permission implements Serializable {\n\n    @Id\n    @GeneratedValue(strategy\
    \ = GenerationType.AUTO)\n    private Long id;\n\n    private String permission;\n\
    \n    Permission() {\n        // Form ORM\n    }\n\n    public Permission(String\
    \ permission) {\n        this.permission = permission;\n    }\n\n    //Omitting\
    \ getter and setter methods for class instance variables\n}\n```\n\nThis setup\
    \ is pretty straightforward. An Account has a number of roles, and each role has\
    \ a number of permissions. As we've stated: an `Account` can have multiple Roles\
    \ and a Role can have multiple Permissions.\n\nFinally we need to populate our\
    \ security principal with these roles and permissions. As you remember, we created\
    \ a custom implementation of a Spring Security `UserDetailsService` (`com.apress.prospringmvc.bookstore.web.security.BookstoreUserDetailsService`).\
    \ We will extend this now to load the list of granted authorities, as shown in\
    \ [Listing 13-29](#Chapter13.html#list_13_29).\n\n***Listing 13-29.** Extending\
    \ the `BookstoreUserDetailsService` functionality to load the roles and permissions\
    \ into granted authorities*\n\n```\npackage com.apress.prospringmvc.bookstore.web.security;\n\
    \nimport org.apache.commons.lang3.StringUtils;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.security.core.GrantedAuthority;\nimport org.springframework.security.core.authority.SimpleGrantedAuthority;\n\
    import org.springframework.security.core.userdetails.UserDetails;\nimport org.springframework.security.core.userdetails.UserDetailsService;\n\
    import org.springframework.security.core.userdetails.UsernameNotFoundException;\n\
    import org.springframework.stereotype.Component;\n\nimport com.apress.prospringmvc.bookstore.domain.Account;\n\
    import com.apress.prospringmvc.bookstore.domain.Permission;\nimport com.apress.prospringmvc.bookstore.domain.Role;\n\
    \n@Component\npublic class BookstoreUserDetailsService implements UserDetailsService\
    \ {\n\n    @Autowired\n    private AccountService accountService;\n\n    @Override\n\
    \    public UserDetails loadUserByUsername(String username) throws \n        UsernameNotFoundException\
    \ {\n        if (StringUtils.isBlank(username)) {\n            throw new UsernameNotFoundException(\"\
    Username was empty\");\n        }\n\n        Account account = accountService.getAccount(username);\n\
    \n        if (account == null) {\n            throw new UsernameNotFoundException(\"\
    Username not found\");\n        }\n\nList<GrantedAuthority> grantedAuthorities\
    \ = new\n            ArrayList<GrantedAuthority>();\n\n        for (Role role\
    \ : account.getRoles()) {\n**grantedAuthorities.add(new  **\n**              \
    \    SimpleGrantedAuthority(role.getRole()));**\n            for (Permission permission\
    \ : role.getPermissions()) {\n**grantedAuthorities.add(new**\n**             \
    \        SimpleGrantedAuthority(permission.getPermission()));**\n            }\n\
    \        }\nreturn new BookstoreUserDetails(accountService.getAccount(username),\n\
    \               grantedAuthorities);\n    }\n}\n```\n\nFirst we check that the\
    \ username is not null or blank. If it is, we throw a `org.springframework.security.core.userdetails.UsernameNotFoundException`.\
    \ Next we retrieve the `Account` for the given username. When no matching `Account`\
    \ can be found for that username, we again throw a `UsernameNotFoundException.`\
    \ Finally we will create a union of all the `Role`s that are linked to the `Account`,\
    \ and all the `Permissions` linked to each `Role` and add them to a list of type\
    \ `GrantedAuthority`. We wrap each `Role` or each `Permission` in a `SimpleGrantedAuthority,`\
    \ which is an implementation of the interface `GrantedAuthority`. The class just\
    \ takes a String as constructor value and offers a getter for retrieving it later\
    \ on. You can see this here (we omitted the equals, hashCode and toString implementation\
    \ for brevity):\n\n```\npackage org.springframework.security.core.authority;\n\
    \nimport org.springframework.security.core.GrantedAuthority;\nimport org.springframework.security.core.SpringSecurityCoreVersion;\n\
    import org.springframework.util.Assert;\n\npublic final class SimpleGrantedAuthority\
    \ implements GrantedAuthority {\n\n    public SimpleGrantedAuthority(String role)\
    \ {\nAssert.hasText(role, \"A granted authority textual representation is\n  \
    \          required\");\n        this.role = role;\n    }\n\n    public String\
    \ getAuthority() {\n        return role;\n    }\n}\n```\n\nOur principal (`BookstoreUserDetails`)\
    \ is now populated with a list of `GrantedAuthority`, in which each item represents\
    \ a role or a permission. In the next section we will see how you can limit access\
    \ based upon these authorities.\n\n### Authorizing Access\n\nSo far you have seen\
    \ how we can secure our application by making all resources accessible for authenticated\
    \ users only, unless specified otherwise. you saw how we can identify our users\
    \ by requiring them to enter a username and password on the login page. We also\
    \ showed how to configure Spring Security so it can authenticate the given credentials.\
    \ In the previous section we introduced you to RBAC, which led to populating our\
    \ `com.apress.prospringmvc.bookstore.web.security.BookstoreUserDetails` roles\
    \ and permissions coupled to the user's `Account`.\n\nOur security setup is now\
    \ almost ready, as all the bits and pieces are in place. The only thing left to\
    \ perform is authorization based on the information that we now have in our `org.springframework.security.core.context.SecurityContext`\
    \ for an authenticated user. Or better said, we need to indicate which functionality\
    \ the user is allowed to use based on the roles and permissions coupled to the\
    \ user's `Account`.\n\nIn the following sections we will see how we can control\
    \ authorization in our pages. We will see that Spring Security comes with its\
    \ own tag library that offers special tags to disable or enable functionality\
    \ directly in our JSP pages, based on the presence of certain roles or permissions.\n\
    \n#### Using Tag Libraries in Our Pages\n\nSpring Security comes with a dedicated\
    \ tag library you can use to conditionally render certain page components. The\
    \ use case is always the same: determining whether a certain component or part\
    \ of the page should be shown to the currently logged-in user based upon the set\
    \ of authorities.\n\nIn order to use the tags, we have to declare the corresponding\
    \ tag library in our pages. We do this by adding an extra JSP declaration:\n\n\
    ```\n<%@ taglib prefix=\"spring\" uri=\"http://www.springframework.org/tags\"\
    %>.\n```\n\nIn the following sections we will illustrate the most important tags\
    \ and how you can use them.\n\n##### The authorize Tag\n\nThis tag is used to\
    \ determine whether its contents should be evaluated or not, based on one or more\
    \ authorization checks. In our case we will use it in exactly the same way as\
    \ the `flow` security attribute, or the `access` attribute of the intercept URL.\
    \ Using a SpEL expression we will verify if the current authenticated user has\
    \ the given role in order to let the content be evaluated.\n\nIn the first code\
    \ snippet we will only show the content when the authenticated user has the role\
    \ `ROLE_AUTHOR`. In the second snippet the content will only be shown if the authenticated\
    \ user has the role `PERM_ADD_BOOK`.\n\n```\n<sec:authorize access=\"hasRole('ROLE_AUTHOR')\"\
    >\n…content…\n</sec:authorize>\n```\n\nOr\n\n```\n<sec:authorize access=\"hasRole('PERM_ADD_BOOK')\"\
    >\n…content…\n</sec:authorize>\n```\n\nTo illustrate the use of this important\
    \ tag, we created a separate page, `manageBooks.jsp` (located in `WEB-IN/view/secured/manageBooks`).\
    \ This page will allow a user to add new books to the system, and new categories.\
    \ In order to use this functionality, the user must be authenticated and have\
    \ the role `ADMIN` or A`UTHOR`. However, for the two functions, adding new categories\
    \ and books, two separate permissions are required. To add books you should have\
    \ `PERM_ADD_BOOKS` and to add a new category you should have `PERM_ADD_CATEGORIES`.\n\
    \nTo demonstrate this page we created two new users in our `com.apress.prospringmvc.bookstore.domain.support.InitialDataSetup`\
    \ class, as shown in [Listing 13-30](#Chapter13.html#list_13_30).\n\n***Listing\
    \ 13-30:** Adding additional users to our initial data setup*\n\n```\nprivate\
    \ Permission permissionAddCategories = new Permission(\"PERM_ADD_\n          \
    \                                   CATEGORIES\");\nprivate Permission permissionAddBooks\
    \ = new Permission(\"PERM_ADD_BOOKS\");\nprivate Permission permissionCreateOrders\
    \ = new Permission(\"PERM_CREATE_\n                                          \
    \   ORDER\");\n\nprivate Role roleCustomer = new Role(\"ROLE_CUSTOMER\");\nprivate\
    \ Role roleAdmin = new Role(\"ROLE_ADMIN\");\nprivate Role roleAuthor = new Role(\"\
    ROLE_AUTHOR\");\n\nInitialDataSetup.this.johnDoe = new AccountBuilder() {\n  \
    \  {\n        address(\"Brussels\", \"1000\", \"Nieuwstraat\", \"1\", \"A\", \"\
    BE\");\n        email(\"foo@test.com\");\n        credentials(\"jd\", \"secret\"\
    );\n        name(\"John\", \"Doe\");\nroleWithPermissions(InitialDataSetup.this.roleCustomer,\n\
    \                            InitialDataSetup.this.permissionCreateOrders);\n\
    \    }\n}.build();\n\nnew AccountBuilder() {\n    {\n        address(\"Antwerp\"\
    , \"2000\", \"Meir\", \"1\", \"A\", \"BE\");\n        email(\"bar@test.com\");\n\
    \        credentials(\"admin\", \"secret\");\n        name(\"Super\", \"User\"\
    );\n        roleWithPermissions(InitialDataSetup.this.roleAdmin,\n           \
    \                 InitialDataSetup.this.permissionAddBooks,\n                \
    \            InitialDataSetup.this.permissionAddCategories);\n    }\n}.build();\n\
    \nnew AccountBuilder() {\n    {\n        address(\"Gent\", \"9000\", \"Abdijlaan\"\
    , \"1\", \"A\", \"BE\");\n        email(\"baz@test.com\");\n        credentials(\"\
    author\", \"secret\");\n        name(\"Some\", \"Author\");\n        roleWithPermissions(InitialDataSetup.this.roleAuthor,\n\
    \                            InitialDataSetup.this.permissionAddBooks);\n    }\n\
    }.build();\n```\n\nTo summarize, we have the user `admin` with the role `ROLE_ADMIN`\
    \ and the permissions `PERM_ADD_BOOKS` and `PERM_ADD_CATEGORIES`. Next we have\
    \ the user `author`, who has the role `ROLE_AUTHOR` and the single permission\
    \ `PERM_ADD_BOOKS`. The `author` user is only able to add books to existing categories,\
    \ but is not allowed to make new ones (only the `admin` user is).\n\nNext, in\
    \ [Listing 13-31](#Chapter13.html#list_13_31), we add a new link in our navigation\
    \ menu, and apply the right security settings using the `authorize` tag. Notice\
    \ that we allow both `ROLE_ADMIN` and `ROLE_AUTHOR` to access the functionality.\
    \ Users from both roles should be able to manage books, but inside the page we\
    \ will further restrict access based on their permissions. We will see this next.\n\
    \n***Listing 13-31.** Using the authorize tag in our navigation bar to display\
    \ only the Manage Books link to users with role `ROLE_ADMIN` or `ROLE_AUTHOR`*\n\
    \n```\n**<sec:authorize access=\"hasRole('ROLE_ADMIN') or hasRole('ROLE_AUTHOR')\
    \ \">**\n    <li>\n<spring:url value=\"/secured/manageBooks/manageBooks.htm\"\n\
    \                    var=\"manageBooks\" />\n        <a href=\"${manageBooks}\"\
    >\n            <spring:message code=\"nav.manageBooks\"/>\n        </a>\n    </li>\n\
    **</sec:authorize>**\n```\n\nIt is clear that a normal customer (like our user\
    \ `jd`) will not be able to see the Manage Books link at all. Only authors and\
    \ administrators will.\n\nNext we will modify the manage books functionality in\
    \ the `/WEB-INF/view/secured/manageBooks/manageBooks.jsp` page (see [Listing 13-32](#Chapter13.html#list_13_32)).\
    \ Here we will further control authorization based on the specific permissions.\n\
    \n***Listing 13-32.** The finer-grained permission checks*\n\n```\n<%@ taglib\
