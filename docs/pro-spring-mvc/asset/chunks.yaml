  raw: '##### The Application Context


    The org.springframework.web.servlet.DispatcherServlet needs an `org.springframework.web.context
    .WebApplicationContext` to configure itself with the needed components. You can
    either let the servlet construct one itself or use the constructor to pass an
    application context. In an XML-based configuration file, the first option is used
    (because there is no way to construct an application context). In a Java-based
    configuration, the second option is used.


    In the sample application, the `com.apress.prospringmvc.bookstore.web .BookstoreWebApplicationInitializer`
    is the class that bootstraps the application. To enable Java-based configuration,
    you need to instruct the servlet to use a Java-based application context (the
    default is an XML-based one), as well as pass it the configuration classes. You
    will use the `org.springframework.web .context.support.AnnotationConfigWebApplicationContext`
    class to set up the application and to configure the servlet. The changes are
    highlighted in bold in [Listing 4-5](#Chapter04.html#list_4_5).


    ***Listing 4-5.** The BookstoreWebApplicationInitializer with ApplicationContext*


    `package com.apress.prospringmvc.bookstore.web;`


    `// javax.servlet imports omitted.`


    `import org.springframework.web.WebApplicationInitializer;`

    `import org.springframework.web.context.WebApplicationContext;`

    `import org.springframework.web.context.support`

    `       .AnnotationConfigWebApplicationContext;`

    `import org.springframework.web.servlet.DispatcherServlet;`


    `import com.apress.prospringmvc.bookstore.web.config.WebMvcContextConfiguration;`


    `public class BookstoreWebApplicationInitializer`![Image](images/U002.jpg)

    ` implements WebApplicationInitializer {`


    `  @Override`

    `  public void onStartup(final ServletContext servletContext)`

    `  throws ServletException {`

    `      registerDispatcherServlet(servletContext);`

    `    }`


    `  private void registerDispatcherServlet(final ServletContext servletContext)
    {`

    **`      WebApplicationContext dispatcherContext = createContext`![Image](images/U002.jpg)**

    **`(WebMvcContextConfiguration.class);`**

    **`      DispatcherServlet dispatcherServlet = new DispatcherServlet(dispatcherContext);`**

    `      ServletRegistration.Dynamic dispatcher;`

    `      dispatcher = servletContext.addServlet("dispatcher", dispatcherServlet);`

    `      dispatcher.setLoadOnStartup(1);`

    `      dispatcher.addMapping("/");`

    `  }`


    **`  private WebApplicationContext createContext(final Class<?>... annotatedClasses)
    {`**

    **`      AnnotationConfigWebApplicationContext context`**

    **`      context = new AnnotationConfigWebApplicationContext();`**

    **`      context.register(annotatedClasses);`**

    **`      return context;`**

    **`  }`**

    **`}`**


    [Listing 4-5](#Chapter04.html#list_4_5) shows how to construct the `org.springframework.web.servlet.DispatcherServlet`
    and pass it an application context. This is the most basic way of configuring
    the servlet.


    [Chapter 2](#Chapter02.html#ch2) covered the notion of profiles. To select a profile,
    you could include a servlet-initialization parameter (see [Chapter 2](#Chapter02.html#ch2));
    however, to be more dynamic, you could use a `org.springframework.context .ApplicationContextInitializer`.
    Such initializers are used to initialize an application context just before it
    loads all the beans.


    This is useful in a web application when you want to configure or set the profile(s)
    you want to use (again, see [Chapter 2](#Chapter02.html#ch2) for more information).
    For instance, you might have a custom system property you need to set. Alternatively,
    you might detect the profile by reading a certain file on the file system or even
    select a profile based on the operation system. You have an almost unlimited number
    of options.


    In [Appendix A](#Appendix.html#appA), you will learn how to deploy your application
    to CloudFoundry. There is also an API for CloudFoundry that contains an `ApplicationContextInitializer`.
    This implementation detects that it is running on the cloud and activates a profile
    named `cloud` (see [Listing 4-6](#Chapter04.html#list_4_6)).


    ***Listing 4-6.** The CloudApplicationContextInitializer*


    `package org.cloudfoundry.reconfiguration.spring;`


    `// Other imports omitted`


    `import org.cloudfoundry.runtime.env.CloudEnvironment;`

    `import org.springframework.context.ApplicationContextInitializer;`

    `import org.springframework.context.ConfigurableApplicationContext;`

    `import org.springframework.core.Ordered;`

    `import org.springframework.core.env.ConfigurableEnvironment;`

    `import org.springframework.core.env.EnumerablePropertySource;`

    `import org.springframework.core.env.PropertiesPropertySource;`

    `import org.springframework.core.env.PropertySource;`


    `public final class CloudApplicationContextInitializer`

    `implements ApplicationContextInitializer<ConfigurableApplicationContext>,`

    `           Ordered {`


    `    private static final Log logger =`

    `            LogFactory.getLog(CloudApplicationContextInitializer.class);`


    `    private static final int DEFAULT_ORDER = 0;`


    `    private ConfigurableEnvironment springEnvironment;`

    `    private CloudEnvironment cloudFoundryEnvironment;`


    `    public CloudApplicationContextInitializer() {`

    `        cloudFoundryEnvironment = new CloudEnvironment();`

    `    }`


    `    @Override`

    `    public void initialize(ConfigurableApplicationContext applicationContext)
    {`

    `        if (!cloudFoundryEnvironment.isCloudFoundry()) {`

    `            logger.info("Not running on Cloud Foundry.”)`

    `            return;`

    `        }`

    `        try {`

    `            logger.info("Initializing Spring Environment for Cloud Foundry");`

    `            springEnvironment = applicationContext.getEnvironment();`

    `            addPropertySource(buildPropertySource());`

    **`            addActiveProfile("cloud");`**

    `        } catch (Throwable t) {`

    *`// be safe`*

    `            logger.error("Unexpected exception on initialization: "`

    `                         + t.getMessage(), t);`

    `        }`

    `    }`

    `    // Other methods omitted`

    `}`


    ##### Component Resolution


    When the servlet is configured, it will receive an initialization request from
    the servlet container. When the servlet initializes, it uses the logic, as depicted
    in [Figure 4-9](#Chapter04.html#fig_4_9), to detect the components needed. Some
    components are detected by type, whereas others are detected by name. For the
    components detectable by type, you can specify (see [Table 4-2](#Chapter04.html#tab_4_2))
    that you don’t want to do this. In this case, the component will be detected by
    a well-known name. [Table 4-3](#Chapter04.html#tab_4_3) lists the different components
    involved in request processing and the bean name used to detect it. The table
    also indicates whether the dispatcher servlet detects multiple instances automatically
    (when yes can be disabled, then a single bean is detected by the name, as specified
    in the table).


    ![Image](images/9781430241553_Fig04-09.jpg)


    ***Figure 4-9.** The DispatcherServlet’s discovery of components*


    ![Image](images/tab_4_3.jpg)


    ##### The Dispatcher Servlet’s Default Configuration


    You might feel a bit overwhelmed by all the components involved in the handling
    of a request. You might even wonder if you need to configure all of them explicitly.
    Luckily, Spring MVC has some sensible defaults that, in a lot of cases, are enough—or
    at least enough to get started. As you can see in [Table 4-4](#Chapter04.html#tab_4_4),
    the dispatcher servlet has quite a few default settings. You can find more information
    on the different implementations in the next section.


    ![Image](images/tab_4_4.jpg)


    ![Image](images/tab_4_4a.jpg)'
