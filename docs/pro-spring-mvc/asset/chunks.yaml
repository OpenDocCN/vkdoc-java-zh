    \ we need to configure it. For this, we need to modify our configuration class.\
    \ Specifically, we need to add the processor as a bean and make the environment\
    \ aware of the bean’s existence (see [Listing 6-29](#Chapter06.html#list_6_29)).\n\
    \n**Listing 6-29.** The Modified `WebMvcContextConfiguration`\n\n```java\npackage\
    \ com.apress.prospringmvc.bookstore.web.config;\n\nimport com.apress.prospringmvc.bookstore.web.method.support.SessionAttributeProcessor;\n\
    \n// Other imports omitted\n\n@Configuration\n@EnableWebMvc\n@ComponentScan(basePackages\
    \ = { \"com.apress.prospringmvc.bookstore.web\" })\npublic class WebMvcContextConfiguration\
    \ extends WebMvcConfigurerAdapter {\n\n    @Bean\n    public SessionAttributeProcessor\
    \ sessionAttributeProcessor() {\n        return new SessionAttributeProcessor();\n\
    \    }\n\n    @Override\n    public void addArgumentResolvers(\n            List<HandlerMethodArgumentResolver>\
    \ argumentResolvers) {\n        argumentResolvers.add(sessionAttributeProcessor());\n\
    \    }\n\n    @Override\n    public void addReturnValueHandlers(\n           \
    \ List<HandlerMethodReturnValueHandler> returnValueHandlers) {\n        returnValueHandlers.add(sessionAttributeProcessor());\n\
    \    }\n    // Other methods omitted\n}\n```\n\nNow that we have configured our\
    \ processor, we are finally ready to use it. Let’s begin by modifying the controllers\
    \ for accounts, as shown in [Listing 6-30](#Chapter06.html#list_6_30). We removed\
    \ the need for directly accessing the session and the need for adding the account\
    \ to the model, this is now all handled by the processor. Bold font reflects the\
    \ changes; it is simply an annotation on a method argument. At this point, we\
    \ no longer need direct access to the HTTP session.\n\n**Listing 6-30.** The Modified\
    \ `AccountController`\n\n```java\npackage com.apress.prospringmvc.bookstore.web.controller;\n\
    \n// Imports omitted\n\n@Controller\n@RequestMapping(\"/customer/account\")\n\
    @SessionAttributes(types = Account.class)\npublic class AccountController {\n\n\
    \    @RequestMapping(method = RequestMethod.GET)\n    public String index(\n \
    \           Model model,\n            @SessionAttribute(value = LoginController.ACCOUNT_ATTRIBUTE,\
    \ exposeAsModelAttribute = true) Account account) {\n        model.addAttribute(\"\
    orders\", this.orderRepository.findByAccount(account));\n        return \"customer/account\"\
    ;\n    }\n    // Other methods omitted\n}\n```\n\nIf we now relaunch the application\
