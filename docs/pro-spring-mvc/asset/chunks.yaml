    ##### 配置模板引擎


    Spring 框架对 Velocity 和 FreeMarker 都提供了广泛支持，并且有一些辅助类可以更轻松地配置这些引擎。对于 Velocity，有 `org.springframework.web.servlet.view.velocity.VelocityConfigurer`（表
    8-7）；对于 FreeMarker，有 `org.springframework.web.servlet.view.freemarker.FreeMarkerConfigurer`（表
    8-8）。它们各自用于配置相应的模板引擎。


    ![Image](img/9781430241553_tab08-07.jpg)


    ![Image](img/9781430241553_tab08-08.jpg)


    这些表中最重要的属性是设置模板加载位置的属性。对于 Velocity，它是 `resourceLoaderPath`；对于 FreeMarker，它是 `templateLoaderPath`。最佳实践是让
    Web 客户端无法访问这些路径，可以通过将它们放在 `WEB-INF` 目录下来实现。


    ![Image](img/square.jpg) **注意** 还有 `org.springframework.beans.factory.FactoryBean`
    可用于配置相应的模板引擎。这些工厂 Bean 用于引导引擎，使其作为非 Web 模板（如电子邮件）使用。


    除了设置不同的引擎，我们还需要配置一个视图解析器来解析到正确的视图实现。Spring 提供了 `org.springframework.web.servlet.view.velocity.VelocityViewResolver`
    或 `org.springframework.web.servlet.view.velocity.VelocityLayoutViewResolver`。对于
    FreeMarker，有 `org.springframework.web.servlet.view.freemarker.FreemarkerViewResolver`。并不强制要求使用这些专门的视图解析器；一个经过充分配置的
    `InternalResourceViewResolver` 也可以胜任。然而，使用这些专门的视图解析器能让我们的生活更轻松。清单 8-17 和 8-18
    展示了 Velocity 和 FreeMarker 的配置示例。


    ***清单 8-17.** Velocity 配置*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// 其他导入已省略`

    `import org.springframework.web.servlet.view.velocity.VelocityConfigurer;`

    `import org.springframework.web.servlet.view.velocity.VelocityViewResolver;`


    `@Configuration`

    `public class ViewConfiguration {`


    `    @Bean`

    `    public VelocityConfigurer velocityConfigurer() {`

    `        VelocityConfigurer velocityConfigurer = new VelocityConfigurer();`

    `        velocityConfigurer.setResourceLoaderPath("WEB-INF/velocity");`

    `        return velocityConfigurer;`

    `    }`


    `    @Bean`

    `    public ViewResolver velocityViewResolver() {`

    `        VelocityViewResolver viewResolver = new VelocityViewResolver();`

    `        viewResolver.setSuffix(".vm");`

    `        return viewResolver;`

    `    }`

    `}`


    ***清单 8-18.** FreeMarker 配置*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// 其他导入已省略`

    `import org.springframework.web.servlet.view.freemarker.FreeMarkerConfigurer;`

    `import org.springframework.web.servlet.view.freemarker.FreeMarkerViewResolver;`


    `@Configuration`

    `public class ViewConfiguration {`


    `    @Bean`

    `    public FreeMarkerConfigurer freeMarkerConfigurer() {`

    `        FreeMarkerConfigurer freeMarkerConfigurer;`

    `        freeMarkerConfigurer = new FreeMarkerConfigurer();`

    `        freeMarkerConfigurer.setTemplateLoaderPath("WEB-INF/freemarker");`

    `        return freeMarkerConfigurer;`

    `    }`


    `    @Bean`

    `    public ViewResolver freeMarkerViewResolver() {`

    `        FreeMarkerViewResolver viewResolver = new FreeMarkerViewResolver();`

    `        viewResolver.setSuffix(".ftl");`

    `        return viewResolver;`

    `    }`

    `}`


    现在，当控制器返回 `index` 作为视图名称时，对于 Velocity，将从 `WEB-INF/velocity/index.vm` 加载模板；对于 FreeMarker，则变为
    `WEB-INF/freemarker/index.ftl`。`resourceLoaderPath`/`templateLoaderPath` 会作为前缀添加到视图名称之前。这两个视图解析器还允许设置一个额外的前缀（继承自
    `UrlBasedViewResolver`）。表 8-9 描述了视图解析器的不同属性。


    ![Image](img/9781430241553_tab08-09.jpg)


    ##### 模板语言


    现在我们已经配置好了环境，还需要编写一个模板来向用户展示页面。这两种模板语言非常相似。清单 8-19 和 8-20 分别展示了用 Velocity 和 FreeMarker
    编写的图书搜索页面。


    ***清单 8-19.** Velocity 模板*


    `<!DOCTYPE HTML>`

    `<html>`

    `<head>`

    `<title>图书搜索</title>`

    `</head>`

    `<body>`

    `<h1>#springMessage("book.title")</h1>`


    `<p>`


    `    <form method="POST">`

    `        <fieldset>`

    `            <legend>#springMessage("book.searchcriteria")</legend>`

    `            <table>`

    `                <tr><td>#springMessage("book.title")</td><td>#springFormInput`![Image](img/U002.jpg)

    `("searchCriteria.title" "")</td></tr>`

    `                <tr><td>#springMessage("book.category")</td><td>#springFormSingleSelect`![Image](img/U002.jpg)

    `("searchCriteria.category" $categories "")</td></tr>`

    `            </table>`

    `        </fieldset>`

    `        <button id="search">#springMessage("button.search")</button>`

    `    </form>`


    `    #if ($bookList.empty eq false)`

    `        <table>`

    `            <tr><th>#springMessage("book.title")</th><th>#springMessage`![Image](img/U002.jpg)

    `("book.description")</th><th>#springMessage("book.price")</th></tr>`

    `            #foreach($book in $bookList)`

    `                <tr><td>${book.title}</td><td>${book.description}</td><td>$`![Image](img/U002.jpg)

    `{book.price}</td><td><a href="#springUrl("/cart/add/${book.id}")">#springMessage`![Image](img/U002.jpg)

    `("book.addtocart")</a></tr>`

    `            #end`

    `        </table>`

    `    #end`

    `</p>`


    `</body>`

    `</html>`


    ***清单 8-20.** FreeMarker 模板*


    `<#ftl>`

    `<#import "/spring.ftl" as spring />`

    `<!DOCTYPE HTML>`

    `<html>`

    `<head>`

    `<title>图书搜索</title>`

    `</head>`

    `<body>`

    `<h1><@spring.message code="book.title" /></h1>`


    `<p>`


    `    <form method="POST">`

    `        <fieldset>`

    `            <legend><@spring.message code="book.searchcriteria" /></legend>`

    `            <table>`

    `                <tr><td><@spring.message code="book.title" /></td><td><@spring.formInput`![Image](img/U002.jpg)

    `"searchCriteria.title" /></td></tr>`

    `                <tr><td><@spring.message code="book.category"`![Image](img/U002.jpg)

    `/></td><td><@spring.formSingleSelect "searchCriteria.category", categories, ""
    /></td></tr>`

    `            </table>`

    `        </fieldset>`

    `        <button id="search"><@spring.message code="book.search" /></button>`

    `    </form>`


    `    <#if bookList?has_content>`

    `        <table>`

    `            <tr><th><@spring.message code="book.title"/></th><th><@spring.message`![Image](img/U002.jpg)

    `code="book.description"/></th><th><@spring.message code="book.price" /></th></tr>`

    `            <#list bookList as book>`

    `                <tr><td>${book.title}</td><td>${book.description}</td><td>$`![Image](img/U002.jpg)

    `{book.price}</td><td><a href="<@spring.url "/cart/add/${book.id}"/>"><@spring.message`![Image](img/U002.jpg)

    `code="book.addtocart"/></a></tr>`

    `            </#list>`

    `        </table>`

    `    </#if>`

    `</p>`


    `</body>`

    `</html>`


    查看这些模板，我们可以看到它们与我们在前几章编写的 JSP 类似。Velocity（清单 8-19）和 FreeMarker（清单 8-20）模板也提供了可用的标签库（在清单中绑定到
    Spring）。这两个库提供的支持与 JSP 的 Spring 表单标签库大致相同。表 8-10 概述了 Velocity 和 FreeMarker 的不同标签，或者更准确地说是宏库。


    ![Image](img/9781430241553_tab08-10.jpg)


    上述任何宏的参数都具有一致的含义：

    '
- fmt: "> *   **path:** the name of the field to bind to (that is, `\"searchCriteria.title\"\
    `).\n> *   **options:** a map containing all the available values that can be\
    \ selected from in the input field. The keys to the map represent the values that\
    \ will be POSTed back from the form and bound to the command object. The values\
    \ belonging to the key are used as the labels to show to the user. Usually such\
    \ a map is supplied as reference data by the controller. Any `Map` implementation\
    \ can be used, depending on required behavior.\n> *   **separator:** where multiple\
    \ options are available as discrete elements (radio buttons or checkboxes), the\
    \ sequence of characters used to separate each one in the list (for example, `<br>`).\n\
    > *   **attributes:** an additional string of arbitrary tags or text to be included\
    \ within the HTML tag itself. This string is echoed literally by the macro. For\
    \ example, in a textarea field you may supply attributes as `'rows=\"5\" cols=\"\
    60\"'` or you could pass style information such as `'style=\"border:1px solid\
    \ silver\"'`.\n> *   **classOrStyle:** for the `showErrors` macro, the name of\
    \ the CSS class that the span tag wrapping each error will use. If no information\
    \ is supplied (or the value is empty), the errors will be wrapped in `<b></b>`\
    \ tags.\n\n![Image](images/square.jpg) **Tip** The two macros marked (*) in the\
    \ table exist for FreeMarker; however, they are not actually required, as you\
    \ can use the normal `formInput` macro specifying `hidden` or `password` as the\
    \ value for the `fieldType` parameter.\n\nThe difference between the FreeMarker\
    \ and Velocity macros is that with FreeMarker you can, as in JSP, specify which\
    \ library to use. This isn’t possible with Velocity macros, because they are global\
    \ and are included (and accessible) on every page. For FreeMarker we need to specify\
    \ the library by using the `import` directive (see top of [Listing 8-20](#Chapter08.html#list_8_20)).\n\
    \n### Dates and Numbers\n\nVelocity has several useful tools available for formatting\
    \ dates and numbers. Spring can also integrate with those tools so that they can\
    \ use the current selected locale. To enable this support we need to set the `dateToolAttribute`\
    \ and/or the `numberToolAttribute`. Setting these properties will expose the tools\
    \ to the model so that they can be used in the view template.\n\n### PDF\n\nSpring\
    \ uses the iText library^([5](#Chapter08.html#CHP-8-FN-5)) to add PDF support.\
    \ To enable this we need to write our own view implementation and for that we\
    \ need to extend `org.springframework.web.servlet.view.document.AbstractPdfView`.\
    \ When we extend this class we must implement the `buildPdfDocument` method.\n\
    \nWe are going to create a PDF that gives an overview of one of our orders on\
    \ our account page. [Listing 8-21](#Chapter08.html#list_8_21) shows the view implementation.\n\
    \n**Listing 8-21.** View Implementation to Create a PDF\n\n```\npackage com.apress.prospringmvc.bookstore.web.view;\n\
    \n// Other imports omitted\nimport org.springframework.web.servlet.view.document.AbstractPdfView;\n\
    \nimport com.apress.prospringmvc.bookstore.domain.Order;\nimport com.apress.prospringmvc.bookstore.domain.OrderDetail;\n\
    import com.lowagie.text.Document;\nimport com.lowagie.text.Paragraph;\nimport\
    \ com.lowagie.text.Table;\nimport com.lowagie.text.pdf.PdfWriter;\n\npublic class\
    \ OrderPdfView extends AbstractPdfView {\n\n    @Override\n    protected void\
    \ buildPdfDocument(Map<String, Object> model,\n                              \
    \      Document document,\n                                    PdfWriter writer,\n\
    \                                    HttpServletRequest request,\n           \
    \                         HttpServletResponse response)\n    throws Exception\
    \ {\n\n        Order order = (Order) model.get(\"order\");\n\n        document.addTitle(\"\
    Order :\" + order.getId());\n        document.add(new Paragraph(\"Order date:\
    \ \" + order.getOrderDate()));\n        document.add(new Paragraph(\"Delivery\
    \ date: \" + order.getDeliveryDate()));\n\n        Table orderDetails = new Table(4);\n\
    \        orderDetails.addCell(\"Title\");\n        orderDetails.addCell(\"Price\"\
    );\n        orderDetails.addCell(\"#\");\n        orderDetails.addCell(\"Total\"\
    );\n\n        for (OrderDetail detail : order.getOrderDetails()) {\n         \
    \   orderDetails.addCell(detail.getBook().getTitle());\n            orderDetails.addCell(detail.getBook().getPrice().toString());\n\
    \            orderDetails.addCell(String.valueOf(detail.getQuantity()));\n   \
    \         orderDetails.addCell(detail.getPrice().toString());\n        }\n\n \
    \       document.add(orderDetails);\n\n    }\n\n}\n```\n\n_________\n\n⁵ [`http://itextpdf.com/`](http://itextpdf.com/)\n\
    \nNext let’s add `org.springframework.web.servlet.view.ContentNegotiatingViewResolver`\
    \ to our view configuration. We do this so that we can have our order page rendered\
    \ in HTML or PDF, and we don’t want to change our `com.apress.prospringmvc.bookstore.web.controller.OrderController`\
    \ because that is already doing what we want, adding the selected order to the\
    \ model. [Listing 8-22](#Chapter08.html#list_8_22) shows the changed `com.apress.prospringmvc.bookstore.web.config.ViewConfiguration`.\
    \ This is also where we will start using our custom view resolver (see the discussion\
    \ of implementing your own view resolver).\n\n**Listing 8-22.** ViewConfiguration\
    \ with ContentNegotiatingViewResolver\n\n```\npackage com.apress.prospringmvc.bookstore.web.config;\n\
    \n// Other imports omitted\nimport org.springframework.web.servlet.view.ContentNegotiatingViewResolver;\n\
    import org.springframework.web.servlet.view.document.AbstractPdfView;\n\nimport\
    \ com.apress.prospringmvc.bookstore.web.view.OrderPdfView;\nimport com.apress.prospringmvc.bookstore.web.view\n\
    \       .SimpleConfigurableViewResolver;\n\n@Configuration\npublic class ViewConfiguration\
    \ {\n\n    @Bean\n    public ContentNegotiatingViewResolver contentNegotiatingViewResolver()\
    \ {\n        ContentNegotiatingViewResolver viewResolver;\n        viewResolver\
    \ = new ContentNegotiatingViewResolver();\n        List<ViewResolver> viewResolvers\
    \ = new ArrayList<ViewResolver>();\n        viewResolvers.add(pdfViewResolver());\n\
    \        viewResolver.setViewResolvers(viewResolvers);\n        return viewResolver;\n\
    \    }\n\n    @Bean\n    public ViewResolver pdfViewResolver() {\n        SimpleConfigurableViewResolver\
    \ viewResolver;\n        viewResolver = new SimpleConfigurableViewResolver();\n\
    \        Map<String, AbstractPdfView> views;\n        views = new HashMap<String,\
    \ AbstractPdfView>();\n        views.put(\"order\", new OrderPdfView());\n   \
    \     viewResolver.setViews(views);\n        return viewResolver;\n    }\n   \
    \ // Other methods omitted, see Listing 8-13\n}\n```\n\nThe changed configuration\
    \ contains our own view resolver, and we use it to resolve the `com.apress.prospringmvc.bookstore.web.view.OrderPdfView`.\
    \ We do this because we also want to be able to resolve an order view for an Excel\
    \ document (see the “Excel” section).\n\nAfter these changes we need to redeploy\
    \ our application, if we log in and navigate to our account page we can now click\
    \ the PDF link and actually get a PDF instead of the HTML version. [Figure 8-5](#Chapter08.html#fig_8_5)\
    \ shows the result of clicking the PDF link.\n\n![Image](images/9781430241553_Fig08-05.jpg)\n\
    \n**Figure 8-5.** Generated PDF\n\nAlthough this approach is very flexible, the\
    \ drawback is that we would need to code the construction of PDFs for each PDF\
    \ we want. If we have some complex PDF or need to apply a certain style, this\
    \ will be quite cumbersome and hard to maintain. In such cases, it might be worthwhile\
    \ to look at solutions like JasperReports (see the section “JasperReports”)."
  raw: '> *   **path:** the name of the field to bind to (that is, "`searchCriteria.title`").

    > *   **options:** a map containing all the available values that can be selected
    from in the input field. The keys to the map represent the values that will be
    POSTed back from the form and bound to the command object. The values belonging
    to the key are used as the labels to show to the user. Usually such a map is supplied
    as reference data by the controller. Any Map implementation can be used, depending
    on required behavior.

    > *   **separator:** where multiple options are available as discrete elements
    (radio buttons or checkboxes), the sequence of characters used to separate each
    one in the list (for example, `<br>`).

    > *   **attributes:** an additional string of arbitrary tags or text to be included
    within the HTML tag itself. This string is echoed literally by the macro. For
    example, in a textarea field you may supply attributes as ''`rows="5" cols="60"`''
    or you could pass style information such as ''`style="border:1px solid silver"`''.

    > *   **classOrStyle:** for the showErrors macro, the name of the CSS class that
    the span tag wrapping each error will use. If no information is supplied (or the
    value is empty), the errors will be wrapped in `<b></b>` tags.


    ![Image](images/square.jpg) **Tip** The two macros marked (*) in the table exist
    for FreeMarker; however, they are not actually required, as you can use the normal
    `formInput` macro specifying `hidden` or `password` as the value for the `fieldType`
    parameter.


    The difference between the FreeMarker and Velocity macros is that with FreeMarker
    you can, as in JSP, specify which library to use. This isn’t possible with Velocity
    macros, because they are global and are included (and accessible) on every page.
    For FreeMarker we need to specify the library by using the `import` directive
    (see top of [Listing 8-20](#Chapter08.html#list_8_20)).


    ##### Dates and Numbers


    Velocity has several useful tools available for formatting dates and numbers.
    Spring can also integrate with those tools so that they can use the current selected
    locale. To enable this support we need to set the `dateToolAttribute` and/or the
    `numberToolAttribute`. Setting these properties will expose the tools to the model
    so that they can be used in the view template.


    #### PDF


    Spring uses the iText library^([5](#Chapter08.html#CHP-8-FN-5)) to add PDF support.
    To enable this we need to write our own view implementation and for that we need
    to extend `org.springframework.web.servlet.view.document.AbstractPdfView`. When
    we extend this class we must implement the `buildPdfDocument` method.


    We are going to create a PDF that gives an overview of one of our orders on our
    account page. [Listing 8-21](#Chapter08.html#list_8_21) shows the view implementation.


    ***Listing 8-21.** View Implementation to Create a PDF*


    `package com.apress.prospringmvc.bookstore.web.view;`


    `// Other imports omitted`

    `import org.springframework.web.servlet.view.document.AbstractPdfView;`


    `import com.apress.prospringmvc.bookstore.domain.Order;`

    `import com.apress.prospringmvc.bookstore.domain.OrderDetail;`

    `import com.lowagie.text.Document;`

    `import com.lowagie.text.Paragraph;`

    `import com.lowagie.text.Table;`

    `import com.lowagie.text.pdf.PdfWriter;`


    `public class OrderPdfView extends AbstractPdfView {`


    `    @Override`

    `    protected void buildPdfDocument(Map<String, Object> model,`

    `                                    Document document,`

    `                                    PdfWriter writer,`

    `                                    HttpServletRequest request,`

    `                                    HttpServletResponse response)`

    `    throws Exception {`


    `        Order order = (Order) model.get("order");`


    `        document.addTitle("Order :" + order.getId());`

    `        document.add(new Paragraph("Order date: " + order.getOrderDate()));`

    `        document.add(new Paragraph("Delivery date: " + order.getDeliveryDate()));`


    `        Table orderDetails = new Table(4);`

    `        orderDetails.addCell("Title");`

    `        orderDetails.addCell("Price");`

    `        orderDetails.addCell("#");`

    `        orderDetails.addCell("Total");`


    `        for (OrderDetail detail : order.getOrderDetails()) {`

    `            orderDetails.addCell(detail.getBook().getTitle());`

    `            orderDetails.addCell(detail.getBook().getPrice().toString());`

    `            orderDetails.addCell(String.valueOf(detail.getQuantity()));`

    `            orderDetails.addCell(detail.getPrice().toString());`

    `        }`


    `        document.add(orderDetails);`


    `    }`


    `}`


    _________


    ⁵ [`http://itextpdf.com/`](http://itextpdf.com/)


    Next let’s add `org.springframework.web.servlet.view.ContentNegotiatingViewResolver`
    to our view configuration. We do this so that we can have our order page rendered
    in HTML or PDF, and we don’t want to change our `com.apress.prospringmvc.bookstore.web.controller.OrderController`
    because that is already doing what we want, adding the selected order to the model.
    [Listing 8-22](#Chapter08.html#list_8_22) shows the changed `com.apress.prospringmvc.bookstore.web.config.ViewConfiguration`.
    This is also where we will start using our custom view resolver (see the discussion
    of implementing your own view resolver).


    ***Listing 8-22.** ViewConfiguration with ContentNegotiatingViewResolver*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// Other imports omitted`

    `import org.springframework.web.servlet.view.ContentNegotiatingViewResolver;`

    `import org.springframework.web.servlet.view.document.AbstractPdfView;`


    `import com.apress.prospringmvc.bookstore.web.view.OrderPdfView;`

    `import com.apress.prospringmvc.bookstore.web.view`

    `       .SimpleConfigurableViewResolver;`


    `@Configuration`

    `public class ViewConfiguration {`


    `    @Bean`

    `    public ContentNegotiatingViewResolver contentNegotiatingViewResolver() {`

    `        ContentNegotiatingViewResolver viewResolver;`

    `        viewResolver = new ContentNegotiatingViewResolver();`

    `        List<ViewResolver> viewResolvers = new ArrayList<ViewResolver>();`

    `        viewResolvers.add(pdfViewResolver());`

    `        viewResolver.setViewResolvers(viewResolvers);`

    `        return viewResolver;`

    `    }`


    `    @Bean`

    `    public ViewResolver pdfViewResolver() {`

    `        SimpleConfigurableViewResolver viewResolver;`

    `        viewResolver = new SimpleConfigurableViewResolver();`

    `        Map<String, AbstractPdfView> views;`

    `        views = new HashMap<String, AbstractPdfView>();`

    `        views.put("order", new OrderPdfView());`

    `        viewResolver.setViews(views);`

    `        return viewResolver;`

    `    }`

    `    // Other methods omitted, see Listing 8-13`

    `}`


    The changed configuration contains our own view resolver, and we use it to resolve
    the `com.apress.prospringmvc.bookstore.web.view.OrderPdfView`. We do this because
    we also want to be able to resolve an order view for an Excel document (see the
    “Excel” section ).


    After these changes we need to redeploy our application, if we log in and navigate
    to our account page we can now click the PDF link and actually get a PDF instead
    of the HTML version. [Figure 8-5](#Chapter08.html#fig_8_5) shows the result of
    clicking the PDF link.


    ![Image](images/9781430241553_Fig08-05.jpg)


    ***Figure 8-5.** Generated PDF*


    Although this approach is very flexible, the drawback is that we would need to
    code the construction of PDFs for each PDF we want. If we have some complex PDF
    or need to apply a certain style, this will be quite cumbersome and hard to maintain.
    In such cases, it might be worthwhile to look at solutions like JasperReports
    (see the section “JasperReports”).'
  trans: '

    > *   **path：** 要绑定的字段名称（例如，“`searchCriteria.title`”）。

    > *   **options：** 一个映射，包含输入字段中所有可供选择的值。该映射的键代表将从表单 POST 回来并绑定到命令对象的值。键对应的值用作向用户显示的标签。通常，此类映射由控制器作为参考数据提供。可以根据所需行为使用任何
    Map 实现。

    > *   **separator：** 当多个选项作为离散元素（单选按钮或复选框）可用时，用于在列表中分隔每个选项的字符序列（例如，`<br>`）。

    > *   **attributes：** 要包含在 HTML 标签本身中的任意标签或文本的附加字符串。此字符串由宏原样输出。例如，在文本区域字段中，你可以提供属性，如
    ''`rows="5" cols="60"`''，或者传递样式信息，如 ''`style="border:1px solid silver"`''。

    > *   **classOrStyle：** 对于 showErrors 宏，这是包裹每个错误的 span 标签将使用的 CSS 类的名称。如果未提供任何信息（或值为空），则错误将被包裹在
    `<b></b>` 标签中。


    ![Image](img/square.jpg) **提示** 表中标记为 (*) 的两个宏存在于 FreeMarker 中；然而，它们实际上并非必需，因为你可以使用普通的
    `formInput` 宏，并将 `hidden` 或 `password` 指定为 `fieldType` 参数的值。


    FreeMarker 和 Velocity 宏之间的区别在于，使用 FreeMarker 时，你可以像在 JSP 中一样指定要使用的库。这在 Velocity
    宏中是不可能的，因为它们是全局的，并且包含在每个页面中（并且可访问）。对于 FreeMarker，我们需要使用 `import` 指令来指定库（参见 清单
    8-20 顶部）。


    ##### 日期和数字


    Velocity 有几个有用的工具可用于格式化日期和数字。Spring 也可以与这些工具集成，以便它们可以使用当前选定的区域设置。要启用此支持，我们需要设置
    `dateToolAttribute` 和/或 `numberToolAttribute`。设置这些属性会将工具暴露给模型，以便它们可以在视图模板中使用。


    #### PDF


    Spring 使用 iText 库^(5) 来添加 PDF 支持。要启用此功能，我们需要编写自己的视图实现，为此我们需要扩展 `org.springframework.web.servlet.view.document.AbstractPdfView`。当我们扩展此类时，必须实现
    `buildPdfDocument` 方法。


    我们将创建一个 PDF，用于在我们的账户页面上概览其中一个订单。清单 8-21 显示了视图实现。


    ***清单 8-21.** 创建 PDF 的视图实现*


