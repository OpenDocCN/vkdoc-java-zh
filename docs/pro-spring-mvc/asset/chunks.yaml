- fmt: '#### Execute the `HandlerExecutionChain`


    To handle the request, the `DispatcherServlet` uses the `HandlerExecutionChain`
    to determine what to execute. This class holds a reference to the actual handler
    that needs to be invoked; however, it also (optionally) references `org.springframework.web.servlet.HandlerInterceptor`
    implementations that are executed before (`preHandle` method) and after (`postHandle`
    method) the execution of the handler. These interceptors can be used to apply
    crosscutting functionality (see [Chapter 6](#Chapter06.html#ch6) for more information
    about this topic). If the code executes successfully, the interceptors are called
    again; and finally, when needed, the view is rendered (see [Figure 4-5](#Chapter04.html#fig_4_5)).


    ![Image](images/9781430241553_Fig04-05.jpg)


    ***Figure 4-5.** Handling the request*


    The execution of the handler is delegated to the selected `HandlerAdapter` that
    was determined in the previous step. It knows how to execute the selected handler
    and how to translate the response into an `org.springframework.web.servlet.ModelAndView`.
    If there is no view in the returned `ModelAndView`, an `org.springframework.web.servlet.RequestToViewNameTranslator`
    is consulted to generate a view name based on the incoming request.


    #### Handle Exceptions


    When an exception is thrown during the handling of the request, the `DispatcherServlet`
    will consult the configured `org.springframework.web.servlet.HandlerExceptionResolver`s
    to handle the thrown exception. The resolver can translate the exception to a
    view to show the user. For instance, if there is an exception related to database
    errors, you could show a page indicating the database is down. If the exception
    isn’t resolved, it is rethrown and handled by the servlet container, which generally
    results in an HTTP 500 response code (internal server error). [Figure 4-6](#Chapter04.html#fig_4_6)
    shows this part of the request processing workflow.


    ![Image](images/9781430241553_Fig04-06.jpg)


    ***Figure 4-6.** Exception handling*


    #### Render a View


    If a view has been selected during the request processing workflow, the `DispatcherServlet`
    first checks whether it is a view reference (this is the case if the view is a
    `java.lang.String`). If so, the configured `org.springframework.web.servlet.ViewResolver`s
    are consulted to resolve the view reference to an actual `org.springframework.web.servlet.View`
    implementation. If there is no view and one cannot be resolved, a `javax.servlet.ServletException`
    is thrown. [Figure 4-7](#Chapter04.html#fig_4_7) shows the view rendering process.


    ![Image](images/9781430241553_Fig04-07.jpg)


    ***Figure 4-7.** The view rendering process*


    #### Finish the Processing


    Each incoming request passes through this step of the request processing flow,
    regardless of whether there are exceptions. If an `HandlerExecutionChain` is available,
    then the `afterCompletion` method of the interceptors is called. Only the interceptors
    where the `preHandle` method was successfully invoked will have their `afterCompletion`
    method called. Next, these interceptors are executed in the reverse order that
    their `preHandle` method was called. This mimics the behavior seen in servlet
    filters, where the first filter called is also the last one to be called.


    Finally, the `DispatcherServlet` uses the event mechanism in the Spring Framework
    to fire an `org.springframework.web.context.support.RequestHandledEvent` (see
    [Figure 4-8](#Chapter04.html#fig_4_8)). You could create and configure an `org.springframework.context.ApplicationListener`
    to receive and log these events.


    ![Image](images/9781430241553_Fig04-08.jpg)


    ***Figure 4-8.** Finish the processing*


    ### The Request Processing Summary


    The `DispatcherServlet` is a key component in processing requests with Spring
    MVC. It is also highly flexible and configurable. This flexibility comes from
    the fact that the servlet uses a lot of different components to fulfill its role,
    and these components are expressed as interfaces. [Table 4-1](#Chapter04.html#tab_4_1)
    gives an overview of all the main component types involved in the request processing
    workflow.


    ![Image](images/tab_4_1.jpg)


    ![Image](images/tab_4_1a.jpg)


    In the upcoming sections, you will see how to configure the `DispatcherServlet`.
    You will also take a closer look at different implementations of the various components.


    ## The `DispatcherServlet`


    Like any servlet, the `org.springframework.web.servlet.DispatcherServlet` needs
    to be configured so that the web container can bootstrap and map the servlet.
    This way, it will be able to handle requests. Configuring the `DispatcherServlet`
    is a two-way process. First, you need to tell the container to load a servlet
    and map it to one or more Urlpatterns.


    After bootstrapping, the servlet uses the created `org.springframework.web.context
    .WebApplicationContext` to configure itself. The servlet will try to detect the
    needed components from this application context and if not found, it will use
    some kind of default (in most cases).


    ### Bootstrapping the `DispatcherServlet`


    The Servlet 3.0 specification introduced several options for configuring and registering
    a servlet:


    *   Option 1: Use a `web.xml` (see [Listing 4-1](#Chapter04.html#list_4_1)).

    *   Option 2: Use a `web-fragment.xml` (see [Listing 4-2](#Chapter04.html#list_4_2)).

    *   Option 3: Use a `javax.servlet.ServletContainerInitializer` (see [Listing
    4-3](#Chapter04.html#list_4_3)).

    *   Option 4: The sample application uses Spring 3.1, so you can get a fourth
    option by implementing the `org.springframework.web.WebApplicationInitializer`
    interface.


    The dispatcher servlet needs a `WebApplicationContext` that should contain all
    the beans that enable the dispatcher servlet to configure itself. By default,
    the dispatcher servlet will create an `org.springframework.web.context.support.XmlWebApplicationContext`.
    All samples in the upcoming sections load the `org.springframework.web.servlet.DispatcherServlet`
    and map it to all incoming requests (/*). All these configurations lead to the
    same runtime setup of the servlet. Only the mechanism by which you do that is
    different. The remainder of the book will use Option 4 to configure the sample
    application.


    ![Image](images/square.jpg) **Note** The `org.springframework.web.context.WebApplicationContext`
    is a specialized extension of the `org.springframework.context.ApplicationContext`
    that is needed in web environments (see [Chapter 2](#Chapter02.html#ch2) for more
    information).


    The sample application that you are building throughout the book will use Option
    4 as much as possible to configure the environment and application. Nevertheless,
    you will learn the basic setup for all four options of configuring the servlet.'
