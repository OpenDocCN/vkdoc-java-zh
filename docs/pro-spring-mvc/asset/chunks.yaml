    You might wonder why we should use profiles, anyway. One reason is that it allows
    for flexible configurations. This means that our entire configuration is under
    version control and in the same source code, instead of being spread out over
    different servers, workstations, and so on. Of course, we can still load additional
    files containing some properties (like usernames and passwords). This can prove
    useful if a company’s security policy won’t allow us to put these properties into
    version control. We are going to use profiles extensively when we cover testing
    and deploying to the cloud because the two tasks require different configurations
    for the datasource.


    #### Enabling Features


    The Spring Framework gives us a lot more flexibility than just dependency injection;
    it also provides a lot of different features we can enable. We can enable these
    features using annotations (see [Table 2-6](#Chapter02.html#tab_2_6)). Note that
    we won’t use all of the annotations mentioned in this table; however, our sample
    application will use transactions, and we will use some AOP. The largest part
    of this book is about the features provided by the `org.springframework.web.servlet.config.annotation.EnableWebMvc`
    annotation.


    ![Image](images/tab_2_6.jpg)


    ![Image](images/tab_2_6a.jpg)


    ![Image](images/square.jpg) **Note**  For more information on these features,
    we recommend that you examine the Java documentation of the different annotations,
    as well as the dedicated reference guide chapters.'
