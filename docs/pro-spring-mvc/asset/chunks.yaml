  trans: '

    #### 不同的 Web Flow 作用域


    我们在前一章已经提到，Web Flow 在架构中引入了许多不同的作用域（确切地说是五个）：`conversation`、`flow`、`view`、`flash`
    和 `request`（参见第 10 章中的“细粒度作用域”一节）。每个作用域都有其明确定义的生命周期。


    ![Image](img/square.jpg) **注意** 你放入 `conversation`、`flow`、`view` 或 `flash` 作用域的每个对象都应实现
    `java.io.Serializable` 接口（对于 `request` 作用域，则无此要求）。这是因为 Web Flow 会在请求之间存储这些作用域的状态。默认实现依赖于
    Java 序列化机制。另请注意，这是递归的；你的对象所引用的每个对象也必须是可序列化的。如果你不希望保留某些对象，可以在字段上使用 Java 的 `transient`
    关键字。这样，该字段将被排除在序列化之外。当流程状态恢复时，这些字段将解析为 `null`。


    接下来，我们将从最短的生命周期到最长的生命周期，详细解释这五个作用域。让我们从 `request` 作用域开始。


    ##### Request 作用域


    图 11-1 展示了两个 HTTP 请求进入视图状态：HTTP 请求 1 和 HTTP 请求 2。虽然它们显示在同一张图中，但应被理解为顺序发生的。首先，HTTP
    请求 1 进入并被处理，然后返回响应。其次，HTTP 请求 2 进入，并针对该请求重复此循环。当第一个请求进入时，`request` 作用域 1 被启动。可能会触发一个事件，并执行一次转移。任何执行的操作都可以访问该
    `request` 作用域。当处理完成时，`request` 作用域 1 被销毁，并返回 HTTP 请求 1 的响应。当下一个请求（HTTP 请求 2）到来时，会创建一个*新的*
    `request` 作用域（请求作用域 2）。


    ![Image](img/9781430241553_Fig11-01.jpg)


    ***图 11-1.** 说明 request 作用域*


    ![Image](img/square.jpg) **注意** 我们想指出，从现在开始，在“作用域图”中，花括号表示该时刻可用的作用域。某个作用域的创建和清理由花括号本身表示；在花括号的顶部和底部之间，该作用域对任何试图使用它的执行过程都是可用的。


    `request` 作用域与流程执行中的单个请求相关联。进入流程执行的每一个请求都将从一个新的、空的 `request` 作用域开始。


    认识到 `request` 作用域本身并不与某个流程执行绑定，这一点很重要。因此，执行子流程的父流程（反之亦然）始终看到的是同一个 `request` 作用域。你可以使用
    `request` 作用域来存储仅在处理当前请求时才需要的对象。创建或加载成本较低的对象也可以放入 `request` 作用域，因为它们可以在每次需要时重新创建或重新加载。


    例如，如果你需要加载一个结果列表，你可以通过一个 `<on-render>` 动作来加载它们（我们稍后会解释）。`<on-render>` 在视图渲染之前执行。然后，结果可以非常短暂地存储在
    `request` 作用域中，直到视图使用该信息进行渲染，然后被清除。


    Servlet `request` 作用域和 Web Flow `request` 作用域之间有很大的相似性。主要区别在于，后者是 Web Flow 组件本地的。它是
    Web Flow 内部使用的一个内部构件，不会暴露给外部组件（例如，Servlet）。


    ![Image](img/square.jpg) **注意** 在 Web Flow 中包含 `request` 作用域是一个设计决策，目的是对标准的 Servlet
    `request` 作用域进行抽象。设计者也将 Web Flow 定位为其他平台（这些平台可能没有像 Servlet 规范那样的 `request` 作用域概念）。对于作为开发者的你来说，除了
    Web Flow 的 `request` 作用域更容易从例如流程内的表达式中访问之外，没有真正的区别。


    ##### Flash 作用域


    你可以将 `flash` 作用域视为一个更大的 `request` 作用域，它在“后置-重定向-获取”模式中存活两个请求，直到视图最终被渲染。具有 `flash`
    作用域的属性会一直保留，直到视图被渲染，然后被清除。


    将对象存储在 `flash` 作用域中，对于视图中需要但其他地方都不需要的对象特别有用。使用 `flash` 作用域的一个很好的例子是存储要在视图上渲染的消息，比如错误或警告消息。当动作执行时，它们可以由你的应用程序控制器或流程中的验证逻辑放入
    `flash` 作用域。`request` 作用域是不够的，因为模型验证发生在 PRG 模式的第一个请求中。因此，当视图被渲染时，放入 `request`
    作用域的消息将消失。`flash` 作用域为这类用例提供了一个优雅的解决方案。


    图 11-2 通过展示一个跨越转移 t1 中的请求 1 和请求 2 的 `flash` 作用域来说明这一点。从视图被渲染的那一刻起，现有的 `flash`
    作用域就被清除了。这意味着，如果你刷新视图，消息将会消失，这通常是你对错误和警告消息这类信息所期望的行为。


    ![Image](img/9781430241553_Fig11-02.jpg)


    ***图 11-2**. 展示 flash 作用域*


    因为 `flash` 作用域是一个扩展的 `request` 作用域，所以它也对所使用的任何子流程可用。例如，当视图状态内的一个转移委托给一个子流程，然后该子流程渲染视图时，`flash`
    作用域也将对该子流程内发生的执行过程可用。然而，在视图被渲染之后，对该子流程的任何后续请求都将在它们自己的 `flash` 作用域中运行。


    ##### View 作用域


    `view` 作用域在视图状态进入时被分配，并在视图状态退出时被销毁。`view` 作用域只能从视图状态内部引用。在图 11-3 中，你可以看到，对于每个新的视图状态，都有一个可用的新
    `view` 作用域。


    ![Image](img/9781430241553_Fig11-03.jpg)


    ***图 11-3**. 展示 view 作用域*


    你可以使用 `view` 作用域来存储仅在给定视图中需要的数据。例如，当你有一个带分页功能的数据表时，你可以加载结果并将它们放入 `view` 作用域。通过使用视图状态内的转移（例如，“下一页”和“上一页”转移），你可以每次滚动浏览列表，显示结果集的特定部分。从视图状态退出的那一刻起（例如，在数据表中选择一个结果后），`view`
    作用域被销毁，资源被释放。


    ##### Flow 作用域


    `flow` 作用域的范围是一个流程会话。你可以在图 11-4 中看到这一点，其中父流程的执行有一个 `flow` 作用域，子流程的流程会话也有一个（子流程与父流程在同一个流程执行中运行，但在不同的流程会话中）。这意味着父流程放置在
    `flow` 作用域中的属性将无法从子流程的 `flow` 作用域中访问。


    ![Image](img/9781430241553_Fig11-04.jpg)


    ***图 11-4.** flow 作用域*


    你可以使用 `flow` 作用域来存储那些在整个流程会话期间都应可用，但仅限该会话使用，而不被同一流程执行中启动的其他流程会话（即子流程）使用的对象。


    `flow` 作用域中的对象大多与应用程序及其实现的功能相关（例如，由流程操作的领域对象实例）。

    '
- fmt: '# Conversation Scope


    The `conversation` scope is scoped at the level of an entire conversation, or
    execution (see [Figure 11-5](#Chapter11.html#fig_11_5)). The term “conversation”
    is a bit misleading, but that is merely an implementation detail (especially in
    Web Flow 2) that is not important in this discussion. Although we are forced to
    use this term, you can think of `conversation` scope as a scope that maintains
    state over the entire flow execution. We think that “`execution` scope” would
    have been a better naming. Attributes in the `conversation` scope are available
    to every flow session contained within the conversation (or execution). The `conversation`
    scope is therefore also available to all subflows.


    ![Image](images/9781430241553_Fig11-05.jpg)


    ***Figure 11-5.** The conversation scope*


    Just like the `flow` scope, the `conversation` scope mostly stores application-related
    objects. Use the `conversation` scope if those objects should be available for
    every flow session (for that flow and/or its subflows), rather than for a single
    flow session. If your flow does not use subflows, the lifespan of `conversation`
    and `flow` scopes can be considered equal. Note that we are not saying that both
    scopes “become equal”; they remain two physically separated scopes, so setting
    something on `flow` scope will *not* become visible on `conversation` scope. But
    in this case, they will be “logically” equal because they have the same lifespan,
    and the lifespan is normally the attribute that makes one flow different from
    another.


    Because their lifespan is the same, one could argue that it would be equal either
    to choose `flow` or `conversation` scope. However, by default it makes more sense
    to opt for `flow` scope and not `conversation` scope. This is because subflows
    could be introduced later on (i.e., when your flow gets extended), and subflows
    will automatically be able to access the data on the `conversation` scope. As
    we will see shortly when introducing subflows, the best practice is to think about
    which data the subflow needs and only expose the right amount of data.


    In [Figure 11-5](#Chapter11.html#fig_11_5), you can see that, for flow x, the
    `conversation` and `flow` scopes are equal because there is no subflow present.
    You can also see that there is a new `conversation` scope (and `flow` scope) created
    for flow y. Also, for flow y, there will be a different `flow` scope created for
    the subflow. However, the `conversation` scope remains accessible for both the
    parent and the subflows. As already explained, the `flow` scope visible for the
    subflow is a new one, and the subflow cannot access the `flow` scope of the parent
    flow.


    ![Image](images/square.jpg) **Caution** Be careful when storing large objects
    in `flow` or `conversation` scope. These scopes have relatively long life spans,
    which means that the data stored in them needs to be maintained for a long period
    of time. As an alternative to storing large objects in the `flow` or `conversation`
    scope, consider reloading those objects for every request and storing them in
    `request` scope.


    ## Implicit Objects


    Just as you have implicit objects in JSPs (scriptlets) and EL, you also have implicit
    objects defined by Web Flow. An implicit object is a shortcut to certain functionality
    that is frequently used (e.g., the HTTP request parameters). While you can access
    the request parameters through the `javax.servlet.http.HttpServletRequest`, both
    EL and Web Flow include a “shortcut” that gives direct access to the request parameter
    map. In EL, this implicit object is called `param`; in a Web Flow expression,
    you can use `requestParameters`.


    In addition to data-related implicit objects, there are also references to key
    framework objects. For example, if you need the `javax.servlet.ServletContext`
    in a Web Flow expression, you can reference the implicit variable, `externalContext`,
    in the expression. The `externalContext` variable will indirectly expose the `javax.servlet.ServletContext`,
    as well as other context-related information. In this case, the expression would
    become as follows:


    `"#{externalContext.nativeContext}"`


    ![Image](images/square.jpg) **Note** You can also use these implicit objects from
    EL in your views (JSP). These objects are bound by Web Flow to the Servlet `request`
    scope. For example, using something like `#{flowExecutionUrl}` will resolve to
    the `flowExecutionUrl` implicit object that is bound to the Servlet''s `request`
    scope.


    [Table 11-1](#Chapter11.html#tab_11_1) outlines each implicit object that can
    be used in Web Flow expressions.


    ![Image](images/9781430241553_tab11-01.jpg)


    ![Image](images/9781430241553_tab11-01a.jpg)


    # Enhancing the Bookstore


    In the previous sections, we covered general Web Flow terminology in some detail.
    We needed to introduce these concepts prior to diving back into the code. Now
    that we have covered them, we are going to look at specific Web Flow features.
    We will do this by illustrating them with code and explaining them along the way.


    In the previous chapter, we made our first pass at introducing a basic flow for
    ordering books. We did this with some basic web flow components that illustrated
    how easy it is to transform a given use case using Web Flow. Now we will continue
    adding functionality to and improving our sample application, illustrating and
    explaining various Web Flow features along the way. For example, the sample application
    as we left it in the previous chapter is not much of an application, yet. A lot
    of things are still missing, to name a few:


    *   *There is no validation*: It should not be possible to make an order when
    there is no book selected. The delivery date is also mandatory, and the site should
    trigger an exception when the user does not specify this date.

    *   *There is no conversion*: We mapped a `Category` and `Book` in our form as
    a `Long` using the identifier for each of these objects. It would be more elegant
    if we could map directly to a `Category` or `Book` from our domain.


    In the following sections, we will address these and other shortcomings, gradually
    refactoring our sample application to show how you can use Web Flow to implement
    some real-world use cases. We will start from the very beginning, by revising
    our first step in the flow: selecting the book category.


    ## Selecting the Category


    To load our list of selectable categories, we used an on start action. This action
    loaded our categories into `flow` scope before entering the view state to render
    the selected category view. As we already explained in the “Different Web Flow
    Scopes” section, this is not the ideal place to store this information. The selectable
    categories are only required in the scope of the selected category view. We will
    see that a better alternative exists.


    Also, we mapped the category using its id in our form instead of mapping it as
    a domain object. The next sections will show how we can change this.'
