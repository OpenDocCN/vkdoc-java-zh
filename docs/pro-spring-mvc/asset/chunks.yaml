    />\n            </button>\n        </div>\n    </form:form>\n</sec:authorize>\n\
    \n**<sec:authorize access=\"hasRole('PERM_ADD_BOOKS')\">**\n    <spring:url value=\"\
    /secured/addBooks.htm\" var=\"addBook\"/>\n    <form:form modelAttribute=\"manageBookForm\"\
    \ action=\"${addBook}\"\n               method=\"POST\">\n        <table style=\"\
    width: 100%\">\n            <tr>\n                <td width=\"30%\">\n       \
    \             <spring:message code=\"label.page.managebooks.\n               \
    \                           book.category\"/>\n                </td>\n       \
    \         <td>\n                    <form:select path=\"category\" items=\"${manageBookForm.\n\
    selectableCategories}\" itemLabel=\"name\"\n                                 itemValue=\"\
    id\"/>\n                    <form:errors path=\"category\" cssClass=\"error\"\
    />\n                </td>\n            </tr>\n\n            <%--Omitting remainder\
    \ of the rows for brevity--%>\n\n        </table>\n        <div align=\"right\"\
    \ style=\"margin-bottom: 20px; margin-top: 10px\" >\n            <button type=\"\
    submit\" id=\"add\">\n                <spring:message code=\"label.page.managebooks.book.add\"\
    />\n            </button>\n            <button type=\"reset\" id=\"clear\">\n\
    \                <spring:message code=\"label.page.managebooks.book.clear\"/>\n\
    \            </button>\n        </div>\n    </form:form>\n</sec:authorize>\n\n\
    <script>\n    dojo.addOnLoad(function(){\n        function fadeIt() {\n      \
    \      if(dojo.byId(\"actionSuccess\")){\n                dojo.style(\"actionSuccess\"\
    , \"opacity\", \"1\");\n                var fadeOutArgs = {node: \"actionSuccess\"\
    , duration: 15000};\n                dojo.fadeOut(fadeOutArgs).play();\n     \
    \       }\n        }\n    fadeIt();\n    });\n</script>\n```\n\nThe first `if`\
    \ block and the last JavaScript block are used to display a message whenever a\
    \ `Category` or `Book` is added successfully. This JavaScript code is the same\
    \ as we used to show a message when the user has logged or when an order is made.\
    \ In the latter case the user is redirected to the `ordersOverview` page and a\
    \ message pops up up with the username and the order ID of the newly placed order.\
    \ In all cases the JavaScript will let the displayed message slowly disappear.\n\
    \nThe first `authorize` tag (in bold) ensures that you must have the permission\
    \ to add categories (`PERM_ADD_CATEGORIES`). In our case the author will not be\
    \ able to do this. This \"add category\" section will not be shown to users with\
    \ a role that does have the proper authorization; in our case the user author\
    \ will not see this section.\n\nThe second `authorize` tag requires the permission\
    \ to add books (`PERM_ADD_BOOKS`). Both authors and admins will be able to do\
    \ this. To illustrate this, when we login with user \"jd\" the menu option to\
    \ manage books will not even be shown, as you can see in [Figure 13-13](#Chapter13.html#fig_13_13).\n\
    \n***Figure 13-13.** Logging in with user \"jd\" does not display the Manage Books\
    \ menu option.*\n\nWhen we log in as an author, the menu option Manage Books is\
    \ shown. When we click on it we will see that we only can add books, as shown\
    \ in [Figure 13-14](#Chapter13.html#fig_13_14).\n\n***Figure 13-14.** Logging\
    \ in with user \"author\" displays the Manage Books menu option, but only allows\
    \ us to add books.*\n\nFinally, when we login as admin, the Manage Books link\
    \ is shown in the navigation bar as well, but now we are allowed to add categories\
    \ and books, as can be seen in [Figure 13-15](#Chapter13.html#fig_13_15).\n\n\
    ***Figure 13-15.** Logging in with user \"admin\" displays the Manage Book menu\
    \ option and allows us to add books and categories.*\n\nBefore we wrap up this\
    \ section, there is one last thing we want to show. In the earlier section \"\
    Logging Out,\" we said that we still need to make an additional change. The Logout\
    \ button in the menu should only to be shown when the user has already logged\
    \ in, and the Login button should be hidden (it should only be shown when the\
    \ user is not authenticated yet). Now that we have seen the authorize tag, this\
    \ is just a matter of adding another one in the `header.jsp`. In [Listing 13-33](#Chapter13.html#list_13_33)\
    \ we show an excerpt from the `header.jsp` applying this tag around the Logout\
    \ and Login menu links (shown in bold).\n\n***Listing 13-33.** Adding the authorization\
    \ tag for the login and logout link in WEB-INF/templates/header.jsp*\n\n```\n\
    <ul>\n\n    <%--Omitting other navigation bar links for brevity--%>\n\n**    <sec:authorize\
    \ access=\"! authenticated\">**\n        <li>\n            <spring:url value=\"\
    /public/authentication/login.htm\" var=\"login\"             />\n            <a\
    \ href=\"${login}\">\n                <spring:message code=\"nav.login\"/>\n \
    \           </a>\n        </li>\n**    </sec:authorize>**\n    <sec:authorize\
    \ access=\"hasRole('ROLE_ADMIN') or hasRole('ROLE_AUTHOR') \">\n        <li>\n\
    <spring:url value=\"/secured/manageBooks/manageBooks.htm\"\n                 \
    \       var=\"manageBooks\" />\n            <a href=\"${manageBooks}\">\n    \
    \            <spring:message code=\"nav.manageBooks\"/>\n            </a>\n  \
    \      </li>\n    </sec:authorize>\n**    <sec:authorize access=\"fullyAuthenticated\"\
    >**\n        <li>\n            <spring:url value=\"/logout\" var=\"logout\" />\n\
    \            <a href=\"${logout}\">\n                <spring:message code=\"nav.logout\"\
    />\n            </a>\n        </li>\n**    </sec:authorize>**\n<ul>\n```\n\nThe\
    \ first `authorize` tag in bold will only render its contents (the Login link)\
    \ when we are not authenticated yet. The second authorize tag in bold will only\
    \ render its content (the Logout link) when we are authorized.\n\n##### The authentication\
    \ Tag\n\nThis tag allows access to the current `org.springframework.security.core.Authentication`\
    \ object stored in the security context. It can render any property of the object\
    \ directly in the JSP. You can use it, for example, to display information from\
    \ the principal, which is in our case the `BookstoreUserDetails` object (see [Listing\
    \ 13-34](#Chapter13.html#list_13_34)).\n\n***Listing 13-34.** The authentication\
    \ tag rendering the username*\n\n```\n<sec:authentication property=\"principal.username\"\
    />\n```\n\nThis will display the username of the user currently logged in.\n\n\
    We applied this code to our homepage, located in `WEB-INF/view/public/main.jsp`,\
    \ as can be seen in [Listing 13-12](#Chapter13.html#list_13_12) earlier. We have\
    \ configured Spring Security to forward us to the home page when login was successful.\
    \ We also added a special parameter (`authenticationOk`) to indicate that. The\
    \ home page will display a message that the login was successful, including the\
    \ username. We have extracted that snippet from [Listing 13-12](#Chapter13.html#list_13_12)\
    \ and repeated it in [Listing 13-35](#Chapter13.html#list_13_35) for your convenience.\
    \ Here we use the `var` and `scope` attributes to bind the result (from the property\
    \ indicated in the `property` attribute) with the given variable name (`username`)\
    \ to the indicated scope (Servlet request scope)\n\n***Listing 13-35.** The authentication\
    \ tag storing the username in request scope*\n\n```\n<h3>\n**    <sec:authentication\
    \ property=\"principal.username\" var=\"username\"**\n**                     \
    \    scope=\"request\"/>**\n\n<spring:message code=\"label.page.main.authentication.ok\"\
    \n                     arguments=\"**${username}**\" />\n</h3>\n```\n\nYou can\
    \ see the result in [Figure 13-16](#Chapter13.html#fig_13_16), where we logged\
    \ in as user `jd`. The JavaScript on the bottom is there to let the message slowly\
    \ fade away as we have done elsewhere when showing notification messages.\n\n\
    ***Figure 13-16.** The message shown after logging in*\n\n#### Using Annotations\
    \ in Our Code\n\nSecuring your pages using the authorization tag is not sufficient,\
    \ as we will see. Hiding a link (which is the main task of the authorization tag)\
    \ won't do the trick if the user knows or guesses the direct link. In that case\
    \ the user still will get access (assuming you didn't place a specific `intercept-url`\
    \ for that page with proper authorization checks).\n\nIn this section we will\
    \ see that you can also secure your application controller methods and back-end\
    \ services using annotations. This way you are sure that if a user escapes the\
    \ front-end security, the user will be blocked on the next level. Applying security\
    \ in your back-end services can also be useful if you have different frontend\
    \ layers using the same back-end.\n\nUntil now we have seen three places where\
    \ we can put specific authorization check points:\n\n> *   On the requested resource,\
    \ using `intercept-url`\n> *   On your flows\n> *   For a more fine grained approach,\
    \ in the pages themselves using the authorize tag\n\nThis leaves us with a gap.\
    \ With our last example in mind, we added specific permission checks on the `manageBooks.jsp`\
    \ page. Only users with the `PERM_ADD_BOOKS` permission are able to add books,\
    \ and only users with the `PERM_ADD_CATEGORIES` are able to add categories. But\
    \ what would happen if a user with the author role (who cannot add categories)\
    \ were to simulate an http POST request adding a new category?\n\nThis is still\
    \ a potential weakness in our system. While the authorization tag on the page\
    \ only hides a component, the controller listening for the request is still there.\
    \ So anyone who knows the correct URL and the request parameters can still invoke\
    \ the controller directly.\n\nBesides adding a `intercept-url` with fine grained\
    \ authorization control (specifying roles and or permissions) for each of the\
    \ pages, you can also use method-specific annotations as shown in [Listing 13-36](#Chapter13.html#list_13_36).\n\
    \n***Listing 13-36.** Using method security in the application controller*\n\n\
    ```\n@RequestMapping(\"secured/addCategory.htm\")\n**@PreAuthorize(\"hasRole('PERM_ADD_CATEGORIES')\"\
    )**\npublic ModelAndView addCategory(\n```\n\nBy adding the annotation `org.springframework.security.access.prepost.PreAuthorize`\
    \ on the controller request mapping to add books, we implemented an additional\
    \ check. Try it out for yourself—put the `<sec:authorize access=\"hasRole('PERM_ADD_CATEGORIES')\"\
    >` in comments in `the manageBooks.jsp` and log in using the user `author`. Because\
    \ the tag is commented out, the component to add categories is shown. If you try\
    \ to add one, you'll get the famous \"403 access denied\" page.\n\nBefore Spring\
    \ Security will process these annotations you need to enable method security.\
    \ We did this in `src/main/resources/spring-security.xml`, as you can see in [Listing\
    \ 13-37](#Chapter13.html#list_13_37).\n\n***Listing 13-37.** Enabling method-level\
    \ security*\n\n```\n<security:global-method-security pre-post-annotations=\"enabled\"\
    />\n```\n\nNext we will also secure the `addBooks` method, as we did for the `addCategory`\
    \ method, in [Listing 13-38](#Chapter13.html#list_13_38).\n\n***Listing 13-38.**\
    \ Using method security in the application controller*\n\n```\n@RequestMapping(\"\
    secured/addBooks.htm\")\n**@PreAuthorize(\"hasRole('PERM_ADD_BOOKS')\")**\npublic\
    \ ModelAndView addBooks(\n```\n\nTo make the entire chain secure, you can also\
    \ add these annotations on your service layer. Once you do this there is no way\
    \ that someone can bypass your security and invoke a function that is not allowed\
    \ for the current principal.\n\nTo conclude, we want to say a few words about\
    \ Security exceptions. Normally your users should not run against such exceptions\
    \ as part of normal navigation throughout your application. We shielded all links\
    \ in the pages using the authorization tag; so in other words, if a user does\
    \ not have access to a certain link (or button) it will simply not be shown. However,\
    \ if a user starts to fiddle with the URLs, it might still be possible to access\
    \ a forbidden URL. In that case the user will hit the security annotations on\
    \ your application controllers or back-end, and a 403 access denied message will\
    \ be shown. If you want customize this behavior, you have two options:\n\n> *\
    \   You can use the JEE Servlet `<error-page>` in a `web.xml` to forward to a\
    \ certain page upon an `<error-code>` (in this case 403).\n> *   You can use Spring\
    \ Security `org.springframework.security.web.access.ExceptionTranslationFilter`,\
    \ which can handle both `org.springframework.security.access.AccessDeniedException`\
    \ and `org.springframework.security.core.AuthenticationException`. Its main purpose\
    \ is to forward the user to a login page if not authenticated yet, or to a predefined\
    \ error page if the current user lacks sufficient rights. For your convenience\
    \ this filter was already registered by using the Spring Security namespace configuration\
    \ (`<security:http>`). In fact one of the `http` element's direct attributes is\
    \ `access-denied-page=\"…\"`, which allow you to specify a page to forward to\
    \ whenever such a security-related exception occurs. This attribute will directly\
    \ be given to the `ExceptionTranslationFilter` when the entire Spring Security\
    \ configuration is built.\n\n### Summary\n\nSecurity in general is a very complex\
    \ and broad domain. However, we have shown you in this chapter that basic security\
    \ for an average web application does not have to be complex. On the contrary,\
    \ we have shown with a small bit of XML and a filter configuration how you can\
    \ make your pages secure, so that only those pages explicitly listed can be accessed.\n\
    \nLater we showed that customization using a custom `UserDetailsService` is also\
    \ not very complex, but it allows you to adapt your user store to any existing\
    \ database structure you might have. Finally, we showed how to perform authorization\
    \ based upon the permissions granted to a principal in your pages, your flows\
    \ and controllers.\n\nTo conclude, we hope that you learned that with minimal\
    \ effort your application can be secured. With such a great tool as Spring Security\
    \ available, there should no longer be a reason not to build in basic security\
    \ in your applications.\n\nThis chapter was written to give you an overview of\
    \ the possibilities and get you started quickly. Your environment might have specific\
    \ security requirements. In that case we hope that this chapter has warmed you\
    \ up to go and read more detailed material about Spring Security and what it can\
    \ do to suit specific requirements.\n\n## A P P E N D I X  A\n\n## Cloud Foundry:\
    \ Deploying to the Cloud\n\nIn this appendix, we will discuss what it takes to\
    \ get our application to run on a different environment than what we have been\
    \ running it on so far. Instead of running on any boring old Tomcat instance,\
    \ we'll run it in the *cloud.* But before we get down to it, we'll talk just a\
    \ little bit about what the cloud means.\n\n### Cloud Computing\n\nYou probably\
    \ haven't been able to avoid the onslaught of cloud computing in the specialized\
    \ media. But you may still not have an idea of what cloud computing entails. We'll\
    \ try to give a short overview of what cloud computing is about.\n\nIt's hard\
    \ to give a single definition of what cloud computing is, as it tends to mean\
    \ different things to different people. One broader definition goes like this:\n\
    \n> *Cloud Computing is a distributed computing model consisting of three tiers—infrastructure,\
    \ platform, and services—that enables ubiquitous, convenient, on-demand network\
    \ access to a shared pool of configurable computing resources (e.g., networks,\
    \ servers, storage, applications, and services).*\n\nConsider Amazon S3,^([1](#Appendix.html#APP-A-FN-1))\
    \ for example: Amazon allows you to store data on its servers using web-based\
    \ APIs. You pay Amazon for the bandwidth you use in uploading or downloading that\
    \ data. At no point in time do you ever need to have your own storage infrastructure.\n\
    \nThere are several kinds of cloud service models in use:\n\n*   *Infrastructure\
    \ as a service (IaaS)*: Delivers computing infrastructure as a service. Examples\
    \ of such infrastructure include virtual computers, storage, network infrastructure,\
    \ and so forth. This is more the realm of sysadmins than developers. Amazon and\
    \ Rackspace are two of the best-known IaaS providers.\n*   *Platform as a service\
    \ (PaaS)*: Offers services beyond the infrastructure. Here, the emphasis is on\
    \ the development environment, application services, and application-deployment\
    \ mechanisms. The control over the actual infrastructure itself is mostly handed\
    \ by the service provider. Good examples of a PaaS approach are Google App Engine\
    \ and Cloud Foundry.\n*   *Software as a service (SaaS)*: Provides the delivery\
    \ of a full solution as a service, eliminating the need to install and run the\
    \ application on the customer's own computers and simplifying maintenance and\
    \ support. Contrast this with the traditional delivery model for software, where\
    \ end users install software on every desktop, manage the upgrades themselves,\
    \ and so on. In this model, the user just visits a website and begins using the\
    \ application online. Google Docs is a good example of a SaaS.\n\n__________________\n\
    ¹ [`http://aws.amazon.com/es/s3/`](http://aws.amazon.com/es/s3/)\n\n### Cloud\
    \ Foundry\n\nIn this appendix, we'll use Cloud Foundry as our PaaS of choice to\
    \ deploy our bookstore application to. But what is Cloud Foundry and why would\
    \ we want to use it?\n\nCloud Foundry describes itself like this:\n\n> *[Cloud\
    \ Foundry is] an open platform as a service, providing a choice of clouds, developer\
    \ frameworks and application services. Initiated by VMware, with broad industry\
    \ support, Cloud Foundry makes it faster and easier to build, test, deploy and\
    \ scale applications. It is an open source project and is available through a\
    \ variety of private cloud distributions and public cloud instances, including\
    \ CloudFoundry.com.^([2](#Appendix.html#APP-A-FN-2))*\n\nNow what does this mean?\
    \ It means that Cloud Foundry is not a proprietary, vendor-specific PaaS, but\
    \ a truly open platform that is being developed by several individuals and organizations.\
    \ For example, ActiveState offers Stackato,^([3](#Appendix.html#APP-A-FN-3)) an\
    \ expansion of Cloud Foundry that offers Python, PHP, and Perl support. Ubuntu\
    \ is also working on supporting Cloud Foundry under their Ubuntu Cloud^([4](#Appendix.html#APP-A-FN-4))\
    \ banner.\n\nIt also means that we have to define some things more explicitly:\n\
    \n*   *Cloud Foundry* is the name of the open source project. You can find the\
    \ code for this on github;^([5](#Appendix.html#APP-A-FN-5)) its website is at\
    \ [`www.cloudfoundry.org`](http://www.cloudfoundry.org).\n*   *Cloudfoundry.com*\
    \ is a VMWare–hosted instance of Cloud Foundry that lets you deploy your application\
    \ on VMWare–owned infrastructure.\n\nIn the course of this appendix, we don't\
    \ differentiate between Cloud Foundry the platform and CloudFoundry.com the hosted\
    \ service.\n\n__________________\n² [`http://www.cloudfoundry.com`](http://www.cloudfoundry.com)\n\
    ³ [`http://www.activestate.com/stackato`](http://www.activestate.com/stackato)\n\
    ⁴ [`http://cloud.ubuntu.com`](http://cloud.ubuntu.com)\n⁵ [`https://github.com/cloudfoundry/`](https://github.com/cloudfoundry/)\n\
    \nNow that we've seen what Cloud Foundry is, why should we as Java/Spring developers\
    \ care? Why should we use it over any other PaaS? One reason: The fact that Cloud\
    \ Foundry is an open, multi-vendor platform is very nice because it helps us avoid\
    \ the dangers of vendor-locking and the related costs.\n\nAnother reason: It also\
    \ has multi-language support, including Ruby, Java, Scala, and NodeJs; and it\
    \ offers many services, from relational stores such as MySQL and PostgreSQL, to\
    \ queues like RabbitMQ, to NoSQL storage like MongoDB and Redis. Another big advantage\
    \ is that it integrates very nicely with Spring. These things combined make Cloud\
    \ Foundry a very interesting platform.\n\nCloudFoundry.com, the VMWare–hosted\
    \ version of Cloud Foundry, is still in beta at the time of writing. Nevertheless,\
    \ you can sign up for it by going to [`https://my.cloudfoundry.com/signup`](https://my.cloudfoundry.com/signup)\
    \ and entering an e-mail address. After reading and agreeing with the Terms of\
    \ Service, you can click the Request Invite button. You'll get an e-mail confirming\
    \ your signup request. Later (it can take a few hours or even a day), you'll receive\
    \ an e-mail with the credentials you need to actually deploy on CloudFoundry.com.\
    \ That's all you need to do to register.\n\n### Deploying Our Application\n\n\
    In this section, we are going to describe how we can deploy the sample application\
    \ on Cloud Foundry. We will describe each step in detail and also explain the\
    \ modifications we must do to make everything work as expected. If you want to\
    \ perform the actions described here yourself, we will assume that you have read\
    \ the initial chapter on how to set up your environment. We are also assuming\
    \ you have either STS or an Eclipse instance with the STS plug-in installed.\n\
    \n#### Installing the Cloud Foundry Plug-in\n\nAlthough Cloud Foundry offers several\
    \ tools to get your application deployed, the fastest way to get started when\
    \ you first dive in is to use the Eclipse plug-in. The alternative is using the\
    \ VMC command-line application, which is implemented as a Ruby gem. An advanced\
    \ user can't escape using the VMC command-line; but for the scope of this appendix,\
    \ we'll use the Eclipse plug-in.\n\n**Note** RubyGems^([6](#Appendix.html#APP-A-FN-6))\
    \ is the package manager for Ruby. It is comparable to `apt-get` for Ubuntu or\
    \ `yum` for Red Hat. A *gem* is a packaged Ruby application or library. You can\
    \ find more info on the VMC install at [`http://start.cloudfoundry.com/tools/vmc/installing-vmc.html`](http://start.cloudfoundry.com/tools/vmc/installing-vmc.html).\
    \ If you have Ubuntu, you can also directly install the command-line client using\
    \ `apt-get install cloudfoundry-client`.\n\nWe'll start by installing the Cloud\
    \ Foundry Eclipse plug-in. Go to the STS plug-in Dashboard (it can be found under\
    \ Menu ![Image](images/U003.jpg) Help ![Image](images/U003.jpg) Dashboard), click\
    \ the Extensions tab found on the bottom of the window, and search for *cloud\
    \ foundry* in the search bar. Check the found extension, and then click the Install\
    \ button on the bottom right, as seen in [Figure A-1](#Appendix.html#fig_A_1).\n\
    \n__________________\n⁶ [`http://rubygems.org`](http://rubygems.org)\n\n***Figure\
    \ A-1.** Finding the Cloud Foundry plug-in*\n\nYou'll get the normal plug-in installation\
    \ windows that ask you to accept or reject the license agreement. Click the Next\
    \ and OK buttons until you get a dialog asking you to restart Eclipse, and then\
    \ choose to restart it by clicking Restart now.\n\nNow that we've installed the\
    \ plug-in, we can proceed to the next step: deploying our application on Cloud\
    \ Foundry.\n\n#### Making Some Adjustments\n\nThe teams behind Spring and Cloud\
    \ Foundry have worked at making it very easy to deploy Spring apps on Cloud Foundry.\
    \ It is an explicit goal to make Spring applications deployable without changing\
    \ one line of configuration or code in most cases.\n\nUnfortunately, this is not\
    \ entirely true for our application because it will not get deployed without us\
    \ making some changes. The main reason is that Cloud Foundry, at the time of writing,\
    \ only provides a Tomcat 6 instance (support for Tomcat 7 is on the road map).\
    \ The other driver for change is the way SSL is set up in Cloud Foundry, which\
    \ has some impact on the way we configure Spring Security.\n\n##### Switching\
    \ to Tomcat 6\n\nTomcat 6 is a Java EE5 servlet container, so it does not implement\
    \ the Servlet 3 API. The local server instance we have been using so far is Tomcat\
    \ 7, which is Java EE 6 compliant. Our sample applications have an explicit dependency\
    \ on Java EE 6—and the Servlet 3 API in particular.\n\nUntil now, we've been bootstrapping\
    \ the Spring application context in `BookstoreWebApplicationInitializer`, which\
    \ is an implementation of `org.springframework.web.WebApplicationInitializer`.\
    \ The `WebApplicationInitializer` mechanism is what allowed us to get by without\
    \ using a `web.xml` file for so long; however, it depends on a Servlet 3 implementation\
    \ to work.\n\nBecause of Cloud Foundry's use of Tomcat 6, we have to revert to\
    \ a Servlet 2.5 environment, and we'll need to create a `web.xml` file in which\
    \ we'll re-create what we're doing in the `BookstoreWebApplicationInitializer`.\
    \ To do this, we need an `ApplicationContext`, a `DispatcherServlet`, an `OpenEntityManagerInViewFilter`,\
    \ and the filter that configures Spring security.\n\nBy adding a `ContextLoaderListener`,\
    \ we can make sure that an `ApplicationContext` will get booted (see [Listing\
    \ A-1](#Appendix.html#list_A_1)).\n\n***Listing A-1.** Adding a ContextLoaderListener\
    \ in the web.xml File*\n\n```\n<!—\n    tells the ContextLoaderListener where\
    \ to look for applicationContext\n    xml files\n-->\n<context-param>\n    <param-name>contextConfigLocation</param-name>\n\
    \    <param-value>classpath:/spring/context.xml</param-value>\n</context-param>\n\
    \n<!-- the Listener will be called by the servlet container,\n     which will\
    \ then boot a Spring ApplicationContext for us -->\n<listener>\n    <listener-class>\n\
    \        org.springframework.web.context.ContextLoaderListener\n    </listener-class>\n\
    </listener>\n```\n\nWe also need to declare a `DispatcherServlet` by using the\
    \ servlet tag, as shown in [Listing A-2](#Appendix.html#list_A_2).\n\n***Listing\
    \ A-2.** Adding a DispatcherServlet in the web.xml File*\n\n```\n<servlet>\n \
    \ <servlet-name>dispatcher</servlet-name>\n  <servlet-class>\n    org.springframework.web.servlet.DispatcherServlet\n\
    \  </servlet-class>\n  <init-param>\n    <param-name>contextClass</param-name>\n\
    \    <!-- note that we're specifying the type of ApplicationContext here.\n  \
    \       We're using an AnnotationConfigWebApplicationContext and configure it\n\
    \         to use the classes we specified in  contextConfigLocation as\n     \
    \    configuration classes.\n      -->\n    <param-value>\n      org.springframework.web.context.support.\n\
    AnnotationConfigWebApplicationContext\n    </param-value>\n  </init-param>\n \
    \ <init-param>\n    <param-name>contextConfigLocation</param-name>\n      <param-value>\n\
    \      com.apress.prospringmvc.bookstore.web.config.WebflowContextConfiguration\n\
    \      com.apress.prospringmvc.bookstore.web.config.WebMvcContextConfiguration\n\
    \      </param-value>\n  </init-param>\n  <load-on-startup>1</load-on-startup>\n\
    </servlet>\n\n<servlet-mapping>\n    <servlet-name>dispatcher</servlet-name>\n\
    \    <url-pattern>/</url-pattern>\n</servlet-mapping>\n```\n\nWe are creating\
    \ two application contexts, splitting the back-end configuration (e.g., datasources,\
    \ services, repositories, and so on) from the front-end configuration (e.g., Spring\
    \ MVC, Spring Web Flow, the @Controllers, and so forth).\n\nThe `ContextLoaderListener`\
    \ will be responsible for bootstrapping the back end–application context. The\
    \ `DispatcherServlet` will bootstrap its own context for the front end. While\
    \ the `DispatcherServlet` is booting its own context, it will find the back-end\
    \ `ApplicationContext` we've booted using the `ContextLoaderListener`. It will\
    \ set this context as a parent context for its own `application context`. The\
    \ fact that we now have two application contexts instead of one doesn't have a\
    \ real impact on us. You just need to be aware that the root context (which was\
    \ booted by the `ContextLoaderListener`) will have no access to beans booted by\
    \ the dispatcher servlet application context because a child context can access\
    \ beans in the parent context, but not vice versa.\n\nWe are also using two types\
    \ of application context classes now. For the back end, we are using the `XmlWebApplicationContext`,\
    \ which will start from a standard XML application context file. The use of the\
    \ `XmlWebApplicationContext` is not explicitly mentioned in the `web.xml` because\
    \ the `ContextLoaderListener` uses this class by default. In that context file,\
    \ we import the `spring-security.xml` and load the @Configuration-annotated classes\
    \ using `<context:annotation-config/>` and `<context:component-scan/>`.\n\nFor\
    \ the `DispatcherServlet`, however, we directly use the `AnnotationConfigWebApplicationContext`\
    \ and feed it with the @Configuration-annotated configuration classes for the\
    \ front end.\n\nYou might wonder why we didn't use `AnnotationConfigWebApplicationContext`\
    \ in both cases. For example, we could have loaded the `spring-security.xml` from\
    \ within an @Configuration class using the @ImportResource annotation in the same\
    \ way we are using it with the `webflow-config.xml` in `WebflowContextConfiguration`:\n\
    \n```\n@ImportResource(\"classpath:/spring/webflow-config.xml\")\n```\n\nThe reason:\
    \ During deployment, Cloud Foundry will inspect our `web.xml` and add its own\
    \ Spring context XML file to be loaded by the `ContextLoaderListener` at the end\
    \ of our `contextConfigLocation` file. The Cloud Foundry Spring config will do\
    \ some magic, such as automatically replacing our datasource with the internal\
    \ Cloud Foundry one, which we will discuss later. The problem is that, when using\
    \ `AnnotationConfigWebApplicationContext`, we cannot mix annotations and XML files\
    \ in the `contextConfigLocation`. So, when using `AnnotationConfigWebApplicationContext`\
    \ for the root context, our @Configuration classes would have been loaded, but\
    \ the spring XML file (which will be added later by Cloud Foundry) would be ignored.\
    \ Hopefully, this limitation will disappear in the future, so that we'll be able\
    \ to use any type of application context implementation we want.\n\nFinally, we\
    \ need to configure the filters, as shown in [Listing A-3](#Appendix.html#list_A_3).\n\
    \n***Listing A-3.** Adding the Filters to the web.xml File*\n\n```\n<filter>\n\
    \    <filter-name>openEntityManagerInViewFilter</filter-name>\n    <filter-class>\n\
    \        org.springframework.orm.jpa.support.OpenEntityManagerInViewFilter\n \
    \   </filter-class>\n</filter>\n\n<filter-mapping>\n    <filter-name>openEntityManagerInViewFilter</filter-name>\n\
    \    <url-pattern>/*</url-pattern>\n</filter-mapping>\n\n<filter>\n    <filter-name>springSecurityFilterChain</filter-name>\n\
    \    <filter-class>\n        org.springframework.web.filter.DelegatingFilterProxy\n\
    \    </filter-class>\n</filter>\n\n<filter-mapping>\n    <filter-name>springSecurityFilterChain</filter-name>\n\
    \    <url-pattern>/*</url-pattern>\n</filter-mapping>\n```\n\nWe can see the `spring/context.xml`\
    \ we've specified in the `contextConfigLocation` in [Listing A-4](#Appendix.html#list_A_4).\n\
    \n***Listing A-4.** The context.xml File*\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<beans\n\n       xsi:schemaLocation=\"\n         http://www.springframework.org/schema/beans\n\
    \         http://www.springframework.org/schema/beans/spring-beans-3.1.xsd\n \
    \        http://www.springframework.org/schema/context\n         http://www.springframework.org/schema/context/spring-context-3.1.xsd\"\
    >\n\n    <context:annotation-config/>\n    <context:component-scan  \n       \
    \ base-package=\"com.apress.prospringmvc.bookstore.config,\n        com.apress.prospringmvc.bookstore.web.security\"\
    />\n    <import resource=\"classpath:/spring/spring-security.xml\"/>\n</beans>\n\
    ```\n\nIn this context file, we're telling Spring to enable the annotation configuration\
    \ and to look for components in the `com.apress.prospringmvc.bookstore.config`\
    \ and `com.apress.prospringmvc.bookstore.web.security` packages. Because @Configuration\
    \ classes are also @Components, they will also get picked up.\n\nWe're now done\
    \ with all the changes we need to do to prepare our application for running under\
    \ Tomcat 6\\. Next, we'll look at the changes needed for Spring Security.\n\n\
    **Note**  Chances are the changes just discussed will no longer be necessary by\
    \ the time you're reading this. Tomcat 7 support is on the roadmap, and it might\
    \ be implemented by the time you read this. This also demonstrates one of the\
    \ disadvantages of running on a PaaS: you don't have control over the underlying\
    \ infrastructure. For example, what if you needed to run on Tomcat 7 right now?\n\
    \n##### Spring Security Configuration\n\nWe are not yet done with our changes.\
    \ As a consequence of enabling SSL in Spring Security in Chapter 13, Spring Security\
    \ will now redirect us to an HTTPS connection if it detects we're connecting over\
    \ HTTP. Cloud Foundry supports SSL, but there is a proxy standing in front of\
    \ our application. This proxy will terminate the SSL connection. However, the\
    \ connection between the proxy and the Cloud Foundry Tomcat instance running our\
    \ application is plain HTTP. [Figure A-2](#Appendix.html#fig_A_2) is a bit of\
    \ a simplification, but it comes close enough to illustrating how things look\
    \ from a developer's point of view.\n\n***Figure A-2.** Our application behind\
    \ the proxy*\n\nBefore going to our application, the proxy adds some headers that\
    \ are the result of dealing with the SSL connection. It will tell us which cipher\
    \ was used, as well as the client certificate if performing mutual (or two-way)\
    \ SSL. If we just use \"normal\" SSL without a client certificate, this last header\
    \ will also be present, but it will have \"no value\" as its value.\n\nHowever,\
    \ Spring Security detects an SSL connection by calling `isSecure()` on the `(Http)ServletRequest`.\
    \ This will yield `false` because the connection type between the proxy and the\
    \ application is HTTP. Spring Security will then send out a redirect to the browser,\
    \ asking to switch over to SSL, which will result in an endless loop.\n\nThe work\
    \ around is to wrap the `(Http)ServletRequest` using a custom filter. We will\
    \ override the `isSecure()` method to also inspect the HTTP headers when considering\
    \ whether a connection is secure. If the original implementation decides a connection\
    \ is not secure, then we'll check for the presence of these specific SSL headers\
    \ added by the Cloud Foundry proxy before we make a final decision. [Listing A-5](#Appendix.html#list_A_5)\
    \ shows the filter code, which does nothing more than call `chain.doFilter` using\
    \ the wrapped `(Http)ServletRequest`. The more interesting part for us is the\
    \ contained `CloudFoundryHttpServletRequestWrapper` static class, which acts as\
    \ our wrapper.\n\nWhat it will do first is call `isSecure()` from the superclass.\
    \ If the default behavior says our request is secure, then we leave everything\
    \ untouched and return the value (`true`) as-is. When the super implementation\
    \ returns `false`, we try to retrieve the `sslclientcipher` and `sslclientcertstatus`\
    \ headers from the `HttpServletRequest`. If both are present and have a non-empty\
    \ value, we will consider the request as being a secured request (at least, we\
    \ will assume that the user's browser used SSL up until the Cloud Foundry proxy),\
    \ and we will return `true` instead.\n\n***Listing A-5.** The Filter that Wraps\
    \ the HttpRequest*\n\n```\npublic class CloudFoundryHttpServletRequestWrappingFilter\
    \ extends GenericFilterBean {\n\n    @Override\n    public void doFilter(ServletRequest\
    \ request, ServletResponse response,\n                       FilterChain chain)\
    \ throws IOException, ServletException {\n        chain.doFilter(new CloudFoundryHttpServletRequestWrapper((HttpServletRequest)\n\
    request), response);\n    }\n\n    static class CloudFoundryHttpServletRequestWrapper\
    \ extends HttpServletRequestWrapper {\n\n        private static final String[]\
    \ TLS_HEADERS = new String[]\n        {\"sslclientcipher\", \"sslclientcertstatus\"\
    };\n\n        public CloudFoundryHttpServletRequestWrapper(HttpServletRequest\
    \ httpServletRequest) {\n            super(httpServletRequest);\n        }\n\n\
    \        @Override\n        public boolean isSecure() {\n            boolean isSecure\
    \ = super.isSecure();\n            if (!isSecure) {\n                boolean isActuallySecure\
    \ = true;\n                for (String header : TLS_HEADERS) {\nisActuallySecure\
    \ = isActuallySecure && StringUtils.isNotBlank\n(getHeader(header));\n       \
    \         }\n                isSecure = isActuallySecure;\n            }\n   \
    \         return isSecure;\n        }\n    }\n}\n```\n\nOverriding the `isSecure()`\
    \ method might seem a bit of a drastic measure. However, the Javadoc indicates\
    \ that it should return `true` if the connection is considered secure. It is not\
    \ bound to a specific protocol, so one should never make the assumption that,\
    \ when `isSecure` returns `true`, the protocol is HTTPS by definition. It could\
    \ also be any other protocol that gives \"security\" guarantees. Also, given that\
    \ this implementation is the least intrusive and is the least likely to break\
    \ when upgrading Spring or Spring Security, we prefer this solution. Cloud Foundry\
    \ is also working on better SSL support in the near future, possibly allowing\
    \ SSL going all the way up to our server.^([7](#Appendix.html#APP-A-FN-7))\n\n\
    We'll also have to tell Spring Security to use our extra filter in `/spring/spring-security.xml`\
    \ (see [Listing A-6](#Appendix.html#list_A_6)).\n\n***Listing A-6.** Adding the\
    \ Filter to the spring-security.xml File*\n\n```\n<security:http use-expressions=\"\
    true\" >\n    <security:custom-filter\n      ref=\"cloudFoundryHttpServletRequestWrappingFilter\"\
    \n      before=\"FIRST\"/>\n\n    <security:form-login login-page=\"/public/authentication/login.htm\"\
    \n       default-target-url=\"/public/main.htm?authenticationOk=1\"\n       authentication-failure-url=\"\
    /public/authentication/login.htm?authenticationNok=1\"  />\n\n    <security:intercept-url\
    \ pattern=\"/index.jsp\" access=\"permitAll\" />\n    <security:intercept-url\
    \ pattern=\"/public/authentication/**\"\n                            access=\"\
    permitAll\" requires-channel=\"https\" />\n    <security:intercept-url pattern=\"\
    /public/createOrders/**\"\n                            access=\"permitAll\" requires-channel=\"\
    https\" />\n    <security:intercept-url pattern=\"/public/**\" access=\"permitAll\"\
    \ />\n\n    <security:intercept-url pattern=\"/secured/**\"\n                \
    \            access=\"fullyAuthenticated\"\n                            requires-channel=\"\
    https\" />\n\n    <security:intercept-url pattern=\"/**\" access=\"denyAll\" />\n\
    </security:http>\n\n<bean id=\"cloudFoundryHttpServletRequestWrappingFilter\"\n\
    class=\"com.apress.prospringmvc.bookstore.web.security.\nCloudFoundryHttpServletRequestWrappingFilter\"\
    />\n```\n\nNow that we have all this in place, we should be able to deploy our\
    \ application on Tomcat 6—and hence, on Cloud Foundry—so let's now try to do just\
    \ that.\n\n#### Deploying\n\nDeploying to Cloud Foundry with the plug-in follows\
    \ a process very similar to deploying to a Tomcat instance. Follow these steps\
    \ to create a server to deploy to:\n\n__________________\n⁷ [`http://support.cloudfoundry.com/entries/20672161-ssl-support-to-server-instance`](http://support.cloudfoundry.com/entries/20672161-ssl-support-to-server-instance)\n\
    \n1.  In the Servers panel, right-click and choose New ![Image](images/U003.jpg)\
    \ Server (see [Figure A-3](#Appendix.html#fig_A_3)).\n\n    ***Figure A-3.** Creating\
    \ a new server*\n\n2.  Choose Cloud Foundry, which is found under the VMWare node.\
    \ You can leave all other options as their defaults.\n3.  Click Next and you'll\
    \ get a dialog requesting that you enter the account information that you used\
    \ when signing up for Cloud Foundry (see [Figure A-4](#Appendix.html#fig_A_4)).\
    \ If you haven't done that yet, you can still click the CloudFoundry.com Signup\
    \ button, which will take you to the website.\n\n    ***Figure A-4.** Configuring\
    \ your CloudFoundry.com account*\n\n4.  At this point, it doesn't hurt to be a\
    \ bit skeptical and click the Validate Account button. It will check that you\
    \ can connect to Cloud Foundry and that your credentials are OK. Click Finish\
    \ and the next dialog will ask you which applications you want to deploy.\n5.\
    \  In the left list (Available resources), you can select `appendixA-bookstore`\
    \ and then click the Add ![Image](images/U003.jpg) button. This will move the\
    \ application to the Configured resources list and mark it as ready for deployment\
    \ (this is just like marking your application for deployment on an ordinary Tomcat\
    \ instance). Next, click Finish.\n6.  This will take you to the Application Details\
    \ dialog, which asks you what kind of app you're deploying. Choose Spring, as\
    \ shown in [Figure A-5](#Appendix.html#fig_A_5), and click Finish.\n\n    ***Figure\
    \ A-5.** Choosing the application type and name*\n\n7.  You get one more dialog\
    \ asking you for an URL to deploy your application under (see [Figure A-6](#Appendix.html#list_A_6)).\
    \ By default, the URL will be *`name-of-the-app`*`.cloudfoundry.com`. You'll need\
    \ to pick another URL because `appendixA-bookstore` will already be reserved.\
    \ You also can choose the amount of memory you want to give to your application\
    \ by changing the value for Memory Reservation.\n\n    ***Figure A-6.** Choosing\
    \ the URL for our application*\n\n8.  Now click Finish. We kept the \"Start application\
    \ on deployment\" check box selected, so the application will start deploying\
    \ and booting. (You can also start the application later by manually clicking\
    \ the Start button in the Cloud Foundry panel on the Applications tab.)\n\nAfter\
    \ it finishes deploying, you can point your browser to the URL you configured\
    \ earlier ([`http://appendixa-bookstore.cloudfoundry.com`](http://appendixa-bookstore.cloudfoundry.com)\
    \ in our case, but [`http://`*`the-name-you-just-chose`*`.cloudfoundry.com`](http://the-name-you-just-chose.cloudfoundry.com)\
    \ for yours), and see your app running on the cloud (see [Figure A-7](#Appendix.html#fig_A_7))!\n\
    \n***Figure A-7.** Our application running on the cloud*\n\n#### Configuring the\
    \ Services\n\nWe may now have our application running, but there is still something\
    \ missing: the application is still using its embedded H2 instance, so anytime\
    \ we restart the app, the data will be gone again. So let's use one of the persistence\
    \ options that Cloud Foundry offers us. We are using JPA for persistence, so our\
    \ choice will be limited to the relational databases, MySQL and PostgreSQL:\n\n\
    1.  Double-click the VMWare Cloud Foundry server in the Servers panel. You'll\
    \ see the Overview panel where you can change your account details (see [Figure\
    \ A-8](#Appendix.html#fig_A_8)).\n\n    ***Figure A-8.** The Cloud Foundry Overview\
    \ panel*\n\n2.  Click the Applications tab on the bottom, and you'll see the actual\
    \ applications you've deployed, as shown in [Figure A-9](#Appendix.html#fig_A_9).\
    \ Click the Add Service button next to the Services panel.\n\n    ***Figure A-9.**\
    \ Adding a service*\n\n3.  Choose a MySQL database service and give it a name\
    \ (see [Figure A-10](#Appendix.html#fig_A_10)).\n\n    ***Figure A-10.** Adding\
    \ a MySQL service*\n\n4.  Click Finish, and you'll be taken back to the Applications\
    \ tab, where you'll see that MySQL is now an available service. (Note that, at\
    \ the moment of writing, there's a bug in the plug-in that causes the Services\
    \ panel not to show a service after just adding it. Restarting Eclipse will work\
    \ around that.)\n5.  Now select your deployed application and drag the MySQL service\
    \ from the Services panel to the Application Services panel (see [Figure A-11](#Appendix.html#fig_A_11)).\n\
    \n**Note**  You can see the available services (and their version) using the `vmc\
    \ services` command.\n\n***Figure A-11.** Adding the MySQL service to our application*\n\
    \nThat's all it takes to configure the MySQL database. Now click the Update and\
    \ Restart button, and then navigate to the application with your browser. Orders\
    \ you make should now survive the restart.\n\n#### How Does It Work?\n\nYou may\
    \ wonder how it is possible that we're able to save our data in a MySQL database,\
    \ since we never did configure another datasource in our application. In fact,\
    \ all we did was tell Cloud Foundry that we wanted to use MySQL as an application\
    \ service. We never changed our datasource configuration in the `com.apress.prospringmvc.bookstore.config.InfrastructureContextConfiguration`\
    \ class, and yet we still seem to be able to connect to MySQL on Cloud Foundry.\n\
    \nThe magic behind this is explained by what Spring calls *auto-reconfiguration*\
    \ (see the blog post at the Spring blog^([8](#Appendix.html#APP-A-FN-8)) for more\
    \ information).\n\nRemember how we had a choice of application type when deploying?\
    \ We chose Spring and that enabled Cloud Foundry and Spring to do their magic.\
    \ What happens is that, during the deployment process, additional configuration\
    \ is added to your `web.xml` that registers some extra Spring beans into your\
    \ `ApplicationContext`. (This was exactly the reason why we needed to use XML\
    \ config, as explained previously.) One of those beans is an `org.cloudfoundry.reconfiguration.CloudAutoStagingBeanFactoryPostProcessor`^([9](#Appendix.html#APP-A-FN-9))\
    \ that will look for beans representing services (e.g., instances of `javax.sql.DataSource`,\
    \ `org.springframework.data.mongodb.MongoDBDFactory`, and so forth) that can be\
    \ replaced by other cloud-aware beans that know about the application services\
    \ that are bound to your application.\n\nBut what about the Hibernate dialect?\
    \ Before we were using H2, and now we're using MySQL—yet we didn't have to tell\
    \ Hibernate anything about this. As it turns out, recent Hibernate versions have\
    \ a handy feature that can detect the type of database from an actual connection,\
    \ so there is no longer a need to explicitly configure the dialect to use.\n\n\
    **Note**  This has its disadvantages: if your database isn't up or reachable up\
    \ while your application is booting, Hibernate will fail at runtime.\n\n#### Other\
    \ Configuration Options\n\nAuto-reconfiguration isn't the only way to have your\
    \ application configured. One of the other, more explicit possibilities is to\
    \ use the cloud configuration namespace. Using that namespace, we could have configured\
    \ a datasource in XML, as shown in [Listing A-7](#Appendix.html#list_A_7).\n\n\
    __________________\n⁸ [`http://blog.springsource.org/2011/11/04/using-cloud-foundry-services-with-spring-part-2-autoreconfiguration/`](http://blog.springsource.org/2011/11/04/using-cloud-foundry-services-with-spring-part-2-autoreconfiguration/)\n\
    ⁹ [`https://github.com/cloudfoundry/vcap-java/tree/master/auto-reconfiguration/src/main/java/org/cloudfoundry/reconfiguration`](https://github.com/cloudfoundry/vcap-java/tree/master/auto-reconfiguration/src/main/java/org/cloudfoundry/reconfiguration)\n\
    \n***Listing A-7.** Using the cloud namespace*\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<beans\n\n       xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
    \         http://www.springframework.org/schema/beans/spring-beans-3.1.xsd\n \
    \        http://www.springframework.org/schema/context\n         http://www.springframework.org/schema/context/spring-context-3.1.xsd\n\
    \         http://schema.cloudfoundry.org/spring\n         http://schema.cloudfoundry.org/spring/cloudfoundry-spring-0.8.xsd\"\
    \nprofile=\"cloud\">\n\n    <cloud:data-source id=\"dataSource\" />\n</beans>\n\
    ```\n\nSetting the `profile=\"cloud\"` attribute on the beans element means that\
    \ the beans defined within the element will only be used if the \"cloud\" profile\
    \ is active. The `cloud:datasource` element is a \"normal\" datasource that represents\
    \ the relational database application service that was bound to this application.\n\
    \nCombine this with the fact that Cloud Foundry automatically sets *cloud* as\
    \ the active application profile, and we can have cloud-specific configuration\
    \ using that profile. This type of explicit configuration is even required if\
    \ we want to use more than one cloud service of the same type (e.g., a MySQL and\
    \ PostgreSQL service) at the same time.\n\nIf we don't want Spring to use auto-reconfiguration,\
    \ we can always use the *war* application type. Our application will not get touched\
    \ in any way if we deploy using that type.\n\n#### Deploying Locally\n\nSo far,\
    \ we've deployed to the actual cloud infrastructure on cloudfoundry.com, hosted\
    \ by VMWare. But CloudFoundry.com offers another solution, one that doesn't require\
    \ us to always connect to a remote system. It's called *MicroCloud*, and it is\
    \ distributed as a virtual machine (a VMWare image) that we can run locally (such\
    \ as on the free VMWare player).\n\nYou can download MicroCloud from [`https://my.cloudfoundry.com/micro`](https://my.cloudfoundry.com/micro)\
    \ (a valid CloudFoundry.com account is required to download it). On the same site,\
    \ you can also find instructions on how to configure your MicroCloud. Once that\
    \ is done, the deployment process is exactly the same as deploying on CloudFoundry.com;\
    \ you only use a different target.\n\n### Debugging with Cloud Foundry\n\nThings\
    \ don't always go as planned, and there will be times when you will need to debug\
    \ your application.\n\nWhile you can always debug your application when deploying\
    \ on your own Tomcat instance, MicroCloud also supports connecting with a Java\
    \ debugger. To do so, you can start your application using the Debug button instead\
    \ your Start button. Once the application is started in debug mode, you can debug\
    \ it just like any other application started locally.\n\nAnother way to find out\
    \ what's going on while running in the cloud is to take advantage of the log files.\
    \ You can access them in STS using the Remote Systems view, which you can find\
    \ using Window ![Image](images/U003.jpg) Show View ![Image](images/U003.jpg) Other...\
    \ and then searching for remote systems. You can navigate the remote directory\
    \ structure and download log files to look at their contents (see [Figure A-12](#Appendix.html#fig_A_12)).\n\
    \n***Figure A-12.** The remote systems view*\n\nIf you want remote access to your\
    \ services (e.g., you want to inspect the current data), Cloud Foundry provides\
    \ the Caldecott gem that allows you to create a tunnel^([10](#Appendix.html#APP-A-FN-10))\
    \ to them. For example, you can use a command like `vmc tunnel mysql --port 12345`\
    \ to tunnel to your remote MySQL on local port 12345\\. Now it's only a matter\
    \ of pointing your MySQL or JDBC client to that port to get to the data. You can\
    \ find more info on Caldecott at [`http://blog.cloudfoundry.com/post/12928974099/now-you-can-tunnel-into-any-cloud-foundry-data-service`](http://blog.cloudfoundry.com/post/12928974099/now-you-can-tunnel-into-any-cloud-foundry-data-service).\n\
    \n__________________\n^(10) [`http://bit.ly/akrcc1`](http://bit.ly/akrcc1)\n\n\
    ### Summary\n\nThis appendix covered Cloud Foundry and how you can deploy your\
    \ application on it.\n\nThere are a few things that separate Cloud Foundry from\
    \ competing PaaS providers: one is the open source nature of Cloud Foundry, and\
    \ another is its excellent integration with the Spring framework. While Cloud\
    \ Foundry promises a seamless deployment model for most apps, which allows you\
    \ to deploy your application as-is, you had to make some adjustments in the case\
    \ of the bookstore application. These adjustments were required mostly because\
    \ you are using a newer Tomcat version than the one you currently get with Cloud\
    \ Foundry.\n\nCloud Foundry is currently still in beta, so it is rapidly evolving,\
    \ with new features and services still being added. And while you may still run\
    \ into some rough edges now and then, it is definitely worth keeping an eye on\
    \ it to see how it evolves in the future.\n\n## Index\n\n### A\n\n`AccountRepository`,\
