    #### 执行与会话快照


    我们已经配置了 `org.springframework.webflow.executor.FlowExecutor`，但未指定任何特定选项。对于我们的基本设置，开箱即用的配置已经足够：


    `    <webflow:flow-executor id="flowExecutor"/>`


    `flow-executor` 中唯一值得注意的子元素是 **<webflow:flow-execution-repository>**，它允许你自定义流程执行器的内部机制。它有两个重要的属性：`max-execution-snapshots`
    和 `max-executions`。我们将在清单 12-6 中演示如何定义它们，并在下一段中进行描述。


    ***清单 12-6.** 自定义流程注册表配置*


    `    <webflow:flow-executor id="flowExecutor" flow-registry="flowRegistry" >`

    `<webflow:flow-execution-repository` **`max-execution-snapshots="30"`![Image](img/U002.jpg)**

    **`max-executions="5"/>`**

    `    </webflow:flow-executor>`


    `max-execution-snapshots` 和 `max-executions` 属性允许你精细调整在“过去”中可以回溯多远。在上面的代码示例中，我们将它们设置为默认值。因此，将
    `max-execution-snapshots` 指定为 `30`，将 `max-executions` 指定为 `5` 与完全不指定它们的效果相同，因为这些是在未设置其他值时的默认值。我们在代码片段中输入这些值是为了演示如何使用这些属性，并突出显示它们的默认值。


    在第 10 章中，我们提到，每次向流程执行发起请求时，都会在返回响应之前创建其状态的快照（参见第 10 章的图 10-2 及其对 Web Flow 状态管理机制的描述）。`max-execution-snapshots`
    属性映射到流程执行中可以存储多少个这样的快照。如果将此值设置为 `0`，则无法在流程执行中返回到先前的状态。实际上，你的“后退”按钮会看起来像失效了一样。值为
    `-1` 表示“无限制”——你可能永远不想使用这个值，因为你希望将用户会话的大小控制在合理范围内。


    `max-executions` 属性映射到给定会话中可以同时激活多少个并发流程执行。每当你启动一个新的流程执行（并且没有显式结束前一个流程执行时），你仍然可以返回到前一个流程执行——它会与其所有状态一起被存储，具体取决于
    `max-execution-snapshots` 属性的值。因此，清单 12-3 中的配置意味着你可以回溯到前五个流程执行；在每个流程中，你可以浏览最近的
    30 个 `view` 状态。同样，值为 `0` 会完全禁用此功能，而 `-1` 则将数量设置为无限（记住：你可能不想使用那个值）。


    对于 `max-execution-snapshots` 和 `max-executions` 这两个属性，每当达到配置的最大值时，Web Flow 将分别移除最旧的快照或最旧的执行。因此，如果我们将
    `max-executions` 设置为 `2`，那么在启动第三个执行后，Web Flow 会简单地清理并移除第一个启动的执行。`max-execution-snapshots`
    也遵循同样的原则。


    ![Image](img/square.jpg) **注意** 这些设置始终适用于用户的会话，而不是整个应用程序。因此，如果我们将 `max-conversations`
    设置为 `5`，这意味着每个用户（以及每个会话）最多可以同时拥有五个活跃的会话（如果启动了第六个会话，最旧的会话将被 Web Flow 清理并移除）。


    ![Image](img/square.jpg) **警告** 我们现在就告诉你，你应该考虑这些默认值。你可能希望调整它们以满足你的需求，特别是当你的流程中有很多
    `view` 状态，并且在流程中存储了大量状态时——在这种情况下，这些默认值会很快开始占用大量内存（因此，你可能希望降低这些数值）。对于内存密集型应用程序（或内存受限的环境），将
    `max-execution-snapshots` 设置为 `5`，将 `max-executions` 设置为 `1` 是完全合理的设置。此外，大多数应用程序不需要能够回溯超过五个状态或超过一个先前的流程执行。如果你完全不需要这种状态“保存/恢复”快照功能，那么将两个值都设置为
    `0` 以禁用它。


    #### 更改表达式解析器


    在上一章中，我们了解了如何使用 `<webflow:flow-builder-services>` 来自定义行为。我们尚未讨论的一个功能是 `expression-parser`
    属性。此属性允许你插入另一个支持其他类型表达式语言的解析器。


    默认情况下，Web Flow 使用 SpEL 作为其表达式语言。根据你的背景或偏好，你可能希望将表达式语言切换为其他语言。


    更改表达式解析器的另一个好理由可能是你正在从 Web Flow 1 迁移。在下一节中，你将看到有一个工具可以帮助你将 Web Flow 1 的流程迁移到 Web
    Flow 2 语法。但是，此迁移不会更改你的表达式。将 OGNL 设置为默认表达式语言可以帮助你逐步升级 Web Flow。


    事实证明，切换表达式语言只需在 `expression-parser` 属性中配置正确的类即可（参见清单 12-7）。


    ***清单 12-7.** 更改表达式解析器*


    `<webflow:flow-builder-services id="flowBuilderServices" view-factory-`

    `creator="mvcViewFactoryCreator" conversion-service="conversionService" validator="validator"`

    `development="true"` **`expression-parser=""`**`/>`


    在清单 12-7 中，我们将 `expression-parser` 属性留空了。例如，指定以下类 `org.springframework.webflow.expression.el.WebFlowELExpressionParser`
    将允许你使用统一表达式语言（EL），就像在 JSF 中使用的那样。如果你改用 `org.springframework.webflow.expression.WebFlowOgnlExpressionParser`
    类，那么 OGNL 将被启用为表达式语言（这是 Web Flow 1 中的默认设置）。

