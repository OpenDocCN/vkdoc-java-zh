    `            <table>`

    `                <tr><td><@spring.message code="book.title" /></td><td><@spring.formInput`![Image](images/U002.jpg)

    `"searchCriteria.title" /></td></tr>`

    `                <tr><td><@spring.message code="book.category"`![Image](images/U002.jpg)

    `/></td><td><@spring.formSingleSelect "searchCriteria.category", categories, ""
