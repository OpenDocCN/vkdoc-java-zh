  trans: '

    #### 不同类型的测试


    测试有多种类型。我们需要明确决定覆盖哪一层级的测试，最重要的是给出清晰的定义。本章将探讨单元测试、集成测试和系统测试。首先，我们将概述不同类型的测试并加以说明。这份列表并非详尽无遗，但能让你了解我们将覆盖的测试层级。


    > *   **单元测试：** 单元测试的基本定义是“用于检查独立软件模块正确性的离散测试条件”。单元测试在软件模块的最低可能层级运行，最好是类中的单个方法，且不依赖任何外部资源（如资源文件）。我们将在下一小节中更详细地探讨单元测试。

    > *   **集成测试：** 与单元测试不同，集成测试的范围更广，涉及测试应用程序的多个层级。我们将在“集成测试”部分更详细地探讨集成测试。


    _________


    ⁴ [`http://jenkins-ci.org/`](http://jenkins-ci.org/)


    ⁵ [`http://www.sonarsource.com/`](http://www.sonarsource.com/)


    > *   **系统测试：** 类似于集成测试，但使用真实资源。这些资源可以是实际生产资源的缩减版本，但重要的是环境设置和拓扑结构要尽可能匹配。这将确保项目能顺利迁移到其他环境。测试的编写也不依赖于应用程序内部构建方式的任何知识；它们将待测应用程序视为一个黑盒。使用真实浏览器进行的前端测试也是系统测试的一种形式。

    > *   **用户验收测试：** 验收测试是由用户通过与应用程序界面交互来执行的测试。这是一种手动测试，在软件的某个部分实现时进行。尽早并频繁地进行验收测试是件好事；然而，单元测试和集成测试应该在问题到达用户之前就定位出大部分问题。因此，验收测试不应被视为单元测试和集成测试的替代品。

    > *   **性能测试：** 理想情况下，应在尽可能接近应用程序最终部署的生产环境的镜像上进行。这里的*环境*指所有方面——硬件和软件，也包括依赖项，如数据库（含数据）、外部服务等。性能测试旨在检测应用程序在正常负载下的吞吐量。对于
    Web 应用程序，它可以是在预测用户负载下请求的平均响应时间。性能测试的结果可以验证应用程序是否能够满足拟定的服务等级协议（SLA）。

    > *   **压力测试：** 理想情况下需要与性能测试相同的环境。但这里我们让应用程序承受异常高的负载（或压力）。它旨在检测薄弱环节，例如开始出现故障的事务，或正常操作下不会出现的其他故障。总的来说，它能让我们了解当超出正常负载边界时，整个环境的稳定性和健壮性。


    如前所述，我们将只讨论单元测试、集成测试和系统测试。对于系统测试，我们将仅限于自动化前端测试。这三个层级应占你整个（自动化）测试集的 90%或更多。它们将证明你的代码能正常工作，并且在添加功能或重构代码时仍能保持正常工作。这些测试能够自动运行，且在任何地方都能运行。在这一层级，Spring
    的测试支持也将证明其最为有用。接下来，让我们更深入地了解单元测试。


    ##### 单元测试


    单元测试在代码的最低可能层级伴随代码编写，并在开发阶段完成。它可以有多种形式，从验证领域对象行为的基础测试，到验证业务服务行为的更复杂测试。最重要的是，单元测试是系统无关的，并且不依赖任何资源。如果一段代码依赖于某个资源，那么该资源会以某种方式被“模拟”。我们将在后续章节讨论模拟对象（或称
    mock，它是模拟器的一种形式），但目前只需理解 mock 是资源的代码替代品即可。一个好的单元测试应满足的最重要标准可列举如下。一个好的单元测试应做到以下几点：


    > *   **运行速度快：** 单元测试必须运行极快。如果需要等待数据库连接、外部服务器进程或解析大文件，其效用将很快受限。测试应能提供即时反馈和即时满足感。

    > *   **零外部配置：** 单元测试不得需要任何外部配置文件，即使是简单的文本文件也不行。测试的配置必须由测试框架本身通过调用代码来提供和设置。目的是最大限度地减少测试的运行时间，并消除外部依赖（这些依赖可能随时间变化，与测试不同步）。测试用例的条件应在测试框架中表达，从而创建更易读的测试条件。

    > *   **独立于其他测试运行：** 单元测试必须能够完全隔离地运行。换句话说，单元测试不能依赖于在其之前或之后运行的其他测试。每个测试都是一个独立的单元。事实上，测试类中的每个测试方法都应是独立的，不依赖于其他方法，也不依赖于测试方法按特定顺序运行。

    > *   **零外部资源依赖：** 单元测试不得依赖任何外部资源，例如数据库连接或 Web 服务。这些资源不仅会拖慢测试速度，而且它们不受测试控制，因此无法保证其处于正确的测试状态。

    > *   **不改变外部状态：** 单元测试不得留下任何它曾运行过的痕迹。单元测试被设计为可重复的，因此它们必须自行清理。显然，当测试不依赖外部资源（这些资源通常更难清理或恢复）时，这一点更容易做到。

    > *   **测试尽可能小的代码单元：** 单元测试必须测试尽可能小的代码单元，以便隔离被测代码。在面向对象编程中，这个单元通常是对象或类的一个方法。编写单元测试时，让一个方法独立于其他方法进行测试，可以减少可能包含潜在错误的代码行数。

    '
- fmt: '##### Integration Tests


    An integration test accompanies the code and is written at development time, just
    like a unit test. However, unlike the unit test, an integration test spans multiple
    layers and tries to use as many resources as it possibly can. In our case integration
    tests are designed to never depend on “real” system resources in such a way that
    the test depends on a specific environment. Your tests should be able to run anywhere
    and anytime.


    An example that breaks this rule might be a prepopulated external database. In
    that case you can only run the test in the environment where you can access the
    database. If the database is down or experiences problems, you will be unable
    to run your tests. Also, all users should have their proper database tables. Otherwise,
    multiple users will not be able to run the tests at the same time without interfering
    with each other. When you are developing remotely and don’t have a VPN connection,
    you won’t be able to connect to the database and thus won’t be able to run the
    tests. All of this makes your life harder than it should be and may quickly demotivate
    you from writing good and complete tests.


    Our integration tests will use in-memory equivalents of these resources: in-memory
    databases, in-memory directory servers, in-memory browsers, and so forth. They
    allow testing the “integration” of several layers of our application without being
    affected by the environment. If at a certain point it becomes impossible to fall
    back on such resources, mock objects are used in the same way as with unit testing.


    An integration test is no replacement for system testing using the real resources.
    But it tries to simulate the target environment as closely as possible, reducing
    issues when performing the actual system or user acceptance testing. Real system
    testing is usually more resource-intensive and harder to automate. You will benefit
    in these latter testing stages if you have created a solid integration testing
    harness, because many problems will already have been detected and solved thanks
    to these integration tests.


    The important thing to remember is that these tests are all accompanying the project.
    They are made at development time, by developers. They are run by developers in
    an automated fashion. If any test fails, your project is “broken.” Also, don’t
    forget that integration testing that isn’t dependent on actual resources and users
    enables you to nail down a lot of fundamental problems in an efficient manner
    early in the project’s lifecycle. This makes later system testing and user acceptance
    testing smoother and easier. It is always better to use a resource (which runs
    in memory or does not create a dependency) than to use a static simulator or a
    mock.


    As a final word on in-memory resources: it could well be that your project uses
    special queries that only run on a specific DMBS, and hence there is no use in
    firing them at another database. It might also be the case that the statements
    in question are not even supported. In most cases these special queries only take
    up a very small amount (for an average project) of the code base. It is better
    to create resource-dependent (system) tests just for those specific cases than
    to make your entire test set dependent on real resources.


    Also, if you are using DBMS-specific features or complex query logic that is impossible
    to simulate on another resource, are you sure that your Java code is the right
    place for it? Isn’t a database object such as a (materialized) view, procedure
    or function a better solution? This point leads into an architectural discussion,
    but it is important to consider and can have impact not only on your overall architecture
    and reusability but also the testability of your (Java) project.


    ![Image](images/square.jpg) **Note** There is not always a clear separation between
    a unit and an integration test, although this discussion has emphasized the idea
    of a noticeable dividing line. Sometimes you just need to test that business algorithm
    without being bugged with “how to get the data.” We would call that a unit test.
    In another situation, you want to make sure that an HQL or JPQL query translates
    to executable SQL and performs what you want. This is something we would execute
    against an in-memory database and hence call it an integration test.'
  raw: '##### Integration Tests


    An integration test accompanies the code and is written at development time, just
    like a unit test. However, unlike the unit test, an integration test spans multiple
    layers and tries to use as many resources as it possibly can. In our case integration
    tests are designed to never depend on “real” system resources in such a way that
    the test depends on a specific environment. Your tests should be able to run anywhere
    and anytime.


    An example that breaks this rule might be a prepopulated external database. In
    that case you can only run the test in the environment where you can access the
    database. If the database is down or experiences problems, you will be unable
    to run your tests. Also, all users should have their proper database tables. Otherwise,
    multiple users will not be able to run the tests at the same time without interfering
    with each other. When you are developing remotely and don’t have a VPN connection,
    you won’t be able to connect to the database and thus won’t be able to run the
    tests. All of this makes your life harder than it should be and may quickly demotivate
    you from writing good and complete tests.


    Our integration tests will use in-memory equivalents of these resources: in-memory
    databases, in-memory directory servers, in-memory browsers, and so forth. They
    allow testing the “integration” of several layers of our application without being
    affected by the environment. If at a certain point it becomes impossible to fall
    back on such resources, mock objects are used in the same way as with unit testing.


    An integration test is no replacement for system testing using the real resources.
    But it tries to simulate the target environment as closely as possible, reducing
    issues when performing the actual system or user acceptance testing. Real system
    testing is usually more resource-intensive and harder to automate. You will benefit
    in these latter testing stages if you have created a solid integration testing
    harness, because many problems will already have been detected and solved thanks
    to these integration tests.


    The important thing to remember is that these tests are all accompanying the project.
    They are made at development time, by developers. They are run by developers in
    an automated fashion. If any test fails, your project is “broken.” Also, don’t
    forget that integration testing that isn’t dependent on actual resources and users
    enables you to nail down a lot of fundamental problems in an efficient manner
    early in the project’s lifecycle. This makes later system testing and user acceptance
    testing smoother and easier. It is always better to use a resource (which runs
    in memory or does not create a dependency) than to use a static simulator or a
    mock.


    As a final word on in-memory resources: it could well be that your project uses
    special queries that only run on a specific DMBS, and hence there is no use in
    firing them at another database. It might also be the case that the statements
    in question are not even supported. In most cases these special queries only take
    up a very small amount (for an average project) of the code base. It is better
    to create resource-dependent (system) tests just for those specific cases than
    to make your entire test set dependent on real resources.


    Also, if you are using DBMS-specific features or complex query logic that is impossible
    to simulate on another resource, are you sure that your Java code is the right
    place for it? Isn’t a database object such as a (materialized) view, procedure
    or function a better solution? This point leads into an architectural discussion,
    but it is important to consider and can have impact not only on your overall architecture
    and reusability but also the testability of your (Java) project.


    ![Image](images/square.jpg) **Note** There is not always a clear separation between
    a unit and an integration test, although this discussion has emphasized the idea
    of a noticeable dividing line. Sometimes you just need to test that business algorithm
    without being bugged with “how to get the data.” We would call that a unit test.
    In another situation, you want to make sure that an HQL or JPQL query translates
    to executable SQL and performs what you want. This is something we would execute
    against an in-memory database and hence call it an integration test.'
