    ##### ExceptionHandlerExceptionResolver 与 AnnotationMethodHandlerExceptionResolver


    `AnnotationMethodHandlerExceptionResolver` 和 `ExceptionHandlerExceptionResolver`
    都会在当前控制器中查找带有 `org.springframework.web.bind.annotations.ExceptionHandler` 注解的方法。这也是它们的缺点，因为这对异常解析器仅作用于当前指定控制器中的方法。如果使用这种技术，就无法为整个应用程序定义全局异常处理器。


    异常处理方法与控制器方法非常相似（如第 5 章所述）；它们可以使用相同的方法参数和返回值。异常处理方法使用相同的基础设施来检测返回类型和方法参数类型。不过，这些方法有一个额外的特性：我们还可以传入抛出的异常；具体来说，我们可以指定一个类型为
    `Exception`（或其子类）的参数。


    清单 6-21 中的方法将处理其所在控制器中抛出的所有异常。它会向客户端返回错误代码 500，并附带给定的原因。这是我们可以编写的最基本的异常处理方法。如前所述，我们可以在方法签名中使用多个参数。这既适用于方法参数，也适用于方法返回类型。（概述请参见前一章的表
    5-3 和表 5-4。）


    ***清单 6-21.** 基本异常处理方法示例*


    `@ExceptionHandler()`

    `@ResponseStatus(`

    `    value=HttpStatus.INTERNAL_SERVER_ERROR,`

    `    reason="Exception while handling request.")`

    `public void handleException() {}`


    清单 6-22 展示了一个更详细的示例。当发生 `org.springframework.dao.DataAccessException` 时，它会尽可能多地向模型中填充信息。之后，将渲染名为
    `db-error` 的视图。


    ***清单 6-22.** 高级异常处理方法示例*


    `@ExceptionHandler`

    `public ModelAndView handleIOException(DataAccessException ex,`

    `                                      Principal principal,`

    `                                      WebRequest request) {`

    `    ModelAndView mav = new ModelAndView("db-error");`

    `    mav.addObject("username", principal.getName());`

    `    mav.addAllObjects(request.getParameterMap());`


    `    for(Iterator<String> names = request.getHeaderNames(); names.hasNext(); )
    {`

    `        String name =  names.next();`

    `        String[] value = request.getHeaderValues(name);`

    `        mav.addObject(name, value);`

    `    }`

    `    return mav;`

    `}`


    ### 扩展 Spring @MVC


    在前面的章节中，我们解释了 Spring MVC 的工作原理以及如何编写控制器。然而，有时框架提供的开箱即用支持可能不够用，我们想要更改或添加框架的行为。总的来说，Spring
    框架由于其构建方式而非常灵活。它使用了大量的策略和委托，这也是我们可以用来扩展或修改框架行为的方式。在本节中，我们将深入探讨请求映射、请求处理和表单渲染的内部机制。最后，我们将介绍如何扩展这些功能。


    #### 扩展 RequestMappingHandlerMapping


    为了将传入的请求映射到控制器方法，Spring 使用了处理器映射。在我们的用例中，我们一直使用的是 `org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping`，并且我们已经多次提到它非常灵活。为了基于带有
    `org.springframework.web.bind.annotation.RequestMapping` 注解的方法来匹配请求，处理器映射会查询多个
    `org.springframework.web.servlet.mvc.condition.RequestCondition` 实现（参见图 6-8）。


    ![图片](img/9781430241553_Fig06-09.jpg)


    ***图 6-9.** RequestCondition 类图*


    如图所示，`org.springframework.web.bind.annotation.RequestMapping` 注解的每个属性（即 `consumes`、`headers`、`methods`、`params`、`produces`
    和 `value`；更多详情请参见表 5-2）都有一个对应的实现。`RequestConditionHolder` 和 `RequestMappingInfo`
    是框架内部使用的两个实现。


    要创建一个实现，我们需要两样东西。首先，我们需要实现该接口（API 见清单 6-23）。其次，我们需要扩展 `org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping`。这个类包含两个回调方法，它们充当自定义请求方法的工厂方法（见清单
    6-24）。`getCustomTypeCondition` 方法被调用来创建匹配类型级别条件的实例，而 `getCustomMethodCondition`
    方法用于方法级别的条件。


