- fmt: "# 实现 WebRequestInterceptor\n\n在本节中，我们将实现一个`org.springframework.web.context.request.WebRequestInterceptor`。查看[图\
    \ 6-4](#Chapter06.html#fig_6_4)中的网页，可以看到一个名为“Random Books”的区域。到目前为止，网页上的这个区域一直是空的。现在，我们将创建一个拦截器，向模型添加一些随机书籍。为此，我们将实现`postHandle`方法（参见[清单\
    \ 6-11](#Chapter06.html#list_6_11)）。\n\n![Image](images/square.jpg) **注意**：在真实的网店中，我们可能会将这个区域称为“新书”或“推荐书籍”。\n\
