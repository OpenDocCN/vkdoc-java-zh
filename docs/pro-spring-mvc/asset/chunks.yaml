- fmt: "# Profiles\n\nSpring introduced the concept of profiles in version 3.1. Profiles\
    \ make it easy to create different configurations of our application for different\
    \ environments. For instance, we can create separate profiles for our local environment,\
    \ for testing, and for our deployment to CloudFoundry. Each of these environments\
    \ requires some environment-specific configuration or beans. One can think of\
    \ database configuration; messaging solutions; and for testing environments, stubs\
    \ of certain beans.\n\nTo enable a profile, we need to tell the application context\
    \ which profiles are active. To activate certain profiles, we need to set a system\
    \ property called `spring.profiles.active` (in a web environment, this can be\
    \ a servlet initialization parameter or web context parameter). This is a comma-separated\
    \ string containing the names of the active profiles. If we now add some (in this\
    \ case static inner) classes (see [Listing 2-10](#Chapter02.html#list_2_10)) with\
    \ the `org.springframework.context.annotation.Configuration` and `org.springframework.context.annotation.Profile`\
    \ annotations, then only the classes that match one of the active profiles will\
    \ be processed. All other classes will be ignored.\n\n**Listing 2-10.** ApplicationContextConfiguration\
    \ with profiles\n\n```\npackage com.apress.prospringmvc.moneytransfer.annotation.profiles;\n\
    \nimport org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.context.annotation.Profile;\n\nimport com.apress.prospringmvc.moneytransfer.annotation.MoneyTransferServiceImpl;\n\
    import com.apress.prospringmvc.moneytransfer.repository.AccountRepository;\nimport\
    \ com.apress.prospringmvc.moneytransfer.repository.MapBasedAccountRepository;\n\
    import com.apress.prospringmvc.moneytransfer.repository.MapBasedTransactionRepository;\n\
    import com.apress.prospringmvc.moneytransfer.repository.TransactionRepository;\n\
    import com.apress.prospringmvc.moneytransfer.service.MoneyTransferService;\n\n\
    @Configuration\npublic class ApplicationContextConfiguration {\n\n    @Bean\n\
    \    public AccountRepository accountRepository() {\n        return new MapBasedAccountRepository();\n\
    \    }\n\n    @Bean\n    public MoneyTransferService moneyTransferService() {\n\
    \        return new MoneyTransferServiceImpl();\n    }\n\n    @Configuration\n\
    \    @Profile(value = \"test\")\n    public static class TestContextConfiguration\
    \ {\n        @Bean\n        public TransactionRepository transactionRepository()\
    \ {\n            return new StubTransactionRepository();\n        }\n    }\n\n\
    \    @Configuration\n    @Profile(value = \"local\")\n    public static class\
    \ LocalContextConfiguration {\n\n        @Bean\n        public TransactionRepository\
    \ transactionRepository() {\n            return new MapBasedTransactionRepository();\n\
    \        }\n    }\n}\n```\n\n[Listing 2-11](#Chapter02.html#list_2_11) shows some\
    \ example bootstrap code. In general, we will not be setting the active profiles\
    \ from our bootstrap code. Instead, we will set up our environment using a combination\
    \ of system variables. This enables us to leave our application unchanged, but\
    \ still have the flexibility to change our runtime configuration.\n\n**Listing\
    \ 2-11.** MoneyTransferSpring with profiles\n\n```\npackage com.apress.prospringmvc.moneytransfer.annotation.profiles;\n\
    \nimport java.math.BigDecimal;\n\nimport org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\n\
    import org.springframework.context.ApplicationContext;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
    import org.springframework.context.support.ClassPathXmlApplicationContext;\n\n\
    import com.apress.prospringmvc.ApplicationContextLogger;\nimport com.apress.prospringmvc.moneytransfer.domain.Transaction;\n\
    import com.apress.prospringmvc.moneytransfer.service.MoneyTransferService;\n\n\
    public class MoneyTransferSpring {\n\nprivate static final Logger logger = LoggerFactory.getLogger(MoneyTransferSpring.class);\n\
    \n    public static void main(String[] args) {\n\n        System.setProperty(\"\
    spring.profiles.active\", \"test\");\n\n        AnnotationConfigApplicationContext\
    \ ctx1 = new AnnotationConfigApplicationContext(\n                ApplicationContextConfiguration.class);\n\
    \        transfer(ctx1);\n        ApplicationContextLogger.log(ctx1);\n\n    \
    \    ApplicationContext ctx2 = new ClassPathXmlApplicationContext(\n         \
    \       \"/com/apress/prospringmvc/moneytransfer/annotation/profiles\"\n     \
    \           + \"/application-context.xml\");\n        transfer(ctx2);\n\n    \
    \    ApplicationContextLogger.log(ctx2);\n\n        System.setProperty(\"spring.profiles.active\"\
    , \"local\");\n        AnnotationConfigApplicationContext ctx3 = new AnnotationConfigApplicationContext(\n\
    \                ApplicationContextConfiguration.class);\n        transfer(ctx3);\n\
    \        ApplicationContextLogger.log(ctx3);\n\n        ApplicationContext ctx4\
    \ = new ClassPathXmlApplicationContext(\n                \"/com/apress/prospringmvc/moneytransfer/annotation/profiles\"\
    \n                + \"/application-context.xml\");\n        transfer(ctx4);\n\
    \        ApplicationContextLogger.log(ctx4);\n\n    }\n\n    private static void\
    \ transfer(ApplicationContext ctx) {\n        MoneyTransferService service = ctx.getBean(\"\
    moneyTransferService\",\n                MoneyTransferService.class);\n      \
    \  Transaction transaction = service.transfer(\"123456\", \"654321\", new\n  \
    \              BigDecimal(\"250.00\"));\n        logger.info(\"Money Transfered:\
    \ {}\", transaction);\n    }\n}\n```\n\nYou might wonder why we should use profiles,\
    \ anyway. One reason is that it allows for flexible configurations. This means\
    \ that our entire configuration is under version control and in the same source\
    \ code, instead of being spread out over different servers, workstations, and\
    \ so on. Of course, we can still load additional files containing some properties\
    \ (like usernames and passwords). This can prove useful if a company’s security\
    \ policy won’t allow us to put these properties into version control. We are going\
    \ to use profiles extensively when we cover testing and deploying to the cloud\
    \ because the two tasks require different configurations for the datasource.\n\
    \n# Enabling Features\n\nThe Spring Framework gives us a lot more flexibility\
    \ than just dependency injection; it also provides a lot of different features\
    \ we can enable. We can enable these features using annotations (see [Table 2-6](#Chapter02.html#tab_2_6)).\
    \ Note that we won’t use all of the annotations mentioned in this table; however,\
    \ our sample application will use transactions, and we will use some AOP. The\
    \ largest part of this book is about the features provided by the `org.springframework.web.servlet.config.annotation.EnableWebMvc`\
    \ annotation.\n\n![Image](images/tab_2_6.jpg)\n\n![Image](images/tab_2_6a.jpg)\n\
    \n![Image](images/square.jpg) **Note**  For more information on these features,\
    \ we recommend that you examine the Java documentation of the different annotations,\
    \ as well as the dedicated reference guide chapters."
