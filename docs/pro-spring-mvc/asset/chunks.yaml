- fmt: '#### The View State


    The `<view-state>` element is a basic element in each flow. As we will see, there
    are four other `*-state` elements. The view state is probably the most important
    of these elements, so we will describe this one first.


    The view state models a view that is being rendered from the moment the view state
    is entered. A view state can be entered as a starting point by starting a flow
    or by a transition event from another state within that flow. When the view state
    renders the view, the execution is paused (at that time the user is looking at
    the view rendered on her browser). The user can then trigger a transition allowed
    within that view state to continue processing.


    ____________


    ⁶ We will discuss the `view-state` in detail next. The other states are decision
    state, action state, subflow state, and end state. We left them out here on purpose,
    since they are not required to build a basic flow.


    In [Listing 10-2](#Chapter10.html#list_10_2), there are two such transitions described:
    `next` and `cancel`. Whenever the user triggers such action (by clicking a button
    or a link on the page) the flow resumes and executes the given action.


    The view state is identified with its `id` attribute. You use that attribute to
    refer to this view state from other states. The ids must be unique over all states
    in the same flow definition. The `view` attribute indicates which view this `view-state`
    will render. The `model` attribute identifies the name of an object that is present
    on any of the Web Flow scopes, which will be used to bind the received parameters
    on. These parameters are the request parameters part of the form submission. [Table
    10-4](#Chapter10.html#tab_10_4) lists the attributes with descriptions and their
    uses.


    ![Image](images/9781430241553_tab10-04.jpg)


    ____________


    ⁷ See [https://jira.springsource.org/browse/SWF-1518](https://jira.springsource.org/browse/SWF-1518)
    if you want more details.


    There are some other attributes listed in [Figure 10-9](#Chapter10.html#fig_10_9)
    that we will not discuss at this time because they are outside the scope of this
    basic chapter. They are also not required to build a basic flow. For your convenience,
    if you are reading this for reference or you want to jump ahead, the `parent`,
    `popup`, and `history` attributes are discussed in [Chapter 12](#Chapter12.html#ch12)''s
    “Inheritance,” “Reworking the Orders Overview,” and “Execution and Conversation
    Snapshots” sections, respectively.


    ![Image](images/9781430241553_Fig10-09.jpg)


    ***Figure 10-9.** The XML schema overview for the `<view-state>` element*


    The `attribute` element is common for each state, and it can also be applied on
    the flow root element. This is an element you will probably never use, but we
    will cover it here for the sake of completeness. The `attribute` element is used
    to supply metadata to tooling, for example.


    ![Image](images/square.jpg) **Note** You have an element with the name “attribute”
    when an attribute is also part of the XML syntax, such as the `id` or `view` attribute.
    All of this makes the name of this attribute name needlessly confusing!


    Tooling that visualizes the flow can read these `attribute` elements and use their
    content to display additional information. The element has three attributes: `name`,
    `value`, and `type`. The `name` and `value` attributes can be anything. The `type`
    attribute is there to convert the value (which is otherwise treated as a String
    datatype) to a specific type, if required.


    Of the remaining elements (see [Figure 10-9](#Chapter10.html#fig_10_9)), we will
    only discuss the `<transition>` element in this chapter. Please consult the Table
    of Contents or the Index to find explanations for the remaining elements, as they
    are scattered throughout the next several chapters.


    #### State Transitions


    A transition literally means a state transition from the current state to the
    same or to a different state within the flow. In some cases, the flow might execute
    an action before executing the actual transition. You can see this in the `selectCategory`
    view state in [Listing 10-2](#Chapter10.html#list_10_2), where there are two transitions.
    The transition is triggered by the literal defined in the `on` attribute. You
    basically supply a request parameter with a specific naming convention where the
    `on` literal is nested. You will see how to define this in your view when building
    your first pages in the upcoming “Selecting the Category” section.


    ![Image](images/square.jpg) **Note** Web Flow works internally with events. When
    you specify a literal in the `on` attribute, it will create a matching event from
    that. Whenever a request comes in to trigger a transition, it will match the event.
    This is not really important yet, as you will specify a literal in your view and
    in the `on` attribute. [Chapter 11](#Chapter11.html#ch11)''s “Form Validation
    Using the Application Controller” and ”Working with Outcome Events” sections will
    cover how this correlates with events. In addition to literals, you can also use
    expressions in both the `on` and `to` attributes.


    The target state can be any of the five possible state types, and you reference
    them with the `to` attribute. The value is the id of the other state you wish
    to transition to. Remember that you can also transition to the same state (or
    to the same view state in our case). Omitting the `to` attribute will yield the
    same effect, although it will not trigger a real transition. In that case, the
    view state is not explicitly reentered. This will become important when we discuss
    the `on entry` and `on exit` actions in the next chapter. For now, it is safe
    to assume that both alternatives will yield the same result; however, not specifying
    the `to` attribute is the most logical thing to do here. Notice that the `cancel`
    transition transitions to another state with the `end` id (i.e., the end state).
    This is one of the four other special states, as we will see later on.


    [Table 10-5](#Chapter10.html#tab_10_5) lists the various attributes for the `transition`
    element.


    ![Image](images/9781430241553_tab10-05.jpg)


    #### The Evaluate Action


    The evaluate action enables your flow to interact with other components such as
    the Spring MVC controllers (or any other Java classes, as long as they are Spring
    beans). The evaluate action takes an expression that is executed when the evaluation
    takes place. The evaluate action must be the child of another element, and it
    cannot exist on its own. It is executed as part of a certain *action* that is
    triggered within your flow. In the example, we nested the evaluate action in a
    transition inside the view state and in the on start action. As we will see, next
    to the transition and on start, you can use the evaluate action in combination
    with other elements.^([8](#Chapter10.html#CHP-10-FN-8)) No matter where the `evaluate`
    action is used, its goal remains the same: to evaluate an expression that executes
    a method, manipulate some object state, and potentially return a result.


    When the expression returns a value, you can use the `result` attribute to bind
    the return value to a variable in a given scope. Attributes of the evaluate action
    are listed in [Table 10-6](#Chapter10.html#tab_10_6).


    ![Image](images/9781430241553_tab10-06.jpg)'
