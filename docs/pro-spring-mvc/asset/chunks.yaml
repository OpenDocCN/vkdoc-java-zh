- fmt: '### Subflows


    Subflows give you an alternative way to structure your flows. As it turns out,
    one of the strong points of Web Flow (which we haven''t really discussed until
    now) is its support for composition and modularity.


    *Composition* allows you to combine different flow definitions to build a more
    complete definition. To do this, you reuse existing definitions, which saves you
    code duplication. In the next chapter, which is on advanced Web Flow, you will
    see this in practice using inheritance.


    If you design for *modularity*, you will be able to treat certain parts of your
    flow as separate modules. This also promotes reuse, as you will be able to refer
    to those modules from other parts in your application without having to duplicate
    code. In this section, we will look at subflows, a Web Flow technique that will
    help you in accomplishing such reuse.


    As is true for any object-oriented language, you need some kind of design. The
    design will cost you a little extra effort, but this feature will be a (very)
    important aspect of your project. For example, it will dictate how manageable
    your application will be in the near future.


    Whereas in Java we could write everything in a single class or even in a single
    method, we all know that this would turn into an unworkable project in less than
    a day. Therefore, we try to apply good design principles because we know we will
    benefit from doing so in the long run. It will make our project easier to test
    and our code easier to read. It will also improve the quality of our code and
    make it easier to extend without spending weeks of refactoring.


    This principle also applies to flows. Flows don''t contain real Java code, but
    they do replace (or accommodate) your application controllers, which are an important
    part of the logic inside your flows. A good design in your flows makes them easy
    to read, easy to refactor, and, above all, reusable.


    ![Image](images/square.jpg) **Note** Web Flow 1 included a feature called *inline
    flows*, which is a flow that is inline with, or embedded inside, another top-level
    flow. Such a flow does not need to be registered with Web Flow separately (you
    have to provide the flow id yourself inside the `<inline-flow>` flow element).
    The best way to compare an inline flow is to a private Java nested class (or a
    private inner class, if you like). Inline flows are no longer supported in Web
    Flow 2. If you must migrate such flows, the advised action is to simply move them
    to a top-level flow definition and register them with a flow id in the flow registry.
    The flow id should be equal to the `id` attribute of the `<inline-flow>` element.
    Or, you can use the flow definition update tool to do this for you. We will explain
    how to use this tool in the “Web Flow 1 Migration” section in [Chapter 12](#Chapter12.html#ch12).


    A subflow is no different than a normal flow, which we''ve already covered. It
    is more like a concept. As we will see in the next section when we continue refactoring
    our sample application, calling a subflow requires a special state and some consideration
    about passing along state between the parent flow and the subflow. The flow that
    includes the subflow is referred to as the *parent* flow. The subflow is sometimes
    also referred to as the *child* flow.


    In short: Subflows enable you to move parts of a flow contained in one flow (flow-x)
    to another top-level flow (flow-y). Next, you can point from flow-x to flow-y
    using the `<subflow-state>` element in flow-x; this enables you to execute the
    parts that you moved to flow-y. This refactoring does not influence the behavior
    of your flow (or your application altogether), but it has an impact on your flow
    design.


    By doing this, you promote reuse. When you have a piece of flow logic that is
    required in multiple flows, you can extract that logic, place it in another top-level
    flow, and then delegate to that flow as a subflow in the other flows.


    You can compare this feature to *delegation* in Java. When you have some logic
    in different classes that does the same thing, you extract it, put it in a separate
    class, and call that from within the classes you extracted the logic from. You
    can apply the same pattern with flows; simply extract the common parts and put
    them in a separate flow. When changes are required, you only need to make them
    once, instead of changing them separately in every flow.


    As noted previously, it is important to understand that a subflow is no different
    than a normal flow. In fact, you don''t create subflows per se; you just create
    a normal flow. You cannot determine by looking at a flow whether it is a subflow.
    A subflow should be registered as a normal flow, and the same rules apply.


    In [Figure 11-8](#Chapter11.html#fig_11_8), both flow-x and flow-y are normal
    flows. Both can be started like any normal flow. However, flow-y is also included
    as a subflow in flow-x. So, from the point of flow-x, flow-y is considered a subflow.


    ![Image](images/9781430241553_Fig11-08.jpg)


    ***Figure 11-8.** Flow-x starts as a top-level flow and calls another flow (flow-y),
    which becomes its subflow.*


    When you include a subflow in your flow, that flow can itself delegate to a subflow
    and so forth. There is no hard limit defined for how many levels of subflows can
    exist.


    ![Image](images/square.jpg) **Note** As we have seen, a subflow is defined as
    a normal top-level flow in its own flow definition XML. We speak about a flow
    being a subflow from the moment it is included in another flow. However, because
    it is a normal flow, you can still start it like any other normal top-level flow.
    However, in most cases you will design a flow specifically for use as a subflow;
    hence, starting it directly without the context of the parent flow would not make
    much sense. Nevertheless, there exist scenarios where it might make sense for
    a given flow to be started as a top-level flow from one part in your application,
    but also to be included as a subflow in another part.


    ### Further Enhancing the Bookstore


    We will continue our refactoring effort with the elements we have discussed in
    the previous sections. So far, we have not added any security to our application.
    In the previous chapter, we explained that, once you enter the application, you
    are automatically logged in. We did this to simplify things. However, we will
    now replace the login process with a traditional login page. We will also require
    that the user be logged in prior to making an order. And while we will dedicate
    a separate upcoming chapter to security ([Chapter 13](#Chapter13.html#ch13)),
    in this section we''ll take a first look at security by creating our own home-grown
    security mechanism. We will use this to illustrate several aspects of flows, including
    subflows and the remaining states that have not yet been covered.


    Until now, a user was automatically logged in as “jd” when using the application;
    this happened behind the scenes using the `com.apress.prospringmvc.bookstore.web.AuthenticationSessionListener`.
    This is a `javax.servlet.http.HttpSessionListener` that will authenticate user
    “jd” programmatically from the moment a new `javax.servlet.http.HttpSession` is
    started. You can check out the implementation if you want, but it is of no importance
    to our explanation here. It was required in the previous sample to be able to
    add orders to a user (you must be logged in to be able to add an order and view
    existing orders).


    In this chapter''s sample, we''ve removed the listener because we will be implementing
    our own security mechanism. Let''s review the altered flow shown in [Figure 11-9](#Chapter11.html#fig_11_9).
    The numbered steps in the diagram are described in [Table 11-2](#Chapter11.html#tab_11_2).


    ![Image](images/9781430241553_Fig11-09.jpg)


    ***Figure 11-9.** The revised flow from our book store application that we will
    refactor*


    ![Image](images/9781430241553_tab11-02.jpg)'
