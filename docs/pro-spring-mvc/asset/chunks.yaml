    RequestContextListener());` `}`  ### Role-Based Access Control    Role-based access
    control (RBAC) is a beneficial access control model for organizations with many
    users and a high degree of diversity in the functions they are playing in their
    daily job. RBAC was modeled especially to support this kind of structure. Your
    role in RBAC is actually comparable with the role you would play in your organization;
    most likely that will have something to do with development. The permissions are
    the rights that have been granted to someone with that role.    While this level
    of detail mostly makes sense only for larger organizations, its basic implementation
    is not very difficult. As we will see, we can extend our domain model easily to
    support basic RBAC with a minimum of effort.    But to set the record straight,
    for something as simple our bookstore this is certainly overkill. Even if it were
    to become a popular store, the diversity of users will be very low; they will
    all be doing pretty much the same things. Hence we will not really benefit from
    an RBAC system. But we will demonstrate it just to show what is possible with
    Spring Security.    The model we are going to support comes down to the relationships
    shown in [Figure 13-12](#Chapter13.html#fig_13_12).  ![Image](images/9781430241553_Fig13-12.jpg)  ***Figure
    13-12.** The RBAC model*    A user (in our domain called “`Account`”) has one
    or more roles. A role can have one or more permissions. The roles we define will
    depend on what’s important for our application. A role can be thought of as a
    globalization of a set of permissions.    In our bookstore a role might be “customer”
    or “administrator,” and a permission might be “create order” or “add books.” Permissions
    are normally finer-grained than roles.    We decided to load both roles and permissions
    in the Security context. Checking on the role might be meaningful for a coarse-grained
    check. For example; should this navigation link be shown? This probably depends
    on the fact that a given user possesses a given role. However, going deeper, it
    could be that there are two different roles giving access to that same functionality.
    But within the functionality, only certain operations are allowed, depending on
    specific permissions. So here it would benefit us to check for the presence of
    a specific permission. As we will see, with Spring Security we can easily check
    on both.    For example, suppose that a company has a page that shows various
    benefits an employee enjoys. This could contain information about the medical
    plan, the meal vouchers, or group promotions. Accessing this information is allowed
    for internal employees only; contractors and other types of outside employees
    don’t benefit from this and should be excluded from accessing this information.    For
    this reason we could opt to do a coarse-grained check on roles first. This will
    prevent the contractors from even seeing a link to this information. However,
    within the page itself we want to differentiate between normal employees, who
    can only read/query the information, and administrators, who will be able to modify
    the information. Here we will continue by checking the actual permissions. As
    employees, we will only have the permission to read the extra benefits, while
    administrators (also being employees) will have the extra *permission* to modify
    the information as well.    This whole story is not so interesting for Spring
    Security. It just wants to know a list of “strings” that you will use to check
    presence upon. That this list contains roles, permissions, or aliens, doesn’t
    really matter. The role and permission division is just for the people administrating
    the application, so that access can be dealt with flexibly, without having to
    change the code of the application.    Roles or permissions will be transformed
    to Spring Security `GrantedAuthorities`. Our domain model has specific entities
    to support this. First is the familiar `Account` entity, which is shown in [Listing
    13-26](#Chapter13.html#list_13_26). In bold you will see the many-to-many association
    it has with Order. The `Role` entity shown in [Listing 13-27](#Chapter13.html#list_13_27),
    along with its many-to-many association with `Permission`, is indicated in bold.
    Finally we have the `Permission` entity shown in [Listing 13-28](#Chapter13.html#list_13_28).    ***Listing
