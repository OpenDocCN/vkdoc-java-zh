    ### 国际化


    要实现国际化，我们需要配置不同的组件，使其能够根据用户的语言（区域设置）解析消息。例如，`org.springframework.context.MessageSource`
    允许我们根据消息代码和区域设置来解析消息。为了能够解析区域设置，我们还需要一个 `org.springframework.web.servlet.LocaleResolver`。最后，为了能够更改区域设置，我们还需要配置一个
    `org.springframework.web.servlet.i18n.LocaleChangeInterceptor`（下一章将更深入地介绍拦截器）。


    #### 消息源


    消息源是根据代码和区域设置实际解析消息的组件。Spring 提供了 `org.springframework.context.MessageSource`
    接口的几种实现。其中两种实现是我们可以直接使用的，而其他实现则只是委托给另一个消息源。


    Spring 框架提供的两种实现位于 `org.springframework.context.support` 包中。表 5-23 简要描述了它们。


    ![Image](img/tab_5_23.jpg)


    这两种 Bean 的配置方式大致相同。我们需要一个名为 `messageSource` 的 Bean。选择哪种实现并不重要。例如，我们甚至可以创建自己的实现，使用数据库来加载消息。


    清单 5-48 中的配置配置了一个 `org.springframework.context.support.ReloadableResourceBundleMessageSource`，它从类路径加载一个名为
    `messages.properties` 的文件。它还会尝试为当前用于解析消息的 `Locale` 加载 `messages_[locale].properties`
    文件。


    ***清单 5-48.** WebMvcContext 中的 MessageSource 配置*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `import org.springframework.context.support.ReloadableResourceBundleMessageSource;`


    `// 其他导入已省略`


    `@Configuration`

    `@EnableWebMvc`

    `@ComponentScan(basePackages = { "com.apress.prospringmvc.bookstore.web" })`

    `public class WebMvcContextConfiguration extends WebMvcConfigurerAdapter {`


    `    @Bean`

    `    public MessageSource messageSource() {`

    `        ReloadableResourceBundleMessageSource messageSource;`

    `        messageSource = new ReloadableResourceBundleMessageSource();`

    `        messageSource.setBasename("classpath:/messages");`

    `        messageSource.setUseCodeAsDefaultMessage(true);`

    `        return messageSource;`

    `    }`

    `}`


    以下代码片段展示了加载的两个属性文件（实际上是资源包）。`messages.properties`（见清单 5-49）文件中的消息被视为默认值，并且可以在特定语言的
    `messages_nl.properties` 文件（见清单 5-50）中被覆盖。


    ***清单 5-49.** messages.properties 片段*


    `home.title=Welcome`


    `invalid.account.emailaddress=Invalid email address.`

    `required=Field {0} is required.`


    ***清单 5-50.** messages_nl.properties*


    `home.title=Welkom`


    `invalid.account.emailaddress=Ongeldig emailadres.`

    `required=Veld {0} is verplicht.`


    #### LocaleResolver


    为了使消息源正常工作，我们还需要配置一个 `org.springframework.web.servlet.LocaleResolver`（可以在 `org.springframework.web.servlet.i18n`
    包中找到）。Spring 提供了几种不同的实现，可以简化我们的工作。区域设置解析器是一种用于检测要使用哪个 `Locale` 的策略。不同的实现使用不同的方式来解析区域设置（见表
    5-24）。


    ![Image](img/tab_5_24.jpg)


    #### LocaleChangeInterceptor


    如果我们希望用户能够更改区域设置，则需要配置一个 `org.springframework.web.servlet.i18n.LocaleChangeInterceptor`（见清单
    5-51）。此拦截器检查当前传入的请求，并检查请求中是否存在名为 `locale` 的参数。如果存在，拦截器将使用先前配置的区域设置解析器来更改当前用户的
    `Locale`。参数名称是可配置的。


    ***清单 5-51.** 完整的国际化配置*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `import org.springframework.context.MessageSource;`

    `import org.springframework.context.support.ReloadableResourceBundleMessageSource;`

    `import org.springframework.web.servlet.HandlerInterceptor;`

    `import org.springframework.web.servlet.LocaleResolver;`

    `import org.springframework.web.servlet.config.annotation.InterceptorRegistry;`

    `import org.springframework.web.servlet.config.annotation.ResourceHandlerRegistry;`

    `import org.springframework.web.servlet.i18n.CookieLocaleResolver;`

    `import org.springframework.web.servlet.i18n.LocaleChangeInterceptor;`


    `// 其他导入已省略`


    `@Configuration`

    `@EnableWebMvc`

    `@ComponentScan(basePackages = { "com.apress.prospringmvc.bookstore.web" })`

    `public class WebMvcContextConfiguration extends WebMvcConfigurerAdapter {`


    `    @Override`

    `    public void addInterceptors(InterceptorRegistry registry) {`

    `        registry.addInterceptor(localeChangeInterceptor());`

    `    }`


    `    @Bean`

    `    public HandlerInterceptor localeChangeInterceptor() {`

    `        LocaleChangeInterceptor localeChangeInterceptor;`

    `        localeChangeInterceptor = new LocaleChangeInterceptor();`

    `        localeChangeInterceptor.setParamName("lang");`

    `        return localeChangeInterceptor;`

    `    }`


    `    @Bean`

    `    public LocaleResolver localeResolver() {`

    `        return new CookieLocaleResolver();`

    `    }`


    `    @Bean`

    `    public MessageSource messageSource() {`

    `        ReloadableResourceBundleMessageSource messageSource;`

    `        messageSource = new ReloadableResourceBundleMessageSource();`

    `        messageSource.setBasename("classpath:/messages");`

    `        messageSource.setUseCodeAsDefaultMessage(true);`

    `        return messageSource;`

    `    }`

    `}`


    ![Image](img/square.jpg) **注意** 通常，将 `LocaleChangeInterceptor` 作为第一个拦截器之一是一个好主意。如果出现问题，我们希望以正确的语言通知用户。


    如果我们重新部署应用程序，切换语言时应该会得到本地化的错误消息（当然，这仅在我们向资源包中添加了适当的错误代码时才有效）。然而，`MessageSource`
    的用途不仅限于错误消息；我们还可以使用 `MessageSource` 从资源包中检索标签、标题、错误消息等。为此，我们可以使用 `message` 标签。清单
    5-52 显示了一个修改后的图书搜索页面，该页面使用 `message` 标签来填充标签、标题和页眉。如果我们切换语言，应该会得到本地化的消息（见图 5-11
    和 5-12）。


