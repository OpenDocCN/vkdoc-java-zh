    The initial setup remains unaltered and is the same as in `LoginControllerTest`.\
    \ For example; we are still using Mockito to mock the `AccountService`, and we\
    \ are still injecting the `LoginController` using the local Spring configuration\
    \ setup via the `LoginControllerTestConfiguration` class.\n\nThe first thing we\
    \ did is construct the `MockMvc` object in standalone mode. We did that by supplying\
    \ it our `LoginController` as a constructor argument:\n\n```java\nMockMvc mockMvc\
    \ = MockMvcBuilders.standaloneSetup(loginController)\n                  .build();\n\
    ```\n\nThe `LoginController` is pretty straightforward to test, so all defaults\
    \ loaded by the standalone mode are sufficient. You can, however, apply customizations\
    \ before calling `build` if that would be required. For example, a custom view\
    \ resolver would be set like this:\n\n```java\nMockMvc mockMvc = MockMvcBuilders\n\
    \                  .standaloneSetup(loginController)\n                  .setViewResolvers(viewResolver)\n\
    \                  .build();\n```\n\nWhen the context is initialized we can let\
    \ it process a request. Our `LoginController` only accepts HTTP `post` requests,\
    \ so we build a `post` request with two parameters:\n\n```java\nmockMvc.perform(post(\"\
    /login\")\n    .param(\"username\", \"john\")\n    .param(\"password\", \"secret\"\
    ))\n```\n\nThe methods such as `post` and `param` are included via static imports\
    \ on top of the class (see [Listing 9-14](#Chapter09.html#list_9_14)). In this\
    \ case we left this on purpose to show you how compact the syntax becomes when\
    \ applying this strategy. In the beginning however it takes some time to get used\
    \ to the different methods that are available. Finally we verify the result. We\
    \ check that the HTTP status code is 200 (`isOk`), that the account has been set\
    \ on the session, and that we are being redirect to the `index.htm` page:\n\n\
    ```java\n.andExpect(status().isOk())\n.andExpect(request().sessionAttribute(\n\
    \        SecurityHandlerInterceptor.ACCOUNT_ATTRIBUTE, account))\n.andExpect(redirectedUrl(\"\
    /index.htm\"));\n```\n\nThis looks pretty sweet. You don’t have to create separate\
    \ mock objects for `request`, `response`, and `session`, because this is all taken\
    \ care of by the Spring MVC `test` module. If you compare this with our previous\
    \ test case, `LoginControllerTest`, you will immediately see that this code looks\
    \ a lot better, is more compact, and above all tests the complete controller including\
    \ the Spring MVC annotations.\n\nBy the way, building a `MockMvc` in managed mode\
    \ that actually loads the configuration based upon `@Configuration` classes is\
    \ not much different and would look as follows:\n\n```java\nMockMvc mockMvc =\
    \ MockMvcBuilders\n.annotationConfigSetup(WebMvcContextConfiguration.class,\n\
    InfrastructureContextConfiguration.class,\n                     TestDataContextConfiguration.class,\n\
    \                     LoginControllerTestConfiguration.class)\n              \
    \ .configureWebAppRootDir(\"src/main/webapp\", false)\n               .build();\n\
    ```\n\nThis wraps up our short introduction to Spring MVC `test`. We hope that\
    \ we have shown you something which will become a very powerful tool in testing\
    \ your Spring MVC application controllers with a minimum of effort. We already\
    \ look forward having this fully integrated in Spring!\n\n## Automated Front-End\
    \ Testing\n\nAutomated front-end testing is the last piece in the unit testing\
    \ puzzle. It helps us test our final untested component, our views. JSPs can be\
    \ tested, just like all the other components, in an automated fashion. There are\
    \ many forms of front-end testing. You can, for example, test your web application\
    \ on different browser to check that the look and feel is similar. You can also\
    \ test your application for performance, render times, and usability. All of these\
    \ are tests which are probably applied in other testing phases possibly using\
    \ external tools.\n\nThe testing that we are after here is to make sure that all\
    \ our pages render, and that all functionality offered by them also works. Nothing\
    \ more, nothing less. When you have done a good job testing all previous components,\
    \ this should be a breeze. Be sure that you have:\n\n> *   Set up a *good* infrastructure\
    \ for front-end testing. This requires a running container, data setup, and possibly\
    \ fakes or stubs for certain resources and functionality. The tests also need\
    \ to run (like any unit test) automatically via your continuous integration system,\
    \ meaning it should all be integrated in your build system.\n>     \n>     This\
    \ is not as easy as it seems, since you have one little problem: you need to start\
    \ up a Servlet container that can run your application (see [Figure 9-10](#Chapter09.html#fig_9_10)).\
    \ There are plug-ins for Gradle (and Maven) like Cargo,^([14](#Chapter09.html#CHP-9-FN-14))\
    \ which can start a container and deploy your application before these tests are\
    \ run.\n>     \n>     ![Image](images/9781430241553_Fig09-10.jpg)\n>     \n> \
    \    ***Figure 9-10**. Running a front-end test against Tomcat*\n>     \n> * \
    \  Designed your views well. Normally you will have already tested your views\
    \ by hand when you were designing them. So normally when every level is well-tested,\
    \ there should be only minor faults coming out of your front-end testing.\n> \
    \    \n>     The most important part is that they enforce your “test harness.”\
    \ Even when you forgot to test something in your services, it could well be tested\
    \ be one of your frontend tests. Also, if someone refactors your views later on,\
    \ you still have the test harness that ensures that your pages are still working.\n\
    \nTo set up a front-end test we have chosen Selenium.^([15](#Chapter09.html#CHP-9-FN-15))\
    \ It can be run in two modes, using a real browser like Firefox, and using HtmlUnit,\
    \ which is an in-memory browser.\n\nHtmlUnit is capable of running JavaScript\
    \ and handling AJAX. This can all run completely in memory and does not have any\
    \ external dependency, that way it can be considered as an integration test."
