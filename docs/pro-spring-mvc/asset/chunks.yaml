- fmt: "### Dependencies\n\nFirst, you should add Spring Web Flow to your build and\
    \ deploy path. When using Gradle (as in our samples) it suffices to declare dependencies\
    \ to the following artifacts in the `build.gradle`:\n\n```\ncompile \"org.springframework.webflow:spring-webflow:$springSwfVersion\"\
    \ncompile \"org.springframework.webflow:spring-js:$springSwfVersion\"\ncompile\
    \ \"org.springframework.webflow:spring-binding:$springSwfVersion\"\n```\n\nYou\
    \ can find this code in the `build.gradle` file located in the `chapter10-bookstore`\
    \ sample. The dependency is declared on project level (as opposed to the root,\
    \ `build.gradle`). The reasoning behind this is that the previous sample projects\
    \ in the book do not use Web Flow. Declaring the dependency in the root `build.gradle`\
    \ file would implicitly mean that all these projects have an unnecessary Web Flow\
    \ dependency. By declaring the Web Flow dependency specifically in the `build.gradle`\
    \ of the Web Flow samples, we limited this dependency by introducing it only when\
    \ we were ready to tackle the topic of Web Flow. The version variable is maintained\
    \ in the `build.gradle` in the root of the `/samples` directory. This is a clean\
    \ way to manage the versions of your core libraries. This works great for a monolithically\
    \ structured project, where every subproject is supposed to use the same version\
    \ of a given library.\n\nThis will provide all the dependencies (including transitive\
    \ ones) required to get started using Web Flow. Of course, you will need the Spring\
    \ and Spring MVC dependencies as laid out earlier in this book. At the time of\
    \ writing, the latest Web Flow 2 version is 2.3.1. Check the SpringSource Web\
    \ Flow[^10] website to make sure there isn't a newer version available when you\
    \ start working with Web Flow in your application.\n\n### Web Flow Configuration\n\
    \nHere we will start by explaining what you need for the Web Flow-specific configuration.\
    \ It consists of the components that are required to bootstrap Web Flow. We will\
    \ first describe what you need for Web Flow itself. For example, we will cover\
    \ how to configure the flow executor and flow registry. The flow executor is the\
    \ actual Web Flow engine that will run our flows, and the flow registry will look\
    \ up and parse our flow definitions. We will also have a look at the flow builder\
    \ services that can be used to customize the configuration. Finally, we need of\
    \ a piece of separate configuration that will link the Web Flow configuration\
    \ into the Spring MVC framework. This piece of “glue” configuration will be described\
    \ in the “Spring MVC Glue Configuration” section.\n\n#### Core Configuration\n\
    \nThe core Web Flow configuration is simplified by making use of Spring's so-called\
    \ *namespace configuration*. This means that you will use components in the Spring\
    \ Web Flow namespace to configure Web Flow (see [Listing 10-3](#Chapter10.html#list_10_3)).\
    \ The machinery behind it will create all the beans necessary to bootstrap it.\n\
    \n[^10]: [`http://www.springsource.org/webflow`](http://www.springsource.org/webflow)\n\
    \nAll of this is configured in a Spring XML configuration file. At this time,\
    \ there are no annotation alternatives. The Spring configuration file looks standard;\
    \ but in this case, we added an additional namespace that holds the Web Flow-specific\
    \ configuration elements and attributes. Also, the namespace has the `webflow`\
    \ prefix; we will use this prefix to address elements in the Web Flow configuration\
    \ namespace.\n\n**Listing 10-3.** The `src/main/resources/spring/webflow-config.xml`\
    \ and Web Flow configuration namespaces\n\n```\n<beans xmlns=http://www.springframework.org/schema/beans\n\
    \    xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n      \
    \  http://www.springframework.org/schema/beans/spring-beans-3.1.xsd\n        http://www.springframework.org/schema/webflow-config\n\
    \        http://www.springframework.org/schema/webflow-config/spring-webflow-config.xsd\"\
    >\n```\n\n![Image](images/square.jpg) **Note** At this time, there are no annotations\
    \ for configuring Web Flow. However, the namespaces configuration approach makes\
    \ configuration rather straightforward. With a couple lines of XML, you can set\
    \ up your Web Flow configuration.\n\nThe two core components that let Web Flow\
    \ do its work are the `org.springframework.webflow.executor.FlowExecutor` and\
    \ the `org.springframework.webflow.definition.registry.FlowDefinitionRegistry`.\
    \ The first component is the main entry point for the web application framework\
    \ to drive the flow execution. [Listing 10-4](#Chapter10.html#list_10_4) shows\
    \ how to configure the flow executor.\n\n**Listing 10-4.** Configuring the Flow\
    \ Executor\n\n```\n<webflow:flow-executor id=\"flowExecutor\"/>\n```\n\nOptionally,\
    \ you can specify the `flow-registry` attribute, which defaults to a bean with\
    \ the id of `flowRegistry`. This means that, if you stick to that bean naming\
    \ convention, you won't need to specify this attribute. If you name the `FlowDefinitionRegistry`\
    \ something else (e.g., `myFlowRegistry`), you will have to specify it explicitly,\
    \ as shown in [Listing 10-5](#Chapter10.html#list_10_5). There are only two reasons\
    \ why you would want to do this:\n\n*   There is a bean with a conflicting name.\
    \ In other words, there is already a bean which has `flowRegistry` as its identification.\n\
    *   You are not using the namespaces configuration and instead created a custom\
    \ flow registry bean, giving it a specific name. For example, you could create\
    \ a flow registry that reads its flow from database and give it the id of `databaseReadingFlowRegistry`.\
    \ In this case, you could decide to give it a different name to make its intention\
    \ clear.\n\nWe will go with the defaults in our sample code and not specify the\
    \ `flow-registry` attribute.\n\n**Listing 10-5.** Configuring a non-standard Flow\
    \ Registry: `myFlowRegistry`\n\n```\n<webflow:flow-executor id=\"flowExecutor\"\
    \ flow-registry=\"myFlowRegistry\"/>\n```\n\nThe only notable subelement to be\
    \ used within the flow executor is `<webflow:flow-execution-repository>`, which\
    \ lets you customize the internals of the flow executor. We will discuss this\
    \ in depth in [Chapter 12](#Chapter12.html#ch12)'s “Web Flow Configuration Customizations”\
    \ section.\n\nThe `FlowDefinitionRegistry` is responsible for finding and reading\
    \ the flows that you have created. Roughly, you have two options:\n\n*   Define\
    \ each flow manually with the `<webflow:flow-location path=\"\" id=\"\">` subelement.\n\
    *   Specify a pattern. Web Flow will automatically scan for flows and add them\
    \ to the registry when it finds them.\n\nIn the sample, we have opted for the\
    \ second option (see [Listing 10-6](#Chapter10.html#list_10_6))."
  raw: '#### Dependencies


    First, you should add Spring Web Flow to your build and deploy path. When using
    Gradle (as in our samples) it suffices to declare dependencies to the following
    artifacts in the `build.gradle`:


    `compile "org.springframework.webflow:spring-webflow:$springSwfVersion"`

    `compile "org.springframework.webflow:spring-js:$springSwfVersion"`

    `compile "org.springframework.webflow:spring-binding:$springSwfVersion"`


    You can find this code in the `build.gradle` file located in the `chapter10-bookstore`
    sample. The dependency is declared on project level (as opposed to the root, `build.gradle`).
    The reasoning behind this is that the previous sample projects in the book do
    not use Web Flow. Declaring the dependency in the root `build.gradle` file would
    implicitly mean that all these projects have an unnecessary Web Flow dependency.
    By declaring the Web Flow dependency specifically in the `build.gradle` of the
    Web Flow samples, we limited this dependency by introducing it only when we were
    ready to tackle the topic of Web Flow. The version variable is maintained in the
    `build.gradle` in the root of the `/samples` directory. This is a clean way to
    manage the versions of your core libraries. This works great for a monolithically
    structured project, where every subproject is supposed to use the same version
    of a given library.


    This will provide all the dependencies (including transitive ones) required to
    get started using Web Flow. Of course, you will need the Spring and Spring MVC
    dependencies as laid out earlier in this book. At the time of writing, the latest
    Web Flow 2 version is 2.3.1\. Check the SpringSource Web Flow^([10](#Chapter10.html#CHP-10-FN-10))
    website to make sure there isn''t a newer version available when you start working
    with Web Flow in your application.


    #### Web Flow Configuration


    Here we will start by explaining what you need for the Web Flow-specific configuration.
    It consists of the components that are required to bootstrap Web Flow. We will
    first describe what you need for Web Flow itself. For example, we will cover how
    to configure the flow executor and flow registry. The flow executor is the actual
    Web Flow engine that will run our flows, and the flow registry will look up and
    parse our flow definitions. We will also have a look at the flow builder services
    that can be used to customize the configuration. Finally, we need of a piece of
    separate configuration that will link the Web Flow configuration into the Spring
    MVC framework. This piece of “glue” configuration will be described in the “Spring
    MVC Glue Configuration” section.


    ##### Core Configuration


    The core Web Flow configuration is simplified by making use of Spring''s so-called
    *namespace configuration*. This means that you will use components in the Spring
    Web Flow namespace to configure Web Flow (see [Listing 10-3](#Chapter10.html#list_10_3)).
    The machinery behind it will create all the beans necessary to bootstrap it.


    ____________


    ^(10)[`http://www.springsource.org/webflow`](http://www.springsource.org/webflow)


    All of this is configured in a Spring XML configuration file. At this time, there
    are no annotation alternatives. The Spring configuration file looks standard;
    but in this case, we added an additional namespace that holds the Web Flow-specific
    configuration elements and attributes. Also, the namespace has the `webflow` prefix;
    we will use this prefix to address elements in the Web Flow configuration namespace.


    ***Listing 10-3.** The src/main/resources/spring/webflow-config.xml and Web Flow
    configuration namespaces*


    `<beans xmlns=http://www.springframework.org/schema/beans`


    `    xsi:schemaLocation="http://www.springframework.org/schema/beans`

    `        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`

    `        http://www.springframework.org/schema/webflow-config`

    `        http://www.springframework.org/schema/webflow-config/spring-webflow-config.xsd">`


    ![Image](images/square.jpg) **Note** At this time, there are no annotations for
    configuring Web Flow. However, the namespaces configuration approach makes configuration
    rather straightforward. With a couple lines of XML, you can set up your Web Flow
    configuration.


    The two core components that let Web Flow do its work are the `org.springframework.webflow.executor.FlowExecutor`
    and the `org.springframework.webflow.definition.registry.FlowDefinitionRegistry`.
    The first component is the main entry point for the web application framework
    to drive the flow execution. [Listing 10-4](#Chapter10.html#list_10_4) shows how
    to configure the flow executor.


    ***Listing 10-4.** Configuring the Flow Executor*


    `    <webflow:flow-executor id="flowExecutor"/>`


    Optionally, you can specify the `flow-registry` attribute, which defaults to a
    bean with the id of `flowRegistry`. This means that, if you stick to that bean
    naming convention, you won''t need to specify this attribute. If you name the
    `FlowDefinitionRegistry` something else (e.g., `myFlowRegistry`), you will have
    to specify it explicitly, as shown in [Listing 10-5](#Chapter10.html#list_10_5).
    There are only two reasons why you would want to do this:


    *   There is a bean with a conflicting name. In other words, there is already
    a bean which has `flowRegistry` as its identification.

    *   You are not using the namespaces configuration and instead created a custom
    flow registry bean, giving it a specific name. For example, you could create a
    flow registry that reads its flow from database and give it the id of `databaseReadingFlowRegistry`
    In this case, you could decide to give it a different name to make its intention
    clear.


    We will go with the defaults in our sample code and not specify the `flow-registry`
    attribute.


    ***Listing 10-5.** Configuring a non-standard Flow Registry: myFlowRegistry*


    `<webflow:flow-executor id="flowExecutor" flow-registry="myFlowRegistry"/>`


    The only notable subelement to be used within the flow executor is `<webflow:flow-execution-repository>`,
    which lets you customize the internals of the flow executor. We will discuss this
    in depth in [Chapter 12](#Chapter12.html#ch12)''s “Web Flow Configuration Customizations”
    section.


    The `FlowDefinitionRegistry` is responsible for finding and reading the flows
    that you have created. Roughly, you have two options:


    *   Define each flow manually with the `<webflow:flow-location path="" id="">`subelement.

    *   Specify a pattern. Web Flow will automatically scan for flows and add them
    to the registry when it finds them.


    In the sample, we have opted for the second option (see [Listing 10-6](#Chapter10.html#list_10_6)).'
  trans: '

    #### 依赖项


    首先，你需要将 Spring Web Flow 添加到构建和部署路径中。使用 Gradle 时（如我们的示例所示），只需在 `build.gradle` 中声明对以下构件的依赖即可：


    `compile "org.springframework.webflow:spring-webflow:$springSwfVersion"`

    `compile "org.springframework.webflow:spring-js:$springSwfVersion"`

    `compile "org.springframework.webflow:spring-binding:$springSwfVersion"`


    你可以在 `chapter10-bookstore` 示例中的 `build.gradle` 文件中找到这段代码。该依赖是在项目级别声明的（而非根目录的 `build.gradle`）。这样做的原因是，本书之前的示例项目并未使用
    Web Flow。如果在根目录的 `build.gradle` 文件中声明依赖，将隐式地意味着所有这些项目都包含不必要的 Web Flow 依赖。通过仅在
    Web Flow 示例的 `build.gradle` 中专门声明 Web Flow 依赖，我们只在准备讨论 Web Flow 主题时才引入该依赖，从而限制了它的范围。版本变量维护在
    `/samples` 目录根目录下的 `build.gradle` 中。这是一种管理核心库版本的简洁方式。对于单体结构项目（其中每个子项目都应使用给定库的相同版本）来说，这种方法非常有效。


    这将提供开始使用 Web Flow 所需的所有依赖项（包括传递依赖项）。当然，你还需要本书前面章节介绍的 Spring 和 Spring MVC 依赖项。在撰写本文时，最新的
    Web Flow 2 版本是 2.3.1。请查看 SpringSource Web Flow^(10) 网站，以确保在开始在你的应用程序中使用 Web Flow
    时没有更新的版本可用。


    #### Web Flow 配置


    这里我们将首先解释 Web Flow 特定配置所需的内容。它由引导 Web Flow 所需的组件组成。我们将首先描述 Web Flow 本身需要什么。例如，我们将介绍如何配置流程执行器和流程注册表。流程执行器是实际运行我们流程的
    Web Flow 引擎，而流程注册表将查找并解析我们的流程定义。我们还将了解可用于自定义配置的流程构建器服务。最后，我们需要一个独立的配置片段，将 Web
    Flow 配置链接到 Spring MVC 框架中。这个“粘合”配置将在“Spring MVC 粘合配置”部分中描述。


    ##### 核心配置


    通过使用 Spring 所谓的 *命名空间配置*，核心 Web Flow 配置得以简化。这意味着你将使用 Spring Web Flow 命名空间中的组件来配置
    Web Flow（参见清单 10-3）。其背后的机制将创建引导它所需的所有 bean。


    ____________


    ¹⁰[`http://www.springsource.org/webflow`](http://www.springsource.org/webflow)


    所有这些都在一个 Spring XML 配置文件中进行配置。目前，还没有注解替代方案。Spring 配置文件看起来是标准的；但在本例中，我们添加了一个额外的命名空间，其中包含
    Web Flow 特定的配置元素和属性。此外，该命名空间带有 `webflow` 前缀；我们将使用此前缀来引用 Web Flow 配置命名空间中的元素。


    ***清单 10-3.** src/main/resources/spring/webflow-config.xml 和 Web Flow 配置命名空间*


    `<beans xmlns=http://www.springframework.org/schema/beans`


    `    xsi:schemaLocation="http://www.springframework.org/schema/beans`

    `        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`

    `        http://www.springframework.org/schema/webflow-config`

    `        http://www.springframework.org/schema/webflow-config/spring-webflow-config.xsd">`


    ![Image](img/square.jpg) **注意** 目前，还没有用于配置 Web Flow 的注解。然而，命名空间配置方法使配置变得相当直接。只需几行
    XML，你就可以设置好 Web Flow 配置。


    让 Web Flow 执行其工作的两个核心组件是 `org.springframework.webflow.executor.FlowExecutor` 和
    `org.springframework.webflow.definition.registry.FlowDefinitionRegistry`。第一个组件是
    Web 应用程序框架驱动流程执行的主要入口点。清单 10-4 展示了如何配置流程执行器。


    ***清单 10-4.** 配置流程执行器*


    `    <webflow:flow-executor id="flowExecutor"/>`


    可选地，你可以指定 `flow-registry` 属性，该属性默认为 id 为 `flowRegistry` 的 bean。这意味着，如果你遵循该 bean
    命名约定，则无需指定此属性。如果你将 `FlowDefinitionRegistry` 命名为其他名称（例如 `myFlowRegistry`），则必须显式指定它，如清单
    10-5 所示。你希望这样做的原因只有两个：


    *   存在一个名称冲突的 bean。换句话说，已经有一个 bean 以 `flowRegistry` 作为其标识。

    *   你没有使用命名空间配置，而是创建了一个自定义的流程注册表 bean，并为其指定了一个特定名称。例如，你可以创建一个从数据库读取流程的流程注册表，并为其指定
    id `databaseReadingFlowRegistry`。在这种情况下，你可以决定给它一个不同的名称以明确其意图。


    在我们的示例代码中，我们将使用默认值，并且不指定 `flow-registry` 属性。


    ***清单 10-5.** 配置非标准流程注册表：myFlowRegistry*


    `<webflow:flow-executor id="flowExecutor" flow-registry="myFlowRegistry"/>`


    流程执行器中唯一值得注意的子元素是 `<webflow:flow-execution-repository>`，它允许你自定义流程执行器的内部结构。我们将在第
    12 章的“Web Flow 配置自定义”部分深入讨论这一点。


    `FlowDefinitionRegistry` 负责查找和读取你创建的流程。大致来说，你有两个选项：


    *   使用 `<webflow:flow-location path="" id="">` 子元素手动定义每个流程。

    *   指定一个模式。Web Flow 将自动扫描流程，并在找到它们时将其添加到注册表中。


    在示例中，我们选择了第二个选项（参见清单 10-6）。

