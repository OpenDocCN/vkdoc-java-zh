    In this chapter, you learned the prerequisites for building and running the sample
    bookstore application. You also learned about the supporting technologies used
    by the sample application (i.e., Hibernate/JPA 2.0 and JSPs).


    Next, you learned about Gradle, the build system used to develop the sample application;
    you also learned how it will help you in your project.


