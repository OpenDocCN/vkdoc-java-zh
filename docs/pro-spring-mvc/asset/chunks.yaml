- fmt: "### Building Your First Flow\n\nIn this section and hereafter, we will build\
    \ a small part of our bookstore sample application using Web Flow. We already\
    \ have seen some of the important elements that make up a flow. Now we will use\
    \ them to build an entire working flow. To make you familiar with the basic building\
    \ blocks required to assemble our first flow, we will build it step by step describing\
    \ each part into detail. Finally, we will show the complete assembled flow. The\
    \ following sections will contain a lot of snippets, so you might want to peak\
    \ to the complete flow as listed in the Overview section if you get lost in between.\n\
    \nWe will implement the create order use case. This use case will allow a user\
    \ to order books. The first screen shows a dropdown list for selecting a category,\
    \ while the next screen allows a user to select books that belong to that selected\
    \ category. One or more different books can be added to the list. Next, the user\
    \ can enter order details such as the delivery date. When the user confirms, the\
    \ order is made. The user is also able to cancel the process in each of the different\
    \ stages. This flow consists of following actions/pages:\n\n1.  The user selects\
    \ the link to buy books from the navigation bar.\n2.  A category must be selected\
    \ (page1).\n3.  The books within that category must be shown (page2).\n4.  A user\
    \ can select one or more different books and add them to the list of selected\
    \ books.\n5.  The user can enter some order details, such as the date of delivery\
    \ (page3).\n6.  The order is placed.\n\nSee the flow diagram for creating an order\
    \ in [Figure 10-11](#Chapter10.html#fig_10_11); [Table 10-8](#Chapter10.html#tab_10_8)\
    \ explains the flow steps.\n\n![Image](images/9781430241553_Fig10-11.jpg)\n\n\
    **Figure 10-11.** The flow the sample application implements\n\n![Image](images/9781430241553_tab10-08.jpg)\n\
    \nWe can summarize things as follows:\n\n*   We don't perform any kind of authentication\
    \ in this sample application. But because we need to link orders to a user, every\
    \ user is authenticated automatically when entering the web application. This\
    \ is done for you in the sample. We will not discuss this here because we are\
    \ taking this part of the process out of your control for the moment. We will\
    \ leave the explanation for this to the next chapter.\n*   After the order has\
    \ been made, the user is sent back to the home page.\n\n![Image](images/square.jpg)\
    \ **Note** The approach we take with the Spring Web Flow sample for selecting\
    \ books and creating the order is somewhat different than the previously discussed\
    \ Spring MVC approach. We deliberately left out the shopping cart and transformed\
    \ the book selection and order process to a more flow-based approach. This better\
    \ suits our needs when explaining the different Web Flow elements.\n\n### Creating\
    \ the Home Page\n\nBefore we proceed in building our flow, we first want to cover\
    \ how a user gets into the application. In other words, we want to go over what\
    \ the user sees when she enters the bookstore URL.\n\nThe first page shown is\
    \ the so-called home page. It consists of the template with no content in the\
    \ middle (the content area). This page will allow the user to select an action\
    \ from the navigation menu. Let's take a quick look at how this is implemented.\n\
    \nThe controller `com.apress.prospringmvc.bookstore.web.controller.MainController`\
    \ is a normal Spring MVC controller defined as a Spring bean using the `@Controller`\
    \ annotation. The goal of this controller is simply to render the home page, which\
    \ is physically the `main.jsp`. The controller uses the `@RequestMapping` \"index.htm\"\
    \ to do this. This controller is defined in [Listing 10-9](#Chapter10.html#list_10_9).\n\
    \n**Listing 10-9.** The Main Controller\n\n```\npackage com.apress.prospringmvc.bookstore.web.controller;\n\
    \nimport org.springframework.stereotype.Controller;\nimport org.springframework.web.bind.annotation.RequestMapping;\n\
    import org.springframework.web.servlet.ModelAndView;\n\n@Controller\npublic class\
    \ MainController {\n    @RequestMapping(\"index.htm\")\n    public ModelAndView\
    \ main() {\n        ModelAndView mov = new ModelAndView();\n        mov.setViewName(\"\
    main\");\n        return mov;\n    }\n}\n```\n\nThe view is rendered via Tiles.\
    \ If you open `tiles-configuration.xml` located in `/WEB-INF/tiles/tiles-configuration.xml`,\
    \ you will see that the `main` view extends the `fullTemplate` and sets `main.jsp`\
    \ as the content pane (see [Listing 10-10](#Chapter10.html#list_10_10)).\n\n**Listing\
    \ 10-10.** The Tiles Configuration\n\n```\n<definition name=\"main\" extends=\"\
    fullTemplate\">\n    <put-attribute name=\"content\" value=\"/WEB-INF/view/main.jsp\"\
    />\n</definition>\n```\n\nTo access the application and show this home page, you\
    \ simply have to point your browser to [`http://localhost:8080/chapter10-bookstore/`](http://localhost:8080/chapter10-bookstore/).\
    \ Thanks to the `index.jsp`, which is automatically picked up as the web application's\
    \ welcome file, the Welcome screen is shown. This `index.jsp` will internally\
    \ be forwarded to the `index.htm` request mapping on which the `MainController`\
    \ is listening and trigger the view-rendering process. Note that a welcome file\
    \ must be a physical file. It cannot be the name of a fictional view (such as\
    \ our `index.htm`) that is resolved by Spring MVC. To make this happen, we have\
    \ an `index.jsp` file right under the `webapp` folder, as you can see in [Listing\
    \ 10-11](#Chapter10.html#list_10_11). This folder is directly accessible by your\
    \ browser. Tomcat (or tc Server) will be default place to look for the `index.jsp`\
    \ welcome file. Remember that `index.jsp` is outside our `WEB-INF` directory (in\
    \ the STS Java view, it is under the `/webapp` directory), so it will be directly\
    \ accessible by external clients. This is unlike the JSPs of our other views,\
    \ which are placed under `WEB-INF/view` and are not directly accessible by external\
    \ clients.\n\n**Listing 10-11.** The index.jsp Forwarded to the Internal Tiles-Composed\
    \ Main View\n\n```\n<!DOCTYPE HTML>\n\n<%@ page pageEncoding=\"UTF-8\" contentType=\"\
    text/html; charset=UTF-8\"%>\n\n<jsp:forward page=\"/index.htm\" />\n```\n\n![Image](images/square.jpg)\
    \ **Note** You can check the welcome file defaults by first going to your workspace\
    \ server home directory. The home directory can be found by double clicking the\
    \ \"Servers\" project (while being in the Java or Java EE perspective) and then\
    \ by double clicking on the server instance (which is named \"VMware vFabric tc\
    \ Server Developer Edition v2.6-config\" by default). In there you can open the\
    \ `web.xml`. The entries in this file are the defaults for each web application\
    \ that will be deployed on this server instance. At the end of the file, you will\
    \ find the `welcome-file-list`, which lists all the files (and their extensions)\
    \ that are recognized as welcome files by default.\n\n### Implementing the Create\
    \ Order Flow\n\n*To implement our flow according to the required use case, we\
    \ will need three major elements:*\n\n*   An `<on-start>` element to initialize\
    \ our model and selectable categories\n*   Three view states, one for each page\n\
    \    *   Transitions in each view state to navigate back/cancel/forward\n    *\
    \   Some evaluation actions\n    *   To prepare our list of selectable books\n\
    \    *   To add a book to the list of selected books\n    *   To clear the list\
    \ of selected books\n    *   To create our order in the last step\n*   An end\
    \ state to terminate our flow\n\nWe decided to start building the sample page-by-page.\
    \ In the upcoming sections, we will build the three pages (in the order as displayed\
    \ in [Figure 10-5](#Chapter10.html#fig_10_5)) and the required flow components.\
    \ Let's get started by building the page that lets users select the category."
