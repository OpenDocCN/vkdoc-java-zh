    money from our account or ensure that fields are unique (e.g., usernames in our
    system).


    A popular technique to determine the domain model is to use the nouns in use case
    descriptions as domain objects (e.g., `Account` or `Transaction`). These objects
    contain both state (e.g., the `username` for the `Account`) and behavior (e.g.,
    a `credit` method on the `Account`). These methods are typically more fine-grained
    then the methods in the service layer. For example, in the money transfer sample
    in [Chapter 2](#Chapter02.html#ch2), the `com.apress.prospringmvc.moneytransfer.domain.Account`
    object has a `debit` and `credit` method. The `credit` method contains some business
    logic for checking whether we have sufficient money in our account to transfer
    the money.


    ____________


    ² [`http://docs.oracle.com/javase/6/docs/technotes/guides/reflection/proxy.html`](http://docs.oracle.com/javase/6/docs/technotes/guides/reflection/proxy.html)


    In [Chapter 2](#Chapter02.html#ch2), the implementations of the `com.apress.prospringmvc.moneytransfer.service.MoneyTransferService`
    used these supporting methods to implement a use case (in the sample, it transferred
    money from one account to another account). This is not to be confused with an
    anemic domain model^([3](#Chapter03.html#CHP-3-FN-3)), in which our domain objects
    only hold state and have no behavior.


    In general, your domain model will not need dependencies injected; however, it
    is still possible to do this. For example, it’s possible to use the Spring Framework
    and AspectJ to enable dependency injection in our domain objects. In that circumstance,
    we would give our domain classes the `org.springframework.beans.factory.annotation.Configurable`
    annotation. Next, we would need to set up load-time weaving or compile-time weaving,
    and we would have our dependencies injected. For more detailed information on
    the subject, please see the Spring Reference Guide^([4](#Chapter03.html#CHP-3-FN-4)).


    ![Image](images/square.jpg) **Note** This is the setup used in Spring ROO^([5](#Chapter03.html#CHP-3-FN-5)).
    It uses a *rich domain model*, as advocated by Eric Evans^([6](#Chapter03.html#CHP-3-FN-6)).


    #### The User Interface Layer


    The user interface layer presents the application to the user. This layer renders
    the response generated by the server into the type requested by the user’s client.
    For instance, a web browser will probably request an HTML document, a web service
    may want an XML document, and another client could request a PDF or Excel document.


    We separated the presentation layer into a user interface and web layer because,
    notwithstanding the wide range of different view technologies, we wanted to reuse
    as much code as possible. Our goal is to reimplement only the user interface.
    There are many different view technologies out there, including JSP(X), JSF, Velocity,
    and Freemarker, to name a few. In an ideal world, we would be able to switch our
    user interface without changing the backend of our application.


    Spring MVC helps us in isolating the user interface from the rest of the system.
    In Spring, the view is represented by an interface: `org.springframework.web.servlet.View`.
    This interface is responsible for transforming the result of the action from the
    user (the model) into the type of response the user requested. The `View` interface
    is generic, and it has no dependencies on a particular view technology. For each
    supported view technology, there is an implementation provided either by the Spring
    Framework itself or by the view technologies themselves. Out of the box, Spring
    supports the following view technologies:


    *   JSP

    *   PDF

    *   Excel


    ____________


    ³ [`http://martinfowler.com/bliki/AnemicDomainModel.html`](http://martinfowler.com/bliki/AnemicDomainModel.html)


    ⁴ [`http://static.springsource.org/spring/docs/3.1.x/spring-frameworkreference/html/aop.html#aop-atconfigurable`](http://static.springsource.org/spring/docs/3.1.x/spring-frameworkreference/html/aop.html#aop-atconfigurable)


    ⁵ [`http://www.springsource.org/spring-roo`](http://www.springsource.org/spring-roo)


    ⁶ [`http://domaindrivendesign.org/`](http://domaindrivendesign.org/)


    *   Freemarker

    *   Velocity

    *   JasperReports

    *   Tiles 2

    *   XML (marshaling, XSLT or plain)

    *   JSON


    The user interface in general has a dependency on the domain layer. Sometimes,
    it is convenient to directly expose and render the domain model. This can be especially
    useful when we start to use forms in our application. For example, this would
    let us work directly with the domain objects instead of an additional layer of
    indirection. Some argue that this creates an unnecessary or unwanted coupling
    between layers. However, the creation of another layer for the sole purpose of
    decoupling the domain from the view leads to unnecessary complexity and duplication.
    In any case, it is important to keep in mind that Spring MVC doesn’t requires
    us to directly expose the domain model to the view—whether we do so is entirely
    up to us.'
  trans: '

    ### 关注点分离


    正如我们在第 2 章中提到的，清晰的关注点分离非常重要。观察图 3-4 中的架构，可以看到关注点分离体现在各个层级中。将关注点分离到不同层级有助于我们实现清晰的设计，以及灵活且可测试的应用程序。


    创建或识别层级可能比较困难。一个经验法则是：如果一个层级与其他层级有过多依赖关系，我们可能需要引入一个包含所有这些依赖关系的新层级。另一方面，如果我们在不同层级中看到同一个层级，我们可能需要重新考虑这个层级，并将其作为应用程序的一个切面。在这种情况下，我们可以使用
    Spring 框架的 AOP 功能在运行时应用这些切面（参见第 2 章）。


    层级之间的耦合——例如，服务层需要与数据访问层通信——是通过定义清晰的接口来实现的。定义接口并面向接口编程可以减少对具体实现的实际耦合。这种降低的耦合度和复杂度使得应用程序更易于测试和维护。使用接口的另一个好处是，Spring
    可以使用 JDK 动态代理^(2)来创建代理并应用 AOP。


    ![图片](img/square.jpg) **注意** Spring 也可以对基于类的代理应用 AOP；但这需要在类路径中包含`cglib`库（[`http://cglib.sourceforge.net`](http://cglib.sourceforge.net)）。


    关键在于：应用程序中的分层有助于实现更易于维护和测试的应用程序。清晰的关注点分离也能带来良好的应用程序架构。


    ### Spring MVC 应用程序层级


    您可能想知道所有层级如何融入 Spring MVC 应用程序，以及这些不同的层级如何帮助我们构建 Spring MVC 应用程序。在本节中，我们将探讨图 3-4
    中描绘的五个层级。我们将特别关注不同层级所扮演的角色以及每个层级应包含的内容。


    #### 领域层


    领域是应用程序中最重要的层级。它是我们正在解决的业务问题的代码表示，并包含我们领域的业务规则。这些规则可能会检查我们是否有足够的资金从账户中转账，或者确保字段是唯一的（例如，我们系统中的用户名）。


    一种流行的确定领域模型的技术是使用用例描述中的名词作为领域对象（例如，`Account`或`Transaction`）。这些对象既包含状态（例如，`Account`的`username`），也包含行为（例如，`Account`上的`credit`方法）。这些方法通常比服务层中的方法粒度更细。例如，在第
    2 章的转账示例中，`com.apress.prospringmvc.moneytransfer.domain.Account`对象具有`debit`和`credit`方法。`credit`方法包含一些业务逻辑，用于检查我们账户中是否有足够的资金来转账。


    ____________


    ² [`http://docs.oracle.com/javase/6/docs/technotes/guides/reflection/proxy.html`](http://docs.oracle.com/javase/6/docs/technotes/guides/reflection/proxy.html)


    在第 2 章中，`com.apress.prospringmvc.moneytransfer.service.MoneyTransferService`的实现使用了这些辅助方法来实现一个用例（在示例中，它将资金从一个账户转移到另一个账户）。这不应与贫血领域模型^(3)混淆，在贫血领域模型中，我们的领域对象只持有状态而没有行为。


    通常，您的领域模型不需要注入依赖；但这样做仍然是可能的。例如，可以使用 Spring 框架和 AspectJ 在我们的领域对象中启用依赖注入。在这种情况下，我们需要为领域类添加`org.springframework.beans.factory.annotation.Configurable`注解。接下来，我们需要设置加载时织入或编译时织入，然后依赖就会被注入。有关此主题的更多详细信息，请参阅
    Spring 参考指南^(4)。


    ![图片](img/square.jpg) **注意** 这是 Spring ROO^(5)中使用的设置。它采用了 Eric Evans^(6)所倡导的*富领域模型*。


    #### 用户界面层


    用户界面层向用户呈现应用程序。该层将服务器生成的响应转换为用户客户端请求的类型。例如，Web 浏览器可能会请求 HTML 文档，Web 服务可能需要 XML
    文档，而其他客户端可能请求 PDF 或 Excel 文档。


    我们将表示层分为用户界面层和 Web 层，因为尽管存在多种不同的视图技术，但我们希望尽可能多地重用代码。我们的目标是只重新实现用户界面。目前有许多不同的视图技术，包括
    JSP(X)、JSF、Velocity 和 Freemarker 等。在理想情况下，我们应该能够在不更改应用程序后端的情况下切换用户界面。


    Spring MVC 帮助我们实现用户界面与系统其他部分的隔离。在 Spring 中，视图由一个接口表示：`org.springframework.web.servlet.View`。该接口负责将用户操作的结果（模型）转换为用户请求的响应类型。`View`接口是通用的，不依赖于特定的视图技术。对于每种支持的视图技术，Spring
    框架本身或视图技术本身都会提供相应的实现。开箱即用，Spring 支持以下视图技术：


    *   JSP

    *   PDF

    *   Excel


    ____________


    ³ [`http://martinfowler.com/bliki/AnemicDomainModel.html`](http://martinfowler.com/bliki/AnemicDomainModel.html)


    ⁴ [`http://static.springsource.org/spring/docs/3.1.x/spring-frameworkreference/html/aop.html#aop-atconfigurable`](http://static.springsource.org/spring/docs/3.1.x/spring-frameworkreference/html/aop.html#aop-atconfigurable)


    ⁵ [`http://www.springsource.org/spring-roo`](http://www.springsource.org/spring-roo)


    ⁶ [`http://domaindrivendesign.org/`](http://domaindrivendesign.org/)


    *   Freemarker

    *   Velocity

    *   JasperReports

    *   Tiles 2

    *   XML（编组、XSLT 或纯文本）

    *   JSON


    用户界面通常依赖于领域层。有时，直接暴露和渲染领域模型会很方便。当我们开始在应用程序中使用表单时，这一点尤其有用。例如，这让我们可以直接处理领域对象，而不是增加一个额外的间接层。有些人认为这会在层之间造成不必要或不希望的耦合。然而，仅仅为了将领域与视图解耦而创建另一个层会导致不必要的复杂性和重复。无论如何，重要的是要记住，Spring
    MVC 并不要求我们直接将领域模型暴露给视图——是否这样做完全取决于我们自己。

    '
- fmt: '#### The Web Layer


    The web layer has two responsibilities. The first responsibility is to guide the
    user through the web application. The second is to be the integration layer between
    the service layer and HTTP.


    Navigating the user through the website can be as simple as mapping a URL to views
    or a full-blown page flow solution like Spring Web Flow. The navigation is typically
    bound to the web layer only, and there isn’t any navigation logic in the domain
    or service layer.


    As an integration layer, the web layer should be as thin as possible. It should
    be the layer that converts the incoming HTTP request to something that can be
    handled by the service layer, and then transforms the result (if any) from the
    server into a response for the user interface. The web layer should not contain
    any business logic—that is the sole purpose of the service layer.


    The web layer also consists of cookies, HTTP headers, and possibly an HTTP session.
    It is the responsibility of the web layer to manage all these things consistently
    and transparently. The different HTTP elements should never creep into our service
    layer. If they do, the whole service layer (and thus our application) becomes
    tied to the web environment. Doing this makes it harder to maintain and test the
    application. Keeping the service layer clean also allows us to reuse the same
    services for different channels. For example, it enables us to add a web service
    or JMS-driven solution. The web layer should be thought of as a client or proxy
    that connects to the service layer and exposes it to the end users.


    In the early days of Java web development, servlets or Java Server Pages mainly
    implemented this layer. The servlets had the responsibility of processing and
    transforming the request into something the service layer could understand. More
    often than not, the servlets wrote the desired HTML directly back to the client.
    This kind of implementation quickly became hard to maintain and test. After a
    couple of years, the Model 2 MVC pattern emerged, and we finally had advanced
    MVC capabilities for the Web.


    Frameworks like Spring MVC, Struts, JSF, and Tapestry provide different implementations
    for this pattern, and they all work quite differently. However, we can identify
    two main types of web layer implementations: request/response frameworks (e.g.,
    struts and Spring MVC) and component-based frameworks (e.g., JSF and Tapestry).
    The request/response frameworks operate on `javax.servlet.ServletRequest` and
    `javax.servlet.ServletResponse` objects. Thus, the fact that they operate on the
    Servlet API isn’t really hidden from the user. The component-based frameworks
    offer a completely different programming model. They try to hide the Servlet API
    from the programmer and offer a component-based programming model. Using a component-based
    framework feels a lot like working with a Swing desktop application.


    Both approaches have their advantages and disadvantages. Spring MVC is quite powerful,
    and it strikes a good balance between the two. It can hide the fact that one works
    with the Servlet API; however, when needed, it is quite easy to access that API
    (among other things).


    The web layer depends on the domain layer and service layer. In most cases, you
    want to transform the incoming request into a domain object and call a method
    on the service layer to do something with that domain object (e.g., update a customer
    or create an order). Spring MVC makes it easy to map incoming requests to objects,
    and we can use dependency injection to access the service layer.


    In Spring MVC, the web layer is represented by the `org.springframework.web.servlet.mvc.Controller`
    interface or classes with the `org.springframework.stereotype.Controller` annotation.
    The interface-based approach is historic, and it has been part of the Spring Framework
    since its inception; however, it is now considered dated. Regardless, it remains
    useful for simple use cases, and Spring provides some convenient implementations
    out of the box. The new annotation-based approach is more powerful and flexible
    than the original interface-based approach. The main focus in this book is on
    the annotation-based approach.


    After the execution of a controller, the infrastructure (see Chapter 4 for more
    information on this topic) expects that there is an instance of the `org.springframework.web.servlet.ModelAndView`
    class. This class incorporates the model (in the form of `org.springframework.ui.ModelMap`)
    and the view to render. This view can be an actual `org.springframework.web.servlet.View`
    implementation or the name of a view.


    ![Image](images/square.jpg) **Caution** Don’t use the `Controller` annotation
    on a class with the `Controller` interface. These are handled differently, and
    mixing both strategies can lead to surprising and unwanted results!'
