  raw: '##### Using web.xml


    The `web.xml` file has been around since the inception of the servlet specification.
    It is an XML file that contains all the configuration you need to bootstrap the
    servlet, listeners, and/or filters. [Listing 4-1](#Chapter04.html#list_4_1) shows
    the minimal `web.xml` required to bootstrap the `DispatcherServlet`. The `web.xml`
    file must be in the `WEB-INF` directory of the web application (this is dictated
    by the servlet specification).


    ***Listing 4-1.** The web.xml configuration (Servlet 3.0)*


    `<web-app version="3.0"`


    `        xsi:schemaLocation=http://java.sun.com/xml/ns/javaee`

    `                           http://java.sun.com/xml/ns/javaee/web-app_3_0.xsd`

    `        metadata-complete="true">`


    `    <servlet>`

    `        <servlet-name>bookstore</servlet-name>`

    `        <servlet-class>`

    `            org.springframework.web.servlet.DispatcherServlet`

    `        </servlet-class>`

    `        <load-on-startup>1</load-on-startup>`

    `    </servlet>`


    `    <servlet-mapping>`

    `        <servlet-name>bookstore</servlet-name>`

    `        <url-pattern>/*</url-pattern>`

    `    </servlet-mapping>`

    `</web-app>`


    ![Image](images/square.jpg) **Note** By default, the dispatcher servlet loads
    a file named `[servletname]-servlet.xml` from the `WEB-INF` directory.


    The `metadata-complete` attribute in the `web-app` element instructs the servlet
    container to not scan the classpath for `javax.servlet.ServletContainerInitializer`
    implementations; neither will it scan for `web-fragment.xml` files. Adding this
    attribute to your `web.xml` can increase startup times considerably because it
    will scan the classpath, which can take quite some time in a large application.


    ##### Using web-fragment.xml


    The `web-fragment.xml` feature has been available since the 3.0 version of the
    servlet specification, and it allows for a more modularized configuration of the
    web application. The `web-fragment.xml` has to be in the META-INF directory of
    a jar file. It isn’t detected in the META-INF of the web application; it has to
    be in a jar file. The `web-fragment.xml` can contain the same elements as the
    `web.xml` (see [Listing 4-2](#Chapter04.html#list_4_2)).


    The benefit of this approach is that each module, packaged as a jar files can
    contribute to the configuration of the web application. This can also be considered
    a drawback because now you have scattered your configuration over your code base,
    which could be troublesome in larger projects.


    ***Listing 4-2.** The web-fragment.xml configuration (Servlet 3.0)*


    `<web-fragment version="3.0"`


    `  xsi:schemaLocation="http://java.sun.com/xml/ns/javaee`

    `                      http://java.sun.com/xml/ns/javaee/web-fragment_3_0.xsd">`


    `    <servlet>`

    `        <servlet-name>bookstore</servlet-name>`

    `        <servlet-class>`

    `            org.springframework.web.servlet.DispatcherServlet`

    `        </servlet-class>`

    `        <load-on-startup>1</load-on-startup>`

    `    </servlet>`


    `    <servlet-mapping>`

    `        <servlet-name>bookstore</servlet-name>`

    `        <url-pattern>/*</url-pattern>`

    `    </servlet-mapping>`

    `</web-fragment>`


    ##### Using ServletContainerInitializer


    Another feature introduced in the 3.0 version of the servlet specification is
    the option to use a Java-based approach to configuring your web environment (see
    [Listing 4-3](#Chapter04.html#list_4_3)). A Servlet 3.0-compatible container will
    scan the classpath for classes that implement the `javax.servlet.ServletContainerInitializer`
    interface, and it will invoke the `onStartup` method on those classes. By adding
    a `javax.servlet .annotation.HandlesTypes` annotation on these classes, you can
    also be handed classes that you need to further configure your web application
    (this is the mechanism that allows the fourth option to use an `org.springframework.web.WebApplicationInitializer)`.


    Like `web.fragments`, a `ServletContainerInitializer` allows for a modularized
    configuration of your web application, but now in a Java-based way. Using Java
    gives you all the added benefits of using the Java language instead of XML. At
    this point, you have strong typing, can influence the construction of your servlet,
    and have an easier way of configuring your servlets (in an XML file, this is done
    by adding `init-param` and/or `context-param` elements in the XML file).


    ***Listing 4-3.** A Java-based configuration*


    `package com.apress.prospringmvc.bookstore.web;`


    `import java.util.Set;`


    `// javax.servlet imports omitted.`


    `import org.springframework.web.servlet.DispatcherServlet;`


    `public class BookstoreServletContainerInitializer`

    `implements ServletContainerInitializer {`


    `  @Override`

    `  public void onStartup(Set<Class<?>> classes, ServletContext servletContext)`

    `  throws ServletException {`

    `      ServletRegistration.Dynamic registration;`

    `      registration = servletContext.addServlet("dispatcher", DispatcherServlet.class);`

    `      registration.setLoadOnStartup(1);`

    `      registration.addMapping("/*");`

    `  }`

    `}`


    ##### Using WebApplicationInitializer


    Now it’s time to look at Option 4 for configuring your application while using
    Spring. Spring already provides a `ServletContainerInitializer` implementation,
    the `org.springframework.web .SpringServletContainerInitializer` that makes life
    a little easier (see [Listing 4-4](#Chapter04.html#list_4_4)). The implementation
    provided by the Spring Framework will detect and instantiate all instances of
    `org.springframework.web .WebApplicationInitializer` and call the `onStartup`
    method of those instances.


    ***Listing 4-4.** The WebApplicationInitializer configuration*


    `package com.apress.prospringmvc.bookstore.web;`


    `// javax.servlet imports omitted`


    `import org.springframework.web.WebApplicationInitializer;`

    `import org.springframework.web.servlet.DispatcherServlet;`


    `public class BookstoreWebApplicationInitializer implements WebApplicationInitializer
    {`


    `  @Override`

    `  public void onStartup(ServletContext servletContext) throws ServletException
    {`

    `      ServletRegistration.Dynamic  registration`

    `      registration = servletContext.addServlet("dispatcher",`![Image](images/U002.jpg)

    ` DispatcherServlet.class);`

    `      registration.addMapping("/*");`

    `      registration.setLoadOnStartup(1);`

    `  }`

    `}`


    ![Image](images/square.jpg) **Caution** Using this feature can severely impact
    the startup time of your application! First, the servlet container needs to scan
    the classpath for all `javax.servlet.ServletContainerInitializer` implementations.
    Second, the classpath is scanned for `org.springframework.web.WebApplicationInitializer`
    implementations. This scanning can take some time in large applications.


    #### Configuring the DispatcherServlet


    Configuring the `org.springframework.web.servlet.DispatcherServlet` is a two step
    process. The first step is to configure the behavior of the servlet by setting
    properties directly on the dispatcher servlet (the declaration).The second step
    is to configure the components in the application context (initialization).


    The dispatcher servlet comes with a lot of default settings for components. This
    saves you from doing a lot of configuration for basic behavior, and you can override
    and extend the configuration however you want. In addition to the default configuration
    for the dispatcher servlet, there is also a default for Spring @MVC, which can
    be enabled by using the `org.springframework.web.servlet.config .annotation.EnableWebMvc`
    annotation (see the “Enabling Features” section in [Chapter 2](#Chapter02.html#ch2)).


    ##### Dispatcher Servlet Properties


    The dispatcher servlet has a number of properties that can be set. All these properties
    have a `setter` method, and all can be either set programmatically or set when
    using XML configuration by including a servlet initialization parameter. [Table
    4-2](#Chapter04.html#tab_4_2) lists and describes the properties available on
    the dispatcher servlet.


    ![Image](images/tab_4_2.jpg)


    ![Image](images/tab_4_2a.jpg)


    ![Image](images/tab_4_2b.jpg)'
