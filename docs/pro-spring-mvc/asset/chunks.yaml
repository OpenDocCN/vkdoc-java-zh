    `on-render` 动作正好可以实现这一点。`on-render` 中指定的每个动作都会在视图状态渲染之前立即执行。请记住：当 Web Flow 使用
    PRG 模式时，视图状态会在第二个请求时渲染。第一个请求执行我们的控制器并选择要渲染的视图。当第二个请求（GET 请求）到来时，我们的 `on-render`
    动作就会执行。然后我们加载类别，并将它们放入 `request` 作用域（参见第 11 章的“请求作用域”部分中的图 11-1）。接下来要渲染的视图将能够访问这些类别并渲染它们（参见清单
