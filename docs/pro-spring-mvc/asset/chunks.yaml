- fmt: "### Running the Front-End Tests via Gradle\n\nBesides the normal unit and\
    \ integration tests, we also want to run the front-end tests via our build tool.\
    \ When we run the normal build using Gradle (with the command `gradle build`),\
    \ the front-end tests are not run. We created a separate task called `systemTest`\
    \ which can be run separately just to run the front-end tests. The `systemTest`\
    \ command makes use of the Cargo plug-in to deploy the application to Tomcat.\
    \ It will then run the tests that end in `FrontendTest`. The `systemTest` task\
    \ looks as follows in our root `build.gradle`:\n\n```\ntask systemTest(type: Test)\
    \ {\n    include '**/*FrontendTest.*'\n    dependsOn(war)\n    doFirst {\n   \
    \     cargoStartLocal.execute()\n    }\n}\n```\n\nThe `systemTest` tasks include\
    \ every class that ends in `FrontendTest`. It also depends on the `war` task,\
    \ which means that Gradle will first build a war of the project. Finally the task\
    \ `cargoStartLocal` is executed, which is available because we enabled the Cargo\
    \ plug-in. This task will start Tomcat and deploy the war file, which was previously\
    \ generated by the `war` task.\n\nIn order to exclude these `FrontendTest`s from\
    \ the normal Gradle test lifecycle, we extended the `test` task to specifically\
    \ exclude these files:\n\n```\ntest {\n    exclude '**/*FrontendTest.*'\n}\n```\n\
    \nRunning `FrontendTest`s is as easy as opening a command-line interface, navigating\
    \ to the [Chapter 9](#Chapter09.html#ch9) sample directory, and typing:\n\n`gradle\
    \ systemTest`\n\nIn order for the system tests to work, Firefox should be installed\
    \ on your system. The tests will take some time as the application needs to get\
    \ deployed on Tomcat. During the tests you will also see Firefox opening and closing,\
    \ as this is the Selenium test at work. At the end you should get a “Build successful”\
    \ confirmation and if you to go the `build/reports/test` directory in [Chapter\
    \ 9](#Chapter09.html#ch9) and open `index.html`, you can see the report (see [Figure\
    \ 9-18](#Chapter09.html#fig_9_18)) that both tests have been run.\n\n![Image](images/9781430241553_Fig09-18.jpg)\n\
    \n**Figure 9-18.** The test result report\n\n![Image](images/square.jpg) **Note**\
    \ There are problems reported with the current version of Selenium not being compatible\
    \ with the latest version of Firefox (which is version 12 at the time of writing).\
    \ The code was, however, developed and tested when Firefox was still at version\
    \ 11. If you experience problems running the system tests, use Firefox 11 or check\
    \ the Selenium website for newer versions that fix this issue (which are expected\
    \ to become available anytime soon).\n\n### Summary\n\nIn this chapter we have\
    \ seen that it is important to really think about how to handle testing in your\
    \ project. It is clear that a project deserves adequate testing to be able to\
    \ grow and to be maintainable. Your test should be considered as important as\
    \ the actual production code. We have introduced some guidelines; making sure\
    \ that you test at the right level, and how you can assure that testing remains\
    \ attractive in your project, as that is one of the key elements to ensure that\
    \ tests are actually written adequately.\n\nWe also explained the different levels\
    \ of testing. We started with a basic unit test and continued by introducing Spring’s\
    \ test support, which we used to write an integration test, testing our repositories\
    \ using an in-memory database. On the MVC side we showed how you can test an application\
    \ controller using Spring’s test support and the brand-new Spring MVC test. With\
    \ these two tools at hand you are now capable of increasing your overall code\
    \ coverage even further.\n\nWe wrapped up with a full-fledged front-end test,\
    \ testing our view but also indirectly testing all the logic behind it. We showed\
    \ you that it is possible to create a system test using a real browser with Selenium,\
    \ but that you can also configure it to use an in-memory browser instead (HtmlUnit),\
    \ making it an integration test.\n\nWe hope that the philosophy and techniques\
    \ introduced here will help you write more and better tests. The only thing left\
    \ to do is go out there and put these testing strategies into practice!\n\n##\
    \ C H A P T E R  10\n\n## Spring Web Flow\n\nSpring Web Flow 2 (which we will\
    \ call Web Flow from now on) is an important piece of the puzzle when it comes\
    \ down to building scalable, easy-to-develop-and-maintain web applications. In\
    \ the upcoming three chapters, we will make you familiar with Web Flow and its\
    \ strengths and weaknesses; we will also cover why, when, and, above all, how\
    \ you should use it. In this chapter, we start off explaining what Web Flow is\
    \ and what it can do for you. Later on, we will discuss some basic Web Flow elements\
    \ that you need to understand before you can start building your first flow.\n\
    \nThe common thread throughout the Web Flow chapters is the sample application,\
    \ which we create as we go through these chapters. We will start in this chapter\
    \ by illustrating how you can turn a plain MVC sample with a bit of configuration\
    \ into a Web Flow-enabled application. Next, we will gradually enhance the bookstore\
    \ sample application with Web Flow functionality, explaining each feature in detail\
    \ along the way. We took special care to ensure that you don't need the sample\
    \ application at hand when reading these chapters. All relevant code will be shown\
    \ and explained accordingly.\n\nIn this chapter, we will limit ourselves to creating\
    \ a single flow: the create (book) order flow. [Chapters 11](#Chapter11.html#ch11)\
    \ and [12](#Chapter12.html#ch12) will go more into detail about the application.\
    \ In [Chapter 11](#Chapter11.html#ch11), we will expand the functionality of the\
    \ sample application, and we will cover some more detailed configuration options.\
    \ In [Chapter 12](#Chapter12.html#ch12), we will make you familiar with some more\
    \ advanced aspects such as using AJAX, flow-managed persistence, and so forth.\n\
    \nIf you already have some Web Flow experience, you might want to skim this chapter\
    \ quickly and advance to the next chapter. If you are new to Web Flow, or want\
    \ a refresher, then this is the right place to start!\n\n### Why Web Flow\n\n\
    In the Web Flow chapters, we will start by discussing the Web Flow 2.x family.\
    \ We will always refer to version 1 of the tool as *Web Flow 1*. Otherwise, all\
    \ features discussed relate to Web Flow 2.x (version 2.3.1 at the time of writing).\n\
    \nYou may wonder why you should bother reading about Web Flow. You might especially\
    \ be wondering why you should bother learning Yet Another Framework. Because let's\
    \ be honest: the Java landscape is wide, and there is tremendous amount of choice\
    \ available in web frameworks (you have clearly opted for Spring MVC—good!). However,\
    \ within those frameworks, there are still extras that you can add to make your\
    \ life easier.\n\nEasier, we say? Well, yes. We really mean this. By the end of\
    \ these three chapters, we will have convinced you that using Web Flow can make\
    \ management of your web applications easier. Let's start with some theory first,\
    \ so we can illustrate what Web Flow can do for you. Hopefully, this will get\
    \ you interested enough to read through all three of the Web Flow chapters!"
  raw: '### Running the Front-End Tests via Gradle


    Besides the normal unit and integration tests, we also want to run the front-end
    tests via our build tool. When we run the normal build using Gradle (with the
    command `gradle build`), the front-end tests are not run. We created a separate
    task called `systemTest` which can be run separately just to run the front-end
    tests. The `systemTest` command makes use of the Cargo plug-in to deploy the application
    to Tomcat. It will then run the tests that end in `FrontendTest`. The `systemTest`
    task looks as follows in our root `build.gradle`:


    `task systemTest(type: Test) {`

    `    include ''**/*FrontendTest.*`

    `    dependsOn(war)`

    `    doFirst {`

    `        cargoStartLocal.execute()`

    `    }`

    `}`


    The `systemTest` tasks include every class that ends in `FrontendTest`. It also
    depends on the `war` task, which means that Gradle will first build a war of the
    project. Finally the task `cargoStartLocal` is executed, which is available because
    we enabled the Cargo plug-in. This task will start Tomcat and deploy the war file,
    which was previously generated by the `war` task.


    In order to exclude these `FrontendTest`s from the normal Gradle test lifecycle,
    we extended the `test` task to specifically exclude these files:


    `test {`

    `    exclude ''**/*FrontendTest.*''`

    `}`


    Running `FrontendTest`s is as easy as opening a command-line interface, navigating
    to the [Chapter 9](#Chapter09.html#ch9) sample directory, and typing:


    _________


    ^(22) [`http://seleniumhq.org/docs/02_selenium_ide.html`](http://seleniumhq.org/docs/02_selenium_ide.html)


    `gradle systemTest`


    In order for the system tests to work, Firefox should be installed on your system.
    The tests will take some time as the application needs to get deployed on Tomcat.
    During the tests you will also see Firefox opening and closing, as this is the
    Selenium test at work. At the end you should get a “Build successful” confirmation
    and if you to go the `build/reports/test` directory in [Chapter 9](#Chapter09.html#ch9)
    and open `index.html`, you can see the report (see [Figure 9-18](#Chapter09.html#fig_9_18))
    that both tests have been run.


    ![Image](images/9781430241553_Fig09-18.jpg)


    ***Figure 9-18.** The test result report*


    ![Image](images/square.jpg) **Note** There are problems reported with the current
    version of Selenium not being compatible with the latest version of Firefox (which
    is version 12 at the time of writing). The code was, however, developed and tested
    when Firefox was still at version 11\. If you experience problems running the
    system tests, use Firefox 11 or check the Selenium website for newer versions
    that fix this issue (which are expected to become available anytime soon).


    ### Summary


    In this chapter we have seen that it is important to really think about how to
    handle testing in your project. It is clear that a project deserves adequate testing
    to be able to grow and to be maintainable. Your test should be considered as important
    as the actual production code. We have introduced some guidelines; making sure
    that you test at the right level, and how you can assure that testing remains
    attractive in your project, as that is one of the key elements to ensure that
    tests are actually written adequately.


    We also explained the different levels of testing. We started with a basic unit
    test and continued by introducing Spring’s test support, which we used to write
    an integration test, testing our repositories using an in-memory database. On
    the MVC side we showed how you can test an application controller using Spring’s
    test support and the brand-new Spring MVC test. With these two tools at hand you
    are now capable of increasing your overall code coverage even further.


    We wrapped up with a full-fledged front-end test, testing our view but also indirectly
    testing all the logic behind it. We showed you that it is possible to create a
    system test using a real browser with Selenium, but that you can also configure
    it to use an in-memory browser instead (HtmlUnit), making it an integration test.


    We hope that the philosophy and techniques introduced here will help you write
    more and better tests. The only thing left to do is go out there and put these
    testing strategies into practice!


    ## C H A P T E R  10


    ## Spring Web Flow


    Spring Web Flow 2 (which we will call Web Flow from now on) is an important piece
    of the puzzle when it comes down to building scalable, easy-to-develop-and-maintain
    web applications. In the upcoming three chapters, we will make you familiar with
    Web Flow and its strengths and weaknesses; we will also cover why, when, and,
    above all, how you should use it. In this chapter, we start off explaining what
    Web Flow is and what it can do for you. Later on, we will discuss some basic Web
    Flow elements that you need to understand before you can start building your first
    flow.


    The common thread throughout the Web Flow chapters is the sample application,
    which we create as we go through these chapters. We will start in this chapter
    by illustrating how you can turn a plain MVC sample with a bit of configuration
    into a Web Flow-enabled application. Next, we will gradually enhance the bookstore
    sample application with Web Flow functionality, explaining each feature in detail
    along the way. We took special care to ensure that you don''t need the sample
    application at hand when reading these chapters. All relevant code will be shown
    and explained accordingly.


    In this chapter, we will limit ourselves to creating a single flow: the create
    (book) order flow. [Chapters 11](#Chapter11.html#ch11) and [12](#Chapter12.html#ch12)
    will go more into detail about the application. In [Chapter 11](#Chapter11.html#ch11),
    we will expand the functionality of the sample application, and we will cover
    some more detailed configuration options. In [Chapter 12](#Chapter12.html#ch12),
    we will make you familiar with some more advanced aspects such as using AJAX,
    flow-managed persistence, and so forth.


    If you already have some Web Flow experience, you might want to skim this chapter
    quickly and advance to the next chapter. If you are new to Web Flow, or want a
    refresher, then this is the right place to start!


    ### Why Web Flow


    In the Web Flow chapters, we will start by discussing the Web Flow 2.x family.
    We will always refer to version 1 of the tool as *Web Flow 1*. Otherwise, all
    features discussed relate to Web Flow 2.x (version 2.3.1 at the time of writing).


    You may wonder why you should bother reading about Web Flow. You might especially
    be wondering why you should bother learning Yet Another Framework. Because let''s
    be honest: the Java landscape is wide, and there is tremendous amount of choice
    available in web frameworks (you have clearly opted for Spring MVC—good!). However,
    within those frameworks, there are still extras that you can add to make your
    life easier.


    Easier, we say? Well, yes. We really mean this. By the end of these three chapters,
    we will have convinced you that using Web Flow can make management of your web
    applications easier. Let''s start with some theory first, so we can illustrate
    what Web Flow can do for you. Hopefully, this will get you interested enough to
    read through all three of the Web Flow chapters!'
