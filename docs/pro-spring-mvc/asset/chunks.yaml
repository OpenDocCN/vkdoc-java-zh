    \        }\n    }\n\n}\n```\n\n除了视图之外，我们还需要添加一个视图解析器。在我们的示例应用程序中，我们将像 PDF 视图一样，将其添加到\
    \ `ViewConfiguration` 类中。我们将添加另一个自定义实现的实例（见 [Listing 8-24](#Chapter08.html#list_8_24)），并让\
    \ `ContentNegotiatingViewResolver` 决定如何处理。\n\n**Listing 8-24.** `ViewConfiguration`\
