    Both the `AnnotationMethodHandlerExceptionResolver` and `ExceptionHandlerExceptionResolver`
    will look in the current controller for methods annotated with `org.springframework.web.bind.annotations.ExceptionHandler`.
    This is also a drawback because this pair of exception resolvers only operates
    on methods in the currently assigned controller. If you use this technique, it
    isn’t possible to define an exception handler for the whole application.


    Exception-handling methods are very much like controller methods (as explained
    in [Chapter 5](#Chapter05.html#ch5)); they can use the same method parameters
    and the same return values. An exception-handling method uses the same underlying
    infrastructure to detect the return types and method-argument types. However,
    there is one addition to these methods that we can also pass in the thrown exception;
    namely, we can specify an argument of type `Exception` (or a subclass).


    The method in [Listing 6-21](#Chapter06.html#list_6_21) will handle all exceptions
    thrown in the controller it is defined in. It will cause an error code 500 to
    be sent back to the client, along with the given reason. This is the most basic
    exception-handling method we can write. As mentioned previously, we can use multiple
    parameters in the method signature. This goes for the method arguments, as well
    as the method return types. (See [Tables 5-3](#Chapter05.html#tab_5_3) and [5-4](#Chapter05.html#tab_5_4)
    in the preceding chapter for an overview.)


    ***Listing 6-21.** A Basic Exception-handling Method Sample*


    `@ExceptionHandler()`

    `@ResponseStatus(`

    `    value=HttpStatus.INTERNAL_SERVER_ERROR,`

    `    reason="Exception while handling request.")`

    `public void handleException() {}`


    [Listing 6-22](#Chapter06.html#list_6_22) shows a more elaborate example. When
    an `org.springframework.dao.DataAccessException` occurs, it fills the model with
    as much information as possible. After that, the view named `db-error` will be
    rendered.


    ***Listing 6-22.** An Advanced Exception-handling Method Sample*


    `@ExceptionHandler`

    `public ModelAndView handleIOException(DataAccessException ex,`

    `                                      Principal principal,`

    `                                      WebRequest request) {`

    `    ModelAndView mav = new ModelAndView("db-error");`

    `    mav.addObject("username", principal.getName());`

    `    mav.addAllObjects(request.getParameterMap());`


    `    for(Iterator<String> names = request.getHeaderNames(); names.hasNext(); )
    {`

    `        String name =  names.next();`

    `        String[] value = request.getHeaderValues(name);`

    `        mav.addObject(name, value);`

    `    }`

    `    return mav;`

    `}`


    ### Extending Spring @MVC


    In previous chapters, we explained how Spring MVC works and how we can write controllers.
    However, there might come a time when the support from the framework out-of-the-box
    isn’t sufficient, and we will want to change or add to the behavior of the framework.
    In general, the Spring Framework is quite flexible due to the way it is built.
    It uses a lot of strategies and delegation, and this is also something we can
    use to extend or modify the behavior of the framework. In this section, we will
    dive into the internals of request mapping, request handling, and form rendering.
    Finally, we will cover how to extend these features.


    #### Extending RequestMappingHandlerMapping


    To map incoming requests to controller methods, Spring uses a handler mapping.
    For our use case, we have been using the `org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping,`
    and we already have mentioned a couple times that it is quite flexible. To match
    the requests based on methods with the `org.springframework.web.bind.annotation.RequestMapping`
    annotation, the handler mapping consults several `org.springframework.web.servlet.mvc.condition.RequestCondition`
    implementations (see [Figure 6-8](#Chapter06.html#fig_6_8)).


    ![Image](images/9781430241553_Fig06-09.jpg)


    ***Figure 6-9.** The RequestCondition Class Diagram*


    As the diagram illustrates, there is an implementation for each of the attributes
    (i.e., `consumes`, `headers`, `methods`, `params`, `produces`, and `value`; for
    more details, see [Table 5-2](#Chapter05.html#tab_5_2)) of the `org.springframework.web.bind.annotation.RequestMapping`
    annotation. The `RequestConditionHolder` and `RequestMappingInfo` are two implementations
    used internally by the framework.


    To create an implementation, we need two things. First, we need an implementation
    of the interface (see [Listing 6-23](#Chapter06.html#list_6_23) for the API).
    Second, we need to extend the `org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping`.
    This class contains two callback methods that act as factory methods for our custom
    request method (see [Listing 6-24](#Chapter06.html#list_6_24)). The `getCustomTypeCondition`
    method is called to create an instance to match the type-level condition, while
    the `getCustomMethodCondition` method is used for method-level conditions.


    ***Listing 6-23.** The RequestCondition API*


    `package org.springframework.web.servlet.mvc.condition;`


    `import javax.servlet.http.HttpServletRequest;`


    `import org.springframework.web.bind.annotation.RequestMapping;`


    `public interface RequestCondition<T> {`


    `    T combine(T other);`


    `    T getMatchingCondition(HttpServletRequest request);`


    `    int compareTo(T other, HttpServletRequest request);`

    `}`


    ***Listing 6-24.** The RequestMappingHandlerMapping*


    `package org.springframework.web.servlet.mvc.method.annotation;`


    `import java.lang.reflect.Method;`


    `import org.springframework.core.annotation.AnnotationUtils;`

    `import org.springframework.stereotype.Controller;`

    `import org.springframework.web.bind.annotation.RequestMapping;`

    `import org.springframework.web.servlet.mvc.condition.ConsumesRequestCondition;`

    `import org.springframework.web.servlet.mvc.condition.HeadersRequestCondition;`

    `import org.springframework.web.servlet.mvc.condition.ParamsRequestCondition;`

    `import org.springframework.web.servlet.mvc.condition.PatternsRequestCondition;`

    `import org.springframework.web.servlet.mvc.condition.ProducesRequestCondition;`

    `import org.springframework.web.servlet.mvc.condition.RequestCondition;`

    `import org.springframework.web.servlet.mvc.condition.RequestMethodsRequestCondition;`

    `import org.springframework.web.servlet.mvc.method.RequestMappingInfo;`

    `import org.springframework.web.servlet.mvc.method.RequestMappingInfoHandlerMapping;`


    `public class RequestMappingHandlerMapping`

    `extends RequestMappingInfoHandlerMapping {`


    `    // Other methods omitted.`


    `    protected RequestCondition<?> getCustomMethodCondition(Method method) {`

    `        return null;`

    `    }`


    `    protected RequestCondition<?> getCustomTypeCondition(Class<?> handlerType)
    {`

    `        return null;`

    `    }`

    `}`


    #### Extending the RequestMappingHandlerAdapter


    Like the `RequestMappingHandlerMapping`, the `RequestMappingHandlerAdapter` uses
    a couple of different strategies to do its work. To determine what to inject into
    a method argument, the adapter consults several `org.springframework.web.method.support.HandlerMethodArgumentResolver`
    implementations. For the return types, it consults the registered `org.springframework.web.method.support.HandlerMethodReturnValueHandler`
    implementations.'
