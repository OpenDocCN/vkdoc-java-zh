- fmt: "### Implementing Authentication as a Subflow\n\nOur first action is to implement\
    \ a flow that is able to capture the username and password from a page and verify\
    \ its authenticity. To do this, we need the following:\n\n- A page and form to\
    \ capture the username and password; our login page\n- An application controller\
    \ method to verify the username and password and mark our user as authenticated\n\
    - A flow which will manage the navigation and act as glue between the login page\
    \ and our application controller. We will include this flow as a subflow. This\
    \ flow must be able to:\n  - Render the login page after being started\n  - Perform\
    \ the authentication by calling the appropriate method on the application controller\n\
    \  - Indicate that authentication has succeeded. If the authentication failed,\
    \ we would remain inside the subflow, showing a message and offering the user\
    \ another chance to enter the correct credentials\n  - Indicate that we want to\
    \ go back to the previous page, in case the user decided not to place the order\
    \ at this time\n\nWe'll first start with the flow. [Listing 11-36](#Chapter11.html#list_11_36)\
    \ shows the flow definition. We call our flow the `authentication-flow.xml` and\
    \ place it in this directory: `src/main/webapp/WEB-INF/view/authentication`. We\
    \ will see in a minute how we can include this flow as a subflow.\n\n**Listing\
    \ 11-36.** The authentication-flow\n\n```\n<on-start>\n    <evaluate expression=\"\
    authenticationController.initializeForm()\"\n        result=\"flowScope.authenticationForm\"\
    \ />\n</on-start>\n<view-state id=\"authenticate\" view=\"login\" model=\"authenticationForm\"\
    >\n    <transition on=\"authenticate\" to=\"authenticationOk\" >\n        <evaluate\n\
    \                expression=\"authenticationController.authenticate(\nflowScope.authenticationForm,\
    \ externalContext,\n                messageContext)\"/>\n    </transition>\n \
    \   <transition on=\"previous\" to=\"previous\" bind=\"false\"/>\n</view-state>\n\
    <end-state id=\"previous\"/>\n<end-state id=\"authenticationOk\"/>\n```\n\nThe\
    \ subflow looks like any other flow. When it starts it will call `initializeForm`\
    \ on our `AuthenticationController` which will put a new instance of the `com.apress.prospringmvc.bookstore.web.controller.AuthenticationForm`\
    \ on flow scope. This form will be used to capture the username and password submitted\
    \ from the login page.\n\n```\npublic AuthenticationForm initializeForm() {\n\
    \    return new AuthenticationForm();\n}\n```\n\nNext it will proceed by entering\
    \ the view state, which eventually renders the login page.\n\nWhen the authentication\
    \ transition is executed, it will invoke the `authenticate` method on our `com.apress.prospringmvc.bookstore.web.controller.AuthenticationController`.\
    \ We will discuss this method later on in this section.\n\nFinally there are two\
    \ end states to let the caller of the subflow differentiate between going back\
    \ to the previous screen or continuing processing because authentication succeeded.\
    \ If authentication would fail, we remain inside the subflow, show a message that\
    \ indicates that the user provided bad credentials and should try to login again\
    \ after altering them.\n\nNext, we build our login page (`login.jsp`) in the same\
    \ folder as our flow; thus, it will be located in `src/main/webapp/WEB-INF-view/authentication/login.jsp`\
    \ (see [Listing 11-37](#Chapter11.html#list_11_37)).\n\n**Listing 11-37.** The\
    \ Authentication Page Located in `authentication/login.jsp`\n\n```\n<spring:url\
    \ value=\"/authenticate.htm\" var=\"authenticate\" />\n<form:form modelAttribute=\"\
    authenticationForm\" action=\"${flowExecutionUrl !=\n           null ? flowExecutionUrl\
    \  : 'authenticate.htm'}\" method=\"POST\">\n    <table style=\"width: 100%\"\
    >\n        <tr>\n            <td>\n                <spring:message code=\"label.page.login.username\"\
    \ />\n            </td>\n            <td><form:input  path=\"username\" disabled=\"\
    false\" />\n                <form:errors cssClass=\"error\" path=\"username\"\
    />\n            </td>\n            <td>\n                <spring:message code=\"\
    label.page.login.password\" />\n            </td>\n            <td>\n        \
    \        <form:password showPassword=\"false\" path=\"password\" />\n        \
    \        <form:errors cssClass=\"error\" path=\"password\"/>\n            </td>\n\
    \        </tr>\n        <tr>\n            <td colspan=\"4\">\n               \
    \ <form:errors cssClass=\"error\"/>\n            </td>\n        </tr>\n    </table>\n\
    \    <div align=\"right\" style=\"margin-bottom: 20px; margin-top: 10px\" >\n\
    \        <button type=\"submit\" id=\"previous\" name=\"_eventId_previous\">\n\
    \            <spring:message code=\"label.page.login.previous\"/>\n        </button>\n\
    \        <button type=\"submit\" id=\"login\" name=\"_eventId_authenticate\">\n\
    \            <spring:message code=\"label.page.login.login\"/>\n        </button>\n\
    \    </div>\n</form:form>\n```\n\nThe first thing to notice is the value of the\
    \ form's `action` attribute:\n\n```\n${flowExecutionUrl != null ? flowExecutionUrl\
    \  : 'authenticate.htm'}\n```\n\nWe refer to the authentication page from two\
    \ places in our application. The first reference occurs when clicking directly\
    \ on the `login` link in the navigation bar. When clicking the `login` link in\
    \ the navigation bar, we navigate to `chapter11-bookstore/login.htm`, which renders\
    \ the `webapp/view/authentication/login.jsp` page (as can be seen in [Listing\
    \ 11-38](#Chapter11.html#list_11_38)). In that case, we don't start a flow, but\
    \ navigate directly to the login page using plain Spring MVC. There is also no\
    \ need for a flow because, in this scenario, the authentication process only consists\
    \ of a single page. This is useful if the user wants to login directly from the\
    \ main page.\n\nSince there is no flow active, the `else` of our conditional operator\
    \ is used for the form's `action` attribute: when clicking the Login button (after\
    \ filling in username and password), the form will submit to `authenticate.htm`.\
    \ In that case the first `@RequestMapping` will be executed of the `AuthenticationController`,\
    \ as shown in [Listing 11-38](#Chapter11.html#list_11_38). Executing this application\
    \ controller method will retrieve the submitted username and password bound to\
    \ the `AuthenticationForm` and authenticate the user.\n\n**Listing 11-38.** Using\
    \ Spring MVC to Navigate and Perform the Authentication\n\n```\n// ----- Spring\
    \ MVC logic\n\n    public AuthenticationForm initializeForm() {\n        return\
    \ new AuthenticationForm();\n    }\n\n    @RequestMapping(\"login.htm\")\n   \
    \ public ModelAndView authentication() {\n        ModelAndView mov = new ModelAndView();\n\
    \n        mov.setViewName(\"login\");\n        mov.addObject(\"authenticationForm\"\
    , initializeForm());\n        return mov;\n    }\n\n    @RequestMapping(value\
    \ = \"authenticate.htm\", method = RequestMethod.POST)\npublic ModelAndView authentication(@ModelAttribute\
    \ AuthenticationForm\nauthenticationForm, Errors errors, ModelAndView mov,\n \
    \       HttpSession httpSession) {\n        try {\n            authenticate(authenticationForm,\
    \ httpSession);\n            mov.addObject(\"authenticationOk\", \"true\");\n\
    \            mov.addObject(\"username\", authenticationForm.getUsername());\n\
    \            mov.setViewName(\"main\");\n        } catch (AuthenticationException\
    \ authenticationException) {\n            errors.reject(LOGIN_FAILED_KEY);\n \
    \           mov.setViewName(\"login\");\n        }\n```"
