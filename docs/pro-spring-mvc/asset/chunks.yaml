    ##### 格式化器


    Converter API 是一个通用类型转换系统。它是强类型的，并且可以将任何对象类型转换为另一种对象类型（如果有可用的转换器）。然而，在我们的 Web
    环境中并不需要这个功能，因为我们只处理 `String` 对象。另一方面，我们可能希望将对象以 `String` 的形式呈现给客户端，甚至可能希望以本地化的方式来实现。这正是
    Formatter API 发挥作用的地方（参见清单 5-34）。它提供了一种简单且健壮的机制，用于将 `String` 转换为强类型对象。它是属性编辑器的一种替代方案，但更轻量（例如，它不依赖于
    `java.beans` 包）且更灵活（例如，它可以访问 `Locale` 以处理本地化内容）。


    ***清单 5-34.** Formatter API*


    `package org.springframework.format;`


    `public interface Formatter<T> extends Printer<T>, Parser<T> {`

    `}`


    `import java.util.Locale`


    `public interface Printer<T> {`

    `    String print(T object, Locale locale);`

    `}`


    `import java.util.Locale`

    `import java.text.ParseException;`


    `public interface Parser<T> {`

    `    T parse(String text, Locale locale) throws ParseException;`

    `}`


    要创建一个格式化器，我们需要实现 `org.springframework.format.Formatter` 接口，并将类型 `T` 指定为我们想要转换的类型。例如，假设我们有一个格式化器，可以将
    `Date` 实例转换为文本，反之亦然。我们会将 `T` 指定为 `Date`，并使用 `Locale` 来确定执行转换时要使用的具体日期格式（参见清单 5-35）。


    ***清单 5-35.** 示例 DateFormatter*


    `package com.apress.prospringmvc.bookstore.formatter;`


    `// java.text 和 java.util 的导入已省略`


    `import org.springframework.format.Formatter;`

    `import org.springframework.util.StringUtils;`


    `public class DateFormatter implements Formatter<Date> {`


    `    private String format;`


    `    @Override`

    `    public String print(Date object, Locale locale) {`

    `        return getDateFormat(locale).format(object);`

    `    }`


    `    @Override`

    `    public Date parse(String text, Locale locale) throws ParseException {`

    `        return getDateFormat(locale).parse(text);`

    `    }`


    `    private DateFormat getDateFormat(Locale locale) {`

    `        if (StringUtils.hasText(this.format)) {`

    `            return new SimpleDateFormat(this.format, locale);`

    `        } else {`

    `            return SimpleDateFormat.getDateInstance(SimpleDateFormat.MEDIUM,
    locale);`

    `        }`

    `    }`


    `    public void setFormat(String format) {`

    `        this.format = format;`

    `    }`

    `}`


    格式化器也可以由注解驱动，而不是由字段类型驱动。如果我们想将一个格式化器绑定到一个注解，我们必须实现 `org.springframework.format.AnnotationFormatterFactory`（参见清单
    5-36）。


    ***清单 5-36.** AnnotationFormatterFactory*


    `package org.springframework.format;`


    `public interface AnnotationFormatterFactory<A extends Annotation> {`


    `    Set<Class<?>> getFieldTypes();`


    `    Printer<?> getPrinter(A annotation, Class<?> fieldType);`


    `    Parser<?> getParser(A annotation, Class<?> fieldType);`

    `}`


    我们需要用我们想要关联的注解类型来参数化 `A`。`getPrinter` 和 `getParser` 方法应分别返回一个 `org.springframework.format.Printer`
    和一个 `org.springframework.format.Parser`。然后我们可以使用它们来从注解类型进行转换或转换到注解类型。假设我们有一个 `com.apress.prospringmvc.bookstore.formatter.DateFormat`
    注解，可以用来设置 `date` 字段的格式。那么我们可以实现如清单 5-37 所示的工厂。


    ***清单 5-37.** DateFormatAnnotationFormatterFactory*


    `package com.apress.prospringmvc.bookstore.formatter;`


    `import java.util.Date;`

    `import java.util.HashSet;`

    `import java.util.Set;`


    `import org.springframework.format.AnnotationFormatterFactory;`

    `import org.springframework.format.Parser;`

    `import org.springframework.format.Printer;`


    `public class DateFormatAnnotationFormatterFactory implements`![Image](img/U002.jpg)

    ` AnnotationFormatterFactory<DateFormat> {`


    `    @Override`

    `    public Set<Class<?>> getFieldTypes() {`

    `        Set<Class<?>> types = new HashSet<Class<?>>(1);`

    `        types.add(Date.class);`

    `        return types;`

    `    }`


    `    @Override`

    `    public Printer<?> getPrinter(DateFormat annotation, Class<?> fieldType) {`

    `        return createFormatter(annotation);`

    `    }`


    `    @Override`

    `    public Parser<?> getParser(DateFormat annotation, Class<?> fieldType) {`

    `        return createFormatter(annotation);`

    `    }`


    `    private DateFormatter createFormatter(DateFormat annotation) {`

    `        DateFormatter formatter = new DateFormatter();`

    `        formatter.setFormat(annotation.format());`

    `        return formatter;`

    `    }`

    `}`

