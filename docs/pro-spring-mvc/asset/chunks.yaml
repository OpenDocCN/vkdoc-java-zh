  raw: '#### Working with Outcome Events


    As we have seen, we can use our evaluate action to invoke methods on application
    controllers. When called from action states or decision states, these method return
    values can be used to drive state transitions. Since transitions are triggered
    by events, a method return value must first be mapped to an `Event` object.


    For example, in the `AuthenticationController`''s `authenticate` method, we created
    so-called events that were returned by the application controller directly:


    `return new` **`EventFactorySupport().error(this);`**

    `return new` **`EventFactorySupport().success(this);`**


    In this case, the action''s result event becomes the primary basis for the transition
    decision. When combined with a controller or POJO action, this allows you to call
    a method in application code that returns a single value that can be used as the
    basis for a routing decision.


    If you do not return an `org.springframework.webflow.execution.Event`, Web Flow
    will automatically adapt the method return value to an appropriate result event
    according to a set of rules. The rules are simple and identified in [Table 11-3](#Chapter11.html#tab_11_3).


    ![Image](images/9781430241553_tab11-03.jpg)


    In our action state, the `placeOrder()` method returned an object of type `Long`.
    This resulted in Web Flow creating an event with the `success` id—hence, our transition
    of `on="success"`.


    Whenever you return a value, whether an explicit event with an attribute or any
    other object (for which Web Flow creates an `Event` for you), you can bind that
    value using the `result` attribute (see [Listing 11-43](#Chapter11.html#list_11_43)
    for an example) of the evaluation expression. If the id of the event does not
    match any transition of the action state, then a `NoMatchingTransitionException`
    is thrown.


    If you however have a evaluate action nested in a transition instead, you can
    only decide whether the transition is allowed to continue or abort. You can do
    this by returning a success or error event, either directly or by letting Web
    Flow map it for you.


    If you do not return an explicit success or error event, then Web Flow will map
    your return value to an `Event`, as described in [Table 11-3](#Chapter11.html#tab_11_3).
    In case of a `String`, `Enum`, or `Boolean`, the value must be `success`, `yes`,
    or `true` to be interpreted as a success `Event`. In all other cases, the transition
    is aborted and the last view state is re-rendered.


    ![Image](images/square.jpg) **Note**  In the `AuthenticationController`, we have
    chosen to generate the Event in the application code itself to illustrate how
    such events can be created. In that particular case (where the outcome is either
    OK or not OK (i.e., the authentication is either a success or failure), using
    a `Boolean` would have definitely been a good choice, as well.


    #### Overview


    With all the previous refactorings applied, [Listing 11-45](#Chapter11.html#list_11_45)
    shows what our `createOrders-flow` now looks like. You can find this file in `src/main/webapp/WEB-INF/view/createOrders/createOrders-flow.xml`.


