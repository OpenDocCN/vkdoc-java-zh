    #### Progressive Enhancement


    The way we have been applying the AJAX features is a technique called *progressive
    enhancement*. It means that one builds a simple web page that functions as is,
    and then add dynamic and rich behavior to the page with JavaScript.


    The opposite approach is also possible; this technique is called *graceful degradation*,
    which means that we start with a page with all the behavior we want and depending
    on the features offered by the browser we scale down on the rich behavior used.


    The trend nowadays is to use progressive enhancement because, in general, it is
    easier to build and maintain. It also has the advantage that we can enhance based
    on the capabilities of the device that connects to our application (an iPhone
    has different features than a Windows 7 PC with Internet Explorer 9).


    ### Handling File Uploads


    HTTP file uploading or form based file upload in HTML is defined RFC 1867.^([8](#Chapter07.html#CHP-7-FN-8))
    After adding an HTML input field with type `file` to the form and setting the
    encoding to `multipart/form-data`, the browser can send text and/or binary files
    to the server as part of a `POST` request.


    To be able to handle file uploads we first need to register an `org.springframework.web.multipart.MultipartResolver`.
    Out of the box, Spring provides two ways of handling file uploads. The first is
    the multipart support as described in the Servlet 3.0 specification, and the second
    is by using the features offered by the Commons FileUpload^([9](#Chapter07.html#CHP-7-FN-9))
    project from Apache.


    The Spring Framework provides two implementations: the `org.springframework.web.multipart.support.StandardServletMultipartResolver`
    and the `org.springframework.web.multipart.commons.CommonsMultipartResolver`.
    The first implementation can only be used in a Servlet 3.0 environment with multipart
    enabled on the servlet, and the second uses commons-fileupload.


    For the actual handling of file uploads we need to modify the controller. These
    modifications are mostly independent from the file uploading technology used.
    Spring provides several abstractions to handle file uploads. We can write a request-handling
    method that takes an argument of the type `org.springframework.web.multipart.MultipartFile`
    (or collection); we could also use a `org.springframework.web.multipart.MultipartHttpServletRequest`
    and retrieve the files ourselves. When we are in a Servlet 3.0 environment and
    also use the multipart parsing support, we can also use the `javax.servlet.http.Part`
    interface to get the file.


    The final way to indicate to do something with a file upload is to annotate the
    method argument with `org.springframework.web.bind.annotation.RequestPart` (see
    [Chapter 4](#Chapter04.html#ch4)). When put on anything else as described above,
    Spring uses the type conversion system to transform the content of the file.


    We will first discuss the configuration for the two different strategies. After
    that, we will look at how to handle file uploads inside a controller.'
