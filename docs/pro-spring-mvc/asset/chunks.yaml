- fmt: '为了更清楚地解释这一点，假设我们在用户屏幕上显示一个订单。为此，我们使用服务从数据库加载`Order`实体。`Order`实体存储在`flow`作用域中，并在视图渲染时被检索，以显示订单的实际内容。可能，我们还会显示一些关于用户账户的信息，这需要从视图内部执行额外的查询来检索`Account`实体。这一切都很好，因为所有操作都在同一个请求中发生——我们的持久化上下文仍然打开，实体仍然处于托管状态。视图渲染后，流程会话暂停，视图被发送到浏览器。但在视图被发送回之前，`OpenEntityManagerInViewFilter`关闭了持久化上下文。到目前为止，这没有问题，因为无论如何我们的视图已经渲染完毕。然而，假设订单视图允许用户点击一个订单来显示订单详情（例如，订单中包含的产品）。在这种情况下，用户点击详情按钮后，一个新的请求到来，流程会话恢复。当视图尝试从`Order`实体（从`flow`作用域检索）获取`OrderDetail`实体时，会收到一个`LazyInitializationException`。这很奇怪，因为`OpenEntityManagerInViewFilter`在请求到来时已经打开了一个新的持久化上下文。虽然确实如此，但它不会重新附加上一个请求结束时已分离的实体。


    这基本上意味着，虽然持久化上下文被扩展到了表示层，但它不会跨多个请求存活。一旦请求被处理（并且视图已渲染），持久化上下文就会关闭。当实体存储在某个作用域中时，当下一个请求到来并尝试处理它们时，它们将处于分离状态。


    #### 延长持久化上下文


    Web Flow允许您将持久化上下文的连续性延长到多个请求。这被称为流程管理持久化上下文（FMPC）模式。它是我们已经使用的开放实体管理器在视图模式（OEMIV）的扩展（由`OpenEntityManagerInViewFilter`实现）。正如我们在上一节中解释的，持久化上下文在请求到来时打开，但在渲染视图后被销毁。在OEMIV模式中，持久化上下文不会跨多个请求保留；在FMPC模式中，持久化上下文被存储在流程会话中，供下一个请求使用。


    这种模式的好处是，我们可以在表示层中随意访问任何需要的内容，因为在流程的整个执行期间，我们都有一个活动的持久化上下文。


    使用FMPC模式时，我们也不再需要显式地声明业务事务。在我们的流程中，只有一个地方需要事务，那就是最后一步：当我们实际下订单时。在中间步骤中，我们只执行读取访问，这实际上不需要事务；或者最多需要一个只读事务，如果我们检索不同类型的实体，并希望保持一定程度的一致性。


    在图12-7中，我们可以看到Web Flow如何确保在开始或恢复流程会话之前，将持久化上下文绑定到`flow`作用域，并在之后解绑。这将确保我们能够从表示层的流程不同步骤访问数据库，即使是那些从`flow`作用域检索的实体。


    ![Image](images/9781430241553_Fig12-07.jpg)


    ***图12-7.** Web Flow自动绑定和解绑持久化上下文*


    在这种方法中，持久化上下文在流程会话开始时打开，并保持打开状态直到会话结束。该模式应与只读操作一起使用，并在流程结束时以单个创建/更新事务结束，我们将在后面说明。


    当您进行需要数据的调用时（例如，集合或属性的延迟初始化），会生成一个单独的事务，并检索数据。这意味着您不需要在服务上添加任何`@Transactional`注解。如果您需要读取一致性，可以这样做；但是，建议您将事务设置为只读。您可能做出的任何修改都不会被刷新，直到在流程结束时执行更新事务。'
  raw: 'To explain this better, let’s assume we show an order on the user’s screen.
    In order to do this, we load the `Order` entity from database using our service.
    The `Order` entity is stored on `flow` scope and retrieved when the view is rendered
    to show the actual content of an order. Potentially, we also show some information
    about the account of the user, which requires an extra query to be performed from
    within the view to retrieve the `Account` entity. This is all good because everything
    is happening in the same request—our persistence context is still open, and our
    entity is still managed. After the view is rendered, the flow session is paused
    and the view is sent to the browser. But before the view was sent back, the `OpenEntityManagerInViewFilter`
    closed the persistence context. Until now, that was just fine because our view
    was rendered, anyway. However, suppose the order view allows the user to click
    an order that will show the details of the order (e.g., the products contained
    by the order). In that case, after the user clicks the detail button, a new request
    comes in and the flow session is resumed. When the view tries to get the `OrderDetail`
    entities from the `Order` entity (which is retrieved from `flow` scope), it will
    receive a `LazyInitializationException`. This is strange because the `OpenEntityManagerInViewFilter`
    opened a new persistence context when the request came in. While that is true,
    it will not reattach the entities that were detached when the previous request
    ended.


    What this basically means is that, while the persistence context is extended into
    the presentation layer, it does not survive multiple requests. Once a request
    has been processed (and the view has been rendered), the persistence context is
    closed. When entities are stored on a given scope, they will be in a detached
    state when the next request comes in and tries to work with them.


    #### Prolonging the Persistence Context


    Web Flow allows you to prolong the continuity of the persistence context over
    multiple requests. This is known as the Flow Managed Persistence Context (FMPC)
    pattern. It is an extension to the Open EntityManager In View Pattern (OEMIV)
    which we have already been using (it is implemented by the `OpenEntityManagerInViewFilter`).
    As we explained in the previous section, the persistence context is opened when
    the request comes in, but is destroyed after rendering the view. In the OEMIV
    pattern, the persistence context is not retained across multiple requests; in
    the FMPC pattern, the persistence context is stored for the next request in the
    flow session.


    The good thing about this pattern is that we can just touch whatever we need in
    our presentation layer because we still have an active persistence context during
    the entire execution of our flow.


    When using the FMPC pattern, we also no longer need to denote an explicit business
    transaction. In our flow, there is only one place where we need a transaction,
    and that is in the last step: when we place the actual order. In the intermediate
    steps, we just perform read access, which actually requires no transaction; or
    at most, a read-only transaction if we retrieve different types of entities, and
    we want to keep a certain amount of consistency.


    In [Figure 12-7](#Chapter12.html#fig_12_7), we can see how Web Flow will ensure
    that the persistence context is bound and unbound from `flow` scope before starting
    or resuming a flow session. This will ensure that we are able to access the database
    from the different steps in our flow from the presentation layer, even on entities
    that are retrieved from `flow` scope.


    ![Image](images/9781430241553_Fig12-07.jpg)


    ***Figure 12-7.** Automatic binding and unbinding of the persistence context by
    Web Flow*


    In this approach, the persistence context is opened when the flow session starts
    and remains open until the session ends. The pattern should be used with read-only
    operations and ended in a single create/update transaction when the flow ends,
    as we will illustrate later on.


    When you make a call that requires data (e.g., a lazy initialization of a collection
    or property), a separate transaction is spawned, and the data is retrieved. This
    means that you don’t need any @Transactional annotation on the services. If you
    need read consistency, you are allowed to do this; however, you are advised to
    make the transactions read-only. Any modifications you might make are not flushed
    until the update transaction is executed at the end of the flow.'
  trans: '

    为了更好地解释这一点，假设我们在用户屏幕上显示一个订单。为此，我们使用服务从数据库加载`Order`实体。`Order`实体存储在`flow`作用域中，并在视图渲染时被检索出来，以显示订单的实际内容。此外，我们可能还会显示用户账户的一些信息，这需要从视图内部执行额外的查询来检索`Account`实体。这一切都很好，因为所有操作都在同一个请求中发生——我们的持久化上下文仍然处于打开状态，实体也仍处于受管状态。视图渲染完成后，流程会话暂停，视图被发送到浏览器。但在视图被发送回之前，`OpenEntityManagerInViewFilter`已经关闭了持久化上下文。到目前为止，这没有问题，因为无论如何我们的视图已经渲染完毕。然而，假设订单视图允许用户点击某个订单以显示其详细信息（例如，订单中包含的产品）。在这种情况下，用户点击详情按钮后，会发起一个新请求，流程会话恢复。当视图尝试从`Order`实体（该实体从`flow`作用域中检索）获取`OrderDetail`实体时，将会收到一个`LazyInitializationException`异常。这很奇怪，因为当请求进来时，`OpenEntityManagerInViewFilter`已经打开了一个新的持久化上下文。虽然确实如此，但它不会重新关联那些在上一个请求结束时已变为游离状态的实体。


    这基本上意味着，虽然持久化上下文被扩展到了表示层，但它无法跨越多个请求存活。一旦请求被处理完毕（并且视图已渲染完成），持久化上下文就会关闭。当实体存储在某个作用域中时，当下一个请求进来并尝试操作它们时，这些实体将处于游离状态。


    #### 延长持久化上下文


    Web Flow 允许你将持久化上下文的连续性延长到多个请求中。这被称为**流程管理持久化上下文（FMPC）**模式。它是我们已经在使用的**开放实体管理器视图模式（OEMIV）**的扩展（该模式由`OpenEntityManagerInViewFilter`实现）。正如我们在上一节中解释的，持久化上下文在请求进来时打开，但在视图渲染后销毁。在
    OEMIV 模式中，持久化上下文不会跨多个请求保留；而在 FMPC 模式中，持久化上下文会被存储在流程会话中，供下一个请求使用。


    这种模式的好处在于，我们可以在表示层中随意访问任何需要的数据，因为在流程的整个执行期间，我们都有一个活跃的持久化上下文。


    使用 FMPC 模式时，我们也不再需要显式声明业务事务。在我们的流程中，只有一个地方需要事务，那就是最后一步：当我们实际下单时。在中间步骤中，我们只执行读取访问，这实际上不需要事务；或者最多需要一个只读事务（如果我们检索不同类型的实体，并希望保持一定程度的一致性）。


    在图 12-7 中，我们可以看到 Web Flow 如何在启动或恢复流程会话之前，确保持久化上下文被绑定到`flow`作用域并从其中解绑。这将确保我们能够从表示层的流程不同步骤中访问数据库，即使是那些从`flow`作用域中检索到的实体。


    ![图片](img/9781430241553_Fig12-07.jpg)


    ***图 12-7.** Web Flow 自动绑定和解绑持久化上下文*


    在这种方法中，持久化上下文在流程会话开始时打开，并保持打开状态直到会话结束。该模式应仅用于只读操作，并在流程结束时以单个创建/更新事务结束，我们稍后将进行说明。


    当你进行需要数据的调用时（例如，集合或属性的延迟初始化），会生成一个单独的事务，并检索数据。这意味着你不需要在服务上添加任何`@Transactional`注解。如果需要读取一致性，你可以这样做；但建议将事务设为只读。你可能做出的任何修改都不会被刷新，直到流程结束时执行更新事务。

