- fmt: "##### On Start\n\nWe will still use the on start to initialize our `OrderForm`.\
    \ Remember, the on start is executed automatically when the flow session starts.\
    \ Even if you have a specific `<start-state>` attribute defined in your top-level\
    \ flow element, Web Flow will always execute the actions defined in on-start when\
    \ starting the flow, executing each action listed sequentially. Since we will\
    \ not be loading our categories here, we deleted it, so that only the initialization\
    \ of our form remains (see [Listing 11-1](#Chapter11.html#list_11_1)).\n\n***Listing\
    \ 11-1.** The `<on-start>` Action that Initializes the Order Form*\n\n```\n<on-start>\n\
    \    <evaluate expression=\"orderController.initializeForm()\"\n             \
    \ result=\"flowScope.orderForm\"/>\n</on-start>\n```\n\nThe code initializing\
    \ the form remains unaltered. There is one small detail worth noting: in the previous\
    \ version of the `com.apress.prospringmvc.bookstore.web.controller.OrderForm`\
    \ class, we deliberately kept all elements of the form simple. For example, the\
    \ selected `com.apress.prospringmvc.bookstore.domain.Book` and `com.apress.prospringmvc.bookstore.domain.Category`\
    \ `Objects` were not stored themselves, but we only stored their ids, and the\
    \ order and delivery dates were stored as a `java.lang.String` type. From now\
    \ on, we will use the normal data types and leave conversion and formatting to\
    \ Web Flow and Spring MVC. Thus, we will change the delivery and order date to\
    \ `java.util.Date` instead of `java.lang.String`. This changes our initialization\
    \ of the `OrderForm`; and in [Listing 11-2](#Chapter11.html#list_11_2), you can\
    \ see that we are now storing this information as a `Date` instead of a `String`.\n\
    \n***Listing 11-2.** Initializing an Instance of Our OrderForm with a Date Type*\n\
    \n```\npublic OrderForm initializeForm() {\n    OrderForm orderForm = new OrderForm();\n\
    \    orderForm.setQuantity(1);\n    orderForm.setOrderDate(new Date());\n    return\
    \ orderForm;\n}\n```\n\n##### On Render\n\nNow that we've removed the initialization\
    \ of our categories (`Category`), we have to find another solution. The solution\
    \ lies in the use of an on render action and using the `request` scope. It would\
    \ be beneficial to load the categories right before our view gets rendered and\
    \ remove them directly afterwards.\n\nThe on render action allows exactly that.\
    \ Every action specified in the on render is executed right before the view state\
    \ renders. Remember: When Web Flow uses PRG, the view state renders on the second\
    \ request. The first request executes our controller and selects the view to render.\
    \ When the second request comes in (the GET), our on render action executes. We\
    \ then load the categories and put them on the `request` scope (see [Figure 11-1](#Chapter11.html#fig_11_1)\
    \ in the “Request Scope” section). Our view, which is rendered next, will be able\
    \ to access the categories and render them (see [Listing 11-3](#Chapter11.html#fig_11_3)).\n\
    \n***Listing 11-3.** Loading the categories with on render*\n\n```\n<view-state\
    \ id=\"selectCategory\" view=\"selectCategory\" model=\"orderForm\">\n    <on-render>\n\
    \        <evaluate\n            expression=\"orderController.initializeSelectableCategories()\"\
    \n            result=\"requestScope.selectableCategories\"/>\n    </on-render>\n\
    \    <transition on=\"next\" to=\"selectBooks\" >\n        <evaluate expression=\"\
    orderController.\n                              initializeSelectableBooks(flowScope.orderForm)\"\
    \    \n                  result=\"flowScope.selectableBooks\" />\n    </transition>\n\
    \    <transition on=\"cancel\" to=\"end\" />\n</view-state>\n```\n\nBasically,\
    \ we moved the evaluate expression from the on start action to the on render action\
    \ and chose `requestScope` instead of `flowScope`.\n\nThe existing version of\
    \ the code for retrieving the categories selects all categories and puts them\
    \ in a map using the id as the key and the name as the value (see [Listing 11-4](#Chapter11.html#list_11_4)).\n\
    \n***Listing 11-4.** The Existing Way of Loading the Categories*\n\n```\npublic\
    \ Map<Long, String> initializeSelectableCategories() {\n    Map<Long, String>\
    \ selectableCategories = new HashMap<Long, String>();\n    for (Category category\
    \ : categoryService.findAll()) {\n        selectableCategories.put(category.getId(),\
    \ category.getName());\n    }\n    return selectableCategories;\n}\n```\n\nWe\
    \ will now make this code more natural by simply returning a `List` holding types\
    \ of our domain entity `Category` (see [Listing 11-5](#Chapter11.html#list_11_5)).\
    \ Later, we will look at how the conversion takes place.\n\n***Listing 11-5.**\
    \ The Category is Currently Loaded As-Is*\n\n```\npublic List<Category> initializeSelectableCategories()\
    \ {\n    return categoryService.findAll();\n}\n```\n\n![Image](images/square.jpg)\
    \ **Note** Our `initialize` method is refactored down to a single line of code;\
    \ a good alternative would have been to simply call `categoryService.findAll()`\
    \ directly from our flow.\n\nIn our page, we will no longer have a `Map`, but\
    \ a list of `Category` objects. We need to change the `<form:select>`, so that\
    \ the name is displayed as a label and the id as a value. We will still need the\
    \ id (as the select value) to perform the conversion later on (see [Listing 11-6](#Chapter11.html#list_11_6)).\n\
    \n***Listing 11-6.** The Form Select with an Extra itemLabel and itemValue*\n\n\
    ```\n<form:select path=\"category\" items=\"${selectableCategories}\" itemLabel=\"\
    name\" itemValue=\"id\"/>\n```\n\n![Image](images/square.jpg) **Note** Instances\
    \ of categories and books are the ideal candidates for caching. However, instead\
    \ of caching them on any of the Servlet or Web Flow scopes (which end up on the\
    \ user's session and would duplicate the values for each user), we cache them\
    \ in the back-end, using the ORM's 2^(nd) level cache. As you will see, there\
    \ are `@Cacheable` and `@Cache` annotations on both the `Book` and `Category`\
    \ entities. When executing queries on them, we also explicitly cache these queries.\
    \ The ORM is configured to use Ehcache as cache implementation. This offloads\
    \ redundant objects from the user's session and keeps them cached in the back-end,\
    \ usable for the entire application. If you enable Hibernate (our JPA implementation)\
    \ debugging, you will see that, after a server startup, categories are only fetched\
    \ from the database once. They won't be fetched again until the next server restart\
    \ or the cache expires."
