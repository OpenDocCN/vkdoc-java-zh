    Tiles 时，您定义了填充模板的各个部分。片段指的是此类属性或定义的名称。它允许您部分渲染页面组合的一部分。当一个页面由多个部分组成（每个部分由一个 `tiles`
    属性标识）时，您可以在片段中命名您特别想要重新渲染的部分。页面的所有其他内容保持不变。这允许在浏览器中进行部分页面更新。要实现这一点，需要在服务器端和客户端进行一些特殊配置。此外，它仅适用于
    Ajax 请求。当执行普通请求时，指定 `<render>` 操作将不起作用。我们将在第 12 章的“Web Flow AJAX 支持”部分进一步讨论这一点。


    ### 全局转换


    正如我们所看到的，转换可以将用户带到另一个视图，或者它可能只是执行一个操作并重新渲染当前视图。在下一章中，我们还将看到转换如何在处理 Ajax 事件时请求渲染视图的某些部分（称为“片段”）。到目前为止，我们只在状态中看到了转换。这些转换是特定于该状态的。要触发它们，您必须处于该特定状态。


    除了在特定状态中定义的转换之外，流程还可以拥有*全局转换*。当一个事件发生时，如果 Web Flow 在当前流程状态中找不到任何匹配的转换，它将尝试查找匹配的全局转换。全局转换必须在流程的末尾定义。请参阅第
    10 章中的流程结构图（参见图 10-1）以了解其在流程中的确切位置。


    您可能会发现某些转换在多个视图状态中是重复的。使用全局转换，您现在可以在一个地方定义它们。之后，每个状态都能够执行该转换，就好像它直接是该给定状态的一部分一样。最常见的例子是一个终止流程的“取消”按钮，但它可能出现在流程的每个步骤中。


    要定义全局转换，只需将转换取出并嵌套在 `<global-transitions>` 元素内，如清单 11-35 所示。


    ***清单 11-35.** 定义全局转换*


    `<global-transitions>`

    `     <transition on="cancel" to="endCancel" />`

    `</global-transitions>`

