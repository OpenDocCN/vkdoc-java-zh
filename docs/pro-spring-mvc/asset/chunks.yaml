- fmt: "![Image](images/9781430241553_Fig12-04.jpg)\n\n**Figure 12-4.** Firebug’s\
    \ capture of the request and showing of the request parameters\n\nOn the server\
    \ side, the request is identified as an AJAX request by the `AjaxUrlBasedViewResolver`.\
    \ When the flow resumes, it finds out that we wanted to execute the `add` transition,\
    \ based upon the event id in the request parameters. It also knows that there\
    \ is a render element specified in the flow definition. With this information,\
    \ it has enough to continue selecting the view part that should be rendered.\n\
    \n![Image](images/square.jpg) **Note** if you look carefully at [Figure 12-4](#Chapter12.html#fig_12_4),\
    \ you will see that there is an `ajaxSource` POST parameter listed in bold under\
    \ the `Parameters` column (it is the second parameter). This is noteworthy because\
    \ there is no such component defined in our view. This parameter is added by Spring\
    \ JS. It allows Web Flow to identify the request as an AJAX request. You can see\
    \ that in `org.springframework.js.ajax.SpringJavascriptAjaxHandler`:\n\n```\n\
    protected boolean isAjaxRequestInternal(HttpServletRequest request, HttpServletResponse\
    \ response) {\n    String acceptHeader = request.getHeader(\"Accept\");\n    String\
    \ ajaxParam = request.getParameter(AJAX_SOURCE_PARAM);\n    if (AJAX_ACCEPT_CONTENT_TYPE.equals(acceptHeader)\
    \ || StringUtils.hasText(ajaxParam)) {\n        return true;\n    } else {\n \
    \       return false;\n    }\n}\n```\n\nThe response received by the browser once\
    \ Web Flow has finished executing the request is a partial response that contains\
    \ data only from the `showSelectBook` view. We can use Firebug to verify that\
    \ this is indeed the case (see [Figure 12-5](#Chapter12.html#fig_12_5)).\n\n![Image](images/9781430241553_Fig12-05.jpg)\n\
    \n**Figure 12-5.** Firebug capturing the partially rendered response\n\nAs you\
    \ can see, the result contains only a portion of the entire page; namely, just\
    \ the part defined in the `showSelectedBooks.jsp`. The JavaScript that receives\
    \ the partial view update will now try to match an element with the same type\
    \ and id as in the update (that is why we explicitly named the id of the `<div>`\
    \ element `selectBooks`). It will then replace that content with the received\
    \ update.\n\nThat’s it! If you now click the Add button, you’ll notice that the\
    \ browser no longer performs an ordinary form submission or page refresh. For\
    \ example, in Safari you will no longer see the submit form progress bar in the\
    \ browser’s status bar, which pops up when you click the add button. Now the view\
    \ update that occurs when pushing the add button will give a smoother impression\
    \ because only the table containing the selected books is updated, not the entire\
    \ page.\n\n### Using JQuery\n\nInstead of using Spring JS, the client part can\
    \ also easily be replaced by other JavaScript libraries. For example, you might\
    \ be more familiar with JQuery (or ProtoType or another library). These libraries\
    \ will yield the same effect, as long as the mandatory extra request parameters\
    \ `_eventId_xxx` and `ajaxSource` are present. These parameters were automatically\
    \ added by Spring JS, but they need to be added manually when using other JavaScript\
    \ libraries.\n\nFor example, if you replace the Spring JS script with the JQuery\
    \ script in [Listing 12-27](#Chapter12.html#list_12_27), you will see that this\
    \ also works without any problem. To create that script, we need to download the\
    \ latest version of JQuery (version 1.7.1 at the time of writing) and add it to\
    \ the HTML `head` section.\n\n**Listing 12-27** The extra JQuery imports in `WEB-INF/templates/header.jsp`\n\
    \n```\n<spring:url value=\"/resources/jquery/jquery-1.7.1.min.js\" var=\"jquery\"\
    \ />\n<script type=\"text/javascript\" src=\"${jquery}\"></script>\n```\n\nNext,\
    \ we can replace the Spring JS with a JQuery equivalent in `WEB-INF/view/createOrders/selectBooks.jsp`,\
    \ as shown in [Listing 12-28](#Chapter12.html#list_12_28).\n\n**Listing 12-28**\
    \ The Spring JS JavaScript replaced by JQuery\n\n```\n<script type=\"text/javascript\"\
    >\n\n    $(function () {\n        var submit = $('#add');\n\n            submit.click(function()\
    \ {\n                var form = $('#selectBookForm');\n                var event\
    \ = submit.attr('name');\n                var data = form.serialize()+ '&amp;'\
    \ + event + '=' + event +\n                           '&amp;ajaxSource=' + submit.attr('id');\n\
    \n                $.ajax({\n                    type: \"POST\",\n            \
    \        dataType: 'text',\n                    url: form.attr( 'action' ),\n\
    \                    data: data,\n                    success : function(result)\
    \ {\n                        $('#selectedBooks').replaceWith(result);\n      \
    \              }\n                });\n            return false;\n        }):\n\
    \    });\n</script>\n```\n\nAs you can see, the JQuery alternative requires more\
    \ code. We could probably make it a bit shorter, but Spring JS has the advantage\
    \ of being optimized specifically for this job. However, if you’re used to JQuery,\
    \ you might find this to be a better alternative.\n\nThe script builds every step\
    \ manually. We start by adding a click event listener to the add button, which\
    \ is our submit button for adding new books. The event listener is bound when\
    \ everything is loaded.\n\nYou can also see that, when we compose the request\
    \ data in the `data` variable, we serialize the form for adding all input elements,\
    \ and we manually add the parameters `ajaxSource` and `_eventId_xxx`.\n\n![Image](images/square.jpg)\
    \ **Note** `$(#xxx)` is a JQuery selector that finds objects in the DOM based\
    \ on their id. `$(function () {})` is a shorthand for `$(document).ready(function(){})`.\
    \ It has the same function as `dojo.addOnLoad(function(){}.`\n\nNext, we assemble\
    \ the request, and we identify the submit button and the form. We serialize the\
    \ form, and we manually append the required parameters. These parameters are based\
    \ on the name and id of the submit button. The URL to submit to is taken from\
    \ the form, as well. With this URL, we can now perform the POST Ajax call, and\
    \ the URL and parameters are the same as those sent out by the Spring JS. As a\
    \ response, we get the partially rendered view back from the server. The only\
    \ thing left to do is replace the entire target object with the HTML response\
    \ content.\n\nIt must be said: when using JQuery, you should also take care that\
    \ you handle errors that come back from the server. When working with the Spring\
    \ JS, you get automatic support for error detection: errors are nicely shown in\
    \ a popup window. Also, it is possible to show the rendered content directly in\
    \ a popup window."
