    内部加载的（因此我们会回发到 `flowExecutionUrl`）；否则，说明我们的认证页面是直接从 Spring MVC 加载的，我们会回发到 `authenticate.htm`。


    在清单 11-38 中需要注意的第二点是，有两个输入字段（`username` 和 `password`）绑定到了 `authenticationForm`。如清单
    11-39 所示，我们有 `<form:form modelAttribute="authenticationForm"…>`，这表明我们使用的表单是 `authenticationForm`。接下来，我们在该表单中为每个输入文本声明路径：


    ` <form:input path="username"… >`


    `authenticationForm` 既用于 Spring MVC 的 `AuthenticationController`，也用于我们的 `authentication-flow`。后者可以在清单
