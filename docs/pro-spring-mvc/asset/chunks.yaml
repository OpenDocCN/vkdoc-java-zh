    ***Listing 6-18.** Handling an AuthenticationException*


    `package com.apress.prospringmvc.bookstore.service;`


    `import org.springframework.http.HttpStatus;`

    `import org.springframework.web.bind.annotation.ResponseStatus;`


    **`@ResponseStatus(value = HttpStatus.FORBIDDEN)`**

    `public class AuthenticationException extends Exception {`


    `    private String code;`


    `    public AuthenticationException(String message, String code) {`

    `        super(message);`

    `        this.code = code;`

    `    }`


    `    public String getCode() {`

    `        return this.code;`

    `    }`

    `}`


    When we throw this exception, the `org.springframework.web.servlet.mvc.annotation.ResponseStatusExceptionResolver`
    will detect that it has been annotated with the `org.springframework.web.servlet.bind.annotation.ResponseStatus`.
    This annotation has two properties we can use to specify information (see [Table
    6-7](#Chapter06.html#tab_6_7)).


    ![Image](images/tab_6_7.jpg)


    ![Image](images/square.jpg) **Note** This is the mechanism we use to have the
    framework handle our `com.apress.prospringmvc.bookstore.service.AuthenticationException`.


    #### SimpleMappingExceptionResolver


    The `SimpleMappingExceptionResolver` can be configured to translate certain exceptions
    to a view. For example, we can map (partial) exception class names to a view.
    We say partial here because matching is done based on the name of the class and
    not on its concrete type. The matching is done with a simple substring mechanism;
    as such, wildcards (ant-style regular expressions) aren’t supported.


    [Listing 6-19](#Chapter06.html#list_6_19) shows the configuration for a `SimpleMappingExceptionResolver.`
    It is configured to map an `AuthenticationException` to the view with the name
    `login`. We also set a HTTP response code to send with the `login` view.


    ***Listing 6-19.** A SimpleMappingExceptionResolver Configuration*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `import org.springframework.web.servlet.HandlerExceptionResolver;`

    `import org.springframework.web.servlet.handler.SimpleMappingExceptionResolver;`


    `// Imports omitted`


    `@Configuration`

    `@EnableWebMvc`

    `@ComponentScan(basePackages = { "com.apress.prospringmvc.bookstore.web" })`

    `public class WebMvcContextConfiguration extends WebMvcConfigurerAdapter {`


    `    @Override`

    `    public void configureHandlerExceptionResolvers(`

    `                    List<HandlerExceptionResolver> exceptionResolvers) {`

    `        exceptionResolvers.add(simpleMappingExceptionResolver());`

    `    }`


    `    @Bean`

    `    public SimpleMappingExceptionResolver simpleMappingExceptionResolver() {`

    `        SimpleMappingExceptionResolver exceptionResolver;`

    `        exceptionResolver = new SimpleMappingExceptionResolver();`

    `        Properties mappings = new Properties();`

    `        mappings.setProperty("AuthenticationException", "login");`


    `        Properties statusCodes = new Properties();`

    `        mappings.setProperty(`

    `                    "login",`

    `                    String.valueOf(HttpServletResponse.SC_UNAUTHORIZED));`


    `        exceptionResolver.setExceptionMappings(mappings);`

    `        exceptionResolver.setStatusCodes(statusCodes);`

    `        return exceptionResolver;`

    `    }`

    `    // Other methods omitted`

    `}`


    The matching is done based on the class name, rather than the concrete type. If
    the class name of the exception thrown matches the specified pattern, then the
    corresponding view name will be used. The pattern doesn’t support wildcards; it
    is merely a substring that matches the class name. We need to choose the pattern
    carefully. For instance, `Exception` will match almost all exceptions thrown (because
    most exceptions have `Exception` as part of their class name). Similarly, `DataAccessException`
    will more or less match all of Spring’s exceptions for data access.


    We need to make one final adjustment; namely, we need to modify our `com.apress.prospringmvc.bookstore.web.controller.LoginController`.
    At the moment, there is exception handling inside the controller; however, this
    can be removed because the `AuthenticationException` will be handled by our just
    configured `HandlerExceptionResolver` (see [Listing 6-20](#Chapter06.html#list_6_20)
    for the improved controller).


    ***Listing 6-20.** The Improved Login Controller*


    `package com.apress.prospringmvc.bookstore.web.controller;`

    `// Imports omitted`


    `@Controller`

    `@RequestMapping(value = "/login")`

    `public class LoginController {`


    `    public static final String ACCOUNT_ATTRIBUTE = "account";`

    `    public static final String REQUESTED_URL = "REQUESTED_URL";`


    `    @Autowired`

    `    private AccountService accountService;`


    `    @RequestMapping(method = RequestMethod.GET)`

    `    public void login() {}`


    `    @RequestMapping(method = RequestMethod.POST)`

    `    public String handleLogin(@RequestParam String username,`

    `                              @RequestParam String password,`

    `                              HttpSession session)`

    `    throws AuthenticationException {`

