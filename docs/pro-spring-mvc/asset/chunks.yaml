    ![Image](images/manuel_ordan_elera.jpg) ![Image](images/square.jpg) **Manuel Jordan
    Elera** is an autodidactic developer and researcher who enjoys learning new technologies
    for his own experiments and creating new integrations.


    Manuel won the 2010 Springy Award – Community Champion. In his little free time,
    he reads the Bible and composes music on his guitar. Manuel is a Senior Member
    in the Spring Community Forums, where he is known as `dr_pompeii`.


    Manuel is the Technical Reviewer for these books (All published by Apress):


    *Pro SpringSource dm Server,* by Gary Mak, Daniel Rubio (2009)


    *Spring Enterprise Recipes,* by Gary Mak, Josh Long (2009)


    *Spring Recipes*, by Gary Mak, Daniel Rubio, Josh Long (Second Edition, 2010)


    *Pro Spring Integration*, by Dr. Mark Liu, Mario Gray, Andy Chan, Josh Long (2011)


    *Pro Spring Batch*, by Michael T. Minella (2011)


    *Pro Spring 3*, by Clarence Ho, Rob Harrop (2012)


    Read and contact him through his blog at [`http://manueljordan.wordpress.com/`](http://manueljordan.wordpress.com/)
    and follow him on his Twitter account, `@dr_pompeii`.


    ## Introduction


    Welcome to the first edition of *Pro Spring MVC with Web Flow*; the first Pro
    Spring book focused entirely on web development using the Spring Framework 3.1
    ecosystem.


    ### What This Book Will Teach You


    This book will teach you everything you need to know in order to get started building
    enterprise-quality web applications using version 3.1 of the Spring Framework.
    Topics include but are not limited to:


    * The building blocks of the Spring MVC components

    * Configuring your development environment

    * Providing a web front end to a Spring based application

    * A pragmatic approach to testing the web front end

    * Deploying to a local web server and to a remote cloud-based deployment platform

    * An introduction to Spring Web Flow

    * How to build applications with Spring Web Flow


    After reading this book you will be familiar with the Spring MVC toolkit and capable
    of building your own web application from scratch or providing a new web interface
    to an existing application.


    All too often trivial examples are used to demonstrate the power of a framework;
    it is only when you start using the framework in real situations that its limitations
    appear. The intention of this book is to show how Spring MVC answers those hard
    questions (as well as the easy questions!) that web developers are faced with,
    like managing state in non-trivial multi-page use cases, for example, or providing
    multiple views of the same resource for different consumers.


    And because the real-world problems this book tackles are hard, sometimes the
    answers Spring MVC provides are not as easy as one would like. This book will
    not shy away from highlighting those issues or providing pragmatic advice on how
    to do the right thing.


    ### Who Is This Book For?


    This book is for those who are familiar with Spring and want to gain an in-depth
    understanding of Spring MVC. While it is primarily aimed at those new to Spring
    MVC, there is information here that will take even expert MVCers by surprise!


    The typical reader will be a web developer who has some understanding of the core
    Spring framework (after reading *Pro Spring* for example) and wants to investigate
    Spring MVC in more detail.


    If you are unfamiliar with Spring, then by all means continue reading; particularly
    [Chapter 2](#Chapter02.html#ch2). However if you find that is insufficient then
    you might find the Spring Reference Guide^([1](#Introduction.html#Int-FN-1)) or
    *Pro Spring 3* (Apress, 2012).


    The original Spring book, *Expert One-on-One J2EE Design and Development* (Wrox,
    2002)^([2](#Introduction.html#Int-FN-2)), by Rod Johnson (the “father” of the
    Spring framework), is fairly old now but still relevant and full of wisdom.


    ### How to Read This Book


    This book will take the reader through the thought process of designing, implementing,
    and deploying a Java web application. The order of the chapters follows the chronological
    order defined by the development lifecycle. During these chapters we use a sample
    application to illustrate the topics discussed in the chapter.


    Each chapter will address a real-world problem by introducing a new concept or
    capability which is then used to upgrade the sample application.


    ![Image](images/square.jpg) **Note** There is a never-ending dilemma that authors
    face: should we show the answers first and then the questions, or show the questions
    and then the answers? The first approach risks overloading the reader, while the
    second approach can be frustrating and slow for those already familiar with the
    subject matter. The authors believe that the pace of this book is sufficient for
    those unfamiliar with Spring MVC; more experienced readers may want to skip certain
    chapters. For example, if you already have a development environment configured
    and are familiar with Spring then you can skim Chapter 1 to get hold of the sample
    application and then jump straight to [Chapter 3](#Chapter03.html#ch3).


    ### The Application Example


    While the example cannot be a true enterprise application (because we need to
    keep this book under 10K pages ;)), it is realistic enough to highlight the typical
    design challenges that are faced in real-world projects.


    The example in question is the site for a web-enabled bookstore. It offers users
    the following capabilities:


    * An anonymous user can browse the site.

    * A logged-in user can submit an order for one or more books.


    __________


    ¹ [`http://static.springsource.org/spring/docs/current/spring-framework-reference/html/`](http://static.springsource.org/spring/docs/current/spring-framework-reference/html/)


    ² [`http://www.wrox.com/WileyCDA/WroxTitle/productCd-0764543857.html`](http://www.wrox.com/WileyCDA/WroxTitle/productCd-0764543857.html)


    * A logged-in user can see his previous orders.

    * An author can manage the books.

    * An administrator can manage the categories


    Throughout the rest of this book, each chapter adds a new aspect to the sample
    application. The simplest way of capturing this in the example was to have a new
    project for each chapter.


    ### The Sample Code


    We need to explain a little about the coding and referencing style used throughout
    the book. You’ll find that some of the code listings are complete and can be taken
    directly from the book to the development environment. In others we omit some
    imports or methods that are mentioned in earlier listings; we’ve marked those
    with `// Imports omitted` or `// Methods omitted`. Most include a reference to
    the code listing in which the methods or imports can be found. This approach was
    needed for readability, as some code listings contain only a few new lines and
    others would span multiple pages.


    Another thing to mention is that we did not include the fully qualified package
    names for common classes like `java.lang.String` or `java.util.HashMap` (most
    of the `java.util` packages aren’t included), as a Java developer in general knows
    where to find those classes. Also, we only mention the fully qualified classname
    on the first significant reference (after the main heading); for example, the
    package first identified as `org.springframework.web.servlet.DispatcherServlet`
    will in subsequent references be called simply `DispatcherServlet`. This is again
    for readability, but we also feel the need to show you the location of the class
    and believe this was an acceptable approach.'
