- fmt: '### Testing Code Coverage


    Using the STS plug-in `EclEmma`, you can get an overview of the code that has
    been tested by your test. This is as easy as going to the Spring dashboard, clicking
    the extension tab on the bottom of the view, and typing `eclemma` in the search
    field, and installing the `EclEmma` plug-in (see [Figure 9-6](#Chapter09.html#fig_9_6)).


    _________


    ⁹ [`http://www.junit.org/`](http://www.junit.org/)


    ^(10) [`http://kentbeck.github.com/junit/javadoc/latest/`](http://kentbeck.github.com/junit/javadoc/latest/)


    ![Image](images/9781430241553_Fig09-06.jpg)


    ***Figure 9-6.** Installing EclEmma*


    After installing the plug-in you can right click on your test and select Coverage
    as ä JUnit test. The result will come in a separate panel, as shown in [Figure
    9-7](#Chapter09.html#fig_9_7). If this panel doesn’t show up, you can open it
    manually by selecting Window in the STS menu bar, and then Show View ä Other.
    If you then type `coverage` in the text field that appears, one result will appear
    in the list: “Java” with “Coverage” underneath it. Select Coverage and then click
    OK.


    ![Image](images/9781430241553_Fig09-07.jpg)


    ***Figure 9-7.** Code coverage after running EclEmma*


    We can clearly see that our `DummyDao` class has been tested 100%, so every line
    of code has been touched by our test case. Depending on the type of class you
    test, it is not always possible to get 100% coverage, but this is the goal you
    should strive to for each test you create. Note that in some cases it is not feasible
    or simply not required to have 100% coverage. For example, if your object has
    multiple get/set methods (generated by your IDE), then testing those is a bit
    superfluous, even though it results in not getting 100% coverage. However, don’t
    give up too soon, either. If you lose coverage because of code depending on resources,
    you can use in-memory resources or mocks as we will discuss in the next sections.


    After performing the coverage, you can also double-click on the actual production
    class you have tested: `DummyDao` in our case. `EclEmma` will indicate the lines
    that have been (or have not been) tested. In this run everything will turn up
    green, since every line of code has been tested. We also performed a second run,
    removing all references in the test method to the `find` method of the `DummyDao`.
    We placed the results next to each other in [Figure 9-8](#Chapter09.html#fig_9_8).


    ![Image](images/9781430241553_Fig09-08.jpg)


    ***Figure 9-8.** EclEmma showing tested (green) and untested (red) lines of code*


    On the left you can see the 100% code coverage of our first run (all green). On
    the right you see the run where we removed every reference to the `find` method
    in our test. The `find` method will turn up in red, as it has not been touched
    by our test. The diamond icons on the left of some lines indicate whether the
    loop ran for each element in the list or not. For example, if we put a `break`
    statement after the `if`, the loop would only run once, and the first diamond
    would appear yellow and indicate that the branch was not completely covered. The
    same goes for the second diamond, which covers the `if` statement. If this statement
    was not executed, the diamond would also show up in orange.


    ### Using Spring’s Test Support


    In the previous section you saw how we can create a basic unit test using JUnit.
    This was a very isolated test, not requiring any dependencies like Spring or other
    resources, as a unit test should be. In this section we will introduce Spring’s
    test support to create integration tests that actually use these dependencies
    together in the test.


    The Spring test support is all about integrating Spring within your tests. With
    a couple of annotations, you can load a Spring context and make it available to
    your unit test. This allows you to inject dependencies directly in the test using,
    for example, autowiring.


    #### Setting Up Our Integration Test


    Next we are going to setup an integration test that will test our `com.apress.prospringmvc.bookstore.repository.JpaBookRepository`.
    We start by creating a normal class in the test classpath (see [Listing 9-3](#Chapter09.html#list_9_3)).
    Ideally you place your test in the same package as the class you are going to
    test, but on the test class path instead of the production classpath (which is
    `src/main/java`). So we will create a `com.apress.prospringmvc.bookstore.repository.JpaBookRepositoryTest`
    in the `src/test/java` classpath.


    ***Listing 9-3.** The start of our integration test testing JpaBookRepository,
    in src/test/java*


    ```

    package com.apress.prospringmvc.bookstore.repository;


    public class JpaBookRepositoryTest {

    }

    ```


    To enable the Spring test context, we tell JUnit it has to bootstrap Spring, by
    adding the following annotation on top of the class, as shown in [Listing 9-4](#Chapter09.html#list_9_4).


    ***Listing 9-4.** Adding the runner to enable Spring’s test support*


    ```

    package com.apress.prospringmvc.bookstore.repository;


    import org.junit.runner.RunWith;

    import org.springframework.test.context.junit4.SpringJUnit4ClassRunner;


    @RunWith(SpringJUnit4ClassRunner.class)

    public class JpaBookRepositoryTest {

    }

    ```


    `SpringJUnit4ClassRunner` is a Spring-specific integration class for JUnit. JUnit
    inspects those classes with the `@RunWith` annotation. When you indicate you want
    to run a class as a JUnit test, the test class is passed as a parameter to the
    JUnit runtime (in our case this is done by the IDE). JUnit will then scan for
    `@RunWith` annotations. In our case it will execute `org.springframework.test.context.junit4.SpringJUnit4ClassRunner`.
    This class will start Spring’s test support by using the Spring `org.springframework.test.context.TestContextManager`
    and `org.springframework.test.context.TestContext`. This will enable all Spring
    functionality, such as loading your application context (based upon the `@ContextConfiguration`,
    as we will see next), enabling autowiring, and executing implementations of `org.springframework.test.context.TestExecutionListener`.
    The latter are special listeners that can be executed before initialization of
    a test class, before running a test class, and before running a test method within
    a test class. They can be registered using the `TestExecutionListener` annotation.
    There are three listeners registered by default:


    > *   `org.springframework.test.context.support.DependencyInjectionTestExecutionListener`

    > *   `org.springframework.test.context.support.DirtiesContextTestExecutionListener`

    > *   `org.springframework.test.context.transaction.TransactionalTestExecutionListener`


    For our purposes here, only the last one is relevant as it will manage our transactions
    within our tests; we will discuss this later on.


    Finally, we have to indicate which (test) context we want to load for our test
    class. At this point you have two options:


    > *   One way is to load one or more production contexts. These are the contexts
    your application is actually using. If you want to differentiate between test
    runs and the actual application run, you can make use of Spring profiles.

    > *   You can also opt for setting up specific contexts just for your test. This
    way you can specify exactly which resources you need.


    Each of these approaches has its pros and cons, so you should weigh them based
    on your application and what you are going to test to determine which is best.
    The more modular your Spring configuration is (either in terms of annotated classes
    or XML configuration files), the easier it will become to mix both approaches.
    When you have a Spring configuration listing your repositories, but a separate
    configuration for the datasource, you could load the production configuration
    for the repositories in your test combined with a separate test context for the
    datasource (which will in that case point to an in-memory database).'
