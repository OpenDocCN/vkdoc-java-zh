    \ lists the defaults.\n\n![Image](images/9781430241553_tab08-11.jpg)\n\nTo use\
    \ one of the views, we need to add the view and configure the URL of the report\
    \ design. This can be either an XML file (`.jrxml` file) or in a compiled form\
    \ (`.jasper` file). Either way, internally a compiled version of the report is\
    \ needed for performance reasons. It can be wise to precompile the reports for\
    \ production usage. [Listing 8-26](#Chapter08.html#list_8_26) shows a sample configuration\
    \ for a JasperReports-based PDF view of our order.\n\n_________\n\n⁹ [`http://jasperforge.org/projects/jasperreports`](http://jasperforge.org/projects/jasperreports)\n\
    \n**Listing 8-26.** JasperReports View Configuration\n\n```java\npackage com.apress.prospringmvc.bookstore.web.config;\n\
    \n// Other imports omitted\n\nimport org.springframework.web.servlet.view.jasperreports\n\
    \       .JasperReportsPdfView;\n\n@Configuration\npublic class ViewConfiguration\
    \ {\n\n    @Bean\n    public View jasperReportsView() {\n        JasperReportsPdfView\
    \ orderPdfView = new JasperReportsPdfView();\n        orderPdfView.setUrl(\"/WEB-INF/jasper/order.jrxml\"\
    );\n        return orderPdfView;\n    }\n  // Other methods ommitted see Listing\
    \ 8-18\n}\n```\n\nThe special `org.springframework.web.servlet.view.jasperreports.JasperReportsMultiFormatView`\
    \ needs the format to be rendered available in the model. By default there should\
    \ be a key named `format` in the model that tells us which format to render. It\
    \ is more flexible and less intrusive to use the `ContentNegotiatingViewResolver`\
    \ to resolve the correct view implementation to use. This allows you to configure\
    \ the views without modifying your controllers. The multi-format view needs our\
    \ controller to be modified, and we need to put logic in there to determine what\
    \ to render."
  raw: '#### XML and JSON


    Spring MVC has another way of serving XML or JSON to our clients. We can use the
    `ContentNegotiatingViewResolver` to our advantage. Spring has two special view
    implementations to convert objects to XML or JSON, respectively, `org.springframework.web.servlet.view.xml.MarshallingView`
    and `org.springframework.web.servlet.view.json.MappingJacksonJsonView`. The XML-based
    view uses the Spring XML support to marshall our model to XML. The JSON view uses
    the Jackson library. We can quite easily configure our view resolver to also expose
    XML and/or JSON to our clients. We simply can add a default view for XML and JSON
    (we can also add additional view resolvers, as we did for the PDF and Excel documents).
    [Listing 8-25](#Chapter08.html#list_8_25) is the modified configuration (see the
    highlighted parts).


    ***Listing 8-25.** ViewConfiguration for XML and JSON*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// Other imports omitted`


    `import org.springframework.oxm.Marshaller;`

    `import org.springframework.oxm.xstream.XStreamMarshaller;`

    `import org.springframework.web.servlet.view.json.MappingJacksonJsonView;`

    `import org.springframework.web.servlet.view.xml.MarshallingView;`


    `import com.apress.prospringmvc.bookstore.web.view.OrderExcelView;`

    `import com.apress.prospringmvc.bookstore.web.view.OrderPdfView;`


    `@Configuration`

    `public class ViewConfiguration {`


    `    @Bean`

    `    public ContentNegotiatingViewResolver contentNegotiatingViewResolver() {`

    `        ContentNegotiatingViewResolver viewResolver;`

    `        viewResolver = new ContentNegotiatingViewResolver();`

    `        List<ViewResolver> viewResolvers = new ArrayList<ViewResolver>();`

    `        viewResolvers.add(pdfViewResolver());`

    `        viewResolvers.add(xlsViewResolver());`

    `        viewResolver.setViewResolvers(viewResolvers);`

    **`List<View> defaultViews = new ArrayList<View>();`**

    **`defaultViews.add(jsonOrderView());`**

    **`defaultViews.add(xmlOrderView());`**

    **`viewResolver.setDefaultViews(defaultViews);`**

    `        return viewResolver;`

    `    }`


    **`@Bean`**

    **`public MappingJacksonJsonView jsonOrderView() {`**

    **`MappingJacksonJsonView jsonView = new MappingJacksonJsonView();`**

    **`jsonView.setModelKey("order");`**

    **`return jsonView;`**

    **`}`**


    **`@Bean`**

    **`public MarshallingView xmlOrderView() {`**

    **`MarshallingView xmlView = new MarshallingView(marshaller());`**

    **`xmlView.setModelKey("order");`**

    **`return xmlView;`**

    **`}`**


    **`@Bean`**

    **`public Marshaller marshaller() {`**

    **`return new XStreamMarshaller();`**

    **`}`**


    `    // Other methods omitted, see listings 8-22 and 8-24`

    `}`


    For XML to work, we also need to configure an `org.springframework.oxm.Marshaller`
    implementation. We choose here to use the XStream^([8](#Chapter08.html#CHP-8-FN-8))
    library because that is quick and easy to use. To use another solution, simply
    configure the appropriate marshaller. More information on marshalling and XML
    can be found in the Spring Reference guide.


    ![Image](images/square.jpg) **Caution** When using these type of views together
    with an ORM implementation (like in our sample) one could get issues like lazy
    loading or loading half the database due to collections getting initialized.


    If we now change the URL in the browser to end in either .json or .xml, we will
    get a JSON or XML representation of our order ([Figure 8-6](#Chapter08.html#fig_8_6)
    is the JSON sample). We have now five different ways of viewing our order (HTML,
    PDF, Excel, JSON and XML) without touching our controller and by simply changing
    our configuration.


    ![Image](images/9781430241553_Fig08-06.jpg)


    ***Figure 8-6.** JSON Representation of our Order*


    _________


    ⁸ [`http://xstream.codehaus.org`](http://xstream.codehaus.org)


    #### JasperReports


    Spring MVC provides support for the reporting engine called JasperReports.^([9](#Chapter08.html#CHP-8-FN-9))
    This reporting engine uses report designs in XML and can output different formats
    based on that XML. There is a powerful report designer called iReport Designer
    which can be used to create the report designs. One could use an XML or text editor
    to create the designs, but that isn’t recommended because the XML is very verbose.


    Spring supports JasperReports with a view resolver and six different view implementations.
    The view resolver is, not surprisingly, the `org.springframework.web.servlet.view.jasperreports.JasperReportsViewResolver.`
    The view implementations can be found in the same package. They are


    > *   `JasperReportsCsvView`

    > *   `JasperReportsHtmlView`

    > *   `JasperReportsPdfView`

    > *   `JasperReportsXlsView`

    > *   `ConfigurableJasperReportsView`

    > *   `JasperReportsMultiFormatView`


    The first four implementations produce a predefined format, either CSV, HTML,
    PDF, or Excel. For the fifth you can configure the format to export; it allows
    for setting the specific `net.sf.jasperreports.engine.JRExporter` implementation
    to use to generate a report. The last view implementation acts as a wrapper around
    the first four views or can be configured with specific implementations. It maps
    a format to a specific view implementation. [Table 8-11](#Chapter08.html#tab_8_11)
    lists the defaults.


    ![Image](images/9781430241553_tab08-11.jpg)


    To use one of the views, we need to add the view and configure the URL of the
    report design. This can be either an XML file (.jrxml file) or in a compiled form
    (.jasper file). Either way, internally a compiled version of the report is needed
    for performance reasons. It can be wise to precompile the reports for production
    usage. [Listing 8-26](#Chapter08.html#list_8_26) shows a sample configuration
    for a JasperReports-based PDF view of our order.


    _________


    ⁹ [`http://jasperforge.org/projects/jasperreports`](http://jasperforge.org/projects/jasperreports)


    ***Listing 8-26.** JasperReports View Configuration*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// Other imports omitted`


    `import org.springframework.web.servlet.view.jasperreports`

    `       .JasperReportsPdfView;`


    `@Configuration`

    `public class ViewConfiguration {`


    `    @Bean`

    `    public View jasperReportsView() {`

    `        JasperReportsPdfView orderPdfView = new JasperReportsPdfView();`

    `        orderPdfView.setUrl("/WEB-INF/jasper/order.jrxml");`

    `        return orderPdfView;`

    `    }`

    `  // Other methods ommitted see Listing 8-18`

    `}`


    The special `org.springframework.web.servlet.view.jasperreports.JasperReportsMultiFormatView`
    needs the format to be rendered available in the model. By default there should
    be a key named `format` in the model that tells us which format to render. It
    is more flexible and less intrusive to use the `ContentNegotiatingViewResolver`
    to resolve the correct view implementation to use. This allows you to configure
    the views without modifying your controllers. The multi-format view needs our
    controller to be modified, and we need to put logic in there to determine what
    to render.'
