    #### 配置


    启用文件上传的第一步是配置我们的环境。由于 Spring 提供了两种开箱即用的技术，每种技术都需要一组不同的配置项。我们将先介绍 Servlet 3.0 的多部分支持，然后再介绍
    commons-fileupload。


    选择哪一种取决于具体需求。如果应用程序严格运行在 Servlet 3.0 环境中，则应使用 Servlet 规范指定的标准多部分支持。如果应用程序还需要在旧版容器中运行，则应选择
    commons-fileupload 支持。


