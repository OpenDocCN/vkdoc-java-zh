- fmt: '# What Are Mock Objects?


    As explained in the introduction, in some cases you want to isolate a certain
    algorithm to unit-test. That algorithm might depend on a repository feeding it
    data, and you don’t want to fiddle with setting up data for testing the algorithm.
    You want to concentrate the test on the algorithm alone. A mock object is a good
    solution here, as it enables you to plug in a replacement of the real resource
    and preprogram it with data. Whenever the algorithm makes a call to the mock,
    it is able to return data that you programmed it with as part of the test setup.


    Mocks also have other benefits. A mock is smart. For example, it can be designed
    to return data only if the parameter of the method call matches a certain value.
    A mock can also be verified. When the test is done, you can ask the mock to check
    if all methods you programmed it with were indeed called with the expected parameters.
    If not, it will let your test fail. Another use case for mock objects is for resources
    for which there are no easy in-memory alternatives; for example, you have a dependency
    on a legacy system.


    Mock objects fall in the category of so called “test doubles.” There are different
    kinds of test doubles, but only one of them is a real mock. In his article “Mocks
    Aren’t Stubs,”^([11](#Chapter09.html#CHP-9-FN-11)) Martin Fowler distinguishes
    the different test doubles and names them appropriately. Let’s have a look at
    them:


    > *   **Dummy.** Dummies are mostly real implementations of a given interface.
    We could, for example, build a `DummyBookRepository`. The method bodies of dummies
    are mostly empty. If their signature requires them to return a value, it is mostly
    “null.” Dummies are useful to build objects that you are going to test and have
    a mandatory dependency on the dummy. But the dependency in question is not used
    for testing the given functionality.

    > *   **Fake.** A fake is a working replacement for a real resource, such as an
    in-memory database or an in-memory implementation of a web service. It is clear
    that in-memory fakes enjoy real advantages over any external dependency, since
    those would again break our rule that our tests should be able to run everywhere,
    while still supplying a high level of guarantee that your code will work against
    the real resource once the fake is replaced with the real resource.

    > *   **Stub.** Stubs are replacement objects that are able to return preprogrammed
    values when their methods are called. They normally don’t respond outside the
    values that they have been programmed with. The way they capture state is very
    basic, and the verification process mostly does not allow you to do behavior verification.
    These are sometimes also referred to as “simulators.”

    > *   **Mock.** Mocks add extra functionality in the training (setting up the
    preprogrammed data) and verification phase compared to a stub. A mock will allow
    you to verify not only that a given method was called on the mock, but also that
    it was called with the desired parameters. This is normally built in the mock
    framework and is not something you have to build yourself (unlike with stubs).


    From our experience, all of these deserve a certain place in the project. While
    all test doubles can in fact also be replaced by mocks, you probably shouldn’t
    do so. A mock object is something that is built on the fly in your test, is programmed
    with data, expects certain behavior, and is verified before the test ends. A dummy
    is a real class that sits in your project code. In addition to the `com.apress.prospringmvc.bookstore.repository.JpaBookRepository`,
    there could also be a `DummyBookRepository`. It is not supposed to do anything,
    besides being there. The advantages are that you could use Spring profiles or
    selective context loading in your test to wire up the one or the other. This might
    keep your code base cleaner and tests easier to understand. Also, when using a
    mock where you really want a dummy, you will be sending out wrong signals to other
    developers reading your code. They will see a mock, which is not programmed and
    not verified, so they will think it is a developer error. Using a dummy, you clearly
    indicate that the dependency is not relevant in the scope of the test you are
    performing, but the object you are testing has a mandatory dependency on it and
    so you gave it a dummy implementation.


    _________


    ^(11) [`http://martinfowler.com/articles/mocksArentStubs.html`](http://martinfowler.com/articles/mocksArentStubs.html)


    At certain points you want to build a real integration test. In the previous section
    we tested our `JpaBookRepository` against an in-memory database. Although we could
    have mocked the `EntityManager`, not doing so added an enormous value; it taught
    us that our JPQL queries were translated to SQL that was actually correct and
    could be executed by an RDBMS. Replacing this with a mock would cut critical things
    from our test and degrade its effectiveness.


    Stubs are probably only useful in special integration testing when there is no
    in easy fake available for a given resource, for example for a legacy system.
    The stub could then be wired in as a “dummy with data.”


    As a final note, think carefully about which kind of testing double you will be
    using. When writing a unit test, think about using dummies first. If you really
    need state and behavior verification for the dependency, consider a mock. If you
    are integration testing, consider using in-memory fakes as much as you possibly
    can. If you are doing integration testing from another interface (front-end testing
    using an in-memory browser, for example) consider using stubs.


    In this discussion we will limit ourselves to using and creating mocks for our
    unit tests. In the next section we will dive into the code and test our `AccountService`,
    while using a mock for its `AccountRepository` dependency.'
