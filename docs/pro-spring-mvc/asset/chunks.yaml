    `HandlerAdapter` 的 API。


    ***清单 4-14.** HandlerAdapter API*


    `package org.springframework.web.servlet;`


    `import javax.servlet.http.HttpServletRequest;`

    `import javax.servlet.http.HttpServletResponse;`


    `public interface HandlerAdapter {`


    `    boolean supports(Object handler);`


    `    ModelAndView handle(HttpServletRequest request,`

    `                        HttpServletResponse response,`

    `                        Object handler) throws Exception;`


    `    long getLastModified(HttpServletRequest request, Object handler);`


    `}`


    如清单 4-14 所示，该 API 包含几个方法。调度器 Servlet 会调用上下文中每个处理器的 `supports` 方法，以确定哪个 `HandlerAdapter`
    能够执行所选处理器。如果处理器适配器能够执行该处理器，则会调用 `handle` 方法来实际执行所选处理器。处理器的执行可能会返回一个 `org.springframework.web.servlet.ModelAndView`
    对象。然而，某些实现始终返回 `null`，表示响应已发送给客户端。


    如果传入的请求是 `GET` 或 `HEAD` 请求，则会调用 `getLastModified` 方法来确定底层资源最后被修改的时间（`-1` 表示内容始终重新生成）。结果会作为
    `Last-Modified` 请求头发送回客户端，并与 `If-Modified-Since` 请求头进行比较。如果资源有修改，则会重新生成内容并再次发送给客户端；否则，会向客户端返回
    HTTP 响应码 304（未修改）。当调度器 Servlet 提供静态资源服务时，此功能尤其有用，可以节省带宽。


    Spring MVC 开箱即用地提供了五个 `HandlerAdapter` 的实现（参见图 4-12）。


    ![Image](img/9781430241553_Fig04-12.jpg)


    ***图 4-12.** HandlerAdapter 实现*


    ##### HttpRequestHandlerAdapter


    `org.springframework.web.servlet.mvc.HttpRequestHandlerAdapter` 知道如何执行 `org.springframework.web.HttpRequestHandler`
    实例。此处理器适配器主要用于 Spring Remoting 以支持某些 HTTP 远程处理选项。不过，您也会用到 `org.springframework.web.HttpRequestHandler`
    接口的两个实现。一个用于提供静态资源服务，另一个用于将传入请求转发到 Servlet 容器的默认 Servlet（有关此实现的更多信息，请参见第 5 章）。


    ##### SimpleControllerHandlerAdapter


    `org.springframework.web.servlet.mvc.SimpleControllerHandlerAdapter` 知道如何执行 `org.springframework.web.servlet.mvc.Controller`
    实现。它返回从控制器实例的 `handleRequest` 方法返回的 `org.springframework .web.servlet.ModelAndView`
    对象。


    ##### SimpleServletHandlerAdapter


    在应用程序上下文中配置 `javax.servlet.Servlet` 实例并将其置于调度器 Servlet 之后可能会很方便。为了能够执行这些 Servlet，您需要
    `org.springframework.web.servlet.handler.SimpleServletHandlerAdapter`。它知道如何执行
    `javax.servlet.Servlet`，并且始终返回 `null`，因为它期望 Servlet 自行处理响应。


    ##### AnnotationMethodHandlerAdapter


    `org.springframework.web.servlet.mvc.annotation.AnnotationMethodHandlerAdapter`
    用于执行带有 `org.springframework.web.bind.annotation.RequestMapping` 注解的方法。它会转换方法参数，并让您轻松访问请求参数。方法的返回值会被转换或添加到由此处理器适配器内部创建的
    `org.springframework.web.servlet.ModelAndView` 中。整个映射和转换过程相当严格；不过，存在一些扩展点，允许您自定义或添加自己的类型处理。


    ##### RequestMappingHandlerAdapter


    `org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerAdapter`
    用于执行带有 `org.springframework.web.bind.annotation.RequestMapping` 注解的方法。它会转换方法参数，并让您轻松访问请求参数。方法的返回值会被转换或添加到由此处理器适配器内部创建的
    `org.springframework.web.servlet.ModelAndView` 中。整个绑定和转换过程具有很高的可配置性和灵活性。从 `org.springframework.web.servlet.mvc.annotation
    .AnnotationMethodHandlerAdapter` 中汲取的许多经验教训都已融入其中；其可能性将在第 5 章和第 6 章中阐述。


    #### MultipartResolver


    `org.springframework.web.multipart.MultipartResolver` 策略接口用于判断传入请求是否为多部分文件请求（用于文件上传）；如果是，它会将传入请求包装在
    `org.springframework.web.multipart.MultipartHttpServletRequest` 中。然后，可以使用包装后的请求轻松访问表单中的底层多部分文件。文件上传将在第
    7 章中说明。清单 4-15 展示了 `MultipartResolver` 的 API。


    ***清单 4-15.** MultipartResolver API*


    `package org.springframework.web.multipart;`


    `import javax.servlet.http.HttpServletRequest;`


    `public interface MultipartResolver {`


    `    boolean isMultipart(HttpServletRequest request);`


    `    MultipartHttpServletRequest resolveMultipart(HttpServletRequest request)`

    `    throws MultipartException;`


    `    void cleanupMultipart(MultipartHttpServletRequest request);`

    `}`


    `org.springframework.web.multipart.MultipartResolver` 的三个方法在请求的准备和清理过程中被调用。`isMultipart`
    方法被调用来判断传入请求是否确实是多部分请求。如果是，则调用 `resolveMultipart` 方法，该方法将原始请求包装在 `MultipartHttpServletRequest`
    中。最后，当请求处理完毕后，会调用 `cleanupMultipart` 方法来清理所有已使用的资源。图 4-13 展示了 `MultipartResolver`
    的两个开箱即用的实现。


    ![Image](img/9781430241553_Fig04-13.jpg)


    ***图 4-13.** MultipartResolver 实现*


    ##### CommonsMultipartResolver


    `org.springframework.web.multipart.commons.CommonsMultipartResolver` 使用 Commons
    `fileupload` 库^(1) 来处理多部分文件。它使得可以轻松配置 Commons `fileupload` 库的多个方面。


    ##### StandardServletMultipartResolver


    Servlet 3.0 规范引入了一种处理多部分表单的标准方式。`org.springframework.web.multipart.support.StandardServletMultipartResolver`
    仅作为此标准方法的包装器，以便以透明的方式暴露它。

