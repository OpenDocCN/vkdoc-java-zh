    \ values out of a scope, as well as a key plus value for setting something on\
    \ a scope. The expression language makes reading the scope straightforward. For\
    \ example, here's what you do if you want to read the value with the `myKey` key\
    \ from the `flow` scope and pass this value to an application controller:\n\n\
    `expression=\"myApplicationController.someMethod(flowscope.myKey)\"`\n\nSetting\
    \ variables can be done using the `<set>` element. This element is valid in all\
    \ five states (which we will cover in the upcoming sections), except one: the\
    \ decision state. This element can also be used within transitions. The example\
    \ in [Listing 11-30](#Chapter11.html#list_11_30) sets a literal value, `someValue`,\
    \ on a `flow` scope with the `myKey` key through a flow start action. We could\
    \ have used other scopes to put the value on (e.g., `conversationScope` or `requestScope`);\
    \ however, not every scope would make a lot of sense or would be allowed. For\
    \ example, `view` scope would yield an error because we are not yet in a view\
    \ state, so no `view` scope exists. Finally, if we specify a literal value, you\
    \ are forced to put it between single quotes. The `value` attribute is expecting\
    \ an expression by default, meaning that the value of `value` attribute is automatically\
    \ interpreted as an expression. (i.e., it is not required that we place them between\
    \ `#{}`).\n\n**Listing 11-30.** Setting a Value with a Literal Value on Flow Scope\n\
    \n```\n<on-start>\n    <set name=\"flowScope.myKey\" value=\"'someValue'\"/>\n\
    </on-start>\n```\n\nIn addition to the `<set>` element, you can also set variables\
    \ using the expression language in an evaluate action. [Listing 11-31](#Chapter11.html#list_11_31)\
    \ shows how to store the result returned from executing an application controller\
    \ method on `flow` scope. The expression contains the logic to be executed (in\
    \ this case, it executes the `someMethod` method on the `myApplicationController`\
    \ bean), passing the value retrieved from `flow` scope by using the `myKey` key\
    \ as a parameter and storing the result in `flow` scope under the `someMethodResult`\
    \ key.\n\n**Listing 11-31.** Calling an Application Controller Method with a Parameter\
    \ and Storing the Result on flow Scope\n\n```\n<evaluate expression=\"myApplicationController.someMethod(flowScope.myKey)\"\
    \n          result=\"flowScope.someMethodResult\"/>\n```\n\n#### Flow Variables\n\
    \nA flow may declare one or more instance variables. These variables are allocated\
