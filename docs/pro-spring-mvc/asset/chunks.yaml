    `    @RequestMapping(value = "authenticate.htm", params = "_eventId_previous",`![Image](img/U002.jpg)

    `                     method = RequestMethod.POST)`

    `    public ModelAndView previous(ModelAndView mov) {`

    `        mov.setViewName("main");`

    `        return mov;`

    `    }`


    我们引用认证页面的第二个位置出现在 `authentication-flow` 中，通过执行 authenticate 转换来实现，正如我们在清单 11-36
    中已经看到的那样。稍后我们将看到，我们将 `authentication-flow` 作为 `createOrders-flow` 的一个子流程包含进来。当用户想要创建订单但尚未通过认证时，她会被首先重定向到登录页面。


