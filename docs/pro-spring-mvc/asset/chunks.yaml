    #### 数据访问层


    数据访问层负责与底层持久化机制进行交互。该层知道如何从数据存储中存储和检索对象。它以一种服务层无需了解底层使用何种数据存储的方式来完成此操作。（数据存储可以是数据库，也可以是文件系统中的平面文件。）


    创建独立数据访问层的原因有几个。首先，我们不想让服务层承担了解我们使用何种数据存储（或多种数据存储）的负担；我们希望以透明的方式处理持久化。在我们的示例应用中，我们使用内存数据库和
    JPA（Java 持久化 API）来存储数据。现在设想一下，我们的 `com.apress.prospringmvc.bookstore.domain.Account`
    并非来自数据库，而是来自 Active Directory 服务。我们可以简单地创建一个知道如何处理 Active Directory 的接口新实现——所有这些都无需更改我们的服务层。理论上，我们可以相当轻松地替换实现；例如，我们可以从
    JDBC 切换到 Hibernate，而无需更改服务层。这种情况不太可能发生，但拥有这种能力是件好事。


    这种方法最重要的原因是它简化了应用的测试。通常，数据访问速度较慢，因此让我们的测试尽可能快地运行非常重要。独立的数据访问层使得为我们的数据访问层创建桩（stub）或模拟（mock）实现变得相当容易。


    Spring 框架对数据访问层提供了出色的支持。例如，它提供了一种一致且透明的方式来处理各种不同的数据访问框架（例如 JDBC、JPA、Hibernate、iBATIS
    和 JDO）。对于这些技术中的每一种，Spring 都为以下能力提供了广泛支持：


    *   事务管理

    *   资源处理

    *   异常转换


    对于其支持的每种技术，事务管理都是透明的。有一个事务管理器负责处理事务，它甚至支持 JTA（Java 事务 API），从而支持分布式或全局事务。这种出色的事务支持意味着事务管理器也可以为我们管理资源。我们不再需要担心数据库连接或文件句柄可能未被关闭；这一切都由我们处理。受支持的实现可以在
    `org.springframework.jdbc` 和 `org.springframework.orm` 包中找到。


    ![图片](img/square.jpg) **提示** Spring Data 项目（[`www.springsource.org/spring-data`](http://www.springsource.org/spring-data)）提供了与多种技术的更深层次集成。对于某些用例，它甚至可以消除我们编写自己的数据访问对象（DAO）或仓库实现的需要。


    Spring 框架在其数据访问支持中包含了另一个强大的特性：异常转换。Spring 为其所有支持的技术提供了广泛的异常转换支持。此特性将特定于技术的异常转换为
    `org.springframework.dao.DataAccessException` 的子类。对于基于数据库的技术，它甚至可以考虑到数据库供应商、版本以及从数据库接收的错误代码。该异常层次结构继承自
    `RuntimeException`；因此，它不必被捕获，因为它不是受检异常。有关数据访问支持的更多信息，请参阅 *Pro Spring 3*（Apress，2012）或在线
    Spring 参考指南（[`www.springsource.org/documentation`](http://www.springsource.org/documentation)）。


    清单 3-4 展示了一个数据访问对象或仓库可能的样子。请注意，该接口没有引用或提及我们使用的任何数据访问技术（我们在示例应用中使用 JPA）。此外，服务层不关心数据如何或在哪里持久化；它只想知道如何存储或检索数据。


    ***清单 3-4.** 一个示例 AccountRepository*


    `package com.apress.prospringmvc.bookstore.repository;`


    `import com.apress.prospringmvc.bookstore.domain.Account;`


    `public interface AccountRepository {`


    `    Account findByUsername(String username);`


    `    Account findById(long id);`


    `    Account save(Account account);`

    `}`


    ### 条条大路通罗马


    如前所述，这里讨论的架构并非唯一的应用架构。哪种架构最适合给定的应用，取决于应用的规模、开发团队的经验以及应用的生命周期。团队越大，或者应用的生命周期越长，拥有清晰分层架构的重要性就越高。


    一个从单个静态页面开始的 Web 应用可能不需要任何架构。然而，随着应用的增长，我们越来越不能试图将所有内容都塞进那个单一页面，因为那样会使应用难以维护或理解，更不用说测试了。


    随着应用在规模和寿命上的增长，我们需要重构其设计，并牢记每个层或组件应该具有单一职责。如果我们检测到某些关注点应该位于不同的层，或者触及多个组件，那么我们应该将其转换为应用的一个切面（横切关注点），并使用
    AOP 将此切面应用到代码中。


    在决定如何构建我们的层时，我们应该尝试为我们的系统识别出一个清晰的 API（通过 Java 接口暴露）。为我们的系统考虑 API 会促使我们思考我们的设计，以及一个有用且可用的
    API。通常，如果一个 API 难以使用，那么它也难以测试和维护。因此，一个清晰的 API 很重要。此外，在不同层之间使用接口允许各层被独立构建和测试。这在较大的开发团队（或由多个较小团队组成的团队）中可能是一个巨大的优势。它使我们能够专注于我们正在处理的功能，而不是底层或更高层的组件。


    在设计和构建应用时，使用良好的面向对象实践和模式来解决问题也很重要。例如，我们应该利用多态和继承的优势，并且应该使用 AOP 来应用系统范围的关注点。Spring
    框架还可以帮助我们在运行时将应用组件装配在一起。总的来说，本章描述的特性和方法可以帮助我们保持代码整洁，并为我们的应用实现最佳架构。

