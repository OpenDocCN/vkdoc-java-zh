    Open `IndexController` (use Control-Shift-T and then type **IndexController**
    or use the tree to navigate to it) and navigate to Line 12 (see [Figure 1-15](#Chapter01.html#fig_1_15)).


    ![Image](images/9781430241553_Fig01-15.jpg)


    ***Figure 1-15.** The IndexController code*


    Now replace (or modify) the code on the IndexController tab, as shown in [Listing
    1-1](#Chapter01.html#list_1_1).


    ***Listing 1-1.** The IndexController with the Model Attribute*


    `package com.apress.prospringmvc.bookstore.web;`


    `import org.springframework.stereotype.Controller;`

    `import org.springframework.web.bind.annotation.RequestMapping;`

    `import org.springframework.web.servlet.ModelAndView;`


    `@Controller`

    `public class IndexController {`


    `    @RequestMapping(value = "/index.htm")`

    `    public ModelAndView indexPage() {`

    `        ModelAndView mav = new ModelAndView("/WEB-INF/views/index.jsp");`

    `        mav.addObject("theModelKey", "Spring says HI!");`

    `        return mav;`

