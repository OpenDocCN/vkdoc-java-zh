    ### 测试代码覆盖率


    使用 STS 插件 EclEmma，你可以概览测试所覆盖的代码。操作非常简单：进入 Spring 仪表盘，点击视图底部的扩展选项卡，在搜索框中输入 **eclemma**，然后安装
    EclEmma 插件（参见图 9-6）。


    _________


    ⁹ [`http://www.junit.org/`](http://www.junit.org/)


    ¹⁰ [`http://kentbeck.github.com/junit/javadoc/latest/`](http://kentbeck.github.com/junit/javadoc/latest/)


    ![Image](img/9781430241553_Fig09-06.jpg)


    ***图 9-6.** 安装 EclEmma*


    安装插件后，你可以右键点击测试，然后选择“覆盖率作为 JUnit 测试”。结果将显示在一个单独的面板中，如图 9-7 所示。如果该面板没有出现，你可以手动打开它：在
    STS 菜单栏中选择“窗口”，然后选择“显示视图”->“其他”。接着在出现的文本框中输入 **coverage**，列表中会出现一个结果：其下带有“覆盖率”的“Java”。选择“覆盖率”，然后点击“确定”。


    ![Image](img/9781430241553_Fig09-07.jpg)


    ***图 9-7.** 运行 EclEmma 后的代码覆盖率*


    我们可以清楚地看到，我们的 `DummyDao` 类已经达到了 100% 的测试覆盖率，这意味着每一行代码都被我们的测试用例执行过。根据你测试的类类型，并非总能达到
    100% 的覆盖率，但这应该是你为每个测试努力追求的目标。请注意，在某些情况下，达到 100% 覆盖率并不可行，或者根本没有必要。例如，如果你的对象有多个
    get/set 方法（由你的 IDE 生成），那么测试这些方法就有点多余，即使这会导致无法达到 100% 的覆盖率。但是，也不要过早放弃。如果因为代码依赖于资源而导致覆盖率下降，你可以使用内存资源或模拟对象，我们将在接下来的章节中讨论。


    执行覆盖率分析后，你还可以双击你测试过的实际生产类：在我们的例子中是 `DummyDao`。EclEmma 会指示哪些行已被（或未被）测试。在这次运行中，所有内容都会显示为绿色，因为每一行代码都已被测试。我们还进行了第二次运行，移除了测试方法中对
    `DummyDao` 的 `find` 方法的所有引用。我们将两次运行的结果并排放置在图 9-8 中。


    ![Image](img/9781430241553_Fig09-08.jpg)


    ***图 9-8.** EclEmma 显示已测试（绿色）和未测试（红色）的代码行*


    左侧你可以看到第一次运行中 100% 的代码覆盖率（全部为绿色）。右侧则是我们移除了测试中对 `find` 方法所有引用的运行结果。`find` 方法会显示为红色，因为它没有被我们的测试执行到。某些行左侧的菱形图标表示循环是否针对列表中的每个元素都执行了一次。例如，如果我们在
    `if` 之后添加一个 `break` 语句，循环将只运行一次，那么第一个菱形会显示为黄色，表示该分支未被完全覆盖。第二个菱形也是如此，它覆盖了 `if`
    语句。如果该语句未被执行，菱形也会显示为橙色。


    ### 使用 Spring 的测试支持


    在上一节中，你了解了如何使用 JUnit 创建基本的单元测试。这是一个非常独立的测试，不依赖于 Spring 或其他资源等任何依赖项，正如单元测试应有的样子。在本节中，我们将介绍
    Spring 的测试支持，以创建实际在测试中一起使用这些依赖项的集成测试。


    Spring 的测试支持主要涉及将 Spring 集成到你的测试中。通过几个注解，你可以加载一个 Spring 上下文，并使其可用于你的单元测试。这允许你直接在测试中注入依赖项，例如，使用自动装配。


    #### 设置我们的集成测试


    接下来，我们将设置一个集成测试，用于测试我们的 `com.apress.prospringmvc.bookstore.repository.JpaBookRepository`。我们首先在测试类路径中创建一个普通类（参见清单
    9-3）。理想情况下，你应该将测试放在与要测试的类相同的包中，但放在测试类路径而不是生产类路径（即 `src/main/java`）下。因此，我们将在 `src/test/java`
    类路径下创建一个 `com.apress.prospringmvc.bookstore.repository.JpaBookRepositoryTest`。


    ***清单 9-3.** 测试 JpaBookRepository 的集成测试的开头，位于 src/test/java*


    `package com.apress.prospringmvc.bookstore.repository;`


    `public class JpaBookRepositoryTest {`

    `}`


    为了启用 Spring 测试上下文，我们告诉 JUnit 它必须引导 Spring，方法是在类顶部添加以下注解，如清单 9-4 所示。


    ***清单 9-4.** 添加运行器以启用 Spring 的测试支持*


    `package com.apress.prospringmvc.bookstore.repository;`


    `import org.junit.runner.RunWith;`

    `import org.springframework.test.context.junit4.SpringJUnit4ClassRunner;`


    `@RunWith(SpringJUnit4ClassRunner.class)`

    `public class JpaBookRepositoryTest {`

    `}`


    `SpringJUnit4ClassRunner` 是 JUnit 的一个 Spring 特定集成类。JUnit 会检查那些带有 `@RunWith` 注解的类。当你指示要将一个类作为
    JUnit 测试运行时，该测试类会作为参数传递给 JUnit 运行时（在我们的例子中，这是由 IDE 完成的）。然后 JUnit 会扫描 `@RunWith`
    注解。在我们的例子中，它将执行 `org.springframework.test.context.junit4.SpringJUnit4ClassRunner`。这个类将通过使用
    Spring 的 `org.springframework.test.context.TestContextManager` 和 `org.springframework.test.context.TestContext`
    来启动 Spring 的测试支持。这将启用所有 Spring 功能，例如加载你的应用程序上下文（基于 `@ContextConfiguration`，我们将在后面看到）、启用自动装配以及执行
    `org.springframework.test.context.TestExecutionListener` 的实现。后者是特殊的监听器，可以在测试类初始化之前、运行测试类之前以及运行测试类中的测试方法之前执行。它们可以使用
    `TestExecutionListener` 注解进行注册。默认注册了三个监听器：


    > *   `org.springframework.test.context.support.DependencyInjectionTestExecutionListener`

    > *   `org.springframework.test.context.support.DirtiesContextTestExecutionListener`

    > *   `org.springframework.test.context.transaction.TransactionalTestExecutionListener`


    就我们这里的目的而言，只有最后一个监听器是相关的，因为它将管理我们测试中的事务；我们稍后会讨论这一点。


    最后，我们必须指明要为我们的测试类加载哪个（测试）上下文。此时你有两个选择：


    > *   一种方法是加载一个或多个生产上下文。这些是你的应用程序实际使用的上下文。如果你想区分测试运行和实际应用程序运行，可以使用 Spring 配置文件。

    > *   你也可以选择仅为你的测试设置特定的上下文。这样你就可以精确指定你需要哪些资源。


    每种方法都有其优缺点，因此你应该根据你的应用程序以及你要测试的内容来权衡，以确定哪种方法最佳。你的 Spring 配置（无论是注解类还是 XML 配置文件）越模块化，就越容易将这两种方法结合起来。当你有一个列出你的仓库的
    Spring 配置，但有一个单独的数据源配置时，你可以在测试中加载仓库的生产配置，同时为数据源组合一个单独的测试上下文（在这种情况下，该上下文将指向一个内存数据库）。'
- fmt: 'When you have identified which contexts you want to load, you can use the
    `@ContextConfiguration` annotation on top of the class to specify them. Using
    this annotation you can either specify a context XML file, using the `locations`
    attribute (which takes an array of XML config files) or the `classes` attribute,
    which takes an array of `@Configuration` classes to load the context. You *cannot*
    use both. If you want to mix XML and classes, you have to load the one from the
    other. That means that if you want to work with XML, but also need to load `@Configuration`
    classes, you have to load them from one of the XML context files. If you are working
    with `@Configuration` classes, you have to use `@ImportResource` in one of these
    classes to load the desired XML config file.


    We are going to use our production context classes, so we will use the `classes`
    attribute (see [Listing 9-5](#Chapter09.html#list_9_5)).


    **Listing 9-5.** Adding the context configuration for loading our Spring config


    ```

    package com.apress.prospringmvc.bookstore.repository;


    import org.junit.runner.RunWith;

    import org.springframework.test.context.junit4.SpringJUnit4ClassRunner;

    import com.apress.prospringmvc.bookstore.config.InfrastructureContextConfiguration;

    import com.apress.prospringmvc.bookstore.config.TestDataContextConfiguration;

    import org.springframework.test.context.ContextConfiguration;


    @RunWith(SpringJUnit4ClassRunner.class)

    @ContextConfiguration(classes = { InfrastructureContextConfiguration.class, TestDataContextConfiguration.class
    })

    public class JpaBookRepositoryTest {


    }

    ```


    That is all. When you run the test as a JUnit test, the Spring context will be
    booted thanks to the Spring test support (which is itself initially booted by
    the `SpringJUnit4ClassRunner`). In our case this means that all repositories and
    services are loaded into the context, and an in-memory database is started and
    prepopulated with data.


    In this section we are only going to test the `JpaBookstoreRepository`. But there
    are plenty of other classes to test. We will create a matching test for each of
    them and apply the same annotations to load the context for each test class.


    **Note** Instead of repeating the annotation configuration for each test class
    independently, we could have moved it to a common superclass from which each test
    could extend. This would have saved us repeating the same annotation configuration
    in each test class. The same goes for JUnit annotations, like the ones we saw
    before (`@Before`, `@After`, and so on). However, to make every class complete
    by itself we duplicated the configuration. Also, you should not create superclasses
    merely to avoid repeating annotation configuration. Only do that if the classes
    have something more in common. For example, to test your repositories you could
    set up a superclass that has the annotation configuration and sets up a minimal
    data set useful for all repository tests. Creating superclasses containing only
    annotation configuration can quickly result in the wild growth of those classes
    and make your code less clear.


    Because this is a small project, the context almost loads instantly. For bigger
    projects, that might take some more time. To make sure the context is not loaded
    separately for each class independently, the Spring Test Framework provides consistent
    loading of Spring application contexts and caching of those contexts. Support
    for the caching of loaded contexts is important, because startup time can become
    an issue, not because of Spring itself, but because the objects instantiated by
    the Spring container take time to instantiate. For example, a project with many
    Hibernate mapping files might take several seconds to load because of the parse
    time required for each of the mapping files. If the context is only loaded once,
    an extra load time of 5 seconds won’t be noticeable. But if it loaded for each
    test individually (and you have 200 tests, for example) then 5 seconds extra load
    time means that your test set runs 16 minutes longer without any good reason.
    If your tests run slowly, this starts to degrade your infrastructure, which could
    then result in excuses not to write tests “because they run so slow.” It is important
    to keep your test set lean and mean, so that it costs as little time as possible
    to run the test set.


    By default, once the configured `ApplicationContext` is loaded, it is reused for
    each test. Thus the setup cost is incurred only once (per test suite), and subsequent
    test execution is much faster. In this context, the term *test suite* means all
    tests run in the same JVM. However, when you run tests from STS one by one, this
    means the application context will be booted separately for each of them. The
    solution (using JUnit) is to build a suite, or run them using your build tool,
    in our case Gradle. In that case the application context will only be loaded once
    for all tests that are run. Building the chapter9 sample project with Gradle will
    automatically run the tests. You start the build by first going into the chapter9
    sample directory, and then issue following Gradle command:


    ```

    $ gradle build

    ```


    The output will look similar to this:


    ```

    :bookstore-shared:compileJava UP-TO-DATE

    --further gradle output omitted for brevity--

    :chapter9-bookstore:testClasses

    :chapter9-bookstore:test

    22:30:31.392 [Thread-15] INFO  o.s.c.s.GenericApplicationContext - Closing

    org.springframework.context.support.GenericApplicationContext@39518cc: startup
    date [Thu Mar

    29 22:30:28 CEST 2012]; root of context hierarchy

    22:30:31.397 [Thread-15] INFO  o.s.b.f.s.DefaultListableBeanFactory – Destroyi

    -- further gradle output omitted for brevity--

    22:30:31.401 [Thread-15] INFO  o.s.o.j.LocalContainerEntityManagerFactoryBean
    - Closing JPA

    EntityManagerFactory for persistence unit ''bookstore''

    :chapter9-bookstore:check

    :chapter9-bookstore:build


    BUILD SUCCESSFUL


    Total time: 17.033 secs

    ```


    In the above example all tests were run by Gradle, and thus share a single application
    context instance. In the unlikely case that a test corrupts the application context
    (for example by modifying a bean definition or the state of an application object)
    and requires reloading, Spring’s test support can be configured to reload the
    configuration and rebuild the application context before executing the next test.
    The latter can be accomplished by putting the `@DirtiesContext` annotation on
    the class, or even the test method, that is altering the application context.
    The next test class (or test method) will get a refreshed application context.
    You can also inject the `ApplicationContext` directly if that would be required
    (see [Listing 9-6](#Chapter09.html#list_9_6)).


    **Listing 9-6.** If required, the application context can be autowired.


    ```

    @Autowired

    Private ApplicationContext ApplicationContext

    ```


    Because we enabled Spring’s test support, we now enabled Spring for our test cases
    with the supplied configuration. All Spring features are now enabled from out
    tests. We can for example autowire any bean directly in our tests that is loaded
    in our Spring configuration. Our test class has now become fully Spring-aware.'
