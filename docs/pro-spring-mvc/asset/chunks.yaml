  raw: '#### Aspect-Oriented Programming


    To enable the features listed in [Table 2-4](#Chapter02.html#tab_2_4), Spring
    uses aspect-oriented programming (AOP). AOP is another way of thinking about the
    structure of software. It enables you to modularize things like transaction management
    or performance logging, features that span multiple types and objects (crosscutting
    concerns). In AOP, there are a couple important concepts to keep in mind (see
    [Table 2-7](#Chapter02.html#tab_2_7)).


    ![Image](images/tab_2_7.jpg)


    Now let’s take a look at transaction management and how Spring uses AOP to apply
    transactions around methods. The transaction advice, or interceptor, is `org.springframework.transaction.interceptor.TransactionInterceptor`.
    This advice is placed around methods with the `org.springframework.transaction.annotation.Transactional`
    annotation. To do this, Spring creates a wrapper around the actual object, which
    is known as a *proxy* (see [Figure 2-5](#Chapter02.html#fig_2_5)). A proxy acts
    like an enclosing object, but it allows (dynamic) behavior to be added (in this
    case the transactionality of the method).


    ![Image](images/9781430241553_Fig02-05.jpg)


    ***Figure 2-5.** A proxy method invocation*


    The `org.springframework.transaction.annotation.EnableTransactionManagement` annotation
    will register the beans containing the pointcut (acting on the `org.springframework.transaction.annotation.Transactional`
    annotation). At this point, the interceptor is ready for us to use. The other
    annotations for enabling features work in a similar way; they register beans to
    enable the desired feature, including AOP (and thus proxy creation) for most features.


    ### Web Applications


    So how does all the aforementioned technology apply to a web application? For
    example, how do application contexts play a role? And what about all the other
    things mentioned?


    When developing a web application, we have our actual business logic (e.g., our
    services, repositories, and infrastructure information), and we have our web-based
    beans. These things should be separated, so we need to have multiple application
    contexts and have a relationship between them.


    We also need code that bootstraps our application, or else nothing will happen.
    In this chapter’s examples, we used a class `MoneyTransferSpring` with a `main`
    method to start the application context. This is not something we can do in a
    web environment. Spring ships with two components that can bootstrap an application:
    `org.springframework.web.servlet.DispatcherServlet` and `org.springframework.web.context.ContextLoaderListener.`
    Both components will bootstrap and configure an application context.


    Let’s take a look at the class that configures `DispatcherServlet`. This is the
    `com.apress.prospringmvc.bookstore.web.BookstoreWebApplicationInitializer` class
    (see [Listing 2-12](#Chapter02.html#list_2_12)). This class is detected by our
    Servlet 3.0 container, and it’s used to initialize our application (see Chapter
    3 for more information on this topic). We create the `DispatcherServlet` and pass
    it `org.springframework.web.context.support.AnnotationConfigWebApplicationContext`.
    Next, we map the servlet to everything (the “/”) and tell it to load on startup.


    ***Listing 2-12.** The BookstoreWebApplicationInitializer class*


    `package com.apress.prospringmvc.bookstore.web;`


    `import javax.servlet.ServletContext;`

    `import javax.servlet.ServletException;`

    `import javax.servlet.ServletRegistration;`


