    #### 流程继承


    你可以让一个流程继承由另一个或一组流程定义的元素。通过使用 `parent` 属性来标记每个包含你想要继承元素的流程，即可声明这种继承关系。一个常见的用例是让父流程定义全局转换和异常处理器。该流程应被视为父流程与当前（子）流程的合并。与
    Java 不同，你*可以*从多个父流程继承。只需用逗号分隔每个流程；顺序无关紧要（参见清单 12-1）。


    ***清单 12-1** 流程继承允许一个流程拥有多个父流程*


    `<flow parent="global-initialization-flow, global-actions-flow"/>`


    ![Image](img/square.jpg) **提示** 假设你有多个流程共享大量通用功能。在这种情况下，你可以将通用功能从各个流程中移出，放入一个*父流程*中。然后，你可以让每个子流程继承该父流程。然而，如果你这样定义，父流程将像其他任何流程一样是一个普通流程（它需要有一个
    id，并在 Web Flow 中注册等）。这也意味着你将能够启动父流程，因为它是一个独立的流程。但在这种情况下这样做没有意义，因为父流程必须始终与某个子流程结合使用。应该启动的是子流程，而不是它们共有的父流程。请注意，你可以将父流程声明为
    `abstract`。这将告诉 Web Flow 禁止启动该流程的执行（无论是顶层流程还是通过子流程）。但是，如果从这样的流程继承，子流程可以正常作为顶层流程或子流程启动。你可以通过将流程根元素上的
    `abstract` 属性设置为 `true` 来实现这一点。


    Web Flow 将从子流程及其所有父流程创建一个*合并后*的流程。重复元素的规则分为*可合并*和*不可合并*元素。如果元素相似，可合并元素将始终尝试合并在一起。父流程或子流程中的不可合并元素将原封不动地保留在最终流程中；它们不会作为合并过程的一部分被修改。


    当满足以下条件时，元素被视为可合并：


    *   它们的关键属性匹配：如果不匹配，则归入不可合并类别，并按原样保留在合并后的流程中。关键属性是 Web Flow 识别为用于可合并性匹配的元素属性。换句话说，当父流程和子流程中存在相同的元素类型，并且该属性的值匹配时，该元素被视为可合并。

    *   它们被标记为 `始终合并`（参见表 12-1）：在这种情况下，可合并元素无论如何都会被合并。此时，没有需要首先匹配的*关键*属性。


    例如，清单 12-2 展示了一个虚构的流程，它有一个包含两个转换的 `view` 状态。关注继承方面，`view` 状态渲染哪个视图并不重要，每个转换转向哪个状态也不重要。


    ***清单 12-2.** 一个具有单个视图状态和两个转换的流程*


    `<flow`


    `      xsi:schemaLocation="http://www.springframework.org/schema/webflow`

    `        http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd">`


    `    <view-state id="someViewState" view="someView" >`

    `        <transition on="x" to="someState"/>`

    `        <transition on="y" to="someOtherState"/>`

    `    </view-state>`

    `</flow>`


    如果我们将其拆分为两个流程，例如一个父流程和一个子流程，那么它将如清单 12-3 和 12-4 所示。


    ***清单 12-3.** 父流程，包含两个转换中的一个*


    `<flow`


    `      xsi:schemaLocation="http://www.springframework.org/schema/webflow`

    `        http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd"`

    **`abstract="true">`**


    `    <view-state id="someViewState" view="someView" >`

    `        <transition on="x" to="someState"/>`

    `    </view-state>`

    `</flow>`


    ***清单 12-4** 子流程，包含另一个转换并继承自父流程*


    `<flow`


    `      xsi:schemaLocation="http://www.springframework.org/schema/webflow`

    `        http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd"`

    **`parent="parent-flow"`**`>`


    `    <view-state id="someViewState" view="someView" >`

    `        <transition on="y" to="someOtherState"/>`

    `    </view-state>`

    `</flow>`


    清单 12-3 中列出的父流程不能直接启动，因为它被声明为 `abstract`。清单 12-4 中列出的子流程可以直接启动。由于子流程继承自父流程，Web
    Flow 将扫描可合并元素。它会发现，在父流程和子流程中，都存在一个 id 为 `someViewState` 的 `view` 状态。现在它将合并 `view`
    状态，组合其内部的所有元素。这将产生一个看起来与原始流程相同的合并后流程（参见清单 12-5）。


    ***清单 12-5.** 合并后的流程*


    `<flow`


    `      xsi:schemaLocation="http://www.springframework.org/schema/webflow`

    `        http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd">`


    `    <view-state id="someViewState" view="myView" >`

    `        <transition on="x" to="someState"/>`

    `        <transition on="y" to="someOtherState"/>`

    `    </view-state>`

    `</flow>`


    这个合并后的流程在物理上并不存在；相反，它是在 Web Flow 启动并扫描你的流程定义时在内存中生成的。物理上，你只有父流程和子流程。在这个例子中，`view`
    状态是一个可合并元素，因为它具有相同的 id，而 id 是 Web Flow 决定合并该元素的 `view` 状态的关键属性。如果 id 值不同，那么 Web
    Flow 会将父流程中的元素原封不动地复制并粘贴到合并后的流程中。


    在表 12-1 中，你可以看到不同的元素及其关键属性。如果子流程和父流程中都存在一个具有相同关键属性的元素，则该元素将被标记为合并。否则，该元素将完全按原样放入合并后的流程。如果一个元素的关键属性是
    `始终合并`，这意味着不需要匹配特定属性，并且父流程和子流程之间相同类型的元素始终合并。


    ![Image](img/tab_12_1.jpg)


    ![Image](img/tab_12_1a.jpg)


    以下是不可合并元素：`bean-import`、`evaluate`、`exception-handler`、`persistence-context`、`render`、`set`
    和 `var`。如前所述，它们会原封不动地成为合并后流程的一部分，并从父流程整体复制粘贴到合并后的流程中。


    在表 12-1 中未标记为关键属性，并且在父流程和子流程的元素上都有指定的属性，将被子流程覆盖。例如，考虑 `<view-state>` 元素的 view
    属性。当父流程包含 `<view-state id="x" view="a">` 且子流程包含 `<view-state id="x" view="b">`
    时，该元素符合合并条件，因为 `view` 状态的 id 匹配。因此，每个子元素都将从父流程继承；但在这种情况下，view 属性在父流程和子流程中定义的值不同。合并后的流程在渲染时将导航到视图
    `"b"`。

