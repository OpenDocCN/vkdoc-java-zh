    ### Summary


    In this chapter, we covered the bare basics of Spring Core. We reviewed the concept
    of dependency injection and briefly covered three different versions of dependency
    injection. We also covered constructor-based, setter-based, and annotation-based
    dependency injection.


    Next, we stepped into the Spring world and examined `org.springframework.context.ApplicationContext`s,
    including the role they play in our application. We also explained the different
    types of application contexts (e.g., XML or Java based) and the resource loading
    in each of them. In our web environment, we use a specialized version of an application
    context in an implementation of the `org.springframework.web.context.WebApplicationContext`
    interface. We also covered how, by default, beans in an application context are
    singleton scoped. Fortunately, Spring provides us with additional scopes, such
    as request, session, globalSession, prototype, application, and thread.


    To be able to use different configurations in different environments, Spring also
    includes profiles. We briefly explained both how to enable profiles and how to
    use them. We will use profiles in our sample application when we test it (see
    [Chapter 9](#Chapter09.html#ch9)) and when we deploy it to Cloud Foundry (see
    [Appendix A](#Appendix.html#appA)).


    We also delved into the way several enabling annotations are required for Spring
    to enable certain features. These annotations register additional beans in the
    application context that enable the desired feature. Most of these features rely
    on AOP to be enabled (e.g., to do declarative transaction management). Spring
    creates proxies to apply AOP to beans registered in our application contexts.


    In the next chapter, we will look at the architecture of an MVC web application,
    the different layers, and what roles they play in our application.


    ## C H A P T E R  3


    ## Web Application Architecture


    Before we start our journey into the internals of Spring MVC, we first need to
    understand the different layers of a web application. And we’ll begin that discussion
    with a brief introduction of the MVC pattern in general, including what it is
    and why should we use it. We will also cover some of the interfaces and classes
    provided by the Spring Framework to express the different parts of the MVC pattern.


    After reviewing the MVC Pattern, we will go through the different layers in a
    web application and see what role each layer plays in the application. We will
    also explore how the Spring Framework can help us out in the different layers
    and how we can use it to our advantage.'
