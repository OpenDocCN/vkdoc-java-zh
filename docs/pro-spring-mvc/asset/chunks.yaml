    **`         http://www.springframework.org/schema/security/spring-security-`**![Image](img/U002.jpg)
    **`         3.1.xsd"`**`>` 每个安全特性都将使用命名空间前缀“security”。    ![Image](img/square.jpg)
    **注意** 你也可以将 Spring Security 命名空间设为默认命名空间。这里我们选择将核心 Spring beans 功能的命名空间设为默认，这也是我们所有其他
    Spring 配置文件的默认设置。不过，在这种情况下，交换它们也是可行的，因为这是一个专门用于 Spring Security 的配置文件，你将使用更多的
    Spring Security 元素，而不是 bean 命名空间的元素。在这种情况下，你可以去掉“security”前缀，因为所有安全元素都可以在默认命名空间中访问，无需任何前缀。当安全配置很多时，这可以使你的
    XML 看起来更简洁。    __________    ² [`http://markmail.org/message/5q7gpipxdiqxsu6p?q=+list:org.apache.tomcat.dev`](http://markmail.org/message/5q7gpipxdiqxsu6p?q=+list:org.apache.tomcat.dev)    接下来，我们需要定义
    `DelegatingFilterProxy` 将委托给的“delegate”。这通过 `<security:http>` 元素完成，如清单 13-4 所示。    ***清单
    13-4:** Spring Security 命名空间过滤器链配置*  `<security:http>` `     <security:form-login
    login-page="/public/authentication/login.htm" default-target-`![Image](img/U002.jpg)
    `url="/public/main.htm"/>` `</security:http>`  这个元素的作用是创建一个过滤器链，并将其以默认的 bean ID
    `springSecurityFilterChain` 注册到应用上下文中。`DelegatingFilterProxy` 将使用过滤器的名称来查找这个 bean，并将控制权委托给它。如果你将过滤器命名为
    `someFilter`，它将查找 bean ID 为 `someFilter` 的过滤器链，这将导致找不到 bean。在继续之前，我们需要解释一下 Spring
    Security 过滤器链是什么以及它将为我们做什么。    过滤器链是捕获请求和处理待办事项的核心组件。Spring Security 主配置中的几乎所有内容都由过滤器链中的一个过滤器处理。你可以随意插入或移除过滤器，每个过滤器都有特定的工作（参见图
    13-3）。  ![Image](img/9781430241553_Fig13-03.jpg)  ***图 13-3.** 过滤器委托给已配置的应用过滤器链*    在清单
    13-4 中，我们隐式配置了一个元素，如果用户在未认证的情况下访问受保护的资源，该元素会将用户发送到 `login.htm`（由 `login-page`
    属性指定）页面。当用户登录时，过滤器会自动将用户重定向回请求的受保护资源。或者，如果用户之前没有请求过安全页面，而是直接通过登录页面登录，则用户可能会被重定向到
    `main.htm`，该页面会渲染主页（由 `default-target-url` 属性定义）。在这种情况下，我们还会发送一个参数，指示认证成功。相关的主页面将检测到这一点，并显示一条消息，表明认证过程成功。这个元素会导致一个过滤器被添加到过滤器链中，以处理此问题。    虽然你可以插入自己的自定义过滤器，但许多现有的过滤器已经可供你使用。讨论所有这些过滤器超出了本书的范围，但你可以在
    Spring Security 参考手册^(3) 中找到关于它们的更多信息。    为了方便起见，我们在表 13-2 中列出了完整的列表。这将让你了解哪些功能已经可供你使用。如果你定义了过滤器，bean
    别名对于引用该过滤器非常重要。例如，如果你添加了自己的自定义过滤器，你将能够将它们放置在链中。可以使用 `<security:custom-filter />`
    元素定义自定义过滤器，例如 `<security:custom-filter ref="myCustomFilter"/>`。通过显式引用这些过滤器，你可以将它们放置在特定过滤器之前或之后。例如，如果你想将
    `myCustomFilter` 放置在 `FORM_LOGIN_FILTER` 之后，可以将其定义为  ` <security:custom-filter
    ref="myCustomFilter" after="FORM_LOGIN_FILTER"/>`  命名空间元素或属性是触发在链中添加过滤器的配置元素。表中的过滤器按照你定义它们时在链中的顺序列出。    ![Image](img/9781430241553_Tab13-02.jpg)    ![Image](img/9781430241553_Tab13-02a.jpg)    __________    ³
    [`http://static.springsource.org/spring-security/site/docs/3.1.x/reference/springsecuritysingle.html#filter-stack`](http://static.springsource.org/spring-security/site/docs/3.1.x/reference/springsecuritysingle.html#filter-stack)    事实证明，我们在清单
    13-4 中已经通过添加以下内容配置了一个过滤器：  `<security:form-login login-page="/public/authentication/login.htm"
    default-target-`![Image](img/U002.jpg) `url="/public/main.htm"/>`  如果你查看表 13-2，你会看到
    `http/form-login` 配置了 `UsernamePasswordAuthenticationFilter`。此过滤器将利用前面描述的将用户重定向到登录页面或索引页面的功能。顾名思义，它还涵盖了其他功能，我们将在后面讨论。    ####
    定义要保护的资源    接下来，我们必须告诉 Spring Security 应该保护哪些资源。这再次通过隐式地向过滤器链添加一个过滤器来完成。我们不声明新的过滤器，而是使用
    Spring Security 提供的现有过滤器。我们将使用安全命名空间中的一个元素：`<security:intercept-url>`。如果你查看表 13-2，你会看到这个元素（`intercept-url`）匹配
    `ChannelProcessingFilter`，并且将是 `http` 元素的子元素。当我们指定 `<security:intercept-url>`
    时，Spring Security 会自动将此过滤器添加到链中。如果输入的资源的模式与请求的资源匹配，该过滤器将执行认证检查。    此时，我们混合了流程和页面，后者由
    Spring MVC 控制器直接控制。为了完整性，我们将在此列出它们。对于每个资源，我们将指明它应该是公开访问还是私有访问（仅限经过认证的访问）。让我们从表
    13-3 中的流程开始。    ![Image](img/9781430241553_Tab13-03.jpg)    接下来，在表 13-4 中，我们将列出在
    Spring MVC 控制器中存在 `@RequestMapping` 的 URL。我们再次定义它们是应该公开访问还是仅在认证后才能访问。    ![Image](img/9781430241553_Tab13-04.jpg)    为了组织需要公开或认证访问的页面，我们将它们分组到
    `WEB-INF/view/public` 和 `WEB-INF/view/secured` 下。    #### 配置对资源的访问    清单 13-5
    显示了将上述访问规则转换为我们的 XML 配置，并将其添加到我们在清单 13-4 中已经构建的基础配置中。    ***清单 13-5.** 基于我们想要显式配置的请求
    URI 添加 intercept-url 规则*  `<security:http use-expressions="true" >` `<security:form-login
    login-page="/public/authentication/login.htm"` ![Image](img/U002.jpg) `    default-target-url="/public/main.htm"`![Image](img/U002.jpg)
    `    authentication-failure-url="/public/authentication/login.htm"  />`  `    <security:intercept-url
    pattern="/index.jsp" access="permitAll" />`  `    <security:intercept-url pattern="/public/**"
    access="permitAll" />` `    <security:intercept-url pattern="/secured/**" access="fullyAuthenticated"/>`  `    <security:intercept-url
    pattern="/**" access="denyAll" />` `</security:http>`  此清单应从上到下阅读。这意味着你应该首先指定更具体的规则，然后是更通用的规则。如果资源与某个模式匹配（无论是直接匹配还是通过模式中指定的通配符匹配），则需要
    `access` 属性指定的认证级别。如果满足该条件，则授予访问权限；否则拒绝访问。    首先，我们声明 `index.jsp`（我们的欢迎文件）对所有人开放。接下来，我们定义了
    `/secured/**` 和 `/public/**` 匹配模式。默认情况下，使用 ant^(**4**) 风格的匹配模式。每个以 `/secured`
    开头的 URL 都要求用户在授予访问权限之前进行完全认证。以 `/public` 开头的 URL 可以被任何人访问。我们稍后将讨论 `access` 属性以及这些值的来源。    回想一下，我们的流程与页面放在一起。要启动
    `ordersOverviewflow`，你需要完全认证，因为该流程的路径是 `secured/ordersOverview`。因此，我们不需要指定额外的规则，因为对
    `/secured` 下任何内容的访问都将被我们的 `/secured/**` 规则捕获。    但是，如果你将流程存储在单独的位置，例如 `WEB-INF/flows`
    下，并且你使用 `<webflow:flow-registry>` 的 `base-path` 属性将 `WEB-INF/flows` 设为基础路径，那么你必须遵循相同的约定。也就是说，你必须将受保护的流程放在
    `flows/secured` 下，将公共流程放在 `flows/public` 下。如果你不这样做，例如将所有流程放在 `/flows` 下，你将不得不为每个流程添加单独的
    `<security:intercept-url>` 规则。    如果我们请求访问 `/createOrders-flow`，我们不需要认证即可访问。但是，如果我们尝试访问
    `/placeOrders-flow`，我们首先需要进行认证。如果我们未认证，我们将被重定向到登录页面。登录成功后，Spring Security 会将我们带回我们最初请求的受保护资源（在本例中为
    `/placeOrders-flow`）。    你可能还注意到，我们在 `<security:http>` 元素中添加了一个名为 `use-expressions`
    的属性，其值为 `true`。我们还需要解释 `fullyAuthenticated`、`permitAll` 和 `denyAll` 这些值突然从何而来。在此之前，我们必须更详细地解释
    Spring Security 的工作原理。    每当 `<security:intercept-url>` 匹配到传入的请求 URL 时，Spring
    Security 需要知道应该检查哪些条件以授予或拒绝访问。这些条件由一个所谓的 `org.springframework.security.access.AccessDecisionManager`
    检查。`AccessDecisionManager` 又拥有一个或多个 `org.springframework.security.access.AccessDecisionVoter`
    实例。每个投票者将评估访问是被授予、弃权还是拒绝。这由 `AccessDecisionVoter` 的 `vote` 方法的返回值指示。该返回值是一个原始的
    `int`，可以是以下常量之一：`AccessDecisionVoter.ACCESS_ABSTAIN,` `AccessDecisionVoter.ACCESS_DENIED`,
    或 `AccessDecisionVoter.ACCESS_GRANTED`    __________    ⁴ [`http://static.springsource.org/spring/docs/3.1.0.RELEASE/javadocapi/org/springframework/util/AntPathMatcher.html`](http://static.springsource.org/spring/docs/3.1.0.RELEASE/javadocapi/org/springframework/util/AntPathMatcher.html)    `AccessDecisionManager`
    接口有三种实现。我们将使用 `org.springframework.security.access.vote.AffirmativeBased`。如果至少有一个投票者返回
    `ACCESS_GRANTED`，这个 `AccessDecisionManager` 将允许访问。另外两个是 `org.springframework.security.access.vote.ConsensusBased`^(**5**)
    和 `org.springframework.security.access.vote.UnanimousBased`。^(6) 更多详细信息请参见它们各自的
    JavaDoc。    `http` 元素的 `access-decision-manager-ref` 属性是引用 `AccessDecisionManager`
    的方式。但是，当定义 `use-expressions` 属性时，会自动为我们添加一个 `AffirmativeBased` 的 `AccessDecisionManager`。因此，我们无需自己配置
    `AccessDecisionManager`，因此我们可以省略 `access-decision-manager-ref` 属性。使用的 `AccessDecisionVoter`
    是 `org.springframework.security.web.access.expression.WebExpressionVoter`，它将帮助解析你可以在
    `access` 属性中使用的 (SpEL) 表达式。    至此，我们已经配置了 Spring Security，以便它拦截每个请求并扫描我们的 `<security:intercept-url>`
    条目列表。如果请求的资源与任何列出的条目匹配（无论是直接匹配还是通过通配符匹配），则会检查 access 属性以确定需要做什么。如果 access 属性是
    `permitAll`，则始终授予访问权限。如果 access 属性是 `fullyAuthenticated`，则用户必须经过认证才能被允许访问。如果不是这种情况，用户将自动重定向到登录页面。登录后，用户将被重定向回受保护的资源。    最后，如果请求的资源与任何条目都不匹配，则默认情况下使用
    `denyAll` 的 `access` 属性拒绝访问。默认情况下，这将呈现服务器的默认“403 访问被拒绝”页面。因此，访问一个随机的 URL 将显示此页面。即使用户登录后，访问一个随机的
    URL 仍然会触发“访问被拒绝”页面，因为没有先前的规则明确*授予*访问权限。所有未显式列出的资源现在默认情况下都禁止任何用户访问。    ![Image](img/square.jpg)
