  raw: '#### The Build System


    The topic of how to build applications has been subject to decades of arguments,
    fanaticism, and downright stupidity. We could have taken the easy way out and
    avoided this discussion by building and deploying entirely with the SpringSource
    Tool Suite (STS), which we will discuss later in this chapter. However, the authors
    felt that was a disservice to you. STS is sufficient for managing a developer’s
    workflow, but it isn’t quite sufficient for the operational management aspects.
    Typically, an application is built using one mechanism (the IDE), while an entirely
    different mechanism is used to deploy it to production. This is often a source
    of frustration, and it leads to the wonderful “works on my machine” syndrome.


    With this in mind, our strong opinion is that it is the developer’s responsibility
    to ensure that an application works in an environment as close to production as
    possible, *including the build mechanism itself!* You will see how sophisticated
    build tools make that possible. The build tool you are going to use in this book
    is Gradle ([`http://gradle.org`](http://gradle.org)`)`. This is a fairly new but
    up-and-coming *project-automation* tool (project automation is a fancy term for
    *build tool*) that has a strong pedigree and has already established a very good
    reputation. A full discussion on build tools is outside the scope of this book;
    however, suffice it to say that Gradle combines the power of Maven’s “configuration
    over convention” approach with the succinctness of Groovy.


    ![Image](images/square.jpg) **Note** The Gradle project won the 2010 Springy Award
    for Most Innovative Product/Project^([1](#Chapter01.html#CHP-1-FN-1)) and was
    a finalist in the 2011 JAX Innovation Awards election.


    ____________


    ¹ [`http://www.springsource.org/node/2871`](http://www.springsource.org/node/2871)


    The Gradle infrastructure is driven by a `build.gradle` script (this is somewhat
    equivalent to Maven’s `pom.xml`) and an optional `settings.gradle` file`;` both
    can be found in the `SAMPLE_ROOT` directory.


    ![Image](images/square.jpg) **Tip** If you prefer to use Maven, please note that
    Gradle is perfectly capable of generating Maven POMs (project object models).
    For more information, read “Maven POM generation” at [`http://gradle.org/maven_plugin.html`](http://gradle.org/maven_plugin.html).


    ##### Dependency Management


    Java’s strength is its ecosystem. The wealth of high quality libraries is the
    currency used to pay for the language’s verbosity and pain. However, its greatest
    strength is, as ever, its greatest weakness: it isn’t unusual for small-to-medium
    projects to have a dependency graph of more than 50 libraries. This proliferation
    of libraries is made worse by the correct use of modularization!


    The problem with the dependencies is that the dependencies also have dependencies,
    which also have dependencies, which also... Well, you probably get the point.
    There are direct dependencies (dependencies for the project) and transitive dependencies
    (dependencies needed by the direct dependencies). However, that isn’t the only
    problem because there is also something that could be called *versioning hell*.
    If there are multiple dependencies and these dependencies have a dependency on
    both library x and on different versions of that library, this presents an additional
    challenge. But, wait, there’s more! You don’t want to sit at your computer and
    Google for all the missing (transitive) dependencies, download them, redeploy
    your application, and *then* notice you have still another missing dependency
    (or maybe the wrong version of a dependency).


    Dependency management helps you out here. For example, it helps you with downloading
    and discovering what you need, and it tries to resolve all of the versioning conflicts.
    In this case, you can let the computer do the hard work for you, and you can focus
    at the task at hand, which is solving the business problem—selling books, in this
    book’s example (not searching for dependencies late into the night).


    ![Image](images/square.jpg) **Note** Gradle’s dependency management infrastructure
    is compatible with the somewhat industry-standard Maven repositories—and it has
    excellent support for resolving dependencies.


    ##### The Gradle Build File


    Gradle is more than a dependency-management tool, as already mentioned. It is
    also a build tool; and, as such, it can do a lot for you. For example, if you
    open the `build.gradle` file, you’ll see the dependencies needed by all the subprojects.
    Gradle can also help you build (compile, test, and create a war archive) your
    application, and the Groovy language can be used to easily modify or influence
    the way you build your application. To help build the application, there is a
    plugin that can deploy the application to an embedded Tomcat instance. This instance
    can, in turn, be used to run the integration tests (see [Chapter 9](#Chapter09.html#ch9)).


    These functions are just the beginning of what Gradle can provide. If you are
    interested in more complex builds, try reading the Gradle reference guide^([2](#Chapter01.html#CHP-1-FN-2))
    or taking a look at the Gradle build^([3](#Chapter01.html#CHP-1-FN-3)) as used
    by the Spring Framework^([4](#Chapter01.html#CHP-1-FN-4)) (yes, even SpringSource
    uses Gradle).


    #### Building the Sample Application


    To build the sample, cd into the `SAMPLE_ROOT` directory and execute the `gradlew`
    script. Assuming you are on Unix system, this will look something like [Figure
    1-2](#Chapter01.html#fig_1_2).


    ![Image](images/9781430241553_Fig01-02.jpg)


    ***Figure 1-2.** The initial build output*


    You will notice the first thing that the `gradlew` script does is download the
    Gradle distribution itself! This is why there is no “install gradle” step—it is
    self-installing.


    ![Image](images/square.jpg) **Note** We recommend checking the `gradlew` script
    into source control. The Continuous Integration (CI) server and (as well as other
    developers) all use this script. Upgrading to a new version of Gradle is as simple
    as updating the `gradlew` script which, when executed, will silently upgrade itself.


    ____________


    ² [`http://www.gradle.org/docs/current/userguide/userguide.html`](http://www.gradle.org/docs/current/userguide/userguide.html)


    ³ [`https://github.com/SpringSource/spring-build-gradle`](https://github.com/SpringSource/spring-build-gradle)


    ⁴ [`https://github.com/SpringSource/spring-framework`](https://github.com/SpringSource/spring-framework)


    ![Image](images/square.jpg) **Note** Speaking of upgrades; at the time of writing,
    v1.0 hadn’t been released, so the code in this book relies on the latest milestone:
    milestone 9\. Your output might differ slightly.


    After Gradle has downloaded itself, you should build the sample application by
    executing `../gradlew build` (see [Figure 1-3](#Chapter01.html#fig_1_3)).


    ![Image](images/9781430241553_Fig01-03.jpg)


    ***Figure 1-3.** Building ample application output*


    Notice how Gradle downloaded the sample dependencies and went through the lifecycle
    of compiling, testing, and packaging the sample application. Similar to Maven,
    Gradle contains a local cache of JARs (a `.gradle` directory in your home folder).
    Subsequent executions are much faster because no network access is required (see
    [`http://gradle.org/documentation`](http://gradle.org/documentation) for more
    information).


    ![Image](images/square.jpg) **Tip** For a list of all tasks that can be executed,
    type `gradlew tasks`.


    Assuming everything went well, the output should be a `chapter1-bookstore-1.0.0.war`
    file in the `build/libs` directory.'
  trans: '

    #### 构建系统


    关于如何构建应用程序的话题，几十年来一直饱受争论、狂热甚至十足的愚蠢行为困扰。我们本可以走捷径，通过完全使用 SpringSource Tool Suite
    (STS) 来构建和部署，从而避免这场讨论（我们将在本章后面讨论 STS）。然而，作者认为这样做对您是一种伤害。STS 足以管理开发人员的工作流程，但对于运维管理方面却不太够用。通常，应用程序使用一种机制（IDE）构建，而使用完全不同的机制部署到生产环境。这常常是挫败感的来源，并导致了著名的“在我机器上能跑”综合症。


    考虑到这一点，我们强烈认为，确保应用程序在尽可能接近生产环境的环境中运行是开发人员的责任，*包括构建机制本身！* 您将看到复杂的构建工具如何使这成为可能。本书中您将使用的构建工具是
    Gradle ([`http://gradle.org`](http://gradle.org)`)`。这是一个相当新但崭露头角的*项目自动化*工具（项目自动化是*构建工具*的花哨说法），它有着强大的血统，并且已经建立了非常好的声誉。对构建工具的全面讨论超出了本书的范围；不过，可以这么说，Gradle
    结合了 Maven“约定优于配置”方法的强大功能与 Groovy 的简洁性。


    ![Image](img/square.jpg) **注意** Gradle 项目赢得了 2010 年 Springy 奖的最具创新产品/项目奖^(1)，并且是
    2011 年 JAX 创新奖的决赛入围者。


    ____________


    ¹ [`http://www.springsource.org/node/2871`](http://www.springsource.org/node/2871)


    Gradle 基础设施由 `build.gradle` 脚本（这有点类似于 Maven 的 `pom.xml`）和一个可选的 `settings.gradle`
    文件驱动；两者都可以在 `SAMPLE_ROOT` 目录中找到。


    ![Image](img/square.jpg) **提示** 如果您更喜欢使用 Maven，请注意 Gradle 完全能够生成 Maven POM（项目对象模型）。更多信息，请阅读
    [`http://gradle.org/maven_plugin.html`](http://gradle.org/maven_plugin.html) 上的“Maven
    POM 生成”。


    ##### 依赖管理


    Java 的优势在于其生态系统。丰富的高质量库是弥补该语言冗长和痛苦的代价。然而，它最大的优势，一如既往，也是它最大的弱点：中小型项目拥有超过 50 个库的依赖图并不罕见。这种库的泛滥因正确使用模块化而变得更加严重！


    依赖的问题在于依赖本身也有依赖，这些依赖还有依赖，如此循环……嗯，您可能明白我的意思了。有直接依赖（项目的依赖）和传递依赖（直接依赖所需的依赖）。然而，这还不是唯一的问题，因为还存在所谓的*版本地狱*。如果有多个依赖，并且这些依赖都依赖于库
    x 但版本不同，这就带来了额外的挑战。但是，等等，还有更多！您不想坐在电脑前谷歌搜索所有缺失的（传递）依赖，下载它们，重新部署您的应用程序，*然后*发现还有另一个缺失的依赖（或者可能是错误的依赖版本）。


    依赖管理在这里可以帮助您。例如，它帮助您下载和发现您需要的东西，并尝试解决所有版本冲突。在这种情况下，您可以让计算机为您完成繁重的工作，而您可以专注于手头的任务，即解决业务问题——在本书的例子中是卖书（而不是深夜寻找依赖）。


    ![Image](img/square.jpg) **注意** Gradle 的依赖管理基础设施与某种程度上行业标准的 Maven 仓库兼容——并且它在解决依赖方面有出色的支持。


    ##### Gradle 构建文件


    如前所述，Gradle 不仅仅是一个依赖管理工具。它也是一个构建工具；因此，它可以为您做很多事情。例如，如果您打开 `build.gradle` 文件，您会看到所有子项目所需的依赖。Gradle
    还可以帮助您构建（编译、测试和创建 war 归档）您的应用程序，并且可以使用 Groovy 语言轻松修改或影响您构建应用程序的方式。为了帮助构建应用程序，有一个插件可以将应用程序部署到嵌入式
    Tomcat 实例。这个实例反过来可以用于运行集成测试（参见第 9 章）。


    这些功能只是 Gradle 所能提供功能的开始。如果您对更复杂的构建感兴趣，请尝试阅读 Gradle 参考指南^(2)，或者查看 Spring 框架^(4)
    使用的 Gradle 构建^(3)（是的，连 SpringSource 也在使用 Gradle）。


    #### 构建示例应用程序


    要构建示例，请 `cd` 进入 `SAMPLE_ROOT` 目录并执行 `gradlew` 脚本。假设您使用的是 Unix 系统，这看起来会像图 1-2 所示。


    ![Image](img/9781430241553_Fig01-02.jpg)


    ***图 1-2.** 初始构建输出*


    您会注意到 `gradlew` 脚本做的第一件事就是下载 Gradle 发行版本身！这就是为什么没有“安装 gradle”这一步——它是自安装的。


    ![Image](img/square.jpg) **注意** 我们建议将 `gradlew` 脚本检入源代码控制。持续集成（CI）服务器以及（其他开发人员）都使用此脚本。升级到新版本的
    Gradle 就像更新 `gradlew` 脚本一样简单，该脚本在执行时会静默地自我升级。


    ____________


    ² [`http://www.gradle.org/docs/current/userguide/userguide.html`](http://www.gradle.org/docs/current/userguide/userguide.html)


    ³ [`https://github.com/SpringSource/spring-build-gradle`](https://github.com/SpringSource/spring-build-gradle)


    ⁴ [`https://github.com/SpringSource/spring-framework`](https://github.com/SpringSource/spring-framework)


    ![Image](img/square.jpg) **注意** 说到升级；在撰写本文时，v1.0 尚未发布，因此本书中的代码依赖于最新的里程碑版本：里程碑
    9。您的输出可能略有不同。


    在 Gradle 下载自身之后，您应该通过执行 `../gradlew build` 来构建示例应用程序（参见图 1-3）。


    ![Image](img/9781430241553_Fig01-03.jpg)


    ***图 1-3.** 构建示例应用程序输出*


    注意 Gradle 如何下载示例依赖并经历编译、测试和打包示例应用程序的生命周期。与 Maven 类似，Gradle 包含一个 JAR 的本地缓存（您主目录中的
    `.gradle` 目录）。后续执行会快得多，因为不需要网络访问（更多信息请参见 [`http://gradle.org/documentation`](http://gradle.org/documentation)）。


    ![Image](img/square.jpg) **提示** 要获取所有可执行任务的列表，请键入 `gradlew tasks`。


    假设一切顺利，输出应该是一个位于 `build/libs` 目录中的 `chapter1-bookstore-1.0.0.war` 文件。

    '
- fmt: '### Deploying the Sample Application


    The next step is to deploy the application to a web container. Tomcat (`http://tomcat.apache.org/`)
    is an excellent candidate, so you could download and install that. As noted previously,
    there is nothing Tomcat-specific in the sample file, so feel free to use Jetty,
    JBoss, Glassfish, or any other modern web container.


    ![Image](images/square.jpg) **Note** With a view toward reducing the number of
    new things you must learn—if you’re more familiar with another web container,
    then it probably makes sense to stick with what you know for now.


    Now copy the WAR file from `SAMPLE_ROOT/build/libs/chapter1-bookstore-1.0.0.war`
    to `TOMCAT_ROOT/webapps`. If Tomcat hasn’t started, then start it by executing
    `TOMCAT_ROOT/bin/startup.sh run` (or `.bat` for Windows).


    Now open up your favorite web browser and navigate to [`http://localhost:8080/chapter1-bookstore-1.0.0`](http://localhost:8080/chapter1-bookstore-1.0.0).
    If everything went well, you should see the screen in [Figure 1-4](#Chapter01.html#fig_1_4).


    ![Image](images/9781430241553_Fig01-04.jpg)


    ***Figure 1-4.** The bookstore’s home page*


    What! Is that the best you can do? That screen looks awful! Of course, you can
    do better :).


    However, the point of this sample app is to start *really* simple and build up,
    so there is no extraneous *fluff* getting in the way of the details. Don’t worry;
    the application will get **much** better as you go.


    ![Image](images/square.jpg) **Note** `chapter1-bookstore-1.0.0` isn’t the best
    name; for one, it doesn’t exactly roll off the tongue. The default naming strategy
    in Tomcat is to set the *context path* to be the name of the WAR file. For example,
    if the name of the WAR file were `bookstore.war`, then the context path would
    be `/bookstore`.


    Congratulations! You have accomplished the critical, but often overlooked step
    of ensuring that your application can be built and works outside your IDE. The
    next step is to install STS and actually look at the sample that you have just
    so excellently deployed.


    Before doing so, make sure to press `Control-C` to shutdown Tomcat.


    ### SpringSource Tool Suite (STS)


    As we explained earlier, Spring doesn’t require a specific development environment,
    but we do recommend that you consider a good IDE. Leading IDEs like Eclipse and
    IntelliJ IDEA are excellent choices, but the SpringSource Tool Suite (STS), based
    on Eclipse, provides additional benefits for developing Spring-based applications.
    We use STS in this book.


    #### Configuring STS for Gradle projects


    To install Gradle support, click Install Extensions. The first time you do this,
    STS will download a list of extensions, which can take a few seconds. Eventually,
    the Install Extensions page will be ready (see [Figure 1-5](#Chapter01.html#fig_1_5)).


    ![Image](images/9781430241553_Fig01-05.jpg)


    ***Figure 1-5.** The Extensions tab in STS*


    Next, search for “gradle”; [Figure 1-6](#Chapter01.html#fig_1_6) shows the results.


    ![Image](images/9781430241553_Fig01-06.jpg)


    ***Figure 1-6.** The “gradle” search results*


    Now select the check box next to Gradle Support and click Install on the bottom
    right. Review the prompt and click Next to open the Install dialog (see [Figure
    1-7](#Chapter01.html#fig_1_7)).


    ![Image](images/9781430241553_Fig01-07.jpg)


    ***Figure 1-7.** The Install dialog*


    Click Next to get to the Install Details dialog and click Next again to get to
    the license. Finally, read the license agreements (who reads these?) and click
    Finish. The Gradle plugin should now start downloading and installing. Once it
    finishes, you will be asked to restart—click Yes. As mentioned previously, typical
    Java applications can have large dependency graphs. Gradle has already dealt with
    this, and it would be painful to have to manually resolve the dependencies in
    order to register them with STS. Luckily, STS actually understands Gradle projects
    (just as it understands Maven projects).


    #### Importing the Sample into STS


    Now that STS knows how to navigate a Gradle project, the next step is to import
    the project into STS. To do this, select File ![Image](images/U003.jpg) Import
    (i.e. choose the Import option from the File menu). This opens the Import dialog.
    Choose Gradle ![Image](images/U003.jpg) Gradle Project (see [Figure 1-8](#Chapter01.html#fig_1_8)).
    Finally, click Next (see [Figure 1-9](#Chapter01.html#fig_1_9)).


    ![Image](images/9781430241553_Fig01-08.jpg)


    ***Figure 1-8.** The STS Import dialog*


    ![Image](images/9781430241553_Fig01-09.jpg)


    ***Figure 1-9.** The Import Gradle Project dialog*


    Now click Browse and navigate to the directory containing the sample projects.
    Next, click Build Model.


    ![Image](images/square.jpg) **Note** STS will download its own version of Gradle
    and, if you skipped the previous step of building the sample application via the
    command line, STS will also download the application’s dependencies. This may
    take a few minutes.


    Once Gradle has built its internal representation of the structure of your project
    (i.e. the project and any subprojects), it will allow you to choose which projects
    to import (see [Figure 1-10](#Chapter01.html#fig_1_10)).


    ![Image](images/9781430241553_Fig01-10.jpg)


    ***Figure 1-10.** Gradle projects that can be imported.*


    You can either select the root bookstore project or click Select All to import
    all projects. Afterwards, click Finish to instruct STS to actually import your
    project. This might take a while as STS is downloading all missing dependencies
    and will compile all projects. However, the projects should eventually appear
    in STS (see [Figure 1-11](#Chapter01.html#fig_1_11)).


    ![Image](images/9781430241553_Fig01-11.jpg)


    ***Figure 1-11.** STS after importing projects*


    ![Image](images/square.jpg) **Tip** We suggest that you close the projects you
    aren’t currently working on. To do this, select the projects to close, right-click,
    and then select the menu option, Close Project. You can reopen a project by double-clicking
    it.


    #### Running the Application on the SpringSource vFabric tc Server


    Before you can run the application, you must tell STS which web container to run
    the application on. You have two choices: use the Tomcat installation you downloaded
    earlier or use the prebuilt VMware vFabric tc Server.


    ![Image](images/square.jpg) **Note** Registering Tomcat is as simple as right-clicking
    the Servers section at the bottom right, choosing New ![Image](images/U003.jpg)
    Server, expanding the menu to Apache/Tomcat v7.0 Server, clicking Next, browsing
    to the installation root of Tomcat, clicking Open, and then clicking OK.


    To run the application on the server, right-click the project and choose Run As
    ![Image](images/U003.jpg) Run on Server (see [Figure 1-12](#Chapter01.html#fig_1_12)).


    ![Image](images/9781430241553_Fig01-12.jpg)


    ***Figure 1-12.** Selecting the Run on Server menu option*


    Choosing Run on Server should open the Run On Server dialog (see [Figure 1-13](#Chapter01.html#fig_1_13)).


    ![Image](images/9781430241553_Fig01-13.jpg)


    ***Figure 1-13.** The Run On Server dialog*


    Choose the VMware vFabric tc Server Developer Edition v2.6 entry (or Tomcat, which
    will be shown if you decide to use that). Next, ensure that “Always use this server
    when running this project” is selected and click Finish. The application should
    then be built and deployed onto the tc Server. Once it starts, the Welcome page
    should load (see [Figure 1-14](#Chapter01.html#fig_1_14)).


    ![Image](images/square.jpg) **Note** You may notice that tc Server takes considerably
    longer to start than vanilla Tomcat as it initializes various sub-components.


    ![Image](images/9781430241553_Fig01-14.jpg)


    ***Figure 1-14.** The running application*'
