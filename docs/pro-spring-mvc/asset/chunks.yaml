- fmt: "### Configuring and Creating Templates\n\nTiles requires one or more files\
    \ to define our pages; these are called the *definitions files*. The default file\
    \ loaded by the `TilesConfigurer` is the `/WEB-INF/tiles.xml` (see [Listing 8-14](#Chapter08.html#list_8_14)).\n\
    \n**Listing 8-14.** Tiles Definitions\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\" ?>\n<!DOCTYPE tiles-definitions PUBLIC\n    \"-//Apache Software Foundation//DTD\
    \ Tiles Configuration 2.1//EN\"\n    \"http://tiles.apache.org/dtds/tiles-config_2_1.dtd\"\
    >\n\n<tiles-definitions>\n\n    <definition name=\"template\" template=\"/WEB-INF/templates/template.jsp\"\
    >\n        <put-attribute name=\"header\" value=\"/WEB-INF/templates/header.jsp\"\
    />\n        <put-attribute name=\"footer\" value=\"/WEB-INF/templates/footer.jsp\"\
    />\n    </definition>\n\n    <definition name=\"*\" extends=\"template\">\n  \
    \      <put-attribute name=\"title\" value=\"{1}.title\" />\n        <put-attribute\
    \ name=\"body\" value=\"/WEB-INF/views/{1}.jsp\" />\n    </definition>\n\n   \
    \ <definition name=\"*/*\" extends=\"template\">\n        <put-attribute name=\"\
    title\" value=\"{1}.{2}/title\" />\n        <put-attribute name=\"body\" value=\"\
    /WEB-INF/views/{1}/{2}.jsp\" />\n    </definition>\n\n</tiles-definitions>\n```\n\
    \nWe have created three definitions: the definition with the name `template` is\
    \ the general layout configuration, the other definitions extend this general\
    \ layout (and could override the predefined attributes). We can add more definitions\
    \ when needed. For Spring to select the correct definition, our definition name\
    \ has to match the name of the view (or a * wildcard as we did in our sample).\
    \ Our template page (`template.jsp`) consists of three tiles (`header`, `footer`\
    \ and `body`), and we need a property `title` that contains a message key so that\
    \ we can use our message source (see the [Chapter 5](#Chapter05.html#ch5) discussion\
    \ of internationalization) to resolve the actual title. [Listing 8-15](#Chapter08.html#list_8_15)\
    \ shows our `template.jsp`, which is used for the general layout. [Listing 8-16](#Chapter08.html#list_8_16)\
    \ shows our `index.jsp`, which is used as the body for the welcome page. [Figure\
    \ 8-4](#Chapter08.html#fig_8_4) shows the resulting page.\n\n**Listing 8-15.**\
    \ Template JSP\n\n```\n<!DOCTYPE HTML>\n<%@ taglib prefix=\"c\" uri=\"http://java.sun.com/jsp/jstl/core\"\
    %>\n<%@ taglib prefix=\"spring\" uri=\"http://www.springframework.org/tags\" %>\n\
    <%@ taglib prefix=\"tiles\" uri=\"http://tiles.apache.org/tags-tiles\" %>\n\n\
    <html>\n<head>\n    <meta charset=\"utf-8\">\n<c:set var=\"titleKey\">\n<tiles:getAsString\
    \ name=\"title\" />\n</c:set>\n    <title>\nBookstore | <spring:message code=\"\
    ${titleKey}\" text=\"Your Home in Books\"/>\n    </title>\n    <link rel=\"stylesheet\"\
    \ type=\"text/css\" href=\"<c:url value=\"/resources/css/style.css\"/>\" >\n</head>\n\
    <body>\n    <div id=\"wrap\">\n        <tiles:insertAttribute name=\"header\"\
    />\n       <div class=\"center_content\">\n        <div class=\"left_content\"\
    >\n            <h1><spring:message code=\"${titleKey}\" text=\"${titleKey}\" /></h1>\n\
    \            <tiles:insertAttribute name=\"body\" />\n        </div><!--end of\
    \ left content-->\n\n        <div class=\"right_content\">\n\n             <div\
    \ class=\"right_box\">\n\n                <div class=\"title\"><span class=\"\
    title_icon\"><img src=\"<c:url value=\"/resources/images/bullet4.gif\"/>\" alt=\"\
    \" title=\"\" /></span><spring:message code=\"main.title.randombooks\"/></div>\n\
    \                    <c:forEach items=\"${randomBooks}\" var=\"book\">\n     \
    \                   <div class=\"new_prod_box\">\n                           \
    \ <c:url value=\"/book/${book.id}\" var=\"bookUrl\" />\n                     \
