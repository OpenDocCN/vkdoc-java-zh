- fmt: 'With the final modification in place, we can run the application and go to
    the `Orders` overview page. We do this by clicking Orders overview in the navigation
    bar. [Figure 12-8](#Chapter12.html#fig_12_8) shows the orders for our customer
    with the user id of `jd`.


    ![Image](images/9781430241553_Fig12-08.jpg)


    ***Figure 12-8.** The new Orders overview page, which shows the orders and a link
    to view the details*


    In the preceding code, the `Order` entity is stored on `view` scope. The `Book`
    entities of the `OrderDetails` page (which we will need in the details view) are
    not yet initialized. Finally, when a user clicks the `View` link, the details
    will open in a popup window (see [Figure 12-9](#Chapter12.html#fig_12_9)).


    ![Image](images/9781430241553_Fig12-09.jpg)


    ***Figure 12-9.** Clicking the view link brings up a popup window that shows an
    order’s details*


    Web Flow placed the selected `Order` entity from `view` scope in `flash` scope.
    Next, we instructed Web Flow to render our `view` state of `orderDetail`. This
    `view` state shows information about the `Book` entity. In a normal situation,
    we would now receive a `LazyInitializationException` because the `Book` entity
    still has to be loaded. However, thanks to our flow-managed persistence context,
    the entities are still managed, and the extra data is loaded. We get the details
    without any exceptions being thrown.


    To illustrate that this is really working, we switched back to the `OpenEntityManagerInViewFilter`
    and disabled the `JpaFlowExecutionListener`. We also disabled the `CommonDataHandlerInterceptor`
    in both the `WebMvcContextConfiguration` and `WebflowContextConfiguration`. The
    `CommonDataHandlerInterceptor` is responsible for loading the random books. When
    enabled, it will silently load books in our persistence context, and we will not
    be performing an objective test. Finally, we also have to mark the `Book` `@ManyToOne`
    association in the `OrderDetail` entity as lazy:


    ```

    @ManyToOne(optional = false, fetch=FetchType.LAZY)

    private Book book;

    ```


    This is required because JPA (by default) loads many-to-one associations eagerly.
    If we don’t explicitly tell JPA to load the association lazily, the `Book` entity
    will already be loaded when we load the overview page. The overview page indirectly
    loads the `OrderDetail` collection because it shows the number of books as part
    of the order. This is accomplished by calling the `size` method on the `Collection`
    of `OrderDetails`; therefore, this association must be initialized. This will
    implicitly trigger loading of the `Book` entity because it is eagerly fetched
    when the `OrderDetail` association is loaded. After making the `Book` association
    explicitly lazy, we can click a `view` link to see the details. As can be seen
    in [Figure 12-9](#Chapter12.html#fig_12_9), we get an exception instead.


    ![Image](images/9781430241553_Fig12-10.jpg)


    ***Figure 12-10.** An exception is triggered when loading the book details if
    you are not using the flow-managed persistence context.*


    If we scroll further down in the stack trace, we will see that it was actually
    caused by a `LazyInitializationException` (see [Figure 12-11](#Chapter12.html#fig_12_11)).


    ![Image](images/9781430241553_Fig12-11.jpg)


    ***Figure 12-11.** The cause of the exception is a `LazyInitializationException`*


    ### Summary


    And that concludes the final chapter on Web Flow. We have now covered all the
    noteworthy features that Web Flow has to offer and even shown you how to use them.


    In this chapter, we took a more advanced and in-depth look at some of the functionality
    that was introduced in the previous couple of chapters. For example, we showed
    you how to apply flow inheritance by implementing an extension on flow composition
    and modularity. We also showed how it is possible to perform explicit form binding
    and to deal with exceptions in the flow (instead of dealing with them in your
    application controllers).


    And then we dove still deeper into executing Web Flow actions. For example, we
    discussed some powerful new features such as flow execution listeners, handling
    Ajax requests with Web Flow, and finally, the flow-managed persistence context.


    There is one important thing that we did not discuss in these Web Flow chapters:
    security. Web Flow plugs seamlessly into Spring Security. We decided that it would
    be better to cover the topic of security in its own, standalone chapter. Our next
    (and final) chapter will cover Spring security for Spring MVC (this will be our
    starting point); and along the way, we’ll show you how Web Flow fits into this
    security setup.


    ## C H A P T E R  13


    ## Spring Security


    As we all know, security is important for any application. This is especially
    true for web applications, which are exposed to the Internet. Exposure to outside
    threats is obvious, and dealing with it will be a major part of your effort to
    develop secure solutions. However, the challenges that confront a developer are
    not only external threats.


    Because security doesn’t add functionality, it is often underemphasized and sometimes
    even hard to justify in terms of time and resources. It often ends up being forgotten
    or implemented badly under the pressure of tight deadlines and the demands for
    fulfilling all functional requirements. Of course, it is a mistake to look at
    security in terms of “functionality.”


    Security should be looked at from the same perspective as writing tests or refactoring
    code. Testing doesn’t add direct value in terms of new functionality, but it does
    improve existing functionality and enable future additions or bug fixes to be
    made without destabilizing your project. The same goes for refactoring. As a good
    developer, you refactor code on a daily basis, no matter how small the changes,
