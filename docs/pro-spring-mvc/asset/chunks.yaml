    `        assertTrue(result.equals("test2") || result.equals("test12"));`


    `@Test` 注解将一个方法标记为测试方法。该方法将被 JUnit 识别并执行。在这个测试方法内部，你将编写代码来测试实际的生产代码。测试类中其他没有特定注解的方法则不会被处理。`@Before`
    注解会在每个测试方法之前运行。它将确保我们的数据库填充了初始数据。如果某个 `@Test` 方法更改了数据，我们将确保数据重置为初始状态。重要的是，每个方法都应作为独立的测试运行。你不应该在
    `@Test` 方法之间建立依赖关系，否则你的测试代码会变得脆弱且难以快速理解。此外，你无法控制 `@Test` 方法的执行顺序。


    STS 自带了一个 JUnit 插件。一旦你至少有一个 `@Test` 方法，就可以右键单击该类并选择“Run As”。额外的运行选项“JUnit Test”会自动出现。点击它即可运行测试。


    `assertTrue` 和 `assertEquals` 方法是通过静态导入从 `junit.framework.Assert` 类中引入的（如清单 9-2
    顶部所示）。这些方法允许你验证行为，如果行为不符合预期，则让测试停止。这只是一点语法糖，能让你的代码读起来更流畅。通常你不需要很多这样的方法。有了 `assertTrue`
    和 `assertEquals`，你就能应对大部分情况了。


    以 `testDeleteQuery` 方法为例，我们首先执行删除查询来删除数据库中的一个条目。接下来，我们检查数据库是否确实少了一个条目。如果不是这种情况，`assertEquals`
    就会失败，并且该特定的测试方法会被标记为失败，如图 9-3 所示。


    ![Image](img/9781430241553_Fig09-03.jpg)


    ***图 9-3.** JUnit 测试失败*


    如果所有测试都成功，你会看到一个绿色条，如图 9-4 所示。


    ![Image](img/9781430241553_Fig09-04.jpg)


    ***图 9-4.** JUnit 测试成功*


    除了 `@Before` 方法，还有 `@After`。`@After` 方法会在每个测试方法之后运行，即使该方法抛出异常或某个断言失败。还有 `@BeforeClass`
    和 `@AfterClass`，它们分别在整个测试类的第一个测试方法开始之前和最后一个测试方法结束之后执行一次。执行顺序如图 9-5 所示。


    ![Image](img/9781430241553_Fig09-05.jpg)


    ***图 9-5.** JUnit 注解执行顺序*


    `@BeforeClass`、`@Before`、`@After` 和 `@AfterClass` 当然都是可选的注解（这就是为什么它们用虚线框表示）。例如，如果你没有指定
    `@Before`，JUnit 会直接开始执行你的测试方法，然后，如果你指定了 `@After`，则执行 `@After` 方法。如果你没有指定，则运行下一个测试方法。别忘了，`@Before`
    和 `@After` 会在*每个*测试方法之前和之后运行。`@BeforeClass` 和 `@AfterClass` 只运行一次，分别在测试开始和结束时。JUnit
    还有一些额外的特性，比如 Suites 和 Categories，但它们超出了本章的范围。你可以在 JUnit 网站^(9) 和 JavaDoc^(10)
    中找到更多信息。


    至此，我们快速介绍了 JUnit 以及如何编写一个简单的测试。这对于本章剩余部分来说已经足够了。

