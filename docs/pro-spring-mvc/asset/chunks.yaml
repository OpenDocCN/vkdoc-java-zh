- fmt: '### Summary


    In this chapter, we covered the MVC pattern, including its origins and what problems
    it solves. We also briefly discussed the three components of the MVC pattern:
    the model, view, and controller. Next, we touched on the Model 2 MVC pattern and
    how using a front controller distinguishes it from the Model 1 MVC pattern. In
    Spring MVC, this front controller is `org.springframework.web.servlet.DispatcherServlet`.


    Next, we briefly covered web application architecture in general. We identified
    the five different layers generally available in a web application: domain, user
    interface, web, service, and data access. All of these layers play an important
    role in our application, and we discussed both what these roles are and how they
    fit together. We also covered how Spring can help us out in the different layers
    of an application.


    The main take away from this chapter is that the various layers and components
    in the MVC pattern can help us separate the different concerns. Each layer should
    have a single responsibility, be it business logic or the glue between the HTTP
    world and the service layer. Separation of concerns helps us both achieve a clean
    architecture and create maintainable code. Finally, clean layering makes it easier
    to test our application.


    In the next chapter, we will drill down on the Spring MVC. Specifically, we will
    explore the `DispatcherServlet` servlet, including how it works and how to configure
    it. We will also take a closer look at how the different components described
    in this chapter work in a Spring MVC application.


    ## C H A P T E R 4


    ## Spring MVC Architecture


    In this chapter, you will dive into the internals of Spring MVC, taking a close
    look at the `org.springframework.web.servlet.DispatcherServlet`. You will begin
    by learning how an incoming request is handled by the servlet, as well as how
    to identify which components play a role in the request handling. After these
    components have been identified, you will go deeper into the roles and functions
    of the different components and the different implementations of those components.
    You will also learn how to configure the `org.springframework.web.servlet.DispatcherServlet`,
    in part by examining the default configuration.


    ### DispatcherServlet Request Processing Workflow


    In the previous chapter, you learned about the important role the front controller
    plays in a Model 2 MVC pattern. The front controller takes care of dispatching
    incoming requests to the correct handler and prepares the response, so that it
    can be rendered into something that the user would like to see. The role of front
    controller in Spring MVC is played by the `org.springframework.web.servlet.DispatcherServlet`.
    This servlet uses several components to fulfill its role. All these components
    are expressed as interfaces, for which one or more implementations are available.
    The next section will explore the general role these components play in the request
    processing workflow. Another upcoming section will cover the different implementations
    of the interfaces.


    ![Image](images/square.jpg) **Note** We purposely used the term *handler*. The
    `DispatcherServlet` is very flexible and customizable, and it can handle more
    types of handlers than just `org.springframework.web.servlet.mvc.Controller` implementations
    or `org.springframework.stereotype.Controller` annotated classes.


    #### The Workflow


    A high-level overview of the request processing workflow is illustrated in [Figure
    4-1](#Chapter04.html#fig_4_1).


    ![Image](images/9781430241553_Fig04-01.jpg)


    ***Figure 4-1.** The request processing workflow*


    In the previous chapters, you learned about the importance of separation of concerns.
    Within the Spring Framework, the same rules have been applied. A lot of supporting
    components have been designed as interfaces with extensibility as well as separation
    of concerns in mind. Although the high level overview in [Figure 4-1](#Chapter04.html#fig_4_1)
    is correct, there is more happening behind the scenes. [Figure 4-2](#Chapter04.html#fig_4_2)
    shows a more complete view of the request processing workflow.


    ![Image](images/9781430241553_Fig04-02.jpg)


    ***Figure 4-2.** The request processing workflow*


    [Figure 4-2](#Chapter04.html#fig_4_2) provides a global overview of the request
    processing workflow inside the `DispatcherServlet`. The following sections will
    zoom in on the different steps in this flow.


    ##### Prepare a Request


    Before the `DispatcherServlet` will start dispatching and handling the request,
    it first does some preparation and preprocessing of the request. The servlet starts
    by determining and exposing the current `java.util.Locale` for the current request
    using the `org.springframework.web.servlet.LocaleResolver`. Next, it prepares
    and exposes the current request in `org.springframework.web.context.request.RequestContextHolder`.
    This gives the framework code easy access to the current request, instead of passing
    it around.


    Next, the servlet will construct a so-called `org.springframework.web.servlet.FlashMap`.
    It does this by calling the `org.springframework.web.servlet.FlashMapManager`,
    which will try to resolve the input `FlashMap`. This map contains attributes that
    were explicitly stored in the previous request. In general, this is used when
    a redirect is made to go to the next page. This topic will be discussed in depth
    in Chapter 5.


    Next, the incoming request is checked for whether it is a multipart HTTP request
    (this is used when doing file uploads). If so, the request is wrapped in an `org.springframework.web.multipart.MultipartHttpServletRequest`
    by passing it through an `org.springframework.web.multipart.MultipartResolver`.
    After this, the request is ready to be dispatched to the correct handler. [Figure
    4-3](#Chapter04.html#fig_4_3) shows a flow diagram of the first part of the request
    processing workflow.


    ![Image](images/9781430241553_Fig04-03.jpg)


    ***Figure 4-3.** The start of the request processing flow*


    ##### Determine the HandlerExecutionChain


    A couple of components are involved in dispatching the request (see [Figure 4-4](#Chapter04.html#fig_4_4)).
    When a request is ready for dispatching, the `DispatcherServlet` will consult
    one or more `org.springframework.web.servlet.HandlerMapping` implementations to
    determine which handler can handle the request. If no handler is found, an HTTP
    404 response is send back to the client. The `HandlerMapping` returns an `org.springframework.web.servlet.HandlerExecutionChain`
    (you will learn more about this in the next section). When the handler has been
    determined, the servlet will attempt to find an `org.springframework.web.servlet.HandlerAdapter`
    to actually execute the found handler. If no suitable `HandlerAdapter` can be
    found, a `javax.servlet.ServletException` is thrown.


    ![Image](images/9781430241553_Fig04-04.jpg)


    ***Figure 4-4.** Dispatching the request*'
