    later in the “Authorizing Access” section.    ##### Logging Out    The logout
    functionality was until now implemented in our `com.apress.prospringmvc.bookstore.web.controller.AuthenticationController`.
    Let’s repeat the code snippet to refresh our memory.  `@RequestMapping(value =
    "/logout", method = RequestMethod.GET)` `public String logout(HttpSession session)
    {` `    session.invalidate();` `    return "redirect:/index.htm";` `}`  When the
    user clicks the logout link, it will direct to `/logout`, which will invoke the
    controller method `logout`, and call `invalidate` on the HTTP session. After that
    the user is redirected to the homepage. Although this is not very complex, it
    should no longer be part of our application code. Spring Security can take care
    of this as well. We can safely remove the code in the `AuthenticationController`.    After
    that we will configure Spring Security to take over the task. We will do this
    by configuring the `LogoutFilter`. In [Table 13-2](#Chapter13.html#tab_13_2) earlier,
    we gave an overview of the possible filters; the `LogoutFilter` is one of them.
    This filter had the following entry in the table:    ![Image](images/9781430241553_Tab13-02b.jpg)    This
    filter can be declared as an element `(<security:logout>`) within the `http` element.
    The code for this configuration is shown in [Listing 13-13](#Chapter13.html#list_13_13).    ***Listing
    13-13.** Configuring the logout functionality in our src/main/resources/spring/spring-security.xml*  `<security:logout
    logout-success-url="/public/main.htm" logout-url="/logout" invalidate-`![Image](images/U002.jpg)
    `session="true"/>`  The `logout-success-url` attribute indicates the page to which
    Spring Security should redirect when the logout was successful. In our case this
    is the home page. The second attribute, `logout-url`, indicates the URL where
    the filter should listen. In our case this is `/logout`. Whenever a call is made
    to `/logout`, the `LogoutFilter` will be invoked and the user logged out. The
    last attribute indicates whether the HTTP session should be invalidated as well.
    If you specify `false`, only the `org.springframework.security.core.context.SecurityContext`
    will be cleared, and no invalidation occurs on the HTTP session. We will cover
    this class in a minute; for now it is enough to know that from the moment you
    are authenticated, the authentication information will be accessible via `org.springframework.security.core.context.SecurityContext`.
    Optionally you can also indicate to clear the entire HTTP session. While it is
    not mandatory, it is in nearly all cases the safest to clear the session as well.
    Invalidating the session is the default behavior if you don’t specify the `invalidate-session`
    attribute. We specified it here explicitly so anyone reading our security configuration
    understands that the session is cleared for sure (not that we doubt the default
    value is working, but to give a clear indication, not everyone is aware of the
    defaults).    The logout link itself in our `header.jsp` remains unaltered, as
    you can see in [Listing 13-14](#Chapter13.html#list_13_14).    ***Listing 13-14.**
    The logout link in our WEB-INF/templates/header.jsp*  `<spring:url value="/logout"
    var="logout" />` `<a href="${logout}">` `    <spring:message code="nav.logout"/>`
    `</a>`  This link now directs to `/logout`. The only thing missing is that this
    link should only appear when the user is actually logged in. We will see how to
    handle this when we introduce the authorization tag. Our logout control is now
    fully operational.    #### The Complete Security Configuration    In [Listing
    13-15](#Chapter13.html#list_13_15) you will find the complete security configuration
    that we build for this part of the chapter (located in `src/main/resources/spring/spring-security.xml`).
    Although we have included a lot of functionality, the configuration part is still
    pretty digestible, as you will see.    ***Listing 13-15.** A complete overview
