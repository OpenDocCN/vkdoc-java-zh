    您将在本书的不同地方了解到这些元素中的许多内容。诸如 `<on-entry>` 和 `<on-exit>` 之类的通用元素将在“控制动作执行”部分讨论；`<transition>`
    的含义与在视图状态中引入时相同；`<exception-handler>` 将在第 12 章 中深入讨论；`<secured>` 将在第 13 章 中介绍；输入/输出将在本章后面介绍；`parent`
    属性将在第 12 章 讨论继承时介绍；`subflow-attribute-mapper` 将在本章后面查看子流程输入/输出映射时介绍。


