    \        mav.addObject(name, value);\n    }\n    return mav;\n}\n```\n\n## Extending\
    \ Spring @MVC\n\nIn previous chapters, we explained how Spring MVC works and how\
    \ we can write controllers. However, there might come a time when the support\
    \ from the framework out-of-the-box isn’t sufficient, and we will want to change\
    \ or add to the behavior of the framework. In general, the Spring Framework is\
    \ quite flexible due to the way it is built. It uses a lot of strategies and delegation,\
    \ and this is also something we can use to extend or modify the behavior of the\
    \ framework. In this section, we will dive into the internals of request mapping,\
