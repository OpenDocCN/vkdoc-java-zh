    Spring 的测试支持配置为在执行下一个测试之前重新加载配置并重建应用上下文。后者可以通过在修改应用上下文的类甚至测试方法上放置 `@DirtiesContext`
    注解来实现。下一个测试类（或测试方法）将获得一个刷新后的应用上下文。如果需要，你也可以直接注入 `ApplicationContext`（参见清单 9-6）。


