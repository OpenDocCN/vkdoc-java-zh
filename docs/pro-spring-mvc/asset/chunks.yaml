  raw: '## REST and AJAX


    Until now we have been building quite a classic web application: we send a request
    to the server, the server processes the request, and we render the result and
    show it to the client. Over the last decade, however the way we build web applications
    has changed considerably. Now we have JavaScript and JSON/XML, which allow for
    AJAX-based web applications and also push more and more behavior push to the client,
    including validation, rendering parts of the screen, and so on.


    In this chapter we start with REST^([1](#Chapter07.html#CHP-7-FN-1)) (Representational
    State Transfer), a concept or architectural style that has influenced how we as
    developers think of web resources and how we should handle them. We next discuss
    AJAX and consider it in combination with REST.


    The second part of this chapter covers file uploads. You will see how to do file
    uploading with the Spring Framework and how to handle the task in our controllers.
    However before we get into this let’s take a look at REST.


    ### Representational State Transfer (REST)


    This section briefly explains the topic of REST. The concept essentially has two
    parts: first the resources and how we identify them, and then the way we operate
    or work with these resources. REST was described in 2000 by Roy Thomas Fielding
    in a paper called ‘*Architectural Styles and the Design of Network-based Software
    Architectures*’.^([2](#Chapter07.html#CHP-7-FN-2)) It describes how to work with
    resources using the HTTP protocol and the features offered by this protocol.


    #### Identifying Resources


    In [Chapter 4](#Chapter04.html#ch4) we briefly discussed the parts a URL (Unique
    Resource Locator) consists of. For REST this doesn’t really change; however, the
    URL is important as it points to a unique resource. [Table 7-1](#Chapter07.html#tab_7_1)
    gives a couple of samples of resource locations.


    _________


    ¹ [`www.ics.uci.edu/~fielding/pubs/dissertation/rest_arch_style.htm`](http://www.ics.uci.edu/~fielding/pubs/dissertation/rest_arch_style.htm)


    ² [`www.ics.uci.edu/~fielding/pubs/dissertation/top.htm`](http://www.ics.uci.edu/~fielding/pubs/dissertation/top.htm)


    ![Image](images/9781430241553_tab07-01.jpg)


    In REST it is all about a *representation* of a resource, and hence the URL/URI
    is important. It gives us the location of an actual resource (web page, image
    on the web page, mp3 file, or whatever). What we see in our web browser isn’t
    the actual resource but a representation of that resource. The next section explains
    how we can use this resource location to work with (modify, delete, and so on)
    that resource.


    #### Working with Resources


    The HTTP protocol specifies several methods (HTTP methods^([3](#Chapter07.html#CHP-7-FN-3)))
    to work with information from our application. [Table 7-2](#Chapter07.html#tab_7_2)
    gives an overview of the methods.


    ![Image](images/9781430241553_tab07-02.jpg)


    _________


    ³ [`www.w3.org/Protocols/rfc2616/rfc2616-sec9.html`](http://www.w3.org/Protocols/rfc2616/rfc2616-sec9.html)


    In the previous section, “Identifying Resources,” we mentioned how a URL points
    to a resource. If we combine REST with the resources from [Table 7-1](#Chapter07.html#tab_7_1),
    we could actually work with them, as outlined in [Table 7-3](#Chapter07.html#tab_7_3).


    ![Image](images/9781430241553_tab07-03.jpg)


    The list of HTTP methods is larger than most web browsers support. In general,
    they only support the `GET` and `POST` methods, and not the other methods identified.
    To be able to use the different methods in a classic web application, we need
    to use a workaround; for this Spring MVC has the `HiddenHttpMethodFilter`.


    ##### HiddenHttpMethodFilter


    The `org.springframework.web.filter.HiddenHttpMethodFilter` will transform a `POST`
    request to another specified type of request. It uses a request parameter to determine
    which method to use for the incoming request. By default it uses a request parameter
    with the name `_method`; however, this name can be configured. A `POST` request
    can be “transformed” to a `PUT` or `DELETE` by making sure the request parameter
    is there; the request will then be wrapped in a `HttpMethodRequestWrapper` (which
    is an inner class for the filter). A `GET` request is processed as is and will
    not be transformed into another type of request. This is because a `GET` request,
    unlike the other types, has all parameters encoded in the URL. By contrast the
    `POST` and `PUT` requests have them encoded in the request body.


    Let’s configure the `HiddenHttpMethodFilter` for our web application. Open `com.apress.prospringmvc.bookstore.web.BookstoreWebApplicationInitializer`
    and let’s add a method that adds our filter. [Listing 7-1](#Chapter07.html#list_7_1)
    shows the modification needed.


    ***Listing 7-1.** BookstoreWebApplicationInitializer with HiddenHttpMethodFilter*


    `package com.apress.prospringmvc.bookstore.web;`


    `import java.util.EnumSet;`


    `// javax.servlet imports omitted`


    `import org.springframework.web.WebApplicationInitializer;`

    `import org.springframework.web.filter.HiddenHttpMethodFilter;`


    `public class BookstoreWebApplicationInitializer implements WebApplicationInitializer
    {`


