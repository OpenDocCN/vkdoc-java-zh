    ### 编写基于注解的控制器


    让我们将目前学到的部分理论应用到我们的控制器中。例如，我们页面上所有的菜单选项都会导致 404 错误，这表明页面无法找到。


    在本节中，我们将为应用程序添加一些控制器和视图。我们将从创建一个简单的登录控制器开始，该控制器使用请求和请求参数进行操作。接下来，我们将添加一个使用对象的图书搜索页面。最后，我们将构建一个检索并显示图书详细信息的控制器来结束本节。


