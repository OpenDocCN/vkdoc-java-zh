- fmt: "#### Applying Flow Managed Persistence Context\n\nWe will rework our `createOrders-flow`\
    \ to take advantage of the managed-persistence context. Let’s begin by enabling\
    \ the prolonged persistence context on a per-flow basis. We’ll do so by using\
    \ the `<persistence-context/>` element at the beginning of our `createOrders-flow`\
    \ flow.\n\nWe need to enable a special flow execution listener (see [Listing 12-31](#Chapter12.html#list_12_31)).\
    \ This listener will bind and unbind the persistence context as a flow is starting,\
    \ ending, pausing, or resuming (at least for each flow for which we’ve enabled\
    \ the `<persistence-context/>` element).\n\n**Listing 12-31** Registering the\
    \ flow execution listener that will handle the flow managed-persistence context\n\
    \n```\n<webflow:flow-executor id=\"flowExecutor\" flow-registry=\"flowRegistry\"\
    >\n    <webflow:flow-execution-repository max-executions=\"3\" max-execution-snapshots=\"\
    10\" />\n        <webflow:flow-execution-listeners>\n            <webflow:listener\
    \ ref=\"jpaFlowExecutionListener\"/>\n        </webflow:flow-execution-listeners>\n\
    \   </webflow:flow-executor>\n```\n\n```\n<bean id=\"jpaFlowExecutionListener\"\
    \n           class=\"org.springframework.webflow.persistence.JpaFlowExecutionListener\"\
    >\n    <constructor-arg ref=\"entityManagerFactory\" />\n    <constructor-arg\
    \ ref=\"transactionManager\" />\n</bean>\n```\n\nThe listener requires access\
    \ to the `javax.persistence.EntityManagerFactory` (which will create the `javax.persistence.EntityManager`,\
    \ also called the persistence context) and the transaction manager. The transaction\
    \ manager is used to create a transaction when the flow ends. At that moment,\
    \ the entity manager is joined with the transaction, so that your modifications\
    \ can be flushed to the database in an all-succeed or all-fail fashion. You can\
    \ see this in [Listing 12-32](#Chapter12.html#list_12_32), which is taken from\
    \ the `JpaFlowExecutionListener`.\n\n**Listing 12-32** The `JpaFlowExecutionListener`,\
    \ which joins the `EntityManager` with a transaction when ending the flow session\n\
    \n```\npublic void sessionEnding(RequestContext context, FlowSession session,\n\
    \                          String outcome, MutableAttributeMap output) {\n   \
    \ if (isParentPersistenceContext(session)) {\n        return;\n    }\n\n    if\
    \ (isPersistenceContext(session.getDefinition())) {\n        final EntityManager\
    \ em = getEntityManager(session);\n        Boolean commitStatus =\n          \
    \  session.getState().getAttributes().getBoolean(\"commit\");\n\n        if (Boolean.TRUE.equals(commitStatus))\
    \ {\n            transactionTemplate.execute(\n                new TransactionCallbackWithoutResult()\
    \ {\n                    protected void doInTransactionWithoutResult(\n      \
    \                                             TransactionStatus status) {\n  \
    \                      em.joinTransaction();\n                }\n            });\n\
    \        }\n        unbind(em);\n        em.close();\n    }\n}\n```\n\nThe listener\
    \ will also detect subflows, so that no transaction is executed when a subflow\
    \ ends. The create/update transaction is only executed when the top-level flow\
    \ ends.\n\nNext, we need to indicate which `end` state will trigger the commit\
    \ (see [Listing 12-33](#Chapter12.html#list_12_33)).\n\n**Listing 12-33** The\
    \ end state that triggers the commit\n\n```\n<end-state id=\"endOrderOk\"\nview=\"\
    redirect:/ordersOverview.html?orderOk=true&amp;orderId={orderId}\" commit=\"true\"\
    />\n```\n\nThere is one thing left to do. Thus far, we’ve used the `org.springframework.orm.jpa.support.OpenEntityManagerInViewFilter`,\
    \ which was configured in our `com.apress.prospringmvc.bookstore.web.config.BookstoreWebApplicationInitializer`.\
    \ `OpenEntityManagerInViewFilter` and `JpaFlowExecutionListener` don’t play nicely\
    \ together. This makes sense if you think about it because they both try to extend\
    \ the persistence context; however, only our `JpaFlowExecutionListener` will extend\
    \ it a bit longer. Therefore, we need to disable the `OpenEntityManagerInViewFilter`.\
    \ In [Listing 12-34](#Chapter12.html#list_12_34), you can see that we have put\
    \ this in comments, so that it will not be loaded. We will now fully depend on\
    \ the `JpaFlowExecutionListener` for extending the persistence context.\n\n**Listing\
    \ 12-34** Disabling `OpenEntityManagerInViewFilter` in `BookstoreWebApplicationInitializer`\n\
    \n```\n@Override\npublic void onStartup(ServletContext servletContext) throws\
    \ ServletException {\n    registerListener(servletContext);\n    registerDispatcherServlet(servletContext);\n\
    \    // We are using JpaFlowExecutionListener instead\n    //registerOpenEntityManagerInViewFilter(servletContext);\n\
    }\n```\n\nThat is all we need to do. What is happening now is that, during our\
    \ flow execution, our entities remain managed. When the flow ends, we indicated\
    \ that Web Flow should commit. This means that it will start a transaction and\
    \ let the `EntityManager` join that transaction, so it can flush the modification\
    \ operations (i.e., creates, updates, and deletes) to the database. This basically\
    \ means that the `createOrder` method on our service does not require an `@Transactional`\
    \ annotation anymore because the transaction is now managed by Web Flow.\n\n**Note**\
    \ When using disconnected transactions in the same flow (e.g., several read transactions\
    \ in each step of the flow, followed by a modification transaction at the end),\
    \ it is advised that we configure optimistic locking. In our case, this is not\
    \ that important because we are inserting new data. However, this becomes very\
    \ important if we want to update data that was previously read in a previous step\
    \ of the flow (and thus belongs to a different transaction) because that data\
    \ might be updated by the time we perform our modification transaction. Without\
    \ optimistic locking, we could end up overwriting the changes of other users without\
    \ knowing it."
  raw: '#### Applying Flow Managed Persistence Context


    We will rework our `createOrders-flow` to take advantage of the managed-persistence
    context. Let’s begin by enabling the prolonged persistence context on a per-flow
    basis. We’ll do so by using the `<persistence-context/>` element at the beginning
    of our `createOrders-flow` flow.


    We need to enable a special flow execution listener (see [Listing 12-31](#Chapter12.html#list_12_31)).
    This listener will bind and unbind the persistence context as a flow is starting,
    ending, pausing, or resuming (at least for each flow for which we’ve enabled the
    `<persistence-context/>` element).


    ***Listing 12-31** Registering the flow execution listener that will handle the
    flow managed-persistence context*


    `<webflow:flow-executor id="flowExecutor" flow-registry="flowRegistry">`

    `    <webflow:flow-execution-repository max-executions="3" max-execution-snapshots="10"
    />`

    `        <webflow:flow-execution-listeners>`

    **`            <webflow:listener ref="jpaFlowExecutionListener"/>`**

    `        </webflow:flow-execution-listeners>`

    `   </webflow:flow-executor>`


    **`<bean id="jpaFlowExecutionListener"` ![Image](images/U002.jpg)**

    **`           class="org.springframework.webflow.persistence.JpaFlowExecutionListener">`**

    **`    <constructor-arg ref="entityManagerFactory" />`**

    **`    <constructor-arg ref="transactionManager" />`**

    **`</bean>`**


    The listener requires access to the `javax.persistence.EntityManagerFactory` (which
    will create the `javax.persistence.EntityManager`, also called the persistence
    context) and the transaction manager. The transaction manager is used to create
    a transaction when the flow ends. At that moment, the entity manager is joined
    with the transaction, so that your modifications can be flushed to the database
    in an all-succeed or all-fail fashion. You can see this in [Listing 12-32](#Chapter12.html#list_12_32),
    which is taken from the `JpaFlowExecutionListener`.


    ***Listing 12-32** The JpaFlowExecutionListener, which joins the EntityManager
    with a transaction when ending the flow session*


    `public void sessionEnding(RequestContext context, FlowSession session,`

    `                          String outcome, MutableAttributeMap output) {`![Image](images/U002.jpg)

    `    if (isParentPersistenceContext(session)) {`

    `        return;`

    `    }`


    `    if (isPersistenceContext(session.getDefinition())) {`

    `        final EntityManager em = getEntityManager(session);`

    `Boolean commitStatus =` ![Image](images/U002.jpg)

    `            session.getState().getAttributes().getBoolean("commit");`


    `        if (Boolean.TRUE.equals(commitStatus)) {`

    `            transactionTemplate.execute(`![Image](images/U002.jpg)

    `                new TransactionCallbackWithoutResult() {`

    `                    protected void doInTransactionWithoutResult(`![Image](images/U002.jpg)

    `                                                   TransactionStatus status)
    {`

    `                        em.joinTransaction();`

    `                }`

    `            });`

    `        }`

    `     unbind(em);`

    `     em.close();`

    `    }`

    `}`


    The listener will also detect subflows, so that no transaction is executed when
    a subflow ends. The create/update transaction is only executed when the top-level
    flow ends.


    Next, we need to indicate which `end` state will trigger the commit (see [Listing
    12-33](#Chapter12.html#list_12_33)).


    ***Listing 12-33** The end state that triggers the commit*


    `<end-state id="endOrderOk"` ![Image](images/U002.jpg)

    `view="redirect:/ordersOverview.html?orderOk=true&amp;orderId={orderId}"` **`commit="true"`**`/>`


    There is one thing left to do. Thus far, we’ve used the `org.springframework.orm.jpa.support.OpenEntityManagerInViewFilter`,
    which was configured in our `com.apress.prospringmvc.bookstore.web.config.BookstoreWebApplicationInitializer`.
    `OpenEntityManagerInViewFilter` and `JpaFlowExecutionListener` don’t play nicely
    together. This makes sense if you think about it because they both try to extend
    the persistence context; however, only our `JpaFlowExecutionListener` will extend
    it a bit longer. Therefore, we need to disable the `OpenEntityManagerInViewFilter`.
    In [Listing 12-34](#Chapter12.html#list_12_34), you can see that we have put this
    in comments, so that it will not be loaded. We will now fully depend on the `JpaFlowExecutionListener`
    for extending the persistence context.


    ***Listing 12-34** Disabling OpenEntityManagerInViewFilter in BookstoreWebApplicationInitializer*


    `@Override`

    `public void onStartup(ServletContext servletContext) throws ServletException
    {`

    `    registerListener(servletContext);`

    `    registerDispatcherServlet(servletContext);`

    `    // We are using JpaFlowExecutionListener instead`

    `    //registerOpenEntityManagerInViewFilter(servletContext);`

    `}`


    That is all we need to do. What is happening now is that, during our flow execution,
    our entities remain managed. When the flow ends, we indicated that Web Flow should
    commit. This means that it will start a transaction and let the EntityManager
    join that transaction, so it can flush the modification operations (i.e., creates,
    updates, and deletes) to the database. This basically means that the `createOrder`
    method on our service does not require an `@Transactional` annotation anymore
    because the transaction is now managed by Web Flow.


    ![Image](images/square.jpg) **Note** When using disconnected transactions in the
    same flow (e.g., several read transactions in each step of the flow, followed
    by a modification transaction at the end), it is advised that we configure optimistic
    locking. In our case, this is not that important because we are inserting new
    data. However, this becomes very important if we want to update data that was
    previously read in a previous step of the flow (and thus belongs to a different
    transaction) because that data might be updated by the time we perform our modification
    transaction. Without optimistic locking, we could end up overwriting the changes
    of other users without knowing it.'
  trans: '

    #### 应用流程托管持久化上下文


    我们将重新设计 `createOrders-flow`，以利用托管持久化上下文。首先，在单个流程基础上启用持久化上下文延长功能。具体做法是在 `createOrders-flow`
    流程的开头使用 `<persistence-context/>` 元素。


    我们需要启用一个特殊的流程执行监听器（参见清单 12-31）。该监听器会在流程启动、结束、暂停或恢复时（至少针对我们启用了 `<persistence-context/>`
    元素的每个流程）绑定和解绑持久化上下文。


    ***清单 12-31** 注册用于处理流程托管持久化上下文的流程执行监听器*


    `<webflow:flow-executor id="flowExecutor" flow-registry="flowRegistry">`

    `    <webflow:flow-execution-repository max-executions="3" max-execution-snapshots="10"
    />`

    `        <webflow:flow-execution-listeners>`

    **`            <webflow:listener ref="jpaFlowExecutionListener"/>`**

    `        </webflow:flow-execution-listeners>`

    `   </webflow:flow-executor>`


    **`<bean id="jpaFlowExecutionListener"` ![Image](img/U002.jpg)**

    **`           class="org.springframework.webflow.persistence.JpaFlowExecutionListener">`**

    **`    <constructor-arg ref="entityManagerFactory" />`**

    **`    <constructor-arg ref="transactionManager" />`**

    **`</bean>`**


    该监听器需要访问 `javax.persistence.EntityManagerFactory`（用于创建 `javax.persistence.EntityManager`，也称为持久化上下文）以及事务管理器。事务管理器用于在流程结束时创建事务。此时，实体管理器会与事务结合，以便你的修改能够以全部成功或全部失败的方式刷新到数据库。你可以在清单
    12-32 中看到这一点，该清单取自 `JpaFlowExecutionListener`。


    ***清单 12-32** JpaFlowExecutionListener，在结束流程会话时将 EntityManager 与事务结合*


    `public void sessionEnding(RequestContext context, FlowSession session,`

    `                          String outcome, MutableAttributeMap output) {`![Image](img/U002.jpg)

    `    if (isParentPersistenceContext(session)) {`

    `        return;`

    `    }`


    `    if (isPersistenceContext(session.getDefinition())) {`

    `        final EntityManager em = getEntityManager(session);`

    `Boolean commitStatus =` ![Image](img/U002.jpg)

    `            session.getState().getAttributes().getBoolean("commit");`


    `        if (Boolean.TRUE.equals(commitStatus)) {`

    `            transactionTemplate.execute(`![Image](img/U002.jpg)

    `                new TransactionCallbackWithoutResult() {`

    `                    protected void doInTransactionWithoutResult(`![Image](img/U002.jpg)

    `                                                   TransactionStatus status)
    {`

    `                        em.joinTransaction();`

    `                }`

    `            });`

    `        }`

    `     unbind(em);`

    `     em.close();`

    `    }`

    `}`


    该监听器还会检测子流程，因此当子流程结束时不会执行事务。创建/更新事务仅在顶层流程结束时执行。


    接下来，我们需要指明哪个 `end` 状态会触发提交（参见清单 12-33）。


    ***清单 12-33** 触发提交的结束状态*


    `<end-state id="endOrderOk"` ![Image](img/U002.jpg)

    `view="redirect:/ordersOverview.html?orderOk=true&amp;orderId={orderId}"` **`commit="true"`**`/>`


    还剩一件事要做。到目前为止，我们一直使用 `org.springframework.orm.jpa.support.OpenEntityManagerInViewFilter`，它是在我们的
    `com.apress.prospringmvc.bookstore.web.config.BookstoreWebApplicationInitializer`
    中配置的。`OpenEntityManagerInViewFilter` 和 `JpaFlowExecutionListener` 不能很好地协同工作。仔细想想，这很合理，因为它们都试图延长持久化上下文；但只有我们的
    `JpaFlowExecutionListener` 会将其延长得更久一些。因此，我们需要禁用 `OpenEntityManagerInViewFilter`。在清单
    12-34 中，你可以看到我们已将其注释掉，这样它就不会被加载。现在我们将完全依赖 `JpaFlowExecutionListener` 来延长持久化上下文。


    ***清单 12-34** 在 BookstoreWebApplicationInitializer 中禁用 OpenEntityManagerInViewFilter*


    `@Override`

    `public void onStartup(ServletContext servletContext) throws ServletException
    {`

    `    registerListener(servletContext);`

    `    registerDispatcherServlet(servletContext);`

    `    // 我们改用 JpaFlowExecutionListener`

    `    //registerOpenEntityManagerInViewFilter(servletContext);`

    `}`


    这就是我们需要做的全部工作。现在发生的情况是，在流程执行期间，我们的实体保持托管状态。当流程结束时，我们指示 Web Flow 进行提交。这意味着它将启动一个事务，并让
    EntityManager 加入该事务，从而将修改操作（即创建、更新和删除）刷新到数据库。这基本上意味着我们服务上的 `createOrder` 方法不再需要
    `@Transactional` 注解，因为事务现在由 Web Flow 管理。


    ![Image](img/square.jpg) **注意** 当在同一流程中使用断开连接的事务时（例如，流程的每一步执行多个读取事务，最后执行一个修改事务），建议配置乐观锁。在我们的案例中，这并不那么重要，因为我们是在插入新数据。然而，如果我们想要更新之前在流程的某个步骤中读取的数据（因此属于不同的事务），这就变得非常重要，因为当我们执行修改事务时，该数据可能已被更新。如果没有乐观锁，我们可能会在不知情的情况下覆盖其他用户的更改。

