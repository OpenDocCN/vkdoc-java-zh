- fmt: "### Creating the Order Process as a Subflow\n\nSo far, we've created a subflow\
    \ for performing the authentication. Next, we will further refactor the `createOrders-flow`\
    \ and extract the part that actually *places* the order into a subflow. Remember\
    \ that we previously refactored this to an action state in the `createOrders-flow`\
    \ (see [Listing 11-46](#Chapter11.html#list_11_46)).\n\n**Listing 11-46.** Recapping\
    \ the Action State for Placing an Order\n\n```\n<action-state id=\"placeOrder\"\
    >\n    <evaluate\n      expression=\"orderController.placeOrder(\n      externalContext.sessionMap.authenticatedAccount,\
    \ flowScope.orderForm)\"\n      result=\"flowScope.orderId\"/>\n    <transition\
    \ on=\"success\" to=\"endOrderOk\"/>\n</action-state>\n```\n\nNext, we are going\
    \ to move the action state into a subflow called the `placeOrders-flow.xml`. This\
    \ flow will be placed in this directory: `src/main/webapp/WEB-INF/view/placeOrders/`.\
    \ In order for the action state to work in the subflow, we need to pass along\
    \ our order form. The order form is stored on `flow` scope of the parent flow;\
    \ and, as we have already seen, the subflow will have its own `flow` scope. Thus,\
    \ we need to map the order form from the parent's `flow` scope to the subflow's\
    \ `flow` scope. The account is not required to be mapped because we put the account\
    \ on the Servlet `session` scope. This scope is reachable from our entire flow\
    \ (and even beyond Web Flow such as in Servlets or JSPs because it is a JEE scope).\
    \ We will also need to send back the order id to the parent flow once the subflow\
    \ completes. Our subflow will look like [Listing 11-47](#Chapter11.html#list_11_47);\
    \ this code can be found in `placeOrders/placeOrders-flow.xml`.\n\n**Listing 11-47.**\
    \ Creating the Flow\n\n```\n<input name=\"orderForm\" required=\"true\"\n    \
    \    type=\"com.apress.prospringmvc.bookstore.web.OrderForm\"/>\n\n<action-state\
    \ id=\"placeOrder\">\n    <evaluate expression=\"orderController.placeOrder(externalContext\n\
    .sessionMap.authenticatedAccount, orderForm)\"\n      result=\"flowScope.orderId\"\
    />\n\n    <transition on=\"success\" to=\"endOrderOk\"/>\n</action-state>\n\n\
    <end-state id=\"endOrderOk\">\n    <output name=\"orderId\" />\n</end-state>\n\
    ```\n\nFirst, we map the `orderForm` from the input map to the `flow` scope of\
    \ the subflow. We also declare the input to be mandatory and declare it to be\
    \ of a specific type. Both the required and type attributes are optional. The\
    \ type is just an extra check to ensure that the input is of the correct type.\
    \ When the input is not of the indicated type, a type conversion will be attempted.\
    \ If that fails, an exception is raised. If a mandatory input is absent, an exception\
    \ (`FlowInputMappingException`) is raised when the subflow is started.\n\nIn the\
    \ end state, we use the output element to map the result (in this case, the id\
    \ of the order) back to the parent flow. If you have multiple end states and all\
    \ of them output the same result back to the parent flow, then you can also remove\
    \ the output element from each of the end states and put the `output` element\
    \ below the latest end state. This way, you don't have to repeat the output element\
    \ for each end state. The output is then mapped, no matter which end state terminated\
    \ the subflow. [Listing 11-48](#Chapter11.html#list_11_48) shows how to declare\
    \ a single output element that maps the declared variable to the parent flow when\
    \ any of the end states terminate the subflow.\n\n**Listing 11-48.** Declaring\
    \ a Single Output Element\n\n```\n<end-state id=\"endstateOne\"/>\n<end-state\
    \ id=\"endstateTwo\"/>\n<output name=\"varX\"/>\n```\n\nFinally, [Listing 11-49](#Chapter11.html#list_11_49)\
    \ shows the subflow-state in our parent flow; this will declare which subflow\
    \ to execute and is indicated by the `subflow` attribute. The value is the id\
    \ by which the flow we want to run as a subflow is mapped in Web Flow. This is\
    \ nothing new—we covered this previously in the \"Implementing Authentication\
    \ as a Subflow\" section.\n\n**Listing 11-49.** The subflow-state in the Parent\
    \ Flow\n\n```\n<subflow-state id=\"placeOrder\" subflow=\"placeOrders\">\n   \
    \ <input name=\"orderForm\"/>\n    <output name=\"orderId\"/>\n\n    <transition\
    \ on=\"endOrderOk\" to=\"endOrderOk\"/>\n</subflow-state>\n```\n\nInside the subflow\
    \ state, we can see the input mapping. This is the value we will be making available\
    \ to the subflow. Here, we refer to the `orderForm` variable.\n\nThe output mapping\
    \ is the inverse of the input mapping; in other words, this is the value returned\
    \ by the subflow that we will be binding to a variable within our parent flow.\
    \ For the output mapping, we chose the variable name, `orderId`, which will be\
    \ put on `flow` scope by default. The output value (the order id) will be used\
    \ by our end state, which will use it to pass on the target URL that will be rendered\
    \ when the flow ends (we will discuss the end state in the next section). The\
    \ transition is also nothing new—we covered this in the \"Implementing Authentication\
    \ as a Subflow\" section. When the subflow terminates, it will trigger this transition\
    \ because the `on` attribute matches the end state id of the subflow and brings\
    \ us to the end state of the parent flow.\n\n**Caution** You cannot specify a\
    \ scope in either the input or output element. For example, specifying `input\
    \ name=\"flowScope.orderForm\"` will yield an exception. By default, the values\
    \ you refer to in the input element are resolved from `flow` scope, and values\
    \ are put back on `flow` scope with the name you specify in the output element.\
    \ It is arguable whether this is a valid limitation. The fact is, `flow` scope\
    \ is the only logical scope to use for input/output mapping because the `conversation`,\
    \ `flash`, and `request` scopes are shared with the subflow. Note that `view`\
    \ scope is not shared, but it clears anyway, as soon as your flow leaves the view\
    \ state.\n\n**Note** It might seem bizarre that an element (`<input>`) occurs\
    \ in both the `<subflow-state>` and the subflow itself. The best way to understand\
    \ this is that, in the `<subflow-state>` element, you define which keys from a\
    \ given value/expression you want to map *to* the *input* map. In the `<input>`\
    \ element of the flow started as a subflow, the `<input>` element says which keys\
    \ *from* the *input* map you want to put into the `flow` scope of the subflow\
    \ (the same story goes for the `<output>` element, which maps to an output map)."
  raw: '### Creating the Order Process as a Subflow


    So far, we''ve created a subflow for performing the authentication. Next, we will
    further refactor the `createOrders-flow` and extract the part that actually *places*
    the order into a subflow. Remember that we previously refactored this to an action
    state in the `createOrders-flow` (see [Listing 11-46](#Chapter11.html#list_11_46)).


    ***Listing 11-46.** Recapping the Action State for Placing an Order*


    `<action-state id="placeOrder">`

    `    <evaluate`

    `      expression="orderController.placeOrder(`![Image](images/U002.jpg)

    `      externalContext.sessionMap.authenticatedAccount, flowScope.orderForm)"`![Image](images/U002.jpg)

    `      result="flowScope.orderId"/>`

    `    <transition on="success" to="endOrderOk"/>`

    `</action-state>`


    Next, we are going to move the action state into a subflow called the `placeOrders-flow.xml`.
    This flow will be placed in this directory: `src/main/webapp/WEB-INF/view/placeOrders/`.
    In order for the action state to work in the subflow, we need to pass along our
    order form. The order form is stored on `flow` scope of the parent flow; and,
    as we have already seen, the subflow will have its own `flow` scope. Thus, we
    need to map the order form from the parent''s `flow` scope to the subflow''s `flow`
    scope. The account is not required to be mapped because we put the account on
    the Servlet `session` scope. This scope is reachable from our entire flow (and
    even beyond Web Flow such as in Servlets or JSPs because it is a JEE scope). We
    will also need to send back the order id to the parent flow once the subflow completes.
    Our subflow will look like [Listing 11-47](#Chapter11.html#list_11_47); this code
    can be found in `placeOrders/placeOrders-flow.xml`.


    ***Listing 11-47.** Creating the Flow*


    `<input name="orderForm" required="true"` ![Image](images/U002.jpg)

    `        type="com.apress.prospringmvc.bookstore.web.OrderForm"/>`


    `<action-state id="placeOrder">`

    `    <evaluate expression="orderController.placeOrder(externalContext`![Image](images/U002.jpg)

    `.sessionMap.authenticatedAccount, orderForm)"`

    `      result="flowScope.orderId"/>`


    `    <transition on="success" to="endOrderOk"/>`

    `</action-state>`


    `<end-state id="endOrderOk">`

    `    <output name="orderId" />`

    `</end-state>`


    First, we map the `orderForm` from the input map to the `flow` scope of the subflow.
    We also declare the input to be mandatory and declare it to be of a specific type.
    Both the required and type attributes are optional. The type is just an extra
    check to ensure that the input is of the correct type. When the input is not of
    the indicated type, a type conversion will be attempted. If that fails, an exception
    is raised. If a mandatory input is absent, an exception (`FlowInputMappingException`)
    is raised when the subflow is started.


    In the end state, we use the output element to map the result (in this case, the
    id of the order) back to the parent flow. If you have multiple end states and
    all of them output the same result back to the parent flow, then you can also
    remove the output element from each of the end states and put the `output` element
    below the latest end state. This way, you don''t have to repeat the output element
    for each end state. The output is then mapped, no matter which end state terminated
    the subflow. [Listing 11-48](#Chapter11.html#list_11_48) shows how to declare
    a single output element that maps the declared variable to the parent flow when
    any of the end states terminate the subflow.


    ***Listing 11-48.** Declaring a Single Output Element*


    `<end-state id="endstateOne"/>`

    `<end-state id="endstateTwo"/>`

    `<output name="varX"/>`


    Finally, [Listing 11-49](#Chapter11.html#list_11_49) shows the subflow-state in
    our parent flow; this will declare which subflow to execute and is indicated by
    the `subflow` attribute. The value is the id by which the flow we want to run
    as a subflow is mapped in Web Flow. This is nothing new—we covered this previously
    in the “Implementing Authentication as a Subflow” section.


    ***Listing 11-49.** The subflow-state in the Parent Flow*


    `<subflow-state id="placeOrder" subflow="placeOrders">`

    `    <input name="orderForm"/>`

    `    <output name="orderId"/>`


    `    <transition on="endOrderOk" to="endOrderOk"/>`

    `</subflow-state>`


    Inside the subflow state, we can see the input mapping. This is the value we will
    be making available to the subflow. Here, we refer to the `orderForm` variable.


    The output mapping is the inverse of the input mapping; in other words, this is
    the value returned by the subflow that we will be binding to a variable within
    our parent flow. For the output mapping, we chose the variable name, `orderId`,
    which will be put on `flow` scope by default. The output value (the order id)
    will be used by our end state, which will use it to pass on the target URL that
    will be rendered when the flow ends (we will discuss the end state in the next
    section). The transition is also nothing new—we covered this in the “Implementing
    Authentication as a Subflow” section. When the subflow terminates, it will trigger
    this transition because the `on` attribute matches the end state id of the subflow
    and brings us to the end state of the parent flow.


    ![Image](images/square.jpg) **Caution**  You cannot specify a scope in either
    the input or output element. For example, specifying `input name="flowScope.orderForm"`
    will yield an exception. By default, the values you refer to in the input element
    are resolved from `flow` scope, and values are put back on `flow` scope with the
    name you specify in the output element. It is arguable whether this is a valid
    limitation. The fact is, `flow` scope is the only logical scope to use for input/output
    mapping because the `conversation`, `flash`, and `request` scopes are shared with
    the subflow. Note that `view` scope is not shared, but it clears anyway, as soon
    as your flow leaves the view state.


    ![Image](images/square.jpg) **Note**  It might seem bizarre that an element (`<input>`)
    occurs in both the `<subflow-state>` and the subflow itself. The best way to understand
    this is that, in the `<subflow-state>` element, you define which keys from a given
    value/expression you want to map *to* the *input* map. In the `<input>` element
    of the flow started as a subflow, the `<input>` element says which keys *from*
    the *input* map you want to put into the `flow` scope of the subflow (the same
    story goes for the `<output>` element, which maps to an output map).'
