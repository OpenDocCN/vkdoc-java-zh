- fmt: "### Using web.xml\n\nThe `web.xml` file has been around since the inception\
    \ of the servlet specification. It is an XML file that contains all the configuration\
    \ you need to bootstrap the servlet, listeners, and/or filters. [Listing 4-1](#Chapter04.html#list_4_1)\
    \ shows the minimal `web.xml` required to bootstrap the `DispatcherServlet`. The\
    \ `web.xml` file must be in the `WEB-INF` directory of the web application (this\
    \ is dictated by the servlet specification).\n\n**Listing 4-1.** The `web.xml`\
    \ configuration (Servlet 3.0)\n\n```\n<web-app version=\"3.0\"\n        xsi:schemaLocation=http://java.sun.com/xml/ns/javaee\n\
    \                           http://java.sun.com/xml/ns/javaee/web-app_3_0.xsd\n\
    \        metadata-complete=\"true\">\n\n    <servlet>\n        <servlet-name>bookstore</servlet-name>\n\
    \        <servlet-class>\n            org.springframework.web.servlet.DispatcherServlet\n\
    \        </servlet-class>\n        <load-on-startup>1</load-on-startup>\n    </servlet>\n\
    \n    <servlet-mapping>\n        <servlet-name>bookstore</servlet-name>\n    \
    \    <url-pattern>/*</url-pattern>\n    </servlet-mapping>\n</web-app>\n```\n\n\
    ![Image](images/square.jpg) **Note** By default, the dispatcher servlet loads\
    \ a file named `[servletname]-servlet.xml` from the `WEB-INF` directory.\n\nThe\
    \ `metadata-complete` attribute in the `web-app` element instructs the servlet\
    \ container to not scan the classpath for `javax.servlet.ServletContainerInitializer`\
    \ implementations; neither will it scan for `web-fragment.xml` files. Adding this\
    \ attribute to your `web.xml` can increase startup times considerably because\
    \ it will scan the classpath, which can take quite some time in a large application.\n\
    \n### Using web-fragment.xml\n\nThe `web-fragment.xml` feature has been available\
    \ since the 3.0 version of the servlet specification, and it allows for a more\
    \ modularized configuration of the web application. The `web-fragment.xml` has\
    \ to be in the `META-INF` directory of a jar file. It isn’t detected in the `META-INF`\
    \ of the web application; it has to be in a jar file. The `web-fragment.xml` can\
    \ contain the same elements as the `web.xml` (see [Listing 4-2](#Chapter04.html#list_4_2)).\n\
    \nThe benefit of this approach is that each module, packaged as a jar files can\
    \ contribute to the configuration of the web application. This can also be considered\
    \ a drawback because now you have scattered your configuration over your code\
    \ base, which could be troublesome in larger projects.\n\n**Listing 4-2.** The\
    \ `web-fragment.xml` configuration (Servlet 3.0)\n\n```\n<web-fragment version=\"\
    3.0\"\n  xsi:schemaLocation=\"http://java.sun.com/xml/ns/javaee\n            \
    \          http://java.sun.com/xml/ns/javaee/web-fragment_3_0.xsd\">\n\n    <servlet>\n\
    \        <servlet-name>bookstore</servlet-name>\n        <servlet-class>\n   \
    \         org.springframework.web.servlet.DispatcherServlet\n        </servlet-class>\n\
    \        <load-on-startup>1</load-on-startup>\n    </servlet>\n\n    <servlet-mapping>\n\
    \        <servlet-name>bookstore</servlet-name>\n        <url-pattern>/*</url-pattern>\n\
    \    </servlet-mapping>\n</web-fragment>\n```\n\n### Using ServletContainerInitializer\n\
    \nAnother feature introduced in the 3.0 version of the servlet specification is\
    \ the option to use a Java-based approach to configuring your web environment\
    \ (see [Listing 4-3](#Chapter04.html#list_4_3)). A Servlet 3.0-compatible container\
    \ will scan the classpath for classes that implement the `javax.servlet.ServletContainerInitializer`\
    \ interface, and it will invoke the `onStartup` method on those classes. By adding\
    \ a `javax.servlet.annotation.HandlesTypes` annotation on these classes, you can\
    \ also be handed classes that you need to further configure your web application\
    \ (this is the mechanism that allows the fourth option to use an `org.springframework.web.WebApplicationInitializer`).\n\
