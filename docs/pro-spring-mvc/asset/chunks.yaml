- fmt: "#### Promoting Testing Within Your Project\n\nIf it is too hard to write a\
    \ test, or a lot of refactoring has to be done in your code to test a particular\
    \ module, you can be sure that no single test is going to be written. Many developers\
    \ see testing as an extra task that they have to fulfill. In this section we want\
    \ to give some tips to promote testing within your project, so that writing tests\
    \ becomes easier and more appealing. The project should be as supportive as possible\
    \ to write tests for. This section is of course not exhaustive, but we hope it\
    \ gives an idea about the more important aspects.\n\n> **Goals:** The first thing\
    \ you can do within a project is setting a testing goal; for example, targeting\
    \ a high percentage of production code covered by tests is a nice goal to strive\
    \ for. `EclEmma`^([2](#Chapter09.html#CHP-9-FN-2)) is a very nice plug-in that\
    \ will do that for you. We will show you its output after we have written our\
    \ first test in the next section. There is also a plug-in for `Gradle` and `Maven`\
    \ to run `Emma`^([3](#Chapter09.html#CHP-9-FN-3)) in an automated fashion. You\
    \ could even set minimum goals of coverage before a build is considered successful.\
    \ Code coverage can work psychologically to make developers have a target; to\
    \ get the percentage of covered code as high as possible. This is a form of “gamification”;\
    \ it helps motivating ourselves to do the best job possible in writing tests by\
    \ engaging ourselves to obtain a high as possible coverage rate. However, beware\
    \ that quantity is not more important than quality, so one should not lose sight\
    \ of the quality aspect. Writing a test that gives 100% coverage is not very difficult,\
    \ but that doesn’t mean the code by itself is well tested. Code testing coverage\
    \ is a minimum indicator to get a feel about the test quality.\n> \n> **Infrastructure:**\
    \ We are talking about frameworks and structure within your project. Without a\
    \ good infrastructure, testing becomes painful. You should start building out\
    \ a good platform to write your tests upon. As mentioned before, writing tests\
    \ is an investment, and that investment should be well protected. Tests are like\
    \ your car’s comprehensive insurance. It costs money and it doesn’t buy you anything.\
    \ But if anything happens to your car it will pay for the costs, and oh boy, when\
    \ this happens you are glad you paid for that insurance! The same is true with\
    \ tests (only accidents will happen on a daily basis, and using your tests is\
    \ free once you build them). They will start to pay off as soon as you start to\
    \ refactor or change your application.\n> \n> **Importance of testing:** Tests\
    \ are sometimes more important than the code they test, because they are the proof\
    \ that the code is working. Without a test the code doesn’t mean anything, as\
    \ its behavior is an unverifiable state. Even if you can really be sure that the\
    \ code will work, you probably have no idea about the impact. Others are depending\
    \ on your code and might suddenly notice a change in behavior breaking your project.\
    \ If every component was adequately tested, this would immediately show up after\
    \ running the tests.\n> \n> **Understanding:** You should understand the different\
    \ levels of testing and when to apply which type of test in which situation. You\
    \ could test an entire application by using frontend testing, but that would be\
    \ a bad idea. You should also understand where testing should stop. You are not\
    \ required to test `Spring`, or `Hibernate`, or whatever library you are using.\
    \ They have their own test sets.\n\n_________\n\n² [`http://www.eclemma.org/`](http://www.eclemma.org/)\n\
    \n³ [`http://docs.codehaus.org/display/GRADLE/Plugins#Plugins-Emmaplugin`](http://docs.codehaus.org/display/GRADLE/Plugins#Plugins-Emmaplugin)\n\
    \n> **Environment:** Your tests (both unit and integration) should run on a constant\
    \ basis. You should have a dedicated machine just building your project on every\
    \ commit. For a CI (Continuous Integration) system, we advise you to check out\
    \ `Jenkins`^([4](#Chapter09.html#CHP-9-FN-4)) (which was called `Hudson` before\
    \ they changed the name for legal reasons). It is extremely simple to set up and\
    \ works very well. It will check out the code from your Version Control System\
    \ (VCS) and build it. If your project can be built with a build tool (like `Gradle`,\
    \ `Ant`, `Maven`, and so on) it will only take a few minutes to schedule an automated\
    \ build. Also, because you will be using such tools to automate your build, your\
    \ tests should be environment-agnostic. They should be able to run even on your\
    \ Smartphone without requiring any resource or environment dependency. Tests should\
    \ be able to run everywhere. Tests should also be easy to run, preferably with\
    \ a single command without requiring any form of configuration or setup.\n\n![Image](images/square.jpg)\
    \ **Note** The best way to verify your project’s test suite is to take a random\
    \ device that is able to run Java, perform a checkout from your VCS, disable all\
    \ network interfaces, and enter a single command that should perform a build and\
    \ run your tests. There should be no failures, and your test coverage should clearly\
    \ indicate that the major part of your project is tested. There is also a great\
    \ tool called `sonar`^([5](#Chapter09.html#CHP-9-FN-5)) (open source) which does\
    \ exactly that, checking out your code from VCS and applying all kinds of metrics\
    \ to it, including test coverage. We would certainly advise you to try this, as\
    \ it is very easy to set up and the advantages for safekeeping your code quality\
    \ are major."
