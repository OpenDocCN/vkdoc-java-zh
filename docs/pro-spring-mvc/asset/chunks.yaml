    13-16.** 登录后显示的消息*    #### 在代码中使用注解    正如我们将看到的，仅使用授权标签保护页面是不够的。如果用户知道或猜到直接链接，隐藏链接（这是授权标签的主要任务）将无济于事。在这种情况下，用户仍然可以访问（假设你没有为该页面放置带有适当授权检查的特定
    `intercept-url`）。    在本节中，我们将看到你也可以使用注解来保护你的应用程序控制器方法和后端服务。这样，你可以确保如果用户绕过了前端安全，用户将在下一级被阻止。在后端服务中应用安全措施，如果你有不同的前端层使用相同的后端，也很有用。    到目前为止，我们已经看到了三个可以放置特定授权检查点的地方：    >
    *   在请求的资源上，使用 `intercept-url` > *   在你的流程上 > *   对于更细粒度的方法，在页面本身中使用 authorize
    标签    这给我们留下了一个空白。考虑到我们最后的示例，我们在 `manageBooks.jsp` 页面上添加了特定的权限检查。只有拥有 `PERM_ADD_BOOKS`
    权限的用户才能添加书籍，只有拥有 `PERM_ADD_CATEGORIES` 权限的用户才能添加类别。但是，如果具有作者角色（不能添加类别）的用户模拟一个添加新类别的
    HTTP POST 请求，会发生什么？    这仍然是我们系统中的一个潜在弱点。虽然页面上的授权标签只隐藏了一个组件，但监听请求的控制器仍然存在。因此，任何知道正确
    URL 和请求参数的人仍然可以直接调用控制器。    除了为每个页面添加具有细粒度授权控制（指定角色和/或权限）的 `intercept-url` 之外，你还可以使用方法特定的注解，如清单
    13-36 所示。    ***清单 13-36.** 在应用程序控制器中使用方法安全*  `@RequestMapping("secured/addCategory.htm")`
    **`@PreAuthorize("hasRole(''PERM_ADD_CATEGORIES'')")`** `public ModelAndView addCategory(`  通过在控制器请求映射上添加
    `org.springframework.security.access.prepost.PreAuthorize` 注解来添加书籍，我们实现了一个额外的检查。自己试试——将
    `manageBooks.jsp` 中的 `<sec:authorize access="hasRole(''PERM_ADD_CATEGORIES'')">`
    注释掉，并使用用户 `author` 登录。因为标签被注释掉了，所以添加类别的组件会显示出来。如果你尝试添加一个，你会得到著名的“403 访问被拒绝”页面。    在
    Spring Security 处理这些注解之前，你需要启用方法安全。我们在 `src/main/resources/spring-security.xml`
    中执行了此操作，如清单 13-37 所示。    ***清单 13-37.** 启用方法级安全*  `<security:global-method-security
    pre-post-annotations="enabled"/>`  接下来，我们还将保护 `addBooks` 方法，就像我们对 `addCategory`
    方法所做的那样，如清单 13-38 所示。    ***清单 13-38.** 在应用程序控制器中使用方法安全*  `@RequestMapping("secured/addBooks.htm")`
    **`@PreAuthorize("hasRole(''PERM_ADD_BOOKS'')")`** `public ModelAndView addBooks(`  为了使整个链安全，你也可以在你的服务层上添加这些注解。一旦你这样做了，就没有人能够绕过你的安全并调用当前主体不允许的函数。    最后，我们想就安全异常说几句。通常，你的用户在应用程序的正常导航过程中不应遇到此类异常。我们使用授权标签屏蔽了页面中的所有链接；换句话说，如果用户无权访问某个链接（或按钮），它根本就不会显示。但是，如果用户开始摆弄
    URL，仍然有可能访问到被禁止的 URL。在这种情况下，用户将遇到应用程序控制器或后端上的安全注解，并将显示 403 访问被拒绝消息。如果你想自定义此行为，你有两个选择：    >
    *   你可以在 web.xml 中使用 JEE Servlet `<error-page>`，在出现 `<error-code>`（在本例中为 403）时转发到某个页面。
    > *   你可以使用 Spring Security 的 `org.springframework.security.web.access.ExceptionTranslationFilter`，它可以处理
    `org.springframework.security.access.AccessDeniedException` 和 `org.springframework.security.core.AuthenticationException`。其主要目的是在用户尚未认证时将其转发到登录页面，或者在当前用户权限不足时将其转发到预定义的错误页面。为了方便起见，此过滤器已通过使用
    Spring Security 命名空间配置（<`security:http`>）注册。实际上，`http` 元素的直接属性之一是 `access-denied-page="…"`，它允许你指定在发生此类安全相关异常时转发到的页面。当整个
    Spring Security 配置构建时，此属性将直接提供给 `ExceptionTranslationFilter`。    ### 总结    总的来说，安全是一个非常复杂和广泛的领域。但是，在本章中，我们已经向你展示了，对于一个普通的
    Web 应用程序来说，基本的安全措施不必很复杂。相反，我们展示了如何使用一小段 XML 和过滤器配置来保护你的页面，以便只有那些显式列出的页面才能被访问。    后来，我们展示了使用自定义
    `UserDetailsService` 进行自定义也并不复杂，但它允许你将用户存储适配到你可能拥有的任何现有数据库结构。最后，我们展示了如何基于授予主体的权限在你的页面、流程和控制器中执行授权。    总之，我们希望你已经了解到，只需付出最少的努力，你的应用程序就可以得到保护。有了像
    Spring Security 这样出色的工具，再也没有理由不在你的应用程序中构建基本的安全措施了。    编写本章的目的是让你了解各种可能性，并帮助你快速入门。你的环境可能有特定的安全要求。在这种情况下，我们希望本章能激发你的兴趣，去阅读更多关于
    Spring Security 及其如何满足特定需求的详细资料。    ## 附录 A    ## Cloud Foundry：部署到云端    在本附录中，我们将讨论如何让我们的应用程序在与我们迄今为止运行的环境不同的环境中运行。我们将不再运行在任何普通的旧
    Tomcat 实例上，而是在*云端*运行它。但在我们开始之前，我们将先简单谈谈云的含义。    ### 云计算    你可能无法避免在专业媒体上看到云计算的冲击。但你可能仍然不清楚云计算涉及什么。我们将尝试简要概述云计算是什么。    很难给出云计算的单一定义，因为它对不同的人意味着不同的东西。一个更广泛的定义是这样的：    >
    *云计算是一种分布式计算模型，由三层组成——基础设施、平台和服务——它能够实现对可配置计算资源（例如，网络、服务器、存储、应用程序和服务）的共享池进行无处不在、便捷、按需的网络访问。*    以
    Amazon S3^(1) 为例：Amazon 允许你使用基于 Web 的 API 将数据存储在其服务器上。你根据上传或下载该数据所使用的带宽向 Amazon
    付费。在任何时候，你都不需要拥有自己的存储基础设施。    目前使用几种云服务模型：    *   *基础设施即服务 (IaaS)*：将计算基础设施作为服务交付。此类基础设施的示例包括虚拟计算机、存储、网络基础设施等。这更像是系统管理员而非开发人员的领域。Amazon
    和 Rackspace 是两个最知名的 IaaS 提供商。 *   *平台即服务 (PaaS)*：提供超越基础设施的服务。这里，重点是开发环境、应用程序服务和应用程序部署机制。对实际基础设施本身的控制主要由服务提供商处理。PaaS
    方法的一个很好的例子是 Google App Engine 和 Cloud Foundry。 *   *软件即服务 (SaaS)*：将完整的解决方案作为服务提供，消除了在客户自己的计算机上安装和运行应用程序的需要，并简化了维护和支持。将此与传统的软件交付模型进行对比，在传统模型中，最终用户在每个桌面上安装软件，自己管理升级等。在这种模型中，用户只需访问一个网站并开始在线使用应用程序。Google
    Docs 是 SaaS 的一个很好的例子。    __________________    ¹ [`http://aws.amazon.com/es/s3/`](http://aws.amazon.com/es/s3/)    ###
    Cloud Foundry    在本附录中，我们将使用 Cloud Foundry 作为我们选择的 PaaS 来部署我们的书店应用程序。但是什么是 Cloud
    Foundry，我们为什么要使用它？    Cloud Foundry 这样描述自己：    > *[Cloud Foundry 是] 一个开放的平台即服务，提供云、开发者框架和应用程序服务的选择。由
    VMware 发起，得到广泛的行业支持，Cloud Foundry 使构建、测试、部署和扩展应用程序更快、更容易。它是一个开源项目，可通过各种私有云发行版和公共云实例获得，包括
    CloudFoundry.com。^(2)*    这意味着什么？这意味着 Cloud Foundry 不是一个专有的、特定于供应商的 PaaS，而是一个真正开放的平台，由多个个人和组织共同开发。例如，ActiveState
    提供 Stackato，^(3) 它是 Cloud Foundry 的扩展，提供 Python、PHP 和 Perl 支持。Ubuntu 也正在其 Ubuntu
    Cloud^(4) 旗帜下致力于支持 Cloud Foundry。    这也意味着我们必须更明确地定义一些事情：    *   *Cloud Foundry*
    是开源项目的名称。你可以在 github 上找到它的代码；^(5) 其网站位于 [`www.cloudfoundry.org`](http://www.cloudfoundry.org)。
    *   *Cloudfoundry.com* 是 VMWare 托管的 Cloud Foundry 实例，允许你将应用程序部署在 VMWare 拥有的基础设施上。    在本附录的过程中，我们不区分
    Cloud Foundry 平台和 CloudFoundry.com 托管服务。    __________________    ² [`http://www.cloudfoundry.com`](http://www.cloudfoundry.com)    ³
    [`http://www.activestate.com/stackato`](http://www.activestate.com/stackato)    ⁴
    [`http://cloud.ubuntu.com`](http://cloud.ubuntu.com)    ⁵ [`https://github.com/cloudfoundry/`](https://github.com/cloudfoundry/)    既然我们已经了解了
    Cloud Foundry 是什么，为什么我们作为 Java/Spring 开发者要关心它？为什么我们应该使用它而不是任何其他 PaaS？原因之一：Cloud
    Foundry 是一个开放的、多供应商的平台，这一事实非常好，因为它帮助我们避免供应商锁定的危险和相关成本。    另一个原因：它还支持多种语言，包括 Ruby、Java、Scala
    和 NodeJs；并且它提供许多服务，从关系型存储（如 MySQL 和 PostgreSQL）到队列（如 RabbitMQ），再到 NoSQL 存储（如 MongoDB
    和 Redis）。另一个很大的优势是它与 Spring 集成得非常好。这些因素结合在一起，使 Cloud Foundry 成为一个非常有趣的平台。    CloudFoundry.com，即
    VMWare 托管的 Cloud Foundry 版本，在撰写本文时仍处于测试阶段。尽管如此，你可以通过访问 [`https://my.cloudfoundry.com/signup`](https://my.cloudfoundry.com/signup)
    并输入电子邮件地址来注册。阅读并同意服务条款后，你可以单击“请求邀请”按钮。你将收到一封确认注册请求的电子邮件。稍后（可能需要几个小时甚至一天），你将收到一封电子邮件，其中包含实际部署到
    CloudFoundry.com 所需的凭据。注册所需做的就是这些。    ### 部署我们的应用程序    在本节中，我们将描述如何将示例应用程序部署到
    Cloud Foundry。我们将详细描述每个步骤，并解释我们必须进行的修改，以使一切按预期工作。如果你想自己执行此处描述的操作，我们假设你已经阅读了关于如何设置环境的初始章节。我们还假设你拥有
    STS 或安装了 STS 插件的 Eclipse 实例。    #### 安装 Cloud Foundry 插件    尽管 Cloud Foundry 提供了几种工具来部署你的应用程序，但当你初次接触时，最快上手的方法是使用
    Eclipse 插件。另一种方法是使用 VMC 命令行应用程序，它作为 Ruby gem 实现。高级用户无法避免使用 VMC 命令行；但就本附录而言，我们将使用
    Eclipse 插件。    ![Image](img/square.jpg) **注意** RubyGems^(6) 是 Ruby 的包管理器。它可以与
    Ubuntu 的 apt-get 或 Red Hat 的 yum 相媲美。*gem* 是一个打包的 Ruby 应用程序或库。你可以在 [`http://start.cloudfoundry.com/tools/vmc/installing-vmc.html`](http://start.cloudfoundry.com/tools/vmc/installing-vmc.html)
    找到有关 VMC 安装的更多信息。如果你有 Ubuntu，你也可以直接使用 `apt-get install cloudfoundry-client` 安装命令行客户端。    我们将从安装
    Cloud Foundry Eclipse 插件开始。转到 STS 插件仪表板（可以在菜单 ![Image](img/U003.jpg) 帮助 ![Image](img/U003.jpg)
    仪表板下找到），单击窗口底部的“扩展”选项卡，然后在搜索栏中搜索 *cloud foundry*。选中找到的扩展，然后单击右下角的“安装”按钮，如图 A-1
    所示。    __________________    ⁶ [`http://rubygems.org`](http://rubygems.org)  ![Image](img/9781430241553_App-01.jpg)  ***图
    A-1.** 查找 Cloud Foundry 插件*    你将看到正常的插件安装窗口，要求你接受或拒绝许可协议。单击“下一步”和“确定”按钮，直到出现要求你重新启动
    Eclipse 的对话框，然后选择“立即重新启动”以重新启动它。    既然我们已经安装了插件，我们可以继续下一步：将我们的应用程序部署到 Cloud Foundry。    ####
    进行一些调整    Spring 和 Cloud Foundry 背后的团队一直致力于使在 Cloud Foundry 上部署 Spring 应用程序变得非常容易。一个明确的目标是，在大多数情况下，无需更改一行配置或代码即可部署
    Spring 应用程序。    不幸的是，这对我们的应用程序来说并非完全正确，因为如果不进行一些更改，它将无法部署。主要原因是，在撰写本文时，Cloud Foundry
    仅提供 Tomcat 6 实例（对 Tomcat 7 的支持已在路线图中）。另一个驱动更改的因素是 Cloud Foundry 中设置 SSL 的方式，这对我们配置
    Spring Security 的方式有一些影响。    ##### 切换到 Tomcat 6    Tomcat 6 是一个 Java EE5 Servlet
    容器，因此它不实现 Servlet 3 API。我们到目前为止使用的本地服务器实例是 Tomcat 7，它符合 Java EE 6。我们的示例应用程序明确依赖于
    Java EE 6——特别是 Servlet 3 API。    到目前为止，我们一直在 `BookstoreWebApplicationInitializer`
    中引导 Spring 应用程序上下文，它是 `org.springframework.web.WebApplicationInitializer` 的一个实现。`WebApplicationInitializer`
    机制使我们能够长时间不使用 `web.xml` 文件；但是，它依赖于 Servlet 3 实现才能工作。    由于 Cloud Foundry 使用 Tomcat
    6，我们必须回退到 Servlet 2.5 环境，并且需要创建一个 `web.xml` 文件，在其中重新创建我们在 `BookstoreWebApplicationInitializer`
    中所做的事情。为此，我们需要一个 `ApplicationContext`、一个 `DispatcherServlet`、一个 `OpenEntityManagerInViewFilter`
    以及配置 Spring Security 的过滤器。    通过添加 `ContextLoaderListener`，我们可以确保 `ApplicationContext`
    将被启动（参见清单 A-1）。    ***清单 A-1.** 在 web.xml 文件中添加 ContextLoaderListener*  `<!—`
    `    tells the ContextLoaderListener where to look for applicationContext` `    xml
    files` `-->` `<context-param>` `    <param-name>contextConfigLocation</param-name>`
    `    <param-value>classpath:/spring/context.xml</param-value>` `</context-param>`  `<!--
    the Listener will be called by the servlet container,` `     which will then boot
    a Spring ApplicationContext for us -->` `<listener>` `    <listener-class>` `        org.springframework.web.context.ContextLoaderListener`
    `    </listener-class>` `</listener>`  我们还需要通过使用 servlet 标签来声明一个 `DispatcherServlet`，如清单
    A-2 所示。    ***清单 A-2.** 在 web.xml 文件中添加 DispatcherServlet*  `<servlet>` `  <servlet-name>dispatcher</servlet-name>`
    `  <servlet-class>` `    org.springframework.web.servlet.DispatcherServlet` `  </servlet-class>`
    `  <init-param>` `    <param-name>contextClass</param-name>` `    <!-- note that
    we’re specifying the type of ApplicationContext here.` `         We’re using an
