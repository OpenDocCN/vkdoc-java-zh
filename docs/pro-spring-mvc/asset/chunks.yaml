- fmt: "# Type Conversion\n\nNow we have a list of selectable categories, which are\
    \ in fact domain entity objects. At binding time, the id of `category` needs to\
    \ be converted to a `Category` because that is the type we specified on our `OrderForm`\
    \ object.\n\n**Listing 11-7.** The Category In The OrderForm Is Now Our Entity\
    \ Class and No Longer a Long\n\n```\nprivate Category category;\n```\n\nTo enable\
    \ type conversion, we have to go back to our Web Flow configuration. We already\
    \ specified a flow builder service. Remember that the flow builder service allows\
    \ us to customize certain Web Flow behavior. We gave an introduction to the flow\
    \ builder possibilities in the previous chapter under the “Web Flow Configuration”\
    \ section. We will now see how we can use the flow builder services to specify\
    \ a custom conversion service. [Listing 11-8](#Chapter11.html#list_11_8) shows\
    \ our current configuration; this file can be found in `src/main/resources/spring/webflow-config.xml`.\n\
    \n**Listing 11-8.** The Current Flow Builder Services Configuration\n\n```\n<webflow:flow-builder-services\
    \ id=\"flowBuilderServices\" view-factory-creator=\"mvcViewFactoryCreator\" development=\"\
    true\"/>\n```\n\nThe conversion service is a bit a pain to explain because we\
    \ feel it is rather more complicated than it should be. The conversion service\
    \ is able to perform type conversion. For example, if your model has a field of\
    \ type `java.lang.Integer`, the code that performs the binding from the request\
    \ parameter to your model has to perform a conversion. Request parameters are\
    \ always received as `String`, so someone has to convert `java.lang.String` into\
    \ `java.lang.Integer`. Fortunately, a lot of basic converters are already there,\
    \ and you might not even notice that a conversion took place.\n\nUntil now, Web\
    \ Flow has had its own type conversion mechanism. Spring MVC uses a very similar,\
    \ but incompatible, type-conversion system, so a custom converter written for\
    \ Spring MVC should theoretically be rewritten for Web Flow. Fortunately, there\
    \ is now an adapter that allows you to plug your Spring MVC-specific converters\
    \ into Web Flow.\n\n**Note** Web Flow advises you to use the standard Spring MVC\
    \ conversion mechanism and that you no longer write converters the “Web Flow way”.\
    \ You can recognize such converters based on their package. The converter machinery\
    \ you should be using is the one from the `org.springframework.core.convert` package\
    \ and *not* the one from the Web Flow `org.springframework.binding.convert` package.\
    \ The latter is the one used solely by Web Flow, and it should be considered deprecated\
    \ for writing new, customized converters.\n\nIn our case, we will have to write\
    \ a converter that is able to convert from a `String` (representing a numerical\
    \ value from the select list) to a `Category` object. Let's begin by configuring\
    \ the conversion service (see [Listing 11-9](#Chapter11.html#list_11_9)), which\
    \ is found in `src/main/resources/spring/webflow-config.xml`.\n\n**Listing 11-9.**\
    \ Defining the Conversion Service\n\n```\n<bean id=\"conversionService\"\n class=\"\
    org.springframework.binding.convert.service.DefaultConversionService\">\n    <constructor-arg\
    \ ref=\"mvcConversionService\"/>\n</bean>\n```\n\nThis code basically creates\
    \ a Web Flow `DefaultConversionService`. The default conversion service registers\
    \ all default converters, and these are able to convert all primitive types, such\
    \ as `Integer`, `Long`, and so on. However, it also includes types such as `java.math.BigDecimal`\
    \ and `java.util.Date`. The conversion services also give you a hook to register\
    \ your own converters or register another conversion service as a delegate conversion\
    \ service. The hook provided to register a delegate is used to pass along the\
    \ core Spring MVC conversion service. The `DefaultConversionService` has explicit\
    \ support for the “new style” of delegate conversion services. Whenever the conversion\
    \ service is asked to convert a given type, it will look to see whether it can\
    \ deal with the conversion itself (possibly using existing Web Flow converters).\
    \ If it cannot, it then checks the converters available in the Spring MVC supplied\
    \ conversion service.\n\nFor the record, the Spring MVC conversion service (`org.springframework.format.support.DefaultFormattingConversionService`)\
    \ is configured automatically for us by Spring; it is one of the beans created\
    \ automatically when using the `@EnableWebMvc` annotation in `WebMvcContextConfiguration`.\
    \ The created Spring bean has the id of `mvcConversionService`. Next, we can pass\
    \ on the reference for our `conversionService` to the flow builder services (see\
    \ [Listing 11-10](#Chapter11.html#list_11_10)). You can find this service in `src/main/resources/spring/webflow-config.xml`.\
    \ This concludes the integration regarding conversion and formatting between Web\
    \ Flow and Spring MVC. The two sides are now joined and will act as one big conversion\
    \ or formatting service.\n\n**Listing 11-10.** The Flow Builder Services with\
    \ the Custom Conversion Service\n\n```\n<webflow:flow-builder-services id=\"flowBuilderServices\"\
    \ view-factory-creator=\"mvcViewFactoryCreator\" conversion-service=\"conversionService\"\
    \ development=\"true\"/>\n```\n\nFinally, we still have to register our custom\
    \ converter. In [Chapter 5](#Chapter05.html#ch5) (see the “Configuring Type Conversion”\
    \ section), we introduced the generic `com.apress.prospringmvc.bookstore.converter.StringToEntityConverter`.\
    \ We will reuse this converter, which will convert a `java.lang.String` (representing\
    \ our id in this case) to a target entity, our `Category` domain object (see [Listing\
    \ 11-11](#Chapter11.html#list_11_11)). You can find this bean in `com.apress.prospringmvc.bookstore.web.config.WebMvcContextConfiguration`.\n\
    \n**Listing 11-11.** Defining the Category Converter\n\n```\n@Bean\npublic StringToEntityConverter\
    \ categoryConverter() {\n    return new StringToEntityConverter(Category.class);\n\
    }\n```\n\nAs we have already seen, the MVC and Web Flow conversion/formatting\
    \ services are linked. We will use the Spring core service for adding custom converters,\
    \ which will then be available to Web Flow. In [Listing 11-12](#Chapter11.html#list_11_12),\
    \ we will add our converter to Spring MVC's `org.springframework.format.FormatterRegistry`.\
    \ The `addFormatters` method is called automatically by Spring, supplying the\
    \ `FormatterRegistry`. This is explained in detail in [Chapter 5](#Chapter05.html#ch5)'s\
    \ “Configuring Type Conversion” section.\n\n**Listing 11-12.** Adding the Converter\
    \ to the Registry in WebMvcContextConfiguration\n\n```\n@Override\nprotected void\
    \ addFormatters(FormatterRegistry registry) {\n    registry.addConverter(categoryConverter());\n\
    }\n```\n\n**Note** If you pay close attention, you will notice that we are adding\
    \ a converter to a `FormatterRegistry`. As you will see, formatting is a specialization\
    \ of conversion. The `FormatterRegistry` extends the `org.springframework.core.convert.converter.ConverterRegistry`,\
    \ so you can add both converters and formatters to the registry. As a reminder,\
    \ conversion and formatting is a part of core Spring MVC and is explained in detail\
    \ in [Chapter 5](#Chapter05.html#ch5) (see the “Converters” and “Formatters” sections)."
  raw: '##### Type Conversion


    Now we have a list of selectable categories, which are in fact domain entity objects.
    At binding time, the id of `category` needs to be converted to a `Category` because
    that is the type we specified on our `OrderForm` object.


    ***Listing 11-7.** The Category In The OrderForm Is Now Our Entity Class and No
    Longer a Long*


    `private Category category;`


    To enable type conversion, we have to go back to our Web Flow configuration. We
    already specified a flow builder service. Remember that the flow builder service
    allows us to customize certain Web Flow behavior. We gave an introduction to the
    flow builder possibilities in the previous chapter under the “Web Flow Configuration”
    section. We will now see how we can use the flow builder services to specify a
    custom conversion service. [Listing 11-8](#Chapter11.html#list_11_8) shows our
    current configuration; this file can be found in `src/main/resources/spring/webflow-config.xml`.


    ***Listing 11-8.** The Current Flow Builder Services Configuration*


    `<webflow:flow-builder-services id="flowBuilderServices" view-factory`![Image](images/U002.jpg)

    `-creator="mvcViewFactoryCreator" development="true"/>`


    The conversion service is a bit a pain to explain because we feel it is rather
    more complicated than it should be. The conversion service is able to perform
    type conversion. For example, if your model has a field of type `java.lang.Integer`,
    the code that performs the binding from the request parameter to your model has
    to perform a conversion. Request parameters are always received as `String`, so
    someone has to convert `java.lang.String` into `java.lang.Integer`. Fortunately,
    a lot of basic converters are already there, and you might not even notice that
    a conversion took place.


    Until now, Web Flow has had its own type conversion mechanism. Spring MVC uses
    a very similar, but incompatible, type-conversion system, so a custom converter
    written for Spring MVC should theoretically be rewritten for Web Flow. Fortunately,
    there is now an adapter that allows you to plug your Spring MVC-specific converters
    into Web Flow.


    ![Image](images/square.jpg)  **Note**  Web Flow advises you to use the standard
    Spring MVC conversion mechanism and that you no longer write converters the “Web
    Flow way”. You can recognize such converters based on their package. The converter
    machinery you should be using is the one from the `org.springframework.core.convert`
    package and *not* the one from the Web Flow `org.springframework.binding.convert`
    package. The latter is the one used solely by Web Flow, and it should be considered
    deprecated for writing new, customized converters.


    In our case, we will have to write a converter that is able to convert from a
    `String` (representing a numerical value from the select list) to a `Category`
    object. Let''s begin by configuring the conversion service (see [Listing 11-9](#Chapter11.html#list_11_9)),
    which is found in `src/main/resources/spring/webflow-config.xml`.


    ***Listing 11-9.** Defining the Conversion Service*


    `<bean id="conversionService"`

    ` class="org.springframework.binding.convert.service.DefaultConversionService">`

    `    <constructor-arg ref="mvcConversionService"/>`

    `</bean>`


    This code basically creates a Web Flow `DefaultConversionService`. The default
    conversion service registers all default converters, and these are able to convert
    all primitive types, such as `Integer`, `Long`, and so on. However, it also includes
    types such as `java.math.BigDecimal` and `java.util.Date`. The conversion services
    also give you a hook to register your own converters or register another conversion
    service as a delegate conversion service. The hook provided to register a delegate
    is used to pass along the core Spring MVC conversion service. The `DefaultConversionService`
    has explicit support for the “new style” of delegate conversion services. Whenever
    the conversion service is asked to convert a given type, it will look to see whether
    it can deal with the conversion itself (possibly using existing Web Flow converters).
    If it cannot, it then checks the converters available in the Spring MVC supplied
    conversion service.


    For the record, the Spring MVC conversion service (`org.springframework.format.support.DefaultFormattingConversionService`)
    is configured automatically for us by Spring; it is one of the beans created automatically
    when using the `@EnableWebMvc` annotation in `WebMvcContextConfiguration`. The
    created Spring bean has the id of `mvcConversionService`. Next, we can pass on
    the reference for our `conversionService` to the flow builder services (see [Listing
    11-10](#Chapter11.html#list_11_10)). You can find this service in `src/main/resources/spring/webflow-config.xml`.
    This concludes the integration regarding conversion and formatting between Web
    Flow and Spring MVC. The two sides are now joined and will act as one big conversion
    or formatting service.


    ***Listing 11-10.** The Flow Builder Services with the Custom Conversion Service*


    `<webflow:flow-builder-services id="flowBuilderServices" view-factory`![Image](images/U002.jpg)

    `-creator="mvcViewFactoryCreator"` **`conversion-service="conversionService"`**
    `development="true"/>`


    Finally, we still have to register our custom converter. In [Chapter 5](#Chapter05.html#ch5)
    (see the “Configuring Type Conversion” section), we introduced the generic `com.apress.prospringmvc.bookstore.converter``.StringToEntityConverter`.
    We will reuse this converter, which will convert a `java.lang.String` (representing
    our id in this case) to a target entity, our `Category` domain object (see [Listing
    11-11](#Chapter11.html#list_11_11)). You can find this bean in `com.apress.prospringmvc.bookstore.web.config.WebMvcContextConfiguration`.


    ***Listing 11-11.** Defining the Category Converter*


    `@Bean`

    `public StringToEntityConverter categoryConverter() {`

    `    return new StringToEntityConverter(Category.class);`

    `}`


    As we have already seen, the MVC and Web Flow conversion/formatting services are
    linked. We will use the Spring core service for adding custom converters, which
    will then be available to Web Flow. In [Listing 11-12](#Chapter11.html#list_11_12),
    we will add our converter to Spring MVC''s `org.springframework.format.FormatterRegistry`.
    The `addFormatters` method is called automatically by Spring, supplying the `FormatterRegistry`.
    This is explained in detail in [Chapter 5](#Chapter05.html#ch5)''s “Configuring
    Type Conversion” section.


    ***Listing 11-12.** Adding the Converter to the Registry in WebMvcContextConfiguration*


    `@Override`

    `protected void addFormatters(FormatterRegistry registry) {`

    `    registry.addConverter(categoryConverter());`

    `}`


    ![Image](images/square.jpg)  **Note**  If you pay close attention, you will notice
    that we are adding a converter to a `FormatterRegistry`. As you will see, formatting
    is a specialization of conversion. The `FormatterRegistry` extends the `org.springframework.core.convert.converter.ConverterRegistry`,
    so you can add both converters and formatters to the registry. As a reminder,
    conversion and formatting is a part of core Spring MVC and is explained in detail
    in [Chapter 5](#Chapter05.html#ch5) (see the “Converters” and “Formatters” sections).'
  trans: '

    ##### 类型转换


    现在我们有了一个可选分类列表，这些分类实际上是领域实体对象。在绑定时，`category` 的 id 需要转换为 `Category` 类型，因为这是我们在
    `OrderForm` 对象上指定的类型。


    ***清单 11-7.** OrderForm 中的 Category 现在是我们的实体类，而不再是 Long 类型*


    `private Category category;`


    要启用类型转换，我们必须回到 Web Flow 配置中。我们已经指定了一个流程构建器服务。请记住，流程构建器服务允许我们自定义某些 Web Flow 行为。我们在上一章的“Web
    Flow 配置”部分介绍了流程构建器的可能性。现在我们将看到如何使用流程构建器服务来指定自定义转换服务。清单 11-8 显示了我们当前的配置；该文件可以在
    `src/main/resources/spring/webflow-config.xml` 中找到。


    ***清单 11-8.** 当前的流程构建器服务配置*


    `<webflow:flow-builder-services id="flowBuilderServices" view-factory`![Image](img/U002.jpg)

    `-creator="mvcViewFactoryCreator" development="true"/>`


    解释转换服务有点麻烦，因为我们觉得它比实际应该的要复杂得多。转换服务能够执行类型转换。例如，如果你的模型有一个 `java.lang.Integer` 类型的字段，执行从请求参数到模型绑定的代码就必须进行转换。请求参数总是作为
    `String` 接收，因此必须有人将 `java.lang.String` 转换为 `java.lang.Integer`。幸运的是，许多基本转换器已经存在，你可能甚至没有注意到转换的发生。


    到目前为止，Web Flow 拥有自己的类型转换机制。Spring MVC 使用一个非常相似但不兼容的类型转换系统，因此为 Spring MVC 编写的自定义转换器理论上需要为
    Web Flow 重写。幸运的是，现在有一个适配器，允许你将 Spring MVC 特定的转换器插入到 Web Flow 中。


    ![Image](img/square.jpg)  **注意**  Web Flow 建议你使用标准的 Spring MVC 转换机制，并且不再以“Web
    Flow 方式”编写转换器。你可以根据它们的包来识别这些转换器。你应该使用的转换器机制来自 `org.springframework.core.convert`
    包，*而不是* Web Flow 的 `org.springframework.binding.convert` 包。后者仅由 Web Flow 使用，并且对于编写新的自定义转换器来说，它应被视为已弃用。


    在我们的案例中，我们必须编写一个能够将 `String`（表示选择列表中的数值）转换为 `Category` 对象的转换器。让我们从配置转换服务开始（参见清单
    11-9），该配置位于 `src/main/resources/spring/webflow-config.xml` 中。


    ***清单 11-9.** 定义转换服务*


    `<bean id="conversionService"`

    ` class="org.springframework.binding.convert.service.DefaultConversionService">`

    `    <constructor-arg ref="mvcConversionService"/>`

    `</bean>`


    这段代码基本上创建了一个 Web Flow 的 `DefaultConversionService`。默认转换服务注册了所有默认转换器，这些转换器能够转换所有原始类型，例如
    `Integer`、`Long` 等。然而，它也包括像 `java.math.BigDecimal` 和 `java.util.Date` 这样的类型。转换服务还为你提供了一个钩子来注册你自己的转换器，或者注册另一个转换服务作为委托转换服务。用于注册委托的钩子被用来传递核心的
    Spring MVC 转换服务。`DefaultConversionService` 明确支持“新样式”的委托转换服务。每当要求转换服务转换给定类型时，它会先查看自己是否能处理该转换（可能使用现有的
    Web Flow 转换器）。如果不能，它会检查 Spring MVC 提供的转换服务中可用的转换器。


    需要说明的是，Spring MVC 转换服务（`org.springframework.format.support.DefaultFormattingConversionService`）是由
    Spring 自动为我们配置的；它是在 `WebMvcContextConfiguration` 中使用 `@EnableWebMvc` 注解时自动创建的
    bean 之一。创建的 Spring bean 的 id 为 `mvcConversionService`。接下来，我们可以将对 `conversionService`
    的引用传递给流程构建器服务（参见清单 11-10）。你可以在 `src/main/resources/spring/webflow-config.xml`
    中找到此服务。这完成了 Web Flow 和 Spring MVC 之间关于转换和格式化的集成。现在双方已连接，并将作为一个大的转换或格式化服务运行。


    ***清单 11-10.** 带有自定义转换服务的流程构建器服务*


    `<webflow:flow-builder-services id="flowBuilderServices" view-factory`![Image](img/U002.jpg)

    `-creator="mvcViewFactoryCreator"` **`conversion-service="conversionService"`**
    `development="true"/>`


    最后，我们仍然需要注册我们的自定义转换器。在第 5 章（参见“配置类型转换”部分）中，我们介绍了通用的 `com.apress.prospringmvc.bookstore.converter``.StringToEntityConverter`。我们将重用这个转换器，它将把
    `java.lang.String`（在本例中代表我们的 id）转换为目标实体，即我们的 `Category` 领域对象（参见清单 11-11）。你可以在
    `com.apress.prospringmvc.bookstore.web.config.WebMvcContextConfiguration` 中找到这个
    bean。


    ***清单 11-11.** 定义 Category 转换器*


    `@Bean`

    `public StringToEntityConverter categoryConverter() {`

    `    return new StringToEntityConverter(Category.class);`

    `}`


    正如我们已经看到的，MVC 和 Web Flow 的转换/格式化服务是关联的。我们将使用 Spring 核心服务来添加自定义转换器，这些转换器随后将对 Web
    Flow 可用。在清单 11-12 中，我们将把转换器添加到 Spring MVC 的 `org.springframework.format.FormatterRegistry`
    中。`addFormatters` 方法由 Spring 自动调用，并提供 `FormatterRegistry`。这在第 5 章的“配置类型转换”部分有详细解释。


    ***清单 11-12.** 在 WebMvcContextConfiguration 中将转换器添加到注册表*


    `@Override`

    `protected void addFormatters(FormatterRegistry registry) {`

    `    registry.addConverter(categoryConverter());`

    `}`


    ![Image](img/square.jpg)  **注意**  如果你仔细观察，你会注意到我们正在向 `FormatterRegistry` 添加一个转换器。正如你将看到的，格式化是转换的一种特化。`FormatterRegistry`
    扩展了 `org.springframework.core.convert.converter.ConverterRegistry`，因此你可以同时向注册表添加转换器和格式化器。提醒一下，转换和格式化是核心
    Spring MVC 的一部分，并在第 5 章（参见“转换器”和“格式化器”部分）中有详细解释。

    '
- fmt: "##### Type Formatting\n\nA formatter is nothing more than the specialization\
    \ of an `org.springframework.core.convert.converter.Converter`. Internally, formatters\
    \ are transformed to an `org.springframework.core.convert.converter.GenericConverter`.¹\
    \ This makes sense if you think about it; a formatter is a one-way converter,\
    \ where you define the rules for how a certain object is visualized when rendered\
    \ in the view.\n\nBy enabling the conversion service in Web Flow and coupling\
    \ it to the Spring conversion service, we implicitly enable formatting via the\
    \ Spring MVC conversion service. Any formatter registered with the service will\
    \ also be useable by Web Flow.\n\nWe will have to customize the formatting of\
    \ our delivery and order date. We don't have to register a specific converter\
    \ or formatter because date formatting is available by default. However, we want\
    \ a specific pattern, so we added the default Spring annotation for formatting\
    \ dates and time to the definition of the fields in the `OrderForm`. This will\
    \ steer the formatting process (see [Listing 11-13](#Chapter11.html#list_11_13)).\n\
    \n¹ You can see this in the `addFormatterForFieldType` method in the `org.springframework.format.support.FormattingConversionService`.\n\
    \n***Listing 11-13.** Formatting the Delivery and Order Date in the OrderForm*\n\
    \n```\n@DateTimeFormat(pattern = \"MM-dd-yyyy\")\nprivate Date deliveryDate;\n\
    @DateTimeFormat(pattern = \"MM-dd-yyyy\")\nprivate Date orderDate;\n```\n\n####\
    \ Selecting Books and Delivery Options\n\nWe have to repeat the refactorings we\
    \ performed in the previous part for our selecting books view state. In the previous\
    \ chapter, we used an evaluate action in the `next` transition after transitioning\
    \ to the `selectBooks` view state, as shown in [Listing 11-14](#Chapter11.html#list_11_14).\n\
    \n***Listing 11-14.** The Old Way: Initializing Books with an Evaluate Action*\n\
    \n```\n<transition on=\"next\" to=\"selectBooks\" >\n    <evaluate\n    expression=\"\
    orderController.initializeSelectableBooks(flowScope.orderForm)\"\n    result=\"\
    flowScope.selectableBooks\" />\n</transition>\n```\n\nWe will remove the `evaluate`\
    \ action just listed and replace it using the same on render mechanism (see [Listing\
    \ 11-15](#Chapter11.html#list_11_15)).\n\n***Listing 11-15.** Using on render\
    \ to Initialize Our Selectable Books*\n\n```\n<view-state id=\"selectBooks\" view=\"\
    selectBooks\" model=\"orderForm\" >\n    <on-render>\n        <evaluate expression=\"\
    orderController.initializeSelectableBooks(flowScope.orderForm)\"\n           \
    \       result=\"flowScope.selectableBooks\" />\n    </on-render>\n    <transition\
    \ on=\"previous\" to=\"selectCategory\" />\n    <transition on=\"add\">\n    \
    \    <evaluate expression=\"orderController.addBook(flowScope.orderForm)\" />\n\
    \    </transition>\n    <transition on=\"next\" to=\"selectDeliveryOptions\" />\n\
    \    <transition on=\"reset\" to=\"selectBooks\">\n        <evaluate expression=\"\
    orderForm.resetSelectedBooks()\" />\n    </transition>\n    <transition on=\"\
    cancel\" to=\"end\" />\n</view-state>\n```\n\nThis makes the evaluate action in\
    \ the `on next` transition of the previous `selectCategory` view state obsolete.\n\
    \nLikewise, we changed the select list, `selectBooks.jsp`, to render the title\
    \ as item label and the id as item value because the objects stored for the selectable\
    \ books will now be `Book` domain entities (see [Listing 11-16](#Chapter11.html#list_11_16)).\
    \ You can find the select books file in `src/main/webapp/WEB-INF/view/createOrders/selectBooks.jsp`.\n\
    \n***Listing 11-16.** Adding itemLabel and itemValue to the Book Form's Select*\n\
    \n```\n<form:select path=\"book items=\"${selectableBooks}\" itemLabel=\"title\"\
    \ itemValue=\"id\"/>\n```\n\nFinally, we also need to register a converter for\
    \ the `Book` domain entity. This will be the exact same procedure as for the `Category`.\
    \ Here we use the generic `com.apress.prospringmvc.bookstore.converter.StringToEntityConverter`.\
    \ We just need to register the converter with the correct parameterization in\
    \ our Spring MVC configuration class (located in `com.apress.prospringmvc.bookstore.web.config.WebMvcContextConfiguration.java`),\
    \ as shown in [Listing 11-17](#Chapter11.html#list_11_17).\n\n***Listing 11-17.**\
    \ Defining the Book Converter*\n\n```\n@Bean\npublic StringToEntityConverter bookConverter()\
    \ {\n    return new StringToEntityConverter(Book.class);\n}\n```\n\nNext, we can\
    \ continue with the specific refactorings for the select book and select delivery\
    \ options of our application. This involves adding validation, so a user is notified\
    \ when submitting a form with invalid or missing data. We will see that there\
    \ are roughly three ways of performing validation: using the JSR 303 annotations,\
    \ using validator methods in our form (or separate classes) that are recognized\
    \ by `Web Flow`, and applying validation in our application controller itself."
  raw: '##### Type Formatting


    A formatter is nothing more than the specialization of an `org.springframework.core.convert.converter.Converter`.
    Internally, formatters are transformed to an `org.springframework.core.convert.converter.GenericConverter`.^([1](#Chapter11.html#CHP-11-FN-1))
    This makes sense if you think about it; a formatter is a one-way converter, where
    you define the rules for how a certain object is visualized when rendered in the
    view.


    By enabling the conversion service in Web Flow and coupling it to the Spring conversion
    service, we implicitly enable formatting via the Spring MVC conversion service.
    Any formatter registered with the service will also be useable by Web Flow.


    We will have to customize the formatting of our delivery and order date. We don''t
    have to register a specific converter or formatter because date formatting is
    available by default. However, we want a specific pattern, so we added the default
    Spring annotation for formatting dates and time to the definition of the fields
    in the `OrderForm`. This will steer the formatting process (see [Listing 11-13](#Chapter11.html#list_11_13)).


    ____________


    ¹ You can see this in the `addFormatterForFieldType` method in the `org.springframework.format.support.FormattingConversionService.`


    ***Listing 11-13.** Formatting the Delivery and Order Date in the OrderForm*


    **`@DateTimeFormat(pattern = "MM-dd-yyyy")`**

    `private Date deliveryDate;`

    **`@DateTimeFormat(pattern = "MM-dd-yyyy")`**

    `private Date orderDate;`


    #### Selecting Books and Delivery Options


    We have to repeat the refactorings we performed in the previous part for our selecting
    books view state. In the previous chapter, we used an evaluate action in the `next`
    transition after transitioning to the `selectBooks` view state, as shown in [Listing
    11-14](#Chapter11.html#list_11_14).


    ***Listing 11-14.** The Old Way: Initializing Books with an Evaluate Action*


    `<transition on="next" to="selectBooks" >`

    `    <evaluate`

    `    expression="orderController.initializeSelectableBooks(flowScope.orderForm)"`

    `    result="flowScope.selectableBooks" />`

    `</transition>`


    We will remove the `evaluate` action just listed and replace it using the same
    on render mechanism (see [Listing 11-15](#Chapter11.html#list_11_15)).


    ***Listing 11-15.** Using on render to Initialize Our Selectable Books*


    `<view-state id="selectBooks" view="selectBooks" model="orderForm" >`

    `    <on-render>`

    `        <evaluate expression="orderController.`![Image](images/U002.jpg)

    `initializeSelectableBooks(flowScope.orderForm)"` ![Image](images/U002.jpg)

    `                  result="flowScope.selectableBooks" />`

    `    </on-render>`

    `    <transition on="previous" to="selectCategory" />`

    `    <transition on="add">`

    `        <evaluate expression="orderController.addBook(flowScope.orderForm)" />`

    `    </transition>`

    `    <transition on="next" to="selectDeliveryOptions" />`

    `    <transition on="reset" to="selectBooks">`

    `        <evaluate expression="orderForm.resetSelectedBooks()" />`

    `    </transition>`

    `    <transition on="cancel" to="end" />`

    `</view-state>`


    This makes the evaluate action in the `on next` transition of the previous `selectCategory`
    view state obsolete.


    Likewise, we changed the select list, `selectBooks.jsp`, to render the title as
    item label and the id as item value because the objects stored for the selectable
    books will now be `Book` domain entities (see [Listing 11-16](#Chapter11.html#list_11_16)).
    You can find the select books file in `src/main/webapp/WEB-INF/view/createOrders/selectBooks.jsp`.


    ***Listing 11-16.** Adding itemLabel and itemValue to the Book Form''s Select*


    `<form:select path="book items="${selectableBooks}" itemLabel="title" itemValue="id"/>`


    Finally, we also need to register a converter for the `Book` domain entity. This
    will be the exact same procedure as for the `Category`. Here we use the generic
    `com.apress.prospringmvc.bookstore.converter.StringToEntityConverter`. We just
    need to register the converter with the correct parameterization in our Spring
    MVC configuration class (located in `com.apress.prospringmvc.bookstore.web.config.WebMvcContextConfiguration.java`),
    as shown in [Listing 11-17](#Chapter11.html#list_11_17).


    ***Listing 11-17.** Defining the Book Converter*


    `@Bean`

    `public StringToEntityConverter bookConverter() {`

    `    return new StringToEntityConverter(Book.class);`

    `}`


    Next, we can continue with the specific refactorings for the select book and select
    delivery options of our application. This involves adding validation, so a user
    is notified when submitting a form with invalid or missing data. We will see that
    there are roughly three ways of performing validation: using the JSR 303 annotations,
    using validator methods in our form (or separate classes) that are recognized
    by `Web Flow`, and applying validation in our application controller itself.'
  trans: '

    ##### 类型格式化


    格式化器不过是 `org.springframework.core.convert.converter.Converter` 的一种特化实现。在内部，格式化器会被转换为
    `org.springframework.core.convert.converter.GenericConverter`¹。这其实不难理解：格式化器是一种单向转换器，你可以在其中定义特定对象在视图中渲染时的可视化规则。


    通过在 Web Flow 中启用转换服务并将其与 Spring 转换服务关联，我们实际上间接通过 Spring MVC 转换服务启用了格式化功能。任何在该服务中注册的格式化器也都能被
    Web Flow 使用。


    我们需要自定义配送日期和订单日期的格式化方式。由于日期格式化默认可用，我们无需注册特定的转换器或格式化器。但为了使用特定的日期格式，我们在 `OrderForm`
    的字段定义中添加了 Spring 默认的日期时间格式化注解。这将引导格式化流程（参见清单 11-13）。


    ____________


    ¹ 你可以在 `org.springframework.format.support.FormattingConversionService` 的 `addFormatterForFieldType`
    方法中看到这一点。


    ***清单 11-13.** 在 OrderForm 中格式化配送日期和订单日期*


    **`@DateTimeFormat(pattern = "MM-dd-yyyy")`**

    `private Date deliveryDate;`

    **`@DateTimeFormat(pattern = "MM-dd-yyyy")`**

    `private Date orderDate;`


    #### 选择书籍与配送选项


    我们需要对选择书籍的视图状态重复上一部分的重构操作。在上一章中，我们在转换到 `selectBooks` 视图状态后，于 `next` 转换中使用了 evaluate
    动作，如清单 11-14 所示。


    ***清单 11-14.** 旧方法：使用 Evaluate 动作初始化书籍*


    `<transition on="next" to="selectBooks" >`

    `    <evaluate`

    `    expression="orderController.initializeSelectableBooks(flowScope.orderForm)"`

    `    result="flowScope.selectableBooks" />`

    `</transition>`


    我们将移除上述 `evaluate` 动作，并用相同的 on render 机制替代它（参见清单 11-15）。


    ***清单 11-15.** 使用 on render 初始化可选书籍*


    `<view-state id="selectBooks" view="selectBooks" model="orderForm" >`

    `    <on-render>`

    `        <evaluate expression="orderController.`![Image](img/U002.jpg)

    `initializeSelectableBooks(flowScope.orderForm)"` ![Image](img/U002.jpg)

    `                  result="flowScope.selectableBooks" />`

    `    </on-render>`

    `    <transition on="previous" to="selectCategory" />`

    `    <transition on="add">`

    `        <evaluate expression="orderController.addBook(flowScope.orderForm)" />`

    `    </transition>`

    `    <transition on="next" to="selectDeliveryOptions" />`

    `    <transition on="reset" to="selectBooks">`

    `        <evaluate expression="orderForm.resetSelectedBooks()" />`

    `    </transition>`

    `    <transition on="cancel" to="end" />`

    `</view-state>`


    这使得前一个 `selectCategory` 视图状态中 `on next` 转换里的 evaluate 动作变得多余。


    同样地，我们修改了选择列表 `selectBooks.jsp`，将标题渲染为项目标签，将 ID 渲染为项目值，因为现在可选书籍存储的是 `Book` 领域实体（参见清单
    11-16）。你可以在 `src/main/webapp/WEB-INF/view/createOrders/selectBooks.jsp` 中找到该选择书籍文件。


    ***清单 11-16.** 为书籍表单的选择框添加 itemLabel 和 itemValue*


    `<form:select path="book items="${selectableBooks}" itemLabel="title" itemValue="id"/>`


    最后，我们还需要为 `Book` 领域实体注册一个转换器。其流程与 `Category` 完全相同。这里我们使用通用的 `com.apress.prospringmvc.bookstore.converter.StringToEntityConverter`。只需在
    Spring MVC 配置类（位于 `com.apress.prospringmvc.bookstore.web.config.WebMvcContextConfiguration.java`）中注册带有正确参数化的转换器即可，如清单
    11-17 所示。


    ***清单 11-17.** 定义书籍转换器*


    `@Bean`

    `public StringToEntityConverter bookConverter() {`

    `    return new StringToEntityConverter(Book.class);`

    `}`


    接下来，我们可以继续针对应用程序的选择书籍和选择配送选项进行具体重构。这涉及添加验证功能，以便用户在提交包含无效或缺失数据的表单时收到通知。我们将看到执行验证大致有三种方式：使用
    JSR 303 注解、使用 `Web Flow` 可识别的表单（或独立类）中的验证器方法，以及在应用程序控制器本身中应用验证。

    '
- fmt: "# Form Validation Using JSR 303 Annotations\n\nYou can configure Web Flow\
    \ to perform JSR 303 validation (i.e., bean validation). For example, if you annotate\
    \ your model with annotations from `javax.constraints.validation` (e.g., `@Min`\
    \ or `@Max`), then validation will take place and error messages will be created\
    \ for that path within your model. For this to work, you have to supply the flow\
    \ builder services with an `org.springframework.validation.beanvalidation.LocalValidatorFactoryBean`.\n\
    \n[Listing 11-18](#Chapter11.html#list_11_18) defines the factory bean that will\
    \ enable JSR-303 validation. You can find this bean in `src/main/resources/spring/webflow-config.xml`.\n\
    \n**Listing 11-18.** Defining the Bean Validator Factory Bean\n\n```\n<bean id=\"\
    validator\" class=\"org.springframework.validation.beanvalidation\n.LocalValidatorFactoryBean\"\
    \ />\n```\n\nNext, we can complete our flow builder services configuration, as\
    \ shown in [Listing 11-19](#Chapter11.html#list_11_19). You can find this configuration\
    \ file in `src/main/resources/spring/webflow-config.xml`.\n\n**Listing 11-19.**\
    \ Enabling Bean Validation\n\n```\n<webflow:flow-builder-services id=\"flowBuilderServices\"\
    \ view-factory-creator=\n\"mvcViewFactoryCreator\" conversion-service=\"conversionService\"\
    \ validator=\"validator\"\n development=\"true\" />\n```\n\nWhen this is all set,\
    \ we can simply apply annotations on our form (see [Listing 11-20](#Chapter11.html#list_11_20)),\
    \ which is located in the `com.apress.prospringmvc.bookstore.web.controller.OrderForm`.\
    \ For now, we will just use the validation for the `quantity` field. This is the\
    \ field that a user can change when adding books to the order. The default value\
    \ is `1`, but the user can also add multiple books to the order directly.\n\n\
    **Listing 11-20.** Adding Validation Annotations\n\n```\npackage com.apress.prospringmvc.bookstore.web.controller;\n\
    \nimport javax.validation.constraints.Max;\nimport javax.validation.constraints.Min;\n\
    import javax.validation.constraints.NotNull;\n\n@NotNull\n@Min(1)\n@Max(999)\n\
    private Integer quantity;\n```\n\nWe could use bean validation for the other fields,\
    \ as well. However, there are two reasons why this would be troublesome:\n\n-\
    \ First, the validation API is good at validating a single field, but we will\
    \ also have to validate a combination of fields. For example, later on we will\
    \ have to check that the entered delivery date is after the order date. The validation\
    \ API has the group feature to validate fields in a group, but it is not possible\
    \ to indicate a more complex relationship without writing a custom bean validator.\
    \ Unfortunately, this is not something the bean validation supports out of the\
    \ box. We will use one of the two other ways of validation (yet to be seen) to\
    \ do this.\n- Second, the problem with this validation setup is that the entire\
    \ form gets validated as a whole, yet we only use a part of it for each step or\
    \ our flow. Basically, this means that, when setting the `Category` on the first\
    \ page, all of the other validation annotations would be triggered, as well. If\
    \ we were to put a `@NotNull` annotation above the `Book` instance field, then\
    \ we would get an error that no `Book` is selected when we select a `Category`.\
    \ A solution could be to divide the form into multiple smaller forms. But for\
    \ now, we will validate the other fields in a different way. Also, note that the\
    \ `quantity` field does not suffer from this problem because we initialized its\
    \ value to `1`. So, when selecting a `Category`, the `quantity` field will be\
    \ validated, but it will be found valid because its value is `1`. Later, when\
    \ the user can select the quantity in the `select books` page, the validator will\
    \ trigger an error when the user specifies a value that is not allowed.\n\n**Note**\
    \ For JSR303 validations, you need the validation API (that contains the `javax.constraints.validation`\
    \ annotations) on your compile classpath. But at runtime, we also need a provider.\
    \ Tomcat does not ship with one, so we are using the Hibernate Validator (which\
    \ is also the RI, Reference Implementation, for JSR 303).^([2](#Chapter11.html#CHP-11-FN-2))\
    \ We just have to put these validations on our classpath—but that's all we have\
    \ to do because we previously configured Web Flow with the `LocalValidatorFactoryBean`.\
    \ To define the dependency, we added it to the project's root gradle file (`build.gradle`\
    \ in the samples root directory):\n\n```\ncompile \"org.hibernate:hibernate-validator:$hibernateValidatorVersion\"\
    \ncompile \"javax.validation:validation-api:1.0.0.GA\"\n```\n\n## Form Validation\
    \ Using the Web Flow Validator Method and Classes\n\nThe second way to perform\
    \ validation is by implementing a method in the form of a `validate*State*` method\
    \ in our model. This type of validation is detected by Web Flow purely by following\
    \ naming conventions. The word \"validate\" is mandatory, while \"*state*\" is\
    \ a placeholder that needs to be replaced by the id of state for which the validation\
    \ should be applied to. Web Flow will execute the validation on post back to the\
    \ defined state. So the validation is not executed the first time the view state\
    \ is rendered, but when a postback is made (e.g., when a form is submitted).\n\
    \nIn the example in [Listing 11-21](#Chapter11.html#list_11_21), the validation\
    \ is triggered when we make a transition to the `selectCategory` state. We check\
    \ that the event that triggered the transition is the `next` event. If the user\
    \ were to click the cancel button, then we would not want to perform the validation.\
    \ The `org.springframework.binding.validation.ValidationContext` is automatically\
    \ injected by Web Flow. If we were to add an error code, then the code would be\
    \ automatically resolved with the registered `org.springframework.context.MessageSource`\
    \ (this code can be found inside the `com.apress.prospringmvc.bookstore.web.controller.OrderForm`).\n\
    \n**Listing 11-21.** Validating the Category\n\n```\npublic void validateSelectCategory(ValidationContext\
    \ context) {\n    if (context.getUserEvent().equals(\"next\")) {\n        MessageContext\
    \ messages = context.getMessageContext();\n        if (category == null) {\nmessages.addMessage(new\
    \ \n            MessageBuilder().error().source(\"category\")\n            .code(\"\
    error.page.category.required\").build());\n        }\n    }\n}\n```\n\nA variation\
    \ on this is to store the validation logic separately from your model in a `validator`\
    \ class (see [Listing 11-22](#Chapter11.html#list_11_22)). To do so, you have\
    \ to follow more naming conventions for classname and the `validation` method.\
    \ The class should be named `modelnameValidator`, while the method should be named\
    \ `validateState`. In our case the classname would become `OrderFormValidator`,\
    \ and the method would be the same one used previously in `validateSelectShop`.\
    \ In the case of an external validator, you would also get the model as a parameter\
    \ to the `validate` method and, optionally, the Spring MVC `Errors` object.\n\n\
    ² [http://download.oracle.com/otndocs/jcp/bean_validation-1.0-fr-oth-JSpec](http://download.oracle.com/otndocs/jcp/bean_validation-1.0-fr-oth-JSpec)/\n\
    \n**Listing 11-22.** The Separate Validator Class\n\n```\n@Component\npublic class\
    \ OrderModelValidator{\n    public void validateSelectShop(OrderForm orderForm,\
    \ ValidationContext context,\n Errors errors) {\n```\n\nThe final requirement\
    \ is that the bean should be registered as a Spring bean. In an annotation-driven\
    \ model like this one, you can simply add the `@Component` above the class definition\
    \ and make sure the class will be picked up by the component scan.\n\n**Note**\
    \ In the sample application, we have opted to store the validation together with\
    \ the model, so you will not find an external `OrderFormValidator`. But feel free\
    \ to experiment and try to move validation logic from the `OrderForm` to a separate\
    \ validator."
  raw: '#### Form Validation Using JSR 303 Annotations


    You can configure Web Flow to perform JSR 303 validation (i.e., bean validation).
    For example, if you annotate your model with annotations from `javax.constraints.validation`
    (e.g., `@Min` or `@Max`), then validation will take place and error messages will
    be created for that path within your model. For this to work, you have to supply
    the flow builder services with an `org.springframework.validation.beanvalidation.LocalValidatorFactoryBean`.


    [Listing 11-18](#Chapter11.html#list_11_18) defines the factory bean that will
    enable JSR-303 validation. You can find this bean in `src/main/resources/spring/webflow-config.xml`.


    ***Listing 11-18.** Defining the Bean Validator Factory Bean*


    `<bean id="validator" class="org.springframework.validation.beanvalidation`![Image](images/U002.jpg)

    `.LocalValidatorFactoryBean" />`


    Next, we can complete our flow builder services configuration, as shown in [Listing
    11-19](#Chapter11.html#list_11_19). You can find this configuration file in `src/main/resources/spring/webflow-config.xml`.


    ***Listing 11-19.** Enabling Bean Validation*


    `<webflow:flow-builder-services id="flowBuilderServices" view-factory-creator=`![Image](images/U002.jpg)

    `"mvcViewFactoryCreator" conversion-service="conversionService" validator="validator"`![Image](images/U002.jpg)

    ` development="true" />`


    When this is all set, we can simply apply annotations on our form (see [Listing
    11-20](#Chapter11.html#list_11_20)), which is located in the `com.apress.prospringmvc.bookstore.web.controller.OrderForm`.
    For now, we will just use the validation for the `quantity` field. This is the
    field that a user can change when adding books to the order. The default value
    is `1`, but the user can also add multiple books to the order directly.


    ***Listing 11-20.** Adding Validation Annotations*


    `package com.apress.prospringmvc.bookstore.web.controller;`


    `import javax.validation.constraints.Max;`

    `import javax.validation.constraints.Min;`

    `import javax.validation.constraints.NotNull;`


    `@NotNull`

    `@Min(1)`

    `@Max(999)`

    `private Integer quantity;`


    We could use bean validation for the other fields, as well. However, there are
    two reasons why this would be troublesome:


    *   First, the validation API is good at validating a single field, but we will
    also have to validate a combination of fields. For example, later on we will have
    to check that the entered delivery date is after the order date. The validation
    API has the group feature to validate fields in a group, but it is not possible
    to indicate a more complex relationship without writing a custom bean validator.
    Unfortunately, this is not something the bean validation supports out of the box.
    We will use one of the two other ways of validation (yet to be seen) to do this.

    *   Second, the problem with this validation setup is that the entire form gets
    validated as a whole, yet we only use a part of it for each step or our flow.
    Basically, this means that, when setting the `Category` on the first page, all
    of the other validation annotations would be triggered, as well. If we were to
    put a `@NotNull` annotation above the `Book` instance field, then we would get
    an error that no `Book` is selected when we select a `Category`. A solution could
    be to divide the form into multiple smaller forms. But for now, we will validate
    the other fields in a different way. Also, note that the `quantity` field does
    not suffer from this problem because we initialized its value to `1`. So, when
    selecting a `Category`, the `quantity` field will be validated, but it will be
    found valid because its value is `1`. Later, when the user can select the quantity
    in the `select books` page, the validator will trigger an error when the user
    specifies a value that is not allowed.


    ![Image](images/square.jpg)  **Note**  For JSR303 validations, you need the validation
    API (that contains the `javax.constraints.validation` annotations) on your compile
    classpath. But at runtime, we also need a provider. Tomcat does not ship with
    one, so we are using the Hibernate Validator (which is also the RI, Reference
    Implementation, for JSR 303).^([2](#Chapter11.html#CHP-11-FN-2)) We just have
    to put these validations on our classpath—but that''s all we have to do because
    we previously configured Web Flow with the `LocalValidatorFactoryBean`. To define
    the dependency, we added it to the project''s root gradle file (`build.gradle`
    in the samples root directory):


    `compile "org.hibernate:hibernate-validator:$hibernateValidatorVersion"`

    `compile "javax.validation:validation-api:1.0.0.GA"`


    ##### Form Validation Using the Web Flow Validator Method and Classes


    The second way to perform validation is by implementing a method in the form of
    a "`validate`*`State"`* method in our model. This type of validation is detected
    by Web Flow purely by following naming conventions. The word “validate” is mandatory,
    while “*state*” is a placeholder that needs to be replaced by the id of state
    for which the validation should be applied to. Web Flow will execute the validation
    on post back to the defined state. So the validation is not executed the first
    time the view state is rendered, but when a postback is made (e.g., when a form
    is submitted).


    In the example in [Listing 11-21](#Chapter11.html#list_11_21), the validation
    is triggered when we make a transition to the `selectCategory` state. We check
    that the event that triggered the transition is the `next` event. If the user
    were to click the cancel button, then we would not want to perform the validation.
    The `org.springframework.binding.validation.ValidationContext` is automatically
    injected by Web Flow. If we were to add an error code, then the code would be
    automatically resolved with the registered `org.springframework.context.MessageSource`
    (this code can be found inside the `com.apress.prospringmvc.bookstore.web.controller.OrderForm`).


    ***Listing 11-21.** Validating the Category*


    `public void validateSelectCategory(ValidationContext context) {`

    `    if (context.getUserEvent().equals("next")) {`

    `        MessageContext messages = context.getMessageContext();`

    `        if (category == null) {`

    `messages.addMessage(new` ![Image](images/U002.jpg)

    `            MessageBuilder().error().source("category")`![Image](images/U002.jpg)

    `            .code("error.page.category.required").build());`

    `        }`

    `    }`

    `}`


    A variation on this is to store the validation logic separately from your model
    in a `validator` class (see [Listing 11-22](#Chapter11.html#list_11_22)). To do
    so, you have to follow more naming conventions for classname and the `validation`
    method. The class should be named `modelnameValidator`, while the method should
    be named `validateState`. In our case the classname would become `OrderFormValidator`,
    and the method would be the same one used previously in `validateSelectShop`.
    In the case of an external validator, you would also get the model as a parameter
    to the `validate` method and, optionally, the Spring MVC `Errors` object.


    ____________


    ² [http://download.oracle.com/otndocs/jcp/bean_validation-1.0-fr-oth-JSpec](http://download.oracle.com/otndocs/jcp/bean_validation-1.0-fr-oth-JSpec)/


    ***Listing 11-22.** The Separate Validator Class*


    `@Component`

    `public class OrderModelValidator{`

    `    public void validateSelectShop(OrderForm orderForm, ValidationContext context,`![Image](images/U002.jpg)

    ` Errors errors) {`


    The final requirement is that the bean should be registered as a Spring bean.
    In an annotation-driven model like this one, you can simply add the `@Component`
    above the class definition and make sure the class will be picked up by the component
    scan.


    ![Image](images/square.jpg)  **Note**  In the sample application, we have opted
    to store the validation together with the model, so you will not find an external
    `OrderFormValidator`. But feel free to experiment and try to move validation logic
    from the `OrderForm` to a separate validator.'
