- fmt: '![Image](images/square.jpg) **Tip** When using custom exception handlers,
    it is advised to use the support class, `org.springframework.webflow.engine.support.TransitionExecutingFlowExecutionExceptionHandler`.
    When using this support class, you can be sure that navigation is handled as it
    should be after handling the exception. This class can be configured with a map
    of exceptions to handle and a matching target state that should be executed after
    dealing with the exception. By default, this class also exposes the exception
    on `flash` scope. You can override the `handle` method to perform custom exception
    handling. In that case, it is advised that you call `super.handle` at the end
    of the method, so that the exception is still exposed on `flash` scope, and the
    transition to the target state is executed.


    You configure a `TransitionExecutingFlowExecutionExceptionHandler` with one or
    more mappings that consist of an exception class as the key and a target state
    id as the value. These two values become the exception mapping. Whenever an exception
    is thrown within the scope of the handler, the `TransitionExecutingFlowExecutionExceptionHandler`
    will check whether it has a mapping for the given exception by comparing the exception
    class of the thrown exception with those in its initially configured mapping.
    If a mapping exists, the `exposeException()` method is called, and finally, the
    flow will transition to the target state you indicated with that particular mapping.


    When looking up exceptions, the `TransitionExecutingFlowExecutionExceptionHandler`
    will not only consider the `FlowExecutionException` (or any of it subclasses),
    but also its cause chain. An exception from the cause chain will also match with
    a mapping for one of its superclasses. For example, a `FlowExecutionException`
    instance wrapping a `java.io.FileNotFoundException` will match with a mapping
    for `java.io.IOException` because that is a superclass of `FileNotFoundException`.


    A `TransitionExecutingFlowExecutionExceptionHandler` can be configured as a normal
    Spring bean, as shown in [Listing 12-13](#Chapter12.html#list_12_13).


    **Listing 12-13** Configuring a `TransitionExecutingFlowExecutionExceptionHandler`


    ```

    @Bean

    public TransitionExecutingFlowExecutionExceptionHandler

                                               ioFlowExecutionExceptionHandler() {

        TransitionExecutingFlowExecutionExceptionHandler

        handler = new TransitionExecutingFlowExecutionExceptionHandler();


        handler.add(IOException.class, "targetState");

        return handler;

    }

    ```


    The `ioFlowExecutionExceptionHandler` can then be configured as the bean attribute
    of the `<exception-handler>` element:


    ```

    <exception-handler attribute="ioFlowExecutionExceptionHandler"/>

    ```


    We have seen that Web Flow gives us three ways of dealing with exceptions:


    * Inside the application controller. We do so by catching the exception and adding
    the appropriate message to the `Messagecontext`.

    * Inside the flow by specifying the `on exception` attribute of a transition.

    * Inside the flow by specifying an `<exception-handler>` element that uses a `FlowExecutionExceptionHandler`.
    This element can either be declared in a fine-grained manner inside one of the
    five states, or in a coarse-grained manner for the entire flow (in that case,
    the `<exception-handler>` element is a direct sibling of the flow element).


    The question is this: when is it most appropriate to use each of these techniques?
    When working with application controllers in combination with your flow, the first
    approach is probably the most natural. It gives you direct control over the exception-handling
    process, and it remains coupled to the code.


    However, if you execute services or facades directly from within your flow (not
    using any application controller), then you can only react to exceptions using
    flow functionality. In that case, using the second approach (i.e., using the `on
    exception` attribute) would be the preferred way to deal with application exceptions.


    The last approach, using a `FlowExecutionExceptionHandler`, is more applicable
    for overall exception behavior. For example, assume you want to log whenever an
    exception arises. You could handle that by declaring a `FlowExecutionExceptionHandler`
    on `flow` level.'
