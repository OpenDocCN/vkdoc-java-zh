- fmt: "注意我们正在使用 Spring MVC 表单。如果我们稍后想要为特定输入字段绑定错误，这会很有用。我们的`action`（`${flowExecutionUrl}`）是一个特殊的隐式对象，它引用当前的流程执行。这是当前\
    \ URL 与流程执行键的组合。您应该将其视为运行中流程的回发 URL。在最终渲染的 HTML 中，它可能像下面这样转换：\n\n```\naction=\"\
    /chapter10-bookstore/createOrders?execution=e4s1\"\n```\n\n流程执行键将允许 Web Flow 在返回响应（即暂停流程之前）之前，重新加载之前保存的状态。\n\
    \n`<form:select>`元素是一个基本的 Spring MVC 标签库，用于渲染 HTML 选择列表。它可以与 Map 完美配合；在这种情况下，它将使用键作为\
    \ HTML `option`元素的值（即作为表单提交的一部分发送的文本），并使用值作为 HTML `option`的内容（即列表中显示的文本）。\n\n\
    最后，有两个按钮。这些是驱动转换的控制组件。如果您查看名称，会发现它们以转换的`on`值结尾，并以`_eventId_`为前缀。这就是 Web Flow 识别要执行哪个转换的方式。按钮的名称在提交表单时随请求一起发送。其模式是`_eventId_<`*`on_transition`*`>`。\n\
    \n哦，等等；还有一件事要做。正如在[图 10-10](#Chapter10.html#fig_10_10) 的主页上所见，我们的想法是通过一个`Buy books`链接来启动流程。我们仍然需要在导航栏中配置此链接以启动我们的流程。\n\
    \n要找到该链接，我们必须打开`header.jsp`，您可以在`WEB-INF/templates/`中找到它。请记住，我们使用 Tiles 进行模板化。一个页面由页眉、内容和页脚面板组成。菜单作为`header.jsp`的一部分渲染（参见[清单\
