    ![Image](images/9781430241553_Fig05-03.jpg)


    ***Figure 5-3.** The login page*


    If we now enter the username and password (jd/secret) and press the Login button,
    we are greeted with an error page (error code 405) that indicates that the method
    (`POST`) is not supported. This is correct because our controller doesn’t yet
    have a method that handles a `POST` request. So, let’s add a method to our controller
    that actually handles our login. [Listing 5-11](#Chapter05.html#list_5_11) shows
