    `requestDataValueProcessor` 注册它。这是框架用来检测已注册实例的名称。


    ### 总结


    在本章中，我们介绍了一些可用于构建 Web 应用程序的更高级技术。例如，我们首先了解了作用域 bean 以及如何利用它们。为此，我们在示例应用程序中实现了一个购物车。


    有时，我们需要跨大量类或 URL 重用代码或执行代码。这些所谓的横切关注点可以通过使用面向切面编程来解决；然而，在 Web 应用程序中，这并不总是最佳选择。在
    Spring MVC 中，我们可以使用拦截器和高级异常处理策略来处理这些横切关注点。例如，我们可以使用拦截器为大量控制器执行一段代码。在配置这些拦截器时，我们可以指定是映射到所有控制器，还是仅根据
    URL 映射到某些控制器。


    尽管我们都努力使应用程序尽可能健壮，但总有可能出现问题。当问题发生时，我们希望能够优雅地处理它们。例如，当我们需要用户凭据时，我们可能希望向用户显示错误页面或登录页面。为此，我们深入研究了
    Spring MVC 内部的异常处理策略。


    接着，我们更深入地探讨了 Spring MVC 的基础设施类，并研究了在需要时如何扩展框架。我们还解释了如何通过指定额外的请求条件来扩展请求匹配。接下来，我们解释（并演示）了如何编写一个处理器来处理请求处理方法的方法参数类型和返回值。


    最后，我们以对请求数据值处理器的简要介绍结束了本章，涵盖了如何使用它来防范 CSRF 并提供数据完整性。


