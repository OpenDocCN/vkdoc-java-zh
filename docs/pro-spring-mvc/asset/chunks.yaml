    ## 解析与实现视图


    到目前为止，我们主要使用 Java 服务器页面（JSP）作为视图技术；然而，Spring MVC 提供了一种非常强大且灵活的机制来解析和实现视图。我们在第
    4 章中简要介绍了视图解析机制；在本章中，我们将更深入地研究不同的 `ViewResolver` 实现，并了解如何创建和使用我们自己的实现。


    我们还将了解 Spring MVC 开箱即用支持哪些视图技术，并创建一些自定义实现。不过，在深入探讨内部机制之前，让我们先回顾一下视图渲染流程和 API。


    ### 视图解析器与视图


    在第 4 章中，我们讨论了调度器 servlet 的请求处理工作流程。解析和渲染视图是该流程的一部分。在图 8-1 中，你可以看到视图渲染流程（有关描述，请参见第
    4 章中的“渲染视图”部分）。


    ![图片](img/9781430241553_Fig08-01.jpg)


    ***图 8-1.** 视图渲染流程*


    控制器可以返回一个 `org.springframework.web.servlet.View` 实现或一个视图引用（视图名称）。在后一种情况下，会查询已配置的
    `ViewResolver`，以将引用转换为具体的实现。当实现可用时，将指示其进行渲染；否则，会抛出 `javax.servlet.ServletException`
    异常。


    `ViewResolver`（见清单 8-1）只有一个方法，用于解析为 `View`。


    ***清单 8-1.** ViewResolver API*


    `package org.springframework.web.servlet;`


    `import java.util.Locale;`


    `public interface ViewResolver {`


    `    View resolveViewName(String viewName, Locale locale) throws Exception;`


    `}`


    当视图被选中后，调度器 servlet 将调用视图实例上的 `render` 方法（见清单 8-2）。`getContentType` 方法用于确定内容的类型。该值用于设置响应的内容类型；`org.springframework.web.servlet.view.ContentNegotiatingViewResolver`
    也使用它来确定最佳匹配的视图（有关此视图解析器的更多信息，请参见后续章节）。


    ***清单 8-2.** View API*


    `package org.springframework.web.servlet;`


    `import java.util.Map;`


    `import javax.servlet.http.HttpServletRequest;`

    `import javax.servlet.http.HttpServletResponse;`


    `public interface View {`


    `    String getContentType();`


    `    void render(Map<String, ?> model,`

    `                HttpServletRequest request,`

    `                HttpServletResponse response) throws Exception;`


    `}`


    ### 视图解析器


    在第 4 章中，我们展示了不同 `ViewResolver` 实现的层次结构。让我们更仔细地研究一下通用的可用实现、它们的工作原理以及如何配置它们。图 8-2
    再次展示了不同的实现。特定于特定视图技术的实现将在“视图技术”部分中解释。


    ![图片](img/9781430241553_Fig08-02.jpg)


    ***图 8-2.** ViewResolver 层次结构*


    #### BeanNameViewResolver


    `org.springframework.web.servlet.view.BeanNameViewResolver` 是可用的最基本实现，也是默认配置的实现之一。它获取视图的名称，并在
    `org.springframework.context.ApplicationContext` 中查找是否存在具有该名称的 `View`。如果存在，解析器将返回它；否则，返回
    `null`。此视图解析器在小型应用程序中很有用；然而，它有一个很大的缺点，即每个视图都需要在应用程序上下文中进行配置。它有一个可配置的属性，即被调用的顺序（见表
    8-1）。


    ![图片](img/9781430241553_tab08-01.jpg)


    在清单 8-3 中，你可以看到我们需要如何配置以及配置什么，才能让我们的首页由此视图解析器提供和解析。我们显式配置了 `BeanNameViewResolver`；仅当调度器
    servlet 的默认配置不足时才需要这样做。我们还需要添加一个 `View` 实例，由于我们使用的是支持 JSTL 的 JSP，因此我们返回一个 `org.springframework.web.servlet.view.JstlView`。


    ***清单 8-3.** BeanNameViewResolver 配置*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// 其他导入已省略`

    `import org.springframework.web.servlet.view.BeanNameViewResolver;`

    `import org.springframework.web.servlet.view.JstlView;`


    `@Configuration`

    `public class ViewConfiguration {`


    `    @Bean`

    `    public ViewResolver viewResolver() {`

    `        BeanNameViewResolver viewResolver = new BeanNameViewResolver();`

    `        viewResolver.setOrder(1);`

    `        return viewResolver;`

    `    }`


    `    @Bean`

    `    public View index() {`

    `        JstlView view = new JstlView();`

    `        view.setUrl("/WEB-INF/views/index.jsp");`

    `        return view;`

    `    }`

    `}`


    #### XmlViewResolver


    `org.springframework.web.servlet.view.XmlViewResolver` 与 `BeanNameViewResolver`
    非常相似，区别在于它需要一个额外的 Spring XML 配置文件来保存所有视图。默认情况下，它会加载名为 `/WEB-INF/views.xml` 的文件；但是，这可以进行配置。表
    8-2 显示了可用的属性。


    ![图片](img/9781430241553_tab08-02.jpg)


    清单 8-4 展示了 `XmlViewResolver` 的配置。清单 8-5 展示了用于配置首页视图的 `/WEB-INF/views.xml` 文件。


    ***清单 8-4.** XmlViewResolver 配置*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// 其他导入已省略`

    `import org.springframework.web.servlet.view.XmlViewResolver;`


    `@Configuration`

    `public class ViewConfiguration {`


    `    @Bean`

    `    public ViewResolver viewResolver() {`

    `        XmlViewResolver viewResolver = new XmlViewResolver();`

    `        viewResolver.setOrder(1);`

    `        return viewResolver;`

    `    }`

    `}`


    ***清单 8-5.** 示例 views.xml*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<beans`


    `    xsi:schemaLocation="http://www.springframework.org/schema/beans`

    `       http://www.springframework.org/schema/beans/spring-beans.xsd">`


    `    <bean id="index" class="org.springframework.web.servlet.view.JstlView">`

    `        <property name="url" value="/WEB-INF/views/index.jsp"/>`

    `    </bean>`

    `</beans>`

