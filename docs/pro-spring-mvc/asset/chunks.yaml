    #### 图书搜索页面


    我们经营一家书店，想要销售图书。但目前，我们的 Web 应用中没有任何功能允许用户搜索甚至查看图书列表。让我们通过创建一个图书搜索页面来解决这个问题，这样应用的用户就可以搜索图书了。


    首先，在 `/WEB-INF/views` 目录下创建一个 `book` 目录。在该目录中，创建一个名为 `search.jsp` 的文件。这个文件是我们的搜索表单，它也将显示搜索结果。该文件的代码见清单
    5-14。


    ***清单 5-14.** 搜索页面表单*


    `<%@ taglib prefix="c" uri="http://java.sun.com/jsp/jstl/core"%>`


    `<form method="GET" action="<c:url value="/book/search"/>">`

    `    <fieldset>`

    `        <legend>搜索条件</legend>`

    `        <table>`

    `            <tr>`

    `                <td><label for="title">书名</label></td>`

    `                <td><input id="title" name="title" /></td>`

    `            </tr>`

    `        </table>`

    `    </fieldset>`

    `    <button id="search">搜索</button>`

    `</form>`


    `<c:if test="${not empty bookList}">`

    `    <table>`

    `        <tr><th>书名</th><th>描述</th><th>价格</th></tr>`

    `        <c:forEach items="${bookList}" var="book">`

    `            <tr>`

    `                <td>${book.title}</td>`

    `                <td>${book.description}</td>`

    `                <td>${book.price}</td>`

    `            </tr>`

    `        </c:forEach>`

    `    </table>`

    `</c:if>`


    该页面由一个表单组成，表单中有一个字段用于填写（部分）书名，用于搜索图书。当有结果时，我们会向用户显示一个包含结果的表格。现在我们已经有了页面，还需要一个能够处理请求的控制器。清单
    5-15 展示了初始的 `com.apress.prospringmvc.bookstore.web.controller.BookSearchController`。


    ***清单 5-15.** 包含搜索功能的 BookSearchController*


    `package com.apress.prospringmvc.bookstore.web.controller;`


    `import org.springframework.beans.factory.annotation.Autowired;`

    `import org.springframework.stereotype.Controller;`

    `import org.springframework.ui.Model;`

    `import org.springframework.web.bind.annotation.RequestMapping;`

    `import org.springframework.web.bind.annotation.RequestMethod;`


    `import com.apress.prospringmvc.bookstore.domain.BookSearchCriteria;`

    `import com.apress.prospringmvc.bookstore.service.BookstoreService;`


    `import javax.servlet.http.HttpServletRequest`


    `@Controller`

    `public class BookSearchController {`


    `    @Autowired`

    `    private BookstoreService bookstoreService;`


    `    @RequestMapping(value = "/book/search", method = RequestMethod.GET)`

    `    public String list(Model model, HttpServletRequest request) {`

    `        BookSearchCriteria criteria = new BookSearchCriteria();`

    `        criteria.setTitle(request.getParameter("title");`

    `        model.addAttribute(this.bookstoreService.findBooks(criteria));`

    `        return "book/search";`

    `    }`

    `}`


    控制器将响应 URL；从请求中获取 title 参数（这是页面中字段的名称，如清单 5-13 所示）；最后，执行搜索。搜索结果被放入模型中。初始状态下，它会显示所有图书；然而，一旦输入了书名，它就会根据该书名限制搜索结果（参见图
    5-4）。


    ![Image](img/9781430241553_Fig05-04.jpg)


    ***图 5-4.** 显示搜索结果的图书搜索页面*


    如前所述，在大多数情况下，直接使用 `HttpServletRequest` 并非必要。让我们通过将 `com.apress.prospringmvc.bookstore.domain.BookSearchCriteria`
    放入方法参数列表来简化搜索方法（参见清单 5-16）。


    ***清单 5-16.** 以 BookSearchCriteria 作为方法参数的 BookSearchController*


    `package com.apress.prospringmvc.bookstore.web.controller;`


    `import org.springframework.web.bind.annotation.RequestParam;`


    `// 其他导入已省略，参见` `清单 5-15`


    `@Controller`

    `public class BookSearchController {`


    `    @Autowired`

    `    private BookstoreService bookstoreService;`


    `    @RequestMapping(value = "/book/search", method = RequestMethod.GET)`

    `public String list(Model model,` **`BookSearchCriteria criteria`**`) {`

    `        model.addAttribute(this.bookstoreService.findBooks(criteria));`

    `        return "book/search";`

    `    }`

    `}`


    在 Spring MVC 中，这就是我们所说的*数据绑定*。为了启用数据绑定，我们需要修改 `com.apress.prospring.bookstore.web.controller.BookSearchController`，使其使用方法参数，而不是直接使用
    `request`（参见清单 5-14）。或者，它可以使用 `RequestParam` 来检索参数并将其设置到对象上。这将强制 Spring 对 `criteria`
    方法参数进行数据绑定。这样做会将所有与对象属性同名的请求参数映射到该对象（即，请求参数 `title` 将被映射到属性 `title`）。使用数据绑定将大大简化我们的控制器（你可以在本章的“数据绑定”部分找到更深入的信息）。


    我们甚至可以做得更好！除了返回 `String`，我们还可以返回其他内容。例如，让我们修改控制器以返回一个图书集合。这个集合会以 `bookList` 的名称添加到模型中，正如本章前面所述。清单
    5-16 展示了这个控制器，但是我们如何选择要渲染的视图呢？它并没有明确指定。在第 4 章中，我们提到如果没有明确指定要渲染的视图，`org.springframework.web.servlet.RequestToViewNameTranslator`
    就会介入。我们在这里看到了这个机制的工作原理。它获取 URL（`http://[server]:[port]/chapter5-bookstore/book/search`）；剥离服务器、端口和应用名称；移除后缀（如果有）；然后使用剩余的
    `book/search` 作为要渲染的视图名称（这正是我们一直在返回的内容）。


    ***清单 5-17.** BookSearchController 的替代版本*


    `package com.apress.prospringmvc.bookstore.web.controller;`


    `// 其他导入已省略，参见` `清单 5-15`


    `@Controller`

    `public class BookSearchController {`


    `    @Autowired`

    `    private BookstoreService bookstoreService;`


    `    @RequestMapping(value = "/book/search", method = RequestMethod.GET)`

    `public` **`Collection<Book>`** `list(BookSearchCriteria criteria ) {`

    **`return this.bookstoreService.findBooks(criteria);`**

    `    }`

    `}`

