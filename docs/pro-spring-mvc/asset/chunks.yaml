    接下来，让我们将 `org.springframework.web.servlet.view.ContentNegotiatingViewResolver`
    添加到我们的视图配置中。我们这样做是为了让我们的订单页面能够以 HTML 或 PDF 格式呈现，并且我们不想更改 `com.apress.prospringmvc.bookstore.web.controller.OrderController`，因为它已经在做我们想要的事情，即将选定的订单添加到模型中。清单
    8-22 显示了更改后的 `com.apress.prospringmvc.bookstore.web.config.ViewConfiguration`。这也是我们将开始使用自定义视图解析器的地方（参见关于实现你自己的视图解析器的讨论）。


    ***清单 8-22.** 使用 ContentNegotiatingViewResolver 的 ViewConfiguration*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// 其他导入已省略`

    `import org.springframework.web.servlet.view.ContentNegotiatingViewResolver;`

    `import org.springframework.web.servlet.view.document.AbstractPdfView;`


    `import com.apress.prospringmvc.bookstore.web.view.OrderPdfView;`

    `import com.apress.prospringmvc.bookstore.web.view`

    `       .SimpleConfigurableViewResolver;`


    `@Configuration`

