    `        <put-attribute name="body" value="/WEB-INF/views/{1}/{2}.jsp" />`

    `    </definition>`


    `</tiles-definitions>`


    We have created three definitions: the definition with the name `template` is
    the general layout configuration, the other definitions extend this general layout
    (and could override the predefined attributes). We can add more definitions when
    needed. For Spring to select the correct definition, our definition name has to
    match the name of the view (or a * wildcard as we did in our sample). Our template
    page (`template.jsp`) consists of three tiles (`header`, `footer` and `body`),
    and we need a property `title` that contains a message key so that we can use
    our message source (see the [Chapter 5](#Chapter05.html#ch5) discussion of internationalization)
