- fmt: "在最后两个测试中（注释`// Test the different view selection choices`下方），我们测试了当`MockHttpServletRequest`上未设置初始`REQUESTED_URL`时代码的反应。第一个测试仅测试无值的情况。最后一个测试测试包含`login`的值的情况。在这两种情况下，我们都验证了渲染的视图是索引（首页）页面。\n\
    \n## 引入 Spring MVC Test\n\n测试应用程序控制器的另一种选择是使用全新的 Spring MVC `test`模块。^([13](#Chapter09.html#CHP-9-FN-13))\
    \ 在撰写本文时，它尚未与 Spring 集成，但计划包含在 Spring 3.2 中。不过，已经有一个可用的*快照*版本，相当稳定（1.0.0 快照）。\n\
    \n在继续之前，我们必须警告您，依赖快照版本（尤其是在没有先前发布版本的情况下）会带来一些风险，因为事情仍可能发生变化。因此，我们不会深入细节，仅介绍思路和基本设置。事情可能会在不同地方发生变化，导致深入的内容在模块发布到\
    \ Spring 之前就过时了。然而，我们在此展示的思路应保持稳定，并应在后续版本中仍然适用。\n\n话虽如此，为了能够使用此模块，我们在第 9 章示例的`build.gradle`中添加了依赖项：\n\
    \n`testCompile 'org.springframework:spring-test-mvc:1.0.0.BUILD-SNAPSHOT'`\n\n\
    由于这是一个快照依赖项，我们还将快照仓库添加到了依赖管理配置的仓库列表中。我们在示例目录根目录的`build.gradle`中完成了此操作：\n\n```\n\
    repositories {\n    mavenRepo url: 'http://maven.springframework.org/release'\n\
    \    mavenRepo url: 'http://maven.springframework.org/snapshot'\n    mavenCentral()\n\
    \    mavenRepo url: 'http://maven.springframework.org/milestone'\n    mavenRepo\
    \ url: 'https://repository.jboss.org/nexus/content/repositories/releases/'\n \
    \   mavenRepo url: 'http://download.java.net/maven/glassfish/org/glassfish/'\n\
    }\n```\n\n_________\n\n^(13) [`https://github.com/SpringSource/spring-test-mvc`](https://github.com/SpringSource/spring-test-mvc)\n\
    \nSpring MVC `test`旨在使应用程序控制器更易于测试，扩展了我们在上一节中使用的`MockHttpServletRequest`、`MockHttpServletResponse`和`MockHttpSession`辅助工具背后的理念。它试图在不启动实际\
    \ Servlet 容器的情况下更好地模拟 Spring MVC。例如；使用 Spring MVC test，您将能够验证在使用 Tiles 作为视图解析器时，实际选择了哪些\
    \ JSP 进行渲染。这是以前不可能实现的事情，只能在运行时（可能使用前端测试）进行验证。我们能够使用单元测试或集成测试测试得越多，效果就越好。\n\n我们将创建的示例将展示如何使用基础知识。第一步是引导一个`org.springframework.test.web.server.MockMvc`。此对象初始化\
    \ MVC 基础设施，并将成为您进入 API 的主要入口点。您可以通过不同方式初始化它：\n\n> *   从一个或多个 MVC 注解配置类\n> *  \
    \ 从一个或多个 Spring XML 文件\n> *   使用`WebApplicationContext`\n> *   单独的`@Controller`类\n\
    \n前三种可能性是托管模式。在这些情况下，会启动一个应用程序上下文。处理您向其发起的请求所需的控制器将从应用程序上下文中查找。此外，MVC 环境将像运行时一样配置，具有相同的视图解析器、资源处理器、拦截器等，就像您在配置中指定的一样。\n\
    \n最后一种可能性是所谓的独立模式。在此模式下，您直接提供应用程序控制器，并实例化最少的 Spring MVC 基础设施组件——仅处理注册的应用程序控制器请求所需的那些。基础设施组件集与\
    \ MVC 命名空间或 MVC Java 配置提供的非常相似。需要注意的是，实际的 Spring MVC 配置将不会被测试（因为它从未被加载）。\n\n首选的初始化方法是加载整个\
    \ Spring MVC 配置的方法。但是，如果您为每个测试都实例化`MockMvc`，可能会变得昂贵。首选方式是使用第三种方法，即使用`WebApplicationContext`，它将结合两者的优点。`WebApplicationContext`被注入到测试中。配置像往常一样由\
    \ Spring 的测试支持加载。对于配置（在`classes`属性中提供），您将使用 Spring MVC 注解配置类。可能如下所示：\n\n```\n\
    @RunWith(SpringJUnit4ClassRunner.class)\n@ContextConfiguration(classes = { ....})\n\
    public class ApplicationControllerTest {\n\n    @Autowired\n    private WebApplicationContext\
    \ wac;\n```\n\n这将加载您在`classes`属性中指定的`@Configuration`类，并启动一个`WebApplicationContext`。然后，您将能够从注入的`WebApplicationContext`构建一个`MockMvc`对象，这将是廉价的。Spring\
    \ 的测试支持将缓存其加载的上下文初始化，这些上下文通过`@ContextConfiguration`指示，可能仅为整个测试套件加载一个实例。然而，目前`WebApplicationContext`支持尚不可用，但将从\
    \ Spring 3.2 开始提供。\n\n在您初始化`MockMvc`对象（无论哪种方式）后，您可以开始向其发送请求。它将使用实际的 Spring MVC\
