    `“username”` 的 `user-property`。让我们更详细地看看 Spring Security 将如何处理这个问题：    > 1.  在应用哈希函数之前，首先解析我们的盐。盐是从
    `UserDetails` 对象（我们稍后将介绍）中检索的。应该从这个 `Object` 中使用的属性由 `user-property` 属性（`“username”`）的值指示。从
    `UserDetails` `Object` 中检索 `username` 属性的值。该值将是我们的盐。然后，盐被添加到密码的末尾，放在大括号之间。因此，当我们的密码是
    `secret` 并且 `UserDetails` 对象的 username 属性是 `jd` 时，我们的密码字符串现在将是 `secret{jd}.` >
