    message shown after logging in*    #### Using Annotations in Our Code    Securing
    your pages using the authorization tag is not sufficient, as we will see. Hiding
    a link (which is the main task of the authorization tag) won’t do the trick if
    the user knows or guesses the direct link. In that case the user still will get
    access (assuming you didn’t place a specific `intercept-url` for that page with
    proper authorization checks).    In this section we will see that you can also
    secure your application controller methods and back-end services using annotations.
    This way you are sure that if a user escapes the front-end security, the user
    will be blocked on the next level. Applying security in your back-end services
    can also be useful if you have different frontend layers using the same back-end.    Until
    now we have seen three places where we can put specific authorization check points:    >
    *   On the requested resource, using `intercept-url` > *   On your flows > *   For
    a more fine grained approach, in the pages themselves using the authorize tag    This
    leaves us with a gap. With our last example in mind, we added specific permission
    checks on the `manageBooks.jsp` page. Only users with the `PERM_ADD_BOOKS` permission
    are able to add books, and only users with the `PERM_ADD_CATEGORIES` are able
    to add categories. But what would happen if a user with the author role (who cannot
    add categories) were to simulate an http POST request adding a new category?    This
    is still a potential weakness in our system. While the authorization tag on the
    page only hides a component, the controller listening for the request is still
    there. So anyone who knows the correct URL and the request parameters can still
    invoke the controller directly.    Besides adding a `intercept-url` with fine
    grained authorization control (specifying roles and or permissions) for each of
    the pages, you can also use method-specific annotations as shown in [Listing 13-36](#Chapter13.html#list_13_36).    ***Listing
    13-36.** Using method security in the application controller*  `@RequestMapping("secured/addCategory.htm")`
    **`@PreAuthorize("hasRole(''PERM_ADD_CATEGORIES'')")`** `public ModelAndView addCategory(`  By
    adding the annotation `org.springframework.security.access.prepost.PreAuthorize`
    on the controller request mapping to add books, we implemented an additional check.
    Try it out for yourself—put the `<sec:authorize access="hasRole(''PERM_ADD_CATEGORIES'')">`
    in comments in `the manageBooks.jsp` and log in using the user `author`. Because
    the tag is commented out, the component to add categories is shown. If you try
    to add one, you’ll get the famous “403 access denied” page.    Before Spring Security
    will process these annotations you need to enable method security. We did this
    in `src/main/resources/spring-security.xml`, as you can see in [Listing 13-37](#Chapter13.html#list_13_37).    ***Listing
    13-37.** Enabling method-level security*  `<security:global-method-security pre-post-annotations="enabled"/>`  Next
    we will also secure the `addBooks` method, as we did for the `addCategory` method,
    in [Listing 13-38](#Chapter13.html#list_13_38).    ***Listing 13-38.** Using method
    security in the application controller*  `@RequestMapping("secured/addBooks.htm")`
    **`@PreAuthorize("hasRole(''PERM_ADD_BOOKS'')")`** `public ModelAndView addBooks(`  To
    make the entire chain secure, you can also add these annotations on your service
    layer. Once you do this there is no way that someone can bypass your security
    and invoke a function that is not allowed for the current principal.    To conclude,
    we want to say a few words about Security exceptions. Normally your users should
    not run against such exceptions as part of normal navigation throughout your application.
    We shielded all links in the pages using the authorization tag; so in other words,
    if a user does not have access to a certain link (or button) it will simply not
    be shown. However, if a user starts to fiddle with the URLs, it might still be
    possible to access a forbidden URL. In that case the user will hit the security
    annotations on your application controllers or back-end, and a 403 access denied
    message will be shown. If you want customize this behavior, you have two options:    >
    *   You can use the JEE Servlet `<error-page>` in a web.xml to forward to a certain
    page upon an `<error-code>` (in this case 403). > *   You can use Spring Security
    `org.springframework.security.web.access.ExceptionTranslationFilter`, which can
    handle both `org.springframework.security.access.AccessDeniedException` and `org.springframework.security.core.AuthenticationException`.
    Its main purpose is to forward the user to a login page if not authenticated yet,
    or to a predefined error page if the current user lacks sufficient rights. For
    your convenience this filter was already registered by using the Spring Security
    namespace configuration (<`security:http`>). In fact one of the `http` element’s
    direct attributes is `access-denied-page="…"`, which allow you to specify a page
    to forward to whenever such a security-related exception occurs. This attribute
    will directly be given to the `ExceptionTranslationFilter` when the entire Spring
    Security configuration is built.    ### Summary    Security in general is a very
    complex and broad domain. However, we have shown you in this chapter that basic
    security for an average web application does not have to be complex. On the contrary,
    we have shown with a small bit of XML and a filter configuration how you can make
    your pages secure, so that only those pages explicitly listed can be accessed.    Later
    we showed that customization using a custom `UserDetailsService` is also not very
    complex, but it allows you to adapt your user store to any existing database structure
    you might have. Finally, we showed how to perform authorization based upon the
    permissions granted to a principal in your pages, your flows and controllers.    To
    conclude, we hope that you learned that with minimal effort your application can
    be secured. With such a great tool as Spring Security available, there should
    no longer be a reason not to build in basic security in your applications.    This
    chapter was written to give you an overview of the possibilities and get you started
    quickly. Your environment might have specific security requirements. In that case
    we hope that this chapter has warmed you up to go and read more detailed material
    about Spring Security and what it can do to suit specific requirements.    ##
    A P P E N D I X  A    ## Cloud Foundry: Deploying to the Cloud    In this appendix,
    we will discuss what it takes to get our application to run on a different environment
    than what we have been running it on so far. Instead of running on any boring
    old Tomcat instance, we’ll run it in the *cloud.* But before we get down to it,
    we’ll talk just a little bit about what the cloud means.    ### Cloud Computing    You
    probably haven’t been able to avoid the onslaught of cloud computing in the specialized
    media. But you may still not have an idea of what cloud computing entails. We’ll
    try to give a short overview of what cloud computing is about.    It’s hard to
    give a single definition of what cloud computing is, as it tends to mean different
    things to different people. One broader definition goes like this:    > *Cloud
    Computing is a distributed computing model consisting of three tiers—infrastructure,
    platform, and services—that enables ubiquitous, convenient, on-demand network
    access to a shared pool of configurable computing resources (e.g., networks, servers,
    storage, applications, and services).*    Consider Amazon S3,^([1](#Appendix.html#APP-A-FN-1))
    for example: Amazon allows you to store data on its servers using web-based APIs.
    You pay Amazon for the bandwidth you use in uploading or downloading that data.
    At no point in time do you ever need to have your own storage infrastructure.    There
    are several kinds of cloud service models in use:    *   *Infrastructure as a
    service (IaaS)*: Delivers computing infrastructure as a service. Examples of such
    infrastructure include virtual computers, storage, network infrastructure, and
    so forth. This is more the realm of sysadmins than developers. Amazon and Rackspace
    are two of the best-known IaaS providers. *   *Platform as a service (PaaS)*:
    Offers services beyond the infrastructure. Here, the emphasis is on the development
    environment, application services, and application-deployment mechanisms. The
    control over the actual infrastructure itself is mostly handed by the service
    provider. Good examples of a PaaS approach are Google App Engine and Cloud Foundry.
    *   *Software as a service (SaaS)*: Provides the delivery of a full solution as
    a service, eliminating the need to install and run the application on the customer’s
    own computers and simplifying maintenance and support. Contrast this with the
    traditional delivery model for software, where end users install software on every
    desktop, manage the upgrades themselves, and so on. In this model, the user just
    visits a website and begins using the application online. Google Docs is a good
    example of a SaaS.    __________________    ¹ [`http://aws.amazon.com/es/s3/`](http://aws.amazon.com/es/s3/)    ###
    Cloud Foundry    In this appendix, we’ll use Cloud Foundry as our PaaS of choice
    to deploy our bookstore application to. But what is Cloud Foundry and why would
    we want to use it?    Cloud Foundry describes itself like this:    > *[Cloud Foundry
    is] an open platform as a service, providing a choice of clouds, developer frameworks
    and application services. Initiated by VMware, with broad industry support, Cloud
    Foundry makes it faster and easier to build, test, deploy and scale applications.
    It is an open source project and is available through a variety of private cloud
    distributions and public cloud instances, including CloudFoundry.com.^([2](#Appendix.html#APP-A-FN-2))*    Now
    what does this mean? It means that Cloud Foundry is not a proprietary, vendor-specific
    PaaS, but a truly open platform that is being developed by several individuals
    and organizations. For example, ActiveState offers Stackato,^([3](#Appendix.html#APP-A-FN-3))
    an expansion of Cloud Foundry that offers Python, PHP, and Perl support. Ubuntu
    is also working on supporting Cloud Foundry under their Ubuntu Cloud^([4](#Appendix.html#APP-A-FN-4))
    banner.    It also means that we have to define some things more explicitly:    *   *Cloud
    Foundry* is the name of the open source project. You can find the code for this
    on github;^([5](#Appendix.html#APP-A-FN-5)) its website is at [`www.cloudfoundry.org`](http://www.cloudfoundry.org).
    *   *Cloudfoundry.com* is a VMWare–hosted instance of Cloud Foundry that lets
    you deploy your application on VMWare–owned infrastructure.    In the course of
    this appendix, we don’t differentiate between Cloud Foundry the platform and CloudFoundry.com
    the hosted service.    __________________    ² [`http://www.cloudfoundry.com`](http://www.cloudfoundry.com)    ³
    [`http://www.activestate.com/stackato`](http://www.activestate.com/stackato)    ⁴
    [`http://cloud.ubuntu.com`](http://cloud.ubuntu.com)    ⁵ [`https://github.com/cloudfoundry/`](https://github.com/cloudfoundry/)    Now
    that we’ve seen what Cloud Foundry is, why should we as Java/Spring developers
    care? Why should we use it over any other PaaS? One reason: The fact that Cloud
    Foundry is an open, multi-vendor platform is very nice because it helps us avoid
    the dangers of vendor-locking and the related costs.    Another reason: It also
    has multi-language support, including Ruby, Java, Scala, and NodeJs; and it offers
    many services, from relational stores such as MySQL and PostgreSQL, to queues
    like RabbitMQ, to NoSQL storage like MongoDB and Redis. Another big advantage
    is that it integrates very nicely with Spring. These things combined make Cloud
    Foundry a very interesting platform.    CloudFoundry.com, the VMWare–hosted version
    of Cloud Foundry, is still in beta at the time of writing. Nevertheless, you can
    sign up for it by going to [`https://my.cloudfoundry.com/signup`](https://my.cloudfoundry.com/signup)
    and entering an e-mail address. After reading and agreeing with the Terms of Service,
    you can click the Request Invite button. You’ll get an e-mail confirming your
    signup request. Later (it can take a few hours or even a day), you’ll receive
    an e-mail with the credentials you need to actually deploy on CloudFoundry.com.
    That’s all you need to do to register.    ### Deploying Our Application    In
    this section, we are going to describe how we can deploy the sample application
    on Cloud Foundry. We will describe each step in detail and also explain the modifications
    we must do to make everything work as expected. If you want to perform the actions
    described here yourself, we will assume that you have read the initial chapter
    on how to set up your environment. We are also assuming you have either STS or
    an Eclipse instance with the STS plug-in installed.    #### Installing the Cloud
    Foundry Plug-in    Although Cloud Foundry offers several tools to get your application
    deployed, the fastest way to get started when you first dive in is to use the
    Eclipse plug-in. The alternative is using the VMC command-line application, which
    is implemented as a Ruby gem. An advanced user can’t escape using the VMC command-line;
    but for the scope of this appendix, we’ll use the Eclipse plug-in.    ![Image](images/square.jpg)
    **Note** RubyGems^([6](#Appendix.html#APP-A-FN-6)) is the package manager for
    Ruby. It is comparable to apt-get for Ubuntu or yum for Red Hat. A *gem* is a
    packaged Ruby application or library. You can find more info on the VMC install
    at [`http://start.cloudfoundry.com/tools/vmc/installing-vmc.html`](http://start.cloudfoundry.com/tools/vmc/installing-vmc.html).
    If you have Ubuntu, you can also directly install the command-line client using
    `apt-get install cloudfoundry-client`.    We’ll start by installing the Cloud
    Foundry Eclipse plug-in. Go to the STS plug-in Dashboard (it can be found under
    Menu ![Image](images/U003.jpg) Help ![Image](images/U003.jpg) Dashboard), click
    the Extensions tab found on the bottom of the window, and search for *cloud foundry*
    in the search bar. Check the found extension, and then click the Install button
    on the bottom right, as seen in [Figure A-1](#Appendix.html#fig_A_1).    __________________    ⁶
    [`http://rubygems.org`](http://rubygems.org)  ![Image](images/9781430241553_App-01.jpg)  ***Figure
    A-1.** Finding the Cloud Foundry plug-in*    You’ll get the normal plug-in installation
    windows that ask you to accept or reject the license agreement. Click the Next
    and OK buttons until you get a dialog asking you to restart Eclipse, and then
    choose to restart it by clicking Restart now.    Now that we’ve installed the
    plug-in, we can proceed to the next step: deploying our application on Cloud Foundry.    ####
    Making Some Adjustments    The teams behind Spring and Cloud Foundry have worked
    at making it very easy to deploy Spring apps on Cloud Foundry. It is an explicit
    goal to make Spring applications deployable without changing one line of configuration
    or code in most cases.    Unfortunately, this is not entirely true for our application
    because it will not get deployed without us making some changes. The main reason
    is that Cloud Foundry, at the time of writing, only provides a Tomcat 6 instance
    (support for Tomcat 7 is on the road map). The other driver for change is the
    way SSL is set up in Cloud Foundry, which has some impact on the way we configure
    Spring Security.    ##### Switching to Tomcat 6    Tomcat 6 is a Java EE5 servlet
    container, so it does not implement the Servlet 3 API. The local server instance
    we have been using so far is Tomcat 7, which is Java EE 6 compliant. Our sample
    applications have an explicit dependency on Java EE 6—and the Servlet 3 API in
    particular.    Until now, we’ve been bootstrapping the Spring application context
    in `BookstoreWebApplicationInitializer`, which is an implementation of `org.springframework.web.WebApplicationInitializer`.
    The `WebApplicationInitializer` mechanism is what allowed us to get by without
    using a `web.xml` file for so long; however, it depends on a Servlet 3 implementation
    to work.    Because of Cloud Foundry’s use of Tomcat 6, we have to revert to a
    Servlet 2.5 environment, and we’ll need to create a `web.xml` file in which we’ll
    re-create what we’re doing in the `BookstoreWebApplicationInitializer`. To do
    this, we need an `ApplicationContext`, a `DispatcherServlet`, an `OpenEntityManagerInViewFilter`,
    and the filter that configures Spring security.    By adding a `ContextLoaderListener`,
    we can make sure that an `ApplicationContext` will get booted (see [Listing A-1](#Appendix.html#list_A_1)).    ***Listing
    A-1.** Adding a ContextLoaderListener in the web.xml File*  `<!—` `    tells the
    ContextLoaderListener where to look for applicationContext` `    xml files` `-->`
    `<context-param>` `    <param-name>contextConfigLocation</param-name>` `    <param-value>classpath:/spring/context.xml</param-value>`
    `</context-param>`  `<!-- the Listener will be called by the servlet container,`
    `     which will then boot a Spring ApplicationContext for us -->` `<listener>`
    `    <listener-class>` `        org.springframework.web.context.ContextLoaderListener`
    `    </listener-class>` `</listener>`  We also need to declare a `DispatcherServlet`
    by using the servlet tag, as shown in [Listing A-2](#Appendix.html#list_A_2).    ***Listing
    A-2.** Adding a DispatcherServlet in the web.xml File*  `<servlet>` `  <servlet-name>dispatcher</servlet-name>`
    `  <servlet-class>` `    org.springframework.web.servlet.DispatcherServlet` `  </servlet-class>`
    `  <init-param>` `    <param-name>contextClass</param-name>` `    <!-- note that
    we’re specifying the type of ApplicationContext here.` `         We’re using an
    AnnotationConfigWebApplicationContext and configure it` `         to use the classes
    we specified in  contextConfigLocation as` `         configuration classes.` `      -->`
    `    <param-value>` `      org.springframework.web.context.support.` `AnnotationConfigWebApplicationContext`
    `    </param-value>` `  </init-param>` `  <init-param>` `    <param-name>contextConfigLocation</param-name>`
    `      <param-value>` `      com.apress.prospringmvc.bookstore.web.config.WebflowContextConfiguration`
    `      com.apress.prospringmvc.bookstore.web.config.WebMvcContextConfiguration`
    `      </param-value>` `  </init-param>` `  <load-on-startup>1</load-on-startup>`
    `</servlet>`  `<servlet-mapping>` `    <servlet-name>dispatcher</servlet-name>`
    `    <url-pattern>/</url-pattern>` `</servlet-mapping>`  We are creating two application
    contexts, splitting the back-end configuration (e.g., datasources, services, repositories,
    and so on) from the front-end configuration (e.g., Spring MVC, Spring Web Flow,
    the @Controllers, and so forth).    The `ContextLoaderListener` will be responsible
    for bootstrapping the back end–application context. The `DispatcherServlet` will
    bootstrap its own context for the front end. While the `DispatcherServlet` is
    booting its own context, it will find the back-end `ApplicationContext` we’ve
    booted using the `ContextLoaderListener`. It will set this context as a parent
    context for its own `application context`. The fact that we now have two application
    contexts instead of one doesn’t have a real impact on us. You just need to be
    aware that the root context (which was booted by the `ContextLoaderListener`)
    will have no access to beans booted by the dispatcher servlet application context
    because a child context can access beans in the parent context, but not vice versa.    We
    are also using two types of application context classes now. For the back end,
    we are using the `XmlWebApplicationContext`, which will start from a standard
    XML application context file. The use of the `XmlWebApplicationContext` is not
    explicitly mentioned in the `web.xml` because the `ContextLoaderListener` uses
    this class by default. In that context file, we import the `spring-security.xml`
    and load the @Configuration-annotated classes using `<context:annotation-config/>`
    and `<context:component-scan/>`.    For the `DispatcherServlet`, however, we directly
    use the `AnnotationConfigWebApplicationContext` and feed it with the @Configuration-annotated
    configuration classes for the front end.    You might wonder why we didn’t use
    `AnnotationConfigWebApplicationContext` in both cases. For example, we could have
    loaded the `spring-security.xml` from within an @Configuration class using the
    @ImportResource annotation in the same way we are using it with the `webflow-config.xml`
    in `WebflowContextConfiguration`:  `@ImportResource("classpath:/spring/webflow-config.xml")`  The
    reason: During deployment, Cloud Foundry will inspect our `web.xml` and add its
    own Spring context XML file to be loaded by the `ContextLoaderListener` at the
    end of our `contextConfigLocation` file. The Cloud Foundry Spring config will
    do some magic, such as automatically replacing our datasource with the internal
    Cloud Foundry one, which we will discuss later. The problem is that, when using
    `AnnotationConfigWebApplicationContext`, we cannot mix annotations and XML files
    in the `contextConfigLocation`. So, when using `AnnotationConfigWebApplicationContext`
    for the root context, our @Configuration classes would have been loaded, but the
    spring XML file (which will be added later by Cloud Foundry) would be ignored.
    Hopefully, this limitation will disappear in the future, so that we’ll be able
    to use any type of application context implementation we want.    Finally, we
    need to configure the filters, as shown in [Listing A-3](#Appendix.html#list_A_3).    ***Listing
    A-3.** Adding the Filters to the web.xml File*  `<filter>` `    <filter-name>openEntityManagerInViewFilter</filter-name>`
    `    <filter-class>` `        org.springframework.orm.jpa.support.OpenEntityManagerInViewFilter`
    `    </filter-class>` `</filter>`  `<filter-mapping>` `    <filter-name>openEntityManagerInViewFilter</filter-name>`
