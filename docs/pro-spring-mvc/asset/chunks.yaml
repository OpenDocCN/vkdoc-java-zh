- fmt: "### `LocaleResolver`\n\n`org.springframework.web.servlet.LocaleResolver`策略接口用于确定渲染页面时使用的`java.util.Locale`。在大多数情况下，它用于解析应用程序中的验证消息或标签。不同的实现如[图4-14](#Chapter04.html#fig_4_14)所示，并在以下小节中描述。\n\
    \n¹ [`http://commons.apache.org/fileupload/`](http://commons.apache.org/fileupload/)\n\
    \n![Image](images/9781430241553_Fig04-14.jpg)\n\n**图4-14.** `LocaleResolver`实现\n\
    \n[清单4-16](#Chapter04.html#list_4_16)展示了`org.springframework.web.servlet.LocaleResolver`的API。\n\
    \n**清单4-16.** `LocaleResolver` API\n\n```java\npackage org.springframework.web.servlet;\n\
    \nimport java.util.Locale;\nimport javax.servlet.http.HttpServletRequest;\nimport\
    \ javax.servlet.http.HttpServletResponse;\n\npublic interface LocaleResolver {\n\
    \    Locale resolveLocale(HttpServletRequest request);\n    void setLocale(HttpServletRequest\
    \ request,\n                   HttpServletResponse response,\n               \
    \    Locale locale);\n}\n```\n\n该API由两个方法组成，每个方法在存储和检索当前`java.util.Locale`时都发挥作用。当您想要更改当前区域设置时，会调用`setLocale`方法。如果实现不支持此操作，则会抛出`java.lang.UnsupportedOperationException`。Spring框架（通常内部）使用`resolveLocale`方法来解析当前区域设置。\n\
    \n#### `AcceptHeaderLocaleResolver`\n\n`org.springframework.web.servlet.i18n.AcceptHeaderLocaleResolver`简单地委托给当前`javax.servlet.HttpServletRequest`的`getLocale`方法。它使用`Accept-Language`\
    \ HTTP头来确定语言。客户端设置此标头值；此解析器不支持更改区域设置。\n\n#### `CookieLocaleResolver`\n\n顾名思义，`org.springframework.web.servlet.i18n.CookieLocaleResolver`使用`javax.servlet.http.Cookie`来存储要使用的区域设置。这在希望应用程序尽可能无状态的情况下特别有用。实际值存储在客户端，并在每次请求时发送给您。此解析器允许更改区域设置（更多信息请参见[第6章](#Chapter06.html#ch6)）。此解析器还允许您配置cookie的名称和要使用的默认区域设置。如果无法为当前请求确定值（即既没有cookie也没有默认区域设置），则此解析器会回退到请求的区域设置（请参阅`AcceptHeaderLocaleResolver`）。\n\
    \n#### `FixedLocaleResolver`\n\n`org.springframework.web.servlet.i18n.FixedLocaleResolver`是`org.springframework.web.servlet.LocaleResolver`最基本的实现。它允许您配置在整个应用程序中使用的区域设置。此配置是固定的；因此，它无法更改。\n\
    \n#### `SessionLocaleResolver`\n\n`org.springframework.web.servlet.i18n.SessionLocaleResolver`实现使用`javax.servlet.http.HttpSession`来存储区域设置的值。可以配置属性的名称以及默认区域设置。如果无法为当前请求确定值（即会话中既没有存储值也没有默认区域设置），则它会回退到请求的区域设置（请参阅`AcceptHeaderLocaleResolver`）。此解析器还允许您更改区域设置（更多信息请参见[第6章](#Chapter06.html#ch6)）。\n\
    \n### `ThemeResolver`\n\n`org.springframework.web.servlet.ThemeResolver`策略接口用于确定渲染页面时使用的主题。有几种实现；这些如[图4-15](#Chapter04.html#fig_4_15)所示，并在以下小节中解释。如何应用主题在[第8章](#Chapter08.html#ch8)中解释。如果无法解析主题名称，则此解析器使用硬编码的默认`theme`。\n\
    \n![Image](images/9781430241553_Fig04-15.jpg)\n\n**图4-15.** `ThemeResolver`实现\n\
    \n[清单4-17](#Chapter04.html#list_4_17)展示了`org.springframework.web.servlet.ThemeResolver`的API，它与`org.springframework.web.servlet.LocaleResolver`\
    \ API非常相似。\n\n**清单4-17.** `ThemeResolver` API\n\n```java\npackage org.springframework.web.servlet;\n\
    \nimport javax.servlet.http.HttpServletRequest;\nimport javax.servlet.http.HttpServletResponse;\n\
    \npublic interface ThemeResolver {\n    String resolveThemeName(HttpServletRequest\
    \ request);\n\n    void setThemeName(HttpServletRequest request,\n           \
    \           HttpServletResponse response,\n                      String themeName);\n\
    }\n```\n\n当您想要更改当前主题时，会调用`setThemeName`方法。如果不支持更改主题，则会抛出`java.lang.UnsupportedOperationException`。Spring框架在需要解析当前主题时调用`resolveThemeName`方法。这主要通过使用主题`jsp`标签来完成。\n\
    \n#### `CookieThemeResolver`\n\n顾名思义，`org.springframework.web.servlet.theme.CookieThemeResolver`使用`javax.servlet.http.Cookie`来存储要使用的主题。这在希望应用程序尽可能无状态的情况下特别有用。实际值存储在客户端，并将在每次请求时发送给您。此解析器允许更改主题；您可以在[第6章](#Chapter06.html#ch6)和[第8章](#Chapter08.html#ch8)中找到更多信息。此解析器还允许您配置cookie的名称和要使用的主题区域设置。\n\
    \n#### `FixedThemeResolver`\n\n`org.springframework.web.servlet.theme.FixedThemeResolver`是`org.springframework.web.servlet.ThemeResolver`最基本的实现。它允许您配置在整个应用程序中使用的主题。此配置是固定的；因此，它无法更改。\n\
    \n#### `SessionThemeResolver`\n\n`org.springframework.web.servlet.theme.SessionThemeResolver`使用`javax.servlet.http.HttpSession`来存储主题的值。可以配置属性的名称以及默认主题。"
  raw: '#### LocaleResolver


    The `org.springframework.web.servlet.LocaleResolver` strategy interface is used
    to determine which `java.util.Locale` to use to render the page. In most cases,
    this is used to resolve validation messages or labels in the application. The
    different implementations are shown in [Figure 4-14](#Chapter04.html#fig_4_14)
    and described in the following subsections.


    ____________


    ¹ [`http://commons.apache.org/fileupload/`](http://commons.apache.org/fileupload/)


    ![Image](images/9781430241553_Fig04-14.jpg)


    ***Figure 4-14.** LocaleResolver implementations*


    [Listing 4-16](#Chapter04.html#list_4_16) shows the API for the `org.springframework.web.servlet.LocaleResolver`.


    ***Listing 4-16.** The LocaleResolver API*


    `package org.springframework.web.servlet;`


    `import java.util.Locale;`


    `import javax.servlet.http.HttpServletRequest;`

    `import javax.servlet.http.HttpServletResponse;`


    `public interface LocaleResolver {`


    `    Locale resolveLocale(HttpServletRequest request);`

    `    void setLocale(HttpServletRequest request,`

    `                   HttpServletResponse response,`

    `                   Locale locale);`


    `}`


    The API consists of two methods that each play a role in storing and retrieving
    the current `java.util.Locale`. The `setLocale` method is called when you want
    to change the current locale. If the implementation doesn’t support this, a `java.lang.UnsupportedOperationException`
    is thrown. The `resolveLocale` method is used by the Spring Framework—usually
    internally—to resolve the current locale.


    ##### AcceptHeaderLocaleResolver


    The `org.springframework.web.servlet.i18n.AcceptHeaderLocaleResolver` simply delegates
    to the `getLocale` method of the current `javax.servlet.HttpServletRequest`. It
    uses the `Accept-Language` HTTP Header to determine the language. The client sets
    this header value; this resolver doesn’t support changing the locale.


    ##### CookieLocaleResolver


    As its name implies, the `org.springframework.web.servlet.i18n.CookieLocaleResolver`
    uses a `javax.servlet.http.Cookie` to store the locale to use. This is particularly
    useful in cases where you want an application to be as stateless as possible.
    The actual value is stored on the client side, and it is sent to you with each
    request. This resolver allows the locale to be changed (you can find more information
    on this in [Chapter 6](#Chapter06.html#ch6)). This resolver also allows you to
    configure the name of the cookie and a default locale to use. If no value can
    be determined for the current request (i.e., there is neither a cookie nor a default
    locale), then this resolver falls back to the locale of the request (see `AcceptHeaderLocaleResolver`).


    ##### FixedLocaleResolver


    The `org.springframework.web.servlet.i18n.FixedLocaleResolver` is the most basic
    implementation of an `org.springframework.web.servlet.LocaleResolver`. It allows
    you to configure a locale to use throughout the whole application. This configuration
    is fixed; as such, it cannot be changed.


    ##### SessionLocaleResolver


    The `org.springframework.web.servlet.i18n.SessionLocaleResolver` implementation
    uses the `javax.servlet.http.HttpSession` to store the value of the locale. The
    name of the attribute, as well as a default locale, can be configured. If no value
    can be determined for the current request (i.e., there is neither a value stored
    in the session nor a default locale), then it falls back to the locale of the
    request (see `AcceptHeaderLocaleResolver`). This resolver also lets you change
    the locale (see [Chapter 6](#Chapter06.html#ch6) for more information).


    #### ThemeResolver


    The `org.springframework.web.servlet.ThemeResolver` strategy interface is used
    to determine which theme to use to render the page. There are several implementations;
    these are shown in [Figure 4-15](#Chapter04.html#fig_4_15) and explained in the
    following subsections. How to apply theming is explained in [Chapter 8](#Chapter08.html#ch8).
    If no theme name can be resolved, then this resolver uses the hardcoded default
    `theme`.


    ![Image](images/9781430241553_Fig04-15.jpg)


    ***Figure 4-15.** ThemeResolver implementations*


    [Listing 4-17](#Chapter04.html#list_4_17) shows the API for the `org.springframework.web.servlet.ThemeResolver`,
    which is quite similar to the `org.springframework.web.servlet.LocaleResolver`
    API.


    ***Listing 4-17.** The ThemeResolver API*


    `package org.springframework.web.servlet;`


    `import javax.servlet.http.HttpServletRequest;`

    `import javax.servlet.http.HttpServletResponse;`


    `public interface ThemeResolver {`

    `    String resolveThemeName(HttpServletRequest request);`


    `    void setThemeName(HttpServletRequest request,`

    `                      HttpServletResponse response,`

    `                      String themeName);`


    `}`


    You call the `setThemeName` method when you want to change the current theme.
    If changing theme is not supported, it throws a `java.lang.UnsupportedOperationException`.
    The Spring Framework invokes the `resolveThemeName` method when it needs to resolve
    the current theme. This is mainly done by using the theme `jsp` tag.


    ##### CookieThemeResolver


    As its name implies, the `org.springframework.web.servlet.theme.CookieThemeResolver`
    uses a `javax.servlet.http.Cookie` to store the theme to use. This is particularly
    useful where you want your application to be as stateless as possible. The actual
    value is stored on the client side and will be sent to you with each request.
    This resolver allows the theme to be changed; you can find more information on
    this in [Chapters 6](#Chapter06.html#ch6) and [8](#Chapter08.html#ch8). This resolver
    also allows you to configure the name of the cookie and a theme locale to use.


    ##### FixedThemeResolver


    The `org.springframework.web.servlet.theme.FixedThemeResolver` is the most basic
    implementation of an `org.springframework.web.servlet.ThemeResolver`. It allows
    you to configure a theme to use throughout the whole application. This configuration
    is fixed; as such, it cannot be changed.


    ##### SessionThemeResolver


    The `org.springframework.web.servlet.theme.SessionThemeResolver` uses the `javax.servlet.http
    .HttpSession` to store the value of the theme. The name of the attribute, as well
    as a default theme, can be configured.'
