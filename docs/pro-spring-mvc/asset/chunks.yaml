    在继续之前，让我们深入探讨一下 `handleLogin` 方法的工作原理。从请求中获取 `username` 和 `password` 参数，然后使用它们调用
    `AccountService` 上的 `login` 方法。如果提供了正确的凭据，我们会获得一个用户的 `Account` 实例（将其存储在会话中），然后重定向到索引页面。如果凭据不正确，服务会抛出
    `AuthenticationException`，目前由控制器处理。该异常被存储为 `request` 属性，并将用户返回到登录页面。


    尽管当前控制器能够完成其工作，但我们仍然直接操作 `HttpServletRequest`。这是一种相当繁琐（但有时是必要的）的方法；然而，我们通常希望避免这种情况，并使用灵活的方法签名来简化控制器。考虑到这一点，让我们修改控制器，限制直接访问请求的使用（参见清单
    5-12）。


    ***清单 5-12.** 使用 RequestParam 的 LoginController*


