- fmt: '### Filling the Report


    Just as in the PDF and Excel examples earlier, it would be nice if there were
    something to show to our users. Like the other view implementations, the `View`
    implementations for Jasper Reports use the data from the model for rendering.
    However, Jasper does this a little differently than other view technologies.


    If our model contains a single attribute and it is a `net.sf.jasperreports.engine.JRDataSource`,
    `net.sf.jasperreports.engine.JRDataSourceProvider` or `javax.sql.DataSource`,
    it will be used as is (in the case of a `DataSource` it expects a query in the
    report). If the attribute is a `Collection` or array, it will be converted into
    a usable `JRDataSource` implementation.


    If our model contains multiple attributes, we need to specify which attribute
    we want to use. We do this by setting the `reportDataKey` property on the view.
    Failing to do so might lead to unexpected results, as the first `JRDataSource`,
    `Collection` or array detected is used to fill the report.


    The `net.sf.jasperreports.engine.JRDataSource` is needed by the report to retrieve
    the data and render the report. There are several implementations available from
    JasperReports for different data sources, ranging from databases to Excel documents.


    ### Summary


    This chapter covered the view part of Spring MVC. We looked at view resolving
    by covering several general-purpose `ViewResolver` implementations. We also covered
    several view technologies supported by Spring MVC and explained how to configure
    Spring to use them. We started with JSPs and we briefly touched on JSF and how
    you can integrate Spring into a JSF application. Next we looked at several templating
    solutions; specifically, we covered Tiles, Velocity, and FreeMarker.


    After the web-based views, we looked at different view technologies like how to
    create PDF and Excel without changing our controllers but by simply adding a `ContentNegotiatingViewResolver`
    and an appropriate `View` implementation.


    In the previous chapter we covered JSON, and in this chapter we covered another
    way of exposing (part) of our model as JSON or XML. Finally we looked at JasperReports
    for creating reports based on a templating language.


    One important thing to take away from this chapter is the separation of controller
    logic and view logic (which was demonstrated by the different representations
    of our order). This shows the power of applying separation of concerns and the
    flexibility it gives one.


    We will probably never use all the technologies in a single application. It will
    probably be limited to two or three different technologies (for our pages and
    probably creating a PDF or Excel file). But it is nice to have the flexibility
    to change or simply add a new view layer to our application.


    ## C H A P T E R 9


    ## Testing Spring MVC Applications


    Testing is in most projects a bit of a struggle point. We all know testing is
    important, but we also know that testing takes time and writing good tests is
    difficult. Testing also requires adequate infrastructure in your code base.


    Testing is also not very sexy. It doesn’t involve producing flashy UIs with cool
    effects, and it doesn’t require you to make brilliant designs either (don’t get
    us wrong, testing requires *good* design, but it is mostly repetitive and not
    as engaging as production code can be). Maybe the biggest challenge is that your
    project doesn’t seem to move forward when you are writing tests. It feels like
    you are wasting time while you could be building functionality instead. Because
    of this, testing is sometimes “forgotten,” or promises are made to write tests
    later on.


    While there are numerous books and even more references to be found on the Internet,
    we are not going to talk about methodologies and the like. In this chapter, we
    want to start by reminding you why tests are really so important, and we’ll also
    try to define how we are going to approach testing throughout the chapter.


    In the code examples, we will introduce you to a way of testing using Spring’s
    test support that will be appealing and easy to handle. We will show different
    methods for testing your application and how to build those tests.


    The title of this chapter is “Testing Spring MVC Applications,” and this is meant
    in the broader sense, as we will discuss testing on every level of the application.
    We will start with the easy part, how to test our back-end modules: the repositories
    and services using Spring’s test support. We’ll also show you how and when to
    use mock objects. Later, we will discuss how to test MVC controllers and finally
    perform full-fledged browser tests of our pages.


    ### Introducing Testing


    Before we dive into the code, we want to make sure you are aware why writing tests
    is so beneficial. We will also look at some important things you can do to make
    (and keep) testing attractive within your project. When writing tests is a pain,
    you can be sure that the test quality is poor or even worse, no tests are written.
    To conclude our introduction we will look at the different kind of tests. We will
    explain the differences among them and look deeper into the kind of tests we will
    be covering in this chapter. So let’s start by having a look why you should be
    investing your time in writing tests.'
