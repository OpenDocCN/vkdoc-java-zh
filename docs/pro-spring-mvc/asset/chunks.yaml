    ### 通过 Gradle 运行前端测试


    除了常规的单元测试和集成测试，我们还希望通过构建工具来运行前端测试。当我们使用 Gradle 执行常规构建（命令为 `gradle build`）时，前端测试并不会运行。为此，我们创建了一个名为
    `systemTest` 的独立任务，专门用于运行前端测试。`systemTest` 命令利用 Cargo 插件将应用程序部署到 Tomcat，随后会运行所有以
    `FrontendTest` 结尾的测试。`systemTest` 任务在根目录的 `build.gradle` 文件中定义如下：


    `task systemTest(type: Test) {`

    `    include ''**/*FrontendTest.*''`

    `    dependsOn(war)`

    `    doFirst {`

    `        cargoStartLocal.execute()`

    `    }`

    `}`


    `systemTest` 任务包含了所有以 `FrontendTest` 结尾的类。它依赖于 `war` 任务，这意味着 Gradle 会先构建项目的 war
    包。最后，任务会执行 `cargoStartLocal`，该任务之所以可用，是因为我们启用了 Cargo 插件。此任务会启动 Tomcat 并部署由 `war`
    任务预先生成的 war 文件。


    为了将这些 `FrontendTest` 排除在常规的 Gradle 测试生命周期之外，我们对 `test` 任务进行了扩展，专门排除了这些文件：


    `test {`

    `    exclude ''**/*FrontendTest.*''`

    `}`


    运行 `FrontendTest` 非常简单：打开命令行界面，导航至第 9 章的示例目录，然后输入：


    _________


    ²² [`http://seleniumhq.org/docs/02_selenium_ide.html`](http://seleniumhq.org/docs/02_selenium_ide.html)


    `gradle systemTest`


    为了使系统测试正常运行，你的系统上需要安装 Firefox。由于应用程序需要部署到 Tomcat，测试会花费一些时间。在测试过程中，你会看到 Firefox
    打开和关闭，这是 Selenium 测试在运行。最后，你应该会看到“构建成功”的确认信息。如果你进入第 9 章目录下的 `build/reports/test`
    文件夹，并打开 `index.html`，就可以看到测试报告（参见图 9-18），其中显示两个测试均已运行。


    ![图片](img/9781430241553_Fig09-18.jpg)


    ***图 9-18.** 测试结果报告*


    ![图片](img/square.jpg) **注意** 有报告指出，当前版本的 Selenium 与最新版本的 Firefox（撰写本文时为版本 12）存在兼容性问题。然而，该代码是在
    Firefox 仍为版本 11 时开发和测试的。如果你在运行系统测试时遇到问题，请使用 Firefox 11，或查看 Selenium 网站以获取修复此问题的新版本（预计很快会发布）。


    ### 本章小结


    在本章中，我们认识到认真思考如何在项目中处理测试是非常重要的。显然，一个项目需要充分的测试才能得以成长并保持可维护性。你的测试应与实际生产代码同等重要。我们介绍了一些指导原则：确保在正确的层级进行测试，以及如何保证测试在你的项目中保持吸引力，因为这是确保测试得到充分编写的关键要素之一。


    我们还解释了不同层级的测试。我们从基本的单元测试开始，接着介绍了 Spring 的测试支持，并利用它编写了集成测试，通过内存数据库测试了我们的仓库。在 MVC
    方面，我们展示了如何使用 Spring 的测试支持和全新的 Spring MVC 测试来测试应用程序控制器。有了这两个工具，你现在可以进一步提高整体代码覆盖率。


    最后，我们介绍了一个完整的前端测试，它测试了我们的视图，同时也间接测试了其背后的所有逻辑。我们向你展示了使用真实浏览器（Selenium）创建系统测试的可能性，但也可以将其配置为使用内存浏览器（HtmlUnit），从而使其成为集成测试。


    我们希望这里介绍的理念和技术能帮助你编写更多、更好的测试。剩下的唯一事情就是去实践这些测试策略！


    ## 第 10 章


    ## Spring Web Flow


    在构建可扩展、易于开发和维护的 Web 应用程序方面，Spring Web Flow 2（下文简称 Web Flow）是一个重要的组成部分。在接下来的三章中，我们将带你熟悉
    Web Flow 及其优缺点；我们还将讨论为什么、何时以及最重要的是如何使用它。在本章中，我们首先解释什么是 Web Flow 以及它能为你做什么。之后，我们将讨论一些基本的
    Web Flow 元素，这些是你开始构建第一个流程之前需要理解的。


    贯穿 Web Flow 各章的主线是一个示例应用程序，我们将随着这些章节的推进逐步创建它。在本章中，我们将首先说明如何将一个普通的 MVC 示例通过少量配置转变为支持
    Web Flow 的应用程序。接下来，我们将逐步为书店示例应用程序添加 Web Flow 功能，并沿途详细解释每个特性。我们特别留意确保你在阅读这些章节时无需手头有示例应用程序。所有相关代码都会展示并加以说明。


    在本章中，我们将仅限于创建一个流程：创建（图书）订单流程。第 11 章和第 12 章将更详细地介绍该应用程序。在第 11 章中，我们将扩展示例应用程序的功能，并介绍一些更详细的配置选项。在第
    12 章中，我们将让你熟悉一些更高级的方面，例如使用 AJAX、流程管理的持久化等。


    如果你已经有一些 Web Flow 经验，可以快速浏览本章，然后进入下一章。如果你是 Web Flow 新手，或者想复习一下，那么这里就是最佳起点！


    ### 为什么选择 Web Flow


    在 Web Flow 各章中，我们将从讨论 Web Flow 2.x 系列开始。我们始终将版本 1 的工具称为 *Web Flow 1*。否则，所有讨论的特性均与
    Web Flow 2.x（撰写本文时为版本 2.3.1）相关。


    你可能想知道为什么需要费心阅读关于 Web Flow 的内容。你尤其可能想知道为什么需要学习又一个框架。因为老实说：Java 领域非常广阔，Web 框架的选择极其丰富（你显然已经选择了
    Spring MVC——很好！）。然而，在这些框架中，仍然有一些附加功能可以让你的工作更轻松。


    我们说更轻松？嗯，是的。我们确实是这个意思。读完这三章后，我们将让你相信，使用 Web Flow 可以使 Web 应用程序的管理变得更加容易。让我们先从一些理论开始，这样我们就能说明
    Web Flow 能为你做什么。希望这能让你产生足够的兴趣，读完所有三章 Web Flow 内容！

    '
- fmt: '#### The Flow Concept


    Despite the many features and advantages Web Flow has to offer, it all revolves
    around “the flow” (no wonder it is also called Web *Flow*). Before going any further,
    let''s back up and cover what a flow is and what it is modeled after. This will
    help a lot in understanding what Web Flow is trying to accomplish and how it will
    help you.


    A flow is something that occurs naturally in most applications (see [Figure 10-1](#Chapter10.html#fig_10_1)).
    The basic example is a wizard. Imagine a web shop order wizard that requires you
    to follow several steps to place your order. These steps form a flow. You start
    with Step 1, where you fill in some identification data, such as your first and
    last name, and then click the Next button. This takes you to Step 2, which asks
    you where to ship your order. Step 3, the last step, allows you to enter delivery
    options: the type of shipment, whether you would like your package to be sent
    before a certain date (it''s possible there might be multiple shipments if the
    package wasn''t complete by that date), and so forth. If the wizard is any good,
    it will allow you to navigate back and forward between steps, remembering the
    state (data) you entered for that specific step in the flow. Each step is small
    piece of the flow. They are linked together by a form of navigation. Sometimes
    you could also have the option to skip a step. At the end of the process, you
    can finalize your flow. In our example, this would process your order and make
    sure your products are delivered as soon as possible.


    ![Image](images/9781430241553_Fig10-01.jpg)


    ***Figure 10-1.** A basic flow in an application*


    Web Flow is all about creating these flows, which you accomplish by managing state
    between the different flow steps, expressing navigation, and so forth. So far
    we''ve discussed the core aspects of a flow; however, there are also some other
    nifty features associated with flows. We will discuss these next.


    #### Fine-Grained Scoping


    The first major strength of Web Flow is that it adds extra scopes. No doubt you
    already noticed that the servlet specification declares three scopes in which
    your application can retain state.


    A scope is nothing more than a map in which you can store *key value pairs*, which
    are, depending on the scope type, stored for a determined amount of time. There
    are three scopes defined by the servlet specification: application, session, and
    request.


    In [Table 10-1](#Chapter10.html#tab_10_1), we will briefly summarize the different
    scopes and explain how you should use them. Although this is a very basic topic
    for anyone who has done Java web development before, we suggest you quickly skim
    it over, so as not to miss anything.


    ![Image](images/9781430241553_tab10-01.jpg)


    You might wonder what this has to do with Web Flow. Let''s look at an example
    that uses our bookstore web application. Just as with any online store, we have
    an order and checkout process. In the first step of this process, the user is
    able to select a category. The category could be IT, Sci-Fi, Thriller, and so
    forth. In the next step, books can be selected from the previously chosen category.
    Finally, the user we will be able to select some options, such as the delivery
    details. However, each step is on a separate page. In this example, we would have
    three pages. When the user confirms the order, we will need to locate that information
    (which we gathered in the three previous pages) and create an order from it. We
    need to store this data somewhere in between these different steps; the question
    is where do we store this data? Let''s look at some options:


    *   **Application scope:** Obviously, we don''t want information from user x to
    be visible to user y. Not only is this unwanted, but it would also create security
    leaks, where sensitive data from one user might become visible to other users.

    *   **Request scope:** This is also a bad choice because you would not be able
    to store the data over multiple pages; the request scope is destroyed after every
    page render. You could piggyback data on your pages by adding hidden fields, but
    this is generally a bad idea. While this solution offloads data to the client
    (which might be considered a pro in some situations), it might also trigger security
    holes (what if you have an internal state that should not be made visible to the
    client, but is retained?), and you would have to manage this manually within your
    code. To put it simply, the lifecycle of the request scope is simply too short
    to gracefully fulfill our requirement.

    *   **Session scope:** Well, we have no other options! And while this scope is
    usually the best of these three options, it has some drawbacks. We will discuss
    these drawbacks in the upcoming paragraphs, to give you some background on the
    issues you will face when using this. Finally, we will examine how Web Flow can
    help you overcome the drawbacks of this scope.


    The problems with storing such data on the session boil down to clean up and management.
    For example, consider what will happen with our data once the user finishes his
    order and does something else with the application. Will this data be sitting
    on the session needlessly until the session times out?


    Yes, it will. There are a bunch of mechanisms to help you remove data from the
    session, but none is guaranteed to work. This might be a bold statement; however,
    remember that users can do what they want: hit the back button, jump out of your
    use case, manually type in another URL within your app, and so forth.


    Also, how are you going to call your keys in the session map: `myData`? Are you
    sure no one else has used that key before? The session can be used by any component
    within your web application, so you would have to start namespacing your keys
    (e.g., `page.x.data`).'
