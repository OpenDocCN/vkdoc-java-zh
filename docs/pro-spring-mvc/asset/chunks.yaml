    MVC、Spring Web Flow、@Controllers 等）分开。    `ContextLoaderListener` 将负责引导后端应用程序上下文。`DispatcherServlet`
    将引导其自己的前端上下文。当 `DispatcherServlet` 引导其自己的上下文时，它将找到我们使用 `ContextLoaderListener`
    引导的后端 `ApplicationContext`。它将此上下文设置为其自己的 `application context` 的父上下文。我们现在有两个应用程序上下文而不是一个，这一事实对我们没有实际影响。你只需要知道根上下文（由
    `ContextLoaderListener` 引导）将无法访问由 dispatcher servlet 应用程序上下文引导的 bean，因为子上下文可以访问父上下文中的
    bean，但反之则不行。    我们现在也使用两种类型的应用程序上下文类。对于后端，我们使用 `XmlWebApplicationContext`，它将从标准的
    XML 应用程序上下文文件启动。`XmlWebApplicationContext` 的使用没有在 `web.xml` 中明确提及，因为 `ContextLoaderListener`
    默认使用此类。在该上下文文件中，我们导入 `spring-security.xml` 并使用 `<context:annotation-config/>`
    和 `<context:component-scan/>` 加载带有 @Configuration 注解的类。    然而，对于 `DispatcherServlet`，我们直接使用
    `AnnotationConfigWebApplicationContext`，并为其提供前端的带有 @Configuration 注解的配置类。    你可能想知道为什么我们没有在两种情况下都使用
    `AnnotationConfigWebApplicationContext`。例如，我们可以使用 @ImportResource 注解从 @Configuration
    类中加载 `spring-security.xml`，就像我们在 `WebflowContextConfiguration` 中使用 `webflow-config.xml`
