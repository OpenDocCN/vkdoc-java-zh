    ### Setting Variables and Accessing Scopes


    Ok, we''ve completed our first refactoring. Before going any further we would
    first like to introduce you to some other Web Flow features. In this section we
    will cover how you use flow variables and access the different Web Flow scopes
    using the implicit objects.


    A scope is treated as a `java.util.Map`, so you just pass along a key for reading
    values out of a scope, as well as a key plus value for setting something on a
    scope. The expression language makes reading the scope straightforward. For example,
    here''s what you do if you want to read the value with the `myKey` key from the
    `flow` scope and pass this value to an application controller:


    `expression="myApplicationController.someMethod(flowscope.myKey)"`


    Setting variables can be done using the `<set>` element. This element is valid
    in all five states (which we will cover in the upcoming sections), except one:
    the decision state. This element can also be used within transitions. The example
    in [Listing 11-30](#Chapter11.html#list_11_30) sets a literal value, `someValue`,
    on a `flow` scope with the `myKey` key through a flow start action. We could have
    used other scopes to put the value on (e.g., `conversationScope` or `requestScope`);
    however, not every scope would make a lot of sense or would be allowed. For example,
    `view` scope would yield an error because we are not yet in a view state, so no
    `view` scope exists. Finally, if we specify a literal value, you are forced to
    put it between single quotes. The `value` attribute is expecting an expression
    by default, meaning that the value of `value` attribute is automatically interpreted
    as an expression. (i.e., it is not required that we place them between “#{}”).


    ***Listing 11-30.** Setting a Value with a Literal Value on Flow Scope*


    `<on-start>`

    `    <set name="flowScope.myKey" value="''someValue''"/>`

    `</on-start>`


    In addition to the `<set>` element, you can also set variables using the expression
    language in an evaluate action. [Listing 11-31](#Chapter11.html#list_11_31) shows
    how to store the result returned from executing an application controller method
    on `flow` scope. The expression contains the logic to be executed (in this case,
    it executes the `someMethod` method on the `myApplicationController` bean), passing
    the value retrieved from `flow` scope by using the `myKey` key as a parameter
    and storing the result in `flow` scope under the `someMethodResult` key.


    ***Listing 11-31.** Calling an Application Controller Method with a Parameter
    and Storing the Result on flow Scope*


    `<evaluate expression="myApplicationController.someMethod(flowScope.myKey)"`![Image](images/U002.jpg)

    `results="flowScope.someMethodResult"/>`


    #### Flow Variables


    A flow may declare one or more instance variables. These variables are allocated
    when the flow starts, and they are destroyed when the flow ends. The syntax for
    declaring them looks like this:


    `<var name="orderForm" class="com.apress.prospringmvc.bookstore.web.OrderForm"/>`


    The `name` is the key under which the created instance will be available on `flow`
    scope, while the `class` attribute is the fully qualified class name of the class
    to be instantiated. Web Flow creates an instance using the default (or *parameterless*)
    constructor of the class.


    Note that Web Flow will create a Spring-managed bean from the created instance.
    In doing so, Spring will fully initialize the instantiated class, applying all
    applicable `BeanPostProcessors`. The instance will eventually be registered as
    a Spring bean with the application context. This means that you can use for example
    `@Autowired` annotations in the class. During initialization, these dependencies
    will be injected by Spring.


    ![Image](images/square.jpg) **Note**  The “Different Web Flow Scopes” section
    explains that the class you specify in the `class` attribute should implement
    `java.io.Serializable` because the object created is put on `flow` scope. This
    also counts for referenced objects not marked as `transient`. However, references
    to objects that hold no state (e.g., services, facades, DAOs, and so on) should
    be declared as `transient`. Java''s `transient` keyword excludes these objects
    from the Java serialization process. Such objects do not need to be serialized
    because they do not contain any state. If these instances are autowired beans
    (using `@Autowired`), then Spring will make sure they are rewired when the flow
    resumes.


    The `<var>` element is primarily used to create instances of classes before the
    flow starts, and these classes are used in the scope of that flow execution. You
    can only use this element on top of the flow definition. In comparison, the `<set>`
    element is better suited for setting or moving values between already existing
    instances. For example, if you want put a given request parameter value on a search
    criteria `o`bject, you could use the `<set>` element. In the `name` attribute,
    you would refer to the key that represents the search criteria object. In the
    `value` attribute, you would refer to the `requestParameters` implicit object,
    which would then allow you to access the parameter with the desired name (e.g.,
    `requestParameters.myParam`).'
