    The evaluate action for validating the delivery date is executed when a user clicks
    the finish button (triggering the `finish` transition) after entering the delivery
    options. The invocation occurs before the invocation to create the actual order.
    We pass along the form and `messageContext` (a Web Flow implicit object). Inside
    this, we use the message context to add a custom message when the validation fails,
    as you can see in the preceding code snippet.


    You might have noticed that this method returns the `org.springframework.webflow.execution.Event`.
    This is in contrast to other methods we have called previously when using an evaluate
    expression. For example, the `addBook` method in the `com.apress.prospringmvc.bookstore.web.controller.OrderController`
    simply returns `void`.


    When executing an expression, the result (if it isn''t already an `Event`) is
    internally converted to an `Event`. These objects drive the transition, indicating
    whether the evaluation succeeded or failed (or any other `java.lang.String` based
    outcome). Also, these objects can optionally have objects as attributes associated
    with them.


    When you do not need to trigger outcome conditions, there is no need to use an
    `Event` as a return value, and you can return the value as-is (or simply return
    `void`). Web Flow will do the conversion to a successful `Event` for you.


    However, in this case we need to differentiate between a validation success and
    a validation failure. Both will render different results. In the first case, we
    want to proceed with the order-creation process; in the second case, we want to
    render the select delivery options page again to show the error message and let
    the user try again. We signal this explicitly with events. Note that we could
    have attached a result with the successful `Event`, which could then be bound
    using the `result` attribute of the evaluate action. We will discuss this later
    in this chapter''s “Working with Outcome Events” section.'
