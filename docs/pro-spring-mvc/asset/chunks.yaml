    environment). The authors chose to use STS (SpringSource Tool Suite), installed
    the Gradle plugin, and then used that plugin to import and build the sample project.
    The project was then deployed to the embedded tc Server instance.


    You also wrote your first Java code for your MVC application, slightly modifying
    the basic code for this chapter and using that to explore the automatic redeploy
    features of the embedded server.


    In the next chapter, you will improve on this application as you get a better
    understanding of the inner workings of Spring MVC.


    ## C H A P T E R  2


    ## Spring Framework Fundamentals


    The Spring Framework evolved from the code written for *Expert One-on-One J2EE
    Design and Development* by Rod Johnson (Wrox, 2002). The framework combines best
    practices for Java Enterprise Edition (JEE) development from the industry and
    integration with the best-of-breed third-party frameworks. It also provides easy
    extension points to write your own integration if you need one that doesn’t yet
    exist. The framework was designed with developer productivity in mind, and it
    makes it easier to work with the existing, sometimes cumbersome Java and JEE APIs.


    Before we start our journey into Spring MVC and Spring Web Flow, we will provide
    a quick refresher course on Spring Core (formerly known as the Spring Framework).
    Spring is now a longtime de-facto standard for Java enterprise software development.
    It introduced many of us to concepts such as *dependency injection*, *aspect-oriented
    programming* (AOP), and programming with *plain-old-Java-objects* (POJOs).


    In this chapter, we will cover dependency injection and AOP. Specifically, we
    will cover how the Spring Framework helps us implement dependency injection and
    how to use programming to our advantage. To be able to do the things mentioned
    here, we will explore the Inversion of Control (IoC) container; the *application
    context*.  


    We will only touch on the necessary basics of the Spring Framework here. If you
    want more in-depth information about it, we suggest the excellent Spring Reference
    guide ([`www.springsource.org`](http://www.springsource.org)) or books such as
    *Pro Spring 3* (Apress, 2012) or *Spring Recipes, 2^(nd) Edition* (Apress, 2011).


    Let’s begin by taking a quick look at the Spring Framework and the modules that
    comprise it.


    ![Image](images/square.jpg) **Tip**  You can find the sample code for this chapter
    in the `chapter2-samples` project. Different parts of the sample contain a class
    with a `main` method, which you can run to execute the code.


    ### The Spring Framework


    In the introduction, we mentioned that the Spring Framework evolved from code
    written for the book *Expert One-on-One J2EE Design and Development* by Rod Johnson.
    This book was written to explain some of the complexities in JEE and how to overcome
    them. And while many of the complexities and problems in JEE have been solved
    in the newer JEE specifications (especially since JEE 6), the Spring Framework
    remains very popular.


    It remains popular due to its simple (not simplistic!) approach to building applications.
    It also offers a consistent programming model for different kinds of technologies,
    be they for data access or messaging infrastructure. The framework allows developers
    to target discrete problems and build solutions specifically for them.


    The framework consists of several modules (see [Figure 2-1](#Chapter02.html#fig_2_1))
    that work together and build on each other. We can pretty much cherry pick the
    modules we want to use.


    ![Image](images/9781430241553_Fig02-01.jpg)


    ***Figure 2-1.** Overview of the Spring Framework*


    All of the modules from [Figure 2-1](#Chapter02.html#fig_2_1) are represented
    as jar files that we can include on the classpath if we need a specific technology.
    In [Table 2-1](#Chapter02.html#tab_2_1), we list all the modules coming with Spring
    3.1 and give a brief description of the content of each module, as well as any
    artifact names that might be used for dependency management. The name of the actual
    jar file might differ, depending on how one obtains the module. The downloadable
    distribution contains jars in this form: `org.springframework.[module-name]-[version].jar`.
    Jars that come from the maven repositories use this form: `spring-[artifact].jar`.
    See [table 2-1](#Chapter02.html#tab_2_1).


    ![Image](images/tab_2_1.jpg)


    ![Image](images/tab_2_1a.jpg)


    Most of the modules have a dependency on some other module in the Spring Framework.
    The `core` module is an exception to this rule. [Figure 2-2](#Chapter02.html#fig_2_2)
    gives an overview of the commonly used modules and their dependencies on other
    modules. Notice that the `instrumentation`, `aspect`, and `test` modules are missing
    from the figure; this is because their dependencies depend on the project and
    what other modules are used. The Spring Framework has only one required dependency:
    `commons-logging`, a logging abstraction framework. The other dependencies differ
    based on the needs of the project.


    ![Image](images/9781430241553_Fig02-02.jpg)


    ***Figure 2-2.** The Spring Framework Module dependencies*'
