    #### Combining AJAX and REST


    We briefly covered REST and we also touched on the subject of AJAX, but we covered
    each topic separately. However, it is also very easy to combine the two. In the
    REST section, we changed the account update form into a form that was issued with
    a `PUT` request, but this was a simulation using `POST`. With the JavaScript library
    we use, it is actually possible to create a real `PUT` request instead of a `POST`
    request that is being used as a `PUT` request.


    To be able to issue and handle `PUT` requests, we need to do two things: the form
    must be submitted by AJAX as a `PUT` request, and we need to prepare the server
    to be able to handle `PUT` requests. There are some differences between the `POST`
    and `PUT` requests. A major difference is that a `POST` request must have the
    form data available (this is required by the specification), but for the `PUT`
    request that is not the case. Spring provides a `org.springframework.web.filter.HttpPutFormContentFilter`,
    which can help us here.


    The filter kicks in when a `PUT` request with a content-type of `application/x-www-form-urlencoded`
    is detected. It parses the body of the incoming request (delegated to an `org.springframework.http.converter.xml.XmlAwareFormHttpMessageConverter`),
    and the result is a map of parameters that can be used just like normal form parameters.
    [Listing 7-11](#Chapter07.html#list_7_11) shows how to register the filter.


