- fmt: '# Request Synchronization


    When designing web applications with Spring MVC (or any other request-driven web
    framework), sooner or later you are going to feel that you are missing some other
    important features. For instance, have you considered what would happen if a user
    were to click a Submit button on an order books form twice? In theory, there is
    no good reason why this would happen because clicking a button brings you instantly
    to the next page. In theory, that is. In practice, this can imply a certain delay,
    depending on how fast (or how slow) your application responds. Users tend to be
    impatient; if there isn''t anything happening within a couple of seconds, the
    user might even doubt that the first click was successful (maybe he didn''t click
    correctly?). So, before you know it, you will have to deal with a double submit
    coming from the same user and page.


    What happens after the double submit depends mostly on sheer luck. Maybe your
    form submit was *idempotent*^([1](#Chapter10.html#CHP-10-FN-1)) in some way? In
    this case, being idempotent comes down to executing the operation multiple times
    without being impacted by any undesirable side effects from the business process
    point of view. Creating (and later on, delivering) the same order twice simply
    because the user double-clicked the Submit button is certainly an unwanted side
    effect. Although idempotence is mostly implied by read-only operations, sometimes
    form submits can be idempotent as well, depending on how you design them. For
    example, when creating an account, there will probably be some kind of unique
    or primary key constraint on the `username` column in your database table. If
    your form is submitted twice, the second submit will fail with a *duplicate key*,
    and no harm to your system will occur. Still, the user will probably see an error
    page. This is clearly something you want to avoid, but at least you don''t end
    up creating any duplicate users in your database. In this example, you are saved
    by the uniqueness constraint on the table; but with a bit less luck, the opposite
    could be true, and it would be very easy to trigger undesirable side effects by
    submitting the form twice. This might ultimately lead to data corruption or other
    inconsistencies in your system.


    Thus, you typically want to design your application so that submitting a form
    twice is not possible; or, at a minimum, that it results in no unwanted side effects.
    While a simple line of JavaScript might seem to solve this (i.e., you might disable
    a button after the first click), remember that this will only reduce the possibility
    of submitting a form twice. Disabling the button is far from an ideal or complete
    solution. For example, the following scenarios would still be possible:


    ____________


    ¹ [`http://en.wikipedia.org/wiki/Idempotence`](http://en.wikipedia.org/wiki/Idempotence)
    (Computer science meaning)


    *   After clicking the Submit button, the user presses F5; this will cause the
    form to be resubmitted. (The browser will warn the user about this, but it is
    still possible to submit that form twice.)

    *   A user can easily bypass your JavaScript by simulating multithreaded HTTP
    requests using something as trivial as `cURL`.^([2](#Chapter10.html#CHP-10-FN-2))
    Or, the user can turn off JavaScript altogether in the browser; you don''t need
    to be a professional developer to do that!


    The point here is that you are looking for something mature that serializes access
    to a given form submission (for a given session, of course), so your application
    logic is relieved from handling a duplicate submission (i.e., you don''t want
    to have to write specific code to deal with this).


    Spring Web Flow solves this by serializing access to your flow executions. After
    you get the HTTP session id, you''ll get a *flow execution key*. The flow execution
    key is to Web Flow as the HTTP session id is to your Web container. Each flow
    execution will get a unique id. Web Flow will use this id to identify the execution
    the user is currently participating in. But it will also use this id to serialize
    access to your flow execution (i.e., it will prevent two requests from operating
    on the same execution at the same time). But don''t worry: this is also automatically
    managed for you, and you won''t even notice it.


    Whenever a form is submitted twice in your flow, Web Flow guarantees that only
    one of the two requests (for that flow execution within a given HTTP session)
    will be executed at a time. It does so by serializing the flow execution key.
    The second request is still pending because the flow execution was locked by the
    first request. It will eventually be executed after the first request is processed,
    unless the first request ends the flow. In that case, the second request will
    simply restart the flow, because the flow already ended (see [Figure 10-4](#Chapter10.html#fig_10_4)).


    ____________


    ²[`http://curl.haxx.se/`](http://curl.haxx.se/) A very neat and easy-to-use command
    line interface-based tool that transfers data with URL syntax (http, https, smtp,
    and so on).


    ![Image](images/9781430241553_Fig10-04.jpg)


    ***Figure 10-4.** A Web Flow synchronizing multiple requests to the same flow
    execution*


    In [Figure 10-4](#Chapter10.html#fig_10_4), the top rectangle represents the flow
    execution dealing with two requests (a double submission from the same browser
    session). Only one request is allowed through for processing (`request1`), while
    the second request (`request2`) is blocked by the flow execution (other requests
    would also be blocked). After processing `request1` and before the request ends,
    it triggers an end state (which we will discuss later on). An end state ends the
    entire flow execution. In the middle rectangle, you can see the flow execution
    after the first request has been processed. The lock is freed, so the second request
    has a chance to enter the flow execution. However, the execution is already destroyed;
    at the bottom rectangle, you can see that a new flow execution is started instead.
    In other words, the second request will bring the user back to the entry point
    of the flow instead of re-executing the action.


    This means that a double submission inside a flow execution is still possible.
    Web Flow serializes access to the flow execution, but as long as the flow hasn''t
    ended (as illustrated in the previous paragraph), the second request still executes
    the exact same logic as the first request, and you still get a double submission.
    Normally, you would execute your process transaction just before you end the flow.
    In the book order process, we go over the different steps, with each step composing
    a part of the order. If the user double-clicks in this process, nothing bad happens
    (in the worst case, a book is added twice). But when the user finalizes the order,
    we perform our create order transaction and commit everything to the data store.
    When the first request returns, the flow will already have ended. This means the
    second request will not trigger a second create order transaction, but will merely
    restart the flow.'
