    ##### Using SessionAttributes


    It can be beneficial to store a model attribute in the session between requests.
    For example, imagine we need to edit a customer record. The first request gets
    the customer from the database. It is then edited in the application, and the
    changes are submitted back and applied to the customer. If we don’t store the
    customer in the session, then the customer record must be retrieved again from
    the database. This can be inconvenient.


    In Spring @MVC, you can tell the framework to store certain model attributes in
    the session. For this, you can use the `org.springframework.web.bind.annotation.SessionAttributes`
    annotation (see [Table 5-15](#Chapter05.html#tab_5_15)). You should use this annotation
    to store model attributes in the session, so they survive multiple HTTP requests.
    However, you should not use this annotation to store something in the session,
    and then use the `javax.servlet.http.HttpSession` to retrieve it. The session
    attributes are also only usable from within the same controller, so you should
    not use them as a transport to move objects between controllers. If you need something
    like that, we suggest that you use Spring Web Flow (see [Chapters 10](#Chapter10.html#ch10)-[12](#Chapter12.html#ch12)).


    ![Image](images/tab_5_15.jpg)


    When using the `org.springframework.web.bind.annotation.SessionAttributes` annotation
    to store model attributes in the session, we also need to tell the framework when
    to remove those attributes. For this, we need to use the `org.springframework.web.bind.support.SessionStatus`
    interface (see [Listing 5-26](#Chapter05.html#list_5_26)). When we finish using
    the attributes, we need to call the `setComplete` method on the interface. To
    access that interface, we can simply include it as a method argument (see [Table
    5-4](#Chapter05.html#tab_5_4)).


    ***Listing 5-26.** The SessionStatus Interface*


    `package org.springframework.web.bind.support;`


    `public interface SessionStatus {`


    `    void setComplete();`


    `    boolean isComplete();`


    `}`


    ##### Form Tag Library


    To be able to use all the data binding features provided by the framework, we
    also need to use the tag library to write forms. Spring MVC ships with two tag
    libraries. The first is a general-purpose library (see [Table 5-16](#Chapter05.html#tab_5_16)),
    and the second is a library used to simplify writing forms in our pages (see [Table
    5-17](#Chapter05.html#tab_5_17)). We can use the general-purpose library to write
    our forms (this was how it worked with the Spring Framework before 2.0). This
    is a very powerful approach, but it is also quite cumbersome (albeit it can still
    be used as a fallback in those corner cases where the form tag library isn’t sufficient).


    ![Image](images/tab_5_16.jpg)


    ![Image](images/tab_5_16a.jpg)


    ![Image](images/tab_5_17.jpg)


    ![Image](images/tab_5_17a.jpg)


    When using the form tag library, we need to specify which model attribute property
    we want to bind the form element to. We do this by specifying the `path` attribute
    on our form element. There are several properties we can set on the various form
    tags, but [Table 5-18](#Chapter05.html#tab_5_18) shows the main properties. For
    the form tags that use a collection of items (e.g., select, checkboxes, and radiobuttons),
    there are a few additional shared attributes (see [Table 5-19](#Chapter05.html#tab_5_19)).


    ![Image](images/tab_5_18.jpg)


    ![Image](images/tab_5_19.jpg)


    We can apply this logic to our order JSP page. The page would still have the same
    functionality, but it would fully utilize the data binding functionality from
    Spring MVC (see [Listing 5-27](#Chapter05.html#list_5_27)). In this case, we simply
    need to replace the normal input element tags with the form element tags, and
    then supply the path to bind to. Of course, we also need to add the `taglib` declaration
    to the top of the JSP.


    ***Listing 5-27.** The Order JSP with Form Tags*


    `<%@ taglib prefix="c" uri="http://java.sun.com/jsp/jstl/core"%>`

    **`<%@ taglib prefix="form" uri="http://www.springframework.org/tags/form" %>`**

    **`<form:form method="GET" modelAttribute="bookSearchCriteria">`**

