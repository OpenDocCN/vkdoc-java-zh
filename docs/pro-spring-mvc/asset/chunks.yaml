  trans: '

    ##### 执行 HandlerExecutionChain


    为了处理请求，`DispatcherServlet` 使用 `HandlerExecutionChain` 来确定要执行的内容。该类持有对需要调用的实际处理程序的引用；同时，它（可选地）还引用了在处理器执行之前（`preHandle`
    方法）和之后（`postHandle` 方法）执行的 `org.springframework.web.servlet.HandlerInterceptor`
    实现。这些拦截器可用于应用横切功能（有关此主题的更多信息，请参见第 6 章）。如果代码成功执行，拦截器将再次被调用；最后，在需要时，视图会被渲染（参见图 4-5）。


    ![Image](img/9781430241553_Fig04-05.jpg)


    ***图 4-5.** 处理请求*


    处理器的执行被委托给上一步中选定的 `HandlerAdapter`。它知道如何执行选定的处理器，以及如何将响应转换为 `org.springframework.web.servlet.ModelAndView`。如果返回的
    `ModelAndView` 中没有视图，则会咨询 `org.springframework.web.servlet.RequestToViewNameTranslator`，根据传入的请求生成一个视图名称。


    ##### 处理异常


    当在请求处理过程中抛出异常时，`DispatcherServlet` 将咨询已配置的 `org.springframework.web.servlet.HandlerExceptionResolver`
    来处理抛出的异常。该解析器可以将异常转换为向用户显示的视图。例如，如果出现与数据库错误相关的异常，你可以显示一个指示数据库宕机的页面。如果异常未被解决，它将被重新抛出并由
    Servlet 容器处理，这通常会导致 HTTP 500 响应码（内部服务器错误）。图 4-6 展示了请求处理工作流的这一部分。


    ![Image](img/9781430241553_Fig04-06.jpg)


    ***图 4-6.** 异常处理*


    ##### 渲染视图


    如果在请求处理工作流中已选定了一个视图，`DispatcherServlet` 首先检查它是否是一个视图引用（如果视图是 `java.lang.String`
    类型，则属于这种情况）。如果是，则会咨询已配置的 `org.springframework.web.servlet.ViewResolver`，将视图引用解析为实际的
    `org.springframework.web.servlet.View` 实现。如果没有视图且无法解析，则会抛出 `javax.servlet.ServletException`。图
    4-7 展示了视图渲染过程。


    ![Image](img/9781430241553_Fig04-07.jpg)


    ***图 4-7.** 视图渲染过程*


    ##### 完成处理


    每个传入的请求都会经过请求处理流程的这一步，无论是否存在异常。如果 `HandlerExecutionChain` 可用，则会调用拦截器的 `afterCompletion`
    方法。只有那些 `preHandle` 方法成功调用的拦截器，其 `afterCompletion` 方法才会被调用。接下来，这些拦截器会按照其 `preHandle`
    方法被调用的相反顺序执行。这模仿了 Servlet 过滤器中的行为，即第一个被调用的过滤器也是最后一个被调用的。


    最后，`DispatcherServlet` 使用 Spring 框架中的事件机制来触发一个 `org.springframework.web.context.support.RequestHandledEvent`（参见图
    4-8）。你可以创建并配置一个 `org.springframework.context.ApplicationListener` 来接收并记录这些事件。


    ![Image](img/9781430241553_Fig04-08.jpg)


    ***图 4-8.** 完成处理*


    #### 请求处理总结


    `DispatcherServlet` 是使用 Spring MVC 处理请求的关键组件。它也非常灵活且可配置。这种灵活性源于该 Servlet 使用了大量不同的组件来履行其职责，并且这些组件都以接口形式表达。表
    4-1 概述了请求处理工作流中涉及的所有主要组件类型。


    ![Image](img/tab_4_1.jpg)


    ![Image](img/tab_4_1a.jpg)


    在接下来的章节中，你将看到如何配置 `DispatcherServlet`。你还将更深入地了解各种组件的不同实现。


    ### DispatcherServlet


    与任何 Servlet 一样，`org.springframework.web.servlet.DispatcherServlet` 需要被配置，以便 Web
    容器能够启动并映射该 Servlet。这样，它才能处理请求。配置 `DispatcherServlet` 是一个两步过程。首先，你需要告诉容器加载一个 Servlet
    并将其映射到一个或多个 URL 模式。


    启动后，该 Servlet 使用创建的 `org.springframework.web.context .WebApplicationContext` 来配置自身。Servlet
    会尝试从该应用上下文中检测所需的组件，如果未找到，则在大多数情况下会使用某种默认值。


    #### 启动 DispatcherServlet


    Servlet 3.0 规范引入了多种配置和注册 Servlet 的选项：


    *   选项 1：使用 `web.xml`（参见清单 4-1）。

    *   选项 2：使用 `web-fragment.xml`（参见清单 4-2）。

    *   选项 3：使用 `javax.servlet.ServletContainerInitializer`（参见清单 4-3）。

    *   选项 4：示例应用程序使用 Spring 3.1，因此你可以通过实现 `org.springframework.web.WebApplicationInitializer`
    接口获得第四个选项。


    Dispatcher Servlet 需要一个 `WebApplicationContext`，该上下文应包含所有使 Dispatcher Servlet
    能够自行配置的 Bean。默认情况下，Dispatcher Servlet 会创建一个 `org.springframework.web.context.support.XmlWebApplicationContext`。接下来各节中的所有示例都会加载
    `org.springframework.web.servlet.DispatcherServlet` 并将其映射到所有传入请求（/*）。所有这些配置都会导致
    Servlet 的运行时设置相同。只是实现该设置的机制不同。本书的其余部分将使用选项 4 来配置示例应用程序。


    ![Image](img/square.jpg) **注意** `org.springframework.web.context.WebApplicationContext`
    是 `org.springframework.context.ApplicationContext` 的一个专门扩展，在 Web 环境中是必需的（更多信息请参见第
    2 章）。


    你在本书中构建的示例应用程序将尽可能使用选项 4 来配置环境和应用程序。尽管如此，你仍将学习配置 Servlet 的所有四种选项的基本设置。

