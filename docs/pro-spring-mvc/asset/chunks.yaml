  raw: '#### Resource Loading


    [Table 2-2](#Chapter02.html#tab_2_2) provided an overview of the different `ApplicationContext`
    implementations and the default resource loading mechanisms. However, this doesn’t
    mean that we are restricted to loading resources only from the default locations.
    We also have the option to load resources from specific locations by including
    the proper prefix (see [Table 2-3](#Chapter02.html#tab_2_3)).


    ![Image](images/tab_2_3.jpg)


    [Listing 2-7](#Chapter02.html#list_2_7) shows bootstrapping code that uses an
    application context implementation that loads from the classpath by default. We
    could also have used an implementation that loads from the file system by default,
    but loads from the classpath when the proper prefix is used (see [Listing 2-8](#Chapter02.html#list_2_8)).


    ***Listing 2-8.** Using prefixes to load resources in MoneyTransferSpringFileSystem*


    `package com.apress.prospringmvc.moneytransfer.annotation;`


    `import org.springframework.context.support.FileSystemXmlApplicationContext;`


    `// Other imports ommitted see Listing 2-7`


    `public class MoneyTransferSpringFileSystem {`


    `private static final Logger` *`logger`* `= LoggerFactory.`*`getLogger`*![Image](images/U002.jpg)

    `(MoneyTransferSpringFileSystem.class);`


    `public static void main(String[] args) {`


    `        ApplicationContext ctx1 = new AnnotationConfigApplicationContext(                                     ApplicationContextConfiguration.class);`

    *`transfer`*`(ctx1);`


    **`        ApplicationContext ctx2 = new FileSystemXmlApplicationContext(`**

    **`                "classpath:/com/apress/prospringmvc/moneytransfer/annotation`**![Image](images/U002.jpg)

    **`/application-context.xml");`**

    *`transfer`*`(ctx2);`


    `        ApplicationContextLogger.`*`log`*`(ctx1);`

    `        ApplicationContextLogger.`*`log`*`(ctx2);`

    `    }`

    `  // transfer method ommitted see Listing 2-7`

    `}`


    In addition to being able to specify where to load files from, we can also use
    ant-style regular expressions to specify which files to load. An ant-style regular
    expression is a resource location containing ** and/or * characters. A * character
    indicates “on the current level” or “a single level,” whereas ** characters indicate
    “this and all sub levels.” [Table 2-4](#Chapter02.html#tab_2_4) shows some examples.
    This technique will only work when dealing with file resources on the classpath
    or file system; it will not work for web resources or package names.


    ![Image](images/tab_2_4.jpg)


    #### Component-Scanning


    Spring also has something called *component-scanning*. In short, this feature
    enables Spring to scan your classpath for classes that are annotated with `org.springframework.stereotype.Component`
    (or one of the specialized annotations like `org.springframework.stereotype.Service`,
    `org.springframework.stereotype.Repository`, `org.springframework.stereotype.Controller`,
    or `org.springframework.context.annotation.Configuration`). If we want to enable
    component-scanning, we need to instruct the application context to do so. The
    `org.springframework.context.annotation.ComponentScan` annotation enables us to
    accomplish that. This annotation needs to be put on our configuration class to
    enable component-scanning. [Listing 2-9](#Chapter02.html#list_2_9) shows the modified
    configuration class.


    ***Listing 2-9.** Implementing component-scanning with ApplicationContextConfiguration*


    `package com.apress.prospringmvc.moneytransfer.scanning;`


    `import org.springframework.context.annotation.ComponentScan;`

    `import org.springframework.context.annotation.Configuration;`


    `@Configuration`

    **`@ComponentScan(basePackages = {`**

    **`        "com.apress.prospringmvc.moneytransfer.scanning",`**

    **`        "com.apress.prospringmvc.moneytransfer.repository" })`**

    `public class ApplicationContextConfiguration {}`


    A look at [Listing 2-9](#Chapter02.html#list_2_9) reveals that the class has no
    more content. There are just two annotations. One annotation indicates that this
    class is used for configuration, while the other enables component-scanning. The
    component-scan annotation is configured with a package to scan.


    ![Image](images/square.jpg) **Caution** It is considered bad practice to scan
    the whole classpath by not specifying a package or to use too broad a package
    (like com.apress). This can lead to scanning a large part or even all classes,
    which will severely impact the startup time of your application.


    If we’re using component-scanning and a class with the `Configuration` annotation
    is found, then it will be used to add more beans to the context. In general, these
    are beans that cannot be automatically created, like datasources or JMS configuration.


    #### Scopes


    By default, all beans in a Spring application context are *singletons*. As the
    name implies, there is a single instance of a bean, and it is used for the whole
    application. This doesn’t typically present a problem because our services and
    repositories don’t hold state; they simply execute a certain operation and (optionally)
    return a value.


    However, a singleton would be problematic if we wanted to keep state inside our
    bean. We are developing a web application that we hope will attract thousands
    of users. If we have a single instance of a bean and all those users operate on
    the same instance, then the users will see and modify each other’s data or data
    from several users combined. Obviously, this is not something we want. Fortunately,
    Spring provides several scopes for beans that we can use to our advantage (see
    [Table 2-5](#Chapter02.html#tab_2_5)).


    ![Image](images/tab_2_5.jpg)'
