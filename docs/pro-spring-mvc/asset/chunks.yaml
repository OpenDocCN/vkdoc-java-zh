- fmt: "### Expressions\n\nAfter reading about the evaluate action and expressions,\
    \ you will probably be thinking “expression”? Great. But which expression language\
    \ is that? Unified EL? OGNL? SpEL? Something else, maybe? Well, it turns out that\
    \ Spring's developers made it easy this time. By default, Web Flow uses Spring\
    \ EL (`SpEL`) as its expression language. If you've used Spring before, you're\
    \ probably familiar with `SpEL` and understand that this makes the whole more\
    \ consistent. You can now use `SpEL` within Web Flow the same way you use it in\
    \ your Spring applications.\n\nIf you are not familiar with `SpEL`, you can find\
    \ a good overview of it in the Spring reference.^([9](#Chapter10.html#CHP-10-FN-9))\
    \ Only a very basic understanding of this expression language is necessary for\
    \ the Web Flow chapters, and we will only use it to invoke methods and pass along\
    \ parameters. We will quickly cover everything you need to know about `SpEL` to\
    \ understand its usage in the Web Flow chapters.\n\n____________\n\n⁸ See [Chapter\
    \ 11](#Chapter11.html#ch11): on start, on entry, on render, on exit, and on end\
    \ are covered in the “Execution Actions Overview” section, and action state is\
    \ covered in the “Action State” section.\n\n⁹ [`http://static.springsource.org/spring/docs/3.1.0.RELEASE/spring-frameworkreference/htmlsingle/spring-framework-reference.html#new-feature-el`](http://static.springsource.org/spring/docs/3.1.0.RELEASE/spring-frameworkreference/htmlsingle/spring-framework-reference.html#new-feature-el)\n\
    \nTo start off, `SpEL` is similar to the Unified EL, but it has some additional\
    \ features like method invocation and string templating functions. With `SpEL`,\
    \ we can manipulate our object graph at runtime. To access a property from a bean,\
    \ we refer to that bean and simply specify the property we want to get. The expression\
    \ is a string starting with `#{` and ending with `}`. Spring will detect the expression\
    \ and use it to resolve the value.\n\nTo access a property, we simply write `#{bean.property}`,\
    \ which tells Spring to execute the `getProperty()` method on the bean called\
    \ `bean`. The *dot* (`.`) is the separator between the first part that is used\
    \ to find the object with name `bean` and the second part, which is the name of\
    \ the attribute as specified by the JavaBeans specification (so you don't specify\
    \ `get` or `set`).\n\nIn this case, the bean name is a key on any of the scopes\
    \ available to Web Flow (we will discuss these in the “Different Web Flow Scopes”\
    \ section in [Chapter 11](#Chapter11.html#ch11)). Web Flow will by default scan\
    \ all available scopes to find a bean with a matching key. If no match is found,\
    \ the application context is tried next to resolve a bean with a matching bean\
    \ identifier.\n\n![Image](images/square.jpg) **Note** The application context\
    \ (typically) stores your controllers, services, repositories, and so forth. These\
    \ are types of objects that are stateless (and act as singletons). Your real state,\
    \ such as a form containing user data, is stored on any of the available scopes,\
    \ whether the ones that Web Flow offers or the actual Servlet-provided scopes.\n\
    \nBesides accessing properties, you can also call methods and pass along parameters.\
    \ This works the same way. For example, take this expression in an evaluate action\
    \ in Web Flow:\n\n```\n<evaluate expression = \"someService.someMethod(someObject)\"\
    />\n```\n\nThis will execute the `someMethod`—a method of `someService` that passes\
    \ along `someObject` as a parameter. Again, the expression parser will scan all\
    \ scopes by default to find the service object and the parameter (including the\
    \ application context). You will also be able to use implicit objects to denote\
    \ scopes or other special objects that are made directly available to you. While\
    \ these are not strictly related to the expression language, they can be considered\
    \ as *aliases* that are always available. Again, we cover implicit objects in\
    \ [Chapter 11](#Chapter11.html#ch11).\n\nIn the earlier example in [Listing 10-2](#Chapter10.html#list_10_2),\
    \ we called the `initializeForm()` method of the `orderController`:\n\n```\n<on-start>\n\
    \    <evaluate\n        expression=\"orderController.initializeForm()\"\n    \
    \    result=\"flowScope.orderForm\"/>\n    <evaluate\n        expression=\"orderController.initializeSelectableCategories()\"\
    \n        result=\"flowScope.selectableCategories\"/>\n</on-start>\n```\n\nWhen\
    \ executing the expression, the `orderController` was found in the application\
    \ context. The result returned from this method is the fully initialized model\
    \ that we will use throughout the flow. The result is bound to the flow scope.\n\
    \nWhen looking at the preceding expressions, you might notice that we omitted\
    \ the expression delimiter (`#{}`). The reason for placing the delimiter is to\
    \ make clear to the infrastructure that you are defining an expression. Otherwise,\
    \ how could it distinguish between a normal literal value and an expression? However,\
    \ in the case of the evaluate action, there is an explicit `expression` attribute.\
    \ We only expect an expression there, so there is no need to use the delimiters.\
    \ It is even *prohibited* to use the expression delimiter in this case. We think\
    \ that this is a bit bizarre, but that's how it is.\n\nIn cases where you are\
    \ creating a template expression or using expressions in attributes that are destined\
    \ for both literals and expressions (such as the `view` attribute of the view\
    \ state, for example), you must use the delimiters to denote where your expression\
    \ part is. For example, consider this snippet:\n\n```\n<view-state view=\"myView#{someVariable}\"\
    />\n```\n\nHere we denote that `#{someVariable}` is the expression part. If we\
    \ had put `myViewSomeVariable` instead, then the entire value would have been\
    \ interpreted as a literal value.\n\n![Image](images/square.jpg) **Note** It's\
    \ possible you are a Web Flow 1 user, and you prefer OGNL (the default expression\
    \ language for that version). It's also possible that you are upgrading from an\
    \ earlier version of Web Flow 2, where Unified EL was the default expression language.\
    \ In [Chapter 12](#Chapter12.html#ch12), we will illustrate how you can change\
    \ the default expression language to Unified EL or OGNL. However, we encourage\
    \ you to go with `SpEL` (the default) and only deviate from this option if there\
    \ is a good reason to do so.\n\n### Configuration\n\nNow that you have seen what\
    \ a basic flow and its main elements look like, it is time for some action. The\
    \ first thing we should do is configure our web application framework of choice\
    \ (Spring MVC). Next we will configure Web Flow and explain how Web Flow integrates\
    \ with Spring MVC.\n\nIn addition to Spring MVC, Web Flow has special integration\
    \ support for the following:\n\n*   Spring Portlet MVC\n*   JSF2\n\nThese options\
    \ are not discussed here, but it's important to inform you that Web Flow is not\
    \ bound to Spring MVC only. This is a good thing because the knowledge you will\
    \ gather here could be useful for projects using one of the other web technologies.\n\
    \n![Image](images/square.jpg) **Note** The pieces of configuration and sample\
    \ code explained here can be found under the `chapter10-bookstore` samples section.\
    \ In the beginning of this book, you will find extended information detailing\
    \ how to import this project in the STS IDE or how to run it directly from the\
    \ embedded web container. To understand the configuration, it is not required\
    \ to know the ins and outs of the application we are building—that's why we discuss\
    \ this setup first. Here we focus first on the generic Spring MVC/Web Flow configuration.\
    \ As explained in the “Welcome” section, we paid special attention to illustrating\
    \ the code in this book as completely as possible, so that you wouldn't need access\
    \ to the sample application to follow what is going on."
  raw: '#### Expressions


    After reading about the evaluate action and expressions, you will probably be
    thinking “expression”? Great. But which expression language is that? Unified EL?
    OGNL? SpEL? Something else, maybe? Well, it turns out that Spring''s developers
    made it easy this time. By default, Web Flow uses Spring EL (SpEL) as its expression
    language. If you''ve used Spring before, you''re probably familiar with SpEL and
    understand that this makes the whole more consistent. You can now use SpEL within
    Web Flow the same way you use it in your Spring applications.


    If you are not familiar with SpEL, you can find a good overview of it in the Spring
    reference.^([9](#Chapter10.html#CHP-10-FN-9)) Only a very basic understanding
    of this expression language is necessary for the Web Flow chapters, and we will
    only use it to invoke methods and pass along parameters. We will quickly cover
    everything you need to know about SpEL to understand its usage in the Web Flow
    chapters.


    ____________


    ⁸ See [Chapter 11](#Chapter11.html#ch11): on start, on entry, on render, on exit,
    and on end are covered in the “Execution Actions Overview” section, and action
    state is covered in the “Action State” section.


    ⁹ [`http://static.springsource.org`](http://static.springsource.org)`/spring/docs/3.1.0.RELEASE/spring-frameworkreference/htmlsingle/spring-framework-reference.html#new-feature-el`


    To start off, SpEL is similar to the Unified EL, but it has some additional features
    like method invocation and string templating functions. With SpEL, we can manipulate
    our object graph at runtime. To access a property from a bean, we refer to that
    bean and simply specify the property we want to get. The expression is a string
    starting with `#{` and ending with `}`. Spring will detect the expression and
    use it to resolve the value.


    To access a property, we simply write `#{bean.property}`, which tells Spring to
    execute the `getProperty()` method on the bean called `bean`. The *dot* (`.`)
    is the separator between the first part that is used to find the object with name
    `bean` and the second part, which is the name of the attribute as specified by
    the JavaBeans specification (so you don''t specify `get` or `set`).


    In this case, the bean name is a key on any of the scopes available to Web Flow
    (we will discuss these in the “Different Web Flow Scopes” section in [Chapter
    11](#Chapter11.html#ch11)). Web Flow will by default scan all available scopes
    to find a bean with a matching key. If no match is found, the application context
    is tried next to resolve a bean with a matching bean identifier.


    ![Image](images/square.jpg) **Note** The application context (typically) stores
    your controllers, services, repositories, and so forth. These are types of objects
    that are stateless (and act as singletons). Your real state, such as a form containing
    user data, is stored on any of the available scopes, whether the ones that Web
    Flow offers or the actual Servlet-provided scopes.


    Besides accessing properties, you can also call methods and pass along parameters.
    This works the same way. For example, take this expression in an evaluate action
    in Web Flow:


    `<evaluate expression = "someService.someMethod(someObject)"/>`


    This will execute the `someMethod`—a method of `someService` that passes along
    `someObject` as a parameter. Again, the expression parser will scan all scopes
    by default to find the service object and the parameter (including the application
    context). You will also be able to use implicit objects to denote scopes or other
    special objects that are made directly available to you. While these are not strictly
    related to the expression language, they can be considered as *aliases* that are
    always available. Again, we cover implicit objects in [Chapter 11](#Chapter11.html#ch11).


    In the earlier example in [Listing 10-2](#Chapter10.html#list_10_2), we called
    the `initializeForm()` method of the `orderController`:


    `<on-start>`

    `    <evaluate`

    `        expression="orderController.initializeForm()"`![Image](images/U002.jpg)

    `        result="flowScope.orderForm"/>`

    `    <evaluate`

    `        expression="orderController.initializeSelectableCategories()"`![Image](images/U002.jpg)

    `        result="flowScope.selectableCategories"/>`

    `</on-start>`


    When executing the expression, the `orderController` was found in the application
    context. The result returned from this method is the fully initialized model that
    we will use throughout the flow. The result is bound to the flow scope.


    When looking at the preceding expressions, you might notice that we omitted the
    expression delimiter (`#{}`). The reason for placing the delimiter is to make
    clear to the infrastructure that you are defining an expression. Otherwise, how
    could it distinguish between a normal literal value and an expression? However,
    in the case of the evaluate action, there is an explicit `expression` attribute.
    We only expect an expression there, so there is no need to use the delimiters.
    It is even *prohibited* to use the expression delimiter in this case. We think
    that this is a bit bizarre, but that''s how it is.


    In cases where you are creating a template expression or using expressions in
    attributes that are destined for both literals and expressions (such as the `view`
    attribute of the view state, for example), you must use the delimiters to denote
    where your expression part is. For example, consider this snippet:


    `<view-state view="myView#{someVariable}"/>`


    Here we denote that `#{someVariable}` is the expression part. If we had put `myViewSomeVariable`
    instead, then the entire value would have been interpreted as a literal value.


    ![Image](images/square.jpg) **Note** It''s possible you are a Web Flow 1 user,
    and you prefer OGNL (the default expression language for that version). It''s
    also possible that you are upgrading from an earlier version of Web Flow 2, where
    Unified EL was the default expression language. In [Chapter 12](#Chapter12.html#ch12),
    we will illustrate how you can change the default expression language to Unified
    EL or OGNL. However, we encourage you to go with SpEL (the default) and only deviate
    from this option if there is a good reason to do so.


    ### Configuration


    Now that you have seen what a basic flow and its main elements look like, it is
    time for some action. The first thing we should do is configure our web application
    framework of choice (Spring MVC). Next we will configure Web Flow and explain
    how Web Flow integrates with Spring MVC.


    In addition to Spring MVC, Web Flow has special integration support for the following:


    *   Spring Portlet MVC

    *   JSF2


    These options are not discussed here, but it''s important to inform you that Web
    Flow is not bound to Spring MVC only. This is a good thing because the knowledge
    you will gather here could be useful for projects using one of the other web technologies.


    ![Image](images/square.jpg) **Note** The pieces of configuration and sample code
    explained here can be found under the `chapter10-bookstore` samples section. In
    the beginning of this book, you will find extended information detailing how to
    import this project in the STS IDE or how to run it directly from the embedded
    web container. To understand the configuration, it is not required to know the
    ins and outs of the application we are building—that''s why we discuss this setup
    first. Here we focus first on the generic Spring MVC/Web Flow configuration. As
    explained in the “Welcome” section, we paid special attention to illustrating
    the code in this book as completely as possible, so that you wouldn''t need access
    to the sample application to follow what is going on.'
