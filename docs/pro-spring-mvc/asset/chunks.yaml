    \n##### 选择和添加书籍\n\n接下来，我们需要构建一个页面，向用户显示之前所选类别的书籍列表。用户应该能够将选定的书籍添加到订单列表中，并且应该有一个输入字段来指定用户想要添加的书籍数量。\n\
