  raw: '#### Reworking the Orders Overview


    The preceding section illustrated that we can use Web Flow to manage our transaction.
    and that it can create a committing transaction at the end of a flow that pushes
    out all changes to the database when the flow ends.


    Finally, we want to illustrate that the persistence context is also available
    in our view for entities that are stored in a scope. Normally this would not be
    possible because the persistence context would no longer available after a request
    ended.


    The `Orders Overview` page shows the orders a customer made. We will add an additional
    popup window that shows the details of the order. In the domain model, we have
    an `Order` that has a list of zero or more `OrderDetails`. At the moment, the
    orders overview is backed by a Spring MVC controller, and it is not governed by
    a flow. In [Listing 12-35](#Chapter12.html#list_12_35), we will begin building
    a flow for the orders overview. You can find this code at `WEB-INF/view/ordersOverview/ordersOverview-flow.xml`.


    ![Image](images/square.jpg) **Note** In [Listing 12-35](#Chapter12.html#list_12_35),
    we are building a flow for something that is not really a “flow”; rather, it is
    just an overview page with a detail. We created a flow purely in terms of the
    sample application, so we could demonstrate the flow-managed persistence context.
    In a real-world app, this would probably not benefit from being modeled as a flow.


    ***Listing 12-35** The newly created ordersOverview-flow*


    **`<persistence-context/>`**


    `<view-state id="ordersOverview" view="ordersOverview">`

    `    <on-render>`

    `        <evaluate expression="orderController.retrieveOrders(`

    `externalContext.sessionMap.authenticatedAccount)"` ![Image](images/U002.jpg)

    `                  result="viewScope.orders" />`![Image](images/U002.jpg)

    `    </on-render>`

    `    <transition on="showOrderDetail" to="orderDetail">`

    `        <set name="flashScope.order"`![Image](images/U002.jpg)

    `             value="orders[requestParameters.index]">`

    `        </set>`

    `    </transition>`

    `</view-state>`


    `<view-state id="orderDetail" view="orderDetail" popup="true">`

    `    <on-render>`

    `        <render fragments="content"></render>`

    `    </on-render>`

    `</view-state>`


    The following aspects of the preceding listing are noteworthy:


    *   We have added the `<persistence-context/>`, which will enable the flow-managed
    persistence context for this flow (we did the same thing for our `createOrders-flow`).

    *   We also set the selected `Order` on `flash` scope using a `<set>` action.
    The index of the selected order is retrieved from the request parameters: `orders[requestParameters.index].`

    *   The first `view` state renders the `ordersOverview` view, which renders the
    `ordersOverview.jsp`*.*

    *   The second `view` state renders the `orderDetail` view, but will only partially
    render it. Because the popup attribute is set to `true`, this will, in conjunction
    with Spring’s client-side JavaScript, render the content in a popup window.


    In [Listing 12-36](#Chapter12.html#list_12_36), you can see the `orderDetail.jsp`,
    which is just a fragment of a complete page because it will be rendered as a popup.


    ***Listing 12-36** The orderDetail.jsp, which will render the order details*


    `<%@ taglib prefix="c" uri="http://java.sun.com/jsp/jstl/core"%>`


    `<h2>Order detail</h2>`

    `<div style="width: 550px; height: 100px; margin-top: 15px;">`

    `    <table style="width: 100%;">`

    `        <thead>`

    `            <tr>`

    `                <th align="left">Book title</th>`

    `                <th align="left">Book description</th>`

    `                <th width="60px" align="left">Book price</th>`

    `            </tr>`

    `        </thead>`

    `        <tbody>`

    `            <tr height="10px" />`

    `            <c:forEach items="${order.orderDetails}" var="orderDetail" varStatus="status">`

    `                <tr>`

    `                    <td>${orderDetail.book.title}</td>`

    `                    <td>${orderDetail.book.description}</td>`

    `                    <td>${orderDetail.book.price}</td>`

    `                </tr>`

    `            </c:forEach>`

    `            <tr height="20px" />`

    `        </tbody>`

    `    </table>`

    `</div>`


    The Tiles configuration for this for is straightforward (see [Listing 12-37](#Chapter12.html#list_12_37)).


    ***Listing 12-37** The Tiles definition for orderDetail.jsp*


    `<definition name="orderDetail" extends="contentOnlyTemplate">`

    `    <put-attribute name="content" value="/WEB-INF/view/ordersOverview/orderDetail.jsp"/>`

    `</definition>`


    In the preceding listing, we extend from the `contentOnlyTemplate` because the
    content will be rendered in a popup, so we don’t need the header and footer, which
    are part of the `fullTemplate`.


    In the `ordersOverview.jsp`, we still need to add the link that will make the
    Ajax call and open the popup window (see [Listing 12-38](#Chapter12.html#list_12_38)).
    It is important that this link be nested in a form. We will also submit the index
    (which we retrieve from the JSTL supplied by a `varStatus` object) through a hidden
    field. This will allow us to determine which order we want to see the details
    from (as we have seen in the flow, it uses the index request parameter to determine
    the selected `Order` object in the list).


    ***Listing 12-38** The link in the ordersOverview.jsp that will trigger the order*


    `<c:forEach items="${orders}" var="order" varStatus="status">`

    `    <tr>`

    `        <td>${order.id}</td>`

    `        <td>${fn:length(order.orderDetails)}</td>`

    `        <td><spring:eval expression="order.orderDate" /></td>`

    `        <td>${order.totalOrderPrice}</td>`

    `        <td>`

    `<form:form id="orderDetailForm_${status.index}"` ![Image](images/U002.jpg) `action="${flowExecutionUrl}">`

    `                <input type="hidden" name="index" value="${status.index}" />`

    `<a name="_eventId_showOrderDetail"` ![Image](images/U002.jpg) `id="orderDetailLink_${status.index}"
    href="#">View</a>`

    `             </form:form>`

    `        </td>`

    `    </tr>`

    `</c:forEach>`


    We’ll conclude by decorating the link with an Ajax decoration. Because we need
    both the link and the form— and because there are multiple versions of each—we
    use dojo to query all links where the id starts with `orderDetailLink_`. From
    that, we can parse out the index. With this information, we can also compose the
    id of the anchor to bind to, as well as the form. We also enable the popup functionality,
    so Spring JS knows to render the response inside a popup window. All of this is
    accomplished in [Listing 12-39](#Chapter12.html#list_12_39).


    ![Image](images/square.jpg) **Note** To enable the form to be shown as a popup
    window, we enabled the popup attribute on the `view` state that renders the popup
    content.


    ***Listing 12-39** The JavaScript that will decorate the button and trigger an
    AJAX request to display the order details that will be shown in a popup window*


    `dojo.query("[id^=''orderDetailLink_'']").forEach(function(element) {`

    `    var index = element.id.substr(element.id.lastIndexOf(''_'')+1,element.id.length);`

    `    Spring.addDecoration(new Spring.AjaxEventDecoration({`

    `        elementId : element.id,`

    `        event : "onclick",`

    `        formId : "orderDetailForm_"+index,`

    `        popup : "true"`

    `    }));`

    `});`'
