- fmt: "### Configuring the Template Engine\n\nThe Spring Framework extensively supports\
    \ both Velocity and FreeMarker, and there are some helper classes to make configuring\
    \ the engines easier. For Velocity there is the `org.springframework.web.servlet.view.velocity.VelocityConfigurer`\
    \ ([Table 8-7](#Chapter08.html#tab_8_7)) and for FreeMarker there is the `org.springframework.web.servlet.view.freemarker.FreeMarkerConfigurer`\
    \ ([Table 8-8](#Chapter08.html#tab_8_8)). Each is used to configure the respective\
    \ templating engine.\n\n![Image](images/9781430241553_tab08-07.jpg)\n\n![Image](images/9781430241553_tab08-08.jpg)\n\
    \nThe most important properties in these tables are the ones that set the location\
    \ from which to load the templates. For Velocity this is the `resourceLoaderPath`\
    \ and for FreeMarker the `templateLoaderPath`. It is a best practice to make them\
    \ inaccessible for web clients, which can be done by putting them inside the `WEB-INF`\
    \ directory.\n\n![Image](images/square.jpg) **Note** There are also `org.springframework.beans.factory.FactoryBean`s\
    \ to configure the respective templating engines. These are for bootstrapping\
    \ the engines for use as non-web templates, like email.\n\nIn addition to setting\
    \ up the different engines, we also need to configure a view resolver to resolve\
    \ to correct view implementations. Spring ships with the `org.springframework.web.servlet.view.velocity.VelocityViewResolver`\
    \ or `org.springframework.web.servlet.view.velocity.VelocityLayoutViewResolver`.\
    \ For FreeMarker there is the `org.springframework.web.servlet.view.freemarker.FreemarkerViewResolver`.\
    \ It isn’t required to use these specialized view resolvers; an extensively configured\
    \ `InternalResourceViewResolver` would also do. However, using these specialized\
    \ view resolvers makes our life easier. [Listings 8-17](#Chapter08.html#list_8_17)\
    \ and [8-18](#Chapter08.html#list_8_18) show sample Velocity and FreeMarker configurations.\n\
    \n**Listing 8-17.** Velocity Configuration\n\n```\npackage com.apress.prospringmvc.bookstore.web.config;\n\
    \n// Other imports omitted\nimport org.springframework.web.servlet.view.velocity.VelocityConfigurer;\n\
    import org.springframework.web.servlet.view.velocity.VelocityViewResolver;\n\n\
    @Configuration\npublic class ViewConfiguration {\n\n    @Bean\n    public VelocityConfigurer\
    \ velocityConfigurer() {\n        VelocityConfigurer velocityConfigurer = new\
    \ VelocityConfigurer();\n        velocityConfigurer.setResourceLoaderPath(\"WEB-INF/velocity\"\
    );\n        return velocityConfigurer;\n    }\n\n    @Bean\n    public ViewResolver\
    \ velocityViewResolver() {\n        VelocityViewResolver viewResolver = new VelocityViewResolver();\n\
    \        viewResolver.setSuffix(\".vm\");\n        return viewResolver;\n    }\n\
    }\n```\n\n**Listing 8-18.** FreeMarker Configuration\n\n```\npackage com.apress.prospringmvc.bookstore.web.config;\n\
    \n// Other imports omitted\nimport org.springframework.web.servlet.view.freemarker.FreeMarkerConfigurer;\n\
    import org.springframework.web.servlet.view.freemarker.FreeMarkerViewResolver;\n\
    \n@Configuration\npublic class ViewConfiguration {\n\n    @Bean\n    public FreeMarkerConfigurer\
    \ freeMarkerConfigurer() {\n        FreeMarkerConfigurer freeMarkerConfigurer;\n\
    \        freeMarkerConfigurer = new FreeMarkerConfigurer();\n        freeMarkerConfigurer.setTemplateLoaderPath(\"\
    WEB-INF/freemarker\");\n        return freeMarkerConfigurer;\n    }\n\n    @Bean\n\
    \    public ViewResolver freeMarkerViewResolver() {\n        FreeMarkerViewResolver\
    \ viewResolver = new FreeMarkerViewResolver();\n        viewResolver.setSuffix(\"\
    .ftl\");\n        return viewResolver;\n    }\n}\n```\n\nWhen a controller now\
    \ returns `index` as the view name, for Velocity a template would be loaded from\
    \ `WEB-INF/velocity/index.vm`, and for FreeMarker it would become `WEB-INF/freemarker/index.ftl`.\
    \ The `resourceLoaderPath`/`templateLoaderPath` is prefixed to the view name.\
    \ Both the view resolvers also allow for setting an additional prefix (inherited\
    \ from the `UrlBasedViewResolver`). [Table 8-9](#Chapter08.html#tab_8_9) describes\
    \ the different properties for the view resolvers.\n\n![Image](images/9781430241553_tab08-09.jpg)\n\
    \n### The Templating Language\n\nNow that we have configured our environment,\
    \ we also need to write a template that shows the page to us. Both templating\
    \ languages are very similar. [Listings 8-19](#Chapter08.html#list_8_19) and [8-20](#Chapter08.html#list_8_20)\
    \ show the book search page written for Velocity and FreeMarker, respectively.\n\
    \n**Listing 8-19.** Velocity Template\n\n```\n<!DOCTYPE HTML>\n<html>\n<head>\n\
    <title>Booksearch</title>\n</head>\n<body>\n<h1>#springMessage(\"book.title\"\
    )</h1>\n\n<p>\n\n    <form method=\"POST\">\n        <fieldset>\n            <legend>#springMessage(\"\
    book.searchcriteria\")</legend>\n            <table>\n                <tr><td>#springMessage(\"\
    book.title\")</td><td>#springFormInput![Image](images/U002.jpg)\n(\"searchCriteria.title\"\
    \ \"\")</td></tr>\n                <tr><td>#springMessage(\"book.category\")</td><td>#springFormSingleSelect![Image](images/U002.jpg)\n\
    (\"searchCriteria.category\" $categories \"\")</td></tr>\n            </table>\n\
    \        </fieldset>\n        <button id=\"search\">#springMessage(\"button.search\"\
    )</button>\n    </form>\n\n    #if ($bookList.empty eq false)\n        <table>\n\
    \            <tr><th>#springMessage(\"book.title\")</th><th>#springMessage![Image](images/U002.jpg)\n\
    (\"book.description\")</th><th>#springMessage(\"book.price\")</th></tr>\n    \
    \        #foreach($book in $bookList)\n                <tr><td>${book.title}</td><td>${book.description}</td><td>$![Image](images/U002.jpg)\n\
    {book.price}</td><td><a href=\"#springUrl(\"/cart/add/${book.id}\")\">#springMessage![Image](images/U002.jpg)\n\
    (\"book.addtocart\")</a></tr>\n            #end\n        </table>\n    #end\n\
    </p>\n\n</body>\n</html>\n```\n\n**Listing 8-20.** FreeMarker Template\n\n```\n\
    <#ftl>\n<#import \"/spring.ftl\" as spring />\n<!DOCTYPE HTML>\n<html>\n<head>\n\
    <title>Booksearch</title>\n</head>\n<body>\n<h1><@spring.message code=\"book.title\"\
    \ /></h1>\n\n<p>\n\n    <form method=\"POST\">\n        <fieldset>\n         \
    \   <legend><@spring.message code=\"book.searchcriteria\" /></legend>\n      \
    \      <table>\n                <tr><td><@spring.message code=\"book.title\" /></td><td><@spring.formInput![Image](images/U002.jpg)\n\
    \"searchCriteria.title\" /></td></tr>\n                <tr><td><@spring.message\
    \ code=\"book.category\"![Image](images/U002.jpg)\n/></td><td><@spring.formSingleSelect\
    \ \"searchCriteria.category\", categories, \"\" /></td></tr>\n            </table>\n\
    \        </fieldset>\n        <button id=\"search\"><@spring.message code=\"book.search\"\
    \ /></button>\n    </form>\n\n    <#if bookList?has_content>\n        <table>\n\
    \            <tr><th><@spring.message code=\"book.title\"/></th><th><@spring.message![Image](images/U002.jpg)\n\
    code=\"book.description\"/></th><th><@spring.message code=\"book.price\" /></th></tr>\n\
    \            <#list bookList as book>\n                <tr><td>${book.title}</td><td>${book.description}</td><td>$![Image](images/U002.jpg)\n\
    {book.price}</td><td><a href=\"<@spring.url \"/cart/add/${book.id}\"/>\"><@spring.message![Image](images/U002.jpg)\n\
    code=\"book.addtocart\"/></a></tr>\n            </#list>\n        </table>\n \
    \   </#if>\n</p>\n\n</body>\n</html>\n```\n\nLooking at the templates, we can\
    \ see that they are similar to the JSPs we wrote in the previous chapters. The\
    \ Velocity ([Listing 8-19](#Chapter08.html#list_8_19)) and FreeMarker ([Listing\
    \ 8-20](#Chapter08.html#list_8_20)) templates also have tag libraries available\
    \ (in the listings bound to Spring). Both libraries offer more or less the same\
    \ support as the Spring Form Tag library for JSP. [Table 8-10](#Chapter08.html#tab_8_10)\
    \ provides an overview of the different tags, or better macro libraries, for both\
    \ Velocity and FreeMarker.\n\n![Image](images/9781430241553_tab08-10.jpg)\n\n\
    The parameters to any of the macros listed have consistent meanings:"
  raw: '##### Configuring the Template Engine


    The Spring Framework extensively supports both Velocity and FreeMarker, and there
    are some helper classes to make configuring the engines easier. For Velocity there
    is the `org.springframework.web.servlet.view.velocity.VelocityConfigurer` ([Table
    8-7](#Chapter08.html#tab_8_7)) and for FreeMarker there is the `org.springframework.web.servlet.view.freemarker.FreeMarkerConfigurer`
    ([Table 8-8](#Chapter08.html#tab_8_8)). Each is used to configure the respective
    templating engine.


    ![Image](images/9781430241553_tab08-07.jpg)


    ![Image](images/9781430241553_tab08-08.jpg)


    The most important properties in these tables are the ones that set the location
    from which to load the templates. For Velocity this is the `resourceLoaderPath`
    and for FreeMarker the `templateLoaderPath`. It is a best practice to make them
    inaccessible for web clients, which can be done by putting them inside the WEB-INF
    directory.


    ![Image](images/square.jpg) **Note** There are also `org.springframework.beans.factory.FactoryBean`s
    to configure the respective templating engines. These are for bootstrapping the
    engines for use as non-web templates, like email.


    In addition to setting up the different engines, we also need to configure a view
    resolver to resolve to correct view implementations. Spring ships with the `org.springframework.web.servlet.view.velocity.VelocityViewResolver`
    or `org.springframework.web.servlet.view.velocity.VelocityLayoutViewResolver`.
    For FreeMarker there is the `org.springframework.web.servlet.view.freemarker.FreemarkerViewResolver`.
    It isn’t required to use these specialized view resolvers; an extensively configured
    `InternalResourceViewResolver` would also do. However, using these specialized
    view resolvers makes our life easier. [Listings 8-17](#Chapter08.html#list_8_17)
    and [8-18](#Chapter08.html#list_8_18) show sample Velocity and FreeMarker configurations.


    ***Listing 8-17.** Velocity Configuration*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// Other imports omitted`

    `import org.springframework.web.servlet.view.velocity.VelocityConfigurer;`

    `import org.springframework.web.servlet.view.velocity.VelocityViewResolver;`


    `@Configuration`

    `public class ViewConfiguration {`


    `    @Bean`

    `    public VelocityConfigurer velocityConfigurer() {`

    `        VelocityConfigurer velocityConfigurer = new VelocityConfigurer();`

    `        velocityConfigurer.setResourceLoaderPath("WEB-INF/velocity");`

    `        return velocityConfigurer;`

    `    }`


    `    @Bean`

    `    public ViewResolver velocityViewResolver() {`

    `        VelocityViewResolver viewResolver = new VelocityViewResolver();`

    `        viewResolver.setSuffix(".vm");`

    `        return viewResolver;`

    `    }`

    `}`


    ***Listing 8-18.** FreeMarker Configuration*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// Other imports omitted`

    `import org.springframework.web.servlet.view.freemarker.FreeMarkerConfigurer;`

    `import org.springframework.web.servlet.view.freemarker.FreeMarkerViewResolver;`


    `@Configuration`

    `public class ViewConfiguration {`


    `    @Bean`

    `    public FreeMarkerConfigurer freeMarkerConfigurer() {`

    `        FreeMarkerConfigurer freeMarkerConfigurer;`

    `        freeMarkerConfigurer = new FreeMarkerConfigurer();`

    `        freeMarkerConfigurer.setTemplateLoaderPath("WEB-INF/freemarker");`

    `        return freeMarkerConfigurer;`

    `    }`


    `    @Bean`

    `    public ViewResolver freeMarkerViewResolver() {`

    `        FreeMarkerViewResolver viewResolver = new FreeMarkerViewResolver();`

    `        viewResolver.setSuffix(".ftl");`

    `        return viewResolver;`

    `    }`

    `}`


    When a controller now returns `index` as the view name, for Velocity a template
    would be loaded from `WEB-INF/velocity/index.vm,` and for FreeMarker it would
    become `WEB-INF/freemarker/index.ftl`. The `resourceLoaderPath`/`templateLoaderPath`
    is prefixed to the view name. Both the view resolvers also allow for setting an
    additional prefix (inherited from the `UrlBasedViewResolver`). [Table 8-9](#Chapter08.html#tab_8_9)
    describes the different properties for the view resolvers.


    ![Image](images/9781430241553_tab08-09.jpg)


    ##### The Templating Language


    Now that we have configured our environment, we also need to write a template
    that shows the page to us. Both templating languages are very similar. [Listings
    8-19](#Chapter08.html#list_8_19) and [8-20](#Chapter08.html#list_8_20) show the
    book search page written for Velocity and FreeMarker, respectively.


    ***Listing 8-19.** Velocity Template*


