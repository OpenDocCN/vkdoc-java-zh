    #### Velocity 与 FreeMarker


    Velocity^(3) 和 FreeMarker^(4) 都是用 Java 编写并用于 Java 的模板框架。你可以使用它们（以及其他工具）来创建 HTML
    页面的模板。它们是基于文本的模板引擎，并且都广泛应用于各种模板解决方案的应用程序中。


    _________


    ³ [`http://velocity.apache.org`](http://velocity.apache.org)


    ⁴ [`http://www.freemarker.org`](http://www.freemarker.org)


    Velocity 和 FreeMarker 模板不像 JSP 那样被编译成 Java 代码。它们在运行时由其模板引擎解释执行；这很像我们之前讨论的 XSLT
    处理过程。有人可能会认为这种解释执行而非编译的方式会导致应用程序性能下降，但事实往往并非如此。这两个引擎都对解释后的模板进行了大量缓存，这使得它们相当快速。


    使用模板方法而非 JSP 的另一个优点是，在 JSP 中你可能会忍不住将 Java 代码放入其中。虽然可以将 Java 代码放入页面，但这并不是一种可取的方法。它通常会导致页面难以维护和修改。


    缺点是我们需要为应用程序添加一些额外的配置。我们首先需要配置所选用的模板引擎，然后需要为该模板引擎配置视图解析。

