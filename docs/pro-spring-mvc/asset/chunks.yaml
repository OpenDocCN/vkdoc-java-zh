    `</decision-state>`


    如果提供了多个 `if` 条件，则它们会逐一被评估。如果没有一个条件评估为 `true`，则会抛出 `org.springframework.webflow.engine.NoMatchingTransitionException`
    异常。您可以实现一个 `if` 条件链；但是请注意，任何定义了 `else` 子句的 `if` 条件，根据定义，都会评估为 `true`。这意味着剩余的 `if`
    条件都不会被评估。因此，如果您有多个 `if` 元素，那么只有最后一个 `if` 元素拥有 `else` 才有意义。如果前面的某个 `if` 有 `else`，那么后续的
    `if` 元素将永远不会被评估。仔细想想，这是有道理的；如果一个 `if` 也有一个 `else` 条件，那么要么执行 `then`，要么执行 `else`。因此，所有定义在该
    `if` 条件之后的 `if` 元素都会被跳过。


    在我们向您展示本章所做工作的概述之前，我们想执行最后一次重构——针对创建订单流程。该流程现在作为 `finish` 转换的一个评估动作嵌入其中。我们将用一个动作状态来替换它。


    #### 动作状态


    动作状态执行一个动作作为其活动。图 11-12 展示了它的各种属性和元素。在 XML 流程定义中，动作状态使用 `<action-state>` 元素定义，而要执行的动作则使用嵌套的
    `<evaluate>` 元素定义。动作状态通常用于与后端服务交互，无论是直接交互还是通过控制器。动作状态会自动执行，并且不会暂停流程执行。视图状态会暂停流程执行（视图被渲染，用户花时间与视图交互），但动作状态会触发事件，导致转换到另一个状态。


    ![Image](img/9781430241553_Fig11-12.jpg)


    ***图 11-12.** 动作状态的不同属性和元素*


    在接下来的示例中，当订单成功创建时，我们转换到结束状态。我们也可以响应“错误”事件，并转换到错误页面。


    ![Image](img/square.jpg) **注意**  没有单一的规则来确定是否需要动作状态。如果存在多个您可以响应的结果，或者处理过程更复杂（例如，执行多个动作时），您可能应该使用动作状态。


    为了重构这一点，我们只需将评估表达式移动到一个 `<action-state>` 中，并相应地调整转换。清单 11-43 中显示的代码变成了清单 11-44
    中显示的动作状态代码。此代码可以在 `src/main/webapp/WEB-INF/view/createOrders/createOrders-flow.xml`
    中找到。


    ***清单 11-43.** 将评估动作重构为动作状态*


    `<transition on="finish" to="end">`

    `    <evaluate expression="orderController.placeOrder(flowScope.orderForm,`

    `     externalContext.sessionMap.authenticatedAccount)"/>`

    `</transition>`


    ***清单 11-44.** 用于下单的动作状态*


    `<action-state id="placeOrder">`

    `    <evaluate expression="orderController.placeOrder(externalContext.`![Image](img/U002.jpg)

    `sessionMap.authenticatedAccount,` ![Image](img/U002.jpg)

    `                          flowScope.orderForm)"`

    `              result="flowScope.orderId"/>`

    `    <transition on="success" to="end"/>`

    `</action-state>`


    `authenticatedAccount` 变量是从 `session` 作用域中查找的。它是在用户使用 `AuthenticationController`
    登录时被放置在那里的。您可以在清单 11-40 的最后一个方法中看到这一点。`OrderForm` 是在 `createOrder-flow` 开头的 `on
    start` 元素中创建的。它被放置在流程作用域上。我们不需要特别指定作用域，因为表达式语言会自动在所有 Web Flow 作用域中查找（即，不指定隐式的
    `flowScope` 对象而直接指定 `orderForm` 也是正确的，并且会产生相同的结果）。

