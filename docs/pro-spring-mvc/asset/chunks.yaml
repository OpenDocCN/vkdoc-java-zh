  trans: '

    ### 本书结构


    本书由一系列章节组成，每章解释框架的一部分或如何使用某项技术。前四章理论性较强，用于阐述一些更通用的概念及其在 Spring MVC 中的应用或工作原理（本书
    Spring Web Flow 部分的开头也是如此；第 10 章也或多或少偏理论）。


    在介绍了 Spring MVC 背后的概念之后，随着我们开始开发一个应用程序，其余章节将采用更实际、更动手操作的方式。


    各章节如下：


    *   第 1 章，“配置 Spring 开发环境”。本章介绍了开发环境的先决条件，你可以使用该环境来开发示例应用程序。本章还解释了示例应用程序（一个在线书店）的结构和目的。

    *   第 2 章，“Spring 框架基础”，全面概述了 Spring 框架的基本构建块。它介绍了依赖注入（DI）和控制反转（IoC）的概念。如果你不熟悉
    Spring，特别推荐阅读本章。

    *   第 3 章，“Web 应用程序架构”。在本章中，我们将稍微绕道，解释 Web 应用程序架构。我们将解释（通常）构成 Web 应用程序的不同层，并解释模型-视图-控制器三元组。

    *   第 4 章，“Spring MVC 架构”。本章是处理 Spring MVC 的第一个“深入”章节。它精确定义了什么是 MVC，Web 应用程序通常如何结构化或分层，并深入探讨了
    Spring MVC 引擎的核心：强大的 `DispatcherServlet`。

    *   第 5 章，“实现控制器”。此时，你可能已经准备好说：“给我看代码！”在本章中，我们将利用前几章的知识开始编写控制器；我们还将更深入地了解 Spring
    @MVC 的内部机制。最后，我们将启动示例应用程序。令人兴奋！

    *   第 6 章，“实现控制器 – 高级”。每个应用程序在许多不同地方都需要相同的行为，以及一些并非核心应用程序一部分但需要嵌入某处的行为。本章将介绍面向切面编程（AOP）以及
    Spring MVC 如何轻松解决一些常见的 Web 问题。我们还将进一步探索 Spring MVC 的内部机制，并解释如何扩展现有基础设施以及如何根据我们的需求进行定制。

    *   第 7 章，“REST 和 AJAX”。现在我们的书店正在起步，我们想为应用程序添加一些精巧的行为，并且希望将我们的控制器暴露为 REST Web
    服务，以便其他人能够与我们集成。为此，我们将探索 REST 和 AJAX，并将这些技术应用到我们的应用程序中。

    *   第 8 章，“解析和实现视图”。第 8 章 更深入地探讨了视图在 Spring MVC 中是如何解析的，并基于你目前学到的信息进行构建。在本章中，你将重新审视
    `ViewResolver` 基础设施，并在重用相同基础设施为同一模型提供不同呈现方式时，开始看到 MVC 架构的强大之处。

    *   第 9 章，“测试 Spring MVC 应用程序”。既然完成某些任务的渴望已得到一定满足，并且我们已经编写了一些代码，现在是时候关注测试了。本章解释了*如何*测试
    Spring MVC 应用程序，但同样关键的是*测试什么*。本章将深入讨论不同的测试策略，包括如何确保只测试你需要测试的内容。你还将有机会对 HTML 进行测试驱动！

    *   第 10 章，“Spring Web Flow”。到目前为止，所有的页面交互都非常简单；每个用例只有一两个页面。现在，经理想要引入一些非平凡的用例。第
    10 章 介绍了 Spring Web Flow——Spring MVC 的一个伴侣组件，它提供了一些非常精巧的功能来管理与客户端的 Web 会话。

    *   第 11 章，“使用 Spring Web Flow 构建应用程序”。继前一章介绍 Spring Web Flow 及其帮助解决的问题之后，第 11
    章将实践探索如何使用 Spring Web Flow 构建应用程序。

    *   第 12 章，“高级 Spring Web Flow”，基于第 11 章获得的信息，演示了如何更深入地挖掘 Spring Web Flow 并发现一些真正的宝藏。

    *   第 13 章，“Spring Security”，展示了如何通过使用 Spring 工具箱中另一个成熟的工具 Spring Security，将邋遢的黑客拒之我们的
    Web 应用程序门外。

    *   附录 A，“Cloud Foundry——部署到云端”。在本附录中，我们解释了将应用程序部署到云端（特别是 Cloud Foundry）所需的步骤，因为它与我们选择的开发环境无缝集成。


    ### Spring 生态系统的鸟瞰图


    因此，在进一步深入之前，让我们先初步了解 Spring MVC 及其在现有 Spring 生态系统中的位置。


    第一个好消息是 Spring MVC *就是* Spring。你可以使用现有的强大 Spring 容器来配置 Spring MVC。在 Spring MVC
    中定义的 Bean 与其他任何 Bean 完全一样。


    来自 [`http://static.springsource.org/spring/docs/3.1.0.M2/spring-framework-reference/html/overview.html`](http://static.springsource.org/spring/docs/3.1.0.M2/spring-framework-reference/html/overview.html)
    的以下图片非常有帮助：


    ![Image](img/pxxvii.jpg)


    如你所见——Spring MVC 由 Spring 的其余部分驱动！


    ### 继续前进！


    现在你已经了解了本书的风格和目的，让我们不要再浪费时间，立即为你设置好开发环境。我们将在第 1 章中见。


    ### 联系作者


    如有关于本书的疑问或建议，可以通过 `marten@deinum.biz` 联系 Marten Deinum。他的博客位于 [`http://mdeinum.wordpress.com`](http://mdeinum.wordpress.com)。如果你发现错误、想提问或想讨论与本书相关的任何其他内容，请随时联系他。


    如有关于本书的任何事宜，可以通过 `koen.serneels@error.be` 联系 Koen Serneels。如果你有建议、意见或问题，或发现不准确之处，请随时给他留言。他的博客位于
    [`http://www.error.be`](http://www.error.be)。


    ## 第 1 章


    ## 配置 Spring 开发环境


    在你真正开始 Spring MVC 之旅之前，需要确保正确设置好开发环境。本章将首先引导你完成此过程。接着，将提供一些关于本书附带的示例书店应用程序的详细信息。但在深入探讨开发环境或示例应用程序的细节之前，本章将概述你环境的一般先决条件。


    本书附带的示例应用程序用于解释 Spring MVC 和一般 MVC 的概念。它并非旨在成为一个功能完备、可直接投入生产的应用程序；也不打算用作 Java
    或完整的 Spring Framework 应用程序。该应用程序的主要目的是帮助解释和表达本书中使用的 Spring MVC 概念。

    '
- fmt: '### Prerequisites


    To build the sample application, you need to have a Java Development Kit (`JDK`)
    installed; and for (standalone) deployment, you need a servlet container that
    supports version 3.0 of the Servlet Specification (we chose to use Tomcat 7).
    To make development easier, you will need to use an integrated development environment
    (`IDE`); for this book, we, the authors, chose to use the SpringSource Tool Suite
    (`STS`). [Table 1-1](#Chapter01.html#tab_1_1) lists the products and versions
    used while writing this book. Development on the selected products still continues,
    so it might be that there is a newer version available at the time you read this.
    However, there is nothing in the code that shouldn’t work on or with newer versions
    of the software.


    ![Image](images/tab_1_1.jpg)


    #### Java Development Kit


    The first ingredient is the Java Development Kit. `JDK7` was recently released;
    however, it seems that `JDK6` is still much more widely used, particularly in
    the enterprise. There are no known issues with running the sample application
    with `JDK7`, so those who want to “live on the edge” are free to do so. Those
    who want the smoothest ride possible should choose `JDK6`.


    ![Image](images/square.jpg) **Note** You may already have the Java Runtime Edition
    installed; however, you still need the Java Development Edition (`JDK`). The `JRE`
    is only for running Java applications, whereas the `JDK` is for compiling Java
    code.


    #### Servlet Container


    To run a Java web application, you need a web container. The sample application
    is using Servlet 3.0 features; and as such, you need a Servlet 3.0 capable web
    container. Tomcat ([`http://tomcat.apache.org/`](http://tomcat.apache.org/)) is
    an excellent candidate and widely used in production systems. There is nothing
    Tomcat-specific in the sample file, so feel free to use Jetty, JBoss, Glassfish,
    or any other modern web container or application server.


    ![Image](images/square.jpg) **Tip** STS includes its own version of Tomcat called
    *tc-server* ([`www.vmware.com/products/vfabric-tcserver/`](http://www.vmware.com/products/vfabric-tcserver/)).
    This is an excellent product built on top of Tomcat, and it offers value for both
    developer and production environments.


    #### Integrated Development Environment


    Although Spring itself doesn’t require a particular development environment (over
    and above the Java Development Kit), becoming familiar with a good `IDE` is highly
    recommended.


    Given Spring’s ubiquity in Enterprise Java development, excellent support for
    it can be found in the major IDEs like Eclipse ([`www.eclipse.org`](http://www.eclipse.org))
    and IntelliJ IDEA ([`www.jetbrains.com/idea/`](http://www.jetbrains.com/idea/)).
    SpringSource has also invested significant effort into providing its own distribution
    based upon Eclipse called the SpringSource Tool Suite (`STS`). And while the “vanilla”
    version Eclipse is excellent, `STS` provides additional levels of polish when
    it comes to developing Spring-based applications.


    ### The Sample Application


    This section delves into the sample application you will build throughout the
    book. For example, you will learn about the build system selected and used for
    the sample application. Next, you will learn how to import the sample application
    into `STS` and take your first steps in deploying the first part of the application.


    The main intent of the sample application is to show the features and possibilities
    of Spring MVC. Although Spring MVC is part of the Spring Framework, this application
    is not intended to provide full, in-depth coverage on all the features of the
    Spring Framework. If you want to read and learn more about the Spring Framework,
    we suggest checking out *Pro Spring 3* (Apress*, 2012*).


    #### A Bookstore Sample Application


    The sample application that will be built and used throughout this book is a simple
    bookstore. You will learn how to add functionality for searching, displaying,
    and buying books. To buy books, the user of the app needs to have an account with
    the app’s associated bookstore, so there is also going to be some account registration
    and a login page. The sample application will remain more or less the same throughout
    the book. In the Spring Web Flow chapters, however, you’ll see some important
    differences that exist mainly to illustrate some of the Spring Web Flow functionality.


    You can find the code for the sample application with the source code for this
    book. Go ahead and download and extract it. Note that the top-level directory
    contains a number of folders entitled `chapterX-bookstore`. As you progress through
    this book, you will continually be adding new functionality to the sample application.
    In some cases, you will be revisiting code from previous chapters. For simplicity
    and clarity, the authors decided to separate each chapter’s progression into a
    separate project; to see the relevant code for Chapter X, simply load the project
    in the `chapterX-bookstore` folder.


    In addition to the directories for each chapter, you can also find two projects
    that are shared between all the book’s chapters (see [Figure 1-1](#Chapter01.html#fig_1_1)).
    These projects are called `bookstore-shared` and `bookstore-web-resources`, and
    they are shared with all projects. One project contains the shared business layer,
    while the other has the images, stylesheets, and other, similar files.


    ![Image](images/9781430241553_Fig01-01.jpg)


    ***Figure 1-1.** An overview of the bookstore components*


    ![Image](images/square.jpg) **Note** The project in `chapterX-bookstore` contains
    the solution for Chapter X.


    While this approach does have the downside of requiring you to load many projects
    into `STS` (one per chapter), it also means that you can see exactly how the application
    progresses—if you want to solve the problems in [Chapter 7](#Chapter07.html#ch7)
    yourself, then copy the [Chapter 6](#Chapter06.html#ch6) project and start working,
    using [Chapter 7](#Chapter07.html#ch7) as a reference point if you get stuck.


    For convenience, the root directory of the sample application for the relevant
    chapter (i.e., `chapter1-bookstore` for this chapter) will be referred to as `SAMPLE_ROOT`.
    The `SAMPLE_ROOT` will obviously be different for each chapter.


    The authors tried to create a realistic but simple sample application; to that
    end, we tried to use the technologies of today. For example, we use JPA 2.0 for
    the persistence layer, relying on Hibernate 4.1 for our specific implementation.
    For the web pages, the primary technology used is Java Server Pages (`JSPs`).
    A thorough tutorial on `JSPs` is outside the scope of this book; however, there
    are many good books on this topic available, such as *Pro JSP 2* (Apress, 2005).
    You can also find a wealth of other resources for this technology, including Oracle’s
    own tutorial at [`http://download.oracle.com/javaee/5/tutorial/doc/bnagx.html`](http://download.oracle.com/javaee/5/tutorial/doc/bnagx.html)`.`


    ![Image](images/square.jpg) **Note** The observant reader probably noticed the
    JEE5 bit in the tutorial URL. The JEE6 version of the tutorial covers JSF but
    not JSP; hence, the reference to the JEE5 tutorial.'
