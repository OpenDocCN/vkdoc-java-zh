  trans: '

    ### 结束状态


    结束状态会终止当前的活动流会话。图 11-14 展示了该状态的属性和元素。


    ![图片](img/9781430241553_Fig11-14.jpg)


    ***图 11-14.** 结束状态的不同属性和元素*


    代码清单 11-50 展示了一个终止活动流会话的结束状态示例。你可以在 `src/main/webapp/WEB-INF/view/createOrders/createOrders-flow.xml`
    文件中找到这段代码。如果被终止的流会话是当前正在执行的流的根流会话，那么整个流执行过程将会结束。当该会话是一个子流会话时，处理过程将在父流中恢复。


    ***代码清单 11-50.** 终止活动流会话的结束状态*


    `<end-state id="endOrderOk" view="redirect:/ordersOverview.htm?orderOk=`![图片](img/U002.jpg)

    `true&amp;orderId={orderId}"/>`

    `<end-state id="end" view="redirect:/index.htm"/>`


    ![图片](img/square.jpg) **注意**  在代码清单 11-50 中，我们使用了一个 XML 实体（`&amp;`）来转义 `&` 字符。这是强制性的，因为某些字符（例如
    `"`、`<`、`>` 和 `&`）在 XML 中不允许直接出现，因为它们具有特殊含义，因此需要进行转义。


    一个流可以有任意数量的结束状态。一个流没有结束状态的情况也并不少见，例如当你有一个重复性的流程（如搜索，通常有一个“再次搜索”按钮）时。拥有多个结束状态也很常见——每个结束状态对应流的一个逻辑结果。如示例代码所示，我们有一个结束状态用于处理用户想要取消订单流的情况。如果发生这种情况，我们会将用户重定向到主页。我们还有一个结束状态，一旦订单成功创建，就会将用户重定向到订单概览页面。


    结束状态可以选择性地引用一个视图。这样的视图可用于确认流处理已成功结束；这通常被称为*确认视图*。只有当结束状态终止了整个流执行时，该结束状态引用的视图才会被渲染。如果结束状态结束的是一个子流会话，那么视图的选择就由恢复执行的父流负责。


    在“子流”部分，我们还看到结束状态可以有一个输出元素。这允许结束状态将数据映射回父流。你可以在代码清单 11-47 中看到实际应用。


    ![图片](img/square.jpg) **警告**  我们已经知道 Web Flow 使用了 PRG 模式。然而，结束状态有点例外。当触发结束状态时，Web
    Flow 会在处理 PRG 模式中的第一个请求（POST 请求）后终止流执行。它还会在处理第一个请求后渲染并发送回视图——但是，它不会像通常那样发送重定向。如果发出了正常的重定向，PRG
    模式中的第二个请求（GET）会触发流执行重启，因为流执行在处理第一个请求（同样是 POST）后已经被终止了。这意味着，如果你在到达结束状态后刷新页面，你将重新启动该流。为了避免这种情况，最好让结束状态重定向到一个*稳定的*（可能是外部的）URL。示例代码通过一些
    `redirect` 语法实现了这一点。对于应用程序上下文之外的外部重定向，你可以使用 `externalRedirect` 属性。在这种情况下，将不再有对流执行的传入请求，因为新渲染的
    URL 与该流不再有任何关系。


    ### 本章小结


    完成本章后，你应该对大多数 Web Flow 特性及其应用方法有了扎实的理解。你应该能够在自己的应用程序中开始使用 Web Flow，并在遇到疑问或需要重温
    Web Flow 行为的具体细节时，随时参考本章和第 10 章。


    在本章中，我们展示了如何使用 Web Flow 解决实际用例。这些用例包括转换、格式化和验证。在此过程中，你详细了解了如何在不同类型的验证中进行选择。本章还讨论了子流，它允许你构建更易于维护和可重用的流。例如，我们涵盖了所有不同的作用域，以及如何使用它们。我们还回顾了所有的动作状态，并介绍了如何在我们的示例应用程序中使用它们。


    现在，你可以继续学习下一章，也是最后一章关于 Web Flow 的内容，在那里你将探索 Web Flow 提供的一些更高级的功能。


    ## 第 12 章


    ## 高级 Spring Web Flow


    欢迎来到关于 Spring Web Flow 的最后一章。在前几章中，我们让你熟悉了 Web Flow 的基础知识，例如如何配置 Web Flow、如何将其与
    Spring MVC 集成，以及如何设置一个基本流。我们还解释了不同的元素，例如动作状态、模型绑定、验证、应用程序控制器（以及如何调用它们）、表达式等等。


    我们在前几章中的方法是逐步向你介绍其中包含的概念，并随着章节的推进在这些概念的基础上进行构建。在第 10 章中，我们从 Web Flow 的基本高级视图开始，引入了一个简单的用例，然后将其构建为一个示例应用程序，以说明使用
    Web Flow 的不同方面。


    在第 11 章中，我们通过进一步重构和用新的 Web Flow 功能构建示例应用程序来扩展这些内容。


    本章将继续构建在前几章涵盖的主题之上；然而，本章中的主题耦合度较低。每个主题或多或少都应被视为一个独立的主题，讨论其自身的 Web Flow 特性。


    我们将继续使用上一章结束时的示例应用程序，并进行修改以支持我们在此讨论的功能。一个功能可以是全新的，也可以是对我们在前一章中看到的内容的扩展。我们特意这样划分章节，既是为了让前一章尽可能易于消化，也是为了让你能够带着所需的
    Web Flow 知识开始本章的学习，从而直接切入某个特定功能。


    在读完这最后一章关于 Web Flow 的内容后，你应该对几乎所有最重要的 Web Flow 特性有透彻的理解，包括如何在实践中以及何时使用它们。


    ### 继承


    在上一章中，我们向你介绍了子流，这将帮助你构建和重用你的流。但还有另一个 Web Flow 特性可以帮助你实现这种结构和重用：继承。*Web Flow 提供了两种形式的继承：*


    *   流继承

    *   状态继承


    在上一章中，我们还看到流根元素上有一个特殊的属性，你可以用它来声明流继承（`parent` 属性）。在本章中，我们将演示该功能。除了流之外，继承也可以单独应用于五种不同的状态（即
    `view`、`action`、`decision`、`subflow` 和 `end` 状态）。在接下来的章节中，我们将详细讨论这些模块化特性中的每一个。同样，我们将基于前几章构建的示例应用程序来构建这些示例。

