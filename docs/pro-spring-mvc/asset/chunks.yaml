    To finalize the ordering process, we will give our customers an opportunity to
    check out their cart. This will create an actual `com.apress.prospringmvc.bookstore.domain.Order`
    object and entry in the database. The checkout is a combination of a lot of things
    we covered in the previous chapter and the previous section. The controller is
    the `com.apress.prospringmvc.bookstore.web.controller.CheckoutController` (see
    [Listing 6-4](#Chapter06.html#list_6_4)), and it contains a lot of logic. The
    `checkout.jsp` file is the JSP that contains our screen; it can be found in `/WEB-INF/views/cart`.


    ***Listing 6-4.** The CheckoutController*


    `package com.apress.prospringmvc.bookstore.web.controller;`


    `//Other imports omitted`

    `import com.apress.prospringmvc.bookstore.validation.OrderValidator;`


    `@Controller`

    `@SessionAttributes(types = { Order.class })`

    `@RequestMapping("/cart/checkout")`

    `public class CheckoutController {`


    `    private final Logger logger;`

    `    logger  = LoggerFactory.getLogger(CheckoutController.class);`


    `    @Autowired`

    `    private Cart cart;`


    `    @Autowired`

