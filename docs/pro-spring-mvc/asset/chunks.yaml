    `}`

    `// Other methods omitted`

    `}`


    The use of the filter is still a workaround to make REST possible with browsers
    and normal forms, which can be useful if we choose to use progressive enhancement
    or graceful degradation for our website. Progressive enhancement means adding
    rich behavior to a basic page and first making sure our basic page works as we
    want it to. Graceful degradation is the other way around—we develop a rich website
    and try to make sure the whole site still works even if certain features aren’t
    available.


    ### Asynchronous JavaScript and XML (AJAX)


    The term AJAX was coined^([4](#Chapter07.html#CHP-7-FN-4)) by Jesse James Garrett^([5](#Chapter07.html#CHP-7-FN-5))
    in 2005. AJAX by itself isn’t a technology, it is a collection of technologies
    working together to create a rich user experience for our web application. AJAX
    incorporates the following technologies:


    > * Standards-based presentation by using HTML and CSS

    > * Dynamic display and interaction by using the Document Object Model (DOM)

    > * Data interchange and manipulation (using XML or JSON)

    > * Asynchronous data retrieval using the `XMLHttpRequest`

    > * JavaScript to bring all this together


    Although the acronym stands for Asynchronous JavaScript and XML, it is often used
    with JavaScript Object Notation (JSON) to pass data between the client and server.


    As AJAX has already been in use for a couple of years, there are quite a lot of
    JavaScript frameworks out there that make it easier to create a rich user experience.
    For Spring MVC, it doesn’t matter which JavaScript library you choose, and it
    is beyond the scope of the book to discuss the abundance of JavaScript libraries
    out there. For our example we use jQuery,^([6](#Chapter07.html#CHP-7-FN-6)) as
    at the moment of writing it is one of the most widely used libraries out there.
    To be able to use jQuery, we need to load the JavaScript file containing this
    library. For this we modify the `template.jsp` file to include jQuery (see [Listing
    7-4](#Chapter07.html#list_7_4)).


    ***Listing 7-4.** Modified template.jsp Header*


    `<!DOCTYPE HTML>`

    `<%@ taglib prefix="c" uri="http://java.sun.com/jsp/jstl/core"%>`

    `<%@ taglib prefix="spring" uri="http://www.springframework.org/tags" %>`

    `<%@ taglib prefix="tiles" uri="http://tiles.apache.org/tags-tiles" %>`


    `<html>`

    `<head>`

    `<meta charset="utf-8">`

    `<c:set var="titleKey">`

    `<tiles:getAsString name="title" />`

    `</c:set>`

    `<title>Bookstore | <spring:message code="${titleKey}" text="Your Home in Books"/></title>`

    `<link rel="stylesheet" type="text/css" href="<c:url value="/resources/css/style.css"/>"
    >`

    `<script src="<c:url value="/resources/jquery/jquery-1.7.1.min.js"/>"></script>`

    `</head>`

    `//Body Omitted`

    `</html>`


    This adds the jQuery JavaScript library to all of our pages; however, by itself
    it doesn’t do much. We still need to add logic to our page. In the next sections
    we are going to add AJAX behavior to our sample application. We will start with
    a simple form submit and along the way explore the features that Spring MVC offers
    to work with AJAX and how it helps us building REST applications.


    _________


    ⁴ [`http://www.adaptivepath.com/ideas/ajax-new-approach-web-applications`](http://www.adaptivepath.com/ideas/ajax-new-approach-web-applications)


    ⁵ [`http://www.jjg.net`](http://www.jjg.net)


    ⁶ [`http://www.jquery.org`](http://www.jquery.org)


    #### Adding AJAX to Our Application


    Thanks to the flexibility of Spring MVC, it is quite easy to add AJAX behavior
    to our application and integrate it nicely with Spring MVC. In this section we
    will see how we can change our form submit into an AJAX-based form submit (with
    and without the use of JSON). However a form submit isn’t the only possible use
    for AJAX; it merely serves our sample application, it is also quite possible to
    create auto-completion fields, automatic field/form validation, and so on.


    ##### AJAX Form Submit with HTML Result


    Let’s take a look at our book search page and transform that into a more dynamic
    web page. We will start by changing the normal form submit into an AJAX form submit.
    Open the `search.jsp` file and add the script as shown in [Listing 7-5](#Chapter07.html#list_7_5)
    right after the form or at the bottom of the page.


    ***Listing 7-5.** Book Search Page with AJAX Form Submit*


    ```

    <script>

    $(''#bookSearchForm'').submit(function(evt){

    evt.preventDefault();

    formData = $(''#bookSearchForm'').serialize();

    $.ajax({

    url: $(''#bookSearchForm'').action,

    type: ''GET'',

    data: formData

    });

    });

    </script>

    ```


    This script replaces the actual form submit. It first prevents the actual submit
    from happening, and then builds an AJAX request that will pass the data to the
    server. If we now redeploy our application, navigate to our book search page,
    and press Submit, it looks like nothing happens. At least we don’t see anything
    change on the screen. If we debug our application, we can see the request arrive
    at the server and the search being issued. So why isn’t the result being rendered?


    At the beginning of this section, we mentioned that AJAX is a collection of technologies,
    and one of those is asynchronous data retrieval using the `XMLHttpRequest`. This
    is also where our current problem lies. We send a request to the server but we
    haven’t included anything to handle the response from the server. [Listing 7-6](#Chapter07.html#list_7_6)
    shows the modified script (see the highlighted part) to actually render the returned
    page.


    ***Listing 7-6.** Book Search Page with Success Handler*


    ```

    <script>

    $(''#bookSearchForm'').submit(function(evt){

    evt.preventDefault();

    formData = $(''#bookSearchForm'').serialize();

    $.ajax({

    url: $(''#bookSearchForm'').action,

    type: ''GET'',

    data: formData,

    success: function(html) {

    resultTable = $(''#bookSearchResults'', html);

    $(''#bookSearchResults'').html(resultTable);

    }

    });

    });

    </script>

    ```


    We added the success handler for this script and what it does is render the result
    we receive from the server. The result is the whole page as it would normally
    be rendered. We select the table with the results and we replace the current table
    on screen with the detected table. If the application is redeployed and a search
    is issued, the page would work again.'
