    `@Configuration`

    `@EnableWebMvc`

    `@ComponentScan(basePackages = { "com.apress.prospringmvc.bookstore.web" })`

    `public class WebMvcContextConfiguration extends WebMvcConfigurerAdapter {`


    `    //Other methods omitted`

    `    @Bean`

    **`@Scope(value = "session", proxyMode = ScopedProxyMode.TARGET_CLASS)`**

    `    public Cart cart() {`

    `        return new Cart();`

    `    }`


    `}`


    In this case, we have a bean declaration with the annotation, and we are using
    `session` scope. We want to use class-based proxies (`com.apress.prospringmvc.bookstore.domain.Cart`
    doesn’t implement an interface, so we need class-based proxies). We can now simply
    have this bean injected into other beans and use it like any other bean. Let’s
    create a controller that uses this bean, the `com.apress.prospringmvc.bookstore.web.controller.CartController`
    (see [Listing 6-2](#Chapter06.html#list_6_2)).


    ![Image](images/square.jpg) **Note** To be able to use class-based proxies, Spring
    requires an additional library called CGLIB.^([1](#Chapter06.html#CHP-6-FN-1))


