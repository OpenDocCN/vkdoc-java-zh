    #### 使用 JSR 303 注解进行表单验证


    您可以配置 Web Flow 来执行 JSR 303 验证（即 Bean 验证）。例如，如果您使用 `javax.constraints.validation`
    中的注解（如 `@Min` 或 `@Max`）对模型进行注解，那么验证将会执行，并且会为模型中的该路径创建错误消息。要实现这一点，您必须向流程构建器服务提供一个
    `org.springframework.validation.beanvalidation.LocalValidatorFactoryBean`。


    清单 11-18 定义了启用 JSR-303 验证的工厂 Bean。您可以在 `src/main/resources/spring/webflow-config.xml`
    中找到这个 Bean。


    ***清单 11-18.** 定义 Bean 验证器工厂 Bean*


    `<bean id="validator" class="org.springframework.validation.beanvalidation`![Image](img/U002.jpg)

    `.LocalValidatorFactoryBean" />`


    接下来，我们可以完成流程构建器服务的配置，如清单 11-19 所示。您可以在 `src/main/resources/spring/webflow-config.xml`
    中找到此配置文件。


    ***清单 11-19.** 启用 Bean 验证*


    `<webflow:flow-builder-services id="flowBuilderServices" view-factory-creator=`![Image](img/U002.jpg)

    `"mvcViewFactoryCreator" conversion-service="conversionService" validator="validator"`![Image](img/U002.jpg)

    ` development="true" />`


    一切设置完毕后，我们可以简单地在表单上应用注解（参见清单 11-20），该表单位于 `com.apress.prospringmvc.bookstore.web.controller.OrderForm`
    中。目前，我们仅对 `quantity` 字段使用验证。这是用户在向订单添加书籍时可以更改的字段。默认值为 `1`，但用户也可以直接向订单添加多本书。


    ***清单 11-20.** 添加验证注解*


    `package com.apress.prospringmvc.bookstore.web.controller;`


    `import javax.validation.constraints.Max;`

    `import javax.validation.constraints.Min;`

    `import javax.validation.constraints.NotNull;`


    `@NotNull`

    `@Min(1)`

    `@Max(999)`

    `private Integer quantity;`


    我们也可以对其他字段使用 Bean 验证。然而，这样做会有两个问题：


    *   首先，验证 API 擅长验证单个字段，但我们还需要验证字段的组合。例如，稍后我们需要检查输入的配送日期是否在订单日期之后。验证 API 具有分组功能来验证组内的字段，但如果不编写自定义
    Bean 验证器，就无法指示更复杂的关系。不幸的是，这不是 Bean 验证开箱即用支持的功能。我们将使用另外两种验证方式之一（稍后介绍）来完成此操作。

    *   其次，这种验证设置的问题在于整个表单作为一个整体被验证，但我们在流程的每一步中只使用它的一部分。基本上，这意味着当在第一页设置 `Category`
    时，所有其他的验证注解也会被触发。如果我们在 `Book` 实例字段上方放置一个 `@NotNull` 注解，那么当我们选择一个 `Category` 时，就会收到一个错误，提示未选择
    `Book`。一种解决方案是将表单拆分为多个较小的表单。但目前，我们将以不同的方式验证其他字段。另外，请注意 `quantity` 字段不存在此问题，因为我们将其值初始化为
    `1`。因此，在选择 `Category` 时，`quantity` 字段会被验证，但由于其值为 `1`，验证会通过。稍后，当用户在 `select books`
    页面中选择数量时，如果用户指定了不允许的值，验证器将触发错误。


    ![Image](img/square.jpg)  **注意**  对于 JSR303 验证，您需要在编译类路径中包含验证 API（其中包含 `javax.constraints.validation`
    注解）。但在运行时，我们还需要一个提供者。Tomcat 没有自带提供者，因此我们使用 Hibernate Validator（它也是 JSR 303 的 RI，即参考实现）。^(2)
    我们只需将这些验证器放在类路径上——但这就是我们需要做的全部，因为我们之前已经使用 `LocalValidatorFactoryBean` 配置了 Web
    Flow。为了定义依赖关系，我们将其添加到项目的根 Gradle 文件（示例根目录中的 `build.gradle`）中：


    `compile "org.hibernate:hibernate-validator:$hibernateValidatorVersion"`

    `compile "javax.validation:validation-api:1.0.0.GA"`


    ##### 使用 Web Flow 验证器方法和类进行表单验证


    第二种执行验证的方式是在我们的模型中实现一个形式为“`validate`*`State`*”的方法。这种类型的验证完全通过遵循命名约定被 Web Flow
    检测到。单词“validate”是必需的，而“*state*”是一个占位符，需要替换为应应用验证的状态的 ID。Web Flow 会在回发到定义的状态时执行验证。因此，验证不会在视图状态首次渲染时执行，而是在发生回发时执行（例如，提交表单时）。


    在清单 11-21 的示例中，当我们转换到 `selectCategory` 状态时，验证被触发。我们检查触发转换的事件是否为 `next` 事件。如果用户点击取消按钮，那么我们就不希望执行验证。`org.springframework.binding.validation.ValidationContext`
    由 Web Flow 自动注入。如果我们添加一个错误代码，那么该代码将使用已注册的 `org.springframework.context.MessageSource`
    自动解析（此代码可以在 `com.apress.prospringmvc.bookstore.web.controller.OrderForm` 中找到）。


    ***清单 11-21.** 验证类别*


    `public void validateSelectCategory(ValidationContext context) {`

    `    if (context.getUserEvent().equals("next")) {`

    `        MessageContext messages = context.getMessageContext();`

    `        if (category == null) {`

    `messages.addMessage(new` ![Image](img/U002.jpg)

    `            MessageBuilder().error().source("category")`![Image](img/U002.jpg)

    `            .code("error.page.category.required").build());`

    `        }`

    `    }`

    `}`


    此方法的一个变体是将验证逻辑与模型分开存储在一个 `validator` 类中（参见清单 11-22）。为此，您必须遵循更多关于类名和 `validation`
    方法的命名约定。该类应命名为 `modelnameValidator`，而方法应命名为 `validateState`。在我们的例子中，类名将变为 `OrderFormValidator`，方法将与之前在
    `validateSelectShop` 中使用的方法相同。对于外部验证器，您还将获得模型作为 `validate` 方法的参数，并且可选地获得 Spring
    MVC 的 `Errors` 对象。


    ____________


    ² [`download.oracle.com/otndocs/jcp/bean_validation-1.0-fr-oth-JSpec`](http://download.oracle.com/otndocs/jcp/bean_validation-1.0-fr-oth-JSpec)/


    ***清单 11-22.** 独立的验证器类*


    `@Component`

    `public class OrderModelValidator{`

    `    public void validateSelectShop(OrderForm orderForm, ValidationContext context,`![Image](img/U002.jpg)

    ` Errors errors) {`


    最后的要求是该 Bean 应注册为 Spring Bean。在像这样的注解驱动模型中，您可以简单地在类定义上方添加 `@Component`，并确保该类会被组件扫描所捕获。


    ![Image](img/square.jpg)  **注意**  在示例应用程序中，我们选择将验证与模型存储在一起，因此您不会找到外部的 `OrderFormValidator`。但欢迎您进行实验，尝试将验证逻辑从
    `OrderForm` 移到一个单独的验证器中。

