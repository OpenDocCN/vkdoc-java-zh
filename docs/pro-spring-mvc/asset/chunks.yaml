    ⁴ [`http://en.wikipedia.org/wiki/List_of_HTTP_header_fields`](http://en.wikipedia.org/wiki/List_of_HTTP_header_fields)


    让我们仔细看看我们可以使用的所有不同注解类型。所有这些注解都有一些我们可以设置的属性，这些属性可能有默认值，也可能是必需的。


    表 5-5 中提到的所有注解都有一个 `value` 属性。此 `value` 属性指的是要使用的对象的名称（其具体作用取决于注解）。如果未填写此值，则回退为使用方法参数的名称。此回退仅在类使用调试信息编译时才可用。^(5)
    使用 `ModelAttribute` 注解时是一个例外。它不会使用方法参数的名称，而是从参数类型推断名称，使用简单的类名作为参数名称。如果类型是数组或集合，则通过添加
    `List` 使其变为复数形式。如果我们使用 `com.apress.prospringmvc.bookstore.domain.Book` 作为参数，那么名称将是
    `book`；如果是数组或集合，则变为 `bookList`。


    ##### RequestParam


    `RequestParam` 注解可以放在请求处理方法的任何参数上。当存在时，它用于从请求中检索参数。当放在 `Map` 上时，根据是否设置了 `name`
    属性，会有一些特殊处理。如果设置了名称，则检索该值并将其转换为 `Map`。对于转换（更多信息请参阅本章的“数据绑定”部分），如果未指定名称，则所有请求参数都将作为键/值对添加到映射中。


    ![Image](img/tab_5_6.jpg)


    ________________


    ⁵ [`http://docs.oracle.com/javase/6/docs/technotes/tools/windows/javac.html`](http://docs.oracle.com/javase/6/docs/technotes/tools/windows/javac.html)


    ##### RequestHeader


    `RequestHeader` 注解可以放在任何方法参数上。它用于将方法参数绑定到请求头。当放在 `Map` 上时，所有可用的请求头都将作为键/值对放入映射中。如果放在其他类型的参数上，则使用
    `org.springframework.core.convert.converter.Converter` 或 `PropertyEditor` 将该值转换为该类型（更多信息请参阅“数据绑定”部分）。


    ![Image](img/tab_5_7.jpg)


    ##### RequestBody


    `RequestBody` 注解用于标记我们想要绑定到 Web 请求正文的方法参数。通过查找并调用 `org.springframework.http.converter.HttpMessageConverter`，将正文转换为方法参数类型。此转换器根据请求的内容类型进行选择。如果未找到转换器，则会抛出
    `org.springframework.web.HttpMediaTypeNotSupportedException`。默认情况下，这会导致向客户端发送状态码为
    415 (SC_UNSUPPORTED_MEDIA_TYPE) 的响应。


    可选地，方法参数还可以使用 `javax.validation.Valid` 或 `org.springframework.validation.annotation.Validated`
    进行注解，以对创建的对象强制执行验证。有关验证的更多信息，请参阅本章后面的“模型属性验证”部分。


    ##### RequestPart


    当 `RequestPart` 注解放在类型为 `javax.servlet.http.Part`、`org.springframework.web.multipart.MultipartFile`（或后者的集合或数组）的方法参数上时，我们将获得该文件（或文件组）的内容注入。如果放在任何其他参数类型上，则内容会通过
    `org.springframework.http.converter.HttpMessageConverter` 进行处理，该转换器针对文件检测到的内容类型。如果未找到合适的转换器，则会抛出
    `org.springframework.web.HttpMediaTypeNotSupportedException`。


    ![Image](img/tab_5_8.jpg)


    ##### ModelAttribute


    `ModelAttribute` 注解可以放在方法参数上，也可以放在方法上。当放在方法参数上时，它用于将此参数绑定到模型对象。当放在方法上时，该方法用于构造模型对象，并且该方法将在调用请求处理方法之前被调用。这类方法可用于创建要在表单中编辑的对象，或提供表单自身渲染所需的数据。（更多信息请参阅“数据绑定”部分。）


    ![Image](img/tab_5_9.jpg)

