    更改后的配置包含我们自己的视图解析器，我们用它来解析 `com.apress.prospringmvc.bookstore.web.view.OrderPdfView`。我们这样做是因为我们还希望能够解析
    Excel 文档的订单视图（参见“Excel”部分）。


    完成这些更改后，我们需要重新部署我们的应用程序。如果我们登录并导航到我们的账户页面，现在可以点击 PDF 链接，实际获得一个 PDF 文件，而不是 HTML
    版本。图 8-5 显示了点击 PDF 链接的结果。


    ![Image](img/9781430241553_Fig08-05.jpg)


    ***图 8-5.** 生成的 PDF*


    尽管这种方法非常灵活，但其缺点是我们需要为每个想要的 PDF 编写 PDF 构建代码。如果我们有一些复杂的 PDF 或需要应用某种样式，这将非常繁琐且难以维护。在这种情况下，考虑使用像
    JasperReports 这样的解决方案可能是值得的（参见“JasperReports”部分）。

