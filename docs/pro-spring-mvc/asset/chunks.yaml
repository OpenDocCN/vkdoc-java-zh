    `<security:user-service>`，并接受一个 `<security:user>` 元素列表，每个元素代表我们系统中的一个用户（参见清单 13-6）。一个用户拥有用户名（此处缩写为
    `name`）、密码和逗号分隔的权限列表。这些权限目前并不重要。稍后我们将展示如何使用它们。    ***清单 13-6.** 使用内存用户数据存储的认证管理器配置*  `<security:authentication-manager>`
