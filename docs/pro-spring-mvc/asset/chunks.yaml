    #### XML 与 JSON


    Spring MVC 还提供了另一种向客户端提供 XML 或 JSON 的方式。我们可以利用 `ContentNegotiatingViewResolver`
    的优势。Spring 提供了两个特殊的视图实现，分别用于将对象转换为 XML 或 JSON，即 `org.springframework.web.servlet.view.xml.MarshallingView`
    和 `org.springframework.web.servlet.view.json.MappingJacksonJsonView`。基于 XML 的视图使用
    Spring 的 XML 支持将模型编组为 XML。JSON 视图则使用 Jackson 库。我们可以非常轻松地配置视图解析器，使其也能向客户端暴露 XML
    和/或 JSON。我们只需为 XML 和 JSON 添加默认视图（也可以像处理 PDF 和 Excel 文档那样，添加额外的视图解析器）。清单 8-25 展示了修改后的配置（请参见高亮部分）。


    ***清单 8-25.** 用于 XML 和 JSON 的 ViewConfiguration*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// 其他导入已省略`


    `import org.springframework.oxm.Marshaller;`

    `import org.springframework.oxm.xstream.XStreamMarshaller;`

    `import org.springframework.web.servlet.view.json.MappingJacksonJsonView;`

    `import org.springframework.web.servlet.view.xml.MarshallingView;`


    `import com.apress.prospringmvc.bookstore.web.view.OrderExcelView;`

    `import com.apress.prospringmvc.bookstore.web.view.OrderPdfView;`


    `@Configuration`

    `public class ViewConfiguration {`


    `    @Bean`

    `    public ContentNegotiatingViewResolver contentNegotiatingViewResolver() {`

    `        ContentNegotiatingViewResolver viewResolver;`

    `        viewResolver = new ContentNegotiatingViewResolver();`

    `        List<ViewResolver> viewResolvers = new ArrayList<ViewResolver>();`

    `        viewResolvers.add(pdfViewResolver());`

    `        viewResolvers.add(xlsViewResolver());`

    `        viewResolver.setViewResolvers(viewResolvers);`

    **`List<View> defaultViews = new ArrayList<View>();`**

    **`defaultViews.add(jsonOrderView());`**

    **`defaultViews.add(xmlOrderView());`**

    **`viewResolver.setDefaultViews(defaultViews);`**

    `        return viewResolver;`

    `    }`


    **`@Bean`**

    **`public MappingJacksonJsonView jsonOrderView() {`**

    **`MappingJacksonJsonView jsonView = new MappingJacksonJsonView();`**

    **`jsonView.setModelKey("order");`**

    **`return jsonView;`**

    **`}`**


    **`@Bean`**

    **`public MarshallingView xmlOrderView() {`**

    **`MarshallingView xmlView = new MarshallingView(marshaller());`**

    **`xmlView.setModelKey("order");`**

    **`return xmlView;`**

    **`}`**


    **`@Bean`**

    **`public Marshaller marshaller() {`**

    **`return new XStreamMarshaller();`**

    **`}`**


    `    // 其他方法已省略，请参见清单 8-22 和 8-24`

    `}`


    要使 XML 正常工作，我们还需要配置一个 `org.springframework.oxm.Marshaller` 实现。这里我们选择使用 XStream^(8)
    库，因为它快速且易于使用。若要使用其他解决方案，只需配置相应的编组器即可。有关编组和 XML 的更多信息，请参阅 Spring 参考指南。


    ![Image](img/square.jpg) **注意** 当将这些类型的视图与 ORM 实现（如我们的示例中）一起使用时，可能会遇到诸如延迟加载或由于集合被初始化而加载半个数据库的问题。


    现在，如果我们将浏览器中的 URL 改为以 .json 或 .xml 结尾，我们将获得订单的 JSON 或 XML 表示形式（图 8-6 是 JSON 示例）。现在，我们有五种不同的方式来查看订单（HTML、PDF、Excel、JSON
    和 XML），而无需修改控制器，只需更改配置即可。


    ![Image](img/9781430241553_Fig08-06.jpg)


    ***图 8-6.** 订单的 JSON 表示形式*


    _________


    ⁸ [`http://xstream.codehaus.org`](http://xstream.codehaus.org)


    #### JasperReports


    Spring MVC 支持名为 JasperReports 的报表引擎。^(9) 该报表引擎使用 XML 格式的报表设计，并可以基于该 XML 输出不同格式。有一个名为
    iReport Designer 的强大报表设计器，可用于创建报表设计。也可以使用 XML 或文本编辑器来创建设计，但不推荐这样做，因为 XML 非常冗长。


    Spring 通过一个视图解析器和六种不同的视图实现来支持 JasperReports。这个视图解析器不出意外地是 `org.springframework.web.servlet.view.jasperreports.JasperReportsViewResolver`。视图实现可以在同一个包中找到。它们是：


    > *   `JasperReportsCsvView`

    > *   `JasperReportsHtmlView`

    > *   `JasperReportsPdfView`

    > *   `JasperReportsXlsView`

    > *   `ConfigurableJasperReportsView`

    > *   `JasperReportsMultiFormatView`


    前四种实现生成预定义的格式，分别是 CSV、HTML、PDF 或 Excel。对于第五种，你可以配置要导出的格式；它允许设置用于生成报表的特定 `net.sf.jasperreports.engine.JRExporter`
    实现。最后一种视图实现充当了前四种视图的包装器，或者可以配置特定的实现。它将一种格式映射到特定的视图实现。表 8-11 列出了默认映射。


    ![Image](img/9781430241553_tab08-11.jpg)


    要使用其中一种视图，我们需要添加视图并配置报表设计的 URL。这可以是一个 XML 文件（.jrxml 文件）或编译后的形式（.jasper 文件）。无论哪种方式，出于性能原因，内部都需要报表的编译版本。对于生产环境，预先编译报表可能是明智之举。清单
    8-26 展示了基于 JasperReports 的订单 PDF 视图的示例配置。


    _________


    ⁹ [`http://jasperforge.org/projects/jasperreports`](http://jasperforge.org/projects/jasperreports)


    ***清单 8-26.** JasperReports 视图配置*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// 其他导入已省略`


    `import org.springframework.web.servlet.view.jasperreports`

    `       .JasperReportsPdfView;`


    `@Configuration`

    `public class ViewConfiguration {`


    `    @Bean`

    `    public View jasperReportsView() {`

    `        JasperReportsPdfView orderPdfView = new JasperReportsPdfView();`

    `        orderPdfView.setUrl("/WEB-INF/jasper/order.jrxml");`

    `        return orderPdfView;`

    `    }`

    `  // 其他方法已省略，请参见清单 8-18`

    `}`


    特殊的 `org.springframework.web.servlet.view.jasperreports.JasperReportsMultiFormatView`
    需要将要渲染的格式放入模型中。默认情况下，模型中应该有一个名为 `format` 的键，用于告知要渲染哪种格式。使用 `ContentNegotiatingViewResolver`
    来解析正确的视图实现更加灵活且侵入性更小。这允许你在不修改控制器的情况下配置视图。而多格式视图需要修改我们的控制器，并且我们需要在其中添加逻辑来确定要渲染的内容。

