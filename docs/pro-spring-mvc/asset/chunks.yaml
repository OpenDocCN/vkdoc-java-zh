    \ 2012) or the online Spring Reference Guide ([`www.springsource.org/documentation`](http://www.springsource.org/documentation)).\n\
    \nIn our bookstore sample application, the `com.apress.prospringmvc.bookstore.service.BookstoreService`\
    \ interface (see [Listing 3-3](#Chapter03.html#list_3_3)) serves as the interface\
