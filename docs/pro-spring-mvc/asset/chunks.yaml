    256 位的 SHA2 哈希算法（即 SHA-256）。唯一的问题是，Spring 现在期望用户输入哈希值 `"5238377ba2eac049901b54004ee9e03db62c0ab0b48133a4a162ab3aedfc809f"`
    作为密码，而不是可读的密码。因为 Spring 不知道我们存储的实际上是一个哈希，它认为这个长字符串是用户必须输入的实际密码。    剩下要做的就是配置 Spring，让它获取用户输入的真正纯文本密码，使用选定的哈希算法对其进行哈希处理，然后将输出的哈希与我们提供的密码字段中的哈希值进行比较。在清单
    13-7 中，我们通过指定 `<security:password-encoder>` 来实现这一点。需要配置的内容不多。我们只需说明我们使用的是 SHA-256
    位（实际上是 SHA 版本 2）。还有一个奇怪的子元素，我们稍后会讨论。有了这个密码编码器，Spring Security 就知道我们的密码是经过哈希处理的，并且它应该首先对用户输入的密码进行哈希处理，然后再将值与数据存储中的值进行比较。    ***清单
