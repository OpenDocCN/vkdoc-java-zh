- fmt: "### Book Search Page\n\nWe have a bookstore, and we want to sell books. At\
    \ the moment, however, there is nothing in our web application that allows the\
    \ user to search for or even see a list of books. Let’s address this by creating\
    \ a book search page, so that the users of our application can search for books.\n\
    \nFirst, we create a directory `book` in the `/WEB-INF/views` directory. In that\
    \ directory, we create a file called `search.jsp`. This file is our search form,\
    \ and it will also display the results of the search. The code for this can be\
    \ seen in [Listing 5-14](#Chapter05.html#list_5_14).\n\n**Listing 5-14.** The\
    \ Search Page Form\n\n```\n<%@ taglib prefix=\"c\" uri=\"http://java.sun.com/jsp/jstl/core\"\
    %>\n\n<form method=\"GET\" action=\"<c:url value=\"/book/search\"/>\">\n    <fieldset>\n\
    \        <legend>Search Criteria</legend>\n        <table>\n            <tr>\n\
    \                <td><label for=\"title\">Title</label></td>\n               \
    \ <td><input id=\"title\" name=\"title\" /></td>\n            </tr>\n        </table>\n\
    \    </fieldset>\n    <button id=\"search\">Search</button>\n</form>\n\n<c:if\
    \ test=\"${not empty bookList}\">\n    <table>\n        <tr><th>Title</th><th>Description</th><th>Price</th></tr>\n\
    \        <c:forEach items=\"${bookList}\" var=\"book\">\n            <tr>\n  \
    \              <td>${book.title}</td>\n                <td>${book.description}</td>\n\
    \                <td>${book.price}</td>\n            </tr>\n        </c:forEach>\n\
    \    </table>\n</c:if>\n```\n\nThe page consists of a form with a field to fill\
    \ in a (partial) title that will be used to search for books. When there are results,\
    \ we will show a table to the user containing the results. Now that we have a\
    \ page, we also need a controller that can handle the requests. [Listing 5-15](#Chapter05.html#list_5_15)\
    \ shows the initial `com.apress.prospringmvc.bookstore.web.controller.BookSearchController`.\n\
    \n**Listing 5-15.** The `BookSearchController` with Search\n\n```\npackage com.apress.prospringmvc.bookstore.web.controller;\n\
    \nimport org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Controller;\n\
    import org.springframework.ui.Model;\nimport org.springframework.web.bind.annotation.RequestMapping;\n\
    import org.springframework.web.bind.annotation.RequestMethod;\n\nimport com.apress.prospringmvc.bookstore.domain.BookSearchCriteria;\n\
    import com.apress.prospringmvc.bookstore.service.BookstoreService;\n\nimport javax.servlet.http.HttpServletRequest\n\
    \n@Controller\npublic class BookSearchController {\n\n    @Autowired\n    private\
    \ BookstoreService bookstoreService;\n\n    @RequestMapping(value = \"/book/search\"\
    , method = RequestMethod.GET)\n    public String list(Model model, HttpServletRequest\
    \ request) {\n        BookSearchCriteria criteria = new BookSearchCriteria();\n\
    \        criteria.setTitle(request.getParameter(\"title\");\n        model.addAttribute(this.bookstoreService.findBooks(criteria));\n\
    \        return \"book/search\";\n    }\n}\n```\n\nThe controller will react on\
    \ the URL; retrieve the `title` parameter from the request (this is the name of\
    \ the field in our page, as shown in [Listing 5-13](#Chapter05.html#list_5_13));\
    \ and finally, proceed with a search. The results of the search are put in the\
    \ model. Initially it will display all the books; however, as soon as a title\
    \ is entered, it will limit the results based on that title (see [Figure 5-4](#Chapter05.html#fig_5_4)).\n\
    \n![Image](images/9781430241553_Fig05-04.jpg)\n\n**Figure 5-4.** The book search\
    \ page showing the results\n\nAs mentioned earlier, working with the `HttpServletRequest`\
    \ directly isn’t necessary in most cases. Let’s make our search method a little\
    \ simpler by putting the `com.apress.prospringmvc.bookstore.domain.BookSearchCriteria`\
    \ in the list of method arguments (see [Listing 5-16](#Chapter05.html#list_5_16)).\n\
    \n**Listing 5-16.** The `BookSearchController` with `BookSearchCriteria` as a\
    \ Method Argument\n\n```\npackage com.apress.prospringmvc.bookstore.web.controller;\n\
