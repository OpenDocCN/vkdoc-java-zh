- fmt: "#### HandlerAdapter\n\n`org.springframework.web.servlet.HandlerAdapter`是调度器Servlet与所选处理器之间的粘合剂。它将实际执行逻辑从调度器Servlet中剥离，从而使调度器Servlet具有无限的可扩展性。可以将此组件视为Servlet与实际处理器实现之间的桥梁。[清单4-14](#Chapter04.html#list_4_14)展示了`HandlerAdapter`的API。\n\
    \n***清单4-14.** HandlerAdapter API*\n\n```\npackage org.springframework.web.servlet;\n\
    \nimport javax.servlet.http.HttpServletRequest;\nimport javax.servlet.http.HttpServletResponse;\n\
    \npublic interface HandlerAdapter {\n\n    boolean supports(Object handler);\n\
    \n    ModelAndView handle(HttpServletRequest request,\n                      \
    \  HttpServletResponse response,\n                        Object handler) throws\
    \ Exception;\n\n    long getLastModified(HttpServletRequest request, Object handler);\n\
    \n}\n```\n\n如[清单4-14](#Chapter04.html#list_4_14)所示，该API由几个方法组成。调度器Servlet会调用上下文中每个处理器的`supports`方法，以确定哪个`HandlerAdapter`能够执行所选处理器。如果处理器适配器能够执行该处理器，则会调用`handle`方法来实际执行所选处理器。处理器的执行可能会返回一个`org.springframework.web.servlet.ModelAndView`。然而，某些实现始终返回`null`，表示响应已发送给客户端。\n\
    \n如果传入请求是`GET`或`HEAD`请求，则会调用`getLastModified`方法来确定底层资源最后修改的时间（`-1`表示内容始终重新生成）。结果会作为`Last-Modified`请求头发送回客户端，并与`If-Modified-Since`请求头进行比较。如果资源已修改，内容将重新生成并重新发送给客户端；否则，将向客户端发送HTTP响应码304（未修改）。当调度器Servlet提供静态资源时，这尤其有用，可以节省带宽。\n\
    \nSpring MVC 默认提供了五种`HandlerAdapter`的实现（参见[图4-12](#Chapter04.html#fig_4_12)）。\n\
    \n![Image](images/9781430241553_Fig04-12.jpg)\n\n***图4-12.** HandlerAdapter 实现*\n\
    \n##### HttpRequestHandlerAdapter\n\n`org.springframework.web.servlet.mvc.HttpRequestHandlerAdapter`知道如何执行`org.springframework.web.HttpRequestHandler`实例。此处理器适配器主要用于Spring\
    \ Remoting以支持某些HTTP远程处理选项。然而，您也会用到`org.springframework.web.HttpRequestHandler`接口的两种实现。一种用于提供静态资源，另一种将传入请求转发到Servlet容器的默认Servlet（有关此实现的更多信息，请参见[第5章](#Chapter05.html#ch5)）。\n\
    \n##### SimpleControllerHandlerAdapter\n\n`org.springframework.web.servlet.mvc.SimpleControllerHandlerAdapter`知道如何执行`org.springframework.web.servlet.mvc.Controller`实现。它返回从控制器实例的`handleRequest`方法返回的`org.springframework.web.servlet.ModelAndView`。\n\
    \n##### SimpleServletHandlerAdapter\n\n在应用程序上下文中配置`javax.servlet.Servlet`实例并将其置于调度器Servlet之后可能很方便。为了能够执行这些Servlet，您需要`org.springframework.web.servlet.handler.SimpleServletHandlerAdapter`。它知道如何执行`javax.servlet.Servlet`，并且始终返回`null`，因为它期望Servlet自行处理响应。\n\
    \n##### AnnotationMethodHandlerAdapter\n\n`org.springframework.web.servlet.mvc.annotation.AnnotationMethodHandlerAdapter`用于执行带有`org.springframework.web.bind.annotation.RequestMapping`注解的方法。它转换方法参数并提供对请求参数的便捷访问。方法的返回值会被转换或添加到由此处理器适配器内部创建的`org.springframework.web.servlet.ModelAndView`中。整个映射和转换过程相当严格；然而，存在一些扩展点，允许自定义或添加您自己的类型处理。\n\
    \n##### RequestMappingHandlerAdapter\n\n`org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerAdapter`用于执行带有`org.springframework.web.bind.annotation.RequestMapping`注解的方法。它会转换方法参数并提供对请求参数的便捷访问。方法的返回值会被转换或添加到由此处理器适配器内部创建的`org.springframework.web.servlet.ModelAndView`中。整个绑定和转换过程具有很高的可配置性和灵活性。从`org.springframework.web.servlet.mvc.annotation.AnnotationMethodHandlerAdapter`中汲取的许多经验教训已融入其中；其可能性在[第5章](#Chapter05.html#ch5)和[第6章](#Chapter06.html#ch6)中进行了说明。\n\
    \n#### MultipartResolver\n\n`org.springframework.web.multipart.MultipartResolver`策略接口用于判断传入请求是否为多部分文件请求（用于文件上传）；如果是，它会将传入请求包装在`org.springframework.web.multipart.MultipartHttpServletRequest`中。然后可以使用包装后的请求来便捷地访问表单中的底层多部分文件。文件上传在[第7章](#Chapter07.html#ch7)中说明。[清单4-15](#Chapter04.html#list_4_15)展示了`MultipartResolver`的API。\n\
    \n***清单4-15.** MultipartResolver API*\n\n```\npackage org.springframework.web.multipart;\n\
    \nimport javax.servlet.http.HttpServletRequest;\n\npublic interface MultipartResolver\
    \ {\n\n    boolean isMultipart(HttpServletRequest request);\n\n    MultipartHttpServletRequest\
    \ resolveMultipart(HttpServletRequest request)\n    throws MultipartException;\n\
    \n    void cleanupMultipart(MultipartHttpServletRequest request);\n}\n```\n\n\
    `org.springframework.web.multipart.MultipartResolver`的三个方法在请求的准备和清理过程中被调用。调用`isMultipart`方法来判断传入请求是否确实是多部分请求。如果是，则调用`resolveMultipart`方法，该方法将原始请求包装在`MultipartHttpServletRequest`中。最后，当请求处理完毕后，调用`cleanupMultipart`方法来清理任何已使用的资源。[图4-13](#Chapter04.html#fig_4_13)展示了`MultipartResolver`的两种开箱即用的实现。\n\
    \n![Image](images/9781430241553_Fig04-13.jpg)\n\n***图4-13.** MultipartResolver\
    \ 实现*\n\n##### CommonsMultipartResolver\n\n`org.springframework.web.multipart.commons.CommonsMultipartResolver`使用Commons\
    \ `fileupload`库^([1](#Chapter04.html#CHP-4-FN-1))来处理多部分文件。它支持对Commons `fileupload`库的多个方面进行简单配置。\n\
    \n##### StandardServletMultipartResolver\n\nServlet 3.0规范引入了一种处理多部分表单的标准方式。`org.springframework.web.multipart.support.StandardServletMultipartResolver`仅作为此标准方法的包装器，从而以透明的方式暴露出来。"
  raw: '#### HandlerAdapter


    The `org.springframework.web.servlet.HandlerAdapter` is the glue between the dispatcher
    servlet and the selected handler. It removes the actual execution logic from the
    dispatcher servlet, which makes the dispatcher servlet infinitely extensible.
    Consider this component the glue between the servlet and the actual handler implementation.
    [Listing 4-14](#Chapter04.html#list_4_14) shows the `HandlerAdapter` API.


    ***Listing 4-14.** The HandlerAdapter API*


    `package org.springframework.web.servlet;`


    `import javax.servlet.http.HttpServletRequest;`

    `import javax.servlet.http.HttpServletResponse;`


    `public interface HandlerAdapter {`


    `    boolean supports(Object handler);`


    `    ModelAndView handle(HttpServletRequest request,`

    `                        HttpServletResponse response,`

    `                        Object handler) throws Exception;`


    `    long getLastModified(HttpServletRequest request, Object handler);`


    `}`


    As [Listing 4-14](#Chapter04.html#list_4_14) shows, the API consists of several
    methods. The `supports` method is called on each handler in the context by the
    dispatcher servlet, and this is done to determine which `HandlerAdapter` can execute
    the selected handler. If the handler adapter can execute the handler, the `handle`
    method is called to actually execute the selected handler. The execution of the
    handler can lead to an `org.springframework.web.servlet.ModelAndView` being returned.
    However, some implementations always return `null`, indicating the response has
    already been sent to the client.


    If the incoming request is a `GET` or `HEAD` request, the `getLastModified` method
    is called to determine the time when the underlying resource was last modified
    (`-1` means the content is always regenerated). The result is sent back to the
    client as a `Last-Modified` request header and compared with the `If-Modified-Since`
    request header. If there was a modification, the content will be regenerated and
    resent to the client; otherwise, an HTTP Response Code 304 (Not Modified) will
    be sent back to the client. This is particularly useful when the dispatcher servlet
    serves static resources, which will save bandwidth.


    Out of the box, Spring MVC provides five implementations of the `HandlerAdapter`
    (see [Figure 4-12](#Chapter04.html#fig_4_12)).


    ![Image](images/9781430241553_Fig04-12.jpg)


    ***Figure 4-12.** HandlerAdapter implementations*


    ##### HttpRequestHandlerAdapter


    The `org.springframework.web.servlet.mvc.HttpRequestHandlerAdapter` knows how
    to execute `org.springframework.web.HttpRequestHandler` instances. This handler
    adapter is mostly used by Spring Remoting to support some of the HTTP remoting
    options. However, there are two implementations of the `org.springframework.web.HttpRequestHandler`
    interface that you will also use. One serves static resources, and the other forwards
    incoming requests to the default servlet of the servlet container (see [Chapter
    5](#Chapter05.html#ch5) for more information on this implementation).


    ##### SimpleControllerHandlerAdapter


    The `org.springframework.web.servlet.mvc.SimpleControllerHandlerAdapter` knows
    how to execute `org.springframework.web.servlet.mvc.Controller` implementations.
    It returns the `org.springframework .web.servlet.ModelAndView` returned from the
    `handleRequest` method of the controller instance.


    ##### SimpleServletHandlerAdapter


    It can be convenient to configure `javax.servlet.Servlet` instances in the application
    context and put them behind the dispatcher servlet. To be able to execute those
    servlets, you need the `org.springframework.web.servlet.handler.SimpleServletHandlerAdapter`.
    It knows how to execute the `javax.servlet.Servlet`, and it always return `null`
    because it expects the servlet to handle the response itself.


    ##### AnnotationMethodHandlerAdapter


    The `org.springframework.web.servlet.mvc.annotation.AnnotationMethodHandlerAdapter`
    is used to execute methods annotated with `org.springframework.web.bind.annotation.RequestMapping`.
    It converts method arguments and gives easy access to the request parameters.
    The return value of the method is converted or added to the `org.springframework.web.servlet.ModelAndView`
    internally created by this handler adapter. This whole mapping and converting
    process is quite rigid; however, there are some extension points that enable customizing
    or adding your own type handling.


    ##### RequestMappingHandlerAdapter


    The `org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerAdapter`
    is used to execute methods annotated with `org.springframework.web.bind.annotation.RequestMapping`.
    It will convert method arguments and give easy access to the request parameters.
    The return value of the method is converted or added to the `org.springframework.web.servlet.ModelAndView`
    internally created by this handler adapter. The whole binding and converting process
    is quite configurable and flexible. A lot of the lessons learned from the `org.springframework.web.servlet.mvc.annotation
    .AnnotationMethodHandlerAdapter` have been incorporated in here; the possibilities
    are explained in [Chapters 5](#Chapter05.html#ch5) and [6](#Chapter06.html#ch6).


    #### MultipartResolver


    The `org.springframework.web.multipart.MultipartResolver` strategy interface is
    used to determine whether an incoming request is a multipart file request (used
    for file uploads); and if so, it wraps the incoming request in an `org.springframework.web.multipart.MultipartHttpServletRequest`.
    The wrapped request can then be used to get easy access to the underlying multipart
    files from the form. File uploading is explained in [Chapter 7](#Chapter07.html#ch7).
    [Listing 4-15](#Chapter04.html#list_4_15) shows `MultipartResolver` API.


    ***Listing 4-15.** The MultipartResolver API*


    `package org.springframework.web.multipart;`


    `import javax.servlet.http.HttpServletRequest;`


    `public interface MultipartResolver {`


    `    boolean isMultipart(HttpServletRequest request);`


    `    MultipartHttpServletRequest resolveMultipart(HttpServletRequest request)`

    `    throws MultipartException;`


    `    void cleanupMultipart(MultipartHttpServletRequest request);`

    `}`


    The three methods of the `org.springframework.web.multipart.MultipartResolver`
    are called during the preparation and cleanup of the request. The `isMultipart`
    method is invoked to determine whether an incoming request is actually a multipart
    request. If it is, then the `resolveMultipart` method is called, and this wraps
    the original request in a `MultipartHttpServletRequest`. Finally, when the request
    has been handled, the `cleanupMultipart` method is invoked to clean up any used
    resources. [Figure 4-13](#Chapter04.html#fig_4_13) shows the two out-of-the-box
    implementations of the `MultipartResolver`.


    ![Image](images/9781430241553_Fig04-13.jpg)


    ***Figure 4-13.** The MultipartResolver implementations*


    ##### CommonsMultipartResolver


    The `org.springframework.web.multipart.commons.CommonsMultipartResolver` uses
    the Commons `fileupload` library^([1](#Chapter04.html#CHP-4-FN-1)) to handle multipart
    files. It enables easy configuration of several aspects of the Commons `fileupload`
    library.


    ##### StandardServletMultipartResolver


    The Servlet 3.0 specification introduced a standard way of handling multipart
    forms. The `org.springframework.web.multipart.support.StandardServletMultipartResolver`
    merely serves as a wrapper around this standard approach, so that it is exposed
    in a transparent way.'
