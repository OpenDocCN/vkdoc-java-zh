    ### 将订单流程创建为子流程


    到目前为止，我们已经创建了一个用于执行身份验证的子流程。接下来，我们将进一步重构 `createOrders-flow`，并将实际*下达*订单的部分提取到一个子流程中。请记住，我们之前已将其重构为
    `createOrders-flow` 中的一个动作状态（参见清单 11-46）。


    ***清单 11-46.** 回顾用于下单的动作状态*


    `<action-state id="placeOrder">`

    `    <evaluate`

    `      expression="orderController.placeOrder(`![Image](img/U002.jpg)

    `      externalContext.sessionMap.authenticatedAccount, flowScope.orderForm)"`![Image](img/U002.jpg)

    `      result="flowScope.orderId"/>`

    `    <transition on="success" to="endOrderOk"/>`

    `</action-state>`


    接下来，我们将把这个动作状态移动到一个名为 `placeOrders-flow.xml` 的子流程中。该流程将放置在此目录中：`src/main/webapp/WEB-INF/view/placeOrders/`。为了使动作状态在子流程中正常工作，我们需要传递我们的订单表单。该订单表单存储在父流程的
    `flow` 作用域中；并且，正如我们已经看到的，子流程将拥有自己的 `flow` 作用域。因此，我们需要将订单表单从父流程的 `flow` 作用域映射到子流程的
    `flow` 作用域。账户信息不需要映射，因为我们将账户信息放在了 Servlet 的 `session` 作用域中。这个作用域在整个流程中都是可访问的（甚至在
    Web Flow 之外，例如在 Servlet 或 JSP 中，因为它是一个 JEE 作用域）。一旦子流程完成，我们还需要将订单 ID 发送回父流程。我们的子流程将如清单
    11-47 所示；此代码可以在 `placeOrders/placeOrders-flow.xml` 中找到。


    ***清单 11-47.** 创建流程*


    `<input name="orderForm" required="true"` ![Image](img/U002.jpg)

    `        type="com.apress.prospringmvc.bookstore.web.OrderForm"/>`


    `<action-state id="placeOrder">`

    `    <evaluate expression="orderController.placeOrder(externalContext`![Image](img/U002.jpg)

    `.sessionMap.authenticatedAccount, orderForm)"`

    `      result="flowScope.orderId"/>`


    `    <transition on="success" to="endOrderOk"/>`

    `</action-state>`


    `<end-state id="endOrderOk">`

    `    <output name="orderId" />`

    `</end-state>`


    首先，我们将 `orderForm` 从输入映射映射到子流程的 `flow` 作用域。我们还声明该输入是必需的，并声明它属于特定类型。`required`
    和 `type` 属性都是可选的。`type` 只是一个额外的检查，以确保输入的类型正确。当输入不是指定的类型时，将尝试进行类型转换。如果转换失败，则会引发异常。如果缺少必需的输入，则在启动子流程时会引发异常（`FlowInputMappingException`）。


    在结束状态中，我们使用 `output` 元素将结果（在本例中为订单 ID）映射回父流程。如果你有多个结束状态，并且它们都将相同的结果输出回父流程，那么你也可以从每个结束状态中移除
    `output` 元素，并将 `output` 元素放在最后一个结束状态的下方。这样，你就不必为每个结束状态重复 `output` 元素。无论哪个结束状态终止了子流程，输出都会被映射。清单
    11-48 展示了如何声明一个单一的 `output` 元素，当任何结束状态终止子流程时，该元素会将声明的变量映射到父流程。


    ***清单 11-48.** 声明单一输出元素*


    `<end-state id="endstateOne"/>`

    `<end-state id="endstateTwo"/>`

    `<output name="varX"/>`


    最后，清单 11-49 展示了父流程中的子流程状态；这将声明要执行哪个子流程，并由 `subflow` 属性指示。该值是我们要作为子流程运行的流程在 Web
    Flow 中映射的 ID。这并非新内容——我们在之前的“将身份验证实现为子流程”部分已经介绍过。


    ***清单 11-49.** 父流程中的子流程状态*


    `<subflow-state id="placeOrder" subflow="placeOrders">`

    `    <input name="orderForm"/>`

    `    <output name="orderId"/>`


    `    <transition on="endOrderOk" to="endOrderOk"/>`

    `</subflow-state>`


    在子流程状态内部，我们可以看到输入映射。这是我们将提供给子流程的值。这里，我们引用了 `orderForm` 变量。


    输出映射是输入映射的逆过程；换句话说，这是子流程返回的值，我们将把它绑定到父流程内的一个变量。对于输出映射，我们选择了变量名 `orderId`，默认情况下它将被放入
    `flow` 作用域。输出值（订单 ID）将被我们的结束状态使用，结束状态将用它来传递流程结束时将要渲染的目标 URL（我们将在下一节讨论结束状态）。转换也不是新内容——我们在“将身份验证实现为子流程”部分已经介绍过。当子流程终止时，它将触发此转换，因为
    `on` 属性与子流程的结束状态 ID 匹配，并将我们带到父流程的结束状态。


    ![Image](img/square.jpg) **警告**  你不能在 `input` 或 `output` 元素中指定作用域。例如，指定 `input
    name="flowScope.orderForm"` 将会引发异常。默认情况下，你在 `input` 元素中引用的值是从 `flow` 作用域解析的，并且值会以你在
    `output` 元素中指定的名称放回到 `flow` 作用域。这是一个合理的限制，这一点尚有争议。事实是，`flow` 作用域是唯一用于输入/输出映射的逻辑作用域，因为
    `conversation`、`flash` 和 `request` 作用域是与子流程共享的。请注意，`view` 作用域不共享，但一旦你的流程离开视图状态，它就会被清除。


    ![Image](img/square.jpg) **注意**  一个元素（`<input>`）同时出现在 `<subflow-state>` 和子流程本身中，这看起来可能很奇怪。理解这一点最好的方式是，在
    `<subflow-state>` 元素中，你定义了要从给定值/表达式中映射*到* *输入*映射的键。在作为子流程启动的流程的 `<input>` 元素中，`<input>`
    元素说明了要从*输入*映射中取出哪些键并放入子流程的 `flow` 作用域（`<output>` 元素也是同理，它映射到输出映射）。

