    Foundry 将检查我们的 `web.xml`，并在我们的 `contextConfigLocation` 文件末尾添加其自己的 Spring 上下文 XML
    文件，以供 `ContextLoaderListener` 加载。Cloud Foundry Spring 配置将执行一些魔法，例如自动将我们的数据源替换为内部的
    Cloud Foundry 数据源，我们稍后将讨论这一点。问题是，当使用 `AnnotationConfigWebApplicationContext` 时，我们不能在
