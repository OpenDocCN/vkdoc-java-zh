    框架仍然非常流行。


    它之所以仍然流行，是因为其构建应用程序的简单（而非过于简化！）方法。它还针对不同类型的技术（无论是数据访问还是消息传递基础设施）提供了一致的编程模型。该框架允许开发人员针对离散的问题，并专门为其构建解决方案。


