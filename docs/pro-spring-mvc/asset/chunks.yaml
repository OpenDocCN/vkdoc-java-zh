    ##### 使用应用控制器进行表单验证


    最终的验证方法在由 Web Flow 表达式调用的控制器方法内执行自定义验证（见清单 11-23）。你可以在 `com.apress.prospringmvc.bookstore.web.controller.OrderController`
    的 `validateDeliveryDate` 方法中看到这样一个示例，该方法在“选择配送选项”页面最终确定订单之前被调用（见清单 11-24）。


    ***清单 11-23.** 在应用控制器上调用验证方法*


    `<view-state id="selectDeliveryOptions" view="selectDeliveryOptions" model="orderForm">`

    `    <transition on="previous" to="selectBooks" />`

    `    <transition on="finish" to="end">`

    **`<evaluate expression="orderController.validateDeliveryDate`![Image](img/U002.jpg)**

    **`(flowScope.orderForm, messageContext)"/>`**

    `        <evaluate expression="orderController.placeOrder(flowScope.orderForm,`

    `              externalContext.sessionMap.authenticatedAccount)"/>`![Image](img/U002.jpg)

    `    </transition>`


    `    <transition on="cancel" to="end" />`

    `</view-state>`


    ***清单 11-24.** OrderController 上的验证方法*


    `public Event validateDeliveryDate(OrderForm orderForm, MessageContext`

    `     messageContext) {`

    `    if (orderForm.getDeliveryDate() == null){`

    `        MessageBuilder errorMessageBuilder = new MessageBuilder().error();`

    `        errorMessageBuilder.source("deliveryDate");`

    `            errorMessageBuilder.code("error.page.selectdeliveryoptions.`![Image](img/U002.jpg)`

    `                deliverydate.required");`

    `        messageContext.addMessage(errorMessageBuilder.build());`

    `        return new EventFactorySupport().error(this);`

    `    }`


    `if (orderForm.getDeliveryDate().before(`

    `        DateUtils.truncate(orderForm.getOrderDate(), Calendar.DAY_OF_MONTH))){`

    `        MessageBuilder errorMessageBuilder = new MessageBuilder().error();`

    `        errorMessageBuilder.source("deliveryDate");`

    `        errorMessageBuilder.code("error.page.selectdeliveryoptions.`![Image](img/U002.jpg)`

    `                                  deliverydate.in.past");`

    `        messageContext.addMessage(errorMessageBuilder.build());`

    `        return new EventFactorySupport().error(this);`

    `    }`

    `    return new EventFactorySupport().success(this);`

    `}`


    当用户在输入配送选项后点击“完成”按钮（触发 `finish` 转换）时，用于验证配送日期的评估动作会被执行。该调用发生在创建实际订单的调用之前。我们传递了表单和
    `messageContext`（一个 Web Flow 隐式对象）。在其中，如上述代码片段所示，当验证失败时，我们使用消息上下文添加一条自定义消息。


    你可能已经注意到，该方法返回了 `org.springframework.webflow.execution.Event`。这与我们之前在使用评估表达式时调用的其他方法形成对比。例如，`com.apress.prospringmvc.bookstore.web.controller.OrderController`
    中的 `addBook` 方法仅返回 `void`。


    当执行一个表达式时，其结果（如果还不是一个 `Event`）会在内部被转换为一个 `Event`。这些对象驱动转换，指示评估是成功还是失败（或任何其他基于
    `java.lang.String` 的结果）。此外，这些对象还可以选择性地将对象作为属性与之关联。


    当你不需要触发结果条件时，就没有必要使用 `Event` 作为返回值，你可以直接返回值（或直接返回 `void`）。Web Flow 会为你将其转换为一个成功的
    `Event`。


    然而，在这种情况下，我们需要区分验证成功和验证失败。两者将呈现不同的结果。在第一种情况下，我们希望继续订单创建过程；在第二种情况下，我们希望再次渲染“选择配送选项”页面以显示错误消息，并让用户重试。我们通过事件显式地发出此信号。请注意，我们可以为成功的
    `Event` 附加一个结果，然后可以使用评估动作的 `result` 属性来绑定该结果。我们将在本章后面的“处理结果事件”部分讨论这一点。

