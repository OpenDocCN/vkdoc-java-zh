    如你所见，结果仅包含整个页面的一部分；即，仅包含 `showSelectedBooks.jsp` 中定义的部分。接收部分视图更新的 JavaScript 现在会尝试匹配一个与更新中类型和
    ID 相同的元素（这就是我们显式命名 `<div>` 元素 ID 为 `selectBooks` 的原因）。然后，它会用接收到的更新替换该内容。


    就是这样！如果你现在点击“添加”按钮，你会注意到浏览器不再执行普通的表单提交或页面刷新。例如，在 Safari 中，你将不再看到浏览器状态栏中在点击添加按钮时弹出的提交表单进度条。现在，按下添加按钮时发生的视图更新将带来更流畅的体验，因为只有包含所选书籍的表格被更新，而不是整个页面。


    ##### 使用 JQuery


    除了使用 Spring JS，客户端部分也可以轻松地被其他 JavaScript 库替代。例如，你可能更熟悉 JQuery（或 ProtoType 或其他库）。只要强制性的额外请求参数
    `_eventId_xxx` 和 `ajaxSource` 存在，这些库将产生相同的效果。这些参数由 Spring JS 自动添加，但在使用其他 JavaScript
    库时需要手动添加。


    例如，如果你将清单 12-27 中的 Spring JS 脚本替换为 JQuery 脚本，你会发现这也能毫无问题地工作。要创建该脚本，我们需要下载最新版本的
    JQuery（撰写本文时为版本 1.7.1）并将其添加到 HTML 的 `head` 部分。


    ***清单 12-27** 在 WEB-INF/templates/header.jsp 中额外导入 JQuery*


    `<spring:url value="/resources/jquery/jquery-1.7.1.min.js" var="jquery" />`

    `<script type="text/javascript" src="${jquery}"></script>`


    接下来，我们可以在 `WEB-INF/view/createOrders/selectBooks.jsp` 中将 Spring JS 替换为等效的 JQuery，如清单
    12-28 所示。


    ***清单 12-28** 用 JQuery 替换 Spring JS JavaScript*


    `<script type="text/javascript">`


    `    $(function () {`

    `        var submit = $(''#add'');`


    `            submit.click(function() {`

    `                var form = $(''#selectBookForm'');`

    `                var event = submit.attr(''name'');`

    `                var data = form.serialize()+ ''&amp;'' + event + ''='' + event
    +`![Image](img/U002.jpg)

    `                           ''&amp;ajaxSource='' + submit.attr(''id'');`


    `                $.ajax({`

    `                    type: "POST",`

    `                    dataType: ''text'',`

    `                    url: form.attr( ''action'' ),`

    `                    data: data,`

    `                    success : function(result) {`

    `                        $(''#selectedBooks'').replaceWith(result);`

    `                    }`

    `                });`

    `            return false;`

    `        }):`

    `    });`

    `</script>`


    如你所见，JQuery 替代方案需要更多代码。我们或许可以使其更简短一些，但 Spring JS 的优势在于它是专门为此任务优化的。然而，如果你习惯使用 JQuery，你可能会发现这是一个更好的选择。


    该脚本手动构建每一步。我们首先为添加按钮（即用于添加新书的提交按钮）添加一个点击事件监听器。该事件监听器在所有内容加载完成后绑定。


    你还可以看到，当我们在 `data` 变量中组合请求数据时，我们序列化表单以添加所有输入元素，并手动添加参数 `ajaxSource` 和 `_eventId_xxx`。


    ![Image](img/square.jpg) **注意** `$(#xxx)` 是一个 JQuery 选择器，它根据对象的 ID 在 DOM 中查找对象。`$(function
    () {})` 是 `$(document).ready(function(){})` 的简写形式。它与 `dojo.addOnLoad(function(){}.`
    功能相同。


    接下来，我们组装请求，并标识提交按钮和表单。我们序列化表单，并手动附加所需的参数。这些参数基于提交按钮的 name 和 id。提交的 URL 也取自表单。使用此
    URL，我们现在可以执行 POST Ajax 调用，并且 URL 和参数与 Spring JS 发送的相同。作为响应，我们从服务器获取部分渲染的视图。剩下唯一要做的事情就是用
    HTML 响应内容替换整个目标对象。


    必须说明的是：使用 JQuery 时，你还应该注意处理服务器返回的错误。使用 Spring JS 时，你会自动获得错误检测支持：错误会很好地显示在弹出窗口中。此外，还可以直接在弹出窗口中显示渲染的内容。

