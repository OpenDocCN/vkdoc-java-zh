    \ Also, because you will be using such tools to automate your build, your tests\
    \ should be environment-agnostic. They should be able to run even on your Smartphone\
    \ without requiring any resource or environment dependency. Tests should be able\
    \ to run everywhere. Tests should also be easy to run, preferably with a single\
