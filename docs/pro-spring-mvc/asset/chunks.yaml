  trans: '

    对于在父流程和子流程中指定了相同标识符的不可合并元素，同样适用此规则：子流程的值优先。例如，父流程有以下 var 元素：`<var name="x" value="com.apress.prospringmvc.bookstore.**ClassX**"/>`。子流程也有一个同名但值不同的
    var 元素：`<var name="x" value="com.apress.prospringmvc.bookstore.**ClassY**"/>`。通用的覆盖规则在此适用，名为
    `x` 的变量将拥有类型为 `com.apress.prospringmvc.bookstore.**ClassY**` 的对象值，即子流程中的值。如果我们将子流程中的
    `<var>` 元素移除，那么将只剩下一个名为 `x` 的 var 元素（即父流程中的那个）。在这种情况下，变量 `x` 将变成类型为 `ClassX` 的对象。


    ![Image](img/square.jpg) **警告** 父流程中外部资源的路径应为绝对路径。当两个流程合并时，相对路径将会失效，除非父流程和子流程位于同一目录。合并后，父流程中的所有相对路径都将变为相对于子流程的路径。在我们的示例中，这问题不大，因为我们不直接处理资源。我们的视图是字面量，与
    Tiles 配置中的定义名称相匹配。但是，如果你没有使用 Tiles，而是直接在流程中引用 JSP，那么你可能会遇到这样的情况（假设示例）：一个位于 `WEB-INF\views\parent\parent-flow.xml`
    的 `parent-flow` 流程，它有一个单一的 `view` 状态：


    `<view-state id="someViewState" view="thePage.jsp"/>`


    在这种情况下，`thePage.jsp` 与流程位于同一位置（`WEB-INF\views\parent\thePage.jsp`）。因此，它是一个指向资源的相对指针。如果另一个目录（例如
    `WEB-INF\views\child\child-flow.xml`）中的子流程现在要继承此流程，那么来自 `someViewState` 的 `view`
    状态的 `thePage.jsp` 资源将尝试从子流程的位置 `WEB-INF\views\child\thePage.jsp` 解析——当然，该位置并不存在。在这种情况下，你应该通过指定完整路径来使资源路径变为绝对路径。与其在父流程中指定
    `view="thePage.jsp"`，不如指定以下路径：


    `view="WEB-INF\views\parent\thePage.jsp"`


    #### 状态继承


    除了在 flow 元素上指定 `parent` 属性外，你还可以在各个状态上指定 `parent` 属性。如果你希望对父流程中的哪些元素实际被继承进行更精细的控制，这会很有用。这仅在未在
    flow 级别应用继承时才有意义；换句话说，仅当你未在 flow 元素上指定 `parent` 属性，而仅在你希望继承的那些状态上指定它时才有意义：


    *   与流程继承不同，你只能从一个状态继承。

    *   你继承的父状态应为同一类型。例如，`view` 状态不能继承自 `action` 状态。

    *   基本上，适用于流程继承的相同规则也适用于此处。唯一的区别是粒度级别更细，因为你现在可以指示需要继承哪些元素。唯一显著的区别是，状态始终与指定的父状态合并。对于流程继承，元素是否具有相同的
    key 属性很重要，因此它可以被合并或原样保留。由于我们在此直接指定状态，因此无论何种情况，它始终会被合并。

    *   你必须指定要继承的状态所在的流程。格式如下：`parent="parent-flow#parent-state"`


    ![Image](img/square.jpg) **注意** 你可能会想，如果父流程和子流程中存在同名的 `view` 状态，并且它们应用了状态继承，会发生什么情况。例如，在子流程中，假设有一个这样的
    `view` 状态：`<view-state id="viewStateX" view="someView" parent="parent#viewStateX">`。同时，父流程也有一个名为
    `viewStateX` 的 `view` 状态。如前所述，这无关紧要。状态始终会被合并。在这种情况下，父流程中定义的 `viewStateX` 的每个属性和元素都会与子流程中的
    `viewStateX` 合并。如果父流程和子流程都提供了相同的属性或具有相同标识符的元素，则保留子流程的版本。


    ### Web Flow 配置自定义


    在第一章中，我们向你介绍了核心的 Web Flow 配置。接下来，我们将了解如何对此配置进行一些调整，这些调整可能对你的应用程序性能以及/或者流程在应用程序中的管理方式很重要。


    我们还看到 Web Flow 默认使用 SpEL，但并非必须如此。我们将讨论的第二个自定义项解释了如何将默认表达式语言更改为其他语言。

