    The first step in enabling file uploads is to configure our environment. As Spring
    provides two different technologies out of the box, each of these requires a different
    set of configuration items. We will look at the Servlet 3.0 multipart support
    and afterward at commons-fileupload.


    Which one to choose depends on the requirements. If the application is strictly
    to run in a Servlet 3.0 environment, use the standard multipart support as specified
    by the Servlet specification. If the application needs to run in older containers
    also, choose the commons-fileupload support.


