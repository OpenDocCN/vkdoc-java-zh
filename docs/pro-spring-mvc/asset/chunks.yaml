    **注意** 为什么我们在仅仅进行基本设置时，要通过引入哈希密码而不是纯文本密码来使事情变得更复杂？我们这样做是有充分理由的。永远不要以纯文本形式存储密码。即使在临时（或基本）解决方案中也不行。一位智者曾告诉我们，“在实践中，临时解决方案等同于将永远存在的生产就绪解决方案。”问问你自己；你开发过多少次临时解决方案，而它至今仍在使用？此外，在使用
    Spring Security 或 Java 时，没有充分的理由不对密码进行哈希处理。使用 Apache Commons Codec，^(7) 你可以用一行代码创建一个哈希。永远不要存储纯文本密码！此外，如果有人进行审计并发现密码是纯文本的，你将会遇到麻烦。这是任何安全应用程序的第一步。    你可能想知道，我们最初是如何生成哈希的？我们可以编写一个小型
    Java 工具来为我们完成这项工作，使用 Apache Commons Codec：  `String hashedPassword =` ![Image](img/U002.jpg)
    `org.apache.commons.codec.digest.DigestUtils.sha256Hex(plainTextPassword);`  或者，我们可以用谷歌搜索一个在线网站来做到这一点。网上也有很多免费工具可以生成任何类型的哈希。有一点需要注意，使用在线生成器时要小心，因为你将传递真实的密码。对于测试目的，这没问题，但对于真实场景，请考虑自己编写一个工具或下载一个知名工具**^(8)**。    我们进行哈希处理的密码是“secret”。如果你验证这一点，你会注意到哈希并不完全匹配。在这种情况下，我们使用的是“加盐哈希”，它只不过是在密码后面附加了在认证用户时可以找到的额外数据。例如，它可以是用户的名字。在这种情况下，我们选择了最简单的元素：用户名。    __________    ⁷
    [`http://commons.apache.org/codec/`](http://commons.apache.org/codec/)    ⁸ [`http://www.slavasoft.com/hashcalc/`](http://www.slavasoft.com/hashcalc/)
    `(仅限 Windows - 免费软件)` [`http://sourceforge.net/projects/hash-calculator/files/hash-calculator/`](http://sourceforge.net/projects/hash-calculator/files/hash-calculator/)
    `(Java - 开源)`    盐的目标是使摘要更加唯一。如果两个用户使用相同的密码，将生成相同的哈希。当使用盐时，哈希会不同，因为它们是使用另一个后缀（在本例中是他们的用户名）计算的。    拥有相同的哈希本身并无害处，因为它们（实际上）无法被逆向工程。但是，你正在给出一个免费的提示：查看哈希的人可能会注意到多个用户具有相同的哈希，从而隐式地知道他们也具有相同的密码。通过添加盐，你消除了最后一个提示，并且还使密码更长。密码越长，哈希抵抗攻击的能力就越强。    Spring
    使用以下方案计算加盐哈希：  `plaint_text_password{salt}`  在我们的例子中，我们必须将哈希计算为 `secret{jd}`，其中
    `jd` 是我们用户的用户名。如果你现在尝试使用此输入字符串重新生成哈希，你会注意到它将与上面显示的哈希匹配。我们将按照清单 13-8 所示进行配置。    ***清单
