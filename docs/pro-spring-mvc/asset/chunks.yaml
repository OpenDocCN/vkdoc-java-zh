    它是如何工作的？    你可能想知道，我们如何能够将数据保存在 MySQL 数据库中，因为我们从未在应用程序中配置过另一个数据源。事实上，我们所做的就是告诉
    Cloud Foundry 我们想要使用 MySQL 作为应用程序服务。我们从未更改 `com.apress.prospringmvc.bookstore.config.InfrastructureContextConfiguration`
    类中的数据源配置，但我们似乎仍然能够连接到 Cloud Foundry 上的 MySQL。    这背后的魔法是由 Spring 所谓的*自动重新配置*来解释的（更多信息请参见
    Spring 博客上的博文^(8)）。    还记得我们在部署时可以选择应用程序类型吗？我们选择了 Spring，这使 Cloud Foundry 和 Spring
    能够施展它们的魔法。发生的情况是，在部署过程中，额外的配置被添加到你的 `web.xml` 中，这些配置将一些额外的 Spring bean 注册到你的 `ApplicationContext`
    中。（这正是我们之前解释的需要使用 XML 配置的原因。）其中一个 bean 是 `org.cloudfoundry.reconfiguration.CloudAutoStagingBeanFactoryPostProcessor`^(9)，它将查找代表服务的
    bean（例如，`javax.sql.DataSource`、`org.springframework.data.mongodb.MongoDBDFactory`
    等的实例），这些 bean 可以被其他了解绑定到你的应用程序的应用程序服务的云感知 bean 替换。    但是 Hibernate 方言呢？之前我们使用的是
    H2，现在我们使用的是 MySQL——但我们不必告诉 Hibernate 任何关于此事的信息。事实证明，最近的 Hibernate 版本有一个方便的特性，可以从实际连接中检测数据库类型，因此不再需要显式配置要使用的方言。    ![Image](img/square.jpg)
    **注意**  这有其缺点：如果你的数据库在应用程序启动时未启动或无法访问，Hibernate 将在运行时失败。    #### 其他配置选项    自动重新配置并不是配置应用程序的唯一方法。另一种更显式的可能性是使用云配置命名空间。使用该命名空间，我们可以在
    XML 中配置数据源，如清单 A-7 所示。    __________________    ⁸ [`http://blog.springsource.org/2011/11/04/using-cloud-foundry-services-with-spring-part-2-autoreconfiguration/`](http://blog.springsource.org/2011/11/04/using-cloud-foundry-services-with-spring-part-2-autoreconfiguration/)    ⁹
    [`https://github.com/cloudfoundry/vcap-java/tree/master/auto-reconfiguration/src/main/java/org/cloudfoundry/reconfiguration`](https://github.com/cloudfoundry/vcap-java/tree/master/auto-reconfiguration/src/main/java/org/cloudfoundry/reconfiguration)    ***清单
    A-7.** 使用云命名空间*  `<?xml version="1.0" encoding="UTF-8"?>` `<beans`    `      
    xsi:schemaLocation="http://www.springframework.org/schema/beans` `         http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`
    `         http://www.springframework.org/schema/context` `         http://www.springframework.org/schema/context/spring-context-3.1.xsd`
    `         http://schema.cloudfoundry.org/spring` `         http://schema.cloudfoundry.org/spring/cloudfoundry-spring-0.8.xsd"`
    `profile="cloud">`  `    <cloud:data-source id="dataSource" />` `</beans>`  在
    beans 元素上设置 `profile="cloud"` 属性意味着只有在“cloud”配置文件处于活动状态时，才会使用该元素内定义的 bean。`cloud:datasource`
    元素是一个“普通”数据源，表示绑定到此应用程序的关系数据库应用程序服务。    将此与 Cloud Foundry 自动将 *cloud* 设置为活动应用程序配置文件的事实相结合，我们可以使用该配置文件进行特定于云的配置。如果我们想同时使用多个相同类型的云服务（例如，MySQL
    和 PostgreSQL 服务），这种显式配置甚至是必需的。    如果我们不希望 Spring 使用自动重新配置，我们总是可以使用 *war* 应用程序类型。如果我们使用该类型部署，我们的应用程序将不会以任何方式被触及。    ####
    本地部署    到目前为止，我们已经部署到了 cloudfoundry.com 上的实际云基础设施，该基础设施由 VMWare 托管。但是 CloudFoundry.com
    提供了另一种解决方案，一种不需要我们总是连接到远程系统的解决方案。它被称为 *MicroCloud*，它作为虚拟机（一个 VMWare 镜像）分发，我们可以在本地运行（例如，在免费的
    VMWare Player 上）。    你可以从 [`https://my.cloudfoundry.com/micro`](https://my.cloudfoundry.com/micro)
    下载 MicroCloud（需要有效的 CloudFoundry.com 帐户才能下载）。在同一网站上，你还可以找到有关如何配置 MicroCloud 的说明。完成后，部署过程与在
    CloudFoundry.com 上部署完全相同；你只需使用不同的目标。    ### 使用 Cloud Foundry 进行调试    事情并不总是按计划进行，有时你需要调试你的应用程序。    虽然你始终可以在自己的
    Tomcat 实例上部署时调试应用程序，但 MicroCloud 也支持使用 Java 调试器连接。为此，你可以使用“调试”按钮而不是“启动”按钮来启动应用程序。一旦应用程序以调试模式启动，你就可以像调试任何其他本地启动的应用程序一样调试它。    另一种了解在云端运行时发生了什么的方法是利用日志文件。你可以使用
    STS 中的“远程系统”视图访问它们，你可以通过“窗口” ![Image](img/U003.jpg) “显示视图” ![Image](img/U003.jpg)
    “其他...”找到该视图，然后搜索“远程系统”。你可以浏览远程目录结构并下载日志文件以查看其内容（参见图 A-12）。  ![Image](img/9781430241553_App-12.jpg)  ***图
    A-12.** 远程系统视图*    如果你想远程访问你的服务（例如，你想检查当前数据），Cloud Foundry 提供了 Caldecott gem，它允许你创建一个隧道^(10)
    连接到它们。例如，你可以使用 `vmc tunnel mysql --port 12345` 这样的命令来隧道连接到本地端口 12345 上的远程 MySQL。现在只需将你的
    MySQL 或 JDBC 客户端指向该端口即可访问数据。你可以在 [`http://blog.cloudfoundry.com/post/12928974099/now-you-can-tunnel-into-any-cloud-foundry-data-service`](http://blog.cloudfoundry.com/post/12928974099/now-you-can-tunnel-into-any-cloud-foundry-data-service)
    找到有关 Caldecott 的更多信息。    __________________    ¹⁰ [`http://bit.ly/akrcc1`](http://bit.ly/akrcc1)    ###
    总结    本附录涵盖了 Cloud Foundry 以及如何将你的应用程序部署到其上。    有几件事将 Cloud Foundry 与其他 PaaS 提供商区分开来：一是
    Cloud Foundry 的开源性质，另一个是其与 Spring 框架的出色集成。虽然 Cloud Foundry 为大多数应用程序承诺了无缝的部署模型，允许你按原样部署应用程序，但在书店应用程序的情况下，你必须进行一些调整。这些调整是必需的，主要是因为您使用的
    Tomcat 版本比 Cloud Foundry 当前提供的版本更新。    Cloud Foundry 目前仍处于测试阶段，因此它正在快速发展，新的特性和服务仍在添加中。虽然你可能偶尔会遇到一些粗糙的边缘，但它绝对值得关注，看看它未来如何发展。    ##
