    #### HandlerExceptionResolver


    在大多数情况下，您希望控制如何处理请求处理过程中发生的异常。为此，您可以使用 `HandlerExceptionResolver`。该 API（参见清单 4-18）包含一个单一方法，该方法由调度器
    servlet 检测到的 `org.springframework.web.servlet.HandlerExceptionResolver` 调用。解析器可以选择自行处理异常，或者返回一个包含要渲染的视图和模型（通常包含抛出的异常）的
    `org.springframework.web.servlet.ModelAndView`。


    ***清单 4-18.** HandlerExceptionResolver API*


    `package org.springframework.web.servlet;`


    `import javax.servlet.http.HttpServletRequest;`

    `import javax.servlet.http.HttpServletResponse;`


    `public interface HandlerExceptionResolver {`


    `    ModelAndView resolveException(HttpServletRequest request,`

    `                                  HttpServletResponse response,`

    `                                  Object handler,`

    `                                  Exception ex);`


    `}`


    图 4-16 展示了 Spring 框架提供的不同实现。每个实现的工作方式略有不同，其配置方式也各不相同（更多信息请参见第 6 章）。


    ![Image](img/9781430241553_Fig04-16.jpg)


    ***图 4-16.** HandlerExceptionResolver 实现*


    `org.springframework.web.servlet.handler.HandlerExceptionResolverComposite` 是
    Spring MVC 内部使用的一个实现。它用于将多个 `org.springframework.web.servlet.HandlerExceptionResolver`
    实现链接在一起。此解析器不提供实际的实现或附加功能；相反，它仅充当多个实现（当配置了多个实现时）的包装器。


    #### RequestToViewNameTranslator


    当处理器未返回视图实现或视图名称，且未自行向客户端发送响应时，`org.springframework.web.servlet.RequestToViewNameTranslator`
    会尝试根据传入请求确定视图名称。默认实现（参见图 4-17）`org.springframework.web.servlet.view.DefaultRequestToViewNameTranslator`
    会简单地获取 URL，去除后缀和上下文路径，然后将剩余部分用作视图名称（例如，[`http://localhost:8080/bookstore/admin/index.html`](http://localhost:8080/bookstore/admin/index.html)
    变为 `admin/index`）。您可以在第 8 章中找到有关视图的更多信息。


    ![Image](img/9781430241553_Fig04-17.jpg)


    ***图 4-17.** RequestToViewNameTranslator 层次结构*


    `RequestToViewNameTranslator` API 如清单 4-19 所示。


    ***清单 4-19.** RequestToViewNameTranslator API*


    `package org.springframework.web.servlet;`


    `import javax.servlet.http.HttpServletRequest;`


    `public interface RequestToViewNameTranslator {`


    `    String getViewName(HttpServletRequest request) throws Exception;`


    `}`


    #### ViewResolver


    Spring MVC 提供了一种非常灵活的视图解析机制。它简单地获取从处理器返回的视图名称，并尝试将其解析为实际的视图实现（如果未返回具体的 `org.springframework.web.servlet.View`）。实际的实现可以是
    JSP，但同样也可以是 Excel 电子表格或 PDF 文件。有关视图解析的更多信息，请参阅第 8 章。


    此 API（参见清单 4-20）非常简单，仅包含一个方法。该方法接收视图名称和当前选定的区域设置（另请参阅 `LocaleResolver`）。这可用于解析为实际的
    `View` 实现。当配置了多个 `org.springframework.web.servlet.ViewResolver` 时，调度器 servlet
    会依次调用它们，直到其中一个返回要渲染的 `View`。


    ***清单 4-20.** ViewResolver API*


    `package org.springframework.web.servlet;`


    `import java.util.Locale;`


    `public interface ViewResolver {`


    `    View resolveViewName(String viewName, Locale locale) throws Exception;`


    `}`


    `ViewResolver` 的实现如图 4-18 所示。Spring 开箱即用地提供了多种实现（更多信息请参见第 8 章）。


    ![Image](img/9781430241553_Fig04-18.jpg)


    ***图 4-18.** ViewResolver 实现*


    #### FlashMapManager


    `org.springframework.web.servlet.FlashMapManager` 用于在 Spring MVC 应用程序中启用 flash
    “作用域”。您可以使用此机制将属性放入 flash 映射中，这些属性在重定向后被检索（flash 映射在一次请求/响应周期中存活）。视图渲染后，flash
    映射会被清除。Spring 提供了一个单一实现 `org.springframework.web.servlet.support.SessionFlashMapManager`（参见图
    4-19）。


    ![Image](img/9781430241553_Fig04-19.jpg)


    ***图 4-19.** FlashMapManager 层次结构*


    清单 4-21 展示了 FlashMapManager 的 API。


    ![Image](img/square.jpg) **注意** 此处提到的 flash “作用域”与 Spring Web Flow 中使用的“flashscope”无关。


    ***清单 4-21.** FlashMapManager API*


    `package org.springframework.web.servlet;`


    `import javax.servlet.http.HttpServletRequest;`

    `import javax.servlet.http.HttpServletResponse;`


    `public interface FlashMapManager {`


    `    FlashMap retrieveAndUpdate(HttpServletRequest request,`

    `                               HttpServletResponse response);`


    `    void saveOutputFlashMap(FlashMap flashMap,`

    `                            HttpServletRequest request,`

    `                            HttpServletResponse response);`

    `}`


    ### 总结


    本章首先探讨了请求处理工作流，确定了在此过程中起作用的组件。`DispatcherServlet` 可被视为 Spring MVC 中的主要组件，它扮演着最关键的**前端控制器**角色。Spring
    MVC 中的 MVC 模式非常明确：您拥有一个 `Model`、一个 `View` 以及一个 `Controller`（处理器）。处理器处理请求、填充模型并选择要渲染的视图。


    在处理请求时，`DispatcherServlet` 使用许多不同的组件来发挥其作用。最重要的组件是 `HandlerMapping` 和 `HandlerAdapter`；这些组件分别是用于映射和处理请求的核心组件。要应用横切关注点，您可以使用
    `HandlerInterceptor`。处理请求后，需要渲染视图。处理器可以返回一个 `View` 或要渲染的视图名称。在后一种情况下，此名称会传递给 `ViewResolver`
    以解析为实际的视图实现。


    此外，还提供了对 flash 作用域变量的基本支持。为此，引入了 `FlashMapManager` 的概念。有时，请求处理不会按您期望的方式进行。例如，您可能会遇到异常。为了处理这些异常，您可以使用
    `HandlerExceptionResolver`。在此过程中起作用的最后两个组件是 `LocaleResolver` 和 `ThemeResolver`。它们共同在您的应用程序中实现了国际化和主题化。


    本章还提到了调度器 servlet 包含一些默认配置的组件，并将这些默认组件与 Spring @MVC 的默认组件进行了对比，后者可以通过使用 `@EnableWebMvc`
    注解来启用。我们还探讨了这两种方法的不同默认组件。


    接下来的章节将解释如何构建控制器来处理请求，并更深入地探讨如何配置 Spring MVC。


