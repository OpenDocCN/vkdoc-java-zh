  trans: '

    当你确定要加载哪些上下文后，可以在类上使用 `@ContextConfiguration` 注解来指定它们。使用此注解时，你可以通过 `locations`
    属性（接收一个 XML 配置文件数组）指定上下文 XML 文件，或者通过 `classes` 属性（接收一个 `@Configuration` 类数组）来加载上下文。你*不能*同时使用两者。如果你想混合使用
    XML 和类，则必须从其中一方加载另一方。这意味着，如果你想使用 XML，但同时需要加载 `@Configuration` 类，则必须从某个 XML 上下文文件中加载它们。如果你在使用
    `@Configuration` 类，则必须在其中一个类中使用 `@ImportResource` 来加载所需的 XML 配置文件。


    我们将使用生产环境的上下文类，因此我们将使用 `classes` 属性（参见清单 9-5）。


    ***清单 9-5.** 添加用于加载 Spring 配置的上下文配置*


    `package com.apress.prospringmvc.bookstore.repository;`


    `import org.junit.runner.RunWith;`

    `import org.springframework.test.context.junit4.SpringJUnit4ClassRunner;`

    `import com.apress.prospringmvc.bookstore.config.`![Image](img/U002.jpg)

    `       InfrastructureContextConfiguration;`

    `import com.apress.prospringmvc.bookstore.config.TestDataContextConfiguration;`

    `import org.springframework.test.context.ContextConfiguration;`

    **`@RunWith(SpringJUnit4ClassRunner.class)`**

    **`@ContextConfiguration(classes = { InfrastructureContextConfiguration.class,`![Image](img/U002.jpg)**

    **`TestDataContextConfiguration.class })`**

    `public class JpaBookRepositoryTest {`


    `}`


    仅此而已。当你以 JUnit 测试方式运行时，得益于 Spring 测试支持（其本身由 `SpringJUnit4ClassRunner` 初始启动），Spring
    上下文将被启动。在我们的例子中，这意味着所有仓库和服务都被加载到上下文中，并且一个内存数据库被启动并预填充了数据。


    在本节中，我们只测试 `JpaBookstoreRepository`。但还有很多其他类需要测试。我们将为每个类创建相应的测试，并应用相同的注解来为每个测试类加载上下文。


    ![Image](img/square.jpg) **注意** 与其为每个测试类独立重复注解配置，不如将其移动到一个公共超类中，让每个测试类继承它。这样就能避免在每个测试类中重复相同的注解配置。JUnit
    注解（如我们之前看到的 `@Before`、`@After` 等）也是如此。然而，为了让每个类自身完整，我们重复了配置。此外，你不应仅仅为了避免重复注解配置而创建超类。只有当这些类有更多共同点时，才这样做。例如，为了测试你的仓库，你可以设置一个超类，它包含注解配置并设置一个对所有仓库测试都有用的最小数据集。创建仅包含注解配置的超类，很快就会导致这些类过度膨胀，并使你的代码变得不够清晰。


    由于这是一个小型项目，上下文几乎可以瞬间加载。对于较大的项目，这可能会花费更多时间。为了确保上下文不会为每个类独立加载，Spring 测试框架提供了 Spring
    应用上下文的一致加载和缓存功能。对已加载上下文的缓存支持非常重要，因为启动时间可能成为一个问题——这并非 Spring 本身的问题，而是因为 Spring
    容器实例化的对象需要时间。例如，一个包含许多 Hibernate 映射文件的项目，由于需要解析每个映射文件，加载可能需要几秒钟。如果上下文只加载一次，额外
    5 秒的加载时间不会很明显。但如果它为每个测试单独加载（例如，你有 200 个测试），那么 5 秒的额外加载时间意味着你的测试集将毫无理由地多运行 16 分钟。如果你的测试运行缓慢，就会开始拖累你的基础设施，这可能导致人们找借口不写测试，因为“它们运行得太慢了”。保持测试集精简高效非常重要，这样运行测试集所花费的时间就能尽可能少。


    默认情况下，一旦配置好的 `ApplicationContext` 被加载，它就会为每个测试重用。因此，设置成本（每个测试套件）只产生一次，后续的测试执行会快得多。在此上下文中，术语*测试套件*指在同一个
    JVM 中运行的所有测试。然而，当你逐个从 STS 运行测试时，这意味着应用上下文将为每个测试单独启动。解决方案（使用 JUnit）是构建一个套件，或者使用你的构建工具（在我们的例子中是
    Gradle）来运行它们。在这种情况下，应用上下文将只为所有运行的测试加载一次。使用 Gradle 构建 chapter9 示例项目将自动运行测试。你首先进入
    chapter9 示例目录，然后发出以下 Gradle 命令来启动构建：


    `$ gradle build`


    输出将类似于这样：


    `:bookstore-shared:compileJava UP-TO-DATE`


