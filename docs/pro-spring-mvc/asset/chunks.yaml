    #### 异常处理


    如第 4 章所述，当请求处理过程中发生异常时，Spring 会尝试处理该异常。为了提供一种通用的异常处理方式，Spring 使用了另一种策略，该策略可以通过实现
    `org.springframework.web.servlet.HandlerExceptionResolver` 接口来利用。


    `org.springframework.web.servlet.HandlerExceptionResolver` 为调度器 servlet 提供了一个回调方法（参见清单
    6-17）。当请求处理工作流中发生异常时，会调用此方法。该方法可以返回一个 `org.springframework.web.servlet.ModelAndView`，也可以选择自行处理该
    `Exception`。


    ***清单 6-17.** HandlerExceptionResolver 接口*


    `package org.springframeowork.web.servlet;`


    `import javax.servlet.http.HttpServletRequest;`

    `import javax.servlet.http.HttpServletResponse;`


    `public interface HandlerExceptionResolver {`


    `  ModelAndView resolveException(HttpServletRequest request,`

    `                                HttpServletResponse response,`

    `                                Object handler,`

    `                                Exception ex);`

    `}`


    默认情况下，调度器 servlet 会在应用程序上下文中查找所有类型为 `org.springframework.web.servlet.HandlerExceptionResolver`
    的 bean（参见第 4 章中的“配置 DispatcherServlet”部分）。当检测到多个解析器时，调度器 servlet 会依次咨询每个解析器，直到返回一个视图名称或写入响应。如果异常无法处理，则会重新抛出异常，以便
    servlet 容器进行处理。servlet 容器将使用其配置中的错误页面配置，或者直接将异常传播给用户。（在大多数情况下，您会在屏幕上看到一个带有堆栈跟踪信息的
    500 错误。）


    Spring MVC 提供了 `org.springframework.web.servlet.HandlerExceptionResolver` 接口的多个实现，如图
    6-6 所示。请注意，每个实现的工作方式都不同。表 6-4 简要概述了不同实现的工作方式。


    ![Image](img/9781430241553_Fig06-07.jpg)


    ***图 6-7.** HandlerExceptionResolver 层次结构*


    ![Image](img/tab_6_4.jpg)


    如图 6-7 中的类图所示，所有用于解析异常的可用的实现都扩展了 `org.springframework.web.servlet.handler.AbstractHandlerExceptionResolver`。这是一个方便的父类，为所有实现提供了通用特性和配置选项。表
    6-5 列出并简要描述了其通用属性。


