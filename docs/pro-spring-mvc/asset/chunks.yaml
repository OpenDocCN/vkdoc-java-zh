    完成最终修改后，我们可以运行应用程序并进入`Orders`概览页面。具体操作是点击导航栏中的“Orders overview”。图 12-8 展示了用户 ID
    为`jd`的客户的订单。


    ![Image](img/9781430241553_Fig12-08.jpg)


    ***图 12-8.** 新的订单概览页面，显示了订单列表以及查看详情的链接*


    在上述代码中，`Order`实体存储在`view`作用域中。`OrderDetails`页面（在详情视图中需要用到）的`Book`实体尚未初始化。最后，当用户点击`View`链接时，详情信息将在弹出窗口中打开（参见图
    12-9）。


    ![Image](img/9781430241553_Fig12-09.jpg)


    ***图 12-9.** 点击查看链接会弹出一个窗口，显示订单详情*


    Web Flow 将选中的`Order`实体从`view`作用域移到了`flash`作用域。接着，我们指示 Web Flow 渲染`orderDetail`的`view`状态。该`view`状态显示了`Book`实体的信息。在正常情况下，此时我们会收到一个`LazyInitializationException`，因为`Book`实体尚未加载。然而，得益于我们流管理的持久化上下文，这些实体仍然处于被管理状态，额外的数据得以加载。我们成功获取了详情，没有抛出任何异常。


    为了证明这确实有效，我们切换回`OpenEntityManagerInViewFilter`并禁用了`JpaFlowExecutionListener`。我们还在`WebMvcContextConfiguration`和`WebflowContextConfiguration`中禁用了`CommonDataHandlerInterceptor`。`CommonDataHandlerInterceptor`负责加载随机书籍。如果启用，它会在我们的持久化上下文中静默加载书籍，这样我们就无法进行客观的测试。最后，我们还需要将`OrderDetail`实体中的`Book
    @ManyToOne`关联标记为懒加载：


    `@ManyToOne(optional = false, fetch=FetchType.LAZY)`

    `private Book book;`


    这是必需的，因为 JPA（默认情况下）会立即加载多对一关联。如果我们不明确告诉 JPA 懒加载该关联，那么在加载概览页面时，`Book`实体就已经被加载了。概览页面间接加载了`OrderDetail`集合，因为它要显示订单中的书籍数量。这是通过调用`OrderDetails`集合的`size`方法实现的；因此，这个关联必须被初始化。这会隐式触发`Book`实体的加载，因为当`OrderDetail`关联被加载时，它会立即被获取。在将`Book`关联明确设置为懒加载后，我们可以点击`view`链接查看详情。如图
    12-9 所示，我们反而得到了一个异常。


    ![Image](img/9781430241553_Fig12-10.jpg)


    ***图 12-10.** 如果不使用流管理的持久化上下文，加载书籍详情时会触发异常。*


    如果我们继续向下滚动堆栈跟踪，会发现异常实际上是由`LazyInitializationException`引起的（参见图 12-11）。


    ![Image](img/9781430241553_Fig12-11.jpg)


    ***图 12-11.** 异常的原因是`LazyInitializationException`*


    ### 总结


    至此，关于 Web Flow 的最后一章就结束了。我们现在已经涵盖了 Web Flow 提供的所有值得注意的特性，甚至还向您展示了如何使用它们。


    在本章中，我们对前几章介绍的一些功能进行了更深入和高级的探讨。例如，我们展示了如何通过实现流组合和模块化的扩展来应用流继承。我们还展示了如何在流中执行显式表单绑定以及处理异常（而不是在应用程序控制器中处理它们）。


    然后，我们更深入地探讨了执行 Web Flow 操作。例如，我们讨论了一些强大的新特性，如流执行监听器、使用 Web Flow 处理 Ajax 请求，以及最后提到的流管理的持久化上下文。


    在这些 Web Flow 章节中，有一件重要的事情我们没有讨论：安全性。Web Flow 可以无缝地集成到 Spring Security 中。我们认为最好将安全性作为一个独立的章节来讨论。我们的下一章（也是最后一章）将介绍
    Spring MVC 的 Spring Security（这将是我们讨论的起点）；在此过程中，我们将向您展示 Web Flow 如何融入这个安全设置。


    ## 第 13 章


    ## Spring Security


    众所周知，安全性对任何应用程序都至关重要。对于暴露在互联网上的 Web 应用程序来说尤其如此。面对外部威胁是显而易见的，处理这些威胁将是您开发安全解决方案的主要工作。然而，开发人员面临的挑战不仅仅是外部威胁。


    由于安全性不增加功能，它常常被忽视，有时甚至在时间和资源上难以证明其合理性。在紧迫的截止日期和满足所有功能需求的双重压力下，安全性往往被遗忘或实现得很糟糕。当然，从“功能性”的角度来看待安全性是错误的。


    应该从编写测试或重构代码的相同角度来看待安全性。测试不会直接增加新功能的价值，但它确实能改进现有功能，并使得未来的功能添加或错误修复不会破坏项目的稳定性。重构也是如此。作为一名优秀的开发人员，您每天都在重构代码，无论改动多么微小，都是为了改进应用程序的性能和稳定性。安全性应该被视为更加重要。即使没有特别要求您考虑安全性，您也应该意识到应用程序面临的威胁，并确保您交付的产品尽可能安全。


    另一方面，请不要忘记，整个“安全”过程并不完全掌握在您手中。安全性跨越多个层面。如果您在应用程序层面保护了您的应用程序，但基础设施团队却在未打任何补丁的、使用了四年的
    Web 容器以及类似的操作系统上运行您的应用程序，那么无论您的应用程序多么安全，您都可能会遇到不速之客。对于组织来说，理解安全性的重要性以及影响安全性的所有因素至关重要。


    从组织的角度来看，这不仅仅是一个技术问题。意识和认知也非常重要。即使存在最微小的可利用异常，客户或其他用户也可能认为应用程序不安全。根据您应用程序的可见性级别，发现此类异常（无论多么微不足道）都可能引发抗议风暴，并给组织带来负面宣传。这甚至可能比攻击者利用攻击本身造成的损害更严重！


    在本章中，我们将向您展示如何履行作为应用程序开发人员的职责，并在应用程序层面使您的应用程序尽可能安全。我们将通过向您介绍 Spring Security 来实现这一点，这是一个最先进的、为
    Spring 3.1 准备好的安全扩展。在本章中，我们将向您展示如何在几个小时内保护您的应用程序！我们将从一个基本的安全配置开始，该配置只需几行 XML 就能保护您的应用程序。接着，我们将展示如何使用数据库作为用户和凭据的存储。我们还将研究如何将安全性集成到
    Spring Web Flow 中。最后，我们将讨论在 JSP 页面和应用程序控制器中使用 Spring MVC 执行授权检查的不同选项。

