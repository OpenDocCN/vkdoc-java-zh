    #### 使用 Selenium 进行前端测试


    我们将使用的当前 Selenium 版本是 Selenium 2.x（此后将 Selenium 2.x 简称为“Selenium”）。Selenium 利用了所谓的
    WebDriver 项目。这使得 Selenium 能够直接对所选浏览器运行测试，而无需额外软件。之前的版本（Selenium 1.x）则不同，它要求在测试用例和浏览器之间运行一个所谓的
    Selenium RC 服务器。你可以在图 9-11 中看到这一点。不过，Selenium RC 服务器仍然可以与当前版本的 Selenium 结合使用。为了解释这一点，我们首先来看一下
    Selenium 1.x 的工作原理。


    _________


    ¹⁴ [`http://cargo.codehaus.org/`](http://cargo.codehaus.org/)


    ¹⁵ [`http://seleniumhq.org/`](http://seleniumhq.org/)


    ![Image](img/9781430241553_Fig09-11.jpg)


    ***图 9-11.** 带有 Selenium RC 服务器设置的 Selenium 1.x*


    在 Selenium 1.x 中，测试用例与 Selenium RC 服务器之间的通信通过网络进行（你的测试命令被转换为发送到 Selenium RC 服务器的
    HTTP 请求）。Selenium RC 服务器可能运行在与实际测试运行不同的机器上。然后，Selenium RC 服务器将通过 HTTP 接收到的命令转换为
    JavaScript 调用，并将其注入目标浏览器。这是一个复杂的过程，但对用户来说是透明的。虽然这种设置已被视为过时，但了解其工作原理可能仍然有趣。你可以在
    Selenium 文档页面^(16)上阅读更多相关信息。


    Selenium 现在提供了一种不同的方法，即使用 WebDriver，它通过浏览器的原生 API 直接控制浏览器。因此，它不再需要像 Selenium 1.x
    使用的 Selenium RC 那样复杂的（内部）设置。使用 Selenium，你可以直接控制浏览器，而无需 Selenium RC 服务器。你只需根据要使用的浏览器，通过
    API 选择合适的驱动程序即可。


    但是，你仍然可以使用 RC 服务器。在这种情况下，RC 服务器也会使用 WebDriver。你的测试不再直接使用 WebDriver 控制本地机器上的浏览器，而是指示运行在另一台机器上的
    RC 服务器使用 WebDriver 与本地浏览器通信。Selenium RC 服务器设置与 Selenium 1.x 的主要区别在于，Selenium RC
    服务器做的事情远不止这些；它还注入 JavaScript 并充当代理，而使用 WebDriver 时这些已不再需要。它仅作为一个“远程 JVM”，使你能够控制远程机器上的浏览器。


    _________


    ¹⁶ [`http://seleniumhq.org/docs/05_selenium_rc.html#selenium-rc-architecture`](http://seleniumhq.org/docs/05_selenium_rc.html#selenium-rc-architecture)


    ![Image](img/square.jpg) **提示** 使用 Selenium RC 服务器特别适用于那些你想在机器 A 上运行测试但使用机器 B
    浏览器的情况。例如，你可以在你的 CI（一个 Unix 类型机器）上运行测试。你想针对 IE 7、8 和 9 运行前端测试。为此，你可以设置三台虚拟机，每台安装
    Windows 和其中一种浏览器，并运行一个 Selenium RC 服务器。然后你可以运行测试套件三次。第一次使用运行 IE 7 的虚拟机的 IP 地址，第二次使用运行
    IE 8 的虚拟机的 IP 地址，依此类推。你可以创建 Spring 测试配置文件，根据运行测试的配置文件动态注入不同的 IP 地址。


    #### 编写 Selenium 测试


    现在我们已经了解了一些关于 Selenium 及其前身 Selenium 1.x 的理论，让我们看看如何实际使用它。在开始之前，我们必须在 `build.gradle`
    中添加其依赖项。我们将把它们添加到 chapter9-bookstore 示例的 gradle 构建文件中。


    `testCompile ''org.seleniumhq.selenium:selenium-java:2.20.0''`

    `testCompile ''org.seleniumhq.selenium:selenium-firefox-driver:2.20.0''`

    `testCompile ''org.seleniumhq.selenium:selenium-htmlunit-driver:2.20.0''`


    我们添加了核心依赖项（`selenium-java`）以及 Firefox 和 HtmlUnit 的 WebDriver 依赖项。其他驱动程序^(17)目前包括
    `selenium-android-driver`、`selenium-chrome-driver`、`selenium-ie-driver`、`selenium-iphone-driver`
    和 `selenium-remote-driver`。接下来，让我们看看清单 9-15 中针对 LoginController 的 Selenium 测试。


    ***清单 9-15.** 使用 Selenium 测试登录序列*


    `package com.apress.prospringmvc.bookstore.web.frontend;`


    `// 其他导入已省略，参见清单 9-7`


