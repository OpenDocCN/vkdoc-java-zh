- fmt: "### Configuring Type Conversion\n\nIf we want to use an `org.springframework.core.convert.converter.Converter`\
    \ or an `org.springframework.format.Formatter` in Spring MVC, then we need to\
    \ add some configuration. The `org.springframework.web.servlet.config.annotation.WebMvcConfigurerAdapter`\
    \ has a method for this. The `addFormatters` method can be overridden to register\
    \ additional converters and/or formatters. This method has an `org.springframework.format.FormatterRegistry`\
    \ (see [Listing 5-38](#Chapter05.html#list_5_38)) as an argument, and it can be\
    \ used to register the additional converters and/or formatters (the `FormatterRegistry`\
    \ extends the `org.springframework.core.convert.converter.ConverterRegistry`,\
    \ which offers the same functionality for `Converter` implementations).\n\n**Listing\
    \ 5-38.** The `FormatterRegistry` Interface\n\n```\npackage org.springframework.format;\n\
    \nimport java.lang.annotation.Annotation;\n\nimport org.springframework.core.convert.converter.ConverterRegistry;\n\
    \npublic interface FormatterRegistry extends ConverterRegistry {\n\n    void addFormatter(Formatter<?>\
    \ formatter);\n    void addFormatterForFieldType(Class<?> fieldType, Formatter<?>\
    \ formatter);\n    void addFormatterForFieldType(Class<?> fieldType, Printer<?>\
    \ printer, Parser<?> parser);\n    void addFormatterForFieldAnnotation(AnnotationFormatterFactory<?\
    \ extends Annotation> annotationFormatterFactory);\n\n}\n```\n\nTo convert from\
    \ a `String` to a `com.apress.prospringmvc.bookstore.domain.Category`, we will\
    \ implement an `org.springframework.core.convert.converter.GenericConverter` (see\
    \ [Listing 5-39](#Chapter05.html#list_5_39)) and register it in our configuration\
    \ (see [Listing 5-40](#Chapter05.html#list_5_40)). The `com.apress.prospringmvc.bookstore.converter.StringToEntityConverter`\
    \ takes a `String` as its source and transforms it into a configurable entity\
    \ type. It then uses a `javax.persistence.EntityManager` to load the record from\
    \ the database.\n\n**Listing 5-39.** The `StringToEntityConverter`\n\n```\npackage\
    \ com.apress.prospringmvc.bookstore.converter;\n\nimport java.util.HashSet;\n\
    import java.util.Set;\n\nimport javax.persistence.EntityManager;\nimport javax.persistence.PersistenceContext;\n\
    \nimport org.apache.commons.lang3.StringUtils;\nimport org.apache.commons.lang3.reflect.FieldUtils;\n\
    import org.springframework.core.convert.TypeDescriptor;\nimport org.springframework.core.convert.converter.GenericConverter;\n\
    \npublic class StringToEntityConverter implements GenericConverter {\n\n    private\
    \ static final String ID_FIELD = \"id\";\n\n    private final Class<?> clazz;\n\
    \n    @PersistenceContext\n    private EntityManager em;\n\n    public StringToEntityConverter(Class<?>\
    \ clazz) {\n        super();\n        this.clazz = clazz;\n    }\n\n    @Override\n\
    \    public Set<ConvertiblePair> getConvertibleTypes() {\n        Set<ConvertiblePair>\
    \ types = new HashSet<GenericConverter.ConvertiblePair>();\n        types.add(new\
    \ ConvertiblePair(String.class, this.clazz));\n        types.add(new ConvertiblePair(this.clazz,\
    \ String.class));\n        return types;\n    }\n\n    @Override\n    public Object\
    \ convert(Object source, TypeDescriptor sourceType,\n                        \
    \  TypeDescriptor targetType) {\n        if (String.class.equals(sourceType.getType()))\
    \ {\n            if (StringUtils.isBlank((String) source)) {\n               \
    \ return null;\n            }\n            Long id = Long.parseLong((String) source);\n\
    \            return this.em.find(this.clazz, id);\n        } else if (this.clazz.equals(sourceType.getType()))\
    \ {\n            try {\n                if (source == null) {\n              \
    \      return \"\";\n                } else {\n                    return FieldUtils.readField(source,\
    \ ID_FIELD, true).toString();\n                }\n            } catch (IllegalAccessException\
    \ e) {\n            }\n        }\n        throw new IllegalArgumentException(\"\
    Cannot convert \" + source + \" into a suitable type!\");\n    }\n}\n```\n\n**Listing\
    \ 5-40.** The `CategoryConverter` Configuration\n\n```\npackage com.apress.prospringmvc.bookstore.web.config;\n\
    \n... [import ommitted]\n\n@Configuration\n@EnableWebMvc\n@ComponentScan(basePackages\
    \ = { \"com.apress.prospringmvc.bookstore.web\" })\npublic class WebMvcContextConfiguration\
    \ extends WebMvcConfigurerAdapter {\n\n    …\n\n    @Bean\n    public StringToEntityConverter\
    \ categoryConverter() {\n        return new StringToEntityConverter(Category.class);\n\
    \    }\n\n    @Override\n    public void addFormatters(final FormatterRegistry\
    \ registry) {\n        registry.addConverter(categoryConverter());\n        registry.addFormatter(new\
    \ DateFormatter(\"dd-MM-yyyy\"));\n    }\n    ...\n}\n```\n\nIn addition to the\
    \ category conversion, we also need to do date conversions. Therefore, [Listing\
    \ 5-38](#Chapter05.html#list_5_38) also includes an `org.springframework.format.datetime.DateFormatter`\
    \ with a pattern for converting dates."
  raw: '##### Configuring Type Conversion


    If we want to use an `org.springframework.core.convert.converter.Converter` or
    an `org.springframework.format.Formatter` in Spring MVC, then we need to add some
    configuration. The `org.springframework.web.servlet.config.annotation.WebMvcConfigurerAdapter`
    has a method for this. The `addFormatters` method can be overridden to register
    additional converters and/or formatters. This method has an `org.springframework.format.FormatterRegistry`
    (see [Listing 5-38](#Chapter05.html#list_5_38)) as an argument, and it can be
    used to register the additional converters and/or formatters (the `FormatterRegistry`
    extends the `org.springframework.core.convert.converter.ConverterRegistry`, which
    offers the same functionality for `Converter` implementations).


    ***Listing 5-38.** The FormatterRegistry Interface*


    `package org.springframework.format;`


    `import java.lang.annotation.Annotation;`


    `import org.springframework.core.convert.converter.ConverterRegistry;`


    `public interface FormatterRegistry extends ConverterRegistry {`


    `    void addFormatter(Formatter<?> formatter);`

    `    void addFormatterForFieldType(Class<?> fieldType, Formatter<?> formatter);`

    `    void addFormatterForFieldType(Class<?> fieldType, Printer<?> printer, Parser<?>
    parser);`

    `    void addFormatterForFieldAnnotation(AnnotationFormatterFactory<? extends
    Annotation>`![Image](images/U002.jpg)

    ` annotationFormatterFactory);`


    `}`


    To convert from a `String` to a `com.apress.prospringmvc.bookstore.domain.Category`,
    we will implement an `org.springframework.core.convert.converter.GenericConverter`
    (see [Listing 5-39](#Chapter05.html#list_5_39)) and register it in our configuration
    (see [Listing 5-40](#Chapter05.html#list_5_40)). The `com.apress.prospringmvc.bookstore.converter.StringToEntityConverter`
    takes a `String` as its source and transforms it into a configurable entity type.
    It then uses a `javax.persistence.EntityManager` to load the record from the database.


    ***Listing 5-39.** The StringToEntityConverter*


    `package com.apress.prospringmvc.bookstore.converter;`


    `import java.util.HashSet;`

    `import java.util.Set;`


    `import javax.persistence.EntityManager;`

    `import javax.persistence.PersistenceContext;`


    `import org.apache.commons.lang3.StringUtils;`

    `import org.apache.commons.lang3.reflect.FieldUtils;`

    `import org.springframework.core.convert.TypeDescriptor;`

    `import org.springframework.core.convert.converter.GenericConverter;`


    `public class StringToEntityConverter implements GenericConverter {`


    `    private static final String ID_FIELD = "id";`


    `    private final Class<?> clazz;`


    `    @PersistenceContext`

    `    private EntityManager em;`


    `    public StringToEntityConverter(Class<?> clazz) {`

    `        super();`

    `        this.clazz = clazz;`

    `    }`


    `    @Override`

    `    public Set<ConvertiblePair> getConvertibleTypes() {`

    `        Set<ConvertiblePair> types = new HashSet<GenericConverter.ConvertiblePair>();`

    `        types.add(new ConvertiblePair(String.class, this.clazz));`

    `        types.add(new ConvertiblePair(this.clazz, String.class));`

    `        return types;`

    `    }`


    `    @Override`

    `    public Object convert(Object source, TypeDescriptor sourceType,`

    `                          TypeDescriptortargetType) {`

    `        if (String.class.equals(sourceType.getType())) {`

    `            if (StringUtils.isBlank((String) source)) {`

    `                return null;`

    `            }`

    `            Long id = Long.parseLong((String) source);`

    `            return this.em.find(this.clazz, id);`

    `        } else if (this.clazz.equals(sourceType.getType())) {`

    `            try {`

    `                if (source == null) {`

    `                    return "";`

    `                } else {`

    `                    return FieldUtils.readField(source, ID_FIELD, true).toString();`

    `                }`

    `            } catch (IllegalAccessException e) {`

    `            }`

    `        }`

    `        throw new IllegalArgumentException("Cannot convert " + source + " into
    a suitable`![Image](images/U002.jpg)

    ` type!");`

    `    }`

    `}`


    ***Listing 5-40.** The CategoryConverter Configuration*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `... [import ommitted]`


    `@Configuration`

    `@EnableWebMvc`

    `@ComponentScan(basePackages = { "com.apress.prospringmvc.bookstore.web" })`

    `public class WebMvcContextConfiguration extends WebMvcConfigurerAdapter {`


    `    …`


    **`@Bean`**

    **`public StringToEntityConverter categoryConverter() {`**

    **`return new StringToEntityConverter(Category.class);`**

    **`}`**


    **`@Override`**

    **`public void addFormatters(final FormatterRegistry registry) {`**

    **`registry.addConverter(categoryConverter());`**

    **`registry.addFormatter(new DateFormatter("dd-MM-yyyy"));`**

    **`}`**

    **`...`**

    `}`


    In addition to the category conversion, we also need to do date conversions. Therefore,
    [Listing 5-38](#Chapter05.html#list_5_38) also includes an `org.springframework.format.datetime.DateFormatter`
    with a pattern for converting dates.'
