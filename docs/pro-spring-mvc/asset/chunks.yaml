    ##### ResponseStatusExceptionResolver


    The `ResponseStatusExceptionResolver` checks if the thrown exception is annotated
    with an `org.springframework.web.bind.annotation.ResponseStatus` annotation (see
    [Listing 6-18](#Chapter06.html#list_6_18)). If that is the case, it will handle
