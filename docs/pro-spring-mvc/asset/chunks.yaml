    ### 子流程输入/输出映射


    正如我们在“不同 Web 流程作用域”一节中所见，每个流程会话都有自己的 `flow` 作用域。我们还说明了子流程也是如此。在作用域层面，子流程与普通流程并无区别，它们在自己的流程会话中运行——因此，它们拥有自己的
    `flow` 作用域。只有 `conversation` 作用域在多个流程会话之间共享。那么，如果你需要在子流程内部访问来自父流程的数据，该怎么办？当然，你可以将其放入
    `conversation` 作用域，但这有一些缺点。


    子流程最好被视为一个具有特定输入和输出契约的黑盒。仅仅为了便于数据访问而将所有内容放入 `conversation` 作用域会破坏封装性，并可能导致脆弱的流程设计。一个更好的选择是将数据带入子流程的
    `flow` 作用域——但仅限于子流程所需的数据。Web Flow 提供了一些特殊功能来为子流程定义输入和输出契约。这样，你就能确切知道它需要什么数据作为输入，以及它会返回什么数据。


    你可以通过向流程添加*输入映射*来定义流程的输入契约。输入映射负责将所有在流程启动时提供的输入映射到其 `flow` 作用域中。你还可以通过*输出映射*来定义输出契约。输出映射定义了执行流程后预期会返回的值，并且这些值可以映射回父流程的
    `flow` 作用域。


    在继续之前，你应该了解 Web Flow 如何处理输入和输出属性。它为输入和输出分别分配了一个独立的映射。这个映射是独立的，仅用于在来自父流程的属性与子流程的
    `flow` 作用域之间建立过渡。当流程启动时，它会收集信息放入输入映射。这些信息可能来自 URL 或 `<subflow-state>` 的输入。你可以在启动子流程中使用
    `<input>` 元素来访问输入映射。


    这里，流程-x 向子流程（流程-y）暴露了一个名为 `varX` 的属性。这是通过在子流程状态中指定 input 元素来实现的。这使得 Web Flow 能够从流程-x
    的 `flow` 作用域中获取键 `varX`，然后将该键/值对放入输入映射。当流程-y 启动时，它会在输入映射中查找 `varX` 属性，并将其放入流程-y
    的 `flow` 作用域。


    在图 11-13 中，你还可以看到输入映射中填充了来自 URL 的值。这是你拥有的第二个选项。除了使用 `<subflow-state>` 的 `<input>`
    元素传递值之外，Web Flow 还会读取你的 URL，并将所有可用的请求参数放入输入映射。这样做的原因是，它允许你轻松地将一个流程既作为独立流程使用，也作为子流程使用。


    ![图片](img/9781430241553_Fig11-13.jpg)


    ***图 11-13.** 子流程输入/输出映射*


    ![图片](img/square.jpg) **注意**  输出映射与输入映射镜像对应，适用相同的原则和规则。不过，我们现在有两个 `<output>` 元素，而不是两个
    `<input>` 元素。一个位于父流程的 `<subflow-state>` 中，另一个位于子流程本身中。此外，还有一个输出映射，用于将值从子流程映射回父流程（如图
    11-13 所示）。


    除了使用 `<input>` 和 `<output>` 元素之外，你还可以指定一个自定义的 `subflow-attribute-mapper`。这是 `<subflow-state>`
    元素的一个属性。它允许使用 Java 类进行自定义映射，而不是在流程内部执行映射。该属性接受一个对 `org.springframework.webflow.engine.SubflowAttributeMapper`
    接口实现的 bean 引用。这个类有两个方法：


    `public MutableAttributeMap createSubflowInput(RequestContext context);`

    `public void mapSubflowOutput(AttributeMap output, RequestContext context);`


    使用这种方法时，你可以在自定义的 `SubflowAttributeMapper` 实现中自行指定映射。这相当少见；通常，标准的输入和输出元素足以映射你所需的任何内容。然而，如果在映射数据时需要访问某些资源，这种方法将帮助你实现这一点，因为你可以完全控制映射过程。

