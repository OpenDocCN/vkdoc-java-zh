    #### 配置文件（Profiles）


    Spring 在 3.1 版本中引入了配置文件（profiles）的概念。配置文件使得为不同环境创建不同的应用程序配置变得简单。例如，我们可以为本地环境、测试环境以及部署到
    CloudFoundry 的环境创建独立的配置文件。这些环境中的每一个都需要一些特定于环境的配置或 Bean。可以想到数据库配置、消息传递解决方案，以及针对测试环境的某些
    Bean 的桩（stubs）。


    要启用一个配置文件，我们需要告诉应用程序上下文哪些配置文件是激活的。要激活特定的配置文件，我们需要设置一个名为 `spring.profiles.active`
    的系统属性（在 Web 环境中，这可以是一个 Servlet 初始化参数或 Web 上下文参数）。这是一个逗号分隔的字符串，包含激活的配置文件的名称。如果我们现在添加一些（此处为静态内部）类（参见清单
    2-10），并为其添加 `org.springframework.context.annotation.Configuration` 和 `org.springframework.context.annotation.Profile`
    注解，那么只有与某个激活的配置文件相匹配的类才会被处理。所有其他类都将被忽略。


