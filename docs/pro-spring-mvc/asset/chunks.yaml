    元素还有第二个属性，名为 `match`。在使用 SpEL 时，此属性不重要。但是，如果不使用 SpEL，你会受到更多限制。例如，无法定义“`or”或` “`and”`
    关系。稍后我们将介绍角色的概念，但你应该知道，你可以根据是否存在一个或多个角色来允许或拒绝执行流程。使用 SpEL，如果你希望仅在两个角色都存在时才执行流程，则只需使用
    `and` 运算符；如果其中一个角色就足够了，则使用 `or` 运算符。如果不使用 SpEL，则必须使用 `match` 属性，该属性允许你在 `any`（如果请求的角色之一存在，则执行流程）和
    `all`（必须存在 `attributes` 属性中的所有角色才能执行流程）之间切换。    ![Image](img/square.jpg) **注意**
