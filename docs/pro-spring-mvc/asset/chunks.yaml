- fmt: "### **Listing 10-6.** Configuring the Flow Registry to Automatically Scan\
    \ for Flow Definitions\n\n```\n<webflow:flow-registry base-path=\"/WEB-INF/view\"\
    >\n    <webflow:flow-location-pattern value=\"/**/*-flow.xml\" />\n</webflow:flow-registry>\n\
    ```\n\nSetting the `base-path` means that the registry will start to look for\
    \ flows in `/WEB-INF/view` and all its subdirectories. We have opted to put the\
    \ flows together with our views. However, you could change the value of `base-path`\
    \ to another directory if you would like to store your flows separately.\n\nThe\
    \ `base-path` helps in keeping your flow ids clean. The flow id (that's the id\
    \ you will use to start a flow) is the location of the flow within your web application,\
    \ followed by the filename (but minus the `.xml`). So a flow `x.xml` located in\
    \ `/WEB-INF/view` would start like this: [`http://host:port/contextRoot/x`](http://host:port/contextRoot/x).\
    \ However, a flow `y.xml` located in `WEB-INF/view/subdir/y.xml` would start with\
    \ this URL: [`http://host:port/contextRoot/subdir`](http://host:port/contextRoot/subdir).\n\
    \n![Image](images/square.jpg) **Note** The last URL was not a mistake; there is\
    \ no “y” missing at the end. When a flow is not located in the root directory,\
    \ Web Flow accumulates the subdirectories as part of the flow id and stops at\
    \ the last subdirectory. The name of the flow itself is in that case *not* part\
    \ of the flow id. For example, a flow in `WEB-INF/subdir1/subdir2/someFlow.xml`\
    \ would start with this URL: [`http://host:port/contextRoot/subdir1/subdir2`](http://host:port/contextRoot/subdir1/subdir2).\
    \ While this might sound bizarre, Web Flow encourages you to create a unique subdirectory\
    \ *per* flow. You are encouraged to put the flow together with your other artifacts,\
    \ such as your pages. From that point of view, it does make sense.\n\nWe will\
    \ store our flows together with the views. The option that allows you to store\
    \ flows separately from your views will be discussed in [Chapter 12](#Chapter12.html#ch12)'s\
    \ “Web Flow Configuration Customizations” section.\n\n##### Flow Builder Services\n\
    \nWith the flow builder services, you can further configure and customize the\
    \ flow registry. (It is actually an attribute of the `flow-registry`, as you will\
    \ see later in this chapter.) You only need to specify this when you want something\
    \ other than the defaults. Since we have a special requirement—namely, that we\
    \ are using Tiles as a templating framework—we need to configure a custom flow\
    \ builder service (see [Listing 10-7](#Chapter10.html#list_10_7)).\n\n**Listing\
    \ 10-7.** Configuring Flow Builder Services\n\n```\n<webflow:flow-builder-services\
    \ id=\"flowBuilderServices\"\n    view-factory-creator=\"mvcViewFactoryCreator\"\
    \ development=\"true\"/>\n```\n\n```\n<bean id=\"mvcViewFactoryCreator\"\n   \
    \ class=\"org.springframework.webflow.mvc.builder.MvcViewFactoryCreator\">\n \
    \   <property name=\"viewResolvers\">\n        <list>\n            <ref bean=\"\
    tilesViewResolver\"/>\n        </list>\n    </property>\n</bean>\n```\n\nLet's\
    \ look at the two attributes that are of importance at the moment (see [Table\
    \ 10-7](#Chapter10.html#tab_10_7)). The first is the `view-factory-creator` and\
    \ the second is `development`.\n\n![Image](images/9781430241553_tab10-07.jpg)\n\
    \nAfter specifying the flow builder services, you can hook it up to the flow registry:\n\
    \n```\n<webflow:flow-registry base-path=\"/WEB-INF/view\"\n    flow-builder-services=\"\
    flowBuilderServices\">\n    <webflow:flow-location-pattern value=\"/**/*-flow.xml\"\
    \ />\n</webflow:flow-registry>\n```\n\nThe flow builder services can be used to\
    \ customize other things, as well. For example, you can configure Web Flow to\
    \ perform JSR 303 validation (AKA bean validation). This means that, if you annotate\
    \ your model with annotations from the `javax.constraints.validation` package\
    \ (e.g., `@Min`, `@Max`, and so on), then validation will take place and error\
    \ messages will be created for that path within your model. Validation is discussed\
    \ in more detail in the “Selecting Books and Delivery Options” section in [Chapter\
    \ 11](#Chapter11.html#ch11).\n\nAfter performing the validation, you can configure\
    \ custom type conversion and formatting. These topics are discussed in [Chapter\
    \ 11](#Chapter11.html#ch11)'s “Type Conversion” and “Type Formatting” sections,\
    \ respectively.\n\nFinally, the flow builder services also allow you to switch\
    \ the expression parser. This is discussed in more detail in [Chapter 12](#Chapter12.html#ch12)\
    \ in the “Web Flow Configuration Customizations” section."
  raw: '***Listing 10-6.** Configuring the Flow Registry to Automatically Scan for
    Flow Definitions*


    `<webflow:flow-registry base-path="/WEB-INF/view">`

    `    <webflow:flow-location-pattern value="/**/*-flow.xml" />`

    `</webflow:flow-registry>`


    Setting the `base-path` means that the registry will start to look for flows in
    `/WEB-INF/view` and all its subdirectories. We have opted to put the flows together
    with our views. However, you could change the value of `base-path` to another
    directory if you would like to store your flows separately.


    The `base-path` helps in keeping your flow ids clean. The flow id (that''s the
    id you will use to start a flow) is the location of the flow within your web application,
    followed by the filename (but minus the .xml). So a flow x.xml located in `/WEB-INF/view`
    would start like this: [`http://host:port/contextRoot/x`](http://host:port/contextRoot/x).
    However, A flow y.xml located in `WEB-INF/view/`subdir`/y.xml` would be start
    with this URL: [`http://host:port/contextRoot/`](http://host:port/contextRoot/)subdir.


    ![Image](images/square.jpg) **Note** The last URL was not a mistake; there is
    no “y” missing at the end. When a flow is not located in the root directory, Web
    Flow accumulates the subdirectories as part of the flow id and stops at the last
    subdirectory. The name of the flow itself is in that case *not* part of the flow
    id. For example, a flow in `WEB-INF/subdir1/subdir2/someFlow.xml` would start
    with this URL: [`http://host:port/contextRoot/subdir1/subdir2`](http://host:port/contextRoot/subdir1/subdir2).
    While this might sound bizarre, Web Flow encourages you to create a unique subdirectory
    *per* flow. You are encouraged to put the flow together with your other artifacts,
    such as your pages. From that point of view, it does make sense.


    We will store our flows together with the views. The option that allows you to
    store flows separately from your views will be discussed in [Chapter 12](#Chapter12.html#ch12)''s
    “Web Flow Configuration Customizations” section.


    ##### Flow Builder Services


    With the flow builder services, you can further configure and customize the flow
    registry. (It is actually an attribute of the flow-registry, as you will see later
    in this chapter.) You only need to specify this when you want something other
    than the defaults. Since we have a special requirement—namely, that we are using
    Tiles as a templating framework—we need to configure a custom flow builder service
    (see [Listing 10-7](#Chapter10.html#list_10_7)).


    ***Listing 10-7.** Configuring Flow Builder Services*


    `<webflow:flow-builder-services id="flowBuilderServices"` **`view-factory-`**![Image](images/U002.jpg)

    **`"creator`**`="mvcViewFactoryCreator` **`development`**`="true"/>"`


    `<bean id="mvcViewFactoryCreator" class="org.springframework.webflow.mvc`![Image](images/U002.jpg)

    `.builder.MvcViewFactoryCreator">`

    `    <property name="viewResolvers">`

    `        <list>`

    `            <ref bean="tilesViewResolver"/>`

    `        </list>`

    `    </property>`

    `</bean>`


    Let''s look at the two attributes that are of importance at the moment (see [Table
    10-7](#Chapter10.html#tab_10_7)). The first is the `view-factory-creator` and
    the second is `development`.


    ![Image](images/9781430241553_tab10-07.jpg)


    After specifying the flow builder services, you can hook it up to the flow registry:


    `<webflow:flow-registry base-path="/WEB-INF/view"` **`flow-builder-services="flowBuilderServices">`**

    `    <webflow:flow-location-pattern value="/**/*-flow.xml" />`

    `</webflow:flow-registry>`


    The flow builder services can be used to customize other things, as well. For
    example, you can configure Web Flow to perform JSR 303 validation (AKA bean validation).
    This means that, if you annotate your model with annotations from the `javax.constraints.validation`
    package (e.g., `@Min`, `@Max`, and so on), then validation will take place and
    error messages will be created for that path within your model. Validation is
    discussed in more detail in the “Selecting Books and Delivery Options” section
    in [Chapter 11](#Chapter11.html#ch11).


    After performing the validation, you can configure custom type conversion and
    formatting. These topics are discussed in [Chapter 11](#Chapter11.html#ch11)''s
    “Type Conversion” and “Type Formatting” sections, respectively.


    Finally, the flow builder services also allow you to switch the expression parser.
    This is discussed in more detail in [Chapter 12](#Chapter12.html#ch12) in the
    “Web Flow Configuration Customizations” section.'
  trans: '

    ***清单 10-6.** 配置流程注册表以自动扫描流程定义*


    `<webflow:flow-registry base-path="/WEB-INF/view">`

    `    <webflow:flow-location-pattern value="/**/*-flow.xml" />`

    `</webflow:flow-registry>`


    设置 `base-path` 意味着注册表将从 `/WEB-INF/view` 及其所有子目录开始查找流程。我们选择将流程与视图放在一起。不过，如果你希望将流程分开存储，也可以将
    `base-path` 的值更改为其他目录。


    `base-path` 有助于保持流程 ID 的简洁。流程 ID（即用于启动流程的 ID）是流程在 Web 应用程序中的位置，后跟文件名（但不包含 .xml
    扩展名）。因此，位于 `/WEB-INF/view` 中的 `x.xml` 流程将像这样启动：[`http://host:port/contextRoot/x`](http://host:port/contextRoot/x)。然而，位于
    `WEB-INF/view/`subdir`/y.xml` 中的 `y.xml` 流程将使用此 URL 启动：[`http://host:port/contextRoot/`](http://host:port/contextRoot/)subdir。


    ![Image](img/square.jpg) **注意** 最后一个 URL 并非笔误；末尾并没有缺少“y”。当流程不位于根目录时，Web Flow 会将子目录累积为流程
    ID 的一部分，并在最后一个子目录处停止。在这种情况下，流程本身的名称*不*属于流程 ID。例如，位于 `WEB-INF/subdir1/subdir2/someFlow.xml`
    的流程将使用此 URL 启动：[`http://host:port/contextRoot/subdir1/subdir2`](http://host:port/contextRoot/subdir1/subdir2)。虽然这听起来可能有些奇怪，但
    Web Flow 鼓励你为*每个*流程创建一个唯一的子目录。建议你将流程与页面等其他工件放在一起。从这个角度来看，这样做确实是有道理的。


    我们将把流程与视图存储在一起。允许将流程与视图分开存储的选项将在第 12 章的“Web Flow 配置自定义”部分讨论。


    ##### 流程构建器服务


    通过流程构建器服务，你可以进一步配置和自定义流程注册表。（实际上，它是 flow-registry 的一个属性，正如你将在本章后面看到的那样。）仅当你需要非默认设置时才需要指定此项。由于我们有一个特殊需求——即使用
    Tiles 作为模板框架——我们需要配置一个自定义的流程构建器服务（参见清单 10-7）。


    ***清单 10-7.** 配置流程构建器服务*


    `<webflow:flow-builder-services id="flowBuilderServices"` **`view-factory-`**![Image](img/U002.jpg)

    **`"creator`**`="mvcViewFactoryCreator` **`development`**`="true"/>"`


    `<bean id="mvcViewFactoryCreator" class="org.springframework.webflow.mvc`![Image](img/U002.jpg)

    `.builder.MvcViewFactoryCreator">`

    `    <property name="viewResolvers">`

    `        <list>`

    `            <ref bean="tilesViewResolver"/>`

    `        </list>`

    `    </property>`

    `</bean>`


    让我们看看当前重要的两个属性（参见表 10-7）。第一个是 `view-factory-creator`，第二个是 `development`。


    ![Image](img/9781430241553_tab10-07.jpg)


    指定流程构建器服务后，你可以将其挂接到流程注册表：


    `<webflow:flow-registry base-path="/WEB-INF/view"` **`flow-builder-services="flowBuilderServices">`**

    `    <webflow:flow-location-pattern value="/**/*-flow.xml" />`

    `</webflow:flow-registry>`


    流程构建器服务也可用于自定义其他内容。例如，你可以配置 Web Flow 以执行 JSR 303 验证（也称为 Bean 验证）。这意味着，如果你使用 `javax.constraints.validation`
    包中的注解（例如 `@Min`、`@Max` 等）对模型进行注解，那么验证将会执行，并且会为模型中的该路径创建错误消息。验证将在第 11 章的“选择书籍和配送选项”部分中更详细地讨论。


    执行验证后，你可以配置自定义类型转换和格式化。这些主题分别在第 11 章的“类型转换”和“类型格式化”部分中讨论。


    最后，流程构建器服务还允许你切换表达式解析器。这在第 12 章的“Web Flow 配置自定义”部分中有更详细的讨论。

    '
- fmt: "# Gluing Spring MVC and Spring Web Flow\n\nOur Spring MVC configuration is\
    \ the default setup. We have set it up just as we did in the previous chapters.\
    \ There is also a basic `com.apress.prospringmvc.bookstore.web.config.WebMvcContextConfiguration`\
    \ class that starts like this:\n\n```\npackage com.apress.prospringmvc.bookstore.web.config;\n\
    \nimport org.springframework.context.annotation.Configuration;\nimport org.springframework.web.servlet.config.annotation.EnableWebMvc;\n\
    import org.springframework.context.annotation.ComponentScan;\n//Other imports\
    \ omitted for brevity\n\n@Configuration\n@EnableWebMvc\n@ComponentScan(basePackages\
    \ = { \"com.apress.prospringmvc.bookstore.web\" })\npublic class WebMvcContextConfiguration\
    \ extends WebMvcConfigurationSupport{\n```\n\nInside the class, we added beans\
    \ for the following:\n\n- `Localization (messagesource)`\n- `Standard view resolver`\n\
    - `Tiles view resolver`\n\nWe also have the `com.apress.prospringmvc.bookstore.web.interceptor.CommonDataHandlerInterceptor`\
    \ to support our random book feature in the right pane. However, this is nothing\
    \ new compared to the previous chapters (it is explained in [Chapter 6](#Chapter06.html#ch6)'s\
    \ “Configuring Interceptors” section). On the same line, there is also the `org.springframework.web.servlet.i18n.LocaleChangeInterceptor`,\
    \ which is used to dynamically switch languages on the pages (explained in [Chapter\
    \ 5](#Chapter05.html#ch5)'s “LocaleChangeInterceptor” section). We will not discuss\
    \ this class further because it is exactly the same as in the previous chapters.\n\
    \nLater in this chapter, we will configure Web Flow with the same Tiles view resolver\
    \ that is defined for and used by Spring MVC. The point is that we will still\
    \ be able to use Spring MVC as-is, without added Web Flow functionality. In that\
    \ case, Spring MVC will works as it normally does, and it should have the means\
    \ to resolve its views.\n\nSelecting between vanilla Spring MVC and Web Flow happens\
    \ in the main Spring MVC entry point; the `org.springframework.web.servlet.DispatcherServlet`.\
    \ Using `org.springframework.web.servlet.HandlerAdapter` mappings enables Spring\
    \ MVC to forward the request either to one of its own `HandlerAdapters` or to\
    \ Web Flow's `org.springframework.webflow.mvc.servlet.FlowHandlerAdapter` (see\
    \ [Figure 10-8](#Chapter10.html#fig_10_8)).\n\nThis mechanism is specially built,\
    \ so that the Spring MVC `DispatcherServlet` remains your single entry point.\
    \ The distinction is made depending on the request, and the request is forwarded\
    \ to either Web Flow or Spring MVC itself (which might then be a resource or even\
    \ a call to your controller). In the case of Web Flow, there is an `org.springframework.webflow.mvc.servlet.FlowHandlerMapping`\
    \ registered with the `DispatcherServlet`. This `FlowHandlerMapping` will detect\
    \ whether the URL points to an existing flow id. If so, the request is treated\
    \ as a Web Flow request; otherwise, the next `org.springframework.web.servlet.HandlerMapping`\
    \ in line tries to identify the type of request.\n\n![Image](images/9781430241553_Fig10-10.jpg)\n\
    \n**Figure 10-10.** Spring MVC's configurable HandlerAdapter mechanism to forward\
    \ requests\n\nYou can see that the `DispatcherServlet` uses `HandlerAdapter` and\
    \ `HandlerMapping` to send a request to a specific part—to either Web Flow or\
    \ Spring MVC in our case. These two components (i.e., the `FlowHandlerMapping`\
    \ and `FlowHandlerAdapter`) need to be registered before Web Flow will be able\
    \ to receive requests from the `DispatcherServlet`.\n\nWe declared these components\
    \ in the `com.apress.prospringmvc.bookstore.web.config.WebflowContextConfiguration`.\
    \ This class does two things:\n\n- It imports the `webflow-config.xml` (as discussed\
    \ in the previous section) into the ApplicationContext using the `@ImportResource(\"\
    classpath:/spring/webflow-config.xml\")` annotation.\n- It defines and configures\
    \ the two beans with the following ids: `flowHandlerAdapter` and `flowHandlerMapping`.\n\
    \nIn the [Listing 10-8](#Chapter10.html#list_10_8), we show what the `WebflowContextConfiguration`\
    \ looks like. This listing brings all these components together and effectively\
    \ serves as the glue between Web Flow and Spring MVC.\n\n**Listing 10-8.** Adding\
    \ the FlowHandlerAdapter and FlowHandlerMapping Beans\n\n```\npackage com.apress.prospringmvc.bookstore.web.config;\n\
    \nimport org.springframework.web.servlet.DispatcherServlet;\nimport org.springframework.web.servlet.i18n.LocaleChangeInterceptor;\n\
    import org.springframework.webflow.definition.registry.FlowDefinitionRegistry;\n\
    import org.springframework.webflow.executor.FlowExecutor;\nimport org.springframework.webflow.mvc.servlet.FlowHandlerAdapter;\n\
    import org.springframework.webflow.mvc.servlet.FlowHandlerMapping;\nimport com.apress.prospringmvc.bookstore.web.interceptor.![Image](images/U002.jpg)\n\
    \         CommonDataHandlerInterceptor;\n//Ommited other imports for brevity\n\
    \n@Configuration\n@ImportResource(\"classpath:/spring/webflow-config.xml\")\n\
    public class WebflowContextConfiguration {\n\n    @Autowired\n    private FlowExecutor\
    \ flowExecutor;\n    @Autowired\n    private FlowDefinitionRegistry flowRegistry;\n\
    \    @Autowired\n    private CommonDataHandlerInterceptor commonDataHandlerInterceptor;\n\
    \    @Autowired\n    private LocaleChangeInterceptor localeChangeInterceptor;\n\
    \n    @Bean\n    public FlowHandlerAdapter flowHandlerAdapter() {\n        FlowHandlerAdapter\
    \ flowHandlerAdapter = new FlowHandlerAdapter();\n        flowHandlerAdapter.setFlowExecutor(flowExecutor);\n\
    \        return flowHandlerAdapter;\n    }\n\n    @Bean\n    public FlowHandlerMapping\
    \ flowHandlerMapping() {\n        FlowHandlerMapping flowHandlerMapping = new\
    \ FlowHandlerMapping();\n        flowHandlerMapping.setInterceptors(new Object[]\
    \ { commonDataHandlerInterceptor,![Image](images/U002.jpg)\n localeChangeInterceptor\
    \ });\n        flowHandlerMapping.setFlowRegistry(flowRegistry);\n        return\
    \ flowHandlerMapping;\n    }\n  }\n}\n```\n\n![Image](images/square.jpg) **Note**\
    \ When we discussed the `WebMvcContextConfiguration`, we said that it declares\
    \ the two interceptors, just as it did in the previous Spring MVC chapters. These\
    \ interceptors are `CommonDataHandlerInterceptor` for the random books, and `LocaleChangeInterceptor`\
    \ for supporting dynamic language change. In the `WebflowContextConfiguration`,\
    \ we repeat this mapping, passing the same interceptor references to the `FlowHandlerMapping`.\
    \ This is because the two systems are separated from each other. Once Web Flow\
    \ is handling the request, it doesn't know about interceptors added to Spring\
    \ MVC handler mappings, and vice versa. If you did not add these interceptors\
    \ here, changing the language or showing random books would no longer work from\
    \ the moment you started a flow.\n\nIn the preceding sections, we covered the\
    \ different configuration details for configuring Web Flow. We also investigated\
    \ and explained how to integrate Web Flow with Spring MVC. In the next section,\
    \ we will focus on building something workable using Web Flow."
