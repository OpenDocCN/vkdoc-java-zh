    ***清单 11-5.** 类别现在按原样加载*


    `public List<Category> initializeSelectableCategories() {`

    `    return categoryService.findAll();`

    `}`


    ![Image](img/square.jpg)  **注意**  我们的 `initialize` 方法被重构为一行代码；一个不错的替代方案是直接从流程中调用
    `categoryService.findAll()`。


    在我们的页面中，将不再有 `Map`，而是有一个 `Category` 对象的列表。我们需要修改 `<form:select>`，以便将名称显示为标签，将
