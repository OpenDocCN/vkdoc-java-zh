    ##### 对话作用域


    `conversation`（对话）作用域的范围是整个对话或执行过程（参见图 11-5）。术语“对话”可能有些误导性，但这只是一个实现细节（尤其在 Web
    Flow 2 中），对本讨论并不重要。尽管我们不得不使用这个术语，但你可以将 `conversation` 作用域理解为在整个流程执行过程中维护状态的作用域。我们认为“`execution`（执行）作用域”会是更好的命名。`conversation`
    作用域中的属性对对话（或执行）中包含的每个流程会话都可用。因此，`conversation` 作用域也对所有子流程可用。


    ![图片](img/9781430241553_Fig11-05.jpg)


    ***图 11-5.** 对话作用域*


    与 `flow` 作用域一样，`conversation` 作用域主要存储与应用相关的对象。如果这些对象应对每个流程会话（针对该流程及其子流程）都可用，而不是仅针对单个流程会话，则应使用
    `conversation` 作用域。如果你的流程不使用子流程，则 `conversation` 和 `flow` 作用域的生命周期可以视为相等。请注意，我们并不是说这两个作用域“变得相等”；它们仍然是两个物理上分离的作用域，因此在
    `flow` 作用域上设置的内容*不会*在 `conversation` 作用域上可见。但在这种情况下，它们在“逻辑上”是相等的，因为它们具有相同的生命周期，而生命周期通常是区分不同流程的属性。


    由于它们的生命周期相同，有人可能会认为选择 `flow` 作用域或 `conversation` 作用域是等价的。然而，默认情况下，选择 `flow` 作用域而非
    `conversation` 作用域更为合理。这是因为后续可能会引入子流程（即当你的流程扩展时），而子流程将自动能够访问 `conversation` 作用域上的数据。正如我们稍后在介绍子流程时将会看到的，最佳实践是思考子流程需要哪些数据，并仅暴露适量的数据。


    在图 11-5 中，你可以看到，对于流程 x，`conversation` 和 `flow` 作用域是相等的，因为没有子流程存在。你还可以看到，为流程 y
    创建了一个新的 `conversation` 作用域（和 `flow` 作用域）。同样，对于流程 y，会为子流程创建一个不同的 `flow` 作用域。然而，`conversation`
    作用域对父流程和子流程仍然都是可访问的。如前所述，子流程可见的 `flow` 作用域是一个新的作用域，子流程无法访问父流程的 `flow` 作用域。


    ![图片](img/square.jpg) **注意** 在 `flow` 或 `conversation` 作用域中存储大型对象时要小心。这些作用域的生命周期相对较长，这意味着其中存储的数据需要长时间维护。作为在
    `flow` 或 `conversation` 作用域中存储大型对象的替代方案，可以考虑为每个请求重新加载这些对象，并将其存储在 `request` 作用域中。


    #### 隐式对象


    就像在 JSP（脚本片段）和 EL 中有隐式对象一样，Web Flow 也定义了一些隐式对象。隐式对象是对某些常用功能的快捷访问（例如，HTTP 请求参数）。虽然你可以通过
    `javax.servlet.http.HttpServletRequest` 访问请求参数，但 EL 和 Web Flow 都包含一个“快捷方式”，可以直接访问请求参数映射。在
    EL 中，这个隐式对象称为 `param`；在 Web Flow 表达式中，你可以使用 `requestParameters`。


    除了与数据相关的隐式对象外，还有对关键框架对象的引用。例如，如果你在 Web Flow 表达式中需要 `javax.servlet.ServletContext`，可以在表达式中引用隐式变量
    `externalContext`。`externalContext` 变量将间接暴露 `javax.servlet.ServletContext` 以及其他与上下文相关的信息。在这种情况下，表达式将变为：


    `"#{externalContext.nativeContext}"`


    ![图片](img/square.jpg) **注意** 你也可以在视图（JSP）中从 EL 使用这些隐式对象。这些对象由 Web Flow 绑定到 Servlet
    的 `request` 作用域。例如，使用类似 `#{flowExecutionUrl}` 的内容将解析为绑定到 Servlet 的 `request` 作用域的
    `flowExecutionUrl` 隐式对象。


    表 11-1 概述了可在 Web Flow 表达式中使用的每个隐式对象。


    ![图片](img/9781430241553_tab11-01.jpg)


    ![图片](img/9781430241553_tab11-01a.jpg)


    ### 增强书店应用


    在前面的章节中，我们较为详细地介绍了 Web Flow 的通用术语。在深入代码之前，我们需要先介绍这些概念。现在我们已经介绍了它们，接下来将探讨特定的 Web
    Flow 特性。我们将通过代码示例进行说明，并沿途解释。


    在上一章中，我们首次尝试为订购图书引入了一个基本流程。我们使用了一些基本的 Web Flow 组件，展示了使用 Web Flow 转换给定用例是多么容易。现在，我们将继续为示例应用程序添加功能并进行改进，同时沿途说明和解释各种
    Web Flow 特性。例如，我们在上一章中留下的示例应用程序还算不上一个完整的应用程序。很多东西仍然缺失，仅举几例：


    *   *没有验证*：当没有选择图书时，不应允许下订单。交货日期也是必填项，如果用户未指定此日期，网站应触发异常。

    *   *没有转换*：我们在表单中将 `Category` 和 `Book` 映射为 `Long`，使用了这些对象的标识符。如果我们能直接从领域模型映射到
    `Category` 或 `Book`，那将更加优雅。


    在接下来的章节中，我们将解决这些及其他不足之处，逐步重构我们的示例应用程序，以展示如何使用 Web Flow 实现一些真实世界的用例。我们将从头开始，修改流程中的第一步：选择图书类别。


    #### 选择类别


    为了加载可选择的类别列表，我们使用了一个启动时动作。该动作在进入视图状态以渲染所选类别视图之前，将我们的类别加载到 `flow` 作用域中。正如我们在“不同的
    Web Flow 作用域”部分已经解释过的，这并不是存储此信息的理想位置。可选择的类别仅在所选类别视图的作用域内需要。我们将看到存在更好的替代方案。


    此外，我们在表单中使用类别的 id 进行映射，而不是将其映射为领域对象。接下来的章节将展示我们如何改变这一点。

