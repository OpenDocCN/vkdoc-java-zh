    **`         http://www.springframework.org/schema/security/spring-security-`**![Image](images/U002.jpg)
    **`         3.1.xsd"`**`>`  Every security feature will use the namespace prefix
    “security.”    ![Image](images/square.jpg) **Note** You can also make the Spring
    Security namespace the default namespace. Here we have chosen to use the default
    namespace for the core Spring beans functionality, which is the default in all
    our other Spring configuration files as well. However, it would also work to switch
    them in this case, since this is a configuration file dedicated to Spring Security,
    where you will be using more of the Spring Security elements than from the bean
    namespace. In that case, you could drop the “security” prefix, as all security
    elements will be accessible in the default namespace, without any prefix. When
    there is a lot of security configuration, it can make your XML look less cluttered.    __________    ²
    [`http://markmail.org/message/5q7gpipxdiqxsu6p?q=+list:org.apache.tomcat.dev`](http://markmail.org/message/5q7gpipxdiqxsu6p?q=+list:org.apache.tomcat.dev)    Next,
    we need to define the “delegate” to which our `DelegatingFilterProxy` will delegate.
    This is done with the `<security:http>` element, as shown in [Listing 13-4](#Chapter13.html#list_13_4).    ***Listing
    13-4:** The Spring Security namespaced filter chain configuration*  `<security:http>`
    `     <security:form-login login-page="/public/authentication/login.htm" default-target-`![Image](images/U002.jpg)
    `url="/public/main.htm"/>` `</security:http>`  What this element does is create
    a filter chain and registers it in the application context with the default bean
    ID `springSecurityFilterChain`. The `DelegatingFilterProxy` will use the name
    of the filter to look up this bean, and delegate control to it. If you name the
    filter `someFilter`, it will look up the filter chain with bean ID `someFilter`,
    which results in no bean being found. Before we continue we need to explain what
    the Spring Security filter chain is and what it will do for us.    The filter
    chain is the core component in capturing requests and dealing with what has to
    be done. Almost everything in the main Spring Security configuration is handled
    by a filter in the filter chain. You can plug in or remove filters at will, and
    every filter will have a specific job (see [Figure 13-3](#Chapter13.html#fig_13_3)).  ![Image](images/9781430241553_Fig13-03.jpg)  ***Figure
    13-3.** Filter delegates to the configured application filter chain*    In [Listing
    13-4](#Chapter13.html#list_13_4), we implicitly configured an element that will
    send the user to the `login.htm` (specified by the `login-page` attribute) page
    if accessing a secured resource without being authenticated. When the user logs
    in, the filter will automatically redirect the user back to the requested secured
    resource. Or, the user might be redirected to `main.htm`, which renders the home
    page (defined by the `default-target-url` attribute) if there was no previously
    requested secure page but the user logged in directly via the login page. In that
    case we also send a parameter, indicating that authentication was successful.
    The main page in question will detect this and show a message that the authentication
    process succeeded. This element will result in a filter being added to the filter
    chain to take care of this.    While you will be able to plug in your own custom
    filters, many existing filters are already at your disposal. It is beyond the
    scope of this book to discuss them all, but in the Spring Security reference manual^([3](#Chapter13.html#CHP-13-FN-3))
    you will find more information about them.    For your convenience we have included
    the complete list here in [Table 13-2](#Chapter13.html#tab_13_2). It will give
    you an idea of what is already available for you to use. The bean alias will be
    important to refer to the filter if you defined such. For example, if you add
    your own custom filters, you will be able to position them in the chain. Custom
    filters can be defined using the `<security:custom-filter />` element, for example
    `<security:custom-filter ref="myCustomFilter"/>`. By explicitly referencing these
    filters you can position them before or after a specific filter. For example,
    if you want to position `myCustomFilter` after the `FORM_LOGIN_FILTER`, you could
    define it as  ` <security:custom-filter ref="myCustomFilter" after="FORM_LOGIN_FILTER"/>`  The
    namespace element or attribute is the configuration element that triggers the
    addition of the filter in the chain. The filters are listed in the table in the
    order they would be in the chain if you define them.    ![Image](images/9781430241553_Tab13-02.jpg)    ![Image](images/9781430241553_Tab13-02a.jpg)    __________    ³
    [`http://static.springsource.org/spring-security/site/docs/3.1.x/reference/springsecuritysingle.html#filter-stack`](http://static.springsource.org/spring-security/site/docs/3.1.x/reference/springsecuritysingle.html#filter-stack)    As
    it turns out, we already configured a filter in [Listing 13-4](#Chapter13.html#list_13_4),
    by adding:  `<security:form-login login-page="/public/authentication/login.htm"
    default-target-`![Image](images/U002.jpg) `url="/public/main.htm"/>`  If you take
    a look at the [Table 13-2](#Chapter13.html#tab_13_2), you will see that the `http/form-login`
    configured the `UsernamePasswordAuthenticationFilter`. This filter will leverage
    the previously described functionality of redirecting the user to the login page
    or the index page. As the name implies, it also covers other functionality, as
    we will discuss later.    #### Defining Which Resources to Secure    Next we must
    tell Spring Security which resource should be secured. This is again done by implicitly
    adding a filter to the filter chain. We don’t declare a new filter, but instead
    use an existing one provided by Spring Security. We will use an element from the
    security namespace: `<security:intercept-url>`. If you look at [Table 13-2](#Chapter13.html#tab_13_2),
    you will see that this element (`intercept-url`) matches the `ChannelProcessingFilter`
    and will be a child element of the `http` element. This is the filter that Spring
    Security will add automatically to the chain when we specify `<security:intercept-url>`.
    The filter will perform the authentication check if the resource you entered in
    the pattern matches with the resource requested.    At this point we have a mixture
    of flows and pages, the latter being controlled directly by a Spring MVC controller.
    We will list them here for completeness. For each we will indicate whether it
    should be available publicly or privately (authenticated access only). Let’s start
    with the flows, in [Table 13-3](#Chapter13.html#tab_13_3).    ![Image](images/9781430241553_Tab13-03.jpg)    Next,
    in [Table 13-4](#Chapter13.html#tab_13_4) we will list the URLs for which there
    is an `@RequestMapping` in a Spring MVC controller. We again define if they should
    be available publicly or only after authentication.    ![Image](images/9781430241553_Tab13-04.jpg)    To
    organize the pages that require public or authenticated access, we are going to
    group them under `WEB-INF/view/public` and `WEB-INF/view/secured`.    #### Configuring
    Access to Resources    [Listing 13-5](#Chapter13.html#list_13_5) shows the preceding
    access rules converted to our XML configuration and added to the base configuration
    we already put together in [Listing 13-4](#Chapter13.html#list_13_4).    ***Listing
    13-5.** Adding the intercept-url rules based on the request URIs we explicitly
    want to configure*  `<security:http use-expressions="true" >` `<security:form-login
    login-page="/public/authentication/login.htm"` ![Image](images/U002.jpg) `    default-target-url="/public/main.htm"`![Image](images/U002.jpg)
    `    authentication-failure-url="/public/authentication/login.htm"  />`  `    <security:intercept-url
    pattern="/index.jsp" access="permitAll" />`  `    <security:intercept-url pattern="/public/**"
    access="permitAll" />` `    <security:intercept-url pattern="/secured/**" access="fullyAuthenticated"/>`  `    <security:intercept-url
    pattern="/**" access="denyAll" />` `</security:http>`  This listing should be
    read from top to bottom. This means that you should specify the more specific
    rules first, followed by the more general rules. If a resource matches a pattern,
    either directly or by wildcards specified in the pattern, the level of authentication
    specified by the `access` attribute will be required. If that condition is met,
    access is granted; otherwise it is denied.    First we declared that `index.jsp`
    (our welcome) file is accessible for everyone. Next we defined the `/secured/**`
    and `/public/**` matching patterns. By default ant^(**[4](#Chapter13.html#CHP-13-FN-4)**)
    style matching patterns are used. Every URL beginning with `/secured` requires
    the user to be fully authenticated before access is granted. URLs beginning with
    `/public` are able to be accessed by any one. We will discuss the `access` attribute
    and where those values are coming from in a minute.    As you recall, our flows
    are placed together with our pages. To start `ordersOverviewflow` you need to
    be fully authenticated, since the path for this flow is `secured/ordersOverview`.
    Because of this we do not need to specify extra rules, since access to anything
    under `/secured` will be captured by our `/secured/**` rule.    If you store your
    flows in a separate location, however, for example under `WEB-INF/flows`, and
    you made `WEB-INF/flows` your base path using the `base-path` attribute of the
    `<webflow:flow-registry>`, you will have to follow the same convention. That is,
    you will have to put secured flows under `flows/secured` and public flows under
    `flows/public`. If you don’t, for example if you put all flows under `/flows`,
    you will have to add separate `<security:intercept-url>` rules for each flow.    If
    we request access to the `/createOrders-flow` we don’t need to be authenticated
    to get access. If we try to access the `/placeOrders-flow`, however, we will need
    to be authenticated first. If we are not authenticated, we are redirected to the
    login page. After the login succeeds, Spring Security takes us back to the secured
    resources we asked for in the first place `(/placeOrders-flow` in this case).    You
    might also have noticed that we added an attribute in the `<security:http>` element
    called `use-expressions` with value `true`. We also have to explain where the
    `fullyAuthenticated`, `permitAll` and `denyAll` values suddenly come from. Before
    we can do that we have to explain a bit more about how Spring Security works.    Whenever
    a `<security:intercept-url>` matches an incoming request URL, Spring Security
    needs to know which conditions should be checked to grant or deny access. These
    conditions are checked by a so called `org.springframework.security.access.AccessDecisionManager`.
    An `AccessDecisionManager` has in turn one or more instances of `org.springframework.security.access.AccessDecisionVoter`.
    Each voter will evaluate if access is granted, abstained, or denied. This is indicated
    by the return value of the `vote` method of the `AccessDecisionVoter`. This return
    value is a primitive `int`, which can be one of the following constants: `AccessDecisionVoter.ACCESS_ABSTAIN,`
    `AccessDecisionVoter.ACCESS_DENIED`, or `AccessDecisionVoter.ACCESS_GRANTED`    __________    ⁴
    [`http://static.springsource.org/spring/docs/3.1.0.RELEASE/javadocapi/org/springframework/util/AntPathMatcher.html`](http://static.springsource.org/spring/docs/3.1.0.RELEASE/javadocapi/org/springframework/util/AntPathMatcher.html)    There
    are three implementations of the `AccessDecisionManager` interface. We will be
    using `org.springframework.security.access.vote.AffirmativeBased`. This `AccessDecisionManager`
    will allow access if at least one of its voters returns `ACCESS_GRANTED`. The
    other two are `org.springframework.security.access.vote.ConsensusBased`^(**[5](#Chapter13.html#CHP-13-FN-5)**)
    and `org.springframework.security.access.vote.UnanimousBased`.^([6](#Chapter13.html#CHP-13-FN-6))
    See their respective JavaDoc for more details.    The `access-decision-manager-ref`
    attribute of the `http` element is the way to reference an `AccessDecisionManager.`
    However, when defining the `use-expressions` attribute, an `AffirmativeBased`
    `AccessDecisionManager` will be added for us automatically. So there is no need
    to configure an `AccessDecisionManager` ourselves, and thus we can leave the `access-decision-manager-ref`
    attribute absent. The `AccessDecisionVoter` that is used is `org.springframework.security.web.access.expression.WebExpressionVoter`,
    which will help resolving the (SpEL) expressions you will be able to use in the
    `access` attribute.    At this stage we have configured Spring Security so that
    it will intercept each request and scan our list of `<security:intercept-url>`
    entries. If the request resource matches any of the listed entries, either directly
    or by wildcard matching, the access attribute is checked to see what has to be
    done. If the access attribute is `permitAll`, access is always granted. If the
    access attribute is `fullyAuthenticated`, the user must be authenticated to be
    allowed access. If that is not the case, the user is redirected to the login page
    automatically. After login, the user will be redirected back to the secured resource.    Finally,
    if the requested resource does not match any entry, access is denied by default
    by using the `denyAll` `access` attribute. By default this will render the server’s
    default “403 access denied” page. So accessing a random URL will bring up this
    page. Even after the user has logged in, accessing a random URL will still trigger
    the “access denied” page, because there was no previous rule that explicitly *granted*
    access. All resources that are not explicitly listed are now by default shielded
    from any user access.    ![Image](images/square.jpg) **Tip** When configuring
    access to resources, it is always wise to close up with a deny all rule. If the
    access requirements for the requested resource aren’t listed, access is simply
    denied. When the user accesses a resource other than the ones we listed, a “403
    access denied” page will be shown on the user’s browser. This makes sure that
    resources which are not explicitly configured cannot be accessed by accident.       ![Image](images/square.jpg)
    **Note** In the list of resources, we mentioned that access to resources should
    be public. To do this, we changed the mapping in the resource holder defined in
    `WebMvcContextConfiguration`. We prefixed the URL with `/public` in order to make
    our resources publicly available without requiring authentication:  `public void
    addResourceHandlers(ResourceHandlerRegistry registry) {` `registry.addResourceHandler("/public/resources/**/*").`
    `    addResourceLocations("classpath:/META-INF/web-resources/");` `}`  __________    ⁵
    [`http://static.springsource.org/springsecurity/site/docs/3.1.x/apidocs/org/springframework/security/access/vote/ConsensusBased.html`](http://static.springsource.org/springsecurity/site/docs/3.1.x/apidocs/org/springframework/security/access/vote/ConsensusBased.html)    We
    refactored all URL mapping in the pages accordingly to be prefixed with /public.    #####
    Overview of Expression Methods and Literals    We still need to explain where
    the `permitAll`, `fullyAuthenticated` and `denyAll` come from. These are all Spring
    EL expressions that are evaluated with a special Spring Security-aware context.
    In a normal Spring EL environment, evaluating `denyAll` would trigger an exception.
    However, in this scope, extra methods and properties are implicitly available
    for your expressions.    Although we cannot cover all possibilities here, [Table
    13-5](#Chapter13.html#tab_13_5) provides a quick overview of the methods you can
    use in the `access` attribute when using expressions, and [Table 13-6](#Chapter13.html#tab_13_6)
    summarizes the properties).    ![Image](images/9781430241553_Tab13-05.jpg)    ![Image](images/square.jpg)
    **Note** These methods can be found in the super class `org.springframework.security.access.expression.SecurityExpressionRoot`
    and its subclass `org.springframework.security.web.access.expression.WebSecurityExpressionRoot`.
    You will see that in the super class there are additional methods not covered
    in [Table 13-5](#Chapter13.html#tab_13_5). We didn’t include them, because they
    are aliases; for example, `hasAuthority` and `hasAnyAuthority` are aliases for
    respectively `hasRole` and `hasAnyRole`. We also omitted the `hasPermission` methods,
    which are specifically for method-based security in combination with post- and
    pre filtering.    __________    ⁶ [`http://en.wikipedia.org/wiki/CIDR_notation`](http://en.wikipedia.org/wiki/CIDR_notation)    The
    methods in [Table 13-6](#Chapter13.html#tab_13_6) can also be accessed as properties.
    They provide access to a getter method that returns an `Object`, such as the `principal`.
    The principal is just an `Object`. Most of the time this is an instance of the
    `org.springframework.security.core.UserDetails` interface, as we will discuss
    later. Or they provide a shortcut for a getter method that returns a boolean (those
    properties start with `is` rather than `get`). For example, the method boolean
    isFullyAuthenticated() can be called directly as the property `isFullyAuthenticated`.
    The result is exactly the same as the method syntax, but saves you the effort
    of typing the parentheses.    ![Image](images/9781430241553_Tab13-06.jpg)    Remember
    that the expressions, whether you are using methods or properties, are Spring
    EL expressions. You will be able to use logical operators such as `and`, `or`
    etc. For example `access="hasRole(''ROLE_X'')` **`and`** `hasRole(''ROLE_Y'')`    ####
    Configuring Authentication    When users are redirected to the login page, the
    application asks them to enter a username and password combination in order to
    proceed. Spring Security will receive this information but needs to verify that
    the user exists and that the password supplied matches for that user.    In order
    to do this we need some kind of user store to hold the users (and passwords) that
    are able to access the application. To keep things simple for now, we will use
    an in-memory data store, which we will fill with users and passwords entirely
    specified in the configuration. Later we will see how to replace this with a database
    store.    We need to configure an `org.springframework.security.authentication.AuthenticationManager`
    to do this. Spring Security offers a namespacing construct (`<security:authentication-manager>`)
    that, unlike the `org.springframework.security.access.AccessDecisionManager`,
    will keep the coding required short and easy. Using this construct we don’t have
    to wire this authentication manager explicitly; it will be auto detected by Spring.    In
    order for the authentication manager to do its job, it needs a reference to an
    authentication provider. This is the bridge to the store that contains the user
    details. In this case we won’t reference an external provider but use the in-memory
    user-service, which is declared as `<security:user-service>` and takes a list
    of `<security:user>` elements, each representing a user in our system (see [Listing
    13-6](#Chapter13.html#list_13_6)). A user has a username (abbreviated `name` in
    this case), a password, and a comma-separated list of authorities. The authorities
    are of no importance for the moment. Later we will show how we can use them.    ***Listing
    13-6.** The authentication manager configuration with in-memory user-data store*  `<security:authentication-manager>`
    `    <security:authentication-provider>` `        <security:user-service >` `            <security:user
    name="jd"            ` `                password="5238377ba2eac049901b54004ee9e03db62c0ab0b48133a4a162ab3aedfc809f"`![Image](images/U002.jpg)
    `                authorities="ROLE_CUSTOMER"/>` `        </security:user-service>`
    `    </security:authentication-provider>` `</security:authentication-manager>`  What
    is important is that this code is not yet complete. As you can see, we have a
    strange and long password. This is called a *one-way hashed password*. A one way
    hash is a cryptographic function that takes plain text as input and generates
    another, weird-looking, string as output, called a hash (or digest). The general
    idea is that the hash cannot (without taking decades of computing time) be reverse-engineered
    to the original plain-text form. In order to compare these passwords, one takes
    the password as entered by the user, hashes it with the hash function and then
    compares the output with the hash stored in the data store. If the hashes match,
    the password is the same.    In this case we used the SHA2 hashing algorithm with
    an output size of 256-bit (so SHA-256). The only problem is that Spring now expects
    the user to enter the hash  `"5238377ba2eac049901b54004ee9e03db62c0ab0b48133a4a162ab3aedfc809f"`  as
    the password, instead of the readable password. Because Spring does not know that
    what we stored is actually a hash, it thinks that this long string is the actual
    password that the user has to enter.    What is left to do is configure Spring
    to take the real plain-text password by the user, hash it using the selected hashing
    algorithm, and then compare the output hash with the hash value we supplied in
    the password field. In [Listing 13-7](#Chapter13.html#list_13_7), we do this by
    specifying the `<security:password-encoder>`. There is not much to configure.
    We just say we are using SHA-256 bit (which is actually SHA version 2). There
    is also a weird sub element, which we will discuss in a minute. With this password
    encoder, Spring Security knows that our passwords are hashed, and that it should
    hash the user’s entered password first before comparing the value with the one
    in our data store.    ***Listing 13-7.** Adding the password encoder*  `<security:authentication-manager>`
    `    <security:authentication-provider>` `        <security:password-encoder hash="sha-256">`
    `            <security:salt-source user-property="username"/>` `        </security:password-encoder>`
    `        <security:user-service >` `<security:user name="jd"` ![Image](images/U002.jpg)
    `                password="5238377ba2eac049901b54004ee9e03db62c0ab0b48133a4a162ab3aedfc809f"`![Image](images/U002.jpg)
    `                authorities="ROLE_CUSTOMER"/>` `        </security:user-service>`
    `    </security:authentication-provider>` `</security:authentication-manager>`  ![Image](images/square.jpg)
    **Note** Why did we make things more complex by introducing a hashed password
    rather than a plain text one, when we are creating just the basic setup? We did
    this for a good reason. Never, ever, store a password in plain text. Not even
    in a temporary (or basic) solution. A wise man once told us “in practice, a temporary
    solution is the equivalent of a production ready solution that will stay there
    forever.” Ask yourself; how many times have you developed something temporary
    that is still out there? Also, when working with Spring Security or Java, there
    is no good reason not to hash your passwords. With the Apache Commons Codec,^([7](#Chapter13.html#CHP-13-FN-7))
    you can create a hash with a single line of code. Never store plain-text passwords!
    Also, if someone performs an audit and sees that passwords are in plain text,
    you will be in trouble. This is the first step of any secure application.    You
    might wonder, how did we generate the hash in the first place? We could have written
    a small Java tool which does that for us, using the Apache Commons Codec:  `String
    hashedPassword =` ![Image](images/U002.jpg) `org.apache.commons.codec.digest.DigestUtils.sha256Hex(plainTextPassword);`  Or,
    we could have Googled an online site to do that. There are also plenty of free
    tools out there that can generate any kind of hash. Just one note, be careful
    using online generators, as you will be passing around real passwords. For testing
    purposes this will do fine, but for real case scenarios, think about writing a
    tool yourself or downloading a well-known tool**^([8](#Chapter13.html#CHP-13-FN-8))**
    instead.    The password we hashed is “secret”. If you would verify this you’ll
    notice that the hashes don’t quite match. In this case we are using a “salted
    hash” which is nothing more than the password suffixed with extra data that can
    be found when authenticating the user. For example, it could be the first name
    of the user. In this case we have chosen the easiest element; the username.    __________    ⁷
    [`http://commons.apache.org/codec/`](http://commons.apache.org/codec/)    ⁸ [`http://www.slavasoft.com/hashcalc/`](http://www.slavasoft.com/hashcalc/)
    `(Windows only - freeware)` [`http://sourceforge.net/projects/hash-calculator/files/hash-calculator/`](http://sourceforge.net/projects/hash-calculator/files/hash-calculator/)
    `(Java - open source)`    The goal of the salt is to make the digests more unique.
    If two users use the same password, the same hash will be generated. When using
    a salt, the hashes will differ, as they are calculated using another suffix (in
    this case their username).    Having the same hash doesn’t hurt, as they (practically)
    cannot be reverse engineered. However, you are giving away a free hint: someone
    looking at the hashes might note that multiple users have the same hash, and thereby
    implicitly know that they also have the same password. By adding the salt you
    are taking away that last hint, and you are also making the passwords longer.
    The longer the password, the more resistant the hash will be against attacks.    Spring
    calculates the salted hash by using this scheme:  `plaint_text_password{salt}`  In
    our case we have to calculate the hash as `secret{jd}`, where `jd` is the username
    of our user. If you now try to regenerate the hash with this input string, you’ll
    notice that it will match with the hash shown above. We will configure this as
    shown in [Listing 13-8](#Chapter13.html#list_13_8).    ***Listing 13-8.** The
    password encoder using a property as salt*  `<security:password-encoder hash="sha-256">`
    **`<security:salt-source user-property="username"/>`** `</security:password-encoder>`  We
    have now configured the password encoder with a type of hash. Internally, we supplied
    it with a salt source that has a `user-property` with the value `“username”`.
    Let’s look in more detail at how Spring Security will handle this:    > 1.  Before
    applying the hash function, first resolve our salt. The salt is retrieved from
    the `UserDetails` object (which we will introduce later). The property that should
    be used from this `Object` is indicated by the value of the `user-property` attribute
    (`“username”`). The value from the `username` property is retrieved from the `UserDetails`
    `Object`. That value will be our salt. The salt is then added at the end of the
    password between braces. So, when our password is `secret` and the username property
    of the `UserDetails` object is `jd`, our password string will now be `secret{jd}.`
    > 2.  Hash the password string `secret{jd`} using SHA 256bit. > 3.  Finally, compare
    the result from the hash function with the one retrieved from the users data store.    ####
    Putting It All Together    Before we can test our application, we still have to
    make some modifications to our pages. In the previous application our pages were
    adapted for the custom authentication scheme that we created ourselves. In particular,
    the login and landing page need some modifications to work together with Spring
    Security.    First we will take care of the login page. Spring Security will perform
    authentication, based on the username and password that we will supply. We will
    do this by our login page, which has username and password fields. But Spring
    needs to know about these items, so we are going see how to handle that. We will
    also see how we can show error messages that the login might have produced.    Next
    we will make a small modification to our home page to indicate whether the authentication
    was successful. Previously, if a user logged in using the login link, he or she
    could only infer that the login must have succeeded since there was no error.
    We will enhance this a bit with a message saying that the authentication succeeded.    Finally,
    we will change the logout so it is handled by Spring Security as well.    #####
    Changing the Login Page    As we explained previously, we implicitly configured
    a filter (`UsernamePasswordAuthenticationFilter`) that will perform redirection
    to the login page and landing page. Besides this, this filter will also listen
    to a preconfigured URL and look for preconfigured request parameters for username
    and password. These default key values are as follows:    > *   Username request
    parameter name: `j_username` > *   Password request parameter name: `j_password`
    > *   Request URL: `/j_spring_security_check`    ![Image](images/square.jpg) **Note**
