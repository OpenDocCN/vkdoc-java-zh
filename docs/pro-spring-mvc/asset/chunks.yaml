  raw: '#### Excel


    Spring has two ways of rendering an Excel document. The first is by using the
    JExcel library,^([6](#Chapter08.html#CHP-8-FN-6)) and the other is using the Apache
    POI library.^([7](#Chapter08.html#CHP-8-FN-7)) Both approaches need us to implement
    a view (just as with a PDF); to do that, we extend either `org.springframework.web.servlet.view.document.AbstractJExcelView`
    or `org.springframework.web.servlet.view.document.AbstractExcelView`. They are
    respectively for JExcel and Apache POI. Both implementations hide the setup and
    allow for a template xls to be loaded and processed; we need to add the view-specific
    rendering. We need to implement the `buildExcelDocument` method for that. [Listing
    8-23](#Chapter08.html#list_8_23) shows a JExcel example of an order as an Excel
    document.


    _________


    ⁶ [`http://jexcelapi.sourceforge.net/`](http://jexcelapi.sourceforge.net/)


    ⁷ [`http://poi.apache.org/`](http://poi.apache.org/)


    ***Listing 8-23.** OrderExcelView*


    `package com.apress.prospringmvc.bookstore.web.view;`


    `// Other imports omitted`

    `import jxl.write.DateTime;`

    `import jxl.write.Label;`

    `import jxl.write.WritableSheet;`

    `import jxl.write.WritableWorkbook;`


    `import org.springframework.web.servlet.view.document.AbstractJExcelView;`


    `import com.apress.prospringmvc.bookstore.domain.Order;`

    `import com.apress.prospringmvc.bookstore.domain.OrderDetail;`


    `public class OrderExcelView extends AbstractJExcelView {`


    `    @Override`

    `    protected void buildExcelDocument(Map<String, Object> model,`

    `                                      WritableWorkbook workbook,`

    `                                      HttpServletRequest request,`

    `                                      HttpServletResponse response)`

    `    throws Exception {`

    `        Order order = (Order) model.get("order");`


    `        WritableSheet sheet = workbook.createSheet("Order", 0);`

    `        sheet.addCell(new Label(1, 1, "Order :" + order.getId()));`

    `        sheet.addCell(new Label(1, 2, "Order Date"));`

    `        sheet.addCell(new DateTime(2, 2, order.getOrderDate()));`

    `        sheet.addCell(new Label(1, 2, "Delivery Date"));`

    `        sheet.addCell(new DateTime(2, 2, order.getDeliveryDate()));`


    `        sheet.addCell(new Label(1, 4, "Title"));`

    `        sheet.addCell(new Label(2, 4, "Price"));`

    `        sheet.addCell(new Label(3, 4, "#"));`

    `        sheet.addCell(new Label(4, 4, "Total"));`


    `        int row = 4;`

    `        for (OrderDetail detail : order.getOrderDetails()) {`

    `            row++;`

    `            sheet.addCell(new Label(1, row, detail.getBook().getTitle()));`

    `            sheet.addCell(new jxl.write.Number(2, row, detail.getBook().getPrice()`![Image](images/U002.jpg)

    `.doubleValue()));`

    `            sheet.addCell(new jxl.write.Number(3, row, detail.getQuantity()));`

    `            sheet.addCell(new jxl.write.Number(2, row, detail.getPrice().doubleValue()));`

    `        }`

    `    }`


    `}`


    Next to the view we need to add a view resolver. In our sample application we
    are going to add this, just like the PDF view, to our `ViewConfiguration` class.
    We are going to add another instance of our custom implementation (see [Listing
    8-24](#Chapter08.html#list_8_24)) and let the `ContentNegotiatingViewResolver`
    decide what to do.


    ***Listing 8-24.** ViewConfiguration with OrderExcelView*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `//Other imports omitted, see Listing 8-22`

    `import org.springframework.web.servlet.view.document.AbstractJExcelView;`

    `import org.springframework.web.servlet.view.document.AbstractPdfView;`


    `import com.apress.prospringmvc.bookstore.web.view.OrderExcelView;`


    `@Configuration`

    `public class ViewConfiguration {`


    `    @Bean`

    `    public ContentNegotiatingViewResolver contentNegotiatingViewResolver() {`

    `        ContentNegotiatingViewResolver viewResolver;`

    `        viewResolver = new ContentNegotiatingViewResolver();`

    `        List<ViewResolver> viewResolvers = new ArrayList<ViewResolver>();`

    `        viewResolvers.add(pdfViewResolver());`

    **`viewResolvers.add(xlsViewResolver());`**

    `        viewResolver.setViewResolvers(viewResolvers);`

    `        return viewResolver;`

    `    }`


    `    @Bean`

    `    public ViewResolver xlsViewResolver() {`

    `        SimpleConfigurableViewResolver viewResolver;`

    `        viewResolver = new SimpleConfigurableViewResolver();`

    `        Map<String, AbstractJExcelView> views;`

    `        views = new HashMap<String, AbstractJExcelView>();`

    `        views.put("order", new OrderExcelView());`

    `        viewResolver.setViews(views);`

    `        return viewResolver;`

    `    }`

    `    // Other methods omitted see Listing 8-22`

    `}`


    But, wait, isn’t our application going to break because we have multiple view
    implementations resolving to the `order` view name? The special view resolver
    `ContentNegotiatingViewResolver` is going to help us here. It will determine which
    of the resolved views best matches the content-type requested. So without changing
    our controller and by simply adding some configuration (and view implementations),
    we can differentiate which view is being served.


    To test, click the xls link and an Excel document will be downloaded for you to
    view.'
