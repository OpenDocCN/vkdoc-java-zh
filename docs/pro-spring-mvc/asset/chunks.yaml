- fmt: "### Web Flow AJAX Support\n\nWeb Flow has support for AJAX on both the server\
    \ and client sides. The server side supports selective partial rendering via the\
    \ `<render>` element, on which one or more fragments can be specified that need\
    \ to be rendered.\n\nOn the client side, there is a JavaScript library available\
    \ that will automatically interpret the partial responses and execute the partial\
    \ page refreshes.\n\nThe JavaScript part is based on the Dojo framework and is\
    \ branded Spring JS (Spring JavaScript). It is packaged as part of Web Flow, but\
    \ as a separate artifact. This means you have to put a separate dependency in\
    \ your build system to obtain this dependency because it does not come directly\
