- fmt: "##### Form Validation Using the Application Controller\n\nThe final validation\
    \ method performs custom validation inside a controller method that is called\
    \ by a Web Flow expression (see [Listing 11-23](#Chapter11.html#list_11_23)).\
    \ You can see an example of this in the `validateDeliveryDate` method of the `com.apress.prospringmvc.bookstore.web.controller.OrderController`,\
    \ which is called right before finalizing the order on the select delivery options\
    \ page (see [Listing 11-24](#Chapter11.html#list_11_24)).\n\n**Listing 11-23.**\
    \ Calling the Validation Method on the Application Controller\n\n```\n<view-state\
    \ id=\"selectDeliveryOptions\" view=\"selectDeliveryOptions\" model=\"orderForm\"\
    >\n    <transition on=\"previous\" to=\"selectBooks\" />\n    <transition on=\"\
    finish\" to=\"end\">\n        <evaluate expression=\"orderController.validateDeliveryDate(flowScope.orderForm,\
    \ messageContext)\"/>\n        <evaluate expression=\"orderController.placeOrder(flowScope.orderForm,\
    \ externalContext.sessionMap.authenticatedAccount)\"/>\n    </transition>\n  \
    \  <transition on=\"cancel\" to=\"end\" />\n</view-state>\n```\n\n**Listing 11-24.**\
    \ The Validation Method on the `OrderController`\n\n```\npublic Event validateDeliveryDate(OrderForm\
    \ orderForm, MessageContext messageContext) {\n    if (orderForm.getDeliveryDate()\
    \ == null){\n        MessageBuilder errorMessageBuilder = new MessageBuilder().error();\n\
    \        errorMessageBuilder.source(\"deliveryDate\");\n        errorMessageBuilder.code(\"\
    error.page.selectdeliveryoptions.deliverydate.required\");\n        messageContext.addMessage(errorMessageBuilder.build());\n\
    \        return new EventFactorySupport().error(this);\n    }\n\n    if (orderForm.getDeliveryDate().before(DateUtils.truncate(orderForm.getOrderDate(),\
    \ Calendar.DAY_OF_MONTH))){\n        MessageBuilder errorMessageBuilder = new\
    \ MessageBuilder().error();\n        errorMessageBuilder.source(\"deliveryDate\"\
    );\n        errorMessageBuilder.code(\"error.page.selectdeliveryoptions.deliverydate.in.past\"\
    );\n        messageContext.addMessage(errorMessageBuilder.build());\n        return\
    \ new EventFactorySupport().error(this);\n    }\n    return new EventFactorySupport().success(this);\n\
    }\n```\n\nThe evaluate action for validating the delivery date is executed when\
    \ a user clicks the finish button (triggering the `finish` transition) after entering\
    \ the delivery options. The invocation occurs before the invocation to create\
    \ the actual order. We pass along the form and `messageContext` (a Web Flow implicit\
    \ object). Inside this, we use the message context to add a custom message when\
    \ the validation fails, as you can see in the preceding code snippet.\n\nYou might\
    \ have noticed that this method returns the `org.springframework.webflow.execution.Event`.\
    \ This is in contrast to other methods we have called previously when using an\
    \ evaluate expression. For example, the `addBook` method in the `com.apress.prospringmvc.bookstore.web.controller.OrderController`\
    \ simply returns `void`.\n\nWhen executing an expression, the result (if it isn't\
    \ already an `Event`) is internally converted to an `Event`. These objects drive\
    \ the transition, indicating whether the evaluation succeeded or failed (or any\
    \ other `java.lang.String` based outcome). Also, these objects can optionally\
    \ have objects as attributes associated with them.\n\nWhen you do not need to\
    \ trigger outcome conditions, there is no need to use an `Event` as a return value,\
    \ and you can return the value as-is (or simply return `void`). Web Flow will\
    \ do the conversion to a successful `Event` for you.\n\nHowever, in this case\
    \ we need to differentiate between a validation success and a validation failure.\
    \ Both will render different results. In the first case, we want to proceed with\
    \ the order-creation process; in the second case, we want to render the select\
    \ delivery options page again to show the error message and let the user try again.\
    \ We signal this explicitly with events. Note that we could have attached a result\
    \ with the successful `Event`, which could then be bound using the `result` attribute\
    \ of the evaluate action. We will discuss this later in this chapter's \"Working\
    \ with Outcome Events\" section."
  raw: '##### Form Validation Using the Application Controller


    The final validation method performs custom validation inside a controller method
    that is called by a Web Flow expression (see [Listing 11-23](#Chapter11.html#list_11_23)).
    You can see an example of this in the `validateDeliveryDate` method of the `com.apress.prospringmvc.bookstore.web.controller.OrderController`,
    which is called right before finalizing the order on the select delivery options
    page (see [Listing 11-24](#Chapter11.html#list_11_24)).


    ***Listing 11-23.** Calling the Validation Method on the Application Controller*


