    `    }`


    `    private void registerHiddenHttpMethodFilter(ServletContext servletContext)
    {`

    `        FilterRegistration.Dynamic registration;`

    `        registration = servletContext.addFilter("hiddenHttpMethodFilter",`

    `                                 HiddenHttpMethodFilter.class);`

    `        registration.addMappingForServletNames(`

    `                 EnumSet.of(DispatcherType.REQUEST, DispatcherType.FORWARD),`

    `                 false,`

    `                 DISPATCHER_SERVLET_NAME);`

    `    }`

    `    // Other methods omitted`

    `}`


    Now that we have configured the filter, we need to modify our account page. Open
    up the `account.jsp` file and make sure there is a hidden field with the name
