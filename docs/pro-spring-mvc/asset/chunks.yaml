    #### 表达式


    在阅读了关于评估动作和表达式的内容后，你可能会想：“表达式”？很好。但那是哪种表达式语言呢？是 Unified EL？OGNL？SpEL？还是其他什么？实际上，这次
    Spring 的开发人员让事情变得简单了。默认情况下，Web Flow 使用 Spring EL (SpEL) 作为其表达式语言。如果你以前用过 Spring，你可能对
    SpEL 很熟悉，并且明白这能让整个体系更加一致。现在，你可以在 Web Flow 中以与在 Spring 应用程序中相同的方式使用 SpEL。


    如果你不熟悉 SpEL，可以在 Spring 参考文档中找到很好的概述。^(9) 对于 Web Flow 章节，只需要对这种表达式语言有非常基本的了解，我们只会用它来调用方法和传递参数。我们将快速介绍你需要了解的关于
    SpEL 的一切，以便理解它在 Web Flow 章节中的用法。


    ____________


    ⁸ 参见第 11 章：在“执行动作概述”部分介绍了 on start、on entry、on render、on exit 和 on end，在“动作状态”部分介绍了动作状态。


    ⁹ [`http://static.springsource.org`](http://static.springsource.org)`/spring/docs/3.1.0.RELEASE/spring-frameworkreference/htmlsingle/spring-framework-reference.html#new-feature-el`


    首先，SpEL 与 Unified EL 类似，但它有一些额外的功能，比如方法调用和字符串模板函数。使用 SpEL，我们可以在运行时操作我们的对象图。要访问
    bean 的属性，我们引用该 bean 并简单地指定我们想要获取的属性。表达式是一个以 `#{` 开头、以 `}` 结尾的字符串。Spring 会检测到该表达式并使用它来解析值。


    要访问一个属性，我们只需编写 `#{bean.property}`，这告诉 Spring 在名为 `bean` 的 bean 上执行 `getProperty()`
    方法。*点号* (`.`) 是分隔符，第一部分用于查找名为 `bean` 的对象，第二部分是根据 JavaBeans 规范指定的属性名称（因此你不需要指定
    `get` 或 `set`）。


    在这种情况下，bean 名称是 Web Flow 可用的任何作用域中的一个键（我们将在第 11 章的“不同的 Web Flow 作用域”部分讨论这些）。默认情况下，Web
    Flow 会扫描所有可用的作用域，以查找具有匹配键的 bean。如果未找到匹配项，则会接着尝试应用程序上下文，以解析具有匹配 bean 标识符的 bean。


    ![图片](img/square.jpg) **注意** 应用程序上下文（通常）存储你的控制器、服务、仓库等。这些是无状态（并作为单例运行）的对象类型。你的真实状态，例如包含用户数据的表单，则存储在任何可用的作用域上，无论是
    Web Flow 提供的作用域还是实际的 Servlet 提供的作用域。


    除了访问属性，你还可以调用方法并传递参数。其工作方式相同。例如，看看 Web Flow 中评估动作的这个表达式：


    `<evaluate expression = "someService.someMethod(someObject)"/>`


    这将执行 `someMethod`——`someService` 的一个方法，并将 `someObject` 作为参数传递。同样，表达式解析器默认会扫描所有作用域以查找服务对象和参数（包括应用程序上下文）。你还可以使用隐式对象来表示作用域或其他直接可用的特殊对象。虽然这些与表达式语言没有严格关系，但它们可以被视为始终可用的*别名*。同样，我们将在第
    11 章中介绍隐式对象。


    在清单 10-2 的早期示例中，我们调用了 `orderController` 的 `initializeForm()` 方法：


    `<on-start>`

    `    <evaluate`

    `        expression="orderController.initializeForm()"`![图片](img/U002.jpg)

    `        result="flowScope.orderForm"/>`

    `    <evaluate`

    `        expression="orderController.initializeSelectableCategories()"`![图片](img/U002.jpg)

    `        result="flowScope.selectableCategories"/>`

    `</on-start>`


    在执行表达式时，`orderController` 在应用程序上下文中被找到。该方法返回的结果是将在整个流程中使用的完全初始化的模型。该结果被绑定到流程作用域。


    查看前面的表达式时，你可能会注意到我们省略了表达式分隔符（`#{}`）。放置分隔符的原因是为了向基础设施明确你正在定义一个表达式。否则，它如何区分普通的字面值和表达式呢？然而，在评估动作的情况下，有一个显式的
    `expression` 属性。我们只期望那里有一个表达式，因此不需要使用分隔符。在这种情况下，甚至*禁止*使用表达式分隔符。我们认为这有点奇怪，但事实就是如此。


    在你创建模板表达式或在既用于字面值又用于表达式的属性（例如，视图状态的 `view` 属性）中使用表达式的情况下，你必须使用分隔符来标明表达式部分的位置。例如，考虑这个片段：


    `<view-state view="myView#{someVariable}"/>`


    这里我们标明 `#{someVariable}` 是表达式部分。如果我们改为放置 `myViewSomeVariable`，那么整个值将被解释为字面值。


    ![图片](img/square.jpg) **注意** 你可能是一位 Web Flow 1 的用户，并且更喜欢 OGNL（该版本的默认表达式语言）。或者，你可能正在从
    Web Flow 2 的早期版本升级，其中 Unified EL 是默认的表达式语言。在第 12 章中，我们将说明如何将默认表达式语言更改为 Unified
    EL 或 OGNL。但是，我们鼓励你使用 SpEL（默认值），并且只有在有充分理由的情况下才偏离此选项。


    ### 配置


    现在你已经了解了基本流程及其主要元素的样子，是时候进行一些实际操作了。我们应该做的第一件事是配置我们选择的 Web 应用程序框架（Spring MVC）。接下来，我们将配置
    Web Flow 并解释 Web Flow 如何与 Spring MVC 集成。


    除了 Spring MVC 之外，Web Flow 还对以下内容有特殊的集成支持：


    *   Spring Portlet MVC

    *   JSF2


    这里不讨论这些选项，但重要的是要告诉你，Web Flow 并不仅仅绑定到 Spring MVC。这是一件好事，因为你在这里学到的知识可能对使用其他 Web
    技术的项目有用。


    ![图片](img/square.jpg) **注意** 这里解释的配置和示例代码片段可以在 `chapter10-bookstore` 示例部分找到。在本书的开头，你将找到关于如何在
    STS IDE 中导入此项目或如何直接从嵌入式 Web 容器运行它的详细信息。要理解配置，并不需要了解我们正在构建的应用程序的来龙去脉——这就是我们首先讨论此设置的原因。这里我们首先关注通用的
    Spring MVC/Web Flow 配置。正如“欢迎”部分所解释的，我们特别注意尽可能完整地说明本书中的代码，以便你无需访问示例应用程序就能理解正在发生的事情。

