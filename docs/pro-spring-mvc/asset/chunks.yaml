- fmt: "#### The Data Access Layer\n\nThe data access layer is responsible for interfacing\
    \ with the underlying persistence mechanism. This layer knows how to store and\
    \ retrieve objects from the datastore. It does this in such a way that the service\
    \ layer doesn’t know which underlying datastore is used. (The datastore could\
    \ be a database, but it could also consist of flat files on the file system.)\n\
    \nThere are several reasons for creating a separate data access layer. First,\
    \ we don’t want to burden the service layer with knowledge of the kind of datastore\
    \ (or datastores) we use; we want to handle persistency in a transparent way.\
    \ In our sample application, we use an in-memory database and JPA (Java Persistence\
    \ API) to store our data. Now imagine that, instead of coming from the database,\
    \ our `com.apress.prospringmvc.bookstore.domain.Account` comes from an Active\
    \ Directory Service. We could simply create a new implementation of the interface\
    \ that knows how to deal with Active Directory—all without changing our service\
    \ layer. In theory, we could swap out implementations quite easily; for example,\
    \ we could switch from JDBC to Hibernate without having to change the service\
    \ layer. It is quite unlikely that this will happen, but it is nice to have this\
    \ ability.\n\nThe most important reason for this approach is that it simplifies\
    \ testing our application. In general, data access is slow, so it is important\
    \ that we keep our tests running as fast as possible. A separate data access layer\
    \ makes it quite easy to create a stub or mock implementation of our data access\
    \ layer.\n\nThe Spring Framework has great support for data access layers. For\
    \ example, it provides a consistent and transparent way to work with a variety\
    \ of different data access frameworks (e.g., JDBC, JPA, Hibernate, iBATIS, and\
    \ JDO). Each of these technologies Spring provides extensive support for the following\
    \ abilities:\n\n*   Transaction Management\n*   Resource Handling\n*   Exception\
    \ Translation\n\nThe transaction management is transparent for each technology\
    \ it supports. There is a transaction manager that handles the transactions, and\
    \ it even has support for JTA (Java Transaction API), which enables distributed\
    \ or global transactions. This excellent transaction support means that the transaction\
    \ manager can also manage the resources for us. We no longer have to worry that\
    \ a database connection or file handle might be closed; this is all handled for\
    \ us. The supported implementations can be found in the `org.springframework.jdbc`\
    \ and `org.springframework.orm` packages.\n\n![Image](images/square.jpg) **Tip**\
    \ The Spring Data project ([`www.springsource.org/spring-data`](http://www.springsource.org/spring-data))\
    \ provides even deeper integration with several technologies. For several use\
    \ cases, it can even eliminate the need to write our own implementation of a data\
    \ access object (DAO) or repository.\n\nThe Spring Framework includes another\
    \ powerful feature as part of its data access support: exception translation.\
    \ Spring provides extensive exception translation support for all its supported\
    \ technologies. This feature transforms technology-specific exceptions into a\
    \ subclass of `org.springframework.dao.DataAccessException`. For database-driven\
    \ technologies, it can even take into account the database vendor, version, and\
    \ error codes received from the database. The exception hierarchy extends from\
    \ `RuntimeException`; and as such, it doesn’t have to be caught because it isn’t\
    \ a checked exception. For more information on data access support, please see\
    \ *Pro Spring 3* (Apress, 2012) or the online Spring Reference Guide ([`www.springsource.org/documentation`](http://www.springsource.org/documentation)).\n\
    \n[Listing 3-4](#Chapter03.html#list_3_4) shows how a data access object or repository\
    \ might look. Note that the interface doesn’t reference or mention any data access\
    \ technology we use (we use JPA for the sample application). Also, the service\
    \ layer doesn’t care how or where the data is persisted; it simply wants to know\
    \ how to store or retrieve it.\n\n**Listing 3-4.** A sample AccountRepository\n\
    \n```\npackage com.apress.prospringmvc.bookstore.repository;\n\nimport com.apress.prospringmvc.bookstore.domain.Account;\n\
    \npublic interface AccountRepository {\n\n    Account findByUsername(String username);\n\
    \n    Account findById(long id);\n\n    Account save(Account account);\n}\n```\n\
    \n### More Roads to Rome\n\nAs noted previously, the architecture discussed here\
    \ isn’t the only application architecture out there. Which architecture is best\
    \ for a given application depends on the size of the application, the experience\
    \ of the development team, and the lifetime of the application. The larger a team\
    \ or the longer an application lives, the more important a clean architecture\
    \ with separate layers becomes.\n\nA web application that starts with a single\
    \ static page probably doesn’t require any architecture. However, as the application\
    \ grows, it becomes increasingly important that we don’t try to put everything\
    \ in that single page because that would make it very difficult to maintain or\
    \ understand the app, let alone test it.\n\nAs an application grows in size and\
    \ age, we need to refactor its design and keep in mind that each layer or component\
    \ should have a single responsibility. If we detect some concern that should be\
    \ in a different layer or touches multiple components, then we should convert\
    \ it into an aspect (crosscutting concern) of the application and use AOP to apply\
    \ this aspect to the code.\n\nWhen deciding how to structure our layers, we should\
    \ try to identify a clear API (exposed through Java interfaces) for our system.\
    \ Thinking of an API for our system makes us think about our design, as well as\
    \ a useful and useable API. In general, if an API is hard to use, it is also hard\
    \ to test and maintain. Therefore, a clean API is important. In addition, using\
    \ interfaces between the different layers allows for the separate layers to be\
    \ built and tested in isolation. This can be a great advantage in larger development\
    \ teams (or in teams that consists of multiple smaller teams). It allows us to\
    \ focus on the function we’re working with, not on the underlying or higher level\
    \ components.\n\nWhen designing and building an application, it’s also important\
    \ to use good OO practices and patterns to solve problems. For example, we should\
    \ use polymorphism and inheritance to our advantage, and we should use AOP to\
    \ apply system-wide concerns. The Spring Framework can also help us wire our application\
    \ together at runtime. Taken as a whole, the features and approaches described\
    \ in this chapter can help us to keep our code clean and to achieve the best architecture\
    \ for our applications."
  raw: '#### The Data Access Layer


    The data access layer is responsible for interfacing with the underlying persistence
    mechanism. This layer knows how to store and retrieve objects from the datastore.
    It does this in such a way that the service layer doesn’t know which underlying
    datastore is used. (The datastore could be a database, but it could also consist
    of flat files on the file system.)


    There are several reasons for creating a separate data access layer. First, we
    don’t want to burden the service layer with knowledge of the kind of datastore
    (or datastores) we use; we want to handle persistency in a transparent way. In
    our sample application, we use an in-memory database and JPA (Java Persistence
    API) to store our data. Now imagine that, instead of coming from the database,
    our `com.apress.prospringmvc.bookstore.domain.Account` comes from an Active Directory
    Service. We could simply create a new implementation of the interface that knows
    how to deal with Active Directory—all without changing our service layer. In theory,
    we could swap out implementations quite easily; for example, we could switch from
    JDBC to Hibernate without having to change the service layer. It is quite unlikely
    that this will happen, but it is nice to have this ability.


    The most important reason for this approach is that it simplifies testing our
    application. In general, data access is slow, so it is important that we keep
    our tests running as fast as possible. A separate data access layer makes it quite
    easy to create a stub or mock implementation of our data access layer.


    The Spring Framework has great support for data access layers. For example, it
    provides a consistent and transparent way to work with a variety of different
    data access frameworks (e.g., JDBC, JPA, Hibernate, iBATIS, and JDO). Each of
    these technologies Spring provides extensive support for the following abilities:


    *   Transaction Management

    *   Resource Handling

    *   Exception Translation


    The transaction management is transparent for each technology it supports. There
    is a transaction manager that handles the transactions, and it even has support
    for JTA (Java Transaction API), which enables distributed or global transactions.
    This excellent transaction support means that the transaction manager can also
    manage the resources for us. We no longer have to worry that a database connection
    or file handle might be closed; this is all handled for us. The supported implementations
    can be found in the `org.springframework.jdbc` and `org.springframework.orm` packages.


    ![Image](images/square.jpg) **Tip** The Spring Data project ([`www.springsource.org/spring-data`](http://www.springsource.org/spring-data))
    provides even deeper integration with several technologies. For several use cases,
    it can even eliminate the need to write our own implementation of a data access
    object (DAO) or repository.


    The Spring Framework includes another powerful feature as part of its data access
    support: exception translation. Spring provides extensive exception translation
    support for all its supported technologies. This feature transforms technology-specific
    exceptions into a subclass of `org.springframework.dao.DataAccessException`. For
    database-driven technologies, it can even take into account the database vendor,
    version, and error codes received from the database. The exception hierarchy extends
    from `RuntimeException`; and as such, it doesn’t have to be caught because it
    isn’t a checked exception. For more information on data access support, please
    see *Pro Spring 3* (Apress, 2012) or the online Spring Reference Guide ([`www.springsource.org/documentation`](http://www.springsource.org/documentation)).


    [Listing 3-4](#Chapter03.html#list_3_4) shows how a data access object or repository
    might look. Note that the interface doesn’t reference or mention any data access
    technology we use (we use JPA for the sample application). Also, the service layer
    doesn’t care how or where the data is persisted; it simply wants to know how to
    store or retrieve it.


    ***Listing 3-4.** A sample AccountRepository*


    `package com.apress.prospringmvc.bookstore.repository;`


    `import com.apress.prospringmvc.bookstore.domain.Account;`


    `public interface AccountRepository {`


    `    Account findByUsername(String username);`


    `    Account findById(long id);`


    `    Account save(Account account);`

    `}`


    ### More Roads to Rome


    As noted previously, the architecture discussed here isn’t the only application
    architecture out there. Which architecture is best for a given application depends
    on the size of the application, the experience of the development team, and the
    lifetime of the application. The larger a team or the longer an application lives,
    the more important a clean architecture with separate layers becomes.


    A web application that starts with a single static page probably doesn’t require
    any architecture. However, as the application grows, it becomes increasingly important
    that we don’t try to put everything in that single page because that would make
    it very difficult to maintain or understand the app, let alone test it.


    As an application grows in size and age, we need to refactor its design and keep
    in mind that each layer or component should have a single responsibility. If we
    detect some concern that should be in a different layer or touches multiple components,
    then we should convert it into an aspect (crosscutting concern) of the application
    and use AOP to apply this aspect to the code.


    When deciding how to structure our layers, we should try to identify a clear API
    (exposed through Java interfaces) for our system. Thinking of an API for our system
    makes us think about our design, as well as a useful and useable API. In general,
    if an API is hard to use, it is also hard to test and maintain. Therefore, a clean
    API is important. In addition, using interfaces between the different layers allows
    for the separate layers to be built and tested in isolation. This can be a great
    advantage in larger development teams (or in teams that consists of multiple smaller
    teams). It allows us to focus on the function we’re working with, not on the underlying
    or higher level components.


    When designing and building an application, it’s also important to use good OO
    practices and patterns to solve problems. For example, we should use polymorphism
    and inheritance to our advantage, and we should use AOP to apply system-wide concerns.
    The Spring Framework can also help us wire our application together at runtime.
    Taken as a whole, the features and approaches described in this chapter can help
    us to keep our code clean and to achieve the best architecture for our applications.'
