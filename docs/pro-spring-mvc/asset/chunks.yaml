  raw: '##### Writing a Request Handling Method with Multipart File


    When writing a request handling method, if we want to do file upload and use the
    multipart file abstraction from Spring, we need to create a method, annotate it,
    and make sure it has a `MultipartFile` as a method argument. When there are multiple
    files uploaded with the same name, we can also receive a collection of files instead
    of a single element. [Listing 7-17](#Chapter07.html#list_7_17) shows a controller
    with a method that can handle file uploads using this technique.


    ***Listing 7-17.** UploadOrderController with MultipartFile*


    `package com.apress.prospringmvc.bookstore.web.controller;`


    `// Other imports omitted`

    `import org.springframework.web.multipart.MultipartFile;`


    `@Controller`

    `public class UploadOrderController {`


    `    private Logger logger;`

    `    logger = LoggerFactory.`*`getLogger`*`(UploadOrderController.class);`


    `    @RequestMapping(value = "/order/upload", method = RequestMethod.`*`POST`*`)`

    `    public String handleUpload(MultipartFile order) {`

    `        logFile(order.getOriginalFilename(), order.getSize());`

    `        return "redirect:/customer/account";`

    `    }`


    `    private void logFile(String name, long size) {`

    `        this.logger.info("Received order: {}, size {}", name, size);`

    `    }`

    `}`


    ##### Using MultipartHttpServletRequest to Handle File Uploads


    Instead of accessing the file(s) directly, it is also possible to use `MultipartHttpServletRequest`
    to get access to the multipart files ([Listing 7-18](#Chapter07.html#list_7_18)).
    This interface defines some methods to get access to the files. The methods that
    are exposed to get access to the multipart files are defined in the super interface
    `org.springframework.web.multipart.MultipartRequest`.


    ***Listing 7-18.** UploadOrderController with MultipartHttpServletRequest*


    `package com.apress.prospringmvc.bookstore.web.controller;`


    `// Other imports omitted`

    `import org.springframework.web.multipart.MultipartFile;`

    `import org.springframework.web.multipart.MultipartHttpServletRequest;`


    `@Controller`

    `public class UploadOrderController {`


    `    private Logger logger;`

    `    logger = LoggerFactory.`*`getLogger`*`(UploadOrderController.class);`


    `    @RequestMapping(value = "/order/upload", method = RequestMethod.`*`POST`*`)`

    `    public String handleUpload(MultipartHttpServletRequest request) {`

    `        Map<String, MultipartFile> files = request.getFileMap();`

    `        for (MultipartFile file : files.values()) {`

    `            logFile(file.getOriginalFilename(), file.getSize());`

    `        }`

    `        return "redirect:/customer/account";`

    `    }`


    `    private void logFile(String name, long size) {`

    `        this.logger.info("Received order: {}, size {}", name, size);`

    `    }`

    `}`


    ##### Using a Form Object to Handle Upload


    Instead of handling the upload directly, we could also make it part of a form
    object (model attribute). This can be convenient if the upload is part of a form
    that includes more fields (like our customer account page, which includes a picture).
    To be able to do this we need to create a class that can be used as the form object,
    with an attribute of type `MultipartFile` ([Listing 7-19](#Chapter07.html#list_7_19)).


    ***Listing 7-19.** UploadOrderForm*


    `package com.apress.prospringmvc.bookstore.web;`


    `import org.springframework.web.multipart.MultipartFile;`


    `public class UploadOrderForm {`


    `    private MultipartFile order;`


    `    public MultipartFile getOrder() {`

    `        return this.order;`

    `    }`


    `    public void setOrder(final MultipartFile order) {`

    `        this.order = order;`

    `    }`

    `}`


    We need to modify the controller to take the form as a method argument (see [Listing
    7-20](#Chapter07.html#list_7_20)).


    ***Listing 7-20.** UploadOrderController with UploadOrderForm*


    `package com.apress.prospringmvc.bookstore.web.controller;`


    `// Other imports omitted`

    `import com.apress.prospringmvc.bookstore.web.UploadOrderForm;`


    `@Controller`

    `public class UploadOrderController {`


    `    private Logger logger;`

    `    logger = LoggerFactory.`*`getLogger`*`(UploadOrderController.class);`


    `    @RequestMapping(value = "/order/upload", method = RequestMethod.`*`POST`*`)`

    `    public String handleUpload(UploadOrderForm form) {`

    `        logFile(form.getOrder().getOriginalFilename(), form.getOrder().getSize());`

    `        return "redirect:/customer/account";`

    `    }`


    `    private void logFile(String name, long size) {`

    `        this.logger.info("Received order: {}, size {}", name, size);`

    `    }`

    `}`


    ##### Writing a Request Handling Method Using Servlet 3.0


    In a strict Servlet 3.0 environment, we can use the standard interface `javax.servlet.http.Part`
    to get access to the uploaded file. We simply create a method that takes the `Part`
    as an argument (see [Listing 7-21](#Chapter07.html#list_7_21)) We need to create
    a method, annotate it, and give it a method argument. This technique only works
    in a Servlet 3.0 environment and is in that regard less portable than using the
    `MultipartFile` argument.


    ***Listing 7-21.** UploadOrderController with Part*


    `package com.apress.prospringmvc.bookstore.web.controller;`


    `// Other imports omitted`

    `import javax.servlet.http.Part;`


    `@Controller`

    `public class UploadOrderController {`


    `    private Logger logger;`

    `    logger = LoggerFactory.`*`getLogger`*`(UploadOrderController.class);`


    `    @RequestMapping(value = "/order/upload", method = RequestMethod.`*`POST`*`)`

    `    public String handleUpload(final Part order) {`

    `        logFile(order.getName(), order.getSize());`

    `        return "redirect:/customer/account";`

    `    }`


    `    private void logFile(String name, long size) {`

    `        this.logger.info("Received order: {}, size {}", name, size);`

    `    }`

    `}`


    #### Exception Handling


    Uploading a file can also fail. The file could be too large to handle (larger
    than the configured maximum file size), or our disks could be full. There are
    many reasons it might fail. If possible, we want to handle the errors and show
    a nice error page to the users. We can use the exception handling (as explained
    in [Chapter 6](#Chapter06.html#ch6)) to handle the exception for us and show a
    nice error page. When an exception occurs, the multipart support will throw an
    `org.springframework.web.multipart.MultipartException`, and we can use this exception
    to show an error page.


    ![Image](images/square.jpg) **Note** The `CommonsMultipartResolver` throws a more
    specific `MaxUploadSizeExceededException` in this particular case, else it will
    throw a `MultipartException`.


    ### Summary


    This chapter covered Representation State Transfer (REST), as explained by Roy
    Thomas Fielding, and you saw how we can configure Spring MVC to facilitate the
    different methods as used by REST. We discussed the configuration of the `HiddenHttpMethodFilter`
    and the use-case for this filter.


    Next we briefly explained Asynchronous JavaScript and XML (AJAX) and how we can
    use that on the client and have controllers react to those requests. Although
    AJAX was originally about XML, nowadays it is about JSON; and we explored the
    JSON features offered by Spring MVC by using the `RequestBody` and `ResponseBody`
    annotation.


    It is also very useful to combine AJAX and REST and it allows for creating a REST-based
    API for our application. However to allow for easy processing of `PUT` requests
    we need to configure the `HttpPutFormContentFilter`, which makes the `PUT` body
    content available as request parameters.


    The final part of this chapter looked at uploading files to our application. For
    this purpose we looked at the configuration needed for Servlet 3.0 multipart support
    and commons-fileupload support and then explored the different ways of writing
    a controller that can handle file uploads.


    ## C H A P T E R  8'
