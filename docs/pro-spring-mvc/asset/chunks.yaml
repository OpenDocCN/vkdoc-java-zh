    #### Velocity and FreeMarker


    Both Velocity^([3](#Chapter08.html#CHP-8-FN-3)) and FreeMarker^([4](#Chapter08.html#CHP-8-FN-4))
    are templating frameworks for and written in Java. You can use them, among others,
    to create templates for HTML pages. They are text-based templating engines and
    both are widely used in applications for all kind of templating solutions.


    _________


    ³ [`http://velocity.apache.org`](http://velocity.apache.org)


    ⁴ [`http://www.freemarker.org`](http://www.freemarker.org)


    Velocity and FreeMarker templates aren’t compiled into Java code as JSPs are.
    They are interpreted at runtime by their templating engines; this is much like
    the XSLT processing we discussed earlier. One might think that this interpretation
    instead of compilation could lead to performance degradation of our application,
    but this is often not true. Both engines have extensive caching of interpreted
    templates, which make them quite fast.


    Another advantage of using a templating approach over JSP is that in the latter
    case you might be tempted to put Java code in your JSPs. Putting Java code in
    your pages, although possible, is not an approach that one should take. It generally
    leads to pages that are hard to maintain and modify.


    The disadvantage is that we need to add some extra configuration to our application.
    We first need to configure the templating engine of our choice, and next we need
    to configure view resolving for that templating engine.'
