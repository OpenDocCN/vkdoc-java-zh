- fmt: "#### Adjusting the Flow\n\nAs discussed previously, we have to indicate which\
    \ parts need to be rerendered explicitly. We can do this with the `<render>` element,\
    \ which takes a `fragments` attribute (see [Listing 12-23](#Chapter12.html#list_12_23)).\
    \ This attribute will point to the Tiles attribute to render. We can also specify\
    \ multiple fragments by separating them with a comma, and we are also allowed\
    \ to use expressions (that must evaluate to Tiles attribute names, just as their\
    \ literal equivalents do).\n\nIf we take the `createOrders-flow`, we can add the\
    \ render element in the `add` transition. The render element only makes sense\
    \ for transitions that rerender the same view, so we can mark the Tiles attribute,\
    \ `selectedBooks`, for rendering. This means that the `<put-attribute name=\"\
    selectedBooks\" value=\"/WEB-INF/view/showSelectedBooks.jsp\"/>` will be rerendered\
    \ when the partial render is triggered.\n\n***Listing 12-23** Rendering fragments\
    \ in the createOders/createOrders-flow.xml*\n\n```\n<view-state id=\"selectBooks\"\
    \ view=\"selectBooks\" model=\"orderForm\" >\n    <on-render>\n        <evaluate\
    \ expression=\"orderController.initializeSelectableBooks(orderForm)\"\n      \
    \            result=\"flashScope.selectableBooks\" />\n    </on-render>\n\n  \
    \  <transition on=\"add\" >\n        <evaluate expression=\"orderController.addBook(flowScope.orderForm)\"\
    \ />\n        <render fragments=\"selectedBooks\"/>\n    </transition>\n\n   \
    \ <transition on=\"next\" to=\"selectDeliveryOptions\" />\n\n    <transition on=\"\
    reset\" to=\"selectBooks\">\n        <evaluate expression=\"orderForm.resetSelectedBooks()\"\
    \ />\n    </transition>\n\n    <transition on=\"previous\" to=\"selectCategory\"\
    \ />\n\n    <transition on=\"cancel\" to=\"end\" />\n\n</view-state>\n```\n\n\
    #### Adding AJAX to the View with Spring JS and JQuery\n\nFinally, we need to\
    \ physically invoke an asynchronous call from our browser. Doing this will request\
    \ a partial page update, causing that specific piece of our DOM to be updated.\
    \ Unfortunately, the `XMLHttpRequest` API (the browser API leveraging asynchronous\
    \ support) is a bit problematic to use because of the nonstandard support for\
    \ this feature over different browsers.\n\nFortunately, we have been blessed by\
    \ some very good JavaScript frameworks that hide all those dirty details for us\
    \ as application developers. We will discuss two options. The first uses Spring\
    \ JS, which we already have because we are depending on it. The second relies\
    \ on JQuery, which we will need to download a separate library for. Let’s begin\
    \ by demonstrating how to implement the client-side AJAX using Spring JS.\n\n\
    ##### Using Spring JS\n\nIn this example, we will use Spring JS to make an AJAX\
    \ call when a user pushes the Add button (see [Listing 12-24](#Chapter12.html#list_12_24)).\
    \ The Add button is a normal HTML submit button, and it will remain untouched.\n\
    \n***Listing 12-24** The submit button that remains unchanged*\n\n```\n<button\
    \ type=\"submit\" id=\"add\" name=\"_eventId_add\">\n    <spring:message code=\"\
    label.page.books.add.book\"/>\n</button>\n```\n\nA central concept in Spring JS\
    \ is the notion of applying decorations to existing DOM nodes. This technique\
    \ is used to progressively enhance a web page so that it will still be functional\
    \ in a browser that has JavaScript disabled or simply has problems with JavaScript\
    \ itself. The `addDecoration` method is used to apply these decorations, and we\
    \ will use this method to add an Ajax decoration to the already existing submit\
    \ button with the id of `add`.\n\nIn order to be able to use the AJAX libraries,\
    \ we have to include references to them in our pages. Because we are using templates,\
    \ this is pretty easy; these references are simply added in the HTML `head` section\
    \ of our template. We can see this in the sample application when opening `template.jsp`\
    \ (see [Listing 12-25](#Chapter12.html#list_12_25)).\n\n***Listing 12-25:** The\
    \ extra JavaScript imports required to enable Ajax*\n\n```\n<spring:url value=\"\
    /resources/dojo/dojo.js\" var=\"dojo\"/>\n<script type=\"text/javascript\" src=\"\
    ${dojo}\"></script>\n<spring:url value=\"/resources/spring/Spring.js\" var=\"\
    springJs\"/>\n<script type=\"text/javascript\" src=\"${springJs}\"></script>\n\
    <spring:url value=\"/resources/spring/Spring-Dojo.js\" var=\"springDojo\"/>\n\
    <script type=\"text/javascript\" src=\"${springDojo}\"></script>\n```\n\n**Note**\
    \ The script element is assumed to be non-empty. If you close such an element\
    \ with the (normally syntax equivalent) “/>”, the scripts are not loaded. That’s\
    \ why they are explicitly closed with `</script>`. This has nothing to do with\
    \ Spring JS; rather, it is an HTML peculiarity.\n\nNext, we have to decorate the\
    \ button with the AJAX handler. We can do this by adding the script in [Listing\
    \ 12-26](#Chapter12.html#list_12_26) to the `selectBooks` view, which is added\
    \ at the bottom of `WEB-INF/view/createOders/selectBooks.jsp`.\n\n***Listing 12-26**\
    \ The JavaScript decoration, which will enable AJAX on the add button*\n\n```\n\
    <script type=\"text/javascript\">\n    dojo.addOnLoad(function() {\n        Spring.addDecoration(new\
    \ Spring.AjaxEventDecoration({\n        elementId : \"add\",\n        event :\
    \ \"onclick\",\n        formId: \"selectBookForm\"\n        }));\n    });\n</script>\n\
    ```\n\nSeveral key things are worth noting about the preceding listing:\n\n* \
    \  The `elementId` is the id of the HTML element to which the decoration should\
    \ be applied. In our case, it is the submit button with the id of `add`.\n*  \
    \ The event is the trigger event of the HTML element, which invokes the decoration.\
    \ In our case, it is add button’s `onclick` event.\n*   The `formId` must match\
    \ the form that contains all the information that is required to be submitted\
    \ along with the Ajax request. We added this id to the `form` element in [Listing\
    \ 12-19](#Chapter12.html#list_12_19).\n*   The `dojo.addOnLoad()` method will\
    \ make sure the decoration is added after all elements are loaded. This method\
    \ may not be required for this type of decoration, but it is considered a best\
    \ practice to use it unless you have good reasons not to. By the way, it does\
    \ not matter where you place the `<script>` element. We chose to put it at the\
    \ bottom, but it could have appeared anywhere in the file.\n\nThe decoration will\
    \ submit the form, causing all input to be transmitted to the server. Because\
    \ of the AJAX decoration, this happens in an asynchronous fashion. It will take\
    \ the name from the button as the event id to be triggered (which is also transmitted\
    \ with the parameters). The request is actually a normal form submission. [Figure\
    \ 12-4](#Chapter12.html#fig_12_4) shows what you’ll see if you inspect the request\
    \ with Firebug."
  raw: '#### Adjusting the Flow


    As discussed previously, we have to indicate which parts need to be rerendered
    explicitly. We can do this with the `<render>` element, which takes a `fragments`
    attribute (see [Listing 12-23](#Chapter12.html#list_12_23)). This attribute will
    point to the Tiles attribute to render. We can also specify multiple fragments
    by separating them with a comma, and we are also allowed to use expressions (that
    must evaluate to Tiles attribute names, just as their literal equivalents do).


    If we take the `createOrders-flow`, we can add the render element in the `add`
    transition. The render element only makes sense for transitions that rerender
    the same view, so we can mark the Tiles attribute, `selectedBooks`, for rendering.
    This means that the `<put-attribute name="selectedBooks" value="/WEB-INF/view/showSelectedBooks.jsp"/>`
    will be rerendered when the partial render is triggered.


    ***Listing 12-23** Rendering fragments in the createOders/createOrders-flow.xml*


    `<view-state id="selectBooks" view="selectBooks" model="orderForm" >`

    `    <on-render>`

    `        <evaluate expression="orderController.`![Image](images/U002.jpg)

    `                  initializeSelectableBooks(orderForm)"`

    `                  result="flashScope.selectableBooks" />`![Image](images/U002.jpg)

    `    </on-render>`


    `    <transition on="add" >`

    `        <evaluate expression="orderController.addBook(flowScope.orderForm)" />`

    **`        <render fragments="selectedBooks"/>`**

    `    </transition>`


    `    <transition on="next" to="selectDeliveryOptions" />`


    `    <transition on="reset" to="selectBooks">`

    `        <evaluate expression="orderForm.resetSelectedBooks()" />`

    `    </transition>`


    `    <transition on="previous" to="selectCategory" />`


    `    <transition on="cancel" to="end" />`


    `</view-state>`


    #### Adding AJAX to the View with Spring JS and JQuery


    Finally, we need to physically invoke an asynchronous call from our browser. Doing
    this will request a partial page update, causing that specific piece of our DOM
    to be updated. Unfortunately, the XMLHttpRequest API (the browser API leveraging
    asynchronous support) is a bit problematic to use because of the nonstandard support
    for this feature over different browsers.


    Fortunately, we have been blessed by some very good JavaScript frameworks that
    hide all those dirty details for us as application developers. We will discuss
    two options. The first uses Spring JS, which we already have because we are depending
    on it. The second relies on JQuery, which we will need to download a separate
    library for. Let’s begin by demonstrating how to implement the client-side AJAX
    using Spring JS.


    ##### Using Spring JS


    In this example, we will use Spring JS to make an AJAX call when a user pushes
    the Add button (see [Listing 12-24](#Chapter12.html#list_12_24)). The Add button
    is a normal HTML submit button, and it will remain untouched.


    ***Listing 12-24** The submit button that remains unchanged*


    `<button type="submit" id="add" name="_eventId_add">`

    `    <spring:message code="label.page.books.add.book"/>`

    `</button>`


    A central concept in Spring JS is the notion of applying decorations to existing
    DOM nodes. This technique is used to progressively enhance a web page so that
    it will still be functional in a browser that has JavaScript disabled or simply
    has problems with JavaScript itself. The `addDecoration` method is used to apply
    these decorations, and we will use this method to add an Ajax decoration to the
    already existing submit button with the id of `add`.


    In order to be able to use the AJAX libraries, we have to include references to
    them in our pages. Because we are using templates, this is pretty easy; these
    references are simply added in the HTML `head` section of our template. We can
    see this in the sample application when opening `template.jsp` (see [Listing 12-25](#Chapter12.html#list_12_25)).


    ***Listing 12-25:** The extra JavaScript imports required to enable Ajax*


    `<spring:url value="/resources/dojo/dojo.js" var="dojo"/>`

    `<script type="text/javascript" src="${dojo}"></script>`

    `<spring:url value="/resources/spring/Spring.js" var="springJs"/>`

    `<script type="text/javascript" src="${springJs}"></script>`

    `<spring:url value="/resources/spring/Spring-Dojo.js" var="springDojo"/>`

    `<script type="text/javascript" src="${springDojo}"></script>`


    ![Image](images/square.jpg) **Note** The script element is assumed to be non-empty.
    If you close such an element with the (normally syntax equivalent) “/>”, the scripts
    are not loaded. That’s why they are explicitly closed with `</script>`. This has
    nothing to do with Spring JS; rather, it is an HTML peculiarity.


    Next, we have to decorate the button with the AJAX handler. We can do this by
    adding the script in [Listing 12-26](#Chapter12.html#list_12_26) to the `selectBooks`
    view, which is added at the bottom of `WEB-INF/view/createOders/selectBooks.jsp`.


    ***Listing 12-26** The JavaScript decoration, which will enable AJAX on the add
    button*


    `<script type="text/javascript">`

    `    dojo.addOnLoad(function() {`

    `        Spring.addDecoration(new Spring.AjaxEventDecoration({`

    `        elementId : "add",`

    `        event : "onclick",`

    `        formId: "selectBookForm"`

    `        }));`

    `    });`

    `</script>`


    Several key things are worth noting about the preceding listing:


    *   The `elementId` is the id of the HTML element to which the decoration should
    be applied. In our case, it is the submit button with the id of `add`.

    *   The event is the trigger event of the HTML element, which invokes the decoration.
    In our case, it is add button’s `onclick` event.

    *   The `formId` must match the form that contains all the information that is
    required to be submitted along with the Ajax request. We added this id to the
    `form` element in [Listing 12-19](#Chapter12.html#list_12_19).

    *   The `dojo.addOnLoad()` method will make sure the decoration is added after
    all elements are loaded. This method may not be required for this type of decoration,
    but it is considered a best practice to use it unless you have good reasons not
    to. By the way, it does not matter where you place the `<script>` element. We
    chose to put it at the bottom, but it could have appeared anywhere in the file.


    The decoration will submit the form, causing all input to be transmitted to the
    server. Because of the AJAX decoration, this happens in an asynchronous fashion.
    It will take the name from the button as the event id to be triggered (which is
    also transmitted with the parameters). The request is actually a normal form submission.
    [Figure 12-4](#Chapter12.html#fig_12_4) shows what you’ll see if you inspect the
    request with Firebug.'
