    ## REST 与 AJAX


    到目前为止，我们一直在构建相当经典的 Web 应用程序：向服务器发送请求，服务器处理请求，然后我们渲染结果并展示给客户端。然而，在过去的十年里，我们构建 Web
    应用程序的方式发生了巨大变化。现在我们有了 JavaScript 和 JSON/XML，它们支持基于 AJAX 的 Web 应用程序，并且将越来越多的行为推送到客户端，包括验证、渲染部分屏幕等。


    本章首先介绍 REST^(1)（表述性状态转移），这是一种概念或架构风格，它影响了我们作为开发者对 Web 资源的思考方式以及应如何处理它们。接下来，我们将讨论
    AJAX，并将其与 REST 结合考虑。


    本章的第二部分涵盖文件上传。你将看到如何使用 Spring 框架进行文件上传，以及如何在控制器中处理此任务。但在深入探讨之前，让我们先看看 REST。


    ### 表述性状态转移 (REST)


    本节简要解释 REST 的主题。该概念本质上包含两个部分：首先是资源以及我们如何标识它们，然后是我们操作或使用这些资源的方式。REST 于 2000 年由
    Roy Thomas Fielding 在一篇题为《*架构风格与基于网络的软件架构设计*》的论文中提出。^(2) 它描述了如何使用 HTTP 协议以及该协议提供的特性来操作资源。


    #### 标识资源


    在第 4 章中，我们简要讨论了 URL（统一资源定位符）的组成部分。对于 REST 而言，这并没有真正改变；然而，URL 很重要，因为它指向一个唯一的资源。表
    7-1 给出了一些资源位置的示例。


    _________


    ¹ [`www.ics.uci.edu/~fielding/pubs/dissertation/rest_arch_style.htm`](http://www.ics.uci.edu/~fielding/pubs/dissertation/rest_arch_style.htm)


    ² [`www.ics.uci.edu/~fielding/pubs/dissertation/top.htm`](http://www.ics.uci.edu/~fielding/pubs/dissertation/top.htm)


    ![Image](img/9781430241553_tab07-01.jpg)


    在 REST 中，一切都关乎资源的*表述*，因此 URL/URI 非常重要。它为我们提供了实际资源（网页、网页上的图片、mp3 文件等）的位置。我们在 Web
    浏览器中看到的并非实际资源，而是该资源的一种表述。下一节将解释如何使用此资源位置来操作（修改、删除等）该资源。


    #### 操作资源


    HTTP 协议指定了几种方法（HTTP 方法^(3)) 来处理来自我们应用程序的信息。表 7-2 给出了这些方法的概述。


    ![Image](img/9781430241553_tab07-02.jpg)


    _________


    ³ [`www.w3.org/Protocols/rfc2616/rfc2616-sec9.html`](http://www.w3.org/Protocols/rfc2616/rfc2616-sec9.html)


    在上一节“标识资源”中，我们提到了 URL 如何指向一个资源。如果我们将 REST 与表 7-1 中的资源结合起来，我们实际上可以操作它们，如表 7-3 所示。


    ![Image](img/9781430241553_tab07-03.jpg)


    HTTP 方法的列表比大多数 Web 浏览器支持的要多。通常，它们只支持 `GET` 和 `POST` 方法，而不支持其他已标识的方法。为了能够在经典的 Web
    应用程序中使用不同的方法，我们需要使用一种变通方法；为此，Spring MVC 提供了 `HiddenHttpMethodFilter`。


    ##### HiddenHttpMethodFilter


    `org.springframework.web.filter.HiddenHttpMethodFilter` 会将一个 `POST` 请求转换为另一种指定类型的请求。它使用一个请求参数来确定传入请求应使用哪种方法。默认情况下，它使用名为
    `_method` 的请求参数；但是，此名称可以配置。通过确保存在该请求参数，可以将 `POST` 请求“转换”为 `PUT` 或 `DELETE` 请求；然后该请求将被包装在一个
    `HttpMethodRequestWrapper`（它是该过滤器的一个内部类）中。`GET` 请求会按原样处理，不会转换为其他类型的请求。这是因为 `GET`
    请求与其他类型不同，其所有参数都编码在 URL 中。相比之下，`POST` 和 `PUT` 请求的参数则编码在请求体中。


    让我们为我们的 Web 应用程序配置 `HiddenHttpMethodFilter`。打开 `com.apress.prospringmvc.bookstore.web.BookstoreWebApplicationInitializer`，让我们添加一个方法来添加我们的过滤器。清单
    7-1 显示了所需的修改。


    ***清单 7-1.** 包含 HiddenHttpMethodFilter 的 BookstoreWebApplicationInitializer*


    `package com.apress.prospringmvc.bookstore.web;`


    `import java.util.EnumSet;`


    `// javax.servlet imports omitted`


    `import org.springframework.web.WebApplicationInitializer;`

    `import org.springframework.web.filter.HiddenHttpMethodFilter;`


    `public class BookstoreWebApplicationInitializer implements WebApplicationInitializer
    {`


    `    private static final String DISPATCHER_SERVLET_NAME = "dispatcher";`


    `    @Override`

    `    public void onStartup(ServletContext servletContext) throws ServletException
    {`

    `        registerListener(servletContext);`

    `        registerDispatcherServlet(servletContext);`

    **`registerHiddenHttpMethodFilter(servletContext);`**

    `    }`


    `    private void registerHiddenHttpMethodFilter(ServletContext servletContext)
    {`

    `        FilterRegistration.Dynamic registration;`

    `        registration = servletContext.addFilter("hiddenHttpMethodFilter",`

    `                                 HiddenHttpMethodFilter.class);`

    `        registration.addMappingForServletNames(`

    `                 EnumSet.of(DispatcherType.REQUEST, DispatcherType.FORWARD),`

    `                 false,`

    `                 DISPATCHER_SERVLET_NAME);`

    `    }`

    `    // Other methods omitted`

    `}`


    现在我们已经配置了过滤器，需要修改我们的账户页面。打开 `account.jsp` 文件，确保有一个名为 `_method`、值为 `PUT` 的隐藏字段。清单
    7-2 显示了页面的开头；如你所见，表单的开头定义了此隐藏字段。


    ***清单 7-2.** Account.jsp 头部*


    `<%@ taglib prefix="c" uri="http://java.sun.com/jsp/jstl/core"%>`

    `<%@ taglib prefix="spring" uri="http://www.springframework.org/tags" %>`

    `<%@ taglib prefix="form" uri="http://www.springframework.org/tags/form" %>`


    `<form:form method="POST" modelAttribute="account" id="accountForm">`

    **`<input type="hidden" name="_method" value="PUT" />`**

    `    <fieldset>`

    `        <legend><spring:message code="account.personal"/></legend>`


    `// Remainder of page omitted`


    当页面提交时，`HiddenHttpMethodFilter` 将执行其工作，并将我们的 `POST` 请求转换为 `PUT` 请求。控制器在编写时已经考虑到了这一点；请参见清单
    7-3 中的更新方法。这里我们对 `POST` 和 `PUT` 复用了相同的方法，但我们也可以分别处理它们。


    ***清单 7-3.** AccountController 更新方法*


    `package com.apress.prospringmvc.bookstore.web.controller;`


    `//Imports omitted`


    `@Controller`

    `@RequestMapping("/customer/account")`

    `@SessionAttributes(types = Account.class)`

    `public class AccountController {`

