    不同的状态（以 `<action-state>` 开头，以 `<end-state>` 结尾）通过一个选择（choice）连接起来。通常，在一个选择中，列出的元素只能出现一个。例如，通常你只能有一个
    `<view-state>` 或一个 `<action-state>`，但不能同时存在。然而，如果你仔细观察选择图标，会发现选择符号具有多重性（`0..*`）。这意味着状态是可选的；但同时，它也表明选择中的每个元素都可以出现无限次。因此，你可以定义的状态数量没有限制。此外，由于选择的存在，状态是非位置性的（这可能是引入选择作为连接方式的主要原因）。例如，你可以有一个
    `<view-state>`（出现一次或多次）后跟一个 `<action-state>`（出现一次或多次），或者反过来。这两种方式都是有效的。


    回顾一下清单 10-1，你会发现我们将 Web Flow 本身声明为默认命名空间。这意味着我们不必为每个元素使用前缀。每个元素或属性都会自动根据与默认命名空间关联的模式进行验证。最后，我们还指定了模式位置。IDE
    使用模式位置来加载模式、验证 XML 并提供命令行补全功能。请注意，我们使用的是 Web Flow 2.0 的模式。


    在后续的 Web Flow 讲解中，我们将在代码清单中省略流程根元素及其命名空间声明。这样可以使内容保持紧凑且更易读。只有当这些信息相关时，我们才会展示，例如在介绍属于流程根元素的属性时。请注意，即使在给定的清单中没有显示流程根元素及其命名空间声明，它们仍然存在于每个流程的开头，并且是强制性的。


    现在，请查看清单 10-2 中的流程定义。


    ***清单 10-2.** 一个流程示例*


    `<flow`


    `      xsi:schemaLocation="`

    `        http://www.springframework.org/schema/webflow`

    `        http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd">`


    `    <on-start>`

    `<evaluate` ![图片](img/U002.jpg)

    `            expression="orderController.initializeForm()"`![图片](img/U002.jpg)

    `            result="flowScope.orderForm"/>`

    `<evaluate` ![图片](img/U002.jpg)

    `            expression="orderController.initializeSelectableCategories()"`![图片](img/U002.jpg)

    `            result="flowScope.selectableCategories"/>`

    `    </on-start>`


    `    <view-state id="selectCategory" view="selectCategory" model="orderForm">`

    `        <transition on="next" to="selectBooks" >`

    `<evaluate` ![图片](img/U002.jpg)

    `   expression="orderController.initializeSelectableBooks(flowScope.orderForm)"`![图片](img/U002.jpg)

    `   result="flowScope.selectableBooks" />`

    `        </transition>`


    `        <transition on="cancel" to="end" />`

    `    </view-state>`


    `    ...`


    `    <end-state id="end" view="redirect:/index.htm"/>`

    `</flow>`


    在这个例子中，我们创建了一个简单的流程定义。它不是一个完整的定义（因此末尾有省略号 `...`）；但我们希望以此温和地介绍流程定义的样子。


    我们还想指出，在使用 STS 时，你的 IDE 中会提供 Web Flow 支持。你还可以以图形方式显示流程 XML。一旦双击流程 XML 文件，内容面板将打开，通常会显示
    XML 视图。在此面板的底部，你会注意到一些选项卡。在“源”选项卡旁边，你应该还能找到“流程”和“流程图”选项卡。“流程”选项卡以列表形式提供流程中元素的概览（参见图
    10-7）。


    ![图片](img/9781430241553_Fig10-07.jpg)


    ***图 10-7.** “流程”选项卡，提供流程组件的概览*


    “流程图”选项卡以图形方式显示元素及其之间的不同关系（参见图 10-8）。你还可以使用左侧的调色板添加新元素并组合它们。


    ![图片](img/9781430241553_Fig10-08.jpg)


    ***图 10-8.** “流程图”选项卡，提供流程的图形概览*


    调色板中的所有信息都会直接反映在源代码中，反之亦然。如果你从调色板添加一个组件，相应的 XML 将被添加到源代码中。如果你直接在 XML 中添加一个元素，然后返回“流程图”（或图形）视图，新元素也会出现在那里。


    目前，只需理解当此流程启动时，它最终会进入 `selectCategory` 视图状态。此视图状态将渲染 `selectCategory` 视图（该视图将由
    Tiles^(5) 配置解析），并使用 `orderForm` 键下可用的表单。


    我们使用一个启动动作（on start action）来实例化模型，并在进入视图状态之前将其分配给流程作用域。我们将在后续章节中讨论 evaluate 和
    on start 动作。目前，只需知道 on start 动作在 Web Flow 进入其第一个状态之前执行，并且它将执行 `com.apress.prospringmvc.bookstore.web.controller.OrderController`
    上的 `initializeForm` 方法。这将创建一个已初始化的模型并返回它。然后该模型将被放入流程作用域。模型名称随后可以在视图中的 `<spring:form
    modelAttribute="orderForm"…/>` 标签中使用。这将在提交时将表单中的字段绑定到指定的表单。Web Flow 将负责参数绑定，以及转换和表单验证（我们将在后面看到）。请注意，`modelAttribute`
    必须已经存在于某个 Web Flow 作用域中。


    ____________


    ⁵我们在第 8 章中向你介绍了 Tiles，因此我们假设你已经对这个模板框架有了基本的了解。如果你跳过了前面的内容直接阅读本章关于 Web Flow 的内容，但不知道
    Tiles 是如何工作的，那么我们建议你在继续阅读本章其余部分之前，先阅读 Tiles 的介绍。


    ![图片](img/square.jpg) **注意** `OrderController` 只是一个在应用程序上下文中定义的 Spring Bean。在我们的例子中，通过使用注解；应用
    `@Controller` 注解，这样该类将被类路径扫描发现并成为 Spring Bean。


    同样值得注意的是，在视图状态中可以触发的可能转换。当视图被渲染时，可以执行 `next` 或 `cancel` 转换。`next` 转换将在控制器上执行一个方法，然后转发到下一个状态（这可以是视图状态或
    Web Flow 支持的任何其他状态，我们将在后面看到）。`cancel` 转换将导航到结束状态。我们将在下一章详细讨论结束状态；目前，只需知道转换到结束状态会终止流程即可。


    流程定义根元素（flow）允许你指定一些额外的属性，这些属性是可选的。对于一个简单的流程，跳过指定它们是可以的；然而，一旦你有了更复杂的流程布局或想要更多的自定义，这些属性可能会派上用场（参见表
    10-3）。此根元素允许你覆盖默认的起始状态、从另一个现有流程继承，以及将你的流程标记为抽象。我们将在第 12 章的“应用继承”部分详细讨论后两种情况。


