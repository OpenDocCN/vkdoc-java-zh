- fmt: '### Subflow Input/Output Mapping


    As we have seen in the “Different Web Flow Scopes” section, every flow session
    has its own `flow` scope. We also illustrated that this is the case for subflows.
    On scope level, subflows are no different than ordinary flows, and they work in
    their own flow session—hence, they have their own `flow` scope. Only `conversation`
    scope is shared between multiple flow sessions. So, what should you do if you
    need to access data from the parent flow when within a subflow? Sure, you could
    put it on `conversation` scope, but that has some drawbacks.


    A subflow is best seen is a black box with a specific input and output contract.
    Putting everything on `conversation` scope merely to make data access easy violates
    encapsulation and might lead to brittle flow design. A better option would be
    to bring the data over to the subflow''s `flow` scope—but only the data that the
    subflow is demanding. Web Flow supplies some special functionality to define an
    input and output contract for subflows. That way, you exactly know what data it
    takes as input and what data is gives back.


    You can define the input contract of a flow by adding an *input mapping* to your
    flow. Input mapping is responsible for mapping all input provided to the flow
    when it is launched into its `flow` scope. You can also define the output contract
    via an *output mapping*. The output mapping defines the values that are to be
    expected as a result of executing the flow, and they can be mapped back into to
    `flow` scope of the parent flow.


    Before we continue, you should understand how Web Flow treats input and output
    attributes. It dedicates a separate map for input and output. This map is standalone
    and will merely be created to form the transition between the attributes coming
    from the parent flow and going to the `flow` scope of the subflow. When a flow
    starts, it gathers information to put into the input map. This information might
    come from the URL or an input from a `<subflow-state>`. You can access the input
    map with the `<input>` element in the starting subflow.


    Here flow-x exposes an attribute with name of `varX` to the subflow, flow-y. It
    does that by specifying the input element in the subflow state. This enables Web
    Flow to fetch the key, `varX`, from the `flow` scope of flow-x and then place
    the key/value on the input map. When flow-y starts, it will look in the input
    map for a `varX` attribute and place it on the `flow` scope of flow-y.


    In [Figure 11-13](#Chapter11.html#fig_11_13), you also see that the input map
    is populated with values coming from the URL. That is the second option you have.
    In addition to passing values using the `<input>` element of a `<subflow-state>`,
    Web Flow reads your URL and puts any request parameter available in the input
    map. The reason for this behavior is that it allows you to easily use a flow as
    a standalone flow and as a subflow.


    ![Image](images/9781430241553_Fig11-13.jpg)


    ***Figure 11-13.** Subflow input/output mapping*


    ![Image](images/square.jpg) **Note** The output mapping mirrors the input mapping,
    the same principles and rules apply. However, instead of two `<input>` elements
    we now have two `<output>` elements. One in the `<subflow-state>` of the parent
    flow and one in the subflow itself. There is also an output map, which maps values
    from the subflow back to the parent flow (as you can see in [Figure 11-13](#Chapter11.html#fig_11_13)).


    In addition to using the `<input>` and `<output>` elements, you can also specify
    a custom `subflow-attribute-mapper`. This is an attribute of the `<subflow-state>`
    element. It enables custom mapping using a Java class rather than performing the
    mapping inside the flow. This attribute takes a bean reference to an implementation
    of the `org.springframework.webflow.engine.SubflowAttributeMapper` interface.
    This class has two methods:


    ```

    public MutableAttributeMap createSubflowInput(RequestContext context);

    public void mapSubflowOutput(AttributeMap output, RequestContext context);

    ```


    When using this approach, you can specify the mapping yourself inside your custom
    implementation of a `SubflowAttributeMapper`. This is pretty exotic; normally,
    the standard input and output elements should be sufficient to map whatever you
    need. However, if you need some resource access while mapping data, this will
    help you accomplish that because you will have full control over the mapping process.'
  raw: '### Subflow Input/Output Mapping


    As we have seen in the “Different Web Flow Scopes” section, every flow session
    has its own `flow` scope. We also illustrated that this is the case for subflows.
    On scope level, subflows are no different than ordinary flows, and they work in
    their own flow session—hence, they have their own `flow` scope. Only `conversation`
    scope is shared between multiple flow sessions. So, what should you do if you
    need to access data from the parent flow when within a subflow? Sure, you could
    put it on `conversation` scope, but that has some drawbacks.


    A subflow is best seen is a black box with a specific input and output contract.
    Putting everything on `conversation` scope merely to make data access easy violates
    encapsulation and might lead to brittle flow design. A better option would be
    to bring the data over to the subflow''s `flow` scope—but only the data that the
    subflow is demanding. Web Flow supplies some special functionality to define an
    input and output contract for subflows. That way, you exactly know what data it
    takes as input and what data is gives back.


    You can define the input contract of a flow by adding an *input mapping* to your
    flow. Input mapping is responsible for mapping all input provided to the flow
    when it is launched into its flow scope. You can also define the output contract
    via an *output mapping*. The output mapping defines the values that are to be
    expected as a result of executing the flow, and they can be mapped back into to
    flow scope of the parent flow.


    Before we continue, you should understand how Web Flow treats input and output
    attributes. It dedicates a separate map for input and output. This map is standalone
    and will merely be created to form the transition between the attributes coming
    from the parent flow and going to the `flow` scope of the subflow. When a flow
    starts, it gathers information to put into the input map. This information might
    come from the URL or an input from a `<subflow-state>`. You can access the input
    map with the `<input>` element in the starting subflow.


    Here flow-x exposes an attribute with name of `varX` to the subflow, flow-y. It
    does that by specifying the input element in the subflow state. This enables Web
    Flow to fetch the key, `varX`, from the `flow` scope of flow-x and then place
    the key/value on the input map. When flow-y starts, it will look in the input
    map for a `varX` attribute and place it on the `flow` scope of flow-y.


    In [Figure 11-13](#Chapter11.html#fig_11_13), you also see that the input map
    is populated with values coming from the URL. That is the second option you have.
    In addition to passing values using the `<input>` element of a `<subflow-state>`,
    Web Flow reads your URL and puts any request parameter available in the input
    map. The reason for this behavior is that it allows you to easily use a flow as
    a standalone flow and as a subflow.


    ![Image](images/9781430241553_Fig11-13.jpg)


    ***Figure 11-13.** Subflow input/output mapping*


    ![Image](images/square.jpg) **Note**  The output mapping mirrors the input mapping,
    the same principles and rules apply. However, instead of two `<input>` elements
    we now have two `<output>` elements. One in the `<subflow-state>` of the parent
    flow and one in the subflow itself. There is also an output map, which maps values
    from the subflow back to the parent flow (as you can see in [Figure 11-13](#Chapter11.html#fig_11_13)).


    In addition to using the `<input>` and `<output>` elements, you can also specify
    a custom `subflow-attribute-mapper`. This is an attribute of the `<subflow-state>`
    element. It enables custom mapping using a Java class rather than performing the
    mapping inside the flow. This attribute takes a bean reference to an implementation
    of the `org.springframework.webflow.engine.SubflowAttributeMapper` interface.
    This class has two methods:


    `public MutableAttributeMap createSubflowInput(RequestContext context);`

    `public void mapSubflowOutput(AttributeMap output, RequestContext context);`


    When using this approach, you can specify the mapping yourself inside your custom
    implementation of a `SubflowAttributeMapper`. This is pretty exotic; normally,
    the standard input and output elements should be sufficient to map whatever you
    need. However, if you need some resource access while mapping data, this will
    help you accomplish that because you will have full control over the mapping process.'
