    ##### DefaultHandlerExceptionResolver


    `DefaultHandlerExceptionResolver` 实现始终返回一个空的 `ModelAndView`，并向客户端发送 HTTP 响应码。在表
    6-6 中，我们可以看到异常与 HTTP 响应码及描述之间的映射关系。


    ![Image](img/tab_6_6.jpg)


    ##### ResponseStatusExceptionResolver


    `ResponseStatusExceptionResolver` 会检查抛出的异常是否带有 `org.springframework.web.bind.annotation.ResponseStatus`
    注解（参见清单 6-18）。如果是，它将处理该异常，将注解中的 HTTP 响应码发送给客户端，然后返回一个空的 `ModelAndView` 以表明异常已被处理。如果该注解不存在，则直接返回
    `null`，表示异常未被处理。


    ***清单 6-18.** 处理 AuthenticationException*


    `package com.apress.prospringmvc.bookstore.service;`


    `import org.springframework.http.HttpStatus;`

    `import org.springframework.web.bind.annotation.ResponseStatus;`


    **`@ResponseStatus(value = HttpStatus.FORBIDDEN)`**

    `public class AuthenticationException extends Exception {`


    `    private String code;`


    `    public AuthenticationException(String message, String code) {`

    `        super(message);`

    `        this.code = code;`

    `    }`


    `    public String getCode() {`

    `        return this.code;`

    `    }`

    `}`


    当我们抛出此异常时，`org.springframework.web.servlet.mvc.annotation.ResponseStatusExceptionResolver`
    会检测到它已被 `org.springframework.web.servlet.bind.annotation.ResponseStatus` 注解标注。该注解有两个属性可用于指定信息（参见表
    6-7）。


    ![Image](img/tab_6_7.jpg)


    ![Image](img/square.jpg) **注意** 这是我们用来让框架处理 `com.apress.prospringmvc.bookstore.service.AuthenticationException`
    的机制。


    #### SimpleMappingExceptionResolver


    `SimpleMappingExceptionResolver` 可以配置为将特定异常转换为视图。例如，我们可以将（部分）异常类名映射到某个视图。这里之所以说“部分”，是因为匹配是基于类名而非具体类型进行的。匹配通过简单的子字符串机制完成；因此，不支持通配符（ant
    风格的正则表达式）。


    清单 6-19 展示了 `SimpleMappingExceptionResolver` 的配置。它被配置为将 `AuthenticationException`
    映射到名为 `login` 的视图。我们还设置了一个与 `login` 视图一起发送的 HTTP 响应码。


    ***清单 6-19.** SimpleMappingExceptionResolver 配置*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `import org.springframework.web.servlet.HandlerExceptionResolver;`

    `import org.springframework.web.servlet.handler.SimpleMappingExceptionResolver;`


    `// 导入省略`


    `@Configuration`

    `@EnableWebMvc`

    `@ComponentScan(basePackages = { "com.apress.prospringmvc.bookstore.web" })`

    `public class WebMvcContextConfiguration extends WebMvcConfigurerAdapter {`


    `    @Override`

    `    public void configureHandlerExceptionResolvers(`

    `                    List<HandlerExceptionResolver> exceptionResolvers) {`

    `        exceptionResolvers.add(simpleMappingExceptionResolver());`

    `    }`


    `    @Bean`

    `    public SimpleMappingExceptionResolver simpleMappingExceptionResolver() {`

    `        SimpleMappingExceptionResolver exceptionResolver;`

    `        exceptionResolver = new SimpleMappingExceptionResolver();`

    `        Properties mappings = new Properties();`

    `        mappings.setProperty("AuthenticationException", "login");`


    `        Properties statusCodes = new Properties();`

    `        mappings.setProperty(`

    `                    "login",`

    `                    String.valueOf(HttpServletResponse.SC_UNAUTHORIZED));`


    `        exceptionResolver.setExceptionMappings(mappings);`

    `        exceptionResolver.setStatusCodes(statusCodes);`

    `        return exceptionResolver;`

    `    }`

    `    // 其他方法省略`

    `}`


    匹配是基于类名而非具体类型进行的。如果抛出的异常的类名与指定模式匹配，则将使用相应的视图名称。该模式不支持通配符；它仅仅是匹配类名的子字符串。我们需要谨慎选择模式。例如，`Exception`
    将匹配几乎所有抛出的异常（因为大多数异常的类名中都包含 `Exception`）。同样，`DataAccessException` 将或多或少匹配 Spring
    中所有用于数据访问的异常。


    我们需要做最后一项调整：即修改我们的 `com.apress.prospringmvc.bookstore.web.controller.LoginController`。目前，控制器内部存在异常处理逻辑；但可以将其移除，因为
    `AuthenticationException` 将由我们刚刚配置的 `HandlerExceptionResolver` 处理（改进后的控制器见清单 6-20）。


    ***清单 6-20.** 改进后的 Login 控制器*


    `package com.apress.prospringmvc.bookstore.web.controller;`

    `// 导入省略`


    `@Controller`

    `@RequestMapping(value = "/login")`

    `public class LoginController {`


    `    public static final String ACCOUNT_ATTRIBUTE = "account";`

    `    public static final String REQUESTED_URL = "REQUESTED_URL";`


    `    @Autowired`

    `    private AccountService accountService;`


    `    @RequestMapping(method = RequestMethod.GET)`

    `    public void login() {}`


    `    @RequestMapping(method = RequestMethod.POST)`

    `    public String handleLogin(@RequestParam String username,`

    `                              @RequestParam String password,`

    `                              HttpSession session)`

    `    throws AuthenticationException {`

    `        Account account = this.accountService.login(username, password);`

    `        session.setAttribute(ACCOUNT_ATTRIBUTE, account);`

    `        String url = (String) session.getAttribute(REQUESTED_URL);`

    `        session.removeAttribute(REQUESTED_URL); // 移除该属性`

    `        if (StringUtils.hasText(url) && !url.contains("login")) {`

    `            return "redirect:" + url;`

    `        } else {`

    `            return "redirect:/index.htm";`

    `        }`

    `    }`


    `}`


    重新部署后，如果我们点击菜单栏上的“Account”，将会看到一个登录页面（参见图 6-8）。


    ![Image](img/9781430241553_Fig06-08.jpg)


    ***图 6-8.** 登录页面*

