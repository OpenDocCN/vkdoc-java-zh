    `        binder.setDisallowedFields("id");`

    **`binder.setValidator(new AccountValidator());`**

    `    }`


    `    @RequestMapping(method = { RequestMethod.`*`POST`*`, RequestMethod.`*`PUT`*
    `})`

    `    public String handleRegistration`**`(@Valid`** `@ModelAttribute Account account,
    BindingResult`![Image](images/U002.jpg)

    ` result) {`

    `        if (result.hasErrors()) {`

    `            return "customer/register";`

    `        }`

    `        this.accountService.save(account);`

    `        return "redirect:/customer/account/" + account.getId();`

    `    }`


    `    // Other methods omitted`

    `}`


    If we submit illegal values after redeployment, we will be greeted with some error
    codes, as shown in [Figure 5-9](#Chapter05.html#fig_5_9).


    ![Image](images/9781430241553_Fig05-09.jpg)


    ***Figure 5-9.** The registration page with error codes*


    ###### Using JSR-303 Validation


    Instead of implementing our own validator, we could also the JSR-303 annotations
    to add validation. For this, we would only need to annotate our `com.apress.prospringmvc.bookstore.domain.Account`
    object with JSR-303 annotations (see [Listing 5-47](#Chapter05.html#list_5_47))
    and then leave the `javax.validation.Valid` annotation in place. When using these
    annotations, the error code used is slightly different than the one used in our
    custom validator (see [Table 5-22](#Chapter05.html#tab_5_22)). However, the registration
    page doesn’t need to change, so it remains the same as before. In our init-binder
    method, we do not need to set the validator because a JSR-303 capable validator
    is automatically detected (the sample project uses the one from Hibernate).


