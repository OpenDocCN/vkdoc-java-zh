    \ = new SimpleConfigurableViewResolver();\n        Map<String, AbstractJExcelView>\
    \ views;\n        views = new HashMap<String, AbstractJExcelView>();\n       \
    \ views.put(\"order\", new OrderExcelView());\n        viewResolver.setViews(views);\n\
    \        return viewResolver;\n    }\n    // Other methods omitted see Listing\
    \ 8-22\n}\n```\n\n但是，等等，我们的应用程序会不会因为多个视图实现都解析到 `order` 视图名称而出现问题？专门的视图解析器 `ContentNegotiatingViewResolver`\
    \ 将在这里帮助我们。它会确定哪个解析出的视图最符合请求的内容类型。因此，无需更改我们的控制器，只需添加一些配置（和视图实现），我们就可以区分提供哪个视图。\n\
