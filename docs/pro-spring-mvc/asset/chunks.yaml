    #### 请求同步


    在使用 Spring MVC（或任何其他基于请求的 Web 框架）设计 Web 应用程序时，迟早你会发现自己缺少一些其他重要功能。例如，你是否考虑过，如果用户在一个图书订单表单上点击两次“提交”按钮会发生什么？理论上，这没有充分的理由发生，因为点击按钮会立即将你带到下一页。当然，这只是理论上的。实际上，这可能会带来一定的延迟，具体取决于你的应用程序响应速度（快或慢）。用户往往缺乏耐心；如果几秒钟内没有任何反应，用户甚至可能怀疑第一次点击是否成功（也许他没点准？）。因此，在你意识到之前，你就不得不处理来自同一用户和同一页面的重复提交。


    重复提交后会发生什么，很大程度上取决于运气。也许你的表单提交在某种程度上是*幂等*的^(1)？在这种情况下，幂等意味着多次执行操作，而不会从业务流程角度受到任何不良副作用的影响。仅仅因为用户双击了“提交”按钮就重复创建（并随后交付）同一订单，这显然是一种不良副作用。虽然幂等性通常与只读操作相关，但有时表单提交也可以是幂等的，具体取决于你的设计方式。例如，在创建账户时，数据库表的
    `username` 列上可能有一些唯一约束或主键约束。如果表单被提交两次，第二次提交会因*重复键*而失败，不会对你的系统造成损害。不过，用户可能会看到一个错误页面。这显然是你想避免的，但至少你不会在数据库中创建重复的用户。在这个例子中，是表的唯一约束救了你；但运气稍差一点，情况可能正好相反，重复提交表单很容易触发不良副作用。这最终可能导致数据损坏或系统中的其他不一致问题。


    因此，你通常希望设计你的应用程序，使得表单无法被提交两次；或者，至少确保不会产生任何不良副作用。虽然一行简单的 JavaScript 代码似乎可以解决这个问题（例如，你可以在第一次点击后禁用按钮），但请记住，这只能降低表单被提交两次的可能性。禁用按钮远非理想或完整的解决方案。例如，以下场景仍然可能发生：


    ____________


    ¹ [`http://en.wikipedia.org/wiki/Idempotence`](http://en.wikipedia.org/wiki/Idempotence)（计算机科学含义）


    *   点击“提交”按钮后，用户按下 F5 键；这将导致表单被重新提交。（浏览器会警告用户，但仍然可能提交两次表单。）

    *   用户可以使用像 cURL 这样简单的工具模拟多线程 HTTP 请求，轻松绕过你的 JavaScript。^(2) 或者，用户可以直接在浏览器中禁用
    JavaScript；这甚至不需要是专业开发者就能做到！


    这里的要点是，你需要一种成熟的机制来序列化对特定表单提交的访问（当然，是针对特定会话），这样你的应用程序逻辑就不必处理重复提交（即，你不想编写特定的代码来处理这个问题）。


    Spring Web Flow 通过序列化对流程执行的访问来解决这个问题。获取 HTTP 会话 ID 后，你将获得一个*流程执行键*。流程执行键之于 Web
    Flow，就如同 HTTP 会话 ID 之于你的 Web 容器。每个流程执行都会获得一个唯一的 ID。Web Flow 将使用此 ID 来标识用户当前参与的流程执行。但它也会使用此
    ID 来序列化对流程执行的访问（即，它将防止两个请求同时操作同一个流程执行）。但别担心：这也是为你自动管理的，你甚至不会注意到它。


    每当表单在你的流程中被提交两次时，Web Flow 保证在给定 HTTP 会话中，对于该流程执行，一次只有一个请求会被执行。它通过序列化流程执行键来实现这一点。第二个请求会保持挂起状态，因为流程执行被第一个请求锁定了。它将在第一个请求处理完毕后最终被执行，除非第一个请求结束了该流程。在这种情况下，第二个请求将简单地重新启动流程，因为流程已经结束（参见图
    10-4）。


    ____________


    ²[`http://curl.haxx.se/`](http://curl.haxx.se/) 一个非常简洁易用的基于命令行的工具，使用 URL 语法（http、https、smtp
    等）传输数据。


    ![图片](img/9781430241553_Fig10-04.jpg)


    ***图 10-4.** Web Flow 同步对同一流程执行的多个请求*


    在图 10-4 中，顶部的矩形代表处理两个请求（来自同一浏览器会话的重复提交）的流程执行。只允许一个请求通过进行处理（`request1`），而第二个请求（`request2`）被流程执行阻塞（其他请求也会被阻塞）。在处理完
    `request1` 后，在请求结束之前，它触发了一个结束状态（我们稍后会讨论）。结束状态会终止整个流程执行。在中间的矩形中，你可以看到第一个请求处理完毕后的流程执行。锁被释放，因此第二个请求有机会进入流程执行。然而，该执行已经被销毁；在底部的矩形中，你可以看到一个新的流程执行被启动。换句话说，第二个请求会将用户带回流程的入口点，而不是重新执行该操作。


    这意味着在流程执行内部仍然可能发生重复提交。Web Flow 序列化了对流程执行的访问，但只要流程尚未结束（如前一段所述），第二个请求仍会执行与第一个请求完全相同的逻辑，你仍然会遇到重复提交。通常，你会在结束流程之前执行你的流程事务。在图书订购流程中，我们会经历不同的步骤，每个步骤构成订单的一部分。如果用户在此过程中双击，不会发生什么坏事（最坏的情况是，一本书被添加了两次）。但当用户最终确定订单时，我们会执行创建订单的事务，并将所有内容提交到数据存储。当第一个请求返回时，流程已经结束。这意味着第二个请求不会触发第二次创建订单的事务，而只是重新启动流程。

    '
- fmt: '![Image](images/square.jpg) **Note** You may ask yourself whether synchronizing
    access based on a token (the flow execution key) has any performance impact. The
    answer to that is no. Synchronization happens within a flow execution that executes
    within an HTTP session. In other words, it serializes access for the operations
    sent out by a single client, to the same flow execution. For example, a client''s
    double submission would be serialized because a double submission makes multiple
    requests in parallel within the same HTTP session and to the same flow execution.
    However, if two different clients (and thus two different sessions and different
    flow executions) were to push the same Submit button at the exact same time, nothing
    would get serialized, and everything would be executed in parallel.


    Now let''s return to the issue raised by that F5 (Refresh) button. Even if the
    user doesn''t double-click, refreshing a submitted form accidently will trigger
    the same effect. It will not be detected as a double-click (there is only one
    request, sequentially after the first request). For this problem, Web Flow offers
    you a Post Redirect Get (PRG) pattern. This is a complicated name for a very easy-to-understand
    pattern that solves the “accidental” resubmit.


    ### Post Redirect Get (PRG)


    By applying PRG, Web Flow performs a two-stage processing of the request. In the
    first stage, the HTTP request is received from the browser. First, it triggers
    the invocation of the application logic (if any). Next, Web Flow issues a redirect
    to the browser before starting the second stage, which is renders and sends back
    the view. This makes the browser forget the form and issue an (idempotent) GET
    request to acquire the view. Hitting F5 after that just resends the last GET.
    Thus, it re-executes only the second stage, rendering and sending back the view
    (see [Figure 10-5](#Chapter10.html#fig_10_5)).


    ![Image](images/9781430241553_Fig10-05.jpg)


    ***Figure 10-5.** The PRG (Post Redirect Get) pattern*


    At first, you trigger a normal form submission. Remember: If you were to double
    submit, only one submit would be treated at a time thanks to Web Flow''s serialization
    mechanism. The other submit would be processed after the first one completes.
    If case the first request ends the flow, the second simply restarts the flow.


    When the request (an HTTP POST) enters the web container, it executes the requested
    logic. Instead of directly rendering the view and sending an HTTP 200 (+ view
    data), Web Flow will send a 302 REDIRECT to the client''s browser. At this point,
    the flow execution is "paused" and the state is internally stored for you. The
    mechanism to store the state between requests is all handled by Web Flow.


    The browser will follow the redirect and issue an HTTP GET to the web container.
    Here Web Flow picks up the request again and lets the view be rendered. The view
    is eventually sent back to the client''s browser and displayed. Remember: The
    last action was not a POST, but a GET. If the user presses F5, the (idempotent)
    GET is executed without any side effects; it merely returns the last view without
    (double) processing the same logic again. Thus there is no chance of an accidental
    re-submit of a form. You get all that functionality for free. Cool!


    ### Controlled Navigation


    Until now, you primarily have used Spring MVC to take care of navigation in your
    app. For example, using an `org.springframework.web.servlet.ModelAndView` lets
    you indicate the next view to render. When working within a flow, Web Flow will
    take over the navigational control. It will literally be pulled out of your controllers
    and modeled within your flows. You will also be able to trigger actions on your
    application controllers or execute logic directly from within your flows.


    When we are speaking about application controllers, do we still need application
    controllers when working with Web Flow at all? The answer to that depends on the
    scenario. Your flow has actually become the application controller. It controls
    navigation and can execute logic via an expression language. You can directly
    call a façade (or service, if you like) from within your flow. However, most of
    the time a plain-old-java-object (POJO) as application controller doesn''t hurt.
    Java is still more readable than heavy expressions and XML. For trivial things
    that would have taken a single method with a single line of Java, your flow alone
    will do just fine. If you need more logic and feel the need to start writing code,
    then it is probably better to create a separate POJO application controller (annotate
    it with `@Controller`) and let your flow call methods on it.


    ![Image](images/square.jpg) **Note** You might wonder whether `@Controller` annotations
    are still required on your application controllers when working with Web Flow.
    What is important to know is that, when applying these annotations, the class
    in question becomes a Spring-managed bean. This means you can refer to the application
    controllers directly from within your flows. Annotation-wise, you can do that
    by using `@Controller` or `@Component`. An `@Controller` is just a specialization
    for a `@Component`. In other words, both do the same thing—`@Controller` just
    adds an extra indication that the class in question is an application controller
    (something that lives on the front end). It is probably a good idea to continue
    to use `@Controller` even if your application controllers are only used by your
    flow and perhaps not by Spring MVC. Ultimately, application controllers are an
    extension of your flow (which can also be considered an application controller).'
