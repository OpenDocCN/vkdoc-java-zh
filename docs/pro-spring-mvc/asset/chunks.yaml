    #### 处理结果事件


    如我们所见，可以使用 evaluate 动作来调用应用程序控制器上的方法。当从动作状态或决策状态调用时，这些方法的返回值可用于驱动状态转换。由于转换由事件触发，因此必须先将方法返回值映射到
    `Event` 对象。


    例如，在 `AuthenticationController` 的 `authenticate` 方法中，我们创建了由应用程序控制器直接返回的所谓事件：


    `return new` **`EventFactorySupport().error(this);`**

    `return new` **`EventFactorySupport().success(this);`**


    在这种情况下，动作的结果事件成为转换决策的主要依据。当与控制器或 POJO 动作结合使用时，这允许你调用应用程序代码中的一个方法，该方法返回一个单一值，该值可用作路由决策的基础。


    如果你不返回 `org.springframework.webflow.execution.Event`，Web Flow 将根据一组规则自动将方法返回值适配为适当的结果事件。这些规则很简单，并在表
    11-3 中进行了说明。


    ![图片](img/9781430241553_tab11-03.jpg)


    在我们的动作状态中，`placeOrder()` 方法返回了一个 `Long` 类型的对象。这导致 Web Flow 创建了一个带有 `success` 标识的事件——因此，我们的转换条件为
    `on="success"`。


    每当你返回一个值时，无论是带有属性的显式事件还是任何其他对象（Web Flow 会为你创建一个 `Event`），你都可以使用评估表达式的 `result`
    属性（参见清单 11-43 的示例）来绑定该值。如果事件的标识与动作状态的任何转换都不匹配，则会抛出 `NoMatchingTransitionException`
    异常。


    然而，如果你在转换中嵌套了一个 evaluate 动作，你只能决定该转换是允许继续还是中止。你可以通过返回一个成功或错误事件来实现这一点，无论是直接返回，还是让
    Web Flow 为你映射。


    如果你不返回显式的成功或错误事件，那么 Web Flow 将把你的返回值映射到一个 `Event`，如表 11-3 所述。对于 `String`、`Enum`
    或 `Boolean` 类型，该值必须为 `success`、`yes` 或 `true` 才能被解释为成功的 `Event`。在所有其他情况下，转换将被中止，并重新渲染最后一个视图状态。


    ![图片](img/square.jpg) **注意**  在 `AuthenticationController` 中，我们选择在应用程序代码本身中生成
    Event，以说明如何创建此类事件。在那个特定情况下（结果要么是 OK 要么是不 OK，即身份验证要么成功要么失败），使用 `Boolean` 同样也是一个很好的选择。


    #### 概述


    应用了之前所有的重构之后，清单 11-45 展示了我们的 `createOrders-flow` 现在的样子。你可以在 `src/main/webapp/WEB-INF/view/createOrders/createOrders-flow.xml`
    文件中找到此文件。


    ***清单 11-45.** 最终重构后的 createOrders-flow*


