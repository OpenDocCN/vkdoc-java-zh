    `    static class LoginControllerTestConfiguration {`\n\n`        @Bean`\n`        public\
    \ AccountService accountService() {`\n`            return Mockito.mock(AccountService.class);`\n\
    `        }`\n\n`        @Bean`\n`        public LoginController loginController()\
    \ {`\n`            return new LoginController();`\n`        }`\n`    }`\n`}`\n\
    \nThe initial setup remains unaltered and is the same as in `LoginControllerTest`.\
    \ For example; we are still using Mockito to mock the `AccountService`, and we\
    \ are still injecting the `LoginController` using the local Spring configuration\
    \ setup via the `LoginControllerTestConfiguration` class.\n\nThe first thing we\
    \ did is construct the MockMvc object in standalone mode. We did that by supplying\
    \ it our `LoginController` as a constructor argument:\n\n`MockMvc mockMvc = MockMvcBuilders.standaloneSetup(loginController)`![Image](images/U002.jpg)\n\
    `                          .build();`\n\nThe `LoginController` is pretty straightforward\
    \ to test, so all defaults loaded by the standalone mode are sufficient. You can,\
    \ however, apply customizations before calling `build` if that would be required.\
    \ For example, a custom view resolver would be set like this:\n\n`MockMvc mockMvc\
    \ = MockMvcBuilders`\n`                  .standaloneSetup(loginController)`\n\
    `                  .setViewResolvers(viewResolver)`\n`                  .build();`\n\
    \nWhen the context is initialized we can let it process a request. Our `LoginController`\
    \ only accepts HTTP `post` requests, so we build a `post` request with two parameters:\n\
    \n`mockMvc.perform(post(\"/login\")`\n`    .param(\"username\", \"john\")`\n`    .param(\"\
    password\", \"secret\"))`\n\nThe methods such as `post` and `param` are included\
    \ via static imports on top of the class (see [Listing 9-14](#Chapter09.html#list_9_14)).\
    \ In this case we left this on purpose to show you how compact the syntax becomes\
    \ when applying this strategy. In the beginning however it takes some time to\
    \ get used to the different methods that are available. Finally we verify the\
    \ result. We check that the HTTP status code is 200 (`isOk`), that the account\
    \ has been set on the session, and that we are being redirect to the index.htm\
    \ page:\n\n`.andExpect(status().isOk())`\n`.andExpect(request().sessionAttribute(`![Image](images/U002.jpg)\n\
    `        SecurityHandlerInterceptor.ACCOUNT_ATTRIBUTE, account))`\n`.andExpect(redirectedUrl(\"\
    /index.htm\"));`\n\nThis looks pretty sweet. You don’t have to create separate\
    \ mock objects for `request`, `response`, and `session`, because this is all taken\
    \ care of by the Spring MVC `test` module. If you compare this with our previous\
    \ test case, `LoginControllerTest`, you will immediately see that this code looks\
    \ a lot better, is more compact, and above all tests the complete controller including\
    \ the Spring MVC annotations.\n\nBy the way, building a `MockMvc` in managed mode\
    \ that actually loads the configuration based upon `@Configuration` classes is\
    \ not much different and would look as follows:\n\n`MockMvc mockMvc = MockMvcBuilders`\n\
    `.annotationConfigSetup(WebMvcContextConfiguration.class,` ![Image](images/U002.jpg)\n\
    `InfrastructureContextConfiguration.class,` ![Image](images/U002.jpg)\n`                                     TestDataContextConfiguration.class,            `![Image](images/U002.jpg)\n\
    `                                     LoginControllerTestConfiguration.class)`\n\
    `               .configureWebAppRootDir(\"src/main/webapp\", false)`\n`               .build();`\n\
    \nThis wraps up our short introduction to Spring MVC `test`. We hope that we have\
    \ shown you something which will become a very powerful tool in testing your Spring\
    \ MVC application controllers with a minimum of effort. We already look forward\
    \ having this fully integrated in Spring!\n\n### Automated Front-End Testing\n\
    \nAutomated front-end testing is the last piece in the unit testing puzzle. It\
    \ helps us test our final untested component, our views. JSPs can be tested, just\
    \ like all the other components, in an automated fashion. There are many forms\
    \ of front-end testing. You can, for example, test your web application on different\
    \ browser to check that the look and feel is similar. You can also test your application\
    \ for performance, render times, and usability. All of these are tests which are\
    \ probably applied in other testing phases possibly using external tools.\n\n\
    The testing that we are after here is to make sure that all our pages render,\
    \ and that all functionality offered by them also works. Nothing more, nothing\
    \ less. When you have done a good job testing all previous components, this should\
    \ be a breeze. Be sure that you have:\n\n> *   Set up a *good* infrastructure\
    \ for front-end testing. This requires a running container, data setup, and possibly\
    \ fakes or stubs for certain resources and functionality. The tests also need\
    \ to run (like any unit test) automatically via your continuous integration system,\
    \ meaning it should all be integrated in your build system.\n>     \n>     \n\
    >     \n>     \n>     This is not as easy as it seems, since you have one little\
    \ problem: you need to start up a Servlet container that can run your application\
    \ (see [Figure 9-10](#Chapter09.html#fig_9_10)). There are plug-ins for Gradle\
    \ (and Maven) like Cargo,^([14](#Chapter09.html#CHP-9-FN-14)) which can start\
    \ a container and deploy your application before these tests are run.\n>     \n\
    >     ![Image](images/9781430241553_Fig09-10.jpg)\n>     \n>     ***Figure 9-10**.\
    \ Running a front-end test against Tomcat*\n>     \n>     \n> *   Designed your\
    \ views well. Normally you will have already tested your views by hand when you\
    \ were designing them. So normally when every level is well-tested, there should\
    \ be only minor faults coming out of your front-end testing.\n>     \n>     \n\
    >     \n>     \n>     The most important part is that they enforce your “test\
    \ harness.” Even when you forgot to test something in your services, it could\
    \ well be tested be one of your frontend tests. Also, if someone refactors your\
    \ views later on, you still have the test harness that ensures that your pages\
    \ are still working.\n\nTo set up a front-end test we have chosen Selenium.^([15](#Chapter09.html#CHP-9-FN-15))\
    \ It can be run in two modes, using a real browser like Firefox, and using HtmlUnit,\
    \ which is an in-memory browser.\n\nHtmlUnit is capable of running JavaScript\
    \ and handling AJAX. This can all run completely in memory and does not have any\
    \ external dependency, that way it can be considered as an integration test."
  trans: "\n`    @Test`\n`    public void testHandleLogin() throws Exception {`\n\
    `        MockMvc mockMvc = MockMvcBuilders.standaloneSetup(loginController)`![Image](img/U002.jpg)\n\
    `                          .build();`\n`        mockMvc.perform(post(\"/login\"\
    )`![Image](img/U002.jpg)\n`               .param(\"username\", \"john\")`\n`               .param(\"\
    password\", \"secret\"))`\n`               .andExpect(status().isOk())`\n`               .andExpect(request().sessionAttribute(`![Image](img/U002.jpg)\n\
    `                       SecurityHandlerInterceptor.ACCOUNT_ATTRIBUTE, account))`\n\
    `               .andExpect(redirectedUrl(\"/index.htm\"));`\n`    }`\n\n`    @After`\n\
    `    public void verify() throws AuthenticationException {`\n`        Mockito.verify(accountService,\
    \ VerificationModeFactory.times(1))`![Image](img/U002.jpg)\n`               .login(\"\
    john\", \"secret\");`\n`        Mockito.reset();`\n`    }`\n\n`    @Configuration`\n\
    `    static class LoginControllerTestConfiguration {`\n\n`        @Bean`\n`        public\
    \ AccountService accountService() {`\n`            return Mockito.mock(AccountService.class);`\n\
    `        }`\n\n`        @Bean`\n`        public LoginController loginController()\
    \ {`\n`            return new LoginController();`\n`        }`\n`    }`\n`}`\n\
    \n初始设置保持不变，与 `LoginControllerTest` 中的设置相同。例如，我们仍然使用 Mockito 来模拟 `AccountService`，并且仍然通过\
    \ `LoginControllerTestConfiguration` 类使用本地 Spring 配置来注入 `LoginController`。\n\n\
    我们做的第一件事是以独立模式构建 MockMvc 对象。我们通过将 `LoginController` 作为构造函数参数提供给它来实现这一点：\n\n`MockMvc\
    \ mockMvc = MockMvcBuilders.standaloneSetup(loginController)`![Image](img/U002.jpg)\n\
    `                          .build();`\n\n`LoginController` 的测试相当直接，因此独立模式加载的所有默认设置就足够了。但是，如果需要，你可以在调用\
    \ `build` 之前应用自定义设置。例如，可以像这样设置自定义视图解析器：\n\n`MockMvc mockMvc = MockMvcBuilders`\n\
    `                  .standaloneSetup(loginController)`\n`                  .setViewResolvers(viewResolver)`\n\
    `                  .build();`\n\n当上下文初始化后，我们可以让它处理一个请求。我们的 `LoginController` 只接受\
    \ HTTP `post` 请求，因此我们构建一个带有两个参数的 `post` 请求：\n\n`mockMvc.perform(post(\"/login\"\
    )`\n`    .param(\"username\", \"john\")`\n`    .param(\"password\", \"secret\"\
    ))`\n\n诸如 `post` 和 `param` 之类的方法是通过类顶部的静态导入引入的（参见清单 9-14）。这里我们特意保留了这一点，以向你展示应用此策略后语法变得多么简洁。不过，刚开始时，需要一些时间来适应各种可用的方法。最后，我们验证结果。我们检查\
    \ HTTP 状态码是否为 200（`isOk`），账户是否已在会话中设置，以及我们是否被重定向到 index.htm 页面：\n\n`.andExpect(status().isOk())`\n\
    `.andExpect(request().sessionAttribute(`![Image](img/U002.jpg)\n`        SecurityHandlerInterceptor.ACCOUNT_ATTRIBUTE,\
    \ account))`\n`.andExpect(redirectedUrl(\"/index.htm\"));`\n\n这看起来相当不错。你无需为 `request`、`response`\
    \ 和 `session` 创建单独的模拟对象，因为这一切都由 Spring MVC `test` 模块处理。如果你将此与我们之前的测试用例 `LoginControllerTest`\
    \ 进行比较，你会立即发现这段代码看起来好得多，更简洁，而且最重要的是，它测试了包括 Spring MVC 注解在内的整个控制器。\n\n顺便提一下，在托管模式下构建一个\
    \ `MockMvc`，使其实际加载基于 `@Configuration` 类的配置，并没有太大不同，看起来如下：\n\n`MockMvc mockMvc\
    \ = MockMvcBuilders`\n`.annotationConfigSetup(WebMvcContextConfiguration.class,`\
    \ ![Image](img/U002.jpg)\n`InfrastructureContextConfiguration.class,` ![Image](img/U002.jpg)\n\
    `                                     TestDataContextConfiguration.class,            `![Image](img/U002.jpg)\n\
    `                                     LoginControllerTestConfiguration.class)`\n\
    `               .configureWebAppRootDir(\"src/main/webapp\", false)`\n`               .build();`\n\
    \n至此，我们对 Spring MVC `test` 的简短介绍就结束了。我们希望我们向你展示的东西，能成为你以最少工作量测试 Spring MVC 应用控制器的强大工具。我们期待它能够完全集成到\
    \ Spring 中！\n\n### 自动化前端测试\n\n自动化前端测试是单元测试拼图中的最后一块。它帮助我们测试最后一个未经测试的组件——我们的视图。JSP\
    \ 可以像所有其他组件一样，以自动化方式进行测试。前端测试有多种形式。例如，你可以在不同的浏览器上测试你的 Web 应用，以检查外观和感觉是否相似。你还可以测试应用的性能、渲染时间和可用性。所有这些测试可能都在其他测试阶段使用外部工具进行。\n\
    \n我们这里追求的测试是确保我们所有的页面都能渲染，并且它们提供的所有功能都能正常工作。仅此而已。如果你已经很好地测试了所有之前的组件，这应该是轻而易举的事。请确保你已：\n\
    \n> *   为前端测试设置了*良好*的基础设施。这需要一个正在运行的容器、数据设置，以及可能针对某些资源和功能的模拟或桩。这些测试也需要（像任何单元测试一样）通过你的持续集成系统自动运行，这意味着它们应该全部集成到你的构建系统中。\n\
    >     \n>     \n>     \n>     \n>     这并不像看起来那么容易，因为你有一个小问题：你需要启动一个可以运行你的应用的 Servlet\
    \ 容器（参见图 9-10）。Gradle（和 Maven）有一些插件，比如 Cargo，^(14)，它们可以在运行这些测试之前启动一个容器并部署你的应用。\n\
    >     \n>     ![Image](img/9781430241553_Fig09-10.jpg)\n>     \n>     ***图 9-10**.\
    \ 针对 Tomcat 运行前端测试*\n>     \n>     \n> *   设计好了你的视图。通常，你在设计视图时已经手动测试过它们。因此，通常当每一层都经过良好测试时，前端测试应该只会发现一些小错误。\n\
    >     \n>     \n>     \n>     \n>     最重要的是，它们强化了你的“测试工具”。即使你忘记在服务中测试某些内容，它也可能在你的某个前端测试中得到测试。此外，如果以后有人重构了你的视图，你仍然拥有测试工具来确保你的页面仍然正常工作。\n\
    \n为了设置前端测试，我们选择了 Selenium。^(15) 它可以在两种模式下运行：使用像 Firefox 这样的真实浏览器，以及使用 HtmlUnit（一种内存浏览器）。\n\
    \nHtmlUnit 能够运行 JavaScript 和处理 AJAX。这一切都可以完全在内存中运行，并且没有任何外部依赖，因此它可以被视为一种集成测试。\n"
- fmt: "# Front-End Testing Using Selenium\n\nThe current version of Selenium, which\
    \ we will be using, is Selenium 2.x (we will refer to Selenium 2.x as “Selenium”\
    \ from now on). Selenium makes use of the so called WebDriver project. This enables\
    \ Selenium to run tests against a browser of choice out of the box without having\
    \ the need of additional software. With the previous version (Selenium 1.x) this\
    \ was different. It required you to have a so called Selenium RC server running\
    \ between the test case and the browser. You can see this in [Figure 9-11](#Chapter09.html#fig_9_11).\
    \ However, the Selenium RC server can still be used in combination with the current\
    \ version of Selenium. To explain this, we will first look at how Selenium 1.x\
    \ works.\n\n_________\n\n^(14) [`http://cargo.codehaus.org/`](http://cargo.codehaus.org/)\n\
    \n^(15) [`http://seleniumhq.org/`](http://seleniumhq.org/)\n\n![Image](images/9781430241553_Fig09-11.jpg)\n\
    \n***Figure 9-11.** Selenium 1.x with the Selenium RC server setup*\n\nWith Selenium\
    \ 1.x the communication between the test case and the Selenium RC server goes\
    \ over the network (your test commands are translated into HTTP requests being\
    \ sent to the Selenium RC server). Potentially the Selenium RC server can be running\
    \ on another machine than where the actual test is running. The Selenium RC server\
    \ then translates the commands received over HTTP to JavaScript calls and injects\
    \ them into the target browser. This is a nontrivial process, but it is shielded\
    \ from the user. While this setup considered deprecated, it might still be interesting\
    \ to see how it works. You can read more about it on the Selenium documentation\
    \ page.^([16](#Chapter09.html#CHP-9-FN-16))\n\nSelenium now offers a different\
    \ method, using WebDriver, which controls the browser directly using the browser’s\
    \ native API. So it no longer requires a complex (internal) setup as with Selenium\
    \ RC that Selenium 1.x used. Using Selenium you can directly control the browser\
    \ without having a need for the Selenium RC server. You simply select the appropriate\
    \ driver via the API, depending on the browser you want to use.\n\nHowever, you\
    \ can still use the RC server. In that case the RC server will also use WebDriver.\
    \ Instead of your test directly using WebDriver to control a browser on your local\
    \ machine, you now instruct the RC server running on a different machine to communicate\
    \ with a local browser using WebDriver. The main difference between the Selenium\
    \ RC server setup and Selenium 1.x is that the Selenium RC server does much more\
    \ than that; it also injects JavaScript and acts as proxy, which with WebDriver\
    \ is no longer needed. It just functions as a “remote JVM,” enabling you to control\
    \ a browser on a remote machine.\n\n_________\n\n^(16) [`http://seleniumhq.org/docs/05_selenium_rc.html#selenium-rc-architecture`](http://seleniumhq.org/docs/05_selenium_rc.html#selenium-rc-architecture)\n\
    \n![Image](images/square.jpg) **Tip** Using Selenium RC server is especially interesting\
    \ for those cases where you want to run the test on machine A but use machine\
    \ B’s browser. For example, you could run the test on your CI, which is a Unix-type\
    \ machine. You want to run your front-end tests against IE 7, 8 and 9. To do so,\
    \ you could set up three virtual machines, each installed with Windows and one\
    \ of the three browsers, and running a Selenium RC server. You could then run\
    \ the test suite three times. The first time you would use the IP address of the\
    \ virtual machine running IE 7. The second time the IP address of the virtual\
    \ machine running IE 8, and so forth. You could create Spring test profiles to\
    \ dynamically inject another IP address depending on the profile with which the\
    \ tests are run.\n\n## Writing a Selenium Test\n\nNow that we have seen some theory\
    \ about Selenium and its predecessor Selenium 1.x, let’s have a look how we can\
    \ actually use it. Before we can start we have to add its dependencies in `build.gradle`.\
    \ We will add them in the gradle build file of chapter9-bookstore sample.\n\n\
    ```\ntestCompile 'org.seleniumhq.selenium:selenium-java:2.20.0'\ntestCompile 'org.seleniumhq.selenium:selenium-firefox-driver:2.20.0'\n\
    testCompile 'org.seleniumhq.selenium:selenium-htmlunit-driver:2.20.0'\n```\n\n\
    We added the core dependency (`selenium-java`) and a WebDriver dependency for\
    \ Firefox and HtmlUnit. Other drivers^([17](#Chapter09.html#CHP-9-FN-17)) currently\
    \ are `selenium-android-driver`, `selenium-chrome-driver`, `selenium-ie-driver`,\
    \ `selenium-iphone-driver`, and `selenium-remote-driver`. Next let’s look at the\
    \ Selenium test for the `LoginController` in [Listing 9-15](#Chapter09.html#list_9_15).\n\
    \n***Listing 9-15.** Testing the login sequence with Selenium*\n\n```\npackage\
    \ com.apress.prospringmvc.bookstore.web.frontend;\n\n// Other imports omitted,\
    \ see Listing 9-7\n\nimport static org.junit.Assert.assertEquals;\n\nimport org.openqa.selenium.By;\n\
    import org.openqa.selenium.WebDriver;\nimport org.openqa.selenium.firefox.FirefoxDriver;\n\
    \npublic class SeleniumLoginFrontendTest {\n\n    private WebDriver browser;\n\
    \n    @Before\n    public void setup() {\n        browser = new FirefoxDriver();\n\
    \    }\n\n    @Test\n    public void startTest() {\n        browser.get(\"http://localhost:8080/chapter9-bookstore/\"\
    );\n\n        browser.findElement(By.id(\"login\")).click();\n\n        // Will\
    \ throw exception if elements not found\n        browser.findElement(By.id(\"\
    username\")).sendKeys(\"jd\");\n        browser.findElement(By.id(\"password\"\
    )).sendKeys(\"secret\");\n\n        browser.findElement(By.id(\"loginButton\"\
    )).click();\n        browser.findElement(By.id(\"account\")).click();\n\n    \
    \    assertEquals(\"John\", browser.findElement(\n                           \
    \  By.id(\"firstName\")).getAttribute(\"value\"));\n    }\n\n    @After\n    public\
    \ void tearDown() {\n        browser.close();\n    }\n}\n```\n\n_________\n\n\
    ^(17) [`http://repo1.maven.org/maven2/org/seleniumhq/selenium/`](http://repo1.maven.org/maven2/org/seleniumhq/selenium/)\n\
    \nIn the `setup` method we start our `browser`, which is the actual API to control\
    \ the browser from within our test case. Here we are using Firefox via the `FirefoxDriver`:\n\
    \n```\nbrowser = new FirefoxDriver();\n```\n\nIf we want to switch to an in-memory\
    \ browser (HtmlUnit) all code would remain the same. We just need to assign the\
    \ `HtmlUnitDriver` instead of the `FirefoxDriver`:\n\n```\nbrowser = new HtmlUnitDriver();\n\
    ```\n\nRunning this will run the tests against the in-memory browser. There will\
    \ be no browser popping up when we run the tests like this. To get an idea of\
    \ which browsers are supported and their specifics, the best resource is the Selenium\
    \ documentation.^([18](#Chapter09.html#CHP-9-FN-18))\n\n_________\n\n^(18) [`http://seleniumhq.org/docs/03_webdriver.html#introducing-webdriver-s-drivers`](http://seleniumhq.org/docs/03_webdriver.html#introducing-webdriver-s-drivers)\n\
    \n![Image](images/square.jpg) **Note** if you want to use Selenium RC server with\
    \ WebDriver, you can use `org.openqa.selenium.remote.RemoteWebDriver`. On the\
    \ target machine you will have to run the Selenium RC server in order for this\
    \ to work. You can use the `org.openqa.selenium.remote.DesiredCapabilities` class\
    \ to further configure the driver. For example: `browser = new RemoteWebDriver(new\
    \ URL(\"remoteHostRunningSeleniumRC:4444\"), DesiredCapabilities.firefox());`\
    \ This tells Selenium that we will be using `RemoteWebDriver`, and that it should\
    \ connect to a Selenium RC server running on host `remoteHostRunningSeleniumRC`\
    \ on port 4444. It also tells the remote instance that it should run the tests\
    \ against Firefox (which will then be started on the remote machine)."
  raw: '#### Front-End Testing Using Selenium


    The current version of Selenium, which we will be using, is Selenium 2.x (we will
    refer to Selenium 2.x as “Selenium” from now on). Selenium makes use of the so
    called WebDriver project. This enables Selenium to run tests against a browser
    of choice out of the box without having the need of additional software. With
    the previous version (Selenium 1.x) this was different. It required you to have
    a so called Selenium RC server running between the test case and the browser.
    You can see this in [Figure 9-11](#Chapter09.html#fig_9_11). However, the Selenium
    RC server can still be used in combination with the current version of Selenium.
    To explain this, we will first look at how Selenium 1.x works.


    _________


    ^(14) [`http://cargo.codehaus.org/`](http://cargo.codehaus.org/)


    ^(15) [`http://seleniumhq.org/`](http://seleniumhq.org/)


