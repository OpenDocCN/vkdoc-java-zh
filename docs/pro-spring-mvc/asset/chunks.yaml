- fmt: "### Using Spring Mock Objects\n\nWhen the time has come to test your application\
    \ controller, you can use the helpers from Spring: `org.springframework.test.web.ModelAndViewAssert`\
    \ combined with `MockHttpServletRequest`, `MockHttpServletResponse`, and `MockHttpSession`\
    \ (all found in `org.springframework.mock.web`). Although they are named \"Mock\"\
    \ they are more like stubs by our definition of the terms. You can, for example,\
    \ add attributes to the `MockHttpSession` via `MockHttpServletRequest` and retrieve\
    \ them later on (`MockHttpServletRequest` uses `MockHttpSession` internally as\
    \ its session stub). Depending on things you set or do, some `MockHttpServletRequest`\
    \ methods might react differently when you call them (it also contains some inner\
    \ logic to simulate the `HttpServletRequest` where possible). We will first show\
    \ the handle login method, in [Listing 9-12](#Chapter09.html#list_9_12), so you\
    \ can easily follow what we are testing.\n\n**Listing 9-12.** The `handleLogin`\
    \ method from the `LoginController`\n\n```java\n@RequestMapping(method = RequestMethod.POST)\n\
    public String handleLogin(@RequestParam String username, @RequestParam String\n\
    \                          password, HttpSession session)\n                  \
    \        throws AuthenticationException {\n    Account account = this.accountService.login(username,\
    \ password);\n    session.setAttribute(ACCOUNT_ATTRIBUTE, account);\n    String\
    \ url = (String) session.getAttribute(REQUESTED_URL);\n    session.removeAttribute(REQUESTED_URL);\
    \ // Remove the attribute\n\n    if (StringUtils.hasText(url) && !url.contains(\"\
    login\")) {\n        // Prevent loops for the login page.\n        return \"redirect:\"\
    \ + url;\n    } else {\n        return \"redirect:/index.htm\";\n    }\n}\n```\n\
    \nThe method in [Listing 9-12](#Chapter09.html#list_9_12) takes care of handling\
    \ the login from the login page. It accepts a `username` and `password` submitted\
    \ from the login form. It will then authenticate the user using the `AccountService`\
    \ and put the result (an `Account`) on the HTTP session using the constant `ACCOUNT_ATTRIBUTE`\
    \ as key. You can see the `SecurityHandlerInterceptor` defined in the [Chapter\
    \ 6](#Chapter06.html#ch6) section \"Implementing a HandlerInterceptor.\"\n\nNext\
    \ we show the test case (see [Listing 9-13](#Chapter09.html#list_9_13)) and then\
    \ discuss some specific code snippets.\n\n**Listing 9-13.** The test for the `LoginController`\
    \ `handleLogin` method\n\n```java\npackage com.apress.prospringmvc.bookstore.web.controller;\n\
    \n// Other imports omitted, see Listing 9-7\n\nimport static junit.framework.Assert.assertEquals;\n\
    import static junit.framework.Assert.assertNotNull;\nimport static junit.framework.Assert.assertNull;\n\
    \nimport org.mockito.Mockito;\nimport org.mockito.internal.verification.VerificationModeFactory;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.Configuration;\nimport org.springframework.mock.web.MockHttpServletRequest;\n\
    \nimport com.apress.prospringmvc.bookstore.service.AccountService;\nimport com.apress.prospringmvc.bookstore.service.AuthenticationException;\n\
    import com.apress.prospringmvc.bookstore.web.interceptor.\n       SecurityHandlerInterceptor;\n\
    \n@RunWith(SpringJUnit4ClassRunner.class)\n@ContextConfiguration\npublic class\
    \ LoginControllerTest {\n\n    @Autowired\n    private LoginController loginController;\n\
    \    @Autowired\n    private AccountService accountService;\n\n    @Before\n \
    \   public void setup() throws AuthenticationException {\n        Account account\
    \ = new AccountBuilder() {\n            {\naddress(\"Herve\", \"4650\", \"Rue\
    \ de la station\", \"1\", null,\n                    \"Belgium\");\n         \
    \       credentials(\"john\", \"secret\");\n                name(\"John\", \"\
    Doe\");\n            }\n        }.build(true);\n\nMockito.when(accountService.login(\"\
    john\",\n                     \"secret\")).thenReturn(account);\n    }\n\n   \
    \ @After\n    public void verify() throws AuthenticationException {\n        Mockito.verify(accountService,\n\
    \         VerificationModeFactory.times(3)).login(\"john\", \"secret\");\n   \
    \     Mockito.reset();\n    }\n\n    @Test\n    public void testHandleLogin()\
    \ throws AuthenticationException {\n\nMockHttpServletRequest mockHttpServletRequest\
    \ =\nnew MockHttpServletRequest();\nmockHttpServletRequest.getSession().setAttribute(\n\
    SecurityHandlerInterceptor.REQUESTED_URL, \"someUrl\");\n\nString view = loginController.handleLogin(\"\
    john\", \"secret\",\n           mockHttpServletRequest);\n\nAccount account =\
    \ (Account)\nmockHttpServletRequest.getSession().getAttribute(\nSecurityHandlerInterceptor.ACCOUNT_ATTRIBUTE);\n\
    \n        assertNotNull(account);\n        assertEquals(\"John\", account.getFirstName());\n\
