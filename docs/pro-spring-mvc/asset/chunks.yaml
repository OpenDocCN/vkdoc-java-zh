    \ of the class.\n\nNote that Web Flow will create a Spring-managed bean from the\
    \ created instance. In doing so, Spring will fully initialize the instantiated\
    \ class, applying all applicable `BeanPostProcessors`. The instance will eventually\
    \ be registered as a Spring bean with the application context. This means that\
    \ you can use for example `@Autowired` annotations in the class. During initialization,\
    \ these dependencies will be injected by Spring.\n\n**Note** The “Different Web\
    \ Flow Scopes” section explains that the class you specify in the `class` attribute\
    \ should implement `java.io.Serializable` because the object created is put on\
    \ `flow` scope. This also counts for referenced objects not marked as `transient`.\
    \ However, references to objects that hold no state (e.g., services, facades,\
    \ DAOs, and so on) should be declared as `transient`. Java's `transient` keyword\
    \ excludes these objects from the Java serialization process. Such objects do\
    \ not need to be serialized because they do not contain any state. If these instances\
    \ are autowired beans (using `@Autowired`), then Spring will make sure they are\
