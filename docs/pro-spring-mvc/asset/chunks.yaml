    ##### UriComponentsBuilder


    `UriComponentsBuilder` 提供了一种构建和编码 URI 的机制。它可以接受一个 URL 模式，并替换或扩展其中的变量。这可以用于相对或绝对
    URL。与需要自行考虑编码参数或进行字符串拼接的情况相比，这种机制在创建 URL 时特别有用。该组件为我们统一处理了所有这些事项。代码清单 5-6 中的代码创建了
    `/book/detail/42` 这个 URL。


    ***代码清单 5-6.** UriComponentsBuilder 示例代码*


    `UriComponentsBuilder.fromPath("/book/detail/{bookId}");`

    `.build();`

    `.expand("42")`

    `.encode()`


    给出的示例相当简单；然而，我们可以指定更多变量（例如 `bookId`）并替换它们（例如指定 `port` 或 `host`）。还有一个 `ServletUriComponentsBuilder`
    子类，我们可以用它来操作当前请求。例如，我们可能用它来替换路径变量，以及请求参数。


    #### 支持的方法参数注解


    除了显式支持的类型（如上一节所述），还有一些注解可以用来标注我们的方法参数（参见表 5-5）。其中一些注解也可以与表 5-4 中提到的方法参数类型一起使用。在这种情况下，它们用于指定请求、Cookie、请求头或响应中属性的名称，以及该参数是否为必需的。


    所有参数值都通过类型转换转换为参数类型。类型转换系统使用 `org.springframework.core.convert.converter.Converter`
    或 `PropertyEditor` 将 `String` 类型转换为实际类型。


    ![Image](img/tab_5_5.jpg)


    所有这些不同的方法参数类型和注解使我们能够编写非常灵活的请求处理方法。然而，我们可以通过扩展框架来扩展此机制。解析这些方法参数类型是由 `org.springframework.web.method.support.HandlerMethodArgumentResolver`
    的各种实现完成的。代码清单 5-7 展示了该接口。如果需要，我们可以创建此接口的自定义实现，并将其注册到框架中。你可以在第 7 章中找到更多相关信息。


    ***代码清单 5-7.** HandlerMethodArgumentResolver 接口*


    `package org.springframework.web.method.support;`


    `import org.springframework.core.MethodParameter;`

    `import org.springframework.web.bind.WebDataBinder;`

    `import org.springframework.web.bind.support.WebDataBinderFactory;`

    `import org.springframework.web.context.request.NativeWebRequest;`


    `public interface HandlerMethodArgumentResolver {`


    `    boolean supportsParameter(MethodParameter parameter);`


    `    Object resolveArgument(MethodParameter parameter,`

    `                           ModelAndViewContainer mavContainer,`

    `                           NativeWebRequest webRequest,`

    `                           WebDataBinderFactory binderFactory)`

    `                               throws Exception;`

    `}`


