    转向数据库    到目前为止，我们已将用户信息存储在配置本身中。通过使用 `<security:user-service>`，Spring Security
    创建了一个内存数据存储，该存储将使用我们指定的数据进行填充。在我们当前的应用程序中，用户实际上存储在数据库中，并建模为 `org.springframework.security.authentication.dao.Account`
    的实例。最好调整我们的配置，以便我们可以从现有的数据库表中加载用户帐户。事实证明，这是一个非常简单的步骤。    通过定义 `<security:authentication-provider>`，Spring
    注册了一个 `org.springframework.security.authentication.dao.DaoAuthenticationProvider`。这个类将处理所有底层细节。对我们来说重要的是，这个类委托给一个所谓的
    `org.springframework.security.core.userdetails.UserDetailsService` 类，该类负责从任何合适的位置加载用户信息。在我们之前的实现中，这是从内存数据存储加载的。现在我们将提供我们自己的实现。这是一个非常容易实现的接口，因为它只有一个方法：  `UserDetails
    loadUserByUsername(String username) throws UsernameNotFoundException;`  ![Image](img/square.jpg)
    **注意** UserDetailsService 不负责认证。那是认证提供者的工作。在我们的例子中，这将是 Spring Security 的 `DaoAuthenticationProvider`。`UserDetailsService`
    的目标是访问包含用户信息以及可能的凭据的数据存储（数据库、目录服务器或可能的文件）。它应该将这些信息从该数据存储的内部结构映射到预定义的标准对象（`org.springframework.security.core.userdetails.UserDetails`），并将其返回给提供者，以便提供者可以继续其工作。    基本上，实现应该从其配置确定的任何位置加载用户信息，并将该信息转换为
    `UserDetails` 对象。正如我们稍后将看到的，`UserDetails` 对象是你在请求安全信息时将使用的主要对象。该实现如清单 13-16 所示。    ***清单
