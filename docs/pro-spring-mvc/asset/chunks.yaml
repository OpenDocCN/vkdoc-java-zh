    \ `methods`, `params`, `produces`, and `value`; for more details, see [Table 5-2](#Chapter05.html#tab_5_2))\
    \ of the `org.springframework.web.bind.annotation.RequestMapping` annotation.\
    \ The `RequestConditionHolder` and `RequestMappingInfo` are two implementations\
    \ used internally by the framework.\n\nTo create an implementation, we need two\
    \ things. First, we need an implementation of the interface (see [Listing 6-23](#Chapter06.html#list_6_23)\
