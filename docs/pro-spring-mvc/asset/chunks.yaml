    The first method called on the controller when we click checkout is the `show`
    method, it takes our cart and uses the `Account` stored in the session to create
    an order and add that to the model. The order is stored in the session in between
    requests; this due to the use of `SessionAttributes`. When this is done, the checkout
    page is rendered (see [Figure 6-3](#Chapter06.html#fig_6_3)).


    ![Image](images/9781430241553_Fig06-03.jpg)


    ***Figure 6-3.** The Checkout page*


    When the form is filled in, the customer can do two things: he can press the Order
    button or the Update button. When the Update button is pressed, the `update` method
    is called. This submits the form and then updates the order (and recalculates
    the total price). When the Order button is pressed, the order is submitted and
    then validated by the `com.apress.prospringmvc.bookstore.validation.OrderValidator`.
    In any errors occur, the page is redisplayed and error messages are shown to the
    customer. The interesting part occurs when there are no errors. First, the order
    is stored in the database. When we are finished with the order, we need to remove
    it from the session, which we accomplish by calling the `setComplete` method on
    the `org.springframework.web.bind.support.SessionStatus` object (see the [Chapter
    5](#Chapter05.html#ch5) section, “Supported Method Argument Types”). Finally,
    before redirecting to the index page again, we need to clear the shopping cart.
    We do this so that the customer can add new books to the cart. Because we cannot
    simply replace the `session`-scoped object, we need to call a method to clear
    it. If we were to replace the cart with a fresh instance we would basically destroy
    the scoped proxy object.


    ### Crosscutting Concerns


    When developing an enterprise application, we are often faced or challenged with
    crosscutting concerns. These are concerns that affect many objects and actions.
    Examples of crosscutting concerns include transaction management and security,
    but also actions such as exposing generic data for each incoming web request.


    In general, these concerns are hard to implement in our codebase by using traditional
    object-oriented approaches. If we were to implement them in traditional ways,
    it would lead to code duplication and hard-to-maintain code. For our general objects,
    we can use aspect-oriented programming (AOP) to address these crosscutting concerns;
    however when it comes to applying it to requests, we need a slightly different
    approach.


    Spring MVC gives us two ways of implementing crosscutting concerns. The first
    approach uses *interceptors* to implement generic logic, while the second relies
    on exception handling. In this section, we are going to take a look at both techniques
    of applying crosscutting concerns in our web application.'
  trans: '

    #### 实现结账


    为了完成订购流程，我们将让顾客有机会结算购物车。这将在数据库中创建一个实际的 `com.apress.prospringmvc.bookstore.domain.Order`
    对象和条目。结账功能结合了我们在上一章和上一节中介绍的许多内容。控制器是 `com.apress.prospringmvc.bookstore.web.controller.CheckoutController`（参见清单
    6-4），其中包含大量逻辑。`checkout.jsp` 文件是包含我们界面的 JSP 文件；它位于 `/WEB-INF/views/cart` 目录下。


    ***清单 6-4.** CheckoutController*


    `package com.apress.prospringmvc.bookstore.web.controller;`


    `//其他导入已省略`

    `import com.apress.prospringmvc.bookstore.validation.OrderValidator;`


    `@Controller`

    `@SessionAttributes(types = { Order.class })`

    `@RequestMapping("/cart/checkout")`

    `public class CheckoutController {`


    `    private final Logger logger;`

    `    logger  = LoggerFactory.getLogger(CheckoutController.class);`


    `    @Autowired`

    `    private Cart cart;`


    `    @Autowired`

    `    private BookstoreService bookstoreService;`


    `    @ModelAttribute("countries")`

    `    public Map<String, String> countries(Locale currentLocale) {`

    `        Map<String, String> countries = new TreeMap<String, String>();`

    `        for (Locale locale : Locale.getAvailableLocales()) {`

    `            countries.put(`

    `                       locale.getCountry(),`

    `                       locale.getDisplayCountry(currentLocale));`

    `        }`

    `        return countries;`

    `    }`


    `    @RequestMapping(method = RequestMethod.GET)`

    `    public void show(HttpSession session, Model model) {`

    `        Account account = (Account)`

    `        session.getAttribute(LoginController.ACCOUNT_ATTRIBUTE);`

    `        Order order = this.bookstoreService.createOrder(this.cart, account);`

    `        model.addAttribute(order);`

    `    }`


    `    @RequestMapping(method = RequestMethod.POST, params = "order")`

    `    public String checkout(SessionStatus status,`

    `                           @Validated @ModelAttribute Order order,`

    `                           BindingResult errors) {`

    `        if (errors.hasErrors()) {`

    `            return "cart/checkout";`

    `        } else {`

    `            this.bookstoreService.store(order);`

    `            status.setComplete(); //从会话中移除订单`

    `            this.cart.clear(); // 清空购物车`

    `            return "redirect:/index.htm";`

    `        }`

    `    }`


    `    @RequestMapping(method = RequestMethod.POST, params = "update")`

    `    public String update(@ModelAttribute Order order) {`

    `        order.updateOrderDetails();`

    `        return "cart/checkout";`

    `    }`


    `    @InitBinder`

    `    public void initBinder(WebDataBinder binder) {`

    `        binder.setValidator(new OrderValidator());`

    `    }`


    `}`


    当我们点击结账时，控制器上调用的第一个方法是 `show` 方法，它获取我们的购物车，并使用存储在会话中的 `Account` 创建一个订单，并将其添加到模型中。由于使用了
    `SessionAttributes`，订单在请求之间存储在会话中。完成后，将呈现结账页面（参见图 6-3）。


    ![图片](img/9781430241553_Fig06-03.jpg)


    ***图 6-3.** 结账页面*


    当表单填写完毕后，顾客可以执行两个操作：他可以按下“下单”按钮或“更新”按钮。当按下“更新”按钮时，会调用 `update` 方法。该方法提交表单，然后更新订单（并重新计算总价）。当按下“下单”按钮时，订单被提交，然后由
    `com.apress.prospringmvc.bookstore.validation.OrderValidator` 进行验证。如果出现任何错误，页面会重新显示，并向顾客展示错误信息。有趣的部分发生在没有错误时。首先，订单被存储到数据库中。当我们处理完订单后，需要将其从会话中移除，我们通过调用
    `org.springframework.web.bind.support.SessionStatus` 对象上的 `setComplete` 方法来实现这一点（参见第
    5 章的“支持的方法参数类型”部分）。最后，在重定向回首页之前，我们需要清空购物车。我们这样做是为了让顾客可以向购物车中添加新书。由于我们不能简单地替换 `session`
    作用域的对象，我们需要调用一个方法来清空它。如果我们用一个新实例替换购物车，基本上会破坏作用域代理对象。


    ### 横切关注点


    在开发企业应用时，我们经常面临或挑战横切关注点。这些是影响许多对象和动作的关注点。横切关注点的示例包括事务管理和安全性，以及为每个传入的 Web 请求公开通用数据等操作。


    通常，使用传统的面向对象方法在我们的代码库中实现这些关注点是很困难的。如果我们以传统方式实现它们，会导致代码重复和难以维护的代码。对于我们的通用对象，我们可以使用面向切面编程（AOP）来处理这些横切关注点；然而，当涉及到将其应用于请求时，我们需要一种略有不同的方法。


    Spring MVC 为我们提供了两种实现横切关注点的方法。第一种方法使用*拦截器*来实现通用逻辑，而第二种方法依赖于异常处理。在本节中，我们将探讨在 Web
    应用程序中应用横切关注点的这两种技术。

    '
- fmt: "# Interceptors\n\nInterceptors are to request handlers what filters are to\
    \ servlets. According to the servlet specification,^([2](#Chapter06.html#CHP-6-FN-2))\
    \ a filter is a reusable piece of code that can transform the content of HTTP\
    \ requests, responses, and header information. Filters modify or adapt the requests\
    \ for a resource, and modify or adapt responses from a resource. Examples of filtering\
    \ include authentication, auditing, and encryption.\n\nFilters and interceptors\
    \ both implement common functionality (crosscutting concerns) to apply to all\
    \ (or a selection) of incoming HTTP requests. Filters are more powerful than interceptors\
    \ because they can replace (or wrap) the incoming request/response, whereas this\
    \ cannot be done by an interceptor. The interceptor, on the other hand, has more\
    \ lifecycle methods than the filter (see [Table 6-3](#Chapter06.html#tab_6_3)).\n\
    \n![Image](images/tab_6_3.jpg)\n\nSpring MVC has two different interceptor strategies:\n\
    \n* `org.springframework.web.servlet.HandlerInterceptor` (see [Listing 6-5](#Chapter06.html#list_6_5))\n\
    * `org.springframework.web.context.request.WebRequestInterceptor` (see [Listing\
    \ 6-6](#Chapter06.html#list_6_6))\n\n________________\n\n² See Servlet Specification\
    \ 3.0, [chapter 6](#Chapter06.html#ch6).\n\n**Listing 6-5.** The `HandlerInterceptor`\
    \ Interface\n\n```\npackage org.springframework.web.servlet;\n\nimport javax.servlet.http.HttpServletRequest;\n\
    import javax.servlet.http.HttpServletResponse;\n\npublic interface HandlerInterceptor\
    \ {\n\n  boolean preHandle(HttpServletRequest request,\n                    HttpServletResponse\
    \ response,\n                    Object handler) throws Exception;\n\n  void postHandle(HttpServletRequest\
    \ request, HttpServletResponse response,\n                  Object handler, ModelAndView\
    \ modelAndView) throws Exception;\n\n  void afterCompletion(HttpServletRequest\
    \ request,\n                       HttpServletResponse response,\n           \
    \            Object handler,\n                       Exception ex) throws Exception;\n\
    }\n```\n\n**Listing 6-6.** The `WebRequestInterceptor` Interface\n\n```\npackage\
    \ org.springframework.web.context.request;\n\nimport org.springframework.ui.ModelMap;\n\
    \npublic interface WebRequestInterceptor {\n\n  void preHandle(WebRequest request)\
    \ throws Exception;\n\n  void postHandle(WebRequest request, ModelMap model) throws\
    \ Exception;\n\n  void afterCompletion(WebRequest request, Exception ex) throws\
    \ Exception;\n}\n```\n\nAs is often the case within the Spring Framework, both\
    \ strategies are expressed as interfaces for which we could provide an implementation.\
    \ The main difference between the strategies is that the `WebRequestInterceptor`\
    \ is independent from the underlying technology. It can be used in a JSF or Servlet\
    \ environment without changing the implementation. The `HandlerInterceptor` is\
    \ only usable in a Servlet environment. An advantage of the `HandlerInterceptor`\
    \ is that we can use it to prevent the handler from being called. We do this by\
    \ returning `false` from the `preHandle` method.\n\n## Configuring Interceptors\n\
    \nTo use an interceptor, we need to configure it in our configuration. Configuring\
    \ an interceptor consists of two steps:\n\n1. We need to configure the interceptor\
    \ itself.\n2. We need to connect it to our handlers.\n\nConnecting an interceptor\
    \ to our handlers can be done in two ways. It is possible to use both approaches\
    \ together, but we don’t recommend this. First, we can explicitly add the interceptors\
    \ to our handler mappings in our configuration. Second, we can use the `org.springframework.web.servlet.config.annotation.InterceptorRegistry`\
    \ to add interceptors.\n\nIn general, it is preferable to use the `InterceptorRegistry`\
    \ to add the interceptors, simply because that is a very convenient way to add\
    \ them. It is also very easy to limit which URLs the interceptors are matched\
    \ to (as we will explain in the section about the `InterceptorRegistry`.)\n\n\
    ### Explicitly Configuring a `HandlerMapping` with Interceptors\n\nTo register\
    \ the interceptors with the handler mapping, we first need to get the handler\
    \ mappings involved. To do this, we need to either explicitly add them or extend\
    \ the Spring base classes to get a reference to them (see [Listing 6-7](#Chapter06.html#list_6_7)).\
    \ Next, we simply add all interceptors to the instances. When using multiple handler\
    \ mappings, this can be quite cumbersome, especially if we want to apply the interceptor\
    \ only to certain URLs.\n\n**Listing 6-7.** A Sample of Explicit `HandlerMapping`\
    \ Configuration with Interceptors\n\n```\npackage com.apress.prospringmvc.bookstore.web.config;\n\
    \nimport org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.web.servlet.config.annotation.EnableWebMvc;\nimport\
    \ org.springframework.web.servlet.config.annotation.WebMvcConfigurationSupport;\n\
    import org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping;\n\
    \n@Configuration\n@EnableWebMvc\n@ComponentScan(basePackages = { \"com.apress.prospringmvc.bookstore.web\"\
    \ })\npublic class WebMvcContextConfiguration extends WebMvcConfigurationSupport\
    \ {\n\n    @Override\n    public RequestMappingHandlerMapping requestMappingHandlerMapping()\
    \ {\n        RequestMappingHandlerMapping handlerMapping;\n        handlerMapping\
    \ = super.requestMappingHandlerMapping();\n        handlerMapping.setInterceptors(getAllInterceptors());\n\
    \        return handlerMapping\n    }\n}\n```"
  raw: '#### Interceptors


    Interceptors are to request handlers what filters are to servlets. According to
    the servlet specification,^([2](#Chapter06.html#CHP-6-FN-2)) a filter is a reusable
    piece of code that can transform the content of HTTP requests, responses, and
    header information. Filters modify or adapt the requests for a resource, and modify
    or adapt responses from a resource. Examples of filtering include authentication,
    auditing, and encryption.


    Filters and interceptors both implement common functionality (crosscutting concerns)
    to apply to all (or a selection) of incoming HTTP requests. Filters are more powerful
    than interceptors because they can replace (or wrap) the incoming request/response,
    whereas this cannot be done by an interceptor. The interceptor, on the other hand,
    has more lifecycle methods than the filter (see [Table 6-3](#Chapter06.html#tab_6_3)).


    ![Image](images/tab_6_3.jpg)


    Spring MVC has two different interceptor strategies:


    *   `org.springframework.web.servlet.HandlerInterceptor` (see [Listing 6-5](#Chapter06.html#list_6_5))

    *   `org.springframework.web.context.request.WebRequestInterceptor` (see [Listing
    6-6](#Chapter06.html#list_6_6))


    ________________


    ² See Servlet Specification 3.0, [chapter 6](#Chapter06.html#ch6).


    ***Listing 6-5.** The HandlerInterceptor Interface*


    `package org.springframework.web.servlet;`


    `import javax.servlet.http.HttpServletRequest;`

    `import javax.servlet.http.HttpServletResponse;`


    `public interface HandlerInterceptor {`


    `  boolean preHandle(HttpServletRequest request,`

    `                    HttpServletResponse response,`

    `                    Object handler) throws Exception;`


    `  void postHandle(HttpServletRequest request, HttpServletResponse response,`

    `                  Object handler, ModelAndView modelAndView) throws Exception;`


    `  void afterCompletion(HttpServletRequest request,`

    `                       HttpServletResponse response,`

    `                       Object handler,`

    `                       Exception ex) throws Exception;`

    `}`


    ***Listing 6-6.** The WebRequestInterceptor Interface*


    `package org.springframework.web.context.request;`


    `import org.springframework.ui.ModelMap;`


    `public interface WebRequestInterceptor {`


    `  void preHandle(WebRequest request) throws Exception;`


    `  void postHandle(WebRequest request, ModelMap model) throws Exception;`


    `  void afterCompletion(WebRequest request, Exception ex) throws Exception;`

    `}`


    As is often the case within the Spring Framework, both strategies are expressed
    as interfaces for which we could provide an implementation. The main difference
    between the strategies is that the `WebRequestInterceptor` is independent from
    the underlying technology. It can be used in a JSF or Servlet environment without
    changing the implementation. The `HandlerInterceptor` is only usable in a Servlet
    environment. An advantage of the `HandlerInterceptor` is that we can use it to
    prevent the handler from being called. We do this by returning `false` from the
    `preHandle` method.


    ##### Configuring Interceptors


    To use an interceptor, we need to configure it in our configuration. Configuring
    an interceptor consists of two steps:


    1.  We need to configure the interceptor itself.

    2.  We need to connect it to our handlers.


    Connecting an interceptor to our handlers can be done in two ways. It is possible
    to use both approaches together, but we don’t recommend this. First, we can explicitly
    add the interceptors to our handler mappings in our configuration. Second, we
    can use the `org.springframework.web.servlet .config.annotation.InterceptorRegistry`
    to add interceptors.


    In general, it is preferable to use the `InterceptorRegistry` to add the interceptors,
    simply because that is a very convenient way to add them. It is also very easy
    to limit which URLs the interceptors are matched to (as we will explain in the
    section about the `InterceptorRegistry`.)


    ###### Explicitly Configuring a HandlerMapping with Interceptors


    To register the interceptors with the handler mapping, we first need to get the
    handler mappings involved. To do this, we need to either explicitly add them or
    extend the Spring base classes to get a reference to them (see [Listing 6-7](#Chapter06.html#list_6_7)).
    Next, we simply add all interceptors to the instances. When using multiple handler
    mappings, this can be quite cumbersome, especially if we want to apply the interceptor
    only to certain URLs.


    ***Listing 6-7.** A Sample of Explicit HandlerMapping Configuration with Interceptors*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `import org.springframework.context.annotation.ComponentScan;`

    `import org.springframework.context.annotation.Configuration;`

    `import org.springframework.web.servlet.config.annotation.EnableWebMvc;`

    `import org.springframework.web.servlet.config.annotation.WebMvcConfigurationSupport;`

    `import org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping;`


    `@Configuration`

    `@EnableWebMvc`

    `@ComponentScan(basePackages = { "com.apress.prospringmvc.bookstore.web" })`

    `public class WebMvcContextConfiguration extends WebMvcConfigurationSupport {`


    `    @Override`

    `    public RequestMappingHandlerMapping requestMappingHandlerMapping() {`

    `        RequestMappingHandlerMapping handlerMapping;`

    `        handlerMapping = super.requestMappingHandlerMapping();`

    `        handlerMapping.setInterceptors(getAllInterceptors());`

    `        return handlerMapping`

    `    }`

    `}`'
