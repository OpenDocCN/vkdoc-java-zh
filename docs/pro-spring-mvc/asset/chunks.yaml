  raw: '###### Using the InterceptorRegistry


    A more powerful and flexible way to register interceptors is to use the `org.springframework.web
    .servlet.config.annotation.InterceptorRegistry`. The interceptors added to this
    registry are added to all configured handler mappings. Additionally, mapping to
    certain URLs is very easy to accomplish with this approach. To get access to the
    registry, we need to implement the `org.springframework.web.servlet.config.annotation.WebMvcConfigurer`
    interface on the configuration class that configures our web resources. This interface
    has several callback methods that are called during the configuration of Spring
    @MVC.


    ![Image](images/square.jpg) **Tip** The framework provides an `org.springframework.web.servlet.config.annotation.WebMvcConfigurerAdapter`
    that we can extend. This saves us from implementing all methods from the `org.springframework.web.servlet.config.annotation.WebMvcConfigurer`
    interface.


    We could also extend the `org.springframework.web.servlet.config.annotation.WebMvcConfigurationSupport`,
    so that we can simply add to the default configuration. We could then omit the
    `org.springframework.web.servlet.config.annotation.EnableWebMvc` annotation.


    The `InterceptorRegistry` has two methods (one for each interceptor type) that
    we can use to add interceptors (see [Listing 6-8](#Chapter06.html#list_6_8)).
    Both methods return an instance of `org.springframework.web .servlet.config.annotation.InterceptorRegistration`
    that we can use to fine-tune the mapping of the interceptor. We can use ant-style
    path patterns^([3](#Chapter06.html#CHP-6-FN-3)) to configure a fine-grained mapping
    for the registered interceptor. If we don’t supply a pattern, the interceptor
    will be applied to all incoming requests.


    ***Listing 6-8.** The InterceptorRegistry Interface*


    `package org.springframework.web.servlet.config.annotation;`


    `import java.util.ArrayList;`

    `import java.util.List;`


    `import org.springframework.web.context.request.WebRequestInterceptor;`

    `import org.springframework.web.servlet.HandlerInterceptor;`

    `import org.springframework.web.servlet.handler.WebRequestHandlerInterceptorAdapter;`


    `public class InterceptorRegistry {`


    `      public InterceptorRegistration addInterceptor(`

    `                HandlerInterceptor interceptor) { .. }`


    `    public InterceptorRegistration addWebRequestInterceptor(`

    `                WebRequestInterceptor interceptor) { .. }`

    `}`


    ________________


    ³ See [Chapter 3](#Chapter03.html#ch3) for information about ant-style expressions.


    [Listing 6-9](#Chapter06.html#list_6_9) shows our current configuration. At this
    point, we have configured an interceptor to change the locale, and this interceptor
    is being applied to all incoming requests (we didn’t specify a URL pattern to
    match against). Next, we configure the interceptor and use the `addInterceptor`
    method to add it to the registry. The framework will take care of the additional
    details for registering the interceptors with the configured handler mappings.


    ***Listing 6-9.** Using the InterceptorRegistry to Add Interceptors*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `//Other imports omitted`


    `import org.springframework.web.servlet.HandlerInterceptor;`

    `import org.springframework.web.servlet.config.annotation.InterceptorRegistry;`


    `@Configuration`

    `@EnableWebMvc`

    `@ComponentScan(basePackages = { "com.apress.prospringmvc.bookstore.web" })`

    `public class WebMvcContextConfiguration extends WebMvcConfigurerAdapter {`


    `    @Override`

    `    public void addInterceptors(InterceptorRegistry registry) {`

    `        registry.addInterceptor(localeChangeInterceptor());`

    `    }`


    `    @Bean`

    `    public HandlerInterceptor localeChangeInterceptor() {`

    `        LocaleChangeInterceptor localeChangeInterceptor;`

    `        localeChangeInterceptor = new LocaleChangeInterceptor();`

    `        localeChangeInterceptor.setParamName("lang");`

    `        return localeChangeInterceptor;`

    `    }`

    `    //… Other methods omitted`


    `}`


    [Listing 6-10](#Chapter06.html#list_6_10) shows a snippet of code in which we
    change the mapping from all URLs to only URLs starting with `/customer`.


    ***Listing 6-10.** Limiting an Interceptor to Certain URLs*


    `package com.apress.prospringmvc.bookstore.web.config;`

    `//Imports omitted`

    `@Configuration`

    `@EnableWebMvc`

    `@ComponentScan(basePackages = { "com.apress.prospringmvc.bookstore.web" })`

    `public class WebMvcContextConfiguration extends WebMvcConfigurerAdapter {`


    `    @Override`

    `    public void addInterceptors(InterceptorRegistry registry) {`

    `        InterceptorRegistration registration;`

    `        registration = registry.addInterceptor(localeChangeInterceptor());`

    **`registation.addPathPatterns("/customers/**");`**

    `    }`

    `    //Other methods omitted`

    `}`


    ##### Implementing an Interceptor


    Thus far, we have covered different types of interceptors and how to register
    them, so that they can be used. Now let’s implement interceptors for our store.
    We are going to implement two different interceptors. The first will add some
    commonly used data to our model, so that we can show it to the user. The second
    will address a security need: we want the account and checkout page to be accessible
    only by registered users.'
