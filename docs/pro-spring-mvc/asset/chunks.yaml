    ### Data Binding


    In this section, we will explore the benefits and possibilities of using data
    binding, including how we can configure and extend it. However, we’ll begin by
    explaining the basics of data binding. [Listing 5-21](#Chapter05.html#list_5_21)
    shows our `com.apress.prospringmvc.bookstore.domain.BookSearchCriteria` JavaBean.
    It is a simple object with two properties: `title` and `category`.


    ***Listing 5-21.** The BookSearchCriteria JavaBean*


    `package com.apress.prospringmvc.bookstore.domain;`


    `public class BookSearchCriteria {`


    `    private String title;`

    `    private Category category;`


    `    public String getTitle() {`

    `        return this.title;`

    `    }`


    `    public void setTitle(String title) {`

    `        this.title = title;`

    `    }`

    `    public void setCategory(Category category) {`

    `        this.category = category;`

    `    }`


    `    public Category getCategory() {`

    `        return this.category;`

    `    }`

    `}`


    Assume we receive the following request: [`http://localhost:8080/chapter5-bookstore/book/search?title=Agile`](http://localhost:8080/chapter5-bookstore/book/search?title=Agile).
    In this case, the `title` property receives the value of `Agile`. Behind the scenes,
    Spring calls the `setTitle` method on our JavaBean, which we specified as a method
    argument in the `list` method on our controller. If there were a parameter named
    `category` in the request, then Spring would call the `setCategory` method; however,
    it would first try to convert the parameter (which is always a `String`) into
    a `com.apress.prospring.bookstore.domain.Category` JavaBean.


    However, data binding isn’t limited to simple setter methods. We can also bind
    to nested properties and even to indexed collections like maps, arrays, and lists.
    Nested binding happens when the parameter name contains a *dot* (.); for instance,
    `address.street=Somewhere` leads to `getAddress().setStreet("Somewhere")`.


    To bind to indexed collections, we must use a notation with square brackets in
    which we enclose the index. When using a map, this index doesn’t have to be a
    numeric. For instance, `list[2].name` would bind a name property on the third
    element in the list. Similarly, `map[''foo''].name` would bind the name property
    to the value under the key `foo` in the map.


    #### Customizing Data Binding


    We have two options for customizing the behavior of data binding: globally or
    per controller. Of course, we can mix both strategies together by performing a
    global setup, and then fine-tuning it per controller.'
