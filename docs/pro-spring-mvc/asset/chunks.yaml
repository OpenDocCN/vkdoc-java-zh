    #### 测试 JpaBookRepository


    现在我们已经拥有了构建测试所需的所有要素。对于事务策略，我们将选择第二种方案。也就是说，我们依赖基础设施来启动和回滚事务，并在执行 CUD 操作的测试方法中手动调用
    flush。


    接下来，我们继续为 `BookRepository` 接口暴露的每个方法定义一个测试方法并进行测试。在示例代码中，我们将测试范围限定为 `BookRepository`
    的两个 `read` 方法和一个 `create` 方法。其他方法的测试方式与此相同，不会展示任何新内容。我们还将创建一个 setup 方法（使用 `@Before`
    注解），用于加载每个测试方法所需的公共数据。首先，让我们查看清单 9-7 中的测试代码。


    ***清单 9-7.** src/test/java 中的完整测试类*


