    ### Request-Handling Methods


    Writing request-handling methods can be a challenge. For example, how should you
    map a method to an incoming request? Several things could be a factor here, including
    the URL, the method used (e.g., `GET` or `POST`^([1](#Chapter05.html#CHP-5-FN-1))),
    the availability of parameters or HTTP headers^([2](#Chapter05.html#CHP-5-FN-2)),
    or even the request content type or the content type (e.g., XML, JSON, or HTML)
    to be produced. All these can influence which method is selected to handle the
    request.


    The first step in writing a request-handling method is to put an `org.springframework.web.bind.annotation.RequestMapping`
    annotation on the method. This mapping is detected by the `org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping`
    to create the mapping of incoming URLs to the correct method (see the “Spring
    MVC Components” section in [Chapter 4](#Chapter04.html#ch4) for more information
    on handler mapping). Next, we need to specify which web request we want to execute
    the specified handler.


    The annotation can be put on both the type (the controller) and the method level.
    We can use the one on the type level to do some coarse-grained mapping (e.g.,
    the URL), and then use the annotation on the method level to further specify when
    to execute the method (e.g., a `GET` or `POST` request).


    [Table 5-2](#Chapter05.html#tab_5_2)shows which attributes we can set on the `RequestMapping`
    annotation and how they influence the mapping.


    ![Image](images/tab_5_2.jpg)


    ![Image](images/tab_5_2a.jpg)


    ________________


    ¹ [`http://www.w3.org/Protocols/rfc2616/rfc2616-sec9.html`](http://www.w3.org/Protocols/rfc2616/rfc2616-sec9.html)


    ² [`http://www.w3.org/Protocols/rfc2616/rfc2616-sec14.html`](http://www.w3.org/Protocols/rfc2616/rfc2616-sec14.html)


    In [Table 5-3](#Chapter05.html#tab_5_3), there are a couple of sample mappings
    that also show the effect of class- and method-level matching. As already mentioned,
    the `RequestMapping` annotation on the class applies to *all* methods in the controller.
    This mechanism can be used to do coarse-grained mapping on the class level and
    finer-grained mapping on the method level.


    ![Image](images/tab_5_3.jpg)


    ![Image](images/tab_5_3a.jpg)


    ________________


    ³ [`http://www.w3.org/Protocols/rfc2616/rfc2616-sec14.html`](http://www.w3.org/Protocols/rfc2616/rfc2616-sec14.html)


    #### Supported Method Argument Types


    A request-handling method can have various method arguments and return values.
    Most arguments mentioned in [Table 5-4](#Chapter05.html#tab_5_4)can be used in
    arbitrary order. However, there is a single exception to that rule: the `org.springframework.validation.BindingResult`
    argument. That argument has to follow a model object that we use to bind request
    parameters to.


    ![Image](images/tab_5_4.jpg)


    ![Image](images/tab_5_4a.jpg)


    ![Image](images/tab_5_4b.jpg)


    ##### RedirectAttributes


    The `org.springframework.web.servlet.mvc.support.RedirectAttributes` deserve a
    little more explanation than what is shown in [Table 5-4](#Chapter05.html#tab_5_4).
    With `RedirectAttributes`, it is possible to declare exactly which attributes
    are needed for the redirect. By default, all model attributes are exposed when
    doing a redirect. Because a redirect always leads to a `GET` request, all primitive
    model attributes (or collections/arrays of primitives) will be encoded as request
    parameters. However, with the annotated controllers, there are also objects in
    the model (like the path variables and other implicit values) that don’t need
    to be exposed and that are outside of our control.


    The `RedirectAttributes` can help us out here. When this is used as a method argument
    and a redirect is being issued, only the attributes added to the `RedirectAttributes`
    instance are going to be added to the URL.


    In addition to specifying attributes encoded in the URL, it is also possible to
    specify so called flash attributes. *Flash attributes* are attributes that are
    stored before the redirect and retrieved and made available as model attributes
    after the redirect. This is done by using the configured `org.springframework.web.servlet.FlashMapManager`.
    The use of flash attributes is useful for objects that cannot be encoded (non-primitive
    objects) or to keep URLs clean.'
