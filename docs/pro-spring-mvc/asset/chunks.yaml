    Spring MVC `test` 旨在使您的应用程序控制器更易于测试，扩展了我们在上一节中使用的 `MockHttpServletRequest`、`MockHttpServletResponse`
    和 `MockHttpSession` 辅助工具背后的理念。它试图更好地模拟 Spring MVC，而无需启动实际的 Servlet 容器。例如；使用 Spring
    MVC test，您将能够验证在使用 Tiles 作为视图解析器时，实际选择了哪些 JSP 进行渲染。这是以前不可能做到的事情，只能在运行时（可能使用前端测试）进行验证。我们能够使用单元测试或集成测试测试得越多，效果就越好。


    我们将创建的示例将展示如何使用基础知识。第一步是引导一个 `org.springframework.test.web.server.MockMvc`。此对象初始化
    MVC 基础设施，并将成为您进入 API 的主要入口点。您可以通过不同的方式初始化它：


    > *   从一个或多个 MVC 注解配置类

    > *   从一个或多个 Spring XML 文件

    > *   使用 `WebApplicationContext`

    > *   单独的 `@Controller` 类


    前三种可能性是托管模式。在这些情况下，会启动一个应用程序上下文。处理您向其发起的请求所需的控制器将从应用程序上下文中查找。此外，MVC 环境将像在运行时一样进行配置，具有相同的视图解析器、资源处理器、拦截器等，就像您在配置中指定的一样。


    最后一种可能性是所谓的独立模式。在此模式下，您直接提供应用程序控制器，并实例化最少的 Spring MVC 基础设施组件集——仅处理注册的应用程序控制器请求所需的那些组件。基础设施组件集与
    MVC 命名空间或 MVC Java 配置提供的非常相似。需要注意的是，实际的 Spring MVC 配置将不会被测试（因为它从未被加载）。


    首选的初始化方法是加载整个 Spring MVC 配置的方法。但是，如果您为每个测试都实例化 `MockMvc`，代价可能会很高。首选方式是使用第三种方法，即使用
    `WebApplicationContext`，它将结合两方面的优点。`WebApplicationContext` 被注入到测试中。配置由 Spring
    的测试支持照常加载。对于配置（在 `classes` 属性中提供），您将使用 Spring MVC 注解配置类。可能如下所示：


    `@RunWith(SpringJUnit4ClassRunner.class)`

    `@ContextConfiguration(classes = { ....})`

    `public class ApplicationControllerTest {`


    `  @Autowired`

    `  private WebApplicationContext wac;`


    这将加载您使用 `classes` 属性指定的 `@Configuration` 类，并启动一个 `WebApplicationContext`。然后，您将能够从注入的
    `WebApplicationContext` 构建一个 `MockMvc` 对象，这将是廉价的。Spring 的测试支持将缓存其加载的上下文的初始化，这些上下文通过
    `@ContextConfiguration` 指示，可能仅为整个测试套件加载一个实例。然而，目前 `WebApplicationContext` 支持尚不可用，尽管它将在
    Spring 3.2 中开始提供。


    在您初始化 `MockMvc` 对象（以某种方式）之后，您可以开始向其发送请求。它将使用实际的 Spring MVC 逻辑处理这些请求，并调用您的控制器。最后，您能够验证结果。在清单
    9-14 中，我们使用 Spring MVC `test` 重写了 `LoginControllerTest`。为简单起见，我们以独立模式构建了 `MockMvc`
    对象。让我们先看一下代码。


