- fmt: "### View Technologies\n\nSpring MVC supports many different technologies,\
    \ and if there isn’t support, you can probably add it yourself by implementing\
    \ `org.springframework.web.servlet.View` or by extending one of the provided `View`\
    \ classes. In this section we will discuss several view technologies and see how\
    \ Spring MVC supports them. For some there is extensive support; for others very\
    \ little. [Figure 8-3](#Chapter08.html#fig_8_3) shows the `View` class hierarchy,\
    \ where we can see some of the supported view technologies. For some of the technologies\
    \ we need to specify a specific `ViewResolver` to work, others work hand-in-hand\
    \ with the already configured view resolvers.\n\n![Image](images/9781430241553_Fig08-03.jpg)\n\
    \n***Figure 8-3.** View Hierarchy*\n\nThe next part of this section briefly covers\
    \ some of the supported view technologies. It will show the support classes and\
    \ how to set up Spring to work with the specified technology. It does not provide\
    \ in-depth coverage of all the different supported view technologies; there are\
    \ books available for most of the technologies mentioned here.\n\n![Image](images/square.jpg)\
    \ **Note** The `TilesViewResolver` has order 2 in most listings in this section.\
    \ This is to make sure it is executed at the right moment, especially when using\
    \ the `ContentNegotiatingViewResolver`, which should execute before (which is\
    \ the default) the `TilesViewResolver`.\n\n#### Java Server Pages\n\nUntil now\
    \ we have been using Java Server Pages for our application. Spring has excellent\
    \ support for it, including its own tag library (see [Chapters 5](#Chapter05.html#ch5)\
    \ and [6](#Chapter06.html#ch6)). Spring has support and integration classes and\
    \ in general it is the tool used with the `org.springframework.web.servlet.view.InternalResourceViewResolver`\
    \ to enable JSTL support and integrate with the default formatting and functions\
    \ library from Sun.\n\n#### JavaServer Faces\n\nJavaServer Faces (JSF) has very\
    \ little support in Spring MVC in general. If you want to use JSF, it is suggested\
    \ to use Spring Web Flow with JSF as the view layer; that approach provides for\
    \ a rich environment. The Spring support for JSF is simply that we can reuse our\
    \ beans from the application context. We do this by defining a customized `javax.faces.el.VariableResolver`\
    \ (JSF 1.1) or `javax.el.ELResolver` (JSF 1.2+) to gain access to the spring beans\
    \ in the JSF environment.\n\nThe easiest way to integrate Spring into a JSF environment\
    \ is by configuring `org.springframework.web.jsf.DelegatingVariableResolver`,\
    \ which will do lookups on the default resolver of the JSF implementation used.\
    \ If a name cannot be resolved, the resolver will then delegate to the look up\
    \ to the root application context. This allows for reuse of services and other\
    \ general components within JSF. [Listing 8-11](#Chapter08.html#list_8_11) shows\
    \ the configuration for the JSF part of the application. This can be found in\
    \ `faces-context.xml`.\n\n***Listing 8-11.** DelegatingVariableResolver sample\
    \ configuration (faces-context.xml)*\n\n```\n<faces-config>\n    <application>\n\
    \        <variable-resolver>\n        org.springframework.web.jsf.DelegatingVariableResolver\n\
    \        </variable-resolver>\n    </application>\n</faces-config>\n```\n\nThere\
    \ is also the `org.springframework.web.jsf.SpringBeanVariableResolver`, which\
    \ works in a similar way; however, it first consults the root application context\
    \ and afterwards the default resolver of the JSF implementation. This is useful\
    \ when using scoped beans from the application context in JSF.\n\nFor a JSF 1.2+\
    \ environment, we could also configure the `org.springframework.web.jsf.el.SpringBeanFacesELResolver`,\
    \ which does a lookup first in the root application context and then in the default\
    \ resolver from the used JSF implementation. [Listing 8-12](#Chapter08.html#list_8_12)\
    \ shows a sample configuration for this bean.\n\n***Listing 8-12.** SpringBeanFacesELResolver\
    \ sample configuration (faces-context.xml)*\n\n```\n<faces-config>\n    <application>\n\
    \        <el-resolver>\n        org.springframework.web.jsf.el.SpringBeanFacesELResolver\n\
    \        </el-resolver>\n    </application>\n</faces-config>\n```\n\nIf we have\
    \ some custom JSF components and need access to the current application context,\
    \ we can use `org.springframework.web.jsf.FacesContextUtils`. This utility class\
    \ provides two convenience methods to gain access to the application context and\
    \ retrieve beans from it, which in turn can be used from the custom component.\n\
    \n#### Tiles\n\nApache Tiles^([2](#Chapter08.html#CHP-8-FN-2)) is a powerful page\
    \ composition framework that allows you to compose your page of different page\
    \ components (the *tiles*). These page components can be reused and configured\
    \ in different page layouts. Originally it was designed as a JSP composition framework;\
    \ however, it can also be used to compose Velocity and Freemarker-based views.\n\
    \nTo get started with Tiles we must configure and bootstrap the engine for it.\
    \ Next we also need to configure the view resolver to be able to return Tiles-based\
    \ views, and finally we need to specify our page composition and add the different\
    \ templates (tiles).\n\nThere is the `org.springframework.web.servlet.view.tiles2.TilesConfigurer`\
    \ that we need to add to our configuration. Next to that we need the special `org.springframework.web.servlet.view.tiles2.TilesViewResolver`.\
    \ Finally, we also need to specify our page compositions and add the templates.\n\
    \n##### Configuring Tiles\n\nBefore we can start using the tiles support we need\
    \ to bootstrap Tiles. For this Spring provides the `org.springframework.web.servlet.view.tiles2.TilesConfigurer`\
    \ class. Next we also need to configure a view resolver to work with tiles for\
    \ this we can use `org.springframework.web.servlet.view.tiles2.TilesViewResolver`.\
    \ [Listing 8-13](#Chapter08.html#list_8_13) shows the most basic configuration\
    \ for tiles.\n\n***Listing 8-13.** ViewConfiguration for Tiles*\n\n```\npackage\
    \ com.apress.prospringmvc.bookstore.web.config;\n\n// Other imports omitted\n\
    import org.springframework.web.servlet.view.tiles2.TilesConfigurer;\nimport org.springframework.web.servlet.view.tiles2.TilesViewResolver;\n\
    \n@Configuration\npublic class ViewConfiguration {\n\n    @Bean\n    public TilesConfigurer\
    \ tilesConfigurer() {\n        return new TilesConfigurer();\n    }\n\n    @Bean\n\
    \    public TilesViewResolver tilesViewResolver() {\n        TilesViewResolver\
    \ tilesViewResolver = new TilesViewResolver();\n        tilesViewResolver.setOrder(2);\n\
    \        return tilesViewResolver;\n    }\n}\n```\n\n_________\n\n² [`http://tiles.apache.org/`](http://tiles.apache.org/)\n\
    \nThe `TilesConfigurer` by default loads a file called `tiles.xml` from the WEB-INF\
    \ directory; this file contains the page definitions. Before we take a look at\
    \ the definition file, let’s look at the properties of the configurer in [Table\
    \ 8-6](#Chapter08.html#tab_8_6).\n\n![Image](images/9781430241553_tab08-06.jpg)\n\
    \nThe `TilesViewResolver` has no additional properties to set; it has the same\
    \ set of properties as the `UrlBasedViewResolver`. It is a convenience subclass\
    \ that automatically configures the correct view type to return. For Tiles, we\
    \ need to create instances of the `org.springframework.web.servlet.view.tiles2.TilesView`."
  raw: '### View Technologies


    Spring MVC supports many different technologies, and if there isn’t support, you
    can probably add it yourself by implementing `org.springframework.web.servlet.View`
    or by extending one of the provided `View` classes. In this section we will discuss
    several view technologies and see how Spring MVC supports them. For some there
    is extensive support; for others very little. [Figure 8-3](#Chapter08.html#fig_8_3)
    shows the `View` class hierarchy, where we can see some of the supported view
    technologies. For some of the technologies we need to specify a specific a `ViewResolver`
    to work, others work hand-in-hand with the already configured view resolvers.


    ![Image](images/9781430241553_Fig08-03.jpg)


    ***Figure 8-3.** View Hierarchy*


    The next part of this section briefly covers some of the supported view technologies.
    It will show the support classes and how to set up Spring to work with the specified
    technology. It does not provide in-depth coverage of all the different supported
    view technologies; there are books available for most of the technologies mentioned
    here.


    ![Image](images/square.jpg) **Note** The `TilesViewResolver` has order 2 in most
    listings in this section. This is to make sure it is executed at the right moment,
    especially when using the `ContentNegotiatingViewResolver`, which should execute
    before (which is the default) the `TilesViewResolver`.


    #### Java Server Pages


    Until now we have been using Java Server Pages for our application. Spring has
    excellent support for it, including its own tag library (see [Chapters 5](#Chapter05.html#ch5)
    and [6](#Chapter06.html#ch6)). Spring has support and integration classes and
    in general it is the tool used with the `org.springframework.web.servlet.view.InternalResourceViewResolver`
    to enable JSTL support and integrate with the default formatting and functions
    library from Sun.


    #### JavaServer Faces


    JavaServer Faces (JSF) has very little support in Spring MVC in general. If you
    want to use JSF, it is suggested to use Spring Web Flow with JSF as the view layer;
    that approach provides for a rich environment. The Spring support for JSF is simply
    that we can reuse our beans from the application context. We do this by defining
    a customized `javax.faces.el.VariableResolver` (JSF 1.1) or `javax.el.ELResolver`
    (JSF 1.2+) to gain access to the spring beans in the JSF environment.


    The easiest way to integrate Spring into a JSF environment is by configuring `org.springframework.web.jsf.DelegatingVariableResolver`,
    which will do lookups on the default resolver of the JSF implementation used.
    If a name cannot be resolved, the resolver will then delegate to the look up to
    the root application context. This allows for reuse of services and other general
    components within JSF. [Listing 8-11](#Chapter08.html#list_8_11) shows the configuration
    for the JSF part of the application. This can be found in `faces-context.xml`.


    ***Listing 8-11.** DelegatingVariableResolver sample configuration (faces-context.xml)*


    `<faces-config>`

    `    <application>`

    `        <variable-resolver>`

    `        org.springframework.web.jsf.DelegatingVariableResolver`

    `        </variable-resolver>`

    `    </application>`

    `</faces-config>`


    There is also the `org.springframework.web.jsf.SpringBeanVariableResolver`, which
    works in a similar way; however, it first consults the root application context
    and afterwards the default resolver of the JSF implementation. This is useful
    when using scoped beans from the application context in JSF.


    For a JSF 1.2+ environment, we could also configure the `org.springframework.web.jsf.el.SpringBeanFacesELResolver`,
    which does a lookup first in the root application context and then in the default
    resolver from the used JSF implementation. [Listing 8-12](#Chapter08.html#list_8_12)
    shows a sample configuration for this bean.


    ***Listing 8-12.** SpringBeanFacesELResolver sample configuration (faces-context.xml)*


    `<faces-config>`

    `    <application>`

    `        <el-resolver>`

    `        org.springframework.web.jsf.el.SpringBeanFacesELResolver`

    `        </el-resolver>`

    `    </application>`

    `</faces-config>`


    If we have some custom JSF components and need access to the current application
    context, we can use `org.springframework.web.jsf.FacesContextUtils`. This utility
    class provides two convenience methods to gain access to the application context
    and retrieve beans from it, which in turn can be used from the custom component.


    #### Tiles


    Apache Tiles^([2](#Chapter08.html#CHP-8-FN-2)) is a powerful page composition
    framework that allows you to compose your page of different page components (the
    *tiles*). These page components can be reused and configured in different page
    layouts. Originally it was designed as a JSP composition framework; however, it
    can also be used to compose Velocity and Freemarker-based views.


    To get started with Tiles we must configure and bootstrap the engine for it. Next
    we also need to configure the view resolver to be able to return Tiles-based views,
    and finally we need to specify our page composition and add the different templates
    (tiles).


    There is the `org.springframework.web.servlet.view.tiles2.TilesConfigurer` that
    we need to add to our configuration. Next to that we need the special `org.springframework.web.servlet.view.tiles2.TilesViewResolver`.
    Finally, we also need to specify our page compositions and add the templates.


    ##### Configuring Tiles


    Before we can start using the tiles support we need to bootstrap Tiles. For this
    Spring provides the `org.springframework.web.servlet.view.tiles2.TilesConfigurer`
    class. Next we also need to configure a view resolver to work with tiles for this
    we can use `org.springframework.web.servlet.view.tiles2.TilesViewResolver`. [Listing
    8-13](#Chapter08.html#list_8_13) shows the most basic configuration for tiles.


    ***Listing 8-13.** ViewConfiguration for Tiles*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// Other imports omitted`

    `import org.springframework.web.servlet.view.tiles2.TilesConfigurer;`

    `import org.springframework.web.servlet.view.tiles2.TilesViewResolver;`


    `@Configuration`

    `public class ViewConfiguration {`


    `    @Bean`

    `    public TilesConfigurer tilesConfigurer() {`

    `        return new TilesConfigurer();`

    `    }`


    `    @Bean`

    `    public TilesViewResolver tilesViewResolver() {`

    `        TilesViewResolver tilesViewResolver = new TilesViewResolver();`

    `        tilesViewResolver.setOrder(2);`

    `        return tilesViewResolver;`

    `    }`

    `}`


    _________


    ² [`http://tiles.apache.org/`](http://tiles.apache.org/)


    The `TilesConfigurer` by default loads a file called `tiles.xml` from the WEB-INF
    directory; this file contains the page definitions. Before we take a look at the
    definition file, let’s look at the properties of the configurer in [Table 8-6](#Chapter08.html#tab_8_6).


    ![Image](images/9781430241553_tab08-06.jpg)


    The `TilesViewResolver` has no additional properties to set; it has the same set
    of properties as the `UrlBasedViewResolver`. It is a convenience subclass that
    automatically configures the correct view type to return. For Tiles, we need to
    create instances of the `org.springframework.web.servlet.view.tiles2.TilesView`.'
