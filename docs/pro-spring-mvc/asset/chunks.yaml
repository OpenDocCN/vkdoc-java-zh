    RequestContextListener());` `}`  ### 基于角色的访问控制    基于角色的访问控制 (RBAC) 对于拥有大量用户且其日常工作中扮演的角色高度多样化的组织来说，是一种有益的访问控制模型。RBAC
    是专门为支持这种结构而建模的。你在 RBAC 中的角色实际上与你在组织中的角色相当；很可能与开发有关。权限是授予具有该角色的人的权利。    虽然这种详细程度通常只对较大的组织有意义，但其基本实现并不十分困难。正如我们将看到的，我们可以轻松地扩展我们的领域模型，以最小的努力支持基本的
    RBAC。    但为了澄清事实，对于像我们的书店这样简单的东西来说，这肯定是过度设计了。即使它成为一个受欢迎的商店，用户的多样性也会非常低；他们都将做几乎相同的事情。因此，我们不会真正从
    RBAC 系统中受益。但我们将演示它，只是为了展示 Spring Security 的可能性。    我们将支持的模型归结为图 13-12 中所示的关系。  ![Image](img/9781430241553_Fig13-12.jpg)  ***图
    13-12.** RBAC 模型*    一个用户（在我们的领域中称为“`Account`”）拥有一个或多个角色。一个角色可以拥有一个或多个权限。我们定义的角色将取决于我们的应用程序的重要性。角色可以被视为一组权限的全局化。    在我们的书店中，角色可能是“customer”或“administrator”，权限可能是“create
    order”或“add books”。权限通常比角色更细粒度。    我们决定在安全上下文中同时加载角色和权限。检查角色可能对粗粒度的检查有意义。例如；这个导航链接应该显示吗？这可能取决于给定用户是否拥有给定角色。但是，更深入地说，可能存在两个不同的角色授予对相同功能的访问权限。但在功能内部，只允许某些操作，具体取决于特定的权限。因此，在这里检查特定权限的存在对我们有益。正如我们将看到的，使用
    Spring Security，我们可以轻松地检查两者。    例如，假设一家公司有一个页面，显示员工享有的各种福利。这可能包含有关医疗计划、餐券或团体促销的信息。只有内部员工才允许访问此信息；承包商和其他类型的外部员工不享有此福利，应被排除在访问此信息之外。    因此，我们可以选择首先对角色进行粗粒度检查。这将阻止承包商甚至看到此信息的链接。但是，在页面本身内部，我们希望区分普通员工（只能读取/查询信息）和管理员（能够修改信息）。在这里，我们将继续检查实际的权限。作为员工，我们只有读取额外福利的权限，而管理员（同时也是员工）将拥有额外的*权限*来修改信息。    整个故事对于
    Spring Security 来说并不那么有趣。它只想知道一个“字符串”列表，你将使用它来检查是否存在。这个列表包含角色、权限还是外星人，并不重要。角色和权限的划分只是为了管理应用程序的人员，以便可以灵活地处理访问，而无需更改应用程序的代码。    角色或权限将被转换为
    Spring Security 的 `GrantedAuthorities`。我们的领域模型有特定的实体来支持这一点。首先是熟悉的 `Account` 实体，如清单
