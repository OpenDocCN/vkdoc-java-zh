- fmt: "# Flow Inheritance\n\nYou can enable a flow to inherit elements defined by\
    \ another flow or set of flows. You declare the inheritance by using the `parent`\
    \ attribute to mark each flow that has elements you want your flow to inherit\
    \ from. A common use case is for a parent flow to define global transitions and\
    \ exception handlers. The flow should be seen as merger between the parent and\
    \ the current (child) flow. Unlike with Java, you *can* inherit from multiple\
    \ parent flows. You simply separate each flow with a comma; the order is of no\
    \ importance (see [Listing 12-1](#Chapter12.html#list_12_1)).\n\n**Listing 12-1**\
    \ Flow Inheritance Allows a Flow to Have Multiple Parents\n\n```\n<flow parent=\"\
    global-initialization-flow, global-actions-flow\"/>\n```\n\n![Image](images/square.jpg)\
    \ **Tip** Suppose you have several flows that share a lot of common functionality.\
    \ In that case, you can move the common functionality out of the individual flows\
    \ and into a *parent flow*. You can then let each of the individual flows inherit\
    \ from that parent flow. However, if you define it as such, the parent flow will\
    \ be a normal flow like any other flow (it needs to have an id, be registered\
    \ with Web Flow, and so forth). This also means that you will be able to start\
    \ the parent flow because it is a separate flow. However, doing so doesn’t make\
    \ sense in this case because the parent flow must always be combined with one\
    \ of the child flows. It is the child flows that should be started, not the parent\
    \ flow they have in common. Note that you can declare the parent flow to be `abstract`.\
    \ This will tell Web Flow to disallow starting flow executions (either top level\
    \ or via subflows) for that flow. However, if extend from such a flow, the child\
    \ flow can be started normally as a top-level flow or subflow. You can do this\
    \ by setting the `abstract` attribute to `true` on the flow root element.\n\n\
    Web Flow will create a *merged* flow from the child flow and all its parent flows.\
    \ The rules for duplicate elements are split into *mergeable* and *non-mergeable*\
    \ elements. Mergeable elements will always attempt to merge together if the elements\
    \ are similar. Non-mergeable elements in a parent or child flow will always be\
    \ retained intact in the resulting flow; they will not be modified as part of\
    \ the merge process.\n\nMergeable elements are identified as mergeable when the\
    \ following conditions are met:\n\n- Their key attributes match: If they don’t\
    \ match, they fall into the non-mergeable category and are taken as-is in the\
    \ resulting merged flow. The key attribute is an element’s attribute that is identified\
    \ by Web Flow as the one used for mergeability matches. In other words, when the\
    \ same element type exists in both the parent and child flows, and the value of\
    \ this attribute matches, then the element is considered mergeable.\n- They are\
    \ marked as `merge always` (see [Table 12-1](#Chapter12.html#tab1)): In that case,\
    \ the mergeable elements are always merged, no matter what. In that case, there\
    \ is no *key* attribute that should match first.\n\nFor example, [Listing 12-2](#Chapter12.html#list_12_2)\
    \ shows an invented flow with a single `view` state that has two transitions.\
    \ Focusing on the inheritance aspect, it doesn’t matter which view the `view`\
    \ state renders, nor is it important to which states each of the transitions transition.\n\
    \n**Listing 12-2.** A Flow That Has a Single view State with Two Transitions\n\
    \n```\n<flow\n      xsi:schemaLocation=\"http://www.springframework.org/schema/webflow\n\
    \        http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd\"\
    >\n    <view-state id=\"someViewState\" view=\"someView\" >\n        <transition\
    \ on=\"x\" to=\"someState\"/>\n        <transition on=\"y\" to=\"someOtherState\"\
    />\n    </view-state>\n</flow>\n```\n\nIf we were to divide this over two flows,\
    \ such as a parent and child flow, it would look like what is shown in [Listings\
    \ 12-3](#Chapter12.html#list_12_3) and [12-4](#Chapter12.html#list_12_4).\n\n\
    **Listing 12-3.** The Parent Flow, which Contains One of the Two Transitions\n\
    \n```\n<flow\n      xsi:schemaLocation=\"http://www.springframework.org/schema/webflow\n\
    \        http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd\"\
    \n      abstract=\"true\">\n    <view-state id=\"someViewState\" view=\"someView\"\
    \ >\n        <transition on=\"x\" to=\"someState\"/>\n    </view-state>\n</flow>\n\
    ```\n\n**Listing 12-4** The Child Flow, which Contains the Other Transition and\
    \ Inherits from the Parent Flow\n\n```\n<flow\n      xsi:schemaLocation=\"http://www.springframework.org/schema/webflow\n\
    \        http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd\"\
    \n      parent=\"parent-flow\">\n    <view-state id=\"someViewState\" view=\"\
    someView\" >\n        <transition on=\"y\" to=\"someOtherState\"/>\n    </view-state>\n\
    </flow>\n```\n\nThe parent flow listed in [Listing 12-3](#Chapter12.html#list_12_3)\
    \ cannot be started directly because it is declared to be `abstract`. The child\
    \ flow listed in [Listing 12-4](#Chapter12.html#list_12_4) can be started directly.\
    \ Because the child flow inherits from a parent flow, Web Flow will scan for mergeable\
    \ elements. It will find that, in both the parent and child flows, a `view` state\
    \ with the id of `someViewState` exists. It will now merge the `view` state, combining\
    \ all elements inside. This results in a merged flow (see [Listing 12-5](#Chapter12.html#list_12_5))\
    \ that looks like the original flow.\n\n**Listing 12-5.** The Merged Flow\n\n\
    ```\n<flow\n      xsi:schemaLocation=\"http://www.springframework.org/schema/webflow\n\
    \        http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd\"\
    >\n    <view-state id=\"someViewState\" view=\"myView\" >\n        <transition\
    \ on=\"x\" to=\"someState\"/>\n        <transition on=\"y\" to=\"someOtherState\"\
    />\n    </view-state>\n</flow>\n```\n\nThis merged flow doesn’t exist physically;\
    \ rather, it is generated in memory when Web Flow starts and scans your flow definitions.\
    \ Physically, you only have the parent and child flows. In this case, the `view`\
    \ state was a mergeable element because it had the same id, which is the key attribute\
    \ for a `view` state on which Web Flow decides to merge the element. If the id\
    \ value were different, then Web Flow would have taken the element from the parent\
    \ flow as-is and copied and pasted it into the merged flow.\n\nIn [Table 12-1](#Chapter12.html#tab1),\
    \ you can see the different elements and their key attributes. If there is an\
    \ element in both the child and the parent flow that has the same key attribute,\
    \ then the element will be marked for merging. Otherwise, the element is taken\
    \ completely as-is into the merged flow. If an element has `Always merged` as\
    \ a key attribute, it means that no specific attribute must match, and elements\
    \ of the same type between parent and child are always merged.\n\n![Image](images/tab_12_1.jpg)\n\
    \n![Image](images/tab_12_1a.jpg)\n\nThe following are non-mergeable elements:\
    \ `bean-import`, `evaluate`, `exception-handler`, `persistence-context`, `render`,\
    \ `set`, and `var`. As explained before, they become part of the merged flow as-is,\
    \ and they are copied and pasted as a whole from the parent flow(s) into the merged\
    \ flow.\n\nAttributes on elements that are not marked as key attributes in [Table\
    \ 12-1](#Chapter12.html#tab1), and that are specified on the element in both the\
    \ parent and the child flows, will be overwritten by the child flow. For example,\
    \ consider the view attribute of a `<view-state>` element. When the parent contains\
    \ a `<view-state id=\"x\" view=\"a\">` and the child contains a `<view-state id=\"\
    x\" view=\"b\">`, then the element is eligible for merging because the `view`\
    \ state ids match. So, every sub-element will be inherited from the parent; but\
    \ in this case, the view attribute is defined both in the parent and child flows\
    \ with a different value. The resulting merged flow will navigate to view `\"\
    b\"` when the flow is rendered."
  raw: '#### Flow Inheritance


    You can enable a flow to inherit elements defined by another flow or set of flows.
    You declare the inheritance by using the `parent` attribute to mark each flow
    that has elements you want your flow to inherit from. A common use case is for
    a parent flow to define global transitions and exception handlers. The flow should
    be seen as merger between the parent and the current (child) flow. Unlike with
    Java, you *can* inherit from multiple parent flows. You simply separate each flow
    with a comma; the order is of no importance (see [Listing 12-1](#Chapter12.html#list_12_1)).


    ***Listing 12-1** Flow Inheritance Allows a Flow to Have Multiple Parents*


    `<flow parent="global-initialization-flow, global-actions-flow"/>`


    ![Image](images/square.jpg) **Tip** Suppose you have several flows that share
    a lot of common functionality. In that case, you can move the common functionality
    out of the individual flows and into a *parent flow*. You can then let each of
    the individual flows inherit from that parent flow. However, if you define it
    as such, the parent flow will be a normal flow like any other flow (it needs to
    have an id, be registered with Web Flow, and so forth). This also means that you
    will be able to start the parent flow because it is a separate flow. However,
    doing so doesn’t make sense in this case because the parent flow must always be
    combined with one of the child flows. It is the child flows that should be started,
    not the parent flow they have in common. Note that you can declare the parent
    flow to be `abstract`. This will tell Web Flow to disallow starting flow executions
    (either top level or via subflows) for that flow. However, if extend from such
    a flow, the child flow can be started normally as a top-level flow or subflow.
    You can do this by setting the `abstract` attribute to `true` on the flow root
    element.


    Web Flow will create a *merged* flow from the child flow and all its parent flows.
    The rules for duplicate elements are split into *mergeable* and *non-mergeable*
    elements. Mergeable elements will always attempt to merge together if the elements
    are similar. Non-mergeable elements in a parent or child flow will always be retained
    intact in the resulting flow; they will not be modified as part of the merge process.


    Mergeable elements are identified as mergeable when the following conditions are
    met:


    *   Their key attributes match: If they don’t match, they fall into the non-mergeable
    category and are taken as-is in the resulting merged flow. The key attribute is
    an element’s attribute that is identified by Web Flow as the one used for mergeability
    matches. In other words, when the same element type exists in both the parent
    and child flows, and the value of this attribute matches, then the element is
    considered mergeable.

    *   They are marked as `merge always` (see [Table 12-1](#Chapter12.html#tab1)):
    In that case, the mergeable elements are always merged, no matter what. In that
    case, there is no *key* attribute that should match first.


    For example, [Listing 12-2](#Chapter12.html#list_12_2) shows an invented flow
    with a single `view` state that has two transitions. Focusing on the inheritance
    aspect, it doesn’t matter which view the `view` state renders, nor is it important
    to which states each of the transitions transition.


    ***Listing 12-2.** A Flow That Has a Single view State with Two Transitions*


    `<flow`


    `      xsi:schemaLocation="http://www.springframework.org/schema/webflow`

    `        http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd">`


    `    <view-state id="someViewState" view="someView" >`

    `        <transition on="x" to="someState"/>`

    `        <transition on="y" to="someOtherState"/>`

    `    </view-state>`

    `</flow>`


    If we were to divide this over two flows, such as a parent and child flow, it
    would look like what is shown in [Listings 12-3](#Chapter12.html#list_12_3) and
    [12-4](#Chapter12.html#list_12_4).


    ***Listing 12-3.** The Parent Flow, which Contains One of the Two Transitions*


    `<flow`


    `      xsi:schemaLocation="http://www.springframework.org/schema/webflow`

    `        http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd"`

    **`abstract="true">`**


    `    <view-state id="someViewState" view="someView" >`

    `        <transition on="x" to="someState"/>`

    `    </view-state>`

    `</flow>`


    ***Listing 12-4** The Child Flow, which Contains the Other Transition and Inherits
    from the Parent Flow*


    `<flow`


    `      xsi:schemaLocation="http://www.springframework.org/schema/webflow`

    `        http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd"`

    **`parent="parent-flow"`**`>`


    `    <view-state id="someViewState" view="someView" >`

    `        <transition on="y" to="someOtherState"/>`

    `    </view-state>`

    `</flow>`


    The parent flow listed in [Listing 12-3](#Chapter12.html#list_12_3) cannot be
    started directly because it is declared to be `abstract`. The child flow listed
    in [Listing 12-4](#Chapter12.html#list_12_4) can be started directly. Because
    the child flow inherits from a parent flow, Web Flow will scan for mergeable elements.
    It will find that, in both the parent and child flows, a `view` state with the
    id of `someViewState` exists. It will now merge the `view` state, combining all
    elements inside. This results in a merged flow (see [Listing 12-5](#Chapter12.html#list_12_5))
    that looks like the original flow.


    ***Listing 12-5.** The Merged Flow*


    `<flow`


    `      xsi:schemaLocation="http://www.springframework.org/schema/webflow`

    `        http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd">`


    `    <view-state id="someViewState" view="myView" >`

    `        <transition on="x" to="someState"/>`

    `        <transition on="y" to="someOtherState"/>`

    `    </view-state>`

    `</flow>`


    This merged flow doesn’t exist physically; rather, it is generated in memory when
    Web Flow starts and scans your flow definitions. Physically, you only have the
    parent and child flows. In this case, the `view` state was a mergeable element
    because it had the same id, which is the key attribute for a `view` state on which
    Web Flow decides to merge the element. If the id value were different, then Web
    Flow would have taken the element from the parent flow as-is and copied and pasted
    it into the merged flow.


    In [Table 12-1](#Chapter12.html#tab1), you can see the different elements and
    their key attributes. If there is an element in both the child and the parent
    flow that has the same key attribute, then the element will be marked for merging.
    Otherwise, the element is taken completely as-is into the merged flow. If an element
    has `Always merged` as a key attribute, it means that no specific attribute must
    match, and elements of the same type between parent and child are always merged.


    ![Image](images/tab_12_1.jpg)


    ![Image](images/tab_12_1a.jpg)


    The following are non-mergeable elements: `bean-import`, `evaluate`, `exception-handler`,
    `persistence-context`, `render`, `set`, and `var`. As explained before, they become
    part of the merged flow as-is, and they are copied and pasted as a whole from
    the parent flow(s) into the merged flow.


    Attributes on elements that are not marked as key attributes in [Table 12-1](#Chapter12.html#tab1),
    and that are specified on the element in both the parent and the child flows,
    will be overwritten by the child flow. For example, consider the view attribute
    of a `<view-state>` element. When the parent contains a `<view-state id="x" view="a">`
    and the child contains a `<view-state id="x" view="b">,` then the element is eligible
    for merging because the `view` state ids match. So, every sub-element will be
    inherited from the parent; but in this case, the view attribute is defined both
    in the parent and child flows with a different value. The resulting merged flow
    will navigate to view `"b"` when the flow is rendered.'
