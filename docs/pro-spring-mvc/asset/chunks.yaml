    ### 数据绑定


    在本节中，我们将探讨使用数据绑定的好处和可能性，包括如何配置和扩展它。不过，我们首先会解释数据绑定的基础知识。清单 5-21 展示了我们的 `com.apress.prospringmvc.bookstore.domain.BookSearchCriteria`
    JavaBean。它是一个简单的对象，包含两个属性：`title` 和 `category`。


    ***清单 5-21.** BookSearchCriteria JavaBean*


    `package com.apress.prospringmvc.bookstore.domain;`


    `public class BookSearchCriteria {`


    `    private String title;`

    `    private Category category;`


    `    public String getTitle() {`

    `        return this.title;`

    `    }`


    `    public void setTitle(String title) {`

    `        this.title = title;`

    `    }`

    `    public void setCategory(Category category) {`

    `        this.category = category;`

    `    }`


    `    public Category getCategory() {`

    `        return this.category;`

    `    }`

    `}`


    假设我们收到以下请求：[`http://localhost:8080/chapter5-bookstore/book/search?title=Agile`](http://localhost:8080/chapter5-bookstore/book/search?title=Agile)。在这种情况下，`title`
    属性会接收值 `Agile`。在幕后，Spring 会调用我们 JavaBean 上的 `setTitle` 方法，该方法被指定为控制器中 `list` 方法的一个参数。如果请求中存在名为
    `category` 的参数，那么 Spring 会调用 `setCategory` 方法；不过，它会首先尝试将该参数（始终是 `String` 类型）转换为
    `com.apress.prospring.bookstore.domain.Category` JavaBean。


    然而，数据绑定并不仅限于简单的 setter 方法。我们还可以绑定到嵌套属性，甚至绑定到索引集合，如映射、数组和列表。当参数名包含*点号*（.）时，就会发生嵌套绑定；例如，`address.street=Somewhere`
    会导致调用 `getAddress().setStreet("Somewhere")`。


    要绑定到索引集合，我们必须使用方括号表示法，并在其中包含索引。当使用映射时，该索引不必是数字。例如，`list[2].name` 会将 name 属性绑定到列表中的第三个元素。类似地，`map[''foo''].name`
    会将 name 属性绑定到映射中键 `foo` 对应的值。


    #### 自定义数据绑定


    我们有两种方式来自定义数据绑定的行为：全局方式或每个控制器单独配置。当然，我们也可以将这两种策略结合起来：先进行全局设置，然后针对每个控制器进行微调。

