    \ Web Flow 在表单上绑定的。我们检索书籍并将其以指定的数量添加到选定书籍的 Map 中。\n\n另外，请注意此转换没有`to`属性。正如我们已经看到的，此属性是可选的。当未指定时，将再次渲染相同的视图状态。这正是我们想要的；在添加书籍之后；也就是说，我们希望停留在同一页面上，并向用户显示新书已添加到列表中。\n\
    \n一旦一些书籍被添加到列表中，用户可能想要重新开始，从而清除当前选定的书籍。[清单 10-23](#Chapter10.html#list_10_23)\
    \ 显示了转换，[清单 10-24](#Chapter10.html#list_10_24) 显示了清除列表的代码。\n\n***清单 10-23.** 清除选定书籍列表的转换*\n\
    \n```\n<transition on=\"reset\" to=\"selectBooks\">\n    <evaluate expression=\"\
