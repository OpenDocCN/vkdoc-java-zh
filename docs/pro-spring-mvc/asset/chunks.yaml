  trans: '

    ### 前提条件


    要构建示例应用程序，你需要安装 Java 开发工具包（JDK）；并且为了（独立）部署，你需要一个支持 Servlet 规范 3.0 版本的 Servlet
    容器（我们选择使用 Tomcat 7）。为了简化开发，你需要使用集成开发环境（IDE）；在本书中，我们（作者）选择使用 SpringSource Tool
    Suite（STS）。表 1-1 列出了编写本书时使用的产品和版本。所选产品的开发仍在继续，因此在你阅读本书时，可能会有更新的版本可用。不过，代码中没有任何内容不适用于或不能与软件的更新版本配合使用。


    ![Image](img/tab_1_1.jpg)


    #### Java 开发工具包


    第一个要素是 Java 开发工具包。JDK7 最近已发布；然而，JDK6 似乎仍然被更广泛地使用，尤其是在企业中。使用 JDK7 运行示例应用程序没有已知问题，因此那些想要“走在技术前沿”的人可以自由选择。那些希望获得最流畅体验的人应该选择
    JDK6。


    ![Image](img/square.jpg) **注意** 你可能已经安装了 Java 运行时环境；但是，你仍然需要 Java 开发版（JDK）。JRE
    仅用于运行 Java 应用程序，而 JDK 用于编译 Java 代码。


    #### Servlet 容器


    要运行 Java Web 应用程序，你需要一个 Web 容器。示例应用程序使用了 Servlet 3.0 特性；因此，你需要一个支持 Servlet 3.0
    的 Web 容器。Tomcat（[`http://tomcat.apache.org/`](http://tomcat.apache.org/)）是一个极好的选择，并且广泛应用于生产系统。示例文件中没有任何
    Tomcat 特定的内容，因此你可以自由使用 Jetty、JBoss、Glassfish 或任何其他现代 Web 容器或应用服务器。


    ![Image](img/square.jpg) **提示** STS 包含其自有的 Tomcat 版本，称为 *tc-server*（[`www.vmware.com/products/vfabric-tcserver/`](http://www.vmware.com/products/vfabric-tcserver/)）。这是一个基于
    Tomcat 构建的优秀产品，为开发和生产环境都提供了价值。


    #### 集成开发环境


    虽然 Spring 本身不需要特定的开发环境（除了 Java 开发工具包之外），但强烈建议熟悉一个好的 IDE。


    鉴于 Spring 在企业级 Java 开发中的普遍性，在主要的 IDE（如 Eclipse（[`www.eclipse.org`](http://www.eclipse.org)）和
    IntelliJ IDEA（[`www.jetbrains.com/idea/`](http://www.jetbrains.com/idea/)））中都可以找到对其出色的支持。SpringSource
    也投入了大量精力，提供了基于 Eclipse 的自有发行版，称为 SpringSource Tool Suite（STS）。虽然“原版”Eclipse 已经很出色，但在开发基于
    Spring 的应用程序时，STS 提供了更高层次的优化。


    ### 示例应用程序


    本节将深入探讨你将在本书中构建的示例应用程序。例如，你将了解为示例应用程序选择并使用的构建系统。接下来，你将学习如何将示例应用程序导入 STS，并迈出部署应用程序第一部分的第一步。


    示例应用程序的主要目的是展示 Spring MVC 的特性和可能性。虽然 Spring MVC 是 Spring 框架的一部分，但此应用程序并不旨在全面、深入地涵盖
    Spring 框架的所有特性。如果你想阅读并了解更多关于 Spring 框架的内容，我们建议查阅 *Pro Spring 3*（Apress，2012 年）。


    #### 一个书店示例应用程序


    将在本书中构建和使用的示例应用程序是一个简单的书店。你将学习如何添加搜索、显示和购买书籍的功能。要购买书籍，应用程序的用户需要在应用程序关联的书店拥有一个账户，因此还需要一些账户注册和登录页面。示例应用程序在本书中将基本保持不变。然而，在
    Spring Web Flow 章节中，你将看到一些重要的差异，这些差异主要是为了说明 Spring Web Flow 的某些功能。


    你可以在本书的源代码中找到示例应用程序的代码。请继续下载并解压它。请注意，顶层目录包含多个名为 `chapterX-bookstore` 的文件夹。随着你阅读本书的进度，你将不断向示例应用程序添加新功能。在某些情况下，你将重新审视前面章节的代码。为了简洁和清晰，作者决定将每章的进展分离到单独的项目中；要查看第
    X 章的相关代码，只需加载 `chapterX-bookstore` 文件夹中的项目即可。


    除了每章的目录外，你还可以找到两个在所有章节之间共享的项目（参见图 1-1）。这些项目名为 `bookstore-shared` 和 `bookstore-web-resources`，它们与所有项目共享。一个项目包含共享的业务层，而另一个项目包含图像、样式表和其他类似文件。


    ![Image](img/9781430241553_Fig01-01.jpg)


    ***图 1-1.** 书店组件概览*


    ![Image](img/square.jpg) **注意** `chapterX-bookstore` 中的项目包含第 X 章的解决方案。


    虽然这种方法确实有缺点，即需要你向 STS 加载许多项目（每章一个），但它也意味着你可以准确地看到应用程序的进展——如果你想自己解决第 7 章中的问题，那么复制第
    6 章的项目并开始工作，如果遇到困难，可以将第 7 章作为参考点。


    为方便起见，相关章节的示例应用程序的根目录（即本章的 `chapter1-bookstore`）将被称为 `SAMPLE_ROOT`。`SAMPLE_ROOT`
    显然会因章节而异。


    作者试图创建一个现实但简单的示例应用程序；为此，我们尝试使用当今的技术。例如，我们使用 JPA 2.0 作为持久层，并依赖 Hibernate 4.1 作为我们的具体实现。对于网页，主要使用的技术是
    Java 服务器页面（JSP）。关于 JSP 的全面教程不在本书的讨论范围之内；然而，有许多关于此主题的好书可用，例如 *Pro JSP 2*（Apress，2005
    年）。你还可以找到大量关于此技术的其他资源，包括 Oracle 自己的教程，网址为 [`http://download.oracle.com/javaee/5/tutorial/doc/bnagx.html`](http://download.oracle.com/javaee/5/tutorial/doc/bnagx.html)。


    ![Image](img/square.jpg) **注意** 细心的读者可能注意到了教程 URL 中的 JEE5 部分。JEE6 版本的教程涵盖了 JSF
    但没有涵盖 JSP；因此，这里引用了 JEE5 教程。

    '
- fmt: '#### The Build System


    The topic of how to build applications has been subject to decades of arguments,
    fanaticism, and downright stupidity. We could have taken the easy way out and
    avoided this discussion by building and deploying entirely with the SpringSource
    Tool Suite (`STS`), which we will discuss later in this chapter. However, the
    authors felt that was a disservice to you. `STS` is sufficient for managing a
    developer’s workflow, but it isn’t quite sufficient for the operational management
    aspects. Typically, an application is built using one mechanism (the IDE), while
    an entirely different mechanism is used to deploy it to production. This is often
    a source of frustration, and it leads to the wonderful “works on my machine” syndrome.


    With this in mind, our strong opinion is that it is the developer’s responsibility
    to ensure that an application works in an environment as close to production as
    possible, *including the build mechanism itself!* You will see how sophisticated
    build tools make that possible. The build tool you are going to use in this book
    is Gradle (`http://gradle.org`). This is a fairly new but up-and-coming *project-automation*
    tool (project automation is a fancy term for *build tool*) that has a strong pedigree
    and has already established a very good reputation. A full discussion on build
    tools is outside the scope of this book; however, suffice it to say that Gradle
    combines the power of Maven’s “configuration over convention” approach with the
    succinctness of Groovy.


    ![Image](images/square.jpg) **Note** The Gradle project won the 2010 Springy Award
    for Most Innovative Product/Project^([1](#Chapter01.html#CHP-1-FN-1)) and was
    a finalist in the 2011 JAX Innovation Awards election.


    ____________


    ¹ [`http://www.springsource.org/node/2871`](http://www.springsource.org/node/2871)


    The Gradle infrastructure is driven by a `build.gradle` script (this is somewhat
    equivalent to Maven’s `pom.xml`) and an optional `settings.gradle` file; both
    can be found in the `SAMPLE_ROOT` directory.


    ![Image](images/square.jpg) **Tip** If you prefer to use Maven, please note that
    Gradle is perfectly capable of generating Maven POMs (project object models).
    For more information, read “Maven POM generation” at [`http://gradle.org/maven_plugin.html`](http://gradle.org/maven_plugin.html).


    ##### Dependency Management


    Java’s strength is its ecosystem. The wealth of high quality libraries is the
    currency used to pay for the language’s verbosity and pain. However, its greatest
    strength is, as ever, its greatest weakness: it isn’t unusual for small-to-medium
    projects to have a dependency graph of more than 50 libraries. This proliferation
    of libraries is made worse by the correct use of modularization!


    The problem with the dependencies is that the dependencies also have dependencies,
    which also have dependencies, which also... Well, you probably get the point.
    There are direct dependencies (dependencies for the project) and transitive dependencies
    (dependencies needed by the direct dependencies). However, that isn’t the only
    problem because there is also something that could be called *versioning hell*.
    If there are multiple dependencies and these dependencies have a dependency on
    both library x and on different versions of that library, this presents an additional
    challenge. But, wait, there’s more! You don’t want to sit at your computer and
    Google for all the missing (transitive) dependencies, download them, redeploy
    your application, and *then* notice you have still another missing dependency
    (or maybe the wrong version of a dependency).


    Dependency management helps you out here. For example, it helps you with downloading
    and discovering what you need, and it tries to resolve all of the versioning conflicts.
    In this case, you can let the computer do the hard work for you, and you can focus
    at the task at hand, which is solving the business problem—selling books, in this
    book’s example (not searching for dependencies late into the night).


    ![Image](images/square.jpg) **Note** Gradle’s dependency management infrastructure
    is compatible with the somewhat industry-standard Maven repositories—and it has
    excellent support for resolving dependencies.


    ##### The Gradle Build File


    Gradle is more than a dependency-management tool, as already mentioned. It is
    also a build tool; and, as such, it can do a lot for you. For example, if you
    open the `build.gradle` file, you’ll see the dependencies needed by all the subprojects.
    Gradle can also help you build (compile, test, and create a war archive) your
    application, and the Groovy language can be used to easily modify or influence
    the way you build your application. To help build the application, there is a
    plugin that can deploy the application to an embedded Tomcat instance. This instance
    can, in turn, be used to run the integration tests (see [Chapter 9](#Chapter09.html#ch9)).


    These functions are just the beginning of what Gradle can provide. If you are
    interested in more complex builds, try reading the Gradle reference guide^([2](#Chapter01.html#CHP-1-FN-2))
    or taking a look at the Gradle build^([3](#Chapter01.html#CHP-1-FN-3)) as used
    by the Spring Framework^([4](#Chapter01.html#CHP-1-FN-4)) (yes, even SpringSource
    uses Gradle).


    #### Building the Sample Application


    To build the sample, cd into the `SAMPLE_ROOT` directory and execute the `gradlew`
    script. Assuming you are on Unix system, this will look something like [Figure
