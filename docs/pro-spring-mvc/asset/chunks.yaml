    ##### 应用上下文


    `org.springframework.web.servlet.DispatcherServlet` 需要一个 `org.springframework.web.context.WebApplicationContext`
    来使用所需的组件进行自我配置。你可以让 Servlet 自行构建一个，或者使用构造函数传入一个应用上下文。在基于 XML 的配置文件中，使用的是第一种方式（因为无法构建应用上下文）。在基于
    Java 的配置中，则使用第二种方式。


    在示例应用中，`com.apress.prospringmvc.bookstore.web.BookstoreWebApplicationInitializer`
    是引导应用程序的类。要启用基于 Java 的配置，你需要指示 Servlet 使用基于 Java 的应用上下文（默认是基于 XML 的），并将配置类传递给它。你将使用
    `org.springframework.web.context.support.AnnotationConfigWebApplicationContext`
    类来设置应用程序并配置 Servlet。更改部分在代码清单 4-5 中以粗体突出显示。


    ***代码清单 4-5.** 带有 ApplicationContext 的 BookstoreWebApplicationInitializer*


    `package com.apress.prospringmvc.bookstore.web;`


    `// javax.servlet 导入已省略。`


    `import org.springframework.web.WebApplicationInitializer;`

    `import org.springframework.web.context.WebApplicationContext;`

    `import org.springframework.web.context.support`

    `       .AnnotationConfigWebApplicationContext;`

    `import org.springframework.web.servlet.DispatcherServlet;`


    `import com.apress.prospringmvc.bookstore.web.config.WebMvcContextConfiguration;`


    `public class BookstoreWebApplicationInitializer`![Image](img/U002.jpg)

    ` implements WebApplicationInitializer {`


    `  @Override`

    `  public void onStartup(final ServletContext servletContext)`

    `  throws ServletException {`

    `      registerDispatcherServlet(servletContext);`

    `    }`


    `  private void registerDispatcherServlet(final ServletContext servletContext)
    {`

    **`      WebApplicationContext dispatcherContext = createContext`![Image](img/U002.jpg)**

    **`(WebMvcContextConfiguration.class);`**

    **`      DispatcherServlet dispatcherServlet = new DispatcherServlet(dispatcherContext);`**

    `      ServletRegistration.Dynamic dispatcher;`

    `      dispatcher = servletContext.addServlet("dispatcher", dispatcherServlet);`

    `      dispatcher.setLoadOnStartup(1);`

    `      dispatcher.addMapping("/");`

    `  }`


    **`  private WebApplicationContext createContext(final Class<?>... annotatedClasses)
    {`**

    **`      AnnotationConfigWebApplicationContext context`**

    **`      context = new AnnotationConfigWebApplicationContext();`**

    **`      context.register(annotatedClasses);`**

    **`      return context;`**

    **`  }`**

    **`}`**


    代码清单 4-5 展示了如何构造 `org.springframework.web.servlet.DispatcherServlet` 并为其传入一个应用上下文。这是配置
    Servlet 最基本的方式。


    第 2 章 介绍了配置文件（profile）的概念。要选择一个配置文件，你可以包含一个 Servlet 初始化参数（参见第 2 章）；然而，为了更动态化，你可以使用
    `org.springframework.context.ApplicationContextInitializer`。此类初始化器用于在应用上下文加载所有
    bean 之前对其进行初始化。


    这在 Web 应用中非常有用，当你想要配置或设置要使用的配置文件时（更多信息请再次参见第 2 章）。例如，你可能需要设置一个自定义的系统属性。或者，你可以通过读取文件系统中的某个文件来检测配置文件，甚至可以根据操作系统来选择配置文件。你拥有几乎无限的选择。


    在附录 A 中，你将学习如何将应用程序部署到 CloudFoundry。CloudFoundry 也提供了一个包含 `ApplicationContextInitializer`
    的 API。该实现会检测到它正在云上运行，并激活一个名为 `cloud` 的配置文件（参见代码清单 4-6）。


    ***代码清单 4-6.** CloudApplicationContextInitializer*


    `package org.cloudfoundry.reconfiguration.spring;`


    `// 其他导入已省略`


    `import org.cloudfoundry.runtime.env.CloudEnvironment;`

    `import org.springframework.context.ApplicationContextInitializer;`

    `import org.springframework.context.ConfigurableApplicationContext;`

    `import org.springframework.core.Ordered;`

    `import org.springframework.core.env.ConfigurableEnvironment;`

    `import org.springframework.core.env.EnumerablePropertySource;`

    `import org.springframework.core.env.PropertiesPropertySource;`

    `import org.springframework.core.env.PropertySource;`


    `public final class CloudApplicationContextInitializer`

    `implements ApplicationContextInitializer<ConfigurableApplicationContext>,`

    `           Ordered {`


    `    private static final Log logger =`

    `            LogFactory.getLog(CloudApplicationContextInitializer.class);`


    `    private static final int DEFAULT_ORDER = 0;`


    `    private ConfigurableEnvironment springEnvironment;`

    `    private CloudEnvironment cloudFoundryEnvironment;`


    `    public CloudApplicationContextInitializer() {`

    `        cloudFoundryEnvironment = new CloudEnvironment();`

    `    }`


    `    @Override`

    `    public void initialize(ConfigurableApplicationContext applicationContext)
    {`

    `        if (!cloudFoundryEnvironment.isCloudFoundry()) {`

    `            logger.info("未在 Cloud Foundry 上运行。")`

    `            return;`

    `        }`

    `        try {`

    `            logger.info("正在为 Cloud Foundry 初始化 Spring 环境");`

    `            springEnvironment = applicationContext.getEnvironment();`

    `            addPropertySource(buildPropertySource());`

    **`            addActiveProfile("cloud");`**

    `        } catch (Throwable t) {`

    *`// 确保安全`*

    `            logger.error("初始化时出现意外异常: "`

    `                         + t.getMessage(), t);`

    `        }`

    `    }`

    `    // 其他方法已省略`

    `}`


    ##### 组件解析


    当 Servlet 配置完成后，它将从 Servlet 容器接收一个初始化请求。当 Servlet 初始化时，它会使用如图 4-9 所示的逻辑来检测所需的组件。某些组件按类型检测，而其他组件则按名称检测。对于可按类型检测的组件，你可以指定（参见表
    4-2）不希望这样做。在这种情况下，组件将通过一个众所周知的名称来检测。表 4-3 列出了参与请求处理的不同组件以及用于检测它们的 bean 名称。该表还指出了
    Dispatcher Servlet 是否自动检测多个实例（当“是”可以被禁用时，则按表中指定的名称检测单个 bean）。


    ![Image](img/9781430241553_Fig04-09.jpg)


    ***图 4-9.** DispatcherServlet 的组件发现过程*


    ![Image](img/tab_4_3.jpg)


    ##### Dispatcher Servlet 的默认配置


    你可能会觉得处理请求所涉及的所有组件有点让人不知所措。你甚至可能想知道是否需要显式配置所有这些组件。幸运的是，Spring MVC 有一些合理的默认值，在很多情况下，这些默认值已经足够——或者至少足以让你入门。正如你在表
    4-4 中所见，Dispatcher Servlet 有相当多的默认设置。你可以在下一节中找到关于不同实现的更多信息。


    ![Image](img/tab_4_4.jpg)


    ![Image](img/tab_4_4a.jpg)

