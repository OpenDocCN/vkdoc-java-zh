  raw: '## Resolving and Implementing Views


    So far we have mainly used Java Server Pages (JSP) as our view technology; however,
    Spring MVC provides a very powerful and flexible mechanism to resolve and implement
    views. We looked briefly at the view resolving mechanism in [Chapter 4](#Chapter04.html#ch4);
    in this chapter we will take a closer look at the different `ViewResolver` implementations
    and see how we can create and use our own implementation.


    We will also see which view technologies are supported by Spring MVC out-of-the-box,
    and we will create some custom implementations. Before we dive into the internals,
    however, let’s recap the view rendering process and API.


    ### View Resolvers and Views


    In [Chapter 4](#Chapter04.html#ch4) we discussed the request processing workflow
    of the dispatcher servlet. Resolving and rendering a view is part of that process.
    In [Figure 8-1](#Chapter08.html#fig_8_1) you can see the view rendering process
    (see the section “Render View” in [Chapter 4](#Chapter04.html#ch4) for a description).


    ![Image](images/9781430241553_Fig08-01.jpg)


    ***Figure 8-1.** View rendering process*


    The controller can return an `org.springframework.web.servlet.View` implementation
    or a reference to a view (view name). In the latter case the `ViewResolver`s configured
    are consulted to translate the reference into a concrete implementation. When
    an implementation is available it will be instructed to render; otherwise, a `javax.servlet.ServletException`
    is thrown.


    The `ViewResolver` (see [Listing 8-1](#Chapter08.html#list_8_1)) has only a single
    method that is used to resolve to a `View`.


    ***Listing 8-1.** ViewResolver API*


    `package org.springframework.web.servlet;`


    `import java.util.Locale;`


    `public interface ViewResolver {`


    `    View resolveViewName(String viewName, Locale locale) throws Exception;`


    `}`


    When a view has been selected, the dispatcher servlet will call the `render` method
    (see [Listing 8-2](#Chapter08.html#list_8_2)) on the view instance. The `getContentType`
    method is used to determine the type of content. This value is used to set the
    content type on the response; it is also used by the `org.springframework.web.servlet.view.ContentNegotiatingViewResolver`
    to determine the best matching view (see the upcoming section about this view
    resolver for more information).


    ***Listing 8-2.** View API*


    `package org.springframework.web.servlet;`


    `import java.util.Map;`


    `import javax.servlet.http.HttpServletRequest;`

    `import javax.servlet.http.HttpServletResponse;`


    `public interface View {`


    `    String getContentType();`


    `    void render(Map<String, ?> model,`

    `                HttpServletRequest request,`

    `                HttpServletResponse response) throws Exception;`


    `}`


    ### View Resolvers


    In [Chapter 4](#Chapter04.html#ch4) we showed the hierarchy for the different
    `ViewResolver` implementations. Let’s take a closer look at the generic usable
    implementations, how they work, and how they can be configured. [Figure 8-2](#Chapter08.html#fig_8_2)
    shows the different implementations again. The implementations specific to particular
    view technologies are explained in the “View Technologies” section. [


    ![Image](images/9781430241553_Fig08-02.jpg)


    ***Figure 8-2.** ViewResolver hierarchy*


    #### BeanNameViewResolver


    The `org.springframework.web.servlet.view.BeanNameViewResolver` is the most basic
    implementation available and one of the default ones configured. It takes the
    name of the view and looks in the `org.springframework.context.ApplicationContext`
    to see if there is a `View` with that name. If there is, the resolver will return
    it; otherwise, it returns `null`. This view resolver is useful in small(er) applications;
    however, it has one big drawback in that each view needs to be configured in the
    application context. It has a single property that can be configured, and that
    is the order in which it is being called (see [Table 8-1](#Chapter08.html#tab_8_1)).


    ![Image](images/9781430241553_tab08-01.jpg)


    In [Listing 8-3](#Chapter08.html#list_8_3), you can see how and what we would
    need to configure to have our index page served and resolved by this view resolver.
    We have explicitly configured the `BeanNameViewResolver;` this is only needed
    if the defaults of the dispatcher servlet don’t suffice. We also need to add a
    `View` instance, and as we are using a JSP with JSTL support, we are returning
    an `org.springframework.web.servlet.view.JstlView`.


    ***Listing 8-3.** BeanNameViewResolver configuration*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// Other imports omitted`

    `import org.springframework.web.servlet.view.BeanNameViewResolver;`

    `import org.springframework.web.servlet.view.JstlView;`


    `@Configuration`

    `public class ViewConfiguration {`


    `    @Bean`

    `    public ViewResolver viewResolver() {`

    `        BeanNameViewResolver viewResolver = new BeanNameViewResolver();`

    `        viewResolver.setOrder(1);`

    `        return viewResolver;`

    `    }`


    `    @Bean`

    `    public View index() {`

    `        JstlView view = new JstlView();`

    `        view.setUrl("/WEB-INF/views/index.jsp");`

    `        return view;`

    `    }`

    `}`


    #### XmlViewResolver


    The `org.springframework.web.servlet.view.XmlViewResolver` is very similar to
    the `BeanNameViewResolver` with the difference that it requires an additional
    Spring XML configuration file to hold all the views. By default it will load the
    file named `/WEB-INF/views.xml`; however, this can be configured. [Table 8-2](#Chapter08.html#tab_8_2)
    shows the available properties.


    ![Image](images/9781430241553_tab08-02.jpg)


    [Listing 8-4](#Chapter08.html#list_8_4) shows the configuration for the `XmlViewResolver`.
    [Listing 8-5](#Chapter08.html#list_8_5) shows the `/WEB-INF/views.xml` file used
    to configure the view for the index page.


    ***Listing 8-4.** XmlViewResolver configuration*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `//Other imports omitted`

    `import org.springframework.web.servlet.view.XmlViewResolver;`


    `@Configuration`

    `public class ViewConfiguration {`


    `    @Bean`

    `    public ViewResolver viewResolver() {`

    `        XmlViewResolver viewResolver = new XmlViewResolver();`

    `        viewResolver.setOrder(1);`

    `        return viewResolver;`

    `    }`

    `}`


    ***Listing 8-5.** Sample views.xml*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<beans`


    `    xsi:schemaLocation="http://www.springframework.org/schema/beans`

    `       http://www.springframework.org/schema/beans/spring-beans.xsd">`


    `    <bean id="index" class="org.springframework.web.servlet.view.JstlView">`

    `        <property name="url" value="/WEB-INF/views/index.jsp"/>`

    `    </bean>`

    `</beans>`'
