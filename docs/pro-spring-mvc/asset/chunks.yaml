    `    <filter-class>` `        org.springframework.web.filter.DelegatingFilterProxy`
    `    </filter-class>` `</filter>`  `<filter-mapping>` `    <filter-name>springSecurityFilterChain</filter-name>`
    `    <url-pattern>/*</url-pattern>` `</filter-mapping>`  我们可以在清单 A-4 中看到我们在 `contextConfigLocation`
    中指定的 `spring/context.xml`。    ***清单 A-4.** context.xml 文件*  `<?xml version="1.0"
    encoding="UTF-8"?>` `<beans`   `       xsi:schemaLocation="` `         http://www.springframework.org/schema/beans`
