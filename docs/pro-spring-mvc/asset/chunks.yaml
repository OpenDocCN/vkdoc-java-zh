    This implementation requires explicit configuration, as opposed to the `org.springframework.web.servlet.handler.BeanNameUrlHandlerMapping`,
    and it doesn’t autodetect mappings. [Listing 4-9](#Chapter04.html#list_4_9) shows
    a sample configuration. Again, you map the controller to the `/index.htm`.


    ***Listing 4-9.** The SimpleUrlHandlerMapping sample configuration*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// Other imports omitted see Listing 4-8`


    `import org.springframework.web.servlet.HandlerMapping;`

    `import org.springframework.web.servlet.handler.SimpleUrlHandlerMapping;`


    `@Configuration`

    `public class WebMvcContextConfiguration {`


    `    @Bean`

    `    public IndexController indexController() {`

    `        return new IndexController();`

    `    }`


    `    @Bean`

    `    public HandlerMapping simpleUrlHandlerMapping() {`

    `        SimpleUrlHandlerMapping urlMapping = new SimpleUrlHandlerMapping();`

    `        Properties mappings = new Properties();`

    **`        mappings.put("/index.htm", "indexController");`**

    `        urlMapping.setMappings(mappings);`

    `        return urlMapping;`

    `    }`

    `}`


    You need to explicitly configure the `SimpleUrlHandlerMapping` and pass it the
    mappings (see the code in bold). You map the `/index.htm` URL to the controller
    named `indexController`. If you have a lot of controllers, this configuration
    grows considerably. The advantage of this approach is that you have all your mapping
    in a single location.


    ##### ControllerBeanNameHandlerMapping


    This implementation works similarly to the `org.springframework.web.servlet.handler
    .BeanNameUrlHandlerMapping`, with one big difference: it doesn’t require the bean
    name to start with a /. This mapping detects all controllers in the application
    context, takes their names, and prefixes them with a /. Optionally, it can also
    apply a suffix to the generated URL mapping. [Listing 4-10](#Chapter04.html#list_4_10)
    shows how to map the controller to `/index.htm` using this handler mapping.


    ***Listing 4-10.** The ControllerBeanNameHandlerMapping sample configuration*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// Other imports omitted see Listing 4-8`


    `import org.springframework.web.servlet.HandlerMapping;`

    `import org.springframework.web.servlet.mvc.support.ControllerBeanNameHandlerMapping;`


    `@Configuration`

    `public class WebMvcContextConfiguration {`


    **`  @Bean(name = "index")`**

    `  public IndexController indexController() {`

    `      return new IndexController();`

    `  }`


    `  @Bean`

    `  public HandlerMapping controllerBeanNameHandlerMapping() {`

    `      ControllerBeanNameHandlerMapping mapping;`

    `      mapping = new ControllerBeanNameHandlerMapping();`

    **`      mapping.setUrlSuffix(".htm");`**

    `      return mapping;`

    `  }`

    `}`


    ##### ControllerClassNameHandlerMapping


    This implementation detects all controllers in the application context, and it
    uses the simple name of the class to create URL mappings. For the `com.apress.prospringmvc.bookstore.web.IndexController`,
    it would create a URL of `/index`. It takes the simple name of the class, strips
    the controller part, and makes the remainder lowercase (unless configured otherwise).
    [Listing 4-11](#Chapter04.html#list_4_11) shows a sample configuration of this
    implementation, and it will map the controller to the `/index` URL. This mapping
    implementation doesn’t support suffixes (e.g., `.htm`).


    ***Listing 4-11.** The ControllerClassNameHandlerMapping sample configuration*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// Other imports omitted see Listing 4-8`


    `import org.springframework.web.servlet.HandlerMapping;`

    `import org.springframework.web.servlet.mvc.support.ControllerClassNameHandlerMapping;`


    `@Configuration`

    `public class WebMvcContextConfiguration {`


    `    @Bean`

    `    public IndexController indexController() {`

    `        return new IndexController();`

    `    }`


    `    @Bean`

    `    public HandlerMapping controllerClassNameHandlerMapping() {`

    `        return new ControllerClassNameHandlerMapping();`

    `    }`

    `}`


    This mapping implementation can be very convenient if you have some naming conventions
    in your controllers, and they are directly mapped to URLs. This approach can save
    a lot of configuration.


    ##### DefaultAnnotationHandlerMapping and RequestMappingHandlerMapping


    The DefaultAnnotationHandlerMapping and RequestMappingHandlerMapping implementations
    are the more sophisticated implementations. Both are very powerful, and both use
    annotations to detect mappings. Also, both detect the `org.springframework.web.bind.annotation.RequestMapping`
    annotation on request-handling beans in the application context. This annotation
    can be on either the class and/or the method level. To map the `com.apress.prospringmvc.bookstore.web.IndexController`
    to `/index.htm`, you need to add the annotation. [Listing 4-12](#Chapter04.html#list_4_12)
    is the controller, and [Listing 4-13](#Chapter04.html#list_4_13) shows the sample
    configuration.


    ***Listing 4-12.** The IndexController with RequestMapping*


    `package com.apress.prospringmvc.bookstore.web;`


    `import org.springframework.stereotype.Controller;`

    `import org.springframework.web.bind.annotation.RequestMapping;`

    `import org.springframework.web.servlet.ModelAndView;`


    `@Controller`

    `public class IndexController {`


    `    @RequestMapping(value = "/index.htm")`

    `    public ModelAndView indexPage() {`

    `        return new ModelAndView("/WEB-INF/views/index.jsp");`

    `    }`

    `}`


    ***Listing 4-13.** An annotation-based sample configuration*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// Other imports omitted see Listing 4-8`


    `@Configuration`

    `public class WebMvcContextConfiguration {`


    `    @Bean`

    `    public IndexController indexController() {`

    `        return new IndexController();`

    `    }`

    `}`


    The `DefaultAnnotationHandlerMapping` is one of the default mappings registered
    by the dispatcher servlet. If you want to use the `RequestMappingHandlerMapping,`
    you need to explicitly configure it or use the `org.springframework.web.servlet.config.annotation.EnableWebMvc`
    annotation. The `RequestMappingHandlerMapping` implementation is more powerful
    and flexible than the default, registered one, and it allows for more flexible
    configuration and mapping methods. The extensibility and flexibility of this approach
    are covered in [Chapter 6](#Chapter06.html#ch6).'
