    传输安全    目前，我们的安全设置中仍然存在一个主要的安全漏洞。当我们的用户登录时，他们提供用户名和密码凭据，这些凭据将由 Spring Security
    进行认证。然而，这些凭据是通过浏览器使用 HTTP（一种纯文本协议）发送到 Web 服务器的。任何捕获数据的人都能够以明文形式看到用户名和密码。为了说明这一点，我们启动了
    Wireshark**^(11)** 并让它监听环回适配器。接下来，我们在应用程序中执行了一次登录，图 13-5 显示了结果。  ![Image](img/9781430241553_Fig13-05.jpg)  ***图
    13-5.** HTTP 会话的网络捕获，显示通过表单登录时明文凭据*    这看起来非常不安全。为了改变这种行为，我们将在用户登录时切换到 SSL（安全套接字层，现在称为
    TLS，即传输层安全，是其继任者，但为了保持一致，我们将其称为 SSL）。从那时起，所有内容都将通过 SSL 提供。    在继续之前，你必须准备你的 tomcat
    或 tomcat STS 实例，以添加一个额外的 SSL 连接器。深入探讨 SSL 协议或 PKI（公钥基础设施）的内部原理超出了本书的范围，但为了使其工作，你需要为
    tomcat 提供一个密钥库，其中包含一个私钥/公钥对以及该公钥的证书。通常，证书部分由第三方证书颁发机构 (CA) 生成。幸运的是，你可以自签名这样的证书，这对于测试或封闭的生产环境来说是理想的。    作为一个小插曲，我们想分享一些关于自签名证书的内容，因为有时人们对它们存在误解。使用自签名证书的
    PKI 与使用官方 CA 签名证书具有完全相同的加密级别。因此，你的 SSL 不会更不安全；加密强度、过程以及所有依赖它们的东西都提供完全相同的保证。    __________    ¹¹
    [`http://www.wireshark.org/`](http://www.wireshark.org/)    区别在于信任。使用自签名证书，你的用户必须显式接受该证书，并且浏览器会给他们一个警告，提示无法验证身份。如何呈现取决于浏览器，但使用
    Safari，他们会看到如图 13-6 所示的页面。  ![Image](img/9781430241553_Fig13-06.jpg)  ***图 13-6.**
    浏览器确认信任我们的自签名证书*    为了仅信任当前会话的证书，你可以单击“继续”。如果你想信任未来会话的证书，则必须单击“显示证书”。这样做将显示如图
    13-7 所示的对话框。如果你随后选中“连接到 localhost 时始终信任 Bookstore”，该证书将被存储。  ![Image](img/9781430241553_Fig13-07.jpg)  ***图
    13-7.** 接受自签名证书*    单击“继续”后，该证书将被信任（仅限此会话或未来会话，具体取决于你是否在图 13-7 中选中了复选框），你将能够通过
    SSL 继续。很明显，这种信任仅适用于内部测试。    对于真正的 CA 签名证书，CA 在真正颁发证书之前已经向证书持有者索取了凭据。例如，我们永远无法从授权的
    CA 获得 google.com 的服务器证书，因为我们无法证明我们拥有该域或对其有任何授权。    客户端的浏览器信任库（其中包含授权根 CA 的列表）默认也不会信任我们的自签名证书，因为它无法由任何已知且受信任的
    CA 验证。我必须显式地接受其信任。    因此，对于生产网站，自签名证书将是一个坏主意，因为用户无法验证证书背后的身份是否真的是它所声称的（你的服务器）；没有第三方验证身份并给予任何批准。但是，如果你在有限的用户集（封闭生产）之间发送数据，并且各方相互信任，那么向各方发送自签名证书是完全可行的。每一方都知道你的身份（你亲自通过
    U 盘提供，或从你的个人帐户通过电子邮件发送）是与该证书相关联的身份（身份可以是个人、服务器、域或任何东西）。这样，你可以轻松节省由 CA 签署公钥的成本。    要生成自签名证书，我们可以使用一个名为
    `keytool` 的 Java 工具。要使用它，请执行以下步骤：    > 1.  打开命令行提示符并输入以下命令（确保 JDK 在你的路径上可用）：`keytool
