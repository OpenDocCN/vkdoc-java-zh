  raw: 'The second parameter of the `addMappingForUrlPatterns` (namely `isMatchAfter`)
    declares the order if multiple filters match the same URL pattern (or the same
    Servlet); its value can be `true` or `false`. In that case filters are normally
    applied in the order they appear in the `web.xml` or when working via the API
    (as we do) in the order in which they are added in the code. If you supply `true`
    for `isMatchAfter,` the filter will be invoked last in the chain of filters that
    match for that given URL pattern (or Servlet). If multiple filters match for that
    same URL pattern (or Servlet) and also have set this flag to `true`, the order
    in which they are defined is used (but they will still match after all other filters).
    If this flag is set to `false`, the inverse happens, and the filter will be invoked
    before invoking other filters that map to the same URL (or Servlet). Since we
    are in control of all filters we register, we can change the order ourselves simply
    by altering the order in which we register them. So there is no need to think
    about this attribute, and we choose a value (false in this case) which we use
    for every other filter registration. In this case the order in which they are
    defined will determine the order in which they are invoked.


    ![Image](images/square.jpg) **Note** There seems to be an issue with Tomcat (7.0.26
    at the time of writing), where this flag seems to be interpreted the other way
    around. So if you declare a `Filter` to be `isMatchAfter` equal to true, it will
    match before all other filters for the same URL pattern (or Servlet). We have
    posted a message on the Apache Tomcat development mailing list^([2](#Chapter13.html#CHP-13-FN-2))
    for this.


    Now that we have seen how all requests are captured by a filter, we will see how
    the requests end up in the Spring Security machinery. As the class name of the
    configured filter (**`Delegating`**`FilterProxy`) implies, it is clear that it
    will delegate incoming requests to somewhere. That “somewhere” is the core of
    Spring Security and is configured in our Spring configuration.


    We created a separate spring configuration file for this, called `spring-security.xml`,
    located in `src/main/resources/spring/`. This piece of configuration will configure
    the “Spring Main Security Configuration” as illustrated in [Figure 13-2](#Chapter13.html#fig_13_2).


    To do this we first need to configure the Spring Security namespace that will
    contain all the artifacts we need to set up the main configuration (see [Listing
    13-3](#Chapter13.html#list_13_3)).


    ***Listing 13-3.** The xml header of the Spring security configuration file*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<beans`'
