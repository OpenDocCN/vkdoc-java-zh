    ```\n\n### 配置Tiles\n\n对于`selectBooks`视图，我们简单地使用了[清单12-20](#Chapter12.html#list_12_20)所示的配置。\n\
    \n**清单12-20** `selectBooks.jsp`当前的Tiles配置\n\n```\n<definition name=\"selectBooks\"\
    \ extends=\"fullTemplate\">\n<put-attribute name=\"content\" value=\"/WEB-INF/view/createOrders/selectBooks.jsp\"\
    />\n</definition>\n```\n\n这段代码告诉Tiles，它应该渲染完整的模板，并用`selectBooks.jsp`视图替换Tiles占位符的内容。我们现在想要扩展这一点，因为`selectBooks`此时本身也是一个模板。\n\
    \n让我们先创建一个新模板，将`selectBooks`标识为模板。该模板将被包含在原始的`selectBooks`定义中。为了说明这一点，我们给它一个*内部*名称：`show.selected.books`。如[清单12-21](#Chapter12.html#list_12_21)所示，该定义以`selectBooks`视图为模板，并指示它用新创建的视图`/WEB-INF/view/createOrders/showSelectedBooks.jsp`替换`selectedBooks`的Tiles占位符。\n\
    \n**清单12-21** 以`selectBooks.jsp`为模板的`showSelectedBooks.jsp`的新Tiles定义\n\n```\n\
    <definition name=\"show.selected.books\"\ntemplate=\"/WEB-INF/view/createOrders/selectBooks.jsp\"\
    >\n    <put-attribute name=\"selectedBooks\"\n     value=\"/WEB-INF/view/createOrders/showSelectedBooks.jsp\"\
    />\n</definition>\n```\n\n最后，我们需要将这个模板与主模板的`content`属性关联起来。这实际上与我们之前的原始配置相同；但不再指向实际的视图，而是指向我们刚刚创建的定义：`show.selected.books`（参见[清单12-22](#Chapter12.html#list_12_22)）。\n\
    \n**清单12-22.** 使用先前定义的`show.selected.books`作为内容的适配后的`selectBooks` Tiles定义\n\n\
    ```\n<definition name=\"selectBooks\" extends=\"fullTemplate\">\n    <put-attribute\
    \ name=\"content\" value=\"show.selected.books\"/>\n</definition>\n```\n\n[图12-3](#Chapter12.html#fig_12_3)展示了我们新的分层设计。到目前为止，我们有一个主模板（`fullTemplate`），它直接用页面（例如`WEB-INF/view/createOrders/selectBooks.jsp`）填充其内容。然而，在该页面中，我们也包含了一个Tiles占位符。通过我们刚刚创建的配置，我们还可以制作第二个模板，该模板渲染`selectBooks.jsp`，但将其`content`属性替换为`showSelectedBooks.jsp`页面。\n\
    \n![Image](images/9781430241553_Fig12-03.jpg)\n\n**图12-3.** 最终渲染的`selectBooks`页面，包含所有组合\n\
    \n让我们总结一下到目前为止所做的工作：这两个Tiles定义共同构成了我们的新配置。当渲染`selectBooks`视图时，将使用`fullTemplate`模板，并且Tiles的`content`占位符将被替换为`show.selected.books`。后者引用另一个Tiles定义，该定义依次渲染`/WEB-INF/view/createOrders/selectBooks.jsp`，并将Tiles的`selectedBooks`占位符替换为`/WEB-INF/view/createOrders/showSelectedBooks.jsp`视图。\n\
    \n![Image](images/square.jpg) **注意** `show.selected.books`定义是组合的一部分，我们永远不会直接渲染它，因为我们仍然需要将其包含在从`fullTemplate`扩展的定义中（在我们的例子中是`selectBooks`定义）。如果我们直接渲染`show.selected.books`，我们会看到包含`showSelectedBooks.jsp`的`selectBooks.jsp`页面；但是，我们仍然会缺少页眉和页脚，因为它们尚未插入到主模板中。由于我们渲染的顶层定义仍然叫做`selectBooks`（我们只是更改了其内部组合），因此我们的控制器或流程中无需更改任何内容，视图名称也保持不变。顺便提一下，还有一种使用内联形式的更短符号来定义此组合。这将产生相同的结果，但在语法上更优雅一些。我们将在本章后面的“Flow\
    \ Managed Persistence Context”一节中重构Tiles配置时说明这一点。\n\n有了这些代码，我们就可以测试重构后的应用程序了。它应该产生与之前移动“显示已选书籍”结果表到不同视图之前完全相同的结果；换句话说，渲染的合并视图应与之前渲染的视图相同。"
