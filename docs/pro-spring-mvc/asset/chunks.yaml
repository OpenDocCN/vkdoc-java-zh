    #### 调整流程


    如前所述，我们必须明确指示哪些部分需要重新渲染。我们可以通过 `<render>` 元素来实现，该元素接受一个 `fragments` 属性（参见清单 12-23）。此属性将指向要渲染的
    Tiles 属性。我们还可以通过逗号分隔来指定多个片段，并且允许使用表达式（这些表达式必须求值为 Tiles 属性名称，就像其字面等价物一样）。


    如果我们以 `createOrders-flow` 为例，可以在 `add` 转换中添加 render 元素。render 元素仅对重新渲染同一视图的转换有意义，因此我们可以标记
    Tiles 属性 `selectedBooks` 进行渲染。这意味着当触发部分渲染时，`<put-attribute name="selectedBooks"
    value="/WEB-INF/view/showSelectedBooks.jsp"/>` 将被重新渲染。


    ***清单 12-23** 在 createOders/createOrders-flow.xml 中渲染片段*


    `<view-state id="selectBooks" view="selectBooks" model="orderForm" >`

    `    <on-render>`

    `        <evaluate expression="orderController.`![Image](img/U002.jpg)

    `                  initializeSelectableBooks(orderForm)"`

    `                  result="flashScope.selectableBooks" />`![Image](img/U002.jpg)

    `    </on-render>`


    `    <transition on="add" >`

    `        <evaluate expression="orderController.addBook(flowScope.orderForm)" />`

    **`        <render fragments="selectedBooks"/>`**

    `    </transition>`


    `    <transition on="next" to="selectDeliveryOptions" />`


    `    <transition on="reset" to="selectBooks">`

    `        <evaluate expression="orderForm.resetSelectedBooks()" />`

    `    </transition>`


    `    <transition on="previous" to="selectCategory" />`


    `    <transition on="cancel" to="end" />`


    `</view-state>`


    #### 使用 Spring JS 和 JQuery 为视图添加 AJAX


    最后，我们需要从浏览器实际发起一个异步调用。这样做将请求部分页面更新，从而更新 DOM 中的特定部分。不幸的是，由于不同浏览器对此功能的非标准支持，使用 XMLHttpRequest
    API（利用异步支持的浏览器 API）会有些问题。


    幸运的是，我们拥有一些非常优秀的 JavaScript 框架，它们为我们应用开发者隐藏了所有这些繁琐的细节。我们将讨论两种方案。第一种使用 Spring JS，由于我们依赖它，因此已经具备。第二种依赖于
    JQuery，我们需要为此下载一个单独的库。让我们首先演示如何使用 Spring JS 实现客户端 AJAX。


    ##### 使用 Spring JS


    在此示例中，当用户按下“添加”按钮时，我们将使用 Spring JS 发起一个 AJAX 调用（参见清单 12-24）。“添加”按钮是一个普通的 HTML
    提交按钮，它将保持不变。


    ***清单 12-24** 保持不变的提交按钮*


    `<button type="submit" id="add" name="_eventId_add">`

    `    <spring:message code="label.page.books.add.book"/>`

    `</button>`


    Spring JS 的一个核心概念是对现有 DOM 节点应用装饰。此技术用于渐进式增强网页，使其在禁用 JavaScript 或 JavaScript 本身有问题的浏览器中仍能正常工作。`addDecoration`
    方法用于应用这些装饰，我们将使用此方法为已存在的、id 为 `add` 的提交按钮添加一个 Ajax 装饰。


    为了能够使用 AJAX 库，我们必须在页面中包含对它们的引用。由于我们使用模板，这非常容易；只需将这些引用添加到模板的 HTML `head` 部分即可。在示例应用中打开
    `template.jsp` 时可以看到这一点（参见清单 12-25）。


    ***清单 12-25:** 启用 Ajax 所需的额外 JavaScript 导入*


    `<spring:url value="/resources/dojo/dojo.js" var="dojo"/>`

    `<script type="text/javascript" src="${dojo}"></script>`

    `<spring:url value="/resources/spring/Spring.js" var="springJs"/>`

    `<script type="text/javascript" src="${springJs}"></script>`

    `<spring:url value="/resources/spring/Spring-Dojo.js" var="springDojo"/>`

    `<script type="text/javascript" src="${springDojo}"></script>`


    ![Image](img/square.jpg) **注意** 假定 script 元素是非空的。如果你使用（通常语法等价的）“/>”来闭合此类元素，脚本将不会被加载。这就是为什么它们被显式地用
    `</script>` 闭合。这与 Spring JS 无关；而是 HTML 的一个特性。


    接下来，我们必须用 AJAX 处理器装饰按钮。我们可以通过将清单 12-26 中的脚本添加到 `selectBooks` 视图来实现，该视图位于 `WEB-INF/view/createOders/selectBooks.jsp`
    的底部。


    ***清单 12-26** JavaScript 装饰，将在添加按钮上启用 AJAX*


    `<script type="text/javascript">`

    `    dojo.addOnLoad(function() {`

    `        Spring.addDecoration(new Spring.AjaxEventDecoration({`

    `        elementId : "add",`

    `        event : "onclick",`

    `        formId: "selectBookForm"`

    `        }));`

    `    });`

    `</script>`


    关于上述清单，有几点关键事项值得注意：


    *   `elementId` 是要应用装饰的 HTML 元素的 id。在我们的例子中，它是 id 为 `add` 的提交按钮。

    *   event 是 HTML 元素的触发事件，用于调用装饰。在我们的例子中，它是添加按钮的 `onclick` 事件。

    *   `formId` 必须与包含所有需要随 Ajax 请求一起提交的信息的表单匹配。我们在清单 12-19 中将此 id 添加到了 `form` 元素中。

    *   `dojo.addOnLoad()` 方法将确保在所有元素加载完成后添加装饰。对于此类装饰，此方法可能不是必需的，但除非你有充分的理由不使用，否则将其视为最佳实践。顺便说一句，`<script>`
    元素放置在哪里并不重要。我们选择将其放在底部，但它可以出现在文件中的任何位置。


    该装饰将提交表单，导致所有输入被传输到服务器。由于 AJAX 装饰，这是以异步方式发生的。它将从按钮中获取名称作为要触发的事件 id（该 id 也会随参数一起传输）。该请求实际上是一个普通的表单提交。图
    12-4 显示了如果你使用 Firebug 检查请求时将会看到的内容。

