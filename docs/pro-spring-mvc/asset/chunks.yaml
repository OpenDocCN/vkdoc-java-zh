- fmt: '### Introducing Security


    Before we start talking about what Spring Security can do for you and how we are
    going to apply it to secure our application, we first need to provide some introduction
    to security. It is important that we first set the context in which Spring Security
    will operate. In the first part of this section, we will give an overview of application
    security, which is the type of security we are going to handle. Next we will look
    at some general security principles and terminology that will be important for
    a good understanding of the remainder of the chapter.


    Finally, we give a more detailed summary of the topics we will cover in this chapter,
    so you’ll know exactly what to expect. To be complete as possible, we will touch
    on different aspects of Spring Security.


    #### What Is Application Security?


    From a high-level view, application security is all about controlling access to
    your application’s functionality. In our bookstore, for example, every user should
    be able to view the books we are selling. But not every user should be able to
    create an order without fulfilling some conditions (such as creating an account
    and being logged in). If we decided to further extend the bookstore with some
    CMS-like features, say editing or adding new books to the system, we would then
    want only a select set of users to be able to make modifications. With application-level
    security you will be able to specify which resources in your application are restricted,
    and which are publicly available. For the restricted resources you will be able
    to make further distinctions; a user who is able to access restricted functionality
    A would therefore not be allowed to access restricted functionality B.


    Depending on your application’s context, this set of rules might vary from very
    complex to nonexistent. In the first case you could be requiring detailed roles,
    complicated authentication mechanisms, and so on, while in the latter case you
    could be building a web site that has only read only content that is public for
    everyone, and so application security is probably not of your concern.


    ![Image](images/square.jpg) **Note** As explained in the introduction to this
    chapter, security crosses many layers, and not just your application layer. So
    that’s why the topic here is explicitly “application security.” No matter what
    level of application security your application demands, the environment surrounding
    your application needs to be secure. You should not be afraid to ask your network
    or infrastructure team what they are doing to keep the environment secure where
    your application will reside. An expression you probably are already familiar
    with summarize this very nicely: “your security is only as strong as its weakest
    point.”


    #### General Security Principles


    We will start off covering some general security principles that will become important
    once you start securing your application:


    > *   **Identification:** Identifies a user based upon a certain identity; such
    as a username, token or certificate.

    > *   **Authentication:** The process of verifying the presented identity. In
    case of a username it is as simple as checking the supplied password.

    > *   **Authorization:** The process of identifying the functionality an authenticated
    user is allowed to use.


    If you need to provide application security, you will first have to think about
    how to *identify* your users. Identification will allow you to recognize a user
    who wants access to a protected resource. This is the first process in applying
    security. Identification can be simple, such as a username. It can also be a token,
    or even an x.509 certificate issued to a person or organization.


    Next you will have to verify the identity that the user provides. This process
    of verifying the identity is called *authentication*: checking the identification
    for its authenticity.


    In the case of a username, authenticity might be verified by asking for a password
    and comparing the entry with the password stored for that user.


    Finally, if a user’s identity is authenticated, the user is allowed access to
    the restricted zone of your application. At that point you might want to make
    distinctions among your authenticated users. In other words, you want to give
    certain privileges to authenticated users. Suppose you have a web store. Before
    ordering something, a user must be authenticated, because you want to know who
    made which order, you need access to the delivery/contact addresses, or maybe
    to stored payment credentials like a credit card number. However, it is clear
    that a normal customer who is authenticated as a user of your application should
    not be allowed to add or change products. Allowing or disallowing an authenticated
    user certain functionality is called *authorization*.


    Spring Security will especially concentrate on the authentication and authorization
    parts. Also note that the method of authentication is in a certain way related
    to the type of identification your users will have to supply.'
