- fmt: "### Setting Up a Basic Unit Test\n\nIn this section we will explain how to\
    \ set up a basic unit test using the JUnit framework⁶ without any Spring involvement.\
    \ We will address some specific JUnit features using annotations. If you are already\
    \ familiar with JUnit,⁶ feel free to skim this section quickly.\n\n_________\n\
    \n⁶ [`http://www.junit.org/`](http://www.junit.org/)\n\n![Image](images/square.jpg)\
    \ **Note** From experience we know that most developers are at least familiar\
    \ with JUnit. Since we want to explicitly show you the Spring testing framework,\
    \ we opted to do this in combination with JUnit. However, we also advise you to\
    \ take a look at TestNG.^([7](#Chapter09.html#CHP-9-FN-7)) While it is not source-compatible\
    \ with JUnit, they look the same on the surface. If you know JUnit, using TestNG\
    \ will be a breeze. However, TestNG has noticeably more features related to ordering\
    \ tests, expressing dependencies, and managing greater amounts of tests. TestNG\
    \ is also more flexible than JUnit. There is also an STS (Eclipse) plug-in (and\
    \ build plug-in for Gradle and Maven). See this IBM^([8](#Chapter09.html#CHP-9-FN-8))\
    \ resource for a nice comparison between the two frameworks and see what suits\
    \ you and your project best.\n\nOur basic setup starts by creating a Java class\
    \ (which will become our test) in the test class path (`src/test/java`). We will\
    \ be using JUnit4, which uses annotations to denote specific functionality. We\
    \ create a `DummyDao` class in the production classpath (`src/main/java`), which\
    \ will serve as our class to test (see [Listing 9-1](#Chapter09.html#list_9_1)).\
    \ The `DummyDao` will execute operations on a virtual database, in our case a\
    \ simple `ArrayList`. The `DummyDao` class has three operations: delete an entry\
    \ from the database, add an entry to the database, and search for entries in the\
    \ database that contain the given query word.\n\n**Listing 9-1.** A simple class\
    \ representing a DAO (Data Access Object) that we are going to unit-test\n\n```\n\
    package com.apress.prospringmvc.bookstore.dao;\n\npublic class DummyDao {\n\n\
    \    private List<String> database;\n\n    public DummyDao(List<String> database)\
    \ {\n        this.database = database;\n    }\n\n    public void delete(String\
    \ element) {\n        database.remove(element);\n    }\n\n    public void add(String\
    \ element) {\n        database.add(element);\n    }\n\n    public List<String>\
    \ find(String queryWord) {\n        List<String> result = new ArrayList<String>();\n\
    \        for (String element : database) {\n            if (element.contains(queryWord))\
    \ {\n                result.add(element);\n            }\n        }\n        return\
    \ result;\n    }\n}\n```\n\n_________\n\n⁷ [`http://testng.org/doc/index.html`](http://testng.org/doc/index.html)\n\
    \n⁸ [`http://www.ibm.com/developerworks/java/library/j-cq08296/`](http://www.ibm.com/developerworks/java/library/j-cq08296/)\n\
    \nNext we add tests for each of the methods (see [Listing 9-2](#Chapter09.html#list_9_2)).\n\
    \n**Listing 9-2.** The test case for `DatabaseDao`\n\n```\npackage com.apress.prospringmvc.bookstore.basic;\n\
    \nimport static junit.framework.Assert.assertEquals;\nimport static junit.framework.Assert.assertTrue;\n\
    \nimport org.junit.Before;\nimport org.junit.Test;\n\nimport com.apress.prospringmvc.bookstore.dao.DummyDao;\n\
    \npublic class BasicUnitTest {\n\n    private List<String> database;\n    private\
    \ DummyDao dummyDao;\n\n    @Before\n    public void dataSetup() {\n        database\
    \ = new ArrayList<String>();\n        for (int i = 0; i < 20; i++) {\n       \
    \     database.add(\"test\" + i);\n        }\n        dummyDao = new DummyDao(database);\n\
    \    }\n\n    @Test\n    public void testDeleteQuery() {\n        assertEquals(1,\
    \ dummyDao.find(\"test0\").size());\n        dummyDao.delete(\"test0\");\n   \
    \     assertEquals(19, database.size());\n        assertEquals(0, dummyDao.find(\"\
    test0\").size());\n    }\n\n    @Test\n    public void testAddQuery() {\n    \
    \    assertEquals(0, dummyDao.find(\"test20\").size());\n        dummyDao.add(\"\
    test20\");\n        assertEquals(21, database.size());\n        assertEquals(1,\
    \ dummyDao.find(\"test20\").size());\n    }\n\n    @Test\n    public void testFindQuery()\
    \ {\n        List<String> results = dummyDao.find(\"2\");\n        assertEquals(2,\
    \ results.size());\n        for (String result : results) {\n            assertTrue(result.equals(\"\
    test2\") || result.equals(\"test12\"));\n        }\n    }\n}\n```\n\nThe `@Test`\
    \ annotation denotes a method as a test method. This method will be picked up\
    \ and executed by JUnit. Inside this test method you will write the code to test\
    \ your actual production code. Other methods in the test class not carrying a\
    \ specific annotation are left alone. The `@Before` annotation is run before every\
    \ test method. It will make sure our database is populated with our initial data.\
    \ If a `@Test` method changed the data, we will make sure the data is reset to\
    \ its initial state. It is important that each method runs as an independent test.\
    \ You should not make dependencies between `@Test` methods, as your test code\
    \ becomes brittle and hard to understand very fast. Also, you have no control\
    \ over the order in which the `@Test` methods are executed.\n\nSTS comes shipped\
    \ with a JUnit plug-in out of the box. Once you have at least one `@Test` method,\
    \ you can right-click on the class and select Run As. The extra run option JUnit\
    \ Test will automatically appear. Click it to run the test.\n\nThe `assertTrue`\
    \ and `assertEquals` methods were imported as static imports from the `junit.framework.Assert`\
    \ class (as you can see at the top of [Listing 9-2](#Chapter09.html#list_9_2)).\
    \ These methods allow you to verify the behavior, and let the test stop if the\
    \ behavior is not what you expect. This is just a bit of sugar syntax, as it makes\
    \ your code more fluent to read. Mostly you don’t need a lot of these methods.\
    \ With `assertTrue` and `assertEquals`, you will already get far.\n\nIf we take\
    \ the `testDeleteQuery` method as an example, we first execute the delete query\
    \ to delete an entry in our database. Next we check to see whether the database\
    \ indeed contains one entry less. When this is not the case, the `assertEquals`\
    \ fails and that particular test method is marked as failed, as shown in [Figure\
    \ 9-3](#Chapter09.html#fig_9_3).\n\n![Image](images/9781430241553_Fig09-03.jpg)\n\
    \n**Figure 9-3.** A JUnit test failure\n\nIf all tests succeed, you see a green\
    \ bar like the one in [Figure 9-4](#Chapter09.html#fig_9_4).\n\n![Image](images/9781430241553_Fig09-04.jpg)\n\
    \n**Figure 9-4.** A JUnit test success\n\nBesides the `@Before` method, there\
    \ is also `@After`. The `@After` method is run after each test method, even if\
    \ the method throws an exception or if one of the assertions fails. There are\
    \ also the `@BeforeClass` and `@AfterClass`, which are executed once, before the\
    \ first test method starts and after the last test method ends, respectively.\
    \ You can see the order visualized in [Figure 9-5](#Chapter09.html#fig_9_5).\n\
    \n![Image](images/9781430241553_Fig09-05.jpg)\n\n**Figure 9-5.** JUnit annotation\
    \ execution order\n\nThe `@BeforeClass`, `@Before`, `@After` and `@AfterClass`\
    \ are of course optional annotations (that’s why they are shown in dashed rectangles).\
    \ If you don’t specify an `@Before`, for example, JUnit will immediately start\
    \ with your test method, and then, if you specified it, execute the `@After` method.\
    \ If you didn’t specify it, the next test method will run. Don’t forget that `@Before`\
    \ and `@After` run before and after *every* test method. `@BeforeClass` and `@AfterClass`\
    \ run only once, at the beginning of the test and at the end. JUnit has a few\
    \ more extra features such as Suites and Categories, but they are outside the\
    \ scope of this chapter. You can find more information on the JUnit website^([9](#Chapter09.html#CHP-9-FN-9))\
    \ and in the JavaDoc.^([10](#Chapter09.html#CHP-9-FN-10))\n\nThis wraps up our\
    \ quick introduction to JUnit and how to write a quick test. This will be sufficient\
    \ for the remainder of this chapter."
  raw: '### Setting Up a Basic Unit Test


    In this section we will explain how to set up a basic unit test using the JUnit
    framework⁶ without any Spring involvement. We will address some specific JUnit
    features using annotations. If you are already familiar with JUnit,⁶ feel free
    to skim this section quickly.


    _________


    ⁶ [`http://www.junit.org/`](http://www.junit.org/)


    ![Image](images/square.jpg) **Note** From experience we know that most developers
    are at least familiar with JUnit. Since we want to explicitly show you the Spring
    testing framework, we opted to do this in combination with JUnit. However, we
    also advise you to take a look at TestNG.^([7](#Chapter09.html#CHP-9-FN-7)) While
    it is not source-compatible with JUnit, they look the same on the surface. If
    you know JUnit, using TestNG will be a breeze. However, TestNG has noticeably
    more features related to ordering tests, expressing dependencies, and managing
    greater amounts of tests. TestNG is also more flexible than JUnit. There is also
    an STS (Eclipse) plug-in (and build plug-in for Gradle and Maven). See this IBM^([8](#Chapter09.html#CHP-9-FN-8))
    resource for a nice comparison between the two frameworks and see what suits you
    and your project best.


    Our basic setup starts by creating a Java class (which will become our test) in
    the test class path (`src/test/java`). We will be using JUnit4, which uses annotations
    to denote specific functionality. We create a `DummyDao` class in the production
    classpath (`src/main/java`), which will serve as our class to test (see [Listing
    9-1](#Chapter09.html#list_9_1)). The DummyDao will execute operations on a virtual
    database, in our case a simple ArrayList. The DummyDao class has three operations:
    delete an entry from the database, add an entry to the database, and search for
    entries in the database that contain the given query word.


    ***Listing 9-1.** A simple class representing a DAO (Data Access Object) that
    we are going to unit-test*


    `package com.apress.prospringmvc.bookstore.dao;`


    `public class DummyDao {`


    `    private List<String> database;`


    `    public DummyDao(List<String> database) {`

    `        this.database = database;`

    `    }`


    `    public void delete(String element) {`

    `        database.remove(element);`

    `    }`


    `    public void add(String element) {`

    `        database.add(element);`

    `    }`


    `    public List<String> find(String queryWord) {`

    `        List<String> result = new ArrayList<String>();`

    `        for (String element : database) {`

    `            if (element.contains(queryWord)) {`

    `                result.add(element);`

    `            }`

    `        }`

    `        return result;`

    `    }`

    `}`


    _________


    ⁷ [`http://testng.org/doc/index.html`](http://testng.org/doc/index.html)


    ⁸ [`http://www.ibm.com/developerworks/java/library/j-cq08296/`](http://www.ibm.com/developerworks/java/library/j-cq08296/)


    Next we add tests for each of the methods (see [Listing 9-2](#Chapter09.html#list_9_2)).


    ***Listing 9-2.** The test case for DatabaseDao*


    `package com.apress.prospringmvc.bookstore.basic;`


    `import static junit.framework.Assert.assertEquals;`

    `import static junit.framework.Assert.assertTrue;`


    `import org.junit.Before;`

    `import org.junit.Test;`


    `import com.apress.prospringmvc.bookstore.dao.DummyDao;`


    `public class BasicUnitTest {`


    `    private List<String> database;`

    `    private DummyDao dummyDao;`


    `    @Before`

    `    public void dataSetup() {`

    `        database = new ArrayList<String>();`

    `        for (int i = 0; i < 20; i++) {`

    `            database.add("test" + i);`

    `        }`

    `        dummyDao = new DummyDao(database);`

    `    }`


    `    @Test`

    `    public void testDeleteQuery() {`

    `        assertEquals(1, dummyDao.find("test0").size());`

    `        dummyDao.delete("test0");`

    `        assertEquals(19, database.size());`

    `        assertEquals(0, dummyDao.find("test0").size());`

    `    }`


    `    @Test`

    `    public void testAddQuery() {`

    `        assertEquals(0, dummyDao.find("test20").size());`

    `        dummyDao.add("test20");`

    `        assertEquals(21, database.size());`

    `        assertEquals(1, dummyDao.find("test20").size());`

    `    }`


    `    @Test`

    `    public void testFindQuery() {`

    `        List<String> results = dummyDao.find("2");`

    `assertEquals(2, results.size());`

    `     for (String result : results) {`

    `        assertTrue(result.equals("test2") || result.equals("test12"));`


    The `@Test` annotation denotes a method as a test method. This method will be
    picked up and executed by JUnit. Inside this test method you will write the code
    to test your actual production code. Other methods in the test class not carrying
    a specific annotation are left alone. The `@Before` annotation is run before every
    test method. It will make sure our database is populated with our initial data.
    If a `@Test` method changed the data, we will make sure the data is reset to its
    initial state. It is important that each method runs as an independent test. You
    should not make dependencies between `@Test` methods, as your test code becomes
    brittle and hard to understand very fast. Also, you have no control over the order
    in which the @Test methods are executed.


    STS comes shipped with a JUnit plug-in out of the box. Once you have at least
    one `@Test` method, you can right-click on the class and select Run As. The extra
    run option JUnit Test will automatically appear. Click it to run the test.


    The `assertTrue` and `assertEquals` methods were imported as static imports from
    the `junit.framework.Assert` class (as you can see at the top of [Listing 9-2](#Chapter09.html#list_9_2)).
    These methods allow you to verify the behavior, and let the test stop if the behavior
    is not what you expect. This is just a bit of sugar syntax, as it makes your code
    more fluent to read. Mostly you don’t need a lot of these methods. With `assertTrue`
    and `assertEquals`, you will already get far.


    If we take the `testDeleteQuery` method as an example, we first execute the delete
    query to delete an entry in our database. Next we check to see whether the database
    indeed contains one entry less. When this is not the case, the `assertEquals`
    fails and that particular test method is marked as failed, as shown in [Figure
    9-3](#Chapter09.html#fig_9_3).


    ![Image](images/9781430241553_Fig09-03.jpg)


    ***Figure 9-3.** A JUnit test failure*


    If all tests succeed, you see a green bar like the one in [Figure 9-4](#Chapter09.html#fig_9_4).


    ![Image](images/9781430241553_Fig09-04.jpg)


    ***Figure 9-4.** A JUnit test success*


    Besides the `@Before` method, there is also `@After`. The `@After` method is run
    after each test method, even if the method throws an exception or if one of the
    assertions fails. There are also the `@BeforeClass` and `@AfterClass`, which are
    executed once, before the first test method starts and after the last test method
    ends, respectively. You can see the order visualized in [Figure 9-5](#Chapter09.html#fig_9_5).


    ![Image](images/9781430241553_Fig09-05.jpg)


    ***Figure 9-5.** JUnit annotation execution order*


    The `@BeforeClass`, `@Before`, `@After` and `@AfterClass` are of course optional
    annotations (that’s why they are shown in dashed rectangles). If you don’t specify
    an `@Before`, for example, JUnit will immediately start with your test method,
    and then, if you specified it, execute the `@After` method. If you didn’t specify
    it, the next test method will run. Don’t forget that `@Before` and `@After` run
    before and after *every* test method. `@BeforeClass` and `@AfterClass` run only
    once, at the beginning of the test and at the end. JUnit has a few more extra
    features such as Suites and Categories, but they are outside the scope of this
