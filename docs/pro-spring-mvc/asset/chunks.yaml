    `<on-entry>` 元素可应用于全部五种状态：视图、操作、决策、子流程和结束状态。每次进入状态时，都会执行由 `<on-entry>` 元素指定的操作。


    然而，这仅在状态被*显式*进入时才成立。例如：当你在一个转换（嵌套在视图状态中）中省略了 `to` 属性时，你会停留在同一个视图状态（即，该视图状态将被重新渲染）。但是，在这种情况下，`<on-entry>`
    不会被触发。必须有一个到某个状态的显式转换才能执行 `<on-entry>`。


