- fmt: "### Flow Execution Listeners\n\nWhen executing a flow, Web Flow will go through\
    \ different steps before it actually performs a transition or executes a method\
    \ on your application controller. For example, we have already seen that the flow\
    \ execution is paused after the view has been rendered and sent back to the client.\
    \ Likewise, when a new request comes in for an existing flow execution, the flow\
    \ execution needs to be resumed. Pausing and resuming a flow execution are just\
    \ two of the steps that Web Flow will be performing, but there are many more.\
    \ We say that these steps are part of the Web Flow *lifecycle*, which consists\
    \ of the (noteworthy) steps that Web Flow goes through when executing a request.\
    \ Web Flow will allow us to configure an implementation of an `org.springframework.webflow.execution.FlowExecutionListener`\
    \ that will receive callbacks when any of those special lifecycle steps take place.\n\
    \nGetting a callback from these lifecycle steps is typically useful only for more\
    \ infrastructure-related code (e.g., crosscutting concerns). For example, you\
    \ could use the `FlowExecutionListener` to apply special security checks. Or,\
    \ you could use it to log access. The functionality offered by a `FlowExecutionListener`\
    \ looks a lot like that offered by Aspects in that sense that it is transparent\
    \ to the actual target, regardless of whether any of those callbacks happened.\n\
    \nThe `FlowExecutionListener` is in no way a replacement for Aspects, which remain\
    \ more powerful. However, Aspects are also more complex. You should evaluate whether\
    \ the flow execution listener approach is sufficient to do the job you want to\
    \ do. If not, you can still revert to AOP.\n\nIn the following sections, we will\
    \ cover how we can write our custom `FlowExecutionListener`. Finally, we will\
    \ walk through all of the methods in the `FlowExecutionListener` and give a detailed\
    \ explanation about each of them.\n\n#### Writing Flow Execution Listeners\n\n\
    Writing a flow execution listener is as simple as implementing the `FlowExecutionListener`\
    \ interface. This interface defines a lot of callback methods that will be invoked\
    \ when certain things happen in the course of a flow execution life cycle. Spring\
    \ Web Flow also provides an `org.springframework.webflow.execution.FlowExecutionListenerAdapter`\
    \ as a convenience class, which implements all of the methods defined by the `FlowExecutionListener`\
    \ interface using empty method bodies. You can also subclass `FlowExecutionListenerAdapter`\
    \ and override only those methods that you require at a given time.\n\n![Image](images/square.jpg)\
    \ **Note** The flow execution listener is by no means using AOP or any byte-code\
    \ manipulation. It is a hook built into the Web Flow subsystem to give you callbacks\
    \ for certain events during the flow execution. This is comparable to a web container\
    \ that calls back on a registered `HttpSessionListener` to inform you about a\
    \ session creation or destruction.\n\nFlow execution listeners are declared via\
    \ the flow executor (see [Listing 12-29](#Chapter12.html#list_12_29)). Their order\
    \ is important; if more than one flow execution listener is defined, their callback\
    \ methods will be called in the order in which the listeners are defined in the\
    \ `<webflow:flow-execution-listeners>` element. The flow execution listener defined\
    \ on top is called first; the listener immediately that one is called next; and\
    \ so forth.\n\n***Listing 12-29** Configuring the flow execution listener*\n\n\
    ```\n<webflow:flow-executor id=\"flowExecutor\" flow-registry=\"flowRegistry\"\
    >\n    <webflow:flow-execution-listeners>\n        <webflow:listener ref=\"loggerListener\"\
    \ />\n        <webflow:listener ref=\"securityListener\" />\n    </webflow:flow-execution-listeners>\n\
    </webflow:flow-executor>\n```\n\nYou can also specify the `criteria` attribute\
    \ on the `<webflow:listener>` with a comma separated list of flow ids. This will\
    \ enable a given listener only for the given flows. If you leave it empty, the\
    \ listener is enabled for all flows. This is the equivalent of specifying an asterisk\
    \ (`*`), which is the default value for the `criteria` attribute if you don’t\
    \ specify it. Flow ids and the asterisks are the only allowed values for this\
    \ attribute (see [Listing 12-30](#Chapter12.html#list_12_30)).\n\n***Listing 12-30**\
    \ Configuring the flow execution listener only for a specific flow id*\n\n```\n\
    <webflow:flow-executor id=\"flowExecutor\" flow-registry=\"flowRegistry\">\n \
    \   <webflow:flow-execution-listeners>\n        <webflow:listener ref=\"loggerListener\"\
    \ criteria=\"myFlowId\" />\n        <webflow:listener ref=\"securityListener\"\
    \ />\n    </webflow:flow-execution-listeners>\n</webflow:flow-executor>\n```"
  raw: '### Flow Execution Listeners


    When executing a flow, Web Flow will go through different steps before it actually
    performs a transition or executes a method on your application controller. For
    example, we have already seen that the flow execution is paused after the view
    has been rendered and sent back to the client. Likewise, when a new request comes
    in for an existing flow execution, the flow execution needs to be resumed. Pausing
    and resuming a flow execution are just two of the steps that Web Flow will be
    performing, but there are many more. We say that these steps are part of the Web
    Flow *lifecycle*, which consists of the (noteworthy) steps that Web Flow goes
    through when executing a request. Web Flow will allow us to configure an implementation
    of an `org.springframework.webflow.execution.FlowExecutionListener` that will
    receive callbacks when any of those special lifecycle steps take place.


    Getting a callback from these lifecycle steps is typically useful only for more
    infrastructure-related code (e.g., crosscutting concerns). For example, you could
    use the `FlowExecutionListener` to apply special security checks. Or, you could
    use it to log access. The functionality offered by a `FlowExecutionListener` looks
    a lot like that offered by Aspects in that sense that it is transparent to the
    actual target, regardless of whether any of those callbacks happened.


    The `FlowExecutionListener` is in no way a replacement for Aspects, which remain
    more powerful. However, Aspects are also more complex. You should evaluate whether
    the flow execution listener approach is sufficient to do the job you want to do.
    If not, you can still revert to AOP.


    In the following sections, we will cover how we can write our custom `FlowExecutionListener`.
    Finally, we will walk through all of the methods in the `FlowExecutionListener`
    and give a detailed explanation about each of them.


    #### Writing Flow Execution Listeners


    Writing a flow execution listener is as simple as implementing the `FlowExecutionListener`
    interface. This interface defines a lot of callback methods that will be invoked
    when certain things happen in the course of a flow execution life cycle. Spring
    Web Flow also provides an `org.springframework.webflow.execution.FlowExecutionListenerAdapter`
    as a convenience class, which implements all of the methods defined by the `FlowExecutionListener`
    interface using empty method bodies. You can also subclass `FlowExecutionListenerAdapter`
    and override only those methods that you require at a given time.


    ![Image](images/square.jpg) **Note** The flow execution listener is by no means
    using AOP or any byte-code manipulation. It is a hook built into the Web Flow
    subsystem to give you callbacks for certain events during the flow execution.
    This is comparable to a web container that calls back on a registered `HttpSessionListener`
    to inform you about a session creation or destruction.


    Flow execution listeners are declared via the flow executor (see [Listing 12-29](#Chapter12.html#list_12_29)).
    Their order is important; if more than one flow execution listener is defined,
    their callback methods will be called in the order in which the listeners are
    defined in the `<webflow:flow-execution-listeners>` element. The flow execution
    listener defined on top is called first; the listener immediately that one is
    called next; and so forth.


    ***Listing 12-29** Configuring the flow execution listener*


    `<webflow:flow-executor id="flowExecutor" flow-registry="flowRegistry">`

    **`    <webflow:flow-execution-listeners>`**

    **`        <webflow:listener ref="loggerListener" />`**

    **`        <webflow:listener ref="securityListener" />`**

    **`    </webflow:flow-execution-listeners>`**

    `</webflow:flow-executor>`


    You can also specify the `criteria` attribute on the `<webflow:listener>` with
    a comma separated list of flow ids. This will enable a given listener only for
    the given flows. If you leave it empty, the listener is enabled for all flows.
    This is the equivalent of specifying an asterisk (*), which is the default value
    for the `criteria` attribute if you don’t specify it. Flow ids and the asterisks
    are the only allowed values for this attribute (see [Listing 12-30](#Chapter12.html#list_12_30)).


    ***Listing 12-30** Configuring the flow execution listener only for a specific
    flow id*


    `<webflow:flow-executor id="flowExecutor" flow-registry="flowRegistry">`

    **`    <webflow:flow-execution-listeners>`**

    **`        <webflow:listener ref="loggerListener" criteria="myFlowId" />`**

    **`        <webflow:listener ref="securityListener" />`**

    **`    </webflow:flow-execution-listeners>`**

    `</webflow:flow-executor>`'
