    \n**Figure 5-7.** The account registration page\n\nIf we now enter an invalid\
    \ date; leave the username, password and e-mail address fields blank; and then\
    \ submit the form; the same page redisplays with some error messages (see [Figure\
    \ 5-8](#Chapter05.html#fig_5_8)).\n\n![Image](images/9781430241553_Fig05-08.jpg)\n\
    \n**Figure 5-8.** The account registration page showing some errors\n\nThe error\
    \ messages are created by the data binding facilities in Spring MVC. Later in\
    \ this chapter, we will see how we can influence the messages displayed. For now,\
    \ let’s leave them intact. If we fill in proper information and click Save, we\
    \ are redirected to an account page (for which we already have provided the basic\
    \ controller and implementation)."
