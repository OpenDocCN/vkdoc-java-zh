    \ to the last part of implementing our flow. We will display the order date (which\
    \ was set to the current date when we initialized our form); and below that, we\
    \ will offer the user an input field to enter a desired delivery date. This is\
    \ the final page of the three; at this point, the user should be able to go to\
    \ the previous page, cancel the order, or finalize the order. When the user clicks\
    \ the `Order!` button, we will create the order using the information stored in\
    \ the form and then store the order in our database.\n\n[Listing 10-30](#Chapter10.html#list_10_30)\
    \ shows the code to implement our view state.\n\n**Listing 10-30.** The View State\
    \ for the Select Delivery Options\n\n```\n<view-state id=\"selectDeliveryOptions\"\
    \ view=\"selectDeliveryOptions\"\n    model=\"orderForm\">\n    <transition on=\"\
    previous\" to=\"selectBooks\" />\n    <transition on=\"finish\" to=\"end\">\n\
    \        <evaluate expression=\"orderController.placeOrder(flowScope.orderForm,\n\
    \           externalContext.sessionMap.authenticatedAccount)\"/>\n    </transition>\n\
    \n    <transition on=\"cancel\" to=\"end\" />\n</view-state>\n```\n\nThe first\
    \ transition is nothing new; it takes us back to the previous view state. The\
    \ second transition finalizes the order and transitions to the end state, which\
    \ we will see in a moment. To create the order, we pass the `com.apress.prospringmvc.bookstore.domain.Account`\
    \ (domain objects are part of the `bookstore-shared` module) and the `OrderForm`\
    \ to the `placeOrder` method on our controller. The `Account` is nothing to worry\
    \ about for now; just know that it was automatically set to the session scope\
    \ when the user opened the web application. Remember that, for this sample, we\
    \ kept everything as simple as possible, so the user was logged in automatically\
    \ (always with the same hardcoded user). In the next chapter, we will implement\
    \ the authentication ourselves, as a way of illustrating some new Web Flow concepts.\n\
    \nThe `Account` identifies the user currently logged in and making the order.\
    \ The orders will be added to that user. As you can see, we are using another\
    \ implicit object, `externalContext`—this time to access the `javax.servlet.Servlet`\
    \ session scope and retrieve the `Account` from there. The session scope is the\
    \ ideal place to store information like authentication, which is really bound\
    \ to the lifetime of the session.\n\nThe `placeOrder` method will use the `com.apress.prospringmvc.bookstore.domain.support.OrderBuilder`\
    \ to start the creation of a new `com.apress.prospringmvc.bookstore.domain.Order`\
    \ (see [Listing 10-32](#Chapter10.html#list_10_32)). Next, it will loop over the\
    \ selected books and add each one of them to our order. We use the book id to\
    \ retrieve the `com.apress.prospringmvc.bookstore.domain.Book` object from database.\n\
    \n**Listing 10-31.** The Controller Method for Placing an Order\n\n```\npublic\
    \ void placeOrder(final OrderForm orderForm, final Account account) throws\n ParseException\
    \ {\n    OrderBuilder orderBuilder = new OrderBuilder() {\n        {\n       \
    \     deliveryDate(simpleDateFormat.parse(orderForm.getDeliveryDate()));\n   \
    \         account(account);\n            orderDate(simpleDateFormat.parse(orderForm.getOrderDate()));\n\
    \        }\n    };\n\n    for (Entry<Book, Integer> selectedBook : orderForm.getSelectedBooks().entrySet())\
    \ {\n        orderBuilder.addBook(selectedBook.getKey(), selectedBook.getValue());\n\
    \    }\n\n    bookstoreService.store(orderBuilder.build(true));\n}\n```\n\nAfter\
    \ the order is made, the flow transitions to the end state and all other states\
    \ will be cleaned up. The user is then redirected to the home page. We will discuss\
    \ the end state in the next chapter in detail. For now, it is enough to know that\
    \ it will end our current flow and that it performs the entire cleanup (see [Listing\
    \ 10-33](#Chapter10.html#list_10_33)).\n\n**Listing 10-32.** Ending Our Flow and\
    \ Redirecting to the Home Page\n\n```\n<end-state id=\"end\" view=\"redirect:/index.htm\"\
    />\n```\n\nIn [Listing 10-34](#Chapter10.html#list_10_34), we show the Tiles configuration\
    \ that defines the `selectDeliveryOptions` view.\n\n**Listing 10-33.** The Tiles\
    \ Definition for Our Select Delivery Options\n\n```\n<definition name=\"selectDeliveryOptions\"\
    \ extends=\"fullTemplate\">\n    <put-attribute name=\"content\" value=\"/WEB-INF/view/createOrders/\n\
    selectDeliveryOptions.jsp\"/>\n</definition>\n```\n\n[Listing 10-35](#Chapter10.html#list_10_35)\
    \ shows the select delivery options page, which is located at `/WEB-INF/view/createOrders/selectDeliveryOptions.jsp`.\n\
    \n**Listing 10-34.** The Select Delivery Options Page\n\n```\n<form:form modelAttribute=\"\
    orderForm\" action=\"${flowExecutionUrl}\">\n    <table style=\"width: 100%\"\
    >\n        <tr>\n            <td>\n                <spring:message\n         \
    \       code=\"label.page.selectdeliveryoptions.select.order.date\"/>\n      \
    \      </td>\n            <td>\n                <form:input path=\"orderDate\"\
    \ disabled=\"true\" />\n            </td>\n        </tr>\n        <tr>\n     \
    \       <td>\n                <spring:message\n                code=\"label.page.selectdeliveryoptions.select.delivery.date\"\
    />\n            </td>\n            <td>\n                <form:input path=\"deliveryDate\"\
    \ />\n\n<script type=\"text/javascript\">\nSpring.addDecoration(new Spring.ElementDecoration({\n\
    elementId : \"deliveryDate\",\nwidgetType : \"dijit.form.DateTextBox\",\nwidgetAttrs\
    \ : { datePattern : \"MM-dd-yyyy\",\nrequired : true }}));\n</script>\n      \
    \      </td>\n        </tr>\n    </table>\n\n    <div align=\"right\" style=\"\
    margin-bottom: 20px; margin-top: 10px\" >\n        <button type=\"submit\" id=\"\
    previous\" name=\"_eventId_previous\">\n            <spring:message code=\"button.previous\"\
    />\n        </button>\n        <button type=\"submit\" id=\"cancel\" name=\"_eventId_cancel\"\
    >\n            <spring:message code=\"button.cancel\"/>\n        </button>\n\n\
    \        <button type=\"submit\" id=\"finish\" name=\"_eventId_finish\">\n   \
    \         <spring:message code=\"label.page.selectdeliveryoptions.order\"/>\n\
    \        </button>\n    </div>\n</form:form>\n```\n\nNote the code highlighted\
    \ in bold. We used a bit of Spring JS (Spring JavaScript, based on DOJO) to render\
    \ the date picker, as you can see on the view in [Figure 10-14](#Chapter10.html#fig_10_14).\
    \ The `addDecoration` decorates an existing HTML element—with id `deliveryDate`,\
    \ in this case. We specify the type of widget (date picker) and supply it with\
    \ some attributes such as the format that it is required. This is a form of client-side\
    \ validation. In the next chapter, we will also add matching server side validation.\
    \ We will also discuss some more JavaScript options in [Chapter 12](#Chapter12.html#ch12)\
    \ when we talk about Ajax.\n\n![Image](images/9781430241553_Fig10-14.jpg)\n\n\
    **Figure 10-14.** Selecting the delivery options—our delivery date\n\nIf you want\
    \ to verify that the order has been made, you can click “Orders overview” link\
    \ in the menu bar. You will see that there now is a sixth order, the order that\
    \ we made throughout this process. Note that the other five were inserted automatically\
    \ when the application started by the `com.apress.prospringmvc.bookstore.domain.support.InitialDataSetup`.\n\
    \n![Image](images/square.jpg) **Note** You will notice that clicking the “Order!”\
    \ button without entering the (mandatory) delivery date will raise an ugly server\
    \ side exception. In this flow, we did not apply validations or any of those features.\
    \ The decoration (date picker) we applied on the field will indicate that it is\
    \ mandatory; however, not filling in the delivery date won't prevent the user\
    \ from clicking the Submit button, and thus submitting the form without the delivery\
    \ date. In the upcoming chapters, we will examine how we can improve this, and\
    \ show an appropriate validation message instead."
