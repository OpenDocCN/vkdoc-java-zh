    how we can secure our application by making all resources accessible for authenticated
    users only, unless specified otherwise. you saw how we can identify our users
    by requiring them to enter a username and password on the login page. We also
    showed how to configure Spring Security so it can authenticate the given credentials.
    In the previous section we introduced you to RBAC, which led to populating our
    `com.apress.prospringmvc.bookstore.web.security.BookstoreUserDetails` roles and
    permissions coupled to the user’s `Account`.    Our security setup is now almost
    ready, as all the bits and pieces are in place. The only thing left to perform
    is authorization based on the information that we now have in our `org.springframework.security.core.context.SecurityContext`
    for an authenticated user. Or better said, we need to indicate which functionality
    the user is allowed to use based on the roles and permissions coupled to the user’s
    `Account`.    In the following sections we will see how we can control authorization
    in our pages. We will see that Spring Security comes with its own tag library
    that offers special tags to disable or enable functionality directly in our JSP
    pages, based on the presence of certain roles or permissions.    #### Using Tag
    Libraries in Our Pages    Spring Security comes with a dedicated tag library you
    can use to conditionally render certain page components. The use case is always
    the same: determining whether a certain component or part of the page should be
    shown to the currently logged-in user based upon the set of authorities.    In
    order to use the tags, we have to declare the corresponding tag library in our
    pages. We do this by adding an extra JSP declaration:  `<%@ taglib prefix="spring"
    uri="http://www.springframework.org/tags"%>.`  In the following sections we will
    illustrate the most important tags and how you can use them.    ##### The authorize
    Tag    This tag is used to determine whether its contents should be evaluated
    or not, based on one or more authorization checks. In our case we will use it
    in exactly the same way as the `flow` security attribute, or the `access` attribute
    of the intercept URL. Using a SpEL expression we will verify if the current authenticated
    user has the given role in order to let the content be evaluated.    In the first
    code snippet we will only show the content when the authenticated user has the
    role `ROLE_AUTHOR`. In the second snippet the content will only be shown if the
    authenticated user has the role `PERM_ADD_BOOK`.  `<sec:authorize access="hasRole(''ROLE_AUTHOR'')">`
    `…content…` `</sec:authorize>`  Or  `<sec:authorize access="hasRole(''PERM_ADD_BOOK'')">`
    `…content…` `</sec:authorize>`  To illustrate the use of this important tag, we
    created a separate page, `manageBooks.jsp` (located in `WEB-IN/view/secured/manageBooks`).
    This page will allow a user to add new books to the system, and new categories.
