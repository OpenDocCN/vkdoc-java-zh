    `org.springframework.context.MessageSource`；在这里，我们将扩展配置并传递第二个资源包，该资源包由包格式的位置（`org.springframework.security.messag`es）后跟基本名称标识，基本名称是不带国家或语言后缀且不带“properties”扩展名的文件名。    ***清单
