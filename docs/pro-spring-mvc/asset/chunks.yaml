    ##### 全局自定义


    要实现全局数据绑定，我们需要创建一个实现了 `org.springframework.web.bind.support.WebBindingInitializer`
    接口的类。Spring MVC 提供了该接口的一个可配置实现，即 `org.springframework.web.bind.support.ConfigurableWebBindingInitializer`。该接口的实例必须注册到处理器映射实现中，以便能够被使用。在创建了
    `org.springframework.web.bind.WebDataBinder` 的实例后，会调用 `org.springframework.web.bind.support.WebBindingInitializer`
    的 `initBinder` 方法。


    提供的实现允许我们设置一些属性。当某个属性未设置时，它会使用 `org.springframework.web.bind.WebDataBinder` 指定的默认值。如果我们想要指定更多属性，扩展默认实现并添加所需行为是相当容易的。这里可以设置与控制器中相同的属性（参见表
    5-13）。


    ![Image](img/tab_5_13.jpg)


    当我们想要扩展 Spring @MVC 提供的配置时，需要进行一些扩展和重写。这是因为默认配置已经配置了一个 `org.springframework.web.bind.support.ConfigurableWebBindingInitializer`；然而，它并没有将其暴露为一个
    Bean。相反，我们需要扩展 `org.springframework.web.servlet.config.annotation.WebMvcConfigurationSupport`
    并重写 `requestMappingHandlerAdapter` 方法（参见清单 5-22）。


    ***清单 5-22.** 重用 ConfigurableWebBindingInitializer*


    `public class WebMvcContextConfiguration` **`extends WebMvcConfigurationSupport`**
    `{`

    **`    @Override`**

    **`    @Bean`**

    **`    public RequestMappingHandlerAdapter requestMappingHandlerAdapter() {`**

    **`        RequestMappingHandlerAdapter adapter = super.requestMappingHandlerAdapter();`**

    **`        ConfigurableWebBindingInitializer webBindingInitializer;`![Image](img/U002.jpg)**

    **`webBindingInitializer = (ConfigurableWebBindingInitializer)` ![Image](img/U002.jpg)**

    **`adapter.getWebBindingInitializer();`**

    **`        webBindingInitializer.setDirectFieldAccess(true);`**

    **`        //执行其他重新配置`**

    **`        return adapter;`**

    **`    }`**

    `}`


    #### 每个控制器的自定义


    对于每个控制器的选项，我们必须在控制器中实现一个方法，并在该方法上添加 `org.springframework.web.bind.annotation.InitBinder`
    注解。该方法必须没有返回值（void），并且至少有一个 `org.springframework.web.bind.WebDataBinder` 作为方法参数。该方法*可以*拥有与请求处理方法相同的参数。但是，它*不能*包含带有
    `org.springframework.web.bind.annotation.ModelAttribute` 注解的方法参数。这是因为模型在绑定之后才可用；而在此方法中，我们将要配置如何进行绑定。


    `org.springframework.web.bind.annotation.InitBinder` 注解有一个名为 `value` 的单一属性，它可以接受此初始化绑定器方法将要应用的模型属性名称或请求参数名称。默认情况下，它应用于所有模型属性和请求参数。


    要自定义绑定，我们需要配置我们的 `org.springframework.web.bind.WebDataBinder`。该对象有几个我们可以使用的配置选项（setter
    方法），如表 5-14 所示。


    ![Image](img/tab_5_14.jpg)


    ![Image](img/tab_5_14a.jpg)


    除了设置这些属性之外，我们还可以告诉 `org.springframework.web.bind.WebDataBinder` 使用 Bean 属性访问（默认）或直接字段访问。这可以通过分别调用
    `initBeanPropertyAccess` 或 `initDirectFieldAccess` 方法来设置属性访问或直接字段访问。直接字段访问的优势在于，我们不必为每个想要用于绑定的字段编写
    getter/setter 方法。清单 5-23 展示了一个初始化绑定器方法的示例。


    ***清单 5-23.** 一个初始化绑定器方法示例*


    `package com.apress.prospringmvc.bookstore.web.controller;`


    `//省略导入`


    `@Controller`

    `@RequestMapping(value = "/customer")`

    `public class RegistrationController {`


    `    // 省略其他方法`


    `    @InitBinder`

    `    public void initBinder(WebDataBinder binder) {`

    `        binder.initDirectFieldAccess();`

    `        binder.setDisallowedFields("id");`

    `        binder.setRequiredFields("username", "password", "emailAddress");`

    `    }`


    `}`


    #### ModelAttributes


    为了充分利用数据绑定，我们必须使用模型属性。此外，我们应该使用这些模型属性之一作为表单字段所绑定的对象。在我们的 `com.apress.prospringmvc.bookstore.web.controller.BookSearchController`
    中，我们添加了一个对象作为方法参数，Spring 将其用作绑定请求参数的对象。然而，我们可以对对象以及如何创建对象拥有更多控制。为此，我们可以使用 `org.springframework.web.bind.annotation.ModelAttribute`
    注解。该注解既可以放在方法上，也可以放在方法参数上。


    ##### 在方法上使用 ModelAttribute


    我们可以在方法上使用 `ModelAttribute` 注解来创建一个用于表单的对象（例如，在编辑或更新时），或者获取引用数据（即渲染表单所需的数据，如类别列表）。让我们修改控制器，向模型添加一个类别列表和一个
    `com.apress.prospring.bookstore.domain.BookSearchCriteria` 对象的实例（参见清单 5-24）。


    ![Image](img/square.jpg) **注意** 当 `ModelAttribute` 注解放在方法上时，该方法将在请求处理方法被调用之前被调用！


    ***清单 5-24.** 带有 ModelAttribute 方法的 BookSearchController*


    `package com.apress.prospringmvc.bookstore.web.controller;`


    `// 省略其他导入。`


    `import org.springframework.web.bind.annotation.ModelAttribute;`


    `@Controller`

    `public class BookSearchController {`


    `    @Autowired`

    `    private BookstoreService bookstoreService;`


    `    @ModelAttribute`

    `    public BookSearchCriteria criteria() {`

    `        return new BookSearchCriteria();`

    `    }`


    `    @ModelAttribute("categories")`

    `    public List<Category> getCategories() {`

    `        return this.bookstoreService.findAllCategories();`

    `    }`


    `    @RequestMapping(value = "/book/search", method = { RequestMethod.`*`GET`*
    `})`

    `    public Collection<Book> list(BookSearchCriteria criteria) {`

    `        return this.bookstoreService.findBooks(criteria);`

    `    }`

    `}`


    带有 `ModelAttribute` 注解的方法在方法参数类型方面与请求处理方法具有相同的灵活性。当然，它们不应操作响应，并且不能包含带有 `ModelAttribute`
    注解的方法参数。我们也可以让方法返回 void；但是，那样我们需要包含一个 `org.springframework.ui.Model`、`org.springframework.ui.ModelMap`
    或 `Map` 作为方法参数，并显式地将其值添加到模型中。


    该注解也可以放在请求处理方法上，表示该方法的返回值将用作模型属性。视图的名称则根据请求，使用已配置的 `org.springframework.web.servlet.RequestToViewNameTranslator`
    来推导得出。

