  raw: '#### The Service Layer


    The service layer is a very important layer in the architecture of an application.
    It can be considered the heart of our application because it exposes the functionality
    (the use cases) of the system to the user. It does this by providing a coarse-grained
    API (as mentioned in [Table 3-2](#Chapter03.html#tab_3_2)). [Listing 3-1](#Chapter03.html#list_3_1)
    describes a coarse-grained service interface.


    ***Listing 3-1.** A coarse-grained service interface*


    `package com.apress.prospringmvc.bookstore.service;`


    `import com.apress.prospringmvc.bookstore.domain.Account;`


    `public interface AccountService {`


    `    Account save(Account account);`


    `    Account login(String username, String password) throws AuthenticationException;`


    `    Account getAccount(String username);`

    `}`


    This listing is considered coarse grained because it takes a simple method call
    from the client to complete a single use case. This is in contrast to the code
    in [Listing 3-2](#Chapter03.html#list_3_2) (fine-grained service methods), which
    requires a couple of calls to perform a use case.


    ***Listing 3-2.** A fine-grained service interface*


    `package com.apress.prospringmvc.bookstore.service;`


    `import com.apress.prospringmvc.bookstore.domain.Account;`


    `public interface AccountService {`


    `    Account save(Account account);`


    `    Account getAccount(String username);`


    `    void checkPassword(Account account, String password);`


    `    void updateLastLogin(Account account);`


    `}`


    If at all possible, we should not call a sequence of methods to execute a system
    function. In fact, we should shield the user from data access and POJO interaction
    as much as possible. In an ideal world, a coarse-grained function should represent
    a single unit of work that either succeeds or fails. The user can use different
    clients (e.g., web application, web service, or desktop application); however,
    these clients should execute the same business logic. Hence, the service layer
    should be our single point of entry for the actual system (i.e., the business
    logic).


    The added benefit of having a single point of entry and coarse-grained methods
    on the service layer is that we can simply apply transactions and security at
    this layer. We don’t have to burden the different clients of our application with
    the security and transactional requirements. It is now part of the core of the
    system and generally applied through the use of AOP.


    In a web-based environment, we probably have multiple users operating on the services
    at the same time. The service must be stateless, so it is a good practice to make
    the service a singleton. In the domain model, state should be kept as much as
    possible. Keeping the service layer stateless provides an additional benefit:
    it also makes the layer thread safe.


    Keeping the service layer to a single point of entry, keeping the layer stateless,
    and applying transactions and security on that layer enable us to use other features
    of the Spring Framework to expose the service layer to different clients. For
    example, we could use configuration to easily expose our service layer over RMI
    or JMS. For more information on the remoting support of the Spring Framework,
    we suggest *Pro Spring 3* (Apress, 2012) or the online Spring Reference Guide
    ([`www.springsource.org/documentation`](http://www.springsource.org/documentation)).


    In our bookstore sample application, the `com.apress.prospringmvc.bookstore.service.BookstoreService`
    interface (see [Listing 3-3](#Chapter03.html#list_3_3)) serves as the interface
    for our service layer (there are a couple of other interfaces, but this is the
    most important one). This interface contains several coarse-grained methods. In
    most cases, it takes a single method call to execute a single use case (e.g.,
    `createOrder`).


    ***Listing 3-3.** The BookstoreService interface*


    `package com.apress.prospringmvc.bookstore.service;`


    `import java.util.List;`


    `import com.apress.prospringmvc.bookstore.domain.Account;`

    `import com.apress.prospringmvc.bookstore.domain.Book;`

    `import com.apress.prospringmvc.bookstore.domain.BookSearchCriteria;`

    `import com.apress.prospringmvc.bookstore.domain.Cart;`

    `import com.apress.prospringmvc.bookstore.domain.Category;`

    `import com.apress.prospringmvc.bookstore.domain.Order;`


    `public interface BookstoreService {`


    `    List<Book> findBooksByCategory(Category category);`


    `    Book findBook(long id);`


    `    Order findOrder(long id);`


    `    List<Book> findRandomBooks();`


    `    List<Order> findOrdersForAccount(Account account);`


    `    Order store(Order order);`


    `    List<Book> findBooks(BookSearchCriteria bookSearchCriteria);`


    `    Order createOrder(Cart cart, Account account);`


    `    List<Category> findAllCategories();`

    `}`


    As [Listing 3-3](#Chapter03.html#list_3_3) demonstrates, the service layer depends
    on the domain layer to execute the business logic. However, it also has a dependency
    on the data access layer to store and retrieve data from our underlying data store.
    The service layer can serve as the glue between one or more domain objects to
    execute a business function. The service layer should coordinate which domain
    objects it needs and how they interact together.


    The Spring Framework has no interfaces that help us implement our service layer;
    however, this shouldn’t come as a surprise. The service layer is what makes our
    application; in fact, it is specialized for our application. Nevertheless, the
    Spring Framework can help us with our architecture and programming model. We can
    use dependency injection and apply aspects to drive our transactions. All of this
    has a positive influence on our programming model.'
  trans: '

    #### 服务层


    服务层在应用程序架构中是一个非常重要的层次。它可以被视为我们应用的核心，因为它将系统的功能（即用例）暴露给用户。它通过提供一个粗粒度的 API（如表 3-2
    所述）来实现这一点。代码清单 3-1 描述了一个粗粒度的服务接口。


    ***代码清单 3-1.** 一个粗粒度的服务接口*


    `package com.apress.prospringmvc.bookstore.service;`


    `import com.apress.prospringmvc.bookstore.domain.Account;`


    `public interface AccountService {`


    `    Account save(Account account);`


    `    Account login(String username, String password) throws AuthenticationException;`


    `    Account getAccount(String username);`

    `}`


    该代码清单被认为是粗粒度的，因为它只需要客户端进行一次简单的方法调用即可完成一个用例。这与代码清单 3-2（细粒度的服务方法）中的代码形成对比，后者需要多次调用才能执行一个用例。


    ***代码清单 3-2.** 一个细粒度的服务接口*


    `package com.apress.prospringmvc.bookstore.service;`


    `import com.apress.prospringmvc.bookstore.domain.Account;`


    `public interface AccountService {`


    `    Account save(Account account);`


    `    Account getAccount(String username);`


    `    void checkPassword(Account account, String password);`


    `    void updateLastLogin(Account account);`


    `}`


    如果可能的话，我们不应该通过调用一系列方法来执行系统功能。事实上，我们应该尽可能地将用户与数据访问和 POJO 交互隔离开来。在理想情况下，一个粗粒度的函数应该代表一个要么成功要么失败的单一工作单元。用户可以使用不同的客户端（例如，Web
    应用程序、Web 服务或桌面应用程序）；然而，这些客户端应该执行相同的业务逻辑。因此，服务层应该是我们实际系统（即业务逻辑）的单一入口点。


    在服务层拥有单一入口点和粗粒度方法的额外好处是，我们可以简单地在这一层应用事务和安全性。我们不必将安全性和事务性要求强加给应用程序的不同客户端。现在，这已成为系统核心的一部分，并且通常通过使用
    AOP 来应用。


    在基于 Web 的环境中，我们可能有多个用户同时操作服务。服务必须是无状态的，因此将服务设为单例是一个好做法。在领域模型中，应尽可能保持状态。保持服务层无状态还有一个额外的好处：它也使该层成为线程安全的。


    将服务层保持为单一入口点、保持该层无状态，并在该层应用事务和安全性，使我们能够利用 Spring 框架的其他特性将服务层暴露给不同的客户端。例如，我们可以使用配置轻松地通过
    RMI 或 JMS 暴露我们的服务层。有关 Spring 框架远程处理支持的更多信息，我们推荐阅读《Pro Spring 3》（Apress，2012 年）或在线
    Spring 参考指南（[`www.springsource.org/documentation`](http://www.springsource.org/documentation)）。


    在我们的书店示例应用程序中，`com.apress.prospringmvc.bookstore.service.BookstoreService` 接口（见代码清单
    3-3）充当了我们服务层的接口（还有其他几个接口，但这是最重要的一个）。该接口包含几个粗粒度的方法。在大多数情况下，执行一个用例只需要一次方法调用（例如，`createOrder`）。


    ***代码清单 3-3.** BookstoreService 接口*


    `package com.apress.prospringmvc.bookstore.service;`


    `import java.util.List;`


    `import com.apress.prospringmvc.bookstore.domain.Account;`

    `import com.apress.prospringmvc.bookstore.domain.Book;`

    `import com.apress.prospringmvc.bookstore.domain.BookSearchCriteria;`

    `import com.apress.prospringmvc.bookstore.domain.Cart;`

    `import com.apress.prospringmvc.bookstore.domain.Category;`

    `import com.apress.prospringmvc.bookstore.domain.Order;`


    `public interface BookstoreService {`


    `    List<Book> findBooksByCategory(Category category);`


    `    Book findBook(long id);`


    `    Order findOrder(long id);`


    `    List<Book> findRandomBooks();`


    `    List<Order> findOrdersForAccount(Account account);`


    `    Order store(Order order);`


    `    List<Book> findBooks(BookSearchCriteria bookSearchCriteria);`


    `    Order createOrder(Cart cart, Account account);`


    `    List<Category> findAllCategories();`

    `}`


    如代码清单 3-3 所示，服务层依赖于领域层来执行业务逻辑。然而，它也依赖于数据访问层来从底层数据存储中存储和检索数据。服务层可以作为连接一个或多个领域对象以执行业务功能的粘合剂。服务层应该协调它需要哪些领域对象以及它们如何相互交互。


    Spring 框架没有提供帮助我们实现服务层的接口；但这并不令人意外。服务层是构成我们应用程序的部分；事实上，它是为我们的应用程序专门定制的。尽管如此，Spring
    框架可以帮助我们构建架构和编程模型。我们可以使用依赖注入并应用切面来驱动我们的事务。所有这些都对我们的编程模型产生了积极的影响。

