  trans: '

    #### 流程概念


    尽管 Web Flow 提供了众多特性和优势，但其核心始终围绕着“流程”（难怪它也被称为 Web *Flow*）。在深入探讨之前，我们先退一步，了解什么是流程以及它的设计模型。这将极大地帮助你理解
    Web Flow 的目标以及它如何为你提供帮助。


    流程是大多数应用程序中自然存在的事物（参见图 10-1）。一个基本的例子是向导。想象一个网店订单向导，它要求你按照几个步骤来下订单。这些步骤就构成了一个流程。你从第一步开始，填写一些身份信息，例如你的名和姓，然后点击“下一步”按钮。这会带你进入第二步，询问你将订单运送到哪里。第三步也是最后一步，允许你输入配送选项：运输类型、你是否希望包裹在某个日期之前送达（如果包裹在那之前未备齐，可能会分多次发货），等等。如果这个向导设计得不错，它应该允许你在步骤之间前后导航，并记住你在流程中为该特定步骤输入的状态（数据）。每个步骤都是流程中的一小部分。它们通过某种导航形式连接在一起。有时你还可以选择跳过某个步骤。在流程结束时，你可以完成你的流程。在我们的例子中，这将处理你的订单，并确保你的产品尽快送达。


    ![图片](img/9781430241553_Fig10-01.jpg)


    ***图 10-1.** 应用程序中的基本流程*


    Web Flow 的全部意义就在于创建这些流程，你需要通过管理不同流程步骤之间的状态、表达导航等方式来实现。到目前为止，我们已经讨论了流程的核心方面；然而，流程还有一些其他巧妙的功能。我们接下来将讨论这些。


    #### 细粒度作用域


    Web Flow 的第一个主要优势是它增加了额外的作用域。毫无疑问，你已经注意到 Servlet 规范声明了三个作用域，你的应用程序可以在其中保留状态。


    作用域不过是一个映射表，你可以在其中存储*键值对*，根据作用域类型的不同，这些键值对会存储一段确定的时间。Servlet 规范定义了三个作用域：应用程序（application）、会话（session）和请求（request）。


    在表 10-1 中，我们将简要总结不同的作用域，并解释你应该如何使用它们。尽管对于任何做过 Java Web 开发的人来说，这都是一个非常基础的话题，但我们建议你快速浏览一下，以免遗漏任何内容。


    ![图片](img/9781430241553_tab10-01.jpg)


    你可能会想，这与 Web Flow 有什么关系。让我们看一个使用我们书店 Web 应用程序的例子。就像任何在线商店一样，我们有一个订单和结账流程。在这个流程的第一步，用户可以选择一个类别。类别可以是
    IT、科幻、惊悚等。在下一步中，可以从之前选择的类别中选择书籍。最后，用户将能够选择一些选项，例如配送详情。然而，每个步骤都在单独的页面上。在这个例子中，我们将有三个页面。当用户确认订单时，我们需要找到这些信息（我们在前三个页面中收集的），并据此创建订单。我们需要在这些不同步骤之间的某个地方存储这些数据；问题是我们应该把这些数据存储在哪里？让我们看看一些选项：


    *   **应用程序作用域：** 显然，我们不希望用户 x 的信息对用户 y 可见。这不仅是不希望的，还会造成安全漏洞，使得一个用户的敏感数据可能对其他用户可见。

    *   **请求作用域：** 这也是一个糟糕的选择，因为你无法跨多个页面存储数据；请求作用域在每次页面渲染后都会被销毁。你可以通过添加隐藏字段来将数据附带在页面上，但这通常是一个坏主意。虽然这种解决方案将数据卸载到客户端（在某些情况下可能被视为优点），但它也可能引发安全漏洞（如果你有一个内部状态，不应该对客户端可见，但又需要保留，该怎么办？），而且你必须在代码中手动管理它。简而言之，请求作用域的生命周期太短，无法优雅地满足我们的需求。

    *   **会话作用域：** 好吧，我们别无选择！虽然这个作用域通常是这三个选项中最好的，但它也有一些缺点。我们将在接下来的段落中讨论这些缺点，让你了解使用它时会面临的问题。最后，我们将研究
    Web Flow 如何帮助你克服这个作用域的缺点。


    将会话数据存储的问题归结为清理和管理。例如，考虑一下当用户完成订单并在应用程序中做其他事情时，我们的数据会发生什么。这些数据会无用地停留在会话中，直到会话超时吗？


    是的，会这样。有很多机制可以帮助你从会话中移除数据，但没有一个是保证有效的。这可能是一个大胆的说法；但是，请记住，用户可以随心所欲：点击后退按钮、跳出你的用例、在你的应用程序中手动输入另一个
    URL，等等。


    另外，你打算如何在会话映射表中命名你的键：`myData`？你确定之前没有其他人使用过这个键吗？会话可以被你的 Web 应用程序中的任何组件使用，因此你必须开始为你的键添加命名空间（例如，`page.x.data`）。

    '
- fmt: 'So, what do you store on the `session`? It must be good for something! Consider
    this example: after a user logs in, you probably want to maintain a security context
    containing data from the authenticated user. This information might be needed
    from anywhere in the application—it might even be required by *every* page. For
    example, you might want to put some personal information (such as the user''s
    first and last name) in a header section that is automatically shown on every
    page. This kind of information deserves to live and die with the user''s session;
    in this case, the session is clearly the right candidate for storing this kind
    of context data. *Context data* refers to data that is tightly coupled to the
    session or the application itself; it is data that spans a greater use than a
    single process or use case within the application.


    But in this example, we are talking about plain user data (data captured via a
    form for a specific process within the application), which is inherently different
    from context data. The user walks through multiple screens and enters data in
    each one of them. You will need that user data, not only for the current view,
    but also for subsequent views.


    Of course, you may be wondering why we are making a fuss about keeping data on
    the session longer than needed. Well, your session should be kept as small as
    possible; [Table 10-2](#Chapter10.html#tab_10_2) lists some of the more important
    reasons for this (albeit others probably exist).


    ![Image](images/9781430241553_tab10-02.jpg)


    Thus far, we have seen that storing a state is not as easy as it seems. The scopes
    made available by the servlet specification don''t give us much in the way of
    choices; and in most cases, this would cause us to overuse the session. This might
    become a problem later in the application''s lifecycle as it continues to grow.


    Web Flow offers a solution to this problem by introducing five new scopes: *conversation*,
    *flow*, *view*, *flash*, and *request* (see [Figure 10-2](#Chapter10.html#fig_10_2)).


    We won''t cover them into detail here; however, be aware that they are positioned
    between the session and request scopes. For example; something put on a flow scope
    would survive longer than request, but not as long as a session scope. Flash scope
    might survive longer than request, but not as long as a flow scope. Also, the
    content of these scopes is automatically managed for you with more guarantees
    than standard session housekeeping. We will discuss how this works in the upcoming
    chapters.


    ![Image](images/9781430241553_Fig10-02.jpg)


    **Figure 10-2.** Web Flow''s additional scopes


    These extra scopes are stored on the session scope. However, the Web Flow machinery
    is specifically designed to make sure you don''t have to worry about the creation
    and cleanup of these extra scopes. This is the point where you start to benefit
    from using Web Flow''s automatic state management.


    ## Automatic State Management


    Whenever Web Flow executes an action within your flow, it will store the state
    you used on the different Web Flow scopes in a state snapshot. Although we haven''t
    seen any introduction to Web Flow terminology yet, a flow is made up of different
    *actions*. For example, an action could be displaying a page or executing logic
    on an application controller. The data that is put on the different Web Flow scopes
    is automatically managed and versioned for you. Each time Web Flow returns from
    executing a requested action, it creates a snapshot of your data, including all
    its internal *state* information.


    You can compare this process with that of taking pictures. Before returning to
    the browser, Web Flow takes a picture of the data and stores it, which means you
    can potentially refer back to it later, if required. For example, you can go back
    to a previous state by using the Back button of your browser. It is important
    to realize that this *snapshotting* feature is built into Web Flow and is automatically
    at your disposal. You can configure how many snapshots should be stored.


    In addition to storing snapshots of all the data associated with a flow, Web Flow
    can also maintain multiple flows, or *executions*, at the same time (see [Figure
    10-3](#Chapter10.html#fig_10_3)). Execution is a bit of an abstract term; the
    best way to think of it is as the runtime variant of a flow and all the elements
    that flow includes. In this case, flow refers to the definition itself (i.e.,
    the XML that composes the flow); whereas execution refers to the in-memory representation
    of a flow once it has been started. This execution includes all the flow''s states
    and, possibly, all subflows started by it (we will explain subflows in the next
    chapter). Web Flow retains different flow executions for you. For example, assume
    you start an execution involving flow x, followed by an execution involving flow
    y (i.e., after starting flow x, you abandon it at some point to start a completely
    separate flow y). You can still go back to execution of flow x simply by using
    your browser''s Back button. Each flow execution will retain its own set of state
    snapshots. Similar to the way you can configure the maximum number of snapshots
    for a flow, you can also configure the maximum number of active executions. We
    will discuss both settings in more detail in [Chapter 12](#Chapter12.html#ch12).


    ![Image](images/9781430241553_Fig10-03.jpg)


    **Figure 10-3.** The Web Flow state-management mechanism'
  raw: 'So, what do you store on the session? It must be good for something! Consider
    this example: after a user logs in, you probably want to maintain a security context
    containing data from the authenticated user. This information might be needed
    from anywhere in the application—it might even be required by *every* page. For
    example, you might want to put some personal information (such as the user''s
    first and last name) in a header section that is automatically shown on every
    page. This kind of information deserves to live and die with the user''s session;
    in this case, the session is clearly the right candidate for storing this kind
    of context data. *Context data* refers to data that is tightly coupled to the
    session or the application itself; it is data that spans a greater use than a
    single process or use case within the application.


    But in this example, we are talking about plain user data (data captured via a
    form for a specific process within the application), which is inherently different
    from context data. The user walks through multiple screens and enters data in
    each one of them. You will need that user data, not only for the current view,
    but also for subsequent views.


    Of course, you may be wondering why we are making a fuss about keeping data on
    the session longer than needed. Well, your session should be kept as small as
    possible; [Table 10-2](#Chapter10.html#tab_10_2) lists some of the more important
    reasons for this (albeit others probably exist).


    ![Image](images/9781430241553_tab10-02.jpg)


    Thus far, we have seen that storing a state is not as easy as it seems. The scopes
    made available by the servlet specification don''t give us much in the way of
    choices; and in most cases, this would cause us to overuse the session. This might
    become a problem later in the application''s lifecycle as it continues to grow.


    Web Flow offers a solution to this problem by introducing five new scopes: *conversation*,
    *flow*, *view*, *flash*, and *request* (see [Figure 10-2](#Chapter10.html#fig_10_2)).


    We won''t cover them into detail here; however, be aware that they are positioned
    between the session and request scopes. For example; something put on a flow scope
    would survive longer than request, but not as long as a session scope. Flash scope
    might survive longer than request, but not as long as a flow scope. Also, the
    content of these scopes is automatically managed for you with more guarantees
    than standard session housekeeping. We will discuss how this works in the upcoming
    chapters.


    ![Image](images/9781430241553_Fig10-02.jpg)


    ***Figure 10-2.** Web Flow''s additional scopes*


    These extra scopes are stored on the session scope. However, the Web Flow machinery
    is specifically designed to make sure you don''t have to worry about the creation
    and cleanup of these extra scopes. This is the point where you start to benefit
    from using Web Flow''s automatic state management.


    #### Automatic State Management


    Whenever Web Flow executes an action within your flow, it will store the state
    you used on the different Web Flow scopes in a state snapshot. Although we haven''t
    seen any introduction to Web Flow terminology yet, a flow is made up of different
    *actions*. For example, an action could be displaying a page or executing logic
    on an application controller. The data that is put on the different Web Flow scopes
    is automatically managed and versioned for you. Each time Web Flow returns from
    executing a requested action, it creates a snapshot of your data, including all
    its internal *state* information.


    You can compare this process with that of taking pictures. Before returning to
    the browser, Web Flow takes a picture of the data and stores it, which means you
    can potentially refer back to it later, if required. For example, you can go back
    to a previous state by using the Back button of your browser. It is important
    to realize that this *snapshotting* feature is built into Web Flow and is automatically
    at your disposal. You can configure how many snapshots should be stored.


    In addition to storing snapshots of all the data associated with a flow, Web Flow
    can also maintain multiple flows, or *executions*, at the same time (see [Figure
    10-3](#Chapter10.html#fig_10_3)). Execution is a bit of an abstract term; the
    best way to think of it is as the runtime variant of a flow and all the elements
    that flow includes. In this case, flow refers to the definition itself (i.e.,
    the XML that composes the flow); whereas execution refers to the in-memory representation
    of a flow once it has been started. This execution includes all the flow''s states
    and, possibly, all subflows started by it (we will explain subflows in the next
    chapter). Web Flow retains different flow executions for you. For example, assume
    you start an execution involving flow x, followed by an execution involving flow
    y (i.e., after starting flow x, you abandon it at some point to start a completely
    separate flow y). You can still go back to execution of flow x simply by using
    your browser''s Back button. Each flow execution will retain its own set of state
    snapshots. Similar to the way you can configure the maximum number of snapshots
    for a flow, you can also configure the maximum number of active executions. We
    will discuss both settings in more detail in [Chapter 12](#Chapter12.html#ch12).


    ![Image](images/9781430241553_Fig10-03.jpg)


    ***Figure 10-3.** The Web Flow state-management mechanism*'
  trans: '

    那么，会话中到底该存储些什么呢？它肯定有它的用处！考虑这个例子：用户登录后，你可能希望维护一个包含已验证用户数据的安全上下文。应用程序中的任何地方都可能需要这些信息——甚至*每个*页面都可能需要。例如，你可能希望将一些个人信息（如用户的姓名）放在每个页面自动显示的页眉区域中。这类信息理应与用户的会话同生共死；在这种情况下，会话显然是存储此类上下文数据的正确选择。*上下文数据*指的是与会话或应用程序本身紧密耦合的数据；它的使用范围比应用程序中的单个流程或用例更广。


    但在这个例子中，我们讨论的是普通的用户数据（通过表单为应用程序中的特定流程捕获的数据），这与上下文数据本质上是不同的。用户会浏览多个屏幕，并在每个屏幕中输入数据。你不仅需要当前视图的用户数据，还需要后续视图的数据。


    当然，你可能会疑惑为什么我们要对在会话中保留数据超过必要时间这件事如此小题大做。嗯，你的会话应该尽可能保持精简；表 10-2 列出了一些更重要的原因（尽管可能还有其他原因）。


    ![图片](img/9781430241553_tab10-02.jpg)


    到目前为止，我们已经看到存储状态并不像看起来那么简单。Servlet 规范提供的范围并没有给我们太多选择；在大多数情况下，这会导致我们过度使用会话。随着应用程序的持续增长，这可能会在应用程序生命周期的后期成为一个问题。


    Web Flow 通过引入五个新的作用域来解决这个问题：*conversation*、*flow*、*view*、*flash* 和 *request*（参见图
    10-2）。


    我们不会在这里详细讨论它们；但请注意，它们位于会话和请求作用域之间。例如，放在 flow 作用域中的内容比请求存活得更久，但不如会话作用域长。Flash 作用域可能比请求存活得更久，但不如
    flow 作用域长。此外，这些作用域的内容会自动为您管理，比标准的会话维护更有保障。我们将在接下来的章节中讨论其工作原理。


    ![图片](img/9781430241553_Fig10-02.jpg)


    ***图 10-2.** Web Flow 的额外作用域*


    这些额外的作用域存储在会话作用域中。然而，Web Flow 机制是专门设计的，以确保您不必担心这些额外作用域的创建和清理。这就是您开始受益于使用 Web Flow
    自动状态管理的地方。


    #### 自动状态管理


    每当 Web Flow 在您的流程中执行一个操作时，它都会将您在不同 Web Flow 作用域上使用的状态存储在一个状态快照中。虽然我们还没有介绍任何 Web
    Flow 术语，但一个流程由不同的*操作*组成。例如，一个操作可以是显示一个页面，或者在应用程序控制器上执行逻辑。放置在不同 Web Flow 作用域上的数据会自动为您管理和版本化。每次
    Web Flow 从执行请求的操作返回时，它都会创建您数据的快照，包括其所有内部*状态*信息。


    您可以将这个过程比作拍照。在返回浏览器之前，Web Flow 会拍摄数据的快照并存储起来，这意味着如果需要，您以后可以回溯到它。例如，您可以使用浏览器的“后退”按钮返回到之前的状态。重要的是要认识到，这种*快照*功能是内置于
    Web Flow 中的，并且可以自动使用。您可以配置应存储多少个快照。


    除了存储与流程相关的所有数据的快照外，Web Flow 还可以同时维护多个流程或*执行实例*（参见图 10-3）。执行实例是一个有点抽象的概念；最好的理解方式是将其视为流程及其包含的所有元素的运行时变体。在这种情况下，流程指的是定义本身（即组成流程的
    XML）；而执行实例指的是流程启动后的内存表示。这个执行实例包括流程的所有状态，以及可能由它启动的所有子流程（我们将在下一章解释子流程）。Web Flow
    会为您保留不同的流程执行实例。例如，假设您启动了一个涉及流程 x 的执行实例，然后启动了一个涉及流程 y 的执行实例（即，在启动流程 x 后，您在某个点放弃它，转而启动一个完全独立的流程
    y）。您仍然可以通过使用浏览器的“后退”按钮返回到流程 x 的执行实例。每个流程执行实例都会保留自己的一组状态快照。类似于您可以为流程配置最大快照数量，您也可以配置最大活动执行实例数量。我们将在第
    12 章中更详细地讨论这两个设置。


    ![图片](img/9781430241553_Fig10-03.jpg)


    ***图 10-3.** Web Flow 状态管理机制*

