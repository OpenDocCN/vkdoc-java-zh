- fmt: "#### The On Exception Transition\n\nIf you work with the on exception transition,\
    \ you can specify the fully qualified exception class as the attribute’s value.\
    \ The transition will automatically be triggered if one of the other executions\
    \ in that state triggers the exception or any of its subclasses. You can only\
    \ specify `on` or `on-exception` for a given transition, not both. For example,\
    \ in the authentication flow, you could have added an on exception transition\
    \ like the one in [Listing 12-11](#Chapter12.html#list_12_11).\n\n**Listing 12-11.**\
    \ A view State with an On Exception Transition\n\n```\n<view-state id=\"authenticate\"\
    \ view=\"login\" model=\"authenticationForm\">\n    <transition on=\"authenticate\"\
    \ to=\"authenticationOk\">\n        <evaluate expression=\"authenticationController.authenticate(flowScope.authenticationForm,\
    \ externalContext, messageContext)\"/>\n    </transition>\n\n    <transition on=\"\
    previous\" to=\"previous\"/>\n\n    <transition on-exception=\"com.apress.prospringmvc.bookstore.service.AuthenticationException\"\
    \n                to=\"authenticate\"/>\n</view-state>\n```\n\nWhen dealing with\
    \ the exception inside the flow using the on exception transition, we need to\
    \ rethrow the `com.apress.prospringmvc.bookstore.AuthenticationException` in the\
    \ `AuthenticationController` instead of catching it and returning an error event.\
    \ In that case, the return value of the method is `void`.\n\nIf no exception occurred,\
    \ then the execution of the application controller method completes normally,\
    \ without a result value. This would automatically be translated into a successful\
    \ event by Web Flow, and the execution would continue as normal. If the `AuthenticationException`\
    \ error is thrown, then the on exception transition is executed. In this case,\
    \ the `to` attribute transitions to the same view state and renders the same view.\
    \ This allows us to display the error messages added by the application controller’s\
    \ `authenticate` method.\n\n#### Custom Exception Handler\n\nFlow execution exception\
    \ handlers can be attached to either a flow or a state using the `<exception-handler\
    \ bean=\"\">` element. When an exception occurs in a flow execution, Spring Web\
    \ Flow will first try the exception handlers attached to the current state of\
    \ the flow. If none handles the exception, the exception handlers attached to\
    \ the flow itself will be tried. If the exception is not handled by any of the\
    \ available exception handlers, it will be rethrown.\n\nThe bean attribute of\
    \ this element identifies an `org.springframework.webflow.engine.FlowExecutionExceptionHandler`\
    \ bean available in the Spring application context (see [Listing 12-12](#Chapter12.html#list_12_12)).\
    \ You can attach any number of exception handlers to the flow or any of its states.\n\
    \n**Listing 12-12.** The FlowExcecutionExceptionHandler Interface\n\n```\npackage\
    \ org.springframework.webflow.engine;\n\nimport org.springframework.webflow.engine.support.TransitionExecutingFlowExecutionExceptionHandler;\n\
    import org.springframework.webflow.execution.FlowExecutionException;\n\npublic\
    \ interface FlowExecutionExceptionHandler {\n\n    public boolean canHandle(FlowExecutionException\
    \ exception);\n    public void handle(FlowExecutionException exception, RequestControlContext\
    \ context);\n}\n```\n\nThe first method has an `org.springframework.webflow.execution.FlowExecutionException`\
    \ as its parameter. Web Flow wraps an exception that was thrown in the flow execution\
    \ inside a `FlowExecutionException`. You can access the original thrown exception\
    \ by calling the `getCause` method on it. It is also possible that the actual\
    \ type is one of the different subclasses of a more specific Web Flow exception\
    \ (e.g., an `org.springframework.webflow.execution.ActionExecutionException`,\
    \ which is a subclass of `FlowExecutionException`). In this `canHandle` method,\
    \ you can determine if you want the exception handler to be invoked for the type\
    \ of exception. If the `canHandle` method returns `true` for a given exception\
    \ type, then the second method, `handle`, is called to let you handle the exception.\
    \ However, if you look at the return type of the `handle` method, you will see\
    \ that there is more difficulty involved than just handling the exception and\
    \ returning `void`.\n\nWhere an on exception transition just delegates navigation\
    \ to Web Flow (i.e., upon a certain exception, it navigates to a given state),\
    \ a custom exception handler is expected to drive the navigation itself, after\
    \ dealing with the exception.\n\nIf implemented incorrectly, a `FlowExecutionExceptionHandler`\
    \ can leave a flow execution in an invalid state, which can render the flow execution\
    \ unusable or its future use undefined. For example, you define a `FlowExecutionExceptionHandler`\
    \ on `flow` level. When an exception gets thrown at flow session startup (e.g.,\
    \ in an `<on-start>` element) the exception gets routed to the exception handler.\
    \ The exception handler must transition the flow to its start state after dealing\
    \ with the exception. The handler should not simply return—thereby leaving the\
    \ flow with no current state set—because that would leave the flow execution in\
    \ an undetermined state. This extra complexity is the tradeoff you have to make\
    \ when deciding to use the `FlowExecutionExceptionHandler` over the on exception\
    \ attribute. The former gives you more control over the exception-handling process,\
    \ but it also confers more complexity. The latter does everything for you, but\
    \ you don’t have any programmatic control over the exception-handling process."
  raw: '#### The On Exception Transition


    If you work with the on exception transition, you can specify the fully qualified
    exception class as the attribute’s value. The transition will automatically be
    triggered if one of the other executions in that state triggers the exception
    or any of its subclasses. You can only specify `on` or `on-exception` for a given
    transition, not both. For example, in the authentication flow, you could have
    added an on exception transition like the one in [Listing 12-11](#Chapter12.html#list_12_11).


    ***Listing 12-11.** A view State with an On Exception Transition*


    `<view-state id="authenticate" view="login" model="authenticationForm">`

    `    <transition on="authenticate" to="authenticationOk">`

    `        <evaluate expression="authenticationController.authenticate`![Image](images/U002.jpg)

    `(flowScope.authenticationForm,` ![Image](images/U002.jpg)

    `                              externalContext, messageContext)"/>`

    `     </transition>`


    `     <transition on="previous" to="previous"/>`


    `     <transition on-exception="com.apress.prospringmvc.bookstore.`![Image](images/U002.jpg)

    `                               service.AuthenticationException"`![Image](images/U002.jpg)

    `                               to="authenticate"/>`

    `</view-state>`


    When dealing with the exception inside the flow using the on exception transition,
    we need to rethrow the `com.apress.prospringmvc.bookstore.AuthenticationException`
    in the `AuthenticationController` instead of catching it and returning an error
    event. In that case, the return value of the method is `void`.


    If no exception occurred, then the execution of the application controller method
    completes normally, without a result value. This would automatically be translated
    into a successful event by Web Flow, and the execution would continue as normal.
    If the `AuthenticationException` error is thrown, then the on exception transition
    is executed. In this case, the `to` attribute transitions to the same view state
    and renders the same view. This allows us to display the error messages added
    by the application controller’s `authenticate` method.


    #### Custom Exception Handler


    Flow execution exception handlers can be attached to either a flow or a state
    using the `<exception-handler bean="">` element. When an exception occurs in a
    flow execution, Spring Web Flow will first try the exception handlers attached
    to the current state of the flow. If none handles the exception, the exception
    handlers attached to the flow itself will be tried. If the exception is not handled
    by any of the available exception handlers, it will be rethrown.


    The bean attribute of this element identifies an `org.springframework.webflow.engine
    .FlowExecutionExceptionHandler` bean available in the Spring application context
    (see [Listing 12-12](#Chapter12.html#list_12_12)). You can attach any number of
    exception handlers to the flow or any of its states.


    ***Listing 12-12.** The FlowExcecutionExceptionHandler Interface*


    `package org.springframework.webflow.engine;`


    `import org.springframework.webflow.engine.support.`

    `       TransitionExecutingFlowExecutionExceptionHandler;`

    `import org.springframework.webflow.execution.FlowExecutionException;`


    `public interface FlowExecutionExceptionHandler {`


    `    public boolean canHandle(FlowExecutionException exception);`

    `    public void handle(FlowExecutionException exception, RequestControlContext`![Image](images/U002.jpg)

    `    context);`

    `}`


    The first method has an `org.springframework.webflow.execution.FlowExecutionException`
    as its parameter. Web Flow wraps an exception that was thrown in the flow execution
    inside a `FlowExecutionException`. You can access the original thrown exception
    by calling the `getCause` method on it. It is also possible that the actual type
    is one of the different subclasses of a more specific Web Flow exception (e.g.,
    an `org.springframework.webflow.execution.ActionExecutionException`, which is
    a subclass of `FlowExecutionException`). In this `canHandle` method, you can determine
    if you want the exception handler to be invoked for the type of exception. If
    the `canHandle` method returns `true` for a given exception type, then the second
    method, `handle`, is called to let you handle the exception. However, if you look
    at the return type of the `handle` method, you will see that there is more difficulty
    involved than just handling the exception and returning `void`.


    Where an on exception transition just delegates navigation to Web Flow (i.e.,
    upon a certain exception, it navigates to a given state), a custom exception handler
    is expected to drive the navigation itself, after dealing with the exception.


    If implemented incorrectly, a `FlowExecutionExceptionHandler` can leave a flow
    execution in an invalid state, which can render the flow execution unusable or
    its future use undefined. For example, you define a `FlowExecutionExceptionHandler`
    on `flow` level. When an exception gets thrown at flow session startup (e.g.,
    in an `<on-start>` element) the exception gets routed to the exception handler.
    The exception handler must transition the flow to its start state after dealing
    with the exception. The handler should not simply return—thereby leaving the flow
    with no current state set—because that would leave the flow execution in an undetermined
    state. This extra complexity is the tradeoff you have to make when deciding to
    use the `FlowExecutionExceptionHandler` over the on exception attribute. The former
    gives you more control over the exception-handling process, but it also confers
    more complexity. The latter does everything for you, but you don’t have any programmatic
    control over the exception-handling process.'
  trans: '

    #### 关于异常转移


    如果使用异常转移，可以将完全限定的异常类指定为属性的值。当该状态中的其他执行之一触发了该异常或其任何子类时，转移将自动触发。对于给定的转移，只能指定 `on`
    或 `on-exception`，不能同时指定两者。例如，在身份验证流程中，可以像代码清单 12-11 那样添加一个异常转移。


    ***代码清单 12-11.** 带有异常转移的视图状态*


    `<view-state id="authenticate" view="login" model="authenticationForm">`

    `    <transition on="authenticate" to="authenticationOk">`

    `        <evaluate expression="authenticationController.authenticate`![Image](img/U002.jpg)

    `(flowScope.authenticationForm,` ![Image](img/U002.jpg)

    `                              externalContext, messageContext)"/>`

    `     </transition>`


    `     <transition on="previous" to="previous"/>`


    `     <transition on-exception="com.apress.prospringmvc.bookstore.`![Image](img/U002.jpg)

    `                               service.AuthenticationException"`![Image](img/U002.jpg)

    `                               to="authenticate"/>`

    `</view-state>`


    当在流程内部使用异常转移处理异常时，我们需要在 `AuthenticationController` 中重新抛出 `com.apress.prospringmvc.bookstore.AuthenticationException`，而不是捕获它并返回一个错误事件。在这种情况下，方法的返回值是
    `void`。


    如果没有发生异常，则应用程序控制器方法的执行会正常完成，且不返回结果值。Web Flow 会自动将其转换为一个成功事件，执行将照常继续。如果抛出了 `AuthenticationException`
    错误，则会执行异常转移。在这种情况下，`to` 属性会转移到同一个视图状态并渲染同一个视图。这使我们能够显示由应用程序控制器的 `authenticate`
    方法添加的错误消息。


    #### 自定义异常处理器


    可以使用 `<exception-handler bean="">` 元素将流程执行异常处理器附加到流程或状态上。当流程执行中发生异常时，Spring Web
    Flow 将首先尝试附加到流程当前状态的异常处理器。如果没有处理器处理该异常，则会尝试附加到流程本身的异常处理器。如果异常未被任何可用的异常处理器处理，它将被重新抛出。


    该元素的 `bean` 属性标识了 Spring 应用程序上下文中可用的 `org.springframework.webflow.engine.FlowExecutionExceptionHandler`
    Bean（参见代码清单 12-12）。你可以将任意数量的异常处理器附加到流程或其任何状态上。


    ***代码清单 12-12.** FlowExcecutionExceptionHandler 接口*


    `package org.springframework.webflow.engine;`


    `import org.springframework.webflow.engine.support.`

    `       TransitionExecutingFlowExecutionExceptionHandler;`

    `import org.springframework.webflow.execution.FlowExecutionException;`


    `public interface FlowExecutionExceptionHandler {`


    `    public boolean canHandle(FlowExecutionException exception);`

    `    public void handle(FlowExecutionException exception, RequestControlContext`![Image](img/U002.jpg)

    `    context);`

    `}`


    第一个方法以 `org.springframework.webflow.execution.FlowExecutionException` 作为参数。Web
    Flow 将流程执行中抛出的异常包装在 `FlowExecutionException` 中。你可以通过调用其 `getCause` 方法来访问原始抛出的异常。实际类型也可能是更具体的
    Web Flow 异常的不同子类之一（例如，`org.springframework.webflow.execution.ActionExecutionException`，它是
    `FlowExecutionException` 的子类）。在这个 `canHandle` 方法中，你可以决定是否希望针对该异常类型调用异常处理器。如果 `canHandle`
    方法对给定的异常类型返回 `true`，则会调用第二个方法 `handle` 让你处理该异常。然而，如果你查看 `handle` 方法的返回类型，你会发现处理异常并返回
    `void` 并非易事，其中涉及更多复杂性。


    异常转移只是将导航委托给 Web Flow（即，在发生特定异常时，导航到给定状态），而自定义异常处理器则需要在处理异常后自行驱动导航。


    如果实现不正确，`FlowExecutionExceptionHandler` 可能会使流程执行处于无效状态，这可能导致流程执行无法使用或使其未来行为不确定。例如，你在
    `flow` 级别定义了一个 `FlowExecutionExceptionHandler`。当在流程会话启动时（例如，在 `<on-start>` 元素中）抛出异常时，该异常会被路由到异常处理器。异常处理器必须在处理异常后将流程转换到其起始状态。处理器不应简单地返回——从而让流程没有设置当前状态——因为这将使流程执行处于不确定状态。这种额外的复杂性是你在决定使用
    `FlowExecutionExceptionHandler` 而非异常转移属性时必须权衡的。前者让你对异常处理过程有更多控制，但也带来了更多复杂性。后者为你处理一切，但你对异常处理过程没有任何程序化控制。

