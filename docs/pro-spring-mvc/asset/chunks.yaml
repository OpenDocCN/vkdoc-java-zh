    ##### 使用 web.xml


    `web.xml` 文件自 Servlet 规范诞生之初就已存在。它是一个 XML 文件，包含启动 Servlet、监听器和/或过滤器所需的所有配置。清单
    4-1 展示了启动 `DispatcherServlet` 所需的最小 `web.xml` 配置。`web.xml` 文件必须位于 Web 应用程序的 `WEB-INF`
    目录中（这是 Servlet 规范规定的）。


    ***清单 4-1.** web.xml 配置（Servlet 3.0）*


    `<web-app version="3.0"`


    `        xsi:schemaLocation=http://java.sun.com/xml/ns/javaee`

    `                           http://java.sun.com/xml/ns/javaee/web-app_3_0.xsd`

    `        metadata-complete="true">`


    `    <servlet>`

    `        <servlet-name>bookstore</servlet-name>`

    `        <servlet-class>`

    `            org.springframework.web.servlet.DispatcherServlet`

    `        </servlet-class>`

    `        <load-on-startup>1</load-on-startup>`

    `    </servlet>`


    `    <servlet-mapping>`

    `        <servlet-name>bookstore</servlet-name>`

    `        <url-pattern>/*</url-pattern>`

    `    </servlet-mapping>`

    `</web-app>`


    ![Image](img/square.jpg) **注意** 默认情况下，Dispatcher Servlet 会从 `WEB-INF` 目录加载名为 `[servletname]-servlet.xml`
    的文件。


    `web-app` 元素中的 `metadata-complete` 属性指示 Servlet 容器不要扫描类路径以查找 `javax.servlet.ServletContainerInitializer`
    的实现；也不会扫描 `web-fragment.xml` 文件。将此属性添加到 `web.xml` 中可以显著缩短启动时间，因为扫描类路径在大型应用程序中可能会花费相当长的时间。


    ##### 使用 web-fragment.xml


    `web-fragment.xml` 特性自 Servlet 规范 3.0 版本起可用，它允许对 Web 应用程序进行更加模块化的配置。`web-fragment.xml`
    必须位于 jar 文件的 META-INF 目录中。它不会被检测到位于 Web 应用程序的 META-INF 中；它必须位于 jar 文件中。`web-fragment.xml`
    可以包含与 `web.xml` 相同的元素（参见清单 4-2）。


    这种方法的好处是，每个打包为 jar 文件的模块都可以为 Web 应用程序的配置做出贡献。这也可以被视为一个缺点，因为现在你将配置分散到了代码库中，这在大型项目中可能会带来麻烦。


    ***清单 4-2.** web-fragment.xml 配置（Servlet 3.0）*


    `<web-fragment version="3.0"`


    `  xsi:schemaLocation="http://java.sun.com/xml/ns/javaee`

    `                      http://java.sun.com/xml/ns/javaee/web-fragment_3_0.xsd">`


    `    <servlet>`

    `        <servlet-name>bookstore</servlet-name>`

    `        <servlet-class>`

    `            org.springframework.web.servlet.DispatcherServlet`

    `        </servlet-class>`

    `        <load-on-startup>1</load-on-startup>`

    `    </servlet>`


    `    <servlet-mapping>`

    `        <servlet-name>bookstore</servlet-name>`

    `        <url-pattern>/*</url-pattern>`

    `    </servlet-mapping>`

    `</web-fragment>`


    ##### 使用 ServletContainerInitializer


    Servlet 规范 3.0 版本引入的另一个特性是，可以选择使用基于 Java 的方法来配置 Web 环境（参见清单 4-3）。兼容 Servlet 3.0
    的容器会扫描类路径，查找实现了 `javax.servlet.ServletContainerInitializer` 接口的类，并调用这些类上的 `onStartup`
    方法。通过在这些类上添加 `javax.servlet.annotation.HandlesTypes` 注解，你还可以获得需要进一步配置 Web 应用程序的类（这是允许使用第四种选项
    `org.springframework.web.WebApplicationInitializer` 的机制）。


    与 `web.fragments` 类似，`ServletContainerInitializer` 允许对 Web 应用程序进行模块化配置，但现在是基于
    Java 的方式。使用 Java 可以带来使用 Java 语言而非 XML 的所有额外好处。此时，你拥有强类型，可以影响 Servlet 的构建，并且有更简单的方法来配置
    Servlet（在 XML 文件中，这是通过添加 `init-param` 和/或 `context-param` 元素来完成的）。


    ***清单 4-3.** 基于 Java 的配置*


    `package com.apress.prospringmvc.bookstore.web;`


    `import java.util.Set;`


    `// javax.servlet imports omitted.`


    `import org.springframework.web.servlet.DispatcherServlet;`


    `public class BookstoreServletContainerInitializer`

    `implements ServletContainerInitializer {`


    `  @Override`

    `  public void onStartup(Set<Class<?>> classes, ServletContext servletContext)`

    `  throws ServletException {`

    `      ServletRegistration.Dynamic registration;`

    `      registration = servletContext.addServlet("dispatcher", DispatcherServlet.class);`

    `      registration.setLoadOnStartup(1);`

    `      registration.addMapping("/*");`

    `  }`

    `}`


    ##### 使用 WebApplicationInitializer


    现在，是时候看看使用 Spring 时配置应用程序的第四种选项了。Spring 已经提供了一个 `ServletContainerInitializer`
    实现，即 `org.springframework.web.SpringServletContainerInitializer`，它让事情变得稍微简单一些（参见清单
    4-4）。Spring 框架提供的这个实现会检测并实例化所有 `org.springframework.web.WebApplicationInitializer`
    的实例，并调用这些实例的 `onStartup` 方法。


    ***清单 4-4.** WebApplicationInitializer 配置*


    `package com.apress.prospringmvc.bookstore.web;`


    `// javax.servlet imports omitted`


    `import org.springframework.web.WebApplicationInitializer;`

    `import org.springframework.web.servlet.DispatcherServlet;`


    `public class BookstoreWebApplicationInitializer implements WebApplicationInitializer
    {`


    `  @Override`

    `  public void onStartup(ServletContext servletContext) throws ServletException
    {`

    `      ServletRegistration.Dynamic  registration`

    `      registration = servletContext.addServlet("dispatcher",`![Image](img/U002.jpg)

    ` DispatcherServlet.class);`

    `      registration.addMapping("/*");`

    `      registration.setLoadOnStartup(1);`

    `  }`

    `}`


    ![Image](img/square.jpg) **警告** 使用此功能可能会严重影响应用程序的启动时间！首先，Servlet 容器需要扫描类路径以查找所有
    `javax.servlet.ServletContainerInitializer` 的实现。其次，类路径会被扫描以查找 `org.springframework.web.WebApplicationInitializer`
    的实现。在大型应用程序中，这种扫描可能会花费一些时间。


    #### 配置 DispatcherServlet


    配置 `org.springframework.web.servlet.DispatcherServlet` 是一个两步过程。第一步是通过直接在 Dispatcher
    Servlet 上设置属性（声明）来配置 Servlet 的行为。第二步是配置应用程序上下文中的组件（初始化）。


    Dispatcher Servlet 为组件提供了许多默认设置。这使你不必为基本行为进行大量配置，并且你可以根据需要覆盖和扩展配置。除了 Dispatcher
    Servlet 的默认配置之外，Spring @MVC 也有一个默认配置，可以通过使用 `org.springframework.web.servlet.config.annotation.EnableWebMvc`
    注解来启用（参见第 2 章中的“启用特性”部分）。


    ##### Dispatcher Servlet 属性


    Dispatcher Servlet 有许多可以设置的属性。所有这些属性都有 `setter` 方法，并且都可以通过编程方式设置，或者在 XML 配置中通过包含
    Servlet 初始化参数来设置。表 4-2 列出并描述了 Dispatcher Servlet 上可用的属性。


    ![Image](img/tab_4_2.jpg)


    ![Image](img/tab_4_2a.jpg)


    ![Image](img/tab_4_2b.jpg)

