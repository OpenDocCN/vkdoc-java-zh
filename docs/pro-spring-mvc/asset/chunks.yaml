  raw: '#### HandlerExceptionResolver


    In most cases, you want to control how you handle an exception that occurs during
    the handling of a request. You can use a HandlerExceptionResolver for this. The
    API (see [Listing 4-18](#Chapter04.html#list_4_18)) consists of a single method
    that is called on the `org.springframework.web.servlet.HandlerExceptionResolver`s
    detected by the dispatcher servlet. The resolver can choose to handle the exception
    itself or to return an `org.springframework.web.servlet.ModelAndView` that contains
    a view to render and a model (generally containing the exception thrown).


    ***Listing 4-18.** The HandlerExceptionResolver API*


    `package org.springframework.web.servlet;`


    `import javax.servlet.http.HttpServletRequest;`

    `import javax.servlet.http.HttpServletResponse;`


    `public interface HandlerExceptionResolver {`


    `    ModelAndView resolveException(HttpServletRequest request,`

    `                                  HttpServletResponse response,`

    `                                  Object handler,`

    `                                  Exception ex);`


    `}`


    [Figure 4-16](#Chapter04.html#fig_4_16) shows the different implementations provided
    by the Spring Framework. Each works in a slightly different way, just as each
    is configured differently (see [Chapter 6](#Chapter06.html#ch6) for more information).


    ![Image](images/9781430241553_Fig04-16.jpg)


    ***Figure 4-16.** The HandlerExceptionResolver implementations*


    The `org.springframework.web.servlet.handler.HandlerExceptionResolverComposite`
    is an implementation used internally by Spring MVC. It is used to chain several
    `org.springframework .web.servlet.HandlerExceptionResolver` implementations together.
    This resolver does not provide an actual implementation or added functionality;
    instead, it merely acts as a wrapper around multiple implementations (when multiple
    implementations are configured).


    #### RequestToViewNameTranslator


    When a handler returns no view implementation or view name and did not send a
    response itself to the client, then the `org.springframework.web.servlet.RequestToViewNameTranslator`
    tries to determine a view name from the incoming request. The default implementation
    (see [Figure 4-17](#Chapter04.html#fig_4_17)), `org.springframework.web.servlet.view.DefaultRequestToViewNameTranslator`,
    simply takes the URL, strips the suffix and context path, and then uses the remainder
    as the view name (i.e., [`http://localhost:8080/bookstore/admin/index.html`](http://localhost:8080/bookstore/admin/index.html)
    becomes `admin/index`). You can find more information about views in [Chapter
    8](#Chapter08.html#ch8).


    ![Image](images/9781430241553_Fig04-17.jpg)


    ***Figure 4-17.** The RequstToViewNameTranslator hierarchy*


    The `RequestToViewNameTranslator` API is shown in [Listing 4-19](#Chapter04.html#list_4_19).


    ***Listing 4-19.** The RequestToViewNameTranslator API*


    `package org.springframework.web.servlet;`


    `import javax.servlet.http.HttpServletRequest;`


    `public interface RequestToViewNameTranslator {`


    `    String getViewName(HttpServletRequest request) throws Exception;`


    `}`


    #### ViewResolver


    Spring MVC provides a very flexible view resolving mechanism. It simply takes
    the view name returned from the handler and tries to resolve it to an actual view
    implementation (if no concrete `org.springframework.web.servlet.View` is returned).
    The actual implementation could be a JSP, but it could just as easily be an Excel
    spreadsheet or PDF file. For more information on view resolving, refer to [Chapter
    8](#Chapter08.html#ch8).


    This API (see [Listing 4-20](#Chapter04.html#list_4_20)) is pretty simple and
    consists of a single method. This method takes the view name and currently selected
    locale (see also the `LocaleResolver`). This can be used to resolve to an actual
    `View` implementation. When there are multiple `org.springframework.web.servlet.ViewResolver`s
    configured, the dispatcher servlet calls them in turn until one of them returns
    a `View` to render.


    ***Listing 4-20.** The ViewResolver API*


    `package org.springframework.web.servlet;`


    `import java.util.Locale;`


    `public interface ViewResolver {`


    `    View resolveViewName(String viewName, Locale locale) throws Exception;`


    `}`


    The `ViewResolver` implementations are shown in [Figure 4-18](#Chapter04.html#fig_4_18).
    Out of the box, Spring provides several implementations (see [Chapter 8](#Chapter08.html#ch8)
    for more information).


    ![Image](images/9781430241553_Fig04-18.jpg)


    ***Figure 4-18.** The ViewResolver implementations*


    #### FlashMapManager


    The `org.springframework.web.servlet.FlashMapManager` is used to enable a flash
    “scope” in Spring MVC applications. You can use this mechanism to put attributes
    in a flash map that are then retrieved after a redirect (the flash map survives
    a request/response cycle). The flash map is cleared after the view is rendered.
    Spring provides a single implementation, `org.springframework.web.servlet.support
    .SessionFlashMapManager` (see [Figure 4-19](#Chapter04.html#fig_4_19)).


    ![Image](images/9781430241553_Fig04-19.jpg)


    ***Figure 4-19.** The FlashMapManager hierarchy*


    [Listing 4-21](#Chapter04.html#list_4_21) shows the API of the FlashMapManager.


    ![Image](images/square.jpg) **Note** The flash “scope” mentioned here has no relation
    to the “flashscope” used in Spring Web Flow.


    ***Listing 4-21.** The FlashMapManager API*


    `package org.springframework.web.servlet;`


    `import javax.servlet.http.HttpServletRequest;`

    `import javax.servlet.http.HttpServletResponse;`


    `public interface FlashMapManager {`


    `    FlashMap retrieveAndUpdate(HttpServletRequest request,`

    `                               HttpServletResponse response);`


    `    void saveOutputFlashMap(FlashMap flashMap,`

    `                            HttpServletRequest request,`

    `                            HttpServletResponse response);`

    `}`


    ### Summary


    This chapter started by looking at the request processing workflow, identifying
    which components play a role in this. The `DispatcherServlet` can be considered
    the main component in Spring MVC, and it plays the most crucial role, that of
    the front controller. The MVC pattern in Spring MVC is quite explicit; you have
    a `Model`, a `View,` and also a `Controller` (handler). The controller processes
    the request, fills the model, and selects the view to render.


    While processing a request, the `DispatcherServlet` uses a lot of different components
    to play its role. The most important components are the `HandlerMapping` and `HandlerAdapter`;
    these components are the core components used to map and handle requests, respectively.
    To apply crosscutting concerns, you can use an `HandlerInterceptor`. After handling
    a request, a view needs to be rendered. A handler can return an `View` or the
    name of a view to render. In the latter situation, this name is passed to an `ViewResolver`
    to resolve to an actual view implementation.


    There is also basic support for flash-scoped variables. To make this possible,
    there is the notion of an `FlashMapManager`. Sometimes, the request processing
    doesn’t progress the way you’d like it to. For example, you might encounter exceptions.
    To handle those, you can use the `HandlerExceptionResolver`. The final components
    that play a role here are the `LocaleResolver` and `ThemeResolver`. Together,
    these enable internationalization and theming in your application.


    This chapter also touched on the fact that the dispatcher servlet includes some
    components that are configured by default and contrasted those defaults against
    those of the Spring @MVC, which can be enabled by using the `EnableWebMvc` annotation.
    We also explored the different default components of the two approaches.


    Upcoming chapters will explain how to build controllers to handle requests and
    take a closer look at how to configure Spring MVC.


    ## C H A P T E R  5'
