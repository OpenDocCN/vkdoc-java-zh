    Security supports localization of exception messages. If your application is designed
    for English-speaking users, you don''t need to do anything as by default since
    all Security messages are in English.    If you need to support other locales,
    you should know that all exception messages can be localized, including messages
    related to authentication failures and access being denied (authorization failures).
    Exceptions and logging messages for developers or system deployers (including
    incorrect attributes, interface contract violations, using incorrect constructors,
    startup time validation, debug-level logging) are not localized and instead are
    hard-coded in English within Spring Security''s code.    The resource bundle is
    located under `org/springframework/security/` with the base name `messages.properties`
    and can be configured in our `WebMvcContextConfiguration` (see [Listing 13-24](#Chapter13.html#list_13_24)).
    We already have an `org.springframework.context.MessageSource` configured for
    our local resource bundle (`messages.properties`); here we will extend the configuration
    and pass along a second resource bundle, which is identified with the location
    in package format (`org.springframework.security.messag`es) followed by the basename,
    which is the name of the file without country or language suffixed and without
    a “properties” extension.    ***Listing 13-24.** Adding extra bundles for localizing
