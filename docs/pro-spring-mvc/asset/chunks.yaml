    ![图片](img/square.jpg) **注意** Spring Security 通常具有较低的侵入性。这使得我们可以在应用程序实现的后期阶段添加安全功能。虽然可能需要一些重构，但通常改动非常小。这也是我们将本章放在最后的原因之一。


    我们将首先让您熟悉基本的安全配置。我们将配置 Spring Security，使进入应用程序的每个请求都经过安全配置。我们会看到，这种配置基于一种过滤器机制，请求在到达目标资源之前必须通过该机制。我们还将向您展示，定义哪些资源需要保护、哪些资源可以保持公开（例如登录页面、图片等资源）是多么简单。


    在身份验证部分，我们将使用用户名和密码。我们将使用一个包含典型用户名和密码字段的登录表单。除了创建页面（包含登录表单）本身之外，我们还将看到，只需一些 XML
    配置即可让 Spring Security 处理这一切。（相比之下，在前面的章节中，我们自行编写了身份验证机制。）为简单起见，此处的身份验证将基于基本的内存数据存储。稍后我们将看到如何轻松地将其更改为数据库存储。


    在使用 Web Flow 的应用程序中，大量的应用控制器逻辑和视图选择很可能已迁移到流程中。Web Flow 支持直接保护流程。我们将了解如何将 Web Flow
    集成到安全机制中，从而使您的应用程序从上到下都安全。


    配置完身份验证后，我们将了解如何进一步保护登录和订单处理过程。在此之前，所有数据都通过纯 HTTP 传输。我们将看到，添加传输安全只需进行配置即可。


    接下来，我们还将讨论本地化。Spring Security 支持异常消息的本地化，默认情况下这些消息是英文的。我们将了解需要配置哪些内容以支持其他语言环境。


    我们还将通过实现基于角色的访问模型来扩展安全性。这将为您的用户授予权限，您之后可以在需要访问特定资源时使用这些权限来检查授权。


    Spring Security 的授权可以通过编程方式（通过代码）或声明方式应用。声明式方法允许您使用注解、表达式或 XML 形式的元数据来断言授权。我们将介绍如何在以下元素中应用
    Spring Security 的授权：


    > *   视图：能够显示哪些组件对给定用户可见

    > *   控制器

    > *   Web Flow 流程

    > *   服务层


    我们将涵盖声明式安全（使用注解）和编程式安全，并详细展示如何在视图、应用控制器和流程中应用这两种方式。最后，我们将介绍如何在 JSP 页面中使用 Spring
    Security 标签库。


    ![图片](img/square.jpg) **注意** 供您参考，Spring Security 也可以以相同的声明方式应用于后端（主要是服务层），就像应用于应用控制器一样。不过，本章不会涉及后端中的
    Spring Security。'
- fmt: '### Preparing the Example Application


    We are going to reuse the latest and greatest version of our example, from [Chapter
    12](#Chapter12.html). This application includes Spring MVC functionality, flows,
    application controllers, and a service layer. It will be the ideal candidate for
    applying security.


    In the current version, we have already applied a self-invented security mechanism.
    A user can enter the site and browse books without any restriction. Books can
    also be added to the shopping cart without restrictions. A user who is not authenticated,
    however, cannot do a final checkout and cannot view his or her orders. Before
    this is possible a user has to log in, by means of username and password.


    To support this, we have a login form which takes the credentials and compares
    them to the information stored in our database. Once a user is authenticated,
    we put a token (the `com.apress.prospringmvc.bookstore.domain.Account` domain
    object) on the user’s session to indicate that authentication was successful.
    (To refresh your memory, you can see this happening in the [Chapter 11](#Chapter11.html)
    section “Implementing Authentication as a Subflow”; Listing 11-39 demonstrates
    authentication via Spring MVC, and Listing 11-41 shows authentication via Web
    Flow.) As you will see, we can do all of this just by means of configuration using
    Spring Security instead of creating the security setup ourselves.


    While our self-invented setup helped us to avoid some extra complexity at the
    time, and it apparently seems to do its job, there are still some serious flaws
    to be discovered if we look closer.


    First, there is no security applied on controllers or flows. For example, let’s
    go back to the previous example ([Chapter 12](#Chapter12.html)) where we are still
    using our home-grown security implementation. Without being authenticated, try
    to start the orders overview flow directly by typing this URL in your browser
    to open the page shown in [Figure 13-1](#Chapter13.html#fig_13_1):


    [`http://localhost:8080/chapter12-bookstore/ordersOverview`](http://localhost:8080/chapter12-bookstore/ordersOverview)


    ![Image](images/9781430241553_Fig13-01.jpg)


    ***Figure 13-1.** Directly starting a flow bypasses security.*


    You can see that we are not logged in, as the Orders overview is not available
    in the navigation bar. So even though this link is not available for an unauthenticated
    user, one can simply start it by copy/pasting the name of the flow in the browser’s
    address bar, and the page will load. Talk about security flaws…


    In this particular case no harm is done, and there is no even an exception being
    thrown. We are in luck; the only thing that happens is an empty order page. The
    service/repository will try to load the orders from account “null”, which results
    in an empty list, so nothing is shown. However, it could have turned out otherwise.
    If we had developed the repository with less care, we might have omitted the criteria
    “user” when it was null; in that case it would result in retrieving *all* orders
    for *all* customers!


    It is clear that this is a serious vulnerability, so we have to make sure that
    our security is, well, real security and cannot be longer circumvented by simply
    typing the correct URL in the browser address bar.


    Second, there is also no way to make a distinction among authenticated users,
    and thus there is no way to limit access. Once a user is authenticated, he or
    she gets access to all restricted functionality, an approach that is in most cases
    too coarse-grained (most applications support different levels of authorization).


    We brought this up just to show you that rolling out your own Security is not
    something to take lightly. Thankfully, Spring Security will solve these issues
    for us.


    In our first attempt we will try to introduce you to the Spring Security basics
    and show you how easy it is to set up a basic security scheme that will already
    look very professional. It will:


    > *   Make sure that no restricted functionality is accessible if the user is
    not authenticated, no matter what they try.

    >     *   So the cheap URL trick will have no longer any effect.

    >     *   Even a user who is authenticated will not be able to access pages or
    flows for which no explicit access rules are defined.

    > *   Use form-based authentication, which will show the user a login page on
    which credentials can be entered using a username and password field.

    > *   Redirect users to the login page automatically whenever they try to access
    a secured resource directly, and redirect them back to that resource after authentication
    was successful.

    > *   Use Spring Security to do the authentication part instead of writing this
    kind of code ourselves.


    We will explain some of the Spring Security architecture and internals as we go
    along securing the application. Later, in the following sections, we will extend
    this basic scheme and discuss more about authorization and how to apply it in
    our application. We will extend the application by adding functionality to add
    categories and books, which will only be available to a selection of authenticated
    users.


    ### Securing Our Bookstore


    To demonstrate the basic security scheme, we will apply it to our sample application.
    In this first section, we will show you how to


    > *   Configure Spring Security to act as a giant wrapper for our application,
    so that every request that comes in passes via Spring Security

    > *   Configure our login page

    > *   Mark certain resources as available only for authenticated users

    > *   Enable auto-redirection when a secured resources is accessed without being
    authenticated, and then redirect them back once authenticated

    > *   Use Spring Security’s out-of-the-box in-memory data store for users

    > *   Store passwords securely with salted hashes'
