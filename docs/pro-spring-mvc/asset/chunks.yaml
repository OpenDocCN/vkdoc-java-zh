    ##### 使用类型转换


    现在我们已经介绍了类型转换，接下来看看它的实际应用。我们将创建一个用户注册页面，用于输入 `com.apress.prospringmvc.bookstore.domain.Account`
    对象的详细信息。首先，我们需要在 `WEB-INF/views` 下创建一个网页。接着，需要创建一个 `customer` 目录，并在其中放置一个 `register.jsp`
    文件。由于该页面中不同字段存在大量重复内容，因此这里仅包含代码清单 5-41 的部分内容。


    ***代码清单 5-41.** 注册页面*


    `<%@ taglib prefix="c" uri="http://java.sun.com/jsp/jstl/core"%>`

    `<%@ taglib prefix="spring" uri="http://www.springframework.org/tags" %>`

    `<%@ taglib prefix="form" uri="http://www.springframework.org/tags/form" %>`


    `<form:form method="POST" modelAttribute="account">`

    `    <fieldset>`

    `        <legend>个人信息</legend>`

    `        <table>`

    `            <tr>`

    `                <td>`

    `                     <form:label path="firstName" cssErrorClass="error">`

    `                          名字`

    `                     </form:label>`

    `                  </td>`

    `                  <td><form:input path="firstName" /></td>`

    `                  <td><form:errors path="firstName"/></td>`

    `             </tr>`

    `             // 其他 Account 字段已省略`

    `        </table>`

    `    <fieldset>`

    `        <legend>用户信息</legend>`

    `        <table>`

    `            <tr>`

    `                <td><form:label path="username" cssErrorClass="error">`

    `                         用户名`

    `                    </form:label></td>`

    `                <td><form:input path="username"/></td>`

    `                <td><form:errors path="username"/></td>`

    `            </tr>`

    `            // 密码和电子邮件地址字段已省略。`

    `         </table>`

    `    </fieldset>`

    `    <button id="save”>保存</button>`

    `</form:form>`


    我们还需要一个控制器，因此将创建 `com.apress.prospringmvc.bookstore.web.controller.RegistrationController`。在这个控制器中，我们将使用一些数据绑定特性。首先，我们将禁止提交
    `id` 字段（以防止有人编辑其他用户）。其次，我们将根据当前的 `Locale` 预选用户的国家。代码清单 5-42 展示了我们的控制器。


    ***代码清单 5-42.** RegistrationController*


    `package com.apress.prospringmvc.bookstore.web.controller;`


    `import java.util.Locale;`

    `import java.util.Map;`

    `import java.util.TreeMap;`


    `import org.springframework.beans.factory.annotation.Autowired;`

    `import org.springframework.stereotype.Controller;`

    `import org.springframework.validation.BindingResult;`

    `import org.springframework.web.bind.WebDataBinder;`

    `import org.springframework.web.bind.annotation.InitBinder;`

    `import org.springframework.web.bind.annotation.ModelAttribute;`

    `import org.springframework.web.bind.annotation.RequestMapping;`

    `import org.springframework.web.bind.annotation.RequestMethod;`


    `import com.apress.prospringmvc.bookstore.domain.Account;`

    `import com.apress.prospringmvc.bookstore.service.AccountService;`


    `@Controller`

    `@RequestMapping("/customer/register")`

    `public class RegistrationController {`


    `    @Autowired`

    `    private AccountService accountService;`


    `    @ModelAttribute("countries")`

    `    public Map<String, String> countries(Locale currentLocale) {`

    `        Map<String, String> countries = new TreeMap<String, String>();`

    `        for (Locale locale : Locale.getAvailableLocales()) {`

    `            countries.put(locale.getCountry(), locale.getDisplayCountry(currentLocale));`

    `        }`

    `        return countries;`

    `    }`


    `    @InitBinder`

    `    public void initBinder(WebDataBinder binder) {`

    `        binder.setDisallowedFields("id");`

    `        binder.setRequiredFields("username","password","emailAddress");`

    `    }`


    `    @RequestMapping(method = RequestMethod.GET)`

    `    @ModelAttribute`

    `    public Account register(Locale currentLocale) {`

    `        Account account = new Account();`

    `        account.getAddress().setCountry(currentLocale.getCountry());`

    `        return account;`

    `    }`


    `    @RequestMapping(method = { RequestMethod.POST, RequestMethod.PUT })`

    `public String handleRegistration(@ModelAttribute Account account,` **`BindingResult
    result`**`) {`

    **`if (result.hasErrors()) {`**

    **`return "customer/register";`**

    **`}`**

    `        this.accountService.save(account);`

    `        return "redirect:/customer/account/" + account.getId();`

    `    }`

    `}`


    这个控制器包含了很多内容。例如，`initBinder` 方法配置了我们的绑定。它禁止设置 `id` 属性，并设置了一些必填字段。我们还有一个方法，通过将
    JDK 中所有可用的国家添加到模型中来准备模型。最后，我们有两个请求处理方法，一个用于 `GET` 请求（进入页面时的初始请求），另一个用于提交表单时的 `POST`/`PUT`
    请求。请注意模型属性旁边的 `org.springframework.validation.BindingResult` 属性。我们可以用它来检测错误；并基于此重新显示原始页面。还要记住
    JSP 中的 `error` 标签，它们用于显示字段或对象的错误消息（我们将在后续章节中更深入地介绍这一点）。当应用程序重新部署后，我们点击 `注册` 链接，应该会看到如图
    5-7 所示的页面。


    ![Image](img/9781430241553_Fig05-07.jpg)


    ***图 5-7.** 账户注册页面*


    如果我们现在输入一个无效的日期；将用户名、密码和电子邮件地址字段留空；然后提交表单；同一页面会重新显示并附带一些错误消息（见图 5-8）。


    ![Image](img/9781430241553_Fig05-08.jpg)


    ***图 5-8.** 显示一些错误的账户注册页面*


    这些错误消息是由 Spring MVC 的数据绑定功能生成的。在本章后面，我们将看到如何影响显示的消息。目前，我们先保持它们不变。如果我们填写正确的信息并点击保存，我们将被重定向到一个账户页面（我们已经为该页面提供了基本的控制器和实现）。

