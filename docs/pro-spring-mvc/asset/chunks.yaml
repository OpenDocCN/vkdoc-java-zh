    `<on-render>` 元素仅适用于五种状态中的一种：视图状态。正如第 10 章中所讨论的，Web Flow 在处理请求时使用两阶段方法（Post Redirect
    Get）。转换中的表达式在 POST 阶段执行。`<on-render>` 元素在视图渲染之前，即 GET 阶段执行。


    当处理大型结果集时，我们可以通过在视图渲染之前将它们加载到 `request` 作用域中来利用此行为。我们在本章中已经看到了这一点，当时我们介绍了重构示例应用程序的第一阶段（请参阅本章前面的“On
    Render”部分）。


    #### 控制操作执行：子元素


    前面描述的每个元素都支持三个子元素：


    *   evaluate

    *   set

    *   render


    您已经熟悉 evaluate 操作。它接受一个（默认情况下是 SpEL）表达式并执行它。可选地，您可以使用 `result` 属性将结果存储到具有特定键的作用域上，并且如果您要求结果属于特定类型，则可以指定结果类型（使用
    `result-type` 属性）。如果是这样，将尝试进行转换；如果没有适用的转换器，则会抛出转换异常。表达式可以直接返回结果对象，或者根据需要将其包装在
    `org.springframework.webflow.execution.Event` 类中以指示不同的结果状态。我们将在“使用结果事件”部分进一步讨论事件。


