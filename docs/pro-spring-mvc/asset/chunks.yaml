    with the login and home page modification explained in the previous two sections,
    this secures our entire application. We are now able to log in via a form login.
    The authentication is handled securely via Spring Security. All our resources
    are now secured; some require authentication before a user can access them, and
    others are publicly accessible. Resources that are not explicitly listed are denied
    access by default.    Let’s continue and see what else we can do!    ### Going
    to the Database    Up until now we have stored our user information in the configuration
    itself. By making use of the `<security:user-service>`, Spring Security created
    an in-memory data store which would be populated with the data we specified there.
    In our current application, users are actually stored in the database and modeled
    as instances of `org.springframework.security.authentication.dao.Account`. It
    would be better to adapt our configuration so that we can load the user’s account
    from the existing database tables. As it turns out, this is a very easy step to
    take.    By defining the `<security:authentication-provider>` Spring registered
    a `org.springframework.security.authentication.dao.DaoAuthenticationProvider`.
    This class will deal with all low-level plumbing. What is important for us is
    that this class delegates to a so-called `org.springframework.security.core.userdetails.UserDetailsService`
    class, which will be responsible for loading the user information from wherever
    suitable. In our previous implementation this was loaded from the in-memory data
    store. Now we will provide our own implementation. This is a very easy interface
    to implement, as it only has one method:  `UserDetails loadUserByUsername(String
    username) throws UsernameNotFoundException;`  ![Image](images/square.jpg) **Note**
    The UserDetailsService is not responsible for authentication. That is the job
    of the authentication provider. In our case this will be the `DaoAuthenticationProvider`
    from Spring Security. The goal of the `UserDetailsService` is to access the data
    store (database, directory server, or possibly a file) that contains the user
    information and possibly credentials. It should map this information from that
    data store’s internal structure to predefined standard object (`org.springframework.security.core.userdetails.UserDetails`)
    and return it to the provider so it can continue to do its work.    Basically,
    the implementation should load the user information from wherever its configuration
    determines and convert that information to a `UserDetails` object. As we will
    see later, a `UserDetails` object is the main object you will be using when asking
    for security information. The implementation is shown in [Listing 13-16](#Chapter13.html#list_13_16).    ***Listing
    13-16.** Implementing a custom UserDetailsService*  `package com.apress.prospringmvc.bookstore.web.security;`  `import
    org.apache.commons.lang3.StringUtils;` `import org.springframework.beans.factory.annotation.Autowired;`
    `import org.springframework.security.core.GrantedAuthority;` `import org.springframework.security.core.authority.SimpleGrantedAuthority;`
    `import org.springframework.security.core.userdetails.UserDetails;` `import org.springframework.security.core.userdetails.UserDetailsService;`
    `import org.springframework.security.core.userdetails.UsernameNotFoundException;`
    `import org.springframework.stereotype.Component;` `import com.apress.prospringmvc.bookstore.domain.Account;`
    `import com.apress.prospringmvc.bookstore.domain.Permission;` `import com.apress.prospringmvc.bookstore.domain.Role;`
    `import com.apress.prospringmvc.bookstore.service.AccountService;`  `@Component`
    `public class BookstoreUserDetailsService implements UserDetailsService {`  `@Autowired`
    `private CustomerService customerService;`  `    @Override` `    public UserDetails
    loadUserByUsername(String username) throws UsernameNotFoundException {` `        return
    new BookstoreUserDetails(customerService.getCustomer(username));` `    }` `}`  We
    use our `CustomerService` to load the `Customer` and pass it along to our custom
    `UserDetails` object. This object is implemented as shown in [Listing 13-17](#Chapter13.html#list_13_17).    ***Listing
    13-17.** Implementing a custom UserDetails*  `package com.apress.prospringmvc.bookstore.web.security;`  `//
    Imports omitted, see Listing 13-16`  `public class BookstoreUserDetails implements
    UserDetails {`  `    private Customer customer;` `private List<GrantedAuthority>
    authorities = new` ![Image](images/U002.jpg) `        ArrayList<GrantedAuthority>();`  `    public
    BookstoreUserDetails(Customer customer) {` `        this.customer = customer;`
    `    }`  `    //Omitting getter and setter methods for class instance variables`
    `}`  There are getters for the username, password and our `Customer` object. At
    the moment we return an empty list with for the `GrantedAuthority` property. We
    will later see how this will fit into our application. All the other methods are
    features for the `UserDetails`, such as account expiry and so on. We won’t be
    using these features, so `true` is returned for all of them. Once a user has been
    authenticated, the information about that user is stored in an implementation
    of `org.springframework.security.core.context.SecurityContext`. The `org.springframework.security.core.context.SecurityContextHolder`
    class which is a `java.lang.ThreadLocal`,^([9](#Chapter13.html#CHP-13-FN-9)) will
    give access to the SecurityContext. The `SecurityContext` itself has only a getter
    (and setter) for an `org.springframework.security.core.Authentication Object`.
    This means you will be able to access the `Authentication Object` anywhere in
    your web application by calling    __________    ⁹ [`http://docs.oracle.com/javase/6/docs/api/java/lang/ThreadLocal.html`](http://docs.oracle.com/javase/6/docs/api/java/lang/ThreadLocal.html)  `SecurityContextHolder.getContext().getAuthentication();`  On
    the `Authentication` object, we are especially interested in the `getPrincipal`
    method. This returns details about the user currently authenticated. In the previous
    section, we introduced you to the `UserDetails`, well this is what the `getPrincipal`
    returns, a `UserDetails` implementation. In our case it will be the a custom `UserDetails`,
    namely our `BookstoreUserDetails`.    ![Image](images/square.jpg) **Note** If
    you look at the API, you will see that `getPrincipal` returns `Object`. So it
    can also return other types besides a `UserDetails` implementation. If you define
    your own custom `org.springframework.security.authentication.AuthenticationProvider`,
    you are free to construct your own authentication objects. In that case the return
    value from `getPrincipal` can be whatever type you want the principal to be.    ###
    Securing Our Flows, the Right Way    The setup we’ve put in place until now still
    secures our flows as normal request mappings. While this might seem to work, it
    actually doesn’t. It only works for requests coming from outside to access a flow.
    If a flow wants to start a subflow, the request is already behind the Security
    filters and will not be picked up (see [Figure 13-4](#Chapter13.html#fig_13_4)).  ![Image](images/9781430241553_Fig13-04.jpg)  ***Figure
    13-4.** Securing flows as request URI using the filter chain is not enough. Starting
    a sub flow from a parent flow would bypass this mechanism.*    If you remember
    from the request mappings, the `placeOrders-flow` (located in `WEB-INF/view/secured/placeOrders/)`
    can only be accessed by authenticated user. The `createOrders-flow` (located in
    `WEB-INF/view/public/createOrders/`) is publicly available. What happens here
    is that no authentication is triggered when the request comes in to transition
    to `placeOrder` (as it is still for `createOrders-flow`). The `placeOrder` is
    a subflow state within `createOrders-flow`. To refresh our memory you can see
    the code snippet below from the `createOrders-flow` which starts the sub flow
    from the moment the flow transitions to `placeOrder:`  `<subflow-state id="placeOrder"
    subflow="secured/placeOrders">` `    <input name="orderForm"/>`  `    <output
    name="orderId"/>` `        <transition on="endOrderOk" to="endOrderOk"/>` `</subflow-state>`  When
    Web Flow makes the internal state transition to the sub-flow, it will actually
    execute without redirecting the user to the login page. What we really want is
    Web Flow integration with Spring Security, so that Spring Security is involved
    when Web Flow executes flows.    #### Adding Access Attributes to Your Flows    Here
    we will see what you have to do in order to invoke Spring Security for Web Flow.
    When you do so, your inter flow communication will also be secured.    In order
    to secure your flows, you can add the following element on top of your flow definitions:  `<secured
    attributes="…"/>`  The usage of the `attributes` attribute is the same as the
    `access` attribute in the `<security:intercept-url>` of the spring security configuration.
    You can use it to place the expressions you want to be valid before this flow
    can execute.    If you return to the *“*Configuring Which Resources to Secure*”*
    section, you will see that the following two flows required authentication:    >
    *   `placeOrders-flow` > *   `ordersOverview-flow`    The third flow, `createOrders-flow`
    (located in `WEB-INF/view/public/createOrders/`), was public and did not require
    any authentication to be executed. We add the `fullyAuthenticated` condition to
    `placeOrders-flow.xml`(located in `WEB-INF/view/secured/placeOrders/`) and `ordersOverview-flow.xml
    (`located in `secured/ordersOverview/`), as shown in [Listings 13-18](#Chapter13.html#list_13_18)
    and [13-19](#Chapter13.html#list_13_19).    ***Listing 13-18.** Adding the fullyAuthenticated
    authorization check as top element in ordersOverview-flow.xml and placeOrders-flow.xml*  `<flow`  `      xsi:schemaLocation="http://www.springframework.org/schema/webflow`
    `                           http://www.springframework.org/schema/webflow/                           
    spring-webflow-2.0.xsd">`  `<secured attributes="fullyAuthenticated" />` `...`  ***Listing
    13-19.** Adding the permitAll check as top element in createOrders-flow.xml*  `<flow`  `        xsi:schemaLocation="http://www.springframework.org/schema/webflow`
    `                           http://www.springframework.org/schema/webflow/                           
    spring-webflow-2.0.xsd">`  `<secured attributes="permitAll" />` `...`  The `<secured>`
    element also has a second attribute, called `match`. This attribute is of no importance
    when using SpEL. But without using SpEL you are much more limited. For example,
    it is not possible to define an “`or” or` “`and”` relation. Later on we will introduce
    the concept of roles, but you should know that you can allow or deny a flow to
    be executed depending on one or more roles being present. With SpEL you would
    simply use the `and` operator if you only want the flow to execute when both roles
    are present, or the `or` operator if one suffices. When not using SpEL you must
    use the `match` attribute, which will let you switch between `any`; if one of
    the roles requested are present, the flow will execute, or `all`; meaning that
    all of the roles in the `attributes` attribute must be present before the flow
    is executed.    ![Image](images/square.jpg) **Note** The flow security configuration
    on `createOrders-flow` and `ordersOverview-flow` is a bit superfluous, since they
    are both top-level flows. The `<security:intercept-url pattern="/public/**" access="permitAll"
    />` and `<security:intercept-url pattern="/secured/**" access="fullyAuthenticated"/>`
    have already checked that we had the proper authentication before letting us even
    go any further. However, the `<secured>` element in the flow could be used to
    perform finer-grained access control or authorization. While the filter configuration
    could allow the user to go through (the user was authenticated successfully for
    example) you could still check that access would only be granted if the user has
    a certain role; for example, `<secured attribute="hasRole(ROLE_SOMEROLE)"/>`.
    Roles will be discussed in the “Role-Based Access Control” section.    #### Configuring
    the SecurityFlowExecutionListener    The `org.springframework.webflow.security.SecurityFlowExecutionListener`
    class will enable the integration between Web Flow and Spring Security. It is
    required in order for the `<security>` element we discussed previously to do anything.
    This class is an implementation of the Web Flow `org.springframework.webflow.execution.FlowExecutionListener`
    that we saw in [Chapter 12](#Chapter12.html).    Normally this would have been
    a two-paragraph section, since you ordinarily just define a bean (the `SecurityFlowExecutionListener`)
    and bind it to the flow executor using the `<webflow:flow-execution-listeners>`
    element in `webflow-config.xml`. As it turns out, there is currently a problem
    with the `SecurityFlowExecutionListener` when using SpEL-enabled security expressions
    with Spring Security. It might well be that this problem is resolved by the time
    you read this; and if so then you can continue as normal (simply configuring the
    `SecurityFlowExecutionListener` as we will see in [Listing 13-21](#Chapter13.html#list_13_21)).
    If the issue^([10](#Chapter13.html#CHP-13-FN-10)) has not been resolved, however,
    you have two options:    > *   Use the `SecurityFlowExecutionListener` as-is,
    but in that case you cannot use SpEL in your flow `<security>` elements. You would
    have to fall back to mainly using roles. > *   Use our custom `com.apress.prospringmvc.bookstore.web.security.BookstoreSecurityFlowExecutionListener`,
    which should do the trick as a workaround. With this approach you will still be
    able to use SpEL.    For the sake of consistency we went with the second solution
    for the examples.    To configure the `BookstoreSecurityFlowExecutionListener`
    we open `src/main/resources/spring/webflow-config.xml` and define a Spring bean,
    as shown in [Listing 13-20](#Chapter13.html#list_13_20).    ***Listing 13-20:**
    Defining the `SecurityFlowExecutionListener`*  `<bean id="securityFlowExecutionListener"`
    ![Image](images/U002.jpg) `class="com.apress.prospringmvc.bookstore.web.security.BookstoreSecurityFlowExecutionListener`![Image](images/U002.jpg)
    `"/>`  Next we configure the listener with the flow executor (see [Listing 13-21](#Chapter13.html#list_13_21)).    ***Listing
    13-21:** Integrating the `SecurityFlowExecutionListener` with the flow executor*  `<webflow:flow-executor
    id="flowExecutor" flow-registry="flowRegistry" >` `    <webflow:flow-execution-repository
    max-executions="3" max-execution-snapshots="10" />` **`<webflow:flow-execution-listeners>`**
    **`        <webflow:listener ref="securityFlowExecutionListener"/>`** **`    </webflow:flow-execution-listeners>`**
    `</webflow:flow-executor>`  That’s it! If you want to configure the default `SecurityFlowExecutionListener`,
    it is done in exactly the same way, except that the class of bean `securityFlowExecutionListener`
    would be `org.springframework.webflow.security.SecurityFlowExecutionListener`
    instead of `com.apress.prospringmvc.bookstore.web.security.BookstoreSecurityFlowExecutionListener`.    ![Image](images/square.jpg)
    **Note** We did not add the `BookstoreSecurityFlowExecutionListener` code into
    this section, since that would take us too far. If you come to a point where you
    need this, and it isn’t fixed, we suggest you read the issue (see the link in
    the footnote) and look at the source code at the same time. This will be the best
    way to understand the fix we applied.    __________    ^(10) [`https://jira.springsource.org/browse/SWF-1508`](https://jira.springsource.org/browse/SWF-1508)    ###
    Transport Security    At the moment we still have one major security hole in our
    security setup. When our users log in they supply username and password credentials,
    which will be authenticated by Spring Security. These credentials are, however,
    sent via the browser to the web server using HTTP, which is a plain-text protocol.
    Anyone capturing data will be able to see the username and password in clear text.
    To illustrate this we started up Wireshark**^([11](#Chapter13.html#CHP-13-FN-11))**
    and let it listen on the loopback adapter. Next we performed a login in our application,
    and [Figure 13-5](#Chapter13.html#fig_13_5) shows the results.  ![Image](images/9781430241553_Fig13-05.jpg)  ***Figure
    13-5.** Network capture of an HTTP session showing plain credentials when logging
    in via the form*    This seems very unsecure. To change this behavior we are going
    to switch to SSL (Secure Socket Layer, which is now called TLS, or Transport Layer
    Security, its successor, but for consistency we’ll call it SSL), whenever a user
    logs in. From that point everything will be served using SSL.    Before we proceed,
    you must prepare your tomcat or tomcat STS instance to add an extra SSL connector.
    It is beyond the scope of this book to go deeper into the internals of the SSL
    protocol or the PKI(Public Key Infrastructure), but for this to work you need
    to supply tomcat with a keystore, which contains a private/public key pair and
    a certificate for that public key. Normally the certificate part is generated
    by a third-party Certificate Authority (CA). Fortunately, you can self-sign such
    a certificate which is ideal for tests or closed production setups.    As a small
    intermezzo we wanted to share something about self-signed certificates, since
    there is sometimes a misunderstanding about them. Using PKI with self-signed certificates
    has exactly the same encryption level as using an official CA signed certificate.
    So your SSL will not be less safe; the encryption strength, the procedures, and
    everything that depends on them offers the exact same guarantees.    __________    ^(11)
    [`http://www.wireshark.org/`](http://www.wireshark.org/)    The difference lies
    in the trust. With a self-signed certificate your users will have to explicitly
    accept the certificate, and the browser will give them a warning that the identity
    cannot be verified. How this is presented is browser dependent, but with Safari
    they will get the page as shown in [Figure 13-6](#Chapter13.html#fig_13_6).  ![Image](images/9781430241553_Fig13-06.jpg)  ***Figure
    13-6.** Browser confirmation for trusting our self signed certificate*    In order
    to trust the certificate for the current session only, you can click “Continue”.
    If you want to trust the certificate for future sessions, you have to click “Show
    Certificate”. Doing so will present the dialog box shown in [Figure 13-7](#Chapter13.html#fig_13_7).
    If you then check “always trust Bookstore when connecting to localhost” the certificate
    will be stored.  ![Image](images/9781430241553_Fig13-07.jpg)  ***Figure 13-7.**
    Accepting the self signed certificate*    After you click Continue, the certificate
    will be trusted (for this session only or for future sessions depending if you
    clicked the checkbox in [Figure 13-7](#Chapter13.html#fig_13_7)) and you will
    be able to continue over SSL. It is clear that this trusting is only a good idea
    for internal testing.    With a real CA signed certificate, the CA has asked the
    certificate holder for credentials before actually issuing the certificate. For
    example, we would never get a server certificate for google.com from an authorized
    CA, since we cannot proof that we own the domain or have any authorization over
    it.    A client’s browser truststore (which contains a list of authorized root
    CAs) will also not trust our self-signed certificate by default, since it cannot
    be verified by any of the known and trusted CAs. I will explicitly have to accept
    its trust.    So for a production website a self-signed certificate would be a
    bad idea, since users cannot verify that the identity behind the certificate is
    really what it claims to be (your server); there is no third party that verified
    the identity and gave any approval. However, if you are sending data among a limited
    set of users (closed production), and each party trusts the others, it is perfectly
    viable to send a self-signed certificate to each party. Each party knows that
    your identity (you gave it personally on a USB stick, or emailed it from your
    personal account) is the one that is coupled to that certificate (the identity
    could be a person, server, domain, or whatever). This way, you can easily save
    the costs of signing your public keys by a CA.    To generate a self-signed certificate
    we can use a Java tool called `keytool`. To use it, take the following steps:    >
    1.  Open a command line prompt and enter the following command (make sure the
    JDK is available on your path): `keytool -genkey -alias tomcat -keystore keystore.jks`
    > 2.  Enter **tomcat** as the password and again when prompted to re-enter it:
    `Enter keystore password:` >     `Re-enter new password:` > 3.  Complete the prompts
    as follows: `What is your first and last name?` >     `  [Unknown]:  `**`Bookstore`**
    >     `What is the name of your organizational unit?` >     `  [Unknown]:  `**`Bookstore`**
    >     `What is the name of your organization?` >     `  [Unknown]:  `**`Bookstore`**
    >     `What is the name of your City or Locality?` >     `  [Unknown]:  `**`Brussels`**
    >     `What is the name of your State or Province?` >     `  [Unknown]:  `**`Brussel`**`s`
    >     `What is the two-letter country code for this unit?` >     `  [Unknown]:  `**`BE`**
    >     `Is CN=Bookstore, OU=Bookstore, O=Bookstore, L=Brussels, ST=Brussels, C=BE
    correct?` >     `[no]:  `**`yes`** > 4.  Press Enter without typing anything.
    The prompt will return, and your self-signed key is ready in the keystore. `Enter
    key password for <tomcat>` >     `        (RETURN if same as keystore password):`    Place
    the keystore under your tomcat home directory `/conf`, which is `spring-insight-instance/conf/`
    if you are using STS.    Next open the server.xml (`spring-insight-instance/conf/server.xml`)
    and configure the SSL connector, as shown in [Listing 13-22](#Chapter13.html#list_13_22).If
    you want a full explanation of the configuration shown here, see the Tomcat howto^([12](#Chapter13.html#CHP-13-FN-12)),
    in the section “Edit The Tomcat Configuration File.”    __________    ^(12) [`http://tomcat.apache.org/tomcat-7.0-doc/ssl-howto.html`](http://tomcat.apache.org/tomcat-7.0-doc/ssl-howto.html)    ***Listing
    13-22.** Adding an SSL connector to tomcat’s server.xml*  `<Connector executor="tomcatThreadPool"
    port="${bio.https.port}"` ![Image](images/U002.jpg) `protocol="org.apache.coyote.http11.Http11Protocol"`![Image](images/U002.jpg)
    `connectionTimeout="20000" redirectPort="${bio.https.port}" acceptCount="100"`
    ![Image](images/U002.jpg) `maxKeepAliveRequests="15"`![Image](images/U002.jpg)
    `keystoreFile="${catalina.base}/conf/keystore.jks" keystorePass="tomcat" keyAlias="tomcat"`![Image](images/U002.jpg)
    `SSLEnabled="true" scheme="https" secure="true"/>`  In this example we are depending
    on the STS instance. The variables, like `${bio.https.port}`, are already predefined.
    If you are using Tomcat you can replace them with 8443, which will be our default
    SSL port.    After that you can start Tomcat. Do not forget to clean the server
    in STS before starting. After modifying anything in the server configuration you
    have to “clean” in order for the latest files to be copied over (right-click on
    the server instance in the server view and click Clean).    At this time verify
    that your server starts and that no errors are thrown. If there is anything wrong
    with the configuration, Tomcat will show errors almost directly after starting
    up.    The final thing to do is to tell Spring Security which mappings we would
    like to use SSL for (see [Listing 13-23](#Chapter13.html#list_13_23)). We will
