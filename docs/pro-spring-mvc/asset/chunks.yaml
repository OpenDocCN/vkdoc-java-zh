    \n![Image](images/square.jpg) **注意** 你也可以像使用JUnit那样，对Mockito方法使用静态导入。这实际上是一种推荐做法，因为它能使代码保持整洁和可读。在代码示例中，我们特意保留了类名可见，以明确它是Mockito对象而非JUnit对象（如果你刚接触Mockito或模拟对象，这一点可能不明显）。\n\
    \n[清单 9-11](#Chapter09.html#list_9_11) 展示了完整的测试用例。\n\n***清单 9-11.** 完整的测试用例*\n\
