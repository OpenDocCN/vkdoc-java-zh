- fmt: "# The Spring @MVC Defaults\n\n[Chapter 2](#Chapter02.html#ch2) covered Spring’s\
    \ `@Enable` annotations. One of those annotations is `org.springframework.web.servlet.config.annotation.EnableWebMvc`.\
    \ This annotation enables the powerful and flexible annotation-based request handling\
    \ components, and it overrides some of the defaults from the dispatcher servlet.\
    \ The actual configuration can be found in the `org.springframework.web.servlet.config.annotation.WebMvcConfigurationSupport`\
    \ class. This is the configuration that is registered when the annotation is used.\
    \ [Table 4-5](#Chapter04.html#tab_4_5) shows the default configuration when @MVC\
    \ is enabled and highlights the differences between @MVC and the dispatcher servlet.\n\
    \n![Image](images/tab_4_5.jpg)\n\nThe differences might not seem that big, but\
    \ the new components registered provide significantly different initial defaults\
    \ compared to those provided by the dispatcher servlet. The essential difference\
    \ is this: Spring’s @MVC components enable you to write more flexible request\
    \ handling methods (see [Chapters 5](#Chapter05.html#ch5) and [6](#Chapter06.html#ch6)).\n\
    \n## The Spring MVC Components\n\nIn the previous sections, you learned about\
    \ the request processing workflow and the components used in it. You also learned\
    \ how to configure the `org.springframework.web.servlet.DispatcherServlet`. In\
    \ this section, you will take a closer look at all the components involved in\
    \ the request processing workflow. For example, you will explore the APIs of the\
    \ different components and see which implementations ship with the Spring Framework.\n\
    \n### HandlerMapping\n\nThe `HandlerMapping`’s responsibility is to determine\
    \ which handler to dispatch the incoming request to. A criterion that you could\
    \ use to map the incoming request is the URL; however, implementations (see [Figure\
    \ 4-10](#Chapter04.html#fig_4_10)) are free to choose what criteria to use to\
    \ determine the mapping.\n\nThe API for the `org.springframework.web.servlet.HandlerMapping`\
    \ consists of a single method (see [Listing 4-7](#Chapter04.html#list_4_7)). This\
    \ method is called by the `DispatcherServlet` to determine the `org.springframework.web.servlet.HandlerExecutionChain`.\
    \ It is possible to have more than one handler mapping configured. The servlet\
    \ will call the different handler mappings in sequence until one of them doesn’t\
    \ return `null`.\n\n**Listing 4-7.** The HandlerMapping API\n\n```\npackage org.springframework.web.servlet;\n\
    \nimport javax.servlet.http.HttpServletRequest;\npublic interface HandlerMapping\
    \ {\n\n    HandlerExecutionChain getHandler(HttpServletRequest request)\n    throws\
    \ Exception;\n\n}\n```\n\n![Image](images/9781430241553_Fig04-10.jpg)\n\n**Figure\
    \ 4-10.** HandlerMapping implementations\n\nOut of the box, Spring MVC provides\
    \ six different implementations. Most of them are based on URL mappings. Two of\
    \ the implementations offer a more sophisticated mapping strategy, which you’ll\
    \ learn about momentarily. However before looking at the different implementations,\
    \ it might help to take a closer look at a URL and which parts are important.\n\
    \nA request URL consists of several parts. Let’s take a look at the [`http://www.example.org/bookstore/app/home`](http://www.example.org/bookstore/app/home)\
    \ URL and dissect that. A URL consists for four parts (see [Figure 4-11](#Chapter04.html#fig_4_11)):\n\
    \n1.  The hostname of the server\n2.  The name of the application (none, if it\
    \ is the root application)\n3.  The name of the servlet mapping (in the sample\
    \ app, it is mapped to `/`)\n4.  The path inside the servlet\n\n![Image](images/9781430241553_Fig04-11.jpg)\n\
    \n**Figure 4-11.** URL mapping\n\nBy default, all the provided handler-mapping\
    \ implementations use the path relative to the servlet context inside the servlet\
    \ (the servlet context relative path) to resolve handlers. Setting the `alwaysUseFullPath`\
    \ property to `true` can change this behavior. The servlet mapping is then included,\
    \ which would (for the example at hand) lead to `/app/home` being used to resolve\
    \ a request handler; otherwise, `/home` would be used.\n\nA final feature shared\
    \ among all implementations is that a default handler can be configured. This\
    \ is done by setting the `defaultHandler` property. When no handler can be found\
    \ for an incoming request, it will always be mapped to the default handler. This\
    \ is optional, and it should be used with caution, especially when chaining multiple\
    \ handler mappings. Only the last handler mapping should specify a default handler,\
    \ or else the chain breaks.\n\n#### BeanNameUrlHandlerMapping\n\nThe `org.springframework.web.servlet.handler.BeanNameUrlHandlerMapping`\
    \ is one of the default strategies used by the dispatcher servlet. This implementation\
    \ treats any bean with a name that starts with a `/` as a potential request handler.\
    \ A bean can have multiple names, and names can also contain a wildcard, expressed\
    \ as an `*`.\n\nThis implementation uses ant-style regular expressions to match\
    \ the URL of the incoming request to the name of a bean. It follows this algorithm:\n\
    \n1.  Attempt exact match; if found, exit.\n2.  Search all registered paths for\
    \ a match; the most specific one will win.\n3.  If no matches are found, return\
    \ the handler mapped to `/*` or to the default handler (if configured).\n\n![Image](images/square.jpg)\
    \ **Note** The `name` of the bean is not the same as the `id`. Id is defined by\
    \ the XML specification, and it cannot contain special characters such as `/`.\
    \ This means you need to use the name of the bean. You can provide the name for\
    \ a bean by setting the `name` attribute on the `org.springframework.context.annotation.Bean`\
    \ annotation. A bean can have multiple names, and names can be written like an\
    \ ant-style regular expression.\n\n[Listing 4-8](#Chapter04.html#list_4_8) shows\
    \ how to use a bean name and map it to the `/index.htm` url. In the sample application,\
    \ you could now use [`http://localhost:8080/chapter4-bookstore/index.htm`](http://localhost:8080/chapter4-bookstore/index.htm)\
    \ to call this controller.\n\n**Listing 4-8.** The BeanNameUrlHandlerMapping sample\
    \ configuration\n\n```\npackage com.apress.prospringmvc.bookstore.web.config;\n\
    \nimport java.util.Properties;\n\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.Configuration;\n\nimport com.apress.prospringmvc.bookstore.web.IndexController;\n\
    \n@Configuration\npublic class WebMvcContextConfiguration {\n\n    @Bean(name\
    \ = { \"/index.htm\" })\n    public IndexController indexController() {\n    \
    \    return new IndexController();\n    }\n}\n```"
