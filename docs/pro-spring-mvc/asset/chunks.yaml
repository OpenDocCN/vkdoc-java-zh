    #### 部署示例应用


    下一步是将应用部署到 Web 容器中。Tomcat (`http://tomcat.apache.org/`) 是一个绝佳的选择，因此你可以下载并安装它。如前所述，示例文件中没有任何
    Tomcat 特有的内容，因此你也可以自由使用 Jetty、JBoss、Glassfish 或任何其他现代 Web 容器。


    ![Image](img/square.jpg) **注意** 为了减少你需要学习的新内容——如果你对其他 Web 容器更熟悉，那么现在坚持使用你所了解的工具可能更有意义。


    现在，将 WAR 文件从 `SAMPLE_ROOT/build/libs/chapter1-bookstore-1.0.0.war` 复制到 `TOMCAT_ROOT/webapps`。如果
    Tomcat 尚未启动，则通过执行 `TOMCAT_ROOT/bin/startup.sh run`（Windows 系统为 `.bat`）来启动它。


    现在打开你最喜欢的 Web 浏览器，并导航至 [`http://localhost:8080/chapter1-bookstore-1.0.0`](http://localhost:8080/chapter1-bookstore-1.0.0)。如果一切顺利，你应该会看到
    图 1-4 中的界面。


    ![Image](img/9781430241553_Fig01-04.jpg)


    ***图 1-4.** 书店主页*


    什么！你就只能做到这样吗？这个界面看起来糟透了！当然，你可以做得更好 :)。


    然而，这个示例应用的重点是从*非常*简单开始并逐步构建，因此没有任何多余的*花哨内容*干扰细节。别担心；随着你的深入，这个应用会变得**好得多**。


    ![Image](img/square.jpg) **注意** `chapter1-bookstore-1.0.0` 并不是最好的名称；首先，它读起来就不太顺口。Tomcat
    中的默认命名策略是将*上下文路径*设置为 WAR 文件的名称。例如，如果 WAR 文件的名称为 `bookstore.war`，那么上下文路径就是 `/bookstore`。


    恭喜！你已经完成了关键但经常被忽视的一步：确保你的应用可以在 IDE 之外构建和运行。下一步是安装 STS，并实际查看你刚刚出色部署的示例。


    在继续之前，请确保按下 `Control-C` 关闭 Tomcat。


    ### SpringSource Tool Suite (STS)


    正如我们之前所解释的，Spring 并不要求特定的开发环境，但我们确实建议你考虑一个好的 IDE。像 Eclipse 和 IntelliJ IDEA 这样的主流
    IDE 是极好的选择，但基于 Eclipse 的 SpringSource Tool Suite (STS) 为开发基于 Spring 的应用提供了额外的好处。本书将使用
    STS。


    #### 为 Gradle 项目配置 STS


    要安装 Gradle 支持，请点击“安装扩展”。第一次执行此操作时，STS 会下载扩展列表，这可能需要几秒钟。最终，“安装扩展”页面将准备就绪（参见 图 1-5）。


    ![Image](img/9781430241553_Fig01-05.jpg)


    ***图 1-5.** STS 中的“扩展”选项卡*


    接下来，搜索“gradle”；图 1-6 显示了搜索结果。


    ![Image](img/9781430241553_Fig01-06.jpg)


    ***图 1-6.** “gradle”搜索结果*


    现在选中“Gradle 支持”旁边的复选框，然后点击右下角的“安装”。查看提示并点击“下一步”以打开“安装”对话框（参见 图 1-7）。


    ![Image](img/9781430241553_Fig01-07.jpg)


    ***图 1-7.** “安装”对话框*


    点击“下一步”进入“安装详情”对话框，再次点击“下一步”进入许可协议页面。最后，阅读许可协议（谁会读这些？）并点击“完成”。Gradle 插件现在应该开始下载和安装。安装完成后，系统会要求你重新启动——点击“是”。如前所述，典型的
    Java 应用可能具有庞大的依赖关系图。Gradle 已经处理了这个问题，如果为了向 STS 注册而必须手动解析依赖关系，那将非常痛苦。幸运的是，STS 实际上能够理解
    Gradle 项目（就像它理解 Maven 项目一样）。


    #### 将示例导入 STS


    既然 STS 知道如何导航 Gradle 项目，下一步就是将项目导入 STS。为此，选择“文件”![Image](img/U003.jpg)“导入”（即从“文件”菜单中选择“导入”选项）。这将打开“导入”对话框。选择“Gradle”![Image](img/U003.jpg)“Gradle
    项目”（参见 图 1-8）。最后，点击“下一步”（参见 图 1-9）。


    ![Image](img/9781430241553_Fig01-08.jpg)


    ***图 1-8.** STS 导入对话框*


    ![Image](img/9781430241553_Fig01-09.jpg)


    ***图 1-9.** 导入 Gradle 项目对话框*


    现在点击“浏览”并导航到包含示例项目的目录。接下来，点击“构建模型”。


    ![Image](img/square.jpg) **注意** STS 会下载其自己的 Gradle 版本，并且如果你跳过了之前通过命令行构建示例应用的步骤，STS
    还会下载应用的依赖项。这可能需要几分钟时间。


    一旦 Gradle 构建了项目结构的内部表示（即项目及其所有子项目），它将允许你选择要导入的项目（参见 图 1-10）。


    ![Image](img/9781430241553_Fig01-10.jpg)


    ***图 1-10.** 可以导入的 Gradle 项目*


    你可以选择根项目“bookstore”，或者点击“全选”以导入所有项目。之后，点击“完成”指示 STS 实际导入你的项目。这可能需要一些时间，因为 STS
    正在下载所有缺失的依赖项并编译所有项目。不过，这些项目最终应该会出现在 STS 中（参见 图 1-11）。


    ![Image](img/9781430241553_Fig01-11.jpg)


    ***图 1-11.** 导入项目后的 STS*


    ![Image](img/square.jpg) **提示** 我们建议你关闭当前不使用的项目。为此，选择要关闭的项目，右键单击，然后选择菜单选项“关闭项目”。你可以通过双击项目来重新打开它。


    #### 在 SpringSource vFabric tc Server 上运行应用


    在运行应用之前，你必须告诉 STS 要在哪个 Web 容器上运行该应用。你有两个选择：使用你之前下载的 Tomcat 安装，或者使用预构建的 VMware
    vFabric tc Server。


    ![Image](img/square.jpg) **注意** 注册 Tomcat 非常简单：右键单击右下角的“服务器”部分，选择“新建”![Image](img/U003.jpg)“服务器”，展开菜单至“Apache/Tomcat
    v7.0 服务器”，点击“下一步”，浏览到 Tomcat 的安装根目录，点击“打开”，然后点击“确定”。


    要在服务器上运行应用，请右键单击项目并选择“运行方式”![Image](img/U003.jpg)“在服务器上运行”（参见 图 1-12）。


    ![Image](img/9781430241553_Fig01-12.jpg)


    ***图 1-12.** 选择“在服务器上运行”菜单选项*


    选择“在服务器上运行”应打开“在服务器上运行”对话框（参见 图 1-13）。


    ![Image](img/9781430241553_Fig01-13.jpg)


    ***图 1-13.** “在服务器上运行”对话框*


    选择“VMware vFabric tc Server Developer Edition v2.6”条目（或者 Tomcat，如果你决定使用它，则会显示）。接下来，确保选中“运行此项目时始终使用此服务器”，然后点击“完成”。然后，应用应该会被构建并部署到
    tc Server 上。启动后，欢迎页面应该会加载（参见 图 1-14）。


    ![Image](img/square.jpg) **注意** 你可能会注意到，tc Server 启动所需的时间比普通 Tomcat 长得多，因为它需要初始化各种子组件。


    ![Image](img/9781430241553_Fig01-14.jpg)


    ***图 1-14.** 正在运行的应用*

