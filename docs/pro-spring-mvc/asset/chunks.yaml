- fmt: "# Accessing Scoped Variables from Views\n\nAs we have seen, there is an implicit\
    \ object available for each of the Web Flow scopes that you can use to reference\
    \ the scope from within expressions inside your flow. As we have already said,\
    \ Web Flow uses Spring Expression Language (Spring EL). The Spring EL context\
    \ is modified by Web Flow, so that these implicit objects are made available.\n\
    \nFrom the moment we enter our view (in our case, a JSP), we will be indirectly\
    \ using Unified Expression Language (Unified EL). What happens next is that Web\
    \ Flow will make these implicit objects available via the Servlet `request` scope.\
    \ For example, in our JSP we can still use `#{flowExecutionUrl}`. The Unified\
    \ EL will scan each Servlet `scope` and find the `flowExecutionUrl` key on the\
    \ Servlet `request` scope. However, scope-related implicit objects (e.g., `flowScope`\
    \ and `flashScope`) are not available. At this point, you might wonder how you\
    \ can access information that you put on any of the Web Flow scopes from within\
    \ your view.\n\nWhat Web Flow does is put every object from every Web Flow scope\
    \ directly onto the Servlet `request` scope before the view is rendered. This\
    \ means two things:\n\n- You can access any object from any of the Web Flow scopes\
    \ in your flow directly from the Servlet `request` scope. For example, if you\
    \ have an object under key `x` on `flow` scope within your flow, you can access\
    \ that using the expression `#{x}` in your JSP (as noted previously, the Unified\
    \ EL scans the different Servlet scopes and will resolve this from the Servlet\
    \ `request` scope). Likewise, if you had a variable `y` on `conversation` scope,\
    \ you would access it the same way because it is also put on Servlet `request`\
    \ scope: `#{y}`.\n- You have to be careful with the names of the keys. If you\
    \ have a value with key `x` both on `flow` and `conversation` scope, only one\
    \ of the two will be present in the Servlet `request` scope (one will be overwritten).\
    \ Normally, this would not present a problem because having the same key on different\
    \ scopes does not make much sense.\n\n## Programmatically Accessing Scopes\n\n\
    In addition to accessing scopes from expressions using implicit objects, we can\
    \ also access each Web Flow scope using the `org.springframework.webflow.execution.RequestContext`\
    \ object in our code. This object has a getter for each scope. Likewise, we can\
    \ use the `org.springframework.webflow.context.ExternalContext` object for accessing\
    \ Servlet scopes. We can obtain a reference to the `RequestContext` or `ExternalContext`\
    \ object by injecting them using an expression. For example, `flowRequestContext`\
    \ and `externalContext` are both implicit objects, referring to the `RequestContext`\
    \ and `ExternalContext` interfaces, respectively.\n\nIf we have an evaluate action,\
    \ we can use an expression like this:\n\n```\n<evaluate expression=\"myApplicationController.someMethod(flowRequestContext)\"\
    />\n```\n\nThe `someMethod` method accepts the `RequestContext` as a parameter\
    \ (see [Listing 11-32](#Chapter11.html#list_11_32)).\n\n**Listing 11-32.** Injecting\
    \ the RequestContext with an Expression\n\n```\nimport org.springframework.webflow.execution.RequestContext;\n\
    \npublic void someMethod(RequestContext requestContext) {\n    requestContext.getConversationScope();\n\
    }\n```\n\nThere are also two thread-bound holder classes that give you instant\
    \ access to the `RequestContext` and `ExternalContext`:\n\n- `RequestContextHolder.getRequestContext()`\
    \ — see [Listing 11-33](#Chapter11.html#list_11_33)\n- `ExternalContextHolder.getExternalContext()`\
    \ — see [Listing 11-34](#Chapter11.html#list_11_34)\n\n**Listing 11-33.** Accessing\
    \ the Web Flow Scopes\n\n```\nimport org.springframework.webflow.execution.RequestContext;\n\
    import org.springframework.webflow.execution.RequestContextHolder;\n\nRequestContext\
    \ requestContext = RequestContextHolder.getRequestContext();\nrequestContext.getFlowScope();\n\
    requestContext.getFlashScope();\n…\n```\n\n**Listing 11-34.** Accessing the Servlet\
    \ Scopes\n\n```\nimport javax.servlet.http.HttpServletRequest;\nimport javax.servlet.http.HttpSession;\n\
    \nimport org.springframework.webflow.context.ExternalContext;\nimport org.springframework.webflow.context.ExternalContextHolder;\n\
    \nExternalContext externalContext = ExternalContextHolder.getExternalContext();\n\
    \n//Shortcut for respectively accessing Servlet session map and request map\n\
    externalContext.getSessionMap();\nexternalContext.getRequestMap();\n\n//We can\
    \ also retrieve the HttpServletRequestObject itself\nHttpServletRequest httpServletRequest\n\
    \  =(HttpServletRequest)externalContext.getNativeRequest();\n```\n\n## Controlling\
    \ Action Execution\n\nWe've already seen three ways of controlling the execution\
    \ of Web Flow actions: on transition, on start, and on render. However, there\
    \ are other ways to execute these actions, all of which have some specifics that\
    \ govern when they execute their contained actions. These conditions are summed\
    \ up with a detailed overview in the upcoming sections.\n\nEach of these elements\
    \ can also have three sub-elements; these are described in the “Controlling Action\
    \ Execution: Sub-elements” section.\n\n### `<on-start>`\n\nThe `<on-start>` element\
    \ executes one or more actions when the flow starts. The actions contained by\
    \ this element will only be executed once. When multiple actions are specified,\
    \ the execution of the next action will depend on the success of the previous\
    \ action (if one action fails, the next is skipped and an error is thrown). Actions\
    \ will be executed in the order they are defined in the flow.\n\nThere can be\
    \ only one `<on-start>` for an entire flow. If a flow has one or more parent flows\
    \ with `<on-start>` elements, the content is merged into one `<on-start>` in the\
    \ merged flow (we will discuss flow inheritance further in [Chapter 12](#Chapter12.html#ch12)).\n\
    \nThis action is useful for executing the overall initialization of the flow execution/session.\
    \ In our sample, we used it to initialize our form with some defaults.\n\n###\
    \ `<on-end>`\n\nThe `<on-end>` element is the counterpart of `<on-start>`, and\
    \ the same rules apply. The actions defined herein are the last ones executed\
    \ before the flow ends. If the end state of a flow has an `<on-entry>` (see below),\
    \ then that `<on-entry>` is executed before the `<on-end>` executes.\n\nIf a flow\
    \ throws an error before reaching the end of the flow, `<on-end>` is not executed.\
    \ Do not confuse `<on-end>` with a Java `finally` block. There is no guarantee\
    \ that the `<on-end>` will be executed. For example, assume a given flow enters\
    \ a certain view state and renders a view to the user's browser. At this point,\
    \ the flow execution (i.e., the one living in the web container) is paused. The\
    \ user can now decide to trigger a new event that continues to converse with that\
    \ flow execution. However, the user can also decide to navigate to another page\
    \ (or another flow), leaving the current flow execution as-is. When the maximum\
    \ number of concurrent executions is reached, Web Flow will start to clean up\
    \ the oldest flow execution. If our given flow execution is the oldest, it is\
    \ cleaned up; but in that case, the `<on-end>` element will not be triggered.\
    \ It is only triggered when the flow execution ends normally (after hitting an\
    \ end state).\n\nThis element is especially useful in a flow with multiple end\
    \ states where certain logic needs to be executed when the flow ends. Without\
    \ this element, the logic needs to be repeated for each end state, but it can\
    \ now be placed in a single on end. This will ensure that the required logic is\
    \ executed, no matter which of the different end states terminated the flow."
  raw: '#### Accessing Scoped Variables from Views


    As we have seen, there is an implicit object available for each of the Web Flow
    scopes that you can use to reference the scope from within expressions inside
    your flow. As we have already said, Web Flow uses Spring Expression Language (Spring
    EL). The Spring EL context is modified by Web Flow, so that these implicit objects
    are made available.


    From the moment we enter our view (in our case, a JSP), we will be indirectly
    using Unified Expression Language (Unified EL). What happens next is that Web
    Flow will make these implicit objects available via the Servlet `request` scope.
    For example, in our JSP we can still use `#{flowExecutionUrl}`. The Unified EL
    will scan each Servlet `scope` and find the `flowExecutionUrl` key on the Servlet
    `request` scope. However, scope-related implicit objects (e.g., `flowScope` and
    `flashScope`) are not available. At this point, you might wonder how you can access
    information that you put on any of the Web Flow scopes from within your view.


    What Web Flow does is put every object from every Web Flow scope directly onto
    the Servlet `request` scope before the view is rendered. This means two things:


    *   You can access any object from any of the Web Flow scopes in your flow directly
    from the Servlet `request` scope. For example, if you have an object under key
    `x` on `flow` scope within your flow, you can access that using the expression
    `#{x}` in your JSP (as noted previously, the Unified EL scans the different Servlet
    scopes and will resolve this from the Servlet `request` scope). Likewise, if you
    had a variable `y` on `conversation` scope, you would access it the same way because
    it is also put on Servlet `request` scope: `#{y}`.

    *   You have to be careful with the names of the keys. If you have a value with
    key `x` both on `flow` and `conversation` scope, only one of the two will be present
    in the Servlet `request` scope (one will be overwritten). Normally, this would
    not present a problem because having the same key on different scopes does not
    make much sense.


    #### Programmatically Accessing Scopes


    In addition to accessing scopes from expressions using implicit objects, we can
    also access each Web Flow scope using the `org.springframework.webflow.execution.RequestContext`
    object in our code. This object has a getter for each scope. Likewise, we can
    use the `org.springframework.webflow.context.ExternalContext` object for accessing
    Servlet scopes. We can obtain a reference to the `RequestContext` or `ExternalContext`
    object by injecting them using an expression. For example, `flowRequestContext`
    and `externalContext` are both implicit objects, referring to the `RequestContext`
    and `ExternalContext` interfaces, respectively.


    If we have an evaluate action, we can use an expression like this:


    `<evaluate expression="myApplicationController.someMethod(flowRequestContext)"/>`


    The `someMethod` method accepts the `RequestContex`t as a parameter (see [Listing
    11-32](#Chapter11.html#list_11_32)).


    ***Listing 11-32.** Injecting the RequestContext with an Expression*


    `import org.springframework.webflow.execution.RequestContext;`


    `public void someMethod(RequestContext requestContext) {`

    `    requestContext.getConversationScope();`

    `}`


    There are also two thread-bound holder classes that give you instant access to
    the `RequestContext` and `ExternalContext`:


    *   `RequestContextHolder.getRequestContext()`—see [Listing 11-33](#Chapter11.html#list_11_33)

    *   `ExternalContextHolder.getExternalContext()`—see [Listing 11-34](#Chapter11.html#list_11_34)


    ***Listing 11-33.** Accessing the Web Flow Scopes*


    `import org.springframework.webflow.execution.RequestContext;`

    `import org.springframework.webflow.execution.RequestContextHolder;`


    `RequestContext requestContext = RequestContextHolder.getRequestContext();`

    `requestContext.getFlowScope();`

    `requestContext.getFlashScope();`

    `…`


    ***Listing 11-34.** Accessing the Servlet Scopes*


    `import javax.servlet.http.HttpServletRequest;`

    `import javax.servlet.http.HttpSession;`


    `import org.springframework.webflow.context.ExternalContext;`

    `import org.springframework.webflow.context.ExternalContextHolder;`


    `ExternalContext externalContext = ExternalContextHolder.getExternalContext();`


    `//Shortcut for respectively accessing Servlet session map and request map`

    `externalContext.getSessionMap();`

    `externalContext.getRequestMap();`


    `//We can also retrieve the HttpServletRequestObject itself`

    `HttpServletRequest httpServletRequest`![Image](images/U002.jpg)

    `  =(HttpServletRequest)externalContext.getNativeRequest();`


    ### Controlling Action Execution


    We''ve already seen three ways of controlling the execution of Web Flow actions:
    on transition, on start, and on render. However, there are other ways to execute
    these actions, all of which have some specifics that govern when they execute
    their contained actions. These conditions are summed up with a detailed overview
    in the upcoming sections.


    Each of these elements can also have three sub-elements; these are described in
    the “Controlling Action Execution: Sub-elements” section.


    #### <on-start>


    The `<on-start>` element executes one or more actions when the flow starts. The
    actions contained by this element will only be executed once. When multiple actions
    are specified, the execution of the next action will depend on the success of
    the previous action (if one action fails, the next is skipped and an error is
    thrown). Actions will be executed in the order they are defined in the flow.


    There can be only one `<on-start>` for an entire flow. If a flow has one or more
    parent flows with `<on-start>` elements, the content is merged into one `<on-start>`
    in the merged flow (we will discuss flow inheritance further in [Chapter 12](#Chapter12.html#ch12)).


    This action is useful for executing the overall initialization of the flow execution/session.
    In our sample, we used it to initialize our form with some defaults.


    #### <on-end>


    The `<on-end>` element is the counterpart of `<on-start>`, and the same rules
    apply. The actions defined herein are the last ones executed before the flow ends.
    If the end state of a flow has an `<on-entry>` (see below), then that `<on-entry>`
    is executed before the `<on-end>` executes.


    If a flow throws an error before reaching the end of the flow, `<on-end>` is not
    executed. Do not confuse `<on-end>` with a Java `finally` block. There is no guarantee
    that the `<on-end>` will be executed. For example, assume a given flow enters
    a certain view state and renders a view to the user''s browser. At this point,
    the flow execution (i.e., the one living in the web container) is paused. The
    user can now decide to trigger a new event that continues to converse with that
    flow execution. However, the user can also decide to navigate to another page
    (or another flow), leaving the current flow execution as-is. When the maximum
    number of concurrent executions is reached, Web Flow will start to clean up the
    oldest flow execution. If our given flow execution is the oldest, it is cleaned
    up; but in that case, the `<on-end>` element will not be triggered. It is only
    triggered when the flow execution ends normally (after hitting an end state).


    This element is especially useful in a flow with multiple end states where certain
    logic needs to be executed when the flow ends. Without this element, the logic
    needs to be repeated for each end state, but it can now be placed in a single
    on end. This will ensure that the required logic is executed, no matter which
    of the different end states terminated the flow.'
  trans: '

    #### 从视图中访问作用域变量


    如我们所见，每个 Web Flow 作用域都有一个隐式对象可用，你可以在流程内的表达式中使用它来引用该作用域。正如我们之前所说，Web Flow 使用 Spring
    表达式语言（Spring EL）。Web Flow 修改了 Spring EL 上下文，从而使这些隐式对象可用。


    从我们进入视图（在我们的例子中是 JSP）的那一刻起，我们将间接使用统一表达式语言（Unified EL）。接下来，Web Flow 会通过 Servlet
    `request` 作用域使这些隐式对象可用。例如，在我们的 JSP 中，我们仍然可以使用 `#{flowExecutionUrl}`。Unified EL
    会扫描每个 Servlet `scope`，并在 Servlet `request` 作用域中找到 `flowExecutionUrl` 键。然而，与作用域相关的隐式对象（例如
    `flowScope` 和 `flashScope`）并不可用。此时，您可能会想知道如何从视图中访问您放在任何 Web Flow 作用域上的信息。


    Web Flow 所做的是，在渲染视图之前，将每个 Web Flow 作用域中的每个对象直接放到 Servlet `request` 作用域上。这意味着两件事：


    *   您可以直接从 Servlet `request` 作用域访问流程中任何 Web Flow 作用域的任何对象。例如，如果您在流程的 `flow` 作用域中有一个键为
    `x` 的对象，您可以在 JSP 中使用表达式 `#{x}` 来访问它（如前所述，Unified EL 会扫描不同的 Servlet 作用域，并从 Servlet
    `request` 作用域解析它）。同样，如果您在 `conversation` 作用域中有一个变量 `y`，您也可以用相同的方式访问它，因为它也被放到了
    Servlet `request` 作用域上：`#{y}`。

    *   您必须小心处理键的名称。如果您在 `flow` 和 `conversation` 作用域中都有一个键为 `x` 的值，那么 Servlet `request`
    作用域中只会存在其中一个（另一个会被覆盖）。通常，这不会造成问题，因为在不同的作用域中使用相同的键意义不大。


    #### 以编程方式访问作用域


    除了使用隐式对象从表达式中访问作用域之外，我们还可以在代码中使用 `org.springframework.webflow.execution.RequestContext`
    对象来访问每个 Web Flow 作用域。该对象为每个作用域都提供了一个 getter 方法。同样，我们可以使用 `org.springframework.webflow.context.ExternalContext`
    对象来访问 Servlet 作用域。我们可以通过使用表达式注入来获取对 `RequestContext` 或 `ExternalContext` 对象的引用。例如，`flowRequestContext`
    和 `externalContext` 都是隐式对象，分别引用 `RequestContext` 和 `ExternalContext` 接口。


    如果我们有一个 evaluate 动作，我们可以使用如下表达式：


    `<evaluate expression="myApplicationController.someMethod(flowRequestContext)"/>`


    `someMethod` 方法接受 `RequestContext` 作为参数（参见清单 11-32）。


    ***清单 11-32.** 使用表达式注入 RequestContext*


    `import org.springframework.webflow.execution.RequestContext;`


    `public void someMethod(RequestContext requestContext) {`

    `    requestContext.getConversationScope();`

    `}`


    还有两个线程绑定的持有者类，可以让您即时访问 `RequestContext` 和 `ExternalContext`：


    *   `RequestContextHolder.getRequestContext()`——参见清单 11-33

    *   `ExternalContextHolder.getExternalContext()`——参见清单 11-34


    ***清单 11-33.** 访问 Web Flow 作用域*


    `import org.springframework.webflow.execution.RequestContext;`

    `import org.springframework.webflow.execution.RequestContextHolder;`


    `RequestContext requestContext = RequestContextHolder.getRequestContext();`

    `requestContext.getFlowScope();`

    `requestContext.getFlashScope();`

    `…`


    ***清单 11-34.** 访问 Servlet 作用域*


    `import javax.servlet.http.HttpServletRequest;`

    `import javax.servlet.http.HttpSession;`


    `import org.springframework.webflow.context.ExternalContext;`

    `import org.springframework.webflow.context.ExternalContextHolder;`


    `ExternalContext externalContext = ExternalContextHolder.getExternalContext();`


    `//分别访问 Servlet session 映射和 request 映射的快捷方式`

    `externalContext.getSessionMap();`

    `externalContext.getRequestMap();`


    `//我们也可以检索 HttpServletRequest 对象本身`

    `HttpServletRequest httpServletRequest`![Image](img/U002.jpg)

    `  =(HttpServletRequest)externalContext.getNativeRequest();`


    ### 控制动作执行


    我们已经看到了控制 Web Flow 动作执行的三种方式：在转换时、在启动时和在渲染时。然而，还有其他执行这些动作的方式，所有这些方式都有一些特定的规则，用于决定它们何时执行其包含的动作。这些条件将在接下来的章节中通过详细概述进行总结。


    这些元素中的每一个还可以包含三个子元素；这些将在“控制动作执行：子元素”部分中描述。


    #### <on-start>


    `<on-start>` 元素在流程启动时执行一个或多个动作。此元素包含的动作只会执行一次。当指定多个动作时，下一个动作的执行将取决于前一个动作的成功与否（如果某个动作失败，则跳过下一个动作并抛出错误）。动作将按照它们在流程中定义的顺序执行。


    整个流程只能有一个 `<on-start>`。如果一个流程有一个或多个带有 `<on-start>` 元素的父流程，则这些内容会在合并后的流程中合并为一个
    `<on-start>`（我们将在第 12 章中进一步讨论流程继承）。


    此动作对于执行流程执行/会话的整体初始化非常有用。在我们的示例中，我们使用它来用一些默认值初始化表单。


    #### <on-end>


    `<on-end>` 元素是 `<on-start>` 的对应物，适用相同的规则。此处定义的动作是流程结束前最后执行的动作。如果流程的结束状态有一个 `<on-entry>`（见下文），那么该
    `<on-entry>` 会在 `<on-end>` 执行之前执行。


    如果流程在到达结束状态之前抛出错误，则不会执行 `<on-end>`。不要将 `<on-end>` 与 Java 的 `finally` 块混淆。不能保证
    `<on-end>` 一定会被执行。例如，假设一个给定的流程进入某个视图状态，并向用户的浏览器渲染一个视图。此时，流程执行（即存在于 Web 容器中的那个）被暂停。用户现在可以决定触发一个新事件来继续与该流程执行进行对话。然而，用户也可以决定导航到另一个页面（或另一个流程），使当前流程执行保持原样。当达到最大并发执行数时，Web
    Flow 将开始清理最旧的流程执行。如果我们给定的流程执行是最旧的，它将被清理；但在这种情况下，`<on-end>` 元素不会被触发。它仅在流程执行正常结束时（在到达结束状态后）被触发。


    此元素在具有多个结束状态的流程中特别有用，当流程结束时需要执行某些逻辑。如果没有此元素，则逻辑需要为每个结束状态重复，但现在可以将其放在一个单一的 on end
    中。这将确保无论哪个不同的结束状态终止了流程，所需的逻辑都会被执行。

    '
- fmt: "#### `<on-entry>`\n\n`<on-entry>`元素可以应用于所有五种状态：视图、动作、决策、子流程和结束状态。由`<on-entry>`元素指定的动作在每次进入该状态时都会执行。\n\
    \n然而，这仅在状态被*显式*进入时才成立。例如：当你在转换（嵌套在视图状态中）中省略`to`属性时，你会停留在同一个视图状态（即视图状态会被重新渲染）。但在这种情况下，`<on-entry>`不会被触发。必须有一个显式的转换到某个状态，才能执行`<on-entry>`。\n\
    \n换句话说，你需要指定`to`属性来触发`<on-entry>`（或`<on-exit>`，我们将在下一节中看到）。`to`属性所引用的状态并不重要；无论它是定义转换的同一个状态，还是完全不同的另一个状态，这一点都成立。例如，在视图状态的情况下，如果一个转换返回到同一个视图状态（显式指定了`to`属性），那么`<on-entry>`将再次执行。\n\
    \n如果我们在`createOrders-flow`的`selectBooks`视图状态中放置一个`<on-entry>`（参见[清单11-15](#Chapter11.html#list_11_15)），那么每次触发`reset`转换时它都会执行。然而，当触发`add`转换时它*不会*执行，因为该转换没有显式地转换回`selectBooks`视图状态（它没有`to`属性）。\n\
    \n#### `<on-exit>`\n\n`<on-exit>`元素在状态退出时执行。此元素可以应用于以下状态：视图、动作、决策和子流程。但是，它不能应用于结束状态。\n\
    \n由`<on-exit>`指定的动作在每次状态退出时都会执行。这也适用于转换到同一个状态的情况；在这种情况下，如果指定了`to`属性，状态会退出并重新进入（适用于`<on-entry>`元素的相同规则也适用于`<on-exit>`元素）。现在让我们扩展之前给出的`<on-entry>`示例。如果我们在`createOrders-flow`的`selectBooks`视图状态中添加一个`<on-exit>`（参见[清单11-15](#Chapter11.html#list_11_15)），那么执行`reset`转换将触发`<on-exit>`。在这种情况下，我们将退出`selectBooks`视图状态，然后再次进入它。\n\
    \n#### `<on-render>`\n\n`<on-render>`元素仅适用于五种状态中的一种：视图状态。正如[第10章](#Chapter10.html#ch10)中所讨论的，Web\
    \ Flow在处理请求时使用两阶段方法（Post Redirect Get）。转换中的表达式在POST阶段执行。`<on-render>`元素在视图渲染之前执行，即在GET阶段。\n\
    \n当处理大型结果集时，我们可以通过在视图渲染之前将它们加载到`request`作用域中来利用此行为。我们在本章中已经看到了这一点，当时我们介绍了重构示例应用程序的第一阶段（请参阅本章前面的“On\
    \ Render”部分）。\n\n#### 控制动作执行：子元素\n\n前面描述的每个元素都支持三个子元素：\n\n*   `evaluate`\n*  \
    \ `set`\n*   `render`\n\n你已经熟悉`evaluate`动作。它接受一个（默认是SpEL）表达式并执行它。可选地，你可以使用`result`属性将结果以某个键存储在作用域上，并且如果你要求结果属于特定类型，你可以指定结果类型（使用`result-type`属性）。如果需要，会尝试进行转换；如果没有适用的转换器，则会抛出转换异常。表达式可以直接返回结果对象，或者根据需要将其包装在`org.springframework.webflow.execution.Event`类中以指示不同的结果状态。我们将在“Working\
    \ with Outcome Events”部分进一步讨论事件。\n\n正如本章前面的“Setting Variables and Accessing Scopes”部分所解释的，`<set>`元素允许你在给定的作用域上设置某些内容。你可以指定一个名称和值，它们分别是变量将使用的键和绑定到该键的值。该值可以是一个表达式。可选地，你可以要求结果属于特定类型。如果值不是所需的类型，会尝试进行转换；如果没有适用的转换器，则会抛出转换异常。\n\
    \n`render`元素有些特殊。它支持一个`fragments`属性，该属性接受要渲染的*片段*的ID。但什么是片段？要使用这些功能，你需要Tiles。在配置Tiles时，你定义了填充模板的各个部分。片段指的是此类属性或定义的名称。它允许你部分渲染页面组合的一部分。当一个页面由多个部分组成（每个部分由一个`tiles`属性标识）时，你可以在片段中指定你特别想要重新渲染的部分。页面的所有其他内容保持不变。这允许在浏览器中进行部分页面更新。为了实现这一点，需要在服务器端和客户端进行一些特殊配置。此外，它仅适用于Ajax请求。当进行普通请求时，指定`<render>`动作将不起作用。我们将在[第12章](#Chapter12.html#ch12)的“Web\
    \ Flow AJAX Support”部分进一步讨论这一点。\n\n### 全局转换\n\n正如我们所看到的，转换可以将用户带到另一个视图，或者它可能只是执行一个动作并重新渲染当前视图。在下一章中，我们还将看到转换如何在处理Ajax事件时请求渲染视图的某些部分（称为“片段”）。到目前为止，我们只在状态中看到了转换。这些转换是特定于该状态的。要触发它们，你必须处于该特定状态。\n\
    \n除了在特定状态中定义的转换之外，流程还可以拥有*全局转换*。当事件发生时，如果Web Flow在当前状态中找不到任何匹配的转换，它将尝试查找匹配的全局转换。全局转换必须在流程的末尾定义。请参阅[第10章](#Chapter10.html#ch10)中的流程结构图（参见[图10-1](#Chapter10.html#fig_10_1)）以了解其在流程中的确切位置。\n\
    \n你可能会发现某些转换在多个视图状态中是重复的。使用全局转换，你现在可以在一个地方定义它们。之后，每个状态都可以执行该转换，就好像它直接是该状态的一部分一样。最常见的例子是终止流程的“取消”按钮，该按钮可能出现在流程的每一步。\n\
    \n要定义全局转换，只需将转换取出并嵌套在`<global-transitions>`元素内，如[清单11-35](#Chapter11.html#list_11_35)所示。\n\
    \n***清单11-35.** 定义全局转换*\n\n```\n<global-transitions>\n    <transition on=\"cancel\"\
    \ to=\"endCancel\" />\n</global-transitions>\n```"
  raw: '#### <on-entry>


    The `<on-entry>` element can be applied on all five states: view, action, decision,
    subflow, and end state. The action specified by the `<on-entry>` element is executed
    every time the state is entered.


    However, this is only true when the state is *explicitly* entered. For example:
    when you omit the `to` attribute in a transition (nested in a view state), you
    remain in the same view state (i.e., the view state will be re-rendered). However,
    the `<on-entry>` will not be triggered in that case. There must be an explicit
    transition to a state in order to execute the `<on-entry>.`


    In other words, you need the `to` attribute to be specified to trigger `<on-entry>`
    (or `<on-exit>`, as we will see in the next section). The state to which the `to`
    attribute refers is of no importance; this holds true whether it is the same state
    where the transition is defined or another state altogether. For example, in the
    case of a view state, if a transition returns to the same view state (explicitly
    specifying the `to` attribute), then the `<on-entry>` will be executed again.


    If we were to place an `<on-entry>` in the `selectBooks` view state of the `createOrders-flow`
    (see [Listing 11-15](#Chapter11.html#list_11_15)), then it would be executed every
    time we trigger the `reset` transition. However, it would *not* be executed when
    we trigger the `add` transition because it does not explicitly transition back
    to the `selectBooks` view state (it has no `to` in the transition).


    #### <on-exit>


    The `<on-exit>` element is executed whenever a state is exited. This element can
    be applied on the following states: view, action, decision, and subflow. However,
    it cannot be applied on the end state.


    The action specified by the `<on-exit>` is executed every time the state is exited.
    This also applies when a transition occurs to the same state; in that case, the
    state is exited and entered again if the `to` attribute is specified (the same
    rules apply to the `<on-exit>` element that apply to the `<on-entry>` element).
    Now let''s extend the `<on-entry>` example we gave before. If we were to add an
    `<on-exit>` in the `selectBooks` view state of the `createOrders-flow` (see [Listing
    11-15](#Chapter11.html#list_11_15)), then executing the `reset` transition would
    trigger the `<on-exit>`. In that case, we would exit the `selectBooks` view state
    to enter it again.


    #### <on-render>


    The `<on-render>` element is applicable on only one of the five states: the view
    state. As discussed in the [Chapter 10](#Chapter10.html#ch10), Web Flow uses a
    two-phase approach in processing requests (Post Redirect Get). An expression in
    a transition is executed in the POST phase. The `<on-render>` element is executed
    right before the view is rendered, in the GET phase.


    When dealing with large result sets, we can benefit from this behavior by loading
    them into `request` scope right before the view renders. We already seen this
    in action in this chapter, when we covered the first phase of refactoring the
    sample application (see the “On Render” section earlier in this chapter).


    #### Controlling Action Execution: Sub-elements


    Each of the previously described elements supports three sub-elements:


    *   evaluate

    *   set

    *   render!


    You''re already familiar with the evaluate action. It accepts a (by default SpEL)
    expression and executes it. Optionally, you can store the result on a scope with
    a certain key using the `result` attribute, and you can specify the result type
    if you require the result to be of a certain type (using the `result-type` attribute).
    If so, a conversion is attempted; and if no converter is applicable, a conversion
    exception is thrown. The expression can return the result object directly or wrap
    it in an `org.springframework.webflow.execution.Event` class to indicate different
    outcome states, as required. We discuss events further in the “Working with Outcome
    Events” section.


    As explained in “Setting Variables and Accessing Scopes” section earlier in this
    chapter, the `<set>` element allows you to set something on a given scope. You
    can specify a name and value, which are respectively the key under which the variable
    will be known and the value bound to it. The value can be an expression. Optionally,
    you can require the result to be of a certain type. If the value is not of the
    required type, a conversion is attempted; and if no converter is applicable, then
    a conversion exception is thrown.


    The render element is somewhat special. It supports a `fragments` attribute that
    takes the id of a *fragment* to be rendered. But what is a fragment? To make use
    of these features, you need Tiles. When configuring Tiles, you define the parts
    that fill up your template. A fragment refers to the name of such an attribute
    or definition. It allows you to partially render a part of the page composition.
    When a page consists of multiple parts (each identified by a `tiles` attribute),
    you can name the part in the fragment that you specifically want to re-render.
    All the other content of the page remains untouched. This allows for a partial
    page update in the browser. For this to work, it requires some special configuration
    on both the server and client sides. Also, it will only work for Ajax requests.
    When doing a normal request, specifying the `<render>` action will have no effect.
    We will further discuss this in the “Web Flow AJAX Support” section in [Chapter
    12](#Chapter12.html#ch12).


    ### Global Transitions


    As we have seen, a transition may take the user to another view, or it may simply
    execute an action and re-render the current view. In the next chapter, we''ll
    also see how a transition may request the rendering of parts of a view called
    “fragments” when handling an Ajax event. Until now, we have only seen transitions
    in states. These transitions are local to that specific state. To be able to trigger
    them, you have to be in that given state.


    In addition to transitions defined in a particular state, a flow can also have
    *global transitions*. When an event occurs, if Web Flow cannot find any matching
    transitions in the current state of the flow, it will try to find a matching global
    transition. Global transitions have to be defined at the end of the flow. See
    the flow structure figure in [Chapter 10](#Chapter10.html#ch10) (see [Figure 10-1](#Chapter10.html#fig_10_1))
    for its exact location within the flow.


    You may find that some transitions are duplicated in several view states. With
    global transitions, you can now define them in one place. After that, each state
    will be able to execute that transition as if it were directly part of the given
    state. The most common example of this is a Cancel button that terminates the
    flow, but which might be present on each step of the flow.


    To define a global transition, just take the transition out and nest it within
    the `<global-transitions>` element, as shown in [Listing 11-35](#Chapter11.html#list_11_35).


    ***Listing 11-35.** Defining a Global Transition*


    `<global-transitions>`

    `     <transition on="cancel" to="endCancel" />`

    `</global-transitions>`'
