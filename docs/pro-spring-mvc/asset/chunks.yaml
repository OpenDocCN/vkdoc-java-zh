    Tomcat 6\. Next, we’ll look at the changes needed for Spring Security.    ![Image](images/square.jpg)
    **Note**  Chances are the changes just discussed will no longer be necessary by
    the time you’re reading this. Tomcat 7 support is on the roadmap, and it might
    be implemented by the time you read this. This also demonstrates one of the disadvantages
    of running on a PaaS: you don’t have control over the underlying infrastructure.
    For example, what if you needed to run on Tomcat 7 right now?    ##### Spring
    Security Configuration    We are not yet done with our changes. As a consequence
    of enabling SSL in Spring Security in Chapter 13, Spring Security will now redirect
    us to an HTTPS connection if it detects we’re connecting over HTTP. Cloud Foundry
    supports SSL, but there is a proxy standing in front of our application. This
    proxy will terminate the SSL connection. However, the connection between the proxy
    and the Cloud Foundry Tomcat instance running our application is plain HTTP. [Figure
    A-2](#Appendix.html#fig_A_2) is a bit of a simplification, but it comes close
    enough to illustrating how things look from a developer’s point of view.  ![Image](images/9781430241553_App-02.jpg)  ***Figure
    A-2.** Our application behind the proxy*    Before going to our application, the
    proxy adds some headers that are the result of dealing with the SSL connection.
    It will tell us which cipher was used, as well as the client certificate if performing
    mutual (or two-way) SSL. If we just use “normal” SSL without a client certificate,
    this last header will also be present, but it will have “no value” as its value.    However,
    Spring Security detects an SSL connection by calling `isSecure()` on the `(Http)ServletRequest`.
    This will yield `false` because the connection type between the proxy and the
    application is HTTP. Spring Security will then send out a redirect to the browser,
    asking to switch over to SSL, which will result in an endless loop.    The work
    around is to wrap the `(Http)ServletRequest` using a custom filter. We will override
    the `isSecure()` method to also inspect the HTTP headers when considering whether
    a connection is secure. If the original implementation decides a connection is
    not secure, then we’ll check for the presence of these specific SSL headers added
    by the Cloud Foundry proxy before we make a final decision. [Listing A-5](#Appendix.html#list_A_5)
    shows the filter code, which does nothing more than call `chain.doFilter` using
    the wrapped `(Http)ServletRequest`. The more interesting part for us is the contained
    `CloudFoundryHttpServletRequestWrapper` static class, which acts as our wrapper.    What
    it will do first is call `isSecure()` from the superclass. If the default behavior
    says our request is secure, then we leave everything untouched and return the
    value (`true`) as-is. When the super implementation returns `false`, we try to
    retrieve the `sslclientcipher` and `sslclientcertstatus` headers from the `HttpServletRequest`.
    If both are present and have a non-empty value, we will consider the request as
    being a secured request (at least, we will assume that the user’s browser used
    SSL up until the Cloud Foundry proxy), and we will return `true` instead.    ***Listing
    A-5.** The Filter that Wraps the HttpRequest*  `public class CloudFoundryHttpServletRequestWrappingFilter
    extends GenericFilterBean {`  `    @Override` `    public void doFilter(ServletRequest
    request, ServletResponse response,` `                       FilterChain chain)
    throws IOException, ServletException {` `        chain.doFilter(new CloudFoundryHttpServletRequestWrapper((HttpServletRequest)`
    `request), response);` `    }`  `    static class CloudFoundryHttpServletRequestWrapper
    extends HttpServletRequestWrapper {`  `        private static final String[] TLS_HEADERS
    = new String[]` `        {"sslclientcipher", "sslclientcertstatus"};`  `        public
    CloudFoundryHttpServletRequestWrapper(HttpServletRequest httpServletRequest) {`
    `            super(httpServletRequest);` `        }`  `        @Override` `        public
    boolean isSecure() {` `            boolean isSecure = super.isSecure();` `            if
    (!isSecure) {` `                boolean isActuallySecure = true;` `                for
    (String header : TLS_HEADERS) {` `isActuallySecure = isActuallySecure && StringUtils.isNotBlank`
    ![Image](images/U002.jpg) `(getHeader(header));` `                }` `                isSecure
    = isActuallySecure;` `            }` `            return isSecure;` `        }`
    `    }` `}`  Overriding the `isSecure()` method might seem a bit of a drastic
    measure. However, the Javadoc indicates that it should return `true` if the connection
    is considered secure. It is not bound to a specific protocol, so one should never
    make the assumption that, when `isSecure` returns `true`, the protocol is HTTPS
    by definition. It could also be any other protocol that gives “security” guarantees.
    Also, given that this implementation is the least intrusive and is the least likely
    to break when upgrading Spring or Spring Security, we prefer this solution. Cloud
    Foundry is also working on better SSL support in the near future, possibly allowing
    SSL going all the way up to our server.^([7](#Appendix.html#APP-A-FN-7))    We’ll
    also have to tell Spring Security to use our extra filter in `/spring/spring-security.xml`
    (see [Listing A-6](#Appendix.html#list_A_6)).    ***Listing A-6.** Adding the
    Filter to the spring-security.xml File*  `<security:http use-expressions="true"
    >` `    <security:custom-filter` `      ref="cloudFoundryHttpServletRequestWrappingFilter"`
    `      before="FIRST"/>`  `    <security:form-login login-page="/public/authentication/login.htm"`
    `       default-target-url="/public/main.htm?authenticationOk=1"` `       authentication-failure-url="/public/authentication/login.htm?authenticationNok=1"  />`  `    <security:intercept-url
    pattern="/index.jsp" access="permitAll" />` `    <security:intercept-url pattern="/public/authentication/**"`
    `                            access="permitAll" requires-channel="https" />` `    <security:intercept-url
    pattern="/public/createOrders/**"` `                            access="permitAll"
    requires-channel="https" />` `    <security:intercept-url pattern="/public/**"
    access="permitAll" />`  `    <security:intercept-url pattern="/secured/**"` `                            access="fullyAuthenticated"`
    `                            requires-channel="https" />`  `    <security:intercept-url
    pattern="/**" access="denyAll" />` `</security:http>`  `<bean id="cloudFoundryHttpServletRequestWrappingFilter"`
    `class="com.apress.prospringmvc.bookstore.web.security.` ![Image](images/U002.jpg)
    `CloudFoundryHttpServletRequestWrappingFilter"/>`  Now that we have all this in
    place, we should be able to deploy our application on Tomcat 6—and hence, on Cloud
    Foundry—so let’s now try to do just that.    #### Deploying    Deploying to Cloud
