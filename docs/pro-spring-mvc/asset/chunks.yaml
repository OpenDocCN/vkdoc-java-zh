    使用 `RequestParam` 注解简化了我们的控制器。然而，我们的异常处理要求我们仍然需要访问请求。这将在下一章实现异常处理时发生变化。


    这种方法仍然有一个缺点，那就是我们缺乏对浏览器“返回”按钮的支持。如果我们返回上一页，会弹出一个提示框，询问是否要重新提交表单。在 `POST`^(6) 请求之后进行重定向是一种常见的方法；这样，我们可以解决重复提交的问题。在
    Spring 中，我们可以通过使用 `RedirectAttributes` 来解决这个问题。清单 5-13 以粗体突出显示了我们对控制器所做的最终修改。


