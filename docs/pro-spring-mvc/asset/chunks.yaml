- fmt: '### End State


    An end state terminates the active flow session. [Figure 11-14](#Chapter11.html#fig_11_14)
    shows the attributes and elements for this state.


    ![Image](images/9781430241553_Fig11-14.jpg)


    ***Figure 11-14.** Different attributes and elements of the end state*


    [Listing 11-50](#Chapter11.html#list_11_50) shows an example of an end state terminating
    the active flow session. You can find this code in the `src/main/webapp/WEB-INF/view/createOrders/createOrders-flow.xml`.
    If the terminated flow session is the root flow session of the ongoing flow execution,
    then the entire flow execution will end. When the session is a subflow session,
    then processing will resume in the parent flow.


    ***Listing 11-50.** An End State Terminating the Active Flow Session*


    ```

    <end-state id="endOrderOk" view="redirect:/ordersOverview.htm?orderOk=true&amp;orderId={orderId}"/>

    <end-state id="end" view="redirect:/index.htm"/>

    ```


    ![Image](images/square.jpg) **Note**  In [Listing 11-50](#Chapter11.html#list_11_50),
    we are using an XML entity (`&amp;`) to escape the `&` character. This is mandatory
    because several characters (e.g. `"`, `<`, `>`, and `&`) are not allowed directly
    in XML because they have a special meaning and therefore need to be escaped.


    A flow can have any number of end states. And it is not uncommon for a flow to
    have no end states, such as when you have a repetitive process like searching
    (where you typically have a Search Again button). Having multiple end states is
    also common—one for each logical outcome of the flow. As shown in the sample code,
    we have an end state in case the user wants to cancel the order flow. If this
    happens, we redirect the user to the home page. We also have an end state that
    redirects the user to the order overview page once an order has been successfully
    created.


    An end state can optionally reference a view. Such a view can be used to confirm
    that flow processing ended successfully; this is typically called a *confirmation
    view*. The view referenced by an end state will only be rendered when that end
    state terminates the entire flow execution. If the end state ends a subflow session,
    view selection becomes the responsibility of the resuming parent flow.


    In the “Subflows” section, we also saw that an end state can have an output element.
    This allows the end state to map data back to the parent flow. You can see this
    in action in [Listing 11-47](#Chapter11.html#list_11_47).


    ![Image](images/square.jpg) **Caution**  We have seen that Web Flow uses PRG.
    However, the end state is a bit of an exception. When an end state is triggered,
    Web Flow will terminate the flow execution after handling the first request in
    the PRG idiom (the POST request). It will also render and send back the view after
    processing the first request—however, it will not send a redirect, as it normally
    does. If a normal redirect is issued, the second request in the PRG idiom (the
    GET) triggers a flow execution restart because the flow execution was already
    terminated after handling the first request (again, the POST). This means that,
    if you refresh the page after hitting an end state, you will be restarting the
    flow. To avoid this, it is better to let the end state redirect to a *stable*
    (possibly external) URL. The sample code accomplishes this with some `redirect`
    syntax. For an external redirect, outside of the application''s context, you could
    use the `externalRedirect` attribute. In this case, there will be no more incoming
    requests to the flow execution because the newly rendered URL has nothing more
    to do with the flow.


    ### Summary


    After finishing this chapter, you should have a solid understanding about most
    Web Flow features and how to apply them. You should be able to start using Web
    Flow in your own applications, referring back to this chapter and [Chapter 10](#Chapter10.html#ch10)
    whenever you are in doubt or need to refresh your memory on the specifics of Web
    Flow''s behavior.


    In this chapter, we showed how you can solve real-world use cases using Web Flow.
    These use cases included conversion, formatting, and validation. Along the way,
    you learned in detail how you can choose among the different types of validation.
    This chapter also addressed subflows, which allow you to build more maintainable
    and reusable flows. For example, we covered all of the different scopes, as well
    as how to use them. We also reviewed all of the action states and covered how
    to use them in our use sample application.


    You are now ready to proceed to the next and final Web Flow chapter, where you
    will explore some of the more advanced functionality that Web Flow has to offer.


    ## C H A P T E R  12


    ## Advanced Spring Web Flow


    Welcome to the final chapter on Spring Web Flow. In the couple previous chapters,
    we made you familiar with the Web Flow basics, such as how to configure Web Flow,
    glue it together with Spring MVC, and set up a basic flow. We also explained the
    different elements, such as action states, model binding, validation, application
    controllers (and how to call them), expressions, and so forth.


    Our approach for the previous chapters was to gradually introduce you to the concepts
    contained therein and to build on those concepts as the chapters went on. In [Chapter
    10](#Chapter10.html#ch10), we started with a basic high level view of Web Flow,
    introduced a simple use case, and then built that out as a sample application
    to illustrate the different aspects of using Web Flow.


    In [Chapter 11](#Chapter11.html#ch11), we extended that by further refactoring
    and building out the sample application with new Web Flow functionality.


    This chapter will continue to build on those topics covered previously; however
    the topics in this chapter are less coupled. Every topic should be more or less
    seen as an individual topic that discusses its own Web Flow feature.


    We will continue with the sample application as we left it in the previous chapter,
    and we are going to make modifications to support the features we discuss here.
    A feature can be something completely new or an extension to something we saw
    in a previous chapter. We intentionally divided the chapters this way to keep
    the previous chapter as digestible as possible, but also so that you can start
    in this chapter with the required Web Flow knowledge to jump right into a given
    feature.


    After reading this final chapter on Web Flow, you should have a thorough understanding
    of nearly all the most important Web Flow features, including how and when to
    use them in practice.


    ### Inheritance


    In the previous chapter, we introduced you to subflows, which will help you in
    structuring and reusing your flows. But there is another Web Flow feature that
    can help you with this structure and reuse: inheritance. *Web Flow offers two
    forms of inheritance:*


    *   Flow inheritance

    *   State inheritance


    In the previous chapter, we also saw there is a special attribute on the flow
    root element that you can use to declare flow inheritance (the `parent` attribute).
    In this chapter, we will demonstrate that functionality. In addition to the flow,
    inheritance can also be applied to the five different states individually (i.e.,
    the `view`, `action`, `decision`, `subflow`, and `end` states). In the following
    sections, we will discuss each of these modularity features in detail. And again,
    we will build these examples on top of the sample application constructed in the
    previous couple of chapters.'
