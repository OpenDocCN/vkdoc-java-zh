    ***Listing 4-7.** The HandlerMapping API*


    `package org.springframework.web.servlet;`


    `import javax.servlet.http.HttpServletRequest;`

    `public interface HandlerMapping {`


    `    HandlerExecutionChain getHandler(HttpServletRequest request)`

    `    throws Exception;`


    `}` ![Image](images/9781430241553_Fig04-10.jpg)


    ***Figure 4-10.** HandlerMapping implementations*


    Out of the box, Spring MVC provides six different implementations. Most of them
    are based on URL mappings. Two of the implementations offer a more sophisticated
    mapping strategy, which you’ll learn about momentarily. However before looking
    at the different implementations, it might help to take a closer look at a URL
    and which parts are important.


    A request URL consists of several parts. Let’s take a look at the [`http://www.example.org/bookstore/app/home`](http://www.example.org/bookstore/app/home)
    URL and dissect that. A URL consists for four parts (see [Figure 4-11](#Chapter04.html#fig_4_11)):


    1.  The hostname of the server

    2.  The name of the application (none, if it is the root application)

    3.  The name of the servlet mapping (in the sample app, it is mapped to /)

    4.  The path inside the servlet


    ![Image](images/9781430241553_Fig04-11.jpg)


    ***Figure 4-11.** URL mapping*


    By default, all the provided handler-mapping implementations use the path relative
    to the servlet context inside the servlet (the servlet context relative path)
    to resolve handlers. Setting the `alwaysUseFullPath` property to `true` can change
    this behavior. The servlet mapping is then included, which would (for the example
    at hand) lead to */app/home* being used to resolve a request handler; otherwise,
    */home* would be used.


    A final feature shared among all implementations is that a default handler can
    be configured. This is done by setting the `defaultHandler` property. When no
    handler can be found for an incoming request, it will always be mapped to the
    default handler. This is optional, and it should be used with caution, especially
    when chaining multiple handler mappings. Only the last handler mapping should
    specify a default handler, or else the chain breaks.


    ##### BeanNameUrlHandlerMapping


    The `org.springframework.web.servlet.handler.BeanNameUrlHandlerMapping` is one
    of the default strategies used by the dispatcher servlet. This implementation
    treats any bean with a name that starts with a / as a potential request handler.
    A bean can have multiple names, and names can also contain a wildcard, expressed
    as an *.


    This implementation uses ant-style regular expressions to match the URL of the
    incoming request to the name of a bean. It follows this algorithm:


    1.  Attempt exact match; if found, exit.

    2.  Search all registered paths for a match; the most specific one will win.

    3.  If no matches are found, return the handler mapped to /* or to the default
    handler (if configured).


    ![Image](images/square.jpg) **Note** The `name` of the bean is not the same as
    the `id`. Id is defined by the XML specification, and it cannot contain special
    characters such as /. This means you need to use the name of the bean. You can
    provide the name for a bean by setting the `name` attribute on the `org.springframework.context.annotation.Bean`
    annotation. A bean can have multiple names, and names can be written like an ant-style
    regular expression.


    [Listing 4-8](#Chapter04.html#list_4_8) shows how to use a bean name and map it
    to the `/index.htm` url. In the sample application, you could now use [`http://localhost:8080/chapter4-bookstore/index.htm`](http://localhost:8080/chapter4-bookstore/index.htm)
    to call this controller.


    ***Listing 4-8.** The BeanNameUrlHandlerMapping sample configuration*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `import java.util.Properties;`


    `import org.springframework.context.annotation.Bean;`

    `import org.springframework.context.annotation.Configuration;`


    `import com.apress.prospringmvc.bookstore.web.IndexController;`


    `@Configuration`

    `public class WebMvcContextConfiguration {`


    **`    @Bean(name = { "/index.htm" })`**

    `    public IndexController indexController() {`

    `        return new IndexController();`

    `    }`

    `}`'
