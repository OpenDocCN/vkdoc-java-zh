  trans: '

    #### Web 层


    Web 层有两项职责。第一项职责是引导用户在 Web 应用程序中进行操作。第二项职责是作为服务层与 HTTP 之间的集成层。


    引导用户在网站中导航，可以简单到将 URL 映射到视图，也可以复杂到像 Spring Web Flow 那样提供完整的页面流解决方案。导航通常仅绑定在 Web
    层，领域层或服务层中不应包含任何导航逻辑。


    作为集成层，Web 层应尽可能精简。它应该负责将传入的 HTTP 请求转换为服务层能够处理的内容，然后将服务层返回的结果（如果有）转换为用户界面的响应。Web
    层不应包含任何业务逻辑——那是服务层的唯一职责。


    Web 层还包含 Cookie、HTTP 头，以及可能的 HTTP 会话。Web 层有责任以一致且透明的方式管理所有这些内容。不同的 HTTP 元素绝不应渗透到我们的服务层中。如果渗透进去，整个服务层（以及我们的应用程序）就会与
    Web 环境绑定。这样做会使应用程序更难以维护和测试。保持服务层的纯净，也使我们能够为不同的渠道复用相同的服务。例如，它使我们能够添加 Web 服务或基于
    JMS 的解决方案。Web 层应被视为连接服务层并将其暴露给最终用户的客户端或代理。


    在 Java Web 开发的早期，这一层主要由 Servlet 或 Java Server Pages 实现。Servlet 负责处理请求并将其转换为服务层能够理解的内容。通常情况下，Servlet
    会直接将所需的 HTML 写回客户端。这种实现方式很快就变得难以维护和测试。几年后，Model 2 MVC 模式出现，我们终于拥有了先进的 Web MVC
    能力。


    像 Spring MVC、Struts、JSF 和 Tapestry 这样的框架为这种模式提供了不同的实现，它们的工作方式也大相径庭。然而，我们可以识别出两种主要的
    Web 层实现类型：请求/响应框架（例如 Struts 和 Spring MVC）和基于组件的框架（例如 JSF 和 Tapestry）。请求/响应框架操作于
    `javax.servlet.ServletRequest` 和 `javax.servlet.ServletResponse` 对象。因此，它们操作 Servlet
    API 这一事实并未真正对用户隐藏。基于组件的框架则提供了一种完全不同的编程模型。它们试图对程序员隐藏 Servlet API，并提供一种基于组件的编程模型。使用基于组件的框架感觉很像在使用
    Swing 桌面应用程序。


    两种方法各有优缺点。Spring MVC 相当强大，并且在两者之间取得了良好的平衡。它可以隐藏用户正在使用 Servlet API 这一事实；然而，在需要时，访问该
    API（以及其他内容）也非常容易。


    Web 层依赖于领域层和服务层。在大多数情况下，您需要将传入的请求转换为领域对象，并调用服务层的方法对该领域对象执行某些操作（例如，更新客户或创建订单）。Spring
    MVC 可以轻松地将传入的请求映射到对象，并且我们可以使用依赖注入来访问服务层。


    在 Spring MVC 中，Web 层由 `org.springframework.web.servlet.mvc.Controller` 接口或带有 `org.springframework.stereotype.Controller`
    注解的类表示。基于接口的方法历史悠久，自 Spring 框架诞生以来就一直存在；然而，它现在被认为已经过时了。尽管如此，它对于简单的用例仍然有用，并且 Spring
    提供了一些开箱即用的便捷实现。新的基于注解的方法比原始的基于接口的方法更强大、更灵活。本书主要关注基于注解的方法。


    在执行控制器之后，基础设施（有关此主题的更多信息，请参见第 4 章）期望存在一个 `org.springframework.web.servlet.ModelAndView`
    类的实例。该类包含了模型（以 `org.springframework.ui.ModelMap` 的形式）和要渲染的视图。这个视图可以是一个实际的 `org.springframework.web.servlet.View`
    实现，也可以是一个视图的名称。


    ![Image](img/square.jpg) **注意** 不要在实现了 `Controller` 接口的类上使用 `@Controller` 注解。这两者的处理方式不同，混合使用这两种策略可能会导致意想不到且不期望的结果！

    '
- fmt: "### The Service Layer\n\nThe service layer is a very important layer in the\
    \ architecture of an application. It can be considered the heart of our application\
    \ because it exposes the functionality (the use cases) of the system to the user.\
    \ It does this by providing a coarse-grained API (as mentioned in [Table 3-2](#Chapter03.html#tab_3_2)).\
