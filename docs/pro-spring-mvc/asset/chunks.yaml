    ![Image](img/9781430241553_Fig12-04.jpg)


    ***图 12-4.** Firebug 捕获请求并显示请求参数*


    在服务器端，`AjaxUrlBasedViewResolver` 将该请求识别为 AJAX 请求。当流程恢复时，它会根据请求参数中的事件 ID 发现我们想要执行
