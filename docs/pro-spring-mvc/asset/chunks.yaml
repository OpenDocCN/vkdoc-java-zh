    \ public AccountRepository accountRepository() {\n            return Mockito.mock(AccountRepository.class);\n\
    \        }\n    }\n}\n```\n\n至此，我们完成了使用模拟的`AccountRepository`对`AccountService`的测试。我们希望已经向你展示了使用Mockito设置和验证模拟对象是多么容易，以及它们在隔离待测试逻辑方面是多么有用。还有许多其他功能可以帮助你设置所需的模拟环境。这些超出了本章的范围，因此我们建议你访问Mockito网站作为良好的起点。\n\
    \n## 测试你的MVC逻辑\n\n如[图 9-9](#Chapter09.html#fig_9_9)所示，Spring MVC由视图层（JSP）、控制器（Spring内部代码）、模型和应用程序控制器组成。重要的是，我们首先要决定这些组件中哪些应该实际测试，哪些不应该。\n\
