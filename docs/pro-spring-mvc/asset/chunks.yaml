    #### 结合 AJAX 和 REST


    我们简要介绍了 REST，也涉及了 AJAX 的主题，但我们是分别介绍每个主题的。然而，将两者结合起来也非常容易。在 REST 部分，我们将账户更新表单改为了一个使用
    `PUT` 请求提交的表单，但这只是使用 `POST` 进行的模拟。使用我们所用的 JavaScript 库，实际上可以创建一个真正的 `PUT` 请求，而不是一个被当作
    `PUT` 请求使用的 `POST` 请求。


    为了能够发起并处理 `PUT` 请求，我们需要做两件事：表单必须通过 AJAX 以 `PUT` 请求的方式提交，并且我们需要准备好服务器以处理 `PUT`
    请求。`POST` 和 `PUT` 请求之间存在一些差异。一个主要区别是 `POST` 请求必须提供表单数据（这是规范要求的），但对于 `PUT` 请求则并非如此。Spring
    提供了一个 `org.springframework.web.filter.HttpPutFormContentFilter`，可以帮助我们解决这个问题。


    当检测到内容类型为 `application/x-www-form-urlencoded` 的 `PUT` 请求时，该过滤器会生效。它会解析传入请求的请求体（委托给
    `org.springframework.http.converter.xml.XmlAwareFormHttpMessageConverter`），结果是一个参数映射，可以像普通表单参数一样使用。清单
    7-11 展示了如何注册该过滤器。


    ***清单 7-11.** 注册 HttpPutFormContentFilter*


