    时，我们的 @Configuration 类将被加载，但 Spring XML 文件（稍后由 Cloud Foundry 添加）将被忽略。希望这个限制将来会消失，这样我们就可以使用我们想要的任何类型的应用程序上下文实现。    最后，我们需要配置过滤器，如清单
    A-3 所示。    ***清单 A-3.** 向 web.xml 文件添加过滤器*  `<filter>` `    <filter-name>openEntityManagerInViewFilter</filter-name>`
    `    <filter-class>` `        org.springframework.orm.jpa.support.OpenEntityManagerInViewFilter`
    `    </filter-class>` `</filter>`  `<filter-mapping>` `    <filter-name>openEntityManagerInViewFilter</filter-name>`
