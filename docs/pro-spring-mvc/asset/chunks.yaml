    Tiles requires one or more files to define our pages; these are called the *definitions
    files*. The default file loaded by the `TilesConfigurer` is the `/WEB-INF/tiles.xml`
    (see [Listing 8-14](#Chapter08.html#list_8_14)).


    ***Listing 8-14.** Tiles Definitions*


