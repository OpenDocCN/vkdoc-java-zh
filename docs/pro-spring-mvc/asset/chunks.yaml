  trans: '

    ![Image](img/square.jpg) **注意** 你可能会问，基于令牌（流程执行键）同步访问是否会影响性能。答案是不会。同步发生在同一 HTTP
    会话内的流程执行中。换句话说，它序列化了单个客户端发送到同一流程执行的操作的访问。例如，客户端的重复提交会被序列化，因为重复提交会在同一 HTTP 会话内并行向同一流程执行发起多个请求。然而，如果两个不同的客户端（因此是两个不同的会话和不同的流程执行）恰好同时按下同一个“提交”按钮，则不会发生序列化，所有操作都会并行执行。


    现在让我们回到 F5（刷新）按钮引发的问题。即使没有双击，意外刷新已提交的表单也会触发同样的效果。它不会被检测为双击（只有一个请求，按顺序跟在第一个请求之后）。针对这个问题，Web
    Flow 提供了“Post Redirect Get (PRG)”模式。这个名称虽然复杂，但模式本身非常容易理解，它解决了“意外”重新提交的问题。


    #### Post Redirect Get (PRG)


    通过应用 PRG，Web Flow 会对请求进行两阶段处理。在第一阶段，从浏览器接收 HTTP 请求。首先，触发应用程序逻辑（如果有的话）的调用。接着，在开始第二阶段之前，Web
    Flow 向浏览器发出重定向，第二阶段负责渲染并返回视图。这使得浏览器忘记表单，并发出一个（幂等的）GET 请求来获取视图。之后按 F5 只会重新发送最后一次
    GET 请求。因此，它仅重新执行第二阶段，即渲染并返回视图（参见图 10-5）。


    ![Image](img/9781430241553_Fig10-05.jpg)


    ***图 10-5.** PRG（Post Redirect Get）模式*


    起初，你触发一个正常的表单提交。请记住：如果你重复提交，得益于 Web Flow 的序列化机制，每次只会处理一个提交。另一个提交会在第一个提交完成后被处理。如果第一个请求结束了流程，第二个请求则会简单地重新启动流程。


    当请求（一个 HTTP POST）进入 Web 容器时，它会执行请求的逻辑。Web Flow 不会直接渲染视图并发送 HTTP 200（+ 视图数据），而是会向客户端浏览器发送一个
    302 重定向。此时，流程执行被“暂停”，状态被内部存储起来。请求之间存储状态的机制完全由 Web Flow 处理。


    浏览器会跟随重定向，向 Web 容器发出一个 HTTP GET 请求。在这里，Web Flow 再次接手请求，并让视图被渲染。视图最终被发送回客户端浏览器并显示。请记住：最后的动作不是
    POST，而是 GET。如果用户按下 F5，会执行（幂等的）GET 请求，不会产生任何副作用；它仅仅返回最后一个视图，而不会（重复）再次处理相同的逻辑。因此，没有机会意外重新提交表单。你可以免费获得所有这些功能。酷！


    #### 受控导航


    到目前为止，你主要使用 Spring MVC 来管理应用程序中的导航。例如，使用 `org.springframework.web.servlet.ModelAndView`
    可以让你指定下一个要渲染的视图。在流程中工作时，Web Flow 将接管导航控制权。它实际上会从你的控制器中抽离出来，并在你的流程中进行建模。你还将能够触发应用程序控制器上的操作，或直接从流程内部执行逻辑。


    当我们谈到应用程序控制器时，在使用 Web Flow 时是否还需要它们？答案取决于具体场景。你的流程实际上已经成为了应用程序控制器。它控制导航，并可以通过表达式语言执行逻辑。你可以直接从流程内部调用一个外观（或者服务，如果你喜欢的话）。然而，大多数情况下，使用一个普通的
    Java 对象（POJO）作为应用程序控制器并无坏处。Java 仍然比冗长的表达式和 XML 更易读。对于只需一行 Java 代码的单个方法就能解决的琐碎事情，仅靠你的流程就足够了。如果你需要更多逻辑，并觉得有必要开始编写代码，那么最好创建一个单独的
    POJO 应用程序控制器（用 @Controller 注解），并让你的流程调用其方法。


    ![Image](img/square.jpg) **注意** 你可能想知道，在使用 Web Flow 时，应用程序控制器上是否仍然需要 @`Controller`
    注解。需要了解的是，当应用这些注解时，相关类会成为一个 Spring 管理的 Bean。这意味着你可以直接从流程中引用这些应用程序控制器。从注解角度来看，你可以使用
    @Controller 或 @Component 来实现。@Controller 只是 @Component 的一种特化。换句话说，两者作用相同——@Controller
    只是额外表明该类是一个应用程序控制器（位于前端的东西）。即使你的应用程序控制器仅由流程使用，而可能不被 Spring MVC 使用，继续使用 @Controller
    可能也是一个好主意。归根结底，应用程序控制器是你流程的扩展（流程本身也可以被视为一个应用程序控制器）。

    '
- fmt: "#### When to Avoid Web Flow\n\nAs with everything, there are pros and cons\
    \ when using Web Flow. We've already introduced you to some of the pros that Web\
    \ Flow will deliver for your application. Now let's look at situations where it\
    \ might be inappropriate to use Web Flow.\n\nFortunately, we can think of only\
    \ three reasons to avoid using Web Flow. First, you'll (obviously) want to avoid\
    \ using Web Flow when your web application framework has no support for it. We\
    \ would suggest finding different solutions in that case. But since we are using\
    \ Spring MVC, this is not an issue for us. (By the way, Web Flow also supports\
    \ JSF and portlets, or JSR-168^([3](#Chapter10.html#CHP-10-FN-3)) environments.)\n\
    \nSecond, Spring MVC already has some (primitive) support for building wizards\
    \ (sequential views that share state), so one could say that the Spring MVC infrastructure\
    \ can be used for simple, interdependent pages. On the other hand, introducing\
    \ Web Flow is pretty easy (as we will see). Web Flow will add a great deal of\
    \ functionality and other possibilities that won't bother you if you don't need\
    \ them, but are there when you do. Web Flow is, like almost all Spring technology,\
    \ non-intrusive.\n\nThird, Web Flow is not very useful for places in your application\
    \ where there are no flows. If everything is contained in a single page, then\
    \ Web Flow will only cause overhead. This page could still be backed by normal\
    \ Spring MVC controllers and remain Web Flow-unaware.\n\nSo, outside of these\
    \ situations and the fact that it is yet another framework/concept to learn, we\
    \ see little or no disadvantages to introducing Web Flow to your application.\
    \ If you don't need it for some specific, very easy use cases and can get along\
    \ with Spring MVC controllers, then do so. Our Web Flow setup will still allow\
    \ you to use Spring MVC and Web Flow next to each other in the same application,\
    \ allowing you to pick the right option for each situation.\n\n![Image](images/square.jpg)\
    \ **Note** The basic Spring MVC flow functionality we talked about is supported\
    \ via a specific Spring MVC controller: `org.springframework.web.servlet.mvc.AbstractWizardFormController`.\
    \ This class is now deprecated, and you should use the standard `@Controller`\
    \ annotation instead. You can build a flow in combination with `@SessionAttributes`\
    \ and `org.springframework.web.bind.support.SessionStatus` to end the flow when\
    \ processing is over. While this is still a valid alternative, it is a bit cumbersome.\
    \ Be aware that this way of working is very limited and in no way resembles the\
    \ extra power that Web Flow gives you. Our advice is to use this approach only\
    \ as a small helper in case you need to build very discrete and small bits of\
    \ flow logic for a very small part of your application. For all other needs, save\
    \ yourself the trouble and consider using Web Flow.\n\n### The Basic Ingredients\
    \ of a Flow\n\nIn this section, we will look at the basic building blocks required\
    \ for building a so-called flow. We will start off with a simple flow example,\
    \ and then explain the different elements that this flow consists of. We will\
    \ not go into detail about all the possible options of each element, but simply\
    \ stick to the basics. In the next chapter, we will revise certain elements laid\
    \ out here (as well as cover some new ones) and go more into more detail about\
    \ how to use those elements. Therefore, don't panic if certain functionality is\
    \ not described here—we will get there.\n\n____________\n\n³ [`http://jcp.org/aboutJava/communityprocess/final/jsr168/index.html`](http://jcp.org/aboutJava/communityprocess/final/jsr168/index.html)\n\
    \n#### Flow\n\nA flow is the main component that you will be interacting with.\
    \ It is an XML document written by you and interpreted by Web Flow. A flow defines\
    \ the possible steps in your application and defines the following things for\
    \ each step:\n\n*   Which view should be rendered and the interaction between\
    \ views\n*   Which actions are possible and whether to delegate execution to application\
    \ controllers or execute expressions directly in your flow\n\nEach flow definition\
    \ is an XML document and should therefore comply with XML syntax standards. You\
    \ start with the XML declaration, followed by the flow root element (see [Listing\
    \ 10-1](#Chapter10.html#list_10_1)).\n\n**Listing 10-1.** A Flow Root Element\
    \ Declaration\n\n```\n<flow xmlns=http://www.springframework.org/schema/webflow\n\
    \      xsi:schemaLocation=\"\n        http://www.springframework.org/schema/webflow\n\
    \        http://www.springframework.org/schema/webflow/spring-webflow-2.0.xsd\"\
    >\n```\n\nThere is an XML Schema for a flow definition that will tell you which\
    \ elements/attributes are allowed at which location. This schema will also give\
    \ you a short summary that covers what each (basic) element/attribute is good\
    \ for.\n\nIn [Figure 10-6](#Chapter10.html#fig_10_6), we can see the visualization\
    \ of the flow definition XML schema.^([4](#Chapter10.html#CHP-10-FN-4)) This schema\
    \ allows us to give an overview of the elements and attributes a flow definition\
    \ can consist of.\n\n![Image](images/square.jpg) **Note** Depending on how familiar\
    \ you are with XML schemas, you might know that the schema visualization only\
    \ resembles the top-level elements of a flow. Most of the elements have their\
    \ own attributes, but these attributes are not listed here (you can see them when\
    \ you drill down in the schema). When we discuss the elements in this or the next\
    \ chapter, we will list and explain the attributes of these elements. Also, some\
