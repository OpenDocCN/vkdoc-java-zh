    by specifying the attributes: *`username-parameter`*, *`password-parameter`,*
    and *`login-processing-url`*. We mention this option because it might be worth
    considering in your own Spring projects, although we will leave the values at
    their defaults for the duration of the chapter. The request URL will be in the
    action of the HTML form. Anyone inspecting your HTML source will know you are
    using Spring Security. While “security through obscurity” might by itself give
    a false sense of security, if applied in a well-controlled and secured environment
    (as we are building here) it is considered a plus, since you are removing one
    more hint. In this case, it is the version or software product you are using to
    secure your application.    The `login.jsp` now looks like [Listing 13-9](#Chapter13.html#list_13_9).    ***Listing
