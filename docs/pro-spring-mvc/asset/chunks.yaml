    ## 关于技术审校者


    ![图片](img/manuel_ordan_elera.jpg) ![图片](img/square.jpg) **曼努埃尔·乔丹·埃莱拉**是一位自学成才的开发者与研究员，他热衷于学习新技术用于个人实验，并创造新的集成方案。


    曼努埃尔曾荣获 2010 年 Springy 奖——社区冠军。在有限的闲暇时间里，他阅读《圣经》并用吉他创作音乐。曼努埃尔是 Spring 社区论坛的高级成员，在论坛中他以`dr_pompeii`之名广为人知。


    曼努埃尔担任以下书籍的技术审校者（均由 Apress 出版）：


    *《Pro SpringSource dm Server》，作者：Gary Mak、Daniel Rubio（2009 年）*

    *《Spring Enterprise Recipes》，作者：Gary Mak、Josh Long（2009 年）*

    *《Spring Recipes》，作者：Gary Mak、Daniel Rubio、Josh Long（第二版，2010 年）*

    *《Pro Spring Integration》，作者：Mark Liu 博士、Mario Gray、Andy Chan、Josh Long（2011 年）*

    *《Pro Spring Batch》，作者：Michael T. Minella（2011 年）*

    *《Pro Spring 3》，作者：Clarence Ho、Rob Harrop（2012 年）*


    您可以通过他的博客[`http://manueljordan.wordpress.com/`](http://manueljordan.wordpress.com/)阅读并联系他，也可以在
    Twitter 上关注他，账号为`@dr_pompeii`。


    ## 引言


    欢迎阅读《Pro Spring MVC with Web Flow》第一版；这是第一本完全专注于使用 Spring Framework 3.1 生态系统进行
    Web 开发的 Pro Spring 系列书籍。


    ### 本书将教会你什么


    本书将教你使用 Spring Framework 3.1 版本构建企业级 Web 应用程序所需的一切知识。主题包括但不限于：


    *   Spring MVC 组件的构建模块

    *   配置开发环境

    *   为基于 Spring 的应用程序提供 Web 前端

    *   测试 Web 前端的实用方法

    *   部署到本地 Web 服务器和远程云端部署平台

    *   Spring Web Flow 简介

    *   如何使用 Spring Web Flow 构建应用程序


    阅读本书后，你将熟悉 Spring MVC 工具包，并能够从零开始构建自己的 Web 应用程序，或为现有应用程序提供新的 Web 界面。


    通常，框架的强大功能往往通过简单的示例来展示；但只有在实际场景中使用框架时，其局限性才会显现。本书旨在展示 Spring MVC 如何解决 Web 开发者面临的棘手问题（以及简单问题！），例如在多页面复杂用例中管理状态，或为不同用户提供同一资源的多种视图。


    由于本书探讨的实际问题颇具挑战性，有时 Spring MVC 提供的解决方案可能并不如人们期望的那样简单。本书不会回避这些问题，也不会吝于提供如何正确行事的实用建议。


    ### 本书适合谁阅读？


    本书适合熟悉 Spring 并希望深入理解 Spring MVC 的读者。虽然主要面向 Spring MVC 新手，但其中包含的信息甚至会让经验丰富的 MVC
    专家感到惊喜！


    典型的读者将是那些对核心 Spring 框架有一定了解（例如阅读过《Pro Spring》），并希望更详细研究 Spring MVC 的 Web 开发者。


    如果你不熟悉 Spring，也完全可以继续阅读；特别是第 2 章。但如果你觉得内容不够充分，可以参考 Spring 参考指南^(1)或《Pro Spring
    3》（Apress，2012 年）。


    Spring 的奠基之作《Expert One-on-One J2EE Design and Development》（Wrox，2002 年）^(2)，由
    Rod Johnson（Spring 框架的“之父”）撰写，虽然年代久远，但依然充满智慧且具有参考价值。


    ### 如何阅读本书


    本书将引导读者经历设计、实现和部署 Java Web 应用程序的完整思维过程。章节顺序遵循开发生命周期的时序。在章节中，我们将使用一个示例应用程序来阐述所讨论的主题。


    每一章都会通过引入一个新概念或新功能来解决一个实际问题，并以此升级示例应用程序。


    ![图片](img/square.jpg) **注意** 作者们始终面临一个两难困境：是先展示答案再提出问题，还是先提出问题再展示答案？第一种方法可能让读者信息过载，而第二种方法对于已经熟悉主题的读者来说可能显得拖沓且缓慢。作者们相信，本书的节奏对于不熟悉
    Spring MVC 的读者来说是合适的；更有经验的读者可以跳过某些章节。例如，如果你已经配置好开发环境并熟悉 Spring，可以快速浏览第 1 章获取示例应用程序，然后直接跳到第
    3 章。


    ### 示例应用程序


    虽然示例无法成为真正的企业级应用程序（因为我们需要将本书控制在 1 万页以内；）），但它足够真实，能够突出实际项目中面临的典型设计挑战。


    示例是一个支持 Web 功能的书店网站。它为用户提供以下功能：


    *   匿名用户可以浏览网站。

    *   登录用户可以提交一本或多本书的订单。


    __________


    ¹ [`http://static.springsource.org/spring/docs/current/spring-framework-reference/html/`](http://static.springsource.org/spring/docs/current/spring-framework-reference/html/)


    ² [`http://www.wrox.com/WileyCDA/WroxTitle/productCd-0764543857.html`](http://www.wrox.com/WileyCDA/WroxTitle/productCd-0764543857.html)


    *   登录用户可以查看自己的历史订单。

    *   作者可以管理书籍。

    *   管理员可以管理分类。


    在本书的后续章节中，每一章都会为示例应用程序增加一个新功能。在示例中实现这一点的最简单方式是为每一章创建一个新项目。


    ### 示例代码


    我们需要解释一下本书中使用的编码和引用风格。你会发现有些代码清单是完整的，可以直接从书中复制到开发环境中。在其他代码清单中，我们省略了前面清单中已提及的某些导入或方法；我们已用`//
    Imports omitted`或`// Methods omitted`标记。大多数代码清单都附有引用，指向可找到这些方法或导入的代码清单。这种处理方式是为了提高可读性，因为有些代码清单只包含几行新代码，而另一些则会跨越多页。


    另外需要说明的是，我们没有为常见类（如`java.lang.String`或`java.util.HashMap`）包含完整的包名（大多数`java.util`包也未包含），因为
    Java 开发者通常知道这些类的位置。此外，我们只在首次重要引用（主标题之后）时提及完整的类名；例如，首次标识为`org.springframework.web.servlet.DispatcherServlet`的包，在后续引用中将简称为`DispatcherServlet`。这同样是为了提高可读性，但我们认为有必要向您展示类的位置，并相信这是一种可接受的做法。

    '
- fmt: '### How This Book Is Structured


    The book consists of a series of chapters, each explaining a part of the framework
    or how to use a certain technology. The first four chapters are quite theoretical
    and are used to explain some of the more general concepts and how they apply or
    work within Spring MVC (the same goes for the start of the Spring Web Flow part
    of the book; Chapter 10 is also more or less theoretical).


    After that introduction to the concepts behind Spring MVC, the remaining chapters
    follow a more practical and hands-on approach as we start to develop an application.


    The chapters are:


    - [Chapter 1](#Chapter01.html#ch1), “Configuring a Spring Development Environment.”
    This chapter presents the prerequisites for your development environment, which
    you can use to develop the sample application. The structure and purpose of the
    sample application (an online bookstore) are also explained in this chapter.

    - [Chapter 2](#Chapter02.html#ch2), “Spring Framework Fundamentals,” provides
    a broad overview of the fundamental building blocks of the Spring framework. It
    introduces the concepts of Dependency Injection (DI) and Inversion of Control
    (IoC). This chapter is particularly recommended if you are unfamiliar with Spring.

    - [Chapter 3](#Chapter03.html#ch3), “Web Application Architecture.” In this chapter
    we take you on a slight detour to explain web application architecture. We will
    explain the different layers that (generally) make a web application and we will
    explain the Model View Controller triad.

    - [Chapter 4](#Chapter04.html#ch4), “Spring MVC Architecture.” This chapter is
    the first “down and dirty” chapter dealing with Spring MVC. It defines exactly
    what MVC is, how web applications are typically structured, or layered, and it
    dives into the powerhouse of the Spring MVC engine: the wonderful `DispatcherServlet`.

    - [Chapter 5](#Chapter05.html#ch5), “Implementing Controllers.” At this point,
    you’re probably ready to say, “Show me the code!” In this chapter we will take
    the knowledge from the previous chapters and start writing controllers; we’ll
    also get more insight into the internals of Spring @MVC. At the end we will have
    the start of the sample application. Exciting!

    - [Chapter 6](#Chapter06.html#ch6), “Implementing Controllers – Advanced.” Every
    application requires the same behavior in a number of different places, as well
    as behavior that isn''t really part of your core application but needs to be stuck
    in somewhere. This chapter will introduce Aspect Oriented Programming (AOP) and
    how Spring MVC easily solves some common web problems. We will also explore the
    internals of Spring MVC a bit more and explain how to extend the existing infrastructure
    and how to tailor it to our needs.

    - [Chapter 7](#Chapter07.html#ch7), “REST and AJAX.” Now that our bookstore is
    taking off, we want to add some nifty behavior to our application and we also
    want to expose our controllers as REST web services so that others might be able
    to integrate with us. For this we are going to explore REST and AJAX and apply
    those techniques to our application.

    - [Chapter 8](#Chapter08.html#ch8), “Resolving and Implementing Views.” [Chapter
    8](#Chapter08.html#ch8) digs a bit deeper into how views are resolved within Spring
    MVC and builds on the information you’ve learned so far. In this chapter you will
    get to revisit the `ViewResolver` infrastructure and start to see the power of
    the MVC architecture shine through when you re-use the same infrastructure to
    provide different renditions of the same model.

    - [Chapter 9](#Chapter09.html#ch9), “Testing Spring MVC Applications.” Now that
    the craving to get something done has been somewhat satisfied and we’ve written
    some code, it is time to look at testing. This chapter explains *how* to test
    Spring MVC applications but also crucially *what* to test. This chapter will include
    a good discussion of different strategies for testing, including how to ensure
    you are testing only what you need to test. You will also be given the chance
    to test-drive the HTML as well!

    - [Chapter 10](#Chapter10.html#ch10), “Spring Web Flow.” Up to now all of the
    page interactions have been pretty simple; each use-case was one or two pages.
    Now the manager wants to introduce some nontrivial use-cases. [Chapter 10](#Chapter10.html#ch10)
    introduces Spring Web Flow— a companion partner to Spring MVC that provides some
    pretty nifty features for managing web conversations with clients.

    - [Chapter 11](#Chapter11.html#ch11), “Building Applications with Spring Web Flow.”
    Following the previous chapter’s introduction to Spring Web Flow and the problems
    it helps to solve, Chapter 11 explores in practice how to build an application
    with Spring Web Flow.

    - [Chapter 12](#Chapter12.html#ch12), “Advanced Spring Web Flow,” builds on the
    information gained in Chapter 11 and demonstrates how you can dig a little deeper
    into Spring Web Flow and find some real gems.

    - [Chapter 13](#Chapter13.html#ch13), “Spring Security,” shows how to keep the
    scruffy hackers out of our web-application through the use of another well-established
    tool in the Spring toolbox, Spring Security.

    - [Appendix A](#Appendix.html#appA), “Cloud Foundry—Deploying to the Cloud.” In
    this appendix we explain the steps needed to deploy the application to the cloud,
    especially to Cloud Foundry, as that integrates seamlessly with our chosen development
    environment.


    ### A Thousand-Mile View of the Spring Ecosystem


    So before going any further let''s take the first peek at Spring MVC and where
    it fits into the existing Spring ecosystem.


    The first piece of good news is that Spring MVC *is* Spring. You configure Spring
    MVC using the existing powerful Spring container. Beans defined in Spring MVC
    are just like any other beans.


    The following image from [`http://static.springsource.org/spring/docs/3.1.0.M2/spring-framework-reference/html/overview.html`](http://static.springsource.org/spring/docs/3.1.0.M2/spring-framework-reference/html/overview.html)
    is very helpful:


    ![Image](images/pxxvii.jpg)


    As you can see— Spring MVC is powered by the rest of Spring!


    ### Onward!


    Now that you have an idea about the style and purpose of this book let''s waste
    no more time in getting you set up with a development environment. We’ll see you
    in [Chapter 1](#Chapter01.html#ch1).


    ### Contacting the Authors


    Marten Deinum can be contacted at `marten@deinum.biz` for queries and suggestions
    for this book. His blog can be found at [`http://mdeinum.wordpress.com`](http://mdeinum.wordpress.com)`.`
    Feel free to contact him if you have found a mistake, want to ask a question,
    or want to discuss anything else related to the book.


    Koen Serneels can be contacted at `koen.serneels@error.be` for anything related
    to this book. If you have suggestions, remarks, or questions, or have found something
    to be inaccurate, feel free to drop him a message. His blog can be found at [`http://www.error.be`](http://www.error.be)`.`.


    ## Chapter 1


    ## Configuring a Spring Development Environment


    Before you can really start your journey into Spring MVC, you need to make sure
    you have your development environment set up right. This chapter will begin by
    walking you through that process. Next, it will provide some details about the
    sample bookstore application that ships with this book. But before going into
    either the details of the development environment or the sample application, this
    chapter will provide an overview of the prerequisites for your environment in
    general.


    The sample application that ships with the book is used to explain the concepts
    of Spring MVC and MVC in general. It is not intended to be a full-blown, ready-to-use
    production application; nor is it to be used as a Java or full Spring Framework
    application. The main intent of the app is to help explain and express the Spring
    MVC concepts used throughout the book.'
