    现在我们已经了解了所有请求如何被过滤器捕获，接下来将看到请求如何进入 Spring Security 机制。正如配置的过滤器类名（**`Delegating`**`FilterProxy`）所示，它显然会将传入的请求委托到某处。这个“某处”正是
