    \ 2-2](#Chapter02.html#list_2_2) shows a contextualized lookup from JNDI (Java\
    \ Naming and Directory Interface). The constructor code would need to know how\
    \ to do the lookup and handle exceptions.\n\n***Listing 2-2.** MoneyTransferService\
    \ implemenation with contextualized lookup*\n\n`package com.apress.prospringmvc.moneytransfer.jndi;`\n\
    \n`import javax.naming.InitialContext;`\n`import javax.naming.NamingException;`\n\
    \n`//other import statements ommitted.`\n`public class JndiMoneyTransferServiceImpl\
    \ implements MoneyTransferService {`\n\n`    private AccountRepository accountRepository;`\n\
    `    private TransactionRepository transactionRepository;`\n\n**`    public JndiMoneyTransferServiceImpl()\
    \ {`**\n**`        try {`**\n**`            InitialContext context = new InitialContext();`**\n\
    **`            this.accountRepository = (AccountRepository) context.lookup(\"\
    accountRepository\");`**\n**`            this.transactionRepository = (TransactionRepository)\
    \ context.lookup`**\n**`(\"transactionRepository\");`**\n**`        } catch (NamingException\
    \ e) {`**\n**`            throw new IllegalStateException(e);`**\n**`        }`**\n\
    **`    }`**\n\n`    //transfer method omitted, same as Listing 2-1`\n`}`\n\nThe\
    \ immediately preceding code isn’t particularly clean; for example, imagine if\
    \ there were multiple dependencies from different contexts. The code would quickly\
    \ become messy and increasingly hard, if not impossible, to unit test (see Chapter\
    \ 9 for more information on testing).\n\nTo solve the problem of the construction/lookup\
    \ logic in the constructor of an object, we can use dependency injection. We simply\
    \ pass the object the dependencies it needs to do its work. This makes our code\
    \ clean, decoupled, and easy to test (see [Listing 2-3](#Chapter02.html#list_2_3)).\
    \ Dependency injection is a process where objects specify the dependencies they\
    \ work with. The IoC container uses that specification; when it constructs an\
    \ object, it also injects its dependencies. This way our code is cleaner, and\
    \ we no longer burden our class with construction logic. It is easier to maintain\
    \ and also easier to unit and/or integration test. Testing is easier because we\
    \ could inject a stub or mock object to verify the behavior of our object.\n\n\
    ***Listing 2-3**. A MoneyTransferService implementation with constructor-based\
    \ dependency injection*\n\n`package com.apress.prospringmvc.moneytransfer.constructor;`\n\
    \n`// import statements ommitted`\n\n`public class MoneyTransferServiceImpl implements\
    \ MoneyTransferService {`\n\n`    private AccountRepository accountRepository;`\n\
    `    private TransactionRepository transactionRepository;`\n\n**`    public MoneyTransferServiceImpl(AccountRepository\
    \ accountRepository,`**\n**`                                    TransactionRepository\
    \ transactionRepository) {`**\n**`        super();`**\n**`        this.accountRepository\
    \ = accountRepository;`**\n**`        this.transactionRepository = transactionRepository;`**\n\
    **`    }`**\n`//transfer method omitted, same as Listing 2-1`\n`}`\n\nAs the name\
    \ implies, constructor-based dependency injection uses the constructor to inject\
    \ the dependencies in the object. [Listing 2-3](#Chapter02.html#list_2_3) uses\
    \ constructor-based dependency injection. It has a constructor that takes two\
    \ objects as arguments: `com.apress.prospringmvc.moneytransfer.repository .AccountRepository`\
    \ and `com.apress.prospringmvc.moneytransfer.repository.TransactionRepository`.\
    \ When we construct an instance of `com.apress.prospringmvc.moneytransfer.constructor\
    \ .MoneyTransferServiceImpl`, we need to hand it the needed dependencies."
  trans: "\n### 依赖注入\n\n依赖注入（DI）的概念——即对象在构造时被赋予其依赖项——是 Spring 框架的基石之一。你可能也听说过*控制反转*（IoC）^(1)。IoC\
    \ 是一个更宽泛、更通用的概念，可以通过不同方式实现。IoC 让开发者能够解耦，并专注于企业应用中某个特定部分的重要事项，而无需考虑系统中其他部分的功能。面向接口编程是思考解耦的一种方式。\n\
    \n几乎每个企业应用都由多个需要协同工作的组件构成。在 Java 企业级开发的早期，我们简单地将所有构建这些对象（以及这些对象所需的对象）的逻辑都放在构造函数中（参见清单\
    \ 2-1）。乍一看，这种方法并无不妥；然而，随着时间的推移，对象构建变得缓慢，并且对象拥有了许多本不该拥有的知识（参见单一职责原则^(2)）。这些类变得难以维护，并且进行单元测试和/或集成测试也相当困难。\n\
    \n***清单 2-1.** 具有硬编码依赖关系的 MoneyTransferService 实现*\n\n`package com.apress.prospringmvc.moneytransfer.simple;`\n\
    \n`import java.math.BigDecimal;`\n\n`import com.apress.prospringmvc.moneytransfer.domain.Account;`\n\
    `import com.apress.prospringmvc.moneytransfer.domain.MoneyTransferTransaction;`\n\
    `import com.apress.prospringmvc.moneytransfer.domain.Transaction;`\n`import com.apress.prospringmvc.moneytransfer.repository.AccountRepository;`\n\
    `import com.apress.prospringmvc.moneytransfer.repository.MapBasedAccountRepository;`\n\
    `import com.apress.prospringmvc.moneytransfer.repository.MapBasedTransactionRepository;`\n\
    `import com.apress.prospringmvc.moneytransfer.repository.TransactionRepository;`\n\
    `import com.apress.prospringmvc.moneytransfer.service.MoneyTransferService;`\n\
    \n`public class SimpleMoneyTransferServiceImpl implements MoneyTransferService\
    \ {`\n\n`    private AccountRepository accountRepository = new MapBasedAccountRepository();`\n\
    `    private TransactionRepository transactionRepository = new MapBasedTransactionRepository();`\n\
    \n`    public SimpleMoneyTransferServiceImpl() {`\n`        super();`\n`        ((MapBasedAccountRepository)\
    \ this.accountRepository).initialize();`\n\n`    }`\n\n`    @Override`\n`    public\
    \ Transaction transfer(String source, String target, BigDecimal amount) {`\n`        Account\
    \ src = this.accountRepository.find(source);`\n`        Account dst = this.accountRepository.find(target);`\n\
    \n`        src.credit(amount);`\n`        dst.debit(amount);`\n\n`        MoneyTransferTransaction\
    \ transaction = new MoneyTransferTransaction(src, dst, amount);`\n`        this.transactionRepository.store(transaction);`\n\
    `        return transaction;`\n`    }`\n`}`\n\n____________\n\n¹ [`http://www.martinfowler.com/articles/injection.html`](http://www.martinfowler.com/articles/injection.html)\n\
    \n² [`http://www.objectmentor.com/resources/articles/srp.pdf`](http://www.objectmentor.com/resources/articles/srp.pdf)\n\
    \n清单 2-1 中的类面向接口编程，但它仍然需要了解接口的具体实现，仅仅是为了进行对象构建。通过解耦构建逻辑（协作对象）来应用 IoC，可以使应用程序更易于维护并提高可测试性。有七种方法可以解耦这种依赖构建逻辑：\n\
    \n1.  工厂模式\n2.  服务定位器模式\n3.  依赖注入\n    1.  基于构造函数\n    2.  基于 Setter 方法\n    3.\
    \  基于接口\n    4.  注解驱动\n4.  上下文查找\n\n当使用工厂模式、服务定位器模式或上下文查找时，需要依赖项的类仍然需要了解如何获取这些依赖项。这可以使事情更易于维护，但测试可能仍然困难。清单\
    \ 2-2 展示了来自 JNDI（Java 命名和目录接口）的上下文查找。构造函数代码需要知道如何进行查找并处理异常。\n\n***清单 2-2.** 具有上下文查找的\
    \ MoneyTransferService 实现*\n\n`package com.apress.prospringmvc.moneytransfer.jndi;`\n\
    \n`import javax.naming.InitialContext;`\n`import javax.naming.NamingException;`\n\
    \n`//其他 import 语句已省略。`\n`public class JndiMoneyTransferServiceImpl implements\
    \ MoneyTransferService {`\n\n`    private AccountRepository accountRepository;`\n\
    `    private TransactionRepository transactionRepository;`\n\n**`    public JndiMoneyTransferServiceImpl()\
    \ {`**\n**`        try {`**\n**`            InitialContext context = new InitialContext();`**\n\
    **`            this.accountRepository = (AccountRepository) context.lookup(\"\
    accountRepository\");`**\n**`            this.transactionRepository = (TransactionRepository)\
    \ context.lookup`**\n**`(\"transactionRepository\");`**\n**`        } catch (NamingException\
    \ e) {`**\n**`            throw new IllegalStateException(e);`**\n**`        }`**\n\
    **`    }`**\n\n`    //transfer 方法已省略，与清单 2-1 相同`\n`}`\n\n上述代码并不特别清晰；例如，想象一下如果存在来自不同上下文的多个依赖项。代码会很快变得混乱，并且越来越难以（甚至不可能）进行单元测试（更多关于测试的信息，请参见第\
    \ 9 章）。\n\n为了解决对象构造函数中的构建/查找逻辑问题，我们可以使用依赖注入。我们只需将对象工作所需的依赖项传递给对象。这使我们的代码清晰、解耦且易于测试（参见清单\
    \ 2-3）。依赖注入是一个过程，对象在其中指定它们所依赖的依赖项。IoC 容器使用该规范；当它构造一个对象时，也会注入其依赖项。这样，我们的代码更清晰，不再让类承担构建逻辑的负担。它更易于维护，也更易于进行单元测试和/或集成测试。测试更容易，因为我们可以注入一个桩（stub）或模拟（mock）对象来验证我们对象的行为。\n\
    \n***清单 2-3**. 基于构造函数依赖注入的 MoneyTransferService 实现*\n\n`package com.apress.prospringmvc.moneytransfer.constructor;`\n\
    \n`// import 语句已省略`\n\n`public class MoneyTransferServiceImpl implements MoneyTransferService\
    \ {`\n\n`    private AccountRepository accountRepository;`\n`    private TransactionRepository\
    \ transactionRepository;`\n\n**`    public MoneyTransferServiceImpl(AccountRepository\
    \ accountRepository,`**\n**`                                    TransactionRepository\
    \ transactionRepository) {`**\n**`        super();`**\n**`        this.accountRepository\
    \ = accountRepository;`**\n**`        this.transactionRepository = transactionRepository;`**\n\
    **`    }`**\n`//transfer 方法已省略，与清单 2-1 相同`\n`}`\n\n顾名思义，基于构造函数的依赖注入使用构造函数将依赖项注入到对象中。清单\
    \ 2-3 使用了基于构造函数的依赖注入。它有一个构造函数，接受两个对象作为参数：`com.apress.prospringmvc.moneytransfer.repository\
    \ .AccountRepository` 和 `com.apress.prospringmvc.moneytransfer.repository.TransactionRepository`。当我们构造\
    \ `com.apress.prospringmvc.moneytransfer.constructor .MoneyTransferServiceImpl`\
    \ 的实例时，需要向其提供所需的依赖项。\n"
- fmt: "# Setter-based Dependency Injection\n\nSetter-based dependency injection uses\
    \ a *setter* method to inject the dependency. The JavaBeans specification defines\
    \ both `setter` and `getter` methods. If we have a method named `setAccountService`,\
    \ then we set a property with the name, `accountService`. The property name is\
    \ created using the name of the method, minus the “set” and with the first letter\
    \ lowercased (the full specification can be found in the JavaBeans specification^([3](#Chapter02.html#CHP-2-FN-3))).\
    \ [Listing 2-4](#Chapter02.html#list_2_4) shows an example of setter-based dependency\
    \ injection.\n\n***Listing 2-4**. A MoneyTransferService implementation with setter-based\
    \ dependency injection*\n\n```\npackage com.apress.prospringmvc.moneytransfer.setter;\n\
    \n// imports ommitted\n\npublic class MoneyTransferServiceImpl implements MoneyTransferService\
    \ {\n\n    private AccountRepository accountRepository;\n    private TransactionRepository\
    \ transactionRepository;\n\n    public void setAccountRepository(AccountRepository\
    \ accountRepository) {\n        this.accountRepository = accountRepository;\n\
    \    }\n\n    public void setTransactionRepository(TransactionRepository transactionRepository)\
    \ {\n        this.transactionRepository = transactionRepository;\n    }\n//transfer\
    \ method omitted, same as Listing 2-1\n}\n```\n\n# Annotation-based Dependency\
    \ Injection\n\nFinally, there is annotation-based dependency injection (see [Listing\
    \ 2-5](#Chapter02.html#list_2_5)). For this to work, we do not need to specify\
    \ a constructor argument or a setter method to set the dependencies. We begin\
    \ by defining a class-level field that can hold the dependency. Next, we put an\
    \ annotation on that field to express our intent to have that dependency injected\
    \ into our object. Spring accepts several different annotations: `@Autowired`,\
    \ `@Resource`, and `@Inject`. All these annotations more or less work in the same\
    \ way. It isn’t within the scope of this book to explain the differences among\
    \ these annotations in depth, so we suggest the Spring Reference Guide or *Pro\
    \ Spring 3* (Apress, 2012) if you want to learn more. The main difference among\
    \ them is that the `@Autowired` annotation is from the Spring Framework, whereas\
    \ `@Resource` and `@Inject` are Java standard annotations.\n\n____________\n\n\
    ³ [`http://download.oracle.com/otn-pub/jcp/7224-javabeans-1.01-fr-spec-oth-JSpec/beans.101.pdf`](http://download.oracle.com/otn-pub/jcp/7224-javabeans-1.01-fr-spec-oth-JSpec/beans.101.pdf)\n\
    \n***Listing 2-5**. A MoneyTransferService implementation with annotation-based\
    \ dependency injection*\n\n```\npackage com.apress.prospringmvc.moneytransfer.annotation;\n\
    \nimport org.springframework.beans.factory.annotation.Autowired;\n\n//other imports\
    \ ommitted\n\npublic class MoneyTransferServiceImpl implements MoneyTransferService\
    \ {\n\n    @Autowired\n    private AccountRepository accountRepository;\n\n  \
    \  @Autowired\n    private TransactionRepository transactionRepository;\n\n  \
    \  //transfer method ommitted, same as listing 2.1\n}\n```\n\n![Image](images/square.jpg)\
    \ **Note** `@Autowired` and `@Inject` can be placed on methods and constructors\
    \ to express dependency injection configuration, even in cases where there are\
    \ multiple arguments!\n\nNote that interface-based dependency injection isn’t\
    \ supported by the Spring Framework. This means that we need to specify which\
    \ concrete implementation to inject for a certain interface.\n\n![Image](images/square.jpg)\
    \ **Note** Google Guice^([4](#Chapter02.html#CHP-2-FN-4)) supports interface-based\
    \ injection out of the box.\n\n# Why Use Dependency Injection\n\nTo sum things\
    \ up, we want to use dependency injection for the following reasons:\n\n1.  Cleaner\
    \ code\n2.  Decoupled code\n3.  Easier code testing\n\nThe first two reasons make\
    \ our code easier to maintain. The fact that the code is easier to test should\
    \ allow us to write unit tests to verify the behavior of our objects—and thus,\
    \ our application.\n\n# Choosing a Dependency Injection Approach\n\nAfter seeing\
    \ three different approaches to dependency injection, you may wonder which one\
    \ we should use. That is more or less a philosophical discussion, but here’s a\
    \ rule of thumb we can use: if a dependency is mandatory for the object to function\
    \ correctly, we should use constructor- or annotation-based dependency injection.\
    \ If we use annotation-based dependency injection and the dependency wouldn’t\
    \ be injected, we would get an exception at the startup of our application. This\
    \ is because, by default, the dependencies are mandatory when using annotation-based\
    \ dependency injection. In light of recent developments and additions to Java\
    \ and JEE, the authors of this book believe that the annotation-based approach\
    \ is the best way to go. The addition of the `javax.annotation.Resouce` annotation\
    \ to Java and JSR-330 (Dependency Injection for Java) indicates quite clearly\
    \ that that is the future envisioned by the Java Community Process (JCP).\n\n\
    ____________\n\n⁴ [`http://code.google.com/p/google-guice/`](http://code.google.com/p/google-guice/)\n\
    \nIn this book, we will use a Java-based configuration approach wherever possible.\
    \ If a Java-based configuration option isn’t possible or available, we will fall\
    \ back to an XML-based configuration. This is the case when we cover web flow.\
    \ At the time of writing, web flow hasn’t been updated so it can benefit from\
    \ a Java-based configuration approach."
  raw: 'Setter-based dependency injection uses a *setter* method to inject the dependency.
    The JavaBeans specification defines both `setter` and `getter` methods. If we
    have a method named `setAccountService`, then we set a property with the name,
    `accountService`. The property name is created using the name of the method, minus
    the “set” and with the first letter lowercased (the full specification can be
    found in the JavaBeans specification^([3](#Chapter02.html#CHP-2-FN-3))). [Listing
    2-4](#Chapter02.html#list_2_4) shows an example of setter-based dependency injection.


    ***Listing 2-4**. A MoneyTransferService implementation with setter-based dependency
    injection*


    `package com.apress.prospringmvc.moneytransfer.setter;`


    `// imports ommitted`


    `public class MoneyTransferServiceImpl implements MoneyTransferService {`


    `    private AccountRepository accountRepository;`

    `    private TransactionRepository transactionRepository;`


    **`    public void setAccountRepository(AccountRepository accountRepository) {`**

    **`        this.accountRepository = accountRepository;`**

    **`    }`**


    **`    public void setTransactionRepository(TransactionRepository transactionRepository)
    {`**

    **`        this.transactionRepository = transactionRepository;`**

    **`    }`**

    `//transfer method omitted, same as Listing 2-1`

    `}`


    Finally, there is annotation-based dependency injection (see [Listing 2-5](#Chapter02.html#list_2_5)).
    For this to work, we do not need to specify a constructor argument or a setter
    method to set the dependencies. We begin by defining a class-level field that
    can hold the dependency. Next, we put an annotation on that field to express our
    intent to have that dependency injected into our object. Spring accepts several
    different annotations: `@Autowired`, `@Resource`, and `@Inject`. All these annotations
    more or less work in the same way. It isn’t within the scope of this book to explain
    the differences among these annotations in depth, so we suggest the Spring Reference
    Guide or *Pro Spring 3* (Apress, 2012) if you want to learn more. The main difference
    among them is that the `@Autowired` annotation is from the Spring Framework, whereas
    `@Resource` and `@Inject` are Java standard annotations.


    ____________


    ³ [`http://download.oracle.com/otn-pub/jcp/7224-javabeans-1.01-fr-spec-oth-JSpec/beans.101.pdf`](http://download.oracle.com/otn-pub/jcp/7224-javabeans-1.01-fr-spec-oth-JSpec/beans.101.pdf)


    ***Listing 2-5**. A MoneyTransferService implementation with annotation-based
    dependency injection*


    `package com.apress.prospringmvc.moneytransfer.annotation;`


    `import org.springframework.beans.factory.annotation.Autowired;`


    `//other imports ommitted`


    `public class MoneyTransferServiceImpl implements MoneyTransferService {`


    `    @Autowired`

    `    private AccountRepository accountRepository;`


    `    @Autowired`

    `    private TransactionRepository transactionRepository;`


    `    //transfer method ommitted, same as listing 2.1`

    `}`


    ![Image](images/square.jpg) **Note** `@Autowired` and `@Inject` can be placed
    on methods and constructors to express dependency injection configuration, even
    in cases where there are multiple arguments!


    Note that interface-based dependency injection isn’t supported by the Spring Framework.
    This means that we need to specify which concrete implementation to inject for
    a certain interface.


    ![Image](images/square.jpg) **Note**  Google Guice^([4](#Chapter02.html#CHP-2-FN-4))
    supports interface-based injection out of the box.


    To sum things up, we want to use dependency injection for the following reasons:


    1.  Cleaner code

    2.  Decoupled code

    3.  Easier code testing


    The first two reasons make our code easier to maintain. The fact that the code
    is easier to test should allow us to write unit tests to verify the behavior of
    our objects—and thus, our application.


    After seeing three different approaches to dependency injection, you may wonder
    which one we should use. That is more or less a philosophical discussion, but
    here’s a rule of thumb we can use: if a dependency is mandatory for the object
    to function correctly, we should use constructor- or annotation-based dependency
    injection. If we use annotation-based dependency injection and the dependency
    wouldn’t be injected, we would get an exception at the startup of our application.
    This is because, by default, the dependencies are mandatory when using annotation-based
    dependency injection. In light of recent developments and additions to Java and
    JEE, the authors of this book believe that the annotation-based approach is the
    best way to go. The addition of the `javax.annotation.Resouce` annotation to Java
    and JSR-330 (Dependency Injection for Java) indicates quite clearly that that
    is the future envisioned by the Java Community Process (JCP).


    ____________


    ⁴ [`http://code.google.com/p/google-guice/`](http://code.google.com/p/google-guice/)


    In this book, we will use a Java-based configuration approach wherever possible.
    If a Java-based configuration option isn’t possible or available, we will fall
    back to an XML-based configuration. This is the case when we cover web flow. At
    the time of writing, web flow hasn’t been updated so it can benefit from a Java-based
    configuration approach.'
  trans: '

    基于 Setter 的依赖注入使用 *setter* 方法来注入依赖项。JavaBeans 规范定义了 `setter` 和 `getter` 方法。如果我们有一个名为
    `setAccountService` 的方法，那么我们就设置了一个名为 `accountService` 的属性。属性名是通过方法名去掉“set”并将首字母小写来创建的（完整规范可在
    JavaBeans 规范中找到^(3)）。清单 2-4 展示了一个基于 Setter 的依赖注入示例。


    ***清单 2-4**. 一个使用基于 Setter 的依赖注入的 MoneyTransferService 实现*


    `package com.apress.prospringmvc.moneytransfer.setter;`


    `// 导入已省略`


    `public class MoneyTransferServiceImpl implements MoneyTransferService {`


    `    private AccountRepository accountRepository;`

    `    private TransactionRepository transactionRepository;`


    **`    public void setAccountRepository(AccountRepository accountRepository) {`**

    **`        this.accountRepository = accountRepository;`**

    **`    }`**


    **`    public void setTransactionRepository(TransactionRepository transactionRepository)
    {`**

    **`        this.transactionRepository = transactionRepository;`**

    **`    }`**

    `// 转账方法已省略，与清单 2-1 相同`

    `}`


    最后，还有基于注解的依赖注入（参见清单 2-5）。要使其工作，我们不需要指定构造函数参数或 setter 方法来设置依赖项。我们首先定义一个可以持有依赖项的类级别字段。接着，我们在该字段上放置一个注解，以表达我们希望将该依赖项注入到对象中的意图。Spring
    接受几种不同的注解：`@Autowired`、`@Resource` 和 `@Inject`。所有这些注解的工作方式大致相同。深入解释这些注解之间的差异不在本书的讨论范围内，因此如果您想了解更多，我们建议您参考
    Spring 参考指南或 *Pro Spring 3*（Apress，2012）。它们之间的主要区别在于，`@Autowired` 注解来自 Spring
    框架，而 `@Resource` 和 `@Inject` 是 Java 标准注解。


    ____________


    ³ [`http://download.oracle.com/otn-pub/jcp/7224-javabeans-1.01-fr-spec-oth-JSpec/beans.101.pdf`](http://download.oracle.com/otn-pub/jcp/7224-javabeans-1.01-fr-spec-oth-JSpec/beans.101.pdf)


    ***清单 2-5**. 一个使用基于注解的依赖注入的 MoneyTransferService 实现*


    `package com.apress.prospringmvc.moneytransfer.annotation;`


    `import org.springframework.beans.factory.annotation.Autowired;`


    `// 其他导入已省略`


    `public class MoneyTransferServiceImpl implements MoneyTransferService {`


    `    @Autowired`

    `    private AccountRepository accountRepository;`


    `    @Autowired`

    `    private TransactionRepository transactionRepository;`


    `    // 转账方法已省略，与清单 2.1 相同`

    `}`


    ![Image](img/square.jpg) **注意** `@Autowired` 和 `@Inject` 可以放置在方法和构造函数上以表达依赖注入配置，即使在有多个参数的情况下也是如此！


    请注意，Spring 框架不支持基于接口的依赖注入。这意味着我们需要为某个接口指定要注入的具体实现。


    ![Image](img/square.jpg) **注意**  Google Guice^(4) 开箱即用地支持基于接口的注入。


    总结一下，我们使用依赖注入的原因如下：


    1.  更清晰的代码

    2.  解耦的代码

    3.  更简单的代码测试


    前两个原因使我们的代码更易于维护。代码更易于测试这一事实应该使我们能够编写单元测试来验证对象的行为——从而验证我们的应用程序。


    在了解了三种不同的依赖注入方法之后，您可能会想知道应该使用哪一种。这或多或少是一个哲学讨论，但这里有一个我们可以使用的经验法则：如果某个依赖项对于对象正常运行是强制性的，我们应该使用基于构造函数或基于注解的依赖注入。如果我们使用基于注解的依赖注入，而依赖项未被注入，我们将在应用程序启动时收到异常。这是因为，在使用基于注解的依赖注入时，默认情况下依赖项是强制性的。鉴于
    Java 和 JEE 的最新发展和新增功能，本书作者认为基于注解的方法是最佳选择。`javax.annotation.Resource` 注解被添加到 Java
    以及 JSR-330（Java 依赖注入）中，这相当清楚地表明这是 Java 社区流程（JCP）所设想的未来。


    ____________


    ⁴ [`http://code.google.com/p/google-guice/`](http://code.google.com/p/google-guice/)


    在本书中，我们将尽可能使用基于 Java 的配置方法。如果基于 Java 的配置选项不可行或不可用，我们将回退到基于 XML 的配置。我们在介绍 Web Flow
    时就是这种情况。在撰写本文时，Web Flow 尚未更新以受益于基于 Java 的配置方法。

