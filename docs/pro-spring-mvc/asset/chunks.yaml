    ##### Spring @MVC 默认配置


    第 2 章 介绍了 Spring 的 @Enable 注解。其中一个注解是 `org.springframework.web.servlet.config.annotation.EnableWebMvc.`。该注解启用了强大且灵活的基于注解的请求处理组件，并覆盖了调度
    Servlet 的一些默认设置。实际配置可以在 `org.springframework.web.servlet.config.annotation.WebMvcConfigurationSupport`
    类中找到。这是使用该注解时注册的配置。表 4-5 展示了启用 @MVC 时的默认配置，并突出了 @MVC 与调度 Servlet 之间的差异。


    ![Image](img/tab_4_5.jpg)


    这些差异可能看起来不大，但新注册的组件提供的初始默认值与调度 Servlet 提供的默认值相比有显著不同。本质区别在于：Spring 的 @MVC 组件使您能够编写更灵活的请求处理方法（参见第
    5 章和第 6 章）。


    ### Spring MVC 组件


    在前面的章节中，您了解了请求处理工作流及其使用的组件。您还学习了如何配置 `org.springframework.web.servlet.DispatcherServlet`。在本节中，您将更深入地了解请求处理工作流中涉及的所有组件。例如，您将探索不同组件的
    API，并查看 Spring 框架附带了哪些实现。


    #### HandlerMapping


    `HandlerMapping` 的职责是确定将传入请求分派给哪个处理器。您可用于映射传入请求的一个标准是 URL；然而，实现（参见图 4-10）可以自由选择使用什么标准来确定映射。


    `org.springframework.web.servlet.HandlerMapping` 的 API 包含一个单一方法（参见清单 4-7）。`DispatcherServlet`
    调用此方法来确定 `org.springframework.web .servlet.HandlerExecutionChain`。可以配置多个处理器映射。Servlet
    将按顺序调用不同的处理器映射，直到其中一个返回非 `null` 值。


    ***清单 4-7.** HandlerMapping API*


    `package org.springframework.web.servlet;`


    `import javax.servlet.http.HttpServletRequest;`

    `public interface HandlerMapping {`


    `    HandlerExecutionChain getHandler(HttpServletRequest request)`

    `    throws Exception;`


    `}` ![Image](img/9781430241553_Fig04-10.jpg)


    ***图 4-10.** HandlerMapping 实现*


    Spring MVC 开箱即用地提供了六种不同的实现。其中大多数基于 URL 映射。其中两种实现提供了更复杂的映射策略，您稍后将了解。然而，在查看不同的实现之前，更仔细地研究
    URL 及其重要部分可能会有所帮助。


    一个请求 URL 由几个部分组成。让我们看一下 [`http://www.example.org/bookstore/app/home`](http://www.example.org/bookstore/app/home)
    这个 URL 并对其进行剖析。一个 URL 由四个部分组成（参见图 4-11）：


    1.  服务器的主机名

    2.  应用程序的名称（如果是根应用程序，则为空）

    3.  Servlet 映射的名称（在示例应用程序中，它映射到 /）

    4.  Servlet 内部的路径


    ![Image](img/9781430241553_Fig04-11.jpg)


    ***图 4-11.** URL 映射*


    默认情况下，所有提供的处理器映射实现都使用 Servlet 内部相对于 Servlet 上下文的路径（Servlet 上下文相对路径）来解析处理器。将 `alwaysUseFullPath`
    属性设置为 `true` 可以改变此行为。此时会包含 Servlet 映射，这将（对于手头的示例）导致使用 */app/home* 来解析请求处理器；否则，将使用
    */home*。


    所有实现共有的最后一个特性是可以配置默认处理器。这是通过设置 `defaultHandler` 属性来完成的。当无法为传入请求找到处理器时，它将始终映射到默认处理器。这是可选的，应谨慎使用，尤其是在链接多个处理器映射时。只有最后一个处理器映射应指定默认处理器，否则链会中断。


    ##### BeanNameUrlHandlerMapping


    `org.springframework.web.servlet.handler.BeanNameUrlHandlerMapping` 是调度 Servlet
    使用的默认策略之一。此实现将任何名称以 / 开头的 bean 视为潜在的请求处理器。一个 bean 可以有多个名称，名称也可以包含通配符，用 * 表示。


    此实现使用 Ant 风格的正则表达式将传入请求的 URL 与 bean 的名称进行匹配。它遵循以下算法：


    1.  尝试精确匹配；如果找到，则退出。

    2.  搜索所有已注册的路径以寻找匹配项；最具体的匹配项获胜。

    3.  如果未找到匹配项，则返回映射到 /* 的处理器或默认处理器（如果已配置）。


    ![Image](img/square.jpg) **注意** bean 的 `name` 与 `id` 不同。Id 由 XML 规范定义，不能包含 / 等特殊字符。这意味着您需要使用
    bean 的 name。您可以通过在 `org.springframework.context.annotation.Bean` 注解上设置 `name`
    属性来为 bean 提供名称。一个 bean 可以有多个名称，名称可以写成 Ant 风格的正则表达式。


    清单 4-8 展示了如何使用 bean 名称并将其映射到 `/index.htm` URL。在示例应用程序中，您现在可以使用 [`http://localhost:8080/chapter4-bookstore/index.htm`](http://localhost:8080/chapter4-bookstore/index.htm)
    来调用此控制器。


    ***清单 4-8.** BeanNameUrlHandlerMapping 示例配置*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `import java.util.Properties;`


    `import org.springframework.context.annotation.Bean;`

    `import org.springframework.context.annotation.Configuration;`


    `import com.apress.prospringmvc.bookstore.web.IndexController;`


    `@Configuration`

    `public class WebMvcContextConfiguration {`


    **`    @Bean(name = { "/index.htm" })`**

    `    public IndexController indexController() {`

    `        return new IndexController();`

    `    }`

    `}`

