    you have your development environment set up right. This chapter will begin by
    walking you through that process. Next, it will provide some details about the
    sample bookstore application that ships with this book. But before going into
    either the details of the development environment or the sample application, this
    chapter will provide an overview of the prerequisites for your environment in
    general.


