    \n此时，您应该能够测试应用程序了。打开浏览器并将其指向[`http://localhost:8080/chapter10-bookstore/`](http://localhost:8080/chapter10-bookstore/)。在主页上，您现在可以单击`Buy\
    \ books`链接。这样做应该会显示[图 10-12](#Chapter10.html#fig_10_12) 中所示的视图。\n\n![Image](images/9781430241553_Fig10-12.jpg)\n\
    \n***图 10-12.** 在浏览器中渲染的类别选择*\n\n单击“下一步”按钮会产生错误，因为我们尚未实现下一个视图状态。但是，单击“取消”按钮应该会将我们带回主页。这是通过转换到结束状态来实现的。目前，知道结束状态将简单地结束流程执行并执行最后一次重定向到我们配置的视图就足够了。如前所述，我们将在[第\
