- fmt: 'The same goes for non-mergeable elements that are specified in both parent
    and child flows with the same identifiers: the child flow values take precedence.
    For example, the parent flow has the following `var` element: `<var name="x" value="com.apress.prospringmvc.bookstore.ClassX"/>`.
    The child flow has also a `var` element with the exact same name, but a different
    value: `<var name="x" value="com.apress.prospringmvc.bookstore.ClassY"/>`. The
    general overwrite rule applies, and the variable with the name of `x` will have
    as a value an object of type `com.apress.prospringmvc.bookstore.ClassY`, which
    is that of the child flow. If we were to remove the `<var>` element from the child
    flow, then there would be only one `var` element with the name of `x` left (the
    one in the parent flow). In that case, the variable `x` will become an object
    of type `ClassX`.


    ![Image](images/square.jpg) **Warning** Paths to external resources in the parent
    flow should be absolute. Relative paths will break when the two flows are merged
    unless the parent and child flow are in the same directory. Once merged, all relative
    paths in the parent flow will become relative to the child flow. In our samples,
    this is not much of a problem because we are not dealing with resources directly.
    Our views are literals, which match up with definition names in the Tiles configuration.
    However, if you are not using Tiles, and you are referring to the JSPs directly
    from within your flows, then you could have something like this (imaginary example)
    of a `parent-flow` flow that is in `WEB-INF\views\parent\parent-flow.xml` and
    has a single `view` state:


    ```

    <view-state id="someViewState" view="thePage.jsp"/>

    ```


    In this case, `thePage.jsp` is in the same location as the flow (`WEB-INF\views\parent\thePage.jsp`).
    Hence, it is a relative pointer to the resource. If a child flow in another directory
    (e.g., `WEB-INF\views\child\child-flow.xml`) were to now inherit from this flow,
    then the `thePage.jsp` resource from the `view` state of `someViewState` would
    now try to resolve from the location of the child flow’s `WEB-INF\views\child\thePage.jsp`—
    which, of course, does not exist. In such a case, you should make the path to
    the resource absolute by specifying the full path. Instead of specifying `view="thePage.jsp"`
    in the parent flow, you should instead specify this path:


    ```

    view="WEB-INF\views\parent\thePage.jsp"

    ```


    ### State Inheritance


    In addition to specifying a `parent` attribute on the flow element, you can also
    specify a `parent` attribute on the individual states. This could be useful if
    you want more fine-grained control over which elements from the parent flow are
    actually inherited. This only makes sense if you did not apply inheritance on
    the `flow` level; in other words, it makes sense only if you did not specify the
    `parent` attribute on the flow element, but instead specified it only on those
    states for which you want to have inheritance:


    * Unlike with flow inheritance, you can only inherit from a single state.

    * The parent state you’re inheriting from should be of the same type. For example,
    a `view` state cannot inherit from an `action` state.

    * Basically, the same rules that apply for flow inheritance also apply here. The
    only difference is that the granularity level is less coarse-grained because you
    can now indicate which elements need to be inherited. The only notable difference
    is that the state is always merged with the indicated parent state. With flow
    inheritance, it matters if the element has the same key attribute, so it can be
    merged or taken as-is. Since we are specifying the state directly here, it is
    always merged, no matter what.

    * You have to specify the flow in which the state you want to inherit from is
    defined. The format looks like this: `parent="parent-flow#parent-state"`


    ![Image](images/square.jpg) **Note** You might wonder what happens if there is
    a `view` state with the same name in both parent and child flows and there is
    state inheritance applied on them. For example, in the child flow, assume there
    is a `view` state like this: `<view-state id="viewStateX" view="someView" parent="parent#viewStateX">`.
    Meanwhile, the parent also has a `view` state of `viewStateX`. As stated before,
    it doesn’t matter. The states are always merged. In this case, every attribute
    and element of the `viewStateX` defined in the parent is merged with the `viewStateX`
    in the child. If both the parent and the child provide the same attributes or
    elements with the same identifier, then the child version is the one that is retained.


    ### Web Flow Configuration Customizations


    In the first chapter, we introduced you to the core Web Flow configuration. Next,
    we will see how we can make some adjustments to this configuration that could
    be important for your application’s performance and/or how your flows are managed
    within your application.


    We also saw that Web Flow uses SpEL by default, but it doesn’t have to be this
    way. The second customization we are going to discuss explains how you can change
    the default expression language to something else.'
