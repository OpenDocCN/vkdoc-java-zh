    ## 第 2 章


    ## Spring 框架基础


    Spring 框架源于 Rod Johnson 为《Expert One-on-One J2EE Design and Development》（Wrox,
    2002）一书编写的代码。该框架结合了业界 Java 企业版（JEE）开发的最佳实践，并与同类最佳第三方框架进行了集成。如果你需要尚不存在的集成方式，它还提供了简单的扩展点来编写你自己的集成。该框架的设计始终以开发人员生产力为核心，使得使用现有（有时是繁琐的）Java
    和 JEE API 变得更加容易。


    在我们开始探索 Spring MVC 和 Spring Web Flow 之前，我们将快速回顾一下 Spring Core（以前称为 Spring 框架）的知识。Spring
    现在早已是 Java 企业软件开发的事实标准。它向我们中的许多人介绍了诸如*依赖注入*、*面向切面编程*（AOP）以及使用*普通 Java 对象*（POJO）进行编程等概念。


    在本章中，我们将介绍依赖注入和 AOP。具体来说，我们将介绍 Spring 框架如何帮助我们实现依赖注入，以及如何利用编程来发挥我们的优势。为了能够做到这里提到的事情，我们将探索控制反转（IoC）容器：*应用程序上下文*。


    我们在这里只涉及 Spring 框架必要的基础知识。如果你想了解更深入的信息，我们推荐优秀的 Spring 参考指南（[`www.springsource.org`](http://www.springsource.org)）或诸如《Pro
    Spring 3》（Apress, 2012）或《Spring Recipes, 第 2 版》（Apress, 2011）等书籍。


    让我们先快速浏览一下 Spring 框架及其组成模块。


    ![Image](img/square.jpg) **提示**  你可以在 `chapter2-samples` 项目中找到本章的示例代码。示例的不同部分包含一个带有
