    Existing Code* 和 *Practical API Design: Confessions of a Java Framework Architect*。


    ![图片](img/9781430241553_Fig12-02.jpg)


    ***图 12-2.** 选择书籍*


    我们要做的是从 `selectBooks.jsp` 视图中提取表格部分，并将其放入一个名为 `showSelectedBooks.jsp` 的独立视图中，该视图位于
