  trans: "\n#### 在项目中推广测试\n\n如果编写测试过于困难，或者为了测试某个特定模块而需要对代码进行大量重构，那么可以肯定的是，没有人会去编写测试。许多开发者将测试视为一项必须完成的额外任务。在本节中，我们想提供一些在项目中推广测试的技巧，让编写测试变得更容易、更有吸引力。项目本身应尽可能为编写测试提供支持。本节内容当然无法面面俱到，但我们希望它能让你了解一些更重要的方面。\n\
    \n> **目标：** 在项目中，你可以做的第一件事就是设定一个测试目标；例如，以测试覆盖生产代码的高百分比为目标，就是一个值得努力的好目标。EclEmma^(2)\
    \ 是一个非常优秀的插件，可以帮你实现这一点。我们将在下一节编写第一个测试后展示它的输出结果。Gradle 和 Maven 也有相应的插件，可以自动运行 Emma^(3)。你甚至可以设定构建成功所需的最低覆盖率目标。代码覆盖率可以在心理上发挥作用，让开发者有一个目标：尽可能提高被覆盖代码的百分比。这是一种“游戏化”的形式；它通过激励我们争取尽可能高的覆盖率，来帮助我们尽最大努力编写测试。但是，请注意，数量并不比质量更重要，因此不应忽视质量方面。编写一个达到\
    \ 100% 覆盖率的测试并不难，但这并不意味着代码本身得到了良好的测试。代码测试覆盖率只是一个用于感受测试质量的最低限度指标。\n> \n> **基础设施：**\
    \ 我们指的是项目中的框架和结构。没有良好的基础设施，测试会变得很痛苦。你应该开始搭建一个良好的平台来编写测试。如前所述，编写测试是一项投资，这项投资应该得到很好的保护。测试就像你汽车的全面保险。它需要花钱，而且不会给你带来任何直接好处。但如果你的车出了任何问题，它就会支付费用，而且，当这种情况发生时，你会庆幸自己买了这份保险！测试也是如此（只不过事故每天都会发生，而且一旦你构建了测试，使用它们就是免费的）。一旦你开始重构或更改应用程序，它们就会开始产生回报。\n\
    > \n> **测试的重要性：** 测试有时比它们所测试的代码更重要，因为它们是代码正常工作的证明。没有测试，代码就毫无意义，因为其行为是一种无法验证的状态。即使你非常确定代码能工作，你可能也不知道其影响。其他人依赖于你的代码，可能会突然注意到行为的变化，从而破坏你的项目。如果每个组件都经过了充分的测试，那么在运行测试后，问题就会立即显现出来。\n\
    > \n> **理解：** 你应该理解不同级别的测试，以及何时在何种情况下应用哪种类型的测试。你可以通过前端测试来测试整个应用程序，但这将是一个糟糕的主意。你还应该知道测试应该在何处停止。你不需要测试\
    \ Spring、Hibernate 或你正在使用的任何库。它们有自己的测试集。\n\n_________\n\n² [`http://www.eclemma.org/`](http://www.eclemma.org/)\n\
    \n³ [`http://docs.codehaus.org/display/GRADLE/Plugins#Plugins-Emmaplugin`](http://docs.codehaus.org/display/GRADLE/Plugins#Plugins-Emmaplugin)\n\
    \n> **环境：** 你的测试（包括单元测试和集成测试）应该持续运行。你应该有一台专用机器，在每次提交时构建你的项目。对于 CI（持续集成）系统，我们建议你了解一下\
    \ Jenkins^(4)（在因法律原因更名之前，它被称为 Hudson）。它设置起来非常简单，并且运行得非常好。它会从你的版本控制系统（VCS）中检出代码并进行构建。如果你的项目可以使用构建工具（如\
    \ Gradle、Ant、Maven 等）构建，那么只需几分钟就能安排一个自动化构建。此外，由于你将使用此类工具来自动化构建，你的测试应该与环境无关。它们应该能够在你的智能手机上运行，而无需任何资源或环境依赖。测试应该能够在任何地方运行。测试还应该易于运行，最好只需一个命令，无需任何形式的配置或设置。\n\
    \n![Image](img/square.jpg) **注意** 验证项目测试套件的最佳方法是：找一台能够运行 Java 的随机设备，从你的 VCS 执行检出，禁用所有网络接口，然后输入一个命令来执行构建并运行你的测试。应该没有失败，并且你的测试覆盖率应能清晰地表明项目的主要部分都经过了测试。还有一个名为\
    \ sonar^(5) 的优秀工具（开源），它正是做这件事的：从 VCS 检出你的代码，并对其应用各种度量指标，包括测试覆盖率。我们强烈建议你尝试一下，因为它设置起来非常简单，并且对于保障代码质量的好处是巨大的。\n"
- fmt: '#### Different Types of Testing


    Testing comes in different types. It is important that we decide which level of
    testing we are going to cover, and most of all give a clear definition of it.
    In this chapter we will look at unit, integration, and system testing. We will
    start by giving an overview of the different types of testing and a word of explanation.
    This list is not exhaustive, but it gives an idea of the level of testing we are
    going to cover.


    > * **Unit Testing:** The basic definition of a unit test is “a discrete test
    condition to check correctness of an isolated software module.” A unit test functions
    at the lowest possible level of a software module, preferably a single method
    of a class, without having any dependencies (like resources). We will look into
    unit testing in more detail in the next sub section.

    > * **Integration Testing:** Unlike a unit test, integration tests have a larger
    scope that involves testing several layers of your application. We will look at
    integration testing in more detail in the “Integration Tests” section.


    _________


    ⁴ [`http://jenkins-ci.org/`](http://jenkins-ci.org/)


    ⁵ [`http://www.sonarsource.com/`](http://www.sonarsource.com/)


    > * **System Testing:** Like integration testing but using the real resources.
    The resources could be scaled-down versions of the actual production resources,
    but it is important that the environment setup and topology match as closely as
    possible. This will make sure that the transition of your project to other environments
    goes smoothly. The tests are also written without any internal knowledge of how
    the application is built; they treat the application to test as a black box. Front-end
    testing with a real browser is also a form of system testing.

    > * **User Acceptance Testing:** Acceptance testing is testing performed by users
    interacting with the interface of the application. It is a manual kind of testing
    that is performed whenever a piece of the software is implemented. It is a good
    thing to perform acceptance testing frequently and as early as possible; however,
    unit and integration tests should locate most of the issues before they ever reach
    the users. So acceptance testing should not be seen as a replacement for unit
    and integration testing.

    > * **Performance Testing:** Ideally performed on as close as possible a mirror
    of the production setup where the application will finally be deployed. By *setup*
    we mean everything—the hard- and software, but also the dependencies such as the
    databases (including data), external services, and so forth. Performance tests
    aim at detecting what the throughput of the application will be under normal load.
    For web applications it can be the average response time of requests with a predicted
    user load. The results of performance testing can verify whether the application
    will be able to comply with the proposed Service Level Agreements (SLAs).

    > * **Stress Testing:** Ideally requires the same setup as performance testing.
    However here we are putting the application under an abnormal amount of load (or
    stress). It aims at detecting weak spots such as transactions that start to break
    or other failures that do not appear under normal operation. In general it gives
    an idea about the stability and robustness of the entire setup when the borders
    of normal load are crossed.


    As explained we will limit ourselves to discussing unit, integration, and system
    testing. For system testing we will limit ourselves to automated front-end testing.
    These three layers are the ones that should make up 90% or more of your entire
    (automatic) test set. They are the ones that will prove that your code is working
    and will remain working when features are added or code is refactored. These tests
    will be able to run automatically and everywhere. At this level Spring’s test
    support will also prove itself to be the most useful. Let’s continue by taking
    a closer look into unit tests.


    ### Unit Tests


    A unit test accompanies the code on its lowest level possible and is written at
    development time. It can take many forms, from a basic test that verifies the
    behavior of a domain object to a more compelling test that verifies the behavior
    of a business service. Most important, a unit test is system independent and does
    not depend on any resource whatsoever. If a piece of code depends on a resource,
    that resource is “simulated” one way or the other. We will discuss mock objects,
    or mocks (which are a form of simulators) in the coming sections, but for now
    it’s enough to understand that a mock is a code replacement for a resource. The
    most important criteria a good unit test should comply with can be listed as follows.
    A good unit test should do all of the following:


    > * **Run fast:** A unit test must run extremely fast. If it needs to wait for
    database connections or external server processes, or to parse large files, its
    usefulness will quickly become limited. A test should provide an immediate response
    and instant gratification.

    > * **Have zero external configuration:** A unit test must not require any external
    configuration files, not even simple text files. The test’s configurations must
    be provided and set by the test framework itself by calling code. The intent is
    to minimize both the runtime of the test and to eliminate external dependencies
    (which can change over time, becoming out of sync with the test). Test case conditions
    should be expressed in the test framework, creating more readable test conditions.

    > * **Run independent of other tests:** A unit test must be able to run in complete
    isolation. In other words, the unit test can’t depend on some other test running
    before or after itself. Each test is a stand-alone unit. In fact, every test method
    inside a test should be stand-alone and not depend on another method or on the
    test methods being run in a certain order.

    > * **Depend on zero external resources:** A unit test must not depend on any
    outside resources, such as database connections or web services. Not only will
    these resources slow the test down, but they are outside the control of the test
    and thus aren’t guaranteed to be in a correct state for testing.

    > * **Leave external state untouched:** A unit test must not leave any evidence
    that it ever ran. Unit tests are written to be repeatable, so they must clean
    up after themselves. Obviously, this is much easier when the test doesn’t rely
    on external resources (which are often harder to clean up or restore).

    > * **Test smallest unit of code possible:** A unit test must test the smallest
    unit of code possible in order to isolate the code under test. In object-oriented
    programming, this unit is usually a method of an object or class. Writing unit
    tests such that a method is tested independently of other methods reduces the
    number of code lines that could contain a potential bug.'
