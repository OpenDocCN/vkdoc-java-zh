    With Selenium 1.x the communication between the test case and the Selenium RC
    server goes over the network (your test commands are translated into HTTP requests
    being sent to the Selenium RC server). Potentially the Selenium RC server can
    be running on another machine than where the actual test is running. The Selenium
    RC server then translates the commands received over HTTP to JavaScript calls
    and injects them into the target browser. This is a nontrivial process, but it
    is shielded from the user. While this setup considered deprecated, it might still
    be interesting to see how it works. You can read more about it on the Selenium
    documentation page.^([16](#Chapter09.html#CHP-9-FN-16))


    Selenium now offers a different method, using WebDriver, which controls the browser
    directly using the browser’s native API. So it no longer requires a complex (internal)
    setup as with Selenium RC that Selenium 1.x used. Using Selenium you can directly
    control the browser without having a need for the Selenium RC server. You simply
    select the appropriate driver via the API, depending on the browser you want to
    use.


    However, you can still use the RC server. In that case the RC server will also
    use WebDriver. Instead of your test directly using WebDriver to control a browser
    on your local machine, you now instruct the RC server running on a different machine
    to communicate with a local browser using WebDriver. The main difference between
    the Selenium RC server setup and Selenium 1.x is that the Selenium RC server does
    much more than that; it also injects JavaScript and acts as proxy, which with
    WebDriver is no longer needed. It just functions as a “remote JVM,” enabling you
    to control a browser on a remote machine.


    _________


    ^(16) [`http://seleniumhq.org/docs/05_selenium_rc.html#selenium-rc-architecture`](http://seleniumhq.org/docs/05_selenium_rc.html#selenium-rc-architecture)


    ![Image](images/square.jpg) **Tip** Using Selenium RC server is especially interesting
    for those cases where you want to run the test on machine A but use machine B’s
    browser. For example, you could run the test on your CI, which is a Unix-type
    machine. You want to run your front-end tests against IE 7, 8 and 9\. To do so,
    you could set up three virtual machines, each installed with Windows and one of
    the three browsers, and running a Selenium RC server. You could then run the test
    suite three times. The first time you would use the IP address of the virtual
    machine running IE 7\. The second time the IP address of the virtual machine running
    IE 8, and so forth. You could create Spring test profiles to dynamically inject
    another IP address depending on the profile with which the tests are run.


    #### Writing a Selenium Test


    Now that we have seen some theory about Selenium and its predecessor Selenium
    1.x, let’s have a look how we can actually use it. Before we can start we have
    to add its dependencies in `build.gradle`. We will add them in the gradle build
    file of chapter9-bookstore sample.


    `testCompile ''org.seleniumhq.selenium:selenium-java:2.20.0''`

    `testCompile ''org.seleniumhq.selenium:selenium-firefox-driver:2.20.0''`

    `testCompile ''org.seleniumhq.selenium:selenium-htmlunit-driver:2.20.0''`


    We added the core dependency (`selenium-java`) and a WebDriver dependency for
    Firefox and HtmlUnit. Other drivers^([17](#Chapter09.html#CHP-9-FN-17)) currently
    are `selenium-android-driver`, `selenium-chrome-driver`, s`elenium-ie-driver`,
    `selenium-iphone-driver`, and `selenium-remote-driver`. Next let’s look at the
    Selenium test for the LoginController in [Listing 9-15](#Chapter09.html#list_9_15).


    ***Listing 9-15.** Testing the login sequence with Selenium*


    `package com.apress.prospringmvc.bookstore.web.frontend;`


    `// Other imports omitted, see Listing 9-7`


    `import static org.junit.Assert.assertEquals;`


    `import org.openqa.selenium.By;`

    `import org.openqa.selenium.WebDriver;`

    `import org.openqa.selenium.firefox.FirefoxDriver;`


