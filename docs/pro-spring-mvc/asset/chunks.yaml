    Before we move on, let’s drill down on how the `handleLogin` method works. The
    `username` and `password` parameters are retrieved from the request, and these
    are used to call the `login` method on the `AccountService`. If the correct credentials
    are supplied, we get an Account instance for the user (which we store in the session),
    and then we redirect to the index page. If the credentials are not correct, the
    service throws an `AuthenticationException`, which, for now, is handled by the
    controller. The exception is stored as a `request` attribute, and we return the
    user to the login page.


    Although the current controller does its work, we are still operating directly
    on the `HttpServletRequest`. This is a quite cumbersome (but sometimes necessary)
    approach; however, we would generally want to avoid this and use the flexible
    method signatures to make our controllers simpler. With that in mind, let’s modify
    the controller and limit our use of directly accessing the request (see [Listing
    5-12](#Chapter05.html#list_5_12)).


