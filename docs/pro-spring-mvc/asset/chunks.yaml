    接下来，我们还需要在 `account.jsp` 文件中添加一些 JavaScript。这与我们最初添加到图书搜索页面的脚本非常相似，但有一个主要区别——我们现在使用
    `PUT` 而不是 `GET`。请参见清单 7-12，了解在表单之后或页面末尾添加的 JavaScript。控制器方法（参见清单 7-3）保持不变，因为它对于控制器来说仍然是一个
    `PUT` 请求。


    ***清单 7-12.** 账户页面 PUT Ajax 表单提交*


    `<script>`

    `$(''#accountForm'').submit(function(evt){`

    `    evt.preventDefault();`

    `    formData = $(''#accountForm'').serialize();`

    `    $.ajax({`

    `        url: $(''#accountForm'').action,`

    `        type: ''PUT'',`

    `        data: formData`

    `    });`

    `});`

    `</script>`


    #### 渐进增强


    我们应用 AJAX 功能的方式是一种称为*渐进增强*的技术。这意味着先构建一个功能完整的简单网页，然后使用 JavaScript 为页面添加动态和丰富的交互行为。


    相反的方法也是可行的；这种技术称为*优雅降级*，这意味着我们从一个包含所有所需行为的页面开始，然后根据浏览器提供的功能，缩减所使用的丰富交互行为。


    如今的趋势是使用渐进增强，因为通常来说，它更容易构建和维护。它还有一个优点，即我们可以根据连接到我们应用程序的设备的能力进行增强（iPhone 与运行 Internet
    Explorer 9 的 Windows 7 PC 具有不同的功能）。


    ### 处理文件上传


    HTTP 文件上传或基于 HTML 表单的文件上传在 RFC 1867^(8) 中定义。在向表单添加类型为 `file` 的 HTML 输入字段并将编码设置为
    `multipart/form-data` 后，浏览器可以将文本和/或二进制文件作为 `POST` 请求的一部分发送到服务器。


    为了能够处理文件上传，我们首先需要注册一个 `org.springframework.web.multipart.MultipartResolver`。开箱即用，Spring
    提供了两种处理文件上传的方式。第一种是 Servlet 3.0 规范中描述的多部分支持，第二种是使用 Apache 的 Commons FileUpload^(9)
    项目提供的功能。


    Spring 框架提供了两种实现：`org.springframework.web.multipart.support.StandardServletMultipartResolver`
    和 `org.springframework.web.multipart.commons.CommonsMultipartResolver`。第一种实现只能在启用了多部分支持的
    Servlet 3.0 环境中使用，第二种则使用 commons-fileupload。


    为了实际处理文件上传，我们需要修改控制器。这些修改大多与所使用的文件上传技术无关。Spring 提供了几种处理文件上传的抽象。我们可以编写一个请求处理方法，该方法接受类型为
    `org.springframework.web.multipart.MultipartFile`（或集合）的参数；我们也可以使用 `org.springframework.web.multipart.MultipartHttpServletRequest`
    并自行检索文件。当我们在 Servlet 3.0 环境中并使用多部分解析支持时，我们还可以使用 `javax.servlet.http.Part` 接口来获取文件。


    指示对文件上传执行操作的最终方法是用 `org.springframework.web.bind.annotation.RequestPart` 注解方法参数（参见第
    4 章）。当将其放在上述任何其他类型上时，Spring 会使用类型转换系统来转换文件的内容。


    我们将首先讨论两种不同策略的配置。之后，我们将研究如何在控制器内部处理文件上传。

