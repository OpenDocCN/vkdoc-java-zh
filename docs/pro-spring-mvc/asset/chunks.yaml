    ##### 配置类型转换


    如果要在 Spring MVC 中使用 `org.springframework.core.convert.converter.Converter` 或 `org.springframework.format.Formatter`，则需要添加一些配置。`org.springframework.web.servlet.config.annotation.WebMvcConfigurerAdapter`
    为此提供了一个方法。可以重写 `addFormatters` 方法来注册额外的转换器和/或格式化器。该方法接受一个 `org.springframework.format.FormatterRegistry`（参见清单
    5-38）作为参数，并可用于注册额外的转换器和/或格式化器（`FormatterRegistry` 扩展了 `org.springframework.core.convert.converter.ConverterRegistry`，后者为
    `Converter` 实现提供了相同的功能）。


