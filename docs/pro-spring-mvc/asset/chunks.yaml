- fmt: "### Implementing a `HandlerInterceptor`\n\nCurrently, our account pages aren’t\
    \ secure. For example, someone could simply change the `id` in the URL to see\
    \ the content of another account. Let’s use the interceptor approach to apply\
    \ security to our pages. We are going to create an interceptor that checks whether\
    \ we are already logged in (our account is available in the HTTP session). If\
    \ not, it will throw a `com.apress.prospringmvc.bookstore.service.AuthenticationException`\
    \ (see [Listing 6-14](#Chapter06.html#list_6_14)). We will also store the original\
    \ URL in a session attribute; that way, we can redirect the user to the URL he\
    \ wants to visit after he logs in.\n\n**Listing 6-14.** The `SecurityHandlerInterceptor`\n\
    \n```\npackage com.apress.prospringmvc.bookstore.web.interceptor;\n// javax.servlet\
    \ imports omitted\nimport org.springframework.web.servlet.HandlerInterceptor;\n\
    import org.springframework.web.servlet.handler.HandlerInterceptorAdapter;\nimport\
    \ org.springframework.web.util.WebUtils;\n\nimport com.apress.prospringmvc.bookstore.domain.Account;\n\
    import com.apress.prospringmvc.bookstore.service.AuthenticationException;\nimport\
    \ com.apress.prospringmvc.bookstore.web.controller.LoginController;\n\npublic\
    \ class SecurityHandlerInterceptor extends HandlerInterceptorAdapter {\n\n   \
    \ @Override\n    public boolean preHandle(HttpServletRequest request,\n      \
    \                       HttpServletResponse response,\n                      \
    \       Object handler) throws Exception {\n        Account account= (Account)\
    \ WebUtils.getSessionAttribute(\n                                request, LoginController.ACCOUNT_ATTRIBUTE);\n\
    \        if (account == null) {\n            //Retrieve and store the original\
    \ URL.\n            String url = request.getRequestURL().toString();\n       \
    \     WebUtils.setSessionAttribute(\n                         request, LoginController.REQUESTED_URL,\
    \ url);\n            throw new AuthenticationException(\n                 \"Authentication\
    \ required.\", \"authentication.required\");\n        }\n        return true;\n\
    \    }\n\n}\n```\n\nFor this interceptor, our configuration is a bit more complex\
    \ because we want to map it to certain URLs (see the highlighted part in [Listing\
    \ 6-15](#Chapter06.html#list_6_15)).\n\n**Listing 6-15.** `SecurityHandlerInterceptor`\
    \ Configuration\n\n```\npackage com.apress.prospringmvc.bookstore.web.config;\n\
    \nimport com.apress.prospringmvc.bookstore.web.interceptor.SecurityHandlerInterceptor;\n\
    \n//Other imports omitted\n\n@Configuration\n@EnableWebMvc\n@ComponentScan(basePackages\
    \ = { \"com.apress.prospringmvc.bookstore.web\" })\npublic class WebMvcContextConfiguration\
    \ extends WebMvcConfigurerAdapter {\n\n    @Override\n    public void addInterceptors(InterceptorRegistry\
    \ registry) {\n        registry.addInterceptor(localeChangeInterceptor());\n \
    \       registry.addWebRequestInterceptor(commonDataInterceptor());\n        registry.addInterceptor(new\
    \ SecurityHandlerInterceptor()).\n        addPathPatterns(\"/customer/account*\"\
    , \"/cart/checkout\");\n    }\n\n    // Other methods omitted\n}\n```\n\nFinally,\
    \ we also need to make a modification to our `com.apress.prospringmvc.bookstore.web.controller.AccountController`.\
    \ Currently, we expect an `id` as part of the URL. However, instead of retrieving\
    \ the account from the database, we are going to restore it from the session.\
    \ [Listing 6-16](#Chapter06.html#list_6_16) shows the necessary modifications.\n\
    \n**Listing 6-16.** The `AccountController`\n\n```\npackage com.apress.prospringmvc.bookstore.web.controller;\n\
    \n// Imports omitted\n\n@Controller\n@RequestMapping(\"/customer/account\")\n\
    @SessionAttributes(types = Account.class)\npublic class AccountController {\n\n\
    \    //Fields and other methods omitted\n\n    @RequestMapping(method = RequestMethod.GET)\n\
    \    public String index(Model model, HttpSession session) {\n        Account\
    \ account = (Account) session.getAttribute(LoginController.ACCOUNT_ATTRIBUTE);\n\
    \        model.addAttribute(account);\n        model.addAttribute(\"orders\",\
    \ this.orderRepository.findByAccount(account));\n        return \"customer/account\"\
    ;\n    }\n\n    @RequestMapping(method = { RequestMethod.POST, RequestMethod.PUT\
    \ })\n    public String update(@ModelAttribute Account account) {\n        this.accountRepository.save(account);\n\
    \        return \"redirect:/customer/account\";\n    }\n}\n```\n\nWhen we redeploy\
    \ our application and click Account in the menu bar, we will be greeted with an\
    \ error page (see [Figure 6-6](#Chapter06.html#fig_6_6)). We use the default exception-handling\
    \ mechanism to send an error code back to the client, so that the browser can\
    \ act upon it. In the next section, we are going to cover exception handling in\
    \ more detail.\n\n![Image](images/9781430241553_Fig06-06.jpg)\n\n**Figure 6-6.**\
    \ A 403 error page after clicking a secured link\n\nWhile we have protected our\
    \ resources, it would be nicer if we could show the login page to the user with\
    \ a message that she needs to log in to see the requested page. This is what we\
    \ are going to do in the next section.\n\n### Exception Handling\n\nAs mentioned\
    \ in [Chapter 4](#Chapter04.html#ch4), when an exception occurs during request\
    \ processing, Spring will try to handle the exception. To give us a generic way\
    \ of handling exceptions, Spring uses yet another strategy that can be utilized\
    \ by implementing the `org.springframework.web.servlet.HandlerExceptionResolver`\
    \ interface.\n\nThe `org.springframework.web.servlet.HandlerExceptionResolver`\
    \ provides a callback method for the dispatcher servlet (see [Listing 6-17](#Chapter06.html#list_6_17)).\
    \ This method is called when an exception occurs during the request processing\
    \ workflow. The method can return an `org.springframework.web.servlet.ModelAndView`,\
    \ or it can choose to handle the `Exception` itself.\n\n**Listing 6-17.** The\
    \ `HandlerExceptionResolver` Interface\n\n```\npackage org.springframeowork.web.servlet;\n\
    \nimport javax.servlet.http.HttpServletRequest;\nimport javax.servlet.http.HttpServletResponse;\n\
    \npublic interface HandlerExceptionResolver {\n\n  ModelAndView resolveException(HttpServletRequest\
    \ request,\n                                HttpServletResponse response,\n  \
    \                              Object handler,\n                             \
    \   Exception ex);\n}\n```\n\nBy default, the dispatcher servlet looks for all\
    \ beans in the application context of the type `org.springframework.web.servlet.HandlerExceptionResolver`\
    \ (see the “Configuring the DispatcherServlet” section in [Chapter 4](#Chapter04.html#ch4)).\
    \ When multiple resolvers are detected, the dispatcher servlet will consult each\
    \ of them until a viewname is returned or the response is written. If the exception\
    \ cannot be handled, then the exception is rethrown, so that the servlet container\
    \ can handle it. The servlet container will use the error-pages configuration\
    \ from its configuration or simply propagate the exception to the user. (In most\
    \ cases, you will get an error 500 with a stacktrace on screen.)\n\nSpring MVC\
    \ comes with several implementations of the `org.springframework.web.servlet.HandlerExceptionResolver`\
    \ interface, as we can see in [Figure 6-6](#Chapter06.html#fig_6_6). Note that\
    \ each of these implementations works differently. [Table 6-4](#Chapter06.html#tab_6_4)\
    \ gives a short overview on how the different implementations work.\n\n![Image](images/9781430241553_Fig06-07.jpg)\n\
    \n**Figure 6-7.** The `HandlerExceptionResolver` hierarchy\n\n![Image](images/tab_6_4.jpg)\n\
    \nAs the class diagram in [Figure 6-7](#Chapter06.html#fig_6_7) illustrates, all\
    \ usable implementations for resolving exceptions extend the `org.springframework.web.servlet.handler.AbstractHandlerExceptionResolver`.\
    \ This is a convenient superclass that provides common features and configuration\
    \ options to all implementations. [Table 6-5](#Chapter06.html#tab_6_5) lists and\
    \ briefly describes its common properties.\n\n![Image](images/tab_6_5.jpg)"
