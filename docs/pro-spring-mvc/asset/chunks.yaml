    #### 配置视图控制器


    到目前为止，我们编写的两个控制器示例被称为*视图控制器*。它们不选择数据，而只选择要渲染的视图名称。如果我们的应用程序规模较大，包含更多此类视图，那么维护和编写这些控制器将变得相当繁琐。Spring
    MVC 可以在这方面帮助我们，使我们能够简单地将一个 `org.springframework.web.servlet.mvc.ParameterizableViewController`
    添加到配置中，并对其进行相应配置。我们需要配置一个实例，使其返回 `index` 作为视图名称，并将其映射到 `/index.htm` URL。清单 5-4
    展示了实现此功能所需添加的内容。


    ***清单 5-4.** 一个 ParameterizableViewController 配置*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `import org.springframework.web.servlet.mvc.ParameterizableViewController;`

    `import org.springframework.web.servlet.config.annotation.WebMvcConfigurerAdapter;`


    `// 其他导入已省略`


    `@Configuration`

    `@EnableWebMvc`

    `@ComponentScan(basePackages = { "com.apress.prospringmvc.bookstore.web" })`

    `public class WebMvcContextConfiguration extends WebMvcConfigurerAdapter {`


    `    // 其他方法已省略`


    **`@Bean(name = "/index.htm")`**

    `    public Controller index() {`

    `        ParameterizableViewController index;`

    `        index = new ParameterizableViewController();`

    **`index.setViewName("index");`**

    `        return index;`

    `    }`

    `}`


    那么它是如何工作的呢？我们创建控制器，设置要返回的视图名称，然后显式地给它命名为 `/index.htm`（参见高亮部分）。这种显式命名使得 `org.springframework.web.servlet.handler.BeanNameUrlHandlerMapping`
    能够识别我们的控制器并将其映射到该 URL。然而，如果这种方法需要大幅扩展，那么我们将需要创建相当多的此类方法。同样，Spring MVC 可以在这里帮助我们。由于我们已经启用了新的
    Spring MVC 配置，我们可以利用它来发挥优势。我们可以重写 `addViewControllers` 方法（`org.springframework.web.servlet.config.annotation
    .WebMvcConfigurerAdapter` 的方法之一），并简单地将我们的视图名称注册到特定的 URL。清单 5-5 展示了如何做到这一点。


    ***清单 5-5.** 一个 ViewController 配置*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `import org.springframework.web.servlet.config.annotation.ViewControllerRegistry;`

    `import org.springframework.web.servlet.config.annotation.WebMvcConfigurerAdapter;`


    `// 其他导入已省略`


    `@Configuration`

    `@EnableWebMvc`

    `@ComponentScan(basePackages = { "com.apress.prospringmvc.bookstore.web" })`

    `public class WebMvcContextConfiguration extends WebMvcConfigurerAdapter {`


    `  // 其他方法已省略`

    `    @Override`

    `    public void addViewControllers(final ViewControllerRegistry registry) {`

    `        registry.addViewController("/index.htm").setViewName("index");`

    `    }`

    `}`


    结果是相同的。一个 `ParameterizableViewController` 被创建并映射到 `/index.htm` URL（参见图 5-1）。然而，第二种方法比第一种更简单，使用起来也更不繁琐。


    ![Image](img/9781430241553_Fig05-01.jpg)


    ***图 5-1.** 索引页面*


    ### 请求处理方法


    编写请求处理方法可能是一个挑战。例如，如何将一个方法映射到传入的请求？这里可能涉及多个因素，包括 URL、使用的 HTTP 方法（例如 `GET` 或 `POST`^(1)）、参数或
    HTTP 头^(2) 的可用性，甚至是要生成的请求内容类型或内容类型（例如 XML、JSON 或 HTML）。所有这些都会影响选择哪个方法来处理请求。


    编写请求处理方法的第一步是在方法上添加 `org.springframework.web.bind.annotation.RequestMapping` 注解。这个映射会被
    `org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping`
    检测到，以创建传入 URL 到正确方法的映射（有关处理器映射的更多信息，请参见第 4 章中的“Spring MVC 组件”部分）。接下来，我们需要指定要执行指定处理器的
    Web 请求。


    该注解可以放在类型（控制器）和方法级别上。我们可以使用类型级别的注解进行粗粒度映射（例如 URL），然后使用方法级别的注解进一步指定何时执行该方法（例如 `GET`
    或 `POST` 请求）。


    表 5-2 显示了我们可以为 `RequestMapping` 注解设置哪些属性，以及它们如何影响映射。


    ![Image](img/tab_5_2.jpg)


    ![Image](img/tab_5_2a.jpg)


    ________________


    ¹ [`http://www.w3.org/Protocols/rfc2616/rfc2616-sec9.html`](http://www.w3.org/Protocols/rfc2616/rfc2616-sec9.html)


    ² [`http://www.w3.org/Protocols/rfc2616/rfc2616-sec14.html`](http://www.w3.org/Protocols/rfc2616/rfc2616-sec14.html)


    在表 5-3 中，有几个示例映射也展示了类级别和方法级别匹配的效果。如前所述，类上的 `RequestMapping` 注解适用于控制器中的*所有*方法。这种机制可用于在类级别进行粗粒度映射，在方法级别进行更细粒度的映射。


    ![Image](img/tab_5_3.jpg)


    ![Image](img/tab_5_3a.jpg)


    ________________


    ³ [`http://www.w3.org/Protocols/rfc2616/rfc2616-sec14.html`](http://www.w3.org/Protocols/rfc2616/rfc2616-sec14.html)


    #### 支持的方法参数类型


    一个请求处理方法可以有多种方法参数和返回值。表 5-4 中提到的大多数参数可以按任意顺序使用。但有一个例外：`org.springframework.validation.BindingResult`
    参数。该参数必须跟在用于将请求参数绑定到其上的模型对象之后。


    ![Image](img/tab_5_4.jpg)


    ![Image](img/tab_5_4a.jpg)


    ![Image](img/tab_5_4b.jpg)


    ##### RedirectAttributes


    `org.springframework.web.servlet.mvc.support.RedirectAttributes` 值得比表 5-4 中显示的更详细的解释。使用
    `RedirectAttributes`，可以精确声明重定向所需的属性。默认情况下，执行重定向时会暴露所有模型属性。由于重定向总是导致 `GET` 请求，所有原始模型属性（或原始类型的集合/数组）都将被编码为请求参数。然而，在使用注解的控制器中，模型中还存在一些不需要暴露且不受我们控制的对象（如路径变量和其他隐式值）。


    `RedirectAttributes` 可以在这里帮助我们。当它被用作方法参数并且正在发出重定向时，只有添加到 `RedirectAttributes`
    实例中的属性才会被添加到 URL 中。


    除了指定编码在 URL 中的属性之外，还可以指定所谓的闪存属性。*闪存属性*是在重定向之前存储，并在重定向之后检索并作为模型属性可用的属性。这是通过使用配置的
    `org.springframework.web.servlet.FlashMapManager` 来完成的。使用闪存属性对于无法编码的对象（非原始对象）或保持
    URL 整洁非常有用。

