    ### 流程执行监听器


    在执行流程时，Web Flow 会在实际执行转换或调用应用程序控制器上的方法之前经历不同的步骤。例如，我们已经看到，在视图被渲染并发送回客户端后，流程执行会暂停。同样，当现有流程执行收到新请求时，需要恢复流程执行。暂停和恢复流程执行只是
    Web Flow 将执行的步骤中的两个，但还有更多步骤。我们说这些步骤是 Web Flow *生命周期*的一部分，它由 Web Flow 在执行请求时所经历的（值得注意的）步骤组成。Web
    Flow 允许我们配置一个 `org.springframework.webflow.execution.FlowExecutionListener` 的实现，当任何这些特殊的生命周期步骤发生时，该实现将接收回调。


    从这些生命周期步骤获取回调通常仅对更多与基础设施相关的代码（例如，横切关注点）有用。例如，您可以使用 `FlowExecutionListener` 来应用特殊的安全检查。或者，您可以使用它来记录访问日志。`FlowExecutionListener`
    提供的功能在某种意义上与 Aspects 提供的功能非常相似，因为它对实际目标来说是透明的，无论这些回调是否发生。


    `FlowExecutionListener` 绝不能替代 Aspects，后者仍然更强大。然而，Aspects 也更复杂。您应该评估流程执行监听器方法是否足以完成您想要做的工作。如果不够，您仍然可以回退到
    AOP。


    在接下来的部分中，我们将介绍如何编写我们自定义的 `FlowExecutionListener`。最后，我们将逐一介绍 `FlowExecutionListener`
    中的所有方法，并对每个方法进行详细解释。


    #### 编写流程执行监听器


    编写流程执行监听器就像实现 `FlowExecutionListener` 接口一样简单。该接口定义了许多回调方法，这些方法将在流程执行生命周期过程中发生某些事情时被调用。Spring
    Web Flow 还提供了一个 `org.springframework.webflow.execution.FlowExecutionListenerAdapter`
    作为便利类，它使用空方法体实现了 `FlowExecutionListener` 接口定义的所有方法。您也可以继承 `FlowExecutionListenerAdapter`
    并仅覆盖您在特定时间需要的方法。


    ![图片](img/square.jpg) **注意** 流程执行监听器绝不使用 AOP 或任何字节码操作。它是内置于 Web Flow 子系统中的一个钩子，用于在流程执行期间为您提供某些事件的回调。这类似于
    Web 容器回调已注册的 `HttpSessionListener` 以通知您会话创建或销毁。


    流程执行监听器通过流程执行器声明（参见清单 12-29）。它们的顺序很重要；如果定义了多个流程执行监听器，它们的回调方法将按照监听器在 `<webflow:flow-execution-listeners>`
    元素中定义的顺序被调用。定义在最上面的流程执行监听器首先被调用；紧随其后的监听器其次被调用；依此类推。


    ***清单 12-29** 配置流程执行监听器*


    `<webflow:flow-executor id="flowExecutor" flow-registry="flowRegistry">`

    **`    <webflow:flow-execution-listeners>`**

    **`        <webflow:listener ref="loggerListener" />`**

    **`        <webflow:listener ref="securityListener" />`**

    **`    </webflow:flow-execution-listeners>`**

    `</webflow:flow-executor>`


    您还可以在 `<webflow:listener>` 上指定 `criteria` 属性，其值为逗号分隔的流程 ID 列表。这将使给定的监听器仅对指定的流程生效。如果将其留空，则该监听器对所有流程生效。这相当于指定一个星号
    (*)，如果您不指定 `criteria` 属性，这就是它的默认值。流程 ID 和星号是该属性唯一允许的值（参见清单 12-30）。


    ***清单 12-30** 仅为特定流程 ID 配置流程执行监听器*


    `<webflow:flow-executor id="flowExecutor" flow-registry="flowRegistry">`

    **`    <webflow:flow-execution-listeners>`**

    **`        <webflow:listener ref="loggerListener" criteria="myFlowId" />`**

    **`        <webflow:listener ref="securityListener" />`**

    **`    </webflow:flow-execution-listeners>`**

    `</webflow:flow-executor>`

