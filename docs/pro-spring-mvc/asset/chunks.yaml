    In this section, we are going to take the first step in actually enabling site
    visitors to buy books from our bookstore. Specifically, we are going to implement
    logic that lets us add books to our shopping cart. For this, we first need to
    define a session-scoped `Cart` bean.


    [Listing 6-1](#Chapter06.html#list_6_1) shows how to define a bean (our shopping
    cart) with `session` scope. This bean can be injected into other beans, just like
    any other bean in the framework. Spring will handle the complexity of managing
    the lifecycle of the bean. The lifecycle of the bean depends on the scope of the
    bean (see [Table 6-1](#Chapter06.html#tab_6_1)). For example, a `singleton`-scoped
    bean (the default) is tied to the lifecycle of the application context, whereas
    a `session`-scoped bean is tied to the lifecycle of the `javax.servlet.http.HttpSession`
    object.


    ***Listing 6-1.** Cart Session Scoped Bean*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `//Other imports omitted`


    `import org.springframework.context.annotation.Scope;`

    `import org.springframework.context.annotation.ScopedProxyMode;`

