    ^(13) [`https://github.com/SpringSource/spring-test-mvc`](https://github.com/SpringSource/spring-test-mvc)


    Spring MVC `test` aims at making your application controllers easier to test,
    extending the idea behind the `MockHttpServletRequest`, `MockHttpServletResponse`
    and `MockHttpSession` helpers, which we used in the previous section. It tries
    to simulate Spring MVC even better without having to boot an actual Servlet container.
    For example; with Spring MVC test you will be able to verify which JSPs were actually
    selected to render when using Tiles as the view resolver. This is something that
    was not possible until now, and could only be verified at runtime (possibly using
    front-end tests). The more we can test using unit or integration tests, the better.


    The example we will create will show how to use the basics. The first step is
    to bootstrap an `org.springframework.test.web.server.MockMvc`. This object initializes
    the MVC infrastructure, and will be your main entry into the API. You can initialize
    it in different ways:


    > *   From one or more MVC annotated configuration classes

    > *   From one or more Spring XML files

    > *   Using a `WebApplicationContext`

    > *   Individual `@Controller` classes


    The first three possibilities are managed modes. In these cases there is an application
    context started. Controllers that are required to process the request you fire
    at them are looked up from the application context. Also, the MVC environment
    will be configured as it will be at runtime, with the same view resolvers, resource
    handlers, interceptors, and so on, just as you have specified in the configuration.


    The last possibility is the so called standalone mode. In this mode you supply
    the application controllers directly, and the minimum set of Spring MVC infrastructure
    components are instantiated—only those required for the processing of requests
    with the registered application controllers. The set of infrastructure components
    is very similar to that provided by the MVC namespace or the MVC Java configuration.
    Important to note is that the actual Spring MVC configuration will not be tested
    (because it was never loaded).


    The desired method of initialization is the one where the entire Spring MVC configuration
    is loaded. However, if you instantiate the `MockMvc` for every test, it can become
    expensive. The preferred way is to use the third method using the `WebApplicationContext`,
    which will combine the best of both worlds. The `WebApplicationContext` is injected
    into the test. The configuration is loaded by Spring’s test support as usual.
    For the configuration (supplied in the `classes` attribute) you will use your
    Spring MVC annotated configuration classes. It could be something like this:


    `@RunWith(SpringJUnit4ClassRunner.class)`

    `@ContextConfiguration(classes = { ....})`

    `public class ApplicationControllerTest {`


    `  @Autowired`

    `  private WebApplicationContext wac;`


    This will load the `@Configuration` classes you indicated with the `classes` attribute
    and boot up a `WebApplicationContext`. You will then be able to construct a `MockMvc`
    object from the injected `WebApplicationContext`, which will be inexpensive. Spring’s
    test support will cache the initialization of the contexts that it loads, which
    are indicated via `@ContextConfiguration`, possibly loading only one instance
    for the entire test suite. At this time, however, the `WebApplicationContext`
    support is not yet available, though it will be starting in Spring 3.2.


    After you initialized the `MockMvc` object (one way or the other), you can start
    throwing requests at it. It will process them using actual Spring MVC logic and
    invoke your controller. At the end you are able to verify the results. In [Listing
    9-14](#Chapter09.html#list_9_14) we have rewritten the `LoginControllerTest` using
    Spring MVC `test`. To keep things simple we constructed the `MockMvc` object in
    standalone mode. Let’s have a look at the code first.


