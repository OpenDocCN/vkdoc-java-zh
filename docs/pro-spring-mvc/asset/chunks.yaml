    Security 将接收此信息，但需要验证用户是否存在以及提供的密码是否与该用户匹配。    为此，我们需要某种用户存储来保存能够访问应用程序的用户（和密码）。为了简单起见，我们将使用一个内存数据存储，我们将完全在配置中指定用户和密码。稍后我们将看到如何将其替换为数据库存储。    我们需要配置一个
