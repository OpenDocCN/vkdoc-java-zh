    Before closing our first refactoring, we want to summarize the different things
    we have done so far. This will give you a complete code overview of our flow and
    the involved `OrderController` and `OrderForm`.


    We started out by loading our categories and books using the `<on-render>` action.
    Next, we replaced the book and category references in our form with the real entity
    object. In order for this to work, we had to create and register two custom converters.
    Finally, we added validation to our flow, so that it is no longer possible to
    trigger application errors by not entering values for the mandatory fields. We
    also showed you that there are three ways for you to implement validation.


