    配置就从 HTTP 切换到 HTTPS。    ### 本地化    Spring Security 支持异常消息的本地化。如果你的应用程序是为英语用户设计的，则无需执行任何操作，因为默认情况下所有安全消息都是英文的。    如果你需要支持其他语言环境，你应该知道所有异常消息都可以本地化，包括与认证失败和访问被拒绝（授权失败）相关的消息。面向开发人员或系统部署人员的异常和日志消息（包括不正确的属性、接口契约违规、使用不正确的构造函数、启动时验证、调试级别日志记录）不会被本地化，而是在
    Spring Security 的代码中硬编码为英文。    资源包位于 `org/springframework/security/` 下，基本名称为 `messages.properties`，可以在我们的
