- fmt: "### Showing Validation Messages\n\nFinally, after adding validation messages\
    \ with one of the three different approaches shown so far, we must still show\
    \ them to the user. To do this, we can use the Spring MVC standard `<form:errors>`\
    \ tag to do one of two things. First, we can render the messages for a specific\
    \ path in our model. Alternatively, we can render all messages by specifying the\
    \ wildcard for the `path` attribute.\n\nIt is important to realize that messages\
    \ generated by all validation methods can be shown in this way. Whether a message\
    \ is added by bean validation, Web Flow form validation, or using the `org.springframework.binding.message.MessageContext`\
    \ in an application controller, a message will end up being shown with the `<form:errors>`\
    \ tag. At this point, we are going to refactor all our input components within\
    \ our pages to be followed with a `<form:errors path=\"<name of the form field>\"\
    />`. This will enable us to show the validation message in case the validation\
    \ fails for that field.\n\nWe will demonstrate this with the select delivery options\
    \ page (see [Listing 11-25](#Chapter11.html#list_11_25)) that can be found in\
    \ the `src/main/webapp/WEB-INF/view/createOrders/selectDeliveryOptions.jsp` page.\
    \ (The other two pages repeat the exact same process, so we won't bore you by\
    \ showing those, as well.)\n\n**Listing 11-25.** Refactoring the Select Delivery\
    \ Options Page to Show Validation Messages\n\n```\n<form:form modelAttribute=\"\
    orderForm\" action=\"${flowExecutionUrl}\">\n    <table style=\"width: 100%\"\
    >\n        <tr>\n            <td>\n                <spring:message\ncode=\"label.page.selectdeliveryoptions.select.order.date\"\
    />\n            </td>\n            <td>\n                <form:input path=\"orderDate\"\
    \ disabled=\"true\" />\n            </td>\n        </tr>\n        <tr>\n     \
    \       <td>\n                <spring:message\ncode=\"label.page.selectdeliveryoptions.select.delivery.date\"\
    \ />\n            </td>\n            <td>\n                <form:input path=\"\
    deliveryDate\" />\n<span style=\"margin-left: 5px\">\n<form:errors path=\"deliveryDate\"\
    \ cssClass=\"error\"/>\n</span>\n        …\n```\n\nIf we were to proceed without\
    \ selecting a delivery date, the error message would be shown next to the field\
    \ (see [Figure 11-6](#Chapter11.html#fig_11_6)).\n\n![Image](images/9781430241553_Fig11-06.jpg)\n\
    \n**Figure 11-6.** Showing the Validation Message When the Delivery Date is Left\
    \ Blank\n\nThe localization part of our custom error message comes from the default\
    \ resource bundle included in our application. This has been explained in the\
    \ Spring MVC chapters. For example, the key of the message shown in [Figure 11-6](#Chapter11.html#fig_11_6)\
    \ is used in the `validateDeliverydate` method of the `OrderController` class.\
    \ It is used as \"error code\" to be added to the error message that is created.\
    \ To refresh our memory, let's look at a snippet from the method that builds the\
    \ error message:\n\n```\nMessageBuilder errorMessageBuilder = new MessageBuilder().error();\n\
    errorMessageBuilder.source(\"deliveryDate\");\nerrorMessageBuilder.code(\"error.page.selectdeliveryoptions.deliverydate.required\"\
    );\n```\n\nThe message code in bold is specified in the resource bundle with base\
    \ name, `messages.properties`. The resource bundle has the code as the key and\
    \ the translation (which you can see in [Figure 11-6](#Chapter11.html#fig_11_6))\
    \ as its value.\n\n![Image](images/square.jpg) **Note** The resource bundles are\
    \ physically located in the shared project `bookstore-web-resources`. There is\
    \ one for the English language (`messages_en.properties`) and one for the Dutch\
    \ language (`messages_nl.properties`). You can change the language dynamically\
    \ by clicking the flags at the right end of the navigation bar.\n\nIn the case\
    \ of bean validation messages, there is a standard resource bundle that is loaded\
    \ by default. You can override these messages in your own resource bundle. The\
    \ default resource bundle is part of the validation API's implementation. In our\
    \ case, this is the RI (i.e., the Hibernate validator). If we were to open the\
    \ Hibernate validator JAR file, we would see the message bundles (see [Figure\
    \ 11-7](#Chapter11.html#fig_11_7)).\n\n![Image](images/9781430241553_Fig11-07.jpg)\n\
    \n**Figure 11-7.** The hibernate validator jar containing the resource bundles\n\
    \nOpening the default message bundle, `ValidationMessages.properties`, would show\
    \ the translations shown in [Listing 11-26](#Chapter11.html#list_11_26) for the\
    \ `@Min` and `@Max` annotations (which we have used on the `quantity` property\
    \ in our `com.apress.prospringmvc.bookstore.web.controller.OrderForm`).\n\n**Listing\
    \ 11-26.** The default validation API messages\n\n```\njavax.validation.constraints.Max.message=\
    \ must be less than or equal to {value}\njavax.validation.constraints.Min.message=\
    \ must be greater than or equal to {value}\n```\n\nYou can override these by specifying\
    \ your own `ValidationMessages.properties` (with or without a language/country\
    \ extension) in your application's classpath."
  raw: '##### Showing Validation Messages


    Finally, after adding validation messages with one of the three different approaches
    shown so far, we must still show them to the user. To do this, we can use the
    Spring MVC standard `<form:errors>` tag to do one of two things. First, we can
    render the messages for a specific path in our model. Alternatively, we can render
    all messages by specifying the wildcard for the `path` attribute.


    It is important to realize that messages generated by all validation methods can
    be shown in this way. Whether a message is added by bean validation, Web Flow
    form validation, or using the `org.springframework.binding.message.MessageContext`
    in an application controller, a message will end up being shown with the `<form:errors>`
    tag. At this point, we are going to refactor all our input components within our
    pages to be followed with a `<form:errors path="<name of the form field>"/>`.
    This will enable us to show the validation message in case the validation fails
    for that field.


    We will demonstrate this with the select delivery options page (see [Listing 11-25](#Chapter11.html#list_11_25))
    that can be found in the `src/main/webapp/WEB-INF/view/createOrders/selectDeliveryOptions.jsp`
    page. (The other two pages repeat the exact same process, so we won''t bore you
    by showing those, as well.)


    ***Listing 11-25.** Refactoring the Select Delivery Options Page to Show Validation
    Messages*


    `<form:form modelAttribute="orderForm" action="${flowExecutionUrl}">`

    `    <table style="width: 100%">`

    `        <tr>`

    `            <td>`

    `                <spring:message`![Image](images/U002.jpg)

    `code="label.page.selectdeliveryoptions.select.order.date"/>`

    `            </td>`

    `            <td>`

    `                <form:input path="orderDate" disabled="true" />`

    `            </td>`

    `        </tr>`

    `        <tr>`

    `            <td>`

    `                <spring:message`![Image](images/U002.jpg)

    `code="label.page.selectdeliveryoptions.select.delivery.date" />`

    `            </td>`

    `            <td>`

    `                <form:input path="deliveryDate" />`

    **`<span style="margin-left: 5px">`**

    **`<form:errors path="deliveryDate" cssClass="error"/>`**

    **`</span>`**

    `        …`


    If we were to proceed without selecting a delivery date, the error message would
    be shown next to the field (see [Figure 11-6](#Chapter11.html#fig_11_6)).


    ![Image](images/9781430241553_Fig11-06.jpg)


    ***Figure 11-6.** Showing the Validation Message When the Delivery Date is Left
    Blank*


    The localization part of our custom error message comes from the default resource
    bundle included in our application. This has been explained in the Spring MVC
    chapters. For example, the key of the message shown in [Figure 11-6](#Chapter11.html#fig_11_6)
    is used in the `validateDeliverydate` method of the `OrderController` class. It
    is used as “error code" to be added to the error message that is created. To refresh
    our memory, let''s look at a snippet from the method that builds the error message:


    `MessageBuilder errorMessageBuilder = new MessageBuilder().error();`

    `errorMessageBuilder.source("deliveryDate");`

    `errorMessageBuilder.code("`**`error.page.selectdeliveryoptions.deliverydate.required"`**`);`


    The message code in bold is specified in the resource bundle with base name, `messages.properties`.
    The resource bundle has the code as the key and the translation (which you can
    see in [Figure 11-6](#Chapter11.html#fig_11_6)) as its value.


    ![Image](images/square.jpg)  **Note** The resource bundles are physically located
    in the shared project bookstore-web-resources. There is one for the English language
    (`messages_en.properties`) and one for the Dutch language (`messages_nl.properties`).
    You can change the language dynamically by clicking the flags at the right end
    of the navigation bar.


    In the case of bean validation messages, there is a standard resource bundle that
    is loaded by default. You can override these messages in your own resource bundle.
    The default resource bundle is part of the validation API''s implementation. In
    our case, this is the RI (i.e., the Hibernate validator). If we were to open the
    Hibernate validator JAR file, we would see the message bundles (see [Figure 11-7](#Chapter11.html#fig_11_7)).


    ![Image](images/9781430241553_Fig11-07.jpg)


    ***Figure 11-7.** The hibernate validator jar containing the resource bundles*


    Opening the default message bundle, `ValidationMessages.properties`, would show
    the translations shown in [Listing 11-26](#Chapter11.html#list_11_26) for the
    `@Min` and `@Max` annotations (which we have used on the `quantity` property in
    our `com.apress.prospringmvc.bookstore.web.controller.OrderForm`).


    ***Listing 11-26.** The default validation API messages*


    `javax.validation.constraints.Max.message= must be less than or equal to {value}`

    `javax.validation.constraints.Min.message= must be greater than or equal to {value}`


    You can override these by specifying your own `ValidationMessages.properties`
    (with or without a language/country extension) in your application''s classpath.'
