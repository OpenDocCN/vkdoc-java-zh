    #### 将商品添加到购物车


    在本节中，我们将迈出第一步，真正让网站访客能够从我们的书店购买图书。具体来说，我们将实现允许将图书添加到购物车的逻辑。为此，我们首先需要定义一个会话作用域的
    `Cart` Bean。


    清单 6-1 展示了如何定义一个具有 `session` 作用域的 Bean（即我们的购物车）。这个 Bean 可以像框架中的其他任何 Bean 一样被注入到其他
    Bean 中。Spring 将负责管理 Bean 生命周期的复杂性。Bean 的生命周期取决于其作用域（参见表 6-1）。例如，一个 `singleton`
    作用域的 Bean（默认情况）与应用程序上下文的生命周期绑定，而一个 `session` 作用域的 Bean 则与 `javax.servlet.http.HttpSession`
    对象的生命周期绑定。


    ***清单 6-1.** 购物车会话作用域 Bean*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `//其他导入已省略`


    `import org.springframework.context.annotation.Scope;`

    `import org.springframework.context.annotation.ScopedProxyMode;`

    `import com.apress.prospringmvc.bookstore.domain.Cart;`


    `@Configuration`

    `@EnableWebMvc`

    `@ComponentScan(basePackages = { "com.apress.prospringmvc.bookstore.web" })`

    `public class WebMvcContextConfiguration extends WebMvcConfigurerAdapter {`


    `    //其他方法已省略`

    `    @Bean`

    **`@Scope(value = "session", proxyMode = ScopedProxyMode.TARGET_CLASS)`**

    `    public Cart cart() {`

    `        return new Cart();`

    `    }`


    `}`


    在这个例子中，我们使用注解声明了一个 Bean，并使用了 `session` 作用域。我们希望使用基于类的代理（`com.apress.prospringmvc.bookstore.domain.Cart`
    没有实现接口，因此我们需要基于类的代理）。现在，我们可以简单地将这个 Bean 注入到其他 Bean 中，并像使用其他任何 Bean 一样使用它。让我们创建一个使用此
    Bean 的控制器，即 `com.apress.prospringmvc.bookstore.web.controller.CartController`（参见清单
    6-2）。


    ![Image](img/square.jpg) **注意** 为了能够使用基于类的代理，Spring 需要一个名为 CGLIB 的额外库。^(1)


    ________________


    ¹ [`http://cglib.sourceforge.net/`](http://cglib.sourceforge.net/)


    ***清单 6-2.** CartController Bean*


    `package com.apress.prospringmvc.bookstore.web.controller;`


    `import org.slf4j.Logger;`

    `import org.slf4j.LoggerFactory;`

    `import org.springframework.beans.factory.annotation.Autowired;`

    `import org.springframework.stereotype.Controller;`

    `import org.springframework.web.bind.annotation.PathVariable;`

    `import org.springframework.web.bind.annotation.RequestHeader;`

    `import org.springframework.web.bind.annotation.RequestMapping;`


    `import com.apress.prospringmvc.bookstore.domain.Book;`

    `import com.apress.prospringmvc.bookstore.domain.Cart;`

    `import com.apress.prospringmvc.bookstore.service.BookstoreService;`


    `@Controller`

    `public class CartController {`


    `    private Logger logger = LoggerFactory.`*`getLogger`*`(CartController.class);`


    **`@Autowired`**

    **`private Cart cart;`**


    `    @Autowired`

    `    private BookstoreService bookstoreService;`


    `    @RequestMapping("/cart/add/{bookId}")`

    `    public String addToCart(@PathVariable("bookId") long bookId,`

    `                            @RequestHeader("referer") String referer) {`

    `        Book book = this.bookstoreService.findBook(bookId);`

    `        this.cart.addBook(book);`

    `        this.logger.info("Cart: {}", this.cart);`

    `        return "redirect:" + referer;`

    `    }`


    `}`


    在这个例子中，我们简单地自动装配了 `session` 作用域的 Bean `cart`，就像我们对其他任何 Bean 所做的那样。`addToCart`
    方法包含了将图书添加到购物车的逻辑。添加图书后，我们会重定向到我们之前所在的页面（`referer` 请求头）。


    这个控制器映射到了 URL `/cart/add/{bookId}`；但是，目前没有任何东西会调用我们的控制器，因为我们没有任何指向该 URL 的内容。让我们修改图书搜索页面并添加一个链接，这样我们就可以将图书添加到购物车中（参见清单
    6-3）。以粗体突出显示的部分展示了所做的更改。


    ***清单 6-3.** 带有“添加到购物车”链接的图书搜索页面*


    `<%@ taglib prefix="c" uri="http://java.sun.com/jsp/jstl/core"%>`

