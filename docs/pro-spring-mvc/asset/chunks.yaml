    the restart.    #### How Does It Work?    You may wonder how it is possible that
    we’re able to save our data in a MySQL database, since we never did configure
    another datasource in our application. In fact, all we did was tell Cloud Foundry
    that we wanted to use MySQL as an application service. We never changed our datasource
    configuration in the `com.apress.prospringmvc.bookstore.config.InfrastructureContextConfiguration`
    class, and yet we still seem to be able to connect to MySQL on Cloud Foundry.    The
    magic behind this is explained by what Spring calls *auto-reconfiguration* (see
    the blog post at the Spring blog^([8](#Appendix.html#APP-A-FN-8)) for more information).    Remember
    how we had a choice of application type when deploying? We chose Spring and that
    enabled Cloud Foundry and Spring to do their magic. What happens is that, during
    the deployment process, additional configuration is added to your `web.xml` that
    registers some extra Spring beans into your `ApplicationContext`. (This was exactly
    the reason why we needed to use XML config, as explained previously.) One of those
    beans is an `org.cloudfoundry.reconfiguration.CloudAutoStagingBeanFactoryPostProcessor`^([9](#Appendix.html#APP-A-FN-9))
    that will look for beans representing services (e.g., instances of `javax.sql.DataSource`,
    `org.springframework.data.mongodb.MongoDBDFactory`, and so forth) that can be
    replaced by other cloud-aware beans that know about the application services that
    are bound to your application.    But what about the Hibernate dialect? Before
    we were using H2, and now we’re using MySQL—yet we didn’t have to tell Hibernate
    anything about this. As it turns out, recent Hibernate versions have a handy feature
    that can detect the type of database from an actual connection, so there is no
    longer a need to explicitly configure the dialect to use.    ![Image](images/square.jpg)
    **Note**  This has its disadvantages: if your database isn’t up or reachable up
    while your application is booting, Hibernate will fail at runtime.    #### Other
    Configuration Options    Auto-reconfiguration isn’t the only way to have your
    application configured. One of the other, more explicit possibilities is to use
    the cloud configuration namespace. Using that namespace, we could have configured
    a datasource in XML, as shown in [Listing A-7](#Appendix.html#list_A_7).    __________________    ⁸
    [`http://blog.springsource.org/2011/11/04/using-cloud-foundry-services-with-spring-part-2-autoreconfiguration/`](http://blog.springsource.org/2011/11/04/using-cloud-foundry-services-with-spring-part-2-autoreconfiguration/)    ⁹
    [`https://github.com/cloudfoundry/vcap-java/tree/master/auto-reconfiguration/src/main/java/org/cloudfoundry/reconfiguration`](https://github.com/cloudfoundry/vcap-java/tree/master/auto-reconfiguration/src/main/java/org/cloudfoundry/reconfiguration)    ***Listing
    A-7.** Using the cloud namespace*  `<?xml version="1.0" encoding="UTF-8"?>` `<beans`    `      
    xsi:schemaLocation="http://www.springframework.org/schema/beans` `         http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`
    `         http://www.springframework.org/schema/context` `         http://www.springframework.org/schema/context/spring-context-3.1.xsd`
    `         http://schema.cloudfoundry.org/spring` `         http://schema.cloudfoundry.org/spring/cloudfoundry-spring-0.8.xsd"`
    `profile="cloud">`  `    <cloud:data-source id="dataSource" />` `</beans>`  Setting
    the `profile="cloud"` attribute on the beans element means that the beans defined
    within the element will only be used if the “cloud” profile is active. The `cloud:datasource`
    element is a “normal” datasource that represents the relational database application
    service that was bound to this application.    Combine this with the fact that
    Cloud Foundry automatically sets *cloud* as the active application profile, and
    we can have cloud-specific configuration using that profile. This type of explicit
    configuration is even required if we want to use more than one cloud service of
    the same type (e.g., a MySQL and PostgreSQL service) at the same time.    If we
    don’t want Spring to use auto-reconfiguration, we can always use the *war* application
    type. Our application will not get touched in any way if we deploy using that
    type.    #### Deploying Locally    So far, we’ve deployed to the actual cloud
    infrastructure on cloudfoundry.com, hosted by VMWare. But CloudFoundry.com offers
    another solution, one that doesn’t require us to always connect to a remote system.
    It’s called *MicroCloud*, and it is distributed as a virtual machine (a VMWare
    image) that we can run locally (such as on the free VMWare player).    You can
    download MicroCloud from [`https://my.cloudfoundry.com/micro`](https://my.cloudfoundry.com/micro)
    (a valid CloudFoundry.com account is required to download it). On the same site,
    you can also find instructions on how to configure your MicroCloud. Once that
    is done, the deployment process is exactly the same as deploying on CloudFoundry.com;
    you only use a different target.    ### Debugging with Cloud Foundry    Things
    don’t always go as planned, and there will be times when you will need to debug
    your application.    While you can always debug your application when deploying
    on your own Tomcat instance, MicroCloud also supports connecting with a Java debugger.
    To do so, you can start your application using the Debug button instead your Start
    button. Once the application is started in debug mode, you can debug it just like
    any other application started locally.    Another way to find out what’s going
    on while running in the cloud is to take advantage of the log files. You can access
    them in STS using the Remote Systems view, which you can find using Window ![Image](images/U003.jpg)
    Show View ![Image](images/U003.jpg) Other... and then searching for remote systems.
    You can navigate the remote directory structure and download log files to look
    at their contents (see [Figure A-12](#Appendix.html#fig_A_12)).  ![Image](images/9781430241553_App-12.jpg)  ***Figure
    A-12.** The remote systems view*    If you want remote access to your services
    (e.g., you want to inspect the current data), Cloud Foundry provides the Caldecott
    gem that allows you to create a tunnel^([10](#Appendix.html#APP-A-FN-10)) to them.
    For example, you can use a command like `vmc tunnel mysql --port 12345` to tunnel
    to your remote MySQL on local port 12345\. Now it’s only a matter of pointing
    your MySQL or JDBC client to that port to get to the data. You can find more info
    on Caldecott at [`http://blog.cloudfoundry.com/post/12928974099/now-you-can-tunnel-into-any-cloud-foundry-data-service`](http://blog.cloudfoundry.com/post/12928974099/now-you-can-tunnel-into-any-cloud-foundry-data-service).    __________________    ^(10)
    [`http://bit.ly/akrcc1`](http://bit.ly/akrcc1)    ### Summary    This appendix
    covered Cloud Foundry and how you can deploy your application on it.    There
    are a few things that separate Cloud Foundry from competing PaaS providers: one
    is the open source nature of Cloud Foundry, and another is its excellent integration
    with the Spring framework. While Cloud Foundry promises a seamless deployment
    model for most apps, which allows you to deploy your application as-is, you had
    to make some adjustments in the case of the bookstore application. These adjustments
    were required mostly because you are using a newer Tomcat version than the one
    you currently get with Cloud Foundry.    Cloud Foundry is currently still in beta,
    so it is rapidly evolving, with new features and services still being added. And
    while you may still run into some rough edges now and then, it is definitely worth
    keeping an eye on it to see how it evolves in the future.    ## Index    ### ![Image](images/square.jpg)
