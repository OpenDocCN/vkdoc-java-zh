    ### 视图技术


    Spring MVC 支持多种不同的技术，如果某项技术未得到原生支持，你通常可以通过实现 `org.springframework.web.servlet.view.View`
    接口或扩展某个已提供的 `View` 类来自行添加支持。本节将讨论几种视图技术，并介绍 Spring MVC 如何为它们提供支持。其中一些技术得到了广泛支持，而另一些则支持较少。图
    8-3 展示了 `View` 类的层次结构，从中我们可以看到部分受支持的视图技术。对于某些技术，我们需要指定特定的 `ViewResolver` 才能工作，而其他技术则能与已配置的视图解析器协同工作。


    ![Image](img/9781430241553_Fig08-03.jpg)


    ***图 8-3.** 视图层次结构*


    本节接下来的部分将简要介绍一些受支持的视图技术，展示其支持类以及如何配置 Spring 以使用这些特定技术。这里不会深入介绍所有受支持的视图技术；对于此处提到的大多数技术，都有专门的书籍可供参考。


    ![Image](img/square.jpg) **注意** 在本节的大多数示例中，`TilesViewResolver` 的 order 值被设置为 2。这是为了确保它在正确的时机执行，尤其是在使用
    `ContentNegotiatingViewResolver` 时，后者应在 `TilesViewResolver` 之前执行（这是默认行为）。


    #### Java Server Pages


    到目前为止，我们一直在应用程序中使用 Java Server Pages。Spring 对其提供了出色的支持，包括其自身的标签库（参见第 5 章和第 6 章）。Spring
    提供了支持类和集成类，通常与 `org.springframework.web.servlet.view.InternalResourceViewResolver`
    配合使用，以启用 JSTL 支持，并与 Sun 提供的默认格式化和函数库集成。


    #### JavaServer Faces


    总体而言，Spring MVC 对 JavaServer Faces (JSF) 的支持非常有限。如果你想使用 JSF，建议将 Spring Web Flow
    与 JSF 结合作为视图层；这种方法能提供丰富的开发环境。Spring 对 JSF 的支持主要体现在我们可以重用应用上下文中的 bean。我们通过定义一个自定义的
    `javax.faces.el.VariableResolver`（JSF 1.1）或 `javax.el.ELResolver`（JSF 1.2+）来实现这一点，以便在
    JSF 环境中访问 Spring bean。


    将 Spring 集成到 JSF 环境中最简单的方法是配置 `org.springframework.web.jsf.DelegatingVariableResolver`，它会在所使用的
    JSF 实现的默认解析器中进行查找。如果某个名称无法解析，该解析器会委托给根应用上下文进行查找。这使得我们可以在 JSF 中重用服务和其他通用组件。清单 8-11
    展示了应用程序中 JSF 部分的配置。该配置位于 `faces-context.xml` 文件中。


    ***清单 8-11.** DelegatingVariableResolver 示例配置 (faces-context.xml)*


    `<faces-config>`

    `    <application>`

    `        <variable-resolver>`

    `        org.springframework.web.jsf.DelegatingVariableResolver`

    `        </variable-resolver>`

    `    </application>`

    `</faces-config>`


    此外，还有 `org.springframework.web.jsf.SpringBeanVariableResolver`，其工作方式类似；不过，它会首先查询根应用上下文，然后再查询
    JSF 实现的默认解析器。当在 JSF 中使用来自应用上下文的限定作用域 bean 时，这非常有用。


    对于 JSF 1.2+ 环境，我们还可以配置 `org.springframework.web.jsf.el.SpringBeanFacesELResolver`，它首先在根应用上下文中进行查找，然后在所使用的
    JSF 实现的默认解析器中查找。清单 8-12 展示了此 bean 的示例配置。


    ***清单 8-12.** SpringBeanFacesELResolver 示例配置 (faces-context.xml)*


    `<faces-config>`

    `    <application>`

    `        <el-resolver>`

    `        org.springframework.web.jsf.el.SpringBeanFacesELResolver`

    `        </el-resolver>`

    `    </application>`

    `</faces-config>`


    如果我们有一些自定义的 JSF 组件，并且需要访问当前的应用上下文，可以使用 `org.springframework.web.jsf.FacesContextUtils`。这个工具类提供了两个便捷方法，用于获取应用上下文并从中检索
    bean，进而可以在自定义组件中使用这些 bean。


    #### Tiles


    Apache Tiles^(2) 是一个强大的页面组合框架，它允许你使用不同的页面组件（即 *tiles*）来组合页面。这些页面组件可以被重用，并配置到不同的页面布局中。最初，它是作为
    JSP 组合框架设计的；然而，它也可以用于组合基于 Velocity 和 Freemarker 的视图。


    要开始使用 Tiles，我们必须为其配置并引导引擎。接下来，我们还需要配置视图解析器，使其能够返回基于 Tiles 的视图。最后，我们需要指定页面组合方式并添加不同的模板（tiles）。


    我们需要将 `org.springframework.web.servlet.view.tiles2.TilesConfigurer` 添加到配置中。除此之外，我们还需要专门的
    `org.springframework.web.servlet.view.tiles2.TilesViewResolver`。最后，我们还需要指定页面组合方式并添加模板。


    ##### 配置 Tiles


    在开始使用 Tiles 支持之前，我们需要引导 Tiles。为此，Spring 提供了 `org.springframework.web.servlet.view.tiles2.TilesConfigurer`
    类。接下来，我们还需要配置一个视图解析器来与 Tiles 协同工作，为此我们可以使用 `org.springframework.web.servlet.view.tiles2.TilesViewResolver`。清单
    8-13 展示了 Tiles 最基本的配置。


    ***清单 8-13.** Tiles 的视图配置*


    `package com.apress.prospringmvc.bookstore.web.config;`


    `// 其他导入已省略`

    `import org.springframework.web.servlet.view.tiles2.TilesConfigurer;`

    `import org.springframework.web.servlet.view.tiles2.TilesViewResolver;`


    `@Configuration`

    `public class ViewConfiguration {`


    `    @Bean`

    `    public TilesConfigurer tilesConfigurer() {`

    `        return new TilesConfigurer();`

    `    }`


    `    @Bean`

    `    public TilesViewResolver tilesViewResolver() {`

    `        TilesViewResolver tilesViewResolver = new TilesViewResolver();`

    `        tilesViewResolver.setOrder(2);`

    `        return tilesViewResolver;`

    `    }`

    `}`


    _________


    ² [`http://tiles.apache.org/`](http://tiles.apache.org/)


    默认情况下，`TilesConfigurer` 会从 WEB-INF 目录加载一个名为 `tiles.xml` 的文件；该文件包含页面定义。在查看定义文件之前，让我们先看看
    表 8-6 中配置器的属性。


    ![Image](img/9781430241553_tab08-06.jpg)


    `TilesViewResolver` 没有需要设置的额外属性；它具有与 `UrlBasedViewResolver` 相同的属性集。它是一个便捷的子类，会自动配置要返回的正确视图类型。对于
    Tiles，我们需要创建 `org.springframework.web.servlet.view.tiles2.TilesView` 的实例。

