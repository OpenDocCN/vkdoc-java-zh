- fmt: "# Overview\n\nBefore closing our first refactoring, we want to summarize the\
    \ different things we have done so far. This will give you a complete code overview\
    \ of our flow and the involved `OrderController` and `OrderForm`.\n\nWe started\
    \ out by loading our categories and books using the `<on-render>` action. Next,\
    \ we replaced the book and category references in our form with the real entity\
    \ object. In order for this to work, we had to create and register two custom\
    \ converters. Finally, we added validation to our flow, so that it is no longer\
    \ possible to trigger application errors by not entering values for the mandatory\
    \ fields. We also showed you that there are three ways for you to implement validation.\n\
    \n[Listing 11-27](#Chapter11.html#list_11_27) shows our `createOrders-flow` thus\
    \ far; this can be found in `src/main/webapp/WEB-INF/view/createOrders/createOrders-flow.xml`.\n\
    \n**Listing 11-27.** The createOrders-flow file After Our First Refactoring\n\n\
    ```\n<on-start>\n    <evaluate expression=\"orderController.initializeForm()\"\
    \n     result=\"flowScope.orderForm\"/>\n</on-start>\n<view-state id=\"selectCategory\"\
    \ view=\"selectCategory\" model=\"orderForm\">\n    <on-render>\n        <evaluate\n\
    \            expression=\"orderController.initializeSelectableCategories()\"\n\
    \            result=\"requestScope.selectableCategories\"/>\n    </on-render>\n\
    \    <transition on=\"next\" to=\"selectBooks\"/>\n    <transition on=\"cancel\"\
    \ to=\"end\" />\n</view-state>\n<view-state id=\"selectBooks\" view=\"selectBooks\"\
