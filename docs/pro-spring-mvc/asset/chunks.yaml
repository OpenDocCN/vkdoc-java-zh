    ### 安全简介


    在开始讨论 Spring Security 能为你做什么以及我们如何应用它来保护应用程序之前，我们首先需要对安全性做一些介绍。重要的是，我们首先要设定 Spring
    Security 将运行的环境。在本节的第一部分，我们将概述应用程序安全，这是我们即将处理的安全类型。接下来，我们将探讨一些通用的安全原则和术语，这些对于理解本章的其余内容至关重要。


    最后，我们将对本节涵盖的主题进行更详细的总结，以便你确切了解后续内容。为了尽可能全面，我们将涉及 Spring Security 的不同方面。


    #### 什么是应用程序安全？


    从宏观角度来看，应用程序安全就是控制对应用程序功能的访问。例如，在我们的书店中，每个用户都应该能够查看我们正在销售的书籍。但并非每个用户都应该能够在未满足某些条件（例如创建账户并登录）的情况下创建订单。如果我们决定进一步扩展书店，增加一些类似
    CMS 的功能，比如编辑或向系统添加新书，那么我们希望只有特定用户才能进行修改。通过应用程序级别的安全，你将能够指定应用程序中的哪些资源受到限制，哪些资源是公开可用的。对于受限资源，你还可以进一步区分；能够访问受限功能
    A 的用户，可能不被允许访问受限功能 B。


    根据应用程序的上下文，这套规则可能从非常复杂到不存在。在前一种情况下，你可能需要详细的角色、复杂的认证机制等；而在后一种情况下，你可能正在构建一个只有只读内容且对所有人公开的网站，那么应用程序安全可能就不是你关心的问题了。


    ![图片](img/square.jpg) **注意** 正如本章引言所述，安全跨越多个层面，而不仅仅是你的应用程序层。这就是为什么这里明确讨论的是“应用程序安全”。无论你的应用程序需要何种级别的应用程序安全，应用程序所处的环境都需要是安全的。你不应害怕向你的网络或基础设施团队询问他们正在采取哪些措施来确保应用程序所在环境的安全。你可能已经熟悉的一个表述很好地总结了这一点：“你的安全性取决于其最薄弱的环节。”


    #### 通用安全原则


    我们将从介绍一些通用安全原则开始，这些原则在你开始保护应用程序时将变得非常重要：


    > *   **标识：** 根据特定身份（例如用户名、令牌或证书）来识别用户。

    > *   **认证：** 验证所提供身份的过程。对于用户名而言，这就像检查提供的密码一样简单。

    > *   **授权：** 确定经过认证的用户被允许使用哪些功能的过程。


    如果你需要提供应用程序安全，首先必须考虑如何*标识*你的用户。标识将允许你识别想要访问受保护资源的用户。这是应用安全的第一步。标识可以很简单，比如一个用户名。它也可以是一个令牌，甚至是颁发给个人或组织的
    x.509 证书。


    接下来，你必须验证用户提供的身份。这个验证身份的过程称为*认证*：检查标识的真实性。


    对于用户名，真实性可以通过要求输入密码并将输入内容与该用户存储的密码进行比较来验证。


    最后，如果用户的身份通过认证，该用户就被允许访问应用程序的受限区域。此时，你可能希望对经过认证的用户进行区分。换句话说，你希望给予经过认证的用户某些特权。假设你有一个网络商店。在订购商品之前，用户必须经过认证，因为你希望知道谁下了哪个订单，你需要访问送货/联系地址，或者可能需要访问存储的支付凭证（如信用卡号）。然而，很明显，一个作为应用程序用户通过认证的普通客户不应该被允许添加或更改产品。允许或禁止经过认证的用户使用某些功能称为*授权*。


    Spring Security 将特别关注认证和授权部分。同时请注意，认证方法在某种程度上与用户必须提供的标识类型相关。

    '
- fmt: '#### What We Will Cover


    `Spring Security`（原名`Acegi Security`）已成为保护应用程序安全的重要组件。`Spring Security`通过提供认证和授权方案，特别有助于保护您的应用程序。它帮助您集成多种认证系统，例如简单的数据库、目录服务（提供`LDAP`接口，用于访问如`OpenLDAP`或`Active
    Directory`等）。同时，它还能帮助您管理授权。本章将介绍如何指导`Spring Security`同时处理认证和授权部分。


    ![Image](images/square.jpg) **注意** `Spring Security`通常具有较低的侵入性。这允许我们在应用程序实现的较后阶段添加安全性。虽然需要进行一些重构，但通常非常少。这也是我们将本章放在最后的原因之一。


    我们将首先让您熟悉基本的安全配置。我们将配置`Spring Security`，使进入应用程序的每个请求都通过安全配置。我们将看到，此配置基于一种过滤器机制，请求在到达所请求的资源之前必须经过该机制。我们还将向您展示定义哪些资源需要保护、哪些资源可以保持公开（如登录页面、图片等资源）是多么简单。


    对于认证部分，我们将使用用户名和密码。我们将使用一个登录表单，其中包含典型的用户名和密码字段。除了创建页面（包含登录表单）本身之外，我们将看到只需要一些`XML`配置即可让`Spring
    Security`处理此问题。（相比之下，在前面的章节中，我们编写了自己的认证机制。）为简单起见，此时的认证将基于基本的内存数据存储。稍后我们将看到如何轻松地将其更改为数据库存储。


    在使用`Web Flow`的应用程序中，很可能大量的应用程序控制器逻辑和视图选择已迁移到流程中。`Web Flow`支持直接保护流程。我们将看到如何将`Web
    Flow`集成到安全机制中，使您的应用程序从上到下都是安全的。


    配置认证后，我们将看到如何进一步保护登录和订单流程。在此之前，所有数据都通过纯`HTTP`传输。我们将看到添加传输安全性只是配置问题。


    接下来，我们还将讨论本地化。`Spring Security`支持异常消息的本地化，默认情况下为英语。我们将看到需要配置什么以支持其他区域设置。


    我们还将通过实现基于角色的访问模型来扩展安全性。这将为您的用户授予权限，您以后可以在需要访问给定资源时使用这些权限检查授权。


    `Spring Security`的授权可以通过编程方式（通过代码）或声明方式应用。声明式方法允许您使用元数据（以注解、表达式或`XML`的形式）来断言授权。我们将介绍`Spring
    Security`的授权如何应用于以下元素：


    > *   视图：能够显示哪些组件对给定用户可见

    > *   控制器

    > *   `Web Flow`流程

    > *   服务层


    我们将涵盖声明式安全（使用注解）和编程式安全，并详细展示如何在视图、应用程序控制器和流程中应用它们。最后，我们将介绍如何在`JSP`页面中使用`Spring
    Security`标签库。


    ![Image](images/square.jpg) **注意** 供您参考，`Spring Security`也可以以相同的声明方式应用于后端（主要是服务），就像应用于应用程序控制器一样。但是，本章不涉及后端的`Spring
    Security`。'
  raw: '#### What We Will Cover


    Spring Security, (formerly known as Acegi Security), has become a very important
    piece in the puzzle if you want to secure your application. Spring Security will
    especially help to secure your application by offering authentication and authorization
    schemes. It will help you provide integration with many authentication systems,
    such as a simple database, directory services (offering an LDAP interface, for
    accessing, for example, open LDAP or Active Directory). But it will also help
    you manage authorization. This chapter will cover how you can instruct Spring
    Security to take care of both the authentication and the authorization parts.


    ![Image](images/square.jpg) **Note** Spring Security has generally seen a low
    intrusion level. This allows us to add security in the more final stages of our
    application implementation. Although some refactoring will be required, it will
    normally be very minimal. This is one of the reasons we kept this chapter as last.


    We will start by making you familiar with the basic security configuration. We
    will configure Spring Security so that every request that goes into our application
    passes the security configuration. We will see that this configuration is based
    on a filter mechanism through which a request has to pass before it is received
    by the requested resource. We will also show you how easy it is to define which
    resources need to be protected and which can still be left publicly available
    (our login page, resources such as images, and so on).


    For the authentication part we will be using username and password. We will use
    a login form, which will include the typical username and password fields. Besides
    creating the page (containing the login form) itself, we will see that we only
    need some XML configuration to let Spring Security handle this. (By contrast,
    in the previous chapters we coded our own authentication mechanism.) To keep things
    simple, the authentication will at this point be backed by a basic in-memory data
    store. Later we will see how can easily change this to a database store.


    In applications using Web Flow, it’s likely that a lot of your application controller
    logic and view selection has been moved into flows. Web Flow has support for securing
    flows directly. We will see how we can plug Web Flow into the security mechanism
    so that your application is secure from top to bottom.


    After we configure the authentication, we will see how we can further secure the
    login and order process. Until we do that, all data is transmitted over plain
    HTTP. We will see that adding transport security is just a matter of configuration.


    Next we will also look at localization. Spring Security supports localization
    of exception messages, which are by default in the English language. We will see
    what you should configure in order to support other locales.


    We will also extend the security by implementing a role-based access model. This
    will grant rights to your users that you can later use to check authorization
    when requiring access to a given resource.


    Authorization with Spring Security can be applied programmatically, by means of
    code, or declaratively. The declarative method will allow you to assert authorization
    using metadata in the form of annotations, expressions, or XML. We will cover
    how Spring Security’s authorization can be applied in the following elements:


    > *   Views, to be able to show which component is visible or for a given user

    > *   Controllers

    > *   Web Flow flows

    > *   Service layer


    We will cover both declarative security (using annotations) and programmatic security
    and show in detail how to apply them both in your views, application controllers,
    and flows. Finally we will introduce using the Spring Security Tag libraries in
    your JSP pages.


    ![Image](images/square.jpg) **Note** For your information, Spring Security can
    also be applied in the same declarative way on your back-end (mostly on the services)
    as it is for your application controllers. However, Spring Security in the back-end
    will not be covered in this chapter.'
