  raw: '##### PathVariable


    The `PathVariable` annotation can be used in conjunction with path variables.
    Path variables can be used in a URL pattern to bind the URL to a variable. Path
    variables are denoted as `{`*`name`*`}`in our URL mapping. If we were to use a
    URL mapping of `/book/{isbn}/image`, then `isbn` would be available as a path
    variable.


    ![Image](images/tab_5_10.jpg)


    ##### CookieValue


    This `CookieValue` annotation can be placed on any argument in the request-handling
    method. When present, it is used to retrieve a cookie. When placed on an argument
    of type `javax.servlet.http.Cookie`, we get the complete cookie. Otherwise, the
    value of the cookie is converted into the argument type.


    ![Image](images/tab_5_11.jpg)


    #### Supported Method Return Values


    In addition to all the different method argument types, a request handling method
    can also have one of several different return values. [Table 5-12](#Chapter05.html#tab_5_12)
    lists the default supported and handling of method return values for request handling
    methods.


    ![Image](images/tab_5_12.jpg)


    ![Image](images/tab_5_12a.jpg)


    When an arbitrary object is returned and there is no `ModelAttribute` annotation
    present, the framework tries to determine a name to use as the name for the object
    in the model. It basically takes the simple name of the class (the classname without
    the package) and lowercases the first letter. For example, the name of our `com.apress.prospringmvc.bookstore.domain.Book`
    becomes `book`. When the return type is a collection or array, it becomes the
    simple name of the class, suffixed with `List`. Thus a collection of `Book` objects
    becomes `bookList`.


    This same logic is applied when we use a `Model` or `ModelMap` to add objects
    without an explicit name. This also has the advantage of using the specific objects,
    instead of a plain `Map` to gain access to the underlying implicit model.


    Although the list of supported return values is already quite extensive, we can
    use the flexibility and extensibility of the framework to create our own handler.
    The method’s return values are handled by an implementation of the `org.springframework.web.method.support.HandlerMethodReturnValueHandler`
    interface (see [Listing 5-8](#Chapter05.html#list_5_8)).


    ***Listing 5-8.** The HandlerMethodReturnValueHandler Interface*


    `package org.springframework.web.method.support;`


    `import org.springframework.core.MethodParameter;`

    `import org.springframework.web.context.request.NativeWebRequest;`


    `public interface HandlerMethodReturnValueHandler {`


    `    boolean supportsReturnType(MethodParameter returnType);`


    `    void handleReturnValue(Object returnValue,`

    `                           MethodParameter returnType,`

    `                           ModelAndViewContainer mavContainer,`

    `                           NativeWebRequest webRequest) throws Exception;`

    `}`


    ### Writing Annotation-based Controllers


    Let’s take some of the theory we’ve developed thus far and apply it to our controllers.
    For example, all the menu options we have on our page lead to a 404 error, which
    indicates that the page cannot be found.


    In this section, we are going to add some controllers and views to our application.
    We will start by creating a simple login controller operating with the request
    and request parameters. Next, we will add a book search page that uses an object.
    And finally, we will conclude by building a controller that retrieves and shows
    the details of a book.


    #### A Simple Login Controller


    Before we can start writing our controller, we need to have a login page. In the
    `WEB-INF/views` directory, we create a file named `login.jsp`. The resulting structure
    should look like the one shown in [Figure 5-2](#Chapter05.html#fig_5_2).


    ![Image](images/9781430241553_Fig05-02.jpg)


    ***Figure 5-2.** The directory structure after adding login.jsp*


    The login page needs some content, as shown in [Listing 5-9](#Chapter05.html#list_5_9).


    ***Listing 5-9.** The login page, Login.jsp*


    `<%@taglib prefix="c" uri="http://java.sun.com/jsp/jstl/core"%>`

    `<%@taglib prefix="spring" uri="http://www.springframework.org/tags" %>`


    `<c:if test="${exception ne null}">`

    `    <div class="error">${exception.message}</div>`

    `</c:if>`

    `<form action="<c:url value="/login"/>" method="post">`

    `    <fieldset>`

    `        <legend>Login</legend>`

    `        <table>`

    `        <tr>`

    `            <td>Username</td>`

    `            <td>`

    `                <input type="text" id="username" name="username"`

    `                        placeholder="Usename"/></td>`

    `        </tr>`

    `        <tr>`

    `            <td>Password</td>`

    `            <td>`

    `                <input type="password" id="password" name="password"`

    `                       placeholder="Password"/></td>`

    `        </tr>`

    `        <tr><td colspan="2" align="center">`

    `            <button id="login">Login</button>`

    `        </td></tr>`

    `        </table>`

    `    </fieldset>`

