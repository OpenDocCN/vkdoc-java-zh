    7 上运行，该怎么办？    ##### Spring Security 配置    我们还没有完成更改。由于在第 13 章中启用了 Spring Security
    中的 SSL，Spring Security 现在会在检测到我们通过 HTTP 连接时，将我们重定向到 HTTPS 连接。Cloud Foundry 支持
    SSL，但在我们的应用程序前面有一个代理。此代理将终止 SSL 连接。但是，代理和运行我们应用程序的 Cloud Foundry Tomcat 实例之间的连接是普通的
    HTTP。图 A-2 有点简化，但它足够接近从开发者的角度说明情况。  ![Image](img/9781430241553_App-02.jpg)  ***图
    A-2.** 代理后面的应用程序*    在到达我们的应用程序之前，代理会添加一些标头，这些标头是处理 SSL 连接的结果。它将告诉我们使用了哪个密码，以及如果执行双向
    SSL，则客户端证书。如果我们只使用“普通”SSL 而没有客户端证书，最后一个标头也会存在，但其值将为“无值”。    然而，Spring Security
    通过调用 `(Http)ServletRequest` 上的 `isSecure()` 来检测 SSL 连接。这将返回 `false`，因为代理和应用程序之间的连接类型是
    HTTP。然后 Spring Security 将向浏览器发送一个重定向，要求切换到 SSL，这将导致无限循环。    解决方法是使用自定义过滤器包装 `(Http)ServletRequest`。我们将重写
    `isSecure()` 方法，以便在考虑连接是否安全时也检查 HTTP 标头。如果原始实现决定连接不安全，那么我们将检查 Cloud Foundry 代理添加的这些特定
    SSL 标头是否存在，然后做出最终决定。清单 A-5 显示了过滤器代码，它除了使用包装的 `(Http)ServletRequest` 调用 `chain.doFilter`
    之外，什么也不做。对我们来说更有趣的部分是包含的 `CloudFoundryHttpServletRequestWrapper` 静态类，它充当我们的包装器。    它首先会调用超类的
    `isSecure()`。如果默认行为表明我们的请求是安全的，那么我们将保持一切不变并原样返回值（`true`）。当超类实现返回 `false` 时，我们尝试从
    `HttpServletRequest` 中检索 `sslclientcipher` 和 `sslclientcertstatus` 标头。如果两者都存在且具有非空值，我们将认为该请求是安全请求（至少，我们将假设用户的浏览器直到
    Cloud Foundry 代理都使用了 SSL），并将返回 `true`。    ***清单 A-5.** 包装 HttpRequest 的过滤器*  `public
    class CloudFoundryHttpServletRequestWrappingFilter extends GenericFilterBean {`  `    @Override`
    `    public void doFilter(ServletRequest request, ServletResponse response,` `                      
    FilterChain chain) throws IOException, ServletException {` `        chain.doFilter(new
    CloudFoundryHttpServletRequestWrapper((HttpServletRequest)` `request), response);`
    `    }`  `    static class CloudFoundryHttpServletRequestWrapper extends HttpServletRequestWrapper
    {`  `        private static final String[] TLS_HEADERS = new String[]` `        {"sslclientcipher",
    "sslclientcertstatus"};`  `        public CloudFoundryHttpServletRequestWrapper(HttpServletRequest
    httpServletRequest) {` `            super(httpServletRequest);` `        }`  `        @Override`
    `        public boolean isSecure() {` `            boolean isSecure = super.isSecure();`
    `            if (!isSecure) {` `                boolean isActuallySecure = true;`
    `                for (String header : TLS_HEADERS) {` `isActuallySecure = isActuallySecure
    && StringUtils.isNotBlank` ![Image](img/U002.jpg) `(getHeader(header));` `                }`
    `                isSecure = isActuallySecure;` `            }` `            return
    isSecure;` `        }` `    }` `}`  重写 `isSecure()` 方法可能看起来有点激烈。但是，JavaDoc 指出，如果连接被认为是安全的，它应该返回
    `true`。它不绑定到特定协议，因此永远不应假设当 `isSecure` 返回 `true` 时，协议一定是 HTTPS。它也可以是任何其他提供“安全”保证的协议。此外，鉴于这种实现是最不具侵入性的，并且在升级
    Spring 或 Spring Security 时最不可能出现问题，我们更喜欢这种解决方案。Cloud Foundry 也在不久的将来致力于更好的 SSL
    支持，可能允许 SSL 一直延伸到我们的服务器。^(7)    我们还需要告诉 Spring Security 在 `/spring/spring-security.xml`
