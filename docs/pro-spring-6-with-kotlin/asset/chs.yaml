  lastName = \"Mayer\"\nbirthDate = LocalDate.of(1977, 10, 16)\n}\n)\n.verifyComplete()\n\
  }\n@Order(5)\n@Test\nfun testFindByFistNameAndLastNameNoResult() {\nsingerRepo!!.findByFirstNameAndLastName(\"\
  Gigi\", \"Pedala\")\n.log()\n.`as`> { publisher: Mono ->\nStepVerifier.create(\n\
  publisher\n)\n}\n.expectNextCount(0)\n.verifyComplete()\n}\n@Order(6)\n@Test\nfun\
  \ testCreateSinger() {\nsingerRepo!!.save(\nSinger().apply {\nfirstName = \"Test\"\
  \nlastName =\"Test\"\nbirthDate = LocalDate.now()\n}\n)\n.log()\n.`as`{ publisher:\
  \ Mono ->\nStepVerifier.create(\npublisher\n)\n}\n.assertNext{ s ->\nAssertions.assertNotNull(s.id)\n\
  }\n.verifyComplete()\n}\n@Order(7)\n@Test // negative test, lastName is null, which\
  \ is not allowed\nfun testFailedCreateSinger() {\nsingerRepo!!.save(\nSinger().apply\
  \ {\nfirstName = \"Test\"\nbirthDate = LocalDate.now()\n}\n)\n.log()\n.`as`{ publisher:\
  \ Mono ->\nStepVerifier.create(\npublisher\n)\n}\n.verifyError(TransientDataAccessResourceException::class.java)\n\
  }\n@Order(8)\n@Test\nfun testDeleteSinger() {\nsingerRepo!!.deleteById(4L)\n.log()\n\
  .`as`> { publisher: Mono ->\nStepVerifier.create(\npublisher\n)\n}\n.expectNextCount(0)\n\
  .verifyComplete()\n}\n}\n清单 20-8\n响应式仓库测试类\n```\n\n请注意，测试方法也是按照函数式编程范式编写的。每个语句都声明了在数据发出时要对其执行的操作。这里最重要的方法是\
  \ `verifyComplete()`，它触发验证，期望一个完成信号作为终止事件。\n\n添加了 `log()` 方法，用于观察所有响应式流信号，并使用配置的日志库（本例中为\
