  （`@Pointcut` 参数中无换行和空格）测试方法几乎相同，测试输出显示创建了两个切面 bean。


  ![](img/524962_1_En_5_Figm_HTML.jpg) 一个警告图标，圆圈内有一个感叹号。   那么 `perthis(Pointcut)`
  和 `pertarget(Pointcut)` 之间有什么区别呢？区别在于到达被通知的连接点时被检查的对象。正如你所注意到的，`pertarget` 指定了一个类型表达式，这意味着对于每个作为触发通知的连接点目标的新对象，都会实例化一个新的切面；而
  `perthis` 指定了一个方法表达式，因此对于每个在触发通知的连接点处由 `this` 引用的新对象，都会实例化一个新的切面。




  你很少需要自己编写切面，因为构建 Spring 应用时可能需要的几乎所有功能，Spring 都已经提供了。但了解其底层原理以及 Spring 如何施展魔法，仍然是一件好事。关于
  Spring 中的切面，能说的就是这些了。接下来，让我们看看如何在 Spring Boot 应用中处理切面。


  ## Spring Boot AOP


  Spring Boot 提供了一个特殊的 AOP 启动器库 `spring-boot-starter-aop`，它省去了配置的麻烦，尽管原本的配置也不多。要在
  Spring Boot 项目中使用该库，只需创建一个 Spring Boot 项目并将其添加为依赖即可。


  在图 5-11 中，你可以看到作为依赖添加到 Spring Boot 项目中的一组库。


  ![](img/524962_1_En_5_Fig11_HTML.jpg)


