- "# 16. Spring Native 及其他实用技术\n\n在前面的章节中，您已经了解了 Spring 框架如何帮助 Kotlin 和 Java 开发者创建\
  \ JEE 应用程序。通过使用 Spring 框架的依赖注入（DI）机制及其与各层的集成（通过 Spring 框架自身模块内的库或与第三方库的集成），您可以简化业务逻辑的实现和维护。\n\
  \n多年来，Spring 框架已经发生了巨大的演变，分裂成多个独立的项目，并与最新技术集成。版本 6 在功能和新增项目方面确实非常丰富。本章将向您介绍三个重要的新发展：\n\
  \n*   *Spring Native Images*：Spring Boot 2.3.0 引入了使用 Cloud Native Buildpacks（CNB）将应用程序打包成\
  \ Docker 镜像的能力。与此同时，Oracle 正在开发 GraalVM^(¹⁵⁰)，这是一个为 Java 和其他 JVM 语言编写的高性能 JDK 发行版，它承诺为单一语言提供令人难以置信的性能优化，并为多语言应用程序提供互操作性。其最终目标是拥有紧凑、快速启动的应用程序，这些应用程序可以例如在\
  \ AWS Lambda 函数中运行。AWS Lambda 函数是按需触发的应用程序，无需服务器一直运行。在 AWS EC2 上运行的 Spring Boot\
  \ 应用程序是一种基础设施即服务（IaaS），而 AWS Lambda 是一种平台即服务（PaaS）。它帮助您仅在需要时运行和执行后端代码。Spring Native\
  \ 项目提供了使用 GraalVM native-image 编译器将 Spring 应用程序编译为本机可执行文件的支持。该项目现已退役，因为它曾是实验性的，其成果是\
  \ Spring Boot 3 的官方本机支持^(¹⁵¹)。\n\n*   *Spring for GraphQL*：GraphQL^(¹⁵²) 是一种 API\
  \ 查询语言，也是一个使用现有数据来满足这些查询的运行时。长期以来，服务一直通过 HTTP 使用 REST 请求进行通信，以 JSON、XML 等多种格式处理信息。GraphQL\
  \ 增加了轻松声明要检索哪些数据的能力，而无需编写复杂的代码来提供这些数据。Spring for GraphQL^(¹⁵³) 为构建在 GraphQL Java\
  \ 之上的 Spring 应用程序提供支持。这是 GraphQL Java 团队和 Spring 工程团队之间的合作成果。在本章中，您将学习如何构建一个能够高效检索数据以响应\
  \ GraphQL 查询的 Spring Boot 应用程序。\n\n*   *Spring Kotlin 应用程序*：Kotlin^(¹⁵⁴) 是一种跨平台、静态类型、通用、高级编程语言，具有类型推断功能。Kotlin\
  \ 旨在与 Java 完全互操作，并且 Kotlin 标准库的 JVM 版本提供了更简洁的语法、各种类型和编程结构。一些开发者将其描述为 Scala 和 Java\
  \ 的混合体。该语言拥有一个强大的社区支持，并且由开发出最佳 Java 编辑器的团队开发，因此它的快速采用并不令人意外；它的热度是当之无愧的。我们在本书中通篇使用\
  \ Kotlin，因此无需在本章中进一步讨论。\n\n\n## Spring 原生镜像\n\nSpring 原生镜像是一个独立的可执行文件，通过使用 GraalVM\
  \ 原生镜像编译器对 Spring 应用进行提前处理而创建。与基于 JVM 的对应版本相比，原生镜像通常具有更小的内存占用和更快的启动速度。此外，你无需 JVM\
  \ 即可运行它们。在前面的章节中，构建 Spring 项目的结果是一个包含所有字节码的可执行 JAR 文件，这是编译构成该项目的所有 Java 和 Spring\
  \ 代码的结果。要执行 JAR 文件，你需要一个由 JDK（或在 Java 9 之前的远古时代由 JRE）提供的 JVM。Spring 原生将为目标系统生成一个可执行文件。原生可执行文件由以下部分组成：\n\
  \n*   **Substrate VM**：一种针对需要在其上运行的代码进行编译和配置的虚拟机。它是 JVM 的替代品。创建它的过程与使用 `jlink`^(¹⁵⁵)\
  \ 从 JDK 中剥离运行应用程序所不需要的所有模块，以组装和优化一组模块及其依赖项到自定义运行时镜像的过程非常相似。\n\n*   **DWARF 信息**：在调试过程中有用的信息。\n\
  \n*   **初始堆**：应用程序运行所需的内存。\n\n*   **编译为原生代码的应用程序**：在本例中，是一个 Spring Boot 应用程序及其所有依赖项。\n\
  \n为简单起见，本节利用 Spring Boot 创建 Docker 镜像的能力，来创建一个包含 Spring 原生可执行文件的 Docker 镜像，并通过启动容器来运行应用程序。这更容易，因为它不需要你在机器上安装\
  \ GraalVM。此外，你显然需要在本地安装 Docker，因为你创建的 Docker 镜像需要添加到镜像目录中，然后需要一个运行时来运行基于该镜像的容器。\n\
  \n那么，什么是**提前（AOT）编译**，它与普通的 Java 编译有何不同？有几点值得提及：\n\n*   AOT 编译是一个从应用程序的 *main* 入口点开始静态分析代码的过程。\n\
  *   在创建原生镜像时无法访问到的代码将从可执行文件中排除。这显然意味着使用 Spring 动态元素是不可能的，那些让天真的开发者着迷的“自动魔法”也一并失效。必须告知\
  \ GraalVM 关于反射、资源、序列化和动态代理的信息。\n*   应用程序的类路径在构建时已知，并且在运行时不会改变。这意味着没有延迟类加载，可执行文件中的所有类在启动时都会加载到内存中。\n\
  *   Java 和 Kotlin 应用程序可能还存在其他限制，这些限制只有在更多公司开始使用 GraalVM 后才能发现。（例如，我们在为运行 Apple M1\
  \ 架构的 macOS 构建原生镜像时遇到了一些问题。）\n\n因此，必须放弃 Spring Boot 应用程序的灵活性和动态性，以换取较小的内存占用和更快的启动速度。这意味着不支持配置文件，并且\
  \ bean 一旦创建就无法修改。这值得吗？时间会给出答案。\n\n当 Spring 应用程序被提前处理时，必须完成以下步骤才能将其转换为原生可执行文件：\n\n\
  *   生成 Java 代码。\n*   为动态代理生成字节码。\n*   生成以下 GraalVM JSON 提示文件，这些文件描述了 GraalVM 应如何处理无法通过直接检查代码来理解的内容：\n\
  \    *   资源提示（`resource-config.json`）\n    *   反射提示（`reflect-config.json`）\n   \
  \ *   序列化提示（`serialization-config.json`）\n    *   Java 代理提示（`proxy-config.json`）\n\
  \    *   JNI 提示（`jni-config.json`）\n\n在典型的 Spring 应用程序中，需要大量反射来将 bean 注入到其他 bean\
  \ 中。Spring IoC 容器识别 `@Configuration` 类和 bean 定义，并创建依赖树来决定 bean 的创建顺序，以便它们可以被注入。所有这些工作都在应用程序启动时完成，也称为**在运行时**完成。这显然需要一些时间，如果你读过前面的章节并亲自运行过代码，可能已经注意到了这一点。\n\
  \n在 Spring 原生可执行文件中，Spring 的行为有所不同。配置类不再被识别或解析，bean 定义也不会在运行时创建；所有这些工作都在构建时完成。bean\
  \ 定义被处理并转换为源代码，由 GraalVM 编译器分析，以便那些无法访问（使用）的 bean 可以被丢弃。生成的代码非常冗长，因为没有了 Spring IoC\
  \ 的强大功能，剩下的只有非常显式的代码，通过经典的 Java 和 Kotlin 代码——直接赋值和显式实例化 bean 类型——在正确的位置注入正确的 bean。这显然增加了构建时间，但这并不是真正的问题。\n\
  \n![](img/524962_1_En_16_Figa_HTML.jpg) 一个创意的象征。它由一个电灯泡表示。 为了开发人员的舒适和速度，开发可以在普通的\
  \ JVM 上进行，而生产构建可以隔离在流水线中，仅在需要发布时运行。\n\n构建 Spring Boot 原生镜像应用程序主要有两种方式：\n\n*   使用\
  \ Spring Boot 对云原生构建包（CNB）^(¹⁵⁶) 的支持来生成一个包含原生可执行文件的轻量级容器\n*   使用 GraalVM 原生构建工具来生成原生可执行文件\n\
  \nSpring Boot 原生支持非常简便，特别是如果你碰巧使用 Gradle，由于 Gradle 的原生构建工具插件，配置会非常简洁。然而，本节的重点不是编写\
  \ Spring 应用程序的代码和技术，而是将 Spring 应用程序编译为原生可执行文件并使用 Docker 运行时运行它所需的配置。\n\n\n\n###\
  \ Spring 应用程序\n\n本节中编译为原生可执行文件的 Spring 应用程序是一个简单的 Spring Boot REST Web 应用程序。它使用\
  \ Spring Data JPA 从运行在本地 Docker 实例（如果你有资源，也可以是远程实例）的容器中的数据库检索数据。图 16-1 展示了本节所用简单项目的\
  \ Spring Boot 变体。\n\n![](img/524962_1_En_16_Fig1_HTML.jpg)\n\n第 16 章原生启动的内容列表包括标记为\
  \ build、docker-build、gradle、s r c、main、kotlin 和 resources 的文件夹。其中 main 文件夹被高亮显示。\n\
  \n图 16-1\n\n项目 `chapter16-native-boot`\n\n所有类对你来说应该都很熟悉，因为在前面的章节中已经出现过。`Singer`\
  \ 类是一个非常简单的实体类，如代码清单 16-1 所示。\n\n```\npackage com.apress.prospring6.sixteen.boot.entities\n\
  import jakarta.persistence.*\nimport org.springframework.format.annotation.DateTimeFormat\n\
  import jakarta.persistence.GenerationType.IDENTITY\n@Entity\n@Table(name = \"SINGER\"\
  )\nclass Singer {\n@Id\n@GeneratedValue(strategy = GenerationType.IDENTITY)\n@Column(name\
  \ = \"ID\")\nvar id: Long? = null\n@Version\n@Column(name = \"VERSION\")\nvar version\
  \ = 0\n@Column(name = \"FIRST_NAME\")\nval firstName: String? = null\n@Column(name\
  \ = \"LAST_NAME\")\nval lastName: String? = null\n@DateTimeFormat(pattern = \"yyyy-MM-dd\"\
  )\n@Column(name = \"BIRTH_DATE\")\nval birthDate: LocalDate? = null\ncompanion object\
  \ {\n@Serial\nprivate val serialVersionUID = 1L\n}\noverride fun equals(other: Any?):\
  \ Boolean {\nif (this === other) return true\nif (javaClass != other?.javaClass)\
  \ return false\nother as Singer\nreturn id == other.id\n}\noverride fun hashCode():\
  \ Int {\nreturn id?.hashCode() ?: 0\n}\n}\n代码清单 16-1\nSinger 实体类\n```\n\n为了处理 `Singer`\
  \ 实例，`SingerRepo` 接口被声明为继承 `JpaRepository<Singer, Long>`，如代码清单 16-2 所示。\n\n```\n\
  package com.apress.prospring6.sixteen.boot.repos\nimport com.apress.prospring6.sixteen.boot.entities.Singer\n\
  import org.springframework.data.jpa.repository.JpaRepository\ninterface SingerRepo\
  \ : JpaRepository {\n}\n代码清单 16-2\nSingerRepo Spring Data 接口类\n```\n\n为简单起见，`SingerController`\
  \ 类需要一个 `SingerRepo` 实例，通过其处理方法来回传递数据（为简化起见，我们跳过了服务层）。该类及其 bean 声明如代码清单 16-3 所示。\n\
  \n```\npackage com.apress.prospring6.sixteen.boot.controllers\nimport org.springframework.web.bind.annotation.*\n\
  // 其他 import 语句已省略\n@RestController\n@RequestMapping(value = [\"/singer\"])\nclass\
  \ SingerController(private val singerRepo: SingerRepo) {\n@GetMapping(path = [\"\
  /\", \"\"])\nfun all(): List {\nreturn singerRepo.findAll()\n}\n@GetMapping(path\
  \ = [\"/{id}\"])\nfun findSingerById(@PathVariable id: Long): Singer? {\nreturn\
  \ singerRepo.findById(id).orElse(null)\n}\n@PostMapping(path = [\"/\"])\nfun create(@RequestBody\
  \ singer: Singer): Singer {\nLOGGER.info(\"Creating singer: {}\", singer)\nreturn\
  \ singerRepo.save(singer)\n}\n@PutMapping(value = [\"/{id}\"])\nfun update(@RequestBody\
  \ singer: Singer, @PathVariable id: Long?): Singer {\nLOGGER.info(\"Updating singer:\
  \ {}\", singer)\nreturn singerRepo.save(singer)\n}\n@DeleteMapping(value = [\"/{id}\"\
  ])\nfun delete(@PathVariable id: Long) {\nLOGGER.info(\"Deleting singer with id:\
  \ {}\", id)\nsingerRepo.deleteById(id)\n}\ncompanion object {\nval LOGGER = LoggerFactory.getLogger(SingerController::class.java)\n\
  }\n}\n代码清单 16-3\nSingerController 类\n```\n\n`CustomPhysicalNamingStrategy` bean\
  \ 用于配置 Spring Data 以识别名称仅由大写字母组成的数据库对象，这超出了本节的范围。代码清单 16-4 中所示的 `Chapter16NativeApplication`\
  \ 类是一个基本的 Spring Boot 配置和主类，也是此应用程序的入口点。\n\n```\npackage com.apress.prospring6.sixteen.boot\n\
