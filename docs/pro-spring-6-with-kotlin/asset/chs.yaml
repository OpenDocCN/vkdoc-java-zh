  ### 在领域对象属性上定义验证约束


  对于以下各节，验证的目标类型是 `Singer` 的一个变体，它有两个枚举类型字段用于设置其流派和性别。`Singer` 类以及两个枚举声明如清单 11-24
  所示。


  ```

  package com.apress.prospring6.eleven.domain

  import jakarta.validation.constraints.NotNull

  import jakarta.validation.constraints.Size

  class Singer {

  @NotNull @Size(min = 2, max = 60) var firstName: String? = null

  var lastName: String? = null

  @NotNull var genre: Genre? = null

  var gender: Gender? = null

  val isCountrySinger: Boolean

  get() = genre == Genre.COUNTRY

  override fun toString(): String {

  return "Singer{" +

  "firstName=''" + firstName + ''\'''' +

  ", lastName=''" + lastName + ''\'''' +

  ", genre=" + genre +

  ", gender=" + gender +

  ''}''

  }

  enum class Genre(private val code: String) {

  POP("P"), JAZZ("J"), BLUES("B"), COUNTRY("C");

  override fun toString() = this.code

  }

  enum class Gender(private val code: String) {

  MALE("M"), FEMALE("F"), UNSPECIFIED("U");

  override fun toString() = this.code

  }

  }

  清单 11-24

  增强的 Singer 类

  ```


  `firstName` 属性应用了两个约束：`@NotNull` 注解，表示该值不应为 `null`；以及 `@Size` 注解，用于控制 `firstName`
  属性的长度。`@NotNull` 约束也应用于 `genre` 属性。`genre` 属性表示歌手所属的音乐流派，而 `gender` 属性与音乐生涯（或任何职业生涯）无关，因此它可以是
  `null`。




