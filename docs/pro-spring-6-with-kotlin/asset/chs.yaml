  \ 注解从 `BasicDataSourceCfg` 配置类导入，并通过自动装配注入到 `HibernateConfig` 中。\n\n*   `transactionManager`：Hibernate\
  \ 会话工厂需要一个事务管理器来实现事务性数据访问。Spring 提供了一个专门用于 Hibernate 5 的事务管理器，声明在 `org.springframework.orm.hibernate5.HibernateTransactionManager`\
  \ 包中。该 bean 以 `transactionManager` 名称声明。默认情况下，使用 XML 配置时，每当需要事务管理时，Spring 都会在其 `ApplicationContext`\
  \ 中查找名为 `transactionManager` 的 bean。Kotlin 配置则更灵活一些，因为它是按类型而非名称来查找 bean。我们将在**第**\
  \ **9** **章**中详细讨论事务。此外，配置类还使用了 `@EnableTransactionManagement` 注解，以支持使用注解声明事务边界需求（启用对\
  \ Spring 的 `@Transactional` 的支持）。\n\n*   *组件扫描*：`@ComponentScan` 注解你应该在前面的章节中已经熟悉。我们指示\
  \ Spring 扫描 `com.apress.prospring6.seven` 包（未显式配置，因为这是配置类声明的包）下的组件，以检测那些包含数据访问方法、并使用\
  \ `@Repository` 注解的 bean。\n\n*   *Hibernate* `SessionFactory`：`SessionFactory` bean\
  \ 是最重要的部分。在该 bean 内部，提供了几个属性：\n\n*   首先，我们需要将 `DataSource` bean 注入到 `sessionFactory`\
  \ bean 中。\n\n*   其次，我们指示 Hibernate 扫描 `com.apress.prospring6.seven.entities` 包下的领域对象。\n\
  \n*   最后，`hibernateProperties` bean 为 Hibernate 提供了配置细节。配置参数有很多，我们只定义了每个应用程序都应提供的几个重要属性。表\
  \ 7-1 列出了我们示例中 Hibernate 会话工厂的配置属性、常量及其 `String` 值；你可以在 `org.hibernate.cfg.AvailableSettings`\
  \ 接口（由 `org.hibernate.cfg.Environment` 实现）中找到其他属性。\n\n有关 Hibernate 支持的完整属性列表描述，请参考\
  \ Hibernate 的 ORM 用户指南^(⁶¹)，特别是第 24.2 节。\n\n\n\n## 使用 Hibernate 注解进行 ORM 映射\n\n\
  配置就绪后，下一步是建模 Kotlin POJO（或 POKO，但本书将沿用 Java 方式）实体类及其与底层关系型数据结构的映射。\n\n映射有两种方法。第一种是设计对象模型，然后基于对象模型生成数据库脚本。将\
  \ Hibernate 属性 `hibernate.hbm2ddl.auto` 配置为 `create` 或 `create-drop` 即可实现此方法。然而，这种方法不适用于生产环境，而更适合使用内存数据库的测试环境，因为在这些环境中基于\
  \ Kotlin POJO 生成表的开销并不大。\n\n第二种方法是从数据模型（表）开始，然后使用所需的映射来建模 POJO。后一种方法推荐用于开发和生产环境，因为它能提供对数据模型更强的控制力，这有助于优化数据访问性能。基于数据模型，图\
  \ 7-2 展示了相应的对象模型类图。\n\n![](img/524962_1_En_7_Fig2_HTML.jpg)\n\n一个模型类图展示了 4 张表，分别名为抽象实体、歌手、专辑和乐器。它表示了歌手表和乐器表组件之间的多对多关系。\n\
  \n图 7-2\n示例数据模型的类图\n\n你可以看到 `Singer` 和 `Album` 之间存在一对多关系，而 `Singer` 和 `Instrument`\
  \ 对象之间存在多对多关系。建模多对多关系的表 `SINGER_INSTRUMENT` 并未映射到 Kotlin 类。\n\n另请注意，`Singer` 和 `Album`\
  \ 共有 `id` 和 `version` 字段，它们被归入一个名为 `AbstractEntity` 的抽象类中，以简化其他实体类。在通常设置了审计功能的生产应用中，此抽象类中的其他字段可以是以下任意字段：`createdAt`、`updatedAt`、`createdBy`、`updatedBy`\
  \ 等。`AbstractEntity` 类使用了 `@MappedSuperclass` 注解进行标注，该注解指定一个类，其映射信息将应用于继承它的实体。\n\
  \n## 简单映射\n\n让我们从映射类的简单属性开始。清单 7-3 展示了 `AbstractEntity` 类及其映射信息，这些信息由 `Singer` 和\
  \ `Album` 继承。\n\n```\npackage com.apress.prospring6.seven.base.entities\nimport\
  \ jakarta.persistence.*\nimport java.io.Serializable\nimport java.util.*\n@MappedSuperclass\n\
  abstract class AbstractEntity : Serializable {\n@get:Column(\nname = \"ID\"\n)\n\
  @get:GeneratedValue(strategy = GenerationType.IDENTITY)\n@get:Id\nvar id: Long?\
  \ = null\n@get:Column(name = \"VERSION\")\n@get:Version\nvar version = 0\n// 在此场景中，equals\
  \ 和 hashCode 的作用范围非常有限\noverride fun equals(other: Any?): Boolean {\nif (this ===\
  \ other) return true\nif (other == null || javaClass != other.javaClass) return\
  \ false\nval that = other as AbstractEntity\nreturn id == that.id\n}\noverride fun\
  \ hashCode(): Int {\nreturn Objects.hash(id)\n}\ncompanion object {\nprivate val\
  \ serialVersionUID = 1L\n}\n}\n清单 7-3\nAbstractEntity 基础实体类\n```\n\n`AbstractEntity`\
  \ 类不映射到任何表，但其配置中使用的注解也可能用于映射到表的类中。\n\n清单 7-4 展示了 `Singer` 类及其映射注解。\n\n```\npackage\
  \ com.apress.prospring6.seven.base.entities\nimport jakarta.persistence.Column\n\
  import jakarta.persistence.Entity\nimport jakarta.persistence.Table\n// 其他导入语句已省略\n\
  @Entity\n@Table(name = \"SINGER\")\nclass Singer : AbstractEntity() {\n@get:Column(name\
  \ = \"FIRST_NAME\")\nvar firstName: String? = null\n@get:Column(name = \"LAST_NAME\"\
  )\nvar lastName: String? = null\n@get:Column(name = \"BIRTH_DATE\")\nvar birthDate:\
  \ LocalDate? = null\n@get:OneToMany(\nmappedBy = \"singer\",\ncascade = [CascadeType.ALL],\n\
  orphanRemoval = true\n)\nvar albums: MutableSet = HashSet()\n@get:JoinTable(\nname\
  \ = \"SINGER_INSTRUMENT\",\njoinColumns = [JoinColumn(name = \"SINGER_ID\")],\n\
  inverseJoinColumns = [JoinColumn(name = \"INSTRUMENT_ID\")]\n)\n@get:ManyToMany\n\
  var instruments: MutableSet = HashSet()\nfun addAlbum(album: Album): Boolean {\n\
  album.singer = this\nreturn albums.add(album)\n}\nfun removeAlbum(album: Album)\
  \ {\nalbums.remove(album)\n}\nfun addInstrument(instrument: Instrument): Boolean\
  \ {\nreturn instruments.add(instrument)\n}\noverride fun toString(): String {\n\
  return (\"Singer - Id: \" + id + \", First name: \" + firstName\n+ \", Last name:\
  \ \" + lastName + \", Birthday: \" + birthDate)\n}\ncompanion object {\nprivate\
  \ val serialVersionUID = 2L\n}\n}\n清单 7-4\nSinger 实体类\n```\n\n首先，我们使用 `@Entity`\
  \ 注解标注该类型，这意味着这是一个映射实体类。此外，被 `@Entity` 注解标注的类必须有一个使用 `@Id` 注解标注的列，该列代表该表的主键。`@Table`\
  \ 注解定义了该实体在数据库中所映射的表名。对于每个映射的属性，你都可以使用 `@Column` 注解进行标注，并提供列名。\n\n![](img/524962_1_En_7_Fige_HTML.jpg)\
  \ 一个图标描绘了一个电灯泡。 如果类型和属性名称与表和列名称相同，则可以省略表和列名称。\n\n以下是此配置的几个要点：\n\n*   我们使用 `@Id`\
  \ 注解标注 `id` 属性。这意味着它被映射到记录的主键。Hibernate 将在其会话中管理联系人实体实例时，将其用作唯一标识符。此外，`@GeneratedValue`\
  \ 注解告诉 Hibernate `id` 值是如何生成的。`IDENTITY` 策略意味着 `id` 值是在插入时由后端生成的。\n\n\n\n*   我们使用\
  \ `@Version` 注解来标注 `version` 属性。这指示 Hibernate 我们希望使用乐观锁机制，并将 `version` 属性作为控制字段。每次\
  \ Hibernate 更新一条记录时，它都会比较实体实例的版本与数据库中记录的版本。如果两个版本相同，则意味着之前没有人更新过数据，Hibernate 将更新数据并递增\
  \ `version` 列。然而，如果版本不一致，则意味着之前有人更新过该记录，Hibernate 将抛出一个 `StaleObjectStateException`\
  \ 异常，Spring 会将其转换为 `HibernateOptimisticLockingFailureException`。在此示例中，我们使用 `Int`\
  \ 类型进行版本控制。除了整数之外，Hibernate 还支持使用 `timestamp`。不过，建议使用整数进行版本控制，因为 Hibernate 每次更新后都会将版本号递增\
  \ 1。而使用时间戳时，Hibernate 会在每次更新后更新最新的时间戳。时间戳的安全性稍低，因为两个并发事务可能会在同一毫秒内加载并更新同一个项目。\n\n\
  另一个映射对象是 `Album`，如清单 7-5 所示。\n\n```\npackage com.apress.prospring6.seven.base.entities\n\
  // 导入语句已省略\n@Entity\n@Table(name = \"ALBUM\")\nclass Album : AbstractEntity() {\n\
  @get:Column\nvar title: String? = null\n@get:Column(name = \"RELEASE_DATE\")\nvar\
  \ releaseDate: LocalDate? = null\n@get:JoinColumn(name = \"SINGER_ID\")\n@get:ManyToOne\n\
  var singer: Singer? = null\noverride fun equals(other: Any?): Boolean {\nif (this\
  \ === other) return true\nif (other == null || javaClass != other.javaClass) return\
  \ false\nif (!super.equals(other)) return false\nval album = other as Album\nreturn\
  \ if (album.id != null && id != null) {\nsuper.equals(other)\n} else title == album.title\
  \ && releaseDate == album.releaseDate\n}\noverride fun hashCode(): Int {\nreturn\
  \ Objects.hash(super.hashCode(), title, releaseDate)\n}\noverride fun toString():\
  \ String {\nreturn (\"Album - Id: \" + id + \", Singer id: \" + (singer?.id?:\"\"\
  )\n+ \", Title: \" + title + \", Release Date: \" + releaseDate)\n}\ncompanion object\
  \ {\nprivate val serialVersionUID = 3L\n}\n}\n清单 7-5\nAlbum 实体类\n```\n\n第三个实体类名为\
  \ `Instrument`，映射到 `INSTRUMENT` 表，这是一个只有单列的非常简单的表。引入此表只是为了在代码示例中体现多对多关系。此类如清单 7-6\
  \ 所示。\n\n```\npackage com.apress.prospring6.seven.base.entities\n// 导入语句已省略\n@Entity\n\
  @Table(name = \"INSTRUMENT\")\nclass Instrument : Serializable {\n@get:Column(name\
  \ = \"INSTRUMENT_ID\")\n@get:Id\nvar instrumentId: String? = null\n@get:JoinTable(\n\
  name = \"SINGER_INSTRUMENT\",\njoinColumns = [JoinColumn(name = \"INSTRUMENT_ID\"\
  )],\ninverseJoinColumns = [JoinColumn(name = \"SINGER_ID\")]\n)\n@get:ManyToMany\n\
  var singers: MutableSet = mutableSetOf()\noverride fun toString(): String {\nreturn\
  \ \"Instrument :$instrumentId\"\n}\ncompanion object {\nprivate val serialVersionUID\
  \ = 4L\n}\n}\n清单 7-6\nInstrument 实体类\n```\n\n### 一对多映射\n\nHibernate 能够对多种关联进行建模。最常见的关联是一对多和多对多。在本章的源代码示例中，每个\
  \ `Singer` 拥有零个或多个专辑，因此这是一对多关联（在 ORM 术语中，一对多关联用于对数据结构中的零对多和一对多关系进行建模）。清单 7-7 描述了定义\
  \ `Singer` 和 `Album` 实体之间一对多关系所需的属性和方法。\n\n```\npackage com.apress.prospring6.seven.base.entities\n\
  import jakarta.persistence.OneToMany\nimport jakarta.persistence.CascadeType\n//\
  \ 其他导入语句已省略\n// Singer.kt\nclass Singer : AbstractEntity() {\n...\n@get:OneToMany(\n\
  mappedBy = \"singer\",\ncascade = [CascadeType.ALL],\norphanRemoval = true\n)\n\
  var albums: MutableSet = mutableSetOf()\n...\n}\n// Album.kt\nimport jakarta.persistence.ManyToOne\n\
  import jakarta.persistence.JoinColumn\n// 其他导入语句已省略\n@Entity\n@Table(name = \"ALBUM\"\
  )\nclass Album : AbstractEntity() {\n...\n@get:JoinColumn(name = \"SINGER_ID\")\n\
  @get:ManyToOne\nvar singer: Singer? = null\n...\n}\n清单 7-7\n用于建模一对多和多对一关系的 Singer\
  \ 和 Album 代码片段\n```\n\n`albums` 属性的 getter 方法使用 `@OneToMany` 进行注解，这表示与 `Album` 类的一对多关系。该注解传递了几个属性。`mappedBy`\
  \ 属性指示 `Album` 类中提供关联的属性（即，通过 `FK_ALBUM_SINGER` 表中的外键定义进行链接）。\n\n`cascade` 属性设置为\
  \ `CascadeType.ALL`，意味着对 `Singer` 记录执行的任何操作都会传播到与其关联的专辑。`orphanRemoval` 属性意味着，在\
  \ `albums` 集合更新后，数据库中不再存在于该集合中的 `Album` 条目将被删除。\n\n`Singer` 类声明了与 `Album` 关系中的一对多部分。这意味着\
  \ `Album` 实体必须声明与 `Singer` 关系中的多对一部分，这是通过使用 `@ManyToOne` 注解完成的。与之关联的 `@JoinColumn`\
  \ 注解是必需的，用于指定底层外键列的名称。\n\n### 多对多映射\n\n每个歌手可以演奏零个或多个乐器，每个乐器也与零个或多个歌手相关联，这意味着这是一个多对多映射。多对多映射需要一个连接表，在本例中为\
  \ `SINGER_INSTRUMENT`。清单 7-8 显示了需要添加到 `Singer` 类以实现此关系的代码。\n\n```\npackage com.apress.prospring6.seven.base.entities;\n\
  import jakarta.persistence.ManyToMany;\nimport jakarta.persistence.JoinTable;\n\
  import jakarta.persistence.JoinColumn;\n// 其他导入语句已省略\n// Singer.kt\nclass Singer\
  \ : AbstractEntity() {\n...\n@get:JoinTable(\nname = \"SINGER_INSTRUMENT\",\njoinColumns\
  \ = [JoinColumn(name = \"SINGER_ID\")],\ninverseJoinColumns = [JoinColumn(name =\
  \ \"INSTRUMENT_ID\")]\n)\n@get:ManyToMany\nvar instruments: MutableSet = mutableSetOf()\n\
  ...\n}\n// Instrument.kt\nimport jakarta.persistence.ManyToMany\nimport jakarta.persistence.JoinColumn\n\
  // 其他导入语句已省略\n@Entity\n@Table(name = \"INSTRUMENT\")\nclass Instrument : AbstractEntity()\
  \ {\n...\n@get:JoinTable(\nname = \"SINGER_INSTRUMENT\",\njoinColumns = [JoinColumn(name\
  \ = \"INSTRUMENT_ID\")],\ninverseJoinColumns = [JoinColumn(name = \"SINGER_ID\"\
  )]\n)\n@get:ManyToMany\nvar singers: MutableSet = mutableSetOf()\n...\n}\n清单 7-8\n\
  用于建模多对多关系的 Singer 和 Instrument 代码片段\n```\n\n`Singer` 类中 `instruments` 属性的 getter\
  \ 方法使用 `@ManyToMany` 进行注解。`@JoinTable` 注解用于指示 Hibernate 应查找的底层连接表。`name` 是连接表的名称，`joinColumns`\
  \ 定义了作为 `SINGER` 表外键的列，`inverseJoinColumns` 定义了作为关联另一端（即 `INSTRUMENT` 表）外键的列。`Instrument`\
  \ 类中的代码与 `Singer` 的代码大致相同，但 `joinColumns` 和 `inverseJoinColumns` 属性被互换以反映关联关系。\n\
  \n\n\n### Hibernate 的 Session 接口\n\n在 Hibernate 中，与数据库交互时，你需要处理的主要接口是 `Session`\
  \ 接口，该接口从 `SessionFactory` 实例中获取。`SessionFactory` 实例被创建并添加到应用上下文中，这是通过配置 `LocalSessionFactoryBean`\
  \ 实现的，如本章前面介绍的 `HibernateConfig` 类所示（参见清单 7-2）。然后，该实例可以在仓库类中自动装配，并用于创建与数据库通信的 Hibernate\
  \ `Session`。清单 7-9 展示了本章示例中使用的 `SingerDaoImpl` 类，该类注入了已配置的 Hibernate `SessionFactory`。\n\
  \n```\npackage com.apress.prospring6.seven.base.dao\nimport com.apress.prospring6.seven.base.entities.Singer\n\
  import jakarta.annotation.Resource\nimport org.hibernate.SessionFactory\nimport\
  \ org.slf4j.Logger\nimport org.slf4j.LoggerFactory\nimport org.springframework.stereotype.Repository\n\
  import org.springframework.transaction.annotation.Transactional\n@Transactional\n\
  @Repository(\"singerDao\")\nclass SingerDaoImpl(private val sessionFactory: SessionFactory)\
  \ : SingerDao {\n...\ncompanion object {\nprivate val LOGGER = LoggerFactory.getLogger(SingerDaoImpl::class.java)\n\
  ...\n}\n}\n清单 7-9\n使用 Hibernate 的 SessionFactory 的 SingerDaoImpl 仓库类\n```\n\n我们通过使用\
  \ `@Repository` 注解将 DAO 类声明为 Spring Bean，这将其集成到 Spring 上下文中，并启用了异常转换，即 Spring 运行时\
  \ `DataAccessException` 系列异常。`@Transactional` 注解定义了事务需求，我们将在**第** **9** 章进一步讨论。`sessionFactory`\
  \ 属性由 Spring 通过构造函数自动装配。`SingerDao` 接口非常简单，只有三个查找方法、一个 `save(..)` 方法和一个 `delete(..)`\
  \ 方法。`save(..)` 方法同时执行插入和更新操作。该接口如清单 7-10 所示。\n\n```\npackage com.apress.prospring6.seven.base.dao\n\
  import com.apress.prospring6.seven.base.entities.Singer\ninterface SingerDao {\n\
  fun findAll(): List\nfun findAllWithAlbum(): List\nfun findById(id: Long?): Singer?\n\
  fun save(singer: Singer): Singer\nfun delete(singer: Singer)\nfun findAllDetails(firstName:\
  \ String?, lastName: String?): Singer?\nfun findAllNamesByProjection(): Set\nfun\
  \ findFirstNameById(id: Long): String?\nfun findFirstNameByIdUsingProc(id: Long):\
  \ String?\n}\n清单 7-10\nSingerDao 接口\n```\n\n## 使用 Hibernate 查询语言查询数据\n\nHibernate\
  \ 与 JDO 和 JPA 等其他 ORM 工具一样，是围绕对象模型设计的。因此，在定义映射之后，我们无需构建 SQL 来与数据库交互。相反，对于 Hibernate，我们使用\
  \ Hibernate 查询语言（HQL）来定义查询。在与数据库交互时，Hibernate 会代表我们将查询转换为 SQL 语句。在编写 HQL 查询时，其语法与\
  \ SQL 非常相似。但是，你需要从对象的角度而非数据库的角度来思考。在接下来的几个小节中，我们将通过几个示例带你了解。\n\n### 使用懒加载进行简单查询\n\
  \n让我们从实现 `findAll()` 方法开始，该方法仅从数据库中检索所有歌手。清单 7-11 显示了此功能的更新代码。\n\n```\npackage com.apress.prospring6.seven.base.dao\n\
  // 导入语句已省略\n@Transactional\n@Repository(\"singerDao\")\nclass SingerDaoImpl(private\
  \ val sessionFactory: SessionFactory) : SingerDao {\n...\n@Transactional(readOnly\
  \ = true)\noverride fun findAll(): List {\nreturn sessionFactory.currentSession.createQuery(\n\
  \"from Singer s\",\nSinger::class.java\n).list()\n}\n...\n}\n清单 7-11\nSingerDaoImpl#findAll()\
  \ 方法\n```\n\n访问器 `.currentSession` 获取 Hibernate 的 `Session` 接口。然后，调用 `Session.createQuery()`\
  \ 方法，并传入 HQL 语句。语句 `from Singer` 仅从数据库中检索所有歌手。该语句的另一种语法是 `select s from Singer s`。`@Transactional(readOnly=true)`\
  \ 注解表示我们希望将事务设置为只读。对于只读方法设置该属性，在某些情况下会带来更好的性能。\n\n测试 `findAll()` 方法有两种方式：运行 `HibernateDemoV1`\
  \ 类，该方法将在本地或容器中可用的 MariaDB 数据库上执行；或者编写一个测试方法，并使用 Testcontainers MariaDB 数据源在测试上下文中执行。清单\
  \ 7-12 显示了 `HibernateDemoV1` 类的内容以及运行该类的结果。\n\n```\npackage com.apress.prospring6.seven.base\n\
  import com.apress.prospring6.seven.base.config.HibernateConfig\nimport com.apress.prospring6.seven.base.dao.SingerDao\n\
  import org.slf4j.Logger\nimport org.slf4j.LoggerFactory\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext\n\
  object HibernateDemoV1 {\nprivate val LOGGER = LoggerFactory.getLogger(HibernateDemoV1::class.java)\n\
  @JvmStatic\nfun main(args: Array) {\nval ctx = AnnotationConfigApplicationContext(\n\
  HibernateConfig::class.java\n)\nval singerDao = ctx.getBean(\nSingerDao::class.java\n\
  )\nLOGGER.info(\" ---- 列出 id=2 的歌手:\")\nval singer = singerDao.findById(2L)\nLOGGER.info(singer.toString())\n\
  // 这可以工作，但你需要重新创建容器才能运行另一个演示类 ;)\n// singerDao.delete(singer);\nLOGGER.info(\" ----\
  \ 列出所有歌手:\")\nsingerDao.findAll().forEach{ s: Singer ->\nLOGGER.info(\ns.toString()\n\
  )\n}\nctx.close()\n}\n}\n# 输出\n---- 列出所有歌手:\nSinger - Id: 1, First name: John, Last\
  \ name: Mayer, Birthday: 1977-10-16\nSinger - Id: 3, First name: John, Last name:\
  \ Butler, Birthday: 1975-04-01\nSinger - Id: 2, First name: Eric, Last name: Clapton,\
  \ Birthday: 1945-03-30\n清单 7-12\nHibernateDemoV1 可运行类及其输出\n```\n\n虽然检索到了歌手记录，但专辑和乐器呢？让我们修改测试类以打印详细信息。在清单\
  \ 7-13 中，你可以看到在可运行的 `HibernateDemoV2` 类中，`singerDao.findAll()` 方法被替换为 `singerDao.findAllWithAlbums()`。该清单还显示了执行此类时打印的输出。\n\
  \n\n\n```\n// 在 SingerDao 中，使用变体：\n@Transactional(readOnly = true)\noverride fun\
  \ findAllWithAlbum(): List {\nreturn sessionFactory.currentSession.createQuery(\"\
  from Singer s\",\nSinger::class.java).list()\n}\npackage com.apress.prospring6.seven.base\n\
  // 导入语句已省略\nobject HibernateDemoV2 {\nprivate val LOGGER = LoggerFactory.getLogger(HibernateDemoV2::class.java)\n\
  @JvmStatic\nfun main(args: Array) {\nval ctx = AnnotationConfigApplicationContext(\n\
  HibernateConfig::class.java\n)\nval singerDao = ctx.getBean(\nSingerDao::class.java\n\
  )\nLOGGER.info(\" ---- 列出 id=2 的歌手：\")\nval singer = singerDao.findById(2L)\nLOGGER.info(singer.toString())\n\
  // 这可以工作，但你需要重新创建容器才能运行另一个演示类 ;)\n//singerDao.delete(singer);\nlistSingersWithAlbum(singerDao.findAllWithAlbum())\n\
  ctx.close()\n}\nprivate fun listSingersWithAlbum(singers: List) {\nLOGGER.info(\"\
  \ ---- 列出带有乐器的歌手：\")\nsingers.forEach{ s: Singer ->\nLOGGER.info(s.toString())\n\
  s.albums.forEach{ a: Album ->\nLOGGER.info(\n\"\\t\" + a.toString()\n)\n}\ns.instruments.forEach{\
  \ i: Instrument ->\nLOGGER.info(\n\"\\t 乐器: \" + i.instrumentId\n)\n}\n}\n}\n}\n\
  # 输出\nINFO : HibernateDemoV2 -  ---- 列出带有乐器的歌手：\nINFO : HibernateDemoV2 - 歌手 - Id:\
  \ 1, 名字: John, 姓氏: Mayer, 生日: 1977-10-16\nException in thread \"main\" org.hibernate.LazyInitializationException:\
  \ failed to lazily initialize a collection of role: com.apress.prospring6.seven.base.entities.Singer.albums,\
  \ could not initialize proxy - no Session\nat org.hibernate.collection.internal.AbstractPersistentCollection.throwLazyInitializationException(AbstractPersistentCollection.java:614)\n\
  at org.hibernate.collection.internal.AbstractPersistentCollection.withTemporarySessionIfNeeded(AbstractPersistentCollection.java:218)\n\
  at org.hibernate.collection.internal.AbstractPersistentCollection.initialize(AbstractPersistentCollection.java:591)\n\
  at org.hibernate.collection.internal.AbstractPersistentCollection.read(AbstractPersistentCollection.java:149)\n\
  at org.hibernate.collection.internal.PersistentSet.iterator(PersistentSet.java:188)\n\
  at java.base/java.lang.Iterable.forEach(Iterable.java:74)\nat com.apress.prospring6.seven.base.HibernateDemoV2.lambda$listSingersWithAlbum$2(HibernateDemoV2.java:62)\n\
  清单 7-13\nHibernateDemoV2 可运行类及其输出\n```\n\n当你尝试访问关联时，会看到 Hibernate 抛出 `LazyInitializationException`，因为默认情况下，Hibernate\
  \ 会延迟加载关联。这意味着 Hibernate 不会为记录关联表（即 `ALBUM` 或 `INSTRUMENT`）。这样做的原因是出于性能考虑；可以想象，如果查询检索了数千条记录，并且所有关联都被检索出来，那么大量的数据传输会降低性能。\n\
  \n### 使用关联抓取进行查询\n\n要让 Hibernate 从关联中抓取数据，有两种选择。第一种是在 Java 关联中声明 `fetch` 模式为 `EAGER`：`@ManyToMany(fetch=FetchType.EAGER)`。这会告诉\
  \ Hibernate 在每次查询中都抓取关联记录。然而，如前所述，这会影响数据检索性能。第二种选择是在需要时指示 Hibernate 在查询中抓取关联记录。如果使用\
  \ `Criteria` 查询，可以调用 `Criteria.setFetchMode()` 函数来指示 Hibernate 急切地抓取关联。当使用 `NamedQuery`\
  \ 时，可以使用 fetch 操作符来指示 Hibernate 急切地抓取关联。\n\n让我们看一下 `findAllWithAlbum()` 方法的实现，该方法将检索所有歌手信息及其专辑和乐器。此示例将使用\
  \ `jakarta.persistence.NamedQuery` 方法。`NamedQuery` 可以外部化到 XML 文件中，也可以使用实体类上的注解来声明。在清单\
  \ 7-14 中，你可以看到修改后的 `Singer` 实体类，其中使用注解定义了命名查询。\n\n```\npackage com.apress.prospring6.seven.base.entities;\n\
  import jakarta.persistence.NamedQueries\nimport jakarta.persistence.NamedQuery\n\
  // 其他导入语句已省略\n@Entity\n@Table(name = \"SINGER\")\n@NamedQueries({\n@NamedQuery(name=\"\
  Singer.findAllWithAlbum\",\nquery=\"select distinct s from Singer s \" +\n\"left\
  \ join fetch s.albums a \" +\n\"left join fetch s.instruments i\")\n})\npublic class\
  \ Singer extends AbstractEntity {\n// 内容已省略\n}\n清单 7-14\n在方法 SingerDaoImpl.findAllWithAlbum()\
  \ 中使用的带有 NamedQuery 声明的 Singer 实体类\n```\n\n在清单 7-14 中，我们定义了一个名为 `Singer.findAllWithAlbum`\
  \ 的 `NamedQuery` 实例。然后我们用 HQL 定义了查询。请注意 `left join fetch` 子句，它指示 Hibernate 急切地抓取关联。我们还需要使用\
  \ `select distinct`；否则，Hibernate 将返回重复的对象（如果单个歌手关联了两个专辑，则会返回两个 Singer 对象）。\n\n`SingerDaoImpl.findAllWithAlbum()`\
  \ 方法的实现如清单 7-15 所示。\n\n```\npackage com.apress.prospring6.seven.base.dao\n// 导入语句已省略\n\
  @Transactional\n@Repository(\"singerDao\")\nclass SingerDaoImpl(private val sessionFactory:\
  \ SessionFactory) : SingerDao {\n@Transactional(readOnly = true)\noverride fun findAllWithAlbum():\
  \ List {\nreturn sessionFactory.currentSession.createNamedQuery(\n\"Singer.findAllWithAlbum\"\
  , Singer::class.java\n).list()\n}\n// 其他代码已省略\n}\n清单 7-15\nSingerDaoImpl.findAllWithAlbum()\
  \ 使用在清单 7-14 中声明的名为 Singer.findAllWithAlbum 的 NamedQuery 实例\n```\n\n这次，当运行 `HibernateDemoV2`\
  \ 时，会调用 `Session.getNamedQuery()` 方法，并传入 `NamedQuery` 实例的名称，现在它会产生预期的输出，而不是抛出 `LazyInitializationException`。该输出如清单\
  \ 7-16 所示。\n\n\n\n```\nINFO : HibernateDemoV2 -  ---- 列出带有乐器的歌手：\nINFO : HibernateDemoV2\
  \ - 歌手 - ID: 1, 名: John, 姓: Mayer, 生日: 1977-10-16\nINFO : HibernateDemoV2 -    专辑\
  \ - ID: 1, 歌手 ID: 1, 标题: The Search For Everything, 发行日期: 2017-01-20\nINFO : HibernateDemoV2\
  \ -    专辑 - ID: 2, 歌手 ID: 1, 标题: Battle Studies, 发行日期: 2009-11-17\nINFO : HibernateDemoV2\
