  ### 使用 Spring Data JPA 的注意事项


  利用 Spring Data JPA 的 Repository 抽象有助于简化 JPA 应用程序的开发。Spring Boot 可以进一步简化开发，但自定义配置可能需要一些学习成本。再次引用《我爱露西》中“终于到巴黎”这一集，**第**
  **6** **章**介绍过，Spring Data JPA 是链条中的最后一个翻译器。它的工作基于其前的翻译器：JDBC 驱动、JPA 和 Hibernate（以及类似的
  Oracle TopLink 等），它使得编写 Kotlin 代码访问数据变得最为简单，因为它专注于业务逻辑，隐藏了技术复杂性和样板代码。所有这些技术层共同使得实现持久层变得相当简单和快速。Spring
  Data JPA 在自定义事务行为方面也带来了一些简便性。所有这些使得这一组合非常流行，尤其适用于大型企业项目，因为对于小型项目来说，它们可能过于复杂。此外，项目中引入的技术越多，开发者的学习曲线就越陡峭，并且在技术衔接处引入的故障点也越多。


  到目前为止，本章已经介绍了 Spring Data JPA 仓库的核心概念和接口。JPA 适用于处理规范化的 SQL 数据库。那么，当处理非结构化、非强关系型且不适合
  SQL 数据库的数据时，又该如何呢？Spring Data 是否为此提供了解决方案？当然有！你可以在下一节中了解相关内容。


  ## Spring Data 与 MongoDB^(⁹⁵)


  几乎所有数据在某种程度上都是关系型的，多年来，通过外键等概念表示这些关系的 SQL 数据库一直主导着行业。然而，为了减少重复和存储成本而组织数据，在处理数据时会引入延迟，因为必须考虑关系。随着数据量的增长，描述关系的元数据量也会增长，操作会变得更慢。关系型数据库非常适合完成涉及大量表、复杂且庞大的查询，以及事务性操作至关重要（ACID）且速度并非总是必需的任务。其他好的用例包括大型级联删除以及维护关系和数据完整性。


  在这个互联网新时代，速度是最常见的要求。SQL 数据库虽然在存储数据方面高效，并且在请求时提供数据非常精确和一致，但并不适合速度比数据完整性更重要的互联网服务。当你的数据不是强结构化的、数据关系不深、需要短时间保存数据（缓存）或查询不太复杂时，NoSQL
  数据库就很有用。例如，eBay 使用 MongoDB，亚马逊使用 DynamoDB，这是一个为满足其自身商业需求而创建的 NoSQL 数据库，被认为是最适合购物网站的
  NoSQL 数据库，因为它在亚马逊云中高度可定制、快速且可无限扩展。


  因此，NoSQL 数据库的出现是为了满足快速获取数据的需求，即使数据并非总是一致。例如，当你访问亚马逊购物网站时，你不会期望立即看到最新的产品，但你最终会看到它们。此外，由于是非关系型的，NoSQL
  数据库存在一些数据重复，因此数据完整性次于检索速度。


  你需要记住的另一件事是，关系型数据库并不是真实系统的很好模型。它们迫使你在开始编写与数据库交互的代码之前就声明完整的数据结构，并且之后进行修改很棘手，这是一个问题，因为在现实生活中变化是不断发生的。NoSQL
  的主要优势在于，除了每条记录的主标识符外，其他所有内容都可以在以后轻松修改。亚马逊的 DynamoDB 在这方面更进一步，因为除了主键之外，记录中所有其他列（称为*属性*）都可以因记录而异。不幸的是，这种灵活性水平意味着编写一个用于处理
  DynamoDB 的 Spring Data 库几乎是不可能的。


  由于 NoSQL 数据库已被广泛使用，因此增加一节关于 Spring 如何帮助与它们交互的内容是合适的。Spring 提供了相当多的用于处理 NoSQL 数据库的数据库，但我们最喜欢的是
  MongoDB^(⁹⁶)，它提供了经典和响应式 API。除此之外，还支持 Apache Cassandra^(⁹⁷)（一个开源 NoSQL 数据库，能够快速处理海量数据）、Couchbase^(⁹⁸)（一个现代云数据库，在高度可扩展和可用的平台上为关键业务应用提供强大的功能）和
  Redis^(⁹⁹)（一个开源、BSD 许可的内存数据结构存储，用作数据库、缓存和消息代理）。


  最近，由于人们已经清楚完全非关系型的数据并不存在，NoSQL 这个术语的含义正逐渐从“非 SQL”转变为“不仅仅是 SQL”。因此，请随意探索 NoSQL 数据领域，因为你很可能会最终使用到这些数据库之一。




  ### MongoDB 概念


  在本节中，你可以在自己的计算机上安装 MongoDB，但推荐的方式是使用 Docker，并按照 `chapter10-mongo` 项目中 `CHAPTER10-MONGO.adoc`
  文件的建议设置容器。当然，你也可以完全跳过这一步，直接运行使用 Testcontainers MongoDB 容器的测试。


  ![](img/524962_1_En_10_Fign_HTML.jpg) 水平线上火焰的插图。 若要将 MongoDB 用于商业项目，你必须购买付费方案。如果不想这样做，请使用更符合商业许可要求的产品，例如
  Apache Cassandra。不过，两者的使用模式相似。因此，阅读并理解本书中关于 MongoDB 的部分，无论选择哪种方式都会有所帮助。


  MongoDB 是一种面向文档的 NoSQL 数据库，用于存储大量数据。与传统关系型数据库使用表和行不同，MongoDB 使用集合和文档。集合中的文档不像表中的所有行那样具有固定的结构。


  虽然我们已经提到 NoSQL 数据库的优势，但为了保持一致性，`Singer` 类被映射到一个名为 `singers` 的 MongoDB 集合。在 Spring
  中，这是通过使用 `org.springframework.data.mongodb.core.mapping` 包中的 `@Document` 注解标注 `Singer`
  类来实现的。该注解可用于配置与类名不同的集合名称，因为 MongoDB 的标准是使用文档类型的复数形式来命名集合。


  `Singer` 类如代码清单 10-40 所示。


  ```

  package com.apress.prospring6.ten.document

  import org.springframework.data.mongodb.core.index.Indexed

  import org.springframework.data.mongodb.core.mapping.Document

  import org.springframework.data.mongodb.core.mapping.MongoId

  import java.time.LocalDate

  @Document(collection = "singers")

  class Singer {

  @MongoId

  var id: String? = null

  @Indexed

  var firstName: String? = null

  @Indexed

  var lastName: String? = null

  var birthDate: LocalDate? = null

  constructor() {}

  constructor(firstName: String?, lastName: String?, birthDate: LocalDate?) {

  this.firstName = firstName

  this.lastName = lastName

  this.birthDate = birthDate

  }

  override fun toString(): String {

  return "Singer{" +

  "id=''" + id + ''\'''' +

  ", firstName=''" + firstName + ''\'''' +

  ", lastName=''" + lastName + ''\'''' +

  ", birthDate=" + birthDate +

  ''}''

  }

  }

  代码清单 10-40

  配置为 MongoDB 文档的 Singer 类

  ```


  MongoDB 要求所有文档都必须有一个 `_id` 字段。使用 Spring Data 时，映射到该字段的属性需要使用 `org.springframework.data.mongodb.core.mapping`
  包中的 `@Id` 或 `@MongoId` 注解进行标注。`@MongoId` 注解本身被 `@Id` 元注解标注，虽然此处使用它只是为了明确表示该类映射到
  MongoDB 文档，但它提供了使用 `@MongoId()` 配置字段类型的可能性。当这样注解时，Spring Data 会尝试将值转换为声明的类型。


  `@Indexed` 注解告诉映射框架在该文档属性上调用 `createIndex(...)`，从而加快搜索速度。


  如果文档中字段的名称需要与 Kotlin 类中的名称不同，你可以使用 `@Field` 注解来配置所需的值。


  在 Spring 中，类型与 MongoDB 表示形式之间的映射是通过一组内置转换器完成的。这就是为什么我们可以声明 `LocalDate birthDate`
  字段而无需任何转换注解的原因。


  现在我们有了一个文档，下一步是创建一个用于处理歌手实例的仓库。该方法与 Spring Data JPA 中展示的方法类似。在 Spring Data MongoDB
  中，有一个 `MongoRepository<T, ID>` 接口，它是 `org.springframework.data.repository` 包中 `CrudRepository<T,
  ID>` 接口的扩展（还有一个响应式版本，但将在**第** **20** **章**中详细介绍），我们的 `SingerRepository` 接口必须扩展该接口。`SingerRepository`
  接口如代码清单 10-41 所示。


  ```

  package com.apress.prospring6.ten.repos

  import com.apress.prospring6.ten.document.Singer

  import org.springframework.data.mongodb.repository.MongoRepository

  import org.springframework.data.mongodb.repository.Query

  import org.springframework.data.repository.query.Param

  import java.time.LocalDate

  interface SingerRepository : MongoRepository {

  fun findByFirstName(firstName: String): Iterable

  @Query("{''firstName'' : ?0, ''lastName'' : ?1}")

  fun findByPositionedParams(fn: String, ln: String): Iterable

  @Query("{''firstName'' : :#{#fn}, ''lastName'' : :#{#ln}}")

  fun findByNamedParams(

  @Param("fn") fn: String,

  @Param("ln") ln: String

  ): Iterable

  }

