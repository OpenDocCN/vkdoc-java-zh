  ### 使用可组合切点


  在之前的切点示例中，我们为每个 `Advisor` 只使用了一个切点。大多数情况下，这通常就足够了，但在某些情况下，你可能需要将两个或多个切点组合在一起以实现预期目标。假设你想对一个
  Bean 的所有 getter 和 setter 方法进行切点。你有一个针对 getter 的切点和一个针对 setter 的切点，但没有一个同时涵盖两者的切点。当然，你可以用新逻辑再创建一个切点，但更好的方法是使用
  `ComposablePointcut` 将这两个切点组合成一个切点。


  `ComposablePointcut` 支持两个方法：`union()` 和 `intersection()`。默认情况下，`ComposablePointcut`
  创建时带有一个匹配所有类的 `ClassFilter` 和一个匹配所有方法的 `MethodMatcher`，不过你也可以在构造期间提供自己的初始 `ClassFilter`
  和 `MethodMatcher`。`union()` 和 `intersection()` 方法都被重载，可以接受 `ClassFilter` 和 `MethodMatcher`
  参数。


  `ComposablePointcut.union()` 方法可以通过传入 `ClassFilter`、`MethodMatcher` 或 `Pointcut`
  接口的实例来调用。联合操作的结果是，`ComposablePointcut` 会在其调用链中添加一个“或”条件来匹配连接点。`ComposablePointcut.intersection()`
  方法也是如此，但这次添加的是“与”条件，这意味着 `ComposablePointcut` 中的所有 `ClassFilter`、`MethodMatcher`
  和 `Pointcut` 定义都必须匹配，才能应用通知。你可以将其想象为 SQL 查询中的 `WHERE` 子句，`union()` 方法类似于“或”运算符，而
  `intersection()` 方法类似于“与”运算符。


  与控制流切点一样，这很难直观理解，通过一个示例来理解会容易得多。清单 5-33 展示了之前示例中使用的 `GrammyGuitarist` 类及其四个方法。


  ```

  package com.apress.prospring6.five.common

  // 其他导入语句已省略

  open class GrammyGuitarist : Singer {

  override fun sing() {

  LOGGER.info(

  """

  sing: Gravity is working against me

  And gravity wants to bring me down

  """.trimIndent()

  )

  }

  open fun sing(guitar: Guitar) {

  LOGGER.info("play: " + guitar.play())

  }

  open fun talk() {

  LOGGER.info("talk")

  }

  override fun rest() {

  LOGGER.info("zzz")

  }

  companion object {

  private val LOGGER = LoggerFactory.getLogger(GrammyGuitarist::class.java)

  }

  }

  清单 5-33

  GrammyGuitarist 实现

  ```


  在这个示例中，我们将使用同一个 `ComposablePointcut` 实例生成三个代理，但每次我们都会使用 `union()` 或 `intersection()`
  方法来修改 `ComposablePointcut`。然后，我们将在目标 Bean 代理上调用所有三个方法，并查看哪些方法已被通知。清单 5-34 描述了这一点。


  ```

  package com.apress.prospring6.five

  import org.springframework.aop.support.ComposablePointcut

  import org.springframework.aop.support.StaticMethodMatcher

  // 其他导入语句已省略

  object ComposablePointcutDemo {

  private val LOGGER = LoggerFactory.getLogger(ComposablePointcutDemo::class.java)

  @JvmStatic

  fun main(args: Array) {

  val johnMayer = GrammyGuitarist()

  val pc = ComposablePointcut(ClassFilter.TRUE, SingMethodMatcher())

  LOGGER.info("测试 1 >> ")

  var proxy = getProxy(pc, johnMayer)

  testInvoke(proxy)

  LOGGER.info("测试 2 >> ")

  pc.union(TalkMethodMatcher())

  proxy = getProxy(pc, johnMayer)

  testInvoke(proxy)

  LOGGER.info("测试 3 >> ")

  pc.intersection(RestMethodMatcher())

  proxy = getProxy(pc, johnMayer)

  testInvoke(proxy)

  }

  private fun getProxy(pc: ComposablePointcut, target: GrammyGuitarist): GrammyGuitarist
  {

  val advisor: Advisor = DefaultPointcutAdvisor(pc, SimpleBeforeAdvice())

  val pf = ProxyFactory()

  pf.setTarget(target)

  pf.addAdvisor(advisor)

  return pf.proxy as GrammyGuitarist

  }

  private fun testInvoke(proxy: GrammyGuitarist) {

  proxy.sing()

  proxy.sing(Guitar())

  proxy.talk()

  proxy.rest()

  }

  }

  internal class SingMethodMatcher : StaticMethodMatcher() {

  override fun matches(method: Method, cls: Class): Boolean {

  return method.name.startsWith("si")

  }

  }

  internal class TalkMethodMatcher : StaticMethodMatcher() {

  override fun matches(method: Method, cls: Class): Boolean {

  return "talk" == method.name

  }

  }

  internal class RestMethodMatcher : StaticMethodMatcher() {

  override fun matches(method: Method, cls: Class): Boolean {

  return method.name.endsWith("st")

  }

  }

  清单 5-34

  测试 ComposablePointcut

  ```


  在这个示例中，首先要注意的是三个私有的 `MethodMatcher` 实现。`SingMethodMatcher` 匹配所有以 `si` 开头的方法。这是我们用来组装
  `ComposablePointcut` 的默认 `MethodMatcher`。因此，我们预计对 `GrammyGuitarist` 方法的第一轮调用将导致只有
  `sing()` 方法被通知。


  `TalkMethodMatcher` 匹配所有名为 `talk` 的方法，并且在第二轮调用中通过使用 `union()` 与 `ComposablePointcut`
  组合。此时，我们有了两个 `MethodMatcher` 的联合：一个匹配所有以 `si` 开头的方法，另一个匹配所有名为 `talk` 的方法。我们现在预计第二轮中的所有调用都将被通知。`TalkMethodMatcher`
  非常具体，只匹配 `talk()` 方法。在第三轮调用中，这个 `MethodMatcher` 通过使用 `intersection()` 与 `ComposablePointcut`
  组合。


  由于 `RestMethodMatcher` 是通过使用 `intersection()` 组合的，我们预计第三轮中没有任何方法会被通知，因为没有方法能匹配所有组合的
  `MethodMatcher`。


