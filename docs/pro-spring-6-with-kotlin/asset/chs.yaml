  你可能已经注意到，`personalSite` 字段从 `String` 到 [`java.net`](http://java.net)`.URL` 的转换是自动完成的。这是因为
  Spring 默认注册了一组转换器，用于处理最常见的开发用例（例如，从表示逗号分隔列表项的字符串转换为 `Array`，从 `List` 转换为 `Set` 等）。


  借助 Spring 的类型转换服务，你可以轻松创建自定义转换器，并在应用程序的任何层执行转换。一个可能的用例是，你有两个系统包含相同的博主信息需要更新，但数据库结构不同（例如，系统
  A 有两个字段名，而系统 B 只有一个字段等）。你可以在持久化到各个系统之前，使用类型转换系统来转换对象。


  从 Spring 3.0 开始，Spring MVC 大量使用了转换服务（以及下一节讨论的 Formatter SPI）。在 Web 应用程序上下文配置中，使用
  `@EnableWebMvc`（Spring 3.1 引入）注解的 Java/Kotlin 配置类会自动注册所有默认转换器（例如，`StringToArrayConverter`、`StringToBooleanConverter`
  和 `StringToLocaleConverter`，它们都位于 `org.springframework.core.convert.support` 包下）和格式化器（例如，`CurrencyStyleFormatter`、`DateFormatter`
  和 `AbstractNumberFormatter`，它们都位于 `org.springframework.format` 包下的各个子包中）。更多细节将在**第**
  **14** **章**讨论 Spring Web 应用程序开发时介绍。


  ## Spring 中的字段格式化


  除了类型转换系统，Spring 为开发者带来的另一个重要特性是 Formatter SPI。正如你所料，这个 SPI 可以帮助配置字段格式化方面。在 Formatter
  SPI 中，实现格式化器的主要接口是 `org.springframework.format.Formatter<T>` 接口。Spring 提供了几种常用类型的实现，包括
  `CurrencyStyleFormatter`、`DateFormatter`、`AbstractNumberFormatter` 和 `PercentStyleFormatter`。




  ### 实现自定义格式化器


  实现自定义格式化器也很简单。我们将使用相同的 `Blogger` 记录，但不再使用转换器，而是实现一个自定义格式化器，用于将 `birthDate` 属性的 `LocalDate`
  类型与 `String` 类型进行相互转换。这需要继承 Spring 的 `org.springframework.format.support.FormattingConversionServiceFactoryBean`
  类，并提供我们自定义的格式化器。`FormattingConversionServiceFactoryBean` 类是一个工厂类，它提供了便捷的方式来访问底层的
  `FormattingConversionService` 类，该类支持类型转换系统，并根据为每个字段类型定义的格式化规则进行字段格式化。


  在清单 11-12 中，你可以看到一个自定义类，它继承了 `FormattingConversionServiceFactoryBean` 类，并为格式化 Java
  的 `LocalDate` 类型定义了一个自定义格式化器。请注意，该格式化器可以通过日期模式进行配置。


  ```

  package com.apress.prospring6.eleven.formatter.factory

  import org.springframework.format.Formatter

  import org.springframework.format.support.FormattingConversionServiceFactoryBean

  // 其他 import 语句已省略

  @Service("conversionService")

  class ApplicationConversionServiceFactoryBean :

  FormattingConversionServiceFactoryBean() {

  private var dateTimeFormatter: DateTimeFormatter? = null

  @set:Autowired(required = false)

  var datePattern = DEFAULT_DATE_PATTERN

  private val formatters: MutableSet> = mutableSetOf()

  @PostConstruct

  fun init() {

  dateTimeFormatter = DateTimeFormatter.ofPattern(datePattern)

  formatters.add(getDateTimeFormatter())

  setFormatters(formatters)

  }

  private fun getDateTimeFormatter(): Formatter {

  return object : Formatter {

  @Throws(ParseException::class)

  override fun parse(source: String, locale: Locale): LocalDate {

  LOGGER.info("正在解析日期字符串: $source")

  return LocalDate.parse(source, dateTimeFormatter)

  }

  override fun print(source: LocalDate, locale: Locale): String {

  LOGGER.info("正在格式化日期时间: $source")

  return source.format(dateTimeFormatter)

  }

  }

  }

  companion object {

