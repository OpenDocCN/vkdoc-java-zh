  你可能在第六章 6 引入 Testcontainers 时就已经注意到，现在可能更加明显的是，使用这个库编写测试是多么实用。在大多数情况下，特别是对于像本书中这样的小型演示性应用程序，可以重用类似生产环境的\
  \ Spring 配置，而无需为测试上下文引入不同的配置文件和额外的配置。\n\n\n\n## 插入数据\n\n使用 Hibernate 插入数据同样简单，获取数据库生成的主键也是如此。在**第\
  \ 6 章**中使用纯 JDBC 时，我们需要显式声明要检索数据库生成的主键，传入 `KeyHolder` 实例，并在执行 INSERT 语句后从中获取该键。而使用\
  \ Hibernate 时，这些操作都不需要。Hibernate 会在插入操作后检索生成的主键并填充领域对象。清单 7-20 展示了使用 Hibernate 的\
  \ `SessionFactory` 实现的 `save(..)` 方法。\n\n```\npackage com.apress.prospring6.seven.base.dao\n\
  // 导入语句已省略\n@Transactional\n@Repository(\"singerDao\")\nclass SingerDaoImpl(private\
  \ val sessionFactory: SessionFactory) : SingerDao {\n// 其他代码已省略\n@Transactional\n\
  override fun save(singer: Singer): Singer {\nval session = sessionFactory.currentSession\n\
  if (singer.id == null) {\nsession.persist(singer)\n} else {\nsession.merge(singer)\n\
  }\nLOGGER.info(\"Singer saved with id: \" + singer.id)\nreturn singer\n}\n}\n清单\
  \ 7-20\nSingerDaoImpl.save(..) 方法\n```\n\n我们在实现中添加了一条日志语句，用于打印 `singer.id` 字段，该字段由\
  \ Hibernate 在对象持久化后填充。回想一下，当我们声明 `Singer` 实体类时，我们声明了它与 `Album` 类的 `@OneToMany` 关联以及与\
  \ `Instrument` 类的 `@ManyToMany` 关联。你认为，一个填充了 `albums` 和 `instruments` 字段的 `Singer`\
