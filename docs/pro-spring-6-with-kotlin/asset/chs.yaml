  ## 探索 JDBC 基础设施


  JDBC 为 Java/Kotlin 应用程序提供了一种访问数据库中存储数据的标准方式。JDBC 基础设施的核心是每个数据库特有的驱动程序；正是这个驱动程序允许
  Kotlin 代码访问数据库。


  一旦驱动程序被加载，它就会向 `java.sql.DriverManager` 类注册自己。该类管理一个驱动程序列表，并提供用于建立数据库连接的静态方法。`DriverManager`
  的 `getConnection()` 方法返回一个由驱动程序实现的 `java.sql.Connection` 接口。该接口允许你对数据库运行 SQL 语句。


  JDBC 框架相当复杂且经过充分测试；然而，这种复杂性也带来了开发上的困难。第一层复杂性在于确保你的代码管理好数据库连接。连接是一种稀缺资源，建立连接的成本非常高。通常，数据库会为每个连接创建一个线程或派生一个子进程。此外，并发连接的数量通常是有限的，打开过多的连接会拖慢数据库。


  我们将向你展示 Spring 如何帮助管理这种复杂性，但在进一步深入之前，我们需要向你展示如何在纯 JDBC 中执行选择、删除和更新数据操作。


  如前所述，Kotlin 应用程序需要一个连接实例来与数据库通信并检索或发送数据。该实例的类型由项目类路径上的驱动程序提供。在我们的案例中，通过在 Gradle
  配置中将 `mariadb-java-client.jar` 声明为依赖项，已将 MariaDB 驱动程序添加到类路径中。清单 6-4 展示了 `CoreDao`
  代码，其中包含两个默认方法，一个用于获取连接，另一个用于关闭连接，任何直接或间接实现此接口的类型都会继承这两个方法。


  ```

  package com.apress.prospring6.six.dao

  import java.sql.Connection

  import java.sql.DriverManager

  import java.sql.SQLException

  interface CoreDao {

  @get:Throws(SQLException::class)

  val connection: Connection?

  get() = DriverManager.getConnection(

  "jdbc:mariadb://localhost:3306/musicdb?useSSL=false",

  "prospring6", "prospring6"

  )

  @Throws(SQLException::class)

  fun closeConnection(connection: Connection?) {

  if (connection == null) {

  return

  }

  connection.close()

  }

  }

