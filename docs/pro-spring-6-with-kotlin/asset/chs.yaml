  ### Spring Data 项目：JDBC 扩展


  近年来，随着众多专用数据库的兴起，数据库技术发展迅速，如今关系型数据库管理系统（RDBMS）已不再是应用程序后端数据库的唯一选择。为了应对这种数据库技术的演进以及开发者社区的需求，Spring
  创建了 Spring Data 项目^(⁵¹)。该项目的主要目标是在 Spring 核心数据访问功能之上提供有用的扩展，以便与传统 RDBMS 之外的数据库进行交互。


  Spring Data 项目提供了多种扩展。我们在此要介绍的是 JDBC 扩展^(⁵²)。顾名思义，该扩展提供了一些高级特性，以简化使用 Spring 开发 JDBC
  应用程序的过程。JDBC 扩展提供的主要功能如下：


  *   *QueryDSL 支持*：QueryDSL^(⁵³) 是一种领域特定语言，为开发类型安全的查询提供了框架。Spring Data 的 JDBC 扩展提供了
  `QueryDslJdbcTemplate`，以便使用 `QueryDSL` 而非 SQL 语句来开发 JDBC 应用程序。


  *   *对 Oracle 数据库的高级支持*：该扩展为 Oracle 数据库用户提供了高级特性。在数据库连接方面，它支持 Oracle 特定的会话设置，以及在使用
  Oracle RAC 时的快速连接故障转移技术。它还提供了与 Oracle 高级队列集成的类。在数据类型方面，它为 Oracle 的 XML 类型、`STRUCT`
  和 `ARRAY` 等提供了原生支持。


  如果你正在使用 Spring 和 Oracle 数据库开发 JDBC 应用程序，那么 JDBC 扩展确实值得一看。


  ### Spring JDBC 测试注解


  在**第** **4** **章**中，你已经了解了一些测试注解。其中一些显然与数据访问上下文相关。`@Sql`、`@SqlConfig`、`@SqlGroup`
  和 `@SqlMergeMode` 属于 `org.springframework.test.context.jdbc` 包，适用于测试纯 Spring JDBC
  实现。在本章中，所有测试方法都设计为构建自己的应用程序上下文，以保持配置清晰。所有使用内存数据库的测试方法都可以编写为共享相同的测试上下文，并使用这些专门的注解为每个测试方法进行定制。


  让我们从 `@Sql` 开始。此注解用于标注测试类或测试方法，以配置在集成测试期间针对给定数据库执行的 SQL 脚本和语句。此注解可用于纯 JDBC，也可用于使用持久化或事务的更复杂应用程序。`@Sql`
  可用于测试类，这意味着使用它配置的语句或脚本将应用于该类中的每个测试方法。列表 6-54 展示了一个测试类，其中包含一个针对 `findAll()` 方法的测试方法。


  ```

  package com.apress.prospring6.six.repo

  import org.junit.jupiter.api.DisplayName

  import org.junit.jupiter.api.Test

  import org.springframework.jdbc.datasource.embedded.EmbeddedDatabaseBuilder

  import org.springframework.jdbc.datasource.embedded.EmbeddedDatabaseType

  import org.springframework.test.context.jdbc.Sql

  import org.springframework.test.context.jdbc.SqlMergeMode

  import org.springframework.test.context.junit.jupiter.SpringJUnitConfig

  // other imports omitted

  @SqlMergeMode(SqlMergeMode.MergeMode.MERGE)

  @Sql("classpath:h2/drop-schema.sql", "classpath:h2/create-schema.sql")

  @SpringJUnitConfig(classes = [EmptyEmbeddedJdbcConfig::class, SingerJdbcRepo::class])

  class JdbcRepoTest {

  @Autowired

  var singerRepo: SingerRepo? = null

  @Test

  @DisplayName("should return all singers")

  @Sql(

  value = ["classpath:h2/test-data.sql"],

  config = SqlConfig(encoding = "utf-8", separator = ";", commentPrefix = "--")

  )

  fun testFindAllWithMappingSqlQuery() {

  val singers = singerRepo!!.findAll()

  Assertions.assertEquals(3, singers.size)

  singers.forEach(Consumer { singer: Singer ->

  LOGGER.info(

  singer.toString()

  )

  })

  }

  @Configuration

  open class EmptyEmbeddedJdbcConfig {

  @Bean

  open fun dataSource(): DataSource? {

  return try {

  val dbBuilder = EmbeddedDatabaseBuilder()

  dbBuilder.setType(EmbeddedDatabaseType.H2).setName("musicdb").build()

  } catch (e: Exception) {

  LOGGER.error("Embedded DataSource bean cannot be created!", e)

  null

  }

  }

  companion object {

  private val LOGGER =

  LoggerFactory.getLogger(EmptyEmbeddedJdbcConfig::class.java)

  }

  }

