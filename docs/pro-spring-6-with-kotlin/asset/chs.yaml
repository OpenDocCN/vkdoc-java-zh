  清单 20-9\n响应式仓库测试类控制台日志\n```\n\n该控制台日志显示了线程标识符，并清晰地表明仓库操作是在不同的线程上执行的，这符合响应式组件的预期。\n\
  \n这一切都很好，但我们可以检查错误行为吗？我们如何检查一个没有 `lastName` 的 `Singer` 对象无法保存到表中？从技术上讲，这种情况不应该发生，因为我们期望\
  \ Spring 验证能够阻止此类对象作为参数传递给仓库 bean，但仅作为示例，我们来尝试一下。`StepVerifier` 为此提供了几个方法：`verifyError*()`\
  \ 系列方法允许开发者检查操作是否以错误结束，以及该错误的特征是什么。例如，在清单 20-10 中，我们检查尝试保存一个没有 `lastName` 的 `Singer`\
  \ 对象是否会失败，并抛出 `TransientDataAccessResourceException` 异常。\n\n```\nimport org.springframework.dao.TransientDataAccessResourceException\n\
  ...\n@Test // 负面测试，lastName 为 null，这是不允许的\nfun testFailedCreateSinger() {\nsingerRepo!!.save(\n\
  Singer().apply {\nfirstName = \"Test\"\nbirthDate = LocalDate.now()\n}\n)\n.log()\n\
  .`as`{ publisher: Mono ->\nStepVerifier.create(\npublisher\n)\n}\n.verifyError(TransientDataAccessResourceException::class.java)\n\
  }\n清单 20-10\n检查失败的执行\n```\n\n现在我们有了一个响应式数据仓库，我们可以用它来构建一个响应式服务。\n\n\n\n### 响应式服务\n\
  \n响应式服务类在此场景中并无特殊之处；它仅转发来自响应式仓库的返回对象，并将底层数据处理异常替换为服务层范围的异常。在实际实现中，服务方法可能会通过添加自己的处理器函数，对仓库方法返回的数据应用更多转换，正如本章开头所示。\n\
  \n清单 20-11 展示了 `SingerService` 接口，即我们响应式服务的模板。\n\n```\npackage com.apress.prospring6.twenty.boot.service\n\
  // 导入语句已省略\ninterface SingerService {\nfun findAll(): Flux\nfun findById(id: Long):\
  \ Mono\nfun findByFirstNameAndLastName(firstName: String, lastName: String): Mono\n\
  fun findByFirstName(firstName: String): Flux\nfun findByCriteriaDto(criteria: CriteriaDto):\
  \ Flux\nfun save(singer: Singer): Mono\nfun update(id: Long, updateData: Singer):\
  \ Mono\nfun delete(id: Long): Mono\n}\n清单 20-11\n描述响应式服务类模板的 SingerService 接口\n\
  ```\n\n请注意，所有方法都返回响应式类型，这正是使其成为真正能够与响应式仓库和响应式控制器交互、且不阻碍数据流的响应式服务的关键所在。\n\n实现此接口的\
  \ `SingerServiceImpl` 类如清单 20-12 所示。\n\n```\npackage com.apress.prospring6.twenty.boot.service\n\
  // 导入语句已省略\nimport java.time.LocalDate\nimport java.time.format.DateTimeFormatter\n\
  @Transactional\n@Service\nopen class SingerServiceImpl : SingerService {\nprivate\
  \ val singerRepo: SingerRepo? = null\noverride fun findAll(): Flux {\nreturn singerRepo!!.findAll()\n\
  }\noverride fun findByCriteriaDto(criteria: SingerService.CriteriaDto): Flux {\n\
  val fieldName = SingerService.FieldGroup.getField(criteria.fieldName!!.uppercase())\n\
  return when (fieldName) {\nSingerService.FieldGroup.FIRSTNAME -> if (\"*\" == criteria.fieldValue)\
  \ singerRepo!!.findAll() else singerRepo!!.findByFirstName(\ncriteria.fieldValue!!\n\
  )\nSingerService.FieldGroup.LASTNAME -> if (\"*\" == criteria.fieldValue) singerRepo!!.findAll()\
  \ else singerRepo!!.findByLastName(\ncriteria.fieldValue!!\n)\nSingerService.FieldGroup.BIRTHDATE\
  \ -> if (\"*\" == criteria.fieldValue) singerRepo!!.findAll() else singerRepo!!.findByBirthDate(\n\
  LocalDate.parse(criteria.fieldValue!!, DateTimeFormatter.ofPattern(\"yyyy-MM-dd\"\
  ))\n)\n}\n}\noverride fun findByFirstNameAndLastName(firstName: String, lastName:\
  \ String): Mono {\nreturn singerRepo!!.findByFirstNameAndLastName(firstName, lastName)\n\
  }\noverride fun findById(id: Long): Mono {\nreturn singerRepo!!.findById(id)\n}\n\
  override fun findByFirstName(firstName: String): Flux {\nreturn singerRepo!!.findByFirstName(firstName)\n\
  }\noverride fun save(singer: Singer): Mono {\nreturn singerRepo!!.save(singer)\n\
  .onErrorMap { error: Throwable ->\nSaveException(\n\"无法保存歌手 $singer\",\nerror\n\
  )\n}\n}\noverride fun update(id: Long, updateData: Singer): Mono {\nreturn singerRepo!!.findById(id)\n\
  .flatMap{ original: Singer ->\noriginal.firstName = updateData.firstName\noriginal.lastName\
  \ = updateData.lastName\noriginal.birthDate = updateData.birthDate\nsingerRepo.save(original)\n\
  .onErrorMap { error: Throwable? ->\nSaveException(\n\"无法更新歌手 $updateData\",\nerror\n\
  )\n}\n}\n}\noverride fun delete(id: Long): Mono {\nreturn singerRepo!!.deleteById(id)\n\
  }\n}\n清单 20-12\nSingerServiceImpl 响应式服务类与 Bean 定义\n```\n\n`SingerServiceImpl` 类相当简单，自身逻辑很少，主要围绕搜索功能和\
  \ `Singer` 对象的更新。\n\n`SaveException` 只是一个简单的类，继承自 `RuntimeException`，它包装了 Spring\
  \ Data 异常，以提供关于异常产生上下文的更多信息。\n\n这里需要注意的另一件事是，此服务是事务性的。那么，事务在响应式应用程序中是如何工作的呢？它们的工作方式与命令式应用程序基本相同，但功能基于不同的组件。\n\
  \n响应式应用程序中的事务与命令式应用程序中的目的相同：将多个数据库操作分组到一个多步骤操作中，仅当所有步骤都成功时，该操作才成功；否则，失败步骤之前的任何成功步骤都会被回滚。在\
  \ Spring 应用程序中，迭代式和响应式事务管理由 `PlatformTransactionManager` 启用，它管理事务资源的事务，并通过使用 Spring\
  \ 的 `@Transactional`（来自 `org.springframework.transaction.annotation` 包）注解将资源标记为事务性。然而，在较低层面上，情况略有不同。\n\
  \n事务管理需要将其事务状态与执行相关联。在命令式编程中，这通常是 `java.lang.ThreadLocal` 存储，因此事务状态绑定到 Spring 容器开始执行代码的\
  \ `Thread`。在响应式应用程序中，这不适用，因为响应式执行需要多个线程。解决方案是引入 `ThreadLocal` 存储的响应式替代方案，而 Reactor\
  \ 的 `reactor.util.context.Context` 类型上下文允许将上下文数据绑定到特定的执行，对于响应式编程，这是一个 `Subscription`\
  \ 对象。Project Reactor 的 `Context` 接口允许 Spring 将事务状态以及所有资源和同步绑定到特定的 `Subscription`。所有使用\
  \ Project Reactor 的响应式代码现在都可以参与响应式事务。\n\n从 Spring Framework 5.2 M2 开始，Spring 通过\
  \ `ReactiveTransactionManager` SPI 支持响应式事务管理。`org.springframework.transaction.ReactiveTransactionManager`\
  \ 是一个用于响应式和非阻塞集成的事务管理抽象，它使用事务资源。它是返回 `Publisher<T>` 类型的响应式 `@Transactional` 方法以及使用\
  \ `TransactionalOperator` 进行编程式事务管理的基础。Spring Data R2DBC 在 `org.springframework.r2dbc.connection`\
  \ 包中提供了 `R2dbcTransactionManager`，它实现了 `ReactiveTransactionManager`。\n\n图 20-4 展示了\
  \ `org.springframework.transaction.TransactionManager` 的命令式和响应式接口与类层次结构。\n\n![](img/524962_1_En_20_Fig4_HTML.jpg)\n\
  \n一张图表将事务管理器分为两部分。平台事务管理器包含资源和抽象平台事务管理器，其后是 Hibernate 和 JPA。响应式事务管理器包含抽象响应式事务管理器，其后是\
  \ R2DBC 和 Reactive Mongo。\n\n图 20-4\n\n`TransactionManager` 命令式与响应式层次结构对比\n\n在图\
  \ 20-4 中，也包含了 `ReactiveMongoTransactionManager`，因为 `pro-spring-6` 项目的类路径中有 `spring-data-mongodb`。该类是\
  \ MongoDB 的响应式事务管理器，负责管理事务，以便在托管事务内执行的代码参与多文档事务。\n\n`R2dbcTransactionManager` 包装了一个到数据库的响应式连接来执行其工作，该连接由\
  \ R2DBC 驱动程序提供。在 Spring Boot 应用程序中，配置相当简单，如清单 20-13 所示。\n\n\n\n```\npackage com.apress.prospring6.twenty.boot\n\
  import io.r2dbc.spi.ConnectionFactory\nimport org.springframework.r2dbc.connection.R2dbcTransactionManager\n\
  import org.springframework.transaction.ReactiveTransactionManager\nimport org.springframework.transaction.annotation.EnableTransactionManagement\n\
  // 其他导入语句已省略\n@EnableTransactionManagement\n@SpringBootApplication\nopen class Chapter20Application\
  \ {\n@Bean\nopen fun transactionManager(connectionFactory: ConnectionFactory): ReactiveTransactionManager\
  \ {\nreturn R2dbcTransactionManager(connectionFactory)\n}\ncompanion object {\n\
  val LOGGER = LoggerFactory.getLogger(Chapter20Application::class.java)\n@JvmStatic\n\
  fun main(args: Array) {\nSystem.setProperty(AbstractEnvironment.ACTIVE_PROFILES_PROPERTY_NAME,\n\
  \"dev\")\nSpringApplication.run(Chapter20Application::class.java, *args)\n}\n}\n\
  }\n清单 20-13\n配置 R2dbcTransactionManager\n```\n\n关于清单 20-13 中的示例，需要澄清两点：\n\n*   `@EnableTransactionManagement`\
  \ 注解是启用 Spring 注解驱动的事务管理能力所必需的，这意味着支持 `@Transactional` 注解。\n\n*   `ConnectionFactory`\
  \ Bean 并未显式声明。Spring Boot 会根据 `application.yaml`（或等效的 `application.properties`）中的配置创建此\
  \ Bean，并将其注入到任何需要的地方，在本例中即注入到我们的响应式事务管理 Bean 中。（Spring Boot 配置已在清单 20-6 中介绍过。）\n\
  \n虽然有些重复，但我们也可以为 `SingerServiceImpl` 编写一些测试。我们只需将此 Bean 添加到测试上下文中即可。清单 20-14 展示了\
  \ `SingerServiceImpl` 的几个测试方法。\n\n```\npackage com.apress.prospring6.twenty.boot.service\n\
  // 导入语句已省略\n@DataR2dbcTest\n@TestMethodOrder(MethodOrderer.OrderAnnotation::class)\n\
  @Import(\nSingerServiceImpl::class\n)\nclass SingerServiceTest : ReactiveDbConfigTests()\
  \ {\n@Autowired\nvar singerService: SingerService? = null\n@Order(2)\n@Test\nfun\
  \ testFindAll() {\nsingerService!!.findAll()\n.log()\n.`as`> { publisher: Flux ->\n\
  StepVerifier.create(\npublisher\n)\n}\n.expectNextCount(4)\n.verifyComplete()\n\
  }\n@Order(3)\n@Test\nfun testFindById() {\nsingerService!!.findById(1L)\n.log()\n\
  .`as`> { publisher: Mono ->\nStepVerifier.create(\npublisher\n)\n}\n.expectNextMatches\
  \ { s: Singer -> \"John\" == s.firstName &&\n\"Mayer\" == s.lastName }\n.verifyComplete()\n\
  }\n@Order(8)\n@Test\nfun testNoCreateSinger() {\nsingerService!!.save(\nSinger().apply\
  \ {\nfirstName = \"John\"\nlastName = \"Mayer\"\nbirthDate = LocalDate.now()\n}\n\
  )\n.log()\n.`as`> { publisher: Mono ->\nStepVerifier.create(\npublisher\n)\n}\n\
  .verifyError(SaveException::class.java)\n}\n@Order(9)\n@Test\nfun testUpdateSinger()\
  \ {\nsingerService!!.update(\n4L,\nSinger().apply {\nfirstName = \"Erik Patrick\"\
  \nlastName = \"Clapton\"\nbirthDate = LocalDate.now()\n}\n)\n.log()\n.`as`> { publisher:\
  \ Mono ->\nStepVerifier.create(\npublisher\n)\n}\n.expectNext(\nSinger().apply {\n\
  id = 4L\nfirstName = \"Erik Patrick\"\nlastName = \"Clapton\"\nbirthDate = LocalDate.now()\n\
  }\n)\n.verifyComplete()\n}\n@Order(10)\n@Test\nfun testUpdateSingerWithDuplicateData()\
  \ {\nsingerService!!.update(\n4L,\nSinger().apply {\nfirstName = \"John\"\nlastName\
  \ = \"Mayer\"\nbirthDate = LocalDate.now()\n}\n)\n.log()\n.`as`> { publisher: Mono\
  \ ->\nStepVerifier.create(\npublisher\n)\n}\n.verifyError(SaveException::class.java)\n\
  }\n@Order(11)\n@Test // 负面测试，lastName 为 null，这是不允许的\nfun testFailedCreateSinger()\
  \ {\nsingerService!!.update(\n4L,\nSinger().apply {\nfirstName = \"Test\"\nbirthDate\
  \ = LocalDate.now()\n}\n)\n.log()\n.`as`> { publisher: Mono ->\nStepVerifier.create(\n\
  publisher\n)\n}\n.verifyError(SaveException::class.java)\n}\n@Order(12)\n@Test\n\
  fun testDeleteSinger() {\nsingerService!!.delete(4L)\n.log()\n.`as`> { publisher:\
  \ Mono ->\nStepVerifier.create(\npublisher\n)\n}\n.expectNextCount(0)\n.verifyComplete()\n\
  }\n// 部分测试方法已省略\n}\n清单 20-14\n测试 SingerServiceImpl 响应式服务类\n```\n\n清单 20-14 还展示了用于检查是否抛出了服务层异常（而非\
  \ Spring Data 异常）的测试。底层异常的类型已在注释中说明。\n\n针对所有这些情况，我们选择使用 `onErrorMap(..)` 将异常转换为更有用的形式。然而，Project\
  \ Reactor 提供了六种方法来处理其响应式类型（`Mono<T>`、`Flux<T>`）上的错误，现列出并说明如下：\n\n*   `onErrorReturn(..)`:\
  \ 声明一个默认值，当处理器中抛出异常时发出该值。此方法不会以任何方式阻碍数据流；当处理有问题的元素时，会发出默认值，而流中的其余元素将正常处理。此方法有三种变体：\n\
  \    *   一种以要返回的值作为参数\n\n*   一种以要返回的值和应返回默认值的异常类型作为参数\n\n*   一种以要返回的值和一个用于匹配异常以返回默认值的谓词作为参数\n\
  \n*   `onErrorResume()`: 声明一个默认函数，用于在处理器中抛出异常时选择一个备用的 `Publisher<T>`。它也具有与 `onErrorReturn(..)`\
  \ 相同的三种变体。对于有问题的元素，会使用选定的 `Publisher<T>` 发出一个值，而流中的其余元素将正常处理。\n\n*   `onErrorContinue(..)`:\
  \ 声明一个消费者，用于在处理器中抛出异常时执行。此方法也具有与 `onErrorReturn(..)` 相同的三种变体，但不是返回值，而是执行消费者。它使用声明的消费者处理有问题的元素，并保持下游链对正常元素不变。\n\
  \n*   `doOnError(..)`: 消费错误并停止对流中后续元素的执行。它也具有与 `onErrorReturn(..)` 相同的三种变体，但在消费者执行后，错误会被传播并继续对流中后续元素执行。\n\
  \n*   `onErrorMap(..)`: 将一个错误转换为另一个错误，并停止对流中后续元素的执行。\n\n由于测试上下文中没有事务管理器，因此测试不是事务性的。通过一些服务测试足以证明响应式服务层也能正常工作，因此我们现在可以继续实现，添加响应式控制器。\n\
  \n\n\n### 响应式控制器\n\n如前所述，响应式控制器本质上就是包含返回 `Flux<T>` 和 `Mono<T>` 类型处理方法的一种控制器。这对于\
  \ REST 控制器来说是合理的，因为对于返回逻辑视图名称的控制器而言，响应式概念实际上既无意义，也不会带来任何好处。话虽如此，我们来看一下清单 20-15，它展示了一个用于管理\
  \ `Singer` 实例的 REST 控制器。\n\n```\npackage com.apress.prospring6.twenty.boot.controller\n\
  import org.springframework.http.HttpStatus\nimport org.springframework.http.ResponseEntity\n\
  import reactor.core.publisher.Flux\nimport reactor.core.publisher.Mono\n// 其他导入语句已省略\n\
  @RestController\n@RequestMapping(path = [\"/reactive/singer\"])\nclass ReactiveSingerController\
  \ {\nlateinit var singerService: SingerService\n/* 1 */\n@GetMapping(path = [\"\"\
  , \"/\"])\nfun list(): Flux {\nreturn singerService.findAll()\n}\n/* 3 */\n@GetMapping(path\
  \ = [\"/{id}\"])\nfun findById(@PathVariable id: Long): Mono> {\nreturn singerService.findById(id)\n\
  .map { s -> ResponseEntity.ok().body(s) }\n.defaultIfEmpty(ResponseEntity.notFound().build())\n\
  }\n/* 4 */\n@PostMapping\n@ResponseStatus(HttpStatus.CREATED)\nfun create(@RequestBody\
  \ singer: Singer): Mono {\nreturn singerService.save(singer)\n}\n/* 5 */\n@PutMapping(\"\
  /{id}\")\nfun updateById(@PathVariable id: Long, @RequestBody singer: Singer): Mono>\
  \ {\nreturn singerService.update(id, singer)\n.map { s -> ResponseEntity.ok().body(s)\
  \ }\n.defaultIfEmpty(ResponseEntity.badRequest().build())\n}\n/* 2 */\n@DeleteMapping(\"\
  /{id}\")\nfun deleteById(@PathVariable id: Long): Mono> {\nreturn singerService.delete(id)\n\
  .then(Mono.fromCallable{\nResponseEntity.noContent().build()\n})\n.defaultIfEmpty(ResponseEntity.notFound().build())\n\
  }\n/* 6 */\n@GetMapping(params = [\"name\"])\nfun searchSingers(@RequestParam(\"\
  name\") name: String): Flux {\nif (name.isBlank()) {\nthrow IllegalArgumentException(\"\
  缺少请求参数 'name'\");\n}\nreturn singerService.findByFirstName(name)\n}\n/* 7 */\n@GetMapping(params\
  \ = [\"fn\", \"ln\"])\nfun searchSinger(@RequestParam(\"fn\") fn: String, @RequestParam(\"\
  ln\") ln: String): Mono {\nif (fn.isBlank()) {\nthrow IllegalArgumentException(\"\
  缺少请求参数 'fn'\");\n}\nif (ln.isBlank()) {\nthrow IllegalArgumentException(\"缺少请求参数\
  \ 'ln'\");\n}\nreturn singerService.findByFirstNameAndLastName(fn, ln)\n}\n}\n清单\
  \ 20-15\nReactiveSingerController 类\n```\n\n除了返回类型（因为使用了响应式的 `SingerService`，所以这些返回类型是必需的）之外，这个控制器并没有什么特别之处。当你启动应用程序，并使用\
  \ `curl`、Postman、`HttpIE` 或浏览器（针对 GET 端点）等客户端测试 `reactive/singer` 端点时，你会注意到这个控制器的行为与非响应式控制器没有任何区别。这是因为这些客户端都不是响应式的，而且这个学术示例过于简单，无法真正观察到任何差异。\n\
  \n![](img/524962_1_En_20_Figf_HTML.jpg) 一个创意图标，带有灯泡符号。 你可以尝试生成大量随机数据来填充 `SINGER`\
  \ 表，然后尝试访问 `/reactive/singer` 端点，以观察数据流。\n\n因此，目前这个控制器能做的事情并不多，但这也没关系。之所以首先介绍这个控制器，是因为我们打算使用处理函数（handler\
  \ functions）来重写它，这是 Spring WebFlow 引入的炫酷特性之一。你可能已经注意到，在清单 20-15 中，每个方法都带有一个编号注释。添加这些注释是为了方便在清单\
  \ 20-17 中查找对应的处理函数。\n\n### 处理类与函数式端点\n\n处理类只是对处理函数进行逻辑分组的一种方式。处理函数必须实现 `HandlerFunction`^(²¹⁹)\
  \ 函数式接口，并为其 `handle(..)` 方法提供实现，该方法接受一个 `org.springframework.web.reactive.function.server.ServerRequest`\
  \ 参数，并返回一个 `Mono<org.springframework.web.reactive.function.server.ServerResponse>`。\n\
  \n清单 20-16 展示了其代码。\n\n```\npackage org.springframework.web.reactive.function.server;\n\
  import reactor.core.publisher.Mono;\n@FunctionalInterface\npublic interface HandlerFunction\
  \ {\nMono handle(ServerRequest request);\n}\n清单 20-16\nHandlerFunction 类\n```\n\n\
  `HandlerFunction<T>` 的实现代表一个处理请求的函数，并且可以通过 `RouterFunction` 将其映射到请求路径。\n\n![](img/524962_1_En_20_Figg_HTML.jpg)\
  \ 一个信息图标，圆圈内包含字母 i。 清单 20-16 中展示的版本是响应式版本，作为 Spring WebFlux 的一部分在 5.0 版本中引入。`RouterFunction`\
  \ 也是如此。在 Spring MVC 5.2 版本中，在 `org.springframework.web.servlet.function` 包中添加了非响应式版本，作为控制器的函数式替代方案。其语法更具声明性，并且请求映射集中在一个单一的\
  \ bean 中，使得配置更易于阅读。\n\n让我们利用这种新的声明式语法，编写一些代码，为请求声明处理函数，而不是处理方法。清单 20-17 展示了 `SingerHandler`\
  \ 类，它包含了与上一节介绍的 `ReactiveSingerController` 类中所有处理方法相对应的处理函数。\n\n\n```java\npackage\
  \ com.apress.prospring6.twenty.boot.handler\nimport org.springframework.http.MediaType\n\
  import org.springframework.web.reactive.function.server.HandlerFunction\nimport\
  \ org.springframework.web.reactive.function.server.ServerRequest\nimport org.springframework.web.reactive.function.server.ServerResponse\n\
  import java.net.URI\nimport org.springframework.web.reactive.function.server.ServerResponse.*\n\
  // 其他导入语句已省略\n@Component\nclass SingerHandler(private val singerService: SingerService)\
  \ {\n/* 1 */\nvar list: HandlerFunction = HandlerFunction { serverRequest: ServerRequest?\
  \ ->\nServerResponse.ok()\n.contentType(MediaType.APPLICATION_JSON)\n.body(singerService.findAll(),\
  \ Singer::class.java)\n}\n/* 2 */\nvar deleteById: HandlerFunction = HandlerFunction\
  \ { serverRequest: ServerRequest ->\nServerResponse.noContent()\n.build(singerService.delete(serverRequest.pathVariable(\"\
  id\").toLong()))\n}\n/* 3 */\nfun findById(serverRequest: ServerRequest): Mono {\n\
  val id = serverRequest.pathVariable(\"id\").toLong()\nreturn singerService.findById(id)\n\
  .flatMap { singer ->\nServerResponse.ok()\n.contentType(MediaType.APPLICATION_JSON).bodyValue(singer)\n\
  }\n.switchIfEmpty(ServerResponse.notFound().build())\n}\n/* 4 */\nfun create(serverRequest:\
  \ ServerRequest): Mono {\nval singerMono = serverRequest.bodyToMono(\nSinger::class.java\n\
  )\nreturn singerMono\n.flatMap(singerService::save)\n.log()\n.flatMap { s: Any ->\n\
  ServerResponse.created(URI.create(\"/singer/\" + (s as Singer).id))\n.contentType(MediaType.APPLICATION_JSON).bodyValue(s)\n\
  }\n// .switchIfEmpty(status(HttpStatus.INTERNAL_SERVER_ERROR).build());\n}\n/* 5\
  \ */\nfun updateById(serverRequest: ServerRequest): Mono {\nval id = serverRequest.pathVariable(\"\
  id\").toLong()\nreturn singerService.findById(id)\n.flatMap { fromDb ->\nserverRequest.bodyToMono(Singer::class.java)\n\
  .flatMap { s: Singer? ->\nServerResponse.ok()\n.contentType(MediaType.APPLICATION_JSON)\n\
  .body(\nsingerService.update(id, s as Singer),\nSinger::class.java\n)\n}\n} // 我们切换到\
  \ 400，因为这是一个无效的 PUT 请求\n.switchIfEmpty(ServerResponse.badRequest().bodyValue(\"\
  更新歌手失败！\"))\n// 我们可以在 ServerResponse 中放入任何内容，包括异常\n//) .switchIfEmpty(badRequest().bodyValue(new\
  \ NotFoundException(String.class, id)));\n}\n/* 6 */\nfun searchSingers(serverRequest:\
  \ ServerRequest): Mono {\nval name = serverRequest.queryParam(\"name\").orElse(null)\n\
  return if (name.isBlank()) {\n// 参数为空字符串\n// return badRequest().bodyValue(new IllegalArgumentException(\"\
  Missing request parameter 'name'\"));\nServerResponse.badRequest().bodyValue(\"\
  缺少请求参数 'name'\")\n} else ServerResponse.ok()\n.contentType(MediaType.APPLICATION_JSON).body(singerService.findByFirstName(name),\
  \ Singer::class.java)\n}\n/* 7 */\nfun searchSinger(serverRequest: ServerRequest):\
  \ Mono {\nval fn = serverRequest.queryParam(\"fn\").orElse(null)\nval ln = serverRequest.queryParam(\"\
  ln\").orElse(null)\nreturn if (fn == null || ln == null || fn.isBlank() || ln.isBlank())\
  \ {\n// {fn, ln}中的一个（或两个）参数为空字符串\n// return badRequest().bodyValue(new IllegalArgumentException(\"\
  Missing request parameter, one of {fn, ln}\"));\nServerResponse.badRequest().bodyValue(\"\
  缺少请求参数，{fn, ln}中的一个\")\n} else singerService.findByFirstNameAndLastName(fn, ln)\n\
  .flatMap { singer ->\nServerResponse.ok()\n.contentType(MediaType.APPLICATION_JSON).bodyValue(singer)\n\
