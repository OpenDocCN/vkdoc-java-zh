  ### 使用 AspectJ 切点表达式创建切点


  除了 JDK 正则表达式，你还可以使用 AspectJ 的切点表达式语言来声明切点。在本章后面，你会看到当我们在 Java/Kotlin 配置中声明切点时，Spring
  默认使用 AspectJ 的切点语言。此外，当使用 Spring 的 `@AspectJ` 注解风格的 AOP 支持时，你需要使用 AspectJ 的切点语言。因此，当使用表达式语言声明切点时，使用
  AspectJ 切点表达式是最佳方式。Spring 提供了 `AspectJExpressionPointcut` 类，用于通过 AspectJ 的表达式语言定义切点。


  ![](img/524962_1_En_5_Figg_HTML.jpg) 一个警告图标。圆圈内有一个感叹号。 要在 Spring 中使用 AspectJ 切点表达式，你需要在项目的类路径中包含两个
  AspectJ 库文件：`aspectjrt.jar` 和 `aspectjweaver.jar`。请查看第 5 章的 `build.gradle` 以了解配置。


  考虑到之前 `Guitarist` 类的实现，使用 JDK 正则表达式实现的相同功能也可以使用 AspectJ 表达式来实现。相关代码如代码清单 5-22 所示。


  ```

  package com.apress.prospring6.five.pointcut

  import org.springframework.aop.aspectj.AspectJExpressionPointcut

  // 其他导入语句已省略

  object AspectjexpPointcutDemo {

  @JvmStatic

  fun main(args: Array) {

  val johnMayer = Guitarist()

  val pc = AspectJExpressionPointcut().apply {

  expression = "execution(* sing*(..))"

  }

  val advisor: Advisor = DefaultPointcutAdvisor(pc, SimpleAroundAdvice())

  val pf = ProxyFactory()

  pf.setTarget(johnMayer)

  pf.addAdvisor(advisor)

  val proxy = pf.proxy as Guitarist

  proxy.sing()

  proxy.sing2()

  proxy.rest()

  }

  }

  清单 5-22

  AspectJ 正则表达式切点测试类

  ```


  请注意，我们使用 `AspectJExpressionPointcut` 类的 `setExpression()` 方法（通过 `.expression = ...`）来设置匹配条件。表达式
  `execution(* sing*(..))` 表示通知应应用于任何以 `sing` 开头、接受任意参数并返回任意类型的方法的执行（是的，AspectJ 更加灵活和简洁）。运行该程序将得到与之前使用
  JDK 正则表达式的示例相同的结果。




  ### 创建注解匹配切入点


  如果你的应用程序是基于注解的，你可能希望使用自己指定的注解来定义切入点——即，将通知逻辑应用于所有带有特定注解的方法或类型。Spring 提供了 `AnnotationMatchingPointcut`
  类，用于通过注解定义切入点。我们再次复用之前的示例，看看在使用注解作为切入点时如何操作。


  首先，我们定义一个名为 `AdviceRequired` 的注解，它将用于声明切入点。清单 5-23 展示了注解类以及修改后的 `AnnotatedGuitarist`
  类，该类中的 `sing(Guitar)` 方法带有此注解。


  ```

  package com.apress.prospring6.five.common

  import org.springframework.aop.Advisor

  // 其他导入语句已省略

  @Retention(AnnotationRetention.RUNTIME)

  @Target(

  AnnotationTarget.ANNOTATION_CLASS,

  AnnotationTarget.CLASS,

  AnnotationTarget.FUNCTION,

  AnnotationTarget.PROPERTY_GETTER,

  AnnotationTarget.PROPERTY_SETTER

  )

  annotation class AdviceRequired

  open class AnnotatedGuitarist : Singer {

  override fun sing() {}

  @AdviceRequired

  open fun sing(guitar: Guitar) {

  LOGGER.info("play: " + guitar.play())

  }

  companion object {

  private val LOGGER = LoggerFactory.getLogger(AnnotatedGuitarist::class.java)

  }

  }

