  \ 的会话工厂：\n\n表 7-1\n\nHibernate 属性\n\n\n\n| 属性（常量/值） | 描述 |\n| --- | --- |\n| `Environment.FORMAT_SQL/hibernate.format_sql`\
  \ | 指示是否应格式化日志或控制台中的 SQL 输出。默认值为 `false`。 |\n| `Environment.USE_SQL_COMMENTS/hibernate.use_sql_comments`\
  \ | 如果设置为 `true`，Hibernate 会在 SQL 内部生成注释，以便于调试。默认值为 `false`。 |\n| `Environment.SHOW_SQL/hibernate.show_sql`\
  \ | 指示 Hibernate 是否应将 SQL 查询输出到日志文件或控制台。你应在开发环境中启用此功能，这能极大地帮助测试和故障排除过程。默认值为 `false`。\
  \ |\n| `Environment.MAX_FETCH_DEPTH/hibernate.max_fetch_depth` | 声明当映射对象与其他映射对象存在关联时的外连接“深度”。此设置可防止\
  \ Hibernate 因大量嵌套关联而获取过多数据。常用值为 `3`。值为 `0` 则禁用默认的外连接获取。 |\n| `Environment.STATEMENT_BATCH_SIZE/hibernate.jdbc.batch_size`\
  \ | 指示 Hibernate 应将多少更新操作分组为一个批次。这对于在 Hibernate 中执行批处理作业操作非常有用。显然，当我们在执行批处理作业更新数十万条记录时，我们希望\
  \ Hibernate 将查询分组为批次，而不是逐个提交更新。推荐值在 5 到 30 之间。 |\n| `Environment.STATEMENT_FETCH_SIZE/hibernate.jdbc.fetch_size`\
  \ | 指定 Hibernate 每次从底层 JDBC `ResultSet` 中检索数据库记录时应获取的记录数。例如，向数据库提交了一个查询，`ResultSet`\
  \ 包含 500 条记录。如果获取大小为 50，Hibernate 将需要获取 10 次才能获取所有数据。 |\n| `Environment.JTA_PLATFORM/hibernate.transaction.jta.platform`\
  \ | 此属性（如果存在）应设置为一个限定类名，该名称代表 `org.hibernate.engine.transaction.jta.platform.spi.JtaPlatform`\
  \ 的一个实现，用于定义 Hibernate 在特定平台上如何与 JTA 交互。如果不存在，Hibernate 将使用默认的 `org.hibernate.engine.transaction.jta.platform.internal.NoJtaPlatform`，这意味着不使用任何事务。在我们的配置中，它被设置为\
  \ Spring 的 `ConfigurableJtaPlatform` 实现。由于本章不重点讨论事务，因此可以安全地从配置中移除该属性。 |\n| `Environment.HBM2DDL_AUTO/hibernate.hbm2ddl.auto`\
  \ | 传统上，从实体映射生成模式的过程被称为 HBM2DDL。此属性可以具有以下任一值：* `none` 告诉 Hibernate 不对现有模式做任何操作。*\
  \ `create` 告诉 Hibernate 生成与受管实体类匹配的模式。* `validate` 告诉 Hibernate 验证模式；不对数据库进行任何更改。*\
  \ `update` 告诉 Hibernate 根据实体类的更改更新模式。* `create-drop` 告诉 Hibernate 生成与受管实体类匹配的模式，并在\
