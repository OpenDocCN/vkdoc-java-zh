  AroundAdviceV1 类声明了一个切面 Bean，其中包含一个环绕目标方法的单个环绕通知

  ```


  （`@Pointcut` 参数中无换行和空格）该通知除了在调用目标方法前后打印消息外，不做其他任何事情。如果从 `AspectJAopConfig` 类和 `AroundAdviceV1`
  创建配置，并按照上一节所示进行测试，则结果输出将毫无疑问地证明通知方法已按预期执行，因为目标方法 `sing(Guitar)` 打印的消息被 `simpleAfterAdvice`
  打印的消息包裹，如清单 5-57 所示。


  ```

  INFO : GrammyGuitarist - sing: Wild blue, deeper than I ever knew

