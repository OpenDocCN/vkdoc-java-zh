- "# 9. Spring 事务管理\n\n事务管理是构建可靠企业应用最关键的部分之一。最常见的事务类型是数据库操作。在典型的数据库更新操作中，数据库事务开始，数据被更新，然后根据数据库操作的结果，事务被提交或回滚。然而，在许多情况下，根据应用需求以及应用需要交互的后端资源（例如关系型数据库管理系统、面向消息的中间件、企业资源计划系统等），事务管理可能会复杂得多。\n\
  \n在 Java 应用开发的早期（JDBC 创建之后，但在 JEE 标准或像 Spring 这样的应用框架出现之前），开发者在应用代码中以编程方式控制和管理事务。当\
  \ JEE，更具体地说是 EJB 标准可用时，开发者能够使用容器管理事务（CMT）以声明式方式管理事务。但是，EJB 部署描述符中复杂的事务声明难以维护，并且给事务处理引入了不必要的复杂性。一些开发者倾向于对事务拥有更多控制权，并选择\
  \ Bean 管理事务（BMT）以编程方式管理事务。然而，使用 Java 事务 API（JTA）进行编程的复杂性也阻碍了开发者的生产力。\n\n正如**第**\
  \ **5** **章**所讨论的，事务管理是一个横切关注点，不应编码在业务逻辑中。实现事务管理最合适的方式是允许开发者以声明式方式定义事务需求，并让 Spring、JEE\
  \ 或 AOP 等框架代表我们织入事务处理逻辑。在本章中，我们将讨论 Spring 如何帮助简化事务处理逻辑的实现。Spring 同时支持声明式和编程式事务管理。\n\
  \nSpring 为声明式事务提供了出色的支持，这意味着你无需用事务管理代码来扰乱你的业务逻辑。你所要做的只是声明那些必须参与事务的方法（在类或层内），以及事务配置的细节，Spring\
  \ 会负责处理事务管理。更具体地说，本章涵盖以下内容：\n\n*   *Spring 事务抽象层*：我们讨论 Spring 事务抽象类的基础组件，并解释如何使用这些类来控制事务的属性。\n\
  \n*   *声明式事务管理*：我们向你展示如何使用 Spring 和纯 Kotlin 对象来实现声明式事务管理。我们提供了使用 XML 配置文件以及 Kotlin\
  \ 注解进行声明式事务管理的示例。\n\n*   *编程式事务管理*：尽管编程式事务管理并不常用，但我们解释了如何使用 Spring 提供的 `TransactionTemplate`\
  \ 类，它让你能够完全控制事务管理代码。\n\n## 探索 Spring 事务抽象层\n\n在开发应用时，无论你是否选择使用 Spring，在使用事务时都必须做出一个基本选择：是使用全局事务还是本地事务。本地事务特定于单个事务性资源（例如，一个\
  \ JDBC 连接），而全局事务由容器管理，并且可以跨越多个事务性资源。\n\n### 事务类型\n\n本地事务易于管理，如果你的应用中的所有操作只需要与一个事务性资源（例如\
  \ JDBC 事务）交互，那么使用本地事务就足够了。但是，如果你没有使用像 Spring 这样的应用框架，你需要编写大量的事务管理代码，并且如果将来事务的范围需要扩展到多个事务性资源，你将不得不放弃本地事务管理代码并重写它以使用全局事务。\n\
  \n在 Java 世界中，全局事务是通过 JTA（Java/Jakarta 事务 API）实现的。在这种场景下，一个兼容 JTA 的事务管理器通过各自的资源管理器连接到多个事务性资源，这些资源管理器能够通过\
  \ XA（交换访问）协议（一个定义分布式事务的开放标准）与事务管理器通信。使用两阶段提交（2PC）机制来确保所有后端数据源都被更新或全部回滚。如果任何一个后端资源失败，整个事务将被回滚，因此对所有资源的更新也会被回滚。全局事务是\
  \ `UserTransaction` 的一个实现，通常需要从 JNDI 获取。由于 JNDI 特定于服务器环境，这限制了应用代码的潜在重用性。过去有一些不需要服务器的库，例如\
  \ Atomikos^(⁷⁷)，它在本书 Java 版本的上一版中使用过，但本章未使用，因为当前版本尚未适配 Jakarta 事务 API，因此无法与最新的 Spring\
  \ 版本一起使用。\n\n图 9-1 展示了使用 JTA 的全局事务的高级视图。如你所见，有四个主要参与方参与全局事务（通常也称为*分布式事务*）。第一方是后端资源，例如关系型数据库管理系统、消息中间件、企业资源计划（ERP）系统等。\n\
  \n![](img/524962_1_En_9_Fig1_HTML.jpg)\n\n一张图展示了 JTA 事务管理器、应用组件和三个资源管理器之间的相互连接。资源管理器提供数据库、MQ\
  \ 服务器和 ERP。\n\n图 9-1\n\n使用 JTA 的全局事务概览\n\n第二方是资源管理器，通常由后端资源供应商提供，负责与后端资源交互。例如，当连接到\
  \ MySQL 数据库时，我们需要与 MySQL Java 连接器提供的 `MysqlXADataSource` 类交互。MariaDB 也存在等效的实现。其他后端资源（例如\
  \ MQ、ERP 等）也提供它们自己的资源管理器。\n\n第三方是 JTA 事务管理器，负责管理、协调事务状态，并与所有参与事务的资源管理器同步。使用了前面提到的\
  \ XA 协议，这是一个广泛用于分布式事务处理的开放标准。JTA 事务管理器也支持 2PC，以便所有更改将一起提交，如果任何资源更新失败，整个事务将被回滚，导致所有资源都不会被更新。整个机制由\
  \ Java 事务服务（JTS）规范定义。\n\n\n\n最后一个组件是应用程序。事务（开始、提交、回滚事务等）由应用程序本身，或应用程序运行所在的底层容器或\
  \ Spring 框架来管理。同时，应用程序通过 JEE 定义的各种标准与底层后端资源进行交互。如图 9-1 所示，应用程序通过 JDBC 连接关系型数据库，通过\
  \ JMS 连接消息队列，并通过 Java EE 连接器架构（JCA）连接 ERP 系统。所有完全符合 JEE 规范的应用服务器（例如 JBoss、WebSphere、WebLogic\
  \ 和 GlassFish）都支持 JTA，在这些服务器中，可以通过 JNDI 查找来获取事务。对于独立应用程序或 Web 容器（例如 Tomcat 和 Jetty），存在开源和商业解决方案，为这些环境中的\
  \ JTA/XA 提供支持。Spring 社区曾经青睐的是 Atomikos，甚至还有一个针对它的 Spring Boot 启动器库。不幸的是，在编写本章时，Atomikos\
  \ 的最新版本（5.0.9）并非基于 Jakarta JTA，这意味着无法使用最新的 Spring 版本构建 Spring JTA 应用程序。另一个替代方案 Bitronix^(⁷⁸)已在\
  \ GitHub 上归档，并且过去 6 年内没有进行任何更新。Java 开放事务管理器（JOTM）^(⁷⁹)的最后一次更新是在 2009 年。\n\n人们对微服务、使用\
  \ Apache Kafka、RabbitMQ、Azure 事件中心（以及更多）构建的事件驱动系统的兴趣，以及像 Amazon DynamoDB、MariaDB\
  \ SkySQL 这类事务并非必需品的数据库即服务（DBaaS）的兴起，似乎正逐渐使 JTA 过时。当然，如果你需要使用全局事务，始终可以选择使用应用程序 EE\
  \ 服务器。\n\n在撰写本文时，Spring 6 在独立实现下的 JTA 支持尚不明确。Spring 的组件基于 Jakarta API，这意味着独立实现也必须基于它。例如，一个独立实现必须为`jakarta.transaction.UserTransaction`提供实现，才能与\
  \ Spring 6 JTA 兼容，但目前还没有任何实现做到这一点。使用兼容 Jakarta EE 10 的服务器也不是一个选项。Jakarta EE 10^(⁸⁰)是自“jakarta”命名空间更新以来\
  \ Jakarta EE 的第一个主要版本，许多应用服务器尚不兼容它，因为稳定版本尚未发布。\n\n到今年年底，可能会有兼容的独立实现可用，或者出现兼容 Jakarta\
  \ EE 10 的服务器，如 Apache TomEE、Open Liberty、Eclipse Glassfish 等^(⁸¹)。如果你对使用 Spring\
  \ 5 和 Atomikos 进行全局事务感兴趣，请随时查阅*Pro Spring 5*及其相关仓库中的示例项目注：[[`https://github.com/Apress/pro-spring-5/tree/master/chapter09`](https://github.com/Apress/pro-spring-5/tree/master/chapter09)]。\n\
  \n## `PlatformTransactionManager`接口的实现\n\n在 Spring 中，`PlatformTransactionManager`接口使用`TransactionDefinition`和`TransactionStatus`接口来创建和管理事务。这些接口的具体实现必须详细了解事务管理器。\n\
  \nSpring 为`PlatformTransactionManager`接口提供了丰富的实现集。图 9-2 展示了其中的一部分。\n\n![](img/524962_1_En_9_Fig2_HTML.jpg)\n\
  \nPlatform Transaction Manager 接口的流程图。它从 JDBC 事务管理器开始，接着是数据源事务管理器。它涉及其他 9 个事务管理器，并以事务管理器结束。\n\
  \n图 9-2\n\n`PlatformTransactionManager`的实现\n\n来自`org.springframework.jdbc.datasource`包的`DataSourceTransactionManager`类用于通用的\
  \ JDBC 连接。在 ORM 方面，有许多实现，包括 JPA 的`JpaTransactionManager`类，以及 Hibernate 5 的`HibernateTransactionManager`。当\
  \ Spring 包含对 Hibernate 6 的支持时，可能会有一个新版本。在编写本书时，Spring 尚不支持 Hibernate 6，唯一可用的`HibernateTransactionManager`来自`org.springframework.orm.hibernate5`包。由于对\
  \ Hibernate 5 的支持可能不会放弃，预计在 Spring ORM 6 中会出现一个名为`org.springframework.orm.hibernate6`的包。\n\
  \n对于 JMS，这些实现通过`JmsTransactionManager`类支持 JMS 2.0。对于 JTA，通用实现类是`JtaTransactionManager`。对于响应式服务器，Spring\
  \ 提供了`AbstractReactiveTransactionManager`，这是一个抽象基类，实现了 Spring 的标准响应式事务工作流，作为具体平台事务管理器（例如用于单个\
  \ R2DBC `ConnectionFactory`的`R2dbcTransactionManager`实现）的基础。\n\nSpring 还提供了几个特定于特定应用服务器的\
  \ JTA 事务管理器类（此处未描绘）。这些类为 WebSphere（`WebSphereUowTransactionManager`类）和 BEA WebLogic\
  \ 9.0 及更高版本（`WebLogicJtaTransactionManager`类）提供原生支持。\n\n![](img/524962_1_En_9_Figa_HTML.jpg)\
  \ 一个信息图标。圆圈内有一个字母 i。  JDO 支持已在 Spring 5 中移除，因此图 9-2 的类图中缺少了`JdoTransactionManager`。从\
  \ Spring 5 开始，仅支持 Hibernate 5；对 Hibernate 3 和 Hibernate 4 的实现已被移除。对 JMS 1.1 的支持已在\
  \ Spring 5 中移除。支持 JEE、JCA 和通用客户端接口（CCI）的`CciLocalTransactionManager`类目前已弃用。\n\n\
  ## 分析事务属性\n\n在本节中，我们将讨论 Spring 支持的事务属性，重点关注与作为后端资源的关系型数据库的交互。\n\n事务具有众所周知的 ACID\
  \ 属性（原子性、一致性、隔离性和持久性），并且由事务性资源来维护事务的这些方面。你无法控制事务的原子性、一致性和持久性。但是，你可以控制事务传播和超时，以及配置事务是否为只读并指定隔离级别。\n\
  \nSpring 将这些设置全部封装在`TransactionDefinition`接口中。该接口用于 Spring 事务支持的核心接口，即`PlatformTransactionManager`接口，其实现执行特定平台（如\
  \ JDBC 或 JTA）上的事务管理。核心方法`PlatformTransactionManager.getTransaction()`接受一个`TransactionDefinition`接口作为参数，并返回一个`TransactionStatus`接口。`TransactionStatus`接口用于控制事务执行，更具体地说，用于设置事务结果以及检查事务是否已完成或是否是一个新事务。\n\
  \n\n\n### `TransactionDefinition` 接口\n\n如前所述，`TransactionDefinition` 接口控制着事务的属性。让我们更详细地审视\
  \ `TransactionDefinition` 接口^(⁸²)（如清单 9-1 所示），并描述其方法。\n\n```\npackage org.springframework.transaction;\n\
  import org.springframework.lang.Nullable;\npublic interface TransactionDefinition\
  \ {\n// 变量声明和注释已省略\ndefault int getPropagationBehavior() {\nreturn PROPAGATION_REQUIRED;\
  \ // 0\n}\ndefault int getIsolationLevel() {\nreturn ISOLATION_DEFAULT; // -1\n\
  }\ndefault int getTimeout() {\nreturn TIMEOUT_DEFAULT; // -1\n}\ndefault boolean\
  \ isReadOnly() {\nreturn false;\n}\n@Nullable\ndefault String getName() {\nreturn\
  \ null;\n}\n// 返回一个带有默认值的不可修改的 {@code TransactionDefinition}。\nstatic TransactionDefinition\
  \ withDefaults() {\nreturn StaticTransactionDefinition.INSTANCE;\n}\n}\n清单 9-1\n\
  核心 TransactionDefinition 源代码\n```\n\n该接口中简单明了的方法是 `getTimeout()`（返回事务必须完成的时间，以秒为单位）和\
  \ `isReadOnly()`（指示事务是否为只读）。事务管理器实现可以利用此值来优化执行，并检查以确保事务仅执行读取操作。`getName()` 方法返回事务的名称。\n\
  \n另外两个方法 `getPropagationBehavior()` 和 `getIsolationLevel()` 需要更详细地讨论。我们先从 `getIsolationLevel()`\
  \ 开始，它控制其他事务能看到哪些数据变更。表 9-1 列出了您可以使用的**事务隔离级别**，并解释了当前事务中所做的哪些更改可以被其他事务访问。这些隔离级别表示为在\
  \ `TransactionDefinition` 接口中定义的静态值。\n\n表 9-1\n\n事务隔离级别\n\n| 隔离级别 | 描述 |\n| ---\
  \ | --- |\n| `ISOLATION_DEFAULT` | 底层数据存储的默认隔离级别。 |\n| `ISOLATION_READ_UNCOMMITTED`\
  \ | 最低的隔离级别；它几乎算不上一个事务，因为它允许此事务看到其他未提交事务所修改的数据。 |\n| `ISOLATION_READ_COMMITTED`\
  \ | 大多数数据库中的默认级别；它确保其他事务无法读取尚未被其他事务提交的数据。但是，一个事务读取的数据可以被其他事务更新。 |\n| `ISOLATION_REPEATABLE_READ`\
  \ | 比 `ISOLATION_READ_COMMITTED` 更严格；它确保一旦你选择了数据，你至少可以再次选择相同的数据集。但是，如果其他事务插入了新数据，你仍然可以选择到新插入的数据。\
  \ |\n| `ISOLATION_SERIALIZABLE` | 最昂贵且最可靠的隔离级别；所有事务都被视为一个接一个地执行。 |\n\n选择合适的隔离级别对于数据的一致性很重要，但这些选择可能会对性能产生重大影响。最高的隔离级别\
  \ `ISOLATION_SERIALIZABLE` 的维护成本尤其高昂。\n\n`getPropagationBehavior()` 方法指定了事务性调用会发生什么，这取决于是否存在活动事务。表\
  \ 9-2 描述了此方法的值。传播类型表示为在 `TransactionDefinition` 接口中定义的静态值。\n\n表 9-2\n\n事务传播模式\n\n\
  | 传播模式 | 值 | 描述 |\n| --- | --- | --- |\n| `PROPAGATION_REQUIRED` | 0 | 如果存在事务，则支持该事务。如果没有事务，则启动一个新事务。Spring\
  \ 中的默认传播模式。 |\n| `PROPAGATION_SUPPORTS` | 1 | 支持当前事务；如果不存在当前事务，则以非事务方式执行。 |\n| `PROPAGATION_MANDATORY`\
  \ | 2 | 支持当前事务；如果不存在当前事务，则抛出异常。 |\n| `PROPAGATION_REQUIRES_NEW` | 3 | 创建一个新事务，如果存在当前事务，则挂起它。\
  \ |\n| `PROPAGATION_NOT_SUPPORTED` | 4 | 不支持在活动事务中执行。始终以非事务方式执行，并挂起任何现有事务。 |\n|\
  \ `PROPAGATION_NEVER` | 5 | 即使存在活动事务，也始终以非事务方式执行。如果存在活动事务，则抛出异常。 |\n| `PROPAGATION_NESTED`\
  \ | 6 | 如果存在活动事务，则在嵌套事务中运行。如果没有活动事务，则行为如同设置了 `PROPAGATION_REQUIRED`。 |\n\n### `TransactionStatus`\
  \ 接口\n\n`TransactionStatus` 接口^(⁸³)允许事务管理器控制事务的执行。代码可以检查事务是新的还是只读事务，并且可以启动回滚。`TransactionStatus`\
  \ 接口描述的行为被拆分到两个接口中：`TransactionExecution`（声明基本事务操作）和 `SavepointManager`（声明与保存点相关的方法）。所有这些都显示在清单\
  \ 9-2 中。\n\n```\n// TransactionStatus.java\npackage org.springframework.transaction;\n\
  import java.io.Flushable;\npublic interface TransactionStatus extends TransactionExecution,\
  \ SavepointManager, Flushable {\nboolean hasSavepoint();\n@Override\nvoid flush();\n\
  }\n// TransactionExecution.java\npackage org.springframework.transaction;\npublic\
  \ interface TransactionExecution {\nboolean isNewTransaction();\nvoid setRollbackOnly();\n\
  boolean isRollbackOnly();\nboolean isCompleted();\n}\n// SavepointManager.java\n\
  package org.springframework.transaction;\npublic interface SavepointManager {\n\
  Object createSavepoint() throws TransactionException;\nvoid rollbackToSavepoint(Object\
  \ savepoint) throws TransactionException;\nvoid releaseSavepoint(Object savepoint)\
  \ throws TransactionException;\n}\n清单 9-2\n核心 TransactionStatus 源代码\n```\n\n`TransactionExecution`\
  \ 接口中的方法不言自明；最值得注意的是 `setRollbackOnly()`，它会导致回滚并结束活动事务。`TransactionStatus` 中的 `hasSavePoint()`\
  \ 方法返回事务内部是否携带保存点（即，该事务是基于保存点作为嵌套事务创建的）。同样来自 `TransactionStatus` 的 `flush()` 方法，在适用的情况下（例如，与\
  \ Hibernate 一起使用时）会将底层会话刷新到数据存储。`TransactionExecution` 接口中的 `isCompleted()` 方法返回事务是否已结束（即，已提交或已回滚）。\n\
  \n\n\n## 示例代码的数据模型与基础设施\n\n本节沿用**第** **7** **章**中介绍的数据模型。我们在关于数据访问的章节中一直使用两个主要表，即\
  \ `SINGER` 和 `ALBUM`。你可以按照 `chapter09/README.adoc` 中的说明自行设置容器，或者完全忽略它，直接运行那些配置为使用\
  \ Testcontainers 所搭建的 MariaDB 容器的测试。我们使用 JPA 与 Hibernate 作为实现数据访问逻辑的持久化层。\n\n项目的主要依赖是\
  \ Spring ORM 和 Hibernate。Spring ORM 库引入了 `spring-tx` 传递依赖，其中包含了所有提供事务支持的 Spring\
  \ 组件。\n\n图 9-3 展示了 `chapter09` 项目的依赖列表。\n\n![](img/524962_1_En_9_Fig3_HTML.jpg)\n\
