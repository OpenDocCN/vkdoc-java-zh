  存储函数的初始版本导致 `testStoredFunction()` 测试方法失败，如图 6-6 所示。




  ![](img/524962_1_En_6_Fig6_HTML.jpg)


  Pro Spring 6 存储函数 V 2 dot java 的截图。左侧展示了 main 和 test 文件夹的内容，右侧显示了一些编程代码。


