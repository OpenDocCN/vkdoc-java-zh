  ```


  每次调用 `insertWithAlbum()` 方法时，都会构造一个新的 `InsertSingerAlbum` 实例，因为 `BatchSqlUpdate`
  类不是线程安全的。然后我们像使用 `SqlUpdate` 一样使用它。主要区别在于 `BatchSqlUpdate` 类会将插入操作排队，并以批量方式提交给数据库。每当记录数达到批量大小时，Spring
  就会对挂起的记录执行一次批量插入操作。另一方面，在操作完成后，我们调用 `BatchSqlUpdate.flush()` 方法来指示 Spring 刷新所有挂起的操作（即仍在排队且尚未达到批量大小的插入操作）。最后，我们遍历
  `Singer` 对象中的 `Album` 对象列表，并调用 `BatchSqlUpdate.updateByNamedParam()` 方法。为了方便测试，`insertWithAlbum()`
  方法也已实现。由于这个实现相当庞大，可以通过使用 Java 8 lambda 表达式和 records 来简化，如代码清单 6-48 所示。




  ```

  override fun findAllWithAlbums(): List {

  val jdbcTemplate = JdbcTemplate(dataSource!!)

  val map: MutableMap = mutableMapOf()

  jdbcTemplate.query(FIND_SINGER_ALBUM) { rs ->

  while (rs.next()) {

  val singerID = rs.getLong("id")

  val singer = map.computeIfAbsent(singerID) { s: Long? ->

  Singer(

  singerID,

  rs.getString("first_name"),

  rs.getString("last_name"),

  rs.getDate("birth_date").toLocalDate(),

  mutableSetOf()

  )

  }

  val albumID = rs.getLong("album_id")

  if (albumID > 0) {

  singer.albums.add(

  Album(

  albumID, singerID, rs.getString("title"),

  rs.getDate("release_date").toLocalDate()

  )

  )

  }

  }

  }

  return map.values.toList()

  }

