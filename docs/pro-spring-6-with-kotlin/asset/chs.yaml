  \ Hibernate 被引入作为第二个翻译。\n\n如果你有使用 EJB 实体 Bean（在 EJB 3.0 之前）开发数据访问应用程序的经验，你可能会记得那个痛苦的过程。繁琐的映射配置、事务划分以及每个\
