  \ fun setApplicationContext(applicationContext: ApplicationContext) {\nctx = applicationContext\n\
  }\n@RequestMapping(\nvalue = [\"/beans\"],\nproduces = [MediaType.TEXT_EVENT_STREAM_VALUE]\n\
  )\n@ResponseBody\nfun getBeanNames(): Flux {\n// 此请求的响应负载将以 JSON 格式渲染\nget() {\n\
