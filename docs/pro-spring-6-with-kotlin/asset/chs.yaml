  `extractData(..)` 方法，将结果集相应地转换为 `Singer` 记录列表。对于 `findAllWithDetail()` 方法，查询使用了
  `left join` 来连接两个表，这样也能检索到没有专辑的歌手。结果就是两个表的连接结果。最后，我们使用 `namedTemplate.query()` 方法，传入查询字符串和结果集提取器。


  当然，`SingerWithDetailExtractor` 内部类实际上并非必需，因为我们可以选择使用 lambda 表达式。在清单 6-29 中，你可以看到使用
