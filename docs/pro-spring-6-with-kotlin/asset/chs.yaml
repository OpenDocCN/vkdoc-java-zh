  两个类都使用 `@Component` 注解来声明这些类型的 bean。该注解也用于命名 bean。在 `NewDocumentarist` 类中，属性 `guitarist`
  的 setter 方法使用了 `@Autowired` 注解以实现 Spring 的自动注入，并使用 `@Qualifier` 来配置 Spring 应注入的
  bean 的名称。


  现在我们有了 bean，让我们从一个非常简单的前置通知开始。




  ### 使用 AspectJ 注解声明前置通知


  使用注解时，我们并不总是需要显式声明 `Pointcut`，因为 AspectJ 的 `@Before` 注解的默认属性可以配置一个切入点表达式，用于指定通知的绑定位置。清单
  5-49 展示了声明了注解通知的 `BeforeAdviceV1` 类。


  ```

  package com.apress.prospring6.five.advice

  @Component

  @Aspect

  class BeforeAdviceV1 {

  @Before("execution(* com.apress.prospring6.five..sing*(com.apress.prospring6.five.common.Guitar))")

  fun simpleBeforeAdvice(joinPoint: JoinPoint) {

  val signature = joinPoint.signature as MethodSignature

  LOGGER.info(" > Executing: {} from {}", signature.name,

  signature.declaringTypeName)

  }

  companion object {

  private val LOGGER = LoggerFactory.getLogger(BeforeAdviceV1::class.java)

  }

  }

  清单 5-49

  BeforeAdviceV1 类：声明一个包含单个前置通知的切面 Bean

  ```


  ![](img/524962_1_En_5_Figi_HTML.jpg) 一个信息图标。圆圈内有一个字母 i。   为什么使用 `V1` 后缀？因为声明此通知和切入点的方式不止一种。在本节中，所有以不同方式声明相同前置通知的类都带有一个数字后缀，该后缀也用于测试该通知的方法。


  请注意，通知类不需要实现 `MethodBeforeAdvice`。另一个需要注意的地方是，使用 `@Aspect` 注解来声明它是一个切面类。切面类将通知声明、切入点以及用于声明这些内容的其他实用方法组合在一起。


  `@Before` 注解将 `simpleBeforeAdvice(..)` 方法标记为前置通知，其默认属性值提供的表达式是一个切入点表达式，表示我们希望通知所有名称以
  `sing` 开头的方法，并且这些类定义在 `package com.apress.prospring6.five` 下（包括所有子包，`..` 即表示此意）。此外，`sing*`
  方法应接收一个 `com.apress.prospring6.five.common.Guitar` 类型的参数。


  前置通知方法接受连接点作为参数，但不接受方法、对象和参数。实际上，对于通知类来说，这个参数是可选的，因此你可以让方法不带参数。但是，如果你需要在通知中访问被通知的连接点的信息（在本例中，我们希望输出调用类型和方法名称的信息），那么你需要定义接受该参数。当为方法定义了参数时，Spring
  会自动将连接点传递给该方法以供处理。在此示例中，我们使用 `JoinPoint` 来打印连接点的详细信息。


  要测试此通知，我们必须设计一个 Spring 配置类，该类能够发现 `GrammyGuitarist` 和 `NewDocumentarist`，并启用对标记了
  AspectJ 的 `@Aspect` 注解及其他注解的组件的支持。为了保持代码简洁，并使本节中每个场景的通知相互隔离，切面 Bean 将与此配置类一起注册到一个空的
  `ApplicationContext` 中。这使我们能够重用此配置类，并保持测试代码片段相同，唯一的区别是添加到上下文中的切面类不同。


  配置类如清单 5-50 所示。


  ```

  package com.apress.prospring6.five.annotated

  import org.springframework.context.annotation.ComponentScan

  import org.springframework.context.annotation.Configuration

  import org.springframework.context.annotation.EnableAspectJAutoProxy

  @ComponentScan

  @Configuration

  @EnableAspectJAutoProxy(proxyTargetClass = true)

  open class AspectJAopConfig

  清单 5-50

  AspectJ Spring 配置类

  ```


  请注意 `@EnableAspectJAutoProxy` 注解。此注解启用对标记了 AspectJ 的 `@Aspect` 注解的组件的处理支持，并设计用于标注了
  `@Configuration` 的类。它还有一个名为 `proxyTargetClass` 的属性。当设置为 `true` 时，表示将创建基于子类（CGLIB）的代理，而不是标准的基于
  Java/Kotlin 接口的代理。在此示例中，需要 CGLIB 代理，因为即使 `GrammyGuitarist` 实现了 `Singer` 接口，并且默认情况下基于接口的
  JDK 动态代理应该是合适的，但 `NewDocumentarist` 严格要求依赖项的类型为 `GrammyGuitarist` 或其扩展。因此，我们需要一个扩展了
  `GrammyGuitarist` 的代理。如果没有 `proxyTargetClass = true` 属性，在尝试使用此配置启动 Spring 应用程序时，将抛出以下异常：


  ```

  Error creating bean with name ''documentarist'': Unsatisfied dependency expressed
  through method ''setGuitarist'' parameter 0; nested exception is org.springframework.beans.factory.BeanNotOfRequiredTypeException:
  Bean named ''johnMayer'' is expected to be of type ''com.apress.prospring6.five.annotated.GrammyGuitarist''
  but was actually of type ''jdk.proxy3.$Proxy26''

  ```


  ![](img/524962_1_En_5_Figj_HTML.jpg) 一个警告图标。圆圈内有一个感叹号。   一条经验法则：如果配置中至少有一个类需要通过子类化来代理，则设置
  `proxyTargetClass=true`，否则应用程序上下文将无法正确创建。


  该类还标注了 `@ComponentScan` 注解，该注解支持发现该类所在包（`com.apress.prospring6.five.annotated`）及其子包中的
  Bean。


