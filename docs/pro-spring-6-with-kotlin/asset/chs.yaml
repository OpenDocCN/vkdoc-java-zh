  }\n}\n清单 20-26\n响应式 HomeController 类\n```\n\n注意 `MediaType.TEXT_EVENT_STREAM_VALUE`，这是一个值为\
  \ `text/event-stream` 的常量。这是当 GET 请求发送到 URL `http://localhost:8081/beans` 时，服务器发送给客户端的特定于简单文本数据流的\
  \ MIME 类型。\n\n事件流中的消息由一对换行符分隔。一行中第一个字符是冒号，本质上是一条注释，会被忽略。\n\n当应用启动后，你可以通过运行一个简单的\
  \ `curl` 命令来测试该方法是否返回一个 bean 名称的 flux。该命令以及来自流的一些事件如清单 20-27 所示。\n\n```\n> curl\
  \ -H \"Accept:text/event-stream\" http://localhost:8081/beans\ndata:applicationAvailability\n\
  data:applicationTaskExecutor\ndata:chapter20Application\ndata:clientConnectorCustomizer\n\
  data:connectionFactory\ndata:data-r2dbc.repository-aot-processor#0\n// 流的其余事件已省略\n\
  清单 20-27\n对 http://localhost:8081/beans 的 GET 请求返回的数据流\n```\n\nThymeleaf 生成三种类型的服务器发送事件（SSE）：\n\
  \n\n\n*   ***头部**：数据以 `head:` 或 `{prefix_}head` 为前缀。用于通信过程中的单个事件，包含迭代数据之前的所有标记（如果有）。示例：*当你在浏览\
  \ Facebook 帖子时，打开页面的那一刻，数据库中在你打开页面的时间戳之前存在的所有评论，都应该已经渲染在页面中了。没有必要逐个渲染它们。Thymeleaf\
  \ 支持这种类型的初始化事件。*\n\n*   ***数据消息**：数据以 `message:` 或 `{prefix_}message` 为前缀。用于一系列事件，每个事件对应数据驱动生成的一个值。示例：*当你在浏览\
  \ Facebook 帖子时，其他用户在你查看页面时发布的评论会一条一条地出现在评论区。评论数据会通过类型为 message 的 SSE 发送到客户端。*\n\n\
  *   ***尾部**：数据以 `tail:` 或 `{prefix_}tail` 为前缀。用于通信过程中的单个事件，包含迭代数据之后的所有标记（如果有）。示例：*假设\
  \ Facebook 有一个选项，用户可以通过它选择停止查看新评论，那么可以使用这种类型的事件来发送数据库中所有评论，这些评论的时间戳介于最后显示的评论和用户选择停止查看新评论的时间戳之间。*\n\
