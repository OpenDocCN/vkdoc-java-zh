  \ HQL，然后转换为 SQL，最后在数据库上执行。这似乎有点过于繁琐了，对吧？为了获得强类型查询以及在编译时（而非运行时）发现错误的能力，这种性能开销是否值得？这取决于应用程序的配置和查询的复杂性。我们在**第**\
  \ **7** **章**中已经提到了 jOOQ，它提供了大致相同的好处，但没有两层转换，并且语法更友好。\n\n## 本章小结\n\n在本章中，我们介绍了 JPA\
  \ 的基本概念，以及如何在 Spring 中使用 Hibernate 作为持久化服务提供者来配置 JPA 的 `EntityManagerFactory`。然后，我们讨论了如何使用\
  \ JPA 执行基本的数据库操作。高级主题包括原生查询和强类型的 JPA Criteria API。\n\n本章的目的是向你介绍 JPA 的 `EntityManagerFactory`，因为从架构的角度来看，Hibernate\
  \ 的 `SessionFactory` 是它的一个扩展。因此，`SessionFactory` 也是一个 JPA `EntityManagerFactory`，这意味着两者都包含实体映射元数据，并允许你创建\
  \ Hibernate `Session` 或 `EntityManager`。\n\n然而，`EntityManagerFactory` 是标准实现，并且在所有实现中都是相同的。这意味着，虽然可能性不大，但如果你希望将\
  \ JPA 提供者（在本例中是 Hibernate）更改为其他持久化实现（例如 Oracle TopLink），当你的代码不与你的提供者绑定时，这样做会容易得多。\n\
  \n话虽如此，在**第** **9** **章**中，我们将通过探索事务来完善在 Spring 中使用 SQL 数据库的完整图景。\n\n脚注 1   2  \
