  TestResults 实现

  ```


  ### 选择要使用的代理


  决定使用哪种代理通常很简单。CGLIB 代理可以代理类和接口，而 JDK 代理只能代理接口。在性能方面，JDK 和 CGLIB 标准模式之间没有显著差异（至少在运行被通知和未通知方法时），除非你使用
  CGLIB 的冻结模式，在这种情况下通知链无法更改，并且 CGLIB 在冻结模式下会执行进一步优化。当代理一个类时，CGLIB 代理是默认选择，因为它是唯一能够生成类代理的代理。要在代理接口时使用
  CGLIB 代理，必须通过使用 `setOptimize()` 方法将 `ProxyFactory` 中的 `optimize` 标志的值设置为 `true`。


  ## 切入点的进阶使用


  在本章前面，我们介绍了 Spring 提供的六种基本 `Pointcut` 实现；在大多数情况下，我们发现它们能满足我们应用程序的需求。然而，有时在定义切入点时可能需要更大的灵活性。Spring
  提供了另外两种 `Pointcut` 实现，`ComposablePointcut` 和 `ControlFlowPointcut`，它们正好提供了你所需的灵活性。




  ### 使用控制流切点


  Spring 的控制流切点由 `ControlFlowPointcut` 类实现，与许多其他 AOP 实现中的 `cflow` 构造类似，但功能稍弱。本质上，Spring
  中的控制流切点适用于给定方法之下或类中所有方法之下的所有方法调用。这很难直观理解，通过一个示例可以更好地说明。


  清单 5-29 展示了一个 `SimpleBeforeAdvice` 类，它会输出一条描述其所通知方法的消息。


