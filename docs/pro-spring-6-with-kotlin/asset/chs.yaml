  关于 Spring Boot 的 AOP，能说的就是这些了；因为 Spring Boot 没有提供花哨的、专门的组件来简化 Spring 的 AOP，因为几乎没有什么需要简化的。


  ### 声明式 Spring AOP 配置的注意事项


  到目前为止，我们已经向你展示了两种使用 Spring AOP 编写代码的方法：使用 `ProxyFactoryBean` 和使用 `@AspectJ` 风格的注解。XML
  AOP 配置不是本书的重点，但它主要的优点是能够轻松地将配置与代码分离。另一方面，如果你的应用主要基于注解，请使用 `@AspectJ` 注解。再次强调，让应用的需求驱动配置方法，并尽最大努力保持一致性。


  此外，`aop` 命名空间和 `@AspectJ` 注解方法之间还有一些其他区别：


  *   切入点表达式语法有一些细微差别（例如，在 XML 配置中，使用 `aop` 命名空间时，需要使用 `and` 来聚合条件，而在 `@AspectJ` 注解中则使用
  `&&`）。


  *   在 XML 配置中，`aop` 命名空间方法仅支持 `singleton` 切面实例化模型。


  *   在 XML 配置中，使用 `aop` 命名空间时，无法“组合”多个切入点表达式。使用 `@AspectJ` 的示例展示了可以在前置通知和环绕通知中组合两个切入点定义（即
  `singExecution(value) && isJohn()`）。当使用 `aop` 命名空间并且需要创建一个组合了匹配条件的新切入点表达式时，你需要使用
  `ComposablePointcut` 类。


  ## 总结


  在本章中，我们涵盖了大量的 AOP 核心概念，并探讨了这些概念如何转化为 Spring AOP 实现。我们讨论了 Spring AOP 中已实现（和未实现）的特性，并指出
  AspectJ 是那些 Spring 未实现特性的 AOP 解决方案。我们花了一些时间详细解释了 Spring 中可用的通知类型，并展示了四种类型实际运行的示例。我们还探讨了如何通过使用切入点来限制通知应用的方法。特别地，我们研究了
  Spring 提供的六种基本切入点实现。我们还详细介绍了 AOP 代理的构建方式、不同的选项以及它们的区别。我们比较了三种代理类型的性能，并强调了在 JDK 代理和
  CGLIB 代理之间进行选择时的一些主要差异和限制。我们涵盖了切入点的高级选项，以及如何使用引入来扩展对象实现的接口集。


  我们还介绍了 Spring Framework 的服务，用于以声明方式配置 AOP，从而避免将 AOP 代理构建逻辑硬编码到代码中。我们花了一些时间探讨 Spring
  和 AspectJ 是如何集成的，以便你能够在不损失 Spring 任何灵活性的情况下，利用 AspectJ 更强大的功能。这无疑是大量的 AOP 知识！


  在下一章中，我们将转向一个完全不同的主题——如何使用 Spring 的 JDBC 支持来极大地简化基于 JDBC 的数据访问代码的创建。


