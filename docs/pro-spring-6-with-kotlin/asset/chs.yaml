  bean 后，使用模拟查询`SELECT 1`来测试与 MariaDB 数据库的连接。


  在实际应用中，你可以使用 Apache Commons BasicDataSource^(⁴⁹)或由 JEE 应用服务器（例如 JBoss、WildFly、WebSphere、WebLogic
  或 GlassFish）实现的`DataSource`，这可以进一步提升应用程序的性能。你可以在纯 JDBC 代码中使用`DataSource`并获得相同的连接池优势；然而，在大多数情况下，你仍然需要一个中心位置来配置`DataSource`。另一方面，Spring
  允许你声明一个`dataSource` bean，并在`ApplicationContext`定义文件中设置连接属性。清单 6-12 中的配置示例演示了使用`org.apache.commons.dbcp2.BasicDataSource`实现来代替`SimpleDriverDataSource`。


  ```

  package com.apress.prospring6.six.config

  import org.apache.commons.dbcp2.BasicDataSource

  // other import statements omitted

  @Configuration

  @PropertySource("classpath:db/jdbc.properties")

  open class BasicDataSourceCfg {

  // code omitted for duplication, same as in 6-10

  @Bean(destroyMethod = "close")

  open fun dataSource(): DataSource? {

  return try {

  val dataSource = BasicDataSource()

  dataSource.driverClassName = driverClassName

  dataSource.url = url

  dataSource.username = username

  dataSource.password = password

  dataSource

  } catch (e: Exception) {

  LOGGER.error("DBCP DataSource bean cannot be created!", e)

  null

  }

  }

  companion object {

  private val LOGGER = LoggerFactory.getLogger(BasicDataSourceCfg::class.java)

  }

  }

  清单 6-12 BasicDataSourceCfg 类

  ```


  这个由 Spring 管理的特定`DataSource`是在`org.apache.commons.dbcp2.BasicDataSource`中实现的。最重要的一点是，该
  bean 类型实现了`javax.sql.DataSource`，你可以立即在你的数据访问类中使用它。


  另一种配置`dataSource` bean 的方法是使用 JNDI。如果你正在开发的应用程序将在 JEE 容器中运行，你可以利用容器管理的连接池。要使用基于
  JNDI 的数据源，你需要更改`dataSource` bean 的声明，如清单 6-13 所示。


  ```

  package com.apress.prospring6.six.config

  import org.springframework.jndi.JndiTemplate

  // other import statements omitted

  @Configuration

  open class JndiDataSourceCfg {

  @Bean

  open fun dataSource(): DataSource? {

  return try {

  JndiTemplate().lookup("java:comp/env/jdbc/musicdb") as DataSource

  } catch (e: Exception) {

  LOGGER.error("JNDI DataSource bean cannot be created!", e)

  null

  }

  }

  companion object {

  private val LOGGER = LoggerFactory.getLogger(JndiDataSourceCfg::class.java)

  }

  }

  清单 6-13 JndiDataSourceCfg 类

  ```


  在这个例子中，`JndiTemplate`被用来通过 JNDI 查找获取数据源。这是一个非常有用的辅助类，它简化了 JNDI 操作。它提供了查找和绑定对象的方法，并允许`JndiCallback`接口的实现利用提供的
  JNDI 命名上下文执行任何它们想要的操作。


  如你所见，Spring 允许你以几乎任何你喜欢的方式配置`DataSource`，并且它对应用程序的其余代码隐藏了数据源的实际实现或位置。换句话说，你的 DAO
  类不知道也不需要知道`DataSource`指向哪里。


  连接管理也被委托给了`dataSource` bean，该 bean 要么自行管理，要么使用 JEE 容器来完成所有工作。


  ### 嵌入式数据库支持


  从 3.0 版本开始，Spring 还提供了嵌入式数据库支持，它可以自动启动一个嵌入式数据库，并将其作为`DataSource`暴露给应用程序。嵌入式数据库支持对于本地开发或单元测试极为有用。在后续涉及数据访问的章节中，我们将使用嵌入式数据库来运行示例代码，这样你的机器就不需要安装数据库来运行示例，但如果你想要真正的开发者体验，可以考虑设置一个
  Docker 容器。


  清单 6-14 中的配置类展示了在 Spring 应用程序上下文中设置嵌入式 H2 数据库所需的最小配置。


  ```

  package com.apress.prospring6.six.config

  import org.springframework.jdbc.datasource.embedded.EmbeddedDatabaseBuilder

  import org.springframework.jdbc.datasource.embedded.EmbeddedDatabaseType

  // other import statements omitted

  @Configuration

  open class EmbeddedJdbcConfig {

  @Bean

  open fun dataSource(): DataSource? {

  return try {

  val dbBuilder = EmbeddedDatabaseBuilder()

  dbBuilder.setType(EmbeddedDatabaseType.H2)

  .addScripts("classpath:h2/create-schema.sql",

  "classpath:h2/test-data.sql").build()

  } catch (e: Exception) {

  LOGGER.error("Embedded DataSource bean cannot be created!", e)

  null

  }

  }

  companion object {

  private val LOGGER = LoggerFactory.getLogger(EmbeddedJdbcConfig::class.java)

  }

  }

  清单 6-14 EmbeddedJdbcConfig 类

  ```


  `EmbeddedDatabaseBuilder`类使用数据库创建和加载数据脚本作为参数，来创建一个实现了`DataSource`的`EmbeddedDatabase`实例。


  ![](img/524962_1_En_6_Figg_HTML.jpg) 一个警告图标。它有一个圆圈内带感叹号。   注意，脚本的顺序很重要，包含数据定义语言（DDL）的文件应始终放在前面，随后是包含数据操作语言（DML）的文件。对于`type`属性，我们指定要使用的嵌入式数据库类型。从
  4.0 版本开始，Spring 支持 HSQL（默认）、H2 和 DERBY。




  ### 在 DAO 类中使用 DataSource


  数据访问对象（DAO）模式用于将底层的数据访问 API 或操作与高层业务服务分离。数据访问对象模式需要以下组件：


  *   *DAO 接口*：定义要对一个（或多个）模型对象执行的标准操作。


  *   *DAO 实现*：该类为 DAO 接口提供具体实现。通常，它使用 JDBC 连接或数据源来处理模型对象。


  *   *模型对象*（也称为*数据对象*或*实体*）：这些是映射到表记录的简单 POJO。


  让我们创建一个 `SingerDao` 接口作为示例进行实现，如清单 6-15 所示。


  ```

  interface SingerDao {

  fun findNameById(Long id:Long):String?

  }

  清单 6-15

  SingerDao 接口

  ```


  对于名为 `JdbcSingerDao` 的简单实现类，我们首先添加一个 `dataSource` 属性。我们想要将 `dataSource` 属性添加到实现类而不是接口中的原因应该很明显：接口不需要知道数据将如何被检索和更新。通过向接口添加
  `DataSource` 的修改方法，最好的情况是这会强制实现类声明 getter 和 setter 存根。显然，这不是一个很好的设计实践。请查看清单 6-16
  中所示的简单 `JdbcSingerDao` 类。


  ```

  package com.apress.prospring6.six.plain

  internal class JdbcSingerDao : SingerDao, InitializingBean {

  var dataSource: DataSource? = null

  @Throws(Exception::class)

  override fun afterPropertiesSet() {

  if (dataSource == null) {

  throw BeanCreationException("Must set dataSource on SingerDao")

  }

  }

  override fun findNameById(id: Long?): String {

  val result = ""

  try {

  dataSource!!.connection.use { connection ->

  connection.prepareStatement(FIND_NAME + id).use { statement ->

  statement.executeQuery().use { resultSet ->

  while (resultSet.next()) {

  return resultSet.getString("first_name") + " " +

  resultSet.getString("last_name")

  }

  }

  }

  }

  } catch (ex: SQLException) {

  LOGGER.error("Problem when executing SELECT!", ex)

  }

  return result

  }

  companion object {

  private val LOGGER = LoggerFactory.getLogger(JdbcSingerDao::class.java)

  }

  }

  清单 6-16

  JdbcSingerDao 类

  ```


  现在，我们可以指示 Spring 使用 `JdbcSingerDao` 实现来配置我们的 `singerDao` bean，并设置 `dataSource` 属性，如
  `SpringDatasourceCfg` 配置类所示，该类在清单 6-17 中展示。（请注意，我们导入了上一节介绍的 `BasicDataSourceCfg`
  类，以避免代码重复。）


  ```

  package com.apress.prospring6.six.plain

  import org.springframework.context.annotation.Configuration

  import org.springframework.context.annotation.Import

  import org.springframework.beans.factory.annotation.Autowired

  import org.springframework.context.annotation.Bean

  // 其他 import 语句已省略

  @Import(BasicDataSourceCfg::class)

  @Configuration

  open class SpringDatasourceCfg {

  @Autowired

  var dataSource: DataSource? = null

  @Bean

  open fun singerDao(): SingerDao {

  val dao = JdbcSingerDao()

  dao.dataSource = dataSource

  return dao

  }

  }

  清单 6-17

  SpringDatasourceCfg 配置类

  ```


  现在，Spring 通过实例化 `JdbcSingerDao` 类来创建 `singerDao` bean，并将 `dataSource` 属性设置为 `dataSource`
  bean。确保 bean 上所有必需的属性都已设置是一个好习惯。最简单的方法是实现 `InitializingBean` 接口并为 `afterPropertiesSet()`
  方法提供实现。这样，我们就能确保 `JdbcSingerDao` 上所有必需的属性都已设置。关于 bean 初始化的进一步讨论，请参考**第** **4****章**。


  我们目前看到的代码使用 Spring 来管理数据源，并引入了 `SingerDao` 接口及其 JDBC 实现。我们还在 Spring 的 `ApplicationContext`
  文件中设置了 `JdbcSingerDao` 类的 `dataSource` 属性。


  `SpringDatasourceCfg` 可以用与 `BasicDataSourceCfg` 相同的方式进行测试，但测试还可以检查 `findNameById(..)`
  方法的行为。测试方法如清单 6-18 所示。


