  清单 9-7\nAllServiceTest.testFindAll() 执行日志片段，展示事务管理\n```\n\n这段日志包含了 `org.springframework.orm.jpa`\
  \ 和 `org.springframework.transaction` 包中类的相关日志语句。`JpaTransactionManager` 负责处理事务的创建和提交操作。请注意，在执行\
  \ `findAllWithAlbums()` 方法之前，Spring 的 `AbstractPlatformTransactionManager`（`JpaTransactionManager`\
  \ 的父类）会创建一个新事务。其名称等于完全限定的类名与方法名的拼接。事务名称旁边是事务属性：`PROPAGATION_REQUIRED,ISOLATION_DEFAULT,readOnly`。该事务由\
  \ Hibernate 内部包 `org.hibernate.engine.transaction.internal` 中的 `TransactionImpl`\
  \ 实例表示。该类（间接）实现了 `jakarta.persistence.EntityTransaction` 接口，该接口用于控制资源本地实体管理器上的事务。因此，事务由\
  \ `EntityManager` 获取，然后提交查询，在完成且无任何错误后，事务被提交。\n\n从日志中，您可能会认为事务是在从数据库检索专辑之前提交的，但这只是日志记录的时间顺序。实际上，所有查询都在同一个事务内执行。\n\
  \n\n\n接下来要介绍的方法涉及更新操作。要检查更新操作的结果，`findById()` 方法同样很有用。代码清单 9-8 展示了这两个方法的实现。\n\n\
  ```\npackage com.apress.prospring6.nine.services\n// 省略了导入语句\n@Service\n@Transactional\n\
  class AllServiceImpl(private val singerRepo: SingerRepo, private val albumRepo:\
  \ AlbumRepo) : AllService {\n@Transactional(readOnly = true)\noverride fun findByIdWithAlbums(id:\
  \ Long): Singer? {\nval singerOpt = singerRepo.findById(id)\nsingerOpt?.run {\n\
  albums = albumRepo.findBySinger(this)\n.collect(Collectors.toSet())\n}\nreturn singerOpt\n\
  }\n@Transactional(propagation = Propagation.REQUIRES_NEW)\noverride fun update(singer:\
  \ Singer) {\nsingerRepo.save(singer)\n}\n...\n}\n代码清单 9-8\n同一事务中的 AllServiceImpl\n\
  ```\n\n`findByIdWithAlbums(..)` 方法也使用了 `@Transactional(readOnly=true)` 注解。通常，`readOnly=true`\
  \ 属性应应用于所有查找方法。主要原因是大多数持久化提供程序会对只读事务执行一定程度的优化。例如，Hibernate 在启用只读模式时，不会维护从数据库检索到的受管实例的快照。\n\
  \n在 `AllServiceImpl.update(..)` 方法中，我们简单地调用了 `SingerRepoIml.save(..)` 方法，并使用 `@Transactional(propagation\
  \ = Propagation.REQUIRES_NEW)` 对该方法进行了注解。这意味着类级别的注解被覆盖，并且将创建一个新事务来执行更新操作。测试 `AllServiceImpl.update(..)`\
