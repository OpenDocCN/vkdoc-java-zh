  DEBUG: CompositeLog - Response 201 CREATED\nDEBUG: CompositeLog - Reading to [com.apress.prospring6.thirteen.Letter]\n\
  清单 13-12\n使用 restTemplate Bean 发送请求的应用程序日志条目\n```\n\n在 Evelyn 应用程序上，你可以看到匹配的日志，如清单\
  \ 13-13 所示。\n\n```\nDEBUG: LogFormatUtils - POST \"/letters\", parameters={}\nDEBUG:\
  \ AbstractMessageConverterMethodProcessor - Using 'application/json', given [application/json,\
  \ application/*+json] and supported [application/hal+json, application/json, application/prs.hal-forms+json]\n\
  DEBUG: LogFormatUtils - Writing [EntityModel { content: Letter(id=1, title=Salutations\
  \ from Scotland, sender=Tom, sentOn=2022-12-06,  (truncated)...]\nDEBUG: FrameworkServlet\
  \ - Completed 201 CREATED\n清单 13-13\n接收 POST 请求的应用程序日志条目\n```\n\n为了真正确信，你可以在浏览器中打开\
