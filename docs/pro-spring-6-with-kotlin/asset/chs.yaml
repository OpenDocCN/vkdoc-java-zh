  ```


  请注意，在创建代理时，我们将`optimize`标志设置为`true`，以强制使用 CGLIB 代理。这样做的原因是，当你使用 JDK 代理来引入混入时，生成的代理将不会是对象类（此处为`Contact`）的实例；代理仅实现混入接口——它不会扩展原始类。而使用
  CGLIB 代理时，代理会同时扩展原始类和混入接口。


  请注意，在代码清单 5-40 中，我们首先测试代理是否是`Contact`的实例，然后测试它是否是`IsModified`的实例。当使用 CGLIB 代理时，这两个测试都返回`true`，但对于
  JDK 代理，只有`IsModified`测试返回`true`。最后，我们通过先将`name`属性设置为其当前值，然后设置为一个新值，并每次检查`isModified`标志的值，来测试修改检查代码。运行该示例将产生如代码清单
  5-41 所示的输出。


  ```

  INFO : IntroductionDemo - Is Contact? => true

  INFO : IntroductionDemo - Is IsModified? => true

  INFO : IntroductionDemo - Has been modified? => false

  INFO : IntroductionDemo - Has been modified? => false

  INFO : IntroductionDemo - Has been modified? => true

  代码清单 5-41

  IntroductionDemo 执行输出

  ```


  正如预期，两个`instanceof`测试都返回`true`。请注意，在发生任何修改之前，第一次调用`isModified()`返回`false`。接下来，在我们把`name`的值设置为相同值之后，调用也返回`false`。然而，在最后一次调用中，我们将`name`的值设置为一个新值后，`isModified()`方法返回`true`，表明该对象确实已被修改。


  ### 引入总结


  引入是 Spring AOP 最强大的特性之一；它不仅允许你扩展现有方法的功能，还能动态地扩展接口和对象实现的集合。使用引入是实现横切逻辑的完美方式，你的应用程序通过定义良好的接口与这些逻辑交互。通常，这类逻辑是你希望以声明方式而非编程方式应用的。通过使用本例中定义的`IsModifiedMixin`以及下一节讨论的框架服务，你可以声明式地定义哪些对象能够进行修改检查，而无需修改这些对象的实现。


  显然，由于引入是通过代理工作的，它们会增加一定的开销。代理上的所有方法都被视为已增强，因为切入点不能与引入结合使用。然而，对于许多可以通过引入实现的服务（例如对象修改检查），这种性能开销相对于减少实现服务所需的代码量，以及完全集中服务逻辑所带来的稳定性和可维护性的提升，是微不足道的。


  ## AOP 的框架服务


  到目前为止，我们不得不编写大量代码来增强对象并为其生成代理。虽然这本身不是一个大问题，但它确实意味着所有的通知配置都被硬编码到你的应用程序中，从而失去了透明地增强方法实现的一些好处。幸运的是，Spring
  提供了额外的框架服务，允许你在应用程序配置中创建增强的代理，然后将此代理像其他任何依赖项一样注入到目标 Bean 中。


  使用声明式方法进行 AOP 配置比手动编程机制更可取。当你使用声明式机制时，不仅可以将通知的配置外部化，还可以减少编码错误的机会。你还可以利用 DI 和 AOP
  的结合来启用 AOP，使其能够在完全透明的环境中使用。


  ### 声明式配置 AOP


  当使用 Spring AOP 的声明式配置时，有三种选择：


  *   *使用* *ProxyFactoryBean*：在 Spring AOP 中，`ProxyFactoryBean`提供了一种声明式的方式，用于在基于定义的
  Spring Bean 创建 AOP 代理时配置 Spring 的`ApplicationContext`（以及底层的`BeanFactory`）。


  *   *使用 Spring* *aop* *命名空间*：Spring 2.0 引入的`aop`命名空间提供了一种（与`ProxyFactoryBean`相比）简化的方式来在
  Spring 应用程序中定义切面及其 DI 需求。然而，`aop`命名空间在幕后也使用了`ProxyFactoryBean`。本书不展示此选项，因为重点在于使用基于
  Java/Kotlin 代码的配置。


  *   *使用* *@AspectJ 风格注解*：配置 Spring AOP 的实用方法是在你的类中使用`@AspectJ`风格的注解。虽然它使用的语法基于 AspectJ，并且在使用此选项时需要包含一些
  AspectJ 库，但在引导`ApplicationContext`时，Spring 仍然使用代理机制（即为目标创建代理对象）。




  ### 使用 `ProxyFactoryBean`


  `ProxyFactoryBean` 类是 `FactoryBean` 的一个实现，它允许你指定一个目标 bean，并为该 bean 提供一组通知和顾问，这些最终会被合并到一个
  AOP 代理中。`ProxyFactoryBean` 用于将拦截器逻辑应用到现有的目标 bean 上，这样当该 bean 上的方法被调用时，拦截器会在方法调用前后执行。由于你可以同时使用顾问和通知与
  `ProxyFactoryBean`，因此你不仅可以声明式地配置通知，还可以配置切入点。


  `ProxyFactoryBean` 与 `ProxyFactory` 共享一个公共接口（`org.springframework.aop.framework.Advised`
  接口）（这两个类都间接扩展了 `org.springframework.aop.framework.AdvisedSupport` 类，而该类实现了 `Advised`
  接口），因此，它暴露了许多相同的标志，例如 `frozen`、`optimize` 和 `exposeProxy`。这些标志的值会直接传递给底层的 `ProxyFactory`，这允许你同样以声明式的方式配置工厂。


  使用 `ProxyFactoryBean` 很简单。你定义一个 bean 作为目标 bean，然后使用 `ProxyFactoryBean`，以该目标 bean
  作为代理目标，定义你的应用程序将要访问的 bean。在可能的情况下，将目标 bean 定义为代理 bean 声明内部的匿名 bean。这可以防止你的应用程序意外访问未经过通知的
  bean。然而，在某些情况下，例如我们即将展示的示例中，你可能需要为同一个 bean 创建多个代理，因此在这种情况下，你应该使用一个普通的顶级 bean。


  对于以下示例，请设想这样一个场景：你有一位歌手与一位纪录片制作人合作，制作一部关于巡演的纪录片。在这种情况下，`Documentarist` 依赖于 `Singer`
  的实现。我们这里将使用的 `Singer` 实现是之前介绍过的 `GrammyGuitarist`，它在本章中已经出现过两次，上一次是在代码清单 5-33 中。代码清单
  5-42 展示了 `Documentarist` 类，它基本上会告诉歌手在拍摄纪录片时该做什么。


  ```

  package com.apress.prospring6.five.common

  open class Documentarist {

  private var guitarist: GrammyGuitarist? = null

  open fun execute() {

  guitarist!!.sing()

  guitarist!!.talk()

  }

  open fun setDep(guitarist: GrammyGuitarist?) {

  this.guitarist = guitarist

  }

  }

