  ## 使用 Spring Data 的考量


  无论你是使用 Spring Data JPA、MongoDB 还是其他针对特定数据库的模块，Spring Data 都能大大减少你需要完成的工作量。再加上 Spring
  Boot，甚至连配置工作也能显著减少。然而，要真正发挥 Spring Data 的强大功能，你必须理解其所有构建模块。本书有助于实现这一目标，因为它逐步构建了所有层次，向你展示了通过正确使用
  Spring 所提供的全部功能所能节省的工作量。


  尽管如此，根据项目的规模和范围，使用 Spring Data 可能有些大材小用，因此在开始编写应用程序之前请考虑这一点。这就像为你 83 岁、只需要打电话和接电话、并且因为关节炎可能经常摔手机的奶奶选择一部智能手机。给她买一部昂贵、复杂、易碎且提供大量她永远不会使用的功能的手机毫无意义，而一部翻盖手机就能满足她所有的需求。因此，请根据项目试图满足的需求来选择合适的工具。




  ## 总结


  由于这是数据访问系列章节的最后一章，因此有必要进行一个总体总结：


  *   JPA 是一个规范，它定义了用于对象关系映射和管理持久化对象的 API。在 Oracle 决定将其开源并捐赠给 Jakarta 之前，它一直是 JEE
  的一部分。这触发了包名从 `javax` 到 `jakarta` 的重命名。


  *   所有 JPA 实现，如 Hibernate 和 EclipseLink 的最新版本，都已与新规范保持一致。


  *   Spring Data JPA 在 JPA 之上增加了一层，并使用其所有特性，如实体、关联映射、实体生命周期管理，并增加了自己的特性，如 Spring
  Data 无代码仓库。


  *   有多个 Spring Data 库，每个库都旨在减少使用特定数据库时的样板代码。Spring Data JPA 适用于任何关系型数据库。对于 NoSQL
  数据库，有多个库可用于 MongoDB、CouchBase、Redis 等。


  *   通过声明一个 `TransactionManager` bean 并使用 Spring 的 `@Transactional` 注解来注解服务类和方法，可以轻松配置事务行为。对于关系型数据库和非关系型数据库，其配置方式相同，唯一的区别在于
  `TransactionManager` 的类型。


  *   Spring Data Boot 启动器通过减少配置应用程序所需编写的代码，降低了与数据库交互所需的工作量。


  *   Testcontainers 是一个用于测试需要数据库的 Spring 应用程序的出色工具，因为它易于设置，允许你重用大部分生产范围的配置。这使你能够在尽可能接近生产环境的测试上下文中运行集成测试。当然，它要求你安装
  Docker 并能访问互联网，以便在需要时拉取容器镜像。


  数据访问系列章节到此结束。


