  \ 视图\n\n清单 19-4 中的代码片段提供了一个用户界面，允许我们回调 WebSocket API 并观察实时结果在屏幕上显示。\n\n构建项目，并以任意方式将其部署到\
  \ Web 容器中，或者按照**第** **14** **章**的说明使用 IntelliJ IDEA Ultimate Tomcat 启动器。然后导航至 `http://localhost:8080/ch19/index`\
  \ 以打开用户界面。点击“连接”按钮，您会注意到“连接”和“断开”按钮旁边出现一个绿色的“已连接”徽章，如图 19-3 所示，并且每三秒会在“Ping”文本区域显示一条\
