  或任何其他用于发起 HTTP 请求的应用程序或命令行工具。让我们从最简单的 HTTPie 开始，即 IntelliJ IDEA HTTP 客户端（需要 IntelliJ
  IDEA Ultimate 版本）。以 XML 格式检索所有歌手的请求以及返回响应的片段如清单 15-6 所示。


