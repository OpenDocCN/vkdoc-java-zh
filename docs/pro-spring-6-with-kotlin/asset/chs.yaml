  \ 任务生成 AOT Java 代码。接着，`processAot` 任务启动应用程序以检查其是否仍然正常工作。最后，`compileAotJava` 生成**原生字节码**。\n\
  \n所有这些任务的结果都可以在 `build/generated` 目录中看到。AOT 生成的 Java 代码和 GraalVM JSON 提示文件就保存在这里。字节码和原生代码则按作用域分组存储在\
  \ `build/classes/java/` 目录下。图 16-3 展示了这些新目录及其部分内容。\n\n![](img/524962_1_En_16_Fig3_HTML.jpg)\n\
  \n\n\n第 16 章原生启动中的文件夹列表包括：build、classes、java、a o t、com、org、kotlin、generated、a o\
  \ t classes、a o t resources、a o t sources 和 sources。\n\n图 16-3\n\n构建过程生成的中间文件，用于生成原生镜像\n\
  \n最后，`bootBuildImage` 开始为原生可执行文件构建镜像。首先，它会下载基础的 CND 镜像，然后基于 GraalVM JDK 19.0.2 构建可执行文件，仅添加运行可执行文件所必需的少量组件。最终生成一个静态可执行文件，随后对其进行处理，以计算内存占用和存储需求，这些参数将决定\
  \ Docker 镜像的相应配置。\n\n如果所有这些步骤都成功完成，Docker 仪表盘的“镜像”选项卡中应会列出最新生成的 `prospring6-gradle-native:1.0`\
  \ 镜像，如图 16-4 所示。\n\n![](img/524962_1_En_16_Fig4_HTML.jpg)\n\n一张 Docker Desktop 的截图，左侧包含四个选项：容器、镜像、卷和开发环境。当前选中了“镜像”。右侧的镜像页面有一个表格，包含\
  \ 6 列 5 行。列标题分别是：名称、标签、状态、创建时间、大小和操作。\n\n图 16-4\n\nDocker 仪表盘显示 `prospring6-gradle-native:1.0`\
  \ 镜像\n\n请注意该镜像的大小。点击其名称可查看镜像详情，如图 16-5 所示，包括各层、其内容以及漏洞信息（不必过分担心，因为任何软件都存在漏洞；关键在于其严重程度）。\n\
  \n![](img/524962_1_En_16_Fig5_HTML.jpg)\n\n一张窗口截图，左侧显示镜像层级结构及 9 个层，大小标注从 0 到 8。右侧显示了一个软件包列表。顶部显示镜像\
  \ ID、创建时间、大小、更多操作和运行选项卡，其中“运行”选项卡被选中。\n\n图 16-5\n\nDocker 仪表盘显示 `prospring6-gradle-native:1.0`\
  \ 镜像的详细信息\n\n要检查此镜像是否正常工作，我们应该基于它启动一个容器。但由于我们知道应用程序需要数据库，因此需要一种方式来告知它数据库的位置和连接方法。所有这些细节都通过程序参数提供，这些参数会成为容器的环境变量。Spring\
  \ Boot 应用程序可以在配置文件中引用这些变量。需要修改 `application.yaml` 文件中的数据源配置，以便从环境变量中获取连接数据库所需的值。配置示例如清单\
  \ 16-7 所示。\n\n```\nspring:\ndatasource:\ndriverClassName: org.mariadb.jdbc.Driver\n\
  url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_SCHEMA:musicdb}?useSSL=false\n\
  username: ${DB_USER:prospring6}\npassword: ${DB_PASS:prospring6}\n清单 16-7\n引用环境变量的\
  \ Spring Boot 配置文件\n```\n\n`${VAR_NAME:default_value}` 用于为变量提供默认值，以防在启动应用程序时，环境变量既未设置也未通过命令行提供。配置中的所有变量都有默认值。当在需要连接到另一个容器中运行的数据库的容器内运行应用程序时，我们唯一需要实际值的变量是\
  \ `DB_HOST`，因为在容器中 `localhost` 指向的是容器自身。要获取数据库所在容器的 IP 地址（假设容器名为 `local-mariadb`），清单\
  \ 16-8 中的命令可以完成此任务。\n\n```\ndocker inspect local-mariadb | grep IPAddress  # 假设为\
  \ 172.17.0.2\n清单 16-8\n检索正在运行的 Docker 容器 IP 地址的命令\n\n现在我们已经有了数据库的 IP 地址，可以使用清单 16-9\
  \ 中的命令启动我们的原生容器。\n\n```\ndocker run --name prospring6-native -e DB_HOST=172.17.0.2\
  \ -d -p 8081:8081 prospring6-gradle-native:1.0\n清单 16-9\n启动 Docker 容器 IP 的命令\n\n\
  为了确保应用程序正确启动，你可以尝试访问 `http://localhost:8081/singers`，所有 `Singer` 实例的 JSON 表示形式都应返回。另一种确保应用程序正确启动的方法是检查\
  \ Docker 仪表盘中的容器日志，其中不仅显示 Spring Boot 应用程序的启动日志，还显示应用程序启动所花费的时间，这正是原生镜像的超级优势之一。图\
  \ 16-6 展示了在本地系统 JVM 上启动的 `Chapter16NativeApplication` 与在容器内从原生可执行文件启动的同一应用程序之间的对比。\n\
  \n![](img/524962_1_En_16_Fig6_HTML.jpg)\n\n一张标题为“第 16 章原生应用程序”的窗口截图，控制台页面包含一系列信息和警告消息。高亮文本显示：在\
  \ JVM 上启动第 16 章原生应用程序耗时 3.096 秒，在 GraalVM 上耗时 0.147 秒。\n\n图 16-6\n\n基于 `prospring6-gradle-native:1.0`\
  \ 镜像的容器启动时间\n\n当应用程序被构建为原生可执行文件时，启动时间从 3 秒下降到 0.147 秒，启动时间缩短了 20 倍，而这仅仅是一个小型、非常简单的应用程序。对于执行更复杂操作的应用程序，改进效果可能会更好。\n\
  \n要了解更多关于原生镜像的信息，以及如何更好地开发 Spring 应用程序以便轻松构建为原生可执行文件的建议，请阅读官方文档，并留意会议上关于此主题的任何演讲。这项技术虽然已走出实验阶段，但仍处于早期阶段，要成为\
  \ Java 应用程序的行业默认标准（如果真能实现的话），还有很长的路要走。\n\n\n\n## Spring for GraphQL\n\nGraphQL 是一种用于\
  \ API 的查询语言，也是一个根据这些查询提供数据的运行时。GraphQL 提供了对 API 中数据的完整且易于理解的描述，允许客户端请求某些数据，并仅接收其请求的内容，而无需为此编写复杂的代码。\n\
  \n回顾本书迄今为止构建的 REST API。REST 请求被映射到 URL 路径，例如 `http://localhost:8081/singer/1`。客户端发送一个\
  \ HTTP GET 请求，并接收数据库中 `SINGER` 表里 `id=1` 的 `Singer` 对象的所有信息。如果客户端需要存储在其他表中关于该歌手的其他信息，则必须编写不同的查询，这些查询将被映射到不同的\
  \ URL 路径。因此，客户端必须发出多个请求。使用 GraphQL，客户端无需更改请求的 URL，只需更改用于指定所需数据的模式（schema）。最终，GraphQL\
  \ 只是 REST、SOAP 或 gRPC 等已建立的应用程序间远程通信的另一种替代方案。\n\nFacebook 发明了 GraphQL，因为 REST 无法在单个请求中检索相关的信息图。使用\
  \ REST，多次的来回通信会导致页面加载缓慢，并产生不可接受的闪烁。我们可以更深入地描述 GraphQL，但出于本次讨论的目的，我们仅列出其最重要的特性：\n\
  \n*   GraphQL 是基于模式（schema）的。\n*   GraphQL 查询看起来很像 JSON，但它们不是 JSON。\n*   GraphQL\
  \ 是强类型的。GraphQL 模式语言支持标量类型 `String`、`Int`、`Float`、`Boolean` 和 `ID`，因此你可以直接在传递给 `buildSchema`\
  \ 的模式中使用它们。\n*   GraphQL 是为开发者设计的。\n*   GraphQL 与传输层无关；它最常用于 HTTP，但不仅限于此。例如，你可以通过\
  \ TCP 和 WebSocket 使用它。\n*   GraphQL 查询通过 POST 请求发送，因为它们根据需要可以很大且很复杂。它们可以通过嵌套所需的属性来指定从数据库的不同层级检索数据。\n\
  \nREST API 是端点的集合，而 GraphQL API 则专注于数据。本节重点介绍编写一个支持 GraphQL 的 Spring Boot 应用程序。GraphQL\
  \ 的核心概念将根据需要逐步解释。\n\n在本节中，我们将使用本书迄今为止所用数据库的修改版本。此应用程序管理的数据存储在三个表中：`SINGER`、`AWARD`\
  \ 和 `INSTRUMENT`，它们之间的关系如图 16-7 所示。\n\n![](img/524962_1_En_16_Fig7_HTML.jpg)\n\n\
  一个包含三个块的框图，左侧是 award，中间是 singer，右侧是 instrument。Award 和 singer 通过一条带有一个星号和数字 1 的线连接。Singer\
  \ 和 instrument 通过一条带有两个星号的线连接。\n\n图 16-7\n\n项目 `chapter16-graphql-boot` 的表关系\n\n\
  对于本章中的代码示例，这些表是名为 `MUSICDB` 的模式的一部分，访问该模式的用户名为 `prospring6`。用于创建模式的 SQL 代码可以在 `chapter16-graphql-boot`\
  \ 项目目录下的 `chapter16-graphql-boot/docker-build/scripts/01_CreateTable.sql` 文件中找到。用于填充表的\
  \ SQL 代码可以在 `chapter16-graphql-boot` 项目目录下的 `chapter16-graphql-boot/docker-build/scripts/02_InsertData.sql`\
  \ 文件中找到。这些脚本是用于构建包含示例所需数据库的镜像的 Docker 配置的一部分。\n\n除了 `spring-boot-starter-graphql`\
  \ 依赖项之外，所有其他依赖项都与通过 Spring Data 仓库访问 MariaDB 数据库的 Spring Boot Web 应用程序相同。图 16-8\
  \ 显示了 `chapter16-graphql-boot` 项目的依赖项。\n\n![](img/524962_1_En_16_Fig8_HTML.jpg)\n\
  \n第 16 章 graphql boot 的依赖项列表中有两个高亮显示的库。它们是 spring boot starter graphql 和 spring\
  \ graphql。\n\n图 16-8\n\n项目 `chapter16-graphql-boot` 的依赖项\n\n`Singer` 实体类如清单 16-10\
  \ 所示，与数据访问章节中介绍的实体类没有区别。\n\n```\npackage com.apress.prospring6.sixteen.boot.entities\n\
  import jakarta.persistence.*\n// 其他导入语句已省略\n@Entity\n@Table(name = \"SINGER\")\n\
  class Singer() : Serializable {\n@Id\n@GeneratedValue(strategy = GenerationType.IDENTITY)\n\
  @Column(name = \"ID\")\nvar id: Long? = null\n@Version\n@Column(name = \"VERSION\"\
  )\nvar version = 0\n@Column(name = \"FIRST_NAME\")\nvar firstName: String? = null\n\
  @Column(name = \"LAST_NAME\")\nvar lastName: String? = null\n@Column(name = \"PSEUDONYM\"\
  )\nvar pseudonym: String? = null\n@Column(name = \"GENRE\")\nvar genre: String?\
  \ = null\n@DateTimeFormat(pattern = \"yyyy-MM-dd\")\n@Column(name = \"BIRTH_DATE\"\
  )\nvar birthDate: LocalDate? = null\n@OneToMany(mappedBy = \"singer\")\nvar awards:\
  \ Set? = null\n@ManyToMany\n@JoinTable(\nname = \"SINGER_INSTRUMENT\",\njoinColumns\
  \ = [JoinColumn(name = \"SINGER_ID\")],\ninverseJoinColumns = [JoinColumn(name =\
  \ \"INSTRUMENT_ID\")]\n)\nvar instruments: Set? = null\n// 构造函数、equals() 和 hashCode()\
