  列表 6-54

  使用 @Sql* 注解的 JdbcRepoTest 类

  ```


  测试 `ApplicationContext` 是使用 `@SpringJUnitJupiterConfig` 注解创建的。这是一个组合注解，它将 JUnit
  Jupiter 的 `@ExtendWith(SpringExtension.class)` 与 Spring TestContext 框架的 `@ContextConfiguration`
  结合在一起。出于实际原因，`EmptyEmbeddedJdbcConfig` 配置类被声明为测试类主体中的一个内部类：它很小，并且仅与此测试类相关。生成的测试
  `ApplicationContext` 包含定义数据源的 bean，该数据源指向一个名为 `musicdb` 的空内存 H2 数据库。由于测试类针对的是 `SingerJdbcRepo`
  bean 的方法，因此该类也被添加到上下文中。


  包含 `SINGER` 和 `ALBUM` 表的数据库模式是通过使用以下注解标注测试类来初始化的：`@Sql({ "classpath:h2/drop-schema.sql",
  "classpath:h2/create-schema.sql" })`。这两个脚本包含的 SQL 代码正如其名称所示——删除并创建数据库模式中的表。




  注解 `@Sql(value = "classpath:h2/test-data.sql")` 用于标注测试方法，默认在测试方法执行前运行，以准备测试所需的数据库内容。如果找不到任何歌手，执行
  `findAll()` 就没有意义了，对吧？


  这个注解功能非常强大，可以通过 `@SqlConfigure` 进行配置，以提供关于所执行脚本的更多细节，例如编码、用作语句分隔符的字符、用作注释前缀的字符等等。`@Sql`
  还提供了一个 `executionPhase` 属性，用于指定脚本或语句应在测试方法之前还是之后执行，这对于清理工作非常有用，可以避免污染上下文并防止其他测试失败。


  这意味着 `testFindAllWithMappingSqlQuery`() 测试方法上的注解也可以写成：


  ```

  @Sql(value = "classpath:h2/test-data.sql",

  config = @SqlConfig(encoding = "utf-8", separator = ";", commentPrefix = "--"),

  executionPhase = Sql.ExecutionPhase.BEFORE_TEST_METHOD)

  ```


  `@SqlMergeMode(SqlMergeMode.MergeMode.MERGE)` 注解表示方法级别的 `@Sql` 声明应与类级别的 `@Sql` 声明合并，类级别的
  SQL 脚本和语句会在方法级别的脚本和语句之前执行。另一个选项是使用 `@SqlMergeMode(SqlMergeMode.MergeMode.OVERRIDE)`，它允许方法上的
  `@Sql` 声明注解覆盖类级别的注解。


  当 `@Sql` 注解在类级别使用时，如果没有指定 `@SqlMergeMode`，则它们配置的声明将被忽略，这几乎肯定会导致测试失败。


  如前所述，`@Sql` 不仅可以指定脚本，还可以指定语句。清单 6-55 展示了 `testFindByNameWithMappingSqlQuery()` 方法，用于验证
  `findByFirstName(..)` 方法是否按预期工作。


  ```

  package com.apress.prospring6.six.repo

  import org.springframework.test.context.jdbc.SqlGroup

  // 其他导入语句已省略

  @SqlMergeMode(SqlMergeMode.MergeMode.MERGE)

  @Sql("classpath:h2/drop-schema.sql", "classpath:h2/create-schema.sql")

  @SpringJUnitConfig(classes = [EmptyEmbeddedJdbcConfig::class, SingerJdbcRepo::class])

  class JdbcRepoTest {

  @Autowired

  var singerRepo: SingerRepo? = null

  @Test

  @DisplayName("应该返回 Chuck Berry")

  @SqlGroup(

  Sql(

  statements = arrayOf("insert into SINGER (first_name, last_name, birth_date) values
  (''Chuck'', ''Berry'', ''1926-09-18'')"),

  executionPhase = Sql.ExecutionPhase.BEFORE_TEST_METHOD

  ),

  Sql(

  statements = arrayOf("delete from  SINGER where first_name = ''Chuck''"),

  executionPhase = Sql.ExecutionPhase.AFTER_TEST_METHOD

  )

  )

  fun testFindByNameWithMappingSqlQuery() {

  val singers = singerRepo!!.findByFirstName("Chuck")

  Assertions.assertEquals(1, singers.size)

  LOGGER.info("结果: {}", singers[0])

  }

  ...

  companion object {

  private val LOGGER =

  LoggerFactory.getLogger(EmptyEmbeddedJdbcConfig::class.java)

  }

  }

  companion object {

  private val LOGGER = LoggerFactory.getLogger(RepoBeanTest::class.java)

  }

  }

  清单 6-55

  JdbcRepoTest.testFindByNameWithMappingSqlQuery() 测试方法

  ```


  清单 6-55 展示了如何使用 `@SqlGroup` 注解对 `@Sql` 注解进行分组。允许在同一个测试方法（或类）上使用多个 `@Sql` 注解，但 `@SqlGroup`
  是一种更优雅的分组方式，可以清晰地表明它们都与所标注的元素相关。


  对于同一个方法，请注意如何使用 `executionPhase` 属性：通过将其中一个 `@Sql` 注解设置为 `Sql.ExecutionPhase.BEFORE_TEST_METHOD`
  来插入测试方法的目标数据；对于另一个注解，则将 `executionPhase` 设置为 `Sql.ExecutionPhase.AFTER_TEST_METHOD`
  以从数据库中删除该数据。这确保了测试上下文保持干净，并且测试类中的方法可以按任意顺序运行，并且仍然能通过测试。


