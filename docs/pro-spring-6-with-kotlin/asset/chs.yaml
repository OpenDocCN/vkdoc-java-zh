  请注意，通知被执行了两次，但堆栈跟踪却无处可见。原因是 `assertThrows(..)` 方法，但由于测试通过，我们确信异常已被抛出。如果你有疑问，只需注释掉
  `assertThrows(..)` 这一行，将其替换为对 `sing(guitar)` 的调用，然后重新运行测试。


  对于 `@AfterReturning`，代码基本保持不变，唯一的不同是通知使用 `@AfterReturning` 注解而非 `@After`，并且测试时只会打印出
  `> 已执行: sing 来自 com.apress.prospring6.five.annotated.PretentiosGuitarist 使用吉他 Martin`。


  对于 `@AfterThrowing`，代码基本保持不变，唯一的不同是通知使用 `@AfterThrowing` 注解而非 `@After`，并且测试时只会打印出
  `> 已执行: sing 来自 com.apress.prospring6.five.annotated.PretentiosGuitarist 使用吉他 Musicman`。


  `@AfterThrowing` 通知还能做一件其他两种通知做不到的事情：拦截目标方法抛出的异常，并将其替换为另一种异常类型。


  `AfterThrowingAdviceV2` 切面将目标方法抛出的 `IllegalArgumentException` 替换为 `RejectedInstrumentException`
  的实例，这是一个非常简单的自定义 `RuntimeException` 实现。后置抛出通知无法阻止目标方法抛出异常，但可以替换它抛出的异常。`AfterThrowingAdviceV2`
  的代码如清单 5-65 所示。




  ```

  package com.apress.prospring6.five.advice

  import com.apress.prospring6.five.common.RejectedInstrumentException

  import org.aspectj.lang.annotation.AfterThrowing

  // 其他导入语句已省略

  @Component

  @Aspect

  class AfterThrowingAdviceV2 {

  @Pointcut("execution(* com.apress.prospring6.

  five..PretentiosGuitarist.sing*(

  com.apress.prospring6.five.common.Guitar))  && args(value)")

  fun singExecution(value: Guitar?) {

  }

  @AfterThrowing(value = "singExecution(guitar) ", argNames = "joinPoint,guitar, ex",
  throwing = "ex")

  fun simpleAfterAdvice(joinPoint: JoinPoint, guitar: Guitar, ex: IllegalArgumentException)
  {

  val signature = joinPoint.signature as MethodSignature

  LOGGER.info(

  " > 已执行: {} 来自 {}，使用吉他 {} ",

  signature.name,

  signature.declaringTypeName,

  guitar.brand

  )

  if (ex.message!!.contains("Unacceptable guitar!")) {

  throw RejectedInstrumentException(ex.message, ex)

  }

  }

  companion object {

  private val LOGGER = LoggerFactory.getLogger(AfterThrowingAdviceV2::class.java)

  }

  }

