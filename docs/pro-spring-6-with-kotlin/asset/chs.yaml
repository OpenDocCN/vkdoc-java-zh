  \ Spring Boot 配置属性，还可以通过实现接口或扩展 `org.springframework.boot.actuate` 包中的特定类来实现。例如，`org.springframework.boot.actuate.health.HealthIndicator`\
  \ 的自定义实现可以向 `/health` 端点添加额外信息。\n\n不出所料，Spring Boot Actuator 提供了创建自定义端点的选项。这是通过使用\
  \ `org.springframework.boot.actuate.endpoint.annotation` 包中的 `@Endpoint` 注解来标注一个\
  \ Bean 实现的。使用 `@ReadOperation`（处理 GET 请求）、`@WriteOperation`（处理 POST 请求）和 `@DeleteOperation`（处理\
  \ DELETE 请求）注解其方法，可以同时通过 JMX 和 HTTP 暴露这些端点。\n\n![](img/524962_1_En_18_Figa_HTML.jpg)\
  \ 一个带阴影圆圈内的感叹号符号。 在本书中，提到了一些支持过滤的端点，因为它们显示的数据可以通过在其 URI 后添加组件名称作为后缀来缩减。根据所讨论的端点，这些值可以是\
  \ Bean 名称、完全限定类名、属性名称等。您可能会将它们视为路径变量或过滤器，但 Spring 团队更倾向于称它们为*标签*。\n\nSpring Boot\
  \ Actuator 非常强大且高度可定制。要了解更多信息，请查看官方文档^(¹⁷⁸)。\n\n### 将 Spring Boot Actuator 与 Micrometer\
  \ 结合使用\n\n图 18-6（本章前面部分）展示了 `spring-boot-starter-actuator` 库及其两个传递依赖：`micrometer-core`\
  \ 和 `micrometer-observation`。Micrometer^(¹⁷⁹) 是一个开源指标门面，它提供了一个供应商中立的指标收集 API（父抽象实现是\
  \ `io.micrometer.core.instrument.MeterRegistry`^(¹⁸⁰)），并为本章开头提到的各种监控系统提供了实现。它可以与\
  \ Spring Boot Actuator 一起使用，但它本身也是一个独立的平台。\n\n如果难以理解 Micrometer，可以想想 SLF4J，它是各种日志框架的门面或抽象。这意味着开发人员可以使用\
  \ SLF4J 编写日志消息，这些消息将由应用程序配置的框架收集并写入到所需的目标支持中。在本书中，SLF4J 与 Logback Classic 一起使用，但我们可以轻松地将\
  \ Logback Classic 替换为 Log4j2，而无需更改任何代码。从 Spring Boot Actuator 2.x 开始，您也可以对指标做同样的事情——Micrometer\
  \ 可用于收集指标，并以任何（几乎）高级监控系统都能解释的格式暴露它们。Spring Boot 3 开箱即用地自动配置了相当长的一系列指标。通过向 `http://0.0.0.0:9091/monitoring/metrics`\
  \ 端点（如上一节所配置）发送 GET 请求，可以返回此列表。清单 18-12 列出了这些指标的名称。\n\n```\n{\n\"names\":[\n\"application.ready.time\"\
