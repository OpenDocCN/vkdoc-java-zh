  \ `Impl` 后缀。这允许 Spring Data 识别该方法的实现来源，并将其添加到其 JPA 仓库代理中。毕竟，约定优于配置是 Spring 框架的核心价值观之一。\n\
  \n\n\n![](img/524962_1_En_10_Figl_HTML.jpg) 一个信息符号。它由一个位于阴影圆圈内的小写字母 i 表示。 然而，易于定制也是\
  \ Spring 的一个价值观，因此如果你希望以不同的方式命名自定义仓库实现，你必须告知 Spring。这种定制是有限的；你只能通过 `@EnableJpaRepositories(repositoryImplementationPostfix\
  \ = \"${custom-prefix}\")` 指定一个不同的后缀来替换默认的 `Impl`，但这总比没有好。\n\n这意味着现在 `SingerAuditServiceImpl`\
