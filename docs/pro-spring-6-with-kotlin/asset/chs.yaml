  \n},\n\"letter\" : {\n\"href\" : \"http://localhost:8080/letters/1\"\n}\n}\n} ]\n\
  },\n\"_links\" : {\n\"self\" : {\n\"href\" : \"http://localhost:8080/letters\"\n\
  },\n\"profile\" : {\n\"href\" : \"http://localhost:8080/profile/letters\"\n},\n\"\
