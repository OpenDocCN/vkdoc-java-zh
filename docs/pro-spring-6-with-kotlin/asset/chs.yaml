  DEBUG: JooqLogger -                        : +----+-------+----------+---------+----------+\n\
  DEBUG: JooqLogger - 获取到的行数         : 1\n清单 7-37\nJOOQDslTest 类执行的日志片段\n```\n\n很简洁，对吧？那么，如何检索带有专辑的歌手呢？这显然需要一个\
  \ `join`。这也是可以做到的，但需要一些手动工作。其优势在于，我们可以设计用于存储数据的类，并简化它们，使其只包含必要的数据。例如，我们创建了一个名为 `SingerWithAlbums`\
  \ 的记录，它只包含 `firstName`、`lastName` 和 `List<AlbumRecord>`。顾名思义，`AlbumRecord` 也是一个记录，它只声明了两个字段：`title`\
  \ 和 `releaseDate`。清单 7-38 展示了这两个记录以及使用 `DSLContext` 加载信息的测试方法。\n\n```\n// ---------\n\
  // SingerWithAlbums.kt\ndata class SingerWithAlbums(val firstName:String,\nval lastName:String,\n\
  val birthDate:LocalDate,\nval albums:MutableList)\n// ---------\n// AlbumRecord.kt\n\
  data class AlbumRecord ( val title:String, val releaseDate: LocalDate)\n// ---------\n\
  // JOOQDslTest.java\nimport com.apress.prospring6.seven.base.config.BasicDataSourceCfg\n\
  import com.apress.prospring6.seven.jooq.config.JOOQConfig\nimport com.apress.prospring6.seven.jooq.generated.Tables.*\n\
  import com.apress.prospring6.seven.jooq.generated.tables.Singer\nimport com.apress.prospring6.seven.jooq.generated.tables.SingerInstrument\n\
  import com.apress.prospring6.seven.jooq.generated.tables.records.SingerRecord\n\
  import com.apress.prospring6.seven.jooq.records.AlbumRecord\nimport com.apress.prospring6.seven.jooq.records.SingerInstrumentRecord\n\
  import com.apress.prospring6.seven.jooq.records.SingerWithAlbums\nimport com.apress.prospring6.seven.jooq.records.SingerWithInstruments\n\
  import org.jooq.*\n...\n@Testcontainers\n@SqlMergeMode(SqlMergeMode.MergeMode.MERGE)\n\
  @Sql(\"classpath:testcontainers/drop-schema.sql\", \"classpath:testcontainers/create-schema.sql\"\
  )\n@SpringJUnitConfig(classes = [BasicDataSourceCfg::class, JOOQConfig::class])\n\
  class JOOQDslTest {\n...\n@Test\n@DisplayName(\"应返回所有带有专辑的歌手（作为记录）\")\nfun findAllWithAlbumsAsRecords()\
  \ {\nval singerWithAlbums: List =\ndslContext!!.select(\nSINGER.FIRST_NAME,\nSINGER.LAST_NAME,\n\
  SINGER.BIRTH_DATE,\nDSL.multisetAgg(ALBUM.TITLE, ALBUM.RELEASE_DATE)\n.convertFrom>(\n\
  { r  ->\nr.map(\nmapping { title:String, release:LocalDate ->\nAlbumRecord(title,\
  \ release)\n}\n)\n}\n)\n)\n.from(SINGER)\n.innerJoin(ALBUM).on(ALBUM.SINGER_ID.eq(SINGER.ID))\n\
  .groupBy(SINGER.FIRST_NAME, SINGER.LAST_NAME, SINGER.BIRTH_DATE)\n.fetch(mapping{\
  \ firstName:String, lastName:String, birthDate:LocalDate,\nalbums:MutableList ->\n\
  SingerWithAlbums(firstName, lastName, birthDate, albums)\n})\nassertEquals(2, singerWithAlbums.size)\n\
  }\n...\n}\n清单 7-38\njOOQ 执行连接查询的方式\n```\n\n为了确保只获取数据库中拥有专辑的歌手，我们使用了 `innerJoin(..)`\
  \ 方法。`multisetAgg(..)` 方法用于将专辑的列聚合到一个 `AlbumRecord` 中。由于我们不希望出现重复条目，因此还需要调用 `groupBy(..)`。你可能已经注意到，这里的\
  \ Kotlin 代码看起来也非常像其对应的 SQL 语句，这使得编写代码非常容易，并能确保只提取你感兴趣的数据。`SINGER` 实例的类型是 `com.apress.prospring6.seven.jooq.generated.tables.Singer`，它封装了所有支持编写涉及\
  \ `SINGER` 表的 jOOQ 查询的元数据。`ALBUM` 和 `INSTRUMENT` 也是如此，不过本例中未使用它们。\n\n![](img/524962_1_En_7_Figl_HTML.jpg)\
  \ 一个灯泡图标。 如果你不想自己生成这些类，仓库中提供了生成的类的一个版本。\n\n清单 7-39 展示了 `findAllWithAlbumsAsRecords()`\
