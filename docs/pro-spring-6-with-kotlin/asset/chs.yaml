  ### 切面实例化模型


  ![](img/524962_1_En_5_Figl_HTML.jpg) 一个警告图标，圆圈内有一个感叹号。   在 Spring AOP 中，切面类不能成为其他切面通知的目标。`@Aspect`
  注解也是一个标记接口，它会将生成的 bean 排除在自动代理之外。


  由于 `@Aspect` 注解不足以在类路径中实现自动检测，因此在目前展示的示例中，切面类都是通过 `@Component` 注册为 bean 的。它们也可以使用
  `@Bean` 进行注册。这意味着每个切面类在 Spring `ApplicationContext` 中都成为一个单例 bean。


  为了测试这一点，我们声明了一个 `BeforeAdviceV5` 类，该类声明了一个简单的前置通知，但我们声明了默认构造函数来打印对象的实例化时间。该切面的代码与
  `BeforeAdviceV2` 几乎相同，唯一的额外内容就是包含日志语句的构造函数，因此我们在此不再重复列出。清单 5-72 展示了测试该切面构造函数仅被调用一次的方法。配置声明了两个
  `Singer` bean：`johnMayer` 和 `agustin`。


  ```

