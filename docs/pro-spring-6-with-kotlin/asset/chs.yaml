  \ 中还有一个 `error` 部分，负责显示从服务器接收到的验证错误消息。\n\n图 20-7 展示了“搜索歌手详情”页面，在未提供搜索值就发送请求后，页面会显示一条验证错误消息。\n\
  \n![](img/524962_1_En_20_Fig7_HTML.jpg)\n\n歌手应用“搜索歌手详情”页面的截图。屏幕顶部有一张带有音乐符号的封面图片，左侧有\
  \ 3 个选项。标题显示为“搜索歌手详情”。页面包含两个输入框，分别用于输入字段名称和字段值，以及一个搜索标签页，并附带一条验证错误消息。\n\n图 20-7\n\
  \n显示验证错误消息的“搜索歌手详情”页面\n\n构建 Spring 响应式应用是一个庞大的主题，超出了本章的介绍范围。如果你对构建 Spring 响应式应用感兴趣，可以查阅本章引用的其他资源，以及\
  \ Josh Long 的《Reactive Spring》一书，该书在 Leanpub 上出版，最后更新于 2022 年 9 月^(²²¹)。\n\n## 总结\n\
  \n本章让你深入了解了构建响应式 Spring WebFlux 应用时哪些方面是重要的。我们讨论了一些关于迁移多层应用的细节，以强调一个事实：响应式应用只有在所有组件都是响应式的情况下，才是完全响应式的。为了帮助你从\
  \ Spring Web MVC 过渡到 WebFlux，我们提供了两种技术配置之间的对比。\n\n我们还描述了如何使用响应式控制器和处理函数。接着，我们探讨了如何测试响应式仓库和服务，以及如何使用\
  \ `WebTestClient` 进行测试来消费响应式服务。\n\n本章有几个要点值得记住。Spring WebFlux 代码更简洁、更精炼。Spring Boot\
  \ 提供了大量开箱即用的组件，让你能够将更多时间投入到开发上，而减少在配置上花费的时间。错误处理更容易实现，代码也更容易阅读。然而，并非所有组件都必须采用响应式。当你只需要向用户渲染一个简单页面时，就没有必要使用响应式组件来渲染它。\n\
