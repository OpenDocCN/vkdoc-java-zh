  这种配置是最小化的，即使在经典配置中，Spring MVC 也会根据请求中的 `Accept` 头来确定请求的媒体类型。


  你可以通过覆盖 `WebConfig` 类中的 `configureContentNegotiation(..)` 方法^(¹⁴⁴)，基于路径扩展名、查询参数来配置请求的媒体类型，或者通过声明不同的处理器方法并使用
  `produces` 属性来实现。


  为了覆盖 Spring MVC 创建的默认消息转换器，请实现 `configureMessageConverters()` 方法。如果你想在默认消息转换器集合中添加自定义消息转换器，请覆盖
  `extendMessageConverters()` 方法^(¹⁴⁵)。


  对于本章而言，我们不需要执行任何这些操作，因为 Spring MVC 配置的默认消息转换器已经足够满足我们的需求。


  那么，既然我们已经确定客户端必须在请求中提供 `Accept` 头来指定他们想要的数据格式，我们还需要配置其他东西来使其工作吗？答案是不需要，但我们确实需要将合适的
  Jackson 库添加到类路径中，以便 Spring MVC 能够使用它们。


  `chapter15` 项目的依赖关系如图 15-1 所示。


