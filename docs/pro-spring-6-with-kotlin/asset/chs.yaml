  为了测试此异常是否会导致返回 `404(Not Found)` HTTP 状态码的响应，这项工作由清单 15-15 中引入的 `testNegativeFindById(..)`
  完成，但通过发送请求 `"http://localhost:8080/ch15/singer3/99"`。


  像这样注解一个异常可以完成任务，但我们的控制器还会抛出一个 `DataIntegrityViolationException`，该异常未映射到任何 HTTP 状态码。这种类型的异常不属于我们的应用程序，因此无法用
  `@ResponseStatus` 进行注解。


  对于这种类型的异常，解决方案是编写一个异常处理类，用 `@RestControllerAdvice`（相当于 REST 版本的 `@ControllerAdvice`）注解它，并为
  `DataIntegrityViolationException` 声明一个方法处理器，类似于**第** **14** 章中为 Spring Web 应用程序所做的那样。


  `RestErrorHandler` 类是一个用于 REST 请求的全局异常处理器，如清单 15-20 所示。


  ```

  package com.apress.prospring6.fifteen.controllers

  import org.springframework.dao.DataIntegrityViolationException

  import org.springframework.http.HttpStatus

  import org.springframework.http.ResponseEntity

  import org.springframework.web.bind.annotation.ControllerAdvice

  import org.springframework.web.bind.annotation.ExceptionHandler

  @RestControllerAdvice

  class RestErrorHandler {

  // 如果你不想用 @ResponseStatus 注解 NotFoundException 类

  /*    @ExceptionHandler(NotFoundException::class)

  fun  handleNotFound(ex:NotFoundException):ResponseEntity {

  return ResponseEntity.notFound().build();

  }*/

  @ExceptionHandler(DataIntegrityViolationException::class)

  fun handleBadRequest(ex: DataIntegrityViolationException): ResponseEntity {

  return ResponseEntity.badRequest().body(ex.message)

  }

  }

