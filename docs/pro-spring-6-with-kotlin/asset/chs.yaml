  # 11. 验证、格式化和类型转换


  在企业级应用中，验证至关重要。验证的目的是确保正在处理的数据满足所有预定义的业务需求，并保证数据在其他应用层中的完整性和可用性。


  在应用程序开发中，数据验证总是与转换和格式化一同被提及。原因是数据源的格式很可能与应用程序中使用的格式不同。例如，在 Web 应用中，用户在 Web 浏览器前端输入信息。当用户保存该数据时，数据会被发送到服务器（在本地验证完成后）。在服务器端，会执行一个数据绑定过程，在此过程中，根据为每个属性定义的格式化规则（例如，日期格式模式为
  `yyyy-MM-dd`），从 HTTP 请求中提取、转换数据，并将其绑定到相应的领域对象（例如，用户在 HTML 表单中输入歌手信息，然后该信息被绑定到服务器端的
  `Singer` 对象）。当数据绑定完成后，验证规则会被应用于领域对象，以检查是否存在任何约束违规。如果一切顺利，数据将被持久化，并向用户显示成功消息。否则，验证错误消息会被填充并显示给用户。


  在本章的第一部分，你将学习 Spring 如何为类型转换、字段格式化和验证提供复杂的支持。具体来说，本章涵盖以下主题：


  *   *Spring 类型转换系统和 Formatter 服务提供者接口 (SPI)*：我们将介绍通用类型转换系统和 Formatter SPI。我们将介绍如何使用这些新服务来替代之前的
  `PropertyEditor` 支持，以及它们如何在任何 Kotlin 类型之间进行转换。


  *   *Spring 中的验证*：我们将讨论 Spring 如何支持领域对象验证。首先，我们简要介绍 Spring 自己的 Validator 接口。然后，我们重点介绍
  JSR-349（Bean 验证）支持。


  ## Spring 类型转换系统


  在 Spring 3 中，引入了一个新的类型转换系统，为在 Spring 驱动的应用程序中在任何 Java 类型之间进行转换提供了一种强大的方式。所有类都位于
  `org.springframework.core.convert` 包中。本节将展示这个新服务如何执行之前 `PropertyEditor` 支持所提供的相同功能，以及它如何支持任何
  Kotlin 类型之间的转换。我们还将演示如何使用 Converter SPI 实现自定义类型转换器。




  ### 使用 `PropertyEditors` 从 `String` 进行转换


  **第** **4****章**介绍了 Spring 如何通过支持 `PropertyEditors`，将属性文件中的 `String` 转换为 POJO 的属性。我们在此快速回顾一下，然后介绍
  Spring 的 Converter SPI（自 3.0 起可用）如何提供更强大的替代方案。


  清单 11-1 展示了一个名为 `Blogger` 的记录。我们使用记录（或 Kotlin 中的*数据类*），因为我们知道不打算以任何方式修改这些 bean，也不需要代理它们。此外，使用记录还能减少我们需要编写的代码。


  ```

