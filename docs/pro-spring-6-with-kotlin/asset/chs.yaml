  jdbc:tc:mariadb:10.7.4-focal:///testdb?TC_INITSCRIPT=testcontainers/create-schema.sql

  ```


  此外，可以从 `Chapter6ApplicationV2Test` 类中移除 `@Sql` 注解，测试仍然会通过，因为 Testcontainers 会在类路径上查找该初始化脚本。你也可以使用
  `file:` 指向相对于工作目录（通常是项目根目录）的位置。


  我们鼓励你阅读更多关于 Testcontainers 的内容；它提供了一种非常实用的方式来编写集成测试，这些测试在非常接近生产环境的设置上运行，并证明所编写的代码在生产环境中也能产生预期的结果。在本书中，只要运行测试需要数据库，就推荐使用
  Testcontainers。


  ## 总结


  本章向你展示了如何使用 Spring 来简化 JDBC 编程。你学习了如何连接数据库并执行查询、更新、删除和插入操作，以及调用数据库存储函数。在生产环境中，很少需要使用
  `DataSource` Bean 或 `JdbcTemplate`。只有在执行非常复杂的查询、存储过程或函数时才可能需要。无论如何，我们涵盖了 `JdbcTemplate`
  以及其他基于 `JdbcTemplate` 构建、帮助你建模各种 JDBC 操作的 Spring 类。我们还展示了如何在适当的地方使用新的 lambda 表达式。并且，由于代码是由人编写的，而人非圣贤，孰能无过，我们还向你展示了如何在
  Spring Classic 和 Spring Boot 应用程序中测试你的 JDBC 代码。


  此外，还涵盖了 Spring Boot JDBC，因为任何能帮助你更专注于应用程序业务逻辑的实现、减少对配置关注度的工具，都是值得了解的好工具。在接下来的几章中，我们将讨论在开发数据访问逻辑时如何将
  Spring 与流行的 ORM 技术结合使用，以及如何与 NoSQL 数据库进行交互。


