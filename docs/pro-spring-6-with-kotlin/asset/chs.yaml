  清单 5-12 展示了 `DynamicMethodMatcherPointcut` 的实现。


  ```

  package com.apress.prospring6.five.pointcut

  import com.apress.prospring6.five.common.GoodGuitarist

  import org.springframework.aop.ClassFilter

  import org.springframework.aop.support.DynamicMethodMatcherPointcut

  import java.lang.reflect.Method

  internal class SimpleDynamicPointcut : DynamicMethodMatcherPointcut() {

  override fun getClassFilter(): ClassFilter {

  return ClassFilter { cls: Class -> cls == GoodGuitarist::class.java }

  }

  override fun matches(method: Method, targetClass: Class): Boolean {

  logger.debug("Static check for " + method.name)

  return "sing" == method.name

  }

  override fun matches(method: Method, targetClass: Class, vararg args: Any):

  Boolean {

  logger.debug("Dynamic check for " + method.name)

  if (args.size == 0) {

  return false

  }

  val key = args[0] as String

  return key.equals("C", ignoreCase = true)

  }

  companion object {

  private val logger = LoggerFactory.getLogger(SimpleDynamicPointcut::class.java)

  }

  }

  清单 5-12

  SimpleDynamicPointcut 实现

  ```


  如清单 5-12 所示，我们以与上一节类似的方式重写了 `getClassFilter()` 方法。这消除了在方法匹配方法中检查类的需要，这对于动态检查尤其重要。虽然只需要动态检查，但我们也实现了静态检查。这样做的原因是，我们知道
  `sing()` 方法（不带参数的那个）不会被通知。通过使用静态检查来表明这一点，Spring 就无需对该方法执行动态检查。这是因为当实现了静态检查方法时，Spring
  会首先根据它进行检查，如果检查结果不匹配，Spring 将停止任何进一步的动态检查。此外，静态检查的结果会被缓存以提高性能。如果未实现静态检查，Spring 会在每次调用
  `sing({key})` 方法时执行动态检查。


  作为推荐实践，请在 `getClassFilter()` 方法中执行类检查，在 `matches(Method, Class<?>)` 方法中执行方法检查，并在
  `matches(Method,Class<?>, Object[])` 方法中执行参数检查。这将使你的切入点更易于理解和维护，并且性能也会更好。


  在 `matches(Method, Class<?>, Object[])` 方法中，你可以看到，如果传递给 `sing({key})` 方法的 `String`
  参数的值不等于“C”，则返回 `false`；否则返回 `true`。请注意，在动态检查中，我们知道我们正在处理一个名为 `sing` 的方法，因为没有其他方法能通过静态检查。在清单
  5-13 中，你可以看到用于测试此切入点的测试类。


  ```

  package com.apress.prospring6.five.pointcut

  import org.springframework.aop.Advisor

  import org.springframework.aop.framework.ProxyFactory

  import org.springframework.aop.support.DefaultPointcutAdvisor

  // 其他导入语句已省略

  object DynamicPointcutDemo {

  @JvmStatic

  fun main(args: Array) {

  val target = GoodGuitarist()

  val advisor: Advisor = DefaultPointcutAdvisor(SimpleDynamicPointcut(),

  SimpleAroundAdvice())

  val pf = ProxyFactory()

  pf.setTarget(target)

  pf.addAdvisor(advisor)

  val proxy = pf.proxy as Singer

  proxy.sing("C")

  proxy.sing("c")

  proxy.sing("E")

  proxy.sing()

  }

  }

