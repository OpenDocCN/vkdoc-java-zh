  ### 使用简单名称匹配


  在创建切点时，我们通常希望仅根据方法名称进行匹配，而忽略方法签名和返回类型。在这种情况下，你无需创建 `StaticMethodMatcherPointcut`
  的子类，而是可以使用 `NameMatchMethodPointcut`（它是 `StaticMethodMatcherPointcut` 的子类）来匹配一组方法名称。当你使用
  `NameMatchMethodPointcut` 时，不会考虑方法的签名，因此如果你有 `sing()` 和 `sing({key})` 方法，它们都会匹配名称
  `sing()`。


  在清单 5-15 中，你可以看到 `GrammyGuitarist` 类，它是 `Singer` 的另一个实现，因为这位格莱美获奖歌手用声音唱歌、使用吉他，并且作为人类，在表演中偶尔会说话和休息。


  ```

  package com.apress.prospring6.five.common

  open class GrammyGuitarist : Singer {

  override fun sing() {

  LOGGER.info(

  """

  sing: Gravity is working against me

  And gravity wants to bring me down

  """.trimIndent()

  )

  }

  open fun sing(guitar: Guitar) {

  LOGGER.info("play: " + guitar.play())

  }

  open fun talk() {

  LOGGER.info("talk")

  }

  override fun rest() {

  LOGGER.info("zzz")

  }

  companion object {

  private val LOGGER = LoggerFactory.getLogger(GrammyGuitarist::class.java)

  }

  }

  open class Guitar {

  var brand = " Martin"

  open fun play(): String {

  return "G C G C Am D7"

  }

  }

