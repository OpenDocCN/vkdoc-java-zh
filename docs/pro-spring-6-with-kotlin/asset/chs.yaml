  `HttpEntity<T>` 功能强大，因为它可以将请求体和请求头封装在一起，这也使其适用于 `RestTemplate#exchange(..)` 来提交安全的
  REST 请求。


  使用 `RestTemplate` 进行测试很简单，但控制器可能需要进行一些调整，以使其在 REST 方面功能更强大。如果我们尝试编辑的 `Singer` 实例不存在会发生什么？如果我们尝试创建一个带有某个名称的
  `Singer` 实例会发生什么？响应会是什么？由于所有处理器方法都使用了 `@ResponseStatus` 注解来配置一切正常时返回的响应状态码，但任何地方都没有配置错误状态码，因此我们会遇到麻烦。例如，现在运行
  `testCreateWithExchange(..)` 方法会返回 500（`INTERNAL_SERVER_ERROR`），因为仓库抛出了一个未在任何地方处理的
  `org.springframework.dao.DataIntegrityViolationException`。因此，处理异常是必要的。


  ### 使用 `ResponseEntity<T>` 进行 REST 异常处理


  我们首先可以做的就是在异常发生的地方处理它，并通过 `ResponseEntity<T>` 类型显式返回所需的 `HttpStatus` 值。此类型是 `org.springframework.http.HttpEntity<T>`
  的扩展，包含一个 `HttpStatusCode` 状态码。它可用于包装 `RestTemplate` 方法调用的结果，也可用作 REST 处理器方法中的返回类型。


  话虽如此，让我们修改 `findSingerById(..)` 处理器方法，使其在存在具有所提供 `id` 的歌手时返回一个包含 `HttpStatus.OK`
  状态码的 `ResponseEntity<Singer>`，并在找不到具有所提供 `id` 的歌手时返回一个包含 `HttpStatus.NOT_FOUND`
  状态码的 `ResponseEntity<HttpStatus>`。清单 15-13 展示了该方法的此版本，它属于一个名为 `Singer2Controller`
  的新 REST 控制器类。


  ```

  package com.apress.prospring6.fifteen.controllers

  import org.springframework.http.HttpStatus

  import org.springframework.http.ResponseEntity

  // 其他导入语句已省略

  @RestController

  @RequestMapping(path = ["singer2"])

  class Singer2Controller(private val singerRepo: SingerRepo) {

  @GetMapping(path = ["/{id}"])

  fun findSingerById(@PathVariable id: Long): ResponseEntity {

  val fromDb: Optional = singerRepo.findById(id)

  return fromDb

  .map { s: Singer ->

  ResponseEntity.ok().body(s)

  }

  .orElseGet {

  ResponseEntity.notFound()

  .build()

  }

  }

  ...

  }

