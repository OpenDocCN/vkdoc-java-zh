- "# 3. 在 Spring 中引入 IoC 和 DI\n\n**第** **1** **章**和**第 2 章**向你介绍了 Spring 世界，解释了为什么这个框架是必要的，以及为什么依赖注入如此酷且有用。本质上，Spring\
  \ 的构建就是为了让依赖注入变得简单。这种软件设计模式意味着依赖组件将依赖解析委托给一个外部服务，该服务负责注入依赖项。依赖组件不允许调用注入器服务，并且在涉及将要注入的依赖项时几乎没有发言权。这就是为什么这种行为也被称为“*别打给我们，我们会打给你！*”原则，它在技术上被称为*控制反转\
  \ (IoC)*。如果你快速搜索一下 Google，你会发现很多关于依赖注入和控制反转的相互矛盾的观点。你会找到一些编程文章，将它们称为*编程技术*、*编程原则*和*设计模式*。然而，最好的解释来自\
  \ Martin Fowler 的一篇文章^(²⁹)，该文章在 Java 世界中被公认为设计模式方面的最高权威。如果你没有时间阅读，这里有一个总结：*控制反转是促进依赖注入的框架的一个共同特征。依赖注入模式的基本思想是，有一个独立的对象，根据接口契约，将具有所需行为的依赖项注入进来。*\n\
  \n本章涵盖以下 DI 特性：\n\n*   *控制反转概念*：在本节中，我们将讨论各种类型的 IoC，包括依赖注入和依赖查找。本节将介绍不同 IoC 方法之间的差异以及每种方法的优缺点。\n\
  \n*   *Spring 中的控制反转*：本节将介绍 Spring 中可用的 IoC 功能以及它们是如何实现的。特别是，你将看到 Spring 提供的依赖注入服务，包括\
  \ setter 注入、构造器注入和方法注入。\n\n*   *Spring 中的依赖注入*：本节将介绍 Spring 对 IoC 容器的实现。对于 bean\
  \ 定义和 DI 需求，`BeanFactory` 是应用程序与之交互的主要接口。然而，除了前几个代码清单外，本章提供的其余示例代码都侧重于使用 Spring\
  \ 的 `ApplicationContext` 接口，它是 `BeanFactory` 的扩展，提供了更强大的功能。我们将在后面的章节中介绍 `BeanFactory`\
  \ 和 `ApplicationContext` 之间的区别。\n\n*   *配置 Spring 应用程序上下文*：本章的最后一部分重点介绍 `ApplicationContext`\
  \ 配置的注解方法。Groovy 和 Java/Kotlin 配置将在**第** **4** **章**中进一步讨论。本节从讨论 DI 配置开始，然后继续介绍\
  \ `BeanFactory` 提供的其他服务，例如 bean 继承、生命周期管理和自动装配。\n\n## 控制反转与依赖注入\n\n其核心是，IoC 旨在提供一种更简单的机制来配置组件依赖项（通常称为对象的*协作者*）并在其整个生命周期中管理这些依赖项。需要某些依赖项的组件通常被称为*依赖对象*，或者在\
  \ IoC 的情况下，被称为*目标*。通常，IoC 可以分解为两种子类型：*依赖注入*和*依赖查找*。这些子类型进一步分解为 IoC 服务的具体实现。从这个定义中，你可以清楚地看到，当我们谈论\
  \ DI 时，我们总是在谈论 IoC，但当我们谈论 IoC 时，我们并不总是在谈论 DI（例如，依赖查找也是 IoC 的一种形式）。\n\n### 控制反转的类型\n\
  \n你可能想知道为什么有两种类型的 IoC，以及为什么这些类型又进一步拆分为不同的实现。这个问题似乎没有明确的答案；当然，不同的类型提供了一定程度的灵活性，但对我们来说，IoC\
  \ 更像是新旧思想的混合体。这两种类型的 IoC 代表了这一点。依赖查找是一种更传统的方法，乍一看，它对 Java 程序员来说似乎更熟悉。依赖注入虽然起初看起来违反直觉，但实际上比依赖查找更灵活、更实用。对于依赖查找风格的\
  \ IoC，组件必须获取对依赖项的引用，而对于依赖注入，依赖项由 IoC 容器注入到组件中。依赖查找有两种类型：\n\n*   依赖拉取\n\n*   上下文依赖查找\
  \ (CDL)\n\n依赖注入也有两种常见形式：\n\n*   构造器依赖注入\n\n*   Setter 依赖注入\n\n    ![](img/524962_1_En_3_Figa_HTML.jpg)\
  \ 一个警告标志图标。它是一个三角形，中心有一个感叹号。  对于本节中的讨论，我们不关心虚构的 IoC 容器如何了解所有不同的依赖项，只关心它在某个时刻执行了针对每种机制所描述的操作。\n\
  \n\n\n#### 依赖拉取\n\n对于 Java/Kotlin 开发者而言，依赖拉取是最熟悉的 IoC 类型。在依赖拉取中，依赖项会根据需要从注册表中拉取。任何编写过访问\
  \ EJB（2.1 或更早版本）代码的人都使用过依赖拉取（即通过 JNDI API 查找 EJB 组件）。图 3-1 展示了通过查找机制进行依赖拉取的场景。\n\
  \n![](img/524962_1_En_3_Fig1_HTML.jpg)\n\n一个流程图。它展示了依赖对象通过 JNDI 查找机制，利用 JNDI 注册表进行拉取的过程。容器管理整个过程。\n\
  \n图 3-1\n\n通过 JNDI 查找进行依赖拉取\n\nSpring 也提供依赖拉取作为检索框架管理组件的机制；你在**第** **2** **章**中已经看到了它的实际应用。清单\
  \ 3-1 展示了一个基于 Spring 的应用程序中典型的依赖拉取查找示例。\n\n```\npackage com.apress.prospring6.two.annotated\n\
  import com.apress.prospring6.two.decoupled.MessageRenderer\nimport org.springframework.context.ApplicationContext\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext\n\
  object HelloWorldSpringAnnotated {\n@JvmStatic\nfun main(args: Array) {\nval ctx:\
  \ ApplicationContext =\nAnnotationConfigApplicationContext(HelloWorldConfiguration::class.java)\n\
  val mr: MessageRenderer = ctx.getBean(\"renderer\", MessageRenderer::class.java)\n\
  mr.render()\n}\n}\n清单 3-1\nSpring 依赖拉取示例\n```\n\n这段代码片段及其引用的所有类，在第 2 章末尾介绍过，用于向你展示如何构建\
  \ Spring `ApplicationContext`。请注意，在 `main(..)` 方法中，`MessageRenderer` bean 是从充当应用程序中所有\
  \ bean 注册表的 `ApplicationContext` 中检索出来的；因此，这个实例是被*拉取*出来的，以便可以调用其 `render()` 方法。\n\
  \n这种 IoC 不仅在基于 JEE 的应用程序（使用 EJB 2.1 或更早版本）中普遍存在（这些应用程序广泛使用 JNDI 查找从注册表中获取依赖项），而且在许多环境中使用\
  \ Spring 时也至关重要。\n\n#### 上下文依赖查找\n\n*上下文依赖查找 (CDL)* 在某些方面与依赖拉取类似，但在 CDL 中，查找是针对管理资源的容器进行的，而不是针对某个中央注册表，并且通常是在某个设定点执行。图\
  \ 3-2 展示了 CDL 机制。\n\n![](img/524962_1_En_3_Fig2_HTML.jpg)\n\n一个流程图。它展示了依赖对象通过查找机制，利用管理整个过程的容器进行拉取的过程。\n\
  \n图 3-2\n\n上下文依赖查找\n\nCDL 的工作原理是，需要依赖项的组件实现一个类似于清单 3-2 中所示的接口。\n\n```\ninterface\
  \ ManagedComponent {\nfun performLookup(container: Container)\n}\n清单 3-2\n上下文依赖查找接口\n\
  ```\n\n通过实现此接口，组件向 `container` 发出信号，表明它想要获取依赖项。该容器通常由底层应用服务器或框架（例如 Tomcat 或 JBoss）或框架（例如\
  \ Spring）提供。清单 3-3 中的代码展示了一个提供依赖查找服务的简单 `Container` 接口。\n\n```\ninterface Container\
  \ {\nfun getDependency(key: String): Any?\n}\n清单 3-3\n提供依赖查找服务的容器接口\n```\n\n当容器准备好将依赖项传递给组件时，它会依次在每个组件上调用\
  \ `performLookup()`。然后，组件可以使用 `Container` 接口查找其依赖项。为了与我们熟悉的示例配合使用，声明 `MessageRenderer`\
  \ 接口扩展 `ManagedComponent` 接口，以便 `StandardOutMessageRenderer` 类可以使用提供的 `Container`\
  \ 查找其自身的依赖项。`MessageRenderer` 接口和 `StandardOutMessageRenderer` 类的代码如清单 3-4 所示。\n\
  \n```\ninterface MessageRenderer : ManagedComponent {\nfun render()\nvar messageProvider:\
  \ MessageProvider?\n}\nclass StandardOutMessageRenderer : MessageRenderer {\noverride\
  \ var messageProvider:MessageProvider? = null\noverride\nfun performLookup(container:Container)\
  \ {\nthis.messageProvider =\ncontainer.getDependency(\"provider\") as MessageProvider\n\
  }\n// 其他代码已省略，已在第 2 章列出\n}\n清单 3-4\n使用 StandardOutMessageRenderer 类的 ManagedComponent\
  \ 实现\n```\n\n![](img/524962_1_En_3_Figb_HTML.jpg) 一个警告警示图标。它是一个中心带有感叹号的圆形。 你可能会注意到，本书中的许多\
  \ Kotlin 文件包含多个类型，因此 bean 定义的来源毫无疑问。我们在本书项目中尽可能保留了这种方法。\n\n#### 构造器依赖注入\n\n在*构造器依赖注入*中，IoC\
  \ 容器通过组件的构造器（或多个构造器）注入其依赖项。组件声明一个构造器或一组构造器，将依赖项作为参数，IoC 容器在实例化时将依赖项传递给组件。这意味着此版本的\
  \ `StandardOutMessageRenderer` 看起来像清单 3-5 中描述的那样。\n\n```\nclass StandardOutMessageRenderer(\n\
  override var messageProvider:MessageProvider? = null) :\nMessageRenderer {\n// 其他代码已省略，已在第\
  \ 2 章列出\n}\n清单 3-5\n为构造器注入修改的 StandardOutMessageRenderer\n```\n\n使用构造器注入的一个明显结果是，没有依赖项就无法创建对象；因此，依赖项是强制性的。\n\
  \n### Setter 依赖注入\n\n在 *Setter 依赖注入*中，IoC 容器通过类似 JavaBean 的 setter 方法注入组件的依赖项。组件的\
  \ setter 暴露了 IoC 容器可以管理的依赖项。清单 3-6 展示了一个典型的基于 setter 依赖注入的 `StandardOutMessageRenderer`\
  \ 版本。\n\n```\npackage com.apress.prospring6.three.di;\nclass StandardOutMessageRenderer\
  \ : MessageRenderer {\noverride var messageProvider:MessageProvider? = null\n//\
  \ Kotlin 会自动提供此方法，因此无需添加：\n// fun setMessageProvider(messageProvider:MessageProvider)\
  \ {\n//    this.messageProvider = messageProvider\n// }\n// 其他代码已省略，已在第 2 章列出\n\
  }\n清单 3-6\n为 Setter 注入修改的 StandardOutMessageRenderer\n```\n\n使用 setter 注入的一个明显结果是，可以在没有依赖项的情况下创建对象，并且可以在稍后通过调用\
  \ setter 来提供依赖项。\n\n在容器内部，`setMessageProvider()` 方法暴露的依赖需求通过 JavaBeans 风格的名称 *dependency*\
  \ 来引用。在实践中，setter 注入是使用最广泛的注入机制，并且是实现起来最简单的 IoC 机制之一。\n\n![](img/524962_1_En_3_Figc_HTML.jpg)\
  \ 一个信息图标。它是一个中心带有字母 i 的圆形。 Spring 还支持另一种类型的注入，称为*字段注入*，但这将在本章后面介绍，届时你将学习如何使用 `@Autowire`\
  \ 注解进行自动装配。\n\n\n\n#### 注入 vs. 查找\n\n选择哪种 IoC 风格——注入还是查找——通常不是一个困难的决定。在许多情况下，你选择的\
  \ IoC 类型是由所使用的容器决定的。例如，如果你使用 EJB 2.1 或更早版本，你必须使用查找风格的 IoC（通过 JNDI）从 JEE 容器中获取 EJB。而在\
  \ Spring 中，除了初始的 Bean 查找外，你的组件及其依赖项始终通过注入风格的 IoC 进行装配。\n\n![](img/524962_1_En_3_Figd_HTML.jpg)\
  \ 一个灯泡图标。它有一个圆润的灯泡形状，右上角有一个弧线，底部有一个类似线圈的结构。 当你使用 Spring 时，无需执行显式查找即可访问 EJB 资源。Spring\
  \ 可以充当查找风格和注入风格 IoC 系统之间的适配器，从而允许你通过注入来管理所有资源。\n\n读到这里，你怎么看？你会使用依赖注入还是依赖查找？\n\n\
  使用注入，你可以自由地使用类，使其与手动为依赖对象提供协作者的 IoC 容器完全解耦；而使用查找，你的类始终依赖于容器定义的类和接口。查找的另一个缺点是，在脱离容器的情况下测试类变得困难。使用注入，测试组件则轻而易举，因为你可以通过适当的构造函数或\
  \ setter 自行提供依赖项，正如你将在本书中看到的那样。\n\n选择注入而非查找的最大原因是它能让你的生活更轻松。使用注入时，你编写的代码要少得多，而且你编写的代码简单，通常可以通过一个好的\
  \ IDE 自动完成。你会注意到，注入示例中的所有代码都是被动的，即它不会主动尝试完成任务。在注入代码中，最令人兴奋的事情是对象仅被存储在一个字段中；没有其他代码参与从任何注册表或容器中拉取依赖项。因此，代码更简单，更不容易出错。被动代码比主动代码更容易维护，因为几乎不会出错。清单\
  \ 3-4 中的 `StandardOutMessageRenderer` 几乎不会出错：依赖键可能会改变，或者返回的依赖项可能是错误的类型。使用依赖查找可能会解耦应用程序的组件，但它增加了复杂性，因为需要额外的代码将这些组件重新耦合在一起以执行任何有用的任务。\n\
  \n### Setter 注入 vs. 构造函数注入\n\n在本书的这个阶段，很明显依赖注入是正确的方式。*构造函数注入*在必须强制依赖项时非常有用，并且需要依赖项的组件在没有它的情况下无法工作。许多容器，包括\
  \ Spring，都提供了一种机制来确保在使用 setter 注入时定义所有依赖项，但通过使用构造函数注入，你可以以容器无关的方式断言对依赖项的需求。构造函数注入还有助于实现不可变对象的使用——只需对构造函数参数使用\
  \ `val` 而不是 `var`。\n\n*Setter 注入*在各种情况下都很有用。如果组件向容器暴露其依赖项，但乐意提供自己的默认值，那么 setter\
  \ 注入通常是实现这一目标的最佳方式。Setter 注入的另一个好处是它允许在接口上声明依赖项，尽管这并不像你最初想象的那么有用。想想看，一个接口可以由多个类实现，这些类需要暴露相同的\
  \ API，但需要不同的依赖项。因此，除非你绝对确定特定业务接口的所有实现都需要某个特定的依赖项，否则你应该让每个实现类定义自己的依赖项，并将业务接口保留给业务方法。清单\
  \ 3-7 描述了一个用于通讯发送服务的接口，这看起来与之前所说的相矛盾。\n\n```\npackage com.apress.prospring6.three\n\
  interface NewsletterSender {\nvar smtpServer: String?\nvar fromAddress: String?\n\
  fun send()\n}\n清单 3-7\nNewsletterSender 接口\n```\n\n但关键在于：通过此接口声明的依赖项是配置项。配置参数是依赖项的一种特殊情况。当然，你的组件依赖于配置数据，但配置数据与你目前看到的依赖类型有显著不同。因此，Kotlin\
  \ 在业务接口中以这种方式自动为配置参数提供 setter 和 getter 非常有帮助，并使 setter 注入成为一种有价值的工具。\n\n通过电子邮件发送一组通讯的类实现了\
  \ `NewsletterSender` 接口。`send()` 方法是唯一的业务方法，但请注意我们在接口上定义了两个属性。当我们刚刚说过不应该在业务接口中定义依赖项时，为什么还要这样做呢？原因是这些值——SMTP\
  \ 服务器地址和邮件发送地址——在实际意义上并不是依赖项；相反，它们是影响 `NewsletterSender` 接口所有实现功能的配置细节。那么问题来了：配置参数和其他类型的依赖项有什么区别？在大多数情况下，你可以清楚地看出一个依赖项是否应归类为配置参数，但如果你不确定，请查找以下三个指向配置参数的特征：\n\
  \n*   *配置参数是被动的*：在清单 3-7 所示的 `NewsletterSender` 示例中，SMTP 服务器参数是被动依赖项的一个例子。被动依赖项不直接用于执行操作；相反，它们在内部或被其他依赖项用来执行其操作。在第\
  \ 2 章的 `MessageRenderer` 示例中，`MessageProvider` 依赖项不是被动的；它执行了 `MessageRenderer` 完成任务所必需的功能。\n\
  \n\n\n*   *配置参数通常是信息，而非其他组件*：这意味着配置参数通常是组件完成其工作所需的一些信息片段。显然，SMTP 服务器是 `NewsletterSender`\
  \ 所需的信息，但 `MessageProvider` 实际上是 `MessageRenderer` 正常运行所需的另一个组件。\n\n*   *配置参数通常是简单值或简单值的集合*：这实际上是前两点的副产品，但配置参数通常是简单值。在\
  \ Java/Kotlin 中，这意味着它们是（伪）基本类型（或对应的包装类）、`String` 或这些值的集合。简单值通常是被动的。这意味着除了操作 `String`\
  \ 所代表的数据之外，你无法对它做太多事情；并且你几乎总是将这些值用于信息目的——例如，一个表示网络套接字应监听的端口号的 `Int` 值，或一个表示电子邮件程序应通过其发送消息的\
  \ SMTP 服务器的 `String`。\n\n在考虑是否在业务接口中定义配置选项时，还要考虑该配置参数是适用于业务接口的所有实现，还是仅适用于一个实现。例如，在\
  \ `NewsletterSender` 的实现中，很明显所有实现都需要知道发送电子邮件时使用哪个 SMTP 服务器。但是，我们可能会选择将标记是否发送安全电子邮件的配置选项排除在业务接口之外，因为并非所有电子邮件\
  \ API 都支持此功能，并且可以合理地假设许多实现根本不会考虑安全性。\n\n![](img/524962_1_En_3_Fige_HTML.jpg) 一个信息图标。它是一个中心带有字母\
  \ i 的圆形。 回想一下，在**第** **2** **章**中，我们选择在业务接口中定义依赖关系。这仅用于说明目的，不应以任何方式视为最佳实践。\n\nSetter\
  \ 注入还允许你在不创建父组件新实例的情况下，动态地将依赖项替换为不同的实现。Spring 的 JMX 支持使这成为可能。Setter 注入的最大好处可能是它是侵入性最小的注入机制。\n\
  \n通常，你应该根据用例选择注入类型。基于 Setter 的注入允许在不创建新对象的情况下交换依赖项，并且还允许你的类选择合适的默认值，而无需显式注入对象。当你希望确保依赖项被传递给组件，并且设计不可变对象时，构造函数注入是一个不错的选择。请记住，虽然构造函数注入确保所有依赖项都提供给组件，但大多数容器也提供了确保这一点的机制，但可能会产生将代码耦合到框架的成本。\n\
  \n## Spring 中的控制反转\n\n如前所述，控制反转是 Spring 所做工作的重要组成部分。Spring 实现的核心基于依赖注入，尽管也提供了依赖查找功能。当\
  \ Spring 自动向依赖对象提供协作者时，它使用的是依赖注入。在基于 Spring 的应用程序中，最好使用依赖注入将协作者传递给依赖对象，而不是让依赖对象通过查找来获取协作者。图\
  \ 3-3 展示了 Spring 的依赖注入机制。\n\n![](img/524962_1_En_3_Fig3_HTML.jpg)\n\n一个流程图。它展示了通过\
  \ Spring Bean 工厂容器将依赖项注入到依赖对象的过程。\n\n图 3-3\nSpring 的依赖注入机制\n\n尽管依赖注入是连接协作者和依赖对象的首选机制，但你仍然需要依赖查找来访问依赖对象。在许多环境中，Spring\
  \ 无法通过依赖注入自动连接所有应用程序组件，你必须使用依赖查找来访问初始组件集。例如，在独立的 Java/Kotlin 应用程序中，你需要在 `main(..)`\
  \ 方法中引导 Spring 的容器，并通过 `ApplicationContext` 接口获取依赖项以进行编程处理。但是，当你使用 Spring 的 MVC\
  \ 支持构建 Web 应用程序时，Spring 可以通过自动将整个应用程序粘合在一起来避免这种情况。只要有可能在 Spring 中使用依赖注入，就应该这样做；否则，你可以回退到依赖查找功能。在本章的过程中，你将看到这两种方法的实际示例，我们将在它们首次出现时指出。\n\
  \nSpring 的 IoC 容器的一个有趣特性是它能够充当其自身依赖注入容器与外部依赖查找容器之间的适配器。我们将在本章后面讨论这个特性。\n\nSpring\
  \ 支持构造函数注入和 Setter 注入，并通过大量有用的附加功能增强了标准 IoC 功能集，使你的工作更轻松。\n\n本章的其余部分将介绍 Spring 的\
  \ DI 容器的基础知识，并附有大量示例。\n\n## Spring 中的依赖注入\n\nSpring 对依赖注入的支持是全面的，并且正如你将在**第** **4**\
  \ **章**中看到的那样，它超出了我们迄今为止讨论的标准 IoC 功能集。本章的其余部分将介绍 Spring 依赖注入容器的基础知识，探讨 Setter 注入、构造函数注入和方法注入，并详细研究如何在\
  \ Spring 中配置依赖注入。\n\n\n\n### Beans 与 BeanFactory\n\n`org.springframework.beans`\
  \ 和 `org.springframework.context` 包是 Spring 框架 IoC 容器的基础。Spring IoC 容器的核心是 `org.springframework.beans.factory.BeanFactory`\
  \ 接口。Spring 对该接口的实现负责管理组件，包括它们的依赖关系以及生命周期。图 3-4 展示了最常用的 `BeanFactory` 实现。\n\n![](img/524962_1_En_3_Fig4_HTML.jpg)\n\
  \n一个反向流程图。它展示了最常用的 BeanFactory 实现，包括 Auto-wire Capable、Listable 和 J N D I BeanFactory。\n\
  \n图 3-4\n\n`BeanFactory` 最常用的实现\n\n在 Spring 中，术语 `bean` 用于指代任何由 Spring IoC 容器管理的对象。Spring\
  \ IoC 容器负责创建、配置（组装）并管理 bean 的整个生命周期。通常，你的 bean 在某种程度上遵循 JavaBeans 规范，但这并非必需，特别是当你计划使用构造器注入来组装\
  \ bean 时。\n\n如果你的应用只需要 DI 支持，你可以通过 `BeanFactory` 接口与 Spring DI 容器交互。在这种情况下，你的应用必须创建一个实现了\
  \ `BeanFactory` 接口的类的实例，并使用 bean 和依赖信息对其进行配置。该接口由持有多个 bean 定义的对象实现，每个 bean 定义由一个唯一的\
  \ `String` 名称标识。创建此类实例后，你的应用可以通过 `BeanFactory` 访问这些 bean 并继续其处理流程。\n\n在某些情况下，所有这些设置都是自动处理的（例如，在\
  \ Web 应用中，Spring 的 `ApplicationContext` 会在应用启动时，通过 web.xml 描述符文件中声明的 Spring 提供的\
  \ `ContextLoaderListener` 类，由 Web 容器引导启动）。但在许多情况下，你需要自己编写设置代码。本章中的大多数示例都需要手动设置 `BeanFactory`\
  \ 的实现。\n\n`ApplicationContext` 接口是 `BeanFactory` 的扩展。除了 DI 服务外，`ApplicationContext`\
  \ 还提供其他服务：\n\n*   与 Spring AOP 特性的集成\n*   用于国际化（i18n）的消息资源处理\n*   应用事件处理\n*   应用层特定的上下文（例如，Web、安全等）\n\
  \n在开发基于 Spring 的应用时，建议你通过 `ApplicationContext` 接口与 Spring 交互。Spring 支持通过手动编码（手动实例化并加载相应配置）或在\
  \ Web 容器环境中通过 `ContextLoaderListener` 来引导 `ApplicationContext`。从现在开始，本书中的所有示例代码都将使用\
  \ `ApplicationContext` 及其实现。\n\n### 配置 ApplicationContext\n\n在**第** **2** **章**的第一个示例中，`org.springframework.context.ApplicationContext`\
  \ 是使用 XML 文件配置的。虽然仍然可行，但使用 XML 进行配置仅限于 Spring 4 的功能，因为从该版本之后，该领域就没有再进行技术投入了。在 Spring\
  \ 的演进过程中，关于哪种配置应用的方式更好（XML 还是注解）一直存在长期讨论。这实际上取决于开发者的偏好。注解与所配置 bean 的类型交织在一起，提供了大量上下文信息，使得配置更加简洁。XML\
  \ 配置 Spring 应用时与实际代码解耦（Spring XML 配置文件是资源文件），尽管这对于 Java 配置也同样适用，这意味着配置可以外部化并在不重新编译代码的情况下进行修改。Spring\
  \ 最大的优点之一就是你可以轻松地混合使用配置风格。\n\n为了保持简单，Spring 应用仅通过 Java 注解和 Java 代码进行配置，这提供了足够的灵活性来描述任何类型的\
  \ Spring 应用。\n\n### 基本配置概述\n\n要配置一个独立的 Spring 应用，只需要一个带有 `@Configuration` 注解的类。该注解表明该类包含带有\
  \ `@Bean` 注解的方法，这些方法就是 bean 声明。这种方法适用于任何类型的对象，特别是由第三方库提供的类型——这些代码不属于你的项目，你无法编辑它们来声明你的\
  \ bean。同一个类也可以通过添加 `@ComponentScan` 注解来配置，以启用查找现有 bean 声明的功能。可发现的 bean 声明是带有 `@Component`\
  \ 和其他构造型注解的类。Spring 容器处理这类类以生成 bean 定义，并在运行时为这些 bean 提供服务请求。所有这些注解基本上都用于描述应该创建哪些对象、创建顺序、初始化操作，甚至是在被垃圾回收器丢弃之前要执行的操作，这些通常简称为**配置元数据**。\n\
  \n这是配置 Spring 应用最紧凑的方式。然而，逐步展开这个主题更为合适。让我们从一个 Spring 配置类开始，如清单 3-8 所示，它声明了两个 bean。你在**第**\
  \ **2** **章**中已经见过这个类，但现在我们要深入了解细节。\n\n```\npackage com.apress.prospring6.two.annotated\n\
  // 其他导入已省略\nimport org.springframework.context.annotation.Bean\nimport org.springframework.context.annotation.Configuration\n\
  @Configuration\nopen class HelloWorldConfiguration {\n@Bean // 等同于 <bean id=\"provider\"\
  \ class=\"...\"/>\nopen fun provider(): MessageProvider {\nreturn HelloWorldMessageProvider()\n\
  }\n@Bean // 等同于 <bean id=\"renderer\" class=\"...\"/>\nopen fun renderer(): MessageRenderer\
  \ {\nval renderer: MessageRenderer = StandardOutMessageRenderer()\nrenderer.messageProvider\
  \ = provider()\nreturn renderer\n}\n}\n清单 3-8\n简单的 Spring 配置类\n```\n\n清单 3-8 声明了两个\
  \ bean，一个名为 `provider`，另一个名为 `renderer`；是的，bean 的名称与创建它们的方法名称相同。命名 bean 将在本章后面介绍。\n\
  \nSpring 配置类通常使用 `AnnotationConfigApplicationContext` 或其支持 Web 的变体 `AnnotationConfigWebApplicationContext`\
  \ 进行引导。这两个类都实现了 `ApplicationContext`，引导清单 3-8 中配置的应用的代码可以如清单 3-9 所示编写。\n\n```\n\
  package com.apress.prospring6.two.annotated\nimport org.springframework.context.ApplicationContext\n\
  import org.springframework.context.annotation.\nAnnotationConfigApplicationContext\n\
  object HelloWorldSpringAnnotated {\n@JvmStatic\nfun main(args: Array<String>) {\n\
  val ctx: ApplicationContext = AnnotationConfigApplicationContext(\nHelloWorldConfiguration::class.java)\n\
  val mr: MessageRenderer = ctx.getBean(\"renderer\", MessageRenderer::class.java)\n\
  mr.render()\n}\n}\n清单 3-9\n引导 Spring 应用\n```\n\n当运行 `HelloWorldSpringAnnotated`\
  \ 类时，会创建一个 Spring 应用上下文，其中包含由 `HelloWorldConfiguration` 类配置的 bean。通过调用 `getBean(\"\
  {name}\", {type}.class)` 方法获取对 `renderer` bean 的引用，并调用其 `render()` 方法。由于 Spring\
  \ 根据配置注入了 `MessageProvider` 依赖，控制台会按预期打印出 “Hello World!” 消息。\n\n\n\n引导过程包括实例化 `AnnotationConfigApplicationContext`\
  \ 类，并将配置类的简单类名作为参数传入。通过实例化该类，我们创建了一个 Spring IoC 容器的实例，该容器将读取 Bean 声明、创建 Bean、将其添加到注册表中并进行管理。通过使用容器的引用，可以检索和使用\
  \ Bean，正如清单 3-9 所示。\n\n### 声明 Spring 组件\n\n声明 Bean 的另一种方法是直接使用*构造型*注解来标注类。这些注解之所以被称为*构造型*，是因为它们定义了类型或方法在整个架构中的角色。它们属于名为\
  \ `org.springframework.stereotype` 的包。该包将用于定义 Bean 的注解归为一组。这些注解与 Bean 的角色相关。例如，`@Service`\
  \ 用于定义服务 Bean，这是一种更复杂的功能性 Bean，提供其他 Bean 可能需要的服务；`@Repository` 用于定义从数据库检索/保存数据的\
  \ Bean 等。而 `@Component` 是将类标记为 Bean 声明的注解。`@Component` 是一个元注解，本段中所有其他注解都使用它进行标注。这使得它们在使用基于注解的配置和类路径扫描时成为自动检测的候选对象。\n\
  \n要使用注解创建 Bean 定义，必须使用适当的构造型注解来标注 Bean 类，并且用于注入依赖项的 setter 或构造器必须使用 `@Autowired`\
  \ 进行标注，以告知 Spring IoC 容器查找该类型的 Bean，并在调用该方法时将其用作参数。\n\n在清单 3-10 中，构造型注解可以将生成的 Bean\
  \ 名称作为参数。\n\n```\n// HelloWorldMessageProvider.kt\npackage com.apress.prospring6.three.constructor\n\
  import com.apress.prospring6.two.decoupled.MessageProvider\nimport org.springframework.stereotype.Component\n\
  // 无依赖的简单 Bean\n@Component(\"provider\")\nclass HelloWorldMessageProvider : MessageProvider\
  \ {\n// 部分代码已省略\n}\n// StandardOutMessageRenderer.kt\npackage com.apress.prospring6.three.setter;\n\
  import com.apress.prospring6.two.decoupled.MessageRenderer\nimport org.springframework.beans.factory.annotation.Autowired\n\
  // 需要依赖的简单 Bean\n@Component(\"renderer\")\nclass StandardOutMessageRenderer : MessageRenderer\
  \ {\noverride var messageProvider:MessageProvider? = null\n@Autowired set(value)\
  \ { field = value }\n// 部分代码已省略\n}\n清单 3-10\n使用 @Component 声明 Spring Bean\n```\n\
  \n通过使用 `@ComponentScan` 标注配置类，在引导 `ApplicationContext` 时，Spring 将查找这些类（也称为组件），并使用指定的名称实例化\
  \ Bean。在清单 3-11 中，你可以看到使用 `@ComponentScan` 标注的简单 `HelloWorldConfiguration` 配置类。\n\
  \n```\npackage com.apress.prospring6.three.constructor\nimport org.springframework.context.annotation.ComponentScan\n\
  @Configuration\n@ComponentScan\nopen class HelloWorldConfiguration {\n}\n清单 3-11\n\
  带有组件扫描的简单 Spring 配置类\n```\n\n使用 `AnnotationConfigApplicationContext`（参见清单 3-9）引导\
  \ Spring 环境的代码也适用于此类，无需额外更改。\n\n`@ComponentScan` 注解声明了一个扫描指令，并且可以定义要扫描的特定包。当未配置包时，扫描将从声明此注解的类所在的包开始，无论该类是公共的还是包私有的。\n\
  \n清单 3-11 中的类告诉 Spring 在 `constructor` 包及其子包中查找 Bean 定义。如果我们想要扩大或限制扫描范围，可以通过声明带有\
  \ `basePackages` 属性的 `@ComponentScan` 注解来实现，该属性允许声明一个或多个 Spring 将查找组件的包。\n\n例如：\n\
  \n*   `@ComponentScan(basePackages = \"com.apress.prospring6\")` 告诉 Spring 在 `com.apress.prospring6`\
  \ 包及其所有子包中查找组件类。\n\n*   `@ComponentScan(basePackages = { \"com.apress.prospring6.two\"\
  , \"com.apress.prospring6.three\" })` 告诉 Spring 在 `com.apress.prospring6.two` 包和\
  \ `com.apress.prospring6.three` 包及其所有子包中查找组件类。\n\n![](img/524962_1_En_3_Figf_HTML.jpg)\
  \ 一个警告提示图标。它是一个中心带有感叹号的圆形。 包私有类上的 Bean 定义会被包含其所在包的 `@ComponentScan` 配置所捕获。\n\n组件扫描是一项耗时的操作，良好的编程实践是尽量限制\
  \ Spring 在代码库中查找 Bean 定义的位置。除了 `basePackages` 之外，`@ComponentScan` 注解还提供了其他属性，以帮助精确定义扫描位置：\n\
  \n*   `basePackageClasses`：可以配置一个或多个类；将扫描每个指定类所在的包。\n\n*   `includeFilters`：指定哪些类型符合组件扫描条件。\n\
  \n*   `excludeFilters`：指定哪些类型不符合组件扫描条件。\n\n在实际的生产应用中，可能存在使用旧版 Spring 开发的遗留代码，或者需求的性质可能需要同时使用\
  \ XML 和配置类。幸运的是，XML 和 Java/Kotlin 配置可以通过多种方式混合使用。例如，配置类可以使用 `@ImportResource` 从\
  \ XML 文件（或多个文件）导入 Bean 定义，并且使用 `AnnotationConfigApplicationContext` 的相同引导方式在这种情况下也同样有效。来自\
  \ Java/Kotlin 配置类的其他 Bean 定义可以使用 `@Import` 导入。\n\n因此，Spring 允许你在定义 Bean 时发挥真正的创造力；你将在**第**\
  \ **4** **章**中了解更多相关信息，该章将专门讨论 Spring 应用程序配置。\n\n\n\n### 使用 Setter 注入\n\n在上一节中，我们使用\
  \ setter 注入配置了 `renderer` bean，但由于重点在于 Spring 配置类，因此需要补充一些额外细节。\n\n要配置 setter 注入，必须在每个由\
  \ Spring 调用的 setter 方法上添加 `@Autowired` 注解，以便注入依赖项。清单 3-12 展示了为支持 setter 注入而设计的 `StandardOutMessageRenderer`\
  \ 版本。\n\n```\npackage com.apress.prospring6.three.setter\nimport org.springframework.beans.factory.annotation.Autowired\n\
  // 其他 import 语句已省略\n@Component(\"renderer\")\nclass StandardOutMessageRenderer :\
  \ MessageRenderer {\noverride var messageProvider:MessageProvider? = null\n@Autowired\
  \ set(value) {\nprintln(\" ~~ 使用 setter 注入依赖 ~~\")\nfield = value\n}\n// 其他代码已省略\n\
  }\n清单 3-12\n使用 @Component 和 Setter 注入声明 StandardOutMessageRenderer Bean\n```\n\n\
  为了确保执行代码时通过 setter 方法注入依赖项，我们在 setter 方法中添加了 `println(\" ~~ 使用 setter 注入依赖 ~~\"\
  )` 语句。\n\nJava/Kotlin 配置类无需更改；如果 `@ComponentScan` 配置正确，无论使用哪种注入风格，都能发现 bean 定义。\n\
  \n![](img/524962_1_En_3_Figg_HTML.jpg) 一个警告提示图标。它是一个中心带有感叹号的圆形。 除了 `@Autowired`，你还可以使用\
  \ `@Resource(name=\"provider\")` 达到相同效果。`@Resource` 是 JSR-250（“Java 平台通用注解”）标准中的注解之一，该标准定义了一套在\
  \ JSE 和 JEE 平台上通用的 Java 注解。此注解目前属于 `jakarta.annotation-api` 库。与 `@Autowired` 不同，`@Resource`\
  \ 注解支持 `name` 参数，可实现更细粒度的依赖注入需求。此外，Spring 还支持使用 JSR-299（“Java EE 平台上下文与依赖注入”，后移至\
  \ JSR-330“Java 依赖注入”）中引入的 `@Inject` 注解。`@Inject` 的行为与 Spring 的 `@Autowired` 注解等效，目前属于\
  \ `jakarta.inject-api` 库。\n\n用于启动 Spring 应用上下文以测试通过 setter 注入配置 Spring bean 是否按预期工作的代码，与\
  \ `HelloWorldSpringAnnotated` 类的代码相同。\n\n![](img/524962_1_En_3_Figh_HTML.jpg) 一个警告提示图标。它是一个中心带有感叹号的圆形。 在本书附带的项目中，大多数包含\
  \ `main(..)` 方法以启动 Spring 应用上下文的类名都以 `Demo` 结尾。本节的演示类名为 `SetterInjectionDemo`，所有\
  \ bean 定义和配置都位于 `SetterInjectionDemo.java` 文件中。这样做的目的是将所有实现放在一个文件中，便于在项目中查找其位置。\n\
  \n### 使用构造器注入\n\n在上一节中，我们通过 setter 方法将一个 provider 实例注入到 `renderer` bean 中。这种方法运行良好，因为\
  \ `@Autowired` 注解默认强制注入依赖项，因此如果缺少依赖项，Spring 应用将无法启动。正如你将在本书后面看到的，在某些情况下，通过 setter\
  \ 注入依赖项并非最佳选择，这是因为 Spring 创建 bean 的方式：它首先实例化构造器，然后调用 setter 方法注入依赖项。如果你希望确保 bean\
  \ 在没有依赖项的情况下根本无法创建，可以在生命周期更早的阶段（即实例化步骤）强制执行此操作，方法是将依赖项声明为构造器的参数，从而将 bean 设计为支持*构造器注入*。\n\
  \n在我们目前的示例中，如果没有 provider，创建 `renderer` 是没有意义的，因此更好的设计是为 `StandardOutMessageRenderer`\
  \ 类提供一个包含 `MessageProvider` 参数的构造器，如清单 3-13 所示。\n\n```\npackage com.apress.prospring6.three.constructor\n\
  // import 语句已省略\n@Component(\"renderer\")\nclass StandardOutMessageRenderer @Autowired\
  \ constructor(\noverride var messageProvider:MessageProvider?)\n: MessageRenderer\
  \ {\ninit {\nprintln(\" ~~ 使用构造器注入依赖 ~~\")\n}\n// 其他代码已省略\n}\n清单 3-13\n为构造器注入设计的\
  \ StandardOutMessageRenderer\n```\n\n通过这样实现 `MessageRenderer`，我们使得在不提供 `messageProvider`\
  \ 值的情况下无法创建 `StandardOutMessageRenderer` 实例。`@Autowired` 注解用于修饰构造器，这告诉 Spring 在实例化此\
  \ bean 时（如果有多个构造器）应使用哪个构造器。\n\n![](img/524962_1_En_3_Figi_HTML.jpg) 一个警告提示图标。它是一个中心带有感叹号的圆形。 在\
  \ Spring 4.x 中，决定如果 bean 声明了一个初始化所有依赖项的单一构造器，则 `@Autowired` 注解是多余的。因此，本着**约定优于配置**的精神，Spring\
  \ IoC 被修改为无论注解是否存在，都会调用唯一的构造器来创建 bean。因此，即使移除 `@Autowired` 注解，清单 3-13 中声明的 `renderer`\
  \ bean 仍然有效。\n\n由于我们提到表示 bean 定义的类可以有多个构造器，因此我们在清单 3-14 中向您展示 `ConstructorConfusion`\
  \ 类。\n\n```\npackage com.apress.prospring6.three.constructor\nimport org.springframework.beans.factory.annotation.Autowired\n\
  import org.springframework.beans.factory.annotation.Value\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext\n\
  import org.springframework.stereotype.Component\n@Component\nclass ConstructorConfusion\
  \ {\nprivate var someValue: String\nconstructor(someValue: String) {\nprintln(\"\
  ConstructorConfusion(String) 被调用\")\nthis.someValue = someValue\n}\n@Autowired //\
  \ 这是使其工作的关键\nconstructor(@Value(\"90\") someValue: Int) {\nprintln(\"ConstructorConfusion(int)\
  \ 被调用\")\nthis.someValue = \"数字: \" + Integer.toString(someValue)\n}\noverride fun\
  \ toString(): String {\nreturn someValue\n}\ncompanion object {\n@JvmStatic\nfun\
  \ main(args: Array) {\nval ctx = AnnotationConfigApplicationContext()\nctx.register(ConstructorConfusion::class.java)\n\
  ctx.refresh()\nval cc = ctx.getBean(ConstructorConfusion::class.java)\nprintln(\"\
  这能工作吗？ $cc\")\n}\n}\n}\n清单 3-14\n具有多个构造器的 ConstructorConfusion 类\n```\n\n\n\n清单\
  \ 3-14 中的 `ConstructorConfusion` bean 定义是正确的，因为第二个构造函数使用了 `@Autowired` 注解。这告诉 Spring\
  \ 使用此构造函数来实例化该 bean。如果没有该注解，Spring 无法自行决定使用哪个构造函数，运行此类将抛出以下异常：\n\n```\nCaused by:\
  \ org.springframework.beans.BeanInstantiationException:\nFailed to instantiate [com.apress.prospring6.three.constructor.ConstructorConfusion]:\n\
  No default constructor found;\nnested exception is java.lang.NoSuchMethodException:\
  \ com.apress.prospring6.three.constructor.ConstructorConfusion.()\n```\n\n![](img/524962_1_En_3_Figj_HTML.jpg)\
  \ 关键词工具图标。顶部有火焰，底部有一条线。 请注意带有 `@Autowired` 注解的构造函数中的 `@Value` 注解。此注解将在本章后面解释，但就目前这个简单示例而言，需要知道它是为构造函数参数注入值所必需的，没有它构造函数将无法工作。\n\
  \n![](img/524962_1_En_3_Figk_HTML.jpg) 信息图标。这是一个中心带有字母 i 的圆形。 目前，你可以忽略 `ConstructorConfusion`\
  \ 类拥有自己的 `main(..)` 方法，该方法用于执行以下操作：\n\n*   实例化一个类型为 `AnnotationConfigApplicationContext`\
  \ 的简单、空的 Spring 应用上下文\n\n*   然后通过调用 `ctx.register(ConstructorConfusion.class)`，用\
  \ `ConstructorConfusion` 类表示的 bean 定义填充该上下文\n\n*   接着通过调用 `refresh()` 刷新上下文，该方法会根据注册的\
  \ bean 定义重新创建所有 bean。\n\n或者你已经阅读了所有这些内容，并发现无需配置类即可通过编程方式注册 bean 定义这一点非常有趣。\n\n![](img/524962_1_En_3_Figl_HTML.jpg)\
  \ 警报警告标志图标。这是一个中心带有感叹号的圆形。 清单 3-14 中的示例还强调，`@Autowired` 注解只能应用于类中的一个构造函数。如果我们将该注解应用于多个构造函数方法，Spring\
  \ 在引导 `ApplicationContext` 时会报错。\n\n另一个值得在此介绍的场景是，如果依赖项不是一个 bean 会发生什么。如果它是一个简单对象，例如一个\
  \ `String` 呢？让我们通过创建一个可配置的消息提供程序来解决这个问题。一个允许在外部定义消息的可配置 `MessageProvider` 如清单 3-15\
  \ 所示。\n\n```\npackage com.apress.prospring6.three.configurable\nimport org.springframework.beans.factory.annotation.Value\n\
  // import statements omitted\n@Component(\"provider\")\ninternal class ConfigurableMessageProvider(\n\
  @Value(\"Configurable message\") override var message: String) :\nMessageProvider\
  \ {\ninit {\nprintln(\"~~ Injecting '$message' value into constructor ~~\")\nthis.message\
  \ = message\n}\n}\nListing 3-15\nConfigurable MessageProvider Implementation\n```\n\
  \n通过像这样实现 `MessageProvider`，我们使得在不提供消息值的情况下创建 `ConfigurableMessageProvider` 的实例变得不可能。请注意用于定义要注入到构造函数中的值的\
  \ `@Value` 注解。这就是我们将非 bean 的值注入 Spring bean 的方式。遗憾的是，在此示例中，该值是在注解声明中指定的，因此存在必要的硬编码，但使用\
  \ SpEL 动态值注入可以从其他来源（如属性文件）实现（更多内容请参见本章后面部分）。\n\n### 使用字段注入\n\nSpring 支持的第三种依赖注入类型称为*字段注入*。顾名思义，依赖项直接注入到字段中，无需构造函数或\
  \ setter。这是通过使用 `@Autowired` 注解标注类成员来实现的。这看起来可能很实用，因为当依赖项在所属对象外部不需要时，它可以减轻开发人员编写一些在\
  \ bean 初始创建后不再使用的代码的负担。在清单 3-16 中，类型为 `NonSingletonDemo` 的 bean 有一个类型为 `Inspiration`\
  \ 的字段。\n\n```\npackage com.apress.prospring6.three.field\nimport org.springframework.stereotype.Component\n\
  // import statements omitted\n@Component(\"singer\")\ninternal class Singer {\n\
  @Autowired\nprivate val inspirationBean: Inspiration? = null\nfun sing() {\nprintln(\"\
  ... \" + inspirationBean!!.lyric)\n}\n}\nListing 3-16\nNonSingletonDemo Class Used\
  \ to Show Field Injection\n```\n\n该字段是私有的，但 Spring IoC 容器并不关心这一点；它使用反射来填充所需的依赖项。\n\
  \n`Inspiration` 类的代码如清单 3-17 所示，同时还有用于引导 Spring 应用上下文的类；它是一个带有 `String` 字段的简单 bean。\n\
  \n```\npackage com.apress.prospring6.three.field;\n// import statements omitted\n\
  @Component\ninternal class Inspiration(\n@Value(\"For all my running, I can understand\"\
  ) lyric: String\n) {\nvar lyric = \"I can keep the door cracked open, to let light\
  \ through\"\ninit {\nthis.lyric = lyric\n}\n}\n// demo class\nobject SingerFieldInjectionDemo\
  \ {\n@JvmStatic\nfun main(args: Array) {\nval ctx = AnnotationConfigApplicationContext()\n\
  ctx.register(Singer::class.java, Inspiration::class.java)\nctx.refresh()\nval singerBean\
  \ = ctx.getBean(Singer::class.java)\nsingerBean.sing()\n}\n}\nListing 3-17\nInspiration\
  \ Class and Demo Class Used to Show How Field Injection Works\n```\n\nSpring IoC\
  \ 容器找到一个类型为 `Inspiration` 的 bean 后，会将该 bean 注入到 `singer` bean 的 `inspirationBean`\
  \ 字段中。这就是为什么运行主类时会在控制台打印 *For all my running, I can understand*。\n\n然而，这有一些缺点，这就是为什么**不推荐使用字段注入。**\
  \ 以下是缺点列表：\n\n*   *存在违反单一职责原则的风险*：拥有更多依赖意味着类承担更多职责，这可能导致在重构时难以分离关注点。当使用构造函数或 setter\
  \ 设置依赖时，类变得臃肿的情况更容易被发现，但在使用字段注入时则隐藏得很好。\n\n*   *依赖隐藏*：在 Spring 中，注入依赖的责任被传递给容器，但类应通过公共接口（通过方法或构造函数）清晰地传达所需的依赖类型。使用字段注入，可能会变得不清楚真正需要哪种类型的依赖，以及该依赖是否是强制性的。*（这与某些伴侣不沟通他们的需求，却期望你神奇地读懂他们的心思并满足他们非常相似。）*\n\
  \n*   *对 Spring IoC 的依赖*：字段注入引入了对 Spring 容器的依赖，因为 `@Autowired` 注解是一个 Spring 组件；因此，该\
  \ bean 不再是 POJO，并且无法独立实例化。（除非你使用 `@Resource` 或 `@Inject` 以及不同的容器。）\n\n*   *字段注入不能用于\
  \ final 字段*：这种类型的字段只能使用构造函数注入进行初始化。\n\n*   *编写测试困难*：字段注入给编写测试带来了困难，因为依赖项必须手动注入。\n\
  \n然而，在实例变量上使用 `@Autowired` 仅*对于* `@Configuration` 和 `@Test` 类是实用的——对于后者，主要是在涉及 Spring\
  \ 的集成测试中。\n\n\n\n## 使用注入参数\n\n在前面的示例中，我们简要提到可以通过设值注入和构造器注入将其他组件和值注入到 bean 中。Spring\
  \ 支持多种注入参数选项，不仅允许你注入其他组件和简单值，还可以注入 Java/Kotlin 集合、外部定义的属性，甚至来自其他工厂的 bean。让我们进一步深入探讨。\n\
  \n### 注入简单值\n\n将简单值注入到 bean 中非常容易。Spring 支持多种注入参数选项，不仅允许你注入其他组件和简单值，还可以注入集合、外部定义的属性，甚至来自其他工厂的\
  \ bean。为此，只需在 `@Value` 注解中指定值即可。默认情况下，`@Value` 注解不仅能读取 `String` 值，还能将这些值转换为任何基本类型或基本类型的包装类。代码清单\
  \ 3-18 中的代码片段展示了一个简单的 bean，它暴露了多种属性用于注入。\n\n```\npackage com.apress.prospring6.three.valinject\n\
  import org.springframework.beans.factory.annotation.Value\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext\n\
  import org.springframework.stereotype.Component\n@Component(\"injectSimple\")\n\
  class InjectSimpleDemo {\n@Value(\"John Mayer\")\nprivate val name: String? = null\n\
  @Value(\"40\")\nprivate val age = 0\n@Value(\"1.92\")\nprivate val height = 0f\n\
  @Value(\"false\")\nprivate val developer = false\n@Value(\"1241401112\")\nprivate\
  \ val ageInSeconds: Long? = null\noverride fun toString(): String {\nreturn \"\"\
  \"\nName: $name\nAge: $age\nAge in Seconds: $ageInSeconds\nHeight: $height\nIs Developer?:\
  \ $developer\n\"\"\".trimIndent()\n}\ncompanion object {\n@JvmStatic\nfun main(args:\
  \ Array) {\nval ctx = AnnotationConfigApplicationContext()\nctx.register(InjectSimpleDemo::class.java)\n\
  ctx.refresh()\nval simple = ctx.getBean(\"injectSimple\") as InjectSimpleDemo\n\
  println(simple)\n}\n}\n}\n代码清单 3-18\n用于演示向各种类型的属性注入值的 InjectSimpleDemo 类\n```\n\n\
  `@Value` 注解也可以直接用于字段，在 `InjectSimpleDemo` 类中就是这样使用的，以保持简单并避免编写繁琐的 setter 代码。如果你运行这个类，控制台输出将如预期所示，如代码清单\
  \ 3-19 所示。\n\n```\nName: John Mayer\nAge: 39\nAge in Seconds: 1241401112\nHeight:\
  \ 1.92\nIs Programmer?: false\n代码清单 3-19\n运行代码清单 3-18 中的类时得到的控制台输出\n```\n\n### 使用\
  \ SpEL 注入值\n\n代码清单 3-18 中的示例展示了 Spring 在注入属性值时具备的自动转换能力。然而，该示例仍然相当基础，因为值是在 `@Value`\
  \ 注解中硬编码的。这正是 SpEL 发挥作用的地方。\n\nSpring 3 引入的一个强大特性是 **Spring 表达式语言 (SpEL)**。SpEL\
  \ 使你能够动态地计算表达式，然后在 Spring 的 `ApplicationContext` 中使用它。你可以将计算结果注入到 Spring bean 中。在本节中，我们将通过上一节的示例，了解如何使用\
  \ SpEL 从其他 bean 注入属性。\n\n假设现在我们希望将待注入的值外部化到一个配置类中，如代码清单 3-20 所示。\n\n```\npackage\
  \ com.apress.prospring6.three.valinject\n// 导入语句已省略\n@Component(\"injectSimpleConfig\"\
  )\ninternal class InjectSimpleConfig {\nval name = \"John Mayer\"\nval age = 40\n\
  val height = 1.92f\nval isDeveloper = false\nval ageInSeconds = 1241401112L\n}\n\
  代码清单 3-20\n提供一些字段值的 Spring 配置类\n```\n\n首先要做的是编辑 `@Value` 注解，将硬编码的值替换为引用此 bean 属性的\
  \ SpEL 表达式。其次，需要将这种类型的 bean 添加到配置中。这两点都在代码清单 3-21 中展示。\n\n```\npackage com.apress.prospring6.three.valinject\n\
  // 导入语句已省略\n@Component(\"injectSimpleSpEL\")\nclass InjectSimpleSpELDemo {\n@Value(\"\
  #{injectSimpleConfig.name.toUpperCase()}\")\nprivate val name: String? = null\n\
  @Value(\"#{injectSimpleConfig.age + 1}\")\nprivate val age = 0\n@Value(\"#{injectSimpleConfig.height}\"\
  )\nprivate val height = 0f\n@Value(\"#{injectSimpleConfig.developer}\")\nprivate\
  \ val developer = false\n@Value(\"#{injectSimpleConfig.ageInSeconds}\")\nprivate\
  \ val ageInSeconds: Long? = null\noverride fun toString(): String {\nreturn \"\"\
  \"\nName: $name\nAge: $age\nAge in Seconds: $ageInSeconds\nHeight: $height\nIs Developer?:\
  \ $developer\n\"\"\".trimIndent()\n}\ncompanion object {\n@JvmStatic\nfun main(args:\
  \ Array) {\nval ctx = AnnotationConfigApplicationContext()\nctx.register(InjectSimpleConfig::class.java,\
  \ InjectSimpleSpELDemo::class.java)\nctx.refresh()\nval simple = ctx.getBean(\"\
  injectSimpleSpEL\") as InjectSimpleSpELDemo\nprintln(simple)\n}\n}\n}\n代码清单 3-21\n\
  自定义为使用 SpEL 表达式的 @Value 注解\n```\n\n请注意，我们使用 SpEL `#{injectSimpleConfig.name}` 来引用另一个\
  \ bean 的属性。还要注意，这里没有调用 getter 方法，但 SpEL 表达式包含了由“.”（点号）连接的 bean 和属性名称，Spring 知道该怎么做。SpEL\
  \ 还支持字符串操作和算术运算，如注入前对 `name` 属性调用 `toUpperCase()` 方法，以及在注入前对 bean 属性值加 1 所示。如果你运行\
  \ `InjectSimpleSpELDemo` 类的 `main(..)` 方法，控制台将打印出如代码清单 3-22 所示的输出。\n\n```\nName:\
  \ JOHN MAYER\nAge: 41\nAge in Seconds: 1241401112\nHeight: 1.92\nIs Developer?:\
  \ false\n代码清单 3-22\n运行代码清单 3-21 中的类时得到的控制台输出\n```\n\n由于对 `name` 属性添加了 `toUpperCase()`\
  \ 调用，输出结果与值硬编码的示例几乎相同。通过使用 SpEL，你可以访问任何由 Spring 管理的 bean 和属性，并借助 Spring 对复杂语言特性和语法的支持，对它们进行操作以供应用程序使用。\n\
  \n\n\n### 注入与`ApplicationContext`嵌套\n\n到目前为止，我们注入的 Bean 与被注入的 Bean 都位于同一个`ApplicationContext`（因此也位于同一个`BeanFactory`）中。然而，Spring\
  \ 支持`ApplicationContext`的层级结构，使得一个上下文（及其关联的`BeanFactory`）被视为另一个上下文的父级。通过允许`ApplicationContext`实例嵌套，Spring\
  \ 让你能够将配置拆分到不同的文件中，这对于拥有大量 Bean 的大型项目来说简直是天赐之物。\n\n当嵌套`ApplicationContext`实例时，Spring\
  \ 允许子上下文中的 Bean 引用父上下文中的 Bean。在 XML 中这很容易实现，因为`<ref/>`标签可以通过其`parent`属性配置为引用父上下文中的\
  \ Bean。使用 Java/Kotlin 配置和注解时，任务会稍微繁琐一些，但仍然可行。接下来，我们将为你展示其中的奥妙。\n\n使用`AnnotationConfigApplicationContext`进行`ApplicationContext`嵌套很容易理解。要将一个`AnnotationConfigApplicationContext`嵌套到另一个中，只需在子`ApplicationContext`中调用`setParent()`方法，如代码清单\
  \ 3-23 所示。\n\n```\npackage com.apress.prospring6.three.nesting\n// 导入语句已省略\nobject\
  \ ContextNestingDemo {\n@JvmStatic\nfun main(args: Array) {\nval parentCtx = AnnotationConfigApplicationContext()\n\
  parentCtx.register(ParentConfig::class.java)\nparentCtx.refresh()\nval childCtx\
  \ = AnnotationConfigApplicationContext()\nchildCtx.register(ChildConfig::class.java)\n\
  childCtx.parent = parentCtx\nchildCtx.refresh()\nval song1: Song = childCtx.getBean(\"\
  song1\") as Song\nval song2: Song = childCtx.getBean(\"song2\") as Song\nval song3:\
  \ Song = childCtx.getBean(\"song3\") as Song\nprintln(\"来自父上下文: \" + song1.title)\n\
  println(\"来自父上下文: \" + song2.title)\nprintln(\"来自子上下文: \" + song3.title)\n}\n}\n\
  代码清单 3-23\n嵌套应用上下文\n```\n\n此方法继承自`org.springframework.context.support.GenericApplicationContext`，该类是`AnnotationConfigApplicationContext`的父类。然而，该方法在层级结构中声明的位置更高，位于`org.springframework.context.ConfigurableApplicationContext`接口中，该接口除了提供`ApplicationContext`接口中的应用程序上下文客户端方法外，还提供了配置应用程序上下文的功能。`AnnotationConfigApplicationContext`所属的完整层级结构如图\
  \ 3-5 所示。\n\n![](img/524962_1_En_3_Fig5_HTML.jpg)\n\n一张截图。标题为“层级结构：ApplicationContext\
  \ 的子类型”。它包含一些图标以及可配置、抽象、泛型和注解配置的应用上下文的详细信息。\n\n图 3-5\n\n`AnnotationConfigApplicationContext`层级结构\n\
  \n上下文嵌套很容易设置，但从父上下文中访问 Bean……就没那么简单了。\n\n`Song`类是一个非常简单的 POJO，只有一个名为`title`的字段。为了根据上下文声明歌曲标题，使用了一个名为`TitleProvider`的类。这个类可以通过伴生对象构建器方法以各种标题实例化。这个类也非常简单。这两个类如代码清单\
  \ 3-24 所示。\n\n```\npackage com.apress.prospring6.three.nesting\n// Song.kt\nclass\
  \ Song(val title: String?)\n// TitleProvider.kt\nclass TitleProvider {\nvar title:String?\
  \ = \"Gravity\"\ncompanion object {\nfun instance(title: String?): TitleProvider\
  \ {\nval childProvider = TitleProvider()\nif (title != null && title.isNotBlank())\n\
  childProvider.title = title\nreturn childProvider\n}\n}\n}\n代码清单 3-24\nSong 和 TitleProvider\
  \ 类\n```\n\n`ParentConfig`类很简单，声明了两个名为`parentProvider`和`childProvider`的`TitleProvider`\
  \ Bean，如代码清单 3-25 所示。\n\n```\npackage com.apress.prospring6.three.nesting\n// 导入语句已省略\n\
  @Configuration\nopen class ParentConfig {\n@Bean\nopen fun parentProvider(): TitleProvider\
  \ {\nreturn TitleProvider.instance(null)\n}\n@Bean\nopen fun childProvider(): TitleProvider\
  \ {\nreturn TitleProvider.instance(\"Daughters\")\n}\n}\n代码清单 3-25\n声明两个 TitleProvider\
  \ Bean 的 ParentConfig 类\n```\n\n`ChildConfig`类声明了三个`Song` Bean，每个 Bean 的标题都从`TitleProvider`\
  \ Bean 注入：\n\n*   `song1` 注入的是名为`parentProvider`的 Bean 提供的标题值；由于父上下文中存在一个名为`parentProvider`的\
  \ Bean（子上下文继承自父上下文），因此注入的值为 *Gravity*。\n\n*   `song2` 注入的是父上下文中声明的名为`childProvider`的\
  \ Bean 提供的标题值；由于子上下文中也存在一个名为`childProvider`的 Bean，要访问父上下文中的那个 Bean，需要一些*编码技巧*（使用\
  \ XML 配置会简单得多）：\n\n    *   要访问父上下文中的 Bean，需要获取当前上下文的引用。这通过实现`ApplicationContextAware`接口并声明一个`ApplicationContext`类型的属性来实现，Spring\
  \ 会通过调用`setApplicationContext(..)`方法用当前应用上下文的引用来初始化该属性。\n\n    *   一旦有了当前上下文的引用，我们编写一个复杂的\
  \ SpEL 表达式，旨在获取父上下文的引用，访问`childProvider`，并获取`title`值，该值预期为`Daughters`。\n\n*   `song3`\
  \ 注入的是名为`childProvider`的 Bean 提供的标题值；由于当前上下文中存在一个名为`childProvider`的 Bean，因此注入的值为\
  \ *No Such Thing*。\n\n代码如代码清单 3-26 所示。\n\n```\npackage com.apress.prospring6.three.nesting\n\
  import org.springframework.beans.BeansException\nimport org.springframework.context.ApplicationContextAware\n\
  // 导入语句已省略\n@Configuration\nopen class ChildConfig : ApplicationContextAware {\n\
  var applicationContext1: ApplicationContext? = null\n@Bean // 覆盖父上下文中的{@code childProvider}\
  \ Bean\nopen fun childProvider(): TitleProvider {\nreturn TitleProvider.instance(\"\
  No Such Thing\")\n}\n@Bean\nopen fun song1(@Value(\"#{parentProvider.title}\") title:\
  \ String?): Song {\nreturn Song(title)\n}\n@Bean\nopen fun song2(\n@Value(\"#{childConfig.applicationContext1.parent.getBean(\\\
  \"childProvider\\\").title}\")\ntitle:String?): Song {\nreturn Song(title)\n}\n\
  @Bean\nopen fun song3(@Value(\"#{childProvider.title}\") title: String?): Song {\n\
  return Song(title)\n}\n@Throws(BeansException::class)\noverride fun setApplicationContext(applicationContext:\
  \ ApplicationContext) {\nthis.applicationContext1 = applicationContext\n}\n}\n代码清单\
  \ 3-26\n在子上下文的 Bean 中注入父上下文 Bean 的属性：输出\n```\n\nBean `song2`的`@Value`注解中的 SpEL 表达式看起来复杂，但实际上并非如此。还记得我们到目前为止在每个演示类中是如何访问\
  \ Bean 的吗？这个表达式所做的正是同样的事情，只不过它不是从当前上下文访问 Bean，而是从其父上下文中访问。让我们解释一下：\n\n*   表达式需要以`childConfig`开头，因为这是配置\
  \ Bean 的名称。之前提到过，SpEL 可以访问 Bean 的属性。当前应用上下文由 Bean `childConfig`的`applicationContext`属性引用。\n\
  \n*   `parent` 是`ApplicationContext`的一个属性，它引用父上下文。如果没有父上下文，则为`null`，但在此示例中，我们知道存在一个父上下文。\n\
  \n*   `getBean(\"childProvider\")` 是我们之前用来通过名称获取 Bean 引用的典型方法。在 Kotlin 代码中，需要转换为适当的类型，而\
  \ SpEL 会自动处理。\n\n\n\n清单 3-27 是运行 `ContextNestingDemo` 类后的输出结果。\n\n```\nfrom parent\
  \ ctx: Gravity\nfrom parent ctx: No Such Thing\nfrom child ctx: Daughters\nListing\
  \ 3-27\nInjecting Beans Properties from a Parent Context in Beans in a Child Context\n\
  ```\n\n正如预期，`song1` 和 `song2` 这两个 bean 都从父级 `ApplicationContext` 中的 bean 获取了标题值，而\
  \ `song3` bean 则从子级 `ApplicationContext` 中的 bean 获取了标题值。\n\n### 注入集合\n\n通常，你的 bean\
  \ 需要访问对象集合，而不仅仅是单个 bean 或值。因此，Spring 允许你将对象集合注入到某个 bean 中，这并不令人意外。在本书的上一版中，列表、集合、映射和属性值都是使用\
  \ XML 配置的。由于本书不侧重于 XML，让我们看看如何使用 Java/Kotlin 配置来声明集合。实际上，这非常简单：只需在配置类中声明带有 `@Bean`\
  \ 注解的方法，这些方法返回 `List<E>`、`Set<E>`、`Properties` 或 `Map<K,V>` 类型即可。本节仅涵盖 `List<E>`\
  \ 类型，但本书的源码包含了所有类型的示例。\n\n对于下一个示例，我们将使用上一节中使用的 `Song` 类。`CollectionConfig` 类型声明了一个\
  \ `List<Song>` bean，如清单 3-28 所示。\n\n```\npackage com.apress.prospring6.three.collectioninject\n\
  // import statements omitted\n@Configuration\ninternal open class CollectionConfig\
  \ {\n@Bean\nopen fun list(): List {\nreturn listOf(\nSong(\"Not the end\"),\nSong(\"\
  Rise Up\")\n)\n}\n@Bean\nopen fun set(): Set {\nreturn setOf(\nSong(\"Ordinary Day\"\
  ),\nSong(\"Birds Fly\")\n)\n}\n@Bean\nopen fun map(): Map {\nreturn mapOf(\n\"John\
  \ Mayer\" to Song(\"Gravity\"),\n\"Ben Barnes\" to Song(\"11:11\")\n)\n}\n@Bean\n\
  open fun props(): Properties {\nval props = Properties()\nprops[\"said.she\"] =\
  \ \"Never Mine\"\nprops[\"said.he\"] = \"Cold and jaded\"\nreturn props\n}\n@Bean\n\
  open fun song1(): Song {\nreturn Song(\"Here's to hoping\")\n}\n@Bean\nopen fun\
  \ song2(): Song {\nreturn Song(\"Wishing the best for you\")\n}\n}\nListing 3-28\n\
  Configuration Class Declaring a Bean of Type List\n```\n\n`CollectionConfig` 类还声明了两个类型为\
  \ `Song` 的 bean。这些 bean 的用途将在本节稍后变得清晰。\n\n`CollectingBean` 是用于注入列表 bean 的类型，其值通过调用\
  \ `printCollections()` 方法打印。`CollectionInjectionDemo` 类中声明了 `main(..)` 方法，包含创建应用上下文、获取\
  \ `CollectingBean` bean 的引用，并调用 `printCollections()` 方法以检查列表值是否被注入的代码。清单 3-29 展示了这两个类。\n\
  \n```\npackage com.apress.prospring6.three.collectioninject\n// import statements\
  \ omitted\nobject CollectionInjectionDemo {\n@JvmStatic\nfun main(args: Array) {\n\
  val ctx = AnnotationConfigApplicationContext()\nctx.register(CollectionConfig::class.java,\
  \ CollectingBean::class.java)\nctx.refresh()\nval collectingBean = ctx.getBean(CollectingBean::class.java)\n\
  collectingBean.printCollections()\n}\n}\n@Component\ninternal class CollectingBean\
  \ {\n@Autowired\n@Qualifier(\"list\")\nvar songListResource:List? = null\n@Autowired\n\
  var songList:List? = null\n@Autowired\nvar songSet: Set? = null\n@Autowired\n@Qualifier(\"\
  set\")\nvar songSetResource:Set? = null\n@Autowired\nvar songMap: Map? = null\n\
  @Autowired\n@Qualifier(\"map\")\nvar songMapResource:Map? = null\n@Autowired\nvar\
  \ props: Properties? = null\nfun printCollections() {\nprintln(\"-- list injected\
  \ using @Autowired -- \")\nsongList!!.forEach(Consumer { s: Song -> println(s.title)\
  \ })\nprintln(\"\"\"-- list injected using @Resource / @Autowired @Qualifier(\\\"\
  list\\\") /\n@Inject @Named(\\\"list\\\") -- \"\"\")\nsongListResource!!.forEach(Consumer\
  \ { s: Song\n-> println(s.title) })\nprintln(\"-- set injected using @Autowired\
  \ -- -- \")\nsongSet!!.forEach(Consumer { s: Song -> println(s.title) })\nprintln(\"\
  \"\"-- set injected using @Resource / @Autowired @Qualifier(\\\"set\\\") /\n@Inject\
  \ @Named(\\\"set\\\") -- \"\"\")\nsongSetResource!!.forEach(Consumer { s: Song ->\n\
  println(s.title) })\nprintln(\"-- map injected using  @Autowired -- \")\nsongMap!!.forEach(BiConsumer\
  \ { k: String, v: Song ->\nprintln(k + \": \" + v.title) })\nprintln(\"\"\"-- map\
  \ injected using @Resource / @Autowired @Qualifier(\\\"map\\\") /\n@Inject @Named(\\\
  \"map\\\")-- \"\"\")\nsongMapResource!!.forEach(BiConsumer { k: String, v: Song\
  \ →\nprintln(k + \": \" + v.title) })\nprintln(\"-- props injected with @Autowired\
  \ -- \")\nprops!!.forEach { k: Any, v: Any -> println(\"$k: $v\") }\n}\n}\nListing\
  \ 3-29\nDemo Class for Testing Configuration Class Declaring a Bean of Type List\n\
  ```\n\n代码看起来很简单，但当我们运行它时，打印结果如下：\n\n```\nHere's to hoping\nWishing the best for\
  \ you\n```\n\n等等，什么？没错，两个额外的 `Song` bean 被添加到了一个列表中，并注入到了 `songList` 属性中，而不是我们预期的\
  \ `list` bean。这是怎么回事？你看到的行为是由 `@Autowired` 注解引起的。`@Autowired` 注解在语义上被定义为始终将数组、集合和映射视为相应\
  \ bean 的集合，目标 bean 类型由声明的集合值类型派生而来。我们的类有一个类型为 `List<Song>` 的属性，并且上面有 `@Autowired`\
  \ 注解，因此 Spring 会尝试将当前 `ApplicationContext` 中所有类型为 `Song` 的 bean 注入到这个属性中，这会导致注入意外的依赖项，或者如果未定义类型为\
  \ `Song` 的 bean，Spring 会抛出异常。\n\n因此，对于集合类型的注入，我们必须通过指定 bean 名称来明确指示 Spring 执行注入，这可以通过使用\
  \ Spring 的 `@Qualifier` 注解（位于 `org.springframework.beans.factory.annotation` 包中）来实现。之所以需要这个说明，是因为\
  \ Jakarta Inject 库中也有一个 `@Qualifier` 注解，但其用途不同。这意味着用 `@Autowired @Qualifier(\"list\"\
  )` 注解 `songList` 依赖项可以确保预期的行为。然而，还有另外三种方法可以实现：\n\n*   `@Inject @Named(\"list\")`：这两个注解都可以在\
  \ `jakarta.inject` 包中找到。`@Inject` 注解是 Jakarta 中对应 Spring 的 `@Autowired` 的注解，而 `@Named`\
  \ 注解则对应 Spring 的 `@Qualifier`。\n\n*   `@Resource(name=\"list\")`：前面提到过，这个注解可以在 `jakarta.annotation`\
  \ 包中找到，它是进行集合注入的首选方式之一，因为使用一个注解比使用两个更好。\n\n*   `@Value(\"#{collectionConfig.list}\"\
  )`：由于最好保持在 Spring 领域内，并尽可能减少应用程序的依赖项，这实际上是推荐的注入集合的方式，并且毫无疑问会注入什么。\n\n![](img/524962_1_En_3_Figm_HTML.jpg)\
  \ 一个警告标志图标。它是一个三角形，中心有一个感叹号。 上述描述的集合注入行为同样适用于 `Set` 和 `Map`，唯一的区别在于，对于 `Map`，Spring\
  \ 会注入 `{beanName,bean}` 键值对。\n\n\n\n## 使用方法注入\n\n除了构造器注入和 Setter 注入之外，Spring 提供的另一个较少使用的\
  \ DI 特性是*方法注入*。Spring 的方法注入能力包含两种松散相关的形式：查找方法注入和方法替换。查找方法注入提供了另一种机制，使 Bean 能够获取其依赖项之一。方法替换允许你任意替换\
  \ Bean 上任何方法的实现，而无需修改原始源代码。为了提供这两个特性，Spring 使用了 CGLIB 的动态字节码增强能力。CGLIB 是一个功能强大、高性能、高质量的代码生成库。它可以在运行时扩展\
  \ Java/Kotlin 类并实现接口。它是开源的，你可以在 [`https://github.com/cglib/cglib`](https://github.com/cglib/cglib)\
  \ 找到官方仓库。\n\n### 查找方法注入\n\n*查找方法注入* 是在 Spring 1.1 版本中引入的，用于解决当一个 Bean 依赖于另一个具有不同生命周期的\
  \ Bean 时所遇到的问题，特别是当单例 Bean 依赖于非单例 Bean 时。在这种情况下，Setter 注入和构造器注入都会导致单例 Bean 持有一个本应为非单例\
  \ Bean 的单一实例。在某些情况下，你会希望单例 Bean 在每次需要该依赖 Bean 时都能获取一个新的非单例实例。\n\n考虑一个场景：`LockOpener`\
  \ 类提供了打开任何储物柜的服务。`LockOpener` 类依赖于一个 `KeyHelper` 类来打开储物柜，该类被注入到 `LockOpener` 中。然而，`KeyHelper`\
  \ 类的设计涉及一些内部状态，使其不适合重用。每次调用 `openLock()` 方法时，都需要一个新的 `KeyHelper` 实例。在这种情况下，`LockOpener`\
  \ 将是一个单例。但是，如果我们使用常规机制注入 `KeyHelper` 类，那么同一个 `KeyHelper` 类的实例（即 Spring 首次执行注入时实例化的那个）将被重用。为了确保每次调用\
  \ `openLock()` 方法时都传入一个新的 `KeyHelper` 实例，我们需要使用查找方法注入。\n\n通常，你可以通过让单例 Bean 实现 `ApplicationContextAware`\
  \ 接口（我们将在**第** **4** 章讨论此接口）来实现这一点。然后，使用 `ApplicationContext` 实例，单例 Bean 可以在每次需要时查找非单例依赖项的新实例。查找方法注入允许单例\
  \ Bean 声明它需要一个非单例依赖项，并且每次需要与之交互时，它都会收到一个新的非单例 Bean 实例，而无需实现任何 Spring 特定的接口。\n\n\
  查找方法注入的工作原理是让你的单例 Bean 声明一个方法（即查找方法），该方法返回非单例 Bean 的一个实例。当你在应用程序中获取对单例 Bean 的引用时，你实际上接收到的是一个动态创建的子类的引用，Spring\
  \ 已经在该子类上实现了查找方法。一个典型的实现涉及将查找方法以及 Bean 类定义为抽象的。这可以防止当你忘记配置方法注入，并且直接使用带有空方法实现的 Bean\
  \ 类而不是 Spring 增强的子类时，出现任何奇怪的错误。这个主题相当复杂，最好通过示例来说明。\n\n在本例中，我们创建一个非单例 Bean 和两个实现相同接口的单例\
  \ Bean。其中一个单例 Bean 使用“传统”的 Setter 注入来获取非单例 Bean 的实例；另一个则使用方法注入。代码清单 3-30 中的代码示例描述了\
  \ `KeyHelper` 类，在本例中它是非单例 Bean 的类型，这意味着每次需要将其作为依赖项注入时，都会创建该类型的新实例。\n\n```\npackage\
  \ com.apress.prospring6.three.methodinject\nimport org.springframework.context.annotation.Scope\n\
  // 导入语句已省略\n@Component(\"keyHelper\")\n@Scope(\"prototype\")\nclass KeyHelper {\n\
  fun open(){\n}\n}\n代码清单 3-30\n非单例 Bean\n```\n\n这个类显然没什么特别之处，但它完美地服务于本示例的目的。接下来，在代码清单\
  \ 3-31 中，你可以看到 `LockOpener` 接口，该接口由两个单例 Bean 类实现。\n\n```\npackage com.apress.prospring6.three.methodinject\n\
  interface LockOpener {\nfun createKeyOpener():KeyHelper?\nfun openLock()\n}\n代码清单\
  \ 3-31\n单例 Bean 接口类型\n```\n\n\n\n该 Bean 包含两个方法：`createKeyOpener()` 和 `openLock()`。示例应用使用\
  \ `createKeyOpener()` 方法获取 `KeyHelper` 实例的引用，并在方法查找 Bean 的情况下执行实际的方法查找。`openLock()`\
  \ 是一个简单方法，它依赖 `KeyHelper` 实例来完成处理。清单 3-32 展示了 `StandardLockOpener` 类，该类使用 Setter\
  \ 注入来获取 `KeyHelper` 类的实例。\n\n```\npackage com.apress.prospring6.three.methodinject\n\
  // 导入语句已省略\n@Component(\"standardLockOpener\")\ninternal class StandardLockOpener\
  \ : LockOpener {\nvar keyOpener: KeyHelper? = null\noverride fun createKeyOpener():\
  \ KeyHelper? {\nreturn keyOpener\n}\n@Autowired\n@Qualifier(\"keyHelper\")\nfun\
  \ setKeyHelper(keyHelper: KeyHelper?) {\nkeyOpener = keyHelper\n}\noverride fun\
  \ openLock() {\nkeyOpener!!.open()\n}\n}\n清单 3-32\n使用自动装配配置的 StandardLockOpener\
  \ 类，用于获取 KeyHelper 类型的依赖\n```\n\n这段代码看起来应该很熟悉，但请注意，`openLock()` 方法使用存储的 `KeyHelper`\
  \ 实例来完成其处理。在清单 3-33 中，你可以看到 `AbstractLockOpener` 类，它使用方法注入来获取 `KeyHelper` 类的实例，并通过\
  \ `org.springframework.beans.factory.annotation.Lookup` 注解进行配置。\n\n```\npackage\
  \ com.apress.prospring6.three.methodinject\nimport org.springframework.beans.factory.annotation.Lookup\n\
  // 导入语句已省略\n@Component(\"abstractLockOpener\")\ninternal abstract class AbstractLockOpener\
  \ : LockOpener {\n@get:Lookup(\"keyHelper\")\nabstract override fun createKeyOpener():\
  \ KeyHelper?\noverride fun openLock() {\nmyKeyOpener!!.open()\n}\n}\n清单 3-33\n使用方法注入配置的\
  \ AbstractLockOpener 类，用于获取 KeyHolder 类型的依赖\n```\n\n请注意，`createKeyOpener()` 方法被声明为抽象方法，并且\
  \ `openLock()` 方法使用该方法来获取 `KeyHelper` 实例。使用本节中的 Bean 定义填充应用上下文可能需要编写比编写简单配置类更多的代码，因此在清单\
  \ 3-34 中展示了配置类。\n\n```\npackage com.apress.prospring6.three.methodinject\n// 导入语句已省略\n\
  @Configuration\n@ComponentScan\nclass LookupConfig\n清单 3-34\n本节的 Kotlin 配置类\n```\n\
  \n现在，`keyHelper` 和 `standardLockOpener` Bean 的配置对你来说应该很熟悉了。对于 `abstractLockOpener`，你需要使用\
  \ `@Lookup` 注解来配置查找方法。这告诉 Spring 它应该覆盖 Bean 上的哪个方法。该方法不能接受任何参数，并且返回类型应该是你希望从该方法返回的\
  \ Bean 的类型。在本例中，该方法应返回 `KeyHelper` 类型或其子类的实例。注解的属性值告诉 Spring 查找方法应返回哪个 Bean。清单 3-35\
  \ 展示了此示例的最后一段代码，即包含用于运行示例的 `main()` 方法的类。\n\n```\npackage com.apress.prospring6.three.methodinject\n\
  import org.springframework.util.StopWatch\n// 导入语句已省略\nobject MethodInjectionDemo\
  \ {\n@JvmStatic\nfun main(args: Array) {\nval ctx = AnnotationConfigApplicationContext(LookupConfig::class.java)\n\
  val abstractLockOpener = ctx.getBean(\"abstractLockOpener\", LockOpener::class.java)\n\
  val standardLockOpener = ctx.getBean(\"standardLockOpener\", LockOpener::class.java)\n\
  displayInfo(\"abstractLockOpener\", abstractLockOpener)\ndisplayInfo(\"standardLockOpener\"\
  , standardLockOpener)\n}\nfun displayInfo(beanName: String, lockOpener: LockOpener)\
  \ {\nval keyHelperOne = lockOpener.createKeyOpener()\nval keyHelperTwo = lockOpener.createKeyOpener()\n\
  println(\"[\" + beanName + \"]: KeyHelper 实例相同吗？ \" +\n(keyHelperOne === keyHelperTwo))\n\
  val stopWatch = StopWatch()\nstopWatch.start(\"lookupDemo\")\nfor (x in 0..100000\
  \ - 1) {\nval keyHelper = lockOpener.createKeyOpener()\nkeyHelper!!.open()\n}\n\
  stopWatch.stop()\nprintln(\"100000 次获取耗时 \" + stopWatch.totalTimeMillis + \" ms\"\
  )\n}\n}\n清单 3-35\n用于测试方法注入的主类\n```\n\n在这段代码中，你可以看到从 `AnnotationConfigApplicationContext`\
  \ 中检索了 `abstractLockOpener` 和 `standardLockOpener`，并将每个引用传递给了 `displayInfo()` 方法。仅当使用查找方法注入时，才支持实例化抽象类，此时\
  \ Spring 将使用 CGLIB 生成 `AbstractLockOpener` 类的子类，该子类会动态覆盖该方法。`displayInfo()` 方法的第一部分创建了两个\
  \ `KeyHelper` 类型的局部变量，并通过调用传递给它的 Bean 上的 `createKeyOpener()` 方法为每个变量赋值。利用这两个变量，它向控制台输出一条消息，指示这两个引用是否指向同一个对象。对于\
  \ `abstractLockOpener` Bean，每次调用 `createKeyOpener()` 都应获取一个新的 `KeyHelper` 实例，因此这两个引用不应相同。\n\
  \n对于 `standardLockOpener`，通过 Setter 注入将 `Singer` 的单个实例传递给 Bean，该实例被存储并在每次调用 `getMyKeyOpener()`\
  \ 时返回，因此这两个引用应该是相同的。\n\n![](img/524962_1_En_3_Fign_HTML.jpg) 一个信息图标。它是一个中心带有字母 i\
  \ 的圆形。 前面示例中使用的 `StopWatch` 类是 Spring 提供的一个实用工具类。当你需要执行简单的性能测试或测试应用程序时，你会发现 `StopWatch`\
  \ 非常有用。\n\n`displayInfo()` 方法的最后一部分运行一个简单的性能测试，以查看哪个 Bean 更快。显然，`standardLockOpener`\
  \ 应该更快，因为它每次都返回同一个实例，但观察差异也很有趣。现在我们可以运行 `MethodInjectionDemo` 类进行测试。以下是此示例的输出结果：\n\
  \n```\n[abstractLockOpener]: KeyHelper 实例相同吗？ false\n100000 次获取耗时 431 ms\n[standardLockOpener]:\
  \ KeyHelper 实例相同吗？ true\n100000 次获取耗时 1 ms\n```\n\n如你所见，`KeyHelper` 实例正如预期的那样，在使用\
  \ `standardLockOpener` 时相同，而在使用 `abstractLockOpener` 时不同。使用 `standardLockOpener`\
  \ 时存在明显的性能差异，但这也在意料之中。\n\n\n\n### 关于查找方法注入的注意事项\n\n查找方法注入适用于需要处理具有不同生命周期的两个 Bean\
  \ 的场景。当 Bean 共享相同生命周期时，应避免使用查找方法注入，尤其是当它们都是单例时。运行前述示例的输出显示，使用方法注入获取依赖项的新实例与使用标准\
  \ DI 获取依赖项的单个实例之间，在性能上存在显著差异。此外，即使你拥有不同生命周期的 Bean，也请确保不要不必要地使用查找方法注入。\n\n考虑这样一种情况：你有三个共享同一个依赖项的单例\
  \ Bean。你希望每个单例拥有该依赖项自己的实例，因此你将依赖项创建为非单例，但你满足于每个单例在其整个生命周期中使用该协作者的同一个实例。在这种情况下，Setter\
  \ 注入是理想的解决方案；查找方法注入只会增加不必要的开销。\n\n当你使用查找方法注入时，在构建类时应牢记一些设计准则。在前面的示例中，我们在接口中声明了查找方法。我们这样做的唯一原因是不必为两种不同的\
  \ Bean 类型重复编写 `displayInfo()` 方法。如前所述，通常你不需要用仅用于 IoC 目的的不必要定义来污染业务接口。另一点是，虽然你不必使查找方法成为抽象方法，但这样做可以防止你忘记配置查找方法，从而意外使用空实现。\n\
  \n## 理解 Bean 命名\n\nSpring 支持相当复杂的 Bean 命名结构，使你能灵活处理多种情况。每个 Bean 必须至少有一个在包含它的 `ApplicationContext`\
  \ 中唯一的名称。Spring 遵循一个简单的解析过程来确定 Bean 使用的名称。使用 XML 配置时，如果你给 `<bean>` 标签一个 `id` 属性，该属性的值将用作应用程序上下文中的唯一名称。\n\
  \n使用 Java/Kotlin 配置时，除非显式配置，否则 Spring 会使用一些策略生成 Bean 名称，这些策略将在本节中介绍。从应用程序中检索 Bean\
  \ 时，可以使用 Bean 名称或 Bean 类型，或者两者都使用。如果声明了多个相同类型但没有 ID 或名称的 Bean，Spring 将在 `ApplicationContext`\
  \ 初始化期间抛出 `org.springframework.beans.factory.NoSuchBeanDefinitionException` 异常。使用\
  \ Java/Kotlin 配置时，很难导致冲突，但这种情况仍可能发生，因此最好了解可能发生的情况。\n\n### 使用 `@Component` 声明的 Bean\
  \ 的默认命名风格\n\n为了本节的目的，配置类为 `com.apress.prospring6.three.naming` 包启用了组件扫描。我们将从声明一个非常简单的\
  \ Bean 开始，如清单 3-36 所示。\n\n```\n@Component\nclass SimpleBean { }\n清单 3-36\n最简单的 Bean\
  \ 类型\n```\n\n为了弄清楚 Spring 如何默认命名 Bean，我们基于一个包含 `SimpleBean` 类的配置创建了一个 `ApplicationContext`。该类使用\
  \ `@Component` 注解，并通过组件扫描发现。`ApplicationContext` 提供了检索 Bean 引用的方法，也提供了检索上下文中所有 Bean\
  \ 名称的方法。在清单 3-37 中，上下文中所有 Bean 的名称都使用 Logback 记录器打印到控制台。\n\n```\npackage com.apress.prospring6.three.naming\n\
  import org.springframework.context.annotation.\nAnnotationConfigApplicationContext\n\
  import org.slf4j.Logger\nimport org.slf4j.LoggerFactory\n// 其他导入语句已省略\nobject BeanNamingDemo\
  \ {\nprivate val logger: org.slf4j.Logger =\norg.slf4j.LoggerFactory.getLogger(BeanNamingDemo::class.java)\n\
  @JvmStatic\nfun main(args: Array) {\nval ctx = AnnotationConfigApplicationContext(BeanNamingCfg::class.java)\n\
  ctx.beanDefinitionNames.forEach { beanName ->\nlogger.debug(beanName)\n}\n}\n}\n\
  @Configuration\n@ComponentScan\ninternal open class BeanNamingCfg {\n}\n@Component\n\
  internal class SimpleBean\n清单 3-37\n打印所有 Bean 名称\n```\n\n控制台输出的一部分如清单 3-38 所示。\n\
  \n```\nDEBUG: BeanNamingDemo - org.springframework.context.annotation.internalConfigurationAnnotationProcessor\n\
  DEBUG: BeanNamingDemo - org.springframework.context.annotation.internalAutowiredAnnotationProcessor\n\
  DEBUG: BeanNamingDemo - org.springframework.context.annotation.internalCommonAnnotationProcessor\n\
  DEBUG: BeanNamingDemo - org.springframework.context.event.internalEventListenerProcessor\n\
  DEBUG: BeanNamingDemo - org.springframework.context.event.internalEventListenerFactory\n\
  DEBUG: BeanNamingDemo - beanNamingCfg\nDEBUG: BeanNamingDemo - simpleBean\n清单 3-38\n\
  显示上下文中所有 Bean 名称的控制台日志：输出\n```\n\n在列表中，你可以看到一些以 `org.springframework` 开头的 Bean 名称。这些是我们称之为*基础设施\
  \ Bean* 的 Bean，由 Spring 内部用于处理 Bean 定义和创建 Bean。那些明显不是 Spring 基础设施 Bean 的 Bean 是在应用程序配置中声明的\
  \ Bean。在清单 3-38 的输出中，有两个 Bean 应该会引起你的兴趣：\n\n*   `beanNamingCfg`：此 Bean 名称与配置类 `BeanNamingCfg`\
  \ 的简单名称相同。`@Configuration` 注解本身带有 `@Component` 注解，这意味着任何配置类本质上都是一个 Bean 定义。\n\n\
  *   `simpleBean`：此 Bean 名称与 Bean 类 `SimpleBean` 的简单名称相同。\n\n    ![](img/524962_1_En_3_Figo_HTML.jpg)\
  \ 一个警告警示图标。它是一个中心带有感叹号的圆形。 正如 `beanNamingCfg` 和 `simpleBean` 名称所证明的，当 Bean 名称未显式配置时，Spring\
  \ 会获取声明 Bean 的类型的简单名称，将首字母改为小写，并使用结果值来命名 Bean。\n\n\n\n### 自定义 Bean 命名风格\n\n在进一步解释如何使用\
  \ `@Bean` 声明的 Bean 如何命名之前，我们先展示一个巧妙的技巧。与 Spring 中的几乎所有功能一样，如果存在默认行为，那么它就可以被自定义。因此，Bean\
  \ 的命名也是可以自定义的。`@Configuration` 注解有一个名为 `nameGenerator` 的属性。该属性的值必须是一个实现了 `org.springframework.beans.factory.support.BeanNameGenerator`\
  \ 接口的类，或者继承自 Spring 提供的任何实现。清单 3-39 展示了 `SimpleBeanNameGenerator` 类和 `BeanNamingCfg`。\n\
  \n```\npackage com.apress.prospring6.three.generator\nimport org.springframework.beans.factory.config.BeanDefinition\n\
  import org.springframework.beans.factory.support.\nBeanDefinitionRegistry\nimport\
  \ org.springframework.context.annotation.\nAnnotationBeanNameGenerator\nimport java.util.UUID\n\
  // 其他导入语句已省略\n@Configuration\n@ComponentScan(nameGenerator = SimpleBeanNameGenerator::class)\n\
  internal open class BeanNamingCfg {\n@Bean\nopen fun anotherSimpleBean(): SimpleBean\
  \ {\nreturn SimpleBean()\n}\n}\n@Component\ninternal class SimpleBean\ninternal\
  \ class SimpleBeanNameGenerator : AnnotationBeanNameGenerator() {\noverride fun\
  \ buildDefaultBeanName(definition: BeanDefinition, registry:\nBeanDefinitionRegistry):\
  \ String {\nval beanName = definition.beanClassName\n.substring(definition.beanClassName.lastIndexOf(\"\
  .\") + 1).lowercase()\nval uid = UUID.randomUUID().toString().replace(\"-\", \"\"\
  ).substring(0, 8)\nreturn \"$beanName-$uid\"\n}\n}\n清单 3-39\n显示上下文中所有 Bean 名称的控制台日志\n\
  ```\n\n`org.springframework.context.annotation.AnnotationBeanNameGenerator` 类是用于处理带有\
  \ `@Component` 注解或其它被 `@Component` 注解的注解的 Bean 类的 `BeanNameGenerator` 实现。`SimpleBeanNameGenerator`\
  \ 继承了这个类，并重写了 `buildDefaultBeanName(..)` 方法，以返回一个由小写简单类名与唯一标识符拼接而成的 Bean 名称。当创建应用上下文并打印\
  \ Bean 名称时，输出结果与清单 3-40 所示非常相似。\n\n```\n# 基础设施 bean 名称已省略\nDEBUG: BeanNameGerneratorDemo\
  \ - beanNamingCfg\nDEBUG: BeanNameGerneratorDemo - simplebean-07f01cdc\n清单 3-40\n\
  显示上下文中所有 Bean 名称的控制台日志\n```\n\n![](img/524962_1_En_3_Figp_HTML.jpg) 一个警告提示图标。它是一个中心带有感叹号的圆形。 这里唯一需要指出的是，配置类虽然使用了\
  \ `@Configuration` 注解（该注解本身又被 `@Component` 注解），但其 Bean 名称并非由 `SimpleBeanNameGenerator`\
  \ 类生成。这是因为该类并非通过组件扫描发现的——它本身是启用组件扫描的类，并使用了自定义的 Bean 生成器，而 Spring 在处理该生成器之前就已经处理了这个配置类。\n\
  \n### 使用 `@Bean` 声明的 Bean 的命名风格\n\n我们之前提到过，由 `@Bean` 注解的方法配置的 Bean，其名称就是配置它们的方法名。展示这一点的最简单方法是修改我们之前的某个示例，并在\
  \ `BeanNamingCfg` 配置类中使用 `@Bean` 注解声明一个 `SimpleBean`。清单 3-41 描述了新的配置以及用于列出上下文中 Bean\
  \ 名称的执行代码。\n\n```\npackage com.apress.prospring6.three.naming\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext\n\
  import org.springframework.context.annotation.Bean\nimport org.springframework.context.annotation.ComponentScan\n\
  import org.springframework.context.annotation.Configuration\nimport org.springframework.stereotype.Component\n\
  import java.util.*\nimport java.util.function.Consumer\nobject BeanNamingDemo {\n\
  private val logger: org.slf4j.Logger =\norg.slf4j.LoggerFactory.getLogger(BeanNamingDemo::class.java)\n\
  @JvmStatic\nfun main(args: Array) {\nval ctx = AnnotationConfigApplicationContext(BeanNamingCfg::class.java)\n\
  ctx.beanDefinitionNames.forEach { beanName ->\nlogger.debug(beanName)\n}\n}\n}\n\
  @Configuration\n@ComponentScan\ninternal open class BeanNamingCfg {\n@Bean\nopen\
  \ fun anotherSimpleBean(): SimpleBean {\nreturn SimpleBean()\n}\n}\n@Component\n\
  internal class SimpleBean\n清单 3-41\n显示上下文中所有 Bean 名称的控制台日志\n```\n\n运行清单 3-41 中的代码会产生如清单\
  \ 3-42 所示的输出。\n\n```\n# 基础设施 bean 名称已省略\nDEBUG: BeanNamingDemo - beanNamingCfg\n\
  DEBUG: BeanNamingDemo - simpleBean\nDEBUG: BeanNamingDemo - anotherSimpleBean\n\
  清单 3-42\n显示上下文中所有 Bean 名称的控制台日志\n```\n\n如您所见，列表中有一个名为 `anotherSimpleBean` 的条目，这意味着创建了一个\
  \ `SimpleBean`，并且其名称就是创建它的方法名。\n\n只有当应用程序上下文中需要某种类型的单个 Bean 时，Bean 的默认命名才实用；但如果不是这种情况，显式命名\
  \ Bean 是唯一的选择。\n\n在清单 3-41 的代码中，两个 `SimpleBean` 是通过不同的方法配置的，因此它们的名称是通过不同的方法生成的。这意味着通过调用\
  \ `ctx.getBean(SimpleBean.class)` 来获取 `SimpleBean` 类型的 Bean 将不再按预期工作，因为该方法期望找到一个\
  \ `SimpleBean` 类型的 Bean。调用该方法将导致抛出以下异常：\n\n```\nException in thread \"main\" org.springframework.beans.factory.NoUniqueBeanDefinitionException:\n\
  No qualifying bean of type 'com.apress.prospring6.three.naming.SimpleBean' available:\n\
