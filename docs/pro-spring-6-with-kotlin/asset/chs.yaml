  \ 14-7\n\n`chapter-14` 项目的 IntelliJ IDEA 启动器\n\n一旦启动器就位，你就可以启动应用。当应用完全部署后，IntelliJ\
  \ 会尝试打开一个指向 `http://localhost:8080/ch14/home` 的网页。如果页面加载正确，你应该会看到一个类似于图 14-8 所示的页面。\n\
