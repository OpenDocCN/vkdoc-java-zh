  我们使用图片来描述此配置，因为它可能看起来有点令人困惑，我们希望确保可以轻松地看到每个 bean 注入的位置。在示例中，我们只是使用 Spring 的 DI 功能来设置我们在代码中设置的属性。唯一值得注意的点是，切入点并未声明为
  bean，而是作为设置在 `advisor` bean 上的简单 POJO，因为它不打算被共享，并且我们使用 `ProxyFactoryBean` 类来创建代理。当你使用
  `ProxyFactoryBean` 时，需要认识到的重要一点是，`ProxyFactoryBean` 声明是暴露给你的应用程序的声明，也是你在满足依赖关系时要使用的声明。底层的目标
  bean 声明是未经过通知的，因此，仅当你想要绕过 AOP 框架时才应使用此 bean，尽管通常来说，你的应用程序不应感知到 AOP 框架，因此也不应想要绕过它。出于这个原因，你应该尽可能使用匿名
  bean，以避免应用程序意外访问。


  代码清单 5-45 展示了一个简单的类，它从 `ApplicationContext` 获取两个 `Documentarist` 实例，然后为每个实例运行 `execute()`
  方法。在同一代码清单中，你还可以看到其输出。


  ```

  package com.apress.prospring6.five

