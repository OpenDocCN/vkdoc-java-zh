  \ 这样的日志消息，原因是没有为执行此方法创建事务。由于事务传播模式被设置为 `PROPAGATION_SUPPORTS`，该方法会在现有事务中执行，如果不存在现有事务，则以非事务方式执行。\n\
  \n本节介绍了一些在编写事务性应用程序时可能会用到的配置。对于特殊情况，你可能需要配置超时时间、隔离级别、针对特定异常的回滚（或不回滚）等。\n\n使用注解配置事务行为非常实用，因为事务行为可以细化到方法级别。只需注意不要混淆\
  \ Spring 的 `@Transactional` 和 Jakarta 的 `@Transactional`，因为 Jakarta 版本不支持像 Spring\
  \ 版本那样多的选项。\n\n### 回滚事务\n\n在数据库技术中，*回滚*是一种将数据库恢复到先前状态的操作。回滚对于数据库完整性至关重要，因为即使在执行了错误操作之后，它也能恢复数据库的干净副本。\n\
  \n上一节中的表 9-3 列出了四个与回滚行为相关的 `@Transactional` 属性：`rollbackFor`、`rollbackForClassName`、`noRollbackFor`\
  \ 和 `noRollbackForClassName`。它们的名称与其配置的行为高度相关。对于在同一个事务中执行多个数据库操作的方法，回滚非常重要。例如，假设我们有一个\
  \ `save(..)` 方法，它向数据库插入一个歌手，然后检索保存的记录，将其链接到一组正在保存到数据库的专辑。虽然不太现实，但假设其中一张专辑无法保存，我们希望撤销整个过程，即采用全有或全无的方法。\n\
  \n默认情况下，事务会在发生 `RuntimeException` 和 `Error` 时回滚，但不会在发生受检异常（业务异常）时回滚。这意味着，如果我们尝试两次插入同一张专辑，事务会自动回滚，因为抛出的异常是\
  \ `jakarta.persistence.PersistenceException` 类型，它是 `RuntimeException` 的子类。\n\n然而，如果我们对标题长度引入\
  \ 50 个字符的限制，并在标题超过 50 个字符时抛出一个受检异常，事务不会自动回滚。必须使用 `rollbackFor` 属性显式配置回滚。\n\n为了测试这一点，我们引入清单\
  \ 9-14 中所示的受检异常类。\n\n```\npackage com.apress.prospring6.nine.ex\nclass TitleTooLongException\
  \ : Exception {\nconstructor(message: String?) : super(message)\nconstructor(message:\
  \ String?, cause: Throwable?) : super(message, cause)\ncompanion object {\n@Serial\n\
  private val serialVersionUID = 42L\n}\n}\n清单 9-14\nTitleTooLongException 受检异常类\n\
  ```\n\n该异常由 `AlbumRepoImpl` 中的 `save(..)` 方法抛出。由于我们知道要保存一组专辑，我们还可以添加一个接受 `Set<Album>`\
  \ 参数的 `save(..)` 方法版本。此方法也可用于实现本章之前未涉及的内容：*批量写入*，即将多个保存请求分组到一个方法调用中。这两个方法如清单 9-15\
  \ 所示。\n\n```\npackage com.apress.prospring6.nine.repos\nimport com.apress.prospring6.nine.ex.TitleTooLongException\n\
  // 其他导入语句已省略\n@Repository\nclass AlbumRepoImpl : AlbumRepo {\n@PersistenceContext\n\
  private val em: EntityManager? = null\n@Value(\"#{jpaProperties.get('hibernate.jdbc.batch_size')}\"\
  )\nprivate val batchSize = 0\n@Throws(TitleTooLongException::class)\noverride fun\
  \ save(albums: Set): Set {\nval savedAlbums: MutableSet = mutableSetOf()\nvar i\
  \ = 0\nfor (a in albums) {\nsavedAlbums.add(save(a))\ni++\nif (i % batchSize ==\
  \ 0) {\n// 刷新一批插入并释放内存。\nem!!.flush()\nem.clear()\n}\n}\nreturn savedAlbums\n}\n\
  @Throws(TitleTooLongException::class)\noverride fun save(album: Album): Album {\n\
  if (50 < album.title!!.length) {\nthrow TitleTooLongException(\"标题 \" + album.title\
  \ + \" 太长！\")\n}\nreturn if (album.id == null) {\nem!!.persist(album)\nalbum\n}\
  \ else {\nem!!.merge(album)\n}\n}\n}\n清单 9-15\n抛出 TitleTooLongException 受检异常的 save(..)\
  \ 方法的两个版本\n```\n\n`save(Set<Album>)` 方法与 `AllServiceImpl` 类中的 `save(Singer)` 方法一起，在\
  \ `saveSingerWithAlbums(..)` 方法中被包装在一个事务中，如清单 9-16 所示。\n\n\n\n```\npackage com.apress.prospring6.nine.services\n\
  import com.apress.prospring6.nine.ex.TitleTooLongException\nimport org.springframework.transaction.annotation.Transactional\n\
  // 其他导入语句已省略\n@Service\n@Transactional\nclass AllServiceImpl(private val singerRepo:\
  \ SingerRepo, private val albumRepo: AlbumRepo) :\nAllService {\n@Transactional(rollbackFor\
  \ = [TitleTooLongException::class])\n@Throws(\nTitleTooLongException::class\n)\n\
  override fun saveSingerWithAlbums(s: Singer, albums: Set) {\nval singer = singerRepo.save(s)\n\
  albums.forEach{ a: Album ->\na.singer = singer\n}\nalbumRepo.save(albums)\n}\n...\n\
  }\n清单 9-16\nAllServiceImpl.saveSingerWithAlbums(..) 事务方法\n```\n\n由于此方法将多个数据库操作组合在一起，因此其执行上下文中的事务会被回滚，并且如果抛出了\
  \ `RuntimeException` 或通过 `@Transactional(rollbackFor = [TitleTooLongException::class])`\
  \ 配置的 `TitleTooLongException`，默认情况下任何部分操作都会被撤销。\n\n要测试此行为，我们需要两个测试方法。清单 9-17 中的测试方法验证了任何\
  \ `RuntimeException` 方法的默认回滚行为。在此特定场景中，我们尝试插入 *Little Girl Blue* 专辑，但该专辑已存在于数据库中，因为它是通过\
  \ `add-nina.sql` 测试设置脚本插入的。\n\n```\npackage com.apress.prospring6.nine\nimport jakarta.persistence.PersistenceException\n\
  // 其他导入语句已省略\n@Testcontainers\n@SqlMergeMode(SqlMergeMode.MergeMode.MERGE)\n@Sql(\"\
  classpath:testcontainers/drop-schema.sql\", \"classpath:testcontainers/create-schema.sql\"\
  )\n@SpringJUnitConfig(classes = [AllServiceTest.TestContainersConfig::class])\n\
  class AllServiceTest : TestContainersBase() {\n@Autowired\nvar service: AllService?\
  \ = null\n@Test\n@SqlGroup(\nSql(\nscripts = [\"classpath:testcontainers/add-nina.sql\"\
  ],\nexecutionPhase = Sql.ExecutionPhase.BEFORE_TEST_METHOD\n)\n)\n@DisplayName(\"\
  应因 PersistenceException 执行回滚\")\nfun testRollbackRuntimeUpdate() {\n// (1)\nval\
  \ singer = service!!.findByIdWithAlbums(5L)\nAssertions.assertNotNull(singer)\n\
  // (2)\nsinger!!.firstName = \"Eunice Kathleen\"\nsinger.lastName = \"Waymon\"\n\
  val album = Album()\nalbum.title = \"Little Girl Blue\"\nalbum.releaseDate = LocalDate.of(1959,\
  \ 2, 20)\nalbum.singer = singer\n// (3)\nval albums = mutableSetOf(album)\n// (4)\n\
  Assertions.assertThrows(\nPersistenceException::class.java,\n{ service!!.saveSingerWithAlbums(singer,\
  \ albums) },\n\"未抛出 PersistenceException！\"\n)\n// (5)\nval nina = service!!.findByIdWithAlbums(5L)!!\n\
  Assertions.assertAll(\"nina 未被更新\",\nExecutable { Assertions.assertNotNull(nina)\
  \ },\nExecutable {\nAssertions.assertNotEquals(\n\"Eunice Kathleen\",\nnina.firstName\n\
  )\n},\nExecutable {\nAssertions.assertNotEquals(\n\"Waymon\",\nnina.lastName\n)\n\
  }\n)\n}\n...\n}\n清单 9-17\n测试因抛出 RuntimeException 导致事务回滚的方法\n```\n\n如清单 9-17 中的注释所示，该测试方法由五个部分组成：\n\
  \n1.  通过调用 `service.findByIdWithAlbums(5L)` 从数据库中检索歌手。\n2.  更新歌手的 `firstName` 和\
  \ `lastName`。\n3.  创建一个包含 *Little Girl Blue* 专辑的集合。\n4.  调用 `service.saveSingerWithAlbums(singer,\
  \ albums)`，并测试是否抛出了 `PersistenceException`。调用此方法会触发执行该方法的事务回滚，因此更改后的歌手实例会恢复为其原始状态。\n\
  5.  通过调用 `service.findByIdWithAlbums(5L)` 从数据库中检索歌手，并测试其名字和姓氏是否保持不变。\n\n此测试应该通过，因为\
  \ `PersistenceException` 是一个 `RuntimeException`，并且如前所述，默认情况下任何 `RuntimeException`\
  \ 都会导致事务回滚。如果你确实想确认回滚已发生，可以随时检查测试方法执行的日志，查找提及事务回滚的消息。清单 9-18 显示了执行 `testRollbackRuntimeUpdate()`\
  \ 方法时在控制台打印的日志片段，其中提到了事务正在被回滚。\n\n```\nDEBUG: AbstractPlatformTransactionManager\
  \ - 正在创建新事务，名称为\n[com.apress.prospring6.nine.services.AllServiceImpl.saveSingerWithAlbums]：\n\
  PROPAGATION_REQUIRED,ISOLATION_DEFAULT,\n-com.apress.prospring6.nine.ex.TitleTooLongException\n\
  DEBUG: TransactionImpl - begin\n...\nDEBUG: SqlStatementLogger - insert into ALBUM\
  \ (VERSION, RELEASE_DATE, SINGER_ID, title) values (?, ?, ?, ?)\nWARN : Slf4JLogger\
  \ - 错误：1062-23000：键 'SINGER_ID' 的重复条目 '5-Little Girl Blue'\nDEBUG: SqlExceptionHelper\
  \ - 无法执行语句 [n/a]\njava.sql.SQLIntegrityConstraintViolationException：\n(conn=4) 键\
  \ 'SINGER_ID' 的重复条目 '5-Little Girl Blue'\nDEBUG: JdbcResourceLocalTransactionCoordinatorImpl$TransactionDriverControlImpl\
  \ - JDBC 事务标记为仅回滚（提供异常用于堆栈跟踪）\nTRACE: TransactionAspectSupport - 完成事务\n[com.apress.prospring6.nine.services.AllServiceImpl.saveSingerWithAlbums]\n\
  异常后：\njakarta.persistence.PersistenceException：\norg.hibernate.exception.ConstraintViolationException：无法执行语句\n\
  DEBUG: AbstractPlatformTransactionManager - 启动事务回滚\nDEBUG: JpaTransactionManager\
  \ - 在 EntityManager [SessionImpl(1299829127)] 上回滚 JPA 事务\nDEBUG: TransactionImpl\
  \ - rolling back\n清单 9-18\n日志输出\n```\n\n请注意，事务正在被回滚，原因是 `PersistenceException`，但在描述为执行此方法而创建的事务时，也提到了\
  \ `TitleTooLongException`。当然，这是我们引入并为其配置了回滚的受检异常。为了测试事务是否确实回滚，必须编写一个不同的测试来导致此异常被抛出。清单\
  \ 9-19 中的测试为要插入的专辑设置了一个过长的标题，从而导致抛出 `TitleTooLongException`。\n\n\n\n```\npackage\
  \ com.apress.prospring6.nine\nimport jakarta.persistence.PersistenceException\n\
  // 其他导入语句已省略\n@Testcontainers\n@SqlMergeMode(SqlMergeMode.MergeMode.MERGE)\n@Sql(\"\
  classpath:testcontainers/drop-schema.sql\", \"classpath:testcontainers/create-schema.sql\"\
  )\n@SpringJUnitConfig(classes = [AllServiceTest.TestContainersConfig::class])\n\
  class AllServiceTest : TestContainersBase() {\n@Autowired\nvar service: AllService?\
  \ = null\n@Test\n@SqlGroup(\nSql(\nscripts = [\"classpath:testcontainers/add-nina.sql\"\
  ],\nexecutionPhase = Sql.ExecutionPhase.BEFORE_TEST_METHOD\n)\n)\n@DisplayName(\"\
  应执行回滚，因为 TitleTooLongException\")\nfun testRollbackCheckedUpdate() {\nval singer\
  \ = service!!.findByIdWithAlbums(5L)\nAssertions.assertNotNull(singer)\nsinger!!.firstName\
  \ = \"Eunice Kathleen\"\nsinger.lastName = \"Waymon\"\nval album = Album()\nalbum.title\
  \ = \"\"\"\nSit there and count your fingers\nWhat can you do?\nOld girl you're\
  \ through\nSit there, count your little fingers\nUnhappy little girl blue\n\"\"\"\
  \nalbum.releaseDate = LocalDate.of(1959, 2, 20)\nalbum.singer = singer\nval albums\
  \ = mutableSetOf(album)\nAssertions.assertThrows(\nTitleTooLongException::class.java,\n\
  { service!!.saveSingerWithAlbums(singer, albums) },\n\"未抛出 TitleTooLongException！\"\
  \n)\nval nina = service!!.findByIdWithAlbums(5L)!!\nAssertions.assertAll(\"nina\
  \ 未被更新\",\nExecutable { Assertions.assertNotNull(nina) },\nExecutable {\nAssertions.assertNotEquals(\n\
  \"Eunice Kathleen\",\nnina.firstName\n)\n},\nExecutable {\nAssertions.assertNotEquals(\n\
  \"Waymon\",\nnina.lastName\n)\n}\n)\n}\n...\n}\n清单 9-19\n测试由抛出 TitleTooLongException（已检查异常）引起的事务回滚的方法\n\
  ```\n\n当执行此测试方法时，控制台日志会显示与清单 9-18 中类似的提及回滚的消息。\n\n`rollbackFor` 属性可以配置多个值，触发回滚的异常必须是配置的类型或其子类。如果需要限制仅对特定异常类型进行回滚，可以配置\
  \ `rollbackForClassName` 属性，该属性接受一个包含已检查异常完整类名的数组。\n\n`noRollbackFor` 属性的作用与 `rollbackFor`\
  \ 类似，但并非配置触发回滚的异常类型，而是用于配置不应触发回滚的已检查异常类型。`noRollbackForClassName` 属性可以配置一个包含已检查异常完整限定类名的数组，对于这些异常，不应触发回滚。\n\
  \n![](img/524962_1_En_9_Figd_HTML.jpg) 一个警告图标。圆圈内有一个感叹号。   建议在配置中使用 `rollbackFor`\
  \ 和 `noRollbackFor`，而不是 `rollbackForClassName` 和 `noRollbackForClassName`。这样做可以使配置更简洁，上下文更宽松，因为它们以类型安全的方式匹配异常类型及其子类。\n\
  \n### 使用编程式事务\n\n另一种选择是以编程方式控制事务行为。在这种情况下，我们有两种选择。第一种是将 `PlatformTransactionManager`\
  \ 的实例注入到 Bean 中，并直接与事务管理器交互。另一种选择是使用 Spring 提供的 `TransactionTemplate` 类，这可以大大简化你的工作。在本节中，我们将演示如何使用\
  \ `TransactionTemplate` 类。为简单起见，本节将实现一个新版本的 `countSingers()` 方法，该方法的事务行为通过 `TransactionTemplate`\
  \ Bean 提供。清单 9-20 展示了 `ProgrammaticTransactionCfg` 类，这是一个专门为演示编程式事务使用而引入的配置类。\n\n\
  ```\npackage com.apress.prospring6.nine.config\nimport org.springframework.beans.factory.annotation.Autowired\n\
  import org.springframework.transaction.TransactionDefinition\nimport org.springframework.transaction.support.TransactionTemplate\n\
  @Import(BasicDataSourceCfg::class)\n@Configuration\n@ComponentScan(basePackages\
  \ = [\"com.apress.prospring6.nine.repos\", \"com.apress.prospring6.nine.programmatic\"\
  ])\nopen class ProgrammaticTransactionCfg {\n@Bean\nfun transactionTemplate(): TransactionTemplate\
  \ {\nval tt = TransactionTemplate()\ntt.propagationBehavior = TransactionDefinition.PROPAGATION_REQUIRES_NEW\n\
  tt.timeout = 30\ntt.transactionManager = transactionManager()\nreturn tt\n}\n@Autowired\n\
  var dataSource: DataSource? = null\n@Bean\nopen fun transactionManager(): PlatformTransactionManager\
  \ {\nval transactionManager = JpaTransactionManager()\ntransactionManager.entityManagerFactory\
  \ = entityManagerFactory().getObject()\nreturn transactionManager\n}\n@Bean\nopen\
  \ fun jpaVendorAdapter(): JpaVendorAdapter {\nreturn HibernateJpaVendorAdapter()\n\
  }\n@Bean\nopen fun entityManagerFactory(): LocalContainerEntityManagerFactoryBean\
  \ {\nval factory = LocalContainerEntityManagerFactoryBean()\nfactory.setPersistenceProviderClass(HibernatePersistenceProvider::class.java)\n\
  factory.setPackagesToScan(\"com.apress.prospring6.nine.entities\")\nfactory.dataSource\
  \ = dataSource!!\nfactory.setJpaProperties(jpaProperties())\nfactory.jpaVendorAdapter\
  \ = jpaVendorAdapter()\nreturn factory\n}\n@Bean\nopen fun jpaProperties(): Properties\
  \ {\nval jpaProps = Properties()\njpaProps[Environment.HBM2DDL_AUTO] = \"none\"\n\
  jpaProps[Environment.FORMAT_SQL] = false\njpaProps[Environment.USE_SQL_COMMENTS]\
  \ = false\njpaProps[Environment.SHOW_SQL] = false\nreturn jpaProps\n}\n}\n清单 9-20\n\
  ProgrammaticTransactionCfg 配置类\n```\n\n定义了一个 `TransactionTemplate` Bean，它使用 `org.springframework.transaction.support.TransactionTemplate`\
  \ 类，并配置了一些事务属性。传播模式被设置为 `PROPAGATION_REQUIRES_NEW`，以便于在日志中识别关于事务的消息。`TransactionTemplate`\
  \ 采用了与其他 Spring 模板（如**第** **6** 章介绍的 `JdbcTemplate`）相同的方法。此外，由于事务管理现在不是显式进行的，因此不再需要\
  \ `@EnableTransactionManagement` 注解。使用此配置后，`countSingers()` 方法的实现将变为清单 9-21 所示。\n\
  \n```\npackage com.apress.prospring6.nine.programmatic\nimport com.apress.prospring6.nine.repos.SingerRepo\n\
  import org.springframework.stereotype.Service\nimport org.springframework.transaction.support.TransactionTemplate\n\
  @Service\nclass ProgrammaticServiceImpl(\nprivate val singerRepo: SingerRepo,\n\
  private val transactionTemplate: TransactionTemplate\n) : ProgrammaticService {\n\
  override fun countSingers(): Long {\nreturn transactionTemplate.execute {\ntransactionStatus:\
  \ TransactionStatus? ->\nsingerRepo.countAllSingers() }?:0L\n}\n}\n清单 9-21\n包含 countSingers()\
  \ 方法并具有显式事务管理的 ProgrammaticServiceImpl 类\n```\n\n\n引入了一个名为 `ProgramaticServiceImpl`\
  \ 的新类，用于将此事务性服务与那些通过声明式事务配置的服务分离开来。该类声明的 Bean 需要由 Spring 注入一个 `SpringRepo` 和一个 `TransactionTemplate`\
  \ Bean。\n\n`singRepo.countAllSingers()` 方法作为参数传递给 `TransactionTemplate.execute(..)`\
  \ 方法，并被封装在一个实现 `TransactionCallback<T>` 接口的内部类声明中。然后，`doInTransaction()` 是调用实际 `singRepo.countAllSingers()`\
  \ 的方法。该逻辑在事务内运行，其属性由 `transactionTemplate` Bean 定义。你在清单 9-21 中没有清晰看到所有这些内容的原因，是因为使用了\
  \ lambda 表达式。清单 9-16 中的代码是清单 9-22 所示方法的未展开版本。\n\n```\npackage org.springframework.transaction.support.TransactionCallback\n\
  override fun countSingers():Long {\nreturn transactionTemplate.execute(object :\
  \ TransactionCallback {\noverride  fun doInTransaction( status:TransactionStatus\
  \ ):Long {\nreturn singerRepo.countAllSingers();\n}\n})\n}\n清单 9-22\ncountSingers()\
  \ 方法的展开版本\n```\n\n测试此方法与到目前为止我们所展示的方法并无不同，但需要指出的是在执行日志中要关注什么。清单 9-23 展示了测试方法（省略了所有必要的设置）以及执行日志中最有趣的行。\n\
  \n```\n@Test\n@DisplayName(\"should count singers\")\nfun testCount() {\nvar count\
  \ = service.countSingers()\nassertEquals(3, count )\n}\n//------ execution log ----\n\
  DEBUG: AbstractPlatformTransactionManager - Creating new transaction with name [null]:\
  \ PROPAGATION_REQUIRES_NEW,ISOLATION_DEFAULT,timeout_30\nDEBUG: TransactionImpl\
  \ - begin\nDEBUG: SqlStatementLogger - select count(singer0_.ID) as col_0_0_ from\
  \ SINGER singer0_\n...\nDEBUG: AbstractPlatformTransactionManager - Initiating transaction\
  \ commit\nDEBUG: JpaTransactionManager - Committing JPA transaction on EntityManager\
  \ [SessionImpl(981307724)]\nDEBUG: TransactionImpl - committing\nDEBUG: JpaTransactionManager\
  \ - Closing JPA EntityManager [SessionImpl(981307724)] after transaction\n清单 9-23\n\
  countSingers() 测试方法与执行日志片段\n```\n\n这里唯一需要观察的是，由于 `transactionTemplate` Bean 不了解在事务中执行的方法的任何细节，因此它无法命名事务，所以事务名称被设置为\
  \ `null`，但日志中显示的事务属性是在 `ProgrammaticTransactionCfg` 中为 `transactionTemplate` 配置的那些属性。\n\
  \n在你的开发职业生涯中，你可能永远不会使用 `TransactionTemplate`（或其响应式对应物 `TransactionalOperator`）编写代码，仅仅是因为声明式事务更加实用，但在极少数情况下，如果你确实需要它，现在你知道它的存在以及如何使用它了。\n\
  \n### 关于事务管理的思考\n\n那么，在讨论了实现事务管理的两种方式之后，你应该使用哪一种呢？在所有情况下都推荐使用声明式方法，并且应尽可能避免在代码中显式实现事务管理。大多数情况下，当你发现有必要在应用程序中编写事务控制逻辑时，这往往是由于设计不佳，在这种情况下，你应该考虑将逻辑重构为可管理的部分，并在这些部分上声明式地定义事务需求。\n\
  \n在 Spring 中还有另一种声明式配置事务行为的方式，那就是使用 AOP XML 风格的配置。由于 XML 并非本书的重点，如果你对此主题感兴趣，可以查阅本书\
  \ Java 版本的前一版。对于声明式方法，使用 XML 和使用注解各有其优缺点。一些开发者倾向于不在代码中声明事务需求，而另一些开发者则喜欢使用注解以便于维护，因为你可以在代码中看到所有的事务需求声明。同样，让应用程序的需求来驱动你的决策，一旦你的团队或公司标准化了某种方法，就保持配置风格的一致性。\n\
  \n![](img/524962_1_En_9_Figf_HTML.gif) 关键字工具 dot i o 软件的标志。它有一个位于水平线上方的叶子符号。   在\
  \ `jakarta.transaction` 包中也有一个 `@Transactional` 注解。Spring 也支持此注解，但它提供的配置选项比 Spring\
  \ 的 `@Transactional` 要少。因此，在编写 Spring 应用程序时，请确保检查注解来自哪个包。\n\n\n\n## 使用 Spring Boot\
  \ 进行事务配置\n\n在不引入 Spring Data 的情况下，配置一个 Spring Boot 事务应用程序相当简单，因为主要依赖是 `spring-boot-starter-jdbc`，而要添加事务特定的组件，只需将\
  \ `spring-orm` 和 `hibernate-core-jakarta` 加入其中即可。图 9-5 展示了一个不使用 Spring Data 的 Spring\
  \ Boot 事务项目的配置。\n\n![](img/524962_1_En_9_Fig5_HTML.jpg)\n\n第 9 章 Spring Boot 项目的依赖列表。顶部标题为“chapter\
  \ 9 boot”。第 9 章包含任务和依赖。依赖项包括编译类路径及其后的 15 个组件、运行时类路径、测试编译类路径和测试运行时类路径。\n\n图 9-5\n\
  展示 Spring Boot 项目依赖的 Gradle 视图\n\n使用 Spring Boot 可以实现一定程度的简化配置，因为可以使用 `application.properties/application.yaml`\
  \ 文件通过多种 Spring 属性来提供配置，而无需声明 Kotlin Bean。例如，请查看清单 9-24 中 `application-dev.yaml`\
  \ 文件的内容。\n\n```\n# datasource config\nspring:\ndatasource:\ndriverClassName: org.mariadb.jdbc.Driver\n\
  url: jdbc:mariadb://localhost:3306/musicdb?useSSL=false\nusername: prospring6\n\
  password: prospring6\nhikari:\nmaximum-pool-size: 25\n# JPA config\njpa:\ngenerate-ddl:\
  \ false\nproperties:\nhibernate:\njdbc:\nbatch_size: 10\nfetch_size: 30\nmax_fetch_depth:\
  \ 3\nshow-sql: true\nformat-sql: false\nuse_sql_comments: false\nhbm2ddl:\nauto:\
  \ none\n# Logging config\nlogging:\npattern:\nconsole: \"%-5level: %class{0} - %msg%n\"\
  \nlevel:\nroot: INFO\norg.springframework.boot: INFO\ncom.apress.prospring6.nine:\
  \ INFO\n清单 9-24\nchapter09-boot 项目的 application-dev.yaml 内容\n```\n\n配置分为三个部分：`datasource`、`jpa`\
  \ 和 `logging`。以 `spring.datasource` 开头的属性设置了配置数据源所需的值：连接 URL、凭据和连接池值。以 `spring.jpa`\
  \ 开头的属性设置了描述持久化单元的值。您可以轻松识别出**第 7 章**和**第 8 章**中介绍的 Hibernate 属性。以 `logging` 开头的属性设置了日志配置的典型值，在经典应用程序中，这些值通常可以在\
  \ `logback.xml` 文件中找到。\n\n所有这些都意味着，在 Spring Boot 应用程序中，无需配置类来声明数据源 Bean，Spring 将根据配置文件中的属性自动配置它。Spring\
  \ Boot 使用 `spring.jpa` 属性来自动配置持久化层，配置了一个类型为 `HibernateJpaVendorAdapter` 的名为 `jpaVendorAdapter`\
  \ 的 Bean，一个类型为 `JpaTransactionManager` 的 transactionManager Bean，以及许多其他 Bean，包括\
  \ Hibernate 和 JPA 的属性 Bean。Spring Boot 唯一没有配置的是 `LocalSessionFactoryBean` 类型的 Bean，因此需要显式配置它。清单\
  \ 9-25 展示了包含单个 `LocalSessionFactoryBean` 类型 Bean 声明的 `TransactionalConfig` 配置。\n\
  \n```\npackage com.apress.prospring6.nine.boot\nimport org.springframework.boot.context.properties.ConfigurationProperties\n\
  // 其他导入语句已省略\n@Configuration\n@ComponentScan(basePackages = [\"com.apress.prospring6.nine.boot.repos\"\
  , \"com.apress.prospring6.nine.boot.services\"])\n@EnableTransactionManagement\n\
  open class TransactionalConfig {\n@Autowired\nvar dataSource: DataSource? = null\n\
  @Bean\n@ConfigurationProperties(\"spring.jpa.properties\")\nopen fun jpaProperties():\
  \ Properties {\nreturn Properties()\n}\n@Bean\nopen fun sessionFactory(): LocalSessionFactoryBean\
  \ {\nval sessionFactory = LocalSessionFactoryBean()\nsessionFactory.setDataSource(dataSource!!)\n\
  sessionFactory.setPackagesToScan(\"com.apress.prospring6.nine.boot.entities\")\n\
  sessionFactory.hibernateProperties = jpaProperties()\nreturn sessionFactory\n}\n\
  }\n清单 9-25\nTransactionalConfig 使用 Spring Boot 自动配置的 Bean 声明一个 LocalSessionFactoryBean\
  \ 类型的 Bean\n```\n\n由于 `LocalSessionFactoryBean` 需要一个数据源，并且需要配置 JPA 属性，我们需要访问 Spring\
  \ Boot 配置文件中的 JPA 属性值。这是通过配置一个 `java.util.Properties` 类型的 Bean 并为其添加 `@ConfigurationProperties(\"\
  spring.jpa.properties\")` 注解来实现的，该注解将 Spring Boot 配置文件中声明的属性绑定到由带注解的方法创建的 `Properties`\
  \ Bean。\n\n这就是配置 Spring Boot 事务应用程序所需的全部内容。可以创建一个 Spring Boot 测试类，并向其中添加回滚测试。然而，当运行测试类时，会发生一些奇怪的事情——清单\
  \ 9-17 中的测试方法，即测试抛出 `RuntimeException` 时回滚的方法，会失败。在图 9-6 所示的 Gradle 测试页面中，哪个测试失败一目了然。\n\
  \n![](img/524962_1_En_9_Fig6_HTML.jpg)\n\nGradle 测试页面的截图。标题为“Chapter 9 Application\
  \ Test”。下方是测试数量、失败数、忽略数和持续时间的详细信息。测试成功率为 50%。在三个选项卡中，“测试”选项卡被选中。它列出了测试、方法名称、持续时间和结果。\n\
  \n图 9-6\n显示测试失败的 Gradle 测试页面\n\n如果您查看控制台日志或单击测试名称，您将看到以下消息：\n\n```\norg.opentest4j.AssertionFailedError:\n\
  PersistenceException not thrown!\n==> Unexpected exception type thrown\n==> expected:\
  \ \nbut was: \n```\n\n那么这是怎么回事呢？为什么会抛出不同类型的异常？\n\n在**第 6 章**中，您了解了 Spring 的运行时数据访问异常层次结构。`org.springframework.dao.DataAccessException`\
  \ 的扩展（`DataIntegrityViolationException` 是其中之一）匹配特定的数据访问异常，并在访问数据库时提供有关异常真实原因的更多信息。它们包装了\
  \ Spring 以下所有层抛出的异常，因此这就是为什么 SQL 检查异常 `java.sql.SQLIntegrityConstraintViolationException`\
  \ 被包装在 `DataIntegrityViolationException` 中，而不是 `PersistenceException` 中。这在 Spring\
  \ Boot 应用程序中发生，是因为 Spring Boot 自动配置的 Bean 比开发人员可能认为的要多得多；在这种情况下，Spring Boot 通过其\
  \ `org.springframework.boot.autoconfigure.dao.PersistenceExceptionTranslationAutoConfiguration`\
  \ 配置类为持久化层自动配置了一个异常转换器。\n\n这意味着需要更新测试，以便 Spring Boot 应用程序考虑到这一点。新的测试如清单 9-26 所示。\n\
  \n\n\n```\npackage com.apress.prospring6.nine;\nimport org.springframework.dao.DataIntegrityViolationException;\n\
  // 其他导入语句已省略\n@ActiveProfiles(\"test\")\n@SqlMergeMode(SqlMergeMode.MergeMode.MERGE)\n\
  @Sql(\"classpath:testcontainers/drop-schema.sql\", \"classpath:testcontainers/create-schema.sql\"\
  )\n@SpringBootTest(classes = [Chapter9Application::class])\nopen class Chapter9ApplicationTest\
  \ {\n@Autowired\nvar service: AllService? = null\n@Test\n@SqlGroup(\nSql(\nscripts\
  \ = [\"classpath:testcontainers/add-nina.sql\"],\nexecutionPhase = Sql.ExecutionPhase.BEFORE_TEST_METHOD\n\
  ),\nSql(\nscripts = [\"classpath:testcontainers/remove-nina.sql\"],\nexecutionPhase\
  \ = Sql.ExecutionPhase.AFTER_TEST_METHOD\n)\n)\n@DisplayName(\"应因 DataIntegrityViolationException\
  \ 执行回滚\")\nopen fun testRollbackRuntimeUpdate() {\nval singer = service!!.findByIdWithAlbums(5L)\n\
  Assertions.assertNotNull(singer)\nsinger!!.firstName = \"Eunice Kathleen\"\nsinger.lastName\
  \ = \"Waymon\"\nval album = Album()\nalbum.title = \"Little Girl Blue\"\nalbum.releaseDate\
  \ = LocalDate.of(1959, 2, 20)\nalbum.singer = singer\nval albums = mutableSetOf(album)\n\
  Assertions.assertThrows(\nDataIntegrityViolationException::class.java,\n{ service!!.saveSingerWithAlbums(singer,\
  \ albums) },\n\"未抛出 PersistenceException！\"\n)\nval nina = service!!.findByIdWithAlbums(5L)!!\n\
  Assertions.assertAll(\"nina 未被更新\",\nExecutable { Assertions.assertNotNull(nina)\
  \ },\nExecutable {\nAssertions.assertNotEquals(\n\"Eunice Kathleen\",\nnina.firstName\n\
  )\n},\nExecutable {\nAssertions.assertNotEquals(\n\"Waymon\",\nnina.lastName\n)\n\
  }\n)\n}\n@Test\n@SqlGroup(\nSql(\nscripts = [\"classpath:testcontainers/add-nina.sql\"\
  ],\nexecutionPhase = Sql.ExecutionPhase.BEFORE_TEST_METHOD\n),\nSql(\nscripts =\
  \ [\"classpath:testcontainers/remove-nina.sql\"],\nexecutionPhase = Sql.ExecutionPhase.AFTER_TEST_METHOD\n\
  )\n)\n@DisplayName(\"应因 TitleTooLongException 执行回滚\")\nopen fun testRollbackCheckedUpdate()\
  \ {\nval singer = service!!.findByIdWithAlbums(5L)\nAssertions.assertNotNull(singer)\n\
  singer!!.firstName = \"Eunice Kathleen\"\nsinger.lastName = \"Waymon\"\nval album\
  \ = Album()\nalbum.title = \"\"\"\nSit there and count your fingers\nWhat can you\
  \ do?\nOld girl you're through\nSit there, count your little fingers\nUnhappy little\
  \ girl blue\n\"\"\"\nalbum.releaseDate = LocalDate.of(1959, 2, 20)\nalbum.singer\
  \ = singer\nval albums = mutableSetOf(album)\nAssertions.assertThrows(\nTitleTooLongException::class.java,\n\
  { service!!.saveSingerWithAlbums(singer, albums) },\n\"未抛出 TitleTooLongException！\"\
  \n)\nval nina = service!!.findByIdWithAlbums(5L)!!\nAssertions.assertAll(\"nina\
  \ 未被更新\",\nExecutable { Assertions.assertNotNull(nina) },\nExecutable {\nAssertions.assertNotEquals(\n\
  \"Eunice Kathleen\",\nnina.firstName\n)\n},\nExecutable {\nAssertions.assertNotEquals(\n\
  \"Waymon\",\nnina.lastName\n)\n}\n)\n}\n}\n清单 9-26\ntestRollbackRuntimeUpdate()\
  \ 测试方法的 Spring Boot 版本\n```\n\n该测试方法检查当执行错误更新时是否抛出 `DataIntegrityViolationException`，因此该测试通过。如果你查看控制台中的执行日志，会注意到与本章前面检查\
  \ `PersistenceException` 的测试相同的消息，提及了事务回滚。\n\n### 事务性测试\n\n在**第** **4** **章**的表\
  \ 4-5 中，列出并描述了以下与事务上下文相关的测试注解：\n\n*   `@Rollback`\n\n*   `@Commit`\n\n*   `@BeforeTransaction`\n\
  \n*   `@AfterTransaction`\n\n每个注解的用途因其名称非常直观而显而易见。它们在编写事务性测试时非常有用。显然，在测试事务性服务时，无需使用\
  \ `@Transactional` 注解测试方法。你可能希望这样做来单独测试你的仓库。不过，随着 Spring Data 的引入，测试仓库并非必要，正如你将在**第**\
  \ **10** **章**中看到的那样。\n\n**测试管理的事务**与 **Spring 管理的事务**（即由 Spring 在应用程序上下文中创建，用于运行带有\
  \ `@Transactional` 注解的方法的事务）不同，也与**应用程序管理的事务**（即在应用程序中以编程方式管理的事务）不同。\n\n文本上下文基于应用程序上下文，因此\
  \ Spring 管理和应用程序管理的事务通常会参与测试管理的事务。这在运行前面章节中介绍的测试类 `AllServiceTest` 和 `ProgramaticServiceTest`\
  \ 时可以轻松看到。如果你在执行日志中查找文本 `Creating new transaction`，会注意到每个测试方法都会创建事务。这些事务是测试上下文事务，默认情况下会在测试上下文中为测试方法创建。如果某些\
  \ Spring 管理的事务声明的传播模式不是 `REQUIRED` 或 `SUPPORTS`，这可能会引发问题。\n\n使用 `@Transactional`\
  \ 注解测试方法会导致该测试在事务中运行，默认情况下，该事务会在测试完成后自动回滚。使用 `@Transactional` 注解测试类会导致该类层次结构中的每个测试方法都在事务中运行。当测试方法使用\
  \ `@Transactional` 注解时，也可以为其配置传播模式、回滚原因、隔离级别等。\n\n`@Commit` 注解是 `@Rollback(false)`\
  \ 的别名，两者都可以在类级别和方法级别使用。在类级别使用时，该行为适用于类中的所有测试方法。你可以覆盖类级别的行为，但尽量不要混用，因为测试的行为可能会变得不可预测。\n\
  \n`@BeforeTransaction` 和 `@AfterTransaction` 相当于事务方法中的 `@BeforeEach` 和 `@AfterEach`。`@BeforeTransaction`\
  \ 表示应在为通过 Spring 的 `@Transactional` 注解配置在事务中运行的测试方法启动事务之前，执行被注解的方法。`@AfterTransaction`\
  \ 注解一个方法，该方法在带有 Spring 的 `@Transactional` 注解的测试方法结束事务后执行。从 Spring 4.3 开始，这两个注解也可以用于接口的默认方法。\n\
  \n关于 Spring 事务性应用程序，目前可以说的就是这些。本章提供的信息应足以帮助你自信地配置和处理 Spring 应用程序中的事务。\n\n### 关于事务管理的考量\n\
  \n那么，在讨论了实现事务管理的各种方式之后，你应该使用哪一种呢？在所有情况下都推荐使用声明式方法，并且应尽可能避免在代码中实现事务管理。大多数情况下，当你发现有必要在应用程序中编写事务控制逻辑时，这通常是由于设计不佳，在这种情况下，你应该考虑将逻辑重构为可管理的部分，并在这些部分上声明式地定义事务需求。\n\
  \n对于声明式方法，使用 XML 和使用注解各有优缺点。一些开发者倾向于不在代码中声明事务需求，而另一些开发者则喜欢使用注解以便于维护，因为你可以在代码中看到所有的事务需求声明。同样，让应用程序需求驱动你的决策，一旦你的团队或公司标准化了某种方法，就保持配置风格的一致性。\n\
  \n\n## 摘要\n\n事务管理是确保几乎所有类型应用程序中数据完整性的关键部分。在本章中，我们讨论了如何使用 Spring 来管理事务，且几乎不影响你的源代码。\n\
  \n我们向你介绍了如何使用注解来配置声明式事务行为。同时，还展示了如何实现编程式事务行为以及如何测试事务性服务。\n\n本地事务在 JEE 应用服务器内部/外部均受支持，只需简单配置即可在\
  \ Spring 中启用本地事务支持。然而，设置全局事务环境涉及更多工作，并且很大程度上取决于你的应用程序需要与哪个 JTA 提供程序及相应的后端资源进行交互。此外，未来似乎所有微服务都将在无服务器环境中运行，届时全局事务将不再具有实际意义。\n\
  \n脚注 1   2   3   4   5   6   7\n\n"
- "# 10. Spring Data 与 SQL 及 NoSQL 数据库\n\n现在，你已经了解了数据访问的多个方面，例如连接数据库、使用 JDBC 执行原生查询、将表映射到实体类以便在\
  \ Kotlin 代码中将数据库记录视为对象、使用 Hibernate 会话和 `EntityManagerFactory` 创建用于数据管理的仓库类，然后在同一个\
  \ Spring 管理的事务中执行多个数据库操作。是时候向你展示如何避免编写所有这些代码，并让 Spring 使用 Spring Data 为你完成工作了。\n\
  \nSpring Data JPA 项目是 Spring Data 总项目^(⁸⁴)下的一个子项目。Spring Data 项目的主要目标是提供附加功能，以简化使用各种数据源的应用程序开发。Spring\
  \ Data 项目包含多个子项目，用于与 SQL 和 NoSQL 数据库（包括经典和响应式数据库）进行交互。它提供了强大的仓库和自定义对象映射抽象、基于配置的仓库查询生成、对透明审计的支持、扩展仓库代码的可能性，以及与\
  \ Spring MVC 控制器的轻松集成。\n\nSpring Data 提供了大量旨在简化数据访问的功能，本章将重点介绍几个方面，而不会深入探讨细节，因为那会使本书的篇幅增加一倍。\n\
  \n在本章中，我们将讨论以下内容：\n\n*   *介绍 Spring Data Java 持久化 API (JPA)*：我们将讨论 Spring Data JPA\
  \ 项目，并演示它如何帮助简化数据访问逻辑的开发。由于 JPA 适用于 SQL 数据库，代码示例中将使用 MariaDB。\n\n*   *跟踪实体变更和审计*：在数据库更新操作中，跟踪实体的创建日期或最后更新日期以及谁进行了更改是一个常见需求。此外，对于客户等关键信息，通常需要一个存储每个实体版本的历史表。我们将讨论\
  \ Spring Data JPA 和 Hibernate Envers 如何帮助简化此类逻辑的开发。\n\n*   *用于 NoSQL 数据库的 Spring\
  \ Data*：我们将讨论什么是 NoSQL 数据库，它们为何如此引人注目，它们擅长什么，以及如何通过 Spring Data 更轻松地从 Spring 应用程序访问其数据。代码示例中，我们将使用\
  \ MongoDB。\n\n*   *使用 Spring Boot 进行 Spring Data 配置*：Spring Data 使经典 Spring 应用程序中的操作更简单，但在\
  \ Spring Boot 应用程序中，配置变得更加容易，因为有一个包含大量自动配置选项的特殊启动器。\n\n除了向你介绍所有这些出色的技术之外，我们还将向你展示如何使用\
  \ Testcontainers 作为数据库访问提供程序来测试你的仓库和服务。\n\n## 介绍 Spring Data JPA\n\nSpring Data\
  \ JPA 简化了需要访问 JPA 数据源的应用程序的开发。这显然意味着 Hibernate 和 Jakarta Persistence API 组件。使用 Spring\
  \ Data JPA 的起点是将 `spring-data-jpa` 作为依赖项添加到项目中。将此依赖项添加到项目后，所有必需的 Spring 依赖项都会被添加到应用程序类路径中。剩下的唯一事情就是将\
  \ Hibernate Core Jakarta 添加到配置中，并在需要不同（更新）版本时覆盖 `jakarta.annotation-api`。在图 10-1\
  \ 中，你可以看到 `chapter10` 项目的依赖项列表，这是一个使用 Spring Data JPA 的 Spring 经典项目，如 IntelliJ IDEA\
  \ 中的 Gradle 视图所示。\n\n![](img/524962_1_En_10_Fig1_HTML.jpg)\n\n第 10 章的依赖项列表从上到下突出显示了\
  \ 4 个库，如下所示：Spring Data JPA、jakarta.annotation-api、Spring Data Commons 和 Spring\
  \ ORM。\n\n图 10-1\n\n显示 `chapter10` 项目依赖项的 Gradle 视图\n\n\n\n### 使用 Spring Data JPA\
  \ 仓库抽象进行数据库操作\n\n在之前的数据访问章节中，仓库类（用于与数据库交互的类）是由开发者显式创建的，并围绕 Hibernate 组件（`Session`、`EntityManager`）或\
  \ Spring（`JdbcTemplate`）构建。我们必须显式地配置它们，将它们注入到仓库类中，然后调用它们的各种方法来完成任务。添加事务行为也是如此；如果仓库需要支持事务，我们必须显式地在与数据库通信的方法上添加\
  \ `@Transactional` 注解。\n\nSpring Data 及其所有子项目的主要概念之一是 `Repository` 抽象，它属于 Spring\
  \ Data Commons^(⁸⁵) 项目，是依赖项之一。在 Spring Data JPA 中，仓库抽象封装了底层的 JPA `EntityManager`，并为基于\
  \ JPA 的数据访问提供了更简单的接口。这意味着您不必编写使用 `EntityManager` 访问数据的代码，除非您确实有一些 Spring Data 无法根据您的配置为您生成的**自定义查询**。\n\
  \nSpring Data 中的核心接口是 `org.springframework.data.repository.Repository<T,ID>` 接口，它是一个标记接口（注意不要将其与\
  \ `@Repository` 原型注解混淆）。Spring Data 提供了 `Repository<T, ID>` 接口的各种扩展；其中之一是 `org.springframework.data.repository.CrudRepository<T,\
  \ ID>` 接口（也属于 Spring Data Commons 项目），我们将在本节中讨论。直接扩展 `Repository<T, ID>` 或通过扩展其子接口之一的接口被称为*领域仓库*，因为它们用具体的领域对象类型替换了泛型\
  \ `T`。这些接口公开了用于管理领域对象的 CRUD 方法。\n\n在解释 `CrudRepository<T, ID>` 接口及其重要性之前，请先查看图 10-2，该图展示了\
  \ Spring `Repository<T, ID>` 接口的层次结构。\n\n![](img/524962_1_En_10_Fig2_HTML.jpg)\n\
  \n一个流程图，从下到上包含以下块：Simple JPA repository、JPA repository implementation、JPA repository、PagingAndSorting\
  \ repository 和 Repository。JPA repository 和 ListCrudRepository 指向 CrudRepository。CrudRepository\
  \ 指向 Repository。\n\n图 10-2\n\nSpring Data `Repository` 接口层次结构\n\n此时，您可能会挠头问道：*嘿，这些大多是接口，它们怎么能完成你之前提到的所有事情呢？*\
  \ 嗯，我们在这个项目中使用的是 Java 17，所以从技术上讲，默认方法可能是一个答案，但并非如此。我们使用的是 Spring，所以最简单的答案是*代理*。当您开始编写自己的仓库时，一切都会变得清晰，但在此之前，让我们回到\
  \ `CrudRepository<T, ID>` 接口。\n\n`CrudRepository<T, ID>` 接口^(⁸⁶) 在处理数据时提供了一些常用的方法。清单\
  \ 10-1 展示了一个代表该接口声明的代码片段，该片段摘自 Spring Data Commons 项目源代码。\n\n```\npackage org.springframework.data.repository;\n\
  import java.util.Optional;\n@NoRepositoryBean\npublic interface CrudRepository extends\
  \ Repository {\n    <S extends T> S save(S entity);\n    <S extends T> Iterable<S>\
  \ saveAll(Iterable<S> entities);\n    Optional<T> findById(ID id);\n    boolean\
  \ existsById(ID id);\n    Iterable<T> findAll();\n    Iterable<T> findAllById(Iterable<ID>\
  \ ids);\n    long count();\n    void deleteById(ID id);\n    void delete(T entity);\n\
  \    void deleteAllById(Iterable<? extends ID> ids);\n    void deleteAll(Iterable<?\
  \ extends T> entities);\n    void deleteAll();\n}\n清单 10-1\nCrudRepository 源代码\n\
  ```\n\n查看这个接口，您可能会认出我们之前添加到仓库接口中并在仓库类中实现的方法签名。`CrudRepository<T, ID>` 接口声明了一组您可能期望仓库类为数据访问提供的完整方法。这些名称不言自明，而且——别担心——您不必为它们提供实现！为了让您放心，让我们看一个例子。\n\
  \n![](img/524962_1_En_10_Figa_HTML.jpg) 一个圆圈内感叹号的符号。 本章中使用的实体类与第 6 章到第 9 章中使用的实体类相同。如果您需要回顾，请查阅之前的任何章节或查看之前章节的代码。如果您已经阅读了其他章节，那么像\
  \ `Singer` 和 `Album` 这样的实体类现在应该已经很熟悉了。\n\n清单 10-2 展示了一个名为 `SingerRepository` 的经典仓库接口，它只声明了几个查找方法。\n\
  \n```\npackage com.apress.prospring6.ten\nimport com.apress.prospring6.ten.entities.Singer\n\
  interface SingerRepository {\n    fun findAll():List<Singer>\n    fun findByFirstName(firstName:String):List<Singer>\n\
  \    fun findByFirstNameAndLastName(firstName:String,\n                        \
  \           lastName:String):List<Singer>\n}\n清单 10-2\n经典的 SingerRepository 接口\n\
  ```\n\n现在可以修改此接口，通过将其扩展为 `CrudRepository<T, ID>` 来将其转换为 Spring Data 领域仓库接口，如清单 10-3\
  \ 所示。\n\n```\npackage com.apress.prospring6.ten\n// 其他导入语句已省略\nimport org.springframework.data.repository.CrudRepository\n\
  interface SingerRepository : CrudRepository<Singer, Long> {\n    fun findByFirstName(firstName:String)\n\
  \    :Iterable<Singer>\n    fun findByFirstNameAndLastName(firstName:String, lastName:String)\n\
  \    :Iterable<Singer>\n}\n清单 10-3\nSpring Data 领域仓库 SingerRepository 接口\n\n请注意，我们只需要在此接口中声明两个方法，因为\
  \ `findAll()` 方法已由 `CrudRepository<T, ID>` 接口提供。`SingerRepository` 接口扩展了 `CrudRepository<T,\
  \ ID>` 接口，传入了实体类（`Singer`）和 `ID` 类型（`Long`）。\n\nSpring Data 仓库抽象的一个奇妙之处在于，当您使用常见的命名约定\
  \ `findBy{fieldName}`（例如 `findByFirstName` 和 `findByFirstNameAndLastName`）时，您无需向\
  \ Spring Data JPA 提供命名查询。相反，在运行时，Spring Data JPA 会根据方法名称和替换泛型类型的实体类为您“推断”并构建查询。例如，对于\
  \ `findByFirstName()` 方法，Spring Data JPA 会自动为您准备查询 `select s from Singer s where\
  \ s.firstName = :firstName`，并从参数中设置命名参数 `firstName`。\n\n现在我们已经声明了接口，必须创建配置来告诉 Spring\
  \ Data 在哪里可以找到这个接口。这是通过在配置类上添加 `@EnableJpaRepositories` 注解来完成的，如清单 10-4 所示。\n\n\n\
  \n```\npackage com.apress.prospring6.ten.config\nimport org.springframework.transaction.annotation.EnableTransactionManagement\n\
  import org.springframework.data.jpa.repository.config.EnableJpaRepositories\n//\
  \ 其他导入语句已省略\n@Import(BasicDataSourceCfg::class)\n@Configuration\n@EnableTransactionManagement\n\
  @ComponentScan(basePackages = [\"com.apress.prospring6.ten\"])\n@EnableJpaRepositories(\"\
  com.apress.prospring6.ten.repos\")\nopen class DataJpaCfg {\n@Autowired\nvar dataSource:\
  \ DataSource? = null\n@Bean\nopen fun transactionManager(): PlatformTransactionManager\
  \ {\nval transactionManager = JpaTransactionManager()\ntransactionManager.entityManagerFactory\
  \ = entityManagerFactory().getObject()\nreturn transactionManager\n}\n@Bean\nopen\
  \ fun entityManagerFactory(): LocalContainerEntityManagerFactoryBean {\nreturn LocalContainerEntityManagerFactoryBean().apply\
  \ {\nsetPersistenceProviderClass(HibernatePersistenceProvider::class.java)\nsetPackagesToScan(\"\
  com.apress.prospring6.ten.entities\")\ndataSource = this@DataJpaCfg.dataSource!!\n\
  setJpaProperties(jpaProperties())\njpaVendorAdapter = jpaVendorAdapter()\n}\n}\n\
  ...\n}\n清单 10-4\nSpring Data JPA 配置\n```\n\n这个类以及 `BasicDataSourceCfg` 类的完整配置在前面的数据访问章节（第\
  \ 6 章至第 9 章）中已经反复介绍过。实际上，告诉 Spring 仓库接口所在位置的唯一要求就是 `@EnableJpaRepositories(\"com.apress.prospring6.ten.repos\"\
  )`。`@EnableJpaRepositories` 注解非常强大，它允许你通过声明与 `@ComponentScan` 非常相似的配置属性，以多种方式指定多个位置。默认属性是\
  \ `basePackages`。在其他众多属性中，`namedQueriesLocation` 属性用于指定包含命名查询的属性文件的位置，`entityManagerFactoryRef`\
  \ 属性用于指定用于创建查询的 `EntityManager` Bean 的名称，而 `transactionManagerRef` 属性则用于指定用于创建仓库实例的\
  \ `TransactionManager` Bean 的名称。\n\n那么，这一切是如何工作的呢？回顾一下**第** **5** **章**，代理有两种类型：JDK\
  \ 代理（实现与目标对象相同的接口）和基于类的代理（扩展目标对象类）。Spring Data JPA 要求将仓库声明为扩展了 `Repository<T, ID>`\
  \ 或其子接口的接口。通过添加 `@EnableJpaRepositories(\"com.apress.prospring6.ten.repos\")` 配置，我们告诉\
  \ Spring 在这个包中查找这些类型的接口。对于每个接口，Spring Data 基础设施组件会注册特定于持久化技术的 `FactoryBean`，以创建适当的代理来处理查询方法的调用。\n\
  \n现在我们已经有了一个 Spring Data 领域仓库接口，以及一个告诉 Spring 其位置的配置，下一步就是创建一个事务性服务来使用我们的仓库。清单 10-5\
  \ 中所示的 `SingerServiceImpl` 类只是调用了 `SingerRepository` 实例的方法。\n\n```\npackage com.apress.prospring6.ten.service\n\
  import java.util.stream.Stream\nimport java.util.stream.StreamSupport\n// 其他导入语句已省略\n\
  @Service\n@Transactional\nclass SingerServiceImpl(private val singerRepository:\
  \ SingerRepository) : SingerService {\n@Transactional(readOnly = true)\noverride\
  \ fun findAll(): Stream {\nreturn StreamSupport.stream(singerRepository.findAll().spliterator(),\n\
  false)\n}\n@Transactional(readOnly = true)\noverride fun findByFirstName(firstName:\
  \ String): Stream {\nreturn StreamSupport.stream(\nsingerRepository.findByFirstName(firstName).spliterator(),\
  \ false\n)\n}\n@Transactional(readOnly = true)\noverride fun findByFirstNameAndLastName(firstName:\
  \ String, lastName: String): Stream {\nreturn StreamSupport.stream(\nsingerRepository.findByFirstNameAndLastName(firstName,\
  \ lastName).spliterator(),\nfalse\n)\n}\n@Transactional(propagation = Propagation.REQUIRES_NEW,\
  \ label = [\"modifying\"])\noverride fun updateFirstName(firstName: String, id:\
  \ Long): Singer {\nsingerRepository.findById(id).ifPresent { s: Singer? ->\nsingerRepository.setFirstNameFor(\n\
  firstName,\nid\n)\n}\nreturn singerRepository.findById(id).orElse(null)\n}\n@Transactional(readOnly\
  \ = true)\noverride fun findByLastName(lastName: String): Stream {\nreturn StreamSupport.stream(\n\
  singerRepository.findByLastName(lastName).spliterator(), false\n)\n}\n}\n清单 10-5\n\
  使用 Spring Data 仓库实例的 SingerServiceImpl 类\n```\n\n你可以看到，我们不再需要 `EntityManager`，只需将由\
  \ Spring 基于 `SingerRepository` 接口生成的 `singerRepository` 实例注入到服务类中，Spring Data JPA\
  \ 就会为我们完成所有底层工作。在清单 10-6 中，你可以看到一个测试类，现在你应该已经对其内容很熟悉了。\n\n```\npackage com.apress.prospring6.ten\n\
  // 导入语句已省略\n@Testcontainers\n@SqlMergeMode(SqlMergeMode.MergeMode.MERGE)\n@Sql(\"\
  classpath:testcontainers/drop-schema.sql\", \"classpath:testcontainers/create-schema.sql\"\
  )\n@SpringJUnitConfig(classes = [SingerServiceTest.TestContainersConfig::class])\n\
  open class SingerServiceTest : TestContainersBase() {\n@Autowired\nvar singerService:\
  \ SingerService? = null\n@Test\nfun testFindAll() {\nval singers: List = singerService!!.findAll().peek{\
  \ s: Singer ->\nLOGGER.info(\ns.toString()\n)\n}.toList()\nAssertions.assertEquals(3,\
  \ singers.size)\n}\n@Test\nfun testFindByFirstName() {\nval singers: List = singerService!!.findByFirstName(\"\
  John\")\n.peek{ s: Singer ->\nLOGGER.info(\ns.toString()\n)\n}.toList()\nAssertions.assertEquals(2,\
  \ singers.size)\n}\n@Test\nfun testFindByFirstNameAndLastName() {\nval singers:\
  \ List = singerService!!.findByFirstNameAndLastName(\n\"John\", \"Mayer\")\n.peek{\
  \ s: Singer ->\nLOGGER.info(\ns.toString()\n)\n}.toList()\nAssertions.assertEquals(1,\
  \ singers.size)\n}\n@Configuration\n@Import(DataJpaCfg::class)\nopen class TestContainersConfig\
  \ {\n@Autowired\nvar jpaProperties: Properties? = null\n@PostConstruct\nopen fun\
  \ initialize() {\njpaProperties!![Environment.FORMAT_SQL] = true\njpaProperties!![Environment.USE_SQL_COMMENTS]\
  \ = true\njpaProperties!![Environment.SHOW_SQL] = true\njpaProperties!![Environment.STATEMENT_BATCH_SIZE]\
  \ = 30\n}\n}\ncompanion object {\nprivate val LOGGER = LoggerFactory.getLogger(SingerServiceTest::class.java)\n\
  }\n}\n清单 10-6\nSingerServiceTest 测试类\n```\n\n这个测试类没什么特别的，Testcontainers MariaDB\
  \ 容器配置被隔离到了 `TestContainersBase` 类中，以避免在此重复。运行此测试类时，所有方法都应该通过。但像往常一样，让我们将所有 Spring\
  \ 库的日志级别调高到 `TRACE`，并查看执行日志，这能让我们了解 Spring 正在做的大量工作。请查看清单 10-7 中的日志片段。\n\n\n\n```\n\
  DEBUG: RepositoryConfigurationDelegate - Scanning for JPA repositories in packages\
  \ com.apress.prospring6.ten.repos.\nTRACE: ClassPathScanningCandidateComponentProvider\
  \ - Scanning file [/../com/apress/prospring6/ten/repos/SingerRepository.class]\n\
  DEBUG: ClassPathScanningCandidateComponentProvider - Identified candidate component\
  \ class: file [/../com/apress/prospring6/ten/repos/SingerRepository.class]\nTRACE:\
  \ RepositoryConfigurationDelegate - Spring Data JPA - Registering repository: singerRepository\n\
  - Interface: com.apress.prospring6.ten.repos.SingerRepository\n- Factory: org.springframework.data.jpa.repository.support.JpaRepositoryFactoryBean\n\
  INFO : RepositoryConfigurationDelegate - Finished Spring Data repository scanning\
  \ in 37 ms. Found 1 JPA repository interfaces.\n...\nDEBUG: RepositoryFactorySupport\
  \ - Initializing repository instance for com.apress.prospring6.ten.repos.SingerRepository...\n\
  ...\nDEBUG: RepositoryFactorySupport - Finished creation of repository instance\
  \ for com.apress.prospring6.ten.repos.SingerRepository.\n...\nTRACE: TransactionAspectSupport\
  \ - Getting transaction for\n[com.apress.prospring6.ten.service.SingerServiceImpl.findAll]\n\
  TRACE: AbstractFallbackTransactionAttributeSource - Adding transactional method\n\
  'org.springframework.data.jpa.repository.support.SimpleJpaRepository.findAll'\n\
  with attribute: PROPAGATION_REQUIRED,ISOLATION_DEFAULT,readOnly\nTRACE: TransactionAspectSupport\
  \ - Getting transaction for\n[org.springframework.data.jpa.repository.support.SimpleJpaRepository.findAll]\n\
  清单 10-7\nSingerServiceTest 执行日志片段\n```\n\n请注意，配置的包 `com.apress.prospring6.ten.repos`\
  \ 及其子包是如何被扫描的，以及 `SingerRepository` 接口是如何被识别为创建仓库实例的候选对象的。\n\n这段日志的特别之处在于，它看起来像是为被调用的仓库实例方法创建了一个事务（标记为\
  \ <3> 的行）。那么这里到底发生了什么？实际上，支持代理的类是 `org.springframework.data.jpa.repository.support.SimpleJpaRepository<T,\
  \ ID>`，如果你查看 Spring 的代码^(⁸⁷)，你会注意到这个类被注解为 `@Transactional(readOnly = true)`。这就是仓库方法事务的来源。这些事务是必需的，因为任何\
  \ JPA 操作都应在事务上下文中执行；这样，在发生错误时，回滚将确保数据库保持良好状态。这显然意味着，对于仅调用单个仓库方法的服务方法，不需要额外的事务。即使配置了事务，由于默认的传播模式是\
  \ `PROPAGATION_REQUIRED`，服务方法也将在与仓库方法相同的事务中执行。\n\n在讨论更复杂的查询以及如何支持调用它们之前，我们先来谈谈 `JpaRepository<T,\
  \ ID>` 接口。\n\n### 使用 `JpaRepository`\n\n`JpaRepository<T, ID>` 接口是比 `CrudRepository<T,\
  \ ID>` 更高级的 Spring 接口，它可以使创建自定义仓库变得更加容易。`JpaRepository<T, ID>` 接口提供了批量、分页和排序操作。图\
  \ 10-3 展示了 `JpaRepository<T, ID>` 与 `CrudRepository<T, ID>` 接口之间的关系。\n\n![](img/524962_1_En_10_Fig3_HTML.jpg)\n\
  \n一个包含 6 个方框的流程图。JPA 仓库右侧通向 QueryByExampleExecutor，左侧通向 CrudRepository，顶部通向 PagingAndSortingRepository。CrudRepository\
  \ 通向 Repository。NoBeanRepository 通过虚线连接到 PagingAndSorting、Crud 和 JPA 仓库。\n\n图 10-3\n\
  \nSpring Data `JpaRepository<T, ID>` 层次结构\n\n根据应用程序的复杂程度，你可以选择使用 `CrudRepository<T,\
  \ ID>` 或 `JpaRepository<T, ID>`。从图 10-3 可以看出，`JpaRepository<T, ID>` 扩展了 `CrudRepository<T,\
  \ ID>`，因此提供了所有相同的功能。\n\n### 使用自定义查询的 Spring Data JPA\n\n在复杂的应用程序中，你可能需要 Spring 无法“推断”的自定义查询。\n\
  \n前面的章节介绍了如何使用命名查询（在实体类上使用 `@NamedQuery` 注解声明）来为查询执行提供支持，无论是使用 Hibernate `Session`\
  \ 还是 `EntityManager`。Spring Data 仓库也支持命名查询。Spring Data 尝试将开发人员声明的方法调用解析为以配置的领域类的简单名称开头、后跟方法名、并用点分隔的命名查询。这种命名查询的方式在使用\
  \ Hibernate `Session` 或 `EntityManager` 时也曾使用过，只是为了方便过渡。然而，Spring Data 的命名查询确实有一些限制；例如，不支持命名参数。作为示例，考虑一个用于选择发布日期大于\
  \ `2010-01-01` 的专辑的命名查询。清单 10-8 展示了显示命名参数查询的关键代码片段。\n\n```\npackage com.apress.prospring6.ten.entities\n\
  import jakarta.persistence.NamedQuery\n// 其他导入语句已省略\n@Entity\n@Table(name = \"ALBUM\"\
  )\n@NamedQuery(name = Album.FIND_WITH_RELEASE_DATE_GREATER_THAN, query = \"select\
  \ a from Album a where a.releaseDate > ?1\")\nclass Album : AbstractEntity() {\n\
  @Column\nvar title: String? = null\n@Column(name = \"RELEASE_DATE\")\nvar releaseDate:\
  \ LocalDate? = null\n@ManyToOne\n@JoinColumn(name = \"SINGER_ID\")\nvar singer:\
  \ Singer? = null\noverride fun equals(other: Any?): Boolean {\nif (this === other)\
  \ return true\nif (other == null || javaClass != other.javaClass) return false\n\
  val album = other as Album\nreturn if (id != null) {\nid == other.id\n} else title\
  \ == album.title && releaseDate == album.releaseDate\n}\noverride fun hashCode():\
  \ Int {\nreturn Objects.hash(title, releaseDate)\n}\noverride fun toString(): String\
  \ {\nreturn (\"Album - Id: \" + id + \", Singer id: \" + (singer?.id?:\"\")\n+ \"\
  , Title: \" + title + \", Release Date: \" + releaseDate)\n}\ncompanion object {\n\
  @Serial\nprivate val serialVersionUID = 3L\nconst val FIND_WITH_RELEASE_DATE_GREATER_THAN\
  \ =\n\"Album.findWithReleaseDateGreaterThan\"\n}\n}\n清单 10-8\n带有命名查询的 Album 实体\n\
  ```\n\n对于需要命名参数的情况，必须使用 `@Query` 注解显式定义查询。我们将使用此注解来搜索标题中包含 `The` 的所有音乐专辑。清单 10-9\
  \ 描述了 `AlbumRepository` 接口。\n\n```\npackage com.apress.prospring6.ten.repos\nimport\
  \ org.springframework.data.jpa.repository.Query\nimport org.springframework.data.repository.query.Param\n\
  // 其他导入语句已省略\ninterface AlbumRepository : JpaRepository {\nfun findBySinger(singer:\
  \ Singer): Iterable\nfun findWithReleaseDateGreaterThan(rd: LocalDate): Iterable\n\
  @Query(\"select a from Album a where a.title like %:title%\")\nfun findByTitle(@Param(\"\
  title\") t: String): Iterable\n}\n清单 10-9\n带有命名查询和 @Query 方法的 AlbumRepository\n\
  ```\n\nSpring Data 将 `findWithReleaseDateGreaterThan(..)` 方法匹配到名为 `Album.findWithReleaseDateGreaterThan`\
  \ 的查询。`findByTitle(..)` 方法的查询有一个名为 `title` 的命名参数。当命名参数的名称与使用 `@Query` 注解的方法中参数的名称相同时，则不需要\
  \ `@Param` 注解。如果方法参数具有不同的名称，则需要 `@Param` 注解来告诉 Spring 该参数的值将被注入到查询中的命名参数中。\n\n`AlbumServiceImpl`\
  \ 服务类非常简单，仅使用 `albumRepository` bean 来调用其方法，如清单 10-10 所示。\n\n\n\n```\npackage com.apress.prospring6.ten.service\n\
  import java.util.stream.Stream\nimport java.util.stream.StreamSupport\n// 其他导入语句已省略\n\
  @Service\n@Transactional(readOnly = true)\nclass AlbumServiceImpl(private val albumRepository:\
  \ AlbumRepository) :\nAlbumService {\noverride fun findBySinger(singer: Singer):\
  \ Stream {\nreturn StreamSupport.stream(albumRepository.findBySinger(singer).spliterator(),\n\
  false)\n}\noverride fun findWithReleaseDateGreaterThan(rd: LocalDate): Stream {\n\
  return StreamSupport.stream(\nalbumRepository.findWithReleaseDateGreaterThan(rd).spliterator(),\n\
  false\n)\n}\noverride fun findByTitle(title: String): Stream {\nreturn StreamSupport.stream(albumRepository.findByTitle(title).spliterator(),\n\
  false\n)\n}\n}\n清单 10-10\n调用 AlbumRepository 方法的 AlbumServiceImpl 服务\n```\n\n`findBySinger(..)`\
  \ 查询比较简单，Spring Data 能够自行解析该查询。因此，测试类不会涵盖此方法。欢迎读者自行编写该方法的测试。清单 10-11 展示了针对两个稍复杂查询的测试类。\n\
  \n```\npackage com.apress.prospring6.ten\n// 导入语句已省略\n@Testcontainers\n@Sql(\"classpath:testcontainers/drop-schema.sql\"\
  , \"classpath:testcontainers/create-schema.sql\")\n@SpringJUnitConfig(classes =\
  \ [AlbumServiceTest.TestContainersConfig::class])\nclass AlbumServiceTest : TestContainersBase()\
  \ {\n@Autowired\nvar albumService: AlbumService? = null\n@Test\nfun testFindWithReleaseDateGreaterThan()\
  \ {\nval albums: List = albumService!!\n.findWithReleaseDateGreaterThan(LocalDate.of(2010,\
  \ 1, 1))\n.peek{ s: Album ->\nLOGGER.info(\ns.toString()\n)\n}.toList()\nAssertions.assertEquals(2,\
  \ albums.size)\n}\n@Test\nfun testFindByTitle() {\nval albums: List = albumService!!\n\
  .findByTitle(\"The\")\n.peek{ s: Album ->\nLOGGER.info(\ns.toString()\n)\n}.toList()\n\
  Assertions.assertEquals(1, albums.size)\n}\n@Configuration\n@Import(DataJpaCfg::class)\n\
  open class TestContainersConfig {\n@Autowired\nvar jpaProperties: Properties? =\
  \ null\n@PostConstruct\nopen fun initialize() {\njpaProperties!![Environment.FORMAT_SQL]\
  \ = true\njpaProperties!![Environment.USE_SQL_COMMENTS] = true\njpaProperties!![Environment.SHOW_SQL]\
  \ = true\njpaProperties!![Environment.STATEMENT_BATCH_SIZE] = 30\n}\n}\ncompanion\
  \ object {\nprivate val LOGGER = LoggerFactory.getLogger(AlbumServiceTest::class.java)\n\
  }\n}\n清单 10-11\nAlbumServiceTest 类\n```\n\nSpring Data 仓库功能强大且用途广泛。例如，使用 `@Query`\
  \ 注解的方法可以通过添加 `org.springframework.data.domain.Sort` 参数来支持排序。使用 `@Query` 注解声明的查询甚至支持\
  \ SpEL 表达式。\n\n本节中的示例仅展示了读取数据的查询。修改数据的查询也需要使用 `@Modified` 注解。举例来说，我们对 `SingerRepository`\
  \ 进行了修改，添加了一个根据歌手记录 `id` 修改其名字的查询。方法声明如清单 10-12 所示。\n\n```\npackage com.apress.prospring6.ten.repos\n\
  import org.springframework.data.jpa.repository.Modifying;\n// 其他导入语句已省略\ninterface\
  \ SingerRepository : CrudRepository {\n@Modifying\nfun findByFirstName(firstName:\
  \ String): Iterable\n@Modifying(clearAutomatically = true)\n@Query(\"update Singer\
  \ s set s.firstName = ?1 where s.id = ?2\")\nfun setFirstNameFor(firstName: String,\
  \ id: Long): Int\n...\n}\n清单 10-12\n使用 @Modifying 注解的 Spring Data 查询方法\n```\n\n\
  `@Modifying` 注解设计为仅与 `@Query` 注解一起使用，单独使用没有意义。如果单独使用，Spring Data 会忽略它。\n\n`@Modifying`\
  \ 注解支持两个属性：\n\n*   `flushAutomatically`：当设置为 `true`（默认值为 `false`）时，会导致底层持久化上下文在*执行*修改查询*之前*进行刷新。\n\
  \n*   `clearAutomatically`：当设置为 `true`（默认值为 `false`）时，会导致底层持久化上下文在*执行*修改查询*之后*进行刷新。这意味着更改后的实体将在该方法执行后立即持久化到数据库中。\n\
  \n`setFirstNameFor(..)` 使用 `@Modifying(clearAutomatically = true)` 注解的原因是：在服务方法中，调用此方法执行更新操作，然后使用仓库的\
  \ `findById(id)` 方法从数据库中检索要返回的实体。由于更改会在事务结束时刷新，而我们无法控制刷新的具体时间，因此返回的实体可能不是更新后的实体。\n\
  \n为了增加趣味性，调用 `setFirstNameFor(..)` 的服务方法会返回更新后的实例，我们可以对此进行测试。服务方法如清单 10-13 所示。\n\
  \n```\npackage com.apress.prospring6.ten.service\n// 导入语句已省略\n@Service\n@Transactional\n\
  class SingerServiceImpl(private val singerRepository: SingerRepository) : SingerService\
  \ {\n@Transactional(readOnly = true)\noverride fun findAll(): Stream {\nreturn StreamSupport.stream(singerRepository.findAll().spliterator(),\n\
  false)\n}\n@Transactional(propagation = Propagation.REQUIRES_NEW, label = [\"modifying\"\
  ])\noverride fun updateFirstName(firstName: String, id: Long): Singer {\nsingerRepository.findById(id).ifPresent\
  \ { s: Singer? ->\nsingerRepository.setFirstNameFor(\nfirstName,\nid\n)\n}\nreturn\
  \ singerRepository.findById(id).orElse(null)\n}\n...\n}\n清单 10-13\n调用 @Modified\
  \ 注解的 Spring Data 查询方法的服务方法\n```\n\n测试方法如清单 10-14 所示。\n\n```\npackage com.apress.prospring6.ten\n\
  import org.springframework.test.annotation.Rollback;\n// 其他导入语句已省略\n@Testcontainers\n\
  @SqlMergeMode(SqlMergeMode.MergeMode.MERGE)\n@Sql(\"classpath:testcontainers/drop-schema.sql\"\
  ,\n\"classpath:testcontainers/create-schema.sql\")\n@SpringJUnitConfig(classes =\
  \ [SingerServiceTest.TestContainersConfig::class])\nopen class SingerServiceTest\
  \ : TestContainersBase() {\n@Autowired\nvar singerService: SingerService? = null\n\
  @Rollback\n@Test\n@SqlGroup(\nSql(\nscripts = [\"classpath:testcontainers/add-nina.sql\"\
  ],\nexecutionPhase = Sql.ExecutionPhase.BEFORE_TEST_METHOD\n)\n)\n@DisplayName(\"\
  应该更新歌手的名字\")\nfun testUpdateFirstNameByQuery() {\nval nina = singerService!!.updateFirstName(\"\
  Eunice Kathleen\", 5L)\nAssertions.assertAll(\"nina 未被更新\",\nExecutable { Assertions.assertNotNull(nina)\
  \ },\nExecutable {\nAssertions.assertEquals(\n\"Eunice Kathleen\",\nnina!!.firstName\n\
  )\n}\n)\n}\n...\n}\n清单 10-14\n针对调用 @Modified 注解的 Spring Data 查询方法的服务方法的测试方法\n```\n\
  \n![](img/524962_1_En_10_Figb_HTML.jpg) 信息符号。一个带阴影的圆圈内有一个小写字母 i。 请注意，这里没有使用 `@Sql`\
  \ 注解和删除脚本来清理上下文，而是使用了**第** **9** **章**中介绍的 `@Rollback` 注解。\n\n`@Modifying` 注解同样适用于条件删除查询。Spring\
  \ Data JPA 仓库还可以简化更多数据库操作。然而，涵盖所有内容超出了本书的范围。欢迎读者自行查阅官方文档进行深入研究^(⁸⁸)。\n\n\n\n###\
  \ 投影查询\n\n第 7 章和第 8 章已经介绍了投影查询的主题，因此本节仅展示如何使用 Spring Data JPA 配置投影查询。\n\n为了将查询结果限制为仅包含少数几个字段，我们需要一个接口，该接口为要读取的属性公开访问器方法。Spring\
  \ 支持多种有趣的方式来声明投影接口，但为简单起见，在本例中，我们将仅展示一个公开歌手名字和姓氏的接口。仓库方法和该接口均显示在清单 10-15 中。\n\n\
  ```\npackage com.apress.prospring6.ten.service\n// 导入语句已省略\ninterface SingerService\
  \ {\nfun findAll(): Stream\nfun findByFirstName(firstName: String): Stream\nfun\
  \ findByFirstNameAndLastName(firstName: String, lastName: String): Stream\nfun updateFirstName(firstName:\
  \ String, id: Long): Singer\nfun findByLastName(lastName: String): Stream\n}\n//\
  \ SingerRepository.kt\ninterface SingerRepository : CrudRepository {\n...\nfun findByLastName(lastName:\
  \ String): Iterable\ninterface FullName {\nval firstName: String\nval lastName:\
  \ String\n// 在 Java 中可以这样做，但在 Kotlin 中由于某些原因不行\n//val fullName: String\n//    get()\
  \ = \"$firstName $lastName\"\n}\n}\n清单 10-15\n投影接口与仓库方法\n```\n\n服务方法除了调用 `findByLastName(..)`\
  \ 方法外不做其他事情，而测试方法仅打印结果并测试返回单个结果的假设。两者都在本书的代码仓库中提供，此处不再列出。\n\n唯一值得关注的是仓库方法返回的对象的实际类型。由于数据库结果使用\
  \ `FullName` 接口建模，因此必须由 Spring 生成一个实现，对吗？嗯，实际上并非如此。Spring 再次创建了一个代理，该代理实现了 `FullName`\
  \ 接口，因此调用声明的方法会被转发给负责存储和返回实际值的 Spring Data 基础设施组件。通过在测试方法中设置断点，并使用 IntelliJ IDEA\
  \ 的运行时表达式求值功能检查返回集合的内容，可以轻松看到这一点。只需在代码执行暂停时右键单击源代码，在上下文菜单中选择 **Evaluate Expression**，然后输入\
  \ `singers.get(0)`。注意对象的类型，如果展开它，你将看到目标对象和已实现的接口。它看起来应该与图 10-4 中显示的内容非常相似（但请注意，在最终的\
  \ Spring Data JPA 发布时，某些类型可能会被重命名、移动等，存在这种微小可能性）。\n\n![](img/524962_1_En_10_Fig4_HTML.jpg)\n\
  \n一张截图，包含一段根据歌手姓氏查找名字的代码。高亮行显示：assertions dot assert equals (expected 1, singers\
  \ dot size)。底部一个标题为“Evaluate”的对话框包含表达式和结果。右下角有“Evaluate”和“Close”选项卡。\n\n图 10-4\n\
  检查 Spring Data 实例\n\n## 跟踪实体类的变更\n\n在大多数应用程序中，我们需要跟踪用户维护的业务数据的基本审计活动。审计信息通常包括创建数据的用户、创建日期、最后修改日期以及最后修改的用户。\n\
  \nSpring Data JPA 项目以 JPA 实体监听器的形式提供了此功能，它可以帮助你自动跟踪审计信息。要使用此功能，在 Spring 4 之前，实体类需要实现\
  \ `Auditable<U, ID, T extends TemporalAccessor>` 接口（该接口扩展了 `Persistable<ID>` 接口，属于\
  \ Spring Data Commons）^( ⁸⁹ )，或者扩展任何实现了此接口的类。清单 10-16 展示了从 Spring Data 参考文档中提取的\
  \ `Auditable` 接口。\n\n```\npackage org.springframework.data.domain;\nimport java.time.temporal.TemporalAccessor;\n\
  import java.util.Optional;\npublic interface Auditable\nextends Persistable {\n\
  Optional getCreatedBy();\nvoid setCreatedBy(U createdBy);\nOptional getCreatedDate();\n\
  void setCreatedDate(T creationDate);\nOptional getLastModifiedBy();\nvoid setLastModifiedBy(U\
  \ lastModifiedBy);\nOptional getLastModifiedDate();\nvoid setLastModifiedDate(T\
  \ lastModifiedDate);\n}\n清单 10-16\nAuditable 接口\n```\n\n从 `Auditable<U, ID, T extends\
  \ TemporalAccessor>` 接口的定义可以看出，日期类型的列被限制为扩展 `java.time.temporal.TemporalAccessor`\
  \ 的类型。从 Spring 5 开始，不再需要实现 `Auditable<U, ID, T extends TemporalAccessor>`，因为一切都可以用注解替代。\n\
  \n为了展示其工作原理，让我们在数据库模式中创建一个名为 `SINGER_AUDIT` 的新表，该表基于 `SINGER` 表，并添加了四个与审计相关的列。这些列记录了谁创建了实体、实体何时创建、最后编辑实体的用户以及编辑时间。清单\
  \ 10-17 显示了建表脚本（`AuditSchema.sql`）。\n\n```\nCREATE TABLE SINGER_AUDIT (\nID INT\
  \ NOT NULL AUTO_INCREMENT\n, FIRST_NAME VARCHAR(60) NOT NULL\n, LAST_NAME VARCHAR(40)\
  \ NOT NULL\n, BIRTH_DATE DATE\n, VERSION INT NOT NULL DEFAULT 0\n, CREATED_BY VARCHAR(20)\n\
  , CREATED_DATE TIMESTAMP\n, LAST_MODIFIED_BY VARCHAR(20)\n, LAST_MODIFIED_DATE TIMESTAMP\n\
  , UNIQUE UQ_SINGER_AUDIT_1 (FIRST_NAME, LAST_NAME)\n, PRIMARY KEY (ID)\n);\n清单 10-17\n\
  SINGER_AUDIT 表 DDL\n```\n\n这里有四个与审计相关的列。它们分别对应 `@CreatedBy`、`@CreatedDate`、`@LastModifiedBy`\
  \ 和 `@LastModifiedDate` 注解。这些注解属于 `org.springframework.data.annotation` 包。使用这些注解后，日期列的类型限制不再适用。为了保持整洁有序，项目中添加了一个名为\
  \ `AuditableEntity<U>` 的 `@MappedSuperclass` 来将审计字段组合在一起。此类如清单 10-18 所示。\n\n```\n\
  package com.apress.prospring6.ten.entities\nimport org.springframework.data.jpa.domain.support.AuditingEntityListener\n\
  import jakarta.persistence.EntityListeners\nimport org.springframework.data.annotation\n\
  // 其他导入语句已省略\n@Audited\n@MappedSuperclass\n@EntityListeners(AuditingEntityListener::class)\n\
  abstract class AuditableEntity : Serializable {\n@CreatedDate\n@Column(name = \"\
  CREATED_DATE\")\nprotected var createdDate: LocalDateTime? = null\n@CreatedBy\n\
  @Column(name = \"CREATED_BY\")\nvar createdBy: String? = null\n@LastModifiedBy\n\
  @Column(name = \"LAST_MODIFIED_BY\")\nvar lastModifiedBy: String? = null\n@LastModifiedDate\n\
  @Column(name = \"LAST_MODIFIED_DATE\")\nprotected var lastModifiedDate: LocalDateTime?\
  \ = null\ncompanion object {\n@Serial\nprivate val serialVersionUID = 8L\n}\n}\n\
  清单 10-18\nAuditableEntity 抽象类\n```\n\n\n\n`@Column` 注解应用于审计字段，用于映射到表中的实际列。`@EntityListeners(AuditingEntityListener.class)`\
  \ 注解注册了 `AuditingEntityListener`，该监听器将用于持久化上下文中所有继承此类的实体。\n\n![](img/524962_1_En_10_Figc_HTML.jpg)\
  \ 一个代表想法的符号，由电灯泡表示。 `@EntityListeners(AuditingEntityListener.class)` 注解也取代了声明 `orm.xml`\
  \ 配置文件的需要，正如 JPA 规范中所指出的。因此，无需添加以下内容：\n\n```\n\nJPA\n\n```\n\n我们应用程序中任何需要审计的类都应声明为继承\
  \ `AuditableEntity<U>` 类。因此，为了映射 `SINGER_AUDIT` 表，需要编写清单 10-19 中所示的 `SingerAudit`\
  \ 类。\n\n```\npackage com.apress.prospring6.ten.entities\n// 导入语句已省略\n@Entity\n@Audited\n\
  @Table(name = \"SINGER_AUDIT\")\nclass SingerAudit : AuditableEntity() {\n@Id\n\
  @GeneratedValue(strategy = GenerationType.IDENTITY)\n@Column(name = \"ID\")\nval\
  \ id: Long? = null\n@Version\n@Column(name = \"VERSION\")\nprivate val version =\
  \ 0\n@Column(name = \"FIRST_NAME\")\nvar firstName: String? = null\n@Column(name\
  \ = \"LAST_NAME\")\nvar lastName: String? = null\n@Column(name = \"BIRTH_DATE\"\
  )\nvar birthDate: LocalDate? = null\n...\n}\n清单 10-19\nSingerAudit 实体类\n```\n\n\
  为了管理 `SingerAudit` 类型的审计实体，应使用一个仓库接口和一个服务类。`SingerAuditRepository` 接口仅扩展了 `CrudRepository<SingerAudit,\
  \ Long>`，该接口已经声明了我们将用于 `SingerAuditService` 的所有方法，如清单 10-20 所示。\n\n```\npackage\
  \ com.apress.prospring6.ten.service\n// 导入语句已省略\ninterface SingerAuditService {\n\
  fun findAll(): Stream\nfun findById(id: Long): SingerAudit?\nfun save(singer: SingerAudit):\
  \ SingerAudit\nfun findAuditByRevision(id: Long, revision: Int): SingerAudit?\n\
  fun delete(id: Long)\n}\n清单 10-20\nSingerAuditService 接口\n```\n\n实现 `SingerAuditService`\
  \ 的 `SingerAuditServiceImpl` 类仅是在事务上下文中调用 `SingerAuditRepository` 的方法。两者都非常简单，目前无需关注。然而，要告诉\
  \ Spring 自动更新审计字段，还需要进行一些配置：必须使用 `@EnableJpaAuditing` 注解一个配置类，并且必须配置一个实现 `AuditorAware<T>`\
  \ 的 bean，如清单 10-21 所示。\n\n```\npackage com.apress.prospring6.ten.config\nimport\
  \ org.apache.commons.lang3.RandomStringUtils\nimport org.springframework.data.domain.AuditorAware\n\
  import org.springframework.data.jpa.repository.config.EnableJpaAuditing\n// 部分导入语句已省略\n\
  @EnableJpaAuditing\n@Configuration\nopen class AuditCfg {\n@Bean\nopen fun auditorProvider():\
  \ AuditorAware {\nreturn AuditorAware {\nOptional.of(\n\"prospring6-\" + RandomStringUtils.random(6,\
  \ true,true)\n)\n}\n}\n}\n清单 10-21\n用于启用自动审计支持的 Spring 配置类\n```\n\n这是一个非常简单的配置。关键在于：在生产级应用程序中，为了填充\
  \ `@CreatedBy` 和 `@LastModifiedBy` 注解的字段，其值由与 Spring Security 交互的 bean 提供。在实际情况下，这应该是一个用户信息实例，例如一个代表已登录用户的\
  \ `User` 类，该类从 `SecurityContextHolder` 中检索执行数据更新操作的用户。然而，由于该主题相当高级，将在**第** **17**\
  \ **章**中介绍，这里使用了类型为 `AuditorAware<T>` 接口的 bean，并传入类型 `String`。清单 10-21 中的 lambda\
  \ 语句可以展开为以下内容：\n\n```\nobject : AuditorAware {\noverride fun getCurrentAuditor():Optional\
  \ {\nreturn Optional.of(\"prospring6\")\n}\n}\n```\n\n在这个 `AuditorAware<String>`\
  \ 的匿名实现中，实现了 `getCurrentAuditor()` 方法。返回的值是 *prospring6* 加上一个随机生成的六字符文本。这将有助于生成不同的用户值，以便我们测试\
  \ `@CreatedBy` 和 `@LastModifiedBy` 注解字段的值是否被设置。\n\n现在配置和实现都已就绪，下一步是测试代码。为了将内容限制在各自的上下文中，我们添加了\
  \ `AuditServiceTest` 类，该类执行 `SingerAuditServiceImpl` 类中的三个服务方法，并检查对其效果的假设。测试类和方法如清单\
  \ 10-22 所示。\n\n```\npackage com.apress.prospring6.ten\n// 导入语句已省略\n@Testcontainers\n\
  @Sql(\"classpath:testcontainers/audit/drop-schema.sql\", \"classpath:testcontainers/audit/create-schema.sql\"\
  )\n@SpringJUnitConfig(classes = [AuditServiceTest.TestContainersConfig::class])\n\
  class AuditServiceTest : TestContainersBase() {\n@Autowired\nvar auditService: SingerAuditService?\
  \ = null\n@BeforeEach\nfun setUp() {\nval singer = SingerAudit().apply {\nfirstName\
  \ = \"BB\"\nlastName = \"King\"\nbirthDate = LocalDate.of(1940, 8, 16)\n}\nauditService!!.save(singer)\n\
  }\n@Test\nfun testFindById() {\nval singer = auditService!!.findAll().findFirst().orElse(null)\n\
  Assertions.assertAll(\"auditFindByIdTest\",\nExecutable { Assertions.assertNotNull(singer)\
  \ },\nExecutable {\nAssertions.assertNotNull(\nsinger.createdBy\n)\n},\nExecutable\
  \ {\nAssertions.assertNotNull(\nsinger.lastModifiedBy\n)\n}\n)\nLOGGER.info(\">>\
  \ 创建的记录: {} \", singer)\n}\n@Test\nfun testUpdate() {\nval singer = auditService!!.findAll().findFirst().orElse(null)\n\
  Assertions.assertNotNull(singer)\nsinger.firstName = \"Riley B.\"\nval updated =\
  \ auditService!!.save(singer)\nAssertions.assertAll(\"auditUpdateTest\",\nExecutable\
  \ {\nAssertions.assertEquals(\n\"Riley B.\",\nupdated.firstName\n)\n},\nExecutable\
  \ {\nAssertions.assertNotNull(\nupdated.lastModifiedBy\n)\n},\nExecutable {\nAssertions.assertNotEquals(\n\
  updated.createdBy,\nupdated.lastModifiedBy\n)\n}\n)\nLOGGER.info(\">> 更新的记录: {}\
  \ \", updated)\n}\n@Configuration\n@Import(\nDataJpaCfg::class,\nAuditCfg::class\n\
  )\nopen class TestContainersConfig {\n@Autowired\nvar jpaProperties: Properties?\
  \ = null\n@PostConstruct\nopen fun initialize() {\njpaProperties!![Environment.FORMAT_SQL]\
  \ = true\njpaProperties!![Environment.USE_SQL_COMMENTS] = true\njpaProperties!![Environment.SHOW_SQL]\
  \ = true\njpaProperties!![Environment.STATEMENT_BATCH_SIZE] = 30\n}\n}\ncompanion\
  \ object {\nprivate val LOGGER = LoggerFactory.getLogger(AuditServiceTest::class.java)\n\
  }\n}\n清单 10-22\n用于测试 SingerAuditServiceImpl 类的类\n```\n\n测试方法应该通过，并检查审计字段的值是否已填充。\n\
  \n![](img/524962_1_En_10_Figd_HTML.jpg) 一个代表想法的符号，由电灯泡表示。 这些测试方法揭示了一个重要问题：对于设计为一天内多次编辑的记录，`java.time.LocalDate`\
  \ 不是用于 `@CreatedDate` 和 `@LastModifiedDate` 注解字段的良好类型。在我们的示例中，我们使用了 `java.time.LocalDateTime`，以便更明显地看出记录已被更改。\n\
  \nJPA 审计支持需要在类路径中添加一个额外的库。Spring Data 需要 `spring-aspects` 来创建特殊的代理，这些代理会拦截实体更新，并在实体被持久化之前添加它们自己的更改。\n\
  \n\n\n## 使用 Hibernate Envers 保留实体版本\n\n在企业应用中，对于关键业务数据，通常需要保留每个实体的多个版本。例如，在客户关系管理（CRM）系统中，每次插入、更新或删除客户记录时，都应将其先前版本保存在历史表或审计表中，以满足公司的审计或其他合规要求。\n\
  \n要实现这一点，有两种常见方案。第一种是创建数据库触发器，在任何更新操作之前将更新前的记录克隆到历史表中。第二种是在数据访问层（例如，使用 AOP）开发逻辑。然而，这两种方案都有其缺点。触发器方案与数据库平台绑定，而手动实现逻辑则相当笨拙，可能影响性能，并且非常容易出错。\n\
  \nHibernate Envers^(⁹⁰)（*实体版本控制系统*的简称）是一个 Hibernate 模块，专门设计用于自动化实体的版本控制。在本节中，我们将讨论如何使用\
  \ Envers 来实现上一节介绍的 `SingerAudit` 实体的版本控制。\n\nHibernate Envers 并非 JPA 的特性。我们在此介绍它，是因为我们认为在讨论了可以与\
  \ Spring Data JPA 一起使用的一些基本审计功能之后，再来介绍它是值得的。\n\nSpring Data 为 Hibernate Envers 提供了一个名为\
  \ `spring-data-envers` 的模块。`spring-data-jpa` 模块是 Spring Data Envers 库的传递依赖。图 10-5\
  \ 展示了使用 Hibernate Envers 进行实体版本控制的 Spring Data 项目的依赖关系。\n\n![](img/524962_1_En_10_Fig5_HTML.jpg)\n\
  \n第 10 章的依赖项列表从上到下有两个高亮显示的项目，如下所示：Spring Data Envers 和 Hibernate Envers。\n\n图 10-5\n\
  \n显示 `chapter10` Envers 项目依赖项的 Gradle 视图\n\nEnvers 支持两种审计策略，如表 10-1 所示。\n\n表 10-1\n\
  \nEnvers 审计策略\n\n| 审计策略 | 描述 |\n| --- | --- |\n| `默认` | Envers 维护一个用于记录修订版本的列。每次插入或更新记录时，都会在历史表中插入一条新记录，其修订版本号从数据库序列或表中获取。\
  \ |\n| `有效性审计` | 此策略存储每条历史记录的起始和结束修订版本。每次插入或更新记录时，都会在历史表中插入一条带有起始修订版本号的新记录。同时，之前的记录会被更新，添加上结束修订版本号。还可以配置\
  \ Envers，使其将结束修订版本更新的时间戳记录到先前的历史记录中。 |\n\n在本节中，我们将演示有效性审计策略。尽管这会触发更多的数据库更新，但检索历史记录会变得更快。由于结束修订版本的时间戳也会写入历史记录，因此在查询数据时，更容易识别出特定时间点的记录快照。\n\
  \n### 为实体版本控制添加表\n\n为了支持实体版本控制，我们需要添加一些表。首先，对于每个将要进行版本控制的实体（在本例中为 `SingerAudit`\
  \ 实体类）所对应的表，我们需要创建相应的历史表。为了对 `SINGER_AUDIT` 表中的记录进行版本控制，我们创建一个名为 `SINGER_AUDIT_H`\
  \ 的历史表。清单 10-23 中的代码展示了建表脚本。\n\n```\nCREATE TABLE SINGER_AUDIT_H (\nID INT NOT NULL\
  \ AUTO_INCREMENT\n, FIRST_NAME VARCHAR(60) NOT NULL\n, LAST_NAME VARCHAR(40) NOT\
  \ NULL\n, BIRTH_DATE DATE\n, VERSION INT NOT NULL DEFAULT 0\n, CREATED_BY VARCHAR(20)\n\
  , CREATED_DATE TIMESTAMP\n, LAST_MODIFIED_BY VARCHAR(20)\n, LAST_MODIFIED_DATE TIMESTAMP\n\
  , AUDIT_REVISION INT NOT NULL\n, ACTION_TYPE INT\n, AUDIT_REVISION_END INT\n, AUDIT_REVISION_END_TS\
  \ TIMESTAMP\n, UNIQUE UQ_SINGER_AUDIT_H_1 (FIRST_NAME, LAST_NAME)\n, PRIMARY KEY\
  \ (ID, AUDIT_REVISION)\n);\n清单 10-23\n描述 SingerAudit 实体的 Hibernate 审计表的 SQL 代码 (AuditSchema.sql)\n\
  ```\n\n为了支持有效性审计策略，我们需要为每个历史表添加四个列，如清单 10-23 中高亮显示的部分。表 10-2 展示了这些列及其用途。\n\n表 10-2\n\
  \n历史记录列\n\n| 列名 | 数据类型 | 描述 |\n| --- | --- | --- |\n| `AUDIT_REVISION` | `INT` |\
  \ 历史记录的起始修订版本 |\n| `ACTION_TYPE` | `INT` | 操作类型，可能的值有：0 表示新增，1 表示修改，2 表示删除 |\n|\
  \ `AUDIT_REVISION_END` | `INT` | 历史记录的结束修订版本 |\n| `AUDIT_REVISION_END_TS` | `TIMESTAMP`\
  \ | 结束修订版本更新的时间戳 |\n\nHibernate Envers 还需要另一个表来跟踪修订版本号以及每次插入、新增、更新或删除操作创建修订版本时的时间戳。该表应命名为\
  \ `REVINFO`，并且需要向 `SINGER_AUDIT_H` 表添加一个外键，以将每个审计记录链接到其版本。其模式非常简单，如清单 10-24 所示。\n\
  \n```\nCREATE TABLE REVINFO (\nREVTSTMP BIGINT NOT NULL\n, REV INT NOT NULL AUTO_INCREMENT\n\
  , PRIMARY KEY (REVTSTMP, REV)\n);\nALTER TABLE SINGER_AUDIT_H\nADD CONSTRAINT SINGER_AUDIT_H_TO_REVISION\n\
  FOREIGN KEY ( AUDIT_REVISION ) REFERENCES REVINFO( REV);\n清单 10-24\n描述 Hibernate\
  \ 审计 REVINFO 表的 SQL 代码 (AuditSchema.sql)\n```\n\n`REV` 列用于存储每个修订版本号，当创建新的历史记录时，该列会自动递增。`REVTSTMP`\
  \ 列存储修订版本创建时的时间戳（以数字格式表示）。\n\n\n\n### 为实体版本控制配置 `EntityManagerFactory`\n\nHibernate\
  \ Envers 以 EJB 监听器的形式实现。我们可以通过在 `LocalContainerEntityManagerFactory` Bean 中设置一组特定的\
  \ Envers 属性来配置这些监听器。Kotlin 配置类与目前用于事务性 Spring 应用程序的配置类基本相同，唯一的区别在于，通过调用 `setJpaProperties(..)`\
  \ 方法，将 Envers 属性添加到 `LocalContainerEntityManagerFactoryBean` 对象上设置的 `Properties`\
  \ 对象中。在代码清单 10-25 中，你可以看到这些属性。\n\n```\npackage com.apress.prospring6.ten.config\n\
  import org.hibernate.envers.configuration.EnversSettings\nimport org.hibernate.cfg.Environment\n\
  // 其他导入语句已省略\n@Import(BasicDataSourceCfg::class)\n@Configuration\n@EnableTransactionManagement\n\
  @ComponentScan(basePackages = [\"com.apress.prospring6.ten\"])\n@EnableJpaRepositories(\"\
  com.apress.prospring6.ten.repos\")\nopen class EnversConfig {\n@Autowired\nvar dataSource:\
  \ DataSource? = null\n@Bean\nopen fun transactionManager(): PlatformTransactionManager\
  \ {\nreturn JpaTransactionManager().apply {\nentityManagerFactory = entityManagerFactory().getObject()\n\
  }\n}\n@Bean\nopen fun jpaVendorAdapter(): JpaVendorAdapter {\nreturn HibernateJpaVendorAdapter()\n\
  }\n@Bean\nopen fun entityManagerFactory(): LocalContainerEntityManagerFactoryBean\
  \ {\nreturn LocalContainerEntityManagerFactoryBean().apply {\nsetPersistenceProviderClass(HibernatePersistenceProvider::class.java)\n\
  setPackagesToScan(\"com.apress.prospring6.ten.entities\")\ndataSource = this@EnversConfig.dataSource!!\n\
  setJpaProperties(jpaProperties())\njpaVendorAdapter = jpaVendorAdapter()\n}\n}\n\
  @Bean\nopen fun jpaProperties(): Properties {\nval jpaProps = Properties()\njpaProps[Environment.HBM2DDL_AUTO]\
  \ = \"none\"\njpaProps[Environment.FORMAT_SQL] = false\njpaProps[Environment.STATEMENT_BATCH_SIZE]\
  \ = 30\njpaProps[Environment.USE_SQL_COMMENTS] = false\njpaProps[Environment.SHOW_SQL]\
  \ = false\n// Hibernate Envers 的属性\njpaProps[EnversSettings.AUDIT_TABLE_SUFFIX]\
  \ = \"_H\"\njpaProps[EnversSettings.REVISION_FIELD_NAME] = \"AUDIT_REVISION\"\n\
  jpaProps[EnversSettings.REVISION_TYPE_FIELD_NAME] = \"ACTION_TYPE\"\njpaProps[EnversSettings.AUDIT_STRATEGY]\
  \ = ValidityAuditStrategy::class.java.name\njpaProps[EnversSettings.AUDIT_STRATEGY_VALIDITY_END_REV_FIELD_NAME]\
  \ = \"AUDIT_REVISION_END\"\njpaProps[EnversSettings.AUDIT_STRATEGY_VALIDITY_STORE_REVEND_TIMESTAMP]\
  \ = \"true\"\njpaProps[EnversSettings.AUDIT_STRATEGY_VALIDITY_REVEND_TIMESTAMP_FIELD_NAME]\
  \ = \"AUDIT_REVISION_END_TS\"\nreturn jpaProps\n}\n}\n代码清单 10-25\n需要在 LocalContainerEntityManagerFactoryBean\
  \ 上设置的 Envers 属性\n```\n\n使用此配置，底层发生的情况是，审计事件监听器（实现了 `org.hibernate.envers.event.spi.EnversListener`\
  \ 接口的类型的实例）被附加到持久化事件上：添加、插入、更新和删除。这些监听器会拦截 post-insert、post-update 或 post-delete\
  \ 事件，并将实体类的更新前快照克隆到历史表中。这些监听器还会附加到那些关联更新事件（pre-collection-update、pre-collection-remove\
  \ 和 pre-collection-recreate）上，用于处理实体类关联的更新操作。Envers 能够保留关联内实体的历史记录（例如 *一对多* 或 *多对多*）。\n\
  \n这些属性在代码清单 10-25 的配置中设置，并在表 10-3 中简要说明。\n\n表 10-3\n\nEnvers 属性\n\n| 常量 | 属性名称 |\
  \ 默认值 | 描述 |\n| --- | --- | --- | --- |\n| `AUDIT_TABLE_SUFFIX` | `audit_table_prefix`\
  \ | `_AUD` | 版本化实体的表名后缀。例如，对于映射到 `SINGER_AUDIT` 表的实体类 `SingerAudit`，由于我们为该属性定义了值\
  \ `_H`，Envers 将在 `SINGER_AUDIT_H` 表中保留历史记录。 |\n| `REVISION_FIELD_NAME` | `revision_field_name`\
  \ | `REV` | 历史表中用于存储每条历史记录修订号的列。 |\n| `REVISION_TYPE_FIELD_NAME` | `revision_type_field_name`\
  \ | `REVTYPE` | 历史表中用于存储更新操作类型的列。 |\n| `AUDIT_STRATEGY` | `audit_strategy` | `org.hibernate.envers.strategy.\
  \ DefaultAuditStrategy` | 用于实体版本控制的审计策略。 |\n| `AUDIT_STRATEGY_VALIDITY_ END_REV_FIELD_NAME`\
  \ | `audit_strategy_validity_ end_rev_field_name` | `REVEND` | 历史表中用于存储每条历史记录结束修订号的列。仅在使用有效性审计策略时需要。\
  \ |\n| `AUDIT_STRATEGY_VALIDITY_ STORE_REVEND_TIMESTAMP` | `audit_strategy_validity_\
  \ store_revend_timestamp` | `false` | 指示是否在更新每条历史记录的结束修订号时存储时间戳。仅在使用有效性审计策略时需要。\
  \ |\n| `AUDIT_STRATEGY_VALIDITY_ REVEND_TIMESTAMP_FIELD_NAME` | `audit_strategy_validity_\
  \ revend_timestamp_field_name` | `REVEND_TSTMP` | 历史表中用于存储更新每条历史记录结束修订号时的时间戳的列。仅在使用有效性审计策略且前一个属性设置为\
  \ `true` 时需要。 |\n\n![](img/524962_1_En_10_Fige_HTML.jpg) 水平线上火焰的图示。 所有常量都在 `org.hibernate.envers.configuration.EnversSettings`\
  \ 接口中声明。表 10-3 中省略了接口名称，因为包含它会使表格很难在打印页面上排版^(⁹¹)。\n\n![](img/524962_1_En_10_Figf_HTML.jpg)\
  \ 水平线上火焰的图示。 第二列中的所有属性名称都以 `org.hibernate.envers` 开头。同样，为了在打印页面上容纳表 10-3，省略了此前缀。\n\
  \n![](img/524962_1_En_10_Figg_HTML.jpg) 阴影圆圈中感叹号的符号。 表 10-3 中的默认值是 Hibernate 在配置为生成数据库架构且未显式为这些属性配置任何值时使用的默认值。\n\
  \n![](img/524962_1_En_10_Figh_HTML.jpg) 一个表示想法的符号。它由一个电灯泡表示。 你可以在 Hibernate 官方文档^(⁹²)中找到\
  \ Hibernate 属性的完整列表。\n\n\n\n## 启用实体版本控制与历史记录检索\n\n要启用实体的版本控制，只需使用 Hibernate 提供的\
  \ `@Audited` 注解标注实体类即可。该注解可在类级别使用，之后所有实体字段的变更都会被审计。如果希望某些字段免于审计，请在这些字段上使用 Hibernate\
  \ Envers 的 `@NotAudited` 注解。清单 10-26 展示了使用 `@Audited` 注解及其他 Jakarta 特定注解的 `SingerAudit`\
  \ 类。\n\n```\npackage com.apress.prospring6.ten.entities\nimport org.hibernate.envers.Audited\n\
  // 其他导入语句已省略\n@Entity\n@Audited\n@Table(name = \"SINGER_AUDIT\")\nclass SingerAudit\
  \ : AuditableEntity {\n// 主体已省略\n}\n清单 10-26\n使用 Hibernate Envers @Audited 注解标注的实体类\n\
  ```\n\n实体类使用了 `@Audited` 注解，Envers 监听器会检查该注解并对更新后的实体执行版本控制。默认情况下，`Envers` 也会尝试保留关联关系的历史记录；如果希望避免这种情况，请使用\
  \ `@NotAudited` 注解。\n\n要检索历史记录，Envers 提供了 `org.hibernate.envers.AuditReader` 接口，该接口可通过\
  \ `AuditReaderFactory` 类获取。为此，在 `SingerAuditService` 接口中添加了一个名为 `findAuditByRevision()`\
  \ 的新方法，用于根据审计记录的 `id` 和修订版本号检索 `SingerAudit` 历史记录。清单 10-27 展示了 `SingerAuditServiceImpl`\
  \ 的实现。\n\n```\npackage com.apress.prospring6.ten.service\nimport jakarta.persistence.PersistenceContext\n\
  import org.hibernate.envers.AuditReaderFactory\n@Service(\"singerAuditService\"\
  )\n@Transactional\nclass SingerAuditServiceImpl(private val singerAuditRepository:\
  \ SingerAuditRepository) : SingerAuditService {\n@Transactional(readOnly = true)\n\
  ...\n@PersistenceContext\nvar entityManager:EntityManager? = null\n@Transactional(readOnly\
  \ = true)\noverride fun findAuditByRevision(id: Long, revision: Int): SingerAudit?\
  \ {\nvar auditReader = AuditReaderFactory.get(entityManager)\nreturn auditReader.find(SingerAudit::class.java,\
  \ id, revision)\n}\n}\n清单 10-27\n按修订版本号检索历史记录的服务方法\n```\n\n显然，`SingerAuditServiceImpl`\
  \ 类必须进行修改，并且必须将 `EntityManager` 注入其中，以便 `AuditReaderFactory` 能够使用它创建 `org.hibernate.envers.AuditReader`\
  \ 实例来读取审计记录。通过为 Spring Data 自定义仓库使用自定义实现，可以轻松避免这种情况，并且由于我们的重点在于 Spring，我们就采用这种方式。\n\
  \n### Spring Data 仓库的自定义实现\n\nSpring Data 提供了默认选项来处理数据库记录并以少量代码创建查询方法。然而，在某些情况下这还不够，这里介绍的\
  \ Envers 示例就是一个很好的例子。\n\n要为 Spring Data 仓库的默认功能添加自定义方法，我们需要定义一个片段接口，声明我们想要添加的行为。在我们的案例中，如清单\
  \ 10-28 所示，该接口名为 `CustomSingerAuditRepository`，并声明了一个唯一的方法，其唯一目的是使用 `id` 和修订版本号检索\
  \ `SingerAudit` 记录的旧版本。\n\n```\npackage com.apress.prospring6.ten.repos.envers\n\
  import com.apress.prospring6.ten.entities.SingerAudit\ninterface CustomSingerAuditRepository\
  \ {\nfun findAuditByIdAndRevision(id: Long, revision: Int): SingerAudit?\n}\n清单\
  \ 10-28\n声明用于检索 SingerAudit 记录版本的片段接口\n```\n\n![](img/524962_1_En_10_Figi_HTML.jpg)\
  \ 一个信息符号。由一个带阴影圆圈内的小写字母 i 表示。 相同接口的 Java 代码变体允许此方法返回 `Optional<SingerAudit>`。在 Kotlin\
  \ 中，由于其完善的空值处理机制，可以避免使用可选类型。\n\n现在我们有了一个接口，就需要提供实现。这就是清单 10-29 中展示的 `CustomSingerAuditRepositoryImpl`\
  \ 类的作用。\n\n```\npackage com.apress.prospring6.ten.repos.envers\nimport com.apress.prospring6.ten.entities.SingerAudit\n\
  import jakarta.persistence.EntityManager\nimport jakarta.persistence.PersistenceContext\n\
  import org.hibernate.envers.AuditReaderFactory\nclass CustomSingerAuditRepositoryImpl\
  \ : CustomSingerAuditRepository {\n@PersistenceContext\nprivate val entityManager:\
  \ EntityManager? = null\noverride fun findAuditByIdAndRevision(id: Long, revision:\
  \ Int): SingerAudit? {\nval auditReader = AuditReaderFactory.get(entityManager)\n\
  return auditReader.find(SingerAudit::class.java, id, revision)\n}\n}\n清单 10-29\n\
  使用 CustomSingerAuditRepository 接口\n```\n\n![](img/524962_1_En_10_Figj_HTML.jpg)\
