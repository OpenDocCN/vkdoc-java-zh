  ## 本章小结


  在本章中，我们涵盖了关于创建 Spring Restful Web 服务并通过 Spring 配置将其暴露的几个主题。涵盖的配置类型包括经典配置（应用程序打包为
  `*.war` 并部署到 Apache Tomcat 10 服务器）以及使用 Spring Boot 的配置。REST API 通过 `RestTemplate`
  和 `TestRestTemplate` 进行消费。


  本章还涵盖了为 REST 请求编写处理程序方法以及异常处理的各种方式。在下一章中，我们将讨论 Spring Native Images 以及其他一些有用的支持技术。


