  \ 方法输出\n```\n\n可以看到，ID 为 6 的歌手及其在 `ALBUM` 表中的子记录已被一同删除。\n\n## 执行原生 SQL 查询\n\nHQL\
  \ 查询易于编写，但编写跨多个表并进行复杂计算（例如金融领域常见需求）的复杂查询时，即使不是不可能，也会非常困难。通常情况下，生成的 SQL 查询效率不如由 SQL\
  \ 专家编写的原生查询。对于本书相关项目中的示例，编写 HQL 查询与编写原生 SQL 查询同样简单，但假设你需要执行原生 SQL 查询，Hibernate 会话也允许通过\
  \ `createNativeQuery(..)` 方法执行原生 SQL 查询。清单 7-28 展示了使用该方法执行相对复杂查询的示例。\n\n```\npackage\
  \ com.apress.prospring6.seven.base.dao\n// 导入语句已省略\n@Transactional\n@Repository(\"\
  singerDao\")\nclass SingerDaoImpl(private val sessionFactory: SessionFactory) :\
  \ SingerDao {\n@Transactional(readOnly = true)\noverride fun findAllDetails(firstName:\
  \ String?, lastName: String?): Singer? {\nval results = sessionFactory.currentSession\n\
  .createNativeQuery(\nALL_SELECT,\nTuple::class.java\n)\n.setParameter(\"firstName\"\
  , firstName)\n.setParameter(\"lastName\", lastName)\n.list()\nval singer = Singer()\n\
  for (item in results) {\nif (singer.firstName == null && singer.lastName == null)\
  \ {\nsinger.firstName = (item[\"FIRST_NAME\"] as String)\nsinger.lastName = (item[\"\
  LAST_NAME\"] as String)\n}\nval album = Album()\nalbum.title = (item[\"TITLE\"]\
  \ as String)\nalbum.releaseDate = ((item[\"RELEASE_DATE\"] as Date).toLocalDate())\n\
  singer.addAlbum(album)\nval instrument = Instrument()\ninstrument.instrumentId =\
  \ (item[\"INSTRUMENT_ID\"] as String)\nsinger.instruments.add(instrument)\n}\nreturn\
  \ singer\n}\ncompanion object {\nprivate val LOGGER = LoggerFactory.getLogger(SingerDaoImpl::class.java)\n\
  private val ALL_SELECT: String = \"\"\"\nselect distinct s.FIRST_NAME, s.LAST_NAME,\
  \ a.TITLE, a.RELEASE_DATE,\ni.INSTRUMENT_ID\nfrom SINGER s\ninner join ALBUM a on\
  \ s.id = a.SINGER_ID\ninner join SINGER_INSTRUMENT si on s.ID = si.SINGER_ID\ninner\
  \ join INSTRUMENT i on si.INSTRUMENT_ID = i.INSTRUMENT_ID\nwhere s.FIRST_NAME =\
  \ :firstName and s.LAST_NAME= :lastName\n\"\"\"\n}\n}\n清单 7-28\n执行原生 SQL 查询的 SingerDaoImpl.findAllDetails()\
  \ 方法\n```\n\n当 `ALL_SELECT` SQL 查询使用命名参数时，这些参数的值通过调用 `setParameter(..)` 方法提供，该方法作用于\
  \ `createNativeQuery(..)` 调用返回的 `org.hibernate.query.NativeQuery` 实例。对于 Hibernate\
  \ 原生 SQL 查询，该方法返回的实例的具体类型是 `org.hibernate.query.internal.NativeQueryImpl`。由于我们执行的是原生查询，因此失去了将数据库记录自动映射到\
  \ Kotlin 实体的好处，但为了性能提升，这是值得的。\n\n在访问和操作数据的简洁性方面，jOOQ 提供了更好的支持，但这将在本章稍后展示 Hibernate\
  \ 其他有趣用途之后再进行介绍。\n\n\n\n## 使用 Hibernate 调用存储函数\n\nHibernate 提供了对调用存储过程和函数的支持。本节将演示如何使用\
  \ Hibernate Session 的 `createSQLQuery(..)` 方法，在 MariaDB 数据库中调用一个简单的存储函数。\n\n所调用的函数与第\
  \ 6 章中介绍的函数相同。其 SQL 创建代码在清单 7-29 的 `SingerDaoImpl.findFirstNameById(..)` 方法的注释中进行了描述。\n\
  \n```\npackage com.apress.prospring6.seven.base.dao;\n// 导入语句已省略\n@Repository(\"\
  singerDao\")\npublic class SingerDaoImpl implements  SingerDao {\n/*\nCREATE FUNCTION\
  \ IF NOT EXISTS\ngetFirstNameById (in_id INT) RETURNS VARCHAR(60)\nRETURN (SELECT\
  \ first_name FROM SINGER WHERE id = in_id);\n*/\n@Transactional(readOnly = true)\n\
  override fun findFirstNameById(id: Long): String? {\nval firstNameResult = AtomicReference()\n\
  sessionFactory.currentSession.doWork { connection: Connection ->\nconnection.prepareCall(\n\
  \"{ ? = call getfirstnamebyid(?) }\"\n).use { function ->\nfunction.registerOutParameter(1,\
  \ Types.VARCHAR)\nfunction.setLong(2, id)\nfunction.execute()\nfirstNameResult.set(function.getString(1))\n\
  }\n}\nreturn firstNameResult.get()\n}\n// 其他方法已省略\n}\n清单 7-29\n使用 Hibernate Session\
  \ 调用存储函数的 SingerDaoImpl.findFirstNameById() 方法\n```\n\n该存储函数简单地接受一个 ID，并返回具有该 ID\
  \ 的歌手记录的名字。`createSQLQuery(..)` 方法接受一个原生 SQL 函数调用语句作为参数，并返回一个 `org.hibernate.query.NativeQueryImpl`\
  \ 实例。函数调用需要一个参数，该参数通过调用 `set*(..)` 方法提供。该方法有一个版本使用索引设置参数，另一个版本使用名称设置参数。这个函数很简单，因此调用它的\
  \ Hibernate 代码也很简单。\n\n## 配置 Hibernate 从实体生成表\n\n在使用 Hibernate 的启动应用程序中，常见的做法是先编写实体类，然后根据其内容生成数据库表。通常，会加入像\
  \ Flyway^(⁶²) 这样的框架来可靠且轻松地管理应用程序数据库模式的不同版本，但该主题超出了本书的范围。\n\n从实体类生成数据库模式是通过使用 `Environment.HBM2DDL_AUTO/hibernate.hbm2ddl.auto`\
  \ Hibernate 属性完成的。当应用程序首次启动时，此属性值设置为 `create`；这将使 Hibernate 扫描实体，并根据使用 JPA 和 Hibernate\
  \ 注解定义的关系生成表和键（主键、外键、唯一键）。\n\n如果实体配置正确，并且生成的数据库对象完全符合预期，则应将属性值更改为 `update`。这会告诉\
  \ Hibernate 使用后续对实体所做的任何更改来更新现有数据库，并保留原始数据库以及已插入其中的任何数据。\n\n在生产应用程序中，编写在伪数据库上运行的集成测试是实用的，该伪数据库在所有测试用例执行完毕后被丢弃。通常，测试数据库是一个内存数据库，并通过将\
  \ `Environment.HBM2DDL_AUTO` 值设置为 `create-drop` 来告诉 Hibernate 创建数据库并在测试执行后丢弃它。随着\
  \ Testcontainers 的引入，此功能并非必需，但如果由于某种原因，您被禁止在运行测试的机器上安装 Docker，或者应用程序太小以至于使用 Testcontainers\
  \ 显得大材小用，那么 Hibernate 和嵌入式内存数据库可以派上用场。您可以在 Hibernate 官方文档^(⁶³)中找到 `hibernate.hbm2ddl.auto`\
  \ 属性的完整值列表。\n\n清单 7-30 展示了名为 `HibernateTestConfig` 的 Kotlin 配置类。如您所见，`Environment.HBM2DDL_AUTO/hibernate.hbm2ddl.auto`\
  \ 被设置为 `create-drop`，并且设置了一个 H2 嵌入式数据源。\n\n```\npackage com.apress.prospring6.seven.config\n\
  import org.hibernate.SessionFactory\nimport org.hibernate.cfg.Environment\nimport\
  \ org.springframework.jdbc.datasource.embedded.EmbeddedDatabaseBuilder\nimport org.springframework.jdbc.datasource.embedded.EmbeddedDatabaseType\n\
  import org.springframework.orm.hibernate5.HibernateTransactionManager\nimport org.springframework.orm.hibernate5.LocalSessionFactoryBuilder\n\
  import org.springframework.transaction.PlatformTransactionManager\n// 其他导入语句已省略\n\
  @Configuration\n@ComponentScan(basePackages = [\"com.apress.prospring6.seven.base\"\
  ])\n@EnableTransactionManagement\nopen class HibernateTestConfig {\n@Bean\nopen\
  \ fun dataSource(): DataSource? {\nreturn try {\nval dbBuilder = EmbeddedDatabaseBuilder()\n\
  dbBuilder.setType(EmbeddedDatabaseType.H2).setName(\"testdb\").build()\n} catch\
  \ (e: Exception) {\nLOGGER.error(\"无法创建嵌入式数据源 Bean！\", e)\nnull\n}\n}\n@Bean\nopen\
  \ fun hibernateProperties(): Properties {\nval hibernateProp = Properties()\nhibernateProp[Environment.DIALECT]\
  \ = \"org.hibernate.dialect.H2Dialect\"\nhibernateProp[Environment.HBM2DDL_AUTO]\
  \ = \"create-drop\"\nhibernateProp[Environment.FORMAT_SQL] = true\nhibernateProp[Environment.USE_SQL_COMMENTS]\
  \ = true\nhibernateProp[Environment.HIGHLIGHT_SQL] = true\nhibernateProp[Environment.SHOW_SQL]\
  \ = true\nhibernateProp[Environment.MAX_FETCH_DEPTH] = 3\nhibernateProp[Environment.STATEMENT_BATCH_SIZE]\
  \ = 10\nhibernateProp[Environment.STATEMENT_FETCH_SIZE] = 50\nreturn hibernateProp\n\
  }\n@Bean\nopen fun sessionFactory(): SessionFactory {\nreturn LocalSessionFactoryBuilder(dataSource())\n\
  .scanPackages(\"com.apress.prospring6.seven.base.entities\")\n.addProperties(hibernateProperties())\n\
  .buildSessionFactory()\n}\n@Bean\nopen fun transactionManager(): PlatformTransactionManager\
  \ {\nreturn HibernateTransactionManager(sessionFactory())\n}\ncompanion object {\n\
  private val LOGGER = LoggerFactory.getLogger(HibernateTestConfig::class.java)\n\
  }\n}\n清单 7-30\nHibernateTestConfig 配置类\n```\n\n当然，即使创建了数据库模式，也没有数据，因此我们无法运行任何测试。一种解决方案是使用\
  \ `@Sql*` 注解系列来设置所有内容，如**第 6 章**所示。另一种解决方案是编写有序测试，其中第一个测试插入数据，第二个测试查询数据，第三个测试更新数据，最后一个测试删除数据。通过这种方式，我们验证了\
  \ `SingerDaoImpl` 中的所有 CRUD 操作。使用 `HibernateTestConfig` 配置其测试上下文的 `H2HibernateTest`\
  \ 类如清单 7-31 所示。\n\n\n```markdown\n\n```\npackage com.apress.prospring6.seven\nimport\
  \ com.apress.prospring6.seven.config.HibernateTestConfig\nimport org.junit.jupiter.api.MethodOrderer\n\
  import org.junit.jupiter.api.Order\nimport org.junit.jupiter.api.TestMethodOrder\n\
  // 其他导入语句已省略\n@SpringJUnitConfig(classes = [HibernateTestConfig::class])\n@TestMethodOrder(\n\
  MethodOrderer.OrderAnnotation::class\n)\nclass H2HibernateTest {\n@Autowired\nvar\
  \ singerDao: SingerDao? = null\n@Commit\n@Test\n@Order(1)\n@DisplayName(\"01\\.\
  \ 应插入一位歌手及其专辑\")\nfun testInsert() {\nval singer = Singer()\nsinger.firstName =\
  \ \"BB\"\nsinger.lastName = \"King\"\nsinger.birthDate = LocalDate.of(1940, 8, 16)\n\
  var album = Album()\nalbum.title = \"My Kind of Blues\"\nalbum.releaseDate = LocalDate.of(1961,\
  \ 7, 18)\nsinger.addAlbum(album)\nalbum = Album()\nalbum.title = \"A Heart Full\
  \ of Blues\"\nalbum.releaseDate = LocalDate.of(1962, 3, 20)\nsinger.addAlbum(album)\n\
  val created = singerDao!!.save(singer)\nAssertions.assertNotNull(created.id)\n}\n\
  @Test\n@Order(2)\n@DisplayName(\"02\\. 应返回所有歌手\")\nfun testFindAll() {\nval singers\
  \ = singerDao!!.findAll()\nAssertions.assertEquals(1, singers.size)\nsingers.forEach(Consumer\
  \ { singer: Singer? ->\nLOGGER.info(\nsinger.toString()\n)\n})\n}\n@Test\n@Order(3)\n\
  @DisplayName(\"03\\. 应更新一位歌手\")\nfun testUpdate() {\nval singer = singerDao!!.findAll()[0]\n\
  // 确保该歌手存在\nAssertions.assertNotNull(singer)\nsinger.firstName = \"Riley B. \"\n\
  val version = singer.version\nsingerDao!!.save(singer)\nval bb = singerDao!!.findById(singer.id)\n\
  Assertions.assertEquals(version + 1, bb!!.version)\n}\n@Test\n@Order(4)\n@DisplayName(\"\
  04\\. 应删除一位歌手\")\nfun testDelete() {\nval singer = singerDao!!.findAll()[0]\n//\
  \ 确保该歌手存在\nAssertions.assertNotNull(singer)\nsingerDao!!.delete(singer)\nAssertions.assertEquals(0,\
  \ singerDao!!.findAll().size)\n}\ncompanion object {\nprivate val LOGGER = LoggerFactory.getLogger(HibernateTest::class.java)\n\
  }\n}\n清单 7-31\nH2HibernateTest 测试类\n```\n\n请注意，该类使用了 `@TestMethodOrder(MethodOrderer.OrderAnnotation.class)`\
  \ 注解，并且每个测试方法都使用了 `@Order({x})` 注解，其中 `x` 代表测试方法的数字顺序。测试方法按升序执行，如果一切顺利，它们都应该通过。这显然在测试方法之间引入了某种依赖性，如果其中一个失败，后续的所有其他测试也可能失败。\n\
  \n![](img/524962_1_En_7_Figf_HTML.jpg) 一个图标描绘了一个小写字母 I，内嵌于实心圆中。 使用 Hibernate Tools^(⁶⁴)\
  \ 也可以从现有模式*在 Java 中*生成实体类，但生成的代码并非总是最佳，可能需要调整。\n\n## 注解方法还是字段？\n\n在前面的示例中，实体在其 getter\
  \ 方法上使用了 JPA 注解。在 Kotlin 中，你可以看到类似 `@get:Annotation` 的注解。但 JPA 注解可以直接用于字段，这有几个优点：\n\
  \n*   注解实体字段不需要强制提供 setter/getter。这对于 `@Version` 注解的字段和其他审计范围字段非常有用，这些字段不应手动修改；只有\
  \ Hibernate 应该能够访问它们。\n\n*   注解字段允许在 setter 中进行额外处理（例如，从数据库加载值后进行加密/计算）。属性访问的问题在于，当加载对象时也会调用\
  \ setter。\n\n互联网上关于哪种方式更好（注解访问器还是注解实体字段）有很多讨论。从性能角度来看，两者没有区别。最终决定权在于开发者，因为在某些合理的情况下，注解访问器可能更有意义。但请记住，数据库中实际保存的是对象的状态，而对象的状态由其字段的值定义，而不是由访问器返回的值定义。这也意味着可以从数据库中准确地重新创建对象，就像它被持久化时一样。因此，从某种程度上说，将注解放在\
  \ getter 上可以被视为破坏了封装性。\n\n清单 7-32 展示了重写后的 `AbstractEntity` 映射类，该类对应用程序中所有 Hibernate\
  \ 实体类共有的字段进行了注解。\n\n```\npackage com.apress.prospring6.seven.crud.entities\nimport\
  \ jakarta.persistence.*\nimport java.io.Serial\nimport java.io.Serializable\n@MappedSuperclass\n\
  abstract class AbstractEntity : Serializable {\ncompanion object {\n@Serial\nprivate\
  \ val serialVersionUID:Long = 1L\n}\n@Id\n@GeneratedValue(strategy = GenerationType.IDENTITY)\n\
  @Column(updatable = false)\nvar id:Long\n@Version\n@Column(name = \"VERSION\")\n\
  var version:Int\n}\n清单 7-32\n使用 JPA 注解字段的 AbstractEntity 映射类\n```\n\n清单 7-33 展示了重写后的\
  \ `Singer` 实体类，该类使用了注解字段。\n\n```\npackage com.apress.prospring6.seven.crud.entities\n\
  import jakarta.persistence.*\n// 其他导入语句已省略\n@Entity\n@Table(name = \"SINGER\")\n\
  @NamedQueries(\nNamedQuery(\nname = \"Singer.findById\",\nquery = \"\"\"\nselect\
  \ distinct s from Singer s\nleft join fetch s.albums a\nleft join fetch s.instruments\
  \ i\nwhere s.id = :id\n\"\"\"\n),\nNamedQuery(\nname = \"Singer.findAllWithAlbum\"\
  ,\nquery = \"\"\"\nselect distinct s from Singer s\nleft join fetch s.albums a\n\
  left join fetch s.instruments i\n\"\"\"\n)\n)\n@NamedStoredProcedureQuery(\nname\
  \ = \"getFirstNameByIdProc\",\nprocedureName = \"getFirstNameByIdProc\",\nparameters\
  \ = [StoredProcedureParameter(\nname = \"in_id\",\ntype = Long::class,\nmode = ParameterMode.IN\n\
  ), StoredProcedureParameter(name = \"fn_res\", type = String::class,\nmode = ParameterMode.OUT)]\n\
  )\nclass Singer : AbstractEntity() {\n@Column(name = \"FIRST_NAME\")\nvar firstName:\
  \ String? = null\n@Column(name = \"LAST_NAME\")\nvar lastName: String? = null\n\
  @Column(name = \"BIRTH_DATE\")\nvar birthDate: LocalDate? = null\n@OneToMany(\n\
  mappedBy = \"singer\",\ncascade = [CascadeType.ALL],\norphanRemoval = true\n)\n\
  var albums: MutableSet = HashSet()\n@JoinTable(\nname = \"SINGER_INSTRUMENT\",\n\
  joinColumns = [JoinColumn(name = \"SINGER_ID\")],\ninverseJoinColumns = [JoinColumn(name\
  \ = \"INSTRUMENT_ID\")]\n)\n@ManyToMany\nvar instruments: MutableSet = mutableSetOf()\n\
  ...\n}\n清单 7-33\n使用 JPA 注解字段的 Singer 实体类\n```\n\n```\n\n\n## 使用 Hibernate 时的注意事项\n\
  \n如本章示例所示，一旦正确定义了所有对象关系映射、关联关系和查询，Hibernate 就能提供一个让你专注于使用对象模型进行编程的环境，而无需为每个操作编写\
  \ SQL 语句。在过去几年中，Hibernate 发展迅速，并已被 Java 和 Kotlin 开发者广泛采用，作为数据访问层库，无论是在开源社区还是企业界。然而，有一些要点你需要牢记：\n\
  \n*   由于你无法控制生成的 SQL，因此在定义映射时，特别是关联关系及其获取策略时，需要格外小心。\n\n*   你应该观察 Hibernate 生成的\
  \ SQL 语句，以验证所有操作是否按预期执行。\n\n*   SQL 是一种具有丰富语法的高度表达性和类型安全的语言，因此编写 SQL 查询并不容易，语法错误也时有发生。\n\
  \n*   理解 Hibernate 如何管理其会话的内部机制非常重要，尤其是在批处理操作中。Hibernate 会将托管对象保留在会话中，并定期刷新和清理它们。设计不佳的数据访问逻辑可能导致\
  \ Hibernate 过于频繁地刷新会话，从而严重影响性能（在我们的示例中，我们在 `save(..)` 和 `delete(..)` 方法中显式地刷新了会话）。\n\
  \n*   如果你希望对查询拥有绝对控制权，可以使用原生查询，本章已对此进行了展示。下一章也将提供更多示例。\n\n*   设置（批处理大小、获取大小等）在调整\
  \ Hibernate 性能方面起着重要作用。你应该在会话工厂中定义它们，并在对应用程序进行负载测试时进行调整，以确定最佳值。\n\n归根结底，Hibernate\
  \ 及其出色的 JPA 支持（我们将在**第** **8** 章中讨论）对于寻求面向对象方式实现数据访问逻辑的 Kotlin 开发者来说，是一个自然而然的选择。\n\
  \n![](img/524962_1_En_7_Figg_HTML.jpg) 一个灯泡图标。 如果你有兴趣在项目中充分利用 Hibernate 的全部功能，你应该阅读\
  \ Vlad Mihalcea 的 *High-Performance Java Persistence*^(⁶⁵)。\n\n## 介绍 jOOQ\n\njOOQ\
  \ 代表 Java 面向对象查询（Java Object Oriented Querying），是一个用 Java 编写的轻量级数据库映射软件库，它实现了活动记录模式^(⁶⁶)。其目的是通过提供一种领域特定语言，从数据库模式生成的类中构建查询，从而兼具关系型和面向对象的特性。jOOQ\
  \ 以 SQL 为中心，专注于数据库。它的能力令人难以置信：它可以生成映射到数据库记录的 POJO 类以及 DAO 类，并且支持相当多的数据库^(⁶⁷)。\n\n\
  ![](img/524962_1_En_7_Figh_HTML.jpg) 一个图标描绘了一片高耸的弯曲叶子位于一条粗水平线上方。 jOOQ 生成的是 Java\
  \ 代码，而非 Kotlin 代码。由于 Kotlin 与 Java 无缝集成，即使你的应用程序是用 Kotlin 编写的，你仍然可以使用 jOOQ。\n\n\
  此外，jOOQ 可以与 Hibernate 集成：JPA 可用于修改操作，而 jOOQ 可用于生成昂贵的 SQL 原生查询，这些查询可以通过 JPA 原生查询执行。本节将向你展示如何使用\
  \ jOOQ 生成 POJO 和 DAO，以及如何在 Spring 应用程序中配置 jOOQ 以使用它们。\n\n![](img/524962_1_En_7_Figi_HTML.jpg)\
  \ 一个图标描绘了一个实心圆圈内刻有感叹号。 截至 jOOQ 3.15，商业版未发布到 Maven Central，仅可从 jOOQ 网站^(⁶⁸)获取。该发行版可以下载为\
  \ ZIP 文件，其中包含用于将构件发布到本地仓库的脚本（通过 `mvn install` 或 `mvn deploy`）。我们建议运行特定于你操作系统的 `maven-install`\
  \ 脚本。在撰写本文时，版本 3.16.7 是最新的。\n\n![](img/524962_1_En_7_Figj_HTML.jpg) 一个图标描绘了一片高耸的弯曲叶子位于一条粗水平线上方。 由于使用\
  \ jOOQ 需要你先在计算机上手动安装它，我们创建了项目 `chapter07-jooq`，该项目不属于本书完整构建的一部分。要将其添加到完整构建中，请从主\
  \ `settings.gradle` 文件中移除注释掉的配置片段。\n\n假设你已成功将 jOOQ 库安装到本地 Maven 仓库中，下一步是将必要的库添加到你的\
  \ Gradle 配置中。幸运的是，需要用于代码生成的 `jooq-codegen.jar` 文件依赖于主要的 `jooq.jar` 和 `jooq-meta.jar`，这些将作为其传递依赖项添加到项目中。\n\
  \n接下来，我们需要生成 jOOQ 类。有多种方法可以实现：\n\n*   使用 `org.jooq.codegen.GenerationTool` 和 XML\
  \ 配置的编程方式\n\n*   使用 `org.jooq.codegen.GenerationTool` 并在 Java 代码中进行显式配置的编程方式\n\n\
  *   使用 `nu.studer.jooq` 插件\n\n在 `chapter07-jooq` 中，插件已配置好，你可以在克隆仓库后查看。清单 7-34 展示了\
  \ `GenerateJOOQSources` 类，这是一个可执行类，包含了两种编程式代码生成版本。\n\n\n\n```\npackage com.apress.prospring6.seven.util\n\
  import org.jooq.codegen.GenerationTool\nimport org.jooq.meta.jaxb.Configuration\n\
  import org.jooq.meta.jaxb.Database\nimport org.jooq.meta.jaxb.Generate\nimport org.jooq.meta.jaxb.Generator\n\
  import org.jooq.meta.jaxb.Jdbc\nimport org.jooq.meta.jaxb.Target\n// 其他 import 语句已省略\n\
  object GenerateJOOQSources {\nprivate val LOGGER = LoggerFactory.getLogger(GenerateJOOQSources::class.java)\n\
  @Throws(Exception::class)\n@JvmStatic\nfun main(args: Array) {\nif (args.size >\
  \ 0) { // 传入任意参数以运行此版本\n// 编程式版本 1\nLOGGER.info(\"... 使用编程式版本 1 及 XML 配置生成 jOOQ\
  \ ...\")\nval resource = GenerateJOOQSources::class.java.getResource(\"/jooq-config.xml\"\
  )!!\nval jooqCfg = Paths.get(resource.toURI()).toFile()\nGenerationTool.generate(\n\
  Files.readString(jooqCfg.toPath())\n)\n} else {\n// 编程式版本 2\nLOGGER.info(\"... 使用编程式版本\
  \ 2 及编程式配置生成 jOOQ ...\")\nGenerationTool.generate(\nConfiguration()\n.withJdbc(\n\
  Jdbc()\n.withDriver(\"org.mariadb.jdbc.Driver\")\n.withUrl(\"jdbc:mariadb://localhost:3306/musicdb\"\
  )\n.withUser(\"prospring6\")\n.withPassword(\"prospring6\")\n)\n.withGenerator(\n\
  Generator()\n.withDatabase(\nDatabase()\n.withName(\"org.jooq.meta.mariadb.MariaDBDatabase\"\
  )\n.withInputSchema(\"musicdb\")\n.withIncludes(\".*\")\n)\n.withGenerate(\nGenerate()\n\
  .withPojos(true)\n.withPojosToString(true)\n.withDaos(true)\n)\n.withTarget(\nTarget()\n\
  .withPackageName(\"com.apress.prospring6.seven.jooq.generated\")\n.withDirectory(\"\
  ./chapter07-jooq/src/main/generated\")\n)\n)\n)\n}\n}\n}\n清单 7-34\n编程式 jOOQ 代码生成类\n\
  ```\n\n要运行第二个版本，只需传入任意参数执行该类即可。`jooq-config.xml` 文件位于 `resources` 目录中，它包含的信息与版本\
  \ 2 中完整的编程式配置相同，但采用 XML 格式。\n\n![](img/524962_1_En_7_Figk_HTML.jpg) 一个图标描绘了一片高耸的弯曲叶子位于一条粗水平线上方。 请注意，生成的源代码保存在名为\
  \ `generated` 的目录中，该目录与 `kotlin` 目录位于同一层级，而 Gradle 知道 `kotlin` 目录包含项目源代码。需要对 Gradle\
  \ 进行少量配置，告知它 `generated` 目录也包含项目的源代码。将生成的源代码与具体的项目源代码分开是一种良好的实践，这有助于保持清晰，并避免因配置错误而导致生成的类覆盖具体类的风险。\n\
  \n如果未设置 `withDirectory` 属性，生成的源代码将被放入 `target/generated-sources` 目录。为了方便访问和可见性，我们决定将其放在更显眼的位置。\n\
  \n一旦执行了 `GenerateJOOQSources`，`generated` 目录中应会填充大量类，如图 7-3 所示。\n\n![](img/524962_1_En_7_Fig3_HTML.jpg)\n\
  \n一张图片展示了 chapter 07 hyphen j o o q 的文件夹和子文件夹名称。文件夹名称包括 docker build、s r c main、generated\
  \ 和 java。\n\n图 7-3\n\njOOQ 生成的类\n\n`generated` 目录中有如此多类的原因在于，清单 7-34 中显示的配置通过以下代码片段请求了这些类：`withPojos(true).withPojosToString(true).withDaos(true)`。还有更多可能的选项，您可以在官方文档中找到所有选项。对于本书中的示例，我们仅配置了为\
  \ MariaDB 模式中的表生成 POJO 类、为这些类生成 `toString()` 方法（用于日志记录）以及生成 DAO 类来管理数据。生成的 POJO\
  \ 类看起来类似于 Hibernate 实体类，但没有注解。`daos` 包下的类与我们迄今为止编写的 DAO 类非常相似，只是返回的实例是 `pojos` 包中声明的类型。\n\
  \n现在我们有了这些类，接下来使用它们。第一步是在 Spring 应用程序中配置 jOOQ 支持，这相当简单。jOOQ 的核心是一个名为 `org.jooq.DSLContext`\
  \ 的类。该类的实例是客户端代码访问与 `org.jooq.Query` 执行相关的 jOOQ 类和功能的主要入口点。要正确配置它，需要数据库连接，以及一些关于生成查询时使用的语法等细节。最重要的部分是数据库连接。本章前面介绍了\
  \ `BasicDataSourceCfg` 配置类，它配置了一个 MariaDB `DataSource`；这个类可以重用，因为可以从它获取数据库连接。清单\
  \ 7-35 展示了包含单个 `DSLContext` 声明的 `JOOQConfig` 类。\n\n```\npackage com.apress.prospring6.seven.jooq.config\n\
  import org.jooq.DSLContext\nimport org.jooq.conf.RenderNameCase\nimport org.jooq.conf.RenderQuotedNames\n\
  import org.jooq.conf.Settings\nimport org.jooq.impl.DSL\nimport javax.sql.DataSource\n\
  import java.sql.SQLException\n// 其他 import 语句已省略\n@Configuration\nopen class JOOQConfig\
  \ {\n@Autowired\nvar dataSource: DataSource? = null\n@Bean\nopen fun dslContext():\
  \ DSLContext? {\ntry {\nreturn DSL.using(\ndataSource!!.connection,\nSettings()\n\
  .withRenderNameCase(RenderNameCase.UPPER)\n.withRenderQuotedNames(RenderQuotedNames.NEVER)\n\
  .withRenderSchema(false)\n.withRenderGroupConcatMaxLenSessionVariable(false)\n)\
  \ // 需要此设置，原因参见：https://blog.jooq.org/mysqls-allowmultiqueries-flag-with-jdbc-and-jooq/\n\
  } catch (ex: SQLException) {\nLOGGER.error(\"初始化 jOOQ.DSLContext 时出现问题！\", ex)\n\
  }\nreturn null\n}\ncompanion object {\nprivate val LOGGER = LoggerFactory.getLogger(JOOQConfig::class.java)\n\
  }\n}\n清单 7-35\n启用 jOOQ 支持的 Spring 配置类\n```\n\n请注意，`BasicDataSourceCfg` 配置类并未使用 `@Import`\
  \ 导入。这是因为我们希望保持 jOOQ 配置的独立性，仅在创建上下文时才将其引入配置中。\n\n现在我们将使用新的配置类。即使生成的类不存在，也能保持项目编译的最简单方法是编写测试。jOOQ\
  \ 的另一个优点是它与 Spring Test 组件和 Testcontainers 集成良好，这也使得编写测试更加容易。我们只需复制 `HibernateTest`\
  \ 类，替换测试上下文注解配置以及每个方法的主体，然后，*瞧*，我们就有了一个测试由 jOOQ 的 `DSLContext` 生成的 SQL 原生查询的类。清单\
  \ 7-36 展示了 `JOOQDslTest` 中的几个测试方法，因为如果您不想使用 jOOQ 生成的 DAO，也可以不使用。\n\n\n\n```\npackage\
  \ com.apress.prospring6.seven\nimport com.apress.prospring6.seven.base.config.BasicDataSourceCfg\n\
  import com.apress.prospring6.seven.jooq.config.JOOQConfig\nimport com.apress.prospring6.seven.jooq.generated.tables.records.SingerRecord\n\
  import org.jooq.DSLContext\nimport com.apress.prospring6.seven.jooq.generated.tables.Singer.SINGER\n\
  // 其他导入语句已省略\n@Testcontainers\n@SqlMergeMode(SqlMergeMode.MergeMode.MERGE)\n@Sql(\"\
  classpath:testcontainers/drop-schema.sql\", \"classpath:testcontainers/create-schema.sql\"\
  )\n@SpringJUnitConfig(classes = [BasicDataSourceCfg::class, JOOQConfig::class])\n\
  class JOOQDslTest {\n@Autowired\nvar dslContext: DSLContext? = null\n@Test\n@DisplayName(\"\
  应返回所有歌手\")\nfun findAll() {\nval singers: Result = dslContext!!.selectFrom(SINGER).fetch()\n\
  Assertions.assertEquals(3, singers.size)\n}\n@Test\n@DisplayName(\"应通过 ID 返回歌手\"\
  )\nfun testFindById() {\nval singerRecord: SingerRecord = dslContext!!.selectFrom(SINGER)\n\
  .where(SINGER.ID.eq(2)).fetchOne()!!\nAssertions.assertNotNull(singerRecord)\nassertEquals(\"\
  Ben\", singerRecord.getFirstName())\n}\n...\ncompanion object {\nprivate val LOGGER\
  \ = LoggerFactory.getLogger(JOOQDslTest::class.java)\n@Container\nvar mariaDB: MariaDBContainer\
  \ = MariaDBContainer(\"mariadb:latest\")\n@DynamicPropertySource // 这是实现魔法的关键\n\
  @JvmStatic\nfun setUp(registry: DynamicPropertyRegistry) {\nregistry.add(\"jdbc.driverClassName\"\
  ) { mariaDB.driverClassName }\nregistry.add(\"jdbc.url\") { mariaDB.jdbcUrl }\n\
  registry.add(\"jdbc.username\") { mariaDB.username }\nregistry.add(\"jdbc.password\"\
  ) { mariaDB.password }\n}\n}\n}\n清单 7-36\n测试 jOOQ 的 DSLContext\n```\n\n请注意，jOOQ\
  \ 的语法看起来很像 SQL。此外，如果将 `org.jooq` 的日志级别配置为 `DEBUG`，则在运行 `JOOQDslTest` 类时，生成的 SQL\
  \ 查询以及结果都会输出到控制台。清单 7-37 展示了一个日志示例。\n\n```\nDEBUG: JooqLogger - 正在执行查询        :\
