- '# 6. 使用 JDBC 进行 Spring 数据访问


  到目前为止，你已经看到构建一个完全由 Spring 管理的应用程序是多么容易。你对 Bean 配置和面向切面编程（AOP）有了扎实的理解。然而，拼图中还缺少一块：如何获取驱动应用程序的数据？


  除了简单的、一次性的命令行工具外，几乎每个应用程序都需要将数据持久化到某种数据存储中。最常用且最便捷的数据存储就是数据库。


  以下是 2023 年排名前七的企业级数据库：


  *   *MariaDB*：Web 应用程序中最流行的数据库之一（所有 WordPress 博客都将数据存储在 MariaDB 数据库中）。

  *   *Oracle Database*：使用最广泛的商业关系数据库管理系统（尤其在金融应用中）。

  *   *PostgreSQL*：用 C 语言编写的数据库管理系统，被处理海量数据的企业所使用。

  *   *Microsoft SQL Server*：金融公司的另一个宠儿，既可用于本地部署，也可用于云端。

  *   *MongoDB*：最流行的 NoSQL 数据库，一种面向文档的数据库，可通过自愈集群以服务形式在云端使用，称为 MongoDB Atlas。

  *   *Redis*：一个分布式内存键值存储，具有出色的可扩展性。

  *   *Elasticsearch*：基于 Lucene 的全文检索引擎。


  此外，Oracle 正在大力推动用 MySQL 取代 MariaDB。如果你不为能够负担企业级数据库或数据库云实例（如 GCP Managed SQL 实例、Amazon
  RDS 或 Aurora）许可证的大公司工作，那么你可能正在使用 MariaDB、PostgreSQL 或此处未列出的其他免费数据库。MariaDB 在 Web
  应用程序开发中通常更广泛使用，尤其是在 Linux 平台上；另一方面，PostgreSQL 对 Oracle 开发者更友好，因为其过程化语言 PL/pgSQL
  与 Oracle 的 PL/SQL 语言非常接近。


  即使你选择了最快、最可靠的数据库，也不能因为使用设计不佳、实现糟糕的数据访问层而损失其速度和灵活性。应用程序往往会非常频繁地使用数据访问层；因此，数据访问代码中任何不必要的瓶颈都会影响整个应用程序，无论其设计得多么好。本章是一个由五部分组成的系列文章的第一篇，将向你展示如何使用
  SQL 和 NoSQL 数据库、如何管理事务以及如何使用诸如 Hibernate 之类的持久化工具。具体来说，我们将讨论以下内容：


  *   *比较传统 JDBC 代码和 Spring JDBC 支持*：我们将探讨 Spring 如何在保持相同功能的同时简化老式 JDBC 代码。你还将看到 Spring
  如何访问底层 JDBC API，以及这个底层 API 如何被映射到诸如 `JdbcTemplate` 之类的便捷类中。

  *   *连接到数据库*：尽管我们不会深入探讨数据库连接管理的每一个细节，但我们确实会向你展示简单 Connection 和 DataSource 之间的根本区别。自然地，我们会讨论
  Spring 如何管理数据源，以及你可以在应用程序中使用哪些数据源。我们还将介绍各种用于连接池的库——这是一种重用连接，而不是每次请求连接时都创建新连接的过程。

  *   *检索数据并将其映射到 Kotlin 对象*：我们将向你展示如何检索数据，以及如何有效地将选中的数据映射到 Kotlin 对象。你还会了解到，Spring
  JDBC 是对象关系映射（ORM）工具（在**第** **7** **章**中介绍）的一个可行替代方案。

  *   *插入、更新和删除数据*：我们将讨论如何通过使用 Spring 执行这些类型的查询来实现插入、更新和删除操作。

  *   *使用内存数据库测试 JDBC 代码*：我们将讨论测试 JDBC 代码的方法，解释为什么内存数据库适合测试，并介绍 `@Sql*` 注解系列，它们为编写简洁的
  JDBC 代码测试提供了支持。我们还将向你介绍一个非常实用的库，名为 Testcontainers，它允许在测试或测试类的生命周期内启动和销毁 Docker 容器。

  *   *使用 Spring Boot JDBC*：我们将展示使用 Spring Boot JDBC 启动器库为生产环境和测试环境配置不同数据库是多么容易。


  让我们从涉及数据库的最简单场景开始：编写代码以使用 SQL 数据库和 JDBC。




