  \ fun findById(id: Long): Singer? {\nval query = em!!.createNamedQuery(\nSinger.FIND_SINGER_BY_ID,\n\
  Singer::class.java\n)\nquery.setParameter(\"id\", id)\nreturn try {\nquery.singleResult\n\
  } catch (nre: NoResultException) {\nnull\n}\n}\n...\n}\n清单 8-13\nfindById() 方法\n\
