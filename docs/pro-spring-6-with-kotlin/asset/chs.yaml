  \ Tomcat 启动器。不过，你仍然可以在 `build.gradle` 文件中添加自定义部署任务。\n\n在图 14-7 中，你可以看到“部署”选项卡用于将\
  \ Web 构件添加到启动器。当以展开形式添加时，启动器可以在调试模式下启动，代码中的断点将暂停应用，以便进行运行时调试。\n\n![](img/524962_1_En_14_Fig7_HTML.jpg)\n\
