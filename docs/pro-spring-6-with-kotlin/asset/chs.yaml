  // 预期输出

  INFO ConvertersTest - SpringBlogger info:

  Blogger[firstName=Iuliana,

  lastName=Cosmina,

  birthDate=1983-08-16,

  personalSite=https://iuliana-cosmina.com]

  INFO ConvertersTest - simpleBlogger info:   SimpleBlogger[fullName=Iuliana Cosmina,

  personalSite=https://iuliana-cosmina.com]

  清单 11-11

  转换为 SimpleBlogger

