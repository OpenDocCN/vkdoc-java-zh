  请注意，我们不需要为切点创建一个类；相反，我们只需创建一个 `JdkRegexpMethodPointcut` 实例并指定要匹配的模式即可。有趣的一点是模式本身。在匹配方法名称时，Spring
  会匹配方法的完全限定名，因此对于 `sing1()`，Spring 匹配的是 `com.apress.prospring6.five.common.Guitarist.sing1`，这就是为什么模式中有一个前导的
  `.*`。这是一个强大的概念，因为它允许你匹配给定包中的所有方法，而无需确切知道该包中有哪些类以及方法的名称是什么。运行此示例将产生如代码清单 5-21 所示的输出。


