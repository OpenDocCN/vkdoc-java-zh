  # 12. 任务调度


  任务调度是企业应用中的常见功能。任务调度主要由三部分组成：


  *   *任务*：需要在特定时间或定期执行的业务逻辑片段

  *   *触发器*：指定任务应执行的条件

  *   *调度器*：根据触发器的信息执行任务


  具体来说，本章涵盖以下主题：


  *   *Spring 中的任务执行*：我们简要讨论 Spring 的 `TaskExecutor` 接口以及任务如何执行。

  *   *Spring 中的任务调度*：我们讨论 Spring 如何支持任务调度，重点介绍 Spring 3 中引入的 `TaskScheduler` 抽象。我们还涵盖了调度场景，例如固定间隔调度和
  `cron` 表达式。

  *   *异步任务执行*：我们展示如何使用 Spring 中的 `@Async` 注解来异步执行任务。


  ## 关于任务


  如果你是一位有一定经验的开发者，你可能了解执行线程的概念。Java/Kotlin 应用由 JVM 可以在一个或多个线程上运行的代码描述，其中一个线程是调用主类
  `main(..)` 方法的非守护线程。在纯 Java 或 Kotlin 中，用于建模执行线程的类是 `java.lang.Thread`。可以通过扩展此类并重写其
  `run()` 方法来创建执行线程。生成的实例建模了一个执行线程，必须通过调用其 `start()` 方法显式启动。


  然而，还有另一种创建线程的方法，即创建一个实现 `java.lang.Runnable` 的类。该接口为需要执行代码的对象（包括 `Thread` 类）提供了通用协议。这意味着可以创建
  `Runnable` 实例并将其传递给某些组件（称为*执行器*），这些组件按照其配置方式执行代码：顺序执行、并行执行、使用线程池提供的线程等。如果任务的定义还不明确，那么在
  Kotlin 应用中，*任务*就是 `Runnable` 类型的任何实例。


  在 Java 或 Kotlin 中，`java.util.concurrent.Executor` 接口代表了异步任务执行的抽象。在 Spring 中，有一个接口扩展了该接口，并且基本相同，只是它被注解为
  `@FunctionalInterface` 以标记为函数式接口：`org.springframework.core.task.TaskExecutor`。


  ![](img/524962_1_En_12_Figa_HTML.jpg) 一个带阴影圆圈内的小写 i 符号。 该接口是为了与 Spring 2.x 中的 JDK
  1.4 向后兼容而必需的。


  Spring 的 `TaskExecutor` 接口如代码清单 12-1 所示。


  ```

  package org.springframework.core.task;

  import java.util.concurrent.Executor;

  @FunctionalInterface

  public interface TaskExecutor extends Executor {

  @Override

  void execute(Runnable task);

  }

  代码清单 12-1

  Spring 的 org.springframework.core.task.TaskExecutor 接口

  ```


  该接口只有一个方法 `execute(Runnable task)`，它根据线程池的语义和配置接受一个任务进行执行。Spring 提供了一些有用的 `TaskExecutor`
  实现。




  ## 在 Java 和 Kotlin 中执行任务


  在 Java 和 Kotlin 中有相当多的 `java.util.concurrent.Executor` 实现。线程池在执行大量异步任务时具有提高性能的优势，因为它们提供了一种在执行一组任务时约束和管理资源（包括线程）的方法。`ThreadPoolExecutor`
  维护着关于活动任务数和已完成任务数的基本统计信息，我们最喜欢的实现之一是编写一个实现了 `java.lang.Runnable` 的 `ThreadPoolMonitor`
  类，用于打印这些统计信息。


  本节介绍了一个模拟各种排序算法的类层次结构，如图 12-1 所示。这些类适用于创建可由执行器异步执行的排序任务。


  ![](img/524962_1_En_12_Fig1_HTML.jpg)


  一个自下而上的层次结构。插入排序、堆排序、冒泡排序、快速排序、希尔排序和归并排序都指向抽象排序类。抽象排序类指向一个整数排序任务。整数排序任务指向 Runnable。它表示从
  void Runnable 到 void 整数排序任务的调用流程。


  图 12-1


  模拟各种排序算法的类层次结构


  这些排序算法的实现对于本章来说并不重要，但由 `ThreadPoolExecutor` 类管理并并行运行它们才是重点。


  所有特定于任务执行的 Java 组件都可以在 `java.util.concurrent` 包下找到。`ThreadPoolExecutor` 类是 `ExecutorService`
  的一个实现，它使用一个或多个池化线程来执行每个提交的任务，并通过 `Executors` 工厂方法进行配置。线程池的大小及其最大容量作为参数提供给其构造函数。任务作为
  `BlockingQueue<Runnable>` 的实现提供，通过线程安全的方式避免同一任务被多次提交执行。它还支持在检索元素之前等待队列变为非空的操作，这允许在队列内容开始执行后向该列表添加任务。


  `ThreadPoolMonitor` 类是 `Thread` 的一个自定义扩展，专门为本节编写，用于打印正在运行的 `ThreadPoolExecutor`
  的统计信息，其代码如清单 12-2 所示。


  ```

  package com.apress.prospring6.twelve.classic

  import org.slf4j.Logger

  import org.slf4j.LoggerFactory

  import java.util.concurrent.ThreadPoolExecutor

  class ThreadPoolMonitor : Runnable {

  var executor: ThreadPoolExecutor? = null

  protected var printInterval = 200

  override fun run() {

  try {

  while (executor!!.activeCount > 0) {

  monitorThreadPool()

  Thread.sleep(printInterval.toLong())

  }

  } catch (e: Exception) {

  LOGGER.error(e.message)

  }

  }

  private fun monitorThreadPool() {

  val strBuff = "CurrentPoolSize : " + executor!!.poolSize +

  " - CorePoolSize : " + executor!!.corePoolSize +

  " - MaximumPoolSize : " + executor!!.maximumPoolSize +

  " - ActiveTaskCount : " + executor!!.activeCount +

  " - CompletedTaskCount : " + executor!!.completedTaskCount +

  " - TotalTaskCount : " + executor!!.taskCount +

  " - isTerminated : " + executor!!.isTerminated

  LOGGER.debug(strBuff)

  }

  companion object {

  private val LOGGER = LoggerFactory.getLogger(ThreadPoolMonitor::class.java)

  }

  }

  清单 12-2

  ThreadPoolMonitor 监控类

  ```


  请注意，`ThreadPoolMonitor` 可以作为一个独立于其所监控的 `ThreadPoolExecutor` 管理的排序任务而执行的线程启动。


  清单 12-3 展示了 `ClassicDemo` 类，它生成一个包含 100,000 个元素、值在 0 到 500,000 之间的数组，并将其交给图 12-1
  中的任务进行并行排序。这些任务由 `ThreadPoolExecutor` 的一个实例管理和执行，并由 `ThreadPoolMonitor` 的一个实例进行监控。


  ```

  package com.apress.prospring6.twelve.classic

  import java.util.List

  import java.util.Random

  import java.util.concurrent.LinkedBlockingQueue

  import java.util.concurrent.ThreadPoolExecutor

  import java.util.concurrent.TimeUnit

  object ClassicDemo {

  // private static final Logger LOGGER = LoggerFactory.getLogger(ClassicDemo.class);

  @JvmStatic

  fun main(args: Array) {

  val arr = Random().ints(100000, 0, 500000).toArray()

  // LOGGER.info("Starting Array: {} " , Arrays.toString(arr));

  val algsMonitor = ThreadPoolMonitor()

  val monitor = Thread(algsMonitor)

  val executor = ThreadPoolExecutor(2, 4, 0L, TimeUnit.MILLISECONDS,

  LinkedBlockingQueue())

  algsMonitor.executor = executor

  listOf(

  BubbleSort(arr),

  InsertionSort(arr),

  HeapSort(arr),

  MergeSort(arr),

  QuickSort(arr),

  ShellSort(arr)

  ).forEach(executor::execute)

  monitor.start()

  executor.shutdown()

  try {

  executor.awaitTermination(30, TimeUnit.MINUTES)

  } catch (e: InterruptedException) {

  throw RuntimeException(e)

  }

  }

  }

