  \ : {\n\"size\" : 20,\n\"totalElements\" : 1,\n\"totalPages\" : 1,\n\"number\" :\
  \ 0\n}\n}\n清单 13-14\nEvelyn 应用程序的信件资源的 JSON 表示\n```\n\n默认情况下，`RestTemplate` 会注册所有内置的消息转换器，这取决于类路径检查，这些检查有助于确定存在哪些可选的转换库。由于我们有两个相同的应用程序副本在通信，它们都可以在\
  \ `Letter` 及其 JSON 表示之间以及反向之间进行转换，而没有任何问题。如果需要，你也可以显式设置要使用的消息转换器。\n\n然而，只要注册了正确的转换器，`RestTemplate`\
  \ 就可以用于与任何其他语言编写的任何其他应用程序进行通信。例如，在清单 13-15 中，向 `LetterSenderController` 添加了一个方法，用于向\
  \ [`https://jsonplaceholder.typicode.com/users`](https://jsonplaceholder.typicode.com/users)\
  \ 执行请求，该端点由免费的假 API 提供，用于测试和原型设计。\n\n```\npackage com.apress.prospring6.thirteen;\n\
  // other imports omitted\n@RestController\nclass LetterSenderController(\nprivate\
  \ val webClient: RestTemplate,\n@param:Value(\"#{senderApplication.correspondentAddress}\"\
  )\nprivate val correspondentAddress: String,\n@param:Value(\"#{senderApplication.sender}\"\
  ) private val sender: String\n) {\n...\n@get:GetMapping(path = [\"misc\"], produces\
  \ = [MediaType.APPLICATION_JSON_VALUE])\nval miscData: String\nget() {\nval response\
  \ = webClient.getForObject(\n\"https://jsonplaceholder.typicode.com/users\",\nString::class.java\n\
  )\nlog.info(\"Random info from non-java application: {} \", response)\nreturn response!!\n\
  }\ncompanion object {\nval log = LoggerFactory.getLogger(LetterSenderController::class.java)\n\
  }\n}\n清单 13-15\n使用 RestTemplate 执行 GET 请求到 https://jsonplaceholder.typicode.com/users\n\
  ```\n\n返回的结果是一个 JSON 表示的用户对象数组。如果应用程序有一个与 JSON 表示匹配的 `User` POJO 定义，转换器将确保正确的转换。\n\
  \n用于提交请求的 `RestTemplate` 类功能相当强大，但如前所述，它已被标记为弃用。未来似乎是响应式的，`WebClient` 和新的声明式 HTTP\
  \ 接口是替代方案。\n\n从 Spring 6 和 Spring Boot 3 开始，Spring 框架支持将远程 HTTP 服务代理为 Java/Kotlin\
  \ 接口，该接口带有用于 HTTP 交换的注解方法，也称为*声明式 HTTP 接口*^(¹¹⁴)。声明式 HTTP 接口是一种有助于减少样板代码的接口，它生成一个实现此接口的代理，并在框架级别执行交换。这也将在**第**\
  \ **20** **章**中介绍，因为本章的重点是实际的远程通信。\n\n\n\n## 在 Spring 中使用 JMS\n\n使用面向消息的中间件（通常称为消息队列（MQ）服务器）是支持应用程序间通信的另一种流行方式。MQ\
  \ 服务器的主要优势在于它为应用程序集成提供了一种异步且松耦合的方式。在 Java/Kotlin 世界中，JMS 是连接 MQ 服务器以发送或接收消息的标准。MQ\
  \ 服务器维护一个队列和主题列表，应用程序可以连接到这些队列和主题来发送和接收消息。以下是对队列和主题之间区别的简要说明：\n\n*   ***队列***：队列用于支持点对点消息交换模型。当生产者向队列发送消息时，MQ\
  \ 服务器将消息保留在队列中，并在消费者下次连接时将其传递给一个（且仅一个）消费者。\n\n*   ***主题***：主题用于支持发布-订阅模型。任意数量的客户端都可以订阅主题内的消息。当该主题有消息到达时，MQ\
  \ 服务器会将其传递给所有已订阅该消息的客户端。当有多个应用程序对同一信息（例如，新闻推送）感兴趣时，此模型特别有用。\n\n在 JMS 中，生产者连接到 MQ\
  \ 服务器并向队列或主题发送消息。消费者也连接到 MQ 服务器，并监听队列或主题以获取感兴趣的消息。在 JMS 1.1 中，API 得到了统一，因此生产者和消费者无需处理与队列和主题交互的不同\
  \ API。从 Spring Framework 5 开始，Spring 的 JMS 包完全支持 JMS 2.0，并要求运行时存在 JMS 2.0 API。因此，需要一个兼容\
  \ JMS 2.0 的提供者。从 Spring 6 开始，使用的 JMS API 规范是 Jakarta Messaging API 3.x 版，因为 JMS\
  \ API 是 Oracle 外包的 Java EE 产品之一。\n\n本书 Java 变体的前一版本使用了 HornetMQ 独立服务器来发送消息，但此后 HornetMQ\
  \ 项目已退役。本章演示如何使用 Apache ActiveMQ Artemis^(¹¹⁵)，它有一个兼容 Jakarta JMS 的版本，并且有一个对应的 Spring\
  \ Boot starter，这将使事情变得容易得多。\n\nSpring 中 JMS 通信的核心是 `JmsTemplate`，它简化了发送和接收同步消息时资源的创建和释放。为方便起见，`JmsTemplate`\
  \ 还公开了一个基本的请求-回复操作，允许发送消息并等待响应。`JmsTemplate` 类似于 `RestTemplate`；它们都用于应用程序之间的远程通信，并且都公开了供开发人员使用的实用\
  \ API。两种类型的实例一旦配置完成就是线程安全的，因此应用程序中只需要一个 `JmsTemplate` bean，并且可以在任何需要的地方注入它。不过有一个区别：`JmsTemplate`\
  \ 是有状态的（某种程度上），因为它维护了对 `ConnectionFactory` 的引用，但这种状态不是会话状态。\n\n### 使用 Apache ActiveMQ\
  \ Artemis\n\n使用 Spring Boot 使 JMS 应用程序的开发更加实用，因为当它在类路径上检测到 ActiveMQ Artemis 可用时，它会自动配置一个\
  \ `jakarta.jms.ConnectionFactory` bean。\n\nActiveMQ Artemis 可以在原生模式下使用，与代理的连接由 Netty\
  \ 协议提供。`application.yaml` 文件可以如清单 13-16 所示。\n\n```\nspring:\nartemis:\nmode: native\n\
  host: 0.0.0.0\nport: 61617\nuser: prospring6\npassword:prospring6\n# 或者\nspring:\n\
  artemis:\nmode: native\nbroker-url: tcp://${IP_ADDRESS}:61617\nuser: prospring6\n\
  password:prospring6\n清单 13-16\n外部 ActiveMQ Artemis 服务器的 application.yaml 配置\n```\n\
  \n从 Spring Boot 3.x 开始，属性 `spring.artemis.host` 和 `spring.artemis.port` 已被标记为已弃用，建议使用\
  \ `spring.artemis.broker-url`。\n\n安装 ActiveMQ Artemis 不是本书的重点，因此对于代码示例，将使用嵌入式版本。要在\
  \ Spring Boot 应用程序中使用嵌入式 ActiveMQ Artemis，需要三样东西：类路径上的 `spring-boot-starter-artemis`、类路径上的\
  \ `artemis-jakarta-server` 以及 Spring Boot 嵌入式配置。图 13-4 显示了本节特定项目 `chapter13-artemis-boot`\
  \ 的所有依赖项。\n\n![](img/524962_1_En_13_Fig4_HTML.jpg)\n\nSpringer 第 13 章 Artemis boot\
  \ 的截图。依赖项选项列表列出了编译类路径选项。在编译类路径下，org apache active m q artemis jakarta server 和 org\
  \ spring framework boot spring boot starter Artemis 选项以深色阴影突出显示。\n\n图 13-4\n\nSpring\
  \ Boot Artemis JMS 项目依赖项\n\n使用嵌入式 ActiveMQ Artemis 服务器的 Spring Boot 应用程序配置如清单 13-17\
  \ 所示。\n\n```\nspring:\nartemis:\nmode: embedded\nembedded:\nqueues: prospring6\n\
  enabled: true\n清单 13-17\n嵌入式 ActiveMQ Artemis 服务器的 application.yaml 配置\n```\n\n\
  使用 Spring Boot 非常实用，因为无需声明 `jakarta.jms.ConnectionFactory`；它会自动设置。`spring.artemis.embedded.queues`\
  \ 配置一个逗号分隔的队列列表，这些队列将在启动时创建。默认情况下，Spring Boot 会配置一个类型为 `org.springframework.jms.connection.CachingConnectionFactory`\
  \ 的 bean。此类型是 `org.springframework.jms.connection.SingleConnectionFactory` 的扩展。这是一个特殊的类，它确保打开单个\
  \ JMS 连接，并在所有需要与 JMS 服务器通信的对象之间共享。`CachingConnectionFactory` 为消息生产者和消费者增加了缓存行为。图\
  \ 13-5 显示了 `jakarta.jms.ConnectionFactory` 最常见的实现。\n\n![](img/524962_1_En_13_Fig5_HTML.jpg)\n\
  \nJakarta dot j m s dot connection factory 的层次结构。catching connection factory 指向\
  \ single connection factory，后者分支为 connection factory、topic connection factory 和\
  \ queue connection factory。connection factory 有一个 active M Q connection factory。\n\
  \n图 13-5\n\n`jakarta.jms.ConnectionFactory` 层次结构\n\n在上一节中，我们在两个应用程序之间发送了 `Letter`\
  \ 实例，因此在本节中，同一个对象将由 `Sender` 发送到 JMQ 队列，并由 `Receiver` 读取。由于 Spring Boot 使用的是嵌入式\
  \ Apache MQ Artemis 服务器，我们无法启动两个应用程序并在它们之间交换消息。因此，功能很简单，与图 13-6 中描绘的模式相匹配。\n\n![](img/524962_1_En_13_Fig6_HTML.jpg)\n\
  \n\n\n流程图描绘了 JMS 提供商 Artemis 服务器的架构。它从字母发送者开始，经过一个字母、pro spring 6 队列，最后到达字母接收者。\n\
  \n图 13-6\n\nSpring Boot JMS 应用抽象架构\n\n`Sender` Bean 使用`JmsTemplate` Bean 发送`Letter`实例。`JmsTemplate`\
  \ Bean 也由 Spring Boot 自动配置，因此我们只需在`Sender` Bean 声明中注入并使用它即可。`Sender`类和 Bean 声明如清单\
  \ 13-18 所示。\n\n```\npackage com.apress.prospring6.thirteen\nimport org.springframework.jms.core.JmsTemplate\n\
  // 其他导入语句已省略\n@Component\nclass Sender {\nprivate var jmsTemplate: JmsTemplate?\
  \ = null\nconstructor(jmsTemplate: JmsTemplate) {\nthis.jmsTemplate = jmsTemplate\n\
  }\n@PostConstruct\nfun init() {\njmsTemplate!!.deliveryDelay = 2000L\n}\n@Value(\"\
  \\${spring.artemis.embedded.queues}\")\nprivate val queueName: String? = null\n\
  fun send(letter: Letter?) {\nlog.info(\" >> sending letter='{}'\", letter)\njmsTemplate!!.convertAndSend(queueName,\
  \ letter)\n}\ncompanion object {\nval log = LoggerFactory.getLogger(Sender::class.java)\n\
  }\n}\n清单 13-18\nJMS 生产者，Sender 类\n```\n\n请注意，队列名称是通过`@Value(\"${spring.artemis.embedded.queues}\"\
  )`从 Spring Boot 配置文件中提取的。\n\n`Receiver`更加简单，如清单 13-19 所示。\n\n```\npackage com.apress.prospring6.thirteen\n\
  import org.springframework.jms.annotation.JmsListener\n// 其他导入语句已省略\n@Component\n\
  class Receiver {\n@JmsListener(destination = \"\\${spring.artemis.embedded.queues}\"\
  )\nfun receive(letter: Letter?) {\nlog.info(\" >> received letter='{}'\", letter)\n\
  }\ncompanion object {\nval log = LoggerFactory.getLogger(Receiver::class.java)\n\
  }\n}\n清单 13-19\nJMS 消费者，Receiver 类\n```\n\n这个 Bean 声明中最重要的是用`@JmsListener`注解的方法。该注解标记一个方法，使其成为指定目标上\
  \ JMS 消息监听器的目标。此注解还可以使用`connectionFactory`属性指定自定义的 JMS `ConnectionFactory`。如果不指定，它将使用\
  \ Spring Boot 配置的默认`ConnectionFactory`。\n\n处理`@JmsListener`是 Spring Boot 自动配置的`org.springframework.jms.annotation.JmsListenerAnnotationBeanPostProcessor`\
  \ Bean 的职责。如果没有 Spring Boot 来配置此 Bean，则需要将`@EnableJms`（来自包`org.springframework.jms.annotation`）放置在配置类上。\n\
  \n为了测试通过嵌入式 Artemis 服务器管理的`prospring6`队列，`Sender` Bean 发送的字母是否被`Receiver` Bean 接收，我们可以编写如清单\
  \ 13-20 所示的程序。\n\n```\npackage com.apress.prospring6.thirteen\nimport java.util.UUID\n\
  // 其他导入语句已省略\n@SpringBootApplication\nopen class ArtemisApplication {\ncompanion\
  \ object {\nval log = LoggerFactory.getLogger(ArtemisApplication::class.java)\n\
  @JvmStatic\nfun main(args: Array) {\ntry {\nSpringApplication.run(ArtemisApplication::class.java,\
  \ *args).use { ctx ->\n// Arrays.stream(ctx.getBeanDefinitionNames()).forEach(cn\
  \ -> log.info(\"\n// >>> {}: {}\", cn, ctx.getBean(cn).getClass()));\nval sender\
  \ =\nctx.getBean(\nSender::class.java\n)\nfor (i in 0..9) {\nval letter =\nLetter(\"\
  Letter no. $i\", \"Test\", LocalDate.now(),\nUUID.randomUUID().toString())\nsender.send(letter)\n\
  }\nSystem.`in`.read()\n}\n} catch (e: IOException) {\nlog.error(\"Problem reading\
  \ keystrokes.\")\n}\n}\n}\n}\n清单 13-20\n测试 JMS 消息处理的程序\n```\n\n在清单 13-20 中，创建了应用上下文，然后从上下文中检索`Sender`\
  \ Bean 并用于发送十个`Letter`实例。`Receiver` Bean 自动对队列中的`Letter`实例做出反应并“消费”它们，在本例中，这意味着它们仅被记录。运行此程序时，您可能会注意到它并未按预期工作，并且控制台中打印了以下消息：\n\
  \n```\nException in thread \"main\"\norg.springframework.jms.support.converter.MessageConversionException:\n\
  Cannot convert object of type [com.apress.prospring6.thirteen.Letter] to JMS message.\n\
  Supported message payloads are: String, byte array, Map, Serializable object.\n\
  at org.springframework.jms.support.converter.SimpleMessageConverter.toMessage(SimpleMessageConverter.java:79)\n\
  at org.springframework.jms.core.JmsTemplate.lambda$convertAndSend$5(JmsTemplate.java:661)\n\
  ...\nat com.apress.prospring6.thirteen.Sender.send(Sender.java:56)\nat com.apress.prospring6.thirteen.ArtemisApplication.main(ArtemisApplication.java:70)\n\
  ```\n\n那么，问题出在哪里呢？默认情况下，如消息所述，只有少数几种类型的消息可以写入队列，并且所有这些类型都由实现`jakarta.jms.Message`的类型表示，如图\
  \ 13-7 所示。\n\n![](img/524962_1_En_13_Fig7_HTML.jpg)\n\n一个示意图列出了以下消息类型：Active M Q\
  \ 消息、字节消息、对象消息、映射消息、流消息和文本消息。\n\n图 13-7\n\n消息层次结构\n\n![](img/524962_1_En_13_Figc_HTML.jpg)\
  \ 一个带阴影圆圈内的小写 i 符号。 `ActiveMQMessage`类是作为`active-server.jar`库一部分的消息实现，但在 Spring\
  \ 应用程序中并非必需。\n\n那么，我们如何添加对不同类型的支持呢？错误消息中有一个提示：由于没有消息转换器，我们需要一个消息转换器。最简单的方法是提供一个转换器，将`Letter`转换为\
  \ JSON 文本表示，这样`Sender`将`jakarta.jms.TextMessage`写入队列，并将 JSON 表示转换回`Letter`，以便`Receiver`能够读取它。由于我们在\
  \ Spring 上下文中工作，最合适的方法是声明一个执行此操作的 Bean，并且由于这是一个 Spring Boot 应用程序，该 Bean 将在需要时自动使用。JMS\
  \ 转换器 Bean 如清单 13-21 所示，并使用 Jackson 库进行配置。\n\n```\npackage com.apress.prospring6.thirteen\n\
  import com.fasterxml.jackson.databind.json.JsonMapper\nimport com.fasterxml.jackson.datatype.jsr310.JavaTimeModule\n\
  import org.springframework.jms.support.converter.MappingJackson2MessageConverter\n\
  import org.springframework.jms.support.converter.MessageConverter\nimport org.springframework.jms.support.converter.MessageType\n\
  // 其他导入语句已省略\n@SpringBootApplication\nopen class ArtemisApplication {\n@Bean\nopen\
  \ fun messageConverter(): MessageConverter {\nval mapper = JsonMapper().apply {\n\
  registerModule(JavaTimeModule())\n}\nval converter = MappingJackson2MessageConverter().apply\
  \ {\nsetTargetType(MessageType.TEXT)\nsetTypeIdPropertyName(\"_type\")\nsetObjectMapper(mapper)\n\
  }\nreturn converter\n}\n// main 方法已省略\n}\n清单 13-21\nJMS 转换器 Bean\n```\n\n清单 13-21\
  \ 中有三行代码用于配置以下内容：\n\n*   `converter.setTargetType(MessageType.TEXT):` 指定应通过使用`MessageType.TEXT`枚举值调用，将对象编组为`TextMessage`。其他可能的值有：`BYTES`、`MAP`或`OBJECT`。\n\
  \n\n\n*   `converter.setTypeIdPropertyName(\"_type\"):` 指定承载所含对象类型 ID 的 JMS 消息属性的名称。需要设置此属性以允许将传入消息转换为\
  \ Java 对象。\n\n*   `mapper.registerModule(JavaTimeModule()):` 这是必需的，因为 `Letter` 记录包含一个名为\
  \ `sentOn` 的字段，其类型为 `java.time.LocalDate`。\n\n在配置中添加此 Bean 后，应用程序现在可以按预期运行。如果我们运行\
  \ `main(..)` 方法并分析控制台，`Sender` 在发送 `Letter` 实例之前打印的日志消息，以及 `Receiver` 在接收 `Letter`\
  \ 实例之后打印的日志消息，都会显示在控制台中。清单 13-22 显示了一个示例日志片段。\n\n```\nINFO : ActiveMQServerLogger_impl\
  \ - AMQ221007: Server is now live\nINFO : ActiveMQServerLogger_impl - AMQ221001:\
  \ Apache ActiveMQ Artemis Message Broker version 2.27.1 [localhost, nodeID=62e0a32a-7a73-11ed-b408-3e5b0a7a3878]\n\
  ...\nINFO : Sender -  >> sending letter='Letter[title=Letter no. 0, sender=Test,\
  \ sentOn=2022-12-12, content=95e3c388-37b5-499d-a720-c6b77b8cb99c]'\nINFO : AuditLogger_impl\
  \ - AMQ601267: User anonymous@invm:0 is creating a core session on target resource\
  \ ActiveMQServerImpl::name=localhost with parameters: [63310d25-7a73-11ed-b408-3e5b0a7a3878,\
  \ null, ****, 102400, RemotingConnectionImpl [ID=631dfa50-7a73-11ed-b408-3e5b0a7a3878,\
  \ clientID=null, nodeID=62e0a32a-7a73-11ed-b408-3e5b0a7a3878, transportConnection=InVMConnection\
  \ [serverID=0, id=631dfa50-7a73-11ed-b408-3e5b0a7a3878]], true, true, false, false,\
  \ null, org.apache.activemq.artemis.core.protocol.core.impl.CoreSessionCallback@4a09407d,\
  \ true, {}]\n...\nINFO : Sender -  >> sending letter='Letter[title=Letter no. 1,\
  \ sender=Test, sentOn=2022-12-12, content=c9490fb3-49d3-4678-af76-a3c2fff3de21]'\n\
  ...\nINFO : Receiver -  >> received letter='Letter[title=Letter no. 0, sender=Test,\
  \ sentOn=2022-12-12, content=95e3c388-37b5-499d-a720-c6b77b8cb99c]'\nINFO : AuditLogger_impl\
  \ - AMQ601759: User anonymous@invm:0 added acknowledgement of a message from prospring6:\
  \ CoreMessage[messageID=17,durable=true,userID=6337eaf6-7a73-11ed-b408-3e5b0a7a3878,priority=4,\
  \ timestamp=Mon Dec 12 23:19:12 GMT 2022,expiration=0, durable=true, address=prospring6,size=588,properties=TypedProperties[__AMQ_CID=63296c02-7a73-11ed-b408-3e5b0a7a3878,_type=com.apress.prospring6.thirteen.Letter,_AMQ_SCHED_DELIVERY=1670887154279,_AMQ_ROUTING_TYPE=1]]@489572349\
  \ to transaction: TransactionImpl [xid=null, txID=30, xid=null, state=ACTIVE, createTime=1670887154268(Mon\
  \ Dec 12 23:19:14 GMT 2022), timeoutSeconds=300, nr operations = 1]@16eb0e22\nINFO\
  \ : Receiver -  >> received letter='Letter[title=Letter no. 1, sender=Test, sentOn=2022-12-12,\
  \ content=c9490fb3-49d3-4678-af76-a3c2fff3de21]'\n...\n清单 13-22\nSpring Boot 控制台日志片段，显示正在处理的\
  \ JMS 消息\n```\n\n在确认消息发送（生产）和接收（消费）的自定义日志消息中，还有一些 Artemis 特有的日志。由于服务器是嵌入式的，每条消息都使用匿名用户发送，这已由日志确认。从日志中可以看出，JMS\
  \ 消息的发送和接收是在 JMS 事务中完成的，这是 Spring Boot 默认管理的。\n\n更高级的行为，例如消息消费优先级和错误处理，可以通过自定义 Spring\
  \ Boot 配置轻松实现。欢迎通过阅读官方文档^(¹¹⁶)来丰富您对 Spring Boot JMS 支持的知识。\n\n## 使用 Spring for Apache\
  \ Kafka\n\n在本节中，我们专注于使用队列的点对点风格，这是公司内部更常用的模式，而不是关注任何特定的队列技术。我们将向您展示如何使用 Apache Kafka^(¹¹⁷)\
  \ 编写 Spring Boot 应用程序。\n\n在一个需要管理的数据量逐年呈指数级增长，并且以闪电般的速度访问数据对生产力至关重要的世界里，传统的队列技术难以适应。这时，开源\
  \ Apache Kafka 应运而生。它是一个分布式事件流平台，以用于构建高性能数据管道、流分析、数据集成和关键任务应用程序而闻名，被数千家公司采用。Apache\
  \ Kafka 以其卓越的性能、低延迟、容错性和高吞吐量而著称。它能够每秒处理数千条消息。因此，与它集成自然是 Spring 团队的优先事项。Spring for\
  \ Apache Kafka (`spring-kafka`) 项目将核心 Spring 概念应用于基于 Kafka 的消息传递解决方案的开发。\n\n![](img/524962_1_En_13_Figd_HTML.jpg)\
  \ 一个带阴影圆圈内的小写字母 i 的符号。 请注意，该项目名为 *Spring for Apache Kafka*，而不是 *Spring Kafka*，原因是\
  \ Apache 基金会希望避免关于 Kafka 所有权的混淆。所有开源 Apache 项目的名称都带有“Apache”前缀，任何捐赠给 Apache 基金会的项目都会相应重命名。例如，Brooklyn\
  \ 编排服务器在捐赠给 Apache 基金会后就变成了 Apache Brooklyn。\n\n正如官方文档所述：“Apache Kafka 是一个由服务器和客户端组成的分布式系统，它们通过高性能\
  \ TCP 网络协议进行通信。它可以部署在裸机硬件、虚拟机以及本地和云环境中的容器上。”在本书的示例中，Apache Kafka 部署在本地 Docker 运行时中。\n\
  \n本地运行 Apache Kafka 所需的容器通过 `docker-compose.yaml` 文件进行配置，并使用 Docker Compose^(¹¹⁸)\
  \ 来启动和关闭容器。此配置由 Bitnami^(¹¹⁹) 提供，Bitnami 是一个包含 Web 应用程序、软件栈以及虚拟设备的安装程序或软件包的库。完整的库通过\
  \ GitHub 共享，所有容器配置均可在此处获取：[`https://github.com/bitnami/containers`](https://github.com/bitnami/containers)。本书示例所需的配置是从此仓库^(¹²⁰)下载的。启动容器的说明可以在\
  \ `chapter13-kafka-boot/CHAPTER13-KAFKA-BOOT.adoc` 文档中找到。\n\n前面使用术语 *容器*（复数）的原因是需要两个容器。事情是这样的，在生产环境中，Apache\
  \ Kafka 以集群方式运行，必须有人来管理这些实例。这就是 Zookeeper 的用武之地。Zookeeper 是 Apache 开发的一款软件，充当集中式服务，用于维护命名和配置数据，并在分布式系统中提供灵活且强大的同步。这意味着在生产环境中，您可能会看到类似图\
  \ 13-8 所示的设置，其中 Zookeeper 实例相互协调，每个实例负责其自己的 Apache Kafka 服务器。\n\n![](img/524962_1_En_13_Fig8_HTML.jpg)\n\
  \n一个示意图，显示三个 Zookeeper 协调 Apache Kafka 服务器的元数据。带有图形徽标的矩形连接到标有字母 Z 的块。矩形表示节点，标有 Z\
  \ 的气泡表示 Zookeeper 实例，葡萄徽标表示 Apache Kafka 实例。\n\n图 13-8\n\nApache Kafka 生产环境设置\n\n\
  \n\n在生产系统中，多个 Zookeeper 实例协同工作，管理分布在多个节点集合上的 Kafka 数据，这正是 Kafka 实现高可用性和一致性的方式。在图\
  \ 13-8 中，每个灰色矩形代表一个节点，标有 Z 的气泡代表 Zookeeper 实例，而黑色的“葡萄”标志代表 Apache Kafka 实例。不过，对于开发用的\
  \ Docker 环境，一个 Zookeeper 实例和一个 Apache Kafka 实例就足够了。\n\n由于我们使用的是应用程序外部的 Apache Kafka\
  \ 实例，因此可以编写另一个应用程序，该应用程序可以启动两次，并模拟实例之间的通信。正如本章开头所做的那样，我们将启动一个应用程序供 Tom 向 Evelyn\
  \ 发送信件，再启动另一个供 Evelyn 向 Tom 发送信件。Tom 和 Evelyn 各自拥有接收消息的队列。每个应用程序都是一个 Web 应用程序，会暴露一个\
  \ `/kafka/send` 端点，并使用 POST 方法触发向对方队列发送消息，如图 13-9 所示。\n\n![](img/524962_1_En_13_Fig9_HTML.jpg)\n\
  \n示意图展示了两个笔友 Tom 和 Evelyn 的 Spring 应用程序，它们通过 Apache Kafka 服务器进行通信。Tom 8090 通过 Evelyn\
  \ 的主题指向 Evelyn 8080。Evelyn 8080 通过 Tom 的主题指向 Tom 8090。\n\n图 13-9\n\n使用 Apache Kafka\
  \ 的两个笔友应用程序实例的抽象表示\n\nApache Kafka 没有对应的 Spring Boot Starter，因为你无法以嵌入式模式启动 Kafka，但创建一个\
  \ Spring Boot Web 应用程序、添加 `spring-kafka` 作为依赖项并使用 Spring 属性进行配置是相当容易的。图 13-10 展示了\
  \ `chapter13-kafka-boot` 项目的依赖关系。\n\n![](img/524962_1_En_13_Fig10_HTML.jpg)\n\n\
  Spring 第 13 章 Kafka 启动的截图。依赖项选项列表列出了编译类路径选项。在编译类路径下，`org.springframework.kafka:spring-kafka`\
  \ 和 `org.springframework.boot:spring-boot-starter-web` 选项以深色高亮显示。\n\n图 13-10\n\n\
  使用 Apache Kafka 的 Spring Boot 应用程序的 Gradle 配置\n\n现在我们有了期望的行为和依赖项，让我们看看构建这个应用程序需要什么。首先，我们需要告诉\
  \ Spring Boot Apache Kafka 的运行位置，以便调用其 API 来创建队列，并发送和接收消息。在代码清单 13-23 中，你可以看到 Spring\
  \ Boot 应用程序的配置（`application.yaml` 文件的内容）。\n\n```\n# web config\nserver:\n  port:\
  \ 8090\n  compression:\n    enabled: true\n  address: 0.0.0.0\n# kafka config\n\
  spring:\n  kafka:\n    bootstrap-servers: localhost:9092\n    consumer:\n      group-id:\
  \ letters-group-id\n# custom config\napp:\n  sending:\n    topic:\n      name: default\
  \  # 发送信件的主题\n  receiving:\n    topic:\n      name: self # 接收信件的主题\n# logging config\n\
  logging:\n  pattern:\n    console: \"%-5level: %class{0} - %msg%n\"\n  level:\n\
  \    root: INFO\n    org.springframework: DEBUG\n    com.apress.prospring6.thirteen:\
  \ INFO\n代码清单 13-23\nSpring Boot 与 Apache Kafka 应用程序配置\n```\n\nYAML 配置已按作用域划分为多个部分，各部分说明如下：\n\
  \n*   `# web config`：此部分配置 Web 应用程序的详细信息，例如端口，以及应用程序是否在所有网络 IP 上暴露（`0.0.0.0` 表示应用程序可通过\
  \ http://localhost:8090、http://127.0.0.1:8090 等地址访问）。\n*   `# kafka config`：此部分配置\
  \ Apache Kafka 集群可用的位置和端口。`consumer.group-id` 是一个 Kafka 抽象概念，用于支持点对点和发布/订阅消息传递。此属性可用于对多个消费者进行分组，并自定义每个组的行为，例如消费消息时的优先级、并行度等。\n\
  *   `# custom config`：基于这两个属性的值，此部分配置发送消息的主题（[`app.topic.sending.name`](http://app.topic.sending.name)）和接收消息的主题（[`app.topic.receiving.name`](http://app.topic.receiving.name)）。[`app.topic.receiving.name`](http://app.topic.receiving.name)\
  \ 属性还用于标识应用程序：Tom 或 Evelyn。\n*   `# logging config`：此部分配置日志级别。\n\n在这两个主题上，将写入 `Letter`\
  \ 记录实例。记录声明如代码清单 13-24 所示。\n\n```\npackage com.apress.prospring6.thirteen\n\nimport\
  \ com.fasterxml.jackson.annotation.JsonFormat\nimport com.fasterxml.jackson.annotation.JsonProperty\n\
  import java.time.LocalDate\n\ndata class Letter (@JsonProperty(\"title\") val title:String,\n\
  \                   @JsonProperty(\"sender\") val sender:String,\n             \
  \      @JsonFormat(shape = JsonFormat.Shape.STRING, pattern = \"yyyy-MM-dd\")\n\
  \                   @JsonProperty(\"sentOn\") val sentOn:LocalDate,\n          \
  \         @JsonProperty(\"content\") val content:String )\n代码清单 13-24\nLetter 记录声明\n\
  ```\n\n由于我们不打算编辑接收到的 `Letter` 实例，因此 Kotlin 数据类非常适合此应用程序。\n\nApache Kafka 集群不知道我们需要哪些主题，因此我们必须进行配置。它也不知道我们计划从主题中生产和消费哪种类型的对象，因此我们也必须进行配置。为简单起见，我们将所有这些配置分组到一个名为\
  \ `KafkaConfig` 的类中，如代码清单 13-25 所示。\n\n\n\n```\npackage com.apress.prospring6.thirteen\n\
  import org.apache.kafka.clients.admin.NewTopic\nimport org.apache.kafka.clients.consumer.ConsumerConfig\n\
  import org.apache.kafka.clients.producer.ProducerConfig\nimport org.apache.kafka.common.serialization.StringDeserializer\n\
  import org.apache.kafka.common.serialization.StringSerializer\nimport org.springframework.boot.autoconfigure.kafka.KafkaProperties\n\
  // 部分导入语句已省略\n@SuppressWarnings({\"unchecked\", \"rawtypes\"})\n@Configuration\n\
  open class KafkaConfig() {\n@Autowired\nvar kafkaProperties: KafkaProperties? =\
  \ null\n@Value(\"#{kafkaApplication.sendingTopic}\")\nvar sendingTopicName: String?\
  \ = null\n@Value(\"#{kafkaApplication.receivingTopic}\")\nvar receivingTopicName:\
  \ String? = null\nconstructor(kafkaProperties:KafkaProperties, sendingTopicName:\
  \ String?, receivingTopicName: String?) : this() {\nthis.kafkaProperties = kafkaProperties\n\
  this.sendingTopicName = sendingTopicName\nthis.receivingTopicName = receivingTopicName\n\
  }\n@Bean // 用于 LetterSender 的配置\nopen fun producerConfigs(): Map {\nval props: MutableMap\
  \ = HashMap(\nkafkaProperties!!.buildProducerProperties()\n)\nprops[ProducerConfig.KEY_SERIALIZER_CLASS_CONFIG]\
  \ = StringSerializer::class.java\nprops[ProducerConfig.VALUE_SERIALIZER_CLASS_CONFIG]\
  \ = JsonSerializer::class.java\nreturn props\n}\n@Bean\nopen fun producerFactory():\
  \ ProducerFactory {\nreturn DefaultKafkaProducerFactory(producerConfigs())\n}\n\
  @Bean\nopen fun kafkaTemplate(): KafkaTemplate {\nreturn KafkaTemplate(producerFactory())\n\
  }\n@Bean // 发送信件（Letter）的主题\nopen fun sendingTopic(): NewTopic {\nreturn NewTopic(sendingTopicName,\
  \ 1, 1.toShort())\n}\n@Bean // 读取信件的主题\nopen fun receivingTopic(): NewTopic {\n\
  return NewTopic(receivingTopicName, 1, 1.toShort())\n}\nopen fun consumerFactory():\
  \ ConsumerFactory {\nval jsonDeserializer = JsonDeserializer()\njsonDeserializer.addTrustedPackages(\"\
  *\")\nreturn DefaultKafkaConsumerFactory(\nkafkaProperties!!.buildConsumerProperties(),\n\
  StringDeserializer(),\njsonDeserializer\n)\n}\n@Bean\nopen fun kafkaListenerContainerFactory():\
  \ ConcurrentKafkaListenerContainerFactory {\nval factory = ConcurrentKafkaListenerContainerFactory()\n\
  factory.consumerFactory = consumerFactory()\nreturn factory\n}\n}\n清单 13-25\nKafkaConfig\
  \ 配置类\n```\n\n在 Spring Boot 应用中，所有来自配置文件的 Kafka 专属属性都会被加载到一个 `KafkaProperties` 配置\
  \ Bean 中。该 Bean 被注入到 `KafkaConfig` 类中，因此可以扩展出专用于 `ProducerFactory<String,Any>` 或\
  \ `ConsumerFactory<String, Any>` 的属性——在本例中，我们添加了序列化器和反序列化器，用于在将 `Letter` 实例写入主题前将其转换为\
  \ JSON 表示，并在消费消息时进行反向转换。请注意，`Letter` 类型在任何地方都未被提及。`ProducerFactory` 只需要知道使用什么来转换消息键和消息本身，因为每条消息都必须通过唯一的键进行唯一标识。\n\
  \n在应用启动之前，Apache Kafka 集群中没有任何已定义的主题。我们为所需的每个主题声明一个 `NewTopic` Bean，这确保了如果配置名称的主题不存在，则会创建该主题。一个主题可以配置为划分为多个分区，并在多个代理之间进行复制。在我们这个非常简单的示例中，分区数和复制因子都设置为\
  \ `1`。\n\n`KafkaTemplate` 类与 `JmsTemplate`（以及 `RestTemplate`）类似，需要此类型的 Bean 来执行\
  \ Apache Kafka 的高级操作。该 Bean 是线程安全的，并且用于生成消息时会使用已配置的 `ProducerFactory<K, V>` Bean。\n\
  \n`ConsumerFactory<K, V>` 用于从主题消费消息。对于这个简单的场景，我们使用 Spring 的 `DefaultKafkaConsumerFactory<K,V>`\
  \ 实现，并采用最小化配置。\n\n要消费消息，它们需要被监听器拾取。要创建这样一个监听器，除了在消费方法上附加 `@KafkaListener` 注解外，还需要一个\
  \ `ConcurrentKafkaListenerContainerFactory<K,V>`。\n\n![](img/524962_1_En_13_Fige_HTML.jpg)\
  \ 一个带阴影圆圈内感叹号的符号。 用于生产和消费消息的 Bean 均不限制特定消息类型的原因在于，同一队列上可以写入多种类型的消息，并由不同的监听器读取，这些监听器由不同的\
  \ `ConcurrentKafkaListenerContainerFactory<K,V>` 创建。\n\n请注意，Kafka 属性是从 Spring Boot\
  \ 配置文件中提取的，并通过 `@Value(value = \"${spring.kafka.*}\")` 注入，但像 [`app.topic.sending.name`](http://app.topic.sending.name)\
  \ 这样的自定义属性需要首先声明为 Spring Boot 主配置类的属性，并使用 SpEL 进行注入。\n\n此配置中的 Bean 必须注入到用于生产和消费\
  \ `Letter` 实例的 Bean 中。用于建模消息生产者的类名为 `LetterSender`，因为它的职责是发送信件。该类如清单 13-26 所示。\n\
  \n```\npackage com.apress.prospring6.thirteen\nimport org.springframework.beans.factory.annotation.Value\n\
  import org.springframework.kafka.core.KafkaTemplate\nimport org.springframework.stereotype.Service\n\
  @Service\nclass LetterSender {\n@Value(\"#{kafkaApplication.sendingTopic}\")\nvar\
  \ sendingToTopicName: String? = null\n@Value(\"#{kafkaApplication.receivingTopic}\"\
  )\nprivate val sender: String? = null // 谁在发送信件\nprivate val kafkaTemplate: KafkaTemplate?\
  \ = null\n// 使应用可配置\nfun send(letter: Letter) {\nlog.info(\">>>> [{}] 发送信件 -> {}\"\
  , sender, letter)\nkafkaTemplate!!.send(sendingToTopicName, UUID.randomUUID().toString(),\
  \ letter)\n}\ncompanion object {\nval log = LoggerFactory.getLogger(LetterSender::class.java)\n\
  }\n}\n清单 13-26\nLetterSender 类与 Bean 配置\n```\n\n`LetterSender` Bean 需要 `KafkaTemplate`\
  \ Bean 来发送消息，以及消息发送到的主题名称。`send(..)` 方法有多个版本，例如包含用于选择分区和消息生成时间的参数。还有一个版本返回 `CompletableFuture<SendResult<K,\
  \ V>>`，允许声明一个在消息成功发送后执行的回调。\n\n`kafkaApplication.receivingTopic` 也是发送消息的应用的名称，为了日志记录的目的被注入到此\
  \ Bean 中。\n\n`LetterSender` Bean 被注入到 `KafkaController` 中，因此可以通过 POST 请求触发发送信件。`KafkaController`\
  \ 类和 Bean 配置如清单 13-27 所示。\n\n```\npackage com.apress.prospring6.thirteen\nimport\
  \ org.springframework.web.bind.annotation.*\n@RestController\n@RequestMapping(path\
  \ = [\"/kafka\"])\nclass KafkaController {\nprivate var sender: LetterSender? =\
  \ null\nconstructor(sender:LetterSender) {\nthis.sender = sender\n}\n@PostMapping(value\
  \ = [\"/send\"])\nfun sendMessageToKafkaTopic(@RequestBody letter: Letter) {\nsender!!.send(letter)\n\
  }\n}\n清单 13-27\nKafkaController 类与 Bean 配置\n```\n\n现在你已经知道如何将 `Letter` 实例发送到主题，我们将演示如何消费它们。之前已经提到过\
  \ `@KafkaListener`，但我们应该把它放在哪里呢？放在一个名为 `LetterReader` 的类的方法上，如清单 13-28 所示。\n\n\n\
  \n```\npackage com.apress.prospring6.thirteen\nimport org.springframework.beans.factory.annotation.Value\n\
  import org.springframework.kafka.annotation.KafkaListener\nimport org.springframework.messaging.handler.annotation.Payload\n\
  import org.springframework.stereotype.Service\n@Service\nclass LetterReader {\n\
  @Value(\"#{kafkaApplication.receivingTopic}\")\nprivate val receivingTopicName:\
  \ String? = null // 谁在接收信件\n@KafkaListener(\ntopics = [\"#{kafkaApplication.receivingTopic}\"\
  ],\ngroupId = \"\\${spring.kafka.consumer.group-id}\",\nclientIdPrefix = \"json\"\
  ,\ncontainerFactory = \"kafkaListenerContainerFactory\"\n)\nfun consume(cr: ConsumerRecord)\
  \ {\nlog.info(\" {}\", cr.timestamp())\nlog.info(\" {}\", cr.topic())\nlog.info(\"\
  \ {}\", cr.partition())\nlog.info(\" {}\", cr.headers())\nlog.info(\" {}\", cr.key())\n\
  log.info(\" {}\", cr.value())\n}\ncompanion object {\nval log = LoggerFactory.getLogger(LetterReader::class.java)\n\
  }\n}\n清单 13-28\nLetterReader 类与 Bean 配置\n```\n\n`@KafkaListener` 注解将方法标记为 Kafka\
  \ 消息监听器的目标。监听器需要知道要从中读取消息的主题（是的，它可以从多个主题读取消息），这通过 `topics` 属性进行配置。如果使用了多个组，并且我们希望监听器仅从单个主题组读取消息，那么\
  \ `groupId` 属性对此很有用。此外，由于我们希望确保消息被正确转换，我们需要确保创建了合适的监听器，这意味着需要通过 `containerFactory`\
  \ 方法指定要使用的合适的 `ConcurrentKafkaListenerContainerFactory<K,V>`。\n\n`consume(...​`​)`\
  \ 方法可以有多种签名，只要 Spring 知道在从主题消费消息后如何处理它即可。来自 `org.springframework.messaging.handler.annotation`\
  \ 包的 `@Payload` 注解将 Kafka 消息的主体绑定到此方法参数，并将其转换为适当的类型，在本例中为 `Letter`。该方法的另一个版本将整个消息作为\
  \ `ConsumerRecord<String, Letter>` 消费，展示了如何运行应用程序的两个实例。\n\n最后一个要检查的类是 `KafkaApplication`，它是主要的\
  \ Spring Boot 配置类和运行器，如清单 13-29 所示。\n\n```\npackage com.apress.prospring6.thirteen;\n\
  @SpringBootApplication\nopen class KafkaApplication {\n@Value(\"\\${app.sending.topic.name}\"\
  )\nvar sendingTopic: String? = null\n@Value(\"\\${app.receiving.topic.name}\")\n\
  var receivingTopic: String? = null\n@Bean\nopen fun initCmd(): CommandLineRunner\
  \ {\nreturn CommandLineRunner { args: Array? ->\nlog.info(\n\" >>> 发送者 {}  准备向 {}\
  \ 发送信件 \",\nreceivingTopic,\nsendingTopic\n)\n}\n}\ncompanion object {\nval log\
  \ = LoggerFactory.getLogger(KafkaApplication::class.java)\n@JvmStatic\nfun main(args:\
  \ Array) {\nSpringApplication.run(KafkaApplication::class.java, *args)\n}\n}\n}\n\
  清单 13-29\nKafkaApplication Spring Boot 类\n```\n\n由于此应用程序将启动两次，一次用于 Evelyn，一次用于 Tom，因此创建了一个\
  \ `CommandLineRunner` Bean 来显示正在运行的是哪个应用程序。接收 `Letter` 的主题名称也是应用程序的名称。如前文图 13-9\
  \ 所示，Evelyn 的应用程序在端口 8080 上启动，Tom 的应用程序在端口 8090 上启动。\n\n要启动两个应用程序实例，方法是配置不同的 IntelliJ\
  \ IDEA 启动器，或者构建应用程序并使用 JAR 在不同的终端窗口中启动两个实例，使用的命令如清单 13-30 所示。\n\n```\n# 启动 Evelyn\n\
  java -jar build/libs/chapter13-kafka-boot-6.0-SNAPSHOT.jar --app.sending.topic.name=Tom\
  \ --app.receiving.topic.name=Evelyn --server.port=8080\n# 启动 Tom\njava -jar build/libs/chapter13-kafka-boot-6.0-SNAPSHOT.jar\
  \ --app.sending.topic.name=Evelyn --app.receiving.topic.name=Tom --server.port=8090\n\
  清单 13-30\n用于启动应用程序两个实例的 Bash 命令\n```\n\n当处理包含多个部分的应用程序时，我们喜欢将它们全部放在单独的 IntelliJ\
  \ 终端中。如图 13-11 所示，有一个终端用于运行 Docker Compose 以启动 Apache Kafka 服务器，另一个终端有两个窗口，可以同时看到\
  \ Evelyn 和 Tom 在运行。\n\n![](img/524962_1_En_13_Fig11_HTML.jpg)\n\n一个窗口的屏幕截图，包含 4\
  \ 个选项卡：Terminal、book、Kafka 和 local。Kafka 选项卡高亮显示，local 选项卡带有下划线。Evelyn 和 Tom 在终端窗口的两个部分中同时运行。来自\
  \ Evelyn 和 Tom 的发送信件请求已高亮显示。\n\n图 13-11\n运行 Apache Kafka 和两个 Spring Boot 应用程序实例的\
  \ IntelliJ IDEA 终端\n\n可以使用 `curl` ^(¹²¹) 或 `Postman` ^(¹²²) 发起请求，或者如果您使用的是 IntelliJ\
  \ IDEA，则可以使用 HTTPie 客户端。从 Evelyn 向 Tom 发送 `Letter` 以及反向发送的请求体如清单 13-31 所示。\n\n```\n\
  ### Evelyn 向 Tom 发送信件消息\nPOST http://localhost:8080/kafka/send\nContent-Type: application/json\n\
  {\n\"title\": \"致我亲爱的朋友\",\n\"sender\": \"HTTPIE\",\n\"sentOn\" : \"2022-12-04\"\
  ,\n\"content\" : \"好久没读到你写的东西了。想你！\"\n}\n### Tom 向 Evelyn 发送信件消息\nPOST http://localhost:8090/kafka/send\n\
  Content-Type: application/json\n{\n\"title\": \"我也想你\",\n\"sender\": \"HTTPIE\"\
  ,\n\"sentOn\" : \"2022-12-05\",\n\"content\" : \"苏格兰每年这个时候都相当可爱。你想来参观吗？\"\n}\n清单\
  \ 13-31\n用于 HTTPie 从两个应用程序实例相互发送信件的 POST 请求\n```\n\n如果您运行这两个请求，您将看到两个应用程序都打印日志，确认发送和接收了\
  \ `Letter`，如清单 13-32 所示。\n\n```\nINFO : LetterSender - >>>> [Evelyn] 发送信件 -> Letter[title=致我亲爱的朋友,\
  \ sender=HTTPIE, sentOn=2022-12-04, content=好久没读到你写的东西了。想你！]\nDEBUG: FrameworkServlet\
  \ - Completed 200 OK\n...\nDEBUG: LogAccessor - Received: 1 records\nINFO : LetterReader\
  \ - \nLetter[\ntitle=我也想你,\nsender=HTTPIE,\nsentOn=2022-12-05,\ncontent=苏格兰每年这个时候都相当可爱。你想来参观吗？\n\
  ]\n清单 13-32\nEvelyn 的日志确认已发送一封信件并收到一封\n```\n\nTom 应用程序会打印类似的信息。\n\n之前提到过，使用 `@KafkaListener`\
  \ 注解的方法可以有不同的签名，并且可以检查消息的所有细节，而不仅仅是主体（有效载荷）。为了实现这一点，该方法可以像清单 13-33 所示那样编写。\n\n```\n\
  package com.apress.prospring6.thirteen\nimport org.apache.kafka.clients.consumer.ConsumerRecord\n\
  // 其他导入语句已省略\n@Service\nclass LetterReader {\n@KafkaListener(topics = [\"#{kafkaApplication.receivingTopic}\"\
  ],\ngroupId = \"${spring.kafka.consumer.group-id}\",\nclientIdPrefix = \"json\"\
  ,\ncontainerFactory = \"kafkaListenerContainerFactory\")\nfun consume(cr:ConsumerRecord)\
  \ {\nlog.info(\" {}\", cr.timestamp());\nlog.info(\" {}\", cr.topic());\nlog.info(\"\
  \ {}\", cr.partition());\nlog.info(\" {}\", cr.headers());\nlog.info(\" {}\", cr.key());\n\
  log.info(\" {}\", cr.value());\n}\n}\n清单 13-33\nEvelyn 的日志确认已发送一封信件并收到一封\n```\n\n\
  \n\n`ConsumerRecord<K, V>` 是 `kafka-clients.jar` 库的一部分，如你所见，它是一个键/值对映射，对应消息标识符和有效载荷，但也包含其他有用信息，例如接收消息的主题名称和分区编号。\n\
  \n清单 13-34 展示了此更改后发送信件时该方法的输出。\n\n```\nINFO : LetterReader -  1671403710391\nINFO\
  \ : LetterReader -  Evelyn\nINFO : LetterReader -  0\nINFO : LetterReader -  RecordHeaders(headers\
  \ = [], isReadOnly = false)\nINFO : LetterReader -  dcccbbe7-3b5f-4447-9c15-0272f45591a9\n\
  INFO : LetterReader - \nLetter[\ntitle=Miss you too,\nsender=HTTPIE,\nsentOn=2022-12-05,\n\
  content=Scotland is rather lovely this time of year. Would you like to visit?\n\
  ]\n清单 13-34\nEvelyn 日志确认信件作为 ConsumerRecord 被接收\n```\n\n## 总结\n\n在本章中，我们介绍了基于 Spring\
  \ 的应用程序中最常用的远程通信技术。针对本章中的每个场景，我们都展示了如何发送和接收消息。远程应用程序之间的通信是一个庞大的主题，有多种技术可用于此目的。本章旨在向你介绍其中最常用的技术，并让你大致了解如何设计\
  \ Spring 应用程序以与其他应用程序（无论是否使用 Spring 编写）进行通信。\n\n本章专门使用了 Spring Boot，因为重点在于 Spring\
  \ 与每种技术（REST、JMS 和 Apache Kafka）的集成。\n\n在下一章中，我们将讨论如何使用 Spring 编写 Web 应用程序。\n\n\
