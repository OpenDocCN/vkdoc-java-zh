  \ Spring MVC Thymeleaf 示例。\n\n图 14-8\n\n`chapter-14` 项目的 IntelliJ IDEA 启动器\n\n现在，我们的第一个视图已经可以工作了。在接下来的章节中，我们将用更多视图来丰富应用，并支持\
  \ i18n、主题、错误处理等功能。\n\n#### 理解 Spring MVC 项目结构\n\n在深入实现 Web 应用的各个方面之前，让我们先看看本章开发的示例\
  \ Web 应用的项目结构是什么样的。\n\n通常，一个 Web 应用需要大量文件来支持各种功能。例如，有许多静态资源文件，如样式表、JavaScript 文件、图片和组件库。还有支持以多种语言呈现界面的文件。当然，还有将由\
  \ Web 容器解析和渲染的视图页面，以及模板框架（例如 Thymeleaf）用于提供一致应用外观和感觉的布局和定义文件。\n\n将服务于不同目的的文件存储在一个结构良好的文件夹层次结构中，始终是一个好习惯。这能让你清晰地了解应用所使用的各种资源，并简化后续的维护工作。\n\
  \n项目结构已通过图 14-6 进行了介绍。表 14-2 描述了本章开发的 Web 应用的文件夹结构。请注意，此处展示的结构并非强制要求，而是开发者社区在 Web\
  \ 应用开发中常用的结构。\n\n表 14-2\n\n示例 Web 项目文件夹结构说明\n\n| 文件夹名称 | 用途 |\n| --- | --- |\n|\
  \ `images` | 存储用于美化网站的图片：Logo、项目符号等。 |\n| `styles` | 存储支持 CSS 样式、网站外观和感觉的样式表文件。\
  \ |\n| `WEB-INF/classes` | 存储主题 Cookie 配置的属性文件。 |\n| `WEB-INF/views` | 存储用于创建视图的模板文件，此处为\
  \ Thymeleaf 模板。 |\n| `resources/i18n` | 存储支持 i18n 的文件。`application*.properties`\
  \ 文件存储与布局相关的文本（例如，页面标题、字段标签和菜单标题）。`message*.properties` 文件存储各种消息（例如，成功和错误消息以及验证消息）。该示例将同时支持英语（美国）和德语（德国）。`i18n`\
  \ 目录包含国际化资源文件。这些文件本可以放在 `WEB-INF/i18n` 下，但为了在章节末尾更容易迁移到 Spring Boot，将其放在了 `resources`\
  \ 下。 |\n\n![](img/524962_1_En_14_Figg_HTML.jpg) 信息符号。由一个带阴影圆圈内的小写字母 i 表示。 有时可能还会有一个\
  \ `webapp/scripts` 目录，其中包含使页面动态化所需的通用 JavaScript 文件。也可能存在其他特定于所用 JavaScript 框架的目录，例如\
  \ `jQuery`^(¹³⁴) 或 `jqgrid`^(¹³⁵)。对于本章的简单示例，不需要此类文件。\n\n表 14-2 中提到的大多数 Web 文件将不会在此展示。鉴于此，我们建议你下载本章的源代码副本，并将其解压到一个临时文件夹中，以便你可以直接将所需文件复制到项目中。\n\
  \n### 启用国际化 (i18n)\n\n在开发 Web 应用时，尽早启用 i18n 始终是一个好习惯。主要工作是将用户界面文本和消息外部化到属性文件中。\n\
  \n即使你一开始没有 i18n 需求，将语言相关设置外部化也是好的，这样以后需要支持更多语言时会更容易。\n\n使用 Spring MVC，启用 `i18n`\
  \ 很简单。首先，将语言相关的用户界面设置外部化到 `/resources/i18n` 文件夹内的各个属性文件中，如表 14-2 所述。因为我们将同时支持英语（美国）和德语（德国），所以需要两个文件。`global.properties`\
  \ 文件存储默认区域设置的设置，此处为英语（美国）。`global_de.properties` 文件存储德语（德国）语言的设置。\n\n\n\n#### 在\
  \ `DispatcherServlet` 配置中配置 `i18n`\n\n语言文件就位后，下一步是为 `DispatcherServlet` 实例的 `WebApplicationContext`\
  \ 配置 i18n 支持。为此，我们需要在清单 14-6 中引入的 `WebConfig` 类中声明一个 `MessageSource` bean，将其注入模板解析器，并添加请求拦截器，以将视图模板中的所有消息代码替换为配置语言中的文本表示。支持国际化的配置修改如清单\
  \ 14-10 所示。\n\n```\npackage com.apress.prospring6.fourteen\nimport org.springframework.context.MessageSource\n\
  import org.springframework.context.support.ReloadableResourceBundleMessageSource\n\
  import org.springframework.web.servlet.i18n.LocaleChangeInterceptor\nimport org.springframework.web.servlet.mvc.WebContentInterceptor\n\
  import org.springframework.web.servlet.config.annotation.InterceptorRegistry\nimport\
  \ org.springframework.web.servlet.i18n.CookieLocaleResolver\n// 其他导入语句已省略\n@Configuration\n\
  @EnableWebMvc\n@ComponentScan(basePackages = [\"com.apress.prospring6.fourteen\"\
  ])\nopen class WebConfig : WebMvcConfigurer, ApplicationContextAware {\nprivate\
  \ var applicationContext: ApplicationContext? = null\n@Bean\n@Description(\"Thymeleaf\
  \ 模板引擎\")\nopen fun templateEngine() = SpringTemplateEngine().apply {\naddDialect(Java8TimeDialect())\n\
  setTemplateResolver(templateResolver())\nsetTemplateEngineMessageSource(messageSource())\n\
  enableSpringELCompiler = true\n}\noverride fun addInterceptors(registry: InterceptorRegistry)\
  \ {\nwith(registry){\naddInterceptor(localeChangeInterceptor()).addPathPatterns(\"\
  /*\")\naddInterceptor(themeChangeInterceptor())\naddInterceptor(webChangeInterceptor())\n\
  }\n}\n@Bean\nopen fun messageSource(): MessageSource\n= ReloadableResourceBundleMessageSource().apply\
  \ {\nsetBasename(\"classpath:i18n/global\")\nsetDefaultEncoding(StandardCharsets.UTF_8.name())\n\
  setUseCodeAsDefaultMessage(true)\nsetFallbackToSystemLocale(true)\n// # -1 : 从不重新加载，0\
  \ 始终重新加载\n// setCacheSeconds(0);\n}\n@Bean\nopen fun localeChangeInterceptor() =\
  \ LocaleChangeInterceptor().apply {\nparamName = \"lang\"\n}\n@Bean\nopen fun localeResolver()\
  \ = CookieLocaleResolver(\"locale\").apply {\nsetDefaultLocale(Locale.ENGLISH)\n\
  setCookieMaxAge(Duration.ofHours(1))\n}\n...\n}\n清单 14-10\n为 Spring 的 DispatcherServlet\
  \ 添加国际化配置类\n```\n\n在此版本的配置中，`MessageSource` bean 被声明为 `ReloadableResourceBundleMessageSource`\
  \ 实例。`ReloadableResourceBundleMessageSource` 类实现了 `MessageSource` 接口，该接口从定义的文件（本例中为\
  \ `/resources/i18n` 文件夹中的 `global*.properties` 文件）加载消息，以支持 i18n。\n\n请注意 `fallbackToSystemLocale`\
  \ 属性。此属性指示 Spring MVC 在未找到客户端区域设置的特殊资源包时，是否回退到应用程序运行所在系统的区域设置。该实例使用属性文件的位置 `classpath:i18n/global`\
  \ 进行配置，这意味着这些文件预期位于应用程序类路径下，因此在开发时位于 `resources` 目录下。编码也已配置，并且如果视图文件中使用了消息代码，但在资源文件中没有为其配置值，则该代码将用作值。\n\
  \n定义了一个类为 `LocaleChangeInterceptor` 的 Spring MVC 拦截器，它会拦截所有发往 `DispatcherServlet`\
  \ 的请求。该拦截器支持通过可配置的请求参数进行区域设置切换。从拦截器配置来看，定义了一个名为 `lang` 的 URL 参数，用于更改应用程序的区域设置，并且该参数是可定制的，因此您可以根据需要使用不同的参数。\n\
  \n最后，定义了一个类为 `CookieLocaleResolver` 的 bean。该类支持从用户浏览器的 cookie 中存储和检索区域设置。\n\n####\
  \ 修改视图以支持 i18n\n\n现在国际化支持已配置完成，必须修改视图模板文件以支持国际化。之前引入的 `home.html` 视图没有任何需要国际化的元素，因此为了展示\
  \ Thymeleaf 模板中如何支持国际化，清单 14-11 展示了 `views/templates/layout.html` 文件的一个片段。\n\n```\n\
  \n布局页面\n\nDE\n\nEN\n\n页面内容\n\n清单 14-11\nviews/templates/layout.html 片段\n```\n\n\
  HTML 的 `lang` 属性用于标识 Web 上文本内容的语言。`th:lang` 构造使用 `LocaleChangeInterceptor` 在每个请求上设置的\
  \ `lang` 参数的值来填充此属性。因为我们在 `DispatcherServlet` 的 `WebApplicationContext` 中定义了 `LocaleChangeInterceptor`，Spring\
  \ MVC 会将区域设置存储在浏览器的 cookie（名称为 `locale`）中，并且默认情况下，该 cookie 会在用户会话期间保留。如果您希望将 cookie\
  \ 保留更长时间，可以在 `CookieLocaleResolver` bean 定义中，通过调用 `setCookieMaxAge(...​`​)` 来覆盖从类\
  \ `org.springframework.web.util.CookieGenerator` 继承的属性 `cookieMaxAge`。\n\n要切换到英语（美国），您可以在浏览器中更改\
  \ URL 以反映 `?lang=en`，页面将切换回英语。由于没有提供名为 `global_en.properties` 的属性文件，Spring MVC 会回退使用默认文件\
  \ `global.properties`，该文件以站点的默认语言（英语）存储属性。\n\n特定于区域设置的值将使用语法 `#{key}` 通过键来访问，其中\
  \ `key` 是国际化属性文件中的消息键。\n\n### 使用主题和模板\n\n除了 i18n 之外，Web 应用程序还需要适当的外观和感觉（例如，商业网站需要专业的外观，而社交网站需要更生动的风格），以及一致的布局，以便用户在使用\
  \ Web 应用程序时不会感到困惑。\n\n![](img/524962_1_En_14_Figh_HTML.jpg) 警告符号。它由阴影三角形内的感叹号表示。 目前，方法是将网站与后端分离，并使用诸如\
  \ React^(¹³⁶) 和 TypeScript^(¹³⁷) 等先进的 JavaScript 框架来创建网站，这些框架与 Spring REST Web 应用程序交互以进行数据管理和其他高级操作。这意味着用户界面将主要是静态的。这就是为什么本节将介绍的\
  \ `ThemeChangeInterceptor`、`ResourceBundleThemeSource` 和 `CookieThemeResolver` 类型在\
  \ Spring 6.x 中被标记为已弃用，但并未推荐替代方案的原因。\n\n\n\n#### 主题支持\n\nSpring MVC 为主题提供了全面支持，并且在\
  \ Web 应用中启用它非常简单。因此，我们将从 Spring 的主题配置开始，这些配置需要添加到 `WebConfig` 类中，如清单 14-12 所示。\n\
  \n```\npackage com.apress.prospring6.fourteen\nimport org.springframework.ui.context.support.ResourceBundleThemeSource\n\
  import org.springframework.web.servlet.theme.CookieThemeResolver\nimport org.springframework.web.servlet.theme.ThemeChangeInterceptor\n\
  // 其他导入语句已省略\n@Configuration\n@EnableWebMvc\n@ComponentScan(basePackages = [\"com.apress.prospring6.fourteen\"\
  ])\nopen class WebConfig : WebMvcConfigurer, ApplicationContextAware {\nprivate\
  \ var applicationContext: ApplicationContext? = null\n@Throws(BeansException::class)\n\
  override fun setApplicationContext(applicationContext: ApplicationContext) {\nthis.applicationContext\
  \ = applicationContext\n}\n@Bean\nopen fun themeSource() = ResourceBundleThemeSource()\n\
  @Bean\nopen fun themeChangeInterceptor() = ThemeChangeInterceptor().apply {\nparamName\
  \ = \"theme\"\n}\n@Bean\nopen fun themeResolver() = CookieThemeResolver().apply\
  \ {\ndefaultThemeName = \"green\"\ncookieMaxAge = 3600\ncookieName = \"theme\"\n\
  }\noverride fun addInterceptors(registry: InterceptorRegistry) {\nwith(registry){\n\
  addInterceptor(localeChangeInterceptor()).addPathPatterns(\"/*\")\naddInterceptor(themeChangeInterceptor())\n\
  addInterceptor(webChangeInterceptor())\n}\n}\n...\n}\n清单 14-12\nWebConfig 主题配置\n\
  ```\n\n第一个 bean 的类型为 `ResourceBundleThemeSource`，负责加载当前主题的 `ResourceBundle` bean。例如，如果当前主题名为\
  \ `blue`，该 bean 将查找文件 `blue.properties` 作为该主题的 `ResourceBundle` bean。这两个主题的属性文件位于\
  \ `WEB-INF/classes` 目录下。文件分别命名为 `blue.properties` 和 `green.properties`，它们分别对应 `blue`\
  \ 和 `green` 主题。文件内容以主题名称作为属性，以及其他指向特定主题图片和 CSS 文件路径的属性。例如，`green.properties` 文件的内容如清单\
  \ 14-13 所示。\n\n```\ncss.style=/styles/decorator-green.css\nbanner.image=/images/banner-green.png\n\
  name=green\n清单 14-13\ngreen.properties 文件内容\n```\n\n新的拦截器 bean 类型为 `ThemeChangeInterceptor`，它会拦截每个请求以添加\
  \ `theme` 参数。\n\n类型为 `CookieThemeResolver` 的 bean 用于解析用户的当前主题。属性 `defaultThemeName`\
  \ 定义了要使用的默认主题，即 `green` 主题。请注意，顾名思义，`CookieThemeResolver` 类使用 cookie 来存储用户的主题。此外，还有一个类型为\
  \ `SessionThemeResolver` 的 bean，它将 *theme* 属性存储在用户的会话中，但为了使用它，我们需要为应用添加安全性，而我们目前不想这样做。\n\
  \n现在主题已配置完成，需要做的改动不多。在 `views/templates/layout.html` 文件中，我们只需要添加对 `theme` 参数的支持，并添加一个菜单选项来更改主题，方式与添加\
  \ locale 支持相同，如清单 14-14 所示。\n\n```\n\n布局页面\n\nDE\nEN\n|\n\nBLUE\nGREEN\n\n页面内容\n\
  \n清单 14-14\nviews/templates/layout.html 代码片段\n```\n\n请注意，在 `<head>` 部分中，`th:theme`\
  \ 被添加为一个属性。该属性的值由 `ThemeChangeInterceptor` bean 设置。`#themes.code('css.style')` 结构是一个上下文对象，用于从主题的\
  \ `ResourceBundle` 中检索 `css.style` 属性，该属性指向样式表文件 `decorator-*.css` 的路径。其值通过 `th:with`\
  \ 结构存储在 `cssStyle` 变量中，然后使用 `th:href=\"@{(${cssStyle})}\"` 设置为 `href` 属性的值。\n\n\
  在重新构建并将应用重新部署到服务器后，再次打开浏览器并访问 `http://localhost:8080/ch14`，您将看到 `green.css` 文件中定义的样式已被应用，因为这是在\
  \ `ThemeChangeInterceptor` bean 声明中配置为默认的主题。\n\n如果您愿意，可以右键单击网页并分析 Thymeleaf 为 `home.html`\
  \ 模板生成的 HTML 代码。\n\n#### 设计模板布局\n\n通过使用 `views/templates/layout.html` 文件作为模板（每个视图都基于此模板），已经确保了网站结构的一致性。为了保持颜色和元素样式的一致性与匹配性，一个主题需要结合网页设计和\
  \ Spring MVC 配置。\n\n所有网页的通用结构已在清单 14-11 中以 HTML 形式呈现，但图 14-9 提供了更有用的可视化表示。\n\n![](img/524962_1_En_14_Fig9_HTML.jpg)\n\
  \n一个模型图，标题为页面模板。它包括一个横幅图片块。语言和主题选择器位于页面头部。菜单页面在左侧。页面内容在右侧。页面页脚在底部。\n\n图 14-9\n\n\
  包含片段的 Thymeleaf 模板\n\n横幅图片和字体颜色是网站主题的一部分，因此当在蓝色和绿色主题之间切换时，横幅和字体颜色也会随之改变。每个基于 `layout.html`\
  \ 的视图都可以选择使用 `th:replace` 将其某些部分替换为来自该模板的片段，或者使用 `th:fragment` 声明自己的片段。显然，在大多数视图中，唯一需要定制的是\
  \ `pageContent` 片段和属于 `<head>` 元素的页面标题。\n\n### 实现更复杂的视图\n\n现在我们可以继续实现视图，这些视图允许用户查看完整的歌手列表、查看歌手详情、编辑现有歌手、创建新歌手，甚至删除歌手。\n\
  \n在接下来的章节中，我们将讨论 URL 到各个视图的映射，以及视图是如何实现的。我们还将讨论如何在 Spring MVC 中为编辑视图启用 JSR-349^(¹³⁸)\
  \ 验证支持。\n\n首先，我们需要设计如何将各种 URL 映射到相应的视图。在 Spring MVC 中，最佳实践之一是尽可能遵循 RESTful 风格的 URL\
  \ 来映射视图。表 14-3 显示了 URL 到视图的映射，以及将处理该操作的控制器方法名称。\n\n表 14-3\n\n示例 Web 项目文件夹结构描述\n\n\
  | URL | HTTP 方法 | 控制器 | 方法描述 |\n| --- | --- | --- | --- |\n| `/singers` | GET |\
  \ `SingersController` | 列出所有歌手。 |\n| `/singers` | POST | `SingersController` | 创建新歌手。\
  \ |\n| `/singers/create` | GET | `SingersController` | 显示创建歌手的表单。 |\n| `/singers/search`\
  \ | GET | `SingersController` | 显示搜索歌手的表单。 |\n| `/singers/go` | GET | `SingersController`\
  \ | 根据作为请求参数提供的条件列出歌手：`fieldName`、`fieldValue` 和 `exactMatch`。 |\n| `/singer/id`\
  \ | GET | `OneSingerController` | 显示具有指定 ID 的歌手信息。 |\n| `/singer/id` | PUT | `OneSingerController`\
  \ | 更新具有指定 ID 的歌手。 |\n| `/singer/id` | DELETE | `OneSingerController` | 删除具有指定 ID\
  \ 的歌手。 |\n| `/singer/id/edit` | GET | `OneSingerController` | 显示编辑具有指定 ID 的歌手的表单。\
  \ |\n| `/singer/id/upload` | GET | `OneSingerController` | 显示为具有指定 ID 的歌手上传照片的表单。\
  \ |\n| `/singer/id/photo` | GET | `OneSingerController` | 以字节数组形式检索具有指定 ID 的歌手的照片。\
  \ |\n| `/singer/id/photo` | POST | `OneSingerController` | 提交用户为具有指定 ID 的歌手提供的图片。\
  \ |\n\n\n\n#### 实现歌手列表视图\n\n要实现一个显示数据集的视图，我们需要三样东西：\n\n*   URL 与处理器方法之间的映射\n\n*\
  \   一个用于填充模型的处理器方法\n\n*   视图模板，我们将其命名为 `list.html`\n\n如表 14-3 所述，显示歌手列表的请求 URL 是\
  \ `/singers`，声明处理器方法的控制器是 `SingersController`。项目中有两个控制器。`SingersController` 分组处理不影响特定\
  \ `Singer` 实例（通过 ID 标识）的方法，所有处理的请求都归在 `/singers` 路径下。影响单个 `Singer` 实例（通过 ID 标识）的处理器方法归在\
  \ `OneSingerController` 下，所有处理的请求都归在 `/singer/{id}` 路径下。\n\n代码清单 14-15 展示了 `SingersController`\
  \ 类、控制器配置以及为显示歌手的视图填充模型的处理器方法。\n\n```\npackage com.apress.prospring6.fourteen.controllers\n\
  import com.apress.prospring6.fourteen.services.SingerService\nimport org.springframework.context.MessageSource\n\
  import org.springframework.stereotype.Controller\nimport org.springframework.ui.Model\n\
  import org.springframework.web.bind.annotation.RequestMapping\n// 其他导入语句已省略\n@Controller\n\
  @RequestMapping(\"/singers\")\nclass SingersController(private val singerService:\
  \ SingerService, private val messageSource: MessageSource) {\n@GetMapping //@RequestMapping(method\
  \ = RequestMethod.GET)\nfun list(uiModel: Model): String {\nvar singers: List =\
  \ singerService.findAll().toMutableList()\nsingers = singers.sortedBy ( Singer::id\
  \ )\nuiModel.addAttribute(\"singers\", singers)\nreturn \"singers/list\"\n}\n//\
  \ --------------- 创建 -------------------\n@GetMapping(value = [\"/create\"])\nfun\
  \ showCreateForm(uiModel: Model): String {\nuiModel.addAttribute(\"singerForm\"\
  , SingerForm())\nreturn \"singers/create\"\n}\n@PostMapping(consumes = [MediaType.MULTIPART_FORM_DATA_VALUE])\n\
  @Throws(\nIOException::class\n)\nfun create(\nsingerForm: @Valid SingerForm, bindingResult:\
  \ BindingResult, uiModel: Model,\nhttpServletRequest: HttpServletRequest,\nlocale:\
  \ Locale\n): String {\nreturn if (bindingResult.hasErrors()) {\nuiModel.addAttribute(\"\
  message\", messageSource.getMessage(\"singer.save.fail\", arrayOf(), locale))\n\
  uiModel.addAttribute(\"singerForm\", singerForm)\n\"singers/create\"\n} else {\n\
  uiModel.asMap().clear()\nval s = Singer().apply {\nfirstName = singerForm.firstName\n\
  lastName = singerForm.lastName\nbirthDate = singerForm.birthDate\n}\n// 处理文件上传\n\
  if (!singerForm.file!!.isEmpty) {\nsetPhoto(s, singerForm.file!!)\n}\nval created\
  \ = singerService.save(s)\n\"redirect:/singer/\" + UrlUtil.encodeUrlPathSegment(\n\
  created.id.toString(),\nhttpServletRequest\n)\n}\n}\n// --------------- 搜索 -------------------\n\
  @GetMapping(value = [\"/search\"])\nfun showSearchform(criteria: CriteriaDto?):\
  \ String {\nreturn \"singers/search\"\n}\n@GetMapping(value = [\"/go\"])\nfun processSubmit(\n\
  @ModelAttribute(\"criteriaDto\") @Valid criteria: CriteriaDto,\nresult: BindingResult,\
  \ model: Model, locale: Locale\n): String {\nreturn if (result.hasErrors()) {\n\"\
  singers/search\"\n} else try {\nval singers: List = singerService.getByCriteriaDto(criteria)\n\
  if (singers.isEmpty()) {\nresult.addError(\nFieldError(\n\"criteriaDto\",\n\"noResults\"\
  ,\nmessageSource.getMessage(\"NotEmpty.criteriaDto.noResults\", null, locale)\n\
  )\n)\n\"singers/search\"\n} else if (singers.size == 1) {\n\"redirect:/singer/\"\
  \ + singers[0].id\n} else {\nmodel.addAttribute(\"singers\", singers)\n\"singers/list\"\
  \n}\n} catch (ice: InvalidCriteriaException) {\nresult.addError(\nFieldError(\n\"\
  criteriaDto\", ice.fieldName,\nmessageSource.getMessage(ice.messageKey, null, locale)\n\
  )\n)\n\"singers/search\"\n}\n}\n}\n代码清单 14-15\nSingersController 控制器及 list(..) 方法\n\
  ```\n\n放置在类上的 `@RequestMapping` 注解表明，该类中的所有处理器方法要么应用于作为参数提供的路径，要么应用于相对于该路径的路径。\n\
  \n在 `list(..)` 方法上，应用于它的 `@RequestMapping(method = RequestMethod.GET)` 表明该方法用于处理对\
  \ URL `/singers` 的 GET 请求。`Model` 对象被填充了一个名为 `singers` 的属性，并用 `singerService.findAll()`\
  \ 调用返回的歌手集合进行填充。\n\n![](img/524962_1_En_14_Figi_HTML.jpg) 一个警告符号。它由一个带阴影三角形内的感叹号表示。 除非返回的集合大小可控，否则绝不应在生产环境中使用\
  \ `findAll()` 方法；否则，可能会导致严重的性能问题。\n\n`@GetMapping` 注解是一个元注解，用于替代 `@RequestMapping(method\
  \ = RequestMethod.GET)`。你可以在处理器方法上使用它，以使代码更具可读性。\n\n该方法返回的值是 `\"singers/list\"`，这是用于渲染模型中数据的视图的逻辑名称。`ThymeleafViewResolver`\
  \ bean 使用此逻辑名称来标识要使用的视图模板，即作为对用户请求的响应而返回的 HTML 页面。\n\n`views/singers/list.html`\
  \ 模板如代码清单 14-16 所示。\n\n```\n\n计数\n名字\n姓氏\n\nID\n...\n...\n\n代码清单 14-16\nviews/singers/list.html\
  \ 模板内容\n```\n\nThymeleaf 非常强大，除了之前描述的功能外，它还支持算术运算、比较器和条件表达式。例如，作为属性添加到 `<table>`\
  \ 元素的 `th:if=\"${not #lists.isEmpty(singers)}\"` 结构，根据 `singer` 属性值是否为非空列表来决定表格的创建。`th:each=\"\
  singer : ${singers}\"` 结构用于迭代 `singers` 列表的值。当作为 HTML 元素的属性设置时，它会为列表中的每个条目创建一个副本。在此模板中，它为\
  \ `singers` 列表中的每个值在表格中创建一行。使用 `${..}` 语法，它为列表中对象的每个属性创建一个单元格。\n\n在浏览器中打开 `http://localhost:8080/ch14/singers`\
  \ 时，页面中应显示一个包含歌手的 HTML 表格，如果你检查页面源代码，可以看到 Thymeleaf 生成的 HTML 代码。它应该类似于代码清单 14-17\
  \ 中的代码。\n\n```\n\n序号\n名字\n姓氏\n\nJohn\nMayer\n\nBen\nBarnes\n\n代码清单 14-17\nThymeleaf\
  \ 为 singers/list 视图生成的 HTML 代码\n```\n\n\n\n#### 实现歌手展示视图\n\n实现用于显示歌手信息的 `show.html`\
  \ 视图与此类似。展示信息需要一次 GET 请求获取所有文本信息，以及另一次 GET 请求以字节数组形式获取照片。这两个处理方法的代码如代码清单 14-18 所示。\n\
  \n```\npackage com.apress.prospring6.fourteen.controllers\nimport org.springframework.http.MediaType\n\
  import org.springframework.web.bind.annotation.*\n// 其他 import 语句已省略\n@Controller\n\
  @RequestMapping(\"/singer/{id}\")\nclass OneSingerController(private val singerService:\
  \ SingerService, private val messageSource: MessageSource) {\n@GetMapping\nfun showSingerData(@PathVariable(\"\
  id\") id: Long, uiModel: Model): String {\nval singer: Singer = singerService.findById(id)\n\
  uiModel.addAttribute(\"singer\", singer)\nreturn \"singers/show\"\n}\n...\n@GetMapping(\"\
  /photo\")\n@ResponseBody\nfun downloadPhoto(@PathVariable(\"id\") id: Long): ByteArray\
  \ {\nval singer: Singer = singerService.findById(id)\nCompanion.LOGGER.info(\"Downloading\
  \ photo for id: {} with size: {}\", singer.id, singer.photo.size)\nreturn singer.photo\n\
  }\n...\ncompanion object {\nprivate val LOGGER = LoggerFactory.getLogger(OneSingerController::class.java)\n\
  @Throws(IOException::class)\nfun setPhoto(singer: Singer, file: MultipartFile) {\n\
  val inputStream = file.inputStream\nval fileContent = IOUtils.toByteArray(inputStream)\n\
  singer.photo = fileContent\n}\n}\n}\n代码清单 14-18\nOneSingerController 控制器及 show(..)\
  \ 和 downloadPhoto(..) 方法\n```\n\n这两个方法是 `OneSingerController` 的一部分，因为这两个操作都作用于单个\
  \ `Singer` 实例。所有应用于系统中已存在（因此具有 `id`）的 `Singer` 实例的操作都分组在此控制器中，并且所有操作都映射到以 `/singer/{id}`\
  \ 开头的 URL 请求。\n\n代码易于阅读，但需要对注解进行一些额外说明：\n\n*   `@RequestMapping(\"/singer/{id}\"\
  )` 注解声明了此控制器中方法处理的所有请求 URL 的公共路径。由于它是在类型级别使用的，因此所有方法级别的映射都会继承它，并且附加的方法级别注解 URL 路径会追加到其后。\n\
  \n*   `@PathVariable(\"id\")` 注解允许 Spring 从 URL 路径中获取参数，并将其作为值注入到调用 `showSingerData(..)`\
  \ 方法时的 `id` 参数中。此注解本身配置了 URL 路径变量的名称（用于演示目的），但当 URL 路径变量名称与方法参数名称相同时，则无需如此。因此，在此场景中，`@PathVariable(\"\
  id\") Long id` 等同于 `@PathVariable Long id`。\n\n*   `@GetMapping(value = \"/photo\"\
  )` 注解等同于 `@RequestMapping(value = \"/photo\", method = RequestMethod.GET)`。`@GetMapping`\
  \ 中的 `value` 属性是 `@RequestMapping` 中相同属性的别名。在 `@RequestMapping` 中，`value` 和 `path`\
  \ 属性互为别名，并且两者都是默认属性，这意味着以下所有注解都是等效的：\n    *   `@GetMapping(value = \"/photo\")`\n\
  \n*   `@GetMapping(path = \"/photo\")`\n\n*   `@GetMapping(\"/photo\")`\n\n*   `@RequestMapping(value\
  \ = \"/photo\", method = RequestMethod.GET)`\n\n*   `@RequestMapping(path = \"/photo\"\
  , method = RequestMethod.GET)`\n\n*   `@ResponseBody` 注解表示返回值应绑定到响应体。这意味着 Spring\
  \ 不会根据返回值查找视图，而是直接按原样返回值。\n\n`downloadPhoto(..)` 处理器方法是必需的，因为照片以字节数组的形式保存在数据库中，并且为了在\
  \ HTML 中渲染它们，我们需要提供整个字节数组作为 `<img>` 元素的源。\n\n`show.html` 视图模板中的 `pageContent` 片段如代码清单\
  \ 14-19 所示。（模板的其余部分从 `layout.html` 继承而来，未作更改，此处为节省篇幅已省略。）\n\n```\n\nFN\nFN\n\nLN\n\
  LN\n\nBD\nBD\n\n编辑\n\n上传照片\n\n代码清单 14-19\nviews/singers/show.html 模板 pageContent\
  \ 片段\n```\n\n要查看任何歌手的详细信息，只需点击该歌手在 `Cnt.` 列中数字上的链接。图 14-10 显示了歌手列表，并标出了可触发显示视图的链接。\n\
  \n![](img/524962_1_En_14_Fig10_HTML.jpg)\n\n一张截图，列出了歌手的序号、名字和姓氏。右侧是歌手的详细信息，包括名字、姓氏和出生日期，并带有\
  \ 3 个表情符号和删除选项。\n\n图 14-10\n\n列表视图与展示视图\n\n`show.html` 视图模板的要点如下：\n\n*   在 `th:src=\"\
  @{/singer/} + ${singer.id} + '/photo'\"` 中，使用了 `@{...​}` Thymeleaf 结构来构建相对于当前页面上下文的链接。这意味着生成的\
  \ HTML 中 `src` 属性的值变为 `/ch14/singer/3/photo`，完整的源 URL 变为 `http://localhost:8080/ch14/singer/3/photo`，该\
  \ URL 映射到 `downloadPhoto(..)` 处理器方法。\n\n*   相同的结构用于生成“编辑信息”和“更新照片”链接。“编辑信息”链接会打开一个新页面，用户可以在其中编辑歌手的信息。“更新照片”链接会打开一个新页面，用户可以在其中上传新照片。\n\
  \n\n\n#### 处理删除请求\n\n在 `show.html` 模板中有一个表单，用于触发针对当前显示歌手的 DELETE 请求。生成的 HTML 如代码清单\
  \ 14-20 所示。\n\n```\n\n代码清单 14-20\n歌手删除表单\n```\n\n请注意，实际上表单的 `method` 是 `POST`，但\
  \ Thymeleaf 在表单中添加了一个名为 `_method`、值为 `delete` 的隐藏输入。如果看起来这个表单输入指示了实际期望的请求方法，那是因为这正是它的用途。\n\
  \n解释很简单：就 HTTP 协议而言，人们主要用它来做两件事：检索数据（GET）或发送数据（POST）。这意味着 PUT 和 DELETE 等方法本质上与 POST\
  \ 做的是同一件事——它们实际上是 POST 的*子类别*——因此 HTML 中无需直接支持更多方法。\n\n然而，出于实际原因和可读性考虑，Thymeleaf\
  \ 允许使用 `th:method=\"delete\"` 或 `th:method=\"put\"` 声明表单，并在生成响应时承担将它们转换为 POST 方法的繁重工作。不过，Spring\
  \ 如何处理这些请求呢？或者更准确地说，处理方法应该如何映射到这些类型的请求？\n\n答案是：与 GET 请求的方式相同。毕竟，`@RequestMapping`\
  \ 注解可以针对特定的 HTTP 方法进行配置，并且还有元注解 `@DeleteRequest` 和 `@PutRequest`，它们分别等同于 `@RequestMapping(method\
  \ = RequestMethod.DELETE)` 和 `@RequestMapping(method = RequestMethod.PUT)`。\n\n\
  代码清单 14-21 展示了处理删除歌手请求的方法。\n\n```\npackage com.apress.prospring6.fourteen.controllers\n\
  import org.springframework.web.bind.annotation.DeleteMapping\n// 其他 import 语句已省略\n\
  @Controller\n@RequestMapping(\"/singer/{id}\")\nclass OneSingerController(private\
  \ val singerService: SingerService,\nprivate val messageSource: MessageSource) {\n\
  // @RequestMapping(method = RequestMethod.DELETE)\n@DeleteMapping\nfun deleteSinger(@PathVariable(\"\
  id\") id: Long): String {\nsingerService.findById(id)\nsingerService.delete(id)\n\
  return \"redirect:/singers/list\"\n}\n...\n}\n代码清单 14-21\n歌手删除处理器\n```\n\n不过，还有一件事是必要的：我们需要告诉\
  \ Spring，应用程序将会有 PUT 和 DELETE 请求，以便它知道将带有 `_method` 隐藏输入的 POST 请求转换为适当的 HTTP 请求，从而能够映射到相应类型的处理器。这是通过将\
  \ `org.springframework.web.filter.HiddenHttpMethodFilter` 的一个实例添加到过滤器列表中来实现的，这些过滤器会在请求传递给\
  \ `DispatcherServlet` 之前对其进行修改。该修改是在之前代码清单 14-5 中介绍的 `WebInitializer` 类中进行的。在介绍此配置时，曾简要解释过\
  \ `getServletFilters()` 方法。该方法再次展示在代码清单 14-22 中。\n\n```\npackage com.apress.prospring6.fourteen\n\
  class WebInitializer : AbstractAnnotationConfigDispatcherServletInitializer {\n\
  override fun getServletFilters(): Array {\nval cef = CharacterEncodingFilter().apply\
  \ {\nencoding = StandardCharsets.UTF_8.name()\nsetForceEncoding(true)\n}\nreturn\
  \ arrayOf(HiddenHttpMethodFilter(), cef)\n}\n// 其他方法已省略\n}\n代码清单 14-22\n在 Spring\
  \ 应用程序中支持 PUT 和 DELETE 方法的配置\n```\n\n![](img/524962_1_En_14_Figj_HTML.jpg) 一个警告符号。由一个带阴影三角形内的感叹号表示。 大多数开发人员在编写\
  \ Spring Web 应用程序时都会忘记这段配置，尤其是如果他们不经常这样做的话。毕竟，谁会经常从头开始编写 Spring Web 应用程序，以至于这些配置都成为例行公事呢？\n\
  \n#### 实现编辑歌手视图\n\n要编辑歌手，我们需要一种不同类型的视图，它不仅显示数据，而且以可编辑的组件形式呈现，我们还需要一个表单来提交编辑后的数据。对于用于提交数据以编辑服务器上现有记录的请求，REST\
  \ 约定使用 `PUT` 来区别于普通的 `POST` 请求，后者提交的数据用于创建新记录。\n\n在“实现显示歌手视图”一节中介绍的“编辑信息”链接，指向一个在可编辑字段中显示歌手详细信息的页面。一个\
  \ `GET` 请求被提交到 `/singer/{id}/edit` URL。Spring 使用提供的 `id` 将 `Singer` 实例的详细信息填充到模型中，并返回\
  \ `singers/edit` 视图逻辑名称。该页面包含一个表单，该表单使用 HTTP `POST` 请求将编辑后的数据提交到 `/singer/{id}`。\n\
  \n包含表单设计的 Thymeleaf 片段如代码清单 14-23 所示。\n\n```\n\n编辑\n\n名：\n\n缺少名\n\n姓：\n\n缺少姓\n\n\
  生日：\n\n缺少生日\n\n取消\n\n代码清单 14-23\n包含编辑歌手表单的 singers/edit.html 片段\n```\n\n`edit.html`\
  \ 模板中的重点如下：\n\n*   `th:object=\"${singer}\"`：此构造是模型对象；其属性用于填充字段。\n\n*   `th:field=\"\
  *{propName}\"`：此构造用于标记表单字段，同时也用于用 `singer` 对象的属性填充它们。\n\n*   `th:if=\"${#fields.hasErrors('labelName')}\"\
  `：此构造用于检查数据是否有任何错误。如果有，则显示包含该属性的元素，并用错误消息填充该元素。错误消息在表单提交后显示，Spring 执行验证，错误被添加到模型中，并且响应这次将数据和错误一起重定向回编辑视图。\n\
  \n*   `th:if=\"${message ne null}\"`：此构造测试 `message` 对象是否不为 `null`，并显示包含该属性的元素。在这种情况下，它用于添加一条额外的消息，告知用户\
  \ `singer` 未被保存的原因。\n\n如前所述，DELETE 和 PUT 方法受到 Thymeleaf 和 Spring 的支持。请注意，编辑表单具有属性\
  \ `th:method=\"put\"`，但如果你查看生成的 HTML，表单的 `method` 是 `POST`，但 Thymeleaf 在表单中添加了一个名为\
  \ `_method`、值为 `put` 的隐藏输入。此输入配置了实际期望的请求方法，并且由于之前在“处理删除请求”一节中提到的 `HiddenHttpMethodFilter`，Spring\
  \ 将这些 `POST` 请求视为 `PUT` 请求。\n\n现在我们有了视图，让我们看看显示它并处理提交数据的 Spring 代码是什么样的。两个处理方法的代码如代码清单\
  \ 14-24 所示。\n\n\n\n```\npackage com.apress.prospring6.fourteen.controllers\nimport\
  \ org.springframework.web.bind.annotation.PutMapping\n// 其他导入语句已省略\n@Controller\n\
  @RequestMapping(\"/singer/{id}\")\nclass OneSingerController(private val singerService:\
  \ SingerService, private val messageSource: MessageSource) {\n@GetMapping(path =\
  \ [\"/edit\"])\nfun showEditForm(@PathVariable(\"id\") id: Long, uiModel: Model):\
  \ String {\nval singer: Singer = singerService.findById(id)\nuiModel.addAttribute(\"\
  singer\", singer)\nreturn \"singers/edit\"\n}\n@PutMapping\nfun updateSingerInfo(\n\
  @Valid singer: Singer,\nbindingResult: BindingResult,\nuiModel: Model,\nlocale:\
  \ Locale\n): String {\nreturn if (bindingResult.hasErrors()) {\nuiModel.addAttribute(\"\
  message\", messageSource.getMessage(\n\"singer.save.fail\", arrayOf(), locale))\n\
  uiModel.addAttribute(\"singer\", singer)\n\"singers/edit\"\n} else {\nuiModel.asMap().clear()\n\
  val fromDb = singerService.findById(singer.id!!)\nfromDb.firstName = singer.firstName\n\
  fromDb.lastName = singer.lastName\nfromDb.birthDate = singer.birthDate\nsingerService.save(fromDb)\n\
  \"redirect:/singer/\" + singer.id\n}\n}\n...\n}\n清单 14-24\n用于显示编辑视图和处理 PUT 请求的处理程序方法\n\
  ```\n\n忽略 `@Valid` 注解以及所有与错误处理相关的代码——这些内容将在本章后续部分单独介绍。这段代码中值得注意的一点是引入了 `redirect:`\
  \ 关键字。在逻辑视图名称前加上 `\"redirect:\"` 前缀，是告诉 Spring 将该逻辑视图名称用作重定向 URL。在编辑操作成功的情况下，重定向到显示歌手详细信息的页面；如果存在验证错误，则用户返回编辑页面并显示错误信息。\n\
  \n编辑表单应如图 14-11 所示；否则说明部署项目时出现了问题。\n\n![](img/524962_1_En_14_Fig11_HTML.jpg)\n\n\
  一张截图。显示编辑歌手详细信息。编辑出生日期时出现日历窗口，其中 1925 年 9 月 16 日被高亮显示。\n\n图 14-11\n编辑视图\n\n####\
  \ 实现创建歌手视图\n\n实现创建歌手视图与实现编辑视图非常相似。为了增加趣味性，`create.html` 文件中的表单还包含一个文件选择器，用于上传歌手的照片。除此之外，该表单与\
  \ `edit.html` 中的表单几乎完全相同。清单 14-25 展示了包含创建歌手表单的 `pageContent` 片段。\n\n```\n\n创建\n\n\
  名：\n\n缺少名\n\n姓：\n\n缺少姓\n\n出生日期：\n\n缺少出生日期\n\n照片\n\n取消\n\n清单 14-25\nsingers/create.html\
  \ 表单\n```\n\n表单中包含文件选择器意味着表单中有一个 `file` 类型的输入字段，这进而意味着必须将表单的类型声明为 `enctype=\"multipart/form-data\"\
  `。这是一种用于表单的特殊类型，允许在提交的数据中包含完整的文件。歌手信息中有一个 `LONGBLOB` 类型的字段用于存储照片，该照片可以从客户端上传。这就是创建表单数据最终应存放的位置。但是，包含文件的用户数据需要在服务器端进行特殊处理。\n\
  \n长期以来，标准 Servlet 规范并不支持文件上传。因此，Spring MVC 曾与其他库（最常见的是 Apache Commons FileUpload\
  \ 库^(¹³⁹)）配合使用来实现此功能。Spring MVC 内置了对 Commons FileUpload 的支持。然而，从 Servlet 3.0 开始，文件上传已成为\
  \ Web 容器的内置功能。Apache Tomcat 7 支持 Servlet 3.0，并且 Spring 从 3.1 版本开始也支持 Servlet 3.0\
  \ 的文件上传。\n\n因此，在 Spring Web 应用程序中支持文件上传是一件轻而易举的事，尤其是在将应用程序部署到 Apache Tomcat 10 时。\n\
  \n让我们从处理提交数据的代码开始。由于创建新歌手并非对现有歌手进行操作，因此处理程序方法位于 `SingersController` 中。代码如清单 14-26\
  \ 所示。\n\n```\npackage com.apress.prospring6.fourteen.controllers\nimport org.springframework.web.bind.annotation.PostMapping\n\
  import org.springframework.http.MediaType\nimport com.apress.prospring6.fourteen.util.SingerForm\n\
  import com.apress.prospring6.fourteen.controllers.OneSingerController.Companion.setPhoto\n\
  // 其他导入语句已省略\n@Controller\n@RequestMapping(\"/singers\")\nclass SingersController(private\
  \ val singerService: SingerService, private val messageSource: MessageSource) {\n\
  // --------------- 创建 -------------------\n@GetMapping(value = [\"/create\"])\n\
  fun showCreateForm(uiModel: Model): String {\nuiModel.addAttribute(\"singerForm\"\
  , SingerForm())\nreturn \"singers/create\"\n}\n@PostMapping(consumes = [MediaType.MULTIPART_FORM_DATA_VALUE])\n\
  @Throws(\nIOException::class\n)\nfun create(\nsingerForm: @Valid SingerForm, bindingResult:\
  \ BindingResult, uiModel: Model,\nhttpServletRequest: HttpServletRequest,\nlocale:\
  \ Locale\n): String {\nreturn if (bindingResult.hasErrors()) {\nuiModel.addAttribute(\"\
  message\", messageSource.getMessage(\n\"singer.save.fail\", arrayOf(), locale))\n\
  uiModel.addAttribute(\"singerForm\", singerForm)\n\"singers/create\"\n} else {\n\
  uiModel.asMap().clear()\nval s = Singer().apply {\nfirstName = singerForm.firstName\n\
  lastName = singerForm.lastName\nbirthDate = singerForm.birthDate\n}\n// 处理文件上传\n\
  if (!singerForm.file!!.isEmpty) {\nsetPhoto(s, singerForm.file!!)\n}\nval created\
  \ = singerService.save(s)\n\"redirect:/singer/\" + UrlUtil.encodeUrlPathSegment(\n\
  created.id.toString(),\nhttpServletRequest\n)\n}\n}\n...\n}\n清单 14-26\n用于处理创建歌手实例表单提交数据的处理程序方法\n\
  ```\n\n表单中的内容无法直接映射到 `Singer` 实例，因为 `photo` 字段的值将在处理程序方法中映射为 `org.springframework.web.multipart.MultipartFile`，因此需要使用\
  \ `SingerForm` 类型。\n\n\n\n![](img/524962_1_En_14_Figk_HTML.jpg) 警告符号。它由带阴影三角形内的感叹号表示。 在复杂应用中，DAO\
  \ 层声明的实体类型永远不会在 Web 层的控制器中使用。通常会引入视图类型，这些类型包装一个或多个实体类型，仅暴露有用的字段，同时隐藏某些细节，例如标识符和密码等敏感数据，以及与\
  \ Web 上下文无关的字段，如 `version` 字段。\n\n`SingerForm` 是一种视图类型，仅声明了为 Web 层创建 `Singer` 实例所需的字段。该类型的字段还装饰有验证注解，这些注解与\
  \ `Singer` 类中对应字段声明的注解相匹配。\n\n`SingerForm` 如代码清单 14-27 所示。\n\n```\npackage com.apress.prospring6.fourteen.util\n\
  import jakarta.validation.constraints.NotNull\nimport jakarta.validation.constraints.Size\n\
  import org.springframework.format.annotation.DateTimeFormat\nimport org.springframework.web.multipart.MultipartFile\n\
  import java.time.LocalDate\nclass SingerForm {\n@NotEmpty(message = \"{NotEmpty.singer.firstName}\"\
  ) @Size(\nmin = 2,\nmax = 30,\nmessage = \"{Size.singer.firstName}\"\n) var  firstName:String?\
  \ = null\n@NotEmpty(message = \"{NotEmpty.singer.lastName}\") @Size(\nmin = 2,\n\
  max = 30,\nmessage = \"{Size.singer.lastName}\"\n) var lastName:String? = null\n\
  @DateTimeFormat(pattern = \"yyyy-MM-dd\")\nvar birthDate: LocalDate? = null\nvar\
  \ file: MultipartFile? = null\n}\n代码清单 14-27\nSingerForm 视图类型\n```\n\nSpring MVC\
  \ 足够智能，能够获取上传的内容，将其转换为 `MultipartFile`，并将其用作 `SingerForm` 中 `file` 字段的值。从 Spring\
  \ MVC 填充的 `SingerForm` 中，会创建一个 `Singer` 实例。`setPhoto(..)` 方法用于将上传的内容读取为字节数组，然后可以将其保存到\
  \ `SINGER` 表的 `LONGBLOG photo` 列中。\n\n但这足够了吗？事实证明这还不够，因为需要配置 Spring 的 `DispatcherServlet`\
  \ 以支持文件上传。在使用 Spring MVC 且兼容 Servlet 3.0+ 的 Web 容器中，配置文件上传支持需要两个步骤。\n\n首先，在定义创建\
  \ `DispatcherServlet` 所需所有内容的基于 Java 的配置类中，我们需要添加一个类型为 `StandardServletMultipartResolver`\
  \ 的 Bean。这是基于 Servlet 3.0 `jakarta.servlet.http.Part` API 的 `MultipartResolver`\
  \ 接口的标准实现。代码清单 14-28 展示了需要添加到 `WebConfig` 类中的此 Bean 的声明。\n\n```\npackage com.apress.prospring6.fourteen\n\
  import org.springframework.web.multipart.support.StandardServletMultipartResolver\n\
  // 其他导入语句已省略\n@Configuration\n@EnableWebMvc\n@ComponentScan(basePackages = [\"com.apress.prospring6.fourteen\"\
  ])\nclass WebConfig : WebMvcConfigurer, ApplicationContextAware {\n@Bean(name =\
  \ [DispatcherServlet.MULTIPART_RESOLVER_BEAN_NAME])\nopen fun multipartResolver()\
  \ = StandardServletMultipartResolver()\n// 其他配置代码已省略\n}\n代码清单 14-28\n支持文件上传所需的 Spring\
  \ Bean\n```\n\n第二步是在 Servlet 3.0+ 环境中启用 MultiParsing；这意味着 `WebInitializer` 实现需要一些更改。`AbstractDispatcherServletInitializer`\
  \ 抽象类中定义了一个名为 `customizeRegistration(..)` 的方法，而 `AbstractAnnotationConfigDispatcherServletInitializer`\
  \ 扩展了该类。必须实现此方法以注册一个 `jakarta.servlet.MultipartConfigElement` 实例。需要在 `WebInitializer`\
  \ 类中添加的配置片段如代码清单 14-29 所示。\n\n```\npackage com.apress.prospring6.fourteen\nimport\
  \ jakarta.servlet.MultipartConfigElement\nimport jakarta.servlet.ServletRegistration\n\
  // 其他导入语句已省略\nclass WebInitializer : AbstractAnnotationConfigDispatcherServletInitializer()\
  \ {\noverride fun getServletFilters(): Array {\nval cef = CharacterEncodingFilter().apply\
  \ {\nencoding = StandardCharsets.UTF_8.name()\nsetForceEncoding(true)\n}\nreturn\
  \ arrayOf(HiddenHttpMethodFilter(), cef)\n}\npublic override fun customizeRegistration(registration:\
  \ ServletRegistration.Dynamic) {\nregistration.setInitParameter(\"throwExceptionIfNoHandlerFound\"\
  , \"true\")\nregistration.setMultipartConfig(multipartConfigElement) //  \nsuper.customizeRegistration(registration)\n\
  }\nprivate val multipartConfigElement: MultipartConfigElement\nget() = MultipartConfigElement(null,\
  \ MAX_FILE_SIZE, MAX_REQUEST_SIZE,\nFILE_SIZE_THRESHOLD)\n// 其他配置代码已省略\ncompanion\
  \ object {\nprivate const val MAX_FILE_SIZE: Long = 5000000\n// 超过此大小，Spring 将抛出异常。\n\
  private const val MAX_REQUEST_SIZE: Long = 5000000\n// 超过此大小阈值后，文件将被写入磁盘\nprivate\
  \ const val FILE_SIZE_THRESHOLD = 0\n}\n}\n代码清单 14-29\nWebInitializer 的配置\n```\n\
  \n`MultipartConfigElement` 的第一个参数是文件应存储的临时位置。第二个参数是允许上传的最大文件大小，此处为 `5MB`。第三个参数表示请求的大小，此处也是\
  \ `5MB`。最后一个参数表示文件将被写入磁盘的阈值。\n\n要测试文件上传功能，请重新部署应用程序，并添加一个带有照片的新歌手。完成后，您将能够在显示视图中看到该照片。\n\
  \n\n\n### 启用 JSR-349（Bean 验证）\n\n这个话题之所以留到现在才讲，是为了让大家能专注于构建网页，并将功能与各种按钮和链接关联起来。确保用户请求被正确处理固然重要，但确保用户提交的数据正确无误也同样关键。这一点对于要保存到数据库中的数据尤为重要，因为无效数据可能导致无效结果，甚至在某些情况下，让黑客有机可乘，入侵你的系统（例如，通过\
  \ SQL 注入^(¹⁴⁰)）。\n\n**第** **11** **章**向你介绍了验证、格式化和类型转换，并提到为此目的声明的 Spring Bean 的真正威力，在处理用户提供数据的\
  \ Web 应用中最为有用。第 11 章向你介绍了 Spring 对 JSR-349（Bean 验证）^(¹⁴¹)（现已成为 Jakarta 库的一部分）的支持。清单\
  \ 14-27 介绍了 `SingerForm` 类，该类声明了一些字段，这些字段使用用户提供的数据进行初始化。用于创建 `Singer` 领域对象的 `Singer`\
  \ 类中也存在相同的验证注解。\n\n清单 14-30 展示了带有自定义错误消息代码的验证注解的 `SingerForm` 版本。\n\n```\npackage\
  \ com.apress.prospring6.fourteen.util\nimport jakarta.validation.constraints.*\n\
  import org.springframework.web.multipart.MultipartFile\n// 其他导入语句已省略\nclass SingerForm\
  \ {\n@NotEmpty @Size(\nmin = 2,\nmax = 30\n) var firstName: String? = null\n@NotEmpty\
  \ @Size(\nmin = 2,\nmax = 30\n) var lastName: String? = null\n@DateTimeFormat(pattern\
  \ = \"yyyy-MM-dd\")\nvar birthDate: LocalDate? = null\nvar file: MultipartFile?\
  \ = null\n}\n清单 14-30\n支持文件上传所需的 SingerForm 类型\n```\n\n这些约束被应用于各自的字段。请注意，对于验证消息，你使用花括号指定了一个消息键。这将导致从\
  \ `ResourceBundle` 中检索验证消息，从而支持国际化（i18n）。`@Size` 注解比较特殊，因为它声明了最小值和最大值；这些值通过 `{*}`\
  \ 语法从代码注入到国际化消息中。\n\n错误消息代码由 `org.springframework.validation.MessageCodesResolver`\
  \ Bean 解析，该 Bean 在配置验证时由 Spring 自动注册。Spring 使用的默认实现是 `org.springframework.validation.DefaultMessageCodesResolver`。这种类型的\
  \ Bean 会根据字段上用于强制执行约束的注解、使用该注解的类型名称以及字段名称，创建两个消息代码。例如，对于类 `SingerForm` 中的 `firstName`\
  \ 字段，对于 `@Size` 验证，此 Bean 将按以下顺序创建消息代码：\n\n*   验证名称 + 对象名称 + 字段名称 ⇒ `Size.singerForm.firstName`\n\
  *   验证名称 + 字段名称 ⇒ `Size.firstName`\n*   验证名称 + 字段类型 ⇒ `Size.java.lang.String`\n\
  *   验证名称 ⇒ `Size`\n\n然而，如果这些消息属性都没有声明，则默认消息将设置为注解全名 + “message” ⇒ `jakarta.validation.constraints.Size.message`。对于\
  \ `singerForm` 对象，这些消息未在我们的初始国际化文件中声明，但 `singer` 对象的那些消息已声明。它们如清单 14-31 所示。\n\n\
  ```\nNotEmpty.singer.firstName=请输入名字的值\nSize.singer.firstName=长度必须在 {2} 和 {1} 之间\n\
  NotEmpty.singer.lastName=请输入姓氏的值\nSize.singer.lastName=长度必须在 {2} 和 {1} 之间\ntypeMismatch.birthDate=格式无效，应为\
  \ \\'yyyy-mm-dd\\'\n清单 14-31\n对象 singer 字段 firstName 的验证错误消息代码\n```\n\n这里有两种解决方案：添加一份清单\
  \ 14-28 中消息的副本，并将 `singer` 替换为 `singerForm`；或者使用 `messages` 属性配置注解验证，以使用现有的一组消息。带有自定义错误消息的\
  \ `SingerForm` 版本如清单 14-32 所示。\n\n```\npackage com.apress.prospring6.fourteen.util\n\
  import jakarta.validation.constraints.*\n// 其他导入语句已省略\nclass SingerForm {\n@NotEmpty(message\
  \ = \"{NotEmpty.singer.firstName}\") @Size(\nmin = 2,\nmax = 30,\nmessage = \"{Size.singer.firstName}\"\
  \n) var firstName: String? = null\n@NotEmpty(message = \"{NotEmpty.singer.lastName}\"\
  ) @Size(\nmin = 2,\nmax = 30,\nmessage = \"{Size.singer.lastName}\"\n) var lastName:\
  \ String? = null\n@DateTimeFormat(pattern = \"yyyy-MM-dd\")\nvar birthDate: LocalDate?\
  \ = null\nvar file: MultipartFile? = null\n}\n清单 14-32\n带有自定义错误消息的 SingerForm 版本\n\
  ```\n\n为了在 Web 数据绑定过程中启用 JSR-349 验证，我们只需将 `@Valid` 注解应用于 `SingersController.create(..)`\
  \ 方法的 `SingerForm` 参数，以及 `OneSingerController.updateSingerInfo(..)` 方法的 `Singer`\
  \ 参数。清单 14-33 展示了这两个方法的签名。\n\n```\npackage com.apress.prospring6.fourteen.controllers\n\
  import jakarta.validation.Valid\n// 其他导入语句已省略\n@Controller\n@RequestMapping(\"/singer/{id}\"\
  )\nclass OneSingerController {\n@PutMapping\nfun updateSingerInfo(@Valid singer:Singer,\n\
  bindingResult:BindingResult,\nuiModel:Model, locale:Locale):String {\n// 方法体已省略\n\
  }\n// 其他方法已省略\n}\n@Controller\n@RequestMapping(\"/singers\")\nclass SingersController\
  \ {\n@PostMapping(consumes = MediaType.MULTIPART_FORM_DATA_VALUE)\nfun create(@Valid\
  \ singerForm:SingerForm,\nbindingResult:BindingResult, uiModel:Model,\nhttpServletRequest:HttpServletRequest,\n\
  locale:Locale):String {\n// 方法体已省略\n}\n// 其他方法已省略\n}\n清单 14-33\n带有验证功能的控制器\n```\n\
  \n我们还希望 JSR-349 验证消息使用与视图相同的 `ResourceBundle` 实例。为此，我们需要在 `DispatcherServlet` 配置（即\
  \ `WebConfig` 类）中配置验证器，如清单 14-34 所示。\n\n```\npackage com.apress.prospring6.fourteen\n\
  import org.springframework.validation.Validator\nimport org.springframework.validation.beanvalidation.LocalValidatorFactoryBean\n\
  // 其他导入语句已省略\n@Configuration\n@EnableWebMvc\n@ComponentScan(basePackages = [\"com.apress.prospring6.fourteen\"\
  ])\nopen class WebConfig : WebMvcConfigurer, ApplicationContextAware {\nprivate\
  \ var applicationContext: ApplicationContext? = null\n@Throws(BeansException::class)\n\
  override fun setApplicationContext(applicationContext: ApplicationContext) {\nthis.applicationContext\
  \ = applicationContext\n}\n@Bean\nopen fun validator(): Validator = LocalValidatorFactoryBean().apply\
  \ {\nsetValidationMessageSource(messageSource())\n}\noverride fun getValidator()\
  \ = validator()\n@Bean\nopen fun messageSource(): MessageSource\n= ReloadableResourceBundleMessageSource().apply\
  \ {\nsetBasename(\"classpath:i18n/global\")\nsetDefaultEncoding(StandardCharsets.UTF_8.name())\n\
  setUseCodeAsDefaultMessage(true)\nsetFallbackToSystemLocale(true)\n// # -1 : 从不重新加载,\
  \ 0 始终重新加载\n// setCacheSeconds(0);\n}\n...\n}\n清单 14-34\nSpring 验证配置\n```\n\n首先，定义了一个验证器\
  \ Bean，其类为 `LocalValidatorFactoryBean`，用于支持 JSR-349。请注意，我们将 `validationMessageSource`\
  \ 属性设置为引用已定义的 `MessageSource` Bean，这会指示 JSR-349 验证器根据代码从 `MessageSource` Bean 中查找消息。然后，实现了\
  \ `getValidator()` 方法，以返回我们定义的验证器 Bean。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n好了，现在我们可以测试验证功能了。调出创建歌手的视图，在不插入任何数据的情况下点击“保存”按钮。返回的页面现在会报告多个验证错误，如图 14-12 所示。\n\
  \n![](img/524962_1_En_14_Fig12_HTML.jpg)\n\n创建新歌手窗口的截图。姓和名列有字符长度限制。出生日期采用年、月、日格式。照片有选择文件的选项，但未选择任何文件。在保存选项下方，显示一条消息：“保存歌手失败”。\n\
  \n图 14-12\n\n显示验证错误的页面\n\n切换到德语（DE）语言并执行相同操作。这次，消息将以德语显示。\n\n视图基本完成；我们现在需要做的就是处理潜在的错误。\n\
  \n### 异常处理\n\n当执行处理器方法时，可能会出现问题。有些情况，比如尝试访问一个不存在的 URL，可能是意料之中的，但其他情况则不然。在这两种情况下，都必须记录活动并通知最终用户。Spring\
  \ MVC 使用 `HandlerExceptionResolver` 的实现来捕获和处理异常。处理 MVC 异常的典型方法是准备一个模型并选择一个错误视图。可以按链式顺序使用多个异常解析器，以不同的方式处理不同类型的异常。Spring\
  \ MVC 支持清单 14-35 中所示的默认解析器（在 Spring Web 应用程序中，这些类型的解析器会自动为您创建），它们声明在 `spring-webmvc.jar`\
  \ 包中的 `DispatcherServlet.properties` 文件中。\n\n```\norg.springframework.web.servlet.HandlerExceptionResolver=\n\
  o.s.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver,\\\no.s.web.servlet.mvc.annotation.ResponseStatusExceptionResolver,\\\
  \no.s.web.servlet.mvc.support.DefaultHandlerExceptionResolver\n清单 14-35\nDispatcherServlet.properties\
  \ 默认异常解析器\n```\n\n默认的异常解析器执行以下功能：\n\n*   `ExceptionHandlerExceptionResolver`：通过调用在控制器或使用\
  \ `@ControllerAdvice` 注解的类中找到的、使用 `@ExceptionHandler` 注解的方法来解析异常。\n\n*   `ResponseStatusExceptionResolver`：解析使用\
  \ `@ResponseStatus` 注解的方法，并将它们映射到使用此注解配置的状态码。\n\n*   `DefaultHandlerExceptionResolver`：解析由\
  \ Spring MVC 引发的异常，并将它们映射到 HTTP 状态码。在处理 REST 请求时，与此类等效的类是 `ResponseEntityExceptionHandler`。\n\
  \n`SimpleMappingExceptionResolver` 类不在前面的列表中，但可以声明和配置此类型的 Bean，以将异常类映射到视图名称，这对于在浏览器应用程序中呈现错误页面很有帮助。异常解析器提供与抛出异常的上下文相关的信息；即正在执行的处理器方法以及调用它时使用的参数。\n\
  \n让我们从一个最简单的例子开始：人们在编写 URL 时总是会犯错。让我们尝试访问以下 URL：`http://localhost:8080/ch14/missing`。由于没有配置异常处理，Spring\
  \ 将尝试使用 `InternalResourceViewResolver` Bean（或找到的任何其他视图解析器）来查找视图。由于找不到视图，它假定这必须是一个静态页面并尝试渲染它。但它未能提供正确的页面，于是\
  \ Apache Tomcat 介入。它显示其默认的错误页面，让用户知道发生了什么，如图 14-13 所示。\n\n![](img/524962_1_En_14_Fig13_HTML.jpg)\n\
  \n网页截图。显示 HTTP 状态 404 未找到。列出了类型、消息、描述和 Apache Tomcat 10.0.27。\n\n图 14-13\n\nApache\
  \ Tomcat 针对缺失视图的默认错误页面\n\n默认的错误消息很好地描述了问题，并为缺失的资源返回了正确的 HTTP 状态码：404。但这仍然不行，因为这看起来像是一个技术异常或开发问题，而推荐的做法是不让最终用户知道这一点。此外，没有必要向最终用户提供这么多细节，因为他们不应该被应用程序的内部问题所困扰。那么，我们能做什么呢？开发\
  \ Web 应用程序的一条规则是保持外观和感觉的一致性，因此，我们可以显示一个自定义的错误视图，而不是 Apache Tomcat 页面。开箱即用，当找不到视图或处理器方法时，Spring\
  \ MVC 不提供默认的（后备）错误页面。它也不会抛出异常；它只是将显示适当消息的责任转发给服务器。要覆盖此行为，我们需要对 Spring Web 应用程序配置进行以下更改。\n\
  \n首先，自定义 `DispatcherServlet`，使其在找不到处理器方法时抛出 `org.springframework.web.servlet.NoHandlerFoundException`。这是通过在\
  \ `WebInitializer` 类中重写 `AbstractDispatcherServletInitializer` 类的 `customizeRegistration(..)`\
  \ 方法来实现的，如清单 14-36 所示。\n\n```\npackage com.apress.prospring6.fourteen\nimport jakarta.servlet.ServletRegistration\n\
  // 其他导入方法已省略\nclass WebInitializer\n: AbstractAnnotationConfigDispatcherServletInitializer\
  \ {\noverride fun customizeRegistration(\nregistration:ServletRegistration.Dynamic)\
  \ {\nregistration.setInitParameter(\n\"throwExceptionIfNoHandlerFound\", \"true\"\
  )\nsuper.customizeRegistration(registration)\n}\n// 其他配置方法已省略\n}\n清单 14-36\n自定义\
  \ DispatcherServlet 以在未找到处理器时抛出 NoHandlerFoundException\n```\n\n此配置声明了一个名为 `throwExceptionIfNoHandlerFound`\
  \ 的初始化参数，并将其设置为 `\"true\"`，这会导致 `DispatcherServlet` 在找不到处理器方法时抛出 `org.springframework.web.servlet.NoHandlerFoundException`。\n\
  \n![](img/524962_1_En_14_Figl_HTML.jpg) 一个信息符号。它由一个带阴影圆圈内的小写字母 i 表示。  **注意**，如果使用了\
  \ `DefaultServletHttpRequestHandler`，则添加此配置不会起任何作用，因为请求将始终被转发给它，并且在这种情况下永远不会抛出 `NoHandlerFoundException`。您可以通过查看日志来验证这一点。如果您看到类似于以下输出片段的内容，则说明您还有更多步骤需要完成：\n\
  \n```\nDEBUG o.s.w.s.DispatcherServlet - GET \"/ch14/missing\", parameters={}\n\
  DEBUG o.s.w.s.h.SimpleUrlHandlerMapping - Mapped to org.springframework.web.servlet.resource.DefaultServletHttpRequestHandler@763956dc\n\
  DEBUG o.s.w.s.DispatcherServlet - Completed 404 NOT_FOUND\n```\n\n因此，如果在您的配置中有以下内容：\n\
  \n```\noverride fun configureDefaultServletHandling(\nconfigurer:DefaultServletHandlerConfigurer)\
  \ {\nconfigurer.enable()\n}\n```\n\n如果您希望抛出 `NoHandlerFoundException`，只需删除此方法，并在没有\
  \ `DefaultServletHttpRequestHandler` 的情况下运行。\n\n但是，如果没有一个自定义的 `HandlerExceptionResolver`\
  \ 类型的 Bean 来执行除简单告知应用程序服务器该做什么之外的其他操作，那么这也不会起任何作用。这就引出了下一个更改。接下来，一个选择是实现 `HandlerExceptionResolver`\
  \ 接口或扩展任何实现它的类，并为 `doResolveException(...`​`)` 方法提供所需的实现，该方法将返回所需的视图，如清单 14-37 所示。\n\
  \n\n\n```\npackage com.example.problem\nimport org.springframework.http.HttpStatus\n\
  import org.springframework.web.servlet.ModelAndView\nimport org.springframework.web.servlet.NoHandlerFoundException\n\
  import org.springframework.web.servlet.handler.SimpleMappingExceptionResolver\n\
  import javax.servlet.http.HttpServletRequest\nimport javax.servlet.http.HttpServletResponse\n\
  class MissingExceptionResolver : SimpleMappingExceptionResolver() {\noverride fun\
  \ doResolveException(\nrequest: HttpServletRequest,\nresponse: HttpServletResponse,\
  \ handler: Any, ex: Exception\n): ModelAndView? {\nif (ex is NoHandlerFoundException)\
  \ {\nval model = ModelAndView(\"error\")\nmodel.addObject(\n\"problem\", \"URL not\
  \ supported : \"\n+ request.requestURI\n)\nresponse.status = HttpStatus.NOT_FOUND.value()\n\
  return model\n}\nreturn null\n}\n}\n清单 14-37\nHandlerExceptionResolver 实现\n```\n\
  \n![](img/524962_1_En_14_Figm_HTML.jpg) 一个带阴影圆圈内的感叹号符号。 请注意，错误处理使用了 `ModelAndView`\
  \ 类型。由于异常处理方法并非在控制器类中声明的普通处理方法，因此无法将其结果映射到视图模板。该类型的对象在 Web MVC 框架中是 `Model` 和 `View`\
  \ 对象的持有者，用于在单个对象中同时返回模型和视图。这使得 Spring MVC 能够在将错误视图发送给用户之前，根据处理请求时抛出的异常，使用不同的错误消息对其进行自定义。\n\
  \n以下是关于 `HandlerExceptionResolver` 实现的一些细节：\n\n*   它可以返回一个指向错误视图的 `ModelAndView`，通常对于相关类别的错误或整个应用程序，该视图是相同的。\n\
  *   如果异常在解析器内部得到处理，它可以返回一个空的 `ModelAndView`。\n*   如果异常仍未解决，它可以返回 `null`，从而允许其他异常解析器尝试处理它。如果没有任何异常解析器能够处理该异常，它将被向上冒泡到\
  \ `Servlet` 容器。\n\n![](img/524962_1_En_14_Fign_HTML.jpg) 一个警告符号。它由一个带阴影三角形内的感叹号表示。 在清单\
  \ 14-37 中，请注意该方法返回了一个实际的 `ModelAndView` 实例。`HandlerExceptionResolve` 实现的设计目的是确保异常被解析为一个视图，或者允许其向上冒泡到\
  \ `Servlet` 容器。\n\n下一步是声明一个此类型的 bean，并赋予其最低优先级（最高优先级），这样每当应用程序中出现问题时，将首先使用此异常解析器。\n\
  \n将多个 `SimpleMappingExceptionResolver` 映射到各种异常类型的替代方案是声明不同的错误处理方法，并将它们全部分组到一个使用\
  \ `@ControllerAdvice` 注解的类中。此注解是使用 `@Component` 进行元注解的，这意味着将创建一个此类型的 bean，它将拦截任何使用\
  \ `@ExceptionHandler` 注解的处理方法异常，这些异常在注解了 `@ControllerAdvice` 的类中声明了处理方法，并渲染相应的错误视图。清单\
  \ 14-38 展示了一个使用 `@ControllerAdvice` 注解的类。\n\n```\npackage com.apress.prospring6.fourteen.problem\n\
  import jakarta.servlet.http.HttpServletRequest\nimport org.springframework.http.HttpStatus\n\
  import org.springframework.web.bind.annotation.ControllerAdvice\nimport org.springframework.web.bind.annotation.ExceptionHandler\n\
  import org.springframework.web.bind.annotation.ResponseStatus\nimport org.springframework.web.servlet.ModelAndView\n\
  import org.springframework.web.servlet.NoHandlerFoundException\n@ControllerAdvice\n\
  class GlobalExceptionHandler {\n@ExceptionHandler(NotFoundException::class)\n@ResponseStatus(HttpStatus.NOT_FOUND)\n\
  fun handle(ex: NotFoundException): ModelAndView {\nval mav = ModelAndView()\nmav.addObject(\"\
  problem\", ex.message)\nmav.viewName = \"error\"\nreturn mav\n}\n@ExceptionHandler(NoHandlerFoundException::class)\n\
  @ResponseStatus(HttpStatus.NOT_FOUND)\nfun notFound(req: HttpServletRequest): ModelAndView\
  \ {\nval mav = ModelAndView()\nmav.addObject(\"problem\", \"Not Supported \" + req.requestURI)\n\
  mav.viewName = \"error\"\nreturn mav\n}\n}\n清单 14-38\nGlobalExceptionHandler 实现\n\
  ```\n\n为了测试此异常处理程序是否按预期工作，你可以尝试访问 `http://localhost:8080/ch14/singer/99` 和 `http://localhost:8080/ch14/missing`。请注意，抛出了不同类型的异常，这会导致向错误视图模型添加不同的错误消息，如图\
  \ 14-14 所示。\n\n![](img/524962_1_En_14_Fig14_HTML.jpg)\n\n歌手错误页面的两个截图。1\\. 显示了一个意外错误，ID\
  \ 为 99 的歌手不存在。2\\. 显示了一个意外错误，不支持 c h 14 missing。\n\n图 14-14\n自定义错误消息\n\n你应该查看带有正确异常消息的错误页面。检查响应内容，你会注意到虽然显示了错误页面，但\
  \ HTTP 状态码仍然是 200。由于用户试图访问一个不存在的资源，HTTP 状态码应为 404。这可以通过使用 `@ResponseStatus(HttpStatus.NOT_FOUND)`\
  \ 注解异常处理方法轻松实现，这在清单 14-38 中已经完成。\n\n关于处理由处理方法抛出的异常，你需要了解的大致就是这些了。\n\n\n\n### 迁移至\
  \ Spring Boot\n\n迁移至 Spring Boot 使得创建 MVC 应用更加简单，因为 Spring Boot 应用不再需要 Apache Tomcat\
  \ 服务器。同时，项目结构也更简洁，并且无需使用特殊插件来打包应用。\n\n要创建一个完整的 Spring Web 应用，意味着除了 Web 层和视图模板层之外，还需要\
  \ DAO 层和服务层。这意味着你需要用于持久化和事务的特定 Boot 启动器库。如果你已经阅读本章至此，你会知道还需要验证功能。完整的依赖项列表如图 14-15\
  \ 所示。\n\n![](img/524962_1_En_14_Fig15_HTML.jpg)\n\nSpring Boot Web 应用依赖项的截图。从第 14\
  \ 章 boot 的 compile classpath 菜单中高亮显示了四个应用依赖项。\n\n图 14-15\n\nSpring Boot Web 应用依赖项\n\
  \n项目的结构也必须改变，因为所有与界面相关的文件和资源文件都可以放置在 `resources` 目录下。项目内部结构的变化如图 14-16 所示。请忽略 `pom.xml`\
  \ 文件，因为我们使用 Gradle 作为构建工具。\n\n![](img/524962_1_En_14_Fig16_HTML.jpg)\n\nSpring Boot\
  \ Web 应用依赖项的截图。第 14 章和第 14 章 boot 的依赖项用箭头连接。d b 和 log back 连接到应用。i18 n 连接到 i 18\
  \ n。images 连接到 images，styles 连接到 styles。Views 连接到 templates。Blue 和 green properties\
  \ 连接到 blue 和 green properties。\n\n图 14-16\n\nSpring Boot Web 应用项目结构\n\n橙色箭头显示的文件不仅名称发生了变化，位置也发生了改变。例如，数据源配置文件不再需要，因为其内容已通过使用\
  \ Spring Boot 配置属性进行配置。`logback.xml` 文件也不再需要，因为 Logback 配置是通过使用 Spring Boot 属性完成的。而包含\
  \ Thymeleaf 模板的 `views` 目录已重命名为 `templates`，因此无需使用显式的 Bean 配置来配置 Thymeleaf 支持，可以直接使用\
  \ Spring Boot 的默认配置。\n\n用于主题配置的 `blue.properties` 和 `green.properties` 文件已从 `classes`\
  \ 目录移至 `static` 文件夹的根目录，以便利用 Spring Boot 默认的通过 Bean 进行主题配置的方式，因为自定义它们很麻烦。\n\n接下来要分析的是\
  \ Spring Boot 的 `application-dev.yaml` 文件内容，如代码清单 14-39 所示。\n\n```\n# web server\
  \ configuration\nserver:\nport: 8081\nservlet:\ncontext-path: /\ncompression:\n\
  enabled: true\naddress: 0.0.0.0\n# application configuration\nspring:\nmvc:\nhiddenmethod:\n\
  filter:\nenabled: true\n# internationalization configuration\nmessages:\nbasename:\
  \ i18n/global\nencoding: UTF-8\nalways-use-message-format: true\n# file upload configuration\n\
  servlet:\nmultipart:\nenabled: true\nmax-file-size: 10MB\nmax-request-size: 12MB\n\
  # view resolver configuration\nthymeleaf:\nprefix: classpath:templates/\nsuffix:\
  \ .html\nmode: HTML\ncache: false\ncheck-template: false\nreactive:\nmax-chunk-size:\
  \ 8192\n# data source configuration\ndatasource:\ndriverClassName: org.mariadb.jdbc.Driver\n\
  url: jdbc:mariadb://localhost:3306/musicdb?useSSL=false\nusername: prospring6\n\
  password: prospring6\nhikari:\nmaximum-pool-size: 25\njpa:\ngenerate-ddl: false\n\
  properties:\nhibernate:\njdbc:\nbatch_size: 10\nfetch_size: 30\nmax_fetch_depth:\
  \ 3\nshow-sql: true\nformat-sql: false\nuse_sql_comments: false\nhbm2ddl:\nauto:\
  \ none\n# Logging config\nlogging:\npattern:\nconsole: \"%-5level: %class{0} - %msg%n\"\
  \nlevel:\nroot: INFO\norg.springframework.boot: DEBUG\ncom.apress.prospring6.fourteen:\
  \ INFO\n代码清单 14-39\nSpring Boot Web 应用配置\n```\n\n配置的每个部分都以注释开头，说明其作用范围。以下列表进一步解释了每个部分中使用的属性：\n\
  \n*   `# web server configuration`：此部分配置应用可访问的 URL。将地址设置为 `0.0.0.0` 允许应用在运行该计算机的所有网络地址上均可访问；例如，`http://localhost:8081/`、`http://127.0.0.1:8081/`\
  \ 等。\n\n*   `# HTTP Method filter`：将 `spring.mvc.hiddenmethod.filter.enabled` 设置为\
  \ `true`，此部分是 Spring Boot 中配置用于支持 PUT 和 DELETE HTTP 方法的过滤器的等效方式。\n\n*   `# internationalization\
  \ configuration`：此部分配置国际化文件的位置、名称、编码等。\n\n*   `# file upload configuration`：此部分配置支持文件上传所需的所有组件。\n\
  \n*   `# view resolver configuration`：此部分配置 Thymeleaf 视图模板的位置、编码、最大大小等。Spring Boot\
  \ 使用此配置来配置 Thymeleaf 引擎和 Thymeleaf 解析器 Bean。\n\n*   `# data source configuration`：此部分将所有数据源配置（包括持久化）分组在一起。\n\
  \n*   `# Logging config`：此部分配置日志记录。\n\n无法放入 `application-dev.yaml` 的配置部分被放置在典型的配置类中，并使用\
  \ `@Configuration` 注解。\n\n![](img/524962_1_En_14_Figo_HTML.jpg) 一个创意的符号。它由一个电灯泡表示。 `HibernateCfg`\
  \ 类是为了解决 Spring Data JPA 与 MariaDB 中与数据库对象命名相关的 bug 而采取的变通方法。没有这个类，仓库就无法映射到表，因为\
  \ Spring Boot 会查找名为 `musicdb.singer` 的表但找不到它，因为 MariaDB Docker 容器是通过使用大写字母声明对象来配置的。由于将\
  \ Docker SQL 查询转换为小写工作量太大，因此有机会引入一些高级配置示例。\n\n`HibernateCfg` 如代码清单 14-40 所示。\n\n\
  ```\npackage com.apress.prospring6.fourteen.boot\nimport org.hibernate.boot.model.naming.Identifier\n\
  import org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl\nimport\
  \ org.hibernate.engine.jdbc.env.spi.JdbcEnvironment\nimport org.springframework.context.annotation.Bean\n\
  import org.springframework.context.annotation.Configuration\n@Configuration(proxyBeanMethods\
  \ = false)\nopen class HibernateCfg {\n@Bean\nopen fun caseSensitivePhysicalNamingStrategy():\
  \ PhysicalNamingStrategyStandardImpl {\nreturn object : PhysicalNamingStrategyStandardImpl()\
  \ {\noverride fun toPhysicalTableName(logicalName: Identifier,\ncontext: JdbcEnvironment):\
  \ Identifier {\nreturn apply(logicalName, context)!!\n}\noverride fun toPhysicalColumnName(logicalName:\
  \ Identifier,\ncontext: JdbcEnvironment): Identifier {\nreturn apply(logicalName,\
  \ context)!!\n}\nprivate fun apply(name: Identifier?, context: JdbcEnvironment):\
  \ Identifier? {\nif (name == null) {\nreturn null\n}\nval builder = StringBuilder(name.text.replace('.',\
  \ '_'))\nvar i = 1\nwhile (i < builder.length - 1) {\nif (isUnderscoreRequired(builder[i\
  \ - 1], builder[i], builder[i + 1])) {\nbuilder.insert(i++, '_')\n}\ni++\n}\nreturn\
  \ Identifier.toIdentifier(builder.toString().uppercase(Locale.getDefault()))\n}\n\
  private fun isUnderscoreRequired(before: Char, current: Char, after: Char): Boolean\
  \ {\nreturn Character.isLowerCase(before) && Character.isUpperCase(current) &&\n\
  Character.isLowerCase(after)\n}\n}\n}\n}\n代码清单 14-40\nHibernateCfg 类\n```\n\n\n\n\
  此处扩展的 `PhysicalNamingStrategyStandardImpl` 类本身实现了 `PhysicalNamingStrategy`，这是一个可插拔的策略契约，用于对数据库对象名称应用物理命名规则。`@Configuration(proxyBeanMethods\
  \ = false)` 配置用于排除此类中声明的 Bean 被代理，以强制执行 Bean 生命周期行为。这意味着通过调用 `caseSensitivePhysicalNamingStrategy()`\
  \ 方法创建的任何 Bean 都将获得 `PhysicalNamingStrategyStandardImpl bean` 的一个新副本。\n\n`WebConfig`\
  \ 类是一个扩展了 `WebMvcConfigurer` 的 Spring Web 配置类，用于配置区域设置和主题拦截器及解析器。这些配置不会被 Spring\
  \ Boot 自动配置，因此这项工作留给了开发者。`WebConfig` 类如清单 14-41 所示。\n\n```\npackage com.apress.prospring6.fourteen.boot\n\
  import java.util.Locale\n// 更多导入语句已省略\n@Configuration\n@ComponentScan(basePackages\
  \ = [\"com.apress.prospring6.fourteen.boot\"])\nopen class WebConfig : WebMvcConfigurer\
  \ {\n@Bean\nopen fun localeChangeInterceptor() = LocaleChangeInterceptor().apply\
  \ {\nparamName = \"lang\"\n}\n@Bean\nopen fun themeChangeInterceptor() = ThemeChangeInterceptor().apply\
  \ {\nparamName = \"theme\"\n}\n@Bean\nopen fun localeResolver() = CookieLocaleResolver().apply\
  \ {\nsetDefaultLocale(Locale.ENGLISH)\nsetCookieMaxAge(3600)\nsetCookieName(\"locale\"\
  )\n}\n@Bean\nopen fun themeResolver() = CookieThemeResolver().apply {\ndefaultThemeName\
  \ = \"green\"\ncookieMaxAge = 3600\ncookieName = \"theme\"\n}\n@Bean\nopen fun webChangeInterceptor()\
  \ = WebContentInterceptor().apply {\ncacheSeconds = 0\nsetSupportedMethods(\"GET\"\
  , \"POST\", \"PUT\", \"DELETE\")\n}\noverride fun addInterceptors(registry: InterceptorRegistry)\
  \ {\nregistry.addInterceptor(localeChangeInterceptor()).addPathPatterns(\"/*\")\n\
  registry.addInterceptor(themeChangeInterceptor())\nregistry.addInterceptor(webChangeInterceptor())\n\
  }\n}\n清单 14-41\nWebConfig 类\n```\n\n![](img/524962_1_En_14_Figp_HTML.jpg) 一个带阴影圆圈内感叹号的符号。 请注意，此类没有使用\
