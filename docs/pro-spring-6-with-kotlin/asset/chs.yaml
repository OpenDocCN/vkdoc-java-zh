  @EnableJpaRepositories(\"com.apress.prospring6.sixteen.boot.repos\")\n@EnableTransactionManagement\n\
  @SpringBootApplication\nopen class Chapter16NativeApplication {\ncompanion object\
  \ {\n@JvmStatic\nfun main(args: Array) {\nSpringApplication.run(Chapter16NativeApplication::class.java,\
  \ *args)\n}\n}\n}\n代码清单 16-4\nChapter16NativeApplication 类\n```\n\n如你所见，代码中没有任何需要修改的地方，以使此应用程序符合编译为\
