  语句验证目标对象是 `BloggerWithAddress` 的实例还是其超类的实例。


  `pushNestedPath(..)` 和 `popNestedPath(..)` 这两个方法用于为错误消息生成嵌套的错误属性。例如，当当前路径为 `blogger.`
  时，调用 `pushNestedPath("address")` 会导致路径变为 `blogger.address.`，这意味着错误属性相对于此路径。然后，调用
  `popNestedPath()` 会使路径恢复为 `blogger.`。


