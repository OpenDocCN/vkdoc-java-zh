- "# 13. Spring Remoting\n\n到目前为止，本书中的项目都相对简单，因为它们可以在单个虚拟机上运行，并且与之交换数据的唯一组件是数据库（可以是本地或远程的）。这类应用程序被称为*单体应用*，所涉及的通信类型称为**进程间通信**。\n\
  \n然而，大多数企业应用程序都很复杂，由多个部分组成，并与其他应用程序通信。以一家销售产品的公司为例：当客户下订单时，订单处理系统处理该订单并生成一笔交易。在处理订单期间，会向库存系统查询产品是否有货。订单确认后，会向履行系统发送通知，以便将产品交付给客户。最后，信息被发送到会计系统，生成发票并处理付款。\n\
  \n这个业务流程并非由单个应用程序完成，而是由多个应用程序协同工作完成。有些应用程序可能是内部开发的，另一些则可能从外部供应商处购买。此外，这些应用程序可能运行在不同地点的不同机器上，并使用不同的技术和编程语言（例如\
  \ Java、.NET 或 C++）实现。在设计和实现应用程序时，为了构建高效的业务流程，在应用程序之间进行握手始终是一项关键任务。因此，应用程序需要通过各种协议和技术的远程支持，才能在企业环境中良好地运作。\n\
  \n在早期，应用程序之间的通信是通过*远程处理*和*Web 服务*实现的。在远程处理中，参与通信过程的应用程序可能位于同一台计算机上，也可能位于同一网络或不同网络中的两台不同计算机上。在远程处理中，两个应用程序彼此了解。一个应用程序对象的代理会在另一个应用程序上创建，这使得执行外部（远程）方法看起来就像调用本地方法一样。\n\
  \n在 Java 世界中，自 Java 诞生之初就存在远程处理支持。在早期（Java 1.x 时代），大多数远程处理需求都是通过使用传统的 TCP 套接字或 Java\
  \ 远程方法调用（RMI）来实现的。J2EE 出现后，EJB 和 JMS 成为应用间服务器通信的常见选择。\n\nXML 和互联网的快速发展催生了使用基于 HTTP\
  \ 的 XML 进行远程支持的技术，也称为*Web 服务*。该术语包括任何基于 HTTP 的远程处理技术，包括用于基于 XML 的 RPC 的 Java API（JAX-RPC）、用于\
  \ XML Web 服务的 Java API（JAXWS）以及基于 HTTP 的技术（例如，Hessian^(¹⁰⁹) 和 Burlap^(¹¹⁰)）。Spring\
  \ 曾经有自己的基于 HTTP 的远程处理支持，称为 Spring HTTP Invoker。在随后的几年里，为了应对互联网的爆炸式增长和更具响应性的 Web\
  \ 应用程序需求（例如，通过 Ajax），更轻量级、更高效的应用程序远程处理支持对于企业的成功变得至关重要。因此，用于 RESTful Web 服务的 Java\
  \ API（JAX-RS）应运而生并迅速流行起来。其他协议，如 Comet 和 HTML5 WebSocket，也吸引了许多开发者。毋庸置疑，远程处理技术正在快速演进。\n\
  \n如今，最流行的应用程序架构风格是*微服务*，即彼此独立的小模块/元素。有时，它们会相互依赖，甚至依赖于数据库。将应用程序分解为更小的元素可以带来结构的可扩展性和效率。这也要求服务之间进行高效的通信，如果事先没有考虑周全，可能会造成严重破坏。微服务应用程序组件之间的通信也称为**服务间通信**。\n\
  \n在选择服务之间如何通信时，绝对的领导者往往是 *HTTP*。通过 HTTP 的通信可以是*同步*的，即一个服务必须等待另一个服务完成后才能返回；这会导致两个服务之间的强耦合。通过\
  \ HTTP 的通信也可以是*异步*的，即服务接收来自第一个服务的请求后立即返回一个 URL。HTTP 的替代方案是 *gRPC*^(¹¹¹)，这是一个现代的、开源的、高性能的远程过程调用（RPC）框架，可以在任何环境中运行。遗憾的是，目前没有用于处理\
  \ gRPC 的 Spring 模块。\n\n微服务应用程序中采用的第二种通信模式是*基于消息的通信*。最流行的协议是高级消息队列协议（AMQP）。与 HTTP\
  \ 不同，所涉及的服务不直接相互通信，而是通过消息代理（Kafka、RabbitMQ、ActiveMQ、SNS 等）进行交互。\n\n因此，本章的标题有些误导性。其内容将涵盖在\
  \ Spring 应用程序之间进行远程通信的几种方式，但 *Spring Remoting* 这个术语在某种程度上已经过时了。\n\n\n\n## 使用 HTTP\
  \ 进行通信\n\n使用 HTTP 进行通信显然意味着应用程序必须是 Web 应用程序，或者暴露一些 REST API 来支持这些调用。为了展示两个 Spring\
