  ```


  ![](img/524962_1_En_12_Figb_HTML.jpg) 阴影圆圈内的小写 i 符号。 `AsyncService` Bean 是使用 `@Bean`
  声明的，以避免被之前引入的任务调度配置类捕获并添加到不属于它的上下文中。这是一个技术决策，旨在避免冲突和日志污染，基本上是将示例作用域分开。


