  #### 使用 MappingSqlQuery<T> 查询数据


  Spring 提供了 `MappingSqlQuery<T>` 抽象类来模拟查询操作。基本上，我们通过使用数据源和查询字符串来构造一个 `MappingSqlQuery<T>`
  类。然后，我们实现 `mapRow()` 方法，将每个 `ResultSet` 记录映射到相应的领域对象。让我们从创建 `SelectAllSingers` 类（表示选择所有歌手的查询操作）开始，该类扩展了
  `MappingSqlQuery<T>` 抽象类。`SelectAllSingers` 类如清单 6-33 所示。


  ```

  package com.apress.prospring6.six.repo

  import com.apress.prospring6.six.plain.records.Singer

  import org.springframework.jdbc.object.MappingSqlQuery

  // 其他导入语句已省略

  class SelectAllSingers(dataSource: DataSource) :

  MappingSqlQuery(dataSource, ALL_SELECT) {

  @Throws(SQLException::class)

  override fun mapRow(rs: ResultSet, rowNum: Int): Singer {

  return Singer(

  rs.getLong("id"),

  rs.getString("first_name"),

  rs.getString("last_name"),

  rs.getDate("birth_date").toLocalDate(),

  mutableSetOf()

  )

  }

  }

  清单 6-33

  SelectAllSingers 实现

  ```


  在 `SelectAllSingers` 类中，声明了用于选择所有歌手的 SQL。在类构造函数中，我们提供了 `DataSource` 以及 SQL 语句。此外，还实现了
  `MappingSqlQuery<T>.mapRow()` 方法，以提供结果集到 `Singer` 记录的映射。


  有了 `SelectAllSingers` 类，我们可以在 `SingerJdbcRepo` 类中实现 `findAll()` 方法。清单 6-34 展示了 `SingerJdbcRepo`
