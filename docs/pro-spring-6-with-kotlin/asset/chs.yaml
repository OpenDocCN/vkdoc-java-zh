  如前所述，`RestTemplate#exchange(..)` 的 exchange 方法非常强大。在 `testPositiveFindById()` 测试方法中，调用了需要
  `RequestEntity<T>` 参数并以对象类型作为返回值的方法版本。`RequestEntity<T>` 类型是 `HttpEntity<T>` 的扩展，它暴露了
  HTTP 方法和目标 URL。有趣的是，请求的资源表示形式是 JSON，但 `RestTemplate` 足够智能，可以将其转换回 `Singer` 对象，从而可以对返回的对象进行断言。


  在 `testNegativeFindById()` 测试方法中，请注意，我们并未检查 `RequestEntity<T>`，而是验证了是否抛出了 `org.springframework.web.client.HttpClientErrorException.NotFound`
  异常。这是因为在底层，错误处理器会接收并处理带有 `404(Not Found)` 状态的响应，并通过抛出此类异常来实现。对于对应非成功响应的其他 HTTP 状态码，也会进行类似的处理，并且这些异常类型都继承自
  `org.springframework.web.client.HttpClientErrorException`。


