  };\n},\nstop: function() {\nthis.source.close();\n}\n};\n/*]]>*/\n\n响应式应用 Bean：\n\
  \n清单 20-28\n用于显示作为服务器发送事件接收的 Bean 名称的 Thymeleaf 模板片段（来自 home.html）\n```\n\n`/*[[@{|/beans|}]]*/`\
  \ 是一个 Thymeleaf 链接表达式，用于生成相对于应用程序上下文的 URL。它看起来很奇怪，但所有这些符号确保它不会被解释为其他内容，并且会生成有效的\
