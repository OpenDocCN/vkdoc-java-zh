  \n![](img/524962_1_En_17_Figg_HTML.jpg) 一个创意的符号，由电灯泡表示。 清单 17-25 中的第一个日志片段显示了安全链中所有过滤器的类型。欢迎在\
  \ GitHub^(¹⁷¹) 上查看每个过滤器的代码。\n\n正如 Bean 的名称所示，这些过滤器是链式的，并且按固定顺序执行。请求对象通过链从一个过滤器传递到下一个过滤器，就像工厂传送带上的物品经过各种机器一样。有些过滤器是关键的，如果它们发现请求有问题，就会抛出异常，整个处理过程停止；其余的过滤器将不会应用于该请求。有些过滤器不是关键的，但它们会在请求沿链传递之前对其进行修改。\n\
  \n\n\n![](img/524962_1_En_17_Figh_HTML.jpg) 一个带阴影圆圈内的感叹号符号。 过滤器列表会根据应用程序中的配置而变化。例如，由于我们禁用了\
  \ CSRF 支持，`CsrfFilter` 不会出现在清单 17-25 的列表中。\n\n例如，输入错误的用户名/密码组合会导致 `UsernamePasswordAuthenticationFilter`\
  \ 抛出 `BadCredentialsException`。这是过滤器链中的第六个过滤器，处理过程在此处停止，因此其后的五个过滤器不会应用于该请求，因为正如该过滤器所表明的，该请求不包含应用程序可识别的凭证，如清单\
