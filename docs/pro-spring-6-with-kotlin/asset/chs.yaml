  \ resultClass)` 被调用来获取 `TypedQuery<T>` 接口的实例，这确保了查询结果必须是 `Singer` 类型。然后使用 `TypedQuery<T>.setParameter()`\
  \ 方法设置查询中命名参数的值，并调用 `.singleResult` 访问器，因为结果应仅包含一个具有指定 ID 的 `Singer` 对象。测试它非常简单，与**第**\
  \ **7 章**中类似方法的做法相似，因此此处不再赘述。\n\n### 使用无类型结果进行查询\n\n在许多情况下，您希望向数据库提交查询并随意操作结果，而不是将它们存储在映射的实体类中。毕竟，既然可以使用记录（records），为什么还要使用实体类呢？对吧？此外，记录可以设计为仅存储列的子集，因此这会产生与投影查询相同的行为。\n\
  \n一个典型的例子是基于网页的报告，该报告仅列出跨多个表的特定数量的列。例如，假设您有一个网页，显示歌手信息及其最近发行的专辑标题。摘要信息包含歌手的全名及其最近发行的专辑标题。没有专辑的歌手将不会被列出。在这种情况下，我们可以通过查询实现此用例，然后手动操作\
  \ `ResultSet` 对象。\n\n让我们创建一个名为 `SingerSummaryServiceImpl` 的新类，并将方法命名为 `findAllAsRecord()`。清单\
