  ### 使用 `AssertTrue` 进行自定义验证


  除了实现自定义验证器之外，使用 Bean Validation API 进行自定义验证的另一种方法是使用 `@AssertTrue` 注解。为了在 `Singer`
  类中使用此注解，应移除 `@CheckCountrySinger` 注解，将 `isCountrySinger()` 方法标注为 `@AssertTrue`，并将
  `CountrySingerValidator.isValid(..)` 方法中的验证逻辑也移入此方法。由于我们希望保持 `Singer` 类不变，因此创建了一个包含这些更改的副本
  `SingerTwo`，并在配置中添加了一个针对此类实例的验证器，名为 `SingerTwoValidationService`。


  在清单 11-32 中，你可以看到包含 `isCountrySinger()` 方法的 `SingerTwo` 类。`SingerTwoValidationService`
  与 `SingerValidationService` 几乎相同，唯一的区别在于其操作的领域对象类型。


  ```

  package com.apress.prospring6.eleven.domain

  import jakarta.validation.constraints.AssertTrue

  // 其他导入语句已省略

  class SingerTwo() {

  @NotNull @Size(min = 2, max = 60) var firstName: String? = null

  var lastName: String? = null

  @NotNull var genre: Singer.Genre? = null

  @NotNull var gender: Singer.Gender? = null

  @AssertTrue(message =

  "错误！个人客户应定义性别和姓氏")

  fun isCountrySinger():  Boolean  = genre == null || (genre != Singer.Genre.COUNTRY
  ||

  (gender != null && lastName != null))

  override fun toString() = "Singer{" +

  "firstName=''" + firstName + ''\'''' +

  ", lastName=''" + lastName + ''\'''' +

  ", genre=" + genre +

  ", gender=" + gender +

  ''}''

  }

  清单 11-32

  使用 @AssertTrue 注解

  ```


