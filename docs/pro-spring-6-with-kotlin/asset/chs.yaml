  GrammyGuitarist 实现

  ```


  在这个例子中，我们希望使用 `NameMatchMethodPointcut` 来匹配 `sing()`、`sing(Guitar)` 和 `rest()` 方法。这相当于匹配名称
  `sing` 和 `rest`。如清单 5-16 所示。


