  .map> { s: Singer ->

  s.firstName = singer.firstName

  s.lastName = singer.lastName

  s.birthDate = singer.birthDate

  try {

  singerRepo.save(s)

  return@map ResponseEntity.ok().build()

  } catch (dive: DataIntegrityViolationException) {

