  \ 的开发方式和声明式配置管理，而不是 EJB 的笨重设置而开发的一样，开发者社区意识到，一个更简单、轻量级、基于 POJO 的框架可以简化数据访问逻辑的开发。从那时起，出现了许多库；它们通常被称为\
  \ ORM 库。ORM 库的主要目标是弥合关系数据库管理系统（RDBMS）中的关系数据结构与 Java/Kotlin 中的面向对象（OO）模型之间的差距，以便开发者可以专注于使用对象模型进行编程，同时轻松执行与持久化相关的操作。\n\
