  当执行测试方法 `testSpringJdbcWithH2Db()` 时，我们期望 `singerDao.findNameById(1L)` 调用返回 *John
  Mayer* 字符串，并且我们使用 `assertTrue` 方法来测试这个假设。该测试可以使用原始配置类 `SpringJdbcTemplateCfg` 运行，但这意味着其数据源是
  MariaDB，除非运行测试的机器上安装并正确配置了 MariaDB 数据库，否则测试将无法通过。因此，在测试类的主体中声明了静态类 `TestDbCfg`，以注入一个嵌入式数据库，而不是真实的数据库。这个测试类与
  `SpringJdbcTemplateCfg` 类相同，但它没有导入配置实际数据库的 `BasicDataSourceCfg` 类，而是导入了配置内存中 H2
  数据库的 `EmbeddedJdbcConfig` 类，这更适合测试环境。


  当然，这个例子本可以使用 profile，但本章前面我们暗示过可以在测试上下文中声明一个静态配置类，所以我们想涵盖这个场景。


  #### 使用 `NamedParameterJdbcTemplate` 的命名参数


  在之前的示例中，作为 `jdbcTemplate.queryForObject(..)` 方法参数的 SQL 查询使用普通占位符（`?` 字符）作为查询参数，并且参数值通过
  varargs 传递：


  ```

  select CONCAT(first_name , '' '' , last_name) from SINGER where id = ?

  ```


  使用普通占位符时，顺序很重要，并且你将参数放入 varargs 的顺序必须与查询中参数的顺序相同。


  一些开发者更喜欢使用命名参数来确保每个参数都能精确地按预期绑定。在 Spring 中，`JdbcTemplate` 类的一个扩展 `NamedParameterJdbcTemplate`（位于包
  `org.springframework.jdbc.core.namedparam` 下）提供了对此的支持。


  `NamedParameterJdbcTemplate` 的初始化与 `JdbcTemplate` 相同，因此我们只需要声明一个 `NamedParameterJdbcTemplate`
  类型的 bean 并将其注入到 DAO 类中。在清单 6-24 中，你可以看到与 `JdbcSingerDao` 等效的 `NamedTemplateDao`，它使用了
  `NamedParameterJdbcTemplate`。


  ```

  package com.apress.prospring6.six.named

  import org.springframework.jdbc.core.namedparam.NamedParameterJdbcTemplate

  // 其他导入语句已省略

  internal class NamedTemplateDao : SingerDao {

  var namedTemplate: NamedParameterJdbcTemplate? = null

  override fun findNameById(id: Long?): String {

  return namedTemplate!!.queryForObject(

  NAMED_FIND_NAME, mapOf("singerId" to id),

  String::class.java

  )!!

  }

  }

  清单 6-24

  使用 NamedParameterJdbcTemplate Bean 的 NamedTemplateDao

  ```


  这里使用命名参数（以冒号为前缀）代替了 `?` 占位符：`:singerId`。测试 `NamedTemplateDao` 与测试 `JdbcSingerDao`
  相同，因此本书省略了相关代码，但它包含在项目中。




  #### 使用 `RowMapper<T>` 检索领域对象


  到目前为止，所展示的关于 `JdbcTemplate` 及相关类的示例都相当简单：查询返回的是单一类型的单个值，例如 `String`。当查询返回多行，且需要将这些行转换为
  POJO（就像我们在纯 JDBC 部分所做的那样）时，事情就变得稍微复杂一些。不过，Spring 通过其 `RowMapper<T>` 接口来提供帮助。顾名思义，实现了
  `RowMapper<T>` 接口的类型的实例仅适用于将行映射到单个领域对象。Spring 的 `RowMapper<T>` 接口（位于 `org.springframework.jdbc.core`
  包中）为您提供了一种简单的方法，用于执行从 JDBC 结果集到 POJO 或记录的映射。让我们通过使用 `RowMapper<T>` 接口实现 `SingerDao`
  的 `findAll()` 方法来实际看看它的作用。在清单 6-25 中，您可以看到返回 `Singer` 记录列表的 `findAll()` 方法的实现。


  ```

  package com.apress.prospring6.six.plain.records

  import java.time.LocalDate

  // in file Singer.kt

  data class Singer( val id:Long?,

  val firstName:String,

  val lastName:String,

  val birthDate:LocalDate,

  val albums: MutableSet

  )

  // in file RowMapperCfg.kt

  package com.apress.prospring6.six.rowmapper

  import org.springframework.jdbc.core.RowMapper

  // other imports statements omitted

  interface SingerDao {

  fun findAll(): Set

  }

  class RowMapperDao : SingerDao {

  var namedTemplate: NamedParameterJdbcTemplate? = null

  override fun findAll(): Set {

  return namedTemplate!!.query(

  ALL_SELECT, SingerMapper()

  ).toSet()

  }

  class SingerMapper : RowMapper {

  override

  fun  mapRow(rs:ResultSet, rowNum:Int):Singer {

  return Singer(rs.getLong("id"),

  rs.getString("first_name"),

  rs.getString("last_name"),

  rs.getDate("birth_date").toLocalDate(),

  mutableSetOf())

  }

  }

  }

