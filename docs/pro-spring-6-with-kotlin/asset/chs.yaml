- "# 14. Spring MVC\n\n在企业应用程序中，表示层严重影响着用户对应用程序的接受程度。表示层是应用程序的前门。它允许用户执行业务功能，并展示应用程序所维护信息的视图。用户界面的表现方式在很大程度上决定了应用程序的成功与否。由于互联网的爆炸式增长（尤其是在当今），以及人们使用的各种设备的兴起，开发应用程序的表示层是一项具有挑战性的任务。\n\
  \n以下是开发 Web 应用程序时的一些主要考虑因素：\n\n*   *性能*：性能始终是 Web 应用程序的首要要求。如果用户选择一个功能或点击一个链接，并且执行时间很长（在互联网的世界里，三秒钟就像是一个世纪！），用户肯定不会对应用程序满意。\n\
  \n*   *用户友好性*：应用程序应易于使用和导航，并带有清晰的说明，不会让用户感到困惑。\n\n*   *交互性和丰富性*：用户界面应具有高度的交互性和响应性。此外，在视觉呈现方面应丰富多样，例如图表、仪表盘类型的界面等。\n\
  \n*   *可访问性*：如今，用户要求应用程序可以通过任何设备从任何地方访问。在办公室，他们将使用台式机访问应用程序。在路上，用户将使用各种移动设备（包括笔记本电脑、平板电脑和智能手机）访问应用程序。\n\
  \n开发满足上述要求的 Web 应用程序并非易事，但业务用户认为这些是强制性的。幸运的是，许多新技术和框架已经被开发出来以满足这些需求。许多 Web 应用程序框架和库——例如\
  \ Spring MVC（Spring Web Flow）、Apache Struts、Tapestry、Faces（以前称为 Java Server Faces）、Google\
  \ Web Toolkit (GWT)、jQuery、React 和 Dojo 等——提供了工具和丰富的组件库，可以帮助你开发高度交互的 Web 前端。Spring\
  \ Web Flow^(¹²³) 提供了 Faces 集成，允许你将 Faces UI 组件模型与 Spring Web Flow 控制器一起使用。此外，许多框架提供了针对移动设备（如智能手机和平板电脑）的工具或相应的部件库。HTML5^(¹²⁴)\
  \ 和 CSS3^(¹²⁵) 标准的兴起，以及大多数 Web 浏览器和移动设备制造商对这些最新标准的支持，也有助于简化需要从任何设备在任何地方访问的 Web 应用程序的开发。\n\
  \n与 Spring MVC 并行，从 5.0 版本开始，Spring 框架引入了一个名为 Spring WebFlux^(¹²⁶) 的响应式栈 Web 框架。该栈将在**第**\
  \ **20** **章**中简要介绍。\n\n在 Web 应用程序开发方面，Spring 提供了全面而深入的支持。Spring MVC 模块为 Web 应用程序开发提供了坚实的基础设施和模型-视图-控制器\
  \ (MVC) 框架。使用 Spring MVC 时，你可以使用各种视图技术（例如 JSP 或 Velocity）。此外，Spring MVC 与许多常见的 Web\
  \ 框架和工具包（例如 Struts 和 GWT）集成。其他 Spring 项目有助于解决 Web 应用程序的特定需求。例如，Spring MVC 与 Spring\
  \ Web Flow 项目及其 Spring Faces 模块结合使用时，为开发具有复杂流程的 Web 应用程序以及使用 Faces 作为视图技术提供了全面的支持。简而言之，在表示层开发方面有很多选择。本章重点介绍\
  \ Spring MVC，并讨论如何使用 Spring MVC 提供的强大功能来开发高性能的 Web 应用程序。\n\n具体来说，本章涵盖以下主题：\n\n*\
  \   *Spring MVC*：我们讨论 MVC 模式的主要概念并介绍 Spring MVC。我们介绍 Spring MVC 的核心概念，包括其 `WebApplicationContext`\
  \ 层次结构和请求处理生命周期。\n\n*   *i18n、区域设置和主题*：Spring MVC 为常见的 Web 应用程序需求提供全面支持，包括 i18n（国际化）、区域设置和主题。我们讨论如何使用\
  \ Spring MVC 开发支持这些需求的 Web 应用程序。\n\n*   *视图支持*：Spring MVC 中视图技术的使用是可插拔的。在本章中，我们重点使用\
  \ Thymeleaf 作为 Web 应用程序的视图部分，因为它允许在不显式使用 JavaScript 和其他动态技术的情况下开发简单的网页。你可能想要使用的、Spring\
  \ 支持的任何其他技术，例如 Groovy Markup Templates 和 JSP，都可以通过简单的配置更改轻松插入。\n\n*   *文件上传支持*：我们讨论如何使用\
  \ Spring MVC 配合 Jakarta 的 Servlet 5.0 容器内置的多部分支持进行文件上传，而不是与 Apache Commons FileUpload\
  \ 集成。\n\n\n\n## 设置数据与底层\n\nWeb 应用必须提供对远程存储中数据的操作访问，这些数据通常存储在某种类型的数据库里。到目前为止，你已经了解了如何配置\
  \ Spring 应用，以使用 Spring Data 仓库来管理数据，并声明事务型 Bean 在事务内管理数据。这是应用的两个数据层；在本章中，你将学习配置应用的最后一层：表示层，即最终用户使用的\
  \ Web 应用或 Web 控制台，他们无需了解后端是哪种应用在承担繁重的工作。\n\n本章沿用前几章使用的相同数据库结构，但在 `SINGER` 表中新增了一个名为\
