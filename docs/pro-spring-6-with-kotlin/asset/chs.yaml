  #### 插入数据并检索生成的主键


  插入数据同样通过扩展 `SqlUpdate` 来实现。在我们看来，插入新记录本质上也是对表中数据的更新，对吧？


  一个有趣的点是主键（通常是 `ID` 列）是如何生成的。这个值通常只有在插入语句完成后才能获取；这是因为，根据所使用的 RDBMS 类型和配置，ID 在插入之前并不会生成。也许
  `ID` 列被声明为具有 `AUTO_INCREMENT` 属性并且是主键，这个值将在插入操作期间由 RDBMS 分配。如果您使用的是 Oracle，您可能首先需要从
  Oracle 序列中获取一个唯一的 `ID`，然后使用查询结果执行插入语句。


  在旧版本的 JDBC 中，生成唯一 ID 有点棘手。例如，如果我们使用 MariaDB，我们需要执行 SQL `select last_insert_id()`
  函数。对于 Microsoft SQL Server，我们执行 `select @@IDENTITY` 语句。幸运的是，从 JDBC 3.0 版本开始，增加了一项新功能，允许以统一的方式检索
  RDBMS 生成的键。在清单 6-44 中，您可以看到 `insert()` 方法的实现，它还会检索插入的联系人记录所生成的主键。它适用于大多数（如果不是全部）数据库；只需确保您使用的是与
  JDBC 3.0 或更新版本兼容的 JDBC 驱动程序。


  我们首先为插入操作创建 `InsertSinger` 类，它扩展了 `SqlUpdate` 类。代码如清单 6-43 所示。


  ```

  package com.apress.prospring6.six.repo

