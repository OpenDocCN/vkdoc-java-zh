  配置分为三个部分：`datasource`、jpa 和 logging。以 `spring.datasource` 开头的属性设置了配置数据源所需的值：连接 URL、凭据和连接池值。以
  `spring.jpa` 开头的属性设置了描述持久化单元的值。您可以轻松识别出第 7 章和第 8 章中介绍的 Hibernate 属性。以 `logging`
  开头的属性设置了日志配置的典型值，在经典应用程序中，这些值可以在 `logback.xml` 文件中找到。


  在 Spring Boot Data JPA 应用程序中，自动配置机制会根据配置文件中的属性负责声明必要的 Bean，例如 dataSource、`EntityManager`、`LocalSessionFactoryBean`、`TransactionManager`
  等，但我们仍然需要配置一些内容：


  *   *实体类的位置*：由于 `LocalSessionFactoryBean` 是自动配置的，指定实体类所在包的方式是使用 `org.springframework.boot.autoconfigure.domain`
  包中的 `@EntityScan` 注解。


  *   *Spring Data 仓库接口的位置*：这很容易实现，只需将 `@EnableJpaRepositories` 注解添加到带有 `@Configuration`
  注解的类（如果有）或带有 `@SpringBootApplication` 注解的类（如果没有）上即可。


  *   *事务行为*：这也很容易实现，只需将 `@EnableTransactionManagement` 注解添加到带有 `@Configuration` 注解的类（如果有）或带有
  `@SpringBootApplication` 注解的类（如果没有）上即可。


