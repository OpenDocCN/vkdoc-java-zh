  \ 表示现在应该在其 `mailbox` 中填充了 Tom 发送的信件。JSON 表示如清单 13-14 所示。\n\n```\n### Root JSON representation\
  \ of Evelyn's letters\nGET http://localhost:8080/letters\nAccept: application/json\n\
  ###\n{\n\"_embedded\" : {\n\"mailbox\" : [ {\n\"title\" : \"Salutations from Scotland\"\
