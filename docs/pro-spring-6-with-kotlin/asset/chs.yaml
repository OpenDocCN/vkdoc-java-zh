  以这种方式应用通知并不是真正有用的，最好的方法是声明你的 bean 和通知 bean，并告诉 Spring 如何操作。但在那之前，有必要对通知的使用进行一些详细的总结。





  #### 几点结论


  前置通知是 Spring 中可用的最有用的通知类型之一。这种通知可以修改传递给方法的参数，并且可以通过抛出异常来阻止方法执行。这对于安全实现最为有用，在前置通知中，会在允许方法调用继续之前检查用户凭证。


  后置返回通知在连接点的方法调用返回后执行。鉴于方法已经执行完毕，你无法更改传递给它的参数。虽然你可以读取这些参数，但无法更改执行路径，也无法阻止方法执行。这些限制是意料之中的；然而，可能出乎意料的是，**你无法在后置返回通知中修改返回值**。使用后置返回通知时，你只能添加额外的处理逻辑。尽管后置返回通知无法修改方法调用的返回值，但它可以抛出一个异常，该异常可以沿着调用栈向上传递，而不是返回原返回值。


  异常通知与后置返回通知类似，它也是在连接点（始终是方法调用）之后执行，但异常通知仅在方法抛出异常时执行。异常通知与后置返回通知的另一个相似之处在于，它对程序执行的控制能力很弱。如果使用异常通知，你不能选择忽略抛出的异常并返回一个方法值。**你能对程序流程做出的唯一修改是更改所抛出异常的类型。**
  这是一个相当强大的概念，可以使应用程序开发变得简单得多。考虑这样一种情况：你有一个 API，它抛出了一系列定义不明确的异常。使用异常通知，你可以通知该 API
  中的所有类，并将异常层次结构重新归类为更易于管理和描述的形式。当然，你也可以使用异常通知在整个应用程序中提供集中的错误日志记录，从而减少分散在应用程序各处的错误日志记录代码。异常通知在各种情况下都很有用；它允许你重新归类整个异常层次结构，并为应用程序构建集中的异常日志记录。我们发现，在调试正在运行的应用程序时，异常通知特别有用，因为它允许我们添加额外的日志记录代码，而无需修改应用程序的代码。


  环绕通知的功能类似于前置通知和后置通知的组合，但有两个区别：


  *   你可以修改返回值。

  *   你可以阻止方法执行。


  这意味着，通过使用环绕通知，你基本上可以用新代码替换方法的整个实现。Spring 中的环绕通知被建模为一个拦截器，使用 `MethodInterceptor`
  接口，如本节示例所示。环绕通知有很多用途，你会发现 Spring 的许多特性（如远程代理支持和事务管理功能）都是通过使用方法拦截器创建的。方法拦截也是分析应用程序执行情况的一种良好机制，示例中通过计时目标方法的执行时间，正是做到了这一点——记录该方法执行所花费的时长，使你能够研究这些值，从而决定是否应该优化该方法。


  ### 选择通知类型


  通常，选择通知类型是由应用程序的需求驱动的，但你应该选择最符合需求的具体通知类型。也就是说，不要在前置通知就能满足需求时使用环绕通知。在大多数情况下，环绕通知可以完成其他三种通知类型能完成的所有工作，但对于你想要实现的目标来说，它可能有些大材小用。通过使用最具体的通知类型，你不仅使代码的意图更加清晰，而且还降低了出错的可能性。考虑一个统计方法调用次数的通知。当你使用前置通知时，你只需要编写计数器代码；但使用环绕通知时，你需要记得调用方法并将返回值返回给调用者。这些小事可能会让偶发性错误潜入你的应用程序。通过尽可能聚焦通知类型，你可以减少出错的范围。


  ## Spring 中的顾问和切点


  到目前为止，你看到的所有示例都使用了 `ProxyFactory` 类。这个类提供了一种在自定义用户代码中获取和配置 AOP 代理实例的简单方法。`ProxyFactory.addAdvice()`
  方法用于为代理配置通知。此方法在幕后委托给 `addAdvisor()`，创建一个 `org.springframework.aop.support.DefaultPointcutAdvisor`
  实例，并使用一个指向所有方法的切点对其进行配置。这样，通知就被视为适用于目标上的所有方法。在某些情况下，例如当你使用 AOP 进行日志记录时，这可能是可取的，但在其他情况下，你可能希望限制通知所应用的方法。


  当然，你也可以在通知本身中检查被通知的方法是否正确，但这种方法有几个缺点。首先，将可接受的方法列表硬编码到通知中会降低通知的可重用性。通过使用切点，你可以配置通知应用于哪些方法，而无需将这些代码放入通知内部；这显然提高了通知的重用价值。将方法列表硬编码到通知中的其他缺点与性能相关。为了在通知中检查被通知的方法，你需要在目标上的每个方法被调用时都执行一次检查。这显然会降低应用程序的性能。当你使用切点时，每个方法只执行一次检查，并且结果会被缓存以供后续使用。不使用切点来限制被通知方法列表的另一个与性能相关的缺点是，Spring
  可以在创建代理时对未通知的方法进行优化，从而加快对未通知方法的调用速度。当我们稍后在本章讨论代理时，会更详细地介绍这些优化。


  我们强烈建议你避免将方法检查硬编码到通知中的诱惑，而是尽可能使用切点来控制通知对目标方法的适用性。话虽如此，在某些情况下，确实需要将检查硬编码到通知中。考虑前面提到的用于捕获
  `KeyGenerator` 类生成的弱密钥的后置返回通知示例。这种通知与其所通知的类紧密耦合，因此在通知内部进行检查以确保它应用于正确的类型是明智的。我们将通知与目标之间的这种耦合称为*目标亲和性*。通常，当你的通知与目标几乎没有或没有亲和性时，你应该使用切点。也就是说，它可以应用于任何类型或广泛的类型。当你的通知具有很强的目标亲和性时，请尝试在通知本身中检查通知是否被正确使用；这有助于减少因通知误用而导致的令人费解的错误。我们还建议你避免不必要地通知方法。正如你将看到的，这会导致调用速度明显下降，从而对应用程序的整体性能产生重大影响。



  ### `Pointcut` 接口


  Spring 中的切点是通过实现 `org.springframework.aop.Pointcut` 接口来创建的，该接口如清单 5-5 所示（完整代码可在
  GitHub Spring Framework 仓库^(⁴⁰) 中找到）。


  ```

  package org.springframework.aop;

  public interface Pointcut {

  ClassFilter getClassFilter();

  MethodMatcher getMethodMatcher();

  // 省略了一些不相关的代码

  }

  清单 5-5

  Spring Pointcut 接口

  ```


  从这段代码可以看出，`Pointcut` 接口定义了两个方法：`getClassFilter()` 和 `getMethodMatcher()`，它们分别返回
  `ClassFilter` 和 `MethodMatcher` 的实例。显然，如果你选择实现 `Pointcut` 接口，就需要实现这些方法。值得庆幸的是，正如你将在下一节中看到的，这通常是不必要的，因为
  Spring 提供了一系列 `Pointcut` 实现，它们涵盖了你的大部分（即使不是全部）用例。


  在确定某个 `Pointcut` 是否适用于特定方法时，Spring 首先会通过 `Pointcut.getClassFilter()` 返回的 `ClassFilter`
  实例来检查该 `Pointcut` 接口是否适用于该方法所属的类。`ClassFilter` 函数式接口如清单 5-6 所示（完整代码可在 GitHub Spring
  Framework 仓库^(⁴¹) 中找到）。


  ```

  org.springframework.aop;

  @FunctionalInterface

  public interface ClassFilter {

  boolean matches(Class clazz);

  // 省略了一些不相关的代码

  }

  清单 5-6

  Spring ClassFilter 接口

  ```


  如你所见，`ClassFilter` 函数式接口定义了一个单一的抽象方法 `matches()`，该方法接收一个代表待检查类的 `Class` 实例。毫无疑问，`matches()`
  方法在切点适用于该类时返回 `true`，否则返回 `false`。


  `MethodMatcher` 接口比 `ClassFilter` 接口更复杂，如清单 5-7 所示（完整代码可在 GitHub Spring Framework
  仓库^(⁴²) 中找到）。


  ```

  package org.springframework.aop;

  import java.lang.reflect.Method

  public interface MethodMatcher {

  boolean matches(Method method, Class targetClass);

  boolean isRuntime();

  boolean matches(Method method, Class targetClass, Object... args);

  // 省略了一些不相关的代码

  }

  清单 5-7

  Spring MethodMatcher 接口

  ```


  Spring 支持两种类型的 `MethodMatcher`：静态和动态，由 `isRuntime()` 的返回值决定。在使用 `MethodMatcher`
  之前，Spring 会调用 `isRuntime()` 来确定 `MethodMatcher` 是静态的（返回值为 `false`）还是动态的（返回值为 `true`）。


  对于静态切点，Spring 会对目标对象上的每个方法调用一次 `MethodMatcher` 的 `matches(Method, Class<T>)` 方法，并缓存返回值以供后续调用这些方法时使用。这样，每个方法的方法适用性检查只执行一次，后续的方法调用不会再次触发
  `matches()` 的调用。


  对于动态切点，Spring 在方法首次被调用时，仍然会使用 `matches(Method, Class<T>)` 执行一次静态检查，以确定方法的整体适用性。然而，除此之外，如果静态检查返回了
  `true`，Spring 还会在每次调用该方法时，使用 `matches(Method, Class<T>, Object[])` 方法进行进一步的检查。通过这种方式，动态
  `MethodMatcher` 可以基于方法的特定调用（而不仅仅是方法本身）来决定是否应用切点。例如，一个切点可能只需要在参数是值大于 100 的 `Integer`
  时才应用。在这种情况下，可以编写 `matches(Method,Class<T>, Object[])` 方法，使其在每次调用时对参数进行进一步检查。


  显然，静态切点的性能远优于动态切点，因为它们避免了每次调用都需要额外检查的开销。动态切点在决定是否应用通知方面提供了更高程度的灵活性。通常，我们建议尽可能使用静态切点。但是，如果你的通知增加了大量开销，那么使用动态切点来避免任何不必要的通知调用可能是明智之举。


  通常，你很少需要从头开始创建自己的 `Pointcut` 实现，因为 Spring 为静态和动态切点都提供了抽象基类。我们将在接下来的几节中介绍这些基类以及其他
  `Pointcut` 实现。


  ### 可用的 `Pointcut` 实现


  从 4.0 版本开始，Spring 提供了八个主要的 `Pointcut` 接口实现：两个旨在作为创建静态和动态切点的便捷类的抽象类，以及六个具体类，分别用于以下目的：


  *   组合多个切点

  *   处理控制流切点

  *   执行简单的基于名称的匹配

  *   使用正则表达式定义切点

  *   使用 AspectJ 表达式定义切点

  *   定义在类或方法级别查找特定注解的切点


  表 5-2 总结了这八个主要的 `Pointcut` 接口实现。


  表 5-2

  Spring `Pointcut` 实现总结


  | 实现类 | 描述 |

  | --- | --- |

  | `org.springframework.aop.support.annotation.AnnotationMatchingPointcut` | 此实现在类或方法上查找特定的
  Kotlin 注解。 |

  | `org.springframework.aop.aspectj.AspectJExpressionPointcut` | 此实现使用 AspectJ 编织器来评估
  AspectJ 语法的切点表达式。 |

  | `org.springframework.aop.support.ComposablePointcut` | `ComposablePointcut` 类用于通过
  `union()` 和 `intersection()` 等操作组合两个或多个切点。 |

  | `org.springframework.aop.support.ControlFlowPointcut` | `ControlFlowPointcut`
  是一种特殊情况的切点，它匹配另一个方法控制流内的所有方法；也就是说，任何作为另一个方法被调用的直接或间接结果而被调用的方法。 |

  | `org.springframework.aop.support.DynamicMethodMatcherPointcut` | 此实现旨在作为构建动态切点的基类。
  |

  | `org.springframework.aop.support.JdkRegexpMethodPointcut` | 此实现允许你使用 JDK 正则表达式支持来定义切点。
  |

  | `org.springframework.aop.support.NameMatchMethodPointcut` | 使用 `NameMatchMethodPointcut`，你可以创建一个针对方法名称列表执行简单匹配的切点。
  |

  | `org.springframework.aop.support.StaticMethodMatcherPointcut` | `StaticMethodMatcherPointcut`
  类旨在作为构建静态切点的基类。 |


