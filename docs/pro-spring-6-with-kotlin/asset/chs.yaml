  SingerRepository MongoDB 数据仓库接口

  ```


  这里介绍的 `SingerRepository` 接口包含两个 MongoDB 自定义查询。编写 MongoDB 查询表达式时，参数可以按位置指定，也可以像 SQL
  查询那样命名。唯一的区别是查询表达式的语法；MongoDB 查询本质上是 JSON 对象。`findByPositionedParams(..)` 方法使用与参数顺序匹配的索引，`?0`
  对应方法中的第一个参数，参数的值将替换 `?0`。这意味着开发人员必须跟踪位置，不要混淆它们，因为虽然 MongoDB 不会报错，但它不会返回预期的结果。然而，查询表达式非常简单，因此这是推荐的方法。


  也可以使用命名参数，通过 `@Param` 注解和 SpEL 表达式来引用它们。表达式更复杂且冗长，但这种方法更灵活，并且没有错误定位参数的风险。选择你更习惯的选项即可。


