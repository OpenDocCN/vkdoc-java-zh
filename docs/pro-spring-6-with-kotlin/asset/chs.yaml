  \ 处理函数的路由函数\n```\n\n\n\n编写 Spring 响应式 Web 应用时，另一个有趣的小知识是：你可以使用 `RouterFunctions.resources(..)`\
  \ 方法，将静态资源的路由配置隔离到另一个独立的路由函数中。该方法会将匹配给定模式的请求路由到相对于给定根位置的资源，这对于跳过仅适用于动态资源的额外过滤非常有用。\n\
  \n清单 20-31 展示了一个用于静态资源的 `RouterFunction<ServerResponse>` 示例。\n\n```\npackage com.apress.prospring6.twenty.boot\n\
  import org.springframework.web.reactive.function.server.RouterFunction\nimport org.springframework.web.reactive.function.server.RouterFunctions.resources\n\
  // 其他导入语句已省略\n@Configuration\nopen class RoutesConfig {\n@Bean\nopen fun staticRouter():RouterFunction\
  \ {\nreturn resources(\"/images/**\", ClassPathResource(\"static/images/\"))\n.and(resources(\"\
  /styles/**\", ClassPathResource(\"static/styles/\")))\n.and(resources(\"/js/**\"\
  , ClassPathResource(\"static/js/\")));\n}\n...\n}\n清单 20-31\n静态资源的 RouterFunction\n\
  ```\n\n请注意，`RouterFunction<ServerResponse>` 可以使用 `and(.)` 方法进行组合。最终的路由函数是一个组合路由函数，它会先调用第一个函数，如果该路由没有结果，则调用另一个函数，以此类推。\n\
  \n### 处理函数验证\n\n函数式端点可以使用 Spring 的验证设施对请求体进行验证。为了解释验证的工作原理，我们将添加一个条件对象，允许用户指定数据库查询的过滤器。该条件对象在服务中用于决定执行哪个查询仓库。\n\
  \n`CriteriaDto` 类被添加到 `SingerService` 接口中，因为它仅在该服务的上下文中使用，因此与该服务紧密相关。由于我们处理的是用户提供的数据，因此还需要一个验证器类。清单\
  \ 20-32 展示了这两个类以及使用 `CriteriaDto` 作为参数的服务方法骨架。\n\n```\npackage com.apress.prospring6.twenty.boot.service\n\
  import org.springframework.validation.Errors\nimport org.springframework.validation.ValidationUtils\n\
  import org.springframework.validation.Validator\n// 其他导入语句已省略\ninterface SingerService\
  \ {\nfun findByCriteriaDto(criteria: CriteriaDto): Flux\n...\nclass CriteriaDto\
  \ {\nvar fieldName: String? = null\nvar fieldValue: String? = null\n}\nclass CriteriaValidator\
  \ : Validator {\noverride fun supports(clazz: Class): Boolean {\nreturn CriteriaDto::class.java.isAssignableFrom(clazz)\n\
  }\noverride fun validate(target: Any, errors: Errors) {\nValidationUtils.rejectIfEmpty(\n\
  errors,\n\"fieldName\",\n\"required\",\narrayOf(\"fieldName\"),\n\"字段名是必填项！\"\n\
  )\nValidationUtils.rejectIfEmpty(\nerrors,\n\"fieldValue\",\n\"required\",\narrayOf(\"\
  fieldValue\"),\n\"字段值是必填项！\"\n)\n}\n}\nenum class FieldGroup {\nFIRSTNAME,\nLASTNAME,\n\
  BIRTHDATE;\ncompanion object {\nfun getField(field: String): FieldGroup {\nreturn\
  \ valueOf(field.uppercase(Locale.getDefault()))\n}\n}\n}\n}\n清单 20-32\nCriteriaDto\
  \ 对象和 CriteriaValidator 类\n```\n\n该类的实例用于保存表单对象的搜索条件。要使这些实例有效，两个字段都必须存在，验证器会检查这些实例。\n\
  \n添加 `FieldGroup` 枚举是为了方便选择基于哪一列进行过滤。清单 20-33 展示了 `findByCriteriaDto(..)` 方法的实现。\n\
  \n```\npackage com.apress.prospring6.twenty.boot.service\n// 导入语句已省略\n@Transactional\n\
  @Service\nopen class SingerServiceImpl : SingerService {\nprivate val singerRepo:\
  \ SingerRepo? = null\n...\noverride fun findByCriteriaDto(criteria: SingerService.CriteriaDto):\
  \ Flux {\nval fieldName = SingerService.FieldGroup.getField(criteria.fieldName!!.uppercase())\n\
  return when (fieldName) {\nSingerService.FieldGroup.FIRSTNAME ->\nif (\"*\" == criteria.fieldValue)\
  \ singerRepo!!.findAll()\nelse singerRepo!!.findByFirstName(\ncriteria.fieldValue!!\n\
  )\nSingerService.FieldGroup.LASTNAME ->\nif (\"*\" == criteria.fieldValue) singerRepo!!.findAll()\n\
  else singerRepo!!.findByLastName(\ncriteria.fieldValue!!\n)\nSingerService.FieldGroup.BIRTHDATE\
  \ ->\nif (\"*\" == criteria.fieldValue) singerRepo!!.findAll()\nelse singerRepo!!.findByBirthDate(\n\
  LocalDate.parse(criteria.fieldValue!!,\nDateTimeFormatter.ofPattern(\"yyyy-MM-dd\"\
  ))\n)\n}\n}\n...\n}\n清单 20-33\nSingerServiceImpl#findByCriteriaDto(..) 实现\n```\n\
  \n为了增加趣味性，我们添加了选择所有条目的功能——只需将字段值设为 `*` 即可。\n\n`findByCriteriaDto(..)` 方法由 `SingerHandler`\
  \ 中的处理函数调用，如清单 20-34 所示。\n\n\n\n```\npackage com.apress.prospring6.twenty.boot.handler\n\
  import org.springframework.validation.BeanPropertyBindingResult\n// import 语句已省略\n\
  @Component\nclass SingerHandler(private val singerService: SingerService) {\n...\n\
  fun search(serverRequest: ServerRequest): Mono {\nval criteriaMono = serverRequest.bodyToMono(\n\
  SingerService.CriteriaDto::class.java\n)\nreturn criteriaMono.log()\n.flatMap {\
  \ criteria: SingerService.CriteriaDto ->\nvalidate(\ncriteria\n)\n}\n.flatMap {\
  \ criteria: SingerService.CriteriaDto ->\nServerResponse.ok()\n.contentType(MediaType.APPLICATION_JSON)\n\
  .body(\nsingerService.findByCriteriaDto(criteria),\nSinger::class.java\n)\n}\n}\n\
  private fun validate(criteria: SingerService.CriteriaDto):\nMono {\nval validator\
  \ = SingerService.CriteriaValidator()\nval errors = BeanPropertyBindingResult(criteria,\
  \ \"criteria\")\nvalidator.validate(criteria, errors)\nif (errors.hasErrors()) {\n\
  // throw new ServerWebInputException(errors.toString());\nthrow MissingValueException.of(errors.allErrors)\n\
  }\nreturn Mono.just(criteria)\n}\n...\n}\n清单 20-34 调用 `findByCriteriaDto(..)` 服务方法的处理函数\n\
  ```\n\n请注意 `validate(..)` 方法，它在响应式链中用作处理器。在这个简单示例中，`CriteriaValidator` 在此方法中实例化；在更大的应用程序中，如果验证器在多个处理函数中使用，你可能希望将其声明为一个\
  \ Bean。如果 `validator.validate(criteria, errors)` 填充了 `errors` 对象，则会使用缺失字段的名称和错误消息创建一个\
  \ `MissingValueException`。`MissingValueException` 是一个自定义异常类型，带有一个简单的构建器，可以将验证错误转换为可在界面中显示的表示形式。\n\
  \n清单 20-35 展示了这个自定义异常类型。\n\n```\npackage com.apress.prospring6.twenty.boot.problem\n\
  import org.springframework.validation.FieldError\nimport org.springframework.validation.ObjectError\n\
  // 部分 import 语句已省略\nclass MissingValueException : RuntimeException {\nvar fieldNames:\
  \ Map = mutableMapOf()\nprivate set\nconstructor(message: String?, fieldNames: Map)\
  \ : super(message) {\nthis.fieldNames = fieldNames\n}\nconstructor(message: String?,\
  \ cause: Throwable?, fieldNames: Map) : super(message, cause) {\nthis.fieldNames\
  \ = fieldNames\n}\ncompanion object {\nfun of(errors: List): MissingValueException\
  \ {\nval fields: List = ArrayList()\nval fieldNames = HashMap()\nerrors.forEach(Consumer\
  \ { err: ObjectError ->\nfieldNames[(err as FieldError).field] = err.getDefaultMessage()!!\n\
  })\nreturn MissingValueException(\"某些值缺失！\", fieldNames)\n}\n}\n}\n清单 20-35 `MissingValueException`\
  \ 自定义异常类型\n```\n\n下一步是在 `SingerHandler` 中添加一个方法来渲染搜索视图，如清单 20-36 所示。\n\n```\npackage\
  \ com.apress.prospring6.twenty.boot.handler\n// import 语句已省略\n@Component\nclass\
  \ SingerHandler(private val singerService: SingerService) {\n...\nfun searchView(request:\
  \ ServerRequest?): Mono {\nreturn ServerResponse\n.ok()\n.contentType(MediaType.TEXT_HTML)\n\
  .render(\"singers/search\", SingerService.CriteriaDto())\n}\n}\n清单 20-36 用于渲染 Thymeleaf\
  \ 搜索视图的 `SingerHandler.searchView()` 处理函数\n```\n\n现在，在设计视图模板之前，我们需要将两个新处理函数的路由添加到清单\
  \ 20-19 中引入的 `singerRoutes` 路由函数中。我们还需要在 `WebExceptionHandler` 中添加一个新部分来处理 `MissingValueException`。\n\
  \n清单 20-37 展示了 `singerRoutes` 路由函数的最小配置，包含两个映射以及一个新的 `WebExceptionHandler` Bean，其中包含一个用于处理\
  \ `MissingValueException` 的代码块。\n\n```\npackage com.apress.prospring6.twenty.boot\n\
  // import 语句已省略\n@Configuration\nopen class RoutesConfig {\n...\n@Bean\nopen fun\
  \ singerRoutes( homeHandler:HomeHandler,\nsingerHandler:SingerHandler):RouterFunction\
  \ {\nreturn route()\n// 返回 home 视图模板\n.GET(\"/\", homeHandler::view)\n.GET(\"/home\"\
  , homeHandler::view)\n.GET(\"/singers/search\", singerHandler::searchView)\n.POST(\"\
  /singers/go\", singerHandler::search)\n// 这些必须放在这里，否则参数将不会被考虑\n.GET(\"/handler/singer\"\
  , queryParam(\"name\", {_ -> true}),\nsingerHandler::searchSingers)\n.GET(\"/handler/singer\"\
  , RequestPredicates.all()\n.and(queryParam(\"fn\", {_ -> true}))\n.and(queryParam(\"\
  ln\", {_ -> true})), singerHandler::searchSinger)\n// 带参数的请求总是优先\n.GET(\"/handler/singer\"\
  , singerHandler.list)\n.POST(\"/handler/singer\", singerHandler::create)\n.GET(\"\
  /handler/singer/{id}\", singerHandler::findById)\n.PUT(\"/handler/singer/{id}\"\
  , singerHandler::updateById)\n.DELETE(\"/handler/singer/{id}\", singerHandler.deleteById)\n\
  .filter { request, next ->\nLOGGER.info(\"处理函数调用前：{}\", request.path())\nreturn@filter\
  \ next.handle(request)\n}\n.build()\n}\n@Bean\n@Order(-2)\nopen fun  exceptionHandler():WebExceptionHandler\
  \ {\nreturn object : WebExceptionHandler {\noverride fun handle(exchange: ServerWebExchange,\
  \ ex: Throwable): Mono {\nwhen(ex) {\nis SaveException -> {\nLOGGER.debug(\"RouterConfig::\
  \ 处理异常 :: \", ex)\nexchange.response.setStatusCode(HttpStatus.BAD_REQUEST)\n// 标记响应为已完成，并禁止向其写入\n\
  return exchange.response.setComplete()\n}\nis IllegalArgumentException -> {\nLOGGER.debug(\"\
  RouterConfig:: 处理异常 :: \" , ex)\nexchange.response.setStatusCode(HttpStatus.BAD_REQUEST)\n\
  // 标记响应为已完成，并禁止向其写入\nreturn exchange.response.setComplete()\n}\nis MissingValueException\
  \ -> {\nexchange.response.setStatusCode(HttpStatus.BAD_REQUEST)\nexchange.response.headers.add(\"\
  Content-Type\", \"application/json\")\ntry {\nval message = JsonMapper().writeValueAsString(ex.fieldNames)\n\
  val buffer = exchange.response.bufferFactory().\nwrap(message.toByteArray())\nreturn\
  \ exchange.response.writeWith(Flux.just(buffer))\n} catch (_:JsonProcessingException)\
  \ {\n}\n}\n}\nreturn Mono.error(ex)\n}\n}\n}\ncompanion object {\nval LOGGER = LoggerFactory.getLogger(RoutesConfig::class.java)\n\
  }\n}\n清单 20-37 路由函数的最小配置\n```\n\n现在我们拥有了除视图之外所需的一切。`singers/search.html` 视图需要包含一个动态区域，用于根据搜索结果构建表格；一个仅在出现错误时显示的动态区域；以及用于填充这些元素的\
