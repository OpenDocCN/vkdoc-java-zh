  ### 模拟 JDBC 操作的 Spring 类


  在前一节中，你了解了 `JdbcTemplate` 及相关数据映射工具类如何极大地简化了使用 JDBC 开发数据访问逻辑的编程模型。基于 `JdbcTemplate`，Spring
  还提供了一些有用的类来模拟 JDBC 数据操作，并允许开发者以更面向对象的方式维护从 `ResultSet` 到领域对象的查询和转换逻辑。具体来说，本节将介绍以下类：


  *   `MappingSqlQuery<T>`：这个抽象类允许你将查询 `String` 与 `mapRow()` 方法封装到单个类中。


  *   `SqlUpdate`：这个类允许你将任何 SQL 更新语句封装到其中。它还提供了许多有用的功能，用于绑定 SQL 参数、在插入新记录后检索 RDBMS
  生成的键等。


  *   `BatchSqlUpdate`：顾名思义，这个类允许你执行批量更新操作。例如，你可以遍历一个 `List` 对象，让 `BatchSqlUpdate`
  将记录排队，并批量提交更新语句。你可以设置批量大小并随时刷新操作。


  *   `SqlFunction<T>`：这个类允许你使用参数和返回类型调用数据库中的存储函数。另一个类 `StoredProcedure` 也帮助你调用存储过程。


