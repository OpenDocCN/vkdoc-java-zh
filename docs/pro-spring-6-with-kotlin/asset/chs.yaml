  \ bean 生成的不同用户名。\n\n\n\n## Spring Boot Data JPA\n\n到目前为止，我们已经显式配置了所有内容，包括实体、数据库、仓库和服务。正如您现在可能预料到的，应该有一个\
  \ Spring Boot 启动器构件来简化操作。Spring Boot JDBC 在**第** **9** **章**中介绍过，但其能力在与 Spring Data\
