  ## 介绍 Spring 类型转换


  Spring 3.0 引入了一个通用的类型转换系统，它位于 `org.springframework.core.convert` 包下。除了提供 `PropertyEditor`
  支持的替代方案外，类型转换系统还可以配置为在任何 Kotlin 类型和 POJO 之间进行转换（而 `PropertyEditor` 专注于将属性文件中的 `String`
  表示形式转换为 Java/Kotlin 类型）。


  ### 实现自定义转换器


  为了演示类型转换系统的实际应用，让我们重新审视前面的示例，并使用相同的 `Blogger` 类。假设这次我们想使用类型转换系统将 `String` 格式的日期转换为博主的
  `birthDate` 属性，该属性的类型是 `LocalDate`。为了支持这种转换，我们不是创建自定义的 `PropertyEditor`，而是通过实现 `org.springframework.core.convert.converter.Converter<S,T>`
  接口来创建一个自定义转换器。清单 11-7 中的代码片段展示了这个自定义转换器。


  ```

  package com.apress.prospring6.eleven.converter.bean

  import org.springframework.core.convert.converter.Converter

  import java.time.LocalDate

  import java.time.format.DateTimeFormatter

  class LocalDateConverter : Converter {

  private val dateFormat = DateTimeFormatter.ofPattern("yyyy-MM-dd")

  override fun convert(source: String): LocalDate {

  return LocalDate.parse(source, dateFormat)

  }

  }

  清单 11-7

  LocalDateConverter 实现

  ```


  我们实现了 `Converter<String, DateTime>` 接口，这意味着该转换器负责将 `String`（源类型 S）转换为 `LocalDate`
  类型（目标类型 T）。


  为了使用这个转换器而不是 `PropertyEditor`，我们需要在 Spring 的 `ApplicationContext` 中配置一个 `org.springframework.core.convert.ConversionService`
  接口的实例。清单 11-8 展示了 Kotlin 配置类。


  ```

  package com.apress.prospring6.eleven.converter.bean

  import org.springframework.context.support.ConversionServiceFactoryBean

  // 其他导入语句已省略

  @Configuration

  @ComponentScan

  open class ConverterCfg {

  @Bean

  open fun conversionService(): ConversionServiceFactoryBean {

  val conversionServiceFactoryBean = ConversionServiceFactoryBean()

  val convs = mutableSetOf(

  LocalDateConverter())

  conversionServiceFactoryBean.setConverters(convs)

  conversionServiceFactoryBean.afterPropertiesSet()

  return conversionServiceFactoryBean

  }

  }

  清单 11-8

  用于使用转换器实现的 Kotlin 配置类

  ```


  这里，我们通过声明一个类为 `ConversionServiceFactoryBean` 的 `conversionService` Bean，来指示 Spring
  使用类型转换系统。这种类型的 Bean 将多个转换服务分组。如果没有定义转换服务 Bean，Spring 将使用基于 `PropertyEditor` 的系统。


  默认情况下，类型转换服务支持常见类型之间的转换，包括字符串、数字、枚举、集合、映射等。此外，也支持在基于 `PropertyEditor` 的系统中从 `Strings`
  到 Java/Kotlin 类型的转换。


  测试方法与前面清单 11-5 中展示的方法几乎相同，唯一的区别是将 `CustomRegistrarCfg` 类替换为 `ConverterCfg`。




  ### 任意类型之间的转换


  类型转换系统的真正强大之处在于能够在任意类型之间进行转换。清单 11-9 介绍了仅包含两个字段的记录 `SimpleBlogger`，以及将 `Blogger`
  实例转换为 `SimpleBlogger` 实例的转换器实现。


  ```

  package com.apress.prospring6.eleven.domain

  import com.apress.prospring6.eleven.Blogger

  import org.springframework.core.convert.converter.Converter

  import java.net.URL

  data class SimpleBlogger (val fullName:String, val personalSite:URL) {

  class BloggerToSimpleBloggerConverter : Converter {

  override fun convert(source:Blogger):SimpleBlogger =

  SimpleBlogger(source.firstName + " " + source.lastName, source.personalSite)

  }

  }

  清单 11-9

  SimpleBlogger 记录与转换器

  ```


  要将此转换器添加到应用程序上下文配置中，需要将 `BloggerToSimpleBloggerConverter` 的实例添加到 `ConversionServiceFactoryBean`
  的转换器集合中，如清单 11-10 所示。


  ```

  package com.apress.prospring6.eleven.converter.bean

  // 导入语句已省略

  @Configuration

  @ComponentScan

  open class ConverterCfg {

  @Bean

  open fun conversionService(): ConversionServiceFactoryBean {

  val conversionServiceFactoryBean = ConversionServiceFactoryBean()

  val convs = mutableSetOf(

  LocalDateConverter(),

  SimpleBlogger.BloggerToSimpleBloggerConverter())

  conversionServiceFactoryBean.setConverters(convs)

  conversionServiceFactoryBean.afterPropertiesSet()

  return conversionServiceFactoryBean

  }

  }

  清单 11-10

  注册 SimpleBlogger 类与转换器

  ```


  要测试此转换器，我们需要从上下文中检索转换器 bean，并将其中一个 `Blogger` 实例转换为 `SimpleBlogger` 实例，如清单 11-11
  所示。


  ```

  package com.apress.prospring6.eleven

  import org.springframework.core.convert.ConversionService

  class ConvertersTest {

  @Test

  fun testConvertingToSimpleBlogger() {

  AnnotationConfigApplicationContext(AppConfig::class.java,

  ConverterCfg::class.java).use { ctx ->

  val springBlogger = ctx.getBean("springBlogger", Blogger::class.java)

  LOGGER.info("SpringBlogger info: {}", springBlogger)

  val conversionService =

  ctx.getBean(

  ConversionService::class.java

  )

  val simpleBlogger =

  conversionService.convert(springBlogger, SimpleBlogger::class.java)

  LOGGER.info("simpleBlogger info: {}", simpleBlogger)

  }

