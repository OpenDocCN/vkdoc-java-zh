  ## 理解代理


  到目前为止，我们只是粗略地了解了由 `ProxyFactory` 生成的代理。我们提到 Spring 中有两种类型的代理：使用 JDK `Proxy` 类创建的
  JDK 代理，以及使用 CGLIB `Enhancer` 类创建的基于 CGLIB 的代理。你可能想知道这两种代理之间究竟有什么区别，以及为什么 Spring
  需要两种类型的代理。在本节中，我们将详细探讨代理之间的差异。


  代理的核心目标是拦截方法调用，并在必要时执行适用于特定方法的通知链。通知的管理和调用在很大程度上与代理无关，由 Spring AOP 框架管理。然而，代理负责拦截对所有方法的调用，并根据需要将它们传递给
  AOP 框架以应用通知。


  除了这个核心功能之外，代理还必须支持一组附加功能。可以配置代理通过 `AopContext` 类（这是一个抽象类）暴露自身，以便你可以检索代理并从目标对象调用代理上的通知方法。代理负责确保当通过
  `ProxyFactory.setExposeProxy()` 启用此选项时，代理类被适当地暴露。此外，所有代理类默认实现 `Advised` 接口，这允许在创建代理后更改通知链等操作。代理还必须确保任何返回
  `this`（即返回被代理的目标）的方法实际上返回的是代理而不是目标。


  如你所见，一个典型的代理有相当多的工作要执行，所有这些逻辑都在 JDK 和 CGLIB 代理中实现。


  ### 使用 JDK 动态代理


  **JDK 代理**是 Spring 中最基本的代理类型。与 CGLIB 代理不同，JDK 代理只能生成接口的代理，而不能生成类的代理。因此，任何你想要代理的对象必须至少实现一个接口，生成的代理将是一个实现该接口的对象。图
  5-4 展示了此类代理的抽象示意图。


  ![](img/524962_1_En_5_Fig4_HTML.jpg)


  JDK 代理的框图，包含调用 Bean、JDK 代理、目标 Bean 和接口。


  图 5-4


  JDK 代理抽象示意图


  通常，为你的类使用接口是一种良好的设计，但这并不总是可行的，尤其是在处理第三方或遗留代码时。在这种情况下，你必须使用 CGLIB 代理。当使用 JDK 代理时，所有方法调用都会被
  JVM 拦截并路由到代理的 `invoke()` 方法。然后，该方法会判断被调用的方法是否被通知（根据切入点定义的规则），如果是，则调用通知链，然后通过反射调用方法本身。除此之外，`invoke()`
  方法还执行了上一节讨论的所有逻辑。


  JDK 代理在进入 `invoke()` 方法之前，不会区分被通知和未被通知的方法。这意味着，对于代理上未被通知的方法，`invoke()` 方法仍然会被调用，所有检查仍然会执行，并且该方法仍然通过反射被调用。显然，每次调用该方法时都会产生运行时开销，即使代理除了通过反射调用未被通知的方法之外，通常不执行任何额外的处理。


  你可以通过使用 `setInterfaces()`（在 `ProxyFactory` 类间接扩展的 `AdvisedSupport` 类中）指定要代理的接口列表，来指示
  `ProxyFactory` 使用 JDK 代理。




  ### 使用 CGLIB 代理


  使用 JDK 代理时，每次调用方法时，所有关于如何处理特定方法调用的决策都在运行时进行。而使用 CGLIB 时，CGLIB 会为每个代理动态生成新类的字节码，并尽可能复用已生成的类。在这种情况下，生成的代理类型将是目标对象类的子类。图
  5-5 展示了此类代理的抽象模式。


  ![](img/524962_1_En_5_Fig5_HTML.jpg)


  CGLIB 代理的框图，包含调用 Bean、CGLIB 代理和目标 Bean。


  图 5-5


  CGLIB 代理抽象模式


  当首次创建 CGLIB 代理时，CGLIB 会询问 Spring 希望如何处理每个方法。这意味着，在 JDK 代理上每次调用 `invoke()` 时执行的许多决策，对于
  CGLIB 代理只需执行一次。由于 CGLIB 生成实际的字节码，因此在处理方法的方式上也有更大的灵活性。例如，CGLIB 代理会生成适当的字节码来直接调用任何未通知的方法，从而减少代理引入的开销。此外，CGLIB
  代理会判断方法是否可能返回 `this`；如果不可能，它允许直接调用该方法，从而再次减少运行时开销。


  CGLIB 代理处理固定通知链的方式也与 JDK 代理不同。*固定通知链*是指你保证在代理生成后不会更改的通知链。默认情况下，即使在代理创建后，你仍然可以更改代理上的通知器和通知，尽管这很少是必需的。CGLIB
  代理以特定方式处理固定通知链，从而减少执行通知链的运行时开销。


  ![](img/524962_1_En_5_Figh_HTML.jpg) 一个警告图标。圆圈内有一个感叹号。 使用 CGLIB 代理时存在一些限制：


  1.  显而易见，无法为 final 类创建 CGLIB 代理（因为它们无法被继承）。

  2.  由于静态成员属于类，而非实例，因此它们无法被代理。

  3.  私有方法也无法被代理，因为子类无法访问它们。


  ### 比较代理性能


  到目前为止，我们仅粗略讨论了代理类型在实现上的差异。在本节中，我们将运行一个简单的测试来比较 CGLIB 代理与 JDK 代理的性能。为此，我们需要最简单的 Bean
  及其接口，包含空操作方法和一个空操作的前置通知。


  该 Bean 名为 `DefaultSimpleBean`，并实现了 `SimpleBean` 接口。它实现了接口声明的两个方法，恰当地命名为 `advised()`
  和 `unadvised()`。这两个方法如清单 5-25 所示。


  ```

  package com.apress.prospring6.five.performance

  interface SimpleBean {

  fun advised()

  fun unadvised()

  }

  // DefaultSimpleBean.kt 位于同一包中

  open class DefaultSimpleBean : SimpleBean {

  override fun advised() {

  System.currentTimeMillis()

  }

  override fun unadvised() {

  System.currentTimeMillis()

  }

  }

  清单 5-25

  SimpleBean 及其实现

  ```


  清单 5-26 展示了 `NoOpBeforeAdvice` 类，它只是一个没有任何操作的简单前置通知；这是为了避免污染输出结果。


  ```

  package com.apress.prospring6.five.performance

  // 省略了 import 语句

  class NoOpBeforeAdvice : MethodBeforeAdvice {

  @Throws(Throwable::class)

  override fun before(method: Method, args: Array, @Nullable target: Any?) {

  // 空操作

  }

  }

  清单 5-26

  NoOpBeforeAdvice 实现

  ```


  清单 5-27 展示了用于测试各种类型代理的代码。


  ```

  package com.apress.prospring6.five.performance

  object ProxyPerfTestDemo {

  private val LOGGER = LoggerFactory.getLogger(ProxyPerfTestDemo::class.java)

  @JvmStatic

  fun main(args: Array) {

  val target: SimpleBean = DefaultSimpleBean()

  val advisor = NameMatchMethodPointcutAdvisor(NoOpBeforeAdvice())

  advisor.setMappedName("advised")

  LOGGER.info("开始测试...")

  runCglibTests(advisor, target)

  runCglibFrozenTests(advisor, target)

  runJdkTests(advisor, target)

  }

  private fun runCglibTests(advisor: Advisor, target: SimpleBean) {

  val pf = ProxyFactory()

  pf.isProxyTargetClass = true

  pf.setTarget(target)

  pf.addAdvisor(advisor)

  val proxy = pf.proxy as SimpleBean

  val testResults = test(proxy)

  LOGGER.info(" --- CGLIB (标准) 测试结果 ---\n {} ", testResults)

  }

  private fun runCglibFrozenTests(advisor: Advisor, target: SimpleBean) {

  val pf = ProxyFactory()

  pf.isProxyTargetClass = true

  pf.setTarget(target)

  pf.addAdvisor(advisor)

  pf.isFrozen = true

  val proxy = pf.proxy as SimpleBean

  val testResults = test(proxy)

  LOGGER.info(" --- CGLIB (冻结) 测试结果 ---\n {} ", testResults)

  }

  private fun runJdkTests(advisor: Advisor, target: SimpleBean) {

  val pf = ProxyFactory()

  pf.setTarget(target)

  pf.addAdvisor(advisor)

  pf.setInterfaces(SimpleBean::class.java)

  val proxy = pf.proxy as SimpleBean

  val testResults = test(proxy)

  LOGGER.info(" --- JDK 测试结果 ---\n {} ", testResults)

  }

  private fun test(bean: SimpleBean): TestResults {

  val testResults = TestResults()

  var before = System.currentTimeMillis()

  for (x in 0..499999) {

  bean.advised()

  }

  var after = System.currentTimeMillis()

  testResults.advisedMethodTime = after - before

  //-----

  before = System.currentTimeMillis()

  for (x in 0..499999) {

  bean.unadvised()

  }

  after = System.currentTimeMillis()

  testResults.unadvisedMethodTime = after - before

  //-----

  before = System.currentTimeMillis()

  for (x in 0..499999) {

  bean.equals(bean)

  }

  after = System.currentTimeMillis()

  testResults.equalsTime = after - before

  // ----

  before = System.currentTimeMillis()

  for (x in 0..499999) {

  bean.hashCode()

  }

  after = System.currentTimeMillis()

  testResults.hashCodeTime = after - before

  // -----

  val advised = bean as Advised

  before = System.currentTimeMillis()

  for (x in 0..499999) {

  advised.targetClass

  }

  after = System.currentTimeMillis()

  testResults.proxyTargetTime = after - before

  return testResults

  }

  }

  清单 5-27

  各种类型的代理

  ```




  在这段代码中，你可以看到正在测试三种代理：


  *   标准 CGLIB 代理

  *   带有冻结通知链的 CGLIB 代理（即，当通过调用 `ProxyFactory` 间接扩展的 `ProxyConfig` 类中的 `setFrozen()`
  方法冻结代理时，CGLIB 会执行进一步优化；但此后不允许再更改通知）

  *   JDK 代理


  对于每种代理类型，你运行以下五个测试用例：


  *   *被通知方法* *（测试 1）*：这是一个被通知的方法。测试中使用的通知类型是不执行任何处理的前置通知，因此它减少了通知对性能测试的影响。

  *   *未通知方法* *（测试 2）*：这是代理上未被通知的方法。通常你的代理有许多方法未被通知。此测试考察不同代理的未通知方法的性能表现。

  *   *`equals()` 方法* *（测试 3）*：此测试考察调用 `equals()` 方法的开销。当你在 `HashMap<K,V>` 或类似集合中将代理用作键时，这一点尤其重要。

  *   *`hashCode()` 方法* *（测试 4）*：与 `equals()` 方法一样，`hashCode()` 方法在使用 HashMap 或类似集合时也很重要。

  *   *在 `Advised` 接口上执行方法（测试 5）*：正如我们之前提到的，代理默认实现了 `Advised` 接口，允许你在创建后修改代理并查询代理的相关信息。此测试考察使用不同代理类型访问
  `Advised` 接口方法的速度。


  表 5-3 显示了这些测试的结果。


  表 5-3


  代理性能测试结果（单位：毫秒）


  | 被测试的方法 | CGLIB（标准） | CGLIB（冻结） | JDK |

  | --- | --- | --- | --- |

  | `advised()` | 126 | 73 | 159 |

  | `unadvised()` | 127 | 28 | 96 |

  | `equals()` | 20 | 16 | 122 |

  | `hashCode()` | 28 | 20 | 33 |

  | `Advised.getProxyTargetClass()` | 13 | 8 | 81 |


  如你所见，标准 CGLIB 和 JDK 动态代理在 `advised()` 和 `unadvised()` 方法上的性能差异不大。一如既往，这些数字会因硬件和所使用的
  JDK 而异。


  然而，当你使用带有冻结通知链的 CGLIB 代理时，存在显著差异。`equals()` 和 `hashCode()` 方法也有类似的情况，使用 CGLIB 代理时它们明显更快。对于
  `Advised` 接口上的方法，你会注意到它们在 CGLIB 冻结代理上也更快。原因是 `Advised` 方法在 `intercept()` 方法中较早被处理，因此它们避免了其他方法所需的大部分逻辑。


  `TestResults` 类是一个简单的工具类，包含四个属性，以被测试的方法命名。将每种代理类型的测试结果保存在此类型的实例中是出于实际原因，旨在保持代码简洁易读。你可以在清单
  5-28 中看到这个类。


  ```

  package com.apress.prospring6.five.performance

  // 导入语句已省略

  class TestResults {

  var advisedMethodTime: Long = 0

  var unadvisedMethodTime: Long = 0

  var equalsTime: Long = 0

  var hashCodeTime: Long = 0

  var proxyTargetTime: Long = 0

  override fun toString(): String {

  return ToStringBuilder(this)

  .append("advised", advisedMethodTime)

  .append("unadvised", unadvisedMethodTime)

  .append("equals ", equalsTime)

  .append("hashCode", hashCodeTime)

  .append("getProxyTargetClass ", proxyTargetTime)

  .toString()

  }

  companion object {

  private val LOGGER = LoggerFactory.getLogger(TestResults::class.java)

  }

  }

