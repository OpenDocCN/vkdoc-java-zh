  \n### 插入数据\n\n使用 JPA 插入数据很简单。与 Hibernate 一样，JPA 也支持检索数据库生成的主键。清单 8-20 展示了 `save(..)`\
  \ 方法。\n\n```\npackage com.apress.prospring6.eight.service\n// 导入语句已省略\n@Service(\"\
  jpaSingerService\")\n@Repository\n@Transactional\nclass SingerServiceImpl : SingerService\
  \ {\n@PersistenceContext\nprivate val em: EntityManager? = null\noverride fun save(singer:\
  \ Singer) {\nif (singer.id == null) {\nLOGGER.info(\"正在插入新歌手\")\nem!!.persist(singer)\n\
  } else {\nem!!.merge(singer)\nLOGGER.info(\"正在更新现有歌手\")\n}\n}\n...\n}\n清单 8-20\n\
  SingerServiceImpl.save(..) 方法\n```\n\n如图所示，`save(..)` 方法首先通过检查 `id` 值来判断对象是否为新实体实例。如果\
  \ `id` 为 `null`（即尚未分配），则该对象是新实体实例，将调用 `EntityManager.persist(..)` 方法。调用 `persist(..)`\
  \ 方法时，`EntityManager` 会持久化该实体，并使其成为当前持久化上下文中的受管实例。如果 `id` 值存在，则我们正在执行更新，将改为调用 `EntityManager.merge(..)`\
  \ 方法。调用 `merge(..)` 方法时，`EntityManager` 会将实体的状态合并到当前持久化上下文中。\n\n清单 8-21 展示了插入新 `Singer`\
  \ 记录的代码。这一切都在一个测试方法中完成，因为我们想测试插入是否成功。\n\n```\npackage com.apress.prospring6.eight\n\
  // 导入语句已省略\n// 注解已省略\nclass SingerServiceTest {\n@Autowired\n@Qualifier(\"jpaSingerService\"\
  )\nvar singerService: SingerService? = null\n@Autowired\nvar singerSummaryService:\
  \ SingerSummaryService? = null\n@Test\n@DisplayName(\"应插入带有关联的歌手\")\n@Sql(\nstatements\
  \ = [ // 避免污染测试上下文\n\"delete from ALBUM where SINGER_ID = (select ID from SINGER\
  \ where FIRST_NAME = 'BB')\", \"delete from SINGER_INSTRUMENT where SINGER_ID =\
  \ (select ID from SINGER where FIRST_NAME = 'BB')\", \"delete from SINGER where\
  \ FIRST_NAME = 'BB'\"],\nexecutionPhase = Sql.ExecutionPhase.AFTER_TEST_METHOD\n\
  )\nfun testInsert() {\nval singer = Singer()\nsinger.firstName = \"BB\"\nsinger.lastName\
  \ = \"King\"\nsinger.birthDate = LocalDate.of(1940, 8, 16)\nvar album = Album()\n\
  album.title = \"My Kind of Blues\"\nalbum.releaseDate = LocalDate.of(1961, 7, 18)\n\
  singer.addAlbum(album)\nalbum = Album()\nalbum.title = \"A Heart Full of Blues\"\
  \nalbum.releaseDate = LocalDate.of(1962, 3, 20)\nsinger.addAlbum(album)\nsingerService!!.save(singer)\n\
  Assertions.assertNotNull(singer.id)\nval singers: List = singerService!!.findAllWithAlbum()\n\
  .peek\n{ s: Singer ->\nLOGGER.info(s.toString())\ns.albums.forEach { a: Album ->\n\
  LOGGER.info(\n\"\\t 专辑:$a\"\n)\n}\ns.instruments.forEach { i: Instrument ->\nLOGGER.info(\n\
  \"\\t 乐器: \" + i.instrumentId\n)\n}\n}.toList()\nAssertions.assertEquals(4, singers.size)\n\
  }\n...\n}\n清单 8-21\n测试 SingerServiceImpl.save(..) 方法\n```\n\n如图所示，我们创建了一个新歌手，添加了两张专辑，并保存了该对象。通过验证\
  \ `findAllWithAlbum()` 方法返回的结果集大小来测试此操作是否成功。\n\n`@Sql` 注解用于清理数据库，以避免意外导致其他基于初始测试数据集运行的测试失败。\n\
  \n\n\n### 更新数据\n\n更新数据与插入数据一样简单，正如您所见，插入和更新操作共用一个方法。我们可以通过两种方式测试更新操作：更新歌手记录的姓名或其他属性，或者移除关联关系（例如专辑）。清单\
  \ 8-22 展示了测试 `SingerServiceImpl.save(..)` 方法执行更新的两种方式。\n\n```\npackage com.apress.prospring6.eight;\n\
  // 导入语句已省略\n// 注解已省略\n@Testcontainers\n@SqlMergeMode(SqlMergeMode.MergeMode.MERGE)\n\
  @Sql(\"classpath:testcontainers/drop-schema.sql\", \"classpath:testcontainers/create-schema.sql\"\
  )\n@SpringJUnitConfig(classes = [SingerServiceTest.TestContainersConfig::class])\n\
  class SingerServiceTest {\n@Autowired\n@Qualifier(\"jpaSingerService\")\nvar singerService:\
  \ SingerService? = null\n@Autowired\nvar singerSummaryService: SingerSummaryService?\
  \ = null\n@Test\n@SqlGroup(\nSql(\nscripts = [\"classpath:testcontainers/add-nina.sql\"\
  ],\nexecutionPhase = Sql.ExecutionPhase.BEFORE_TEST_METHOD\n),\nSql(\nscripts =\
  \ [\"classpath:testcontainers/remove-nina.sql\"],\nexecutionPhase = Sql.ExecutionPhase.AFTER_TEST_METHOD\n\
  )\n)\n@DisplayName(\"应能更新一位歌手\")\nfun testUpdate() {\nval singer = singerService!!.findById(5L)!!\n\
  // 确保该歌手存在\nAssertions.assertNotNull(singer)\n// 确保获取到预期的歌手\nAssertions.assertEquals(\"\
  Simone\", singer.lastName)\n// 获取专辑\nval album = singer.albums.stream().filter {\
  \ a: Album ->\na.title == \"I Put a Spell on You\" }\n.findFirst().orElse(null)\n\
  Assertions.assertNotNull(album)\nsinger.firstName = \"Eunice Kathleen\"\nsinger.lastName\
  \ = \"Waymon\"\nsinger.removeAlbum(album)\nval version = singer.version\nsingerService!!.save(singer)\n\
  val nina = singerService!!.findById(5L)!!\nAssertions.assertAll(\"nina 已被更新\",\n\
  Executable { Assertions.assertNotNull(nina) },\nExecutable {\nAssertions.assertEquals(\n\
  version + 1,\nnina.version\n)\n}\n)\n}\n@Test\nfun testUpdateAlbumSet() {\nval singer\
  \ = singerService!!.findById(1L)!!\n// 确保该歌手存在\nAssertions.assertNotNull(singer)\n\
  // 确保获取到预期的记录\nAssertions.assertEquals(\"Mayer\", singer.lastName)\n// 获取专辑\nval\
  \ album = singer.albums.stream().filter { a: Album ->\na.title == \"Battle Studies\"\
  \ }\n.findAny().orElse(null)\nsinger.firstName = \"John Clayton\"\nsinger.removeAlbum(album)\n\
  singerService!!.save(singer)\nval singers: List = singerService!!.findAllWithAlbum()\n\
  .peek{ s: Singer ->\nLOGGER.info(s.toString())\ns.albums.forEach{ a: Album ->\n\
  LOGGER.info(\n\"\\t 专辑:$a\"\n)\n}\ns.instruments.forEach{ i: Instrument ->\nLOGGER.info(\n\
  \"\\t 乐器: \" + i.instrumentId\n)\n}\n}.toList()\nAssertions.assertEquals(3, singers.size)\n\
  }\n...\n}\n清单 8-22  测试 SingerServiceImpl.save(..) 方法执行更新的两种形式\n```\n\n在 `testUpdate()`\
  \ 方法中，我们首先检索 ID 为 5 的记录，并更改其名和姓。接着调用 `SingerService.save(..)` 方法，然后从数据库中检索已保存的项目。更新操作的成功通过其\
  \ `version` 字段的递增来确认。\n\n在 `testUpdateAlbumSet()` 方法中，我们首先检索 ID 为 1 的记录，并更改其名。然后遍历其\
  \ `Album` 关联，检索标题为 *Battle Studies* 的专辑，并将其从歌手的 albums 属性中移除。最后，我们再次调用 `SingerService.save(..)`\
  \ 方法。执行此方法时，您可以通过查看控制台日志并确认 *Battle Studies* 专辑未显示，来检查更新操作是否成功。\n\n![](img/524962_1_En_8_Figf_HTML.jpg)\
  \ 一个符号。它描绘了一个实心圆内的感叹号。  该专辑可以被移除，是因为在一对多关联中定义了 `orphanRemoval=true` 属性，该属性指示 JPA\
  \ 提供者（Hibernate）移除数据库中所有存在但持久化时在对象中不再存在的孤立记录：`@OneToMany(mappedBy = \"singer\",\
  \ cascade=CascadeType.ALL, orphanRemoval=true)`。\n\n### 删除数据\n\n删除数据同样简单。只需调用 `EntityManager.remove()`\
  \ 方法并传入 `Singer` 对象即可。清单 8-23 展示了删除歌手的更新代码。\n\n```\npackage com.apress.prospring6.eight.service\n\
  // 导入语句已省略\n@Service(\"jpaSingerService\")\n@Repository\n@Transactional\nclass SingerServiceImpl\
  \ : SingerService {\n@PersistenceContext\nprivate val em: EntityManager? = null\n\
  override fun delete(singer: Singer) {\nval mergedContact = em!!.merge(singer)\n\
  em.remove(mergedContact)\nLOGGER.info(\"ID 为 \" + singer.id + \" 的歌手已成功删除\")\n}\n\
  ...\n}\n清单 8-23  SingerServiceImpl.delete(..) 方法\n```\n\n首先调用 `EntityManager.merge(..)`\
  \ 方法将实体的状态合并到当前持久化上下文中。`merge(..)` 方法返回受管理的实体实例。然后调用 `EntityManager.remove()`，并传入受管理的歌手实体实例。由于我们在映射中定义了\
  \ `cascade=CascadeType.ALL`，删除操作会删除歌手记录及其所有关联信息，包括专辑和乐器。要测试删除操作，可以使用 `testDelete()`\
  \ 方法，如清单 8-24 所示。\n\n```\npackage com.apress.prospring6.eight\n// 导入语句已省略\n// 注解已省略\n\
  class SingerServiceTest {\n@Autowired\n@Qualifier(\"jpaSingerService\")\nvar singerService:\
  \ SingerService? = null\n@Autowired\nvar singerSummaryService: SingerSummaryService?\
  \ = null\n@Test\n@Sql(scripts = [\"classpath:testcontainers/add-chuck.sql\"], executionPhase\
  \ = Sql.ExecutionPhase.BEFORE_TEST_METHOD)\n@DisplayName(\"应能删除一位歌手\")\nfun testDelete()\
  \ {\nval singer = singerService!!.findById(6L)!!\n// 确保该歌手存在\nAssertions.assertNotNull(singer)\n\
  singerService!!.delete(singer)\nval deleted = singerService!!.findById(6L)\nAssertions.assertTrue(deleted\
  \ == null)\n}\n...\n}\n清单 8-24  测试 SingerServiceImpl.delete(..) 方法\n```\n\n清单 8-24\
  \ 检索 ID 为 6 的歌手，然后调用 `delete(..)` 方法删除该歌手信息。\n\n## 使用原生查询\n\n在讨论了使用 JPA 执行基本数据库操作之后，现在让我们继续探讨一些更高级的主题。有时您可能希望对提交给数据库的查询拥有绝对的控制权。一个例子是在\
  \ Oracle 数据库中使用层次查询。这种查询是数据库特定的，被称为*原生查询*。\n\nJPA 支持执行原生查询；`EntityManager` 将按原样将查询提交给数据库，不进行任何映射或转换。使用\
  \ JPA 原生查询的一个主要好处是能够将 `ResultSet` 映射回 ORM 映射的实体类。以下两节将讨论如何使用原生查询检索所有歌手，并直接将 `ResultSet`\
  \ 映射回 `Singer` 对象。\n\n\n\n### 使用简单原生查询\n\n为了演示如何使用原生查询，我们来实现一个从数据库中检索所有歌手的新方法。该方法如代码清单\
  \ 8-25 所示。\n\n```\npackage com.apress.prospring6.eight.service\n// 导入语句已省略\n@Service(\"\
  jpaSingerService\")\n@Repository\n@Transactional\nclass SingerServiceImpl : SingerService\
  \ {\n@PersistenceContext\nprivate val em: EntityManager? = null\n// select ID, FIRST_NAME,\
  \ LAST_NAME, BIRTH_DATE, VERSION\n// from SINGER\";\noverride fun findAllByNativeQuery():\
  \ Stream {\nreturn em!!.createNativeQuery(SingerService.ALL_SINGER_NATIVE_QUERY,\n\
  \"singerResult\")\n.resultList.stream() as Stream\n}\n...\n}\n代码清单 8-25\nSingerServiceImpl.findAllByNativeQuery(..)\
  \ 方法\n```\n\n可以看到，原生查询只是一个简单的 SQL 语句，用于检索 `SINGER` 表中的所有列。为了创建并执行该查询，首先调用了 `EntityManager.createNativeQuery(..)`，并传入查询字符串以及结果类型。结果类型应为一个映射实体类（此处为\
  \ `Singer` 类）。`createNativeQuery(..)` 方法返回一个 `Query` 实例，该实例提供了 `.resultList` 访问器来获取结果列表。JPA\
  \ 提供者将执行查询，并根据实体类中定义的 JPA 映射，将 `ResultSet` 对象转换为实体实例。执行上述方法将产生与 `findAll()` 方法相同的结果。\n\
  \n### 使用 SQL `ResultSet` 映射进行原生查询\n\n除了映射的领域对象之外，你还可以传入一个字符串，用于指定 SQL `ResultSet`\
  \ 映射的名称。SQL `ResultSet` 映射通过使用 `@SqlResultSetMapping` 注解在实体类级别定义。一个 SQL `ResultSet`\
  \ 映射可以包含一个或多个实体和列映射。为实体类定义了一个名为 `singerResult` 的 SQL `ResultSet` 映射，其 `entityClass`\
  \ 属性位于 `Singer` 类本身中。JPA 支持针对多个实体的更复杂映射，并支持向下到列级别的映射。\n\n在定义了 SQL `ResultSet` 映射之后，可以使用\
  \ `ResultSet` 映射的名称来调用 `findAllByNativeQuery()` 方法。代码清单 8-26 展示了更新后的 `findAllByNativeQuery()`\
  \ 方法。\n\n```\npackage com.apress.prospring6.eight.entities\nimport jakarta.persistence.EntityResult\n\
  import jakarta.persistence.SqlResultSetMapping\n// 其他导入语句已省略\n@Entity\n@Table(name\
  \ = \"SINGER\")\n@SqlResultSetMapping(\nname=\"singerResult\",\nentities=@EntityResult(entityClass=Singer.class)\n\
  )\nclass Singer : AbstractEntity {\n// 代码已省略\n}\n// ----------------------\n// 其他细节已省略\n\
  class SingerServiceImpl : SingerService {\noverride fun findAllByNativeQuery():Stream\
  \ {\nreturn em.createNativeQuery(ALL_SINGER_NATIVE_QUERY, \"singerResult\").resultList.stream()\
  \ as Stream\n}\n// 其他方法已省略\n}\n代码清单 8-26\nALL_SINGER_NATIVE_QUERY 原生查询的 @SqlResultSetMapping\
  \ 映射结果\n```\n\n如你所见，JPA 还通过提供灵活的 SQL `ResultSet` 映射工具，为执行原生查询提供了强大的支持。\n\n### 执行存储函数和存储过程\n\
  \n配置对 SQL 函数和存储过程执行的支持有多种方法，但最简单的是使用原生查询。为此，编写 SQL 来声明你的存储 SQL 函数或存储过程，使用 `jakarta.persistence`\
  \ 包中的 `@NamedNativeQuery` 将其 SQL 调用映射到查询名称，然后使用 `EntityManager.createNamedQuery(..)`\
  \ 创建原生查询，并通过 `getSingleResult()` 或 `.getResultList()` 或其他可用方法检索结果。\n\n代码清单 8-27\
  \ 展示了一个非常简单的 SQL 存储函数，该函数返回给定 `id` 的歌手的名。\n\n```\nCREATE FUNCTION IF NOT EXISTS\
  \ getFirstNameById (in_id INT) RETURNS VARCHAR(60)\nRETURN (SELECT first_name FROM\
  \ SINGER WHERE id = in_id);\n代码清单 8-27\ngetFirstNameById SQL 存储函数\n```\n\n`getFirstNameById(..)`\
  \ 存储函数的调用可以使用 `@NamedNativeQuery` 映射到一个名称。当为一个实体类型声明了多个原生查询时，可以将此注解包含在 `@NamedNativeQueries`\
  \ 中。这些注解在实体类上声明，在本例中为 `Singer` 类，如代码清单 8-28 所示。\n\n```\npackage com.apress.prospring6.eight.entities\n\
  // 其他类细节已省略\nimport jakarta.persistence.NamedNativeQueries\nimport jakarta.persistence.NamedNativeQuery\n\
  @NamedNativeQueries({\nNamedNativeQuery(\nname = \"Singer.getFirstNameById(?)\"\
  ,\nquery = \"select getfirstnamebyid(?)\")\n})\nclass Singer : AbstractEntity {\n\
  // 主体已省略\n}\n代码清单 8-28\ngetFirstNameById SQL 存储函数调用被映射到命名查询 Singer.getFirstNameById(?)\n\
  ```\n\nSQL 存储函数或存储过程本质上就是一个原生查询，因此它可以被映射到一个命名原生查询。名称非常灵活，在此场景中选择的名称是 `Singer.getFirstNameById(?)`，因为它非常明确地表明该查询特定于\
  \ `Singer` 实例，并且需要一个参数。\n\n由于查询是命名的，因此使用 `EntityManager.createNamedQuery(..)` 方法来创建查询并检索结果，如代码清单\
  \ 8-29 所示。\n\n```\npackage com.apress.prospring6.eight.service\n// 其他类细节已省略\nclass\
  \ SingerServiceImpl : SingerService {\noverride fun findFirstNameById(id:Long):String\
  \ {\nreturn em.createNamedQuery(\"Singer.getFirstNameById(?)\")\n.setParameter(1,\
  \ id).singleResult.toString();\n}\n...\n}\n代码清单 8-29\n使用 EntityManager 调用 SQL 存储函数\n\
  ```\n\n测试此方法的方式与**第** **7** **章**中为测试 SQL 函数和存储过程而引入的方法相同。\n\n`jakarta.persistence`\
  \ 包包含一个名为 `@NamedStoredProcedureQueries` 的注解，用于声明一个 SQL 存储过程数组，每个存储过程使用 `@NamedStoredProcedureQuery`\
  \ 进行配置。当使用这些注解声明时，可以从 `EntityManager` 使用 `createNamedStoredProcedureQuery(..)` 方法调用存储函数或存储过程。由于这些注解有些误导性（其名称暗示仅支持\
  \ SQL 存储过程），我们更倾向于使用命名原生查询。\n\n\n\n## 使用 JPA Criteria API 进行条件查询\n\n大多数应用程序都会提供前端界面供用户搜索信息。通常，界面上会显示许多可搜索的字段，用户仅在其中部分字段输入信息并执行搜索。为每种用户可能输入的参数组合准备大量查询语句是困难的。在这种情况下，Criteria\
  \ API 查询功能便应运而生。\n\n在 JPA 2 中，引入的一项主要新特性是强类型的 Criteria API 查询。在这个新的 Criteria API\
  \ 中，传入查询的条件基于映射实体类的元模型。因此，每个指定的条件都是强类型的，错误将在编译时而非运行时被发现。\n\n在 JPA Criteria API 中，实体类元模型由实体类名加上下划线后缀\
  \ `(_)` 表示。例如，`Singer` 实体类的元模型类是 `Singer_`。清单 8-30 展示了 `Singer_` 类。\n\n```\npackage\
  \ com.apress.prospring6.eight.entities\nimport jakarta.persistence.metamodel.SetAttribute\n\
  import jakarta.persistence.metamodel.SingularAttribute\nimport jakarta.persistence.metamodel.StaticMetamodel\n\
  import java.time.LocalDate\nimport javax.annotation.processing.Generated\n@Generated(value\
  \ = arrayOf(\"org.hibernate.jpamodelgen.JPAMetaModelEntityProcessor\"))\n@StaticMetamodel(Singer::class)\n\
  object Singer_ : com.apress.prospring6.eight.entities.AbstractEntity_() {\n@Volatile\n\
  var firstName: SingularAttribute? = null\n@Volatile\nvar lastName: SingularAttribute?\
  \ = null\n@Volatile\nvar albums: SetAttribute? = null\n@Volatile\nvar instruments:\
  \ SetAttribute? = null\n@Volatile\nvar birthDate: SingularAttribute? = null\nconst\
  \ val FIRST_NAME = \"firstName\"\nconst val LAST_NAME = \"lastName\"\nconst val\
  \ ALBUMS = \"albums\"\nconst val INSTRUMENTS = \"instruments\"\nconst val BIRTH_DATE\
  \ = \"birthDate\"\n}\n清单 8-30\nSinger 实体的元模型\n```\n\n元模型类使用 `@StaticMetamodel` 注解，其属性为映射的实体类。类内部声明了每个属性及其相关类型。手动编写和维护这些元模型类会很繁琐。不过，有工具可以根据实体类中的\
  \ JPA 映射自动生成这些元模型类。Hibernate 提供的工具称为 Hibernate Metamodel Generator^(⁷⁵)。\n\n生成元模型类的具体方式取决于你用于开发和构建项目的工具。我们建议阅读文档^(⁷⁶)中的“用法”部分以获取具体细节。\n\
  \n元模型类生成所需的依赖是 `hibernate-jpamodelgen` 库。\n\n设置好类生成策略后，我们来定义一个接受名字和姓氏以搜索歌手的查询。为此，我们将在\
  \ `SingerService` 接口中添加一个 `findByCriteriaQuery()` 方法，并在 `SingerServiceImpl` 中实现它，如清单\
  \ 8-31 所示。\n\n```\npackage com.apress.prospring6.eight.service\nimport com.apress.prospring6.eight.entities.Singer_\n\
  import org.apache.commons.lang3.StringUtils\nimport jakarta.persistence.criteria.CriteriaBuilder\n\
  import jakarta.persistence.criteria.CriteriaQuery\nimport jakarta.persistence.criteria.JoinType\n\
  import jakarta.persistence.criteria.Predicate\nimport jakarta.persistence.criteria.Root\n\
  // 其他导入语句已省略\n@Service(\"jpaSingerService\")\n@Repository\n@Transactional\nclass\
  \ SingerServiceImpl : SingerService {\n@PersistenceContext\nprivate val em: EntityManager?\
  \ = null\nfun findByCriteriaQuery(firstName: String, lastName: String): Stream {\n\
  LOGGER.info(\"根据名字: $firstName 和姓氏: $lastName 查找歌手\")\nval cb: CriteriaBuilder =\
  \ em!!.criteriaBuilder\nval criteriaQuery: CriteriaQuery =\ncb.createQuery(Singer::class.java)\n\
  val singerRoot: Root = criteriaQuery.from(Singer::class.java)\nsingerRoot.fetch(Singer_.albums,\
  \ JoinType.LEFT)\nsingerRoot.fetch(Singer_.instruments, JoinType.LEFT)\ncriteriaQuery.select(singerRoot).distinct(true)\n\
  var criteria: Predicate = cb.conjunction()\nif (firstName.isNotBlank()) {\nval firstNamePredicate:\
  \ Predicate =\ncb.equal(singerRoot.get(Singer_.firstName), firstName)\ncriteria\
  \ = cb.and(criteria, firstNamePredicate)\n}\nif (lastName.isNotBlank()) {\nval lastNamePredicate:\
  \ Predicate =\ncb.equal(singerRoot.get(Singer_.lastName), lastName)\ncriteria =\
  \ cb.and(criteria, lastNamePredicate)\n}\ncriteriaQuery.where(criteria)\nreturn\
  \ em.createQuery(criteriaQuery).getResultList().stream()\n}\n// 其他方法和设置已省略\n}\n\
  清单 8-31\n使用 JPA Criteria API 的 SingerServiceImpl.findByCriteriaQuery() 方法\n```\n\
  \n我们来分解一下 Criteria API 的使用方法。\n\n*   调用 `EntityManager.criteriaBuilder` 以获取 `jakarta.persistence.criteria.CriteriaBuilder`\
  \ 的实例。\n\n*   通过调用 `CriteriaBuilder.createQuery()` 并传入 `Singer` 作为结果类型来创建类型化查询。生成的实例类型为\
  \ `jakarta.persistence.criteria.CriteriaQueryImpl<Singer>`，它实现了 `jakarta.persistence.criteria.CriteriaQuery<Singer>`。\n\
  \n*   两次 `Root<..>.fetch(..)` 方法调用强制立即加载与 `albums` 和 `instruments` 相关的关联。`JoinType.LEFT`\
  \ 参数指定了外连接。以 `JoinType.LEFT` 作为第二个参数调用 `Root<..>.fetch(..)` 方法，等同于在 JPQL 中指定 `left\
  \ join fetch` 连接操作。\n\n*   调用 `CriteriaQuery.select(..)` 方法，并返回根查询对象作为结果类型。调用参数为\
  \ `true` 的 `distinct(..)` 方法意味着应消除重复记录。\n\n*   通过调用 `CriteriaBuilder.conjunction()`\
  \ 方法获取 `jakarta.persistence.criteria.Predicate` 实例，这意味着创建一个或多个限制条件的合取。`Predicate`\
  \ 可以是简单或复合谓词，谓词是一种限制，指示由表达式定义的选择条件。\n\n*   检查 firstName 和 lastName 参数。对于每个 `not\
  \ null` 参数，使用 `CriteriaBuilder` 实例（即 `CriteriaBuilder.and(..)` 方法）构造一个新的 `Predicate`。`equal()`\
  \ 方法用于指定相等限制，其中调用 `Root<..>.get()` 并传入应用限制的实体类元模型的相应属性。然后，通过调用 `CriteriaBuilder.and()`\
  \ 方法，将构造的谓词与现有谓词（由变量 criteria 存储）进行“合取”。\n\n*   使用所有条件和限制构造 `Predicate`，并通过调用 `CriteriaQuery.where(..)`\
  \ 方法将其作为 `where` 子句传递给查询。\n\n*   最后，将 `CriteriaQuery` 传递给 `EntityManager`。`EntityManager`\
  \ 随后根据传入的 `CriteriaQuery` 值构造查询，执行查询，并返回结果。\n\n\n\n为了测试条件查询操作，我们在 `SingerServiceTest`\
  \ 测试类中添加了一个新的测试方法，如清单 8-32 所示。\n\n```\npackage com.apress.prospring6.eight\n// 省略\
  \ import 语句\n// 省略注解\nclass SingerServiceTest {\n@Test\nfun testFindByCriteriaQuery(){\n\
  val singers = singerService.findByCriteriaQuery(\"John\", \"Mayer\").peek\n{ s ->\n\
  LOGGER.info(s.toString())\ns.albums.forEach{a ->\nLOGGER.info(\"\\tAlbum:\" + a.toString())}\n\
  s.instruments.forEach{i ->\nLOGGER.info(\"\\tInstrument: \" + i.instrumentId)}\n\
  }.toList()\nassertEquals(1, singers.size)\n}\n// 省略其他方法和设置\n}\n清单 8-32\n测试 SingerServiceImpl.findByCriteriaQuery()\
  \ 方法\n```\n\n该测试与本章之前的测试并无太大区别，输出结果也是如此，如清单 8-33 所示。\n\n```\nINFO : SingerServiceImpl\
  \ - Finding singer for firstName: John and lastName: Mayer\nDEBUG: CriteriaQueryImpl\
  \ - Rendered criteria query ->\nselect distinct generatedAlias0 from Singer as generatedAlias0\n\
  left join fetch generatedAlias0.albums as generatedAlias1\nleft join fetch generatedAlias0.instruments\
  \ as generatedAlias2\nwhere ( ( 1=1 )\nand ( generatedAlias0.firstName=:param0 )\
  \ )\nand ( generatedAlias0.lastName=:param1 )\n...\nDEBUG: QueryTranslatorImpl -\
  \ parse() - HQL:\nselect distinct generatedAlias0\nfrom com.apress.prospring6.eight.entities.Singer\
  \ as generatedAlias0\nleft join fetch generatedAlias0.albums as generatedAlias1\n\
  left join fetch generatedAlias0.instruments as generatedAlias2\nwhere ( ( 1=1 )\n\
  and ( generatedAlias0.firstName=:param0 ) )\nand ( generatedAlias0.lastName=:param1\
  \ )\n...\nDEBUG: QueryTranslatorImpl - SQL:\nselect\ndistinct singer0_.ID as id1_2_0_,\n\
  albums1_.ID as id1_0_1_,\ninstrument3_.INSTRUMENT_ID as instrume1_1_2_,\nsinger0_.VERSION\
  \ as version2_2_0_,\nsinger0_.BIRTH_DATE as birth_da3_2_0_,\nsinger0_.FIRST_NAME\
  \ as first_na4_2_0_,\nsinger0_.LAST_NAME as last_nam5_2_0_,\nalbums1_.VERSION as\
  \ version2_0_1_,\nalbums1_.RELEASE_DATE as release_3_0_1_,\nalbums1_.SINGER_ID as\
  \ singer_i5_0_1_,\nalbums1_.title as title4_0_1_,\nalbums1_.SINGER_ID as singer_i5_0_0__,\n\
  albums1_.ID as id1_0_0__,\ninstrument2_.SINGER_ID as singer_i1_3_1__,\ninstrument2_.INSTRUMENT_ID\
  \ as instrume2_3_1__\nfrom SINGER singer0_\nleft outer join ALBUM albums1_ on singer0_.ID=albums1_.SINGER_ID\n\
  left outer join SINGER_INSTRUMENT instrument2_ on singer0_.ID=instrument2_.SINGER_ID\n\
  left outer join INSTRUMENT instrument3_ on instrument2_.INSTRUMENT_ID=instrument3_.INSTRUMENT_ID\n\
  where 1=1\nand singer0_.FIRST_NAME=?\nand singer0_.LAST_NAME=?\n...\nINFO : SingerServiceTest\
  \ - Singer - Id: 1, First name: John, Last name: Mayer, Birthday: 1977-10-16\nINFO\
  \ : SingerServiceTest -  Album:Album - Id: 1, Singer id: 1, Title: The Search For\
