  \ = dataSource\nfactory.setJpaProperties(jpaProperties())\nfactory.jpaVendorAdapter\
  \ = jpaVendorAdapter()\nreturn factory\n}\n@Bean\nopen fun jpaProperties(): Properties\
  \ {\nval jpaProps = Properties()\njpaProps[Environment.HBM2DDL_AUTO] = \"none\"\n\
  jpaProps[Environment.FORMAT_SQL] = false\njpaProps[Environment.STATEMENT_BATCH_SIZE]\
  \ = 30\njpaProps[Environment.USE_SQL_COMMENTS] = false\njpaProps[Environment.SHOW_SQL]\
  \ = false\nreturn jpaProps\n}\n}\n代码清单 9-4\n事务管理配置类\n```\n\n目前，在 Spring 中使用注解是定义事务需求最常见的方式。其主要优点在于，事务需求以及详细的事务属性（超时、隔离级别、传播行为等）都在代码内部定义，这使得应用程序更易于跟踪和维护。`transactionManager`\
  \ bean（确保满足这些需求的核心组件）的配置是使用 Kotlin 配置完成的。由于我们使用 JPA，我们的 `transactionManager` 是一个\
  \ `JpaTransactionManager` 实例，它在使用单个 JPA `EntityManagerFactory` 进行事务性数据访问的应用程序中实现了\
  \ Spring 的标准事务工作流。\n\n`@EnableTransactionManagement` 注解是完成此配置的关键，因为它负责启用注解驱动的事务能力。该注解用于\
  \ Spring 配置类，以配置传统的命令式事务管理或响应式事务管理。`@EnableTransactionManagement` 负责注册所有支持事务管理的\
  \ Spring 基础设施 bean，例如 `TransactionInterceptor` 以及基于代理或 AspectJ 的通知，当调用带有 `@Transactional`\
  \ 注解的方法时，这些通知会将拦截器织入调用栈。\n\n`EntityManagerFactory` bean 的配置方式没有变化。\n\n有了这个配置，任何与数据层交互的方法都可以使用\
  \ `@Transactional` 进行注解，Spring IoC 容器将在方法执行前开启一个事务，并在方法执行后立即关闭它。\n\n\n\n### 使用声明式事务\n\
  \n通过注解配置事务行为被称为*声明式*事务，因为所需的行为是通过在目标方法上声明注解来定义的。无需编写任何代码来创建、启动和结束事务。Spring 事务管理器\
  \ Bean 会拾取 `@Transactional` 注解，并将方法包装在所需的事务行为中。这是通过使用代理来实现的，相关内容在**第** **5** **章**中介绍。被\
  \ `@Transactional` 注解标记的 Bean 声明，或者包含被 `@Transactional` 注解标记的方法的 Bean 声明，会在运行时被转换为一个包装在代理中的\
  \ Bean，该代理会为每个目标方法注入事务行为。\n\n图 9-4 展示了每次调用事务 Bean 的方法时底层发生的情况。\n\n![](img/524962_1_En_9_Fig4_HTML.jpg)\n\
  \n一张图展示了 5 个组件及其下发生的任务。这些组件分别是：调用者、事务代理、Spring 事务拦截器、事务管理器和目标对象。任务涉及目标方法、获取和创建事务以及返回结果。\n\
  \n图 9-4\n\n展示事务行为如何在 Spring 中被注入的示意图\n\n在多层的实现中，服务类调用仓库类与数据库交换数据，服务方法被配置为在事务中执行，从而为涉及多个数据库操作的方法提供原子性行为。因此，在本节的示例中，歌手的专辑不会被急切加载，也不会通过命名查询加载，因为它们将在与歌手提取相同的、通过仓库方法加载的方法中被加载，如清单\
  \ 9-5 所示的 `AllServiceImpl` 类。\n\n```\npackage com.apress.prospring6.nine.services\n\
  import org.springframework.stereotype.Service\nimport org.springframework.transaction.annotation.Transactional\n\
  // 其他导入语句已省略\n@Service\n@Transactional\nclass AllServiceImpl(private val singerRepo:\
  \ SingerRepo, private val albumRepo: AlbumRepo) :\nAllService {\n@Transactional(readOnly\
  \ = true)\noverride fun findAllWithAlbums(): Stream {\nval singers = singerRepo.findAll()\n\
  return singers.peek { s: Singer? ->\ns!!.albums = albumRepo.findBySinger(s)\n.collect(Collectors.toSet())\n\
  }\n}\n@Transactional(readOnly = true)\noverride fun findByIdWithAlbums(id: Long):\
  \ Singer? {\nval singerOpt = singerRepo.findById(id)\nsingerOpt?.run {\nalbums =\
  \ albumRepo.findBySinger(this)\n.collect(Collectors.toSet())\n}\nreturn singerOpt\n\
  }\n@Transactional(propagation = Propagation.REQUIRES_NEW)\noverride fun update(singer:\
  \ Singer) {\nsingerRepo.save(singer)\n}\n@Transactional(rollbackFor = [TitleTooLongException::class])\n\
  @Throws(\nTitleTooLongException::class\n)\noverride fun saveSingerWithAlbums(s:\
  \ Singer, albums: Set) {\nval singer = singerRepo.save(s)\nalbums.forEach{ a: Album\
  \ ->\na.singer = singer\n}\nalbumRepo.save(albums)\n}\n@Transactional(readOnly =\
  \ true, propagation = Propagation.SUPPORTS)\noverride fun countSingers(): Long {\n\
  return singerRepo.countAllSingers()\n}\n}\n清单 9-5\nAllServiceImpl 方法，展示通过在同一事务中执行的仓库方法加载歌手和专辑\n\
  ```\n\n当使用基于注解的事务管理时，我们需要处理的唯一注解就是 Spring 的 `@Transactional`。`@Transactional` 注解可以应用于类级别，这意味着，默认情况下，Spring\
  \ 将确保在类中每个方法执行之前都存在一个事务。从 Spring 5 开始，`@Transactional` 也支持在接口以及接口中的默认方法上使用。\n\n\
  ![](img/524962_1_En_9_Figb_HTML.jpg) 一个警告图标。圆圈内有一个感叹号。   建议仅在非 `private` 方法上使用 Spring\
  \ 的 `@Transactional` 注解，因为事务行为是通过 AOP 代理注入的。\n\n![](img/524962_1_En_9_Figc_HTML.jpg)\
  \ 一个想法图标。有一个灯泡符号。   `SingerRepo` 和 `AlbumRepo` 的实现对于本章并不重要，但如果你好奇，可以随时查看仓库源码。它们的方法使用\
  \ `EntityManager` 实现，如**第** **8** **章**所示。\n\n`@Transactional` 注解支持许多属性，你可以提供这些属性来覆盖默认行为。表\
  \ 9-3 显示了可用的属性及其默认值和可能的值。\n\n表 9-3\n\n事务属性\n\n| 属性名 | 默认值 | 可能的值 |\n| --- | ---\
  \ | --- |\n| `propagation` | `Propagation.REQUIRED` | `Propagation.REQUIRED Propagation.SUPPORTS\
  \ Propagation.MANDATORY Propagation.REQUIRES_NEW Propagation.NOT_SUPPORTED Propagation.NEVER\
  \ Propagation.NESTED` |\n| `isolation` | `Isolation.DEFAULT`（底层资源的默认隔离级别） | `Isolation.DEFAULT\
  \ Isolation.READ_UNCOMMITTED Isolation.READ_COMMITTED Isolation.REPEATABLE_READ\
  \ Isolation.SERIALIZABLE` |\n| `timeout` | `TransactionDefinition.TIMEOUT_DEFAULT`（底层资源的默认事务超时秒数）\
  \ | 大于零的整数值；表示超时的秒数 |\n| `readOnly` | `false` | `{true, false}` |\n| `rollbackFor`\
  \ | 事务将回滚的异常类 | 不适用 |\n| `rollbackForClassName` | 事务将回滚的异常类名 | 不适用 |\n| `noRollbackFor`\
  \ | 事务不会回滚的异常类 | 不适用 |\n| `noRollbackForClassName` | 事务不会回滚的异常类名 | 不适用 |\n| `value`\
  \ | `\"\"` | 指定事务的限定符值；可用于确定目标事务管理器，匹配特定事务管理器 Bean 的限定符值（或 Bean 名称） |\n\n因此，基于表\
  \ 9-3，没有任何属性的 `@Transactional` 注解意味着事务传播模式是必需的，隔离级别是底层数据存储的默认隔离级别，超时是底层事务系统的默认超时，并且模式是读写。\n\
  \n`@Transactional` 注解也可以应用于方法级别，这允许覆盖类级别的事务配置。例如，如果事务实际上是只读的，则使用 `@Transactional(readOnly\
  \ = true)` 以允许在运行时进行相应的优化。所有其他属性保持不变。\n\n*   ![](img/524962_1_En_9_Fige_HTML.jpg)\
  \ 一个警告图标。圆圈内有一个感叹号。   `readOnly` 标志配置只是对底层持久化系统的一个提示，而 Hibernate 非常擅长接受提示，所以不要在设计用于更新现有条目的方法上使用\
  \ `readOnly = true`，否则你将不得不显式地刷新更改。\n\n现在我们有了一个服务方法，是时候测试它了。清单 9-6 展示了 `AllServiceTest`\
