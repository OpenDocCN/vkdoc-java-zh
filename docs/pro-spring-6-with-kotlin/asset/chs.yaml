  // 内容已省略\n}\n清单 7-17\n包含两个 NamedQuery 实例的 Singer 实体类\n```\n\n对于 `Singer.findById`\
  \ 命名查询，我们声明了一个命名参数：`id`。当使用此查询时，需要用具体值替换该参数。你可以在清单 7-18 中看到 `SingerDaoImpl.findById()`\
  \ 方法的实现。\n\n```\npackage com.apress.prospring6.seven.base.dao\n// 导入语句已省略\n@Transactional\n\
  @Repository(\"singerDao\")\nclass SingerDaoImpl(private val sessionFactory: SessionFactory)\
  \ :  SingerDao {\n@Transactional(readOnly = true)\noverride fun findById(id: Long?):\
  \ Singer? {\nreturn sessionFactory.currentSession.createNamedQuery(\n\"Singer.findById\"\
  ,\nSinger::class.java\n).setParameter(\"id\", id).uniqueResult()\n}\n// 其他代码已省略\n\
  }\n清单 7-18\n使用 Singer.findById NamedQuery 实例的 SingerDaoImpl.findById() 方法\n```\n\
  \n`createNamedQuery(..)` 方法返回一个实现了 `org.hibernate.query.Query` 接口的类型的实例。对于 Hibernate\
  \ 命名查询，该方法返回的实例的具体类型是 `org.hibernate.query.internal.QueryImpl`。这是一个 Hibernate 内部类型，从其包名可以明显看出。在同一包中，还有特定于原生查询和条件查询的类型，这些将在本章稍后介绍。\n\
  \n通过在该实例上调用 `setParameter(..)` 方法来提供 `id` 参数的值。当命名查询需要多个参数时，可以通过调用 `setParameterList()`\
  \ 或 `setParameters()` 方法来提供它们的值，这些方法属于 `Query` 接口声明的一部分。\n\n到目前为止，在本章中，你只看到了如何通过运行可执行类来测试仓库类\
  \ `SingerDaoImpl` 的方法。如前所述，本章使用 Testcontainers MariaDB 实例进行测试，因此清单 7-19 引入了 `HibernateTest`\
  \ 类，该类在有限的数据集上测试本章介绍的两个命名查询，该数据集是本章 `testcontainers/create-schema.sql` 脚本的一部分。\n\
  \n```\npackage com.apress.prospring6.seven\nimport com.apress.prospring6.seven.base.config.HibernateConfig\n\
  import org.testcontainers.containers.MariaDBContainer\nimport org.testcontainers.junit.jupiter.Container\n\
  import org.testcontainers.junit.jupiter.Testcontainers\n// 其他导入语句已省略\n@Testcontainers\n\
