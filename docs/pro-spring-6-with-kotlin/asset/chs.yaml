  \n\n\n### 响应式 Web 层\n\n迁移 Web 层需要相当多的改动，因为在不知道实际有多少数据需要被发送并渲染的情况下，渲染视图会非常困难。过去，异步\
  \ JavaScript 和 XML（AJAX）被用来解决这个问题，但 AJAX 只能让我们在页面上响应用户操作来更新页面，它无法解决来自服务器的更新问题。由于响应式通信涉及双向数据流，因此需要新的\
  \ Web 库。实现方式不止一种，但在本节中，我们将介绍最常见的方式：使用**服务器发送事件**。\n\n作为一个非常简单的例子，让我们在 singer 应用中创建一个页面，用于显示应用上下文中的\
  \ bean 列表。在前面的章节中，`HomeController` 包含一个返回简单 `String` 的单一处理方法，我们将修改此方法，使其以 `Flux<String>`\
  \ 的形式返回应用上下文中所有 bean 的名称。\n\nThymeleaf 支持响应式视图，并且有多种方式可以用响应式数据填充模型。为了快速简便，我们将使用最简单的方式：使用一段\
  \ JavaScript 代码，逐步用流式数据填充视图。不过在此之前，我们必须配置 Thymeleaf 以支持响应式。清单 20-24 展示了这个配置类，它有点冗长。其中设置的大多数属性值，Spring\
  \ Boot 已经使用其默认值进行了设置，但这样编写类是为了从开发角度明确哪些是可以自定义的。\n\n```\npackage com.apress.prospring6.twenty.boot\n\
  import org.springframework.boot.autoconfigure.thymeleaf.ThymeleafProperties\nimport\
  \ org.springframework.boot.context.properties.EnableConfigurationProperties\nimport\
  \ org.springframework.web.reactive.config.ViewResolverRegistry\nimport org.springframework.web.reactive.config.WebFluxConfigurer\n\
  import org.thymeleaf.spring6.ISpringWebFluxTemplateEngine\nimport org.thymeleaf.spring6.view.reactive.ThymeleafReactiveViewResolver\n\
  // 其他导入语句已省略\n@Configuration\n@EnableConfigurationProperties(ThymeleafProperties::class)\n\
  open class ReactiveThymeleafWebConfig(\nprivate val thymeleafTemplateEngine: ISpringWebFluxTemplateEngine)\
  \ :\nWebFluxConfigurer {\n@Bean\nopen fun thymeleafReactiveViewResolver() =\nThymeleafReactiveViewResolver().apply\
  \ {\ntemplateEngine = thymeleafTemplateEngine\norder = 1\n}\noverride fun configureViewResolvers(registry:\
  \ ViewResolverRegistry) {\nregistry.viewResolver(thymeleafReactiveViewResolver())\n\
  }\n@Bean\nopen fun messageSource(): MessageSource =\nResourceBundleMessageSource().apply\
  \ {\nsetBasenames(\"i18n/global\")\nsetDefaultEncoding(\"UTF-8\")\n}\noverride fun\
  \ addFormatters(registry: FormatterRegistry) {\nregistry.addFormatterForFieldAnnotation(\n\
  DateTimeFormatAnnotationFormatterFactory())\n}\n}\n清单 20-24\n响应式 Thymeleaf 配置类\n\
  ```\n\n负责解析模板的模板解析器 bean 不需要是响应式的。由于模板解析器 bean 包含来自应用配置的数据，在使用 Spring Boot 时，可以完全省略它，并通过在配置类上添加\
  \ `@EnableConfigurationProperties(ThymeleafProperties.class)` 注解来替代。\n\n使用模板解析器的模板引擎是响应式的，并且是\
  \ `ISpringWebFluxTemplateEngine` 的一个实现。因此，为与 Spring MVC 类型集成而设计的 `SpringTemplateEngine`，必须替换为\
  \ `SpringWebFluxTemplateEngine`，后者是 `ISpringWebFluxTemplateEngine` 接口的一个实现，专为与 Spring\
  \ WebFlux 集成并以响应式友好方式执行模板而设计。由于模板引擎只需要一个模板解析器，无需其他，因此这个 bean 声明被跳过，让 Spring Boot\
  \ 来配置它，我们只需在配置中注入它即可。\n\n`@EnableConfigurationProperties` 注解启用了对 Thymeleaf 配置属性的支持。`ThymeleafProperties`\
  \ 类使用了 `@ConfigurationProperties (prefix = \"spring.thymeleaf\")` 注解，这使其成为 Thymeleaf\
  \ 属性的配置 bean。这意味着你可以使用 `application.yaml` 或 `application.properties` 来配置 Thymeleaf。这些属性以\
  \ `spring.thymeleaf` 为前缀，允许你在不编写额外代码的情况下配置模板解析器 bean。Spring Boot 的 Thymeleaf 配置属性如清单\
  \ 20-25 所示。\n\n```\nspring:\nthymeleaf:\nprefix: classpath:templates/\nsuffix: .html\n\
  mode: HTML\ncache: false\ncheck-template: false\nreactive:\nmax-chunk-size: 8192\n\
  清单 20-25\nSpring Boot Thymeleaf 配置\n```\n\n`ThymeleafReactiveViewResolver` 是 `org.springframework.web.reactive.result.view.ViewResolver`\
  \ 接口的一个实现，即 Spring WebFlux 的视图解析器接口。你应该关注 `responseMaxChunkSizeBytes` 属性，因为它定义了\
  \ Thymeleaf 引擎生成并作为输出传递给服务器的 `org.springframework.core.io.buffer.DataBuffer` 实例的最大大小。这一点很重要，因为如果你有大量数据通过\
  \ `Flux<T>` 发送，你可能希望分块、一点一点地渲染视图，而不是让网页保持加载状态，直到响应完成（特别是因为这是响应式通信的主要思想之一）。\n\n现在，让我们来谈谈我们的控制器。由于\
