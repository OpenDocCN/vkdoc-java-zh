  \ 时 HibernateDemoV2 的输出\n```\n\n现在所有歌手的详细信息都已正确检索。让我们看另一个使用带参数的 `NamedQuery` 的例子。这次，我们将实现\
  \ `findById()` 方法，该方法也应获取关联数据。清单 7-17 展示了添加了新的 `NamedQuery` 实例后的 `Singer` 类。\n\n\
  ```\npackage com.apress.prospring6.seven.base.entities\nimport jakarta.persistence.NamedQueries\n\
