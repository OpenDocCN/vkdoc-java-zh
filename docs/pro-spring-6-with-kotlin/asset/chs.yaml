  ```


  `LoggingErrorHandler` 仅以 `ERROR` 级别记录正在处理的任务抛出的异常。`RejectedTaskHandler` 会重新提交被拒绝的任务，并记录重新提交的次数。如果某个任务被重新提交超过五次，则会抛出异常，并且该任务将不再被提交。


  本章前面的清单 12-10 展示了 `CarServiceImpl` 在内部时间能被 5 整除时抛出 `IllegalStateException`。该异常的堆栈跟踪会显示在控制台中，`LoggingErrorHandler`
  会拦截它并打印任务名称，这样我们就知道是哪个任务失败了。


  任务被拒绝有两种情况：一是在调用 `shutdown()` 之后提交任务；二是线程池没有可用于执行任务的线程。对于第一种情况，`RejectedExecutionHandler`
  的实现只能提交通知或记录包含失败任务详细信息的日志。对于第二种情况，像 `RejectedTaskHandler` 中的实现会尝试将任务重新提交给执行器几次，直到最终被拒绝（如果任务仍未执行）。不幸的是，对于像
  `CarServiceImpl` 中那样几乎不做任何操作的任务，这种情况很难重现。


  请随意运行 `chapter12` 项目中的示例，并注意 `TaskSchedulingConfig4` 配置特有的异常处理。


  清单 12-20 展示了 `AsyncServiceImpl` 在内部时间能被 5 整除时抛出 `IllegalStateException`。对于 Spring
  异步任务执行器，一个类型为 `org.springframework.aop.interceptor.SimpleAsyncUncaughtExceptionHandler`
  的 bean 实现了 `org.springframework.aop.interceptor.AsyncUncaughtExceptionHandler`，该处理器仅记录异常。要覆盖此行为，我们必须实现此接口，并通过实现
  `AsyncConfigurer` 接口中的 `getAsyncUncaughtExceptionHandler()` 方法来覆盖默认处理器。


