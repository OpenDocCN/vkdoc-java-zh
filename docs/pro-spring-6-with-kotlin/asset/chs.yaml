  ## Spring 中的任务调度


  执行任务显然很容易，但企业应用程序通常需要以更可控的方式执行，这意味着任务必须被调度。在许多应用程序中，各种任务（例如向客户发送电子邮件通知、运行日终作业、进行数据清理以及批量更新数据）需要被调度为定期运行，要么以固定间隔（例如，每小时一次），要么按特定计划（例如，每周一至周五，每晚
  8 点）。


  在 Spring 应用程序中，有多种方式可以触发任务的执行。一种方式是从应用程序部署环境中已有的调度系统外部触发作业。例如，许多企业使用商业系统（如 Control-M
  或 CA AutoSys）来调度任务。如果应用程序运行在 Linux/Unix 平台上，可以使用 crontab 调度器。可以通过向 Spring 应用程序发送
  RESTful-WS 请求，并由 Spring 的 MVC 控制器触发任务来完成作业触发。


  另一种方式是使用 Spring 中的任务调度支持。Spring 在任务调度方面提供了三种选择：


  *   *支持 JDK Timer*：Spring 支持 JDK 的 Timer 对象进行任务调度。

  *   *与 Quartz 集成*：Quartz 作业调度器^(¹⁰⁸) 是一个流行的开源调度库。

  *   *Spring 自身的 Spring `TaskScheduler` 抽象*：Spring 3 引入了 `TaskScheduler` 抽象，它提供了一种调度任务的简单方式，并支持大多数典型需求。


  本节重点介绍使用 Spring 的 `TaskScheduler` 抽象进行任务调度，其结果是项目非常简单，唯一必需的 Spring 依赖是 `spring-context.jar`
  库。




  ### 介绍 Spring 的 `TaskScheduler` 抽象


  Spring 的 `TaskScheduler` 抽象提供了多种方法，用于调度任务在未来的某个时间点执行，它主要包含三个参与者：


  *   ***Trigger* 接口**：`org.springframework.scheduling.Trigger` 接口为定义触发机制提供了支持。Spring
  提供了两个 `Trigger` 实现。`CronTrigger` 类支持基于 `cron` 表达式触发，而 `PeriodicTrigger` 类支持基于初始延迟和固定间隔触发。


  *   **任务**：任务是需要被调度的业务逻辑片段。在 Spring 中，任务可以指定为任何 Spring Bean 中的一个方法。


  *   ***TaskScheduler* 接口**：`org.springframework.scheduling.TaskScheduler` 接口为任务调度提供了支持。Spring
  提供了三个 `TaskScheduler` 接口的实现类。`ConcurrentTaskScheduler` 和 `ThreadPoolTaskScheduler`
  类（均位于 `org.springframework.scheduling.concurrent` 包下）封装了 `java.util.concurrent.ScheduledThreadPoolExecutor`
  类。这两个类都支持从共享线程池执行任务。`DefaultManagedTaskScheduler` 类（同样位于 `org.springframework.scheduling.concurrent`
  包下）通常用于 Jakarta EE 环境。


  图 12-2 展示了 `Trigger` 接口、`TaskScheduler` 接口以及实现了 `java.lang.Runnable` 接口的任务之间的关系。


  ![](img/524962_1_En_12_Fig2_HTML.jpg)


  一个展示触发器、任务和调度器之间关系的流程图。周期性触发器和 cron 触发器指向触发器。被调度的方法（runnable）和任务指向 runnable。触发器、runnable、来自默认托管任务调度器和线程池任务调度器的并发任务调度器指向任务调度器。


  图 12-2


  触发器、任务和调度器之间的关系


  基本上，任务调度器基于日期、时间、执行一次或重复执行来执行任务。任务执行由 `Trigger` 实现触发，这些实现提供了对任务执行时间的精细控制，特别是相对于其他任务执行而言。


  要使用 Spring 的 `TaskScheduler` 抽象来调度任务，需要使用一些注解，这些注解将在下一节中进行演示和描述。


