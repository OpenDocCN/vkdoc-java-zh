  jOOQ 生成的 POJO 类完全映射到它们所建模的表，这意味着在使用 DAO 类时，我们始终操作的是一个完全填充的对象。因此，如果性能是个问题，并且你只需要少量列，那么使用\
  \ `DSLContext` 是更好的方法。\n\n本节向你展示了如何在 Spring 应用程序中配置 jOOQ，并给出了一些使用示例，以强调使用该框架的以下几个好处：\n\
  \n*   它允许开发者以单个对象而非对象集合的视角进行思考。\n\n*   它让你无需编写 SQL 查询，但允许你编写清晰简洁的 Kotlin 代码来表示查询逻辑。\n\
  \n*   它能生成非常优秀且可正常运行的 SQL 代码，并且 Java 代码提供了类型安全性——如果你不编写 SQL 查询，就绝不可能在 SQL 查询中出现拼写错误。\n\
  \n*   它支持大量数据库，因此如果你想在项目中使用关系型数据库，那么有 99% 的可能性你也可以使用 jOOQ。\n\n*   它与 Spring 的集成非常出色。\n\
  \n当然，使用 jOOQ 框架也有一些缺点，以下列表只是编写本节时注意到的一些问题示例：\n\n*   你必须手动将 jOOQ 安装到你的 Maven 仓库中，因为从\
  \ 3.16.6 版本开始，它已从 Maven Central 中移除。\n\n*   即使你无需编写 SQL 查询，用于与数据库交互的 Kotlin 语法本身也是一种语言。幸运的是，编译器在这方面提供了帮助，因此通常编译通过的\
  \ Kotlin 代码会生成有效的 SQL 脚本。\n\n*   目前关于哪个版本与哪个 JDK 兼容存在一些混淆。例如，社区试用版本应与 JDK 17+ 兼容，但在撰写本文时却并非如此。\n\
  \n*   复杂的 SQL 查询将由复杂的 Kotlin 查询来表示，遍历大型对象图可能会变得非常低效，因此最终设计合理的数据库模式仍是开发者的责任。\n\n\
  本节只是向你介绍 jOOQ 作为 Hibernate 的一种可能替代方案。它的功能非常广泛，要全面覆盖这些功能需要一整本书的篇幅。如果你对 jOOQ 感兴趣，可以通过在其官方页面上阅读更多内容来提升你的知识水平。\n\
  \nSpring Boot 让 jOOQ 和 Hibernate 的使用变得更加简单。由于在**第** **8** **章**中使用了相同的库 `spring-boot-starter-data-jpa`，并且代码与经典的非\
  \ Boot Spring 应用程序代码几乎相同，因此我们在此结束本章。\n\n\n## 本章小结\n\n在本章中，我们首先讨论了 Hibernate 的基本概念以及如何在\
  \ Spring 应用程序中对其进行配置。接着，我们介绍了定义 ORM 映射、关联的常用技术，以及如何使用 `HibernateTemplate` 类执行各种数据库操作。关于\
  \ Hibernate，我们仅涉及其功能和特性的一小部分。如果您有兴趣在 Spring 中使用 Hibernate，我们强烈建议您学习 Hibernate 的标准文档。\n\
  \n此外，还有许多书籍详细讨论了 Hibernate。我们推荐 Joseph Ottinger、Jeff Linwood 和 Dave Minter 合著的 *Beginning\
  \ Hibernate 6*（Apress，2022 年）^(⁶⁹)，以及 Mike Keith 和 Merrick Schincariol 合著的 *Pro\
  \ JPA 2*（Apress，2013 年）^(⁷⁰)。\n\n我们还向您介绍了 jOOQ，这是一个很酷的框架，用于使用 Java 代码生成 SQL 查询；jOOQ\
  \ 既可以与 Hibernate 一起使用，也可以替代 Hibernate。\n\n**第** **8** **章**将向您介绍 JPA 以及如何在 Spring\
  \ 中使用它。Hibernate 为 JPA 提供了出色的支持，我们将在第 8 章的示例中继续使用 Hibernate 作为持久化提供者。对于查询和更新操作，JPA\
  \ 的行为类似于 Hibernate。我们还将讨论高级主题，包括原生查询和 Criteria 查询，以及如何使用 Hibernate 及其对 JPA 的支持。\n\
