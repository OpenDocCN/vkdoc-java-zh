- '# 1. Spring 简介


  每年都会有推文和博客文章宣称 Java 已不再重要，并且有闪亮的新技术取而代之。但每年这些都被证明只是行业谣言。Java 是一种不断发展的技术，自 1995 年首次发布以来，它一直位列公司构建软件解决方案最常用的十大技术之中。许多库和框架都是基于
  Java 构建的，其中一些作为开源项目提供给开发者，另一些则因其管理的敏感信息（例如银行应用程序）而被安全地锁定在私有云中。


  用 Java 编写的最流行的框架之一是 Spring Framework。Spring 的第一个版本于 2002 年 10 月发布，包含一个易于配置和使用的小型核心以及一个控制反转容器。多年来，Spring
  Framework 已成为 Java 企业版（JEE）服务器的主要替代品，并发展成为一个由许多不同项目组成的成熟技术体系，每个项目都有其特定用途。无论您是想构建微服务应用程序、构建经典的企业资源规划（ERP）系统，还是将您的应用程序编译成本地镜像以在
  GraalVM 上运行，Spring 都有相应的项目。


  在本书中，您将看到许多不同开源技术的应用，所有这些技术都统一在 Spring Framework 之下。使用 Spring 时，应用程序开发者可以使用大量开源工具，而无需编写大量代码，也无需将应用程序与任何特定工具过度耦合。


  这是一个介绍性章节，涵盖了本书的重要细节，向您介绍 Spring Framework，解释为什么深入理解 Spring 对开发者如此有用，并描述正确使用 Spring
  时其强大的功能。如果您已经熟悉 Spring，可以跳过本章，直接进入**第 2 章**。





  ## 关于本书


  本书涵盖 Spring Framework 6 版本，是使用 Kotlin 作为编程语言时，驾驭这一领先企业级 Java 应用开发框架的最全面的 Spring
  参考与实践指南。


  本版涵盖了核心 Spring 及其与其他领先 Java 技术（如 Hibernate、JPA 2、Thymeleaf、Apache Kafka 等）的集成。本书的重点是使用
  Kotlin 作为 Spring 的编程语言、Java/Kotlin 配置类、Spring Boot 以及响应式编程。我们分享了在企业应用开发方面的见解和实际经验，包括远程处理、事务、Web
  和表示层等等。


  通过《Pro Spring 6 with Kotlin》，你将学习如何完成以下任务：


  *   使用并理解控制反转（IoC）和依赖注入（DI）

  *   了解 Spring Framework 6 的新特性

  *   使用 Spring MVC 和 WebSocket 构建基于 Spring 的 Web 应用

  *   使用 JUnit 5 和其他 Java/Kotlin 测试库测试 Spring 应用

  *   利用 Kotlin 1.8 的功能

  *   高级使用 Spring Boot，同时也学习如何在不使用它的情况下进行开发

  *   保护 Spring 应用

  *   监控 Spring 应用

  *   使用 Spring 编写响应式应用

  *   构建你的 Spring 应用，并使用 Spring Native 将其作为紧凑的原生镜像运行


  为了确保本书的重点是 Spring 和 Kotlin，书中提到的其他技术的安装说明，都提供在本书仓库中每个项目的文档文件中。当然，在必要时本书会向你指出这一点。


  ## 什么是 Spring？


  解释 Spring 最困难的部分之一，或许就是准确地对它进行分类。**Spring** 从一开始就被描述为用于构建 Java 应用的*轻量级框架*，但这个描述引出了两个有趣的观点：


  *   你可以使用 Spring 构建任何 Java/Kotlin 应用（例如，独立应用、Web 应用、移动应用或 JEE 应用），这与许多其他框架（例如仅限于
  Web 应用的 Apache Struts）不同。

  *   描述中的*轻量级*部分与类的数量或发行版的大小无关，而是从整体上定义了 Spring 哲学的原则——即*最小影响*。Spring 的轻量级体现在，你几乎不需要（如果需要的话）更改应用代码就能获得
  Spring Core 的好处，并且如果你决定在任何时候停止使用 Spring，你会发现这样做非常简单。


  请注意，我们限定最后一句仅指 Spring Core——许多额外的 Spring 组件，例如数据访问，需要与 Spring Framework 更紧密地耦合。然而，这种耦合的好处是显而易见的，并且在整本书中，我们都会介绍一些技术来最小化这对你的应用的影响。此外，如果将你的代码与框架耦合能带来开发速度和更好的依赖管理，从而减少升级期间的构建失败次数，那么这个代价难道不值得吗？而且，借助
  Spring Native，Spring 应用现在可以在原生镜像（例如 GraalVM）上运行，这提供了各种优势，例如即时启动和减少内存消耗，所以 JavaScript
  或 .NET 开发者可以诋毁 Spring 说它是*重量级*的日子已经一去不复返了。


  ### Spring Framework 的演进


  Spring Framework 起源于 Rod Johnson 所著的《Expert One-on-One: J2EE Design and Development》（Wrox,
  2002）一书。在他的书中，Johnson 展示了他自己的框架，称为 Interface 21 Framework，他开发该框架是为了在自己的应用中使用。这个框架被发布到开源世界，构成了我们今天所知的
  Spring Framework 的基础。在过去的十年中，Spring Framework 在核心功能、相关项目和社区支持方面都取得了巨大的发展。Spring
  0.9 最初是一个社区项目，由几个核心模块组成，没有官方文档。VMware 接管了它，并在 **2.5** 版本中开始了从 XML 到 Java Config（使用注解）的过渡。


  2012 年，Pivotal Software 从 VMware 分离出来，接管了 Spring，并将其从一个框架发展成为一个项目集合。在 Pivotal 旗下有两个主要版本：**4.x**，这是第一个完全支持
  Java 8 的版本，以及 **5.x**，它完全放弃了对 XML 配置的支持。


  与 Spring 4.x 一起，Spring Boot 发布并成为最常用的 Spring 项目之一。Spring Boot 对构建 Spring 应用采取了“约定优于配置”的观点。Pivotal
  的开发者们识别出了几种正在构建的应用类型，并使用一组默认的组件依赖关系和组件的自动配置为它们创建了模板。这些应用模板由一组 Spring Boot starter
  项目建模。例如，如果你想创建一个 Spring Web 应用，只需将 `spring-boot-starter-web` 依赖添加到你的项目中，你就拥有了一个带有默认配置的最小化
  Spring Web 应用。这是可能的，因为 Spring Boot 有一些很酷的特性，比如嵌入式应用服务器（Jetty/Tomcat）、基于 Groovy 的命令行界面以及健康/指标监控。


  Spring Boot 提供了基于一组稳定、精选的依赖关系快速开发应用的能力，所有必需的 Spring Framework 组件都已正确配置。这很好，因为它减少了开发者的设置工作量。然而，这也降低了对
  Spring Framework 进行更深入理解的需求，这可能会诱使开发者对其在 Spring Framework 方面的知识和理解产生虚假的信心。


