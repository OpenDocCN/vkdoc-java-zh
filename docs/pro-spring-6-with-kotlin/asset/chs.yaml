  在本书的上一版中，本章包含一个列表，列出了所有曾经发布过的 Spring 版本及其最重要的特性。由于这些信息在互联网上公开可用，我们决定跳过这部分以减小本书的篇幅，并将这些空间用于更有趣的内容，例如
