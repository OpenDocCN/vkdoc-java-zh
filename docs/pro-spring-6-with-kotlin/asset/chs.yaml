  ### 异常处理


  Spring 提倡使用运行时异常而非受检异常，因此我们需要一种机制将受检的 `SQLException` 转换为 Spring JDBC 运行时异常。由于 Spring
  的 SQL 异常是运行时异常，它们可以比受检异常粒度更细。从定义上讲，这并非运行时异常的特性，但若不得不在 `throws` 子句中声明一长串受检异常会很不方便；因此，受检异常往往比其对应的运行时异常粒度更粗。


  ![](img/524962_1_En_6_Figh_HTML.jpg) 一个想法图标，包含一个灯泡符号。 与 Java 相比，Kotlin 对异常的处理更为宽松。因此在这方面，我们已经与
  Spring 的做法很接近了。


  Spring 提供了 `SQLExceptionTranslator` 接口的默认实现，负责将通用的 SQL 错误码转换为 Spring JDBC 异常。在大多数情况下，这个实现已经足够，但你可以扩展
  Spring 的默认实现，并设置新的 `SQLExceptionTranslator` 实现用于 `JdbcTemplate`，如代码清单 6-19 所示。


  ```

  package com.apress.prospring6.six

  import org.springframework.dao.DataAccessException

  import org.springframework.dao.DeadlockLoserDataAccessException

  import org.springframework.jdbc.support.SQLErrorCodeSQLExceptionTranslator

  import java.sql.SQLException

  class MariaDBErrorCodesTranslator : SQLErrorCodeSQLExceptionTranslator() {

  override fun customTranslate(task: String, @Nullable sql: String?, sqlex: SQLException):

  DataAccessException? {

  return if (sqlex.errorCode == -12345) {

  CannotAcquireLockException(task, sqlex)

  } else null

  }

  }

  代码清单 6-19

  SQLExceptionTranslator 自定义实现

  ```


  ![](img/524962_1_En_6_Figi_HTML.jpg) 一个警告图标，圆圈内有一个感叹号。 此时，可以明确的是，`SQLErrorCodeSQLExceptionTranslator`（Spring
  提供的 `SQLExceptionTranslator` 实用实现）是 `spring-jdbc.jar` 库的一部分，因此需要将此库添加到类路径中。是的，本节我们将告别纯
  JDBC，引入 Spring，使我们在与数据库通信时的开发体验不再那么令人头疼。


  `org.springframework.dao.DataAccessException` 代表了运行时数据访问异常层次结构的 Spring 根类。该类的扩展对应特定的数据访问异常，并在访问数据库时提供关于异常真实原因的更多信息。完整的层次结构将在本书后面讨论。


  要使用 `MariaDBErrorCodesTranslator`，我们必须放弃直接使用连接与数据库通信，而是将 `DataSource` 包装在 Spring
  的 `JdbcTemplate` 中，如代码清单 6-20 所示。


  ```

  package com.apress.prospring6.six.hybrid

  import org.springframework.jdbc.core.JdbcTemplate

  // 其他导入语句已省略

  internal class JdbcSingerDao : SingerDao, InitializingBean {

  private var jdbcTemplate: JdbcTemplate? = null

  var dataSource: DataSource? = null

  set(value) {

  field = value

  val errorTranslator = MariaDBErrorCodesTranslator().apply {

  setDataSource(value!!)

  }

  this.jdbcTemplate = JdbcTemplate().apply {

  dataSource = value

  exceptionTranslator = errorTranslator

  }

  }

  // 其他代码已省略

  companion object {

  private val LOGGER = LoggerFactory.getLogger(JdbcSingerDao::class.java)

  }

  }

  代码清单 6-20

  引入 Spring 的 JdbcTemplate

  ```


  有了自定义的 SQL 异常转换器，当针对数据库执行 SQL 语句检测到 SQL 异常时，Spring 将调用它，并且当错误码为 `-12345` 时，将发生自定义异常转换。对于其他错误，Spring
  将回退到其默认的异常转换机制。显然，没有什么能阻止你将 `SQLExceptionTranslator` 创建为 Spring 管理的 bean，并在 DAO
  类中使用 `JdbcTemplate` bean。如果你不记得读过关于 `JdbcTemplate` 类的内容，请不要担心；我们马上会更详细地讨论它。


  ### `JdbcTemplate` 类


  该类代表了 Spring JDBC 支持的核心。它可以执行所有类型的 SQL 语句。从最简化的角度来看，你可以将数据定义语句和数据操作语句进行分类。数据定义语句涵盖创建各种数据库对象（表、视图、存储过程等）。数据操作语句则操作数据，可分为查询语句和更新语句。查询语句通常返回一组行；每行具有相同的列集。更新语句修改数据库中的数据，但不返回任何结果。


  `JdbcTemplate` 类允许你向数据库发出任何类型的 SQL 语句，并返回任何类型的结果。在本节中，我们将通过 `JdbcTemplate` 类介绍 Spring
  中 JDBC 编程的几个常见用例。




  #### 在 DAO 类中初始化 JdbcTemplate


  在讨论如何使用 `JdbcTemplate` 之前，我们先来看看如何在 DAO 类中准备 `JdbcTemplate` 以供使用。这很简单；大多数情况下，你只需通过传入数据源对象（该对象应由
  Spring 注入到 DAO 类中）来构造该类即可。上一节清单 6-20 中的最后一个代码片段展示了如何初始化 `JdbcTemplate` 对象。通常的做法是在
  Spring 注入数据源对象的同一方法/构造函数中初始化 `JdbcTemplate`。这可以确保 `JdbcTemplate` 也被初始化并准备就绪。


  一旦配置完成，`JdbcTemplate` 就是线程安全的。这意味着你也可以选择在 Spring 的配置中初始化一个 `JdbcTemplate` 单例实例，并将其注入到所有
  DAO bean 中。清单 6-21 展示了这样的配置。


  ```

  package com.apress.prospring6.six.template

  import org.springframework.jdbc.core.JdbcTemplate

  // 其他导入语句已省略

  @Import(BasicDataSourceCfg::class)

  @Configuration

  open class SpringJdbcTemplateCfg {

  @Autowired

  var dataSource: DataSource? = null

  @Bean

  open fun jdbcTemplate(): JdbcTemplate {

  return JdbcTemplate().apply {

  dataSource = this@SpringJdbcTemplateCfg.dataSource

  }

  }

  @Bean

  open fun singerDao(): SingerDao {

  return JdbcSingerDao().apply {

  setJdbcTemplate(jdbcTemplate())

  }

  }

  }

  清单 6-21

  将 JdbcTemplate 配置为 Bean

  ```


  现在我们有了一个 `JdbcTemplate` bean，让我们重写 `JdbcSingerDao` 来使用它。清单 6-22 清楚地表明，使用 `JdbcTemplate`
  bean 与数据库通信要容易得多，尤其是在检索单个值时。


  ```

  package com.apress.prospring6.six.template

  class JdbcSingerDao : SingerDao {

  private var jdbcTemplate: JdbcTemplate? = null

  fun setJdbcTemplate(jdbcTemplate: JdbcTemplate?) {

  this.jdbcTemplate = jdbcTemplate

  }

  override fun findNameById(id: Long): String {

  return jdbcTemplate!!.queryForObject(PARAMETRIZED_FIND_NAME,

  String::class.java, id)

  }

  }

  清单 6-22

  使用 JdbcTemplate Bean

  ```


  在清单 6-22 中，我们使用 `JdbcTemplate` 的 `queryForObject(..)` 方法来检索由 `id` 标识的记录中 first name
  的值。第一个参数是 SQL 字符串，最后一个参数是以 `varargs` 格式传递给 SQL 进行参数绑定的参数。第二个参数是要返回的类型，在本例中是 `String`。除了
  `String`，你还可以查询其他类型，例如 `Long` 和 `Int`。让我们看看结果。清单 6-23 展示了测试程序。同样，这里使用了 JUnit 测试类，因为这样我们可以单独运行测试方法，并且由于在执行
  gradle build 时会运行测试，我们也能确保构建保持稳定。


  ```

  package com.apress.prospring6.six.template

  import com.apress.prospring6.six.config.EmbeddedJdbcConfig

  // 其他导入语句已省略

  class JdbcTemplateConfigTest {

  // @Disabled("需要运行 MariaDB，取消注释以运行")

  @Test

  fun testSpringJdbc() {

  val ctx = AnnotationConfigApplicationContext(

  SpringDatasurceCfg::class.java

  )

  val singerDao = ctx.getBean(

  "singerDao",

