  \ Docker 容器。创建镜像并运行它的步骤在 `chapter14/CHAPTER14.adoc` 文件中描述，该文件是本章项目的一部分。\n\n为了将 `SINGER`\
  \ 记录作为 Java 对象管理，我们使用 `Singer` 实例。该类被配置为 Jakarta Persistence 实体，如代码清单 14-2 所示。\n\
