  singers/search\", SingerService.CriteriaDto())\n}\n}\n清单 20-17\nSingerHandler 类\n\
  ```\n\n\n声明了一个类型为 `SingerHandler` 的 Bean，它是 Spring WebFlux 应用配置的一部分，其方法被用作管理 `Singer`\
  \ 实例的请求处理函数。\n\n清单 20-17 中带有数字注释的函数，便于识别 `ReactiveSingerController`（清单 20-15）中对应的处理方法，同时这些注释也可作为解释每个函数以下特性的指引：\n\
  \n1.  `list`：一个简单的处理函数，返回通过调用 `singerService.findAll()` 获取的所有 `Singer` 对象实例。它被声明为\
  \ `HandlerFunction<ServerResponse>` 类型的字段，并且是 `SingerHandler` 类的成员。由于它对 `singerService`\
  \ 的依赖，无法在同一行中声明并初始化。要初始化此字段，必须先初始化 `singerService` 字段。由于 `singerService` 在构造函数中初始化，因此\
  \ `list` 字段的初始化也是构造函数的一部分。初始的 `ServerResponse.ok()` 将 HTTP 响应状态设置为 `200 (OK)`，并返回一个内部\
  \ `BodyBuilder` 的引用，允许链式调用其他方法来描述请求。该链必须以返回 `Mono<ServerResponse>` 的 `body*(..)`\
  \ 方法之一结束。\n\n2.  `deleteById`：一个简单的处理函数，用于删除 `ID` 与路径变量匹配的 `Singer` 实例。路径变量通过调用\
  \ `serverRequest.pathVariable(\"id\")` 提取。`ID` 参数代表路径变量的名称。`singerService.delete()`\
  \ 方法返回 `Mono<Void>`，因此 `Mono<ServerResponse>` 实际上会发出一个带有空响应体的响应，状态码为 `204 (无内容)`，由\
  \ `ServerResponse.noContent()` 设置。\n\n3.  `findById`：一个处理函数，返回由 `id` 路径变量标识的单个 `Singer`\
  \ 实例。该实例通过调用返回 `Mono<Singer>` 的 `singerService.findById(..)` 获取。如果此流发出一个值，则表示找到了与路径变量匹配的歌手，并创建一个状态码为\
  \ `200 (OK)`、响应体为 JSON 格式的 `Singer` 实例的响应。为了在不阻塞的情况下访问流发出的 `Singer` 实例，使用了 `flatMap(..)`\
  \ 函数。如果流没有发出值，则表示未找到具有预期 ID 的歌手，因此通过调用 `switchIfEmpty(ServerResponse.notFound().build())`\
  \ 创建一个状态为 `404 (未找到)` 的空响应。\n\n4.  `create`：用于创建新 `Singer` 实例的处理函数。`Singer` 实例从请求体中提取。通过调用\
  \ `serverRequest.bodyToMono(String.class)` 将请求体读取为 `Mono<Singer>`。当成功执行保存时，`flatMap(singerService::save)`\
  \ 流会发出一个值，响应会填充一个指向可访问已创建资源的 URL 的 Location 标头，并返回 `201 (已创建)` 响应状态。如果流没有发出值，则表示保存操作失败，并且可以通过向此处理链添加诸如\
  \ `.switchIfEmpty(status(HttpStatus.INTERNAL_SERVER_ERROR).build())` 之类的内容来配置所需的响应状态。但是，我们将\
  \ `SingerService` 声明为在保存 `Singer` 实例失败时抛出 `SavingException`，因此这不再适用，因为错误处理器会处理它。\n\
  \n5.  `updateById`：用于更新 `Singer` 实例的处理函数。此处提及它只是为了指出 `switchIfEmpty(..)` 方法不仅可以构建带有响应状态的响应，还可以构建带有自定义响应体的响应，并且此方法展示了一个示例，其中响应体是\
  \ `\"Failure to update singer!\"` 文本。响应体可以是任何类型的对象，包括由 `singerService.update(..)`\
  \ 方法发出的异常对象。\n\n6.  `searchSingers`：一个处理函数，用于处理带有名为 `name` 的参数的请求。其值通过调用 `serverRequest.queryParam(\"\
  name\")` 提取。\n\n现在我们有了处理函数，下一步是将它们映射到请求。这是通过一个 `RouterFunction` Bean 完成的。此 Bean\
  \ 可以在任何配置类中声明。`org.springframework.web.reactive.function.server.RouterFunction<T>`^(²²⁰)\
  \ 是一个简单的函数式接口，描述了将传入请求路由到 `HandlerFunction<T>` 实例的函数。其代码如清单 20-18 所示。\n\n```\npackage\
  \ org.springframework.web.reactive.function.server;\n// 导入语句已省略\n@FunctionalInterface\n\
  public interface RouterFunction {\nMono> route(ServerRequest request);\n// 默认方法已省略\n\
  }\n清单 20-18\nRouterFunction 函数式接口\n```\n\n`route(..)` 方法返回与作为参数提供的请求匹配的处理函数。如果未找到处理函数，则返回一个空的\
  \ `Mono<Void>`。`RouterFunction<T>` 的作用与控制器类中的 `@RequestMapping` 注解类似。\n\n通过使用 `org.springframework.web.reactive.function.server.RouterFunctions`\
  \ 类中的构建器方法，可以轻松地为 Spring 应用组合一个 `RouterFunction<T>`。此类提供了用于构建简单和嵌套路由函数的静态方法，甚至可以将\
  \ `RouterFunction<T>` 转换为 `HttpHandler`，从而使应用能够在 Servlet 3.1+ 容器中运行。在进一步讨论路由函数之前，让我们先看看\
  \ `SingerHandler` 中处理函数的配置，如清单 20-19 所示。\n\n```\npackage com.apress.prospring6.twenty.boot\n\
  import org.springframework.web.reactive.function.server.RequestPredicates\nimport\
  \ org.springframework.web.reactive.function.server.RouterFunction\nimport org.springframework.web.reactive.function.server.ServerResponse\n\
  import org.springframework.web.reactive.function.server.RequestPredicates.queryParam\n\
  import org.springframework.web.reactive.function.server.RouterFunctions.route\n\
  @Configuration\nopen class RoutesConfig {\n@Bean\nopen fun staticRouter():RouterFunction\
  \ {\nreturn resources(\"/images/**\", ClassPathResource(\"static/images/\"))\n.and(resources(\"\
  /styles/**\", ClassPathResource(\"static/styles/\")))\n.and(resources(\"/js/**\"\
  , ClassPathResource(\"static/js/\")));\n}\n@Bean\nopen fun singerRoutes( homeHandler:HomeHandler,\n\
  singerHandler:SingerHandler):RouterFunction {\nreturn route()\n// 返回主页视图模板\n.GET(\"\
  /\", homeHandler::view)\n.GET(\"/home\", homeHandler::view)\n.GET(\"/singers/search\"\
  , singerHandler::searchView)\n.POST(\"/singers/go\", singerHandler::search)\n//\
  \ 这些需要放在这里，否则参数将不会被考虑\n.GET(\"/handler/singer\", queryParam(\"name\", {_ -> true}),\n\
  singerHandler::searchSingers)\n.GET(\"/handler/singer\", RequestPredicates.all()\n\
  .and(queryParam(\"fn\", {_ -> true}))\n.and(queryParam(\"ln\", {_ -> true})), singerHandler::searchSinger)\n\
  // 带参数的请求始终放在前面\n.GET(\"/handler/singer\", singerHandler.list)\n.POST(\"/handler/singer\"\
  , singerHandler::create)\n.GET(\"/handler/singer/{id}\", singerHandler::findById)\n\
  .PUT(\"/handler/singer/{id}\", singerHandler::updateById)\n.DELETE(\"/handler/singer/{id}\"\
  , singerHandler.deleteById)\n.filter { request, next ->\nLOGGER.info(\"Before handler\
  \ invocation: {}\", request.path())\nreturn@filter next.handle(request)\n}\n.build()\n\
  }\n...\ncompanion object {\nval LOGGER = LoggerFactory.getLogger(RoutesConfig::class.java)\n\
  }\n}\n清单 20-19\nRoutesConfig 类，为 SingerHandler 中的处理函数声明路由配置 Bean\n```\n\n`singerRoutes`\
  \ Bean 是一个路由器函数，用于将传入请求路由到之前介绍的 `SingerHandler` Bean 中声明的处理函数。\n\n\n\n在清单 20-19\
  \ 中，每个处理函数都对应`SingerHandler`中的一个处理函数。`RouterFunctionBuilder`中的`route()`方法进一步用于通过特定于\
  \ HTTP 方法、路径和请求参数的方法来添加路由映射。\n\n以下列表讨论了其中一些行：\n\n*   `GET(\"/handler/singer\", singerHandler.list)`：`GET(..)`是抽象工具类`org.springframework.web.reactive.function.server.RequestPredicates`中的一个静态方法，此处用于创建一条路由，将`GET`请求映射到`/handler/singer`\
  \ URL，并关联`singerHandler.list`函数。\n\n*   `DELETE(\"/handler/singer/{id}\", singerHandler.deleteById)`：`DELETE(..)`是工具类`RequestPredicates`中的一个静态方法，它创建一条路由，将`DELETE`请求映射到`/handler/singer/{id}`\
  \ URL，其中`id`是传递给`singerHandler.deleteById`函数的路径变量名称。\n\n*   `GET(\"/handler/singer/{id}\"\
  , singerHandler::findById)`：将`GET`请求映射到`/handler/singer/{id}`，并关联`singerHandler.findById`。\n\
  \n*   `POST(\"/handler/singer\", singerHandler::create)`：`POST()`是工具类`RequestPredicates`中的一个静态方法，它创建一条路由，将`POST`请求映射到`/handler/singer`\
  \ URL，并关联`singerHandler.create`函数。\n\n*   `PUT(\"/handler/singer/{id}\", singerHandler::updateById)`：`PUT()`是工具类`RequestPredicates`中的一个静态方法，它创建一条路由，将`PUT`请求映射到`/handler/singer/{id}`\
  \ URL，并关联`singerHandler.updateById`函数。\n\n*   `GET(\"/handler/singer\", queryParam(\"\
  name\", t` **->** `true), singerHandler::searchSingers)`：将`GET`方法映射到`/handler/singer?name=${val}`，并关联`singerHandler.searchSingers`函数。参数通过`RequestPredicates.queryParam(..)`工具方法声明，该方法基本上返回一个`RequestPredicate`，如果该参数是\
  \ URL 的一部分，则返回`true`。\n\n`filter(..)`语句声明了一个过滤所有请求的函数。此示例中的该语句仅打印一条简单的日志，但它可用于检查任何类型的横切关注点，例如日志记录、安全性等。\n\
  \n调用`build()`方法来构造`RouterFunction<ServerResponse>` Bean。\n\n有了这个配置，我们现在就有了一个位于`/handler/singer`\
  \ URL 下的歌手 API。当你启动应用程序并使用`curl`、Postman、HTTPie 等客户端或浏览器（针对 GET 端点）测试`/handler/singer`端点时，你会注意到一切运行良好，其行为与`ReactiveSingerController`实现的行为相同。\n\
  \n![](img/524962_1_En_20_Figh_HTML.jpg) 一个警告图标。圆圈内有一个感叹号。 带有参数的路由请求需要在构建器中首先指定，或者至少在基于相同路径但无参数的路由之前指定。请求会按照声明的顺序与路由器函数中的现有路由进行匹配。因此，对\
  \ URL `\"/handler/singers?name=John\"`的请求会匹配列表中找到的第一个映射到`\"/handler/singers\"`的路由。这是因为只有在找到路由后才会检查参数是否存在，因为请求参数是可选的，并且不是路由的一部分。因此，对`\"\
  /handler/singers\"`的 GET 请求将首先与第一个`GET \"/handler/singers\"`路由进行匹配，并检查`name`参数是否存在。如果未找到，则判定为不匹配，接着检查列表中下一个`GET\
  \ \"/handler/singers\"`是否匹配。但如果既未找到`fn`参数也未找到`ln`参数，则同样不匹配，因此继续检查列表中的下一个。如果该路由没有参数，则最终调用`singerHandler.list`。\n\
  \n### 响应式错误处理\n\n在之前的“响应式服务”部分，我们修改了`save(..)`和`update(..)`方法，使其发出`SavingException`类型的异常消息。当处理函数或响应式处理方法调用这些方法之一且发生意外情况时，必须处理该异常。这允许开发者记录异常、保存抛出异常的上下文，并决定\
  \ HTTP 状态码。对于响应式控制器，使用`@RestControllerAdvice`注解的类可以完成这项工作，但对于处理函数，我们需要其他东西，一种更函数式的方式。我们需要一个`WebExceptionHandler`\
  \ Bean。幸运的是，这个 Bean 也适用于响应式控制器。\n\nSpring Boot 自动配置了一个类型为`DefaultErrorWebExceptionHandler`的默认`WebExceptionHandler`\
  \ Bean。图 20-5 描述了`WebExceptionHandler`的层次结构。\n\n![](img/524962_1_En_20_Fig5_HTML.jpg)\n\
  \n一个层次结构展示了 4 个组件。流程从默认错误 Web 异常处理器开始，随后是抽象错误 Web 异常处理器、错误 Web 异常处理器和 Web 异常处理器。\n\
  \n图 20-5\n\n`WebExceptionHandler`层次结构\n\n此 Bean 返回的响应是一个通用的 JSON 表示对象，包含`400（错误请求）`HTTP\
  \ 状态码、URI 路径和一个字母数字请求标识符。如果我们想要自定义行为，需要声明自己的`WebExceptionHandler` Bean。\n\n清单 20-20\
  \ 展示了一个非常简单的自定义`WebExceptionHandler` Bean 版本，它被添加到`RoutingConfig`类中。\n\n```\npackage\
  \ com.apress.prospring6.twenty.boot\nimport org.springframework.web.server.WebExceptionHandler\n\
  // 其他导入语句已省略\n@Configuration\nopen class RoutesConfig {\n...\n@Bean\n@Order(-2)\n\
  open fun  exceptionHandler():WebExceptionHandler {\nreturn object : WebExceptionHandler\
  \ {\noverride fun handle(exchange: ServerWebExchange, ex: Throwable): Mono {\nwhen(ex)\
  \ {\nis SaveException -> {\nLOGGER.debug(\"RouterConfig:: handling exception ::\
  \ \", ex)\nexchange.response.setStatusCode(HttpStatus.BAD_REQUEST)\n// 标记响应为已完成，并禁止向其写入\n\
  return exchange.response.setComplete()\n}\nis IllegalArgumentException -> {\nLOGGER.debug(\"\
  RouterConfig:: handling exception :: \" , ex)\nexchange.response.setStatusCode(HttpStatus.BAD_REQUEST)\n\
  // 标记响应为已完成，并禁止向其写入\nreturn exchange.response.setComplete()\n}\nis MissingValueException\
  \ -> {\nexchange.response.setStatusCode(HttpStatus.BAD_REQUEST)\nexchange.response.headers.add(\"\
  Content-Type\", \"application/json\")\ntry {\nval message = JsonMapper().writeValueAsString(ex.fieldNames)\n\
  val buffer = exchange.response.\nbufferFactory().wrap(message.toByteArray())\nreturn\
  \ exchange.response.writeWith(Flux.just(buffer))\n} catch (_:JsonProcessingException)\
  \ {\n}\n}\n}\nreturn Mono.error(ex)\n}\n}\n}\ncompanion object {\nval LOGGER = LoggerFactory.getLogger(RoutesConfig::class.java)\n\
  }\n}\n清单 20-20\n自定义 WebExceptionHandler Bean\n```\n\n请注意，为了确保我们的异常处理器被使用，我们需要通过使用`@Order(-2)`注解为其赋予最高优先级；否则，Spring\
  \ Boot 仍将使用默认处理器。\n\n\n\n### 使用 `WebTestClient` 测试响应式端点\n\n为了使用真实的响应式客户端测试响应式端点，我们可以使用\
  \ `WebTestClient` 的实例。\n\n`WebClient` API 是在 Spring 5 中引入的，用以替代现有的 `RestTemplate`\
  \ 客户端。在 Spring 6 中，你仍然可以同时使用两者向 Spring 应用提交请求，但 `WebClient` 更适用于响应式应用，因为它是 `spring-webflux`\
  \ 包的一部分。`WebClient` 可用于同步或异步 HTTP 请求，它提供了一个功能性的流式 API，可以直接集成到你现有的 Spring 配置和 WebFlux\
  \ 响应式框架中。\n\n`WebClient` 只能基于现有的异步 HTTP 客户端库使用。在 `chapter20-boot` 项目中，使用的是 Reactor\
  \ Netty，但 Jetty Reactive 或 Apache Reactive HTTP 客户端也同样适用。`WebClient` 可用于向任何语言编写的其他响应式服务发起请求。\n\
  \n为了测试响应式 Web 应用，还引入了 `WebTestClient`，作为生产环境中使用的 `WebClient` 的对应组件。`WebTestClient`\
  \ 在内部使用 `WebClient` 来执行请求，同时提供流式 API 来验证响应。\n\n在本节中，我们将使用 `WebTestClient` 实例向前几节构建的\
  \ API 提交一些请求。\n\n让我们从测试由 `ReactiveSingerController` 支持的端点开始。清单 20-21 展示了创建一个指向根\
  \ URL `http://localhost:8081/reactive/singer` 的 `WebClient`，以及一个检查是否返回了预期记录数的测试。\n\
  \n```\npackage com.apress.prospring6.twenty.boot.webclient\nimport org.springframework.test.web.reactive.server.WebTestClient\n\
  // 其他导入语句已省略\nclass ReactiveSingerControllerTest {\nprivate val controllerClient\
  \ = WebTestClient\n.bindToServer()\n.baseUrl(\"http://localhost:8081/reactive/singer\"\
  )\n.build()\n...\n@Test\nfun shouldReturnAFew() {\ncontrollerClient.get()\n.uri\
  \ { uriBuilder: UriBuilder ->\nuriBuilder.queryParam(\n\"name\",\n\"John\"\n).build()\n\
  }\n.accept(MediaType.APPLICATION_JSON)\n.exchange()\n.expectStatus().isOk()\n.expectHeader().contentType(MediaType.APPLICATION_JSON)\n\
  .expectBody()\n.jsonPath(\"$.length()\").isEqualTo(2)\n}\n...\ncompanion object\
  \ {\nprivate val LOGGER = LoggerFactory.getLogger(SingerHandlerTest::class.java)\n\
  }\n}\n清单 20-21\n使用 WebTestClient 实例的测试类\n```\n\n这里有几个要点：\n\n*   我们通过 `WebTestClient.bindToServer()`\
  \ 返回的构建器创建了一个 `WebTestClient` 实例，并将该客户端的基 URL 设置为 `http://localhost:8081/reactive/singer`。显然，这意味着应用必须正在运行，此测试才能按预期工作。\n\
  \n*   向配置好的基 URL 发送了一个 `GET` 请求，其中 `name` 参数设置为 `\"John\"`。\n\n*   为了发送请求，我们调用了\
  \ `exchange()`。\n\n*   为了检查结果，我们使用了可用的断言方法：`expect*(..)` 用于检查状态和头部，`jsonPath(..).*`\
  \ 用于检查对请求体的假设，尤其是在请求体为 JSON 格式时。\n\n然而，更有趣的是测试一个负面场景——例如，当我们尝试创建另一个 John Mayer 时，如清单\
  \ 20-22 所示。\n\n```\npackage com.apress.prospring6.twenty.boot.webclient\nimport\
  \ org.springframework.test.web.reactive.server.WebTestClient\n// 其他导入语句已省略\nclass\
  \ ReactiveSingerControllerTest {\nprivate val controllerClient = WebTestClient\n\
  .bindToServer()\n.baseUrl(\"http://localhost:8081/reactive/singer\")\n.build()\n\
  ...\n@Test\nfun shouldFailToCreateJohnMayer() {\ncontrollerClient.post()\n.accept(MediaType.APPLICATION_JSON)\n\
  .bodyValue(\nSinger().apply {\nfirstName = \"John\"\nlastName = \"Mayer\"\nbirthDate\
  \ = LocalDate.of(1977, 10, 16)\n}\n)\n.exchange()\n.expectStatus().is4xxClientError()\n\
  .expectBody()\n.consumeWith { body: EntityExchangeResult? ->\nLOGGER.debug(\n\"\
