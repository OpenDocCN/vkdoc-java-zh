  \n![](img/524962_1_En_19_Fig3_HTML.jpg)\n\n一个标题为“Web Socket 测试器”的窗口截图，包含带有连接和断开选项卡的目标、带有发送选项卡的消息、回显和\
  \ ping。目标来自本地主机的回显处理器。\n\n**图 19-3**\nWebSocket 客户端页面\n\n虽然此示例在底层 WebSocket API\
  \ 之上使用了 Spring 抽象，但您可以清楚地看到这项技术为应用程序带来的激动人心的可能性。现在，让我们看看当浏览器不支持 WebSocket 且需要回退选项时，如何处理此功能。清单\
  \ 19-4 中的代码使用 `supportsWebSocket` 变量测试浏览器是否不支持 WebSocket，如果不支持，则禁用“连接”按钮。\n\n##\
  \ 使用 SockJS\n\n由于并非所有浏览器都支持 WebSocket（例如，移动设备上的浏览器可能如此），并且应用程序仍需为最终用户正常运行，Spring\
  \ 框架提供了一个利用 SockJS^(¹⁸⁷) 的回退选项。使用 SockJS 可以在运行时尽可能提供类似 WebSocket 的行为，而无需更改应用程序端代码。SockJS\
  \ 协议通过 JavaScript 库在客户端使用。Spring 框架的 `spring-websocket` 库包含相关的 SockJS 服务器端组件。当使用\
  \ SockJS 提供无缝回退选项时，客户端将首先通过 `/info` 路径向服务器发送 GET 请求，以从服务器获取传输信息。SockJS 将首先尝试使用 WebSocket，然后是\
  \ HTTP 流式传输，最后将 HTTP 长轮询作为最后手段。\n\n需要进行一个简单的修改来支持使用 SockJS 的 WebSocket 通信。首先，我们需要支持异步消息传递，这在清单\
  \ 19-5 的配置中使用 `@EnableAsync` 注解启用。\n\n```\npackage com.apress.prospring6.nineteen\n\
  import org.springframework.scheduling.annotation.EnableAsync\n// 其他导入语句已省略\n@EnableAsync\n\
  @Configuration\n@EnableWebMvc\n@ComponentScan\nopen class WebConfig : WebMvcConfigurer,\
  \ ApplicationContextAware {\n// 其他配置已省略\n}\n**清单 19-5**\n用于 SockJS 异步配置的 Spring\
  \ MVC 配置\n```\n\nSpring 官方 Javadoc 指出，`@EnableAsync` 注解启用了 Spring 的异步方法执行能力，从而为整个\
  \ Spring 应用程序上下文启用了注解驱动的异步处理^(¹⁸⁸)。\n\n第二个更改必须在 `WebSocketConfig` 中完成，以为我们的处理器启用\
  \ SockJS 支持，如清单 19-6 所示。\n\n```\npackage com.apress.prospring6.nineteen\nimport\
  \ org.springframework.context.annotation.Bean\nimport org.springframework.context.annotation.Configuration\n\
  import org.springframework.web.socket.config.annotation.EnableWebSocket\nimport\
  \ org.springframework.web.socket.config.annotation.WebSocketConfigurer\nimport org.springframework.web.socket.config.annotation.WebSocketHandlerRegistry\n\
  @Configuration\n@EnableWebSocket\nopen class WebSocketConfig : WebSocketConfigurer\
  \ {\noverride fun registerWebSocketHandlers(registry: WebSocketHandlerRegistry)\
  \ {\nregistry.addHandler(echoHandler(), \"/echoHandler\")\nregistry.addHandler(echoHandler2(),\
  \ \"/sockjs/echoHandler\").withSockJS()\n}\n@Bean\nopen fun echoHandler(): EchoHandler\
  \ {\nreturn EchoHandler()\n}\n@Bean\nopen fun echoHandler2(): EchoHandler {\nreturn\
  \ EchoHandler()\n}\n}\n**清单 19-6**\n用于 SockJS 配置的 Spring WebSocket\n```\n\n请注意，声明了另一个\
  \ `EchoHandler` bean，并将其映射到 `\"/sockjs/echoHandler\"`。\n\n接下来，我们需要像在 WebSocket API\
  \ 示例中那样创建一个 HTML 页面，但这次利用 SockJS 来处理传输协商。最显著的区别是，我们使用 SockJS 库而不是直接使用 WebSocket，并使用典型的\
  \ `http://` 方案而不是 `ws://` 来连接到端点。要使用 SockJS，我们需要将相应的 JavaScript 库添加到 HTML 页面，并且不再使用\
  \ `WebSocket` 进行通信，而是使用 `SockJS` 对象。HTML 代码与 `views/index2.html` 中的代码几乎相同，唯一的区别是用于处理\
  \ `SockJS` 通信的 JavaScript 代码，如清单 19-7 所示。\n\n\n\n```\n// \n// \nlet ping;\nlet websocket;\n\
  jQuery(function ($) {\nfunction writePing(message) {\n$('#pingOutput').append(message\
  \ + '\\n');\n}\nfunction writeMessage(message) {\n$('#messageOutput').append(message\
  \ + '\\n')\n}\n$('#connect')\n.click(function doConnect() {\nsockjs = new SockJS($(\"\
  #target\").val());\nsockjs.onopen = function (evt) {\nlet badge=  $(\"#badgeStatus\"\
  );\nbadge.text(\"Connected\");\nbadge.attr('class','badge bg-success');\nsetInterval(function\
  \ () {\nif (sockjs !== \"undefined\") {\nsockjs.send(\"ping\");\n}\n}, 3000);\n\
  };\nsockjs.onclose = function (evt) {\nlet badge=  $(\"#badgeStatus\");\nbadge.text(\"\
  Disconnected\");\nbadge.attr('class','badge bg-light');\n};\nsockjs.onmessage =\
  \ function (evt) {\nif (evt.data === \"ping\") {\nwritePing(evt.data);\n} else {\n\
  writeMessage('ECHO: ' + evt.data);\n}\n};\n});\n$('#disconnect')\n.click(function\
  \ () {\nif (typeof sockjs != 'undefined') {\nsockjs.close();\nsockjs = undefined;\n\
  } else {\nalert(\"Not connected.\");\n}\n});\n$('#send')\n.click(function () {\n\
  if (typeof sockjs != 'undefined') {\nsockjs.send($('#message').val());\n} else {\n\
  alert(\"Not connected.\");\n}\n});\n});\n清单 19-7\n`views/index2.html` 视图中的 JavaScript\
  \ 代码\n```\n\n实现新的 `SockJS` 代码后，构建项目并将其部署到容器中，然后导航至位于 `http://localhost:8080/ch19/index2`\
  \ 的 UI，该页面具有与 WebSocket 示例相同的所有特性和功能，如图 19-4 所示。\n\n![](img/524962_1_En_19_Fig4_HTML.jpg)\n\
  \n一张截图，左侧是德国蓝的选项列表，标记为首页、歌手、Web Socket、Sock JS 和 Stomp。其中“歌手”选项被选中。右侧是一个标题为“Web\
  \ Socket 测试器”的框，包含目标地址及连接/断开标签、消息及发送标签、回显和 ping。\n\n图 19-4\n建立连接后的 SockJS 应用程序页面\n\
  \n要测试 SockJS 的回退功能，请尝试在浏览器中禁用 WebSocket 支持。例如，在 Firefox 中，导航至 `about:config` 页面，然后搜索\
  \ `network.websocket.enabled`。将此设置切换为 `false`，如图 19-5 所示，重新加载示例 UI 并重新连接。\n\n![](img/524962_1_En_19_Fig5_HTML.jpg)\n\
  \n一张 Firefox 页面的截图，顶部有两个标签，分别标记为“Sock JS 测试器”和“高级首选项”。后者被选中。页面包含一个搜索框，内容为 `network.websocket.enabled`，一个“仅显示已修改首选项”的复选框，以及一个高亮显示的字段，内容为\
  \ `network.websocket.enabled`，值为 `false`。\n\n图 19-5\nFirefox `about:config` 页面\n\
  \n使用诸如 Live HTTP Headers 之类的工具，您可以检查从浏览器到服务器的流量以进行验证。验证行为后，将 Firefox 设置 `network.websocket.enabled`\
  \ 切换回 `true`，重新加载页面并重新连接。通过 Live HTTP Headers 观察流量，现在将显示 WebSocket 握手。在这个简单的示例中，一切应该与使用\
  \ WebSocket API 时一样正常工作。\n\n## 使用 STOMP 发送消息\n\n在使用 WebSocket 时，通常会使用像 STOMP 这样的子协议作为客户端和服务器之间的通用格式，以便两端都知道预期内容并能够做出相应反应。Spring\
  \ 框架原生支持 STOMP，我们将在示例中使用此协议。\n\nSTOMP（简单文本导向消息协议）是一种简单的、基于帧的消息协议，以 HTTP 为模型，可用于任何可靠的、双向流式网络协议（如\
  \ WebSocket）。STOMP 具有标准的协议格式；存在 JavaScript 客户端支持，用于在浏览器中发送和接收消息，并可选择性地接入支持 STOMP\
  \ 的传统消息代理，例如 RabbitMQ 和 ActiveMQ。Spring 框架原生支持一个简单的代理，该代理在内存中处理订阅请求并将消息广播给已连接的客户端。在本节介绍的\
  \ STOMP 示例中，我们将使用这个简单代理，而将功能完备的代理设置留作练习^(¹⁸⁹)。\n\n![](img/524962_1_En_19_Figa_HTML.jpg)\
  \ 阴影圆圈中的感叹号。 有关 STOMP 协议的完整描述，请参见官方网站^(¹⁹⁰)。\n\n我们将创建一个简单的股票行情应用程序，该应用程序显示几个预定义的股票代码、它们的当前价格以及价格变动时的时间戳。新的股票代码和起始价格也可以通过\
  \ UI 添加。任何连接的客户端（即其他浏览器标签页或网络上全新的客户端）都将看到相同的数据，因为它们都订阅了消息广播。每秒，每个股票价格都会更新为一个新的随机金额，并且时间戳也会更新。\n\
  \n为了确保即使客户端浏览器不支持 WebSocket，客户端也能使用股票行情应用程序，我们将再次利用 SockJS 来透明地处理任何传输切换。在深入代码之前，值得注意的是，STOMP\
  \ 消息支持由 `spring-messaging` 库提供。\n\n让我们首先创建 `Stock` 领域对象，该对象保存股票信息，例如其代码和价格，如清单 19-8\
  \ 所示。\n\n```\npackage com.apress.prospring6.nineteen.stomp\nimport java.io.Serializable\n\
  import java.time.LocalDateTime\nimport java.time.format.DateTimeFormatter\nclass\
  \ Stock() : Serializable {\nvar code: String? = null\nvar price = 0.0\nvar date:\
  \ LocalDateTime? = null\nconstructor(code: String?, price: Double) : this() {\n\
  this.code = code\nthis.price = price\n}\nval dateFormatted: String\nget() = DateTimeFormatter.ofPattern(DATE_FORMAT).format(date)\n\
  companion object {\nprivate const val serialVersionUID = 1L\nprivate const val DATE_FORMAT\
  \ = \"MMM dd yyyy HH:mm:ss\"\n}\n}\n清单 19-8\nStock 领域对象\n```\n\n为了处理股票更新请求，需要一个控制器。清单\
  \ 19-9 展示了 `StockController` 类。\n\n\n\n```\npackage com.apress.prospring6.nineteen.stomp\n\
  import org.springframework.messaging.handler.annotation.MessageMapping\nimport org.springframework.messaging.simp.SimpMessagingTemplate\n\
  import org.springframework.scheduling.TaskScheduler\n// other import statements\
  \ omitted\n@Controller\nopen class StockController(\nprivate val taskScheduler:\
  \ TaskScheduler,\nprivate val simpMessagingTemplate: SimpMessagingTemplate\n) {\n\
  private val stocks: MutableList = ArrayList()\nprivate val random = Random(System.currentTimeMillis())\n\
  @MessageMapping(\"/addStock\")\n@Throws(Exception::class)\nopen fun addStock(stock:\
  \ Stock) {\nstocks.add(stock)\nbroadcastUpdatedPrices()\n}\nprivate fun broadcastUpdatedPrices()\
  \ {\nfor (stock in stocks) {\nstock.price = stock.price + updatedStockPrice * stock.price\n\
  stock.date = LocalDateTime.now()\n}\nsimpMessagingTemplate.convertAndSend(\"/topic/price\"\
  , stocks)\n}\nprivate val updatedStockPrice: Double\nget() {\nvar priceChange =\
  \ random.nextDouble() * 5.0\nif (random.nextInt(2) == 1) {\npriceChange = -priceChange\n\
  }\nreturn priceChange / 100.0\n}\n@PostConstruct\nopen fun broadcastTimePeriodically()\
  \ {\nwith(stocks){\nadd(Stock(\"VMW\", 1.00))\nadd(Stock(\"EMC\", 1.00))\nadd(Stock(\"\
  GOOG\", 1.00))\nadd(Stock(\"IBM\", 1.00))\n}\ntaskScheduler.scheduleAtFixedRate({\
  \ broadcastUpdatedPrices() },\nDuration.ofSeconds(2))\n}\n}\n清单 19-9\nStockController\
  \ 类\n```\n\n该控制器具有以下特征：\n\n*   控制器需要一个任务调度器（**第** **12****章**）和一个 `SimpMessagingTemplate`，用于每\
  \ 2 秒发送一次`股票`价格更新。\n\n*   控制器初始化时，列表中预定义了几个股票代码及其起始价格，用于演示目的。\n\n*   `/addStock`\
  \ 处理方法允许用户提交一个 `Stock` 实例，该实例会被添加到股票列表中，然后将股票广播给所有订阅者。\n\n*   在广播股票时，我们遍历 `Stock`\
  \ 实例列表，更新每个实例的价格，然后通过注入的 `SimpMessagingTemplate` 将它们发送给 `/topic/price` 的所有订阅者。`TaskExecutor`\
  \ 实例通过每 2 秒调用一次 `broadcastUpdatedPrices`，将更新后的股票价格列表广播给所有已订阅的客户端。\n\n有了控制器之后，我们现在需要一个\
  \ HTML UI 来向客户端显示股票信息。为简化操作，`views/index3.html` 视图使用 Thymeleaf 编写，并继承了第 14 章和第 17\
  \ 章中使用的 `views/templates/layout.html` 模板的主题元素。\n\n`views/index3.html` 视图中的 HTML\
  \ JavaScript 代码如清单 19-10 所示。\n\n```\n\nlet stomp;\nfunction displayStockPrice(frame)\
  \ {\nlet stocks = JSON.parse(frame.body);\n$('#stock').empty();\nfor (let i in stocks)\
  \ {\nlet stock = stocks[i];\n$('#stock').append(\n$('').append(\n$('').html(stock.code),\n\
  $('').html(stock.price.toFixed(2)),\n$('').html(stock.dateFormatted)\n)\n);\n}\n\
  }\nlet connectCallback = function () {\nstomp.subscribe('/topic/price', displayStockPrice);\n\
  };\nlet errorCallback = function (error) {\nalert(error);\n};\njQuery(function ($)\
  \ {\n$(\"#addStockButton\").attr(\"disabled\", true);\n$('#connect')\n.click(function\
  \ doConnect() {\nstomp = Stomp.over(new SockJS($(\"#target\").val()));\nstomp.connect(\"\
  guest\", \"guest\", connectCallback, errorCallback);\nlet badge=  $(\"#badgeStatus\"\
  );\nbadge.text(\"Connected\");\nbadge.attr('class','badge bg-success');\n$(\"#addStockButton\"\
  ).attr('disabled', false);\n});\n$('#disconnect')\n.click(function () {\nif (typeof\
  \ stomp != 'undefined') {\nstomp.disconnect();\nstomp = undefined;\nlet badge= \
  \ $(\"#badgeStatus\");\nbadge.text(\"Disconnected\");\nbadge.attr('class','badge\
  \ bg-light');\n$(\"#addStockButton\").attr('disabled', true);\n} else {\nalert(\"\
  Not connected.\");\n}\n});\n$('.addStockButton').click(function (e) {\ne.preventDefault();\n\
  const stockStr = JSON.stringify({\n'code': $('.addStock .code').val(),\n'price':\
  \ Number($('.addStock .price').val())\n});\nstomp.send('/app/addStock', {}, stockStr);\n\
  return false;\n});\n});\n\nSTOMP 测试器\n\nFN:\n\n股票详情\n\n代码\n价格\n时间\n\nFN:\n\nFN:\n\
  \n清单 19-10\nStockController HTML 页面\n```\n\n与本章前面的示例类似，我们将一些 HTML 与 JavaScript 混合在一起以更新显示。我们将\
  \ HTML 与 JavaScript 结合的原因（尽管这不符合常识性编程规则）是为了尽可能简化 Spring MVC 配置；同时也有助于使页面及其组件的功能易于理解。我们利用\
  \ jQuery 更新 HTML 数据，利用 SockJS 提供传输选择，并利用 STOMP JavaScript 库 `stomp.min.js` 与服务器通信。通过\
  \ STOMP 消息发送的数据以 JSON 格式编码，我们在事件发生时提取这些数据。建立 STOMP 连接后，我们订阅 `/topic/price` 以接收股票价格更新。\n\
  \nSTOMP 通信的 Java 配置由 `StompConfig` 类表示，如清单 19-11 所示。\n\n```\npackage com.apress.prospring6.nineteen\n\
  import org.springframework.context.annotation.Configuration\nimport org.springframework.scheduling.annotation.EnableAsync\n\
  import org.springframework.messaging.simp.config.MessageBrokerRegistry\nimport org.springframework.web.socket.config.annotation.EnableWebSocketMessageBroker\n\
  import org.springframework.web.socket.config.annotation.StompEndpointRegistry\n\
  import org.springframework.web.socket.config.annotation.WebSocketMessageBrokerConfigurer\n\
  @EnableAsync\n@Configuration\n@EnableWebSocketMessageBroker\nopen class StompConfig\
  \ : WebSocketMessageBrokerConfigurer {\noverride fun registerStompEndpoints(registry:\
  \ StompEndpointRegistry) {\nregistry.addEndpoint(\"/ws\").withSockJS()\n}\noverride\
  \ fun configureMessageBroker(config: MessageBrokerRegistry) {\nconfig.setApplicationDestinationPrefixes(\"\
  /app\")\nconfig.enableSimpleBroker(\"/topic\")\n}\n@Bean\nopen fun taskExecutor():\
  \ TaskExecutor {\nreturn SimpleAsyncTaskExecutor()\n}\n}\n清单 19-11\nStompConfig\
  \ 配置类\n```\n\n为了启用 Spring 异步调用和任务执行，配置类必须使用 `@EnableAsync` 注解，并且需要一个类型为 `org.springframework.core.task.TaskExecutor`\
  \ 的 Bean 来重复广播股票信息。\n\n配置类上的 `@EnableWebSocketMessageBroker` 注解启用了基于代理的、通过 WebSocket\
  \ 并使用更高级别消息子协议的消息传递。请注意，该类实现了 `WebSocketMessageBrokerConfigurer` 接口，该接口定义了用于配置来自\
  \ WebSocket 客户端的、使用简单消息协议（例如 STOMP）的消息处理的方法。\n\n\n\n`registerStompEndpoints` 方法用于注册\
  \ `/ws` 的 STOMP 端点映射。`http://localhost:8080/ch19/ws` 用于初始化一个 SockJS 实例，该实例为 STOMP\
  \ 通信提供支持。`configureMessageBroker` 方法用于配置消息代理选项。\n\n`applicationDestinationPrefixes`\
  \ 属性有助于过滤指向应用程序注解方法的目标；此配置设置了 `/app` 过滤器。该过滤器需要作为股票处理器方法 URL 路径的前缀，这就是清单 19-10 包含以下代码的原因：\n\
  \n```\nstomp.send('/app/addStock', {}, stockStr)\n```\n\n`enableSimpleBroker(\"\
  /topic\")` 启用了一个简单的消息代理，并配置了一个或多个前缀来过滤指向该代理的目标。在 `StockController` 的 `broadcastUpdatedPrices()`\
  \ 方法中，你会看到股票数据以 `/topic/price` 作为目标发布到该主题；而在 `index3.html` 中，你会看到 `STOMP` 实例订阅了此主题，以便能够获取股票数据。\n\
  \n首次访问页面时，没有 STOMP 连接，因此股票表格为空，并且“添加股票”按钮处于禁用状态，如图 19-6 所示。\n\n![](img/524962_1_En_19_Fig6_HTML.jpg)\n\
  \n一张截图，左侧列出了 German Blue 的选项列表，标签为 home、singers、web socket、sock J S 和 Stomp。其中 singers\
  \ 选项被选中。一个标题为“Stomp Tester”的框内包含带有连接和断开标签的端点，以及包含代码、价格、时间和添加股票标签的股票详情。\n\n图 19-6\n\
  \n建立连接前的 STOMP 应用程序页面\n\n点击“连接”按钮后，熟悉的绿色“已连接”徽章出现，股票数据加载到表格中并每 2 秒刷新一次，“添加股票”按钮现在已启用，允许你添加自己的股票，如图\
  \ 19-7 所示。\n\n![](img/524962_1_En_19_Fig7_HTML.jpg)\n\n一张截图，左侧列出了 German Blue 的\
  \ 5 个选项。其中 singers 选项被选中。一个标题为“Stomp Tester”的框内包含带有连接和断开标签的端点，以及一个包含 3 列 4 行表格的股票详情。列标题为代码、价格和时间。第\
  \ 2 行被选中。\n\n图 19-7\n\n建立连接后的 STOMP 应用程序页面\n\n在底层，连接已建立，在浏览器控制台中，我们可以看到浏览器订阅了 `topic/price`\
  \ 队列，然后每 2 秒接收一次信息。浏览器控制台日志的片段如清单 19-12 所示。\n\n```\nOpening Web Socket...  stomp-1.7.1.min.js:8:1895\n\
  Web Socket Opened...   stomp-1.7.1.min.js:8:1895\n>>> CONNECT\nlogin:guest\npasscode:guest\n\
  accept-version:1.1,1.0\nheart-beat:10000,10000\n>> SUBSCRIBE         stomp-1.7.1.min.js:8:1895\n\
  id:sub-0\ndestination:/topic/price\n# 这部分每 2 秒重复一次\n>> DISCONNECT       stomp-1.7.1.min.js:8:1895\n\
  清单 19-12\nSTOMP 通信的浏览器控制台日志片段\n```\n\n### Spring Boot 等效应用程序\n\n将上述应用程序转换为 Spring\
  \ Boot 应用程序相当容易，因为存在 `spring-boot-starter-websocket` 库。`chapter19-boot` 项目的依赖关系如图\
  \ 19-8 所示。\n\n![](img/524962_1_En_19_Fig8_HTML.jpg)\n\nchapter 19 boot 的依赖项列表，其中高亮显示了三个库：spring\
  \ boot starter websocket、spring messaging 和 spring websocket。\n\n图 19-8\n\n项目 `chapter19-boot`\
  \ 的依赖关系\n\n由于用户可以选择直接通过 WebSocket 进行通信，或使用 STOMP 等高级协议，因此仍然需要为这两种情况提供配置类，并配合使用 `@EnableWebSocket`\
  \ 或 `@EnableWebSocketMessageBroker` 注解。因此，除了构建配置的简化和无需运行应用程序的服务器之外，Spring Boot 并没有过多地减少开发人员的工作量。出于这个原因，本章将不介绍如何编写用于\
  \ WebSocket 通信的 Spring Boot 应用程序，因为所有细节已在**第** **14** 章（Web 章节）以及本章中关于 WebSocket\
  \ 的所有内容中涵盖。不过，`chapter19-boot` 项目是本书源码的一部分，欢迎查阅。\n\n## 总结\n\n在本章中，我们介绍了 WebSocket\
  \ 的一般概念。我们讨论了 Spring 框架对底层 WebSocket API 的支持，然后继续使用 SockJS 作为回退选项，根据客户端浏览器选择合适的传输方式。最后，我们介绍了\
  \ STOMP 作为一种 WebSocket 子协议，用于在客户端和服务器之间传递消息。所有示例都展示并解释了 Kotlin 配置类。\n\n在下一章中，我们将讨论如何构建一个响应式\
  \ Spring 应用程序，以及 WebSocket 如何用于响应式通信。\n\n脚注 1   2   3   4   5   6   7\n\n\n\n"
- "# 20. 响应式 Spring\n\n前几章演示了如何在 Apache Tomcat 服务器实例上构建和运行典型的 Kotlin Web 应用程序，该服务器要么是外部的（适用于\
  \ Spring 经典配置），要么是嵌入式的（适用于 Spring Boot Web 应用程序）。无论哪种情况，Spring 的 `DispatcherServlet`\
  \ 都负责将传入的 HTTP 请求定向到应用程序中声明的所有处理器。但是，像我们迄今为止开发的这类应用程序能否用于真实的生产环境？`DispatcherServlet`\
  \ 同时能处理多少个 HTTP 请求？这个数量能否增加？`DispatcherServlet` 实际上对它能处理的请求数量没有决定权。这由 Servlet 容器定义，在我们的案例中，就是\
  \ Apache Tomcat 服务器。\n\nApache Tomcat 是基于 Java 软件平台构建和维护动态网站及应用程序的热门选择。Java Servlet\
  \ API 使 Web 服务器能够使用 HTTP 协议处理基于 Java（或 Kotlin）的动态 Web 内容。这被称为**请求-响应模型**：客户端发出请求，服务器准备响应并将其发送回客户端。它是单向的，由客户端控制，服务器并不关心客户端能否处理响应。例如，当你在浏览器中进入\
  \ Facebook 聊天窗口时，如果服务器要发送你与该好友的所有对话，页面不仅会加载很长时间，甚至可能导致浏览器崩溃。\n\n多年来，为了支持更高效的客户端-服务器交互，软件和应用程序开发风格已经进行了许多改进，但本章的重点是**响应式通信**。\n\
  \n![](img/524962_1_En_20_Figa_HTML.jpg) 一个创意图标，带有灯泡符号。 如果你想更详细地了解客户端-服务器通信从最初的请求-响应模型到响应式模型的演变过程，请参阅\
  \ *Pro Spring MVC with WebFlux*（Apress, 2021）^(¹⁹¹)；从第 9 章开始阅读。\n\n高效的响应式通信只能发生在响应式客户端和响应式服务器之间，也就是响应式应用程序之间。与经典的请求-响应风格（客户端和服务器以不连续的信息块交换数据）相比，响应式通信意味着客户端和服务器之间持续的数据流。\n\
  \n在处理大量数据时，响应式应用程序是解决方案。响应式应用程序的设计以韧性、响应性和可伸缩性为优先考虑。响应式宣言^(¹⁹²)描述了响应式应用程序的特性。响应式流\
  \ API 规范^(¹⁹³)提供了一组最小的接口，应用程序组件应实现这些接口，以便应用程序可以被视为响应式。因此，响应式流 API 是一种互操作性规范，确保响应式组件无缝集成，并保持操作的非阻塞和异步性。\n\
  \n四个关键术语描述了响应式应用程序：\n\n*   *响应性*：期望快速且一致的响应时间。\n*   *韧性*：故障是预料之中的，应用程序被设计为能够处理故障并自我修复。\n\
  *   *弹性*：应用程序应能够通过自动扩展其能力来处理高负载，并在不再需要时缩减规模。\n*   *消息驱动*：响应式通信应该是异步的；组件应松散耦合，并使用消息进行通信。此外，应用背压以防止消息生产者压垮消费者。\n\
  \n响应式应用程序应该更灵活、松散耦合、非阻塞且可伸缩，但同时更易于开发、更易于变更，并且更能容忍故障。构建响应式应用程序需要遵循响应式编程范式的原则。\n\n\
  阅读了前面的介绍后，你可能会认为响应式应用程序是软件设计演进的巅峰，并且世界上每个应用程序都应该重新设计为响应式。不幸的是，情况并非总是如此。响应式应用程序并不总是比经典应用程序运行得更快，而且它们也有自己的一系列问题。正如你将在本章中看到的，响应式编程与命令式编程截然不同，并且需要一点思维转变。响应式应用程序的主要好处是它们是非阻塞的，并且能够用少量固定的线程和更少的内存需求来扩展应用程序，同时充分利用可用的处理能力。\n\
  \n在本章中，你将学习响应式编程，以及如何使用 Spring WebFlux 构建完全响应式的应用程序。\n\n\n\n## Spring 中的响应式编程简介\n\
  \n响应式编程是一种声明式编程范式，其核心理念是异步事件处理和数据流，或者用我们喜欢的方式描述，即带有响应式流的函数式编程。响应式流是一项倡议，旨在为带有非阻塞背压的异步流处理提供标准。它对于解决需要跨线程边界进行复杂协调的问题极为有用。\n\
  \nJava 在版本 8 中引入了 Streams API 和 lambda 表达式，这是迈向响应式编程的第一步，因为响应式编程也可以定义为*带有响应式流的函数式编程*。直到\
  \ Java 9 才提供了响应式流。由于无法等待延迟了六个月发布的 JDK 9，创建了 Spring 的 Pivotal 开源团队使用他们自己的响应式库 Project\
  \ Reactor^(¹⁹⁴) 构建了 Spring WebFlux^(¹⁹⁵)。\n\n![](img/524962_1_En_20_Figb_HTML.jpg)\
  \ 一个警告图标。三角形内有一个感叹号。 Kotlin 对响应式编程范式有自己的见解。它被称为*协程*，或者更具体地说是 *Kotlin Flow*。由于我们希望与本书的\
  \ Java 姊妹版保持一致，我们将讨论范围限定在“Spring 与 Java 方式”的响应式编程。欢迎您通过官方文档渠道探索协程和 Flow。\n\n响应式流为\
  \ Java 或 Kotlin 中的响应式编程提供了一个通用 API。它由四个简单的接口组成，为带有非阻塞背压的异步流处理提供了标准。如果您想编写一个能够与其他响应式组件集成的组件，您需要实现这些接口之一。在抽象层面上，响应式流规范中描述的组件及其之间的关系，如图\
  \ 20-1 所示。\n\n![](img/524962_1_En_20_Fig1_HTML.jpg)\n\n一个流程图展示了数据流和背压在 4 个组件之间的流动。这些组件分别是发布者、2\
  \ 个处理器和一个订阅者。发布者订阅了订阅者。订阅者在订阅时获得一个订阅对象，并向发布者请求数据。\n\n图 20-1\n\n响应式流规范的抽象表示\n\n如果您觉得这很像带有背压功能的发布者/订阅者模型，那基本上就是如此。数据在组件之间*流动*，每个组件处理数据并将其向前传递，每个组件通过背压来调节速度。现实世界中最贴切的模型是工厂传送带。让我们逐一分析图\
  \ 20-1 中的组件。\n\n*   **发布者** 是一个潜在无限的数据生产者。在 Java 或 Kotlin 中，数据生产者必须实现 `org.reactivestreams.Publisher<T>`。发布者准备数据并将其作为单独的消息传输给订阅者。发布者根据订阅者的需求发出值。\n\
  \n*   **订阅者** 向发布者注册以消费数据。在 Java 或 Kotlin 中，数据消费者必须实现 `org.reactivestreams.Subscriber<T>`。订阅者接收来自发布者的消息并处理它们。这是\
  \ Streams API 中的终端操作。\n\n*   订阅时，会创建一个**订阅**对象来表示发布者和订阅者之间的一对一关系。该对象向发布者请求数据，并可以取消数据需求。在\
  \ Java 或 Kotlin 中，订阅类必须实现 `org.reactivestreams.Subscription`，并且此类型的对象只能被一个订阅者使用一次。\n\
  \n*   **处理器** 是一个特殊的组件，具有发布者和订阅者的相同属性。在 Java 或 Kotlin 中，数据处理器必须实现 `org.reactivestreams.Processor<T,R>`。处理器可以链接起来形成一个流处理管道。处理器消费链中位于其前面的发布者/处理器的数据，并发出数据供链中位于其后面的处理器/订阅者消费。如果订阅者/处理器消费数据的速度不够快，它可以通过背压来减慢发布者/处理器发出数据的速度。\n\
  \n您可以在 IDE 或 GitHub^(¹⁹⁶) 上查看这些接口的代码。\n\n![](img/524962_1_En_20_Figc_HTML.jpg) 一个警告图标。三角形内有一个感叹号。 大多数针对\
  \ JVM 的响应式实现是并行开发的，因此今天我们有了 RxJava^(¹⁹⁷)、Akka Streams^(¹⁹⁸)、Ratpack^(¹⁹⁹)、Vert.x^(²⁰⁰)\
  \ 和 Project Reactor。\n\n使用响应式流编写的代码看起来与使用非响应式流编写的代码相似，但底层机制是不同的。响应式流是**异步的**，但您无需编写处理异步的逻辑。您只需要声明当流中发出某个值时应该发生什么。您编写的代码会在流异步发出元素时被调用，独立于主程序流程。如果涉及多个处理器，每个处理器都在自己的线程上执行。由于您的代码是异步运行的，您必须小心提供给处理器（转换器）方法的函数。确保它们是**纯函数**。纯函数应仅通过其参数和返回值与程序交互。对于相同的参数值，它们返回相同的结果，并且绝不应修改需要同步的对象，因为这可能会导致整个流程出现不可预测的延迟。\n\
  \nProject Reactor 实现了响应式流 API，为响应式应用提供了一个具有高效需求管理的非阻塞稳定基础。它声明了两个主要的发布者实现：\n\n* \
  \  `reactor.core.publisher.Mono<T>`：表示零个或一个元素的响应式流发布者\n*   `reactor.core.publisher.Flux<T>`：表示零到无限个元素的异步序列的响应式流发布者\n\
  \n`Mono<T>` 和 `Flux<T>` 类似于 `java.util.concurrent.Future<V>`。它们都表示异步计算的结果。它们之间的区别在于，当您尝试使用\
  \ `get()` 方法获取结果时，`Future<V>` 会阻塞当前线程直到计算完成。而 `Mono<T>` 和 `Flux<T>` 都提供了一系列 `block*()`\
  \ 方法，用于检索不阻塞当前线程的异步计算的值。\n\n为了更直观地展示响应式编程在语法上与命令式编程的不同，让我们考虑以下场景：给定一个歌手列表，我们想要找出所有年龄大于\
  \ 50 岁的歌手，并计算他们的年龄总和。如果代码以命令式风格编写，并且针对 Java，它可能看起来像清单 20-1 中所示的代码片段。\n\n\n\n```\n\
  package com.apress.prospring6.twenty.boot;\n// import statements omitted\npublic\
  \ class SimpleProgrammingTest {\nList singers = List.of(\nSinger.builder().firstName(\"\
  John\").lastName(\"Mayer\").birthDate(LocalDate.of(1977, 10, 16)).build(),\nSinger.builder().firstName(\"\
  B.B.\").lastName(\"King\").birthDate(LocalDate.of(1929, 9, 16)).build(),\nSinger.builder().firstName(\"\
  Peggy\").lastName(\"Lee\").birthDate(LocalDate.of(1920, 5, 26)).build(),\nSinger.builder().firstName(\"\
  Ella\").lastName(\"Fitzgerald\").birthDate(LocalDate.of(1917, 4, 25)).build()\n\
  );\nFunction> computeAge = singer -> Pair.of(singer,Period.between(singer.getBirthDate(),\
  \ LocalDate.now()).getYears());\nPredicate> checkAge = pair -> pair.getRight() >\
  \ 50;\n@Test\nvoid imperativePlay(){\nint agesum = 0;\nfor (var s : singers) {\n\
  var p = computeAge.apply(s);\nif (checkAge.test(p)) {\nagesum += p.getRight();\n\
  }\n}\nassertEquals(300, agesum);\n}\n}\n清单 20-1\n处理歌手列表的 Java 命令式风格代码\n```\n\n不太美观，对吧？嗯，这就是所有\
  \ Java 开发者在 Java 8 引入 Stream API 之前常写的代码类型。一系列指令被逐一列出供 JVM 执行。此外，使用 `Function<T,R>`\
  \ 和 `Predicate<T>` 有点取巧，因为 Java 8 之前也不存在这些类型。\n\n使用 Kotlin 和函数式构造，同样的代码可以写得更具声明性和函数式风格，如清单\
  \ 20-2 所示。\n\n```\npackage com.apress.prospring6.twenty.boot\nimport org.junit.jupiter.api.Assertions.assertEquals\n\
  // import statements omitted\nclass SimpleProgrammingTest {\nvar singers: List =\
  \ listOf(\nSinger().apply{firstName=\"John\"; lastName = \"Mayer\";\nbirthDate =\
  \ LocalDate.of(1977, 10, 16)},\nSinger().apply{firstName=\"B.B.\"; lastName = \"\
  King\";\nbirthDate = LocalDate.of(1929, 9, 16)},\nSinger().apply{firstName=\"Peggy\"\
  ; lastName = \"Lee\";\nbirthDate = LocalDate.of(1920, 5, 26)},\nSinger().apply{firstName=\"\
  Ella\"; lastName = \"Fitzgerald\";\nbirthDate = LocalDate.of(1917, 4, 25)}\n)\n\
  var computeAge  = { singer: Singer ->\nPair(\nsinger,\nPeriod.between(singer.birthDate,\
  \ LocalDate.now()).years\n)\n}\nvar checkAge = { pair:Pair -> pair.second > 50 }\n\
  @Test\nfun streamsPlay() {\nval agesum: Int = singers\n.map(computeAge)\n.filter(checkAge)\n\
  .map{ obj:Pair -> obj.second }\n.reduce{ a: Int, b: Int -> Integer.sum(a, b) }\n\
  Assertions.assertEquals(\n300,\nagesum\n)\n}\n}\n清单 20-2\n使用 Kotlin 处理歌手列表的声明式/函数式风格代码\n\
  ```\n\n声明式编程更多的是一个不断定义事物是什么的过程。声明式编程关注程序*应该实现什么*，而命令式编程关注程序*应该如何实现*结果。\n\n将清单 20-2\
  \ 中的代码转换为响应式代码并不需要太多功夫：我们只需将 `Stream<T>` 替换为 `Flux<T>`，并确保声明一个订阅者，对链中最后一个处理器（`reduce(..)`\
  \ 函数）的结果进行处理。代码如清单 20-3 所示。\n\n```\npackage com.apress.prospring6.twenty.boot\n\
  import reactor.core.publisher.BaseSubscriber\nimport reactor.core.publisher.Flux\n\
  // other import statements omitted\nclass SimpleProgrammingTest {\nvar singers:\
  \ List = ...\nvar computeAge  = { singer: Singer ->\nPair(\nsinger,\nPeriod.between(singer.birthDate,\
  \ LocalDate.now()).years\n)\n}\nvar checkAge = { pair:Pair -> pair.second > 50 }\n\
  @Test\nfun reactivePlay() {\nFlux.fromIterable(singers) // Flux\n.map(computeAge)\
  \ // Flux >\n.filter(checkAge) // Flux >\n.map{ obj -> obj.second } // Flux \n.reduce(0,\n\
  { a: Int, b: Int ->\nInteger.sum(\na,\nb\n)\n})\n.subscribe(object : BaseSubscriber()\
  \ {\noverride fun hookOnNext(agesum: Int) {\nAssertions.assertEquals(\n300,\nagesum\n\
  )\n}\n})\n}\n}\n清单 20-3\n使用响应式流处理歌手列表的函数式风格代码\n```\n\n`BaseSubscriber<T>` 抽象类是 `Subscriber<T>`\
  \ 实现的一个简单基类，允许用户直接对其执行 `request(long)` 和 `cancel()` 操作。`hookOnNext(..)` 方法用于将行为附加到发出的值上；在我们的例子中，这是检查我们假设的完美位置。\n\
  \n现在你已经了解了 Project Reactor 的响应式编程，让我们换个话题，看看如何使用 Spring WebFlux 编写响应式应用程序。\n\n\n\
  \n## 介绍 Spring WebFlux\n\nSpring Web MVC 是围绕 `DispatcherServlet` 设计的，该 Servlet 是一个网关，负责将\
  \ HTTP 请求映射到处理器，并配置了主题、国际化、文件上传和视图解析等功能。Spring MVC 是为 Servlet API 和 Servlet 容器构建的。这意味着\
  \ Spring MVC 主要使用阻塞式 I/O，并且每个 HTTP 请求对应一个线程。虽然可以支持请求的异步处理，但这需要更大的线程池，进而需要更多资源，并且难以扩展。\n\
  \nSpring WebFlux 是一个响应式栈 Web 框架，在 Spring 5 中引入，是 Spring 对日益严重的阻塞式 I/O 架构问题的回应。它可以在\
  \ Servlet 3.1+ 容器上运行，但也能适配其他原生服务器 API。首选的服务器是 Netty^(²⁰¹)，它在异步、非阻塞领域久经考验。Spring\
  \ WebFlux 在设计上考虑了函数式响应式编程，并允许以声明式风格编写代码。这两个框架有一些共同元素，甚至可以一起使用。处理器方法没有理由不能返回 `Flux<T>`\
  \ 或 `Mono<T>`，本章稍后将展示这一点。\n\n![](img/524962_1_En_20_Figd_HTML.jpg) 一个警告图标。三角形内有一个感叹号。 编写响应式应用程序时需要记住的一点是，应用程序的每个组件都必须是响应式的；否则，应用程序将不是真正的响应式，非响应式组件可能成为瓶颈并破坏整个流程。例如，一个典型的三层应用程序（表示层、服务层和数据库层）只有在所有三层都是响应式的情况下才是响应式的。因此，一个响应式的\
  \ Spring WebFlux 应用程序必须拥有响应式的视图、响应式的控制器、响应式的服务、响应式的仓库以及响应式的数据库（任何带有响应式驱动程序的 SQL\
  \ 数据库，例如 MongoDB、RethinkDB 等）。此外，调用该应用程序的客户端也必须是响应式的。\n\n在将歌手应用程序转换为响应式应用程序之前，让我们先回顾一下\
  \ Spring WebFlux 在底层是如何工作的。\n\n响应式应用程序可以部署在 Servlet 3.1+ 容器上，例如 Tomcat、Jetty 或 Undertow。这里的诀窍是不使用\
  \ `DispatcherServlet`。`DispatcherServlet` 是 HTTP 请求处理器/控制器的中央调度器，无论它多么强大，它仍然是一个阻塞组件。这时，新的、改进后的\
  \ Spring Web 组件通过引入 `org.springframework.http.server.reactive.HttpHandler`^(²⁰²)\
  \ 来解决问题。该接口代表了响应式 HTTP 请求处理的最低层级契约，Spring 为每个受支持的服务器提供了基于它的服务器适配器。其代码如代码清单 20-4\
  \ 所示。\n\n```\npackage org.springframework.http.server.reactive;\nimport reactor.core.publisher.Mono;\n\
  // 其他注释已省略\npublic interface HttpHandler {\n/**\n* 处理给定的请求并写入响应。\n* @param request\
  \ 当前请求\n* @param response 当前响应\n* @return 表示请求处理完成\n*/\nMono handle(ServerHttpRequest\
  \ request, ServerHttpResponse response);\n}\n代码清单 20-4\nHttpHandler 接口\n```\n\n\
  表 20-1 列出了 Spring WebFlux 支持的服务器以及代表每个服务器非阻塞 I/O 到响应式流桥接核心的适配器类名称。\n\n表 20-1\n\n\
  Spring WebFlux 支持的 HTTP 服务器\n\n| 服务器名称 | Spring 适配器 | 使用的 Servlet API |\n| --- |\
  \ --- | --- |\n| Netty^(²⁰³) | `ReactorHttpHandlerAdapter` | 使用 Reactor Netty 库的\
  \ Netty API |\n| Undertow^(²⁰⁴) | `UndertowHttpHandlerAdapter` | Spring Web Undertow\
  \ 到响应式流的桥接 |\n| Tomcat^(²⁰⁵) | `TomcatHttpHandlerAdapter` | Spring Web：Servlet 3.1\
  \ 非阻塞 I/O 到响应式流的桥接 |\n| Jetty^(²⁰⁶) | `JettyHttpHandlerAdapter` | Spring Web：Servlet\
  \ 3.1 非阻塞 I/O 到响应式流的桥接 |\n\n在 `HttpHandler` 之上，Spring 提供了 `org.springframework.web.server.WebHandler`^(²⁰⁷)\
  \ 接口，这是一个稍高层次的契约，描述了所有通用服务器 API，并具有过滤器链式处理和异常处理功能。该接口如代码清单 20-5 所示，看起来与 `HttpHandler`\
  \ 非常相似。\n\n```\npackage org.springframework.web.server;\nimport reactor.core.publisher.Mono;\n\
  import org.springframework.web.server.adapter.HttpWebHandlerAdapter;\nimport org.springframework.web.server.adapter.WebHttpHandlerBuilder;\n\
  public interface WebHandler {\n/**\n* 处理 Web 服务器交换。\n* @param exchange 当前服务器交换\n\
  * @return {@code Mono} 用于指示请求处理何时完成\n*/\nMono handle(ServerWebExchange exchange);\n\
  }\n代码清单 20-5\nWebHandler 接口\n```\n\n`WebHandler` 在其 `handle(..)` 方法中没有使用 `ServerRequest`\
  \ 和 `ServerResponse` 对象，而是使用了一个 `ServerWebExchange` 类型的对象，这是一个专门的接口，代表了 HTTP 请求-响应交互的契约，并且还暴露了额外的服务器端处理相关属性和特性，例如请求属性。与\
  \ Spring Web MVC 应用程序相比，这对 Spring WebFlux 配置意味着什么？\n\nSpring Web MVC 应用程序有一个 `org.springframework.web.servlet.DispatcherServlet`\
  \ bean 作为前端控制器，拦截所有请求并将其匹配到处理器方法。Spring WebFlux 应用程序有一个 `org.springframework.web.reactive.DispatcherHandler`\
  \ bean 作为 HTTP 请求处理器/控制器的调度器。`DispatcherHandler` 是 `WebHandler` 和 `ApplicationContextAware`\
  \ 的实现，这使其能够访问应用程序配置中的所有 bean。它是核心的 `WebHandler` 实现，并提供了由可配置组件执行的请求处理算法。它委托给专门的 bean\
  \ 来处理请求并渲染适当的响应，并且它们的实现（如预期）是非阻塞的。与 Spring MVC 生态系统类似，有一个 `HandlerMapping` bean\
  \ 用于将请求映射到处理器，一个 `HandlerAdapter` bean 用于调用处理器，一个 `org.springframework.web.server.WebExceptionHandler`\
  \ bean 用于处理异常，以及一个 `HandlerResultHandler` bean 用于从处理器获取结果并最终确定响应，所有这些都声明在 `org.springframework.web.reactive`\
  \ 包中。\n\n按照 Spring 的典型方式，在大多数情况下，配置 `DispatcherHandler` bean 不需要直接描述它的代码。要配置一个将在\
  \ Servlet 3.1+ 容器中运行的 Spring WebFlux 应用程序，您需要执行以下操作：\n\n*   声明一个 Spring WebFlux\
  \ 配置类，并使用 `@Configuration` 和 `@EnableWebFlux` 对其进行注解。`@EnableWebFlux` 注解是 `org.springframework.web.reactive.config`\
  \ 包的一部分，它启用了注解控制器和函数式端点的使用。\n\n*   扩展 `org.springframework.web.server.adapter.AbstractReactiveWebInitializer`\
  \ 类，实现 `getConfigClasses()` 方法，并将您的 Spring WebFlux 配置类注入其中。\n\n在 Spring Boot 应用程序中，您无需执行任何这些操作。只需声明您的控制器、处理器类和函数式端点即可。因为本章的最终目标是从数据库到表示层构建一个完全响应式的应用程序，所以不会展示响应式应用程序的经典\
  \ Spring 配置。如需详细了解该配置的书籍，请参考之前提到的 *Pro Spring MVC with WebFlux*^(²⁰⁸)。\n\n\n\n###\
  \ 响应式应用的 Spring Boot 配置\n\n让我们从配置开始。要构建一个响应式三层应用，我们需要所有层都由响应式组件表示。这意味着以下几点：\n\n\
  *   *数据访问层必须是响应式的*：这意味着数据库驱动必须是响应式的，并且持久化层（如果使用）也必须是响应式的。传统的数据库 JDBC 驱动不是响应式的，因此在响应式应用中，它们代表了一个阻塞\
  \ I/O 组件，会影响整个应用的行为。因此，需要一种 SQL 响应式驱动，于是 R2DBC^(²⁰⁹) 应运而生。响应式关系数据库连接（R2DBC）项目为关系数据库带来了响应式编程\
  \ API，并且有一个适用于 MariaDB 的驱动。对于持久化，有一个 Hibernate Reactive 库^(²¹⁰)，但其功能有限，因此本章不会使用它。\n\
  \n*   *服务层必须是响应式的*：这并不复杂；我们只需要确保服务类只返回 `Flux<T>` 和 `Mono<T>` 实例。\n\n*   *Web 层必须是响应式的*：这意味着控制器和处理程序也是响应式的，因此也只返回\
  \ `Flux<T>` 和 `Mono<T>` 实例。\n\n*   *表示层必须是响应式的*：这意味着视图模板必须是动态的，以便它们能够在数据从服务器到达时进行渲染。Thymeleaf^(²¹¹)\
  \ 和 jQuery^(²¹²) 的组合可以很好地处理与服务器的响应式通信，但如果你需要更高级的用户界面，React^(²¹³) 和 Angular^(²¹⁴)\
  \ 是更合适的选择。\n\n图 20-2 显示了项目依赖关系。\n\n![](img/524962_1_En_20_Fig2_HTML.jpg)\n\n第 20\
  \ 章项目的依赖关系列表。标题为“第 20 章 boot”。第 20 章包括任务和依赖关系。依赖关系包括编译类路径及其后的 13 个组件、运行时类路径及其后的\
  \ 9 个组件、测试编译类路径和测试运行时类路径。\n\n图 20-2\n\n项目 `chapter20-boot` 的依赖关系\n\n`spring-boot-starter-data-r2dbc`\
  \ 的主要依赖是 `spring-data-r2dbc`^(²¹⁵)，它是 Spring Data 家族的一部分，可以轻松实现响应式仓库。Spring Data\
  \ R2DBC 非常简单：它不提供缓存、延迟加载、写后缓存或 ORM 框架的许多其他特性，但它确实提供了对象映射，这足以消除一些样板代码，因为将数据库对象转换为\
  \ Java 对象可能很麻烦。\n\n`spring-boot-starter-webflux` 的主要依赖是 `spring-webflux`，它包含了所有可用于开发响应式\
  \ Web 应用的 Spring 组件。响应式栈 Web 框架 Spring WebFlux 是在 Spring Framework 5 中添加的，它是非阻塞的，支持响应式流背压，并且可以在\
  \ Netty、Undertow 和 Servlet 容器等服务器上运行。Spring Boot WebFlux 默认配置包含 Reactor Netty^(²¹⁶)\
  \ 服务器，该服务器基于 Netty^(²¹⁸) 框架提供非阻塞且支持背压的 TCP/HTTP/UDP/QUIC^(²¹⁷) 客户端和服务器。\n\n### 响应式仓库与数据库\n\
  \n与本章关联的项目选择的数据库是 MariaDB。有一个稳定的适用于 MariaDB 的 R2DBC 驱动，因此它将取代阻塞式的 JDBC 驱动。响应式驱动按预期提供了与数据库的非阻塞通信和身份验证。由于驱动的使用是由\
  \ Spring Data 在底层完成的，现在开发者查看代码时唯一能注意到的是配置中使用了响应式驱动。数据库连接 URL 不再使用 `jdbc:` 前缀，而是使用\
  \ `r2dbc` 前缀。\n\n清单 20-6 显示了使用响应式驱动时，`application.yaml` 配置文件中的 Spring Boot 数据源配置属性。\n\
  \n```\nspring:\nr2dbc:\nurl: r2dbc:mariadb://localhost:3306/musicdb\nusername: prospring6\n\
  password: prospring6\n清单 20-6\n使用响应式驱动的 Spring Boot 数据源配置\n```\n\nSpring Data R2DBC\
  \ 提供了一些有用的类，例如 `org.springframework.data.r2dbc.core` 包中的 `R2dbcEntityTemplate`，它相当于响应式环境中的\
  \ `JdbcTemplate`。它通过实体简化了响应式 R2DBC 的使用，并有助于避免常见错误。为了执行数据库操作，`R2dbcEntityTemplate`\
  \ 委托给一个 `DatabaseClient`（同一包），该客户端也可以用于使用 Criteria API 为映射实体执行语句。在本项目中，隐式使用了 Spring\
  \ Data 仓库，因此无需直接使用这些类；只需知道它们存在，并且如果需要可以使用即可。\n\nSpring Data 响应式仓库与非响应式仓库没有太大区别。它们只是为实体类型的基本查询（创建、读取、更新和删除）提供契约的接口。可以通过添加（响应式版本的）`@Query`\
  \ 注解方法和自定义实现来扩展它们，如**第** **10** **章**所示。\n\n清单 20-7 显示了 `SingerRepo` 接口，它扩展了 Spring\
  \ Data 仓库接口 `ReactiveCrudRepository<T,ID>`，并添加了自己的响应式方法。\n\n```\npackage com.apress.prospring6.twenty.boot.repo\n\
  import com.apress.prospring6.twenty.boot.model.Singer\nimport org.springframework.data.r2dbc.repository.Query\n\
  ...\ninterface SingerRepo : ReactiveCrudRepository {\n@Query(\"select * from singer\
  \ where first_name=:fn and last_name=:ln\")\nfun findByFirstNameAndLastName(@Param(\"\
  fn\") firstName: String,\n@Param(\"ln\") lastName: String): Mono\n@Query(\"select\
  \ * from singer where first_name=:fn\")\nfun findByFirstName(@Param(\"fn\") firstName:\
  \ String): Flux\n@Query(\"select * from singer where last_name=:ln\")\nfun findByLastName(@Param(\"\
  ln\") lastName: String): Flux\n@Query(\"select * from singer where birth_date=:ln\"\
  )\nfun findByBirthDate(@Param(\"bd\") birthDate: LocalDate): Flux\n}\n清单 20-7\n\
  SingerRepo 响应式仓库接口\n```\n\n请注意，某些 Spring Data 组件（例如 `@Param` 注解）可以在响应式上下文中使用，只有那些直接与数据流交互的组件才需要是响应式的。Spring\
  \ Data 现在有两个组件：`org.springframework.data.r2dbc.repository` 包中的响应式组件和 `org.springframework.data.jpa.repository.query`\
  \ 包中的非响应式组件。\n\n本例中使用的 `ReactiveCrudRepository<T,ID>` 接口是**第** **10** **章**中介绍的\
  \ `CrudRepository<T,ID>` 的响应式等价物，其主要特点是返回响应式类型，因此我们获得的结果不是数据，而是一个数据响应式流，当订阅者请求时，它会发出数据。\n\
  \n![](img/524962_1_En_20_Fige_HTML.jpg) 一个警告图标。圆圈内有一个感叹号。 请注意，为了保持我们的仓库完全响应式，所有额外配置的方法必须返回\
  \ `Flux<T>` 或 `Mono<T>`。\n\n\n\n当通过配置（如此处所示）或通过自定义接口组合自定义实现（如**第** **10** **章**所示）为\
  \ Spring Data 响应式仓库增加额外方法时，您可能想要测试您的仓库。通过结合使用 TestContainers、JUnit 5、Spring Boot\
  \ 和 Project Reactor 测试库，您可以轻松做到这一点。*（是的，我们知道，当需要四个库才能完成时，这看起来并不那么容易！）*\n\n图 20-3\
  \ 展示了 `chapter20-boot` 项目的测试依赖项。\n\n![](img/524962_1_En_20_Fig3_HTML.jpg)\n\n第 20\
  \ 章启动项目测试依赖项列表。标题为：第 20 章启动。第 20 章包含任务和依赖项。依赖项包括编译类路径、运行时类路径、测试编译类路径（后跟 14 个组件）和测试运行时类路径。\n\
  \n图 20-3\n\n`chapter20-boot` 项目测试依赖项\n\n要编写测试，我们需要执行以下操作：\n\n*   设置一个 MariaDB 容器，提取其属性，将连接\
  \ URL 转换为响应式连接 URL，并将其注入到 Spring Boot 测试上下文中。这一步是必要的，以便 Spring Boot 能够配置 R2DBC 驱动。\n\
  *   使用 `@DataR2dbcTest` 注解测试类，让 Spring Boot 知道所需的测试上下文是专门针对响应式上下文的，并且我们只对 Spring\
  \ Data 组件感兴趣。\n*   为了对以响应式方式操作的数据进行断言检查，我们需要使用 Project Reactor 的 `StepVerifier`，它提供了一种声明式的方式来为异步\
  \ Publisher 序列创建可验证的脚本，通过表达对订阅时将发生的事件的期望。\n*   为了控制测试方法的执行顺序（我们在这里保持测试非常简单），用它们的执行步骤编号标记方法并检查假设。我们使用\
  \ JUnit 5 注解和静态方法，在本书的这个阶段您应该已经熟悉它们了。\n\n清单 20-8 展示了测试类，它检查了 `SingerRepo` 接口最重要的方法，并使用了所有提到的库和组件。\n\
  \n```\npackage com.apress.prospring6.twenty.boot\n// Spring Boot imports\nimport\
  \ org.springframework.boot.test.autoconfigure.data.r2dbc.DataR2dbcTest\nimport org.springframework.data.r2dbc.core.R2dbcEntityTemplate\n\
  // TestContainers imports\nimport org.testcontainers.containers.MariaDBContainer\n\
  import org.testcontainers.junit.jupiter.Container\nimport org.testcontainers.junit.jupiter.Testcontainers\n\
  import org.testcontainers.utility.MountableFile\n// Project Reactor Test imports\n\
  import reactor.test.StepVerifier\n// JUnit 5 import\nimport static org.junit.jupiter.api.Assertions.assertNotNull\n\
  // other import statements omitted\n@DataR2dbcTest\n@TestMethodOrder(MethodOrderer.OrderAnnotation::class)\n\
  class SingerRepoTest : ReactiveDbConfigTests() {\n@Autowired\nvar singerRepo: SingerRepo?\
  \ = null\n@Order(1)\n@Test\nfun testRepoExists() {\nAssertions.assertNotNull(singerRepo)\n\
  }\n@Order(2)\n@Test\nfun testCount() {\nsingerRepo!!.count()\n.log()\n.`as`> { publisher:\
  \ Mono ->\nStepVerifier.create(\npublisher\n)\n}\n.expectNextMatches { p: Long ->\
  \ p == 4L }\n.verifyComplete()\n}\n@Order(3)\n@Test\nfun testFindByFistName() {\n\
  singerRepo!!.findByFirstName(\"John\")\n.log()\n.`as`> { publisher: Flux ->\nStepVerifier.create(\n\
