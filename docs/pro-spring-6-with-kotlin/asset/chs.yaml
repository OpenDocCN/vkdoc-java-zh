  open fun talk() {

  LOGGER.info("talk")

  }

  override fun rest() {

  LOGGER.info("zzz")

  }

  companion object {

  private val LOGGER = LoggerFactory.getLogger(GrammyGuitarist::class.java)

  }

  }

