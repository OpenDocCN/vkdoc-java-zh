  #### 使用 `SqlFunction` 调用存储函数


  Spring 还提供了一些类来简化使用 JDBC 执行存储过程/函数的过程。在本节中，我们将展示如何使用 `SqlFunction` 类执行一个简单的函数。我们将演示如何使用
  MariaDB 作为数据库，创建一个存储函数，并通过 `SqlFunction<T>` 类调用它。我们假设您有一个 MariaDB 数据库，其模式名为 `musicdb`，用户名和密码均为
  `prospring6`（与“探索 JDBC 基础设施”一节中的示例相同）。让我们创建一个名为 `getFirstNameById(..)` 的存储函数，该函数接受歌手的
  ID 并返回歌手的名字。代码清单 6-50 显示了在 MariaDB 中创建该存储函数的脚本（`resources/stored-function.sql`）。请针对
  MariaDB 数据库运行该脚本（单行）。


  ```

  CREATE FUNCTION IF NOT EXISTS getFirstNameById (in in_id INT) RETURNS VARCHAR(60)
  RETURN (SELECT first_name FROM SINGER WHERE ID = in_id);

  代码清单 6-50

  MariaDB 存储函数

  ```


  该存储函数简单地接受 ID 并返回具有该 ID 的歌手记录的名字。接下来，我们创建一个 `StoredFunctionFirstNameById` 类来表示存储函数操作，该类继承自
  `SqlFunction<String>` 类。泛型类型是存储函数返回的结果类型。您可以在代码清单 6-51 中看到该类的具体内容。


