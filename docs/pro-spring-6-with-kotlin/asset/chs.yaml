  尽管此示例仅演示了在组合过程中使用 `MethodMatcher`，但在构建切点时使用 `ClassFilter` 也同样简单。实际上，在构建组合切点时，你可以结合使用
  `MethodMatcher` 和 `ClassFilter`。




  ### 组合切点与 `Pointcut` 接口


  在上一节中，你了解了如何通过多个 `MethodMatcher` 和 `ClassFilter` 来创建组合切点。你也可以通过使用其他实现了 `Pointcut`
  接口的对象来创建组合切点。


  构建组合切点的另一种方法是使用 `org.springframework.aop.support.Pointcuts` 类。该类提供了三个静态方法。`intersection()`
  和 `union()` 方法都接受两个切点作为参数来构建组合切点。此外，还提供了一个 `matches(Pointcut, Method, Class, Object[])`
  方法，用于快速检查某个切点是否与给定的方法、类和方法参数匹配。


  `Pointcuts` 类仅支持对两个切点进行操作。因此，如果你需要将 `MethodMatcher` 和 `ClassFilter` 与 `Pointcut`
  结合使用，则需要使用 `ComposablePointcut` 类。然而，当你只需要组合两个切点时，`Pointcuts` 类会更方便。


  ### 切点总结


  Spring 提供了一套强大的 `Pointcut` 实现，应该能够满足你应用程序的大部分（如果不是全部）需求。请记住，如果你找不到适合需求的切点，你可以通过实现
  `Pointcut`、`MethodMatcher` 和 `ClassFilter` 接口，从头开始创建自己的实现。


  你可以使用两种模式来组合切点和通知器。第一种模式（我们目前使用的模式）是将 `Pointcut` 实现与通知器解耦。在我们到目前为止看到的代码中，我们创建了 `Pointcut`
  实现的实例，然后使用 `DefaultPointcutAdvisor` 实现将通知与 `Pointcut` 一起添加到代理中。


  第二种选择（Spring 文档中的许多示例都采用这种方式）是将 `Pointcut` 封装在你自己的 `Advisor` 实现中。这样，你就拥有了一个同时实现
  `Pointcut` 和 `PointcutAdvisor` 的类，其中 `PointcutAdvisor.getPointcut()` 方法简单地返回 `this`。这是
  Spring 中许多类（例如 `StaticMethodMatcherPointcutAdvisor`）所采用的方法。我们发现第一种方法最灵活，允许你将不同的
  `Pointcut` 实现与不同的 `Advisor` 实现结合使用。然而，当你打算在应用程序的不同部分，甚至跨多个应用程序中使用相同的 `Pointcut`
  和 `Advisor` 组合时，第二种方法会很有用。


  当每个 `Advisor` 必须拥有一个独立的 `Pointcut` 实例时，第二种方法很有用；通过让 `Advisor` 负责创建 `Pointcut`，你可以确保这一点。如果你还记得本章前面关于代理性能的讨论，你会记得未通知的方法比已通知的方法性能要好得多。因此，你应该确保通过使用
  `Pointcuts`，只通知那些绝对必要的方法。这样，你就可以减少因使用 AOP 而给应用程序增加的不必要开销。


  ## 引介入门


  引介是 Spring 中 AOP 功能集的重要组成部分。通过使用引介，你可以动态地向现有对象引入新功能。在 Spring 中，你可以向现有对象引入任何接口的实现。你可能很想知道这到底有什么用。既然可以在开发时简单地添加功能，为什么还要在运行时动态添加呢？这个问题的答案很简单：当功能是横切性的，并且不容易使用传统通知实现时，你就会动态地添加功能。


  ### 引介基础


  Spring 将引介视为一种特殊类型的通知，更具体地说，是一种特殊类型的环绕通知。由于引介仅应用于类级别，因此你不能将切点与引介一起使用；从语义上讲，两者不匹配。引介向类添加新的接口实现，而切点则定义通知应用于哪些方法。你可以通过实现
  `IntroductionInterceptor` 接口来创建引介，该接口扩展了 `MethodInterceptor` 和 `DynamicIntroductionAdvice`
  接口。


  图 5-7 展示了此结构以及两个接口的方法，如 IntelliJ IDEA UML 插件所示。


  ![](img/524962_1_En_5_Fig7_HTML.jpg)


  一个框图包含引介拦截器、方法拦截器、拦截器、动态引介通知和通知。


  图 5-7


  引介的 UML 序列图


  如你所见，`MethodInterceptor` 接口定义了一个 `invoke()` 方法。使用此方法，你可以为你正在引介的接口提供实现，并根据需要对任何其他方法执行拦截。在单个方法内实现一个接口的所有方法可能会很麻烦，并且可能会导致大量代码，你不得不费力地浏览这些代码才能决定调用哪个方法。值得庆幸的是，Spring
  提供了一个 `IntroductionInterceptor` 的默认实现，称为 `DelegatingIntroductionInterceptor`，它使得创建引介更加简单。要使用
  `DelegatingIntroductionInterceptor` 构建引介，你需要创建一个类，该类既继承自 `DelegatingIntroductionInterceptor`，又实现你想要引介的接口。然后，`DelegatingIntroductionInterceptor`
  实现会简单地将所有对引介方法的调用委托给其自身的相应方法。如果这看起来有点不清楚，请不要担心；你将在下一节中看到一个示例。


  就像你在使用切点通知时需要 `PointcutAdvisor` 一样，你需要使用 `IntroductionAdvisor` 来向代理添加引介。`IntroductionAdvisor`
  的默认实现是 `DefaultIntroductionAdvisor`，它应该能够满足你大部分（如果不是全部）的引介需求。你应该注意，不允许使用 `ProxyFactory.addAdvice()`
  添加引介，否则会导致抛出 `AopConfigException`。相反，你应该使用 `addAdvisor()` 方法并传递一个 `IntroductionAdvisor`
  接口的实例。


  当使用标准通知（即非引介）时，同一个通知实例可以用于多个对象。Spring 文档将此称为 *每类生命周期*，尽管你可以为多个类使用单个通知实例。对于引介，引介通知构成了被通知对象状态的一部分，因此，每个被通知对象必须有一个不同的通知实例。这被称为
  *每实例生命周期*。由于你必须确保每个被通知对象都有一个不同的引介实例，因此通常最好创建一个负责创建引介通知的 `DefaultIntroductionAdvisor`
  子类。这样，你只需要确保为每个对象创建一个新的通知器类实例，因为它会自动创建一个新的引介实例。例如，假设你想对 `Contact` 类的所有实例上的 `setFirstName()`
  方法应用前置通知。图 5-8 显示了应用于所有 `Contact` 类型对象的相同通知。


  ![](img/524962_1_En_5_Fig8_HTML.jpg)


  一个框图展示了前置通知应用于 Singer 类的所有实例（例如 John Mayer、Chuc Berry 和 Gary Russell）的 set First
  Name 方法。


