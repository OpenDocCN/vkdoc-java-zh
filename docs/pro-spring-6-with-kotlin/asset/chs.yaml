  ### 使用 ProxyFactoryBean 实现引入


  你不仅可以使用 `ProxyFactoryBean` 类来增强对象，还可以向对象中引入混入。回顾之前关于引入的讨论，你必须使用 `IntroductionAdvisor`
  来添加引入；你不能直接添加引入。当你在使用 `ProxyFactoryBean` 进行引入时，同样适用此规则。当你使用 `ProxyFactoryBean` 时，如果你为混入创建了自定义的
  `Advisor`，配置代理会变得容易得多。清单 5-46 展示了本章前面 `IsModifiedMixin` 引入的配置片段。


  ```

  package com.apress.prospring6.five

  import org.springframework.aop.framework.ProxyFactoryBean

  // 其他导入语句已省略

  @Configuration

  internal open class IntroductionAopConfig {

  @Bean

  open fun guitarist(): Contact {

  val contact = Contact()

  contact.name = "John Mayer"

  return contact

  }

  @Bean

  open fun advisor(): IsModifiedAdvisor {

  return IsModifiedAdvisor()

  }

  @Bean

  open fun proxy(): Contact {

  val pfb = ProxyFactoryBean()

  pfb.isProxyTargetClass = true

  pfb.setTarget(guitarist())

  pfb.addAdvisor(advisor())

  pfb.isFrozen = true

  return pfb.getObject() as Contact

  }

  }

  清单 5-46

  测试 ProxyFactoryBean 配置的类

  ```


  运行此示例，你可以看到代理实际上是从 `ApplicationContext` 中获取的，并且应用程序代码中不存在任何配置。


  请注意，无需通过名称引用 advisor bean 来将其作为参数提供给 `ProxyFactoryBean`，因为可以直接调用 `addAdvisor(..)`
  并将 advisor bean 作为参数提供。这显然简化了配置。


  ### `ProxyFactoryBean` 总结


  当你使用 `ProxyFactoryBean` 时，你可以配置 AOP 代理，这些代理提供了编程方法的所有灵活性，而无需将应用程序耦合到 AOP 配置。除非你需要在运行时决定如何创建代理，否则最好使用声明式代理配置方法，而不是编程式方法。让我们继续，以便你了解声明式
  Spring AOP 最实用的方式。


  ## 使用 @AspectJ 风格注解


  当使用 JDK 5 或更新版本使用 Spring AOP 时，你还可以使用 `@AspectJ` 风格注解来声明通知。然而，如前所述，Spring 仍然使用自己的代理机制来增强目标方法，而不是
  AspectJ 的织入机制。


  在本节中，我们将介绍如何使用 `@AspectJ` 风格注解来实现与本章开头介绍的相同的切面。AspectJ 是 Java 的一个通用面向切面扩展，它源于解决传统编程方法无法很好捕获的问题或关注点（即横切关注点）的需求。对于本节中的示例，我们还将对其他
  Spring bean 使用注解，并将使用 Java/Kotlin 配置类。


  清单 5-47 展示了使用注解声明的 `GrammyGuitarist` 类。


  ```

