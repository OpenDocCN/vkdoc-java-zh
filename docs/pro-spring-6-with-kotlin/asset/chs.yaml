  \ `findByIdWithAlbums(..)` 从数据库检索更新后的条目时，需要创建一个新事务，如日志的最后一部分所示。\n\n让我们设计一个示例来展示重用现有事务的情况。虽然相当基础，但一个返回数据库中歌手总数的方法可以配置为在现有的只读事务中运行，因为它不会修改数据库。为了使其在现有事务中执行，该方法使用\
  \ `@Transactional(propagation = Propagation.SUPPORTS)` 进行注解，如代码清单 9-11 所示。\n\n```\n\
